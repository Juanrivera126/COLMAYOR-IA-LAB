    const PDF_TEXT = "                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9       GUÍA DIDÁCTICA PARA LA ELABORACION DEL DE CIRCULO CROMÁTICO    Curso color ambientación e imagen.    Autor: Jhony Alveiro Pérez Salazar    TEMA     Teoría del color y círculo cromático    OBJETIVO:    Elaborar el circulo cromático para entender las combinaciones de los colores.    Específicos:    ACTIVIDAD.    Elabora r   el c ír culo  basado en las indicaciones descritas en este documento complementadas con la   explicación de la clase.       RECURSOS PARA EL APRENDIZAJE    Cartón paja, pinceles vinilos.                                    \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9                DIBUJO DE ESTRUCTURA  PARA EL CÍRCUO CROMÁTICO    En un octavo de cartón paja,  de   35 x 25cm  Dibuja la estructura del círculo ubicando 12 espacios a   iguales de manera circular  y seis divisiones de 1.5cm hacia adentro del círculo y después las la pintas   con las indicaciones y proporciones de color indicadas en la clase.    Recuerda que de bes dejar una margen de un centímetro por todos los lados del círculo cromático.          Imagen 1:  Ejemplo para dibujar la estructura del círculo cromático .  Fuente :   elaboración  p ropia .               \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9                        Imagen 2: Círculo cromático elaborado por Rosario Valderrama.  2020 - 0 1      \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9            Imagen 3: Círculo Cromático, Elaborado Por María Paulina Arias, Semestre 2020 - 02          METODOLOGÍA PARA LA MEZCLA DE COLORES EN EL CÍRCUO CROMÁTICO         Mezclas de primarios hacia el color blanco :    Para esta mezcla debemos poner en la paleta cinco p inceladas de color y le agregamos una o dos de   blanco tanto para el amarillo, para el azul y el Rojo.   \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9       Color base : Es el color que ubicamos en la tercera casilla de nuestro círculo, es la base inicial para las   mezclas con blanco y con el complementario.       Co lores primarios pigmento : Son los colores que no resultan de mezclas previas, y con los cuales se   pueden generar los demás colores. Los colores primarios son el amarillo, el azul y el rojo.       Colores secundarios:  Son los que resultan de la mezcla de dos pri marios.    Naranja, violeta, verde.       Colores terciarios:  Son los que resultan de la mezcla de un primario con un secundario.          Mezcla de secundarios para círculo cromático:       Violeta:  Diez  pinceladas de azul por cuatro de rojo    Verde:  Diez  pinceladas   de amarillo por dos de azul.    Naranja:  Diez pinceladas de amarillo por dos de Rojo.          Metodología para mezcla de terciarios.    Para estas mezclas debemos trabajar por pares de color es decir, si hacemos el amarillo verdoso,    también debemos preparar la mezcl a del rojo viloeta, simultáneamente para hacer las mezclas más   fácil.       Para mezcla con blanco       color base      para mezcla con complementario                  Para mezcla con blanco       color base      para mezcla con complementario                      Para crear las tonalidades ha cia el centro del círculo, se debe mezclar con el color base de en frente, en   este caso, al naranja se le aplica azul en una proporción mínima.    Mezcla de colores terciarios:      \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9       Violeta Rojizo o Rojo violeta:  Diez pinceladas de rojo por tres o cuatro de azul.    Naranja rojizo o Rojo Naranja:  Diez pinceladas de rojo por cuatro o cinco de amarillo.       Amarillo Verdoso:  Diez pinceladas de amarillo por media de azul.    Amarillo Naranja:  Diez pinceladas de amarillo por media de rojo.       Azul verdoso o verde Azulado:  Diez p inceladas de azul por tres de amarillo.    Azul violeta:  Diez pinceladas de azul por tres de rojo.         Los colores se deben  preparar   en la paleta según los pares señalados en el texto anterior, por ejemplo:   los  señalados  con  amarillo  que  corresponden  al  violeta   rojizo  o  rojo  violeta ,  se  den  preparar   simultáneamente en la paleta, con los colores  amarillo verdoso ,   esto se hace con el fin de tener todos los   co lores preparados y procede r   a hacer las mezclas correspondientes tanto con los blancos para generar   colores   luminosos, como con los colores complementarios, para generar  l os colores sombra u  ocres. y    así crear la escala cromática de cada color.                            \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9                                                     Imagen 4: Imagen tomada de:  http://www.mueblesgascon.com/blog/el - circulo - cromatico - y - como - usarlo - para -  decorar/                Lectura del   c írculo  c romático       Conceptos generales colores Pigmento o síntesis Sustractiva :    Colores  primarios pigmento:   Son los colores que no resultan de mezclas previas, y con los cuales se   pueden generar los demás colores. Los colores primarios son el amarillo, el azul y el rojo.    Colores secundarios:  Son los que resultan de la mezcla de dos primarios.    Naranja, violeta, verde.    Colores terciarios:   Son los que resultan de la mezcla de un primario con un secundario.    Colores complementarios: Son los que están enfrentados en el círculo cromático. Y los cuales se   complementan porque forman la triada de los pr imarios,  Ejemplo:     Amarillo - Violeta     Rojo - Verde   \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9       Azul Naranja.    Complementarios análogos.    Amarillo    Saturación:    Tono:   Grado de desplazamiento de un color a su vecino en el círculo cromático, por ejemplo el   amarillo puede tener un tono anaranjado o verdoso an tes de convertirse en verde o naranjado.    Valor:  Es el grado de luminosidad que tiene un color antes de convertirse en blanco o en negro    Luminosidad:   Es el grado de variación de un color hacia el blanco.    Síntesis aditiva:  Colores Luz.          RÚBRICA DE EVALUACIÓ N:    Se tendrá en cuenta para la evaluación:    Trabajo en clase y avance en los encuentros sincrónicos.    Presentación del trabajo en los tiempos establecidos.    Factura en el trabajo (Pulimiento y buena presentación, colores acertados según las indicaciones,   limp ieza en la entrega, Imagen nítida y bien iluminada).    Formato de presentación del trabajo establecido, presentaciones en Jpg, presentación en power point o   en PDF , según las indicaciones del profesor.    Texto escrito en el envés del cartón presentado  presentando donde figuren todos los conceptos tratados   en esta guía y definidos en clase.          FUENTES:    Sanmiguel, D. (2011) . Guía Completa para el artista, cuarta edición Barcelona, España : Parramón.       mueblesgascon.com. Recuperada de:  http://www.mueblesgascon.com/blog/el - circulo - cromatico - y -  como - usarlo - para - decorar/                Algunos ejemplos:      \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9            Imagen 5: Círculo cromático, elaborado por  Jacqueline López, 2020 - 2   \n                                                                                                                                     GL - GD - FR - 04                                                                                                                                        FECHA DE PUBLICACION                                                                                                                                      26 - 08 - 2020                                                                                                                                                                                       VERSION 0 9         Imagen 6: Círculo Cromático, Elaborado Por Dorian Bustamante, Semestre 2020 - 02               \n";
    const PDF_NAME = "Guía didáctica círculo cromático. 2026.pdf";

    const PROPOSED_QUESTIONS = ["¿Cuál es el objetivo general de la guía sobre la teoría del color y el círculo cromático?","¿Qué recursos materiales se sugieren para elaborar el círculo cromático y por qué son necesarios?","¿Cómo se debe dibujar la estructura del círculo en el cartón paja (tamaño, número de espacios y divisiones)?","¿Qué margen de seguridad se debe dejar al elaborar el círculo cromático?","¿Qué significa que el color base esté ubicado en la tercera casilla del círculo y para qué se usa?","¿Cuáles son los colores primarios pigmento y qué caracteriza a un color primario?","¿Cómo se obtienen los colores secundarios según la guía y cuáles son sus ejemplos (naranja, violeta, verde)?","¿Qué metodología propone la guía para mezclar primarios hacia el color blanco? (¿cuántas pinceladas de cada color?)","¿Qué proporciones indica la guía para preparar los secundarios del círculo (violeta, verde y naranja)?","¿Cómo se deben hacer las mezclas de colores terciarios (por pares) para facilitar el proceso?","¿Qué relación tienen tono, valor y luminosidad al describir las cualidades de un color en el círculo cromático?","¿Qué criterios incluye la rúbrica de evaluación para calificar el trabajo y la presentación final?"];
    const INITIAL_PALETTE = {"primaryColor":"#3ae830","secondaryColor":"#61ed59","bgColor":"#ffffff","textColor":"#111827","cardBgColor":"#ffffff","cardBorderColor":"#d1d5db","inputBgColor":"#ffffff","inputBorderColor":"#cbd5e1","chatBubbleBotBg":"#f3f4f6","chatBubbleBotText":"#111827","chatBubbleUserBg":"#3ae830","chatBubbleUserText":"#111827","headerBorderColor":"#d1d5db","systemMessageBg":"#fef3c7","systemMessageText":"#92400e"};

    let pdf2Text = PDF2_TEXT_EMBEDDED;
    let pdf2Name = PDF2_NAME_EMBEDDED;
    let isProcessing = false;

    const BACKEND_BASE = 'https://node.proyectodescartes.org';
    function extractTextFromBackendResponse(raw) {
        if (raw == null) return '';
        const s = String(raw).trim();
        if (!s) return '';
        try {
            const j = JSON.parse(s);
            if (Array.isArray(j)) return JSON.stringify(j);
            if (j && typeof j === 'object') {
                const c = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
                if (typeof c === 'string') return c.trim();
                if (typeof j.content === 'string') return j.content.trim();
                if (typeof j.text === 'string') return j.text.trim();
            }
            if (typeof j === 'string') return j;
        } catch (e) {}
        return s;
    }
    async function postBackendText(payload) {
        const body = { model: payload.model || 'openai-fast', prompt: payload.prompt };
        if (payload.system) body.system = payload.system;
        if (payload.json) body.json = true;
        const res = await fetch(BACKEND_BASE + '/api/ia/text', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const raw = await res.text();
        if (!res.ok) throw new Error('Error de API: ' + res.status + ' ' + res.statusText + '. ' + raw.substring(0, 200));
        return extractTextFromBackendResponse(raw);
    }

    const chatDisplay = document.getElementById('chat-display');

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {
        const hue = Math.floor(Math.random() * 360);
        const bg = hslToHex(hue, 45 + Math.floor(Math.random() * 20), 16 + Math.floor(Math.random() * 70));
        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {

            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',
            inputBorderColor: '#cbd5e1',
            chatBubbleBotBg: '#f3f4f6',
            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };

    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
</body>
</html>
