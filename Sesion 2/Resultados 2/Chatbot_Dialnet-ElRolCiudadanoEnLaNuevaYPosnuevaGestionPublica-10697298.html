<script>
    const PDF_TEXT = "[        ] 166 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  *   Artículo derivado del proyecto  Gobernanza de la ciudad inteligente y su relación con la creación de   valor público en países emergentes,  desarrollado en el marco del Convenio de Cooperación UdeA-  ESAP No. 21530005-004-2024 **   Administrador de Empresas. Magíster en Ingeniería. Profesor investigador e integrante del Grupo   de Investigación en Gestión e Innovación Tecnológica en Administración Pública (LABGITAP) y del   Laboratorio de Innovación Pública, Escuela Superior de Administración Pública. Correo electrónico:   diego.jurado@esap.edu.co  -  Orcid: 0000-0001-6666-6444  - Google Scholar:  https://scholar.google.  com/citations?hl=es&user=dsGEDlIAAAAJ ***   Administradora Pública. Magíster en Hábitat. Doctora en Ciencias Humanas y Sociales. Docente   de  la  Facultad  de  Ciencias  Sociales  y  Educación,  e  integrante  del  Grupo  de  Investigación  Plan   D+E,  Institución  Universitaria  Colegio  Mayor  de Antioquia.  Correo  electrónico:    gleidy.urrego@  colmayor.edu.co   -    Orcid:  0000-0002-7040-0048   -  Google  Scholar:    https://scholar.google.com/  citations?hl=es&user=nj3p_aUAAAAJ  El rol ciudadano en la nueva y posnueva gestión pública.   Un análisis a partir de los enfoques y características *  Diego Armando Jurado-Zambrano (Colombia) **  Gleidy Alexandra Urrego Estrada (Colombia) ***  Resumen  Este  artículo  tiene  como  propósito  realizar  una  reflexión  teórica  sobre    la  gestión  pública  actual  a  partir  de  los  paradigmas  que  han  permeado  la    administración  pública  a  lo  largo  de  la  historia.  Para  tal  fin  se  indaga  ¿cuál  es  el    papel del ciudadano desde y para los paradigmas de la nueva gestión pública (NGP)   y la posnueva gestión pública (P-NGP)? Para ello se emplea un enfoque cualitativo   de  alcance  descriptivo.  Específicamente,  se  acude  al  análisis  de  contenido  como    una  metodología  basada  en  el  análisis  e  interpretación  de  fuentes  documentales.    Se  identifican  tres  conclusiones:  i)  cambio  en  la  comprensión  del  rol  ciudadano,    pasando  de  ser  reactivo-espectador  en  la  NGP  a  uno  activo-participativo  en  la    P-NGP;  ii)  modos  de  interacción  como  factores  clave  que  marcan  la  transición    hacia el concepto de P-NGP; y iii) acuerdos de gobernanza combinados, es decir,   de arriba hacia abajo y de abajo hacia arriba.  Palabras clave  Administración Pública; Nueva Gestión Pública; Posnueva Gestión Pública;   Rol Ciudadano; Gobierno; Estado.  Fecha de recepción:  julio de 2024        •        Fecha de aprobación:  mayo de 2025 \n[        ] 167 Medellín, mayo-agosto de 2025: pp. 166-193  Cómo citar este artículo  Jurado  Zambrano,  Diego  Armando  y  Urrego  Estrada,  Gleidy  Alexandra.    (2025). El rol ciudadano en la nueva y posnueva gestión pública. Un análisis a partir   de los enfoques y características.  Estudios Políticos  (Universidad de Antioquia), 73,   pp. 166-193.  https://doi.org/10.17533/udea.espo.n73a07  The Citizen Role in the New and Post-New Public   Management. An Analysis from the Approaches     and Characteristics  Abstract  This  article  aims  to  provide  a  theoretical  reflection  on  current  public    management  based  on  the  paradigms  that  have  shaped  public  administration    throughout  history.  To  this  end,  it  explores  the  question:  What  is  the  role  of  the    citizen within and in relation to the paradigms of New Public Management (NPM)   and Post-New Public Management (P-NPM)? A qualitative, descriptive approach is   employed.  Specifically,  content  analysis  is  used  as  an  indirect  methodology,  that    is,  based  on  the  analysis  and  interpretation  of  documentary  sources.  Three  main    conclusions are identified: (i) a shift in the understanding of the citizen’s role, from   a  reactive-spectator  position  in  NPM  to  an  active-participant  one  in  P-NPM;  (ii)    modes of interaction as key factors marking the transition to the P-NPM concept;   and (iii) hybrid governance arrangements, that is, both top-down and bottom-up.  Keywords  Public  Administration;  New  Public  Management;  Post-New  Public    Management; Citizen Role; Government; State. \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 168 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  Introducción  E n este texto se pretende contribuir a los estudios políticos al presentar   la discusión alrededor de las tendencias en los procesos de gobierno y de   dirección de las sociedades contemporáneas y el papel del Estado a partir   de  la  comprensión  del  rol  de  ciudadano  desde  dos  paradigmas:  nueva  y    posnueva gestión pública. Incluso contribuye al área de conocimiento de la   administración pública al centrar la discusión del papel del ciudadano en el   interés público de las actuaciones del Estado. De hecho, la administración   pública en el siglo  xxi  está experimentando cambios dramáticos (Robinson,   2015) y en este sentido las organizaciones públicas enfrentan retos que las   llevan a evaluar su capacidad de gestión para cumplir las exigencias de sus   grupos de interés, agregando  valor público,  mediante un uso eficiente  de   los recursos (Jurado y Valencia, 2021).  Actualmente, en el ejercicio de la gestión pública confluyen prácticas   que  pueden  estar  asociadas  a  los  paradigmas  de  nueva  gestión  pública    (NGP) y la posnueva gestión pública (P-NGP). La NGP constituye una visión   privada de lo público (Guerrero, 2003). De acuerdo con Michael Barzelay   (2003),  la  NGP  es  un  campo  de  discusión  profesional  acerca  de  cómo    estructurar, administrar y supervisar las oficinas gubernamentales y el sector   público como un todo. El Centro Latinoamericano de Administración para el   Desarrollo (CLAD, 1999) utiliza el término reforma gerencial para referirse   al  conjunto  de  mecanismos  necesarios  para  el  aumento  de  la  eficacia,  la    eficiencia  y  la  efectividad  de  la  administración  pública,  los  cuales  crean    nuevas condiciones que posibilitan una relación más democrática entre el   Estado  y  la  sociedad.  Por  su  parte,  la  P-NGP  es  un  conjunto  de  posturas    diversas que tienen en común una mayor preocupación por tener gobiernos   y  Estados  que  promuevan  y  faciliten  la  participación  ciudadana  (Chica  y    Salazar, 2020).  Ambos  paradigmas  enunciados  tienen  marcadas  características.  Al    momento de llevarlos a la práctica, los gobiernos y demás actores terminan   adoptando una combinación de enfoques que dan vida a la gestión pública   actual.  Dentro  de  la  gestión  pública,  el  rol  de  los  actores  se  convierte  en    un  tema  relevante.  Las  organizaciones  públicas,  y  el  Estado  en  general,    enfrentan el reto de facilitar la participación e inclusión de la ciudadanía y   demás grupos de interés en el diseño, ejecución y control de proyectos de   desarrollo. Este reto es un asunto de correlación de intereses y de propiciar  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 169 Medellín, mayo-agosto de 2025: pp. 166-193  capacidades  públicas  y  ciudadanas  hacia  la  misma  finalidad,  la  de  lograr    crear  valor  público.  Con  la  inclusión  de  los  grupos  de  interés  en  la  toma    de decisiones es posible construir agendas de desarrollo más cercanas a las   problemáticas que apunten a las necesidades apremiantes de estos, a la vez   de ser un mecanismo para que los gobierno puedan ganar en legitimidad.  Si bien existen múltiples actores que pueden interferir en la gestión   pública, en este artículo se focaliza la atención en el ciudadano. Al respecto,   el objetivo es realizar una reflexión teórica sobre el rol del ciudadano en la   nueva y posnueva gestión pública. Para focalizar el análisis se identificaron,   de  forma  apriorística  y  basados  en  la  literatura,  algunos  enfoques  y    características que se podrían asociar a la NGP y la P-NGP —tal como se   señala más adelante en la columna B del cuadro 1— y desde los cuales se   realizaría el análisis del rol ciudadano. Para alcanzar el objetivo se empleó   un enfoque de investigación cualitativo (Morrow y Smith, 2000) y el alcance   fue descriptivo. Como herramienta metodológica se empleó el análisis de   contenido, como una metodología indirecta, es decir, basada en el análisis   e interpretación de fuentes documentales secundarias (Oliver, 2008).  1.  Marco conceptual  La NGP busca desmantelar el pilar burocrático del modelo weberiano   de  administración  pública  tradicional  (Stoker,  2006)  e  instaurar  ideas  del    gerencialismo  privado,  con  la  firme  intención  de  lograr  administraciones    públicas  más  eficaces,  eficientes  y  efectivas  en  el  cumplimiento  de  sus    responsabilidades con la sociedad y los grupos de interés que la conforman.   El  hecho  de  tomar  artefactos  del   management   privado  e  introducirlos  en    las prácticas de las organizaciones públicas (Hood, 1991; 1995; Metcalfe,   1993;  CLAD,  1999;  Boyne,  2002;  Dunleavy,  Margetts,  Bastow  y  Tinkler,    2006) no es la única característica relevante de la NGP, además presenta un   conjunto de marcados rasgos que merecen ser revisados de manera general,   tal como se detalla a continuación.  En  primera  instancia,  el  establecimiento  de  estándares  explícitos  y    medidas  de  rendimiento  (Hood,  1991;  1995;  Free  y  Radcliffe,  2009)  que    privilegian aquellos de corte cuantitativo sobre las conclusiones cualitativas   (Free y Radcliffe, 2009) y el mayor énfasis en los controles de salida (Hood,   1991; 1995) es una característica destacada. \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 170 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  En segunda instancia, desde la NGP se cuestiona la participación del   gobierno en todas las áreas de política y considera la posibilidad de indagar   dónde las empresas privadas u organizaciones no gubernamentales pueden   realizar  mejor  las  tareas  (Free  y  Radcliffe,  2009)  con  reducción  de  costos    (Hood  1991;  1995).  Es  decir,  se  planteaba  la  posibilidad  que  entidades    del sector privado y entes no gubernamentales desarrollen actividades que   antes eran propias de las organizaciones públicas (Osborne, 2006).  En tercera instancia, la NGP propende por dividir las organizaciones   del  sector  público  en  unidades  más  pequeñas,  lo  cual  es  similar  a  los    planteamientos  de  desagregación  que  pretende  dividir  las  jerarquías  del    sector  público  al  igual  que  las  grandes  corporaciones  del  sector  privado    (Hood, 1991; 1995; Dunleavy, Margetts, Bastow y Tinkler, 2006).  En  cuarto  lugar,  y  relacionado  directamente  con  la  característica    anterior, la NGP distancia la implementación de políticas de los responsables   políticos, siendo necesario que la gestión del sector público pase a manos   de  profesionales  con  vastas  competencias  técnicas  y  con  un  alto  enfoque    en el liderazgo organizacional del servicio público (Osborne, 2006; Hood,   1991; 1995).  Con el paso del tiempo y la acumulación de experiencias, la hegemonía   de la NGP, como enfoque dominante de la reforma del sector público, se   fue debilitando, específicamente en los países en desarrollo (Brinkerhoff y   Brinkerhoff,  2015).  Su  transformación  radica  en  la  discusión  de  progreso    sobre  el  carácter  estructural  de  la  finalidad  del  Estado,  las  relaciones  de    gobierno-ciudadano,  gestionar  y  organizar  servicios,  y  reducir  costos  a    partir  de  un  principio  racional-económico  de  eficiencia.  De  acuerdo  con    Christopher  Pollitt  y  Geert  Bouckaert  (2017),  la  NGP  tiene  su  razón  ser    en  la  gestión  pública  a  partir  de  la  idea  de  que  la  administración  pública    trabaje mejor, es decir, que se realicen cambios deliberados y se desarrollen   capacidades  nuevas  y  propias  en  la  estructura  organizativa  del  Estado,  el    uso óptimo de recursos y cumplir objetivos sin perder de vista al ciudadano   como finalidad.  Si bien alrededor de la doctrina, como la denominan Flavia Donadelli,   Bruno Cunha y Mauricio Dussauge-Laguna (2020), de la NGP han surgido   enfoques alternativos como el valor público (Moore, 1995) y se han retomado   otros del  management  privado —por ejemplo, la gestión para resultados, la  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 171 Medellín, mayo-agosto de 2025: pp. 166-193  gestión de la calidad, la gestión estratégica del talento humano, entre otros—,   académicos  de  la  administración  pública  argumentan  que  paradigmas    como  la  gobernanza,  el  Estado  neoweberiano,  los  valores  públicos  y  la    motivación  del  servicio  público  han  reemplazado  las  ideas  dominantes,    hasta  hace  poco,  de  la  NGP  (De  Vries  y  Nemec,  2013).  Por  su  parte,  J.    Ignacio Criado  et al.  (2021) mencionan que la gestión pública se enfrenta a   una transición hacia la P-NGP. Si bien sigue siendo un tema ampliamente   controvertido,  comúnmente  se  argumenta  que  la  denominada  tendencia    de  la  P-NGP  surgió  como  una  reacción  a  las  deficiencias  de  las  reformas    anteriores, en particular, con respecto al aumento de la fragmentación y la   falta  de  mayor  control  gubernamental  que  resultó  de  la  NGP  (Donadelli,    Cunha y Dussauge-Laguna, 2020).  Por su parte, la discusión de la transición paradigmática entre la NGP   y la P-NGP en B. Guy Peters y Lorena Murillo (2005) es posible dilucidarla a   partir del ejercicio del gobierno como conducción y control. Es el gobierno   el  que  apertura  e  involucra  al  ciudadano  en  la  acción  misma  de  este  y    en la elección de las políticas públicas con mayor participación, es decir,   mediante  la  implementación  de  un  modelo  participativo  que  denomina    gobernanza. De este modo, la transición entre la NGP y la P-NGP continúan   en la idea del progreso de la administración pública. La idea de progreso   lleva a que se transformen las estructuras organizativas para cumplir con la   finalidad del Estado.  Algunas  de  las  ideas  centrales  de  la  P-NGP  y  que  a  la  vez  podrían    constituirse  en  características  son:  i)  la  P-NGP  es  una  reformulación  de    la  NGP  que  trata  de  ir  más  allá  de  las  medidas  de  rendición  de  cuentas    para brindar a los ciudadanos una «voz» (Brinkerhoff y Brinkerhoff, 2015);   ii)  refleja  una  nueva  comprensión  del  desarrollo,  pasando  de  un  enfoque    estrechamente relacionado con la transformación económica e institucional   hacia una perspectiva más holística, en la que los procesos dinámicos y los   estándares éticos pasan a primer plano (Christensen y Lægreid, 2007); iii)   las reformas de la P-NGP se centran más en la construcción de un sentido   de valores, confianza, gestión basada en valores y colaboración, formación   de  equipos,  involucrar  la  participación  de  organizaciones  y  mejorar  la    formación  y  la  autogestión  para  el  desarrollo  de  los  servidores  públicos    (Christensen  y  Lægreid,  2007);  por  último,  el  cambio  a  la  P-NGP  puede    entenderse como un iv) cambio de dirección a un discurso de gobernanza   o,  más  exactamente,  de  un  discurso  que  enfatiza  controles  gerenciales  a   \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 172 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  uno que enfatiza la autorregulación y la necesidad de pensar en términos   de redes de organizaciones autónomas (Dent, 2005).  La P-NGP implica un alejamiento de las reformas basadas en la NGP,   dejando de lado la orientación hacia el mercado y la mercantilización del   Estado para consolidar un enfoque basado en las capacidades colaborativas   entre  el  Estado  y  la  sociedad  (Chica  y  Salazar,  2016;  2020).  Es  por    esto  que  dentro  de  la  corriente  de  la  P-NGP  se  identifican  una  serie  de    planteamientos que se han convertido en temáticas de obligatoria discusión   en contextos teóricos y empíricos. Para efectos de este artículo se abordan   algunos como valor público, gobernanza inteligente, innovación pública y   gobierno abierto. Estos conceptos específicos son abordados en el acápite de   resultados, dado que sobre ellos se realizó el análisis del rol del ciudadano.  2.  Marco metodológico  Se empleó un enfoque de investigación cualitativo (Morrow y Smith,   2000) y el alcance fue descriptivo. Como técnica se empleó el análisis de   contenido a partir de fuentes documentales secundarias (Oliver, 2008). El   análisis de contenido permite un abordaje sistemático y objetivo de material   documental  para  hacer  inferencias  válidas  a  partir  de  información  escrita    (Downe-Wamboldt, 1992). Se incluyeron 49 artículos, tal como se relaciona   en el  cuadro 1 . Los documentos recuperados se asocian a cada uno de los   enfoques  desde  los  cuales  se  realizó  en  análisis  del  rol  ciudadano  en  la    NGP y la P-NGP, tal como se señala en la columna B del  cuadro 1 . Estos   enfoques  y  características  emergen  como  subcategorías  que  se  lograron    identificar como temáticas asociadas a la NGP y la P-NGP.  Cuadro 1.  Documentos revisados.  A. Paradigma   B. Enfoque-característica   C. Trabajos consultados  Nueva gestión   pública  Enfoque en la eficacia,   eficiencia y efectividad  McCourt (2013); Stoker (2006); Metcalfe   (1993); Hood (1995; 1991); Barzelay   (2003); Osborne (2006); Dunleavy et   al., (2006), Centro Latinoamericano de   Administración para el Desarrollo (1999)   y Dunleavy, Margetts, Bastow y Tinkler   (2006).  Fortalecimiento de las   formas de control  Prestación de servicios   públicos por privados  Adopción de herramientas   del sector privado (calidad,   servicio al cliente, entre   otros) \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 173 Medellín, mayo-agosto de 2025: pp. 166-193  Posnueva   gestión pública  Valor público   Bozeman (2007); Meynhardt (2009; 2015);   Meynhardt y Jasinenko (2020); Pardo  et   al.  (2021); Moore (1995); Andrews (2019);   Papi, Bigoni, Bracci y Deidda (2018); Moore   y Khagram (2004); Neumann  et al.  (2019).  Innovación pública   Torfing (2019); Meijer y Thaens (2021);   Criado  et al.  (2021); Sørensen y Vabo   (2020); Christensen y Fan (2018); Sørensen   & Torfing (2011); Viezzer-Baretta, Gaia-  Hoffmann, Militao y Silva-Farias (2024); De   Vries, Bekkers y Tummers (2016).  Gobernanza inteligente   Vanolo (2014); Jiang, Geertman y Witte   (2022); Kitchin (2015); Krivý (2016);   Shelton, Zook y Wiig (2015); Hollands   (2015), Cortés-Cediel, Cantador y   Rodríguez-Bolívar (2021); Tomor,   Przeybilovicz y Leleux (2021); Mora, Gerli,   Ardito y Messeni (2023); Meijer, Gil-  García y Rodríguez-Bolívar (2016); Meijer   y Rodríguez-Bolívar (2016); Viale-Pereira   et al . (2017); Buyannemekh, Gasco-  Hernández y Gil-García (2024); Yuan y   Gasco-Hernández (2021); Page, Stone,   Bryson y Crosby (2015); Donadelli, Cunha y   Dussauge-Laguna, 2020.  Gobierno abierto   Attard, Orlandi, Scerri y Auer (2015); Gil-  García, Gasco-Hernández y Pardo (2023);   Gao, Janssen y Zhang (2023); Wirtz, Becker   y Weyerer (2023); Ramírez-Alujas (2023).  Fuente:  elaboración propia.  La aplicación del análisis tomó como referencia los pasos sugeridos   por Barbara Downe-Wamboldt (1992), de la siguiente manera:  i)  Selección de la unidad de análisis:  los artículos recuperados fueron   aquellos publicados por autores destacados en la literatura; los documentos   se  recuperaron  a  través  de  Google  Scholar  utilizando  la  ecuación  de    búsqueda  (en  inglés  y  español)  que  se  describe  a  continuación:  (“Nueva    Gestión Pública” OR NGP) AND (“Post-Nueva Gestión Pública” OR “Post-  NGP”);  también  se  lanzaron  ecuaciones  de  búsqueda  independientes  con    las  siguientes  palabras  clave:  «gobierno  abierto»,  «innovación  pública»,    «gobernanza inteligente» y «valor público». La selección de los documentos   se realizó mediante los criterios de Google Scholar denominados «ordenar   por relevancia» y «cualquier momento».   Cuadro 1.   (Continuación). \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 174 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  ii)  Crear y definir las categorías:  fue posible identificar tres categorías   que emergen del análisis, la transición del rol ciudadano, retornando a los   modos de interacción y gobernanza combinada.  iii)  Codificar  los  datos  extraídos  de  los  documentos:   partiendo  de    una  codificación  abierta  fue  posible  identificar  las  tres  categorías  antes    mencionadas.  Los  procesos  de  codificación  y  categorización  siguieron  las    recomendaciones de varios estudios, como los de Michael Gibbert y Winfred   Ruigrok (2010) y de Karen Locke, Martha Feldman y Karen Golden-Biddle   (2022), es decir, se empezó con una codificación abierta y posteriormente   se pasó a un proceso de codificación axial.  3.  Resultados  El acápite de resultados se divide en dos momentos. En el primero se   presenta un análisis de cómo se concibe el rol ciudadano en cada uno de   los enfoques o características de la NGP y la P-NGP, como valor público,   gobernanza  inteligente,  innovación  pública  y  gobierno  abierto.  En  el    segundo momento se presentan las ideas alrededor de la transición del rol   del ciudadano entre NGP y P-NGP, y a su vez la necesidad de retornar a   los modos de interacción y a las prácticas de gobernanza combinada que   actualmente se presentan en la práctica de la administración pública.  3.1  Valor público y el rol ciudadano  La generación del valor público se postula como estrategia en la que   el papel de la participación, colaboración y asociación del ciudadano se da   bajo tres pruebas amplias (Alford y O’Flynn, 2009; Moore y Khagram, 2004):   i) tener como objetivo crear algo sustancialmente valioso, es decir, constituir   valor  público;  ii)  ser  legítimo  y  políticamente  sostenible,  atraer  suficiente    apoyo  continuo y recursos  concomitantes  del  entorno  y sus  actores;  y iii)   ser operativa y administrativamente factible con las capacidades internas y   externas necesarias para producirlo.  Pero  el  concepto  de  valor  público  ha  evolucionado,  hasta  el  punto    de  hablar  de  creación  de  valor  público,  lo  cual  implica  un  cambio  en  la    perspectiva de cómo se percibe este. John Bryson, Barbara Crosby y Laura   Bloomberg (2014) identifican la idea de Barry Bozeman (2007) de valores  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 175 Medellín, mayo-agosto de 2025: pp. 166-193  públicos basados en el consenso social. Bryson Crosby y Bloomberg (2014)   sugieren que la creación de valor público requiere que lo que es bueno para   el público sea  co-determinado  —en redes— y perseguido, es decir, que la   creación de valor público no es un acto que se dé en una dirección —del   gobierno a los grupos de interés—, sino que este debería ser  co-creado . Los   administradores públicos no pueden crear valor público solos, puesto que la   percepción y valoración por parte del ciudadano es clave (Meynhardt, 2009;   2015). En este escenario, el ciudadano puede ser partícipe de los espacios   de  interlocución  con  el  gobierno.  La   co-creación   de  valores  públicos    implica que el ciudadano tenga una amplia participación en las etapas de   definición  de  políticas  públicas,  así  como  en  las  fases  de  construcción  e    implementación de proyectos de desarrollo.  3.2  Gobernanza inteligente y el rol ciudadano  El  concepto  de  gobernanza  se  usa  típicamente  para  indicar  una    forma de gobernar que otorga un papel en la formulación, administración e   implementación de políticas a los actores económicos privados y a partes de   la sociedad civil (Pierre, 1999; Stoker, 2006). En este sentido, la gobernanza   inteligente tiene como objetivo mejorar la gestión a través de una mejor toma   de decisiones basada en datos, la inclusión y la participación proporcional   de  los  actores  cívicos  en  este  proceso  (Ranchod,  2020).  Así  también,  la    gobernanza inteligente debe basarse en el contexto, las condiciones de la   población, los recursos existentes y las problemáticas específicas, en lugar   de  comenzar  simplemente  con  la  tecnología  (McFarlane  y  Söderström,    2017).  También  lleva  a  la  toma  de  decisiones  a  través  de  la  cooperación    entre  diferentes  partes  interesadas  (Pereira,  Parycek,  Falco  y  Kleinhans,    2018).  Inicialmente, el concepto de gobernanza inteligente surge a partir de   un  enfoque  tecnocéntrico,  donde  la  adopción  de  tecnología  facilitaría  la    toma de decisiones por parte del gobierno, como actor principal; pero hoy   en día se aboga por prácticas descentralizadas y antropocéntricas, basadas   en  la  colaboración  y  la  participación  de  la  comunidad  (Zhao,  Fashola,    Olarewaju y Onwumere, 2021).  El  estudio  de  la  gobernanza  inteligente  se  sitúa  en  contextos  de    gobiernos  nacionales  y  subnacionales.  En  algunos  contextos,  como  las    ciudades, la gobernanza conserva matices de índole tecnocrática de arriba  \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 176 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  hacia abajo (Trencher, 2019) o también denominado enfoque de la oferta   (Ivars-Baidal    et  al.,   2021).  Este  enfoque  lleva  a  que  la  participación  del    ciudadano  —y  por  ende,  su  rol—  se  vea  limitado  simplemente  a  ser  un    receptor  de  las  que  se  considera  son  las  mejores  opciones  de  desarrollo,    generalmente, provenientes de la orilla del gobierno.  Algunos trabajos como los de Qianli Yuan y Qianli Gasco-Hernández   (2021)  y  Stephen  Page,  Melissa  Stone,  John  Bryson  y  Barbara  Crosby    (2015) plantean que el rol de los ciudadanos en contextos de gobernanza   inteligente  en  los  territorios  está  caracterizado  por  i)  ciudadanos  como    participantes  democráticos  que  pueden  expresar  y  aplicar  sus  puntos  de    vista  de  manera  amistosa,  ii)  ciudadanos  como   co-creadores   capaces  de    innovar y iii) ciudadanos como usuarios de tecnologías de la información y   la comunicación que se convierten en «consumidores» de iniciativas. Como   se  evidencia  en  estos  planteamientos,  pareciera  que  el  rol  del  ciudadano    puede  ser  el  de  receptor,  pero  también  el  de   co-creador   activo  en  el    diseño  de  políticas  y  proyectos  de  desarrollo.  Estos  roles  son  coherentes    con las nuevas demandas de la gobernanza, las cuales se sitúan en modos   de  gobernanza  sociotécnica  (Jiang,  Geertman  y  Witte,  2022)  y  holística,    las  cuales  destacan  el  papel  del  conocimiento  de  las  personas  sobre  los    problemas sociales y las eventuales formas de solución.  La  gobernanza  inteligente  se  entiende  por  la  maximización  de  las    relaciones  y  procesos  público-institucionales  caracterizados  y  asociados    a  asuntos  de  aprendizaje,  conocimiento  e  información,  mediado  por    la  cooperación.  En  esto  último,  el  ciudadano  aparece  como  un  actor    estratégico,  a  partir  de  un  enfoque  de   co-responsabilidad   y  colaboración,    en la ejecución de la agenda pública de desarrollo. El ciudadano no sólo es   la finalidad de toda operación, bienes y servicios que procuran y realizan   las organizaciones públicas y el Estado, sino aquel que  co-diseña  agendas   públicas de intervención e interactúa con el cómo y en el para qué lograr   los objetivos estratégicos de estas. En la gobernanza inteligente los servicios   y las políticas públicas no son un asunto gubernamental únicamente, sino   que  la  asociación,  la  coordinación  y  la  capacidad  de  decisión  conjunta    entre  los  actores  públicos,  privados,  económicos,  sociales  y  comunitarios    pasa  a  ser  una  necesidad  actual.  Desde  luego,  el  ciudadano  está  inmerso    en una correlación de intereses que requieren de un gobierno catalizador   (Osborne y Gaebler, 1992; 2002) o también denominado orquestador. \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 177 Medellín, mayo-agosto de 2025: pp. 166-193  Así, el ciudadano desde la gobernanza inteligente se entiende por actor   relevante, gestor y promotor de una participación ciudadana vinculante, es   decir, una participación que está más allá de la democracia representativa,   sino más bien colaborativa. Un ciudadano resolutivo que colabora con otros   actores  público-privados  y  emplea  la  tecnología  para  debatir  y  proponer    alternativas y acciones alrededor de necesidades y problemáticas.  3.3  Innovación pública y el rol ciudadano  En  la  actualidad,  el  sector  público  enfrenta  mayores  demandas  de    servicios nuevos o mejores, soluciones más rentables y formas alternativas   de interactuar con sus ciudadanos (Walker, 2006). La innovación ha venido   tomando  relevancia,  al  punto  de  reconocerla  como  la  piedra  angular  del    desarrollo  futuro  de  cualquier  nación,  por  lo  cual  muchos  gobiernos  de    todo el mundo comenzaron a crear las estrategias, desarrollar marcos para   la innovación y vincularla a su agenda de desarrollo (De Vries, Bekkers y   Tummers, 2016).  El CLAD (8 de octubre de 2020) plantea que «la década 2020-2030   va  a  ser  crucial  ya  que  todos  los  países  del  mundo  se  enfrentarán  a  unos    retos  extraordinarios  que  van  a  requerir  instituciones  públicas  renovadas    e  innovadoras,  eficaces  y  útiles»  (p.  4).  Por  su  parte,  Carter  Bloch  (2011)    sostiene  que  las  innovaciones  del  sector  público  comprenden  cambios    nuevos  o  significativos  en  los  servicios  y  bienes,  las  operaciones,  los    métodos  organizativos  o  la  forma  en  que  su  organización  se  comunica    con  los  usuarios.  La  innovación  ayuda  a  establecer  las  condiciones  para    implementar políticas públicas y reformas estructurales, mejora los procesos   de  trabajo  interno  y  los  sistemas  de  gestión,  y  la  prestación  de  servicios    públicos (Ali  et al.,  2021).  La innovación en el sector público reconoce al ciudadano como un   actor relevante con quien es posible  co-crear  ideas que apunten a solucionar   problemáticas públicas. La participación de los ciudadanos en el ciclo de   políticas  públicas  está  relacionada  con  la  naturaleza  de  la  innovación  en    la que los usuarios son  co-productores  y sus experiencias y conocimientos   influyen en su satisfacción (Gomes de Sousa  et al.,  2019). En este sentido,   la  interacción  entre  múltiples  actores,  dentro  de  los  que  se  destaca  el    ciudadano,  es  una  característica  intrínseca  de  la  innovación  en  el  sector    público,  representando  un  proceso  no  sólo  estimulante,  sino  necesario   \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 178 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  para  el  proceso  innovador  (Lewis,  Ricard  y  Klijn,  2018).  Dentro  de  las    tipologías de innovación propuestos por Hanna de Vries, Victor Bekkers y   Lars Tummers (2016) se tiene aquella relacionada con la innovación en la   gobernanza, lo cual implicaría que en el sector público se adoptan nuevas   formas de organización, interacción y articulación entre actores, punto en el   cual el ciudadano tendría un rol protagónico. En resumen, los procesos de   innovación en el sector público consideran la apertura en los procesos de   discusión para que los ciudadanos puedan aportar desde su conocimiento   y experiencia en el diseño, puesta en marcha y seguimiento de iniciativas.  3.4  Gobierno abierto y el rol ciudadano  Por  otra  parte,  el  concepto  de  gobierno  abierto  en  general  no  es    nuevo e históricamente se ha utilizado en diversos contextos, incluidas la   libertad  de  información,  la  lucha  contra  la  corrupción  y  la  transparencia    (Nam,  2012).  Albert  Meijer,  Deirdre  Curtin  y  Maarten  Hillebrandt  (2012)    ven  el  gobierno  abierto  como  la  medida  en  que  los  ciudadanos  pueden    monitorear  e  influir  en  los  procesos  a  través  del  acceso  a  la  información    pública  y  a  las  áreas  de  toma  de  decisiones.  Por  su  parte,  Bernd  Wirtz  y    Steven Birkmeyer (2015) plantean que es un proceso multilateral, político   y social que incluye, en particular, acciones transparentes, colaborativas y   participativas por parte del gobierno. Comparando algunas características,   Karin  Hansson,  Kheira  Belkacem  y  Love  Ekenberg  (2015)  sostienen    que  el  gobierno  abierto  promueve  la  transparencia,  la  participación  y  la    colaboración  para  reinventar  el  gobierno  e  involucrar  a  los  ciudadanos    en el proceso de toma de decisiones. Para cumplir con estas condiciones,   los  ciudadanos  y  los  grupos  sociales  deben  integrarse  en  los  procesos    políticos  con  el  apoyo  de  modernas  tecnologías  de  la  información  y  la    comunicación (Hansson, Belkacem y Ekenberg, 2015; Wirtz y Birkmeyer,   2015) que en conjunto deberían mejorar la eficacia y eficiencia de la acción   gubernamental y administrativa (Wirtz y Birkmeyer, 2015).  La transparencia es el pilar más destacado del gobierno abierto y la   mayoría de los artículos se centran en este aspecto, además de resaltar la   participación  como  una  parte  esencial  (Wirtz  y  Birkmeyer,  2015).  Por  su    parte, Teresa Harrison  et al.  (2011) la entienden a partir de involucrar a los   ciudadanos en la toma de decisiones sobre sus asuntos cívicos a través de   la discusión y la deliberación. Por último, se tiene a la colaboración, donde   el público debe trabajar junto con el gobierno para crear soluciones nuevas  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 179 Medellín, mayo-agosto de 2025: pp. 166-193  e  innovadoras  para  los  problemas  que  enfrentan  el  Estado  y  la  sociedad    (Deckert, Stern y Sack, 2011).  3.5  Transición del rol ciudadano  Es de resaltar que el rol del ciudadano en la nueva y posnueva gestión   pública. Tal como lo indica el  cuadro 2 , es configurado a partir de un deber   ser que relaciona necesidades, responsabilidades, capacidades, voluntad y   desempeño cuando de gestión de intereses se trata. El rol del ciudadano se   instala entre la opinión pública, el diálogo y la participación en el espacio   político-público. Por su parte, para el paradigma de la NGP, en especial y   con un mayor énfasis en la P-NGP, el rol del ciudadano está entre el poder   administrativo, la racionalización de las acciones ligadas a la Constitución   y  a  la  Ley,  y  en  un  entramado  de  actuaciones  sociales  calculadas  y    mediadas por intereses colectivos, generación de bienes públicos y asumir   responsabilidades compartidas.  Cuadro 2.  El rol del ciudadano.  Paradigma   Enfoque-característica   ¿Cómo es el rol del ciudadano?  Nueva gestión   pública  Enfoque en la eficacia,   eficiencia y efectividad  Espera un servicio a bajo costo que maximice   su beneficio  Fortalecimiento de las   formas de control  Supervisa como veedor, frágiles mecanismos   de participación ciudadana, control al final  Prestación de servicios   públicos por privados  Cliente  Adopción de herramientas   del sector privado   (calidad, servicio al   cliente, entre otros)  Cliente  Posnueva   gestión   pública  Creación de valor público   Co-creador, co-diseñador , actor activo a través   de la colaboración  Innovación pública   Co-creador , innovador social,  co-  implementador, co-evaluador  Gobernanza inteligente   Co-diseñador . Actor relevante y central,   colaboración y participación ciudadana  Gobierno abierto   Actor activo que participa, controla y ejerce   veeduría constante apoyado en herramientas   tecnológicas, logra fortalecer la democracia,   aumentando así la transparencia y confianza  Fuente:  elaboración propia. \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 180 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  En  este  sentido,  el  rol  ciudadano  puede  tomar  diferentes  matices  y    un grado de involucramiento determinado. En los enfoques de la P-NGP se   puede notar que dicho rol trata de ser activo y propositivo, buscando que la   voz ciudadana sea escuchada y tenida en cuenta para la toma de decisiones.   Para el caso de la NGP, no es que el rol ciudadano no sea relevante, pero   sí  es  posible  notar  que,  por  lo  menos  desde  el  discurso,  tenga  un  grado    de protagonismo menor, en tanto las directrices tienden a ser emitidas por   un gobierno que trata de operar como si fuera una empresa privada, en su   lógica de Estado gerencial. Incluso los enfoques que trajo consigo la NGP,   tales como a la gestión de calidad, la gestión para resultados, la eficiencia,   entre  otros,  pasan  a  considerar  al  ciudadano  como  un  cliente,  al  cual  se    le  puede  preguntar  qué  y  cómo  desea  su  servicio,  y  el  gobierno  con  esta    información pasa a diseñar las que considera son las soluciones más acordes   a las problemáticas públicas.  En  este  contexto,  la  participación  se  puede  limitar  a  acciones    simplemente  de  socialización,  comunicación  de  avances  y  casi  que  de    legitimación que adoptan los gobernantes para dejar un manto de amplia   participación.  Sin  embargo,  raramente  un  ciudadano  puede  incidir  en  las    decisiones  de  qué  hacer  o  no  en  términos  de  las  agendas  de  desarrollo.    Estas  formas  de  interacción  se  acercan  a  los  conceptos  de  planeación    participativa,  donde  un  gerente  público  presenta  un  derrotero  de  ideas    (Pardo    et  al.,   2021)  sobre  una  agenda  de  desarrollo,  las  socializa,  busca    algunas  ideas  generales  en  los  ciudadanos,  pero  en  sí  la  esencia  pocas    veces se modifica. Terminan siendo agendas que se ofrecen a demanda o   con  enfoques  de  arriba  hacia  abajo  (Andrews,  2019;  Papi,  Bigoni,  Bracci    y  Deidda,  2018;  Neumann   et  al.,   2019).  Se  puede  afirmar  que  el  rol  del    ciudadano, por lo menos conceptualmente, pasa a ser un factor clave para   la definición de las agendas de desarrollo y, en últimas, se puede suponer   que terminan incidiendo en las decisiones que se toman.  Por su parte, en el discurso de los enfoques de la P-NGP revisados para   este artículo el ciudadano empieza a ser considerado como actor clave, no   sólo en espacios de diseño de proyectos y políticas públicas, sino que pasa   a  ser  un  actor  que  acompaña  el  desarrollo  e  implementación  de  estas,  así    como también un evaluador de los resultados. De este modo, se presenta una   innovación pública que se instala en generar valor y espacios de cohesión   para  que  mediante  de  métodos  y  dispositivos  se  formen  y  se  transformen    bienes, servicios y operaciones públicas, razón por la cual el ciudadano es  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 181 Medellín, mayo-agosto de 2025: pp. 166-193  quien  tiene  la  iniciativa  de  generar  propuestas  (Meijer  y  Thaens,  2021)  y    ponerlas en marcha cuando de transformar realidades se trate.  Hay  un  cambio  de  procesos,  liderazgos  y  acciones,  tanto  de  las    organizaciones  públicas  como  de  las  organizaciones  sociales,  puesto  que    lo que permite la articulación es la  co-creacción  (Torfing, 2019) de políticas   y  decisiones  en  materia  de  operaciones,  bienes  y  servicios.  El  ciudadano    es  un  actor  de  innovación  social  (Maestre,  Páez,  Lombana  y  Vega,  2021)    que  tiene  como  valores  y  compromiso  no  sólo  los  democráticos,  sino  de    liderazgo, por cambiar su realidad a través de un flujo colaborativo en red.   Desde luego, la organización pública y el Estado asegura el conocimiento,   el  aprendizaje  y  la  cooperación  desde  enfoque   open  collaboration    (Mariñez, 2015; Criado  et al.,  2021) en el que el ciudadano incide de forma   propositiva en el escenario público. El ciudadano en la innovación pública   es    co-autor    de  la  transformación  política-social  en  el  que  las  relaciones    gobierno-ciudadano no se dan de arriba hacia abajo — top-down —, sino de   manera sistemática y mediante tecnologías y acciones mejoradas (Sørensen   y Vabo, 2020; Christensen y Fan, 2018; Sørensen y Torfing 2011; Viezzer-  Baretta,  Gaia-Hoffmann,  Militao  y  Silva-Farias,  2024;  De  Vries,  Bekkers  y    Tummers, 2016).  3.6  Modos de interacción  Los  modos  de  interacción  hacen  referencia  a  aquellas  formas    mediante las cuales los actores pueden relacionarse, en términos formales,   para  enfrentar  una  problemática  pública.  Los  modos  de  interacción    son  claves  para  el  diseño  colaborativo  de  soluciones  a  problemáticas    multidimensionales  del  contexto  (Dameri  y  Benevolo,  2016).  Los  modos    de interacción comunes a los enfoques analizados en el marco de la NGP   y la P-NGP son la participación y la colaboración. Esos conceptos no son   nuevos en el campo de la administración pública, sin embargo, parece que,   a  la  luz  de  los  enfoques  actuales,  tienen  total  relevancia  como  formas  a    través  de  las  cuales  es  posible  diseñar,  implementar  y  poner  en  marcha    iniciativas para el desarrollo y la creación de valor público.  La participación puede estar relacionada con la participación directa   y dar opiniones para la toma de decisiones. La colaboración se refiere a la   participación de personas con ciertos conocimientos y habilidades que están   dispuestas a ayudar al gobierno con tareas específicas (Gil-García, Gasco- \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 182 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  Hernández  y  Pardo,  2023).  Ambos  conceptos,  en  articulación  con  otros    enfoques como la adopción de tecnologías emergentes, son la base de los   nuevos modos de gobernanza para la toma de decisiones (Pereira, Parycek,   Falco y Kleinhans, 2018). Los modos de interacción buscan aprovechar el   conocimiento social de los ciudadanos, esto permitiría un acercamiento a   las  problemáticas  y,  por  ende,  el  diseño  de  iniciativas  de  desarrollo  más    acordes con las problemáticas contextuales.  3.7  Gobernanza combinada  Hablar de gobernanza combinada es hablar de que en el ejercicio   diario  de  la  administración  pública  es  posible  identificar  diferentes    modos  de  gobernanza,  los  cuales  se  combinan  para  dar  respuesta  a  las    problemáticas  públicas.  En  la  literatura  se  han  identificado  diferentes    modos  de  gobernanza,  entre  los  que  se  destacan  el   managerial ,  el    participativo  y  el  colaborativo  (Pierre,  1999).  Cada  uno  de  estos  modos    conciben de diferente forma el rol ciudadano. Sin embargo, es importante   mencionar  que  los  modos  de  gobernanza  son  simultáneos  y  coexisten,    dependiendo, entre otros aspectos, del tipo de problema u oportunidad,   el estilo de liderazgo y a la influencia política (DiGaetano y Strom, 2003).  En  los  diferentes  modos  de  gobernanza  es  posible  que  el  rol  del    ciudadano  tome  diferentes  matices  dependiendo  de  la  problemática    que  se  quiera  abordar.  En  esta  combinación  de  modos  de  gobernanza    es  posible  que  algunas  decisiones  se  tomen  de  arriba  hacia  abajo,  por    ejemplo,  cuando  se  trata  de  implementar  proyectos  tecnológicos  o  de    infraestructura.  En  este  tipo  de  iniciativas  públicas  el  criterio  técnico  se    impone y el gobierno hace uso de todos sus instrumentos, metodologías y   técnicas para llevarlas a cabo. Estas iniciativas puede que tengan una débil   interacción  con  el  ciudadano  del  común,  sin  embargo,  estos  se  podrían    organizar y a través de figuras formales, como veedurías, y realizar algún   tipo de acción que implique participación.  Así  también,  es  posible  evidenciar  ejercicios  donde  los  flujos  de    información y la toma de decisiones se dan de abajo hacia arriba, llevando   a  que  el  rol  ciudadano  sea  central.  Un  ejemplo  de  esto  puede  ser  la    estrategia de presupuesto participativo, donde la ciudadanía tiene la opción   de  participar  con  sus  ideas  para  que  al  final  se  configure  una  agenda  de    desarrollo específica y un poco más ajustada a la visión de la población y no  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 183 Medellín, mayo-agosto de 2025: pp. 166-193  tanto de lo que el gobierno considera pertinente para impulsar la creación   de valor público.  4.  Discusión  Las  variaciones  en  la  comprensión  del  rol  del  ciudadano  desde  la    NGP hacia la P-NGP están en transición, tratando de combinar elementos   tradicionales como los modos de interacción con las tecnologías emergentes   en  el  marco  de  los  nuevos  enfoques  de  administración  pública.  Para  la    comprensión del rol del ciudadano en la P-NGP es necesario considerar el   concepto  de  gobernanza  como  modelo  participativo  territorial  y  político    que  tiene  matices  que  van  desde  conservar  el  control  y  la  prestación  de    bienes  y  servicios  por  parte  de  la  institucionalidad  hasta  acudir  a  redes    organizacionales decisionales alrededor de la implementación de acciones   de política.  La  comprensión  del  rol  está  en  tensión  porque  deben  superarse    las  jerarquías  que  hay  en  la  administración  pública  para  alcanzar  los    objetivos, generar confianza y aprovechar las capacidades del ciudadano   para  enfrentar  de  mejor  forma  las  problemáticas  públicas.  El  rol  del    ciudadano  está  en  tensión  debido  a  que  desde  la  NGP  la  discusión  se    centra, principalmente, en lo organizacional, el uso efectivo de recursos,   el ciudadano como cliente. Por su parte en la P-NGP parece que importa   más  una  relación  armoniosa  entre  la  inteligencia  colectiva  que  se    puede  explotar  a  través  de  los  modos  de  interacción  y  a  la  inteligencia    tecnológica, donde lo que se busca es no perder de vista el sentido social   de  la  administración  pública,  más  allá  de  un  conjunto  de  técnicas  que    se  deben  optimizar.  No  cabe  duda  de  que  hablar  de  un  cambio  real  en    la  práctica  del  gobierno  y  de  la  administración  pública  a  partir  de  la    incidencia del rol del ciudadano en la NGP y la P-NGP parte de un asunto   discursivo  que  aún  está  en  la  correlación  de  intereses,  tanto  de  quienes    operan las acciones públicas, los políticos y la misma ciudadanía, puesto   que  la  racionalización  de  las  decisiones  públicas  están  en  transición    al  situarse  en  la  participación  pública  de  actores,  la  colaboración  y  la    asociación  para  el   co-diseño ,  la   co-implementación ,  la  colaboración,    la    co-responsabilidad   y  la   co-evaluación   de  iniciativas  en  el  marco  de    enfoques como la innovación social. En este sentido, se destaca que los   modos  de  interacción,  tal  como  lo  denominan  Robert  Ruhlandt  (2018)    y  Renata  Dameri  y  Clara  Benevolo  (2016),  están  en  la  colaboración,  la   \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 184 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  participación ciudadana y la asociación pasan a tener un rol protagónico   en los enfoques que se han venido gestando alrededor de la P-NGP.  De  modo  que  los  tres  momentos  anteriormente  mencionados    —i)  transición  del  rol  ciudadano,  ii)  retorno  a  los  modos  de  interacción    y  iii)  gobernanza  combinada—  han  fortalecido  el  gobierno  abierto.  Un    movimiento  de  gobierno  abierto  más  reciente  surgió  de  la  adopción  del    gobierno electrónico a mediados de la década de 1990 (Steele, Murnane y   Willett, 2010). En particular, la expansión de Internet a finales de la década de   1990 cambió dramáticamente la administración pública y el gobierno (Wirtz   y Birkmeyer, 2015). Hay una gran cantidad de herramientas que respaldan   un gobierno más colaborativo, de datos abiertos (Attard, Orlandi, Scerri y   Auer,  2015),  participativo  y  transparente,  y  parece  que,  en  combinación    con un respaldo de datos adecuado, con potencial para un mayor uso en la   deliberación informada y en la toma de decisiones participativa. El concepto   de  gobierno  abierto  ha  sido  cada  vez  más  importante  para  dar  cabida  a    estas  ambiciones,  permitiendo  al  mismo  tiempo  un  sector  público  más    innovador  y  colaborativo  y,  por  tanto,  de  uso  de  tecnologías  (Gil-García,    Gasco-Hernández  y  Pardo,  2023),  facilitando  sistemas  democráticos  más    deliberativos y participativos (Hansson, Belkacem y Ekenberg, 2015).  En  este  contexto,  el  ciudadano  se  configura  como  actor  activo  que    participa,  controla  y  ejerce  veeduría  constante,  apoyado  en  herramientas    tecnológicas  y  de  la  información  para  fortalecer  la  democracia  y  así    fortalecer la transparencia y la rendición de cuentas sobre las actuaciones   públicas-institucionales. Por tanto, el ciudadano no es visto como un grupo   homogéneo,  sin  necesidades  ni  intereses  políticos  diversos  (Hansson,    Belkacem  y  Ekenberg,  2015),  por  el  contrario,  demanda  y  tiene  acceso    a  datos  que  las  organizaciones  públicas  deben  proporcionar  y  sobre  los    cuales realiza deliberaciones y aportes propositivos a la gestión pública.  Por ende, el rol del ciudadano se enfoca con fuerza en el gobierno   abierto,  es  decir,  puede  verse,  entre  otras  cosas,  como  una  forma  de    fortalecer la democracia a través de una mayor transparencia, participación   y  colaboración  (Hansson,  Belkacem  y  Ekenberg,  2015).  El  enfoque  de    gobierno abierto ha sido una significativa plataforma de transformación del   sector público, convirtiéndose en eje fundamental de una transición hacia un   modelo de gobernanza colaborativa, sostenible e inteligente de los asuntos   públicos  (Gao,  Janssen  y  Zhang,  2023;  Wirtz,  Becker  y  Weyerer,  2023;    Ramírez-Alujas, 2023). Así, el ciudadano no es un receptor de información,  \nEl rol ciudadano en la nueva y posnueva gestión pública...  [        ] 185 Medellín, mayo-agosto de 2025: pp. 166-193  sino  que  está  llamado  a  organizar  y  formar  grupos  cohesionados  para    deliberar  y  expresar  argumentos  (García,  2014)  y  propuestas  a  fin  de    fortalecer la gestión pública.  Conclusiones  El  abordaje  del  rol  del  ciudadano  en  la  nueva  gestión  pública  y  en    la  posnueva  gestión  pública  contribuye  a  los  estudios  políticos  al  discutir    alrededor del ejercicio del gobierno, la capacidad de control y la conducción   de las decisiones públicas que estos pueden llegar a ostentar, las cuales se   afianzan en la discusión y propuestas que presentan los conceptos como el   gobierno abierto, la innovación pública, las gobernanzas inteligentes, entre   otros, puesto que tienen una amplia acogida debido a que estos requieren de   un involucramiento amplio, multiactor y multinivel. De hecho, los grupos de   interés que hacen parte de la gobernanza pasan a tener aportes propositivos.   No  obstante,  rol  del  ciudadano  en  la  NGP  y  de  la  P-NGP  apertura,  en    un  sentido  discursivo  y  posiblemente  práctico,  la  transformación  de  las    operaciones,  bienes  y  servicios  que  garantiza  la  administración  pública    mediante las organizaciones públicas y el Estado en general.  Desde  el  punto  de  vista  teórico,  parece  que  los  paradigmas  pasan    y  a  su  vez  llegan  otros  que  se  instauran  con  sus  discursos  y  de  manera    progresiva,  con  acciones  concretas  que,  en  primera  instancia,  pueden  ser    reglas de juego, para luego apalancar el desarrollo de políticas y proyectos   específicos desde la gestión pública. Sin embargo, es necesario que se tenga   en  cuenta  que  en  la  actual  forma  de  gestión  pública  pueden  converger    diferentes paradigmas. Cabe la posibilidad de que en la práctica los modos   de  gobernanza  urbana  se  superponen  y  coexisten  dentro  de  un  mismo    arreglo, dependiendo de la capacidad de las agencias locales para promover   debates e involucrar a los actores locales (Przeybilovicz  et al.,  2022).  Así,  por  ejemplo,  en  un  territorio  específico  se  puede  llegar  a  tomar    diferentes decisiones sobre el desarrollo integral de este, las cuales pueden   provenir  por  la  vía  de  una  amplia  o  media  participación  de  actores;  pero    así  también  existen  otras  tantas  que  se  toman  de  forma  unilateral  o  con  la    participación  limitada  de  actores.  Es  por  lo  que  se  podría  concluir  que  no    existen paradigmas instaurados en su totalidad, sino más bien que las formas   de gestión pública son el resultado de una mezcla de paradigmas que muchas   veces pueden tener posturas encontradas, siendo necesario que los gobiernos   de turno las analicen para garantizar una adecuada gestión pública. \nDiego Armando Jurado-Zambrano, Gleidy Alexandra Urrego Estrada  [        ] 186 Estudios Políticos, 73, ISSN 0121-5167  •  eISSN 2462-8433  Sería  interesante  que  futuros  estudios  traten  de  contrastar  los    postulados  teóricos  discutidos  en  este  artículo  con  la  práctica,  esto  para    determinar  empíricamente  cómo  se  desarrolla  el  rol  del  ciudadano  en  el    contexto de la gestión pública actual.  Referencias bibliográficas  1. Alford, John & O’Flynn, Janine. (2009). Making Sense of Public Value: Concepts,   Critiques and Emergent Meanings.  International Journal of Public Administration , 32   (3-4), pp. 171–191.  https://doi.org/10.1080/01900690902732731  2. Ali, Amanat; Iqbal, Shadid; Haider, Syed Arslan; Tehseen, Shehnaz; Anwar,   Bilal;  Sohail,  Mariam  &  Rehman,  Khalid.  (2021).  Does  Governance  in  Information    Technology Matter When It Comes to Organizational Performance in Pakistani Public   Sector Organizations?  Mediating Effect of Innovation.  SAGE Open , 11 (2).  https://doi.  org/10.1177/21582440211016557  3.  Andrews,  Leighton.  (2019).  Public  Administration,  Public  Leadership  and    the Construction of Public Value in the Age of the Algorithm and ‘Big Data’.  Public   Administration , 97 (2), pp. 296–310.  https://doi.org/10.1111/padm.12534  4.  Attard,  Judie;  Orlandi,  Fabrizio;  Scerri,  Simon  &  Auer,  Sören.  (2015).  A    Systematic Review of Open Government Data Initiatives.  Government Information   Quarterly , 32 (4), pp. 399-418.  https://doi.org/10.1016/j.giq.2015.07.006  5.  Barzelay,  Michael.  (2003).  The  New  Public  Management:  a  bibliographical    essay  for  Latin  American  (and  other)  scholars.   International  Public  Management    Journal , 3 (2), pp. 229-265.  https://doi.org/10.1016/S1096-7494(00)00038-6  6. Bloch, Carter. (2011).  Measuring Public Innovation in the Nordic Countries   (MEPIN).   Nordic  Innovation  Centre.   http://www.diva-portal.org/smash/get/  diva2:707193/FULLTEXT01.pdf  7. Boyne, George. (2002). Public and Private Management: What’s the Difference?   Journal  of  Management  Studies ,  39  (1),  pp.  97-122.   https://doi.org/10.1111/146         const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {
        const base = palette || {
            primaryColor: '#2563eb',
            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',
            inputBorderColor: '#cbd5e1',
            chatBubbleBotBg: '#f3f4f6',
            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {
        if (!palette) return;
        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');
        target.style.setProperty('--bg', palette.bgColor || '#f8f9fa');
        target.style.setProperty('--text', palette.textColor || '#343a40');
        target.style.setProperty('--card', palette.cardBgColor || '#ffffff');
        target.style.setProperty('--border', palette.cardBorderColor || '#dddddd');
        target.style.setProperty('--input', palette.inputBgColor || '#ffffff');
        target.style.setProperty('--iborder', palette.inputBorderColor || '#cccccc');
        target.style.setProperty('--bot-bg', palette.chatBubbleBotBg || '#e9ecef');
        target.style.setProperty('--bot-text', palette.chatBubbleBotText || '#343a40');
        target.style.setProperty('--user-bg', palette.chatBubbleUserBg || '#007bff');
        target.style.setProperty('--user-text', palette.chatBubbleUserText || '#ffffff');
        target.style.setProperty('--sys-bg', palette.systemMessageBg || '#fff3cd');
        target.style.setProperty('--sys-text', palette.systemMessageText || '#856404');
    }
    function applyPalette(palette) {
        currentPalette = palette;
        applyTheme(currentTheme);
        localStorage.setItem('downloaded-palette', JSON.stringify(palette));
    }
    function applyTheme(t) {
        currentTheme = t;
        document.body.classList.toggle('dark-mode', t === 'dark');
        themeBtn.textContent = t === 'dark' ? '☀️ Tema' : '🌙 Tema';
        const effectivePalette = buildThemePalette(t, currentPalette);
        setPaletteVariables(document.body, effectivePalette);
        setPaletteVariables(document.documentElement, effectivePalette);
        document.body.style.backgroundColor = effectivePalette.bgColor;
        document.body.style.color = effectivePalette.textColor;
        localStorage.setItem('theme', t);
    }
    themeBtn.addEventListener('click', () => { const n = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(n); });
    paletteBtn.addEventListener('click', () => { applyPalette(generatePalette()); });
    const savedPalette = JSON.parse(localStorage.getItem('downloaded-palette') || 'null');
    if (savedPalette) { applyPalette(savedPalette); }
    else if (INITIAL_PALETTE) { applyPalette(INITIAL_PALETTE); }
    else { applyPalette(generatePalette()); }
    applyTheme(currentTheme);

    // Second PDF (embedded or user-loaded)
    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }
