ásico: la  posibilidad de cambiar el sistema de reglas por régimen de ma- yoría.  Naturalmente habría mecanismos ordenadores del fun- cionamiento de las  reglas,  pero todo con un gusto  decidida- mente democrático. En una sociedad como la nuestra, de tan  robusta tradición autoritaria, es de vital importancia encontrar  caminos democráticos para el establecimiento de límites para  la libertad y la autoridad con los que evitemos la licencia que  nos  lleva  hasta  el  \"dejemos  todo  como  está  para  ver  cómo  queda\", o  al autoritarismo todopoderoso.  La  cuestión de la so- ciabilidad, de la imaginación, de los  sentimientos, de los  de- seos, del miedo, del valor, del amor, del odio, de la pura rabia,  de la sexualidad, del conocimiento nos conduce a la necesidad  de hacer una \"lectura\" del cuerpo como si  fuese  un texto, en  las interrelaciones que componen su todo.  Lectura  del  cuerpo  con  los  educandos,  interdisciplinaria- mente, rompiendo dicotomías, rupturas inviables y defonnantes.  >1<  Literatura \"de cordel\", en Brasil, es la literatura popular que se vende  en los puestos callejeros.    [T.)  \nQUINTA CARTA  95  Mi  presencia  en  el mundo,  con  el mundo y  con  los otros implica  mi conocimiento entero de mí mismo. Y cuanto mejor me co- nozca en esta entereza, tanto mayores posibilidades tendré, ha- ciendo  historia,  de  sabenne  rehecho  por  ella.  Y  porque  ha- ciendo historia y siendo hecho por ella, corno ser  en    el mundo y   con    el mundo, la \"lectura\" de mi cuerpo corno la de cualquier  otro ser humano implica la lectura del espacio.   l    En este sentido,  el  espacio    de la clase, que alberga los miedos, los recelos, las ilu- siones, los deseos y los sueños de las maestras y de los educandos,  debe  constituirse  en objeto  de  \"lectura\"  de  aquélla y  de  éstos,  corno enfatiza Madalena Freire Weffort.2  Un espacio de la clase  que se extiende al  del recreo, al de las inmediaciones de la escuela,  al de toda la escuela.  Queda claro el absurdo del autoritarismo cuando concibe y  detennina que todos esos espacios escolares pertenecen por de- recho a las autoridades escolares, a los educadores y educadoras,  y  no  sólo  porque  son  gente  adulta,  pues  también  son  gente  adulta las  cocineras, los  cuidadores,  los  agentes de seguridad,  que no son más que simples  servidcms  de esos espacios que no les  pertenecen, corno no les pertenecen a los educandos. Es corno si  los educandos estuviesen apenas  en  ellos  y no  con  ellos.   Es  preciso que la escuela progresista, democrática, alegre, ca- paz,  repiense toda esta cuestión de las relaciones entre el  cuerpo consciente  y  el    mundo.    Que revea la cuestión de la comprensión  del  mundo,    en cuanto es oroducida históricamente en  el  mundo  mismo, pero también por los  cuerpos  conscientes  en sus interaccio- nes con él.  Creo q'le de esta comprensión resultará una nueva  manera de entender lo que es  enseñar, lo que es  aprender, lo  que es conocer, de la que Vygotsky no puede estar ausente.  1 Merleau Ponty,    Fenomenología  dR    la  percepciim,    México, Fondo de Cultura  Económica, 1957.  2 Madalena Freire Weffort, en plática con el  autor.  \n\nSexta carta   DE LAS RELACIONES  ENTRE LA EDUCADORA  Y LOS  EDUCANDOS   A continuación paso a centrarme en el análisis de las  re- laciones entre la educadora y  los  educandos.  Éstas  incluyen  la  cuestión de la enseñanza, del aprendizaje, del proceso de cono- cer-enseñar-aprender, de la autoridad, de la  libertad, de la lec- tura, de la escritura, de las virtudes de la educadora, de la identi- dad cultural de  los  educandos y  del debido respeto  hacia ella.  Todas estas cuestiones están incluidas en las  relaciones entre la  educadora y los educandos.  Considero el    testimonio  como un \"discurso\" coherente y perma- nente de la educadora progresista. Intentaré pensar el  testimonio   como la mejor manera de llamar la atención del educando hacia  la validez de lo que se  propone, hacia el acierto de lo que se va- lora, hacia la firmeza en  la  lucha, en la búsqueda de la superación de  las dificultades.  La  práctica educativa en la que no existe una rela- ción coherente entre lo que la maestra dice y lo que la maestra hace  es un desastre como tal.  ¿Qué es  10  que se puede esperar, para la formación de los educan- dos,  de una maestra que protesta contra las  restricciones de su liber- tad por parte de la dirección de la escuela, pero  al  mismo tiempo cer- cena injuriosamente la libertad de los educandos? Felizmente, en el  plano humano ninguna explicación mecanicista es capaz de diluci- dar nada. No se  puede afirmar que los educandos de  tal  educadora  necesariamente se vuelvan apáticos o vivan en permanente rebelión.  \n98  CARTAS A  QUIEN  PRETENDE ENSEÑAR  Pero sería mucho mejor para ellos que no se les impusiera seme- jante diferencia entre lo que se dice y lo que se hace.  Entre el  testimonio de deciry  el  de hacer,    el más fuerte es el de hacer,  porque tiene o  puede tener efectos inmediatos. Sin embargo, lo  peor para la fonnación del educando es que frente a  la  contradic- ción entre hacer y decir tiende a no creer lo que la educadora dice.  Si  hoy ella afinna algo, él espera la próxima acción para detectar la  próxima contradicción. Yeso corroe el perfil que la educadora va  creando de sí misma y revelando a los alumnos.  Los niños tienen una sensibilidad enonne para percibir que la  maestra hace exactamente lo opuesto de lo que dice. El \"haz lo  que digo y no lo que hago\" es un intento casi vano de reparar la  contradicción y la incoherencia. \"Casi vano\", porque no siempre  lo que se dice y que se contradice con lo que se hace se anula por  completo. A veces lo que se dice tiene en sí mismo una fuerza tal  que lo defiende de la hipocresía de quien aun diciéndolo hace lo  contrario. Pero precisamente por estar siendo dicho y no vivido  pierde mucho de su fuerza. Quien ve la incoherencia en proceso,  bien  puede decirse  a  sí  mismo:  \"Si  esta cosa que se  proclama  pero al mismo tiempo se niega tan fuertemente en la práctica  fuese realmente buena, no sería sólo  dicha  sino  vivida\".   Una de las cosas más negativas en todo esto es el deterioro de  la relación entre la educadora y los educandos.  ¿Y qué decir de la maestra que constantemente testifica debili- dad, vacilación,  inseguridad en sus  relaciones con los  educan- dos, que jamás se asume como autoridad en la clase?  Me recuerdo adolescente, y pienso en lo mal que me hacía pre- senciar la falta de respeto por sí mismo que uno de nuestros pro- fesores revelaba al ser objeto de burlas de gran parte de los alum- nos sin mostrar la menor capacidad para imponer orden. Su clase  era la segunda de la mañana y él entraba ya vencido en el salón,  donde la maldad de algunos adolescentes lo esperaba para fusti- garlo, para maltratarlo. Al  tenninar su remedo de clase, no podía  dar la espalda  al  grupo Y encaminarse hacia la puerta. La gritería  estrepitosa caería sobre él, pesada y áspera, y eso debía congelarlo.  \nSEXTA CARTA  99  Desde  el  rincón del salón donde yo me sentaba lo veía pálido, dis- minuido, retrocediendo hasta la puerta. Tras abrirla rápidamente,  desaparecía envuelto en su insoportable debilidad.  Guardo en mis  memorias de  adolescente  la figura  de aquel  hombre flaco,  indefenso, pálido, que cargaba consigo el miedo  de aquellos jóvenes que hacían de su debilidad unjuguete.Junto  al miedo de perder el empleo, el miedo generado por ellos.  Mientras presenciaba la ruina de su autoridad, yo, que soñaba  con convertirme en maestro, me prometía que jamás me entre- garía así a  la negación de mi  propio ser.  Ni el todopoderosismo  del maestro autoritario, arrogante, cuya palabra siempre es la úl- tima, ni la inseguridad y la completa falta de presencia y poder  que este profesor exhibía.  Otro testimonio que no debe faltar en nuestras relaciones con  los alumnos es el de la permanente disposición en favor de lajusti- cia, de la libertad, del derecho a ser.  Nuestra entrega a la defensa  de los más débiles sometidos a  la explotación por los más fuertes.  También es importante, en este empeño de todos los días, mostrar- les a los alumnos la belleza que existe en la lucha ética. Ética y es- tética se dan la mano. Que no se diga, sin embargo, que en las zo- nas de inmensa pobreza, de profundas necesidades, no es posible  hacer esas cosas.  Las  experiencias que vivió  personalmente durante  tres años la maestra Madalena F.  Weffort en una favela de San Pa- blo, donde ella se convirtió plenamente en educadora y pedagoga  más que en cualquier otro contexto, fueron vivencias  en las  que  esto fue posible. Ella prepara ahora un libro basado en sus expe- riencias en un ámbito carente de todo lo que nuestra apreciación  y  nuestro saber de clase  consideran indispensable,  pero rico  en  muchos otros elementos que ese mismo saber menosprecia. En él,  ciertamente contará y analizará la historia de Carlinha, de  la  que  ya   he hablado en un texto mío l    y que ahora reproduzco.  1 \"A1fabetizac;ao como elemento de formac;ao  da cidadania\", conferen- cia  pronunciada  en  Brasilia  en  una  reunión  patrocinada  por  la  UNESCO y el Ministerio de Educación de Brasil,  1987.  \n100  CARTAS A  QUIEN PRETENDE ENSEÑAR  \"Rondando la escuela, deambulando por las calles de la villa,  semidesnuda,  con mugre en la cara,  que escondía su  belleza,  blanco de las burlas de los otros niños y de los adultos también, va- gaba perdida y,  lo que era peor, perdida de sí misma, una especie  de niña de nadie.\"  Un día Madalena me dijo que la abuela de la niña la había  buscado para pedirle que recibiese a  la nieta en la escuela di- ciendo también que no podría pagar la cuota,  casi  simbólica,  establecida por la dirección popular de la escuela.  \"No creo que haya problema en relación con la cuota. Sin em- bargo, tengo una exigencia para poder aceptar a  Carlinha en la  escuela: que me llegue aquí limpia, bañada y con un mínimo de  ropa.  y    que venga así todos los días, y no sólo mañana\", le dijo  Madalena. La abuela aceptó y prometió que cumpliría. Al  día si- guiente  Carlinha llegó  a  la escuela completamente cambiada.  Limpia, cara bonita, facciones descubiertas, confiada.  La limpieza, la cara libre de marcas de mugre, resaltaba su pre- sencia en el salón.  Carlinha comenzó a  confiar en sí misma.  La  abuela comenzó a  creer no sólo en Carlinha sino en sí misma  también. Carlinha se descubrió, su abuela se redescubrió.  Una apreciación ingenua diría que la intervención de la edu- cadora había sido pequeño burguesa, elitista, en.yenada. Al  fin  y al cabo, ¿cómo exigirle a  una niña de la favela que viniese a  la  escuela bañada?  En realidad,  Madalena cumplió con su deber de educadora  progresista. Su intervención posibilitó a  la niña y a  su abuela la  conquista de un espacio, el de su dignidad en el respeto de los  otros. Mañana será más fácil para Carlinha reconocerse también  como miembro de toda una clase, la trabajadora, en la búsqueda  de mejores días.  Sin la intervención democrática del educador o de la educadora  no hay educación progresista.  Del mismo modo en que la maestra pudo intervenir en mate- ria de higiene corporal, materia que se  extiende a  su vez  a  la  be-  lleza del cuerpo y del mundo, de la que resultó el  descubrimiento  \nSEXTA CARTA  101   de Carlinha y el  redescubrimiento  de su abuela, no veo por qué no  se puede intervenir en los problemas a los que antes me refería.  Creo que la cuestión fundamental frente a la cual los educado- res y  las  educadoras debemos estar bastante lúcidos,  así como  cada vez  más competentes, es que nuestros educandos son uno  de los caminos de los que disponemos para ejercer nuestra inter- vención en la realidad a corto y largo plazo. En este sentido, y no  sólo en éste, sino también en otros sentidos, nuestras relaciones  con los educandos, a  la vez  que nos exigen respeto hacia ellos,  nos imponen igualmente el conocimiento de las condiciones con- cretas de su contexto, que los afectan. Tratar de conocer la realidad  en la que viven  nuestros alumnos es un deber que la práctica edu- cativa  nos impone:  sin  esto,  no tenemos acceso  a  su  modo de  pensar y dificilmente podremos, entonces, percibir lo que saben  y cómo lo saben.  Estoy convencido de que no existen temas o valores que no se  puedan hablar en tal o  cual área. Podemos hablar de todo y de  todo podemos dar testimonio. El lenguaje que utilizamos para  hablar de esto o  de aquello y la forma en que testificamos están,  sin embargo, atravesados por las condiciones sociales, culturales  e históricas del contexto en el que hablamos y damos testimonio.  Vale  decir que están condicionados por la cultura de clase,  por  la vida concreta de aquellos con quienes y a quienes hablamos  y   damos testimonio.  Recalquemos la importancia del testimonio de seriedad,  de  disciplina en el hacer las cosas, de disciplina en el estudio. Testi- monio en el cuidado del cuerpo, de la salud. Testimonio en la  honradez con que el educador realiza su tarea, en la esperanza  con la que lucha por sus derechos, en la persistencia con la que   lucha  contra el arbitrio. Las educadoras y los educadores de este  país tienen mucho que enseñar a  los niños y  niñas, además de  los contenidos, sin  importar la clase a  la que pertenezcan. Tie- nen mucho que enseñar por el ejemplo de combate en favor de  los cambios fundamentales que necesitamos, de combate contra  el autoritarismo  y  en favor de la democracia.  \n102  CARTAS A  QUIEN  PRETENDE ENSEÑAR  Nada de esto es fácil,  pero todo esto se constituye en uno de los  frentes de la lucha mayor para  la  transformación proftmda de la so- ciedad brasileña. Los educadores progresistas precisan conven- cerse de que no son meros docentes -eso no existe-, puros espe- cialistas de  la  docencia. Nosotros somos militantes políticos porque  somos maestros y maestras. Nuestra tarea no se  agota en la ense- ñanza de la matemática, de la geografía, de la sintaxis o de la histo- ria. Además de la seriedad y la competencia con que debemos en- señar esos contenidos, nuestra tarea exige nuestro compromiso y  nuestra actitud en favor de la superación de las injusticias sociales.  Es  necesario desenmascarar la ideología de cierto discurso neo- liberal, a veces llamado modernizador, que hablando del tiempo  histórico actual trata de convencemos de que así es  la vida:  los  más capaces organizan el mundo, producen; los  menos capaces  sobreviven;2 y \"esa historia de sueños, de utopía y de cambio radi- cal\" lo único que hace es dificultar el  trabajo  incansable  de los que  realmente producen. Dejémoslos trabajar en paz sin los trastornos  que les ocasionan nuestros discursos soñadores y un día habrá un   gran  excedente para distribuir entre todos.  Este  discurso  inaceptable  contra  la  esperanza,  la  utopía y  el  sueño es el que defiende la preservación de una sociedad como la  nuestra,  que  funciona  para una  tercera  parte de  la  población,  como si fuese posible soportar por mucho tiempo semejantes dife- rencias. Lo que me parece que el nuevo tiempo nos plantea es la  muerte del sectarismo, pero la vida de la radicalidad. 3  Las  posturas  sectarias en las que nos pretendemos dueños y señores de la ver- dad, que no puede ser discutida, ésas sí que -aun cuando se toman  en nombre de la democracia- cada vez  tienen menos que ver con  el nuevo tiempo. En ese sentido, los partidos progresistas no tienen  mucho que elegir. O  se recrean y se reinventan en la radicalidad  en tomo a sus sueños o, entregados a  los sectarismos castradores,  2 Véase Paulo Freire,  Pedagogía  de  la espn-anza,    op.    cit.   3 Véase Paulo Freire,  Pedagogía  del  oprimido,    op.    cit.  \nSEXTA CARTA  103   fenecen con su cuerpo sofocado en el figurin estalinista. Vuelven a  ser,  o no dejan de ser, viejos partidos de izquierda sin alma, conde- nados a morir de frio. Y es una lástima que exista este riesgo.  Pero volvamos a  la relación entre educadoras y educandos, a  la fuerza y a la importancia del testimonio de la educadora corno  factor de formación para los educandos, de la radicalidad con la  que actúa, con la que decide, más el testimonio que da sin difi- cultad de que puede y debe rever la posición que asumió, frente  a los nuevos elementos que la hicieron cambiar. Y tanto más efi- caz  será su  testimonio cuanto más  lúcida y  objetivamente ella  deje en claro a sus educandos:  1]  que cambiar de posición es legítimo;  2]  las razones que la hicieron cambiar.  No estoy pensando que los  educadores y las educadoras deban ser  perfectos o santos. Es justamente corno seres humanos, con sus va- lores y sus fallas,  corno deben dar testimonio de su lucha por la se- riedad, por la libertad, por la creación de la disciplina de estudio in- dispensable de cuyo proceso deben formar parte corno auxiliares,  puesto que es tarea de los educandos generarlo en sí mismos.  U na vez inaugurado el proceso testimonial por parte del educa- dor,  poco a  poco los educandos se  van asumiendo también. Esta  participación efectiva de los educandos es señal de que el testimo- nio de la educadora está funcionando. Sin embargo, es posible que  algunos educandos pretendan poner a prueba a la educadora para  estar seguros de si  ella es coherente o no. Seria un desastre que en  esa oportunidad la maestra reaccionase mal ante  el  desafio. En el  fondo, la mayoria de los  educandos que la ponen a prueba lo ha- cen ansiosos de que ella no los decepcione. Lo que quieren es que  ella confume que es auténtica, y al ponerla a prueba no están bus- cando su fracaso.  Pero también  están los  que provocan  porque  quieren el fracaso del educador.  Uno de los engaños de la educadora, generado en el seno de  una exorbitante autoestima que la hace poco humilde, sería  el  \n104  CARTAS A  QUIEN PRETENDE ENSEÑAR  de sentirse herida por la conducta de los educandos, por no admi- tir que nadie pueda dudar de ella.  Humildemente, al  contrario, es  bueno admitir que todos so- mos seres humanos y por eso inacabados. No somos perfectos ni  infalibles.  Recuerdo la experiencia que tuve cuando apenas llegaba del  exilio, con un grupo de estudiantes de posgrado de la Universi- dad Católica de San Pablo.  En el primer día de clase, y mientras yo  hablaba sobre cómo  veía el proceso de  nuestros encuentros,  me referí a  cómo me  gustaría que fuesen abiertos, democráticos y libres. Encuentros  en los que ejerciésemos el derecho a  nuestra curiosidad, el dere- cho de preguntar, de discrepar, de criticar.  Una estudiante me dijo en tono agresivo:  \"Me gustaría seguir el  curso atentamente; no faltaré a  ningún encuentro para ver si  ese  diálogo del que usted habla será vivido realmente\".  Cuando ella tenninó, hice un breve comentario sobre el dere- cho que tenía de dudar de mí, así como el de expresar pública- mente su duda. A mí me cabía el deber de probar, a lo largo del  semestre, que era coherente con mi discurso.  En realidad, lajoven señora jamás faltó a  ningún encuentro.  Participó en todos, reveló sus posiciones autoritarias que debían  fundamentar su rechazo hacia mi pasado y hacia mi presente de  oposición a  los  gobiernos  militares.  Nunca nos aproximamos,  pero mantuvimos un clima de mutuo respeto hasta el fin.  En su caso, lo que realmente la movía era el ánimo de que yo  me desdijese el primer día. Y yo no me desdije.  Es  que no me  ofendo si  me ponen a prueba. No me siento infalible, me sé inaca- bado. Lo que me irrita es la deslealtad, la crítica infundada, la falta  de ética en las acusaciones.  En  suma,  las  relaciones  entre  educadores y  educandos son  complejas, fundamentales, difíciles, son relaciones sobre las que  debemos pensar constantemente. Y bueno sería, además, que in- tentásemos crear el hábito de evaluarlas o  de evaluarnos en ellas  también como educadores y educadoras.  \nSEXTA CARTA  105   Qué bueno seria, en realidad, si  trabajáramos metódicamente  con los educandos cada dos días, durante algún tiempo que de- dicariamos  al  análisis  critico  de  nuestro  lenguaje,  de  nuestra  práctica. Aprenderiamos y enseñariamosjuntos un instnImento  indispensable para el acto de estudiar: el    registro    de los hechos y  lo que se adhiere a ellos.  La  práctica de registrar nos lleva a    obser- var,  comparar,  seleccionar  y    establecer  relaciones  entre  hechos    y    cosas.   Educadora y educandos se obligarían a  anotar diariamente los  momentos que más los  desafiaron,  positiva o  negativamente,  durante el intervalo entre un encuentro y otro.  Además estoy convencido de que esa experiencia formativa  p<r   dria hacerse, dentro de un nivel de exigencia adecuado a la edad  de los  niños, entre aqueUos que aún no escriben. Pedirles que ha- blen de cómo están sintiendo  el    devenir de sus días en la escuela  les pennitiria involucrarse en una práctica de la educación de los  sentidos. Les exigiria atención, observación, selección de hechos.  Con esto desarrollaríamos también su oralidad, que aspirando en  sí fiÚsma  a la siguiente etapa  -la  de la  escritura-,jamás  debe dicoto- mizarse con respecto a ella.  El  niño que  habla  en condiciones per- sonales normales es aquel que escribe. Si no escribe queda  impedido   de hacerlo, sólo en casos excepcionales  imposibilitado.   Cuando era secretario municipal de Educación de San Pablo  viví una experiencia que jamás olvidaré. En dos escuelas munici- pales, y durante dos horas, conversé con cincuenta alumnos del  quinto grado en una tarde y con cuarenta al otro día.  La  temá- tica central de los encuentros era sobre cómo veían los adoles- centes su escuela y qué escuela les gustaría tener. Cómo se veían  ellos mismos y cómo veían a sus maestras.  Apenas  comenzamos  con  los  trabajos,  ya  en  el  primer en- cuentro, uno de los adolescentes me indagó: \"Paulo, ¿qué pien- sas  tú  de una maestra que pone a  un alumno de pie 'oliendo' la  pared, aun cuando éste haya hecho una cosa equivocada, como  reconozco que hizo?\". Y yo  le respondí: \"Creo que la maestra se  equivocó\".  \"¿Qué harias tú si vieses a una maestra haciendo eso?\"  \n106  CARTAS A  QUIEN PRETENDE ENSEÑAR  \"Espero que  tú  y tus compañeros -respondí yo- no supongan que  debo hacer lo mismo con la maestra. Eso sería un absurdo que yo ja- más cometería. Invitaría a la maestra para que al  día siguiente fuese a  mi oficina,junto con la directora de la escuela, la coordinadora peda- gógica y alguien más que fuese  responsable por la formación perma- nente de las maestras. En mi conversación con ella le pediría que me  demostrase que su comportamiento era correcto desde el punto de  vista  pedagógico, científico, humano y político. En caso de que ella  no lo pudiese probar -lo que resulta evidente-le haría entonces una  exhortación, luego de pedir a  la directora de la escuela su opinión  respecto de la maestra en falta,  para que no repitiese su error.\"  \"Muy bien -dijo eljoven-, pero ¿y  si  ella repitiese ese procedi- miento?\"  \"En este caso -respondí-, pediría a la asesora jurídica de la Se- cretaría que estudiase el camino legal para castigar a esa maestra.  Aplicaría la ley con rigor.\"  Todo el grupo entendió, y yo percibí que lo que aquellos adolescen- tes  pretendían no era un ambiente licencioso, sino que radicalmente  se  negaban al arbitrio. Querían relaciones democráticas basadas en el  respeto mutuo. Se negaban a la obediencia ciega, sin lúnites, del auto- ritarismo, rechazaban la posibilidad de espontaneísmo.  Posiblemente algunos de ellos salieron recientemente a las calles,  con sus caras pintadas y diciendo a gritos que vale la pena soñar:  Al  día siguiente,  con el  otro grupo, escuché un comentario de  una adolescente inquieta y en un lenguaje bien articulado: \"Yo  qui- siera una escuela, Paulo, que no fuese parecida a mi mamá. Una es- cuela que creyese más en los jóvenes y que no pensase que hay un  montón de gente esperándonos sólo para hacer daño\".  Fueron cuatro horas con noventa adolescentes que me reforza- ron la alegría de vivir y el derecho a soñar.  '\"  Durante  el  proceso al presidente Collor, éste pidió al pueblo que  saliera a  la calle con los colores verde y amarillo de la bandera, a  lo  que los estudiantes respondieron saliendo con la cara pintada de  negro, pidiendo la renuncia del  e~uiciado  por corrupción.  [T.j  \nSéptima carta  DE HABLARLE  AL  EDUCANDO A  HABLARLE A  ÉL Y CONÉL;  DE OíR AL EDUCANDO A  SER OíDO POR ÉL  Partamos del intento de comprender el enunciado de  arriba, en cuyo primer cuerpo dice:  \"de hablarle  al  educando a  hablarle a  él y    con    él\".  Podríamos organizar este primer cuerpo  de la siguiente manera sin peIjudicar su sentido: \"Del momento  en que le hablamos  al  educando al momento en que hablamos   con  él\";  o:  \"de la necesidad de hablarle  al  educando a  la necesi- dad de hablar  con  él\"; o aun: \"es importante que vivamos la expe- riencia equilibrada y armoniosa entre hablarle  al  educando y ha- blar  con  él\".  Esto quiere decir que hay momentos en los que la  maestra, como autoridad, le habla  al  educando, dice lo que debe  ser hecho, establece límites sin los cuales la propia libertad del  educando se pierde en la permisividad, pero estos momentos se  alternan, según la opción política de la educadora, con otros en  los que ella habla  con  el educando.  No está de más repetir aquí la afirmación, todavía rechazada  por mucha gente no obstante su obviedad:    la  educación es  un acto  político.    Su no neutralidad exige de la educadora que asuma su  identidad política y viva  coherentemente su opción progresista,  democrática o  autoritaria, reaccionaria, aferrada a  un pasado, o  bien espontaneísta; que se defina por ser democrática o autorita- ria.  Es  que el  espontaneísmo, que a  veces  da la impresión  de  que se  inclina por la libertad, acaba trabaJando contra ella.  El  ambiente de permisividad, de vale todo, refuerza las posiciones  \n108  CARTAS A  QUIEN PRETENDE ENSEÑAR  autoritarias. Por otro lado, el espontaneísmo niega la formación  del demócrata, del hombre y de la mujer liberándose en y por la  lucha en favor del ideal democrático, así como niega la \"forma- ción\" del  obediente,    del  adaptado,    con la que sueña el autoritario.  El  espontaneísta es anfibio -vive en el agua  y  en la tierra-, no  tiene entereza, no se define congruentemente por la libertad ni  por la autoridad. Su ambiente es la licencia en la que disfruta de  su miedo a la libertad. Por eso es que he hablado sobre la nece- sidad de que  el    espontaneísta supere su indecisión política  y  se  defina finalmente en favor de la libertad, viviéndola de manera  auténtica, o  que esté contra ella.  Éste es, según estamos viendo en el análisis que realizamos, un  problema en el  que se inserta la cuestión de la libertad y de la  autoridad  en  sus  relaciones  contradictorias.  Cuestión  menos  comprendida que lúcidamente entendida entre nosotros.  El  mismo hecho de ser una sociedad marcadamente autorita- ria, con fuerte tradición mandona, con inequívoca inexperiencia  democrática enraizada en nuestra historia, puede explicar nuestra  ambigüedad frente a la libertad y la autoridad.  También  es  importante notar que esa ideología autoritaria,  mandona, de la que nuestra cultura está impregnada, corta las  clases sociales. El  autoritarismo del ministro, del presidente, del  general, del director de la escuela, del profesor universitario, es   el    mismo autoritarismo del peón, del cabo o  del sargento, del  portero del edificio. Entre nosotros, cualesquiera diez centíme- tros de poder con facilidad se convierten en mil metros de poder  y de arbitrio.  Pero precisamente porque aún no hemos sido capaces de re- solver este problema en la práctica social, de tenerlo claro frente  a nosotros, tendemos a cOIúundir el uso correcto de la autoridad  con el autoritarismo,  y  así,  por negar ese uso, caemos en la licen- ciosidad o  en el espontaneísmo pensando que, al contrario, esta- mos respetando las  libertades, haciendo entonces democracia.  Otras veces somos realmente autoritarios pero nos pensamos  y   nos proclamamos progresistas.  \nSÉPTIMA CARTA  109  Es un hecho que por rechazar el autoritarismo no puedo caer  en lo licencioso, así como rechazando esto no puedo entregarme  al autoritarismo. Cierta vez afirmé: el uno no es el contrario po- sitivo del otro. El  contrario positivo, ya  sea del autoritarismo ma- nipulador o del espontaneísmo licencioso, es la radicalidad de la  democracia.  Creo que estas consideraciones vienen aclarando el tema de  esta carta. Ahora puedo afirmar que si  la maestra es coherente- mente autoritaria, siempre es ella el sujeto del habla y los alum- nos son continuamente la  incidencia  de su discurso. Ella habla  a,  para  y  solrre  los educandos. Habla desde la altura hacia abajo, con- vencida de su certeza y de su verdad. Y hasta cuando habla  con  el  educando es como si le estuviese haciendo un favor a  él, subra- yando la importancia y  el    poder de su voz.  No es ésta la manera  como la educadora democrática habla    con    el  educando,  ni si- quiera cuando le habla  a  él.  Su preocupación es la de evaluar al  alumno, la de comprobar si  él la acompaña o  no. La formación  del educando, como sujeto crítico que debe luchar constante- mente por la libertad, jamás agita a la educadora. Si la educadora  es espontaneísta, en la posición de \"dejemos todo como está para  ver cómo queda\", abandona a los educandos a sí mismos y acaba  por no hablar  a  ni  con    los educandos.  Sin embargo, si  la opción de la educadora es la democrática y  la distancia entre su discurso y su práctica viene siendo cada vez  menor,  en su vida  escolar cotidiana, que siempre somete a  su  análisis crítico, vive  la dificil pero posible y placentera experien- cia de hablarles  a los    educandos y de hablar  con    los educandos.  Ella sabe que  el  diálogo sobre los contenidos a enseñar, así como  el diálogo sobre la vida misma, si  es verdadero, no sólo es válido  desde el punto de vista educativo, sino que también es  creador  de un ambiente abierto y libre dentro del seno de la clase.  Hablar  a  y    con    los  educandos es una forma sin  pretensiones  pero altamente positiva que la maestra democrática tiene de dar,  dentro de su escuela, su contribución a la formación de ciudada- nos y ciudadanas responsables y críticos. Esto es algo de lo que  \n110  CARTAS A  QUIEN PRETENDE ENSEÑAR  mucho precisamos y que es indispensable para el desarrollo de  nuestra democracia.  La  escuela democrática, progresistamente  posmoderna y no posmodernamente tradicional y reaccionaria,  tiene un gran papel que cumplir en el Brasil actual.  Sin embargo, al insistir en la temática de la escuela posmoder- namente progresista, está muy lejos de mí pensar que la \"salva- ción\" del Brasil está depositada en ella. Naturalmente, la viabili- zación  del  país  no  está  tan  sólo  en  la  escuela  democrática,  fonnadora de ciudadanos críticos y capaces, pero pasa por ella, la  necesita, no se hace sin ella. Yes en ella donde la maestra habla a  y con el educando,  uye  al educando,    sin importar su tierna edad o  no, y así,  es oída por él.  Es  escuchándolo, tarea ésta inaceptable  para la educadora autoritaria, como la maestra democrática se  prepara cada vez más para ser oída por el educando. Yal apren- der con el educando a  hablar con él porque lo oyó, le enseña a  escucharla también.  Las consideraciones anteriores sobre la posición autoritaria, so- bre la posición espontaneísta y sobre la que llamo sustantivamente  democrática pueden ser aplicadas, como es obvio, al problema  de escuchar  al    educando y de ser escuchado por él.  Ésa es la ra- zón crucial del derecho a  voz que tienen las  educadoras y  los  educandos. Nadie vive  la democracia plenamente, ni la ayuda a  crecer, primero, si  es impedido en su derecho de hablar, de te- ner voz, de hacer su discurso crítico; y en segundo lugar, si no se  compromete de alguna manera con la lucha por la defensa de  ese derecho, que en  el    fondo también es el derecho de actuar.  y  del mismo modo como la libertad del educando en clase ne- cesita límites para no perderse en la licenciosidad, la voz de la  educadora necesita de límites éticos para no deslizarse hacia el  absurdo. Es  tan inmoral tener nuestra voz silenciada o  nuestro  \"cuerpo prohibido\" como inmoral es usar la voz  para falsear la  verdad, para mentir, engañar, defonnar.  Mi derecho a la voz no puede ser un derecho ilimitado a decir  todo lo que me parece bien sobre el mundo y los otros; el de una  voz irresponsable que miente sin ningún tipo de malestar ya que  \nSÉPTIMA CARTA  111  espera de la mentira un resultado favorable a  los deseos y a  los  planes del mentiroso.  Es  preciso  y  hasta  urgente  que  la  escuela  se  vaya  transfor- mando en un espacio acogedor y multiplicador de ciertos gustos  democráticos corno el de escuchar a los otros, ya no por puro fa- vor sino por el deber de respetarlos, así corno el gusto de la tole- rancia, el del acatamiento de las decisiones tornadas por la ma- yoría,  en  el  cual  no  debe  faltar  sin  embargo  el  derecho  del  divergente a expresar su contrariedad. El gusto por la pregunta,  por la crítica, por el debate. El  gusto del respeto hacia la cosa  pública que entre nosotros es tratada corno algo privado, que se   despre~ia.   Es  increíble la manera corno se desperdician las  cosas entre  nosotros, en qué medida y profundidad. Basta leer la prensa dia- ria y seguir los noticiarios de la televisión para darnos cuenta de  los millones que se desperdician por la falta de uso de aparatos  carísimos en los hospitales, por la ..  obras que por deshonestidad  se deterioran en su constnJcción antes de tiempo; obras millona- rias que se evaporan misteriosamente dejando tan sólo vestigios.  Si  los administradores responsables fuesen castigados por seme- jantes descalabros, si  pagasen a  la nación o  bien fueran encarce- lados -evidentemente con derecho a una defensa-, la situación  mejoraría.  Una actividad que hay que incluir en la vida normal político-pe- dagógica de la escuela podría ser la discusión, de vez en cuando,  de casos corno los que he comentado ahora; la discusión con los  alumnos sobre lo que representa para nosotros semejante desver- güenza, tanto a corto corno a largo plazo, tanto desde el punto de  vista  de la estafa material a  la economía de la  nación corno del  daño ético que esos descalabros nos causan a  todos nosotros. Es  preciso mostrar los números a los niños y adolescentes y decirles  con claridad y con firmeza que el hecho de que los responsables se  comporten de ese modo, sin ningún pudor, no nos autoriza, en la  intimidad de nuestra escuela, a  romper las  mesas, echar a perder  las tizas,  desperdiciar la merienda o ensuciar las paredes.  \n112  CARTAS  A  QUIEN  PRETENDE ENSEÑAR  No vale decir: \"¿Por qué no lo hago yo si  los poderosos lo ha- cen? ¿Si  los poderosos roban por qué no robo yo?  ¿Si  mienten  los poderosos por qué yo  no miento también?\".  Eso  no vale.  Decididamente no vale.  No se construye ninguna democracia seria -lo cual implica cam- biar radicalmente las estructuras de la sociedad, reorientar la polí- tica de la producción y del desarrollo, reinventar el poder, hacer  justicia a  los expoliados, abolir las ganancias indebidas e  inmora- les de los todopoderosos- sin -previa y simultáneamente-- trabajar  esos gustos democráticos y esas exigencias éticas.  Uno de los errores de los marxistas mecanicistas fue vivir -y no  sólo  pensar o  afinnar- que la educación,  por ser superestruc- tura, no tiene nada que hacer antes de que la sociedad se trans- fonne  radicalmente  en su  infraestructura, en sus  condiciones  materiales. Antes, lo que se puede hacer es la  propaganda    ideo~   gica    para la movilización y la organización de las  masas populares.  En esto, como en todo, fallaron los mecanicistas. Y aún peor, atra- saron la lucha en favor del socialismo que ellos contrapusieron a la  democracia. 1  Otro gusto democrático, cuyo  antagonista está entrañado en  nuestras tradiciones culturales autoritarias, es el gusto del respeto  hacia los diferentes. El  gusto de la tolerancia del que tanto el  ra- cismo como el machismo huyen como el diablo huye de la cruz.  El  ejercicio  de  ese  gusto  democrático,  en  una escuela  real- mente abierta o abriéndose, debería cercar al gusto autoritario,  racista, machista, en primer lugar en sí mismo, como negación  de la democracia, de las libertades y de los derechos de los dife- rentes, como negación de un humanismo necesario; en segundo  lugar, como expresión de todo eso y aun como contradicción in- comprensible  cuando  el  gusto  antidemocrático,  no  importa  cuál, se manifiesta en la práctica de los hombres o de las mujeres  reconocidos como progresistas.  1 Véase Paulo Freire,  Pedagogía  de  la  esperanza,    qp.    cit.  \nSÉPTIMA CARTA  113  ¿Qué podemos decir, por ejemplo, de un hombre considerado  progresista que a  pesar de su discurso en favor de las clases po- pulares se  comporta como si  fuese  dueño de su familia?  ¿Un  hombre cuyo mando asfixia a la mujer y a los hijos e  hijas?  ¿Qué decir de la mujer que lucha en defensa de los intereses  de su categoría pero que en su casa raramente agradece a la co- cinera por el vaso  de agua que ésta le trae y en las pláticas con  sus amigas se refiere a ella como \"esa gente\"?  Realmente es  dificil  hacer democracia.  Es  que la democracia,  como cualquier sueño, no se hace con palabras descarnadas y sí  con la reflexión y con la práctica. No es lo que digo lo que afirma  que soy un demócrata o que no soy racista o machista, sino lo que  hago. Es  preciso que lo que hago no contradiga lo que digo.  Es  lo  que hago lo que habla de mi lealtad o no hacia lo que digo.  En esa lucha entre  el  decir y  el  hacer, en la que debemos com- prometemos para disminuir la distancia entre ambos, es posible  tanto reconstruir  el  decir para adecuarlo al  hacer como cambiar   el    hacer para ajustarlo al decir.  Por eso es  que la coherencia fi- nalmente fuerza una nueva opción.  Si  en  el    momento en que  descubro la incoherencia entre lo que digo y lo que hago -dis- curso  progresista,  práctica  autoritaria-,  reflexionandq  a  veces  con sufrimiento, aprehendo la ambigüedad en que me encuen- tro, siento que no puedo continuar así y busco una salida.  De  esta forma una nueva opción se me impone: o cambio el discurso  progresista por un discurso coherente con mi práctica reacciona- ria o cambio mi práctica por una democrática, adecuándola al dis- curso progresista. Finalmente, existe una tercera opción: la opción  por  el  cinismo asumido que consiste en encamar lucrativamente la  incoherencia.  Creo que una de las formas de ayudar a la democracia entre  nosotros es combatir con claridad y seguridad los argumentos in- genuos pero fundamentados en la realidad, o  en parte de ella,  según los cuales  votar  no vale la pena; que la política siempre es  así, ese descaro general, vergonzoso; que todos los políticos son  iguales: \"Por eso voy a votar por quien  hace,    aunque robe\".  \n114  CARTAS A  QUIEN PRETENDE ENSEÑAR  En realidad, las  cosas son diferentes. Ésta es la fonna de hacer  política que se  nos  hace  posible,  pero no es  necesariamente la  forma que siempre tendremos de hacer política. No es la política la  que nos hace así.  Nosotros somos los que hacemos esta política,  y es  indiscutible que aquella que hoy hacemos es de mejor cali- dad que la que se hacía en mi infancia. Y por fin,  no son todos los  políticos los que hacen política de este modo en los diferentes ni- veles del gobierno ni en los diferentes partidos políticos.  Como educadoras  y  educadores no podemos eximimos de res- ponsabilidad en la cuestión fundamental de la democracia brasi- leña  y  de cómo participar en la búsqueda de su perfeccionamiento.  Como educadoras y educadores somos políticos, hacemos po- lítica al hacer educación. Y si soñamos con la  democracia  debemos  luchar día y noche por una escuela en la que hablemos a    los  edu- candos  y    con    los  educandos, para que escuchándolos podamos  también ser oídos por ellos.  \nOctava carta   IDENTIDAD CULTURAL Y  EDUCACIÓN  Preguntarnos sobre las relaciones entre la identidad  cultural -que siempre tiene un elemento de clase social- de  los sujetos de la educación y la práctica educativa es algo que  se nos impone. Es que la identidad de los sujetos tiene que ver  con las  cuestiones fundamentales del plan de estudios, tanto  el oculto como el  explícito, y  obviamente con cuestiones de  enseñanza y de aprendizaje.  Sin embargo, me parece que analizar la cuestión de la iden- tidad de los sujetos de la educación, educadores y educandos,  implica  recalcar,  desde  el  comienzo  de  tal  ejercicio,  que  la  identidad cultural, expresión cada vez más usada por nosotros,  no puede pretender agotar la totalidad del significado del fe- nómeno  cuyo  concepto  es  la    identidad.    El  atributo  cultural  acrecentado por el restrictivo  de  clase  no agota la comprensión  del término \"identidad\". En el fondo, mujeres y hombres nos  hacemos seres especiales y  singulares. A  través  de una larga  historia conseguimos desplazar de la  especie  el punto de deci- sión  de  mucho de lo que somos y  de lo que  hacemos indivi- dualmente para nosotros mismos, si  bien dentro del engranaje  social sin el cual tampoco seríamos lo que estamos siendo. En  el fondo,  no somos sólo lo que heredamos ni únicamente lo  que adquirimos, sino la relación dinámica y procesal de lo que  heredamos y lo que adquirimos.  \n116  CARTAS A  QUIEN PRETENDE ENSEÑAR  Hay algo en lo que heredamos que  Fran~ois  Jacob l    destaca en  una entrevista de  El Como de la  UNFSCOy  que es de  la  más alta impor- tancia para la comprensión de nuestro tema: \"Estamos programa- dos, pero para aprender\", diceJacob. Yes precisamente porque  nos fue posible, gracias a  la invención de la    existencia  -algo más  que la vida misma y que nosotros creamos con los materiales que  la vida nos ofreció-, desplazar de la especie para nosotros el punto  de decisión de mucho de lo que estamos y estaremos siendo. Y más  aún, porque con la invención social dellengrnye, lado a lado con la  operación sobre el mundo, prolongamos el mundo natural, que  no hicimos, en uno cultural e histórico, que es  producto nuestro,  nos volvimos animales permanentemente  inscriros  en el proceso de  aprender y de buscar, proceso que sólo se hace posible en la me- dida en que \"no podemos vivir a no ser en función del mañana\". 2  Aprender y buscar, a  los que necesariamente se juntan ense- ñar y conocer, que por su parte no pueden prescindir de liber- tad no sólo como donación sino como algo indispensable y ne- cesario,  como  un    sine  qua  non    por  el  que  debemos  luchar  permanentemente, forman parte de nuestra manera de estar  siendo en el mundo. Y es justamente porque estamos progra- mados pero no determinados, condicionados pero al mismo  tiempo conscientes del condicionamiento, que nos hacemos  aptos para luchar por la libertad como proceso y no como meta.  Por eso también es que  el  hecho de que \"cada ser -dice Jacob- contiene en sus cromosomas todo su propio futuro\" no significa  de ninguna manera que nuestra  libertad  se ahogue o se sumeIja  en las estructuras hereditarias, como si  ellas fuesen el lugar indi- cado para la desaparición de nuestra posibilidad de vivirla.  Condicionados, programados pero no determinados, nos mo- vemos con un mínimo de libertad  del  que disponemos en  el   marco cultural para ampliarlo.  De  esta  manera, a  través  de la   I    Le  Cou17ier  de  L'UNESCO,  op.  aL  2/d.  \nOCTAVA CARTA  117   educación como expresión también cultural podemos \"explo- rar más o  menos las posibilidades inscritas en los cromosomas\".3  Queda clara la importancia de la identidad de cada uno de  nosotros como sujeto,  ya    sea como educador o  educando, en la  práctica educativa. También la importancia de la identidad en- tendida en esta relación contradictoria que somos nosotros mis- mos entre lo que heredamos  y  lo que adquirimos, relación con- tradictoria  en  la  que  a  veces  lo  que  adquirimos  en  nuestras  experiencias sociales, culturales, de clase, ideológicas, interfiere  vigorosamente a  través del poder de los intereses, de las emocio- nes,  de los  sentimientos,  de los  deseos,  de lo que se viene  lla- mando \"la fuerza del corazón\", en la estructura hereditaria. Por  eso mismo es que no somos ni una cosa ni la otra. Repitamos: ni  sólo lo innato ni tampoco únicamente lo adquirido.   La  llamada \"Fuerza de la sangre\", para utilizar una expresión  popular, existe, pero no es determinante. Con la presencia de lo  cultural, ella sola no lo explica todo.  En el fondo, la libertad como hazaña creadora de los seres hu- manos, como aventura, como experiencia de riesgo  y  de creación,  tiene mucho que ver con  la  relación entre lo que heredamos  y  lo  que adquirimos.  Las interdicciones a nuestra libertad son resultado mucho más  de las estructuras sociales, políticas, económicas, culturales, históri- cas,  ideológicas, que de las  estructuras hereditarias. No podemos  tener dudas sobre el poder de la  herencia  cultural, sobre cómo nos  conforma  y  nos obstaculiza para ser.  Pero el hecho de ser progra- mados,  condicionados  y  conscientes del condicionamiento,  y    no  determinados, es lo que hace posible superar la fuerza de las  he- rencias culturales. La transformación del mundo material, de las  estructuras materiales, a la que debe agregarse simultáneamente  un esfuerzo crítico educativo, es el camino para la superación,  jamás mecánica, de esta herencia.  3  Id.  \n118  CARTAS A  QUIEN PRETENDE ENSEÑAR  Lo que no es posible, sin embargo, en este esfuerzo por la su- peración de ciertas herencias culturales, que repitiéndose de ge- neración en generación a veces dan la impresión de petrificarse,  es dejar de considerar su existencia. Es muy cierto que los cam- bios infraestructurales a veces alteran rápidamente las fonnas de  ser y de pensar que perduraban desde hace mucho tiempo. Por  otro lado, el reconocer la existencia de las herencias culturales  debe implicar  el  respeto hacia éstas, respeto que de ninguna ma- nera  significa  nuestra  adecuación  a  ellas.  Nuestro  reconoci- miento y nuestro respeto, sin embargo, son condiciones funda- mentales  para  el  esfuerzo  por  el  cambio.  Por  otro  lado,  es  preciso que seamos bien claros con relación a  algo que es evi- dente:  esas  herencias culturales tienen  un innegable corte de  clase social. Es  en ellas donde se van constituyendo muchos as- pectos de nuestra identidad, que por eso mismo está marcada  por la clase a la que pertenecemos.  Pensemos un poco en la identidad cultural de los educandos y en  el respeto necesario que le debemos en nuestra práctica educativa.  Creo que  el  primer paso a  dar  en dirección a ese respeto es el reco- nocimiento de nuestra identidad,  el  reconocimiento de lo que es- tamos siendo en la actividad práctica en la que nos experimenta- mos. Es en la práctica de hacer las cosas de una cierta manera,  de pensar, de hablar un cierto lenguaje  (como por ejemplo:  \"la canción  de    que te hablé\" y no \"la canción  que  te hablé\", sin la  preposición    de    rigiendo al  pronombre    que),    es en la práctica  de hacer, de hablar, de pensar, de tener ciertos gustos, ciertos  hábitos, donde acabo por reconocenne de cierta forma,  coinci- dente con otra gente como yo.  Esa otra gente tiene un corte de  clase idéntico o próximo al mío. Es en la práctica de experimentar  las  diferencias donde nos descubrimos como  yo  y como  tú.    En ri- gor, siempre es el otro, en cuanto tú,  el  que me constituye como  yo en la medida en que  yo,    como  tú  de otro, lo constituyo como yo.  Es una fuerte tendencia nuestra la que nos empuja a  afinnar  que lo diferente de nosotros es inferior. Partimos de la idea de  que nuestra forma de estar siendo no sólo es buena sino que es  \nOCTAVA CARTA  119   mejor que la de los otros, diferentes de nosotros. Esto es la into- lerancia.  Es  el    gusto irresistible de oponerse a  las diferencias.  Sin embargo la clase dominante, debido a  su propio poder de  perfilar a la clase dominada, en tma primera instancia rechaza la  diferencia, en segundo lugar no piensa quedar igual al diferente,   y  en tercer lugar tampoco tiene la intención de que  el  diferente  quede igual a  ella. Lo que ella pretende es admitir  y    remarcar  en la práctica la inferioridad de los dominados al mantener las  diferencias y las distancias.  Uno de los desafíos para los educadores  y  las educadoras pro- gresistas, en coherencia con su opción, es  no sentirse ni proce- der como si fuesen seres inferiores a los educandos de las clases  dominantes de la red privada que, arrogantes, maltratan  y  me- nosprecian al maestro de clase media. Pero tampoco, por  el  con- trario, sentirse superiores, en la red pública, a los educandos de las  favelas,  a los niños  y  las niñas populares, a los niños sin comodida- des,  que no comen bien, que no \"visten bonito\", que no \"hablan  correctamente\", que hablan con otra sintaxis, con otra semántica   y  con otra prosodia.  Lo que se  le plantea en ambos casos  a  la educadora progre- sista  y  coherente es en primer ténnino no asumir una posición  agresiva hacia quien simplemente responde,  y  en segundo lugar  tampoco dejarse tentar por la hipótesis de que los niños, pobre- citos, son naturalmente incapaces. Ni  una posición de revancha  ni de sumisión en el primer caso, ni una actitud patemalista o de  desprecio hacia los niños de las clases populares en  el  segundo,  sino la de quien asume su responsable autoridad de educadora.  El punto inicial hacia esta práctica comprensiva es saber  y  estar  convencida de que la educación es a su vez  una práctica política.  Por eso es que repetirnos: la educadora es  política.    En consecuen- cia, se hace imperioso que la educadora sea coherente con su op- ción, que es política. Ya continuación, que la educadora sea cada  vez  más competente desde  el    punto de vista  científico, lo que la  hace saber lo importante que es conocer  el    mundo concreto en  que viven sus alumnos. La cultura en la que se encuentra en acción  \n120  CARTAS A  QUIEN PRETENDE ENSEÑAR  su lenguaje, su sintaxis, su semántica, su prosodia, en la que se  vienen formando ciertos hábitos, ciertos gustos, ciertas creencias,  ciertos DÚedos, ciertos deseos no necesariamente fáciles de aceptar  por el mundo concreto de la maestra.  El trabajo formativo, docente, es inviable en un contexto que se  piense teórico,  pero que al  mismo tiempo tienda a  permanecer  alejado e  indiferente con respecto al    contexto  concreto    del mundo  inmediato de la acción  y  de la sensibilidad de los educandos.  Creer posible la realización de un trabajo en el que el  contexto  teórico  se separa de tal modo de la experiencia de los educandos  en su  contexto  concreto  sólo es concebible para quien juzga que la  enseñanza de los contenidos se hace con indiferencia e indepen- dencia frente a lo que los educandos  ya  saben a  partir  de sus expe- riencias anteriores a la escuela.  Creer posible esta posición no es   para  quien rechaza con razón esa dicotomía insustentable entre   contexto  conmto  y  contexto  teórico.   La  enseñanza de los contenidos no puede ser hecha de ma- nera vanguardista como si  fueran    cosas,    saberes que se pueden  sobreponer o yuxtaponer al cuerpo consciente de los educandos  -a no ser en forma autoritaria-o Enseñar, aprender  y  conocer no  tienen nada que ver con esa práctica mecanicista.  Las educadoras precisan saber lo que sucede en el mundo de  los niños con los que trabajan, el universo de sus sueños, el len- guaje con que se defienden, con maña, de la agresividad de su  mundo.  Lo  que saben  y  cómo lo saben fuera de la escuela.  Hace dos o tres años, dos profesores de la Universidad de  Cam-  pinas, el fisico Carlos Arguelo  y  el matemático Eduardo Sebastiani  Ferreira, participaron en un encuentro universitario en Paraná en  el que se discutió  la  enseñanza de la matemática  y  de la ciencia en  general. Al  regresar al  hotel luego de la primera mañana de activi- dades encontraron a un grupo de niños remontando cometas en  un campo abandonado. Se aproximaron a los niños  y  comenzaron  a conversar.  \"¿Cuántos metros de cuerda acostumbras soltar para remontar  tu cometa?\", preguntó Sebastiani.  \nOCTAVA CARTA  121   \"Más O  menos cincuenta metros\", dijo un niño llamado Gelson.  \"¿Y  cómo calculas  para saber que sueltas  más  o  menos cin- cuenta metros de cuerda?\", indaga Sebastiani.  \"Cada tanto, más o  menos cada dos metros, le hago un nudo a  la cuerda. Cuando la cuerda está corriendo en mi mano voy con- tando los nudos y entonces sé cuántos metros de cuerda suelta  tengo.\"  \" ¿Ya qué altura crees que está la cometa ahora?\", preguntó el  matemático.  \"Cuarenta metros\", dijo el niño.  \"¿Cómo los calculaste?\"  \"Por la cantidad de cuerda que he soltado y la barriga que ésta  ha hecho.\"  \"Podríamos calcular este problema basados en la trigonome- uia o  por semejanza de triángulos\", dijo Sebastiani.  Sin  embargo el  niño dijo:  \"Si  la cometa estuviese  alta,  bien  arriba de mi cabeza, estaría a  los  mismos metros de altura que  los que yo solté de cuerda, pero como está inclinada, lejos de mi  cabeza,  está a  menos metros de altura que los  que yo  solté de  cuerda\".  \"Aquí hubo un razonamiento de grados\", dijo Sebastiani.  A continuación Arguelo pregunta al niño sobre la construcción  del molinete y Gelson le responde haciendo uso de las cuatro ope- raciones fundamentales. Irónicamente, concluye el IlSico,  Gelson  (tan gente como Gelson, digo yo)  había sido reprobado en mate- mática en la escuela. Nada de lo que él sabía tenía valor para la es- cuela porque lo hab;a aprendido con su experiencia, en lo con- creto de su contexto. Él  no hablaba de su saber con el lenguaje  formal y de buenos modales, mecánicamente memorizado, que la  escuela reconoce como el único legítimo.  Una situación peor se  da en el  dominio del lenguaje, en el  que casi nunca se respetan la sintaxis, la ortografía, la semántica  y la prosodia de clase de los niños populares.  Jamás he dicho ni sugerido que los niños de las clases popula- res no deban aprender el llamado \"modelo culto\" de la lengua  \n122  CARTAS A  QUIEN  PRETENDE ENSEÑAR  portuguesa en el Brasil, como a veces se afinna.  Lo  que sí he dicho  es que los problemas del lenguaje siempre abarcan cuestiones  ideológicas y,  con ellas, cuestiones de poder. Por ejemplo, si  hay  un \"modelo culto\" es porque hay otro que es considerado inculto.  ¿Y quién perfiló el inculto como tal? En realidad,  10  que he dicho,  y por  10    que peleo, es que se les enseñe a los niños y a las niñas de  clases populares el modelo culto, pero que  al  hacerlo se destaque:  a]  que su lenguaje es  tan rico y tan bonito como el de  los  que hablan el modelo culto,  razón por la cual  no  tienen por qué avergonzarse de cómo hablan;  b]  que aun así es fundamental que aprendan la sintaxis  y la prosodia  dominante  para que:  1]  disminuyan sus desventajas en la lucha por la vida;  2]  ganen  un  instrumento fundamental  para la lucha  necesaria contra las injusticias y las discriminaciones de  las que son blanco.  Es  pensando y actuando así como me siento coherente con mi  opción progresista, antielitista. No soy de los que estuvieron en  contra de Lula para la presidencia de la república porque soste- nían que el decía \"menos verdad\" y votaron a  Collor, con tanta  verdad de menos.  Concluyendo, la escuela democrática no debe tan sólo estar  abierta permanentemente a  la realidad contextual de sus alum- nos para comprenderlos mejor, para ejercer mejor su actividad  docente, sino también estar dispuesta a aprender de sus relacio- nes con el contexto concreto. De ahí viene la necesidad de, pro- fesándose democrática, ser realmente humilde, para poder reco- nocerse aprendiendo muchas veces con quien ni siquiera se ha  escolarizado.  La  escuela democrática que precisamos  no es aquella en la  que sólo el maestro enseña, en la que el alumno sólo aprende y  el director es el mandante todopoderoso.  \nN  ovena carta   CONTEXTO CONCRETo-CONTEXTO TEÓRICO  En esta carta voy a  tomar como objeto de mi reflexión  no sólo las relaciones que el contexto concreto y el teórico esta- blecen entre sí, sino también los modos como nos comportamos  con cada uno de ellos.  El  sentido  ~  uno de los sentidos principales- que me motiva  a  tratar este tema es el de subrayar la importancia de la  relación   en todo lo que hacemos en nuestra experiencia existencial en  cuanto experiencia social e  histórica.  La  importancia de la rela- ción entre las cosas, de los objetos entre sí,  de las palabras entre  ellas en la composición de las frases y de éstas entre sí en la es- tructura del texto.  La  importancia de las relaciones entre las per- sonas, de la manera como se unen -la agresividad, la amorosi- dad, la indiferencia, el rechazo o  la discriminación subrepticia o  abierta-o Lo importante que resultan, en suma, las relaciones en- tre educandos y educadoras, entre sujetos cognoscentes y obje- tos cognoscibles. Dejemos claro, desde luego, que el objeto de  esta carta no es tratar todo el conjunto de las relaciones que en- sayamos y en que nos involucramos diariamente sino algunas de  ellas, que están englobadas en las que se dan entre  el  contexto  concreto y el teórico.  Creo que una de las afirmaciones que es preciso hacer es que  la  relación    en sí, ya sea en el mundo animado o en el inanimado,  es una condición fundamental de la propia vida y de la vida con  su contrario.  \n124  CARTAS A  QUIEN  PRETENDE ENSEÑAR  Sin embargo, somos los únicos seres capaces de ser objeto y  sujeto de las relaciones que trabamos con los otros y con la his- toria que hacemos y que nos hace y rehace. Las relaciones en- tre nosotros y el mundo pueden ser percibidas críticamente, in- genua o  mágicamente, pero hay en nosotros una conciencia de  ellas en un nivel que no existe entre ningún otro ser vivo  y el  mundo.  Entre nosotros, la  práctica  en el mundo, en la medida en que  comenzamos no sólo a saber que  vivíamos  sino a    saber  que  sabí- amos  y que por  10    tanto podíamos saber más, inició el proceso  de generar el    saber  de la propia práctica.  Es  en este sentido  como por un lado el mundo fue dejando de ser para nosotros  el simple  soporeel    sobre el que estábamos, y por el otro se trans- fonnó o  se ha venido transformando en el  mundo  con el cual  estamos en relación y del que finalmente el simple  mover  en él  se ha convertido en  práctica  en él.  De este modo, la vida se ha  ido transformando en una acción en el  mundo desarrollada  por sujetos que poco a  poco han ido ganando conciencia de  su propio  hacer  sobre el mundo. Fue la práctica la que fundó el  habla sobre ella, y su conciencia generó a  su vez  práctica. No  habría práctica sino un puro  mover  en el mundo si  quienes es- taban  moviendo  en el mundo no se hubiesen hecho capaces de   ir sabiendo    lo  que    hacían  al    mover,    y  para qué    movían.    Fue  la  conciencia del  mover  lo que lo promovió a  la categoría de  prác- tica  e  hizo que ésta necesariamente generase  su propio saber.    En  este sentido la  conciencia  de  la práctica  implica la    ciencia  de la  practica implícita o  anunciada en ella.  De esta forma,  hacer  ciencia es  descubrir,  desvelar  verdades sobre el mundo, los seres  vivos  y  las cosas, que descansaban a  la espera de ser desnuda- das.  Es  darle sentido objetivo a  algo que nuevas necesidades  emergentes de la práctica social plantean a  las mujeres y a  los  hombres.  1 Véase Paulo Freire,  Pedagogía  del  ()j1rimido,    op.    cit.  \nNOVENA CARTA  125  La  ciencia, quehacer humano que se da en la historia que ha- cen mujeres y hombres con su práctica, no es por eso mismo un   a  primi  de la historia.   La  práctica  de la que tenemos conciencia exige y gesta su pro- pia ciencia. Por éso no podemos olvidar las  relaciones entre la  producción, su técnica indispensable y la ciencia.  Una de las  ciencias que más se ha beneficiado con la  producción -según dice Adolfo Sánchez Vázquez- es la  física.  Su nacimiento como tal  es tardío:  en su estado  característico no la conocieron ni la antigüedad griega  ni  la Edad Media.  El  escaso  desarrollo de las  fuerzas  productivas en la sociedad esclavista griega y en el feu- dalismo  determinaban  que  en aquellas  épocas  no se  sintiese la necesidad de crear la física.   La  ciencia física surge en la Edad Moderna con Galileo  Galilei, correspondiendo a las necesidades prácticas de  la industria naciente.2  Destaco la necesidad de que, dentro del contexto teórico, tome- mos distancia de lo concreto en el sentido de percibir cómo se  encuentra implícita su teoría en la práctica ejercida por él, teo- ría que a veces ni sospechamos o  escasamente conocemos.  El  profesor Adao Cardoso, biólogo de la Universidad de Campi- nas, me contó que una vez fue invitado por un joven indígena, del  interior de la Amazonia, a aprender a utilizar el arpón en la pesca.  Respondiendo a la interrogación provocadora del científico que  le preguntaba por qué no le  tiraba el arpón al  pez sino que lo ti- raba entre éste y el costado del barco, el joven respondió: \"No, yo  le tiré  al    pez. Usted no vio  bien porque a veces los ojos mienten\".  El  indígena explicaba el fenómeno de la refracción a su manera,  en el plano de la \"ciencia\" que su práctica le permitía.  2 Adolfo Sánchez Vázquez,    Filosofía  de  la praxis,    Barcelona, Critica,  1980.  \n126  CARTAS A  QUIEN PRETENDE ENSEÑAR  Gracias a  su práctica y a  la práctica de su aldea eljoven indí- gena tenía intimidad con el fenómeno y  lo operaba acertada- mente. Sin embargo, no tenía la razón de ser del fenómeno.  Aún hay algo más que me gustaría comentar en relación con  esos dos contextos y cómo nos comportamos en ellos.  Comencemos por el contexto concreto. Pensemos en los  mo- mentos importantes de un día nuestro en el contexto de lo coti- diano.3  Despertamos, tomamos nuestro baño matinal y salimos  de casa hacia el trabajo. Nos cruzamos con gente conocida o  no.  Obedecemos a los semáforos. Si  están con luz verde, cruzamos la  calle, si están en rojo, esperamos. Hacemos todo eso sin pregun- tarnos ni una sola vez por qué lo hicimos. Nos damos cuenta de  lo que hacemos pero no indagamos las razones por las que lo ha- cemos.  Eso  es  lo que caracteriza nuestro operar en  el    mundo  concreto de lo cotidiano. Actuamos en él con una serie de  sabe- res    que al haber sido aprendidos a  lo largo de nuestra sociabili- dad se  convirtieron en    hábitos    automatizados. Y por actuar así  nuestra mente no funciona epistemológicamente. Nuestra curio- sidad no se \"activa\" para la búsqueda de las razones de ser de los  hechos. Simplemente se cree capaz de percibir que algo no suce- dió como era de esperarse o  que se procesó de modo diferente.  Es  capaz de  avisarnos  bien  pronto,  casi  instantáneamente, de  que algo está equivocado.  Si  andamos un poco más, veremos cómo nos movemos en el   contexto  concreto  de nuestro trabajo, en el que las relaciones entre  la  práctica  y el  saber  de la  práctica  son indicotomizables. Pero aun  siendo así,  dentro del contexto práctico, concreto, no actuamos  todo el tiempo como epistemológicamente curiosos.  Hacemos  las  cosas  porque  tenemos ciertos  hábitos de  hacerlas.  Incluso  asumiendo la curiosidad típica de quien busca la razón de ser  de las cosas, con mayor frecuencia que en la situación descrita  de la experiencia de lo cotidiano, la mayor parte del tiempo no  3 Véase Karel  Kosik,    Dialéctica  de    lo  C(meTeto,    México, Grijalbo.  1973.  \nNOVENA CARTA  127   lo hacemos. El  ideal de nuestra fonnación pennanente está en  que nos convenzamos de, y  nos preparemos para, el uso más  sistemático de nuestra curiosidad epistemológica.  La cuestión central que se nos plantea a  nosotros, educadoras  y educadores, en el capítulo de nuestra fonnación pennanente,  es la de cómo hacer para, partiendo del  contexto  te6rico  y tomando  distancia de nuestra  práctica,  desentrañar de ella su propio saber,  la   ciencia en la que se funda.  En otras palabras, cómo desde el  con- texto  teórico  \"tomamos distancia\" de nuestra práctica y nos hacemos  epistemológicamente curiosos para entonces aprehenderla en su  razón de ser.  Es revelando lo que hacemos de  tal  o  cual fonna como nos co- rregimos y  nos perfeccionamos a  la luz del conocimiento que  hoy nos ofrecen la ciencia y la filosofía.  Eso es lo que llamo pen- sar la práctica, y es pensando la práctica como aprendo a pensar  y a practicar mejor. Y cuanto más pienso y actúo así, más me con- venzo, por ejemplo, de que es imposible que enseñemos conte- nidos sin saber cómo piensan los alumnos en su contexto real,  en su vida cotidiana; sin saber lo que ellos saben independiente- mente de la escuela, para ayudarlos, por un lado a  saber mejor  lo que ya saben, y por el otro lado para enseñarles, a  partir de  ahí, lo que aún no saben.  No podemos dejar de considerar las condiciones materiales  desfavorables que experimentan muchos alumnos de las escue- las de la periferia de la ciudad, lo precario de sus viviendas, las  deficiencias de su alimentación, la falta de actividades de lec- tura de la palabra en su vida cotidiana, de estudio escolar,  su  convivencia con la violencia y con la muerte, de la que casi siem- pre se vuelven íntimos. Generalmente, todo esto es tomado en  consideración pocas veces,  no sólo por la escuela básica o  de  primer grado sino también por las  escuelas de formación  de  maestros.  Sin  embargo,  esta  situación  desempeña  un  papel  enonne en la vida de los Carlos, de las Marias, de las Cánnenes, e  innegablemente marca la  manera cultural  de  estar siendo  de  esos niños.  \n128  CARTAS A  QUIEN PRETENDE ENSEÑAR  Cierta vez me buscó -cosa que sucede de vez  en cuando- un  grupo de jóvenes que concluían la carrera de magisterio en una  escuela de  San  Pablo.  Eran jóvenes de clase media con buenas condiciones de vida.  Se declaraban asustadas, casi como si  estuviesen siendo amenaza- das, por la posibilidad de asumir, más temprano o más tarde,  al-  guna clase en una escuela de la periferia.  \"Hemos hecho  todo  el  curso sin  que jamás se  nos haya ha- blado sobre lo que es una favela,  de los niños y niñas de las fave- las. Lo que sabemos de esas zonas de la ciudad, ya sea por los pe- riódicos  o  por  la  televisión,  es  que  son  escenario  de  la  más  absoluta violencia y que los niños pronto se transfonnan en mar- ginales\", me decían ellas.   Las  jóvenes me hablaban de la favela como si ella se crease a sí  misma y no como el resultado de la lucha por la supervivencia a  la que las injustas estructuras de una sociedad perversa empujan  a  los \"expulsados de la vida\".  Me hablaban de la favela como el  rincón del desvío ético y como el lugar de los perdidos. Y me ha- blaban casi sin esperanza de los niños y niñas de las favelas.  Frente a todo esto, yo  por lo menos, no veo otro camino para  caminar con mi legítima rabia, con mi justa ira y con mi indigna- ción necesaria, que el de la lucha político-democrática de la que  puedan ir resultando las transfonnaciones indispensables en la  sociedad brasileña, sin las cuales este estado de cosas se agrava,  en lugar de desaparecer.  Por eso es que, para mí, las grandes obras no son los túneles  que atraviesan la ciudad de un lado al otro ni los verdes parques  colocados en las  zonas felices.  También son todo eso,  siempre  que se le dé prioridad  al    trabajo por la humanización de la vida  de quienes han sido impedidos de ser desde la \"invención\" del  Brasil:    las clases populares.   En el contexto teórico, el de la fonnación permanente de la  maestra, es indispensable la reflexión critica sobre los condicic:r  namientos que el contexto cultural ejerce sobre nosotros, sobre  nuestro modo de actuar,  sobre nuestros valores.    La  influencia  \nNOVENA CARTA  129   que  ejercen  sobre  nosotros  nuestras  dificultades  económicas,  cómo pueden obstaculizar nuestra capacidad de aprender aun- que carezcan de poder para \"abonicarnos\". El contexto teórico,  fonnador, jamás puede transfonnarse en un contexto del puro   hacer,    como a  veces se piensa ingenuamente. Al  contrario, es el  contexto del  quehacer,    de la praxis, vale decir, de la  práctica  y  de la   teoría.   La dialéctica entre la práctica  y  la teoría debe ser plenamente vi- vida en los contextos teóricos de la fonnación de cuadros.  Esa  idea  de que es  posible fonnar a una educadora  en    la  práctica  enseñán- dole cómo decirles \"buen día\" a sus alumnos, enseñándole a guiar  la mano del educando en el trazo de una línea, sin ninguna convi- vencia seria con la teoría, es tan científicamente equivocada como  la de hacer discursos o    perora~  teóricas sin tomar en considera- ción la realidad concreta, ya sea la de las maestras o la de las maes-  tras y  sus alwnnos. Esto quiere decir: no respetar el contexto de la  práctica que explica la manera como se practica, de la que resulta  el saber de la propia práctica;  desconocer que el discurso  teó- rico, por más correcto que sea, no puede superponerse al    saber   generado en la  práctica  de otro contexto.  Todo  esto  implica  una  comprensión  errónea  de  la  propia  práctica de la teoría. Los  paquetes  a los que me referí en una carta  anterior son un excelente ejemplo de esta comprensión errónea  de  la  práctica  y    de  la  teoría.  Un  ejemplo  excelente  de  cómo  hasta los progresistas pueden actuar reaccionariamente.  Hace cuarenta años, cuando era director de Educación del Ser- vicio Social de la Industria de Pernambuco, SESI,4 una de las luchas  en las  que me había empeñado era la de enfrentar la insistencia  con que los padres  y las  madres proletarios nos exigían que sus hi- jos aprendiesen a  leer desde el abecé: a  partir del alfabeto, de  las  letras.  y    no de las frases  que implican palabras en relación  dentro de la estructura del pensamiento.  4 Véase Ana María Freire, nota en  Pedagogía  de  la  esperanza,  qp.  cit.  \n130  CARTAS A  QUIEN PRETENDE ENSEÑAR  \"Fue así,  con el mapa del abecé en la mano, memorizando las  letras, como aprendieron todas las personas que conozco que sa- ben leer.  Mi  abuelo aprendió asÍ.  Mi  padre aprendió así.  Y yo  también. ¿Por qué mi hijo no?\", me decían casi a  coro en los lla- mados  círculos  de padres  y  maestros  que yo coordinaba. Fue partici- par en aquellos encuentros, en aquellos debates, lo que por un  lado me permitió ir tomando conocimiento de que la práctica  social de la que formamos parte va  generando un saber propio,  y por el otro, de que el \"saber de experiencia hecho\" debe ser  respetado. Aún más, su superación pasa por él.  Todavía me acuerdo de cómo fui aprendiendo a ser coherente  y que la coherencia no es connivencia. Por un lado yo  ya defen- día en aquella época el derecho de las familias a la participación  en el debate de la propia política educativa de la escuela, pero  por el otro reconocía mucho desacierto por parte de los padres,  como por ejemplo la exigencia de que alfabetizáramos a  los ni- ños a  partir de las letras, o  las constantes solicitudes de que fué- semos duros con los  niños.  Muchos de los padres decían: \"Los  golpes son los que hacen macho al  hombre. El  castigo es lo que  hace que los  niños aprendan\". Estas ideas, o  algunas de ellas, a  veces eran compartidas por los maestros que en la intimidad de  su cuerpo \"alojaban\" la ideología autoritaria dominante. En el  fondo,  tanto  (o casi  tanto)  como los  padres, algunas maestras  sentían miedo y odio por la libertad, miedo de los educandos, y  se cerraban para no percibir todo lo que hay de demandante en  el  proceso  de  conocer,  pero  también  de  apasionante,  gratifi- cante y provocativo en la alegria.  Mi  paso por el SESI  fue un tiempo de profundo aprendizaje.  Aprendí por ejemplo que mi coherencia no radicaría en aten- der, por un lado, a  los padres y a las madres que nos exigían los  desaciertos referidos, ni, por el otro, callarlos con, por lo me- nos, el poder de nuestro discurso. No podríamos por un lado  rechazarlos diciendo un  no  contundente a  todo, diciendo que  no era científico, ni aceptar todo para dar ejemplo de respeto  democrático.  No  podíamos  ser  \"tibios\".  Precisábamos  dar  \nNOVENA CARTA  131   apoyo a  sus iniciativas ya que los habíamos invitado y les habí- amos dicho que tenían derecho a  opinar, a  criticar, a  sugerir.  Pero por otro lado no podíamos decirles a  todo que  sí.    La sa- lida  era  político-pedagógica.  Era  el  debate,  la  conversación  sincera con que buscaríamos aclarar nuestra posición frente a  sus pleitos.  Ahora tengo en la memoria la cara de espanto, de sorpresa, de  interés, de curiosidad, de la enonne mayoría de esas madres y  padres de todas las escuelas que manteníamos, cuando les pedí,  durante las  sesiones de nuestros círculos de padres y maestras,  que me dijesen si  conocían algún niño que hubiese aprendido a  hablar diciendo F,  L,  M.  Luego de un cierto silencio,  entrecortado por risas  indecisas,  luego de algunos gentiles codazos en los  brazos de los  vecinos,  como quien dice \"a ver tú\", uno de ellos dijo con la aprobación de  los demás: \"Yo  por lo menos  ya    he visto a muchos niños aprender  a hablar pero nunca  vi  que ninguno de ellos comenzara diciendo  letras. Siempre empiezan diciendo  mamá,  pan,  na,  quiero\".   Entonces me gustaría que pensáramos en lo siguiente: muje- res y hombres cuando son niños no empiezan a hablar con letras  sino con  palaúras  que equivalen a  frases  (cuando el bebé llora y  dice  \"mamá\",  está queriendo decir:  \"Mamá,  tengo hambre\" o  \"mamá, estoy mojado\"). Estas palabras con las que los bebés co- mienzan a  hablar se llaman \"frases monopalábricas\", es decir,  frases de o  con una sola  palabra.    Pues bien, si  es así como todos  comenzamos a  hablar, ¿cómo es que entonces en el momento  de aprender a  leer y escribir debemos comenzar a  través de la   memorización  de las letras?  En rigor,  nadie le enseña a  hablar a  nadie. Uno aprende en el  mundo, en la propia casa,  en la sociedad, en la calle, en el ba- rrio, en la escuela. El  habla, el lenguaje propio, es una adquisi- ción. Uno aprende el habla socialmente. El  habla viene mucho  antes que la escritura, así como cierta \"escritura\" o el anuncio de  ella viene mucho antes de lo que nosotros llamamos escritura.  y  del mismo modo que para hablar es necesario hablar, para  \n132  CARTAS A  QUIEN PRETENDE ENSEÑAR  escribir  es  necesario  escribir.  Nadie  escribe  si  no escribe,  del  mismo modo que nadie aprende a caminar sin caminar.  Por eso  mismo debemos estimular lo más posible  a  los  niños  para que hablen y para que escriban. Es de los garabatos, una indis- cutible forma de escritura que debemos elogiar, de donde ellos  parten hacia la escritura que debe ser estimulada. Que escriban,  que cuenten sus historias, que las inventen y que reinventen los  cuentos populares de su contexto.  Fue  con  pláticas  más  o  menos  de  este  estilo  como  fuimos  transformando los círculos de padres y maestros en un  contexto  teórico    en el que buscábamos la razón de ser de las cosas.  Me acuerdo de una conversación que tuve en particular con  una madre angustiada. Me habló de su niño de diez años al que  consideraba \"imposible\", \"pendenciero\", desobediente, \"diabó- lico\", insoportable.  \"La  única salida que me queda es amarrarlo  al tronco de un árbol en el fondo de la casa\", concluyó con cara  de quien estaba atarldo al niño en aquel instante. Y yo le dije:  ¿Por qué no cambia usted un poco su forma de castigar?  Observe que no le digo que acabe de una vez con el cas- tigo.  Pedrito hasta se  extrañaría si  a  partir de mañana  usted no hiciese nada para castigarlo.  Sólo le digo que  cambie el castigo. Elija alguna manera de hacerlo sentir  que usted rechaza cierto comportamiento de él.  Pero a  través de una forma menos violenta. Por otro lado usted  primero necesita ir demostrándole a  Pedrito que usted  lo ama y segundo que él tiene derechos y deberes. Tiene  derecho a jugar, por ejemplo, pero tiene el deber de res- petar a los otros. Tiene derecho a  pensar que estudiar es  aburrido, cansado, pero también tiene el deber de cum- plir con sus  obligaciones.  Pedrito precisa    límites    como  todos nosotros.  Nadie puede hacer lo  que quiere.  Sin   límites,    la vida social sería imposible.  Pero no es amarrando a Pedrito, o recitándole un  sermón   diario sobre los \"errores\" que ha cometido, como usted  \nNOVENA  CARTA  133  va a ayudar a su hijo a ser mejor. Para eso es preciso cam- biar poco a  poco la fonna  de  ser o  de  estar siendo  dentro de su propia casa. Es  preciso ir cambiando las  relaciones con Pedrito para que le cambie la vida a  él  también. Es  preciso vencer la dificultad de conversar  con él.  El  padre de Pedrito había abandonado el hogar hacía un año.  La madre trabajaba duramente lavando ropa de dos o tres familias  con ayuda de una hermana más joven. Cuando nos despedimos  me apretó la mano. Parecía tener esperanza.  Un mes más tarde ella estaba en la primera fila del salón en la  reunión de padres  y  maestros. En la mitad de la reunión se puso  de pie para defender la moderación de los castigos, la  mayor to- lerancia de los padres, la conversación más amistosa entre ellos  y   sus  hijos,  aunque reconociese cuán difícil  era esto en muchas  ocasiones, considerando las dificultades concretas de sus vidas.  A la salida me apretó la mano y me dijo:  \"Gracias. Ya  no uso el  tronco\". Sonrió segura de sí misma  y  se fue entre las otras madres  que también  d~jaban  la escuela.  Como contexto práctico-teórico, la escuela no puede prescin- dir del conocimiento de lo que sucede en el  contexto concreto  de sus alumnos y de sus familias.  ¿Cómo podemos entender las  dificultades durante el proceso de alfabetización de los alumnos  sin saber lo que sucede en su experiencia en casa,  así como en  qué medida es o  viene siendo escasa la convivencia con  palabras  escritas  en su contexto sociocultural?  Una cosa es el niño hijo de intelectuales que ve  a  sus  padres  ejercitando la lectura  y  la escritura,  y  otra es  el niño de padres  que no leen la  palabra  y que, a  lo sumo, no ven más que cinco o  seis carteles de propaganda electoral y uno que otro comercial.  Cuando fui secretario municipal de Educación del gobierno  de Luiza Erundina (1989-1991)  en San Pablo, durante una de las  tantas entrevistas que di propuse la posibilidad de que alguna em- presa aceptase la idea de \"plantar frases\"  en lugares significativos  \n134  CARTAS A  QUIEN  PRETENDE ENSEÑAR  de localidades iletradas, bajo la orientación pedagógica de la Se- cretaria.  La  intención era provocar la curiosidad de los niños y  de los adultos. Se trataba de frases que tuviesen que ver con la  práctica social de la zona y que no le fuesen extrañas. Frases que  también serian aprovechadas por las escuelas de los alrededores  de la zona de la experiencia.
