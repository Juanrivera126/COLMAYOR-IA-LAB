rcibir sus relaciones con los otros objetos. Implica que  el estudioso, sujeto del estudio, se  arriesgue,  se  aventure, sin  lo  cual no crea ni recrea.  También por eso es que  enseñar  no puede ser un simple pro- ceso,  como he dicho tantas veces,  de transferencia de conoci- mientos del educador al aprendiz. Transferencia mecánica de la  que resulta la memorización mecánica que  ya  he criticado. Al es- tudio critico corresponde una enseñanza también critica,  que  necesariamente requiere una forma critica de comprender y de  realizar la lectura de la palabra y la lectura del mundo, la lectura  del texto y la lectura del contexto.  Esta forma critica de comprender y de realizar la lectura de  la   palabra y  la  lectura del mundo está, por un lado, en la no negación  del lenguaje simple, \"desarmado\", ingenuo; en su no desvaloriza- ción por estar conformado por conceptos creados en lo cotidiano,  en el mundo de  la  experiencia sensorial; y por el otro lado, en el re-  chawde  lo que se llama \"lengu.ye dificil\", imposible porque se des- arrolla  alrededor  de  conceptos  abstractos.  Por  el  contrario,  la  forma critica de comprender y de realizar la lectura del texto y la  del contexto no excluye ninguna de las dos formas de lenguaje o  de sintaxis. Reconoce incluso que el escritor que utiliza el lenguaje  científico, académico,  al  tiempo que debe tratar de ser más accesi- ble, menos cerrado, más claro, menos dificil, más simple, no puede  ser simplista.  Nadie que lea, que estudie, debe abandonar la lectura de un  texto por considerarlo dificil, por el hecho de no haber enten- dido, por ejemplo,  lo que significa la palabra  epistemología.  \nPRIMERA CAllTA    53  Así como un albañil no puede prescindir de un conjunto de  instrumentos de trabajo, sin los cuales no levantani las paredes de   la  casa que está construyendo, del mismo modo el lector estu- dioso precisa de ciertos instrumentos fundamentales sin los cua- les no puede leer o  escribir con eficiencia.  Diccionarios,2 entre  ellos el etimológico, el filosófico,  el de sinónimos y antónimos;  manuales de conjugación de los verbos, de los sustantivos y adje- tivos;  enciclopedias; lectura comparativa del texto de otro autor  que trate el mismo tema y cuyo lenguaje sea menos complejo.  Usar  estos  instrumentos  de  trabajo  no  es  una  pérdida  de  tiempo, como muchas veces se piensa. El  tiempo que yo utilizo,  cuando leo y escribo o  cuando escribo y leo, consultando enci- clopedias y diccionarios, leyendo capítulos o  trozos de libros que  pueden  ayudarme  en  un  análisis  más  crítico  de  un  tema,  es  tiempo fundamental de mi trabajo, de mi oficio placentero de  leer o  de escribir.  Como lectores no tenemos derecho a esperar, mucho menos a  exigir, que los escritores realicen su tarea -la de escribir- y casi  la   nuestra -la de comprender lo escrito--, explicando lo que quisie- ron decir con esto o con aquello a cada paso en el texto o en una  nota al pie de la página. Su deber como escritores es escribir de  un modo simple,  escribir  ligero,    es facilitar,  no dificultar la com- prensión del lector, pero no es darle las cosas hechas y prontas.  La comprensión de lo que se está leyendo o estudiando no su- cede repentinamente como si  fuera  un milagro.  La compren- sión es trabajada, fOIjada  por quien lee, por quien estudia, por  quien, al ser el sujeto de ella, debe instrumentarse para hacerla  mejor.  Por eso mismo  leer,    estudiar,    es  un trabajo paciente, des- afiante, persistente. No es tarea para gente demasiado apresu- rada o  poco humilde que, en vez de asumir sus deficiencias, pre- fiere transferirlas al autor o  a  la autora del libro considerando  que es imposible estudiarlo.  2 Véase Paulo Freire,  Pedagugía  de  la  esperanza,    qp.    cit.  \n54  CARTAS A  QUIEN  PRETENDE ENSEÑAR  También hay que dejar bien claro que existe una relación ne- cesaria entre el nivel del contenido del libro y el nivel de capaci- tación actual del lector. Estos niveles abarcan la experiencia inte- lectual del autor y del lector.  La  comprensión de lo que se lee  tiene que ver con esa relación. Cuando la distancia entre esos ni- veles es demasiado grande, cuando uno no tiene nada que ver  con el otro, todo esfuerzo en búsqueda de la  comjmmsiim  es inútil.  En este  caso,  no se  está dando  la  consonancia entre  el  trata- miento indispensable de los temas por parte del autor del libro y  la capacidad de aprehensión, por parte del lector, del lenguaje  necesario para este tratamiento. Es por esto que estudiar es una  preparación para conocer, es un ejercicio paciente e impaciente  de quien, sin pretenderlo todo de una sola vez,  lucha para  hacerse  la  oportunidad  de conocer.  El tema del uso necesario de instrumentos indispensables para  nuestra lectura y para nuestro trabajo de escribir trae a colación el  problema del poder adquisitivo del estudiante y de las maestras y  maestros, en vista de los costos elevados para obtener diccionarios  básicos de la lengua, diccionarios filosóficos,  etc. Poder consultar  este material es un derecho que tienen todos los  alumnos y los  maestros, al que corresponde el deber de las escuelas de hacerles  posible la consulta, equipando o creando sus bibliotecas con hora- rios realistas de estudio. Reivindicar este material es un derecho y  un deber de los profesores y de los estudiantes.  Me  gustarla  retomar  algo  a  lo  que  hice  referencia  anterior- mente: la relación entre leer y escribir, entendidos como procesos  que no se pueden separar, como procesos que deben organizarse  de  tal  modo que    ambos    sean  percibidos como necesarios  para  algo, como algo que el niño necesita -como resaltó Vygotsky_,3 y  nosotros también.  3 Luis C.  Moll  (comp.),    V.vgotsky  and education.  Instructional implicati07ls  and  applications  o/ sociohistorical  psychology,  Cambridge,  Cambridge  University Press,  1992.  \nPRIMERA CARTA  55  En primer lugar, la oralidad antecede a la grafia, pero la trae  en sí desde el primer momento en que los seres humanos se volvie- ron socialmente capaces de ir expresándose a  través de símbolos  que decían algo de sus sueños, de sus miedos, de su experiencia  social, de sus esperanzas, de sus prácticas.  Cuando aprendemos a    leer,    lo hacemos sobre lo escrito por  alguien  que antes aprendió a  leer y  a  escribir.  Al  aprender a  leer nos preparamos para, a continuación, escribir el habla que  . socialmente consttuimos.  En  las  culturas letradas,  si  no se  sabe leer ni escribir,  no se  puede estudiar, tratar de conocer, aprender la sustantividad del  objeto, reconocer críticamente la razón de ser del objeto.  Uno de los errores que cometemos es el de dicotomizar el    leer   y el    escribir,    y desde el comienzo de la experiencia en la que los  niños ensayan sus primeros pasos en la práctica de la lectura y de  la escritura,  tomamos estos  procesos como algo  desconectado  del proceso general del conocer. Esta dicotomía entre leer y es- cribir nos acompaña siempre, como estudiantes y como maes- tros. \"Tengo una enorme dificultad para hacer mi tesis.  No  sé es- cribir',    es la afirmación común que se  escucha en los cursos de  posgrado en los que he participado. En el fondo, esto lamenta- blemente revela cuán lejos estamos de una comprensión crítica  de lo que es estudiar y de lo que es enseñar.  Es  preciso que  nuestro  cuerpo,  que se  va  haciendo  social- mente  actuante,  consciente,  hablante,  lector  y  \"escritor\",  se  adueñe de manera crítica de su forma de ir siendo lo que  es  parte de su naturaleza, constituyéndose histórica y socialmente.  Esto quiere decir que es necesario no sólo que nos demos cuenta  de  cómo estamos  siendo,  sino que  nos  asumamos  plenamente  como esos \"seres programados para aprender\" de los que nos ha- bla Franc;:oisJacob.4 Resulta necesario, entonces, que aprendamos  4 Fran.;oisJacob, \"Nous sornrnes prograrnmés mais pour apprendre\",   Le Courrierde L'UNESCO,    París, febrero de 1991.  \n56  CARTAS A  QUIEN PRETENDE ENSEÑAR  a aprender, vale decir, que entre otras cosas le demos al lenguaje  oral y escrito, a su uso, la importancia que le viene siendo reco- nocida científicamente.  A los que estudiamos, a los que enseñamos --r  por eso también  estudiamos- ese lenguaje se  nos impone junto con la necesaria  lectura de textos, la redacción de notas, de fichas de lectura,  la  r~   dacción de pequeños escritos sobre las lecturas que realizamos; en  el contacto con buenos escritores, buenos novelistas, buenos  ~   tas,  científicos, filósofos,  que no temen trabajar su lenguaje en la  búsqueda de la belleza, de la simplicidad y de la claridad.5  Si  nuestras escuelas, desde la más tierna edad de sus alumnos,  se entregasen al trabajo de estimular en ellos el gusto por la lec- tura y la escritura, y si  ese gusto continuase siendo estimulado  durante todo el tiempo de su escolaridad, posiblemente habría  un número bastante menor de posgraduados hablando de su in- seguridad o de su incapacidad para escribir.  Si  estudiar no fuese  para nosotros casi  siempre una  carga,    si  leer no fuese una obligación amarga que hay que cumplir, si  por  el contrario estudiar y leer fuesen fuente de alegría y placer, de  la que surge también el conocimiento indispensable con el cual  nos movemos mejor en el mundo, tendríamos índices que  rev~   larían una mejor calidad en nuestra educación.   Es    éste un esfuerzo que debe comenzar con los preescolares,  intensificarse en el período de la alfabetización  y  continuar sin  detenerse jamás.  La lectura de Piaget, de Vygotsky,  de Emilia Ferreiro, de Mada- lena F.  Weffort, entre otros, así como la lectura de especialistas  que no tratan propiamente de la alfabetización sino del proceso  de lectura, como Marisa Lajolo y Ezequiel T.  da Silva, son de im- portancia indiscutible.  Pensando en la relación de intimidad entre pensar, leer y es- cribir,  y  en la necesidad que tenemos de vivir intensamente esa  5 Véase Pau\\o Freire,  Pedagogía    tU  la  esperanz.a,  op.  cit.  \nPRIMERA CARTA  57  relación, yo sugeriría a quien pretenda experimentarla rigurosa- mente que se  entregue a  la tarea de escribir algo por lo menos  tres veces por semana. Una nota sobre una lectura, un comenta- rio  sobre  algún  suceso  del  cual  tomó  conocimiento  por  la  prensa, por la televisión, no importa. Una carta para un destina- tario inexistente. Resulta muy interesante fechar los  pequeños  textos y guardarlos para someterlos a  una evaluación crítica dos  o  tres meses después.  Nadie escribe si  no escribe, del mismo modo que nadie nada  si  no nada.   A!  dejar claro que el uso del lenguaje escrito, y por lo tanto de  la lectura, está en relación con el desarrollo de las  condiciones  materiales de la sociedad, estoy subrayando que mi posición no  es  idealista.   Rechazando cualquier interpretación  mecanicista  de la  histuria,   rechazo igualmente la  idealista.    La  primera reduce la conciencia  a la mera copia de las estructuras materiales de la sociedad, la se- gunda somete todo al todopoderosismo de la conciencia. Mi    ~   sición es otra. Entiendo que esas relaciones entre la conciencia y  el mundo son dialécticas.6  Pero lo que no es correcto es esperar que las transformaciones  materiales se procesen para después comenzar a  enfrentar co- rrectamente el problema de la lectura y de la escritura.  La lectura crítica de los textos y del mundo tienen que ver con  su cambio en proceso.   6lbid.  \n\nSegunda  carta  NO PERMITA Q.UE  EL MIEDO A  LA DIFICULTAD  LO PARALICE  Creo que el mejor punto de partida para este tema es  considerar la cuestión de la dificultad, la cuestión de lo difícil  y   el miedo que provoca.  Se dice que alguna cosa es dificil cuando el hecho de enfren- tarla u  ocuparse de ella se convierte en algo  penoso, es  decir,  cuando presenta algún obstáculo. \"Miedo\", según la definición  del Diccionario Aurélio, es un \"sentimiento de inquietud frente  a la idea de un peligro real o  imaginario\". Miedo de enfrentar la  tempestad. Miedo de la soledad. Miedo de no poder franquear  las dificultades para finalmente entender un texto.  Siempre existe una relación  entre el miedo  y    la dificultad,  entre el miedo  y  lo  difícil.    Pero en esta relación evidentemente  se encuentra también la figura del sujeto que tiene  miedo    de  lo   difícil  o  de la  difuultad.    El sujeto que le  teme  a  la tempestad, que  le  teme  a la soledad o    teme  no conseguir franquear las dificultades  para entender finalmente  el texto,  o  producir la inteligencia  del texto.  En esta relación entre el sujeto que  teme  y  la situación u  objeto  del  miedo  existe además otro elemento constitutivo que es el sen- timiento de  inseguridad  del sujeto temeroso. Inseguridad para en- frentar el obstáculo. Falta de fuerza física, falta de equilibrio emo- cional, falta de competencia científica, ya  sea real o  imaginaria,  del sujeto.  \n60  CARTAS A  QUIEN PRETENDE ENSEÑAR   La    cuestión  que  aquí se  plantea  no  es  negar  el    müdo.    Aun  cuando el peligro que lo genere sea ficticio,  el  miedo en sí,  sin  embargo, es concreto.  La  cuestión que se presenta es la de no per- mitir que nos paralice o  nos persuada de desistir fácilmente, de  enfrentar la situación desafiante sin lucha y sin esfuerzo.  Frente al  miedo, sea de lo que fuera, es preciso que primera- mente nos aseguremos con objetividad de la existencia de las ra- zones que nos lo provocan.  En una segunda instancia,  si  éstas  existen realmente, que las comparemos con las  posibilidades de  las  que  disponemos  para  enfrentarlas  con  probabilidades  de  éxito. Y por último, que pensemos qué podemos hacer para, si  éste es el caso, aplazar el enfrentamiento del obstáculo y volver- nos más capaces de hacerlo mañana.  Con estas reflexiones quiero subrayar que lo  dificil  o  la    dificulr  tad  están siempre relacionados con la capacidad de respuesta del  sujeto que, frente a  lo dificil y a  la evaluación de sí mismo en  cuanto a la capacidad de respuesta, tendrá más o  menos  miedo  o  ningún  müdo  o    miedo  infundado o, reconociendo que el desafio  sobrepasa los límites del miedo, se  hundirá en el  Pánico.    Éste es  el estado de espíritu que paraliza al sujeto frente a  un desafio  que reconoce sin ninguna dificultad como absolutamente supe- rior a cualquier intento de respuesta: tengo miedo de la soledad  y me siento en  Pánico  en una ciudad asolada por la violencia de  un terremoto.  Aquí me gustaría ocuparme solamente de las  reflexiones en  tomo  al    miedo  de no comprender un texto de cuya inteligencia  precisamos en el proceso de conocimiento en el que estamos in- sertos  en  nuestra  capacitación.  El  miedo  paralizante  que  nos  vence aun antes de intentar, más enérgicamente, la comprensión  del texto.  Si  tomo un texto cuya comprensión debo trabajar,  necesito  saber:  al  si  mi  capacidad de  respuesta  está a  la altura del  desafio, esto es, del texto que debe ser comprendido;  \nSEGUNDA CARTA    61   b]    si mi capacidad de respuesta es menor, o  c]  si  mi capacidad de respuesta es mayor.  Si  mi capacidad de respuesta es  menor,    no puedo ni debo permi- tir que mi  miedo  de no entender me paralice y que, considerando  mi tarea como imposible de ser realizada, simplemente la aban- done. Si mi capacidad de respuesta es menor que las dificultades  de comprensión del texto, debo tratar de superar por lo menos  algunas  de  las  limitaciones  que  me  dificultan  la  tarea  con  la  ayuda de alguien, y no sólo con la ayuda del profesor o  la profe- sora que me indicó la lectura. A veces  ésta exige alguna convi- vencia anterior con otro que nos prepara para un paso posterior.  Uno de los errores más terribles que podemos cometer mien-  tras  estudiamos, como alumnos o  maestros, es retroceder frente  al primer obstáculo con que nos enfrentamos, no asumir la res- ponsabilidad que nos impone la tarea de estudiar, como se im- pone cualquier otra tarea a  quien deba realizarla.  Estudiar es un quehacer exigente en cuyo proceso se da una  sucesión de dolor y placer, de sensación de victoria, de derrota,  de dudas y alegría. Pero por lo mismo estudiar implica la forma- ción de una disciplina rigurosa que forjamos en nosotros mismos,  en nuestro cuerpo consciente. Esta disciplina no puede semos  dada ni impuesta por nadie -sin que eso signifique desconocer la  importancia del  papel del educador en su creación-o  De cual- quier manera, o  somos sujetos de ella, o  ella se vuelve una mera  yuxtaposición a nuestro ser. O  nos adherimos al estudio como un  deleite y lo asumimos como una necesidad y un placer o  el estu- dio es una pura carga, y como tal, lo abandonamos en la primera  esquina.  Cuanto más asumimos esta disciplina tanto más nos fortalece- mos  para  superar algunas amenazas que la acechan y que acechan,  por lo tanto, a la capacidad de estudiar eficazmente.  Una de esas amenazas, por ejemplo, es la concesión que nos  hacemos  a  nosotros  mismos  de  no  consultar  ningún  instru- mento auxiliar de trabajo como diccionarios, enciclopedias, etc.  \n62  CARTAS A  QUIEN PRETENDE ENSEÑAR  Deberíamos incorporar a nuestra disciplina intelectual el hábito de  consultar estos instrumentos a    tal  punto que sin ellos nos resulte  dificil estudiar.  Huir frente a  la primera dificultad es permitir que el  miedo  de    no llegar a  un buen fin  en el  proceso de inteligencia del  texto nos paralice. De ahí a  acusar al autor o  a  la autora de in- comprensible existe solo un paso.  Otra amenaza al estudio serio, que se transforma en una de las  fonnas más negativas de huir de la superación de las dificultades  que enfrentamos y ya no del texto en sí mismo, es la de  proclamar  la  ilusión de que estamos entendiendo, sin  poner a  pmeba nuestra  afinnación.  No  tengo  por qué  avergonzanne  por el  hecho de  no estar  comprendiendo algo que estoy leyendo. Sin embargo, si  el texto  que  no estoy comprendiendo fonna parte de una relación bi- bliográfica que es vista como fundamental, hasta que yo  lo per- ciba y concuerde o  no con que es realmente fundamental debo  superar las dificultades y entender el texto.  No es exagerado repetir que el leer, como estudio, no es pasear  libremente por las frases,  las oraciones y las  palabras sin ninguna  preocupación por saber hacia dónde ellas nos pueden llevar.  Otra amenaza para el cumplimiento de la tarea dificil y  pla- centera de estudiar, que resulta de la falta de disciplina de  la  que ya  he hablado, es la tentación que nos acosa, mientras leemos, de de- jar  la  página impresa y volar  con la imaginación  bien  lejos.  De  pronto, estamos físicamente con  el  libro frente a  nosotros y lo lee-   •  mos apenas maquinalmente. Nuestro cuerpo está aquí pero nues- tro gusto está en una playa tropical y distante. Así es realmente  imposible estudiar.  Debemos estar prevenidos para el hecho de que pocas veces  un texto se entrega fácilmente a la curiosidad del lector. Por otro  lado, no es cualquier curiosidad la que penetra o se adentra en  la intimidad del texto para desnudar sus verdades, sus misterios,  sus  inseguridades, sino la curiosidad epistemológica -la que al  tomar distancia del objeto se \"aproxima\" a  él con el ímpetu y  el  \nSEGUNDA CARTA  63  gusto de descubrirlo-. Pero esa curiosidad fundamental no es su- ficiente.  Es  preciso que al servirnos de ella, que nos \"aproxima\"  al texto para su examen, también nos demos o  nos entreguemos  a él. Para esto es igualmente necesario que evitemos otros  miedo.s   que el    cientificismo    nos ha inoculado. Por ejemplo, el    miedo    de  nuestros sentimientos, de nuestras emociones, de nuestros de- seos, el miedo de que nos echen a  perder nuestra cientificidad.   Lo  que yo sé,  lo sé con todo mi cuerpo: con mi mente critica,  pero también con mis sentimientos, con mis intuiciones, con mis  emociones. Lo que no puedo hacer es detenerme satisfecho en  el nivel de los sentimientos, de las emociones, de las intuiciones.  Debo someter a  los objetos de mis intuiciones a  un tratamiento  serio, riguroso, pero jamás debo despreciarlos.  En última instancia, la lectura de un texto es una  transacción  en- tre el sujeto lector y el texto, como mediador del encuentro de  ese lector con el autor del texto.  Es  una  composición  entre el lector  y el autor en la que aquél, esforzándose con lealtad en el sentido  de no traicionar el espíritu del autor, \"reescribe\" el texto. Y re- sulta imposible hacer esto sin la comprensión critica del texto,  que por su lado exige la superación del miedo a la lectura y que  se va dando en el  proceso de creación de aquella disciplina inte- lectual de la que he hablado antes. Insistamos en la disciplina re- ferida. Ella tiene mucho que ver con la lectura, y por lo tanto con  la escritura. No es posible leer sin escribir, ni escribir sin leer.  Otro  aspecto  importante,  y  que  desafía  aún  más  al  lector  como  \"recreador\" del  texto  que  lee,  es  que la  comprensión    del  texto no está depositada, estática, inmovilizada en sus páginas a  la espera de que  el lector la  desoculte.  Si  fuese  así  definitiva- mente, no podriamos decir que leer de manera critica es \"rees- cribir\" lo leído. Por eso es que antes he hablado de la lectura  corno    composición    entre el lector y el autor, en la que el signifi- cado más profundo del texto también es creación del lector. Este  punto nos lleva a la necesidad de la lectura también como expe- riencia dialógica, en la que la discusión del texto realizada por  sujetos lectores aclara, ilumina y crea la comprensión grupal de  \n64  CAR.TAS  A  QUIEN PRETENDE ENSEÑAR.  lo leído. En el fondo, la lectura en grupo hace emerger diferen- tes  puntos  de    vista  que, exponiéndose los unos a  los otros, enri- quecen la producción de la inteligencia del texto.  Entre las mejores prácticas de lectura que he tenido dentro y  fuera de Brasil yo citaría las que realicé coordinando grupos de  lectura sobre un texto.   Lo  que he observado es que la timidez frente a  la lectura o  el  propio miedo tienden a  ser superados, y se liberan los intentos  de  invención  del  sentido  del texto y no sólo de su descubrimiento.  Obviamente, antes de la lectura en grupo, y  como prepara- ción para ella, cada estudiante realiza su lectura individual. Con- sulta  tal  o  cual instrumento auxiliar. Establece esta o  aquella in- terpretación de uno u  otro de los fragmentos de la lectura. El  proceso  de  creación  de  la  comprensión  de  lo  que  se  lee  va  siendo construido en el diálogo entre los diferentes puntos de  vista en tomo al desafio, que es el núcleo significativo del autor.  Como autor, yo estaría más que satisfecho si  llegara a  saber  que  este  texto  provoca  algún  tipo  de  lectura  comprometida,  como aquellas en las que vengo insistiendo a  lo largo de este li- bro, entre sus lectores y lectoras. En el fondo, ése debe ser el sueño  legítimo de todo autor, ser leído,  discutido,  criticado,  mejorado,  reinventado por sus lectores.  Pero volvamos un poco a este aspecto de la lectura crítica según  el cual el lector se hace o se va haciendo igualmente productor de  la inteligencia del texto. El  lector será tanto más productor de la  comprensión del texto cuanto más se haga realmente un  aprehen-  sarde  la comprensión del autor. Él produce la inteligencia del  texto en la medida en que ella se vuelve  conocimiento  que el lec- tor ha creado y no conocimiento que le fue yuxtapuesto por la  lectura del libro.  Cuando yo  aprehendo la comprensión del objeto en vez de  memorizar el perfil del concepto del objeto, yo  conozco al ob- jeto, yo  produzco el conocimiento del objeto. Cuando el lector  alcanza críticamente la inteligencia del objeto del que habla el  autor,  conoce  la inteligencia del texto y se transforma en coautor  \nSEGUNDA CARTA  65  de esta inteligencia. No habla de ella como quien sólo ha oído  hablar de ella. El lector ha trabajado y retrabajado la inteligencia  del texto porque ésta no estaba allí inmovilizada esperándolo.  En esto radica lo  difícil  y lo  apasionante  del acto de leer.  Desdichadamente, lo que se viene practicando en la mayoría  de las escuelas es llevar a los alumnos a ser pasivos con el texto.  Los ejercicios de interpretación de la lectura tienden a  ser casi  su copia oral. El  niño percibe tempranamente que su imagina- ción no juega: es algo casi prohibido, una especie de pecado.  Por otro lado, su capacidad cognoscitiva es  desafiada de ma- nera distorsionada. El  niño nunca es  invitado, por un lado, a  revivir imaginativamente la historia contada en el libro; y por el  otro, a  apropiarse poco a  poco del significado del contenido  del texto.  Ciertamente, sería a  través  de la experiencia de  recontar la  historia, dejando libres su imaginación, sus sentimientos, sus sue- ños y sus deseos para crear, como el niño acabaría arriesgándose  a producir la inteligencia más compleja de los textos.  No se hace nada o  casi nada en el sentido de despertar y man- tener encendida, viva,  curiosa, la reflexión conscientemente crí- tica que es indispensable para la lectura creadora, vale decir, la  lectura capaz de desdoblarse en la reescritura del texto leído.  Esa curiosidad, que el  maestro o  la maestra necesitan estimu- lar en el alumno, contribuye decisivamente a  la producción del  conocimiento del contenido del texto, que a su vez se vuelve fun- damental para la creación de su significación.  Es  muy cierto que si  el contenido de la lectura tiene que ver  con un dato concreto de la realidad social o  histórica o de la bio- logía, por ejemplo, la interpretación de la lectura no puede trai- cionar el dato concreto. Pero esto no significa que el estudiante  lector deba memorizar textualmente lo leído y repetir mecánica- mente el discurso del autor. Esto sería una \"lectura bancaria\", 1  1 Véase Paulo Freire.  Pedagogía del  f1nimido.    op.    cit.  \n66    CARTAS A  QUIEN PRETENDE ENSEÑAR  en la que el lector \"comería\"  el contenido del  texto del autor  con la ayuda del \"maestro nutricionista\".  Insisto en la importancia indiscutible de la  educadora en el  aprendizaje de la lectura, indicotomizable de la escritura, a  la  que los educandos deben entregarse. La disciplina de mapear te- máticamente el texto,2 que no debe ser realizada sólo por la edu- cadora sino también por los educandos, descubriendo interac- ciones entre unos temas y otros en la continuidad del discurso  del autor, el llamado de la atención de los lectores hacia las citas  hechas en el texto y el papel de las mismas, la necesidad de su- brayar el momento estético del lenguaje del autor, de su domi- nio del lenguaje, del vocabulario, lo que implica superar la inne- cesaria repetición de una misma palabra tres o  cuatro veces en  una misma página del texto.  Un ejercicio de mucha riqueza del que he tenido noticia al- guna vez, aunque no se realice en las escuelas, es el de posibilitar  que dos o  tres escritores, de ficción o  no, hablen a  los alumnos  que los han leído sobre cómo produjeron sus textos, cómo traba- jaron  la  temática  o  los  desarrollos  que  envuelven  sus  temas,  cómo trabajaron su lenguaje, cómo persiguieron la belleza en el  decir,  en el describir,  en el dejar algo en suspenso para que el  lector ejercite su imaginación, cómo jugar con el pasaje de un  tiempo al otro en sus historias. En fin,  cómo los escritores se leen  a sí mismos y cómo leen a otros escritores.  Es preciso,  ya  finalizando, que los educandos,  al  experimentarse  cada vez más críticamente en la tarea de leer y de escribir, perci- ban las tramas sociales en las que se constituyen y se reconstituyen  el lenguaje, la comunicación y la producción del conocimiento.  2 Véase Pau\\o Freire,  AfM cultural para a liberdade e outros  escritos,    Río de  Janeiro, paz e Terra, 1976.  \nTercera carta  \"VINE A  HACER EL CURSO DE MAGISTERIO  PORQ.UE  NO TUVE OTRA POSIBILIDAD\"   Hace algunos años, invitado a  uno de los cursos de ca- pacitación del magisterio de San Pablo para una conversación  con las alumnas, escuché de varias de ellas la afirmación que da   el  título a  esta carta.  Pero también escuché a  varias otras decir  que habían elegido el curso de capacitación del magisterio para  esperar cómodamente un buen casamiento mientras estudiaban.  Estoy  completamente convencido de que  la  práctica educa- úva,  de la que he hablado y a  cuya importancia y belleza me he  referido tanto, tampoco puede tener para su preparación esas  razones de ser o  esas motivaciones. Incluso es posible que algu- nos cursos  de capacitación  del magisterio sean,  irresponsable- mente, simples \"tragamonedas\". Esto es  posible, pero no signi- fica  que  la  prácúca  educaúva  llegue  a  ser  una  especie  de   marquesina  bajo la cual la gente espera que pase la lluvia. Y para  pasar una lluvia bajo una marquesina no necesitamos formación.  La práctica educativa, por  el  contrario, es algo muy serio. Trata- mos con gente, con niños, adolescentes o adultos. Participamos en  su formación. Los ayudamos o los peJjudicamos en esta búsqueda.  Estamos intrínsecamente conectados con ellos en su proceso de  conocimiento. Podemos contribuir a su fracaso con nuestra incom- petencia, mala preparación o  irresponsabilidad. Pero también  po-  demos contribuir con nuestra responsabilidad, con nuestra prepa- ración  científica y nuestro gusto por la  enseñanza,  con nuestra  \n68  CARTAS A  QUIEN PRETENDE ENSEÑAR  seriedad y nuestro testimonio de lucha contra las  injusticias,  a  que los educandos se vayan transformando en  presencias  notables  en  el  mundo. Vale  decir,  aunque  no  podamos afirmar que  el  alumno de un maestro incompetente e  irresponsable deba nece- sariamente  ser  incapaz  y  falto  de  responsabilidad  o  que  el  alumno de un maestro competente y serio automáticamente sea  serio y capaz, que debemos asumir con honradez nuestra tarea do- cente, para lo cual nuestra formación tiene que ser considerada  rigurosamente.  La segunda razón enunciada para explicar la opción en favor  del  curso  de  formación  magisterial  coincide  con,  y  al  mismo  tiempo refuerza, la ideología que reduce a  la maestra como pro- fesional a  la condición de tía.  Estoy seguro de que uno de los saberes indispensables para la  lucha de las maestras y los maestros es el saber que deben forjar  en ellos, y que debemos forjar en nosotros mismos, de la digni- dad y la importancia de nuestra tarea. Sin esta convicción, entra- mos casi vencidos en la lucha por nuestro salario y contra la falta  de respeto.  Es  evidente que reconocer la importancia de nuestra  tarea no significa pensar que es la más importante de todas. Sig- nifica reconocer que es fundamental. Y algo más:  es indispensa- ble para la vida social. Por eso no puedo formarme para la do- cencia sólo porque no hubo otra oportunidad para mí, y menos  aún porque mientras me \"preparo\" espero un casamiento. Con  estas  motivaciones,  que sugieren  más  o  menos el perfil de la  práctica educativa, estoy en ella como quien pasa una lluvia.  Es  por eso que en la mayoría de los casos posiblemente no vea por  qué debo luchar. Por eso es que no me siento mal con el vacia- miento de mi profesionalidad y acepto ser  abuelo,    como muchas  compañeras y compañeros aceptan ser  tías  y  tíos.   La necesidad que tenemos de poder luchar cada vez más efi- cazmente en defensa de nuestros derechos, de ser competentes y  de estar convencidos de la importancia social y política de nues- tra tarea, reside en el hecho de que, por ejemplo, la indigencia  de nuestros salarios no depende solamente de las  condiciones  \nTERCERA CARTA    69  económicas y financieras del Estado o  de las empresas particula- res.  Todo eso está íntimamente relacionado con cierta compren- sión  colonial  de la administración, de cómo organizar el gasto pú- blico,jerarquizando los consumos y priorizando los gastos.  Se  hace  urgente superar argumentos  como éste:  \"Podemos  darles un aumento razonable a  los procuradores, supongamos,  porque son sólo setenta. Pero no podemos hacer lo mismo con  las  maestras, porque son veinte mil\".  No. Eso no es argumento.  Lo primero que quiero saber es si las maestras son importantes o  no. Si  sus salarios son o  no son insuficientes. Si  su tarea es o  no  es indispensable. Y es sobre todo en esto que se debe insistir en  esta lucha, difícil y prolongada, y que implica la impaciente pa- ciencia de los educadores y la sabiduría política de sus dirigen- tes.  Es importante que luchemos contra las tradiciones colonia- les  que  nos  acompañan.  Es  indispensable  que  luchemos  en  defensa de la relevancia de nuestra tarea, relevancia que debe,  poco a  poco pero tan rápido como sea posible, llegar a  formar  parte del conocimiento general de la sociedad, del desempeño  de sus obvios conocimientos.  Cuanto más aceptamos ser  tías  y    tíos,    tanto más la sociedad se  sorprende de que hagamos huelgas y  nos exige que tengamos  buenos modos.  Y aún más: si  la sociedad no reconoce la relevancia de nuestro  quehacer, mucho menos nos brindará su apoyo.  Se hace urgente que aumentemos las filas  de la lucha por la  escuela pública en este país.  Escuela pública y  popular, eficaz,  democrática y alegre con sus maestros y maestras bien pagados,  bien  fonnados  y  en  pennanente  capacitación.  Con  salarios  nunca más a  distancia astronómica, como hoy, frente a  los de los  presidentes y directores de las empresas estatales.  Es  preciso que hagamos de este tema algo tan nacional y fun- damental para la presencia histórica del Brasil en el mundo en  el próximo milenio, que inquietemos la muy juiciosa e  insensi- ble conciencia de los burócratas empapados de pies a  cabeza de  ideas coloniales, aun cuando se llamen modernizadores.  \n70  CARTAS  A  QUIEN PRETENDE ENSEÑAR  No es posible que terminemos, ya en vísperas de la llegada del  nuevo  milenio,  con  déficits  tan  alarmantes en  nuestra  educa- ción, tanto en lo cuantitativo como en lo cualitativo. Con milla- res de maestros improvisados incluso en zonas del sur del país,  ganando muchas veces menos de la mitad de un salario mínimo.  Gente heroica, generosa, amorosa, inteligente, pero despreciada  por las oligarquías nacionales.  No es posible que continuemos, en  la  última década de este mi- lenio, con ocho millones de Carlitos y Josefas  impedidos  de tener es- cuela  y  con otros millones  expulsados  de ellas, o  incluso acusados  de  escaparse.   No nos asombra, por ejemplo, cuando sabemos que \"hasta la in- dependencia no había un sistema de instrucción\" en nuestro país.  No sólo no había un sistema de instrucción popular sino que las  manifestaciones culturales estaban prohibidas. Hasta  la  llegada de  la familia real portuguesa al Brasil, en 1808, estaba prohibido  el  es- tablecimiento de imprentas en  el  país, bajo las penas más severas.  Al ser proclamada la independencia, la nación naciente  se  encontraba sumergida en la más profunda ignoran- cia;  la enseñanza popular existente no pasaba de unas  pocas escuelas desperdigadas por las capitanías.  La  ense- ñanza secundaria pública era impartida en las llamadas  \"aulas regias\" donde se mezclaba una enseñanza estéril y  pedante de  latín,  griego,  retórica,  filosofía  racional  y  moral y cosas semejantes. Los libros eran raros e incluso  las 'personas más calificadas no tenían el hábito de la  lectura.}  Es  necesario que sigamos la actuación de la persona que vota- mos, sin importar si  es para concejal, diputado estatal o  federal,  } B.L.  Berlinck,    Fa/ares  adversos  na  forma~iio  brasileira,    San  Pablo,  IPSIS,  1954.  \nTERCERA CARTA  71  alcalde, senador, gobernador o presidente; que vigilemos sus pa- sos,  gestos,  decisiones,  declaraciones, votos,  omisiones,  conni- vencia con la desvergüenza. Exigir que cumplan sus promesas,  evaluarlos con rigor para poder votarlos nuevamente o  negarles  nuestro voto. Negarles nuestro voto  y  comunicarles la razón de  nuestra posición. Más aún, hacer pública nuestra posición todo  lo que nos sea posible.  Somos el país del desperdicio del que tomamos conocimiento  casi a  diario por la prensa  y  la televisión:  desperdicio por el des- aprovechamiento de la basura; desperdicio por la falta de respeto  deliberada hacia la cosa pública, hacia instrumentos que valen  millones de dólares que están a la intemperie o sin uso; desperdi- cio por las obras iniciadas, hospitales, escuelas, viaductos, puen- tes, edificios enormes  y  paralizados un día, para que poco tiempo  después parezcan descubrimientos arqueológicos de antiguas ci- vilizaciones hasta entonces sepultadas; desperdicio millonario de  frutas  y  verduras en los grandes centros de distribución del país.  Valdría la pena calcular todo ese desperdicio y ver lo que se po- dría hacer con él en el campo de la educación si  no existiese.  Este pasado colonial, presente en el arbitrio de los poderosos,  en la soberbia de los administradores arrogantes, es una de las  explicaciones del sentimiento de impotencia, del fatalismo con  que reaccionamos muchos de nosotros. Es  posible que todo esto  debilite el ánimo de muchas maestras  y  que por lo mismo \"acep- ten\" ser  tías  en vez de asumirse profesionalmente. Puede ser que  esto  también  explique en parte la posición  de  las  normalistas  que hacen el curso de preparación para el magisterio mientras  \"esperan un casamiento\".  Lo que vale contra este estado de cosas es la lucha política orga- nizada,  es  la superación de una comprensión corporativista por  parte de los sindicatos, es la victoria sobre las posiciones sectarias,  es la  presión junto a  los  partidos progresistas de corte posmo- derno  y  no con el  tradicionalismo  izquierdista.    Es no entregamos al  fatalismo, que no sólo obstaculiza la solución, sino que refuerza  el problema.  \n72  CARTAS A  QUIEN PRETENDE ENSEÑAR  Es evidente que los problemas relacionados con la educación no  son solamente pedagógicos. Son políticos y éticos, como cualquier  problema financiero.  Los recientes desfalcos descubiertos en el Fondo de Garantía  por Tiempo de Servicio eran, según los cálculos de un serio co- mentarista de la televisión brasileña, suficientes para construir  seiscientas mil casas populares en todo el país.  Cuando falta dinero para un sector pero no falta para otro, la  razón está en la política de gastos. Por ejemplo, falta dinero para  hacer menos insoportable la vida en las  favelas,  pero no falta  para conectar un barrio rico a  otro con un túnel majestuoso.  Éste  no es un problema tecnológico: es  una opción política. Y  esto nos acompaña a  lo largo de la historia. En 1852, al asumir  por primera vez la provincia de Paraná, el consejero Zacarias de  Vasconcelos  protestaba  contra  lo  absurdo  del  salario  de  los  maestros primarios: menos de ochocientos reales diarios. Según  Berlinck:  La consecuencia de la deficiencia de las dotaciones era  que el magisterio no atraía a  nadie. Sólo iba a  estudiar  para maestro quien no servía para otra cosa, ésa era la  sentencia repetida por muchos presidentes de provin- cias.  Si  era urgente  valorizar  la  instrucción entre  los  habitantes del Brasil, dificilmente se podría descubrir  un proceso menos conducente con esta finalidad que  la magra remuneración de los maestros. 2  Creo que los sindicatos de los trabeyadores de la enseñanza de- berían sumar a  sus reivindicaciones salariales y de mejora de las  condiciones materiales para el  ejercicio de la docencia,  otra a  largo plazo. La que, desmenuzando la política de gasto público  que incluye los desniveles entre los salarios de los maestros y los  2 B.    L.    Berlinck,  op.    cit.,    p.  257.  \nTERCERA CARTA  73  de los otros profesionales, analice también las  comisiones y las  gratificaciones que se  incorporan al  salario después  de  algún  tiempo.  Sería necesario un serio estudio de la política salarial  sustantivamente democrática, no colonial, con el que se le hiciese  justicia al magisterio, por un lado, y que por otro lado se  reparnsen  desigualdades ofensivas.  Durante los años cincuenta, y mientras visitaba Recife,  el  pa- dre  Lebret,  creador  del  movimiento  de  Economía  y  Huma- nismo,  dijo que una de las  cosas que más lo habían escandali- zado entre nosotros era la diferencia alarmante entre los salarios  de los de alcurnia y el de los renegados. Hoy la disparidad conti- núa. No se puede comprender la desproporción entre lo que re- cibe un presidente de una empresa estatal, independientemente  de la importancia de su trabajo, y lo que recibe una maestra del  primer grado. Maestra de cuya tarea  el    presidente de la estatal  de hoy necesitó ayer.  Es  urgente que el magisterio brasileño sea tratado con digni- dad para que la sociedad pueda esperar de él que actúe con efi- ciencia y exigir tal actuación.  Por lo tanto, seríamos ingenuos si  descartásemos la necesidad  de la lucha política, la necesidad de aclarar a la opinión pública so- bre  la  situación del magisterio en todo el país, la necesidad de com- parar los salarios de los diferentes profesionales y la disparidad  entre ellos.  Es  muy cierto que la educación no es la palanca de transfor- mación social, pero sin ella esa transformación no se produce.  Ninguna nación se  afirma fuera de esa loca pasión por el co- nocimiento sin aventurarse, plena de emoción, en la constante  reinvención de sí misma, sin que se arriesgue creativamente.  Ninguna sociedad se  afirma sin  el  perfeccionamiento de su  cultura, de la ciencia, de la investigación, de la tecnología, de la  enseñanza. Y todo esto comienza con la preescuela.  \n\nCuarta carta   DE LAS CUALIDADES INDISPENSABLES  PAIlA EL MEJOR DESEMPEÑO  DE LAS MAESTRAS Y  LOS MAESTROS PROGRESISTAS  Me gustaría dejar bien claro que las cualidades de las  que voy a  hablar y que me parecen indispensables para las edu- cadoras y para los educadores progresistas son predicados que  se van generando con la práctica. Más  aún, son generados de  manera coherente con la opción política de naturaleza crítica  del educador. Por esto mismo, las cualidades de las que hablaré  no son algo con lo que nacemos o que encarnamos por decreto o  recibimos de regalo. Por otro lado, al  ser alineadas en este texto  no quiero atribuirles ningún juicio de valor por el orden en el que  aparecen.  Todas  ellas  son  necesarias  para la práctica educativa  progresista.  Comenzaré por la  humildad,    que de ningún modo significa  falta de respeto hacia nosotros mismos, ánimo acomodaticio o  cobardía. Al  contrario, la humildad exige valentía,  confianza  en nosotros mismos, respeto hacia nosotros mismos y hacia los  demás.  La humildad nos ayuda a  reconocer esta sentencia obvia:  na- die lo sabe todo, nadie lo ignora todo. Todos sabemos algo,  to- dos ignoramos algo. Sin humildad, difícilmente escucharemos a  alguien al que consideramos demasiado alejado de nuestro nivel  de  competencia.  Pero  la  humildad  que  nos  hace  escuchar  a  aquel considerado como menos competente que nosotros no es  \n76  CARTAS A  QUIEN  PRETENDE ENSEÑAR  un acto de condescendencia de nuestra parte o  un comporta- miento de quien paga una promesa hecha con fervor:  \"Prometo a  Santa Lucía que si el problema de  mis  ojos no es algo serio voy a es- cuchar  con  atención  a  los  rudos  e  ignorantes  padres  de  mis  alumnos\". No, no se trata de eso. Escuchar con atención a quien  nos busca, sin importar su nivel intelectual, es un deber humano   y  un gusto democrático nada elitista.  De  hecho,  no veo  cómo  es  posible  conciliar la  adhesión  al  sueño democrático, la superación de los  preconceptos,  con la  postura no humilde, arrogante, en que nos sentimos llenos de  nosotros mismos. Cómo escuchar al otro, cómo dialogar, si  sólo  me oigo a mí mismo, si  sólo me veo a mí mismo, si  nadie que no  sea  yo  mismo  me  mueve  o  me  conmueve.  Por  otro  lado,  si  siendo humilde no me minimizo ni acepto que me humillen, es- toy  siempre abierto a  aprender y  a  enseñar.  La humildad  me  ayuda a  no dejarme encerrar jamás en el circuito de mi verdad.  Uno de los auxiliares fundamentales de la humildad es el  sentido  común  que nos advierte que con ciertas actitudes estamos cerca  de superar el límite a  partir del cual nos perdemos.  La arrogancia del \"¿sabe con quién está hablando?\", la sober- bia del  sabelotodo  incontenido en el gusto de hacer conocido y re- conocido su saber, todo esto no tiene nada que ver con la  manse- dumbre,  ni  con  la  apatía del  humilde.  Es  que la  humildad  no  florece en la inseguridad de las personas sino en la seguridad in- segura de los cautos. Por eso es que una de las expresiones de la  humildad es la seguridad insegura, la certeza incierta y no la cer- teza demasiado segura de sí misma.  La postura del autoritario,  en cambio, es sectaria. La suya es la única verdad que necesaria- mente debe ser impuesta a  los demás. Es en su  verdad  donde ra- dica la  salvación  de los demás. Su saber es \"iluminador\" de la \"os- curidad\"  o  de  la  ignorancia  de  los  otros,  que  por  lo  mismo  deben estar sometidos al saber y a la arrogancia del autoritario o  de la autoritaria.  Ahora retomo el  análisis del autoritarismo, no importa si  de  los padres o  de las  madres, si  de los  maestros o  de las maestras.  \nCUARTA CARTA  77  Autoritarismo frente al cual podremos esperar de los hijos o  de  los alumnos posiciones a veces  rebeldes,    refractarias a cualquier lí- mite como disciplina o    autoridad,    pero a  veces también apatía,  obediencia exagerada, anuencia sin  crítica o  resistencia al  dis- curso autoritario, renuncia a sí mismo, miedo a la libertad.  Al  decir que del autoritarismo se pueden esperar varios tipos  de reacciones entiendo que en el dominio de lo humano, por  suerte, las cosas no se dan  mecánicamente.    De esta manera es posi- ble que ciertos niños sobrevivan casi ilesos al rigor del arbitrio, lo  que no nos autoriza a  manejar esa posibilidad y a no esforzarnos  por ser menos autoritarios, si  no en nombre del sueño democrá- tito por lo menos en nombre del respeto al ser en formación de  nuestros hijos e  hijas, de nuestros alumnos y alumnas.  Pero es preciso sumar otra cualidad a la humildad con que la  maestra actúa y se relaciona con sus alumnos, y esta cualidad es  la  amorosidad  sin la cual su trabajo pierde el significado. Y amoro- si dad no sólo para los alumnos sino para el propio proceso de  enseñar. Debo confesar, sin ninguna duda, que no creo que sin  una especie de \"amor armado\", como diría el  poeta Tiago de  Melo, la educadora o  el educador puedan sobrevivir a  las  nega- tividades de su quehacer.  Las  injusticias, la indiferencia del po- der público, expresadas en la desvergüenza de los salarios, en el  arbitrio con que son castigadas las maestras y no  tías  que se rebe- lan y participan en manifestaciones de protesta a través de su sin- dicato -pero a  pesar de esto continúan entregándose a  su  tra- bajo con los alumnos-.  Sin embargo, es preciso que ese amor sea en realidad un \"amor  armado\", un amor luchador de quien se afirma en el derecho o en  el deber de tener el derecho de luchar, de denunciar, de anunciar.  Es  ésta la  form~  de amar indispensable para el educador pro- gresista y que es preciso que todos nosotros aprendamos y vivamos.  Pero sucede que la amorosidad de la que hablo, el sueño por  el que peleo y  para cuya  realización  me preparo permanente- mente, exigen que yo  invente en mí, en mi experiencia social,  otra cualidad: la  valentía  de luchar alIado de la valentía de amar.  \n78  CARTAS A  QUIEN PRETENDE ENSEÑAR   La  valentía como virtud no es algo que se encuentre fuera de  mí mismo. Como superación de mi miedo, ella lo implica.  En primer lugar, cuando hablamos del miedo debemos estar  absolutamente seguros de que estamos hablando sobre algo muy  concreto. Es  decir que el miedo no es una abstracción. En se- gundo lugar, creo que debemos saber que estamos hablando de  una cosa muy normal. Otro punto que me viene a  la mente es  que, cuando pensamos en  el    miedo, llegamos a  reflexionar so- bre la necesidad de ser muy claros respecto a nuestras opciones,  lo cual exige ciertos procedimientos y  prácticas concretas que  son las propias experiencias que provocan el miedo.  A  medida que tengo más y más claridad sobre mi opción, so- bre  mis  sueños,  que  son  sustantivamente  políticos  y  adjetiva- mente pedagógicos, en la medida en que reconozco que como  educador soy  un político, también entiendo mejor las  razones  por las  cuales tengo miedo y  percibo cuánto tenemos aún por  andar para  mejorar  nuestra  democracia.  Es  que  al  poner  en  práctica un tipo de educación que provoca de manera crítica la  conciencia del educando, necesariamente trabajamos contra al- gunos mitos que nos deforman. Al  cuestionar esos  mitos  tam- bién enfrentamos al poder dominante, puesto que ellos son ex- presiones de ese poder, de su ideología.  Cuando comenzamos a ser asaltados por miedos concretos, ta- les como el miedo a perder el empleo o a no alcanzar cierta pro- moción, sentimos la necesidad de poner ciertos límites a nuestro  miedo. Antes que nada reconocemos que sentir miedo es mani- festación de que estamos vivos.  No tengo que esconder mis  te- mores. Pero lo que no puedo permitir es que mi miedo me para- lice.  Si  estoy seguro  de  mi sueño  político,  debo  continuar mi  lucha con tácticas que disminuyan  el    riesgo que COITO. Por eso es  tan importante gobernar mi miedo,  educar  mi miedo, de donde  nace finalmente mi valentía.   l  Por eso es  que no puedo por un  1 Véase Paulo Freire e  Ira Shor,    Medo  e ousadia,    op.    cit.  \nCUARTA CARTA  79  lado negar mi miedo y por el otro abandonanne a él, sino que pre- ciso  controlarlo, y es en el ejercicio de esta práctica donde se va  construyendo mi valentía necesaria.  Es por esta razón que hay miedo sin valentía, que es  el  miedo  que  nos  avasalla,  que  nos  paraliza,  pero  no  hay  valentía  sin  miedo,  que  es  el  miedo  que,  \"hablando\"  de  nosotros  como  gente, va siendo limitado, sometido y controlado.  Otra virtud es la  tolerancia.    Sin ella es imposible realizar un tra- bajo pedagógico serio, sin ella es inviable una experiencia demo- crática auténtica; sin ella, la práctica educativa progresista se des- dice. La tolerancia, sin embargo, no es una posición irresponsable  de quien juega eljuego del \"hagamos de cuenta\".  Ser tolerante no significa ponerse en  connivencia  con lo intole- rable, no es encubrir lo intolerable, no es amansar al agresor ni  disfrazarlo. La tolerancia es la virtud que nos enseña a  convivir  con lo que es diferente, a  aprender con lo diferente, a  respetar  lo diferente.  En un primer momento parece que hablar de tolerancia es  casi  como hablar de favor.  Es  como si  ser tolerante fuese  una  forma cortés, delicada, de aceptar o    tolerar  la presencia no muy  deseada de mi contrario. Una manera civilizada de consentir en  una convivencia que de hecho me repugna. Eso es hipocresía,  no tolerancia. Y la hipocresía es un defecto, un desvaloro  La tole- rancia es una virtud. Por eso mismo si  la vivo,  debo vivirla como  algo que asumo. Como algo que me hace coherente como ser  histórico, inconcluso, que estoy siendo en una primera instancia,  yen segundo lugar, con mi opción político-democrática. No veo  cómo podremos ser democráticos sin experimentar, como pri,n- cipio fundamental, la tolerancia y la convivencia con lo que nos  es diferente.  Nadie aprende tolerancia en un clima de irresponsabilidad en   el  cual no se hace democracia. El acto de tolerar implica el clima  de establecer límites, de principios que deben ser respetados. Es  por esto por lo que la tolerancia no es la simple  connivencia  con  lo intolerable. Bajo  el  régimen autoritario, en el cual se exacerba  \n80  CARTAS A  QUIEN  PRETENDE ENSEÑAR  la autoridad, o  bajo el régimen licencioso, en el que la libertad  no se limita, difícilmente aprenderemos la tolerancia.  La  tole- rancia requiere respeto, disciplina,  ética. El  autoritario, empa- pado de prejuicios sobre el sexo, las clases, las razas,jamás podrá  ser tolerante si  antes no vence sus prejuicios. Por esta razón el  discurso  progresista  del prejuiciado, en contraste con su práctica,  es un discurso falso.  Es  por esto también que el cientificista es  igualmente intolerante, porque toma o entiende la  ciencia  como  la    verdad    última  y  nada vale fuera de ella,  pues es ella la que nos  da la seguridad de la que no se puede dudar. No hay cómo ser  tolerantes si  estamos inmersos en el cientificismo, cosa que no  debe llevarnos a la negación de la ciencia.  Me gustaría ahora agrupar la  decisión,    la  seguridad,    la tensión  entre la  paciencia  y  la  impaciencia  y  la  alegria  de vivir  como cualida- des que deben ser cultivadas por nosotros si  somos educadores  y   educadoras progresistas.   La  capacidad de decisión de la educadora o  del educador es  absolutamente necesaria en su trabajo formador. Es probando su  habilitación para decidir como la educadora enseña la difícil vir- tud de la decisión. Difícil en la medida en que decidir significa  romper para optar. Ninguno decide a no ser por una cosa contra  la otra, por un punto contra otro, por una persona contra otra.  De ahí que toda opción que sigue a una decisión exija una medi- tada evaluación en el acto de comparar para optar por uno de  los posibles polos, personas o  posiciones. Yes la evaluación, con  todas las  implicaciones que ella genera, la que finalmente  me  ayuda a optar.  Decisión es ruptura no siempre fácil  de ser vivida.  Pero no es  posible existir sin romper, por más difícil que nos resulte romper.  Una de las  deficiencias de una educadora es la incapacidad de  decidir. Su  indecisión,    que los educandos interpretan como debi- lidad moral o  como incompetencia profesional.  La  educadora  democrática,  sólo  por ser democrática,  no puede anularse;  al  contrario, si  no puede asumir sola la vida de su clase  tampoco  puede, en nombre de la democracia, huir de su responsabilidad  \nCUARTA CARTA  81   de tomar decisiones. Lo que no puede hacer es ser arbitraria en  las  decisiones que toma.  El  testimonio de no asumir su deber  como autoridad, dejándose caer en la licencia, es sin duda más  funesto que el de extrapolar los límites de su autoridad.  Hay muchas ocasiones en las que  el  buen ejemplo pedagógico,  en la dirección de la democracia, es tomar la decisión junto con  los alumnos después de analizar el problema. En otros momentos  en los que la decisión a  tomar debe ser de la esfera de la educa- dora, no hay por qué no asumirla, no hay razón para omitirla.   La  indecisión delata falta de seguridad, una cualidad indispen- sable a  quien sea que tenga la responsabilidad del gobierno, no  importa si  de una clase, de una familia, de una institución, de una  empresa o del Estado.  Por su parte, la  seguridad  requiere competencia científica, cla- ridad política e  integridad ética.  No puedo estar seguro de lo  que hago si  no sé cómo fundamentar científicamente mi acción  o si  no tengo por lo menos algunas ideas de lo que hago, de por  qué lo  hago y para qué lo hago, si  sé  poco o  nada en favor  de  qué o  de quién, en contra de qué o  de quién, hago lo que estoy  haciendo o  haré. Si  esto no me conmueve para nada, si  lo que  hago hiere la dignidad de las personas con las que trabajo, si las  expongo a situaciones bochornosas que puedo y debo evitar,  mi  insensibilidad ética, mi cinismo me contraindican para encarnar  la tarea del educador, tarea que exige una forma críticamente  disciplinada de actuar con la que la educadora desafía a sus edu- candos. Forma disciplinada que tiene que ver,  por un lado, con  la competencia que la maestra va revelando a sus alumnos, dis- creta y humildemente, sin alharacas arrogantes, y por otro lado  con el equilibrio con el que la educadora ejerce su autoridad  -segura, lúcida, determinada-o  Nada de eso,  sin  embargo, puede concretarse si  a  la educa- dora le falta el gusto por la búsqueda permanente de la justicia.  Nadie puede prohibirle que le guste más un alumno que otro  por  x  razones. Es  un derecho que tiene. Lo que ella no puede es  emitir el derecho de los otros a favor de su preferido.  \n82  CARTAS A  QUIEN PRETENDE ENSEÑAR  Existe  otra cualidad fundamental que no puede faltarle  a  la  educadora progresista y que exige de ella la sabiduría con la que  debe entregarse a  la experiencia de vivir la tensión entre la pa- ciencia y la impaciencia. Ni la paciencia por sí sola ni la impa- ciencia solitaria.  La  paciencia por sí sola puede llevar a la educa- dora a  posiciones de acomodación, de espontaneísmo, con lo  que niega su sueño democrático.  La  paciencia desacompañada  puede conducir a  la inmovilidad, a  la inacción.  La  impaciencia  por sí sola,  por otro lado, puede llevar a  la maestra a  un acti- vismo ciego, a  la acción por sí misma, a  la práctica en que no se  respetan las relaciones necesarias entre la táctica y la estrategia.   La  paciencia aislada tiende a  obstaculizar la consecución de los  objetivos de la práctica haciéndola \"tierna\", \"blanda\" e inoperante.  En la impaciencia aislada, amenazamos el éxito de la práctica que  se pierde en la arrogancia de quien se juzga dueño de la historia.   La  paciencia sola se agota en el puro blablá; la impaciencia a solas,  en el activismo irresponsable.   La  virtud no está, pues, en ninguna de ellas sin la otra sino en vi- vir la permanente tensión entre ellas.  Está en vivir y actuar impa- cientemente paciente, sin que jamás se dé la una aislada de la otra.  Junto con esa forma de ser y de actuar equilibrada, armoniosa,  se impone otra cualidad que vengo llamando  parsimonia  verbal.   La  parsimonia verbal está implicada en el acto de asumir la ten- sión entre paciencia e  impaciencia. Quien vive la impaciente pa- ciencia dificilmente pierde, salvo casos excepcionales, el control  de lo  que  habla,  raramente extrapola los  límites  del  discurso  ponderado pero enérgico. Quien vive  con preponderancia la  paciencia, apenas ahoga su legítima rabia, que expresa en un  discurso flojo y acomodado. Quien por el contrario es sólo im- paciencia tiende a  la exacerbación en su discurso. El  discurso  del  paciente  siempre es  bien  comportado,    mientras que el discurso  del    impaciente    en  general  va  más  allá  de  lo  que  la  realidad  misma soportaría.  Ambos discursos, tanto el muy controlado como el carente de  toda disciplina,  contribuyen a  la  preservación del  statu  quo.    El  \nCUARTA CARTA    83  primero por estar mucho más acá de la realidad; el segundo por  ir más allá del límite de lo soportable.  El  discurso  y  la práctica benevolentes del que es sólo  paciente   en la clase hace pensar a los educandos que todo o  casi todo es  posible.  Existe una paciencia casi  inagotable en el  aire. El  dis- curso  nervioso,  arrogante,  incontrolado,  irrealista,  sin  límite,  está empapado de inconsecuencia, de irresponsabilidad.  Estos discursos no ayudan en nada a la formación de los edu- candos.  Existen además los que son excesivamente equilibrados en sus  discursos pero de vez en cuando se desequilibran. De la pura pa- ciencia  pasan  inesperadamente a  la impaciencia incontenida,  creando en los demás un clima de inseguridad con resultados in- discutiblemente pésimos.  Existe  un sinnúmero de madres  y  padres que se comportan  así.  De una licencia en la que el habla  y  la acción son coherentes  pasan, al día siguiente, a un universo de desatinos  y  órdenes au- toritarias que dejan a  sus hijos e  hijas estupefactos, pero princi- palmente inseguros.  La  ondulación  del comportamiento de los  padres limita en los  hijos el equilibrio emocional que precisan  para crecer. Amar no es suficiente, precisarnos saber amar.  Me parece importante, reconociendo que las  reflexiones so- bre  las  cualidades son incompletas, discutir un poco sobre la  alJJgria  de    vivir,    corno una virtud fundamental para la práctica educativa  democrática.  Es  dándome por completo a  la vida  y  no a  la muerte -lo que  ciertamente no significa, por un lado, negar la muerte, ni por el  otro mitificar la vida- corno me entrego, con libertad, a la  alJJgria  de    vivir:  Y es mi entrega a la alegría de vivir,  sin esconder la exis- tencia de razones para la tristeza en esta vida, lo que me prepara  para estimular  y  luchar por la alegría en la escuela.  Es viviendo -no importa si  con deslices o incoherencias, pero sí  dispuesto a superarlos-Ia humildad, la arnorosidad, la valentía, la  tolerancia, la competencia, la capacidad de decidir, la seguridad,  la ética, lajusticia, la tensión entre la paciencia  y  la impaciencia, la  \n84  CARTAS A  QUIEN PRETENDE ENSEÑAR   parsimonia    verba~  como contribuyo a  crear la  escuela alegre, a  fOljar la escuela feliz.  La escuela que es aventura, que marcha,  que no le tiene miedo al riesgo y que por eso mismo se niega a la  inmovilidad. La escuela en la que se piensa, en la que se actúa,  en la que se crea, en la que se habla, en la que se ama. Se adivina  aquÍ la escuela que apasionadamente le dice  sí  a  la vida, y no la  escuela que enmudece y me enmudece.  Realmente, la solución más fácil para enfrentar los obstáculos,  la falta de respeto del poder público, el arbitrio de la autoridad  antidemocrática es la acomodación fatalista en la que muchos de  nosotros nos instalamos.  \"¿Qué puedo hacer, si  siempre ha sido así?  Me llamen  maestra   o  me llamen    tía  continúo siendo mal pagada, desconsiderada,  desatendida.  Pues que así sea.\"  Ésta en realidad es  la posición  más cómoda, pero también es la posición de quien renuncia a la  lucha, a la historia. Es  la posición de quien renuncia al conflicto  sin el cual negamos la dignidad de la vida.  No hay vida ni exis- tencia humana sin pelea ni conflicto.  El  conflict02  hace nacer  nuestra conciencia. Negarlo es  desconocer los mínimos porme- nores de la experiencia vital y social.  Huir de él es  ayudar a  la  preservación del  statu  qua.   Por eso no veo otra salida que no sea la de la unidad en la di- versidad de intereses no antagónicos de los educadores y de las  educadoras en defensa de sus  derechos. Derecho a  su libertad  docente, derecho a  hablar,  derecho a  mejores condiciones de  trabajo pedagógico, derecho a un tiempo libre remunerado para  dedicarse  a  su  permanente  capacitación,  derecho  a  ser cohe- rente, derecho a  criticar a las autoridades sin miedo de ser casti- gadas -a lo que corresponde el deber de responsabilizarse por la  veracidad de sus críticas-, derecho a tener el deber de ser serios,  coherentes, a  no mentir para sobrevivir.  2  Véase  Moacir Gadotti,  Paulo Freire y Sérgio Guimaries,    Pedagogia:  diálogo  e conflito,    San Pablo, Cortez, 1989.  \nCUARTA CARTA  85  Es preciso que luchemos para que estos derechos sean,  más  que  reconocidos, respetados  y  encamados. A veces es preciso que lu- chemos junto al sindicato  y  a  veces contra él si  su dirigencia es  sectaria, de derecha o  de izquierda. Pero a veces también es  pre- ciso que luchemos como administración progresista contra las  ra- bias endemoniadas de los retrógrados, de los tradicionalistas -en- tre los cuales algunos se juzgan progresistas-   y  de los neoliberales,  para quienes la historia terminó en ellos.  \n\nQuinta carta   PRIMER DÍA DE  CLASE  Ahora me gustaría entregarme, no con espontaneísmo  pero sí con espontaneidad, a una serie de problemas con los que  de vez  en cuando se  enfrenta la  maestra,  no sólo la inexperta  sino también la experimentada, y a  los  que  tiene  que dar res- puesta. No es que al escribir esta carta pase por mi ánimo tener  yo    la  respuesta  a  los problemas o  dificultades que iré señalando,  pero tampoco que crea no tener una sugerencia útil para dar, re- sultado de mi experiencia y de mi conocimiento sistematizado.  Si  al escribir, no sólo esta carta sino el libro mismo, me asaltara  la idea de que poseo la verdad completa sobre los diferentes tó- picos discutidos, estaría traicionando mi comprensión del pro- ceso de conocimiento como social e  inconcluso, como devenir.  Por otro lado, si  creyese no tener nada que contribuir a la forma- ción  de  quien  se  prepara  para  asumirse  como  maestro  y  de  quien ya  está insertado en la práctica docente, no debería haber  escrito el libro, por inútil.  No poseo  la  verdad;    este libro  contiene  verdades  y mi sueño es  que ellas, provocando o desafiando las posiciones asumidas por  sus lectores, los comprometan en un diálogo crítico que tenga  como campo de referencia su  práctica,    así como su compren- sión  de  la  teoría que  la fundamenta  y  los  análisis  que  hago  aquí. Jamás he escrito hasta hoy ningún libro con la intención  de que su contenido fuese deglutido por sus posibles lectores y  lectoras. Por eso es que en una de las cartas he insistido tanto  \n88  CARTAS A  QUIEN PRETENDE ENSEÑAR  en el indeclinable papel del lector en la producción de la inteli- gencia del texto.  Hay algo más que me gustaría aclarar: en el trayecto que rec<r  ITeré sobre los temas a tratar, en las idas y venidas en que los voy t<r  mando,  deberé  retornar a  algunos de  los    ya    referidos  anterior- mente. Me esforzaré para que esto resulte esclarecedor en lugar de  redundante.  Comenzaré por presentar la situación de quien, por primera  vez,  se expone por entero a  los alumnos.  Difícilmente estará ese primer día libre de inseguridades, de  timidez o  inhibiciones, principalmente si la maestra o  el maestro  más que pensarse inseguros se encuentran realmente inseguros,  y se sienten alcanzados por el  miedo  de no ser capaces de condu- cir los trabajos ni de sortear las dificultades. En el fondo, de re- pente, la situación concreta que ella o  él enfrentan en el salón  de clase no tiene casi nada que ver con los discursos teóricos que  se acostumbraron a escuchar. En ocasiones incluso existe alguna  relación entre lo que escucharon y estudiaron, pero los asalta  una incertidumbre demasiado grande que los deja aturdidos y  confusos. No saben cómo decidir.  De hecho, el  miedo  es un derecho más al que corresponde el  deber de educar, de asumirlo para superarlo. Asumir el  miedo  es  no huir de él, es analizar su razón de ser, es medir la relación en- tre lo que lo causa y nuestra capacidad de respuesta. Asumir el  miedo es no esconderlo, solamente así podremos vencerlo.  A lo largo de mi vida nunca he perdido nada por exponerme  a  mí mismo y a mis sentimientos, evidentemente dentro de cier- tos límites. En una situación como ésta, creo que en lugar de la  expresión de una falsa seguridad, en lugar de un discurso que de  tan disimulador revela nuestra debilidad, lo mejor es enfrentar  nuestro sentimiento. Lo mejor es decirles a los educandos lo que  estamos sintiendo en una demostración de que somos humanos  y limitados. Es  hablarles sobre el propio derecho al    miedo,    que  no puede ser negado a  la figura del educador o  de la educa- dora.  Así  como  el  educando,  ellos  tienen  derecho  de  tener  \nQUINTA CARTA  89   miedo.    El educador no es un ser invulnerable. Es tan gente, tan  sentimiento  y    emoción como el educando. Frente al miedo, lo  que lo contraindica para ser educador es la incapacidad de lu- char para sobreponerse al    miedo,    y no el hecho de sentirlo o  no.  El  miedo  de cómo se va a  salir adelante en el primer día de clase,  muchas veces frente a  alumnos  ya  experimentados que adivinan  la inseguridad del maestro novato, es por demás natural.  Hablando de su miedo, de su inseguridad, el educador por un  lado va  haciendo una especie  de  catarsis  indispensable  para el  control del miedo,  y  por el otro se va ganando la confianza de los  educandos. En vez de tratar de esconder el miedo con disfraces   autmtarios  fácilmente reconocibles por los educandos, el maestro  lo manifestó con humildad. Hablando de su sentimiento se reveló   y    se  mostró  como ser  humano.  Testificó  también  su  deseo  de  aprender con los educandos. Es evidente que esta postura necesa- ria de la educadora frente  a  los  educandos  y    en función  de su   miedo  requiere de ella la paz que le otorga la humildad. Pero tam- bién requiere una profunda confianza -no ingenua sino crítica- en los otros y una opción, vivida coherentemente, por la democra- cia. Una educadora elitista, autoritaria, de esas para quienes la de- mocracia presenta síntomas de deteriorarse cuando las clases  p<r   pulares  comienzan  a  llenar  las  calles  con  sus  protestas, jamás  entenderá la humildad de asumir el miedo, a no ser como una co- bardía. En realidad, el hecho de asumir el  miedo    es el comienzo  del proceso para transformarlo en  valentía.   Otro aspecto fundamental relacionado con las primeras ex- periencias docentes de las jóvenes maestras es que las escuelas  de formación, si  no lo hacen, deberían estar atentas a  la capa- citación de las estudiantes normalistas para la \"lectura\" de la  clase como si  fuera un  texto  para ser descifrado, para ser com- prendido.  Lajoven maestra debe estar atenta a  todo, a  los más inocentes  movimientos de los alumnos, a  la inquietud de sus cuerpos, a  la  mirada sorprendida, a  la reacción más agresiva o  más tímida de  este o  aquel alumno o  alumna.  \n90  CARTAS A  QUIEN PRETENDE ENSEÑAR  Cuando la inexperta maestra de clase media asume su  trab~o   en zonas periféricas de la ciudad, los gustos de la clase, los valo- res, el  lenguaje, la prosodia, la sintaxis, la ortografía, la semán- tica,  todo esto le  resulta  tan  contradictorio que le  choca y  la  asusta. Sin embargo, es preciso que ella sepa que la sintaxis de  sus alumnos, su prosodia, sus gustos, su forma de dirigirse a  ella  y a  sus colegas, las reglas con las que juegan o  pelean entre sí,  todo esto forma parte de su  identidad cultural,    a la que jamás falta  un elemento de clase. Y todo esto debe ser acatado parn que el pro- pio educando, reconociéndose democráticamente respetado en su  derecho de decir \"menas gente\", pueda aprender la razón grama- tical dominante por la que debe decir \"menos gente\".  Una buena disciplina intelectual para este ejercicio de \"lec- tura\"  de la clase  como si  fuese  un  texto    sería la de crear en la  maestra el  hábito,  que se transformase en gusto y  no en pura  obligación, de hacer fichas diarias con el registro de las reaccio- nes de comportamiento, con anotaciones de las frases y su signi- ficado alIado, con gestos que no sean claramente reveladores de  cariño o de rechazo. Y por qué no, sugerir también a los educan- dos una especie de juego en el que ellos, en función de su domi- nio del lenguaje, hagan sus observaciones sobre los gestos de la  maestra, de su modo de hablar, de su humor, sobre el compor- tamiento de sus colegas, etc. Cada quince días se haría una es- pecie de seminario de evaluación con ciertas conclusiones que  deberían ser profundizadas y puestas en práctica.  Si  cuatro maestras de una misma escuela consiguiesen hacer  un trabajo como éste en sus clases, podemos imaginar 10  que se  obtendría en materia de crecimiento en todos los sentidos entre  los alumnos y las maestras.  He aquí una observación importante que debe ser realizada. Si  para la lectura de textos necesitamos ciertos instrumentos auxilia- res de trabajo como diccionarios de varios tipos y enciclopedias,  también parn la \"lectura\" de las clases, al igual que PaJa los textos,  precisamos instrumentos menos fáciles  de usar.  Precisamos, por  ejemplo,    observar  muy bien,    comparar  muy bien,    intuir  muy bien,  \nQUINTA  CARTA  91   imaginar  muy bien,  liberar  muy bien nuestra  sensibilidad,    creeren los  otros pero no demasiado en lo que pensamos de los otros. Precisa- mos ejercitar la capacidad de  observar  registrando lo que observa- mos. Pero  el  registrar no se agota en  el  puro acto de fijar con por- menores  lo  observado    tal    como  se  nos  dio.  También  significa  arriesgarnos a  hacer observaciones críticas y evaluadoras a las que  no debemos, sin embargo, prestar aires de certeza. Todo este ma- terial debe ser siempre estudiado y reestudiado por la maestra que  lo produce y por los alumnos de su clase. A cada estudio y a cada  reestudio que se haga se les van haciendo ratificaciones y rectifica- ciones mediante el diálogo con los educandos. Cada vez  más, la  \"clase como texto\" va  adquiriendo su \"comprensión\" producida  por sí misma y por la educadora. Y la producción de la compren- sión actual abarca la reproducción de la comprensión anterior,  que puede llevar a la clase hasta un nuevo conocimiento, a través  del conocimiento del conocinúento anterior de sí misma.  No temer a  los sentimientos, a  las  emociones, a  los deseos, y  trabajar con ellos con el mismo respeto con que nos entregamos  a una práctica cognoscitiva integrada con ellos. Estar prevenidos  y abiertos a  la comprensión de las  relaciones  entre los hechos, los  datos y los objetos en la comprensión de la realidad. Nada de eso  puede escapar de la tarea docente de la educadora en la \"lec- tura\" de su clase,  con la que  manifiesta a  sus  alumnos que su  práctica docente no se limita sólo a  la enseñanza mecánica de  los contenidos. Yaún más, que la necesaria enseñanza de esos  contenidos no  puede prescindir del  conocimiento crítico de  las condiciones sociales, culturales y económicas del contexto  de los educandos.  Yes este conocimiento crítico del contexto de los educandos  lo que explica, más que el  dramatismo, la tragedia con que con- vive un sinnúmero de ellas y de ellos. Tragedia en  la  que conviven  con la muerte mucho más que con la vida,  y  en la que la vida  pasa a ser casi un simple pretexto para morir.  \"¿Acostumbras soñar?\", preguntó cierta vez  un periodista de  televisión a un niño de diez años, trabajador rural, en el interior  \n92  CARTAS A  QUIEN PRETENDE ENSEÑAR  de San Pablo. \"No\", le dijo el niño sorprendido por la pregunta,  \"yo sólo tengo pesadillas\".  El  mundo afectivo de ese sinnúmero de niños es un mundo  roto, casi deshecho, vidriería hecha añicos. Por eso mismo esos  niños precisan maestras y maestros profesionalmente competen- tes y amorosos, y no simples  tíos  y  tías.   No hay que tenerle miedo al cariño, no hay que cerrarse a  la  necesidad afectiva  de los seres impedidos de ser.  Sólo los  mal  amados y las mal amadas entienden la actividad docente como  un quehacer de insensibles, llenos de  racionalismos  a un grado tal  que se vacían de vida y de sentimientos.  Creo, por el contrario, que la sensibilidad frente al dolor im- puesto a  las  clases populares brasileñas por el desinterés mal- vado con que son maltratados nos empuja, nos estimula a  la  lucha política por el cambio radical del mundo.  Nada de esto es fácil  de realizar, y a mí no me gustaría darles a  los lectores y a  las lectoras la impresión de que basta con querer  para cambiar el mundo. Querer es fundamental, pero no es sufi- ciente. También es preciso saber querer, aprender a saber querer,  lo que implica aprender a saber luchar políticamente con tácticas  adecuadas y coherentes con nuestros sueños estratégicos.  Lo  que  no me parece posible es hacer nada o muy poco delante de las te- rribles diferencias que nos marcan. Yen materia de construir para  hacer el  mundo, nuestro mundo, menos malo,  no tenemos por  qué distinguir entre acciones modestas o  retumbantes.  Todo lo  que se pueda hacer con competencia, lealtad, claridad, persisten- cia, en la dirección de sumar energías para debilitar las fuerzas del  desamor, del egoísmo, de la maldad, es importante. En este sen- tido, es  tan  válida  Y  necesaria la presencia de un líder sindical en  una fábrica, explicando la razón de ser de la huelga en marcha en  la madrugada y frente a  los portones de la empresa, como indis- pensable es la práctica docente de una maestra que en una escuela  de la periferia habla a sus alumnos sobre el derecho a defender su  identidad cultural. El líder operario en el portón de la fábrica y la  maestra en el salón de clase, ambos tienen mucho que hacer.  \nQUINTA CARTA  93  Siento una imperiosa necesidad de decir que está muy lejos de  mi idea pretender reducir la práctica educativa progresista a  un  esfuerzo simplemente político partidario. Lo que digo es que no  puede haber una enseñanza de contenidos como si  éstos en sí  mismos lo fuesen todo.  Es necesario que la maestra o el maestro dejen volar de manera  creativa su imaginación, obviamente en una forma disciplinada. Y  esto desde el primer día de clase,  demostrando a  sus alumnos la  importancia de la imaginación en nuestras vidas.  Ésta ayuda a  la  curiosidad y a  la inventiva del mismo modo que impulsa a la aven- tura sin la cual no crearíamos. La imaginación naturalmente libre,  volando o  caminando o  corriendo suelta.  En el uso de los movi- mientos del cuerpo, en la danza, en el ritmo, en el dibujo, en la es- critura, desde el mismo instante en que la escritura es  preescritura,   garabato.  En  la oralidad  y  en la repetición de los cuentos que se re- producen dentro de su cultura. La imaginación que nos lleva a sue- ños posibles o  imposibles siempre es necesaria. Es preciso estimu- larla en los educandos, usarla en el  \"diseño\" de la escuela con la  que ellos sueñan. ¿Por qué no poner en práctica dentro del salón  de clase una parte de la escuela con la que sueñan? ¿Por qué al dis- cutir la imaginación o  los  proyectos no les subrayamos a  los edu- candos los  obstáculos concretos, aunque algunos sean por el mo- mento insuperables, para la realización de su imaginación? ¿Por  qué no introducir conocimientos científicos que directa o  indirec- tamente se  hayan  relacionado  con  pedazos  de  su  imaginación?  ¿Por qué no enfatizar el derecho a imaginar, soñar, y luchar por el  sueño? Porque la imaginación que se entrega al sueño posible  y  ne- cesario de la libertad tiene que enfrentarse con las fuerzas reaccio- narias que piensan que la libertad les pertenece como un derecho  exclusivo. Al fin y al cabo es preciso dejar bien claro que la imagi- nación no es ejercicio de gente desconectada de la realidad, que  vive en el aire. Por el contrario, al imaginar alguna cosa lo hacemos  condicionados precisamente por la falta de lo concreto. Cuando el  niño imagina una escuela alegre y libre es  porque la suya le niega   la  libertad y la alegría.  \n94  CARTAS A  QUIEN PRETENDE ENSEÑAR  Antes de abandonar Recife leí varios ejemplares de literatura  \"de cordel\"· en la que los poetas explotaban justamente las ca- rencias de su contexto.  Nunca me olvido de uno de aquellos libros que describía un  postre de más de mil metros de altura con el que la población  de un distrito se daba un banquete. No era lo que llamaríamos  una  imaginación  loca,  sino  la  locura  de  una  población  ham- brienta. El sueño que tomaba fonna en la poesía, de una manera  bastante abundante, era la expresión de una falta bien concreta.  Pensemos ahora en una clase que, con la presencia coordina- dora, sensible e  inteligente de la maestra, imaginase a  través del  diálogo  un sistema  de  principios  disciplinarios,  de  reglas  am- plias, que regulasen la vida en grupo, posiblemente hasta con al- gunos principios demasiado  rígidos.    La  puesta en práctica de  esta \"media constitución\" se apoyaría en un principio b
