Cuando viví  y  trabajé  en Chile  corno  exiliado,  vi,  entre sor- prendido y feliz,  frases grabadas en los troncos de los árboles por  los alfabetizandos en una zona de refonna agraria en la que se  desarrollaba un trabajo de alfabetización para adultos. La soció- loga María Edi Ferreira denominó a  aquellos campesinos \"sem- bradores de palabras\".5  No quiero que se piense que una comunidad que hoyes iletrada  mañana se volverá letrada sólo porque \"plantarnos palabras y  fra-  ses\"  en ella.  ¡No!  Una comunidad se va  haciendo letrada en la me- dida en que así lo exigen sus nuevas necesidades sociales de na- turaleza material y  también espiritual.  Sin embargo, antes de  que ocurran estos cambios, es posible ayudar a  los niños a  leer  ya escribir utilizando artificios del estilo de \"plantar frases\".   La  formación pennanente de las educadoras, que implica la  reflexión critica de la práctica, se apoya justamente en esta dia- léctica entre aquélla y la teoria. Los grupos de fonnación en los  que esa experiencia de sumergirse en la práctica para iluminar  en ella se da, y el proceso en el cual se da lo que se da, son, si se  realizan  bien,  la  mejor manera de vivir  esa formación  perma- nente.6  El  primer punto que debe ser afinnado en relación con  los grupos de fonnación, en la perspectiva progresista en la que  5 Véase Paulo Freire,  Pedagvgía  del  oprimido,    op.  cit.  6    La  Secretaría Municipal de Educación trabajó en la formación  permanente de sus planteles de educadores y educadoras, en coo- peración con las universidades de San Pablo, Campinas y la  Pontificia Universidad Católica de San Pablo, durante toda la ges- tión de Luiza Erundina, por medio de los grupos de formación a  los que la profesora Madalena F.  Weffort sumó su contribución  original.  \nNOVENA CARTA  135  me sitúo, es que ellos no producen sin la necesaria existencia de  un liderazgo democrático, alerta, curioso, humilde y científica- mente competente. Sin esas cualidades, los grupos de formación  no se  realizan  como verdaderos    contextos  teóricos.  Sin  ese  lide- razgo, cuya competencia científica debe estar por encima de la de  los grupos, no se logra la revelación de la intimidad de la prác- tica,  ni es posible sumergirse en ella, para iluminarla a  fin  de  percibir los equívocos y los errores cometidos, y las \"traiciones\" de  la ideología, o los obstáculos que dificultan el proceso de conocer.  Un segundo aspecto que tiene que ver con la operación de los  grupos es el que se refiere al conocimiento que éstos deben tener  de sí mismos.  Es  el problema de su identidad, sin la cual dificil- mente se  constituyen de manera sólida. Y si  no lo consiguen a lo  largo de su experiencia, no les es posible saber lo que quieren con  claridad,    cómo    avanzar  para tratar  de conseguir eso que quieren,  que implica saber  para    qué,    contra    qué,    en favor de    qué    o  de    quién  se  comprometen en el mejoramiento de su propio saber.   la  práctica de pensar y estudiar la práctica nos lleva a la percep- ción de la percepción anterior o al conocimiento del conocimiento  anterior, que generalmente abarca un nuevo conocimiento.  En la medida en que vamos progresando en el contexto teó- rico de los grupos de formación, en la iluminación de la práctica  yen el descubrimiento de errores y equivocaciones, también va- mos ampliando necesariamente el horizonte del conocimiento  científico, sin el cual no nos \"armamos\" para superar los errores  cometidos y percibidos. Este necesario ensanchamiento de hori- zontes, que nace del intento de responder a la necesidad primi- tiva que nos hizo reflexionar sobre la práctica, tiende a ampliar  su espectro. La aclaración de un punto aquí desnuda otro allí  que igualmente precisa ser descubierto. Ésa es la dinámica del  proceso de pensar  la  práctica. Por esto es que pensar la práctica en- seña a  pensar mejor, del mismo modo en que enseña a  practicar  mejor.  En este sentido, el trabajo intelectual en un contexto teórico  exige poner plenamente en práctica el acto de estudiar, del que  \n136  CARTAS A  QUIEN PRETENDE ENSEÑAR  la lectura crítica del mundo no puede dejar de formar parte, in- cluyendo la lectura y  la escritura de la palabra. Leer y escribir  textos se complementan de tal modo -más que eso, se identifi- can en el contexto teórico-, que si son eficaces no cabe decir en  ellos:  \"No sé escribir, no sé leer\".  Me gustaría subrayar además la importancia de la lectura de  periódicos y revistas,  estableciendo conexiones entre los hechos  comentados, sucesos,  desmanes, y la vida de la escuela.  La  im- portancia de ver ciertos programas de televisión,  debidamente  grabados en video, de la confección deliberada de videos  f~ando   retazos de prácticas, hasta de unas sesiones de trabajo en grupo.  Ningún recurso que pueda ayudar a  la reflexión sobre la prác- tica,  del que pueda resultar su mejora en la producción de más  conocimiento, puede o  debe ser menospreciado.  Para evitar el riesgo de un negativo  especialismo  de los grupos  de estudio en cuanto contextos teóricos, es importante hacer  reuniones  interdisciplinarias  periódicas, juntando diferentes  grupos para el debate de un mismo tema visto  desde ángulos  diferentes, aunque relacionados.  Sería una práctica interesante la permuta de programas entre  diferentes grupos de formación, que incluyese videos sobre los  trabajos de los propios grupos. El grupo A le mandaría al grupo  B un video en  el  que habría grabado una de sus sesiones de estu- dio y recibiría otro material semejante de B.  Ambos grupos se  comprometerían a grabar sus reacciones frente a  las actividades  del otro. Las experiencias de reflexión se ampliarían de manera  extraordinaria.  En  Tanzania,  África  ecuatorial,  conocí  una  experiencia  de  enorme eficacia. Un cineasta canadiense filmaba las discusiones  entre una comunidad campesina y un agrónomo sobre la pro- ducción de la próxima temporada agrícola. A  continuación le  mostraba la película a  otra comunidad a  cien kilómetros de dis- tancia y filmaba el debate sobre el debate previo. Después regre- saba a  la comunidad anterior y les mostraba la reacción de los  compañeros que ellos ni siquiera conocían.  \nNOVENA CARTA  137  De esta fonna se  disminuían las distancias entre las comunida- des,  se  ampliaba    el    conocimiento  sobre    el    país,  se  establecían  vínculos necesarios  y  se viabilizaba un grado más crítico de la com- prensión de la realidad nacional.  En poco tiempo, según me dijo  el  cineasta, cubriría gran parte  de Tanzania, lo que ciertamente le creaba ciertos problemas con  las zonas más retrógradas del país.  Desafiar al pueblo a leer críticamente el mundo siempre es una  práctica incómoda para los que apoyan su poder en la \"inocencia\"  de los explotados.  Quien juzga lo que hago es mi práctica. Pero mi práctica teó- ricamente iluminada.  \n\nDécima carta   UNA VEZ  MÁs,  LA CUESTIÓN DE LA DISCIPLINA  Ya  me he referido a  la necesidad de la disciplina inte- lectual que los educandos deben construir en sí mismos con la  colaboración de la educadora. Sin esta disciplina no se crean el  trabajo intelectual, la lectura seria de los textos, la escritura cui- dada, la observación y el análisis  de los  hechos ni el estableci- miento de las relaciones entre ellos. Y que a  todo esto no le falte  el gusto por la aventura, por la osadía, pero que igualmente no  le falte la noción de límites, para que la aventura y la osadía de  crear no se conviertan en irresponsabilidad licenciosa.  Es  pre- ciso ahuyentar la idea de que existen disciplinas diferentes y se- paradas: una intelectual y otra del cuerpo, que tiene que ver con  horarios y entrenamientos, otra disciplina ético-religiosa, etc. Lo  que puede suceder es que determinados objetivos exijan cami- nos disciplinarios diferentes. Sin embargo, lo principal es que si  la disciplina exigida es saludable, lo es también la comprensión  de esa disciplina; si  es democrática la forma de crearla y de vi- virla, si  son saludables los sujetos forjadores de la disciplina indis- pensable,  ella  siempre implica  la experiencia de los  límites,  el  juego  contradictorio  entre  la  libertad  y  la  autoridad,  y jamás  puede  prescindir  de  una  sólida  base  ética.  En  este  sentido,  nunca pude comprender que en nombre de ética alguna la au- toridad  pueda imponer una disciplina absurda simplemente  para ejercitar en la libertad,    acomodándose  a  su capacidad de  ser leal, la experiencia de una obediencia castradora.  \n140  CARTAS A  QUIEN PRETENDE ENSEÑAR  No  hay  disciplina  en    el    inmovilismo,    en la  autoridad  indife- rente, distante, que entrega sus propios destinos a la libertad, en  la autoridad que renuncia en nombre del respeto a esa libertad.  Pero esta última tampoco existe en el  inmovilismo,    en  el  que la  autoridad  le  impone  su voluntad,  sus  preferencias,  como las  mejores para ella misma.  Inmovilismo  al que se somete la liber- tad, intimidada, o    movimiento  de la pura sublevación. Al  contra- rio, sólo hay disciplina en  el    movimiento  contradictorio entre la   coercibilidad  necesaria de la autoridad y la búsqueda despierta  de la libertad para asumirse como tal. Es  por esto que la autori- dad que se hipertrofia en el autoritarismo o  se atrofia en liber- tinaje, perdiendo  el    sentido del  movimiento,    se pierde a sí misma y  amenaza la libertad. En la hipertrofia de la autoridad, su  movi- miento  se fortalece a  tal punto que  inmoviliza  o    distorsiona    total- mente el  movimiento  de la libertad.  La  libertad inmovilizada por  una autoridad arbitraria o  chantajista es aquella que, sin haberse  asumido como lo que es, se pierde en la falsedad de  movimientos   no auténticos.  Para que  haya  disciplina  es  preciso  que  la  libertad  no sólo  tenga el derecho de decir \"'no\",  sino que lo ejerza frente a lo que  se  le  propone  como  la  verdad  y  lo  cierto.  La  libertad  precisa  aprender a afirmar negando, no por el puro negar sino como cri- terio de certeza. Es en este movimiento de ida y vuelta como acaba  por intemalizar la autoridad y se  transforma en una libertad con  autoridad, única manera de respetarla en cuanto autoridad.  Es  de indiscutible  importancia la responsabilidad que  tene- mos, en cuanto seres sociales e históricos portadores de una sub- jetividad que desempeña un papel importante en la historia, en  el proceso de ese    movimiento  contradictorio entre la autoridad y  la libertad. Responsabilidad política, social, pedagógica, ética, es- tética,  científica.  Pero al reconocer la responsabilidad política  superemos también la politiquería, al subrayar la responsabili- dad social digamos \"no\" a  los intereses puramente individualis- tas,  al reconocer los  deberes pedagógicos dejemos de lado las  ilusiones pedagogistas, al demandar la práctica ética huyamos de  \nDÉCIMA CARTA  141  la fealdad del puritanismo y entreguémonos a  la invención de la  belleza de la pureza. Finalmente, al aceptar la responsabilidad  científica, rechazemos la distorsión cientificista.  Tal vez algún lector o lectora más \"existencialmente cansados\"  e  \"históricamente anestesiados\"l digan que estoy soñando dema- siado. Soñando, sí, puesto que como ser histórico si  no sueño no  puedo  estar siendo.  Demasiado,  no.  Hasta  creo que soñamos  poco al  soñar estos sueños tan fundamentalmente  indispensa- bles para la vida o  para la solidificación de nuestra democracia:  la  disciPlina  en el acto de leer, de escribir, de escribir y leer, en  el   de enseñar y aprender, en  el    proceso placentero pero difícil de  conocer; la disciplina en el respeto y en  el    trato de la cosa pú- blica; en el respeto mutuo.  No vale decir que como maestro o como maestra \"no importa la  profundidad en la que trabaje,  poca importancia tendrá lo  que  haga o  deje de hacer, tendrá poca importancia en vista de lo  que pueden hacer los poderosos en favor de sí mismos y en con- tra de los intereses nacionales\". Ésta no es una afinnación ética.  Simplemente es interesada y acomodada. Lo peor es que acomer  dándose, mi    inmovilidad  se convierte en motor de más desver- güenza. Mi inmovilidad, producida o  no por motivos fatalistas,  funciona como acción  eficaz  en favor  de las  injusticias que se  perpetúan, de los descalabros que nos afligen, del atraso de las  soluciones urgentes.  No se  recibe democracia de regalo. Se lucha por la demer  cracia. No se rompen las amarras que nos impiden ser con una   paciencia  de    buenas maneras  sino con el  pueblo  movilizándose, or- ganizándose, conscientemente crítico. Con las mayorías popu- lares no sólo  sintiendo  que vienen siendo explotadas desde que  se inventó el Brasil, sino uniendo también al  sentir  el  saber  que  están siendo explotadas, el    saber  que les da la  raison  d'étre    del  1 A  pl\"Opósito  de \"cansancio existencial\" y \"anestesia histórica\" véase  Paulo Freire,  Pedagogía    iÚ!  la  esperanUJ,    afi.    cit.  \n142  CARTAS A  QUIEN PRETENDE ENSEÑAR  fenómeno, tal como alcanza preponderantemente el nivel de  su sensibilidad.  Al  hablar de  sensibilidad del fenómeno  y de  aprehensión  critica  del  fenórrumo    no estoy de ninguna manera sugiriendo algún tipo de  ruptura entre  sensibilidad,  emocionesy  actividad cognoscitiva.  Ya  dije  que conozco con todo mi cuerpo: con los sentimientos, con las  emociones, con la mente crítica.  Dejemos bien claro que el pueblo que se moviliza,  el pueblo  que se  organiza,  el pueblo que conoce en términos críticos,    el   pueblo que profundiza y afianza la democracia contra cualquier  aventura autoritaria, es igualmente un pueblo que forja la disci- plina necesaria sin la cual la democracia no funciona. En  el  Bra- sil  casi siempre oscilamos entre la ausencia de disciplina por la  negación de la libertad y la ausencia de disciplina por la ausen- cia de autoridad.  Nos falta disciplina en casa,  en la escuela, en las calles,  en el  tránsito. Es  asombroso el número de personas que mueren to- dos los fines de semana por pura indisciplina, o  lo que gasta el  país en estos accidentes o en los desastres ecológicos.  Otra  falta  de  respeto  evidente  hacia  los  otros,  tan  nefasta  como la manera como venimos siendo indisciplinados, es la li- cenciosidad, la irresponsabilidad con la que en este país se mata  impunemente.  Dominadas  y  explotadas en el sistema capitalista, las clases po- pulares necesitan -al mismo tiempo que se comprometen en el  proceso de formación de una disciplina intelectual- ir creando  una disciplina social cívica, política, absolutamente indispensable  para una democracia que vaya más allá de la simple democracia  burguesa y liberal. Una democracia que finalmente persiga la su- peración de los niveles de injusticia y de irresponsabilidad del ca- pitalismo. Ésta es  una de las  tareas a  las que debemos entregar- nos, y  no a  la  mera tarea de    enseñar    en el sentido equívoco de   transmitir  el saber a  los educandos.  El  maestro debe enseñar. Es preciso que lo haga. Sólo que en- señar no es  transmitir  conocimiento. Para que el acto de enseñar  \nDÉCIMA CARTA  143  se constituya como tal es preciso que el acto de  aprender  sea pre- cedido por, o  concomitante de, el acto de  aprehender  el contenido  o  el objeto cognoscible, con el que el  educando  también  se    hace  pro- ductor del conocimiento  que le fue enseñado.  Sólo en la medida en que  el    educando se convierta en sujeto  cognoscente  y    se  asuma como tal,  tanto como el maestro tam- bién es un sujeto cognoscente, le será posible transformarse en  sujeto productor del significado o  del conocimiento del objeto.  Es  en este    movimiento    dialéctico en donde    enseñar  y    aprender  se  van  transformando en  conocer  y    reconocer,    donde el educando va  conociendo lo que aún no conoce  y  el educador  reconociendo  lo  antes sabido.  Esta forma de no sólo comprender el proceso de enseñar sino  de vivirlo,  exige la disciplina de la que vengo hablando, que no  puede a  su vez  dicotomizarse frente a  la disciplina política indis- pensable para la invención de la ciudadanía. Sí, en cambio, frente  a  la ciudadanía, sobre todo en una sociedad como la nuestra, de  tradiciones tan autoritarias y discriminadoras desde el punto de  vista del sexo, de la raza  y  de la clase.    La  ciudadanía realmente es  una  invención,    una  producción  política.    En este  sentido, su pleno  ejercicio por quien sufre cualquiera de las discriminaciones, o to- das al mismo tiempo, no es algo que se usufructúe como un dere- cho pacífico  y  reconocido. Al  contrario, es un derecho que tiene  que ser alcanzado  y  cuya conquista hace crecer sustantivamente la  democracia. Ésta es la ciudadanía que implica el uso de la libertad   ~e  trabajar, de comer, de vestir, de calzar, de dormir en una casa,  de mantenerse a sí mismo  y  a su familia,  de amar, de sentir rabia,  de llorar, de protestar, de apoyar, de desplazarse, de participar en   tal  o cual religión, en  tal  o  cual partido, de educarse a sí mismo  y   a la familia, la libertad de bañarse en cualquier mar de su país-. La  ciudadanía no llega por casualidad: es una construcción que, ja- más terminada, exige luchar por ella, exige compromiso, claridad  política, coherencia, decisión. Es por esto mismo que una educa- ción democrática no se puede realizar al  margen de una educación  de y para la ciudadanía.  \n144  CARTAS A  QUIEN PRETENDE ENSEÑAR  Cuanto más  respetemos a  los  alumnos y a  las alumnas inde- pendientemente de su color, sexo y clase social, cuantos más tes- timonios de respeto demos en nuestra vida diaria, en la escuela,  en las  relaciones con nuestros colegas, con los porteros, cocine- ras, vigilantes, padres y madres de alumnos, cuanto más reduz- camos la distancia entre lo que hacemos y lo que decimos, tanto  más estaremos contribuyendo para el fortalecimiento de las ex- periencias democráticas. Estaremos desafiándonos a nosotros mis- mos a luchar más en favor de la ciudadanía y de su ampliación. Es- taremos  forjando  en  nosotros  mismos  la  disciplina  intelectual  indispensable sin  la  cual  obstaculizamos  nuestra formación  así  como la no menos necesaria disciplina política, fundamental para  la lucha en la invención de la ciudadanía.  \nÚltimas palabras   SABER Y  CRECER-TODO q,UE VER  Cierro este libro con un texto presentado en un con- greso realizado en Recife en abril de 1992, y en el que aclaro al- gunos análisis sobre el    contexto  concreto  de lo cotidiano.  Reflexionar sobre el  tema implícito en una frase  es  la tarea  que me fue propuesta por los organizadores de este encuentro.  El  punto de partida de mi reflexión debe residir en la frase:  \"saber y crecer-todo que ver\", tomada como objeto de mi curiosi- dad epistemológica. Esto significa, en una primera instancia, tratar  de aprehender la inteligencia de la frase,  lo que a su vez  exige la  comprensión de  las    palabras que hay en ella, en las  relaciones de  unas con otras.  En primer lugar nos enfrentamos a dos bloques de pensamiento:   saber  y  crecer  y  todo  que ver.    Los dos verbos del primer bloque, que po- drían ser sustituidos por dos sustantivos,  sabiduria  y  crecimiento,    están  unidos por la conjunción copulativa  y.    En el fondo, estos dos blo- ques  guardan  en sí mismos la posibilidad de un desdoblamiento del  que resultaría que el proceso de saber y el proceso de crecer tienen  todo que ver el uno con el otro. O  incluso que el proceso de saber  implica el de crecer. No es posible saber sin una cierta dosis de cre- cimiento. No es posible crecer sin una cierta dosis de sabiduría.  Saber es un verbo transitivo. Un verbo que expresa una acción  que, ejercida por un sujeto, incide o recae directamente en un ob- jeto sin regencia preposicional. Por eso es que el complemento de  este verbo se  llama objeto directo. Quien sabe, sabe  alg;una  cosa.  \n146  CARTAS A  QUIEN PRETENDE ENSEÑAR  Sólo yo sé el dolorque me hiere.  Dolores  el objeto directo de \"se\",  la incidencia de mi acción de saber.  Crecer, al contrario, es un verbo  intransitivo.    No necesita nin- guna  complementación  que  selle  su  significado.    Lo    que  se  puede hacer -y generalmente se hace en función de las exigen- cias del pensar del sujeto- con la significación de este tipo de  verbo es agregarle elementos o  significados circunstanciales, ad- verbiales.  Crecí  sufridamente.    Crecí  manteniendo viva mi curiosi-  dad,    donde \"sufridamente\" o \"manteniendo viva mi curiosidad\"  adverbializan modalmente mi proceso de crecer.  Fijémonos ahora un poco en el proceso de saber.  Una afirmación inicial que podemos hacer al indagar sobre el  proceso de saber,  tomado ahora como fenómeno vital,  es  que,  en primer lugar, se da en la vida y no sólo en la existencia que  nosotros, mujeres y hombres, hemos creado a  lo largo de la his- toria con los materiales que la vida nos ofreció. Pero el que aquí  nos interesa es el saber que nos hacemos capaces de gestar, y no  cierto tipo de reacción que se verifica en las  relaciones que se  dan en la vida humana.  En el nivel de la existencia, la primera afirmación que hay que  hacer es que el proceso de saber es un proceso social cuya di- mensión individual no puede ser olvidada o siquiera subestimada.  El proceso de saber que envuelve al  cuerpo consciente como un  todo -sentimientos, emociones,  memoria,  afectividad,  mente cu- riosa en forma epistemológica, vuelta hacia el objeto- abarca igual- mente a otros sujetos cognoscentes, vale decir, capaces de conocer y  curiosos  también.  Esto  simplemente significa  que la relación  lla- mada cognoscitiva no concluye en la relación sujeto cognoscente- objeto cognoscible, porque se extiende a otros sujetos cognoscentes.  Otro aspecto que me parece interesante subrayar aquí es el que  concierne a  la manera espontánea en que nos movemos por el  mundo, l    de la que resulta un cierto modo de saber, de percibir, de  1 Véase Karel Kosik,    op.  ciL  \nÚLTIMAS PALABRAS  147  ser sensibilizado por ese mundo, por los objetos, por las presen- cias, por el habla de los otros. En esta fonna espontánea de mo- vemos percibimos las  cosas,  los hechos, nos sentimos advertidos,  tenemos  tal  o cual comportamiento en función de las señales cuyo  significado  intemalizamos.  De  ellos  adquirimos  un saber inme- diato,  pero no aprehendemos la    razón    de    ser  fundamental de los  mismos. En este caso nuestra mente, en la reorientación espontá- nea que hacemos del mundo, no opera de fonna epistemológica.  No se  dirige críticamente, en fonna indagadora, metódica, rigu- rosa, hacia el mundo o los objetos hacia los que se inclina. Éste es  el \"saber de experiencia hecho\"  (CamOes)  al que sin embargo le  falta el depurador de la criticidad. Es la sabiduría ingenua, del sen- tido común, desannada de métodos rigurosos de aproximación al  objeto, pero que no por eso puede o debe ser desconsiderada por  nosotros. Su necesaria superación pasa por el respeto hacia ella y  tiene en ella su punto de partida.  Tal  vez  sea interesante que tomemos como objeto de nuestra  curiosidad una mañana y percibamos la diferencia entre estas dos  maneras de movemos en el mundo: la espontánea y la sistemática.  Amanecemos. Despertamos. Nos cepillamos los dientes. Toma- mos el primer baño del día al que sigue el desayuno. Conversamos  con nuestra esposa o la mujer con su marido. Nos infonnamos de  las primeras noticias. Salimos de casa. Caminamos por la calle. Nos  cruzamos con personas que van y que vienen. Nos detenemos en el  semáforo. Esperamos  la  luz verde cuyo significado aprendimos en  nuestra infancia y en ningún momento nos preguntamos o indaga- mos sobre ninguna de estas cosas que hicimos. Los dientes que ce- pillamos, el café que tomamos (a no ser que reclamemos por algo  que se salió de la rutina), el color rojo del semáforo por causa del  cual paramos sin tampoco preguntamos. En otras palabras: in- mersos en lo cotidiano marchamos en él,  en sus \"calles\", en sus  \"calzadas\". Sin mayores necesidades de indagar sobre nada. En  lo cotidiano, nuestra mente no opera en fonna epistemológica.  Si  continuamos un poco más en el análisis de lo cotidiano de  esta mañana que estamos analizando, o  en la cual nos estamos  \n148  CARTAS A  QUIEN PRETENDE ENSEÑAR  analizando, observaremos que para que tomásemos una mañana  cualquiera como objeto de nuestra curiosidad fue necesario que  lo hiciésemos fuera de la experiencia de lo cotidiano. Fue pre- ciso que emergiésemos para entonces \"tomar distancia\" de ella o  de la manera en que nos movemos en el mundo en nuestras ma- ñanas. También es interesante observar que es en la operación  de \"tomar distancia\" del objeto cuando nos \"aproximamos\" a  él.   La  \"toma de distancia\" del objeto es la \"aproximación\" epistemo- lógica que hacemos a  él. Sólo así podemos \"admirar\" el objeto,  que en nuestro caso es la  mañana,  en cuyo tiempo analizamos el  modo en que nos movemos en el mundo.  En los dos casos referidos aquí me parece fácil percibir la dife- rencia sustantiva de la posición que ocupamos, como \"cuerpos  conscientes\", al movernos en el mundo. En el primer caso, aquel  en que me veo de acuerdo con el relato que yo mismo hago so- bre cómo me muevo en la mañana, y en el segundo, en el que  me percibo como sujeto que describe su propio moverse. En el  primer momento, el de la experiencia de lo y en lo cotidiano, mi  cuerpo consciente se va exponiendo a  los hechos sin que, inte- rrogándose sobre ellos, alcancen su \"razón de ser\". Repito que  este saber -porque también existe- es el hecho de la pura expe- riencia. En el segundo momento, en el que nuestra mente opera  de forma  epistemológica,  el  rigor  metodológico  con que  nos  aproximamos al objeto, habiendo \"tomado distancia\" de él, vale  decir, habiéndolo objetivado, nos ofrece otro tipo de saber, cuya  exactitud proporciona al investigador o al  s~jeto  cognoscente un  margen de seguridad que no existe en el primer tipo de saber, el  del sentido común.  Esto no significa de ninguna manera que debamos menospre- ciar este saber ingenuo cuya superación  necesaria pasa por el  respeto hacia él.  En el fondo, la discusión sobre estos dos saberes implica el de- bate entre la práctica y la teoría, que sólo pueden ser compren- didas si  son percibidas y captadas en sus relaciones contradicto- rias,  nunca aislada cada una en sí misma. Ni sólo teoría, ni sólo  \nÚLTIMAS  PALABRAS  149  práctica. Es por esto que están equivocadas las posiciones de na- turaleza político-ideológica, sectarias, que en vez de entenderlas  en su relación contradictoria hacen exclusiva alguna de ellas. El   basismo,    negando la validez de la teoría; el  elitismo  teuricista,    ne- gando la validez de  la  práctica. El  rigor con el que me aproximo a  los objetos me prohíbe inclinarme hacia cualquiera de estas posi- ciones: ni basismo ni elitismo, sino práctica  y  teoría iluminándose  mutuamente.  Pensemos ahora un poco en el acto de  crecer.    Tomemos el cre- cer como  objeto de  nuestra  inquietud,  de  nuestra curiosidad  epistemológica. Más que sentir o  ser tocados por la experiencia  personal  y  social de crecer, busquemos la inteligencia radical del  concepto,  sus ingredientes. EmeIjamos de lo cotidiano en que  nos \"cruzamos\"  con  y  vivimos    la  experiencia de crecer,  tal  como es- peramos la luz verde para cruzar la calle, vale decir, sin preguntar- nos nada. EmeIjamos de lo cotidiano y,  con la mente curiosa,  indaguémonos sobre el  crecer.   En primer lugar, al tomar el concepto como objeto de nuestro  saber, percibimos, en un primer acercamiento, que se nos revela  como un fenómeno vital  cuya experiencia inserta a  sus sujetos  en un movimiento dinámico.  La  inmovilidad en el crecimiento  es enfennedad  y  muerte.  Crecer es parte de la experiencia vital.  Pero justamente por- que mujeres  y  hombres, a lo largo de nuestra larga historia, aca- bamos por ser capaces de, aprovechando los materiales que la  vida  nos ha ofrecido,  crear con ellos  la    existencia    humana -el  lenguaje, el mundo simbólico de la cultura, la historia-, crecer,  en nosotros o  entre nosotros, adquiere un significado que tras- ciende el    crecer  en la pura vida.  Entre nosotros, crecer es algo  más que entre los árboles  y    los animales,  que a  diferencia de  nosotros, no pueden tomar su propio crecimiento como objeto  de su preocupación. Entre nosotros, crecer es un proceso sobre  el  cual  podemos  intervenir;  el  punto  de  decisión  del  creci- miento humano no se encuentra en la especie. Somos seres in- discutiblemente  prog;ramados,    pero de ningún modo  determina- \n150  CARTAS A  QUIEN PRETENDE ENSEÑAR   dos.    Y somos programados principalmente  para aprender,    como  señala Fran.;:ois Jacob.  Es a ese crecer, entre nosotros, a lo que se refiere la propuesta de  esta disertación. Y no el crecer de las plantas o  de los niños recién  nacidos, o  de  Andra  y de Jim, nuestros perros pastores alemanes.  Es  precisamente porque nos hacemos  capaces  de  inventar  nuestra existencia, algo más que la vida que ella implica pero  suplanta,  que  entre  nosotros  crecer  se  vuelve  o  se  está  vol- viendo mucho más complejo y problemático -en el sentido ri- guroso de este adjetivo- que crecer entre los árboles y los otros  animales.  Un dato importante como punto de partida para la compren- sión crítica del crecer, entre nosotros existentes, es que, \"progra- mados para aprender\", vivimos o  nos experimentamos o  estamos  abiertos a experimentar la relación entre lo que heredamos y lo  que adquirimos.  Nos  convertimos en seres genoculturales.  No  somos sólo  naturaleza  ni tampoco somos sólo cultura, educación     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }

    applyTheme(currentTheme);

    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
