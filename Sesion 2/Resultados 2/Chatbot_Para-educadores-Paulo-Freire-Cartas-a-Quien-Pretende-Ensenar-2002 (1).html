\nPrólogo   Cuando en junio de 1992 Paulo Freire me pidió escri- bir el prefacio para un libro suyo  (un libro que -según me con- taba entusiasmado- se  encontraba escribiendo en esos momen- tos y cuyo título en portugués sería  Professora  sim,  tia  nao\"'),    me  sentí condecorada.  No sólo por tratarse de un libro de Paulo,  sino  por tratarse  de    éste    en  particular:  un libro  dirigido  a  los  maestros -y, más específicamente, a  las maestras- de la escuela  regular, no para acusarlos sino para defender su identidad y legi- timidad como docentes, no para lisonjearlos sino para desafiar- los,  no para baJarles orientaciones sino para dialogar con ellos.  Que Paulo Freire escriba un libro dirigido expresamente a los  maestros -no a los educadores de adultos que trabajan en la pe- riferia del aparato escolar sino a los educadores de niños que en- señan todos los días en las aulas-, y que lo haga en estos térmi- nos -no apuntándolos con el dedo, ni siquiera solidarizándose  con ellos desde fuera, sino interpelándolos desde un \"nosotros\"  en el que Freire se incluye--, sorprenderá sin duda a  muchos, se- guidores y opositores. Porque muchos, en WlO y otro lado, con- tinúan viendo en Freire el símbolo de la antiescuela (la crítica a   la  escuela confundida con su negación), el antimaestro (la crítica  ..  Maestra  sí,  tía  no.  En  Brasil,  los  niños  de  la  escuela  acostumbran  decirle  tía  a la maestra, pero como en Buenos Aires  y  México esto no  es así,  el  título original no diría nada, por lo que hemos preferido  titular la edición en español con el subtítulo porrugués:  Cartas a quien  pretmdunseñar.    [E.)  \n12  CARTAS A  QUIEN PRETENDE ENSEÑAR  al  sistema personificada como críitica al maestro)  e  incluso la  antienseñanza (la confusión entre  autoritarismoy autoridad,    entre   manipulación  y ejercicio de la  dim:tividad  que supone toda relación  pedagógica) .  y  es  que, a  menudo, como él mismo bien sabe y reclama,  el  Freire que ha circulado de boca en  boca  y de cita en cita por el  mundo es  un Freire simplificado, formulizado,  unilateralizado,  estereotipado a  partir de un conjunto de nociones  f~as  --educa- ción bancaria, alfabetización, educación de adultos, concientiza- ción, diálogo, palabra generadora- y virtualmente suspendido en  los años sesenta y setenta, junto con sus dos primeros libros:    La  educación  como práctica  de    la  libertad    (1965) Y  Pedagogía  del  oprimÚÜJ   (1969). Muchos admiradores y críticos, incluso dentro de la  pr~   pia América Latina,  desconocen su trayectoria durante los últi- mos veinticinco años (¡un cuarto de siglol): su experiencia de tra- bajo en Europa y África; su reencuentro con el Brasil después del  largo exilio; su gestión como secretario de Educación del Munici- pio de San Pablo entre 1989 y 1991; su prolífica obra, siempre in- acabada,  traducida a  múltiples idiomas y esparcida por todo el  mundo; su continuo aprendizaje y su eterna disposición para de- jarse sorprender por lo nuevo o lo no percibido con anterioridad.  Me alegra  ~ecía-Ia  posibilidad de prologar este libro no sólo  por su autor, sino por su interlocutor: los maestros, los grandes  relegados de la globalización educativa y de las políticas educa- tivas contemporáneas. En el mismo momento en que  declaraci~   nes y acuerdos nacionales e internacionales coinciden en la cen- tralidad de la educación para el desarrollo individual y social, en  la urgencia de una transformación educativa profunda que ase- gure no sólo cantidad sino calidad, y en el papel protagónico de  los maestros en dicha transformación y en el logro de dicha ca- lidad, la situación de los maestros ha llegado a \"un punto into- lerablemente bajo\",  según reconoce la propia Organización  Internacional del Trabajo (orr).  Intolerablemente bajos y  malos son los salarios,  la calidad  de vida, la autoestima, la valoración social, las condiciones de  \nPRÓLOGO  13  enseñanza, las oportunidades de fonnación  y  perfeccionamiento,  el reconocimiento y la  investigación  del  problema, y los  presu- puestos destinados a resolverlo  para  tomar mínimamente viables  los ambiciosos objetivos y metas planteados en el discurso educa- tivo de este último decenio del siglo.  En realidad, la educación  que algunos avizoran  corno la educación del siglo  XXI  -televi- sión, video, computadoras y aparatos de todo tipo, modalidades  a distancia, autodidactismo, enseñanza individualizada, aprendi- zaje  programado, paquetes multimedia- parecería no incluir a  los  maestros y  tener reservado para ellos,  por  el  contrario, un  proyecto de extinción.  La \"cuestión docente\" es, en efecto,  LA  cuestión por excelen- cia dentro de la problemática educativa de la época. Terna tabú  del cual nadie quiere hablar, tópico que ahuyenta  el  análisis y  el   debate, asunto que no parece encajar en ninguna agenda ni pre- supuesto ni organigrama ni esquema clasificatorio.   Las  realidades son contundentes y se expresan a escala mun- dial:  pauperización y proletarización de los maestros; nivel edu- cativo  precario de amplios  sectores  del  magisterio en servicio  (incluyendo  pobres  niveles  de alfabetización    y    educación  bá- sica); reducción de la matrícula y bajas expectativas y motivación  de los aspirantes al  magisterio  (ser maestro o  maestra corno úl- timo recurso); ausentismo marcado; abandono de la profesión;  creciente incorporación de maestros empíricos o  legos; pérdida  de  identidad y  legitimidad  social  del  oficio  docente;  falta  de  oportunidades de avance y superación personal; huelgas y paros  cada vez  más violentos,  frecuentes  y  prolongados;  los  maestros  percibidos como problema (antes que corno condición y recurso)   y  como  el  obstáculo principal para la  renovación y el  avance  educativos.  También los argumentos se repiten con sorprendente homoge- neidad  (y  son aceptados e intemalizados con sorprendente facili- dad): no hay dinero para incrementar los salarios; los  maestros  tienen de todos modos un horario holgado y trabajan poco; los  incrementos salariales    (y  la capacitación misma)  no han traído  \n14  CARTAS A  QUIEN PRETENDE ENSEÑAR  consigo los  esperados mejores resultados de aprendizaje de los  alWlU1oS;  la capacitación en servicio está más al alcance y rinde más  que la inversión en formación inicial, aconsejándose en particular  las modalidades a distancia; invertir en textos escolares  (mejor si  son autoinstructivos, en tanto minimizan la intervención del do- cente) yen la capacitación de los maestros en su manejo es más se- guro, barato y fácil  que intentar la compleja vía de la reforma cu- rricular o  la  revisión global de las políticas de selección, formación  y apoyo docente; una de las  maneras de reducir costos  (y,  even- tualmente, incrementar el  presupuesto destinado a  mejorar  las   condiciones de los maestros) es aumentar el número de alumnos  por aula,  bajo el  entendido de que, desde la perspectiva de los  alumnos y de sus rendimientos de aprendi:z.;ye,  nada cambia si  el  grupo es  numeroso o  numerosÍsimo  (no hay  diferencia -nos  dicen- entre treinta, cincuenta u ochenta alumnos en una clase).  No es éste el lugar para polemizar sobre la discutible validez  de estos argumentos. Lo cierto es que crecientemente se presen- tan como verdades universales, científicamente fundamentadas  en estudios y evaluaciones, y es sobre estas afirmaciones donde  están diseñándose las grandes políticas y estrategias educativas  actualmente en marcha en los países en desarrollo. Políticas y es- trategias que portan un determinado proyecto de sociedad, de  educación, de alumno y de maestro, y que es  preciso desentra- ñar y  discutir.  Políticas  y  estrategias  que  hablan  de  protago- nismo, profesionalización y autonomía docentes, pero que con- tinúan  de  hecho  profundizando  el  perfil  subordinado  y  subvalorado del oficio docente, condenando a  los maestros a  la  enajenación y a  la mediocridad, a  ser ciudadanos de segunda,  implementadores de currículos y textos escolares, facilitadores  de  aprendi~jes  en cuya definición y orientación no participan  ni tienen control.  Éste es el contexto que vuelve a  este pequeño libro tanto más  importante y oportuno.  Cuando  la  confrontación  entre  gobiernos y  organizaciones  magisteriales ha llegado en muchos países a  un punto crítico,  \nPRÓLOGO  15  cuando todos hablan  soUm  los maestros o  a  los maestros pero pocos  parecen dispuestos a  hablar  con  ellos,  alguien tiene que poder  construir un puente para un diálogo de tú a  tú, de educador a  educador. Quién mejor que Paulo Freire -persona y símbolo, co- lega y autoridad- para hacerlo. El  Freire maestro dialoga aquí  con otros maestros,  sin  intermediarios, adoptando el  lenguaje  cercano e  informal de la carta, compartiendo sus experiencias  personales, ilustrando a  través de ellas el derecho que tiene todo  maestro y maestra a ser falible y a  equivocarse, a  ser héroe y ser  humano al mismo tiempo.  Cuando lo que prima y tiende a imponerse es una visión estre- cha, minimalista e inmediatista de la formación docente --capaci- tación, entrenamiento, manual, cursillo, taller, métodos, técnicas,  recetarios, fórmulas-, alguien tiene que resucitar el imperativo de  una formación integral, rigurosa y exigente de los educadores; ir  al  rescate  de  su  inteligencia,  su  creatividad  y  su  experiencia  como materia prima de su propio proceso educativo; recuperar  la unidad entre teoría y práctica como espacio para la reflexión  y el perfeccionamiento pedagógicos; volver a  los temas fundan- tes, aquellos sin cuya comprensión y revisión caen en terreno es- térillos mejores textos, los métodos y técnicas más modernos de  enseñanza.  Las  diez cartas que componen este libro correspon- den a  diez de esos  temas,  temas que han acompañado de ma- nera permanente y  recurrente la  trayectoria,  la  obra y  la  bús- queda de Freire: las  fundamentales diferencias entre enseñar y  aprender,  las  fuentes  (y  la aceptación)  de  la inseguridad y  el  miedo, la opción por el magisterio, las cualidades del buen edu- cador,  el primer día de clases,  la  relación  entre educadores y  educandos, la diferencia entre hablar  al  educando y hablar  con   él, los VÍnculos entre identidad cultural y educación así como en- tre contexto concreto  y    contexto teórico,  el  tema crítico de la  disciplina.  Centrados en la lucha por las reivindicaciones económicas, los  maestros y sus organizaciones han dejado erosionar su propia for- mación y capacitación permanente como un derecho y como una  \n16  CARTAS A  QUIEN  PRETENDE ENSEÑAR  condición fundamental de su ejercicio y valornción profesionales.  En contraste,  y  en un clima genernl de cuestionamiento a la unila- teralidad  y  estrechez  de las  reivindicaciones  sindicales,  los  no- maestros  y  sus  organizaciones  izan  la  consigna  de  la  \"(re)valorización\" de los maestros,  despojándola hasta donde es  posible de sus implicaciones económicas (valorización expresada  entre otros en salarios y calidad de vida dignos) y sesgándola hacia  sus determinantes sociales  y  afectivos  (respeto, legitimidad, reco- nocimiento, aprecio, gratificación, autorrealización, autoestima).  En este cruce, Paulo Freire nos ofrece una entrada diferente  para  tratar  ambos  temas  -(des)profesionalización  y   (des)valorización- al  proponemos reflexionar sobre un hecho  tan trivial como significativo: el apelativo de  tía  que, desde hace  algunos años, empezara a  sustituir al de  profesora    o    maestra    en  escuelas, jardines de infantes y guarderías de varios  países de  América Latina y,  en particular, del Brasil.  Al  poco tiempo de publicarse este libro en portugués, y hallán- dome en misión de trabajo en el Brasil,  me propuse sondear in- formalmente las  percepciones acerca del  tía  entre las  directoras  y profesoras de escuelas públicas que iba visitando en diversos es- tados.  Casi  todas dijeron sentirse contentas y halagadas con el  trato de  tía,    asociándolo a  cariño y confianza por parte de sus  alumnos, a  mayor proximidad con los padres de familia,  a  am- biente escolar agradable, distendido, fluido.  Mi  mención de un  libro de Paulo Freire en el que éste  ponía en tela de juicio el  apelativo  tía,    acusándolo de contribuir subrepticiamente a desle- gitimar y desprofesionalizar el papel docente, causaba por lo ge- neral estupor.  El  estupor que se  provoca cuando se  tematiza  y   pone entre signos de interrogación el sentido común, la cotidia- neidad, lo dado por obvio, lo que ha pasado  ya  a  formar parte  del reino de la ideología. Porque lo cierto es que la palabra  tía,   en tanto portadora de imágenes fuertemente vinculadas al ám- bito de la familia  y  los afectos, satisface por vías insospechadas la  necesidad de la tan ansiada valorización  (por parte de los alum- nos,  los  padres,  la  comunidad), bloqueando la posibilidad  de  \nPRÓLOGO  17  percibir su signo  contradictorio,  su  efecto    boomerang    sobre  la  identidad del educador.  Esto es precisamente lo que hace del moderno  tía  -como del   apósto~  el    héroe,    el  jardinero,    el  guía,    el  conductor,    el  ejemplo,    la  van- guardia,    y tantos otros símiles con los que se ha ensalzado con- vencionalmente el ego docente- una trampa mortal. Esa profe- sora-tía, que se siente apreciada y querida, está aceptando que es  su sobrenombre de  tía  el  que evoca afecto, no su nombre y su pa- pel propios de  profesora,    de  'TTUUStra.    Aceptando la candidez de la   tía,    acepta de hecho un conjunto de significados y reglas: las tías  dan amor incondicional a  sus sobrinos, se sacrifican por ellos,  buscan en todo momento la armonía familiar,  no reclaman  ni  entran en conflicto en defensa de sus  derechos. En última ins- tancia, la tía, en principio y por principio, como subraya Freire,  no puede hacer huelga.  \"Profesora,  sí;  tía,  no\"  es  el mensaje  central,  sencillo y  pro- fundo con  el  que Paulo Freire se propone llegar a los educado- res a través de este libro. Mensaje sencillo, altamente subversivo,  porque nos hace ver que  el  título de  tía-como  el de apóstolo el  de sembrador de semillas o el de  fcnjador de juventudes-   confunde  y adormece, encandila y posterga, y no ha traído de hecho con- sigo ni mejores salarios ni mayor estatus ni condiciones adecua- das  de  trabajo  ni  profesionalización  ni  perspectiva  de  futuro.  Porque nos recuerda que el apelativo de  profesora -7TUUStra,  educa- dora,-   tiene valor y dignidad por sí mismo, y no necesita ni de sí- miles grandilocuentes ni de apodos ni de disfraces vergonzantes   -facilitador,  monitor,  coordinador,  organizador del aprendizaje,  ¡ptor pe- dagógico.    Porque, al desenmascarar a la  tía  y restituir a  la profe- sora su derecho de dar y recibir afecto en tanto  profesora,    nos per- mite reconocer que el amor es parte integral de la calidad tanto  del educador como de la educación.  ROSA MARÍA TORRES  NUEVA YORK,  OCTUBRE DE  1994  \n\nIntroducción   No sé si  quien lea este libro verá con facilidad el placer  con que lo he escrito. Fueron casi dos meses en los que entregué  algunos de mis días a  su redacción, la mayor parte en mi escri- torio, en nuestra casa, así corno en aviones y cuartos de hote- les.  Pero no fue  sólo  con placer que escribí este trabajo.  Lo  hice  impulsado  por  un  fuerte  sentimiento  de  compromiso  ético-político y con una decidida preocupación por la comunica- ción que anhelo establecer en todos los instantes con sus probables  lectores y lectoras.  Precisamente porque estoy convencido de que el logro de la  comprensión del  texto no es  tarea exclusiva de su autor sino  también del lector, durante todo el tiempo en el que lo escribí  me esforcé en el ejercicio de desafiar a  las lectoras y a  los lecto- res a  entregarse también a  producir su comprensión de mis pa- labras. Por eso es que formulo observaciones y sugerencias, casi  con miedo de cansar a los lectores al hacerlos utilizar instrumen- tos corno diccionarios y enciclopedias, para que no abandonen  la lectura del texto por no conocer el significado técnico de tal o  cual palabra.  Confío en que ningún lector o lectora dejará de leer este libro  en su totalidad simplemente porque le faltó decisión para traba- jar un poco más.  Que abandone la lectura porque el libro no le  agrada,  porque el  libro no coincide con sus aspiraciones polí- tico-pedagógicas, es un derecho que tiene. De cualquier manera,  siempre es bueno leer los textos que defienden posiciones polí- ticas  diametralmente opuestas a  las  nuestras.  En primer lugar,  \n20  CARTAS A  QUIEN PRETENDE ENSEÑAR  porque al hacerlo aprendemos a ser menos sectarios, más radica- les, más abiertos; en segundo lugar, porque acabamos por descu- brir que no sólo aprendemos con lo que es diferente de nosotros  sino hasta con lo que es nuestro contrario.  Hace poco tuve una experiencia profundamente significativa  en este sentido. Por casualidad conocí a  un empresario que, se- gún me dijo,  riendo al final  de nuestra conversación, me veía  como una especie de malhechor del Brasil. Reminiscencias de lo  que se decía de mí en algunos periódicos de los años sesenta.  \"Fue un placer conocerlo de cerca. No diría que me convertí  a sus ideas, pero cambié radicalmente mi apreciación sobre usted\",  me dijo convincente.  Volví a casa contento. De vez en cuando Brasil mejora, a  pesar  de las \"recaídas\" que lo aquejan ...  Como ya he subrayado anteriormente, una preocupación que  no podía dejar de acompañarme durante todo este tiempo en el  que me he dedicado a escribir y leer simultáneamente este libro  es la que me compromete, desde hace mucho, en la lucha en fa- vor de una escuela democrática. De una escuela que, a la vez que  continúa siendo  un  tiempo-espacio de producción de  conoci- miento en el  que  se  enseña y  en el  que se aprende,  también  abarca el enseñar y aprender de un modo diferente. Una escuela  en la que enseñar ya no puede ser ese esfuerzo de transmisión  del llamado saber acumulado que se hace de una generación a  la otra, y el aprender no puede ser la pura recepción del objeto  o  el contenido transferidos. Por el contrario, girando alrededor  de la comprensión del mundo, de los objetos, de la creación, de  la belleza, de la exactitud científica, del sentido común, el ense- ñar y el aprender también giran alrededor de la producción de  esa comprensión,  tan social como la producción del lenguaje,  que también es conocimiento.  Exactamente como en el caso del logro de la comprensión del  texto que se lee, que también es tarea del lector, es igualmente  tarea del educando participar en la producción de la comprensión  del conocimiento que supuestamente sólo recibe del profesor.  \nINTRODUCCiÓN  21  Por eso es necesaria la radicalidad del diálogo, como sello de la  relación gnoseológica y no como simple cortesía.  No  podria  cerrar esta introducción sin algunos agradecimientos.  En primer lugar, aJorge Claudio Ribeiro, amigo y editor, quien  me pidió (y  fácilmente me convenció) que escribiese este libro  trayendo ya  a  nuestra casa el  propio título del trabajo.  Pienso  que a Jorge Claudio no sólo debo agradecerle la sugerencia y el  pedido que me hizo, sino que debo elogiarle por un lado su em- peño para que el texto tomase cuerpo y,  por el otro, la fraterna  posición que siempre asumió sin llamanne por teléfono jamás,  con ningún pretexto, para saber si yo  estaba o  no trabajando en  el libro. También debo agradecer a las maestras SuraiaJamal  Ba-  tista y ZaquiaJamal, y a  las alumnas del curso de magisterio del  Colegio Sagrado Corazón de Jesús y  CEFAM    de la  EEPG    Edmundo  de Carvalho, que compartieron conmigo sus luchas y descubri- mientos en la etapa preliminar de este libro.  Mi  agradecimiento a  Nita por la paciencia con la que me so- portó durante los días de redacción más intensos, pero princi- palmente por las sugerencias temáticas que me hizo, señalando  una y otra vez  algún aspecto a  la luz de su propia experiencia  como ex profesora de Historia de la Educación de algunos cursos  de fonnación del magisterio de San Pablo.  Finalmente debo agradecer también a Madalena Freire Weffort,  a Fátima Freire Dowbor y a Ana Maria Saul por la apertura y  el    in- terés con el que me escucharon y dialogaron conmigo sobre algu- nas de  mis  inquietudes mienttas yo escribía y leía simultáneamente  este libro.  SAN PABLO  MAYO DE  1993  \n\nPrimeras palabras  MAESTRA-TÍA: LA TRAMPA   Acabo de leer la primera copia, como llamamos habi- tualmente al ejemplar recién impreso, listo,    tibio    o  aun  caliente,   del  libro  que  acabamos  de  escribir.  Ese  ejemplar que  llega  a  nuestras manos antes de que la edición parta hacia las  librerías.  Me  refiero a la  Pedagogía  de    la  esperanza.  Un  reencuentro con    la  Peda- gogía  del    oprimido,    que Paz e  Terra lanzó en diciembre de 1992  [Buenos Aires, Siglo XXI, 2002].  El  título de ese libro,  Pedagogía  de    la  esperanza,    no fue una elec- ción anticipada, como a veces sucede con libros que escribimos.  Nació en las conversaciones con amigos, entre ellos Wemer Linz,  su editor norteamericano, sobre el propio movimiento que la re- dacción del texto generalmente va imprimiendo al pensamiento  de quien escribe. En este caso,  de lo  que la redacción del texto  fue  insinuando a  mi  pensamiento en el  trato con  Pedagogía  del   oprimido.    Es  que en realidad escribir no es un puro acto mecánico,  precedido por otro que sería un acto    1TUlJ0T,  más  importante,  el  acto de pensar sobre un cierto objeto ordenadamente, organiza- damente, en cuyo ejercicio el sujeto pensante, apropiándose del  significado más profundo de ese objeto, acaba por aprehender su  razón de ser, acaba por saber el objeto. A partir de ahí, entonces, el  sujeto pensante, en un desempeño puramente mecánico,  escribe  lo  que sabe y sobre lo que pensó antes. ¡Nol No es así como suce- den las  cosas. Ahora mismo, en el momento exacto en que es- cribo sobre esto, vale  decir, sobre las  relaciones entre  pensar,  \n24  CARTAS A  QUIEN PRETENDE ENSEÑAR   hacer,  escribir,    leer,    pensamiento,  lenf5Ullje,  realidad,    experimento la  so- lidaridad  entre estos diversos momentos, la total imposibilidad de  separarlos, de dicotomizarlos.  Si  bien esto  no significa que después de pensar,  o  mientras  pienso,  debo  escribir automáticamente, significa  sin  embargo  que al pensar guardo en mi cuerpo consciente y hablante la  po-  sibilidad de escribir, de la misma manera en que al  escribir con- tinúo  pensando y  repensando  tanto  lo  que  se  está  pensando  como lo ya  pensado.  Ésta es una de las violencias que realiza el analfabetismo, la de  castrar el cuerpo consciente y hablante de mujeres y de hombres  prohibiéndoles leer y escribir, con lo que se los limita en la capa- cidad de, leyendo el mundo, escribir sobre su lectura, y al hacerlo  repensar esa misma lectura. Aunque no anule las relaciones mile- narias y socialmente creadas entre lenguaje, pensamiento y reali- dad, el  analfabetismo las  mutila y se  constituye en un obstáculo   para  asumir  la  plena ciudadanía. Y las mutila porque, en las cultu- ras letradas, impide a analfabetos y analfabetas contemplar el ci- clo de las  relaciones entre lenguaje, pensamiento y realidad al  cerrar las  puertas, en esas  relaciones,  al  lado    necesario    del len- guaje escrito. Es  preciso no olvidar que hay un movimiento diná- mico  entre  pensamiento,  lenguaje  y  realidad  del  cual,  si  se  asume  bien,  resulta  una creciente  capacidad creadora,  de  tal  modo que cuanto más  integralmente vivimos  ese  movimiento  tanto más nos transformamos en sujetos criticos del proceso de  conocer, enseñar, aprender, leer, escribir, estudiar.  En el fondo, estudiar, en su significado más profundo, abarca  todas esas operaciones solidarias entre ellas. Lo importante ahora  es dejar claro, y en cierto sentido repitiéndome un poco, que el  proceso de escribir que me trae hasta la mesa con mi pluma espe- cial y mis  hojas de papel en blanco sin rayas -<ondición funda- mental para que yo  escriba- comienza aun antes de que llegue a  la mesa, en los momentos en que actúo o practico o en los que soy  pura reflexión sobre los  objetos,  y prosigue cuando al transcribir en  el papel de la mejor manera que puedo los resultados provisorios,  \nPRIMERAS PALABRAS  25   siempre provisorios, de mis reflexiones, continúo reflexionando  mientras escribo, profundizando en uno u  otro punto que pue- dan haber pasado inadvertidos antes, cuando reflexionaba sobre  el  objeto,    es decir, sobre la práctica.  Es  por esto que no es posible reducir el acto de escribir a  un  ejercicio mecánico. Este acto es más complejo  y  exige más que el  de pensar sin escribir.  De hecho, mi intención inicial era escribir un nuevo prefa- cio,  una nueva introducción que, retomando la    Pedagogía  del  oprimido,    la revisase en algunos de sus aspectos centrales, revi- sando igualmente algunas de las críticas que el libro no sólo ha  sufrido sino que en ciertos casos continúa sufriendo. Y fui  en- tregándome por meses a este esfuerzo,  y  lo que sería una nueva  introducción se  ha transformado en un nuevo libro con cierto  aire de memorias de la  Pedagogía  del  oprimido~uya  primera copia  acabo de releer-o  y  así,  aún inmerso en la  Pedagogía  de    la    esperanza,    empapado  por la esperanza con la que lo escribí e instigado por muchos de  sus temas abiertos a nuevas reflexiones, me entrego ahora a una  nueva experiencia, siempre desafiante, siempre fascinante: la de  trabajar con una temática, lo que implica desnudarla, aclararla,  sin que esto signifique jamás que el sujeto desnudante posea la  última palabra sobre la verdad de los temas que discute.   Maestra,  sí;  tía,  no.  *  Carlas  a quien  pretende  enseñar,    he aquí el  enunciado general que tenemos frente a nosotros exigiéndonos  un primer empeño de  comprensión, el  de entender lo mejor  que podamos no sólo el significado en sí de cada una de estas pa- labras que conforman el enunciado general, sino además com- prender lo que ellas ganan o pierden individualmente cuando se  insertan en una trama de relaciones.  El enunciado que habla del tema tiene tres bloques:  a]  maestra,  sí;  b]  tía,  no;  e]  carlas a quien  pretende  enseñar.   *  Remitimos al  lector a  la nota de la página 11.  [E.]  \n26  CARTAS A  QUIEN PRETENDE ENSEÑAR  En el fondo, el discurso sintético, o simplificado, pero bastante  comunicante, podria hacerse en fonna ampliada así: mi intención  en este texto es mostrar que la tarea del docente, que también es  aprendiz, es placentera  y  a la vez exigente. Exige seriedad, prepa- ración científica, preparación física,  emocional, afectiva. Es una ta- rea que requiere, de quien se compromente con ella, un gusto  ~   pecial por querer bien, no sólo a los otros sino al propio proceso  que ella implica.  Es  imposible enseñar sin ese coraje de querer  bien, sin la valentía de los que insisten mil veces antes de desistir.  Es imposible enseñar sin la capacidad fOIjada,  inventada, bien cui- dada de amar. Por eso se dice en el tercer bloque del enunciado:   Cartas  a  quien  pretende    enseñar.    Es  preciso atreverse,  en el sentido  pleno de esta palabra,  para hablar de  amor  sin  temor de ser lla- mado blandengue, o meloso, acientífico si es que no anticientífico.  Es preciso atreverse para decir científicamente,  y  no blablablante- mente, que estudiamos, aprendemos, enseñamos  y  conocemos con  nuestro cuerpo entero. Con los sentimientos, con las  emociones,  con los deseos, con los miedos, con  las  dudas, con la pasión  y tam-  bién con la  razón  crítica. Jamás sólo  con esta última.  Es preciso  atreverse para jamás dicotomizar lo cognoscitivo  y  lo emocional. Es  preciso  atreverse  para quedarse  o  pennanecer enseñando  por  largo tiempo en las condiciones que conocemos, mal pagados, sin  ser respetados  y    resistiendo el riesgo de caer vencidos por el ci- nismo. Es preciso atreverse, aprender a atreverse, para decir  no  a  la burocratización de la mente a la que nos exponemos a diario.  Es preciso atreverse para continuar cuando a veces se puede dejar  de hacerlo, con ventajas materiales.  Sin embargo, nada de esto convierte la tarea de enseñar en un  quehacer de seres pacientes, dóciles, acomodados, portadores de  una misión tan ejemplar que no se puede conciliar con actos de re- beldía, de protesta, como las huelgas por ejemplo. La de enseñar  es una tarea profesional que exige amorosidad, creatividad, com- petencia científica, pero que rechaza la estrechez cientificista, que  exige la capacidad de luchar por la libertad sin la cual la propia  tarea perece.  \nPRIMERAS  PALABRAS  27   Lo  que me parece necesario en el intento de comprensión crÍ- tica del enunciado  maestra,  sí;  tía,  no,    es no contraponer la maes- tra a la tía, ni tampoco identificarlas o  reducir a la maestra a la  condición de    tía.    La  mae~tra  puede tener sobrinos y por eso  ser  tía,  del  mismo  modo  que  cualquier  tía  puede  enseñar.  puede ser maestra. y por lo tanto trabajar con alumnos. No obs- tante. esto no significa que la tarea de enseñar transforme a  la   maestra  en  tía  de sus alumnos. como tampoco una  tía  cualquiera  se convierte en  maestra  de sus sobrinos sólo por ser su  tía.    Ense- ñar es una profesión que implica cierta tarea, cierta  militancia.   cierta especificida<i en su cumplimiento. mientras que ser  tía  es  vivir una relación de parentesco. Ser maestra implica asumir una   profesión.    mientras que no se es    tía  por profesión. Se puede ser  un  tÚJ    o una  tía  geográfica o afectivamente distantes de los sobri- nos.  pero no se  puede ser auténticamente maestra. aun en un  trabajo a  larga distancia. \"lejos\" de los alumnos.   l   El  proceso de enseñar. que implica el proceso de educar (y vi- ceversa). incluye la \"pasión de conocer\" que nos inserta en una  búsqueda placentera aunque nada fácil.  Por eso es  que una de  las  razones de la necesidad de la  osadía  de quien quiere hacerse   maestra,    educadora. es la disposición a la pelea justa. lúcida. por la  defensa de sus derechos. así como en  el  sentido de la creación de  las condiciones para la alegría en la escuela. uno de los sueños  de Snyders. 2  Rechazar la identificación de la figura de la maestra con la de la   tía  no significa. en modo alguno. disminuir o menospreciar a esta  última; igualmente. aceptar la identificación no conlleva ninguna  1  Este  análisis  del mote \"maestra-LÍa\"  es un capítulo más de la  lucha  contra la tendencia a la desvalorización profesional, que viene crista- lizando desde hace casi  tres décadas, representada por el hábito de  transfonnar a la maestra en un pariente postizo. Entre las discusiones  realizadas sobre esta cuestión destaco el trabajo serio de Maria Eliana  Novaes,  Professora  jnimária,  maestra ou  tia,    Cortez, 1984.  2 Georges Snyders,  La joie  ti  l'école,    París, PUF,  1986.  \n28  CARTAS A  QUIEN PRETENDE ENSEÑAR  valoración  de la    tía.    Por el contrario. significa quitarle algo  fundamental a la  maestra:    su responsabilidad profesional de ca- pacitación permanente. que es parte de su exigencia política.  Según  mi  forma de verlo. el rechazo se debe principalmente a  dos razones fundamentales. Por un lado. evitar una comprensión  distorsionada de la tarea profesional de la  maestra,    y por el otro,  desocultar la  sombra  ideológica que descansa con maña en la inti- midad de la falsa  identificación.    La  identificación de la    maestra   con la    tía,    que  ha sido y continúa siendo enfatizada  principal- mente en la  red privada de educación en todo el  país,  equivale  casi a proclamar que las    maestras,    como buenas  tías,    no deben  pe-  lear.  no deben  rebelarse,  no deben  hacer huelgas.  ¿Quién  ha  visto a diez mil  tías  haciendo huelga, sacrificando a sus  sobrinos,   peIjudicándolos en su aprendizaje? Y esa ideología que presenta  la protesta necesaria de las    maestras  como una manifestación de  desamor hacia sus alumnos o de irresponsabilidad de ellas como   tías,    se constituye como punto central en el  que se  apoya gran  parte de las  familias  con  hijos  en escuelas  privadas.  Pero esto  también sucede con familias que tienen a sus niños en escuelas  públicas.  Ahora  recuerdo  cómo  respondió,  hace  ya  algunos  años,  el  maestro Gumercindo Milhomem, entonces presidente de la Aso- ciación de Maestros de la Enseñanza Oficial del Estado de San  Pablo -APEOESP-, a  las acusaciones de los familiares de los alum- nos de la red de enseñanza estatal, en huelga, en un programa  de televisión.  Las  familias acusaban a los maestros de peIjudicar  a  sus  hijos al  no cumplir su deber de enseñar, a  lo que Gumer- cindo respondió que la acusación estaba equivocada. Maestras y  maestros en huelga, decía él, estaban enseñando, estaban dando  a sus alumnos lecciones de democracia (de la que tanto precisa- mos en este país -agrego yo- en este momento) a  través de su  testimonio de la lucha.  Es  bueno dejar bien claro que al hablar de sombra ideológica  yo  no  quería  decir,  bajo  ningún  concepto,  que  su  presencia  oculta en la inaceptable identificación hubiese sido decidida en  \nPRIMERAS PALABRAS  29  alguna reunión secreta de representantes de las clases dominan- tes con la deliberada intención de  minar  la resistencia de una ca- tegoría de la clase trabajadora. Del mismo modo que lo que hay  de ideológico en el concepto de  evasión escolar,    o  en el adverbio   fuera  en la afirmación \"hay ocho millones de niños  fuera  de la  escuela\", no significa un acto decidido por los poderosos para  camuflar las situaciones concretas de, por un lado, la  expulsión   de niños de las escuelas y,  por el otro, la  prohibición  de que en- tren en ellas.  En realidad no hay niños que se    evadan  de las es- cuelas, así como no los hay  fuera  de éstas -como si no estuviesen  dentro solamente porque no quieren-, sino que hay alumnos a  quienes en ocasiones se  prohíbe  entrar en las  escuelas  y  a  veces  permanecer en ellas.  Del mismo modo,  1TIORStra    no es  tía.   Pero si  bien no siempre las  sombras  ideológicas son deliberada- mente fOIjadas  o  programadas por el poder de clase,  su fuerza  opacan te de la realidad indiscutiblemente sirve  a  los  intereses  dominantes. La ideología dominante no sólo  opaca    la realidad  sino que también nos vuelve    miopes    para no ver claramente esa  realidad. Su poder es domesticador y nos deja ambiguos e  inde- cisos cuando somos tocados y deformados por él. Por eso es  tan  fácil  comprender la observación que me hizo en una plática re- ciente  una joven maestra3  de la  red municipal de San  Pablo:  \"¿En  qué medida ciertas    maestras  quieren dejar de ser  tías  para  asumirse como  maestras?    Su miedo a la libertad las conduce ha- cia la falsa paz que les parece que existe en la situación de  tías,    lo  que no existe  en la aceptación plena de sus responsabilidades  como  maestras\".   Lo ideal será cuando sin importar cuál sea la política de la ad- ministración, ya sea progresista o  reaccionaria, las    maestras  se defi- nan siempre como  maestras.    Lo lamentable es que oscilen entre ser   tías  de buen comportamiento en las administraciones autoritarias  3 Andréa Pellegrini Marques.  \n30  CARTAS A  QUIEN PRETENDE ENSEÑAR  y  maestras  rebeldes en las  administraciones democráticas. Mi  es- peranza es que, experimentándose libremente en administracio- nes  abiertas,    acaben por incorporar el gusto por la libertad, por  el riesgo de crear, y se vayan  preparando para asumirse  plena- mente como  maestras,    como  profesilmales,    entre cuyos deberes es- tán  el  de testimoniar a  sus alumnos y a  las familias de los alum- nos  y  el de rechazar sin arrogancia, pero con dignidad y energía,  el arbitrio y el  todopoderosismo de ciertos administradores lla- mados  modernos.    En suma, el deber de rechazar ese  todopodero- sismo y ese autoritarismo cualquiera que sea la forma que ellos to- men, y no aisladamente en la calidad de Maria, de  Ana,  de Rosalía,  de Antonio o  de José.  Esta posición de lucha democrática en la que las maestras dan  testimonio a sus alumnos de los valores de la democracia les im- pone tres exigencias básicas:  1. Jamás entender esta lucha como una lucha singular,  individual, aunque en muchos casos pueda haber aco- sos  mezquinos contra tal  o  cual  maestra por motivos  personales.  2.  Por lo mismo, estar siempre aliado de sus compañe- ras,  desafiando también a  los  órganos de su categoría  para que presenten un buen combate.  3.  Una exigencia igualmente importante -y que ya  trae  en sí el ejercicio de un derecho- es la de demandar, lu- chando a  su vez  por su realización,  una capacitación  permanentemente auténtica -la que se apoya en la ex- periencia de vivir la tensión dialéctica entre la teoría y  la práctica-. Pensar la práctica como la mejor manera de  perfeccionar la propia práctica. Pensar la práctica a través  de la cual se va  reconociendo la teoría implícita en ella.  La evaluación de la práctica, en definitiva, como camino  de capacitación teórica y no como mero instrumento de  recriminación de la maestra.  \nPRIMERAS PALABRAS  31  La  evaluación de la práctica de la maestra se impone por una se- rie de razones.  La  primera forma parte de la propia naturaleza  de la práctica, de cualquier práctica. Quiero decir lo siguiente:  toda práctica plantea a  sus  sujetos,  por un lado,  su programa- ción, y por el otro, su evaluación permanente. Sin embargo, pro- gramar  y  evaluar no son momentos separados, el uno a la espera  del otro. Son momentos en permanente relación.   La  programación inicial de una práctica a veces se rehace a la  luz de las  primeras evaluaciones que sufre la práctica.  Evaluar  casi  siempre implica reprogramar, rectificar.  Por eso mismo la  evaluación no se  da solamente en el  momento que nos parece  ser el final de cierta práctica.   La  segunda razón por la que se impone la evaluación es pre- cisamente la necesidad que tienen sus sujetos de acompañar  paso a  paso la acción por suceder, observando si va a alcanzar  sus  objetivos.  Finalmente, verificar si  la práctica nos está lle- vando a  la concretización del sueño por el cual estarnos prac- ticando.  En este sentido, la evaluación de la práctica es  un factor im- portante e  indispensable para la capacitación de la educadora.  Lamentablemente, casi siempre evaluarnos a  la  persona de la maes- tra  y  no su práctica. Evaluarnos para castigar  y  no para mejorar la  acción de los sujetos, no para  capacitar.   Otro error que cometemos, quizá por ese desajuste de foco  -en lugar de evaluar para capacitar mejor, evaluamos para cas- tigar-, radica en que nos importa poco o  casi nada el contexto  dentro del cual se  dará la práctica de cierta manera, con mi- ras a  los objetivos que poseernos. Por otro lado,  el  error está  en cómo colocarnos mecánicamente la evaluación al final del  proceso. Sucede que el buen comienzo de una buena práctica  sería la evaluación del contexto en que ésta se dará.  La  evalua- ción del contexto significa un reconocimiento de lo que viene  sucediendo en él, cómo  y  por qué. En este sentido, ese pensar  crítico sobre el contexto que implica evaluarlo, precede a  la  propia programación de la  intervención  que pretendernos ejer- \n32  CARTAS A  QUIEN PRETENDE ENSEÑAR  cer sobre él,  alIado de aquellos y aquellas con quienes traba- jaremos.  En los  grupos  de  capacitacwn,    en cuya defensa viene siendo  infatigable  la  maestra  Madalena  Freire  WetIort -grupos de  maestras, de directoras, de coordinadoras pedagógicas, de co- cineras, de vigilantes,  de porteros, de padres y madres, al es- tilo de lo que realizamos en la reciente administración de la  prefecta Luiza Erundina-, y no solamente en los llamados cur- sos de verano -en los que no importa la capacidad científica de  los  invitados  a  dar las  clases  o  a  impartir las  conferencias-, las  maestras se  exponen, curiosamente o  no, al discurso de los com- petentes. Discurso que casi siempre se pierde por  x  razones que  ya conoceremos.  PAQ.UETEROS  Es  preciso gritar bien alto que alIado de su actuación en el sin- dicato, la capacitación científica de las maestras, iluminada por  su claridad política, su capacidad, su gusto por saber más y su cu- riosidad  siempre  despierta son algunos de los  mejores  instru- mentos políticos en la defensa de sus intereses y de sus derechos.  Entre ellos, por ejemplo, el de rechazar el  papel de simples se- guidoras dóciles de los  paquetes  que producen los y las    sabeÚJtodo   en sus oficinas, en una demostración inequívoca ante todo de su  autoritarismo y,  como una extensión del autoritarismo, de su ab- soluto descreimiento en la posibilidad que tienen las  maestras  de saber y de crear.   y    lo curioso de todo esto es que a  veces los y las sabelotodo  que elaboran detalladamente sus paquetes llegan a hacer explí- cito -pero casi  siempre dejan  implícito en su  discurso--   que  uno de los objetivos esenciales de los paquetes, que ellos no lla- man con ese  nombre,  es  viabilizar  una práctica docente que  fOlje  mentes críticas, audaces y creativas. Y la extravagancia de  \nPRIMERAS PALABRAS  33  esa expectativa está precisamente en la contradicción frontal  entre el comportamiento pasivizado de la  maestra,    esclava del  paquete, domesticada por sus  guías,  limitada en la aventura de  crear, contenida en su autonomía y en la autonomía de su escuela,  y lo que se espera de la práctica de los paquetes: niños libres,  críticos, creativos.  Creo que uno de los caminos tácticos para las  maestras  compe- tentes, políticamente claras, críticas, que rechazando ser  tías  se  afirman en lo profesional como  maestras,    es desmitificar  el  aut<r  ritarismo de los paquetes y de las administraciones  paqueteras  en  la intimidad de su mundo, que es también  el  de sus alumnos. En  el salón de clase,  cerrada la puerta, su mundo dificilmente  es  descubierto.  Por eso es que las administraciones autoritarias, que en algunos  casos hasta se llaman avanzadas, buscan por diferentes caminos in- troyectar  en  el    cuerpo  de  las  personas    el    miedo  a  la  libertad.  Cuando se logra esto la  maestra  guarda dentro de sí,    hospedada  en  su cuerpo, la sombra del dominador, la ideología autoritaria de la  administración. No está sola con sus alumnos porque entre ella  y ellos, vivo  y fuerte, punitivo y amenazador, está  el  árbitro que  habita en ella. 4  Éste es  el  método más barato de controlar y,  en cierto sentido,  el más perverso. Pero hay otro, el que se sirve de la tecnología.  Desde su despacho, la directora puede controlar escuchando, o  viendo y escuchando lo que dicen y lo que hacen las maestras en  la intimidad de su mundo.  Las  maestras  saben  que  el  director  no  puede  controlar  a  veinte, cincuenta o  doscientos maestros al mismo tiempo, pero  no saben cuándo les toca ser controladas. De ahí viene la necesa- ria  inhibición.    Las    maestras  en  esa  situación  se  transforman,  4 Sobre este tema es interesante la lectura, entre otros, de Franz Fanon,   Los  condenados  de  la  tierra;    de Albert Memmi,  Retrato  dos  colonizadores,  Jmcedido  do  retrato  dos colonizados,    y Paulo Freire,  Pedagogía  del  oprimido   y  Pedagogía  de    la  esperanw.  \n34  CARTAS A  QUIEN PRETENDE ENSEÑAR  para utilizar una expresión del gusto de Ana Maria Freire,5 en  \"cuerpos interdictados\", impedidos de ser.  Una de las  mañas de ciertos autoritarios cuyo discurso bien  podría defender que la    maestra    es    tía,    y cuanto mejor se porte  mejor para la  educación de sus    sobrinos,    es  la que habla clara- mente de que la escuela es un espacio exclusivo del puro ense- ñar y del puro aprender. De un enseñar y de un aprender trata- dos tan técnicamente, tan bien cuidados y seriamente defendidos  de la  naturaleza política del enseñar y del aprender, que devuel- ven a la escuela los sueños de quien pretende la preservación del   statu quo.   Que el espacio de la escuela no sea neutro tampoco significa  que deba transformarse en una especie de  templo    de un partido  en el gobiemo. Sin embargo, lo que no es posible negarle al par- tido en el gobiemo es la coherencia altamente pedagógica, in- dispensable:, entre sus opciones políticas, sus líneas ideológicas y  su práctica gubemamental. Preferencias políticas que son reco- nocibles  o  quedan  desnudas  a  través  de  las  opciones  de  go- biemo, explícitas desde la campaña electoral,  reveladas en los  planes de gobierno, en la  propuesta presupuestal -que es una  pieza política y no solamente técnica-, en las líneas fundamenta- les para la educación, la salud, la cultura, el bienestar social, en la  política fiscal,  en el deseo o  no de reorientar la política de los  gastos públicos, en el placer con que la administración da prio- ridad a  la belleza de las zonas ya bien tratadas de la ciudad en  demérito de las zonas más feas  de la periferia.  Por ejemplo, ¿cómo podemos esperar de una administración  de manifiesta opción elitista, autoritaria, que considere la auto- nomía de las  escuelas dentro de su  política educativa?  ¿En  el  nombre de la llamada posmodernidad liberal?  ¿Cómo esperar  5 Ana Maria Freire,  Analfabetismo    no  BTasil:  Da  ideologia  da interdiflÜJ    M   curpo    ti  ideologia  nacionalista    ou  de  como  deixaT    sem  ler  e esCTeuer    desde  as  CataTinas  (Paragull{U),  Filipas,  Madalenas,  Anas,  GenebTas,  ApolOnios  e  GTácias  até os  Severinos,    San Pablo, Cortez, 1989.  \nPRIMERAS  PALABRAS  35  que considere la participación real de los y las que hacen la es- cuela, de los celadores y las  cocineras a  las directoras, pasando  por los alumnos, por las familias y hasta por los vecinos de la es- cuela, en la medida en que ésta se va transformando en una casa  de la comunidad? ¿Cómo esperar de una administración autori- taria, en una secretaría cualquiera, que gobierne a  través de ór- ganos colegiados, experimentando los sabores y  los sinsabores  de la aventura democrática?  ¿Cómo esperar de autoritarios y autoritarias la aceptación del  desafío de aprender con los otros, de tolerar a los diferentes, de  vivir la tensión permanente entre la paciencia y la impaciencia?  ¿Cómo esperar del autoritario o  de la autoritaria que no estén  demasiado seguros de sus verdades? El autoritario que se con- vierte en sectario vive  en el ciclo cerrado de su verdad, en el que  no admite dudas sobre ella, ni mucho menos rechazos. Una ad- ministración autoritaria huye de la democracia como el diablo  de la cruz.  La continuidad administrativa, de cuya necesidad se viene ha- blando entre nosotros, sólo podría existir plenamente si  de ver- dad la administración pública no estuviese vinculada a los  sueños   y a  la  lucha para materializarlos, si  la administración de la ciudad,  del Estado, del país fuese una cosa neutra, si  la administración pú- blica pudiese reducirse en toda su extensión a un puro quehacer  técnico, quehacer que a su vez pudiese ser neutro siendo técnico.  Pero esto no existe.   GRANDES OBRAS Y  CIUDADANÍA   Veo dos aspectos centrales en esta discusión. Por un lado la falta  que aún tenemos de una comprensión más crítica del gobierno,  de los  partidos, de la política, de la ideología. Por ejemplo, se  piensa mucho que la administración depende totalmente de la  persona que se elija para el cargo máximo del Eje\"cutivo. Todo se  \n36  CARTAS A  QUIEN PRETENDE ENSEÑAR  espera de él o  de ella en la primera semana de gobierno.  No  existe una comprensión de éste como totalidad.  Recientemente, una amiga mía me dijo que su peluquero, asi- duo frecuentador del Teatro Municipal desde hace años, estaba  absolutamente  convencido  de  que  era  dificil  que  alguien  al  frente de la Secretaría Municipal de Cultura pudiera haberse en- tregado en forma más competente, más critica  y  más seria de lo  que  Marilena Chauí lo hizo.  \"Sin  embargo,  no voté  a  Suplicy  -dijo el  peluquero de mi amiga- porque Erundina, tan petista  como él, no hizo grandes obras.\"  Para este  hombre amante de las artes,  de la  danza  y    de  la  música, en una palabra, de la cultura, en primer lugar nada de  lo realizado por la Secretaría de Cultura tenía que ver con Erun- dina,  y  en segundo lugar nada de eso podía contarse entre las   grandes  obras.   \"Encontramos la Secretaría Municipal de Educación -dijo re- cientemente el entonces secretario Mário Sérgio Cortela (hecho  del que soy testigo)- con el 63% de sus escuelas deterioradas; algu- nas  tuvieron  que cerrarse.  Ahora entregamos la  administración  con el 67%  de sus escuelas en óptimo estado.\"  Grandes obras serían únicamente los viaductos, los túneles, las  plazas arboladas en las zonas felices de la ciudad.  El  segundo aspecto al  cual me gustaría referirme en la discu- sión de este tema es el de la responsabilidad de la ciudadanía.  Sólo la conciencia crítica de nuestra responsabilidad social  y  ~   lítica en cuanto miembros de una sociedad civil-no para susti- tuir las  tareas del Estado dejándolo donnir en paz, sino apren- diendo a  movilizamos  y  a  organizamos para fiscalizar  mejor el  cumplimiento o  incumplimiento de sus deberes constituciona- les- podrá llevamos a  buen término en el  enfrentamiento de  este problema. Sólo así podremos caminar en el sentido de un  amplio diálogo en el seno de la sociedad civil,juntando sus legí- timas representaciones  y  los partidos, progresistas  y  conservado- res,  con la idea de establecer cuáles serían los límites mínimos  que podrían conciliarse con los intereses contradictorios de los  \nPRIMERAS  PALABRAS  37  diferentes segmentos de la sociedad. Quiero decir, establecer los  límites dentro de los cuales esas diferentes fuerzas político-ideoló- gicas se sentirían en paz para la continuidad de la administración  pública.  Lo que me parece lamentable es que  las    obras materiales o  los  programas de interés social sean abandonados exclusiva o prepon- derantemente porque el nuevo administrador tiene rabia personal  contra su antecesor, y por esto  paraliza la  marcha de algo que tenía  un significado social.  Por otro lado,  no veo  cómo ni  por qué una administración  que asume  el  gobierno con discursos y propuestas progresistas  debe  mantener,  en  nombre de la  continuidad administrativa,  programas indiscutiblemente elitistas y autoritarios.  A veces cierto discurso neoliberal critica a  candidatos y parti- dos de cuño progresista acusándolos de estar superados por ser  ideológicos y afinnando que el pueblo  ya    no acepta tales discur- sos,  sino los  discursos técnicos y competentes. En primer tér- mino,  no existe el discurso  técnico y competente que no sea  naturalmente ideológico a la vez.  Para mí,  lo  que el  pueblo rechaza cada vez  más,  principal- mente cuando se  trata de partidos progresistas, es la insistencia  antihistórica en comportamientos estalinistas. Partidos progresis- tas que al perder la dirección de la historia se comportan de tal  modo que más parecen viejas y tradicionales escuelas de princi- pio de siglo,  que amenazan y suspenden a  los  militantes cuyo  comportamiento  no  les  agrada.  Esas  dirigencias  no  se  dan  cuenta de que ni siquiera pueden sobrevivir si se mantienen mo-  dernas,    mucho menos si  se mantienen tradicionalmente arbitra- rias.  Lo que la historia  les  exige es que se  vuelvan  posmoderna- mente progresistas. Es esto lo que el pueblo espera, es con esto con  lo que sueñan los  electores sensibles y los  críticos sincronizados  con la historia.  Considero que lo que el pueblo rechaza es el discurse río sec- tario, las consignas envejecidas, y lo que no siempre nos resulta  fácil  es damos cuenta de que no se puede, en ténninos críticos,  \n38  CARTAS A  QUIEN  PRETENDE ENSEÑAR  esperar un gobierno popular de un candidato de un partido au- toritario y elitista. No creo que sea posible superar las razones de  las distorsiones a las que somos llevados en la comprensión de lo  que es buena política o  mala política en el gasto público -a la  que está asociada la cuestión de cuáles son las  grandes ofnasy  cuá- les no- trabajando solamente los obstáculos en el proceso de co- nocer en forma más crítica los datos objetivos de la realidad. Te- nemos  que  trabajar los  obstáculos  ideológicos,  sin  lo  cual  no  prepararemos el camino para percibir lúcidamente que entre yo  y el candidato al cual yo voto hay mucho más que una relación  afectiva  o  de gratitud, por ejemplo.  Si  estoy agradecido a  una  persona reaccionaria, puedo y debo manifestar mi gratitud hacia  ella. Pero mi gratitud no puede estar involucrada con el interés  público. Si  mi utopía, mi sueño, por el cual lucho alIado de tan- tos otros, es lo opuesto o  antagónico del sueño del candidato  reaccionario,  no puedo votarlo  o  votarla.  Mi  gratitud  no  me  puede llevar a  trabajar contra mi sueño, que no es sólo mío. No  tengo el derecho de exponerlo para  pagar  una  deuda  que es pura  y exclusivamente mía.  Votar por A o B no consiste en ayudar a A o  a B a  ser elegido,  sino en delegar en alguien  el  poder político en cierto nivel; en la  democracia, es la posibilidad de luchar por un sueño posible. En  ningún  caso  puedo votar  a  alguien  que  después  de  electa  o  electo vaya a luchar en contra de mi sueño.  Es increíble que continuemos votando a un candidato progre- sista para el Poder Ejecutivo y a uno reaccionario para el Legisla- tivo simplemente porque un día nos ayudó utilizando su poder.  Volvamos un poco a  la comprensión de lo que se consideran   grandes  ofnas.    Esta comprensión se encuentra firmemente deter- minada por la ideología dominante. Así,  como sólo los que tie- nen poder definen o perfilan a los que no lo tienen, también de- finen lo que es buen gusto, lo que es ético, lo que es bonito, lo  que es bueno.  Las  clases populares, subalternas, al introyectar la  ideología dominante obviamente introyectan muchos de sus cri- terios de valores. Hay que reconocer sin embargo que éste es un  \nPRIMERAS PALABRAS  39  proceso dialéctico y no mecánico. Esto significa que las clases po- pulares a  veces  rechazan -principalmente cuando están experi- mentándose en la lucha política en favor de sus derechos e intere- ses- la forma en que las clases dominantes pretenden someterlos.  A veces rehacen la ideología dominante con elementos propios.  De cualquier manera, para mucha gente verdaderamente popular   las  grandes obras  son lo mismo que  para  las clases dominantes. Ave- nidas, jardines, embellecimiento de lo que ya es bello en la ciu- dad, túneles, viaductos, todas obras que si  bien indiscutiblemente  pueden tener algún interés para las clases populares, puesto que  la   ciudad es una totalidad, en definitiva no atienden a  las  necesidades  prioritarias de estas clases y sí a las de las clases más ricas.  No quiero ni siquiera sugerir que una administración progre- sista, democrática, radical pero jamás sectaria, deje de responder  a los desafíos con que se debaten las zonas ricas de la ciudad sólo  porque son problemas de ricos. Rigurosamente, los problemas  de la ciudad son problemas de la ciudad. Mectan en forma dife- rente, es cierto, pero afectan tanto a  ricos como a  pobres. Pero  lo que no es aceptable es que una administración progresista no  se sienta en el deber indeclinable de jerarquizar los gastos públi- cos en función de las  reales y gigantescas necesidades, muchas  de ellas dramáticas, de las poblaciones explotadas.  Una administración seria, democrática, progresista, no puede  tener dudas entre pavimentar kilómetros de calles en las zonas   renegadas,    cuidar los caminos, construir escuelas con las que re- ducir  el  déficit cuantitativo de nuestra educación -y ese déficit  no se registra en las zonas  felices    del país-, hacer que la asistencia  médico-hospitalaria sea suficiente en cantidad y cada vez mejor,  multiplicar el número de guarderías, cuidar la expresión cultu- ral del pueblo, o embellecer lo más bonito, permitiendo incluso  que los ricos no paguen impuestos.  Lo que he pretendido dejar claro, como tesis que defiendo, es  que los partidos progresistas o  de izquierda, puesto que la dere- cha continúa existiendo, no pueden caer en el cuento de que las  ideologías se acabaron y a  partir de ahí pasar a entender la lucha  \n40  CARTAS A  QUIEN PRETENDE ENSEÑAR  política como algo sin color y sin olor, como una disputa en la  que sólo valen  la competencia técnica y la competencia para  comunicar mejor los objetivos y las metas del gobierno.  Es  interesante observar cómo recientemente, en los debates  por la televisión con su oponente, el candidato victorioso a la al- caldía de San Pablo insistía en que sólo proponía \"cuestiones de  naturaleza  administrativa  y no  política  o    ideológica\".    Y lo hacía re- alizando un esfuerzo enorme por convencerse a  sí mismo de  que las  cuestiones administrativas,  castas y puras, in tocadas por lo   ideológico  o  por lo  político,    son realmente neutras.  El gran administrador adecuado para ese tipo de astucia es el  que nunca existió. Es el que toca el mundo e interviene en él con  la justeza de su saber técnico,  tan grande y tan puro que con- mueve. Es  el que tiene, entre otros poderes, el de abolir las cla- ses sociales, el de desconocer que las diferencias entre la existen- cia  como  ricos  y  la  existencia  como  pobres  crean  o  generan  necesariamente en los unos y en los otros diferentes maneras de  estar siendo, distintos gustos y sueños, formas de pensar, de ac- tuar,  de valorar,  de  hablar diferentes,  culturas diversas,  y  que  todo eso tiene mucho que ver con las opciones políticas, con los  caminos ideológicos.  Cuanto más la izquierda se deje arrullar por esa cantinela, tanto  menos actuará pedagógicamente y menos contribuirá para la for- mación de una ciudadanía crítica. Por eso es la insistencia con que  me repito: el error de los progresistas no es el de hacer campañas  de contenido ideológico. Éstas deberían hacerse cada vez  mejor,  dejando bien claro a los sectores populares que  las  diferencias de  clase -de las que aquéllos tienen un conocimiento por lo menos  sensible, que les llega por la piel, por el cuerpo, por el alrna- no  pueden ser negadas, y que esas diferencias tienen que ver con los  proyectos políticos, con  las    metas del gobierno, con la composi- ción de éste.  Que una cosa es el discurso electoral y demagógico  de un candidato, y otra es su práctica cuando es elegido. Collor se  decía  el  candidato de los  pobres,  de los  descamisados,  y jamás  -esto entre nosotros-Ios descamisados quedaron más desnudos y  \nPRIMERAS PALABRAS  41  trágicamente perdidos que en el período de descalabros y de  impudicia de su gobierno.  El  error de las izquierdas casi  siempre radicó en la absoluta se- guridad de sus verdades, lo que las hacía sectarias, autoritarias,  Te- ligiosas,    en su convicción de que nada de lo que estuviera fuera de  ellas  tenía sentido, en su arrogancia, en su enemistad con la de- mocracia, que para ellas era la mejor manera que tenían las clases  dominantes de implantar y mantener su \"dictadura de clase\".  El  error de hoy,  o  el riesgo que se corre, está en que, atónitas  con lo que viene  sucediendo a  partir de los  cambios en la ex  Unión Soviética, ahora reactiven el miedo a la libertad, el odio a  la democracia, o bien que se entreguen apáticas al mito de la ex- celencia del capitalismo aceptando así contradictoriamente que  las campañas políticas no son ideológicas. Y existe todavía otro  error o el riesgo de cometerlo: el de creer en la posmodernidad  reaccionaria según la cual, con la muerte de las ideologías, la des- aparición de las clases sociales, del sueño, de la utopía, la adminis- tración pública es cuestión puramente técnica, desvinculada de la  política y de la ideología.   Es    en ese sentido, por ejemplo, que se explica que personas  que hasta ayer fueron militantes de izquierda acepten hoy  ase~   rar a gobiernos antagónicos a sus viejas opciones. Si  ya    no hay cla- ses sociales, si  todo es  más o  menos la misma cosa, si  el mundo es  algo opacado,  los  instrumentos con los  que opera este  mundo  opaco son los no menos grises instrumentos técnicos.  El que las clases dominantes, creyendo en esto o no, difundan  la ideología de la muerte de las ideologías, me parece un com- portamiento ideológico propio de ellas.  Que una persona que ayer era progresista hoy se vuelva reac- cionaria me parece posible, aunque lamentable. Pero lo que  no puedo aceptar es  que ese  cambio de  un  polo al  otro sea  visto,  o  se hable de él, como el de quien simplemente  caminó  o  se    desplazó    en un mismo plano, puesto que ya no hay polos, ni  derecha ni izquierda.  La  caminata es  técnica, sin  olor,    sin    color,   sin  sabor.    ¡Eso no!  \n42  CARTAS A  QUIEN PRETENDE ENSEÑAR  ENDULZAR-ABLANDAR  ¿Y  por qué me permito este  aparente desvío  del punto básico   maestra,  sí;  tía,    nO?   Precisamente porque la desviación es meramente ficticia.  El  intento de reducir a la  maestra  a  la condición de  tía  es una  \"inocente\" trampa ideológica en la que, queriendo hacerse la  ilusión de  endulzar  la vida de la maestra, lo que se  trata de ha- cer es ablandar su capacidad de lucha o entretenerla en  el  ejer- cicio de sus tareas fundamentales. Entre ellas, por ejemplo, la  de desafiar a sus alumnos desde la más tierna y adecuada edad  a  través de juegos, de historias, de lecturas para comprender la  necesidad de la coherencia entre el discurso y la práctica; un dis- curso sobre la defensa de los más débiles, de los pobres, de los  des- camisados,  y una  práctica  en favor de los  camisados  y contra los   descamisados;    un discurso que niega la existencia de las clases so- ciales, de sus conflictos y de la práctica política, exactamente en  favor de los poderosos.  Es frecuente la defensa o  la pura aceptación como cosa nor- mal  de la  profunda diferencia que  haya veces  entre    el  dis- curso del candidato mientras es candidato y su discurso luego  de electo. No me parece ético defender esa contradicción, o  aceptarla como un comportamiento correcto. No es  con ese  tipo de prácticas como ayudamos a la formación de una ciudada- nía vigilante, indispensable para  el  desarrollo de la democracia.  Finalmente, la tesis    maestra,  si;  tía,  no  consiste en que, como  tías y/o tíos y/o maestros, todos nosotros tenemos el derecho o  el deber de luchar por  el  derecho a ser nosotros mismos, a optar,  a decidir, a desocultar verdades.  Sin embargo, la  maestra  es la  maestra.    La  tía  es la  tía.    Es  posible  ser tía sin amar a sus sobrinos, sin disfrutar de ser tía, pero no es  posible ser maestra sin amar a  los alumnos -aunque amar sola- mente no sea suficiente- y sin gusto por lo que se hace. Pero es  más fácil  para una maestra decir que no le gusta enseñar que  para una tía  decir que no le gusta ser tía.  La reducción de la  \nPRIMERAS  PALABRAS  43  maestra a la tíajuega un poco con ese temor implícito,  el  de que  la tía se niegue a ser tía.  Tampoco es  posible  ser maestra sin  luchar por sus  derechos,  para cwnplir mejor los propios deberes. Pero usted que me está le- yendo ahora, que es o pretende ser maestra, tiene todo el derecho  de querer que la llamen  tía,    o de continuar en ese papel.   y    sin embargo no puede desconocer las implicaciones escon- didas  en  la  trampa ideológica que  implica la reducción  de  la  condición de maestra a  la de tía.  \n\nPrimera carta  ENSEÑAR-APRENDER.  LECTURA DEL MUNDO-LECTURA DE LA PALABRA   Ningún tema puede ser más adecuado como objeto de  esta primera carta para quien se atreve a enseñar que el signifi- cado critico de ese acto, así como el significado igualmente cri- tico de aprender. Es que el  enseñarno  existe sin el  aprender,    y  con  esto quiero decir más que lo que diria si  dijese que el acto de en- señar exige la existencia de quien enseña y de quien aprende.  Quiero decir que el enseñar  y  el aprender se van dando de ma- nera tal que, por un lado, quien enseña aprende porque reco- noce un conocimiento antes aprendido y,  por el otro, porque  observando la manera como la curiosidad del alumno aprendiz  trabaja para aprehender lo que se le está enseñando, sin lo cual  no aprende, el educador se ayuda a descubrir dudas, aciertos  y   errores.  El  aprendizaje del educador, al  enseñar,  no se da necesaria- mente a  través de la rectificación de los  errores que comete el  aprendiz. El aprendizaje del educador al educar se verifica en la  medida en que éste, humilde  y  abierto, se encuentre permanen- temente disponible para repensar lo  pensado, para revisar sus  posiciones; se percibe en cómo busca involucrarse con la curio- sidad del alumno  y  los diferentes caminos  y  senderos que ésta lo  hace recorrer. Algunos de esos caminos  y  algunos de esos sende- ros que a veces recorre la curiosidad casi virgen de los alumnos  están cargados de sugerencias, de preguntas, que el educador no  \n46  CARTAS A  QUIEN PRETENDE ENSEÑAR  había notado antes.  Pero ahora, al enseñar, no como un  buró- crata  de  la  mente  sino reconstruyendo los caminos de su curiosi- dad -razón por la que su cuerpo consciente, sensible, emocio- nado, se abre a las  adivinaciones  de los alumnos, a su ingenuidad  y  a  su  criticidad-,  el  educador tiene  un  momento  rico  de  su  aprender en el acto de enseñar. El educador aprende primero a  enseñar, pero también aprende a  enseñar al enseñar algo que es  reaprendido por estar siendo enseñado.  No obstante, el hecho de que enseñar enseña al educador a  transmitir un cierto contenido no debe significar en modo al- guno que el educador se aventure a  enseñar sin la competencia  necesaria para hacerlo, ni lo autoriza a  enseñar lo que no sabe.   La  responsabilidad ética, política y profesional del educador le  impone el deber de prepararse, de capacitarse, de graduarse an- tes de iniciar su actividad docente.  Esa  actividad  exige que su  preparación, su capacitación y su graduación se transformen en  procesos permanentes. Su experiencia docente, si  es bien perci- bida y bien vivida, va dejando claro que requiere una capacitación  constante del educador, capacitación que se basa en el análisis  crítico de su práctica.  Partamos  de  la  experiencia  de  aprender,  de  conocer,  por  parte de quien se prepara para la tarea docente, lo que necesa- riamente implica  estudiar.    Desde ya,  no es mi intención escribir  prescripciones que deban ser seguidas rigurosamente,  lo que  significaría una contradicción frontal con todo lo que he dicho  hasta  ahora.  Por  el  contrario,  lo  que  aquí  me  interesa,  de  acuerdo con el espíritu del libro en sí,  es desafiar a  sus lectores  y  lectoras sobre  ciertos  puntos  o  aspectos,  insistiendo  en  que  siempre hay algo diferente para hacer en nuestra vida educativa  cotidiana, ya sea que participemos en ella como aprendices, y por  lo  tanto educadores, o  como educadores,  y  por eso aprendices  también.  No me gustaría dar la impresión, sin quererlo, de estar dejando  absolutamente clara la cuestión del  estudiar,    del    leer,  del  observar,   del  reconocer  las relaciones entre los objetos para conocerlos. Estoy  \nPRIMERA CARTA  47  intentando aclarar algunos puntos que merecen nuestra atención  en la comprensión crítica de estos procesos.  Comencemos por  estudiar,    que, al incluir el  enseñar  del educa- dor, incluye también, por un lado, el aprendizaje anterior y conc<r  mitante de quien enseña y el aprendizaje del principiante que se  prepara para enseñar en el mañana o  que rehace su saber para  enseñar mejor hoy,  y,  por otro lado, el aprendizaje de quien, aún  niño, se encuentra en los comienzos de su educación.  Como preparación del  s~jeto  para aprender,  estudiar es  en  primer lugar un  quehacer crítico,  creador,  recreador,  no  im- porta si  yo me comprometo con él a  través de la lectura de un  texto que trata o  discute un determinado contenido que me ha  sido propuesto por la  escuela  o  si  lo realizo partiendo de una re- flexión critica sobre cierto suceso social o  natural, que como ne- cesidad de la propia reflexión me conduce a la lectura de textos  que mi curiosidad y mi experiencia intelectual me sugieren o  que me son sugeridos por otros.  Siendo así, en el nivel de una posición crítica que no opone el  saber del sentido común a otro saber más sistemático o de mayor  exactitud, sino que busca una síntesis de los contrarios, el acto  de  estudiar  siempre implica el de  leer,    aunque no se agote en éste.  De  leer  el mundo,  de leer la palabra y así leer la lectura del mundo  hecha anteriormente. Pero leer no es mero entretenimiento ni  tampoco es un ejercicio de memorización mecánica de ciertos  fragmentos del texto.  Si  en realidad estoy estudiando, si  estoy leyendo seriamente,  no puedo pasar una página si  no he conseguido alcanzar su sig- nificado con relativa claridad. Mi  salida no es memorizar trozos  del texto leyéndolos mecánicamente dos,  tres o  cuatro veces y  luego cerrar los ojos y tratar de repetirlos como si  su ftiadón pu- ramente maquinal me brindase el conocimiento que necesito.  Leer es una opción inteligente, dificil,  exigente, pero gratifi- cante. Nadie lee o estudia auténticamente si  no asume, frente al  texto o al objeto de la curiosidad, la forma crítica de ser o de es- tar siendo sujeto de esa curiosidad, sujeto de lectura, sujeto del  \n48  CARTAS A  QUIEN PRETENDE ENSEÑAR  proceso de conocer en el que se encuentra. Leer es procurar o  buscar crear la comprensión de lo leído; de ahí la importancia  de la enseñanza correcta de la lectura  y    de la escritura,  entre  otros puntos fundamentales.  Es    que enseñar a  leer es compro- meterse con una experiencia creativa alrededor de la  compren- sión.    De la comprensión  y  de la comunicación. Y la experiencia de  la  comprensión  será tanto más profunda cuanto más capaces seamos  de asociar en ella -jamás dicotomizar- los conceptos que emer- gen en la    experiencia  escolar    procedentes del mundo de lo coti- diano. Un ejercicio crítico siempre exigido por la lectura  y  nece- sariamente por la escritura es el de cómo franquear fácilmente  el pasaje de la    experiencia    sensoria~  característica de lo cotidiano,  a la  generalización  que se opera en el lenguaje escolar,  y  de éste a  lo concreto tangible. Una de las fonnas para realizar este ejerci- cio consiste en la práctica que mencioné como \"lectura de la lec- tura anterior del mundo\", entendiendo aquí como \"lectura del  mundo\" aquella que  antecede a  la de la palabra  y    que,  persi- guiendo igualmente la comprensión del objeto, se hace en el do- minio de lo cotidiano.  La  lectura de la palabra, haciéndose tam- bién búsqueda de la comprensión del texto  y  por lo tanto de los  objetos referidos en él, nos remite ahora a la lectura anterior del  mundo. Lo que me parece fundamental dejar bien claro es que  la lectura del mundo que se hace a  partir de la experiencia sen- sorial  no es  suficiente.  Pero por otro lado tampoco puede ser  despreciada  como    inferior    por  la  lectura  hecha  a  partir  del  mundo abstracto de los conceptos  y  que va  de la generalización  a lo tangible.  En cierta ocasión una alfabetizadora nordestina discutía, en  su círculo de cultura, una codificación 1  que representaba a  un  1 Sobre codificación, lectura del mundo, lectura de la palabra, sentido  común, conocimiento exacto, aprender y enseñar, véase Paulo Freire,  La   educación    cumo práctica  de  la    libertad,  PedogrJgía  del  oprimido  Y  PedogrJgía  de  la  esperanza,    Buenos Aires, Siglo XXI, 2008;  EdUCll{lio e muda7lfa,  Aftio cu/turál   para a  liberdade,    Río de janeiro, paz e Terra; Paulo Freire  y  Sérgio Guima- \nPRIMERA CARTA  49  hombre que, trabajando el barro, creaba un jarro con las manos.  Discutían sobre lo que es la cultura a  través de la \"lectura\" de una  serie de codificaciones, que en el fondo son representaciones de  la   realidad concreta. El concepto de cultura ya  había sido aprehen- dido por el grupo a través del esfuerzo de  comJmmsiim  que caracte- riza  la  lectura del mundo y/o de  la  paItdlra.    En su experiencia ante- rior, cuya memoria ella guardaba en su interior, su  cmnJmnsiim  del  proceso en el que el hombre, trabajando con el barro, creaba el ja- rro, comprensión gestada de manera sensorial, le decía que hacer   el  jarro era una forma de trabajo con la cual, concretamente, se  mantenía. Así como el jarro no era sino el objeto, producto del tra- bajo, que una vez vendido posibilitaba su vida y la de su familia.  Ahora bien, yendo algo mas allá de  la  experiencia sensorial, su- perándola un poco, daba un  paso  ftrndamental: alcanzaba  la  capa- cidad de gmD\"aliz:arque  caracteriza a  la  \"experiencia escolar\". Crear  el jarro a  través  del trabajo transformador sobre  el    barro no era  sólo la forma de sobrevivir sino también de hacer  cultura,  de hacer   arte.    Fue por eso que, releyendo su anterior lectura del mundo y de  los quehaceres en el mundo, aquella alfubetizadora nordestina dijo  segura y orgullosa: \"Hago cultura. Hago esto\".  En otra ocasión presencié una experiencia semejante desde el  punto de vista de la inteligencia del comportamiento de las per- sonas. Ya  me he referido a  este hecho en otro trabajo, pero no  hace mal que ahora lo retome.  Estaba yo  en  la    isla  de sao Tomé, en África  Occidental, en el  golfo de Guinea. Participaba en el primer curso de capacitación  para alfabetizadores junto a  educadores y educadoras nacionales.  raes,    SoIm edUCQfiio,    Río de Janeiro, Paz e Tena; Paulo Freire e Ira Shor,   Medo  e  ousadia,    o  cotidiano  IÚJ  educador,    Río de Janeiro, paz e Tena; Paulo  Freire y Donaldo Macedo,  Alfabetiz.a{ao,  leitura    IÚJ    mundo e  IeilUTll  da  pala-  vra,    Río de Janeiro, paz e Terra; Paulo Freire,  La impurtancia  de lLer Y  el  proceso  de    liberación,    México, Siglo XXI; Paulo Freire y Márcio Campos,  \"Leitura do mundo - Leitura da palabra\",  Le  Cuunier de  L  'I!rvE;a),  Paris,  febrero de 1991.  \n50  CARTAS A  QUIEN PRETENDE ENSEÑAR  Un pequeño pueblo de la región pesquera llamado Porto Mont  había sido escogido por el equipo nacional como centro de las  actividades de capacitación. Yo    ya    había sugerido a los miembros  del equipo nacional que la capacitación de los educadores y de  las educadoras no se efectuase siguiendo ciertos métodos tradi- cionales que separan la teona de la práctica. Tampoco a  través  de ningún tipo de trabajo dicotomizante que menospreciase la   teoria,  que  le  negase  toda  importancia  y  enfatizase  exclusiva- mente la  práctica    como la única  valedera,    o  bien que negase la   práctica  y atendiese exclusivamente a  la    tema.    Por el contrario,  mi intención era que desde el comienzo del curso viviésemos la  relación contradictoria que hay entre la teona y la práctica, que  será objeto de análisis en una de mis cartas.  Por esta razón yo rechazaba cualquier fonna de trabajo en que  se  reservasen los primeros momentos del curso para las exposi- ciones llamadas teóricas, sobre el tema fundamental de la capaci- tación de los futuros  educadores y  educadoras. Éste  era el  mo- mento para los discursos de algunas personas consideradas como  las más capaces para hablarles a los otros.  Mi  convicción era otra. Pensaba en una fonna de trabajo en  que  en  una  misma  mañana se  hablase  de  algunos  conceptos  clave -codificación y decodificación, por ejemplo- como si  estu- viésemos en un momento de  Jm!sentaciones,    sin pensar ni por un  instante que la  presentación  de ciertos conceptos fuese suficiente  para dominar la comprensión de los mismos. Eso lo lograría la  discusión crítica sobre la práctica en la que iban a iniciarse.  Así, la idea básica, aceptada  y  puesta en práctica, era la de que  los jóvenes que se preparasen para la tarea de educadoras  y  edu- cadores populares debían coordinar las discusiones sobre codifi- caciones en un círculo de cultura de veinticinco participantes.  Los  participantes del  círculo de cultura tenían  conciencia de  que se trataba de un trabajo de capacitación de educadores.  An-  tes del comienzo se discutió con ellos su tarea política -la de ayu- damos sabiendo que iban a  trabajar con jóvenes en pleno pro- ceso de capacitación-o Sabían que ellos, así como los jóvenes que  \nPRIMERA CARTA  51  iban a  ser capacitados, jamás habían hecho lo que iban a  hacer  ahora. La única diferencia que los separaba radicaba en que los  participantes solamente leían el mundo, mientras que losjóvenes  que se iban a  capacitar para la tarea de educadores  ya  leían tam- bién la palabra. Sin embargo, jamás habían discutido una codifica- ción en esa forma ni habían tenido la más mínima experiencia de  alfabetización con nadie.  En cada tarde del curso, con dos horas de trabajo con los vein- ticinco participantes, cuatro candidatos asumían la dirección de  los debates. Los responsables del curso asistían en silencio, sin  interferir, tomando sus notas. Al  día siguiente, durante el semi- nario de evaluación y capacitación de cuatro horas, se discutían  las equivocaciones, los errores y los aciertos de los candidatos en  presencia de todo el grupo, desocultándose entre ellos la teoría  que se encontraba en su práctica.  Difícilmente se repetían los errores y las equivocaciones que  se  habían  cometido  y  que  habían  sido  analizados.  La  teoría  emergía  empapada  de la práctica vivida.  Fue precisamente en una de esas tardes de capacitación, du- rante  la  discusión  de  una  codificación  que  retrataba  a  Porto  Mont, con sus  casitas  alineadas a  la orilla de la playa frente al  mar y con un pescador que dejaba su barco con un pescado en  la mano, cuando dos de los participantes se levantaron como si  se hubiesen puesto de acuerdo y caminaron hasta una ventana  de la escuela en la que estábamos y,  mirando a  Porto Mont allá  a lo lejos, dijeron, volviéndose nuevamente hacia la codificación  que representaba al pueblo: \"Sí,  Porto Mont es exactamente así,  y nosotros no lo sabíamos\".  Hasta entonces, su \"lectura\" del lugar, de su mundo particular,  una \"lectura\" demasiado próxima al  \"texto\", que era el contexto  del pueblo, no les  había permitido  ver  a  Porto Mont como real- mente era. Existía cierta \"opacidad\" que cubría  y  encubría a Porto  Mont. La experiencia que estaban realizando de \"tomar distancia\"  del objeto, en este caso de la  codificación  de Porto Mont, les permi- tía una nueva lectura más fiel  al  \"texto\", vale  decir, al    contexto    de  \n52  CARTAS A  QUIEN PRETENDE ENSEÑAR  Porto Mont.  La  \"toma de distancia\" que la \"lectura\" de la codifica- ción les permitió los  aproximó  más a Porto Mont como \"texto\" que  está siendo leído.  Esa    nueva lectura rehizo la anterior, por eso di- jeron: \"Sí,  Porto Mont es exactamente así, y nosotros no lo sabía- mos\".  Inmersos  en la realidad de su pequeño mundo, no eran capa- ces de  ver.    \"Tomando distancia\" de aquélla  emergieron  y,  así, vieron  como jamás habían visto hasta entonces.  Estudiar es desocultar, es alcanzar la  comprensión  más exacta del  objeto, es pe
