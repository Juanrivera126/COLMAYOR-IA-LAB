   revisión   interministerial. También se llevaron a cabo grupos focales presenciales y virtuales,   se definieron la línea   gráfica  y la   identidad visual, y se realizaron ajustes finales tras   recibir retroalimentación.    •   Implementación : La implementación se formaliza mediante un acto administrativo   en  concordancia  con  los  términos  del  Plan  Nacional  de  Desarrollo  2022 - 2026,   promu lgando la Política Nacional de Salud Mental 2024 – 2033 con efectos en todo el   país .    •   Seguimiento  y  evaluación :  El  Sistema  de  Seguimiento  y  Evaluación  de  la  PNSM  se   constituye  en  un  instrumento  de  gestión  pública  diseñado  para  monitorear  de   manera continua la ejecución y el cumplimiento de los objetivos y metas. Por medio   de la recolección y análisis sistemático d e datos, se proporcionará información clave   para  la  toma  de  decisiones,  que  permitirá  ajustar  estrategias  durante  la   implementación y asegurar el cumplimiento de los objetivos; así mismo, se facilitará   la orientación y el acompañamiento a los actores invol ucrados.        4.     Diagnóstico situacional    El  diagnóstico  situacional  para  la    actualización  de  la    PNSM  se  basó  en  un  análisis   multimétodo que incluyó  un  estudio observacional analítico y  un estudio  ecológico, con un   enfoque  central  en  los  determinantes  sociales  de  la  salud.  Los  datos  que  se  presentan  a   continuación  corresponden  a  este  estudio  y  se  encuentran  detallados  en  el  documento   completo del  Análisis de la situación de salud en salud mental con   énfasis en determinantes   sociales,  Colombia  2023 .  Los  datos  no  contenidos  en  dicho  documento  se  referencian  de   manera independiente    Este  diagnóstico    identifica     los  elementos  estratégicos     necesarios  para    formular     una   política    transectorial     que  aborde  las    desigualdades  estructurales  y  las  barreras  de  acceso   que  afectan  a     di versas   poblaciones   en  el  país .  A  través  de  enfoques  territoriales  e   interseccionales, se examina cómo las dinámicas sociales, económicas y culturales impactan  \n31                    de  forma  diferenciada  a  las    regiones  y  grupos  poblacionales,  visibilizando  problemáticas   como  la  distribución  desigual  de  recursos,  la  estigmatización  y  la  desarticulación   intersectorial.    En  este  contexto,  se     reconoce     que  múltiples  dimensiones  sociales  (como    la    etnicidad,   género,  la    clase  social,  la  sexualidad,  la  geografía,  la  edad,  la  discapacidad     y     el  estatus   migratorio)   interactúan en un marco de estructuras de poder   que  influyen   en el bienestar   emocional y psicológico.    Este  análisis  proporciona ,  por  tanto,    una  comprensión  context ualizada     para     generar   respuestas  inclusivas y adaptadas a las diversas realidades del país, promoviendo un acceso   equitativo a la atención de salud mental ,  que respete las diferencias y necesidades de cada   población.    En  Colombia , la salud mental   está influenciada por determinantes sociales que generan   desigualdades  significativas  entre  regiones  y  grupos poblacionales.  Entre  los  factores  que   impactan  con  mayor  intensidad ,     se  destacan  la  pobreza  multidimensional,  la  limitada   disponibilidad de servi cios de salud mental, las violencias interpersonales, intrafamiliares y   de  género,  el  desempleo  de  larga  duración  y  los  trastornos  por  consumo  de  alcohol  y   cannabis.           \n32                    4.1   Panorama en regiones       Para facilitar la visualización y contribuir a los procesos de p riorización de acciones en las   regiones del país, se realizó una semaforización de los determinantes sociales que tienen   un mayor impacto, junto con los principales eventos y resultados en salud mental.    En este ejercicio, se categorizaron las tasas del año   2023 de los determinantes sociales y   los eventos de salud mental en cuartiles. Los territorios ubicados en el cuartil más alto, es   decir,  aquellos  con  los  peores  indicadores,  fueron  marcados  en  rojo.  Esta  metodología   permite  identificar  de  manera  clara  la s  áreas  que  requieren  una  atención  prioritaria  y  la   implementación de intervenciones específicas para mejorar la atención en salud mental en   estas regiones. Los resultados se presentan a continuación.    La  región Amazon i a   enfrenta  elevados   niveles de pobreza multidimensional y  registra   en   algunos  de  sus  depart amentos    las  tasas  más    altas     de  violencia    sexual,  intrafamiliar,  de   pareja  e  interpersonal,  particularmente  en    los  departamentos  de    Amazonas ,     Vaupés     y   Guainía.  La    limitada  disponibilid ad   de  servicios  de  salud  mental   agrava  los  desafíos  en  la   región . L os departamentos de  Amazonas y Caquetá registran algunas de las tasas más altas   de trastornos por consumo de alcohol y cannabis ; a demás,  l as tasas de intento de suicidio   y suicidio son  alarmantemente altas en varios territorios .       Tabla 1.  Determinantes sociales y resultados en salud mental en la región de la   Amazonia. Colombia, 202 3            Fuente:   Tomado del  Análisis de la situación de salud en salud mental, con énfasis en  determinantes   sociales .   MSPS, 2024.   *Tasas por 100.000 habitantes.       La  región  Orinoqu i a ,  por  su  parte,  enfrenta  altos  porcentajes  de  pobreza   multidimensional y   es   la segunda   con menor   disponibilidad de servicios de salud mental en   el país, lo que dificulta el acceso a  la atención necesaria. Tres   (3)   de sus departamentos  se   encuentran   en el cuartil más alto de analfabetismo, y las tasas de violencia intrafamiliar, de   pareja  y  sexual  son  especialmente  elevadas  en    los  departamentos  de    Arauca  y  Guaviare .   Además, dos   (2)   dep artamentos presentan tasas en el cuartil más alto de trastorno afectivo   bipolar  y  suicidio ,  lo  que  evidencia  la    necesidad  de    desarrollar     estrategias  de  prevención   específicas para abordar estos problemas .      \n33                    Tabla 2 .  Determinantes sociales y resultados en  salud mental en la región de la   Orinoquia. Colombia, 202 3           Fuente:   Tomado del  Análisis de la situación de salud en salud mental, con énfasis en determinantes sociales .   MSPS, 2024.   *Tasas por 100.000 habitantes.         En la  región Centro , dos  (2) d epartamentos presentan altos porcentajes de analfabetismo,   mientras  que  la  pobreza  multidimensional  se  encuentra   en  niveles  intermedios.  El   departamento  de    Santander  destaca  por  sus  altas  tasas  de  violencia  interpersonal  y   consumo de alcohol y cannabis. En   salud mental,  el departamento de  Santander  igualmente   registra tasas elevadas de depresión, ansiedad, trastorno afectivo bipolar (TAB), epilepsia y   demencia . Por su parte,   Norte de Santander se encuentra en el cuartil más alto de intento   de suicidio y sui cidio.       Tabla 3.  Determinantes sociales y resultados en salud mental en la región Centro.   Colombia, 202 3         Fuente:   Tomado del  Análisis de la situación de salud en salud mental, con énfasis en determinantes sociales .   MSPS, 2024.   *Tasas por 100.000  habitantes.         En  la  región   Caribe ,  los departamentos de  Córdoba, Magdalena y Sucre registran altos   porcentajes de analfabetismo y pobreza multidimensional.  Los departamentos de  Atlántico   y Bolívar se  encuentran   en el cuartil más alto de violencia interpersonal, intrafamiliar y de   pareja     y,  adicionalmente,     Bolívar  también  presenta  altos  niveles  de  desempleo  de  larga   duración,  violencia  sexual  y  trastornos  por  consumo  de  alcohol.  En  salud  mental,    los   departamentos     de    Bolívar,  San  Andrés  y  Sucre    presentan     tasas  elevadas  de  depresión,   ansiedad,  trastorno  afectivo  bipolar  (TAB),  epilepsia  y  demencia,   mientras  que  el   Archipiélago de   San Andrés registra altas tasas de intento de suicidio y suicidio.      \n34                      Tabla 4.   Determinantes sociales y resultados en salud mental en la región Caribe.   Colombia, 202 3           Fuente:   Tomado del  Análisis de la situación de salud en salud mental, con énfasis en determinantes   sociales . MSPS, 2024.   *Tasas por 100.000 habitantes.       En  la    región  Pacífico ,     los  departamentos  de     Cauca  y  Nariño  presentan  altas  tasas  de   violencia interpersonal, intrafamiliar y de pareja, mientras que   el departamento de   Chocó   registra un alto porcentaje de analfabetismo. La disponibilidad de servicios de salud me ntal   es    limitada     en    el  departamento  de    Cauca,  lo  que  podría  generar  un  subregistro  de  los   eventos. El departamento con las tasas más altas de eventos en salud mental en la región   es el Valle del Cauca.                          Tabla 5.   D eterminantes sociales y resultados  en salud mental en la región Pacífico.   Colombia, 202 3           Fuente:   Tomado del  Análisis de la situación de salud en salud mental, con énfasis en determinantes   sociales . MSPS, 2024.   *Tasas por 100.000 habitantes.       En  la  región  Andina ,  tres     (3)     departamentos  presentan  altas  tasas de  violencia  sexual,   mientras que    otras   formas  de  violencia  se  encuentran en  niveles  intermedios  a  altos.  Las   tasas  de  trastornos  por  consumo  de  alcohol  y  cannabis  son  elevadas  en  casi  todos  los   departamentos. La dispon ibilidad de servicios de salud mental es baja en  los departamentos   de  Huila, Quindío y Risaralda, que también se encuentran en el cuartil más alto de intento  \n35                    de  suicidio  y  suicidio.  En  general,  esta  región  presenta  los  peores  indicadores  de  salud   mental de l país, con las tasas más altas en varios eventos y departamentos .       Tabla 6.   Determinantes sociales y resultados en salud mental en la región Andina.   Colombia, 202 3         Fuente:   Tomado del  Análisis de la situación de salud en salud mental, con énfasis en  análisis de   desigualdades . MSPS, 2024.   *Tasas por 100.000 habitantes.         En    Bogotá ,     se  registran  tasas  medio - altas  y  altas  de  depresión,  ansiedad,  trastorno   afectivo bipolar (TAB), epilepsia y demencia, reflejando una carga significativa de trastornos   menta les. Estos indicadores están relacionados también con una mayor oferta de servicios   de salud mental, lo que facilita el acceso y diagnóstico. Por otro lado, las tasas de intentos   de suicidio son moderadas y las de suicidio consumado son bajas en comparació n con otros   indicadores,  lo  que  podría  reflejar  la  efectividad  de  algunas  estrategias  de  prevención  e   intervención implementadas.         Tabla 7.   Determinantes sociales y resultados en salud mental en Bogotá, D.C. Colombia,   202 3         Fuente:   Tomado del  Análisis  de la situación de salud en salud mental, con énfasis en determinantes   sociales . MSPS, 2024.   *Tasas por 100.000 habitantes.         Como se evidencia, la salud mental en Colombia  presenta una marcada heterogeneidad   territorial,  influenciada por determinantes  sociales que varían considerablemente entre las   diferentes regiones. Esta realidad demanda una responsabilidad tanto intersectorial como   transectorial, para abordar la salud mental no solo como la ausencia de enfermedad, sino   como un proceso integral de pr omoción del bienestar personal, familiar y comunitario.       4.2   Poblaciones diferenciales    L as poblaciones diferenciales son aquellas que requieren especial protección por parte   del Estado debido a su vulnerabilidad, marginalidad, discriminación o debilidad manifi esta.   La     investigación  científica  ha  documentado  una  fuerte  asociación  entre  las  desventajas  \n36                    sociales  y  el  deterioro  de  la  salud  mental .  F actores  como  la  pobreza,  la  exposición  a   violencias  desde  edades  tempranas,  la  discriminación     y     las  dificultades  en  el  acceso  a   sistemas de salud aumentan el riesgo de desarrollar trastornos mentales, que a su vez se   vinculan  con  la  pérdida  de  ingresos,  oportunidades  de  empleo  y  exclusión  social  ( The   Lancet ,  2018).    En  este  sentido,  la     combinación  de     los  determinantes  sociales    con     las   situaciones  de  vulnerabilidad  específicas  de  estas  poblaciones  aumenta  el  riesgo  de   afectaciones en su salud mental.      Para los  pueblos y comunidades indígenas , los problemas mentales se    perciben como   una   desarmonía  relac ionada  con  la  transgresión  de  las  normas  culturales,  por   desobediencia  de  la  ley  de  origen,  por  la  falta  de  ritualidad  y/o  por  desequilibrio  de  las   energías  de  la  naturaleza.    Su     situación  de  salud  mental  de  los  pueblos  indígenas    está   asociada  a  determinantes  estructurales,  intermedios  y  proximales  de  la  salud;   especialmente ,   hay una fuerte relación con    los efectos d el conflicto armado, sumado a la   falta  de  acceso  a  servicios  de  salud  mental    pertinentes ,  la    adaptación  intercultural ,  y  la   fragilidad o debilitamiento de las prácticas culturales de protección, a través de la medicina   propia (MSPS ,   2019).    El análisis situacional,  reportó que ,   de las poblaciones con autorreconocimiento étnico,   las comunidades indígenas y Rrom son las que   presentan tasas más altas en trastornos de   ansiedad, depresión y en conducta suicida .    Por  su  parte,  las   comunidades  negras,  afrocolombianas,  raizales  y  palenqueras    presentan una pobreza multidimensional en 30,6   % .  La privación se concentra en factores   como  el trabajo informal,  el  bajo nivel educativo y rezago escolar , así como la  inadecuada   eliminación  de  excretas  (DANE,  2019).  Históricamente ,  estas  comunidades  han  sido   víctimas de vulneración   cultural, social, económica y psicológica . A ctualmente ,   se reconoce   que  todas  estas  situaciones  descritas  de  racismo,  ya  sean  explícitas  o  sutiles,  tienen  un   impacto  profundo  y  negativo  en  el  bienestar  psicosocial  de  las  personas,  familias  y   colectivos,  g enerando  afectaciones  en  la  salud  mental  a  través  de  fenómenos  de  estrés   crónico  que  favorecen  la  aparición  de  trastornos  mentales  y  otras  enfermedades  no   transmisibles (Williams et al., 2019).  En el último quinquenio, se ha observado un aumento   en los tra stornos de ansiedad, así como en los casos de esquizofrenia en estas poblaciones.   Los intentos de suicidio, sin embargo, se mantienen estables.    El     pueblo     Rrom     conserva  prácticas  y  formas  de  vida  vinculadas  con  sus  valores,  y  las   tradiciones  de  su  cultura,    y  por  lo  tanto  requieren  atención  y  protección  diferencial  que   garantice n     la  protección  de  sus  derechos  individuales  y  colectivos.  La  totalidad  de    los   miembros de esta  población   son reconocidos como víctimas del conflicto armado, al haber   sido  transgredidas  sus  tradiciones  nómadas,  llevándolos  a  formas  de  asentamiento   sedentario en contravía de su tradición, causando afectaciones a su riqueza cultural, usos y   costumbres, oficios  y tradiciones. Llama la atención que la tendencia del quinquenio en este  \n37                    grupo  étnico  permanezca  estable  para  eventos  como  depresión,  ansiedad,  epilepsia,   trastornos  psicóticos,  intentos  de  suicidio,  al  hacer  una  comparación     con  las  demás   poblaciones  que  h an  mostrado  un  aumento.  Este  resultado  debe  analizarse   cuidadosamente,  puesto  que  puede    evidenciar     dificultades  en  el  acceso  al  diagnóstico  y   atención de estos problemas, más que ausencia de estos.    En cuanto a la  población de mujeres,   se observan cambios e n la salud mental a lo largo   del ciclo de vida. Por ejemplo, durante el embarazo y en el primer año posterior al parto,   una de cada cinco mujeres puede presentar un problema de salud mental, especialmente   depresión y ansiedad. Las necesidades básicas insat isfechas en relación con la salud mental   pueden  perjudicar  la  salud de  las  mujeres  y  el  bienestar de  su bebé  y  sus  familias.  Por  lo   tanto, fortalecer los programas de salud materno perinatal, a través de las estrategias de   atención  primaria  en  salud  mental     (APSM)  que  ofrezcan  entornos  de  atención  menos   estigmatizantes, puede mejorar el acceso y tratamiento para esta población (OPS, 2023).     El género es un factor clave en las inequidades en salud, ya que las normas, expectativas   y roles sociales pueden aumen tar la exposición y vulnerabilidad de las mujeres ante riesgos   sanitarios. Factores como el estrés laboral, el compromiso excesivo, el acoso en el lugar de   trabajo  y  el  conflicto  entre  el  trabajo  y  la  familia  han  demostrado  ser  especialmente   perjudiciales  para la salud mental de las mujeres. Por ejemplo, se ha documentado que, en   las mujeres, el matrimonio y la convivencia actúan como factores protectores de la salud   mental,  mientras  que  aquellas  solteras,  divorciadas  y  separadas,  sin  estabilidad  laboral,   t ienen mayores riesgos de afectaciones en la salud mental (Cabezas - Rodríguez, 2021).       Según los datos reportados en el Sistema Integrado de Información sobre Violencias de   Género  (Sivige)  y  provenientes del  Sivigila,  en  el año  2023  se notificaron 74.480  ca sos  de   violencia  de género  física, con una tasa nacional de 142,6 por cada 100.000 habitantes; de   estos casos, el 81,2   % ocurrió en contra de mujeres. Además, el 50,87   % de las víctimas de   violencia    de  género    física  no  convivían  con  el  agresor,  y  la    mayoría  de  ellas  recibió  esta   violencia física por parte de su pareja (36,76   %) o expareja (22,24   %). En el mismo año, se   notificaron 42.167 casos de violencia sexual, con una tasa nacional de 80,8 por cada 100.000   habitantes; de estos, el 85,5   % ocurrió c ontra mujeres.     Asimismo,  es  importante  comprender  cómo  el  cuidado  de  la  salud  mental  de  los   hombres  puede  actuar  como  un  factor  protector,  no  solo  para  su  propio  bienestar,  sino   también  como  un  motor  de  cambio  en  sus  relaciones  interpersonales.    Promover    la   deconstrucción de los modelos hegemónicos de masculinidad, que limitan la expresión libre   de  sentimientos  y  la  búsqueda  de  ayuda  profesional,  es  clave  para  prevenir  conductas   violentas y de riesgo.    Para  la  población  de     lesbianas,  gays,  bisexuales,  trans género,  intersexual  y    queer   (LGBTQ+) ,  continúa enfrentando discriminación tanto social como institucional en diversos   entornos,  como  el  laboral,  educativo,  familiar  y  en  los  servicios  de  salud.  A  pesar  de  los  \n38                    avances legislativos en la protección de sus de rechos, persisten altos índices de violencia y   crímenes  de  odio.  La  homofobia,  la  transfobia  y  la  patologización  de  la  diversidad  sexual   humana,  arraigadas  en  algunos  sectores  de  la  sociedad,  junto  con  la  estigmatización,   contribuyen a la marginalización y   exclusión de las personas LGBTIQ+.      Según  una  encuesta  nacional  realizada  en  2019  por  la  Universidad  Simón  Bolívar,  en   donde  se  reclutó  una  muestra  final  de  4,867  personas  de  todo  el  territorio  colombiano,   incluidas  1,243  mujeres  lesbianas  /  gay  cisgénero  y  de  género  no  binario;  895  mujeres    bisexuales cisgénero y de género no binario; 2,163 hombres gay cisgénero e identificados   como  no  binarios,  334  hombres  bisexuales  cisgénero  y  no  binario;  232  personas   transgénero y 307 personas con identificación de género no binaria. Se encontró que el 7 2    % de los encuestados reportaron haber experimentado al menos un malestar psicológico   moderado; Además, el 55% informaron haber tenido pensamientos suicidas a lo largo de su   vida, y uno de cada cuatro (25   %) indicó haber intentado suicidarse al menos una  vez. Las   mujeres bisexuales (33   %) y las personas transgénero (31   %) presentan tasas más altas de   intentos de suicidio, y una de cada tres personas indicó haber intentado suicidarse al menos   una vez (Kyu Choi, 2019).  En el mismo estudio , el 75   % informaron   haber sido víctimas de   acoso  escolar  al  menos  una  vez  antes  de  los  18  años,  y  el  25     %  indicaron  que  fueron   despedidos o que se les negó trabajo en algún momento de sus vidas.    A pesar de estos datos, es importante señalar que en Colombia los estudios sobre   salud   mental  en  la  población  LGBTIQ+  son  limitados,  y  los  boletines  de  salud  mental  no   proporcionan información clara y diferenciada sobre las cifras que afectan a esta población.    Ahora  bien,  la  población  rural  colombiana   presenta  particularidades  que  est án   relacionadas  con  su  arraigo  al  territorio,  su  relación  con  la  naturaleza  y  su  ser,  estar  y   quehacer  en  el  mundo  (Camargo,  2020).  Según  Novoa - Gómez  (Ascofapsi,  2021),  se  ha   identificado  que  la  concepción  de  salud  en  general  y  de  salud  mental,  difiere   con siderablemente de la prevalente en las áreas urbanas.    Lo anterior conduce a varias dificultades: i) la planificación de políticas de salud mental   descontextualizadas  respecto  de  los  deseos  y  necesidades  locales;  ii)  la  falta  de   reconocimiento  de  síntomas  o     signos  compatibles  con  patologías  mentales;  iii)  un  mayor   peso de los determinantes sociales de la salud para la concepción global del bienestar y; iv)   el  uso  de  herramientas  metodológicas  inadecuadas  para  identificar  y  tamizar  datos   relacionados salud me ntal, al adoptar un enfoque occidental - urbano que puede distar de la   realidad rural (Bello, 2022; Rodríguez, 2016).      El  análisis  geográfico  evidencia  disparidades  significativas  en  la  prevalencia  de   trastornos  mentales  entre  las  zonas  urbanas  y  rurales,  su brayando  la  necesidad  de  una   distribución  más  equitativa  de  los  recursos  de  salud  mental  en  el  país.  Mientras  que  las   cabeceras  urbanas  muestran  mayores  prevalencias     de  los  diferentes  eventos  en  salud   mental , las zonas rurales  se  enfrentan desafíos particu lares, como la falta de educación en  \n39                    salud mental y la limitada disponibilidad de servicios, lo que perpetúa el estigma y reduce   la consulta por ayuda profesional   (Análisis de Situación de la Salud Mental con Énfasis en   Determinantes  Sociales. Colombia,  20 24;  MSPS, 2024) .  Para favorecer  la salud  mental en   las  poblaciones  rurales,  es  importante  fomentar  la  participación  de  la  comunidad  en  la   planificación y ejecución de programas de salud. En estas comunidades, la estrategia de APS   en salud mental a través  de los equipos básicos de salud (EBS) es un mecanismo que reduce   las brechas de acceso y continuidad de los servicios. Adicionalmente, este esfuerzo requiere   el  trabajo  intersectorial  con  diferentes  actores  del  territorio  que  permitan  mejorar  los   determina ntes sociales de la salud en las poblaciones rurales.    Para la  población de personas trabajadoras   la OMS estima que el 15   % de los adultos en   edad laboral padecen un trastorno mental en algún momento, los más prevalentes son los   trastornos  depresivos,  de  an siedad  y  por  consumo  de  sustancias  psicoactivas,  estas   afectaciones  tienen  un  alto  costo  para  las  personas,  los  empleadores  y  la  sociedad  en  su   conjunto.  Se ha documentado que los trabajadores que informan tensión laboral, denotada   por  una  combinación  de  alta  demanda  laboral  y  bajo  control  laboral,  o  injusticia   organizacional  tienen  una  incidencia  de  depresión  1,5  veces  mayor.  De  igual  forma,  esta   población  reporta  tasas  de  suicidio  que  son  más  elevadas  en  aquellos  que  experimentan   acoso y violencia en el  lugar de trabajo. Por otra parte, factores como el bajo control en el   trabajo,  el  estrés  laboral,  el  compromiso  excesivo,  el  acoso  en  el  lugar  de  trabajo  y  el   conflicto  entre  el  trabajo  y  la  familia  mostraron  ser  los  más  perjudiciales  para  la  salud   mental  de las mujeres trabajadoras. Estas asociaciones son robustas al ajuste estadístico,   sin embargo, la magnitud de los efectos es menor que para el desempleo, que se asocia con   una duplicación del riesgo de depresión y suicidio (Rugulies, 2023).      El  trabajo  p uede  ser  un  factor  protector  de  la  salud  mental,  pero  también  puede   contribuir a causar daños potenciales. Por ejemplo, existe estudios que documentan que el   estrés  laboral  puede  aumentar  el  riesgo  de  enfermedades  cardiovasculares  y  de   alteraciones metaból icas. Este exceso de riesgo es menos marcado que los asociados con   factores  causales  conocidos  relacionados  con  el  estilo  de  vida,  como  el  tabaquismo,  la   obesidad,  la  hipertensión  arterial  y  el  colesterol  alto     (Niedhammer  et  al . ,  2021) .  Sin   embargo,  hay  gr upos  de  población  específicos  para  los  que  el  estrés  laboral  parece  ser   particularmente  perjudicial,  como  las  personas  con  enfermedad  cardiovascular   preexistente o diabetes. Para esta población, el estrés puede desencadenar eventos clínicos   como arritmia,  infarto de miocardio, miocardiopatía o accidente cerebrovascular, pudiendo   generar secuelas neuro psíquicas transitorias y/o permanentes, además de dar una mayor   vulnerabilidad de desarrollar alteraciones de la salud mental   (Kivimäki, 2015) .    Los profundos  cambios en la naturaleza y la disponibilidad del trabajo durante las últimas   décadas han dado lugar a nuevas exposiciones psicosociales y físicas generalizadas que se  \n40                    asocian con resultados adversos para la salud, convirtiendo al trabajo en un determinante    social importante para la salud mental. ( Frank   et al . , 2023).    La  población de trabajadores de la salud,   enfrentan amplios riesgos psicosociales que   pueden  tener  consecuencias  graves  en  su  salud  mental.  Esta  población  se  expone  a   situaciones como: i) carga   de trabajo excesiva, debido a la alta demanda de atención, falta   de personal suficiente; ii) exposición a situaciones de violencia tanto verbales o físicas por   parte de pacientes, familiares de pacientes y otros colegas; iii) una alta demanda emocional   pa ra manejar situaciones de sufrimiento y muerte de manera constante; iv) falta de control   sobre  el  trabajo,  tal  como  sentir  que  no  se  tiene  autonomía  en  la  toma  de  decisiones;  v)   conflictos  interpersonales,  debido  a  problemas  en  las  relaciones  con  compañero s  de   trabajo,  superiores  o  pacientes;  vi)  falta  de  reconocimiento,  no  sentirse  valorado  por  el   trabajo realizado; vii) inseguridad laboral, temor a perder el empleo o a no ser renovado el   contrato. Todo lo anterior favorece a la perdida de la salud mental  (Rivera - Casas, 2022). Por   ejemplo,  el  estudio  H E ROES  en  Colombia,  evaluó  1719  miembros  del  personal  de  salud   durante la pandemia. Se estimó que el 98   % del talento humano en salud sufrió altos niveles   de  malestar  psicológico;  el  22.8     %  tuvo  riesgo  moderado     a  severo  de  problemas  de   depresión; el 16   % tuvo riesgo moderado a severo de problemas de ansiedad, el 2,6   % tuvo   ideación suicida. (OPS, 2022) .    Para  la  población  de  personas  que  ejercen  actividades  sexuales  pagas ,  se  ha   documentado que, el hecho de  vender su cuerpo, compartir su intimidad y estar expuestas   a agresiones como la explotación, el tráfico sexual o la sensación de poder por parte de los   clientes,  provoca  una  mayor  prevalencia  de  problemas  y  trastornos  mentales  (Guillén,   2022). Se ha docume ntado que esta población, presenta tasas más altas tasas de depresión,   consumo de sustancias psicoactivas y estrés post traumático; una de cada 2 mujeres que   ejercen  esta  labor  lo padecen,  junto a otros trastornos de  tipo  disociativo  (Cedeño  et  al.,   2017).     Además,  el estigma  social  afecta  las  relaciones  interpersonales  por  lo  que pierden   redes  de  apoyo,  y  genera  barreras  de  acceso  a  instituciones  de  salud  tanto  públicas  y   privadas, al igual que dificulta la búsqueda de instituciones de protección y de justi cia. Por   ejemplo, actuaciones discriminatorias como el lenguaje abusivo o la negativa a dar atención   son  algunos de  los motivos  por  los  que  las  víctimas  de  explotación  sexual  dentro  de esta   población rechazan la ayuda psicológica y médica (Clemente, 2020).    En  la     población  de  las  Fuerzas  Armadas  y  Policía ,  el  estigma  sobre  los  problemas  y   trastornos mentales corresponde al conjunto de creencias que afirman que la búsqueda de   apoyo  en  salud  mental  sería  un  acto  deshonroso  y  vergonzoso  para  el  propio  soldado,   causando daño a la carrera militar, o provocando que compañeros y superiores tengan una   menor  confianza  en  su  habilidad  para  desarrollar  las  tareas  encomendadas.  La  cultura   militar  contiene  todavía  estereotipos  establecidos  sobre  los  conceptos  de  masculini dad,   fortaleza,  honor  o  lealtad  que  son  difícilmente  compatibles  con  reconocer  un  problema  \n41                    mental, siendo sinónimos de debilidad o de sospecha de simulación. La consecuencia más   devastadora del estigma es que provoca la ocultación del problema e influye ne gativamente   en el proceso de tomar la decisión de buscar apoyo psicológico, generando el agravamiento   de los síntomas o la cronificación del cuadro (Mardones - Escapa, 2023) .  Según   datos de la   Procuraduria  en  el  2022     se  reportó  que    12.836  miembros  de  las  Fue rzas  Militares    tenían    algún trastorno mental o del comportamiento ;  de esa cifra, el 85   % hacia parte del Ejército   con 10.910 soldados; en la Armada 1.540 uniformados, que representan un 12 por ciento;   por último, en la Fuerza Aérea se detectaron 385 personas con algún trastorno mental. Para   la  Policía  esta c ifra supera ba   los 6.900   casos de p ersonas afectadas (Procuraduría General   de la Nación, 2022) .    Las     personas con  discapacidad   experimentan  un  impacto  negativo  en  su salud  mental   debido a las múltiples barreras sociales que enfrentan, especialmente en áreas clave como   el acceso a servicios d e salud, educación inclusiva, empleo digno y participación social. De   acuerdo con el DANE, la prevalencia de discapacidad es mayor en las mujeres en casi todos   los grupos etarios, con excepción de aquellos comprendidos entre los 20 y los 34 años. Las   mujer es representan aproximadamente el 53,7   %   del total de personas con discapacidad,   una diferencia de casi ocho puntos porcentuales respecto a la población masculina. En el   ámbito  educativo,  el  16,2     %     de  las  personas  con  discapacidad  no  cuenta  con  educación   formal,  en  comparación  con  solo  el  2,6     %     de  la  población  sin  discapacidad;  además,  se   observa una menor proporción de personas con discapacidad que han alcanzado el nivel de   educación  media.  En  cuan to  al  empleo,  solo  el  21,9     %     de  las  personas  con  discapacidad   forman parte de la fuerza laboral, frente al 63,6   %   de las personas sin discapacidad, lo que   revela una importante brecha en la inclusión laboral (DANE, 2023).    A su vez, c uidar a un a persona  con   discapacidad implica cambios en el estilo de vida de   la  persona cuidadora ,  entre los que se encuentran  tales como el aislamiento, la reducción   de actividades sociales, el descuido de su propia salud debido a la dedicación al cuidado, el   aumento de otras c argas laborales para mantener los recursos económicos, o la pérdida de   fuentes de ingreso ,   lo que puede desencadenar  problemas médicos e interpersonales.     Según  el  DANE   (2023) ,  las  personas  con  discapacidad  enfrentan  una  pobreza   desproporcionada     debido  a    las  barreras  de  acceso  a  la  educación,  al  trabajo  digno  y  a  la   participación en la vida cívica. En conjunto, estas barreras tienen un impacto significativo y   adverso en su calidad de vida y, por ende, probablemente también en su salud mental .    Las  brechas  e n  la  atención  en  salud  mental  para    las     personas  con  discapacidad  y  sus   cuidadores /as  son similares a las de la población  en general . A pesar de existir legislación   favorable para  su   reconocimiento y la protección,  persisten obstáculos   para  en la aplicación    de     las  recomendaciones .  Entre    las  medidas  para  superar  estas  barreras  se  encuentra n     el   fortalecimiento de las estrategias de  APS   y la rehabilitación basada en la comunidad.   \n42                    La población de  personas con discapacidad psicosocial  son una de las menos  conocidas   en Colombia y en el mundo. La discapacidad psicosocial, se entiende como una condición   de  vida  temporal  o  permanente  que  afecta  directamente  las  funciones  mentales  de   interrelación  de  la  persona  y  limita  su  capacidad  para  ejercer  una  o  más  activi dades   esenciales de la vida (Organización de las Naciones Unidas, 2007). La relación entre la salud   mental, enfermedad mental y discapacidad psicosocial es compleja; son conceptos distintos   y uno no deriva del otro de manera directa. La discapacidad psicos ocial es un proceso que   aparece cuando el entorno no permite a una persona participar de la misma manera que   todos a causa de un proceso o antecedente en salud mental, hace alusión a aquellos sujetos   que con diagnóstico de trastorno mental que han sufrido  los efectos sociales negativos del   estigma, la discriminación y la exclusión. Dentro de las barreras que vive esta población, la   que tiene mayor peso es la barrera actitudinal, que tiene un vínculo directo con el estigma   que atraviesa todas las barreras a    las que las personas con discapacidad psicosocial y sus   familias  se  ven  expuestas.    Según  un  estudio  de  Fundación  Saldarriaga  Concha,  la   enfermedad  mental  es  percibida  tanto  por  el  individuo  como  por  el  entorno  como  una   “incapacidad  para  superar  problemas” ,  y  la  gran  tarea  se  convierte  más  que  en  lograr   superar  la  enfermedad,  en  lograr  evitar  el  manejo  especializado  y  aún  más  dejar   rápidamente el tratamiento farmacológico y psicoterapéutico (González, 2019).    La    población  víctima  del  conflicto  armado     ha  sufr ido  las  consecuencias  directas    e    indirectas  de  la  violencia  sociopolítica ,  cuyas    secuelas  continúan  afectando  tanto  a  las   víctimas  como  a  las  generaciones  posteriores.  Estos  impactos  incluyen  una  mayor   prevalencia  de trastornos  mentales,  dificultades en  la s  relaciones  de  confianza  y  desafíos   en  la  integración  comunitaria.    La  violencia  de  este  tipo  fomenta  una  tendencia  hacia  la   deshumanización,  al  reducir  la  capacidad  de  sensibilizarse  ante  el  sufrimiento  ajeno,  la   solidaridad y el sentido de esperanza  (MSP S, 2015).     El  desplazamiento  forzado,  considerado  en  sí  mismo  un  acontecimiento  altamente   estresante, pone a prueba la estabilidad del núcleo familiar y social. Es el hecho victimizante   más común en el país, con un 89,1   %    de ocurrencia   (8.665.884 víctimas) . Además, genera   una  pérdida  significativa  de  patrimonio  cultural  inmaterial,  afecta  las  normas  de   convivencia,  impacta  negativamente  en  la  salud  mental  y  socava  el  sentido  de   trascendencia  de  las  personas.  Por  ello,  la  prevención  de  e ste  fenómeno,  así  como  la   atención adecuada y reparación de sus víctimas, es esencial para mitigar las consecuencias   en la salud mental de la población afectada.    E n e l Acuerdo Final de Paz del 2016   se   establece n   las garantías para mejorar atención en   salud   mediante servicios de salud física y mental de calidad, adaptados a las necesidades   específicas de las víctimas, haciendo hincapié en las personas mayores,  y  particularmente ,    en jóvenes, niños, niñas y adolescentes   (NNAJ) . Además, se busca fortalecer los  programas  \n43                    de  salud  mental  y  apoyo  psicosocial  para  promover  una  verdadera  reconciliación  y   reconstrucción del tejido social.     Sin  embargo,  en   2023,  la  Corte  Interamericana  de  Derechos  Humanos  observó   deficiencias  en  el  Programa  de  Atención  Psicosocial  y  Salud  Integral  a  Víctimas  (Papsivi),   entre las que se destacan las siguientes:  i )  la insuficiencia de   recursos financieros y humanos   para atend er a todas las víctimas del conflicto armado;  ii ) su  limitada  cobertura geográfica    que no alcanza t odas las regiones afectadas   y ;  iii )    la necesidad de   mejorar   la calidad de la   atención mediante la capacitación del personal (MRE, 2015).     La s   personas habita ntes de la  calle  son  aquellas personas que hacen de la   calle su lugar   de  habitación,  ya  sea  de  manera  permanente  o  transitoria,  desarrollando  todas  las   dimensiones  de  su  vida  en  el  espacio  público.  Las  principales  causas  reportadas  para   habita nza     en     calle  fueron  el  consumo  de  sustancias  psicoactivas  (33,5     %)  y  problemas   familiares (25,7   %) (DANE, 2021).     Se ha documentado una alta prevalencia de trastornos mentales no diagnosticados o sin   tratamiento,  así  como un  consumo  problemático  de  sustancias ps icoactivas,  que afecta  a   todas  las  enfermedades  y  reduce  la  capacidad  de  autocuidado     (Di  Iorio,  2023) .  En  este   contexto,  las  estrategias  de  APS  son  un  factor  protector,  al  evitar  que  las  situaciones  de   salud mental de las personas habitantes de la calle se agraven, reduciendo la necesidad de   tratamientos  intensivos  en  los  servicios  hospitalarios  intramura les.  Además,  estas   estrategias contribuyen a cambiar el imaginario colectivo sobre la salud mental, mostrando   que no toda intervención requiere necesariamente una internación (MSPS, 2021).    La población de  migrantes y refugiados   es un grupo heterogéneo que  enfrenta diversas   necesidades  de  salud;  a  menudo  provienen  de  comunidades  afectadas  por  guerras,   conflictos,  desastres  naturales,  degradación  ambiental  o  crisis  económica.  Durante  su   desplazamiento, estas personas realizan viajes largos y agotadores, con a cceso limitado a   alimentos  y  agua,  servicios  básicos  y  saneamiento,  mientras  enfrentan  situaciones  de   pobreza, discriminación, inseguridad, falta de vivienda y el riesgo de exposición a violencias   antes, durante o después del proceso migratorio, lo que deb ilita sus determinantes sociales   en salud y las coloca en riesgo de desarrollar alteraciones en la salud mental (MSPS, 2023).     Colombia, uno de los países con mayor movilidad venezolana, se ha convertido tanto en   destino  como  punto  de  tránsito  hacia  otros    países.  A  su  vez,  se  presentan  fenómenos   emergentes como el aumento de personas migrantes de diferentes regiones del país y del   mundo,  atravesando  la  ruta  irregular  de  la  selva  del  Darién  hacia  Panamá.  A  pesar  del   acuerdo de Paz, también persiste una signi ficativa movilidad interna debido a la violencia   sociopolítica.     Ser migrante conlleva afrontar una serie de estresores crónicos, múltiples y constantes,   lo  que  acaba  por  resquebrajar  el  bienestar  psicológico  y  predisponer  a  la  aparición  de   trastornos  ment ales.    En  particular,  las  mujeres  y  niñas  pueden  tener  dificultades  para  \n44                    acceder a servicios de protección e intervención frente a la violencia sexual y de género. Los   NNAJ  migrantes,  especialmente  los/as  menores  no  acompañados/as,  tienen  más   probabilidade s  de  experimentar  eventos  traumáticos,  explotación  y  el  abuso,  y  suelen   encontrar barreras para acceder a los servicios de salud.     Los  registros  administrativos  disponibles  en  el  país  muestran  que  el  porcentaje  de   personas  extranjeras  atendidas  en  los  serv icios  de  salud,  principalmente  por  trastornos   mentales  y  del  comportamiento,  aumentó  del  1.09     %  en  2017  a  1.51     %  en  2022  (MSPS,   2023). Para mitigar esta situación, es importante el fortalecimiento de factores protectores,   lo cual incluye acompañamiento psi cosocial, redes de apoyo, rutas de atención y una mayor   articulación  entre  instituciones  territoriales,  nacionales  e  internacionales  (Ruiz  Eslava,   2020).    La    población  de  niños,  niñas  y  adolescentes     (NNAJ)     presenta  una  alta  vulnerabilidad   para desarrollar a lteraciones de la salud mental,  debido   a que cualquier trauma, violencia,   carencia o estresor mayor puede influir sobre su proceso de neurodesarrollo ,   propiciando   la aparición de problemas y trastornos mentales. La protección de la salud mental en esta   población implica   dar   garantías para el desarrollo de sus habilidades para la vida, que les   permita proyectar relaciones seguras y la interacción apropia da con su entorno social.     El país no cuenta con estadísticas nacionales sobre autolesiones no letales en  NNAJ ;  sin   embargo,  desde la academia se han  adelantado   algunos estudios al respecto. Por ejemplo,   se  evaluó  la  frecuencia  de  conductas  autolesivas  en    estudiantes  de  bachillerato    y    se   encontró  que  el  22,4     %     reportó  haber  presentado  estas  conductas ;     el  tipo  de  lesión  más   frecuente  fue  el  autocorte  (92,3     %),  el  46,2     %  de  quienes  se  autolesionaban presentaron   más de un tipo de autolesión y el 30,8   % lo  hacía al menos una vez al mes. En ese estudio   se encontró que el 38,4   % de quienes se autolesionaba n   cumplía n   criterios para depresión   y el 44,8   % para ansiedad (Buitrago   et al.,   2021).     En otra investigación, el 22,3   %   de los jóvenes que se autolesionaban   refirió que sintió   que  su  ansiedad  se reducía  luego de  las  lesiones;  sin  embargo,  el  72,9     % no había tenido   pensamientos  suicidas.  Los  factores  de  riesgo  más  importantes  fueron  padecer  algún   trastorno mental (52,9   %), ser víctima de violencia psicológica  (25,8   %) y, en el caso de los   menores  de  edad,  el  uso  de  sustancias  psicoactivas  (22,7     %)  (Lince - González    y     Estrada -  Orozco, 2020).    En    el  Análisis     de  Situación  de  la  Salud  Mental  con  Énfasis  en  Determinantes  Sociales.   Colombia, 2024 (M inisterio de Salud y  Protección   S ocial , 2024)   se  encuentra , al desagregar   por quinquenios ,   que entre los 10 y 29 años se registraron la gran mayoría de los intentos   de suicidio (73,2   % ). Comparados con   los/as   niños /as   de 5 a 9 años y ajustando por otras   variables, se encontró que los /as   adolescentes de 10 a 14 años tienen 17 veces más riesgo    y  que     los /as     jóvenes  de  15  a  19  años  tienen  35  veces  más  riesgo.  Las  violencias,  la  \n45                    desigualdad  social,  la  pobreza  y  las  diversas     condiciones  ambientales  de  vulnerabilidad   impiden que un sinnúmero de  NNAJ   en Colombia tengan una adecuada salud mental.    Los  trastornos  de  la  conducta  alimentaria  (TCA)  son  un  problema  de  salud  pública   emergente en Colombia, especialmente por el aumento d e la prevalencia de este trastorno   en  NNAJ.  Los  TCA  son  el  resultado  de  la  interacción  de  factores  psicológicos,  físicos  y   socioculturales. Las estrategias de  APS   ofrecen un marco ideal para identificar a las personas   con TCA en sus etapas iniciales, sobre   todo en edades críticas como la adolescencia. Al lograr   integrar la detección y el manejo de los TCA en los servicios de atención primaria, se puede   reducir  el  estigma  asociado  a  estos  trastornos,  mejorar  el  acceso  a  la  atención   complementaria  especializa da  y,  en  última  instancia,  promover  la  recuperación  de  las   personas afectadas (Martínez - Suárez, 2022).    La  población de personas mayores   está en constante aumento, tanto en el país como a   nivel  mundial.  Sin  embargo,  las  afecciones  de  salud  mental  en  este  gr upo  suelen  estar   infravaloradas  e  infra  tratadas,  y  la  estigmatización  asociada  a  estas  alteraciones  puede   hacer que las personas mayores sean reacias a buscar ayuda. Según los datos del ASIS en   salud  mental,  la  prevalencia  de trastornos depresivos  y  de  an siedad  ha  aumentado  entre   los  adultos  mayores  en  Colombia,  lo  que  destaca  a  este  grupo  como  particularmente   vulnerable  debido  a  las  transiciones  y  desafíos  propios  de  la  vejez.  Los  problemas   relacionados  con  la  estabilidad  laboral,  la  salud,  las  responsabi lidades  familiares  y  la   adaptación a la vejez, como la mayor prevalencia de enfermedades crónicas y demencias,   tienen un impacto significativo en la salud mental.    Además, el aislamiento social y la soledad, que afecta a cerca de una cuarta parte de las   per sonas mayores, son factores de riesgo claves para padecer afecciones de salud mental   en etapas posteriores de la vida. Las tasas de mortalidad por suicidio en este grupo también   han mostrado un aumento, lo cual refleja la mayor prevalencia de ansiedad y de presión, lo   cual subraya la necesidad de implementar programas de prevención específicos para dicho   grupo de alto riesgo.     Es  necesario  desarrollar  programas  de  envejecimiento  saludable  y  fortalecer  la   estrategia de Rehabilitación Basada en Comunidad (RBC)   en salud mental, con un enfoque   de  curso  de  vida;  estos  programas  deben  incluir  grupos  de  apoyo  y  de  ayuda  mutua,  así   como  asistencia  técnica  para  su  implementación  en  el  territorio.  También  es  importante   promover la formación y capacitación a lo largo de   la vida para empoderar a las familias y   personas  mayores  en  materia  de  vejez,  envejecimiento,  derechos  humanos,  cuidado  y   cuidado a cuidadores informales.      En  este  sentido,  la     implementación  de  programas  de  promoción  de  la  salud  mental,   prevención y tratamiento  es necesaria para abordar las necesidades específicas de  mujeres,   hombres,  mujeres,  niños,  niñas,  adolescentes,  jóvenes,  adultos  y  personas  mayores ,     con   enfoque  de  géner o,  diversidad  sexual,  étnico,  rural  y  por  curso  de  vida .  Estos  programas  \n46                    deben ir acompañados de procesos educativos y de apoyo continuo, con el fin de reducir la   incidencia de intentos de suicidio, disminuir la mortalidad por suicidio y, en general, mejor ar   la salud mental de esta la población.       4.3   Barreras de acceso a los servicios de salud    Para  mejorar  la  salud  y  el  bienestar  psicosocial ,     es  necesario  garantizar  la  cobertura   sanitaria universal. La falta de acceso adecuado a la atención y las dificultades p ara acceder   a los servicios de salud mental tienen consecuencias significativas en los ámbitos sanitario,   social y económico para individuos, familias y comunidades. A continuación, se presentan   algunos  servicios  disponibles ,    mi en tras     que     las  brechas  presentadas  se  detallan  en  el   documento  completo  del  Análisis   de  Situación  de  la  Salud  Mental  con  Énfasis  en   Determinantes Sociales. Colombia, 2024 (MSPS, 2024) .     Según el Registro Especial de Prestadores de Servicios en Salud (REPS), para el    2024  se   encuentran     208  instituciones    nacionales     que  prestan  el  servicio  de  internación  en  salud   mental  para  adultos,  con  8.286  camas,  6.240  de  ellas  de     la     red  privada  y  2.046  de  la  red   pública. El 75   %   de las camas corresponde a instituciones prestadoras de salud privadas, en   tanto  que  el  25     %     restante pertenece  a  empresas  sociales  del  Estado  (ESE);  es  decir, una    mediana    de  15,8  camas  hospitalarias  de  salud  mental  por  100.000  habitantes,  la  cual  es   lige ramente mayor al compararla con el promedio regional de las Américas de 13,58 camas   (OPS, 2023).      Las capitales de los departamentos ofrecen el 68   %   de la internación en salud mental en   adultos (6.209 camas), mientras que las ciudades periféricas ofrecen  únicamente el 32   %   de   estas  (2.077  camas).  Las  cuatro  principales  capitales  del  país  (Bogotá,  Medellín,  Cali  y   Barranquilla) reúnen 2.805 de las camas ofrecidas (34   % ) para internación de salud mental   en adultos.  Al examinar   por regiones, se tiene que el 5 7   %   (4.685) de las camas se encuentra   en la región Andina, el 24   %   (1.995) en la región Caribe, el 12   %   (1.012) en la región Pacífico,   el 4   %   (312) en la región de la Orinoquia, el 3   %   (275) en la región de la Amazonia y apenas   el 0,08   %   (7) en la región Insular.     Según datos del REPS (2013), 96 instituciones prestan el servicio de internación en salud   mental para  NNAJ , con un total de 1.086 camas. De estas, el 86   %   (935) corresponde a IPS   privadas y el 14   %   (151) restante pertenece a ESE. De acuerdo con estos datos, la tasa es de   2 camas para menores de edad por 100.000 habitantes. La mediana de centros hospitalarios   de salud mental para la población infantil y adolescente de la región de las Américas es de   0,07 por 100.000 habitantes (OPS, 2023).    En el REPS, se reportan 1.542 instituciones nacionales que prestan el servicio de consulta   externa  por  psiquiatría.  El  86     %     (1.320)  de  las  instituciones  prestadoras  de  salud  son   privadas, el 14   %   (220) pertenecen a  empresas sociales del Estado (ESE) y un 0,2   %   (2) son   mixtas.  Las  capitales  departamentales  ofrecen  el  63     %     (978  unidades)  de  los  servicios  de  \n47                    consulta externa por psiquiatría, en tanto que las ciudades periféricas tienen el 37   %   (564   unidades) a disposici ón de los pacientes. Cuatro de las principales capitales del país (Bogotá,   Medellín,  Cali  y  Barranquilla)  reúnen  el  30     %     (465  unidades)  de  la  oferta  para  consulta   externa por psiquiatría.     Según cifras del REPS, para la consulta externa por psicología hay  6.928 instituciones en   el  territorio  nacional  que  brindan  este  servicio,  de  las  cuales  80     %     (5.570)  son  de  la  red   privada, el 19   %   (1.310) pertenecen a la red pública y  apenas  el 1   %   (41) son entidades de   carácter  mixto.  Las  capitales  departamentales  ofrec en  el  55     %     (3.779  unidades)  de  los   servicios, en tanto que en las ciudades periféricas baja al 45   %   (3.139 unidades). La región   Andina alberga la mayor disponibilidad de centros de psicología por consulta externa, con   3.073 centros de atención.      En  cuanto  al  talento  humano  en  salud,  para  el  año  2023  había  registrados  90.509   profesionales  de  psicología  en  el  territorio  nacional,  de  acuerdo  con  el  Observatorio  de   Talento Humano en Salud; según este dato en bruto, en Colombia habría 173 psicólogos po r   100.000  habitantes,  siendo  el  tercer  país  en  Latinoamérica  con  mayor  cantidad  de   profesionales en esta área, según la OCDE (2023). No obstante, debe señalarse que no todos   los profesionales  en   psicología se dedican al área de la salud, por lo que el núme ro podría   sobrerrepresentar a los profesionales que realizan atenciones clínicas. Por el contrario, si se   toman  los  datos  del  REPS,  donde  se  inscribe  a  los  prestadores  de  servicios  de  salud   habilitados para ejercer en entidades departamentales y distritale s de salud, se encuentra   que para marzo del 2024 había 2.254 psicólogos adscritos  a   dicha plataforma.     Así  las  cosas,  se  tendría  una  media  de  4,3  psicólogos  por  100.000  habitantes  para   Colombia, que es un dato más cercano a lo reportado para la región de l as Américas, 4,6   por 100.000 habitantes (OPS, 2023). Al compararlo con la media mundial de psicólogos de   1,4 por 100.000 habitantes (OMS, 2020),  se advierte que  los profesionales de psicología en   el país son un recurso humano valioso ,   que fortalecerá la pr estación de la atención en salud   mental;  por  lo  anterior,  se  requiere  que  todos  los  actores  implementen  la  atención   psicológica como puerta de entrada del sistema de salud, lo que favorece la oportunidad de   atención y ayuda a cerrar brechas en la prestació n de servicios.      Por otra  parte,  según  los  datos del  Observatorio  de  Talento  Humano  en Salud  (OTHS),   para  el  2023  había  registrados  1.613  médicos  especialistas  en  psiquiatría,  que   correspondían a un 5,9   %   de los especialistas del país; dentro de este grupo, 115 (7   % ) tienen   la subespecialidad en psiquiatría infantil. En la distribución por departamentos se evidencia   que la mayoría de los profesionales están en las regiones con mayor densidad poblacional,   s iendo  escasos  los  psiquiatras  que  atienden  en  regiones  y  territorios  alejados.  Con  este   número de médicos especialistas en psiquiatría, se tendría para Colombia una media de 3,1   psiquiatras  generales  por  100.000  habitantes.  La  media  mundial  de  psiquiatras    es  de  1,7   por  100.000  habitantes,  mientras  que  la  reportada  para  las  Américas  corresponde  a  1,9  \n48                    psiquiatras por 100.000 habitantes. Sin embargo, para los países de ingresos medios este   valor se encuentra en 3,4 por 100.000 habitantes (OMS, 2023). La cantid ad de psiquiatras   con  subespecialidad  en psiquiatría  infantil  en  el país  corresponde  a  una mediana  de  0,22   psiquiatras  infantiles  por  100.000  habitantes.  Según  el  Atlas  de  salud  mental  de  las   Américas , se registra una mediana de 0,7 psiquiatras infantiles  por cada 100.000 habitantes,   por lo que Colombia se encuentra por debajo de la media regional (OPS, 2023).      El  número  de  enfermeros  registrados  en  el  país  para  el  2023  era  de  80.614,  para  una   densidad  de  15,4  por  cada  10.000  habitantes.  Por  entidades  terr itoriales,  los   departamentos con mayor densidad de enfermeros por cada 10.000 habitantes son, en su   orden,  Tolima,  Risaralda,  San  Andrés,  Quindío  y  Caldas,  en  tanto  que  los  que  menor   densidad tienen son La Guajira, Putumayo, Vaupés y Vichada, respectivamen te.      En cuanto a los profesionales en fisioterapia, terapia ocupacional y fonoaudiología, en el   sistema  OTHS  se  reportaron  para  el  202 3  un  total  de  34.079,  5757  y  9 420  profesionales,   respectivamente.  Los territorios  con  mayor densidad de  profesionales  en    estas  áreas  son   Bogotá, D.C., Valle del Cauca, Antioquia, Atlántico y Santander, mientras que, al igual que   en psiquiatría, hay territorios con menos de 0,06 por cada 10.000 habitantes, entre los que   se    destacan  Chocó,  Amazonas,  Guaviare,  Guainía  y  Vaupés.     Estos  datos  reflejan  que  las   inequidades de acceso no se presentan solamente en los especialistas en psiquiatría, sino   que para brindar una atención integral en estos territorios se requieren esfuerzos por parte   de los entes territoriales y el Estado para   mejorar la oferta en la periferia del país.    Para los países de ingresos medianos, como Colombia, entre el 40   % y el 70   % del gasto   en salud mental sigue destinándose a los hospitales psiquiátricos. Aunque se ha reducido el   número  de  camas  psiquiátricas  y    se  ha     logrado  una     integración  de     la  salud  mental  en  la   atención  primaria,  la  inversión  en    este  ámbito     continúa  siendo  insuficiente.  La  cobertura   ambulatoria  no  ha  aumentado  lo  esperado  y  persisten  hospitales  psiquiátrico s  con  un   número  elevado  de  camas,     las  cuales,  paradójicamente,    no  son  suficientes    para  suplir  el   número  de  pacientes  descompensados .  Esta  situación  se  debe,  en  gran    medida ,  a  las    dificultades  al  acceso  temprano  y  oportuno  desde  la  atención  primaria,  que  pudo  haber   prevenido  una  hospitaliz ación  al  evitar  la  aparición  y  complicación  de  las  crisis.    Según  el   Atlas  de  salud  mental  del  2020,  el  gasto  total  auto  reportado  por  el  gobierno  en  salud   mental como porcentaje del gasto total en salud fue solamente del 1.8   % (Doneltto, 2024).    Investigaci ones sobre la evolución del financiamiento de la Salud Mental en Colombia,   concluyen  que  con  relación  al  financiamiento  de  la  salud  mental  en  Colombia  durante  el   periodo  2016 - 2019,  no  hubo  una  ejecución  completa  ni  la  más  eficiente  gestión  de  los   recursos    financieros  asignados,  tampoco  se  obtuvieron  los  resultados  en  salud  mental   planeados  por  las  autoridades  sanitarias.  Se  evidencia  un  incumplimiento  en  la   implementación  de  la  PNSM  del  2018,  lo  cual  indica  que  no  basta  con  la  formulación  y   expedición  de  no rmas,  sino  que  se  requiere  por  parte  de  los  entes  gubernamentales  \n49                    fortalecer y garantizar los procesos de divulgación, acompañamiento, asesoría, seguimiento   a la implementación de la política y priorización del uso de los recursos financieros en dichos   pro cesos, con una participación activa de todos los actores involucrados (Eraso, 2022)    P or  otra  parte,  para     avanzar  en  el  proceso  de  desinstitucionalización    se    requiere  una   planificación  que  asegure  que  el  desarrollo  de  estructuras  alternativas  preceda  la   disminución de camas de hospitalización de larga y mediana estadía ,   que se reorganice la   hospitalización de corta estancia y se favorezcan las unidades de psiquiatría dentro de los   hospitales generales, los hospitales día y los servicios ambulatorios, es n ecesario intensificar   los esfuerzos para trasladar los servicios a la comunidad e integrarlos a través de estrategias   de  atención  primaria  en  salud.  Estos  factores,  junto  con  el  aumento  del  número  de   profesionales  y  centros  ambulatorios,  son  claves  para  me jorar  la  salud  mental  de  las   comunidades y las personas (OPS, 2020).    En lo referente a las barreras para el acceso a los servicios, la Superintendencia Nacional   de Salud reportó más de 50.000 peticiones, quejas, reclamos y denuncias (PQRD) recibidos   por to dos los canales en el 2023, en los que se manifestaban inconformidades relacionadas   con la salud mental, mayoritariamente contra entidades promotoras de salud (EPS) tanto   del régimen contributivo como del subsidiado. Las causas por las que los pacientes re claman   son la negación y demora en la asignación de citas o consultas, y la falta de oportunidad en   la entrega de medicamentos ( Red  Nacional de Salud, 2023).     Por otra parte, el Instituto Nacional de Salud, por intermedio del Observatorio Nacional   de Salud   (ONS), reporta las siguientes cifras de calidad en la atención en el año 2023: i) en   2021, solamente el 40,11   %   de aquellas personas que recibieron una consulta de psiquiatría   o psiquiatría pediátrica por depresión mayor tuvieron un seguimiento por psicol ogía; ii) el   indicador del porcentaje de personas que son atendidas al menos una vez en los servicios   en salud mental después de haberlo requerido llegó al 39,03   %   en el año 2022; iii) en varios   estudios nacionales se indica que los médicos detectan apenas   el 39   %   de las depresiones,   tratan farmacológicamente el 22   %   de estas y solo uno de cada cuatro médicos de atención   primaria  refiere  estar  preparado  para  atender  pacientes  con  trastornos  mentales;  iv)  a   partir  de  una  estimación  hecha  con  datos  agregados    en  la  Encuesta  Nacional  de  Salud   Mental (ENSM) 2015 y la población atendida con enfermedad mental derivada a servicios   de  salud  mental  en  los  ámbitos  regional,  departamental  y  municipal,  se  encontró  que   apenas  el  10,1     %     de  los  adultos  y  el  16,0     %     de  adoles centes  con  algún  trastorno  mental   recibieron atención específica en los servicios de salud mental (Instituto Nacional de Salud,   2023).     En  la  última  Encuesta  de  Salud  Mental  en  Bogotá,  se  reportó  que  el  16,74     %     de  las   personas  manifiestan  que  les  han  negad o  la  admisión  a  ciertos  servicios  de  salud  y   desconocían la razón. Las principales dificultades para acceder a la atención en salud mental   son dos: tener que esperar mucho tiempo para la asignación de la cita (65,35   % ) y demora  \n50                    excesiva por parte de la EPS   correspondiente para dar la autorización respectiva (26,97   % ).   Frente a la calidad de la atención, el 64,08   %   de las personas consideran que el tiempo de   la consulta fue “adecuado o suficiente”, el 58,19   %   de las personas califican el servicio como   “bueno   o muy bueno”, el 23,72   %   como “regular” y el 18,09   %   como “malo o muy malo”   (Alcaldía de Bogotá, 2023).     Las  dificultades  para  acceder  a  los  tratamientos  adecuados  desde  el  punto  de  vista   farmacológico   se concentran en puntos críticos , como la red de dist ribución    y entrega  de   medicamentos.  Por  ejemplo,  la  disponibilidad  de  la  malla  de  medicamentos  es  más   accesible en áreas urbanas grandes, mientras que ,   en ciudades intermedias y pequeñas o   en  áreas  rurales,  la  entrega  oportuna    es  compleja ,  incluso    para    aquellos  de  uso  básico   dentro  del    Plan  de  Beneficios  en  Salud  ( PBS ) ,  generando  que  los  tratamientos  no  se   entreguen o que los usuarios tengan que desplazarse lejos de su lugar de origen (González   et al., 2016).     A  finales  del  2023  y  durante  el  2024,  se  evi denció  el   desabastecimiento  de   medicamentos de salud mental,  una  situación denunciada por las agremiaciones científicas   de psiquiatría y neurología.  Aunque existe   una escasez general de medicamentos para todo   tipo de enfermedades, las medicinas  utilizadas   los tratamientos psiquiátricos y neurológicos   son  necesarios  para  evitar   un  colapso  en  los  servicios  de  salud  mental  por   descompensaci ones   patológicas   y   para  mejorar la   calidad de vida de los pacientes.     Como      parte  de  la  respuesta  articulada  del  Gobierno     nacional  a  la  emergencia  por  la   pandemia  de  covid - 19 ,     se  habilitó  la  línea  192  para  orientar  a  la     ciudadanía    sobre  la   prevención,  atención  y  demás  situaciones  relacionadas  en  todo  el  país.  Su  operación   comenzó  en abril de   2020 con atención 24/7 y ,   desde noviembre de 2022 ,   se implementó   la  línea  nacional  106  de  salud  mental,  gestionada  por  el    MSPS ,  que  se  desplegó  a  las   entidades territoriales para que la implementaran en sus áreas de influencia. En Colombia,   las líneas de teleorientación forman par te de las estrategias de   APS , pues en algunos casos   representan     el  primer  paso  para  el    acceder     a  niveles  de  atención  en  salud  de  mayor   complejidad y a otros programas y servicios ,   en el marco del cuidado integral de la salud             4.4   Análisis de la situación en  salud    Los trastornos mentales representan una carga significativa para la salud pública en el   contexto  global,    afectando     a  cerca  de  mil  millones  de  personas,  según  la  Organización   Mundial de la Salud (OMS). Entre los trastornos más prevalentes se encuentran la ansiedad   y  la  depresión,  cuyas  tasas  aumentaron  notablemente  durante  la  pandemia  de  covid - 19.   Otros  trastornos,  com o  el  bipolar,  el  estrés  postraumático  y  la  esquizofrenia,  también   impactan a millones de personas globalmente. La OMS (2022) destaca la necesidad urgente  \n51                    de  abordar  estos  trastornos  mediante  estrategias  efectivas  de  promoción,  prevención  y   tratamiento.     De  acuerdo  con  el    Atlas  de  salud  mental  de  las  Américas     (2020),  la  inversión  en  salud   mental en el continente americano sigue siendo insuficiente. La Organización Panamericana   de la Salud (OPS ,  2021)  enfatiza en   la necesidad de intensificar los esfuerzos p ara trasladar   los  servicios  a  la  comunidad  y  mejorar  su  integración  en  los  servicios  primarios  de  salud,   fortaleciendo así la atención y el apoyo a las personas afectadas por trastornos mentales.     Además, el incremento esperado en los casos de  A lzh e imer y  otras demencias para 2030   resalta   la urgencia de  reforzar   las estrategias de salud pública que aborden el diagnóstico   temprano, tratamiento y apoyo a los pacientes y sus familias.     En  Colombia,  el  Ministerio  de  Salud  y  Protección  Social  utiliza  el  ASIS  par a  guiar  las   políticas  públicas,  incluyendo  la  salud  mental .  Este  análisis,   identifica   los   desafíos  y   desigualdades en salud influenciad os   por factores sociales. Por otr o   lado , los trastornos de   la  conducta  alimentaria     (TCA)     han  venido  aumentando  su  prevalencia  después  de  la   pandemia, sobre todo en poblaciones vulnerables como los NNAJ y las mujeres . P revenir,   detectar y tratar de manera temprana mejora los resultados de este grupo.    El  documento  completo  del        Análisis  de  Situ ación  de  la  Salud  Mental  con  Énfasis  en   Determinantes Sociales. Colombia, 2024 (MSPS, 2024) ,   ofrece   un marco detallado que guía   las  estrategias  y  acciones  para  mejorar  la  salud  mental  en  Colombia.    En  ese  sentido,   proporciona     evidencia  efectiva  y  oportuna  p ara  orientar  la  actualización  de  la  política   pública  de  salud  mental,    con  el  objetivo  de    mejorar  la  calidad  de  vida  de  la  población   colombiana y fortalecer el tejido social.  Al integrar los   elementos del análisis epidemiológico   y     la  desigualdad  en  salud  me ntal,    se  convierte     en  una  herramienta  fundamental  para  los   procesos  de  planeación,    gestión     y  toma  de  decisiones  en  salud  mental,  adaptadas  a  las   necesidades  específicas  de  la  población  y  las  regiones.    Además,  su     acceso  facilita  una   comprensión profunda de los desafíos y oportunidades en salud mental y de las medidas   propuestas para enfrentarlos  de manera efectiva .    A  continuación,  se    presentan     las  principales  afectaciones  con  mayor  impacto  en  salud   mental:        Consu mo de  Sustancias Psicoactivas ( SPA )      Entre 2019 y 2023 se diagnosticaron  375.570   casos de trastornos debidos al consumo de   SPA; de estos, el 73 ,4   %   de los casos ocurrió en hombres, quienes mostraron más del doble   de riesgo de padecer estos problemas frente a las mujeres (IRR = 2,89; IC95   % : 2,79 - 2,99).   La tasa nacional varió de 179, 9   casos por 100.000 habitantes a 16 4 , 8   entre el 2019 y el 2023.   Por q uinquenios de edad, el mayor porcentaje de casos se presentó entre los 15 y 34 años   (63   % ); la tasa más alta para el 2023 se dio en el grupo de 15 a 19 años (3 92   por 100.000   habitantes), seguida por el grupo de 20 a 24 años (3 30   por 100.000 habitantes).   \n52                       Depresión y ansiedad      Entre  2019  y  2023  se  registraron    1.186.547     casos  de  depresión  en  Colombia,  con  un   predominio del 72   % en mujeres, quienes presentaron más del doble de riesgo de padecer   depresión en comparación con los hombres (IRR = 2,30; IC95   %   = 2, 23 - 2,36). La tasa nacional   muestra una tendencia  muy leve  a la reducción, con un cambio de 5 42,8   a  474,1   casos por   100.000 habitantes.  Por quinquenios  de  edad ,     se    halló     que el  mayor  porcentaje  de  casos   estuvo entre los 15 y 29 años (3 1   %),  el  grupo  de 15 a 19 años  tuvo una tasa de 7 84   casos   por  100.000  habitantes     en  el  2023 .  En  cuanto  al  comportamiento  en  población  con   autorreconocimiento étnico,  los indígenas tuvieron  en 2023  una tasa de 66,1 casos por cada   100.000 habitantes  frente  a  una tasa de    19,9 por  cada  100.000  habitantes  en  los  negros,   mula t os y afrocolombianos.    Con  2.281.871   diagnósticos, los trastornos de ansiedad aumentaron su prevalencia en el   periodo citado (2019 - 2023). Las mujeres representaron el 69   %   de estos casos y mostraron   el do ble de riesgo de padecer ansiedad comparadas con los hombres (IRR = 2,02; IC95   % :   1,98 - 2,06).  La  tasa  nacional  muestra  una  tendencia  en  aumento,  con  un  incremento  de   74 8,5   casos por 100.000 habitantes a  1122 . Por quinquenios de edad, los grupos entre los   1 5  y  24  años  y  de  50  a  59  años  presentan  los  porcentajes  más  altos  de  personas  con   diagnóstico de ansiedad (19   % y 1 6   %, respectivamente); para el 2023 ,   la tasa más alta se   dio  en  el  grupo  de  15  a 19  años,  con 1. 569     casos  por  100.000  habitantes.  Por  último,    las   tasas en  la  en población  con  autorreconocimiento  étnico  muestran     un  predominio    en  los   pueblos  indígenas,  que   para  el  2023   tuvieron  una  tasa  de  120,4  por  cada  100.000   habitantes, frente a una tasa de 63 por cad a 100.000 habitantes   en los negros, mulatos y   afrocolombianos.       Conducta suicida      Entre el 201 9   y el 202 3 , la tasa nacional de intento de suicidio se incrementó de 5 7 , 5   a   71,3   por 100.000 habitantes. Durante este periodo, de los  151.158   eventos   registrados, el   64 ,4     %     de  los  intentos  los    cometieron     las  mujeres,  quienes  presentaron  un  79 %     más  de   riesgo  de  intentar  suicidarse  que  los  hombres  (IRR  =  1,79;  IC95     %     =  1,73 - 1,86).  Por   quinquenios de edad, entre los 10 y 29 años se registraron la gran may oría de los intentos   de  suicidio  (     72,9     % ).  Finalmente,  por  grupos de autorreconocimiento  étnico  se  encontró   que    los  pueblos  indígenas  tuvieron  para  el  2023  una  tasa  de    14,4  por  cada  100.000   habitantes, frente a una tasa de 2,9 en negros, mulatos y afrocol ombianos .    En  este  mismo  periodo  de  análisis ,   se  registraron  16211   casos  por  lesiones  o   envenenamientos  autoinfligidos  (suicidio);  de  estos,  el    79,5     %     correspondió  a  hombres,   quienes presentan casi tres veces más riesgo de morir por esta causa, en comparación con   las  mujeres  (IRR  =  2,8 3 ;  IC95     %     =  2,7 0 - 2,96 ).  La  tasa  nacional  de  mortalidad  por  suicidio ,  \n53                    ajustada por sexo y por edad,   varió de 6 ,36   a 5,9 9   por 100.000 habitantes   en este mismo   periodo de tiempo , lo que muestra que no se ha logrado una reducción significativa en los   últimos cinco años del evento adverso más grave en salud mental. Por quinquenios de edad,   los  mayores  porcentajes  de  casos  se  re portaron  en  adolescentes  y  jóvenes,  desde  los  15   hasta los  34   años ( 47   % ); al revisar las tasas, los grupos con tasas de suicidio más altas fueron   los  adolescentes  y  jóvenes  entre  15  y  29  años ,     y  las  personas  mayores  de  70  años.  En  la   población con autorre conocimiento étnico,  se encontró una tasa de 2,8 por cada 100.000   habitantes  en  los  indígenas  durante  el  2023,  frente  a  una  tasa  de  0,8  por  cada  100.000   habitantes en negros, mulatos y  afrcolombianos .          Figura 3.  Tasas de eventos trazadores en salud  mental. Colombia, 2019 - 2023          Fuente : Elaborado con datos del RIPS, Sivigila y EE.VV. Consultados en Sispro en  octubre   de 2024.        Trastornos de la conducta alimentaria   (TCA)    De  los    71.861     casos  registrados  en  el  periodo     de  2019  a  2023 ,  el  6 3,2 %     ocurrió     en   mujeres,  quienes  evidenciaron  tener  59   %   más  riesgo  de  padecer  estos  trastornos   comparadas con los hombres (I   IRR = 1,59; IC95% = 1,49 - 1,69 ). Los territorios con mayores   tasas durante el periodo fueron Boyacá, Santander, Bogotá, D.C., Bolívar    Sucre, B olívar, La  \n54                    Guajira y Valle del Cauca ; de estos, Boyacá muestra una tendencia importante al aumento,   pues su tasa varió de 9 a 4 8   casos por 100.000 habitantes. En las cabeceras municipales se   presentaron la mayor parte de los casos (89   % ), evidenciándose un   riesgo 97   %   mayor en   quienes viven allí (IRR=1,97; IC95   % : 1,86 - 2,08).  A l revisar los casos por grupos étnicos ,   se   encontró  un  comportamiento  variable  en  las  comunidades  indígenas,  que  presentan  el   mayor número de casos durante todo el periodo.    Adicionalmente,  se  describen  algunos  determinantes  que  son    relevantes  en  salud   mental:    Violencias      Según  el informe    Forensis  202 3 ,  la  violencia interpersonal  en    en  el  2023   representó  el   4 2,9   %   de los casos, con  89.668   incidentes. La violencia de pareja ocupó el segundo lugar   con  20,4   %   ( 42.689   casos), seguida de las lesiones no fatales por eventos de transporte con   1 4,1   %   ( 29.495   casos).     De los  89.668   casos   de violencia interpersonal , el 67   %   involucró a hombres . De forma   similar, e n  el  año  202 3 ,  se  registraron    14.027  de  presuntos     homicidios  ( 26,9     por  cada   100.000 habitantes);  donde  el 9 3   %   de las víctimas fueron hombres . .     La violencia intrafamiliar aumentó entre 2021 y 2022. La violencia contra menores fue la   más alta, con un incremento de 36,0 a 43,4 por 100.000 habitantes. En el año 2022, hubo   20.541 casos de violencia intrafamiliar (116,3 por cada 100.000 habitantes); el 59   %   de estos   fueron contra mujeres (46,2 por cada 100.000 mujeres) y el 41   %   contra hom bres (33 por   cada 100.000 hombres). El 30   %   de los casos involucró a menores de edad.     La  violencia  de  pareja  aumentó  un  20     %     entre  2021  y  2022.  En    este  último  año     hubo   41.935 casos, de los cuales el 87   %   fueron contra mujeres (160,2 por cada 100.000 mujeres)   y el 13   %   contra hombres (26,3 por cada 100.000 hombres).      En relación con la violencia del conflicto armado vigente, de acuerdo con el Instituto de   Estudios para el Desarrollo y la Paz (Indepaz) (202 4), en el año 2023 hubo 94 masacres, 188   líderes y 44 firmantes de paz asesinados. Y en lo que va del 2024 van 14 masacres, 36 líderes   y  9  firmantes  de  paz  asesinados.  Según  el  informe  de  2023  de  la  Defensoría,  el   desplazamiento forzado es uno de los fenóm enos que más rápidamente han crecido entre   2022  y  2023.  En  2023,  en  Nariño,  se  presentaron  58  incidentes  que  afectaron  a  cerca  de   24.000 personas, y el año pasado se reportaron 215 casos de confinamiento que impactaron   a más de 18.000 familias. Esto repres enta un aumento del 63   %   en comparación con 2022,   cuando se registraron 132 confinamientos. Además, la Oficina del Alto Comisionado para la   Paz de la ONU ha examinado 11 reglamentos de conducta establecidos por grupos armados   no estatales en comunidades de   los departamentos de Antioquia, Arauca, Caquetá, Cauca,   Guaviare,  Huila,  Meta,  Valle  del  Cauca,  Tolima  y  Nariño.  Estos  reglamentos  contienen   directrices de control social que restringen derechos y buscan someter a la población civil   al control de  dichos   g rupos armados.   \n55                      En materia de hechos relacionados con desplazamientos forzados y confinamientos, la   Defensoría  del  Pueblo  (2024)  ha  reportado  que,  con  corte  a  mayo  del  año  2024,  se   presentaron 41 desplazamientos masivos, que generaron 13.588 víctimas de es tos hechos   en el contexto  del conflicto armado vigente (5 374 familias) y 33 confinamientos colectivos.   Los departamentos más afectados fueron Nariño, Cauca, Antioquia, Valle del Cauca, Chocó,   Caquetá y Bolívar. Las cifras no solo dan cuenta de los eventos  que precipitan necesidades   en  materia  de  salud  mental,  continuidad  del  conflicto  tanto  de  las  víctimas  como  de  las   personas en procesos de reincorporación a la vida civil, sino también anticipan la realidad   de unos sucesos que  siguen   acrecentando el Regist ro Único de Víctimas y, en consecuencia,   las demandas en materia de estabilización psicosocial y rehabilitación de la salud mental.        5.   Marco estratégico       5.1   Objetivos       Objetivo general      Garantizar  la  salud  mental  individual ,  familiar     y  colectiva  como  un  derecho  humano   universal,  a  través  de  ejes  estratégicos  y  transversales  que  integren  elementos   transectoriales    por medio de l a Atención Primaria en Salud (APS) y la    R ed Mixta en Salud   Mental Nacional y Territorial  que incidan en los de terminantes sociales de la salud mental   por  entornos  de  desarrollo  y  curso  de  vida,  incorporando  los  enfoques  poblacional,   interseccional y territorial.    Objetivos específicos      ●   Contribuir  al  desarrollo  de  oportunidades  y  capacidades  en  la  población  para   establecer  entornos  favorables  que  promuevan  la  salud  mental,  el  bienestar   emocional  y  el  fortalecimiento  de  las  potencialidades  individuales,  familiares,   comunitarias  y  colectivas,  favoreciendo  la  convivencia  y  el  desarrollo  humano  y   social.    ●   Prevenir  prob lemas  y  trastornos  mentales,  del  comportamiento  y   neuropsiquiátricos, el consumo de SPA, el suicidio, diversas formas de violencia, el   estigma y la discriminación, a través de acciones intersectoriales y transectoriales.     ●   Fortalecer la atención en salud me ntal ampliando la oferta de servicios y programas,   en  coordinación  con  la  atención  primaria  y  redes  integrales  e  integradas,  para   garantizar un acceso oportuno, equitativo y adecuado, y prevenir la cronificación.    ●     Implementar  acciones  de  rehabilitación  int egral  y  la  inclusión  social  de  todas  las   personas,  con  un  enfoque  especial  en  aquellos  con  discapacidad  psicosocial,   mediante  la  implementación  de  acciones  intersectoriales  que  fortalezcan  sus   capacidades,  derechos  y  participación  activa  en  la  comunidad,  c ontribuyendo  a  la  \n56                    construcción  de  entornos  inclusivos  y  equitativos  para  todos. Facilitar  la  gestión   integral de los procesos sectoriales, intersectoriales y transectoriales, para mejorar   la  capacidad  de  respuesta  institucional  y  comunitaria  a  través     de     la    Red  Mixta   Nacional y Territorial de Salud Mental.         5.2   Ejes estratégicos       La  actualización  de  la  Política  Nacional  de  Salud  Mental  (PNSM)  mantiene  los  ejes   fundamentales  de  promoción,  prevención,  atención,  rehabilitación,  intersectorialidad  y   evaluación.  Estos ejes se enriquecen con nuevos elementos establecidos en la Ley 2294 de   2023  y  el  Plan  Nacional  de  Desarrollo  (PND)  2022 - 2026,  así  como  en  las  contribuciones   obtenidas  a  través  de  los  encuentros  de  participación.  Además,  incorpora  componentes   transver sales que abordan servicios comunitarios, entornos de desarrollo y el curso de vida,   adoptando enfoques poblacional
