es, interseccionales y territoriales.    Esta apuesta tiene como objetivo garantizar el derecho humano a la salud mental como   un componente inte gral del derecho fundamental a la salud.  Por medio   de una perspectiva   inclusiva, se orientan las acciones sectoriales, intersectoriales, sociales y comunitarias, sin   distinción de nacionalidad o estatus migratorio. Los enfoques adoptados buscan reflejar la s   realidades  diversas  de  la  población,  promoviendo  la  participación  armónica  de  todos  los   actores del territorio para asegurar la plena garantía del derecho a la salud mental.    La  PNSM  promueve  la  cobertura  universal  de  salud,  lo  cual  implica  que  todas  las   personas,  familias  y  comunidades  tengan  acceso,  sin  discriminación  alguna,  a  servicios   integrales,  adecuados,  oportunos,  continuos  y  de  calidad,  según  las  necesidades   particulares de cada población, bajo el principio de igualdad y no discriminación.    Los  ej es  estratégicos  se  desarrollarán  a  través  de  componentes  específicos,  los  cuales   constituyen  herramientas  clave s     para  incidir  en  los  determinantes  sociales  de  la  salud en   cada  territorio;  estos  componentes  permitirán  implementar  los  enfoques  territoriales    y   poblacionales, orientando la acción hacia resultados concretos y medibles. Posteriormente,   se  presentan  las  estrategias  transversales  como  líneas  técnicas  que  promueven  la   implementación  de  actividades  en  salud  mental  de  manera  integrada,  asegurando  la   c oherencia y efectividad en su ejecución en  los   ámbito s   nacional, regional y local.       Figura 4.   Marco general de actualización de la PNSM   \n57                       Fuente : Elaboración propia.       El  plan  de  acción  derivado  de  esta  Política  se  construirá  mediante  la  articulación  de   esfuerzos  entre diversas  entidades  y  actores  clave 7 , quienes  serán    fundamentales para  la   ejecución de los objetivos de la Política Nacional de Salud Mental, alineados con los ejes y   componentes  establecidos.  Esta  actualización  se  sustenta  en  los  diagnóstic os  técnicos   realizados y los aportes obtenidos a través de los espacios participativos, que han permitido   identificar  las  necesidades  prioritarias  y  orientar  el  diseño  de  estrategias  efectivas.  Su   desarrollo se enfocará en trazar acciones concretas para su   implementación, asegurando la   colaboración  entre  los  actores  involucrados  y  promoviendo  una  atención  inclusiva  de  las   poblaciones más vulnerables.        5.2.1 Eje 1. Promoción de la salud mental     Este eje se orienta a promover acciones y procesos  transformadores que capaciten a las   personas  y  comunidades  para  identificar,  gestionar  y  utilizar  los recursos necesarios para   adoptar y mantener estilos de vida saludables que favorezcan su salud mental y bienestar                                                                   7   Especialmente, el Ministerio de Salud y Protección Social, el Ministerio de Educación, Ministerio de Trabajo,   Ministerio  de  Tecnologías  de  la  Información  y  Comunicaciones,  Ministerio  de  las  Culturas,  Ministerio  de  la   Igualdad y la Equidad, Ministerio del  Interior, Ministerio de Justicia, el Ministerio del Deporte, Ministerio de   Ambiente  y  Desarrollo  Sostenible,  Ministerio  de  Agricultura,  Ministerio  de  Relaciones  Exteriores,  Instituto   Colombiano de Bienestar Familiar, Departamento de Prosperidad Social, Dep artamento Administrativo de la   Función Pública, la Superintendencia Nacional de Salud o quien haga sus veces.   \n58                    psicosocial. Se enfoca en mitigar el imp acto de las enfermedades crónicas no transmisibles   y en promover la salud mental mediante estrategias integrales.    Las  acciones  derivadas  consideran  los  contextos  social,  ambiental  y  cultural  de  las   personas, destacando la participación social y la apropiac ión comunitaria como elementos   fundamentales  para  fomentar  un  cambio  desde  las  realidades  locales.  El  propósito  es   generar condiciones que favorezcan la toma autónoma de decisiones en torno a la salud,   contribuyendo así a la construcción de comunidades sól idas y resilientes.    Estas  acciones  son  transversales  e  intersectoriales,  y  se  apoyan  en  estrategias   pedagógicas  dirigidas  a  las  personas,  promoviendo  el  ejercicio  de  sus  derechos  y  la   modificación de las condiciones ambientales, económicas y sociales. El o bjetivo es permitir   un  desarrollo  psicosocial  óptimo  y,  por  ende,  alcanzar  una  salud  mental  adecuada  que   facilite el afrontamiento de los desafíos a lo largo de las trayectorias de vida. Esto debe ir   acompañado de relaciones significativas que fortalezcan  un tejido comunitario basado en   la equidad, la dignidad y la justicia para todos.    Lo  anterior  implica  comprender  la  salud  mental  como  un  proceso  histórico,  dinámico,   psicosocial y contextual, que involucra la capacidad de agencia de las personas, el tejido   de   relaciones humanas construidas y el conjunto de potencialidades individuales y colectivas.   Estas se desarrollan cuando las personas eligen, de manera libre y consciente, relacionarse   con otras en diversos ámbitos sociales.    Alcance:   Contribuir a la transformación social de las comunidades, promoviendo que las   personas ejerzan mayor control sobre su salud y los factores que la determinan, al tiempo   que  desarrollan  herramientas  que  fortalezcan  sus  capacidades  de  afrontamiento  y   compete ncias  socioemocionales  en  los  ámbitos  individual,  familiar  y  comunitario.  Se   pretende  que  la  salud  mental  sea  valorada  y  priorizada,  generando  entornos  protectores   que  favorezcan  el  bienestar  psicosocial  y  contribuyan  a  reducir  el  estigma  y  las   desigualdad es en salud mental.       Componentes     5.2.1.1   Entornos resilientes, saludables y protectores que promuevan estilos de vida   saludables.  Contempla acciones dirigidas a la construcción de entornos seguros   en la vida cotidiana (hogar, educación, comunidad, medio ambiente,   trabajo e   instituciones),  que  promuevan  la  participación  y  el  sentido  de  pertenencia   colectivo, asegurando el cuidado y el bienestar de la población. Se promueven   estrategias que impactan positivamente la salud mental y la calidad de vida de   las  personas,     fomentando  estilos  de  vida  saludables,  la  creación  de  vínculos   seguros  y  el  desarrollo  de  habilidades  para  la  vida  y  competencias   socioemocionales.  Lo  anterior  fortalece  las  redes  de  apoyo  social,  los  lazos  \n59                    comunitarios,  la  cohesión  del  tejido  social  y  lo s  vínculos  solidarios  para  el   cuidado colectivo.     El Gobierno Nacional en coordinación con los actores del sector salud y los entes   territoriales, impulsará acciones para fomentar entornos resilientes, saludables   y  protectores,  que  promuevan  estilos  de  vid a  saludables,  en  el  marco  de  sus   competencias.     5.2.1.2   Redes de información y comunicación en salud mental.  Se orienta a empoderar   a las personas y a las comunidades para que interactúen de manera positiva en   los  medios  de  comunicación  y  en  medios  digitales,  proporcionando   herramientas  que  les  permitan  gestionar  manera  pertinente  el  consumo  de   información.  Se  ha ce  énfasis  en  la  salud  digital,  promoviendo  el  uso  seguro  y   responsable de la información en salud mental. Estas estrategias contribuirán a   reducir el estigma, el autoestigma y la discriminación en torno a la salud mental,   con  un  enfoque  interseccional  y  d e  derechos,  con  énfasis  en  poblaciones   diferenciales.     Las  entidades  del  nivel  nacional  y  territorial,  con  la  orientación  técnica  del   Ministerio  de  Salud  y  Protección  Social  y  de  las demás  entidades  competentes,   generarán estrategias de información y comun icación para el cuidado de la salud   mental,  reducción  del  estigma  y  autoestigma  asociado  a  la  salud  mental,  así   como  el  consumo  seguro  y  responsable  de  la  información.  Estas  estrategias   también deberán ser implementadas al interior de las entidades pública s, con el   fin de promover la salud mental y prevenir trastornos mentales en personal de   planta y contratistas.    5.2.1.3   Reconocimiento de la interculturalidad como factor protector en salud mental.   Destaca la valoración positiva de las características, valores, tra diciones y formas   de vida propias de diversas comunidades, tales como las urbanas, campesinas,   barriales,  tradicionales  y  ancestrales.  Esto  incluye  el  reconocimiento  de  sus   saberes  y  conocimientos,  asegurando  que  las  intervenciones  propuestas   refuercen  los     factores  protectores  en  la  salud  mental  de  individuos,  familias  y   comunidades. Fomenta el fortalecimiento del tejido social a través de un diálogo   de  saberes  que  integra  la  espiritualidad,  usos  y  costumbres  de  los  pueblos  y   comunidades étnicas, promoviend o el cuidado de las armonías espirituales y el   buen vivir.    El Gobierno Nacional impulsará acciones de promoción de la salud mental junto   a las comunidades en sus diversos contextos, integrando un enfoque intercultural   que  valore  y  reconozca  sus  prácticas  propias  de  cuidado  y  autocuidado.  En   respeto al principio de   autonomía, se fomentará que la implementación de estas  \n60                    prácticas  sea  liderada  por  talento  humano  proveniente  de  las  mismas   comunidades.       5.2.2 Eje 2. Prevención de problemas, trastornos de la salud mental y epilepsia    Agrupa todas aquellas acciones dirigid as a anticipar, prevenir y/o reducir la presencia de   factores de riesgo asociados a problemas o trastornos de la salud mental, con el objetivo de   mitigar su progresión, reducir sus consecuencias y fortalecer el control sobre su salud y sus   determinantes. S e enfoca en transformar conductas de riesgo y factores que inciden en la   aparición de enfermedades de orden biológico y psicosocial que afectan personas, familias   y comunidades en todos los entornos de vida cotidiana.     Los siguientes aspectos de la  prevención tienen un fin organizativo, permitiendo focalizar   las acciones e intervenciones según el nivel de riesgo identificado para evitar o disminuir la   carga de enfermedad en salud mental:    ●   Prevención primaria:   Evitar la aparición de nuevos casos de problemas y trastornos   de  salud  mental,  epilepsia,  trastornos  del  neurodesarrollo  y  trastornos   neuropsiquiátricos, entre otros. Se enfoca en identificar y reducir factores de riesgo   mediante medidas orientadas a evit ar la aparición de enfermedades, controlando los   factores  predisponentes,  desencadenantes,  precipitantes  y  detonantes  en  la   aparición  de  problemas  mentales  y  del  comportamiento,  trastornos  mentales,   epilepsia, y trastornos del neurodesarrollo y neuropsiqui átricos ,   entre otros.     ●   Prevención  secundaria:   Detener  el  avance  de  la  enfermedad  mediante  la   identificación  temprana  y  la  detección  oportuna  de  los  problemas  y  trastornos  de   salud  mental.  Se  busca  iniciar  intervenciones  o  tratamientos  que  impidan  la   progre sión y/o cronicidad de la enfermedad, evitando complicaciones posteriores.    ●   Prevención  terciaria:     Atenuar  las  secuelas  de  la  enfermedad,  minimizando  sus   consecuencias  en  las  actividades  básicas  diarias  de  las  personas  afectadas,  sus   familias  y  su  entorno.  P romueve  la  rehabilitación,  la  reintegración  social  en  la   comunidad y la mejora de la calidad de vida.     ●   Prevención cuaternaria:   Se basa en el principio bioético de la no maleficencia. Busca   promover el uso racional de medicamentos y otras tecnologías, así c omo evitar los   efectos adversos derivados del empleo excesivo de psicofármacos, el uso de medidas   restrictivas innecesarias y la aplicación de psicoterapias no avaladas por la evidencia   científica.  También  tiene  como  fin  reducir  la  estigmatización  asociada   a  los   problemas  de  salud  mental,  epilepsia  y  otros  trastornos  neuropsiquiátricos,   promoviendo una atención humanizada en salud mental.    Alcance:     Gestionar  el  riesgo  de  aparición  de  enfermedades  mentales  en  individuos,   familias y comunidades, a través de un   enfoque integral que incluya diagnóstico temprano,   tratamiento oportuno y la prevención de secuelas. Implica la orientación hacia procesos de  \n61                    rehabilitación  adecuados  y  la  prevención  de  complicaciones  derivadas  de  la  pérdida  de   salud mental y otros trasto rnos. Las acciones se llevarán a cabo en los distintos niveles de   intervención,  de  forma  coordinada  con  los  actores  locales,  garantizando  una  respuesta   articulada y efectiva en todo el territorio.        Componentes    5.2.2.1   P revención  de  problemas  y  trastornos  de  la  salud  mental  con  base   comunitaria.  Consiste en   el fortalecimiento de habilidades y conocimientos en   las comunidades, facilitando el reconocimiento de los trastornos mentales y la   prevención  de  violencias,  consumo  d e  sustancias  psicoactivas  y  conducta   suicida.  Para  ello,  se  ofrece  capacitación  en  temas  como  primeros  auxilios   psicológicos,  intervención  en  crisis  y  detección  temprana,  lo  cual  posibilita   activar de manera oportuna la ruta de salud mental en el territori o a través de   la articulación sectorial e intersectorial.    Además,  se  considera  la  integración  con  la  Atención  Primaria  en  Salud  (APS),   atención complementaria y las intervenciones de salud pública, involucrando a   otros  actores  del  territorio,  permitiendo    focalizar  acciones  para  disminuir  la   incidencia  de  enfermedades  mentales,  adoptando  un  enfoque  diferencial,   intercultural y basado en derechos, ajustado a las condiciones poblacionales del   territorio .      El Ministerio de Salud y Protección Social, con insumo s del Observatorio Nacional   de  Salud  Mental  y  en  coordinación  con  entidades  del  ámbito  nacional  y   departamental, orientará acciones de prevención de los problemas y trastornos   de salud mental.    Las entidades territoriales, en colaboración con actores  comunitarios, sociales e   institucionales,  habilitarán  y  fortalecerán  centros  de  atención  comunitaria,   concebidos  como  nodos  estratégicos  para  la  prevención  integral  de  trastornos   relacionados  con  la  salud  mental.  Estos  centros  priorizarán  la  atención  a  la   conducta  suicida,  el  consumo  de  sustancias  psicoactivas  (SPA)  y  las  violencias,   adoptando  enfoques  participativos  que  empoderen  a  las  comunidades  para   liderar  acciones  preventivas.  Además,  activarán  mecanismos  del  sector  salud   para  una  atención  adecuada  en     salud  mental  y  promoverán  estrategias  de   prevención y detección temprana, con énfasis en zonas de alta vulnerabilidad.    Igualmente,  e n  articulación  con  el  Ministerio  de  Salud     y  Protección  Social ,  las   entidades  territoriales  implementarán  programas  permanen tes  de  formación   dirigidos  tanto  a  actores  del  sector  salud  como  a  otros  sectores  relacionados.   Estas  capacitaciones,  fundamentadas  en  el  modelo  de  Atención  Primaria  en   Salud  (APS),  abordarán  contenidos  esenciales  para  la  prevención,  atención  y  \n62                    rehabilitac ión en salud mental. Se garantizará que los equipos de trabajo estén   preparados  para  responder  de  manera  oportuna,  con  un  enfoque  integral  y   diferenciado,  que  se  ajuste  a  las  particularidades  de  los  diversos  contextos   territoriales del país.    5.2.2.2   Detección temp rana de problemas y trastornos en salud mental.  Está orientado   a la identificación temprana de problemas y trastornos mentales, con el objetivo   de detectar signos de enfermedad en personas, familias y comunidades. A través   de  acciones  intramurales  y  extram urales,  se  busca  facilitar  el  diagnóstico  y   tratamiento  oportuno,  así  como  el  acceso  a  herramientas  de  cuidado  y   autocuidado en todos los cursos de vida.    Por otro lado, se contempla la formación y capacitación del talento humano en   salud  para  la  detección    temprana  y  valoración  de  trastornos,  mediante  el   programa  de    a tención    p rimaria  en    s alud  (APS),  contribuyendo  a  reducir  las   brechas de atención en salud mental en Colombia (mhGAP). Para este propósito   se creará la figura de gestores comunitarios de salud  mental a nivel nacional.    Esta estrategia se implementará en diversos entornos de vida cotidiana, con un   énfasis particular en poblaciones diferenciales y en niños, niñas, adolescentes y   jóvenes (NNAJ).    El  Gobierno  Nacional  diseñará,  implementará  y  fortalec erá  acciones  de   prevención de los efectos en salud mental a causa de la violencia escolar, laboral,   social o de género.      El  Ministerio  de  Salud  y  Protección  Social,  e n  colaboración  con  colegios  y   asociaciones  gremiales  del  sector  salud,    apoya rá     la     actualiz ación  de     guías  y   protocolos  para  la  detección  temprana  de  problemas  y  trastornos    en  salud   mental .  Estas  herramientas  incluirán  estrategias  específicas  para  abordar  la   conducta  suicida,  el  consumo  de  sustancias  psicoactivas  y  las  violencias,   garanti zando su aplicabilidad en diferentes contextos.    Adicionalmente,    se    adoptarán  o  adaptarán  lineamientos  específicos  en  salud   mental para la población  de la fuerza pública , asegurando un enfoque acorde a   sus necesidades y riesgos particulares.    El    Ministerio  de  Salud    y Protección  Social    coordinará     con  los  ac tores    del sector   salud   (incluida  Red Mixta Nacional y Territorial en Salud Mental. ) ,   la integración   de    guías  de  detección  temprana  de  casos  de  salud  mental  que  se  aplicarán  a   todos los servicios  de salud en el país .    5.2.2.3   Prevención  de  problemas,  trastornos  mentales  y  c onsumo  de  s ustancias   p sicoactivas.   Contempla acciones preventivas ,   dirigidas a evitar la aparición de   problemas  psicosociales,  mediante  el  control  de  factores  causales,   predisponentes, desencadenantes y detonantes de enfermedades mentales en  \n63                    individuos, familias y comunidades. A su vez, se enfocará en la caracterización   de la población para promover la prevención a nivel comunitario, articulada con   la    a tención    p rimaria  en    s alud  (APS)  para  ofrecer  atención  oportuna  mediante   diferentes  estrategias  resolutivas.  Entre  las  acciones  clave s ,  se  destacan  el   fortalecimiento  de  la    teleconsulta,  la  asesoría  y  la  orientación,  así  como  el   autoseguimiento de la aparición de síntomas, con el fin de reducir las barreras   en el acceso a la salud mental.      Este  componente   se sustenta en  un modelo predictivo, preventivo y resolutivo,   coordinad o por el Ministerio de Salud   y Protección Social en articulación con las    entidades  territoriales,  quienes  dispondrán  de  los  recursos  necesarios  para   implementar estas acciones en todo el país.    En    consonancia     con  la  Política  Integral  para  la  Prevención  y  Atención  del   Consumo de Sustancias Psicoactivas, se establecerán medidas obligatorias para    que     las  entidades  públicas  garanticen  la  inclusión  de  acciones  de  prevención  y   atención del consumo   de sustancias psic oactivas   (SPA) .     L a  L ínea  Teleorientación   en  S alud  M ental contará con un grupo especializado en   el  manejo  de  consumo  de    SPA     y  problemas  de  conducta,  fortaleciendo  las   capacidades  resolutivas  de  los  servicios  y  su  alcance  a  través  de  plataformas   digitales.    Además, se fomentará la participación de entidades privadas en la habilitación   de líneas y canales digitales para la prevención de problemas de salud mental y   consumo de  SPA , integrándolos como parte del sistema nacional de salud. Este   esfuerzo  tendrá como   objetivo   consolidar  una estrategia inclusiva, sostenible y   efectiva para la promoción de la salud mental.    El Gobierno Nacional priorizará   abordaje comunitario, con especial atención en   la s personas  habitante s   de  la  calle. Lo anterior inclu irá   la construcción de redes   comunitarias  lideradas  por  pares  y  lideres  comunitarios,  con  la  participación   activa    de  la  Red  Mixta     Nacional  y  Territorial  en  Salud  Mental .  Estas  redes   servirán  como  mecanismos  para  la  detección,  seguimiento  e  intervención,   fomen tando  prácticas  de  vida  positivas,  espacios  de  rehabilitación  integral  y   control  epidemiológico  de  enfermedades.  Se  busca rá    garantizar  el  acceso  a   tratamientos  efectivos  y  promover  la  reintegración  social  de  esta  población.   Asimismo, se fortalecerán los pr ocesos de vigilancia y respuesta, generando una   mayor  conciencia  en  las  comunidades  sobre  sus  derechos,  deberes  y   responsabilidades respecto a su salud mental y bienestar.    5.2.2.4   Prevención  de  la  epilepsia  y  otros trastornos neuropsiquiátricos.    La epilepsia   es  una enfermedad cerebral crónica no transmisible . Las   personas que la sufren   suelen  tener  tasas  más  altas  de  problemas  psicosociales  y  de  trastorno s   \n64                    mentales. Aunque no todas las epilepsias son prevenibles, una parte importante   de  ellas  está  asociada  a  even tos  de  lesión  cerebral ,     ya  sea  aguda  o  crónica,   puesto que cualquier situación que genera una cicatriz o lesión cerebral puede   convertirse en un foco generador de epilepsia. Por tal motivo ,   evitar infecciones   cerebrales  en  cualquier  momento  del  curso  de  vi da,     así  como     situaciones  de   hipoxia o bajo oxígeno al momento del parto o en la etapa perinatal, ayuda con   la  mitigación  de  esta.  Con  la  misma  lógica,  prevenir  traumas  craneanos  por   accidentes de  tránsito   u  otros tipos   de golpes en la cabeza evita estas situaciones   de riesgo .      Adicionalmente ,   en  la  medida  en  que  la  población  envejece,  aumenta  la   exposición  a  enfermedades  cardiovasculares  crónicas  que  pueden  genera r    lesiones  acumulativas  sobre  el  cerebro ,     tales  como  diabetes,  hipertensión,   insuficiencia  renal,  arritmias ;   estas  condiciones  favorecen  la  aparición  de   accidentes cerebrovasculares que ,   al generar lesiones ,   propician ta le s epilepsias   secundarias.  Por  otra  parte,  el    hecho  de    no  control ar     estas  en fermedades   crónicas aumenta el riesgo de    causar   demencias, las cuales son enfermedades   que  generan  un  alto  impacto  para  los  cuidadores,  limita n     la  autonomía  de  las   personas  y  tienen  componentes  tanto  neurológicos  como  psiquiátricos  en  sus   síntomas y tratamiento   (Livingston, 2024) .    El    Ministerio  de  Salud  y  Protección  Social,  en  coordinación  con    las  entidades   correspondientes implementará un conjun to de acciones enfocadas en la gestión   oportuna de condiciones que  puedan afectar la salud materno - perinatal y dejar   secuelas neurológicas en neonatos . En este marco, se reforzará   la cobertura del   Plan Ampliado de Inmunización (PAI) y   se establecerán medidas preventivas que   promuevan   el  control  de  enfermedades  crónicas  no  transmisibles,  que   incrementan el riesgo de desarrollar epilepsia y trastornos del neurodesarrollo ,   así  como  la  generación  de     estrategias  que  mitiguen  los  traumas  cra neanos  en   todos los entornos.    Se  hará  énfasis  en  la  c re ación  de  una  política  integral  de  apoyo  a  los/as   cuidadores/as  de  personas  con  enfermedades    neurológicas,     que  contemple  el   reconocimiento  de  su  labor  y  la  provisión  de    beneficios  laborales  y  sociales   adecuados.      El   Gobierno Nacional (en cabeza del Ministerio de Salud y Protección Social y el   Ministerio  de  Educación)   impulsará  la  incorporación  de  contenidos   especializados en enfermedades neurológicas y su impacto en la salud mental en   los  programas  de  f ormación  de  profesionales  de  la  salud.  En  particular,  se   promoverá la inclusión de temas relacionados con la atención humanizada y el   manejo de enfermedades huérfanas, con el objetivo de sensibilizar a futuros /as   \n65                    profesionales de la salud sobre la importancia de brindar una atención integral y   de calidad a pacientes   con trastornos neurológicos y psicosociales , sus familias y   comunidad,    En  este  sentido,    el  Ministerio  de  Salud  y  Protección  Social  llevará  a  cabo  la   a ctualización y fortalecimiento de las políticas y acciones dirigidas a la atención   e intervención en enfermedades neurológicas y huérfanas. Este proceso buscará   mejorar las condiciones de acceso y los estándares de calidad de los servicios de   salud  mental  para  pacientes,  garantizando  que  reciban  un  tratamiento   adecuado y oportuno, y promoviendo la equidad en el acceso a los servicios para   todas las personas, sin importar su situación socioeconómica o geográfica.    El Ministerio de Salud y Protección Social   promoverá  entre los actores del sistema   de  salud     una  estrategia  para  la     prevención  e  identificación  temprana  de  la   epilepsia     primaria,  secundaria,  así  como    otros  trastornos  neurológicos     y  del   neurodesarrollo ,  en  colaboración  con  las  entidades  científicas,  gremiales,   académicas  y  públicas  pertinentes.    Se     buscará  fortalecer  los  mecanismos  de   detección  temprana,  sensibilizar  a  la  población  sobre  los  factores  de  riesgo  y   garantizar que los /as   pacientes reciban un   diagnóstico y tratamiento oportuno.       5.2.3 Eje 3. Atención integral de los problemas y trastornos mentales        Está enfocado en brindar una atención integral e integrada que cubra desde el nivel de   atención  primaria  hasta  el  complementario,  favoreciendo  la  reducción    de  las     brechas  en   salud mental mediante la oportunidad, continuidad y calidad de la atención, adapta das a   las  necesidades  de  las  personas,  familias  y  comunidades.  Se  destaca n     la  organización   estratégica  y  la  complementariedad de  las  acciones de  los  actores del sistema de  salud   y   otros sectores relevantes , con el objetivo de ofrecer una respuesta efectiva   y humanizada   a  las  necesidades  de  la  población  afectada  por  trastornos  mentales,  epilepsia  y  otros   trastornos neuropsiquiátricos.    Alcance:     Contribuir  al  bienestar  individual  y  colectivo  de  la  población  colombiana,  así   como  de  los  extranjeros  y  connacional es,  mediante  una  atención  integral  que  permita   reducir  significativamente  el  impacto  de  los  trastornos    tanto    mentales ,  del  desarrollo,   neurológicos,  y la epilepsia en las personas, familias y comunidades. Se logrará garantizando   el acceso efectivo, oportun o y pertinente a servicios, medicamentos y tecnologías en salud,   eliminando  barreras  y  promoviendo  la  universalidad,  calidad,  seguridad,  equidad  y   eficiencia en la atención. Además, se priorizará una atención humanizada y centrada en el   paciente,  asegurand o  la  continuidad  de  las  estrategias  terapéuticas  y  combatiendo  el   estigma asociado a la enfermedad mental y la discapacidad .      \n66                    Componentes    5.2.3.1   Accesibilidad y continuidad en la atención integral e integrada en salud mental.   Se enfoca en promover acciones que  garanticen la calidad, el acceso oportuno y   la continuidad en la atención   de personas  con  problemas y  trastornos   mentales,   trastornos  del  comportamiento,   del  desarrollo,  consumo  de  sustancias   psicoactivas,   conducta suicida,  demencia,   personas con discapacidad y   epilepsia ,   así  como  en  situación  de  habitabilidad  en  calle,  víctima  del  conflicto  armado,   víctimas  de  violencia  sociopolítica,  violencia  de  género  y  otras  violencia s .  Las   intervenciones  incluyen  diagnóstico,  tratamiento,  rehabi litación,  paliación  y   seguimiento,  tanto  en  servicios  intramur al     como  extramur al ,     con  un  énfasis   comunitario.  Su  objetivo  es  aumentar  la  probabilidad  de  obtener  resultados   positivos  en  salud  a  través  de  un  acceso  pertinente,  efectivo  y  equitativo,   abordando las necesidades de personas, familias y comunidades.    El  Ministerio  de  Salud  y  P rotección  Socia l,  en    coordinación     con  las  entidades   territoriales,  coordinará  la  implementación  de  acciones  integrales  de   rehabilitación,  atención  y  evaluación  para  los  usuarios,  garantizando  un   tratamiento  completo  y coherente  con  los  avances  científicos    en  salud  mental,   adaptado  a  las  necesidades  individuales.  Asimismo,  se  continuará  con  la   implementación de la Estrategia de Prevención de la Conducta Suicida como una   prioridad del Gobierno Nacional, con un enfoque intersectorial que contemple la   diversida d étnica, de género, de curso de vida y de atención diferencial.    Se fomentará la creación de unidades especializadas en la atención urgente de   situaciones relacionadas con la conducta suicida y emergencias, en las entidades   del sector salud, con el fin de  fortalecer la respuesta frente a esta problemática   que afecta a distintos sectores de la población, asegurando un acceso inmediato   y especializado en momentos críticos.    Además,  se  habilitarán  y  fortalecerán  servicios  comunitarios,  tanto  públicos   como  priva dos,  que  ofrezcan  atención  especializada  en  salud  mental,  con  un   énfasis  particular  en  la  atención  extramural  e  intramural.  En    coordinación     con   las entidades territoriales, se establecerán redes de prestadores de servicios de   salud  mental  que  aseguren  la  i ntegración  de  los  distintos  niveles  de  atención,   vinculando estos servicios con otros del sector salud, como los servicios primarios   de atención.    Asimismo,  se impulsará la creación de redes comunitarias que faciliten el acceso   oportuno  a  los  servicios  de    salud  mental,  promoviendo  la  inclusión  social  y   asegurando que todas las personas, en cualquier parte del territorio colombiano,   puedan acceder a servicios adecuados y en tiempo oportuno.   \n67                    5.2.3.2   Oportunidad y pertinencia de la atención integral e integrada en sal ud mental .   Se  refiere  al  desarrollo  de  herramientas  dirigidas  a    que  las  personas  con    personas  con problemas   y trastornos mentales, trastornos del comportamiento,   trastornos del desarrollo, consumo de sustancias psicoactivas, conducta suicida,   demencia,  personas    con  discapacidad ,  situación  de    calle  y     epilepsia ,  así  como   víctimas  de  la  violencia  del  conflicto  arm ado,  de  la  violencia  sociopolítica,  de   género y otras violencias.     5.2.3.3   Las  personas    reciban  atención  integral  basada  en  evidencia,  que  incluya  la   correcta  dispensación  de  medicamentos  y  el  cumplimiento  terapéutico .  La   atención  se  brindará  en  diversos  niveles,    como  ambulatorio,  hospitalización   parcial, intramuros y urgencias, a través de redes integrales e integradas en salud   mental. Se busca guiar a los actores comunitarios y del sector de la salud para   ofrecer una atención humanizada, centrada en las necesidad es biopsicosociales   de cada individuo; además, se priorizará el respeto por los derechos humanos y   se garantizará la interseccionalidad de los enfoques. Del mismo modo ,   articulará   las iniciativas de salud mental de las comunidades étnicas, alineándolas con   los   instrumentos de planeación territorial.    El  Ministerio  de  Salud    y  Protección  Social    establecerá     un  Centro  de  Referencia   Nacional  en  Salud  Mental ,  el  cual  se  integrará  con     los  diferentes  sistemas  de   información  existentes,   con el fin de activar un sistema de monitoreo nacional en   salud mental , apoyado por  centros de referencia satélites en territorio.      En    co ordinación     con  las  entidades  territoriales ,  se  promoverán    acciones    para    garantizar  el  acceso  permanente  a  medicamentos   psiquiátricos  para  las   personas   que lo requieran , especialmente aquellos que enfrentan  barreras  para   acceder a los servicios de   salud.   Asimismo, se asegurará que todos los servicios   hospitalarios  cuenten  con  unidades  de  urgencias  en  salud  mental,  dotadas    de   personal capacitado y suficiente para atender las demandas de la población.    En articulación   con todos los actores del sector salud , se fortalecerá la  creación   e  implementación  de  redes  integrales  e  integradas  en  salud ,  con  el  fin  de   garantizar la dispon ibilidad de s ervicios efectivos, recursos humanos suficientes   y el uso adecuado de tecnologías en la atención.    Se     diseñar á  y  difundirá    una  guía  en  atención  en  salud  mental    dirigida  a     los   actores  comunitarios  del  sector  salud ,  que  orientará  la  prestación  de     servicios,   asegurando  que  se  adapten  a  las  realidades  y  necesidades  específicas  de cada   territorio.       5.2.3.4   Inspección,  vigilancia  y  control  para  la  atención  en  salud  mental     Abarca  actividades  sistemáticas  y  continuas  para  evaluar,  monitorear  y  \n68                    garantizar que  la atención en salud mental cumpla con las normas y estándares   establecidos, asegurando la calidad, eficiencia, continuidad y protección de los   derechos de las personas, familias y comunidades. Este componente , que   debe   ser transversal a todos los ejes ,   busca reducir los efectos negativos en la salud   humana y ambiental mediante la gestión integral del riesgo. Este proceso incluye   la  formulación,  ejecución,  seguimiento  y  evaluación  de  políticas,  planes,   programas y proyectos enfocados  en  el conocimiento y   la reducción del riesgo.       La  Superintendencia  Nacional  de  Salud,  en  coordinación  con  las  entidades   territoriales, el Ministerio de Salud y Protección Social, la Red Mixta y el Centro   de  Referencia  Nacional  en  Salud  Mental,  proporcionará  directrices  para     la   inspección, vigilancia y control de la atención en salud mental a nivel nacional,   departamental, distrital y municipal.       5.2.4 Eje 4. Rehabilitación integral e inclusión social    Establece las bases para la gestión de procesos sectoriales,  intersectoriales y comunitarios   necesarios para promover la integración e inclusión social, el acceso a oportunidades y la   mejora de la calidad de vida de las personas que, desde una perspectiva interseccional, se   encuentran  en  condiciones  de  vida  como  la s     personas  con    problemas  y  trastornos   mentales,  trastornos  del  comportamiento,  trastornos  del  neurodesarrollo,  consumo  d e   sustancias psicoactivas,   conducta suicida, demencia, personas con  discapacidad ,   situación   de calle  y epilepsia , así como víctimas de l conflicto armado , de violencia sociopolítica, de   género  y  otras  violencias.  B usca  reducir,  entre  otros,  el  estigma  y  el  autoestigma ,   promoviendo  la integración temprana en los entornos sociales y los distintos cursos de vida .    Alcance:   Para garantizar la rehabilitación integral e inclusión social de estas poblaciones   es  necesario  posibilitar  el  acceso  real  y  efectivo  a  los  bienes     y     servicios  en  los  diferentes   entornos, permitiendo la participación plena junto con otros ciudadanos, sin l imitaciones o   restricciones  derivadas  de  su  condición.  De  esta  forma,  se    pretende     facilitar  que  las   personas  alcancen  y  mantengan  una  funcionalidad  óptima  en  todas  sus  dimensiones,   promoviendo su autonomía e independencia. Se busca que las personas puedan    construir   y transformar su propia vida, contribuyendo a la creación de comunidades más inclusivas ,    que mejoren la calidad de vida de todos sus miembros.       Componentes    5.2.4.1   Gestión  integral  para  la  articulación  entre  la  atención  primaria  en  salud  y  la   rehabilitac ión  basada  en  la  comunidad.    Se  refiere  a  las  acciones  para  garantizar   una  rehabilitación  efectiva ,  oportuna  y  de  calidad teniendo     en  cuenta  la  realidad   social  de  los  individuos  y  colectivos,  mediante  el  esfuerzo  conjunto  de  todos  los  \n69                    actores  sociales  para  disminuir  barreras.  Permite  articular  los  componentes  de  la   atención  primaria  y  la  rehabilitación  comunitaria  en  salud  mental,  si guiendo  el   modelo de rehabilitación basado en la comunidad (RBC). Se brindará a las personas   una  atención  integral  y  adecuada  a  lo  largo  de  su  curso  de  vida,  considerando  la   interseccionalidad  de  sus  condiciones,  a  través  del  apoyo  de  sus  familias  y   comuni dades,  incluyendo  acciones  intersectoriales  y  transectoriales,  como  la   participación  social,  el  fomento  de  la  autonomía,  el  bienestar  emocional,  la   adaptación de infraestructuras y el seguimiento de la condición de salud de estas   personas.     El  Ministerio  d e  Salud    y  Protección  Social ,  en    coordinación     con  las  entidades   territoriales , establecerá  redes de servicio en salud mental con el fin de  contar con    sectores  de  atención  integral  para  cada  territorio.  Est e  proceso   implica rá   la   identificación de las entidad es  responsables ,  la creación   de las rutas de atención y   la  evaluación  de  las  capacidades  en  la  atención  poblacional  de  los  servicios   habilitados.    5.2.4.2   Ampliación  y  fortalecimiento del modelo de rehabilitación basada en comunidad   para personas víctimas del  conflicto armado.   Comprende estrategias orientadas a   favorecer  la  recuperación  y  a  mitigar  los  daños  psicosociales  y  el  sufrimiento   emocional  generado  a  víctimas  del  conflicto  armado.  Implica  el  monitoreo  y   seguimiento  de  las  estrategias  más  efectivas,  ade más  de  integrar  la  atención  en   salud  mental  dentro  de  la  Política  Nacional  de  Reparación  Integral  y  Derechos   Humanos.     El  Ministerio  de  Salud  y  Protección  Social,  en  coordinación  con  las  entidades  del   Sistema  Integral  para  la  Paz  y  el  Sistema  Integral  de  R eparación  a  Víctimas,   actualizará los protocolos, programas y procedimientos de atención en salud mental   para  la  población  víctima  del  conflicto  armado,  con  el  objetivo  de  garantizar  una   rehabilitación  psicosocial  efectiva.  Además,  se  desarrollará  un  proto colo  de  salud   mental orientado a prevenir segundas victimizaciones, aplicable a todas las víctimas   del país, que será implementado por todas las entidades involucradas en la atención   y reparación.    5.2.4.3   Ampliación y fortalecimiento  de   modelo s comunitarios en  salud para personas con   trastornos  mentales,  personas  con  discapacidad,  epilepsia  y  otros trastornos  de   neurodesarrollo  y  neuropsiquiátricos.    Se  refiere  a  la  creación  de  un  modelo  de   rehabilitación  que  articule  los  esfuerzos  para  la  inclusión  social  en  salu d  mental,   involucrando a las personas con discapacidad, sus familias, comunidades y diversos   servicios  de  salud,  educación,  sociales  y  laborales.  Promueve  la  articulación   constante  entre  los  servicios  sociales,  de  salud  y  otros  sectores,  colocando  las   nece sidades de las   personas con  problemas y trastornos mentales, trastornos del  \n70                    comportamiento,  trastornos  del  neurodesarrollo,  consumo  de  sustancias   psicoactivas, , conducta suicida, demencia, personas con  discapacidad, situación de   calle  y epilepsia , así  como víctimas de la violencia del conflicto armado, violencia   sociopolítica, de género y otras violencias.     5.2.4.4     P ersona en el centro de las intervenciones . Este proceso involucra a las personas   y  sus  comunidades  en  el  abordaje  de  la  discapacidad  mental  o    biopsicosocial,   promoviendo la participación activa de los individuos afectados y de sus entornos   en  el  tratamiento,  la  integración  social  y  la  inclusión  en  todos  los  aspectos  de  su   vida, con el fin de superar el estigma y la discriminación.         El  Ministerio  de  Salud  y  Protección  Social,  en  coordinación  con  las  entidades   territoriales,  implementará  servicios  de  atención  comunitaria  en  salud  mental  en   todos los servicios habilitados en cada territorio. Con el liderazgo del Ministerio de   Educación  Nac ional,  se  promoverá  el  uso  de  la  RBC  en  el  ámbito  educativo  a  nivel   nacional, con el fin de sensibilizar , generar consciencia    y formar a todos los niveles   de  enseñanza.  Además,  se  desarrollará,  con  el  apoyo  de  una  institución  educativa   pública  nacional,  u n  curso  de  formación  continua  en  RBC,  derechos  humanos  en   salud mental, trato humanitario hacia pacientes y no discriminación por enfermedad   mental, como requisito de habilitación laboral para los/as trabajadores/as del sector   salud.    En  cuanto  a  la  rehabil itación  integral  e  inclusión  social  de  poblaciones  con   características especiales, se fomentará el fortalecimiento de campañas educativas   y de    toma de consciencia  dirigidas tanto a la comunidad en general como al talento   humano  en  salud.  Estas  iniciativas     estarán  orientadas  a  reducir  el  estigma  y  la   discriminación,  promover  la  humanización  de  los  servicios  de  salud  y  respetar  la   diversidad. Además, se impulsará la creación de grupos de pares que desempeñarán   un papel crucial como facilitadores /as   y acompañantes en los procesos de atención   integral, liderando las acciones de atención primaria en salud (APS).       El Ministerio de Salud y Protección Social, en articulación con el Ministerio del Interior y el   Ministerio de la Igualdad y Equidad (o quien   haga sus veces), promoverá la inclusión social   de  personas  con    problemas  y  trastornos  mentales,  trastornos  del  comportamiento,   trastornos  del  neurodesarrollo,  consumo  de  sustancias  psicoactivas,  ,  conducta  suicida,   demencia, personas con  discapacidad, s ituación de calle  y epilepsia,   así como víctimas de   la violencia del conflicto armado, violencia sociopolítica, de género y otras violencias .   C on   el  fin  de  evitar  hospitalizaciones  prolongadas  o  innecesarias ,  según  criterio  médico ,  se   fomentará la atenci ón comunitaria, la participación activa de las personas en las decisiones   que  les  afectan  respeto  a  su  salud  mental  y  el  respeto  a  su  autonomía.  Se  reconocerá  la   diversidad de necesidades y se promoverán intervenciones individualizadas que permitan  \n71                    desarro llar  su  máximo  potencial  y  participar  plenamente  en  la  sociedad  de  manera   individual y colectiva.    5.2.5  Eje 5. Gestión, articulación y coordin ación sectorial y transectorial      Reconoce la naturaleza dinámica de la salud mental, donde interactúan constanteme nte   las  personas,  los  actores  sociales  y  los  entornos  en  los  que  viven;  por  lo  tanto,  la  salud   mental  no  puede  abordarse  de  manera  aislada.  Desde  la  perspectiva  de  las  políticas  en   salud,  la  articulación  y  coordinación  entre  sectores  se  presentan  como  herr amientas   necesarias para lograr una gestión integral y garantizar el derecho fundamental a la salud   mental.  As í  mismo,  permite  buscar  soluciones  integrales,  aprovechando  de  manera   eficiente  los  recursos  disponibles  (saberes,  experiencias,  medios  de  influencia  y  recursos   económicos), así como las capacidades y  particularidades    de los individuos y comunidades,   para g enerar mecanismos que favorezcan el bienestar psicosocial.    Se resalta que no hay salud sin salud mental ;   por lo tanto, para preservarla como derecho   humano fundamental, es indispensable el concurso de todos los sectores que componen la   estructura del Estad o.  S e  afirma  que algun o s de l o s  determinantes de  la salud mental están   por  fuera  del  sector  sanitario.  En  consecuencia,  el  sector    de  la    salud  debe  propiciar  la   concurrencia de esos otros sectores, directa o indirectamente relacionados con el ejercicio   de    estos  determinantes,  y  generar  alianzas  estratégicas  y  sinergias  para  que  participen   activamente,  desde  su  campo  de  competencia,  en  la  construcción  de  una  mejor  salud   mental para las personas, las familias y las comunidades.    Este  eje  presenta  orientaciones     para  la  articulación  de  la  PNSM  con  los  anteriores,   reafirmando  su  transversalidad  en  la  implementación  de  la  política.  Además,  incluye   lineamientos  para  la  coordinación  interinstitucional,  la  planificación,  las  rutas   interinstitucionales, el manejo de da tos y los mecanismos de retroalimentación en materia   de salud mental.    Alcance:  Consolidar  la  gestión,  articulación,  coordinación  y  concurrencia  sectorial,   intersectorial y transectorial, permitiendo a los sectores y actores de la sociedad abordar   de manera   conjunta y eficaz los desafíos relacionados con la salud mental de la población .       Componentes    5.2.5.1   Red  Mixta  Nacional  y  Territorial  en  Salud  Mental.    La  Red  Mixta  Nacional  y   Territorial en Salud Mental será una instancia de apoyo del Ministerio de Salud   y  Protección  Social  (MSPS),  en  coordinación  con  el  Consejo  Nacional  de  Salud   Mental.  Para  tal  efecto,  se  expedirá  un  reglamento  interno  que  definirá  las    normas,  procedimientos  y  mecanismos  de  funcionamiento  necesarios  para  su   operación, incluyendo las responsabilidades de los integrantes, las funciones, los   procedimientos y el seguimiento de planes de trabajo en  los   ámbito s   nacional y  \n72                    territorial.  Se  articulará con la Superintendencia Nacional de Salud, en el marco   de sus competencias.    Se encargará de estructurar un marco institucional y transectorial que permita   la ejecución de acciones de incidencia en salud mental. Se constituye como un   mecanismo de   gobernanza y gobernabilidad, orientado a garantizar el derecho   a  la  salud  mental,  fortalecer  la  soberanía  sanitaria  y  promover  la   corresponsabilidad  sectorial  para  la  atención  en  salud  mental.  Si  bien  no   prestará  servicios  de  atención  directa,  su  labor  se     centrará  en  mejorar  la   implementación de la Política Nacional de Salud Mental (PNSM) y en proponer   soluciones para abordar los desafíos en este ámbito.     Estará  integrada  por   importantes  instituciones,  como  las  siguientes:   i)   o rganizaciones  no   g ubernamentales  (ONG);  ii)  u niversidades  y  centros  de   investigación;  iii)  entidades  del  s ector  privado;  iv)  o rganizaciones   internacionales; v)  c omunidades locales y líderes comunitarios que aportan a los   temas  de  bienestar  mental;  vi)    entidades    prestadoras    de  servicios  de  salud  y   cuidado; vii)  co legios y asociaciones de profesionales de disciplinas relacionadas   con la atención integral de la salud mental.    El  Ministerio  de  Salud    y  Protección  Social    garantizará  la  articulación  de  la  Red   Mixta  Nacional  y    Territorial  en  Salud  Mental  con  el  Centro  de  Referencia   Nacional en Salud Mental y los Centros de Referencia Territorial .      5.2.5.2   Mesa  Interinstitucional  de  Salud  Mental.    La  Mesa  Interinstitucional  de  Salud   Mental será un espacio estratégico para la articulación   de recursos, acciones y   lineamientos  orientados  a  la  promoción,  prevención,  atención  y  rehabilitación   en salud mental. Su propósito será facilitar una gestión integral e integrada que   guíe  la  toma  de  decisiones  en  este  ámbito,  asegurando  una  respuesta   coo rdinada y efectiva.    Adicionalmente,   fortalecerá  la  gobernabilidad  y  la  gobernanza,  abordando   temas  clave s     como  el  fortalecimiento  de  capacidades,  la  comunicación  y  los   entornos  digitales,  la  gestión  de  la  salud  mental  de  los  colombianos  en  el   extranjero  y  de  los  connacionales,  la  gestión  del  conocimiento,  la  ciencia,  la   tecnología y la innovación. As í  mismo,  se enfocará en la articulación de acciones   comunitarias  y  colectivas,  la  alfabetización,  la  educación  y  la  comunicación,    al   igual que  en los determinantes ambientales y la prevención de las violencias, con   un énfasis particular en la violencia sexual.               \n73                                      Figura 5.   Red Mixta Nacional y Territorial en Salud Mental       Fuente : Elaboración propia (MSPS, 2024) .       5.2.6   Estrategias transversales     Las estrategias transversales de la PNSM    tienen como objetico   fortalecer la atención y   gestión  integral  de  la  salud  mental  en  diversos  contextos,  con  énfasis  en  la  equidad  y  el   acceso oportuno a servicios de calidad. Se enfocan en el trabajo colaborativo entre sectores,   la  capacitación  continua  del  talento  humano  y  la  implementación  de  medidas  que   favorezcan la prevención, atención y rehabilitación de problemas de salud mental, según se   detalla a continuación.        5.2.6.1   Estrategia  transversal  1.      Redes integrales  e integradas  territoriales  en salud   mental    El Ministerio de Sa lud y Protección Social, en coordinación con las entidades territoriales   (departamentales,  distritales  y  municipales),  entidades  promotoras  de  salud,  empresas   sociales del Estado e instituciones prestadoras de servicios de salud, tanto públicas como   privad as, establecerá un Centro de Referencia Nacional en Salud Mental.  Este Centro será   responsable  de  coordinar  la  formulación  e  implementación  de  centros  de  referencia  \n74                    territoriales, los cuales ofrecerán servicios de salud mental de mediana y alta  complejidad,   y estarán enfocados también en la investigación: además estarán dotados de profesionales   en  psiquiatría,  psicología,  terapias  y  otras  disciplinas  esenciales  para  la  prestación  de  los   servicios.    Se  ajustará  el  componente  de  habilitación  en  el  m arco  del  Sistema  Obligatorio  de   Garantía  de  Calidad  en  Salud  (SOGCS)  para  asegurar  que  la  atención  responda   adecuadamente  a  las  necesidades  de  la  población,  integrando  la  pertinencia  étnica  y   cultural conforme a las características del territorio.    Adiciona l mente ,  l as  entidades  territoriales  en  coordinación  con  todos  los  actores  del   sistema  de  salud,  entidades  públicas,  entidades  educativas  y  demás  actores  sociales,   tendrán  un  plazo  de  seis  (6)  meses  para  la  configuración  de  un  “Lineamiento  modelo  de   atenció n en salud mental individual, familiar y comunitario”, en el que se especifiquen las   frecuencias  de  uso  para  la  prestación  de  servicios  en  salud  mental,    asegurando  la    continuidad  y  finalización  de  tratamiento,  suficiencia  en  medicación,  rehabilitación  a   enfermedades  mentales  crónicas,  enfermedades  neurovegetativas,  enfermedades  del   neurodesarrollo, enfermedades huérfanas neurológicas, demás problemas y trastornos de   salud  mental,  cuidados  paliativos,  con  énfasis  en  los  eventos  de  conducta  suicida  y   violen cias.    Alcance:   Esta estrategia garantizará la prestación de servicios de salud mental en todo el   territorio  nacional,  haciendo  los  ajustes  necesarios  para  atender  adecuadamente  a  las   poblaciones  de  zonas  urbanas,  rurales  y  rurales  dispersas.  Se  asegurará    que  todas  las   personas  reciban  atención  en  salud  mental  de  calidad,  de  manera  oportuna  y  continua,   cubriendo  tanto  el  tratamiento  como  la  rehabilitación,  la  entrega  de  medicamentos  y  el   seguimiento adecuado, favoreciendo la inclusión social.       5.2.6.2   Estrategia transversal 2.   Atención Primaria en Salud Mental   (APSM)    La  APSM  es     un  proceso  fundamental    en     del  sistema  de  salud,  que  facilita  un  contacto   accesible, integral y coordinado , que se   orienta a brindar continuidad asistencial centrada   en  la  person a  con  necesidades  de  salud  mental.    Con  el  fin  de  garantizar  el  derecho   fundamental  a  la  salud  en  todo  el  territorio  nacional,  la  APSM     incorporará  los  ejes   estratégicos y los enfoques de la  PNSM .     Además ,    la  APS M    s e  constituye  como  puerta  de  entrada  al    sistema  de  salud,  con   capacidad  para  responder  de  forma  resolutiva  e  identificar  las  principales  causas  de   morbilidad  en  salud  mental,  así  como  las  condiciones  individuales,  familiares  y  colectivas   que pueden derivar en posibles patologías mentales, facili tando intervenciones tempranas   mediante la gestión individual del riesgo en salud.    Alcance:   Fortalecimiento de la infraestructura de atención en salud mental y el talento   humano  en  los   nivel es   primario,  comunitario,  clínico  y  humanitario,  a  través  del  \n75                    mejo ramiento  de  las  capacidades  resolutivas  de  los  equipos  básicos  de  salud     (EBS) ,  los   centros de atención primaria en salud mental y los gestores de salud mental , promoviendo    su articulación en los diferentes niveles de   atención para salud mental.       5.2.6.3   Estrategia  transversal    3 .  Salud  mental  y  apoyo  psicosocial  en  emergencias  y   desastres    Responde a situaciones de emergencias declaradas de cualquier índole, sean naturales,   de  salud  o  sociales,  con  el  objetivo  de  restablecer  la  sensación  de  normalidad  y  ali viar  el   sufrimiento humano.    Alcance:    Se  llevará  a  cabo  mediante  una  coordinación  intersectorial  que  involucre  los   sectores  de  salud,  educación,  servicios  sociales  y  seguridad  pública,  así  como   representantes de  las  comunidades  afectadas.  Se  desplegarán    equipos  multidisciplinarios   de  atención  clínica,  psicosocial  y  comunitaria,  encargados  de  la  promoción,  prevención,   atención  e  intervención  tanto  en  casos  individuales  como  en  comunidades.  Además,  se   fortalecerá  la  atención  prehospitalaria  y  se  activarán  r edes  integrales  de  salud  mental,   dependiendo  del  tipo  de  emergencia.  Para  ello,  se  crearán  equipos  nacionales   especializados  en  atención  psicosocial  para  emergencias  y  desastres,  organizados  por  el   Ministerio  de  Salud,  que  garantizará  los  recursos  necesari os  para  su  operación,  en   coordinación con los entes territoriales y las entidades estatales correspondientes.       5.2.6.4   Estrategia transversal  4 . Observatorio de Salud Mental    El  Ministerio  de  Salud  y  Protección  Social  actualizará  las  acciones  y  recursos  del   Observatorio  de  Salud  Mental,  con  el  fin  de  que  haga  seguimiento  a  los  problemas  y   trastornos de salud mental, el recurso humano, la infraestructura, la calidad del servicio   en   salud  mental  a  nivel  nacional  y  se  articule  a  los  demás  observatorios  existentes,  con  el   propósito de ofrecer información confiable y oportuna que apoye la toma de decisiones en   el sector de la salud y otros sectores, contribuyendo al impacto positivo  de la población.    Alcance:   El  Observatorio  de  Salud  Mental  se  encargará  de  recopilar  y  analizar   información sobre la situación de la salud mental a nivel nacional, departamental, municipal   y  distrital,  evaluando  las  necesidades  y  prioridades  en  este  ámbito.     Su  función  incluirá  la   proposición y desarrollo de estrategias para la prevención y abordaje de problemas de salud   mental, así como la difusión de los análisis realizados, que proporcionen una visión clara y   precisa de las realidades de salud mental en el   país.    La implementación de esta estrategia estará a cargo del Ministerio de Salud y Protección   Social,  que  garantizará  los  recursos  financieros,  técnicos,  humanos  y  tecnológicos   necesarios  para  su  desarrollo.  La  estructura  organizativa  del  observatorio  in cluirá  una   dirección general, un área de monitoreo y vigilancia epidemiológica, un área de análisis de  \n76                    datos  e  investigación,  un  área  de  gestión  del  conocimiento  y  divulgación,  una  red  de   colaboración y alianzas interinstitucionales, y un área de formación   y capacitación.     Además,  se  priorizarán  los  procesos  de  identificación  de  necesidades  de  poblaciones   vulnerables,  como    l a s    personas     habitantes  de     la     calle,  y  se  enfocará  en  la  mejora  de  la   respuesta de los servicios de salud, a través de la información recolectada, fortaleciendo los   vínculos entre las comunidades y las instituciones del sector salud, para mejorar la calidad   y la oportunidad de la aten ción.       5.2.6.5   Estrategia transversal  5 . Fortalecimiento del talento humano    Las  entidades  territoriales    serán  responsables  de    la  planificación  y  gestión  del  talento   humano  en  salud  y  otros  trabajadores  del  sector,  priorizando   las  características  y   necesidades de la población en su s respectivos  territorio s .  En todos los niveles de formación   en salud, se promoverá el desarrollo de programas y contenidos sobre formación continua   en salud mental.    El Ministerio de Salud y Protecció n Social, en articulación con el Ministerio de Educación,   promoverá el desarrollo de programas de formación en salud mental, en conjunto con las   entidades competentes. Estos programas deberán incorporar contenidos en salud mental   pertinentes y adaptados a  las necesidades poblacionales y territoriales, con el objetivo de   garantizar el cuidado integral de la salud mental.         Además,  se  impulsarán  programas  de  formación  y  sensibilización  con  enfoques   diferenciales, garantizando que los/as profesionales de sal ud respondan adecuadamente a   las necesidades de la población y mejoren el acceso a los servicios de salud mental .    Alcance:   Se   llevarán a cabo procesos continuos de caracterización e identificación de las   necesidades de formación y gestión del talento human o en salud mental. En este sentido,   el MSPS continuará brindando asistencia técnica a las entidades territoriales, apoyando la   implementación de programas que fortalezcan la atención primaria en salud, con el objetivo   de  reducir  las  brechas  en  salud  mental   en  Colombia,  adaptando  el  mhGAP  en  sus   componentes  clínico,  comunitario  y  humanitario.  El  talento  humano  contará  con   competencias  básicas  en  primeros  auxilios  psicológicos,  rehabilitación  centrada  en  la   comunidad y el mhGAP para la reducción de las brecha s en salud mental.      Además,    El  Ministerio  de  Salud  y  Protección  Social  desarrollará  los  lineamientos  y  la   reglamentación para que, progresivamente, se habiliten plazas de SSO para estudiantes de   los programas de pregrado en psicología y posgrado en áreas d e la salud mental, según la   normativa  especializada que  rige  la  materia.        Se  garantizará  que  los  centros  de  atención   primaria  en  salud,  servicios  de  urgencias,  hospitalización  parcial  o  total  y  consultas   ambulatorias  cuenten  con  profesionales  en    psicología  capacitados/as  para  ofrecer  una   atención  integral  a  las  personas,  consolidándose  como  un  elemento  fundamental  en  la   puerta de entrada al sistema de salud.   \n77                    Se  fomentará  la  colaboración  interinstitucional  para  capacitar  al  talento  humano  en   sector es distintos al de la salud, a través de programas educativos y de formación para el   trabajo,  lo  que  permitirá  que,  en  el  marco  de  la  atención  comunitaria  se  comprenda  la   importancia de la promoción, prevención y derivación oportuna en salud mental.     Tambi én  se     articulará  el  Sistema  General  de  Riesgos  Laborales  en  los  procesos  de   notificación  epidemiológica  de  los  eventos  de  salud  mental del talento  humano  en  todos   los  sectores  y  se  fortalecerán  las  acciones  para  el  cuidado  de  la  salud  mental,  dentro  del   ma rco del sistema de salud y seguridad en el trabajo, de los trabajadores que impactan de   manera directa la salud mental de la ciudadanía.       Todos  los  programas  de  formación  en  psicología  a  nivel  nacional  podrán  prestar   servicios en centros de atención comun itaria.       5.2.6.6   Estrategia transversal  6 . Mitigación de la conducta suicida     Busca  disminuir  los  factores  de  riesgo  asociados  a  la  conducta  suicida  mediante  una   articulación transectorial e intersectorial. Se enfocará en intervenciones a nivel individual,   familiar  y  comunitario,  con  acciones  que  favorezcan  la  vigilancia  epidemiológica,  la   concientización,  la  reducción  del  estigma     y  la  discriminación ,  la  capacitación,  el  acceso  a   servicios, el tratamiento oportuno, la intervención en situaciones de crisis, el seguimiento y   el  acompañamiento  a  los  supervivientes  y  sus  familias,  así  como  la  supervisión  y   coordinación de esfuerzos.     Desde  el  enfoque  de  d erechos  humanos  propuesto  en  la  actualización  de  la  Política   Nacional  de  Salud  Mental,  se  priorizarán  la  dignidad  y  la  autonomía  de  las  personas.  Se   fomentará  la  participación  activa  de  las  comunidades  y  de  los  medios  masivos  de   comunicación,  incluyendo  a  personas  con  experiencia  vivida,  quienes  promoverán  la   empatía y mostrarán modelos de recuperación visibles. Para evitar el sensacionalismo que   perpetúa  estereotipos,  se  crearán  guías  sobre  el  tratamiento  adecuado  de  los  temas   relacionados con la salud men tal.    Alcance:     Se  priorizarán  acciones  específicas  de  promoción,  prevención,  atención  y   rehabilitación, articuladas con otros actores del territorio, por medio de tres componentes   estratégicos:    i)   Comunicación :  O rientada a la promoción de la salud mental, la a dopción de   conductas  sin  riesgo  ni  daño,  la  disminución  del  estigma  y    el    auto  estigma ,  el   reconocimiento  de  rutas  de  atención  y  la  detección  temprana  de  situaciones  de   riesgo.    ii)   Atención :  O rientada a fortalecer la atención desde la APS, integrando según   la  pertinencia  los  componentes  primarios  y  complementarios,  y  promoviendo   acciones colectivas bajo el Plan de Intervenciones en Salud Pública.   \n78                    iii)   Seguimiento :  O rientado a mejorar los servicios de salud  en form a oportuna   y  continua  para  las  personas  que  presentan   conducta  suicida,  los  familiares   sobrevivientes  de  suicidio,  el  fortalecimiento  de  redes  de  apoyo  social  y  la   promoción de factores protectores, con énfasis en la interseccionalidad y de manera   articulada con otros actores.        Esta estrategia transversal s e alinea con la Estrategia Nacional para la Prevención de la   Conducta  Suicida  en  Colombia  (2018),  la  Guía  de  Práctica  Clínica  de  Prevención  y   Tratamiento de la Conducta Suicida (2013),   y la actualización de sus versiones,   así como las   directrices de emerge ncia en caso de contención del evento.       5.2.6.7   Estrategia transversal  7 . Prevención de problemas en salud mental asociados   a violencias, violaciones a derechos humanos y construcción de paz         Implica  promover  acciones  sectoriales  e  intersectoriales  que  prevengan    y  aborden  las   diversas  formas  de  violencia,  las  cuales  afectan  profundamente  la  salud  mental  de   individuos, familias, comunidades y colectivos a lo largo del ciclo de vida, especialmente en   contextos  sociales  marcados  por  graves  violaciones  de  derechos  hum anos,  violencias   basadas en género y discriminación. A su vez, esta estrategia responde a las necesidades de   salud mental en los contextos de derechos humanos y construcción de paz en los territorios.    Alcance:   La implementación se llevará a cabo a través d e la articulación de los actores   sectoriales e intersectoriales, con el fin de brindar una atención humanizada que aborde los   daños  emocionales  a  nivel  individual,  familiar  y  colectivo,  derivados  de  hechos   victimizantes,  y  proporcionando  atención  personali zada  según  las  necesidades   biopsicosociales de cada persona.    Se  integrará  a  la  población  víctima  de  violencia  sociopolítica  dentro  del  modelo  de   rehabilitación  centrado  en  la  comunidad,  articulado  con  el  Programa  de  Atención   Psicosocial a Víctimas de Viole ncia (Papsivi). Las estrategias empleadas estarán orientadas   a  favorecer  la  recuperación  o  mitigación  de  los  daños  psicosociales  y  el  sufrimiento   emocional causado por el conflicto armado interno.    En el marco de la construcción de paz y la reconstrucción d el tejido social, se ampliará la   cobertura  de  atención  psicosocial  para  personas  desmovilizadas,  reincorporadas,   reinsertadas y firmantes del  a cuerdo de  p az que residan en zonas rurales dispersas, con un   enfoque interseccional que considere sus contextos particulares. Se garantizará, además, el   acceso  a  atención  integral  en  salud  mental  diferenciada  para  víctimas  de  violencias   sexuales, violencias basadas e n género y familiares de víctimas de feminicidio y población   migrante, asegurando que los servicios sean sensibles a las especificidades de cada caso.   \n79                    Se  desarrollarán  campañas  psicoeducativas  para  promover  ambientes  digitales   inclusivos, respetuosos y lib res de discriminación y violencia, con especial énfasis en niños,   niñas, adolescentes y jóvenes (NNAJ). Estas campañas incluirán estrategias que fomenten   la  protección  integral  y el  desarrollo de  habilidades  para  el uso  seguro  y  saludable de  las   redes  soci ales,  con  el  objetivo  de  reducir  el  estigma,  la  discriminación,  las  violencias,  la   inducción al suicidio y otros riesgos y trastornos de salud mental.    Se implementarán acciones de monitoreo sobre el estigma y autoestigma, cambios en   actitudes sociales, aut opercepción , tasas de búsqueda de atención y mejoras en la calidad   de la atención en salud mental. Lo anterior con el objetivo de reducir barreras y fomentar   una  sociedad  más  inclusiva,  en  la  que  las  personas  puedan  acceder  a  servicios  de  salud   mental sin   temor al rechazo o la discriminación.    En este sentido, resulta fundamental promover la educación en comunicación asertiva,   resolución  de  conflictos  y  respeto  a  la  diferencia,  tanto  en  ambientes  escolares  como   familiares y comunitarios. Estas acciones cont ribuirán a crear espacios inclusivos y libres de   violencia, en el marco del ejercicio pleno de los derechos fundamentales.    Se fortalecerá la articulación intersectorial para prevenir violencias y discriminación, con   especial  énfasis  en  NNAJ,  mujeres,  perso nas  LGBTIQ+,  personas  mayores  y  otros  grupos   discriminados o excluidos. Además, se trabajará en la prevención y atención oportuna de   afectaciones  en  la  salud  mental  de  grupos  étnicos,  integrando  sus  saberes  ancestrales  y   prácticas culturales.           \n80                    Figura  6 .   Centro de Referencia en Salud Mental    Fuente : Elaboración propia (MSPS, 2024)       5.4  Salud mental en  el marco de la Atención Primaria   en  Salud    La  salud  mental  se  abordará  privilegiando  la estrategia  de Atención  Primaria en  Salud,   como  principal  mecanismo  para  garantizar  la  atención  integral  de  las  diferentes   necesidades de la población en este campo.  Reconociendo las brechas   ya identificadas en   e l documento sobre   la prestación de servicios ,  y dado  el bajo número de  talento humano   especializad o  en  salud  mental ,  además  de  las  dificultades  de  acceso  continuo  y   oportunidad,  se  deberá  atender  la     salud  mental  tienen  con  acciones  resolutivas  desde  el   primer nivel.  Por lo que se   implementará la salud mental desde la atención primaria a través   de la integración de los ejes estratégicos y los enfoques de la PNSM, en todos los entornos.          Se garantiza rá de manera progresiva los recursos para que las entidades territoriales en   coordinación  con  los  actores  del  sistema  de  salud  garanticen  los  recursos  humanos,   técnicos,  tecnológicos  y  de  infraestructura  necesarios  y  suficientes  para  que  los  equipos   básico s  de  salud  o  los  equipos  de  salud  territoriales  en  áreas  rurales,  rurales  dispersas  y   urbanas, presten servicios de salud en modalidad extramural en su territorio. Permitiendo   diseñar, implementar y hacer seguimiento desde la estrategia de atención primari a en salud   que  garanticen  en  salud  mental  la  detección  temprana,  la  notificación  de  la  vigilancia  en   salud  pública  y  la  mitigación  de  la  conducta  suicida,  las  autolesiones,  el  consumo  de   sustancias psicoactivas, la prevención de violencias y los factores d e riesgo psicosocial   \n81                    La  estrategia  de  a tención  p rimaria en  s alud se  encuentra  sustenta da   en el marco jurídico   de la Ley 2294 de 2023, el Decreto 1599 de 2022 y la Ley 1438 de 2011, que disponen que   las  entidades territoriales, con participación de los actores del sistema de salud, coordinen   la conformación de la red integrada    e integral  de servicios de salud ,  organizándose   en los   niveles  primario  y  complementario,  para  lo  cual    articula rá     los  servicios  de  cuidado  del   territorio y la afectación de los determinantes sociales de la salud.     En  este  apartado  se  aborda  cómo  los  actores  del  sistema  de  salud  se  organizan  e   interactúan, garantizando la integralidad e integración de sus acciones, se gún las funciones   y responsabilidades correspondientes.     En el contexto nacional, la atención primaria  en salud  se entiende como  un a   estrategia    fundamental dentro del sistema de salud, que facilita un contacto inicial accesible, integral   y coordinado, prop orcionando continuidad asistencial centrada en el paciente. La estrategia   de  APS  combina  tres  componentes  interdependientes  y  sinérgicos:  i)  políticas  y  medidas   intersectoriales;  ii)  empoderamiento  de  las  personas,  familias  y  comunidades  para  una   mayor par ticipación social, y iii) servicios de salud integrados e integrales, que abarcan la   atención primaria y las funciones esenciales de salud pública (OMS, 2022).     En el caso colombiano, también se hace énfasis en la participación social, la organización   de l os servicios de salud y la recuperación de las personas en los entornos donde transcurre   su  diario  vivir.  La  institucionalización  es  contraria  al  derecho  de  las  personas  con   discapacidad a vivir de forma independiente y a ser incluidas en la comunidad.  Por   lo que la   institucionalización ,   nunca debe considerarse una forma de protección de las personas con   discapacidad.    Por  lo    tanto,     se     propone     la  transición  progresiva  y  no  regresiva  desde  el   modelo  de  internamiento  de  personas  con  trastornos  mentales,  neuropsiquiátricos  o  del   comportamiento  en  hospitales  psiquiátricos,  hacia  una    desinstitucionalización    atención   digna  y  de  calidad  en  la  comunida d .  Los  procesos  de  desinstitucionalización  deben  tener   por  objeto poner  fin a todas  las formas de  institucionalización,  aislamiento  y  segregación   de  las  personas  con  discapacidad,  tanto  en  el  ámbito  privado  como  en  el  público.    (OPS,   2023).    Se  establece    que ,     para  la  preservación  de  la  salud  mental,  sea  el  nivel  primario  de   atención    el    qu e     coordine  y  enlace  todos  los  niveles  de  atención  para  ofrecer  cuidados   integrales,  continuos  y  oportunos  a  la  población.  En  este  sentido,  en  aplicación  de  los   principios de la APS (artículo 13   de la   Ley 1438 de 2011), es posible hablar de:     i)     Integración  hor izontal  transectorial :  Además  de  la  colaboración  entre  los   prestadores  de  servicios  de  salud  que operan en  el  mismo  nivel  de  atención  o   especialidad ,   se  refiere  a  la  importancia  de  articular  servicios  de  salud   intramurales  y  extramurales  del  primer  nivel  d e  atención  con  las  formas  de   cuidado  propio,  los  dispositivos  comunitarios  referenciados  como  parte  de  las   tecnologías del Plan de Intervenciones Colectivas (PIC), los servicios intramurales  \n82                    y  extramurales  del  primer  nivel  de  atención  y  otros  servicios  soc iales,   sociosanitarios e intervenciones ambientales.     ii)     Integración en el interior de los servicios de salud : Incluye la integración de   todos  los  niveles  de  atención,  en  trabajo  con  las  áreas  de  referencia  y   contrarreferencia  de  las  entidades  administradoras     de  planes  de  beneficio   (EAPB) ,   o  los que   cumplan sus funciones ,   y los centros reguladores de urgencias   y emergencias (CRUE), cuando aplique. Al cumplir con los atributos de las redes   integrales de salud, se pretende promover una coordinación asistencial e fectiva   en  la  APS,  que  integra  servicios  intramurales  y  extramurales  provistos  por  las   entidades sociales del Estado (ESE) y otras instituciones prestadoras de servicios   de salud (IPS) primarias, y servicios de consulta externa especializada mediante   las m odalidades de telemedicina y extramural (jornadas de salud).     Adicionalmente,  l a     PNSM  ordena    fortalecer  la  salud  mental  al    integrar  y  fortalecer  el   nivel primario de atención con equipos  básicos  de salud y  su articulación con los  centros de   atención    primaria  en  salud     (CAPS) ,     garantizando  acceso  y  continuidad  entre  los  niveles   primarios  y  complementarios    de  mediana  y  alta  complejidad   (Ministerio  de  Salud  y   Protección Social, 2024).     En  este  marco,  las  características  de    l a     estrategia  que  fortalece  la     salud  mental    en  el   marco de la  atención  primaria en  salud  son   las siguientes :     i)   Enfoque  centrado  en  las  personas,  las  familias  y  las  comunidades  en  su  vida   cotidiana, promoviendo interacciones equitativas.     ii)   Acciones en los entornos de desarrollo de las per sonas a lo largo de su curso de vida,   en todos los niveles de atención, integrando diversas modalidades de prestación de   servicios.     iii)   Fortalecimiento  del  nivel  primario  de  atención,  que  actúa  como  primer  punto  de   contacto  con  la  población,  basado  en  los  cen tros  de  atención  primaria  en  salud   (CAPS) ,   o  el  que   cumpla  sus  funciones ,   y  los  equipos  de  salud  territoriales,   coordinados con el nivel complementario.     iv)   Perspectiva de cuidado social, operada a través de la articulación entre los actores   del  sistema  de  cu idado  y  el  sector  de  la  salud,  garantizando  la  provisión  integral  e   integrada de servicios, contribuyendo a la modificación de los determinantes sociales   que impactan la salud mental.     v)   Atención de calidad, oportuna, segura, pertinente y accesible para toda   la población   en el territorio nacional, incluyendo la disponibilidad de servicios de salud mental en   zonas de difícil acceso, con un ordenamiento adecuado de la provisión, organización   y gestión de la prestación de estos servicios, con el fin de reducir l as brechas en el   acceso  y  oportunidad  en  la  atención de  la  salud mental  en  grupos  vulnerables  y  la   población rural y dispersa.    \n83                    vi)   Aceptabilidad de la atención, fundamentada en el reconocimiento de las dinámicas   y diversidades poblacionales, el respeto y la articulación con las formas de cuidado   derivadas  de  saberes  populares,  tradiciones  culturales  y  conocimientos  propios  de   pueblos  y comunidades étnicas y campesinas.     vii)   Corresponsabilidad, cogestión y participación social y comunitaria.     Frente  a  lo  anterior,    la  estrategia     plantea  la  integración  de  los  ámbitos - capas  ( socio -  comunitaria - ambiental  e  institucional  de  salud  y  otros  sectores),  conformados  por   estructuras generales que se articulan mediante estructuras bisagra, las cuales permiten la   continuidad, oportunidad e integralidad de los servicios, desde un enfoque de APS, equidad   e  igualdad, dentro de una estructura de red integral e integrada  de salud (RII S).     Para mejorar la capacidad resolutiva de los servicios de salud del componente primario   de  la  red  de  atención,  en  especial  para  las  áreas  rurales,  se  ordena  que  las  institucion es   prestadoras de servicios de salud del nivel primario de las redes, independientemente de   su naturaleza jurídica, deberán realizar el proceso de análisis de la provisión, organización   y  gestión  de  la  prestación  de  servicios,  así  como  la  proyección  de  la    progresión  de  la   capacidad  resolutiva  en  áreas  urbanas  y  rurales,  que  permita  la  atención  integral  e   integrada desde la salud pública, la promoción de la salud, la prevención de la enfermedad,   el  diagnóstico,  el  tratamiento,  la  rehabilitación  y  los  cuidado s  paliativos,  conforme  a  las   disposiciones vigentes por parte del Ministerio de Salud y Protección Social.     Para  las  zonas  rurales  en  particular,  se  implementa rá     o    restaurarán     las  sedes  de   instituciones  prestadoras  de  servicios  de  salud  del  componente  prim ario  con  énfasis    a   recuperar    la  red  pública,    para  dejar  capacidad  instalada  en  los  territorios,  con  la  cual  se   podrán     prestar  servicios  de  salud  a  través  de    los  CAPS,  los    equipos  básicos  de  salud,   integrando  preferiblemente  las  modalidades intramural   y   extramural , además de fortalecer   el   aprovechamiento de la telemedicina en todas sus modalidades ,  avanzando en la garantía   del acceso efectivo de la población rural cerca de la vivienda, el lugar de trabajo, el sitio de   estudio,  cuidado  de  la  infancia  y  de   la  persona  mayor,  según  territorialización  y   georreferenciación  que  se  establecerá  por  parte  del  MSPS,  en  concertación  con  las   comunidades  y  las  entidades  territoriales  de  los  órdenes  departamental,  distrital  y   municipal.     Adicionalmente, se propone que e l desarrollo de infraestructura en salud mental en las   zonas rurales cuente con la participación integral de las comunidades de las zonas rurales,   incluyendo  sus  enfoques  regionales  y  socioculturales;  para  tal  efecto,  el  MSPS  hará  los   ajustes correspondien tes en términos de habilitación.     Se define el  nivel primario de atención   co
