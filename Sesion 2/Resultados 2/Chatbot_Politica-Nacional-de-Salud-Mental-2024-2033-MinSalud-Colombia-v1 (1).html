nocimiento a todas las personas que aportaron a este documento.       EQUIPO DE APOYO METODOLÓGICO OAPES    Eliana Esmeralda Zambrano Becerra       Sonia Milena Torres Rojas    © Ministerio de Salud y Protección Social     Carrera 13 # 32 - 76. Bogotá, D.C., Colombia     Atención telefónica a través del centro de contacto     en Bogotá: (60 - 1) 330 5043. Resto del país: 01 8000 960 020        \n4                    Contenido    1.   Introducción   ................................ ................................ ................................ ....................   4    2.   Marco referencial   ................................ ................................ ................................ ............   7    2.1 Marc o normativo y de política   ................................ ................................ .........................   7    2.2 Marco conceptual   ................................ ................................ ................................ ...........   12    2.3 Principios   ................................ ................................ ................................ ........................   17    2.4 Enfoques   ................................ ................................ ................................ .........................   19    3.   Diseño metodológico   ................................ ................................ ................................ .....   27    4.   Diagnóstico situacional   ................................ ................................ ................................ ..   30    4.1   Panorama en regiones   ................................ ................................ ..............................   32    4.2   Poblaciones diferenciales   ................................ ................................ .........................   35    4.3   Barreras de acceso a los servicios de salud   ................................ ..............................   46    4.4   Análisis de la situación en salud   ................................ ................................ ...............   50    5.   Marco estratégico   ................................ ................................ ................................ ..........   55    5.1   Objetivos   ................................ ................................ ................................ ...................   55    5.2   Ejes estratégicos   ................................ ................................ ................................ .......   56    5.2.1  Eje 1. Promoción de la salud mental   ................................ ................................ ....   57    5.2.2 Eje 2. Prevención de problemas, trastornos de la salud mental y epilepsia   ........   60    5.2.3 Eje 3. Atención integral de los problemas y trastornos mentales   .......................   65    5.2.4 Eje 4. Rehabilitación integral e inclusión social   ................................ ....................   68    5.2.5 Eje 5. Gestión, articulación y coordinación sectorial y transectorial   ...................   71    5.3. Estrategias  transversales ................................ ................................ ............................   73    5.4 Salud mental basada en atención primaria en salud   ................................ ..................   80    5.5 Seguimiento y evaluación   ................................ ................................ ...........................   87    6. Referencias   ................................ ................................ ................................ .......................   90       1.     Introducción       La salud mental es un componente esencial del bienestar integral de las personas y las   comunidades; esta se vincula a factores contextuales, sociales y culturales que posibilitan  \n5                    el  desarrollo  humano  y  la  realización  de  proyectos  de  vida  tanto  individuales     como   colectivos. En este contexto, el sentido de la vida y de la salud depende en gran medida de   la efectividad de los mecanismos de prevención, promoción, rehabilitación y la colaboración   interinstitucional, diseñados e implementados por los gobiernos.      La Organización Mundial de la Salud (OMS, 2021) estimó que, en 2019, alrededor de 970   millones de personas padecían trastornos mentales, siendo la ansiedad y la depresión los   más  comunes,  cuyas  tasas  aumentaron  un  26     %     y  un  28     % ,  respectivamente,  durante    el   primer  año  de  la  pandemia  por  covid - 19 .  Asimismo,    proyect ó     que  uno  de  cada  cuatro   individuos  enfrentará  problemas  de  salud  mental  en  su  vida,  lo  cual  subraya  la  urgente   necesidad de abordar estos fenómenos desde un enfoque integral y multidimensional.      En Colombia, la  Ley 1751 de 2015 , Estatutaria de Salud, establece en su artículo 5 . ° que   el  Estado  es  responsable  de  respetar,  proteger  y  garantizar  el  goce  efectivo  del  derecho   fundamental  a  la  salud  a  través  de    f ormular  y  adoptar  políticas  que  propendan    a     la   promoción  de  la  salud,  prevención  y  atención  de  la  enfermedad  y  rehabilitación  de  sus   secuelas, mediante acciones colectivas e individuales. Posteriormente, la  Ley 1616 de 2013    contiene disposiciones para garantizar el ejercicio pleno del derecho a la   salud mental de la   población  colombiana,  en  consonancia  con  lo  preceptuado  en  el  artículo  49  de  la   Constitución Política de 1991.      En  los  últimos  años,  a  través  de  la    Resolución  4886  de  2018 ,  que  adoptó  la  Política   Nacional de Salud Mental,  se  hizo  un may or  énfasis   en la salud mental positiva y no   en   la   enfermedad .     Con    el    Conpes  3992  de  2020     y  su  evaluación  en  el  2023 ,  que  promovió  la   Estrategia para la Promoción de la Salud Mental,  se  ha destacado la necesidad de promover   un  enfoque  integral  de  salud    mental,  con  un  énfasis  en  la  coordinación  intersectorial,  el   fortalecimiento de los entornos sociales y la inclusión de personas con trastornos mentales    (Departamento Nacional de Planeación, 2024) .      A  pesar  de  los  avances  alcanzados,  la  salud  mental  en  Col ombia  sigue  siendo  una   prioridad crítica. Los efectos de la pobreza, la violencia, el conflicto armado y las secuelas   de  la  pandemia,  sumados  a  la  alta  prevalencia  de  trastornos  mentales  en  grupos   vulnerables,  como  mujeres,  niños,  adolescentes,  personas  ma yores,  comunidades   indígenas  y  población  LGBTIQ+,  han  puesto  de  manifiesto  profundas  desigualdades  en  el   acceso  a  los  servicios  de  salud  mental  que  exigen  una  respuesta  urgente  y  coordinada,   mediante políticas más inclusivas y efectivas.     Adicionalmente,  el  diagnóstico  situacional  de  la  salud  mental 1   ha  revelado  varia s   brechas, entre ellas la falta de coordinación intersectorial, la fragmentación de los servicios,   el  uso  limitado  de  la  información,  las  barreras  en  los  entornos ,     las  habilidades  para                                                                   1   Que se detalla en el numeral 4 de este documento, así como en el  a nexo “Análisis de situación en salud:   salud mental con énfasis en desigualdades” .   \n6                    enfrent ar  adversidades,  el  desarrollo  insuficiente  de  competencias  socioemocionales,   limitaciones  en  la  atención  integral  e  inclusión  social  de  personas  con  consumo   problemático  de  sustancias  psicoactivas  y  trastornos  mentales,  así  como  la  escasez  de   profesionale s capacitados en salud mental con perspectiva diferencial.    En cumplimiento del  artículo 166 de la Ley 2294 de 2023, que establece el Plan Nacional   de Desarrollo 2022 - 2026: “Colombia, potencia mundial de la vida” , el Ministerio de Salud   y Protección Social  (MSPS)  presenta la  actualización de la  Política Nacional de Salud Mental   (PNSM) ,    orientada  a     garantizar  la  salud  mental  individual    y     colectiva,  a  través  de  ejes   estratégicos  que  abordan  los  determinantes  sociales  de  la  salud  mental  en  diversos   entornos de desarrollo y a lo largo del curso de la vida, reconociendo enfoques que integran   las diversas realidades de la población .    Esta  actua lización     se     alinea  con  el    Plan  Decenal  de  Salud  Pública  (PDSP)  2022 - 2031     y   desarrolla sus ejes mediante la estrategia de Atención Primaria en Salud (APS), abarcando   los  siguientes  aspectos:  i)  promoción  de  la  salud  mental;  ii)  prevención  de  problemas  y   tra stornos  mentales;  iii)  atención  integral  de  los  problemas  y  trastornos  mentales;  iv)   rehabilitación integral e inclusión social, y v) gestión, articulación y coordinación sectorial y   transectorial. Si bien se mantienen los ejes de la política anterior, deb e precisarse que se   incorporan  nuevos  aspectos  basados  en  las  lecciones  aprendidas  y  las  necesidades   identificadas, con el fin de lograr una atención integral, integrada, continua e inclusiva, con   enfoque diferencial y reconociendo la salud mental como un  derecho.     En  el marco del PDSP ,   se subraya la importancia de la inclusión de todas las personas,   independientemente de sus condiciones de vida o salud. La salud mental es un ámbito en   el que convergen  vari os  actores a lo largo del curso de la vida ( Tangcharoensathien et al.,   2020),  los  cuales  interactúan  de  manera  dinámica  con  múltiples  contextos,  como  el   desarrollo humano, el hogar, la familia, las escuelas, la comunidad, los lugares de trabajo,   los  servicios  de  atención  y  los  entornos  ambientales  ( OPS,  2023).  Reconocer  estos   contextos, articulados con el curso de vida y los enfoques de la política, permite identificar   los riesgos fundamentales, los factores de protección que influyen en cada etapa de la vida   y los entornos en los que las intervencio nes deben implementarse para promover, proteger   y restaurar la salud mental (OMS,  2021).    Para  fortalecer  la  implementación  de  la  PNSM     y  generar  respuestas  para  abordar  los   desafíos emergentes en salud mental,   se contempla la creación de la  Red Mixta Nacio nal y   Territorial  en  Salud  Mental ,    como     mecanismo  estratégico  de  gobernanza,  articulación  y   participación ,  caracterizado  por  su  enfoque  integral,  inclusivo  y  ajustado  a  las   particularidades territoriales.     El  presente  documento  se  ha   construid o   a  partir  de  la  recopilación  de  hechos,   experiencias, saberes, acciones y esfuerzos de  numerosas personas comprometidas  con el  \n7                    cuidado  de  quienes  más  lo  necesitan .     Desde  su  estructura,  s e     organiza  en  secciones 2 ,   iniciando   con un marco referencial que integ ra los antecedentes normativos y de política,   el  marco teórico  y  conceptual,  los principios que sustentan  la política  y  los  enfoques  que   guían su implementación. A continuación ,   se presenta el diseño metodológico, que describe   en  detalle  el  proceso;  el  dia gnóstico  situacional ,     que  expone  los  principales  problemas  y   oportunidades identificados, así como el marco estratégico ,   que define los objetivos, ejes   estratégicos  y  acciones  claves.  Finalmente,  se  incluyen  los  mecanismos  de  seguimiento  y   evaluación, fund amentales para asegurar la sostenibilidad y efectividad de la política.    Consulte aquí el decreto por el cual se adiciona el título 15 a la parte 8 del libro 2 del   Decreto  780  de  2016,  en  relación  con  la  actualización  de  la  Pol ítica  Nacional  de  Salud   Mental.       2.   Marco referencial    En este apartado se revisan los antecedentes normativos y de política que han orientado   el abordaje de la salud mental en Colombia, con el objetivo de proporcionar un contexto   claro  sobre  los  abordajes  previos  y  los  compromisos  asumidos  para  garantizar  su   reconocimiento y atención integral. A continuación, se presenta un marco conceptual que   no  solo  define  la  salud  mental  en  el  contexto  actual,  sino  que  también  integra  las   perspectivas aportadas mediante un proceso participativo,   que resalta las voces de diversos   actores  involucrados.  Por  último,  se  detallan  los  enfoques  que,  al  integrar  las  múltiples   realidades  de  la  población,  guían  la  formulación  de  acciones  en  los  distintos  ejes  de   intervención.         2.1 Marco normativo y de polí tica       Colombia ha experimentado un desarrollo significativo en su marco normativo y político   en  salud  mental,    lo  que    refleja  un  compromiso  continuo  con  la  garantía  de  los  derechos   humanos  y el bienestar  integral  de  su  población.  Este  proceso ha    evolucionado desde  un   modelo  netamente  biomédico,  pasando  a  modelos  biopsicosociales  integradores,  y   fortaleciéndose con marcos más comprensivos ,   como el del campo de la salud mental, al   expandir la comprensión e intervención de la salud mental en las polí ticas públicas, más allá   de la enfermedad y más allá del sector sanitario, para atender las crecientes necesidades   de salud mental de la población .     En  el  ámbito  internacional,  la  salud  mental  fue  reconocida  como  un  derecho   fundamental  en  la  Constitución  d e  la  OMS  en  1948.  Posteriormente,    en    la  Conferencia   Internacional sobre Atención Primaria de Salud, celebrada en Alma Ata en 1978,  se  reafirmó                                                                   2     Siguiendo  el  Procedimiento  de  Formulación  de  las  Políticas  Públicas  del  Sector  Salud  y  Protección  Social   (GPPP01).   \n8                    la necesidad de integrar la salud mental en los servicios de atención primaria, reconociendo   su impacto tanto ind ividual como comunitario.    En  d iversos    marcos     se   ha     reforzado  la necesidad  de  adoptar  enfoques  integrales  en  la   atención  en  salud  mental.  En  1991,  la  Resolución  46/119  de  la  Asamblea  General  de  las   Naciones Unidas estableció los  “Principios para la protecci ón de los enfermos mentales y   el mejoramiento de la atención de la salud mental” , que Colombia adoptó ese mismo año.   En 2019, la Resolución CD49.17 de la OPS/OMS instó a los países a priorizar la salud mental   en sus políticas e hizo énfasis en la protecció n de los derechos humanos de las personas con   trastornos mentales.    El  Informe  de  Desarrollo  Humano  2016,  del  Programa  de  las  Naciones  Unidas  para  el   Desarrollo (PNUD) ,   y los  o bjetivos de  d esarrollo  s ostenible (ODS), especialmente el ODS 3:   Salud y bienestar, reafirmaron la salud mental como parte integral del bienestar y desarrollo   humano.     Específicamente,  la  Convención  sobre  la  Eliminación  de  Todas  las  Formas  de   Discriminación contra la Mujer (Cedaw , por su sigla en inglés) de 1979 y la Plataforma de   Acción  de  Beijing de 1995  reconocieron  el derecho  de  las  mujeres  a  acceder  a  un  estado   óptimo de salud física y mental, con especial énfasis en la eliminación de la discriminación   en el ámbito de la aten ción sanitaria.    De manera similar, la  Convención sobre los Derechos de las Personas con Discapacidad   de 2006  (ratificada por Colombia con la Ley 1346 de 2009)  tiene el propósito   de promover ,    proteger    y  asegurar  el  goce  pleno  y  en  condiciones  de  igualdad  de     todos    los  derechos   humanos  y libertades fundamentales por   todas las personas con discapacidad,  y promover   el respeto de su dignidad inherente .    En el ámbito nacional, Colombia ha adoptado un enfoque progresista para abordar las   necesidades  de  salud  mental    de  su  población.  Desde  la  década  de  los  setenta,  el  país  ha   implementado  políticas  respaldadas  en  normas  internacionales,  enfocándose  en  la   promoción de la salud mental, la prevención de trastornos y el acceso equitativo a servicios   de calidad.     La Constit ución de 1991, como resultado de la modernización del Estado y de una amplia   participación  ciudadana ,  consagró  el  derecho  irrenunciable  a  la  seguridad  social,   transformando  el  concepto  de  asistencia  pública  y  garantizando  una  protección  especial   para grupo s vulnerables ,   como las mujeres, la niñez, la adolescencia, las personas mayores   y las personas con discapacidad.     La  promulgación  de  las  leyes  60  y  100  de  1993  fue  un  paso  fundamental  en  la   reorganización  y  descentralización  del  sistema  de  salud,  dando  or igen  al  Sistema  de   Seguridad Social Integral en Salud. Estas leyes facilitaron la integración de sectores sociales   y promovieron políticas intersectoriales.   \n9                    La Ley 152 de 1994 estableció el marco normativo para la planificación del desarrollo en   Colombia,    definiendo  los  procedimientos  para  la  creación,  seguimiento  y  control  de  los   planes  de  desarrollo.  Por  su  parte,  la  Resolución  5165  de  1994  fijó  los  criterios  y   procedimientos metodológicos para los planes sectoriales, orientados a mejorar la salud de   la  p oblación  mediante  acciones  de  promoción,  prevención,  asistencia  y  rehabilitación,   abordando los factores condicionantes de la salud en cada jurisdicción.    La distribución de los recursos del Sistema General de Participaciones y las competencias   de  las  entid ades territoriales  en  sectores  como  educación  y  salud  se  precisaron en  la  Ley   715 de 2001, en la que se establece la obligación [para la nación y las entidades territoriales]   de desarrollar un Plan de Atención Básica (PAB) 3   con participación comunitaria y la dirección   del Consejo Territorial de Seguridad Social en Salud (CTSSS). Posteriormente, la Ley 1122 de   2007  introdujo  el  Sistema  General  de  Seguridad  Social  en  Salud  (SGSSS),  con  el  fin  de   mejorar  los  servicios  de  salud,     fortalecer  la  evaluación  por  resultados  y  fomentar  la   participación comunitaria en la toma de decisiones en salud.      Con  la  Ley  1438  de  2011  se  consolidaron  estos  avances  al  unificar  y  actualizar  los   beneficios  del  Plan  Obligatorio  de  Salud  (POS),  fortalec iendo  la  estrategia  de  Atención   Primaria en Salud (APS) y organizando la conformación de los Equipos Básicos de Salud (EBS)   para reducir las disparidades en la atención en salud , s iendo primordial que, en su artículo   65 ,   se estableciera que las acciones de   salud debe ría n incluir la garantía del ejercicio pleno   del derecho a la salud mental de los colombianos y colombianas.    Paralelamente,  se  implementaron  políticas  específicas  para  mejorar  la  cobertura  y   calidad de los servicios de salud mental. Colombia ado ptó su primera Política Nacional de   Salud Mental a través de la Resolución 2358 de 1998, estableciendo las bases para futuras   reformas. La Política Pública del Campo de la Salud Mental de 2007 continuó esta línea, con   un  énfasis  particular  en  los  determina ntes  sociales  de  la  salud.  Después,  la  Propuesta  de   Ajuste  a  la  Política  Pública  de  Salud  Mental  de  2014  y  su  Plan  de  Acción  2014 - 2021   introdujeron  un  enfoque  transectorial  que  incluyó  aspectos  de  protección,  promoción,   prevención, tratamiento y rehabilita ción integral.    Un hito en la protección de los derechos de salud mental fue la sentencia T - 760 de 2008   de la Corte Constitucional, que ordenó  garantizar el   acceso efectivo y oportuno a servicios   de salud mental.  Posteriormente , la Ley Estatutaria 1751   de 2015   consolidó   este enfoque   integral de salud,  estableciendo la   obligación del Estado de respetar, proteger y garantizar   el goce efectivo del derecho a la salud, promoviendo la igualdad de trato y oportunidades   para toda la población. Para ello, el Est ado debe formular y adoptar políticas de salud que   aseguren  una  coordinación  armónica  entre  todos  los  agentes  del  sistema  de  salud  y                                                                   3   El artículo 33 de la Ley 1122 del 2007 establece que el Plan de Salud Pública de Intervenciones Colectivas   remplazará el Plan de Atención  Básica.   \n10                    promuevan  la  salud  mediante  acciones  de  prevención,  atención  de  enfermedades  y   rehabilitación.     Posteriormente, la  Ley 1616   de 2013   estableció directrices integrales para la atención de   salud  mental  en  niños,  niñas  y  adolescentes,  priorizando  la  prevención  y  promoción  del   bienestar  psicológico  desde  edades  tempranas.  Por  su  parte,  la  Ley  Estatutaria  1751  del   2015  amplió  estos    derechos  con  un  enfoque  integral  de  salud,  abarcando  la  promoción,   prevención, atención y rehabilitación en el ámbito mental .   De manera complementaria,  l a   Ley  E statutaria 1618 de 2013   tiene   por objetivo garantizar y asegurar el ejercicio efectivo   de  los  de rechos  de  las  personas  con  discapacidad ,  mediante  la  adopción  de  medidas  de   inclusión, de acciones afirmativas, de ajustes razonables y de la eliminación de toda forma   de discriminación por razón de discapacidad.    En  lo  que  respecta  a  la  población  privada  d e  la  libertad  (PPL),  la  Ley  1709  de  2014   establece  que  deben  tener  acceso  a  todos  los  servicios  del  sistema  general  de  salud,  sin   discriminación  por  su  condición  jurídica,  con  garantía  de  recibir  acciones  de  prevención,   diagnóstico  temprano  y  tratamiento  a decuado  de  todas  las  patologías  físicas  y  mentales,   basadas en el respeto de la dignidad humana.        Por su parte, el artículo 24 de la Ley 65 de 1993, modificado por el artículo 16 de la Ley   1709  de  2014,  garantiza  el  derecho  a  la  rehabilitación  y  al  tratamiento  en  centros   especializados para las personas declaradas inimputables debido a un trastorno mental, así   como para aquellas que padecen un trastorno mental sobreviniente. Adicionalmente, en el   Decreto  040  de  2017  se  dictan  disposiciones  para  la  at ención  en  establecimientos  de   reclusión destinados a inimputables con trastornos mentales permanentes o transitorios de   origen patológico, así como para quienes presentan trastornos mentales sobrevinientes.      Más  recientemente,  la    Resolución  4886  de  2018     ad optó  la  Política  Nacional  de  Salud   Mental,  destacando  el  derecho  a  la  salud  mental  y  promoviendo  el  bienestar  integral,   mientras  que  el  Conpes  3992  de  2020,     Estrategia  para  la    p romoción  de  la    s alud    m ental ,   destacó  la  necesidad  de  una  coordinación  intersect orial  y  el  fortalecimiento  de   competencias socioemocionales, la atención integral y la inclusión social de personas con   problemas y trastornos mentales.    Desde  el  enfoque  de  género,  el  Conpes  4080  de  2022 ,     Política  pública  de  equidad  de   género  para  las    mujeres:  hacia  el  desarrollo  sostenible  del  país ,  resalta  la  importancia  de   proponer estrategias orientadas a implementar intervenciones públicas que favorezcan la   mejora de la salud física y mental de las mujeres, integrando un enfoque de género. Estas   es trategias reconocen los impactos diferenciados que el género tiene sobre la salud mental.   Uno  de  sus  objetivos  es  “generar  intervenciones  públicas  que  mejoren  la  salud  física  y   mental de las mujeres, con el fin de brindarles una mejor calidad de vida”.       Posteriormente,  en  la  Resolución  2138  de  2023  se  establecen  los  lineamientos  para   integrar el enfoque de género en el sector de la salud, con el objetivo de reducir las brechas  \n11                    relacionadas  con  el  sexo,  género,  identidad de  género  y orientación  sexual,  gar antizando   así  el  acceso  y  el  ejercicio  del  derecho  fundamental  a  la  salud.  Ese  mismo  año ,     la  Corte   Constitucional establece ,   mediante la  s entencia T - 321 de 2023 ,   que el derecho a la salud de   las personas trans estaba consagrado como un derecho fundamental  bajo el artículo 49 de   la  Constitución,  y  debía  ser  garantizado  de  manera  integral.  Este  derecho  no  se  limita ba    únicamente a la ausencia de enfermedad, sino que abarcaba el acceso a todos los recursos   y servicios necesarios para alcanzar el más alto nivel  de salud física y mental. La prestación   de estos servicios se debe regir por criterios de calidad, eficacia y oportunidad, con énfasis   en principios como la accesibilidad, disponibilidad, continuidad e integralidad.    Ahora bien, el sector de la salud en Col ombia ha liderado iniciativas claves para abordar   los  determinantes  sociales  de  la  salud,  conforme  a  la  Ley  1438  de  2011,  incluida  la   implementación del Plan Decenal de Salud Pública (PDSP) 2012 - 2021, reglamentado por la   Resolución 1841 de 2013.     En  el  PDSP  2022 - 2031  se  incorpora  un  enfoque  de  derechos  humanos,  equidad  e   interseccionalidad  en  siete  ejes  estratégicos  que  priorizan  la  atención  primaria  y  la   valoración de prácticas ancestrales de grupos étnicos, al tiempo que se abordan las brechas   so ciales,  culturales  y  económicas  para  impulsar  un  desarrollo  humano  sostenible  y   equitativo.      En cuanto a los objetivos de Gobierno, la Ley 2294 de 2023, mediante la cual se expide   el Plan Nacional de Desarrollo (PND) 2022 - 2026: “Colombia, potencia mundial   de la vida”,   insta  en  su  artículo  166  a  la  actualización  de  la  Política  Nacional  de  Salud  Mental  con   acciones transectoriales a mediano y largo plazo, distinguiendo los enfoques poblacional,   interseccional  y  territorial,  haciendo  un  énfasis  claro  en  la  el iminación  del  estigma  y  la   discriminación asociados a la salud mental. Además, propone estrategias para abordar los   determinantes  sociales  de  la  salud  mental  y  promover  la  inclusión  social  de  personas   afectadas por problemas mentales, consumo de sustancias   psicoactivas y violencias.      En el contexto colombiano, marcado por décadas de conflicto armado, es fundamental   reconocer  los  esfuerzos  para  atender  las  necesidades  de  las  víctimas  y  garantizar  sus   derechos. La Ley 975 de 2005 (Ley de Justicia y Paz) y la   Ley 1448 de 2011 (Ley de Víctimas   y Restitución de Tierras) representan un avance significativo   en ese aspecto , pasando de la   asistencia humanitaria a la justicia transicional, antes de la firma del acuerdo de paz entre   el Gobierno y las FARC en 2016. En  este marco, la salud mental es crucial para proteger a   los actores y víctimas directas del conflicto y asegurarles una rehabilitación integral.        A pesar de estos importantes avances, Colombia enfrenta desafíos persistentes, como la   estigmatización, la ins uficiencia de recursos y las barreras de acceso en el ámbito de la salud   mental,  que  evidencian  la  necesidad  de  una  colaboración  continua  entre  el  Gobierno,  la   sociedad civil y las organizaciones internacionales para garantizar que todas las personas,  \n12                    espe cialmente las más vulnerables, tengan acceso equitativo a servicios de salud mental de   calidad.        2.2 Marco conceptual    Salud mental    La  Ley 1616 de 2013 4   define la salud mental como  “un estado dinámico que se expresa en   la vida cotidiana a través del  comportamiento y la interacción de manera tal que permite a   los  sujetos  individuales  y  colectivos  desplegar  sus  recursos  emocionales,  cognitivos  y   mentales  para  transitar  por  la  vida  cotidiana,  para  trabajar,  para  establecer  relaciones   significativas y par a contribuir a la comunidad.    La  s alud  me ntal es de interés y prioridad nacional para la República de Colombia, es   un derecho fundamental, es tema prioritario de salud pública, es un bien de interés público   y es componente esencial del bienestar general y e l mejoramiento de la calidad de vida de   colombianos y colombianas” 5 .    En  el  proceso  de  actualización  de  la  PNSM,  se  implementó  una  estrategia  de   participación que amplió la comprensión de este concepto, integrando las perspectivas de   diversos actores,  incluidos los entes territoriales, la ciudadanía, el Consejo Nacional de Salud   Mental  y  otros  grupos  de  interés.  La  definición  resultante  no  pretende  sustituir  la   establecida  en  la  mencionada  ley,  sino  complementarla,  enriqueciéndola  con  una  visión   inclusi va que reconoce la diversidad de realidades y necesidades sociales, especialmente de   las poblaciones más vulnerables.    Según  lo  consensuado  en  los  espacios  de  participación  durante  el  proceso  de   actualización  de  la  Política  Nacional  de  Salud  Mental,  la    definición  de  salud  mental  se   complementa de la siguiente manera:    Es  u n  derecho  fundamental,    u na  capacidad  y  responsabilidad  personal,  familiar,   colectiva  (grupos,  instituciones  y  sociedad  en  general)  y  del  Estado,  relativa,   observable,  interdependiente,  f uncional,  física,  social,  ambiental,  productiva,   contextual y diferencial, que promueve los medios adecuados para el disfrute pleno de   la salud, el bienestar integral y psicosocial, en el curso y trayectoria de vida, que incluye   experiencias  afectivas,  emo cionales,  cognitivas,  conductuales  y  espirituales  de  cada   cual, en su tránsito por su proyecto, plan de vida o existencia. La salud mental es más                                                                   4   Por medio de la cual se expide la Ley de Salud Mental y se dictan otras disposiciones.   5     Ley  1616  de  2013,    a rtículo    3 . ° .     Salud  mental.  La  salud  mental  se  define  como  un  estado  dinámico  que  se   expresa  en  la  vida  cotidiana  a  través  del  comportamien to  y  la  interacción  de  manera  tal  que  permite  a  los   sujetos individuales y colectivos desplegar sus recursos emocionales, cognitivos y mentales para transitar por   la vida cotidiana, para trabajar, para establecer relaciones significativas y para contribuir   a la comunidad. La   salud mental es de interés y prioridad nacional para la República de Colombia, es un derecho fundamental, es   tema prioritario de salud pública, es un bien de interés público y es componente esencial del bienestar general   y el mejoramien to de la calidad de vida de colombianos y colombianas.   \n13                    que  la  ausencia  de  problemas  y  trastornos  mentales,  neurológicos  y  del   comportamiento;  es  la  búsqueda  de  la  di gnidad  y  del  sentido  positivo  de  la  vida,  la   construcción  del  bienestar  propio,  familiar  y  comunitario,  condición  indispensable   para la salud integral, el desarrollo social y el buen vivir.      Es relevante precisar que la responsabilidad en la promoción y m antenimiento de la   salud mental es compartida; no depende exclusivamente del individuo o de una entidad,   sino  que  implica  el  compromiso  activo  de  toda  la  sociedad  en  alcanzar  este  objetivo   común.            Otros conceptos fundamentales    Para iniciar la aproximación conceptual,  soberanía sanitaria   implica la capacidad de un   país para garantizar el acceso equitativo a los servicios de salud, promoviendo tanto la salud   física  como  el  bienestar  psicosocial.  La  salud  mental  es  esencial  en  este     proceso,  y  su   promoción  es  crucial  para  lograr  una  distribución  justa  de  los  recursos  en  salud,   especialmente tras la pandemia de  la  covid - 19 (Gómez y Arias, 2022; Minciencias, 2023). La   Comisión Interamericana de Derechos Humanos (CIDH) ha hecho un llama do a los  e stados   para que garanticen el acceso a los servicios de salud mental, combatan la estigmatización   asociada  a  estos  servicios  y  adopten  un  enfoque  integral  que  tenga  en  cuenta  los   determinantes sociales de la salud (Basile, 2020; 2023).    En este ma rco, los   determinantes sociales de la salud mental   son factores complejos y   entrelazados, organizados en intermedios y estructurales. Las condiciones adversas, como   la  pobreza,  la  violencia  y  la  desigualdad,  incrementan  el  riesgo  de  trastornos  mentales,   es pecialmente durante los periodos más vulnerables de la vida, como la primera infancia.   Particularmente,  en  áreas  urbanas,  la  falta  de  actividad  física  y  las  malas  condiciones   ambientales también impactan negativamente la salud mental (Leiva - Peña, 2021).       En Colombia, la falta de acceso a servicios de salud mental de calidad y la estigmatización   dificultan  la  búsqueda  de  ayuda,  agravado  por  desigualdades  en  educación  y  economía.   Factores como la crisis económica y la polarización social  afectan   el bienesta r psicológico.   Sin embargo, desarrollar habilidades emocionales, fomentar entornos seguros y promover   redes de apoyo son estrategias que pueden fortalecer la resiliencia, haciendo necesaria una   intervención intersectorial para abordar esta complejidad.    El    modelo propuesto en  el  Plan Decenal  de  Salud  Pública 2022 - 2031  reconoce que  los   determinantes  sociales  varían  según  las  características  de  cada  país  y  subraya  la   importancia de la equidad, la paz y la justicia social, orientados por los derechos humanos,   r esaltando  la  necesidad  de  políticas  públicas  para  mejorar  la  salud  general  y  reducir  las   condiciones que favorecen las inequidades y violencias (MSPS, 2022).   \n14                    Desde la perspectiva de la  determinación social de la salud   se reconoce que los modos   y condicione s de vida se configuran a partir de la historia social de las comunidades y sus   territorios; los procesos sociales resultantes moldean los comportamientos, producto de las   interacciones  entre  las  personas  y  la  sociedad dentro de un  marco  cultural  determina do.   Así, los límites entre lo biológico y lo social se atenúan, permitiendo garantizar la vida y el   bienestar  de  las  personas  y  comunidades  mediante  una  comprensión  dinámica     de     las   relaciones  sociales,  económicas,  políticas,  ambientales  y  culturales  porque   producen   condiciones de vida, y estas determinan la salud, enfermedad o muerte fuera de una lógica   de estas como objeto del mercado (Breilh, 2013).      Como  parte  de  un  proceso  de  transición  hacia  democracias  más  inclusivas,  es   fundamental avanzar hacia un m odelo de salud mental integral que reconozca el derecho a   la salud y la vida. Este enfoque se fortalece a través de la intersectorialidad, promoviendo   la creación y el mantenimiento de vínculos dentro y fuera del sistema de salud, abarcando   sectores  como  e mpleo,  educación,  vivienda,  agricultura,  producción  y  distribución  de   alimentos, medio ambiente, agua y saneamiento, protección social y planificación urbana   (OPS/OMS, 2007).    En   consonancia  con lo mencionado, el  desarrollo humano social   se centra en mejorar la   calidad  de  vida  y  contribuir  al  crecimiento  económico  mediante  la  eliminación  de   privaciones  fundamentales  como  la  pobreza  y  la  falta  de  oportunidades     (Sen,  1999) .  La   visión  integradora  del  desarrollo  humano  debe  transformar  la  est ructura  de  poder  y   reconocer el papel de la democracia y la multiculturalidad en la construcción de una  n ación   con soberanía sanitaria (Breilh, 2020).     La   Atención Primaria en Salud (APS)   como estrategia  tiene un papel fundamental en la   promoción     de  la  sal ud  mental     y  prevención  de    problemas  y    trastornos  mentales,  y  en  la   facilitación  del  acceso  a  servicios  especializados  cuando  sea  necesario.  Además,  hace   énfasis en la participación social, la organización de servicios de salud y la recuperación de   las  pers onas  en  sus  entornos  comunitarios.  Entre  sus  propuestas  más  ambiciosas  está  la   transición  desde  la  reclusión  de  personas  con  problemas  mentales  en  hospitales   psiquiátricos hacia una atención digna y de calidad en la comunidad. Esta orientación hacia   la  rec uperación  empodera  a  las  personas  para  que  tomen  control  de  su  propia  vida,   apoyando  a  individuos,  familias  y  comunidades  a  la  hora  de  construir   esperanza,   autoestima,  resiliencia,  relaciones  saludables,  recuperar  independencia  y  tener  una  vida   significativa (OPS, 2023).        La    salud  mental  comunitaria     aborda  los  problemas  de  salud  mental  de  una  manera   integral, colocando en el centro de su atenció n las condiciones emocionales y sociales en   las  que  se  encuentran  las  personas,  familias  y  comunidades.  Desde  allí,  se  plantean   propuestas  de  intervención  que  se  orienten  a  la  recuperación  y  fortalecimiento  de  las   relaciones  sociales  que  se  identifican  com o  fragmentadas,  fomentando  la  participación  \n15                    universal  de  la  comunidad  en  la  construcción  de  espacios  y  relaciones  de  bienestar   (Proyecto AMARES, 2006). Este modelo promueve la mejora continua de las condiciones de   vida  comunal  y  de  la  salud  mental,  mediant e  actividades  de  protección  y  promoción,   prevención  de  malestares  psicosociales,  y  reparación  de  los  vínculos  dañados  por  la   pobreza, la inequidad y los efectos del conflicto armado; todo esto con la comprensión, el   acuerdo y la participación activa de la  comunidad (Ministerio de salud y Protección Social,   2016). Implica la descentralización de los servicios de salud, la participación comunitaria, el   trabajo colaborativo con líderes comunitarios y la provisión de servicios complementarios   de APS en la comun idad. Es importante señalar también, la participación de las asociaciones   de  familiares  y  personas  con  discapacidad  psicosocial,  asociaciones  que  deben  participar   como protagonistas en la planificación de servicios según sus necesidades (Rosa - Dávila et   al . ,   2020).    Por otro lado, el  bienestar psicosocial   se refiere al equilibrio y  la  armonía en la vida de   una  persona,  donde  se  experimenta  satisfacción  en  aspectos  psicológicos,  emocionales,   sociales y espirituales .   Es un estado en el que el individuo es consc iente de sus capacidades,   puede afrontar las tensiones normales de la vida, trabajar de forma productiva y contribuir   a su comunidad (OMS, 2004).    Resulta  de  especial  importancia  señalar  que  la    salud  mental  es  un  espectro     y  no  una   dicotomía entre “sano” y “ enfermo”. Existen diferencias sutiles entre los términos utilizados   para referirse a las alteraciones de la salud mental, y con frecuencia se emplean de manera   intercambiable en el lenguaje cotidiano. Por ejemplo, las afecciones de la salud mental, o   probl emas de salud mental, se refieren a un término amplio que abarca a las personas con   trastornos  mentales  y  discapacidades  psicosociales,  así  como  otros  estados  mentales  no   patológicos  asociados  a  malestar  psicológico  o  angustia  significativa;  el  término  tam bién   engloba a las personas con discapacidad funcional o en riesgo de conducta autolesiva (OMS,   2023).     En este documento, se utilizará el término  “ problema de salud mental ”   para referirse a   cualquier situación que afecte la salud mental de una persona,   usualmente de intensidad   leve o moderada ,   secundaria a un acontecimiento vital negativo, una dificultad o deficiencia   de  adaptación   situacional  o  una  situación  de  estrés  familiar  o  interpersonal,  o  una   insuficiencia en el apoyo social o los recursos perso nales, u otro problema relacionado con   el contexto en que se han desarrollado alteraciones experimentadas por una persona.   Se   empleará   el  término  más  específico  de  “ trastornos  mentales ”   para  referirse  a  las   condiciones clínicas que afectan el pensamiento,  el estado de ánimo, el comportamiento y   la  capacidad  de  una  persona  para  funcionar  en  su  vida  diaria;  los  trastornos  mentales   pueden variar en su gravedad y afectar diferentes áreas de la vida de una persona, pueden   ser temporales o crónicos   y el t é rmino e s  equivalente al de enfermedad mental .  Se entiende  \n16                    así que los problemas mentales se diferencian de los trastornos mentales en la gravedad de   la sintomatología y en el grado de la disfuncionalidad psicosocial que originan.     Ahora  bien,  también  es  necesario   distinguir  entre  trastornos  neurológicos,   neuropsiquiátricos y del neurodesarrollo . Los trastornos neurológicos son enfermedades   que afectan el sistema nervioso central o periférico ,   que pueden manifestarse en problemas   motores, sensoriales o cognitivos.    Es común que muchos trastornos neurológicos puedan   tener  manifestaciones  psiquiátricas  (por  ejemplo,  demencia,  epilepsia,  enfermedad  de   Parkinson).  Se   estima que entre el 20 y 30   %   de las personas con epilepsia experimentan   algún trastorno psiquiátrico en  algún   momento de su vida , favoreciendo mala adherencia y   disminuyendo bienestar .    Por  su  parte,  los  trastornos  neuropsiquiátricos  son  enfermedades  médicas  que   comprometen  al  sistema  nervioso  y  también  generan  alteraciones  de  la  salud  mental  al   presentar  sim ultáneamente  síntomas  cognitivos,  afectivos  o  conductuales.  Estas   condiciones  pueden  tener  diversas  causas,  incluyendo  la  genética,  desbalances  químicos,   trauma cerebral y enfermedades del sistema nervioso.     En cuanto a los trastornos del neurodesarrollo,  son variaciones biológicas de los circuitos   cerebrales  que  pueden  generar  funcionamientos  distintos,  los  cuales  configuran  un   espectro  de  individuos  que  pueden  estar  entre  “la  normalidad”  y  la  disfunción  severa,   llegando a configurar en algunos casos un tr astorno. Se  manifiestan   generalmente desde la   infancia y suelen acompaña r   a la persona a lo largo de su vida, como ocurre con el autismo,   el trastorno por déficit de atención e hiperactividad y las discapacidades del aprendizaje.    Finalmente,  la  actualizaci ón  de  la  PNSM    hace  especial     énfasis  en  la  prevención  del   suicidio. El comportamiento suicida se entiende como un espectro de conductas, desde el   intento de suicidio y las conductas preparatorias hasta el suicidio completo, definidos en la   Estrategia Nacion al para la Prevención de la Conducta Suicida en Colombia del Ministerio   de  Salud  y  Protección  Social  (2021).  Scheidman  (1971)  y  Heeringen  (2011)  (citados  por   MSPS, 2021) plantean que el propósito común del suicidio es buscar una solución; por tanto,   el sui cidio no es un acto al azar, y no se realiza sin sentido o propósito. Así mismo, según   Guiluz, Córdova y Rosales (2010, citados por MSPS, 2021), las conductas que forman parte   del proceso suicida son influenciadas por la interacción con el medio, por lo qu e la principal   explicación de la conducta suicida es la predisposición o vulnerabilidad, en interacción con   factores estresantes.          Se resalta en la política el problema del estigma, entendido como aquellas situaciones que   inhabilitan a personas,  familias y comunidades para la plena aceptación social y desarrollo   de sus derechos. El estigma es una construcción cultural negativa con base en estereotipos   y prejuicios, los cuales pueden llegar a generar conductas discriminatorias hacia personas y   grup os específicos. Uno de los más resistentes al cambio, lo constituye el estigma asociado   a  los  problemas  y  trastornos  mentales,  por  parte  del  personal  de  salud  y  los  entornos  \n17                    sanitarios,  ámbito  en  los  que,  idealmente,  no  debería  existir  ningún  prejuicio  o   d iscriminación por ninguna razón. El estigma constituye una barrera significativa para que   las  personas  busquen  oportunamente  atención  médica,  se  adhirieran  a  tratamientos  y   participen  plenamente  en  la  sociedad.  Adicionalmente  se  presentan  situaciones  de  au to   estigma, lo cual hace que las personas eviten buscar ayuda por miedo al rechazo y no querer   ser etiquetadas.       2.3 Principios    La Política Nacional de Salud Mental (PNSM)    s e sustenta en un conjunto de principios   orientadores que garantizan su implementaci ón coherente, inclusiva y efectiva:    ●   Universalidad:     Establece  que  toda  persona  y    toda    comunidad  tiene  derecho  al   disfrute de la salud mental como derecho fundamental, sin discriminación alguna.      ●   Solidaridad:   Promueve  la  acción  conjunta  entre  ciudadanía,  organizaciones  e   instituciones  para  el  desarrollo  individual  y  colectivo,  priorizando  a  quienes   enfrentan desventajas en el ejercicio de este derecho a la salud mental.      ●   Interdependencia:     Reconoce  la  necesida d  de  cuidado  mutuo  y  equitativo  entre   seres  humanos,  otros  seres  vivos  y  el  entorno,  resaltando  la  conexión  con  la   naturaleza y el bienestar colectivo.    ●   Interculturalidad:  Garantiza el respeto por la diversidad cultural del país, integrando   saberes  y  prácti cas  tradicionales  en  la  promoción,  prevención,  tratamiento  y   rehabilitación de la salud mental.    ●   Pensamientos propios y armonías:  Valora los saberes ancestrales de los pueblos y   comunidades éticas, orientando sus acciones hacia la restauración de la armonía   y   el equilibrio entre territorio, comunidad y prácticas culturales.    ●   Participación:    Fomenta  la  intervención  activa  de  actores  sociales    con  capacidad,   habilidad  y  oportunidad  para  la  identificación  de  problemas,  definición  de   prioridades y formulación de p ropuestas para fortalecer la salud mental.    ●   Igualdad  y  no  discriminación:     Asegura  que  todas  las  personas  sean  tratadas  con   respeto  y  dignidad,  garantizando  el  ejercicio  de  sus  derechos  en  igualdad  de   condiciones 6 .    ●   Progresividad  y  no  regresividad:    Propicia  l a  expansión  gradual  y  continua  de   servicios,  tecnologías  y  capacidades  en  salud  mental,  reduciendo  las  brechas   existentes y protegiendo los logros alcanzados.                                                                    6   Según el artículo 13 de la Constitución Política de Colombia, “Todos los seres humanos nacen libres e   iguales en dignidad y derechos”.   \n18                    ●   Corresponsabilidad:  Establece el deber compartido entre individuos, comunidades   y  el  Estado  para    cuidar  la  salud  mental  (desde  el  cuidado  propio  y  el  cuidado   colectivo) y promover un entorno sano y sostenible.    ●   Concurrencia:     Facilita  la  coordinación  y  articulación  entre  instituciones  públicas  y   privadas, así como actores sociales, para el diseño e impl ementación de acciones en   salud mental.      ●   Integralidad:    Concibe  la  salud  mental  como  un  proceso  multifactorial  que  integra   las  dimensiones  biológica,  psicológica,  social  y  espiritual,  destacando  que  no  hay   salud sin salud mental.     ●   Promoción  de  la  autonomía :     Defiende  la  capacidad  de  las  personas  para  tomar   decisiones informadas sobre su salud mental, respetando sus valores y preferencias.   Entraña  el  derecho  de  autodeterminación  y  de  actuar  de  acuerdo  con  valores,   creencias y preferencias propios.    ●   Subsidiarie dad:  Permite  la  intervención  temporal  de  entidades  públicas  o   comunitarias  para  garantizar  la  prestación  de  servicios  cuando  las  entidades   responsables no puedan hacerlo.    ●   Equidad:    Impulsa acciones dirigidas a reducir desigualdades evitables, asegurando   que   todos  tengan  acceso  equitativo  a  la  salud mental,  con  especial  atención  a  los   grupos vulnerables y de personas de especial protección.     ●   Continuidad:     Garantiza  que  los  servicios  de  salud  mental  se  brinden  de  manera   continua, protegiendo a las personas de i nterrupciones por motivos administrativos   o económicos.    ●   Oportunidad:    Exige  la  prestación  oportuna  de  servicios  y  tecnologías  de  salud   mental, respondiendo sin dilaciones a las necesidades de la población.    ●   Libre  elección :  Respeta  la  libertad  de  las  personas     para  elegir  sus  prestadores  de   servicios de salud dentro de la oferta disponible, según las normas de habilitación.    ●   Sostenibilidad :  Asegura  la  disponibilidad  de  recursos  suficientes  para  garantizar   progresivamente  el  derecho  a  la  salud  mental,  conforme  a  los  principios  de   sostenibilidad fiscal.    ●   Eficiencia : El sistema de salud debe velar por la mejor utilización social y económica   de los recursos, servicios y tecnologías disponibles, para garantizar el derecho a la   salud mental de toda la población.    ●   Dignida d  humana:    Derecho  que  poseen  todas  las  personas  de  poder  vivir  con   reconocimiento  y  seguridad,  de  verse  libres  de  explotaciones,  violencias  y  malos   tratos,  y  de  abogar  por  la  humanización  en  la  atención  en  salud,  la  calidad  de  los   servicios  y  de  los  tratam ientos  mediante  recursos  accesibles  y  personal  calificado   para brindar la atención en salud mental.   \n19                    ●   Intersectorialidad:     Impulsa  la  colaboración  entre  distintos  sectores  institucionales   para  abordar  de  manera  integral  y  coordinada  los  problemas  de  salud  men tal.   Reconoce  que  estos  desafíos  son  multifacéticos  y  requieren  la  articulación  de   políticas  y  acciones  conjuntas  que  consideren  factores  económicos,  sociales  y   culturales, con el fin de generar un impacto estructural y sostenible en el bienestar   mental.    ●   T ransectorialidad:   Fomenta una integración flexible y participativa que trasciende   las estructuras sectoriales tradicionales, involucrando activamente a comunidades,   territorios y actores diversos. Destaca la importancia de incluir y valorar los saberes   loc ales  y  las  prácticas  comunitarias  en  la  formulación  e  implementación  de   estrategias,  ofreciendo  respuestas  contextualizadas  y  holísticas  a  problemas   complejos como el suicidio, la violencia, las adicciones y otros trastornos mentales.        2.4 Enfoques    La salud mental se concibe mediante la integración de diversos enfoques que permiten   construir  una  visión  integral  del  bienestar,  así  como  establecer  las  formas  de  cuidado  y   protección  adecuadas  para  las  poblaciones.  Para  lograrlo,  es  necesario  incorporar   perspectivas  sociales,  culturales,  estatales,  demográficas,  psicológicas  y  estructurales,   necesarias para garantizar una atención efectiva, particularmente para los grupos en mayor   condición de vulnerabilidad.     En cumplimiento del artículo 166 de la Ley 22 94 de 2023, la Política Nacional de Salud   Mental amplía y profundiza estos enfoques con el propósito de responder a las realidades   de las distintas poblaciones, como se detalla a continuación:       Derechos humanos    Prioriza la transformación de prácticas discr iminatorias y estructuras de poder desiguales   que  limitan  el  acceso  a  la  atención,  así  como  las  acciones  de  promoción  y  prevención  en   salud mental. Se reconoce que factores sociales como la pobreza, la violencia, el racismo,   el  desplazamiento,  la  estigmati zación,  la  alta  carga  de  enfermedades  crónicas  no   transmisibles  y  la  aporofobia  aumentan  los  riesgos  asociados  a  los  problemas  de  salud   mental.     La  PNSM  está  orientada,  entre  otros  grupos,  a  personas  que  enfrentan  trastornos   mentales,    discapacidad,    sufrimi ento  emocional  y  a  las  víctimas  de  diversas  formas  de   violencia, incluidas las basadas en género, la sociopolítica y en entornos educativos; en ese   sentido,  la  adopción  de  este  enfoque  exige  tratar  a  estas  personas  con  compasión,   reconociendo  su  dolor  y  re spetando  su  dignidad  ( Oficina  del  Alto  Comisionado  para  los   Derechos Humanos , 20 20 ).      \n20                    Curso de vida    Reconoce que la salud mental se desarrolla y cambia a lo largo de las etapas de la vida,   considerando los factores sociales, culturales, familiares y ambientales que influyen en el   bienestar de las personas. Destaca que las intervenciones tempranas no solo   benefician el   desarrollo a largo plazo, sino que también previenen problemas en generaciones futuras,   ya que el mayor beneficio en un momento vital proviene de intervenciones realizadas en   etapas  previas  (MSPS,  2015).  La  salud  mental  se  entiende  como  en  c onstante  evolución,   desarrollada de manera dinámica a lo largo del tiempo y entre generaciones, lo que permite   comprender  mejor  cómo  se  perpetúan  y  transmiten  las  inequidades  sociales  en  salud  y   cómo estas pueden mitigarse o superarse.     La PNSM busca imple mentar estrategias de alto impacto basadas en evidencia y en un   enfoque de derechos, aplicando una perspectiva que aborde la salud mental en su contexto   actual, con el propósito de garantizar la dignidad de las personas en cada etapa del curso   de  vida  [pri mera  infancia,  infancia,  adolescencia,  juventud,  adultez  y  vejez].  Aunque  se   establece  la  importancia  de  un  comienzo  saludable,  también  se  enfatiza  que  nunca  es   demasiado tarde para mejorar la salud mental (Halfon et al., 2018).    Niños,  niñas  y  adolescentes :    Los  niños,  las  niñas  y  los/as  adolescentes  son  sujetos  de   atención integral y preferente en salud mental, de conformidad con él Código de la Infancia   y  la  Adolescencia,  ley  1098  de  2006,  en  modalidad  específica  y  garante  de  la  atención   oportuna, suficien te, continua, pertinente y de fácil accesibilidad. Esto porque la población   de niños, niñas y adolescentes presenta una alta vulnerabilidad en materia de salud mental,   por  la  etapa  del  neurodesarrollo  en  la  que  se  encuentran  y  por  lo  que  se  encuentran   expu estos en mayor medida a problemas de salud pública como las conductas autolesivas   y el consumo de sustancias psicoactivas.    Jóvenes :    La  población  joven  está  expuesta  a  problemáticas  de  autolesión,  trastorno   mental,  uso  de  sustancias  psicoactivas,  violencias ,  desigualdad  social,  pobreza  y  diversas   condiciones ambientales de vulnerabilidad que limitan una adecuada salud mental. Esta es   una  población  que  se  desenvuelve  ampliamente  en  ambientes  digitales  en  donde  se   requiere un ejercicio de la protección integra l y el uso seguro y saludable, porque a través   de  estos  se  ve  expuesta  al  estigma,  discriminación,  violencias,  inducción  al  suicidio,   trastornos de salud mental y otros riesgos.    Personas  mayores :     Este  es  un  grupo  poblacional  en  el  que  se  suelen    infravalorar  los   padecimientos  de  salud  mental.    Así  mismo,  es  una  población  sobre  la  que  recae  la   estigmatización asociada a alteraciones derivadas del proceso de envejecimiento, también   la  prevalencia  de  trastornos  depresivos  y  de  ansiedad,  siendo  partic ularmente  un  grupo   vulnerable  debido  a  las  transiciones  y  desafíos  relacionados  con  la  estabilidad  laboral,  la   salud  (mayor  prevalencia  de  enfermedades  crónicas  y  demencias),  las  responsabilidades   familiares, aislamiento social y la soledad.  Lo que hace a   esta población susceptible de altas  \n21                    tasas  de  mortalidad  por  suicidio,  ansiedad  y  depresión,  trastornos  y  desenlaces  que  se   pueden  transformar  bajo  un  enfoque  de  envejecimiento  saludable  y  estrategias  de   Rehabilitación  Basada  en  Comunidad,  grupos  de  apoyo    y  programas  de  ayuda  mutua  y   empoderamiento de las personas mayores, las familias y cuidadores.       Poblacional    Es  una  perspectiva  que  orienta  la  comprensión  y  atención  integral  de  las  personas  y   comunidades,  con  una  mirada  integral  e  interseccional,    reconociendo  sus  características   individuales y colectivas en relación con su contexto social, cultural, económico y territorial.   Este  enfoque  identifica  inequidades  y  particularidades  de  diversos  grupos  poblacionales,   como  la  edad,  la  pertenencia  étnica,    la  procedencia,  la  situación  social,  entre  otras,  para   diseñar  acciones  que  promuevan  el  bienestar,  la  salud  mental,  el  desarrollo  humano  y  la   garantía de derechos.    Busca establecer políticas públicas equitativas y efectivas que respondan a las demandas   de     salud  mental  de  diferentes  poblaciones,  considerando  sus  modos  de  vida,  creencias  y   realidades, y fortaleciendo su bienestar integral en un marco de justicia social :    Étnico :   De acuerdo con el Plan Decenal de Salud 2022 - 2031, valora la diversidad étnica y   cultural de Colombia, reconociendo las identidades colectivas e individuales, así como las   cosmovisiones y prácticas tradicionales de las comunidades étnicas. Rechaza las doctrinas   y prácticas que promueven la superioridad de ciertos grupos por razones de    origen, raza,   religión  o  cultura,  calificándolas  como  racistas  y  socialmente  injustas  (Comisión  para  el   Esclarecimiento de la Verdad, 2018).    El  racismo,  tanto  explícito  como  implícito,  afecta  gravemente  el  bienestar  psicosocial,   generando  estrés  crónico,  l o  que  incrementa  el  riesgo  de  trastornos  mentales  y  otras   enfermedades  no  transmisibles.  La  internalización  de  estereotipos  negativos  reduce  la   autoestima  y  aumenta  la  incidencia  de  depresión  y  riesgo  suicida,  mientras  que  la   discriminación  y  el  aislamient o  debilitan  redes  de  apoyo  esenciales  para  la  salud  mental   (Williams et al., 2019). Además, la pérdida de referentes territoriales y culturales, derivada   de actividades extractivas, la falta de oportunidades y servicios básicos, el conflicto armado   y la ma rginalización, profundizan el estrés y el malestar mental en las comunidades étnicas   (Guzmán et al., 2022). Este enfoque busca superar las desigualdades históricas y garantizar   el acceso equitativo a servicios de salud mental para pueblos indígenas, afroco lombianos,   raizales, palenqueros y Rrom, mediante:    i)   El  reconocimiento  y  valoración  de  sus  cosmovisiones,  costumbres  y  saberes   tradicionales.    ii)   La lucha contra el racismo estructural y las desigualdades históricas.   \n22                    iii)     La  comprensión  de  las  necesidades  específicas     de  cada  grupo  en  salud  mental,   considerando factores sociales, culturales y ambientales.    iv)     El fortalecimiento de la medicina tradicional y comunitaria a través de sabedores y   sabedoras.    v)   La promoción de un diálogo intercultural entre la medicina occidental y   las prácticas   propias  de  salud,  basado  en  la  complementariedad  de  saberes,  tratamientos  y   terapias.    vi)     La integración del enfoque étnico en todas las políticas de salud.    vii)   La participación activa de los grupos étnicos en la toma de decisiones sobre su salud   me ntal y en el seguimiento de las políticas públicas, respetando su autonomía.    Población campesina :  Corresponde a la población que vive en las zonas rurales del país   y que por la brecha entre lo urbano y lo rural, por el acceso geográfico en zonas rurales y   dispersas del país o incluso por escenarios de discriminación y/o marginación económica,   presenta  barreras  de  acceso  a  la  oferta  de  servicios  de  salud  mental.  De  esta  manera,  al   focalizar acciones en esta población se busca implementar estrategias intersec toriales para   garantizar el acceso a los servicios de salud mental, la adecuación de la atención de acuerdo   con los entornos y optimizar la distribución de medicamentos psiquiátricos y neurológicos   en zonas rurales, en consonancia con el Plan Nacional de S alud Rural.      Personas trabajadoras :  La población trabajadora incluye a todas las personas empleadas   en los sectores público y privado, tanto dependientes como independientes, bajo cualquier   modalidad de contrato, así como a los estudiantes afiliados al    Sistema General de Riesgos   Laborales, los trabajadores en misión y el personal civil de la Fuerza Pública, de acuerdo con   lo establecido en la Resolución 2764 de 2022. Se presta especial atención al talento humano   que  desempeña  labores  en  el  ámbito  de  la  s alud,  incluida  la  salud  mental,  incluso  en   sectores distintos al de la salud.    Interculturalidad :   Lo intercultural implica una ruptura respecto a las visiones unilaterales   que discriminan y generan estigma.   Esto implica que las acciones desarrolladas se adaptan   a  las  condiciones  territoriales  y  del  medio,  contribuyendo  a  la  despatologización  y   desmedic alización de otras perspectivas culturales.         Mujeres, género y diversidad    Analiza  cómo  las  diferencias  de  sexo  y  los  constructos  sociales  asociados  al  género   afectan  diversos  aspectos  de  la  vida  de  las  personas  en  ámbitos  económicos,  políticos,   psicológicos, culturales y jurídicos, identificando brechas y patrones de discriminac ión.      La transversalización del enfoque de género es esencial para comprender y abordar las   inequidades  de  manera  integral.  Las  normas  de  género  socialmente  interiorizadas   perpetúan  estereotipos  y  roles  tradicionales  que  influyen  en  las  experiencias  y  los   \n23                    comportamientos de las personas, lo que justifica la necesidad de adoptar políticas públicas   orientadas a la igualdad. El objetivo central es transformar las estructuras que perpetúan   desigualdades de género y promover sociedades más equitativas. En este  sentido, es crucial   analizar  cómo  las  relaciones  de  género  afectan  la  salud  mental  en  personas  de  sectores   LGBTIQ+,  quienes  enfrentan  condiciones  particulares  de  discriminación.  Las  mujeres,  por   ejemplo,  reportan  más  cuadros  de  depresión  y  ansiedad  debido    a  violencias  de  género  y   cargas  de trabajo  no  remunerado.  Los  hombres,  por  otro lado, pueden estar  expuestos a   problemas  de  salud  mental  por  la  represión  emocional  promovida  por  los  modelos  de   masculinidad hegemónica.    La atención en salud mental desde un e nfoque de género debe identificar estos riesgos   psicosociales  particulares,  y  generar  estrategias  que  permitan  el  cierre  de  brechas  y  el   cuidado oportuno de la salud mental.       Diferencial por situación y condición    Permite obtener  y difundir  información  sobr e  grupos  poblacionales  con características   particulares,  facilitando  la  implementación  de  acciones  orientadas  al  cuidado  de  la  salud   según  el  nivel  y  tipo  de  vulnerabilidad  de  cada  grupo,  tanto  en  la  modalidad  intramural   como extramural, y en los ámbitos f amiliar y comunitario. Su ejecución se basa en acciones   afirmativas,  la  adecuación  de  la  oferta  institucional,  la  lucha  contra  el  estigma  y  la   discriminación, así como el reconocimiento de las diferencias entre los grupos.     Discapacidad     y  discapacidad  psic osocial :     Implica  el  reconocimiento  de  los  factores   individuales, ambientales, situacionales, políticos y sociales que rodean a las personas con   discapacidad ,   primordialmente  la  discapacidad  psicosocial ,  sus  familias  y  personas   cuidadoras,  los  cuales  son    esenciales  para  contribuir  a  la  garantía  de  sus  derechos,  en   especial  al  derecho  a  vivir  dignamente.  Las  personas  con  discapacidad  y  sus  personas   cuidadoras  son  un  grupo  altamente  vulnerable  al  desarrollo  de  alteraciones  en  la  salud   mental (Tough et al., 2 017).     En  este  contexto,  resulta  fundamental  asegurar  que  se   adopten  acciones  adaptadas  a  las  características  específicas  de  estas  personas,   garantizando  el  ejercicio  efectivo  de  sus  derechos  y  respetando  sus  necesidades  y   posibilidades particulares. El ob jetivo es promover la máxima autonomía e independencia   en su capacidad física, mental y vocacional, así como su inclusión y participación plena en   todos los aspectos de la vida.    Desde la perspectiva de la determinación social de la salud y los determinante s sociales,   se busca implementar acciones que aborden las vulnerabilidades específicas de la población   con  discapacidad,  analizando  sus  necesidades  y  generando  ajustes  razonables  para   garantizar respuestas oportunas y adecuadas. Estas acciones tienen como  objetivo mejorar   tanto  la  salud  como  el  bienestar  psicosocial  de  las  personas  con  discapacidad ,  \n24                    esencialmente con discapacidad psicosocial , ampliando sus posibilidades de interacción con   sectores que puedan influir positivamente en su vida y en la de sus f amilias. Esto se logra a   través  de  las  estrategias  de  los  distintos  ejes,  promoviendo  además  la  superación  del   estigma y el autoestigma rel    acionados con la discapacidad   en general y con la  discapacidad   psicosocial en particular .    Habitabi tanza     en  calle :    Se  refiere  a  la  condición  de  vida  en  la  que  las  personas,  por   diversas  circunstancias  sociales,  económicas,  familiares,  culturales  o  de  salud  mental,   desarrollan su cotidianidad en el espacio público de manera permanente o temporal. Este   fenómeno está rela cionado con la vulneración de derechos fundamentales y la exposición   a  múltiples  riesgos,  incluyendo  el  acceso  limitado  a  servicios  básicos,  la  estigmatización   social y la afectación del bienestar físico y mental.    En el contexto de la salud mental, la  habi t anza   en calle exige un abordaje interseccional   e  intersectorial  que  reconozca  las  particularidades  de  las  personas  en  esta  situación,   incorporando  enfoques  de  derechos  humanos,  género,  diferencial  y  poblacional.  Esto   implica  la  implementación  de  estrategi as  que  promuevan  la  inclusión  social,  el   fortalecimiento de las redes de apoyo y el acceso a servicios de salud mental que atiendan   las  necesidades  específicas  de  esta  población,  garantizando  su  dignidad,  bienestar  y   desarrollo humano.    Población privada de   la libertad :  Se refiere a las personas que, por decisiones judiciales,   se  encuentran  bajo  custodia  en  establecimientos  penitenciarios  o  carcelarios  a  cargo  del   Instituto Nacional Penitenciario y Carcelario  ( INPEC )   o bajo otras modalidades de privación   de    la  libertad  como  prisión  domiciliaria,  detención  en  el  lugar  de  residencia  o  bajo  un   sistema  de  vigilancia  electrónica  por  parte  del  INPEC.  Este  grupo  enfrenta  condiciones   particulares  que  afectan  su  salud  mental,  derivadas  de  factores  como  el  aislamiento,     la   separación de sus redes sociales y familiares, el hacinamiento, las dinámicas propias de los   entornos de reclusión y el acceso limitado a servicios de salud integrales.    En  este  sentido,  esta  población  requiere  un  abordaje  diferenciado  que  garantice  la   promoción,  prevención,  atención  y  rehabilitación  en  salud  mental,  reconociendo  sus   derechos  fundamentales  y  considerando  las  desigualdades  estructurales  que  pueden   agravar  sus  condiciones  de  vulnerabilidad.  Este  enfoque  busca  generar  estrategias   intersecto riales para la atención integral, la reducción del impacto psicosocial negativo de   la privación de la libertad y la promoción del bienestar, la reintegración social y la dignidad   de las personas privadas de la libertad.    Personas migrantes :  Son aquellas per sonas que se desplazan de su lugar de residencia   habitual a otro país, por razones económicas, sociales, políticas, culturales, ambientales o   de  seguridad.  Este  proceso  de  movilidad,  voluntario  o  forzado,  puede  implicar  desafíos   significativos  para  su  salu d  mental  debido  a  factores  como  la  separación  de  sus  redes  \n25                    familiares y comunitarias, la incertidumbre, la discriminación, el acceso limitado a servicios   básicos, y las experiencias de exclusión social y cultural .    A partir de lo anterior, las personas migr antes son reconocidas como una población con   necesidades  específicas  que  requieren  un  enfoque  diferencial,  basado  en  derechos   humanos y en el respeto por la diversidad cultural. Este enfoque busca promover la salud   mental  de  las  personas  migrantes  mediante     estrategias  integrales  e  intersectoriales  que   aborden sus necesidades psicosociales, fortalezcan su inclusión social y garanticen el acceso   equitativo a servicios de atención en salud mental, respetando su dignidad y fomentando   su bienestar integral en el   proceso de integración a las comunidades de acogida.    Víctimas  del  conflicto  armado :    Según  la  Ley  2421  de  2024,  se  consideran  víctimas   aquellas  personas que  individual  o  colectivamente  hayan  sufrido  un  daño  a  sus  derechos   por  hechos  ocurridos  a  partir  del    1 .º     de  enero  de  1985  con  ocasión  del  conflicto  armado   interno. Este reconocimiento se lleva a cabo por la Unidad para la Atención y Reparación   Integral  a  las  Víctimas,  así  como  por  las  entidades  del  Sistema  Integral  para  la  Paz   (Jurisdicción  Especial  para    la  Paz  (JEP)  y  la  Unidad  de  Búsqueda  de  personas  Dadas  por   Desaparecidas (UBPD)).    En el art í culo 137 de la  misma  ley citada,  e n materia de salud integral, el Ministerio   de Salud y la Protección Social es responsable de establecer una Política Pública Nacio nal   de  Atención  Psicosocial  y  en  Salud  para  la  Reparación  Integral,  de  manera  conjunta  y   participativa  con  las  víctimas  cumpliendo  los  criterios  de  reparación  en  materia  de   rehabilitación  ordenados  por  la  Corte  Interamericana  de  Derechas  Humanos  y  la  Corte    Constitucional de Colombia.       Territorial     El  Plan  Decenal  de  Salud  Pública  2022 - 2031  establece  que  el  enfoque  territorial  es  el   lugar donde ocurre el proceso social de la salud. Para materializar las acciones relacionadas   con  el  derecho  a  la  salud,  se    deben  considerar  tres  aspectos  claves:  i)  articular  con  los   campos  de  conocimiento  para  abordar  la  complejidad  territorial;  ii)  incorporar  saberes  y   prácticas  colectivas  y  comunitarias,  orientadas  a  preservar  o  atender  las  necesidades  en   salud;  iii)  actuar     de  manera  intersectorial  y  transectorial  para  superar  las  inequidades   sanitarias (Resolución 2367 de 2023, p. 137).    El Ministerio de Igualdad y Equidad (2024) lo conceptualiza como “una unidad de acción   transectorial  y  como  un  ecosistema  social,  geográfic o,  político  y  cultural,  que  comparte   relaciones de identidad territorial desde la multiculturalidad y en interconexión con otros   territorios”. Este enfoque se sustenta en el reconocimiento de las particularidades de los   territorios desde una perspectiva si stémica, holística e integral, mediada por las condiciones   históricas,  sociales,  culturales  y  ambientales.  Además,  se  identifican  los  espacios  de  los  \n26                    actores, sus dinámicas y su relación con la institucionalidad, lo que motiva la participación   activa de to dos los actores como sujetos sociales en los procesos de salud mental.       Interseccional     Tiene  como  objetivo  reconocer  las  desigualdades  estructurales  derivadas  de  la   interacción  entre  factores  como  género,  diversidad  sexual,  etnia,  nivel  socioeconómico,   co ndiciones  laborales,  ubicación  geográfica  y  edad,  y  cómo  estas  intersecciones   incrementan las barreras de acceso a derechos. Este enfoque exige un análisis integral de   las  experiencias  individuales,  reconociendo  la  diversidad  y  complejidad  de  estas  para   de sarrollar  políticas  inclusivas  y  efectivas.  En  el  ámbito  de  la  salud  mental,  un  enfoque   interseccional  implica  diseñar  estrategias  que  reconozcan  cómo  estas  variables  y  sus   intersecciones  afectan  el  bienestar  emocional  y  psicológico.  De  esta  manera,  se  bus ca   ofrecer  una  atención  integral  y  equitativa,  considerando  las  múltiples  dimensiones  de  la   identidad y las experiencias únicas de cada persona.       Psicosocial     Destaca  la  interacción  entre  la  persona  y  su  entorno,  reconociendo  que  el  bienestar   mental está p rofundamente influenciado por las condiciones sociales en las que se vive. Se   articula con la noción de los “determinantes sociales de la salud mental”, que sostiene que   las condiciones sociales, económicas y políticas tienen un impacto significativo en la   salud   mental. Así mismo, promueve la validación de las experiencias emocionales y psicológicas,   reconociendo  su  legitimidad  y  buscando  soluciones  que  aborden  tanto  los  aspectos   individuales como los contextuales en los que se origina el malestar emocional .     En este enfoque, se toma en cuenta la relación dialéctica de la persona en lo referente   al modelo económico, político, social y cultural, así como su impacto en la salud mental en   los ámbitos individual, familiar y colectivo.    La perspectiva psicosocial , fundamentada en los   derechos  humanos,  rescata  la  necesidad  de  intervenir  en  el  contexto  que  vulnera  y  no   concentrarse únicamente en los individuos vulnerados.          Ambiental     Se define como el reconocimiento de la interdependencia de la naturaleza, el entorno   vital y la salud mental. Esta relación involucra tanto a los seres humanos como a los seres   no  humanos,  los  territorios  y  los  elementos  fundamentales  para  la  vida,  todos  l os  cuales   afectan la realidad social, económica y cultural.     La PNSM incorpora este enfoque para abordar las necesidades derivadas de la afectación   del ambiente, tales como la reducción de riesgos de desastres naturales, las acciones contra   el  cambio  climá tico  y  la  generación  de  planes,  programas  y  proyectos  territoriales.  Estos   esfuerzos  buscan  fortalecer  las  capacidades  nacionales  y  territoriales,  promoviendo  una  \n27                    Red Mixta Nacional y Territorial para la participación de actores y sectores vinculados con   e l  ambiente,  con  el  propósito  de  generar  acciones  articuladas  que  consideren  la   conservación y preservación del entorno natural como elementos claves para favorecer la   salud mental.       3.     Diseño metodológico    La  actualización  de  la  PNSM  se  desarrolló  en  el  marco  del  ciclo  de  la  política  pública,   sustentado  en  un  marco  lógico  que  permitió  abordar  de  manera  estructurada  las   necesidades  de  las  diversas  poblaciones.  Las  fases  de  alistamiento  y  participación  fueron   adaptadas a las realidades de los territorios mediante procesos de diálogo y cocreación con   distintos actores, lo cual facilitó la identificación de estrategias que respondieran de forma   efectiva a las necesidades específicas de cada grupo poblacional.        Figura 1 .  Fases de actualización de la PNSM    Fuente : Elaboración propia   MSPS (2024) .       Para  la  construcción  de  la  propuesta,  se  incorporó    una     metodología  que  favoreció  la   participación  de  los  actores  en  cada  fase  del  proceso,  promoviendo  el  aprendizaje   colaborativo  y  el  diseño,  ejecución  y  evaluación  de  acciones  para  resolver  los  problemas   locales desde la perspectiva de la población, permitien do que los actores contribuyan con   sus  saberes,  prácticas  y  experiencias  en  la  construcción  y  validación  de  los  contenidos   propuestos.       La  participación  acogió  el  mandato  del  Plan  Nacional  de  Desarrollo  (PND)  2022 - 2026,   incorporando el elemento simbólico  del “tejido” ,  que representó el esfuerzo colectivo por  \n28                    entrelazar las experiencias, saberes y prácticas de los actores para mejorar la salud mental   en los territorios.                   \n29                    Figura 2.   Elementos propuestos para la actualización       Fuente : Elaboración propia   MSPS (2024) .       Fases de la actualización de la política    El proceso de actualización de la PNSM se estructuró en varias fases, cada una diseñada   para  garantizar  el  desarrollo  y  ajuste  continuo  de  la  política,  las  cuales  se  detallan  a   continuación:    •   Alistamiento:     En  esta  fase  se  sentaron  las  bases  del  proceso,  consolidando  el   compromiso  institucional  y  desarrollando  la  hoja  de  ruta  y  el  cronograma  de   actividades.  Se  realizó  un  mapeo  de  actores  claves  de  los  sectores  de  la  salud,   educación y grupos étn icos, y se diseñaron estrategias y herramientas para garantizar   la participación territorial. Los encuentros de participación, tanto presenciales como   virtuales,  se  apoyaron  en  la  metodología  “Tejiendo  salud  mental”,  y  se  crearon   herramientas para la recol ección y análisis de información.    •   Diagnóstico:   Esta fase abarcó diversas actividades, como la revisión de la normativa   vigente  y  el  análisis  de  la  información  territorial,  las  cuales  fueron  presentadas  a   actores  claves.  Se    incorporó  una  metodología  que  fav oreció  la  participación     para   identificar  los  elementos  esenciales  de  la  actualización,  promoviendo  un  enfoque   transectorial.  Además,  se  revisaron  datos  sobre  salud  mental  a  nivel  territorial,   utilizando  fuentes  como  el  Sispro  y  estudios  previos.  La  fase  ta mbién  incluyó  la   presentación  de  la  hoja  de  ruta  ante  el  Consejo  Nacional  de  Salud  Mental  y  la   realización de un primer encuentro con actores estratégicos.    •   Actualización:    Durante  esta  fase  se  revisó  y  ajustó  el  documento  de  política,   integrando  los  insumos   recolectados  e  incorporando  perspectivas  regionales  y   sectoriales. Las actividades incluyeron la revisión de propuestas, mapeo de actores,   diseño  de  estrategias  y  herramientas  para  garantizar  la  participación  territorial,   encuentros  participativos,  y  la  s istematización  de  insumos .  Paralelamente,  se  \n30                    actualizó el documento de la PNSM, con un enfoque centrado en la participación y la   inclusión,  integrando  diversas  perspectivas  en  el  marco  estratégico,  los  principios   orientadores y las estrategias de inclusión   social.    •   Validación :  En  esta  fase,  se  convocaron  actores  estratégicos  de  distintos  sectores   para  contrastar  el  contenido  de  la  política  con  las  necesidades  específicas  de  cada   actor,  incorporando  sus  aportes  para  enriquecer  la  política.  Las  actividades  de   validación  incluyeron  la  revisión  de  elementos  claves  para  la  actualización,   encuentros con el Consejo Nacional de Salud Mental, reuniones con organismos de   cooperación internacional, consultas con hospitales psiquiátricos, talleres nacionales   “Tejiendo ac tualización de la Política Nacional de Salud Mental”, participación en los   espacios    de    “Diálogos    en    salud”,    encuentros    territoriales    y    una
