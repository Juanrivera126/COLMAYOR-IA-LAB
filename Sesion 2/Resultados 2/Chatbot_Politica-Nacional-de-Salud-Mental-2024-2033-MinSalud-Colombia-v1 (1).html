mo el componente de la red conformado por   los  centros  de  atención  primaria  en  salud  (CAPS) ,     o    el  que     cumpla  sus  funciones,  como   unidad polifuncional de base territorial, al igual que los equipos básicos de salud ,   que tienen   a  su  cargo un territorio y  la  población que  en él  habita.  Este  nivel  facilita  la  coordinación  \n84                    entre  los  sistemas de  cuidado  para    pre star  una  atención  integral,  integrada,  continua,  de   calidad  y  centrada  en  las  personas,  familias  y  comunidades,  incluyendo  las  formas   intersectoriales  y  sociales  de  cuidado  provenientes  de  saberes  populares,  tradiciones   culturales, y saberes propios de com unidades étnicas y campesinas, las estructuras propias   de  salud,  así  como  los  servicios  sociales,  sociosanitarios  y  ambientales  del  territorio,   incluidos  los  dispositivos  comunitarios  del  Plan  de  Intervenciones  Colectivas  en  Salud.  Se   propone la disposició n de al menos un CAPS del nivel primario, con sede principal y sedes   satélites en  el nivel  municipal,  asegurando  las  sedes rurales que  se  requieran  de  acuerdo   con las necesidades y las configuraciones sociocultural y geográfica de los territorios.     Se  defi ne  el  nivel  complementario   de  atención  como  el  componente  de  la  red   conformado  a  través  de  organizaciones  para  la  prestación  de  servicios  individuales  con   mayor  requerimiento  tecnológico,  para  la  atención  en  salud  mental  de  aquellos  eventos   que requieran t ecnologías o talento humano en salud mental especializado    de mediana y   alta  complejidad,    no  disponible  en  el  nivel  primario,  garantizando     que  los    procesos  de   referencia  y  contrarreferencia     mantengan    la  integralidad,  continuidad  y     lo     resolutivo  en   salud.     Los  Equipos Básicos de Salud (EBS)   corresponden a la estructura funcional y operativa   de  los  prestadores  de  servicios  de  salud,  en  capacidad  de  ejecutar  atenciones  de  forma   permanente  y  sistemática  para  el  cuidado  integral  de  la  salud  de  las  personas,  fami lias  y   comunidades para el acceso a la atención en salud mental, incluyendo la valoración integral   para  la  promoción  de  la  salud  y  la  detección  temprana  de  alteraciones,  protección   específica,  diagnóstico  y  tratamiento  por  curso  de  vida  en  los  diferentes  e ntornos,  bajo   enfoque  diferencial  poblacional  y  territorial,    fortaleciendo  de  esta  forma  la  salud  mental   desde    el  marco  de  la  estrategia  de  APS.    Estos    equipos  son  interdisciplinarios,  y    deben   garantiza r   el contacto permanente con las personas, familias y c omunidades, para reducir   las  brechas  de  acceso  y  continuidad  a  la  atención  en  salud  mental;  además,  realizan   valoraciones  integrales  para  la  promoción  de  la  salud  y  la  detección  temprana  de   alteraciones, protección específica, diagnóstico y tratamiento, lo   cual los hace resolutivos.   Los EBS prestarán servicios a las personas, familias y comunidades en el territorio asignado   mediante la  asignación de servicios extramurales resolutivos que permitan    la articulación   con  los  componentes  intramurales  de  la  atenci ón  primaria  en  salud,    permit iendo     la   continuidad del   tratamiento a servicios complementarios dentro de las  redes de atención   integral e integradas.  El Ministerio de Salud y Protección Social incluirá en los lineamientos   de  los  Equipos  Básicos  en  Salud  el  componente  en  salud  mental  en  concordancia  con  las   normas que los regulan.       Los  Centros de Atención Primaria en Salud (CAPS)   son unidades polifunci onales de base   territorial,  que  tienen  a  su  cargo  los  equipos  básicos  de  salud.  Actúan  como  un  nodo   articulador que facilita la coordinación entre las organizaciones que integran la red para una  \n85                    atención integral, continua, centrada en la persona, el fomen to del bienestar y la calidad de   vida,  en  el  marco  de  su  operación  con  acciones  universales,  territoriales,  sistemáticas  y   permanentes,  con  un  enfoque  de  salud  pública,  de  determinantes  sociales,  diferencial   poblacional  y  territorial,  en  desarrollo  de  la  a tención  primaria  en  salud  mental  y   comunitaria.     De acuerdo con densidad poblacional, factores sociodemográficos, capacidad instalada   requerida  y  procesos  que  se  requieren  en  cada uno de  los  CAPS,  se  han  determinado  los   siguientes tipos de centros de atenc ión primaria en salud: Centro de Atención Primaria en   Salud  (CAPS)  Principal  Urbano - Rural;  CAPS  Urbano  Ambulatorio;  Sede  Rural  Satélite  de   CAPS; Sede Comunitaria de CAPS; Sede Itinerante del CAPS.     Los    CAPS  comunitarios     son  centros  de  articulación,  enfocad os  en  la  promoción  de  la   salud, la prevención primaria, secundaria y terciaria, en todos los momentos del curso de   vida, con mayor enfoque en las poblaciones vulnerables y vulneradas; talento humano en   salud y de otros sectores y organizaciones comunitaria s, y en la articulación de personal de   salud propio e intercultural. En estos centros, se priorizará el establecimiento de estrategias   de  fácil  acceso  para  incentivar  hábitos  saludables,  incorporando  programas  y  espacios   dedicados  tanto  a  la  salud  mental  c omo  a  la  emocional.  Se  buscará  cultivar  y  enriquecer   habilidades  sociales,  de  autocuidado  y  emocionales  en  personas  de  todas  las  edades,   garantizando  una  distribución  justa  de  recursos  y  servicios  preventivos  y  de  atención   sanitaria.     La atención en salud    mental se prestará en el marco de    Red es   Integral es   e Integrada s    de  Prestadores  de  servicios  de  salud     desde  la  baja  complejidad,  para  lo  cual  se  deberá   mejorar  la  resolutividad  en  este  nivel  de  atención,  así  como  los  procesos  de  referencia  y   contrarreferencia articulado con los servicios de mayor complejidad y el aprovechamiento   de la telemedicina en toda s sus modalidades.        El  Ministerio  de  Salud  y  Protección  Social  promoverá  la  apertura  de  servicios  de  salud   mental en la baja complejidad que permitan la oferta de modelos y programas de atención   para el cuidado integral de la salud mental según los enfo ques de la política, sin abandonar   las necesidades territoriales en términos de la mediana y alta complejidad.      Estas  Redes Integrales e Integradas de Prestadores de servicios de salud    corresponde   al  conjunto  de  organizaciones  de  prestadores  de  servicios    de  salud  públicos,  privados     y    mixtos,  que  brindan  atención  en  promoción,  prevención,  diagnóstico,  tratamiento,   rehabilitación   e inclusión , cuidados paliativos y asistencia para la muerte digna. Estas redes   se conforman y articulan en un nivel primario y un   nivel complementario que gestionan el   proceso de atención en salud mental de manera coordinada e integrada, a través del diálogo   y  el  trabajo conjunto por parte de las instituciones, con estrategias de liderazgo claro para   asignar responsabilidades y para establecer espacios intersectoriales donde se construyan   estrategias y metas vinculantes.    \n86                    Algunas modalidades y servicios que deben s er parte de la  Redes Integrales e Integradas   de Prestadores de servicios de salud   mental   incluyen   y favorecen la   atención ambulatoria   para tratamientos sin hospitalización,    por lo que se deberá fortalecerse estrategias como   hospital  día  tanto  para  adultos     como  para  NNAJ ,  personas  mayores,  y  personas  con   discapacidad;   también se deberá favorecer la  atención domiciliaria para quienes no pueden   desplazarse,    al  igual  que    equipos  de  atención  prehospitalaria  para  respuesta  rápida    en   atención  de  salud  mental  en  e mergencias  y  desastres,  centros  especializados  en   farmacodependencia,  centros  de  salud  mental  comunitarios  para  un  acceso  cercano  y   preventivo, grupos de apoyo para pacientes y familias.     Se  deberán  crear    unidades  de  salud  mental    dentro  de  los    hospitales  y  clínicas    de   complejidad  media  y  alta,    tanto    en  hospitales    generales  como    en  instituciones  de  salud   especializadas, junto con  prestación de  servicios de urgencia s   en salud mental ,   con atención   preferencial por psicología clínica o  psiquiatría ; de esta forma  l a cobertura  de la red abarca   d esde la prevención hasta la atención de emergencias. La constitución de la R ed  I ntegral e   I ntegrada  en    S alud  mental     no  reside  en  los  “nodos”  o  “puntos  de  atención”  que  la   conforman, sino que se hace relevante  a partir de la armonización entre las instituciones o   las  personas  que  la  integran.  De  este  modo,  p odrá     articularse  con  la  Red    M ixta  de    S alud   M ental  N acional y  T erritorial, en el sentido de que no solo es parte del sistema sanitario,   sino de un a estructura   transectorial e  intersectorial más ampli a .     Igualmente s e debe rá   fortalecer la infraestructura   de los establecimientos de atención   primaria en salud, con mayor énfasis en recomponer la red pública, para que sean seguros   y  accesibles, para  que  brinden  servicios  efectivos,  con  agua,  saneamiento  y  eliminación y   reciclado de desechos, conectividad y te lecomunicaciones y suministro eléctrico fiables, y   con sistemas de transporte adecuado ,   dependiendo  de  la geografía del territorio ,   para que   puedan  trasladar  a  los  pacientes  que    deban  ser    atendidos  por  otros  profesionales  si   requieren un nivel complementar io.    Por  lo  anterior,  las  entidades  territoriales  de  los  órdenes  departamental,  distrital  y   municipal deberán priorizar a corto y mediano plazo, dentro de los Planes de Inversión en   Salud o en los Planes Maestros de Inversiones en Infraestructura y Dotación   en Salud, según   corresponda,  los  proyectos  dirigidos  al  mejoramiento,  la  ampliación,  el  reforzamiento   estructural, la construcción de obra nueva, la dotación y modernización de CAPS primarios   o complementarios para la atención en salud mental, con énfasis   en la ruralidad; la idea con   esto  es  garantizar  la  inclusión  de  todos  los  componentes  que  permitan  su  óptimo   funcionamiento, empleando para ello las fuentes de financiación que garanticen la gestión   integral de proyectos y la disponibilidad de los recurso s que se requieran.      \n87                    Figura 7.   Modelo Red Integral e Integrada Territorial de Salud Mental    Fuente : Elaboración propia (MSPS, 2024)       El  Ministerio  de  Salud  y  Protección  Social  coordinará  el  abordaje  intersectorial  de  los   determinantes sociales de la salud mental con las entidades y los sectores que de acuerdo   con  sus  competencias  deban  concurrir  a  este  fin  y  con  las  organizaciones  de  la     sociedad   civil, en consonancia con la política de participación social en salud.           5.5  Seguimiento y monitoreo de la implementación de la Política Nacional de   Salud Mental    El  Sistema  de  Seguimiento  y  Evaluación  de  la  actualización  de  la  Política  Naciona l  de   Salud Mental (PNSM) 2024 - 2033 está diseñado para garantizar la correcta implementación   de  la  política,  facilitando  su  ajuste  continuo  en  función  de  los  avances  y  obstáculos  que   puedan  surgir.  Se  enfoca  en  la  recolección  y  el  análisis  sistemático  de  da tos,  asegurando   que las metas establecidas en la PNSM se cumplan de manera efectiva y se logre el impacto   esperado en la salud mental de la población.   Encuentra sustento   en   la Ley 715 de 2001, que   otorga al Ministerio de Salud y Protección Social (MSPS) la responsabilidad de coordinar y   evaluar las políticas de salud, y la Ley 1616 de 2013, que regula el seguimiento a la salud   mental, especificando la importancia de contar c on indicadores que midan las acciones de   promoción, prevención e inclusión social en salud mental. Además, la Resolución 2367 de   2023  regula  el  seguimiento  del  Plan  Decenal  de  Salud  Pública  2022 - 2031,  estableciendo   evaluaciones periódicas.    Este  s istema tie ne como objetivo asegurar la correcta ejecución de la política, permitir   ajustes  a  las  metas  y  estrategias  cuando  sea  necesario,  y  garantizar  que  se  cumplan  los  \n88                    objetivos establecidos, al tiempo que se acompaña a los actores involucrados en el proceso.   Par a lograrlo, se estructura en torno a varios elementos clave s :    ●   Autonomía y descentralización : Cada nivel de gobierno (nacional, territorial   e institucional) debe asumir sus responsabilidades y competencias, gestionando los   recursos de manera eficiente y res petando la autonomía de las entidades.    ●   Orientación  a  la  anticipación :  El    s istema  debe  ser  capaz  de  responder   rápidamente ante desafíos, asegurando que se logren las metas establecidas.    ●   Flexibilidad : El  s istema debe adaptarse a las necesidades emergentes y  a los   cambios tanto de la PNSM como del sistema de salud, lo que permitirá una gestión   más efectiva.    Además,  el    s istema  promueve  la  integración  entre  distintos  niveles  de  gobierno  y   sectores, fomentando la coordinación y el respeto por las competencias de cada entidad.   De esta manera, todos los actores involucrados tendrán acceso a la información necesaria   para ajust ar sus planes y actividades, garantizando la coherencia y el cumplimiento de los   objetivos de la política.       Figura  8 .   Sistema de Seguimiento y Evaluación de la PNSM      Fuente : Elaboración propia   (MSPS, 2024)       El  seguimiento  y    monitoreo     se    harán     utilizando  indicadores  de  gestión,  producto  y   resultado. Los resultados obtenidos en cada nivel  se publicarán   en forma   transparente, lo   que  permitirá  que  los  responsables  de  la  formulación  y  ejecución  de  la  política  en  salud   mental  tomen  decisiones  inform adas  y  realicen  ajustes  en  tiempo  real.     Este    s istema  se   presenta  como  una  herramienta  fundamental  para  asegurar  que  la  Política  Nacional  de  \n89                    Salud Mental 2024 - 2033 se implemente de manera efectiva, proporcionando información   oportuna y precisa para la toma  de decisiones y la mejora continua de las acciones en salud   mental en Colombia.    Por  lo  anterior,  s e  realizarán  lineamientos  para  que  las  entidades  territoriales,   departamentales  y  distritales  generen  informes  trimestrales,  con  metas  e  indicadores  en   salud  mental en el marco de la implementación de la Política Nacional de Salud Mental y   que involucren la información de todos los municipios de sus respectivas jurisdicciones para   el  caso  de  las  entidades  departamentales,  a  partir  de  los  lineamientos  que  genere     el   Ministerio  de  Salud  y  Protección  Social  para  los  entes  territoriales  y  demás  actores  del   sistema  de  salud.      De  igual  manera,    l  Ministerio  de  Salud  y  Protección  Social  realizará  un   informe técnico anual sobre el monitoreo y seguimiento de la implementac ión de la Política.      Para  la  evaluación  de  la  implementación  de  la  Política  Nacional  de  Salud  Mental.  Se   realizará  la  evaluación  de  proceso  en  los  primeros  cinco  años  y  posteriormente  una   evaluación de resultados a los diez años.           \n90                    6.  Referencias        Ade lman, H. S.,  y   Taylor, L. (2006).  Mental health in schools and public health.  Public   H ealth  R eports ,   121 (3), 294 - 298.  https://doi.org/10.1177/003335490612100312 .    Agencia Nacional de Tierras  (2024). Consejos         const normalized = String(hex || '#000000').replace('#', '');

        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;

        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;

        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);

        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {
        if (!palette) return;
        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');
        target.style.setProperty('--bg', palette.bgColor || '#f8f9fa');
        target.style.setProperty('--text', palette.textColor || '#343a40');
        target.style.setProperty('--card', palette.cardBgColor || '#ffffff');
        target.style.setProperty('--border', palette.cardBorderColor || '#dddddd');
        target.style.setProperty('--input', palette.inputBgColor || '#ffffff');
        target.style.setProperty('--iborder', palette.inputBorderColor || '#cccccc');
        target.style.setProperty('--bot-bg', palette.chatBubbleBotBg || '#e9ecef');
        target.style.setProperty('--bot-text', palette.chatBubbleBotText || '#343a40');
        target.style.setProperty('--user-bg', palette.chatBubbleUserBg || '#007bff');
        target.style.setProperty('--user-text', palette.chatBubbleUserText || '#ffffff');
        target.style.setProperty('--sys-bg', palette.systemMessageBg || '#fff3cd');
        target.style.setProperty('--sys-text', palette.systemMessageText || '#856404');
    }
    function applyPalette(palette) {
        currentPalette = palette;
        applyTheme(currentTheme);
        localStorage.setItem('downloaded-palette', JSON.stringify(palette));
    }
    function applyTheme(t) {
        currentTheme = t;
        document.body.classList.toggle('dark-mode', t === 'dark');
        themeBtn.textContent = t === 'dark' ? '☀️ Tema' : '🌙 Tema';
        const effectivePalette = buildThemePalette(t, currentPalette);
        setPaletteVariables(document.body, effectivePalette);
        setPaletteVariables(document.documentElement, effectivePalette);
        document.body.style.backgroundColor = effectivePalette.bgColor;
        document.body.style.color = effectivePalette.textColor;
        localStorage.setItem('theme', t);
    }
    themeBtn.addEventListener('click', () => { const n = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(n); });
    paletteBtn.addEventListener('click', () => { applyPalette(generatePalette()); });
    const savedPalette = JSON.parse(localStorage.getItem('downloaded-palette') || 'null');
    if (savedPalette) { applyPalette(savedPalette); }
    else if (INITIAL_PALETTE) { applyPalette(INITIAL_PALETTE); }
    else { applyPalette(generatePalette()); }
    applyTheme(currentTheme);

    // Second PDF (embedded or user-loaded)
    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
