e la afirmación 3 .................................................................................................................................    16  V . ¿A quién se dirige el módulo? .........................................................................................................................  17 \nPresentación Contenido  6  Especificaciones   ¿A quién se dirige?  Saber Pro  Este examen está compuesto por módulos de  competencias genéricas   y específicas . Las primeras se refieren a los conocimientos, habilidades y   destrezas que se consideran necesarias para cualquier profesión, mientras   que las competencias específicas se refieren a aspectos fundamentales   para el desempeño de los futuros egresados de programas particulares de   educación superior.  ¡Tenga en cuenta!  Además de esta guía de orientación, en la       página web   del Icfes  encontrará, para cada uno de los módulos de   competencias específicas marcos de referencia, infografías   que resumen las competencias evaluadas en cada módulo   y la caja de herramientas del examen Saber Pro (la cual   contiene  cuadernillos de preguntas y ejemplos de preguntas   explicadas) , entre otros materiales de interés de este examen.  I.  Presentación  La       Ley 1324 de 2009  le confiere al Instituto Colombiano para la   Evaluación de la Educación (Icfes) la misión de evaluar, mediante exámenes   externos estandarizados, la formación que se ofrece en los distintos niveles   del servicio educativo. También establece que el Ministerio de Educación   Nacional (MEN) define lo que se debe evaluar en estos exámenes.  Para cumplir con la misión asignada, el Icfes ha avanzado en la alineación   del Sistema Nacional de Evaluación Externa Estandarizada ( SNEE ), que   posibilita la comparación de los resultados en distintos niveles educativos,   debido a que los diferentes exámenes evalúan las mismas competencias   en algunas de las áreas que los conforman.  ¿Para qué sirve esta guía?  Hemos creado esta guía de orientación para que los docentes, evaluados,   directivos de instituciones de educación superior (IES) y demás interesados   en el Examen de Estado de la Calidad de la Educación Superior, Saber Pro,   puedan acceder a la información básica acerca de las características de   este módulo de competencia específica. \nPresentación Contenido  7  Especificaciones   ¿A quién se dirige?  II.  El diseño arquitectónico  El diseño arquitectónico es un proceso complejo orientado al desarrollo   de un proyecto de arquitectura. Implica la integración de conocimientos,   habilidades y criterios adquiridos en la formación del arquitecto, que le   permiten resolver de manera autónoma los aspectos propios del diseño y,   a la vez, articular su trabajo con otras disciplinas. Asimismo, comprende   diversas fases, desde el planteamiento del problema y la formulación de   la propuesta hasta su desarrollo y ejecución. Durante todo este proceso   intervienen múltiples factores que el arquitecto debe analizar y ponderar   para dar una respuesta adecuada al encargo.  En consecuencia, la evaluación de las competencias de los estudiantes de   arquitectura se realiza a partir de dos módulos:  Estudio Proyectual  y el   de  Proyecto de Arquitectura , ambos centrados en la fase de diseño del   proyecto arquitectónico. Esta fase presenta, a su vez, diversos grados de   desarrollo, que van desde la idea inicial, pasando por el esquema básico   y el anteproyecto, hasta el desarrollo final del proyecto. En ella se ponen   en juego los procesos de conceptualización y síntesis propios del diseño   arquitectónico. De este modo, el proyecto arquitectónico, junto con las   diferentes áreas temáticas que inciden en él, permite una aproximación   tanto analítica como sintética.  Específicamente, el módulo  Proyecto de Arquitectura  se enfoca en la fase   de diseño; es decir, parte de un problema definido previamente —que en el   lenguaje arquitectónico se denomina  encargo — para proponer una solución   a nivel de esquema básico  con representación gráfica formal.  El encargo es una solicitud realizada por una persona, empresa o entidad   que requiere un espacio habitable en un contexto determinado, a la cual se   debe dar respuesta mediante un proyecto arquitectónico.  En todo proceso de diseño, más allá de la aplicación de los conocimientos   técnicos y las habilidades adquiridas durante la formación, existen múltiples   respuestas viables para un mismo encargo. Esto se debe a que se trata de   un problema abierto, en el que los procesos creativos e imaginativos juegan   un papel fundamental.  ¡Tenga en cuenta!  Además de este documento enfocado en el módulo   Proyecto de Arquitectura, consulte la guía de orientación   correspondiente al      módulo Estudio Proyectual  en el   portal web del Icfes. \nPresentación Contenido  8  Especificaciones   ¿A quién se dirige?  El módulo plantea un problema de orden arquitectónico que debe ser   resuelto en un tiempo máximo de ocho horas. El resultado debe ser una   solución a nivel de esquema básico, pero con representación gráfica formal,   mediante el cual se da respuesta al encargo, lo que implica  expresar   explícitamente las escalas de dibujo de cada sección.  Para mayor claridad,   a continuación se expone la definición del producto esperado: un esquema   básico.    » El esquema básico  La concepción de esquema básico que se presenta proviene de la   documentación sobre práctica profesional del Consejo Profesional Nacional   de Arquitectura y sus Profesiones Auxiliares:  “El esquema básico constituye la primera aproximación a una solución   específica de diseño arquitectónico y como tal, define y reúne las   características principales del proyecto o sus distintas alternativas, aunque   de una manera general o incluso hipotética, sin ofrecer soluciones en    detalle.  El Esquema Básico se desarrolla por lo común sobre la interpretación de   los contenidos, restricciones y requerimientos formulados en la fase de   prediseño, particularmente las que hacen relación con las documentaciones   de cartografía, normativa urbanística y programa cualificado de espacios y   áreas del proyecto.  La solución básica de diseño se expresa en dibujos esquemáticos de   localización, plantas generales, elevaciones principales –secciones de   cortes y fachadas–, memoria descriptiva del esquema y cuadro preliminar   de áreas y eventualmente, en una documentación tridimensional   complementaria que aporte información básica sobre la volumetría y la   materialidad constructiva del proyecto”. \nPresentación Contenido  9  Especificaciones   ¿A quién se dirige?  La organización de la plancha (un pliego de 1000 × 700 mm) en la que el   estudiante debe plantear su propuesta al encargo es la que se muestra en   la  f  gura  1 .    » Figura 1.  Ejemplo de plancha del examen  Información contextual  INTERPRETAR / ANALIZAR  Programa, normativa, localización  Memoria  CONCEPTUALIZAR - JUSTIFICAR / ARGUMENTAR  Área para   los bocetos  Propuesta  DESARROLLAR  Área para la expresión formal de la   propuesta  Como se observa en la figura 1, la plancha sobre la que se desarrolla la   propuesta está dividida en cuatro partes, que corresponden a procesos en   los que el estudiante debe demostrar su capacidad. Estas son:  1.  La información contextual , en la que aparece la información básica del   encargo por resolver.  2.  La memoria  del proyecto que el estudiante desarrolla, en la que debe   argumentar de manera gráfica las decisiones proyectuales en términos   de cada componente.  3.  La propuesta planteada , en la que la representación se da con códigos   de dibujo arquitectónico, indicando las escalas de desarrollo que llevó a   cabo un estudiante para resolver el encargo.  4.  El área para los bocetos,  que puede ser usada de dos maneras: por una   parte, para dibujar los esquemas que el estudiante realiza inicialmente   para visualizar aspectos del desarrollo del esquema básico del proyecto   de arquitectura. Por otra parte, se puede usar para el desarrollo   planimétrico de la propuesta. \nPresentación Contenido  10  Especificaciones   ¿A quién se dirige?  Estas cuatro partes dan forma a las dimensiones de la competencia. En la   plancha que se entrega a los estudiantes el día de la aplicación de la prueba   se incluyen:    » Tema por resolver y su definición.    » Programa de funciones y áreas, por zonas.    » Normativa y recomendaciones generales.    » Planimetría del contexto físico, a escalas 1:2.000 o 1:2.500; en esta   planimetría el estudiante puede incluir textos, gráficos o esquemas   de análisis de la información contextual.  En el formato de presentación de la propuesta se demarca un   espacio donde se le solicita que informe cuál es la ciudad en la que   se ubica el proyecto. Esta información es de mucha relevancia para   el ejercicio, ya que completa la definición del contexto. En especial,   permite entender el medio físico, el clima y el contexto cultural,   pues la ciudad en la que se desarrolla el proyecto determina   condiciones específicas como el clima y otras características   ambientales relevantes.    » Planimetría del lote y su contexto inmediato a escalas 1:500 a   1:1000. En esta planimetría, los estudiantes deben representar la   localización o planta de cubiertas de la propuesta; allí se pueden   incluir elementos de justificación de las decisiones proyectuales, es   decir, puede ser un complemento a la memoria de la propuesta.  Para cada aplicación del examen se proponen diferentes temas.  Para   el examen de 2026, el tema de la prueba corresponde a espacios de   atención al público.  En este caso, a cada estudiante le corresponde   elaborar una propuesta de esquema básico sobre una de las siguientes tres   opciones posibles:    » Curaduría urbana    » Sucursal bancaria    » Centro de atención de telefonía móvil  Al final de la sesión, los estudiantes deberán entregar una propuesta de   espacialización y materialización del tema indicado. Con base en base en   su ejecución, es posible obtener información sobre su capacidad de síntesis   del proyecto de arquitectura. \nPresentación Contenido  11  Especificaciones   ¿A quién se dirige?  III.  Condiciones para la   aplicación del módulo    » Cada estudiante conocerá el tema específico asignado el mismo día de   la realización del ejercicio práctico de proyecto.    » Cada estudiante desarrollará, en el transcurso de la sesión, uno de los   temas propuestos, que se relacionan con servicios de escala zonal o   localidad, complementarios a vivienda.    » El ejercicio práctico de proyecto se realizará en las aulas de taller de   todos y cada uno de los programas de arquitectura del país, los cuales   dispondrán de las instalaciones y mobiliario adecuado para la ejecución   de la prueba.    » El ejercicio práctico de proyecto se presentará en dos jornadas, de   7:00 a. m. a 12:00 m. y de 2:00 p. m. a 5:00 p. m., y será supervisada   por delegados del Icfes.    » Cada estudiante recibirá, por parte del jefe de salón del Icfes, un sobre que   contiene el pliego con la información pertinente para realizar el ejercicio   y en el que se debe desarrollar la respuesta arquitectónica solicitada.    » El día de la prueba, cada estudiante deberá llevar los siguientes   materiales (que son de uso personal , intransferible y necesarios para   desarrollar el ejercicio):  •  Un (1) pliego de papel bond de 60 g y un (1) pliego de papel   mantequilla de 60 g; estos dos pliegos son para trabajo durante las   sesiones de examen.  •  Instrumentos básicos de dibujo manual: lápices de mina negra,   lápices de colores o marcadores; borrador; escala; escuadras de   60° y 45°; regla paralela; chinches o cintas para fijar el papel;   curvígrafos; compás; sacapuntas; estilógrafo o micropunta, entre   otros.    » La técnica de representación es de libre elección: lápiz, plumones o   marcadores, tintas, lápices de colores, pastel, puede ser a mano alzada   o con instrumentos de dibujo técnico (paralela, escuadras, curvígrafos,   compás). \nPresentación Contenido  12  Especificaciones   ¿A quién se dirige?    » Al finalizar la primera jornada, a las 12:00 m., los estudiantes dejarán   el sobre, los pliegos de borrador y el pliego formato entregado por   el Icfes en su lugar de trabajo. Los instrumentos de dibujo deberán   ser recogidos por cada estudiante, dado que el Icfes o la institución   no se harán responsables por su extravío de estos. Los estudiantes   regresarán al salón a las 2:00 p. m. y no podrán ingresar documentos o   materiales diferentes a los ingresados a la primera jornada.    » Al final de la segunda jornada, se debe entregar en el sobre   correspondiente únicamente el ejercicio desarrollado en el pliego   suministrado por el Icfes, sin información adicional anexada al pliego.    » La plancha se introducirá en el sobre, doblada de la misma manera   como le fue entregada por el delegado del Icfes al iniciar la primera   jornada, de forma tal que el rótulo con el número EK del estudiante esté   siempre visible.  •  La plancha y el sobre que la contiene no deben llevar el nombre del   estudiante ni el de la institución en la que estudia.  •  La plancha entregada por los estudiantes es el único material que se   considera oficial y, asimismo, el único que se evalúa y califica.  •  El material suelto o anexo a la plancha se descartará y no se tendrá   en cuenta para la evaluación.  •  No está permitido, bajo ninguna circunstancia, llevar elaboraciones   hechas previamente. Solo se aceptarán los desarrollos realizados   por el estudiante en el sitio de aplicación de la prueba.    » El jefe de salón verificará el material entregado por los estudiantes y lo   guardará en el sobre, el cual sellará y firmará. \nPresentación Contenido  13  Especificaciones   ¿A quién se dirige?  IV.  Especificaciones del módulo   Proyecto de Arquitectura  En este apartado se presentan las características y la estructura del   módulo de competencias específicas Proyecto de Arquitectura, que, junto   con los módulos de competencias genéricas, conforman el examen Saber   Pro. Para ello, se presenta la información desagregada en competencias,   afirmaciones y evidencias que las componen, siguiendo la metodología del            Diseño Centrado en Evidencias  ( f  gura  2 ).    » Figura 2.  Diseño Centrado en Evidencias  Competencias  Son las habilidades necesarias para aplicar los conocimientos en diferentes   contextos. En este sentido, enfrentarse al examen Saber Pro no implica   solamente conocer conceptos o datos, sino que involucra saber cómo   emplear dicha información para resolver problemas en situaciones de la   vida cotidiana.  Afirmaciones  Para cada competencia se definen una o más afirmaciones que representan   aspectos específicos de un área del conocimiento o un conjunto de   habilidades y destrezas, los cuales se espera que los evaluados puedan   demostrar a través del saber-hacer.  Evidencias  Las afirmaciones, a su vez, se componen de evidencias, entendidas como   aquello que permite inferir que el evaluado posee las habilidades o los   conocimientos suficientes para dar cuenta de la afirmación relacionada.   Se trata de la formulación de aspectos observables en los evaluados que   permitan obtener información del nivel de adquisición de las afirmaciones   planteadas. \nPresentación Contenido  14  Especificaciones   ¿A quién se dirige?  Competencia evaluada  El módulo  Proyecto de Arquitectura  se compone de una sola pregunta   abierta que evalúa la competencia para proyectar creativa e integralmente   espacios arquitectónicos habitables, con el fin de dar respuesta a los   requerimientos de la sociedad, previa valoración del contexto ambiental y   cultural desde una perspectiva estética y técnica.  Esta competencia se refiere a los procesos conceptuales y sintéticos   necesarios para proyectar o diseñar proyectos de arquitectura, en   específico, aquellos relacionados con la transformación, organización y   construcción de los espacios habitables (en distintas escalas y en diferentes   contextos), a partir del planteamiento de un problema o encargo, tras la   interpretación de las diferentes variables y condicionantes: el entorno, el   emplazamiento, la normativa del programa y las posibilidades técnicas y   tecnológicas.  De igual manera, la competencia involucra los procesos que permiten   entender necesidades, variables contextuales y exigencias de normativa   para convertirlas en un problema de arquitectura solucionable mediante   la aplicación de principios que orientan la elaboración de proyectos que   producen objetos arquitectónicos y espacios habitables en un entorno   determinado.  Siguiendo la metodología propuesta por el Diseño Centrado en Evidencias   y de acuerdo con el      Marco de referencia  del módulo, la competencia   evaluada se desagrega en tres afirmaciones.    » Afirmación 1  Comprende la información contextual dada: entiende que el requerimiento   del módulo es un encargo arquitectónico a solucionar, que involucra   diferentes componentes, y es capaz de usar la información para su respuesta  Evalúa la capacidad del estudiante de entender y usar la información dada,   e implementarla en la solución al encargo. Interpretar es un proceso que se   inicia con el análisis de la información disponible y continúa con el manejo   y relación de la información, en relación con los distintos componentes del   proyecto. Comprender implica identificar con claridad las relaciones y las   jerarquías necesarias entre los componentes del proyecto  Esta afirmación se desagrega en tres evidencias, como se muestra en la   tabla 1 .    » Tabla 1.  Evidencias de la afirmación 1  Evidencias  1.1  Elabora la propuesta de acuerdo con el tema solicitado.  1.2  Se implanta en el lote propuesto.  1.3  Cumple las normas y áreas del encargo. \nPresentación Contenido  15  Especificaciones   ¿A quién se dirige?    » Afirmación 2  Convierte la información elaborada, con base en la información contextual, en argumentación de las   decisiones tomadas, para cada uno de los componentes  Evalúa la capacidad para argumentar las decisiones tomadas para soportar la solución al encargo. Se   trata de articular lógica y secuencialmente las ideas arquitectónicas, de modo que se pueda apreciar   la racionalidad de todas las decisiones proyectuales, de acuerdo con criterios claros y vigentes en el   desarrollo del proyecto propuesto, teniendo en cuenta las condiciones y necesidades establecidas en la   información contextual.  Esta afirmación se desagrega en cuatro evidencias, como se muestra en la  tabla 2 .    » Tabla 2.  Evidencias de la afirmación 2  Evidencias  2.1  Explica el proyecto desde la implantación que ha propuesto de manera gráfica y escrita.  2.2  Explica el proyecto desde la forma y espacio que ha propuesto de manera gráfica y escrita.  2.3  Explica el proyecto desde la solución técnica que ha propuesto de manera gráfica y escrita.  2.4  Explica el proyecto desde la distribución y lógica de actividades que ha propuesto de manera   gráfica y escrita. \nPresentación Contenido  16  Especificaciones   ¿A quién se dirige?    » Afirmación 3  Desarrolla la propuesta de manera coherente y coordinada articulando   cada uno de los componentes en función de los demás y la representa   utilizando los códigos propios de la comunicación en arquitectura  Evalúa la capacidad de síntesis de un estudiante para dar respuesta   coordinada a los diferentes componentes –urbano, tecnológico, funcional   y formal-espacial– involucrados en la prueba, con códigos de dibujo   arquitectónico. Consiste en representar por medio de plantas, cortes,   alzados, axonometrías, perspectivas, entre otros, la solución planteada al   encargo, de tal manera que muestre capacidad de coordinar la respuesta   correspondiente a cada componente con los demás.  Esta afirmación se desagrega en diez evidencias, como se muestra en la   tabla 3 .    » Tabla 3.  Evidencias de la afirmación 3  Evidencias  3.1  Representa el proyecto con códigos de dibujo arquitectónico.  3.2  Representa un planteamiento de cada uno de los componentes   evaluados.  3.3  Desarrolla las relaciones programáticas del proyecto.  3.4  Desarrolla un sistema estructural para el proyecto.  3.5  Desarrolla una implantación del proyecto en relación al lugar dado.  3.6  Desarrolla una forma arquitectónica.  3.7  Relaciona la forma-espacio propuesta al programa y técnica   propuesta y a la implantación propuesta.  3.8  Relaciona el programa desarrollado a la forma-espacio y a la técnica   propuesta y a la implantación propuesta.  3.9  Relaciona una técnica propuesta a un programa y una forma-  espacio propuesta y a la implantación propuesta.  3.10  Relaciona la implantación propuesta a un programa, a la forma-  espacio y a la técnica propuesta. \nPresentación Contenido  17  Especificaciones   ¿A quién se dirige?  V.  ¿A quién se dirige el módulo?  Este módulo se dirige únicamente a estudiantes que hayan aprobado por   lo menos el 75 % de los créditos académicos del programa profesional   universitario que cursan, que presentan el examen por primera vez y que   fueron inscritos directamente por su Institución de Educación Superior   (IES) para la presentación del módulo. Cada IES tiene la posibilidad de   seleccionar una de las  combinatorias  que se ofertan para cada uno de los   grupos de referencia , según lo considere pertinente para cada uno de sus   programas.  Definición de combinatoria  Es una agrupación de módulos que es presentada por los   evaluados en el examen Saber Pro. Dicha agrupación está   conformada por cinco módulos de competencias genéricas   (Razonamiento Cuantitativo, Lectura Crítica, Competencias   Ciudadanas, Comunicación Escrita e Inglés) y puede incluir   hasta tres módulos de competencias específicas, que se   ofertan según los grupos de referencia.  Definición de grupo de referencia 2  Es una agrupación de programas profesionales   universitarios con características de formación similares.   Esta agrupación es útil para delimitar la oferta de   combinatorias que brinda el Icfes a los diferentes   programas y para que los evaluados puedan comparar   sus resultados con los de otros examinandos del mismo   grupo de referencia.  2      Actualmente, conforme con la       Resolución 395 del 12 de junio del 2018 ,   se definen estos grupos de acuerdo con el Núcleo Básico del Conocimiento (NBC)   y el nivel de formación establecido para cada programa académico, según la   clasificación Sistema Nacional de Información de Educación Superior (SNIES) del   Ministerio de Educación Nacional. \nPresentación Contenido  18  Especificaciones   ¿A quién se dirige?  No obstante, para garantizar que los módulos de competencias específicas   sean afines al programa de formación de los estudiantes, se recomienda   que el(la) director(a) del programa sea quien defina, al momento del   prerregistro, qué combinatoria presentarán.  Para consultar la oferta de combinatorias de módulos disponible para su   programa académico, le recomendamos llevar a cabo los siguientes pasos:    » Paso 1:  Identifique el código  SNIES  asociado al programa.    » Paso 2:  Ingrese el      código SNIES  del programa y verifique el  NBC    asociado a este.    » Paso 3:  Consulte la      oferta de combinatorias  de módulos Saber Pro   2026-2 disponible para su  NBC .  Es importante aclarar que las IES pueden decidir que sus estudiantes no   tomen ninguno de los módulos de competencias específicas que oferta el   Icfes y, de esta manera, los evaluados solo deberán presentar los módulos   de competencias genéricas.   Los tiempos de aplicación del examen varían de acuerdo con el número   de módulos de competencias específicas que el evaluado presente. Para   mayor información, consulte la guía de orientación de los       módulos de   competencias genéricas  del examen Saber Pro en la página web del Icfes.  El módulo Proyecto de Arquitectura se oferta a los programas asociados al   NBC de  Arquitectura .  Si desea familiarizarse con los módulos   de competencias genéricas y específicas   del examen Saber Pro y con los tipos   de preguntas, consulte la      caja de   herramientas , la cual contiene marcos   de referencia, infografías, cuadernillos   de preguntas, ejemplos de preguntas   explicadas y más. \nSubdirección de Diseño de Instrumentos  Dirección de Evaluación  Calle 26 N.º 69-76, Torre 2, Piso 16, Edificio Elemento, Bogotá D. C.,   Colombia    www.icfes.gov.co  Líneas de atención al ciudadano: Bogotá D. C.,   Tel.: (60+1) 915 6101 I PBX: (60+1) 915 6101 \n";

    function extractTextFromBackendResponse(raw) {
        if (raw == null) return '';
        const s = String(raw).trim();
        if (!s) return '';
        try {
            const j = JSON.parse(s);
            if (Array.isArray(j)) return JSON.stringify(j);
            if (j && typeof j === 'object') {
                const c = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
                if (typeof c === 'string') return c.trim();
                if (typeof j.content === 'string') return j.content.trim();
                if (typeof j.text === 'string') return j.text.trim();
            }
            if (typeof j === 'string') return j;
        } catch (e) {}
        return s;
    }
    async function postBackendText(payload) {
        const body = { model: payload.model || 'openai-fast', prompt: payload.prompt };
        if (payload.system) body.system = payload.system;
        if (payload.json) body.json = true;
        const res = await fetch(BACKEND_BASE + '/api/ia/text', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const raw = await res.text();
        if (!res.ok) throw new Error('Error de API: ' + res.status + ' ' + res.statusText + '. ' + raw.substring(0, 200));
        return extractTextFromBackendResponse(raw);
    }

    // Theme and palette

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {
        const hue = Math.floor(Math.random() * 360);
        const bg = hslToHex(hue, 45 + Math.floor(Math.random() * 20), 16 + Math.floor(Math.random() * 70));
        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {
        const base = palette || {
            primaryColor: '#2563eb',
            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',
            inputBorderColor: '#cbd5e1',
            chatBubbleBotBg: '#f3f4f6',
            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {
        if (!palette) return;
        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');
        target.style.setProperty('--bg', palette.bgColor || '#f8f9fa');
        target.style.setProperty('--text', palette.textColor || '#343a40');
        target.style.setProperty('--card', palette.cardBgColor || '#ffffff');
        target.style.setProperty('--border', palette.cardBorderColor || '#dddddd');
        target.style.setProperty('--input', palette.inputBgColor || '#ffffff');
        target.style.setProperty('--iborder', palette.inputBorderColor || '#cccccc');
        target.style.setProperty('--bot-bg', palette.chatBubbleBotBg || '#e9ecef');
        target.style.setProperty('--bot-text', palette.chatBubbleBotText || '#343a40');
        target.style.setProperty('--user-bg', palette.chatBubbleUserBg || '#007bff');

        target.style.setProperty('--sys-bg', palette.systemMessageBg || '#fff3cd');
        target.style.setProperty('--sys-text', palette.systemMessageText || '#856404');
    }
    function applyPalette(palette) {

        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');

                }

            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';

        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;

        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
</body>
</html>
