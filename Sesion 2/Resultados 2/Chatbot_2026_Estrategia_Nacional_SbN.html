        :root{--primary:#007bff;--secondary:#6c757d;--light:#f8f9fa;--dark:#343a40;--success:#28a745;--danger:#dc3545;--warning:orange;--radius:8px;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--bg:var(--light);--text:var(--dark);--card:#fff;--border:#ddd;--input:#fff;--iborder:#ccc;--bot-bg:#e9ecef;--bot-text:var(--dark);--user-bg:var(--primary);--user-text:#fff;--sys-bg:#fff3cd;--sys-text:#856404;}

        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}

        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}

lo PNGIBSE   Política Nacional de Gestión Integral de Biodiversidad y Servicios Ecosistémicos  PNN   Parque Natural Nacional  PNUD   Programa de las Naciones Unidas para el Desarrollo  PNUMA   Programa de las Naciones Unidas para el Medio Ambiente  POMCA   Planes de Ordenación y Manejo de Cuencas Hidrográficas POT   Plan de Ordenamiento Territorial PSA   pagos por servicios ambientales RNSC   Reserva Natural de la Sociedad Civil  RRD   reducción del riesgo de desastres  RRI   Reforma Rural Integral  RUNAP   Registro Único Nacional de Áreas Protegidas SbN   Soluciones basadas en la Naturaleza SINA   Sistema Nacional Ambiental SINAP   Sistema Nacional de Áreas Protegidas SisClima   Sistema Nacional de Cambio Climático SolNatura   Proyecto de Soluciones basadas en la Naturaleza implementado por encargo del  MinAmbiente Alemán (BMUKN) con fondos IKI, en Consorcio con GIZ, Fondo Acción  y The Nature Conservancy SUDS   Sistemas de Drenaje Urbano Sostenible TNC   The Nature Conservancy  UICN   Unión Internacional para la Conservación de la Naturaleza UNEA   Asamblea de las Naciones Unidas para el Medio Ambiente  UPA   Unidades Productoras Agropecuarias  UPRA   Unidad de Planificación Rural Agropecuaria WRI   Instituto de los Recursos Mundiales WWF   World Wildlife Fund SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  7 \nINTRODUCCIÓN   La   Estrategia Nacional de Soluciones basadas en  la Naturaleza (SbN ) es un instrumento clave para  enfrentar de manera integrada múltiples desafíos  climáticos, ambientales y sociales del país. Al re- conocer el valor de los ecosistemas como aliados  fundamentales para la resiliencia y el desarrollo  sostenible,  esta  estrategia  establece  un  marco  coordinado de acción que promueve su preserva- ción, restauración y uso sostenible. Su propósito es  orientar el diseño, la planificación, la implementa- ción y el escalamiento de proyectos de SbN a partir  del  reconocimiento  de  la  heterogeneidad  de  los  territorios, así como promover la movilización de  recursos  motivada  en  su  potencial  para  generar  múltiples beneficios para las comunidades locales  y para la resiliencia de sectores y territorios. En el  Plan Nacional de Desarrollo 2022-2026:  Colombia,  potencia  mundial  de  la  vida   se  reco - nocen las SbN como elementos centrales para el  desarrollo de una estrategia integral para la re- ducción de riesgos de desastres, la gestión de la  biodiversidad y del suelo, así como para la mitiga- ción y adaptación al cambio climático. Igualmente,  en el Plan de Gobierno se resalta el potencial de  los ecosistemas naturales en la reducción del ries- go mediante la renaturalización de los cuerpos de  agua, la recuperación y regeneración de áreas de- terioradas. En este contexto, las SbN representan  un alto potencial para la articulación de las agen- das  de  biodiversidad  y  cambio  climático  y  con  otras agendas que abordan necesidades sentidas  de la población en las regiones como el acceso al  agua, la seguridad alimentaria y la generación de  oportunidades de ingreso. Así fue expresado por  miles de ciudadanos en los diálogos regionales  vinculantes  realizados  para  la  elaboración  este  instrumento de planeación.    Las  SbN  son  también  un  pilar  estratégico  en  la Contribución Determinada a Nivel Nacional de  Colombia (NDC 3.0), al ser incluida como medio de  implementación en el Eje de “Desarrollo y trans- ferencia de tecnología”, bajo el liderazgo del DNP,  y alineándose con los compromisos del Acuerdo  de París y la visión de carbono neutralidad a 2050.  Asimismo, la presente Estrategia Nacional de SbN  se convierte, además, en la base para la guía de  implementación de ciudades verdes, biodiversas y  resilientes, señalada en la llamada  Ley  de  Ciuda- des Verdes  (Ley 2476 de 2025) considerando que  las SbN son el principal medio para que los munici- pios y distritos alcancen los objetivos de dicha ley. La  definición  utilizada  en  Colombia  como  país  miembro de la Organización de Naciones Unidas,  es la aprobada en la quinta sesión de la Asamblea  para el Medio Ambiente (UNEA5): “ SbN son accio- nes  para  proteger,  conservar,  restaurar,  utilizar  de   forma sostenible y gestionar los ecosistemas terres- tres, de agua dulce, costeros y marinos naturales o   modificados que hacen frente a los desafíos socia -  les, económicos y ambientales de manera eficaz y   adaptativa,  procurando  al  mismo  tiempo  bienestar   humano, servicios ecosistémicos, resiliencia y bene-  ficios para la biodiversidad ” (UNEP, 2022).  De esta definición se destaca que las interven- ciones se realizan sobre ecosistemas naturales o  modificados para abordar problemas que afectan  a la sociedad. Su uso responde a la necesidad de  encontrar  soluciones  innovadoras  a  dichos  pro- blemas,  a  través  de  la  gestión  de  los  sistemas  naturales  de  tal  suerte  que  generen  beneficios  para los sistemas ecológicos y para las comunida- des humanas; igualmente promueven un cambio  de  paradigma  respecto  al  rol  de  las  personas  como actores activos en esta gestión, en lugar de  ser actores externos a ella (Cohen-Shacham  et al. ,  2016; Sowińska-Świerkosz & García, 2022).  El enfoque de política propuesto se enmarca en la  promoción del desarrollo sostenible fuerte en el que  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  8 \nla naturaleza no se considera como una reserva de re- cursos sino como un conjunto de sistemas complejos  con elementos bióticos y abióticos cuyas interaccio- nes determinan su capacidad para proporcionar a la  sociedad humana, directa e indirectamente, una am- plia gama de funciones y servicios. En este marco, el  capital natural no puede ser sustituido por lo que su  conservación debe ser una prioridad del desarrollo  (Pelenc y otros, 2015) y no solo una responsabilidad  de las entidades del sector ambiental.  Esto se refuerza con la mirada de la naturaleza  no solo como beneficiosa para la humanidad,  sino  como  elemento  fundamental  del  que  depende   su sobrevivencia . Mediante el suministro de aire  puro, agua, alimentos y otros recursos, la natura- leza presta servicios a la economía mundial por  un valor estimado de 125.000 billones de dólares  anuales. Aun así, el agotamiento y degradación  del capital natural del planeta continua de forma  acelerada. Como se confirma en la Iniciativa de  Riesgos Mundiales del Foro Económico Mundial,  la pérdida de biodiversidad, el colapso de ecosis- temas y el cambio climático se encuentran entre  los mayores riesgos sistémicos para la economía  mundial y provocan pérdidas por la ocurrencia de  desastres que cuestan más de 300.000 millones  de dólares al año (World Economic Forum, 2020). La Estrategia está estructurada en cuatro ca- pítulos. El primero  es un diagnóstico nacional que   constituye  la  base  contextual , incluye una visión  general de la pérdida de los ecosistemas y de los  principales  desafíos  que  son  abordados  por  las  SbN, identifica las principales barreras para su im- plementación y el marco político y normativo que la  habilita. El segundo capítulo plantea las SbN como  un medio para abordar desafíos apremiantes de la  sociedad a través de la identificación de impactos  que estos generan sobre la población y los ecosis- temas, los beneficios cuantificados de experiencias  implementadas en Colombia y otros países para  reducir estos impactos y la oportunidad de superar  la planeación basada en disciplinas aisladas para  atender los desafíos con de forma sistémica.  El tercer capítulo propone un marco de estruc- turado del tipo de intervenciones que constituyen  SbN que proporciona una perspectiva integrada  de las posibilidades de acción frente a los desa- fíos que abordan (ver infografía al final de esta  sección);  los  criterios  y  requisitos  mínimos  que  caracterizan los proyectos de SbN y qué los di- ferencian  de  otras  intervenciones;  lineamientos  para  orientar  su  planeación,  a  tener  en  cuenta  para facilitar el logro de sus objetivos, consideran- do que son proyectos de largo plazo, que buscan  resultados  en  diferentes  áreas  del  desarrollo  y  dependen en gran medida de la apropiación de las  comunidades de los sitios donde se desarrollan.  Por último, el cuarto capítulo contiene las líneas  estratégicas que buscan orientar la acción pública  y privada hacia la conservación y uso sostenible  de los ecosistemas, mediante inversiones estruc- turadas que contribuyan a consolidar un contexto  favorable para enfrentar los desafíos climáticos,  ambientales  y  sociales.  Estas  líneas  ofrecen  un  marco coherente para integrar las SbN en la pla- nificación  sectorial  y  territorial  de  manera  que  facilite y permita escalar su implementación en  los territorios, mediante acciones para consolidar  el entorno propicio, así como marcos de actuación  de los sectores de gobierno y económicos que tie- nen dependencia directa de los recursos naturales  o que se ven afectados por riesgos climáticos. Dada la naturaleza integral de las SbN, y las  múltiples disciplinas que estas involucran, el dise- ño de la Estrategia se ha adelantado mediante un  proceso participativo desarrollado en los últimos  años con actores públicos y privados involucrados  en la implementación de este tipo de proyectos,  entre  ellos  entidades  públicas  nacionales  y  te- rritoriales,  autoridades  ambientales,  gremios,  entidades  financieras,  organizaciones  no  guber- namentales e instituciones académicas. Esto ha  permitido integrar visiones, conocimiento y expe- riencias  de  diferentes  perspectivas.  Entre  estos  espacios se destacan las orientaciones desde la  experiencia en territorios del proyecto SolNatura,  las sesiones de trabajo con el Ministerio de Am- biente y Desarrollo Sostenible (MinAmbiente), y  las contribuciones de otras entidades sobre las  líneas estratégicas sectoriales.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  9 \nCon la implementación de esta política se busca  aumentar  la  inversión  en  la  protección  de  eco- sistemas que contribuya a abordar los diversos  desafíos para garantizar el bienestar presente y  futuro de las comunidades, en especial las más  dependientes  de  los  recursos  naturales,  con  el  propósito de impulsar el desarrollo sostenible, re- siliente y económicamente eficiente.   ¿Qué son?  Son intervenciones integrales que incluyen medidas para  gestionar los ecosistemas naturales y modificados, dirigi- das a abordar desafíos que afectan el bienestar humano. SbN SOLUCIONES BASADAS EN LA NATURALEZA Abordando desafíos como:  Mitigar y adaptarse al cambio climático Reducir el riesgo de desastres Seguridad hídrica   Seguridad alimentaria Terrestre   Acuático-conti- nental   Marino-costero   Rural-productivo   Urbano  Preservación Ecosistemas naturales o modificados Enfoques   •  Adaptación basada ecosistemas (AbE) •  Mitigación basada en ecositemas (MbE) •  Reducción del riesgo de desastres basada en ecosistemas (Eco-RRD) •  Infraestructura natura•  Ingeniería ecológica  Preservación de ecosistemas naturales  como bosques, sabanas y páramos •  Reducción del riesgo de inundaciones    y deslizamientos •  Control de la erosión •  Contribución a la regulación de caudales •  Conservación de la biodiversidad, entre otros  Corredores y zonas verdes en áreas urbanas •  Regulación de la temperatura •  Espacios de recreación •  Conectividad ecológica •  Mantenimiento y establecimiento de hábitats para especies de fauna y flora  Sistemas agroforestales y silvopastoriles en paisajes naturales productivos •  Incremento en la producción •  Mejora de la calidad del suelo •  Seguridad alimentaria •  Conectividad ecológica •  Mantenimiento y establecimiento de hábitats para especies de fauna y flora  Su implementación permite:  Recuperación Manejo y uso  sostenible   DiseñoReducir la pérdida de biodiversidad  A través de medidas de: En los contextos ecosistémicos: SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  10 \nDIAGNÓSTICO  NACIONAL  01  El  diagnóstico nacional constituye la base contextual de la Estra- tegia , pues proporciona una visión general de la pérdida de los  ecosistemas y las oportunidades que ofrecen para contribuir al  desarrollo sostenible y la reducción del riesgo climático. Así mis- mo, se describen los principales desafíos que son abordados por  las SbN, se identifican las características institucionales que re- presentan barreras para su implementación y el marco político y  normativo que la habilita. Este diagnóstico ofrece un punto de par- tida para orientar las líneas estratégicas y dirigir a las principales  necesidades nacionales. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  11 \n1.1  Colombia  avanza  hacia  la  consolidación  de  un  modelo de desarrollo resiliente, sostenible, en el  que se reconoce cada vez más la necesidad de  gestionar de manera efectiva los riesgos climáti- cos, ambientales y sociales. No obstante, persiste  un  conjunto  de  desafíos  interrelacionados  que  afectan el bienestar de la población, a sus me- dios de vida y pueden desacelerar el crecimiento  económico.  Según  el    Primer  Informe  Bienal  de   Transparencia,  la totalidad del territorio nacional  enfrenta  algún  nivel  de  amenaza  climática,  con  mayor intensidad en las regiones Andina y Caribe,  en donde el 56 % de los departamentos registran  niveles  de  amenaza  muy  alta  (IDEAM    et  al. ,  2024). Las proyecciones estiman que, sin medidas  efectivas de adaptación, los impactos climáticos  podrían generar pérdidas equivalentes a entre el  1,5 % y el 2,5 % del producto interno bruto (PIB)  hacia 2050 (World Bank Group, 2023).  En materia de emisiones de Gases de Efecto  Invernadero  (GEI),  aunque  Colombia  representa  menos del 1 % de las emisiones globales, estas  aumentaron  25,80  %  entre  1990  y  2021,  prin- cipalmente  por  la  deforestación,  la  quema  de  combustibles fósiles y de biomasa y el desarrollo  industrial (IDEAM  et  al. , 2024). En consecuencia,  el país estableció metas ambiciosas que incluyen  reducir el 51 % de las emisiones de GEI para 2030  y alcanzar la carbono neutralidad en 2050. Para  cumplir  con  estos  compromisos,  los  esfuerzos  se orientan a la contención de la deforestación,  la restauración de 5,6 millones de hectáreas, la  expansión del transporte eléctrico y el fortaleci- miento de la matriz energética renovable (World  Bank  Group,  2023).  En  este  escenario,  el  país  cuenta  con  instrumentos  de  política  y  coordi- nación como el Plan Nacional de Adaptación al  Cambio Climático (PNACC) y el Sistema Nacional  de Cambio Climático (SisClima). Por otro lado, los desastres de origen hidrometeo- rológico representan más del 85 % de los eventos  registrados en el país y generan impactos signifi- cativos, en especial a nivel local. Entre 1998 y 2023  se documentaron más de 13.000 eventos de este  tipo, que generaron un promedio anual de 2.800  viviendas destruidas y 160 pérdidas de vidas hu- manas. Las inundaciones, incendios, movimientos  en masa y vendavales concentraron el 83 % de los  casos de emergencias y desastres (DNP, 2024). Si  bien  Colombia  ha  adoptado  instrumentos  como  el Marco de Sendai y el Plan Nacional de Gestión  del Riesgo, así como mecanismos de articulación  con  compromisos  climáticos,  persisten  retos  en  materia de coordinación territorial, financiación y  gobernanza del riesgo (PNUD, 2023).  Adicionalmente, la movilidad humana por cau- sas climáticas se ha convertido en un fenómeno  creciente en el país. En 2023 se registraron 351.000  nuevos desplazamientos internos por desastres — principalmente tormentas, inundaciones, sequías e  incendios forestales— lo que genera un profundo  desarraigo y afecta múltiples derechos fundamen- tales (República de Colombia, 2025). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  12  Contexto de  los desafíos  \nLa pérdida de ecosistemas profundiza estos ries- gos: el Instituto Humboldt, indica que el 65 % de  las coberturas naturales originales han sido trans- formadas, principalmente en las regiones Andina  y Caribe. Esta degradación incrementa la vulnera- bilidad por la pérdida de servicios ecosistémicos,  que alcanza el 69 % en el Caribe y el 45 % en  la región Andina, y podría afectar hasta el 80 %  de  las  especies  dependientes  de  los  bosques  para 2030. Para enfrentar esta situación, el país  ha fortalecido la declaratoria de áreas protegidas  dentro  del  Sistema  Nacional  de  Áreas  Prote- gidas (SINAP), con una meta de 42 millones de  hectáreas de áreas protegidas para el año 2030  (Instituto Alexander von Humboldt, 2022). En cuanto a la seguridad hídrica, aunque Co- lombia cuenta con un volumen promedio de agua  dulce por habitante superior al promedio mundial,  el abastecimiento es vulnerable debido a la alta  dependencia de fuentes superficiales altamente  sensibles a la variabilidad climática (World Bank  Group, 2020). En este contexto, la regulación del  agua se ve afectada por los cambios en el uso del  suelo, mientras que su disponibilidad está influida  por la demanda para los diferentes usos y el verti- miento de sustancias contaminantes. En cuanto a  la demanda, en los Estudios Nacionales del Agua  (ENA) de 2010 a 2022 se ha identificado el au- mento  progresivo  de  la  huella  hídrica  verde  en  zonas con cobertura de pastos, mientras que, por  el lado de la contaminación la mayor carga está  constituida por la Demanda Química de Oxígeno,  generada principalmente por el sector industrial,  según los datos del ENA 2022 (IDEAM, 2022). En cuanto a la vulnerabilidad de los recursos hí- dricos  al  cambio  climático,  en  la  Contribución  Nacionalmente  Determinada  (NDC)  declarativa  3.0 se reconoce que el 63 % de los municipios re- dujo su vulnerabilidad, mientras que el 35 % la  incrementó. En estos últimos, los principales fac- tores que contribuyeron fueron la deforestación, la  alta susceptibilidad al desabastecimiento en tem- poradas secas y bajos valores de la proporción de  coberturas naturales conservadas (República de  Colombia, 2025).  La  degradación  ambiental  también  intensi- fica la inseguridad alimentaria. Según el DANE,  en 2024, el 27,6 % de la población —cerca de  14,4 millones de personas— experimentó inse- guridad  alimentaria  moderada  o  grave.  Estos  niveles  de  inseguridad  alimentaria  se  encuen- tran en 34,2 % en las zonas rurales, mientras que  es de 24,7 % en las zonas urbanas, siendo más  alta en los hogares con mujeres cabeza de hogar  (DANE, 2025). Para avanzar hacia la reducción  de la inseguridad alimentaria en 2030, Colombia  implementa la  Política de Seguridad Alimentaria   y  Nutricional   y ha adherido a iniciativas globa- les como la Coalición para la Integración de la  Nutrición  (Global  Alliance  Against  Hunger  and  Poverty, 2024; ICBF, 2016).  En  conjunto,  estos  desafíos  evidencian  que,  aunque Colombia ha avanzado en la formulación  de políticas, marcos normativos y planes estraté- gicos, la consolidación del desarrollo sostenible  y  resiliente  requiere  enfocar  mayores  esfuerzos  para implementar medidas efectivas y territorial- mente pertinentes.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  13 \n1.2   Principales barreras que  dificultan la implementación   El interés por implementar SbN es creciente por  su potencial de abordar desafíos interconectados  y generar múltiples beneficios frente a ellos, en  particular ante la perdida de la biodiversidad, la  seguridad hídrica y alimentaria, en un contexto de  cambio climático. No obstante, la materialización  de este interés se ve limitada por factores como  la dificultad de cuantificar los beneficios que ge- neran, el largo plazo en el que pueden evaluarse  y la preferencia por destinar recursos a obras de  infraestructura gris.  Hace poco, en la Conferencia de las Naciones  Unidas sobre el Agua, realizada en Nueva York en  2023, se hizo el reconocimiento del papel de las  SbN para la seguridad hídrica; a partir de experien- cias de SbN de impacto regional en varios países  se resaltaron los siguientes aspectos que deben  ser superados para facilitar su implementación:  Es necesario precisar el  alcance de las SbN antes de  hacer compromisos con las  comunidades y financiadores  y de ejecutar proyectos.  Los proyectos no cuentan  con incentivos para informar  o aprender de las fallas.    Las instituciones deben  desarrollar procesos para las  intervenciones de SbN con  directrices y especificaciones  técnicas claras y desarrollar  la capacidad para utilizarlas. Los financiadores y los  estándares deben permanecer  lo suficientemente flexibles  para permitir que las SbN  respondan y se adapten a las  necesidades locales. Se requiere adaptar los  sistemas para realizar  inversiones, de manera que  reduzcan las barreras a la  participación y aumenten  los beneficios para las  comunidades locales. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  14 \nEn  Colombia,  en  los  espacios  de  participación  realizados como parte de la elaboración de esta  Estrategia, se identificaron barreras de diversos  tipos  que  se  consolidan  en  la  siguiente  tabla,  mientras que en los párrafos posteriores se des- cribe cómo se abordan acá algunas de ellas.   Tabla 1.  Principales barreras para la planeación e implementación de SbN en Colombia  Conceptuales   Normativas   Técnicas y  operativas Gobernanza y  participación   Financiamiento  Múltiples  interpretaciones  del concepto y  alcance de las  SbN Lineamientos   nacionales  suelen no ser   compatibles con  las posibilidades   locales  Deficiencias en  el acceso a datos  (p.e.: información  cartográfica de  escalas muy  generales para  la formulación de  proyectos)  Baja participación  de las  comunidades en  la formulación  de proyectos, en  especial grupos  de población  sistemáticamente  excluidos Falta de  flexibilidad de la  banca multilateral   frente a la   implementación  de soluciones  innovadoras Insuficiente  conocimiento de  herramientas de  análisis costo- beneficio Multiplicidad de  instrumentos de  ordenamiento y  planeación Renuencia de  la ingeniería  tradicional para   transitar hacia  soluciones   innovadoras Desconfianza   en las   instituciones por  incumplimientos  de acuerdos en  experiencias  previas Insuficiente  financiamiento  para proyectos con  impactos que se  evidencian solo en  el largo plazo Uso del concepto  para soportar una  imagen verde,  como el uso de  afirmaciones   falsas o   exageradas sobre  la sostenibilidad  de productos o  proyectos Falta de  divulgación sobre  los requisitos  legales para la  implementación  de SbN Insuficientes  capacidades a   nivel territorial   para formular  proyectos   Los actores   públicos y  privados priorizan  resultados  inmediatos sobre  los beneficios a  largo plazo Inadecuada  planeación  financiera (p.e.:  no se consideran  costos de  mantenimiento) Falta de  articulación entre  el conocimiento  académico, técnico  y tradicional Falta de  flexibilidad  del sistema de  inversiones y de  la Metodología  General Ajustada  (MGA) para  formular proyectos  integrales  Fuente:  elaboración propia. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  15 \nLas  barreras  conceptuales  se  abordan  con  el  marco estructurado de intervenciones y los crite- rios y requisitos mínimos para proyectos de SbN  presentados en el capítulo 4, que en conjunto per- miten enfocar los tipos de acciones a desarrollar  por las organizaciones y entidades interesadas en  formular este tipo de proyectos.   En  cuanto  a  las  barreras  técnicas  y  operati- vas,  se  presentan  casos  exitosos  de  proyectos  en Colombia y en otros países, con énfasis en los  beneficios cuantificados que responden a nece- sidades de las comunidades locales y se hacen  recomendaciones  para  hacer  análisis  de  cos- to-beneficio  para  comparar  alternativas,  lo  cual  contribuye a justificar las inversiones. Además, se  propone realizar espacios de socialización en el  marco de la Estrategia y de red nacional sobre as- pectos técnicos y de financiamiento que incluyen  el uso de conceptos, herramientas y experiencias  exitosas a actores institucionales interesados en  la formulación en implementación de proyectos y  actores de llegada al territorio como los extensio- nistas agropecuarios.  Se  resalta  la  necesidad  de  la  gobernanza  y  participación  de  las  comunidades  locales  en  la  formulación  e  implementación  de  proyectos  en  el primer criterio para proyectos de SbN y se pro- pone un lineamiento de gobernanza participativa  fundamentado  en  la  inclusión.  En  cuanto  a  las  barreras sobre financiamiento, se incluye informa- ción sobre las fuentes de financiamiento públicas,  privadas, del sector financiero y las habilitadas a  través de normas y se indica a cuáles tipos de SbN  se dirigen. Además, se plantean acciones para au- mentar la disponibilidad de recursos y dinamizar  el financiamiento de proyectos.  Por  último,  con  las  líneas  estratégicas  se  visi- biliza  la  integralidad  y  multifuncionalidad  de  las SbN para generar beneficios a diversos sec- tores del desarrollo con lo que se contribuye a  cambiar  el  paradigma  de  que  la  protección  de  la naturaleza es costosa, poco rentable y única- mente responsabilidad del sector ambiental; las  entidades  sectoriales  desarrollarán  estrategias,  orientaciones  y  acciones  específicas  para  pro- mover su escalamiento mediante intervenciones  planeadas con visión sistémica.  Además  de  las  mencionadas,  existen  ba- rreras  estructurales  que  pueden  limitar  la  implementación de proyectos que deben tenerse  en cuenta durante su formulación, pero están fue- ra del alcance de esta estrategia, tales como la  desactualización de los Planes de Ordenamiento  Territorial (POT), la informalidad en la tenencia de  la tierra, y la presencia de actores armados ilega- les en algunas regiones.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  16 \nMarco normativo  y de política   En las últimas décadas, las SbN han adquirido un   papel  central  en  las  agendas  ambientales  inter- nacionales  y  nacionales  impulsando  la  creación    de normas y políticas orientadas a enfrentar desa -  fíos climáticos, sociales y de biodiversidad . A nivel  global, organismos como la Unión Internacional  para la Conservación de la Naturaleza (UICN) y  plataformas como el Acuerdo de París han conso- lidado las SbN como intervenciones clave para la  adaptación, mitigación y gestión sostenible de los  ecosistemas. En Colombia, este concepto se ha in- cluido progresivamente en las últimas décadas en  políticas de cambio climático, gestión el riesgo de  desastres y biodiversidad. Estos avances reflejan  un reconocimiento creciente del valor de la na- turaleza como aliada fundamental para construir  sociedades más resilientes y equilibradas. Las SbN en Colombia se han reconocido como  una  manera  de  alcanzar  los  compromisos  de  agendas internacionales como el Marco Global  de Biodiversidad y el Acuerdo de París, además,  se han  incluido en instrumentos normativos y de  política entre los que se destacan la Ley 1931  de  2018  que  establece  disposiciones  para  la  gestión del cambio climático en Colombia y crea  el SisClima; la Ley 2169 de 2021, que estable- ce  metas  y  medidas  mínimas  para  alcanzar  la  carbono neutralidad, la resiliencia climática y el  desarrollo bajo en carbono; la Ley 2476 de 2025  de ciudades verdes y resilientes; y las bases del  Plan Nacional de Desarrollo 2022-2026 “Colom- bia, potencia mundial de la vida”. En las dos tablas que siguen se mencionan los  principales instrumentos normativos y de política  que conforman el marco para la implementación  de proyectos y medidas de SbN de manera trans- versal o explícita.    1.3  Tabla 2.  Instrumentos normativos  Instrumento   Contenido relevante  Ley 2476 de 2025,  de Ciudades verdes y   resilientes  La Ley 2476 de 2025, conocida como  Ley de Ciudades Verdes , propende  por fortalecer la adaptación al cambio climático y la gestión del riesgo en  Colombia, promoviendo un aumento sustancial de espacios verdes y azules  en áreas urbanas, periurbanas y de expansión, mediante la conservación,  uso sostenible y restauración de estructuras ecológicas, así como la  integración de la biodiversidad en la planificación urbana. Ley 2294 de 2023:  Plan Nacional de  Desarrollo 2022-2026:  Colombia, potencia  mundial de la vida Aprueba el  Plan Nacional de Desarrollo del 2022-2026: Colombia,  potencia mundial de la vida , en cuyas bases propone las SbN para el  desarrollo de una estrategia integral para la reducción del riesgo, la gestión  de la biodiversidad, del suelo y del cambio climático; así como para la  diversificación de la economía de municipios pequeños.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  17 \nInstrumento   Contenido relevante  Ley 2169 de 2021: Ley  de Acción Climática  En su artículo 13 regula que MinAmbiente y otras entidades, incluyan en  sus instrumentos de planificación acciones orientadas al escalamiento de  SbN y establece la meta de restaurar al menos un millón de hectáreas  acumuladas a 2030. También establece la responsabilidad de MinAmbiente de elaborar una guía  nacional para la formulación, ejecución, monitoreo, reporte y evaluación  del impacto de proyectos y programas de SbN enfocados tanto en  ecorreducción, como en adaptación y mitigación, y generación de economías  sostenibles. Además, indica que las SbN serán parte esencial del PIGCCS  del sector Ambiente. Ley 1931 de 2018: Ley  de Cambio Climático  Promueve la planeación e implementación de acciones de adaptación  basada en ecosistemas y mitigación, que incluyen medidas de SbN a nivel  territorial y sectorial.  Decreto 1076 de  2015. Contenido sobre  Planes de Ordenación  y Manejo de Cuencas  Hidrográficas   Los POMCA, que son diseñados para la gestión integral del agua y otros  recursos naturales, deben incluir acciones de conservación y restauración  de ecosistemas para garantizar el suministro de agua y mitigar los riesgos  de origen hidroclimático.  Ley 388 de 1997  Establece que el ordenamiento territorial se fundamenta en la función  ecológica de la propiedad, por lo que determina jerarquías para la  elaboración de los POT por parte de los municipios y distritos, en donde  prima la conservación y protección de ecosistemas.  Ley 164 de 1994:   Convenio sobre   Diversidad Biológica  Ratifica el tratado internacional de la Convención sobre Diversidad  Biológica, cuya incorporación en el marco jurídico colombiano promueve  estrategias de conservación y uso sostenible, así como la distribución de  beneficios de la biodiversidad.  Ley 99 de 1993  Crea el Sistema Nacional Ambiental (SINA) y el Ministerio de Ambiente.  Establece principios fundamentales para la conservación, restauración y uso  sostenible de los recursos naturales.  Decreto 2811 de 1974:  Código Nacional de   Recursos Naturales   Define los principios generales para la conservación, restauración y uso  sostenible de los recursos naturales. Fomenta implícitamente las SbN  mediante la restauración de áreas degradadas, la protección de cuencas  hidrográficas y la regulación de ecosistemas, intervenciones promovidas  desde las SbN.  Fuente:  elaboración propia. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  18 \nTabla 3.  Instrumentos de política pública   Año   Instrumento   Contenido relevante  2025   NDC 3.0 Recoge la visión estratégica de largo plazo hacia la neutralidad de carbono  y la resiliencia en 2050, incluye las metas cuantitativas de mitigación al  2030 y 2035. Por tanto, representa un avance sustantivo y vinculante de  los compromisos climáticos del país. 2024 Plan de  Acción de  Biodiversidad a  2030   Este plan, que está alineado con el Marco Global de Biodiversidad  Kunming-Montreal, establece una hoja de ruta nacional para frenar la  pérdida de biodiversidad y promover su uso sostenible. Estructurado en  cuatro apuestas estratégicas y seis metas nacionales, el plan propone  cerca de 190 acciones orientadas a restaurar y transformar más de cinco  millones de hectáreas hacia modelos productivos sostenibles. 2021   Documento  CONPES 40581 Identificó la necesidad de abordar los impactos de los fenómenos  hidrometereológicos mediante la implementación de SbN. Parte de  sus compromisos, fue la elaboración de la Guía con lineamientos y  orientaciones para gestionar fenómenos asociados a la variabilidad  climática a partir de SbN, publicada en 2024 por el DNP. 2021 Programa  Nacional de  Pago por  Servicios  Ambientales Promueve la compensación económica por acciones que protegen  ecosistemas estratégicos y sus servicios ecosistémicos. Incluye lineamientos  y herramientas para la implementación de estas acciones, y reconoce a las  SbN como alternativas complementarias para garantizar otras fuentes de  ingreso —como la agroforestería y la economía forestal—.  2021 Estrategia  Climática de  Largo Plazo  de Colombia -  E2050  Las SbN son reconocidas como prioritarias para abordar el cambio  climático, la seguridad hídrica, la seguridad alimentaria, la gestión de  desastres y la pérdida de biodiversidad, por su rol en la conservación de  ecosistemas y sus contribuciones. Se mencionan también como medidas  clave en la mitigación de los GEI asociados al sector AFOLU y en la  reducción de riesgos en el sector transporte. 2020   NDC  En la actualización de 2020 se destacan las SbN como medidas para la  adaptación al cambio climático y la reducción de riesgo de desastres, mediante  la restauración de ecosistemas estratégicos como los manglares. En el  documento se identifica la necesidad de apoyo financiero para analizar los  beneficios de estas medidas. Adicionalmente, para dar cumplimiento a su meta,  Ecopetrol implementa proyectos de SbN para compensar sus emisiones.  2020 Documento  CONPES 4021:  Política para el  control de la  deforestación Plantea cuatro líneas estratégicas para disminuir a cero la deforestación neta  para el 2030, de ellas dos están enfocadas en el uso sostenible del bosque  para mejorar la calidad de vida y la economía de las comunidades, y como  estrategia para atender conflictos territoriales. En este sentido, promueve la  implementación de medidas de SbN como los sistemas productivos sostenibles. 2016  Plan Nacional   de Adaptación  al Cambio  Climático  (PNACC)  Este plan promueve de manera implícita la implementación de medidas de  SbN mediante la promoción de la implementación de acciones de Adaptación  basada en Ecosistemas (AbE). Analiza cómo algunos ecosistemas generan  beneficios gracias a los servicios ecosistémicos que prestan.   1. Política para reducir las condiciones de riesgo de desastres y adaptarse a los fenómenos de variabilidad climática.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  19 \nAño   Instrumento   Contenido relevante  2016 Política para  la Gestión  Sostenible del  Suelo  Busca promover el manejo sostenible del suelo e impulsa acciones  para la preservación, restauración y uso del suelo, como, por ejemplo, la  declaración de figuras de protección para la conservación y recuperación de  los suelos.   2015  Plan   Nacional de  Restauración:  restauración Promueve la implementación de acciones de restauración ecológica en áreas  degradadas, con el fin de recuperar su estructura, función y composición. A  partir de este plan se elaboró la  Estrategia Nacional de Restauración 2023- 2026 , que contempla las SbN como medidas para mejorar la integridad  ecosistémica y promover la adaptación al cambio climático. 2015 Marco de  Sendai para  la Reducción  del Riesgo de   Desastres   Este tratado internacional adoptado por Colombia tiene por objeto prevenir  y reducir riesgos de desastres mediante la implementación de medidas  integrales que aumenten la preparación y fortalezcan la resiliencia.  Reconoce la importancia de reducir el riesgo de desastres disminuyendo el  grado de exposición y la vulnerabilidad. Frente a esto, medidas de SbN son  de gran utilidad en escenarios de cambio y variabilidad climática.  2012 Política  Nacional para  la Gestión  Integral de  Biodiversidad  y Servicios  Ecosistémicos  (PNGIBSE) Es la política marco de Colombia para conservar, usar sosteniblemente  y restaurar la biodiversidad integrando los servicios ecosistémicos en la  planificación territorial. Promueve un enfoque de gestión integral y socio  ecológica, articula Estado, sector productivo y sociedad civil para mantener  la resiliencia de los ecosistemas y enfrentar las causas de su degradación. 2010 Política  Nacional para  la Gestión  Integral del  Recurso Hídrico  Reconoce la necesidad de proteger los ecosistemas para garantizar la  oferta de agua. Por esto, promueve acciones como la conservación y  restauración de aquellos que son clave para la regulación hídrica.  2001 Política  Nacional para  Humedales  Interiores de  Colombia  Enfoca esfuerzos en la conservación y uso sostenible de los humedales,  con el fin de mantener y obtener beneficios de ellos. Aunque no utiliza el  término SbN, promueve acciones que buscan conservar estos ecosistemas  por su capacidad para mitigar inundaciones, regular el clima y proveer  agua, entre otras funciones esenciales.   Fuente:  elaboración propia. Los instrumentos normativos y de política reunidos  en la tabla 3 consolidan un marco sólido que orienta  la implementación de las SbN en los territorios. La  planeación sistemática y la asignación de recursos  para  su  implementación  por  los  departamentos,  municipios  y  las  autoridades  ambientales  parten  de incluir líneas de acción sobre SbN en los instru- mentos  de  planificación  territorial,  principalmente  en los POT, los Planes de Desarrollo y los Planes  Cuatrienales de Acción. En el marco de la autono- mía  territorial,  cada  entidad  puede  incluir  en  su  planeación los proyectos y medidas que aborden los  problemas prioritarios que afectan de manera direc- ta a las comunidades y a los ecosistemas locales. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  20 \nOPORTUNIDAD PARA  ABORDAR DESAFÍOS  APREMIANTES DE LA  SOCIEDAD 02  La posibilidad de generar beneficios frente a múltiples problemas  mediante medidas innovadoras ha llevado a un creciente interés  para utilizarlas en los últimos años en áreas como la seguridad hídri- ca, la reducción del riesgo de desastres, la mitigación y adaptación  al cambio climático, el desarrollo de ciudades resilientes, la salud  y el desarrollo sostenible (A. Berry, 2017; Cassin & Ochoa-Tocachi,  2021; Dhyani  et al. , 2020). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  21 \nLa acción decidida para abordar estos desafíos es  apremiante por el creciente riesgo que representan  tanto para la economía como para las comunidades  humanas y otras especies. Según el Informe so- bre Riesgos Globales del Foro Económico Mundial  (2020),  l as condiciones meteorológicas extremas,  que son exacerbadas por el cambio climático, cons- tituyen el riesgo con mayor probabilidad de dañar  la economía, condición que mantiene desde 2017.  Mientras que la falta de mitigación y adaptación al  cambio climático representa el mayor riesgo para  la economía mundial por la gravedad de sus im- pactos, este ha aumentado desde 2017.  En este escenario es fundamental identificar y  aplicar enfoques sólidos de adaptación al cambio  climático que sean eficientes y aumenten la re- siliencia en una amplia gama de posibles climas  futuros (Seddon, N, y otros, 2020). En un estudio  reciente, (Bilal y Känzig, 2024) se estima que un  aumento permanente de 1 °C en la temperatura  global puede reducir el PIB mundial en más de  un 20 %; además que en un escenario de calen- tamiento moderado a finales de siglo habría una  pérdida de bienestar humano de más del 30 % y  una pérdida del PIB per cápita de casi el 50 %. Algunos  impactos  de  ocurrencia  global  que  se manifiestan a nivel local, identificados por el  Panel  Intergubernamental  sobre  el  Cambio  Cli- mático (IPCC) en el sexto reporte de evaluación  (2022), se presentan en la figura 1.   Figura 1.  Impactos globales del cambio climático sobre los ecosistemas y la población  Fuente:  elaboración propia a partir de datos de IPCC (2022)  65 millones  de personas más  expuestas a olas de calor  “excepcionalmente” extremas  cada cinco años.  Alto riesgo de extinción al  10%  de todas las especies vegetales  y animales.  2009 2021  3.000 millones de personas expuestas a la  escasez de agua. Se producirá una  pérdida irreparable de  glaciares, hielo polar  y de la mayoría de los  arrecifes de coral para  finales de siglo  Los impactos del cambio climático sobre los ecosistemas y la sociedad  son crecientes y algunos irreversibles  1,1 - 1,5  °C  2  °C  Fotos:  https://www.elespectador.com/ambiente/bibo/en-fotos-asi-se-ve-el-derretimiento-de-los-glaciares-de-colombia/  1.000 millones de personas más corren el riesgo de sufrir riesgos  climáticos en las costas en las próximas décadas SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  22 \nLas medidas de SbN contribuyen a abordar múltiples  desafíos a través de la gestión de los ecosistemas  naturales o modificados. Lo anterior facilita que se  realicen inversiones para responder a los problemas  locales derivados de estos desafíos, al tiempo que  se generan co-beneficios en varios frentes del de- sarrollo. A partir de los desafíos propuestos por la  UICN, se identificaron aquellos en los que las SbN  generan contribuciones directas en torno a los cua- les se estructura esta estrategia (figura 2).  Figura 2.  Desafíos que son abordados por proyectos de SbN  Fuente:  elaboración propia. Estos cinco desafíos coinciden con los temas que  motivan la planeación de la adaptación al cambio  climático en la mayoría de las NDC presentadas  a la Convención Marco de las Naciones Unidas  sobre el Cambio Climático (CMNUCC) por los sig- natarios del Acuerdo de París (Seddon, N. y otros,  2020). Lo anterior, cuando se considera que los  desafíos de adaptación al cambio climático y re- ducción del riesgo de desastres están incluidos en  ese análisis dentro del aumento de la resiliencia y  la protección frente a eventos extremos (figura 3).    ■   Salud y bienestar.    ■   Oportunidades económicas emergentes y  empleos verdes.    ■   Gestión de espacios verdes.    ■   Calidad del aire.    ■   Planificación y gobernanza participativas    ■   Conocimiento y construcción de capacidades  sociales.    ■   Fortalecimiento de la cohesión social y sentido  de pertenencia.  Mitigar y     adaptarse al     cambio climático Reducir el     riesgo de     desastres Seguridad  hídrica Seguridad  alimentaria Reducir la     pérdida de     biodiversidad SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  23 \nAumentar la resiliencia Proteger contra eventos  extremos Seguridad alimentaria Seguridad hídrica Proteger la biodiversidad  y los ecosistemas Salud y bienestar humano Economía  Desarrollo sostenible  Seguridad de los medios  de vida Proteger el capital natural  y los SE 0   20   40   60   80   100   120   140  Número de NDC  129  121  108  107  106  88  79  69  51  37  Figura 3.  Objetivos que justifican los planes de adaptación al cambio climático en las NDC   Fuente:  adaptado de Seddon, N. y otros. 2020. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  24 \nBeneficios cuantificados de  proyectos e intervenciones  Los beneficios de la implementación de interven- ciones  de  SbN  se  pueden  cuantificar  mediante  la transformación de los problemas que buscan  resolver,  es  decir  con  el  impacto  que  generan  en la economía y en el bienestar de la población  como  resultado  de  intervenciones  articuladas  y  mantenidas por varios años. Como ejemplos, se  presentan los resultados cuantificados de casos  en Colombia y otros países sobre restauración del  suelo, reducción del riesgo de desastres, adapta- ción al cambio climático y productividad agrícola  (tabla 2).   2.1  Tabla 4.  Ejemplos de beneficios cuantificados de proyectos de SbN  Descripción de la intervención   Resultados y beneficios  Restauración del suelo y conservación de la biodiversidad  Colombia, Valle del Cauca:  La reserva natural  El Hatico  en el municipio  de El Cerrito incluye 86 hectáreas de pasturas  degradadas que fueron transformadas en un  sistema productivo diversificado que combina  caña de azúcar y ganadería con un área  conservada de 14 hectáreas de bosque seco  tropical que es la reserva más grande del Valle  del Cauca de este ecosistema (CVC., 2020; CVC,  2025)    ■   Aumento de la materia orgánica del 2, 8% al  5, 1% en menos de una década y aumento  de presencia de macroinvertebrados como  insectos y lombrices, lo que contribuye a su  riqueza biológica.    ■   Incremento notable de la biodiversidad, con  más de 90 especies arbóreas y 140 especies  de aves asociadas a los corredores biológicos.    ■   Aumento de la producción de leche en  un 69 %, además de ser el primer sitio de  producción de leche orgánica del país.    ■   Integración de los residuos de cosecha de la caña  al suelo aportando nitrógeno, fósforo, potasio,  calcio y magnesio, valorados en el equivalente a  una inversión de 550 dólares por hectárea.  Etiopía, Humbo:  Regeneración natural de 2.728 aca  cómo  los  cambios  estructurales  dentro de las sociedades influyen en la provisión  de servicios ecosistémicos y cómo estos servicios  se alinean con las necesidades socioculturales de  diversas poblaciones en distintos contextos (IP- BES, 2019, 2022).  El IPBES destaca que la principal fortaleza de  las SbN radica en su capacidad para abordar de- safíos  comunes  con  los  servicios  ecosistémicos  que  pueden  generarse  mediante  la  articulación  de  esfuerzos  técnicos,  sociales  y  ambientales  compartidos entre distintas disciplinas y saberes.  Integrar este concepto, por tanto, requiere flexi- bilizar  y  adaptar  los  procesos  tradicionalmente  utilizados en la formulación de proyectos, de ma- nera que se promueva la integración de diversas  perspectivas en las etapas de diagnóstico, diseño,  ejecución y seguimiento. Esto implica fortalecer las  capacidades de los equipos de trabajo y promo- ver la conformación de grupos interdisciplinarios  capaces de coordinar esfuerzos para ampliar el al- cance y su efectividad frente a múltiples desafíos.  En este marco, resulta fundamental reconocer  el rol complementario de las distintas disciplinas  en el ciclo de formulación e implementación de las  SbN. Las ciencias humanas y sociales desempe- ñan un papel esencial al facilitar el diálogo entre  actores y comunidades, pues promueven la apro- piación  social,  asegurando  la  protección  de  los  derechos de las comunidades y facilitando la tra- ducción del conocimiento técnico en información  comprensible y pertinente para los territorios.  Las  ciencias  naturales,  por  su  parte,  con- tribuyen  al  diseño  de  proyectos  orientados  al  fortalecimiento  de  la  biodiversidad  y  la  restau- ración  de  los  servicios  ecosistémicos.  Desde  la  ingeniería,  se  aportan  enfoques  de  innovación  para el diseño, incluyendo las soluciones híbridas  que se integran con la ingeniería tradicional. El di- seño y la arquitectura aportan una visión integral  y  coherente  de  los  entornos  construidos,  pues  ofrecen enfoques que articulan la funcionalidad,  la estética y la sostenibilidad en la planificación.  Finalmente,  las  ciencias  económicas  y  adminis- trativas cumplen una función clave al garantizar  la viabilidad financiera y la sostenibilidad de los  proyectos a largo plazo, al asegurar su pertinencia  y permanencia en beneficio de las comunidades. En coherencia con lo anterior, la colaboración  interinstitucional debe traducirse en la promoción  de un diálogo interinstitucional con los distintos ac- tores que hacen posible la implementación de las  SbN, identificando desafíos comunes y formulan- do estrategias que trasciendan las intervenciones  puntuales, con el fin de fortalecer la generación de  beneficios ambientales, técnicos, sociales y cultu- rales a largo plazo. Se deben promover y fortalecer  canales de comunicación y diálogo entre institu- ciones que fomenten la articulación de acuerdos  que promuevan el trabajo sincronizado.  2.2   SbN   Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  29 \nMARCO Y  ORIENTACIONES  PARA LA  IMPLEMENTACIÓN 03  Al ser un concepto relativamente nuevo y por la multiplicidad de  ideas e interpretaciones sobre su alcance y significado, se presenta  una propuesta sobre los elementos que constituyen intervencio- nes de SbN que busca promover un lenguaje común que facilite  la comprensión entre actores encargados de su formulación, im- plementación  y  seguimiento  y  de  las  comunidades  locales  que  participan en estas fases.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  30 \n3.1  La primera parte comprende un modelo concep- tual que ilustra las relaciones entre los desafíos  que se abordan, los contextos geográficos en los  que se pueden implementar, los enfoques de ges- tión y los tipos de medidas, lo que permite contar  con una perspectiva integrada y estructurada de  las intervenciones. Esto es complementado por una lista de cri- terios y requisitos mínimos para proyectos, que,  en su conjunto, caracterizan los proyectos de este  tipo. Esta lista orienta la Estrategia y sirve como  referencia  para  otras  entidades  que  elaboran  contenidos técnicos, normativos y de política so- bre SbN. Por último, se identifican aspectos clave  para su planeación, que son recomendaciones de  política necesarias para su sostenibilidad y para  el logro de sus objetivos, basadas en característi- cas particulares como que son proyectos de largo  plazo, que buscan resultados en diferentes áreas  del desarrollo y dependen en gran medida de la  apropiación de las comunidades de los sitios don- de se desarrollan.  Marco estructurado  de intervenciones  Con el fin de tener una perspectiva integrada y  estructurada del tipo de intervenciones de SbN  que  muestre  el  amplio  rango  de  posibilidades  de las medidas y su aplicación, se ha construido  un modelo conceptual que ilustra las relaciones  entre  los  desafíos  que  abordan,  los  contextos  geográficos en los que se pueden implementar,  los enfoques de gestión y los tipos de medidas  con algunos ejemplos. Este modelo (figura 4) ha sido construido a par- tir los avances en la conceptualización sobre las  SbN a escala global, las definiciones y orienta- ciones para su implementación propuestos por la  Asamblea de las Naciones Unidas para el Medio  Ambiente (UNEA), (2022), la UICN (2020) y otras  entidades, así como las propuestas incluidas en  guías  de  entidades  implementadoras  y  docu- mentos científicos. Los elementos del modelo se  describen después de la figura.  La definición utilizada en Colombia que orienta la Estrate- gia y la guía de SbN de MinAmbiente, es la aprobada en  la quinta sesión de la UNEA-5: “SbN   son  acciones  para   proteger,  conservar,  restaurar,  utilizar  de  forma  sosteni- ble y gestionar los ecosistemas terrestres, de agua dulce,   costeros y marinos naturales o modificados que hacen  frente a los desafíos sociales, económicos y ambienta -  les de manera eficaz y adaptativa, procurando al mismo   tiempo  bienestar  humano,  servicios  ecosistémicos,  resi-  liencia y beneficios para la biodiversidad ” (UNEP, 2022). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  31 \nFigura 4.  Modelo conceptual de intervenciones   Fuente:  elaboración propia.  3.1.1 Desafíos  Las SbN buscan atender problemas que afectan  a las comunidades rurales y urbanas, derivados  de cinco de los desafíos propuestos por la UICN  (2020),  así  como  a  aumentar  la  resiliencia  so- cio-ecológica. No se consideran los desafíos de  salud  humana  ni  desarrollo  económico  y  social  como objetivos directos de ese tipo de interven- ciones sino áreas en las que se pueden obtener  co-beneficios.  Por  un  lado,  aunque  el  sector  salud  genera  orientaciones para el mejoramiento de las condi- ciones de salud de las poblaciones en su entorno  a través de la Estrategia de Entornos Saludables,  sus entidades no realizan las intervenciones di- rigidas  a  modificar  o  mantener  ecosistemas  en  los entornos urbanos y rurales que favorezcan la  buena salud de las personas. En cuanto al desa- rrollo económico y social sus logros se alcanzan a  través de inversiones en numerosos sectores, que  incluyen la educación, la salud, la infraestructu- ra, vivienda, entre otros; en este contexto, las SbN  pueden generar ingresos para algunas poblacio- nes, pero son un tipo de inversión (entre muchos  posibles) para el desarrollo económico, por lo que  no es un desafío que en esencia se aborde con  este tipo de intervenciones. Los desafíos que se  abordan en los proyectos de SbN desde sus obje- tivos, se describen a continuación.   ¿Qué son?  Son intervenciones integrales que incluyen medidas para  gestionar los ecosistemas naturales y modificados, dirigi- das a abordar desafíos que afectan el bienestar humano. SbN SOLUCIONES BASADAS EN LA NATURALEZA Abordando desafíos como:  Mitigar y  adaptarse  al cambio climático Reducir el riesgo de  desastres Seguridad hídrica Seguridad  alimentaria Terrestre   Acuático-conti- nental   Marino-costero   Rural-productivo   Urbano  Preservación Ecosistemas naturales o modificados Enfoques   •  Adaptación basada ecosistemas (AbE) •  Mitigación basada en ecositemas (MbE) •  Reducción del riesgo de desastres basada en ecosistemas (Eco-RRD) •  Infraestructura natura•  Ingeniería ecológica  Su implementación permite:  Recuperación Manejo y uso   sostenible  DiseñoReducir la  pérdida de  biodiversidad  A través de medidas de: En los contextos ecosistémicos: SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  32 \n•  Pérdida de biodiversidad  Este desafío es de vital importancia, debido a que  la naturaleza en la mayor parte del planeta ha sido  alterada de manera significativa por múltiples fac- tores humanos, y la gran mayoría de los indicadores  de los ecosistemas y la biodiversidad muestran un  rápido deterioro (IPBES, 2019). Las SbN tienen en- tre sus objetivos centrales la conservación de la  biodiversidad. Por esto, todos los proyectos deben  incluir acciones de preservación, restauración, uso  sostenible o establecimiento de nuevos ecosiste- mas  que  promuevan  la  conectividad  entre  ellos  para favorecer la recuperación de hábitats. Las in- tervenciones para la conformación de coberturas  vegetales deben elegir especies nativas, de prefe- rencia para las que haya alguna evidencia sobre su  resistencia a los cambios proyectados del clima y  a eventos climáticos extremos, con el fin de garan- tizar en el largo plazo la provisión de los servicios  ecosistémicos planeados.  •  Adaptación y mitigación al  cambio climático  Los  ecosistemas  saludables  poseen  una  mayor  capacidad para mitigar los impactos de eventos  extremos y adaptarse de forma progresiva a las  condiciones cambiantes del entorno. En este con- texto, las SbN como la preservación, restauración  y uso sostenible de bosques, humedales y pasti- zales pueden contribuir de manera significativa a  la reducción de gases de efecto invernadero (Vidal   et  al. , 2024). También fortalecen la resiliencia de  comunidades y sistemas ecológicos al aprovechar  los  procesos  naturales  para  disminuir  la  expo- sición y vulnerabilidad frente a los impactos del  cambio climático (Menéndez  et al ., 2020).  •  Reducción del riesgo de  desastres  Las  SbN  tienen  el  potencial  de  reducir  impac- tos  asociados  a  los  desastres  no  intencionales.  Estudios han evidenciado el efecto de su imple- mentación en la reducción de la energía de las olas  al entrar en contacto con ecosistemas de manglar  (Sunkur  et  al. , 2023) o la reducción de caudales  pico con lo que se reducen los impactos de las  inundaciones fluviales (Mabrouk  et al. , 2023).   •  Seguridad alimentaria  Los enfoques de producción alimentaria que ge- neran  beneficios  para  la  biodiversidad,  como  la  agroecología, la agroforestería y el  silvopastoreo,  están  orientados  a  preservar  la  salud  de  los  ecosis- temas  y  promover  sistemas  sostenibles.  Diversos    estudios han demostrado que este tipo de SbN tiene  el potencial de aumentar la productividad agrícola,  al tiempo que mejora la calidad y productividad del   suelo  (Dobhal  et al. , 2024). Su implementación  en  los  sistemas  agroalimentarios  reduce  la  vulnerabilidad de los cultivos frente a sequías,  inundaciones y plagas, y contribuye a la con- servación de la biodiversidad y los servicios  ecosistémicos esenciales (Nassary, 2025).  •  Seguridad hídrica  El acceso suficiente a agua de calidad para dis- tintos  usos  depende  en  gran  medida  del  buen  funcionamiento de los ecosistemas. En este con- texto, las SbN contribuyen a la seguridad hídrica  mediante la conservación, provisión y regulación  del agua (Marijuan  et al ., 2024) ; además, favorecen   una mayor disponibilidad de agua a lo largo del tiem -  po y fortalecen la salud de los ecosistemas acuáticos,  mejorando su capacidad para sostener servicios eco - sistémicos esenciales. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  33 \n3.1.2 Enfoques de las  intervenciones  Las SbN, al ser un concepto sombrilla, integran  una  serie  de  enfoques  orientados  a  la  conser- vación, el uso sostenible, y la distribución justa  y equitativa de los servicios ecosistémicos. Esto  implica que los espacios geográficos sean anali- zados como unidades funcionales y que el diseño  de intervenciones se dirija a resolver problemas  territoriales. Entre los más conocidos y aplicados  están la AbE, la Mitigación basada en Ecosiste- mas (MbE), y la Reducción del riesgo de desastres  basada  en  Ecosistemas  (Eco-RRD).  Además,  se  incluyen la infraestructura natural y la ingeniería  ecológica. Dichas categorías no son excluyentes,  sino  que  los  proyectos  pueden  incluir  interven- ciones de enfoques diferentes, ya que no es una  separación práctica, sino conceptual.  •  Adaptación basada en  Ecosistemas   Propone alternativas para enfrentar los impactos  actuales y futuros del cambio climático, y se defi- ne como el uso de la biodiversidad y los servicios  ecosistémicos para ayudar a las personas a adap- tarse a los efectos adversos del cambio climático  (PNUMA,  2009).  Se  basa  en  las  prioridades  de  adaptación  que  se  identifican  a  partir  del  aná- lisis  de  amenazas,  vulnerabilidad  y  riesgos  con  información y conocimiento científico, así como el  saber local y ancestral. La adaptación es un pro- ceso de acomodación al clima real o proyectado y  sus efectos; es decir, adaptarse a los efectos del  cambio climático es contribuir a reducir la vulnera- bilidad (Ministerio de Ambiente, 2018). Este  enfoque  se  centra  en  las  comunidades  más  vulnerables  para  disminuir  su  sensibilidad  ante  los  efectos  del  clima  y  para  aumentar  su  capacidad adaptativa. Se fundamenta en el cono- cimiento de su entorno socioecosistémico, además  del  reconocimiento  de  sus  respectivas  priorida- des,  necesidades  y  capacidades  (Ministerio  de  Ambiente, 2013).  •  Mitigación basada en  ecosistemas  Dirige sus esfuerzos a evitar la degradación de  reservorios naturales de carbono, y a potenciar  y a aumentar los sumideros naturales de gases  de efecto invernadero. Así, se prioriza la conser- vación de ecosistemas, se ataca a los impulsores  de su pérdida y transformación y, por último, se  incentiva  su  restauración  (Proclima,  2021).  El  enfoque descrito incluye la conservación y res- tauración de una gama amplia de ecosistemas  como los boscosos, los humedales, y los mari- nos y costeros, así como el establecimiento de  sistemas  agroforestales,  agroecológicos  y  sil- vopastoriles  para  aumentar  los  sumideros  de  carbono (Donatti  et al., 2022).  •  Reducción de riesgo de  desastres basado en  ecosistemas   Implica combinar la conservación, la restauración y  la gestión sostenible de los ecosistemas y sus con- tribuciones con métodos de reducción del riesgo de  desastres (RRD), como los sistemas de alerta tem- prana y la planificación de emergencias, con el fin  de lograr una prevención de desastres más eficaz,  reducir el impacto de los desastres en las personas  y las comunidades, y apoyar la recuperación tras  los desastres (Sudmeier-Rieux  et al., 2019).  •  Infraestructura natural  Se  refiere  a  una  red  de  elementos  naturales  terrestres  y  acuáticos  interconectados  que  pro- porcionan servicios ecosistémicos propios de las  áreas geográficas en las que se ubican. Se usan  principalmente para lograr la conectividad entre  estos elementos en áreas urbanas y periurbanas. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  34 \nIncluye la infraestructura verde y la infraestructura  azul; la verde incluye bosques terrestres, bosques  riparios y líneas de costa que mantienen procesos  ecológicos y ayudan a mantener o restablecer la in- tegridad del paisaje. El concepto de infraestructura  verde fue incluido por primera vez en Colombia en  un documento normativo, en específico, en la Ley  2476 de ciudades verdes que indica que es “ una   red  multifuncional  estratégicamente  planificada   de zonas naturales y seminaturales de alta calidad  con otros elementos ambientales, diseñada y ges- tionada  para  proporcionar  un  amplio  abanico  de   servicios ecosistémicos y proteger la biodiversidad  tanto de los asentamientos rurales como urbanos ”  (Ley 2476 de 2025; Congreso de la República de  Colombia, s. f.). Por otra parte, la infraestructura  azul  comprende  elementos  naturales  acuáticos  como las quebradas, ríos, lagos, lagunas, humeda- les, esteros, así como los diseñados por el hombre  para captar e infiltrar aguas lluvias como los Sis- temas de Drenaje Urbano Sostenible (SUDS) que  incorporan vegetación (Vásquez, 2016).  •  Ingeniería ecológica  Se define como el diseño de ecosistemas soste- nibles que integran la sociedad humana con su  entorno  natural  en  beneficio  de  ambos;  tienen  como  objetivos  la  restauración  de  ecosistemas  que han sido sustancialmente alterados por las  actividades  humanas  y  el  desarrollo  de  nuevos  ecosistemas sostenibles que tengan valores tanto  sociales como ecológicos (Mitsch W.J., 2021). En  este marco, propone pasar de modelos convencio- nales hacia enfoques más innovadores. Hace  parte  de  este  enfoque  la  infraestructura  híbrida que combina elementos de infraestructura  azul y verde con infraestructuras grises con el objeto  de reducir el riesgo climático y que puede utilizarse  frente a múltiples amenazas. Por ejemplo, la restau- ración de un ecosistema para reducir el riesgo puede  combinarse con una estructura de ingeniería tradi- cional para proteger la infraestructura natural en sus  primeras etapas cuando el ecosistema restaurado  aún debe afianzarse (Sudmeier-Rieux  et al.,  2019).   3.1.3 Tipos de medidas  El Banco Mundial (2021) estableció una jerarquía  en la categorización de las SbN para el manejo de  los impactos de las intervenciones humanas, cuyo  fin es minimizarlos a través de acciones que hacen  parte de pasos secuenciales para evitar, mitigar,  restaurar y compensar estos impactos. Entre los  tipos de medidas de SbN, propone que se priori- cen las de preservación, teniendo en cuenta que  los ecosistemas naturales existentes ya prestan  múltiples servicios ecosistémicos para abordar los  desafíos que buscan resolver. En segundo lugar,  se debe buscar la implementación de medidas de  recuperación y restauración de ecosistemas de- gradados para restituir sus funciones. En tercer  lugar, están las medidas enfocadas en mantener  el uso sostenible y el establecimiento de nuevos  ecosistemas. Esa clasificación no significa que los  proyectos deban implementar medidas de cate- gorías separadas, sino que pueden integrar varios  tipos para maximizar sus beneficios, con base en  el estado de los ecosistemas en los sitios donde  se desarrollan.  Como se reconoce en la  Política Nacional para   la Gestión integral de la Biodiversidad y sus Ser- vicios  Ecosistémicos   (Ministerio  de  Ambiente,  2012),  la  conservación  comprende  acciones  de  preservación, uso sostenible, generación de co- nocimiento  y  restauración  de  la  biodiversidad  dirigidas a mantener o incrementar la resiliencia  de los sistemas socioecológicos y con ella el sumi- nistro de servicios ecosistémicos fundamentales  para el bienestar humano. Por otra parte, la elec- ción de los tipos de acciones y sus combinaciones  deben ser acordes a las características de cada  territorio. Las  SbN  buscan  mantener  y  recuperar  las  contribuciones  de  la  naturaleza  a  la  sociedad,  conocidas  como  servicios  ecosistémicos,  cuya  provisión depende de las interacciones entre los  sistemas sociales y ecológicos (Babí Almenar  et  al. ,  2021;  Sowińska-Świerkosz  &  García,  2022).  En ese sentido, contribuyen a abordar problemas  para el bienestar de las personas causados por la  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  35 \npérdida de los procesos ecológicos y las funciones  de  los  ecosistemas.  Por  ejemplo,  dos  de  estos  procesos  son:  la  producción  primaria  generada  por la fotosíntesis de las plantas y la regulación  del ciclo del agua dada por la capacidad de los  suelos, la vegetación y los cuerpos de agua de  interceptar y almacenar agua contribuyen a cerca  del 80 % de las funciones que generan servicios  ecosistémicos.  Por  el  contrario,  otros  procesos  como la polinización, el ciclado de nutrientes o la  interceptación y absorción de la radiación resultan  en  funciones  específicas  como  la  fertilidad  del  suelo,  la  regulación  de  la  temperatura  o  el  mantenimiento de la biodiversidad (Amaya, J.D.,  2024), es así como los diferentes tipos de medidas  que  se  describen  a  continuación  promueven  procesos y funciones que derivan en uno o más  beneficios.  Preservación : su objetivo  es mantener estructuras,  funciones ecológicas y  servicios ecosistémicos  propios de ecosistemas  naturales con bajos niveles  de transformación. A  esta categoría pueden  pertenecer medidas ya  desarrolladas en marcos  como la conservación —p.ej.:  declaración áreas protegidas  que se constituyen con  múltiples propósitos—.  Uso sostenible : grupo de  intervenciones dirigidas  a lograr aprovechar  los ecosistemas y su  biodiversidad de manera  sostenible, de manera  que sea posible obtener  beneficios económicos y  sociales (p.ej.: en sistemas  productivos), a la vez que  se minimizan sus impactos  en las funciones ecológicas  y su capacidad de proveer  servicios ecosistémicos.  Restauración : se dirigen   a restaurar y rehabilitar   ecosistemas transformados  y degradados, buscando  recuperar estructuras,  funciones ecológicas y  servicios ecosistémicos  propios de dichos  ecosistemas.   Establecimiento de nuevos  ecosistemas : consisten  en intervenciones que  generan nuevas áreas con  coberturas vegetales que  integran elementos de la  infraestructura verde y  azul (World Bank, 2021).  También incluyen la  infraestructura híbrida en la  cual se combinan elementos  naturales con obras grises  para lograr los objetivos  de los proyectos. Hacen  parte de estas medidas los  techos y fachadas verdes,  humedales artificiales y  obras de bioingeniería. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  36 \n3.2  3.1.4 Contextos  territoriales  Además, se reconoce que los problemas y desa- fíos, así como los actores involucrados en ellos,  confluyen  en  contextos  territoriales  cuyas  ca- racterísticas hacen que las SbN que se pueden  implementar  sean  específicas  para  cada  sitio.  Para tal fin, estos contextos corresponden a cin- co clasificaciones de ecosistemas naturales y con  diferente nivel de transformación, acorde con la  definición de la UNEA (UNEP, 2022):    ■   Ecosistemas terrestres    ■   Ecosistemas acuáticos continentales    ■   Ecosistemas marino-costeros    ■   Ecosistemas rurales productivos    ■   Ecosistemas urbanos  Criterios para caracterizar proyectos  de Soluciones basadas en la Naturaleza  Como parte del diseño de la estrategia nacional, se  identificó la necesidad de contar con una lista de  criterios que, en su conjunto, permitan caracterizar  proyectos de SbN que oriente sus actividades y sirva  como referencia para otras entidades que elaboran  contenidos técnicos, normativos y de política sobre  este tema. Esta necesidad se identificó en espacios  de participación interinstitucional como una barrera  para el escalamiento de este tipo de proyectos, por  la multiplicidad de ideas e interpretaciones sobre el  alcance y significado del concepto. Para  esto,  se  utilizó  como  base  el  Estándar  Global de la UICN (2020) para SbN, que se gene- ró como respuesta a la necesidad de aclarar y ser  más explícitos en cuanto a qué significa el concep- to y cómo aplicarlo. Para la elaboración del listado  se buscó que en su conjunto los criterios tengan  las siguientes características:     ■   Sean aplicables para caracterizar proyectos.    ■   Tengan un lenguaje de fácil comprensión.    ■   Estén adaptados al contexto nacional.    ■   Incluyan explícitamente los tipos de beneficios  complementarios a los de biodiversidad, es  decir, los relacionados con los demás desafíos  que abordan las SbN.     ■   La propuesta de criterios junto con los  componentes que los desarrollan constituye  un conjunto de características mínimas  que deben tener los proyectos de SbN  que se pueden evaluar como una lista de  chequeo para diferenciarlos de otro tipo de  intervenciones (tabla 5). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  37 \nTabla 5.  Criterios para proyectos de SbN y requerimientos mínimos  Criterio   Requerimientos mínimos  1. Las SbN responden de manera eficaz a  desafíos que generan problemas que afectan el  bienestar de las comunidades en los territorios.  Estos desafíos incluyen cambio climático,  riesgo de desastres, degradación ambiental,  seguridad hídrica y seguridad alimentaria. 1. Se identifican y priorizan de manera participativa  los problemas con las comunidades que se ven  afectadas directamente por ellos.  2. El diseño y evaluación de los proyectos responden  a los problemas priorizados. 2. Las SbN contribuyen a la conservación de la  biodiversidad y los ecosistemas. 1. Las intervenciones se eligen y diseñan para  prevenir y mitigar impactos negativos con base en  la evaluación del estado actual del ecosistema y la  de los principales impulsores de su degradación y  pérdida. 2. Se obtienen resultados cuantificables en términos  de conservación de la biodiversidad, entre ellos los  de integridad y conectividad de los ecosistemas, que  se evalúan periódicamente. 3. Se hacen evaluaciones periódicas para identificar  consecuencias no deseadas sobre los ecosistemas y  la biodiversidad que surgen de las SbN y se toman  las medidas para atenderlas. 3. En el diseño y la implementación de las  SbN se desarrollan procesos de gobernanza  inclusivos y transparentes, y se adoptan  salvaguardas sociales y ambientales. 1. Participación sin discriminación, con enfoque  diferencial. Para comunidades étnicas debe  garantizarse el derecho al consentimiento libre,  previo e informado. 2. Implementación de las salvaguardas sociales y  ambientales  3. Las partes interesadas son implicadas en las  fases de diseño y planificación, así como en la toma  de decisiones. Cuando aplique, se desarrollan  mecanismos para toma de decisiones conjuntas  entre diferentes entidades territoriales. 4. Se desarrollan mecanismos para  retroalimentación y solución de reclamaciones  acordados antes de iniciar la implementación. 4. El diseño de las SbN se adapta a las  características del entorno. 1. El diseño reconoce las interacciones entre  los ecosistemas, la economía y las condiciones  socioculturales en el entorno en el que se  desarrollará el proyecto. 2. El diseño procura la articulación con otras  intervenciones y la construcción de sinergias. 3. Los riesgos relacionados con el desarrollo del  proyecto son gestionados dentro del área de  intervención, así como alrededor de ella. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  38 \n3.3  Criterio   Requerimientos mínimos  5. Las SbN son económicamente viables 1. Los recursos se usan con eficiencia y eficacia  de manera que generan beneficios cuantificables.  Las intervenciones deben ser seleccionadas con  base en análisis de costo-efectividad frente a  otras alternativas que incluyan los costos de  mantenimiento.  2. Se consideran los posibles efectos negativos en el  ciclo de vida del proyecto y se definen mecanismos  para evitar, mitigar, corregir o compensar a las  partes afectadas. 3. Pueden generar encadenamientos productivos a  partir del capital natural y de los medios de vida de  las comunidades. 6. Las SbN se integran al marco político y  normativo del país 1. El diseño, la aplicación y las lecciones aprendidas  se documentan y comparten. Es deseable que esto  impulse un cambio transformador en la medida  que otras intervenciones y políticas utilizan esta  información. 2. El diseño e implementación pueden aportar  información que impulse cambios normativos. 7. Las SbN se gestionan con base en  seguimiento y evaluación periódicos basados en  evidencias 1. Se evalúa la efectividad de la intervención  mediante un plan de seguimiento y evaluación  que se aplica a lo largo de todo el ciclo de vida del  proyecto. 2. Es deseable desarrollar evaluaciones periódicas  que se basen en procesos de gestión de  conocimiento (científico y tradicional) que faciliten  realizar ajustes de la intervención. Fuente: elaboración propia.  Aspectos clave  para la planeación   En esta sección se presentan recomendaciones  de política para la planeación de proyectos de  SbN que responden a algunas de sus caracte- rísticas como que son proyectos que requieren  mantenimiento en periodos de varios años o dé- cadas, que buscan resultados en diferentes áreas  del desarrollo y cuyo éxito depende en gran me- dida de la apropiación de las comunidades de los  sitios donde se desarrollan, por lo que conside- rarlas en su diseño e implementación facilitará el  logro de sus objetivos. Las cuatro primeras son  aplicables a todos los contextos ecosistémicos,  mientras  que  la  última  se  dirige  a  ciudades,  dadas  algunas  condiciones  particulares  de  las  zonas urbanas y su importancia al albergar a la  mayoría de la población. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  39 \n3.3.1 Planeación de  la sostenibilidad  desde el diseño   El logro de los resultados de algunos proyectos de  SbN puede darse en el mediano y largo plazo, en  especial en aquellos que incluyen la restauración  de ecosistemas o la conformación de coberturas  vegetales. Por esta razón, en la etapa de diseño  es fundamental prever la asignación de recursos  sostenidos y regulares que garanticen la operación  continua del proyecto durante el tiempo necesario  para alcanzar los resultados esperados. Así, duran- te la formulación deben definirse mecanismos que  aseguren su sostenibilidad en el largo plazo, en los  cuales es preciso considerar lo siguiente:  Generación de ingresos y  acceso a nuevos mercados:   desarrollar actividades  productivas sostenibles que  beneficien a los habitantes  y organizaciones locales, de  manera que una parte de los  recursos generados se destine  a mantener las acciones del  proyecto en el tiempo.  Gestión financiera a través de   fondos de inversión:  promover  la participación del sector  privado mediante la creación  o articulación con fondos  que incentiven inversiones  eficientes, resaltando los  beneficios ambientales,  sociales y económicos que  generan los proyectos para   visibilizarlos ante el sector   privado y financiero, así  como los posibles retornos  financieros o la reducción de  costos de transawcción.  Participación local en el  mantenimiento:  vincular a   largo plazo a miembros de la  comunidad local para ejecutar  actividades de mantenimiento  recurrentes, complementando  esta participación con  programas de capacitación  técnica y divulgación sobre los  beneficios socioambientales  que aporta cada proyecto.  Acuerdos con las  comunidades:  fomentar  la participación de las  comunidades mediante  acuerdos para el desarrollo de  las actividades del proyecto en  el mediano y largo plazo que  den respuesta a los intereses  planteados por ellas.  Grupos de ahorro  comunitario:  incentivar la   creación de grupos de ahorro  comunitario que fortalezcan  la autogestión y permitan  reunir recursos para proyectos  familiares o de interés  compartido por los miembros  de la comunidad. Este tip
