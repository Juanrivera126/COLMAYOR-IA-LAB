 SbN en el sector productivo  y empresarial de Colombia.   4.    Más información en: https://www.andi.com.co/Home/Seccional/10-santander#alianzapas 5.    Más información en: https://www.andi.com.co/Home/Pagina/21-centro-nacional-del-agua-y-la-biodiversida SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  64 \n4.8   Líneas transversales  4.8.1 Financiamiento  Debido a que las SbN producen beneficios para  diferentes áreas del desarrollo, su financiamiento  puede realizarse con fuentes de recursos públicas  y privadas disponibles para cubrir diversas nece- sidades de los territorios y sus comunidades. Por  ejemplo, se tienen las destinadas a la preserva- ción y restauración de ecosistemas, la adaptación  y mitigación del cambio climático, el manejo inte- gral del agua, la gestión del riesgo de desastres,  el desarrollo de actividades agropecuarias soste- nibles, entre otras.  Aún  con  la  existencia  de  múltiples  fuentes  de  financiamiento,  el  desarrollo  de  las  agendas  de  biodiversidad y cambio climático requiere de un com- promiso más decidido por parte de todos los actores  involucrados, principalmente desde los sectores pú- blico, privado, financiero, cooperación internacional y  la sociedad civil. Esto considerando que los recursos  que se han movilizado son insuficientes para cubrir  las necesidades de financiación de estas agendas y  han estado muy por debajo de lo requerido.  De acuerdo con el DNP (2022), Colombia deberá  invertir anualmente al menos el 1,2 % del PIB del  2021 para cumplir con las metas de mitigación y  adaptación establecidas en la NDC. Si se tiene en  cuenta que la inversión anual en cambio climático  ha sido a la fecha del 0,16 % del PIB, es evidente  que  aún  queda  mucho  camino  por  recorrer.  De  manera  similar,  para  cubrir  21  de  los  25  indicadores del Plan de Acción de Biodiversidad  de  Colombia  (NBSAP  por  su  sigla  en  inglés)  al  2030,  instrumento  donde  se  establecen  las  acciones  concretas  para  proteger,  restaurar  y  manejar de forma sostenible la biodiversidad, se  debe destinar un total de 76,5 billones de pesos  tomando  como  base  el  período  entre  los  años  2023 y 2030 (MADS, 2024). Es importante señalar  que estas estimaciones son muy sensibles a las  diferentes hipótesis socioeconómicas, y las más  recientes han sido mayores a las de hace unos  años, debido sobre todo a no haber realizado a  tiempo las inversiones inicialmente consideradas  y a nuevos compromisos adquiridos bajo estas  agendas.   Tabla 6.  Necesidades y brecha de financiación para la gestión de la biodiversidad y el cambio climático  Tipo de agenda   Necesidad a 20306  Gasto promedio anual  necesario  Biodiversidad   COP $76,5 billones   COP $9,56 billones Adaptación al cambio climático   COP $18,8 billones   COP $2,35 billones Mitigación del cambio climático   COP $102,8 billones   COP $12,86 billones Fuente: López, R.A., 2025, adaptado de: DNP, 2022 y MinAmbiente, 2024.     6.     Tomando como escenario base 2023 y valores correspondientes para ese año SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  65 \nEl financiamiento de las agendas de biodiversidad  y de cambio climático se ha venido robusteciendo,  dado el posicionamiento de estos temas e incluye  las SbN como una de las estrategias clave para  el  desarrollo  sostenible,  sobre  todo  por  su  ca- pacidad de enfrentar los retos socioambientales  a nivel mundial, en múltiples dimensiones. Este  escenario se debe, en parte, a un entorno regula- torio y financiero más favorable y a una creciente  conciencia  empresarial  sobre  la  rentabilidad  de  los negocios sostenibles y su bancabilidad. Por  otra parte, la disminución progresiva de la depen- dencia de fondos de cooperación internacional se  ha dado, de manera simultánea, con un fortaleci- miento de capacidades y un posicionamiento de  estos temas en varios sectores económicos. En la actualidad, no existen ejercicios riguro- sos  o  ampliamente  reconocidos  con  respecto  a  las  posibilidades  de  un  financiamiento  para  las  SbN en el país, dado que los esfuerzos se han en- focado en los temas de financiamiento climático  y  de  la  biodiversidad.  En  estos  campos  sobre- salen las experiencias del DNP con el portal de  Monitoreo, Reporte y Verificación sobre financia- miento climático7, la Iniciativa para la Financiación  de la Biodiversidad8 y el trabajo de la Federación  Colombiana de Municipios en torno a los instru- mentos económicos en el ordenamiento territorial  municipal9.  Existen varias posibilidades de financiamiento  para las SbN con un gran potencial de moviliza- ción de recursos y facilidad de implementación.  Estas  provienen  sobre  todo  del  sector  público,  ya  sea  nacional  o  internacional,  o  asociadas  al  sector privado y financiero, tal como se presenta  a continuación:  7.    https://mrv.dnp.gov.co/Paginas/inicio.aspx 8.    https://www.biofin.org/finance-solutions 9.    https://www.asocars.org/wp-content/uploads/2020/09/Cartilla-OT-e-instrumentos-FCM-2020-1.pdf  Tabla 7.  Principales fuentes de financiamiento público nacional e internacional para SbN   Fuente de   financiación   Descripción   Normas asociadas  Compensaciones  bióticas e inversión  forzosa del 1 % de  proyectos con  licencia ambiental.      ■   Las compensaciones bióticas buscan subsanar las  perdidas irremediables generadas por proyectos  extractivos y productivos. Las acciones elegibles   incluyen la  preservación, restauración ecológica,  rehabilitación, recuperación y uso sostenible  de  ecosistemas y áreas naturales estratégicas.     ■   Las inversiones forzosas son responsabilidad  de los  proyectos licenciados que captan agua de fuentes  superficiales o subterráneas, por lo cual deben  destinar no menos del 1 % del total de la inversión  del proyecto hacia actividades de  recuperación,  preservación y vigilancia de las cuencas   hidrográficas.        ■   Ley 99 de 1993      ■   Decreto 2099 de  2016.    ■   Resolución 256 de  2018  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  66 \nFuente de   financiación   Descripción   Normas asociadas  Obras por  Impuestos  (Impuesto de  renta de los  contribuyentes)     ■   Mecanismo tributario en el que una persona natural  o jurídica, contribuyente del impuesto de renta y  complementarios, tiene la opción de hacer el pago de  hasta el 50 % de este impuesto a través del desarrollo  y ejecución de obras o proyectos de inversión pública  con enfoque social en municipios afectados por el  conflicto armado. En este caso, el mecanismo cuenta  con la modalidad denominada “Convenio” y las líneas  de inversión de  PSA y de adaptación y gestión del  riesgo climático.       ■   Ley 1819 de 2016  (artículo 238)     ■   Decreto 1915 de  2017      ■   Decreto 1147 de  2020  El 1 % de  los ingresos  corrientes y de  libre destinación  de municipios y  departamentos. Estos recursos se deben emplear para la adquisición y  mantenimiento de áreas de importancia estratégica para  la conservación del agua en cuencas abastecedoras de  acueductos bajo enfoques de SbN, adaptación al cambio  climático, restauración, rehabilitación y recuperación  ecológica, o para financiar esquemas de PSA.      ■   Ley 99 de 1993  (artículos 108 y  111)    ■   Ley 1450 de 2011  (artículo 210)    ■   Ley 2320 de 2023   Recursos del  Sistema General de  Regalías (SGR).    ■   Las regalías buscan mejorar la calidad de vida de los  habitantes y dinamizar la economía local y regional a  través de proyectos que generen un impacto positivo  en las regiones. En este caso son de interés los  recursos de:        ■   Asignación ambiental:  dirigidos a la conservación de  áreas estratégicas y lucha contra la deforestación.       ■   Asignación local para ambiente y desarrollo  sostenible:  recursos que deben ser invertidos  prioritariamente en proyectos orientados al cierre de  brechas de desarrollo económico, social, ambiental.     ■   Asignación de ciencia, tecnología e innovación  para el ambiente:  permite financiar investigaciones  y proyectos sobre clima, recursos hídricos, suelos,  biodiversidad y adaptación al cambio climático.        ■   Constitución  Política de  Colombia     ■   Ley 2056 de 2020   Impuesto al  carbono.    El impuesto al carbono se crea con el fin de contribuir a  los compromisos de reducción de emisiones adoptados  por el país en el Acuerdo de París. Bajo la opción de no  causación del impuesto, se pueden adelantar proyectos  de captura y reducción de emisiones de GEI orientados a  la conservación de la biodiversidad a través de las SbN.     ■   Ley 1819 de 2016  (artículo 221) SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  67 \nFuente de   financiación   Descripción   Normas asociadas  Áreas de vida y  siembra de árboles.   Las  Áreas de Vida  son zonas definidas por los  municipios, de la mano con autoridades ambientales,  destinadas a albergar iniciativas de restauración  mediante siembra de árboles. Estas zonas deben  preferiblemente incluir nacimientos de agua, rondas  hídricas, humedales y otras áreas de alta importancia  ecológica. De esta forma, se busca promover la  restauración ecológica mediante la siembra de árboles y  la creación de bosques a lo largo del territorio nacional.     ■   Ley 2173 de 2021     ■   Resolución 1491  de 2025 Transferencias del  sector eléctrico.    Las empresas generadoras de energía deben transferir  el 6 % de las ventas brutas de energía por generación  propia a los parques nacionales y entes territoriales  para la protección del medio ambiente y la conservación  de la cuenca hidrográfica del área de influencia de los  proyectos.     ■   Ley 99 de 1993  (artículo 45)    ■   Ley 1930 de 2018  (artículo 24)   Tasa por utilización  de agua.    Es aquella que cobran las autoridades ambientales  competentes a los usuarios que utilizan agua derivada  de fuentes naturales, superficiales o subterránea para  el desarrollo de sus actividades. Estos recursos tienen  destinación específica y están orientados a la protección,  recuperación y monitoreo del recurso hídrico, al  desarrollo de PSA y a la conservación de páramos.      ■   Ley 99 de 1993  (artículo 43)     ■   Decreto 1155 de  2017     ■   Resolución 1571  de 2017   Plusvalía y  valorización. La valorización es el aumento del valor de una  propiedad debido a mejoras o desarrollo en la zona, y  la plusvalía es el beneficio económico que se obtiene  al vender una propiedad con este valor incrementado.  La participación en plusvalía es un instrumento que  los municipios utilizan para capturar una parte de  ese valor extra, usualmente a través de una tasa o  impuesto, y su recaudo permite desarrollar proyectos de  infraestructuras sostenible, que pueden incorporar SbN  en vías, espacio público, e incluso vivienda social.       ■    Ley 388 de 1997   Recursos de  cooperación  internacional. Provienen de entidades internacionales o multilaterales  y se derivan de donaciones, subvenciones o préstamos,  como es el caso del Fondo Verde del Clima (GCF, por  su sigla en inglés) o el Fondo Mundial para el Medio  Ambiente (GEF, por su sigla en inglés). Para acceder  a estos casi siempre es necesario formular proyectos,  usualmente asociados a la conservación de la  biodiversidad y la acción climática, según lo definido en  los términos de las convocatorias.    No se tiene una   normativa específica  asociada.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  68 \nFuente de   financiación   Descripción   Normas asociadas  Canje de deuda por  Naturaleza.    El canje de deuda por conservación de la naturaleza  consiste en una negociación, mediante la cual el país  deudor se compromete a invertir en proyectos de  conservación ambiental, a cambio de que su acreedor  disminuya o condone parte de su deuda pública. En este  caso, el objetivo es abordar dos aspectos de manera  simultánea: primero, la pérdida de biodiversidad en los  países en desarrollo; y, segundo, la dificultad de estos  países para pagar sus deudas públicas externas.     En el año 2004 se  realizó un canje  de deuda entre  Colombia y Estados  Unidos por USD 8,7  millones para la  conservación de los  bosques tropicales.  Fuente: elaboración propia, adaptado de MADS, 2022 y BIOFIN, s.f.  Tabla 8.  Principales fuentes de financiamiento del sector privado y financiero para proyectos de SbN    Fuente de   financiación   Descripción   Información de  referencia  Bonos temáticos  (verdes, azules o  de biodiversidad) Son instrumentos financieros de deuda cuyo capital  se destina a financiar de manera exclusiva proyectos  con beneficios ambientales y sociales verificables.  Es decir, una entidad (empresa, banco, gobierno,  organismo multilateral) emite un bono para obtener  recursos del mercado, pero se compromete a usar ese  dinero únicamente en iniciativas que contribuyan a  la sostenibilidad (regeneración de bosques y hábitat  naturales, conservación o rehabilitación de manglares,  preservar y proteger los océanos y sus ecosistemas  agricultura climáticamente inteligente, entre otros).     ■   Resolución 1687  de 2021 (adoptó el  Marco de Referencia  de Bonos Verdes  Soberanos en el país)  Líneas y créditos  verdes o  sostenibles   Las  líneas verdes  son programas de financiamiento  creados por bancos o respaldados por aliados  estratégicos (como banca de desarrollo y agencias  de cooperación) que destinan un cupo específico de  recursos para proyectos ambientales y sostenibles. Los   créditos verdes  son productos crediticios individuales  otorgados por un banco a un cliente para financiar un  proyecto o inversión que genere beneficios ambientales  comprobables. A diferencia de las líneas, el crédito  verde es una operación específica, con un monto y un  contrato particular. No obstante, ambos buscan apoyar  iniciativas de   adaptación y mitigación del cambio  climático, conservación de ecosistemas, actividades  agropecuarias sostenibles, proyectos de energías  renovables, transporte sostenible, entre otras.     ■   Estos instrumentos  están supeditados  a la vigilancia de la  Superintendencia  Financiera de  Colombia y a los   criterios internos   entidad financiera.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  69 \nFuente de   financiación   Descripción   Información de  referencia  Inversión de  impacto  Es un tipo de financiamiento que busca generar tanto un  retorno económico como un impacto social y ambiental  positivo y medible, de manera simultánea. Es útil sobre  todo para financiar proyectos de conservación de la  biodiversidad, restauración de ecosistemas, actividades  productivas sostenibles y desarrollo de infraestructuras   resilientes .  Este tipo de inversión se suele estructurar  a través de vehículos financieros diseñados para  canalizar recursos de forma costo-eficiente y maximizar  los impactos socioambientales bajo figuras como  fondos de capital privado, fondos de deuda, fondos  de infraestructura verde, financiamiento combinado  ( blended finance ), entre otros.     ■   Los decretos 1242 y  1243 de 2013 regulan  el funcionamiento,  transparencia,  administración y  límites para los  Fondos de Inversión  Colectiva (FIC),  aunque no todos son  fondos de impacto.  Responsabilidad   social y   ambiental  empresarial      Corresponden a una opción mediante la cual las  empresas destinan recursos financieros, técnicos o  humanos para promover prácticas sostenibles que  generen valor compartido. Este enfoque parte del  reconocimiento de que las empresas, además de  generar beneficios económicos, tienen un impacto  significativo sobre la sociedad y el ambiente, y que  pueden y deben asumir un rol activo en la solución  de desafíos globales como el  cambio climático y la  pérdida de biodiversidad .     ■   No se tiene una   normatividad  específica asociada.  Seguros  paramétricos  para el clima y la  biodiversidad  Son instrumentos financieros innovadores diseñados  para ofrecer cobertura frente a riesgos climáticos y  ambientales mediante el uso de indicadores definidos  con anterioridad (como precipitaciones, temperatura o  velocidad del viento), en lugar de indemnizar pérdidas  reales comprobadas. La existencia de un seguro  paramétrico puede actuar como un incentivo para las  SbN, dado que su adecuado desarrollo depende del  buen estado del ecosistema asegurado, lo que implicará  el desarrollo de actividades preventivas o de manejo  cuando se llegan a materializar los riesgos identificados  (fenómenos de remoción en masa, inundaciones,  incendios, tormentas, etc.).     ■   En el artículo 183  de la Ley 2294 de  2023 se modificó el  Estatuto Orgánico del  Sistema Financiero y  el Código de Comercio  para permitir que  las aseguradoras  ofrezcan seguros  bajo la modalidad  paramétrica o por  índice.  Créditos  voluntarios de  biodiversidad    Los créditos o certificados voluntarios de biodiversidad  son contribuciones positivas y permanentes a la  biodiversidad trazables y verificables. Se trata de un  mecanismo que funciona bajo el principio de pago  por resultado, que contribuyen con la protección de la  biodiversidad en ecosistemas altamente degradados.  En el país se vienen  adelantando dos  proyectos pioneros a  nivel mundial sobre  este tipo de créditos  liderados por las  organizaciones Terrasos  y Savimbo.    Fuente: elaboración propia, adaptada de: Fondo Acción, 2024.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  70 \nEn la actualidad se cuenta con un ambiente pro- picio para movilizar recursos hacia iniciativas de  SbN, se destaca la voluntad de actores públicos y  privados que tienen un notable interés en apostar- le al cumplimiento de los compromisos nacionales  e internacionales en torno a la biodiversidad, el  cambio climático y el desarrollo económico sos- tenible. No obstante, para lograr una movilización  de recursos exitosa se debe analizar con mayor  detalle el funcionamiento de cada fuente y esta- blecer en dónde se puede incidir más rápido para  establecer rutas de trabajo con roles y respon- sabilidades  compartidas,  sobre  todo  buscando  determinar si se requiere realizar ajustes desde lo  procedimental o desde lo normativo para así lo- grar dinamizar los diferentes recursos. Un  ejemplo  de  la  gestión  exitosa  de  nuevas  fuentes de recursos del sector financiero para SbN  es la experiencia con microfinancieras en Huila y  Santander desarrollada por el Fondo Acción en el  marco del proyecto SolNatura, que se describe en  la siguiente tabla.   Tabla 9.  Experiencia del proyecto SolNatura de diseño y ubicación de líneas de microcrédito verde para para  SbN en el sector agropecuario   Elemento   Descripción Lugar   Departamentos de Huila y Santander   Contexto territorial  El sector agropecuario es una de las principales actividades económicas y  fuente de ingresos del Producto Interno Bruto (PIB) de los departamentos  del Huila y Santander, al representar el 22 % y 12 % del PIB de manera  respectiva10. De este sector dependen económicamente 93.230 Unidades  Productoras Agropecuarias (UPA) en el Huila, y 111.388 en Santander11. Más  del 50 % de ellas en ambos departamentos tienen menos de cinco hectáreas.  Para estos departamentos el cambio climático es una amenaza significativa  dado que el sector agropecuario se encuentra entre los sectores más sensibles  a las condiciones cambiantes del clima y es el de mayor exposición a los  efectos adversos del cambio y la variabilidad climática.  La FAO (2022) reconoce que “el impacto del cambio climático en las cadenas  productivas agropecuarias se refleja en el cambio de las condiciones climáticas, las  cuales puede perjudicar o impulsar ciertos cultivos, aumentando o disminuyendo  el área idónea para su cultivo o desplazando esta misma a lo largo del territorio”. Según los informes departamentales de análisis de la vulnerabilidad y riesgo  frente al cambio climático para el sector agropecuario (2022), el departamento  del Huila en promedio podrá presentar elevaciones de temperatura de 2° C e  incrementar el promedio de las precipitaciones anuales en un 17,2 %.   10.  Ministerio de Comercio, Industria y Turismo. Perfiles Económicos Departamentales, (Disponible en https://www.mincit.gov. co/estudios-economicos/perfiles-economicos-por-departamentos). 11.  DANE. Encuesta Nacional Agropecuaria (2019). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  71 \nElemento   Descripción Lugar   Departamentos de Huila y Santander   Mientras en el departamento de Santander podrá aumentar la temperatura en  2,5 °C, y disminuir las precipitaciones en un 1.15 %. Los principales efectos de  estos cambios en la temperatura se verán reflejados en el aumento de plagas  y enfermedades, la pérdida de productividad de los cultivos, la disminución de  los suelos aptos para las prácticas agropecuarias, entre otros. Propósito Diseñar y colocar en el mercado nueve (9) líneas de microcrédito verde para  financiar SbN que incentiven la productividad y la sostenibilidad ambiental del  sector agropecuario. Actividades clave   Definir el enfoque: 1.  Espacios territoriales de articulación entre productores, empresas ancla,  gremios e instituciones financieras.  2.  Análisis de la demanda potencial para el diseño de instrumentos  financieros orientados a SbN.  3.  Construcción de un catálogo de actividades financiables verdes de SbN. 4.  El catálogo cuenta con 112 actividades financiables asociadas a las  siguientes medidas SbN: 5.  Agroforestería (sistemas agroforestales, sistemas silvopastoriles, sistemas  agrosilvopastoriles).    ■   Conservación y uso sostenible del suelo.    ■   Diversificación de cultivos.    ■   Restauración de la conectividad del paisaje.    ■   Restauración de nacimientos de agua y áreas clave en cuencas hidrográficas.    ■   Turismo de naturaleza.    ■   Unidades productivas familiares.  1.  Diseño de las líneas de microcrédito verde para SbN  El resultado final de estas actividades fue el diseño nueve líneas de  microcrédito verde para SbN:  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  72 \nElemento   Descripción Lugar   Departamentos de Huila y Santander   Huila   Cooperativa  / Institución   financiera  Línea de  microcrédito   Cadena de valor  Cooperativa  Departamental de  Caficultores del Huila Mejoramiento de  finca/soluciones  verdes. Café.   Coocentral   Línea de Crédito  Mujeres SbN- Línea  de  crédito verde.  Café.  Coofisam   Productiva / Línea  de  crédito verde . Café, caña panelera, cacao,  ganadería, avícola, frutas y  hortalizas, turismo. Fundación del Alto  Magdalena. SolNatura-FAM.    Turismo de naturaleza, Cacao,  Acuicultura, Ganadería. Instituto Financiero  para el Desarrollo del  Huila. Crédito SbN.   Acuícola, avícola, café, cacao,  caña panelera, forestal,  frutas y hortalizas, ganadería,  turismo de naturaleza.  Santander  Cooperativa  / Institución   financiera  Nombre de la  línea   Cadena de valor  Alquería - Finko   Fondo  Agrosostenible Ganadería. Crezcamos   Café, cacao, palma de aceite. Coomultagro   EcoCrédito   Avícola (sistema productivo  de gallina ponedora), café,  cacao, caña panelera,  ganadería, turismo de  naturaleza. Fundesan   Línea crédito de  verde Fundesan-  Oriente Colombiano Frutas y hortalizas, café. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  73 \nElemento   Descripción Lugar   Departamentos de Huila y Santander   Actores   involucrados En el diseño de las líneas de microcrédito verde participaron nueve  cooperativas e instituciones financieras de los departamentos del Huila.  Adicionalmente, se contó con la participación de asociaciones de productores,  empresas ancla y gremios de los departamentos, quienes identificaron las  necesidades de financiamiento para las nueve cadenas de valor seleccionadas.  Así mismo, participaron los socios del Consorcio del proyecto SolNatura (GIZ,  Fondo Acción y TNC) quienes aportaron insumos técnicos durante el proceso  de diseño de los nueve instrumentos.  Beneficiarios  principales Los principales beneficiarios de las nueve líneas de microcrédito verde son  los pequeños productores de los departamentos del Huila y Santander que  hacen parte de las cadenas de valor seleccionadas por el proyecto SolNatura:  acuícola, avícola, cacao, café, caña panelera, ganadería, forestal, frutas y  hortalizas y turismo de naturaleza.  Fuentes y esquema  de financiamiento El fondeo inicial de estas líneas de microcrédito verde proviene de recursos  propios de las nueve cooperativas e instituciones financieras. En el marco del  proyecto SolNatura, se realizó un acercamiento a organizaciones fondeadoras  nacionales e internacionales con capacidad de proporcionar capital a través de  mecanismos de deuda  senior.   Por otro lado, las nueve cooperativas e instituciones financieras participaron  en un programa de formación y fortalecimiento de capacidades para el diseño  de instrumentos financieros para SbN, el cual fue implementado por Fondo  Acción, en el marco del proyecto SolNatura por encargo del MinAmbiente  alemán (BMUKN) en asocio con GIZ y TNC.  Lecciones   aprendidas El diálogo estratégico entre instituciones financieras, productores, empresas ancla  y gremios es fundamental para el diseño efectivo de productos financieros verdes.  La integración del conocimiento práctico de los productores, la visión estratégica  de las empresas ancla y la experticia técnica de los gremios permitieron crear  instrumentos innovadores adaptados a las necesidades reales de las cadenas  de valor. Esta colaboración permitió a las cooperativas e instituciones financieras  comprender los modelos de negocios agropecuarios, los beneficios económicos  de la implementación de actividades sostenibles en las cadenas de valor, los  cuales se evidencian en ahorros o valor agregado. Este dialogo también permitió  identificar con precisión las inversiones verdes requeridas por los productores,  facilitando la oferta de productos financieros ajustados a las particularidades de  las cadenas de valor, para maximizar su impacto y adopción. Conocer el modelo de negocio de las cooperativas e instituciones financieras  y entender cómo la sostenibilidad ambiental puede generar valor en sus  portafolios implicó analizar el perfil de clientes, la misión, su ubicación, los  servicios ofrecidos y las metodologías de microcrédito. Cuando se indagó por  estos aspectos en las nueve cooperativas e instituciones financieras, se evidenció  una orientación hacia pequeños productores agrícolas y pecuarios. Esto permitió  enfocar el diseño del producto financiero hacia cadenas de valor para promover  el financiamiento para actividades verdes con énfasis en SbN que SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  74 \nElemento   Descripción  aumenten la rentabilidad de las prácticas agropecuarias (a través de ahorros y  reducción de pérdidas) y generen un impacto positivo en el clima y la naturaleza,  optimizando así el valor tanto para las microfinancieras como para sus clientes. El sector cooperativo y microfinanciero posee un potencial significativo para liderar  la implementación de líneas de microcrédito gracias a sus principios de inclusión  financiera y desarrollo comunitario, así como a sus metodologías probadas de  microcrédito rural. La metodología de microcrédito rural, caracterizada por su  enfoque en la cercanía con el cliente, el conocimiento profundo de las realidades  locales y la flexibilidad en la adaptación a las necesidades específicas de los  productores ofrece un potencial significativo para diseñar y colocar productos  financieros verdes que mejoren la productividad de los pequeños productores.  Al aplicar esta metodología, las instituciones financieras pueden identificar  oportunidades de inversión en prácticas sostenibles —como la adopción de  tecnologías eficientes, la implementación de sistemas agroecológicos o la  restauración de suelos— que no solo generen beneficios ambientales, sino que  también aumenten los rendimientos de los cultivos, reduzcan los costos de  producción y fortalezcan la resiliencia de los productores frente al cambio climático. Fuente: adaptada de Fondo Acción, 2025.  Mediante la revisión de las principales barreras y  de las recomendaciones para superarlas, surgidas  del análisis de las diferentes fuentes de financia- miento, se observa lo siguiente:    ■   Barreras financieras y modelos de riesgo   inadecuados:  las barreras financieras  restringen la inversión en SbN. Uno de los  mayores desafíos es que los modelos de  riesgo tradicionales no logran capturar de  forma adecuada los beneficios a largo plazo de  este tipo de proyectos, ni el valor no monetario  de los servicios ecosistémicos. Además,  muchas SbN, como es el caso de las asociadas  a la restauración ecológica o la reforestación,  requieren altas inversiones iniciales y  largos plazos de retorno, como sucede en  la generación de créditos de carbono o de  biodiversidad. Esto no se adapta fácilmente a  los productos financieros convencionales. Por  tanto, se recomienda desarrollar instrumentos  financieros específicos e innovadores  ajustados a las características de las SbN,  en cuanto a la temporalidad, la participación  de las comunidades, la cuantificación de  los beneficios y a los impactos sociales y  ambientales, tanto positivos como negativos,  que resulten de su implementación (Banco  Mundial, 2023).    ■   Inadecuado reconocimiento de los   verdaderos costos y beneficios de las SbN:  la   creciente relevancia de las SbN en el contexto  internacional ha incrementado la presión  por encontrar modelos de financiamiento  eficaces. No obstante, persiste una falla de  mercado: los servicios ecosistémicos carecen  de derechos de propiedad definidos y, por  tanto, sus beneficios no se reflejan bien en  el valor económico asignado por el mercado.  Para superar esta situación es fundamental  diseñar estrategias innovadoras que  contemplen financiamiento mixto ( blended   finance ), a través de los cuales se puedan  internalizar los beneficios ambientales y  sociales, como en el caso de los créditos de  biodiversidad, por ejemplo. También se debe  avanzar en la valoración económica de los  servicios ecosistémicos y en el fortalecimiento  de capacidades institucionales para  movilizar inversión privada con criterios de  sostenibilidad (Brigard Urrutia, 2023).  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  75 \n  ■   Falta de incentivos regulatorios:  la   insuficiente normativa y lineamientos claros  genera incertidumbre jurídica y desincentiva  la participación del sector privado y financiero.  Aunque existen políticas alineadas con los  ODS y el Acuerdo de París, por ejemplo, su  articulación con las SbN se ha dado de forma  fragmentada. Se recomienda avanzar hacia  una incorporación explícita de las SbN en  los marcos regulatorios sectoriales, como  en los procesos de licenciamiento ambiental  que incluyan compensaciones y pasivos  ambientales, o en los instrumentos de  planeación estratégica. Así mismo, se requiere  de la promoción de incentivos fiscales y de  mecanismos de certificación que reconozcan el  valor económico de los servicios ecosistémicos  y de los demás beneficios que las SbN pueden  aportar (CEPAL, 2022). Gracias a que las SbN generan beneficios para dife- rentes áreas del desarrollo, su financiamiento puede  realizarse con fuentes de recursos públicos y priva- dos disponibles para cubrir diversas necesidades de  los territorios y sus comunidades. Entre ellas están  las destinadas a la preservación y restauración de  ecosistemas, la adaptación y mitigación del cambio  climático, el manejo integral del agua, la gestión del  riesgo  de  desastres,  el  desarrollo  de  actividades  agropecuarias sostenibles, entre otras.   En este contexto, se hará la divulgación de las  fuentes con mayor afinidad temática para financiar  proyectos de SbN a formuladores de proyectos, se  promoverá el diseño de nuevos instrumentos de fi- nanciamiento en especial del sector financiero cuyo  interés  en  inversiones  verdes  tienen  tendencia  ascendente y se divulgarán posibilidades de incen- tivos tributarios para actividades de conservación.  Además, a través del Corredor de Financiamiento  Climático del DNP se promoverá la conexión de  proyectos de SbN con fuentes de financiación.   4.8.2 Investigación e  innovación   La  participación  de  universidades  y  centros  de  investigación colombianos en consorcios interna- cionales, como los proyectos Horizon 2020 de la  Comisión Europea, ha impulsado la consolidación  de  diálogos  intersectoriales  y  redes  de  coope- ración científica. Esta dinámica se ha fortalecido  gracias a la articulación entre instituciones aca- démicas  y  entidades  públicas  que  representan  intereses  institucionales,  en  particular  en  ciu- dades  como  Bogotá,  Medellín,  Cali  y  Envigado.  Como resultado, se ha ampliado la capacidad de  intercambio de conocimiento y se ha profundiza- do el diálogo entre sectores. Esto ha contribuido a  viabilizar la implementación de proyectos SbN en  diversos contextos territoriales del país. Por otra parte, en el marco de la cooperación  bilateral se destacan iniciativas orientadas a ge- nerar  conocimiento  práctico  y  replicable  en  los  territorios.  Entre  estas  se  encuentra  el  proyec- to SolNatura, liderado por la GIZ, Fondo Acción  y TNC, que se desarrolla en los departamentos  de Córdoba, Huila y Santander. Este proyecto ha  avanzado en la elaboración de una batería de in- dicadores para evaluar 20 intervenciones en estos  territorios y en la conformación de un  Clúster  de   Innovación  en  SbN ,  con  el  objetivo  de  articular  actores  públicos,  privados  y  académicos  alre- dedor  de  agendas  regionales  de  sostenibilidad  (SolNatura, 2024). A partir de estos desarrollos,  SolNatura está consolidando bases metodológi- cas y modelos de gobernanza colaborativa útiles  para la planificación, el seguimiento y la evalua- ción de SbN. De manera complementaria, se han desarrolla- do diez proyectos de investigación financiados por  el Sistema Ciencia, Tecnología e Innovación (CTel)  desde 2020 que incorporan SbN en regiones como  Valle del Cauca, Antioquia, Boyacá, Córdoba, Cal- das, el Archipiélago de San Andrés y Atlántico.  Estas iniciativas se concentran en la recuperación  y  conservación  de  ecosistemas  altamente  de- SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  76 \ngradados,  abordando  temas  prioritarios  para  la  política pública como la adaptación climática, la  conectividad ecológica, la provisión de servicios  ecosistémicos y la gestión del riesgo asociado a  eventos  climáticos  extremos  y  procesos  erosi- vos. Estos proyectos muestran un fortalecimiento  progresivo  de  las  capacidades  científicas  y  te- rritoriales del país y consolidan a las SbN como  centrales para la gestión ambiental y la adapta- ción climática. No  obstante,  persisten  desafíos  que  limitan  la consolidación de una base científica robusta y  aplicada al contexto territorial. Estos fueron iden- tificados a través de entrevistas con profesores e  investigadores de las principales universidades y  centros de investigación del país12.  Entre ellos, se  destacan  las  dificultades  para  consolidar  bases  de datos abiertas que contengan los resultados  de los proyectos y la articulación efectiva entre el  Estado, la academia, el sector privado y la socie- dad civil para la toma de decisiones informadas.  Adicionalmente,  se  evidencian  brechas  signifi- cativas  en  los  mecanismos  de  financiamiento,  caracterizados por su dispersión, corta duración y  escasa coordinación entre las diferentes fuentes  nacionales e internacionales.  La débil vinculación del sector privado y de los  centros de investigación en esquemas de cofinan- ciación  reduce  las  posibilidades  de  desarrollar  proyectos  de  largo  plazo  orientados  a  fortale- cer la captura de datos  in situ  y la evaluación de  impactos  en  distintos  contextos  territoriales.  La  ausencia de sistemas de monitoreo y evaluación  sostenidos en el tiempo dificulta generar lecciones  aprendidas que faciliten la escalabilidad y replica- bilidad de experiencias exitosas. En consecuencia,  se debilita la capacidad institucional del país para  integrar la evidencia científica en la formulación y  actualización de políticas públicas. Se  ha  identificado  la  resistencia  de  las  comu- nidades a adoptar el concepto de SbN sin que  antes se reconozcan los conocimientos locales o  soluciones  preexistentes  autogestionadas  para  resolver  problemas  ambientales.  Especialmen- te en el Sur Global, donde las SbN están siendo  incorporadas de manera progresiva, la academia  y los centros de investigación enfrentan el reto  de  replantear  los  procesos  de  socialización  de  proyectos para promover el intercambio de co- nocimientos que visibilice los saberes locales y  las  oportunidades  que  ofrecen  para  fortalecer  sus propias iniciativas territoriales.  Existe la oportunidad de mejorar la articulación  entre las agendas de investigación, las necesida- des  concretas  de  los  gobiernos  locales  y  de  la  sociedad civil y el desarrollo normativo para es- calar la implementación de SbN. En este contexto,  es fundamental que la información generada por  los proyectos contribuya con éxito a cerrar brechas  de  conocimiento  y  a  fortalecer  las  capacidades  institucionales en los territorios donde se imple- mentan.  Para  ello,  resulta  prioritario  establecer  mecanismos  de  comunicación,  transferencia  de  conocimiento  y  la  consolidación  de  repositorios  de  datos  que  garanticen  el  uso  práctico  de  los  resultados científicos en la gestión pública, la pla- nificación urbana y la toma de decisiones locales.  En  conclusión,  consolidar  una  base  cien- tífica  robusta  exige  orientar  los  esfuerzos  de  investigación hacia los retos más apremiantes en  materia  de  adaptación  climática,  conservación  de  biodiversidad  y  seguridad  hídrica;  restaura- ción  ecológica  y  conectividad  de  ecosistemas  estratégicos; beneficios para la salud pública y  salud ambiental; integración en la planificación  territorial  y  co-creación,  apropiación  social  y  gobernanza comunitaria en la formulación e im- plementación  de  proyectos,  así  como  construir  una infraestructura de conocimiento sólida, forta- lecer la formación académica y generar espacios  permanentes de intercambio que permitan que  la evidencia científica circule y se traduzca en so- luciones aplicables en los territorios.   12.  Identificación a partir de entrevistas con: Universidad Javeriana, Universidad del Rosario, Universidad del Valle, Universi- dad Jorge Tadeo Lozano, Instituto Humboldt. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  77 \n4.8.3 Dinamización de la  red nacional de SbN   Como parte de la implementación de la estrate- gia se continuará promoviendo el intercambio de  experiencias y la generación de espacios de colabo- ración entre entidades para generar sinergias que  faciliten el escalamiento de las SbN, en particular  a través de la red nacional y su conexión con otras  redes  subnacionales,  asociaciones  de  entidades  territoriales y redes de instituciones académicas.    Estas acciones se complementarán con la in- clusión de la temática de SbN en instrumentos de  llegada al territorio, la realización de espacios de  fortalecimiento de capacidades y socialización de  herramientas para entidades territoriales y acto- res que prestan asistencia técnica local, como los  extensionistas agropecuarios.   La Red Nacional de SbN fue creada en 2024  como parte de la implementación del Documento  CONPES 4058 para la reducción del riesgo por fe- nómenos de variabilidad climática; busca impulsar  la implementación efectiva de este tipo de proyec- tos, al tiempo que se posiciona como un espacio  para  fomentar  el  intercambio  de  conocimientos  y  experiencias  bajo  un  esquema  de  cooperación  y aprendizaje mutuo, en el que se potencia la in- terdisciplinariedad y la complementariedad de los  diferentes actores.  El objetivo general de la Red es promover la  conexión entre ciencia, política y empresa para fa- vorecer la implementación de SbN en Colombia.  Sus objetivos específicos son:    ■   Orientar la coordinación y asistencia mutua  entre diferentes actores y regiones incluyendo  el gobierno, el sector privado, la academia,  cooperación internacional, las organizaciones  sociales (ONG y sociedad civil) y las  comunidades locales.    ■   Fortalecer capacidades para promover  la formulación, la implementación y el  seguimiento de proyectos.    ■   Sistematizar y armonizar experiencias que  permitan identificar y compartir lecciones  aprendidas de proyectos e iniciativas.  La Red tiene como objetivo promover la conexión entre ciencia, política y  empresa para favorecer la implementación de SbN en Colombia a través  del trabajo coordinado de 4 núcleos temáticos:     ■   Gestión del conocimiento    ■   Política basada en ciencia    ■   Financiamiento    ■   Formulación e implementación de proyectos  La Red es dinamizada por el grupo promotor, en  la actualidad integrado por el DNP, MinAmbiente,  el proyecto SolNatura (con el liderazgo de GIZ), la  Universidad del Valle y el CNAB de la ANDI.  Funciona mediante núcleos temáticos, organi- zados de la siguiente manera:    ■   Gestión del conocimiento, cuyo objetivo es  promover el intercambio de información  para el monitoreo, evaluación, aprendizaje  de proyectos, investigación e innovación — liderado por GIZ (en el marco del proyecto  SolNatura, como un espacio de diálogo y  gobernanza nacional para promover SbN)—.     ■   Política basada en ciencia, su propósito es  proporcionar a los formuladores de políticas  y a los tomadores de decisiones datos y  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  78 \nanálisis científicos para apoyar decisiones bien  fundamentadas sobre la implementación y  gestión de SbN —liderado por UniValle—.    ■   Financiamiento, cuyo objetivo es mapear  y movilizar recursos financieros públicos,  privados y combinados, así como nacionales e  internacionales, para proyectos —liderado por  el DNP—.    ■   Formulación e Implementación de proyectos,  cuyo propósito es brindar acompañamiento  y herramientas que incentiven la formulación  e implementación en los territorios, además  de conocer la implementación y buenas  prácticas de proyectos realizados —liderado  por MinAmbiente y apoyado por el CNAB de la  ANDI—. Las actividades desarrolladas por la red siguen un  plan de acción anual que se elaboró de forma par- ticipativa a partir de la oferta de las entidades que  la integran; cuenta, por otra parte, con un plan de  seguimiento para evaluar su implementación. Se  realizarán acciones a mediano y largo plazo con  miras a la sostenibilidad de la Red. Estas se pre- sentan en la siguiente tabla.   Tabla 10.  Acciones de mediano y largo plazo para la consolidación de la Red nacional de SbN  Núcleo   Visión   Acciones propuestas  Gestión del  conocimiento Conformar  un centro de  conocimiento  aplicado     ■   Promover la consolidación de una plataforma digital con  información accesible y sistematizada sobre experiencias  de proyectos implementados, que enfatice en las lecciones  aprendidas.     ■   Promover la Red en foros internacionales y buscar alianzas con  agencias de cooperación interesadas en las SbN en el contexto  latinoamericano. Política  basada en   ciencia  Ser un   laboratorio   de políticas  públicas  basadas en  evidencia     ■   Crear un comité asesor científico y de política dentro de la Red,  compuesto por miembros de este y del núcleo de Gestión del  conocimiento que sistemáticamente evalúe la evidencia disponible  y elabore documentos de posición y recomendaciones para los  integrantes del sector público.     ■   Identificar y proponer activamente la inclusión de SbN en la  formulación de nuevas políticas públicas.    ■   Facilitar espacios de diálogo frecuente y estructurado entre  científicos, formuladores de políticas e implementadores (públicos,  privados, comunidades) para asegurar que la política responda a  las necesidades locales y a la evidencia científica. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  79 \nNúcleo   Visión   Acciones propuestas  Financiamiento Socializar  oportunidades  de  financiamiento   y catalizar  inversiones   ■   Generar sinergias con el sector financiero para diseñar  instrumentos financieros específicos para SbN, como bonos verdes  territoriales, fondos de inversión de impacto o mecanismos de  pago por servicios ambientales.    ■   Habilitar el corredor de financiamiento climático del DNP para  construir un portafolio de proyectos de SbN para generar señales a  las fuentes de financiación y generar oportunidades de aceleración.    ■   Diseñar casos de negocio robustos de proyectos que demuestren  sus beneficios económicos, sociales y ambientales.    ■   Realizar espacios de mentoría y acompañamiento para  organizaciones y comunidades interesadas en formular proyectos  de SbN, conectándolos con expertos financieros para mejorar la  viabilidad y bancabilidad de sus propuestas. Formulación e  Implementa- ción de  proyectos de  SbN Ser un espacio  para facilitar la  implementa- ción de  proyectos     ■   Ofrecer acompañamiento técnico a iniciativas prometedoras, desde  la conceptualización hasta la implementación y el monitoreo,  incluyendo aspectos como la estimación de costos y beneficios.    ■   Impulsar la conformación de mesas técnicas intersectoriales con  consultores y ejecutores de obras, con el fin de incorporar SbN en  sus portafolios de soluciones, para promover su articulación con  enfoques convencionales y para facilitar una transición progresiva  hacia modelos de inversión y desarrollo más sostenibles.     ■   Desarrollar guías y herramientas interactivas sobre formulación  y ejecución e implementación de SbN en diversos contextos  geográficos (urbanos, rurales, costeros) que incorporen  periódicamente lecciones aprendidas de la implementación y el  monitoreo.    ■   Fomentar la replicación y escalabilidad de proyectos exitosos  mediante la socialización de casos exitosos y la facilitación de  alianzas estratégicas para expandir su impacto a nivel nacional. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  80 \nPara potencializar el alcance y el impacto de la  Red, se buscará la participación de nuevos actores  que aún no están involucrados, como se muestra  en la siguiente tabla.  Tabla 11.  Nuevos actores para vincular a la Red nacional  Actor   Perspectiva de participación  Comunidades locales  y organizaciones de   base  Socialización de herramientas para la formulación de proyectos e  identificación de necesidades, intereses y oportunidades a nivel territorial. Entidades financieras    Participación en mesas de trabajo y eventos para presentar el potencial de  inversión en SbN y para difundir sus oportunidades de financiamiento.  Aseguradoras Conocimiento de modelos de negocio que incorporen proyectos de SbN  como opciones para la reducción de riesgos asegurables, involucrando a las  aseguradoras en la evaluación y promoción de proyectos. Gremios y   asociaciones  sectoriales   Promover la inclusión de SbN en sus prácticas empresariales. Fuente: elaboración propia. Para que el impacto de la Red trascienda a un pú- blico más amplio, se deben fortalecer y diversificar  los canales de difusión, atender a su función comu- nicativa que trascienda la difusión de información,  al buscar dinamizar la colaboración, promover el  aprendizaje mutuo y la implementación de otras  experiencias. La narrativa debe resaltar la corres- ponsabilidad y el trabajo colectivo como motores  de transformación. La comunicación en este mar- co tiene un doble propósito: fortalecer la identidad  institucional  y  técnica  de  la  Red  y  proyectarla  como un referente regional de cooperación y co- nocimiento sobre SbN. Por último, se plantea la conformación de un  núcleo temático de gobernanza que esté integra- do por actores públicos, privados, académicos y  comunitarios, que articule tanto los instrumentos  existentes como los enfoques diferenciales y co- laborativos. Este esquema no solo busca que la  participación sea más incidente, sino que también  fomente la confianza, el apoyo social y la legiti- midad  de  las  soluciones,  y  que  contribuya  a  la  sostenibilidad de las SbN y al fortalecimiento de  la justicia social y ambiental en los territorios.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  81 \n4.8.4 Orientaciones de  comunicación   La comunicación en torno a las SbN se reconoce  como un componente esencial para garantizar su  comprensión, apropiación e implementación efec- tiva que refleje la intención de armonizar la relación  entre la sociedad y los ecosistemas, fortalecer la  resiliencia  climática  y  promover  el  bienestar  de  las comunidades, todo soportado en la ciencia, la  equidad y la sostenibilidad. En este marco, la co- municación se concibe como una herramienta de  transformación cultural y de fortalecimiento de la  gobernanza ambiental capaz de vincular la técni- ca con el territorio, la política con la ciencia y el  conocimiento con la acción. Los lineamientos de comunicación buscan uni- ficar  criterios,  fortalecer  capacidades  y  garantizar  la coherencia de los mensajes y herramientas uti- lizadas  por  los  diferentes  actores  involucrados  a  través de la propuesta de las bases para una acción  comunicativa articulada, transparente y basada en  evidencia, que facilite la coordinación interinstitucio- nal, potencie la apropiación social y consolide una  narrativa común sobre el papel fundamental de la  naturaleza en el desarrollo sostenible del país.  4.8.4.1 Enfoque integral de  comunicación y principios  orientadores  Dada la complejidad y el carácter multisectorial de  las SbN, la comunicación debe entenderse como un  proceso integrador que conecte tres dimensiones  complementarias:  la comunicación estratégica, la  comunicación ambiental y la comunicación comu- nitaria y participativa . Desde la  comunicación estratégica , se busca el  posicionamiento en la agenda pública, fortalecer  la toma de decisiones informadas, la movilización  de actores y la promoción de cambios institucio- nales y normativos. Esto exige construir narrativas  claras, rigurosas y coherentes con las prioridades  de país, sustentadas en evidencia técnica y científi- ca; la  comunicación ambiental , traduce el lenguaje  técnico en mensajes accesibles, promoviendo la  comprensión  de  conceptos  técnicos  y  cambios  culturales hacia la sensibilidad frente al cuidado  de la naturaleza, pues vincula la gestión del co- nocimiento con la acción colectiva; finalmente, la   comunicación comunitaria y participativa  garanti- za la legitimidad social y territorial. A través del  diálogo horizontal, la co-creación y el intercambio  de saberes entre comunidades, instituciones y ex- pertos,  esta  dimensión  fortalece  la  apropiación  local, la equidad en la gestión ambiental y la sos- tenibilidad social de las medidas implementadas. En conjunto, estas tres dimensiones configu- ran  una  arquitectura  de  comunicación  integral  que conecta conocimiento, política pública y prác- tica territorial, lo que permite que las SbN sean  comprendidas,  aplicadas  y  replicadas  de  forma  coherente en los territorios. Por otra parte, los principios que guían la co- municación  garantizan  que  los  mensajes  y  las  acciones mantengan coherencia, pertinencia y le- gitimidad ante los distintos públicos. Estos son:   La  claridad  orienta el uso de un lenguaje preciso,  accesible y transparente, que permite comunicar  conceptos técnicos sin perder rigor científico; la   coherencia  asegura la alineación narrativa entre  instituciones y actores; la  adaptación a los territo- rios  orienta la contextualización de los mensajes  según las condiciones socioculturales, ambienta- les y productivas de cada región; la  participación    se reconoce como principio transversal que pro- mueve la construcción colaborativa de mensajes  y la inclusión de saberes locales; la  transparencia    fortalece la confianza al comunicar de manera ho- nesta los avances, retos y oportunidades para su  éxito; Por último, la  evidencia  respalda toda ac- ción comunicativa a través de datos verificables  y resultados de implementación que refuerzan la  credibilidad de las intervenciones. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  82 \n4.8.4.2 Prioridades temáticas,  audiencias y mensajes  prioritarios  La comunicación sobre SbN debe estructurarse  en torno a temas centrales que orienten de ma- nera coherente el contenido y los mensajes para  fortalecer su comprensión y aplicación en los dis- tintos niveles de gestión ambiental, territorial y  sectorial del país. Algunos de estos temas y su  propósito son:     ■   Concepto y criterios nacionales para  proyectos:  promover la comprensión de la  definición aprobada por la UNEA-5 y adoptada  por Colombia, así como los siete criterios que  permiten caracterizar proyectos de SbN en  Colombia y los enfoques que pueden utilizar  (AbE, MbE, Eco-RRD, infraestructura natural e  ingeniería ecológica).    ■   Múltiples beneficios:  visibilizar cómo las SbN  generan de manera simultánea beneficios en  biodiversidad, seguridad hídrica, resiliencia  climática y cohesión social.    ■   Instrumentos técnicos:  explicar el marco de  evaluación, los métodos de costo-beneficio,  el sistema de indicadores y las herramientas  disponibles para integrar SbN en la  planificación y gestión territorial y sectorial.    ■   Financiamiento y escalamiento:  difundir  las oportunidades que ofrece la Estrategia  Nacional para movilizar inversión pública  y privada, e incentivar su incorporación en  proyectos de desarrollo sostenible.    ■   Red Nacional de SbN:  posicionar a la Red  como espacio de gobernanza que articula la  ciencia, las políticas públicas y la acción en el  territorio a través de la difusión de experiencias,  aprendizajes y herramientas técnicas. Además, es importante reconocer la diversidad de  públicos vinculados con la implementación de SbN,  adaptando los mensajes según sus responsabili- dades, intereses y lenguajes. Esta diferenciación  es esencial para garantizar la apropiación, aplica- ción y sostenibilidad de las intervenciones en el  largo plazo:   Para los  tomadores de decisión  en los niveles   nacional, regional y local —incluyendo autorida- des ambientales, entidades sectoriales, gobiernos  territoriales  y  responsables  de  planeación—,  la  comunicación debe resaltar que las SbN son in- tervenciones  costo-efectivas  y  multisectoriales  que  contribuyen  simultáneamente  a  las  metas  de  adaptación  y  mitigación  al  cambio  climáti- co, conservación de la biodiversidad y desarrollo  económico sostenible. En este nivel, los mensa- jes deben enfatizar que las SbN son herramientas  de política pública con capacidad de generar im- pactos medibles, reducir costos de infraestructura  gris y fortalecer la resiliencia de los sistemas pro- ductivos  y  urbanos.  Comunicar  su  aporte  al  cumplimiento de los compromisos internacionales  del país —como el Acuerdo de París, el Marco Glo- bal de Biodiversidad y los Objetivos de Desarrollo  Sostenible (ODS)— refuerza su legitimidad como  política pública y no solo como práctica ambiental.  Para  los   equipos  técnicos,  formuladores  de   proyectos  y  funcionarios  de  entidades  públicas    la comunicación debe presentar a las SbN como  una  metodología  integral  de  gestión  territorial  respaldada por criterios nacionales, guías técni- cas y herramientas de evaluación. Los mensajes  deben  visibilizar  los  instrumentos  existentes  — manuales,  fichas  de  formulación,  indicadores  y  sistemas de seguimiento o los que estén dispo- nibles— que facilitan la incorporación de SbN en  proyectos de inversión pública y privada. En este  nivel, la comunicación cumple un rol pedagógico  y de acompañamiento técnico: traduce los princi- pios de las SbN en orientaciones prácticas para  diseñar, implementar y monitorear intervenciones  que generen beneficios múltiples y medibles en  biodiversidad, clima y bienestar humano. En el ámbito de la  comunidad científica, aca - démica  y  de  investigación , la comunicación debe  promover un diálogo interdisciplinario entre cien- cias  de  la  naturaleza,  la  investigación  social  y  las  ciencias  económicas  que  permita  fortalecer  la  base  de  conocimiento  sobre  SbN  en  Colom- SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  83 \nbia. Las SbN deben proyectarse como un campo  prioritario de innovación, desarrollo tecnológico y  experimentación social, vinculado a las agendas  de investigación aplicada y de ciencia ciudadana.  Los mensajes hacia este público deben incentivar  la generación de evidencia robusta sobre la efec- tividad, escalabilidad y co-beneficios de las SbN,  y su traducción en insumos para la formulación de  políticas públicas. La comunicación también debe  resaltar la importancia de los repositorios de da- tos  abiertos,  las  publicaciones  científicas  y  los  espacios de intercambio técnico como mecanis- mos de fortalecimiento del conocimiento nacional.  Para  el   sector  privado,  el  sector  productivo  y    las entidades de financiamiento nacionales e in - ternacionales , la comunicación debe destacar el  potencial de las SbN para generar valor ambien- tal, social y reputacional, al tiempo que fortalecen  la sostenibilidad de las cadenas de valor y redu- cen riesgos económicos y los asociados al clima.  Los mensajes estratégicos deben evidenciar que  invertir en este tipo de proyectos es una acción  de responsabilidad social o ambiental y es una  oportunidad  tangible  para  impulsar  el  desarro- llo productivo, la innovación verde y la resiliencia  de los negocios. Asimismo, la comunicación debe  visibilizar  los  instrumentos  financieros  disponi- bles  —como  fondos  climáticos,  bonos  verdes,  esquemas  de  pago  por  resultados  o  alianzas  público-privadas— y los beneficios fiscales y re- putacionales que derivan de integrar SbN en las  estrategias empresariales.  Hacia los  medios de comunicación, la sociedad  civil organizada y las comunidades locales , la na- rrativa debe ser clara, cercana e inspiradora. Las  SbN deben comunicarse como soluciones concre- tas que mejoran la calidad de vida, garantizan la  seguridad hídrica y alimentaria, restauran ecosis- temas y fortalecen la capacidad de adaptación al  cambio climático. En este nivel, la comunicación  tiene un papel educativo y movilizador: promueve  la apropiación social, la participación en los pro- cesos de planeación territorial y la comprensión  de la naturaleza como un activo esencial para el  bienestar y la economía local. La narrativa debe  rescatar los saberes tradicionales y comunitarios,  destacando el rol de las comunidades como cus- todias de los ecosistemas y agentes de cambio en  la gestión sostenible del territorio. Finalmente, para los  organismos  de  coopera- ción , los mensajes deben proyectar la experiencia  colombiana como un referente regional en la im- plementación de SbN, enfatizando su alineación  con los compromisos globales y su potencial de  replicabilidad en otras regiones o países. La comu- nicación debe invitar a fortalecer la cooperación  técnica y financiera, y a posicionar a la Estrategia  Nacional como una plataforma de acción conjun- ta que conecta la ciencia, la política y la sociedad  para enfrentar los desafíos del cambio climático y  la pérdida de biodiversidad.  4.8.4.3 Canales y herramientas  o formatos recomendados  La articulación de canales y herramientas de co- municación debe responder a las características  y necesidades de cada público. Los canales son  los espacios o medios de relación, mientras que  los formatos son las formas o herramientas es- pecíficas que materializan la comunicación dentro  de esos canales. Su uso articulado garantiza una  circulación bidireccional de información entre los  diferentes públicos.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  84 \nLa selección de canales debe regirse por prin- cipios  de  accesibilidad,  pertinencia  técnica  y  sostenibilidad, con capacidad para generar com- prensión,  apropiación  y  transformación.  En  la  siguiente tabla se mencionan algunos canales y  herramientas  recomendadas,  de  acuerdo  con  el  público objetivo.    Tabla 12.  Recomendaciones sobre canales y uso de herramientas por público objetivo  Público   Canales  principales Formatos o  herramientas Propósito   Resultado  esperado Ejemplo de  indicador  Tomadores  de decisión  (niveles  nacional,   sectorial y   territorial)  Institucionales de  gobierno:  circu - lares, boletines,  sesiones directivas  y comités técnicos.   De incidencia  política:  mesas  intersectoriales, co- misiones técnicas,  foros de planea- ción y espacios de  seguimiento de  instrumentos de  política.  Policy briefs ,  informes eje- cutivos, fichas  de resultados  y presentacio- nes técnicas de  alto nivel. Asegurar que  la toma de  decisiones se   sustente en   evidencia y en  los beneficios  integr s basadas en la Naturaleza  101 \nAnexo 2. Experiencias de recuperación de  servicios ecosistémicos para la resiliencia urbana   Regulación hídrica  La implementación de SbN orientadas a la regu- lación  hídrica  urbana  requiere  la  consideración  de las características biofísicas locales. Factores  como  la  temperatura  superficial,  los  patrones  de precipitación, el crecimiento y densidad de la  vegetación, así como las propiedades del suelo – humedad, textura y permeabilidad—, determinan  la efectividad de las medidas aplicadas (Elliott et  al., 2018; Kuhlemann  et al ., 2021).  Asimismo, la selección del tipo de SbN deter- mina los procesos ecológicos que se promueven  en  cada  contexto.  No  obstante,  su  desempeño  depende de atributos específicos de implemen- tación, como la selección de especies (índice de  área foliar), densidad y estado de desarrollo de la  cobertura vegetal (Rotzer et al., 2019).  Experiencias de implementación  Lugar   Tipo de SbN   Impacto  Municipio  de Soacha  (Cundinamarca)  y municipio  de La Ceja  (Antioquia).17 Restauración del Humedal  Santa Ana y creación  de jardines de lluvia,  eliminación de un camino  de cemento para generar  senderos permeables,  restauración de suelos y  siembra de árboles nativos. Durante 2023 se restauraron 1500 m² del humedal  con la siembra de 90 árboles nativos. La restauración  pretende incrementar la capacidad de retención e  infiltración del humedal, reducir la escorrentía y mejorar  la calidad del agua. El proyecto está en fase piloto; se  espera que la combinación de jardines de lluvia, suelos  permeables y reforestación regule el exceso hídrico y  mejore la adaptación a eventos extremos. Santiago de  Cali – diversos  humedales   urbanos 18 Rehabilitación y restauración  ecológica en los humedales  de Cañasgordas,  Babilla-Zanjón del Burro,  Charco Azul, entre otros,  incluyendo revegetación y  limpieza. La restauración de humedales ayuda a recargar  acuíferos, adaptarse al cambio climático y evitar  inundaciones. Wuhan  (provincia de  Hubei, China)19 Infraestructuras verdes y  grises integradas: jardines  de lluvia, zanjas vegetadas,  biorretención, pavimentos  permeables, zanjas de  infiltración y módulos de  almacenamiento de lluvia. El informe de la IUCN para el proyecto GROWGREEN  señala que, tras la implementación de los proyectos,  se redujeron los problemas de inundaciones urbanas  de forma significativa. Durante el verano de 2020,  Wuhan experimentó precipitaciones récord pero no  tuvo casos graves de anegamiento, lo que se atribuye  a la capacidad de absorción e infiltración de las  infraestructuras. Fuente: elaboración propia.  17.  IKI Small Grants, Integración de Soluciones basadas en la Naturaleza en Soacha y La Ceja (Figueroa & Svensson, 2024). 18.  DAGMA (Alcaldía del municipio de Santiago de Cali  et al ., 2024). 19.  Using Nature to Reshape Cities and Live with Water: an overview of the Chinese Sponge City programme and its imple- mentation in Wuhan (Grow Green, 2020) SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  102 \nPurificación del agua    Las  medidas  incluyen  el  uso  de  vegetación  preexistente, sistemas de control de erosión e in- fraestructura verde orientada a la gestión pluvial,  como estanques de retención, jardines de lluvia,  zanjas de infiltración, humedales construidos, cu- biertas  verdes,  jardines  privados  y  pavimentos  vegetados (Castellar et al., 2021).  La eficacia de los servicios de purificación hí- drica provistos por las SbN depende del tipo de  solución  implementada  y  de  factores  estruc- turales  como  la  composición  y  densidad  de  la  vegetación,  la  estructura  radicular,  la  presencia  de microorganismos del suelo y atributos edáficos  como la humedad, la textura y la permeabilidad  (Babí Almenar  et al ., 2021). En particular, las SbN  diseñadas para la gestión pluvial —como los es- tanques de retención, jardines de lluvia y zanjas  de infiltración— reducen las cargas de nitrógeno  mediante  procesos  de  nitrificación  y  desnitrifi- cación  (Bettez & Groffman, 2012), mientras que  los  humedales  construidos  y  los  sistemas  de  biofiltración remueven eficientemente la deman- da química de oxígeno (DQO), el amonio (NH₄⁺),  los metales pesados y los sólidos suspendidos,  actuando  como  sistemas  de  tratamiento    in  situ    y  constituyendo  una  herramienta  clave  para  la  mejora de la calidad del agua y la resiliencia am- biental  (Feng  et al ., 2012; Hatt  et al. , 2009; Masi   et al. , 2017).  Experiencias de implementación  Lugar   Tipo de SbN   Impacto  Río Cauca,  monitoreo de  fuentes difusas  (Univalle)20 Una laguna   facultativa y un   humedal artificial  diseñados para  condiciones  locales y dirigidos  a la remoción de  contaminantes  emergentes. Reducción de agroquímicos: del 51 % al 93 % en  compuestos como heptacloro, bifenilo, 2-fenilfenol y  dicloranilina. Reducción de fármacos: hasta 96 % de reducción en  antiinflamatorios (ibuprofeno, naproxeno) y entre 23 % y  80 % en antiepilépticos y antibióticos.  Recuperación parcial de hábitats acuáticos : presencia de  aves y anfibios en los humedales construidos. Humedal  artificial de flujo   horizontal en   Kigali (Ruanda) –  manejo de aguas  residuales21 Humedal artificial  de flujo horizontal La comparación de influente y efluente mostró reducciones  de 16 % a 80 % en parámetros como pH, nitrógeno total,  fósforo total, sólidos suspendidos totales, sólidos disueltos  totales, demanda química (DQO), demanda bioquímica  (DBO) y oxígeno disuelto. Después del tratamiento, el efluente cumplió los  estándares de la Organización Mundial de la Salud (OMS)  para reuso y el índice de calidad del agua CCME-WQI  mejoró de categoría marginal/pobre (≈ 42-46) a buena (≈  87-89)  20.  Univalle (Univalle, s. f.). 21.  Impact analysis of constructed wetland for wastewater management in Rwanda (Nsanzabaganwa et al., 2025). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  103 \nLugar   Tipo de SbN   Impacto   Santa Lucía  (Gran Canaria,  España)22 Humedal híbrido  (flujo vertical  seguido de flujo  horizontal) para  depuración de  aguas residuales  municipales. El monitoreo de 2014-2019 mostró eficiencias medias de  remoción de 92 % para DBO₅, 89 % para DQO y 97 % para  sólidos suspendidos totales. La eliminación de nutrientes fue más moderada: 48 %  de remoción de nitrógeno total y 35 % de amonio en el  sistema completo. La etapa secundaria (humedal vertical)  por sí sola logró remociones del 86 % (DBO₅), 81 % (DQO)  y 91 % (SST). Fuente: elaboración propia.  Mantenimiento y mejora  de la calidad del aire  La implementación de SbN orientadas al man- tenimiento  y  mejora  de  la  calidad  del  aire  constituye una estrategia integral para fortalecer  la gestión ambiental urbana y rural, y avanzar en  el cumplimiento de los compromisos nacionales  e  internacionales  en  materia  de  sostenibilidad,  cambio  climático  y  salud  pública.  Estas  es- trategias  incluyen  acciones  de  protección  y  restauración de hábitats, manejo de vegetación  preexistente  y  diseño  de  infraestructura  verde  como muros verdes, pérgolas vegetadas, arbo- lado  urbano,  corredores  ecológicos,  parques,  bosques urbanos y jardines privados (Castellar   et al ., 2021).  La eficacia de las SbN depende de factores  como el grado de cobertura arbórea, la selección  de especies y la naturaleza de los contaminantes  atmosféricos, entre ellos el material particulado  (PM), los compuestos de nitrógeno, los metales  pesados  y  los  hidrocarburos  aromáticos  policí- clicos  (PAHs)  (Ersoy  Tonyaloğlu  &  Atak,  2021;  Zafra-Mejía  et al ., 2021). Factores abióticos como  la temperatura, la precipitación y la velocidad del  viento también inciden en los procesos de disper- sión y deposición de contaminantes (Zafra-Mejía   et al ., 2021). A su vez, el estado de desarrollo de  la vegetación influye en la
