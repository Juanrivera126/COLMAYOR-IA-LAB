o  de iniciativas ha fortalecido  proyectos enfocados en  la soberanía alimentaria  y energética, entre otras  experiencias, pues garantizan  la disponibilidad de recursos  para el mantenimiento de los  procesos. Cada grupo debe  contar con mecanismos de  autorregulación que deben  contemplar acuerdos sobre:  conformación de la junta  directiva, la tasa de interés  de los préstamos, el monto  de ahorro por grupo y las  formas de capitalización (Grupo  Semillas, 2024).  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  40 \n3.3.2 Intervenciones que  se integran al paisaje  Las  SbN  tienen  el  potencial  de  lograr  objeti- vos regionales cuando se implementan a escala  de paisaje o de ecosistema y a largo plazo; sin  embargo,  esto  no  siempre  es  posible  por  la  disponibilidad  de  recursos  o  por  el  espacio  te- rritorial limitado en el que las entidades —como  los municipios— tienen la facultad para realizar  intervenciones, por ello, deben planearse en di- ferentes  niveles  espaciales  que  se  integren  al  paisaje en el que se desarrollan. El Banco Mundial plantea que las SbN son un  enfoque innovador y multifacético para abordar  los desafíos urbanos, en especial en la gestión del  agua y la resiliencia frente a inundaciones, requie- ren considerar la complejidad de estos retos y una  consideración cuidadosa de las diferentes esca- las espaciales en las que pueden implementarse  efectivamente.  En  este  contexto,  la  estructura  ecológica principal permite articular las medidas  que se realizan en diferentes escalas. Las  SbN  pueden  integrarse  en  diversos  contextos,  desde  grandes  ecosistemas  hasta  intervenciones localizadas. Las escalas de inter- vención, acordes con la magnitud de los proyectos,  son: cuenca hidrográfica, ciudad y barrio.  Escala de cuenca:  la localización de un territorio dentro de una  cuenca hidrográfica influye de manera significativa en la idoneidad  de los tipos de SbN que pueden implementarse. En este marco se  generan diferencias significativas entre las áreas montañosas, las  planicies, los deltas y las zonas costeras (World Bank Group, 2021).   Escala de ciudad:  son medidas que se implementan en áreas  urbanas en el marco de la planificación del uso del suelo y  apoyan la gestión del riesgo climático. Su viabilidad y potencial de  implementación dependen de la estructura ecológica y paisajística  de la ciudad, así como de la posibilidad de atender los retos  específicos que enfrentan sus habitantes. Diversas características  afectan su aplicabilidad, como la topografía, el clima, la  hidrología, la ecología y aspectos sociales. Medidas a escala  de ciudad incluyen:  bosques urbanos, humedales artificiales y  renaturalización de quebradas (World Bank Group, 2021).  Escala de barrio:  a nivel de barrio, las SbN abordan desafíos  locales de resiliencia incluyendo intervenciones en edificios, calles  y espacios públicos abiertos. Estas medidas, por lo general de  menor escala, pueden aumentar la resiliencia al generar efectos  integrados con otras intervenciones, por ejemplo, al aumentar la  retención de aguas pluviales y reducir el efecto de islas de calor,  así como con la reducción de la contaminación del aire y el agua. La  implementación de medidas a esta escala puede aliviar la presión  sobre la infraestructura local existente y fomentar la colaboración  entre actores públicos y privados, propietarios y comunidades.  Entre los ejemplos se incluyen techos verdes, fachadas verdes y  agricultura urbana (World Bank Group, 2021). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  41 \n    Una  experiencia  destacada  de  planeación  multiescala  es el Programa  Aguas  Activas,  Bellas  y  Limpias  ( Acti- ve,  Beautiful,  Clean  Waters ) de Singapur, cuyo objetivo  consiste en integrar parques, embalses, vías fluviales e  instalaciones recreativas para mejorar la gestión de las  aguas pluviales y crear espacios atractivos cuyos resul- tados se evalúan a través de una alianza que incluye la  colaboración entre universidades locales y entidades de  cooperación, basada en la participación de las comunida- des locales y tecnologías digitales. (Babí Almenar  et al .,  2021; Sowińska-Świerkosz & García, 2022). Las recomendaciones de política son:     ■   Las intervenciones que se implementan en  áreas locales deben tener en cuenta en su  planeación, las características del paisaje en el  que se integran y la búsqueda de sinergias con  otras iniciativas.    ■   En el diseño de proyectos deben analizarse las  funciones, beneficios, ubicaciones óptimas y  costos de los proyectos, lo que permite a   los  implementadores y a quienes asignan recursos,  comprender el potencial de las SbN. De esta  forma, se asegura que se implementen en áreas  donde pueden ofrecer el máximo beneficio  socioambiental, acorde con las expectativas de  los habitantes locales (World Bank Group, 2021).    ■   Cada proyecto debe atender problemas  prioritarios que sean identificados con la  participación de los actores en el territorio,  dando como resultado la reducción de impactos  o la generación de beneficios específicos para  estos actores y para los ecosistemas. Alcanzar  estos objetivos es el propósito de los proyectos,  para lo cual, las actividades y productos se  deben diseñar incluyendo consideraciones  técnicas que contribuyan al logro de esos  objetivos. Como ejemplo, la restauración de  manglares para reducir la erosión costera  puede requerir densidades y patrones de  siembra diferentes a la que se enfoca solo en la  conservación de la biodiversidad (UNEP, 2022).  Large-scale NBS A Large-scale NBS A  Large-scale NBS B Large-scale NBS B  Artificial reefs Artificial reefs  Mangrave  Mangrave  forests forests  Natural inland  Natural inland  wetlands wetlands   Upland    Upland    forests forests  Sandy shares Sandy shares   River floodplains River floodplains  Large-scale NBS Large-scale NBS  Drinkig water  Drinkig water   Stormwater  Stormwater   Wastewater Wastewater  Large-scale NBS C Large-scale NBS C  Sea Sea  Canal Canal  River River  https://www.researchgate.net/figure/Illustra- tion-of-large-and-small-scale-nature-based-solu- tionsNBSs-Large-scale-NBSA_fig3_338704508 WB, 2021. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  42 \n3.3.3 Gobernanza  participativa  De acuerdo con el IPBES (2022), las transforma- ciones  exitosas  hacia  la  sostenibilidad  implican  un cambio profundo en los valores, las relaciones  humanas con la naturaleza, las estructuras econó- micas y sociales, y requieren acciones inclusivas  y contextualizadas. En este marco, la incorpora- ción  de  modelos  de  gobernanza  colaborativa  y  participación inclusiva resulta fundamental para  garantizar  la  sostenibilidad,  la  legitimidad  y  la  efectividad de los proyectos de SbN. Estos proce- sos deben involucrar de manera activa a diversos  grupos de población y organizaciones de las co- munidades locales —incluyendo mujeres, jóvenes,  campesinado, pueblos indígenas y comunidades  negras, afrocolombianas, raizales y palenqueras  (NARP), entidades públicas, empresas privadas y  academia— desde el diseño hasta la evaluación,  asegurando que las decisiones reflejen las nece- sidades y aspiraciones del territorio (Prieto, 2025). En Colombia, el marco jurídico y de planeación  contempla múltiples instrumentos para la parti- cipación  ciudadana,  como  los  cabildos  abiertos,  audiencias públicas y veedurías ciudadanas y me- canismos durante la elaboración de los Planes de  Desarrollo y POT. Sin embargo, su existencia no  garantiza una participación efectiva ni equitativa.   La    Encuesta  de  Percepción  Ciudadana  Compara- da  de  la  Red  de  Ciudades  Cómo  Vamos  (2023)    muestra que el 74 % de las personas no se vincu - lan a estos espacios,   lo que evidencia una brecha  entre la normativa y la participación.  De  acuerdo  con  la  encuesta  de   Percepción Ciudadana Compara- da  de la Red de Ciudades Cómo  Vamos de 2023, el 74 % de las  personas no se vinculan a espa- cios de participación ciudadana. Las  limitaciones  de  la  participación  también  se  deben a factores estructurales como la falta de  información y capacitación, la escasez de recur- sos, la desconfianza hacia actores externos por  experiencias previas de participación sin benefi- cios tangibles, la centralización de las decisiones  y la subrepresentación de poblaciones vulnera- bles (IPBES, 2022). Superar estas barreras implica  el  reconocimiento  del  valor  del  conocimiento  local,  el  fortalecimiento  de  los  intercambios  in- terculturales y la garantía de los derechos de los  pueblos indígenas y afrodescendientes a través  de mecanismos como la consulta previa y el con- sentimiento libre, previo e informado.  Abordar la pérdida de biodiversidad y el cam- bio  climático  requiere  estrategias  diferenciadas  que  respondan  a  las  condiciones  ecológicas,  culturales  y  socioeconómicas  locales  (IPBES,  2023).  Por  ello,  la  gobernanza  debe  incorporar,  de manera transversal, los enfoques diferencia- les, reconociendo que factores como el sexo, el  género, la etnia, la edad o la discapacidad se su- perponen y exacerban la vulnerabilidad frente al  cambio climático (MADS, 2023). Para garantizar  esta  inclusión,  cada  intervención  de  SbN  debe  partir de un diagnóstico que analice las desigual- dades existentes e integre el conocimiento local  y tradicional, en especial el de mujeres campesi- nas, indígenas y afrodescendientes, quienes son  agentes clave en la adaptación y la resiliencia so- cioecológica (FIDA, 2018; Ministerio de Ambiente   et al. , 2023), para asegurar que los proyectos con- tribuyan a la justicia ambiental y social. En el ámbito del relacionamiento institucional  es necesario fortalecer los mecanismos existentes  a nivel territorial y nacional, con el fin de asegu- rar la coherencia política y la capacidad de gestión  en  la  implementación  y  el  seguimiento  de  las  acciones con enfoque diferencial. En suma, la go- bernanza colaborativa y la participación inclusiva  son indispensables para que las SbN sean instru- mentos de transformación territorial. Un ejemplo  de esto es lo que sucede en el proyecto SolNatu- ra, que ha cooperado con los actores territoriales y  nacionales en la movilización de planes de fortale- SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  43 \ncimiento de capacidades para la implementación  de medidas SbN en los procesos de gobernanza  climática y de biodiversidad que lideran espacios  legítimos e independientes locales como: la Mesa  Departamental de cambio climático de Córdoba;  la Mesa de Bosques de Santander; y el Consejo  Departamental de cambio climático en Huila.  El modelo de gobernanza colaborativa se plan- tea como el más adecuado para los proyectos de  SbN, ya que promueve la toma de decisiones con- junta y transparente, reconociendo la diversidad  de actores e intereses. Este modelo se sustenta  en cuatro ejes principales: (1) condiciones inicia- les,  que  consideran  las  asimetrías  de  poder,  la  existencia de confianza y los incentivos para par- ticipar;  (2)  mecanismos  de  funcionamiento  que  incluyan reglas claras, mecanismos de inclusión  amplia y herramientas de resolución de conflic- tos;  (3)  liderazgo  facilitador,  capaz  de  mediar  y  equilibrar intereses; y (4) procesos colaborativos  dinámicos basados en el diálogo, la construcción  de confianza, el compromiso sostenido, el acce- so a oportunidades y la obtención de resultados  intermedios que fortalezcan la legitimidad de los  procesos (Prieto, 2025).  Igualmente,  busca  la  aplicación  de  los  si- guientes principios orientadores para garantizar  la  participación  y  la  inclusión  en  los  proyectos  de SbN: la descentralización de la toma de deci- siones,  la  representación  equitativa  de  actores,  el respeto por la diversidad y la flexibilidad para  adaptarse a los contextos locales (Prieto, 2025).  Estos se pueden incorporar en las fases del ciclo  de proyectos mediante las siguientes acciones:    ■   Diseño: asegurar la participación temprana de  comunidades interesadas en la co-creación  de soluciones que responsan a necesidades  e intereses de las comunidades locales, que  incluyan a grupos vulnerables identificados  mediante un levantamiento de datos  desagregados por sexo, género, etnia y edad, y  un mapeo de la división del trabajo, los roles, las  percepciones, y el acceso y uso a recursos y toma  de decisiones; y la construcción de mecanismos  para la distribución equitativa de beneficios.     ■   Implementación: establecer canales de  comunicación abierta, generar espacios de  participación de las comunidades con enfoque  diferencial, tener mecanismos claros de toma  de decisiones y resolución de conflictos,  reportes de avances con información  desagregada y fortalecer las capacidades  locales. Esto último dirigido articular el  conocimiento técnico con sus habilidades,  sus prácticas, su entorno y su conocimiento  tradicional. Adicionalmente, contar con  equipos con capacidad técnica en inclusión,  y asignar recursos para implementar para la  participación de grupos de mujeres, indígenas  y NARP.    ■   Evaluación: promover mecanismos  participativos de evaluación, tener espacios  para compartir la rendición de cuentas y recibir  retroalimentación, generar reflexión colectiva  y evaluar los resultados de la distribución de  beneficios. Asegurarse de tener, monitorear  y evaluar indicadores que midan si los  resultados contribuyen al cierre de brechas y a  la reducción de la vulnerabilidad diferenciada  (Ministerio de Ambiente  et al. , 2023). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  44 \n3.3.4 Monitoreo,  evaluación biofísica y  análisis costo-beneficio y  costo-efectividad  Un aspecto fundamental para que el creciente in- terés en las SbN se materialice en la asignación  de recursos para la implementación de proyectos  es la identificación, cuantificación y comunicación  de  los  beneficios  concretos  que  estas  generan.  Algunos de estos beneficios pueden expresarse  en  términos  monetarios,  otros  pueden  medirse  mediante indicadores cuantitativos, mientras que  los servicios ecosistémicos culturales o espiritua- les suelen reconocerse a través de evaluaciones  cualitativas. Identificar estos beneficios es posible  cuando se dispone de un sistema de monitoreo ro- busto o se aplica una metodología de evaluación  biofísica adecuada a la disponibilidad y calidad de  la información. No obstante, ello implica un desafío para los  proyectos  que  usualmente  no  incluyen  recursos  suficientes  para  realizar  el  seguimiento  y  moni- toreo de sus resultados e impactos, más allá de  los  productos  que  generan.  Destinar  recursos  a  estas  actividades  brinda  una  oportunidad  para  que los financiadores aumenten su confianza para  apoyar fases posteriores de los proyectos, lo que  contribuye a su sostenibilidad; igualmente, el se- guimiento a cambios de intervenciones articuladas  en un mismo paisaje o cuenca hidrográfica puede  ser llevado a cabo por entidades departamentales  o autoridades ambientales, atendiendo a que sus  áreas de jurisdicción son supramunicipales.  Así mismo, puede buscarse el trabajo conjun- to con universidades regionales para desarrollar  sistemas  de  información  y  modelación  para  el  monitoreo y estimación de los beneficios que in- tegren  herramientas  técnicas  y  basadas  en  la  participación, tales como mediciones directas en  campo,  uso  de  imágenes  de  sensores  remotos,  ejercicios  de  modelación,  ecuaciones  empíricas,  índices derivados de datos ambientales, encues- tas de percepción y monitoreo comunitario, cuyos  resultados permiten estimar el impacto biofísico  de las SbN sobre variables de interés específicas  y constituyen la base para realizar, evaluaciones  costo-beneficio. Para esto, también es necesario  fortalecer las capacidades técnicas de los equipos  municipales,  departamentales  y  de  autoridades  ambientales y fomentar alianzas con universida- des  y  centros  de  investigación  para  desarrollar  proyectos orientados a la generación de evidencia  y conocimiento aplicado. Para  tener  una  mejor  comprensión  sobre  la  conveniencia de financiar proyectos de SbN, al- gunos  proyectos  realizan  valoración  económica  para lo que requieren contar con información de  referencia sobre sus costos y beneficios. Esto im- plica no solo conocer los diferentes costos de las  actividades requeridas en cada una de sus fases  de  implementación,  incluido  el  mantenimiento,  sino también establecer cuáles son los beneficios  sociales, económicos y ambientales, lo cual está  relacionado de forma directa con la provisión de  los servicios ecosistémicos involucrados. Al reali- zar este tipo de análisis económico a los proyectos,  se busca entender el alcance, sus fortalezas y li- mitaciones, considerando que las necesidades de  los territorios pueden llegar a ser ilimitadas y los  recursos con los que se cuenta usualmente son  escasos y condicionados. Las aproximaciones más utilizadas se enmar- can en el enfoque de  Valor Económico Tota l, que  asigna valores monetarios a los servicios ecosis- témicos, incluidos aquellos que no tienen mercado  formal (Maldonado & Sánchez, 2016; Stroud  et al. ,  2022). Sin embargo, de acuerdo con la clasifica- ción de IPBES (2022), las metodologías aplicables  a SbN se agrupan en cuatro categorías principa- les: (1) métodos basados en comportamiento, que  estiman valores a partir de precios de mercado o  productividad; (2) métodos basados en declara- ciones, que recogen percepciones y disposición a  pagar por mejoras ambientales; (3) enfoques de  síntesis de datos, que integran evidencia de dife- rentes fuentes para estimar beneficios en ausencia  de  información  local;  y  (4)  modelos  integrados,  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  45 \nque combinan variables biofísicas y económicas  mediante  herramientas  computacionales  como  i-Tree, InVEST o B£ST (Luo  et al ., 2021; Maldona- do  et al ., 2020; McPherson  et al ., 2011).  La aplicación práctica de estas metodologías  enfrenta retos significativos que dificultan su im- plementación efectiva, sobre todo por la falta de  información confiable, la ausencia de capacidades  locales para ejecutar evaluaciones económicas y  la dependencia de modelos calibrados para otros  contextos (Chelli  et  al ., 2025; Sahay, 2025; Wild   et al ., 2024).  Como  recomendaciones  para  realizar  cuan- tificación  de  beneficios  y  valoración  económica  para proyectos que no solo analicen la eficiencia  económica, sino que también sean socialmente in- clusivos y ambientalmente sostenibles, se tienen:     ■   Priorizar los servicios ecosistémicos y   beneficios más relevantes del proyecto:  la   priorización de los servicios ecosistémicos  debe dirigirse a los que tienen un mayor  impacto en el bienestar de las comunidades  locales y el ambiente. Esto debe basarse en un  análisis detallado de los beneficios directos e  indirectos que el proyecto aportará, teniendo  en cuenta las prioridades sociales, económicas  y ambientales.     ■   Utilizar varias técnicas y metodologías para  complementar los análisis:  durante el proceso  de evaluación de beneficios de los proyectos  de SbN, es necesario que se seleccionen  técnicas y metodologías de evaluación biofísica  y económica que se encuentren acordes con la  escala y calidad de la información disponible.  En este sentido, se incentiva a los gobiernos  locales a explorar la variedad de metodologías  de evaluación biofísica existentes como los  sistemas de monitoreo, el uso de herramientas  computacionales, el uso de ecuaciones  empíricas o la aproximación por índices. En  cuanto al análisis costo beneficio, cada vez  más se emplea la combinación de diferentes  enfoques (cuantitativos y cualitativos), los  cuales pueden proporcionar una imagen más  amplia de dichos beneficios. Esto considerando  que en muchas ocasiones no se cuenta con  la totalidad de datos o información para  enfocarse en una sola metodología y se debe  recurrir a otras opciones que permitan tener un  análisis más completo e integral.     ■   Aplicar metodologías de valoración  económica adaptadas al contexto local:    al seleccionar la metodología de valoración  económica, es esencial elegir métodos  adecuados para cada contexto local. Se  pueden utilizar enfoques basados en  preferencias reveladas, como el método de  costos de viaje, o en preferencias declaradas,  como los experimentos de elección. Es  importante establecer qué datos están  disponibles y son confiables con el fin de  garantizar una valoración acertada de los  beneficios y de los costos socioambientales.  3.3.5 Contribuciones a la  resiliencia urbana  La  planeación  de  proyectos  en  áreas  urbanas  requiere considerar diferencias entre estas y las  zonas rurales, en especial el rápido crecimiento  de la población, la alta densidad poblacional, la  infraestructura construida y la limitada disponibi- lidad de espacio obligan a diseñar intervenciones  para entornos altamente modificados, en los que  se priorice la gestión del agua, la reducción de  islas  de  calor  y  la  creación  de  espacios  verdes  multifuncionales. Estas  características  son  especialmente  crí- ticas  en  las  ciudades  del  Sur  Global,  donde  el  crecimiento urbano ocurre en contextos de pla- nificación  insuficiente,  transformación  acelerada  del suelo periurbano y limitada capacidad institu- cional (Escobedo  et  al. , 2021). Esta tendencia ha  generado un aumento sostenido de la densidad  poblacional, mayores presiones sobre la infraes- tructura  urbana  y  los  servicios  públicos  y  una  mayor exposición a eventos climáticos extremos  (IPCC, 2022; Nguyen  et  al. , 2023). En Colombia,  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  46 \ndonde el 76 % de la población habita en áreas  urbanizadas concentradas sobre todo en las re- giones Andina y Caribe (DANE, 2023) la densidad  poblacional ha aumentado de forma significativa  en los últimos años. En ciudades como Bogotá,  por ejemplo, la densidad pasó de 158,9 a 192,3  habitantes por hectárea entre 2000 y 2024, lo que  representa un incremento del 21 % (Bogotá, s. f.) Frente a este panorama, se hace evidente la  urgencia  de  fortalecer  las  capacidades  institu- cionales y técnicas para abordar las tendencias  regionales derivadas de la urbanización acelerada,  la desigualdad y la vulnerabilidad climática. Adi- cionalmente, resulta prioritario integrar líneas de  acción sobre SbN en los instrumentos de planifi- cación territorial, considerando que su efectividad  aún no ha sido incorporada de manera sistemática  en los POT ni en los planes parciales. Dicha omi- sión incrementa la vulnerabilidad estructural en  un entorno marcado por la expansión urbana in- formal, que amplifica la exposición y sensibilidad  de la población frente a los impactos climáticos.  Por otra parte, se evidencia que existe una au- sencia de respaldo institucional y normativo que  limita la integración de las SbN para la consolida- ción de entornos urbanos resilientes, sostenibles  y  adaptados  a  los  retos  del  cambio  climático.  Superar esta brecha permitiría impulsar su imple- mentación efectiva en escalas locales —como el  barrio o el proyecto urbano—, donde su adopción  puede generar impactos directos y medibles en la  resiliencia climática y la calidad ambiental urbana. Teniendo en cuenta lo anterior, se busca con- solidar mecanismos para fortalecer la resiliencia  urbana, mediante las siguientes orientaciones:    ■   Identificar y priorizar zonas críticas o   estratégicas destinadas a la implementación  de SbN.  Estas áreas pueden definirse tanto  por la presencia de impactos ambientales,  altos niveles de contaminación o degradación,  como por condiciones estructurales asociadas  a la informalidad urbana, que incrementan la  exposición y el riesgo de la población frente a  los efectos del cambio climático.    ■   Promover la integración del concepto SbN    desde las políticas nacionales hasta los  instrumentos de planificación territorial y  urbana, con el fin de promover la inclusión  sistemática de alternativas basadas en la  naturaleza en la actualización de los POT,  los planes parciales y la formulación de  proyectos urbanos. Esta integración facilitará  una planificación más adaptativa, coherente y  resiliente frente a los desafíos ambientales y  sociales.    ■   Incentivar la cuantificación de los beneficios   asociados a la implementación de SbN ,  en particular en aspectos como la reducción  de escorrentía urbana, el incremento en la  infiltración del suelo, la reducción de material  particulado y la regulación térmica que han  sido reconocidos como beneficios centrales  en zonas urbanas. Igualmente, se destaca  la importancia de considerar las SbN como  medidas complementarias a los sistemas de  reúso, recirculación y autogestión del agua  lluvia, promoviendo el desarrollo urbano  sensible al agua.    ■   Fomentar la formulación de proyectos  que incorporen estrategias de ciencia  participativa , fortaleciendo el involucramiento  ciudadano en el monitoreo, seguimiento y  evaluación de la implementación de SbN. En  este sentido, resulta prioritario diversificar  las capacidades de los equipos de trabajo  y fomentar el trabajo interdisciplinario,  que permita la articulación directa entre la  ciudadanía, la academia, el sector público y  privado. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  47 \nLas líneas estratégicas buscan orientar la acción pública y priva- da hacia la conservación y el uso sostenible de los ecosistemas,  mediante inversiones estructuradas que contribuyan a consolidar  un contexto favorable para enfrentar los desafíos climáticos, am- bientales y sociales. Estas líneas ofrecen un marco coherente para  integrar las SbN en la planificación sectorial y territorial que facili- te y permita escalar su implementación en los territorios: incluyen  acciones para consolidar el entorno propicio, así como marcos de  acción de los sectores de gobierno y económicos que tienen de- pendencia directa de los recursos naturales o que se ven afectados  por riesgos climáticos, para los cuales, las SbN tienen el potencial  de generar beneficios.  LÍNEAS  ESTRATÉGICAS  04 SbN   Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  48 \n4.1  Las acciones indicativas que se presentan en el   Anexo  1  han sido elaboradas con entidades pú- blicas  y  privadas,  con  roles  y  con  el  interés  de  promover la implementación de proyectos. Están   Consolidación del entorno  propicio  Las entidades nacionales competentes desarrolla- rán acciones para fortalecer el marco habilitante  que facilite la implementación de proyectos de SbN,  dirigidas a su inclusión en los principales instru- mentos de política y normativos sobre los desafíos  abordados  por  estas  intervenciones,  así  como  a  orientar  la  implementación  de  instrumentos  ya  adoptados, promover la articulación entre los ni- veles territoriales, la generación de herramientas  de información para consolidar experiencias ya im- plementadas y otras que puedan ser utilizadas ya  sea en la formulación de nuevos proyectos, como  gestión para movilizar el financiamiento y posicio- namiento para escalar su implementación.   4.1.1 Inclusión en  instrumentos de política y  normativos  La inclusión de las SbN en instrumentos normati- vos y de política ha permitido su implementación  como una respuesta a problemas apremiantes de  la sociedad, principalmente frente al desafío de la  pérdida  de  biodiversidad.  Para  impulsar  la  conti- nuidad de la implementación y el escalamiento de  proyectos se requiere de un mayor respaldo. Para  esto, se buscará incluir las recomendaciones para  la implementación estructurada de SbN en nuevos  instrumentos normativos de política, así como el de- sarrollo de herramientas que faciliten su inclusión  en la planeación territorial como parte de la NDC  3.0 y se acompañará el desarrollo de acciones para  promoverlas en el marco de la  Política Nacional del   Agua  y de la  Ley de ciudades verdes y resilientes .   4.1.2 Herramientas  de información para  facilitar el diseño e  implementación de  proyectos  Para facilitar la formulación de proyectos de di- versas  escalas,  pero  principalmente  aquellos  formulados por entidades locales, se dispondrán  en la página web insumos para facilitar el diag- nóstico  de  los  proyectos,  lecciones  aprendidas  de proyectos implementados y herramientas que  faciliten la identificación de medidas y los indica- dores para hacer seguimiento a sus beneficios. En  este marco, la plataforma incluirá en su primera  fase un portafolio que consolide las experiencias  y  lecciones  de  proyectos  implementados,  una  herramienta para apoyar la toma de decisiones  por  parte  de  entidades  territoriales  y  autorida- des ambientales para identificar el potencial de  implementación de tipos de SbN que respondan  a los desafíos diferenciados de los territorios, un  catálogo de medidas estructurado para abordar  problemas específicos y un sistema de indicado- res que faciliten la identificación y seguimiento de  los beneficios que generan. dirigidas a dinamizar y escalar esta implementa- ción  de  manera  que  contribuyan  a  aumentar  la  resiliencia de los territorios donde se desarrollen. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  49 \n4.2  4.1.3  Posicionamiento y  visibilización  Para promover el escalamiento de la implemen- tación de SbN se continuará con la socialización  del  contenido  de  la  estrategia  y  de  las  herra- mientas técnicas que se generarán, a través de  eventos y publicaciones dirigidos sobre todo a  los  gobiernos  departamentales,  municipales  y  a las autoridades ambientales, así como con el  posicionamiento  del  concepto,  los  tipos  de  in- tervenciones  y  sus  beneficios.  De  igual  forma,  se  impulsará  la  articulación  con  universidades  y centros de investigación para promover la di- vulgación  de  los  resultados  de  proyectos  de  investigación  hacia  diversos  públicos  locales  y  tomadores de decisión que contribuyan a incor- porar los hallazgos científicos en la formulación  de proyectos y de políticas públicas.  Reducción de las presiones  sobre las áreas protegidas  Las medidas orientadas a preservar los ecosis- temas  existentes  deben  priorizarse,  dado  que  resultan más eficaces para mantener sus servicios  ecosistémicos, frente a las medidas de restaura- ción. Esto, sin desconocer la importancia de las  acciones de recuperación de las coberturas na- turales  y  de  creación  de  ecosistemas  en  zonas  altamente alterados.  En Colombia, la suma de las áreas protegidas  alcanza un total de 50.039.619 hectáreas, lo que  representa un 34 % del territorio nacional, con- tinental y marino. De acuerdo con la información  del Registro Único Nacional de Áreas Protegidas  (RUNAP), con corte de información a diciembre de  2025, existen 1.824 áreas protegidas registradas,  de las cuales 1.373 son Reservas Naturales de la  Sociedad Civil (RNSC), 157 Reservas Forestales  Protectoras,  136  Distritos  de  Manejo  Integrado  y 44 Parques Naturales Nacionales (PNN), entre  otras.  Esta  precisión  es  relevante  pues,  excep- tuando  los  PNN,  son  figuras  de  protección  que  permiten  diversos  usos,  abriendo  espacio  a  la  implementación de un abanico amplio de medi- das de SbN que complementan la declaración de  áreas protegidas.  Por ejemplo, los usos permitidos en las reser- vas  naturales  de  la  sociedad  civil  son  bastante  flexibles, ya que promueven la armonización del  uso sostenible - como sistemas silvopastoriles y  agroforestales -, con medidas de recuperación y  de conservación. Asimismo, los distritos de ma- nejo integrado y los de conservación de suelos  habilitan  la  implementación  de  medidas  de  las  diferentes tipologías. En cambio, los Parques Na- turales Nacionales y Regionales limitan los tipos  de medidas a implementar, aunque esto depende  de la vocación y el objetivo de conservación de las  áreas: mientras que en algunos está habilitada la  implementación de medidas como el turismo de  naturaleza,  hay  Parques  únicamente  enfocados  en la conservación de la biodiversidad que restrin- gen otros tipos de actividades.   Los usos permitidos en varias de las  figuras  de  protección  de  los  ecosis- temas  naturales  en  Colombia  son  flexibles ya que permiten implementar  diferentes  medidas  de  SbN  además  de la conservación tradicional. La deforestación es un fenómeno que sobrepasa  los límites de las figuras de protección; por ejem- plo, el 62, 5% de la deforestación en la Amazonía  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  50 \nocurre  en  áreas  protegidas.  Este  fenómeno  es  impulsado por actividades tanto lícitas como ilíci- tas, dentro de las cuales están la ampliación de la  frontera agropecuaria, colonización, construcción  de  infraestructura,  cultivos  de  uso  ilícito,  entre  otras (Fundación para la Conservación y el Desa- rrollo Sostenible, 2023). Las  áreas  con  función  amortiguadora  de  las  áreas  protegidas,  también  llamadas  zonas  de  amortiguación  tienen  un  rol  fundamental  para  evitar que se expandan los procesos de alteración  dentro de las áreas protegidas. Estas zonas no son  figuras de protección, sino que pueden incluirse  en los POT como parte de la estructura ecológica  principal (EEP). Su delimitación es un proceso fun- damental y colaborativo, cuyo objetivo principal es  prevenir, mitigar y corregir las perturbaciones que  afectan al área protegida, armonizar la ocupación  y transformación del territorio con los objetivos de  conservación, y aportar a la conservación de los  elementos biofísicos, valores culturales, servicios  ambientales y procesos ecológicos que conectan  el área protegida con ecosistemas regionales (Par- que Nacionales Naturales de Colombia, 2008).  La delimitación se sustenta en análisis técnicos,  aunque el resultado final es un ejercicio mediado  por la negociación entre los múltiples actores invo- lucrados, como PNN, las Corporaciones Autónomas  Regionales (CAR), las entidades territoriales, comu- nidades étnicas y otros grupos sociales. Además,  tiene un componente adaptativo, pues los límites y  la zonificación que sustenta las medidas de manejo  son revisados periódicamente para ajustarse a las  dinámicas ecológicas y a las prácticas de uso del  territorio por parte de las comunidades locales.  La implementación de SbN en zonas de amor- tiguación  es  crucial  para  garantizar  los  medios  de vida de los habitantes locales, lo que a su vez  contribuye a reducir las presiones sobre las áreas  protegidas. Esta aproximación está alineada con la  promoción de los  Negocios  Verdes  que, en estas  zonas, pueden incluir la economía forestal, la bioe- conomía y la agroecología, ofreciendo alternativas  económicas concretas para reducir la presión de la  deforestación (Banco Interamericano de Desarro-  llo  et al. , 2022). El Plan de Acción de Biodiversidad  (MADS, 2024) tiene la meta de crear 522.000 em- pleos verdes inclusivos a 2030, mediante modelos  de economía de la biodiversidad.   Algunos de ellos  pueden ser ocupados por cuidadores de los eco- sistemas estratégicos, en línea con la Estrategia de  Negocios Verdes Sostenibles de PNN.  Los proyectos de SbN tienen, además, el po- tencial de promover la conectividad ecológica, por  ejemplo, entre áreas protegidas y otras áreas de  conservación, o con zonas periurbanas y urbanas,  lo que facilita que estos contextos mantengan o  recuperen los procesos ecológicos que soportan  su funcionamiento. Esto puede realizarse con la  conformación  de  corredores  ecológicos  estra- tégicos  que  unan  y  mantengan  las  conexiones  ecológicas indispensables para el flujo de mate- ria y energía, asegurando la gestión integral de la  biodiversidad y el mantenimiento de las contribu- ciones de la naturaleza en el ámbito regional. El  turismo  de  naturaleza  es una oportunidad  para reducir las presiones sobre las áreas prote- gidas, al promover una actividad económica que  incentiva  a  los  propietarios  desarrollar  accio- nes de conservación. Colombia está posicionada  favorablemente para incentivar el  turismo de na- turaleza   a  nivel  mundial  por  su  rica  diversidad  biológica y geográfica, lo que genera una variedad  de ecosistemas y paisajes (Ministerio de Comercio,  Industria y Turismo – MinCIT, 2013; MinAmbiente,  2022), esto se refleja en el aumento de visitantes  no residentes en los últimos años; por ejemplo,  en  2024  llegaron  al  país  6.696.835  visitantes,  que superan en 8,5 % a los visitantes de 2023  (MinCIT, 21 de enero de 2025). Por su parte, el   Plan Sectorial de Turismo 2022-2026 “Turismo en   Armonía con la Vida” , establece metas aún más  ambiciosas,  buscando  entre  7,3  millones  y  12  millones de visitantes no residentes para 2026, y la  creación de 300.000 nuevos empleos con los que  se  incentiven  prácticas  sostenibles  enmarcadas  en el turismo regenerativo e inclusivo que busca  armonizar el desarrollo económico y social de las  comunidades anfitrionas con la protección de la  naturaleza y sus ecosistemas (MinCIT, 2023). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  51 \n4.3  Reconociendo la interdisciplinariedad y la necesi- dad de colaboración entre las diferentes entidades  nacionales, el MinCIT como parte de su Plan Sec- torial  busca  fortalecer  la  infraestructura  de  los  PNN de Colombia y apoyar programas de turismo  incluyente en estas áreas, así como impulsar una  estrategia de turismo de naturaleza para áreas pro- tegidas afectadas por la deforestación, en la que se  resalte el valor de los bosques como escenarios tu- rísticos basados en la biodiversidad (MinCIT, 2023),  todo esto, siguiendo los lineamientos para la pla- nificación y gestión del turismo de naturaleza en  áreas protegidas elaborados por PNN (2022). En síntesis, los atractivos naturales son el núcleo  del potencial turístico de Colombia, y las políticas  actuales  buscan  un  desarrollo  sostenible  y  re- generativo que aumente el número de visitantes  e ingresos y que también beneficie a las comu- nidades locales, contribuya a la paz y proteja la  biodiversidad. En este marco, las SbN juegan un  rol importante dentro del quehacer del Ministerio  y otros actores del sector turístico para materia- lizar estos propósitos con el apoyo a iniciativas  de preservación, recuperación y uso sostenible de  los ecosistemas.   Aumento de la resiliencia en el sector  de agua potable y saneamiento básico  El Viceministerio de Agua y Saneamiento Básico  se  encarga  de  articular  las  políticas  sectoriales  con  las  políticas  de  MinAmbiente,  en  especial  las relacionadas con el cambio climático, gestión  integral del recurso hídrico y economía circular,  mediante la formulación de políticas, estrategias,  programas y planes sectoriales.  El sector ha tenido logros significativos en las  últimas décadas representados en la alta cober- tura del servicio de acueducto en zonas urbanas,  aunque persisten brechas en las zonas rurales y en  algunas regiones del país. Según la Encuesta de  Calidad de Vida (ECV) 2024, el 90,2 % de la pobla- ción nacional tiene acceso soluciones adecuadas  de acceso a agua. En las cabeceras municipales,  el acceso se eleva al 98,1 %, mientras que en los  centros poblados y zonas rurales dispersas este  valor es de 64,3 % (DANE, 2025). Los departa- mentos  que  enfrentan  los  mayores  desafíos  en  cuanto al acceso al servicio de acueducto son San  Andrés y Providencia, Guainía, Chocó, Amazonas  y Putumayo, ya que su cobertura de agua urbana  es inferior al 80 %. Asimismo, según cálculos rea- lizados por MinVivienda a partir de la misma ECV,  los departamentos de Vaupés, Vichada, Guainía,  Amazonas, Chocó, La Guajira, Norte de Santander  y Guaviare presentan una cobertura de acueducto  en zonas rurales inferior al 70 %.  Por otro lado, en 2021, el 88,1 % de la población  contaba con acceso al saneamiento, de los cuales el  91,9 % son población urbana y el 76 % habitantes  de zonas rurales. En este aspecto, se destacan las  brechas regionales, como en los departamentos de  Vichada, La Guajira, Vaupés, Guainía y Chocó que tie- nen coberturas rurales de alcantarillado inferiores al  50 %. Otro desafío importante sigue siendo la baja  cobertura del tratamiento de las aguas residuales,  hecho  que  produce  contaminación  en  los  ecosis- temas acuáticos y efectos negativos para la salud  pública. Solo el 53,12 % de las aguas residuales ur- banas generadas en el país reciben un tratamiento  adecuado, aunque se han trazado metas ambiciosas  del 68,6 % para el año 2030 y el 80 % para 2050  (Ministerio de Vivienda, Ciudad y Territorio, 2023). Para fortalecer la gestión comunitaria del agua  y el saneamiento básico, que beneficia con el abas- tecimiento a más de nueve millones de personas,  MinVivienda expidió el Decreto 960 del 2025, que  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  52 \nreconoce  este  modelo  de  gestión  en  el  que  se  concibe el agua como bien común y en el que las  comunidades se organizan y contribuyen a garan- tizar el derecho, mediante procesos participativos,  democráticos y de autogestión, así como a prote- ger las fuentes de las que se abastecen. En este  marco y con el fin de fortalecer a las comunida- des organizadas alrededor del agua, se encuentra  oportuno habilitar la formulación y ejecución de  sus propios proyectos, y que se beneficien de la  formación, acompañamiento, asistencia técnica e  intercambio de saberes provistos por el Ministerio  (Ministerio de Vivienda, Ciudad y Territorio, 2025).  Uno de los elementos que incrementan la vul- nerabilidad  de  abastecimiento  de  agua  se  asocia  a  la  dependencia  de  fuentes  superficiales  (ríos  y  quebradas), susceptibles a las altas variaciones de  sus caudales por las temporadas seca y de lluvia,  lo que se suma a la insuficiencia en las estructu- ras  de  almacenamiento.  El  ENA  2022  incluyó  un  análisis diferenciado de municipios susceptibles al  desabastecimiento por temporada seca y de lluvias,  encontrando que en el periodo de análisis de 2017- 2021,  los  municipios  susceptibles  en  temporada  seca son 207, la mayoría de los cuales se ubican en  Bolívar, Cundinamarca y Córdoba; y 254 municipios  susceptibles en temporada de lluvias, la mayoría  ubicados en Antioquia, Cauca y Huila (IDEAM, 2022). El  seguimiento  realizado  por  MinVivienda  a  los  reportes  de  emergencias  sectoriales  en  el  país identifica que el desabastecimiento de agua  y la afectación el saneamiento se genera —con  más del 75 % de las emergencias reportadas—  en  las  temporadas  de  lluvias  por  eventos  de  inundaciones,  movimientos  en  masa  y  avenidas  torrenciales. Estos eventos, sumados a la sequía,  son  los  que  han  provocado  mayores  impactos  sobre la infraestructura y prestación de los servi- cios de acueducto, alcantarillado y aseo, como se  muestra en la siguiente figura.  Figura  5.  Reportes de emergencias por tipo de evento Fuente: MinVivienda, 2024.  Inundación Movimiento de masa Sequía Avenidas torrenciales Climatológico Incendio forestal Contaminación Incendio estructural Colapso infraestructura Sismo Accidente tecnológico Huracán  Otros  0   200   400   600   800   1000   1200   1400     1600  1478  898  716  407  197  108  50 30 23 12 11 10 5 SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  53 \nAunque se ha registrado una amplia variedad de  eventos, resalta la predominancia de aquellos re- lacionados con eventos climáticos y su aumento en  el tiempo, como se puede observar en la figura 6.  Figura 6.  Reportes de emergencias en el periodo 1998 - 2024 Fuente: MinVivienda, 2024. 1998 600 500 400 300 200 100 0 1999 2000 2001 2002 2003 2004 2005 2006 2007 2008 2009 2010 2011 2012 2013 2014 2015 2016 2017 2018 2019 2020 2021 2022 2023 2024  Tanto en condiciones de déficit como de exceso  de  agua  se  presentan  impactos  para  el  sector,  en  especial  sobre  la  prestación  del  servicio  de  acueducto. Estos extremos son acrecentados por  los fenómenos de variabilidad climática como El  Niño y La Niña. Durante el Niño 2023-2024, se  reportaron condiciones de racionamiento2 en 93  municipios y desabastecimiento en 283, ubicados  en 27 departamentos principalmente de la región  Central y Caribe. Por su parte, el fenómeno La Niña  2021-2023  generó  impactos  sectoriales  sobre  el 30 % de municipios del país (374 municipios),  concentrados en las regiones Pacífica, Andina y  Caribe, siendo mayormente afectadas las zonas  rurales. Un ejercicio de aproximación a los costos  de los daños asociados a estas afectaciones esti- ma que superaron los $450 mil millones de pesos  (MinVivienda, 2024).   En cuanto a las emisiones de GEI entre 1990 y  2021, los análisis se basan en el sector residuos  (que es una de las categorías establecidas por el  IPCC). Este incluye las emisiones generadas en  la disposición, tratamiento y gestión de residuos  sólidos y aguas residuales, que en Colombia cons- tituyen  el  sector  económico  de  saneamiento.  El  Inventario Nacional de Gases Efecto Invernadero   2.    El racionamiento se refiere a una disminución de la frecuencia en el suministro de agua a través del sistema de abasteci- miento, que es controlado localmente por el prestador a través de sus planes de contingencia. El desabastecimiento se  refiere a la suspensión temporal del suministro de agua por la disminución de la fuente abastecedora a causa del fenó- meno El Niño, o agravado por este.  Avenida torencial   Climatológico   Huracán Inundación   Movimiento en masa   Sequía SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  54 \nseñala que las emisiones netas de GEI del sector  de saneamiento corresponden al 6.08 % de las  emisiones históricas nacionales, lo que ubica al  sector en el cuarto puesto entre los cinco grupos  del IPCC (IDEAM  et al ., 2024). MinVivienda estableció metas para reducir la  vulnerabilidad climática3 en la prestación de los  servicios  públicos  que  contribuyan  a  fortalecer  la resiliencia en el territorio y a mitigar los ries- gos climáticos sectoriales. Entre estas metas se  encuentran las relacionadas con la protección y  conservación de cuencas abastecedoras de acue- ducto, la gestión del riesgo para la adaptación y el  tratamiento de aguas residuales. En este contexto, se identifica que el mayor  potencial para obtener beneficios para el sector  se enfoca en proyectos de SbN dirigidos hacia la  conservación de cuencas abastecedoras de acue- ducto, por su contribución a la regulación hídrica  que influye sobre los caudales extremos, tanto  altos como bajos, así como a la protección de los  suelos, con lo que se reduce el aporte de sólidos  a los cuerpos de agua. Igualmente, existen opor- tunidades para el tratamiento de agua mediante  humedales artificiales que incluso logran reducir  la concentración de contaminantes emergentes,  y la reducción de picos de escorrentía con el uso  de SUDS.  Las iniciativas que adelantará el sector bus- can  orientar  y  catalizar  la  implementación  de  SbN por parte de los prestadores de los servi- cios de acueducto y alcantarillado, en línea con el  compromiso plasmado entre las prioridades na- cionales en la NDC 3.0, en particular en el Eje 3  de  Gestión integral del recurso hídrico  y el  Eje 4  de  Gestión del riesgo para la adaptación al cam- bio climático , que se orienta a la implementación  de acciones estructurales y no estructurales en  municipios  priorizados  por  susceptibilidad  al  desabastecimiento   3.    Establecidas en la Resolución 431 de 2020 que adopta el Plan Integral de Gestión de Cambio Climático Sectorial (PIGCCS),  la Ley 2169 de 2021 y la NDC 2020. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  55 \n4.4   Construyendo  ciudades resilientes   Las  zonas  urbanas  tienen  características  par- ticulares  que  influyen  en  el  potencial  para  implementar SbN tales como la concentración de  población, infraestructura y actividad económica,  así  como  grandes  extensiones  impermeables  y  alto precio del suelo lo que propicia competencia  respecto a los posibles usos permitidos. Si bien  las ciudades son motores de desarrollo, también  generan impactos ambientales significativos que  se evidencian en las emisiones de gases de efecto  invernadero, los cambios en el uso del suelo, la  contaminación del aire y del agua, y patrones de  consumo no sostenibles (IPCC, 2021a; Nguyen  et  al ., 2023). En conjunto, estos fenómenos reducen  la capacidad de captura de carbono, aceleran la  pérdida  de  biodiversidad  y  aumentan  la  vulne- rabilidad frente a riesgos climáticos (Geng  et  al .,  2023; Sánchez-Cuervo  et al ., 2020). Los  procesos  de  urbanización  acelerada  han  provocado  una  creciente  desconexión  entre  las  ciudades  y  las  zonas  rurales  y  los  ecosistemas  que las sustentan, intensificando los problemas  ambientales  y  de  salud  pública  (Escobedo  et  al.,  2021;  Vargas    et  al .,  2023).  Estudios  recien- tes evidencian una asociación entre el ambiente  construido, en particular la densidad poblacional  y la presencia de áreas verdes con la vulnerabi- lidad  térmica  y  la  mortalidad.  Investigaciones  del proyecto SALURBAL Clima confirman que la  exposición a temperaturas no óptimas constitu- ye una amenaza creciente para la salud pública.  En un análisis de 326 ciudades de nueve países  latinoamericanos,  estimaron  que  5,75  %  de  las  muertes se atribuyen a temperaturas no óptimas,  principalmente al frío (5,09 %) y, en menor medi- da, al calor (0,67 %) (Kephart et al., 2022).  En Colombia, Borchers-Arriagada  et al . (2025)  hallaron que en el periodo 2010-2019 con datos  de escala departamental, el 2,45 % de las muer- tes están asociadas a temperaturas extremas, con  mayor impacto del calor en el corto plazo y del  frío  en  lapsos  prolongados,  destacando  riesgos  elevados en Meta, Caquetá y Huila. Estos hallaz- gos  refuerzan  el  potencial  de  las  SbN  urbanas  para transformar el entorno construido, reducir la  vulnerabilidad climática y fortalecer la resiliencia  urbana en América Latina y Colombia. En  paralelo,  la  contaminación  del  aire  con- tinúa  siendo  una  de  las  principales  amenazas  ambientales para la salud humana. La exposición  prolongada  a  contaminantes  como  el  material  particulado fino (PM2.5) y el dióxido de nitrógeno  (NO₂) se asocia con enfermedades respiratorias,  cardiovasculares y un mayor riesgo de mortalidad  prematura, con más de 370.000 muertes anuales  en América Latina vinculadas a esta causa (Gou-  veia  et al ., 2021). Este estudio, que analizó 1.425  áreas geográficas intraurbanas, evidenció niveles  altos  de  PM2.5,  especialmente  en  las  grandes  metrópolis latinoamericanas, y mostró que nive- les más bajos de PM2.5 se asocian con mayores  valores  del  Índice  de  Vegetación  de  Diferencia  Normalizada,  destacando  la  importancia  de  la  renaturalización urbana para reducir la contami- nación atmosférica.  Sin embargo, las políticas de planificación de- ben no solo promover la expansión del verdor  urbano, sino también garantizar una distribución  equitativa y mecanismos de monitoreo que eviten  la profundización de las brechas socioeconómi- cas existentes en el contexto latinoamericano. El  estudio de Ju  et  al . (2021), también en el marco  del proyecto SALURBAL, reveló que las ciudades  latinoamericanas  con  mayor  PIB  están  rever- deciendo más rápido, aunque partieron de una  menor cobertura verde que las ciudades menos  favorecidas. En contraste, las ciudades con me- nor  PIB  disponían  originalmente  de  más  áreas  verdes, pero muestran un ritmo más lento de re- verdecimiento.  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  56 \nAún frente a estas dificultades, las SbN se han  posicionado  como  intervenciones  clave  para  promover  el  desarrollo  urbano  sostenible,  prin- cipalmente a través de cuatro tipos de servicios  ecosistémicos vinculados de forma profunda con  la resiliencia climática urbana (ver mayor detalle   en el  Anexo 2 ):  Regulación hídrica urbana:    depende de condiciones  biofísicas locales como  temperatura, precipitación,  cobertura vegetal y  características del suelo,  que influyen en procesos  ecológicos clave. La selección  del tipo de SbN se orienta  según los procesos que  se busque fortalecer,  desde la infiltración y  retención del agua en  SUDS hasta la intercepción  y evapotranspiración  promovidas por la  arborización y los bosques  urbanos (Babí Almenar  et al .,  2021).  Purificación del agua:  busca   optimizar las interacciones  suelo-planta y procesos  biofísicos como la nitrificación,  la absorción de nutrientes y la  sedimentación. Su efectividad  depende de la composición  vegetal, la permeabilidad  del suelo y la presencia  de microorganismos que  determinan la capacidad de  remoción de contaminantes  (Babí Almenar  et al. , 2021).  Mejora de la calidad del  aire:  facilita procesos  naturales de depuración  atmosférica, como la  deposición seca, la absorción  vegetal y la captación de  carbono, cuya eficiencia  depende de la cobertura  arbórea, la selección de  especies y factores abióticos  como la temperatura, el  viento y la precipitación (Babí  Almenar  et al. , 2021).  Regulación climática:    promueve procesos como  la evapotranspiración y el  aislamiento térmico, que  mitigan el efecto de isla de  calor urbana. Su efectividad  está determinada por  la morfología urbana, la  densidad y disposición de la  vegetación (Babí Almenar  et  al ., 2021). SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  57 \nEn Colombia, la incorporación de SbN en la pla- nificación urbana ha avanzado de forma gradual  y  de  manera  diferenciada  entre  ciudades,  con  Bogotá  como  principal  referente  institucional  y  normativo.  Esta  ciudad  ha  desarrollado  ins- trumentos  como  los    manuales  de  arborización   y  techos  verdes ,  la    Política  de  ecourbanismo   y  construcción  sostenible ,  y  la  Norma  Técnica  NS-166 de la Empresa de Acueducto y Alcanta- rillado de Bogotá (2018) para el diseño de SUDS.  Asimismo, su inclusión en el POT vigente (Decre- to 555 de 2021) consolidó las SbN como parte  estructural de su modelo de ocupación. Esto ha  permitido el desarrollo de numerosos proyectos,  en particular sobre manejo del espacio público  y de la escorrentía urbana en el largo plazo. Pa- ralelamente, otras ciudades han fortalecido sus  propios  marcos  de  ordenamiento:  Medellín  las  integró en el Plan de Desarrollo 2024-2027 y en  su Plan de Acción Climática; Cali incorporó linea- mientos de gestión ecosistémica en la revisión  del POT y actualizó la regulación hídrica urbana  mediante la Norma Técnica de EMCALI. En materia de implementación, entre los años  2010 y 2025 se han identificado 125 proyectos  urbanos de SbN asociados al manejo del recurso  hídrico en Bogotá (RedSUDS, 2025). Otros focos  de intervención se encuentran en Medellín, Cali,  Barranquilla y Montería, aunque también se re- gistran avances en otras ciudades. Entre los casos  emblemáticos que han superado los periodos de  los gobiernos locales se destacan el  Plan de Re-  naturalización de Medellín , que incluyó la siembra  de más de 106.700 árboles para mejorar la cali- dad del aire, fortalecer la conectividad ecológica  y regular la temperatura, y la  Restauración  de  la    ronda hídrica del río Sinú , en Montería, orientada a  revitalizar su uso recreativo y navegabilidad. Estos  ejemplos reflejan un compromiso creciente de los  gobiernos locales con la integración de la recupe- ración de ecosistemas en la planificación urbana. Ante este panorama, avanzar hacia un modelo  urbano más eficiente, sensible al agua y resiliente  al cambio climático, requiere fortalecer la inclu- sión de SbN que promuevan la recuperación de la  infraestructura verde y azul en los instrumentos  de planificación territorial, con especial énfasis en  los planes parciales, para garantizar su incorpo- ración sistemática en procesos de ordenamiento  y renovación urbana. Asimismo, es fundamental  mejorar la coordinación entre las entidades res- ponsables del alcantarillado pluvial y del espacio  público en cada ciudad, con el fin de consolidar  las  SbN  como  sistemas  complementarios  para  el manejo de la escorrentía urbana y su eventual  reutilización, reduciendo la presión sobre los sis- temas convencionales de drenaje. También resulta prioritario fortalecer las ca- pacidades técnicas, operativas e institucionales  de los gobiernos locales para su planificación e  implementación  efectiva,  con  énfasis  en  aque- llas que se adapten a las condiciones específicas  del entorno urbano y que puedan integrarse de  forma coherente en los instrumentos de planifi- cación territorial.  Las  acciones  indicativas  propuestas  en  el   Anexo 1  serán desarrolladas por entidades con ju- risdicción en Bogotá; sin embargo, sus resultados  serán divulgados para que sirvan como referencia  a otros territorios del país. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  58 \n4.5   Reducción del riesgo de desastres  y por cambio climático en la  infraestructura de transporte   Un  referente  del  sector  para  prevenir  y  ma- nejar  los  conflictos  entre  la  infraestructura  de  transporte y la conservación  in  situ  de la biodi- versidad  y  sus  servicios  ecosistémicos  son  los   Lineamientos  de  Infraestructura  Verde  Vial  para   Colombia  (LIVV), elaborados en el marco de la  Agenda Interministerial suscrita en 2020 entre el  MinAmbiente y el Ministerio de Transporte (Min- Transporte),  a  partir  del  conocimiento  técnico  sobre los impactos de la infraestructura vial y las  oportunidades que estos representan para el de- sarrollo sostenible desarrollado por la Fundación  para la Conservación y el Desarrollo Sostenible  (FCDS) y el WWF-Colombia.  Estos lineamientos orientan la estructuración  de  planes,  programas  y  proyectos  de  infraes- tructura  vial,  para  que,  desde  las  etapas  más  tempranas de planificación, se consideren aspec- tos ambientales, sociales, técnicos, financieros y  de gobernanza, y se incorporen medidas de ubi- cación, trazado, diseño, ingeniería y manejo que  garanticen un beneficio ambiental neto positivo  en la ejecución de las obras. Los LIVV se agrupan conforme a las etapas del  ciclo de vida de la infraestructura carretera —des- de la planeación estratégica, estudios y diseños,  construcción,  operación,  intervención  hasta  el  desmantelamiento— e incluyen, entre otras, las  siguientes acciones:    ■   Proteger las Áreas de Especial Interés  Ambiental, la cobertura vegetal y la flora  silvestre.    ■   Proteger los cuerpos de agua y sus rondas.    ■   Proteger la fauna endémica, migratoria y/o en  condición de amenaza o vulnerabilidad.    ■   Optimizar el manejo de materiales durante la  ejecución de los proyectos.    ■   Asegurar la disponibilidad de recursos de  financiación para la implementación de  medidas ambientales.    ■   Promover la participación comunitaria en  las decisiones relacionadas con el territorio,  mediante acciones interinstitucionales  coordinadas.  En coherencia con lo anterior, el Invías expidió en  2020  su    Política  de  Sostenibilidad ,  actualizada  mediante la Resolución 1314 de 2022, que se es- tructura en cuatro ejes estratégicos: (1) Proyectos  sostenibles, (2) Comunidades sostenibles, (3) Insti- tucionalidad sostenible y (4) Innovación sostenible.  Ese mismo año, en el marco del Eje 3, la entidad  formuló la  Metodología para la Evaluación de la   Sostenibilidad de los Proyectos de Infraestructura  de Transporte  (AIKA), que integra criterios ambien- tales, técnicos, sociales, económicos, financieros y  de gobernanza coherentes con los LIVV. Con  el  propósito  de  consolidar  la  adopción  de los LIVV en todas las fases del ciclo de vida  de los proyectos, el Ministerio de Transporte ex- pidió  la  Resolución  20243040018375  de  2024,  mediante la cual se oficializa su implementación  e incorpora el concepto de corredor geotécnico.  En  cumplimiento  de  esta  disposición,  el  Invías  ha  venido  aplicando  dichos  lineamientos  desde  la estructuración de los contratos de consultoría  y obra, así como en la actualización de su docu- mentación técnica, entre la que se destacan los  manuales de diseño geométrico, estabilización de  taludes y drenaje para carreteras, además de la  elaboración de la  Guía de Lineamientos Técnicos   y  Metodológicos  para  la  Incorporación  del  Con- cepto de Corredor Geotécnico en los Proyectos de  Infraestructura de Transporte. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  59 \nLa  actualización  del  Manual  de  Estabilidad  de Taludes (versión borrador), en su Capítulo 7:  “Métodos de estabilización y protección”, incluye  explícitamente las soluciones verdes o basadas  en la naturaleza como métodos de estabilización  y acción correctiva. De igual forma, la actualiza- ción del Manual de Drenaje de Carreteras (versión  borrador), en el numeral 6.8.2 “Consideraciones  del diseño de drenaje en planicies de inundación”,  contempla  las  SbN  para  el  control  de  erosión,  combinando técnicas de ingeniería civil con ele- mentos vegetales, como barreras vivas, rollos de  vegetación y estabilización de taludes con espe- cies nativas, con el fin de proteger y restaurar los  ecosistemas en las zonas de influencia vial. En este marco, dentro de las Especificaciones  Generales  de  Construcción  aplicadas  a  Nuevas  Tecnologías, adoptadas por el Invías mediante la  Resolución 2451 de 2022, se incorporaron artí- culos a las normas técnicas relacionados con las  SbN que incluyen obras de ingeniería verde y de  geobioingeniería. El Invías continúa desarrollando  lineamientos complementarios para fortalecer la  incorporación de medidas de gestión del riesgo  de desastres en los proyectos de infraestructura  y promover enfoques integrales de sostenibilidad. En  coherencia  con  la  implementación  de  los  lineamientos y la integración de criterios ecológi- cos en la gestión vial, el Invías creó el aplicativo  SUKUBUN  para  registrar  avistamientos  y  atro- pellamientos  de  fauna  silvestre  en  la  red  vial  nacional. Con esta herramienta y el mapa de vul- nerabilidad faunística, se identificó que cerca de  2.000 km de los 11.000 km de vías presentan alta  vulnerabilidad  al  atropellamiento,  información  que orienta el establecimiento de corredores de  conectividad ecológica y la aplicación de medidas  de mitigación como pasos de fauna, barreras di- reccionadoras y señalización preventiva. Tanto los LIVV como las SbN buscan que el  desarrollo  de  la  infraestructura  vial  contribuya  al bienestar humano y a la resiliencia ecológica,  integrando los procesos naturales en el diseño,  construcción y mantenimiento de las carreteras y  tienen la visión compartida de que las carreteras  deben  integrarse  en  ecosistemas  funcionales,  más que concebirse únicamente como obras de  ingeniería. En este marco, la naturaleza se con- cibe como una aliada y no como un obstáculo.  Entre los elementos que los hacen congruentes  se destacan:    ■   La funcionalidad ecológica integrada al diseño.    ■   La gestión del agua y el control de la erosión  mediante vegetación y suelos vivos.    ■   La conectividad ecológica y la movilidad de la  fauna silvestre.    ■   La adaptación y resiliencia frente al cambio  climático.    ■   Los co-beneficios sociales y paisajísticos. De igual manera, la Agencia Nacional de Infraes- tructura (ANI) incorpora criterios de sostenibilidad  en el desarrollo de proyectos de infraestructura de  transporte  concesionado  del  orden  nacional,  en  las  etapas  de  estructuración,  construcción,  ope- ración, desmantelamiento y abandono, como los  LIVV, el reporte de la gestión de fauna a través del  aplicativo  BioANI  (avistamiento,  atropellamien- to y pasos de fauna), y acciones para la gestión  del riesgo de desastres y adaptación al cambio  climático, entre otros. No obstante, los crecientes  desafíos sociales como el cambio climático, el ries- go de desastres y la pérdida de la biodiversidad  afectan cada vez más la funcionalidad y resiliencia  de la infraestructura a la vez que disminuyen el  bienestar humano en las áreas de influencia de los  proyectos. Esta situación exige una infraestructura  de  transporte  mejor  planificada,  más  robusta,  y  duradera, que considere la incertidumbre y el riesgo  bajo escenarios de cambio ambiental, climático y  social, y que, más allá del cumplimiento normativo  y contractual aplicable, fortalezca el tejido social,  la equidad y la competitividad del país. Por  ello,  las  SbN,  como  medidas  emergen- tes impulsadas por el marco político y normativo  internacional y nacional, ofrecen un enfoque inte- gral de gestión con alto impacto en la mitigación  y adaptación al cambio climático, la reducción de  riesgos de desastres y el mejoramiento de la cali- dad de vida, entre otros, a partir de la protección  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  60 \n4.6  de la biodiversidad y el uso sostenible de los eco- sistemas, en línea con el compromiso del sector  incluido en la NDC 3.0 de promover la incorpo- ración  de  criterios  de  resiliencia  climática  en  la  infraestructura, la mejora en sistemas de informa- ción y la implementación de la Política de Gestión  del  Riesgo  y  Cambio  Climático  para  reducir  la  vulnerabilidad del sistema de transporte frente a  fenómenos extremos y asegurar la continuidad de  los servicios (República de Colombia, 2025).    En tal sentido, la formulación de una estrategia  para la incorporación de SbN en la infraestructura  de transporte concesionada del país, y su posterior  aplicación, se concibe como una de las principales  apuestas del sector para fortalecer la sostenibi- lidad y resiliencia de la infraestructura, a la vez  que se promueve el desarrollo sostenible y la pro- tección de la biodiversidad en las zonas donde se  ubican los proyectos. De igual manera, con la in- clusión de SbN en la estructuración de los nuevos  proyectos, en particular desde enfoques híbridos  que combinen la infraestructura verde y la gris, se  espera disminuir en el corto plazo los costos de  mantenimiento, reparación y rehabilitación de la  infraestructura, una vez entren en operación, así  como también, aumentar su funcionalidad y vida  útil en el largo plazo. Estas condiciones favore- cerán  la  competitividad  del  sector  transporte  y  mejorarán su contribución en el abordaje de los  retos sociales mencionados antes.  Mejora de los servicios ecosistémicos  que benefician al sector agropecuario   El sector agropecuario ha sido fundamental para  la economía y el desarrollo social en Colombia;  aunque su participación en el PIB se redujo en  décadas anteriores, ha modificado esta tendencia  consolidándose como un motor económico clave  (Finagro, 2023; UPRA, 19 de agosto de 2025).  El respaldo al sector se ha reflejado en la inver- sión pública que ha tenido aumentos significativos  en los últimos años, del 62 % de 2022 a 2023, y  del 44 % de 2023 a 2024 (Ministerio de Hacienda  y Crédito Público, s. f.). También se resaltan los  recursos de créditos de fomento de Finagro que  en 2024 fueron de $39,4 billones de pesos, cuyos  beneficiarios son en su mayoría (90 %) pequeños  productores  y  pequeños  productores  de  bajos  ingresos (Finagro, s. f.). Adicionalmente, el sector agropecuario ha sido  protagonista en la reactivación económica reciente.  En el primer trimestre de 2025, su valor agregado  registró un aumento del 7,1 % con respecto al  mismo período de 2024, superando el crecimiento  del PIB nacional (2,7%). Esta tendencia positiva se  mantuvo en el segundo trimestre de 2025, cuando  el valor agregado creció un 3,8 %, posicionando  al agro como la tercera actividad económica con  mayor  crecimiento  en  el  país  (UPRA,  2025a)  lo  que ha contribuido al bienestar social, alcanzando  la  tasa  de  desocupación  rural  más  baja  de  los  últimos 7 años (UPRA, 2025b). En  los  últimos  años,  el  Gobierno  nacional  ha  impulsado la Reforma Rural Integral (RRI), enfocada  en la formalización de la tenencia de la tierra, la  restitución de tierras (Presidencia de la República  de Colombia, 9 de enero 2025), la implementación  de planes nacionales sectoriales que promueven la  formalización laboral en el sector rural, además de  incentivar la creación de infraestructura física y social  para las zonas rurales, el desarrollo de Programas  de Desarrollo con Enfoque Territorial y el avance  en la reforma agraria con la que se promueve la  redistribución de la propiedad de la tierra (Unidad  de Restitución de Tierras, s.f.; DNP, 2024).  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  61 \nEl objetivo central de la RRI es transformar las con- diciones de vida en el campo y abordar las causas  estructurales de la pobreza y la desigualdad rural  (DNP, 2024). En el Contador Oficial de la Reforma  Agraria (MinAgricultura, 2025) con corte octubre de  2025 se registra la entrega de 191.539 hectáreas  y  la  formalización  de  1.888.079  predios  rurales.  De  estos  490.681  han  sido  para  campesinos  y  1.392.397 para comunidades indígenas y NARP. En  este  contexto  de  transformación,  la  Agricultura  Campesina,  Familiar  y  Comunitaria  (ACFC)    juega    un    rol    estratégico,    siendo  responsable del 60 % de los alimentos que se  dirigen a los mercados locales en Colombia, sus  prácticas como las huertas agroecológicas y la  agricultura regenerativa fortalecen la seguridad  alimentaria territorial (FAO  et  al ., 2022). El  PND  2022-2026: Colombia, potencia mundial de la vida    subraya la necesidad de producir más y mejores  alimentos  de  manera  eficiente  e  incluyente,  utilizando  ciencia,  tecnología  e  innovación,  en  línea con la RRI (DNP, 2023).  A pesar de la vital contribución de la ACFC,  persisten    desafíos    estructurales,    como    la  inseguridad  alimentaria  moderada  o  grave  que  se  presenta  en  más  del  35  %  de  los  hogares  en  los  departamentos  de  Vichada,  Guaviare,  Sucre,  Magdalena,  La  Guajira  y  Atlántico  (DANE,  2024).  Esta  situación  fomenta  una  oportunidad decisiva de las SbN para contribuir  a la seguridad alimentaria a través del aumento  de la productividad, la resiliencia de los sistemas  productivos  y  la  diversificación  de  fuentes  de  ingresos,  lo  que  es  de  especial  importancia  en  territorios con escasas vías de acceso en donde  la  alimentación  depende  en  gran  medida  de  la  producción  familiar  y  campesina.  Esto  puede  potencializarse  con  el  respaldo  de  políticas  públicas integrales enfocadas en la tenencia de la  tierra y la provisión de bienes públicos como vías  y sistemas de riego (DNP, 2015; Junguito Bonnet   et al ., 2022). Los  proyectos  de  SbN  que  incluyen  la  pre- servación y restauración de bosques o arreglos  productivos con componentes forestales pueden  originar múltiples beneficios para el sector agro- pecuario, principalmente mediante la regulación  del  clima  en  múltiples  escalas.  Los  bosques  y  los árboles modifican las temperaturas, mantie- nen las precipitaciones y reducen los efectos de  las sequías. Esto favorece directamente la pro- ductividad y la resiliencia agrícolas. Además de  la captura y el almacenamiento de carbono, los  bosques  tropicales,  producen  un  fuerte  efecto  neto de enfriamiento por el aumento de hume- dad  del  aire  a  través  de  la  evapotranspiración  (FAO  et al ., 2025).  Este potencial se reconoce también en políti- cas sectoriales recientes orientadas a promover  prácticas agropecuarias sostenibles, como el Do- cumento CONPES 4141 que autoriza la gestión  de recursos para financiar el proyecto Ruralidad  para la Vida, el cual tiene como objetivo “ fortale- cer de manera sostenible y resiliente la capacidad  productiva y de generación de ingresos de la po- blación  rural  en  condición  de  pobreza  y  pobreza   extrema ” (DNP, 2024, p.3), o el Plan Integral de  Gestión de Cambio Climático del Sector Agrope- cuario, que busca mejorar la adaptación y reducir  emisiones mediante prácticas sostenibles, inves- tigación, innovación tecnológica y fortalecimiento  de capacidades. Este plan reconoce la necesidad  de un servicio de extensión agropecuaria fortale- cido y gratuito para pequeños productores con el  fin de mejorar la productividad, sostenibilidad y  adaptación climática. La extensión agropecuaria y la capacitación se  desarrollan en gran medida mediante los Proyec- tos Integrales de Desarrollo Agropecuario y Rural  (PIDAR), mediante los cuales existe la oportuni- dad de divulgar el conocimiento y fomentar las  SbN y otras estrategias de sostenibilidad. Igual- mente, la generación de contenidos sobre buenas  prácticas  para  su  implementación  y  sobre  los  beneficios que producen, en proyectos de investi- gación y materiales de divulgación potenciará su  escalamiento para abordar los retos de producti- vidad y de acceso a la alimentación de calidad. SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  62 \n4.7   Movilización del sector  empresarial y productivo   sostenibilidad en el tiempo, el sector empresarial  y productivo debe promover cambios transforma- tivos que pongan a la biodiversidad en el centro  de las estrategias de los negocios, transitando de  un enfoque de impactos y riesgos, al desarrollo  de oportunidades basadas en la naturaleza. Las  SbN  emergen  como  herramientas  estratégicas  que permiten a las empresas abordar de mane- ra  simultánea  desafíos  ambientales,  sociales  y  económicos,  contribuyendo  al  cumplimiento  de  compromisos climáticos y de biodiversidad (Co- hen-Shacham, Walters, Janzen, & Maginnis, 2016).  Las empresas pueden integrar las SbN en di- versos niveles de su operación, desde las áreas  de  influencia  directa  e  indirecta  hasta  sus  pro- ductos, servicios y cadenas de valor. Asimismo,  la  implementación  efectiva  de  las  SbN  requie- re  un  enfoque  multidisciplinario  y  colaborativo  que involucre a científicos, comunidades locales,  gobiernos, empresas, ONGs y otras partes intere- sadas (CNAB, 2024). En este contexto, el Centro Nacional del Agua y  la Biodiversidad (CNAB) de la Asociación Nacio- nal  de  Empresarios  de  Colombia  (ANDI),  como  área de pensamiento y acción empresarial para  la sostenibilidad en asuntos de naturaleza, ha ve- nido  avanzando  en  tres  escenarios  estratégicos  a los cuales seguirá dedicando sus esfuerzos en  los próximos años: “ Impulso  a  la  Comunidad  de   Práctica  Empresarial  de  SbN  y  Naturaleza  Posi- tiva ” es un espacio de co-creación e intercambio  que tiene como visión de cambio a 2030 fortale- cer capacidades humanas y tecnológicas para la  implementación de SbN que, a través de los pro- cesos empresariales, contribuyan positivamente a  la naturaleza y el territorio. Es dinamizada a través  de la alianza estratégica con GIZ/Euroclima y el  proyecto  SolNatura  y ha logrado la participación  de más de 50 organizaciones, lo que demuestra  el  interés  empresarial  por  mejorar  procesos  de  sostenibilidad  mediante  estrategias  basadas  en  la naturaleza.  Más del 50 % del PIB mundial total tiene una  dependencia moderada o alta de la naturaleza y  sus servicios y, por lo tanto, están expuestos a  la  pérdida  del  capital  natural  (World  Economic  Forum, 2020). En Colombia, según el Marco Fiscal  de  Mediano  Plazo  para  la  vigencia  2024  desa- rrollado por el Ministerio de Hacienda y Crédito  Público, el 48 % del PIB lo generan industrias con  dependencia directa de moderada a muy alta (Mi- nisterio de Hacienda y Crédito Público, 2024). Esto  demuestra que la economía, la competitividad y el  bienestar social del país dependen en gran medi- da de la naturaleza, lo que refuerza la necesidad  de vincular al sector empresarial como un actor  clave en la implementación de SbN con una mira- da integral y de mayor impacto. Considerando  la  importancia  de  la  naturale- za en los modelos de negocio, para garantizar su  SbN Anexo de Proyectos   Estrategia Nacional de Soluciones basadas en la Naturaleza  63 \nEn este contexto, el CNAB de la ANDI, como  área de pensamiento y acción empresarial para la  sostenibilidad en asuntos de naturaleza, ha veni- do avanzando en tres escenarios estratégicos a  los cuales seguirá dedicando sus esfuerzos en los  próximos años:  Impulso a la Comunidad de Práctica Empresarial de SbN y  Naturaleza Positiva:  es un espacio de co-creación e intercambio  que tiene como visión de cambio a 2030 fortalecer capacidades  humanas y tecnológicas para su implementación que contribuyan  positivamente a la naturaleza y el territorio, a través de los  procesos empresariales. Es dinamizada a través de la alianza  estratégica con GIZ/Euroclima y el proyecto  SolNatura  y ha logrado  la participación de más de 50 organizaciones. Esto demuestra  el interés empresarial por mejorar procesos de sostenibilidad  mediante estrategias basadas en la naturaleza.   Consolidación de alianzas territoriales:  mediante el esquema  de gobernanza denominado “Alianza por la protección del agua  de Santander (alianza PAS), se desarrolló el primer portafolio de  SbN para territorios mineros que integra estrategias de modelación  hidrológica e hidroclimática, ciencia participativa y herramientas  geoespaciales para la gobernanza del agua en los municipios de  Suratá, Vetas y California. Esta iniciativa promovida por el Centro  Nacional del Agua y la Biodiversidad (CNAB) y la Seccional  Santander de la Asociación Nacional de Empresarios (ANDI) - de la  mano de aliados academicos, ONGs, empresariales y territoriales  - fue reconocida en el III Foro de Economía Verde en Brasil, como  uno de los tres proyectos más relevantes de Latinoamérica por su  impacto en sostenibilidad y protección del agua.  Instrumentos:  la ANDI ha desarrollado instrumentos, guías y  lineamientos para orientar la implementación de SbN en el sector  empresarial, por ejemplo, en el 2024 desarrolló la  Hoja de Ruta  Biodiversidad y Empresa 2030  que orienta a las empresas frente a  como integrar la biodiversidad en sus estrategias de negocio para,  desde ahí, contribuir al Plan de Acción de Biodiversidad de Colombia  al 2030 y al Marco Global de Biodiversidad. Este plan reconoce las  SbN como un enfoque innovador para que las empresas puedan  abordar de manera integral sus relaciones con la biodiversidad, los  servicios ecosistémicos, el clima, el agua, los suelos y el aire, todo  integrado bajo el concepto de naturaleza5 (CNAB, 2024). A través de estos ejes y mediante las acciones  indicativas incluidas en el  Anexo  1  se busca im- pulsar la adopción de
