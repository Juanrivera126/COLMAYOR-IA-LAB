os Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 181  3.4. Eje Tecnología  Alexandre Augusto Biz  Universidade Federal de Santa Catarina, Brasil.  Andrey Freitas da Silva  Universidade Federal de Santa Catarina, Brasil.  3.4.1. Introdução  A importância das TICs no turismo não é recente, manifestando-se desde a evolução   dos  sistemas  de  reservas  centrais  (CRS)  na   década  de  1960  como,  por   exemplo,  pela    companhia   aérea  American  Airlines  (sistema  Saber,   atual  Sabre)  para  os  sistemas    de distribuição global (GDS) na  década de 1980 como, por  exemplo, GDS Amadeus, e   o  surgimento  da  primeira  geração  (1G)  de  comunicação  móvel  que  oferecia  apenas    serviços de voz ou mensagens (Chen et al., 2021; Deputat et al., 2024).  No entanto, a consolidação da internet no final da década de 1990 marcou o início da   revolução digital na indústria do turismo, destacando-se a segunda Geração (2G) de   comunicação móvel que incluía dados de voz e facilidades de SMS. Produtos represen -  tativos da era 1G eram telefones que ligavam em áreas específicas, enquanto na era   2G, os telefones permitiam chamadas, mensagens e acesso à internet de baixa veloci -  dade (Deputat et al., 2024).   Anos 2000, a terceira Geração (3G) de comunicação móvel com serviços de dados de   alta  velocidade,  voz,  imagem  e  vídeo.  Os  telefones  da  era  3G  podiam  processar  ima -  gens,  músicas  e   vídeos  ( Deputat  et  al.,  2024).  O  uso  crescente  de  dispositivos  móveis    e  mídias  sociais.  Essa   rápida   adoção  das  TICs  pela  demanda  turística  transformou    a gestão e o marketing do turismo, tornando-as um fator básico de competitividade   para os destinos (Ivars-Baidal et al, 2019).  Já na Era da Internet (anos 2000) se consolidam os motores de busca como, por exem -  plo,  o  Google,  o  surgimento  das  plataformas  de  redes  sociais  (facebook)  e  colabora -  tivas  pelo  compartilhamento  de  experiências  turísticas  (TripAdvisor),  possibilitando    a  interação  entre  usuários  conectados  em  diferentes  partes  do  mundo,  a  criação  de    comunidades virtuais e o despontar da reputação de empresas turísticas a partir do   “valor”, aqui considerado emocional/funcional da prestação de serviço realizado (SE -  GITTUR & Andrades, 2024). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 182  O século XXI é marcado pela consolidação da Era Digital, a qual promoveu profundas   transformações na dinâmica do turismo. A Web Semântica, por exemplo, viabilizou a   interoperabilidade entre computadores e bases de dados, permitindo a integração de   grandes volumes de informação e fomentando a colaboração entre agentes por meio   da  rede.  Outras  inovações  disruptivas  também  passaram  a  integrar  o  setor,  como    a  Realidade  Virtual  (RV)  e  a  Realidade  Aumentada  (RA),  que  oferecem  experiências    turísticas imersivas e enriquecedoras, permitindo aos visitantes tanto pré-visualizar   destinos quanto aprimorar suas vivências presenciais (SEGITTUR & Andrades, 2024).  No  âmbito  da Indústria 4.0, destacam-se as chamadas Tecnologias Habilitadoras Di -  gitais ( Digital Enabling Technologies  – DETs), entre as quais se incluem IA, Big Data e   analytics, Internet das Coisas (IoT), cibersegurança, blockchain, computação em nu -  vem, redes 5G, gamificação, identificação por radiofrequência (RFID) e impressão 3D.   Essas inovações têm o potencial de constituir uma “atmosfera inteligente para o turis -  mo”, baseada em infraestruturas digitais que viabilizam novas formas de gestão do   setor. Por fim, o conceito emergente do Metaverso projeta-se como um elemento capaz   de remodelar a sociedade, ao articular os mundos físico e virtual e oferecer experiên -  cias  imersivas  que  transcendem  os  limites  atuais.  No  campo  da  hospitalidade  e  do    turismo, espera-se que o Metaverso contribua para ampliar a conscientização sobre   os destinos, apoiar o planejamento de viagens e redefinir as interações entre turistas   e prestadores de serviços (SEGITTUR & Andrades, 2024).  A década de 2020 a 5G tende, no turismo, a transformar a produção de serviços, diver -  sificar aplicações e reduzir custos e tempo de viagem. Dispositivos de autoatendimen -  to,  robôs  e  soluções  baseadas  em  Inteligência  Artificial  devem  ampliar  a  eficiência,    liberar tempo de lazer e estimular maior demanda por experiências turísticas.  Enquanto  a  infraestrutura  5G  avança,  já  se  projetam  os  padrões  da  sexta  geração    (6G), que deverão intensificar a integração entre o mundo físico e digital, promovendo   experiências imersivas e inteligência ubíqua no setor de hospitalidade e turismo (De -  putat et al., 2024).  O  papel  das  Tecnologias  de  Informação  e  Comunicação  (TICs)   é   particularmente  rele -  vante, uma vez que o turismo é um setor altamente intensivo em informação. As TICs   transformaram a forma como os viajantes buscam, consomem e compartilham expe -  riências, criando novas oportunidades para o crescimento do setor. Assim, a tecnologia   deixou de ser apenas um suporte operacional e passou a ocupar posição estratégica na   concepção e no desenvolvimento da atividade turística (Lee, Chen, Wu & Xing, 2021). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 183  Essa  transformação  pavimentou  o  caminho  para  o  e Tourism ,  posteriormente  am -  pliado para o conceito de turismo inteligente ( smart tourism ), e que hoje aponta para   horizontes  ainda  mais  avançados,  como  o  turismo  de  inteligência  ambiental.  Nesse    contexto,  a  tecnologia  não  apenas  melhora  a  experiência  dos  turistas,  mas  também    contribui  para  a  gestão  sustentável  dos  destinos,  permitindo  um  uso  mais  eficiente    dos recursos naturais, culturais e sociais (Tam, Ye, Law & Fong, 2022).  Um dos aspectos centrais desse avanço é a gestão e análise de dados, que torna possível   a personalização das experiências de viagem. A coleta, processamento e interpretação   das  preferências  e  comportamentos  dos  turistas  oferecem  aos  destinos  a  capacidade    de adaptar serviços e produtos de forma individualizada, aumentando a satisfação do   visitante e, ao mesmo tempo, otimizando a alocação de recursos locais (Le & Tran, 2023).  Novos conceitos emergem dessa interseção entre tecnologia e turismo. O “turismo con -  tínuo” ( never-ending tourism ), por exemplo, e as “experiências  físico- digitais” ( phygi -  tal experiences ) refletem uma tendência em que a viagem não se limita ao momento   físico  de  deslocamento,  mas  passa  a  fazer  parte  do  cotidiano  do  turista  por  meio  de    interações digitais constantes, criando experiências  híbridas que  ampliam a conexão   entre viajante e destino (Prodinger & Neuhofer, 2023).  Por fim, a personalização extrema no setor de viagens aparece como um dos desdo -  bramentos mais promissores desse cenário. O objetivo é oferecer um atendimento que   se  assemelhe  ao  suporte  de  um  assistente  pessoal,  capaz  de  antecipar  necessidades    com  base  em  dados  demográficos,  históricos  de  viagem  e  perfis  de  comportamento.    Essa capacidade, viabilizada por tecnologias como inteligência artificial e análise de   big  data,  representa  uma  evolução  significativa  no  relacionamento  entre  destinos  e    turistas ( Özçelik , Turhan Yöndem, Sayıcı, Balcı, Al & Akkurt, 2024).  SEGITTUR et al. (2024) apresentam desafios na implementação das tecnologias:  •  Natureza transversal da tecnologia (como a inovação)  é  um dos principais de -  safios para os gestores de turismo, pois muitos indicadores não dependem dire -  tamente da DMO ou mesmo da entidade local;  •   Problemas  comuns  incluem  a  falta  de  planejamento  estruturado  e  ordenado    para  soluções  tecnológicas,  falta  de  coordenação  entre  as  diferentes  áreas  da    entidade local, gerando duplicações e implementações não supervisionadas;  •  É crucial  atualizar as qualificações dos recursos humanos e treinar especialis -  tas em reestruturação de bancos de dados de destinos, conectividade e intero -  perabilidade de dados e sistemas; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 184  •   O  Modelo  DTI  promove  a  criação  de  uma  unidade/mesa  de  TIC  para  garantir    que todas as implementações tecnológicas sejam acordadas e revisadas tecni -  camente;  •   Pequenos  destinos  geralmente  apresentam  menor  maturidade  tecnológica  e    menos recursos econômicos, elementos essenciais para o sucesso na implemen -  tação das soluções tecnológicas propostas; e  •   O  futuro  do  Modelo  DTI  está  mais  ligado  ao  fortalecimento  da  governança  e    dos processos de inovação do que apenas ao uso de tecnologia e dados, que são   condições necessárias, mas não suficientes.  Apesar dos avanços, o setor de turismo ainda enfrenta desafios como a complexidade   da  propriedade  dos  dados,  a  heterogeneidade  dos  formatos  de  dados,  a  dificuldade    na análise de dados e a abertura e possibilidade de compartilhamento de dados. Por -  tanto,  os  destinos  inteligentes  devem  ser  capazes  de  coletar,  analisar  e  usar  dados    relevantes  de  forma  adequada.  Ou  seja,  trabalhar  para  investigar  como  coletar,  ar -  mazenar, analisar e integrar dados em seus processos para tomar decisões gerenciais   mais eficazes (Garbani-Nerini, Marchiori y Cantoni, 2022)  Para  discutir  o  fortalecimento  da  governança  e  dos  processos  de  inovação  é  pre -  ciso  compreender  como  a  Inteligência  Artificial  (IA)  e  o  aprendizado  de  máquina    (machine learning) são cruciais para a análise de grandes volumes de conteúdo ge -  rado  pelo  usuário  (CGU),  permitindo  que  os  profissionais  de  marketing  de  destino    adaptem  textos  promocionais,  imagens  e  vídeos   às   preferências  gastronômicas  de    grupos  culturais  específicos.  Embora  promissora,  a  IA  levanta  questões  éticas  im -  portantes, incluindo privacidade de dados, vigilância ubíqua, igualdade e o risco de   preconceitos (Tuomi, 2023).   Apesar do crescente reconhecimento do papel crucial das tecnologias, o impacto da in -  fusão de tecnologias inteligentes e da atenção plena no uso dessas tecnologias na cria -  ção de valor, desempenho e competitividade em pequenas e microempresas de turismo   tem sido pouco analisado. O uso de tecnologias inteligentes pode, por vezes, criar efeitos   negativos, como a percepção de canibalização de serviços entre os funcionários.  Ao mesmo tempo geram algumas preocupações com o elevado nível de compartilha -  mento  de  informações  intensifica  as  preocupações  relacionadas  à  cibersegurança.    Desde  os  primeiros  usos  da  tecnologia  móvel  no  turismo  e  na  hotelaria,  a  proteção    da privacidade e a segurança dos usuários têm se constituído em desafios centrais. A   crescente interconexão digital entre pessoas e objetos, marcada pelo fluxo contínuo de  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 185  informações em tempo real, demanda salvaguardas eficazes para garantir a integri -  dade e a confidencialidade dos dados pessoais (Chen et al., 2024; Deputat et al. 2024).  Esse  cenário  impõe  desafios  não  apenas   às   organizações  privadas,  mas  também  aos    órgãos  de gestão governamental, que precisam elaborar normas, diretrizes e políticas re -  gulatórias em tempo oportuno. Tais medidas devem assegurar que o uso e a evolução das   tecnologias  de  comunicação  móvel  estejam  alinhados   às   tendências  sociais,  bem  como    aos requisitos legais e éticos vigentes. Outro fator está na crescente dependência de dispo -  sitivos pessoais e tecnologias inteligentes que podem comprometer a vivência de experiên -  cias de lazer mais autênticas e íntimas. Em resposta a esse desafio, gestores de turismo e   hospitalidade têm buscado estimular práticas de “desconexão digital” durante a estadia,   com o objetivo de promover uma cultura de lazer menos mediada pela tecnologia e mais   voltada à interação humana e ao bem-estar (Chen et al., 2021; Deputat et al., 2024).  3.4.2. Eixos da Tecnologia  São apresentados três  âmbitos  de tecnologia da  Red Iberoamericana DTI  divididos em   (i) tecnologias aplicadas a governança, (ii) infraestruturas tecnológicas e conectivida -  de e, (iii) tecnologias para gestão inteligente do turismo, conforme o quadro 1.   Quadro 1   Eixo de tecnologia do Modelo da RIDTI: requisitos, indicadores e pesos.  INOVAÇÃO  Requisitos   Indicadores   Peso do   Requisito  A. Tecnologias  aplicad as a  governança  Desenvolvimento Smart no   turismo   1   3   42,8%  Estratégia de cibersegurança   1   1   14,3%  Plataforma de dados abertos   (Open Data)   1   1   14,3%  Área/ unidade para a gestão   de TIC   1   1   14,3%  Sistemas de comunicação   bilateral entre administração   e os residentes e visitantes  1   1   14,3%  TOTAL ÂMBITO   5   7   100% \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 186  INOVAÇÃO  Requisitos   Indicadores   Peso do   Requisito  B. Infraestruturas   tecnológicas e   conectividade  Disponibilidade de Wifi   gratuita   1   1   7,7%  Sensorização e sistema de   gestão   1   2   14,4%  Sistemas de gestão de espaços    físicos   1   6   46,1%  Conectividade a redes móveis   no destino   1   1   7,7%  Conectividade a redes fixas   no destino (fibra, móvel,   satélite, etc)  1   1   7,7%  Conectividade nos pontos de   interesses turísticos, atrativos   de interesses turísticos   e Postos de Informação   Turística  1   1   7,7%  TOTAL ÂMBITO   6   13   100%  C. Tecnologias   para a gestão   inteligente do   turismo  Inteligência turística   (sistemas, tecnologias e   ferramentas)  1   6   33,3%  Nível dos técnicos nos Postos   de Informação Turística   1   4   22,2%  Portal Web de Turismo   1   4   22,2%  Sinalização Inteligente   1   2   11,1%  Rastreabilidade das   campanhas de promoção   1   1   5,6%  Cartão turístico com suporte   tecnológico avançado   1   1   5,6%  TOTAL ÂMBITO   6   18   100%  TOTAL EIXO TECNOLOGIA   17   38   25%  Fonte: Elaboração própria com base em Lopez (2025).  A partir das abordagens teóricas e das discussões com expertos científicos e de merca -  do foram selecionados seis (6) requisitos mínimos e definidos como estruturantes para   os destinos turísticos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 187  O primeiro  âmbito  são as (A) Tecnologias aplicadas à governança, definidas como fer -  ramentas digitais, sistemas e metodologias que apoiam a gestão, a tomada de decisão   e a transparência em organizações (governo, empresas ou instituições). Elas ajudam a   melhorar a eficiência administrativa, aumentar a participação social, reduzir custos e   garantir mais controle e transparência. Foram selecionados dois requisitos:  A1. Plataforma Digital   É  um ambiente digital (geralmente um site ou portal) onde uma organização — gover -  no, empresa ou instituição — disponibiliza dados públicos de forma acessível, trans -  parente e reutilizável.  A plataforma de dados abertos (Open Data) configura-se como um requisito essencial   para promover a transparência, a inovação e a participação de diferentes atores no   ecossistema turístico. Nesse contexto, a qualidade dos dados do portal de dados aber -  tos representa um indicador fundamental para mensurar o grau de aderência  às  boas   práticas internacionais e a efetividade do uso das informações disponibilizadas.  A avaliação da qualidade desse requisito pode ser realizada a partir de diferentes ní -  veis de conformidade:  •   100%  –  O  portal  contém  publicações  de  dados  abertos  de  natureza  turística,    elaboradas de acordo com modelos internacionais, e apresenta utilização com -  provada por 20 ou mais atores externos.  •  75% – O portal contém publicações de dados abertos de natureza turística, se -  guindo os modelos internacionais, e apresenta utilização por entre 10 e 20 ato -  res externos.  •  50% – O portal contém publicações de dados abertos de natureza turística, em   conformidade  com  os  modelos  internacionais,  mas  apresenta  utilização  por    menos de 10 atores externos.  •  25% – Não há portal próprio de dados abertos alinhado a modelos internacio -  nais; entretanto, a Entidade Local de Turismo compartilha datasets em seu por -  tal institucional.  •   0%  –  A  Entidade  Local  de  Turismo  não  dispõe  de  portal  de  dados  abertos    próprios, tampouco realiza o compartilhamento de datasets em seu portal ins -  titucional. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 188  A2. Sistema de Comunicação Bidirecional  Serve  para  criar  um  canal  direto  e  interativo  entre  governo  e  cidadãos,  permitindo    avisos rápidos, registro de problemas e participação social, o que resulta em uma ges -  tão mais transparente, ágil e eficiente. Citam-se como exemplo a transparência e pro -  ximidade  (gera  confiança  e  fortalece  a  governança),  rapidez  na  comunicação  (entre    administração  e  cidadãos),  gestão  mais  eficiente  (coleta  de  dados/informações,  res -  postas as demandas), participação cidadã (sentimento de coprodução) e, redução da   burocracia (processos lentos por soluções digitais e  ágeis ).  Esse mecanismo possibilita o intercâmbio de informações, incidências e avisos, permi -  tindo que tanto residentes quanto visitantes contribuem ativamente para a melhoria   dos serviços e da qualidade de vida no destino. Como indicador de desempenho, des -  taca-se  a  existência  de  ferramentas  que  viabilizem  o  envio  de  informes,  incidências,    denúncias e avisos por parte da Administração.   A avaliação deste requisito pode ser realizada a partir de três níveis de conformidade:  •   100%  –  Há  ferramentas  de  envio  disponíveis  tanto  para  turistas  quanto  para    residentes, assegurando a inclusão de todos os públicos envolvidos.  •  50% – Existem ferramentas de envio voltadas exclusivamente para residentes   locais, sem contemplar os turistas.  •  0% – Não existem ferramentas que permitam a comunicação bidirecional entre   a Administração e os cidadãos.  O  segundo   âmbito   são  as  (B)  Infraestrutura  Tecnológicas  e  Conectividade,  represen -  tam o alicerce  físico  e digital que sustenta a circulação da informação e possibilita a   integração entre serviços, cidadãos e organizações, configurando-se como um compo -  nente estratégico essencial para o avanço da inovação, o fortalecimento da competiti -  vidade e a promoção da sustentabilidade em diferentes territórios e em setores como   o turismo, a saúde e a educação. Foram selecionados dois requisitos:  B1. Conectividade a redes móvel no destino  A  conectividade  a  redes  móveis  no  destino  constitui  um  requisito  fundamental  para    a  consolidação  de  territórios  mais  inteligentes,  inclusivos  e  competitivos.  A  disponi -  bilidade de cobertura de rede impacta diretamente na experiência de turistas e resi -  dentes,  ao  possibilitar  acesso  contínuo  à  informação,  comunicação  em  tempo  real  e    utilização de serviços digitais.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 189  Além  disso,  configura-se  como  elemento  essencial  para  a  transformação  digital  de    destinos turísticos, a inovação empresarial e a integração de serviços  públicos  e pri -  vados. Como indicador, adota-se a conectividade a redes móveis, cuja avaliação pode   ser realizada segundo os seguintes níveis de conformidade:  •  100% – Existência de cobertura 5G em todo o território, assegurando alta velo -  cidade, baixa latência e maior capacidade de tráfego de dados.  •  75% – Existência de cobertura 4G em todo o território, garantindo conectividade   estável e de ampla utilização.  •  50% – Existência de cobertura 4G em parte do território, o que limita o acesso   uniforme aos serviços digitais.  •  25% – Existência de cobertura 3G em todo o território, oferecendo conectividade    básica,  mas insuficiente frente  às  demandas atuais.  •  0% – Existência apenas de outras opções de menor qualidade, comprometendo   a conectividade e o acesso a serviços digitais.  B2. Conectividade nos pontos de interesse turístico, atrativos de interesses turísti -  cos e Postos de Informação Turística (PIT)  É    um  requisito  estratégico  para  a  qualificação  da  experiência  do  visitante  e  para  o    fortalecimento  da  imagem  do  destino.  A  oferta  de  acesso  à  internet  gratuita  em  lo -  cais de grande fluxo turístico não apenas amplia as possibilidades de comunicação e   interação dos viajantes, mas também promove maior engajamento com os serviços e   informações disponibilizadas pela gestão  pública  e pelo trade turístico.  Nesse contexto, o indicador adotado é a disponibilidade de Wi-Fi gratuito nos Postos   de Informação Turística (PITs), cuja avaliação pode ser realizada por meio dos seguin -  tes níveis:  •  100% – Há Wi-Fi gratuito em 100% dos PITs, garantindo conectividade universal   e contínua aos visitantes.  •  50% – Há Wi-Fi gratuito em 50% dos PITs, assegurando conectividade parcial e   limitando o acesso uniforme à informação.  •  0% – Não existe oferta de Wi-Fi gratuito nos PITs, impossibilitando o acesso ime -  diato a serviços digitais e informações turísticas em tais espaços. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 190  O  terceiro   âmbito   é  (C)   Tecnologia  para  a  Gestão  Inteligente  do  Turismo   deve  ser    compreendido como uma plataforma digital oficial (site ou hub) que reúne informa -  ções, serviços e ferramentas relacionadas ao turismo de um destino. Funciona como   vitrine do destino e, ao mesmo tempo, como ferramenta de gestão para a administra -  ção  pública,  trade turístico e turistas. Foram selecionados dois requisitos:  C1. Portal Web de Turismo  A  análise  desse  requisito  permite  avaliar  não  apenas  a  existência  de  uma  presença    digital  institucional,  mas  também  a  capacidade  de  atualização  tecnológica  e  infor -  macional do destino. Dessa forma, constitui um indicador relevante para mensurar o   nível de maturidade digital da gestão turística e sua sintonia com as exigências de um   mercado cada vez mais orientado pelas tecnologias da informação e comunicação.  A avaliação desse requisito pode ser realizada a partir dos seguintes níveis de confor -  midade:  •  100% – O portal existe e foi implementado no último ano, garantindo atualidade   e alinhamento  às  necessidades digitais contemporâneas.  •  75% – O portal existe e foi atualizado em termos de design, estrutura e/ou con -  teúdo entre 1 e 2 anos.  •  50% – O portal existe e foi atualizado em termos de design, estrutura e/ou con -  teúdo entre 2 e 3 anos.  •  25% – O portal existe, porém, sua última atualização de design, estrutura e/ou   conteúdo ocorreu há mais de 3 anos, o que compromete sua atualidade e ade -  quação tecnológica.  •  0% – Não existe portal web de turismo para o destino.  C2. Atualização do conteúdo do portal de turismo  Dessa  forma,  a  análise  desse  requisito  permite  mensurar  o  grau  de  inovação,  atua -  lidade  e  interatividade  do  portal  web  de  turismo,  elementos  que  são  determinantes    para a consolidação da presença digital do destino e para a promoção de uma expe -  riência turística mais integrada, personalizada e participativa.  O indicador definido corresponde à atualização do conteúdo do portal de turismo, que   pode ser avaliado a partir dos seguintes critérios: \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 191  •  30% – O portal dispõe de sistemas de recomendação de conteúdos personaliza -  dos, favorecendo a experiência do usuário por meio de informações adaptadas   ao seu perfil e interesses.  •  30% – O portal atualiza o conteúdo de ao menos uma seção semanalmente, ga -  rantindo dinamismo e relevância informacional.  •  20% – Os conteúdos são atualizados de forma distribuída, contando com a par -  ticipação de associações setoriais e agentes privados, o que amplia a diversida -  de e representatividade das informações.  •  10% – O portal oferece a possibilidade de inscrição em newsletter, fortalecendo   a comunicação contínua e o relacionamento com os usuários.  •  10% – O portal mantém uma biblioteca de conteúdo multimídia, que enriquece   a experiência informacional por meio de imagens, vídeos e outros recursos di -  gitais.  3.4.3. Aplicação dos requisitos   Em setembro de 2022 o Sebrae Nacional e o Banco Interamericano de Desenvolvimen -  to  (BID)  lançaram  o  Edital  “Programa  Turismo  Futuro  Brasil”  com  objetivo  de  sele -  cionar  dez  destinos  turísticos  no  Brasil  que  seriam  apoiados  com  a  elaboração  e/ou    implementação de suas estratégias de Destinos Turísticos Inteligentes (DTI).  Foram selecionados doze municípios sendo, na região Centro-Oeste: Pirenópolis (GO) e   Bonito (MS), Nordeste: Penedo (AL), São Luís (MA) e Recife (PE), Norte: Novo Airão (AM)   e Belém (PA), Sudeste: Belo Horizonte (MG), Ilhabela (SP) e Paraty (RJ) e, Sul: Curitiba   (PR) e Bombinhas (SC) (SEBRAE, 2022). Para aplicação dos requisitos foram seleciona -  das as cidades de Belo Horizonte (MG) e Belém (PA) sede da COP 30.  Belo  Horizonte,  capital  do  Estado  de  Minas  Gerais,  localizado  na  região  do  Sudeste    do Brasil, possui uma população estimada de 2.416.339 habitantes (IBGE, 2025) tendo   serviços como fonte principal da economia, principalmente na área da Administração    Pública, Defesa e  Seguridade Social, Comércio Varejista, Educação e na área da Tecno -  logia da Informação (SEBRAE, 2025).  O  turismo  vem  crescendo  anualmente  e  se  consolidando  como  destino  de  lazer/pas -  seio, além de ser a porta de entrada de turistas nacionais e internacionais para o Esta -  do de Minas Gerais (Prefeitura Belo Horizonte, 2025). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 192  Quadro 2  Análise dos  âmbitos  de tecnologia em Belo Horizonte (MG).  Âmbito   Requisito   Indicadores   Como Avaliar  Tecnologias aplica -  das a governança  Plataforma  de  Dados    Abertos ( Open Data )  Qualidade dos dados do   portal de dados aberto  •   75%  -  O  portal  contém  pu -  blicações de dados abertos   de  natureza  turística,  se -  guindo  os  modelos  inter -  nacionais e é utilizado por   10 y 20 atores externos;  Sistema  de  comuni -  cação bidirecional entre   a Administração e os Re -  sidentes Locais  Existência  de  ferra -  mentas para o envio de   informes,  incidências    e  avisos  por  parte  da    Administração  (avisos,    incidências,  denúncias    e avisos)  •   0%  -  Não  existem  ferra -  mentas.  Infraestruturas   Tecnológicas e   Conectividade  Conectividade  a  redes    móvel no destino  Conectividade  a  redes    móvel  •   100%:  Cobertura  5G  em    todo o território  Conectividade  nos  pon -  tos de interesse turístico,   atrativos  de  interesses    turísticos e Postos de In -  formação Turística (PIT)  Disponibilidade  de  Wifi    grátis nos Postos de In -  formação Turística  •  0% - Não disponibiliza Wifi   grátis nos PITs.  Tecnologia para a   Gestão Inteligente   do Turismo  Portal Web de Turismo   Existe  um  portal  Web    de  turismo  do  destino,    atualizado  nos  últimos    quatro  anos  com  cri -  térios  de  desenho  res -  ponsivo  •   100%  -  Existe  e  se  imple -  mentou no último ano  Atualização  do  conteú -  do do portal de turismo  •   30%  -  Atualiza  o  conteúdo    de  alguma  seção  da  web    ao menos, com frequência   semanal;  •   20%  -  Atualizam  os  con -  teúdos  de  forma  distribuí -  das  (associações  setoriais,    agentes privados);  •  10% - Biblioteca de conteú -  dos multimédia.  Fonte: Elaboração própria (2025). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 193  A Prefeitura Municipal de Belo Horizonte disponibiliza no website < https://dados.pbh.  gov.br/organization/ > dados abertos de 24 organizações  públicas  sob sua gestão, en -  tre elas da Belotour - Empresa Municipal de Turismo de Belo Horizonte com 11 conjun -  tos de dados, disponível em < https://dados.pbh.gov.br/organization/belotur >. Impor -  tante destacar que não foi possível aferir quantos atores externos fizeram/fazem uso   dos dados, entretanto, é uma das poucas entidades públicas de turismo que concedem   esses dados no Brasil.    Não foram identificadas a existência de ferramentas para o envio de informes, inci -  dências e avisos por parte da Administração (avisos, incidências, denúncias e avisos)   analisando o portal oficial de turismo < https://portalbelohorizonte.com.br/ >, da Pre -  feitura Municipal de Belo Horizonte < https://prefeitura.pbh.gov.br/belotur >.   Em  relação  a  cobertura  móvel  o  Município  possui  100%  de  cobertura  5G  disponibili -  zada  pelas  operadoras  Claro,  TIM  e  VIVO,  e  que  ambas  oferecem  seus  serviços  para    operadoras internacionais permitindo estrangeiros a usarem seus respectivos celula -  res (quando solicitado serviço/serviço contemplado no pacote de dados) (TELECO, s.f.).   Existem três Postos de Informações Turísticas (PITs), cujo papel (BELOTUR, 2025)  O papel dos Centros de Atendimento ao Turista (CATs) é prover informa -  ções,  recepção  e  acolhimento  aos  visitantes  da  cidade.  Nestes  espaços,    os turistas e moradores recebem informações sobre atrativos turísticos,   agenda cultural, agências de câmbio e turismo receptivo, espaços para   eventos, hospedagem, locadoras de veículos, opções gastronômicas, ro -  teiros turísticos, transporte ferroviário, rodoviário e aéreo, além de ma -  terial informativo e promocional de BH.  Os  PITs  estão  localizados  em  regiões  estratégicas  do  Município,  a  saber  o  Centro  de    Atendimento ao Turista - Álvaro Hardy (CAT Veveco), Sede Belotur e SESC Mercado das   Flores, entretanto, não há disponibilidade de Wifi nos PITs.  O  portal  oficial  de  turismo  é  < https://portalbelohorizonte.com.br/ >,  estruturado  em    cinco  idiomas:  português,  inglês,  francês,  alemão  e  espanhol,  permitindo  ao  turista/  residente a busca de informações sobre a cidade, eventos, lugares para ir, aonde ficar   e opções de negócios, sendo atualizado continuamente.   Disponibilizam  um  mapa  digital  em  português  e  inglês  que  identifica  os  atrativos  e    serviços turísticos e complementares com informações, entretanto, não permite a re -  comendação de conteúdos personalizados. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 194  Figura 1   Mapa digital em inglês.  Fonte: BELOTUR (s.f.).  O portal possui o VLibras, sistema de tradução automática para tornar computa -  dores, celulares e plataformas Web mais acessíveis para as pessoas surdas, sendo   resultado  de  uma  parceria  entre  o  Ministério  da  Gestão  e  Inovação  em  Serviços    Públicos  (MGISP),  por   meio  da  Secretaria  de  Governo  Digital  (SGD),  o  Ministério    dos  Direitos  Humanos  e  da  Cidadania  (MDHC),  por  meio  da  Secretaria  Nacional    dos Direitos da Pessoa com Deficiência (SNDPD), e a Universidade Federal da Pa -  raíba (UFPB), através do Laboratório de Aplicações de Vídeo Digital (LAVID) (BRA -  SIL/MGI, s.f.).  Também está estruturado para ser responsivo, adaptando-se automaticamente a di -  ferentes tamanhos de tela (como desktops, tablets e smartphones), com atualização de   conteúdos das diferentes abas frequentemente. Por fim, disponibilizam no portal um   link  para  os  vídeos  e  para  visita  virtuais  aos  principais  atrativos  turísticos  < https://  portalbelohorizonte.com.br/visitas-virtuais >.   Em síntese, Belo Horizonte (MG) demonstra forte desempenho em conectividade móvel   e na presença e atualização de seu portal turístico oficial, destacando-se na disponibi -  lização de dados abertos para o turismo. No entanto, enfrenta desafios significativos   na implementação de ferramentas de comunicação bidirecional com os residentes e   na oferta de Wi-Fi gratuito nos PITs, além da ausência de sistemas de recomendação   personalizada e newsletter no portal de turismo.   Belém , capital do Estado do Pará, localizado na região do Nordeste do Brasil, possui   uma  população  estimada  de  1.397.315     habitantes  (IBGE,  2025b)  tendo  serviços  como   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 195  fonte principal da economia, principalmente na área da Administração  Pública, polo   de  comércio da região e o turismo (SEBRAE, 2025).  Quadro 3   Análise dos âmbitos de tecnologia em Belém (PA).  Âmbito   Requisito   Indicadores   Como Avaliar  Tecnologias   aplicadas a   governança  Plataforma  de  Dados    Abertos ( Open Data )  Qualidade dos dados do   portal de dados aberto  •  0%: Não existe portal de da -  dos  abertos  próprio  e  nem    compartilha  data  set  no    portal web do ente gestor  Sistema  de  comuni -  cação bidirecional entre   a Administração e os Re -  sidentes Locais  Existência  de  ferra -  mentas para o envio de   informes,  incidências    e  avisos  por  parte  da    Administração  (avisos,    incidências,  denúncias    e avisos)  •   0%  -  Não  existem  ferra -  mentas.  Infraestruturas   Tecnológicas e   Conectividade  Conectividade  a  redes    móvel no destino  Conectividade  a  redes    móvel  •   100%:  Cobertura  5G  em    todo o território  Conectividade  nos  pon -  tos de interesse turístico,   atrativos  de  interesses    turísticos e Postos de In -  formação Turística (PIT)  Disponibilidade  de  Wifi    grátis nos Postos de In -  formação Turística  •  0% - Não disponibiliza Wifi   grátis nos PITs.  Tecnologia para a   Gestão Inteligente   do Turismo  Portal Web de Turismo   Existe  um  portal  Web    de  turismo  do  destino,    atualizado  nos  últimos    quatro  anos  com  cri -  térios  de  desenho  res -  ponsivo  •   100%  -  Existe  e  se  imple -  mentou no último ano  Atualização  do  conteú -  do do portal de turismo  •   30%  -  Atualiza  o  conteúdo    de  alguma  seção  da  web    ao menos, com frequência   semanal;  •   20%  -  Atualizam  os  con -  teúdos  de  forma  distribuí -  das  (associações  setoriais,    agentes privados);  •  10% - Biblioteca de conteú -  dos multimédia.  Fonte: Elaboração própria (2025). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 196  A ausência de um portal de dados abertos próprio, bem como a não disponibilização   de  data sets  no portal web do ente gestor, compromete significativamente a transpa -  rência e a participação cidadã, dificultando o acesso da sociedade civil, de pesquisado -  res e de organizações ao monitoramento e à análise das políticas públicas.   Também  dificulta  a  padronização  e  a  integração  de  dados  entre  diferentes   órgãos ,   reduzindo a eficiência administrativa e a capacidade de desenvolvimento de soluções   inovadoras por startups, empresas de tecnologia e instituições acadêmicas. Assim, a   carência de um portal próprio de dados abertos configura-se como um entrave à go -  vernança transparente, à inovação e ao desenvolvimento socioeconômico.   Sem canais digitais estruturados, a divulgação de informações torna-se lenta e frag -  mentada,  dificultando  a  comunicação  ágil  entre  governo  e  sociedade.  Além  disso,  a    ausência desses mecanismos limita a capacidade de resposta da administração dian -  te de problemas, reduzindo a efetividade das ações e atrasando a resolução de situa -  ções  críticas.  Consequentemente,  a  carência  dessas  ferramentas  representa  um  en -  trave à governança eficiente, à participação social e à tomada de decisão informada,   além de aumentar a sobrecarga operacional e a possibilidade de erros nos processos   administrativos.  A  conectividade  5G  contribui  para  a  melhoria  de  serviços   públicos,   incluindo  saúde,    educação,  mobilidade  urbana  e  segurança,  ao  possibilitar  monitoramento  e  gestão    em tempo real. Também promove a inclusão digital, ampliando o acesso da população   a oportunidades de trabalho remoto, educação e participação cidadã.   Por  fim,  a  infraestrutura  5G  apoia  práticas  de  sustentabilidade  urbana  e  eficiência    na  gestão  de  recursos,  ao  permitir  o  monitoramento  inteligente  de  energia,   água   e    resíduos, consolidando-se como um elemento estratégico para a inovação e o planeja -  mento de cidades resilientes e preparadas para o futuro digital.  Em relação ao website oficial, a Prefeitura Municipal de Belém possui a Secretaria de   Cultura  e  Turismo  tendo  como  website  o   https://prefeitura.belem.pa.gov.br/secreta -  rias/semcult-secretaria-municipal-de-cultura-e-turismo/ , entretanto, o website oficial   de  turismo  da  cidade  é  o   https://visitbelem.info/   sem  estar  referenciado  no  website    oficial da Prefeitura Municipal e/ou da Secretaria de Cultura e Turismo.  3.4.4. Reflexões  A  tecnologia  consolidou-se  como  um  elemento  transformador  e  facilitador  essencial    para a evolução do setor turístico, promovendo a competitividade, sustentabilidade,  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 197  acessibilidade e governança nos destinos. Ela impulsiona um modelo de gestão mais   inteligente, alinhando os interesses dos visitantes com as necessidades das comunida -  des locais.  O  papel  das  Tecnologias  de  Informação  e  Comunicação  (TICs)   é   fundamental,  espe -  cialmente porque o turismo é um setor intensivo em informação. As TICs mudaram a   forma como os viajantes buscam, consomem e compartilham experiências, elevando   a tecnologia de um suporte operacional para uma posição estratégica no desenvolvi -  mento do turismo.   Um aspecto central desse avanço é a gestão e análise de dados, que permite a perso -  nalização das experiências de viagem. A coleta e interpretação das preferências dos   turistas possibilitam a adaptação individualizada de serviços e produtos, aumentan -  do a satisfação e otimizando a alocação de recursos. As “experiências  físico- digitais”   ( phygital experiences ), refletem uma tendência onde a viagem se integra ao cotidiano   do  turista  através  de  interações  digitais,  criando  experiências   híbridas.  A   personali -  zação  extrema,  viabilizada  por  inteligência  artificial  e  análise  de  big  data,  é  um  dos    desdobramentos mais promissores, visando oferecer um atendimento semelhante ao   de um assistente pessoal.  O setor enfrenta desafios como a complexidade da propriedade dos dados, heteroge -  neidade de formatos, dificuldade na análise e compartilhamento de dados. A natureza   transversal da tecnologia é outro desafio, pois muitos indicadores não dependem di -  retamente da DMO ou da entidade local, e incluem a falta de planejamento estrutura -  do, falta de coordenação entre as áreas, gerando duplicações e implementações não   supervisionadas.  Importante  ressaltar  que  pequenos  destinos  geralmente  apresentam  menor  maturi -  dade tecnológica e menos recursos econômicos, além da pequena ou incipiente quali -  ficação dos recursos humanos e especialistas em reestruturação de bancos de dados,   conectividade  e  interoperabilidade,  o  que  dificulta  a  implementação  de  soluções  de    tecnologia.  Ao realizar uma reflexão sobre as cidades analisadas, Belo Horizonte (MG) se destaca   pela forte conectividade móvel 5G em todo o território e pela presença e atualização   contínua de seu portal turístico oficial, que é multilíngue e acessível (VLibras). A capi -  tal mineira é também um exemplo na disponibilização de dados abertos para o turis -  mo,  com  a  Belotour  concedendo  conjuntos  de  dados.  Contudo,  enfrenta  desafios  sig -  nificativos  na  ausência  de  ferramentas  de  comunicação  bidirecional  com  residentes   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 198  e turistas, e na falta de Wi-Fi gratuito nos Postos de Informação Turística (PITs). Além   disso, o portal não oferece sistemas de recomendação personalizada nem newsletter.  Já  Belém  (PA)  também  apresenta  um  desempenho  robusto  em  conectividade  móvel    5G,  que  é  fundamental  para  a  melhoria  de  serviços   públicos,   inclusão  digital  e  sus -  tentabilidade urbana. Possui um portal web de turismo atualizado. No entanto, suas   maiores lacunas estão na governança digital, com a ausência de um portal de dados   abertos próprio ou compartilhamento de dados, o que prejudica a transparência e a   capacidade de inovação. Assim como Belo Horizonte, Belém carece de ferramentas de   comunicação bidirecional e de Wi-Fi gratuito nos PITs. Outro ponto de atenção é que   o portal de turismo da cidade não está claramente referenciado nos canais oficiais da   prefeitura.  Ambas  as  cidades  precisam  investir  na  melhoria  da  comunicação  bidirecional  e  na    oferta de Wi-Fi gratuito em pontos turísticos para aprimorar a experiência do visitan -  te e a participação cidadã. Belém (PA), em particular, urge em desenvolver uma estra -  tégia para dados abertos, enquanto Belo Horizonte (MG) estruturar a personalização   do conteúdo de seu portal turístico.  Referências bibliográficas  Andrades,  L.,  Romero-Dexeus,  C.,  &  Martínez-Marín,  E.  (Eds.).   (2024).    The  Spanish    Model for Smart Tourism Destination Management: A Methodological Approach .   Tourism,  Hospitality  &  Event  Management.  Cham,  Switzerland:  Springer  Nature.    https://doi.org/10.1007/978-3-031-60709-7  Belotur – Empresa Municipal de Turismo de Belo Horizonte. (s.f).  Digital Map .  https://  portalbelohorizonte.com.br/digital-maps-en .   Chen,  S.,  Law,  R.,  Zhang,  M.,  &  Si,  Y.  (2021).   Mobile  Communications  for  Tourism  and    Hospitality:  A  Review  of  Historical  Evolution,  Present  Status,  and  Future  Trends.    Electronics, 10 (15), 1804.  https://doi.org/10.3390/electronics10151804 .  Deputat,  M.,  Podolian,  M.,  Zhupnyk,  V.,  Terletska,  K.,  &  Gorishevskyy,  P.  (2024).   Evolu -  tion of information systems and technologies in the hospitality and tourism sector:   A historical perspective .  Multidisciplinary Science Journal, 6 , 2024ss0729.  https://  doi.org/10.31893/multiscience.2024ss0729  Garbani-Nerini, E., Marchiori, E., y Cantoni, L. (2022). Destinations and Data State-of-  the-Art in Switzerland and Liechtenstein. In: Stienmetz, J.L., Ferrer-Rosell, B., Mas - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.4. Eje Tecnología 199  simo, D. (eds) Information and Communication Technologies in Tourism 2022.  EN -  TER 2022. Springer, Cham.  https://doi.org/10.1007/978-3-030-94751-4_18  Instituto  Brasileiro  de  Geografia  e  Estatística  –  IBGE.  (2025   Belo  Horizonte .  Cidades.    https://cidades.ibge.gov.br/brasil/mg/belohorizonte/panorama    Instituto  Brasileiro  de  Geografia  e
