iversidade Federal de Santa Catarina, Brasil.   4.1. Introdução  A governança econômica global ingressa em uma nova era impulsionada pela trans -  formação digital, impulsionada pós-pandemia. A economia digital deixou de ser ape -  nas um motor relevante para a recuperação e o crescimento da economia, tornando -  -se também uma força central na reconfiguração do desenvolvimento industrial e na   redefinição do cenário competitivo em escala global (Fua et al., 2025).   A Transformação Digital (TD) redefiniu o cenário empresarial, possibilitando  às  orga -  nizações ampliarem a eficiência, estimular a inovação e elevar a satisfação dos clien -  tes.  Mais  do  que  a  simples  adoção  de  ferramentas  digitais,  trata-se  de  um  processo    estratégico de ponta a ponta, que demanda mudanças estruturais e culturais dentro   da organização. Esse movimento favorece o investimento em inovação, ao promover   melhor desempenho e reduzir barreiras econômicas (Manzoor et al.2025).  A  transformação  digital  pode  ser  compreendida  como  um  processo  estratégico    voltado  à  obtenção  de  vantagem  competitiva  diante  das  mudanças  emergentes    possibilitadas  pelas  tecnologias  digitais.  Em  uma  perspectiva  microeconômica,    manifesta-se na reconfiguração das organizações que buscam sua adaptação para   o  modelo  de  negócio  digital.  No   âmbito   macro,  a  convergência  dessas  iniciativas    individuais  resulta  em  um  movimento  mais  amplo  de  reestruturação  econômica    e  social,  caracterizando  um  processo  sistêmico  de  transformação  digital.  Assim,    a  transformação  digital  transcende  a  mera  adoção  de  ferramentas  tecnológicas,    configurando-se  como  um  fenômeno  que  incorpora  inovações  nos  processos  or -  ganizacionais e institucionais, promovendo mudanças estruturais e assegurando   às   organizações  relevância  e  sustentabilidade  em  um  futuro  que  já  se  apresenta    como presente (Milhossi et al., 2023). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   283  A Transformação Digital (TD)  é  um processo abrangente que integra tecnologias digi -  tais em todas as áreas de um negócio, alterando fundamentalmente a forma como as   organizações operam e entregam valor aos clientes. Não se trata apenas de uma atua -  lização tecnológica, mas de uma reconfiguração estratégica que afeta a estrutura, a   cultura, os processos e as funções dos colaboradores (Dragan, 2021).  Lei,  Indiran  y  Kohar  (2023)  citam  que  a  TD  se  refere  à  reestruturação  de  tecnologia,    modelos de negócios e processos de negócios com o objetivo de fornecer novo valor a   clientes e colaboradores em conjunto com o desenvolvimento e a mudança adaptati -  va da economia digital. A transformação digital não apenas resolve problemas, mas   também rompe práticas, processos e indivíduos estabelecidos envolvidos no sucesso   da transformação (Michou et al., 2025).  Na  era  da  transformação  digital  e  da  rápida  disrupção  tecnológica,  a  avaliação  do    desempenho deve ir além dos indicadores financeiros tradicionais para abranger di -  mensões não financeiras, como capacidade de inovação, satisfação do cliente, engaja -  mento dos funcionários e desenvolvimento sustentável (Nguyen et al., 2025).  Furr et al. (2022) destacam que a TD se consolidou como um tema central na econo -  mia  global;  entretanto,  seu  real  significado  para  empresas  já  estabelecidas  ainda    gera  questionamentos  tanto  no  meio  acadêmico  quanto  no  campo  profissional.  Ao    redefinir e dissolver fronteiras geográficas, industriais e organizacionais, o fenôme -  no  digital  tem  sido,  por  vezes,  reduzido  a  caracterizações  simplistas,  como  a  ideia    de  que  o  digital  muda  tudo.  Nesse  contexto,  os  autores  destacam  três  tensões  fun -  damentais que permeiam o processo de transformação digital: produtos versus pla -  taformas, empresas versus ecossistemas e pessoas versus ferramentas. Ressaltam,   ainda, que a transformação digital não deve ser compreendida como um estado fixo   ou objetivo, mas como uma escolha estratégica dos executivos diante de múltiplas   alternativas possíveis.  Entretanto, para Pinho e Gaspar (2023), a transformação digital precisa superar pa -  radigmas ultrapassados e promover uma nova mentalidade, voltada à otimização de   processos, à melhoria dos resultados e à busca contínua por eficiência. Citam a neces -  sidade de compreender os cinco domínios de TD sendo: i) clientes, ii) competição, iii)   dados, iv) inovação e v) valor, representadas no quadro 1. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   284  Quadro 1  Da era analógica à transformação digital.  Domínio   Era Analógica   Era TD  Clientes   Comunicação transmitida aos clientes;  A empresa é o principal influenciador;  Marketing para induzir a compra;  Fluxos de valor de mão única;  Comunicação em mão dupla;  O cliente é o principal influenciados;  Marketing para inspirar a compra;  Fluxos de valor recíproco;  Economias de valor (cliente).  Competição   Concorrência dentro das indústrias   definidas;  Competição é um jogo de soma zero;  Os principais ativos são mantidos   dentro da empresa.  Concorrência através das indústrias   definidas;  Os concorrentes cooperam em áreas chave;  Principais ativos residem em redes   externas.  Dados   Desafios dos dados é armazená-lo e   gerenciá-lo;  As empresas utilizam apenas dados   estruturados;  Os dados são uma ferramenta para   otimizar processos.  Desafio dos dados é transformá-lo em   informações valiosas;  Dados desestruturados são cada vez mais   utilizáveis e valiosos;  Os dados são um ativo intangível   fundamental para a criação de valor.  Inovação   Testar ideias é caro, lento e difícil;  O desafio da inovação é encontrar a   solução certa;  O foco está no produto “acabado”.  Testar ideias é barato, rápido e  fácil;  Desafio da inovação é resolver o problema   certo;  Foco em protótipos viáveis e em interação   após o lançamento.  Valor   Executar a proposta de valor atual;  Julgar a mudança por como ela afeta o   seu negócio atual;  Proposição de valor definida pela   indústria.  Descobrir  a próxima  oportunidade de   criar;  Julgar a mudança por como ela poderia   criar o seu próximo negócio;  Proposição de valor definida pela mudança   das necessidades dos clientes.  Fonte: Adaptado de Pinho et al., (2023).  Na era do rápido avanço tecnológico e da Quarta Revolução Industrial, a transformação   digital  emergiu  como  um  motor  crítico  que  remodelou  as  indústrias  em  todo  o  mundo,    incluindo o setor do turismo e da hospitalidade. Os estudos existentes concentram-se prin -  cipalmente nos efeitos da transformação digital nos setores de manufatura ou financeiro,   com relativamente menos atenção dada  às  empresas de turismo (Zhao et al., 2025).  Complementam Zhao et al. (2025) que a investigação acerca das consequências econô -  micas da transformação digital avançou de análises centradas nos efeitos da adoção  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   285  tecnológica para um paradigma interdisciplinar, que integra aportes da gestão estra -  tégica, das finanças corporativas e da economia da informação. No  âmbito  dos seto -  res de serviços, tais consequências assumem características singulares. Enquanto no   setor manufatureiro a digitalização está fortemente associada à busca por eficiência   produtiva,  nas  empresas  de  serviços  o  foco  recai  sobre  a  geração  de  valor  nos  dife -  rentes pontos de contato com o cliente, configurando um processo de transformação   orientado pela experiência e pela personalização”.  Dragan (2021) descreveu que a TD é impulsionada por uma ampla gama de tecnologias di -  gitais que são integradas em todas as áreas de um negócio, mudando fundamentalmente   a forma como as organizações operam e entregam valor aos clientes, reconfiguram seus   modelos de negócios, otimizam os processos operacionais, o aprimoramento da experiên -  cia do cliente e o estímulo à inovação. Para Hue et al. (2025), o TD transcende a mera imple -  mentação de ferramentas digitais, representando uma reinvenção estratégica de modelos   de negócio, métodos de engajamento do cliente e cultura organizacional.  Madzik et al. (2023) fizeram um estudo bibliométrico referente aplicação da TD no tu -  rismo entre os anos de 2013 e 2022 e identificaram algumas fases, a saber:  •  Transformação de informações analógicas em digitais e utilização de tecnolo -  gias digitais para transformar processos de negócios existentes;  •  Mudança em toda a empresa que leva ao desenvolvimento de novos modelos de   negócios;  •  Adoção de uma ampla gama de tecnologias tais como aplicações móveis, inteli -  gência artificial (IA), realidade aumentada (RA) e realidade virtual (RV), big data   e análise de dados, computação em nuvem, internet das coisas (IoT), blockchain,   sistemas de gestão de propriedades (PMS) e sistemas de reservas online e CRM.  Os resultados da pesquisa Madzik et al. (2023) descreveram como a TD pode ser impul -  sionador e gerar oportunidades para o setor do turismo a partir:  •  Melhora da Experiência do Cliente e Personalização: Ferramentas digitais per -  mitem  personalizar  serviços  com  base  em  preferências  individuais,  usando    análise  de  dados  e  IA  para  criar  itinerários  de  viagem  personalizados,  preços    dinâmicos e programas de fidelidade;  •  Expansão do Acesso ao Mercado:  Online Travel Agencies  - OTAs, aplicativos mó -  veis e plataformas de mídia social permitem que empresas, incluindo pequenas   e médias (PMEs), alcancem mercados globais de forma eficaz e com baixo custo; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   286  •  Otimização de Operações e Redução de Custos: A automação de processos de re -  serva, sistemas de check-in/out sem contato, tecnologias de quartos inteligentes   e chatbots com IA aumentam a eficiência operacional e reduzem a necessidade   de pessoal e erros humanos;  •  Tomada de Decisão Orientada por Dados: O acesso a dados em tempo real permi -  te decisões mais precisas sobre preços, gestão de estoque e estratégias de marke -  ting. O uso de “big social data” e conteúdo gerado pelo usuário se tornou crucial   para entender o comportamento do turista e cocriar experiências de valor;  •   Promoção  do  Turismo  Inteligente  e  Sustentável:  A  TD  é  fundamental  para  a    transição verde e o desenvolvimento regional, permitindo a adoção de práticas   sustentáveis e a melhoria das capacidades de inovação; e  •  Resiliência e Adaptação a Crises: A pandemia de COVID-19 acelerou a TD, desta -  cando sua importância para a recuperação e a res  A TD é impulsionada por uma combinação sinérgica dessas tecnologias, que juntas per -  mitem a reconfiguração de modelos de negócios, a otimização de operações, o aprimo -  ramento da experiência do cliente e a promoção da inovação, representado no quadro 2.  Quadro 2  Principais tecnologias que impulsionam a TD.  Tecnología   Explicação   Autor  Inteligência Artificial (IA)   e Aprendizado de Máquina   (ML)  Estas tecnologias são cruciais para a análise apro -  fundada de grandes volumes de dados, permitindo   a automação de processos, a personalização de   serviços e a tomada de decisões orientada por da -  dos. A IA pode adaptar produtos e agregar valor   ao viajante no planejamento e tomada de decisões.   Ferramentas como chatbots e sistemas de recon -  hecimento inteligente também se enquadram   aqui. Na gestão de conhecimento, a IA generativa   está revolucionando a forma como o conhecimen -  to é convertido de tácito para explícito e acessível  Thomas (2024),    Ye et. al. (2025)  Big Data e Análise de Dados   Permitem coletar, integrar e analisar grandes   volumes de dados em tempo real, o que é funda -  mental para a otimização da tomada de decisões,   estratégias de precificação, gestão de estoque e   marketing.  Hue et at. (2025) \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   287  Tecnología   Explicação   Autor  Internet das Coisas (IoT)   Essencial para a interconectividade de dispositivos   e a coleta de dados em tempo real. No turismo,   pode ser usada para monitoramento ambiental   mais preciso e para sistemas de quartos   inteligentes.  Ye et. al. (2025), Hue   et at. (2025)  Computação em Nuvem e   Armazenamento de Dados   Online  Facilitam o acesso e a gestão de dados e   aplicações, suportando a centralização de   informações e a flexibilidade operacional.  Lei et al. (2023),   Thomas (2024)  Plataformas Digitais e   Aplicativos Móveis  Permitem reservas online, comunicação com   clientes, feedback e troca de experiências.   Aplicativos móveis e mídias sociais são   amplamente utilizados para alcançar mercados   globais.  Hue et at. (2025),   Thomas (2024)  Realidade Virtual (RV) e   Realidade Aumentada (RA)  Oferecem oportunidades para experiências   imersivas e aprimoram a compreensão   situacional. A RV é percebida como um grande   benefício para tours virtuais  Balula (2019), Lei et   al. (2023)  Blockchain   Pode ser utilizada para aumentar a transparência   e a autenticidade de investimentos em projetos   ambientais, bem como a responsabilização da   empresa em transações de finanças verdes.   Também pode reconfigurar as arquiteturas de   confiança no turismo digital.  Ye et al. (2025),   Zhang, Papp-Váry e   Szabó (2025)  Redes Sociais e Portais de   Internet  São as tecnologias digitais mais amplamente   utilizadas por Micro, Pequenas e Médias   Empresas (MPMEs) no turismo para marketing e   publicidade.  Lei et al. (2023)  Automação de Processos   Robóticos (RPA)  Automatiza tarefas repetitivas e baseadas em   regras, melhorando a eficiência.  Baranyi (2025)   Sistemas de Gestão de Pro -  priedades (PMS) baseados   em nuvem e sistemas de   check-in/out sem contato  Aumentam a eficiência operacional e reduzem a   necessidade de pessoal no setor de hospitalidade  Hue et at. (2025)  Softwares e Ferramentas de   Comunicação  O desenvolvimento de ferramentas de   comunicação e tecnologias de rede desde os anos   90 permitiu que as empresas centralizassem o   controle e o gerenciamento de máquinas.   Laouenana (2022)   Fonte: Autores. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   288  Apesar  das  inúmeras  oportunidades  existem  desafios  significativos  na  implementa -  ção de TD no setor do turismo, especialmente para as PMEs. A ausência de habilidades   digitais  entre  os  indivíduos,  incluindo  funcionários  e  proprietários  de  PMEs,  é  uma    barreira primordial (Lei et al., 2023). Isso inclui a falta de conhecimento em TI, tomada   de decisões sobre tecnologias e conhecimento de processos (Vogelsang et al., 2019).  As  barreiras  organizacionais  e  culturais,  baseada  em  uma  mentalidade  tradicional    e a falta de conscientização digital podem impedir a adoção de novas tecnologias. A   resistência à mudança cultural e a manutenção de papéis convencionais também são   obstáculos (Lei et al., 2023; Vogelsang et al., 2019).  Outro  fator  como  incipiente  de  recursos  financeiros,  infraestruturas  digitais  inade -  quadas  (especialmente  em  áreas  rurais),  e  lacunas  nas  políticas  e  regulamentações    são desafios importantes (Lei et al., 2023; Dredge et al., 2019). A TD, embora benéfica   a longo prazo, pode gerar custos de ajuste no curto prazo e exacerbar o descompasso   entre investimento e financiamento para empresas com restrições financeiras (Zhao   y Mao, 2025; Hu et al., 2024).  Corroboram os desafios com a carência de estratégia de implementação e avaliação   eficazes  por  parte  das  organizações,  pois  a  complexidade  do  ambiente  digital  exige    uma  compreensão  abrangente  dos  desafios  (Michou  et  al.,  2025).  Os  problemas  dos    dados e a medição da TD pode ser desafiadora devido a discrepâncias de localização,   lacunas  de  comercialização  e  inconsistências  na  implantação  espacial  de  dados  de    patentes (Zhang et al., 2024).  4.2. Impactos na TD no desempenho e inovação no setor do turismo  Inicia-se pelo aprimoramento da experiência do cliente e personalização com base nas   preferências individuais dos clientes é viabilizada pela análise de dados e pela aplica -  ção de Inteligência Artificial (IA). Esses recursos possibilitam a criação de itinerários   de viagem sob medida, a definição de preços dinâmicos e o desenvolvimento de pro -  gramas de fidelidade mais eficazes (Hue et al. 2025, Santarsiero et al. 2024).  •   O  planejamento  de  viagens,  o  check-in  e  a  solicitação  de  serviços  podem  ser    realizados diretamente pelo smartphone, reduzindo a necessidade de interação    física.  •  As plataformas digitais de turismo oferecem aos clientes a possibilidade de efe -  tuar reservas online, fornecer feedback e compartilhar experiências. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   289  •  A atratividade dos destinos é ampliada com a disponibilização de serviços ino -  vadores que atendem  às  demandas dos viajantes, como tours virtuais e expe -  riências imersivas.  A  otimização  de  operações  e  redução  de  custos  a  partir  da  automação  de  processos    de reserva, os sistemas de check-in e check-out sem contato, as tecnologias de quartos   inteligentes e os chatbots baseados em Inteligência Artificial (IA) contribuem para o   aumento da eficiência operacional, reduzindo tanto a necessidade de intervenção hu -  mana quanto a ocorrência de erros. Além disso, sistemas de gestão de propriedades   (Property Management Systems – PMS) em nuvem otimizam a coordenação e o con -  trole das operações (Santarsiero et al. 2024, Zhang, Han, Yang, Akylbekova, Ilyashovi -  ch e Ibraimova, 2025).   Evidências  empíricas  indicam  que  a  transformação  digital  (TD)  pode  proporcionar    ganhos significativos, como a redução do tempo de ciclo em 19,7% e da taxa de erros   em 28,9%, bem como o aumento do rendimento. Dessa forma, a TD promove ganhos de   eficiência e produtividade, resultando em vantagens competitivas, redução de custos   de mão de obra e menores custos de transação. (Sundu et al., 2022).   A  expansão  do  acesso  ao  mercado  e  vantagem  competitiva  utilizando  os  aplicati -  vos  móveis,  plataformas  de  mídias  sociais  e  integração  com   Online  Travel  Agencies    (OTAs), permitem que empresas, incluindo Micro, Pequenas e Médias Empresas (MP -  MEs),  alcancem  mercados  globais  de  forma  eficaz  e  com  baixo  custo.  A  networking    social constitui uma das tecnologias digitais mais empregadas pelas MPMEs do setor   de turismo para fins de marketing e publicidade, possibilitando oportunidades de ex -  pansão  de  mercado,  acelerando  o  crescimento  e  favorecendo  o  desenvolvimento  de    vantagens competitivas (Lei et al. 2023, Li et al., 2024).  Outro fator em destaque é a tomada de decisão baseada em dados. O acesso a dados   em tempo real possibilita  às  empresas tomarem decisões mais precisas em relação à   precificação,  à  gestão  de  estoque  e   às   estratégias  de  marketing.  Ferramentas  avan -  çadas de análise permitem identificar tendências de mercado, padrões de comporta -  mento dos clientes e gargalos operacionais, favorecendo o desenvolvimento de estra -  tégias mais flexíveis e adaptativas (Li et al, 2024, Cuomo et al., 2021).  A pandemia de Covid-19 trouxe o que os especialistas citam como “aceleração a digita -  lização”, muito mais por uma necessidade de adaptação a crise do que planejado. Isto   resultou no setor de turismo a chamada resiliência a crise. Empresas com maior nível   de TD demonstraram uma capacidade mais robusta para lidar com a volatilidade du - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   290  rante a pandemia, portanto, se adaptem rapidamente  às  mudanças do mercado atra -  vés de análises de dados em tempo real e sistemas de tomada de decisão inteligentes   (Lei et al. 2023, Liu et al., 2025).  A  questão  da  melhora  na  sustentabilidade  e  eficiência  financeira  verde  é  reforçada    pela  TD  que  facilita  que  as  empresas  de  turismo  acessem  instrumentos  financeiros    verdes, reduzam os custos de financiamento e otimizem a alocação de capital, efeito   especialmente significativo para empresas com classificações de crédito mais baixas.   A  transformação  digital  (TD),  aliada   às   práticas  de  ESG  ( Environmental,  Social,  and    Governance ), potencializa a inovação verde ao possibilitar a coleta e o processamento   de dados ambientais em tempo real, promovendo maior transparência e responsabi -  lidade ambiental (Ye et al., 2025, Li et al, 2024).  Por outro lado, a TD remete a capacidade de inovação digital e inovação de modelos   de negócios no setor, a partir do fomento à inovação integrado com áreas transver -  sais, com a utilização de ferramentas digitais como marketing online, e-governança,   aplicativos móveis e engajamento comunitário para resolver desafios de desenvolvi -  mento. Além do desenvolvimento de novos produtos e serviços, como experiências de   Realidade Virtual (RV) e Realidade Aumentada (RA) para enriquecer a experiência tu -  rística e criar modelos de turismo inteligente (Li et al, 2024, Rahayu et al., 2025).  Destaca-se também a inovação aberta e colaboração entre stakeholders, a cocriação   de  serviços  e  experiências,  e  a  transformação  organizacional.  Clientes,  por  exemplo,    tornam-se  valiosas  fontes  de  ideias  para  a  melhoria  de  serviços  através  de  avalia -  ções online, e as plataformas digitais tornam-se um meio importante para a inovação   aberta (Pinhal et al., 2025).   Ao mesmo tempo, a inovação aberta e colaborativa propicia a formação dos Labora -  tórios  de  Inovação  ( Innovation  Labs )  que  funcionam  como  catalisadores,  democra -  tizando  o  acesso  à  tecnologia  e  à  inovação  para  MPMEs,  promovendo  a  cocriação  e    superando estruturas hierárquicas  rígidas.  Esses laboratórios oferecem o ambiente e   os recursos necessários para o desenvolvimento e a experimentação de novos modelos   de negócios (Santarsiero et al., 2024).  Por fim, aplicação da TD na acessibilidade no turismo. Ndhlovu et. al. (2024) ressaltam   que  a  acessibilidade  torna  o  turismo  mais  inclusivo  e  garante  a  inclusão  de  grupos    marginalizados.  Na  pesquisa  realizada  exaltam  que  a  quarta  revolução  industrial    trouxe ferramentas digitais que podem promover o turismo inclusivo e acessível. Es -  sas ferramentas incluem: \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   291  •  sistemas ciberfísicos (CPS): Sistemas físicos e virtuais integrados e interconec -  tados baseados em sistemas de computação, comunicação e controle;   •  Internet das Coisas (IoT): envolve interconectividade entre dispositivos físicos e   mundos cibernéticos;  •  realidade aumentada (RA): envolve a combinação de objetos reais e virtuais em   um ambiente real, sincronizando objetos reais e virtuais e interação em 3D e em   tempo real;  •  realidade virtual (RV): é um ambiente simulado por computador (3D) que dá ao   usuário a experiência de estar presente naquele ambiente;  •  inteligência artificial (IA) e robótica: priorizando a diversidade, a equidade e a   dignidade humana, garantindo que a IA sirva ao bem-estar e ao progresso de   todos os indivíduos (Khan, 2024); e   •  big data.  A Transformação Digital é um imperativo estratégico para o setor de turismo e hospi -  talidade, impulsionando a inovação, a competitividade e a resiliência. Embora ofereça   vastas  oportunidades  para  melhorar  a  experiência  do  cliente,  otimizar  operações  e    promover  o  desenvolvimento  sustentável,  o  caminho  para  a  TD  é  pavimentado  com    desafios como a falta de habilidades, infraestrutura inadequada e barreiras culturais.   O sucesso requer uma abordagem holística que combine investimentos tecnológicos   com o desenvolvimento de capacidades organizacionais, estratégias claras e um am -  biente de governança favorável. A compreensão profunda dos impulsionadores e bar -  reiras, bem como a adoção de metodologias de pesquisa avançadas, são cruciais para   navegar nesta paisagem em constante evolução.  4.3. Cases de aplicação de TD em turismo  Estudo realizado por Lei et al. (2023) em Bali (Indonésia), um destino turístico interna -  cionalmente  conhecido,  onde  o  setor  do  turismo  de  Bali  serve  como  referência  para    o  setor  turístico  indonésio.  Objetivo  do  estudo  foi  analisar  as  barreiras  enfrentadas    durante  a  transformação  digital  e  identificar  as  tecnologias  digitais  específicas  em -  pregadas por elas.   Foram realizadas entrevistas com gestores de seis MPMEs sediadas em Bali onde iden -  tificaram três obstáculos principais em seis pequenas empresas de turismo: falta de   habilidades  digitais,  obstáculos  organizacionais  e  culturais  e  restrições  ambientais.   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   292  Os  resultados  das  entrevistas  mostram  que  a  incompetência  digital  é  mais  comum    do que a escassez de recursos. A infraestrutura digital insuficiente e uma mentalida -  de tradicional também impedem a digitalização. A escassez de talentos financeiros e   digitais foi mencionada, mas o número de vezes é limitado. O tamanho da empresa, a   maturidade em digitalização e o nível de educação dos respondentes estão fortemente   associados à forma como as empresas responderam  às  barreiras.  De acordo com os resultados, os principais impedimentos são (1) a falta de habilidades   digitais  do  indivíduo,  (2)  barreiras  organizacionais  e  culturais,  como  uma  mentali -  dade tradicional sem consciência digital, e (3) barreiras ambientais, como a falta de   recursos e infraestruturas digitais. Além disso, a pesquisa revela que as redes sociais   são a tecnologia digital mais amplamente utilizada pelas MPMEs em Bali. O portal da   internet  oferece   às   PMEs  opções  complementares  de  marketing  e  publicidade.  Esta    pesquisa  aprimora  nossa  compreensão  da  situação  atual  das  MPMEs  relacionadas    ao  turismo  na  Indonésia  e  enriquece  o  estudo  acadêmico  sobre  MPMEs.  Além  disso,    fornece uma referência para empreendedores em processo de transformação digital   (Lei et al., 2023).  Michou e Richet (2025) realizaram um estudo longitudinal conduzido para investigar o   surgimento de desalinhamentos estratégicos em um grande sistema de suprimentos du -  rante uma iniciativa de transformação digital na maior empresa de turismo do mundo   (Disneyland  Paris).  Analisaram  a  interação  entre  desalinhamentos  estratégicos  emer -  gentes, a complexidade intrínseca da rede de suprimentos e seu impacto no sucesso da   transformação digital. Adotando a perspectiva teórica da rede de suprimentos adapta -  tiva complexa (CASN), examinaram a complexidade do ambiente interno da rede.   Concluíram que ao integrar perspectivas estruturais e operacionais, existe a necessi -  dade de uma abordagem holística para a transformação digital — uma abordagem   que alinhe a evolução tecnológica à reestruturação organizacional e  às  expectativas   das partes interessadas. Propuseram a adoção de modelos de tomada de decisão que   incorporem  dimensões  sociais  e  culturais,  assegurando  que  os  avanços  tecnológicos    sejam  efetivamente  integrados  aos  processos  operacionais.  Na  prática,  isso  implica    fortalecer capacidades analíticas, implementar estratégias robustas de gestão de mu -  danças e fomentar a coordenação interfuncional, de modo a sustentar o alinhamento   ao longo de toda a jornada de transformação (Michou et al., 2025).  Hue et al. (2025) realizaram uma pesquisa referente a transformação digital na gestão   do turismo e da hospitalidade no Vietnã - um país rico em patrimônio cultural e pai - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   293  sagens  naturais  diversificadas  onde  o  setor  do  turismo  tem  importância  econômica    estratégica. No entanto, a realidade dos resultados revelou que o nível de adoção da   tecnologia digital no setor permanece limitado e fragmentado.   Embora grandes corporações e redes hoteleiras internacionais tenham investido ati -  vamente em sistemas de gestão inteligentes, plataformas digitais e big data, a maioria   das pequenas e médias empresas (PMEs) – que representam mais de 80% de todas as   empresas  do  setor  –  continua  enfrentando  inúmeros  desafios  relacionados  a  finan -  ças, recursos humanos e conscientização digital. Citam também, as disparidades na   infraestrutura tecnológica entre as regiões, a falta de coordenação entre as partes in -  teressadas e as deficiências políticas têm dificultado coletivamente o ritmo e a eficácia   dos esforços de digitalização (Hue et al., 2025).  Por fim, a pesquisa destacou que o sucesso não reside em investimentos tecnológicos   isolados, mas em uma estratégia abrangente que conecte infraestrutura, recursos hu -  manos, estruturas institucionais e uma cultura de inovação. À medida que o setor vem   se  recuperando  da  COVID-19,  a  prontidão  digital  determinará  sua  adaptabilidade  e    potencial de crescimento. As partes interessadas devem colaborar para garantir que   a  transformação  digital  ofereça  benefícios  inclusivos,  abrangentes  e  adequados  ao    contexto, alinhados  às  metas nacionais de desenvolvimento (Hue et al., 2025).   Santarsiero et al. (2024) exploraram uma área da inovação ainda incipiente em pes -  quisas na área de turismo que são os sistemas de inovação aberta a partir dos Labora -  tórios de Inovação (Innovation Labs). No contexto de rápida transformação digital, os   Laboratórios de Inovação emergem como agentes cruciais de mudança, embora sua   aplicação  no  setor  de  turismo  ainda  seja  pouco  explorada.  A  pesquisa  abordou  essa    lacuna por meio de múltiplos estudos de caso e de um projeto de pesquisa-ação focado   em turismo. Os resultados indicaram que os Laboratórios de Inovação impulsionam   significativamente a capacidade de inovação digital, promovem a transformação di -  gital e favorecem a inovação nos modelos de negócios das organizações de turismo.  No  cenário  digital  em  rápida  transformação,  os  Laboratórios  de  Inovação  torna -  ram-se agentes essenciais de transformação, mas sua aplicação no turismo perma -  nece pouco explorada. Este estudo aborda essa lacuna por meio de múltiplos estudos   de caso e um projeto de pesquisa-ação focado em turismo. As descobertas revelam   que  os  Laboratórios  de  Inovação  impulsionam  significativamente  a  capacidade  de    inovação  digital,  a  transformação  digital  e  a  inovação  do  modelo  de  negócios  em    organizações de turismo.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   294  Por  fim,  a  pesquisa  oferece  uma  visão  abrangente  das  principais  dimensões  a  serem    consideradas ao projetar e gerenciar um Laboratório de Inovação para desenvolver a   capacidade de inovação digital e promover a DT e a BMI em organizações, especialmen -  te no setor de turismo. Gestores e profissionais são equipados com uma estrutura para   apoiar  o  design  e  a  execução  de  jornadas  de  inovação  digital  com  o  objetivo  de  criar    soluções digitais comercializáveis, aprimorar o desempenho e promover uma mentali -  dade de aprendizado e inovação contínuos. Essas conclusões destacam o papel dos La -  boratórios de Inovação como principais impulsionadores da inovação, fornecendo insi -  ghts valiosos tanto para acadêmicos quanto para profissionais (Santarsiero et al. (2024).  Cuomo et al. (2021) citam que a TD mudou completamente a interação entre demanda   e oferta no setor de viagens, afetando amplamente a jornada do cliente. O chamado   “big  social  data”  e  o  conteúdo  gerado  pelo  usuário  tornaram-se  fontes  essenciais  de    conhecimento rico e oportuno, apoiando abordagens de decisão baseadas em dados   que abordam a gestão de relacionamentos complexos. Com base nesse arcabouço teó -  rico, os autores sugerem como aplicar o “big social data” no co-design da experiência   turística, proporcionando maior valor para os visitantes e uma melhor abordagem de   tomada de decisão para os gestores.  Do ponto de vista gerencial, a pesquisa revelou um novo caminho para o co-design da   experiência turística, baseado no uso produtivo de Big Data Social, tanto para merca -  dos quanto para negócios. Do lado da oferta, uma abordagem de Big Data Social pode   auxiliar os tomadores de decisão a gerenciarem o design de serviços orientado ao clien -  te (lógica de serviço dominante) e a prestação de serviços, a fim de planejar melhor a   comunicação  externa,  influenciando  a  qualidade  esperada  e  enriquecendo  as  percep -  ções da gestão. Do lado da demanda, novos insights para a experiência turística podem   emergir dos novos perfis do turista cultural ilustrados na pesquisa (Cuomo et al. (2021).  4.4. Visão governamental na transformação digital em turismo  Buscou-se compreender a perspectiva dos Governos Centrais em relação  às  políticas e   planos de Transformação Digital implementados no país, bem como sua conexão com   o desenvolvimento do turismo no período de 2023 a 2025.  4.4.1. Argentina  No ano 2023, o Governo da Argentina apresenta o Plano Estratégico de Transforma -  ção Digital, da Secretaria de Gestão Administrativa vinculado ao Ministério de Obras  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   295  Públicas,  cuja  missão  era  integrar  a  tecnologia  em  todos  os  aspectos  da  gestão  da    obra pública, gerando mudanças na cultura organizacional, o desenho dos processos   inovadores e novas formas de medir os impactos e da entrega de valor a comunidade   (Ministério de Obras Públicas da República Argentina, 2023).  Foco do plano estava estruturado em três eixos principais, sendo: eficiência, integra -  ção e melhora nos processos de gestão; a transparência e proximidade com o cidadão;   e a inovação tecnológica e inteligência de dados. O plano não faz menção a quaisquer   ações de turismo (Ministério de Obras Públicas da República Argentina, 2023).  Em  2024,  a  Secretaria  de  Turismo,  Ambiente  e  Esportes  da  Nação,  através  da  Sub -  secretaria  de  Turismo,  lançou  uma  convocatória  denominada  “Promover  Turismo    Argentina”  destinado  a  melhorar  a  infraestrutura  tecnológica,  a  promoção  e  co -  municação  digital  e  fortalecimento  da  sua  oferta  turística.  Foram  selecionados  66    projetos,  sendo  30  para  transformação  digital  (Secretaria  de  Turismo,  Ambiente  y    Deportes de la Nación, 2024).  Em agosto de 2025, foi publicado a base para a “Agenda Digital Argentina” com oito   objetivos,  onde  se  destacam:  facilitar  o  desenvolvimento  da  infraestrutura  e  acessi -  bilidade que conecte a todos de maneira inteligente, fomentar a alfabetização digital   como motor para a inclusão e fomentar a educação digital para favorecer a empre -  gabilidade dos cidadãos no futuro (Boletín Oficial de la República de Argentina, 2025).  4.4.2. Brasil   Em  2024,  pelo  Decreto  nº  12.198,  de  24  de  setembro,  institui  a  Estratégia  Federal  de    Governo Digital (EFGD) para o período de 2024 a 2027 e a Infraestrutura Nacional de   Dados  que  previa  que   órgãos   e  entidades  elaborariam  alguns  instrumentos  de  pla -  nejamento específicos para a consecução dos objetivos e das iniciativas da EFGD. Um   desses instrumentos foi o Plano de Transformação Digital (PTD) com objetivo princi -  pal de auxiliar os  órgãos  e entidades a executarem ações que visem o alinhamento e o   atingimento de alguns dos objetivos e iniciativa previstos na EFGD (BRASIL, MGI, s.d.).  Citam como princípios da EFGD estar centrado no cidadão & inclusivo: prover serviços    públicos  digitais personalizados, simples, de forma pró-ativa e centrados no cidadão;   integrado & colaborativo: aperfeiçoar a governança de dados e a interoperabilidade;   inteligente & inovador: fomentar o ecossistema de inovação aberta; confiável & segu -  ro: fortalecer a privacidade e a segurança dos dados dos cidadãos; transparente, aber -  to & participativo: fortalecer a cultura de governo aberto e transparente, e eficiente &  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   296  sustentável: estimular a gestão ambientalmente sustentável na transformação digital   (BRASIL, MGI, s.d.).  Em janeiro de 2025, o Ministério do Turismo (MTur) lançou “O Plano de Transformação   Digital (PTD) do Ministério do Turismo – MTur” com objetivo de: i) facilitar o acesso ao   cidadão  aos  programas  do  Ministério  do  Turismo,  por  meio  da  simplificação  e  ofer -  ta estruturada de serviços digitais, ii) elevar os níveis de transparência, participação   e  acesso  à  informação  no  Ministério  do  Turismo,  iii)  reduzir  o  tempo  médio  e  custo    gasto pelo cidadão para conhecer ou utilizar os serviços ofertados pelo Ministério do   Turismo, e iv) promover a integração de bases de dados no Ministério, e no Governo   Federal como um todo, proporcionando a simplificação ao usuário e qualificação das   informações disponíveis sobre os setores de turismo (BRASIL, MTur, 2025).  4.4.3. Colômbia  A Estratégia Nacional Digital (END) 2023-2026 definiu as iniciativas de política pública   do  Governo  da  Colômbia  relacionadas  à  conectividade  e  transformação  digital  com    uma visão de País com respeito ao acesso, uso e apropriação dos dados e das tecnolo -  gias digitais (Departamento Nacional de Planeación, 2024).  Para  tanto  foram  definidos  oitos  eixos  estratégicos,  sendo  a  i)  conectividade  digital:    para  mudar  vidas;  ii)  acesso,  uso  e  aproveitamento  dos  dados:  para  impulsionar  a    transformação social; iii) segurança e confiança digital: para a garantia das liberda -  des e desenvolvimento integral das pessoas; iv) habilidades e talento digital: como mo -  tor de oportunidades; v) inteligência artificial e outras tecnologias emergentes: para a   geração de valor econômico e social; vi) transformação digital pública: para fortalecer   o vínculo com o Estado-Cidadania; vii) economia digital: para a transformação produ -  tiva; e viii) sociedade digital: para o desenvolvimento inclusivo, equitativo e sustentá -  vel (Departamento Nacional de Planeación, 2024).  Em  maio  de  2025,  o  Ministério  de  Comércio,  Indústria  e  Turismo  e  o  Fundo  Nacional    de Turismo (FONTUR), com apoio da Fundação Univalle e Stockholm Environment Ins -  titute (SEI) apresentaram o projeto InnovaT360º, primeiro programa de incubação e   aceleração de iniciativas TravelTech na Colômbia, sendo esta uma estratégia de inova -  ção e transformação digital setorial “Turismo 4.0 para todos”, direcionado a empreen -  dedores e empresários para o desenvolvimento de produtos turísticos com potencial   de escalonamento a partir da aplicação de ferramentas digitais (Ministério Comercio,   Industria y Turismo, 2025).  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   297  El  reto  se  enmarca  en  la  estrategia  de  innovación  y  transformación  digital  sectorial    “Turismo  4.0  para  todos”,  y  está  dirigido  a  emprendedores  y  empresarios  de  todo  el    país,  que  desarrollen  productos  turísticos  con  potencial  de  escalamiento  mediante    herramientas digitales (Ministerio Comercio, Industria y Turismo, 2025).   4.4.4. México  Em  janeiro  de  2025,  o  Governo  do  México  criou  a  Agência  de  Transformação  Digital    e  Telecomunicações  (ATDT)  que  tem  missão  construir  um  modelo  de  autonomia  tec -  nológica,  unificando  capacidades,  gerando  ganhos   públicos  e  de   utilidade   pública,    buscando  a   digitalização  dos  processos,  reduzir  a  burocracia  sobre  empresas  e  pes -  soas, inteligência de dados para fortalecer as capacidades públicas, autonomia tecno -  lógica e segurança na informação, e destacam que a Internet é um direito para todos   (Gobierno de México, ATDT, 2025).  Até a publicação deste livro, não havia menção a TD aplicadas ao turismo entre 2023   a 2025.  4.4.5. Perú  Em julho de 2023, o Governo do Peru aprovou a Política Nacional de Transformação   Digital  a  20230,  que  serviu  como  um  norteador  de  políticas  públicas  para  o  alinha -  mento, objetivos, ações, serviços, indicadores, atividades, metas e responsáveis para   atingir a transformação digital do país (Presidencia del Consejo de Ministros, 2024).  Definido  como  um  processo  contínuo,  disruptivo,  estratégico  e  de  mudança  cultural    que se sustenta no uso intensivo de tecnologias digitais, sistematização e análise dos   dados para gerar efeitos econômicos, sociais e de valor para as pessoas atuando em   (Gobierno de Perú, 2023):  •  Cidadania digital: direitos digitais da sociedade;  •  Economia digital: transformação da economia com uso estratégico de tecnolo -  gias digitais;  •  Governo digital: como criar valor para os cidadãos;  •   Talento  digital:  conteúdos  educativos  para  desenvolvimento  e  fortalecimento    de competências digitais;  •  Segurança e confiança digital: da gestão a confiança digital; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   298  •   Tecnologias  digitais:  emergentes,  sistemas  automáticos  e  outros  que  possam    transformar a economia;  •  Inovação digital: melhorar os serviços  públicos  digitais e agilizar o acesso dos   cidadãos; e  •  Serviços digitais: acesso aos serviços disponibilizados pelo Estado.  Realizado  em  Lima  (Peru),  no  mês  de  setembro  de  2025,  a  primeira  feira  focada  em    tecnologias  para  o  turismo  –  “Turismo  In  Summit  2025  –  soluções  inovadoras  para    o  turismo”,  uma  ação  integrada  entre  o  Ministério  de  Comércio  Exterior  e  Turismo    (Mincetur) e Promperú que reafirmam compromisso em desenvolver o turismo nacio -  nal, observando a modernização dos seus processos e consolidando o país como um   destino competitivo a nível global (PROMPERÚ, 2025).   4.4.6. Uruguay  Em  julho  de  2025,  a  Agência  de  Gobierno  Electrónico  y  Sociedad  de  la  Información  y    del  Conocimiento  –  AGESIC,  apresentou  o  Plano  de  Governo  Digital  2025  com   ênfase    nos princípios fundamentais para desenvolvimento e a transformação digital do Uru -  guai,  que  incluem  quatro  eixos  estratégicos,  sendo:  i)  alinhamento  com  os  objetivos    nacionais  do  Governo,  ii)  eficiência  e  ganhos,  iii)  qualidade  dos  serviços   públicos,   iv)   transparência na gestão  pública (AGESIC, 2025).  Para  a  execução  do  Plano  de  Governo  Digital  2025  foram  definidos  cinco  linhas  de    ação, a saber i) transformação digital dos processos: redesenhar e simplificar os pro -  cessos de gestão no Estado; ii) transformação digital dos serviços: serviços mais  ágeis ;   iii)  fortalecimento  da  sociedade  da  informação:  reduzir  as  brechas  digitais  para  ga -  rantir  acesso  equitativo  ao  desenvolvimento  digital;  iv)  inovação,  tecnologias  emer -  gentes e plataformas: desenvolver e disponibilizar a infraestrutura e serviços que fa -  cilitem a transformação digital; v) cibersegurança: fortalecer o ecossistema nacional   de cibersegurança (AGESIC, 2025).  Também em julho de 2025, o Ministério de Turismo e o Banco Interamericano de Desen -  volvimento – BID, firmaram um acordo de cooperação intitulado de “Innovación y De -  sarrollo de Turismo 4.0 en Uruguay - Estrategia de Transformación Digital” com objetivo   de desenvolver uma estratégia e instrumentos escaláveis para aumentar a maturidade   digital do setor turístico, implementar um laboratório de apoio ao turismo 4.0, aplicando   e ajustando a implementação dos instrumentos concebidos em destino turístico piloto. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   299  4.5. Consideraçoes   A  Transformação  Digital  é  um  imperativo  estratégico  para  o  setor  de  turismo  e    hospitalidade,  impulsionando  a  inovação,  a  competitividade  e  a  resiliência.  Embo -  ra  ofereça  vastas  oportunidades  para  melhorar  a  experiência  do  cliente,  otimizar    operações  e  promover  o  desenvolvimento  sustentável,  o  caminho  para  a  TD  é  pa -  vimentado  com  desafios  como  a  falta  de  habilidades,  infraestrutura  inadequada  e    barreiras culturais.   O sucesso requer uma abordagem holística que combine investimentos tecnológicos   com o desenvolvimento de capacidades organizacionais, estratégias claras e um am -  biente de governança favorável. A compreensão profunda dos impulsionadores e bar -  reiras, bem como a adoção de metodologias de pesquisa avançadas, são cruciais para   navegar nesta paisagem em constante evolução.  Entre os desafios e recomendações sintetizados pelos autores estão:  •  Desenvolver habilidades digitais: Programas de treinamento e desenvolvimen -  to para funcionários e gestores são essenciais para superar a falta de habilida -  des digitais e a mentalidade tradicional;  •   Investir  em  infraestrutura:  Governos  e  empresas  devem  investir  em  infraes -  trutura digital robusta, especialmente em áreas rurais e menos desenvolvidas,   para garantir conectividade e acesso;  •   Formular  estratégias  claras:  As  empresas  precisam  de  uma  estratégia  de  TD    bem  estruturada  com  objetivos  de  curto,  médio  e  longo  prazo,  alinhados  aos    seus modelos de negócios e capacidades internas;  •  Promover a colaboração: Incentivar a colaboração entre stakeholders, incluin -  do governos, fornecedores, parceiros e clientes, é crucial para o sucesso da TD;  •  Incentivar a inovação e a agilidade: A TD deve ser acoplada ao desenvolvimento   da agilidade organizacional, permitindo que as empresas se adaptem rapida -  mente  às  mudanças do mercado e explorem novas oportunidades;   •   Governança  digital  e  regulamentação:  Melhorar  o  arcabouço  legal  para  pro -  teção de dados pessoais, verificação de identidade digital e governança de IA é   fundamental para criar um ambiente seguro e confiável; e  •  Ética,  equidade e acessibilidade: Possibilitar o acesso  às  diversas ferramentas   oportunizadas pela TD, bem como, ética na gestão dos dados. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  4. Transformación digital en destinos turísticos   300  E por fim, algumas tendências da TD para o setor do turismo como o trabalho remoto:   a pandemia acelerou a transição para modelos de trabalho remoto e híbrido, exigindo   uma reestruturação dos modelos operacionais das empresas e investimento em tec -  nologias de colaboração, e ao mesmo tempo, criando um novo nicho de mercado cha -  mado de “Nômades Digitais”, a IA Generativa: importante na gestão do conhecimento,   especialmente na conversão de conhecimento  tácito em explícito, estratégico para a   construção do conhecimento organizacional frente aos desafios da alta rotatividade   e/ou escassez de mão-de-obra no setor do turismo, a sustentabilidade: na contribuir   para a execução dos Objetivos de Desenvolvimento Sustentável (ODS) no setor do tu -  rismo e correlatos, a Inovação Aberta: onde os laboratórios de inovação atuam como   plataformas relacionais para facilitar conexões com o ecossistema, fomentando abor -  dagens de inovação aberta e ativando processos de aprendizado contínuo e iterativo,   e  conectividade  entre  recursos  humanos,  infraestrutura  e  políticas  pública  na  cons -  trução de uma cultura de inovação para o setor do turismo.  Referências bibliográficas  Agencia  de  Gobierno  Electrónico  y  Sociedad  de  la  Información  y  del  Conocimiento    (AGESIC).  (2025).   Plan  de  Gobierno  Digital  2025 .  Recuperado  em  2  de  setembro    de  2025,  de   https://www.gub.uy/agencia-gobierno-electronico-sociedad-informa -  cion-conocimiento/politicas-y-gestion/plan-gobierno-digital-2025  Balula,  A.,  Moreira,  G.,  Moreira,  A.  A.  F.,  Kastenholz,  E.,  Eusébio,  C.,  y  Breda,  Z.  (2019).    Digital  transformation  in  tourism  education.   ToSEE  –  Tourism  in  Southern  and    Eastern Europe , 5, 61–72.  https://doi.org/10.20867/tosee.05.45    Baranyi,  V.  (2025).  Syste
