oz-Vélez  I.U Colegio Mayor de Antioquia, Colombia.  Marcello Tomé  Universidade Federal Fluminense, Brasil.  3.5.1. Introducción: Objetivo y métodos  En los últimos años, y en gran medida gracias a sus propias luchas, las personas con   discapacidad (PcD) han logrado niveles crecientes de autonomía, así como una mayor   integración social y económica, inclusive en espacios de la práctica turística.  Asimismo,  desde  hace  algunas  décadas,  es  un  tema  de  agenda  pública.  En  2006,  la    Convención  sobre  los  Derechos  de  las  Personas  con  Discapacidad  (CDPCD)  (ONU,    2006) incluye entre sus artículos la accesibilidad y el turismo, como derechos propios   de las personas con discapacidad. A su vez, esta temática está incorporada dentro de   las metas 10 y 11 de los Objetivos de Desarrollo Sostenible (ODS) que refieren a reducir   la desigualdad dentro y entre los países y hacer que las ciudades sean más inclusivas,   seguras, resilientes y sostenibles.  Para este grupo, la accesibilidad resulta un factor clave, ya que implica la eliminación   de barreras físicas, comunicacionales y actitudinales que dificultan no sólo su partici -  pación individual, sino también la de sus familias en contextos turísticos (Darcy, 2010).   Diversos estudios han señalado que muchas PcD no viajan, no solo por la ausencia de   condiciones adecuadas en los destinos, sino también por la falta de información confia -  ble y disponible sobre servicios accesibles, sumada a experiencias negativas previas (Loi   y Kong, 2017; Valverde et al., 2024). Sin embargo, cuando lo hacen, estos turistas tienden   a gastar más que el promedio, suelen viajar en temporada baja, prefieren destinos so -  leados  y  estarían  dispuestos  a  gastar  más  si  el  destino  garantiza  su  plena  participa -  ción  (Rucci,  2021).  En  este  sentido,  la  accesibilidad  no  solo  constituye  una  cuestión  de    derechos, sino también un factor decisivo en la elección del destino y una oportunidad   competitiva para el sector turístico. La accesibilidad debe ser vista como un asunto que   beneficia a todas las personas y no solo para las personas con discapacidad así que, si un   entorno no es accesible para las personas con discapacidad, entonces no es para todos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 202  Diversos estudios han demostrado que la accesibilidad es un componente de la calidad   turística (Rucci et al., 2021) que debe comprenderse en su totalidad, como una cadena   de accesibilidad (Ver Figura 1). Es decir, desde que los turistas inician sus búsquedas   de información (primer eslabón) hasta que regresan a sus lugares de origen (último   eslabón),  no  deberían  encontrar  barreras  que  le  impidan  su  plena  participación.  La    cadena de valor del turismo accesible se refiere al conjunto integral de directrices es -  tablecidas por la Norma ISO 21902 que entiende al turismo accesible desde un enfoque   transversal a lo largo de toda la cadena de valor del sector turístico. Cuando la cadena   se rompe (la ausencia de accesibilidad en alguno de los eslabones), aparecen las bar -  reras y el bienestar y la calidad de vida de todos disminuyen, siendo las personas con   discapacidad las más afectadas (McKercher y Darcy, 2018). Un ejemplo de una ruptura   en la cadena de accesibilidad es cuando un hotel está diseñado para albergar a todos,   sin embargo, en el destino no existe servicio de transporte público o privado adaptado.   Es esencial que la cadena de accesibilidad sea ininterrumpida, ya que se trata de un   conjunto de eslabones interrelacionados y continuos (Connell y Page, 2019).  Figura 1  Cadena de accesibilidad.  Fuente: OMT (2015).  En  la  práctica,  numerosos  destinos  han  avanzado  en  la  implementación  de  accesi -  bilidad  turística.  Organismos  internacionales  han  promovido  la  mejora  de  la  acce -  sibilidad  a  través  de  premios,  distinciones,  sellos  o  reconocimientos  de  accesibilidad    (Huetes-Nieves et al., 2023). Sin embargo, un hecho más reciente y relevante, es la in -  clusión del eje de accesibilidad en los modelos de DTI, tanto españoles como de países   de América Latina. De esta forma se entiende que un destino que no trabaje en la acce -  sibilidad para todas las personas no será considerado inteligente. Los modelos de DTI  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 203  han reivindicado no sólo la valoración del tema de accesibilidad, sino también que le   han dado mayor visibilidad y jerarquía. En general, los diferentes modelos DTI cubren   los  siguientes  aspectos  en  materia  de  accesibilidad:  i)  disponibilidad  de  información    adaptada; ii) entornos, productos y servicios accesibles; iii) gestión y planificación de   la accesibilidad; iv) promoción del turismo accesible; v) vinculación entre tecnologías y   accesibilidad; vi) existencia de un marco normativo; y, vii) transporte accesible.  El modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes cuenta con un   eje de accesibilidad y lo define como aquel que:  “ Evalúa  el  compromiso  del  destino  con  la  inclusión  y  el  diseño  univer -  sal,  garantizando  que  tanto  la  experiencia  turística  como  los  servicios,    infraestructuras e información sean utilizables y disfrutables por todas   las  personas,  independientemente  de  sus  capacidades  físicas,  senso -  riales o cognitivas.   Este  eje  refleja  la  voluntad  del  destino  de  eliminar  barreras  y  crear  un    entorno turístico que responda a las necesidades de todos los visitantes   y residentes .”  Entiende el eje de accesibilidad dividida en dos ámbitos de actuación: A. Gestión de la   accesibilidad en el Destino y B. Implantación de la accesibilidad en el DTI (se describen   en el próximo apartado). Entre ambas dimensiones, se cubren 13 requisitos obligato -  rios y 32 indicadores, que componen el 16% del peso total dentro del modelo 14 .   No obstante, investigaciones recientes señalan que el eje de accesibilidad es uno de los   más difíciles de implementar dentro de los modelos DTI, en comparación con otros ejes   como gobernanza, sostenibilidad, tecnología, innovación o seguridad (Ivars-Baidal et   al., 2021; Rucci et al., 2022; Rucci, 2024).   Dado este marco, este capítulo realiza un recorrido por los requisitos e indicadores del   eje de accesibilidad del modelo DTI de la RIDTI, presenta algunos ejemplos, así como   también algunas limitaciones que tiene la implementación de cada uno de ellos. Para   ello, se recurrió a la experiencia de los autores de este capítulo, así como a una recopi -  lación de buenas prácticas en el tema. En este sentido, se espera que este capítulo sea   de insumo tanto para los gestores de turismo como para académicos, dejando vacan -  cias de estudios en el campo del turismo accesible que aún no han sido explorados.  14   Este porcentaje es similar al modelo español de SEGITTUR donde el eje de accesibilidad está compuesto de 17 requeri -  mientos, 43 indicadores y su peso es del 18% del total (Leporiere y Andrades, 2024).  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 204  3.5.2. Requisitos e indicadores del eje de accesibilidad del Modelo DTI de la RIDTI  Tal como se mencionó, el eje está compuesto por dos ámbitos de actuación (A y B), 13   requisitos obligatorios y 32 indicadores (Tabla 1):   A.Gestión de la accesibilidad en el Destino  Este ámbito analiza la legislación relacionada con accesibilidad y turismo que aplica al   destino, el talento humano con conocimiento en accesibilidad, condiciones de la oferta   accesible existente, participación de usuarios en la mejora de los servicios, mecanismos   de planificación, gestión y seguimiento al destino para mejorar la accesibilidad.  B. Implantación de la accesibilidad en el Destino  Este ámbito materializa la gestión de la accesibilidad y aborda el componente digital/  comunicacional  accesible,  condiciones  e  infraestructura  del  servicio  de  transporte  y    espacios que utiliza el visitante, así como servicios, atractivos, eventos y actividades.  Tabla 1   Eje de accesibilidad del Modelo de la RIDTI: requisitos, indicadores y pesos.  ACCESIBILIDAD  Requisitos   Indicadores   Peso del   requisito  A. Gestión de la accesibilidad en el Des -  tino  Conocimiento suficiente sobre la accesibilidad   del destino   1   3   23,1%  Normativa técnica de accesibilidad   1   1   7,7%  Planificación en materia de accesibilidad   1   1   7,7%  Capacidad de gestión de la accesibilidad   1   3   23,1%  Mecanismos para la gestión, el desarrollo y el   seguimiento de las acciones de accesibilidad   1   1   7,7%  Incentivación de la accesibilidad   1   3   15,4%  Promoción de la accesibilidad en el destino   1   1   7,7%  Fomento de la participación de los usuarios en   la mejora de la Accesibilidad   1   1   7,7%  TOTAL ÁMBITO   8   14   100% \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 205  ACCESIBILIDAD  Requisitos   Indicadores   Peso del   requisito  B. Implantación de la ac -  cesibilidad en el DTI  Conectividad  del  transporte  interurbano  con    servicios/recursos del destino   1   2   11,1%  Transporte local accesible   1   5   27,8%  Valoración  de  la  accesibilidad  recursos,  servi -  cios y actividades turísticas   1   8   44,4%  Información-planificación  previa  para  usua -  rios con distintas necesidades)   1   2   11,1%  La información en destino es accesible   1   1   5,6%  TOTAL ÁMBITO   5   18   100%  TOTAL EJE ACCESIBILIDAD   13   31   16%  Fuente: Elaboración propia en base a Lopez (2025).  A continuación, se describirán cada uno de los requisitos y sus indicadores, ejemplifi -  cando algunos de ellos:  A. Gestión de la accesibilidad en el Destino  A.1. Conocimiento suficiente sobre la accesibilidad del destino.  Este requisito cuen -  ta con 3 indicadores:  —    Existencia de diagnóstico técnico de accesibilidad sobre los puntos de Interés Turís -  tico  —    Inventario sobre la Accesibilidad de los recursos turísticos  —    Cobertura de cadena de valor turística mediante acciones de accesibilidad  Desde el modelo se espera que se cumpla con la existencia de un diagnóstico técnico de   accesibilidad de los puntos de interés turístico competencia del Ente Gestor de DTI (EG -  DTI), un inventario sobre la accesibilidad de los recursos turísticos (públicos y priva -  dos) del destino y de una oferta turística accesible que cubra los diferentes elementos   (eslabones) de la cadena de valor. Numerosos destinos han avanzado en trabajo de re -  levamiento, diagnóstico de las condiciones de accesibilidad de sus recursos y su poste -  rior publicación, para el conocimiento de todas las personas. Ejemplos de ellos pueden  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 206  ser: “ebook turismo e accesibilidad nos atractivos turísticos de Curitiba” de Curitiba,   Brasil 15  o la guía de servicios turísticos de la ciudad de Mar del Plata en Argentina. 16    Si bien el requisito se cumple porque se evidencia el trabajo en cada uno de los indica -  dores (diagnóstico, inventario y cobertura de la cadena de accesibilidad), el modelo no   explica ni indica cómo llevar a cabo el cumplimiento de esos requisitos. En la literatura,   esto  es  lo  que  se  denomina  “accesibilidad  imaginada”  en  contraste  con  “accesibilidad    percibida” por parte de los turistas con discapacidad en cada destino (Rucci et al., 2021).  A.2. Normativa técnica de accesibilidad.  Este requisito cuenta con 1 indicador:   —  Normativa técnica de accesibilidad  Este  indicador  valora  la  utilización  adecuada  de  la  normativa  técnica  sobre  accesi -  bilidad  y  su  aplicación  de  acuerdo  a  las  obras,  programas  y  proyectos  que  promue -  ve el ente gestor del destino y su posterior complementación con la normativa local,   así como guías, manuales y protocolos que promueven su aplicabilidad en el destino.   La  importancia  que  reviste  este  requisito/indicador  es  que  se  constituye  como  mar -  co  para  legislar  sobre  la  gestión  y  aplicación  de  la  accesibilidad  que  puede  ser  o  no    vinculante. Según Ferst et al. (2020) la normativa en accesibilidad debe garantizar el   derecho a disfrutar sin barreras y con autonomía del destino y contribuye para que la   accesibilidad sea una ventaja competitiva para el turismo.  En  el  caso  de  Medellín,  Colombia,  el  Acuerdo  144  de  2019,  en  su  artículo  44  refiere  a    la  Política  Pública  para  la  Inclusión  de  Personas  con  Discapacidad,  en  la  que  se  es -  tructura el “ Comité de Accesibilidad  de Medellín -CAME-” como el máximo organismo   consultivo en accesibilidad del distrito. Su objetivo es brindar asesoramiento técnico,   recomendaciones  y  dar  seguimiento  en  accesibilidad  a  proyectos  institucionales.  El    actual  CAME  se  instaló  el  12  agosto  de  2021  y  está  conformado  por:  representantes    de personas con discapacidad física, visual, auditiva, intelectual, talla baja, múltiple,   psicosocial y sordoceguera; delegados de las secretarías de Comunicaciones, Cultura   Ciudadana, Desarrollo Económico - Turismo y Entretenimiento, Educación, Gestión y   Control Territorial, entre otros; y otros organismos invitados e institucionales. Al año   2025  se  encuentran  definiendo  una  ruta  para  construir  el  Plan  de  Accesibilidad  de    Medellín (PAM).  15   Disponible a través de:  https://mid-turismo.curitiba.pr.gov.br/2023/12/pdf/00011734.pdf  16   Disponible a través de:  https://www.turismomardelplata.gob.ar/Guia-accesible.pdf \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 207  A.3. Planificación en materia de accesibilidad.  Este requisito cuenta con 1 indicador:   —  Planificación en materia de accesibilidad  El  indicador  mide  la  existencia  de  un  plan  de  accesibilidad  u  otros  documentos  que    incluyen consideraciones de accesibilidad en la planificación del destino. Para lo cual   evalúa la existencia de un plan de accesibilidad con una antigüedad inferior a 5 años   y  retoma  consideraciones  de  los  indicadores  anteriores  con  relación  a  la  existencia    de inventarios de los principales recursos turísticos que incluya la oferta turística del   destino con relación a los principales atractivos y rutas turísticas del destino, para lo   que es indispensable validar la práctica de acciones accesibles en el destino y definir   planes  de  acción  por  sectores  (ver  ámbito  implantación  de  la  actividad  turística,  re -  quisito valoración de la accesibilidad recursos, servicios y actividades turísticas).  El primer eslabón de la cadena es la planificación y la búsqueda de información, cuan -  do  los  turistas  potenciales  buscan  todo  lo  que  puedan  necesitar  para  tomar  decisio -  nes  sobre  sus  visitas  (OMT,  2014).  Este  eslabón  puede  presentar  dificultades  para  las    personas con discapacidad en el contexto turístico, debido a la falta de disponibilidad   de  información  relevante  y  al  desconocimiento  por  parte  de  los  proveedores  de  sus    necesidades  reales  (OMT,  2014).  Según  datos  de  Masliković  y  Tomić  (2024),  en  lo  que    respecta a los canales de información, las personas con discapacidad (muy a menudo   o a menudo) utilizan: internet (99,10%), redes sociales (91,89%) y plataformas y aplica -  ciones especializadas (79,28%). Un aspecto relevante es que dentro de estos canales se   pueden  encontrar  una  gran  variedad  de  fuentes  de  información,  ya  sean  empresas,    administraciones y, claramente, usuarios. A diferencia de otros turistas, las personas   con  discapacidad  no  pueden  recurrir  a  alternativas  cuando,  por  ejemplo,  se  les  ha    proporcionado  información  inexacta.  Estos  puntos  enfatizan  que  la  planificación  de    un  viaje  por  parte  de  una  PcD  se  caracteriza  por  una  alta  demanda  de  información    confiable, detallada, descriptiva y actualizada (Terras et al., 2021).  Entre las buenas prácticas en materia, se destaca el   Plan Estratégico de Turismo Ac -  cesible de la Costa del Sol Occidental, que se incluye en el “Plan Operativo del Destino   Turístico  Inteligente  Costa  del  Sol  Occidental”,  y  tiene  como  propósito  contribuir  al    desarrollo del turismo accesible en el destino.  A.4. Capacidad de gestión de la accesibilidad.  Este requisito cuenta con 3 indicadores:  —    Existencia de un área u oficina técnica específica de accesibilidad  —    Asignación de recursos humanos para accesibilidad \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 208  —  El EG dispone de medios suficientes para la gestión de la accesibilidad  La capacidad de gestión materializa el compromiso de la Institucionalidad con la in -  clusión en la sociedad, por consiguiente, gestionar estrategias para eliminar todo tipo   de barreras. Este requisito evalúa la estructura de la organización, el talento humano   que gestiona y desarrolla acciones en materia de accesibilidad y el presupuesto para   la gestión que el ente gestor utiliza para desarrollar acciones accesibles. Para el logro   de  este  propósito  es  necesario  que  exista  planificación,  coordinación  y  efectiva  eje -  cución de acciones que promuevan la accesibilidad para todas las personas.  Con relación a los indicadores, la existencia de un área u oficina técnica específica de acce -  sibilidad (Departamento, Secretaria, Oficina Técnica) determina la coordinación y el desar -  rollo de acciones accesibles entre diferentes áreas de la estructura funcional. Se considera   su capacidad de coordinación en diferentes áreas (transversalidad) es decir, adquiere un   carácter transversal entre las diferentes áreas de la organización. En cuanto al recurso   humano, evalúa si se han destinado personas o equipos específicos en las distintas áreas   de la entidad para trabajar en temas de accesibilidad. Esto incluye personas con roles y   responsabilidades en criterios o indicadores de accesibilidad en sus funciones. Es de ano -  tar, que la asignación que se realiza a estas personas debe ser clara, específica y sostenida   en el tiempo, no de carácter temporal. El último indicador considera la existencia de par -  tidas presupuestales específicamente para accesibilidad o integradas en presupuestos de   otras áreas que estén destinadas para financiar programas, proyectos y acciones en ma -  teria de accesibilidad, lo que declara el compromiso del Ente Gestor con la accesibilidad.  Imagen 1  Fondo para el desarrollo de circuitos accesibles – Ministerio de Turismo Uruguay.  Fuente: Ministerio de Turismo Uruguay, 2022. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 209  A.5. Mecanismos para la gestión, el desarrollo y el seguimiento de las acciones.  Este   requisito cuenta con 1 indicador:  —    Consideración de la Accesibilidad en los Pliegos de Condiciones  La creación de un Comité o Consejo de Accesibilidad en DTI es esencial para garan -  tizar  la  inclusión  y  la  equidad,  considerando  la  accesibilidad  como  un  eje  estruc -  turante  del  turismo.  Este  organismo  debería  encargarse  de  supervisar,  evaluar  y    proponer  políticas  públicas  orientadas  a  la  accesibilidad  en  proyectos  y  servicios,    además de trabajar de forma integrada con sectores como la planificación urbana,   el transporte, la cultura y la tecnología. Esto promovería soluciones innovadoras que   satisfagan las necesidades de las personas con discapacidad, las personas mayores   y otros grupos con movilidad reducida, fortaleciendo la imagen de un destino turís -  tico inteligente y accesible.  Ejemplos de ciudades como Niterói (Brasil), a través de la Coordinación Municipal de   Accesibilidad  de  Niterói  (CODAC)  ( https://codac.niteroi.rj.gov.br/ ),  demuestran  el  im -  pacto positivo de los comités de accesibilidad en la adaptación de espacios turísticos.   Sirven como referente de buenas prácticas y refuerzan la urgencia de políticas públi -  cas inclusivas alineadas con la promoción de la inclusión social. Es fundamental que   la accesibilidad se considere desde el inicio de proyectos turísticos, obras y eventos.  A.6. Incentivación de la accesibilidad.  Este requisito cuenta con 3 indicadores:  —    Programas  de  apoyo  y  campañas  de  apoyo,  premios  y  la  promoción  de  recursos    turísticos accesibles (El GE fomenta la accesibilidad en el sector turístico privado).  —    Concienciación ciudadana sobre la accesibilidad  —    Iniciativas de formación en accesibilidad para el sector turístico privado  Es necesario impulsar y difundir las iniciativas destinadas a ampliar la accesibili -  dad. Existen ejemplos a diferentes niveles, como en Europa, donde la Comisión Eu -  ropea, junto con el Foro Europeo de Personas con Discapacidad, organiza el “Pre -  mio  Ciudad  Accesible”  desde  2010,  seleccionando  y  dando  a  conocer  las  ciudades    de la UE que priorizan la accesibilidad para las personas con discapacidad (Hue -  te-Nieves et al., 2023). En el sector privado, otro ejemplo interesante fue la cadena   hotelera  Accor,  que  organizó  el  “Desafío  ¡Despega!  Brasil”  en  Brasil,  donde  estu -  diantes  universitarios  presentaron  propuestas  relacionadas  con  la  industria  ho -  telera bajo el lema “Accesibilidad e Inclusión”. Es necesario difundir las iniciativas  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 210  para aumentar la accesibilidad en ciudades, estados y países, así como iniciativas   a menor escala, como en playas, parques, museos y otras atracciones. También es   importante fomentar la formación, ofreciendo cursos y talleres dirigidos no solo a   trabajar con personas con discapacidad, sino también a su formación, ampliando   las oportunidades de acceso al mercado laboral y fomentando la interacción entre   personas con y sin discapacidad.  Asimismo,  es  necesario  realizar  campañas  de  concienciación  sobre  la  accesibilidad    y  los  derechos  de  las  personas  con  discapacidad.  También  es  importante  promover    destinos turísticos accesibles, proporcionando a las personas con discapacidad infor -  mación fiable sobre las condiciones de accesibilidad.  Por  último,  es  importante  promover  el  apoyo  para  orientar  las  políticas  y  acciones    en  favor  de  la  accesibilidad  en  los  destinos  turísticos,  permitiendo  la  ampliación  de    la  oferta  de  destinos  turísticos  accesibles,  incluyendo  servicios  y  recursos  turísticos.    Ampliar la información y el conocimiento sobre accesibilidad para las personas que   trabajan en el sector turístico mediante cursos, talleres, seminarios, etc.  A.7. Promoción de la accesibilidad en el destino.  Este requisito cuenta con 1 indicador:  —  Promoción como Destino Accesible  La fiabilidad de las fuentes de información es clave en la toma de decisiones de viaje   (Sillence et al., 2017), donde un 56% de PcD decide no viajar por la falta de oferta ac -  cesible. De allí la necesidad de que, más allá de la existencia de los lugares y recursos   accesibles, los destinos dediquen esfuerzos a la promoción de los mismos, de manera   que las personas con discapacidad se enteren de ellos. ¿Cuántas veces ha pasado que   hay hoteles que cuentan con habitaciones adaptadas y no las ofertas en sus webs?   ¿de  qué  manera  podrían  enterarse  de  que  existe  la  oferta  accesible?  A  través  de  la    promoción que deben hacer los destinos.  Se deben crear espacios dedicados al turismo accesible, de manera que las personas   puedan localizar toda la información que requieren en un solo sitio: qué cuestiones   tener en cuenta para llegar al destino, qué alojamientos/espacios recreativos/espa -  cios culturales/espacios gastronómicos, entre otros, que cuentan con accesibilidad,   si hay guías que cuentan con certificaciones en accesibilidad, cómo es el transporte   de la ciudad, entre otros. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 211  Imagen 2   Sitios webs de Montevideo y de Comunidad Valenciana donde se promociona el   turismo accesible.  Fuente:  https://www.descubrimontevideo.uy/turismo-accesible  y     https://www.comunitatvalenciana.com/es/turismo-accesible  Las experiencias actuales muestran una gran variedad de formas de comunicación y   promoción del turismo accesible: desde archivos en PDF poco interactivos y/o accesi -  bles, hasta buscadores con distintos niveles de detalle y sistemas propios de clasifica -  ción. Esta heterogeneidad no solo afecta la experiencia del turista con discapacidad,   sino que también limita la interoperabilidad entre plataformas y reduce la capacidad   de los DTI de funcionar como redes coordinadas a nivel regional. A nivel internacional,   herramientas como la señalética universal, los pictogramas o los sistemas de etique -  tado han sido utilizadas exitosamente para comunicar atributos como sostenibilidad   o accesibilidad. Sin embargo, Iberoamérica aún no cuenta con una propuesta integra -  da y validada para los DTI.  A.8.  Fomento  de  la  participación  de  los  usuarios  en  la  mejora  de  la  accesibilidad.    Este requisito cuenta con 1 indicador:  —  Existencia de mecanismo activo de gestión de incidencias sobre accesibilidad   El lema de la Convención sobre los Derechos de las Personas con Discapacidad (ONU,   2006),  “nada  de  nosotros  sin  nosotros”,  refuerza  la  necesidad  de  mecanismos  que    garanticen  la  participación  de  las  personas  con  discapacidad  en  la  mejora  de  la  ac -  cesibilidad.  Son  ellas  quienes  mejor  conocen  los  requisitos  para  que  un  recurso  sea    verdaderamente inclusivo. En Argentina, por ejemplo, estudiantes sordos de escuelas   especiales elaboraron videos en Lengua de Señas Argentina para los recorridos turís -  ticos del Presidio de Ushuaia, ilustrando cómo estas acciones fomentan su participa -  ción y valorizan su saber práctico (Park et al., 2024). En el ámbito de los DTI, la estre -  cha  relación  entre  accesibilidad  y  tecnología  plantea  desafíos:  se  cuestiona  cuando   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 212  la  primera  depende  excesivamente  de  la  segunda  o  cuando  la  innovación  digital  no    incorpora criterios inclusivos (Leporiere y Andrades, 2024). Estudios muestran que un   62% de usuarios con discapacidad tiene dificultades de acceso a internet, más del 4%   carece de conexión y un 30% no posee un teléfono inteligente, lo que contrasta con los   entornos altamente digitalizados de los DTI. La experiencia del consultor Ryan Smith   en  Argentina  confirma  que,  aunque  las  tecnologías  avanzadas  pueden  favorecer  la    inclusión, también generan nuevas barreras cuando no consideran las condiciones de   uso de las personas con discapacidad .  B. Implantación de la accesibilidad en el DTI  B.1.  Información-planificación  previa  para  usuarios  con  distintas  necesidades.    Este requisito cuenta con 2 indicadores:  —  Accesibilidad de la página web y de la app de turismo  —  Nivel de conformidad en Accesibilidad  El modelo exige validar la accesibilidad de la web y la app del destino mediante herra -  mientas del W3C, así como valorar la información disponible y la posibilidad de interac -  ción accesible. Los sitios web son un canal central para la decisión de viaje, aunque mu -  chas organizaciones turísticas aún no reconocen su importancia (WebAIM, 2020; 2022).   La accesibilidad web incluye tanto el diseño técnico —que permite percibir, comprender,   navegar e interactuar con el sitio— como el contenido informativo sobre servicios acce -  sibles. Cada país cuenta con normativa que obliga a garantizar este derecho. Un ejemplo   es Mar del Plata (Argentina), cuyo portal turístico ofrece herramientas de accesibilidad   como ampliación de letra, contraste de colores y lectura por software de voz (Imagen 3).  Imagen 3  Accesibilidad web del sitio oficial del Ente de Turismo de Mar del Plata.       Fuente:  https://www.turismomardelplata.gob.ar/ \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 213  B.2. La información en destino es accesible.  Este requisito cuenta con 1 indicador:  —  Valoración de la Información de accesibilidad en el destino  Este indicador se relaciona con los anteriores de planificación turística, de promoción   de  la  accesibilidad  y  de  accesibilidad  web,  dando  a  entender  la  necesidad  de  contar    con  un  espacio  propio  en  los  sitios  webs,  en  las  oficinas  de  turismo,  en  la  folletería,    etc, dedicado especialmente al tratamiento de la información de la accesibilidad en el   destino.  B.3.  Conectividad  del  transporte  interurbano  con  servicios/recursos  del  destino.    Este requisito cuenta con 2 indicadores:  —   Accesibilidad  en  principal  infraestructura  de  transporte  interurbano  llegada/re -  greso  —  Conexión accesible en las conexiones de transporte servicios/recursos públicos  El transporte constituye un eje fundamental para la inclusión social y el acceso equita -  tivo al turismo de las personas con discapacidad y movilidad reducida (Castro, 2003).   Por  ejemplo,  la  Ley  Brasileña  de  Inclusión  (13.146/2015)  reconoce  en  sus  artículos  42    y 46 el derecho a la cultura, el turismo y la movilidad en igualdad de condiciones, lo   que exige identificar y eliminar barreras en los distintos modos de transporte (Brasil,   2015). En este marco, el modelo considera dos indicadores: accesibilidad en la infraes -  tructura principal de llegada/regreso y conexiones accesibles con los servicios turísti -  cos locales. Como señala Mariot (1969), el desplazamiento entre origen y destino es la   esencia del turismo, por lo que vehículos, terminales, estaciones y servicios asociados   deben  garantizar  condiciones  inclusivas.  Esto  implica  no  solo  contar  con  autobuses,    trenes, aviones o barcos adaptados, sino también con infraestructura adecuada y ser -  vicios de apoyo interpersonal. Muchas terminales aún dependen de ascensores peri -  féricos o carecen de pasarelas telescópicas en aeropuertos y embarcaderos accesibles   en puertos, lo que limita la autonomía de los pasajeros. Se recomienda incorporar pa -  sarelas  móviles,  equipamientos  seguros  de  embarque  y  desembarque,  y  garantizar    servicios básicos accesibles (baños, alimentación, áreas de espera). Asimismo, el per -  sonal debe estar capacitado para atender a la diversidad humana, evitando cualquier   forma de discriminación y priorizando a las personas con discapacidad. Finalmente,   la accesibilidad exige que las terminales interurbanas aseguren conexiones inclusivas   —autobuses, trenes o metro adaptados— que faciliten el acceso a los recursos y atrac -  tivos turísticos del destino, promoviendo autonomía, seguridad y bienestar. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 214  B.4. Transporte local accesible.  Este requisito cuenta con 5 indicadores:  —  Accesibilidad en paradas de transporte urbano colectivo  —  Accesibilidad en las flotas de transporte público local  —  Cobertura de los recorridos del transporte público local  —  Accesibilidad en los servicios de taxi   —  Accesibilidad en plazas de aparcamiento para personas con movilidad reducida (PMR)  El  transporte  local  accesible  es  esencial  para  la  población  local  y  flotante,  incluidos    los turistas, ya que permite a los turistas llegar a alojamientos, atracciones turísticas,   bares, restaurantes, agencias de viajes, etc.  Las paradas de transporte público deben ser accesibles para garantizar la seguridad   del embarque y desembarque de los pasajeros.  En el caso de Brasil, de acuerdo con las directrices de accesibilidad de la NBR 9050, las pa -  radas de transporte público deben tener aceras despejadas, sin árboles, postes ni otros   obstáculos, lo que permite el desplazamiento seguro de las personas con discapacidad.   Se deben instalar pisos táctiles direccionales (con líneas) y pisos táctiles de advertencia   (bolas) en las aceras que conducen a la parada de autobús y dentro de ella, para facilitar   la navegación de las personas con discapacidad visual. Las rampas deben estar a nivel   del autobús, con rampas o elevadores que permitan la entrada y salida de sillas de rue -  das  y  personas  con  otras  discapacidades  y  movilidad  reducida.  Debe  haber  suficiente    espacio en la parada de autobús y en el vehículo para que una persona en silla de ruedas   pueda maniobrar con seguridad. Las paradas deben tener asientos, preferiblemente con   señalización que indique la prioridad para personas con discapacidad y ubicadas lo más   cerca  posible  de  las  zonas  de  embarque,  que  deben  ser  accesibles.  Las  paradas  deben    tener información visual y sonora clara sobre las líneas de autobús, tren y metro, etc., y   el itinerario, para facilitar la comprensión de todos los usuarios.  En cuanto a la flota de transporte público local no debe contar con torniquetes de acceso,   ya que constituyen una barrera difícil de superar para las personas con discapacidad, di -  señada exclusivamente para el conteo de pasajeros y que dificulta el uso del transporte sin   el pago correspondiente. Todos los autobuses que presten servicios de transporte público   urbano  deben  ser  de  piso  bajo,  a  menos  que,  a  discreción  del  ayuntamiento  correspon -  diente,  la  ruta  lo  prohíba.  Todos  los  autobuses  urbanos  de  nueva  adquisición  deben  ser    accesibles de acuerdo con las disposiciones establecidas en cada país iberoamericano. Los   trenes y el metro deben tener estrechos espacios entre el andén y el tren, lo que permite el  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 215  acceso directo a usuarios de sillas de ruedas, así como a personas con cochecitos, equipaje,   etc. El vehículo de transporte debe tener espacio para que las sillas de ruedas puedan cir -  cular y cinturones de seguridad disponibles para una sujeción segura durante el viaje y la   estancia en el vehículo. El uso de sistemas de información audiovisual es esencial.  Del mismo modo que en la cadena de accesibilidad en turismo, de nada sirve que un   destino  tenga  accesibilidad  en  sus  alojamientos,  museos,  playas,  restaurantes,  par -  ques, plazas, etc., si la movilidad no es satisfactoria, es decir, si el transporte público   disponible  no  cuenta  con  rutas  que  faciliten  el  desplazamiento  a  puntos  de  interés,    como  los  servicios  y  recursos  turísticos.  Investigar,  definir,  implementar  y  gestionar    un sistema de transporte público eficiente es un gran reto para los gestores públicos, y   es fundamental garantizar que los residentes locales y los turistas tengan acceso a co -  nexiones esenciales para el turismo y el disfrute diario mediante el transporte público.   En cuanto al servicio de taxis y aquellos prestan servicios de transporte a través de pla -  taformas  de  economía  colaborativa  como   Uber ,  desempeñan  un  papel  importante  en    el transporte turístico local. En el caso de Brasil, al menos el 5% de la flota de taxis debe   ser  accesible,  garantizando  que  los  pasajeros  puedan  acceder  al  vehículo  sentados  en    su propia silla de ruedas. Se recomienda que el 100% de la flota cuente con un maletero   lo suficientemente amplio como para acomodar una silla de ruedas. Asimismo, los es -  tacionamientos deben tener al menos entre un 5% y un 10% de plazas designadas para   personas  con  discapacidad,  debidamente  señalizadas  horizontal  y  verticalmente,  con    espacios de maniobra definidos para que cumplan con estándares de accesibilidad.  Imagen 4   Fotos de transporte accesible en Curitiba     Fuente: Autores. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 216  B.5. Valoración de la accesibilidad de recursos, servicios y actividades turísticas.   Este requisito cuenta con 8 indicadores:  —  Accesibilidad en playas  —  Accesibilidad en espacios naturales  —  Accesibilidad en recorridos peatonales de interés turístico  —  Accesibilidad en zonas estanciales  —  Accesibilidad en Instalaciones de Oficinas de Turismo   —  Accesibilidad en puntos de información turística urbana  —  Accesibilidad en puntos de interés turístico  —  Accesibilidad en actividades y eventos de gran concurrencia   Tal  como  se  mencionó,  en  pos  de  garantizar  la  cadena  de  accesibilidad  turística,  se    debe  contemplar  las  condiciones  en  sus  atractivos,  espacios  turísticos,  entre  otros.    Este requisito valora la accesibilidad en recorridos peatonales: itinerarios, puntos de   cruce peatonal, señalización peatonal urbana y mapas urbanos para la fácil ubicación   y  orientación  del  turista  y  entre  recursos  turísticos  alejados;  accesibilidad  en  zonas    estanciales: mobiliario urbano, interacción, puntos de descanso y en zonas exteriores   de recreo (parques urbanos, zonas de juegos infantiles); facilidad en la identificación y   uso de las instalaciones de la Oficina de Turismo y en los puntos de información turís -  tica, acceso a las actividades y eventos de gran concurrencia, todo esto considerando   el cumplimiento de la normativa existente.   En destinos de playa se valora el equipamiento del punto accesible, la existencia de ser -  vicio de baño asistido y de equipamientos de accesibilidad complementarios de acuer -  do a los criterios normativos. Este es un aspecto de especial atención ya que el modelo   no especifica qué pasa cuando el destino no cuenta con alguno de estos elementos; no   todos los destinos cuentan con playa, aunque todos los indicadores son obligatorios.  Ejemplo de este requisito es TUR4all, “Turismo Accesible para todos”, plataforma co -  laborativa en la que todas las personas pueden informar sobre establecimientos, re -  cursos  y  servicios  turísticos  con  características  de  accesibilidad  para  todos.  Ofrece    información  objetiva  sobre  las  condiciones  de  accesibilidad  de  los  alojamientos,  res -  taurantes y de los diferentes tipos de recursos turísticos (Tur4all Travel agency, n.d.). O   bien el caso de Turability que está comenzando su desarrollo en América Latina que es   una plataforma donde reúne la información de todos los recursos turísticos accesibles  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 217  del país y otros países, permitiendo a los usuarios que personalicen la información se   busca en la plataforma y con un asistente de inteligencia artificial que ayuda en las   búsquedas (Turability, s.f.).  Imagen 5   Tur4all y Turability          Fuente:  www.tur4all.com  y  www.turability.com  3.5.3. Reflexiones y conclusiones  El análisis del eje de accesibilidad en el marco de los DTI en Iberoamérica permite cons -  tatar que su incorporación ha significado un avance sustantivo en la visibilización de   un  aspecto  históricamente  relegado  en  la  gestión  turística.  Integrar  la  accesibilidad    como dimensión estructural no solo responde al cumplimiento de derechos fundamen -  tales, sino que también aporta competitividad, calidad y sostenibilidad a los destinos.  Ahora  bien,  la  revisión  de  los  requisitos  e  indicadores  evidencia  que  se  trata  de  uno    de los ejes más complejos de implementar. Las dificultades se vinculan a la ausencia   de metodologías estandarizadas de diagnóstico y medición, a la fragmentación nor -  mativa  y  a  la  falta  de  articulación  entre  niveles  de  gestión.  La  tensión  entre  el  uso    de tecnologías digitales como herramientas de inclusión y la posibilidad de que estas   mismas se conviertan en nuevas barreras para determinados grupos de personas con   discapacidad refleja una de las contradicciones más notorias.  La accesibilidad debe entenderse no como una finalidad en sí misma, sino como un dere -  cho y un facilitador que garantiza inclusión, autonomía, seguridad y comodidad para to -  das las personas. En este sentido, uno de los principales desafíos radica en la interrelación   entre accesibilidad, tecnología y gobernanza. La experiencia muestra que las soluciones  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.5. Eje Accesibilidad 218  digitales pueden ampliar la participación y la autonomía de las personas con discapaci -  dad siempre que se diseñen bajo criterios de accesibilidad universal. De lo contrario, prio -  rizar la innovación tecnológica sin un enfoque inclusivo conduce a nuevas exclusiones. De   allí que la gobernanza adquiera un rol estratégico: articular políticas públicas, sector pri -  vado, ciudadanía y colectivos de personas con discapacidad es condición necesaria para   asegurar que la tecnología funcione como puente y no como barrera.  Los casos analizados confirman que los avances más visibles y sostenibles se han dado   allí  donde  se  impulsaron  planes  estratégicos,  inventarios  de  accesibilidad,  mecanis -  mos de participación activa y estrategias de promoción específicas. Sin embargo, per -  siste la heterogeneidad de criterios, la escasa interoperabilidad de las plataformas de   información y la limitada integración de la accesibilidad en la planificación territorial   y  turística.  En  consecuencia,  un  destino  que  no  trabaje  en  accesibilidad  de  manera    transversal y continua no puede considerarse inteligente.  El eje de accesibilidad se articula de forma estrecha con los de gobernanza, innovación,   tecnología y sostenibilidad, generando sinergias que potencian su impacto. Instalar la   accesibilidad en la agenda de todos los actores, promover la formación y sensibiliza -  ción, y reconocer que sus beneficios alcanzan a toda la sociedad resulta fundamental.  Finalmente, este capítulo plantea vacancias de investigación orientadas a: (i) profun -  dizar en metodologías comparadas para la evaluación de la accesibilidad en destinos;   (ii) analizar la relación entre accesibilidad percibida e imaginada en contextos diver -  sos; y (iii) explorar modelos de gobernanza inclusiva que garanticen la participación   efectiva de las personas con discapacidad en todas las fases de planificación y gestión   turística. En suma, la accesibilidad se reafirma como condición necesaria para orien -  tar la innovación tecnológica y la gobernanza turística hacia un modelo de desarrollo   inclusivo y sostenible.  Referencias bibliográficas  Castro, R. (2003).  Acessibilidade de Turistas com Necessidades Especiais ao Transpor -  te Aéreo . UFRJ/COPPE.  Comité de Accesibilidad de Medellín, CAME. (2025).  31 a  sesión CAME Comité de Accesi -  bilidad de Medellín .  Connell, J., & Page S. J. (2019). Case study: Destination readiness for dementia-friendly   visitor  experiences.  A  scoping  study.   Tourism  Management,  70 ,  29-41.   https://doi.  org/10.1016/j.tourman.2018.05.013 \nExperie ivas de los Destinos Turísticos Inteligentes en Iberoamérica 222  3.6. Eje Sostenibilidad  La  sostenibilidad  constituye  uno  de  los  pilares  esenciales  del  modelo  iberoameri -  cano  de  Destinos  Turísticos  Inteligentes  (DTI)  y  se  expresa  de  manera  transversal    en la planificación, gestión y evaluación de los destinos. En este eje se reconoce que   la inteligencia turística no puede entenderse al margen de los principios del desar -  rollo sostenible, y que la tecnología y la innovación sólo adquieren sentido cuando   contribuyen al bienestar social, la equidad económica, la preservación ambiental y   la valorización cultural. Por ello, la sostenibilidad se aborda en tres dimensiones in -  terdependientes: la socioeconómica, que analiza la redistribución de beneficios y la   economía circular como estrategias de inclusión; la ambiental, que examina la rela -  ción entre turismo, cambio climático y resiliencia ecológica; y la cultural, que sitúa   la identidad, la memoria y la participación comunitaria en el centro de la transfor -  mación digital de los destinos.  Estas tres perspectivas permiten comprender la sostenibilidad no como un compo -  nente aislado del modelo DTI, sino como su núcleo articulador, en el que convergen   los valores de justicia territorial, innovación responsable y corresponsabilidad ciu -  dadana. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  223  3.6.1. Ámbito Sostenibilidad socioeconómica y economía circular   Ledys  López Zapata  I.U Colegio Mayor de Antioquia, Colombia.   Johan Sebastián Góme  I.U Colegio Mayor de Antioquia, Colombia.  Angélica María Carmona-Sánchez  I.U Colegio Mayor de Antioquia, Colombia.  3.6.1.1. Introducción  Los Destinos Turísticos Inteligentes (DTI) representan un modelo de gestión territo -  rial  que  busca  integrar  la  innovación,  la  tecnología,  la  sostenibilidad,  la  accesibili -  dad  y  la  gobernanza  para  generar  experiencias  turísticas  de  alta  calidad  y  contri -  buir a la calidad de vida de los residentes del destino. Dentro de la metodología de   evaluación  de  estos  destinos,  el  eje  de  sostenibilidad  constituye  uno  de  los  pilares    fundamentales con un peso significativo dentro de todo el modelo. Específicamente   el ámbito de Desarrollo Socioeconómico y Economía Circular representa una dimen -  sión crítica que evalúa la capacidad del destino para generar beneficios económicos   distribuidos de manera equitativa, proteger el bienestar de las comunidades locales   y promover prácticas de producción y consumo responsable.  En  el  manual  metodológico  de  la  Red  Iberoamericana  de  DTI,  los  requisitos  del    eje  de  sostenibilidad  tienen  un  peso  de  38%  con  30  requisitos  y  49  indicadores.  El    ámbito de Desarrollo Socioeconómico y Economía Circular se estructura en nueve   requisitos fundamentales que abordan desde la formación en sostenibilidad hasta   la  gestión  de  crisis  y  la  protección  de  la  economía  local.  De  igual  manera  el  ám -  bito  de  gestión  de  la  sostenibilidad  turística  involucra  5  requisitos  directamente    vinculados con estrategias para gestionar la estacionalidad turística, acompañar   empresarios  del  destino  con  programas  específicos  de  apoyo  económico  y  accio -  nes  de  marketing  que  propendan  por  visibilizar  prácticas,  productos  y  servicios    sostenibles. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  224  3.6.1.2. Marco conceptual  Sostenibilidad social y económica del turismo  El  turismo  se  ha  posicionado  en  las  agendas  públicas,  políticas  y  académicas  como    unas de las actividades económicas más importantes, con mayor potencial de creci -  miento y capacidad para generar empleo y fomentar el desarrollo para muchos países,   debido a su contribución en la erradicación de la pobreza y en general por su aporte   al cumplimiento de los objetivos del desarrollo sostenible ODS (Solís-Hernández, 2020).  En  este  escenario  de  crecimiento  del  turismo,  el  concepto  de  sostenibilidad  turística    se  ha  posicionado  en  los  discursos  académicos  y  prácticos  como  un  paradigma  do -  minante en el siglo XXI. Este paradigma ha transformado radicalmente las políticas   públicas y la gestión de destinos, especialmente en destinos en etapa de madurez que   han afrontado las consecuencias de un desarrollo turístico no planificado y por ende   con impactos en la sostenibilidad territorial.   Solís-Hernández (2020) define la sostenibilidad como la gestión razonable y eficaz de   todos  los  recursos  disponibles,  que  incide  de  manera  determinante  en  la  calidad  de    vida de los habitantes y turistas, y a partir de ello en la mejora de la competitividad   del destino y de las empresas que operan en él. El concepto trasciende la mera dimen -  sión ambiental para integrarse con las perspectivas socioculturales y económicas del   desarrollo. Como lo plantea Rainforest Alliance, el turismo, como actividad producti -  va puede ser ampliamente beneficioso, pero también considerablemente destructiva   si  no  es  manejado  adecuadamente,  es  decir,  atendiendo  de  forma  adecuada  los  tres    principios del desarrollo sostenible: económico, ambiental y sociocultural (Rainforest   Alliance, 2008).  En el ámbito económico, se entiende la sostenibilidad cuando la actividad se desarrolla   con base en prácticas empresariales adecuadas, las cuales aseguran el crecimiento y   mantenimiento  en  el  tiempo  de  la  empresa,  con  lo  cual  se  beneficia  a  los  propieta -  rios, empleados y vecinos de la comunidad donde se desarrolla el negocio (Rainforest   Alliance, 2008).  Desde  el  eje  sociocultural  se  insta  a  abordar  el  turismo  como  una  actividad  que  se    realiza sin perjudicar o afectar el tejido social existente en la comunidad donde se de -  sarrolla (Rainforest Alliance, 2008). Aguirre-Vélez & Mestanza-Ramón (2022) señalan   que  la  dimensión  social  incluye  indicadores  como:  etnicidad,  conocimiento  de  la  or -  ganización, voluntad de participación, accesibilidad a servicios básicos, beneficio a la   comunidad, alianzas estratégicas, equidad de participación, revalorización cultural. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  225  A partir del 2007, una coalición de 26 organizaciones, se unieron para desarrollar los   Criterios  Globales  de  Turismo  Sostenible,  los  cuales  representan  un  esfuerzo  para    alcanzar  un  entendimiento  común  del  turismo  sostenible,  y  los  principios  mínimos    de sostenibilidad a los que una empresa turística debe aspirar. En el ámbito social y   económico, Rainforest Alliance (2008) describe las acciones que una compañía puede   implementar para apoyar el desarrollo comunitario y garantizar prácticas responsa -  bles. Algunos indicadores relacionados con este eje incluyen:  •  Apoyo a iniciativas de educación, salud y saneamiento.   •  Empleo y capacitación para residentes locales, incluyendo puestos gerenciales.  •  Compra de bienes y servicios locales bajo comercio justo.   •  Facilidades para pequeños empresarios locales en la venta de productos soste -  nibles.   •  Código de conducta para actividades en comunidades indígenas y locales, con   consentimiento comunitario.   •  Políticas contra la explotación comercial, especialmente de niños y adolescentes.  •  Contratación equitativa de mujeres y minorías locales, restringiendo el trabajo   infantil.   •  Respeto a la protección legal y salarios adecuados para empleados.   •  Actividades que no afectan servicios básicos de las comunidades vecinas.   Por su parte, Aguirre-Vélez & Mestanza-Ramón (2022) consideran que la creación de   fondos  de  fomento  al  turismo  se  ha  considerado  como  una  herramienta  para  el  im -  pulso del turismo sostenible, responsable y de calidad, y la protección, preservación,   recuperación y mejora de los recursos turísticos.  En los estudios sobre turismo, la sostenibilidad social ha estado imbricada con la pre -  servación cultural y en otros casos con el desarrollo económico, mientras que las di -  mensiones  sociales  han  quedado  en  segundo  plano  o  han  sido  obviadas.  Sin  embar -  go,  el  artículo  de  Mantecón  et  al.  (2024)  propone  un  modelo  multidimensional  para    evaluar la sostenibilidad social en destinos a partir de una reflexión teórica y de expe -  riencias prácticas.  En esta modelo la sostenibilidad social del turismo se mide a través de 4 dimensiones   a saber: \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  226  •  Calidad de vida : centra su interés en aspectos materiales (infraestructura, me -  dio ambiente) e inmateriales del bienestar (la percepción de autorrealización o   de reconocimiento)  •  Organización político-social y gobernanza : hace relación al sistema de rela -  ciones sociales en el destino. Los conceptos incluidos incluyen aspectos como la   distribución  social  del  poder  (capital  social,  tejido  asociativo),  los  valores  que    la envuelven y dirigen el turismo en el destino (democracia, codecisión, solida -  ridad)  y  en  los  efectos  que  genera  (cohesión  social,  regeneración,  resiliencia  o    interacción social).  •  Identidad local : Se preocupa por elementos que caracterizan la cultura del des -  tino, incluyen cuestiones que explican cuando un lugar es percibido como aglu -  tinador de una serie de rasgos que lo distinguen de otros lugares, haciendo que   quienes lo habitan o visitan se reconozcan implicados en una relación genuina   con el entorno.  •  Derechos y justicia social : relacionada con la capacidad del turismo para, más   allá del ordenamiento jurídico legal, contribuir a la satisfacción de necesidades   básicas y a la garantía de unos derechos fundamentales dirigidos por la promo -  ción de la equidad y la dignidad.  Esta propuesta de medición de la sostenibilidad social del turismo parte del principio   que la práctica del turismo es un derecho, de tal manera que también lo es la dispo -  sición de una población a decidir en qué condiciones lo quiere promover o, en última   instancia, apostar por otras vías de desarrollo (Mantecón et al., 2024).  Economía circular  Por otro lado, la economía circular se ha convertido en una alternativa para replan -  tear  el  modelo  económico  actual,  en  donde  a  diferencia  del  enfoque  tradicional  (ba -  sado en extraer, producir, consumir y desechar) esta propuesta busca alargar la vida   útil de los recursos, reducir al mínimo la generación de residuos y contribuir a la re -  generación de los ecosistemas (SEGITTUR, 2023). Según Prieto-Sandoval et al. (2017) el   término de economía circular surgió de la evolución misma del concepto de sostenibi -  lidad, y no se trata solo de una estrategia ambiental, sino de un nuevo paradigma que   amplía la idea de sostenibilidad y que busca integrarse en todos los niveles del sistema   económico, social y ambiental. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  227  De acuerdo con Espinoza (2023) los antecedentes de la economía circular se remon -  tan  a  las  décadas  de  1970  y  1980,  cuando  surgieron  aportes  importantes  desde  la    economía  ecológica  y  la  teoría  de  sistemas,  donde  Kenneth  Boulding  y  Nicholas    Georgescu-Roegen instauraron conceptos de la termodinámica como la entropía al   análisis económico, estableciendo así la necesidad de cuestionar el enfoque lineal del   desarrollo económico.  La economía circular aplicada al turismo no solo es pertinente sino necesario, ya que   su aplicación permite enfrentar algunas de las principales debilidades del modelo tu -  rístico tradicional como el alto consumo de recursos, generación de residuos y huella   ecológica. Como bien dice Vargas-Sánchez (2022) aplicar principios de economía cir -  cular al turismo no es simplemente hacer ajustes, sino cambiar la manera en que se   entiende y gestiona el sector lo cual cobra aún más sentido si se tiene en cuenta que,   a diferencia de otras industrias como la manufacturera, el turismo históricamente no   ha estado ligado a prácticas circulares.  Uno  de  los  aspectos  más  importantes  de  este  enfoque  es  que  permite  generar  be -  neficios  tanto  económicos  como  ambientales  ya  que  como  lo  indica  la  Fundación    Ellen MacArthur (2023) la economía circular se basa en tres principios que buscan   eliminar  los  residuos  desde  el  diseño,  mantener  materiales  y  productos  en  uso  du -  rante el mayor tiempo posible, y regenerar los sistemas naturales para asegurar un   equilibrio sostenible.  El manual para la transición de un destino turístico hacia una economía circular ela -  borado por SEGITTUR (2023) destaca cómo la circularidad puede integrarse en los DTI,   y  plantea  que,  para  avanzar  hacia  una  economía  circular  es  necesario  repensar  no    sólo la forma en que se diseñan y ofrecen los productos y servicios turísticos, sino tam -  bién la manera en que estos se conectan y afectan al entorno que los rodea.  SEGITTUR  (2023)  citando  el  Índice  Global  de  Sostenibilidad  en  los  Destinos  (2018)    afirma  que  el  proceso  de  transición  hacia  la  circularidad  debe  enfocarse  en  “un    liderazgo  con  propósito  por  parte  del  ente  gestor,  la  definición  de  una  estrategia    clara,  y  la  articulación  de  un  entorno  colaborativo  que  apueste  por  la  educación    y  la  sensibilización  de  los  agentes  implicados”  (p.  16),  lo  que  implica  también  un    cambio en la cultura organizacional de los destinos donde la circularidad no se en -  tienda sólo como una serie de acciones puntuales sino como un modelo transversal   de gestión que integre la innovación, la sostenibilidad y los ODS en las decisiones   estratégicas del territorio. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  228  Presentación del Ámbito Desarrollo Socioeconómico y Economía Circular del Modelo   Metodológico de la Red Iberoamericana de DTI  El modelo metodológico de la Red Iberoamericana de DTI parte de una adaptación del   modelo  de  SEGITTUR  y  su  construcción  inicial  obedeció  a  una  invitación  del  Banco    Interamericano  de  Desarrollo  BID  y  SEGITTUR  en  el  año  2021,  a  la  naciente  Red  Ibe -  roamericana para revisar y adaptar el modelo español al contexto americano y a la   singularidad y nivel de desarrollo de los destinos del continente.   El  modelo  pretende  ser  una  herramienta  un  poco  más  sencilla  de  implementar    para destinos de diferentes tamaños o niveles de desarrollo, pasando de 265 a 153   indicadores  en  total.  Esta  reducción  tiene  por  objetivo  simplificar  la  metodología    sin  perder  profundidad  y  rigurosidad  y  reconocer  las  particularidades  institu -  cionales,  territoriales,  sociales  y  financieras  de  los  destinos  americanos  (López  &    Beltrami,  2025).  El  modelo  de  la  red  iberoamericana  reconoce  que  la  conversión    hacía  un  DTI  en  el  ámbito  de  América  es  un  proceso  complejo  y  no  es  inmediato,    toda  vez  que  se  entiende  el  cambio  como  proceso  y  la  metodología  DTI  como  una    herramienta que facilita ese cambio de visión, de resultados inmediatos a procesos   sostenidos con impacto en el tiempo.  El ámbito de Desarrollo Socioeconómico y Economía Circular comprende 9 indicado -  res y 12 requisitos. Todo el eje tiene un peso dentro de la metodología del 38% y el ám -  bito contribuye con un aporte de aproximadamente el 11%, siendo el segundo ámbito   con mayor peso dentro de todo el eje, solo superado por el ámbito de sostenibilidad   turística. De igual manera el ámbito de sostenibilidad turística comprende algunos   requisitos  que  se  cruzan  transversalmente  con  el  desarrollo  social  y  económico  de    los territorios (5 requisitos y 7 indicadores), por lo cual también serán analizados en   este capítulo. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  229  Tabla 1   Requisitos e indicadores de sostenibilidad social, económica y economía circular.  Ámbito  Requisito  Alcance del requisito  Indicadores  Medios de verificación y evidencias  Ámbito A   Gestión de la   sostenibilidad   turística  Gestión  de  la  estacio -  nalidad del destino   El  requisito  pretende  que  el    destino  desarrolle  capacidades    para  gestionar  y  controlar  la    estacionalidad  turística  y  dis -  tribuir  los  flujos  turísticos  a  lo    largo del año.  Realización  de  un  análisis/se -  guimiento de la ocupación men -  sual por plazas de alojamiento y   tipología turística.  Informes  técnicos  o  publicaciones  de  ocu -  pación  elaborados  por  el  ente  gestor  o  el    observatorio  turístico,  informes  anuales  o    mensuales  con  datos  desagregados  por  ti -  pología de alojamiento, estudios periódicos   de  estacionalidad  realizados  por  consulto -  ras  o  universidades,  bases  de  datos  oficia -  les de ocupación.  Marketing  para  un    turismo sostenible   Este  requisito  verifica  que  las    acciones  de  comunicación  y    promoción promuevan la soste -  nibilidad   de  forma  transversal,    así  como  comportamientos  res -  ponsables entre visitantes.  Realización  de  acciones  de  co -  municación  y  promoción  para    desarrollar y promover produc -  tos y servicios sostenibles.  Planes  de  marketing  con  criterios  de  sos -  tenibilidad,  campañas  ejecutadas  que    promuevan  turismo  responsable,  material    publicitario  (gráfico,  digital  o  audiovisual)    y registros de actividades o reportes de al -  cance.  Apoyo  económico  a    la sostenibilidad en el   sector privado  Este  requisito  establece  la  ne -  cesidad  de  crear  instrumentos    financieros  específicos  que  in -  centiven  no  solo  la  adopción    de  prácticas  de  sostenibilidad    en  las  empresas  turísticas,  sino    también  instrumentos  de  apo -  yo  económico  que  aporten  a  la    competitividad  e  internacio -  nalización  de  las  empresas  del    sector.  Disposición  de  programas  de    apoyo  económico  a  la  gestión    sostenible  medioambiental  y    social de las pymes turísticas.  Documentos  oficiales  del  programa  como    resoluciones,  manuales,  contratos  o  con -  venios;  así  como  evidencias  de  implemen -  tación  entre  ellas  reportes  de  gestión  y    ejecución presupuestal, cronogramas, con -  vocatorias y listados de beneficiarios.  %  de  empresas  turísticas  del    destino  acogidas  al  programa    de apoyo económico  Registros  o  base  de  datos  actualizada  de    beneficiarios  del  sector  turístico,  infor -  mes  de  resultados  del  programa,  notas  de    prensa  emitidas  por  el  ente  gestor,  y/o  un    informe que relacione el total de empresas   turísticas  del  destino  con  el  número  de  be -  neficiarios del programa. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  230  Ámbito  Requisito  Alcance del requisito  Indicadores  Medios de verificación y evidencias  Ámbito A   Gestión de la   sostenibilidad   turística  Promover  la  inte -  racción  entre  el  visi -  tante  y  el  residente       Este requisito busca que los des -  tinos  promuevan  y  desarrollen    políticas  y  acciones  que  garan -  ticen  el  acceso  equitativo  de  la    población  local  a  los  recursos  y    espacios turísticos del destino.  Existencia  de  bonificaciones  o    beneficios para favorecer el ac -  ceso de la población residente, a   los recursos turísticos  Ordenanzas  o  acuerdos  municipales  que    establezcan  beneficios,  registros  de  tarifas    diferenciadas,  informes  de  entidades  ges -  toras  sobre  residentes  beneficiados,  bole -  tines oficiales que documenten la medida.  Desarrollo  de  campañas  que    promuevan el uso de instalacio -  nes y espacios de valor turístico   por parte de los residentes  Planes de comunicación y promoción apro -  bados, informes de ejecución presupuestal,   convenios  con  medios  de  difusión,  piezas    comunicativas  (afiches,  cuñas,  videos),  re -  portes de cobertura y alcance, registros de   participación en las actividades.  Concienciación  sobre    la  sostenibilidad  tu -  rística  entre  residen -  tes y visitantes  Con  este  requisito  se  pretende    que el destino desarrolle estrate -  gias  educativas  residentes  para    fomentar  procesos  de  cultura    turística  y  prácticas  de  sosteni -  bilidad entre la población local.  Desarrollo de campañas de con -  cienciación sobre sostenibilidad   orientadas a los residentes  Planes  municipales  o  comunitarios  de  sen -  sibilización,  registros  de  campañas  ejecu -  tadas,  material  educativo  y  comunicativo,    informes  de  talleres  o  capacitaciones  con    listados  de  participantes,  convenios  inte -  rinstitucionales de apoyo a la sostenibilidad.  Ámbito D   Sostenibilidad   socioeconómica y   economía circular Acciones  formativas    en materia de sosteni -  bilidad  Este  requisito  busca  garantizar    que  el  destino  implemente
