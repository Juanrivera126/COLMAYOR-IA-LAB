lo Tomé  Universidade Federal Fluminense. Universidade de São Paulo, Brasil.  5.1. Introdução  Nas  últimas  duas   décadas,  os  Destinos  Turísticos  Inteligentes  (DTI)   consolidaram-se   como um campo estratégico de políticas públicas e inovação tecnológica aplicada ao   turismo. Ancorados em avanços das Tecnologias da Informação e Comunicação (TIC)   e em ideais de sustentabilidade e competitividade, os DTI têm sido impulsionados por   governos, empresas e organismos multilaterais como resposta à crescente complexi -  dade da gestão urbana e turística (Buhalis & Amaranggana, 2014; Gretzel et al., 2015).   No entanto, embora o discurso sobre destinos inteligentes enfatize a melhoria da ex -  periência do visitante, o protagonismo dos turistas no desenho e na avaliação desses   sistemas permanece um desafio (Femenia-Serra et al., 2019; Mendes Filho et al., 2022;   Neuhofer et al., 2012).  A  maior  parte  dos  autores  e  pesquisas  sobre  DTI  concentram-se  nas  características    da oferta em detrimento da demanda: na infraestrutura tecnológica dos destinos, nos   sistemas de gestão integrada e nos modelos de negócios inovadores (Andrades et al.,   2024; Buhalis & Amaranggana, 2014; Gretzel et al., 2015; Rosa & Soares, 2024). Menor   atenção tem sido dada ao turista enquanto sujeito ativo, com demandas, percepções   e limitações específicas (Ballina, 2021; Mendes Filho et al., 2022). Esse desequilíbrio re -  sulta não apenas em lacunas de conhecimento, mas também em riscos de implemen -  tação de soluções dissociadas das reais necessidades dos viajantes. As decisões de ino -  vação são frequentemente tomadas sem escuta qualificada ou sem dados empíricos   suficientes sobre os perfis e comportamentos dos visitantes (Femenia-Serra et al., 2019;   S. R. dos Santos & Gândara, 2019). O cenário é ainda mais crítico quando se trata de   públicos com necessidades específicas ou maior vulnerabilidade, como os turistas com   deficiência. Pessoas com deficiência ainda não são escutadas de forma sistemática na   formulação de políticas públicas de turismo e seguem enfrentando barreiras  físicas,  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  307  comunicacionais e simbólicas para usufruir das experiências turísticas em igualdade   de condições (Duarte et al., 2015).  Uma recente revisão sistemática e integrativa sobre os DTI na América Latina (L. dos   Santos  et  al.,  2025)  analisou  40  estudos  publicados  entre  2015  e  2023  e  revelou  que  a    maioria  se  concentrou  na  aplicação  de  tecnologias  digitais,  especialmente  aplicati -  vos móveis, sistemas de big data e plataformas de gestão. Entre os clusters temáticos   identificados,  apenas  um  relaciona  diretamente  os  princípios  da  gestão  inteligente    à  experiência  turística  e  ao  visitante;  os  demais  abordam  mobilidade  urbana,  segu -  rança e cidades inteligentes. São raras as investigações sobre atitudes, percepções ou   comportamentos dos visitantes — e praticamente ausentes abordagens baseadas em   User-Centered Design  (UCD) (Williams et al., 2020) ou em metodologias centradas na   experiência do usuário, com baixa atenção à diversidade de perfis turísticos,  às  vul -  nerabilidades sociais e  às  assimetrias de acesso que marcam a realidade da região.  A  desconsideração  sobre  aspectos  específicos  da  demanda  turística  também  é  obser -  vada em estudos institucionais e aplicados. Uma análise sobre políticas públicas de DTI   em sete países latino-americanos mostra, por exemplo, que os planejamentos nacionais   seguem voltados à infraestrutura e à digitalização, sem abordar a diversidade dos per -  fis turísticos (Rosa & Soares, 2024). Rucci et al.(2025), por sua vez, apontam que gestores   locais reconhecem dificuldades para adaptar os modelos europeus  às  realidades insti -  tucionais e orçamentárias da região, destacando a descontinuidade política como um   entrave à consolidação de estratégias inteligentes. A obra de Andrades et al. (2024), re -  ferência na sistematização do modelo espanhol, não incorpora de forma explícita meca -  nismos de escuta dos visitantes nos processos de planejamento e monitoramento. Mes -  mo  o  Modelo  Metodológico  da  Red  Iberoamericana  de  Destinos  Turísticos  Inteligentes    (MM RI-DTI, 2025), embora avance na adaptação do modelo ao contexto regional, não   prevê metodologias de participação direta dos turistas nem considera de forma siste -  mática os desafios sociais, ambientais e políticos que impactam sua experiência.   Esse cenário reforça a lacuna que o presente capítulo busca enfrentar: a ausência da   perspectiva do turista nos estudos e modelos sobre destinos turísticos inteligentes. Ao   analisar os principais eixos de atuação propostos pela Red Iberoamericana de DTI —   Governança, Inovação, Tecnologia, Acessibilidade e Sustentabilidade (econômica, am -  biental e cultural) — nota-se que todos eles demandam algum nível de escuta e enga -  jamento dos turistas. Contudo, os mecanismos de participação ainda são frágeis, e há   escassez de dados empíricos que revelem como os visitantes vivenciam esses destinos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  308  Este  capítulo  propõe,  portanto,  deslocar  o  olhar  da  gestão  para  os  usuários,  inves -  tigando  como  turistas  reais  —  com  suas  diversidades,  expectativas  e  limitações  —    vivenciam os destinos turísticos inteligentes na Ibero-América. O olhar recai sobre a   percepção, o comportamento e os desafios enfrentados pelos visitantes, incluindo os   PCD, à luz dos eixos da Red DTI. Ao trazer a perspectiva dos turistas para o centro do   debate, busca-se contribuir para uma concepção de DTI mais inclusiva e orientada à   experiência vivida, e não apenas à performance tecnológica dos territórios.  5.2. Diversidade de turistas, desafios territoriais e descontinuidade política   5.2.1. O problema da imagem idealizada do turista inteligente  Apesar da centralidade atribuída à figura do turista nas definições e justificativas dos   Destinos  Turísticos  Inteligentes  (DTI),  a  literatura  ainda  carece  de  uma  delimitação    clara  e  consensual  sobre  quem  é,  afinal,  o  chamado  “turista  inteligente”.  Em  muitos    casos, o termo é utilizado de forma implícita, associado à expectativa de um visitante   hiperconectado,  adaptável  ao  ambiente  digital  e  participante  ativo  da  cocriação  de    experiências por meio de tecnologias móveis, sensores e plataformas interativas. De   modo geral, o turista inteligente tem sido descrito como aquele que faz uso intensivo   das Tecnologias da Informação e Comunicação (TICs) antes, durante e após a viagem.   (Buhalis & Amaranggana, 2014; Gretzel et al., 2015; Neuhofer et al., 2012).   No entanto, essa representação homogênea e idealizada ignora aspectos fundamen -  tais da diversidade de perfis, motivações, capacidades e barreiras que caracterizam   o  comportamento  turístico  contemporâneo,  especialmente  nos  contextos  ibero-ame -  ricanos. A concepção generalista de “turista inteligente” desconsidera fatores como o   acesso desigual à internet ou as competências digitais limitadas de parte da popula -  ção. A expectativa de que os turistas sejam usuários competentes de tecnologias inte -  ligentes pode marginalizar perfis que fogem ao padrão digital: turistas idosos, turistas   com deficiência (PCD), viajantes com restrições de leitura ou visão, visitantes de baixa   renda, ou de regiões com conectividade precária. Ainda que tais  públicos  representem   uma parcela expressiva do fluxo turístico — especialmente em destinos religiosos, his -  tóricos, de saúde ou de turismo social —, eles raramente são incluídos nas concepções   dominantes de “turista inteligente”.  A pesquisa conduzida por (Mendes Filho et al., 2022), por exemplo, é uma das poucas   que investigam diretamente a percepção dos turistas sobre as dimensões que caracte -  rizam um DTI na América Latina. Seus resultados indicam que fatores como inovação  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  309  empresarial  e  planejamento  urbano  impactam  positivamente  a  percepção  de  inteli -  gência  de  um  destino,  enquanto  dimensões  como  acessibilidade  foram  pouco  perce -  bidas,  mesmo  sendo  fundamentais.  Ballina  (2022)  analisou  a  percepção  de  turistas    em um destino rural espanhol e destaca que realidades territoriais distintas — como   áreas  rurais  —  exigem  estratégias  específicas,  questionando  a  eficácia  de  modelos    generalistas aplicados a contextos tão diversos. No caso das pessoas com deficiência,   embora existam estudos relevantes sobre políticas públicas e inclusão no turismo bra -  sileiro (Duarte et al., 2015), esses trabalhos não exploram a experiência concreta das   PCD  em  destinos  inteligentes  nem  seu  comportamento  como  usuários  de  tecnologia    ou serviços turísticos digitais, o que evidencia a persistente invisibilidade desses gru -  pos nas pesquisas aplicadas ao campo dos DTI.  Portanto, ao invés de reforçar uma imagem única e aspiracional do turista inteligente,   é necessário reconhecer a pluralidade de perfis que interagem com os destinos e pro -  por uma abordagem centrada no usuário, inspirada em princípios de design inclusivo   e  justiça  digital.  Essa  dissociação  entre  a  imagem  idealizada  do  turista  inteligente  e    os usuários reais dos destinos é ainda mais paradoxal quando se observa que as prá -  ticas em  smart tourism  herdam princípios da inovação digital — especialmente das   metodologias centradas no  design  da experiência do usuário. Em áreas como o desen -  volvimento de aplicativos e plataformas digitais, é amplamente aceita a ideia de que   soluções eficazes devem partir de uma compreensão profunda dos usuários, de suas   rotinas, dificuldades, emoções e contextos (Tussyadiah, 2014).   Para que o conceito de turista inteligente tenha relevância prática, é necessário reo -  rientar o campo para metodologias mais comprometidas com os turistas reais — em   sua pluralidade e complexidade. A desconexão entre as promessas de personalização   e a ausência de escuta qualificada dos visitantes permanece como um dos principais   paradoxos dos DTI contemporâneos.  5.2.2. Os DTI e a diversidade de contextos na América Latina  Na América Latina, pensar em turistas inteligentes exige também reconhecer que os   destinos  não  são  homogêneos  —  e  tampouco  os  contextos  em  que  operam.  Muitos    enfrentam desafios severos de mobilidade urbana, limitações de acessibilidade, inse -  gurança   pública,   regulação  ambiental  rigorosa  ou  vulnerabilidade  ecológica.  Áreas    costeiras,  marinhas  ou  protegidas  demandam,  por  exemplo,  controle  rigoroso  de    fluxos  turísticos  e  tecnologias  sensíveis  ao  ambiente.  Já  centros  urbanos  marcados   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  310  por violência ou desigualdade estrutural exigem abordagens centradas na proteção,   orientação  e  apoio  ao  turista  —  especialmente  para  perfis  mais  vulneráveis,  como    pessoas com deficiência e mulheres viajando sozinhas.   Portanto,  pensar  em  turistas  inteligentes  exige  também  reconhecer  que  os  destinos    não  são  homogêneos  —  e  tampouco  os  contextos  em  que  operam.  Esse  olhar  atento    às  especificidades territoriais e aos fluxos críticos deve orientar o desenvolvimento de   soluções digitais e de inteligência turística, evitando modelos genéricos que ignoram   prioridades locais (Rucci et al., 2025). Em regiões de recursos limitados, como é o caso   de grande parte da América Latina, é fundamental que os investimentos em DTI sejam   guiados por diagnósticos territoriais  sólidos  e pela escuta de segmentos historicamen -  te invisibilizados no planejamento turístico.   5.2.3. Descontinuidade política e fragilidade institucional nos DTI latino-americanos  A consolidação de estratégias inteligentes em destinos turísticos requer não ape -  nas visão  técnica e  inovação digital, mas também estabilidade institucional e con -  tinuidade  de  políticas  públicas.  No  entanto,  esse  é  um  dos  desafios  recorrentes    na  América  Latina,  onde  a  alternância  política  costuma  gerar  descontinuidade    na  implementação  de  projetos,  inclusive  aqueles  voltados  à  transformação  digi -  tal do turismo. Não é incomum que iniciativas articuladas sob a liderança de um   prefeito, governador ou gestor público — incluindo plataformas digitais, sistemas   de  dados,  ações  de  capacitação  e  redes  de  governança  local  —  sejam  desfeitas,    abandonadas  ou  redirecionadas  por  gestões  subsequentes,  resultando  em  perda    de recursos, desmobilização de equipes e frustração entre atores locais (Cavalhei -  ro et al., 2021; Rucci et al., 2025).  Em muitos casos, os projetos de inteligência territorial são desenvolvidos sem ins -  trumentos  legais,  arranjos  de  cogestão  ou  pactos  multissetoriais  que  garantam    sua  continuidade  para  além  dos  ciclos  eleitorais.  A  ausência  de  marcos  legais  e    de  institucionalização  dos  programas  dificulta  a  implementação  de  políticas  de    Estado, e faz com que o desenvolvimento dos DTI dependa excessivamente da von -  tade política de atores pontuais (Cavalheiro et al., 2021). Portanto, pensar em DTI   na  América  Latina  exige  incorporar  a  questão  da  resiliência  institucional  como    parte central da inteligência do destino, com arranjos de governança mais robus -  tos, estratégias de continuidade  técnica  e políticas de inovação protegidas contra   rupturas partidárias. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  311  5.3. Desafíos enfrentados pelos turistas nos DTI  A promessa dos Destinos Turísticos Inteligentes (DTI) é a de proporcionar experiências   mais eficientes, sustentáveis, seguras e personalizadas por meio da integração de tec -  nologias digitais, sistemas de informação e processos de gestão colaborativa (Buhalis   & Amaranggana, 2014; Gretzel et al., 2015; Jovicic, 2019). No entanto, do ponto de vista   do turista, a vivência concreta desses destinos frequentemente está marcada por frus -  trações e barreiras que contradizem o discurso dominante. Se os DTI são concebidos   como ecossistemas orientados à experiência, é fundamental reconhecer que turistas   reais enfrentam desafios que vão além da logística e da conectividade — e que muitas   vezes decorrem de falhas na concepção, implementação ou comunicação das inova -  ções (Femenia-Serra et al., 2019).  Muitos dos aplicativos, plataformas e sistemas de informação desenvolvidos por des -  tinos ou empresas locais não dialogam entre si, exigindo que o turista baixe  múltiplos   apps,  cadastre-se repetidamente e aprenda diferentes lógicas de navegação. Isso re -  sulta em experiências fragmentadas e descontinuadas — justamente o oposto do que   propõe a lógica integrada dos DTI (Jovicic, 2019). Além disso, nem todas as interfaces   são  intuitivas,  acessíveis  ou  disponíveis  em  diferentes  idiomas  e  formatos,  o  que  di -  ficulta  o  uso  por  públicos  diversos,  como  turistas  estrangeiros,  idosos,  pessoas  com    deficiência ou com baixa familiaridade tecnológica (Femenia-Serra et al., 2019).  Outro desafio significativo refere-se à acessibilidade universal, que, embora seja um   dos pilares normativos dos DTI (Andrades et al., 2024), nem sempre se traduz em expe -  riências efetivamente inclusivas. A gestão dos dados pessoais e a transparência sobre   seu  uso  também  se  configuram  como  desafios  crescentes.  Embora  os  DTI  dependam    do uso massivo de dados para personalizar serviços e otimizar a gestão, são raros os   casos em que os turistas são informados de forma clara sobre como seus dados são co -  letados, tratados e armazenados. Isso compromete a confiança nas tecnologias e pode   levar à recusa no uso de soluções digitais, especialmente entre turistas mais sensíveis   às  questões de privacidade ou oriundos de contextos em que a vigilância institucional   é uma preocupação (Femenia-Serra et al., 2019).  Esses  desafios  evidenciam  um  ponto  central:  os  turistas  não  são  apenas  consumido -  res passivos de tecnologia, mas usuários com perfis variados, expectativas diferentes   e  capacidades  desiguais.  A  ausência  de  escuta  qualificada  no  desenvolvimento  e  na    avaliação  das  soluções  oferecidas  pode  comprometer  a  efetividade  das  inovações  e    limitar o potencial transformador dos DTI. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  312  5.4. Perspectiva dos Turistas: Desafios e Possibilidades nos Eixos da Rede DTI  Uma análise preliminar dos sete eixos propostos pela Red Iberoamericana de DTI sob   a  ótica  dos  turistas  revela  um  conjunto  de  desafios  e  de  diretrizes  possíveis  para  o    redirecionamento  dos  DTI  sob  a  ótica  da  demanda  (Tabela  1).  Todos  esses  elementos    apontam  para  a  necessidade  de  recolocar  o  turista  no  centro  da  concepção  dos  DTI,    não como consumidor passivo, mas como sujeito plural, interativo e atuante.  Tabela 1   Desafios e diretrizes para a transformação centrada no turista.  Eixo da Red DTI   Desafios enfrentados pelos turistas   Diretrizes para transformação centrada   no turista  Governança   Falta de escuta ativa, ausência de canais   de feedback, turista tratado como recep -  tor e não como parte interessada.  Incluir  turistas  nos  processos  de  plane -  jamento,  testes  e  monitoramento;  ado -  tar metodologias participativas.  Inovação   Soluções  desenvolvidas  sem  testes  com    usuários  reais;  inovações  simbólicas  e    pouco  úteis  no cotidiano do visitante.  Aplicar princípios de  User-Centered De -  sign  (UCD); testar soluções com  públicos   diversos  e em contextos reais.  Tecnologia   Interoperabilidade  limitada,  interfaces    pouco  acessíveis,  baixa  percepção  de    utilidade ou valor agregado.  Desenvolver  tecnologias  inclusivas,  in -  tuitivas e com suporte; integrar sistemas   e promover comunicação multicanal.  Acessibilidade   Invisibilidade  das  deficiências,  soluções    pontuais,  barreiras  para  PCD  e  neuro -  divergentes em ambientes novos e com -  plexos.  Garantir  acessibilidade   física,  digital,    atitudinal  e  comunicacional  desde  o    projeto;  políticas  construídas  com  as    próprias PCD.  Sustentabilidade   ambiental  Dificuldade  em  adotar  práticas  susten -  táveis;  ausência  de  estímulos  e  infraes -  trutura para escolhas responsáveis.  Integrar  educação  ambiental,  nudges,    feedback  em  tempo  real  e  incentivos    simbólicos via plataformas digitais.  Sustentabilidade   econômica  Preferência  por  grandes  plataformas;    exclusão  de  pequenos  negócios  e  comu -  nidades tradicionais.  Visibilizar  empreendimentos  locais  via    plataformas  públicas;  incluir  grupos    vulneráveis na transformação digital.  Sustentabilidade   cultural  Exotização  de  culturas  locais;  simpli -  ficação  simbólica;  pouca  mediação  ou    contextualização para o visitante.  Desenvolver  mediações  culturais  di -  gitais;  dar  voz   às   comunidades  sobre    como querem ser representadas e viven -  ciadas.  Fonte: Autores.  É    possível  —  e  necessário  —  que  os  DTI  avancem  para  além  da  lógica  instrumental    e adotem abordagens centradas na experiência vivida, promovendo ambientes inte -  ligentes  que  sejam  também  inclusivos,  culturalmente  respeitosos,  economicamente   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  313  justos e ecologicamente cuidadosos. A inteligência de um destino, afinal, está além da   sua infraestrutura digital, está também na sua capacidade de acolher e aprender com   quem o percorre.  5.4.1. Governança: os turistas como stakeholders ausentes  Governança é um dos pilares dos Destinos Turísticos Inteligentes (DTI), definida como   a capacidade dos destinos de organizar a ação coletiva de múltiplos stakeholders —   residentes, setor  público,  setor privado, academia e turistas — em torno de objetivos   compartilhados,  com  base  em  processos  transparentes,  participativos  e  orientados    por dados (Andrades et al., 2024; Buhalis & Amaranggana, 2014). Essa premissa é rei -  terada no modelo da Red Iberoamericana de DTI (2025), que reconhece a governança   como eixo estruturante para o desenvolvimento de destinos mais inclusivos e susten -  táveis. No entanto, os turistas seguem como os menos escutados e menos envolvidos.  A predominância de um modelo centrado na oferta e na gestão  pública,  sem escuta con -  tínua dos turistas, compromete a responsividade dos sistemas (Cavalheiro et al., 2021).   Falta sensibilidade à diversidade de perfis — como PCD, idosos, viajantes solo ou com   baixa inclusão digital — e à coleta qualificada de feedbacks em tempo real. Reforça-se,   portanto,  que  um  DTI  verdadeiramente  inteligente  é  aquele  que  incorpora  os  turistas    como stakeholders legítimos, desde as fases iniciais dos processos de planejamento, tes -  te e monitoramento, com uma visão participativa e duradoura de governança.  5.4.2. Inovação e perspectiva do turista  A inovação em Destinos Turísticos Inteligentes (DTI) é compreendida como a capaci -  dade de desenvolver soluções criativas e adaptadas que ampliem a competitividade,   a sustentabilidade e a qualidade da experiência turística. No entanto, muitos destinos   adotam  uma  abordagem  tecnocêntrica,  promovendo  inovações  de  alto  apelo  visual,    mas com pouca aderência  às  necessidades reais dos visitantes.  A pesquisa de Mendes Filho et al. (2022) mostrou que os turistas valorizam a inovação   quando ela é percebida e melhora concretamente a experiência. Isso sugere que a ino -  vação nos DTI não pode ser reduzida a funcionalidades digitais. Os autores recomen -  dam um conjunto de dimensões prioritárias para a implantação de DTI, que possam   ser  efetivamente  percebidas  pelos  turistas  como  valor  agregado  —  beneficiando  os    visitantes e permitindo um retorno mais  rápido  e menos arriscado dos investimentos   realizados por gestores públicos e privados. Além disso, apontam que esse redirecio - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  314  namento pode favorecer a captação de novos recursos que sustentem ações comple -  mentares e estruturantes para a consolidação do DTI.  Nesse sentido, torna-se necessária a adoção de metodologias centradas na experiên -  cia do turista (Tussyadiah, 2014), com adoção de processos iterativos, baseados em da -  dos empíricos sobre comportamentos, limitações e expectativas dos usuários. Inova -  ções em DTI só serão eficazes se forem testadas com turistas reais, ajustadas a perfis   diversos e integradas a políticas de capacitação, mediação cultural e inclusão digital.   Isso  inclui  também  a  valorização  de  inovações  sociais  e  institucionais,  como  formas    alternativas  de  acolhimento,  gestão  participativa  e  roteiros  comunitários  —  dimen -  sões muitas vezes invisibilizadas nos modelos dominados pela digitalização.  5.4.3. Tecnologia: presença visível, impacto limitado  A  tecnologia  é,  sem  dúvida,  o  eixo  mais  visível  e  frequentemente  o  mais  associado  ao    conceito de Destino Turístico Inteligente, central na proposta da Red Iberoamericana de   DTI (2025). Envolve desde infraestruturas de dados, sensores e IoT até interfaces volta -  das à experiência do turista, como aplicativos móveis, QR codes, realidade aumentada   e inteligência artificial. Apesar dessa centralidade, muitos destinos operam com aplica -  tivos redundantes, QR codes desatualizados e sistemas que não se comunicam entre si.   Essa fragmentação impõe barreiras cognitivas e operacionais ao turista, especialmente   em contextos de curta duração ou de pouca familiaridade cultural com o território.  Além disso, falhas  técnicas  recorrentes — como totens inoperantes, sinalização digital   confusa ou conectividade instável — frustram os visitantes e reduzem a confiança nas   soluções  digitais.  A  ausência  de  mecanismos  claros  de  transparência  no  uso  de  da -  dos pessoais também compromete a adesão a essas tecnologias, principalmente entre   perfis mais sensíveis à privacidade (Femenia-Serra et al., 2019).  Portanto, a tecnologia nos DTI deve ser robusta, bem mantida, acessível e ética, fun -  cionando  como  meio  e  suporte   às   experiências  turísticas,  e  não  como  objetivo  final.    Seu  sucesso  depende  da  integração  com  os  demais  eixos,  priorizando  a  articulação    sistêmica e centrada nas pessoas.  5.4.4. Acessibilidade: a invisibilidade de múltiplas deficiências nos destinos inteligentes  A acessibilidade é frequentemente evocada como um pilar normativo dos Destinos Turísti -  cos Inteligentes (DTI), mas pode ser limitada, na prática, por uma abordagem centrada em  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  315  soluções  físicas  pontuais. Ainda que rampas de acesso e elevadores estejam presentes em   muitos equipamentos turísticos, isso está longe de garantir uma experiência verdadeira -  mente acessível — sobretudo quando se considera a diversidade de pessoas com deficiên -  cia (PCD), incluindo aquelas com deficiências invisíveis, cognitivas e neurodivergências.  O  estudo  de  Duarte  et  al.  (2015)  reforça  essa  crítica  ao  mostrar  que,  no  Brasil,  ain -  da  prevalece  uma   lógica   assistencialista  e  desarticulada  entre  os  setores   público  e    privado,  dificultando  a   construção  de  políticas  de  turismo  realmente  voltadas  à  in -  clusão. Pessoas com deficiência relatam que não se sentem escutadas, que faltam de   informações claras e confiáveis, que a infraestrutura é inadequada e que frequente -  mente evitam viajar para não enfrentar situações de constrangimento ou inseguran -  ça.  A  ausência  de  pesquisas  específicas  voltadas  a  esse   público,  por  parte  tanto  da    gestão  pública  quanto da iniciativa privada, contribui para a sua invisibilização como   consumidores legítimos e relevantes.  Turistas com deficiências invisíveis e neurodivergências enfrentam desafios específi -  cos em destinos turísticos, como sobrecarga sensorial, imprevisibilidade e ausência de   meios alternativos de comunicação (Castro et al., 2025). Políticas e inovações em DTI   devem incorporar estratégias capazes de acolher diferentes formas de processamen -  to sensorial e interação social — o que inclui treinamento de equipes, rotas de baixo   estímulo, materiais em linguagem simples e espaços de autorregulação. Políticas in -  clusivas para DTI devem ser fundamentadas no princípio do “nada para nós sem nós”,   garantindo que as soluções não sejam projetadas apenas para, mas com as pessoas   com deficiência, desde o planejamento até a implementação e a avaliação.  A  acessibilidade,  portanto,  não  pode  ser  reduzida  a  uma  questão  de  infraestrutura    física  ou conformidade legal. Em um destino verdadeiramente inteligente, ela deve ser   transversal e estratégica — presente no planejamento urbano, nos serviços digitais,   na capacitação das equipes, nas interfaces tecnológicas, nas informações turísticas e,   sobretudo, nas formas de escuta dos próprios turistas. Incluir pessoas com deficiência   de  diferentes  tipos  e  espectros  não  é  apenas  um  compromisso  ético,  mas  uma  con -  dição  essencial  para  que  os  DTI  cumpram  seu  propósito:  proporcionar  experiências    turísticas significativas, seguras e acessíveis a todos os públicos.  5.4.5. Sustentabilidade ambiental: o desafio do comportamento turístico sustentável  A sustentabilidade é um dos pilares mais celebrados dos Destinos Turísticos Inteligentes   (DTI), frequentemente vinculada a estratégias de gestão ambiental, eficiência energéti - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  316  ca, preservação do patrimônio e uso racional de recursos. No entanto, a sustentabilida -  de de um destino não pode ser compreendida apenas em termos estruturais ou institu -  cionais — ela depende também, e decisivamente, do comportamento dos turistas.   As  decisões  cotidianas  dos  visitantes  —  como  descartar  resíduos,  reduzir  o  uso  de    plásticos, respeitar normas locais ou optar por serviços responsáveis — têm impactos   imediatos  sobre  o  ambiente  físico,  social  e  simbólico  do  destino.  Contudo,  promover    o  comportamento  sustentável  entre  turistas  é  um  desafio  reconhecido.  O  turismo  é    vivido como uma suspensão temporária das obrigações do cotidiano, onde conveniên -  cia e prazer imediato frequentemente prevalecem sobre a responsabilidade ambiental   (Barr et al., 2011; Juvan et al., 2017; Pizzetti et al., 2024). Isso explica, em parte, a lacu -  na entre atitudes e comportamentos, observada em diversos estudos: turistas que se   declaram  preocupados  com  o  meio  ambiente  não  necessariamente  adotam  práticas    condizentes durante suas viagens (Souza-Neto et al., 2022).  Nesse cenário, os DTI e a transformação digital podem oferecer soluções promissoras,   ainda pouco exploradas. Tecnologias como Internet das Coisas (IoT), inteligência artifi -  cial, big data e sistemas de rastreamento podem monitorar comportamentos em tem -  po real, fornecer feedback personalizado, identificar padrões de consumo e adaptar os   serviços    às   práticas  mais  sustentáveis.  O  empoderamento  digital  do  turista,  por  meio    de  informações  contextualizadas,  indicadores  de  impacto,  sistemas  de  recomendação    consciente e relatórios de pegada ecológica, é uma via ainda incipiente, mas com grande   potencial. Além das tecnologias de suporte à decisão, há espaço para o uso de interven -  ções  comportamentais,  como   nudges    digitais,  jogos  educativos  (gamificação),  storyte -  lling persuasivo, influências sociais positivas e recompensas simbólicas (Mayer, 2025).  Portanto, integrar o comportamento sustentável dos turistas à estratégia dos DTI é mais   do que uma recomendação — é uma necessidade. Sem engajamento dos visitantes, a sus -  tentabilidade corre o risco de permanecer como um ideal institucionalizado, distante das   práticas cotidianas que efetivamente moldam os impactos do turismo nos territórios.   5.4.6.   Sustentabilidade  econômica:  consumo  consciente  e  valorização  da  economia    local  Embora a sustentabilidade econômica costume ser abordada nos DTI a partir da lógi -  ca da competitividade, da eficiência e da diversificação econômica dos destinos (An -  drades et al., 2024), é possível — e necessário — considerá-la também sob a ótica do   turista.  O  visitante  tem  papel  ativo  na  economia  local  por  meio  de  suas  decisões  de   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  317  consumo:  ao  escolher  onde  se  hospedar,  onde  comer,  como  se  deslocar  e  com  quem    contratar experiências, ele contribui direta ou indiretamente para a geração (ou con -  centração) de renda nos territórios.   Dessa forma, a sustentabilidade econômica dos destinos depende, em grande parte, da   qualidade da relação entre o turista e os prestadores de serviço locais, sobretudo os de   pequeno porte. Essa perspectiva ganha especial relevância na América Latina, região   marcada por profundas desigualdades sociais, históricas e territoriais, onde o turis -  mo representa tanto uma oportunidade de redistribuição de renda quanto um risco de   exclusão. Em muitos destinos latino-americanos, pequenos empreendedores, coletivos   locais,  agricultores  familiares  e  comunidades  tradicionais  —  como  indígenas  e  qui -  lombolas  —  desenvolvem  atividades  turísticas  com  forte  identidade  territorial,  mas    enfrentam dificuldades estruturais para acessar os fluxos turísticos e as ferramentas   digitais que os conectariam aos visitantes. A inclusão digital, nesse contexto, torna-se   condição necessária para a inclusão econômica.  No entanto, o comportamento econômico do turista nem sempre favorece esses gru -  pos.  A  preferência  por  grandes  plataformas  digitais,  redes  internacionais  e  expe -  riências  padronizadas  pode  dificultar  o  acesso  dos  pequenos  negócios  ao  mercado    turístico. Essa tendência é amplificada pela assimetria informacional e pela baixa visi -  bilidade de muitos empreendimentos locais. Turistas, especialmente os internacionais   ou de primeira viagem, muitas vezes optam por serviços com maior presença online,   reputação consolidada e atendimento padronizado — mesmo que isso implique me -  nor contribuição para a economia do território visitado.  Os DTI, neste cenário, podem exercer um papel transformador ao promover transpa -  rência, curadoria e visibilidade para os empreendedores locais. Portais e aplicativos   podem dar destaque a prestadores de serviço com  vínculo  comunitário, práticas soli -  dárias e responsabilidade ambiental. Além disso, políticas públicas de transformação   digital devem incluir ações afirmativas para capacitar e equipar esses grupos, respei -  tando seus modos de vida, tempos e formas de organização.  5.4.7. Sustentabilidade cultural: identidade, mediação e o risco da exotização  A sustentabilidade cultural nos Destinos Turísticos Inteligentes (DTI) refere-se à pre -  servação, valorização e transmissão dos patrimônios culturais tangíveis e intangíveis   dos territórios (Modelo Metodológico de la Red Iberoamericana de Destinos Turísticos   Inteligentes  (MM  RI-DTI),  2025).  Envolve  tanto  a  proteção  de  bens  materiais  —  sítios   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  318  históricos, artefatos, centros urbanos — quanto a promoção de saberes, práticas, lín -  guas, rituais, culinárias, expressões artísticas e formas de vida que dão sentido e iden -  tidade  aos  destinos.  Na  experiência  turística,  esses  elementos  são  frequentemente  o    ponto de contato mais sensível entre visitante e comunidade local.  Quando  os  DTI  são  concebidos  apenas  como  sistemas  de  gestão  e  tecnologia,  sem    atenção  às  dimensões simbólicas da experiência, eles correm o risco de induzir uma   simplificação cultural que deslegitima a diversidade em nome da padronização e da   conveniência.  Do ponto de vista do turista, a sustentabilidade cultural está associada à capacidade   de compreender, respeitar e se conectar com a cultura local de maneira não invasiva   nem superficial. Isso implica acesso a informações de qualidade, mediação interpre -  tativa, experiências contextualizadas e reconhecimento da diversidade como valor. Os   DTI podem atuar nesse sentido por meio de tecnologias de mediação cultural: audio -  guias  multilíngues,  realidade  aumentada  em  museus  e  centros  históricos,  platafor -  mas  digitais  de  contação  de  histórias,  aplicativos  de  tradução  de  línguas  indígenas,    entre outros.  5.5. Desafios metodológicos para a inclusão da perspectiva do turista em DTI  Investigar a experiência dos turistas em Destinos Turísticos Inteligentes (DTI) apresen -  ta desafios metodológicos relevantes, que raramente são enfrentados de forma direta   na literatura. Ainda que tecnologias como big data, sensores e geolocalização possam   fornecer  informações  valiosas  sobre  fluxos  turísticos  e  padrões  de  movimento,  elas    raramente capturam as motivações, frustrações ou decisões subjetivas envolvidas na   experiência do turista (Menezes et al., 2022).   Uma das principais dificuldades está relacionada ao próprio caráter efêmero e tran -  sitório da presença do turista no destino: como sujeitos em deslocamento, os turistas   estão  imersos  em  experiências  de  lazer,  descanso  ou  busca  por  novidade,  o  que  fre -  quentemente reduz sua disposição para participar de pesquisas, entrevistas ou testes   de usabilidade (Juvan et al., 2017). O tempo disponível é limitado, e há, muitas vezes,   uma  preferência  clara  por  evitar  qualquer  forma  de  compromisso  ou  interferência    em  sua  jornada.  Essa  limitação  tem  implicações  diretas  para  os  esforços  de  desen -  volvimento de soluções centradas no usuário, já que a escuta e o envolvimento ativo   dos turistas nos processos de teste, prototipação e validação de tecnologias se tornam   logisticamente complexos.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  319  Esses fatores se tornam ainda mais críticos para pessoas com deficiência, restrição de   mobilidade  ou  neurodivergências.  Compreender  como  esses  grupos  interagem  com    os elementos tecnológicos e informacionais dos DTI exige abordagens metodológicas   mais empáticas, iterativas e, idealmente, baseadas em dados coletados em tempo real   durante a experiência de viagem. Isso torna essencial o desenvolvimento de métodos   mistos,  etnografias  móveis,  diários  de  viagem  digitais  e  sistemas  de  feedback  contí -  nuo,  que  possam  aproximar  os  pesquisadores  da  experiência  vivida  do  turista,  sem    invadir sua privacidade ou perturbar sua jornada.   Um exemplo concreto das possibilidades metodológicas para captar a experiência sub -  jetiva do turista em tempo real pode ser encontrado no estudo de Mayer et al. (2019),   que investigou as flutuações no bem-estar durante viagens com uma abordagem que   combinou observação participante com o método de amostragem de experiência ( Ex -  perience Sampling Method  – ESM) via aplicativo de mensagem. Essa combinação re -  velou nuances frequentemente invisíveis nos dados estruturados, como desconfortos   situacionais e ambivalências emocionais. Com as recentes inovações em  chatbots , que   utilizam inteligência artificial e processamento de linguagem natural para coletar fee -  dback por meio de interações conversacionais, ampliam-se as possibilidades de cap -  tar experiências em tempo real de forma mais envolvente e personalizada, inclusive   em plataformas de mensagens e sites (Xiao et al., 2020).  Desta  forma,  pesquisar  turistas  em  DTI  requer  abordagens  metodológicas  robustas,    criatividade, respeito aos ritmos dos visitantes, sensibilidade  às  variáveis situacionais   e  inovação  no  desenho  dos  instrumentos  de  campo.  Reconhecer  essas  limitações  é  o    primeiro passo para superá-las — e, assim, produzir conhecimento mais significativo,   aplicável e comprometido com a experiência dos usuários reais.  5.6. Considerações finais  Este capítulo teve como objetivo central reposicionar os turistas como protagonistas   nas discussões sobre Destinos Turísticos Inteligentes (DTI), dando visibilidade a temas   e questões geralmente negligenciados. A proposta partiu da constatação de que, em -  bora  os  DTI  sejam  concebidos  em  nome  da  melhoria  da  experiência  do  visitante,  a    literatura  acadêmica  e  os  modelos  institucionais  têm  dado  pouca  atenção  à  escuta    qualificada e sistemática dos turistas reais — especialmente daqueles com perfis di -  versos, necessidades específicas ou acesso limitado  às  tecnologias.  Ao longo do capítulo, foi possível oferecer diretrizes concretas sobre como perspec -  tiva  do  turista  pode  ser  adotada  em  todas  as  dimensões  de  DTI  preconizadas  pelo   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  320  Red  Iberoamerica,  ampliando  as  possibilidades  relacionadas  ao  planejamento  de    destinos. Foram também discutidas dimensões como a sustentabilidade econômica   com foco na valorização de pequenos empreendedores e comunidades tradicionais;   e a sustentabilidade cultural voltada à preservação simbólica e linguística dos ter -  ritórios.  Destacou-se  que  a  transformação  digital  pode  ser  uma  aliada  importante    na comercialização de experiências locais, desde que acompanhada de políticas de   inclusão digital e respeito  às  dinâmicas socioculturais de grupos historicamente ex -  cluídos ou invisibilizados.  As futuras pesquisas sobre Destinos Turísticos Inteligentes devem se voltar ao desafio   de  incluir  turistas  reais  nos  processos  de  escuta,  monitoramento  e  experimentação,    ao  longo  de  diferentes  etapas  da  experiência  e  da  cadeia  de  valor  dos  destinos.  Isso    requer o uso de metodologias qualitativas, participativas, interseccionais e compara -  tivas, capazes de captar a diversidade de perfis e contextos. Também se torna neces -  sário mapear como os DTI têm utilizado tecnologias e inovações — digitais, sociais e   organizacionais  —  para  induzir  comportamentos  mais  sustentáveis,  avaliando  não    apenas a existência das soluções, mas sua efetividade, seus  públicos- alvo e sua ade -  quação aos contextos territoriais onde são aplicadas.  Para que os DTI se tornem de fato instrumentos de inovação e inclusão, é necessário   reformular a maneira como o turista é compreendido nos projetos, políticas e indica -  dores. Os modelos atuais devem ser revisitados à luz de quatro princípios:  1.   Adoção  sistemática  de  metodologias  centradas  na  experiência  de  usuários  e    práticas de escuta ativa ao longo de todo o ciclo de vida das soluções.   2.  Compromisso com a diversidade e a equidade, com segmentações mais quali -  ficadas que incluam turistas PCD, neurodivergentes, idosos, mulheres em via -  gens solo, pessoas com baixa conectividade digital e visitantes oriundos de te -  rritórios periféricos.   3.  Promoção da justiça econômica e cultural, por meio da valorização de cadeias   produtivas  locais,  da  visibilização  de  prestadores  tradicionalmente  excluídos    e do respeito aos patrimônios simbólicos dos destinos, sempre com o apoio de   tecnologias acessíveis e participativas.   4.  Transformação comportamental sustentável, com estratégias que integrem in -  fraestrutura, informação e estímulos inteligentes para favorecer escolhas mais   responsáveis por parte dos turistas. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  5. Turistas inteligentes  321  Desta forma, um destino só pode ser considerado verdadeiramente inteligente se for   capaz de compreender e superar a visão homogênea e generalista de “turistas inteli -  gentes”, promovendo relações éticas, sustentáveis e sensíveis ao contexto.  Referências bibliográficas  Andrades,  L.,  Romero-Dexeus,  C.,  &  Martínez-Marín,  E.  (Orgs.).   (2024).    The  Spanish    Model for Smart Tourism Destination Management: A Methodological Approach .   Springer International Publishing.  https://doi.org/10.1007/978-3-031-60709-7  Avineri, E. (2012). Users’ interpretation of travel information and implications for sys -  tem  design.  Sense  Transport’12  -  Proceedings  of  the  6th  ACM  Workshop  on  Next    Generation  Mobile  Computing  for  Dynamic  Personalised  Travel  Planning,  1–2.    https://doi.org/10.1145/2307874.2307876  Ballina, F. J. D. la B. (2021). Smart concept i I.  P.  (2014).  Toward  a  Theoretical  Foundation  for  Experience  De -  sign  in  Tourism.   Journal  of  Travel  Research ,  53 (5),  543–564.   https://doi.  org/10.1177/0047287513513172  Williams,  M.,  Yao,  K.  K.  K.,  &  Nurse,  J.  R.  C.  (2020).   Developing  an  Augmented  Real -  ity  Tourism  App  through  User-Centred  Design  (Extended  Version)   (No.  arX -  iv:2001.11131). arXiv.  https://doi.org/10.48550/arXiv.2001.11131  Xiao,  Z.,  Zhou,  M.  X.,  Liao,  Q.  V.,  Mark,  G.,  Chi,  C.,  Chen,  W.,  &  Yang,  H.  (2020).  Tell  Me    About Yourself: Using an AI-Powered Chatbot to Conduct Conversational Surveys   with Open-ended Questions.  ACM Transactions on Computer-Human Interaction ,   27 (3), 1–37.  https://doi.org/10.1145/3381804  Zapata, L. L., & Beltrami, M. (Eds.). (2025).  Modelo Metodologico de la Red Iberoameri -  cana de Destinos Turísticos Inteligentes (MM RI-DTI)  (No. 1; p. 20). RED IBEROAME -  RICANA DE DESTINOS TURÍSTICOS INTELIGENTES. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  6. Conclusiones  324  6. Conclusiones  Ana Clara Rucci  Instituto de Investigaciones en Turismo, Facultad de Ciencias Económicas,   Universidad Nacional de La Plata, Argentina.  Ledys Vianey López Zapata  Grupo de Investigación GIET., I.U Colegio Mayor de Antioquia, Colombia.  Alexandre Augusto Biz  Universidade Federal de Santa Catarina, Brasil.  El proceso de construcción del presente libro ha permitido articular miradas, enfoques   y experiencias diversas en torno a un mismo objetivo: comprender, desde una perspec -  tiva regional y crítica, la evolución del modelo de Destinos Turísticos Inteligentes (DTI)   en Iberoamérica y sus implicancias en la gobernanza, la innovación y la sostenibilidad   de los territorios turísticos. A lo largo de sus capítulos, se ha evidenciado que el modelo   propuesto por la Red Iberoamericana de DTI no constituye una mera adaptación del   modelo español, sino el resultado de un proceso de reinterpretación situado que emer -  ge de las realidades, capacidades institucionales y aspiraciones de los países de la re -  gión. Su desarrollo revela la madurez de un campo en expansión que, al tiempo que   se apoya en los pilares conceptuales de la inteligencia turística, resignifica su sentido   desde los contextos latinoamericanos, caracterizados por la desigualdad estructural,   la diversidad cultural y la necesidad de fortalecer la integración regional.  La  lectura  comparada  de  las  experiencias  nacionales  demuestra  que  el  avance  del    paradigma  DTI  ha  seguido  trayectorias  heterogéneas.  En  Argentina,  el  proceso  se    configura  a  partir  de  un  modelo  de  policentricidad  y  normalización  técnica,  donde    convergen gobiernos locales, universidades, organismos técnicos y actores privados.   La creación del Instituto Ciudades del Futuro (ICF), la publicación de la norma IRAM   42101 y la conformación de la Red Argentina de Destinos Turísticos Inteligentes, cons -  tituyen hitos relevantes en la institucionalización del modelo, pese a la discontinuidad   de  las  políticas  públicas  nacionales.  A  diferencia  de  ello,  Brasil  ha  consolidado  una    estrategia más estructurada, encabezada por el Ministerio de Turismo en alianza con   el SEBRAE, el BID y la Asociación Brasileña de Normas Técnicas (ABNT), lo que permi -  tió desarrollar la norma NBR 17259 y desplegar un programa federal que “tropicaliza”  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  6. Conclusiones  325  el  modelo  de  destino  inteligente,  incorporando  ejes  propios  —seguridad,  movilidad,    creatividad  y  marketing—  adaptados  a  las  necesidades  del  territorio.  Ambos  casos    muestran la importancia de la articulación público-privada y de la capacidad de ge -  nerar marcos normativos nacionales como base para la gestión de la inteligencia tu -  rística.  En Colombia y México, el enfoque de destinos inteligentes se integra progresivamente   a  las  políticas  de  digitalización  y  desarrollo  sostenible:  en  Colombia,  la  competitivi -  dad y transformación digital operan como habilitadores del modelo, mientras que en   México  el  sector  privado  impulsa  el  turismo  inteligente.  Uruguay  se  proyecta  desde    una gobernanza colaborativa y cooperación internacional, asumiendo un rol pionero   en  la  construcción  de  un  modelo  regional  entre  la  Intendencia  de  Montevideo,  SEGI -  TTUR  y  la  Asociación  de  Universidades  Grupo  Montevideo  (AUGM),  consolidando  la    vocación  integradora  del  modelo  iberoamericano.  Perú  representa  una  experiencia    emergente, donde la sostenibilidad cultural constituye la base para la transformación   digitalde los destinos, dando cuenta de un proceso en gestación que prioriza la dimen -  sión  sociocultural  del  turismo.  Estas  seis  trayectorias  permiten  identificar  patrones    diferenciados  de  apropiación  del  modelo  DTI  —policéntrico  (Argentina),  tropicaliza -  do (Brasil), liderazgo en la gobernanza y transformación digital (Colombia), liderazgo   en  la  gobernanza  desde  el  sector  privado  (México),  colaborativo-regional  (Uruguay)    y cultural-sostenible (Perú). Estas experiencias, tomadas en conjunto, evidencian que   la inteligencia turística en América Latina se despliega como un proceso incremental,   adaptativo  y,  en  muchos  casos,  liderado  por  actores  subnacionales,  donde  la  acade -  mia  y  las  redes  regionales  desempeñan  un  papel  articulador  clave.  En  suma,  la  in -  teligencia turística en Iberoamérica no se importa: se reinterpreta, configurando así   un mapa de inteligencias situadas que expresan la diversidad institucional, cultural y   territorial de la región.  Desde  una  mirada  transversal,  los  ejes  constitutivos  del  modelo  iberoamericano  —  gobernanza,  innovación,  tecnología,  accesibilidad  y  sostenibilidad—  se  expresan  en    la región de manera desigual, pero revelan un conjunto de aprendizajes comunes. La   gobernanza  se  erige  como  el  componente  más  determinante,  en  tanto  orienta  la  ar -  ticulación  entre  niveles  de  gobierno,  sectores  productivos  y  sociedad  civil.  Su  forta -  lecimiento  depende  no  sólo  de  estructuras  institucionales  estables,  sino  también  de    procesos  participativos  que  legitimen  las  políticas  públicas  y  promuevan  la  corres -  ponsabilidad  en  la  gestión  del  destino.  La  innovación,  por  su  parte,  se  manifiesta  en    experiencias que integran tecnología y creatividad, como los laboratorios de turismo  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  6. Conclusiones  326  inteligente, los programas de incubación de proyectos o las alianzas universidad-em -  presa, que impulsan nuevas formas de valor en la experiencia turística. En cuanto al   eje tecnológico, los avances en plataformas de información, sistemas de datos abier -  tos y observatorios permiten una aproximación más empírica y eficiente al fenómeno   turístico,  aunque  todavía  persisten  brechas  digitales  significativas  entre  territorios.    La accesibilidad, entendida como principio de equidad y derecho, continúa siendo un   desafío estructural: si bien se reconocen progresos en países como Argentina y Uru -  guay, donde las políticas de inclusión se han integrado a la planificación turística, su   incorporación sistemática en la región aún es incipiente. Finalmente, la sostenibilidad   constituye el eje más transversal, no solo en su dimensión ambiental sino también en   sus dimensiones económica, social y cultural, reafirmando la necesidad de vincular la   inteligencia turística con los Objetivos de Desarrollo Sostenible (ODS) y con una ética   del desarrollo territorial inclusivo.  El  modelo  iberoamericano  de  DTI  emerge,  en  este  sentido,  como  una  construcción    colectiva  que  busca  equilibrar  la  transferencia  de  conocimiento  técnico  con  la  pro -  ducción de saberes propios. Frente a los modelos europeos —caracterizados por altos   niveles  de  institucionalización,  financiamiento  estable  y  homogeneidad  administra -  tiva—, los países iberoamericanos han desarrollado un enfoque más flexible, colabo -  rativo y situado. Este modelo no pretende replicar estándares, sino adaptarlos a reali -  dades institucionales donde la fragmentación, la escasez de recursos, la inestabilidad   económica de los países latinoamericanos y la diversidad cultural son rasgos estruc -  turales. En consecuencia, la inteligencia turística en Iberoamérica no debe entenderse   únicamente  como  una  estrategia  de  digitalización,  sino  como  un  proceso  político  y    social orientado a fortalecer capacidades, mejorar la calidad de vida de la población   residente  y  garantizar  la  accesibilidad  universal  a  los  beneficios  del  turismo  (Ivars -  -Baidal et al., 2021; Rucci et al., 2025).   El valor de este libro reside precisamente en haber logrado sistematizar este proceso   heterogéneo  y  en  haber  construido  un  espacio  de  diálogo  entre  actores  académicos,    institucionales y técnicos que, desde diferentes países y lenguas, han contribuido a de -  linear los contornos del modelo iberoamericano. El trabajo conjunto de investigadores   de Argentina, Brasil, Colombia, México, Uruguay y Perú, así como la participación de   referentes de la Red Iberoamericana de Destinos Turísticos Inteligentes, ha permitido   articular  un  diagnóstico  compartido  sobre  las  oportunidades  y  desafíos  que  enfren -  ta  la  región  para  avanzar  hacia  destinos  más  sostenibles,  inclusivos  e  innovadores.    La  cooperación  científica  promovida  en  el  marco  del  Programa  Iberoamericano  de   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  6. Conclusiones  327  Ciencia y Tecnología para el Desarrollo (CYTED) ha sido determinante para posibilitar   esta convergencia de perspectivas y metodologías, reafirmando la importancia de la   integración iberoamericana en la producción de conocimiento turístico.  Al  mismo  tiempo,  este  volumen  reconoce  sus  limitaciones,  inherentes  a  la  diver -  sidad  de  los  contextos  analizados.  Las  diferencias  en  la  disponibilidad  de  datos,    la  escasez  de  indicadores  comparables  y  la  volatilidad  de  las  políticas  públicas    dificultan  la  construcción  de  un  marco  homogéneo  de  evaluación.  Asimismo,  la    naturaleza dinámica del turismo y la velocidad de los cambios tecnológicos exigen   una actualización constante de las metodologías y de los marcos teóricos emplea -  dos. No obstante, estas limitaciones no deben interpretarse como obstáculos, sino   como estímulos para la continuidad del trabajo colectivo y para el fortalecimiento   de la investigación interdisciplinaria sobre inteligencia turística. En efecto, el libro   abre  un  horizonte  de  futuras  líneas  de  estudio  vinculadas  con  la  medición  de  la    madurez digital de los destinos, la evaluación de impactos sociales y ambientales   de la transformación digital, y el diseño de políticas de innovación orientadas a la   inclusión territorial.  Más allá de los diagnósticos y las comparaciones, el principal aporte de esta obra re -  side en la afirmación de un principio común: la inteligencia turística, entendida desde   Iberoamérica, debe concebirse como una herramienta de justicia territorial y de for -  talecimiento de la democracia local. Al priorizar la sostenibilidad, la accesibilidad y la   gobernanza participativa, el modelo iberoamericano ofrece una alternativa frente a   las visiones tecnocráticas del desarrollo, proponiendo una mirada humanista y terri -  torialmente equilibrada del turismo. En este marco, el concepto de destino inteligente   se redefine como un proceso de aprendizaje colectivo, donde la tecnología se pone al   servicio del bienestar ciudadano y la innovación se orienta a la construcción de socie -  dades más resilientes e inclusivas (Bastidas-Manzano et al., 2021).   Finalmente, este libro se inscribe en una vocación de continuidad. Lejos de constituir   un punto de llegada, representa un punto de partida para nuevas investigaciones, co -  laboraciones  institucionales  y  proyectos  de  cooperación  técnica  entre  países  iberoa -  mericanos. La red de autores y entidades que lo hizo posible constituye, en sí misma,   un ejemplo de gobernanza inteligente aplicada al conocimiento. La consolidación del   modelo iberoamericano de DTI dependerá de la capacidad colectiva para sostener es -  tos vínculos, compartir experiencias, formar nuevos profesionales y diseñar políticas   basadas  en  evidencia.  En  tal  sentido,  la  Red  Iberoamericana  de  Destinos  Turísticos    Inteligentes  y  la  Red  CYTED  asumen  un  papel  central  como  espacios  de  articulación   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  6. Conclusiones  328  científica y política que posibilitan el intercambio de saberes y la construcción de un   patrimonio común de conocimiento en turismo.  La edición de esta obra bajo el auspicio de la Red CYTED representa, asimismo, un re -  conocimiento al esfuerzo de cooperación interinstitucional desarrollado entre univer -  sidades, organismos públicos y entidades técnicas de la región. Su publicación marca   un hito en la consolidación de un pensamiento turístico iberoamericano comprometi -  do con la sostenibilidad, la inclusión y la transformación digital. Asimismo, la decisión   editorial de respetar el idioma nativo de cada autor no sólo preserva la autenticidad   discursiva  de  las  contribuciones,  sino  que  simboliza  la  voluntad  de  construir  un  co -  nocimiento  verdaderamente  iberoamericano,  multilingüe  y  compartido,  donde  las    diferencias  culturales  se  entienden  como  una  fortaleza  colectiva.  Este  libro,  fruto  de    un  trabajo  colectivo  y  plural,  se  proyecta  como  una  referencia  académica  y  prácti -  ca para investigadores, docentes, gestores públicos y actores privados, pero también   como una invitación a continuar construyendo, desde la diversidad y la cooperación,   los futuros inteligentes del turismo en Iberoamérica.   Por último, este libro es una invitación a imaginar futuros turísticos inteligentes con -  cebidos desde Iberoamérica: más inclusivos, más participativos y profundamente hu -  manos. No se trata solo de gestionar destinos, sino de proyectar territorios donde la   tecnología amplíe derechos y oportunidades, garantizando que los beneficios del turis -  mo alcancen a todas las personas.   Referencias bibliográficas  Bastidas-Manzano,  A.  B.,  Sánchez-Fernández,  J.,  &  Casado-Aranda,  L.  A.  (2021).   The   past,  present,  and  future  of  smart  tourism  destinations:  A  bibliometric  anal -  ysis.  Journal  of  Hospitality  &  Tourism  Research,  45 (3),  529-552.   https://doi.  org/10.1177/1096348020967062  Ivars-Baidal, J. A., Celdrán-Bernabéu, M. A., Femenia-Serra, F., Perles-Ribes, J. F., & Gin -  er-Sánchez, D. (2021a). Measuring the progress of smart destinations: The use of in -  dicators as a management tool.  Journal of Destination Marketing & Management,   19.  https://doi.org/10.1016/j.jdmm.2020.100531  Rucci, A. C., Isoardi, A. E. & Viletto, P. (2025).  Expansión del modelo español de Destinos   Turísticos Inteligentes hacia ciudades y destinos de América Latina .   ICE, Revista de   Economía, (938).   https://doi.org/10.32796/ice.2025.938.7888 \n\n";

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {

        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,

            chatBubbleBotBg: botBg,

        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');

        finally {

            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
