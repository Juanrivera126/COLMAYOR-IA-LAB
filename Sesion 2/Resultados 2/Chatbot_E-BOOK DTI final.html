i.  org/10.1007/978-3-319-14343-9_8  Zhu, W., Zhang, L., & Li, N. (2014). Challenges, function changing and strategy innova -  tion  of  smart  tourism  destination.  In  Z.  Xiang  &  I.  Tussyadiah  (Eds.),   Information   and  Communication  Technologies  in  Tourism  2014   (pp.  89–101).   Springer.    https://  doi.org/10.1007/978-3-319-03973-2_7  Yin, R. K. (2016).  Pesquisa qualitativa do início ao fim  (2ª ed). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 161  3.3. Eje Innovación  Alexandre Augusto Biz  Universidade Federal de Santa Catarina, Brasil.  Dores Cristina Grechi  Universidade Estadual do Mato Grosso do Sul, Brasil.  3.3.1. Introduçao   O  setor  de  turismo  tem  demonstrado  uma     resiliência  notável  a  eventos  negativos,    adaptando-se e inovando para se recuperar de crises, como a pandemia de COVID-19,   que acelerou o trabalho remoto e o surgimento do mercado de nômades digitais. Essa   adaptabilidade e o uso de estratégias inovadoras são cruciais para a sobrevivência e   o crescimento das empresas do setor (Pappas et al., 2023).  Lasisi  et  al.  (2025)  citam  que  um  ambiente  favorável,  a  partir  do  papel  do  Governo,    facilitará a inovação no turismo, o que afetará positivamente o crescimento econômi -  co em destinos turísticos inteligentes. Ao mesmo tempo que a priorização do turismo   como  estratégia  de  desenvolvimento  também  facilita  a  inovação  no  turismo,  o  que    impacta positivamente o crescimento econômico em destinos turísticos inteligentes.  Hjalager (2010) descreve que a inovação é o processo de engajar-se em novas melho -  rias e ideias inovadoras relacionadas a um produto ou serviço, processo, marketing,   método organizacional ou organização do local de trabalho. A inovação pode influen -  ciar relacionamentos externos e a implementação comercial ou industrial de melho -  rias e novidades.  Işık et al. (2022) corroboram que a inovação é vista como uma   fonte primordial de van -  tagem competitiva e desempenho  no  setor de turismo. A inovação no turismo pode ser   entendida como a criação e implementação de novos produtos ou serviços, processos,   métodos de marketing, ou  métodos  organizacionais em práticas de negócios, organi -  zação do local de trabalho ou relações externas. Também é descrita como criatividade,   resolução de problemas e novas formas de pensar (Zhou et al., 2024; Işık et al. 2022).  Zhou et al. (2024) destacam que a inovação no turismo é um campo em constante evolu -  ção, impulsionado por mudanças nas demandas dos consumidores, avanços tecnológi -  cos e a necessidade de resiliência diante de incertezas e crises globais. Ela é vista como   uma fonte primordial de vantagem competitiva e desempenho no setor de turismo.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 162  Logo,  a  inovação  pode  envolver  novos  produtos/serviços,  métodos  de  produção/dis -  tribuição, ou mudanças na gestão e organização de recursos humanos, considerando:   (SEGITTUR y Andrades, 2024):  •   Ser  um  fator  crítico  de  competitividade  para  destinos  e  empresas  do  setor  a    médio e longo prazo;  •   Representar  uma  ferramenta  estratégica  para  lidar  com  os  desafios  do  setor    turístico, que é altamente globalizado, competitivo e sensível a mudanças; e  •  Contribuir para transformar os destinos em lugares melhores para turistas e   residentes.  Ozseker (2019) integrou literatura da teoria de clusters, sistemas de inovação, relações   de rede, gestão do conhecimento e inovação para propor cinco estágios de inovação   em  destinos  turísticos:  agrupamento,  integração,  configuração,  conversão,  transfe -  rência e implementação.  Zhou et al. (2024) apresentam um framework de destinos inovadores baseado em duas   estruturas principais, conforme quadro 1.  Quadro 1  Estrutura para inovação em turismo.   Estrutura   Conceito   Ações  Inovação baseada   em Agência  Na inovação baseada em agências, os   destinos  incentivam  as  empresas  lo -  cais  a  inovarem,  fornecendo  serviços    para o novo mercado, ao mesmo tem -  po que colaboram com partes interes -  sadas   públicas   e  privadas  para  mar -  keting e branding.  Inovação Gerencial  Inovação em Marketing  Inovação  em  Produtos  e/u    Serviços  Estrutura de   Inovação  Inovação  estrutural  refere-se  à  orga -  nização  dos  recursos  e  processos  de    uma empresa de novas maneiras para   criar valor.   Inovação Institucional  Inovação de Processos  Fonte: Adaptado de Zhou et al. (2024).   Lasisi et al. (2025) estão alinhados com a estrutura de inovação apresentada no qua -  dro 1 ao ressaltar que o Governo é essencial na formação da competitividade, e o grau  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 163  em que o Governo enfatiza esse setor pode ser visto como a priorização da indústria   do  turismo.  Governos  que  priorizam  a  indústria  do  turismo  e  tomam  medidas  para    criar uma estratégia eficaz de marketing de destino para a indústria fomentam a ino -  vação. Destacam ainda que as barreiras à inovação na estratégia e na política de tu -  rismo incluem a escassez de visão estratégica e a  ênfase mínima  na inovação.  A Organização Mundial de Turismo (UNWTO, s.d.) descreve que promover um ecossis -  tema de inovação e empreendedorismo turístico bem-sucedido exige conectar, ao me -  nos, seis principais grupos  às  oportunidades de colaboração e priorizar a capacitação   em turismo e tecnologia, sendo:  •   Políticas  governamentais  e  de  entidades  públicas:  que  fomentam  a  inovação,  o    comércio e a adoção de tecnologias, em geral, promovem a inovação no turismo;   •   Academia:  cria  estruturas  e  modelos  sobre  inovação  sustentável  no  turismo    e  destinos  inteligentes,  contribui  com  conhecimento  para  governos,  startups,    MPMEs e startups, além de apoiar parceiros comerciais;  •  Empresas: desenvolvem novas tecnologias, conscientizam internamente sobre   inovação  e  implementam  uma  estrutura  organizacional  e  uma  visão  para  a    tecnologia, investindo em inovação aberta;  •  Start-ups e MPMEs: desenvolvem e implementam tecnologias disruptivas no tu -  rismo, satisfazem e refletem as necessidades e demandas dos viajantes e criam   soluções inovadoras no turismo que apoiam os ODS;  •  Investidores: investem em projetos sustentáveis   relacionados ao turismo e tec -  nologia, apoiam o crescimento e a internacionalização de Corporações, Desti -  nos, MPMEs e Startups; e  •  Parceiros de Negócios: apoiam Startups que impactam direta ou indiretamente   a cadeia de valor do turismo.  A Europa é o principal destino turístico mundial, e A Comissão Europeia (s.d.) imple -  mentou a Rede Europeia de Polos de Inovação Digital (EDIH) reconhecendo seu papel   crucial em guiar o setor em uma transição “digital, sustentável e segura”. Esta inicia -  tiva segue o  transition pathway  cocriado pela Comissão Europeia com a indústria e a   sociedade civil, visando um ecossistema turístico resiliente, verde e digital (European   Commission, s.d.).  O grupo de trabalho de Turismo dos EDIH concentra seus esforços em três objetivos   principais para o setor: \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 164  •  Investimento na Economia Circular: objetivo é “reduzir o consumo de energia,   resíduos, uso de  água  e poluição, ao mesmo tempo em que se atende à crescente   demanda  por  turismo  sustentável”.  Isso  implica  uma  mudança  fundamental    nas práticas operacionais para alinhar o crescimento do turismo com a respon -  sabilidade ambiental;  •  Melhoria das Práticas de Compartilhamento de Dados: visa “possibilitar novos   serviços  turísticos  inovadores  e  aprimorar  a  gestão  sustentável  de  destinos”.    O uso eficaz de dados pode otimizar a experiência do turista e a tomada de de -  cisões para um turismo mais responsável; e  •   Estímulo  ao  Desenvolvimento  de  Habilidades:  objetivo  é  “garantir  uma  força    de trabalho qualificada e carreiras atraentes”. A transição digital e sustentável   exige novas competências, e o EDIH busca apoiar o desenvolvimento profissio -  nal dentro do setor.  A iniciativa envolve uma ampla gama de  stakeholders  como os próprios EDIHs :  como   polos  de  inovação  digital  que  operam  no  setor  de  turismo,  as  Instituições  Europeias    e  Nacionais  de  Turismo  e  os  Intermediários  e  Associações  Representativas  do  setor    (European Commission, s.d.).  Por fim, SEGITTUR et al. (2024) cita alguns desafios e limitações na implementação da   inovação, a saber:  •  A implementação do pilar de inovação é complexa devido à própria natureza do   conceito, sua aplicação ao turismo (setor de serviços) e sua transferência para   a administração  pública local;  •  Resistência a mudanças e a estrutura do setor turístico são barreiras comuns,   incluindo:  falta  de  recursos  humanos  com  formação  em  inovação,  financia -  mento  instável,  liderança   pública  insuficiente  e   dificuldade  de  integrar  siste -  maticamente a inovação nas empresas;  •  A dificuldade de identificação, medição e transferência de inovações é um pro -  blema prático;  •  A inovação não é uma parte explícita das competências tradicionais das auto -  ridades locais;  •  Em destinos menores ou rurais, a área de tecnologia pode assumir o papel de   promotora de projetos inovadores, levando a um viés tecnológico nas inovações   identificadas; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 165  •  A falta de planejamento estratégico para a inovação e a ausência de recursos   dedicados são obstáculos significativos; e  •   Frequentemente,  o  setor  de  turismo  não  é  considerado  internamente  com  po -  tencial para inovação dentro da administração local, e a área de turismo pode   estar distante das estruturas que promovem projetos de transformação.  3.3.2. Eixos de Inovação  São apresentados três  âmbitos  de inovação da  Red Iberoamericana DTI  divididos em   gestão  e  governança  inovadora,  atividades  de  inovação  e  ecossistema  de  inovação,    representados no quadro 2.  Quadro 2   Eixo de inovação do Modelo da RIDTI: requisitos, indicadores e pesos.   INOVAÇÃO  A. Gestão e   Governança   inovadora  Requisitos   Indicadores   Peso do   Requisito  Estratégia e sistema de gestão   da inovação no destino   1   2   28,6%  Fomento a inovação aberta   1   3   42,8%  Recursos públicos para a   inovação   1   2   28,6%  TOTAL ÂMBITO   3   7   100%  B. Atividades de   inovação  Desenvolvimento de produtos e   serviços turísticos inovadores   1   1   50%  Inovação em processos   1   1   50%  TOTAL ÂMBITO   2   2   100%  C. Ecossistema   de inovação  Desenvolvimento de produtos e   serviços turísticos inovadores   1   2   100%  TOTAL ÂMBITO   2   2   100%  TOTAL EIXO INOVAÇÃO   7   11   7,5%  Fonte: Elaboração própria com base em Lopez (2025).  A gestão da inovação no turismo promove um enfoque sinérgico que envolve empre -  sas de turismo, comunidades locais, entidades governamentais e empresas privadas.   Esta colaboração é essencial para a adoção de soluções inovadoras e responsáveis. A   ausência de comunicação e colaboração entre as partes interessadas é uma barreira  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 166  significativa que impede o desenvolvimento de uma visão unificada para a sustenta -  bilidade, resultando em oportunidades perdidas para inovações sinérgicas que pode -  riam aliviar pressões econômicas e ambientais. Por fim, é necessária uma abordagem   colaborativa que crie uma base de cocriação entre os atores da indústria do turismo e   outras partes interessadas. Isso é crucial para a transferência eficaz de conhecimento   e a formação de redes, que são vitais para a cocriação de produtos turísticos que in -  tegram considerações econômicas, sociais e ambientais (Chountalas et al., 2024; Della   Corte et al., 2021).  A partir das abordagens teóricas e das discussões com expertos científicos e de merca -  do foram selecionados seis (6) requisitos mínimos e definidos como estruturantes para   os destinos turísticos, conforme quadro 2.  O primeiro  âmbito  é (A) Gestão e Governança Inovadora sendo fundamental para que os   destinos turísticos se tornem mais inteligentes, atrativos e sustentáveis, fortalecendo sua   competitividade em escala nacional e internacional. Foram selecionados três requisitos:   A1. Estratégia e sistema de gestão da inovação no destino turístico  A formulação de estratégias e planos de inovação no setor turístico desempenha um   papel fundamental ao permitir a articulação entre políticas públicas, setor privado e   comunidade local em torno de uma visão compartilhada para o destino. Tais instru -  mentos possibilitam a criação de mecanismos voltados ao monitoramento de tendên -  cias, à antecipação de mudanças de mercado e à adaptação ágil da oferta turística.   Além disso, asseguram que os investimentos em inovação estejam integrados ao pla -  nejamento estratégico do destino, evitando iniciativas isoladas e desarticuladas.  Nesse  contexto,  a  presente  pesquisa  busca  analisar  a  idoneidade  das  estratégias  ou    planos de inovação com impacto no turismo. Para tanto, propõe-se uma escala de ava -  liação que varia entre 0% e 100%, conforme o grau de incorporação do turismo e de   mecanismos de monitoramento nos planos de inovação locais:  •  100% :  existe  uma  estratégia  ou  plano  de  inovação  vigente  na  Entidade  Local,    que inclui o turismo como setor prioritário e incorpora um plano de monitora -  mento de objetivos e resultados;  •  75% :  existe  uma  estratégia  ou  plano  de  inovação  vigente  na  Entidade  Local,    que inclui o turismo como setor prioritário, mas não contempla mecanismos de   monitoramento; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 167  •  50% : existe uma estratégia ou plano de inovação vigente na Entidade Local, que in -  clui o turismo, mas sem atribuir-lhe caráter prioritário em relação a outros setores;  •  25% :  existe  uma  estratégia  ou  plano  de  inovação  vigente  na  Entidade  Local,    sem incluir o turismo;  •  0% : não existe estratégia ou plano de inovação na Entidade Local.  A2. Recursos públicos para a inovação  O acesso a financiamento  público  constitui um fator central para o fortalecimento da   inovação  no  setor  turístico.  Esse  tipo  de  recurso  estimula  empresas  e  organizações    locais a desenvolverem soluções tecnológicas, sustentáveis e inclusivas, ampliando a   capacidade inovadora de pequenas e médias empresas que, em muitos casos, não dis -  põem de capital próprio para investimentos.   Ademais, a utilização estratégica de fundos públicos pode gerar importantes externa -  lidades positivas, como a criação de empregos qualificados, o fortalecimento de clus -  ters produtivos e a atração de novos investimentos para o território.  Busca-se analisar a idoneidade dos recursos financeiros destinados especificamente à   inovação no turismo. Para tanto, estabelece-se uma escala avaliativa que varia de 0%   a 100%, conforme o grau de especificidade e gestão dos recursos:  •   100%:  existem  recursos  específicos  para  projetos  de  inovação  em  turismo,  ad -  ministrados diretamente pelo gestor de turismo;  •  75%: existem recursos específicos para projetos de inovação em turismo, admi -  nistrados pela área de inovação da Entidade Local;  •  50%: existem projetos de inovação em turismo com orçamentos próprios, inde -  pendentemente do  órgão  responsável pela gestão;  •   25%:  existe  apenas  um  orçamento  geral  destinado  ao  financiamento  da  ino -  vação, sem especificidade para o turismo;  •  0%: não há orçamento específico destinado ao financiamento da inovação.  A3. Fomento à inovação aberta  A  promoção  da  inovação  aberta  no  turismo  constitui  um  elemento  estratégico  para    fortalecer a competitividade e a sustentabilidade dos destinos. Esse processo incentiva  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 168  a colaboração entre governo, empresas, universidades e sociedade civil, ampliando a   geração de ideias e de soluções criativas. Além disso, favorece a cocriação de experiên -  cias turísticas diferenciadas, valorizando a cultura local e a identidade do território, o   que contribui para a singularidade e atratividade do destino.  Busca-se avaliar a idoneidade dos programas e atuações voltados ao fomento da ino -  vação aberta no setor turístico. Para tal, adota-se uma escala de avaliação graduada   de 0% a 100%, de acordo com o nível de especificidade e articulação das iniciativas:  •  100%: dispõe de programas, projetos e atuações específicos para o turismo;  •  75%: dispõe de programas, projetos e atuações de caráter geral;  •  50%: não dispõe de programas, projetos ou atuações próprias, mas articula-se   com iniciativas de outras áreas ou entidades;  •  25%: não dispõe de programas, projetos ou atuações próprias, mas realiza iden -  tificação e registro de iniciativas provenientes de outras áreas ou entidades;  •  0%: não dispõe de programas, projetos ou atuações de caráter geral.  O  segundo   âmbito   é  (B)  Atividade  em  Processos  em  que  a  inovação  em  processos  é    fundamental porque promove eficiência, qualidade e sustentabilidade, fortalecendo a   gestão do destino turístico e ampliando sua atratividade em um mercado global em   constante transformação.   B1. Inovação em processos  A inovação em processos no setor turístico representa um vetor essencial para o for -  talecimento  da  competitividade  e  da  sustentabilidade  dos  destinos.  Esse  tipo  de  ino -  vação busca, entre outros objetivos, o aumento da eficiência operacional, a melhoria   da experiência do turista, a digitalização e automação de serviços, a incorporação de   práticas  sustentáveis,  a  ampliação  da  capacidade  de  adaptação  e  a  integração  dos    diferentes atores que compõem a cadeia de valor do turismo.  Busca-se analisar os processos do gestor de turismo nos quais foram introduzidas ino -  vações ao longo dos últimos dois anos. Para tanto, adota-se uma escala avaliativa que   varia de 0% a 100%, conforme a abrangência e a formalização dessas inovações:  •  100%:  foram  introduzidas  inovações  nos  processos  de  marketing  e  promoção,    de sistemas de informação e comunicação, de administração e gestão, estando   devidamente documentadas; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 169  •  75%: foram introduzidas inovações nos processos de marketing e promoção, de   sistemas de informação e comunicação, de administração e gestão, porém sem   documentação formal;  •  50%: foram introduzidas inovações em dois dos seguintes grupos de processos:   marketing e promoção; sistemas de informação e comunicação; administração   e gestão;  •  25%:  foram  introduzidas  inovações  em  apenas  um  dos  grupos  de  processos    mencionados;  •  0%: não foram introduzidas inovações em processos.  O terceiro  âmbito  é (C) Impulso do Ecossistema de Inovação no Destino Turístico.   O de -  senvolvimento da formação de capital humano é um fator determinante para impul -  sionar a inovação no setor turístico. Esse processo envolve a criação de condições que   permitam a colaboração entre diferentes atores locais — setor  público,  setor privado,   universidades e sociedade civil — para gerar, testar e aplicar novas soluções.   C1. Impulso do ecossistema de inovação no destino  Nesse sentido, oportunizar um ecossistema de inovação no destino implica estabele -  cer um ambiente colaborativo, conectado e orientado para soluções, capaz de tornar   o turismo local mais competitivo, sustentável e inovador.  Busca-se analisar se a gestão turística mantém relações estruturadas com universi -  dades ou institutos de pesquisa com vistas à formação de capital humano para a ino -  vação. Para tal, adota-se uma escala de avaliação que varia de 0% a 100%, conforme o   nível de institucionalização e efetividade das ações:  •  100% : dispõe de resultados concretos e impactos mensurados decorrentes das   ações;  •  75% : dispõe de ações já implementadas ou em fase de implementação;  •  50% : dispõe de ações previstas no Plano de Inovação, ainda em desenvolvimen -  to;  •  25% : dispõe apenas de ações isoladas, não contempladas no Plano de Inovação;  •  0% : não dispõe de pesquisas ou iniciativas para mediar a inovação. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 170  3.3.3. Aplicação dos requisitos   Foram  selecionados  Florianópolis  (SC)  e  Salvador  (BA)  que  participaram  do  projeto    inicial de “Destinos Turísticos Inteligentes (DTI) em Transformação” do Ministério do   Turismo  do  Brasil,  que  contemplou  dez  cidades  brasileiras,  sendo  da  região  Centro -  -Oeste: Brasília (DF) e Campo Grande (MS), da região Norte: Rio Branco (AC) e Palmas   (TO); da região Nordeste: Recife (PE) e Salvador (BA); da região Sudeste: Rio de Janeiro   (RJ) e Angra dos Reis (RJ) e da região Sul: Florianópolis (SC) e Curitiba (PR) (BRASIL/  MTur, 2022).  As  cidades  foram  selecionadas  para  participar  de  uma  iniciativa-piloto  que  buscou    estabelecer  diretrizes  e  um  formato  nacional  para  orientar  a  transição  de  destinos    turísticos  em  territórios  mais  atrativos.  O  objetivo  central  foi  promover  a  oferta  de    experiências qualificadas, serviços acessíveis e seguros, aliados ao compromisso com   a sustentabilidade (BRASIL/MTur, 2022).  Florianópolis, capital do Estado de Santa Catarina, localizado na região do Sul do Bra -  sil, possui uma população estimada de 576.361 habitantes (IBGE, 2025) tendo serviços   como fonte principal da economia a partir da tecnologia, comércio e o turismo. É um   dos top 10 destino turístico internacional do Brasil tendo como principais emissores a   Argentina, Chile, Paraguai e Uruguai (EMBRATUR, 2025).  Ressalta-se que Florianópolis (SC) foi a vencedora do Prêmio Nacional de Inovação no   ano de 2023, que reconheceu os esforços bem-sucedidos de inovação e gestão da ino -  vação das empresas, ecossistemas de inovação e pesquisadores que atuam no Brasil.  O desenvolvimento do ecossistema de Florianópolis é fruto de um esforço   coordenado  de  longo  prazo  com  participação  de  diversos  atores  do  go -  verno, indústria, universidade e sociedade. Sua base foi estabelecida ao   longo  de  algumas   décadas,  desde  a   criação  da  UFSC,  Fundação  CERTI,    Incubadoras, Parques Tecnológicos, Ambientes de Inovação, Associações   Empresariais e Instituições de Fomento. A orquestração destes atores nos   últimos anos tornou o ecossistema uma referência nacional e internacio -  nal.  A  regulamentação  municipal  da  Lei  de  Inovação,  criação  da  Rede    de  Inovação  e  Living  Lab  são  iniciativas  que  evidenciam  sua  evolução.    O retrato do ecossistema em 2023 demonstra um importante agenda de   eventos, startups de sucesso e expressivos resultados em termos de des -  envolvimento econômico e social (Prêmio Nacional de Inovação, s.d). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 171  Quadro 3  Análise do  âmbito  gestão/governança inovadora em Florianópolis.  Âmbito   Requisito   Indicadores   Como Avaliar  Gestão /   Governança   inovadora  Estratégia  e  sistema    de  gestão  da  inova -  ção  no  destino  turís -  tico  Idoneidade  da  es -  tratégia  ou  plano  de    inovação com alcan -  ce no turismo  •  50%  -  Existe  uma  estraté -  gia  ou  plano  de  inovação    vigente  na  Entidade  Local,    que  inclui  o  turismo,   mas   sem  preferência   com  res -  peito a outros setores  Recursos  públicos    para a inovação  Idoneidade do recur -  so dedicado a inova -  ção  •  25% - Existe um orçamento   para  financiar  a  inovação    em geral  Fomento  a  inovação    aberta  Idoneidade  de  pro -  gramas  e  atuações    para  o  fomento  da    inovação aberta  •  25%  -  Não  dispõe  de  pro -  gramas, projetos e tampou -  co atuações,  mas identifica   e registra  com programas,   projetos  e  atuações  de  ou -  tras áreas ou entidades  Fonte: Elaboração própria.   A  Lei  Municipal  de  Inovação  n  432/2021  tem  no  seu  Artigo  4º,  item  VII  -  o  Plano  de    Inovação do Executivo Municipal, com a implementação do Programa de Incentivo a   Inovação a partir de:   •  incentivo fiscal: concessão de incentivo fiscal sem exigência de restituição aos   cofres públicos, permitindo destinar até 20% do ISSQN 12  e IPTU 13 ;   •   desenvolvimento  de  inovações:  alocações  de  recursos  para  viabilizar  o  desen -  volvimento de iniciativas inovadoras e soluções tecnológicas; e  •  crescimento econômico: estímulo ao crescimento econômico e à criação de no -  vas oportunidades de emprego no município (PMF, s.f.).  Entretanto, não há uma linha de recursos financeiros e, respectivamente, estratégias   para inovação em turismo e/ou integradas em outras áreas como, por exemplo, segu -  rança  pública,  saúde, tecnologia e mobile.  12   Imposto Sobre Serviços de Qualquer Natureza  13   Imposto Predial e Territorial Urbano \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 172  Quadro 4   Análise do  âmbito  atividades e ecossistema de inovação, formação capital humano.  Atividades  de    inovação  Inovação  em  proces -  sos  Processos  do  Gestor    de  Turismo  que  fo -  ram  realizadas  ino -  vações  (últimos  dois    anos)  •  0%  -  Não  foram  intro -  duzidas  inovações  em    processos  Ecossistema  de    inovação  Impulso  do  ecossis -  tema  de  inovação  no    destino  Idoneidade  de  pro -  gramas  e  atuações    para  impulsionar  o    ecossistema  de  ino -  vação  •  25%  -  Não  dispõe  de    programas  e  tampouco    atuações  para  impul -  sionar  o  ecossistema  de    inovação,    mas  identifi -  ca  e  registra   com  pro -  gramas  e  atuações  de    outras  áreas  ou  entida -  des  Formação  de  ca -  pital humano  Impulso  ao  desenvol -  vimento da formação   de capital humano  Se  a  gestão  tem  re -  lação  com  Univer -  sidades  o  Instituto    para  a  formação    de  capital  humano    para a inovação  •  25%  -  Dispõe  de   ações   isoladas   e  não  estão  no    Plano de Inovação  Fonte: Elaboração própria.  Não há registros de inovação em processos de gestão da Entidade Local de Turismo,   apesar da participação no projeto piloto do Ministério do Turismo do Brasil. Tanto o   ecossistema de inovação e a formação de capital humano para o turismo são incipien -  tes, sendo ações pontuais apenas.   Salvador , capital do Estado da Bahia, localizado na região Nordeste do Brasil, possui   uma população estimada de 2.564.204   habitantes (IBGE, s.f) tendo serviços como fonte   principal da economia, representando aproximadamente 75% do PIB da cidade, onde   o turismo é referência (Prefeitura de Salvador, s.d). É um dos top 10 destino turístico   internacional do Brasil tendo como principais emissores a Argentina, Estados Unidos,   Uruguai, Chile e França (SalvadorPAR, 2025).  A  cidade  é  sede  do  Parque  Tecnológico  da  Bahia,  que  tem  como  objetivo  fomentar  o    empreendedorismo e o desenvolvimento científico, tecnológico e inovador no Estado,  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 173  promovendo a interação entre empresas, universidades, institutos de pesquisa, gover -  no  e  sociedade  civil  em  um  ambiente  colaborativo.  Desde  2020,  é  administrado  pela    Associação das Empresas do Parque Tecnológico da Bahia - AEPTECBA em modelo de   autogestão com participação de diversos atores do ecossistema de inovação (Parque   Tecnológico da Bahia, s.d.).  Quadro 5  Análise do  âmbito  gestão/governança inovadora em Salvador.  Âmbito   Requisito   Indicadores   Como Avaliar  Gestão /   Governança   inovadora  Estratégia  e  sistema    de  gestão  da  ino -  vação  no  destino  tu -  rístico  Idoneidade  da  es -  tratégia  ou  plano  de    inovação com alcan -  ce no turismo  •   25%  -  Existe  uma  estra -  tégia  ou  plano  de  ino -  vação  vigente  na  Enti -  dade Local, mas não cita   o turismo.  Recursos  públicos    para a inovação  Idoneidade do recur -  so  dedicado  a  ino -  vação  •  25%  -  Existe  um  orça -  mento  para  financiar  a    inovação em geral  Fomento  a  inovação    aberta  Idoneidade  de  pro -  gramas  e  atuações    para  o  fomento  da    inovação aberta  •  25% - Não dispõe de pro -  gramas, projetos e tam -  pouco  atuações,   mas   identifica  e  registra    com  programas,  proje -  tos e atuações de outras   áreas ou entidades  Fonte: Elaboração própria.   A Lei nº 9.534, de 2020, foi criada para a Política Municipal de Inovação e instituiu en -  tre outras coisas os incentivos à inovação no ambiente produtivo e social na cidade.   No Art. 1º cita (Prefeitura Municipal de Salvador, 2020a).  Fica instituída, no  âmbito  do Município de Salvador, a Política Municipal   de  Inovação,  como  instrumento  destinado  a  orientar  as  atividades  do    Poder Público local e sua relação com os diversos agentes que compõem   o Ecossistema Municipal de Inovação, por meio da criação de sistemas,   mecanismos e incentivos.  No mesmo ano, foi lançado o Plano Diretor de Tecnologias da Cidade Inteligente (PDT -  CI), uma iniciativa estratégica da Prefeitura Municipal, liderada pela Secretaria Muni - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 174  cipal de Inovação e Tecnologia (SEMIT), com o objetivo de transformar a capital baia -  na em uma cidade digitalmente avançada e sustentável. O plano estabelece diretrizes,   ações e investimentos para modernizar a infraestrutura urbana, promover a inova -  ção e melhorar a qualidade de vida dos cidadãos. Entre os principais componentes do   PDTCI estavam (Prefeitura Municipal de Salvador, 2020b):  •   Governança  Digital  e  Segurança  Cibernética:  Criação  de  estruturas  adminis -  trativas e políticas públicas para gerenciar a transformação digital e garantir   a proteção de dados e sistemas.  •  Infraestrutura Tecnológica: Implantação de redes de conectividade, como Wi-Fi   público e conectividade 5G, além de luminárias  públicas inteligentes.  •  Educação e Capacitação: Desenvolvimento de programas como a Escola Digital   e a Matriz Econômica Digital no Comércio, visando capacitar a população para   o uso de tecnologias e fomentar a economia digital.  •   Sustentabilidade  e  Resiliência  Urbana:  Implementação  de  soluções  tecnológi -  cas que promovam a sustentabilidade ambiental e a resiliência das infraestru -  turas urbanas.  No ano de 2020 o Governo do Estado da Bahia apresentou a “Estratégia Turística da   Bahia  4.0  2020  –  2030:  Salto  para  o  Futuro”  em  que  a  inovação  e  a  sustentabilidade    configuraram-se como pilares fundamentais estabelecidos na Bahia para a concreti -  zação da “Visão de Futuro” do destino turístico. Esses elementos estratégicos possibi -  litam a promoção de um desenvolvimento que contemplasse a infraestrutura tecnoló -  gica robusta, favorecendo uma atmosfera de compartilhamento de conhecimentos e   geração de valor. No que se refere à inovação, compreendida como pilar estruturante,   sua concepção ultrapassa a noção restrita de criação de novos produtos ou roteiros,   como  estabelecido  em  estratégias  anteriores.  Neste  novo  paradigma,  a  inovação  foi    concebida como princípio orientador transversal, permeando a execução de progra -  mas e ações em cada eixo estratégico (Observatório de Turismo da Bahia, 2022).  Em  2022  foi  lançado  pela  Prefeitura  Municipal  de  Salvador  o  Plano  Diretor  de  Tec -  nologias da Cidade Inteligente – PDTCI, onde há uma citação ao turismo tendo como   objetivo  central  ampliar  o  fluxo  de  turistas  nos  equipamentos  turísticos,  bem  como    prolongar  seu  tempo  de  permanência  na  cidade,  o  que  resulta  em  maior  consumo  e    fortalecimento da economia local. A iniciativa buscou consolidar Salvador como um   destino  de  relevância  nos  segmentos  de  turismo  de  negócios,  sol  e  praia  e  náutico.    Para alcançar tal propósito, previu-se o reforço das ações de marketing digital, com  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 175  ênfase  na valorização das vocações específicas da cidade, bem como a implementação   de  iniciativas  voltadas  à  qualificação  do  município  como  um  destino  turístico  inteli -  gente (Prefeitura Municipal de Salvador, 2022).  Quanto  as  atividades  de  inovação  não  foram  identificadas  inovações  em  processos    devidamente documentos, entretanto, no PDTCI há uma  ênfase  na transformação di -  gital  citando  a  implantação  de   dashboards    de  monitoramento  de  processos  e  novas    opções  de  atendimento  virtual  pela  Secretaria  da  Fazenda  e  uma  ação  da  Salvador    S/A em fornecer os primeiros passos para o empreendedor criar sua presença digital –   promover a transformação digital, portanto, ações que poderiam ser replicadas para   a gestão do turismo.  Importante destacar que no website da Secretaria Municipal de Cultura e Turismo – SE -  CULT, há uma explicação sobre DTI, mas não há explicitação de projetos, planos e inova -  ções realizadas/implementadas na cidade (Prefeitura Municipal de Salvador, s.d.).   Quadro 6   Análise do  âmbito  atividades e ecossistema de inovação, formação capital humano.  Atividades de   inovação  Inovação  em  pro -  cessos  Processos  do  Gestor    de  Turismo  que  foram    realizadas  inovações    (últimos  dois anos)  •  25% - Houve pelo menos um   processo  de  inovação  em    desses  grupos:  marketing    e  promoção;  sistema  de  in -  formação  e  comunicação,    administração e gestão.  Ecossistema   de inovação  Impulso  do  ecos -  sistema  de  ino -  vação no destino  Idoneidade  de  progra -  mas  e  atuações  para    impulsionar  o  ecossis -  tema de inovação  •  25% - Não dispõe de progra -  mas  e  tampouco  atuações    para  impulsionar  o  ecos -  sistema  de  inovação,   mas   identifica  e  registra   com    programas  e  atuações  de    outras áreas ou entidades  Formação   de capital   humano  Impulso  ao  desen -  volvimento da for -  mação  de  capital    humano  Se a gestão tem relação   com  Universidades  o    Instituto  para  a  for -  mação  de  capital  hu -  mano para a inovação  •   25%  -  Dispõe  de   ações  iso -  ladas  e não estão no Plano   de Inovação  Fonte: Elaboração própria. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 176  No  entanto,  há  de  se  destacar  o  marketing  e  promoção  no  website  oficial  < https://  www.salvadordabahia.com/ >  disponibilizado  em  quatro  idiomas  português,  inglês,    francês e espanhol, além das redes sociais, a saber:  •  Spotify: com mais de 136 playlist  públicas < https://open.spotify.com/user/2f4xo -  s4omexsoh33rnweg2j3w >;  •  Instagram: com 1414 publicações < https://www.instagram.com/visitsalvadord -  abahia/ >   •   Facebook:  com  atualizações  constantes   https://www.facebook.com/visitsalva -  dordabahia ;  •   X:  com  informações  de  acessos  ao  website  oficial,  sem  publicações  < https://x.  com/VisitSalvador >; e  •   Youtube:  com  mais  de  259  vídeos  publicados  < https://www.youtube.com/visit -  salvadordabahia >.  Apesar de haver uma Lei Municipal de Inovação, de um parque tecnológico de inova -  ção,  de  um  plano  diretor  de  cidade  inteligente,  não  foram  identificados  programas    e  tampouco  atuações  para  impulsionar  o  ecossistema  de  inovação  em  turismo,   mas   identifica e registra  com programas e atuações de outras áreas ou entidades.  3.3.4. Reflexões  A primeira e mais evidente reflexão é que a inovação não é mais um diferencial, mas   uma  condição  intrínseca  para  a  sobrevivência  e  o  crescimento  do  setor  de  turismo,    especialmente em um cenário globalizado e incerto. A capacidade de se adaptar e ino -  var  é  crucial  para  que  as  empresas  e  destinos  se  recuperem  de  crises  e  continuem    prosperando.  A inovação no setor de turismo é um campo em constante evolução, impulsionado por   mudanças nas demandas dos consumidores, avanços tecnológicos e a necessidade de   resiliência diante de incertezas e crises globais, sendo considerada uma fonte primor -  dial de vantagem competitiva e desempenho para os destinos. Ela envolve a criação   e implementação de novos produtos ou serviços, processos, métodos de marketing ou    métodos    organizacionais.  Destinos  turísticos  que  priorizam  o  setor  e  criam  estraté -  gias  eficazes  de  marketing  e  inovação  fomentam  o  crescimento  econômico  e  se  tor -  nam mais competitivos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 177  Ela  abrange  não  apenas  novos  produtos  ou  serviços,  mas  também  novos  processos,    métodos de marketing e  métodos  organizacionais. É um processo que exige criativida -  de, resolução de problemas e novas formas de pensar para impulsionar a implemen -  tação de melhorias e novidades.  A  análise  comparativa  de  Florianópolis  e  Salvador  evidencia  um  desafio  comum  e    central  a  discrepância  entre  a  existência  de  políticas  e  estruturas  de  inovação  mais    amplas e a efetiva integração e priorização da inovação no setor turístico local.   Ambas as cidades participaram do projeto DTI e possuem elementos de um ecossis -  tema de inovação, mas os resultados mostram que a inovação no turismo ainda é,   em  grande  parte,  incipiente,  desarticulada  e  carente  de  foco  específico  e  recursos    dedicados.  Os principais pontos de convergência nos desafios incluem:  •   Falta  de  Priorização:  em  ambos  os  destinos,  o  turismo  não  é  explicitamente    prioritário nos planos de inovação das entidades locais, ou sequer é citado. Isso   impede uma visão compartilhada e a integração de investimentos em inovação   no planejamento estratégico do setor;  •   Recursos  Não  Dedicados:  a  escassez  de  recursos  financeiros  específicos  para    projetos de inovação em turismo é uma barreira significativa, limitando a ca -  pacidade de empresas e organizações locais desenvolverem soluções tecnológi -  cas e sustentáveis;  •   Fomento  à  Inovação  Aberta  Genérico:  a  dependência  de  iniciativas  de  outras    áreas para o fomento à inovação aberta, sem programas específicos para o tu -  rismo,  restringe  a  colaboração  entre  os  múltiplos  atores  (governo,  empresas,    universidades, sociedade civil) que é estratégica para a geração de ideias e so -  luções criativas; e  •   Ecossistema  e  Capital  Humano  Fragmentados:  embora  Florianópolis  seja  um    polo de inovação e Salvador tenha um parque tecnológico, o engajamento des -  ses ecossistemas e a formação de capital humano para as necessidades especí -  ficas do turismo são pontuais e não estruturados. A ausência de comunicação e   colaboração entre as partes interessadas é uma barreira significativa.  Enquanto Salvador demonstra um avanço maior na inovação em processos, especial -  mente  no  marketing  digital,  Florianópolis,  apesar  de  seu  reconhecimento  geral  em    inovação, registra uma carência ainda maior nesse quesito no contexto turístico. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.3. Eje Innovación 178  A reflexão final aponta para a necessidade urgente de uma abordagem colaborativa   e  sinérgica  que  envolva  empresas  de  turismo,  comunidades  locais,  entidades  gover -  namentais e empresas privadas. Para que se tornem verdadeiros Destinos Turísticos   Inteligentes  e  colham  os  benefícios  da  inovação  –  como  vantagem  competitiva,  resi -  liência  e  melhoria  da  qualidade  de  vida  para  residentes  e  turistas  –,  Florianópolis  e    Salvador precisam desenvolver estratégias de inovação que explicitamente priorizem   o turismo, aloquem recursos dedicados e fomentem um ecossistema de inovação mais   integrado e focado no setor.   Ignorar essas lacunas significa perder oportunidades de inovações sinérgicas que po -  deriam aliviar pressões econômicas e ambientais e fortalecer o posicionamento desses   importantes destinos brasileiros.  Referências bibliográficas  Agência Brasileira de Promoção Internacional do Turismo - EMBRATUR. (2025).  Plano   Brasis: Plano de Ação para Promoção Turística Internacional – Santa Catarina.    Andrades,  L.,  Romero-Dexeus,  C.,  &  Martínez-Marín,  E.  (Eds.).   (2024).    The  Spanish    Model for Smart Tourism Destination Management: A Methodological Approach .   Tourism,  Hospitality  &  Event  Management.  Cham,  Switzerland:  Springer  Nature.    https://doi.org/10.1007/978-3-031-60709-7  Chountalas,  P.  T.,  Chatzifoti,  N.,  Alexandropoulou,  A.,  &  Georgakellos,  D.  A.  (2024).    Analyzing  barriers  to  innovation  m
