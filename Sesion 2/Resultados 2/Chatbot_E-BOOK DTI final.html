ntina.   3.6.3.1. Introducción  Frente al avance sostenido de la tecnificación y la digitalización en el ámbito glo -  bal, en paralelo a la intensificación de flujos y la presión turística sobre territorios,   la  sostenibilidad  se  posiciona  como  un  principio  indispensable  para  orientar  la    planificación  y  gestión  de  los  destinos  turísticos.  Esta  transición  hacia  modelos    más integradores ha dado lugar al concepto de “destino turístico inteligente” (DTI),   que  no  sólo  incorpora  tecnologías  de  información  y  comunicación,  sino  que  ade -  más  tiene  como  pilar  una  gestión  responsable  del  territorio,  el  patrimonio  y  las    comunidades locales.   En ese marco, este trabajo tiene por objetivo analizar la incorporación de la dimensión   sociocultural de la sostenibilidad en los destinos turísticos inteligentes, tomando como   referencia el modelo metodológico propuesto por la Red Iberoamericana de Destinos   Turísticos Inteligentes en 2025. Se abordan algunos de los principales desafíos teóricos   y prácticos que plantea su implementación, con especial atención en la gestión turísti -  ca del patrimonio. La estructura del análisis adopta un enfoque progresivo, que va de   lo general a lo particular, con el fin de ofrecer una comprensión articulada y contex -  tualizada del fenómeno.   Desde su diseño metodológico, el estudio se inscribe en un enfoque metodológico pre -  dominantemente  cualitativo,  orientado  a  la  comprensión  e  interpretación  crítica  de    los procesos asociados a la sostenibilidad sociocultural. Para ello, se recurre al análisis   sistemático de la literatura como técnica principal, con el objetivo de identificar, clasi -  ficar y sintetizar aportes teóricos y empíricos relevantes.  La investigación inicia con una breve reflexión teórica sobre sostenibilidad, patrimo -  nio y gobernanza turística, para luego avanzar hacia problemáticas contemporáneas   vinculadas  a  la  transición  hacia  destinos  inteligentes.  En  este  recorrido  analítico,  se    consideran  las  experiencias  desarrolladas  por  SEGITTUR  (Sociedad  Estatal  para  la    Gestión de la Innovación y las Tecnologías Turísticas) e INVATTUR (Instituto Valencia -  no  de  Tecnologías  Turísticas),  por  su  papel  pionero  en  la  conceptualización  e  imple -  mentación del modelo DTI en el ámbito iberoamericano. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  263  Finalmente,  como  parte  del  trabajo  empírico,  se  realiza  un  análisis  documental  del    modelo  metodológico  de  la  Red  Iberoamericana  de  Destinos  Turísticos  Inteligentes.    A partir de esta revisión, se identifican y seleccionan los requisitos más significativos   que un destino debe cumplir para iniciar su transición hacia un DTI, con énfasis parti -  cular en los ejes y requisitos vinculados a la sostenibilidad sociocultural. Este análisis   se complementa con la elaboración de una matriz de síntesis que recoge los principa -  les retos identificados para la planificación turística inteligente.  A  partir  de  los  hallazgos,  se  desarrollan  propuestas  orientadas  a  la  implementación,    evaluación y mejora continua de estrategias que permitan integrar de una mejor mane -  ra la dimensión sociocultural en la planificación de los Destinos Turísticos Inteligentes.   3.6.3.2. Marco conceptual   a.  A propósito de la sostenibilidad sociocultural  El primer punto a reconocer es que el concepto de sostenibilidad no es un concepto   estático,  unívoco  ni  preciso.  No  solo  ha  ido  mutando,  al  incorporar  nuevas  dimen -  siones de análisis, sino que puede ser abordado desde distintos paradigmas. En este   marco,  el  punto  de  partida  con  el  que  enfocamos  la  sostenibilidad  resulta  central    para el diseño de abordajes técnicos y operativos. Ya sea porque se interprete al con -  cepto desde los límites físicos de un proceso de desarrollo, ya sea porque se busque   un punto de equilibrio entre uso y conservación o porque se adopte una mirada más   integral al incorporar los patrones/modelos de consumo, acumulación y producción.   Es decir, mientras que los primeros tienden a enfocarse en los problemas técnicos del   crecimiento,  el  último  pone  a  la  dimensión  humana  y  política  en  el  estudio  de  las    determinaciones histórico-sociales de los problemas ambientales (Foladori & Pierri,   2005 o Saarinen, 2006).  En este marco, es preciso reconocer que la sostenibilidad no se limita a la dimensión   “natural” o “verde” de un destino (Gallopín, 2003). Por oposición, se promueve conside -  rar la sostenibilidad desde una mirada interrelacionada y trandisciplinaria, que con -  sidera las vinculaciones entre sociedad y naturaleza. Esto permitiría salir de una po -  sición en la que se concibe al ambiente como algo externo al ser humano, para mutar   al  biopluralismo,  caracterizado  por  la  simbiosis  sociedad-naturaleza.  Dicho  sistema    es multidimensional e incorpora la dimensión política-institucional (Guimaräes, 1998;   Foladori, 2002). Significa, además, que la dimensión sociocultural no sólo es relevante   sino constitutiva y transversal. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  264  Por  otro  lado,  la  sostenibilidad  no  es  un  concepto  abstracto,  sino  que  se  debe  pen -  sar  desde  el  territorio.  Es  decir,  no  está  definida   a  priori  o  ex-ante ,  sino  que  se  cons -  truye relacionalmente. Son las personas, los actores (individuales o colectivos), lo que   le otorgan sentido a su realidad social. No son meros destinatarios, son agentes que   tienen  historias,  así  como  también  de  deseos,  necesidades  y  proyecciones  respecto  a    un proyecto de desarrollo. Definirlo  ex ante  o desde afuera corre el riesgo de constituir   una mera imposición en función de lo que alguien o algunos, llámese técnicos o políti -  cos, consideran fundamental a desarrollar o a sostener.   Frente a ello, poner el foco en la dimensión sociocultural de la sostenibilidad no solo   implica reconocer como que la cultura es un derecho, y que existe un derecho a la di -  versidad (UNESCO, 2005), sino también concebirlo como un espacio de conflicto. Asi -  mismo,  implica  reconocer  jerarquías  de  producciones  culturales  (Lacarrieu,  1999).    Canclini  (1999)  señala  que  los  bienes  reunidos  en  la  historia  por  cada  sociedad  no    pertenecen  o  están  disponibles  realmente  a  todos  (aunque  formalmente  pueda  pa -  recerlo). Esta diversa capacidad de relacionarse con el patrimonio se origina, en un   principio, en la desigual participación de los grupos sociales en su formación e iden -  tificación con esos referentes simbólicos. Superar la desigualdad en relación con el   patrimonio implicaría reconocer la interculturalidad y que la planificación legitime   la  diferencia  (Rosas  Mantecón,  2001).  De  esta  manera,  pensar  en  la  sostenibilidad    cultural  sin  abordar  la  relación  con  el  poder,  la  selección,  la  exclusión  y  la  repro -  ducción de desigualdades sociales sería inefectivo y probablemente perpetuaría los   problemas existentes.  b.  Conservación estratégica  Si lo abordáramos desde el punto de vista patrimonial, y en especial desde el uso turís -  tico del patrimonio, el desarrollo sostenible tiene como fundamento lograr un equili -  brio entre la conservación y su puesta en valor turística, incluyendo una gestión par -  ticipativa que involucre a la comunidad (Velasco González, 2009; Comparato, 2018). Es   decir, un turismo que favorezca al desarrollo entendido por la mejora de la calidad de   vida de la población a partir de la generación y distribución equitativa de beneficios   económicos, el respeto por el ambiente natural y construido por el ser humano y por   la  identidad  sociocultural  de  la  comunidad  o  comunidades  involucradas.  De  ahí  que    se  reconoce,  de  manera  creciente,  el  desafío  de  que  los  locales  tengan  un  rol  activo    dentro del proceso de patrimonialización, favoreciendo a la apropiación, significación  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  265  y difusión de los bienes patrimoniales que hacen a su identidad, promoviendo su uso y   disfrute (Viñals Blasco, 2021).  Dicho  esto,  se  requiere  pensar  la  conservación  en  términos  de  conservación  es -  tratégica  (Choay,  2007).  Se  trata  de  un  enfoque  relativamente  reciente  dentro  del    campo  del  patrimonio  cultural  que  busca  integrar  la  conservación  de  bienes  cul -  turales  y  naturales  con  las  dinámicas  contemporáneas  de  transformación  social,    económica  y  ambiental.  Su  marco  de  acción  se  distancia  de  los  modelos  tradicio -  nales de conservación puramente técnico-material (centrados en la restauración y   preservación física de los objetos) y se articula más bien en función de objetivos a   largo plazo, priorizando la sostenibilidad, la participación social y la gestión adap -  tativa del patrimonio.  Ampliando la propuesta de Choay, se podría sostener que se trata una tarea que tiene   a la gobernanza como un pilar central, y que requiere de disciplinas y saberes diversos   para dar respuestas a problemáticas tales como:  •  Aceleración de las transformaciones (urbanización, cambio climático, conflic -  tos geopolíticos, avances tecnológicos, entre otros).  •   Creciente  diversidad  de  actores  involucrados  en  el  patrimonio  (comunidades    locales, pueblos originarios, ONGs, sector privado), con persistentes déficits de   participación efectiva.  •  Demanda creciente de legitimidad social en los procesos de patrimonialización   y activación turística del patrimonio.  •   Nuevas  demandas  e  intereses  de  los  usuarios  y  turistas  en  su  vínculo  con  la    cultura y naturaleza.  •   Limitaciones  significativas  en  los  recursos  destinados  a  la  conservación,  pro -  tección y salvaguardia.  •  Intensificación de las presiones derivadas del turismo, tanto físicas como sim -  bólicas.   En particular, la problemática de gestión de aforos se ha reformulado.  Tal como afir -  man McCool y Lime (2001, p.372) hemos pasado del “ how many is too many?”  a “ what   are  the  acceptable  conditions?” .    Este  cambio  ontológico  implica  que  los  límites  no    son intrínsecos a los sitios, sino que están vinculados al plano de la acción humana,   incluyendo los propios objetivos de gestión (McCool & Lime, 2001). Además, tal como   afirman  Garrigos  Simon,  Narangajavanab  y  Palacios  Marques  (2018),  los  análisis   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  266  deberían  identificar  niveles  /  grados  de  tolerancia.  De  hecho,  el  trabajo  de  Salerno    et. al. (2013) concluyó, por ejemplo, que en el caso del Everest la percepción de falta   de protección fue percibida de manera independiente a la cantidad o número de tu -  ristas. En síntesis, no es lo mismo concentración que sobrecarga y dicha diferencia -  ción está atada al punto de vista de los grupos de interés (García Hernández, Ivars   Baidal & Mendoza de Miguel, 2019).   Otro  de  los  interrogantes  clave  no  solo  radica  en  definir  los  límites  del  cambio    aceptable,  sino  en  preguntarse  quiénes  acceden  efectivamente  al  patrimonio.  En    esta línea, autoras como Slavin (2022) y Quiroga (2024) subrayan la necesidad de   integrar  una  perspectiva  que  contemple  la  accesibilidad,  el  enfoque  de  género  y    las  miradas  interseccionales.  El  diseño  de  políticas  culturales  y  turísticas  exige,    en  consecuencia,  una  transformación  profunda  de  los  discursos,  una  participa -  ción  social  más  amplia,  el  reconocimiento  de  los  aportes  de  mujeres  y  colectivos    históricamente  minorizados,  así  como  la  revisión  de  los  modelos  educativos  y  de    las  prácticas  profesionales  para  incorporar  estas  dimensiones.  Desatender  estas    cuestiones  no  solo  perpetúa  desigualdades  estructurales,  sino  que  también  res -  tringe  el  pleno  ejercicio  de  los  derechos  culturales  y  la  representación  equitativa    en torno al patrimonio.  Por  su  parte,  estudios  recientes  como  el  de  Bassols  i  Gardella  et  al.  (2025,  p.  165)    señalan,  a  partir  del  análisis  de  experiencias  en  Áreas  Históricas  Urbanas  (AHU)    latinoamericanas, la “ extrema dificultad ” que aún persiste para integrar de mane -  ra  efectiva  a  residentes  y  visitantes  en  las  estrategias  y  acciones  de  planificación    patrimonial. En efecto, se requiere un mayor compromiso por parte de autoridades   y  expertos  para  equilibrar  el  uso  del  patrimonio  con  el  desarrollo,  considerando  la    inadecuación de los marcos legales vigentes, la necesidad de generar mayores con -  sensos  y  participación  activa  de  los  distintos  actores,  así  como  la  construcción  de    mejores prácticas de intervención y gestión.  Frente a este marco conceptual, se propone una dimensión sociocultural de la inte -  ligencia que tenga en cuenta tres pilares i) límites de cambio aceptables en sintonía   con las percepciones de las partes interesadas (¿cuáles son las condiciones acepta -  bles?)), ii) las capacidades de gestión efectivas (¿qué capacidades de gestión se dis -  pone?)  así  iii)  políticas  de  inclusión  (¿Quiénes  acceden  al  turismo?  ¿Y  quiénes  están    representados en el patrimonio?).  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  267  Figura 1  Preguntas clave de la sostenibilidad sociocultural.  Fuente: Elaboración propia.  Dentro de esta propuesta, de poco sirve establecer umbrales de visita a los principales   atractivos  turísticos,  si  no  se  dispone  de  una  capacidad  de  monitoreo,  seguimiento  y    evaluación. Al mismo tiempo, se puede disponer de una gran capacidad técnica-infor -  mática para sensorizar en tiempo real los flujos turísticos, pero sino no se incorpora una   perspectiva ética-política de la diferencia, se podría perpetuar ciclos viciosos de que el   patrimonio y el turismo sea privativo de unas minorías (por más cuantiosas que sean).   c.  Inteligencia turístico-patrimonial  Frente al contexto antes mencionado, la planificación turística inteligente (PIT) surge   como paradigma relativamente reciente. Si bien pone en el centro de escena a las tec -  nologías  de  la  comunicación  e  información,  así  como  una  creciente  transformación    digital, se posiciona como un modelo holístico estructurado. Es decir, en oposición a un   modelo tecnocéntrico, reconoce tres niveles interrelacionados: el estratégico-relacio -  nal, el instrumental y el aplicado (Ivars-Baidal & Vera Rebollo, 2019).  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  268  Entre  las  principales  iniciativas  a  nivel  iberoamericana  relativas  al  patrimonio  se    pueden destacar, entre otras, los avances realizados por parte de SEGITTUR y de INVA -  T-TUR. En particular, el libro blanco “Destinos Turísticos Inteligentes: construyendo el   futuro” (SEGITTUR, 2015) reconoce la dimensión cultural de la sostenibilidad en estre -  cha relación a un turismo consciente. En este marco, refiere a una inmersión respetuo -  sa del visitante, la creación y promoción de nuevos espacios para el encuentro de los   viajeros con la población local y la puesta en valor del patrimonio cultural.   Por su parte, una publicación más reciente (SEGITTUR & Andrades, 2024) profundiza   en el pilar de la sostenibilidad, posicionándolo como un componente clave dentro del   Modelo  Español  de  Destinos  Turísticos  Inteligentes  (DTI).  De  hecho,  se  trata  del  pilar    con mayor peso relativo, ya que sus requisitos representan aproximadamente el 40 %   del total del modelo. En particular, se destaca la dimensión de la sostenibilidad socio -  cultural,  entendida  como  la  capacidad  de  los  destinos  para  preservar  su  identidad,    sus  valores  y  atractivos  a  largo  plazo,  así  como  para  promover  productos  turísticos    basados  en  estos  recursos.  Uno  de  los  aportes  más  relevantes  del  documento  radica    en las recomendaciones prácticas que ofrece para la implementación de acciones en   este ámbito, con el objetivo de acompañar a los destinos en el diseño y desarrollo de   productos turísticos sostenibles.  Asimismo, SEGITTUR ha avanzado en los últimos años en la operacionalización y con -  formación de un grupo de trabajo especializado en patrimonio en 2021, la elaboración   de una “Guía de buenas prácticas en patrimonio cultural para Destinos Turísticos In -  teligentes” (SEGITTUR, 2022), así como la elaboración de “casos de uso”. Estos últimos   son estudios técnicos en el marco de la Plataforma Inteligente de Destino que incluyen   diferentes fases, que van desde la construcción de diagnósticos y estados del arte, el   desarrollo de ontología y semántica de los datos hasta el desarrollo de algunos pilotos.   Entre ellos, cabe destacar dos: 1) Caso de uso de turismo cultural material, SEGITTUR   (2023), y 2) Caso de uso de medición de flujos turísticos SEGITTUR (2024).   En  el  caso  de  la  Comunidad  Valenciana,  también  se  han  registrado  avances  en  la    planificación turística inteligente vinculada al patrimonio cultural. Concretamente,   en  2024  se  inició  el  desarrollo  de  un  modelo  de  patrimonio  cultural  inteligente  que    propone  un  marco  de  gestión  sustentado  en  la  innovación  y  el  uso  de  tecnologías.    Este modelo es presentado como evolutivo y adaptativo, articulado desde una triple   perspectiva: la del visitante/turista, la del destino/territorio y la del propio bien pa -  trimonial. Sus objetivos principales son: i) establecer un modelo de gestión avanza -  da del patrimonio cultural que integre innovación y sostenibilidad; ii) fortalecer los  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  269  procesos de conservación, valorización y sostenibilidad del patrimonio; iii) mejorar   la experiencia del visitante; iv) fomentar la participación activa de todos los agentes   implicados;  y  v)  generar  directrices  y  recomendaciones  prácticas  que  orienten  su    implementación (Invat·tur, 2024).  Tal  como  se  puede  ver,  la  planificación  turística  inteligente  no  se  orienta  exclusiva -  mente a la conservación del patrimonio, sino que también puede contribuir a los pro -  cesos de puesta en valor mediante el uso de tecnologías, datos e innovación. Es decir,   así  como  permite  y  facilita  la  toma  de  decisiones  informadas  por  parte  de  los  entes    gestores, al mismo tiempo fortalece la experiencia del visitante a través de propuestas   más accesibles, interpretativas y sostenibles.   No obstante, pese a los desarrollos y avances recientes, los modelos se encuentran en   una fase inicial. Es decir, así como se reconoce una creciente y diversa implementa -  ción de Tecnologías de la Información y la Comunicación (TIC) aplicadas a la conser -  vación y puesta en valor turística del patrimonio, la adopción de modelos integrales   y sistemáticos aún se encuentra en proceso. En muchos casos, las experiencias rele -  vadas corresponden a pruebas piloto o iniciativas experimentales, lo que evidencia   tanto el potencial de estas herramientas como la necesidad de avanzar en su conso -  lidación, validación metodológica y escalabilidad dentro de marcos de planificación   sostenibles e inteligentes.  De  allí  la  necesidad  de  adoptar  un  enfoque  que  contemple  no  solo  las  oportuni -  dades,  sino  también  los  límites  y  problemáticas  contextuales.  En  este  sentido,  el    concepto  de  patrimonio  inteligente  se  presenta  como  una  alternativa  que  habi -  lita  nuevas  formas  y  herramientas  para  enfrentar  los  desafíos  relacionados  con    la  conservación  y  valorización  del  patrimonio,  combinando  el  uso  de  tecnologías    con  modelos  de  gestión  sostenibles.  En  particular,  se  reconoce  el  rol  que  pueden    desempeñar  las  tecnologías  para  mejorar  tanto  los  procesos  de  gestión,  incluida    tanto la conservación como la mejora de la experiencia del visitante. No obstante,   más  allá  de  estas  oportunidades,  también  emergen  una  serie  de  problemáticas    que exceden lo meramente tecnológico y que resultan centrales para un abordaje   verdaderamente integral y sostenible.  Teniendo en cuenta lo antes expuesto, la Tabla 1, surge del análisis realizado en la re -  visión  de  la  literatura  científica  e  institucional,  y  busca  articular  las  oportunidades    junto con una diversidad de problemáticas que se observan.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  270  Tabla 1  Problemáticas y oportunidades de la planificación turística inteligente en el   patrimonio.  Visitantes / Usuarios   Ente Gestor Patrimonial  Problemáticas  •  Información escasa o poco   actualizada  •  Falta de accesibilidad a los   bienes patrimoniales.  •  Limitaciones de conectividad   durante la visita.  •  Experiencias poco   personalizadas  •  Problemas de privacidad de los   datos personales.  •  Brechas tecnológicas que   afectan la experiencia.  •  Exceso de capacidad de carga   en la experiencia  •  Limitada disponibilidad de   tecnologías interactivas  •  Rol pasivo del visitante en las   experiencias culturales  •  Falta de integración y acceso de   las comunidades anfitrionas  •  Falta de recursos financieros.  •  Altos costos de implementación   tecnológica.  •  Débil co-gestión y participación.  •  Complejidad    interadministrativa.  •  Escasez de datos e indicadores.  •  Déficits de interoperabilidad.  •  Inexistencia de cuadros de   mando.  •  Falta de modelos de   intervención.  •  Dificultades para comprender   patrones de movilidad y aforos.  Oportunidades  Mejora de la experiencia en todo   el ciclo de viaje   •  Antes (reserva, planificación,   comunicación, etc.)  •  Durante (accesibilidad,   interpretación, personalización,   aforos, etc.)   •  Después (evaluación de la   experiencia, huella social,   fidelización, etc. )  Fuente: Elaboración propia. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  271  Los  museos  del  futuro,  según   Šveb   Dragija  y  Jelinčić  (2025),  deben  adaptarse  a  las    necesidades  y  expectativas  cambiantes  de  sus  visitantes,  desarrollando  nuevas  fun -  ciones que trasciendan el rol tradicional de conservación del pasado. Es fundamental   que se involucren activamente en la realidad social, asuman un papel de co-creado -  res  y  se  preparen  para  atender  a  nuevas  generaciones  que  consumen  contenidos  de    formas diversas y dinámicas. En este contexto, se vuelve clave pensar en propuestas   personalizadas,  multidimensionales,  mediadas  y  potenciadas  por  las  tecnologías  de    la información y la comunicación (TIC), y cada vez más concebidas desde procesos de   co-creación (Femenia-Serra & Neuhofer, 2018).  3.6.3.3. Modelo de la Red: requisitos y ejes del eje sostenibilidad  El Modelo Metodológico de Destinos Turísticos Inteligentes (MM RI-DTI) propuesto por   la  Red  Iberoamericana  DTI  (2025),  adopta  un  esquema  de  referencial  técnico  y  tiene    como objetivo fomentar la adopción de prácticas y acciones que permitan a los desti -  nos de Iberoamérica, transformarse en destinos turísticos inteligentes. Además de la   sostenibilidad, se identifican otros cuatro pilares: gobernanza, tecnología, innovación   y accesibilidad.  El MM RI-DTI se configura como un modelo de procesos. Esto significa que se centra en   la implementación y mejora continua de prácticas y acciones a lo largo del tiempo, en   lugar de enfocarse únicamente en los resultados finales o impactos inmediatos. Bajo   este criterio, el esquema de trabajo inicia cuando cada municipio participante realiza   un  diagnóstico  inicial  basado  en  los  pilares,  identificando  sus  fortalezas  y  áreas  de    mejora. Esto es revisado por un auditor certificado de la Red Iberoamericana de Des -  tinos Turísticos Inteligentes, el cual evalúa el nivel de cumplimiento de cada requisito   e indicador y construye las recomendaciones y plan de acción para guiar el proceso   de  transformación.  Por  tanto,  al  diagnóstico  le  continúa  la  elaboración  de  un  plan    de mejora y, a posteriori, el monitoreo que evalúa el grado de eficacia de las acciones   correctivas implementadas.  El encargado de la gestión del modelo será el organismo gestor de destino (OGD), es   decir  la  entidad  responsable  en  liderar  el  proceso,  así  como  coordinar  entre  las  dis -  tintas  dependencias  y  partes  interesadas.  Este  aspecto,  se  podría  complementar  con    el de Norma IRAM SECTUR 42101 (Argentina) que lo define como la organización que   gestiona un destino turístico inteligente con responsabilidad y la autoridad suficiente   para  establecer,  implementar,  mantener  y  mejorar  un  sistema  de  gestión  de  DTI.  Se   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  272  trata de un aspecto no menor si se contempla que los marcos de actuación tan diver -  sos, complejos así como las jurisdicciones que intervienen.  Ahora bien, ¿qué abordaje se realiza de la sostenibilidad? A modo de síntesis, este pilar   comprende:   •  el compromiso del destino para desarrollar una actividad turística responsable   y perdurable en el tiempo,   •  la capacidad para armonizar el desarrollo económico con la preservación am -  biental y el bienestar social de la comunidad local.   •  el desarrollo de un modelo turístico que genere impactos positivos y minimice   los negativos, asegurando su viabilidad a largo plazo (Red Iberoamericana de   Destinos Turísticos Inteligentes, 2025).  Se trata de la dimensión más importante del modelo, medido en términos de volumen,   así como de mayor complejidad, evidenciado en la diversidad de desafíos de cumpli -  miento que involucra. Expresado en términos numéricos (Tabla 1), el pilar de la soste -  nibilidad posee 4 ámbitos de actuación, 31 requisitos y 49 indicadores. Esto representa   un 38% de peso relativo en comparación con los otros ejes. Aspecto no menor, si se con -  sidera que este pilar representa un volumen de indicadores que duplica, por ejemplo,   al eje de gobernanza o accesibilidad (versión marzo de 2025).  Tabla 2  Estructura y pesos relativos en el pilar de la sostenibilidad.  Ámbitos   Indicadores   Representatividad  Gestión de la sostenibilidad turística   22   44,90%  Conservación, mejora y recuperación del patrimonio   cultural   4   8,16%  Conservación y mejora del medioambiente   11   22,45%  Desarrollo socioeconómico y economía circular   12   24,49%  Total   49   100%  Fuente: Elaboración propia.  Dicho esto, queda profundizar en cuáles son los requisitos más directamente vincula -  dos  a  la  sostenibilidad  sociocultural  (Tabla  3).  Para  eso  se  seleccionaron  9  requisitos   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  273  que pertenecen tanto al ámbito de “Gestión de la sostenibilidad turística” (6) y todos   los de “Conservación, mejora y recuperación del patrimonio cultural” (3). En efecto, se   procedió a identificarlos y, a la vez, reflexionar sobre sus retos de cumplimiento. Este   último punto no aparece ni en el modelo ni en la matriz de indicadores, y forma parte   del análisis propuesto en este capítulo:  Tabla 3  Requisitos e indicadores de sostenibilidad sociocultural.  Ámbito   Requisito   Indicador/es   Reto  A.  Gestión de la   sostenibilidad   turística  Planeamiento u or -  denación urbanística   del destino/territorio   adaptado a los princi -  pios de sostenibilidad   (SOS01_02)  1.   Existencia  de  un  plan  gene -  ral  de  ordenación  urbana  o    territorial  que  contiene  me -  didas  de  protección  del  pa -  trimonio  cultural,  histórico    artístico, arquitectónico y re -  coge  el  impacto  paisajístico    2.   Estudio  ambiental  y  territo -  rial  estratégico  vinculado  al    plan de ordenación urbana  El  cumplimiento  de  estos  indicado -  res  requiere  integrar  la  planifica -  ción  urbana  con  criterios  de  soste -  nibilidad  y  protección  patrimonial    mediante  instrumentos  formales  y    actualizados.  La  existencia  de  pla -  nes  y  programas  específicos,  tanto    de  ordenación  territorial  como  de    gestión  ambiental,  resultan  centra -  les para dar cumplimiento.  Gestión sostenible de   recursos turísticos   (SOS01_04)  1.   Disposición  de  un  inven -  tario  de  recursos  turísti -  cos  naturales  y  culturales    2.  Certificaciones/sellos de sos -  tenibilidad y/o calidad de los   recursos  turísticos  y  de  las    empresas  de  cada  subsector    turístico  La  disposición  de  un  inventario  es -  tructurado  y  actualizado  permite    conocer  y  valorar  integralmente    los  recursos  turísticos,  facilitando    la  planificación.  Asimismo,  pro -  mover  y  evidenciar  distinciones/  certificaciones  en  los  distintos    subsectores  fortalece  la  calidad  y    competitividad  del  destino.  Ambos    elementos requieren respaldo docu -  mental,  trazabilidad  institucional  y    articulación  con  políticas  públicas    vigentes.  Se  recomienda  que  los    inventarios  contemplen  análisis  de    accesibilidad.  Medición de la capaci -  dad de carga del turis -  mo (SOS01_05)  1.   Existencia  de  un  estudio  de    evaluación  del  impacto  am -  biental  Además de contar con estudios que   identifiquen la capacidad de carga,   los  destinos  deben  adoptar  meca -  nismos  dinámicos  para  evaluar    los  flujos  turísticos  y  gestionar  sus    impactos en el medio ambiente y la   población,  fortaleciendo  así  la  sos -  tenibilidad  y  la  toma  de  decisiones    basada en datos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  274  Ámbito   Requisito   Indicador/es   Reto  A.  Gestión de la   sostenibilidad   turística  Legislación específica   para el patrimonio   natural y cultural   (SOS01_09)  1.   Disposición  de  leyes  y  nor -  mativas  vinculadas  con  la    gestión y la conservación del   patrimonio  natural  a  nivel    local  Disponer  de  legislación  específica    para  el  patrimonio  natural  y  cultu -  ral  garantiza  un  marco  normativo    claro para su protección, uso soste -  nible  y  puesta  en  valor.  Esta  legis -  lación  debe  ser  conocida,  aplicable    y  articulada  con  instrumentos  de    planificación y gestión local.   Promover la interacción   entre el visitante y el re -  sidente (SOS01_12)  1.  Existencia  de  bonifica -  ciones  o  beneficios  para    favorecer  el  acceso  de    la  población  residente,    a  los  recursos  turísticos    2.  Desarrollo de campañas que   promuevan  el  uso  de  insta -  laciones  y  espacios  de  valor    turístico  por  parte  de  los  re -  sidentes  La  promoción  de  la  interacción  en -  tre  visitantes  y  residentes  puede    evidenciarse  mediante  la  existen -  cia  de  programas  específicos,  no    sólo retóricamente. El desarrollo de   campañas  específicas  que  fomen -  ten  su  participación  activa  y  el  re -  gistro  de  iniciativas  que  integren  a    los  residentes  en  el  uso  de  recursos    turísticos  son  el  primer  paso,  pero    requiere de integración efectiva.   Concienciación  sobre  la    sostenibilidad  turística    entre  residentes  y  visi -  tantes (SOS01_13)  1.   Desarrollo  de  campañas  de    concienciación  sobre  sos -  tenibilidad  orientadas  a  los    residentes  El cumplimiento de este indicador se   logra mediante campañas activas de   comunicación  sobre  sostenibilidad,    dirigidas  tanto  a  residentes  como    a  visitantes.  Es  clave  diseñar  accio -  nes  comunicacionales  específicas,    con  materiales  adaptados  y  canales    efectivos, que promuevan comporta -  mientos  responsables  y  refuercen  la    corresponsabilidad  en  el  uso  de  los    recursos  turísticos.  La  medición  del    impacto y la continuidad de las cam -  pañas son necesarias para fortalecer   su efectividad y legitimidad.  B.  Conservación,    mejora y   recuperación   del patrimonio   cultural  Diseño,  construcción    y  protección  del  pa -  trimonio  y  del  paisaje    (SOS02_14)  1.   Desarrollo  de  campañas    de  concienciación  so -  bre  sostenibilidad  orien -  tadas  a  los  residentes    2.   Normativa  que  regula  la  ti -  pología  arquitectónica  local    y las restricciones en la cons -  trucción  para  respetar  esa    tipología  Cumplir  con  este  indicador  requiere    contar con una normativa clara que   regule  la  tipología,  las  condiciones    de  construcción  en  armonía  con  el    paisaje  y  la  identificación  de  niveles    de  protección.  Además,  es  clave  de -  sarrollar  campañas  de  conciencia -  ción que promuevan la valorización   patrimonial,  reforzando  la  protec -  ción activa del entorno construido.  Inventario y plan de ac -  tuación  para  la  conser -  vación  del  patrimonio    histórico-artístico  (SOS02_15)  1.   Inventario  y  plan  de  actua -  ción  para  la  conservación    del  patrimonio  histórico-ar -  tístico  Dar  cumplimiento  a  este  requisito    implica  disponer  de  un  inventario,    así como de un plan de actuación. Es   fundamental que ambos instrumen -  tos estén actualizados, validados ins -  titucionalmente y articulados con la   gestión turística y territorial del des -  tino,  asegurando  una  conservación    sostenible y planificada. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  275  Ámbito   Requisito   Indicador/es   Reto  B.  Conservación,    mejora y   recuperación   del patrimonio   cultural  Fomento y protección de   los  recursos  culturales    locales (SOS02_16)  1.   Fomento  y  protección  de  los    recursos culturales locales  El cumplimiento de este requisito se   garantiza  a  través  de  la  organiza -  ción periódica de eventos que visibi -  licen  y  fortalezcan  la  cultura  local.    Esto requiere una planificación ins -  titucional  activa,  el  registro  docu -  mental de las acciones realizadas y   la  participación  de  actores  locales    como protagonistas.   Fuente: Elaboración propia.  Tal como se puede ver, la “Gestión de la sostenibilidad turística” se vincula con contar   con instrumentos de planificación actualizados, normativas específicas y sistemas de   monitoreo. La existencia de planes urbanísticos y ambientales integrados, inventarios   turísticos detallados, estudios de capacidad de carga, campañas de concienciación y   beneficios para residentes constituyen evidencias clave. Su implementación requiere   articulación  interinstitucional,  respaldo  documental  y  estrategias  comunicacionales    que fomenten una participación activa de la comunidad local.   Por su parte, el ámbito “Conservación, mejora y recuperación del patrimonio cultural”   se focaliza en la disponibilidad de inventarios patrimoniales y planes de actuación va -  lidados, normativa específica sobre diseño y construcción, así como campañas que re -  fuercen la identidad cultural y el paisaje del destino. Además, incluye la organización   de  eventos  que  promuevan  los  recursos  culturales  locales  para  fortalecer  el  vínculo    entre patrimonio y desarrollo turístico, una gestión cultural sostenida, participativa y   con perspectiva territorial.  Ahora  bien,  dado  que  se  trata  de  una  herramienta  reciente  y  en  proceso  de  consoli -  dación, resulta fundamental identificar sesgos y oportunidades de mejora que contri -  buyan a su fortalecimiento futuro:  •   Buena  parte  de  los  indicadores,  especialmente  los  del  ámbito  “conservación,    mejora  y  recuperación  del  patrimonio  cultural”,  tienen  una  estructuración    binaria  o  dicotómica.  El  verdadero  desafío  no  es  contar  con  un  inventario  o    plan, sino que estas sean herramientas efectivas en términos de objetivos de   gestión.  Es  decir,  que  sean  indicadores  de  resultado  y  no  simplemente  docu -  mentales. Para ello, en principio, se recomienda trabajar sobre gradientes y,   a la vez, en su pertinencia de acuerdo a las problemáticas territoriales princi -  pales que tiene dicho destino. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  276  •  En general, el modelo tiene una orientación al patrimonio monumental/edifica -  do. En este marco, se recomienda considerar el proceso de inflación patrimonial   de  las  últimas  décadas,  del  que  surgen  tipologías  patrimoniales:  patrimonio    industrial, patrimonio cultural inmaterial, sitios de memoria, paisajes cultura -  les,  itinerarios  culturales,  entre  otros.  Por  otro  lado,  pensar  la  posibilidad  del    patrimonio  biocultural.  Es  decir,  aquellos  bienes  o  sitios  que  se  definen  por  la    interdependencia entre naturaleza y cultura.  •  Se encuentra una probable limitación generalizada respecto al requisito “Certi -  ficaciones/sellos  de  sostenibilidad  y/o  calidad  de  los  recursos  turísticos  y  de  las    empresas de cada subsector turístico”. Si bien se establece un gradiente de cum -  plimiento, investigaciones previas evidencian falta de herramientas o déficits de   implementación en programas de calidad en sitios turístico-patrimoniales (Com -  parato y Beltrami, 2022). Una alternativa identificada es que más que certificacio -  nes, los destinos adopten un programa de calidad de nivel inicial que contribuya   a  la  mejora  continua  de  la  gestión  turística  de  sitios  patrimoniales  integrando    tanto productos de turismo cultural consolidados como emergentes.   •  Se recomienda que los estudios no se circunscriban al concepto de capacidad de   carga, sino de “límites de cambio aceptable”. Tal como establecen García Her -  nández  &  Calle  Vaquero  (2012)  representa  un  enfoque  metodológico  diferente,    especialmente en contraste con la búsqueda de límites numéricos fijos. Se trata   de un enfoque más en el que se consensua los niveles de impacto turístico que se   está dispuesto a tolerar considerando las perspectivas de las partes interesadas   involucradas.   •   En  función  del  relevamiento  realizado,  no  solo  importa  que  el  destino  disponga    de leyes y normativas vinculadas con la gestión y la conservación del patrimonio,   sino  que  esta  sea  actualizada  y  pertinente.  Estudios  como  los  realizados  por  el    Instituto  Cultural  de  la  Provincia  de  Buenos  Aires  (2022),  han  detectado  que  es    necesario trabajar en marcos y declaratorias que adopten niveles de protección.   •  Otro punto de mejora detectado es que la dimensión social se focaliza en la in -  teracción entre turistas y visitantes. Aquí merece la pena sumar y trabajar en   el fortalecimiento de procesos de participación social que no solo promueva la   transparencia  sino  participación  social  gestionaria.  Es  decir,  no  solo  pensar    una gestión participativa desde la mera difusión de datos de los valores patri -  moniales sino integrar procesos consultivos y de consensos.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  277  •  Ligado a lo anterior, la sostenibilidad sociocultural debe incluir planes, progra -  mas  y  proyectos  que  incentiven  tanto  la  puesta  en  valor  de  repertorios  patri -  moniales de sectores subordinados (Comparato, 2018) como de acceso al uso y   disfrute turístico-cultural de los sitios, en un marco donde la movilidad social   (Schenkel, 2019). En este marco, se recomienda que los destinos no adopten una   posición defensiva respecto al patrimonio, sino un plan de mejora que trabaje   en el acceso y disfrute de los bienes.   •   Finalmente,  se  recomienda  que  haya  requisitos  que  promocionen  la  transfor -  mación digital ya sea para potenciar la toma de decisiones de los entes gestores   de sitios como de la propia experiencia de los turistas.   3.6.3.4. Conclusiones y reflexiones  Frente  a  un  campo  de  estudios  turísticos  caracterizado  como  rizomático  (Compara -  to, 2022), este trabajo se propuso articular debates teóricos diversos con los desafíos   prácticos  que  implica  la  sostenibilidad  sociocultural  en  el  marco  de  los  Destinos  Tu -  rísticos Inteligentes (DTI). A partir del análisis realizado, se desprenden las siguientes   conclusiones principales:  En primer lugar, se reafirma que la sostenibilidad sociocultural trasciende la gestión   del patrimonio como recurso turístico. Implica, más bien, situar a la dimensión social y   cultural en el centro del debate sobre sostenibilidad, reconociendo su vínculo estructu -  ral con los modelos de desarrollo y las transformaciones antrópicas. Esta perspectiva   invita a superar visiones reduccionistas que asocian la sostenibilidad exclusivamente   al cuidado ambiental, abriendo paso a enfoques más integradores y críticos.  En  este  marco,  el  trabajo  reflexionó  sobre  el  concepto  de  conservación  estratégica,    entendido como una forma de gestión que no se limita a la protección pasiva del pa -  trimonio, sino que busca integrar activamente su valor simbólico, social y económico   en procesos de desarrollo local sostenibles, reconociendo su dinamismo, conflictividad   y potencial transformador. Por su parte, la Planificación Turística Inteligente (PTI) se   perfila  como  un  paradigma  emergente  que,  si  bien  incorpora  fuertemente  la  dimen -  sión tecnológica, propone una visión más comprensiva y estructurada del desarrollo   turístico. Al reconocer la interrelación entre los niveles estratégico-relacional, instru -  mental y aplicado (Ivars-Baidal & Vera Rebollo, 2019).  Asimismo, el análisis se complementó con la revisión de experiencias concretas impul -  sadas  por  SEGITTUR  e  INVATTUR,  consideradas  referentes  en  el  desarrollo  y  aplica - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.3 .  Ámbito Sostenibilidad cultural  278  ción de modelos de Destinos Turísticos Inteligentes. Esta aproximación permitió una   triangulación entre marcos teóricos, modelos metodológicos y prácticas instituciona -  les, a partir de la cual se identificaron tanto oportunidades como limitaciones en los   procesos de planificación turística inteligente.   En tercer lugar, el análisis del modelo metodológico desarrollado por la Red Iberoameri -  cana permitió reconocer tanto sus fortalezas como herramienta de orientación para la   región, como sus oportunidades de mejora, especialmente en lo que respecta a la opera -  cionalización de la dimensión sociocultural. Para ello, se analizaron los ámbitos de ac -  tuación y requisitos propuestos en el modelo metodológico de la Red Iberoamericana de   DTI. Se trata de un referencial técnico emergente, en el que la sostenibilidad constituye   el componente más robusto y complejo del modelo metodológico analizado, tanto por su   volumen como por la diversidad de desafíos que plantea su implementación.   El  análisis  del  modelo  metodológico  evidencia  desafíos  importantes  para  fortalecer    la dimensión sociocultural de la sostenibilidad en los Destinos Turísticos Inteligentes.   Muchos  indicadores,  especialmente  los  vinculados  al  patrimonio  cultural,  presentan    una lógica binaria que limita su capacidad de reflejar procesos reales de gestión. Se   recomienda avanzar hacia gradientes evaluativos y adecuación a las problemáticas   locales.  Además,  el  enfoque  actual  privilegia  el  patrimonio  monumental,  dejando  de    lado nuevas tipologías como el patrimonio inmaterial, industrial o biocultural. Tam -  bién  se  identifican  limitaciones  en  el  requisito  de  certificaciones,  sugiriéndose  en  su    lugar  programas  de  calidad  inicial  adaptables.  Se  propone  sustituir  el  concepto  de    capacidad de carga por el de “límites de cambio aceptable”, más participativo y con -  textualizado. En el plano normativo, es clave actualizar los marcos regulatorios y es -  tablecer niveles diferenciados de protección. A nivel social, se destaca la necesidad de   promover una participación más activa y consultiva, así como la puesta en valor de   repertorios patrimoniales de sectores subordinados. Finalmente, se subraya la impor -  tancia de incorporar la transformación digital como herramienta para mejorar tanto   la gestión como la experiencia turística.  Referencias bibliográficas  Bassols i Gardella, N., Hiriart Pardo, C. A., Galán-Otero, M. L., & Lacarrieu, M. (2025).   Thinking heritage places in Latin America: frameworks and reflections on historic   urban areas.  Journal of Heritage Tourism, 20(2), 155-170
