ocal  Este  requisito  busca  verificar  si    existe  un  programa  institucio -  nal de apoyo a PYMES y cuántas   empresas  turísticas  han  podido    acceder a sus beneficios durante   los  últimos  dos  años.  El  cumpli -  miento se mide según la existen -  cia del programa como su nivel   de  cobertura,  valorando  tanto    las  iniciativas  generales  como    las  dirigidas  específicamente  al    sector turístico.  Existencia  de  un  programa  de    apoyo a las PYMES.  Documentos  oficiales  del  programa  como    resoluciones,  manuales,  contratos  o  con -  venios;  así  como  evidencias  de  implemen -  tación  entre  ellas  publicaciones  institu -  cionales,  reportes  de  gestión  y  ejecución    presupuestal,  cronogramas,  convocatorias    y listados de beneficiarios.  Porcentaje  las  empresas  y  em -  prendedores del sector que han   accedido  a  las  diferentes  líneas    del  programa  de  apoyo  a  PY -  MES.  Registros  o  base  de  datos  actualizada  de    beneficiarios,  informes  de  resultados  del    programa, notas de prensa emitidas por el   ente gestor, y/o un informe que relacione el   total de empresas turísticas del destino con   el número de beneficiarios del programa.  Fomento  de  los  pro -  veedores  de  produc -  tos,  servicios  y  expe -  riencias  turísticas    locales de kilómetro 0 Se  pretende  que  el  destino  pro -  mueva  experiencias  turísticas    auténticas basadas en recursos   locales,  apoyando  la  partici -  pación  de  proveedores  locales.    El  cumplimiento  del  requisito    implica  no  sólo  la  existencia  de    políticas  o  acciones  recientes    para  promover  experiencias    turísticas  locales,  sino  también    un  porcentaje  significativo  de    la  oferta  turística  que  refleje  la    identidad y recursos propios del   territorio.  Existencia  de  acciones  o  un    programa  de  menos  de  4  años    orientado  a  promover  la  crea -  ción  de  experiencias  turísticas    propias.  Documento del programa, planes estratégi -  cos con su respectivo plan de acción, docu -  mento de convocatoria, informes de activi -  dades  como  talleres,  alianzas  estratégicas,    activaciones, entre otros.  Porcentaje de oferta (productos   y servicios turísticos) basada en   experiencias  turísticas  propias    del destino  Inventario de la oferta turística del destino,   listado  de  experiencias  identificadas  como    propias  del  territorio,  catálogos  o  fichas    técnicas  de  las  experiencias  turísticas  con    identidad  local,  y/o  plataformas  de  comer -  cialización  de  las  experiencias  turísticas    locales. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  232  Ámbito  Requisito  Alcance del requisito  Indicadores  Medios de verificación y evidencias  Política  de  compras    responsables  y  de    apoyo a KM 0  Se  busca  que  el  destino  tenga    una  política,  unos  lineamien -  tos  o  acciones  claras  desde  lo    institucional  que  orienten  sus    compras  hacia  proveedores  del    territorio,  que  sean  sostenibles    y que apliquen buenas prácticas   tanto  ambientales  como  econó -  micas y sociales.  % de compras que ha realizado   el  ente  gestor  del  destino,  prio -  rizando  a  proveedores/subcon -  tratistas.  Registros de compras del ente gestor, factu -  ración institucional y/o la base de datos de   proveedores  en  donde  se  evidencie  las  cer -  tificaciones o prácticas sostenibles de estos.  Satisfacción  del  resi -  dente  Este  requisito  busca  garantizar    que  el  ente  gestor  disponga  de    mecanismos  sistemáticos  y  pe -  riódicos para evaluar la percep -  ción  y  nivel  de  satisfacción  de    la  población  residente  respecto    a  la  actividad  turística  del  des -  tino.   Existencia  de  herramientas    para  conocer  el  nivel  de  satis -  facción  del  residente  (de  forma    periódica)  respecto  a  la  activi -  dad turística.  Informes  técnicos  que  incluyan  resultados    consolidados  de  las  mediciones  de  satis -  facción del residente, evidencias documen -  tales  de  la  aplicación  de  las  encuestas  y    registros  de  periodicidad  de  la  evaluación    y documentación que muestre el uso de los   resultados.  Fuente: Elaboración propia a partir del Modelo Metodológico RI-DTI. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  233  Evaluación y priorización de los requisitos relacionados con la sostenibilidad socioe -  conómica y economía circular  En  el  contexto  actual,  caracterizado  por  la  tecnificación,  la  digitalización  y  el  incre -  mento  sostenido  de  los  flujos  turísticos,  la  sostenibilidad  se  ha  consolidado  como  un    principio rector en la planificación y gestión de los destinos. Este escenario ha impul -  sado la transición hacia modelos más integradores, como el de los Destinos Turísticos   Inteligentes (DTI), que combinan innovación tecnológica con una gestión responsable   del territorio, el patrimonio y las comunidades locales.  Dentro de la metodología de la Red Iberoamericana de Destinos Turísticos Inteligentes,   el eje de sostenibilidad ocupa un lugar central al incorporar dimensiones económicas,   sociales,  culturales  y  medioambientales.  En  este  marco,  el  Ámbito  de  Desarrollo  So -  cioeconómico y Economía Circular resulta fundamental para asegurar que los benefi -  cios derivados de la actividad turística se distribuyan de forma equitativa, se fortalez -  ca la economía local y se fomenten prácticas productivas y de consumo responsables.  La diversidad y amplitud de los requisitos que integran este ámbito hacen necesaria   una priorización estratégica que permita orientar los esfuerzos hacia aquellas accio -  nes con mayor capacidad de generar impactos estructurales y sostenibles en el tiem -  po.  Esta  jerarquización,  además  de  optimizar  la  asignación  de  recursos,  contribuye    a  establecer  una  secuencia  lógica  de  intervención,  ajustada  tanto  a  las  capacidades    operativas del destino como a las particularidades de su contexto territorial.  El  proceso  de  priorización  se  concibió  como  un  ejercicio  técnico  y  participativo  que    combinó tres insumos principales:  1.  Revisión  documental  y  conceptual   de  los  requisitos  e  indicadores  establecidos    en el modelo DTI para el ámbito en estudio, contrastándolos con experiencias y   buenas prácticas internacionales en sostenibilidad turística y economía circular.  2.  Análisis interno del equipo técnico , orientado a evaluar la pertinencia, impac -  to potencial, viabilidad y relaciones de interdependencia entre los requisitos.  3.  Acompañamiento de un experto externo , cuya experiencia en sostenibilidad y   economía circular aplicada al turismo permitió incorporar una visión estraté -  gica y operativa complementaria.  En la primera fase se llevó a cabo una revisión de los requisitos e indicadores vincula -  dos a la dimensión de sostenibilidad socioeconómica, que comprenden 5 requisitos y 7   indicadores del ámbito de Gestión de la sostenibilidad turística, así como 6 requisitos y  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  234  8 indicadores del ámbito de Sostenibilidad socioeconómica y economía circular. Para   cada uno de ellos se analizó:  •  Pertinencia  respecto a los objetivos del modelo DTI.  •  Impacto y aplicabilidad  en términos económicos y sociales.  •  Viabilidad  de implementación considerando recursos y capacidades locales.  En la segunda fase, durante la sesión de trabajo, se discutió la relevancia y pertinencia   de  cada  requisito,  aplicando  una  escala  ordinal  de  priorización  con  valores  de  1  a  9    (donde  1  corresponde  a  la  máxima  prioridad  y  9  a  la  menor).  Este  ejercicio  de  valo -  ración se realizó con el acompañamiento de tres expertos en turismo y un experto en   economía circular y sostenibilidad, lo que permitió sustentar la priorización a partir   de tres criterios:  •  Impacto estructural  (capacidad de generar cambios duraderos).  •  Condicionalidad  (dependencia de otros requisitos para su ejecución efectiva).  La combinación de estos criterios permitió establecer el siguiente orden de prioridad:  Tabla 2  Priorización de requisitos.  Ámbito   Requisito   Indicadores   Prioridad  Ámbito D   Sostenibilidad   socioeconómica y   economía circular  Colaboración del ente ges -  tor con escuelas y centros   de turismo en actividades   o programas de desarrollo   sostenible  Existencia de un programa   de colaboración del sector   turístico con escuelas o   centros de turismo en   materia de sostenibilidad.  1  Ámbito D   Sostenibilidad   socioeconómica y   economía circular  Fomento de los proveedo -  res de productos, servicios   y experiencias turísticas   locales de kilómetro 0  Existencia de acciones o un   programa de menos de 4   años orientado a promover   la creación de experiencias   turísticas propias.   Porcentaje de oferta basa -  da en experiencias turísti -  cas propias del destino.  2 \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  235  Ámbito   Requisito   Indicadores   Prioridad  Ámbito A Gestión   de la sostenibilidad   turística  Concienciación sobre la   sostenibilidad turística en -  tre residentes y visitantes  Desarrollo de campañas de   concienciación sobre sos -  tenibilidad orientadas a los   residentes.  3  Ámbito A Gestión   de la sostenibilidad   turística  Promover la interacción   entre el visitante y el resi -  dente  Existencia de bonificacio -  nes o beneficios para resi -  dentes.   Desarrollo de campañas   que promuevan el uso de   instalaciones y espacios de   valor turístico por parte de   los residentes.  4  Ámbito D   Sostenibilidad   socioeconómica y   economía circular  Acciones formativas en   materia de sostenibilidad  Puesta en marcha de ac -  ciones formativas para la   cualificación del personal   en turismo y en materia de   sostenibilidad.  5  Ámbito D   Sostenibilidad   socioeconómica y   economía circular  Protección de la economía,   productos KM 0 y turismo   local  Existencia de un programa   de apoyo a las PYMES.   Porcentaje de empresas y   emprendedores del sector   que han accedido a las   líneas del programa.  6  Ámbito A Gestión   de la sostenibilidad   turística  Apoyo económico a la   sostenibilidad en el sector   privado  Disposición de programas   de apoyo económico a la   gestión sostenible am -  biental y social de PYMES   turísticas.   % de empresas turísticas   acogidas al programa.  7  Ámbito A Gestión   de la sostenibilidad   turística  Marketing para un turis -  mo sostenible  Realización de acciones de   comunicación y promoción   para desarrollar y promo -  ver productos y servicios   sostenibles.  8 \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  236  Ámbito   Requisito   Indicadores   Prioridad  Ámbito D   Sostenibilidad   socioeconómica y   economía circular  Política de compras res -  ponsables y de apoyo a   KM 0  % de compras realizadas   por el ente gestor priori -  zando proveedores/subcon -  tratistas locales sostenibles.  9  Ámbito D   Sostenibilidad   socioeconómica y   economía circular  Satisfacción del residente  Existencia de herramientas   para conocer periódica -  mente el nivel de satisfac -  ción del residente.  10  Ámbito A Gestión   de la sostenibilidad   turística  Gestión de la estacionali -  dad del destino  Análisis/seguimiento de   la ocupación mensual por   plazas de alojamiento y   tipología turística.  11  Fuente: Elaboración propia.  El ejercicio de priorización resultante permitió estructurar los requisitos en tres nive -  les estratégicos, siguiendo un criterio progresivo de implementación y consolidación:  Nivel 1. Sensibilización y fortalecimiento de capacidades (Prioridades 1 a 5)  Este  primer  nivel  constituye  la  base  habilitadora  del  ámbito.  Se  centra  en  el  cambio    cultural y en la creación de capacidades locales, necesarias para que la sostenibilidad   se convierta en una práctica asumida por toda la comunidad. Se reconoce aquí la im -  portancia de formar, sensibilizar y cohesionar a los actores del destino en torno a la   economía circular y al turismo responsable.  Los requisitos priorizados en este nivel fueron:  •   Colaboración  del  ente  gestor  con  escuelas  y  centros  de  turismo  (P1):  impulsa    alianzas estratégicas en materia de sostenibilidad.  •  Fomento de proveedores de productos, servicios y experiencias turísticas loca -  les de km 0 (P2): orienta la oferta hacia experiencias auténticas que refuercen   la identidad local.  •  Concienciación sobre la sostenibilidad entre residentes y visitantes (P3): fomen -  ta campañas de sensibilización que consolidan una cultura turística sostenible.  •  Promoción de la interacción entre visitante y residente (P4): favorece la inclu -  sión de la comunidad en los beneficios del turismo. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  237  •   Acciones  formativas  en  materia  de  sostenibilidad  (P5):  garantiza  la  cualifica -  ción del personal del sector turístico.  En conjunto, este nivel busca generar un entorno predispuesto al cambio, donde tanto   la  comunidad  como  los  actores  económicos  comprendan  y  asuman  los  principios  de    la sostenibilidad.  Nivel 2. Consolidación económica y competitividad local (Prioridades 6 a 9)  El segundo nivel reúne las medidas destinadas a fortalecer el tejido económico y pro -  ductivo del destino. Aquí, la sostenibilidad se convierte en una estrategia de competi -  tividad, orientada a retener el valor dentro de la comunidad y reducir la dependencia   de dinámicas externas.  Los requisitos de este nivel fueron:  •   Protección  de  la  economía,  productos  KM  0  y  turismo  local  (P6):  impulsa  pro -  gramas de apoyo a PYMES para incrementar su resiliencia.  •  Apoyo económico a la sostenibilidad en el sector privado (P7): incentiva la adop -  ción de prácticas sostenibles en las empresas turísticas.  •  Marketing para un turismo sostenible (P8): alinea la promoción del destino con   valores de sostenibilidad.  •  Política de compras responsables y de apoyo a KM 0 (P9): orienta adquisiciones   hacia proveedores locales sostenibles.  Estas acciones fortalecen la competitividad, fomentan la economía circular y reducen   la huella ambiental del turismo, asegurando que los beneficios se queden en la comu -  nidad anfitriona.  Nivel 3. Monitoreo y gestión adaptativa (Prioridades 10 y 11)  El tercer nivel concentra los mecanismos de control, evaluación y gestión de riesgos,   que son fundamentales para garantizar la sostenibilidad a largo plazo. Aquí, la aten -  ción se centra en asegurar que los logros alcanzados en los niveles anteriores se man -  tengan, evolucionen y se adapten a las nuevas necesidades del destino.  Los requisitos priorizados en este nivel fueron:  •  Satisfacción del residente (P10): mide la percepción de la población local sobre   la actividad turística, ofreciendo retroalimentación para ajustes periódicos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  238  •  Gestión de la estacionalidad del destino (P11): contribuye a equilibrar los flujos   turísticos y reducir la presión estacional sobre los recursos.  La  función  principal  de  este  nivel  es  garantizar  la  resiliencia  del  sistema  y  permitir    una  gestión  flexible  que  asegure  la  permanencia  de  los  beneficios  generados  por  la    sostenibilidad.  Retos en la implementación del ámbito de desarrollo socioeconómico y economía cir -  cular  La implementación de la sostenibilidad en el modelo de Destinos Turísticos Inteligentes   (DTI)  representa  un  desafío  no  solo  de  tipo  conceptual  como  se  plantea  en  la  revisión    de  la  literatura  de  este  capítulo  sino  también,  un  reto  operativo  en  los  Organismos  de    Gestión de Destinos. La inserción de este enfoque trasciende la aplicación instrumental   de indicadores y requisitos y exige una transformación en los principios y paradigmas   que orientan la gestión del turismo en América. El modelo DTI requiere a su vez una re -  flexión sobre su propósito, toda vez que no se trata solo de medir, sino de reinterpretar la   manera en que los destinos conciben la sostenibilidad y el desarrollo económico y social.   Históricamente, la sostenibilidad social ha ocupado un papel secundario frente a las   dimensiones económica y ambiental. En ese sentido los planteamientos de Mantecón,   A.,  Velasco,  M.,  &  Huete,  R.  (2024)  sobre  sostenibilidad  social  del  turismo,  presentan    convergencias con la implementación práctica que plantea el modelo DTI. Se destaca   que el modelo DTI intente aproximarse a la sostenibilidad social al reconocer el proble -  ma que genera el turismo en las sociedades receptoras e intentar establecer una serie   de acciones para su control o reducción. Sin embargo, dicha aproximación resulta ser   evidentemente limitada frente a los desafíos que desde lo conceptual y práctico tiene   la sostenibilidad social de este sector económico.  Esta  limitada  aproximación  a  la  sostenibilidad  social  ha  generado  una  brecha  entre    la intencionalidad de los OGD y la materialización práctica de políticas de desarrollo   social del turismo. De tal manera que uno de los aspectos en los cuales el modelo DTI   resulta insuficiente es el de justicia social, y turismo como derecho económico, sobre   todo en comunidades históricamente marginadas como puede ser el caso de territo -  rios en América, donde la llegada del turismo representa una oportunidad económica,   pero también un desafío de poderes (económico, legal, normativo) de diferente escala.  Con respecto a los retos operativos de la implementación del ámbito de desarrollo so -  cioeconómico y economía circular, amerita resaltar la urgencia de transitar de enfo - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  239  ques tradicionales que miden el desarrollo turístico en atracción de visitantes y renta -  bilidad económica en el corto plazo, hacia un enfoque de largo plazo que caracteriza   el modelo DTI, donde los resultados de las acciones pedagógicas alrededor de la soste -  nibilidad serán evidentes en un período de 2 o 3 años. Esta situación implica construir   visiones  colectivas  que  permitan  romper  resistencias  organizacionales  en  la  gestión    pública,  que  privilegian  los  resultados  económicos  inmediatos  sobre  la  construcción    sostenida de bienestar comunitario.  Por su parte, los requisitos relacionados con economía circular son limitados, si bien la   economía circular hace parte de los discursos institucionales, su implementación real   suele ser reduccionista y enfocada de forma casi exclusiva en acciones ambientales,   perdiendo la oportunidad de aprovechar su potencial integrador en procesos produc -  tivos más amplios. Esta visión reduccionista impide que este principio logre permear   de forma transversal todos los ámbitos del eje de sostenibilidad.  Finalmente,  la  implementación  de  la  sostenibilidad  social  y  económica  en  el  modelo    DTI enfrenta retos múltiples que van desde las limitadas aproximaciones conceptuales,   pasando por la necesidad de cambio de paradigmas en el enfoque del desarrollo turís -  tico hasta los retos operativos de su implementación en los OGD. Uno de los mayores   retos es revalorizar la sostenibilidad social como eje estratégico con elementos y her -  ramientas que coadyuven a que el turismo contribuya a la justicia social y resiliencia   territorial.  Solo  mediante  una  aproximación  sistémica  será  posible  materializar  las    aspiraciones de transformación territorial que trae el modelo DTI.  3.6.1.3. Conclusiones y recomendaciones  En lo que respecta, a la sostenibilidad socioeconómica y la economía circular se pue -  den  entender  como  un  vector  estratégico  no  sólo  para  su  eje  de  sostenibilidad,  sino    también para la construcción de destinos inteligentes, capaces de lograr un equilibrio   entre el bienestar de las comunidades, la protección ambiental y el desarrollo econó -  mico local.  El  análisis  realizado  permite  concluir  que  uno  de  los  principales  obstáculos  es  el  en -  foque  fragmentado  hacia  la  sostenibilidad  donde  tradicionalmente  se  ha  priorizado    el  beneficio  económico  y  la  preservación  del  medio  ambiente,  dejando  a  un  lado  las    dimensiones sociales y culturales, lo que significa que no deben entenderse como ele -  mentos aislados sino como principios transversales dentro del modelo DTI. En ese sen -  tido, es necesario resaltar la importancia de trascender de la búsqueda de resultados  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  240  inmediatos hacia procesos de largo plazo basados en educación, articulación institu -  cional y fortalecimiento comunitario.  En los requisitos del eje de sostenibilidad relacionados con los ámbitos social y econó -  mico se evidencia un interés y preocupación por el bienestar de las comunidades re -  ceptoras. Indicadores como: existencia de bonificaciones o beneficios para residentes,   desarrollo  de  campañas  que  promuevan  el  uso  de  instalaciones  y  espacios  de  valor    turístico  por  parte  de  los  residentes  y  medición  de  la  satisfacción  del  residente  son    una muestra de ello, donde se busca que el OGD inicie desde una etapa temprana con   procesos  de  prevención  de  efectos  sociales  negativos  y  reducir  los  impactos  sociales    negativos como turismofobia y procesos asociados.   En territorios donde el turismo se ha convertido en una herramienta de visibilización,   resiliencia  y  transformación  social  como  es  el  caso  de  la  ciudad  de  Medellín  (López    Zapata,  2020)  la  sostenibilidad  socioeconómica  se  convierte  en  una  piedra  angular    que debe guiar la política turística del destino y trascender la lógica de simples indica -  dores. Aunque el modelo DTI reconoce de forma parcial esta aproximación, presenta   limitaciones frente a los desafíos multidimensionales como calidad de vida, derechos   y  justicia  social.  Para  que  el  turismo  contribuya  al  bienestar  de  las  comunidades  en    América, se requiere que este ámbito pueda incorporar narrativas locales con indica -  dores  relacionados  con  participación  comunitaria  y  análisis  de  poder  que  permitan    comprender  mejor  cómo  se  distribuyen  los  beneficios  y  quiénes  son  los  actores  ex -  cluidos y evitar que el turismo se convierta en un detonante de procesos de exclusión   socioespacial y económico.  Otra limitación del modelo para el contexto Latinoamericano está relacionada con las   tensiones sobre el poder y las relaciones que se tejen alrededor de este. Como lo plan -  tea Mantecón et al. (2024) resulta inevitable encarar las relaciones de poder dentro del   sistema turístico. Sin embargo, el modelo DTI lo aborda de manera limitada reducién -  dolo  a  conceptos  como  gobernanza  y  participación.  Adicionalmente,  de  forma  inad -  vertida el enfoque DTI puede reproducir esas relaciones desiguales de poder al privile -  giar documentos y registros institucionales como medios de verificación y que puede   perpetuar la exclusión de voces comunitarias con menor capacidad técnica o política  En cuanto a la economía circular, aunque su aplicación en turismo es limitada, este ca -  pítulo demuestra que su potencial es mucho mayor en especial en la reconfiguración   de la cadena de valor, en prácticas de consumo responsable y en la consolidación de   los sistemas productivos locales, de modo que incorporar la circularidad transversal - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  241  mente equivale a una oportunidad valiosa para los DTI reduciendo su dependencia a   procesos externos y mejorar su competitividad desde lo local.  A  pesar  de  las  limitaciones  planteadas  sobre  el  modelo  DTI,  se  resaltan  elementos    significativos  específicamente  en  el  ámbito  de  la  sostenibilidad  económica  para  las    empresas del destino. En este sentido, los indicadores relacionados con los requisitos   de  apoyo  a  empresas  del  territorio,  como  son:  existencias  de  programas  de  apoyo  a    las PYMES tanto a nivel económico con líneas de crédito, estímulos e incentivos como   también  programas  para  impulsar  la  gestión  sostenible  medioambiental  y  social  de    las pymes turísticas representan un avance importante en este ámbito.   Este tipo de instrumentos financieros que incentivan la adopción de prácticas sosteni -  bles y fortalecen la competitividad de las empresas del destino, permiten materializar   una oportunidad para redistribuir los beneficios del turismo y consolidar una cadena   de valor turística de base local. En contextos donde el turismo puede ser una vía de de -  sarrollo para comunidades históricamente marginadas, el modelo DTI puede ayudar   a dar un paso hacia una sostenibilidad económica que transforma un modelo produc -  tivo exógeno hacía uno con participación endógena.  Los  retos  identificados  en  la  implementación  del  ámbito  de  sostenibilidad  socio-eco -  nómica  y  economía  circular  evidencia  que  la  transformación  hacia  un  DTI  requiere    transitar de una concepción de inteligencia asociado exclusivamente a la incorpora -  ción de herramientas tecnológicas o la adopción de indicadores cuantitativos, hacia   una articulación de vectores que van desde voluntad política sostenida, liderazgo ins -  titucional compartido y compromiso social, elementos que deben converger en pro de   la construcción de una visión compartida que posicione nuevas formas de entender y   hacer turismo bajo los principios del desarrollo responsable y regenerativo.  Referencias bibliográficas  Espinoza, A. (2023). Economía circular: una aproximación a su origen, evolución e im -  portancia  como  modelo  de  desarrollo  sostenible.   Revista  de  Economía  Institucio -  nal , 109-134.  Fundación Ellen MacArthur. (2023).  Introducción a la economía circular.  Obtenido de   ellenmacarthurfoundation.org:   https://www.ellenmacarthurfoundation.org/es/  temas/presentacion-economia-circular/vision-general  Global Destination Sustainability Index. (2018).  Sustainable Destination Management:   The  Road  to  a  Circular  Economy.  A  white  paper  analysis  of  the  2017  Global  Des - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.1.  Ámbito Sostenibilidad socioeconómica y economía circular  242  tination.   Obtenido  de   oneplanetnetwork.org:     https://www.oneplanetnetwork.org/  sites/default/files/from-crm/gdsi-the-road-to-a-circular-economy-whitepaper.pdf  López Zapata, L. (2020).  Los ejercicios de territorialidad presentes en un barrio popu -  lar de Medellín a partir de la incorporación de la dinámica turística  [Tesis docto -  ral, Universitat de les Illes Balears].  Mantecón, A., Velasco, M., & Huete, R. (2024). sostenibilidad social del turismo.  Estudios   Turísticos ,  228 .  https://doi.org/10.61520/et.2282024.1241  Prieto-Sandoval, V., Jaca, C., y Ormazabal, M. (2017). Economía circular: Relación con   la evolución del concepto de sostenibilidad y estrategias para su implementación.   Memoria Investigaciones en Ingeniería , 85-95.  Rainforest Alliance. (2008).  Buenas Prácticas para turismo sostenible . 131.  http://www.  rainforest-alliance.org/tourism/documents/tourism_practices_guide_spanish.pdf  SEGITTUR.  (2023).   Manual  para  la  transición  de  un  destino  turístico  hacia  una    economia  circular.   Obtenido  de   segittur.es:   https://www.segittur.es/wp-con -  tent/uploads/2024/12/Manual-para-la-transicion-de-un-destino-turistico-ha -  cia-una-economia-circular.pdf  Solís-Hernández,  J.  D.  (2020).  Turismo  inteligente,  innovador,  sostenible  y  acce -  sible.  Revista  de  Sociología  Contemporánea ,  13–19.   https://doi.org/10.35429/  JOCS.2020.23.7.13.19  Vargas-Sánchez, A. (2022). Innovación y Economía Circular en el Turismo.  Revista Mul -  tidisciplinar , 119-134. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  243  3.6.2. Ambito Sostenibilidad ambiental  María Lucila Salessi  Universidad Nacional de La Plata. Universidad Nacional de Entre Ríos, Argentina.   Bárbara Diana Valenzuela  Universidad Nacional de Entre Ríos. Universidad Nacional de La Plata, Argentina.   María Pía Oyarbide  Universidad Nacional de Entre Ríos, Argentina.  3.6.2.1. Introducción  La crisis climática, la pérdida de biodiversidad, la contaminación y la creciente presión   turística sobre los ecosistemas constituyen hoy algunos de los principales desafíos que   enfrentan los territorios a nivel global. Estos problemas, intensificados por la pandemia   y por contextos de inestabilidad económica y social, demandan repensar las estrategias   de  desarrollo  bajo  un  enfoque  de  sostenibilidad  que  integre  dimensiones  ambientales,    sociales  y  económicas  (Molina  Azorín  et  al.,  2020;  Pereira  Moliner  et  al.,  2019).  Para  el    sector  turístico,  el  cambio  climático  constituye  una  amenaza,  dado  que  sus  activida -  des también dependen estrechamente del clima (OMT, 2021), y al mismo tiempo contri -  buye al problema global por sus emisiones de gases de efecto invernadero, responsables   de aproximadamente el 5% del total global (OMT, 2008; OMT, 2021). Diferentes estudios   señalan que la relación entre turismo y cambio climático es bidireccional (Jarvis & Orte -  ga, 2010; Pablo-Romero, et al.,2019; Torres-Bagur et al., 2019). Los destinos turísticos y el   sector en general son vulnerables a sus efectos, como olas de calor, pérdida de biodiver -  sidad y escasez de agua o energía (Scott, 2021). Esta situación interpela al sector y hace   aún más urgente desarrollar estrategias que protejan los recursos naturales y aseguren   la resiliencia de los destinos. La sostenibilidad, y en particular la dimensión ambiental,   constituye un eje transversal y determinante: un destino difícilmente puede ser conside -  rado inteligente si no es sostenible (Perles-Ribes & Ivars-Baidal, 2018).  En  este  marco  surge  el  modelo  de  Destinos  Turísticos  Inteligentes  (DTI),  concebido    como un nuevo paradigma que combina gobernanza, innovación, tecnología, accesi -  bilidad y sostenibilidad para incrementar la competitividad de los destinos y, al mismo   tiempo, garantizar un desarrollo turístico más inclusivo y responsable (López de Ávila   Muñoz & García Sánchez, 2013; Gretzel, Sigala, Xiang & Koo, 2015; Ivars-Baidal et al.,   2019).  Entre  sus  principales  propuestas  de  acción  se  encuentran  la  gestión  eficiente   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  244  de  recursos,  la  economía  circular,  la  conservación  de  la  biodiversidad,  la  movilidad    sostenible y accesible, así como el fortalecimiento de la cultura local y el apoyo a las   economías locales. Todo ello tiene como finalidad última asegurar la permanencia en   el tiempo del destino turístico, dejando un legado a las generaciones futuras (Romero   Dexeus, García Moreno, & Fernández Alcantud, 2025, pp. 32-33).  La experiencia española, liderada por la   Sociedad Mercantil Estatal para la Gestión de   la  Innovación  y  las  Tecnologías  Turísticas  (SEGITTUR)  dependiente  del  Ministerio  de    Industria y Turismo de España, ha consolidado un modelo de referencia apoyado en   las normas UNE 178501 y 178502, que establecen requisitos y un sistema de indicadores   para la gestión y evaluación de los DTI (AENOR, 2018; 2022).Igualmente, en España, a   nivel  regional,  iniciativas  como  el  proyecto  Destinos  Turísticos  Inteligentes  de  la  Co -  munitat  Valenciana  (DTI-CV)  impulsado  por  el  Instituto  Valenciano  de  Tecnologías    Turísticas  (INVAT·tur)  han  ampliado  la  aplicación  de  estos  lineamientos,  integrando    indicadores ambientales vinculados con la gestión del agua, la energía, los residuos,   la  movilidad  sostenible,  los  espacios  naturales  y  la  adaptación  al  cambio  climático    (Ivars-Baidal  et  al.,  2021).  Con  posterioridad,  emerge  la  Red  Iberoamericana  de  Des -  tinos  Turísticos  Inteligentes,  la  cual  constituye  un  espacio  estratégico  para  adaptar    estos  principios  a  la  diversidad  de  contextos  iberoamericanos,  favoreciendo  la  coo -  peración,  el  intercambio  de  buenas  prácticas  y  la  armonización  de  indicadores.  No    obstante, la literatura especializada advierte que, si bien existe un notable desarrollo   teórico-metodológico sobre la sostenibilidad en los DTI, todavía persisten dificultades   en su implementación práctica, sobre todo en destinos de turismo de masas, donde los   impactos ambientales son más perceptibles (Perles-Ribes & Ivars-Baidal, 2018; Shafiee   et  al.,  2019).  Además,  se  señala  que  el  turismo  inteligente  es  un  ecosistema  complejo    que requiere la participación activa de múltiples actores —gobiernos, empresas, resi -  dentes y turistas— y una visión compartida que favorezca la innovación y la sosteni -  bilidad a través de la colaboración público-privada (Koo et al., 2019; Polese et al., 2018).  A partir de lo expuesto, el objetivo de este capítulo es analizar la dimensión ambiental   en el modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes, realizando   un estudio comparativo con otros marcos relevantes como el de SEGITTUR en España,   el de INVAT·tur en la Comunidad Valenciana, la norma IRAM en Argentina y el modelo   brasileño.  La  metodología  adoptada  se  basa  en  un  análisis  documental  y  compara -  tivo  de  los  indicadores  ambientales  presentes  en  cada  uno  de  estos  modelos,  con  el    propósito de identificar convergencias, divergencias y posibles sinergias. Este enfoque   se  alinea  con  los  planteamientos  de  Molina  Azorín  et  al.  (2022),  quienes  subrayan  la   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  245  importancia de avanzar en investigaciones teóricas y prácticas que consoliden el de -  sarrollo de DTI sostenibles y resilientes.  3.6.2.2. Marco teórico  El concepto de sostenibilidad se ha consolidado como un eje central en la planificación   y  gestión  de  los  destinos  turísticos,  orientando  las  acciones  hacia  un  desarrollo  res -  ponsable y perdurable en el tiempo. Según el Modelo Metodológico de la Red Iberoa -  mericana de Destinos Turísticos Inteligentes (RI-DTI, 2025), la sostenibilidad evalúa la   capacidad del destino para armonizar el crecimiento económico con la preservación   ambiental y el bienestar social de la comunidad local, y se erige como la base sobre la   cual se construye un modelo turístico capaz de generar impactos positivos y minimi -  zar los negativos, asegurando la viabilidad del destino a largo plazo.  Dentro de este marco general, la sostenibilidad ambiental se reconoce como una parte   esencial del desarrollo turístico. Viñals y Teruel (2021) señalan que este concepto integra   numerosos principios, tales como la mejora de la calidad de vida, la igualdad intergene -  racional y los aspectos éticos y sociales del bienestar humano. Para alcanzar este logro   se requiere la adopción de prácticas concretas de gestión, como la reutilización y reci -  clado de materias primas, la racionalización del consumo energético y la modificación   de  patrones  de  comportamiento  y  consumo.  Rivera  Mateos  y  Mendoza  Montesdeoca    (2022) añaden que la sostenibilidad ambiental forma parte del desarrollo sostenible en   tanto contempla valores intrínsecos como simbólicos, y se concibe como un proceso de   transformación  que  alinea  la  explotación  de  recursos,  la  inversión,  la  tecnología  y  las    instituciones con las necesidades presentes y futuras. Para su implementación efectiva,   los sistemas democrático, económico, social, de producción, tecnológico, internacional y   administrativo juegan un rol clave, garantizando participación, autonomía, resolución   de conflictos, consideración ambiental, innovación y flexibilidad institucional.  La relevancia de la sostenibilidad ambiental se refleja también en marcos internacionales   de referencia. El Informe Brundtland (1987) y la Estrategia Mundial para la Conservación,   recogida  en  la  Conferencia  de  las  Naciones  Unidas  sobre  Medio  Ambiente  y  Desarrollo    (CNUMAD, Río de Janeiro, 1992), enfatizan la necesidad de integrar criterios ambientales   en todas las decisiones de desarrollo. Además, los turistas contemporáneos demandan al -  tos estándares ambientales, evaluando no solo los recursos naturales y paisajes, sino tam -  bién la calidad de los servicios y productos turísticos. Esta exigencia impulsa la adopción   de modelos de desarrollo que equilibren la preservación de recursos naturales y culturales,   trascendiendo lo puramente ecológico y alineándose con los objetivos de la Agenda 2030. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  246  La Organización Mundial del Turismo (ONU Turismo, 2021) sostiene que la sostenibili -  dad debe ser el eje vertebrador de la gestión turística, no como un producto específi -  co, sino como un enfoque que se aplica a todos los destinos y productos turísticos. La   gestión sostenible del turismo implica considerar simultáneamente todas sus dimen -  siones garantizando un equilibrio que permita la continuidad de la actividad turísti -  ca.  Este  enfoque  requiere  la  participación  informada  de  todos  los  actores  relevantes    y un liderazgo político que facilite la colaboración y el consenso, acompañado de un   seguimiento  constante  para  implementar  medidas  preventivas  o  correctivas  según    sea  necesario.  Un  destino  turístico  sostenible  contribuye  a  un  desarrollo  territorial    equilibrado, fortalece la cohesión social y ofrece experiencias notables a los visitantes,   fomentando su conciencia ambiental y la adopción de prácticas responsables (Minis -  terio de Industria, Comercio y Turismo [MINCOTUR], Gobierno de España, 2023).  El seguimiento y la evaluación de la sostenibilidad ambiental en los destinos turísticos   se apoyan en la utilización de indicadores para tal fin. Desde la Conferencia de Estocol -  mo en 1972, se reconoce que los problemas ambientales tienen causas socioeconómi -  cas, lo que llevó a desarrollar nuevos instrumentos de medición sociales y ambientales.   Estas herramientas ofrecen información de tipo cuantitativa sobre el comportamien -  to ambiental y el desarrollo socioeconómico en un área geográfica específica. Pese a   los avances alcanzados, la aplicación de estas métricas sigue siendo parcial y hetero -  génea y la comparabilidad entre regiones es limitada y conlleva problemas de legiti -  mación. De acuerdo con lo anterior, cobran relevancia los modelos desarrollados por   la Organización para la Cooperación y el Desarrollo Económicos (OCDE) y la Agencia   Europea de Medio Ambiente, que evalúan la actividad económica y social desde una   perspectiva integral (Rivas García y Magadán  Díaz, 2007).  En el marco de los DTI, la interrelación entre turismo y ambiente implica reconocer   no  solo  los  impactos  positivos  sino  también  los  negativos  de  la  actividad  turística.    El  turismo  puede  incentivar  la  conservación  de  paisajes,  la  restauración  de  eco -  sistemas  y  la  valorización  de  los  servicios  ecosistémicos  —como  agua  limpia  y  no    contaminante,  aire  saludable,  biodiversidad  y  atractivos  naturales—  que  son  fun -  damentales  para  la  experiencia  turística.  Sin  embargo,  un  desarrollo  desordenado    puede provocar degradación ambiental, pérdida de biodiversidad, sobreexplotación   de recursos y presión sobre la infraestructura local, afectando la calidad de vida de   las  comunidades  receptoras.  Por  ello,  la  gestión  turística  requiere  estrategias  que    promuevan  un  equilibrio  adecuado  entre  uso  y  conservación,  integrando  criterios    ecológicos, culturales y sociales. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  247  Los marcos normativos internacionales refuerzan la necesidad de integrar la sostenibi -  lidad ambiental en la gestión turística. La Agenda 2030, con énfasis en los ODS 12, 13, 14 y   15, establece objetivos concretos de consumo responsable, acción climática y conserva -  ción de ecosistemas terrestres y marinos. La norma ISO 21401 ofrece directrices específi -  cas para la implementación de sistemas de gestión sostenible en alojamientos turísticos,   promoviendo prácticas que reduzcan impactos negativos y generen beneficios socioeco -  nómicos. De tal modo, instrumentos como el Convenio sobre Diversidad Biológica y las   estrategias derivadas de la CNUMAD (1992) orientan la protección de la biodiversidad, el   uso responsable de los recursos y la participación comunitaria en la toma de decisiones.  La planificación y adaptación de los conceptos de sostenibilidad ambiental a los destinos   turísticos inteligentes (DTI) en Iberoamérica requiere considerar la diversidad de ecosiste -  mas, la riqueza cultural y las capacidades institucionales de cada territorio. Los DTI pue -  den utilizar la sostenibilidad como un eje estratégico que les permita diferenciarse, incor -  porando innovación tecnológica y participación ciudadana, alineando la gestión turística   con los objetivos globales de desarrollo y fomentando una cultura de responsabilidad am -  biental entre todos los actores involucrados. En la misma línea, los indicadores de soste -  nibilidad, integradores y fiables, facilitan la evaluación del desempeño ambiental, social y   económico, orientan la toma de decisiones informadas y permiten implementar medidas   preventivas o correctivas. Su aplicación contribuye a la mejora continua de la gestión tu -  rística,  la  prevención  de  impactos  negativos  y  la  promoción  de  prácticas  responsables,    consolidando  destinos  turísticos  inteligentes  que  integren  la  sostenibilidad  ambiental    como un principio operativo central y guía de planificación, desarrollo y evaluación.  3.6.2.3. Modelo de la Red Iberoamericana DTI  El Modelo Metodológico de Destinos Turísticos Inteligentes (MM RI DTI), propuesto por   la  Red  Iberoamericana  DTI,  constituye  una  herramienta  de  referencia  consultiva  en    términos de impulsar la transformación de los destinos de Iberoamérica en destinos   turísticos inteligentes. Este modelo se basa en cinco pilares fundamentales: gobernan -  za,  sostenibilidad,  tecnología,  innovación  y  accesibilidad.  Por  otro  lado,  se  establece    como un modelo de procesos, lo que implica “[...] la implementación y mejora continua   de prácticas y acciones a lo largo del tiempo, en lugar de enfocarse únicamente en los   resultados finales o impactos inmediatos” (MM RI DTI, 2025, p.4).  El  MM  RI  DTI  está  compuesto  por  16  ámbitos  de  actuación,  80  requisitos  y  152  in -  dicadores.  El  peso  porcentual  de  cada  eje  se  determina  según  la  proporción  de  sus    requisitos  respecto  al  total  de  la  metodología.  En  cuanto  al  pilar  de  Sostenibilidad,   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  248  este constituye el eje con mayor peso porcentual, representando un 38% del total de   los  requisitos.  Este  porcentaje  se  distribuye  en  30  requisitos  específicos  dentro  del    eje. Luego, el ámbito específico de sostenibilidad ambiental, titulado “Conservación   y mejora del medioambiente”, está compuesto por 6 requisitos y representa el 8% del   total de requisitos. A continuación, la Tabla 1 presenta la distribución de sus requisi -  tos y el peso porcentual correspondiente.  Tabla 1  Distribución de requisitos y peso porcentual del eje de Sostenibilidad en el MM RI DTI.  4. Sostenibilidad  C. Conservación y mejora del medioambiente  Requisitos   Indicadores   Peso del   requisito  Adaptación al cambio   climático  1.  Existencia  de  estrategias  de  adaptación  al    cambio climático  2. Medición de la huella de carbono en el destino  18, 2%  Fomento de la eficiencia   energética  1.  Reducción de consumos del alumbrado público  2. Fomento de energías alternativas   18,2%  Gestión de la calidad del aire  1.  Existencia acciones/medidas para minimizar la   emisión de gases invernadero  2.  Existencia  de  acciones/medidas  para  medir  y    garantizar un aire saludable  18,2%  Gestión del ciclo del agua   (Gestión, abastecimiento,   depuración y reutilización de   aguas)  1.  Existencia  de  programas  específicos  de    eficiencia,  concienciación  y  ahorro  de  agua    entre el sector turístico  2. Existencia de un sistema de control de la calidad   de aguas superficiales y marinas  18,2%  Protección del entorno   natural local y de su   biodiversidad  1.  Disposición  de  medidas  de  protección  de  la    biodiversidad y/o del entorno natural   9,1%  Recogida  selectiva  y  trata -  miento de residuos  1.  Campañas de concienciación y buenas prácticas   para  la  minimización  de  residuos  en  el  sector    turístico  2. Disposición de un sistema de recogida selectiva   de residuos urbanos  18,2%  Total   11   100%  Nota: Elaboración propia con base en la Red Iberoamericana DTI (2025). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  249  Aunque este modelo representa una herramienta valiosa para la transformación   de  destinos,  una  mirada  crítica  nos  permite  identificar  algunas  áreas  donde  aún    persisten  cuestiones  a  mejorar.  Entre  las  debilidades  actuales  detectadas,  uno    de  los  puntos  que  se  observa  es  la  aparente  falta  de  un  sistema  de  indicadores    que  permita  medir  el  progreso  a  lo  largo  del  tiempo.  Pese  a  que  el  modelo  eva -  lúa el cumplimiento en diferentes categorías (0%, 100%, sumatoria o gradiente), la   transformación  hacia  un  destino  inteligente  es  un  proceso  prolongado,  complejo    y  continuo.  Ahora  bien,  la  literatura  especializada  señala  las  complejidades  pro -  pias del uso de indicadores de sostenibilidad, incluyendo la dificultad para obtener   datos  pertinentes  y  comparables  respecto  de  los  conceptos  predefinidos  (Miller  y    Torres-Delgado, 2023; UNWTO, 2020). Como indican Font et al. (2021), muchos datos   se  compilan  para  problemáticas  muy  específicas,  lo  que  limita  su  capacidad  de    generalización  para  medir  avances  continuos  y  adaptarse  a  nuevas  situaciones.    A su vez, puede ocurrir que los datos disponibles no sean los más adecuados para   medir los conceptos teóricos planteados, lo que obliga a evaluar si los parámetros   utilizados reflejan efectivamente lo que se pretende medir. (Alfaro Navarro et al.,   2020).  Esta  limitación  en  la  disponibilidad  y  adecuación  de  los  datos  llevan  a  que    los  sistemas  de  indicadores  no  siempre  sean  óptimos  para  la  aplicación  práctica    (White et al., 2006; Miller y Torres-Delgado, 2023), lo que dificulta la evaluación del   impacto sucesivo de las modificaciones implementadas y el reconocimiento de los   esfuerzos en las fases iniciales.  Igualmente, el modelo hace hincapié en la importancia de un diagnóstico inicial y su   reevaluación bienal; sin embargo, la sostenibilidad ambiental requiere de un segui -  miento continuo. La literatura relacionada subraya la necesidad de definir umbrales   de  sostenibilidad  para  los  indicadores  (Roberts  y  Tribe,  2008),  los  cuales  deben  ser    rigurosos y científicamente definidos (Balas y Abson, 2022); no obstante, la heteroge -  neidad de los destinos y la diversidad metodológica dificultan la realización de esta   tarea  (Crabolu  y  Amin,  2020).  Dicho  esto,  un  monitoreo  más  dinámico,  que  permi -  ta  ajustes  proactivos  en  lugar  de  reactivos,  se  vería  facilitado  por  la  participación    activa de los agentes implicados y expertos en la generación de datos y la toma de   decisiones, como sugieren Artal-Tur y Badillo-Amador (2023) en sus trabajos sobre   la evaluación de la sostenibilidad.  Aun cuando se reconoce el peso asignado al eje de sostenibilidad, el modelo no se de -  tiene  a  detallar  la  necesidad  de  planes  de  adaptación  y  resiliencia  frente  al  cambio    climático. En un contexto global amenazado por la crisis climática, la capacidad de un  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  250  destino para anticipar, resistir y recuperarse de sus impactos es crítico para su conti -  nuación y persistencia a largo plazo. El turismo es uno de los sectores más susceptibles   de verse afectado por los efectos del cambio climático, lo que puede inhibir cualquier   tipo de planificación o gestión sostenible de la actividad. Por ello, es altamente aconse -  jable adoptar estrategias de adaptación al cambio climático que involucren al sector   turístico  en  acciones  como  la  reducción  de  gases  de  efecto  invernadero,  el  cálculo  y    compensación  de  la  huella  de  carbono,  el  uso  de  energías  limpias  y  renovables,  y  la    mejora  de  la  eficiencia  energética  y  la  calidad  del  aire  (García  Moreno  &  Fernández    Alcántud, 2022). Si no se establecen estrategias claras en este ámbito, es probable que   muchos  destinos  queden  expuestos  y  vulnerables,  lo  que  amenazaría  sus  atractivos    turísticos y la calidad de vida de sus comunidades.  Estas debilidades abren la puerta a oportunidades para fortalecer el modelo. Una me -  jora fundamental es desarrollar un marco de indicadores que no solo midan el cumpli -  miento de requisitos, sino que también evalúen el impacto y los resultados de las accio -  nes implementadas. Esto permitiría a los destinos, en una primera instancia, evaluar   su  desempeño,  y  posteriormente,  determinar  si  las  acciones  implementadas  están    generando  los  cambios  deseados.  Adicionalmente,  si  bien  el  modelo  ya  contempla  la    gestión de residuos y la eficiencia, hay un enorme potencial para incorporar con fuer -  za los principios de la economía circular. Esto supone ir más allá del simple reciclaje:   diseñar  productos  y  procesos  que  eliminen  los  residuos  desde  su  origen,  aprovechar    al máximo los recursos y regenerar la naturaleza (Ellen MacArthur Foundation, s.f.).   De esta manera podrá lograrse un crecimiento económico que no dependa de seguir   extrayendo recursos finitos, creando así sistemas más resilientes y beneficiosos para   todos. Involucrar a los actores locales en este proceso no solo suma beneficios ambien -  tales, sino que también refuerza la economía y el tejido social de cada destino.  A esto se puede sumar la incorporación de tecnologías inteligentes para el monitoreo   ambiental:  sensores  que  midan  la  calidad  del  aire  y  del  agua  en  tiempo  real,  plata -  formas de big data que anticipen riesgos o sistemas geográficos que permitan visua -  lizar  cambios  en  el  territorio.  Según  Corral  Sastre  (2020)  el  uso  de  tecnologías  de  la    información y el conocimiento nos pueden ayudar a alcanzar modelos turísticos sos -  tenibles y de calidad. Así también, resultaría valioso generar sinergias reales entre el   sector público, el privado y la sociedad civil para alinear recursos, esfuerzos y objeti -  vos. Asimismo, promover formas de participación comunitaria más activas, como es -  pacios colaborativos, talleres abiertos o laboratorios ciudadanos, puede transformar   a los residentes en protagonistas de las soluciones, asegurando que las iniciativas se  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  251  sostengan  en  el  tiempo.  Finalmente,  aunque  el  modelo  hace  referencia  a  la  articula -  ción de actores, se podría enfatizar aún más la participación directa de la comunidad   local  y  otros  actores  clave  en  la  gestión  ambiental.  Involucrar  a  los  residentes  en  la    toma de decisiones, en la implementación de iniciativas ambientales o en programas   de educación y concientización, aumenta la efectividad de las acciones y fomenta un   sentido de pertenencia y responsabilidad compartida.  3.6.2.4.  Análisis  comparado  de  modelos  DTI  según  indicadores  y  dimensión  am -  biental  La  dimensión  ambiental  en  los  Destinos  Turísticos  Inteligentes  (DTI)  constituye  un    eje central en la transición hacia modelos de gestión turística más sostenibles. Los   marcos metodológicos desarrollados en Iberoamérica han referenciado inicialmen -  te  el  encuadre  o  modelo  español  de  SEGITTUR,  aunque  paulatinamente  fueron  in -  corporando  dimensiones  y  criterios  categóricos  específicos  que  dan  cuenta  de  las    especificidades  locales,  territoriales,  institucionales  y  culturales  de  cada  área  o  re -  gión. Se observa la convivencia de diversas metodologías —SEGITTUR, INVAT·TUR,   la Norma IRAM 42101:2022, el Modelo de la Red Iberoamericana de DTI (RI-DTI) y el   Referencial Técnico de Brasil— las cuales presentan una plataforma heterogénea en   términos de peso relativo de la dimensión sostenible, cantidad de requisitos e indica -  dores ambientales, y mecanismos de monitoreo.  En este contexto, entendemos que es dable elaborar un ejercicio exploratorio de aná -  lisis  comparado  que  permita  identificar  convergencias,  divergencias  y  espacios  de    sinergia y complementariedad entre estos modelos. El estudio que se presenta en la   Tabla 2, constituye una aproximación comparativa preliminar de los indicadores y   requisitos  de  sostenibilidad  ambiental  en  distintos  modelos  de  Destinos  Turísticos    Inteligentes  (DTI):  SEGITTUR  (España),  INVATTUR  (Comunidad  Valenciana),  Norma    IRAM  42101  (Argentina),  Modelo  Metodológico  de  la  Red  Iberoamericana  (MM  RI -  -DTI)  y  el  Modelo  Brasileño  (Referencial  Técnico).  No  se  trata  de  un  relevamiento    exhaustivo, sino de un resumen analítico orientado a identificar convergencias y di -  vergencias en los enfoques ambientales de cada modelo. Su valor reside en exponer   cómo cada metodología define pilares, requisitos e indicadores específicos vincula -  dos con la gestión sostenible de recursos, la mitigación de impactos y la mejora de la   calidad ambiental en los destinos turísticos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  252  Tabla 2  Comparación de la dimensión ambiental de sostenibilidad en metodologías DTI iberoamericanas.  Modelo DTI  Eje o Pilar de   Sostenibilidad  Nº de Indicadores Ambientales  Requisitos principales  Observaciones clave  SEGITTUR (España)  Sostenibilidad como   uno de los 5 ejes  19  indicadores  y  24  requisitos    ambientales  del  total  (261  indi -  cadores  y  97  requisitos),  apro -  ximadamente  7,3  %  y  24,7  %,    respectivamente.  Monitorización ambiental: cali -  dad del aire, ruido, contamina -  ción, radiaciones y clima.  Eficiencia energética.  Gestión integral del agua.  Gestión  de  residuos  y  limpieza    urbana.  Movilidad sostenible.  Gestión  de  riesgos,  espacios    verdes y urbanismo  Marco  integral  con  amplia  cobertura    ambiental,  metodología  de  referencia    internacional  indicadores  medibles,    planificación  inteligente,  eficiencia  de    recursos, resiliencia, coordinación mul -  tisectorial y enfoque en calidad de vida   de residentes y visitantes.  INVATTUR   (Comunidad   Valenciana)  Sostenibilidad entre   9 ejes  16  indicadores  y  8  requisitos    ambientales  del  total  (30  indi -  cadores  y  14  requisitos),  apro -  ximadamente  53  %  y  57  %,  res -  pectivamente  Planes  de  desarrollo  turístico    sostenible.  Movilidad urbana sostenible.  Fomento de la economía circu -  lar.  Gestión  integral  del  ciclo  del    agua.  Sistema  de  indicadores  de  sos -  tenibilidad.  Plan  de  adaptación  al  cambio    climático.  Control  de  la  presión  humana    sobre el destino.  Fomento  de  efici ación climática  Incluye  estándares  ambientales  en  ar -  ticulación con política pública federal y   municipal.  Nota: Elaboración propia con base en SEGITTUR (2016), INVAT·TUR (2018), IRAM (2022), Red Iberoamericana DTI (2025), Ministerio de Turismo de Brasil   (2021). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  254  3.6.2.5.  El  aporte  del  GSTC  a  la  sostenibilidad  ambiental  y  su  articulación  con  los    modelos DTI  El Consejo Global de Turismo Sostenible (Global Sustainable Tourism Council [GSTC],   2019)  establece  por  medio  de  los  Criterios  para  Destinos  (versión  2.0),  un  marco  de    referencia  de  reconocimiento  internacional  el  cual  define  los  lineamientos  mínimos    que  cualquier  destino  turístico  debe  cumplir  para  ser  considerado  bajo  estándares    sostenibles.  Los  referidos  criterios  establecen  una  base  común  que  permite  evaluar,    certificar  y  situar  acciones  concretas  en  términos  de  políticas  públicas,  entidades  y    organizaciones de gestión de destinos hacia la sostenibilidad (GSTC, 2019).  En  esta  misma  línea  de  análisis,  la  Sección  D  de  los  Criterios  GSTC  está  específica -  mente orientada a la sostenibilidad ambiental, estructurada en tres dispositivos: i. la   conservación del patrimonio natural, con énfasis en la protección de ecosistemas, la   gestión de visitantes en entornos naturales sensibles y la prevención de especies inva -  soras; ii la gestión de recursos, la cual abarca eficiencia energética, la transición hacia   energías  renovables  y  la  gestión  integral  del  agua  y  la  calidad  hídrica  iii  la  gestión    de  residuos  y  emisiones,  orientada  al  tratamiento  adecuado  de  aguas  residuales,  la    reducción y reciclaje de residuos sólidos, la mitigación de emisiones de gases de efecto   invernadero (GEI), la promoción del transporte sostenible y el control de la contamina -  ción lumínica y acústica (GSTC, 2019). Estos criterios GSTC se relacionan directamente   con los Objetivos de Desarrollo Sostenible (ODS), especialmente con el ODS 6 (agua lim -  pia y saneamiento), ODS 7 (energía asequible y no contaminante), ODS 12 (producción   y consumo responsables), ODS 13 (acción por el clima), ODS 14 (vida submarina) y ODS   15 (vida de ecosistemas terrestres).  3.6.2.6.  Confrontación  con  los  ejes  ambientales  de  los  modelos  DTI  Iberoamerica -  nos  Continuando con el análisis de la dimensión ambiental, entre los criterios GSTC y los   modelos de Destinos Turísticos Inteligentes (DTI) en Iberoamérica se identifican en for -  ma preliminar espacios de analogía, convergencia y especificidad entre estos modelos   técnico - metodológicos, a saber:  SEGITTUR  e  INVAT·TUR  (España  y  Comunidad  Valenciana):  los  sub-ejes  ambientales    de  sostenibilidad  (gestión  de  agua,  energía,  residuos,  movilidad  y  biodiversidad)  se    relacionan  o  corresponden  con  los  criterios  GSTC  D5-D11  vinculados  a  residuos  sóli -  dos,  eficiencia  energética,  gestión  de  los  recursos  hídricos,  mitigación  de  emisiones   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  255  y  transporte  sostenible.  La  aplicación  de  las  normas  UNE  178501  y  178502  robustece    esta coyuntura al ofrecer una arquitectura de indicadores técnicos que proporciona y   facilita las métricas y el monitoreo y control (AENOR, 2018; 2022).  Brasil: el Referencial Técnico DTI implanta e introduce el concepto de resiliencia am -  biental  y  de  adaptación  confrontando  así  a  la  agenda  sobre  cambio  climático,  vin -  culándose  de  manera  directa  con  los  criterios  GSTC  D1  y  D10,  los  cuales  abordan  la    protección de ecosistemas y la mitigación de emisiones de GEI. Este enfoque es conse -  cuente con los ODS 12, 13 y 15, priorizando la adaptación de los destinos a escenarios   climáticos extremos (Ministerio de Turismo de Brasil [MTur], 2021).  Norma IRAM 42101 (Argentina): este documento argentino de normalización en inte -  ligencia  turística  formula  un  marco  flexible  estructurado  básicamente  en  la  gestión    racional  de  los  recursos  y  la  mejora  continua,  conceptos  que  se  vinculan  y  dialogan    con los criterios D5-D7 y D9 sobre energía, agua y residuos respectivamente. La carac -  terística más relevante radica en su capacidad de adaptación a la heterogeneidad de   los destinos en Argentina, aunque es más débil en términos de especificidad de indica -  dores confrontados con los modelos españoles (IRAM, 2022).  Red  Iberoamericana  de  DTI  (MM  RI-DTI):  concede  a  la  dimensión  sostenible  el  38%    de  la  ponderación  total  de  su  modelo,  lo  cual  la  visibiliza  como  un  eje  central  de  su    modelo.  Este  modelo  incorpora  indicadores  de  cambio  climático,  economía  circular,    planificación  territorial  y  conservación  de  ecosistemas,  en  línea  con  la  totalidad  de    las  Sección  D1-D12  del  GSTC  V.2019.  Así,  se  configura  como  el  modelo  más  próximo    al estándar internacional, aunque con una fuerte contextualización latinoamericana   (Red Iberoamericana de DTI, 2025).  3.6.2.7. Resumen, discusiones e implicancias  El  ejercicio  comparado  preliminar  entre  los  criterios  del  GSTC  y  los  modelos  DTI    iberoamericanos muestra una relación complementaria pero no idéntica: el GSTC   actúa  como  marco  de  referencia  universal,  normativo  y  homologable  que  esta -  blece  una  línea  de  base  mínima  para  la  sostenibilidad  ambiental  en  destinos;  en    cambio, los modelos DTI operativizan y matizan esos principios, incorporándolos   a  procesos  concretos  de  gobernanza,  innovación  y  gestión  territorial.  Desde  esta    perspectiva, el GSTC aporta consistencia técnica y criterios de legitimidad interna -  cional, mientras que los DTI traducen esos criterios a instrumentos y prácticas que   responden a las realidades locales. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  256  En  este  cotejo,  el  Modelo  Metodológico  de  la  Red  Iberoamericana  (MM  RI-DTI)  surge    como  la  síntesis  más  completa:  combina  la  solidez  conceptual  del  GSTC  con  la  flexi -  bilidad  y  pertinencia  contextual  que  exige  América  Latina,  permitiendo  adaptar  es -  tándares globales a marcos institucionales, capacidades y prioridades regionales. Sin   embargo, como indican Rucci et al. (2025), la transferencia de modelos europeos impli -  ca algo más que mera estandarización: requiere contextualización y una atención ex -  plícita a la justicia ambiental, de modo que las políticas no reproduzcan desigualdades   ni desarticulen saberes y prácticas locales.  Las implicancias de este hallazgo son claras para la política y la gestión turística: la   armonización entre estándares globales y metodologías regionales fortalece la capa -  cidad de los destinos para enfrentar la agenda climática y avanzar hacia una gober -  nanza turística legitimada y sostenible. Esto implica priorizar marcos de indicadores   que combinen comparabilidad y pertinencia local, promover procesos participativos   que integren actores locales en la co-producción de soluciones, y favorecer mecanis -  mos  de  cooperación  técnica  regional  que  permitan  intercambiar  buenas  prácticas,    recursos y criterios científicos. En suma, la articulación GSTC–DTI debe orientarse no   solo a cumplir normas, sino a producir resultados verificables, equitativos y adecua -  dos a las realidades iberoamericanas.  3.6.2.8. Conclusiones  Dentro  de  la  arquitectura  que  supone  el  modelo  de  Destinos  Turísticos  Inteligen -  tes  (DTI),  la  sostenibilidad  juega  un  rol  principal.  Su  propia  definición  se  considera    ineludible  en  la  gestión  de  destinos  turísticos.  Es,  sin  dudas,  el  eje  vertebrador  que    atraviesa e integra las tres dimensiones: social-económica, cultural y ambiental. Se   trata, asimismo, del ámbito que concentra un mayor número de requisitos e indica -  dores,  confiriéndoles  una  relevancia  prioritaria  en  la  planificación  participativa  y    estratégica de los destinos (Romero Dexeus, García Moreno, & Fernández Alcantud,   2025, p. 32).  La dimensión ambiental emerge del análisis como un pilar indisociable de cualquier   estrategia de Destinos Turísticos Inteligentes (DTI): constituye la columna vertebral   que articula la viabilidad ecológica, la cohesión social y la competitividad económi -  ca  de  los  territorios.  El  cruce  comparativo  entre  modelos  (SEGITTUR,  INVAT·TUR,    IRAM,  el  Marco  brasileño  y  el  MM  RI-DTI)  y  los  criterios  GSTC  muestra  que,  si  bien    existe una base conceptual y técnica compartida —especialmente en torno a agua,   energía, residuos, movilidad y biodiversidad—, la traducción práctica de estos prin - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.6.2.   Ambito Sostenibilidad ambiental  257  cipios  requiere  adaptaciones  contextuales,  marcos  de  indicadores  más  robustos  y    mecanismos de monitoreo realmente continuos y sensibles a la heterogeneidad ter -  ritorial de Iberoamérica.  El  Modelo  Metodológico  de  la  Red  Iberoamericana  (MM  RI-DTI)  se  destaca  por  su    mayor ponderación de la sostenibilidad y por incorporar categorías clave como cam -  bio  climático,  economía  circular  y  ordenamiento  territorial;  sin  embargo,  persisten    debilidades  relevantes:  la  escasa  orientación  hacia  indicadores  de  impacto  y  resul -  tados,  la  limitada  instrumentación  de  umbrales  científicos  de  sostenibilidad  y  la  ne -  cesidad de pasar de diagnósticos bienales a sistemas de seguimiento dinámico. Estas   limitaciones condicionan la capacidad de los destinos para anticipar riesgos, validar   avances y reconocer esfuerzos en fases tempranas de transformación.  A  partir  de  los  hallazgos,  resulta  prioritario  impulsar  tres  líneas  de  acción  comple -  mentarias.  Primero,  desarrollar  un  marco  de  indicadores  integrado  y  escalable  que    priorice mediciones de impacto (no solo de cumplimiento), incluya umbrales operati -  vos y facilite la comparabilidad entre destinos sin perder pertinencia local. Segundo,   fortalecer la gobernanza multisectorial y la participación comunitaria, vinculando a   residentes,  empresas  y  academia  en  procesos  de  coproducción  de  datos,  educación    ambiental  y  economía  circular.  Finalmente,  aprovechar  las  tecnologías  inteligentes    (sensores  ambientales,  plataformas  de  datos  y  SIG)  como  herramientas  para  el  mo -  nitoreo  en  tiempo  real  y  la  toma  de  decisiones  proactiva,  siempre  acompañadas  de    protocolos técnicos y criterios científicos claros.  Finalmente,  la  cooperación  iberoamericana  —vinculando  experiencias,  estándares    y  recursos—  se  perfila  como  la  vía  adecuada  y  legitimada  para  homologar  buenas    prácticas y potenciar la resiliencia de los destinos frente a las crisis y vulnerabilidad   planetaria. La sostenibilidad ambiental en los DTI exige, en suma, combinar rigor téc -  nico, flexibilidad contextual y participación social para transformar los marcos meto -  dológicos en resultados verificables que garanticen la perdurabilidad de los destinos y   el bienestar de sus comunidades.  Referencias bibliográficas  AENOR. (2018).  UNE 178501:2018. Destinos turísticos inteligentes. Requisitos del siste -  ma de gestión . Asociación Española de Normalización.  AENOR.  (2022).   UNE  178502:2022.  Indicadores  y  herramientas  de  evaluación  de  los    destinos turísticos inteligentes . Asociación Española de Normalización. \nExperiencia
