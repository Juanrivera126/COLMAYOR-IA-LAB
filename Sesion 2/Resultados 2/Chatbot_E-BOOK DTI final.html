endizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 70  ProColombia.  (2024).   Turismo  internacional  mantiene  su  dinamismo  y  beneficia    la  economía  del  país.   Obtenido  de   procolombia.co:   https://procolombia.co/sa -  la-de-prensa/noticias/turismo-internacional-mantiene-su-dinamismo-y-benefi -  cia-la-economia-del-pais  Programa de las Naciones Unidas para el Desarrollo. (2020).  Colombia Sobre El País .   Obtenido de  undp.org:   https://www.undp.org/es/colombia/sobre-colombia \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 71  2.4. México: Del liderazgo turístico regional a la implementación   efectiva del modelo DTI  Federico de Arteaga de Arteaga  Universidad Anáhuac, México.   José Ángel Díaz Rebolledo  Universidad Anáhuac, México.  2.4.1. Introducción: objetivos y métodos   En 2025, el turismo se encuentra en un punto de inflexión, consolidando su recupera -  ción tras años de transformación marcados por crisis sanitarias, cambios tecnológi -  cos  y  nuevas  demandas  sociales.  Este  nuevo  escenario  exige  una  visión  estratégica    y  responsable  del  desarrollo  turístico,  en  la  que  el  concepto  de  turismo  sostenible  se    ha  posicionado  como  pilar  fundamental.  Como  ha  expresado  ONU  Turismo  en  2018,    “El futuro del turismo será sostenible o no será”. El turismo seguirá siendo un pilar fun -  damental, presente y futuro, como motor de desarrollo económico, social y ambiental   a nivel mundial sólo si es sostenible.   La gestión eficiente de los recursos naturales, la inclusión social, la autenticidad cul -  tural y la resiliencia climática ya no son opcionales, sino condiciones imprescindibles   para garantizar la competitividad a largo plazo del sector. En este contexto, las certifi -  caciones y la adopción de normas   internacionales se han convertido en herramientas   clave  para  asegurar  la  calidad,  la  transparencia  y  la  mejora  continua  en  la  gestión    de  los  destinos.  Al  mismo  tiempo,  la  conformación  de  alianzas  estratégicas   y   redes   colaborativas entre actores públicos, privados y comunitarios es vital para afrontar   desafíos globales como la digitalización, el cambio climático o la gestión de flujos tu -  rísticos.  En  este  entramado  de  interdependencias,  la  conectografía,  es  decir,  la  red    de  conexiones  físicas  y  digitales  que  dan  forma  a  nuestras  interacciones,  redefine  el    mapa del turismo mundial, potenciando nuevos hubs, corredores turísticos inteligen -  tes y sinergias regionales.  Frente a estas dinámicas, la adopción de la metodología de Destinos Turísticos Inteli -  gentes (DTI) se perfila como una respuesta integral para transformar los destinos en   espacios más sostenibles, accesibles, innovadores y conectados. La perspectiva hacia   2030 demanda una evolución desde el modelo tradicional de turismo hacia ecosiste - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 72  mas inteligentes, basados en datos, gobernanza participativa y tecnologías aplicadas   al bienestar del visitante, de los residentes y del entorno.  En este marco, la Red Iberoamericana de DTI   y la   Red Española de DTI han jugado un   papel crucial al impulsar procesos de transferencia de conocimiento, buenas prácti -  cas y lecciones aprendidas, que han beneficiado a México y a LATAM. Gracias a estas   redes, se ha fortalecido la capacidad técnica de los destinos, promoviendo modelos de   gobernanza más efectivos e inclusivos. México, a su vez, ha asumido un rol de lideraz -  go regional a través de experiencias ejemplares como la certificación de Tequila como   DTI,  que  se  ha  convertido  en  un  referente  para  otros  destinos  de  LATAM.  Esta  expe -  riencia  ha  contribuido  a  dinamizar  la  agenda  de  inteligencia  turística  en  la  región,    mostrando el potencial de los DTI como motores de desarrollo sostenible e innovación   territorial. Por ello, entender y aplicar el enfoque DTI no solo es una ventaja competiti -  va, sino una necesidad para garantizar la viabilidad y el liderazgo turístico.  Objetivo general y específicos   El objetivo general de este trabajo es analizar la incorporación del modelo de Destino   Turístico  Inteligente  en  México,  identificando  su  evolución,  metodologías  aplicadas,    políticas públicas involucradas y los principales desafíos y logros alcanzados.   Los objetivos específicos incluyen:  1.  Examinar la cronología de introducción y desarrollo del modelo DTI en el país.  2.  Identificar el modelo metodológico de DTI implementado, sus ejes, indicadores y   resultados.  3.  Generar reflexiones críticas sobre el impacto y proyección del DTI en el contexto   mexicano.  Materiales y métodos  Este artículo se elaboró mediante una metodología cualitativa de tipo descriptivo-a -  nalítico, utilizando el análisis documental como técnica principal. Se revisaron fuentes   primarias y secundarias, como documentos oficiales de la Secretaría de Turismo (SEC -  TUR),  informes  internacionales  de  la  OMT  y  SEGITTUR,  artículos  académicos,  publi -  caciones digitales y bases de datos estadísticas (INEGI, Datatur, BID). Los documentos   fueron seleccionados por su relevancia, actualidad y pertinencia respecto a los objeti -  vos del estudio. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 73  2.4.2. Caracterización del país   México, es una de las economías emergentes más destacadas a nivel mundial y figura   como  uno  de  los  principales  destinos  turísticos  del  planeta.  Con  una  población  esti -  mada en 132 millones de habitantes para el año 2025 y una densidad poblacional de   aproximadamente 68 personas por kilómetro cuadrado, el país ha experimentado un   crecimiento urbano sostenido. Actualmente, alrededor del 88 % de sus habitantes re -  side  en  zonas  urbanas,  principalmente  en  áreas  metropolitanas  como  la  Ciudad  de    México, Guadalajara y Monterrey (Worldometer, 2025; World Population Review, 2025).  En términos macroeconómicos, México proyecta un Producto Interno Bruto (PIB) nomi -  nal de aproximadamente 1.69 billones de dólares para el año 2025, con un PIB per cápita   cercano a los 12 690 dólares (Trading Economics, 2025). Dentro de esta estructura eco -  nómica, el turismo representa uno de los sectores más dinámicos y estratégicos. Según   datos  de  la  Secretaría  de  Turismo  (SECTUR),  en  2023  el  PIB  turístico  alcanzó  los  2.582    billones de pesos, lo que representa el 8.6 % del PIB nacional (SECTUR, 2024). Este sector   genera cerca de cinco millones de empleos directos, y un 57 % de ellos son ocupados por   mujeres, lo cual evidencia su impacto en la inclusión y el desarrollo social (CNET, 2025).  En términos de conectividad, el 91 % del turismo internacional entra por cinco aero -  puertos clave: Ciudad de México (19 %), Los Cabos (11 %), Cancún (7 %), Puerto Vallarta   (8  %)  y  Guadalajara  (6  %)  (CNET,  2025).  Los  destinos  más  visitados  del  país  incluyen    la  Ciudad  de  México  —que  en  2023  recibió  más  de  56.4  millones  de  visitantes,  de  los    cuales  14.4  millones  fueron  turistas  internacionales—,  así  como  Cancún,  Riviera    Maya, Puerto Vallarta, Guadalajara y Los Cabos (Tourism Analytics, 2024). Estos desti -  nos concentran entre el 7 % y el 11 % del turismo nacional, consolidándose como polos   turísticos de alto impacto económico y cultural (El País, 2025a).  Asimismo, el turismo de cruceros ha mostrado un notable crecimiento. Entre enero y   octubre de 2024, más de 36 millones de turistas llegaron a México vía crucero, gene -  rando ingresos por encima de los 666 millones de dólares. Para 2025, se proyecta que   más de 10 millones de pasajeros arriben por esta vía, beneficiando particularmente a   puertos como Cozumel, Progreso y Ensenada (El País, 2025b).  Además del impacto directo en la economía, el turismo en México impulsa una cade -  na de proveeduría que genera cerca de 67 millones de dólares, siendo las pequeñas y   medianas  empresas  (Pymes)  responsables  del  93  %  del  total  de  empresas  del  sector    (CNET, 2025). Esta estructura contribuye al desarrollo regional, la sostenibilidad eco -  nómica y el fortalecimiento de la identidad cultural del país. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 74  México, como uno de los países más visitados del mundo, ha asumido el reto de adap -  tarse  a  estas  nuevas  demandas.  A  través  de  una  estrategia  que  combina  identidad    cultural, innovación tecnológica y desarrollo social, el país ha integrado múltiples ini -  ciativas que reflejan este cambio de paradigma. Un ejemplo destacado es el programa   de  Pueblos  Mágicos,  una  política  pública  que  ha  promovido  el  rescate  y  promoción    de  pequeñas  localidades  con  atributos  históricos,  naturales  y  culturales  únicos.  Es -  tos destinos han sido clave para descentralizar el turismo, redistribuir los beneficios   económicos y fomentar el turismo de experiencias auténticas. Lugares como Real de   Catorce (San Luis Potosí) ,  Tepoztlán (Morelos)   o   Valle de Bravo (Edomex) ofrecen acti -  vidades que conectan al visitante con la comunidad, la gastronomía tradicional y las   tradiciones.  Durante el año 2023, México recibió un total de 75 millones de visitantes internaciona -  les. De ellos, 42.2 millones fueron turistas permanentes y 32.8 millones excursionistas,   reflejando un crecimiento interanual del 13.7 %. El ingreso de divisas por turismo in -  ternacional ascendió a 30 810 millones de dólares, con un gasto promedio por turista   aéreo de aproximadamente 1 126 dólares (INEGI & Banco de México, 2024). En paralelo,   el gasto promedio general del turista se ubicó en torno a los 730 dólares (CNET, 2025).   Además, en enero de 2025 se registró un incremento del 8.5 % en la llegada de turistas   internacionales respecto al mismo mes del año anterior, alcanzando los 3.94 millones   de visitantes (INEGI & Banco de México, 2024).  Por  otra  parte,  México  ha  comenzado  a  implementar  el  modelo  de  Destino  Turístico    Inteligente  (DTI),  una  iniciativa  que  impulsa  la  transformación  digital  del  sector  tu -  rístico con enfoque en la sostenibilidad, accesibilidad, innovación y gobernanza. Bajo   este esquema, destinos como Tequila (Jalisco)   y   Cozumel (Quintana Roo) empezaron a   integrar  en  2015  tecnologías  digitales  para  gestionar  flujos  turísticos,  mejorar  la  ex -  periencia  del  visitante,  facilitar  la  inclusión  y  proteger  el  entorno  natural  y  cultural.    Desde 2021 Tequila ha incorporado el modelo DTI en forma integrada y otros destinos   como  Cancún  están  en  proceso  de  distinción,  mientras  otros  destinos  como  CDMX,    Querétaro y Puerto Vallarta han demostrado interés en iniciar el proceso.  Gracias a la sinergia entre programas como Pueblos Mágicos, la pronta adopción del   modelo DTI y la respuesta del sector a las tendencias globales, México ha logrado man -  tenerse competitivo en el mercado turístico internacional. Al mismo tiempo, ha impul -  sado modelos de desarrollo turístico más justos, resilientes y alineados con los valores   contemporáneos de respeto por el patrimonio, inclusión social y cuidado del ambiente. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 75  2.4.3. Estructura gubernamental del turismo en México  La  gobernanza  del  turismo  en  México  está  liderada  por  una  estructura  institucio -  nal compleja y multiescalar que vincula al gobierno federal con los niveles estatal y   municipal. En el centro de esta red se encuentra la Secretaría de Turismo (SECTUR),   dependencia del Ejecutivo Federal encargada de formular, ejecutar y evaluar la po -  lítica  turística  nacional.  Su  mandato  se  basa  en  la  Ley  General  de  Turismo,  el  Plan    Nacional de Desarrollo y el Programa Sectorial de Turismo, y tiene como eje trans -  versal el desarrollo sostenible, la innovación y la competitividad del sector (Gobierno   de México, 2024).  Estructura funcional de SECTUR  SECTUR está encabezada por una persona Titular, quien se apoya en una estructura   integrada  por  la  Subsecretaría  de  Turismo  y  tres  Unidades  Administrativas  estraté -  gicas:  la  Unidad  de  Innovación  y  Política  Turística,  la  Unidad  de  Información  y  Se -  guimiento,  y  la  Unidad  de  Administración  y  Finanzas.  A  esta  estructura  se  suma  la    Dirección  General  de  Asuntos  Jurídicos.  Cada  una  cuenta  con  direcciones  generales    específicas que coordinan acciones sectoriales, estratégicas y operativas en distintos   ámbitos del desarrollo turístico.  La  Subsecretaría  de  Turismo  agrupa  direcciones  generales  que  atienden  temas  de    promoción nacional e internacional, atracción de inversiones, certificación, desarrollo   regional, normatividad y verificación, sustentabilidad, profesionalización y los servi -  cios brindados por Ángeles Verdes. Estas instancias son las responsables de coordinar   programas de alto impacto como Pueblos Mágicos y estrategias de desarrollo turístico   territorial.  La  Unidad  de  Innovación  y  Política  Turística  diseña  políticas  públicas  innovadoras,    promueve  el  desarrollo  de  productos  turísticos  diferenciados,  fomenta  la  coordina -  ción  intersectorial  e  impulsa  el  turismo  social  y  accesible.  De  esta  unidad  dependen    las direcciones generales encargadas de la innovación del producto, gestión social de   destinos y política turística.  La  Unidad  de  Información  y  Seguimiento  lidera  la  planeación  sectorial,  el  segui -  miento  y  evaluación  de  programas,  el  manejo  del  Registro  Nacional  de  Turismo  y    la  operación  del  Sistema  Nacional  de  Información  Estadística  del  Sector  Turismo.    También coordina el Atlas Turístico de México y promueve estudios de prospectiva y   evaluación de impacto. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 76  La Unidad de Administración y Finanzas se encarga de la planeación presupuestaria,   gestión de recursos humanos, materiales y tecnológicos, así como de los sistemas in -  ternos de operación administrativa y de las políticas de equidad de género dentro de   la dependencia. Coordina además la operación del Servicio Profesional de Carrera y   procesos internos de protección civil.  La Dirección General de Asuntos Jurídicos asesora a todas las unidades administrativas   y revisa la legalidad de los actos, convenios y políticas implementadas por la Secretaría.  Cabe señalar que referencias a estructuras anteriores —como las Subsecretarías de   Planeación,  Innovación  y  Operación  Turística—  corresponden  a  una  organización    previa  al  reglamento  vigente  de  2021,  por  lo  que  deben  considerarse  como  contexto    histórico o estructural previo en el análisis.  En cuanto a la relación con los actores territoriales, SECTUR mantiene una estrecha   coordinación con las secretarías estatales de turismo, gobiernos municipales y acto -  res privados. Este entramado permite la implementación de estrategias alineadas al   ámbito local, adaptando los lineamientos federales a las realidades regionales.  Asimismo, SECTUR colabora con organismos como INAH, SEMARNAT, PROFECO, SE -  GITTUR y la OMT en temas de sostenibilidad, derechos del turista e innovación turísti -  ca. También mantiene vínculos con el sector privado a través de asociaciones como el   CNET, AMDETUR, AMAV, AMHM, FEMATUR y MICE México.  Estas  estructuras  y  alianzas  permiten  a  la  Secretaría  de  Turismo  articular  políticas    públicas con visión territorial, principios de sostenibilidad, innovación digital y gober -  nanza participativa. No obstante, persisten desafíos relacionados con la coordinación   intergubernamental, el financiamiento operativo y el seguimiento efectivo de indica -  dores de desempeño.  En materia de inteligencia turística, SECTUR la impulsa mediante capacitación, con -  venios  de  cooperación  técnica  (especialmente  con  SEGITTUR)  y  financiamiento  de    diagnósticos.  Si  bien  no  se  dispone  de  un  presupuesto  específico  publicado,  la  inte -  gración  en  redes  internacionales  y  la  adopción  de  diagnósticos  territoriales  reflejan    un  compromiso  sostenido  (SECTUR,  2025).  A  la  fecha,  tanto  SECTUR  como  la  CDMX    son  integrantes  de  la  Red  Iberoamericana  de  Destinos  Turísticos  Inteligentes  como    miembros  institucionales  y  observadores,  lo  cual  muestra  el  compromiso  de  México    hacia los DTI. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 77  2.4.4.  Adopción y evolución del modelo de Destino Turístico Inteligente en México  La introducción del modelo de Destino Turístico Inteligente (DTI) en México constituye   un proceso gradual y estratégico, impulsado desde principios de la última década por   la  Secretaría  de  Turismo  (SECTUR),  en  alianza  con  entradas  internacionales  y  una    fuerte lógica de política pública.  En enero de 2015, en el marco de la Feria Internacional de Turismo (FITUR), SECTUR y   la Sociedad Estatal para la Gestión de la Innovación y las Tecnologías Turísticas (SEGI -  TTUR) firmaron un convenio para trasladar el modelo español de DTI a México. El ob -  jetivo principal fue adaptar y tropicalizar el enfoque europeo, tomando en cuenta las   características territoriales, institucionales y sociales del país (SECTUR, 2015; SECTUR   & SEGITTUR, 2015). Esta colaboración marcó el inicio de la transferencia de la Metodo -  logía de Destino Turístico Inteligente en México, diseñada para mejorar la competiti -  vidad y resiliencia de los destinos, mediante mejores infraestructuras de conectividad,   participación local y enfoque en calidad de vida de los residentes (SECTUR, 2015) .  A continuación, se presenta la cronología del proceso de implementación:  •  2013–2017 : SECTUR, en colaboración con SEGITTUR, realizó un diagnóstico de   capacidad y necesidades de los destinos nacionales para recibir el modelo DTI,   partiendo de la metodología oficial que destaca cinco ejes estratégicos (tecnolo -  gía, innovación, gobernanza, accesibilidad y sostenibilidad)   •  2015 : Firma del convenio en FITUR, con la meta de pilotear la transición de des -  tinos maduros hacia la categoría de inteligentes, en un esquema multisistémico   que incluía actores públicos, privados y académicos (SECTUR & SEGITTUR, 2015;   Expansión, 2015) .  •  2019–2020 :  Desarrollo  de  una  estructura  institucional  interna  que  facilitó  la    ejecución de los diagnósticos y adaptación de herramientas tecnológicas, desti -  nada a fortalecer la formulación de políticas y lineamientos del Modelo Mexica -  no DTI (SEGITTUR, 2019–2020).  •  2021 : Tequila (Jalisco) se certificó como el primer Destino Turístico Inteligente   en América Latina, destacando aspectos como conectividad, sostenibilidad, ac -  cesibilidad e implementación de una plataforma digital para monitoreo y ges -  tión participativa del destino.  •  2022–2024 :  Expansión  de  la  Red  Iberoamericana  de  DTI,  con  México  como    miembro activo desde su lanzamiento en Medellín en 2022, participando en jor - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 78  nadas técnicas y formación (FITUR, 2025). SECTUR conformó una Unidad de In -  novación y Política de Destinos Inteligentes, fortaleciendo capacidades técnicas   y administrativas.  •  2025 :  Se  consolida  una  segunda  etapa  de  expansión,  con  convocatorias  esta -  tales  para  nuevos  proyectos  piloto,  financiamiento,  alianzas  conjuntas  (por    ejemplo, con BBVA en FITUR 2025) y certificaciones subnacionales. Aunque no   existe una ley nacional específica que regule los DTI, SECTUR ha emitido linea -  mientos sectoriales y convenios que instituyen el modelo como política pública,   respaldado por un enfoque de innovación turística. Bajo este marco normativo,   se  han  generado  diagnósticos,  asistencia  técnica  y  certificaciones  en  destinos    como Tequila y Cozumel (Expansión, 2015).  Los  casos  piloto  en  Cozumel  y  Tequila  ilustran  cabalmente  la  aplicación  práctica    del  modelo.  Cozumel  inició  un  diagnóstico  estructural  en  2015,  con  participación  de    stakeholders  públicos y privados, aunque aún no ha avanzado en su proceso. Tequila,   por su parte, se constituyó en el primer DTI certificado en México en 2021 (SEGITTUR,   2022; Vidales  Astello, 2022).  En síntesis, el modelo de Destino Turístico Inteligente llegó a México por medio de una   estrategia  pública  internacionalizada,  apoyada  por  convenios,  diagnósticos,  certi -  ficaciones  piloto  y  capacitación  técnica.  Esta  ruta  institucional  puso  en  marcha  un    modelo  normativo  y  operativo  que,  aunque  aún  sin  una  ley  específica,  opera  como    política nacional con respaldo interinstitucional, basado en alianzas, datos, tecnología   y gobernanza local.  2.4.5.  Políticas públicas y marcos legales orientados a la inteligencia turística en   México  La  adopción  del  modelo  de  Destinos  Turísticos  Inteligentes  (DTI)  en  México  ha  sido    acompañada  por  la  creación  de  un  entorno  jurídico-administrativo  sólido,  impul -  sado principalmente por la Secretaría de Turismo (SECTUR). Aunque no existe una   ley  específica  para  los  DTI,  sí  se  cuenta  con  instrumentos  legales  que  fortalecen  su    implementación  a  través  de  la  integración  de  la  inteligencia  turística  en  el  marco    sectorial nacional.  La Ley General de Turismo establece en su artículo 1 la competencia concurrente entre   el gobierno federal —a través de SECTUR—, las entidades federativas y los municipios   para planear, promover, regular y evaluarse en turismo (Cámara de Diputados, 2023).  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 79  Su  Reglamento,  presentado  en  2015,  institucionalizó  el  Programa  de  Ordenamiento    Turístico, el cual dota a la autoridad de una herramienta para organizar territorial -  mente a los destinos, incorporando criterios de sostenibilidad, calidad y gobernanza,   elementos fundamentales para el enfoque DTI (Cámara de Diputados, 2015; SECTUR -  -CONACYT, 2018).  A su vez, SECTUR ha fortalecido el marco normativo sectorial, mediante la publicación   de manuales, lineamientos y actualizaciones legales que promueven la modernización   institucional, la gobernabilidad del turismo y la innovación tecnológica en los destinos   (SECTUR, 2023) . Entre estos instrumentos destacan:  •  El Atlas Turístico de México, regulado por el Reglamento de la Ley General (art.   25), el cual crea una base de datos georreferenciada para la toma de decisiones   en los destinos.  •  La existencia de más de 263 instrumentos normativos, incluyendo NOMs, regla -  mentos y guías técnicas que apoyan la aplicación de políticas turísticas en los   distintos niveles de gobierno (SECTUR, 2023).   •   La  inteligencia  turística  se  consolida  como  un  eje  transversal  dentro  del  Pro -  grama  Sectorial  de  Turismo  2020–2024,  el  cual  plantea  “modernizar  el  marco    normativo del sector para fortalecer la conducción de la política turística” —in -  cluida la digitación de datos y la gestión por información (SECTUR, 2023).  •  Complementariamente, la incorporación de México a la Red Iberoamericana de   DTI, junto con la firma de convenios con SEGITTUR desde 2015, ha permitido la   transferencia de metodologías, capacidades técnicas y lineamientos específicos   para  la  certificación,  diagnóstico  y  operación  de  los  destinos  inteligentes  (Go -  bierno de México, 2015; SECTUR, 2024).  •  El diseño de la Unidad de Innovación y Política de Destinos Inteligentes, creado   por decreto de SECTUR en 2024, representa un avance institucional concreto, al   centralizar las funciones vinculadas a los diagnósticos DTI, la homologación de   indicadores, el seguimiento técnico y la cooperación internacional. Esta unidad   opera en coordinación con la Subsecretaría de Planeación —encargada de Es -  tadísticas e Inteligencia Turística— y la Subsecretaría de Innovación, facilitan -  do esquemas multisectoriales y participativos.  A  nivel  estatal  y  municipal,  diversas  entidades  han  complementado  estos  esfuerzos    con  leyes  locales  que  integran  componentes  de  inteligencia  turística.  Un  ejemplo  es   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 80  la Ley de Turismo Sostenible y Desarrollo Artesanal del Estado de México (2021, refor -  mada 2024), que obliga a la creación de observatorios turísticos y sistemas de registro   digital, propiciando la inclusividad del análisis de datos en la gestión local del destino   En resumen, aunque en México no existe legislación específica para DTI, sí se cuenta   con un marco legal articulado que propicia su desarrollo. La Ley General de Turismo   y  su  Reglamento,  los  programas  sectoriales  actualizados,  la  institucionalización  de    unidades competentes y los convenios internacionales constituyen una base jurídica y   operativa para consolidar la inteligencia turística como componente permanente en   las políticas nacionales, estatales y locales.  2.4.6. Modelo de metodología DTI aplicada en México  En  México  convergen  dos  enfoques  principales  en  la  implementación  del  modelo  de    Destino Turístico Inteligente (DTI): el modelo original desarrollado por SEGITTUR (Es -  paña) y la metodología denominada modelo de la Red Iberoamericana de Destinos Tu -  rísticos Inteligentes. Aunque ambos comparten principios fundamentales, SECTUR ha   decidido adoptar oficialmente el modelo iberoamericano, considerado más adecuado   para el contexto latinoamericano.  1.  El modelo de SEGITTUR (España)    El modelo pionero, impulsado por SEGITTUR, se basa en cinco ejes vertebrado -  res:  gobernanza,  innovación,  tecnología,  sostenibilidad  y  accesibilidad,  sopor -  tados  por  criterios  de  evaluación  rigurosos  (SEGITTUR,  2015;  SEGITTUR,  s.  f.).    Este  enfoque  comprende  dos  ciclos:  adhesión,  diagnóstico  (97  requisitos  y  261    indicadores)  y  planificación;  y  monitorización,  implementación  y  renovación    cada dos años.  2.  El modelo de la Red Iberoamericana de DTI    Este modelo conserva los cinco ejes de SEGITTUR, pero simplifica el proceso—  reduciendo  requisitos  e  indicadores—y  otorga  mayor  flexibilidad  para  adap -  tarse  a  realidades  latinoamericanas.  La  metodología  contempla  77  requisitos    combinados en 152 indicadores definidos por la Red, con un enfoque más prag -  mático de autodiagnóstico y plan de acción (Neuronamagazine, 2024; Red Ibe -  roamericana, s. f.).  SECTUR ha decidido priorizar el modelo iberoamericano por su “tropicalización” del   enfoque europeo, lo que facilita la adopción en destinos mexicanos y permite iniciar el   proceso con menos barreras estructurales (Tequila Inteligente, 2024). Ambos modelos  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 81  enfatizan  una  gestión  integrada  y  participativa,  el  uso  de  tecnologías  de  datos  (big    data, plataformas como OptimizaData) y la evaluación constante mediante indicado -  res adaptados a cada contexto (SEGITTUR, 2022; SECTUR, 2024).  a) Casos de aplicación en México los DTI 2015 a 2025: Criterios para seleccionar des -  tinos piloto Cozumel y Tequila  La Dirección General de Gestión de Destinos, encabezada en 2015 por José Ángel Díaz   Rebolledo, lideró el proceso técnico de implementación, con respaldo del Subsecretario   de Innovación y Desarrollo Turístico, Carlos Joaquín González. Ambos coincidieron en   que los destinos mexicanos debían prepararse para competir a escala global no solo   por belleza o historia, sino también por inteligencia y capacidad de gestión integrada.  Como parte de la estrategia, se seleccionaron dos destinos piloto: Cozumel (Quintana   Roo) y Tequila (Jalisco). La elección de Cozumel respondió a su carácter insular, conso -  lidación turística, y facilidad logística para implementar el diagnóstico. En el caso de   Tequila, la propuesta vino de identificar un Pueblo Mágico con visión de largo plazo, li -  derazgo comunitario y capacidad operativa, encabezado por el Consejo de Desarrollo   Integral de Tequila (CODIT).  Cozumel  fue  seleccionado  como  el  primer  destino  piloto  para  la  implementación  del    Modelo Mexicano de Destino Turístico Inteligente (DTI), en parte por sus condiciones   geográficas que permitían delimitar con claridad los alcances del diagnóstico. Se tra -  taba  de  un  destino  maduro,  consolidado  en  el  turismo  de  sol  y  playa,  con  una  alta    recepción de cruceros y una estructura operativa ya existente. Además, su carácter in -  sular ofrecía una ventaja metodológica para controlar variables y facilitar el análisis.  Entre el 6 y el 10 de abril de 2015 se llevó a cabo la visita técnica de SEGITTUR a la isla,   en  coordinación  con  la  Dirección  General  de  Gestión  de  Destinos  de  SECTUR,  enca -  bezada por José Ángel Díaz Rebolledo. En esa fase se realizaron entrevistas, talleres,   recorridos  y  sesiones  de  trabajo  con  representantes  de  los  tres  niveles  de  gobierno,    empresarios turísticos, asociaciones civiles, universidades y actores comunitarios.  El objetivo de esta etapa era aplicar el diagnóstico integral basado en los cinco ejes del   modelo SEGITTUR: gobernanza, sostenibilidad, tecnología, innovación y accesibilidad.   Se recopilaron más de 400 indicadores cualitativos y cuantitativos para medir el esta -  do de avance de Cozumel como destino turístico inteligente.  Posteriormente, el 14 de diciembre de 2015, se realizó la entrega oficial del Informe de   Diagnóstico y del Plan de Acción a las autoridades municipales y estatales (SECTUR,  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 82  2025). Este documento presentó las áreas de oportunidad identificadas, así como las lí -  neas de intervención para avanzar hacia la consolidación de Cozumel como el primer   DTI de México y la primera ‘Smart Island’ fuera de Europa.  Entre los principales hallazgos del diagnóstico destacaron la necesidad de fortalecer la   infraestructura tecnológica del destino, mejorar la conectividad digital, implementar   una plataforma integrada de servicios turísticos, y establecer mecanismos de gober -  nanza  colaborativa  que  articularan  al  sector  público  y  privado  en  torno  a  objetivos    comunes.  Asimismo,  se  identificaron  oportunidades  para  avanzar  en  sostenibilidad    ambiental mediante prácticas de eficiencia energética, manejo de residuos, movilidad   urbana y preservación de los ecosistemas costeros. La inclusión social y la accesibili -  dad  universal  también  fueron  reconocidas  como  áreas  prioritarias  para  lograr  una    experiencia turística más equitativa y competitiva.  El proceso en Cozumel evidenció que la aplicación del modelo DTI no es meramente tec -  nológica, sino estructural. Implica una nueva forma de pensar, planificar y gestionar   el destino, donde el dato, la evidencia y la participación multiactor son esenciales. La   experiencia sirvió como prueba de concepto para replicar el enfoque en otros destinos   de México con vocación turística. Cozumel inició en 2015 diagnósticos bajo el modelo   SEGITTUR,  pero  su  proceso  se  vio  retrasado  a  la  espera  de  recursos  y  coordinación    interinstitucional (Risisbi, 2021).  b) Resultados   Tequila (Jalisco) fue el primer destino certificado como DTI en América Latina median -  te  diagnóstico  bajo  el  modelo  iberoamericano.  El  proceso  incluyó  un  autodiagnósti -  co, plan de acción y adopción de una plataforma de gestión (Tequila Inteligente, 2021;   Red Iberoamericana, 2024). Tequila alcanzó un alto nivel de cumplimiento (>80 %) y la   distinción  DTI,  implementando  plataforma  digital  para  monitoreo  turístico  (Tequila    Inteligente, 2021).  A  lo  largo  del  proceso,  Tequila  ha  evidenciado  una  evolución  continua  y  consistente    en cada uno de los ejes metodológicos de SEGITTUR. En gobernanza, el cumplimiento   pasó del 62.8% en 2016 al 83% en 2021, consolidando estructuras de participación como   el  CODIT.  En  accesibilidad,  el  progreso  ha  sido  aún  más  notorio,  desde  27.1%  en  2016    hasta el 84.7% en 2021, gracias a mejoras en infraestructura, diseño universal y solu -  ciones tecnológicas inclusivas. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 83  Figura 1.   Evolución del grado de cumplimiento por ejes. 2016-2018-2021  Fuente: Tequila Inteligente (2025).  En el eje de innovación, avanzó del 51.8% en 2016 al 80.6% en 2021, reflejando una cul -  tura de mejora continua y la creación de productos turísticos novedosos. La sosteni -  bilidad también mostró un incremento importante, pasando de 47.2% a 83.5%, eviden -  ciando  acciones  concretas  como  la  adopción  de  energías  renovables,  programas  de    mitigación de huella de carbono y certificaciones ambientales. Finalmente, en el pilar   tecnológico, el cumplimiento creció de 55.8% a 79.6%, con iniciativas como el desplie -  gue de Wi-Fi gratuito, análisis de  big data , trazabilidad y movilidad inteligente.  En conjunto, Tequila pasó de un nivel de cumplimiento promedio del 52.5% en 2016 a   un 80.4% en 2021. Este avance global de más de 33 puntos porcentuales permitió que el   destino lograra el umbral del 80% necesario para certificarse como DTI. Este proceso   de transformación integral ha sido posible gracias a la cooperación público-privada,   la visión estratégica del Grupo JB, Mundo Cuervo, Secretaría de Turismo del Estado de   Jalisco y la Ruta del Tequila, la participación ciudadana, así como la articulación ins -  titucional. Tequila representa un modelo replicable que demuestra cómo un municipio   de escala intermedia puede liderar la innovación turística y urbana en la región.  Cozumel por su parte evidencia la limitación de recursos y necesidad de mayor coordi -  nación para avanzar hacia la certificación (Risisbi, 2021). Cancún, seleccionado por la  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 84  Red Iberoamericana de Destinos Turísticos Inteligentes para el piloto iberoamericano   en  2024,  participó  en  el  autodiagnóstico  con  más  de  90  destinos  de  América  Latina,    confirmando  su  compromiso  con  indicadores  de  sostenibilidad,  tecnología  y  gober -  nanza (Neuronamagazine, 2024).  En conclusión, México ha adoptado una estrategia dual, pero se está consolidando el   modelo de la Red Iberoamericana de DTI como la metodología prioritaria para el país,   facilitando la implementación del DTI en consonancia con los recursos y capacidades   de los destinos locales.  La  adopción  del  modelo  de  Destino  Turístico  Inteligente  (DTI)  en  México  ha  sido  una    experiencia enriquecedora que combina lecciones aprendidas de los casos emblemá -  ticos de España y América Latina. La coexistencia de los modelos de SEGITTUR y de la   Red Iberoamericana de DTI ha permitido implementar una estrategia dual, en la cual   el enfoque regional —diseñado para afrontar realidades latinoamericanas— se con -  solida como la opción más viable para los destinos mexicanos.  2.4.7. Reflexión crítica sobre el impacto y proyección de los DTI en México  El modelo de Destinos Turísticos Inteligentes (DTI) representa una oportunidad estra -  tégica para transformar la manera en que se gestiona el turismo en este siglo. Este en -  foque, que integra sostenibilidad, innovación, tecnología, accesibilidad y gobernanza,   ha demostrado generar impactos positivos medibles, tanto económicos como sociales,   especialmente en países como España, donde se han consolidado más de 150 DTI dis -  tinguidos y una red de 619 miembros institucionales y territoriales.  En el contexto latinoamericano, aunque más incipiente, se observan avances importantes   con destinos reconocidos en Brasil, Argentina, Colombia y México. Sin embargo, México se   encuentra rezagado, con solo un DTI distinguido oficialmente: Tequila, Jalisco, reconocido   en 2020. Esto contrasta fuertemente con su papel como potencia turística regional, lo que   revela una brecha entre su potencial y su adopción efectiva del modelo DTI.  Diversas  razones  explican  esta  brecha:  la  falta  de  voluntad  política,  la  escasa  visión    estratégica  a  largo  plazo,  la  confusión  conceptual  entre  ciudad  inteligente  y  destino    inteligente,  y  la  ausencia  de  financiamiento  adecuado,  tanto  público  como  privado.    A esto se suma la débil comunicación institucional sobre los beneficios y modelos exi -  tosos, lo que limita el interés y compromiso de gobiernos locales y actores turísticos.  Mientras tanto, los casos de éxito en España y algunos países de América Latina de -  muestran que adoptar el enfoque DTI no se trata simplemente de incorporar tecnolo - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 85  gía, sino de gestionar de manera integral y consciente los territorios turísticos. Estu -  dios confirman que en estos destinos:  •  Se duplica la estancia media de los visitantes,  •  Disminuye la pobreza y aumenta la inversión privada,  •  Se generan empleos inclusivos, especialmente para mujeres y jóvenes,  •  Se fortalece la sostenibilidad, la infraestructura turística y la seguridad ciudadana.  El problema en México no radica en la falta de soluciones, sino en cómo se gestionan. El   país cuenta con la tecnología, los recursos humanos, los casos de éxito cercanos y una   rica  diversidad  cultural  y  natural.  Pero  necesita  migrar  de  una  lógica  de  “etiquetar”    iniciativas como inteligentes hacia una auténtica gestión inteligente de sus destinos.   En los DTI, el 80 % de la inteligencia no tecnológica y solo el 20 % depende de tecnología.  Por tanto, si México desea avanzar como líder turístico global, debe adoptar una vi -  sión más ambiciosa y articulada sobre los DTI. Ello implica:  •  Establecer políticas públicas con metas claras,  •  Voluntad política a través de la asignación de presupuestos   •  Fortalecer alianzas interinstitucionales y con el sector privado,  •  Participar activamente en redes iberoamericanas de destinos inteligentes,  •  Promover capacitación y transferencia de conocimiento,  •  Priorizar la inversión en gestión integral más que en equipamiento tecnológico   aislado.  El modelo DTI no solo eleva la competitividad turística; también mejora la calidad de   vida  de  las  comunidades  anfitrionas.  México  tiene  todo  para  liderar  este  proceso,  si    se  decide  a  apostar  por  una  transformación  inteligente,  sostenible  e  inclusiva  de  su    modelo turístico.  2.4.8. Recomendaciones y conclusiones   La consolidación del modelo de Destino Turístico Inteligente en México representa una   oportunidad transformadora para el desarrollo turístico sostenible, inclusivo y com -  petitivo. Con base en las experiencias exitosas tanto en España como en América La -  tina, es posible extraer elementos clave que pueden orientar las políticas y prácticas   futuras del país. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 86  Primero, se propone escalar el modelo DTI a otros destinos turísticos con vocación de   desarrollo, incorporando ajustes metodológicos basados en las lecciones aprendidas   de Cozumel y Tequila. Es fundamental que estos ajustes respondan a criterios técnicos   y  a  las  capacidades  locales,  la  participación  comunitaria  y  las  particularidades  del    entorno (Tequila Inteligente, 2021).  Segundo, se recomienda integrar formalmente el modelo DTI dentro de los Programas   Sectoriales de Turismo, tanto a nivel federal como estatal y municipal. Esta acción do -  taría  de  estabilidad  institucional  al  enfoque,  garantizando  su  implementación  con -  tinúa más allá de los ciclos políticos.  Tercero,  es  esencial  establecer  fondos  específicos  para  la  innovación  turística  que    permitan  financiar  herramientas  tecnológicas,  conectividad  y  soluciones  de  accesi -  bilidad.  Como  señala  SEGITTUR  (2022),  la  inversión  en  infraestructura  digital  es  un    componente crucial para la sostenibilidad y modernización de los destinos.  Cuarto, fomentar la capacitación técnica de funcionarios públicos y operadores turís -  ticos resulta indispensable. Las experiencias de la Red Iberoamericana y de SEGITTUR   muestran  que  la  apropiación  local  de  las  metodologías  depende  en  gran  medida  del    fortalecimiento de capacidades humanas (SEGITTUR & AECID, 2024).  Quinto, se sugiere fortalecer la investigación aplicada desde universidades y centros   de  innovación  para  desarrollar  indicadores  adaptados,  modelos  de  evaluación  efi -  cientes y estrategias de seguimiento. La colaboración académica permitirá consolidar   evidencia empírica y evaluar el impacto real del modelo (García Moreno & Fernández   Alcantud, 2023).  Al analizar los casos de éxito de DTI en América Latina y España, se identifican varios   factores  críticos  de  éxito:  pensamiento  holístico,  gobernanza  efectiva,  organización    territorial coherente, capacidad para gestionar destinos, metodologías validadas, so -  luciones escalables y sostenibilidad económica. También destacan impactos medibles   como la duplicación de la estancia media, disminución de la pobreza, generación de   empleo (especialmente para mujeres y jóvenes), y mejora en accesibilidad, seguridad   y movilidad (Tequila Inteligente, 2024).  El significado profundo del DTI, su capacidad para transformar los espacios turísticos   en sistemas vivos, resilientes y colaborativos, son las temáticas que en esta sección se   desarrollan. Desde la relación entre residentes y visitantes, pasando por la adaptación   metodológica de los modelos internacionales, hasta la evolución hacia enfoques rege -  nerativos, se traza un recorrido que busca ir más allá de las etiquetas, situando al DTI  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 87  como la estratégica de desarrollo territorial, anclada en la inteligencia colectiva y en   el respeto hacia las comunidades y los ecosistemas.  Un factor decisivo en la evolución de estos destinos ha sido la diferenciación metodo -  lógica  entre  el  modelo  desarrollado  por  SEGITTUR  en  España  y  la  versión  adaptada    por  la  Red  Iberoamericana  de  DTI  para  América  Latina.  Aunque  ambas  comparten    una base conceptual común, responden a contextos económicos, institucionales y ter -  ritoriales distintos. La metodología española, impulsada por SEGITTUR, se aplica prin -  cipalmente  en  destinos  turísticos  maduros,  con  infraestructura  consolidada,  amplia    experiencia  en  gestión  y  financiamiento  significativo  proveniente  de  fondos  estruc -  turales  de  la  Unión  Europea.  En  este  contexto,  los  indicadores  presentan  un  nivel  de    exigencia elevado, ajustados a los estándares europeos.   Por  su  parte,  la  metodología  de  la  Red  Iberoamericana  de  DTI  se  orienta  a  destinos    emergentes de América Latina, con realidades más complejas en términos de capaci -  dad institucional, sostenibilidad financiera y nivel de digitalización. Esta adaptación   contempla una inversión público-privada más equilibrada, acorde al contexto regio -  nal, e incorpora indicadores calibrados según la realidad de cada territorio. A pesar   de estas diferencias, se ha identificado un 80% de compatibilidad entre ambas meto -  dologías, lo que confirma su alineación conceptual y facilita la cooperación y homolo -  gación entre regiones (Red Iberoamericana DTI, 2023).  Finalmente, se concluye que el enfoque DTI debe institucionalizarse como una política   de Estado centrada en la gestión inteligente de los destinos turísticos como instrumen -  to para mejorar la calidad de vida, fortalecer la cohesión social y garantizar la soste -  nibilidad. La gestión basada en datos, la interoperabilidad tecnológica, la gobernanza,   la  conectografía  y  la  participación  ciudadana  deben  ser  los  pilares  de  este  proceso.    Todo esto en un marco de cooperación regional e internacional mostrando resultados   e impactos para su replicación y escalabilidad.  Referencias bibliográficas  Cámara de Diputados. (2015).  Reglamento de la Ley General de Turismo  [PDF].  https://  www.gob.mx/sectur  Cámara de Diputados. (2023).  Ley General de Turismo  [PDF].  https://www.diputados.  gob.mx/LeyesBiblio/pdf/LGT.pdf  CNET. (2025).  Informe anual del sector turístico en México . Consejo Nacional Empre -  sarial Turístico. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.4. México: Del liderazgo turístico regional a la implementación efectiva del modelo DTI 88  El País. (2025a, enero 13).  México recibe hasta noviembre 40 millones de turistas y se   prepara para un nuevo récord histórico .  https://elpais.com/mexico  El País. (2025b, enero 3).  El Gobierno mexicano pospone el impuesto a los grandes cru -  ceros .  https://elpais.com/mexico  Expansión.  (2015,  6  de  mayo).   México  y  España  trabajan  en  el  primer  destino  inteli -  gente  mexicano .    https://obras.expansion.mx/soluciones/2015/05/06/mexico-y-es -  pana-trabajan-en-el-primer-destino-inteligente-mexicano  FITUR.  (2025,  17  de  enero).   FITUR  Know  How  &  Export  2025  sorprende  con  un  pro -  grama  innovador  sobre  digitalización  y  tecnología  aplicada  al  turismo .    IFEMA.   https://www.i
