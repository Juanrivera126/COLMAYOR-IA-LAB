inos Turísticos Inteligentes 125  3. Modelo de la Red Iberoamericana de Destinos Turísticos   Inteligentes  Ledys Vianey López Zapata  Grupo de Investigación GIET., I.U Colegio Mayor de Antioquia, Colombia.  3.1.  Antecedentes  de  la  Red  Iberoamericana  De  Destinos  Turísticos  Inteligentes    -RI-DIT-  La Red Iberoamericana de Destinos Inteligentes surge como una respuesta desde Amé -  rica a las profundas transformaciones que estaba experimentando el sector turístico   durante las primeras décadas del siglo XXI y que se acrecentaron con la pandemia del   Covid 19. Los destinos turísticos requerían una aproximación diferente para su desar -  rollo  y  gestión  que  considerara  la  transversalidad  del  turismo  dentro  del  territorio    y la necesidad de articulación de este sector con otras áreas del desarrollo urbano y   territorial.  Bajo este marco, el 29 de junio de 2022 surge de forma oficial la RI-DTI como una ini -  ciativa de colaboración entre destinos y organizaciones de América Latina. Reunidos   en la ciudad de Medellín-Colombia los representantes de los destinos de Tequila de Mé -  xico, y Medellín y Bogotá de Colombia, y de las organizaciones vinculadas al turismo y   que promueven el modelo de Destinos Turísticos Inteligentes en los países de Brasil y   Argentina, firman un acuerdo de voluntades que los compromete a liderar la creación   de  la  Red  Iberoamericana  de  Destinos  Turísticos  Inteligentes  (Red  Iberoamericana    Destinos Turístico Inteligentes, 2022).   Los destinos y organizaciones que apalancaron la creación de la red compartían un   mismo propósito y era su trabajo por la consolidación de herramientas y estrategias   que conviertan a los destinos, ciudades y territorios de sus países en Destinos Turísti -  cos Inteligentes. Lograr este acuerdo de voluntades requirió varias reuniones y sesio -  nes previas de definición de alcances y propósito de la naciente Red.  Tal como se estableció en el acuerdo de voluntades firmado en junio de 2022. La deci -  sión de los destinos municipales de participar en la RI-DIT encuentra su justificación   en el reconocimiento internacional que había alcanzado el modelo como estrategia de   desarrollo  territorial.  La  Organización  Mundial  del  Turismo  planteó  como  paso  fun -  damental en la gestión de destinos el concepto de destino inteligente y el papel de los  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 126  Organismos de Gestión de Destinos OGD de cara a los nuevos retos de la digitalización,   la sostenibilidad y la tecnología (Organización Mundial del Turismo, 2019).   En  la  conferencia  de  la  Organización  Mundial  del  Turismo  “Creando  ciudades  inteli -  gentes para innovar en experiencias turísticas”, desarrollada en el año 2018 en Valla -  dolid,  España,  se  hizo  un  llamado  a  las  ciudades  a  convertirse  en  destinos  turísticos    inteligentes, donde la gobernanza del turismo y la economía digital, se combinan para   brindar a los viajeros experiencias diversas y auténticas (Red Iberoamericana Desti -  nos Turístico Inteligentes, 2022).  El 29 de agosto del 2022 se oficializa mediante acta la constitución de la RI DTI con los   miembros fundadores:  •  Tequila, México - representado por Federico de Arteaga Vidiella, Líder del Pro -  yecto Tequila Smart City  •   Medellín,  Colombia  -  representado  por  Ledys   López  Zapata,  Subsecretaria  de    Turismo de la Alcaldía de Medellín  •  Bogotá, Colombia - representado por Karol Fajardo Mariño, Directora General   del Instituto Distrital de Turismo  •  Brasil - Ministerio de Turismo, representado por Bárbara Blaudt Rangel, Coor -  dinadora de Destinos Inteligentes y Creativos  •  Argentina - Instituto Ciudades del Futuro, representado por Gonzalo Alfredo de   la Rosa, director ejecutivo.  La red se constituyó con la misión clara, de “Impulsar la colaboración interadminis -  trativa y público-privada para situar el turismo inteligente en el centro de la atención   de  las  políticas  públicas  turísticas,  promoviendo  sinergias  y  facilitando  la  necesaria    transferencia  de  conocimiento,  el  desarrollo  de  alianzas  estratégicas  y  el  desarrollo    de  productos,  servicios  y  actuaciones  propias  de  los  Destinos  Turísticos  Inteligentes,    como:  formación  y  capacitación,  acceso  a  bases  de  datos  e  información  de  ayuda,    subvenciones y financiación, soluciones tecnológicas y visibilidad internacional, inter -  cambios de experiencias, buenas prácticas y conocimiento entre destinos y organiza -  ciones, entre otros” (Red Iberoamericana DTI, 2024).  3.1.1. Las Motivaciones de los Actores Fundadores  El proyecto de constituir una red de destinos partía del reconocimiento de la a impor -  tancia  del  trabajo  articulado  e  inspirado  en  la  Red  Española  de  Destinos  Turísticos   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 127  Inteligentes,  creada  y  gestionada  por  SEGITTUR  (Sociedad  Mercantil  Estatal  para  la    Gestión  de  la  Innovación  y  las  Tecnologías  Turísticas).  El  modelo  español  había  de -  mostrado  su  efectividad  práctica  y  conceptual  para  la  gestión  y  transformación  de    destinos tradicionales hacia destinos inteligentes y SEGITTUR a través de su red había   logrado sistematizar y capitalizar esa experiencia.   No obstante, los representantes de los destinos e instituciones fundadores de la RI-DTI   comprendían que no se trataba simplemente de replicar la red española y el modelo,   sino resolver un problema específico de la región, como era la dispersión de esfuerzos.   Los destinos pioneros como Tequila (México) trabajaban de manera independiente, sin   espacios formales de intercambio, lo que limitaba su capacidad de aprendizaje mutuo   e  inteligencia  colectiva.  “Tequila  estaba  solo  al  principio,  durante  años  estuvo  solo,    después estuvo Medellín, Bogotá...” (Arteaga, 2025).   Había un consenso entre los fundadores sobre las limitaciones de la simple replicación   del modelo español y la necesidad de articulación y de diálogo para compartir buenas   prácticas. “empezamos a formalizar un poco con la idea de compartir buenas prácti -  cas y de tener modelos para Latinoamérica muy hechos a la medida de la situación y   del contexto latinoamericano” (Fajardo, 2025).  Mientras  España,  había  esperado  a  tener  una  masa  crítica  de  destinos  antes  de  for -  malizar  su  red,  la  estrategia  latinoamericana  fue  diferente.  La  red  inició  solo  con  tres    destinos y un Gobierno Nacional, con la intención de ser un espacio de aprendizaje, de   mejores prácticas, de intercambio de conocimiento y de generar una marca y una meto -  dología para América Latina. Bajo esta lógica la Red se concibió como una plataforma   de gestión del conocimiento que pretendía acelerar las curvas de aprendizaje de nuevos   destinos, evitar que cada destino repitiera los errores de los primeros que incursionaron   en el proceso, y finalmente facilitar la transferencia horizontal de conocimientos.  Otro elemento que contribuyó a la creación de la RI – DTI fue el factor humano, la pan -  demia del Covid-19 fue el escenario que propició las conexiones y sesiones de trabajo   online.  De  tal  manera  que  la  existencia  de  relaciones  personales  e  institucionales  no    es un detalle menor y resulta fundamental para comprender el surgimiento de la red.   Esta no surgió de contactos fríos entre instituciones, sino de redes informales previas   construidas en encuentros, eventos y proyectos compartidos.  El apoyo de organismos internacionales fue otro catalizador del proyecto de creación   de la RI - DTI “Se empezó a ver la posibilidad de que hubiera una red. A mí el BID en ese   momento me contrató para conceptualizar esa red...” (Arteaga, 2025). El apoyo técnico  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 128  y  financiero  del  BID  al  responder  a  agendas  de  articulación  regional  de  organismos    multilaterales. Igualmente, SEGITTUR representó un apoyo en lo conceptual, concebi -  do por los fundadores como un aliado que brinda legitimidad técnica al proceso.  Finalmente,  el  proyecto  de   “tropicalización”   de  los  indicadores  del  modelo  de  SEGI -  TTUR  fungió  como  un  cohesionador  de  los  destinos  e  instituciones  fundadoras.  Tal    como  lo  expresa  el  presidente  actual  de  la  red  Federico  Arteaga  “La  red  también  se    empezó a consolidar en el momento que SEGITTUR nos pidió la tropicalización de los   indicadores...  todo  ese  trabajo  que  hicimos  juntos  fue  el  sustento  técnico  también  de    la  red.”  Este  proyecto  evidenció  un  ejercicio  concreto  de  trabajo  en  red  y  generó  un    resultado concreto para el BID que justificaba la colaboración.  3.1.2. Organización de la Red Según Protocolos de Actuación  La Red Iberoamericana de Destinos Turísticos Inteligentes, está conformada por des -  tinos,  organizaciones  jurídicas,  públicas  o  privadas  pertenecientes  a  la  industria  tu -  rística u otras industrias conexas en Iberoamérica, que contribuyen al desarrollo del   sector turístico y su competitividad. La red adhiere miembros en cinco tipologías di -  ferentes. Los miembros titulares corresponden a gobiernos locales o entidades gesto -  ras de turismo que cuentan con reconocimiento de Destino Turístico Inteligente o han   iniciado el proceso de conversión bajo metodologías avaladas por la Red. Los miem -  bros  institucionales  incluyen  administraciones  públicas  nacionales  y  subnacionales    (Gobernaciones, Estados), así como también como universidades, cámaras de comer -  cio y agremiaciones relacionadas con el modelo DTI. Los miembros colaboradores son   organizaciones  jurídicas  públicas,  privadas  o  mixtas  (fundaciones,  asociaciones,  fe -  deraciones) que pueden aportar valor al desarrollo de los DTI, ya sea mediante pago   de  membresía  anual  o  a  través  de  proyectos  específicos  realizados  en  colaboración    con la red o con algún miembro y con duración menor a doce meses. Por último, los   miembros y destinos observadores son entidades que desean conocer los procesos de -  sarrollados por la Red sin derecho a voz ni voto, por un período máximo de un año.  El modelo de gobernanza se estructura mediante comisiones y mesas de trabajo. La Comi -  sión Ejecutiva actúa como mesa directiva de la Red y está conformada por cinco cargos   electos por períodos de dos años: Presidencia, Vicepresidencia, Secretaría Institucional, Se -  cretaría de Relaciones Internacionales y Secretaría Técnica. Sus funciones incluyen apro -  bar la incorporación de miembros titulares, preparar programas y proyectos, coordinar   las mesas de trabajo, ejercer la representación de la Red y elevar propuestas a la Comisión   Plenaria. La elección de estos cargos se realiza mediante presentación de listas completas  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 129  ante la Comisión Plenaria, para la postulación a uno de estos cargos se requiere que los   candidatos tengan mínimo un año de participación en la Red.  La Comisión Plenaria, por su parte, está integrada por un representante de cada miem -  bro de la Red e incluye al representante de la Presidencia, Vicepresidencia y secretarias.   Constituye la instancia de articulación y toma de decisiones estratégicas, siendo respon -  sable de aprobar planes, proyectos y estrategias clave, así como las propuestas de trabajo   presentadas por la Comisión Ejecutiva. También define políticas, directrices y estándares   relacionados con el turismo inteligente, aprueba cambios en el protocolo de actuación y   evalúa el progreso de los proyectos. Se reúne entre dos y cuatro veces al año, y sus acuer -  dos son adoptados por mayoría, con voz y voto para miembros titulares e institucionales.  Las mesas de trabajo son coordinadas por la Vicepresidencia con apoyo de la Secre -  taría  Técnica,  y  están  vinculadas  con  los  ejes  y  dominios  del  modelo  DTI,  además  de    temas como la investigación y la educación para la difusión del modelo en la región.   Estas instancias permiten detectar mejoras metodológicas, establecer acciones reco -  mendadas y desarrollar proyectos de referencia que fortalezcan la gestión inteligente   de los destinos miembros.  3.1.3. Modelo metodológico de la RI-DTI  El modelo de destinos inteligentes para Iberoamérica comenzó a gestarse a partir de   una invitación realizada por el Banco Interamericano de Desarrollo (BID) y SEGITTUR   en el año 2021 a la Red DTI. Bajo esta invitación, se procedió a la adaptación del modelo   español  a  la  realidad  de  los  destinos  turísticos  latinoamericanos.  Participaron  acti -  vamente  de  este  proceso  autoridades  turísticas  y  técnicos  de  los  destinos  de  Tequila    en México, Medellín y Bogotá en Colombia, junto con representantes del Ministerio de   Turismo  de  Brasil  y  del  Instituto  de  Ciudades  del  Futuro  (ICF).  Estos  destinos  fueron    seleccionados para el diseño y desarrollo del MM RI-DTI por su cercanía con el modelo   español, ya que habían sido diagnosticados según los criterios de este último, o bien lo   habían tomado como referente para la construcción de modelos propios como fue el   caso del Ministerio de Turismo de Brasil (López y Beltrami, 2025).    El proceso implicó una revisión detallada de los indicadores, reduciendo su cantidad to -  tal de manera significativa. Se pasó de 265 a 153 indicadores, con 79 requisitos asociados.   Esta disminución tenía como propósito simplificar la metodología sin perder profundi -  dad  y  rigurosidad.  Lo  que  representó  una  optimización  a  partir  de  las  especificidades    institucionales, territoriales, sociales y financieras de los destinos americanos.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 130  Con  la  conformación  oficial  de  la  Red  DTI  en  el  año  2022,  se  instaló  la  mesa  de  tra -  bajo  sobre  el  Modelo  de  la  RI-DTI,  desde  la  cual  se  lideró  el  proceso  de  reducción  y    adaptación de requisitos e indicadores. Esta mesa reunió a profesionales de diferentes   tipos de destinos turísticos: urbanos, costeros y del interior del continente. A través de   discusiones  y  consensos,  cada  indicador  fue  evaluado  por  los  miembros  de  la  mesa    considerando su relevancia y aplicabilidad al contexto, con el propósito de crear una   herramienta  que  reflejara  la  diversidad  de  realidades  institucionales  y  territoriales.    Una vez seleccionados los indicadores y requisitos de cada eje que permanecerían en   el modelo se procedió con los integrantes de la mesa a definir el peso de los indicadores   dentro de cada requisito. Estos pesos fueron establecidos mediante un proceso partici -  pativo a cada indicador se le asignó un porcentaje específico, de manera que la suma   de todos los indicadores dentro de un requisito totaliza el 100%.   El peso relativo de cada requisito dentro del ámbito se establece mediante un proceso   de  cálculo  de  proporción  o  razón  dentro  de  su  ámbito.  El  resultado  es  un  porcentaje    que  representa  la  contribución  relativa  de  cada  requisito  al  ámbito  de  evaluación  y    garantiza  que  todos  los  requisitos  de  un  mismo  eje  se  calculan  proporcionalmente.    Misma  metodología  se  realizó  para  la  definición  de  los  pesos  de  cada  eje.  El  peso  de    cada eje se determina según la proporción de sus requisitos respecto al total de la me -  todología, como se muestra en la Tabla 1.  El MM RI-DTI consta de 79 requisitos distribuidos en 16 ámbitos de actuación y se eva -  lúa mediante 153 indicadores. Esta estructura simplificada respecto al modelo español   busca optimizar la metodología sin perder profundidad.   Tabla 1   Número de requisitos e indicadores por ejes.  EJE   Requisitos   Indicadores   Peso  GOBERNANZA   13   23   16%  INNOVACIÓN   6   11   8%  TECNOLOGÍA   17   38   22%  SOSTENIBILIDAD   30   49   38%  ACCESIBILIDAD   13   32   16%  TOTALES DEL MODELO   79   153   100%  Fuente: López, L., y Beltrami, M. (2025). Modelo Metodológico de la Red Iberoamericana de Destinos Turísti -  cos Inteligentes. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 131  Figura 1   Valor en porcentaje de cada eje.  Fuente: López y Beltrami (2025).   Los cinco ejes tienen ponderaciones diferenciadas: sostenibilidad representa el 38% del   modelo, tecnología el 22%, gobernanza y accesibilidad el 16% cada uno, e innovación el   8%. Los pesos de los ejes se corresponden, por un lado, con las áreas que representan   mayores retos para los destinos de América y en los cuales hay mayores oportunida -  des de mejora y por otro lado con un ejercicio racional de capacidades de implemen -  tación de los OGD de la región.  3.1.4. Proceso de Transformación de Destinos Turísticos según el Modelo Metodo -  lógico de la Red Iberoamericana DTI  El  proceso  de  transformación  se  desarrolla  en  seis  etapas  progresivas.  Inicia  con  la    capacitación y autodiagnóstico. La red ha pretendido desde sus inicios que el proceso   sea considerado un medio y no un fin y por esta razón se incluye como etapa previa   a cualquier diagnóstico una capacitación donde el destino recibe formación sobre el   modelo con las autoridades, técnicos de turismo y demás actores del ecosistema, don -  de se explica el alcance de la transformación y se ponen puntos en común sobre lo que   permite  la  transición  hacia  un  destino  inteligente.  Posteriormente  el  destino  realiza    una autoevaluación mediante un cuestionario de autodeclaración disponible en una   herramienta digital provista por una empresa colaboradora de la red. Esta fase, que  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 132  dura  entre  uno  y  dos  meses,  fundamenta  las  bases  de  la  capacidad  transformadora    del modelo y requiere la participación del Organismo Gestor de Destino y otras áreas   no turísticas del territorio. Como resultado de esta etapa el destino obtiene una radio -  grafía de su punto de partida desde sus autodeclaraciones.  La segunda etapa corresponde al diagnóstico DTI asistido. La RI-DTI ha pretendido que   el diagnóstico no se limite a un diligenciamiento de información por parte del destino,   sino que sea un proceso de acompañamiento y asistencia consultiva. En esta etapa   un   consultor certificado de la Red verifica la consistencia, veracidad y pertinencia de la in -  formación aportada por el destino mediante el cruce de datos con información pública,   recolección de datos en campo y análisis de evidencias. Cada indicador se califica según   parámetros establecidos mediante calificación binaria, sumatoria o gradiente, según lo   determinado en la ficha de valoración del modelo. Como resultado de esta etapa el des -  tino obtiene un informe diagnóstico detallado por ejes, ámbitos, requisitos e indicadores   y  un  dashboard  que  le  permite  visualizar  rápidamente  el  nivel  de  cumplimiento.  Este    informe se convierte en el insumo para la formulación de la siguiente etapa.  Figura 2   Dashboard ejemplo resultados diagnóstico DTI.  Fuente: Red Iberoamericana de DTI, Plataforma Optimizadata. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 133  La tercera etapa consiste en la elaboración del Plan de Transformación DTI, donde se   establecen acciones para mejorar el nivel de cumplimiento y lograr un avance signifi -  cativo. Este plan se construye mediante reuniones técnicas en el Organismo Gestor de   Destino, talleres de planificación con otras áreas de la administración local y sesiones   colaborativas  con  todas  las  partes  interesadas  del  destino.  Las  acciones  formuladas    abordan  las  áreas  críticas  de  actuación  y  las  no  conformidades  identificadas  en  el    diagnóstico.  El  plan  de  transformación  constituye  la  hoja  de  ruta  para  la  transición    hacía  un  DTI  y  se  realiza  sobre  los  indicadores  con  niveles  de  cumplimiento  igual  o    inferior al 50%, los cuales requieren acciones inmediatas de mejora para alcanzar la   distinción  como  destino  inteligente.  Cada  acción  propuesta  incluye  una  descripción    detallada de la intervención requerida, el nivel de cumplimiento actual del indicador   y la prioridad asignada para su implementación. Este instrumento busca orientar al   ente gestor del destino en la definición de rutas de implementación, articulación de ac -  tores y asignación de recursos. Sin embargo, es responsabilidad del Ente Gestor definir   la ruta de implementación, asignar recursos y articular a los actores necesarios para   su ejecución efectiva.  La  cuarta  etapa  de  ejecución  y  monitoreo  implica  el  seguimiento  periódico  del  grado    de implementación y cumplimiento de las acciones determinadas en el Plan de Trans -  formación. En esta etapa el OGD debe definir las prioridades de intervención y asignar   los recursos para avanzar en la implementación de acciones correctivas. Esta fase tiene   una  duración  variable  según  las  necesidades  del  destino  y  la  asignación  de  recursos    financieros, físicos y humanos. En esta etapa se sugiere a los destinos construir sus pro -  pios esquemas de seguimiento mediante tableros de comando o cualquier otra herra -  mienta que les permita sistematizar la información de avances en la implementación.  La quinta etapa corresponde a la auditoría y distinción, donde se realiza una auditoría   sistemática y documentada que analiza evidencias para evaluar el grado de adecua -  ción del destino al MM RI-DTI. Los destinos que cumplen con las condiciones necesa -  rias reciben una distinción como DTI por parte de la Red, según el nivel de avance en   el cumplimiento de los requisitos e indicadores.  Finalmente, la etapa de mejora continua y reevaluación establece que cada dos años   se actualice el diagnóstico para evaluar el progreso, identificar oportunidades de me -  jora y ajustar las estrategias según sea necesario, pudiendo otorgarse o actualizarse   la distinción correspondiente. Aunque las etapas se presentan como un proceso lineal   para efecto de su explicación, deben ser consideradas más como un proceso iterativo   y de constante movimiento.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 134  La  metodología  MM  RI-DTI  se  configura  como  un  modelo  basado  en  procesos  que    adopta el enfoque de mejora continua, centrándose en la implementación y optimiza -  ción de prácticas orientadas al cumplimiento de objetivos de manera sostenida. Bajo   esta lógica se definen estadios de implementación, de tal manera que los destinos tu -  rísticos puedan demostrar avances progresivos, así como facilitar la correlación con   las metodologías vigentes en cada país de la región.  Los tres estadios o nivel de DTI son:  •  DTI  en  exploración:  se  considera  un  DTI  en  exploración  al  destino  que  obtiene    una valoración en el diagnóstico mayor o igual a 15% y menor o igual al 35%   •  DTI en ascenso: se considera en ascenso al destino que demuestra evidencia en   la realización de acciones para convertirse en destino inteligente y que obtiene   una valoración en el diagnóstico entre el 35% y 80%  •  DTI de excelencia: Se considera un DTI de excelencia al destino que alcanza una   puntuación en el diagnóstico superior al 80%.  Figura 3   Clasificación de Destinos Turísticos Inteligentes. Modelo RI-DTI.  Fuente: Manual Metodológico RI-DTI.  La  transformación  hacia  un  DTI  se  concibe  como  un  proceso  acumulativo  gradual    que requiere evaluación periódica y adaptación de estrategias, actuando como herra -  mienta facilitadora del cambio para el organismo gestor del destino. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 135  3.1.5. Logros de la Red Iberoamericana DTI  Algunos de los logros de la Red en estos 3 años de existencia se pueden resumir en su   institucionalización como red, es decir, en lograr en menos de un año firmar acta de   constitución con socios que generaban credibilidad al proceso y adherir unos proto -  colos de actuación para coordinar las acciones de esta y su estructura de gobernanza.  La red ha logrado convertirse en un referente en la región en la implementación del   modelo DTI, la participación en diferentes eventos sobre el tema de los miembros de   la  comisión  ejecutiva  y  de  los  destinos  miembros  corroboran  este  hecho.  Congresos,    ferias, seminarios sobre DTI en diferentes esferas de América han sido apoyados en su   organización por la RI-DTI.  Figura 4  Resultados globales autodiagnóstico. Modelo RI-DTI.   Fuente: Red Iberoamericana DTI.  Como parte de la promesa de valor que tiene la red de acompañar a los destinos en su   proceso de transformación, se logró el diseño del curso de certificación de consultores  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 136  y auditores del modelo de la red. Certificándose en la primera cohorte en castellano 18   personas de la región de países como Argentina, Colombia, Uruguay, Chile y México.   Así  mismo  se  realiza  el  mismo  curso  en  portugués  para  miembros  de  Brasil  con  15    participantes en proceso de certificación.  Con el apoyo del BID y una empresa colaboradora la red lanzó un programa de auto -  diagnóstico en el cual se inscribieron 42 destinos y finalizaron el diagnóstico 36 de ellos.   Este ejercicio permitió identificar el estado actual de una muestra significativa de des -  tinos  de  la  región  frente  al  estándar  de  cumplimiento  de  la  metodología  de  la  RI-DTI    (Figura 4) y le permitió a la red adherir destinos de diferentes niveles de desarrollo.  La red cuenta actualmente con 69 miembros, de los cuales hay 6 gobiernos nacionales,   38 son entes gestores de destinos, 3 gobiernos subnacionales, 11 ONG, 9 universidades   y 2 empresas colaboradoras.  3.1.6. Retos de Futuro de la Red  La red se ha consolidado progresivamente como un actor activo, relevante y legitima -  do  en  el  ecosistema  del  turismo  inteligente  de  América  Latina.  No  obstante,  aún  so -  breviven retos de cara a su permanencia crecimiento y consolidación como referente   imparcial en el desarrollo turístico sostenible e inteligente de América, la Red enfrenta   desafíos importantes que requieren soluciones innovadoras.  El  principal  reto  es  alcanzar  la  sostenibilidad  financiera  de  la  red  que  garantice  su    operación,  continuidad  y  capacidad  de  impacto  en  el  largo  plazo.  Contrario  a  la  red    española  de  DTI,  la  red  iberoamericana  no  depende  de  ningún  gobierno  nacional  y    por tanto no dispone de financiación gubernamental. Actualmente ningún miembro   realiza  pagos  por  membresía  u  aportes,  es  decir  que  la  red  opera  sin  un  modelo  de    contribución  económica,  lo  que  genera  una  relación  de  dependencia  de  voluntades    institucionales,  gestiones  ad-hoc  y  recursos  temporales  que  limitan  su  capacidad  de    planificación en el largo plazo y de operación estratégica. Frente a este desafío la red   ha planteado varias estrategias como son: un diseño de membresía diferenciado por   tipo  de  miembro,  la  diversificación  de  fuentes  de  financiamiento  mediante  mecanis -  mos complementarios como fondos de cooperación internacional, alianzas con orga -  nismos multilaterales (BID, CAF, OEA) y la monetización de servicios de valor añadido   (certificaciones, formación especializada, consultoría).  El segundo gran reto que enfrenta la RI-DTI es la formalización de acuerdos de colabo -  ración con SEGITTUR para el reconocimiento mutuo del modelo. Si bien el MM RI-DTI  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 137  se construyó a partir de la armonización con el modelo de SEGITTUR, su diseño partió   de una premisa clave: configurarse como un estadio previo, que facilitara la adopción   progresiva de los destinos hacia estándares internacionales más exigentes como el de   SEGITTUR. Esta decisión de la RI-DTI respondió a la realidad de los destinos de Améri -  ca que se enfrentan limitaciones presupuestarias y técnicas, donde los altos costos de   implementación del modelo SEGITTUR representan una barrera de entrada significa -  tiva para la mayoría de los municipios de la región.  No obstante, para fortalecer la credibilidad y proyección de la red resulta imprescin -  dible avanzar en convenios oficiales que reconozcan la equivalencia metodológica del   MM  RI-DTI  con  el  modelo  español,  permitiendo  que  destinos  certificados  por  la  Red    obtengan reconocimiento internacional y, por tanto, un intercambio de buenas prác -  ticas y aprendizajes  Un  último  reto  de  la  Red  Iberoamericana  es  ser  validadores  y  participantes  activos    de la discusión sobre DTI en diferentes países de la región. La Red debe consolidarse   como voz autorizada en estas discusiones, contribuyendo al diseño de políticas públi -  cas, marcos normativos y estrategias de desarrollo turístico en los países de la región.   Para esto la red viene haciendo presencia en espacios de decisión política e incidiendo   en  marcos  regulatorios  nacionales,  apoyando  a  países  que  están  desarrollando  nor -  mativas sobre DTI (como Argentina, Colombia, México) donde el conocimiento acumu -  lado de la Red aporta de forma estratégica.   Finalmente, la red se debe consolidar como un actor facilitador del diálogo intersecto -  rial, actuando como puente entre diferentes actores (gobiernos, sector privado, acade -  mia, comunidades locales) que participan en la transformación de los destinos, para   posicionar el modelo DTI como herramienta de actuación técnica y no política.  Referencias bibliográficas  Arteaga, F. (2025).  Entrevista creación de la Red DTI Iberoamérica .  Fajardo, K. (2025).  Entrevista implementación Modelo DTI - Colombia .  López,  L.,  y  Beltrami,  M.  (2025).   Modelo  Metodológico  de  la  Red  Iberoamericana  de    Destinos Turísticos Inteligentes .  Organización  Mundial  del  Turismo.  (2019).   Directrices  de  la  OMT  para  el  fortaleci -  miento de las organizaciones de gestión de destinos (OGD) – Preparando las OGD   de cara a nuevos retos.   https://doi.org/10.18111/9789284420933 \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3. Modelo de la Red Iberoamericana de Destinos Turísticos Inteligentes 138  Red  Iberoamericana  Destinos  Turístico  Inteligentes.  (2022).   Acuerdo  de  voluntades    para la creación de la Red.  Medellín.  Red  Iberoamericana  Destinos  Turístico  Inteligentes.  (2024).   Protocolos  de  Actuación    de la Red.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 139  3.2. Eje Gobernanza  Thays Domareski Ruiz  Departamento de Turismo da Universidade Federal do Paraná, Brasil.  Milena Gehring Nascimento  Universidade Federal do Paraná, Brasil.  Juliana Medaglia  Departamento de Turismo da Universidade Federal do Paraná, Brasil.  Carlos Eduardo Silveira  Departamento de Turismo da Universidade Federal do Paraná, Brasil.  3.2.1. Introduçao  A governança é um conceito que ganhou centralidade no debate acadêmico e nas   práticas de gestão  pública a partir dos  anos 1990, em resposta à crescente comple -  xidade das relações entre Estado, mercado e sociedade civil. Rhodes (1996) destaca   que  a  governança  representa  uma  mudança  de  paradigma  em  relação  ao  mode -  lo  tradicional  de  governo,  enfatizando  redes,  interdependência  e  processos  hori -  zontais de coordenação. Para Kooiman (2003), a governança diz respeito à forma   como  a  sociedade  é  orientada,  organizada  e  gerida  por  meio  da  interação  entre    diversos  atores,  em  diferentes  níveis  e  esferas  de  poder.  Nesse  sentido,  a  gover -  nança  ultrapassa  a  mera  gestão  administrativa,  incorporando  dimensões  como    legitimidade, transparência, participação e eficiência. A governança deixou de ser   apenas  um  instrumento  de  gestão  e  passou  a  ser  entendida  como  um  processo    dinâmico  de  interação  entre  múltiplos   stakeholders,   com  diferentes  interesses  e    níveis de influência (Pierre & Peters, 2005).  A relevância do conceito está em sua capacidade de oferecer um arcabouço teórico e   prático para lidar com problemas públicos que exigem articulação intersetorial, como   o  desenvolvimento  sustentável,  a  gestão  urbana  e  o  turismo.  No  campo  do  turismo,    Hall (2011) argumenta que a governança é essencial para alinhar os interesses de múl -  tiplos  stakeholders , garantir a coerência das políticas públicas e promover um plane -  jamento mais participativo e integrado.   A governança de destinos turísticos tem evoluído como uma abordagem estratégica,   orientada para a construção de relações colaborativas entre os diversos  stakeholders   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 140  envolvidos no turismo, visando à eficiência na tomada de decisões, à sustentabilidade   e à inovação. De acordo com Beritelli, Bieger e Laesser (2007), a governança em des -  tinos  exige  a  criação  de  mecanismos  institucionais  que  possibilitem  a  participação    ativa dos atores locais, promovendo confiança, legitimidade e compromisso coletivo.   Essa abordagem favorece a coordenação entre os níveis de governo, empresas, comu -  nidades locais e organizações da sociedade civil, elementos fundamentais para enfren -  tar os desafios complexos do desenvolvimento turístico. Para Pierre & Peters (2000), o   conceito de governança ultrapassa os limites da administração  pública tradicional e   abrange múltiplas formas de regulação e controle exercidas de forma compartilhada,   o  que  se  alinha  diretamente   às   exigências  de  destinos  turísticos  que  buscam  equilí -  brio  entre  crescimento  econômico,  equidade  social  e  preservação  ambiental.  Assim,    a  governança  de  destinos  não  é  apenas  um  arranjo  institucional,  mas  também  um    processo  dinâmico  de  negociação,  aprendizagem  e  adaptação,  fundamental  para  o    fortalecimento da capacidade competitiva e da resiliência dos territórios turísticos.  Nesse contexto, o conceito dos destinos turísticos inteligentes (DTI) surge como uma pro -  posta operacional, alinhada ao planejamento e a gestão do destino. Inspirado na  lógica   das  smart cities , o modelo DTI propõe a aplicação de tecnologias da informação e co -  municação (TIC), somadas à governança participativa, à sustentabilidade e à inovação   contínua como bases estruturantes para a competitividade dos destinos (Gretzel et al.,   2015; Ivars-Baidal et al., 2017). A governança, nesse modelo, não apenas coordena ações,   mas facilita a co-criação de valor com  múltiplos  stakeholders , promovendo um turismo   mais eficiente, resiliente e centrado no visitante e na comunidade local.  A metodologia adotada no presente estudo configura-se como uma pesquisa explora -  tória,  descritiva  e  analítica,  de  natureza  qualitativa,  adequada  para  a  compreensão    aprofundada de fenômenos complexos e ainda pouco investigados (Gil, 2017). Segun -  do  Yin  (2016),  a  pesquisa  qualitativa  permite  analisar  contextos  sociais  a  partir  da    interpretação de significados, o que se mostra pertinente no exame de modelos de go -  vernança turística e sua aplicação prática. Assim, procedeu-se à análise comparativa   entre os indicadores do projeto Destino Turístico Inteligente (DTI), tomando como base   o  modelo  metodológico  da  Rede  Iberoamericana  de  Destinos  Turísticos  Inteligentes,    exemplificado  em  forma  de  estudo  de  caso  com  o  destino  Curitiba  nos  parâmetros    definidos pela Rede. Assim, com base em fontes documentais, relatórios  técnicos  e da -  dos secundários provenientes de plataformas institucionais, teve como objetivo com -  preender  o  papel  da  governança  no  desenvolvimento  de  um  Destino  Turístico  Inteli -  gente, à luz de indicadores da Rede Iberoamericana de Turismo. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 141  Para tanto, depois da contextualização, o próximo capítulo discute a governança tu -  rística, seguida da comparação com os indicadores de Governança da Rede Iberoame -  ricana exemplificando os critérios na estrutura do Destino Inteligente Curitiba, enca -  minhando para as considerações finais.  3.2.2. Governança turística   A  governança  turística  tem  passado  por  um  processo  contínuo  de  evolução  concei -  tual, refletindo as transformações nos modelos de gestão  pública,  nas relações entre   os atores do turismo e nas demandas por sustentabilidade nos destinos. Inicialmente,   a governança era vista sob uma perspectiva hierárquica, centrada na atuação do Es -  tado como principal coordenador das ações turísticas (Bramwell & Lane, 2000). Com   o  tempo,  essa  visão  deu  lugar  a  abordagens  mais  colaborativas,  que  reconhecem  a    importância  da  articulação  entre  o  setor   público,  a  iniciativa  privada  e  a   sociedade   civil na tomada de decisões que afetam o desenvolvimento dos destinos (Hall, 2011).  A  partir  dos  anos  2000,  o  conceito  de  governança  turística  passou  a  incorporar  ele -  mentos como participação, transparência, coesão territorial e inovação institucional.   Nesse sentido, a construção de arranjos colaborativos e de redes de cooperação tor -  nou-se fundamental para o planejamento e a gestão eficiente dos destinos turísticos   (Peters & Pikkemaat, 2005).  No  contexto  do  planejamento  turístico,  a  governança  tornou-se  um  componente  es -  tratégico para a formulação de políticas sustentáveis e integradas. Estudos apontam   que  destinos  com  estruturas  de  governança  bem  consolidadas  são  mais  eficazes  na    implementação de planos e estratégias, pois conseguem alinhar interesses e promover   sinergias  entre  os  atores  locais  (Bregoli,  2013;  Beritelli,  2011).  A  governança  também    contribui  para  fortalecer  a  identidade  territorial,  promover  a  participação  cidadã  e    estimular  o  desenvolvimento  endógeno,  fatores  essenciais  para  a  sustentabilidade  e    competitividade dos destinos.  Mais  recentemente,  a  noção  de  governança  foi  ampliada  com  a  incorporação  dos    princípios dos destinos turísticos inteligentes (DTI), que enfatizam o uso de tecnolo -  gias  digitais,  a  gestão  baseada  em  dados  e  a  inovação  como  pilares  para  a  gestão    turística (Gretzel et al., 2015; Ivars-Baidal et al., 2017). Nesse modelo, a governança   assume um papel ainda mais complexo e interativo, exigindo articulação entre pla -  taformas digitais, redes de conhecimento e mecanismos de escuta ativa da popula -  ção e dos visitantes. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 142  Dessa forma, a evolução do conceito de governança turística reflete a crescente com -  plexidade dos destinos e a necessidade de modelos de gestão mais horizontais, integra -  dos  e  responsivos.  Compreender  essa  trajetória  é  essencial  para  promover  políticas    públicas mais eficazes e democráticas, capazes de responder aos desafios do turismo   contemporâneo.  A  governança  deixa,  assim,  de  ser  apenas  um  mecanismo  adminis -  trativo para se tornar um instrumento de transformação social e de qualificação dos   territórios turísticos.  No cenário dos destinos turísticos inteligentes emerge como um conceito-chave para   potencializar a articulação entre inovação tecnológica e participação social na toma -  da de decisões. Com o avanço das tecnologias da informação e comunicação (TIC), o   conceito de governança inteligente passou a ser incorporado  às  práticas de gestão tu -  rística. Para Ivars-Baidal et al. (2017), a governança inteligente consiste na integração   entre inovação digital e processos colaborativos, permitindo que os destinos utilizem   dados e ferramentas tecnológicas para tomar decisões mais assertivas, promover po -  líticas públicas mais responsivas e engajar ativamente os stakeholders. Por fim, para   a Rede Iberoamericana de Destinos Turísticos Inteligentes - RIDTI, a Governança é um   modelo de coordenação institucional que compreende as estruturas de gestão, os me -  canismos de participação dos atores locais, a liderança e a visão estratégica do desti -  no para alcançar sua competitividade e sustentabilidade (RIDTI, 2025).  Quadro 1   Pesos e percentuais do Eixo Governança.  Âmbito   Requisito    Peso   %  A. Visão Estratégica de   Implementação  Relevância do turismo na organização   3   37,5  Ferramenta de gestão   1   12,5  Ferramenta de planejamento na promoção e   comercialização   1   12,5  Ferramentas de planejamento estratégico   2   12,5  Criação de produto turístico   1   12,5  Total do  âmbito   8   100  B. Eficiência na Gestão  Estruturas de coordenação na entidade local para o des -  envolvimento da atividade turística   2   66,7  Programa de Formação na entidade local   1   33,3  Total do  âmbito   3   100 \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 143  Âmbito   Requisito    Peso   %  C. Transparência e   Participação  Canais de comunicação com visitantes e residentes   3   42,9  Estruturas de colaboração  público- privada  e  público-  pública   2   28,6  Fomento da transparência da e-administração   2   28,6  Total do  âmbito   7   100  D. Responsabilidade e   Controle  Qualidade turística   1   20  Monitoramento das ações de fomento ao turismo   1   20  Observatório/processo de medição da atividade turística   2   40   Privacidade de dados   1   20  Total do  âmbito   5   100  Total do Eixo Governança   23   18%  Fonte: Red Iberoamericana de DTI, 2025.  Trata-se, portanto, de um salto qualitativo na forma de governar, que alia eficiência   tecnológica a valores democráticos e sustentáveis. Essa abordagem fortalece o posi -  cionamento  competitivo  dos  destinos  ao  mesmo  tempo  em  que  contribui  para  uma    gestão  mais  transparente,  inovadora  e  alinhada  aos  princípios  do  desenvolvimento    sustentável. No contexto do turismo, isso significa integrar sistemas de dados, plata -  formas digitais de engajamento  cívico e  ferramentas de monitoramento, para tornar   a gestão mais responsiva  às  necessidades, tanto dos visitantes quanto da população   local. A governança amplia a capacidade dos gestores em interpretar dados, anteci -  par tendências e tomar decisões baseadas em evidências.  Além disso, favorece a construção de ecossistemas colaborativos de inovação nos des -  tinos,  nos  quais  diferentes  agentes  –  como  governos,  universidades,  empresas,  star -  tups e organizações da sociedade civil – atuam de forma interconectada e horizontal.   Conforme  destaca  Buhalis  (2020),  esses  ecossistemas  são  fundamentais  para  trans -  formar os destinos em espaços dinâmicos, criativos e resilientes, capazes de respon -  der  rapidamente  a  crises,  adaptar-se   às   mudanças  no  comportamento  dos  turistas    e inovar nos modelos de oferta. A experiência de cidades como Curitiba, Barcelona e   Medellín demonstra que a governança vai além da digitalização: ela exige cultura de   cooperação, liderança distribuída e compromisso com a inclusão social e territorial.   Dessa forma, ela se consolida como um vetor transformador para destinos turísticos   mais sustentáveis e inovadores, além de representar uma evolução que alia participa -  ção e conectividade à gestão  pública tradicional. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 144  3.2.3. Destinos inteligentes e o ecossistema Curitiba DTI  Um destino turístico inteligente maduro integra as TIC no desenvolvimento de ações e   projetos para o turismo, criando um ambiente turístico inovador, sustentável e acessí -  vel para o visitante e o cidadão (Pinto, 2017). Nesse sentido, um destino é considerado   “ smart”   quando  a  tecnologia  é  amplamente  aplicada  e  integrada  de  maneira  contí -  nua,  utilizando  uma  variedade  de  soluções  interconectadas   às   infraestruturas  em    tempo real. O foco deve estar em proporcionar experiências altamente personalizadas   para os turistas, adaptadas ao contexto e que incluam momentos de descobertas es -  pontâneas  e  emocionantes.  Os  destinos  inteligentes  equilibram  as  necessidades  das    comunidades locais e dos visitantes, promovendo o turismo responsável e sustentável.   Eles  criam  uma  marca  autêntica  e  aspiracional,  são  eficientes  em  suas  operações  e    garantem  fácil  acesso  às  atrações, utilizando tecnologias acessíveis e inovadoras (So -  rokina, 2022).  Os conceitos emergentes, que ganham destaque diante dos temas acerca do DTI e das   Smart Cities, são a sustentabilidade e a “ smartness ” dos destinos turísticos. Os auto -  res Perles Ribes e Ivars Baidal (2018), no que consideraram uma exaustiva revisão de   literatura, estabeleceram a existência de uma forte conexão entre esses conceitos, em   que ambos, de um ponto de vista teórico e em um nível operacional, compartilham de   elementos como: visão e planejamentos a longo prazo, inovação, cooperação  público-  privado e o  envolvimento de  stakeholders.  Esses elementos tradicionais que partem de   ambos os conceitos, compartilham, concomitantemente de outros paradigmas, como   a competitividade. Os autores sugerem a criação de um modelo sinérgico focado em   sustentabilidade inteligente, baseada numa estrutura de governança que aplique tec -  nologia em 5 pilares fundamentais: planejamento, a eficiência das fontes de adminis -  tração,  monitoramento,  transparência  e  participação,  cooperação   público  privado,    conhecimento,  inovação  e  comunicação  e  o  aumento  da  preocupação  e  na  melhoria    da experiência do turismo.   A  cidade  de  Curitiba  foi  escolhida  para  a  aplicação  do  modelo  neste  estudo  de  caso    por  ser  amplamente  reconhecida,  tanto  nacional  quanto  internacionalmente,  como    uma referência em planejamento urbano sustentável, sendo frequentemente intitula -  da como “cidade modelo” e “cidade ecológica” (Rabinovitch, 1992; Reinach, 2006). Nos   últimos anos, esse protagonismo foi ampliado com o reconhecimento da cidade como   uma  Smart  City,  título  reforçado  por  diversas  premiações  e  rankings  internacionais    que destacam seu desempenho em áreas como mobilidade urbana, governança, meio   ambiente  e  inovação  tecnológica  (Rolnik,  2012;  Giffinger  et  al.,  2007;  Sousa,  2023).  A   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 145  consolidação de Curitiba como um hub de inovação está atrelada a políticas públicas   voltadas à economia criativa, ao empreendedorismo e ao uso intensivo de tecnologias   digitais aplicadas à gestão urbana (Komninos, 2013; Albino et al., 2015).  Sua participação ativa em redes e eventos internacionais voltados à temática das ci -  dades inteligentes — como o  Smart City Expo World Congress  — reforça sua visibili -  dade global e posiciona Curitiba como um laboratório urbano para o desenvolvimento   e  implementação  de  soluções  inovadoras  (Batty  et  al.,  2012;  Mora  et  al.,  2019).  Nesse    contexto, a capacidade de Curitiba em fomentar ecossistemas de inovação é facilitada   por um ambiente institucional estável, pela presença de centros de pesquisa e univer -  sidades, e por uma cultura de planejamento urbano estratégico, que favorece a arti -  culação entre atores públicos, privados e da sociedade civil (Nam & Pardo, 2011; Cunha   &  Cunha,  2021).  Assim,  a  cidade  torna-se  não  apenas  um  território  funcionalmente    inteligente, mas também simbólico, no sentido de representar um modelo estratégico   de inovação urbana integrada e sustentável.  A  trajetória  de  inovação  de  Curitiba,  está  articulada  com  ações  de  governança  es -  truturada ao longo dos anos, o que trouxe prestígio para o município nas temáticas   das  cidades  inteligentes,  criativas,  além  do   ênfase   trazido  para  a  sustentabilidade  e    planejamento urbano. A cidade destaca-se em seu caráter inovador e pioneiro, e nas   últimas décadas, tem investido fortemente na criação de um ecossistema de inovação   robusto, composto por universidades, centros de pesquisa, incubadoras, aceleradoras,   e políticas públicas voltadas ao incentivo de novas tecnologias (Severo & Bardi, 2024).   Curitiba conquistou, em menos de um ano, as premiações mais importantes de Smart   Cities, sendo eleita a Cidade Mais Inteligente do Mundo de 2023, a Comunidade Mais   Inteligente do Mundo de 2024 e troféu Prata do Seul Smart City Prize 2024 (Curitiba,   2025). Apesar de não haver um consenso universal da definição de uma Smart City, a   literatura aponta que a tecnologia exerce um papel essencial na formação desta, além   de dever focar nos cidadãos, ser inserida em uma economia competitiva e utilizar o   city marketing como instrumento das políticas urbanas (Sousa, 2023). Basicamente o   que diferencia uma Smart City de outros modelos que buscam associar as TIC ao espa -  ço urbano, são as premissas que envolvem a inclusão social por meio da valorização   do capital humano, intelectual e social (Buhalis y Amaranggana, 2014).  Nesse  sentido,  Sousa  (2023),  por  meio  do  mapeamento  de  iniciativas  de  inovação    acerca  do  conceito  de   Smart  City   na  cidade  de  Curitiba,  constatou  que  a  inovação    no  Turismo  está  limitada  ao  “Destino  Turístico  Inteligente  (DTI)  Curitiba”,  que  tem  o   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 146  objetivo de, por meio do trabalho dos setores  público, privado, academia e  sociedade   civil, acelerar a transformação de Curitiba em um DTI. O destino turístico inteligente   surgiu da noção de cidade inteligente e a sua conceituação ainda está sendo discutida   cientificamente. Ainda assim, podemos considerá-lo como uma plataforma de turismo   urbana  que  integra  os  recursos  turísticos,  as  TIC  e  as  tecnologias  móveis  inovado -  ras  para  fornecer  informações  explícitas  ao  turista;  melhorar  os  serviços  turísticos;    facilitar  a  interação  do  visitante;  melhorar  a  qualidade  da  experiência  do  turista  e    também  aprimorar  a  qualidade  de  vida  dos  residentes  (Xiang  et  al.,  2015;  Zhu  et  al.,    2014). Contudo,  é  importante ressaltar que alcançar a denominação DTI não depende   unicamente da disposição de recursos financeiros e da vontade de desenvolver ações   concretas, sendo imprescindível a modificação de gestão do território, o que implica   em mudanças substanciais na cultura colaborativa, bem como nas competências dos   agentes participantes do território (Flores-Ruiz et al., 2018).   3.2.4. O ecossistema Curitiba DTI à luz dos indicadores da Rede da Iberoamericana  A ativação do Ecossistema Curitiba DTI começou ainda em 2020, com encontros onli -  ne, liderados pelo Instituto Municipal de Turismo de Curitiba (IMT). O processo foi uma   iniciativa do Conselho Municipal de Turismo da cidade, em consonância com o plano   estadual de turismo vigente, o Masterplan Paraná Turístico 2026: pacto para um turis -  mo inteligente. Considerando a pandemia do Covid-19 e a estruturação do Programa   DTI Brasil do Governo Federal, o Ecossistema Curitiba Destino Turístico Inteligente foi   oficialmente lançado em 25 de março de 2022. marcando o início de uma jornada es -  truturada,  conforme  definido  no  Mapa  Estratégico  e  Plano  de  Ação  do  Ecossistema    Curitiba DTI, com horizonte até 2030. Trata-se de uma rede colaborativa, dinâmica e   interinstitucional, envolvendo uma parceria com o governo estadual e federal (Curi -  tiba, 2025).  O programa busca transformar a capital paranaense em um destino turístico inova -  dor, sustentável e inteligente. Foi baseado originalmente em eixos próprios, que consi -  deraram modelo internacional, e, posteriormente, adequado ao Programa DTI Brasil,   do Ministério do Turismo. Além disso, Curitiba passou a fazer parte do escopo do Pro -  grama Turismo Futuro Brasil, uma iniciativa do Sebrae Nacional e do Banco Intera -  mericano  de  desenvolvimento  (BID),  voltada  a  apoiar  alguns  municípios  brasileiros,    na efetiva implementação de estratégias DTI a partir da “elaboração de instrumentos   de planejamento e a implementação de ações-chave para o fortalecimento e consoli -  dação de suas estratégias de DTI” (Edital Sebrae BID, 2022, p.01). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 147  A rede de organizações envolvidas no Ecossistema Curitiba DTI incluem entidades cor -  respondentes  aos  eixos  das  IES/ICT  (Instituições  de  Ensino  Superior  e  Instituições  de    Ciência  e  Tecnologia),  Governamental,  Privado  (empresas  privadas)  e  Não  Governa -  mental, cujos participantes são apresentados no Quadro 01, em um total de 71 entida -  des que integram o Ecossistema DTI Curitiba (Curitiba, 2025).  Os  eixos  estratégicos  representam  os  fatores-chave  que  compõem  a  caracterização    de  um  DTI,  e  foram  elaborados  a  partir  de  inter-relações,  transversalidades  e  com -  plementaridades entre si (Curitiba, 2025). Alinhado à conjuntura dos eixos, foram de -  finidas  as  diretrizes  acerca  dos  mesmos,  apresentadas  no  quadro  02,  que  servem  de    base para a composição dos GT, são eles: Governança e Segurança; Sustentabilidade,   Acessibilidade  Universal  e  Mobilidade  e  Transporte;  Tecnologia  e  Inovação  e  Marke -  ting, Experiência e Criatividade.  Quadro 2   Diretrizes dos Grupos de Trabalhos Temáticos.   GT - DTI   DIRETRIZES  Governança e   Segurança  Gestão transparente, aberta, pactuada e responsável;   Visão integrada ao território e comprometida com os cidadãos e os turistas;   Ampla  cooperação  e  articulação  interinstitucional  pública-privada-comuni -  tária–acadêmica;  Fortalecer o combate à exploração sexual e infantil, violência contra as mino -  rias e gênero, raça, mulher e trabalho infantil. Fazer monitoramento sistêmi -  co de crimes praticados contra o visitante.   Cumprir os protocolos sanitários exigidos pelos  órgãos  competentes.  Sustentabilidade   Acessibilidade   Universal e   Mobilidade e   Transporte  Gestão eficiente da sustentabilidade turística;   Implementação  de  estratégias  e  mecanismos  alinhados  e  comprometidos    com os Objetivos de Desenvolvimento Sustentável (ODS-ONU, Agenda 2030);  Implementação  eficiente  de  estratégias  e  mecanismos  de  inclusão  social,    acessibilidade e desenho universal que permitam o uso amplo, seguro e autô -  nomo dos ambientes físicos e digitais do destino;  Gestão integrada da mobilidade com foco nos visitantes e nos cidadãos;  Gestão e monitoramento inteligente dos fluxos e usos turísticos no destino.  Tecnologia e Inovação  Infraestrutura  física  e digital necessárias ao destino, centrada no ser humano;   Estabelecimento de um sistema de conhecimento e inteligência turística;   Gestão da tecnologia aplicada à governança turística;  Sistema de conhecimento e inteligência turística como instrumento de apoio   à inovação;   Soluções inovadoras e criativas para as necessidades do destino. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 148  GT - DTI   DIRETRIZES  Marketing,   Experiência e   Criatividade  Realização de estudos e pesquisas com foco na compreensão dos comporta -  mentos  sociais  e  características  do  mercado  (hábitos  de  consumo  e  tendên -  cias);   Produção de conhecimento e inteligência turística, com base em tecnologias   de exploração de dados em ambientes interacionais digitais;   Inovação  como  estratégia  para  implementação  de  ações  de  promoção  e  co -  mercialização turística, com foco em mercados e segmentos prioritários;  Implementação de estratégias e mecanismos de geração de experiências per -  sonalizadas, antes, durante e depois da visita ao destino;   Gestão da experiência turística como elemento educacional e transformacio -  nal das relações interpessoais no destino (morador e turista);  Utilizar o título de Curitiba Cidade Criativa da UNESCO em favor do turismo;   Promover a economia criativa para gerar e incentivar o consumo de produ -  tos, bem como valorizar o artesanato e a arte popular;  Usar a criatividade como base para experiências turísticas.  Fonte: Elaboração própria com base no Mapa estratégico e plano de ação: Curitiba Destino Turístico Inteli -  gente – Horizonte 2030 (2025).  A concepção e formulação dos eixos foram fundamentadas por iniciativas que busca -  ram desenvolver uma metodologia própria (desde 2020) e, ao mesmo tempo, adapta -  da à realidade brasileira, cujas diretrizes são indicadas pelo Programa DTI Brasil do   Ministério do Turismo (Ministério do Turismo de Brasil, 2022). Nesse sentido, em 2021   Curitiba foi contemplada pelo Programa nacional e adaptou seu Ecossistema, para os   eixos estabelecidos pelo Programa DTI Brasil e vem trabalhando, com pioneirismo e   iniciativa para sua consolidação, enquanto destino turístico inteligente.  Considerando  todo  este  contexto  e  as  particularidades  e  individualidades  apresen -  tadas pelo Ecossistema Curitiba Destino Turístico Inteligente, a análise que segue no   quadro 03 apresenta a comparação de ações e estruturas da governança do Ecossis -  tema  Curitiba  DTI,  à  luz  dos  indicadores  apresentados  no  eixo  Governança  da  Red    Iberoamericana. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 149  Quadro 3   Análise da Governança DTI Curitiba x Requisitos de Governança da Rede Iberoamericana.   Âmbito  Requisito  Indicador  Como Avaliar  Ação/Instrumento Curitiba DTI / IMT  Visão Estratégica de   Implementação  Relevância  do  turismo    na organização     1.Compromisso   da Entidade   Local co rno Fede -  ra (Nacional)l;  https://www.gov.br/turismo/pt-br/cen -  trais-de-conteudo-/publicacoes/desti -  nos-turisticos-inteligentes-dti    Rede  Iberoamericana  de  Turismo  Inteli -  gente (Internacional).  https://destinosinteligentesiberoamerica.  com/   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 154  Âmbito  Requisito  Indicador  Como Avaliar  Ação/Instrumento Curitiba DTI / IMT  Responsabilidade e   Controle  Observatório/  proces -  so  de  medição  da  ativi -  dade turística  1. Processo   de medição   periódica da   atividade   turística  25%:  Monitoramento  dos  principais  in -  dicadores  de  demanda  turística  (local    de origem, estadia média, tipo de aloja -  mento,  meio  de  transporte,  método  de    reserva da viagem, motivação, padrões   de deslocamento e/ou gastos, etc.).  25%:  Monitoramento  para  quantificar    e  caracterizar  a  oferta  (tipos  de  esta -  belecimentos  e  serviços,  localizações,    categorias, etc.)  20%: Avaliação da satisfação do turista.  15%:  Monitoramento  dos  atrativos  tu -  rísticos mais visitados.  15%:  Monitoramento  da  contribuição    econômica  do  turismo  para  a  região    (impacto econômico e laboral).  0%: Sem medição periódica da ativida -  de turística.  Plataforma  POTI  –  sistema  de  monitora -  mento em desenvolvimento pelo IMT.  Link plataforma Poti  2. Procedimento   para comunicar   os dados   de análises   vinculadas   a atividade   turística  100%:  Existe  um  sistema  de  inteligên -  cia turística com atualizações mensais,   vinculado aos eixos do modelo DTI.  75%:  Existe  um  sistema  de  inteligência    turística com atualização ao menos se -  mestral.   50%: Existe um observatório de turismo   com  atualizações,  pelo  menos,  semes -  trais.   25%: Existe um procedimento de comu -  nicação  de  dados  relacionados  com  as    atividades  turísticas  (por  exemplo,  bo -  letins informativos) que é TI.  Quanto  à  criação  de  produto  turístico,  observa-se  consonância  com  as  diretrizes  da    Rede Iberoamericana, por meio do desenvolvimento e promoção do Turismo de Expe -  riência e outras iniciativas inovadoras que visam diversificar e personalizar a oferta.   Já no requisito Formação na Entidade Local, a atuação da Escola de Turismo assegura   a qualificação contínua de profissionais e empreendedores, contribuindo para a eleva -  ção da competitividade e da qualidade dos serviços.  No que tange  às  Estruturas de coordenação e de colaboração  público-privada  e  público-  pública, a  coexistência do COMTUR e do Ecossistema Curitiba DTI, somada à articulação   com redes como o Vale do Pinhão e o Ecossistema de Inovação, reforça a prática de go -  vernança colaborativa, um dos pilares da inteligência territorial no turismo.  O Observatório/processo de medição da atividade turística apresenta potencial para   fortalecimento da gestão baseada em dados. A referência à Plataforma POTY demons -  tra intenção de estruturar um sistema de monitoramento contínuo; contudo, a ausên -  cia  de  informações  sobre  sua  operacionalização  e  periodicidade  de  coleta  de  dados    constitui  um  ponto  de  atenção.  Em  contrapartida,  a  disponibilização  de  relatórios  e    estatísticas no portal oficial do turismo municipal atende ao princípio da transparên -  cia e permite a comunicação eficaz dos resultados à sociedade. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 156  Em  síntese,  as  ações  implementadas  em  Curitiba  evidenciam  coerência  com  a  pro -  posta de governança de um destino DTI, destacando-se pela solidez do planejamento   estratégico,  pela  articulação  multissetorial  e  pela  priorização  da  qualificação  pro -  fissional.  Além  disso,  a  implementação  de  estratégias  inteligentes  também  parte  do    pressuposto da competitividade, que segundo Buhalis e Leung (2018), baseia-se na in -  tegração de uma rede de organizações e características inteligentes que envolvem sis -  temas inter operacionais e inter conectados para simplificar e automatizar atividades   diárias, adicionando valor no Ecossistema para todos os stakeholders.  3.2.5. Considerações finais  No contexto dos destinos turísticos inteligentes (DTI), a governança adquire um novo pa -  tamar de complexidade e protagonismo. Mais do que coordenar ações, ela passa a figu -  rar como mediadora de processos de co-criação de valor, mobilizando atores diversos por   meio de redes digitais, plataformas de dados e espaços de participação social. Essa nova   configuração  exige  competências  institucionais  que  vão  além  da  gestão  tradicional,  in -  corporando inovação tecnológica, transparência, análise de dados em tempo real e escuta   ativa de residentes e visitantes. Ela deixa de ser apenas um mecanismo de coordenação   administrativa  para  se  tornar  uma  prática  articuladora,  capaz  de  integrar  diferentes    atores em torno de objetivos comuns. Essa transição se dá porque o turismo inteligente   depende de múltiplos fluxos de informação, inovação tecnológica e de processos colabora -  tivos que extrapolam as formas tradicionais de gestão  pública  e privada.  Mais do que coordenar ações isoladas, a governança em DTIs figura como mediadora   de processos de co-criação de valor, envolvendo não apenas gestores e empreendedo -  res,  mas  também  residentes  e  visitantes.  Por  meio  de  redes  digitais,  plataformas  de    dados abertos e fóruns participativos, constrói-se um ecossistema em que as decisões   são  tomadas  de  forma  mais  transparente,  inclusiva  e  ágil.  Nesse  sentido,  a  partici -  pação social e a conectividade tornam-se elementos estruturantes, capazes de gerar   legitimidade, confiança e engajamento contínuo.  Essa nova configuração de governança demanda competências institucionais que vão   além da gestão convencional. É necessário incorporar inovação tecnológica como re -  curso  estratégico,  utilizar  análise  de  dados  em  tempo  real  para  orientar  políticas  e    práticas, e adotar mecanismos de escuta ativa que capturem as percepções dos dife -  rentes públicos. Somente a partir dessa integração entre tecnologia, transparência e   participação  social  é  possível  consolidar  destinos  turísticos  mais  competitivos,  resi -  lientes e sustentáveis no cenário contemporâneo. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  3.2. Eje Gobernanza 157  A  experiência  de  Curitiba,  ao  alinhar  políticas  públicas  sustentáveis  com  os  pilares    do modelo DTI — inovação, tecnologia, acessibilidade, sustentabilidade e governança   colaborativa — ilustra a viabilidade de implementação de estratégias inteligentes em   contextos urbanos latino-americanos.  Referências bibliográficas  Albino, V., Berardi, U., & Dangelico, R. M. (2015).  Smart cities: Definitions, dimensions,   performance, and initiatives.  Journal of Urban Technology , 22(1), 3–21.  https://doi.  org/10.1080/10630732.2014.942092  Beritelli,  P.,  Bieger,  T.,  &  Laesser,  C.  (2007).  Destination  Governance:  Using  Corpora -  te  Governance  Theories  as  a  Foundation  for  Effective  Destination  Management.    Journal of Travel Research ,  46 (1), 96-107.  https://doi.org/10.1177/0047287507302385  Batty, M., Axhausen, K. W., Giannotti, F., Pozdnoukhov, A., Bazzani, A., Wachowicz, M.,   ... & Portugali, Y. (2012). Smart cities of the future.  The European Physical Journal   Special Topics , 214(1), 481–518.  https://doi.org/10.1140/epjst/e2012-01703-3  Beritelli, P. (2011). Cooperation among prominent actors in a tourist destination.  Tou -  rism Review , 66(2), 40–48.  https://doi.org/10.1016/j.annals.2010.11.015  Boes, K., Buhalis, D., & Inversini, A. (2016). Smart tourism destinations: ecosystems for   tourism destination competitiveness.  International Jo
