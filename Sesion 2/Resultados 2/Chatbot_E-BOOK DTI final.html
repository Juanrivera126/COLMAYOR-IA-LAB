  destaque  para  outros  estados:  Goiás  apresentou  um  crescimento  de  11,8%,  Espírito    Santo com 11,7%, Bahia com 11,4%, Pará com 9,5% e Amazonas com 8,5%, as últimas   da região norte. Santa Catarina na região sul destacou-se com 8,7% impulsionada pela   chegada de turistas internacionais, sendo 198.720 visitantes estrangeiros apenas em   janeiro de 2025 (Ministério do Turismo, 2025a).   O  setor  de  turismo  passa  a  se  tornar  um  dos  grandes  motores  da  economia  nacio -  nal, havendo destaque para a descentralização de resultados e gerando oportunida -  des  nas  diversas  regiões  do  país  (Ministério  do  Turismo,  2025b).  Apenas  em  2024,  a    PANROTAS  (2025a)  destaca  que  o  turismo  foi  responsável  pelo  faturamento  total  de    207 bilhões de reais, havendo um crescimento do turismo em cerca de 19 estados (Fe -  comercioSP, 2024). O crescimento foi motivado tanto pela demanda aquecida quanto   pela inflação, um crescimento de 4,3% em comparação com o ano anterior, estimulado  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 34  principalmente pelo desempenho da economia nacional. Estima-se que o turismo seja   responsável por cerca de 8 milhões de empregos no país.  A Agência Brasileira de Promoção Internacional do Turismo - EMBRATUR (2025) apresen -  tou dados relevantes sobre o turismo no país. A respeito do turismo internacional no país,   7,34  bilhões  de  dólares  em  divisas  ocorreram  em  2024,  sendo  recebidos  6,77  milhões  de    turistas no mesmo ano e uma expectativa de aumento de 12,1% de voos em 2025 em com -  paração com 2024. No campo dos empregos, a maioria das admissões ocorre pela faixa   etária entre 25 e 39 anos, com maior prevalência do gênero feminino, raça parda ou bran -  ca e ensino médio completo em sua prevalência. O saldo registrado em 2024 foi de 147.861   empregos, comparando 2.199.870 admissões e 2.052.009 desligamentos (EMBRATUR, n.d.).  Embora  haja  grande  atividade  turística  interna,  faz-se  necessário  conhecer  os  da -  dos das chegadas internacionais, principalmente em grau comparativo com demais   países.  A  respeito  do  ano  de  2025,  até  julho  de  2025  foram  registradas  a  chegada  de    5.952.254 turistas, 47,54% superior ao mesmo período em 2024. Para esse período, 2,5   milhões  de  visitantes  foram  da  Argentina,  seguidos  pelo  Chile  com  495  mil,  Estados    Unidos com 465 mil, Uruguai 342 mil e Paraguai com 341 mil visitantes. Os principais   portões de entrada foram  São Paulo  com 1,53 mi de turistas, seguido por Rio de Janei -  ro com 1,32 mi, Rio Grande do Sul com 1,25 mi, Paraná com 710 mil e Santa Catarina   com 549 mil visitantes. Apenas em janeiro de 2025, as 1.483.669 chegadas no país, se -  gundo a Embratur (n.d.), relata que as principais vias de acesso foram terrestres com   54,10%, aérea com 40,99%, marítima com 3,69% e fluvial com 1,62% (EMBRATUR, n.d.).  O ano de 2024 foi o melhor ano dos registros, atingindo o quantitativo de 6.773.619 de   visitantes internacionais. Para tanto, alguns pontos são unanimidade nas escolhas e   passam a ter destaques como os principais locais visitados pelos turistas no Brasil a   citar, como exemplo, por regiões (Guia Viajar Melhor, 2025):  •  Centro-Oeste: Bonito (MS) por conta do contato com a natureza, Chapada dos   Veadeiros (GO) com destaque  às  cachoeiras, o Pantanal pela peculiaridade da   vida do pantaneiro e Pirenópolis (GO), o qual apresenta vilas e cachoeiras para   receber os turistas;  •  Nordeste: Fernando de Noronha (PE)  é  um dos arquipélagos mais cobiçados a   se conhecer no mundo pela sua natureza preservada, Maragogi (AL) com a sua   costa esmeralda e praias paradisíacas, Porto de Galinhas (PE), praias do Ceará   e  os  lençóis  maranhenses  com  suas  características  peculiares,  além  de  todo  o    aspecto cultural de Salvador na Bahia e Recife e Olinda em Pernambuco; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 35  •   Sudeste:  Destaque  para  as  atrações  e  negócios  da  cidade  de  São  Paulo,  a  re -  ferência mundial em turismo do Rio de Janeiro (RJ) por conta de sua natureza   exuberante e pontos clássicos como Cristo Redentor, Copacabana e Pão de Açú -  car, além de Petrópolis (RJ) com sua história e a natureza de Paraty (RJ);  •  Norte: Belém (PA) sede da COP30 e sua culinária, assim como Manaus (AM) e a   riqueza da Amazônia, com destaques para os Rio Negro e Solimões e o Teatro   Amazonas;  •  Sul: por  último  e não menos importante, o turismo de frio de cidades como Gra -  mado (RS) e todo seu avanço na recepção do turista com hotéis únicos, as Cata -  ratas do Iguaçu em Foz do Iguaçu (PR), além de cidades com praias como Flo -  rianópolis e Balneário Camboriú (SC) que surge como a atual “Dubai Brasileira”   com parques temáticos, prédios e o ecoturismo.  2.2.2. Estrutura Governamental do Turismo  O Ministério do Turismo (MTur) foi criado no ano de 2003,  órgão  vinculado ao Poder   Executivo,  órgão  da Administração  Pública Federal. O  Ministério do Turismo (n.d) tem   como  atribuição  formular,  coordenar  e  executar  a  política  nacional  de  desenvolvi -  mento do turismo. Suas competências e atribuições são definidas em decretos oficiais   e seu papel está entre o de formular políticas para o desenvolvimento sustentável do   setor,  promover  e  divulgar  o  turismo  no  país  e  no  exterior  e  articular  com  estados    e municípios para a execução de programas turísticos. Além disso, o  órgão  também   elabora  o  Plano  Nacional  de  Turismo  que  define  a  atuação  dos  diferentes  níveis  de    governo no setor, por meio da lei 11.771/2008 (Brasil, 2008).   Outro    órgão   importante  é  o  Serviço  Social  Autônomo  Supervisionado,  a  quem  está    vinculada  a  EMBRATUR.  Esta,  de  acordo  com  a  suas  atribuições  (EMBRATUR,  n.d.),    tem o papel de promover os destinos brasileiros no exterior. Seu papel de fomentar a   atividade turística no país ao viabilizar condições para a geração de emprego, renda   e desenvolvimento em todo o país ainda perduram nos papéis da agência brasileira.  De acordo com o organograma do Ministério do Turismo (2025), as políticas de Desti -  nos Turísticos Inteligentes são tratadas pela Secretaria Nacional de Políticas de Turis -  mo (SNPTur). Dentro dessa secretaria, o Departamento de Ordenamento, Inteligência   e Desenvolvimento do Turismo (DEOTur) trata dos principais projetos que envolvem a   implementação das estratégias nacionais de DTI, conforme a Figura 1, são apresenta -  dos os principais  órgãos  do Ministério.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 36  Figura 1.    Organograma do Ministério do Turismo do Brasil  Fonte: Ministério do Turismo (2025a).   No  âmbito  dos Estados, estes são responsáveis por planejar e promover o turismo den -  tro das suas regiões, alinhando-se com as diretrizes nacionais, além de criar estraté -  gias  específicas  de  marketing  turístico  (Brasil,  2008).  Os  principais   órgão   estaduais    são as secretarias de governo em cada poder executivo dos 26 Estados mais o Distrito   Federal. Os Municípios possuem uma gestão mais direta e imediata na gestão do tu -  rismo e as Secretarias Municipais de Turismo possuem um papel vital na criação de   políticas que favoreçam o desenvolvimento e a promoção do turismo local.  De acordo com o Ministério do Turismo (2025), mais de 800 milhões foram destinados   para  melhoria  da  infraestrutura  turística  apenas  em  2024.  Para  atuar  no  Mapa  do    Turismo por meio da ferramenta do Programa de Regionalização do Turismo (PRT) e   atendendo à Nova Lei Geral do Turismo e ao Plano Nacional do Turismo 2024-2027, os   municípios  brasileiros  deverão  atender  alguns  critérios  específicos:  Possuir  uma  se -  cretaria ou departamento de Turismo; Contar com uma Lei Orçamentária específica;   Ter prestadores de serviços turísticos cadastrados no CADASTUR; Manter um Conse -  lho Municipal de Turismo ativo; Assinar um termo de compromisso; e Preencher a aba   de atividades turísticas no sistema. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 37  2.2.3. Surgimento do DTI no Brasil  As primeiras iniciativas de discussão sobre Destinos Turísticos Inteligentes no Brasil   ocorreram entre 2015 e 2017, por meio dos Seminários Brasil-Espanha de Inovação Tec -  nológica em Turismo, realizados no Câmpus Continente do Instituto Federal de Santa   Catarina (IFSC), em Florianópolis (SC).  Os eventos foram organizados pelo Prof. Dr. Alexandre Augusto Biz  — à época docente   do Departamento de Turismo da  Universidade Federal do Paraná (UFPR) e atualmen -  te vinculado ao Departamento de Engenharia do Conhecimento da Universidade Fe -  deral de Santa Catarina (UFSC) —, em parceria com o Prof. Dr. Luiz Augusto Machado   Mendes Filho (docente do Departamento de Turismo da Universidade Federal do Rio   Grande do Norte – UFRN), o Prof. Vinicius de Luca Filho e o Prof. Dr. Tiago Savi Mondo   (ambos docentes do Câmpus Continente do IFSC), todos com apoio do Conselho Nacio -  nal  de  Desenvolvimento  Científico  e  Tecnológico  -  CNPq,  edital  MCTI/CNPq/FINEP,  e    transmito ao vivo pela TV IFSC 2 .   O Iº Seminário ocorreu entre os dias 28 e 29 de abril de 2015, com a temática “Destinos   Turísticos Inteligentes” e teve o Sr. Antonio López de Avila Muñoz - Presidente da  So -  ciedad Estatal para la Gestión de la Innovación y las Tecnologías Turísticas  S.A. (SE -  GITTUR)  vinculado  ao  Ministério  da  Indústria,  Energia  e  Turismo  da  Espanha,  como    palestrante (participação virtual) da abertura do seminário (Biz, 2015).   O IIº Seminário ocorreu entre os dias 03 e 04 de maio de 2016 com a temática “Inovação   e Empreendedorismo” e contou com a participação do Sr. Enrique Lancis Sanjoaquin    – Diretor de Tecnologia e Desenvolvimento de Negócio (SEGITTUR 3 ) em uma mesa de   debate com a representante Sr. Jun Alex Yamamoto – Diretoria de Gestão Estratégica   do Ministério do Turismo (MTur) e Sr. André Spínola – do Serviço Brasileiro de Apoio   às  Micro e Pequenas Empresas (SEBRAE) (Biz, 2016).  Por  fim,  o  IIIº  Seminário  realizado  entre  os  dias  09  e  10  de  maio  de  2017,  novamente    com  a  temática  “Destinos  Turísticos  Inteligentes”  contou  com  a  participação  de  al -  guns atores parceiros da SEGITTUR na Espanha - Sr. Jesus Herrero Arranz – Mercado   Turismo  em  TECNALIA  Research  &  Innovation  e  a  Sra.  Esther  Valero  Rello  –  Técnica    de  Estudos  INVAT.TUR  /  Agència  Valenciana  del  Turisme,  e  na  América  do  Sul  com  o    Sr. Luis Sosa Mendoza – Diretor de Inovação Tecnológica do Ministério de Turismo da   Argentina (Biz, 2017).  2  Link abertura do Seminário -  https://www.youtube.com/watch?v=-1KfyACe3ps&t=767s .   3  Link da palestra -  https://www.youtube.com/watch?v=OfQBqxk_HR8&t=6298s   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 38  Neste  seminário  o  SEBRAE  teve  a  participação  da  Sra.  Graziele  Vilela  –  Coordenadora    Nacional de Turismo - Sebrae Nacional, e do Sr. Alan David Claumann – Coordenador de   Turismo do Sebrae/SC, e como resultado, o SEBRAE lança em julho de 2016 um documento   intitulado “Destinos Turísticos Inteligentes 4  :   Tecnologias de informação e desenvolvimen -  to  sustentável”  onde  explica  que  o  conceito  de  Destinos  Turísticos  Inteligentes  (DTI)  tem    origem nas Cidades Inteligentes, mas se diferencia por ter foco no turismo, considerando   limites geográficos, interação com visitantes e a valorização da experiência do turista. A   ideia central é que um destino inteligente seja inovador, apoiado em infraestrutura tecno -  lógica de ponta, acessível a todos, e que promova o desenvolvimento sustentável do terri -  tório turístico, melhorando a qualidade da vivência dos visitantes (SEBRAE, 2016).  Cita  o  documento  que  os  DTI  têm  como  pilares  governança,  tecnologia  e  sustentabi -  lidade,  e  sua  proposta  é  facilitar  a  integração  do  turista  antes,  durante  e  depois  da    viagem,  por  meio  de  metodologias  e  ferramentas  inovadoras.  Além  disso,  oferecem    vantagens  como  maior  competitividade,  eficiência  na  gestão,  valorização  do  capital    humano e geração de experiências turísticas de qualidade (SEBRAE, 2016).  O boletim apontou ainda que os destinos inteligentes trazem benefícios diretos para a   competitividade do setor, mas também desafios, como a padronização de critérios, o   investimento necessário em inovação e conectividade e a adaptação das políticas pú -  blicas. No Brasil, embora haja grande potencial turístico, a transformação de cidades   em  destinos  inteligentes  ainda  é  um  processo  em  construção,  mas  iniciativas  como    parcerias  público-privadas,  colaboração com universidades e uso intensivo de tecno -  logias digitais são vistas como caminhos para acelerar essa evolução (SEBRAE, 2016).  Em 2021, o SEBRAE apresentou alguns resultados de ações em alguns destinos turís -  ticos a partir do seu próprio modelo de DTI dividido em quatro eixos (SEBRAE, 2021):  •  Governança:    A  estratégia  deste  eixo  é  empoderar  as  lideranças  empresariais    e trabalhar para que a administração  pública  seja parceira, uma vez que sem   uma governança inteligente não é possível ter um destino turístico inteligente;  o  Case 1: Formação de lideranças em Fortaleza (CE)  o  Case 2: Observação de Baleias Jubarte em Vitória (ES)  o  Case 3: Rally dos Sertões (TO)  o  Case 4: Caravana Sebrae: Concurso Sabores dos Sertões  4   Disponível  em:   https://sebrae.com.br/Sebrae/Portal%20Sebrae/Anexos/BI_Tur_2016_06_Destinos%20Tur%c3%adsti -  cos%20Inteligentes.pdf   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 39  •  Tecnologia:    O  foco  do  eixo  é  trabalhar  a  integração  de  soluções  tecnológicas    com os negócios turísticos para impulsionar a inovação no turismo. O turista é   o principal cliente de um destino, então o que ele demanda deve ser considerado   nas estratégias;  o  Case 1: Caravana Sebrae: Concurso Sabores dos Sertões  o   Case  2:  Projeto  Viva  o  RS  divulga  experiências  turísticas  no  Rio  Grande  do    Sul  o  Case 3: Voucher Digital Barreirinhas torna o turismo mais seguro no Maran -  hão  o  Case 4: Sebrae ada@pte: novos desafios exigem novas soluções em Alagoas  •  Sustentabilidade:    Investir  em  práticas  sustentáveis  que  podem  gerar  mais    oportunidades  de  trabalho,  além  de  promover  a  inclusão  de  comunidades  lo -  cais tradicionais e a preservação da natureza. Esses são requisitos para que o   destino turístico seja considerado sustentável.   o  Case 1: Retomada do turismo rural e de natureza no DF  o  Case 2: Programa Check-in incentiva o turismo no Mato Grosso  o  Case 3: Selo Turismo Responsável em Roraima  o  Case 4: Sou Curitiba Souvenirs (PR)  •  Experiência:  Mais do que ser bem atendido, o turista precisa ser constantemen -  te encantado. Por isso, humanização, personalização e uso da tecnologia devem   ser considerados para que a experiência seja pensada ao longo de toda a jorna -  da, não apenas durante a estada no destino.  o  Case 1: Criação de roteiros religiosos em Salvador (BA)  o  Case 2: Retomada do turismo rural e de natureza no DF  o  Case 3: Observação de Baleias Jubarte em Vitória (ES)  o  Case 4: Turismo de experiência na Chapada dos Veadeiros (GO)  Em outubro de 2020, o Ministério da Ciência, Tecnologia e Inovações e o Ministério do   Turismo  celebraram  um  acordo  de  cooperação   técnica,  para   fins  de  estabelecer  um    trabalho conjunto e sinérgico com foco em inovação para o turismo com objetivo de   implementar políticas públicas para o desenvolvimento de ações que propiciarão a di -  gitalização e a transformação de destinos turísticos em destinos turísticos inteligentes   entre os anos de 2020 e 2023 (MCTI, 2020). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 40  Entre as metas estabelecidas, destacam-se (MCTI, 2020):  •  Implementar ações para a transformação digital dos destinos;  •  Auxiliar no compartilhamento de informações;  •  Organizar Fóruns de Inovação;  •  Estabelecer a Câmara do Turismo 4.0;  •  Promover Polos Tecnológicos do Turismo;  •   Promover  a  Difusão  da  Inovação,  disseminando  tecnologias  e  demandas  por    inovação para o aumento da produtividade e competividade do setor turístico;  •  Elaborar e apoiar estudos  técnicos,  próprios ou de  órgãos  e instituições  públicas   e/ ou privadas.  No início do ano de 2021, o MCTI e MTur implementam a Câmara do Turismo 4.0 com   três grupos de trabalho, GT1 - Qualificação e desenvolvimento de produtos com foco   na Jornada do Turista 4.0, GT 2 - Desenvolvimento de Destinos Turísticos Inteligentes,   e  GT  3  -  Soluções  e  Tecnologias  Digitais  para  o  Turismo  4.0  (Ministério  do  Turismo,    2021c).  Especificamente o GT2 tinha objetivo de elaborar e consolidar propostas sobre o tema   “Destinos Turísticos Inteligentes” (DTI), incluindo ações ligadas à mobilidade, à segu -  rança e à melhoria dos gargalos; incentivar os instrumentos de transformação digital   como  meio  de  transformação  dos  destinos  em  DTI  com  foco  na  competitividade  dos    destinos  turísticos  brasileiros,  a  partir  de  duas  ações  (Ministério  do  Turismo/MCTI,    2021):  •  Ação 1: Propor ações para reduzir os gargalos existentes nos destinos referen -  tes à sustentabilidade, acessibilidade, segurança, etc; e   •  Ação 2: Estimular a transformação digital com vistas ao aumento e à melhoria   do acesso à internet pública gratuita nos destinos turísticos brasileiros.  Consecutivamente no mesmo período, o Ministério do Turismo deu início ao DTI Brasil   em  parceria  com   o  instituto  argentino  Ciudades  Del  Futuro  (ICF)  e   com  a  Sociedade    Mercantil Estatal para a Gestão da Inovação e as Tecnologias Turísticas (SEGITTUR),   da Espanha (Ministério do Turismo, 2021a).   As ações do MTur buscaram impulsionar o desenvolvimento tecnológico e fortalecer   destinos  turísticos  mais  competitivos,  atraentes  e  inovadores,  beneficiando  tanto  os   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 41  visitantes  quanto  os  moradores  locais,  sempre  com  atenção  à  sustentabilidade  e  à    acessibilidade. Entre os resultados desejados no projeto estavam a elevação da com -  petitividade (principal vantagem), pois permitiria avaliar e comparar o desempenho   de  cada  destino  em  aspectos  como  infraestrutura,  mobilidade  e  conectividade,  além    de estimular a qualificação dos atrativos e serviços turísticos. Dessa forma, buscava -  -se  proporcionar  experiências  mais  inteligentes,  criativas  e  interativas  aos  turistas    (Ministério do Turismo, 2021b).   O  MTur  adotou  o  conceito  de  DTI  como   um  destino  turístico  que  gerencia  seus  pro -  cessos e seu território, de forma inovadora e sustentável, comprometido com pilares   que impactam positivamente a qualidade de vida dos moradores e a experiência dos   turistas  (Ministério do Turismo, 2021c).   Além dos cinco eixos de DTI da SEGITTUR (governança, tecnologia, inovação, acessi -  bilidade e sustentabilidade), o Ministério do Turismo verificou que a metodologia ori -  ginal precisava de adequações para se ajustar  às  características específicas do Brasil,   especialmente em função de sua grande extensão territorial, para tanto, criou quatro   outros eixos para atender as realidades do país, a saber:  Quadro 1.    Eixos DTI criados pelo modelo brasileiro.   Novos Eixos   Explicação  Segurança   Identificação e promoção de medidas de controle e mitigação de   riscos, além de disponibilização de informações aos turistas acer -  ca das medidas de segurança, preventivas e de autocuidado por   uma visita segura  Promoção e Marketing   Estratégia focada na melhoria do relacionamento entre o destino   e o turista, por meio da oferta de experiências de valor e de ações   que proporcionem o fortalecimento da imagem do destino e a pro -  moção com seu  público  Mobilidade e Transporte   Trabalho  focado  na  melhoria  da  mobilidade  e  da  conectividade    aérea e de estradas do  e para o destino, identificando a disponibi -  lidade de infraestrutura e de meios de transporte existentes  Criatividade   O destino deve assumir um compromisso com a incorporação da   criatividade  no  desenvolvimento  de  políticas  públicas,  visando    o  fortalecimento  da  cultura  e  do  turismo  por  meio  da  economia    criativa  Fonte: BRASIL/MTur, 2021c.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 42  A  adaptação  do  modelo  à  realidade  local,  com  105  requisitos,  foi  essencial  para  per -  mitir que os gestores brasileiros trabalhassem temas menos evidentes no referencial   espanhol. Essa adaptação só foi possível graças à parceria com o Instituto Ciudades   del Futuro (ICF), entidade que apoia comunidades locais na Argentina na concepção   e  implementação  de  iniciativas  inovadoras  voltadas  ao  desenvolvimento  humano    sustentável e inclusivo. Por meio do uso de novas tecnologias e de modelos de gestão   inteligente e participativa, o ICF contribui para a melhoria da qualidade de vida das   gerações atuais e futuras, promovendo a transformação social e produtiva e valori -  zando o patrimônio natural e cultural (Ministério do Turismo, 2022).  Importante  destacar  que  o  modelo  proposto  pelo  MTur  repassa  a  responsabilidade    ao  órgão  gestor, diga-se a Entidade Legal de Turismo do Município, que deve planejar   ações que atendam  às  metas estabelecidas e contidas no plano: a) iniciativas a serem   tomadas; b) forma específica em que serão realizados; c) recursos que serão necessá -  rios;  d)  responsabilidades  e  autoridades  para  sua  realização;  e)  datas  e  prazos  para    execução; f) método e frequência de monitoramento, além de determinar e fornecer os   recursos  necessários  para  o  estabelecimento,  implementação,  manutenção  e  melho -  ria contínua do sistema de gestão do DTI (Ministério do Turismo, 2022).  2.2.4. Ações de DTI no Brasil   O  MTur  selecionou  no  ano  de  2021,  10  cidades  como  projeto  piloto  com  o  objetivo  de    promover e estimular o desenvolvimento de cidades turísticas brasileiras em Destinos   Turísticos Inteligentes. O Ministério do Turismo optou por não abrir chamada pública,   considerando que os destinos selecionados já deveriam apresentar um nível  mínimo   de  desenvolvimento e infraestrutura, sobretudo nos eixos estratégicos de acessibilida -  de, tecnologia e governança (Ministério do Turismo, 2021b).  A  escolha  dos  destinos-piloto  buscou  assegurar  a  representatividade  da  diversidade    de  realidades  existentes  no  Brasil,  permitindo  que  a  metodologia  do  DTI  BRASIL  em    desenvolvimento fosse aplicada de maneira abrangente, a saber por região (Ministé -  rio do Turismo, 2021b).  •  Centro-Oeste: Brasília (DF) e Campo Grande (MT);   •  Nordeste: Recife (PE) e Salvador (BA);   •  Norte: Rio Branco (AC) e Palmas (TO);  •  Sudeste: Rio de Janeiro (RJ) e Angra dos Reis (RJ); e  •  Sul: Florianópolis (SC) e Curitiba (PR). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 43  Em 2023, o MTur concedeu aos destinos-piloto certificados de “DTI em Trans -  formação”, e ao mesmo tempo, selecionou novos destinos para implementação   da metodologia, a saber por região (Ministério do Turismo, 2023):  •  Centro-Oeste: Bonito (MS) e Goiânia (GO);  •  Nordeste: Fortaleza (CE) e São Luís (MA);  •  Sudeste: Vila Velha (ES) e Santos (SP);  •  Sul: Foz do Iguaçu (PR), Gramado (RS) e Joinville (SC).   Seguindo o modelo da SEGITTUR de normas técnicas, em agosto de 2025 o MTur publi -  cou a primeira norma técnica ABNT NBR 17259 - Turismo e serviços relacionados —   Sistema de gestão para destinos turísticos inteligentes — Requisitos e recomendações,   criada  a  partir  da  experiência  adquirida  com  o  desenvolvimento  de  destinos-piloto    possibilitou a criação de uma metodologia de diagnóstico e planejamento para Desti -  nos Turísticos Inteligentes (DTI). Essa metodologia estabelece um quadro comum que   auxilia  os  destinos  a  identificar  suas  necessidades  e  definir  ações  prioritárias  para    iniciar, de forma estruturada, o processo de conversão em DTI (ABNT, 2025).  Embora o desafio de promover destinos mais inteligentes seja de abrangência nacio -  nal e estadual, sua concretização ocorre, sobretudo, no nível municipal. Nesse sentido,   torna-se fundamental a existência de uma estratégia construída de forma consensual   no  âmbito  local, com processos voltados à gestão da informação para a implementa -  ção de ações que favoreçam: a melhoria da qualidade de vida dos moradores, a oferta   de experiências (ABNT, 2025).  A norma foi criada observando o conceito do PDCA ( Plan-Do-Check-Act ), sendo (ABNT,   2025):  •  Planejar  ( Plan ):  estabelecer  os  indicadores,  objetivos,  metas  e  planos  de  ação    necessários para alcançar os resultados que melhorem a gestão de DTI;  •  Fazer ( Do ): implementar os planos de ação de gestão de DTI;   •  Verificar  ( Check ):  acompanhar,  medir  os  processos  e  as  principais  caracterís -  ticas das operações que determinam a gestão de DTI, em relação  às  políticas e   objetivos, e relatar os resultados; e  •  Agir ( Act ): realizar ações para melhorar continuamente o sistema de gestão de   DTI e o desempenho do município (resultados).  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 44  Por fim, a norma foi estruturada em torno dos nove eixos fundamentais do modelo DTI   Brasil a saber: i) governança, ii) inovação, iii) tecnologia, iv) acessibilidade, v) susten -  tabilidade, vi) criatividade, vii) mobilidade, viii) marketing, e ix) segurança.  Outro movimento referente ao DTI ocorreu em setembro de 2022, onde Sebrae Nacio -  nal e o Banco Interamericano de Desenvolvimento (BID) lançaram o Edital “Programa   Turismo Futuro Brasil” com objetivo de selecionar destinos turísticos no Brasil que se -  riam apoiados com a elaboração e/ou implementação de suas estratégias de Destinos   Turísticos Inteligentes (DTI) (SEBRAE, 2022).   Três  premissas  fundamentais  guiaram  esse  Edital:  (1)  oportunizar  a  participação  de    quaisquer  Municípios,  desde  que  estivessem  no  Mapa  do  Turismo  Brasileiro  2022  do    Ministério do Turismo (MTur); (2) proporcionar a representatividade das cinco regiões   brasileiras entre os destinos selecionados para o apoio; e (3) selecionar destinos com   perfis distintos, de pequeno porte (com até 50 mil habitantes), médio porte (até 100 mil   habitantes) e grande porte (acima de 100 mil habitantes) (SEBRAE, 2022).   Ao  todo  285  Municípios  participaram  do  edital  sendo  selecionadas  doze  Municípios,    conforme quadro 2 (SEBRAE, 2022):  Quadro 2.  Municípios selecionados edital SEBRAE & BID.  Região   Município   Porte  Centro-Oeste   Pirenópolis (GO)   Pequeno  Bonito (MS)   Pequeno  Nordeste  Penedo (AL)   Médio  São Luís (MA)   Grande  Recife (PE)   Grande  Norte   Novo Airão (AM)   Pequeno  Belém (PA)   Grande  Sudeste  Belo Horizonte (MG)   Grande  Ilhabela (SP)   Pequeno  Paraty (RJ)   Pequeno  Sul   Bombinhas (SC)   Pequeno  Curitiba (PR)   Grande  Fonte: SEBRAE, 2022. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 45  Em agosto de 2025, o MTur lançou a Rede Brasileira de Destinos Turísticos Inteligen -  tes  (Rede  DTI  Brasil)  durante  o  Salão  do  Turismo  em  São  Paulo  (SP).  Esta  iniciativa,    promovida  pelo   órgão   do  governo  federal,  visou  fortalecer  a  estratégia  nacional  de    inovação no setor em todo o país (BRASIL, MTur, 2025).  A Rede DTI Brasil  é  uma parceria com o Sebrae Nacional, o Banco Interamericano de   Desenvolvimento (BID), a Confederação Nacional do Comércio de Bens, Serviços e Tu -  rismo (CNC) e a Associação Nacional de Secretários e Dirigentes de Turismo (ANSEDI -  TUR) tendo como objetivos a Cooperação: reunir destinos e instituições para a troca de   conhecimento e boas práticas, a Inovação: transformar conhecimento em resultados   concretos e promover a transformação digital, a Competitividade: tornar o setor tu -  rístico brasileiro mais forte e preparado para os desafios globais, e o Desenvolvimento:   gerar benefícios socioeconômicos para os destinos turísticos (SEBRAE, 2025).   Inicialmente, a Rede DTI Brasil foi composta por 28 municípios brasileiros que já tra -  balharam na transformação inteligente em seus territórios, com 21 deles aplicando a   metodologia oficial de DTI.   Para Bárbara Blaudt Rangel, coordenadora-geral de Inovação, Inteligência e Estatís -  ticas do Turismo do MTur, a importância da rede está  “Ao reunir destinos e diferentes   instituições  em  torno  da  inovação,  mostramos  que  a  cooperação  é  o  caminho  para    construir um setor mais forte. A Rede vai transformar conhecimento em resultados   concretos e tornar o Brasil mais competitivo e preparado para os desafios globais do   turismo ” (Ministério do Turismo, 2025).  A  coordenadora  de  projetos  do  SEBRAE,  Ana  Clévia,  ressalta  que  “ O  lançamento  da    Rede DTI tangibiliza um trabalho que várias instituições vêm realizando ao longo do   tempo. SEBRAE, BID e MTur uniram esforços em prol do fortalecimento da estratégia   de Destinos Turísticos Inteligentes no Brasil [...]  (PANROTAS, 2025b).  Por  fim,  Cássio  Garkalns,  da  GKS  Inteligência  Territorial,  a  Rede  DTI  Brasil   “é  uma    grande  mobilização  nacional,  com  objetivos  claros,  entregas  concretas  e  que  está    apenas começando. Agora é aquecer e ampliar esse ambiente de conexões para que   os resultados esperados se transformem, de fato, em melhoria dos destinos turísticos   e em geração de benefícios socioeconômicos”  (PANROTAS, 2025b).  2.2.5. Considerações  O Ministério do Turismo (MTur), instituição responsável pela formulação e execução   da  política  nacional  de  desenvolvimento  do  turismo,  também  abraçou  o  conceito  de   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 46  DTI.  Em  outubro  de  2020,  o  MTur  e  o  Ministério  da  Ciência,  Tecnologia  e  Inovações    (MCTI) firmaram um acordo de cooperação técnica para implementar políticas públi -  cas para a digitalização e transformação de destinos turísticos em DTI. Entre as metas   estabelecidas, incluíam-se a transformação digital dos destinos, o compartilhamento   de informações, a organização de Fóruns de Inovação e o estabelecimento da Câmara   do Turismo 4.0.  O MTur, em parceria com o instituto argentino Ciudades Del Futuro (ICF) e a SEGITTUR   da Espanha, adaptou o modelo de DTI para a realidade brasileira, adicionando quatro   novos eixos aos cinco pilares originais da SEGITTUR (governança, tecnologia, inova -  ção,  acessibilidade  e  sustentabilidade).  Os  novos  eixos  são:  Segurança,  Promoção  e    Marketing, Mobilidade e Transporte, e Criatividade.   Em  2021,  o  MTur  selecionou  10  cidades  como  projeto  piloto  para  promover  o  desen -  volvimento de DTI, buscando representar a diversidade de realidades brasileiras. Em   2023, essas cidades receberam certificados de “DTI em Transformação”, e novos des -  tinos foram selecionados. Além disso, em setembro de 2022, o SEBRAE e o Banco Inte -  ramericano de Desenvolvimento (BID) lançaram o Edital “Programa Turismo Futuro   Brasil”, selecionando 12 municípios de diferentes portes e regiões para apoio na elabo -  ração e/ou implementação de suas estratégias de DTI.  Apesar dos avanços e iniciativas em prol dos Destinos Turísticos Inteligentes no Brasil,   as análises apontam algumas considerações importantes e desafios a serem supera -  dos:  •  Política pública integrando Governo Federal, Estadual e Municipal: Indica uma   falta de alinhamento e coordenação entre os diferentes níveis de gestão;  •  Integração com outros Ministérios, apesar do acordo com MCTI, a colaboração   mais ampla entre setores governamentais ainda é limitada, e isto se reflete nos   Estados e nos Municípios;  •   Recursos  financeiros  para  implementação,  repassando  a  responsabilidade    para os Municípios: Um desafio significativo, pois a falta de financiamento de -  dicado pode inviabilizar a execução das iniciativas em nível local;  •  Câmara Turismo 4.0 não conseguiu atingir as metas estabelecidas;  •  Ausência  de  uma  visão  de  quadrúplice   hélice  da   inovação  para  o  desenvolvi -  mento das políticas de DTI integrando Governo, Setor Privado, Universidades e   Terceiro Setor; \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.2. Brasil: “Tropicalización” del modelo de destino inteligente 47  •  Necessidade de estudos para avaliar a efetividade das estratégias implementa -  das e o impacto real nos destinos das ações realizadas pelo MTur e SEBRAE.  Em suma, embora o Brasil tenha demonstrado um forte engajamento na promoção   dos  Destinos  Turísticos  Inteligentes,  com  a  conceituação  de  modelos  adaptados  à    sua realidade e a implementação de projetos-piloto, a consolidação dessa agenda   requer a superação de desafios estruturais relacionados à governança interfede -  rativa, ao financiamento e à avaliação de resultados. A contínua colaboração e o   fortalecimento das políticas públicas são essenciais para que o potencial do turis -  mo brasileiro, impulsionado pela inteligência e sustentabilidade, seja plenamente   alcançado.  Referências bibliográficas  Associação  Brasileira  de  Normas  Técnicas  –  ABNT.   (2025).    ABNT/CB-054/PROJETO   ABNT NBR 17259 AGO 2025.  Turismo e serviços relacionados — Sistema de gestão   para destinos turísticos inteligentes — Requisitos e recomendações .  https://www.  normas.com.br/autorizar/visualizacao-nbr/14219/identificar/visitante    Biz,  A.  A.  (2015).   Iº  Seminário  Brasil  Espanha  de  Inovação  Tecnológica  em  Turismo .   UFPR.  Biz,  A.  A.  (2016).   IIº  Seminário  Brasil  Espanha  de  Inovação  Tecnológica  em  Turismo .   UFPR.  Biz, A. A. (2017).  IIIº Seminário Brasil Espanha de Inovação Tecnológica em Turismo .   UFPR.  BRASIL. (2008). Lei nº 11.771, de 17 de setembro de 2008. Dispõe sobre a Política Nacio -  nal de Turismo, define as atribuições do Governo Federal no planejamento, desen -  volvimento e estímulo ao setor turístico, e dá outras providências.  Diário Oficial da   União . Recuperado de  https://www.planalto.gov.br/ccivil_03/_ato2007-201 cos-inteligentes-foi-lancada-no-salao-do-turismo-em-sao-pau -  lo_220726.html    Serviço Brasileiro de Apoio  às  Micro e Pequenas Empresas (SEBRAE). (2016).  Boletim de   Inteligência – julho 2016 . Sistema de Inteligência de Mercado.  https://sebrae.com.  br/Sebrae/Portal%20Sebrae/Anexos/BI_Tur_2016_06_Destinos%20Tur%c3%ads -  ticos%20Inteligentes.pdf    Serviço Brasileiro de Apoio  às  Micro e Pequenas Empresas (SEBRAE). (2021).  Destinos   Turísticos Inteligentes: Pequenos negócios protagonistas na criação de experiên -  cias memorávei s.  https://sebrae.com.br/sites/PortalSebrae/destinosturisticosinte -  ligentes    Serviço Brasileiro de Apoio  às  Micro e Pequenas Empresas (SEBRAE). (2022).  EDITAL PRO -  GRAMA TURISMO FUTURO BRASIL SELEÇÃO DE DESTINOS TURÍSTICOS APOIADOS   https://sebrae.com.br/Sebrae/Portal%20Sebrae/Arquivos/LISTA_DOS_12_MUNI -  C%C3%8DPIOS_SELECIONADOS.pdf   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 51  2.3. Colombia: Gobernanza y liderazgo regional en la exportación   del modelo DTI  Ledys Vianey López Zapata  Grupo de Investigación GIET., I.U Colegio Mayor de Antioquia, Colombia.  Johan Sebastián Gómez  Grupo de Investigación GIET, I.U. Colegio Mayor de Antioquia, Colombia.  Angélica María Carmona-Sánchez  I.U Colegio Mayor de Antioquia, Colombia.  Tatiana Andrea Muñoz-Vélez  I.U Colegio Mayor de Antioquia, Colombia.  2.3.1. Introducción  El modelo de Destinos Turísticos Inteligentes (DTI), considerado un modelo de gestión   de destinos y fundamentado en los principios de ciudades inteligentes, ha sido amplia -  mente difundido en España e hizo su aparición en Colombia en el año 2019, como parte   de  los  procesos  de  cooperación  entre  ambos  países,  impulsado  inicialmente  por  La    Agencia Española de Cooperación Internacional para el Desarrollo AECID en alianza   con SEGITTUR, mediante procesos de formación a servidores públicos.  Para  el  año  2025,  seis  años  después  de  los  primeros  procesos  formativos  del  modelo    DTI, existían en Colombia cuatro (4) ciudades evaluadas bajo la metodología de SEGI -  TTUR (sociedad estatal española dedicada a la gestión de la innovación y las tecnolo -  gías turísticas). Dos de ellas habían alcanzado el distintivo de destinos inteligentes y   las otras dos fueron consideradas destinos adheridos.  Este capítulo tiene como propósito documentar y analizar el proceso de introducción y   adaptación del modelo de Destinos Turísticos Inteligentes en Colombia. Identificar los   orígenes del modelo en el país, las instituciones que contribuyeron a su difusión y los   motivos subyacentes para impulsarlo como modelo de gestión de destinos en el con -  texto colombiano .  Así mismo, se pretende visibilizar y analizar el marco normativo y   político que actualmente regula y fomenta esta iniciativa en el país, con el fin de apor -  tar una visión amplia e integral del recorrido histórico del modelo DTI en Colombia y   las perspectivas futuras. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 52  Para cumplir con este objetivo se realizaron siete (7) entrevistas en profundidad con   referentes de cada destino evaluado bajo la metodología DTI de SEGITTUR y represen -  tantes del Gobierno Nacional. Dichas entrevistas fueron complementadas e interpre -  tadas a la luz de la información secundaria disponible, sobre el proceso realizado en   cada destino, principalmente en medios de comunicación.  Como resultado del proceso se puede concluir que la adopción del modelo en Colombia   surgió como respuesta a las limitaciones impuestas por las metodologías tradiciona -  les de planificación turística que tenía el país que anteponen los procesos de planifi -  cación,  mientras  los  aspectos  de  la  gestión  de  destinos  continuaban  desconectados.    Adicionalmente, la falta de una visión holística del turismo que permitiera gestionar   la complejidad territorial de este y una mirada endógena que dificultaba enfrentar los   retos de ordenamiento territorial y dinámicas urbanas de las ciudades principales.  2.3.2. Caracterización del país  Colombia está situada en el noroeste de América del Sur, dentro de la zona tropi -  cal, y cuenta con costas tanto en el océano Pacífico como en el Atlántico (Progra -  ma  de  las  Naciones  Unidas  para  el  Desarrollo  -  PNUD,  2020),  extendiéndose  por    1.141.748  kilómetros  cuadrados  de  territorio  continental,  que,  al  sumarse  con  los    928.660 kilómetros cuadrados de soberanía marítima, alcanza una superficie total   de 2.070.408 kilómetros cuadrados (Departamento Administrativo Nacional de Es -  tadística - DANE, 2007).  De acuerdo con el censo nacional realizado por el DANE en 2018, Colombia cuenta con   una  población  de  48.258.494  personas,  de  las  cuales  el  51,2%  son  mujeres  y  el  48,8%    hombres. En cuanto a su distribución, el 77,1% vive en cabeceras municipales, el 7,1%   en centros poblados y el 15,8% en zonas rurales dispersas (DANE, 2018). Desde el punto   de vista administrativo, el país está conformado por 32 departamentos, 1.103 munici -  pios, 18 áreas no municipalizadas, el archipiélago de San Andrés, Providencia y Santa   Catalina, y 12 distritos (DANE, 2025; ProColombia, 2023).  En  términos  económicos,  el  Producto  Interno  Bruto  (PIB)  de  Colombia  alcanza  los    363,5 mil millones de USD, con una tasa de crecimiento anual del 0,6% (Banco Mundial,   2023). De acuerdo con el Banco de la República de Colombia (2024), las principales acti -  vidades económicas que impulsan el valor agregado y el PIB nacional son el comercio,   la  administración  pública  y  defensa,  y  las  industrias  manufactureras.  En  este  orden    de ideas, el turismo se ha consolidado como un sector clave, aportando un 2,3% al PIB  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 53  y posicionándose en 2023 como la novena actividad con mayor contribución al valor   agregado nacional (Ministerio de Comercio, Industria y Turismo, 2024).  En los últimos años, el turismo en Colombia ha mostrado un crecimiento motivado en   gran parte por el aumento en la llegada de turistas internacionales. Como se observa   en la Figura 1, la tendencia de crecimiento en 2024 supera significativamente los nive -  les de 2019, lo que evidencia una expansión más allá de los niveles prepandemia.  Figura 1.     Comportamiento de visitantes no residentes por año.  Fuente: Migración Colombia   Este avance también se refleja en el Índice de Desarrollo de Viajes y Turismo del Foro Eco -  nómico Mundial (2024), en el que Colombia ocupa el puesto 50 entre 119 países evalua -  dos, con una puntuación de 4,08, y se ubica en la quinta posición a nivel latinoamericano.   Este resultado representa un ascenso de seis lugares con respecto al 2019. El país destaca   en  pilares  como  la  competitividad  de  precios,  los  recursos  naturales,  y  la  preparación    para las tecnologías de la información, las comunicaciones y los servicios digitales.  En cuanto a los mercados emisores de turistas hacia Colombia, Estados Unidos se po -  siciona como el principal, con una participación del 27,9%. En América Latina, el flujo  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 54  de viajeros sigue siendo dinámico, con México (8,5%), Ecuador (8,1%), Perú (4,9%), Pa -  namá (4,7%), Chile (4,6%) y Costa Rica (4,5%) entre los principales emisores. En Europa,   España se mantiene como el mayor país emisor, representando el 3,9% del total (Minis -  terio de Comercio, Industria y Turismo, 2025).  A su vez, ProColombia (2024) señala que Bogotá, Medellín y Cartagena son los destinos   más solicitados por los viajeros internacionales, destacándose también como las ciuda -  des con mayores ingresos derivados del turismo. En estas ciudades, el gasto promedio   por tarjeta es de 123,4 USD en Bogotá, 105,4 USD en Medellín y 122,9 USD en Cartagena.  2.3.3. Estructura gubernamental de turismo en Colombia  La  estructura  del  turismo  en  el  país  se  organiza  a  través  de  diversas  entidades  en -  cargadas  de  la  regulación,  planificación,  competitividad  y  promoción  del  sector,  en    concordancia con la Ley 300 de 1996, conocida como la Ley General de Turismo. Estas   instituciones trabajan de manera articulada con el gobierno nacional, los gobiernos   departamentales, distritales y municipales, así como con el sector privado, con el obje -  tivo de impulsar el desarrollo turístico del país.  Figura 2.   Esquema de gobernanza del turismo en Colombia.   Fuente: Elaboración propia. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 55  De acuerdo con el Decreto 2785 de 2006, el Ministerio de Comercio, Industria y Turismo   (MinCIT), a través del Viceministerio de Turismo, lidera el turismo a nivel nacional, cuya   función  principal  es  regular  y  establecer  la  Política  Nacional  de  Turismo,  además  de    apoyar la actividad empresarial y la gestión turística en las distintas regiones del país,   y  para  ello  el  Viceministerio  se  organiza  en  dos  direcciones:  la  Dirección  de  Calidad  y    Desarrollo Sostenible del Turismo, y la Dirección de Análisis Sectorial y Promoción.  Mientras  el  MinCIT  diseña  las  políticas  y  prioridades  del  turismo,  el  Fondo  Nacional    de Turismo – FONTUR se encarga de gestionar y ejecutar los recursos destinados a su   implementación,  así  como  de  recaudar  y  administrar  la  contribución  parafiscal,  un    gravamen obligatorio para los prestadores de servicios turísticos; y es el propio Min -  CIT quien supervisa la ejecución del FONTUR con el fin de garantizar el cumplimiento   de los objetivos nacionales en materia de turismo.  En el ámbito internacional, ProColombia, siguiendo los lineamientos del MinCIT, tiene   la tarea de posicionar a Colombia como un destino turístico de clase mundial, y dentro   de sus funciones se encuentra la promoción del turismo, la atracción de inversión ex -  tranjera y el fortalecimiento de la imagen del país mediante estrategias de mercadeo,   campañas publicitarias, y participación en ferias y eventos internacionales.  Por  otra  parte,  la  Ley  1558  de  2012  establece  la  creación  del  Consejo  Superior  de  Tu -  rismo  como  un  órgano  de  articulación  interinstitucional,  y  según  lo  dispuesto  en  el    Decreto 1873 de 2013, una de sus principales funciones es definir e implementar, junto   con varios ministerios, programas y proyectos orientados a fortalecer la competitivi -  dad turística.  De igual forma, el artículo 8 de la misma ley crea el Consejo Consultivo de la Industria   Turística, un órgano de carácter consultivo y asesor del gobierno nacional en materia   turística, que tiene como objetivo orientar al MinCIT en la planificación, formulación   y definición de políticas, programas y proyectos dirigidos al desarrollo y la competi -  tividad  del  sector.  Cabe  destacar  que,  aunque  ninguno  de  estos  consejos  cuenta  con    personería jurídica ni autonomía administrativa, ambos desempeñan un papel deter -  minante en la gobernanza turística del país.  A nivel territorial, cada departamento, municipio y distrito cuenta con su propio ente,   oficina o secretaría de turismo, los cuales trabajan en conjunto con la estructura gu -  bernamental nacional para fomentar el desarrollo turístico en cada territorio.  Entre las entidades clave en la regulación y control del sector turístico se destacan la   Superintendencia de Industria y Comercio, la Policía de Turismo y Migración Colom - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 56  bia.  La  Superintendencia,  a  través  de  su  Dirección  de  Investigación  de  Protección  al    Consumidor,  tiene  la  responsabilidad  de  investigar  y  atender,  en  una  etapa  inicial,    las reclamaciones presentadas por los usuarios ante posibles incumplimientos de los   prestadores de servicios turísticos (Ministerio de Comercio, Industria y Turismo, 2022).   Por su parte, la Policía de Turismo vela por la seguridad de los visitantes; y Migración   Colombia se encarga de controlar y registrar el ingreso y salida de turistas tanto na -  cionales como extranjeros.  Es necesario resaltar el papel de los gremios en la dinámica turística del país, ya que   son  actores  estratégicos  en  la  implementación  de  estrategias  y  políticas  sectoriales,    así como en su participación en espacios de toma de decisiones como el Consejo Con -  sultivo de la Industria Turística y el Comité Directivo del FONTUR. En el primero, in -  tervienen los presidentes de los gremios nacionales del sector, con representación de   cada tipo de prestador de servicios turísticos; y en el segundo, se eligen por convocato -  ria cuatro representantes de organizaciones gremiales que aportan a la contribución   parafiscal.  Entre  los  principales  gremios  del  sector  se  destacan  la  Asociación  Colombiana  de    Agencias de Viajes y Turismo (ANATO), la Asociación Hotelera y Turística de Colombia   (COTELCO), la Asociación Colombiana de Atracciones y Parques de Diversiones (ACO -  LAP),  la  Asociación  del  Transporte  Aéreo  Internacional  (IATA),  la  Asociación  Colom -  biana de la Industria Gastronómica (ACODRES), la Confederación de Guías de Turismo   de  Colombia  (CONFEGUÍAS)  y  la  Asociación  de  Líneas  Aéreas  Internacionales  de  Co -  lombia (ALAICO), entre otros.  Estas  organizaciones  tienen  una  participación  importante  en  el  fortalecimiento  del    turismo, ya que representan al sector en espacios de toma de decisiones y participan   en la formulación de propuestas orientadas al desarrollo sostenible y competitivo de   la actividad turística en Colombia.  2.3.4. Evolución y adopción del modelo de Destino Turístico Inteligente en Colombia  2.3.4.1. Exploración del modelo DTI (2014-2019)  En 2014, Cartagena fue sede del Congreso Nacional de Hotelería de Cotelco, donde se   posicionó  el  turismo  inteligente  por  primera  vez  como  tema  central,  impulsando  el    debate sobre digitalización y competitividad. Posteriormente, en 2017, Cartagena fue   sede del seminario “Turismo Inteligente” (liderado por ANATO e IMF Business School) y   el Foro Smart Tourism, donde se discutieron temas como big data, open data y el nue - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 57  vo perfil del turista digital. Ese mismo año, Colombia estrechó vínculos con la metodo -  logía de destinos turísticos inteligentes (DTI) desarrollada por SEGITTUR y la Agencia   Española de Cooperación Internacional para el Desarrollo (AECID), con el primer cur -  so avanzado sobre el modelo DTI.   El rol de AECID en la implantación y difusión del concepto y modelo de Destinos Turísti -  cos Inteligentes en Colombia ha sido fundamental. El interés institucional colombiano   por el modelo DTI se concretó en 2019, con la participación de contratistas del Vicemi -  nisterio de Turismo de Colombia, en la formación en destinos inteligentes en Montevi -  deo, Uruguay, liderada por SEGITTUR y AECID. También participaron en esta versión   funcionarios de la Gobernación de Boyacá. Este fue el primer acercamiento que tuvo   el país al modelo DTI de SEGITTUR.  Pese a las limitaciones impuestas por la pandemia del COVID-19, la fase exploratoria   del  modelo  de  Destinos  Turísticos  Inteligentes  en  Colombia  constituyó  un  hito  en  la    reorientación  de  la  planificación  sectorial.  En  el  año  2020,  se  posesionan  nuevas  au -  toridades en las entidades territoriales y con ello la formulación de nuevos planes de   desarrollo. Estos cambios de gobierno aunados a la pandemia del COVID-19 propicia -  ron el escenario perfecto para que el liderazgo en la implementación del modelo fuera   asumido  por  los  gobiernos  locales  de  las  principales  ciudades  de  Colombia:  Bogotá,    Medellín, Cali y Bucaramanga.  2.3.4.2. Implementación (2020-2023)   En el marco del contexto crítico de la pandemia por COVID-19, se formularon los nue -  vos planes de desarrollo de las autoridades municipales. Los desafíos a los que se en -  frentaba un sector completamente paralizado con economías golpeadas obligaron a   replantear muchas de las prioridades y programas de estos gobiernos y a volcar los   esfuerzos  hacia  soluciones  creativas  que  ayudaran  a  resolver  los  efectos  de  la  crisis    sanitaria, lo cual representó no sólo un desafío sin precedentes para las ciudades, sino   también una oportunidad para repensar el modelo de desarrollo turístico.  Durante el período de gobierno de las entidades territoriales (2020-2023), cuatro (4) ciu -  dades colombianas (Medellín, Bogotá, Cali y Bucaramanga) se sometieron al proceso de   diagnóstico,  evaluación  y  plan  de  acción  para  la  transformación  en  Destino  Turístico    Inteligente  bajo  la  metodología  de  SEGITTUR.  Dicha  implementación  surgió  desde  las    iniciativas locales, como lo indica uno de los entrevistados,  parecía que los destinos fue -  ran mucho más adelante que la misma gestión del Ministerio . No obstante, para finales  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 58  del año 2020 el Congreso de Colombia promulga la ley 2068, que modifica la Ley General   de Turismo y se dictan otras disposiciones. En su artículo 11, plantea que  “El Gobierno   nacional definirá una estrategia de creación de destinos turísticos inteligentes” ,  lo  cual   se convierte en el primer referente formal de la metodología en el contexto nacional.  El primer caso de implementación del DTI en Colombia fue la ciudad de Medellín, ciu -  dad  que  realiza  su  primer  diagnóstico  entre  octubre  y  diciembre  del  año  2020  y  en    medio de las restricciones impuestas por la pandemia se evalúan los más de 400 re -  quisitos  de  la  metodología  que  para  el  momento  disponía  SEGITTUR.  El  proceso  fue    liderado desde la Subsecretaría de Turismo del Distrito de Medellín y se obtuvo como   resultado  de  la  evaluación  un  porcentaje  global  de  cumplimiento  del  64.1%.  Lo  ante -  rior le permitió obtener el   reconocimiento como el primer destino turístico inteligente   adherido de Colombia.  Posteriormente se suma la ciudad de Bogotá a los casos de implementación. El proceso   de transformación como un Destino Turístico Inteligente (DTI) comenzó en enero de 2021.   El enfoque DTI fue adoptado por el Instituto Distrital de Turismo (IDT) como una apues -  ta estratégica de largo plazo, la ciudad institucionalizó una línea de trabajo específica   sobre el modelo y este comenzó a consolidarse como una herramienta de planificación   turística para la ciudad, al punto de quedar consignado en su política de turismo. Los   resultados de Bogotá en su primer proceso de diagnóstico arrojaron un nivel de cum -  plimiento del 71.9% lo que la convirtió en la primera ciudad capital con una población   superior a los 7 millones de habitantes en implementar un modelo de gestión DTI.  El modelo DTI llega a la ciudad de Cali a través de una búsqueda de referentes como   expresó uno de los entrevistados:  “uno empieza, pues obviamente a ver a sus ciuda -  des hermanas y vecinas, en qué están”  (Medellín y Bogotá). El proceso inició en 2021   con una investigación de casos nacionales, contacto con SEGITTUR y otros referentes   internacionales como Brasil para conocer su aproximación al modelo DTI. Cali, se con -  vierte en el tercer destino en implementar la metodología. El destino inicia su proceso   de diagnóstico y plan de acción en octubre de 2022 y finaliza en diciembre del mismo   año. Cali obtiene una valoración global de cumplimiento de 41%.   Bucaramanga fue la cuarta ciudad en iniciar el proceso de diagnóstico y plan de ac -  ción, también, bajo el enfoque de SEGITTUR en el año 2023. El modelo llega a la ciudad   a través de conexiones profesionales previas con destinos que ya estaban en el proce -  so como Medellín, benchmarking nacional a partir de conversaciones con directores   de turismo reconocidos e investigación web en la página de SEGITTUR para identifi - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 59  car países certificados. Bucaramanga obtuvo una valoración de cumplimiento en su   diagnóstico de 24.6% y se convierte así en el último destino en evaluarse en Colombia   durante la vigencia 2020-2023.  Como resultado de la fase inicial de implementación del modelo DTI en Colombia, des -  taca el papel clave que desempeñó Medellín. Su liderazgo como una de las principales   ciudades del país y su dinamismo económico, propició un efecto positivo en los orga -  nismos de gestión de destinos del país, motivando a otras ciudades a considerar su ex -  periencia como un referente para emprender sus propios procesos de transformación.  Bogotá y Medellín fueron los destinos que alcanzaron a realizar la implementación del   plan de acción con un mayor detalle, así como una segunda auditoría en esa vigencia.   El reto trazado en cada una de las ciudades era superar el margen del 80% para obte -  ner oficialmente el reconocimiento como Destinos Turísticos Inteligentes DTI.   En el año 2022 Medellín realiza la auditoría de seguimiento y obtiene un 87,4% de cumpli -  miento, mostrando una mejora significativa de 23.3 puntos porcentuales y convirtiéndo -  se en el primer destino turístico inteligente del país. Posteriormente en el año 2023 Bogo -  tá realiza la segunda auditoría con un resultado de 82,5%. Ambas ciudades pasaron en   solo dos años de destinos adheridos a destinos turísticos inteligentes. Así mismo, ambas   ciudades se convirtieron en referentes en la región, llegando a suscribir acuerdos mu -  tuos de cooperación y a fundar la Red Iberoamericana de DTI junto con Tequila (México),   el Ministerio de Turismo de Brasil y el Instituto de Ciudades del Futuro de Argentina.  Figura 3.   Resultados diagnósticos DTI por ciudad y año.  Fuente: Elaboración propia \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 60  En  el  año  2022  se  produce  el  cambio  de  Gobierno  nacional  y  algunos  perfiles  y  roles    técnicos ingresan en la nueva gestión y se retoman varios programas claves para el   desarrollo planificado del sector. En el año 2023 y previo a la finalización de los gobier -  nos locales. El Viceministerio de Turismo convoca a mesas de trabajo con los destinos   del país que habían implementado la metodología, con el fin de obtener información   de ellos de cara a la creación de la estrategia y metodología DTI de Colombia para dar   cumplimiento al artículo 11 de la ley 2068 de 2020.  El  concepto  de  Destino  Turístico  Inteligente  (DTI)  se  inscribe  inicialmente  dentro  del    Programa Nacional de Calidad Turística del Ministerio de Comercio, Industria y Turis -  mo de Colombia. Con la intención que, en el futuro, evolucionara hacia un programa   independiente, con una estrategia clara y bien definida y con el mismo nivel de estruc -  turación y respaldo institucional que ha tenido el de calidad turística. No obstante, a   la fecha de escritura de este capítulo, dicha intención no se ha logrado materializar. El   tema DTI permanece dentro del programa de calidad, sin una clara implementación.  2.3.4.3. Vigencia y perspectivas del modelo DTI ante los cambios de gobiernos locales   (2024 – 2025)  El  período  2024-2025  marca  un  momento  crucial  para  la  sostenibilidad  del  modelo    DTI  en  Colombia,  coincidiendo  con  el  cambio  de  administraciones  municipales  que    tradicionalmente genera discontinuidades en los procesos públicos. El análisis de los   cuatro casos revela patrones diferentes de incorporación y continuidad del modelo.  Medellín,  primer  destino  en  incorporarse  a  la  red  DTI  de  SEGITTUR,  fundador  de  la    Red Iberoamericana de DTI y el destino que albergó los primeros eventos de DTI ofi -  ciales  del  país  (Colombia:  Destino  Turístico  Inteligente,  Construyendo  el  Futuro  en  el    año 2022 y el I Congreso Iberoamericano de Destinos Turísticos Inteligentes en el 2023)   presenta  el  caso  más  interesante  de  discontinuidad  por  el  cambio  de  gobierno.  Este    resultado es paradójico considerando que fue el caso más exitoso técnicamente (87.4%   en 2022) en una ciudad con un ecosistema turístico aparentemente articulado.  Algunos factores que permiten explicar la discontinuidad en Medellín son la falta de   institucionalización  del  modelo  más  allá  del  período  de  gobierno  debido  que  no  se    crearon instrumentos jurídicos que garantizaran la continuidad, así como la depen -  dencia de liderazgos personales y la enorme polarización política que enmarcó el cam -  bio de gobierno en la ciudad, desestimando programas y acciones que no representa -  ban apuestas políticas. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 61  Bogotá  por  el  contrario  refleja  un  caso  de  continuidad;  logrando  institucionalizar  el    modelo DTI dentro de su política pública, lo que permitió su continuidad tras el cambio   de gobierno .  Otro factor que incidió en la continuidad fue la articulación multisecto -  rial y la vinculación al proceso de una gran cantidad de actores públicos y privados   que comprendieron el modelo, más allá de un programa de gobierno.  Cali,  representa  un  caso  especial  de  continuidad,  resiliencia  y  transformación,  con -  tinúan con el proceso bajo la metodología de la red Iberoamericana de DTI. Esta con -  tinuidad  en  el  modelo,  pero  bajo  otro  esquema  metodológico  indica  una  adaptación    estratégica  del  destino  y  una  comprensión  profunda  de  sus  limitaciones  para  avan -  zar bajo el enfoque de SEGITTUR. Igualmente se identifica una posible continuidad de   equipos técnicos que conocían previamente el modelo.  Bucaramanga representa un caso interesante de hermetismo frente a los resultados del   diagnóstico y la continuidad del modelo, a través del proceso de entrevistas se pudo iden -  tificar una posible reactivación del modelo bajo marcos legales que permitan avanzar.  Figura 4.  Línea de tiempo de la evolución del modelo DTI en Colombia.   Fuente: Elaboración propia. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 62  Los entrevistados coinciden en que el modelo es funcional y su aplicación facilita los pro -  cesos del OGD, sin embargo, también reiteran las dificultades de alcanzar los niveles del   modelo de SEGITTUR en países como Colombia y la necesidad de realizar adaptaciones   metodológicas a partir de la realidad de cada país, las diferentes tipologías de destinos y   el tamaño de cada territorio. Así mismo coinciden en la urgencia de desarrollar marcos   normativos nacionales, una mayor vinculación del Ministerio de Comercio, Industria y   Turismo y la necesaria creación de políticas públicas de apoyo a DTI.  Para el año 2024 otros destinos de Colombia comienzan a transitar el camino de los   DTI, pero bajo otros esquemas. Cartagena se suscribe a la Red Iberoamericana de DTI   y Paipa se auto diagnóstica bajo la metodología de la misma red. A nivel nacional se   crea el programa Colombia 4.0 como un programa para avanzar en un turismo inteli -  gente, aunque con un gran énfasis en innovación y tecnología.  2.3.5. Política pública de la inteligencia turística  La Ley 2068 de 2020 promulga que el Ministerio de Comercio, Industria y Turismo es el   encargado de la gestión de los Destinos Turísticos Inteligentes, así como de determinar   niveles de calidad en los Prestadores de Servicios Turísticos y Destinos Turísticos y de   definir esquemas de certificación nacionales e internacionales públicos o privados en   el marco del Subsistema Nacional de la Calidad. Asimismo, el Plan Sectorial Nacional   de Turismo 2022- 2026 “Turismo en Armonía con la Vida” favorece la conformación de   Destinos Turísticos Inteligentes (DTI).   Con el propósito de definir los lineamientos de la estrategia para la creación y gestión de   los Destinos Turísticos Inteligentes en Colombia, el Gobierno Nacional pone en vigencia   la  Resolución  724  del  7  de  junio  de  2024  proporcionando  un  marco  normativo  para  el    desarrollo de la estrategia DTI, buscando integrar la Gobernanza, Tecnología, Sostenibi -  lidad, Accesibilidad, Innovación y Seguridad en el sector turístico. El país ha avanzado   en  la  normalización  de  Prestadores  de  Servicios  Turísticos  con  la  Norma  Técnica  Co -  lombiana (NTC) 6749:2024 Gestión integral inteligente en turismo. Requisitos y buenas   prácticas,  que  especifica  los  requisitos,  componentes  y  las  buenas  prácticas  para  una    gestión integral inteligente para prestadores de servicios y atractivos turísticos; la cual   es avalada por El ICONTEC -Instituto Colombiano de Normas Técnicas y Certificación-.  En  Colombia  la  estrategia  DTI  se  enmarcó  en  el  Programa  Nacional  de  Calidad  Tu -  rística,  el  cual  es  coordinado  por  la  Dirección  de  Calidad  y  Desarrollo  Sostenible  de    Turismo,  del  Ministerio  de  Comercio  Industria  y  Turismo  y  busca  articular  el  sector   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 63  público  y  privado  para  el  fortalecimiento  de  la  calidad  en  el  país,  así  como  mejorar    la prestación de los servicios turísticos mediante el fortalecimiento de la gestión de la   calidad  y  sostenibilidad  en  las  empresas  y  destinos  turísticos,  como  estrategia  para    generar una cultura de excelencia que permita posicionar a Colombia en los mercados   turísticos como un destino de calidad diferenciado y competitivo (ICONTEC, 2021) .  Por  otro  lado,  el  modelo  de  ciudades  y  territorios  inteligentes  de  MinTIC,  impulsa  la    implementación de tecnología y digitalización en la gestión pública, a través de la Po -  lítica de Gobierno Digital. Este programa ha sido un aliado clave para la gestión del   MinCit en el programa de destinos inteligentes de Colombia.  2.3.6. Metodología DTI Colombia  La Estrategia Nacional de Destinos Turísticos Inteligentes (DTI) surge a partir del aná -  lisis comparativo de modelos y metodologías internacionales y nacionales, los cuales   sirvieron de referencia para definir los lineamientos y fundamentos técnicos de dicha   estrategia. Estos modelos son:  •  Modelo de SEGITTUR (España): Estructurado en torno a cinco ejes fundamenta -  les: Gobernanza, Tecnología, Innovación, Accesibilidad y Sostenibilidad.  •  Modelo de INVAT-TUR (España): Propone nueve dimensiones clave: Gobernan -  za,  Innovación,  Accesibilidad,  Sostenibilidad,  Conectividad,  Inteligencia,  Infor -  mación, Marketing Online y Evolución de la actividad turística.  •  Modelo de Brasil: Integra nueve ejes: Gobernanza, Tecnología, Innovación, Ac -  cesibilidad,  Sostenibilidad,  Seguridad,  Creatividad,  Movilidad  y  Transporte,  y    Promoción y Mercadeo.  A partir de estos referentes, en el año 2023 el Ministerio de Comercio, Industria y Turismo   de Colombia organizó una serie de mesas técnicas de trabajo con los destinos del país que   ya venían avanzando en la implementación del modelo DTI, ya sea porque contaban con   un  diagnóstico  previo  o  porque  se  encontraban  en  proceso  de  construcción  de  este.  Los    destinos participantes fueron: Bogotá, Medellín, Pereira, Cartagena, Cali y Bucaramanga.  A través de estas mesas, desarrolladas bajo una metodología práctica y participativa,   se  identificaron  los  elementos  del  modelo  que  han  demostrado  efectividad,  así  como    aquellos que requieren ajustes o deben ser replanteados. Este ejercicio permitió esta -  blecer cuáles aspectos debían mantenerse, modificarse o eliminarse, reconociendo la   necesidad de incluir un eje de seguridad turística como dimensión transversal clave   por su impacto en diversas áreas del desarrollo turístico. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 64  Estas reflexiones y resultados técnicos sirvieron como insumo para la formulación de   la Resolución 0724 del 7 de junio de 2024, la cual define los lineamientos de la Estrate -  gia DTI para Colombia. Cabe resaltar que, hasta el momento, Colombia no cuenta con   una metodología propia consolidada para la gestión de destinos turísticos inteligen -  tes. Aun así, dispone de la Norma Técnica Colombiana NTC 6749 de 2024, que especifica   los requisitos y buenas prácticas para una gestión inteligente integral, dirigida tanto   a prestadores de servicios turísticos como a atractivos turísticos.  En este contexto, para orientar la transformación de los destinos turísticos, el país ha   adoptado la siguiente definición de Destino Turístico Inteligente:  “Un Destino Turístico Inteligente es un lugar donde la accesibilidad universal, la inno -  vación y la tecnología son pilares fundamentales para la experiencia de los visitantes   y el desarrollo sostenible del destino. Allí, los viajeros se integran con fluidez al terri -  torio y se impacta de manera positiva la calidad de vida de la comunidad anfitriona.”   (Resolución 0724 de 2024, 2024).  En  el  marco  de  la  Resolución  0724  de  2024,  el  Ministerio  define  seis  ejes  fundamentales    para el Modelo DTI Colombia: gobernanza, tecnología, innovación, accesibilidad, sosteni -  bilidad  y  seguridad.  Asimismo,  establece  los  lineamientos  para  la  implementación  de  la    Estrategia Nacional DTI, la cual se estructura en torno a cinco componentes principales.  Figura 5.  Componentes para la Estrategia DTI para Colombia  Fuente: Ministerio de Comercio, Industria y Turismo (2024b). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 65    El  primer  componente  se  refiere  a  la  gobernanza  de  la  metodología  DTI,  que  marca    la  ruta  estratégica  para  la  gestión  de  los  destinos  turísticos  inteligentes  en  el  país.  Su    propósito es fomentar una administración alineada con principios clave como la inno -  vación, la tecnología, la competitividad y la capacidad de adaptación al mercado. Esta   estructura de gobernanza se implementa a través de directrices técnicas emitidas perió -  dicamente mediante circulares oficiales, y se articula con instancias previamente defini -  das que buscan fortalecer a los destinos en su camino hacia la consolidación como DTI.  El  segundo  componente  establece  los  niveles  de  gestión  de  los  DTI,  proponiendo  una    clasificación continua que permite medir el progreso de cada destino en la implemen -  tación de la metodología. Esta medición considera las particularidades, realidades y   necesidades de cada territorio, lo que facilita un acompañamiento más cercano, efec -  tivo y adaptado a su contexto.  Figura 6.  Niveles de gestión de los DTI en Colombia.   Fuente: Ministerio de Comercio, Industria y Turismo (2024b)  En cuanto al tercer componente, este se enfoca en las herramientas para la gestión   de los DTI. Aquí se destaca el valor de contar con instrumentos técnicos, metodoló -  gicos  y  tecnológicos  que  apoyen  el  diagnóstico,  la  planeación,  el  seguimiento  y  la    evaluación. Estas herramientas permiten tomar decisiones basadas en evidencia y  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 66  promueven la implementación de buenas prácticas para una gestión turística más   eficiente  e  inteligente.  El  cuarto  componente  aborda  la  cadena  de  valor  del  turis -  mo desde una perspectiva inteligente, que busca impulsar la adopción de prácticas   innovadoras,  sostenibles,  tecnológicas  y  accesibles  por  parte  de  todos  los  actores    y  eslabones  del  sector.  Y,  el  quinto  componente  hace  referencia  a  los  beneficios  e    incentivos  dirigidos  a  los  territorios  que  decidan  implementar  la  metodología  DTI.    Entre  estos  beneficios  se  encuentran  el  acceso  a  recursos  técnicos  y  financieros,  el    fortalecimiento  institucional  y  el  reconocimiento  a  nivel  nacional  e  internacional.    Uno de los incentivos más destacados es la medalla al mérito turístico en la catego -  ría de turismo inteligente.  Colombia  ha  intentado  avanzar  en  la  formulación  de  un  marco  normativo  para  la    gestión inteligente, no obstante, después de emitida la resolución 0724 de 2024, -por la   cual se definen los lineamientos de la estrategia para la creación y gestión de los Des -  tinos Turísticos Inteligentes en Colombia- han sido pocos los avances en la consolida -  ción del modelo. El país aún no cuenta con una metodología de DTI, o una hoja de ruta   clara sobre el modelo. La inclusión de este en el programa nacional de calidad turística   puede ser considerado un error de enfoque, toda vez que el modelo DTI se conceptua -  liza como un modelo de gestión que se asemeja más a un enfoque de planificación y   gestión del destino y no a un programa de calidad.  2.3.7. Conclusiones y recomendaciones  En Colombia, el modelo de DTI surgió como alternativa a las metodologías tradiciona -  les de planificación, que resultaban insuficientes frente a la complejidad del territorio,   los retos del ordenamiento urbano y la articulación entre actores, por lo que este enfo -  que se consolidó como una propuesta más integral al integrar sostenibilidad, tecnolo -  gía, accesibilidad e innovación en la gestión turística.  La  adopción  en  el  país  fue  impulsada  principalmente  por  gobiernos  locales  y  por    liderazgos personales en ciudades como Medellín, Bogotá, Cali y Bucaramanga, que   decidieron  avanzar  incluso  sin  contar  con  una  orientación  clara  por  parte  del  go -  bierno  nacional,  lo  que  dejó  en  evidencia  que  el  éxito  de  este  enfoque  no  depende    únicamente  del  cumplimiento  técnico,  sino  también  de  factores  decisivos  como  la    continuidad  institucional,  la  voluntad  política  y  una  buena  colaboración  entre  los    actores  del  territorio.  En  este  proceso,  la  resistencia  al  cambio  y  la  falta  de  apro -  piación  del  modelo,  sobre  todo  desde  el  sector  empresarial,  se  han  convertido  en    obstáculos  significativos  para  su  consolidación  y  sostenibilidad,  por  lo  que  resulta   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 67  esencial blindar los procesos frente a los cambios de gobierno y definir políticas que   permitan asegurar la continuidad de los DTI a largo plazo.  Aunque  el  modelo  español  de  SEGITTUR  sirvió  como  punto  de  partida,  su  aplicación    en contextos colombianos encontró importantes limitaciones, ya que desafíos como la   sostenibilidad ambiental en entornos rurales, las brechas en infraestructura tecnoló -  gica y las dificultades para escalar operativamente el modelo mostraron la necesidad   de  adaptarlo  al  contexto  nacional,  por  lo  que  algunos  territorios,  como  Cali  y  Paipa,    optaron por enfoques más flexibles, como el propuesto por la Red Iberoamericana de   DTI,  lo  cual  evidencia  la  importancia  de  contar  con  metodologías  contextualizadas    que respondan a las realidades locales. Esto, a su vez, implica desarrollar capacidades   técnicas en los procesos y fortalecer el talento humano en los destinos.  A pesar de que se han dado pasos importantes, como la publicación de la Resolución   724 de 2024 y la adopción de la Norma Técnica Colombiana NTC 6749:2024, el país aún   carece de una política nacional de Destinos Turísticos Inteligentes y de una metodolo -  gía oficialmente definida y adaptada al contexto local que permita guiar su implemen -  tación de forma coherente en todo el territorio.  En ese orden de ideas y de cara al futuro, el modelo de DTI en Colombia parece orien -  tarse hacia un enfoque híbrido que recoge elementos de distintas metodologías inter -  nacionales,  como  SEGITTUR  y  la  Red  Iberoamericana,  aunque  con  una  mirada  cada    vez más marcada hacia la institucionalización por encima de la certificación, donde   su  sostenibilidad  dependerá  de  la  capacidad  para  demostrar  valor  a  los  gobiernos    locales y establecer mecanismos de continuidad que superen los cambios de adminis -  tración y los ciclos políticos.  Es propósito de este ejercicio de análisis, documentar y visibilizar el proceso de DTI que   se ha desarrollado en Colombia para brindar algunas recomendaciones a los destinos,   entre estas, es imperante adaptar el modelo al contexto colombiano, a las característi -  cas y condiciones propias de cada territorio, ya que limitar la visión del turismo única -  mente a la promoción genera desconexión entre las políticas turísticas y el desarrollo   del destino.  En ese mismo sentido, es necesario socializar de manera amplia y efectiva la Resolu -  ción 0724 de 2024, que establece los lineamientos para la creación y gestión de Desti -  nos  Turísticos  Inteligentes  en  Colombia  puesto  que,  actores  del  sector  la  desconocen    y esto ha dificultado su implementación en los territorios. Resulta igual de importan -  te  fomentar  una  cultura  de  apropiación  ciudadana  y  gremial  del  modelo  DTI,  desde   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.3. Colombia: Gobernanza y liderazgo regional en la exportación del modelo DTI 68  una estrategia integral que sensibilice y promueva la participación de los actores en   espacios de co-creación orientados hacia una gobernanza colaborativa con enfoque   inclusivo.  Referencias bibliográficas  Banco  de  la  República  de  Colombia.  (2024).   Producto  Interno  Bruto  grandes  ramas    de actividades económicas . Obtenido de  suameca.banrep.gov.co:   https://suameca.  banrep.gov.co/estadisticas-economicas/reporte-oac.html?path=%2FEstadisticas_  Banco_de_la_Republica%2F5_Actividad_Economica_mercado_laboral_y_cuen -  tas_financieras%2F5_PIB%2F5_Producto_Interno_Bruto_Metodologia_anno_ba -  se_2015%2F2_PIB_2015_Prod  Banco Mundial. (2023).  Crecim
