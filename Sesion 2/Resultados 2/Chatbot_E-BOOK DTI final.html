        header p{margin:5px 0 0;font-size:.9em;color:var(--secondary);}
        .toolbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;}
        button{background:var(--primary);color:#fff;border:none;padding:8px 15px;border-radius:var(--radius);cursor:pointer;font-size:.9em;transition:background .2s;}
        button:hover{background:#0056b3;}
        button:disabled{background:var(--secondary)!important;opacity:.65;cursor:not-allowed;}
        #theme-btn{background:var(--secondary);}
        #palette-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;}
        .toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
        .btn-export{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85em;transition:background .2s;}
        .btn-export:hover{background:#0056b3;}
        .pdf2-section{padding:10px;border:1px dashed var(--border);border-radius:var(--radius);}
        .pdf2-section label.title{font-size:.85em;font-weight:bold;display:block;margin-bottom:6px;color:var(--secondary);}
        .file-row{display:flex;align-items:center;gap:10px;}
        .file-row input[type=file]{display:none;}
        .file-label{background:var(--secondary);color:#fff;padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:.85em;}
        .file-label:hover{background:#545b62;}
        #pdf2-name{font-style:italic;color:var(--secondary);font-size:.85em;}
        #pdf2-status{font-size:.85em;margin-top:4px;font-weight:bold;}
        .suggested-questions-row{display:flex;flex-direction:column;gap:6px;}
        .sq-label{font-size:.85em;font-weight:600;color:var(--secondary);}
        .questions-select{width:100%;padding:8px;border:1px solid var(--iborder);border-radius:var(--radius);background:var(--input);color:var(--text);font-size:.9em;}
        .chat-display{height:360px;overflow-y:auto;border:1px solid var(--iborder);border-radius:var(--radius);padding:10px;background:var(--bg);line-height:1.6;}
        .chat-display .user-message,.chat-display .bot-message,.chat-display .system-message{margin-bottom:10px;word-wrap:break-word;}
        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}
        .message{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;max-width:100%;}
        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}
        .avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #eee;background-color:#f0f0f0;}
        body.dark-mode .avatar-img{border-color:#444;background-color:#555;}
        .message-bubble{padding:10px 15px;border-radius:18px;max-width:85%;word-wrap:break-word;line-height:1.5;display:flex;flex-direction:column;}
        .user-message .message-bubble.user-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:5px;margin-left:auto;}
        .bot-message .message-bubble.bot-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:5px;margin-right:auto;}
        .chat-display .message-bubble strong{color:var(--primary);font-size:.9em;}
        .chat-display .bot-message .message-bubble p{margin:0 0 8px;}.chat-display .bot-message .message-bubble p:last-child{margin:0;}
        .chat-display .bot-message .message-bubble pre{background:var(--dark);color:var(--light);padding:10px;border-radius:5px;overflow-x:auto;}
        .chat-display .bot-message .message-bubble code{background:rgba(0,0,0,.1);padding:2px 4px;border-radius:3px;}
        body.dark-mode .chat-display .bot-message .message-bubble code{background:rgba(255,255,255,.1);}
        .chat-display .system-message{background:var(--sys-bg);color:var(--sys-text);text-align:center;font-style:italic;font-size:.9em;padding:8px 12px;border-radius:var(--radius);}

        @keyframes pulseThink{50%{opacity:1}}
        .input-area{display:flex;gap:10px;}

        #send-button{background:var(--success);padding:0 20px;display:flex;align-items:center;justify-content:center;gap:8px;}
        #send-button:hover{background:#1e7e34;}
        .loader{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:none;}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        footer{text-align:center;padding:12px;background:var(--dark);color:var(--light);font-size:.8em;margin-top:20px;}
        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}

os destinos en la región.  Nuestro  agradecimiento  especial  a  Agustina  Romero,  por  sus  tareas  de  revisión  y    compilación del documento. Su dedicación y compromiso fueron muy valiosos para   compilar esta obra colectiva.  Finalmente,  al  Conselho  Nacional  de  Desenvolvimento  Científico  e  Tecnológico    (CNPq) de Brasil, por el apoyo otorgado al Proyecto en cooperación con comproba -  da articulación internacional (Proceso: 442323/2023-9), coordinado por el profesor   Alexandre  Augusto  Biz,  cuyo  liderazgo  y  compromiso  con  la  investigación  iberoa -  mericana  hicieron  posible  la  realización  de  este  proyecto  editorial.  También,  se    agradece a la dirección de investigaciones de la I.U Colegio Mayor de Antioquia por   el apoyo financiero en la investigación titulada: Modelo para la transformación di -  gital de las Pymes y la Gobernanza Pública del Turismo en destinos turísticos inteli -  gentes de América del Sur, la cual permitió investigar el proceso DTI en Colombia y   articular diversos investigadores en América alrededor de esta temática. \n4  Experiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  Agradecimientos  A equipe editorial deseja expressar seu profundo agradecimento ao Programa Ibero -  -Americano  de  Ciência  e  Tecnologia  para  o  Desenvolvimento  (CYTED),  sob  a  coorde -  nação de Josep Ivars-Baidal e Jennifer Soares, cujo apoio institucional tem sido fun -  damental para fortalecer a cooperação científica e promover a articulação de redes   de pesquisa na Ibero-América. Graças a esse apoio, foi possível consolidar um espaço   de intercâmbio e produção coletiva de conhecimento em torno dos Destinos Turísticos   Inteligentes.  Nosso reconhecimento se estende a cada um dos autores que integram esta obra, por   suas valiosas contribuições, pesquisas e reflexões que constituem o núcleo deste livro.   Cada  capítulo  representa  um  olhar  complementar  que  enriquece  a  compreensão  do    modelo ibero-americano de Destinos Turísticos Inteligentes e sua projeção futura.  À Rede Ibero-Americana de Destinos Turísticos Inteligentes, por  seu trabalho na arti -  culação acadêmica, técnica e institucional das equipes participantes, e por impulsio -  nar a cooperação entre universidades,  órgãos públicos  e entidades do setor turístico,   favorecendo  a  consolidação  de  uma  visão  compartilhada  do  desenvolvimento  inteli -  gente dos destinos na região.  Nosso agradecimento especial a Agustina Romero, pelas tarefas de revisão e compila -  ção do documento. Sua dedicação e compromisso foram fundamentais para a compi -  lação desta obra coletiva.  Por fim, ao Conselho Nacional de Desenvolvimento Científico e Tecnológico (CNPq) do   Brasil, pelo apoio concedido ao Projeto em cooperação com comprovada articulação   internacional  (Processo:  442323/2023-9),  coordenado  pelo  professor  Alexandre  Au -  gusto  Biz,  cujo  liderazgo  e  compromisso  com  a  pesquisa  ibero-americana  tornaram    possível a realização deste projeto editorial. Também agradecemos ao departamento   de pesquisa do I.U. Colegio Mayor de Antioquia pelo apoio financeiro à pesquisa intitu -  lada: Modelo para a transformação digital de PMEs e Governança Pública do Turismo   em  destinos  turísticos  inteligentes  na  América  do  Sul,  que  nos  permitiu  investigar  o    processo  de  DTI  na  Colômbia  e  reunir  diversos  pesquisadores  da  América  em  torno    desse tema. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  Índice 5  Índice  1.  Introducción  ....................................................................................................................   11  2.  Experiencias de destinos turísticos inteligentes en países de América La -  tina  .....................................................................................................................................   13  2.1.  Arge ........................................................................   296  4.4.4. México  ............................................................................................................   297  4.4.5. Perú  .................................................................................................................   297  4.4.6. Uruguay  ........................................................................................................   298  4.5. Consideraçoes  ........................................................................................................   299  Referências bibliográficas  .........................................................................................   300  5.  Turistas inteligentes  .....................................................................................................   306  5.1.  Introdução  ...............................................................................................................   306  5.2. Diversidade de turistas, desafios territoriais e descontinuidade polí -  tica  .............................................................................................................................   308  5.2.1.  O problema da imagem idealizada do turista inteligente  ..............   308  5.2.2.  Os DTI e a diversidade de contextos na América Latina  .................   309  5.2.3.  Descontinuidade política e fragilidade institucional nos DTI   latino-americanos  .....................................................................................   310  5.3. Desafíos enfrentados pelos turistas nos DTI  .................................................   311  5.4. Perspectiva dos Turistas: Desafios e Possibilidades nos Eixos da Rede   DTI  ..............................................................................................................................   312  5.4.1.  Governança: os turistas como stakeholders ausentes  ....................   313  5.4.2.  Inovação e perspectiva do turista  .........................................................   313  5.4.3.  Tecnologia: presença visível, impacto limitado  ................................   314  5.4.4.  Acessibilidade: a invisibilidade de múltiplas deficiências nos   destinos inteligentes  .................................................................................   314  5.4.5.  Sustentabilidade ambiental: o desafio do comportamento tu -  rístico sustentável ......................................................................................   315  5.4.6.  Sustentabilidade econômica: consumo consciente e valori -  zação da economia local  ..........................................................................   316 \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  Índice 10  5.4.7.  Sustentabilidade cultural: identidade, mediação e o risco da   exotização  ....................................................................................................   317  5.5.  Desafios metodológicos para a inclusão da perspectiva do turista em   DTI  ..............................................................................................................................   318  5.6. Considerações finais  .............................................................................................   319  Referências bibliográficas  .........................................................................................   321  6.  Conclusiones  ....................................................................................................................   324  Referencias bibliográficas  .........................................................................................   328 \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica 11  1. Introducción  Josep A. Ivars-Baidal  Coordinador Red CYTED  Jennifer C. Soares  Coordinadora Red CYTED  Entre las tres líneas temáticas de la Acción Estratégica-Red de Turismo CYTED: sos -  tenibilidad, seguridad e inteligencia, la investigación en torno a los destinos turísti -  cos inteligentes (DTI) se ha mostrado como una de las más dinámicas desde su inicio.   Enmarcada en el ámbito de la inteligencia, la línea de trabajo en torno a los destinos   inteligentes ha mostrado implicaciones más amplias y conectado directamente con   aspectos relativos tanto a la sostenibilidad como a la seguridad, así como con los re -  tos que afronta la planificación y gestión de los destinos turísticos en Iberoamérica.  La presente obra es el resultado de un trabajo colaborativo de investigadores/as de   diferentes países que analizan el proceso de desarrollo de los destinos inteligentes   en  varios  países  iberoamericanos  (Argentina,  Brasil,  Colombia,  México,  Uruguay    y Perú) y desde la perspectiva de los principales ejes del modelo DTI (Gobernanza,   Innovación,  Tecnología,  Accesibilidad  y  Sostenibilidad),  además  de  dos  capítulos    adicionales centrados en la transformación digital de los destinos y en los turistas   inteligentes.   El  objetivo  fundamental  de  este  trabajo  ha  sido  analizar  en  profundidad  el  estado    actual  y  las  perspectivas  futuras  de  los  destinos  turísticos  inteligentes  en  Iberoa -  mérica, ofreciendo una visión comparativa de las políticas nacionales, la aplicación   de  metodologías  DTI  y  la  importancia  de  la  transformación  digital  para  el  desar -  rollo turístico de la región. Sin duda, esta obra constituye una referencia académica   para comprender el proceso de implantación de los DTI en Iberoamérica y sus impli -  caciones. A la vez, la identificación de los desafíos y oportunidades del desarrollo de   los DTI le confiere una interesante dimensión aplicada, convirtiéndola en una guía   para avanzar hacia un modelo de turismo más inteligente.  Los diferentes trabajos ponen de relieve la complejidad y la heterogeneidad del de -  sarrollo del DTI en Iberoamérica. Sin duda, el modelo DTI de SEGITTUR y, de mane -  ra más limitada, el del Instituto Valenciano de Tecnologías Turísticas (INVAT-TUR),  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  1. Introducción 12  propician un proceso de transferencia y circulación de nuevas políticas en torno a la   planificación y gestión de los destinos en Iberoamérica, favorecido por la necesidad de   reforzar la digitalización de empresas y destinos turísticos como consecuencia de los   efectos de la pandemia de Covid-19. Sin embargo, como constatan las diferentes apor -  taciones de este libro, no se trata de una simple adopción del modelo DTI. Las diferen -  tes políticas y prácticas analizadas muestran una progresiva evolución que enriquece   el modelo y lo adapta en mayor medida al contexto iberoamericano.  Uno  de  los  valores  más  destacables  de  esta  obra  radica  en  el  conocimiento  directo    de los autores/as sobre el contexto turístico y el marco político-institucional de cada   país, además del propio proceso de desarrollo del DTI. De ahí que se haya respetado   el  idioma  nativo  de  cada  autor/a.  Por  este  motivo,  el  libro  constituye  una  compila -  ción exhaustiva de la implantación del DTI en diferentes países iberoamericanos que   aúna la descripción de los procesos con un análisis crítico y propositivo, con impli -  caciones relevantes tanto para la investigación como para la gestión del turismo en   Iberoamérica.  Esta  investigación  en  torno  a  los  DTI  ha  permitido  articular  un  proceso  de  coopera -  ción interdisciplinar e internacional, así como una colaboración directa con los entes   públicos de gestión turística, que no es frecuente en el ámbito iberoamericano. A esta   dinámica  de  cooperación  han  contribuido  tanto  la  Red  de  Turismo  CYTED  como  la    Red Iberoamericana de DTI. Este marco de cooperación para la generación de conoci -  miento turístico debe mantenerse, e incluso, reforzarse a partir de las líneas futuras   de trabajo que abre esta obra colectiva, una clara manifestación del dinamismo y la   relevancia crecientes de la investigación turística en el ámbito iberoamericano.   Por último, manifestamos nuestro más sincero agradecimiento al esfuerzo realizado   tanto por los autores/as que han participado en este trabajo como por los editores/as:   Ana Clara Rucci, Ledys Vianey López Zapata y Alexandre Augusto Biz. Sin duda algu -  na, el resultado final de todo este esfuerzo marca un hito esencial en el conocimiento   del desarrollo de los DTI en Iberoamérica que servirá de punto de partida e inspiración   para  futuras  investigaciones  y  reflexiones  en  torno  al  devenir  de  la  planificación  y    gestión de los destinos turísticos en esta región. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica 13  2. Experiencias de destinos turísticos   inteligentes en países de América Latina  La  presente  sección  reúne  un  conjunto  de  experiencias  nacionales  que  permiten    observar el modo en que el paradigma de los Destinos Turísticos Inteligentes (DTI)   ha  sido  interpretado,  adaptado  e  implementado  en  diferentes  países  de  América    Latina. Su propósito es ofrecer una visión comparativa que dé cuenta tanto de los   avances como de las tensiones y desafíos que acompañan la expansión del modelo   en la región. A partir de la identificación de políticas públicas, instrumentos norma -  tivos,  estrategias  institucionales  y  actores  involucrados,  los  capítulos  que  siguen    examinan las particularidades de cada contexto nacional, evidenciando las múlti -  ples formas en que la noción de inteligencia turística se articula con los procesos de   digitalización,  sostenibilidad  y  gobernanza.  En  este  sentido,  la  sección  constituye    una  lectura  coral  que  refleja  las  diferentes  velocidades,  trayectorias  y  grados  de    apropiación  del  modelo  DTI  en  América  Latina,  reconociendo  la  heterogeneidad    como rasgo constitutivo del proceso.  Los seis capítulos que integran este apartado —dedicados a los casos de Argentina,   Brasil,  Colombia,  México,  Uruguay  y  Perú—  muestran  un  mapa  complejo  de  polí -  ticas y prácticas en torno a la inteligencia turística. Cada experiencia nacional ha   sido elaborada por autores locales, conocedores de las dinámicas institucionales y   territoriales de sus respectivos países, lo que otorga al libro una perspectiva situa -  da y plural. En conjunto, estas contribuciones revelan cómo el modelo DTI, original -  mente desarrollado en el contexto europeo, ha sido reinterpretado en clave latinoa -  mericana mediante procesos de cooperación, innovación y adaptación normativa,   configurando una red creciente de destinos que buscan conjugar tecnología, soste -  nibilidad y bienestar ciudadano en sus estrategias de desarrollo turístico. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 14  2.1. Argentina: Policentricidad y normalización técnica del modelo   de destino inteligente  Gabriel Comparato    Universidad Nacional de La Plata, Argentina.  Ane Miren Diez Alberdi    Universidad Nacional de Mar del Plata, Universidad Nacional del Centro de la   Provincia de Buenos Aires, Argentina.  Ana Clara Rucci    Instituto de Investigaciones en Turismo, Facultad de Ciencias Económicas,   Universidad Nacional de La Plata, Argentina.  2.1.1. Introducción  En  el  escenario  internacional  actual,  la  transformación  digital,  la  sostenibilidad  y  la    adopción de nuevos modelos de gobernanza están redefiniendo la gestión del desar -  rollo en los destinos turísticos. En particular, el enfoque de los Destinos Turísticos In -  teligentes  (DTI)  se  consolida  como  un  paradigma  de  planificación  que,  mediante  la    incorporación  de  tecnología,  la  innovación,  la  sostenibilidad,  la  accesibilidad  y  una    gobernanza participativa, busca mejorar la experiencia del visitante y elevar la cali -  dad de vida de la población residente.  En  América  Latina,  la  expansión  del  modelo  español  de  DTI  ha  avanzado  considerable -  mente en los últimos años, especialmente a partir del trabajo de cooperación y transfe -  rencia de conocimiento liderado por la Sociedad Mercantil Estatal para la Gestión de la In -  novación y las Tecnologías Turísticas, S.A.M.P (SEGITTUR) y, en menor medida, el Instituto   Valenciano de Tecnologías Turísticas (INVAT-TUR). En particular, Argentina representa un   caso singular, con un desarrollo híbrido que combina iniciativas estatales, impulso del sec -  tor privado y liderazgo de actores subnacionales (Farberoff et al., 2018; Rucci et al., 2025).   En  función  de  lo  antes  expuesto,  el  objetivo  de  este  capítulo  es  presentar  una  carac -  terización  de  la  situación  actual  de  Argentina  en  materia  de  inteligencia  turística,    analizando sus antecedentes, los marcos institucionales existentes y el grado de apro -  piación del modelo DTI a nivel nacional y subnacional. Para ello, se adoptó una meto -  dología  cualitativa  basada  en  análisis  documental  (legislación  nacional,  normativa    técnica, informes oficiales, estadísticas turísticas, planes de desarrollo) que, frente a la   dispersión  de  información,  permitió  sistematizar  marcos  de  actuación,  actores  rela -  cionados e instrumentos de política pública vigentes.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 15  En términos expositivos, el capítulo se organiza en cuatro apartados. Primero, se pre -  sentan los principales indicadores socioeconómicos del sector, lo que permite contex -  tualizar el lugar de la actividad en la matriz productiva. En segundo y tercer lugar, se   describe  la  estructura  administrativa  y  política  con  competencia  en  la  materia  y  se    desarrolla un análisis diacrónico de los antecedentes de planificación de turismo inte -  ligente en el país. Por último, se examina la gestión vigente en inteligencia turística y   se reflexiona sobre sus alcances, limitaciones y desafíos futuros.  Los trabajos existentes reflejan estudios de caso o bien análisis específicos sobre ejes o   actores que han participado en procesos de inteligencia turística en Argentina (Farbe -  roff et al., 2018; Ramos y Campo, 2022; Álvarez y Diaz, 2022). Sin embargo, este trabajo   pretende  ser  un  aporte  al  poder  determinar  el  grado  de  adopción  del  modelo  DTI  a    escala nacional y subnacional y establecer una línea de base comparativa a nivel re -  gional que permita evaluar avances, detectar vacíos, identificar asimetrías y orientar   agendas de mejora.  2.1.2. Caracterización del país  Argentina  es  un  país  de  gran  extensión  territorial,  con  una  superficie  de  2,78  millo -  nes de km² y una población estimada de 45,6 millones de habitantes (Banco Mundial,   2024). El país se organiza políticamente en 23 provincias y la Ciudad Autónoma de Bue -  nos Aires (CABA) que es la capital del país. Su moneda es el peso argentino y la lengua   es española. Cuenta con una diversidad geográfica, cultural y climática que le otorga   un notable potencial turístico.  Desde  el  punto  de  vista  económico,  el  país  posee  un  Producto  Interno  Bruto  (PIB)  de    633.270 millones de dólares estadounidenses y un PIB per cápita de 13.858,2 USD (Ban -  co  Mundial,  2024).  Los  últimos  datos  reflejan  que  su  crecimiento  económico  anual    estimado  es  negativo  (-1,7%)  y  el  desempleo  se  sitúa  en  niveles  relativamente  bajos    (7,9%) (Banco Mundial, 2024). La inversión extranjera directa (IED) representa un 1,8%   del PIB (Banco Mundial, 2024), mientras que aquella relativa al turismo representa el   0,84% del total IED (Banco Central de la República Argentina, 2024).  La actividad turística tiene una relevancia significativa en la economía nacional. Según   datos  recientes,  la  contribución  directa,  indirecta  e  inducida  del  turismo  al  PIB  es  del    8,8%, lo que representa aproximadamente 58,3 mil millones de dólares estadounidenses   (WTTC, 2023). A nivel de empleo, cerca de 1,4 millones de personas se encuentran vincu -  ladas al sector, lo que equivale al 5,5% del empleo total para 2023 (Espeche Ortiz, 2024). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 16  En 2024 el país recibió 6,6 millones de turistas internacionales, generando ingresos por   5.000 millones de dólares y 7.800 dólares de gasto por turismo internacional (UN Tou -  rism, 2024). La mayoría de los intercambios turísticos internacionales se produce con   países limítrofes, lo que refleja una fuerte integración regional (principales emisores:   Brasil, Uruguay, Chile, Europa y resto de América).  En el plano doméstico, el turismo interno continúa siendo el principal motor del sector:   en 2022 se registraron más de 113 millones de visitantes entre turistas (50,3 millones)   y excursionistas (62,8 millones) (SINTA [Sistema de Información Turística de la Argen -  tina],  2022).  Esta  dinámica  es  especialmente  relevante  si  se  considera  que  por  cada    turista internacional hay 13 turistas locales. El gasto promedio diario es considerable -  mente menor en el turismo interno (USD 13 frente a USD 66 del turismo internacional),   aunque su volumen lo convierte en un actor clave del mercado (SINTA, 2022).  Argentina ocupa posiciones destacadas en los rankings turísticos de América Latina y el   Caribe: en 2023 se ubicó cuarta en llegadas internacionales y quinta en ingresos turísti -  cos, luego de México, República Dominicana, Colombia, Brasil, Argentina (ONU Turismo,   2024). Asimismo, según el Índice de Desarrollo de Viajes y Turismo (TTDI) 2024, Argenti -  na se ubica en el número cuarenta y seis a nivel mundial (Word Economic Forum [WEF],   2024). Además, el turismo representó el 31,16% de las exportaciones de servicios del país,   consolidándose como un sector estratégico para la balanza comercial.  En términos de conectividad, el país cuenta con una red aérea y terrestre que facilita el   ingreso de turistas: el 46% lo hace por vía terrestre, el 37% por vía aérea (concentrada   en los aeropuertos de CABA y GBA), y el 16% por vía marítima/fluvial. Doce jurisdiccio -  nes poseen más de 5.000 vuelos anuales, lo que muestra un grado relevante de descen -  tralización de la conectividad.  Argentina también ofrece una importante oferta cultural y natural reconocida inter -  nacionalmente, con trece sitios declarados Patrimonio de la Humanidad por la UNES -  CO, entre ellos el Parque Nacional Iguazú, la Quebrada de Humahuaca, Glaciar Perito   Moreno y el Museo y Sitio de la Memoria (ex-ESMA).  La organización institucional del turismo en el país está a cargo de la Subsecretaría   de Turismo, dependiente de la Secretaría de Turismo, Ambiente y Deportes. Además,   cuenta  con  organismos  como  el  Instituto  Nacional  de  Promoción  Turística  (INPRO -  TUR) y el Consejo Federal de Turismo, que articulan acciones entre el Estado nacional,   las provincias y el sector privado. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 17  2.1.3. Estructura gubernamental del turismo  El devenir de la actividad turística en la República Argentina  Una  mirada  retrospectiva  al  turismo  en  el  país  permite  identificar  diferentes  fases    respecto de la postura del estado en relación al turismo. Capanegra (2006) aporta una   lectura de la política turística como reflejo de tres modelos económicos adoptados en   Argentina  durante  el  siglo  XX,  el  modelo  agroexportador  (1860-1930),  el  proceso  de    industrialización por sustitución de importaciones 1932-1975), y el modelo de apertura   económica del último tercio de dicho siglo (1976-2001). En la primera etapa el turismo   era incipiente, de carácter elitista y sin participación activa del Estado. Durante el se -  gundo periodo indicado, el turismo social cobró protagonismo, se crearon organismos   específicos, como la Dirección Nacional de Turismo, se dictaron normas sectoriales y   se proyectaron planes de infraestructura. En 1934 el turismo ingresó como tema en la   agenda estatal. Esta etapa es interpretada como la transición de una “política en tu -  rismo” (acciones aisladas o dispersas) a una verdadera “política turística”, con mayor   estabilidad  institucional,  planificación  y  una  estrategia  sistemática  y  estructurada    (Capanegra, 2010). En la etapa de apertura, la lógica privatizadora limitó la interven -  ción estatal y promovió el turismo internacional como motor económico.   Durante  la  última  dictadura  cívico-militar  y  los  gobiernos  democráticos  subsiguien -  tes, Argentina adoptó un modelo económico de corte neoliberal. En este contexto, el tu -  rismo comenzó a ser visto como una alternativa de crecimiento económico vinculada   a la generación de divisas, empleo y atracción de inversiones. Esta visión se sustentó   en la incorporación del país a la Organización Mundial del Turismo (OMT), hoy ONU   Turismo, la adopción de planes estratégicos con apoyo de organismos internacionales   y la aplicación de medidas como la devolución del IVA al turismo extranjero (Schenkel,   2015). El énfasis estuvo puesto en el desarrollo del turismo receptivo, con la progresiva   retirada del Estado como actor central y la promoción de una economía de servicios.   La década de 1990 vio una serie de privatizaciones —incluyendo transporte y teleco -  municaciones— que afectaron también al sector turístico, acompañadas de estrate -  gias de marketing y liberalización del mercado (Luciano y Miranda, 2021).  La crisis económica y social de 2001 marcó un punto de inflexión. En su etapa de re -  cuperación,  el  Estado  argentino  reconfiguró  su  rol,  promoviendo  una  mayor  planifi -  cación  y  coordinación  con  el  sector  privado  y  los  gobiernos  provinciales.  El  turismo    fue  incluido  entre  las  “doce  políticas  de  Estado”  para  la  reconstrucción  económica,    apoyado por un discurso que lo consideraba capaz de dinamizar la economía, generar   empleo, fortalecer la identidad cultural y proteger los recursos naturales y culturales  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 18  (Schenkel, 2015). Entre las principales acciones se destacan la creación del Ministerio   de Turismo en 2010, la sanción de la Ley Nacional de Turismo N.º 25.997 (2005), que de -  finió al turismo como actividad socioeconómica estratégica y el diseño e implementa -  ción del Plan Federal Estratégico de Turismo Sustentable (PFETS), que estableció una   metodología participativa y federal (Luciano y Miranda, 2021). La nueva ley modificó   profundamente el marco institucional: promovió el trabajo en red entre los distintos   niveles  de  gobierno  y  el  sector  privado;  creó  el  Instituto  Nacional  de  Promoción  Tu -  rística  (INPROTUR)  y  el  Consejo  Federal  de  Turismo;  e  introdujo  criterios  de  calidad,    sustentabilidad e innovación en la gestión (Luciano y Miranda, 2021; Schenkel, 2015).   El Estado pasó de un modelo “fomentista y planificador en solitario” a un modelo “faci -  litador y coordinador”, articulando políticas en diálogo con actores múltiples, lo cual   refleja un cambio en la concepción de gobernanza pública.  En  2018,  ante  la  profundización  de  la  crisis  económica,  el  gobierno  nacional  redujo    su estructura para disminuir el gasto público. En ese marco, el Ministerio de Turismo   perdió su rango y volvió a ser una secretaría de Estado, tras ocho años con jerarquía   ministerial.  En  el  período  2015-2019,  la  política  turística  nacional  se  orientó  mayori -  tariamente  hacia  la  promoción  del  turismo  receptivo  como  motor  de  generación  de    divisas, con menor atención a la política pública del turismo social. El Plan Nacional de   Turismo 2016-2019 buscó atraer visitantes extranjeros mediante campañas dirigidas   y  diversificación  de  mercados,  pero  la  reducción  presupuestaria  y  la  fragmentación    institucional  limitaron  la  implementación  de  políticas  integrales  que  garantizaran    equidad y desarrollo interno (Schenkel, 2019).   El cambio de gestión de gobierno de 2023 profundiza la desjerarquización y marca un   nuevo cambio de rumbo en cuanto al rol del estado en la gestión del turismo. Esto se   evidencia tanto en el Decreto de Necesidad y Urgencia (DNU) 70/2023, orientado a la   desregulación de la actividad, como en medidas posteriores como el Decreto 216/2025,   el cual introdujo una reforma sustancial al marco normativo del turismo al modificar   la Ley Nacional de Turismo N.º 25.997. La reforma se enmarca en una política general   de reducción de funciones estatales, argumentada en facilitar la actividad privada y   minimizar la intervención gubernamental directa en el desarrollo turístico (Ministerio   de Desregulación y Transformación del Estado, 2025).   Mediante el mencionado decreto 216/25 se disuelven estructuras clave como el Comité   Interministerial de Facilitación Turística y se eliminan varias funciones históricamen -  te  desempeñadas  por  la  Secretaría  de  Turismo,  Ambiente  y  Deportes,  incluyendo  la    planificación y programación del sector turístico, el financiamiento de obras e infraes - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 19  tructura  turística,  las  estrategias  de  capacitación  para  prestadores,  los  subsidios  y    transferencias  a  provincias  y  el  Plan  de  Turismo  Social  y  el  Programa  Nacional  de    Inversiones Turísticas. Así, la política turística nacional pasa a orientarse exclusiva -  mente  a  funciones  de  promoción  y  marketing  del  país  como  destino.  Se  afirma  que    la  planificación  territorial,  la  formación  de  recursos  humanos  y  la  identificación  de    regiones a desarrollar no deben estar bajo competencia del Estado nacional, sino res -  ponder a la lógica del mercado y la iniciativa de los propios actores turísticos.   Desde esta nueva perspectiva, el turismo es considerado principalmente como un sec -  tor económico autorregulado, donde el Estado debe limitarse a remover trabas, redu -  cir costos y favorecer la conectividad, y se desestima así la planificación estratégica   estatal, la orientación del desarrollo regional y los programas de inclusión o fomento   del turismo social, pilares fundamentales de la política turística entre 2005 y 2023.  Estructura actual a nivel nacional  Desde  diciembre  de  2023,  la  estructura  turística  a  nivel  nacional  se  organiza  bajo  el    rango  de  Subsecretaría,  bajo  la  dependencia  funcional  de  la  Secretaría  de  Turismo,    Ambiente  y  Deportes,  la  cual,  bajo  la  órbita  de  la  Vicejefatura  de  Gabinete  del  Inte -  rior, está a cargo de asistir al Jefe de Gabinete de Ministros en la implementación de   políticas y reformas en áreas como interior, turismo, ambiente, deportes, y en la coor -  dinación de actividades gubernamentales, legislativas y de relaciones institucionales   (Jefatura de Gabinete de Ministros, s.f.).   Los  Entes  del  Sector  Público  Nacional  vinculados  con  el  Turismo  incluyen  la  Admi -  nistración de Parques Nacionales (APN), el Instituto Nacional de Promoción Turística   (INPROTUR) y el Consejo Federal de Turismo (CFT). La APN gestiona las áreas protegi -  das más importantes del país como espacios de conservación del patrimonio natural   y cultural, investigación, turismo sostenible y desarrollo local. El INPROTUR es un ente   público-privado creado en el marco de la Ley Nacional de Turismo N° 25.997, respon -  sable de la promoción turística internacional de la Argentina y de posicionar al país   como  destino  turístico  internacional  en  los  mercados  emisores.  Se  ocupa  del  diseño    y  ejecución  de  planes,  programas  y  acciones  en  materia  de  promoción  y  posiciona -  miento  turístico  a  nivel  internacional;  de  administrar  los  fondos  para  la  promoción    turística internacional; y del análisis de los mercados emisores y sus tendencias en pos   de buscar que los ciudadanos del mundo elijan vacacionar en Argentina. Finalmente,   el CFT es un órgano federal de carácter consultivo integrado por la Secretaría de Tu - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 20  rismo,  Ambiente  y  Deportes  de  la  Nación,  un  representante  del  organismo  oficial  de    turismo de cada provincia y de la Ciudad Autónoma de Buenos Aires. Su finalidad es   “hacer de la Argentina el país mejor posicionado de Latinoamérica por la diversidad   y calidad de su oferta, basado en desarrollos equilibrados del territorio, respetuosos   del ambiente y la identidad de sus habitantes” (Ministerio de Turismo y Deportes de la   Nación, s.f.).  Estructura interna de la Subsecretaría de Turismo y jerarquía a nivel provincial y   local  La  Subsecretaría  de  Turismo  cuenta  con  cuatro  Direcciones  Nacionales  y  supervisa,    además, a la Dirección del Consejo Federal de Turismo, que entiende en la Coordina -  ción de Políticas y Planes Turísticos Federales y la coordinación de Monitoreo Federal   del Turismo.  •  Dirección Nacional de Desarrollo y Promoción: Se compone de dos direcciones:   Dirección de Desarrollo Turístico -a cargo de las coordinaciones de Desarrollo   de Destinos Turísticos y de Captación de Inversiones-, y Dirección de Marketing   y Promoción, a cargo de la Coordinación de Productos y Eventos Turísticos y la   de Marketing, Promoción Digital y Contenidos.  •  Dirección Nacional de Planificación Turística Estratégica: Bajo su órbita se de -  sempeñan la Dirección de Relaciones Turísticas Internacionales e Instituciona -  les y la Dirección del Patrimonio Turístico Nacional.  •  Dirección Nacional de Turismo Social Responsable: a cargo de la Unidad Turís -  tica Embalse y la Unidad Turística Chapadmalal.  •   Dirección  Nacional  de  Calidad  Turística:  se  encuentran  bajo  su  mando  la  Di -  rección de Calidad, Dirección de Turismo Estudiantil y Dirección de Mercados y   Estadísticas.  Cada una de las 23 provincias argentinas cuenta en el marco de su estructura for -  mal con un área dedicada a la gestión turística. En once provincias reviste el carác -  ter de Ministerio; en otras cinco, de Secretaría; en dos, de Subsecretaría; en dos, de   Instituto; en dos, de Ente; en una, de Dirección y en una, de Instituto. 1  Por su parte, la   1  Once provincias argentinas cuentan con entidades de turismo con nivel ministerial: Catamarca, Chubut, Corrientes,   Formosa,  Jujuy,  Misiones,  Neuquén,  Río  Negro,  Salta,  San  Juan  y  San  Luis;  otras  cinco  lo  gestionan  a  través  de  una    secretaría: Entre Ríos, La Pampa, La Rioja, Santa Cruz y Santa Fe; en Santiago del Estero y en la provincia de Buenos  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 21  capital federal, Ciudad Autónoma de Buenos Aires, gestiona el turismo mediante un   ente de turismo.  La jerarquía que en cada caso se otorga al área específica de turismo da cuenta de la   disímil importancia relativa otorgada a la actividad turística en el territorio nacional.   De igual manera, a nivel local, el turismo se gestiona desde una diversidad de organis -  mos diferentes, en algunos casos formando parte de la estructura del municipio y, en   otras, como ente descentralizado. Respecto de sus funciones, el perfil y rol institucio -  nal  también  resulta  heterogéneo,  a  veces  incorporando  funciones  de  planificación  y    desarrollo de la actividad, y, en muchas otras, limitándose a la impulsión turística del   destino y la gestión de visitantes vinculada a la información turística.  2.1.4. Modelos de DTI en Argentina  Antecedentes del Modelo DTI en Argentina  Rucci  et  al.  (2025)  presentan  los  antecedentes  del  modelo  argentino  de  DTI,  identifi -  cando que en los años 2017 y 2018 surgen iniciativas gubernamentales en el país sobre   smart  city   y  comienzan  a  realizarse  eventos  vinculados  con  la  temática,  además  de    la creación del Instituto de Ciudades del Futuro (ICF). El ICF es una institución creada   por la Fundación Ciudad de La Plata que promueve un método para la planificación de   comunidades y destinos turísticos inteligentes en Argentina y Latinoamérica. A través   del uso de nuevas tecnologías y modelos participativos, asiste a las comunidades en   la  implementación  de  iniciativas  innovadoras  para  el  desarrollo  humano,  sostenib -  le  e  inclusivo.  El  ICF  trabaja  con  metodologías  reconocidas  internacionalmente,  de -  sarrolladas por la Organización de Naciones Unidas (ONU), el Banco Interamericano   de  Desarrollo  (BID),  la  Fundación  FIWARE,  el  Instituto  Argentino  de  Normalización    (IRAM) o la Asociación Española de Normalización (UNE), entre otros. Entre sus propó -  sitos, el ICF busca la transformación de las comunidades para mejorar la experiencia   de los visitantes y la calidad de vida de los residentes (ICF, s.f.).  Aires operan subsecretarías de turismo; en Chaco y Tierra del Fuego tienen institutos de turismo; Córdoba, una agen -  cia provincial; y Mendoza y Tucumán cuentan con entes de gestión. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 22  En  el  año  2018,  Farberoff  et  al.  (2018)  publican  el  trabajo  sobre  la  implementación  de    sistemas de gestión de Destinos Turísticos Inteligentes (DTI) en Argentina, donde anali -  zan las posibilidades de adaptación del modelo español, específicamente la norma UNE   178.501:2016  (Sistema  de  gestión  de  los  destinos  turísticos  inteligentes.  Requisitos),  al    contexto institucional y territorial de los municipios argentinos. A partir de un enfoque   crítico, los autores identifican una serie de condicionantes estructurales que limitan su   viabilidad  efectiva  y  señalan  que  no  resulta  posible  una  traslación  directa  del  modelo    europeo sin considerar las especificidades locales. Entre los principales hallazgos, el es -  tudio  destaca  cuatro  grandes  obstáculos.  En  primer  lugar,  el  carácter  federal  del  país    genera una gran heterogeneidad entre municipios, tanto en capacidades institucionales   como en marcos normativos, lo cual dificulta la implementación uniforme de cualquier   estándar.  En  segundo  lugar,  muchos  gobiernos  locales  enfrentan  restricciones  presu -  puestarias severas y carecen de personal técnico especializado, lo que reduce su margen   de acción para desarrollar políticas de innovación en turismo. En tercer lugar, existe un   déficit generalizado en la producción y sistematización de estadísticas turísticas confia -  bles, necesarias para gestionar bajo un enfoque basado en datos. Por último, los autores   subrayan la falta de integración microregional, es decir, la limitada articulación entre   municipios contiguos que comparten territorios turísticos, lo que debilita los procesos de   planificación conjunta y de gestión colaborativa.  Para  el  2019,  en  la  Universidad  Austral,  se  crea  la  primera  diplomatura  universitaria    de  Smart Cities  y, en abril de 2020, el primer espacio de intercambio de experiencias lla -  mado Red Argentina de Destinos Turísticos Inteligentes (Red DTI-Ar) (Rucci et al., 2025).   En el año 2021, el ICF junto con Fundación Ciudad de La Plata, la Universidad Nacional   de Tres de Febrero (UNTREF) y el Instituto de Ciencia y Tecnología de la UNTREF, pu -  blican el libro “Inteligencia Territorial Argentina - Miradas para el Desarrollo” donde   referentes técnicos y académicos del país escriben sobre el tema. A principios de 2022,   el  ICF  publica  la  Especificación  Técnica  (ET)  nro.  1,  en  la  cual  se  establecen  criterios    (no indicadores) para un DTI Inicial. Posteriormente, se publica la norma IRAM 42101   (Rucci  et  al.,  2025).  Ambos  instrumentos  comparten  prácticamente  los  mismos  ejes    que SEGITTUR.  Los  primeros  destinos  que  incursionan  en  la  implementación  de  especificaciones  y    normas vinculadas con DTI son Chascomús (distinguida en 2022), Posadas, La Costa,   Córdoba  (certifica  normas  IRAM  a  fines  de  2024)  y  Mar  Chiquita  (certifica  la  norma    IRAM en 2025) (Rucci et al., 2025). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 23  Asimismo, el ICF ha sido impulsor de iniciativas no sólo de implementación de modelos   de inteligencia turística en otros países de América Latina sino también de una de las   acciones más relevantes en la región: la creación de la Red Iberoamericana de DTI en   el año 2022. Esta iniciativa formalizó las redes informales preexistentes entre gestores   turísticos  y  organismos  facilitadores,  promoviendo  la  colaboración  y  el  intercambio    de  conocimientos  para  construir  un  marco  de  referencia  común  (Rucci  et  al.,  2025).    La Red se creó con el objetivo de generar alianzas estratégicas y constructivas entre   los sectores público y privado y organizaciones que apoyan el desarrollo sostenible y   competitivo en aquellos destinos que la componen (Red Iberoamericana de Destinos   Turísticos Inteligentes, s.f.).   A la fecha, la Red cuenta con 17 miembros de Argentina: tres miembros titulares -Po -  sadas (Misiones), Ciudad de Córdoba (Córdoba) y San Antonio Oeste (Río Negro)-; siete   miembros institucionales -la Cátedra libre “Destinos turísticos inteligentes, soberanos   y sostenibles” de la Universidad Nacional de La Plata, el Ministerio de Turismo de Mi -  siones, la Universidad Nacional de Mar del Plata, la Universidad Nacional del Nordes -  te, el Instituto Ciudades del Futuro, el Foro de Profesionales de Turismo y la Asociación   Hotelera  de  Turismo-;  seis  miembros  observadores  en  calidad  de  destinos  -Mar  del    Plata, Ciudad de Buenos Aires, Carmen de Areco, Mar Chiquita, San Fernando del Valle   de  Catamarca  y  San  Salvador  de  Jujuy-;  y  un  miembro  observador  institucional:  la    Asociación Argentina por el Turismo Accesible (AAPTA). Durante el año 2024, se llevó   a cabo un autodiagnóstico en el que participaron 36 destinos pilotos, entre ellos, 15 de   Argentina (Rucci et al., 2025).   La presencia de tres universidades nacionales da cuenta del rol activo que la academia   comienza a tener en vinculación con la temática, así como del interés por generar acciones   conjuntas para impulsar el desarrollo de los DTI. En este marco, la Red ha llevado adelante   diferentes propuestas de formación, articuladas con sus miembros del sector académico y   con otros actores con participación de integrantes de nuestro país. En el año 2024, se dictó   un curso de formación sobre DTI para gestores de destinos turísticos y para estudiantes   e investigadores universitarios, en dos instancias: en marzo de 2024 en Curitiba (Brasil)   en el marco de la Feria Internacional de Destinos Inteligentes (FIDI), y en junio de 2024 en   Montevideo (Uruguay) en el marco del Seminario Turismo 360. Este curso fue organizado   por el ICF, la Red Iberoamericana de DTI, la Asociación de Universidades Grupo Montevi -  deo (AUGM) - de las cuales participaron varias universidades argentinas: Universidad Na -  cional de La Plata (UNLP), Universidad Nacional de Mar del Plata (UNMdP), Universidad   Nacional del Nordeste (UNNE) y los municipios de Montevideo y Curitiba.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 24  Durante el año 2025, con una activa participación de representantes de Argentina en   la coordinación académica, la Red Iberoamericana de DTI planificó el dictado del cur -  so  virtual  en  certificación  de  consultores  y  auditores  Modelo  Metodológico  de  la  Red    Iberoamericana  de  Destinos  Turísticos  Inteligentes  (MM  RI-DTI),  organizado  en  dos    ediciones en castellano, una de ellas finalizada con la participación de diez cursantes   argentinos y otra programada para el último cuatrimestre del año.   Por su parte, con posterioridad al curso desarrollado en Curitiba y Montevideo, y luego   de  la  creación  del  Comité  de  Turismo  de  la  AUGM,  esta  organización  se  ha  sumado  al    trabajo vinculado con la temática de DTI. En forma conveniada con SEGITTUR y la Inten -  dencia de Montevideo, y con un alto protagonismo de universidades argentinas, AUGM   organizó en 2025 la “Convocatoria de propuestas: Proyectos de investigación en destinos   turísticos inteligentes”. Innovación para un turismo sostenible, inclusivo y basado en la   tecnología”. Con el objetivo de promover el desarrollo sostenible, la innovación, la me -  jora de las experiencias de los visitantes y la resiliencia de los destinos mediante tecno -  logías emergentes y estrategias basadas en datos se realizó la convocatoria, a la que se   postularon 22 proyectos, 18 de ellos liderados por universidades argentinas.    Durante los días 4 y 5 de septiembre de 2025, se llevó a cabo el Foro Nacional de Turis -  mo  2025,  realizado  en  la  ciudad  de  San  Juan  bajo  el  lema  “Transformando  destinos:    Innovación, Tecnología y Sostenibilidad para un Turismo Inteligente”, que constituyó   una instancia clave para fortalecer la agenda de DTI en Argentina. Reunió a represen -  tantes del sector público, privado, académico y comunitario, consolidando un espacio   de gobernanza colaborativa orientado a la transformación digital del turismo. El Foro   contribuyó a instalar el enfoque DTI en la política turística nacional, promoviendo la   adopción  de  herramientas  tecnológicas,  la  formulación  de  hojas  de  ruta  locales  y  la    generación  de  redes  interinstitucionales  para  la  innovación  y  la  sostenibilidad.  Ade -  más,  posicionó  a  Argentina  como  referente  regional  en  el  desarrollo  del  modelo  ibe -  roamericano de destinos inteligentes, articulando los principios de tecnología, accesi -  bilidad y sostenibilidad como pilares del futuro turístico del país.  2.1.5. Inteligencia turística y política pública   En  Argentina,  la  actividad  turística  se  enmarca  en  la  Ley  Nacional  de  Turismo  que    establece al turismo como una política de Estado y la reconoce como  “una actividad   socioeconómica,  estratégica  y  esencial  para  el  desarrollo  del  país”   (Ley  25997,  2005,    Artículo 1). A partir de esta ley y con el devenir de los próximos años, se fortalecieron   instituciones de carácter federal como el Consejo Federal de Turismo (CFT) y el Insti - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 25  tuto Nacional de Promoción Turística (INPROTUR) para la promoción internacional y   desarrollo de la “Marca País”. Estas estructuras permitieron articular planes naciona -  les con estrategias provinciales.  Ahora bien, pese a lo antes expuesto, el Estado nacional no tuvo un desempeño constante   en lo que va del siglo XXI, especialmente, en la conceptualización y diseño de políticas pú -  blicas. En primer lugar, fue alternando en términos de jerarquía institucional, pasando de   secretarías, ministerio a, actualmente, llegar a ser una subsecretaría (integrada dentro de   la Secretaría de Turismo, Ambiente y Deportes de la Nación). Por consiguiente, el desar -  rollo y el devenir de la política pública en materia de inteligencia turística tampoco lo fue.   Cabe preguntarse, ¿qué liderazgo ha llevado adelante el país en materia de inteligen -  cia turística?. En ese sentido, y a los efectos de su respuesta, se requiere de tres preci -  siones. Por un lado, no entender tal proceso como top-down o de arriba hacia abajo.   Es decir, la conceptualización, desarrollo e impulso en el desarrollo de modelos DTI en   Argentina no fue liderada unilateralmente por el organismo nacional de turismo, sino   que debe comprenderse en un mapa de actores más complejo.  Por  otro  lado,  la  vinculación  fue  más  indirecta  que  explícita.  Es  decir,  si  bien  el  de -  sarrollo de iniciativas DTI en el ámbito nacional no fue pensado integralmente (como   estrategia, plan o proyecto) tampoco significa que sean inexistentes los antecedentes o   iniciativas vinculables con el concepto de inteligencia o con algunos de sus ejes.   A modo de ejemplo, cabe destacar los avances en materia de gestión de datos y esta -  dísticas con el SINTA (Sistema de Información Turística de la Argentina). Se trata de   una  plataforma  pública  de  datos  que  administra  la  Subsecretaría  de  Turismo  de  la    Nación que permitió dar una mejora sustancial respecto a la información estadística   del país en materia de turismo. Nació en 2021 con el doble objetivo de estandarizar la   producción estadística en todo el país y poner esa información al servicio de la toma   de decisiones públicas y privadas.  Por  su  parte,  el  INPROTUR,  a  partir  de  2021,  desarrolló  el  Sistema  Aconcagua  –  pla -  taforma  de  big-data,  que  unifica  datasets   públicos  y  privados  (migraciones,  aéreos,    redes,  OTAs, gasto, etc.) y los visualiza en un tablero para el monitoreo diario de mer -  cados, productos y destinos (Ministerio de Economía de la Nación, 2021). A diferencia   del anterior, tiene acceso restringido y se utiliza para monitorear los principales des -  tinos  turísticos  del  país,  mediante  un  trabajo  conjunto  a  funcionarios  provinciales  y    municipales, y poniendo a disposición su metodología de trabajo que acelera la estra -  tegia de posicionamiento y promoción digital de los destinos. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 26  Más  recientemente,  se  podría  destacar  la  creación  del  Centro  de  Innovación  Tecno -  lógica Aplicada al Turismo, que funcionará en el marco del INPROTUR, con el objeti -  vo de impulsar la aplicación de soluciones tecnológicas e innovadoras que permitan   mejorar la competitividad del país como destino, modernizar el ecosistema turístico   y fortalecer la articulación entre los sectores público-privado y las provincias (Subse -  cretaría de Turismo de la Nación, 2025). No obstante, aún no hay precisiones respecto   a sus líneas de trabajo.  Probablemente,  entre  los  avances  más  significativos  se  encuentre  la  creación  de  la    norma técnica “Sistemas de gestión de destinos turísticos inteligentes” por parte del   Instituto Argentino de Normalización y Certificación (IRAM 42101:2022). Si bien se tra -  ta de una asociación civil sin fines de lucro, cumple un rol importante en el diseño de   las  políticas  sectoriales  a  nivel  nacional.  En  particular,  se  lo  pensó  como  un  instru -  mento al servicio de los gobiernos locales que pongan el foco en la gestión de los datos.   Incluye los ejes de Gobernanza, Sostenibilidad, Innovación, Inclusión y accesibilidad y   Tecnologías. Si bien tuvo su adaptación, su principal antecedente de referencia fue la   norma UNE 178501:2018 de la Asociación Española de Normalización.   En  materia  de  formación,  la  Argentina  avanzó,  a  través  del  Consejo  Federal  de  In -  versiones  (CFI),  en  el  desarrollo  de  un  Programa  de  Formación  en  Gestión  Turística    destinado a funcionarias y funcionarios provinciales de las áreas de turismo. Este pro -  grama, tiene, entre sus ejes principales, sensibilizar acerca del modelo de gestión en   Destinos  Turísticos  Inteligentes  (DTI)  y  contribuir  al  desarrollo  de  políticas  públicas    alineadas a esta temática. En el 2025 ya se encuentra en su tercera edición habiendo   formado más de 150 profesionales.   Por último, en materia de normalización técnica, la administración nacional de turis -  mo ha tenido una iniciativa en materia de DTI. Se trata de las “Directrices de Gestión   de Destinos Turísticos Inteligente”, dentro del Sistema Argentino de Calidad Turística   (SACT) y fue pensado para municipios que ya implementaron y distinguieron previa -  mente las “Directrices de Gestión e Innovación Turística”. No obstante, no hay antece -  dentes de ningún distinguido.  En tercera instancia, se puede mencionar que parte de la agenda del desarrollo de DTI   tuvo  activaciones  propias  de  los  organismos  provinciales  y  municipales  de  turismo.    Lejos de ser un proceso simétrico o generalizado, ha habido ciertos liderazgos. A modo   de ejemplo, la provincia de Córdoba ha sido una de las más activas, con la organiza -  ción  de  eventos  como  el  Primer  Congreso  Latinoamericano  de  Inteligencia  Turística   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 27  en  2023,  la  creación  de  la  Red  Cordobesa  de  Inteligencia  Turística  y  el  Programa  de    Gestión de Calidad DTI a fines de 2024. Esta iniciativa es financiada por el Consejo Fe -  deral de Inversiones (CFI) a través de la Agencia Córdoba Turismo (Agencia Córdoba   Turismo, 2024). Paralelamente, la ciudad capital de dicha provincia (Córdoba) fue la   primera ciudad certificada por la norma DTI IRAM 42101:2022 en el país.  Otros  casos  interesantes  son  las  provincias  de  Misiones  y  Neuquén.  La  primera,  por    ejemplo, fue la primera provincia en adherir a la Red Iberoamericana DTI. Entre sus   iniciativas se destaca Pyenda, una plataforma de datos integrada que incluye estudios   de perfil y cantidad de visitantes, la calculadora interactiva de huella de carbono, para   que  los  turistas  conozcan  la  marca  que  deja  su  actividad  en  el  medioambiente  y  las    maneras que tienen de revertirla; y la web de e-commerce oficial de la provincia, con   la oferta de los servicios y atractivos turísticos del destino. Por su parte, Neuquen fue   pionera en la creación de un área pública específica: la Dirección Provincial de Innova -  ción y Destinos Turísticos Inteligentes (aunque en la actualidad no está más vigente).  Con todo ello, se puede reconocer que Argentina cuenta con un marco normativo que   reconoce al turismo como política de Estado y ha desarrollado instrumentos relevantes   vinculados a la inteligencia turística. No obstante, su implementación ha sido discon -  tinua,  con  avances  fragmentados  y  liderazgos  desiguales  entre  niveles  de  gobierno.    La falta de una estrategia nacional integral ha sido suplida, en parte, por iniciativas   puntuales  o  innovaciones  desarrolladas  en  ciertas  provincias  y  municipios  que  han    asumido un rol más activo en la adopción del modelo de Destino Turístico Inteligente.   Esta realidad evidencia un mapa de actores complejo y una construcción de inteligen -  cia turística en el país más, dispersa y territorialmente asimétrica.  2.1.6. Conclusiones  El turismo ocupa un lugar estratégico en la economía argentina. Como se expuso al inicio   de este capítulo, su aporte directo e indirecto al Producto Interno Bruto (8,8%), la genera -  ción de más de 1,4 millones de empleos y su papel clave en la balanza comercial (31% de las   exportaciones de servicios) reflejan su relevancia como motor de crecimiento económico.   Esta centralidad económica y sociocultural del turismo exige, por tanto, políticas públicas   acordes, capaces de acompañar los procesos de transformación digital, innovación y sos -  tenibilidad que plantea el modelo de Destinos Turísticos Inteligentes (DTI).  Sin  embargo,  Argentina  atraviesa  actualmente  un  escenario  institucional  que  debi -  lita  ese  potencial.  A  pesar  de  haber  sido  pionera  en  la  región  en  la  formulación  de   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 28  instrumentos  de  planificación  estratégica  como  el  Plan  Federal  Estratégico  de  Tu -  rismo Sustentable (PFETS) o en la promoción de la normalización técnica, el país ha   experimentado en los últimos años una progresiva desjerarquización del turismo en   la  estructura  estatal  nacional,  con  una  drástica  reducción  de  funciones,  recursos  y    capacidades de articulación. En este marco, la agenda de inteligencia turística ha per -  dido protagonismo en las políticas públicas nacionales, sin una estrategia integral, sin   planes específicos ni financiamiento público sostenido.  No  obstante,  esta  ausencia  de  liderazgo  estatal  central  no  ha  implicado  una  paraliza -  ción de los procesos vinculados al paradigma DTI. El proceso argentino puede caracteri -  zarse como emergente, policéntrico y en expansión, con múltiples actores desplegando   acciones, metodologías y procesos de adaptación. La iniciativa más consolidada ha sido   el trabajo del ICF, una organización de base argentina que ha liderado la elaboración de   especificaciones técnicas (como la ET n.º 1 y la norma IRAM 42101), promovido la forma -  ción de recursos humanos, acompañado procesos locales de implementación y fortale -  cido la cooperación regional. Su papel ha sido clave en la consolidación de la Red Argen -  tina de Destinos Turísticos Inteligentes (Red DTI-Ar) y la Red Iberoamericana de DTI, que   hoy constituyen las principales plataformas de articulación, capacitación y desarrollo   metodológico para los destinos turísticos de Argentina y América Latina.   Pese a lo anterior, la implementación efectiva de planificación turística inteligente de -  pende fuertemente de la capacidad institucional y la voluntad política de cada jurisdic -  ción, lo que ha generado una dinámica desigual y fragmentada en el territorio nacional.   Casos como los de Córdoba, Misiones o Mar Chiquita muestran experiencias destacadas   y sostenidas, mientras que otras provincias o regiones —particularmente en el norte o   Cuyo— presentan escasa participación o niveles incipientes de apropiación del enfoque.  Este análisis coincide con lo advertido por Farberoff, et al. (2018), quienes identificaron   cuatro obstáculos estructurales que dificultan la implementación homogénea del mo -  delo DTI en Argentina:  (i)   la heterogeneidad institucional derivada del federalismo, que se traduce en ca -  pacidades dispares entre municipios;  (ii)   la escasez de recursos financieros y humanos en gobiernos locales, que impide   asignar presupuesto o personal técnico específico;  (iii) el déficit en la producción y sistematización de datos turísticos confiables;  (iv)  la baja integración microregional, lo que debilita la articulación entre destinos   contiguos y dificulta la planificación conjunta. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 29  A estos desafíos se suma la ausencia de una estrategia nacional articuladora, que es -  tablezca indicadores compartidos, mecanismos de evaluación, financiamiento y asis -  tencia técnica que favorezcan la equidad territorial. En este sentido, una política públi -  ca nacional activa —que actúe como facilitadora, articuladora y adaptativa— podría   desempeñar un rol clave en reducir asimetrías, ampliar el acceso a herramientas téc -  nicas y viabilizar procesos de auditoría, mejora continua y certificación. La definición   de escalas intermedias y progresivas de cumplimiento también permitiría avanzar de   forma más realista y sostenida en la incorporación de criterios de inteligencia turísti -  ca en destinos emergentes o con menor desarrollo institucional.  En este marco, el actual contexto político y normativo, suscrito por un proceso de des -  regulación y retiro del Estado nacional como actor planificador, no ofrece señales de   reversión inmediata. Las medidas adoptadas desde 2023 han debilitado la capacidad   pública de diseñar o sostener estrategias de desarrollo turístico inteligente. Como con -  secuencia, la responsabilidad de avanzar en esta agenda recae fundamentalmente en   provincias,  municipios,  universidades  y  actores  privados,  con  escasa  coordinación  y    sin marcos de integración nacional, lo que refuerza la fragmentación y profundiza las   inequidades en el acceso a recursos y oportunidades.  A futuro, la consolidación de una política de Destinos Turísticos Inteligentes (DTI) en   Argentina  dependerá  de  diversos  factores  interrelacionados.  En  primer  lugar,  será    clave  una  renovada  jerarquización  política  e  institucional  del  sector,  que  trascienda    el  enfoque  exclusivamente  promocional  e  incorpore  integralmente  los  distintos  ejes    de  la  política  pública.  Asimismo,  resultará  fundamental  avanzar  en  la  construcción    de  consensos  en  torno  a  modelos  de  planificación,  el  fortalecimiento  de  capacidades    técnicas a nivel local, el acompañamiento sostenido de organismos especializados, la   participación activa en redes colaborativas y la articulación efectiva entre los secto -  res público, privado, académico y la sociedad civil. El desarrollo de políticas eficaces en   Argentina exige agendas que reconozcan el capital acumulado, al tiempo que definan   hojas de ruta construidas en función de una priorización territorializada.   Referencias bibliográficas  Agencia  de  Turismo  de  Córdoba  (5  de  diciembre  de  2024).  Córdoba  avanza  con  la    Red  de  Destinos  Turísticos  Inteligentes.   Agencia  de  Turismo  de  Córdoba .  Recupe -  rado  el  30  de  julio  de  2025.     https://cordobaturismo.gov.ar/prensa/cordoba-avan -  za-con-la-red-de-destinos-turisticos-inteligentes/ \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.1. Argentina: Policentricidad y normalización técnica del modelo de destino inteligente 30  Álvarez, A. M. y Diaz, J. A. (2022). Indicios del Modelo de Destino Turístico Inteligente   en  Río  Gallegos,  Patagonia  Austral  (Argentina).   Realidad,  Tendencias  y  Desafíos    en Turismo, 21 (1) 21-42.  http://id.caicyt.gov.ar/ark:/s25456199/hxnoka073  Banco  Central  de  la  República  Argentina  (2024).  Información  sobre  inversiones  ex -  tranjeras  en  empresas  residentes.  Recuperado  el  7  de  julio  de  2025.     https://www.  bcra.gob.ar/PublicacionesEstadisticas/informe-inversion-extranjera-
