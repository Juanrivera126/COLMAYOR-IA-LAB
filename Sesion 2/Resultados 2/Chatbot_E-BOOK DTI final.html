 de la República, Uruguay.   2.5.1. Introducción  El  presente  trabajo  tiene  como  objetivo  trazar  un  panorama  sobre  el  proceso  de    transformación  de  Montevideo  en  Destino  Turístico  Inteligente  (DTI),  cuyos  hitos    destacados son la elaboración del Plan Departamental de Turismo (PDT) en 2024, y   la certificación de Montevideo como Destino Turístico Inteligente por parte de SEGI -  TTUR en 2025.  Los  autores  de  este  texto  han  tenido  participación  directa  en  el  proceso  durante  los    últimos dos años, sea desde la labor técnica en la División Turismo de la Intendencia   de Montevideo (IM) o como docentes de la Licenciatura en Turismo de la Universidad   de la República (UDELAR), trabajando junto a la división. A lo largo de este proceso se   han  producido  diversos  informes,  registros,  documentos  y  materiales  audiovisuales,    así  como  múltiples  instancias  de  participación  que  involucran  a  la  Intendencia  de    Montevideo, los municipios, el sector turístico y ciudadanía. Lo anterior conforma un   profuso corpus de información que admite varios niveles de análisis.  En lo que refiere a la metodología con que fue elaborado el presente texto, ésta se basa   en la reflexión crítica sobre el proceso y los insumos generados en su desarrollo, ba -  sado principalmente en el análisis documental, la observación y la reflexión crítica.  El texto comienza con una caracterización de la actividad turística en Uruguay y en   Montevideo, para luego centrarse en narrar el proceso de transformación en DTI. Pos -  teriormente se realizan algunas consideraciones acompañadas de una serie de desa -  fíos a futuro. El trabajo se cierra con un somero balance de lo realizado hasta ahora. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 92  2.5.2. Caracterización del país  La República Oriental del Uruguay es un país de dimensiones relativamente pequeñas   en comparación con sus vecinos regionales (Brasil y Argentina), con una superficie de   176.220 km² y una población estimada en 3.499.451 habitantes en 2023 (INE, 2024). Su   densidad poblacional es baja, de alrededor de 20 habitantes por kilómetro cuadrado,   y presenta una fuerte concentración en el área metropolitana: la capital, Montevideo,   reúne aproximadamente el 37% de la población nacional.   El territorio uruguayo se organiza en 19 departamentos, cada uno con un nivel de au -  tonomía administrativa ejercida por su órgano ejecutivo, compuesto por la/el Inten -  dente Departamental y un órgano legislativo: la Junta Departamental (ver figura 1).   Las autoridades departamentales (intendentes) se eligen mediante sufragio universal   cada cinco años. A partir de la Ley N.º 18.567, promulgada el 13 de septiembre de 2009,   se estableció la creación de entidades territoriales denominadas municipios, con el ob -  jetivo de descentralizar la administración y acercar la gestión pública a la ciudadanía.   Actualmente existen un total de 125 municipios en todo el país.   Desde el punto de vista económico, el país presenta un Producto Interno Bruto (PIB) no -  minal cercano a los 79,7 mil millones de dólares y un PIB per cápita de unos 23.526 dólares   (Uruguay XXI, 2025) 5 . En 2024 la economía uruguaya mostró un crecimiento de 3,1 %. Sin   embargo, según el Instituto Nacional de Estadística (INEa, 2025), en el mismo año el 17,3 %   de la población del país estaba bajo la línea de pobreza, con especial afectación a niños/  as menores de seis años (32,2 %) y hogares con jefatura femenina (16 %). Además, según el   mismo Instituto (INEb, 2025) persisten niveles altos de informalidad laboral (22,7 %) y un   índice de Gini de 0,394 que evidencia una concentración persistente del ingreso.  La  actividad  turística  en  Uruguay  ha  sido  un  factor  dinámico  en  el  crecimiento  del    país en los últimos años. Proceso que se vio interrumpido con la pandemia del virus   SARS-CoV-2. Pasó de recibir 494 millones de dólares por concepto de ingresos en el año   2004 a más de 1.750 millones de dólares en 2024, en lo que es un evidente aumento del   número de visitantes de turismo receptivo, pasando de 1,8 millones a más de 3.341.830   en el mismo lapso. En esos 20 años, hubo períodos en los que el turismo representó el   6,4% del PBI nacional. En relación al empleo formal en turismo, según el Centro de Es -  tudios de la Realidad Económica y Social (CERES), en 2023 el promedio fue de 104.288   cotizantes 6 , lo que equivale al 6,9% del total.  5  Fuente:   https://www.uruguayxxi.gub.uy/es/monitor-macro/    6  Cuantificación realizada por CERES con base en datos del Banco de Previsión Social (BPS). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 93  Los  principales  mercados  emisores  de  turistas  hacia  Uruguay  continúan  siendo  los    países vecinos, en particular Argentina y Brasil. En 2024 los visitantes argentinos su -  peraron los 900 mil, con un gasto total de 923 millones de dólares, mientras que Brasil   aportó  alrededor  de  468  mil  turistas  (MINTUR,  2024).  También  se  destacan  los  flujos    provenientes de Europa (152 mil), Norteamérica (108 mil), Chile (70 mil) y Paraguay (52   mil), junto con otros mercados americanos emergentes (MINTUR, 2024).   En  cuanto  a  la  distribución  territorial,  el  turismo  se  concentra  principalmente  en  la    Región  Metropolitana,  que  capta  más  del  40  %  de  los  viajes  internos,  y  en  la  Región    Este, donde se encuentran Punta del Este, con un 26,3 %. Le siguen en importancia el   Centro-Sur (13,6 %), el Litoral (10,2 %) y el Norte (8,5 %) (MINTUR, 2024). Los destinos   más reconocidos son Montevideo, que recibe cerca de un millón de turistas internacio -  nales por año, Punta del Este y Colonia del Sacramento, declarada Patrimonio Mun -  dial por la UNESCO.   En Uruguay, la administración pública del turismo está centralizada en el Ministerio   de Turismo (MINTUR), creado en 1986. El MINTUR define políticas, planes estratégicos   y acciones de promoción del país como destino turístico, y trabaja coordinadamente   con las intendencias departamentales y los municipios, que gestionan la oferta turís -  tica  de  sus  territorios  según  las  características  locales.  La  gestión  turística  también    involucra a entidades privadas y organizaciones de la sociedad civil, como cámaras   empresariales y asociaciones de prestadores de servicios.  El  marco  estratégico  y  normativo  del  turismo  en  Uruguay  se  encuentra  respaldado    por la Ley N.º 19.253 de Turismo (2014), que regula la actividad de los distintos actores   turísticos,  promueve  la  sostenibilidad  y  el  acceso  al  turismo.  En  línea  con  esta  ley,  el    país implementó el Plan Nacional de Turismo Sostenible 2030, que orienta el desarrollo   del sector hacia la sostenibilidad ambiental, la diversificación de la oferta, la innova -  ción,  la  formación  de  recursos  humanos,  la  inclusión  social  y  la  igualdad  de  género,    promoviendo un turismo que genere beneficios económicos, sociales y ambientales de   manera equilibrada (MINTUR, 2019). Cabe señalar que, a nivel nacional, aún no se ha   definido una estrategia formal para implementar el modelo de Destinos Turísticos In -  teligentes, aunque existen bases conceptuales y planes alineados con esta perspectiva.  A nivel de formación en turismo, Uruguay cuenta con una oferta educativa tanto técni -  ca como universitaria. En el ámbito técnico, la Universidad del Trabajo (UTU) ofrece di -  ferentes propuestas formativas como la Tecnicatura en Gestión de Empresas Turísticas,   el Tecnólogo en Itinerarios Culturales Turísticos Sostenibles y la Tecnicatura en Organi - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 94  zación de Eventos y Congresos. En el ámbito universitario, la Licenciatura en Turismo de   la Universidad de la República, vinculada a la Facultad de Humanidades y Ciencias de la   Educación (FHCE), con más de 20 años de trayectoria, se dicta actualmente en las sedes   de Salto y Maldonado 7 . Esta carrera ha impulsado investigaciones interdisciplinarias en   campos como economía, antropología, sociología, derecho y otros.   La comprensión del turismo en Uruguay y de la trayectoria de sus políticas públicas   también se sustenta en investigaciones académicas que han documentado su evolu -  ción histórica y su desarrollo institucional, véase por ejemplo (Da Cunha et al., 2012),   Campodónico (2018) y Quintana (2018).  2.5.3. Montevideo: ciudad capital y destino turístico  Montevideo,  la  capital  de  Uruguay,  concentra  gran  parte  de  la  población  y  la  activi -  dad económica del país. Con una superficie de 530 km² y una población estimada en   1.383.965 habitantes en 2023 (INE, 2024). La ciudad se distribuye en barrios que combi -  nan áreas residenciales, comerciales, culturales y turísticas, con una fuerte presencia   del litoral costero del Río de la Plata, que constituye uno de sus principales atractivos   para visitantes nacionales e internacionales.  Tal como se mencionó anteriormente, el tercer nivel de gobierno en Uruguay lo confor -  man los municipios, que en el departamento de Montevideo son ocho y están nombra -  dos con letras (A, B, C, CH, D, E, F y G).  Cada municipio está gobernado por un órgano de cinco miembros, el Concejo Munici -  pal, cuyas funciones son ejecutivas y administrativas. El/la alcalde/sa es quien preside   dicho órgano y los/las cuatro miembros restantes son concejales/as municipales. Tanto   alcaldes/as como concejales/as municipales se eligen por la ciudadanía mediante voto   directo, junto a intendentes y ediles, en las elecciones departamentales y municipales.  A  grandes  rasgos,  el  cometido  de  los  municipios  es  satisfacer  las  necesidades  indi -  viduales  y  colectivas  de  los  habitantes  de  cada  territorio  a  través  de  la  implementa -  ción de políticas públicas. Por su parte, los alcaldes y alcaldesas tienen por obligación,   además  de  presidir  las  sesiones  del  Concejo  Municipal,  hacer  cumplir  la  normativa    departamental y municipal, así como gestionar y administrar el municipio a partir del   presupuesto proveniente del segundo nivel de gobierno (la Intendencia).   7  https://fhce.edu.uy/turismo/ \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 95  Montevideo, además, cuenta con la particularidad de tener 18 Centros Comunales Zo -  nales  (CCZ)  distribuidos  y  articulados  entre  los  ocho  municipios;  todo  ello,  a  su  vez,    vinculado  directamente  con  el  segundo  nivel  de  gobierno.  En  dichos  centros  zonales    se promueve la participación ciudadana en todos los ámbitos. Esto quiere decir que el   tercer nivel de gobierno en el departamento se compone de municipios que, a su vez,   nuclean los CCZ. Estos centros existen desde 1990, período en que comenzó un proceso   de descentralización y participación ciudadana a nivel departamental. Por tanto, los   CCZ  son  anteriores  a  la  municipalización  y,  en  sus  orígenes,  se  organizaban  de  una    manera algo diferente a la actual.  En  líneas  generales,  un  CCZ  es  una  dependencia  descentralizada  de  la  IM  que  se  en -  carga de aspectos vinculados a la gestión administrativa (trámites, reclamos, solici -  tudes, servicios, información, entre otros). Cuenta también con un órgano deliberante,   el Concejo Vecinal, creado en 1993 y conformado por entre 25 y 40 vecinos/as y repre -  sentantes de organizaciones sociales. Su función es consultiva, asesora, de contralor   de la gestión y, además, se debaten allí propuestas barriales. Asimismo, tiene un papel   preponderante en lo referido a la elaboración del presupuesto quinquenal.  Los  miembros  del  Concejo  Vecinal  son  elegidos  por  voto  secreto  y  universal  en  cada    zona  y  su  mandato  dura  dos  años.  En  el  contexto  de  los  Concejos  Vecinales  operan    variadas comisiones zonales sobre temas que, por lo general, se enmarcan en diver -  sos programas impulsados desde el segundo nivel de gobierno o desde los municipios   como, por ejemplo, Cultura, Patrimonio, Medio Ambiente, Salud, Género, Turismo.  En relación a la gestión turística, la División Turismo de la Intendencia de Montevideo   tiene  a  su  cargo  el  desarrollo  de  la  política  turística  del  departamento,  coordinando    con  el  Ministerio  de  Turismo,  los  municipios  y  actores  regionales.  Sus  funciones  in -  cluyen fomentar, conservar y promover los atractivos turísticos de la ciudad, tanto a   nivel  nacional  como  internacional;  coordinar  los  servicios  departamentales  vincula -  dos al turismo; establecer acuerdos con entidades públicas y privadas para impulsar   la  promoción  del  destino;  y  gestionar  infraestructuras  turísticas  de  la  Intendencia,    como el Centro de Conferencias, el Mirador Panorámico y la Sala Ernesto De los Cam -  pos (Intendencia de Montevideo, 2022).  Montevideo se configura como un destino turístico multiproducto, caracterizado por   la coexistencia y articulación de diversas tipologías de oferta. La estructura de su de -  manda  se  concentra,  fundamentalmente,  en  dos  grandes  segmentos:  el  turismo  re -  creativo, vinculado al ocio, la cultura y la experiencia urbana; y el turismo profesional,  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 96  asociado a viajes de negocios, congresos, convenciones y otros eventos corporativos.   En  correspondencia  con  esta  segmentación,  los  productos  turísticos  estratégicos  del    destino  se  orientan,  por  un  lado,  hacia  el  turismo  cultural,  sustentado  en  un  valioso    acervo patrimonial —material e inmaterial—, y, por otro, hacia el turismo de reunio -  nes, incentivos, congresos y exposiciones (MICE), respaldado por una infraestructura   especializada y servicios de calidad. A ello se suma la relevancia de Montevideo como   principal puerto de escala de cruceros del país, lo que la convierte en la principal puer -  ta de entrada marítima de visitantes internacionales.  En 2024, Montevideo, como principal puerta de ingreso al país, absorbió una parte sig -  nificativa  del  turismo  receptivo  alcanzando  509  millones  de  dólares  americanos  por    concepto de gasto turístico. Del total de 898.297 no residentes, el flujo turístico estuvo   marcado principalmente por argentinos (37.3 %), seguidos por uruguayos no residen -  tes (19,6 %) y luego por brasileños (12%).   En lo que refiere al turismo interno, Montevideo se posiciona como un destino de alta   relevancia, gracias a su amplia agenda de eventos, actividades culturales, deportivas   y recreativas, que actúan como factores de atracción para visitantes procedentes de   otros departamentos. De acuerdo con los registros del Observatorio Turístico del Mi -  nisterio de Turismo, durante el año 2024 la capital recibió 867.688 visitantes internos   registrando un promedio de estadía de 9 noches por visita, indicador que refleja una   alta retención del visitante y un potencial impacto económico sostenido en el tiempo.  Respecto a la procedencia geográfica de estos visitantes, se observa una correlación di -  recta con la proximidad territorial: el departamento de Canelones encabeza el ranking   con la mayor representatividad porcentual, seguido por Maldonado y Colonia.   La  dinámica  espacial  de  la  actividad  turística  presenta  una  marcada  concentración    geográfica  en  dos  áreas  de  alta  significancia:  el  Casco  Histórico  (Ciudad  Vieja)  —que    funciona como núcleo patrimonial, cultural y de identidad urbana— y la zona costera al   este del departamento, donde se combinan atractivos paisajísticos, oferta gastronómica   y hotelera. Esta concentración plantea tanto desafíos como oportunidades en términos   de descentralización, diversificación territorial y sostenibilidad de flujos turísticos.  En agosto de 2025, momento en que se escribe este texto, y según el registro de opera -  dores turísticos del Ministerio de Turismo, Montevideo cuenta con aproximadamente   1000 empresas turísticas registradas en este organismo, clasificadas en las siguientes   categorías:  agencias  de  transporte,  agencias  de  viaje,  alojamientos  turísticos,  acti -  vidades  deportivas,  bodegas,  establecimientos  rurales,  inmobiliarias,  corredores  in - \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 97  mobiliarios, guías turísticos, turismo aventura, rentadoras de autos, y organizadores   profesionales  de  congresos.  Del  mismo  modo,  un  gran  número  de  micro  y  pequeños    emprendimientos del sector gastronómico y artesanal participan directamente de la   cadena, principalmente en áreas con gran afluencia de turistas.   De acuerdo con el procesamiento y la difusión de información 8  realizada por la Divi -  sión Turismo, a partir del análisis de la Encuesta Continua de Hogares (ECH/INE), se   estima que en Montevideo, durante el año 2024, aproximadamente 52.000 personas se   encontraban empleadas en actividades características del turismo, cifra que equivale   al 7,6 % del total de ocupaciones del destino.  El comportamiento del empleo turístico evidenció una leve contracción en compara -  ción  con  el  nivel  alcanzado  en  2023.  En  paralelo,  el  análisis  del  impacto  económico    señala  que  la  actividad  turística  generó  el  1,7  %  del  valor  agregado  departamental,    destacándose como principales vectores dinamizadores el comercio, la gastronomía y   los servicios culturales.  La  caracterización  de  la  estructura  ocupacional  del  sector  revela  una  participación    paritaria entre mujeres y hombres, un grado de formalidad superior al promedio de -  partamental  y  una  prevalencia  de  niveles  educativos  medios.  Asimismo,  se  constata    una mayor proporción de empleo dependiente y una marcada concentración territo -  rial de la fuerza laboral, con residencia mayoritaria en el propio departamento.  2.5.4. Antecedentes en la planificación turística de Montevideo  La  ciudad  cuenta  con  una  prolongada  trayectoria  de  articulación  público-privada,    que  ha  constituido  un  marco  sólido  para  el  desarrollo  de  procesos  de  planificación    turística.  Uno  de  los  hitos  iniciales  fue  la  conformación  de  la  Corporación  Turística  de  Monte -  video, en 2001, liderada por la Intendencia de Montevideo y con financiamiento total -  mente  público.  Posteriormente  se  crea  el  Conglomerado  de  Turismo  de  Montevideo,    reuniendo  a  empresas,  asociaciones,  organismos  públicos  y  entidades  académicas    para trabajar en la diversificación de productos, la mejora de la competitividad y la   promoción conjunta del destino. Su funcionamiento se basó en mesas temáticas y pla -  nes de acción plurianuales, integrando también diagnósticos y estudios de mercado.  8  https://www.descubrimontevideo.uy/sites/default/files/2025-06/Empleo-en-Montevideo-2024.html \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 98  Hacia  2010,  el  Conglomerado  se  convierte  en  Asociación  Turística  de  Montevideo    (ATM) 9  como una entidad representativa del sector privado turístico local, actuando   como interlocutor ante las autoridades y promoviendo acciones de asociatividad, in -  tegración sectorial, desarrollo de productos y comercialización, vigente al día de hoy.   En 2018, ante la necesidad de posicionar la ciudad en el segmento de turismo de reu -  niones, se creó el Bureau de Congresos y Visitantes de Montevideo, una organización   orientada a la captación y gestión de eventos, congresos y ferias, el cual buscó la arti -  culación con prestadores de servicios especializados pero que no prosperó.   En conjunto, estos organismos han configurado una arquitectura de gobernanza tu -  rística que, si bien ha enfrentado desafíos de sostenibilidad institucional y financiera,   ha permitido sentar bases para una planificación más integrada, con espacios de par -  ticipación  multiactor,  visión  estratégica  compartida  y  mayor  capacidad  de  gestión    frente a un mercado turístico cada vez más competitivo.  A  nivel  de  gestión  pública,  el  crecimiento  del  turismo  y  su  impacto  en  la  estructura    socioeconómica  del  departamento  implicó  una  ampliación  y  redefinición  de  las  fun -  ciones de la División Turismo de la Intendencia de Montevideo. Este proceso se tradujo   en la incorporación gradual de competencias vinculadas a la gestión estratégica del   sector, reflejándose en el cambio de área de referencia, al pasar, en el año 2005, de la   Dirección de Cultura a la Dirección de Desarrollo Económico, con el objetivo de forta -  lecer la planificación, coordinación y promoción de la actividad turística como instru -  mento de desarrollo local.  2.5.5. Inicios de la apuesta por modelos de DTI en la ciudad  Durante el período 2015-2020, Montevideo inició la implementación de algunas inno -  vaciones  tecnológicas  y  mejoras  en  la  gestión  urbana,  sentando  las  bases  para  una    transformación progresiva de la administración pública departamental. Este proceso   se consolidó en la gestión 2020-2025 a través de un conjunto de estrategias integrales   tendientes a mejorar la calidad de vida de los habitantes y que involucraron a múlti -  ples  sectores  de  la  comuna.  El  objetivo  fue  incrementar  la  eficiencia  de  los  servicios    públicos, ampliar la participación ciudadana y fortalecer la sostenibilidad urbana. Si   bien no se contó con un documento rector único, la Intendencia de Montevideo avan -  zó en la definición de políticas tecnológicas y ambientales, orientadas a optimizar la   toma de decisiones y a elevar la calidad de vida de la población.   9  https://www.descubrimontevideo.uy/asociacion-turistica-de-montevideo   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 99  En el marco de este proceso, en 2020, Montevideo fue distinguida como Ciudad Inteli -  gente de Iberoamérica durante el Smart City Expo LATAM Congress, reconocimiento   que  reflejó  los  avances  en  transformación  digital  impulsados  por  la  comuna.  Estas    iniciativas permitieron, entre otros logros, la implementación de un plan estratégico   de gestión y continuidad de servicios, garantizando su operatividad incluso durante   la pandemia del virus SARS-CoV-2.   En  el  mismo  período,  y  ya  concibiendo  a  Montevideo  como  ciudad  inteligente,  se  co -  mienza  a  trabajar  en  el  proceso  de  conversión  de  la  ciudad  en  un  destino  turístico    inteligente.  Los  primeros  acercamientos  a  la  temática  se  realizaron  con  el  Instituto    Valenciano de Tecnologías Turísticas (Invatur), uno de los pioneros en la aplicación del   Modelo de Destinos Turísticos en los destinos de la Comunidad Valenciana.   En 2018 se elaboró el documento “Montevideo: de ciudad turística a destino turístico   inteligente  (2018-2022)” 10 ,  cuya  propuesta  central  se  basa  en  el  concepto  de  Destino    Turístico Inteligente (DTI). El enfoque inicial resaltó las oportunidades que brindan las   tecnologías de la información y la comunicación para optimizar la gestión turística y,   de manera más amplia, la administración del desarrollo territorial, promoviendo un   modelo de gobernanza innovador que difiere de las prácticas tradicionales.  Es importante subrayar que, en el marco conceptual actual de los DTI, la atención ha   trascendido  el  enfoque  exclusivamente  tecnológico,  adoptando  un  modelo  integral    orientado a la sostenibilidad, que considera dimensiones sociales, ambientales y eco -  nómicas de la actividad turística.  La  estrategia  se  organizó  en  cuatro  ámbitos  principales,  que  permitieron  definir  lí -  neas de acción sobre las cuales se articularon proyectos y medidas concretas. Aunque   no todas las iniciativas fueron implementadas durante el período, el documento esta -  bleció una hoja de ruta clara para la transformación del turismo convencional hacia   un modelo inteligente, proporcionando los lineamientos metodológicos y estratégicos   para su desarrollo futuro.  En  2020  hubo  cambio  de  gobierno  departamental  mientras  la  pandemia  del  virus    SARS-CoV-2  exigía  la  paralización  de  la  actividad  turística  en  la  mayor  parte  de  los    destinos.   En  2022,  iniciando  un  proceso  de  reapertura,  la  capital  fue  seleccionada  por  el  Ban -  co Interamericano de Desarrollo (BID) para recibir asistencia técnica en el marco del   10   https://montevideo.gub.uy/sites/default/files/biblioteca/estrategia-2022-corregida1.pdf   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 100  programa  Turismo  Futuro.  Esta  iniciativa  buscaba  contribuir  a  la  competitividad  y    sostenibilidad del sector turístico de América Latina y el Caribe mediante la adopción   de tecnologías digitales y emergentes, y fue un impulso para que Montevideo profun -  dizara en una de las dimensiones del modelo DTI.   En febrero de 2023, la Intendencia de Montevideo firmó un convenio con la Sociedad   Mercantil  Estatal  para  la  Gestión  de  la  Innovación  y  las  Tecnologías  Turísticas  (SE -  GITTUR), organismo dependiente del Ministerio de Industria, Comercio y Turismo de   España, para implementar una nueva forma de gestión turística.  A lo largo de este proceso se analizaron los datos disponibles en relación con los ejes   estratégicos, se realizaron entrevistas con responsables de distintas áreas de la Inten -  dencia de Montevideo y con referentes de organismos públicos y privados vinculados   al  sector,  y  se  elaboró  una  hoja  de  ruta  para  la  implementación  de  mejoras.  Con  la    puesta en marcha de los nuevos proyectos, se alcanzaron resultados que transforma -  ron significativamente la concepción del turismo. Como reconocimiento a este avance,   en julio de 2023 Montevideo fue distinguido por Segittur como Destino Turístico Inte -  ligente  adherido,  convirtiéndose  en  la  quinta  ciudad  de  América  Latina  en  obtener    dicha acreditación.  Meses  antes,  Montevideo  se  adhirió  a  la  Red  Iberoamericana  de  DTI  como  miembro    titular,  buscando  fortalecer  sus  capacidades  de  planificación  y  gestión  mediante  el    intercambio  de  conocimientos,  la  cooperación  técnica  y  la  incorporación  de  buenas    prácticas  de  otros  destinos  que  estaban  implementando  algún  tipo  de  metodología    asociada al DTI.   Buscando visibilizar el proceso iniciado y conscientes de que se trataba de un modelo   que requeriría la apropiación de toda la cadena de valor del turismo, la Intendencia   de Montevideo junto con la Facultad de Humanidades y Ciencias de la Educación de la   Udelar y la Asociación de Universidades del Grupo Montevideo, con respaldo de Segi -  ttur, la Red Iberoamericana de DTI, el Instituto Ciudades del Futuro, la Asociación Tu -  rística de Montevideo y la Asociación de Hoteles y Restaurantes del Uruguay, organi -  zaron el Seminario Internacional Turismo 360, en julio de 2023, el cual sentó las bases   para la realización de la primera feria internacional de destinos turísticos inteligentes   de Uruguay, Turismo 360, la cual tuvo su segunda edición en 2025.   Esa  primera  experiencia  conjunta  con  la  Licenciatura  en  Turismo  dio  paso  a  la  sus -  cripción de un convenio entre la Intendencia de Montevideo y la Facultad de Humani -  dades y Ciencias de la Educación orientado a fortalecer la inserción del turismo en la  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 101  escala municipal y con el propósito de elaborar el Plan Departamental de Turismo. De   esa  manera,  desde  2023  se  generó  un  proceso  de  articulación  entre  los  saberes  aca -  démicos con los procesos de planificación territorial y la participación social, promo -  viendo  una  estrategia  de  desarrollo  turístico  descentralizado  que  reconoce  el  rol  de    los municipios como actores clave en la consolidación del modelo de Destino Turístico   Inteligente.   En marzo de 2025, el destino reafirmó su liderazgo en turismo inteligente, sostenible e   inclusivo en América Latina al ser premiado por segundo año consecutivo como Destino   Turístico Inteligente del año, un galardón otorgado por la Red Iberoamericana de DTI.  El proceso de trabajo continuó en base a las recomendaciones de Segittur, a las prio -  ridades definidas por la División Turismo y al trabajo realizado con los 8 municipios,   alcanzando  la  distinción  como  Destino  Turístico  Inteligente,  en  mayo  de  2025,  al  su -  perar el 80% de cumplimiento de los indicadores establecidos por el modelo. Con este   resultado,  se  convirtió  en  el  decimosegundo  destino  a  nivel  mundial  en  alcanzar  los    estándares de la metodología desarrollada por Segittur.  Figura 1.  Porcentaje de cumplimiento por dimensión del modelo DTI – Montevideo (2023–2025).  Fuente: Elaboración propia a partir de información de la División de Turismo (2025). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 102  2.5.6. Planificación turística de Montevideo: PDT (H2035) y planes municipales  Como  ya  fue  mencionado  en  el  apartado  anterior,  en  2023  la  IM  firmó  un  convenio    con  la  Facultad  de  Humanidades  y  Ciencias  de  la  Educación  de  la  Universidad  de  la    República, a través de la Licenciatura en Turismo. El cometido principal fue apoyar a   la División Turismo de la intendencia en la elaboración y puesta en funcionamiento del   Plan Departamental de Turismo para Montevideo (PDT). Las actividades comenzaron   el 1° de diciembre del mismo año. En ese contexto se conformó un equipo de tres do -  centes y nueve estudiantes avanzados de la licenciatura que llevaron y llevan a cabo   pasantías en cada uno de los ocho municipios de Montevideo, así como también en la   oficina de la División Turismo.   El equipo docente tuvo a su cargo la elaboración y redacción del PDT, así como la or -  ganización de instancias de diálogo en las que participaron representantes de los mu -  nicipios  y  demás  actores  que  conforman  el  sector  turístico.  Este  grupo  también  ha    coordinado y acompañado hasta el presente las actividades del grupo de pasantes a   nivel de municipios junto con la División Turismo.   Puede señalarse además que para la elaboración del plan se desarrolló una metodo -  logía sin precedentes en lo local, que implicó un trabajo participativo a nivel de terri -  torio involucrando diversos actores del sector turístico, de la administración pública   y de la ciudadanía civil. El proceso de elaboración del plan, incluyendo sus instancias   aprobatorias, duró gran parte del año 2024.  Finalmente, el Plan Departamental de Turismo con horizonte 2035 11  fue aprobado por   el  Consejo  Departamental  de  Turismo  a  fines  de  2024  y  lanzado  en  enero  de  2025;  su    objetivo general es sentar las bases para un desarrollo turístico ordenado y sostenible   para  Montevideo,  en  lo  económico,  social  y  ambiental,  que  apunte  a  garantizar  los    derechos de la ciudadanía, sujeto del plan. Sin duda alguna que el PDT opera como eje   estructurador del proceso de planificación y gestión de la actividad turística a nivel de   Montevideo.  El plan se estructura según el modelo de DTI, organizándose en los cinco ejes ya cono -  cidos  (gobernanza,  tecnología,  innovación,  accesibilidad,  sostenibilidad)  a  los  cuales    se les agregó un sexto eje relativo a la democratización en el acceso al ocio y al turis -  mo, por considerarlo relevante en el contexto montevideano.  11   https://www.descubrimontevideo.uy/plan-departamental-de-montevideo   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 103  Durante 2025 todo el equipo se ha abocado a la implementación y puesta en marcha   del PDT, coordinando acciones tanto a nivel departamental como a nivel de munici -  pios.  Como  ya  fue  mencionado,  Montevideo  presenta  una  compleja  estructura  adminis -  trativa descentralizada, organizada en ocho municipios que a su vez integran varios   centros comunales zonales donde operan diversas comisiones temáticas (ver Figura   2).  Esta  configuración  evidencia  una  importante  capilaridad  de  gobierno,  gestión  y    participación ciudadana que engloba los tres niveles de gobierno. Si bien el PDT es de   alcance departamental, su elaboración implicó tomar en cuenta las diversas realida -  des de cada uno de los ocho municipios.   Paralelamente, en el plan se explicita la intención de que cada municipio, dentro de su   autonomía, planifique y gestione la actividad turística en su territorio. En virtud de lo   anterior, en la primera mitad de 2025 desde la División Turismo y el equipo de trabajo   se impulsó la elaboración de planes municipales de turismo, que a su vez dialogan con   el PDT. Dicha elaboración estuvo a cargo de funcionarias y funcionarios municipales   apoyados por pasantes del equipo y acompañados por el equipo técnico y la División   Turismo.   El cometido de la elaboración de estos planes es consolidar un proceso de descentra -  lización  efectiva  en  donde  haya  sinergias  tanto  entre  los  distintos  municipios  como    entre  ellos  y  el  segundo  y  primer  nivel  de  gobierno,  apostando  a  contemplar  las  es -  pecificidades  y  potencialidades  de  cada  territorio,  al  tiempo  que  dialogando  con  las    políticas turísticas generadas desde la IM o desde el MINTUR.   Correlato de lo anterior, y también como acción que figura en el PDT, es la creación de   la Mesa Intermunicipal de Turismo, un órgano de gobernanza compuesto por repre -  sentantes  de  municipios,  División  Turismo,  MINTUR  y  equipo  técnico  de  la  UDELAR.    El  cometido  es  generar  un  ámbito  de  coordinación,  diálogo  y  cooperación  técnica  y    política en donde se contribuya a fortalecer la gobernanza territorial del turismo en   Montevideo, donde se arribe a decisiones compartidas, donde se fomente la intermu -  nicipalidad y la cooperación, y haya una coordinación en lo que refiere a la planifica -  ción de actividades de manera articulada, optimizando esfuerzos en el proceso.  Al presente, el proceso se encuentra en fase de implementación del PDT, lanzando los   planes municipales y en un contexto de cambio de administración tanto en el segundo   como  en  el  tercer  nivel  de  gobierno.  Paralelamente  a  ello,  se  vienen  elaborando  los    planes quinquenales para intendencia y municipios. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 104  2.5.7. Sobre la implementación del modelo: fortalezas, tensiones y oportunidades  La implementación del modelo de DTI en Montevideo permitió elaborar un Plan De -  partamental  de  Turismo  con  amplia  participación  de  distintos  actores,  construido    a partir de un diagnóstico territorial que combinó instancias presenciales de inter -  cambio, sistematización de antecedentes y análisis documental. Se realizaron talle -  res en todos los municipios, con la participación de actores vinculados al turismo y   a la vida barrial, y se impulsaron instancias de devolución y ajuste de los contenidos   preliminares.  Durante el proceso, se observó una resignificación del turismo como práctica posible   en diversos territorios de Montevideo, más allá de los circuitos tradicionales asociados   al centro histórico o la zona costera. Esto permitió visibilizar iniciativas, memorias y   potencialidades que suelen quedar fuera de la narrativa turística hegemónica, y ten -  sionar visiones centradas exclusivamente en la atracción de visitantes o el desarrollo   económico. Así, se consolidó una mirada más situada del turismo como herramienta   para el derecho a la ciudad y la valorización de los saberes locales.  El modelo DTI fue presentado desde el inicio como un horizonte orientador de la pla -  nificación. Muchas personas con las que se dialogó percibieron el modelo como cen -  trado en la tecnología, debido a su denominación y origen vinculado a herramientas   digitales. Si bien actualmente contempla dimensiones de gobernanza, sostenibilidad   y experiencia turística, esta percepción puede generar tensiones en contextos mar -  cados  por  desigualdades  sociales  y  carencias  básicas,  donde  las  prioridades  de  la    población  están  más  relacionadas  con  el  acceso  al  ocio,  la  mejora  de  servicios  pú -  blicos o la generación de empleo. La experiencia mostró que, para que el modelo sea   relevante, es necesario clarificar su alcance y vincularlo explícitamente a objetivos   sociales e inclusivos.  La participación de estudiantes pasantes en los municipios permitió articular teoría y   práctica en torno al modelo DTI, fortaleciendo su formación académica y aportando di -  rectamente al desarrollo del proceso, a la vez que permitió observar los desafíos de coor -  dinación y gestión de un modelo que involucra múltiples niveles y áreas de gobierno.  El  seguimiento  del  desempeño  global  del  destino  requiere  articular  competencias,    recursos y responsabilidades distribuidos entre distintos niveles de gobierno y áreas   de la Intendencia, lo que plantea tensiones y desafíos para la planificación integrada.   Aplicar la metodología a los diferentes municipios de Montevideo permitiría identifi -  car heterogeneidades internas, fortalezas y debilidades de cada territorio, y proyectar  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 105  estrategias que reduzcan brechas y potencien tanto a los municipios como al conjunto   del departamento como DTI, consolidando un modelo más participativo y adaptado a   las particularidades locales.  2.5.8. Perspectivas a futuro  La implementación del modelo de Destinos Turísticos Inteligentes en América Latina,   si bien se presenta atractiva por su complejidad y alcance, enfrenta un conjunto de de -  safíos estructurales que condicionan su consolidación y permanencia, y -dependiendo   del destino-, afectarán más o menos en cada una de las etapas.   En el caso de Montevideo, uno de los desafíos radica en mantener la capacidad insti -  tucional  y  los  modelos  de  gobernanza  más  allá  de  los  cambios  de  administraciones    públicas.  La  articulación  de  las  políticas  multiactor  que  integren  al  sector  privado,    la Academia y la ciudadanía en torno a objetivos comunes requiere ejercicio, ensayo,   error, evaluación, readecuación permanente y presupuesto.   Además, persisten limitaciones en la formación técnica y en el capital humano espe -  cializado  en  gestión  de  destinos  turísticos  inteligentes  integrados  a  los  equipos  téc -  nicos  permanentes,  lo  que  de  alguna  manera  limita  la  posibilidad  de  implementar    modelos de gobernanza que trasciendan los períodos de administración política. Con   estas  consideraciones,  es  menester  continuar  con  la  alianza  formalizada  con  la  Li -  cenciatura de Turismo de la Universidad de la República y generar planes de acción   claros y eficientes que permitan implementar acciones planificadas e integradas en el   territorio, tendiendo a consolidar los procesos de descentralización.   En  paralelo,  emerge  la  necesidad  de  fortalecer  la  gestión  de  datos  y  los  análisis  de    información  y  evidencia,  frente  a  una  falta  de  sistemas  integrados  de  información    turística  que  combinen  estadísticas  de  movilidad,  gasto,  satisfacción  del  visitante  y    percepción ciudadana, además de estudios prospectivos. Más allá de los esfuerzos que   se han hecho por obtener información de mayor y mejor calidad, aun no es posible me -  dir impactos de manera rigurosa, obstaculizando la toma de decisiones estratégicas y   limitando la posibilidad de hacer visible el papel del turismo en las economías locales,   inclusive para obtener presupuestos públicos tanto nacionales como departamentales   más adecuados al derrame que esta actividad económica puede generar.   Por otra parte, tras haber alcanzado un elevado nivel de cumplimiento de los indica -  dores  establecidos  por  el  Modelo  DTI  de  Segittur,  el  nuevo  desafío  consiste  en  conso -  lidar una mayor apropiación por parte del sector empresarial turístico. Esto implica  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 106  promover  su  participación  activa  en  los  procesos  de  innovación,  sostenibilidad  y  di -  gitalización,  de  modo  que  la  transformación  hacia  un  destino  inteligente  no  quede    circunscripta a la gestión pública, sino que se traduzca en ventajas competitivas para   las empresas, mejoras en la experiencia del visitante y un impacto positivo en el de -  sarrollo local.   2.5.9. Consideraciones finales  La experiencia en territorio evidenció que la percepción de la ciudadanía y de los ac -  tores locales es clave. Aunque el modelo DTI no se limita a la tecnología, el término “in -  teligente” y su origen vinculado a herramientas digitales generan la impresión de un   enfoque tecnocrático. En contextos marcados por desigualdades sociales y carencias   básicas, esta percepción tensiona con las prioridades reales de la población, como la   accesibilidad al ocio, la mejora de servicios públicos o la generación de empleo. Esto   deja en evidencia la necesidad de metodologías participativas e integradoras, que vin -  culen los objetivos del DTI con metas sociales e inclusivas, asegurando que la innova -  ción funcione como medio para responder a demandas concretas y no como un fin en   sí misma.  La  aplicación  del  modelo  DTI  en  Montevideo  ha  demostrado  que  gestionar  un  desti -  no inteligente en un contexto urbano complejo requiere articular múltiples niveles de   gobierno,  áreas  de  la  Intendencia  y  actores  locales.  La  heterogeneidad  territorial  y    la diversidad de competencias implican que los indicadores, aunque estandarizados,   deben ser interpretados considerando estas interdependencias.  El trabajo en los municipios abrió un proceso participativo y permitió que pasantes se   formaran en la teoría y la práctica del modelo DTI, generando un aprendizaje aplicado   en territorio. Sin embargo, los desafíos son significativos: sostener la participación en   el  tiempo,  dotar  de  recursos  suficientes  a  los  municipios,  asegurar  una  articulación    efectiva entre actores y evitar que el DTI se convierta en un rótulo atractivo pero vacío   de transformaciones estructurales.  Los municipios, tienen un rol clave en la promoción de un turismo más justo y accesi -  ble, pero requieren recursos, formación y acompañamiento técnico para desempeñar   ese  rol  de  forma  efectiva.  En  este  proceso,  la  articulación  entre  los  actores  munici -  pales,  los  centros  comunales  y  los  consejos  vecinales  es  fundamental,  ya  que  facilita    que la planificación turística integre las visiones, conocimientos y necesidades de los   actores locales. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.5. Uruguay: Gobernanza colaborativa y cooperación regional para destinos inteligentes 107  Referencias bibliográficas  Campodónico, R. (2018).  Entre la política y el discurso: Uruguay turístico (1960 - 1986) .   Montevideo: Ediciones universitarias.  Centro  de  Estudios  de  la  Realidad  Económica  y  Social.  (2023).  Monitor  de  actividad    turística.  Centro  de  Estudios  de  la  Realidad  Económica  y  Social.   https://ceres.uy/  admin/uploads/slides/archivo_1695738690.pdf  Da Cunha, N. et al. (2012).  Visite Uruguay: del balneario al país turístico 1930-1955 , EBO,   Montevideo.   Instituto  Nacional  de  Estadística.  (2025a,  9  de  mayo).   Estimación  de  la  pobreza  por    el  método  del  ingreso.  Año  2024  [Informe  técnico] .    https://www.gub.uy/institu -  to-nacional-estadistica/comunicacion/publicaciones/estimacion-pobreza-meto -  do-del-ingreso-ano-2024  Instituto Nacional de Estadística. (2025b, 6 de febrero).  C. (2018).  Uruguay. De la política de desarrollo turístico al desarrollo de la   política turística (1986 - 2010) . CSIC. Universidad de la República. Biblioteca Plural.   Montevideo, Uruguay. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 109  2.6. Perú: Sostenibilidad cultural como base para la transformación   digital del turismo  Elma Valdivia-Ramirez  Universidad Ricardo Palma, Perú.   Mónica Regalado Chamorro  Universidad San Ignacio de Loyola , Perú.   María del Pilar Sánchez Condori  Ministerio de Comercio Exterior y Turismo, Perú.  Miguel Armesto-Céspedes   Universidad Peruana de Ciencias Aplicadas, Perú.  2.6.1. Introducción  El hablar de un DTI, en referirse a un concepto asociado a la adecuada gestión del desti -  no a través de las TICs, no obstante, a pesar de que los municipios y autoridades locales   entienden la relevancia de su aplicación a mediano y largo plazo, la limitada estructu -  ra  gubernamental  (marco  normativo)  e  información  ordenada  sobre  su  aplicación  se    convierten en las principales barreras (Gomes et al., 2017). Este modelo y concepto para   entender el turismo como son los DTI deben tomar en consideración las brechas socio -  culturales, económicas y tecnológicas, por ello los retos a corto y mediano plazo deben   ser afrontados de manera conjunta, sistemática y transdisciplinaria (González, 2019).   La  gestión  territorial  como  parte  del  sistema  turístico  incluyendo  los  recursos,    atractivos, productos y ofertas requiere del uso de las TICs, sin embargo, no debe ser   entendida como una propuesta rígida, las particularidades de cada región deben ser   tomadas en cuenta para generar una mejor calidad de vida de los pobladores locales   y una mejor experiencia en los turistas en un marco sostenible (Font, 2021). Desde la   experiencia del turista, la autonomía y libertad para tomar decisiones respecto a la   información y condiciones para recibirla del lugar en el que se encuentra es lo que   espera encontrar para aprovechar al máximo lo que la ciudad ofrece generando una   reacción positiva que se reflejará en las redes (Corrêa & De Sevilha, 2023; Gomes et   al.,  2025),  es  decir,  tener  una  experiencia  singular,  viendo  la  ciudad  visitada  como    una “ciudad viva” (Morela & Barros, 2024) dentro de un entorno seguro y confiable   (Mendes Filho et al., 2022). \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 110  Las evidencias demuestran que no es un camino sencillo, lograrlo en la mayor medida   de  lo  posible  implica  tiempo,  disposición  y  acciones  concretas  para  usar  de  manera    apropiada  la  tecnología,  presentando  innovaciones  que  sean  lo  más  accesibles  posi -  ble (Freitas & Mendes, 2020). En cuanto a la accesibilidad virtual, el hecho de brindar   información sobre el destino para generar interacción debe tomar en consideración   diversos elementos como el o los idiomas, conectividad y la facilidad de sus transicio -  nes son necesarias para demostrar su utilidad y cimentar las estructuras de los DTI   (Lüders & Torres, 2021; Lojano et al., 2023). Queda claro, además que durante el proceso   y posterior a la implementación, es necesario el monitoreo y seguimiento a través de   indicadores claros posibilitando así la toma de decisiones según resultados prelimina -  res (Verduzco & Cornejo, 2023).  Por ello, el rol del Estado es relevante, a través de políticas que amparen y sostengan el   desarrollo y consolidación de los DTI (Cruz & D., 2020; García & Fernández, 2020), y par -  ticipando de forma activa, reforzando la gobernanza para que los actores interactúen   y estructuras necesarias en pro de la propuesta (Verduzco & Cornejo, 2023; Kosossy et   al., 2022; Félix et al., 2021; Molina et al., 2022; Lojano et al., 2023).  Para entender el turismo bajo este nuevo modelo, en Perú se empezó a implementar   en el año 2021 cuando dentro de un proyecto marco con España, se suscribe un com -  promiso para gestionar el Programa de DTI. Para el año 2025, la segunda ciudad más   importante del país ha sido reconocida como el primer DTI Adherido por la Sociedad   Mercantil Estatal para la Gestión de la Innovación y las Tecnologías Turísticas (SEGI -  TTUR S.A.M.P.). Y es en este contexto, en el que se presenta el análisis de la entrevista   a  la  Sub  Gerente  de  Turismo  y  Relaciones  Exteriores  de  la  Municipalidad  Provincial    de  Arequipa,  quien  fue  parte  de  todo  este  proceso.  Las  respuestas  obtenidas  se  han    sistematizado  en  función  a  tres  ejes:  los  retos  iniciales,  durante  el  proceso,  lecciones    aprendidas y sugerencias.  En cuanto a los retos iniciales, la gobernanza como espacio de diálogo entre los acto -  res fue uno de los más complejos, la desarticulación de esta debió abordarse para po -  der desarrollar la propuesta debido a la importancia que deben tener la participación   activa de los agentes involucrados “la gobernanza que es un desafío más en nuestro   país porque es parte de nuestra idiosincrasia” (Comunicación personal, 2025). A ello se   unen otros elementos: primero, la visibilización de los otros sectores, porque es impor -  tante tener presente que debe haber sinergia entre los diversos sectores, es una pro -  puesta multisectorial. Segundo, romper ciertos “mitos”, los DTI no solo están asociados   a  temas  tecnológicos,  hay  un  trasfondo  mayor,  la  accesibilidad  en  todas  sus  formas   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 111  es un pilar en la propuesta. Tercero, el poco hábito por sistematizar y monitorear de   forma correcta sin temor a identificar errores. Y cuarto, el reducido presupuesto.  Respecto  a  la  implementación  (el  proceso),  tuvo  que  llevarse  a  cabo  una  adaptación    sobre todo en la accesibilidad física, y ello debido a las acciones de la sociedad civil y   empresas  que  ya  se  estaban  ejecutando,  lo  que  implicó  una  coordinación  “Arequipa    tiene varios atractivos privados, no podemos moverlos pero si podemos crear, imple -  mentar, pero hay una cosa que tenemos los peruanos: la capacidad de crear cosas que   se hacen en países europeos y aplicarlas para Arequipa y para Perú” (Comunicación   personal, 2025). Por otro lado, el proceso de sensibilización a los funcionarios se llevó a   cabo de manera virtual, lo que ha implicado una reconsideración.  Entre las recomendaciones, es necesario organizar una mesa de trabajo interna que   lidere en función a la hoja de ruta establecida para poder medir y monitorear de ma -  nera correcta. Por otro lado, el proceso de sensibilización a los funcionarios debe po -  tenciarse y darse de una manera más vivencial para lograr un mayor impacto. Y, para   terminar,  la  gobernanza,  considerada  esencial  para  poder  lograrlo,  entendiéndose    como  un  espacio  de  concertación  y  diálogo  entre  los  diversos  actores  involucrados:    autoridades,  sociedad  civil  y  empresa  privada  en  el  que  el  representante  del  Estado    debe asegurar las condiciones adecuadas para que se dé de la mejor manera en pro de   objetivos comunes (Valdivia & Armesto-Céspedes, 2023). Es en este marco de análisis   que  el  presente  capítulo  tiene  como  objetivo  analizar  el  DTI  como  un  nuevo  modelo    integrado en su implementación inicial dentro del territorio peruano. Para lograrlo, se   ha enmarcado el método dentro de un enfoque cualitativo, donde el análisis de conte -  nido de los documentos de gestión y entrevista a la representante del destino piloto le   dan soporte al texto presentado.   2.6.2. Características del país  Según el Instituto Nacional de Estadística e Informática (INEI) (2024), Perú cuenta con   33.2  millones  de  habitantes,  presentando  un  crecimiento  anual  de  1.3%  en  compara -  ción al 2022. Su distribución y estructura poblacional es diversa, hay una mayor con -  centración  en  las  áreas  urbanas.  Y  dependiendo  de  las  características  y  condiciones    geográficas,  se  aprecia  una  diferencia  significativa:  la  costa  que  cuenta  con  infraes -  tructura y con el centro político, económico y servicios, alberga a 15.8 millones de per -  sonas que representan al 47.6% del total. Sin embargo, solo en Lima Metropolitana se   concentra  el  30%  de  la  población,  es  decir,  el  63.2%.  La  sierra,  región  que  desarrolla    principalmente actividades mineras y agrícolas el 29.5% (9.8 millones) distribuidos en  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 112  áreas  rurales.  Y  la  selva,  una  región  con  un  extenso  territorio  y  gran  biodiversidad,    sin  embargo,  cuenta  con  limitada  infraestructura  y  servicios  básicos,  presenta  una    menor densidad poblacional, contando con el 22.9% (7.6 millones) (Tabla 1).  Tabla 1.  Población y densidad vs. región.  Región   Población (millones)   %   Densidad  Costa   15.8   47.6   90 habitantes/km²  Sierra   9.8   29.5   20 habitantes/km²  Selva   7.6   22.9   10 habitantes/km²  Nota: Adaptado de (Instituto Nacional de Estadística e informática (INEI), 2024a) (INEI, 2024) tomo 1 y 2.   Respecto al acceso a servicios básicos, el 90% de las áreas urbanas cuentan con sanea -  miento frente al 60% de las áreas rurales, en cuanto al acceso al agua potable, el 88% y   55% respectivamente. El PBI nacional es de $245,000 millones de dólares (aprox.), en el   2023 mostrando un crecimiento de 2.4% en comparación al 2022. En cuanto a los secto -  res económicos, el de servicios es considerado el principal con una participación el PBI   del 58.2%, seguido de la minería e industria (exportaciones) con el 22.4% y el sector agro -  pecuario con un 19.4% (Instituto Nacional de Estadística e informática (INEI, 2024b)).  Considerando  la  desaceleración  económica  mundial  en  el  2024,  el  MEF  (2024)  con -  sideró un crecimiento de 3.1%, mostrando una recuperación de la contracción pre -  sentada  en  el  2023  de  -0.6%,  ello  debido  al  aumento  de  las  exportaciones,  consumo    interno e inversión privada. Como país, se plantea un escenario de recuperación en   términos moderados. Conllevando a valorar un crecimiento anual del 3% aproxima -  damente. Dicha cifra proyectada se respalda por el continuo proceso de inversión en   infraestructura  y  nuevos  proyectos  mineros,  aumento  y  posicionamiento  de  la  ex -  portación de servicios teniendo como pilar la actividad turística generando mayor   confianza en los diversos agentes económicos. La política monetaria y fiscal ha sido   capaz  de  controlar  la  inflación,  y  de  mantener  estable  la  deuda  pública,  la  cual  es    considerada aceptable dentro de la región.  Al analizar la actividad turística, es necesario tener en consideración el periodo pan -  démico, puesto que, debido al confinamiento y restricciones, el turismo fue uno de los   sectores que mayor impacto negativo tuvo, y su proceso de recuperación se ha dado   de manera paulatina sin llegar a alcanzar los datos previos a ella. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 113  Es a partir del año 2022, que se ha podido ver una recuperación en el sector, para el   2023-2024 el trabajo conjunto entre los diversos actores involucrados ha generado un   incremento significativo, lo que lleva a tener proyecciones durante este 202 ada dirección general tiene bajo su cargo órganos de línea. Precisa -  mente, la dirección general de Estrategia Turística cuenta con la Dirección de Innovación   de la Oferta Turística, en la cual, se lidera la iniciativa destinos turísticos inteligentes.  Figura 1.  Organigrama del sector turístico peruano.  Nota: Extraído de  www.gob.pe  2.6.4. Adopción del modelo DTI en Perú  A continuación, se presenta una cronología de los momentos más relevantes desde el   inicio hasta la actualidad:  El Memorando de Entendimiento (MOU) entre España y Perú fue firmado durante la   Feria  Internacional  de  Turismo  FITUR  2021.  Este  acuerdo  tiene  como  objetivo  desar -  rollar el Programa de Destinos Turísticos Inteligentes (DTI) en el país. Este primer paso   marcó el inicio de la colaboración internacional para implementar la metodología DTI   en Perú (MINCETUR, 2021).  En 2022, se aprobó la Estrategia Nacional de Reactivación del Sector Turismo 2025, que   incluye el objetivo específico de fortalecer e impulsar la oferta de productos turísticos,  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 116  con una clara acción enfocada en la promoción de los DTI. Este plan busca la trans -  ferencia  tecnológica  en  la  cadena  de  valor  del  turismo  a  través  del  desarrollo  de  los    DTI (MINCETUR, 2022). Además, el Centro Histórico de Arequipa fue seleccionado por   el Banco Interamericano de Desarrollo (BID) como uno de los diez destinos ganadores   del Programa Turismo Futuro de un total 107 destinos, lo que implicó un importante   reconocimiento para el país en el ámbito del turismo inteligente (BID, 2022).  En 2023, el Foro Internacional Virtual “Turismo 4.0: Hacia la transformación de un des -  tino turístico inteligente” fue organizado como parte de los compromisos del Grupo de   Trabajo de Turismo de la Alianza del Pacífico (MINCETUR, 2023). También, Perú se in -  corporó como miembro de la Red Iberoamericana de Destinos Turísticos Inteligentes,   consolidando su presencia en la región con el objetivo de continuar con el desarrollo   del modelo DTI (MINCETUR, 2023).  Figura 2    Línea de tiempo del DTI en Perú.  Fuente: Elaboración propia.  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 117  Perú destacó en los Premios Iberoamericanos de Destinos Turísticos Inteligentes 2024   al recibir premios por los proyectos “Turismo para Todos” y el “Reglamento de Gestión   Ambiental del Sector Turismo” (MINCETUR, 2024). A finales de año, MINCETUR firmó   un  contrato  con  SEGITTUR  para  recibir  soporte  técnico  en  la  implementación  de  la    metodología de DTI en tres destinos pilotos por un período de tres años, marcando un   hito importante en la implementación de DTI a nivel nacional (SEGITTUR, 2024).  En 2025, Perú se destacó con 11 distinciones en la 2da edición de los Premios Iberoa -  mericanos de DTI. Además, Arequipa fue reconocida como el primer destino turístico   inteligente adherido en Perú, alcanzando un puntaje superior al 20% en los cinco ejes   estratégicos  de  la  metodología  DTI  (MINCETUR,  2025).  La  Figura  2  sintetiza  los  mo -  mentos claves desde el 2021 hasta la actualidad.  2.6.5. Política pública para Inteligencia Turística  Actualmente  desde  MINCETUR,  se  viene  planteando  una  propuesta  para  la  Política    Nacional Multisectorial de Turismo en Perú. Sin embargo, el modelo de los DTI ha sido   respaldado  por  normativas  y  políticas  específicas,  como  la  Estrategia  Nacional  de    Reactivación del Sector Turismo 2020-2025, que promueve la transferencia tecnológi -  ca y el desarrollo de los DTI. Además, la RM 285-2023-MINCETUR establece disposicio -  nes para la gobernanza y gestión de destinos turísticos.  Un avance significativo en este contexto es la reciente inclusión de la iniciativa de los   DTI en los Objetivos Estratégicos Institucionales (OEI) 5 del sector turismo. Esta acción   busca incrementar la oferta turística del Perú a través de la diversificación, consolida -  ción e innovación de los productos turísticos. Los DTI se han definido como la Acción   Estratégica  Institucional  (AEI)  05.06  dentro  del  Plan  Estratégico  Institucional  (PEI),    aprobado mediante la Resolución Ministerial N° 375-2024-MINCETUR. Este plan tiene   un horizonte de acción hasta 2030 y está alineado con el Plan Estratégico de Desarrollo   Nacional (PEDN) 2050, la Política General de Gobierno (PGG) y el Plan Estratégico Sec -  torial  Multianual  (PESEM)  del  sector  Comercio  Exterior  y  Turismo,  lo  que  asegura  la    continuidad y relevancia de los DTI como estrategia clave a largo plazo.  Pero en el caso de las inversiones en turismo se tiene como referentes los Lineamientos   Generales  para  el  Desarrollo  de  Inversiones  en  Turismo,  que  proporciona  una  guía    integral  para  impulsar  la  inversión  en  este  sector  (MINCETUR,  2024).  Así  como  Tou -  rism Doing Business, Invirtiendo en Perú documento elaborado por la ONU Turismo   en  colaboración  con  CAF-Banco  de  Desarrollo  de  América  Latina  y  el  Caribe  resalta   \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 118  los avances en la economía peruana, así como los logros en la recuperación postpan -  demia (ONU Turismo, 2024).  Estos documentos de gestión reflejan el dinamismo y la resiliencia del sector turístico   peruano,  así  como  las  políticas  que  facilitan  el  acceso  a  inversores  privados,  lo  que    fortalece la confianza en las perspectivas futuras de inversión en el país.  2.6.6. Modelo de metodología DTI   Diversos  países  han  adoptado  este  modelo  con  el  objetivo  de  adaptar  sus  territorios    turísticos a las nuevas demandas del mercado y los retos globales. Para la implemen -  tación de este, Perú ha adoptado como referencia principal la metodología desarrolla -  da por la Sociedad Mercantil Estatal para la Gestión de la Innovación y las Tecnologías   Turísticas, S.A.M.P. (SEGITTUR), entidad española pionera en el desarrollo de DTIs, la   cual  considera  que  su  aplicación  puede  orientarse  a  entidades  locales  como  munici -  pios, comarcas, mancomunidades y ciudades autónomas, debido a que constituyen el   nivel de gestión más próximo y directo en los destinos turísticos.   Actualmente, se encuentra en ejecución el proyecto “Servicios de soporte técnico para   la  implementación  de  la  metodología  de  SEGITTUR  de  Destinos  Turísticos  Inteligen -  tes”,  con  una  duración  prevista  de  tres  años  y  considera,  en  una  primera  etapa,  la    priorización de tres destinos turísticos. Este proceso tiene como finalidad adaptar la   metodología  a  la  realidad  institucional,  digital  y  territorial  del  Perú,  asegurando  su    pertinencia y viabilidad en el contexto nacional (SEGITTUR, 2024).  Dicho método incorpora cinco ejes fundamentales de evaluación que contemplan 261   indicadores, organizados en 97 requisitos, los cuales permiten evaluar el nivel de “in -  teligencia” de un destino turístico. La distribución de estos indicadores es la siguien -  te:  Sostenibilidad,  con  38  requisitos  y  116  indicadores;  Gobernanza,  con  12  requisitos    y 26 indicadores; Tecnología, con 21 requisitos y 62 indicadores; Accesibilidad, con 17   requisitos y 43 indicadores; e Innovación, con 9 requisitos y 14 indicadores. A ello, es   necesario mencionar que la metodología DTI se ha enriquecido con requisitos extraí -  dos de diversas recomendaciones y manuales especializados, seleccionando aquellos   aspectos más relevantes en relación con los ejes mencionados.   Respecto a la implementación del Modelo de Gestión, esta se divide en dos ciclos y cuatro   fases. El primer ciclo enfocado adhesión al modelo, que trabaja las primeras fases: la in -  corporación del destino a la RedDTI (Fase 1) y el diagnóstico en función a cinco ejes de tra -  bajo: gobernanza, innovación, tecnología, sostenibilidad y accesibilidad que es observado  \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 119  y validado por SEGITTUR (fase 2). Y el segundo ciclo que se vincula con la monitorización a   través de la ejecución y seguimiento de acciones DTI (fase 3) y la renovación (fase 4).  Dicho proceso en términos óptimos permite obtener la distinción DTI, y para lograrlo,   el destino debe alcanzar el 80% de cumplimiento de indicadores y requisitos, sin em -  bargo, en la primera evaluación si superan el 20% de cumplimiento pueden adquirir la   denominación de Destino Turístico Inteligente Adherido (SEGITTUR, 2024).  En Perú, el proceso piloto para implementar el modelo DTI se viene aplicando en la   ciudad de Arequipa (Ciudad fundada en 1940 localizada a 1000 km al sur de Lima   la capital) en la que se ha completado la Fase I y Fase II. En la primera fase, se es -  tablecieron  las  bases  conceptuales  y  operativas  del  modelo  mediante  actividades    como asesoría técnica, elaboración metodológica, capacitaciones, visitas al terri -  torio  y  encuentros  técnicos.  En  la  segunda  fase  se  realizó  un  diagnóstico  integral    del destino bajo los cinco ejes estratégicos del modelo DTI. Esta etapa se apoya en   reuniones virtuales, coordinación con actores locales y la sistematización de datos   a  través  de  la  plataforma  GESTDTI.  Entre  los  principales  productos  esperados  se    encuentran un diagnóstico completo, un plan de acción y un instrumento estanda -  rizado de evaluación.  Cabe  mencionar  que,  para  la  fase  del  diagnóstico,  se  usó  el  Sistema  de  Inteligencia    Turística (SIT), que es una herramienta que facilita la toma de decisiones en el sector,   basada en el análisis de la información, permitiendo una gestión más eficiente y orien -  tada al desarrollo sostenible.  Entre los resultados obtenidos, se ha obtenido que, en el 2024, el MINCETUR obtuvo dos   reconocimientos durante la primera edición de los Premios Iberoamericanos, celebra -  dos en el marco de la Feria Internacional de Destinos Turísticos Inteligentes (FIDI) en   Curitiba, Brasil. Las distinciones fueron otorgadas en dos categorías: “Sostenibilidad   Ambiental”, por la iniciativa Reglamento de Gestión Ambiental del Sector Turismo, y   “Accesibilidad Turística”, por la iniciativa Turismo para Todos.  En el 2025, se obtuvieron 11 galardones durante la segunda edición de los Premios Ibe -  roamericanos DTI. Este evento se desarrolló en el marco de la Feria Internacional de   Destinos Inteligentes (FIDI).   Arequipa  destino  elegido  como  piloto  y  después  de  completar  la  fase  1  y  2  así  como    cumplir con los criterios establecidos obtuvo el 26.4 % de puntaje, por lo cual es recono -  cido como Destino Turístico Inteligente Adherido 2025-2027. En la actualidad, se viene   desarrollando la Fase III que es la ejecución de las acciones prescritas y su seguimiento. \nExperiencias, aprendizajes y perspectivas de los Destinos Turísticos Inteligentes en Iberoamérica  2.6. Perú: Sostenibilidad cultural como base para la transformación digital del turismo 120  2.6.7. Reflexiones/Conclusiones  El proceso de actualización de la Política Nacional Multisectorial de Turismo, en el que   el  MINCETUR  está  colaborando  con  el  Centro  Nacional  de  Planeamiento  Estratégico    (CEPLAN), tiene como objetivo asegurar que el sector turismo se adapte a los nuevos   retos globales y continúe siendo un motor clave para el desarrollo económico y social   del país. La incorporación de los DTI dentro de los Objetivos Estratégicos Instituciona -  les (OEI) y su alineación con los planes nacionales, como el PEI y el PESEM, fortalece la   continuidad de las políticas públicas de inteligencia turística.  El futuro de los DTI en Perú se ve prometedor, con un enfoque estratégico orientado a   mejorar la competitividad y sostenibilidad del sector turístico, utilizando tecnologías   avanzadas y generando valor agregado en los destinos turísticos. El Sistema de Inteli -  gencia Turística (SIT) seguirá siendo una herramienta clave para el análisis de datos   y la toma de decisiones basadas en la información, lo que permitirá una gestión más   eficiente y orientada al desarrollo sostenible.  Por lo tanto, la política pública relacionada con la inteligencia turística en Perú está   alineada con los objetivos de desarrollo nacional y sectorial, apoyada por normativas,   presupuestos e inversiones estratégicas. La inclusión de los DTI en los objetivos estra -  tégicos del sector turismo y su integración en los planes institucionales a largo plazo   garantiza la continuidad de estas iniciativas. A través de la mejora de la gobernanza,   la transferencia tecnológica y el uso de la inteligencia turística, Perú continuará posi -  cionándose como un destino turístico competitivo y sostenible.  Referencias bibliográficas  Barijhó, M., & Sutty, H. (2021). La ciudad de Hernandarias y el Complejo Turístico de Itai -  pú  Binacional  como  destinos  turísticos  inteligentes.   Revista  Científica  En  Ciencias    Sociales ,  3 (2), 69–79.  https://www.redalyc.org/journal/7497/749778798008/html/    BID (2022).  La digitalización del turismo en América Latina: retos y oportunidades .  Corrêa,  S.,  &  De  Sevilha,  M.  (2023).  A  experiência  turística  inteligente  na  perspectiva  do    viajante.  Turismo: Visão e Ação ,  25 (1), 72–93.  https://doi.org/10.14210/rtva.v25n1.p72-93  Cruz,  M.,  &  D.,  D.  (2020).  Curitiva  (Brasil)  ¿Un  Destino  Turístico  Inteligent
