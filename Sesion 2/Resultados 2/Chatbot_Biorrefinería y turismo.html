<script>
    const PDF_TEXT = "     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025       Por:   Yeisson  Andrés Betancur  Marín/Profesional  en Turismo      1.   Título   V alorización  de residuos    sólidos     orgánicos  generados  por el sector turístico  en el municipio de Jericó, Antioquia       2.   Resumen (máx. 250 palabras)       El documento  propone  una estrategia  de valorización  de residuos  orgánicos  generados  por el turismo en Jericó, Antioquia,   mediante  una  biocadena  agroindustrial  basada  en  bioeconomía  circular.  A  partir  de  la  caracterización  teórica  de  los   residuos,  se  identifican  tres  rutas  de  valorización:  compostaje  para  obtener  biofertilizante,  fermentación  en  estado  sólido   para  producir  un  bioplaguicida  a base  d e  Beauveria  bassiana  contra  Cholus  spp.,  y bioconversión  con  Hermetia  illucens   para generar  biomasa y frass. La propuesta  se sustenta  en que el turismo incrementa la presión  sobre  los sistemas  locales   de gestión  de residuos  y, al mismo tiempo, ofrece una o portunidad  para transformar un pasivo  ambiental  en insumos  útiles   para la agricultura  y la economía  local. El trabajo  también  plantea  una biorrefinería,  donde  la biomasa  orgánica  se separa,   acondiciona  y distribuye  según  su  composición  hacia  distintas  ruta s  de  transformación.  Su  aporte  central  es  vincular  la   gestión  de residuos  turísticos  con la solución de un problema fitosanitario  del cardamomo, reforzando la pertinencia territor ial   del  enfoque.  No  obstante,  reconoce  limitaciones  asociadas  a  la  ausencia  d e  caracterización  local  de  los  residuos,  la   variabilidad  de la biomasa  y los retos  de escalamiento  de la producción  de B. bassiana.  En conjunto,  el documento  plantea   una alternativa  técnicamente viable, ambientalmente  pertinente  y alineada  con principios  d e economía circular y biorrefinería   ( Paredes - Ballena  et al., 2023 ;    Zambrano et al., 2023 ) (redacción  tomada de Perplexity AI)       3.   Introducción (máx 500 palabras)          Los  hitos  sociales,  económicos  y tecnológicos  que  han  permitido  la  consolidación  de  la    civilización  humana  contrasta  con   las  circunstancias  ambientales  que  comprometen  la base  en  la cual  se estructuro  el progreso,  pues  se han  convertido  en   desafíos  globales  de prioritaria  atención  (World  Economic Forum, 2026),  siendo  la  generación  de  residuo s  sólidos  una  de   las más acuciantes,  dada la creciente presión  contaminante que amenaza  el medio ambiente y la salud  pública, al estimarse   que  para  el  2022  se  generaron  2.560  millones  de  toneladas  de  residuos  sólidos  urbanos  en  el  mundo,  donde   aproximadame nte  el 29%  es depositado  en  algún  tipo  de vertedero,  el  13% dispuestos  a cielo abierto,  el 21%  sometido  a   recuperación  de  materiales  mediante  reciclaje  y  compostaje,  el  20%  tratado  mediante  incineración  moderna  con   recuperación  de energía  y el 17%  no se  re coge  (Cook et   al.,  2026;  Chen  et   al.,  2020).  En  el caso  latinoamericano,  como   cita  en  Correal  &  Rihm  (2022)  son  generadas  aprox.    231  millones  de  toneladas  de  residuos  sólidos  urbanos  anuales,   predominando  en su composición  los  residuos  orgánicos  con un 52 %,  papel  y cartón 13%,  plástico  12%,  metal 3%,  vidrio   4%,  cuero  y  gorma  1%,  madera  1%  y otros  14%,  cuyo  posible  manejo  puede  variar  a  un  relleno  sanitario  en  un  52%,   botadero  a cielo  abierto  un  26,8%,  vertedero  controlado  el 15%,  reciclaje  4,5%,  relleno  sa nitario  (sin  especificar)  1,5%  y   compostaje,  digestión  anaeróbica  e  incineración  el  1%.  Para  el  2023,  en  Colombia  los  residuos  sólidos  y  productos   residuales  derivados  de  procesos  de  producción,  consumo  y acumulación  fue de  32,53  millones  de  toneladas,  sie ndo  el   77,0%  (25,04  millones  de toneladas)  de residuos  sólidos,  y el 23,0%  (7,49  millones  de  toneladas)  de productos  residuales   (DANE, 2025).          La generación     de   residuos  sólidos  al ser un problema  global,  requiere  transformar las  distintas  opciones  de gest ión  integral   de residuos  existentes  y venideros,  derivados  de sectores  sociales  y económicos de la sociedad  (Contreras,  2021). El paso   a paso de la producción hasta la disposición  final de residuos  sólidos,  implica cada vez más pensar en mejores tratamient   os   (Ortega - Ramírez  et  al.,  2021)  a  través  de  modelos  de  optimización  (Castañeda - Torres  & Rodríguez - Miranda,  2017),  en   especial  en actividades  económicas como el turismo,  pues  es ampliamente  documentado  que  aumenta  los  volúmenes  en   los  destinos  superando  fr ecuentemente  las  capacidades  locales,  siendo  necesario  que  su  manejo  rebase  las  formas   convencionales  e  integre  principios  de  economía  circular  (Ministerio  de  Comercio,  Industria  y  Turismo  &  ProColombia,   2021), particularmente  en el municipio de Jericó, pu eblo patrimonio  del suroeste  antioqueño  ( Red de Pueblos  de Patrimonio   de Colombia,  2014) ,  donde  para el 2024 se  ocasionaron  1,653,14  del  1.550.022  toneladas  de residuos  sólidos,  generados   en  el Departamento  de  Antioquia  (Superservicios,  2025),  de  las  cuale s  se  sugiere  que  un gran  porcentaje  es  ocasionado   por el sector económico.          \n     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025       Este  panorama  sugiere  la  existencia  de  oportunidades  para  promover  una  menor  generación  de  residuos  y  un  mayor   reciclaje,  que  potenciaría  el  desarrollo  de  actividades  relacionada s  con  economía  circular  sobre  la  base  de  cadenas   productivas  locales  (De  Miguel  et  al.,  2021)  de  manera  especifica  en  el  sector  turístico,  pues  en  el  caso  jericoano,  el   aprovechamiento  de  residuos  orgánicos  significaría,  entre  otras  cosas,  la  obtención  de    insumos  para  hacer  compost,   acondicionadores  de suelos,  e incluso  como generador  de energía  (DNP et   al., 2021) o bionsumos,   dado que “mediante el   enfoque de biorrefinería  integrada,  se puede producir una variedad de productos  químicos,  biocombustibles  y m   ateriales  de   base  biológica  a  partir  de  residuos  alimentarios”  (Tsegaye  et  al.,  2021,  p.  1),  que  podrían  permitir  producir  un    entomopatógeno  de  Beauveria  bassiana     para  el  control   de  un  problema  fitosanitario  causado  por el  insecto  Cholus  spp.   (Col:.Curcu lionidae:Cholinae)  en  cultivos  de  cardamomo  (Elettaria  cardamomum  (L)  Maton)  (Pedraza,  2017)  de  este   municipio.       Las  necesarias  discusiones  afines  a  las  externalidades  ambientales  ocasionadas  por  el  sector  turístico,  en  especial,  la   generación  de residuos    solidos  orgánicos  a valorizarse  a través de sistemas  de biorrefinería  (Murillo & Galán, 2020) para la   atención  de una problemática  agrícola,  se potencia  a través del uso  de uso  de herramientas  de inteligencia  artificial para la      búsqueda  de información técn ica relacionada  con la producción  de un bionsumo  entomopatógeno  de un hongo  puntual.             4.   Metodología (no tiene límites)       La  valorización  de  los  residuos    sólidos   orgánicos  ocasionados  por  actividades  turísticas  en  el  municipio  del  suroeste   antioqueño  Jericó, sugiere que la gestión  de residuos  no solo es una cuestión  de competencia gubernamental,  sino también   un desafío  de responsabilidad  social  (Mateu - Shert  et al. ,  2013,  p. 5) empresarial  de organizaciones  turísticas,  que  implica   concebir  la  sostenibilidad  y  la  protección  al  medio  ambiente  como  pilar  fundamental  en  la  transformación  del  sector   ( Waste2Worth  Latam, Kikster & GIZ, 2025) y considerar  la circularidad co mo senda  de mitigación a las cargas ambientales   - y derivados -     respecto  al exceso de residuos  alimentarios  producidos  en el marco del turismo (Strippoli  et al., 2024).       Para el caso jericoano,  una manera  de aprovechar la  biomasa  ocasionada  de este  tipo  de r esiduos,  sería  reconvirtiéndola   en  nuevos  productos  (SEGITTUR,    s.f. )  para  atender  un  problema   fitosanitario  causado  por  el  insecto  Cholus  spp.   (Col:.Curculionidae:Cholinae)  en  cultivos  de  cardamomo  (Elettaria  cardamomum  (L)  Maton)  (Pedraza,  2017)  de  esta   l ocalidad  a través un bioinsumo.       a.   Bionsumo Propuesto       i.   Tipo de bioinsumo  (biopesticida,  biofertilizante,  bioestimulante,  etc.).       Dado los hallazgos  de Pedraza  (2017) en los  cultivos de cardamomo de esta localidad,  se sugiere  que  el hongo  Beauveria   bassiana  es  enemigo  natural  de    Cholus  spp ,   siendo  uno  de  los  hongos  entomopatógenos  con  mayor relevancia  en  el   campo  agrícola  para  el  co ntrol  de  plagas,  por  tanto,  la  producción  de  este  fungi  para  formular un  bioplaguicida,  es  una   alternativa  para  la minimización  de plaguicidas  sintéticos,  contaminación  ambiental  y garantizar  seguridad  e inocuidad  de   los alimentos  (Lucero et al., 2024), qu e gestada  desde el sector turístico  ayudaría  a la competitividad ambiental  del destino,   toda vez que el patrimonio  natural,  al igual  que el cultural, deben  ser procurados  estratégicamente  por los actores    - directos -    sectoriales  (León - López,  2020).          ii.   Microor ganismo,  metabolito  o tecnología  empleada.          De cara al problema  fitosanitario  identificado  en cultivos de cardamomo a través del  hongo Beauveria  bassiana  se pueden   obtener  distintos  metabolitos  secundarios  aprovechables  para  el  biocontrol  de  esta  plaga  ag rícola  como  lo  son  la   beauvericina,  brasinólido,  beauverolidos  isarolidos,  bassiacridin,  bassianolide  de  características  insecticidas  (Bihal  et  al. ,   2023;  Lucero et al.,  2024)         \n     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025          iii.   Estrategia  general para su producción.       Existen diversas  formas de producción   del hongo,  que van desde in vitro, fermentación en sustratos  líquidos  y fermentación   en  sustratos  sólidos,  siendo  esta  ultima  la  manera  en  que  se  producirá  (Lucero  et  al.,  2024)  el  bioplaguicida.  De  igual   manera,  dependiendo  de  las  características  del  cul tivo y plaga  a  tratar,  se  define  el  proceso  de  mayor idoneidad  para  la   obtención  del fungi  (Desgranges  et   al., 1993),  debiéndose  considerar  un  medio de  cultivo rentable  a gran escala,  además   de  controlar  las  variables  ambientales  como  temperatura  a  25  ◦C,    humedad  relativa  65 - 70  %,  pH  de  5.4,  tiempo  de   propagación  entre 4 a 8 días,  donde  la cascara de papa  y  el arroz  son desechos  utilizados  para este fin (Singh et al., 2015;      Lucero et al., 2024)       iv.   Prompt utilizado en la herramienta  de IA.       Para el  entendimie nto  de  esta  biosolución  y los  detalles  para  su consecución,  se efectúa una revisión  documental  con las   siguientes  palabras  claves:  turismo  y  gestión  de  residuos,  reconversión  de  residuos  orgánicos,  beauveria  bassiana.   Encontrar a Pedraza  (2017) permitió  co nceptualizar  el problema  fitosanitario  y su posible  atención  a partir de  un hongo,  lo   que  ocasiona  la exploración  de distintos  estudios  sobre  turismo  que  reconocieran  las  externalidades  ambientales  de este   sector, en particular, lo concerniente a los resid uos  orgánicos y sus posibles  aprovechamientos  para la protección del cultivo   de cardamomo en Jericó, Antioquia.       De  igual  manera,  para  este  propósito  se  recurrió  al  modelo  de  inteligencia  artificial  Perplexity,  con  el  fin  de  encontrar   orientaciones  con respecto al posible  bioinsumo y la técnica de biorremediación  idónea para atender la novedad fitosanitaria.      Estos  fu eron los  Prompt utilizados  en distintos  momentos:          Asumirás  el  rol  de  un  experto  en  Biotecnología  y Bioeconomía,  según  las  características del  programa,  plan  de   estudio  y campo  laboral  expuesto en  la siguiente  maestría:  https://www.colmayor.edu.co/program as/maestria - e n  -  biotecnologia - y - bioeconomia/       Se  piensa  desarrollar  una  revalorización  de  residuos  sólidos  orgánicos  generados  por  el  sector  turístico  en  el   municipio  de Jericó, Antioquia.  Se espera que la valorización  de los residuos orgánicos permitan  obt ener  insumos    para  afrontar  el problema  fitosanitario  asociado  al cultivo de cardamomo  con el  picudo Cholus  spp ¿qué  insumos    podría  brindar  los residuos orgánicos para controlar  biológicamente  a dicha plaga?       Se  entiende  que  el  hongo  el  hongo  Beauveria  bass iana  es un  enemigo  natural  del  Cholus  spp,  por  tanto  ¿cuál   sería el tipo de técnica de biorremediación  más indicada  para atender este problema  fitosanitario  en los cultivos de   cardamomo  de Jericó a través de este hongo?  Además,  proporciona  fuentes  Q1 y Q2    donde  me pueda  sustentar   para verificar la respuesta a la pregunta  formulada       v.   Referencia  o artículo científico  con el que se contrastó la información  generada  por la   IA.       Ante el requerimiento  de referencias para la verificación la IA recomienda  estas    dos fuentes:       •   Desgranges,  C., Vergoignan,  C., Léréec, A., Riba, G., & Durand,  A. (1993).  Use of solid  state  fermentation to   produce Beauveria  bassiana  for the biological  control of european  corn borer.  Biotechnology  Advances, 11(3),   577 - 587.  https://doi.or g/10.1016/0734 - 9750(93)90026 - j    •   Singh  HB, Keswani  C, Ray S, Yadav SK, Singh SP, Singh S, Sarma BK. Beauveria  bassiana:  Biocontrol  Beyond   Lepidop  de es tiércol  liquido  (Pineda et al., 2021) En el contexto turístico,  se tienen registros  de que la industria  alimentaria  y el sect or   alojamiento  podrían  estar ocasionando  46% y 22%  de los  residuos  sólidos  urbanos,  respectivamente  (Phu et al., 2019)            ii.   Propuesta  de al menos tres productos de valor agregado  obtenidos  a partir de dicha   biomasa.       “De dicha biomasa orgánica generada por el sector turístico pueden derivarse, al menos, tres productos de valor agregado:   i) compost o biofertilizante  estabilizado,  ii)  un b ioplaguicida  basado  en Beauveria  bassiana  producido  por  fermentación en   estado  sólido,  y iii)  biomasa  y frass  de  Hermetia  illucens  como insumo  agronómico.  Lo anterior  permitiría  transformar  un   pasivo  ambiental  en insumos  útiles  para el manejo sostenible  de l cultivo de cardamomo”       iii.   Breve descripción  de los procesos involucrados.       La obtención  de estos  productos  se daría  (redacción tomada  de Perplexity AI)       1) Biofertilizante  o compost maduro    Este producto se obtiene  por compostaje aeróbico de los residuos org ánicos segregados, con control de humedad,   relación C/N, aireación  y temperatura  hasta estabilizar  la materia  orgánica y mineralizar  nutrientes.  El resultado  es   un  enmienda  orgánica  útil  para  mejorar  estructura  del  suelo,  retención  de  agua  y  disponibilidad   de  nutrientes ,   especialmente  en  sistemas agrícolas  locales.  En  un  contexto  como  Jericó, además  puede  funcionar  como  base   para inocular  microorganismos  benéficos  y cerrar ciclos de nutrientes.  (Bohórquez - Sandoval  et   al., 2024)          2) Bioplaguicida  con Beauve ria  bassiana    La  ruta  más  sólida  es  usar  los  residuos  orgánicos  como  sustrato  para  fermentación  en  estado  sólido  (SSF)  y   producir  conidios  del  hongo  entomopatógeno  B.  bassiana.  Un  estudio  de  2021  mostró  que  residuos    agroindustriales  como  cáscara de arroz,  c áscara de papa  y bagazo  de cerveza pueden  producir  concentraciones    elevadas  de  conidios,  demostrando  que  la  valorización  de  residuos  puede  convertirse  directamente  en  un   bioinsumo  insecticida.  Luego,  el  producto  se formula  como  polvo  mojable,  suspensión  co ncentrada  o  granulado   para aplicarlo  en campo contra Cholus spp. mediante  infección  por contacto. (Sala  et al., 2021)       3) Frass o biomasa de mosca soldado negra    Otra opción  es bioconvertir  los  residuos  con larvas de  Hermetia  illucens   *,  generando  biomasa  larval  y frass con   valor  agronómico.  La  revisión  reciente  sobre  esta  ruta  explica  que  la  larva  transforma  residuos  orgánicos  en  \n     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025       biomasa  rica  en  proteína  y  lípidos,  mientras  que  el  frass conserva  nutrientes  y puede  usarse  como  fertiliza   nte   orgánico.  Esta  alternativa  es  útil  si  el  proyecto  busca  una  plataforma  de  biorrefinería  más  amplia,  aunque  no   sustituye por sí sola al biocontrol  fúngico contra Cholus spp. (Ganessan et al., 2024)             iv.   Prompt utilizado en la herramienta  de IA para evalua r la viabilidad  técnica  o conceptual   de la biorrefinería.          En esta oportunidad  el Prompt empleado  fue:       Para  la  identificación  de  la  biomasa  disponible  a  razón  de  los  residuos  orgánicos  ocasionados  por  el  sector   turístico...       ¿Qué  productos  de  valor  agregad o  se podrían  obtener  a  partir  de  dicha  biomasa?  Dame  tres opciones,  una  de   ellas  es  el  bioplaguicida  a  base  del  hongo  Beauveria  bassiana  ¿cómo  sería  daría  la  producción  de  dichos    productos? Dame  una breve descripción soportada  en artículos científicos Q1 y     Q2       c.   Técnicas de biorremediación       i.   Identificación  de los residuos  generados  en cada etapa.       Dado  que  la  biorrefinería  es  una  tecnología  verde  y sostenible  para  la descomposición  de  residuos  sólidos  orgánicos  en   valiosos  productos  de base  biológica  , como biofertilizantes  , bioetanol  , biohidrógeno,  bioelectricidad  , biogás  , bioplásti   c os   , ácidos     orgánicos  y bioenzimas  (Adetunji  et al., 2023,  p.1),  se  ha reportado  de manera general   que pueden  obtenerse  lo   siguientes  productos  azúcares,  biohidrógeno,  biometano,  ácidos  grasos  volátiles,  ácidos  grasos  de  cadena  media,   bioetanol,  biobutanol,  biodiése l,  biopolímeros  y fertilizantes  (Caltzontin  et  al.,  2022,  p. 6),  lo que  permitiría  centrarse  en el   uso de soluciones  de base biológica  enfocadas específicamente  en utilizar  recursos  biológicos  que  permitan la gestión  del   problema  de  los  residuos  sólidos  ca usados    por  el  turismo  ( Sakcharoen,  2023)  acelerando  su  descomposición  (Gómez,   2022) de cara a que no se afecte el patrimonio cultural y natural  del territorio  a largo plazo  y que la mitigación de los des afíos   que enfrenta la gestión  residuos  se pueda sol ventar  (Maroneze  et al., 2022;  Vasileiadou,  2024)          ii.   Tipo de técnica  de biorremediación  propuesta (fitorremediación,  biorremediación   microbiana,  compostaje,  digestión  anaerobia,  entre otras).       La  técnica  más  indicada  para  confrontar  el    desafío     fitosanitario  dando  aprovechamiento  a  una  de  las  externalidades   ocasionadas  por turismo,  sería  una  biorremediación  microbiana  por fermentación en estado  sólido,  orientada  a producir  el   bioplaguicida  con Be auveria bassiana  a partir de los  residuos  orgánicos  turísticos.  Esta opción  es la más coherente  porque   el  problema  no  es  una  contaminación  del  suelo  o  del  agua  que  exija  fitorremediación,  sino  la  valorización  de  biomasa   residual  para generar  un agente  biol ógico  contra una plaga  (Sala et al., 2021) (redacción tomada  de Perplexity AI)          iii.   Justificación  de su selección.         La opción  principal  sería  biorremediación  microbiana  / biotransformación,  no  fitorremediación,  pues  permite  usar  residuos   orgánicos  como sustr ato  y soporte  para  crecer el  hongo,  producir  conidios  y formular  un  producto  biocontrolador.  En  la   literatura  se ha demostrado  que residuos  como cáscara de arroz, bagazo  de cerveza, cáscara de papa y otros subproductos   agroindustriales  pueden  sostener  prod ucciones  elevadas  de  conidios  de  B.  bassiana  (Sala,  2023)  (redacción  tomada  de   Perplexity AI)            \n     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025          5.   Análisis de resultados (no tiene límites)       i.   Diagrama  de la biocadena  agroindustrial  propuesta.            Fuente.  Tomada de la IA en que se sustentó  este    documento       ii.   Esquema  conceptual  de la biorrefinería  y sus flujos de biomasa  y productos.       La  lógica  del  sistema  es  de  biorrefinería  en  cascada:  primero  se  separa  y acondiciona  la  biomasa,  y luego  se  distribuy e   hacia distintas  rutas de conversión según su  composición y el producto buscado (Vurukonda et al., 2024) (redacción tomada   de Perplexity AI)          Para  el problema  fitosanitario  del  cardamomo, la  ruta más  estratégica  es  la fermentación  en estado  sólido  con Beauveria   bassiana*,  porque  convierte residuos  en     un bioplaguicida  dirigido  contra Cholus  spp  (Sala  et al., 2021)  (redacción  tomada   de Perplexity AI)          El compostaje  y la  digestión  anaerobia  funcionan  como rutas  complementarias  para  cerrar ciclos de  nutrientes  y energía,   mientras  que la bioconversión  con   larvas  de Hermetia illucens  amplía  el portafolio  de productos  de la bioeconomía  circular   (Ganessan  et al., 2024)  (redacción tomada de Perplexity AI)       iii.   Discusión  crítica de las ventajas  y limitaciones  de las estrategias  planteadas.       La  estrategia  presenta  v entajas  en  términos  de  circularidad,  diversificación  de  productos  y  pertinencia  territorial;  sin   embargo, su implementación exige superar  limitaciones asociadas  a la variabilidad  de los residuos,  la sensibilidad  ambiental  \n     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025       de Beauveria  bassiana  y los costos     de control operacional.  Por ello,  la alternativa  más robusta  no es una única tecnología,   sino  una  biorrefinería  integrada  donde  el  compostaje,  la  fermentación  en  estado  sólido  y,  de  forma complementaria,  la   digestión  anaerobia  o la bioconversión  con insec tos,  se  articulen  en función del  tipo  de biomasa  disponible  y del producto   final  requerido.  Mas  allá  de  esto,  el  que  residuos  que  hoy  son  un  pasivo  del  turismo  puedan  convertirse  en  insumos   agrícolas,  bioplaguicidas,  energía  o enmiendas  orgánicas  supone  un   hito  de gran  envergadura  para este  fenómeno social   y sector económico (Wardani  et al., 2025)  (redacción tomada de Perplexity AI)          iv.   Evaluación  del uso de la IA en el desarrollo del trabajo/  ¿Qué aciertos  se identificaron  en las   respuestas  generadas?/     ¿Qué  limitaciones  o errores se detectaron?       El uso de la  Perplexity AI en  el desarrollo  de este  documento fue mas que acertado,  entendiendo  que el autor  desconoc ía   elementos  técnicos  y operativos  con  respecto  al  aprovechamiento  de  residuos  orgánicos  en  la  soluc   ión  de  un  problem a   fitosanitario,  las  respuestas  derivadas  de  cada Prompt  fueron lo  suficientemente  ilustrativas  para  permitir  el desarrollo  de   este informe y entender  las posibilidades  que realmente  podrían  darse  en el sector turístico  en cuanto la valori zación  de los   pasivos/activos  ambientales  que  ocasiona.  No  se  considera  que  hayan  existidos  fallas  en  las    réplicas     entregadas,  pues   estas  se  sustentaban  en fuentes  científicas  lo que  daba  credibilidad  a la información. Tal vez de  haberse  entrenado  mejor   el   aplicativo  las respuestas  habrían  sido  más sofisticadas  de lo que fueron.          v.   Discusión  preliminar sobre la escalabilidad  y la implementación  potencial  del proceso a nivel   industrial.       Como lo mencióna Lucero et al., (2024) “el problema principal de la ferm entación solida  es el escalado comercial, el principal   enfoque la producción de un gran número de conidios de forma eficiente y económica para reducir los costos de producción   y  poder  competir  con  los  plaguicidas  tradicionales”  (p.  119),  lo  que  supone  un  d esafío  en  la  materialización  de  esta   biosolución  en  el  contexto  agrícola  del  municipio.  De  igual  manera,  la  falta  de  caracterización  de  los  residuos  sólidos   orgánicos  del  sector  turístico,  impide  la  toma  de  decisiones  en  cuanto  al  tipo  aprovechamientos  que     se  podrían  dar,  no   permitiendo  la definición  certera de biorrefinerías  derivadas  de estos  pasivos/activos  sectoriales.       6.   Conclusiones (Máx 300 palabras)       El turismo tiene  un potencial  para contribuir con el desarrollo  local y por ende la rentabilidad  para los territorios,  procur   ando   un  alto  impacto económico  y social,  pero  bajo  impacto  ambiental  (Martínez - Jaramillo  et al.,  2022),  pues  la  generación  de   resid uos   de  este sector  resulta  en una mayor presión  para los  sistemas  de gestión  territorial  (SEGGITUR, 2023),  lo que a   su vez compromete la calidad del  entorno  natural  y cultural,  es decir, la sostenibilidad  del  destino  en el largo  plazo  (Jara    &   Santamera,  2 022).        Al  ser  la  correcta  gestión  de  los  residuos  un  tema  de  vital  importancia  en  la  actualidad  en  empresas  del  sector  turístic o   (Araujo, 2026),  cobra sentido  que haya una valorización  de estos  para la solución  de problemáticas  agrícolas,  en este caso   el  control    del  insecto  Cholus  spp.  (Col:.Curculionidae:Cholinae)  en  cultivos  de  cardamomo  (Elettaria  cardamomum  (L)   Maton) del municipio  de Jérico, Antioquia  a partir del hongo  Beauveria  bassiana  (Pedraza,  2017)  que puede  ser producido   a través  de  fermentación en  sus tratos  solidos  bajo  ciertas  condiciones  (Lucero  et al.,  2024.  La viabilidad  de su  desarrollo   depende  de  las  características  de  los  residuos  orgánicos  que  se hallen  en el  contexto  jericoano,  la posibilidad  de  que  se   pueda  escalar  a los  niveles  requeridos  y  de  que se logre  consolidar  los  datos  que  haya lugar  para una  adecuada  toma de   decisiones.       En  fin,  la  prevención  en  materia  de  residuos  debe  ser  prioritaria  en  el  sector,  reduciendo  los  impactos  ambientales  y   proporcionados  valores  añadidos  a los destinos    donde  tiene  mayor presencia  ( Fundación  Canarias  Recicla, s.   f.), a través   de prácticas de circularidad como eje de competitividad sectorial (Enríquez  et al., 2026) que permita coadyuvar a lo territor   ios   en los costos    - sociales,  ambientales  y económicos -   el evados  relacionados  con el tratamiento  de residuos  (Fernández  et al.,   2025)               \n     Código:  GD - FR - 001    Versión:  15    Fecha: 18 - 02 - 2025             7.   Referencias bibliográficas           Adetunji,  A. I., Oberholster,  P. J., & Erasmus, M. (2023).  From garbage  to treasure:  A review on biorefinery of organic  solid    wastes  into valuab le  biobased  products.  Bioresource  Technology  Reports,  24, 101610.   https://doi.org/10.1016/j.biteb.2023.101610          Araújo  Vila, N. (2026).  Integración  de la economía  circular y el desarrollo  sostenib le  en las  empresas  del sector turístico:   propuesta  de un modelo de indicadores  para su implementación  [Integration  of circular economy and sustainable   development  in tourism sector companies:  proposal  of an indicators  model for its imp     const PDF2_TEXT_EMBEDDED = "     Código: GD - FR - 001    Versión: 15    Fecha: 18 - 02 - 2025       I ntegración de procesos bioeconómicos   en el turismo       El desarrollo de las sociedades actuales ha estado impregnado de incidencias en los ámbitos   económicos, ambientales y sociales, en especial en esta ultima el turismo como fenómeno   social (Ledhesma, 2021) ha marcado su proceder actual y venidero, convirtién dose en una   necesidad humana con múltiples miradas (Araujo & Sevilha, 2017) que puede ser vista como   vital para el hombre e igualmente acabar con la vida en el planeta Tierra (Muñoz, 2015).        Con  una  contribución  en  el  2024  del  10%  al  PIB  mundial,  equivale nte  a  10,9  billones  de   dólares  estadounidenses,  lo  que  incluye  los  impactos  directos,  indirectos  e  inducidos  del   sector ,  generando  un  total  de  357  millones  de  empleos  a  nivel  mundial,  equivale nte     a   aproximadamente 1   de cada 10 empleos.   ( World Travel & Tour ism Council , 2025) ,   el turismo   es    un  elemento    relevante     de  desarrollo  socioeconómico  y  político  en  muchos  países,  la   tercera industria de exportación más grande del mundo, con un incremento internacional que   sobrepasa la participación de las exportaciones  globales (Soriano et al, 2023).   Para el caso   colombiano , en el 2024  represent ó   el 4,7 % de la economía colombiana y la generación de   1,40  millones  de  empleos  (World  Travel  &  Tourism  Council ,  2024 ) ,  mientras  que  para  el   departamento de Antioquia en el 2022  su aporte al PIB regional fue de 4,8 % (Gobierno de   Departamental de Antioquia, 2024).       Est os   impact os   económico s   contrasta n   con las externalidades que este sector   trae consigo    en todos los niveles   territoriales :   sobreconsumo de agua, energía, generación de emisiones   de GEI, afectaciones a la biodiversidad, generación de residuos  sólidos   y descarga de aguas   residuales  (Ministerio  de  Comercio,  Industria  y  Turismo,  2020 ) ,    siendo  llamativo  las  35   millones de tonelada s de residuos sólidos que genera solo la industria hotelera, con un valor   promedio  de  1,67  kg  producidos  por  turistas ,  lo  que  supera  las  capacidades  de   infraestructuras locales   (Foschi et al., 2025).       En Colombia la generación de residuos  sólidos (sin disc riminar orígenes)   en el 2021  ascendió    a 30,31 millones de toneladas,   siendo  el 82,2% (24,90 millones de toneladas)   de   residuos   sólidos,  y  el  17,8%  (5,41  millones     de  toneladas)  a  productos  residuales     (DANE,  2023) ,   mientras  que  a  nivel  departamental  es  de  4,294  toneladas  diarias  en  promedio   (Superservicios,  2024).  Para  el  caso  del  municipio  de  Jericó,  ubicado  en  la  cordillera   occidental de los Andes del departamento de Antioquia/Colombia, con 12.633 habitantes y   una distancia de Medellín   de 108 km (Antioquia es Mágica, 2023), es un pueblo patrimonio   (FONTUR,  s.f.)    con  un  capital  natural  y  cultural,  que  genera  flujos  turísticos  altos  a  este   territorio como lo fueron los 12.000 turistas en Semana Santa (Carmona, 2025). Al igual que   la mayo ría de los destinos turísticos no es ajeno a las externalidades negativas, pues genera   1464 t al año, es decir 122 t mensuales aprox. y 4 t diarias (Superservicios, 2024), siendo un   desafío  significativo  para  la  gestión  de  residuos  sólidos  dada  la  ausencia     de  un  relleno   sanitario local (Gobierno Municipal de Jericó, 2024).     \n     Código: GD - FR - 001    Versión: 15    Fecha: 18 - 02 - 2025          Esta situación resalta la necesidad de enfoques de mejora desde el sector para la gestión de   residuos (Juvan et   al., 2023), debido a que los destinos  altamente especializados  tienden   a    tener  más  llegadas  de  turistas  y,  en  consecuencia,  una  mayor  generación  de  residuos   sólidos  relacionados  con  el  turismo    (Yuxi  et   al.,  2023),  por  ende,    para  hacer  frente  a  esta   problemática  desde  lo  local,  se  propone   analizar  la  integración  de  procesos   bioe conómicos en la ge stión   de residuos  sólidos   orgánicos e inorgánicos, asociados   al sector turístico en el municipio de Jericó ,  Antioquia , toda vez que como mínimo esta   industria debe ayudar en la gestión de las problemáticas ambientales que ocasio na.        Esta propuesta se alinea con   lo estipulado en la Misión de Sabios y su   Estrategia Nacional   de Bioeconomía, desde un área estratégica distinta a la que se reseña en su estructura, es   decir,  en el Área 1. Biodiversidad y Servicios Ecosistémicos, se contempl a como subárea el   Turismo de Naturaleza, sin embargo, dada las características investigativas del ejercicio, su   articulación  será  con  el  Área  4.  Biomasa  y  Química  verde  y  el  subárea  Biofactorías  y   Biorrefinerías  (MinCiencias, 2019) (MinCiencias, 2020), lo  que supone que sin lugar a duda   este  proyecto  contribuye  a  la  consecución  del  modelo  circular  de  producción  y  consumo   definido en la Estrategia Nacional de Bioeconomía ( Gobierno de la República de Colombia ,   2019)       La  investigación     se  articula  a  los  Objetiv os  de  Desarrollo  Sostenible  (ODS)  8    “ Trabajo   Decente  y  Crecimiento  Económico ” ,  9   “ Industria,  Innovación  e  Infraestructuras ” ,  11   “ Ciudades  y  Comunidades  Sostenibles ”     y  el  12    “ Producción  y  Consumo  Responsables ” ,   específicamente a las meta s   8.2   (ODS 8)   alusiv a a la productividad económica mediante la   diversificación ,  9.4  (ODS  9)  que  enfatiza  la  modernización  de  la  infraestructura  y   reconvención  de  las  industrias  para  que  sean  sostenibles,  11.6  (ODS  11)  que  refiere  la   reducción de impacto ambiental negativo ges tionando los desechos municipales, y la 12.5    (ODS 12) que pretender reducir la generación de desechos mediante actividades circulares   (ONU, 2022).       En  cuanto  al  sector  turístico  colombiano,  la  investigación  encaja  con     el  CONPES  3397    “ Política    sectorial  del  turismo ”,     en  lo  que  respecta  a  la  recuperación  y  sostenibilidad  del   patrimonio  cultural  y  ambiental  para    el    establecimiento  de  una  oferta  turística  competitiva   (DNP, 2005) ; asimismo con     la   “ Política de Competitividad Turística : el desafío pa ra alcanzar   un  turismo  de  clase  mundial” ,  cuyo  objetivo  es  m ejorar  la  competitividad    del  sector  en    Colombia, a través de estrategias   que fortalezcan la sostenibilidad de   la cadena de valor y   que permitan posicionar al país como un destino turístico de clas e   mundial   ( MinCIT ,  2009 ) .    Se vincula con     la   ley 2068 de 2020   “ Ley General de Turismo ”   desde su objeto  que busca   fomentar  la  sostenibilidad  e  implementar  mecanismos  para  la  conservación,  protección  y   aprovechamiento de los destinos y atractivos turístico s   ( Congreso de Colombia, 2020) .    De   igual  manera,  se  relaciona  con  el  objetivo  del      Decreto  646  de  2021     “ Política  de  Turismo  \n     Código: GD - FR - 001    Versión: 15    Fecha: 18 - 02 - 2025       Sostenible ”     que  pretende  el  f ortalec imiento  de  la     sostenibilidad    en     la  cadena  de  valor  del   turismo  en  Colombia,    generando     un  mayor  valor  agregado  y  diferenciación  para  el  país    (MinCIT, 2021) .       Por otro lado, esta i nvestigación   se acopla con la Ley 99 de 1993  “ Ley General Ambiental ” ,   desde la lógica de asegurar la  sostenibilidad y minimizar el impacto sobre el medio por parte   de  los  distintos  sectores  productivos  (Congreso  de  Colombia,  1993 );  mientras  que  con  el   CONPES  3866     “ Política  Nacional  de  Desarrollo  Productivo ” ,  se  relaciona  con  la     Línea     de   acción 2 .  Aumentar   la actividad innovadora y el emprendimiento en el aparato   productivo   y   la  7. Generar y divulgar análisis de cadenas de valor (DNP, 2016 a ); se enlaza con la  a puesta   de   g enerar un entorno institucional propicio para la coordinación entre actores que   promuev a   la  eficiencia  en  la  gestión  integral  de  residuos ,  definido  en  el  CONPES  3874    “ Política   Nacional para la Gestión Integral de Residuos Sólidos ”   (DNP, 2016 b ). De igual manera,  este   ejercicio investigativo   se vincula con el CONPES 3934   “ Política de Crecimien to Verde ” , en lo   que respecta a la Línea de acción 13. Fomentar los NVS y la 29. Desarrollo de Instrumentos   de  infraestructura  y  logística  (DNP,  2018 a ) ;  asimismo  con  el  CONPES  3919     “ Política   Nacional  de  Edificaciones  Sostenibles ” ,     en  lo  correspondiente  al  plan  de  acción  al    5.3.1.    d iseñar  e  implementar  instrumentos  de  política  pública  que  permitan     incluir  criterios  de   sostenibilidad  para  todos  los  usos  y  dentro  de  todas     las  etapas  del  ciclo  de  vida  de  las   edificaciones     (DNP,  2018b );     mientras     que  con  el  CONPES  3918     “ Estrategia  para  la   implementación de los objetivos de Desarrollo sostenible ( ODS ) ”,   se articula con el objetivo   de  este  entendiendo  su  alcance  nacional,  departamental  y  local  (DNP,  2018c);  para  por   ultimo  resaltar  el  encad enamiento  con  el  CONPES  4129   “ Política  Nacional  de   Reindustrialización ” , en lo relativo la l ínea de acción 2.2. Fomentar la creación y desarrollo   de  unidades  productivas  de     bienes  y  servicios  sofisticados  en  los  diferentes  sectores  y   territorios   (DNP, 2023 )       En cuanto a los planes de desarrollo de todos los niveles territoriales, este proyecto se enrola   en la transformación 4.  Transformación Productiva, Internacionalización y Acción Climática ,   catalizador 9. Modelos de bioeconomía basada en el  conocimiento y la innovación ,   del Plan   Nacional  de  Desarrollo  2022 - 2026    “ Colombia,    P otencia    M undial  de  la    V ida ”     (Gobierno  de   Colombia, 2023) ;   mientras que en el Plan de Desarrollo 2024 - 2027  “ Por Antioquia Firme ” , se   liga a la línea estratégica 4. Sostenibi lidad desde lo territorial y su componente 4.1 Potencial   ecológico  y  ambiental  (Gobierno  Departamental  de  Antioquia,  2024);  para  por  ultimo  y  no   menos  importante,  Plan  Municipal  de  Desarrollo  2024 - 2027  “ Jericó  Territorio  de   Oportunidades ” , se articula a la   oportunidad estratégica 3. O portunidades de un Jericó    verde  para  la  vida     y  su  componente  3.1  Sostenibilidad  Ambiental  ( Gobierno  Municipal  de   Jericó , 2024)       En lo que respecta al vínculo de la investigación con las apuestas de la Autoridad Ambiental   de est a  jurisdicción:  Corantioquia,  en el  Plan  de  Gestión  Ambiental  Regional 2020    –     2031  \n     Código: GD - FR - 001    Versión: 15    Fecha: 18 - 02 - 2025       “ Un Plan Intergeneracional ” , se halla una articulación con la Línea 1.   Planificación ambiental   territorial  y  protección  de  áreas  que  proveen  servicios  ecosistémicos ,  C ompone nte  4.   Modelos sostenibles desde sectores económicos, integrando el ciclo de vida del producto ,   R eto 14. Aumentar los ingresos asociados a los negocios verdes y a bioeconomía , al igual   que con el  Componente 6. La ciudadanía y sus prácticas cotidianas   y el  R eto 16. Transformar   los  hábitos  de  consumo,  hacia  un  consumo    sostenible;  y  la    Línea  3.  Consolidación  de  un   entorno saludable y seguro , C omponente 10. Saneamiento ambiental   y R eto 23. Disminuir   las toneladas de residuos sólidos en los sitios de  aprovechamiento, tratamiento y disposición   de  residuos  ordinarios,  especiales  y  peligrosos     ( Corantioquia ,    2019).     En  consecuencia,  el   proyecto investigativo se anexa al Plan de acción 2024 - 2027  “ Conectados por la Vida ” ,   con   el  Programa  2.  Administración  del     Patrimonio  Ambiental,    Actividad  2.1.2.  Articulación   Interinstitucional para la atención de   situaciones críticas en lo ambiental   ( Corantioquia ,  20 24 ) .          El  encadenamiento  de  la  investigación  con  relación  a  estudios  prospectivos  del   departamento de Antioqui a, se ve reflejo en el Pilar 4. Territorio Sostenible y el movilizador   4.5  Acción climática: Por una Antioquia carbono neutral al 2050   de la Agenda 2040 , asimismo   con el Pilar 5. Territorio Multicultural y su movilizador  5.4 Antioquia es mágica: por un tur ismo   sostenible  (Gobernación  de  Antioquia,  s.f.),  mientras  que  en  Antioquia  2050  en  sus   denominadas  Fuerzas  detonantes  de  futuro,  se  reseña  que  uno  de  sus  retos  por  ámbito   decisional    es    el  d esarrollo  de  ecosistemas  de  innovación  en  sectores  prioritarios  (s alud,   turismo, bioeconomía)   (Gobernación de Antioquia, 2019).       En  fin,  el  cómo tributa  la  propuesta  investigativa    análisis  de     la  integración  de  procesos   bioeconómicos en la gestión de residuos sólidos orgánicos e inorgánicos, asociados   al sector  turístico en el municipio de Jericó ,  Antioquia , a   distintos marcos normativos y   estratégicos  con  respecto  a  esta  temática  en  pro  del  capital  natural,  se  evidencia  en  las   enunciaciones que preceden.    Las discusiones en torno a estas externalidades y otras so n   vastas (Andrade et al., 2023), pero para su correcta atención se deben integrar modelos que   permitan minimizar  los  impactos  del turismo  para que su presencia se realmente sostenible   (Vargas - Sánchez, 2021), siendo la bioeconomía y economí a   circular sendas   (MinCiencias,   2020) que permiten la gestión de estas problemáticas, incluso desde e ste  sector  económico.                               \n     Código: GD - FR - 001    Versión: 15    Fecha: 18 - 02 - 2025       Referencias bibliográficas          •   Mitos  del  turismo  /  Miguel  Ledhesma.     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };

    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');

    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);

        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);

            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
