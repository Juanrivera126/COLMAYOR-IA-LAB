ud   por el aumento del consumo de vegetales al usar tallos y hojas,   y  establecer  nuevas  redes  o  fortalecer  vínculos  con  personas    con intereses en común al compartir recetas para evitar el des -  perdicio de alimentos.  7  Término usado en Chile para referirse a las sobras de comida que han quedado de   los días lunes, martes y miércoles. No obstante, puede ser de otros días de la semana   también. \nCocina Sustentable   |   47   RECETARIO \n48 |  Cocina Sustentable \nCocina Sustentable   |   49   PASTEL DE PAPAS CON TALLOS DE ACELGA  5 porciones  Esta receta es una alternativa al clásico pastel de papas chileno,   en la que se reemplaza la carne por tallos de acelga y otras verdu -  ras.  Idealmente usar aquéllas que han ido quedando olvidadas   como un pimentón arrugado, medio zapallito italiano algo viejo o   un zapallo camote que está empezando a echarse a perder. Si se   quiere incorporar más proteína, se puede usar soya texturizada   hidratada o alguna legumbre ya cocida como lentejas o porotos.  Ingredientes para el pino:  2 tazas de cebolla picada en cuadritos  1 diente de ajo machacado  1 cuchara de hojas de apio picadas  1 cucharita de tallos de perejil picado  1 cucharitas de orégano seco  2 tazas de tallos de acelga picados  1 taza de verdura a elección picada (zanahorias, pimentones,   berenjenas, etc.)  4 callampas secas  1 cuchara de aceite de oliva  2 cucharitas de aliño completo  ½ taza de pimentón en cubitos  ⅓ tazas de pasas  6 aceitunas  Aceite de oliva  Sal y pimienta  Ingredientes para el puré:  8 papas medianas peladas   1 taza de leche o bebida vegetal a gusto  ⅓ taza de aceite de oliva  Sal \n50 |  Cocina Sustentable  Preparación del puré:  • Opcionalmente pelar las papas, ya que igual se pueden hacer   con la cáscara para obtener un resultado más rústico. En caso   de pelarlas, aprovechar la piel horneándolas o fritas para obte -  ner crocantes chips.  • Partir las papas a la mitad y disponerlas en una olla, cubrir   con agua y agregar 1 cucharada de sal.  • Hervir a fuego suave por 15 a 20 minutos o hasta que al ente -  rrar un tenedor se sientan cocidas.  • Aplastar con un prensa para puré.  Agregar la leche o bebida   vegetal, aceite de oliva y sal. Mezclar bien y reservar.  Preparación del pino:   • Hidratar en agua caliente las callampas secas por 10 minutos,   colar y picar.  • En una olla o sartén agregar un chorrito de aceite de oliva y   sofreír la cebolla y el ajo por 5 a 7 minutos, a fuego medio-fuer -  te.  •  Agregar  el  resto  de  los  condimentos,  verduras  y  callampas    hidratadas, coladas y picadas.  • Saltear por unos 10 minutos a fuego medio-bajo.  •  Incorporar  las  pasas,  revolver  y  disponer  en  la  base  de  una    budinera para horno.  • Distribuir las aceitunas y cubrir con el puré de papas. Pincelar   la superficie con un poco de aceite de oliva.  • Llevar a horno precalentado a 180ºC por 25 minutos o hasta   dorar.   • Servir de inmediato. \nCocina Sustentable   |   51  \n52 |  Cocina Sustentable  SALSA DE TOMATES EXTRA-MADUROS  2 frascos de 500 ml  En el verano los tomates están en plena temporada, pero con el   calor tienden a echarse a perder más rápido. En ferias y verdu -  lerías se pueden encontrar cajones con tomates algo pasados, a   precios más convenientes o incluso que son regalados ya que no   podrán ser comercializados. Sin embargo, aunque tengan algunas   partes con piquetes o comenzando a fermentar, se pueden retirar   esos pedazos y compostar, mientras el resto del tomate estará en   el punto perfecto para hacer una salsa sumamente sabrosa.  Ingredientes:  4 a 5 kilos de tomates maduros  ½ taza de aceite de oliva  1 ½ cucharita de sal  2 frascos 500ml  Preparación:  • Esterilizar 2 frascos de 500ml sumergiéndolos en una olla con   agua caliente. Se puede colocar un paño de cocina en el fondo   para evitar que se golpeen. Hervir los frascos y tapas por 10   minutos. Retirar de la olla y dejar secar boca abajo, evitando   manipular mucho con las manos. Este paso no es necesario en   caso de congelar la salsa, sin embargo, esterilizar bien los fras -  cos permitirá conservar la salsa a temperatura ambiente por   12 meses.  • Lavar los tomates, cortar en gajos, retirando el centro y los   trozos que estén machucados.  • Disponer en una fuente para horno, agregar el aceite de oliva   y espolvorear la sal.   • Hornear a 180ºC por 30 minutos o hasta que se vea que el   jugo de los tomates está hirviendo y se ha intensificado su color   rojo a uno más burdeos.  • Sacar del horno y dejar enfriar para evitar quemaduras.  • Colocar en una juguera y moler. \nCocina Sustentable   |   53   • Disponer la salsa en una olla y cocinar a fuego bajo revolvien -  do constantemente hasta que comience a hervir, cocinar por   10 minutos o hasta que esté con consistencia de salsa (puede   variar el tiempo según el tipo de tomate, los perita son los más   recomendados porque tienen menos agua y más pulpa).   • Rellenar los frascos, dejando libre al menos 1 cm. Tapar.  • En caso de querer hacerlos como conserva para el año es   necesario  volver  a  hervir,  para  esto  disponer  nuevamente  los    frascos de salsa tapados en una olla y agregar agua hasta que   llegue  al  cuello  de  los  frascos.  Hervir  por  al  menos  20  minu -  tos, dejar enfriar en la misma olla y verificar que se haya hecho   vacío en las tapas, puede que se escuche un click al presionar   o se vea la tapa con una forma cóncava, de lo contrario no se   logró el vacío y la salsa debe ser refrigerada y consumida en los   próximos días.  Nota:  Es importante que los frascos estén bien limpios, si son reutili -  zados, se debe tener especial precaución en esterilizar bien las   tapas,  incluso  limpiar  con  un  poco  de  alcohol  si  tuviese  man -  chas o resto de algún alimento para evitar que se contamine. La   salsa enfrascada al vacío puede durar 12 meses a temperatura   ambiente, guardada en una despensa fresca y sin luz. Por ello,   recordar rotular con un lápiz la fecha de elaboración.  Si al abrir un frasco se sintiese un olor a vinagre o diferente al   de  una  salsa  de  tomates,  debe  ser  descartada  en  el  compost.    También  se  debe  desechar  en  caso  de  presentar  hongos  o    moho en la superficie.  Esta salsa se puede usar para cocinar fideos, preparar salsas,   saborizar preparaciones. También se puede sofreír una cebolla,   agregar agua, la salsa, un poco de leche o bebida vegetal, y mo -  ler para hacer una rica sopa de tomates. \n54 |  Cocina Sustentable \nCocina Sustentable   |   55   TOSTADAS FRANCESAS EN BASE A PLANTAS  6 unidades  Para  producir  un  litro  de  leche  se  necesitan  mil  litros  de  agua.      Además, la ganadería es de las principales responsables de la de -  forestación. Por ello, reducir el consumo de productos de origen   animal  como la leche de vaca disminuye considerablemente los   impactos  socioambientales  de  nuestra  alimentación.  Este  pro -  ducto se puede comprar envasado o se puede hacer en casa con   ingredientes sencillos como frutos secos o avena.  Ingredientes para la leche vegetal:  1 taza de agua  ⅓ taza de frutos secos (puede ser almendras, nueces o avella -  nas) o bien, puede ser ⅓ taza de avena integral  Ingredientes para las tostadas:  6 rebanadas de pan viejo (molde, marraqueta, baguette, etc.)  1 taza de leche o bebida vegetal  1 cuchara de linaza o chía molida  1 cucharita de esencia de vainilla  1 cuchara de azúcar o endulzante a elección  Aceite de oliva   Ingredientes para servir:  ½ taza de yogur en base a plantas  1 taza de fruta picada a elección (frutillas, manzana, peras, etc.)  Bagazo de leche vegetal.  Preparación de la leche o bebida vegetal:   •  En  el  caso  de  elegir  preparar  la  bebida  vegetal  con  frutos    secos, se deben hidratar durante la noche en agua. Al día si -  guiente colar y usar de inmediato.  Por otro lado, si se prefie -  re usar avena, no es necesario hidratar para evitar que quede   babosa. \n56 |  Cocina Sustentable  • Para preparar la bebida vegetal (con frutos secos o con ave -  na) se deben colocar los ingredientes en una juguera y revol -  ver  por  unos  segundos,  sin  moler  demasiado.  Filtrar  en  un    colador usando una gasa. Reservar la bebida para la receta o   refrigerar por hasta un par de días y reservar el bagazo (resi -  duo resultante de la elaboración de la bebida vegetal).  • En un sartén seco (sin aceite) secar el bagazo hasta que ape -  nas  comience  a  dorarse.  Reservar  para  el  momento  de  servir    las tostadas o guardar en un recipiente hermético para usar en   recetas como granola, galletas o queques.  Preparación de las tostadas francesas:  • Mezclar en un plato hondo la leche o la bebida vegetal, con la   linaza o chía molida, esencia de vainilla y azúcar. Dejar reposar   por 5 a 10 minutos para que espese al activarse las semillas.  • Remojar las rebanadas de pan de 20 a 40 segundos, tiempo   que varía según el tipo de pan y qué tan seco pueda estar.  •  Calentar  un  sartén  a  fuego  fuerte,  agregar  un  chorrito  de    aceite  de  oliva  y  dorar  las  rebanadas  de  pan  por  un  minuto    aproximadamente. Dar la vuelta y dorar un minuto más.  •  Servir  de  inmediato  con  el  bagazo  tostado,  yogur  y  fruta,  o    acompañamiento a elección. \nCocina Sustentable   |   57  \n58 |  Cocina Sustentable  QUEQUITOS DE PLÁTANOS CON ARÁNDANOS  12 unidades  Cuando los plátanos están con la cáscara oscura es cuando más   dulces están, por eso una excelente opción es usarlos en recetas   dulces como bizcochos, queques, galletas, batidos e incluso hela -  dos. Para conservarlos, se pueden pelar y congelar guardados en   bolsas herméticas.  Ingredientes:  3 plátanos bien maduros  ¾ tazas de azúcar  ¼ taza de aceite  1 cucharadita de vinagre de manzana  ¼ taza de leche o bebida vegetal (en receta de tostadas france -  sa está la forma de preparar)  1 ¾ tazas de harina sin polvos de hornear  1 cucharadita de polvos de hornear   ¾ tazas de arándanos (se puede reemplazar por pasas, manza -  nas en cubitos, chips de chocolate o simplemente omitir)  Preparación:  • Aceitar y enharinar 12 moldes de quequitos o muffins.  • Precalentar el horno a 180°C (fuego medio).  • Disponer en una juguera o en un bowl y moler con una mini -  pimer los plátanos en trozos con el azúcar, el aceite, vinagre de   manzana, leche o bebida vegetal, harina y polvos de hornear.   • Procesar hasta obtener una mezcla homogénea.   • Agregar los arándanos (o ingrediente a elección). Mezclar con   un mezquino y distribuir en 12 moldes de quequitos.  • Hornear por 20 minutos o hasta que estén dorados en la su -  perficie.  • Retirar y dejar enfriar unos minutos antes de desmoldar.  • Guardar en un pote con tapa por hasta un par de días. \nCocina Sustentable   |   59  \n60 |  Cocina Sustentable  ZANAHORIAS FERMENTADAS ESPECIADAS  1 frasco de 500ml  Las zanahorias suelen venir en ramos o paquetes de varias uni -  dades, por lo que pueden terminar echándose a perder antes de   ser consumidas. Esta receta es una alternativa para que duren   más, estén listas para llegar y consumir, mientras además propor -  cionamos un alimento lleno de probióticos beneficiosos para la   salud. La misma receta puede aplicarse a rabanitos y betarragas,   los ingredientes como ajo, semillas y hojas se pueden omitir o   cambiar a gusto.  Ingredientes:  3 a 4 zanahorias  1 ½ taza de agua  1 cucharadita de sal   1 diente de ajo  ½ cucharadita de semillas de anís  1 hoja de apio  Preparación  • Disolver la sal en ½ taza de agua caliente, agregar 1 taza de   agua fría y reservar.  • Pelar y cortar las zanahorias en bastones o rodajas.   • Disponer dentro de un frasco de vidrio de 500ml previamente   esterilizado.  • Agregar el ajo, las semillas y hoja de apio. Agregar la salmuera   preparada hasta cubrir las zanahorias.  • Colocar un frasco pequeño muy limpio sobre las zanahorias   para evitar que floten, deben quedar completamente sumer -  gidas.  • Cubrir con una gasa amarrada con una pita o elástico.  • Dejar en un mueble de la cocina donde no llegue la luz direc -  tamente y fermentar por 3 a 7 días. Esto dependerá de cuánto   calor haga y cuán fermentada se quieran las zanahorias, en el   proceso debe comenzar a formarse una especie de espuma. \nCocina Sustentable   |   61   • Una vez transcurrido los días de fermentación, tapar y refrige -  rar. Puede durar varias semanas, en caso de observarse hongos   o adquirir una consistencia babosa deben ser descartadas.  • Estas zanahorias fermentadas se pueden comer como snack o   usar directamente en ensaladas. \n62 |  Cocina Sustentable \nCocina Sustentable   |   63   QUEQUE CHOCOLATE-NARANJA DE AQUAFABA  8 porciones  El líquido de cocción espeso resultante al cocer los garbanzos o   al colar los que vienen en conserva se llama aquafaba y es una   alternativa a la clara de huevo. Al batirla se logra un merengue,   se puede emulsionar con aceite para hacer mayonesa o se puede   usar para ligar mezclar como hamburguesas vegetarianas.  Ingredientes:  1 taza de aquafaba  ¾ taza de azúcar  1 ½ taza de harina  1 cucharadita de polvos de hornear  1 cucharadita de extracto de vainilla  ½ taza de aceite  1/3 taza de cacao en polvo amargo  ½ taza de leche o bebida vegetal  1 cucharada de ralladura de naranja.   Preparación:  • Precalentar el horno a 180ºC.  • Aceitar y enharinar un molde de queque.  • Batir el aquafaba a nieve, puede demorar un poco más de lo   que demoran las claras de huevo. Agregar el azúcar como lluvia,   seguir batiendo hasta que el merengue tenga consistencia firme.  • Agregar la mitad de los ingredientes secos cernidos, incorporar   con movimientos envolventes.   • Añadir el aceite y bebida vegetal, revolver con cuidado. Final -  mente, agregar el resto de los ingredientes secos y ralladura de   naranja. Mezclar con movimientos suaves hasta lograr una mez -  cla homogénea y verter en el molde de queque.  • Hornear por 30 minutos o hasta que se vea cocido y se sienta   firme al tacto.  • Enfriar 30 minutos antes de desmoldar.  • Mantener refrigerado. \n64 |  Cocina Sustentable \nCocina Sustentable   |   65   ARROZ DE BRÓCOLI CON ESCABECHE DE GARBANZOS  5 porciones  Generalmente el brócoli se consume cocido, aliñado con limón,   aceite y sal. Sin embargo, esta verdura tiene un sinfín de posibi -  lidades ya que se puede comer tanto crudo como cocido u hor -  neado  y  darle  una  vuelta  de  sabor  con  diferentes  condimentos.    Además, se puede aprovechar el tallo retirando la parte exterior   que es más fibrosa, quedando un centro muy tierno.  Ingredientes para el arroz de brócoli:  1 brócoli con su tallo  ⅓ taza de aceite de oliva  1 cucharadita de sal  Ingredientes para el escabeche de garbanzos:  1 cebolla pequeña corte pluma  2 zanahorias peladas y en rodajas  ½ pimentón en trozos  1 taza de lechuga, acelga o espinaca lacia   1 taza de verduras viejas como zapallito italiano, kale, etc. (op -  cional)   1 taza de garbanzos cocidos  1 cucharada de aliño completo  1 diente de ajo  2 cucharadas de aceite de oliva  1 cucharadita de sal  Preparación para el arroz:  • Precalentar el horno a 180°C.  • Pelar el tallo de brócoli, retirando la parte fibrosa exterior. La -  var y cortar en trozos el brócoli y cortar en trozos grande. Pro -  cesar el brócoli cortado en una 1,2,3 hasta lograr que quede en   granos de tamaño similar a un grano de arroz.  • Disponer en una lata de horno, agregar el aceite de oliva y sal.  \n66 |  Cocina Sustentable  Mezclar con las manos. Opcionalmente se pueden agregar hier -  bas, ralladura de limón o algún condimento a elección.  • Hornear por 30 minutos o hasta que comience a dorarse. Re -  volver un par de veces en el proceso  En paralelo, preparar los garbanzos en escabeche.   Preparación para los garbanzos en escabeche:  • Calentar una olla  • Agregar 2 cucharadas de aceite de oliva y sofreír la cebolla con   el ajo.   •  Incorporar  el  pimentón,  zanahorias,  hojas  verdes,  verduras  a    elección si se quiere, garbanzos cocidos y el aliño completo. Re -  volver unos minutos.   • Cubrir con agua, llevar a ebullición y cocinar a fuego suave por   5 minutos.   • Corregir sazón y servir con el arroz de brócoli.  Nota:  En esta receta se puede aprovechar cualquier verdura que esté   lacia,  seca  o  a  punto  de  echarse  a  perder.  También  se  puede    aprovechar resto de cerveza, vino blanco o espumante sobrante   de días anteriores y que se haya refrigerado, para incorporar en   la receta. Antes del agua, agregar ½ taza del alcohol a elección y   dejar evaporar unos minutos antes de agregar el agua. \nCocina Sustentable   |   67  \n68 |  Cocina Sustentable  ENSALADA DE CÁSCARAS DE SANDÍA Y ZANAHORIAS   5 porciones  La cáscara de sandía se puede aprovechar tanto en recetas sala -  das como dulces. Para eso solo basta pelar y retirar la capa exte -  rior, de color verde oscuro, quedando la parte de verde pálido.   Se puede confitar, usar en batidos como también en ensaladas o   salteados.  Ingredientes:  Cáscara de ½ sandía  3 zanahorias peladas  Hojas de 2 cebollines  ½ taza de maní picado  Ingredientes del aliño:  1 diente de ajo picado  ½ taza de jugo de limón  ⅓ taza de aceite de oliva  1 cucharada de aceite de sésamo  1 cucharadita de ralladura de jengibre fresco  1 cucharadita de sal o 2 cucharadas de salsa de soya  Preparación:  • En un frasco con tapa agregar todos los ingredientes. Tapar y   batir. Reservar.  • Lavar y pelar las cáscaras de sandías, retirando la capa verde   oscuro del exterior.   • Cortar en julianas o rallar las zanahorias y cáscaras de sandías.   • Picar las hojas de los cebollines.   • Agregar todas las verduras en un bowl, mezclar con el aliño y   el maní picado.   • Servir de inmediato. \n\n";

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }

            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
