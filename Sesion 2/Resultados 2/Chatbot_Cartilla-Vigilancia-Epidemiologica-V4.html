ión y tendencia   22    9.10   Indicadores   23    10   RECURSOS.   24    10.1   Talento humano   24    10.2   Recursos físicos   24    10.3   Recursos técnicos y logísticos   25    10.4   Recursos financieros   25    11   AUDITORIA Y REVISIÓN DE LA ALTA DIRECCIÓN   25    11.1   Seguimiento al plan de trabajo   25    11.2   Inspecciones de seguridad   26    11.3   Seguimiento a la mejora de las condiciones   26    11.4   Seguimiento a indicadores   26    11.5   Aplicación de seguimiento o auditoría   26    11.6   Investigación de enfermedades laborales   26    11.7   Rendición de cuentas   26    DEFINICIONES   27    REFERENCIAS BIBLIOGRÁFICAS   32    ANEXOS   34                                                                             \n               1   INTRODUCCIÓN       El presente documento es una cartilla práctica dirigida a las pequeñas y medianas empresas. Tiene   como propósito brindar herramientas   básicas   para que los responsables y dirigentes de las  mismas   comprendan  y  emprendan  las  actividades del proceso  de  Vigilancia  Epidemiológica     (VE)     dentro   del marco del SGSST. La aplicación de los conceptos y metodologías expuestas en esta cartilla se   basan  en  la  revisión  de  literatura  nacional  e  internacional  para  la  vigilancia  epidemiológica   ocupacional.       La  vigilancia  epidemiológica    hace  referencia     a     una  herramienta  de  salud  pública  utilizada  en  la   salud ocupacional, que consiste en la recolección sistemática de da tos, su análisis e interpretación   con el fin de hacer seguimiento a un evento de salu d . Dicha información se utiliza para  planear ,   implementar y evaluar los programas e intervenciones que aplican para dar solución a un problema   en  salud  ocupacional  y  medir  su  efectivid ad.          Ejemplo:  afectación  de  la  capacidad  auditiva  por   exposición a ruido.   Una empresa puede tener uno o varios sistemas de vigilancia epidemiológica,   pues a pesar de tener  objetivo y población similar, sus características pueden ser diferentes según   el fin especifico; una empresa manufacturera puede tener un Sistema de Vigilancia Epidemioógica    (SVE)   de  prevención   de  hipoacusia y otro de  prevención   de Asma ocupacional, ambos dirigidos a   la misma población trabajadora, pero con un enfoque de riesgos distintos.        El ciclo de control de la calidad, denominado PHVA (Planear, Hacer, Verificar y Actuar) asegura la   calidad  y  la  mejora  continua  de  la  Vigilancia  Epidemiológica,  cuando  se  realiza  de  manera   sistemática.  Y dicho ciclo debe partir de la valoración del riesgo que se quiere prevenir o mitigar,   esto implica conocer la magnitud de morbilidad y mortalidad generada por el riesgo, desarrollar    e   implementar un plan, hacer el seguimiento y finalmente evaluar resultados e impacto.       En el documento maestro, base de esta cartilla, los capítulos correspondientes  y equivalentes  son:       •   Planear: Planificación.    •   Hacer: Aplicación.    •   Verificar: Auditoria y revisión por la alta dirección.    •   Actuar: Mejoramiento.          2   OBJETIVOS        2.1   Objetivo General    Entregar la información básica y necesaria para que cualquier empresa indepe ndiente de su tamaño   o actividad económica pueda diseñar e implementar un Sistema de Vigilancia Epidemiológica de   acuerdo  a los riesgos ocupacionales  expresados en su población trabajadora.           2.2   Objetivo s   Específico s       •   Identificar de forma clara y sencilla los elementos que comprenden el proceso de Vigilancia   Epidemiológica ,   como guía para las empresas ;   en especial pequeñas y medianas.    •   Brindar un documento de consulta rápida ,   refiriendo a  un documento   maestro   que   soporte   más detallad amente   el proceso de Vigilancia Epidemiológica   ocupacional .    •   Aportar   y ayudar en el   conocimiento a las personas responsables de la implementación del   SGSST en las empresas ,   sobre los elementos principales de la Vigilancia  Epidemiológica ;   \n      tales   como  la  recolección  de  datos,  análisis  de  los  mismos,  toma  de  decisiones,   intervención  y  evaluación     de  peligros,  de  tal  manera     que  les  permita  hacer  trazable  la   vigilancia en la salud de los trabajadores.          3   ALCANCE       La  población  objeto  de  la  presente  cartilla,  se  enfoca    a     las  pequeñas  y  medianas  empresas  de   diferentes sectores económicos.          4   POBLACIÓN OBJETO       De  acuerdo  a  los    peligros     sobre  los  cuales  se  hará  la  Vigilancia  Epidemiológica     (VE) ,  se   establecerá la población objeto de vigilancia  en   salud . En el ejemplo de  vigilancia de los efectos   asociados con la exposición a r uido ,   la población objeto  serán los   expuestos a este  peligr o a   niveles   superiores a   85 dB ,   de acuerdo  con   la legislación vigente.          5   RESPONSABILIDADES       Si bien es claro en la legislación laboral que el empleador es el responsable del SGSST y    de  sus   elementos como la Vigilancia Epidemiológica   (VE) ,  se tienen otros niveles de responsabilidad tanto   a nivel interno como externo ,   que se interrelacionan y generan sinergia para  el mejor desarrollo de   la Vigilancia Epidemiológica   (VE) .       Como   ejemplo de las principales responsabilidades para los diferentes niveles de la organización ,   se plantea el siguiente :       Definición de roles y responsabilidades       Profesional   Responsabilidades    Gerencia   ●   Definir  roles  y  responsabilidades  involucrando  a  todos  los  niveles  de  la   organización.    ●   Revisión  periódica  de  la  implementación  de  la  VE,  evaluar  los  avances,   resultados y definición de planes de acción o ajustes.    ●   Favorecer la participación de mandos medios y trabajadores en la propuesta de   medidas de intervención y control de peligros en el lugar de trabajo.    ●   Proveer  recursos  para  alcanzar  y  mantener  un  ambiente  de  trabajo  sano  y   saludable.    ●   Tomar decisiones de tipo estratégico para garantizar los controles o proyectos   requeridos.     ●   Revisar y aprobar la matriz de peligros y validar los objetivos de control de riesgo   orientados hacia la intervención de los riesgos derivados de la exposición a los   peligros.    Encargado o  líder    vigilancia   epidemiológica    ( VE )    ●   Elaborar y someter a aprobación de la gerencia el programa anual de vigilancia   epidemiológica con:    políticas, objetivos, metodología ambiental y médica, cronograma, recursos,   costos, métodos de intervención e indicadores.    ●   Ejecutar las políticas y planes de la VE y ser responsable del cumplimiento de   los objetivos y metas de la VE.    ●   Efectuar la evaluación periódica del programa a su cargo e informar a gerencia   sobre el estado de desarrollo junto con las propuestas para mejoramiento   continuo.    Médico especialista   en Salud   Ocupacional    ●   Divulgar y acompañar a los jefes y colaboradores en aplicación de las diferentes   herramientas de caracterización y control del peligro.   \n      Profesional   Responsabilidades    ●   Documentar  y  ejecutar  la  vigilancia  médica  que  incluya  a  todos  aquellos   trabajadores que por su labor desempeñada pueden encontrarse en riesgo de   desarrollar efectos asociados a la exposición de peligros.    ●   Favorecer la divulgación de la información y capacitación de los trabajadores.    ●   Participar  en  el  seguimiento  a  indicadores,  revisiones  periódicas  de  la   implementación de la VE y en la definición de planes de acción o ajustes.    ●   Validar la implementación de los cambios que se realicen en la VE evaluando el   riesgo residual.    ●   Valorar  a  los  trabajadores  sintomáticos  para  asegurar  una  ubicación  laboral   acorde con su capacidad.    Coordinadores de   área o jefes    ●   Promover la participación de los colaboradores en la construcción de propuestas   de intervención para la mitigación de los peligros derivados de la exposición a   sustancias químicas.    ●   Conocer la VE, estrategias de intervención, metas e indicadores.    ●   Participar en las revisiones gerenciales y divulgación de resultados en todos los   niveles de la organización.    ●   Asegurar la identificación, evaluación y control del riesgo derivado de exposición   a  peligros,  acorde  con  la  política  de  prevención  del  SGSST,  priorizando  los   controles según factibilidad.    ●   Hacer seguimiento periódico a los indicadores de implementación de mejoras de   condición y comportamiento en las áreas y oficios priorizados en la VE.    ●   Participar  en  las  actividades  de  campo  y  aplicación  de  las  diferentes   herramientas de control de riesgo derivado de la exposición a peligros.    ●   Supervisar el cumplimiento de los procedimientos de trabajo seguro.    ●   Garantizar el tiempo y adecuado cumplimiento de los procesos de capacitación   y conocimiento del riesgo por parte del personal expuesto y de ellos mismos.    ●   Promover el cumplimiento de los programas de mantenimiento de las máquinas   y herramientas cuya ausencia pueda aumentar la exposición al peligro.    ●   Garantizar  la  asistencia  del  personal  expuesto  a  los  exámenes  médicos   periódicos acatando las recomendaciones que de estos se desprendan.    ●   Ser garante del cumplimiento del uso de elementos de protección personal por   parte de los operarios, especialmente con su ejemplo en el cumplimiento de las   normas.    ●   Realizar el seguimiento y reporte sobre el uso de elementos de protección, de   los operarios a su cargo, de acuerdo a los formatos definidos.    Ingeniero   Higienista   ocupacional  –    ambiental    ●   Ejecución de actividades de higiene industrial de la VE.    ●   Emitir concepto de elementos de protección que se requieren.    ●   Diseño, ejecución o supervisión de actividades de capacitación.    ●   Elaboración de informes del área de higiene industrial.    ●   Participación  en  el  análisis  de  estadísticas  y  en  la  evaluación  de  la  vigilancia   epidemiológica   (VE) .    ●   Presentación a la Gerencia de la gestión de la VE, por lo menos una vez al año.    ●   Elaboración / ejecución panorama de peligros.    ●   Desarrollo y acompañamiento de visitas de Inspección.    ●   Concepto de elementos de protección que se requieren    ●   Participación en actividades de capacitación.    Ingeniero en   Seguridad   Industrial    ●   Diseñar e implantar las propuestas de intervención relacionadas con el diseño   de los puestos de trabajo y métodos de trabajo.    ●   Participación en el diseño de la VE.    ●   Presentación a la Gerencia de la gestión de la VE, por lo menos una vez al año.    Equipo SST   ●   Advertir  a  la  gerencia  los  riesgos  y  las  necesidades  de  implementación  de   controles.    ●   Asegurar  el  cumplimiento  legal,  mediciones  ambientales  y  biológicas,   divulgación, disponibilidad de elementos de protección, sensibilización de todas   las personas involucradas.     ●   Asegurar  la  participación  de  todos  los  niveles  de  la  organización  en  la   implementación de la VE.    ●   Asegurar  la  implementación  de  los  estándares     y  procedimientos     corporativos   que mitiguen los riesgos y prevengan la aparición de enfermedades y accidentes    en los lugares de trabajo.    ●   Comunicar  en  los  diferentes  niveles  de  la  organización  los  ajustes  que  sean   necesarios  para  el  avance  de  la  VE  luego  de  las  revisiones  gerenciales   periódicas.    \n      Profesional   Responsabilidades    ●   Conocer y gestionar la mejora continua de la VE, sus herramientas, objetivos,   metas e indicadores.    ●   Mantener un sistema de registros por el tiempo que lo estime  el estándar y la   legislación del país.    ●   Participar en la revisión gerencial periódica de la implementación de la VE y en   la definición de planes de acción o ajustes al programa.    Tra e  los  exámenes  médicos   (conceptos de aptitud y diagnóstico de condiciones de salud), para evaluar posibles efectos   asociados con la exposición a los peligros.    10)   Revisar las demás entradas que apoyan la vigilancia , tales como : registros de ausentismo    de origen médico , resultados de encuestas de auto   reporte de condiciones de salud , etc .    11)   Alimentar con todas las entradas mencionadas,  el sistema de información de  la vigilancia   epidemiológica   (VE) ,   que se reflejará en los indicadores de la vigilancia .    12)   Estas actividades de vigilancia como las demás del SGSST están    enmarcadas en   el ciclo   PHVA   (Planear, Hacer, Verificar, Actuar) , es decir son transversales a toda la empresa y   sus sucursales, así como   a   los contratistas y  son permanentes .       De acuerdo al esquema de la figura   1 , usted en su empresa puede monitorear un peligro (medición   ambiental) o una condición de salud (monitoreo bilógico), siendo fundamental buscar la relación   causal peligro - efecto sobre la salud.       Figura 1. Esquema de vigilancia epidemiológica ocupacional            Nota:  Tomado de l   Manual práctico para la implementación de los estándares mínimos - Gestión de   la seguridad y salud en el trabajo 2018.         \n                                            6.3   Objetivo general y específicos   de la VE       F ormular estrategias de intervención del riesgo al peligro sujeto a vigilancia, de manera precoz y   oportuna  identificando  el  evento  nocivo  en  una  etapa  reversible  o  que  su  evolución  pueda  ser   interferida;  teniendo  en  cuenta  la  determinación  de  la  magnitud  y     distribución  del  evento,   identificando  los  grupos  por  categorías  de  riesgo  según  la  exposición,  los  elementos   condicionantes del proceso salud - enfermedad y  monitoreando  la tendencia temporal y geográfica.       Conforme  con    Rodríguez  &  Espinosa  (2007) ,  los  objetivos  deben  ser  claros,  cuantificables  y   orientados a:       •   Determinar  la  magnitud  y  distribución  del  evento  de  manera  general,  por  áreas  y   categorías de riesgo.    •   Formulación  de  estrategias  de  promoción,  prevención  y  control,  así  como evaluación   de las mismas.    •   Identificar grupos por categorías de riesgo según la exposición o factores propios de la   persona.    •   Identificar los elementos condicionantes del proceso salud - enfermedad.    •   Identificar  precozmente  el  evento  en  etapa  reversible  o  que  pueda  interferirse  su   evolución.    •   Monitorear la tendencia geográfica y temporal.       6.4   I dentificación de peligros y evaluación de riesgos       Es  importante   para su empresa que l a identificación de peligros, evaluación y valoración de riesgos   es   un proceso en el que se integr a n todos los niveles de la empresa, por ello la participación activa   de  las  áreas  operativas,  administrativas  y  directivas  permite  tener     una     mayor  claridad  sobre     la   información,   el desarrollo de las actividades y procesos de la empresa.         De  los  peligros  que  afectan  la  salud  encontramos     p eligros     químicos  (disolventes,  adhesivos,   pinturas,  polvos  tóxicos,  etc.),  riesgos  físicos  (ruido,  radiación,  calor,  etc.),  biológicos  riesgos   (enfermedades infecciosas) y factores de riesgo ergonómicos   o  biomecánicos   (levantamiento de   objetos pesados, movimientos repetitivos, vibraciones).   (OSHA,  Recommended practices for safety   & health programs , 2016).            Recuerde:     No  se  requiere  implementar  vigilancia  epidemiológica  (VE)  para   todos  los  peligros  o  condiciones  de  salud  identificados  en  la  empresa.  Es  más   importante  realizar  un  buen  proceso  de  priorización,  que  permita  optimizar  los   recursos  de  la  organización  implemen tando  controles  efectivos  sobre  las   condiciones de salud y de trabajo.         \n      Figura   2 . Identificación del peligro, evaluación y valoración de los riesgos.         Nota.    Tomado  de     Manual  práctico  para  la  implementación  de  los  estándares  mínimos.   Gestión de la seguridad y salud en el trabajo. Figura 11.                                     6.5   Vigilancia   del medio ambiente de trabajo       Uno de los pilares que queremos que usted como lector de  esta   cartilla   pueda revisar y ten e r toda   la claridad es la vigilancia en el ambiente ,  a  continuación,   los   puntos  más   relevantes  a   ten er   en   cuenta :          DIAGNÓSTICO E INTERVENCIÓN  Agentes y peligros causantes de enfermedad             1. Recolección de   información existente sobre   procesos, actividades y   peligros         2. Definir un instrumento   para la recolección de   información en campo.             3. Realizar inspecciones   para identificar peligros.         4. Identificar las medidas de   control existentes.        5. Evaluar y valorar los   riesgos.     6. Priorizar riesgos.        Recuerde:     Estos  riesgos  se  encuentran  identificados  en  la  matriz  de   identificación de peligros, evaluación y valoración de riesgos de la empresa, allí   se  contemplan  el  número  de  expuestos,  controles  en  la  fuente,  medio  y   trabajador.      \n           Nota :  adaptado de Diagnóstico integral de condiciones de salud - trabajo  Enrique Guerrero Medina.   Material docencia Universidad El Bosque y de “Health Risk Management”; Tordoir, WF; Maroni, M   and  He,  F.  Health  Surveillance  of  pesticides  workers.    Elsevier.  1994.     (Rodríguez  &  Espinosa,   2007) .          Se deben recordar los dos tipos de monitoreo:       •   Monitoreo de exposición personal:   busca vigilar el nivel de exposición de los trabajadores   al peligro y su variación a través del tiempo.    •   Monitoreo  de  áreas  de  trabajo:     busca  vigilar  el  nivel de  contaminación  de  las áreas de   trabajo con el agente en estudio y su variación a través del tiempo.       La coniosis        6.6   Evaluación subjetiva   (GES)       Los  grupos de  exposición  similar  (GES)  son     el  conjunto  de puestos  de  trabajo en  los  cuales  se   asume que tienen el mismo perfil de exposición ,   en términos de la frecuencia con que desarrollan   la  tarea  u  oficio,  los  materiales  utilizados,  los  procesos  implicados  y  en  general,  en  la  forma  de   desarrollo de la actividad.       Existen al menos dos métodos para definir estos grupos: Uno subjetivo a través de la información   obtenida  en  la  matriz  de  identificación  de  peligros,  donde  se  puede  analizar  de  acuerdo  a  la   metodología  usada,  ya  sea  por  cargos,  áreas  o  procesos ,     los  trabajadores  que  comparten  los   mismos criterios de exposición tales como el factor de riesgo, el tiempo, las tareas, etc.   \n         Lo   segundo es  a   partir de los resultados de las evaluaciones higiénicas ambientales. Una vez se   analizan  los  grupos  de  forma  subjetiva   o  cualitativa ,  estos  podrán  ser  corroborados o  ajustados   una vez se conozcan los resultados de las evaluaciones ambientales.       Con  el  resultado  de  la  valoración  de  los  peligros,  se  deben  revisar  si  los  GES  conformados   inicialmente mediante criterios cualitativos quedaron bien conformados . En caso   contrario ,   a la luz   de los resultados de las mediciones ,   se deben hacer los ajustes correspondientes ,   para asegurar   que  la  clasificación  por  niveles  de  riesgo  de  los  expuestos  sea  correcta ,  dado  que ,     son  las   mediciones  de  higiene  industrial  las  que  permiten  finalmente  conformar  los  GES  de  manera   objetiva.       6.7   Evaluación objetiva (TLV)       Threshold  Limit  Values     ( TLV )     en    inglés     o    VLP:  Valor  Límite  Permisible  VLP .    S e  define  como  la   concentración de una sustancia en el aire a la que la mayoría de los trabajadores pueden estar   expuestos  repetidamente  día  tras  día,  sin  efecto  adverso.  Los  TLV  revisados  y  publicados   anualmente  por  la  Conferencia  Americana  de  Higienistas  Industriales  Gubernamentales  de   Estados  Unidos     (ACGIH) ,  fueron  adaptados  en  el  país  por  la  Resolución  2400/79  artículo  154   Capítulo VIII del Ministerio del Trabajo y Seguridad Social, como los Valores Límites Permisibles.       Aunque  se  debe  recomendar  el  valor  permisible  que  mejor  proteja  al  trabajador,  es  necesario   recordar que la norma colombiana tiene parámetros establecidos para ruido, iluminación y agentes   químicos. Para estos últimos, Colombia adoptó los valores sugeridos   por  la  ACGIH, los cuales se   actualizan cada año. Debe  evaluarse   si es necesario ajustar los valores permisibles por jornadas   laborales  diferentes  a  8  horas  diarias  o  40  horas  semanales,  indicando  el  método  utilizado  y   registrando el Valor Limite Permisibl e (VLP) - ajustado.          7   VIGILANCIA MÉDICA       7.1   P erfil biomédico   o perfil de cargo       Es  importante  tener  en  cuenta ,     que  un  profesiograma  es  un  documento  en  el  que  se  resumen   fundamentalmente las aptitudes y capacidades que requieren los colaboradores para laborar en   cada cargo. Este documento forma parte de los procesos del área de gestión humana   y puede ser   el soporte inicial para la construcción del perfil de cargo.       La definición del p erfil biomédico o de cargo ,   bajo la óptica de l Decreto 1072 de 2015 ,   abarca la   revisión de los peligros a los cuales se expone una persona de manera potencial (examen médico   de  ingreso)  o  real  (examen  médico  periódico)  en  el  desarrollo  de  sus  labores,  identificando  el   posible efecto en la salud .       Es  de  gran  utilidad  para    el    personal  No  médico  ( Gerencia  y  recursos     human os )    dado  que    estandariza  las  pruebas  médicas  necesarias  para  la  selección,    contratación  y     el  seguimiento   médico ocupacional; igualmente es la guía de trabajo para las IPS   SO   ( Institución   prestadora de   salud     de  Salud  Ocupacional )     que  realizan  los  exámenes  ocupacionales  de  las  empresas.  Los   aspectos que se tienen en cuenta en el momento de realizar est e documento   son :       ●   Descripción de los cargos  y funciones .    ●   D escripción de actividades críticas .    ●   R evisión de mediciones ambientales .    ●   Análisis de identificación de peligros .    ●   Inventario de las  sustancias   químicas con que trabajan   o puedan trabajar .   \n                                 7.2   P roceso de Vigilancia Epidemiológica   (VE) :       ➔     Examen     médico  de  ingreso :  Permite  identificar  el  estado  general  de  salud  de  un   trabajador en proceso de vinculación a una empresa,    exposiciones laborales previas que   puedan  favorezcan  la  aparición  de   una  enfermedad  laboral   y  riesgos  de  salud,   enfermedades y condiciones crónicas que puedan verse afectadas  durante su desempeño   laboral .    ➔     Examen   médico periódico : Permite revisar la condición de salud del trabajador en relación   con la actividad desempeñada, así como posibles afectaciones por algún  peligr o presente.    ➔     Examen   médico de retiro o egreso :  Evalúa s i existe alguna evidencia de alteración de la   salud  asociada con   la actividad   laboral   desarrollada.    ➔     Examen     médico  post  incapacidad :  Después  de  una  ausencia  por  temas  médicos,  es   importante  verificar el estado  de  salud    para  establecer recomendaciones o  restricciones.    L a  determinación  para  efectuar  este  tipo  de  examen  depende  de  la  patología  y  no  del   número de días de incapacidad.    ➔     Examen   médico por cambio de cargo :  En especial si se genera exposición a diferentes   peligros es fundamental evaluar la aptitud ante el cambio .    ➔     Examen     médico  por exposición alta súbita :    Se debe  realizar  si  se  supone   una  mayor   exposición a un  peligr o.                                     El  siguiente  cuadro     es  una  guía  para  que  usted     r e lacione     las  principales  descripciones  de  las   pruebas   asociadas   que pueden hacer parte del   perfil  b iomédico   o perfil de cargo:      VALORACIÓN   REQUERIDA   DESCRIPCIÓN    ÉNFASIS    En el  examen   Médico Ocupacional el énfasis se refiere a que además de la evaluación Médica   completa, al momento de la evaluación el Médico se detiene a revisar con mayor profundidad los   sistemas sugeridos según su posibilidad de afectación por la exposición a riesgos  tanto por   enfermedad laboral o por accidente de trabajo. De esta forma se determina la aptitud del   trabajador para desempeñar en forma eficiente las labores sin perjuicio de su salud o la de   terceros, comparando las demandas del oficio para el cual s e desea contratar con sus   capacidades físicas y mentales.  Además,   se establece la existencia de restricciones que ameriten   alguna condición sujeta a modificación e identificar condiciones de salud que estando presentes   en el trabajador, puedan agravarse en desarrollo del trabajo.    PRUEBAS   COMPLEMENTARIAS    Conjunto de exámenes específicos de acuerdo a los factores de riesgo, que ayudan a la   detección temprana de las alteraciones de salud, contribuyendo a la precisión del diagnóstico y al   seguimiento    ÉNFASIS   DERMATOLOGICO    Involucra el registro y análisis de las condiciones individuales de un trabajador, antecedentes   médicos, antecedentes   ocupacionales, síntomas. En el examen se identifica el Fototipo, color,   variaciones locales y textura de la piel.        Tenga en cuenta : usted  puede tener un  archivo en   Excel donde  se  incluye n    los datos  anteriormente   mencionados   para   que   el medico de salud ocupacional   y/o medicina laboral  pueda construir  el perfil  biomédico   o perfil de cargo.                  Tenga  en  cuenta :  Asegurar  los  criterios  mínimos  de  cumplimiento  a  nivel   documental  y  a  nivel  de  competencias  de  la  IPS  que  realiza  sus  exámenes   ocupacionales  para  su  empresa  y  obtener  elementos  clave  para  la  Vigilancia   Epidemiológica, como el diagnostico de condiciones d e salud.   \n      VALORACIÓN   REQUERIDA   DESCRIPCIÓN    ÉNFASIS RESPIRATORIO    Se evalúan e identifican condiciones como antecedentes médicos, simetría, frecuencia   respiratoria, ruidos pulmonares, ventilación pulmonar, se indaga sobre síntomas referidos (tos,   disnea, flemas) y Hábitos como tabaquismo. Se complementa con la Espirometr ía.    ÉNFASIS   OSTEOMUSCULAR    Identifica antecedentes médicos, hábitos, actividades extralaborales, antecedentes   ocupacionales, presencia de síntomas osteomusculares y neurológicos, mecanismo de la lesión   evaluada, descripción de los síntomas y compromiso funcional actual.       En el examen físico se incluye la evaluación de la postura en términos de tono y balance   muscular, curvas fisiológicas, presencia de desviaciones y asimetrías, marcha, evaluación   osteomuscular y neurológica del cuello, la espalda superior y las extremidade s superiores con   examen de arcos de movimiento activos y pasivos de miembros superiores. También se   realizarán pruebas específicas para Desórdenes osteomusculares .         Se deben buscar signos de otras enfermedades asociadas de acuerdo con el interrogatorio como   deformidades en manos por subluxaciones o nódulos (artrosis y artritis), inflamaciones articulares   con dolor identificando los grupos de articulaciones involucrado s y la simetría en la afectación,   alteraciones vasculares periféricas, entre otros. Adicionalmente se debe tener en cuenta la   evaluación de la integridad neurológica mediante la evaluación de fuerza, sensibilidad, reflejos   osteotendinosos y de signos patol ógicos específicos de acuerdo con la sospecha diagnóstica.          ÉNFASIS   NEUROLÓGICO ,   SISTEMA NERVIOSO   CENTRAL Y PERIFERICO    Involucra el registro y análisis de las condiciones individuales de un trabajador incluyendo   antecedentes médicos, antecedentes ocupacionales, presencia de síntomas  neurológicos,   descripción   de los síntomas y compromiso funcional. En el examen físico se incluye el Estado   Mental (nivel de conciencia, orientación, lenguaje, memoria ), Sistema   motor (coordinación,   marcha, reflejos), pruebas laberínticas. , se pueden presentar  cuestionarios   metodológicamente   diseñados para poder identificar alguna exposición espe cifica como puede ser químicos, los   cuales son de gran utilidad en la búsqueda de signos y síntomas que  pudieran   tener   relación con   la exposición o  intoxicación .    PRUEBAS   PSICOSENSOMÉTRICAS    Es la evaluación de la capacidad SENSOMETRICA (Sentidos), esto es ojos y oídos y la   capacidad PSICOMOTRIZ, esto es la coordinación que se tiene entre la audición y la visión con   los miembros superiores e inferiores (brazos y pies). Es la coordinación entre   lo que el individuo   decide mentalmente hacer y la posibilidad real de efectuar las acciones en tiempo y forma, es   decir con la velocidad y precisión adecuadas.    ESPIROMETRÍA    La Espirometría es el análisis, bajo circunstancias controladas, de la magnitud absoluta de las   capacidades pulmonares y los volúmenes pulmonares y la rapidez con que éstos pueden ser   movilizados (flujos aéreos).  Permite determinar el estado de salud en q ue se encuentra el   trabajador, identificando aquellos que presenten alteraciones, con el fin de tomar las medidas   correctivas y preventivas de acuerdo a cada caso. Información adicional respecto al  examen   se   involucra  la   vigilancia epidemiológica   (VE) .    AUDIOMETRÍA    La Audiometría es la medición de la sensibilidad auditiva de un individuo mediante el registro del   umbral de percepción de tonos puros, tiene por objeto cifrar las alteraciones de la audición en   relación con los estímulos acústicos, resultados que se anota n en un gráfico denominado   audiograma. La audiometría se lleva a cabo evaluando la vía aérea que determina la capacidad   para detectar sonidos presentados y transmitidos a través del aire, en concreto a través de unos   auriculares.  Se adiciona el registro d e la vía ósea si las frecuencias de 500  –   1000  –   2000 o 3000   tiene caídas de 15 dB o más. Información adicional respecto al  examen   se involucra  la   vigilancia   epidemiológica   (VE) .    RADIOGRAFIA DE   TORAX CON LECTURA   ILO    Representación radiográfica del tórax que evidencia estructuras    anatómicas como Pulmón; Corazón; Grandes Vasos; Parrilla Costal; Diafragmas; y    estructuras óseas del esqueleto.    Al utilizar la clasificación OIT de toma y lectura de imágenes radiológicas para neumoconiosis,    se deben tener en cuenta las siguientes premisas:    a. No existe una imagen radiológica patognomónica de la patología por exposición a polvo,    pudiendo encontrarse otras enfermedades pulmonares similares en la radiografía.    b. La calidad de la radiografía de tórax tiene un marcado impacto en la imagen radiológica    de las lesiones neumoconióticas. Una imagen de buena calidad se relaciona    directamente con un adecuado diagnóstico, clasificación y calificación, y    c. Una adecuada calidad en la utilización de la clasificación OIT facilita la evaluación y el    seguimiento de poblaciones expuestas.    TÉCNICA DE CLASIFICACIÓN DE LA ORGANIZACIÓN INTERNACIONAL DEL TRABAJO    La revisión desarrollada durante el año 2011 de la clasificación OIT para la lectura de imágenes    radiológicas en neumoconiosis por sílice no presenta cambios en relación a lo publicado en    años anteriores. Se mantiene:    · La identificación de la calidad.    · La descripción de anormalidades del parénquima pulmonar: pequeñas y grandes.    · La observación anormalidades pleurales.    · El registro de otras anormalidades de la placa no relacionadas con neumoconiosis,    mediante la utilización de simbología OIT.    La correcta utilización de la clasificación OIT se expone claramente en el punto 3 y 4 de la Guía    OIT disponible en el siguiente link:    http://www.ilo.org/safework/info/publications/WCMS_168260/lang -- en/index.htm    OPTOMETRÍA    Es un examen que busca dar una impresión diagnóstica oportuna e indicar una  conducta   apropiada en cada caso (corrección óptica, cambio de fórmula, tratamiento ortóptico, valoración   por oftalmología); determinar si el estado visual del trabajador está acor de con los requerimiento   visuales del puesto de trabajo y con los riesgos ocupacionales a los que está expuesto, dando   recomendaciones al paciente para el logro del confort visual y la higiene visual en su puesto de   trabajo   \n      VALORACIÓN   REQUERIDA   DESCRIPCIÓN    MANIPULADOR DE   ALIMENTOS    Es un examen médico general haciendo énfasis en diagnóstico del sintomático respiratorio y del   sintomático de piel, asì como:    Coprológico   seriado: Este examen se fundamenta en la observación directa al microscopio y   realiza el análisis organoléptico o físico, el análisis químico y parasitológico de la deposición el   cual permite detectar infecciones por parásitos intestinales o de órganos aj enos es decir que   revela parasitismos localizados en órganos y sistemas muy alejados del intestino, siempre que los   parásitos productores de los mismos empleen la vía fecal del huésped para eliminar los   elementos que le sirven para su diseminaci ón en el medio ambiente.    KOH en uñas: Diagnóstico de las infecciones  por hongos   superficiales.    Frotis de garganta: Identificar la etiología del germen para determinar si es causante de una   enfermedad infecciosa por medio del aislamiento e identificación del mismo o si forma parte de la   flora comensal normal.             7.3   Biomarcadores       Los indicadores biológicos o biomarcadores hacen referencia a la revisión del estado de salud  del   trabajador  a través de evaluaciones o exámenes   de laboratorio ( ej emplo :   parcial   de orina ,   c
