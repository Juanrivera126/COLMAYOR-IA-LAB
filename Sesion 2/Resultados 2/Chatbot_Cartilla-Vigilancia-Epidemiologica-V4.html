 aplica)  evaluado   sin cambios, ni tendencias       Sigue siendo parte de la población objeto de   Vigilancia Epidemiológica, se mantienen los   controles establecidos, y se revisan periódicamente   los resultados de inspecciones, estudios,   investigaciones para la toma de acciones   correctivas y preventivas.    -     Continuar  con  seguimiento  médico  siguiendo  los   criterios establecidos    ·   Capacitación  permanente  sobre  los  peligros   presentes  en  las  áreas  de  trabajo  y  procesos   desarrollados.    ·  Supervisión por parte del Profesional de seguridad   y salud en el trabajo, frente al uso de los elementos   de protección personal y complementarios.    SOSPECHOSO    Individuo susceptible que presenta algunos   síntomas o signos o pruebas de indicadores   biológicos de exposición compatibles con el   evento de vigilancia. Este es el mismo caso   llamado “centinela” que indica que existe una   alteración de salud y puede tener re lación con   los factores de riesgo.    Seguimiento al estado de salud, realización de   exámenes complementarios para confirmar o   descartar, revisión lugar o puesto de trabajo para la   toma de acciones correctivas y preventivas.    Determinar posibilidad de reubicación del trabajador   si es necesario    ·       Remitir al trabajador si es necesario a la EPS,   para seguimiento médico.    ·       Continuar con seguimiento médico siguiendo los   criterios establecidos.    ·              Capacitación  permanente  sobre  los  peligros   presentes  en  las  áreas  de  trabajo  y  procesos   desarrollados.    ·              Supervisión  por  parte  del  Profesional  de   seguridad y salud en el trabajo, frente al uso de los   elementos  de  protección  personal  y   complementarios.    CONFIRMADO    Caso cuyo diagnóstico se corrobora por medio   de estudios auxiliares, o aquel que no requiere   estudios auxiliares, pero presenta signos o   síntomas propios del peligro bajo vigilancia, o   aquel que presente evidencia de asociación   epidemiológica con algún cas o confirmado por   laboratorio. Puede existir o no la calificación de   origen laboral.    Cambios en las dosimetrías (cuando  aplica) que   superen los límites descritos de dosis reciente y   acumulada.    ·       Diagnóstico de enfermedad (de acuerdo a la   tabla de enfermedades descrita en la Resolución   1477  de  2015),  o  alteración  evidente  en  el   examen médico relacionado con alta probabilidad   de ser por exposición al factor de riesgo objeto de   la vigilancia  epidemiológica .    Investigación de posible ÉL, toma de acciones   correctivas y  preventivas, notificación   de posible   caso a ARL, seguimiento a través de las entidades   de seguridad social.    ·       Reubicación inmediata del trabajador.    ·       Remitir a la EPS del trabajador para que trate el   caso  y  defina  el  origen de  la afección,  con  el  fin  de   definir qué entidad del sistema general de seguridad   social  asumirá  el  costo  de  las  prestaciones   económicas y asistenciales que tengan lugar.    ·       Reportar Enfermedad laboral a la ARL.    ·       Seguir las indicaciones dada por la ARL para el   tratamiento  y  seguimiento  del  trabajador  (protocolo   interno de cada ARL).·   Continuar asistencia médica.            \n                           8   MEDIDAS DE PREVENCIÓN Y CONTROL ANTE LA EXPOSICIÓN        8.1   Aplicación de estrategia de orden, aseo y mantenimiento       Independiente de la categoría de riesgo de los GES, el mejoramiento del orden, la limpieza y el   mantenimiento  de  los  lugares  o  puestos  de  trabajo,  de  máquinas,  equipos  y  herramientas,  son   acciones  bastante  eficientes en el mejoramiento de  las  condiciones  d e  trabajo  asociadas  con  la   condición  de  riesgo,  por  tanto  se  recomienda  sean  aplicadas  transversalmente  en  la  empresa,   independientemente  del  grado  de  desarrollo  del  sistema  de  gestión  de  SST,  éstas  acciones  no   deben postergarse en su implementación y en s u sostenimiento a través del tiempo.       De acuerdo al Decreto 1072 de 2015 en su    Artículo 2.2.4.6.24. Medidas de prevención y control.   Las  medidas  de  prevención  y  control  deben  adoptarse  con  base  en  el  análisis  de  pertinencia,   teniendo en cuenta el siguiente esquema de jerarquización:          Figura 2.  Jerarquización de controles      Basado en el modelo NIOSH,  Hierarchy of controls.       8.2   Gestión del cambio       La Empresa debe definir y aplicar un protocolo o procedimiento que permita evaluar la incidencia   o impacto que sobre la seguridad y salud en el trabajo puedan producir cambios que se generen   al  interior  de  la  empresa  tanto  en  infraestructura,  procesos,  mat erias  primas,  entre  otros;  que   puedan modificar las condiciones de exposición al peligro. También deben considerarse cambios   externos asociados a la normatividad vigente, a indicaciones técnicas para el monitoreo ambiental   y biológico.       Para  esto  se  debe  realizar  la  identificación  de  peligros  y  la  evaluación  de  riesgos,  que  puedan   originarse  a  causa  de  los  cambios.  Además,  debe adoptar  las  medidas  de  prevención  y  control   RECUERDE:   El seguimiento de casos es una herramienta fundamental para tener control   de lo que esta  ocurriendo   en la vigilancia  epidemiológica   (VE) ,  identificando   de manera precoz   alguna alteración en la s   condiciones de salud que se pueda corregir o mejorar . S iempre   debe   haber constancia escrita de   las notificaciones  hechas  al trabajador.      \n      antes  de  implementarlas  con  el  apoyo  del  comité  paritario  o  vigía  de  Seguridad  y  Salud  en  el   Trabajo. Del mismo modo, se debe actualizar el plan de trabajo anual en seguridad y salud en el   trabajo  (Ministerio del trabajo, 2015) .       8.3   Seguimiento a contratistas       La gestión de los riesgos en los contratistas es fundamental para el Sistema De Gestión Integral   De La Seguridad y Salud en el Trabajo. El término “partes interesadas” se refiere a cualquier   empresa o persona que, de una u otra forma, se podría ver afectad a por los riesgos propios del   negocio y que tendr á́     que interactuar con la organización para generar controles y defensas ante   el  riesgo  y  evitar  as í́     que  este  riesgo  se  materialice  en  una  pérdida.  La  implementación  de  un   manual de contratistas con todos s us componentes facilita que estos, se ajusten a los objetivos y   actividades definidos en la Vigilancia Epidemiológica.       La empresa debe proporcionar condiciones seguras de trabajo para sus contratistas y las áreas   donde  estos  se  desempeñan deben  incluirse en la  definición  de  las  prioridades  con  los  mismos   criterios que el resto de áreas u oficios.       8.4   Necesidades de formación y entrenamiento       La educación está llamada a generar el desarrollo humano de sus integrantes, el desarrollo de los   procesos de aprendizaje y el desarrollo de la comunidad. En su acción se combinan los criterios   empresariales,  de  producción  y  competitividad,  con  los  criteri os  que  se  orientan  a  producir   transformaciones concretas y evaluables en procesos sociales, pedagógicos y organizacionales.   En  una  palabra,  convierte  su  visión  y  sus  propósitos  en  resultados  palpables  (Ministerio  de   Educación Nacional, 2008).       Los programas de capacitación deben involucrarse en el plan anual de capacitación de la empresa,   con el fin de establecer temáticas enfocadas a la prevención y control de los riesgos identificados,   de acuerdo a su Sistema de Gestión de la seguridad y salud   en el trabajo  -   SGSST.       Los temas de formación sugeridos para vigilancia epidemiológica son:       ●   Identificación de peligros asociados con la exposición al riesgo.     ●   Sensibilización  en  el  uso  de  maquinaria  y  equipos,  herramientas  manuales,   mantenimientos.    ●   Reporte de condiciones inseguras, accidentes de trabajo.    ●   Factores desencadenantes de enfermedad laboral de acuerdo a la actividad.    ●   Elementos de protección personal.                                    RECUERDE:  Cada  actividad  de  formación  debe  ser  evaluada  con  un   mínimo  de  preguntas,  con  el  fin  de  evidenciar  la  comprensión  de  la   información recibida.   \n      9   PROPUESTAS  PARA  LA  RECOLECCIÓN  Y  CONSOLIDACIÓN  DE  LA   INFORMACIÓN       9.1   Estrategias para la recolección de la información       Según Rodríguez & Espinosa (2007), se debe establecer un plan de trabajo para el manejo de la   información,  considerando  la  preparación,  periodicidad  en  la  recolección,  tipo  de  instrumentos,   base de datos, transferencia, etc. El plan puede ahorrar tiempo, a segurar el control de la calidad   de la información y garantizar la precisión, eficiencia y validez de los datos.       Según  el  Decreto   1072 del año 2015, se deben conservar por 20 años los resultados de mediciones   y  monitoreo  de  ambientes  de  trabajo,  conceptos  de  los  exámenes  médicos  y  diagnósticos   generales de condiciones de salud.       9.2   Base de datos       Puede haber diversas formas para la recolección de la información en un medio electrónico. Sin   importar  cuál  sea  el  método utilizado para obtener la  información  de manera electrónica  para  el   almacenamiento de la información, se debe generar una base de dat os que habitualmente para un   manejo más fácil se establece en Excel.       9.3   Validación del dato       Se debe asegurar que el resultado obtenido corresponda al fenómeno real y no a otro. Para ello,   se pueden tener varios mecanismos: apariencia, contenido, criterio y constructo.       9.4   Validez de apariencia       Es  la  evaluación  del  instrumento  por  expertos  que  dicen  si  en  su  concepto  el  instrumento  en   apariencia mide las cualidades deseadas.       9.5   Validez de contenido       Es  evaluar  por  expertos  también  si  el  instrumento  explora  todas  las  dimensiones  o  dominios   pertinentes al concepto en estudio.       9.6   Validez de criterio       Es cuando existe un patrón de oro y el instrumento evaluado produce resultados que concuerden   con dicho patrón.       9.7   Validez de constructo       Es  cuando no  existe  un  patrón  de  oro,  se utilizan modelos,  teorías  que  requieren un  constructo   para explicar las relaciones entre los factores estudiados.       9.8   Fuentes de información       Es necesario disponer de diferentes fuentes de información, entre las cuales se incluyen:       ●   Primarias:   los registros propios del evento a vigilar. Por ejemplo: Formato Único de Reporte   de Accidente laboral (FURAL), Formato Único de Reporte de Enfermedad Laboral (FUREL),  \n      panorama  de  peligros,  análisis  de  puestos  de  trabajo,  historias  clínicas  o  formatos   diseñados para la vigilancia del ambiente o del evento.    ●   Secundarias:     registros  que  pueden  suministrar  información  en  forma  no  directa.  Por   ejemplo:  exámenes  médicos  de  ingreso  o  periódicos,  ausentismo,  visitas  de  inspección,   suministro de elementos de protección personal, actividades de capacitación, seguimiento   e investig ación de accidentes de trabajo, entre otros.       Lo mencionado se retrata en la Figura  3 .        Figura  3 .  Procesos de vigilancia en salud laboral           Nota.   T omado de Work and health country profiles. Country profiles and national surveillance indicators in   occupational health and safety, Rantanen et al., 2001.          9.9   Análisis de la información y tendencia       Todos  los  resultados  de  las  acciones  de  vigilancia  de  la  salud  deben  ser  manejados  tanto  de   manera individual como colectiva. Esta documentación es insumo necesario para la planificación   de intervenciones, el establecimiento de prioridades y para facilitar   el estudio de posibles relaciones   causa - efecto ante la exposición a peligros.       Los estudios epidemiológicos sobre las causas de ausencias por enfermedad y el seguimiento de   los diagnósticos de condiciones de salud deben documentarse. Se deben considerar otras fuentes   de información, por ejemplo, registros de incidentes/accidentes.       El análisis debe contener como mínimo lo siguiente:       ●   Análisis de datos univariados, bivariado y multivariado teniendo en cuenta las variables de   los  formatos  de  recolección  y  de  los  puestos  de  trabajo.  Por  ejemplo,  existen  variables   sociodemográficas  (edad,  sexo)  y  ocupacionales  (ocupación,  tipo  de  vinculaci ón,   antigüedad en el oficio, fecha de ingreso a la empresa, intensidad de la exposición) que son   casi necesarias para cualquier programa.     ●   Análisis de los datos de los puestos y peligros.    ●   Determinar el  cálculo de  frecuencias, razones,  medidas  de  tendencia  central,  estimación   de  indicadores  tales  como  tasas  de  incidencia,  tasas  crudas  y específicas  (sexo,  grupos   etéreos, ocupación, áreas o categorías de riesgo, entre otros).    ●   Establecer  la  periodicidad  del  análisis:  una  vez  establecida  la  vigilancia  epidemiológica,   determinar  la  periodicidad  en  que  se  debe  realizar el  análisis  de  las  diversas  fuentes de  \n      información. Aunque depende del evento a vigilar o del peligro, se recomienda por lo menos   realizar este análisis cada 6 meses.    ●   Igualmente, se realizarán tablas y gráficos, según variables de interés.       Cada vez que se realice el análisis de los puestos de trabajo o por lo menos una vez al año, se   debe hacer una actualización con las respectivas intervenciones y medidas de control efectuadas.       9.10   Indicadores       Los  indicadores  deben  tener  como  referencia  básica  las  variables  de  tiempo  y  lugar.  El  tiempo   podrá ser anual, trimestral, mensual, etc., permitiendo observar la evolución y tendencia. El lugar   podrá  ser  una  empresa  concreta,  una  sección  de  la  empresa,  un  colectivo  específico  de   trabajadores o un servicio de prevención. (Urbaneja Arrúe et al., 2015)       Conforme con el Decreto 1072 de 2015 Capítulo III Artículo 19 (Ministerio del Trabajo, 2015), cada   indicador debe contar con una ficha técnica que contenga las siguientes variables:       ●   Definición del indicador.     ●   Interpretación del indicador.     ●   Límite  para  el  indicador  o  valor  a  partir  del  cual  se  considera  que  cumple  o  no  con  el   resultado esperado.    ●   Método de cálculo.    ●   Fuente de la información para el cálculo.    ●   Periodicidad del reporte.    ●   Personas que deben conocer el resultado.       A    continuación,     se  plantea  un  ejemplo  de  indicadores     que     pueden  ser    d e    gran     utilidad  para  la   vigilancia  epidemiológica   (VE) de las empresas , teniendo en cuenta que sean:       •   Indicadores de e structura    •   Indicadores de p roceso    •   Indicadores de r esultado           \n      Estos  indicadores  se  pueden  llevar  a  una  tabla  en  la  que  se  añadan  el  resultado  de  dos  años    consecutivos     y  la  proyección  de  meta  para  el  siguiente,  así  como  la  unidad  de  medida  y  las   personas que deben conocer el resultado . Ver ejemplo en Anexo 2.       10   RECURSOS.        10.1   Talento humano        A propósito del equipo humano, en Rodríguez & Espinosa (2007) se menciona que se recomienda   sea conformado de acuerdo con las necesidades técnicas específicas de la empresa, involucrando   a los trabajadores de todos los niveles, pues son ellos los que más c onocen las circunstancias de   la  exposición  y  al  ser  partícipes  de  las  soluciones  se  comprometen  con  el  mantenimiento  de  la   eficiencia de los controles en el tiempo.       En términos generales y como ejemplo:       Médico ocupacional   P ara  la  realización  de  las  evaluaciones  ocupacionales   descritas.    Higienista industrial    P ara realizar las evaluaciones de higiene industrial y diseñar   e implementar las medidas de control sobre el agente, objeto   de vigilancia. Para las actividades de trabajo de campo puede   requerirse  además  un  tecnólogo,  el  cual  siempre  deberá   estar bajo la su pervisión del higienista industrial.    Seguridad industrial    P rofesional  que  realice  las  actividades  respectivas  si  la  VE   las  requiere.  Puede  ser  necesario  un  especialista  o  un   tecnólogo, o ambos.    Profesional entrenado/certificado   para pruebas específicas    P or ejemplo, si el programa es de conservación de la audición   se  requiere  de  un  profesional  que  realice  las  audiometrías   (cumpliendo  los  criterios  de  calidad);  si  es  un  programa  de   protección  respiratoria  se  requiere  de  otro  profesional  que   realice  las  espi rometrías;  si  el  programa  es  para  patología   osteomuscular,  se  requiere  de  una  fisioterapeuta  con   especialización  en  salud  ocupacional  o  ergonomía  para   realizar la evaluación e intervención de los puestos de trabajo   y  para  implementar  las  actividades  de  in tervención  en  el   trabajador  (programa  de  acondicionamiento  físico  y  el   programa de capacitación).    Profesional “no calificado”   P ara el registro y manejo administrativo de la información.       Para los procesos de capacitación   profesional con experiencia en el evento o agente objeto de la VE.             10.2   Recursos físicos        De acuerdo a Rodríguez & Espinosa (2007), se identifica:       ●   Área  física,  con  buena  iluminación  para  actividades  específicas  que  requieren  el   acompañamiento  de  un  número  importante  de  empleados  (Ej.:  diligenciamiento  de  una   encuesta, capacitación).    ●   En  algunas  empresas  las  actividades  de  educación  y  capacitación  deben  realizarse   preferiblemente en el mismo lugar de trabajo, teniendo en cuenta grupos pequeños para   compartir conceptos y prácticas sobre un tema en particular.    ●   Espacio  físico  designado  para  el  desarrollo  de  actividades  (consultorio  /  oficina  /sala  de   capacitación / sala para toma de pruebas de laboratorio o similares).         \n      10.3   Recursos técnicos y logísticos       La empresa debe asegurar que los equipos a utilizar en la vigilancia ambiental y médica de cada   VE, sean estos propios o por outsourcing, deben cumplir con los parámetros mínimos de calidad,   de calibración y de tecnología para cumplir con los objetivos de    la vigilancia y exactitud del dato   (Rodríguez & Espinosa, 2007). Algunos ejemplos son:       ●   Computador para manejo y seguimiento de registros del sistema.    ●   Elementos  básicos  para  capacitación:  video  beam,  retroproyector,  proyector  de   diapositivas, otros.    ●   Elementos  para  guardar  los  equipos  y  herramientas  manuales  de  trabajo.  No  me  queda   claro esto como recurso técnico.    ●   Elementos preventivos de seguridad (señalización, avisos de peligro, etc.).    ●   Equipos de higiene industrial, específicos para la VE.    ●   Equipos para la vigilancia médica.    ●   Laboratorios para análisis de muestras de aire o biológicas.    ●   Registros para el levantamiento de la información (peligros, ocurrencia de un accidente de   trabajo, cuestionario de síntomas específicos, historias clínicas y ocupacionales).    ●   Software para el registro y análisis de la información.     ●   Stocks disponibles de elementos de protección personal tanto para uso rutinario como para   la atención de emergencias.          10.4   Recursos financieros       Se  recomienda  que  los  recursos  financieros  se  analicen  no  sólo  en  términos  de  la  inversión   económica requerida para la implementación y mantenimiento de los sistemas, sino desde el punto   de  vista  del  impacto  sobre  la productividad  y  el beneficio  económico    y  social  que  se  traduce  en   días  de  vida  saludable,  reintegro  oportuno,  disminución  del  ausentismo,  o  reubicaciones,  entre   otros.       La  empresa  debe  destinar  un  rubro  que  permita  la  cobertura  y  ejecución  de  las  actividades  del   programa y asegure su continuidad en el tiempo. Se debe disponer de una partida para cubrir el   funcionamiento de rutina y para casos de emergencia, teniendo en co nsideración como mínimo las   exigencias legales y los riesgos asociados a los peligros.          11   AUDITORIA Y REVISIÓN DE LA ALTA DIRECCIÓN       11.1   Seguimiento al plan de trabajo       Periódicamente deberá hacerse seguimiento al plan de trabajo establecido, buscando identificar   fortalezas en el proceso que puedan potenciar diferentes componentes de este sistema y de otros   que  se  estén  desarrollando.  Igualmente  deberán  identificarse  opor tunidades  generalmente   expresadas  en  el  cumplimiento  de  la  programación  o  en  las  coberturas  esperadas  para  las   diferentes actividades.       De  acuerdo  con  esto  se  realizarán  los  ajustes  que  se  requieran  en  la  programación  o  se   implementarán  actividades  adicionales  de  sensibilización  que  promueva  la  participación  en  el   proceso.       Es  importante  recalcar  que  los  planes  de  trabajo  no  son  estáticos  y  que  cuando  se  requiera   deberían poderse ajustar.   \n         11.2   Inspecciones de seguridad       En un sistema de gestión en un estado avanzado de evolución, las inspecciones de seguridad son   herramientas valiosas no solo para la identificación de nuevos peligros, sino para el seguimiento a   las mejoras definidas dentro de la gestión de este sistema. E s importante que dentro de ellas se   involucren aspectos de higiene industrial y que quienes las realizan cuenten con conceptos básicos   en control ambiental.       11.3   Seguimiento a la mejora de las condiciones       El seguimiento a las mejoras tiene dos enfoques dentro del sistema. El primero se enfoca en el   cumplimiento del plan propuesto, el cual se logra a través del seguimiento al plan de trabajo. El   segundo aspecto, es el análisis constante del impacto de la mej ora.       11.4   Seguimiento a indicadores       El seguimiento a los indicadores se realiza de acuerdo con la dinámica de cada uno de ellos.       11.5   Aplicación de seguimiento o auditoría       La evaluación de la gestión general del sistema, realizada anualmente, permite calificar el avance   y reorientar los planes de acción si se requiere.       11.6   Investigación de enfermedades laborales       La investigación de las causas de los incidentes, accidentes de trabajo y enfermedades laborales,   debe adelantarse acorde con lo establecido en el Decreto 1530 de 1996, la Resolución    1401  de   2007  expedida por el entonces Ministerio de la Protección Social, hoy Ministerio del Trabajo, y las   disposiciones que los modifiquen, adicionen o sustituyan (Ministerio del trabajo, 2015).       El resultado de esta investigación, debe permitir entre otras, las siguientes acciones:       1.   Alimentar  el  proceso  de  revisión  que  haga  la  alta  dirección  de  la  gestión  en  seguridad  y   salud el trabajo y que se consideren también en las acciones de mejora continua.    2.   Identificar y documentar las deficiencias del Sistema de Gestión de la Seguridad y Salud   en el Trabajo SG - SST lo cual debe ser el soporte para la implementación de las acciones   preventivas, correctivas y de mejora necesarias;     3.   informar a la alta dirección sobre el ausentismo laboral por incidentes, accidentes de trabajo   y enfermedades laborales; y     4.   Informar de sus resultados a los trabajadores directamente relacionados con sus causas o   con  sus  controles,  para  que  participen  activamente  en  el  desarrollo  de  las  acciones   preventivas, correctivas y de mejora;       11.7   Rendición de cuentas       El  equipo  de  implementación  del  Sistema  de  Seguridad  y  Salud  en  el  Trabajo,  establecerá  un   informe que entregue información precisa sobre el avance en el proceso de implementación de la   Vigilancia Epidemiológica y definición de indicadores que permitan eva luar la eficacia del sistema   en un tiempo prudencial de acuerdo con el tipo de peligro a vigilar.           \n      D EFINICIONES       •   Acción correctiva:  Acción tomada para eliminar la causa de una no conformidad detectada   u otra situación no deseable.    •   Acción de mejora:   Acción de optimización del Sistema de Gestión de la Seguridad y Salud   en  el  Trabajo  (SG - SST),  para  lograr  mejoras  en  el  desempeño  de  la  organización  en  la   seguridad y la salud en el trabajo de forma coherente con su política.    •   Acción preventiva:   Acción para eliminar o mitigar la(s) causa(s) de una no conformidad   potencial u otra situación potencial no deseable.    •   Actividad  no  rutinaria:     Actividad  que  no  forma  parte  de  la  operación  normal  de  la   organización o actividad que la organización ha determinado como no rutinaria por su baja   frecuencia de ejecución.    •   Actividad rutinaria:   Actividad que forma parte de la operación normal de la organización,   se ha planificado y es estandarizable.    •   Alta dirección:   Persona o grupo de personas que dirigen y controlan una empresa.    •   Amenaza:   Peligro latente de que un evento físico de origen natural, o causado, o inducido   por la acción humana de manera accidental, se presente con una severidad suficiente para   causar pérdida de vidas, lesiones u otros impactos en la salud, así como también daño s y   pérdidas en los bienes, la infraestructura, los medios de sustento, la prestación de servicios   y los recursos ambientales.    •   Auto reporte de condiciones de trabajo y salud:   Proceso mediante el cual el trabajador   o  contratista  reporta  por  escrito  al  empleador  o  contratante  las  condiciones  adversas  de   seguridad y salud que identifica en su lugar de trabajo.    •   Centro  de  trabajo:     Se  entiende  por  Centro  de  Trabajo  a  toda  edificación  o  área  a  cielo   abierto destinada a una actividad económica en una empresa determinada.    •   Ciclo  PHVA:     Procedimiento  lógico  y  por  etapas  que  permite  el  mejoramiento  continuo  a   través de los siguientes pasos:    o   Planificar:   Se debe planificar la forma de mejorar la seguridad y salud de los trabaja   dores,  encontrando  qué  cosas  se  están  haciendo  incorrectamente  o  se  pueden   mejorar y determinando ideas para solucionar esos problemas.    o   Hacer:   Implementación de las medidas planificadas.    o   Verificar:   Revisar  que  los  procedimientos  y  acciones  implementados  están   consiguiendo los resultados deseados.    o   Actuar:     Realizar  acciones  de  mejora  para  obtener  los  mayores  beneficios  en  la   seguridad y salud de los trabajadores.    •   Condiciones de salud:   El conjunto de variables objetivas y de auto reporte de condiciones   fisiológicas, psicológicas y socioculturales que determinan el perfil sociodemográfico y de   morbilidad de la población trabajadora.    •   Condiciones y medio ambiente de trabajo:   Aquellos elementos, agentes o factores que   tienen influencia significativa en la generación de riesgos para la seguridad y salud de los   trabajadores quedan específicamente incluidos en esta definición, entre otros:    o   Las  características  generales  de  los  locales,  instalaciones,  máquinas,  equipos,   herramientas, materias primas, productos y demás útiles existentes en el lugar de   trabajo.    o   Los  agentes  físicos,  químicos  y  biológicos  presentes  en  el  ambiente  de  trabajo  y   sus correspondientes intensidades, concentraciones o niveles de presencia.    o   Los procedimientos para la utilización de los agentes citados en el apartado anterior,   que influyan en la generación de riesgos para los trabajadores y;     o   La organización y ordenamiento de las labores, incluidos los factores ergonómicos   o biomecánicos y psicosociales.    •   Descripción sociodemográfica:   Perfil sociodemográfico de la población trabajadora, que   incluye  la  descripción  de  las  características  sociales  y  demográficas  de  un  grupo  de   trabajadores, tales como: grado de escolaridad, ingresos, lugar de residencia, composición  \n      familiar, estrato socioeconómico, estado civil, raza, ocupación, área de trabajo, edad, sexo   y turno de trabajo.    •   Descripción de la empresa:   Descripción detallada de la empresa en la que se exponga   su  objetivo  y  características,  relacionando  la  información  que  permitirá  identificar  su   actividad económica, peligros, productos, servicios, población expuesta y sedes.    •   Diagnóstico  de  condiciones  de  salud:     Resultado  del  procedimiento  sistemático  para   determinar  “el  conjunto  de  variables  objetivas  de  orden  fisiológico,  psicológico  y   sociocultural  que  determinan  el  perfil  sociodemográfico  y  de  morbilidad  de  la  población   trabajadora” (Decisión 584 de la Comuni dad Andina de Naciones).    •   Diagnóstico  de  condiciones  de  trabajo:     Resultado  del  procedimiento  sistemático  para   identificar,  localizar  y  valorar  los  elementos,  peligros  o  factores  que  impliquen  de  forma   considerable  la  generación  de  riesgos  para  la  salud  y  seguridad  de  los  trabajadores   (ICONTEC, 2010) .    •   Dosis umbral:  Dosis   o nivel de exposición por debajo del cual no se observan los efectos   nocivos o perjudiciales de una sustancia en una población.    •   Dosis - efecto:   es una relación entre la exposición y el   efecto   en la salud que se establece   al medir la respuesta a una   dosis   en aumento. Esta relación es importante para determinar   la toxicidad de una sustancia específica    •   Efectividad:   Logro de los objetivos del Sistema de Gestión de la Seguridad y Salud en el   Trabajo con la máxima eficacia y la máxima eficiencia.    •   Eficacia:   Es la capacidad de alcanzar el efecto que espera o se desea tras la realización   de una acción.    •   Eficiencia:   Relación entre el resultado alcanzado y los recursos utilizados.    •   Elemento  de  protección  personal  (EPP):     Dispositivo  que  sirve  como  barrera  entre  un   peligro y alguna parte del cuerpo de una persona.    •   Enfermedad  laboral:   De  acuerdo  con  el  artículo  4  de  la  Ley  1562  de  2012,   “una   enfermedad  laboral   es  la  contraída  como  resultado  de  la  exposición  a  peligros   inherentes a la actividad   laboral   o del medio en el que el trabajador se ha visto obligado a   trabajar”.    •   Enfermedad:   Condición física o mental adversa identificable, que surge, empeora o ambas,   a causa de una actividad laboral, una situación relacionada con el trabajo o ambas (NTC   -  OHSAS 18001).    •   Evaluación  del  riesgo:     Proceso  para  determinar  el  nivel  de  riesgo  asociado  al  nivel  de   probabilidad de que dicho riesgo se concrete y al nivel de severidad de las consecuencias   de esa concreción.    •   Evaluación  higiénica:     Medición  de  los  peligros  ambientales  presentes  en  el  lugar  de   trabajo para determinar la exposición ocupacional y riesgo para la salud, en comparación   con los valores fijados por la autoridad competente.    •   Evolución:   Representa el curso de acontecimientos biológicos entre la acción secuencial   de las causas componentes   hasta que se desarrolla   la enfermedad   y ocurre el desenlace   (curación, paso a cronicidad o muerte).    •   Exposición acumulada:   Cantidad total de un peligro al que se expone una persona con el   paso del tiempo.    •   Exposición.  Situación en la cual las personas se encuentran en contacto con los peligros.   Hace  referencia  a  las  condiciones  del  ambiente  de  trabajo  que  permiten  el  contacto  del   trabajador con sustancias químicas en cantidades que puedan ser nocivas para la salud.    Se puede determinar subjetivamente evaluando las condiciones de uso, tiempo, frec uencia   o  cuantificación  utilizando  equipos,  determinando  la  concentración  de  los  agentes  y   comparándolo con los valores límites permisibles, referidos al mismo períod o de referencia   y considerando las condiciones en las que se realiza la tarea.    •   Fisiopatología:   Describe la “historia” de la enfermedad y una vez esta ha alcanzado al ser   vivo se divide en tres fases: inicial, clínica y de resolución. La fase inicial abarca los primeros  \n      cambios que sufre el organismo desde el momento en el que comienza la enfermedad hasta   que se producen los primeros síntomas.    •   Grupo de Exposición Similar (GES):   Es el conjunto de puestos de trabajo en los cuales   se asume que tienen el mismo perfil de exposición en términos de la frecuencia con que   desarrollan la tarea u oficio, los materiales utilizados, los procesos implicados y, en general,   en la forma de desar rollo de la actividad.    •   Identificación  del  peligro:    Proceso  para  establecer  si  existe  un  peligro  y  definir  las   características de este.    •   Indicadores de estructura:   Medidas verificables de la disponibilidad y acceso a recursos,   políticas  y  organización  con  que  cuenta  la  empresa  para  atender  las  demandas  y   necesidades en Seguridad y Salud en el Trabajo.    •   Indicadores de proceso:   Medidas verificables del grado de desarrollo e implementación   del SG - SST.    •   Indicadores de resultado:   Medidas verificables de los cambios alcanzados en el periodo   definido,  teniendo  como base  la  programación hecha  y  la  aplicación de  recursos propios   del programa o del sistema de gestión.    •   Latencia:     Es  el   período   de  demora  entre  la  exposición  y  la  aparición  de  los  efectos   adversos.     •   Lugar  de  trabajo:    Espacio  físico  en  el  que  se  realizan  actividades  relacionadas  con  el   trabajo, bajo el control de la organización (NTC - OHSAS 18001).    •   Manifestaciones clínicas:  Son los signos que pueden observar el médico y los síntomas   que manifiesta el individuo en relación con una enfermedad.    •   Manifestaciones paraclínicas:   Son los hallazgos de pruebas paraclínicas que evidencian   la presencia de una enfermedad.    •   Matriz legal:   Es la compilación de los requisitos normativos exigibles a la empresa acorde   con  las  actividades  propias  e  inherentes  de  su  actividad  productiva,  los  cuales  dan  los   lineamientos normativos y técnicos para desarrollar el Sistema de Gestión de la Seguridad   y Salud en el Trabajo (SG - SST), el cual deberá actualizarse en la medida que sean emitidas   nuevas disposiciones aplicables.    •   Mediciones  higiénicas  de  sustancias  químicas:     Evaluación  cuantitativa  de  los  niveles   de agentes  químicos en el ambiente.  La  estrategia  de  medición  debe  corresponder  a un   método estandarizado;  debe  ser  formulada,  previa visita  de  inspección,  por  una persona   experta y calificada (quien determinará el t ipo de medición a realizar, y el equipo que será   requerido),  la  calibración  de  los  instrumentos  debe  ser  certificada  por  un  laboratorio   acreditado.  Los resultados de las mediciones ocupacionales deben ser ingre sados como   fuente  de  información  para  la  actualización  de  la  matriz  de  identificación  de  peligros,   evaluación y valoración de riesgos y sus registros deben conservarse en medio magnético   y/o en medios impresos por periodos no inferiores a 20 años.  La peri odicidad con la cual   deben realizarse mediciones es determinada por el Coordinador de Seguridad y Salud en   el  trabajo  y  los  expertos  higienistas  encargados  del  sistema,  teniendo  en  cuenta  los   siguientes parámetros generales:    o   Inicio de un nuevo proceso que implique un nuevo centro de trabajo con exposición   a agentes químicos peligrosos para la salud.    o   Instalación o retiro de maquinaria que ocasione cambios significativos en los niveles   actuales del agente químico en el área o proceso.    o   Cambio en la carga de trabajo (duración de la jornada), o condiciones de operación   de  un  equipo  que  utilice o  genere  agentes  químicos  que  puedan  causar  cambios   significativos en los niveles de contaminación ambiental.    o   Cambios  en  las  estructuras  de  las  edificaciones  o  distribución  de  espacio  que   puedan  afectar  los  niveles  agentes  químicos  cambiando  las  condiciones  de   exposición.    o   Modificación en la exposición de los trabajadores por implementación de controles   en la fuente y el medio.   \n         Cuando  no  aplique  ningún  criterio  de  los  anteriores,  se  aplicará  la  periodicidad  establecida  en   GATISST    (Guías  de  atención  integrales  en  seguridad  y  salud  en  el  trabajo),  estableciendo   campañas de evaluación de acuerdo con las categorías de exposición que se presentan en la tabla   9, estas categorías de igual forma deberán a apoyar el establecimiento de las j erarquías para la   intervención del riesgo:       Tabla 1    Evaluación de acuerdo con las categorías de exposición.       Grado   Descripción   Comentario   Frecuencia   reevaluación    1   No exposición   Concentraciones o dosis inferiores al 10% del TLV   De 3 a 5 años    2   Exposición baja   Exposiciones o dosis inferiores al 50% del TLV   De 1 a 3 años    3   Exposición   moderada    Frecuente exposición a concentraciones o dosis por debajo del   nivel de acción (50% del TLV) o exposiciones poco frecuentes   a concentraciones o dosis entre el nivel de acción y el TLV.    3  meses  a  1   año    4   Alta exposición    Frecuente exposición a concentraciones o niveles cercanos al   TLV o infrecuentes exposiciones a concentraciones o dosis por   encima del TLV.    1 a 3 meses    5   Muy  alta   exposición    Frecuentes exposiciones a concentraciones o dosis por encima   del TLV.    Evaluación   continua         Nota.  tomado de GATISST NEUMO modelo J. Rock.       Sin  embargo, debe  tenerse en  cuenta  que  técnicamente un monitoreo  se  justifica  cuando  se ha   intervenido  el  agente  riesgo  en  su  fuente  o  medio  de  trasmisión,  cuando  se  modifique  o  se   implementen  nuevos  procesos  con  probabilidad  de  exposición  y  qué  entidades     de  vigilancia  y   control  del  trabajo  y  ambiente,  podrán  solicitar  frecuencias  menores  de  medición  en  función del   nivel de riesgo.       •   Mejora  continua:     Proceso  recurrente  de  optimización  del  Sistema  de  Gestión  de  la   Seguridad y Salud en el Trabajo, para lograr mejoras en el desempeño en este campo, de   forma  coherente  con  la  política  de  Seguridad  y  Salud  en  el  Trabajo  (SST)  de  la   organización.    •   Monitoreo biológico:   Evaluación periódica de muestras biológicas (ejemplo sangre, orina,   heces, cabellos, leche materna, entre otros) tomadas a los trabajadores, con el fin de hacer   seguimiento a la exposición a sustancias químicas, a sus metabolitos o a los efectos que   éstas   producen en los trabajadores.    •   Nivel de acción:   Designa el nivel a partir del cual, se deben comenzar las intervenciones   preventivas  como  la  implementación  de  los  sistemas  de  vigilancia  epidemiológica   relacionados  con el  objeto  del  presente documento.  Este  nivel  equivale  al 50% del  valor   límite permisi ble definido por el Ministerio de la Protección Social o quien haga sus veces.   No obstante, el empleador en la medida de sus posibilidades, podrá aplicar criterios más   exigentes para comenzar las intervenciones preventivas .    •   Nivel de exposición:   Situación de exposición a un peligro que se presenta en un tiempo   determinado durante la jornada laboral.    •   Nivel de riesgo:  Para efectos de las medidas de prevención y control del riesgo establecido   en el presente programa, se definen tres categorías de nivel de riesgo así:    o   Bajo:   Los  trabajadores  que  laboran  en  puestos  de  trabajo  donde  las   concentraciones ambientales del contaminante, se encuentran por debajo del 10%   del valor límite permisible definido por el Ministerio de la Protección Social o quien   haga sus veces o su equivale nte en metodología cualitativa.    o   Moderado:   Los  trabajadores  que  laboran  en  puestos  de  trabajo  donde  las   concentraciones ambientales del contaminante, se encuentran por debajo del 50%   y mayor al 10% del valor límite permisible definido por el Ministerio de la Protección   Social o quien haga sus vece s o su equivalente en metodología cualitativa.   \n      o   Medio:   Los  trabajadores  que  laboran  en  puestos  de  trabajo  donde  las   concentraciones ambientales del contaminante, se encuentran por debajo del valor   límite permisible definido por el Ministerio de la Protección Social o quien haga sus   veces y hasta el 50% del mi smo o su equivalente en metodología cualitativa.    o   Alto:   Los  trabajadores  que  laboran  en  puestos  de  trabajo  donde  las   concentraciones ambientales del contaminante, alcancen o superen el valor límite   permisible definido por el Ministerio de la Protección Social o quien haga sus veces   o su equivalente en metodolo gía cualitativa.    o   Muy  alto:   Los  trabajadores  que  laboran  en  puestos  de  trabajo  donde  las   concentraciones ambientales del contaminante, se encuentran por encima de dos   veces el Valor límite permisible o su equivalente en metodología cualitativa.    •   No  conformidad:     No  cumplimiento  de  un  requisito.  Puede  ser  una  desviación  de   estándares,  prácticas,  procedimientos  de  trabajo,  requisitos  normativos  aplicables,  entre   otros.    •   Ocupacionalmente  expuesto  a  Cancerígenos,  mutágenos,  teratógenos  y   sensibilizantes:     Trabajador expuesto  a  sustancias  cancerígenas  (Clasificadas  IARC  1  y   2A),  Mutágenos  comprobados,  teratógenos  comprobados  y  sensibilizantes  cutáneos  y   respiratorios, en cualquier nivel de riesgo.     •   Ocupacionalmente expuesto a sustancias químicas:  Trabajador expuesto a sustancias   químicas en niveles iguales o mayores del 50% del TLV.     •   Partes  interesadas:     Persona  o  grupo  dentro  o  fuera  del  lugar  de  trabajo  involucrado  o   afectado por el desempeño de seguridad y salud ocupacional de una organización (NTC -  OHSAS 18001).    •   Peligro:   Fuente, situación o acto con potencial de daño en términos de enfermedad o lesión   a las personas, o una combinación de éstos (NTC - OHSAS 18001).    •   Personal expuesto:   Número de personas que están en contacto con peligros.    •   Política de seguridad y salud en el trabajo:   Es el compromiso de la alta dirección de una   organización con la seguridad y la salud en el trabajo, expresadas formalmente, que define   su alcance y compromete a toda la organización.    •   Probabilidad:   Grado de posibilidad de que ocurra un evento no deseado y pueda producir   consecuencias.    •   Pronóstico:     Resultado  probable  de  la  evolución  de  una   enfermedad;  la  probabilidad  de   recuperación o de que la   enfermedad   reaparezca.    •   Registro:     Documento  que  presenta resultados obtenidos o proporciona  evidencia  de  las   actividades desempeñadas.    •   Rendición  de  cuentas:     Mecanismo  por  medio  del  cual  las  personas  e  instituciones   informan sobre su desempeño.    •   Revisión proactiva:   Es el compromiso del empleador o contratante que implica la iniciativa   y  capacidad  de  anticipación para el desarrollo  de acciones  preventivas  y  correctivas, así   como la toma de decisiones para generar mejoras en el SG - SST.    •   Revisión reactiva:   Acciones para el seguimiento de enfermedades laborales, incidentes,   accidentes de trabajo y ausentismo laboral por enfermedad.    •   Requisito Normativo:   Requisito de seguridad y salud en el trabajo impuesto por una norma   vigente y que aplica a las actividades de la organización.    •   Riesgo:   Combinación de la probabilidad de que ocurra(n) un(os) evento(s) o exposición(es)   peligroso(s),  y  la  severidad  de  lesión  o  enfermedad,  que  puede  ser  causado  por  el  (los)   evento(s) o la(s) exposición(es) (NTC - OHSAS 18001).    •   Riesgo  aceptable:     Riesgo  que  ha  sido  reducido  a  un  nivel  que  la  organización  puede   tolerar,  respecto  a  sus  obligaciones  legales  y  su  propia  política  en  seguridad  y  salud   ocupacional (NTC - OHSAS 18001).    •   Tiempo de exposición:  Tiempo durante el cual las personas se encuentran en contacto   con los peligros.   \n      •   Valoración  de  los  riesgos:     Proceso  de  evaluar  el(los)  riesgo(s)  que  surge(n)  de  un(os)   peligro(s), teniendo en cuenta la suficiencia de los controles existentes y de decidir si el(los)   riesgo(s) es (son) aceptable(s) o no (NTC - OHSAS 18001).    •   Valor  Límite  de  Umbral    -     Límite  de  Exposición a  Corto  Plazo  (TLV - STEL Threshold   Limit Value - Short Term Exposure Limit):   Es una concentración promedio del tiempo en   el cual los trabajadores no deben ser expuestos por más de 15 minutos y que no deben de   ser repetidos por más de 4 veces por día, por lo menos con 60 minutos entre exposiciones   sucesivas. Este límite suplementa  al TLV - TWA donde hay efectos agudos reconocidos de   una sustancia cuyos efectos tóxicos son primariamente de una naturaleza crónica. Los TLV -  STEL son recomendados solamente donde los efectos tóxicos han sido reportados por sus   altas exposiciones a corto pla zo, tanto en humanos como en animales.    •   Valoración  del  riesgo:     Consiste  en  emitir  un  juicio  sobre  la  tolerancia  o  no  del  riesgo   estimado.    •   Vigilancia  de  la  salud  en  el  trabajo  o  vigilancia  epidemiológica  de  la  salud  en  el   trabajo:   Comprende la recopilación, el análisis, la interpretación y la difusión continuada y   sistemática  de  datos  a  efectos  de  la  prevención.  La  vigilancia  es  indispensable  para  la   planificación, ejecución y evaluación de los programas de seguridad y salud en el    trabajo,   el control de los trastornos y lesiones relacionadas con el trabajo y el ausentismo laboral   por enfermedad, así como para la protección y promoción de la sa lud de los trabajadores.   Dicha vigilancia comprende tanto la vigilancia de la salud de los trabajadores como la del   medio ambiente de trabajo.    •   VLP:  Valor  Límite  Permisible  VLP .  El  Valor  Límite  Permisible  se  define  como  la   concentración de una sustancia en el aire a la que la mayoría de los trabajadores pueden   estar expuestos repetidamente día tras día, sin efecto adverso. Los TLV (Threshold Limit   Values) revisados y publicados    anualmente por la Conferencia Americana de Higienistas   Industriales  Gubernamentales  de  Estados  Unidos,  fueron  adaptados  en  el  país  por  la   Resolución 2400/79 artículo 154 Capítulo VIII del Ministerio del Trabajo y Seguridad Social,   como los Valores Límites  Permisibles.    Los niveles permisibles para las diferentes sustancias químicas, serán los publicados por   la Conferencia Americana de Higienistas Industriales Gubernamentales de Estados Unidos   (ACGIH) vigentes para el año en que se realizan las mediciones.             REFERENCIAS BIBLIOGRÁFICAS       Arango,  S.  (2012).  Biomarcadores  para  la  evaluación  de  riesgo  en  la  salud  humana.   Revista  Facultad  Nacional  de  Salud  Pública ,  30 (1),  75 – 82.   https://revistas.udea.edu.co/index.php/fnsp/article/view/9607    Ministerio de Salud y Proteccion Social. (2021).   Guía para la identificación de peligros, valoración   de riesgos y determinación de controles .    Bartual,  J.,  &  Guardino,  X.  (2007).  NTP  244 :  Criterios  de  valoración  en  Higiene   Industrial;Instituto Nacional de Seguridad e Higiene en el trabajo.  Instituto Nacional de   Seguridad  e  Higiene  En  El  Trabajo ,  9.   http://www.insht.es/InshtWeb/Contenidos/Documentacion/FichasTecnicas/NTP/Fiche  ros/201a300/ntp_244.pdf    Centers  for  Disea     function extractTextFromBackendResponse(raw) {
        if (raw == null) return '';
        const s = String(raw).trim();
        if (!s) return '';
        try {
            const j = JSON.parse(s);
            if (Array.isArray(j)) return JSON.stringify(j);
            if (j && typeof j === 'object') {
                const c = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
                if (typeof c === 'string') return c.trim();
                if (typeof j.content === 'string') return j.content.trim();
                if (typeof j.text === 'string') return j.text.trim();
            }
            if (typeof j === 'string') return j;
        } catch (e) {}
        return s;
    }
    async function postBackendText(payload) {
        const body = { model: payload.model || 'openai-fast', prompt: payload.prompt };
        if (payload.system) body.system = payload.system;
        if (payload.json) body.json = true;
        const res = await fetch(BACKEND_BASE + '/api/ia/text', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const raw = await res.text();
        if (!res.ok) throw new Error('Error de API: ' + res.status + ' ' + res.statusText + '. ' + raw.substring(0, 200));
        return extractTextFromBackendResponse(raw);
    }

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {
        const hue = Math.floor(Math.random() * 360);
        const bg = hslToHex(hue, 45 + Math.floor(Math.random() * 20), 16 + Math.floor(Math.random() * 70));
        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {
        const base = palette || {
            primaryColor: '#2563eb',
            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',

            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {
        if (!palette) return;

        localStorage.setItem('theme', t);
    }
    themeBtn.addEventListener('click', () => { const n = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(n); });
    paletteBtn.addEventListener('click', () => { applyPalette(generatePalette()); });
    const savedPalette = JSON.parse(localStorage.getItem('downloaded-palette') || 'null');
    if (savedPalette) { applyPalette(savedPalette); }
    else if (INITIAL_PALETTE) { applyPalette(INITIAL_PALETTE); }
    else { applyPalette(generatePalette()); }
    applyTheme(currentTheme);

    // Second PDF (embedded or user-loaded)
    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
