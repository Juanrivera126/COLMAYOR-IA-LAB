<script>
    const PDF_TEXT = "3962   |          Cancer Science.  2021;112:3962–3971. wileyonlinelibrary.com/journal/cas  1  |    INTRODUCTION  Constant  exposure  of  cells  to  stress  or  DNA  damage–   inducing   chemical  agents  results  in  accumulation  of  somatic  mutations  in   an age-  dependent manner. Some somatic mutations, namely driver  mutations,  provide  a  fitness  advantage  to  cells  under  selective   pressure.  For  example,  chronic  inflammation  or  exposure  to   specific environmental stimulus might allow such clones to become      Received: 17 June 2021  |  Revised: 25 July 2021  |  Accepted: 27 July 2021 DOI: 10.1111/cas.15094    R E V I E W   A R T I C L E  Clonal hematopoiesis and associated diseases: A review  of recent findings Shuhei Asada 1,2     |    Toshio Kitamura 2  This is an open access article under the terms of the Creative Commons Attribution-NonCommercial License, which permits use, distribution and reproduction  in any medium, provided the original work is properly cited and is not used for commercial purposes. © 2021 The Authors.  Cancer Science  published by John Wiley & Sons Australia, Ltd on behalf of Japanese Cancer Association. 1The Institute of Laboratory Animals, Tokyo  Women's Medical University, Tokyo, Japan 2Division of Cellular Therapy, The Institute  of Medical Science, The University of Tokyo,  Tokyo, Japan  Correspondence  Toshio Kitamura, Division of Cellular  Therapy, The Institute of Medical Science,   The University of Tokyo, 4-  6-  1 Shirokanedai,   Minato-  ku, Tokyo 1088639, Japan. Email: kitamura@ims.u-tokyo.ac.jp  Funding information  Japan Society for the Promotion of   Science, Grant/Award Number: 19J01570,  20H00537 and 21K16252; Japanese Society   of Hematology  Abstract  Recent  genome-   wide  studies  have  revealed  that  aging  or  chronic  inflammation  can   cause clonal expansion of cells in normal tissues. Clonal hematopoiesis has been the  most intensively studied form of clonal expansion in the last decade. Clonal hemat- opoiesis of indeterminate potential (CHIP) is an age- related phenomenon observed in  elderly individuals with no history of hematological malignancy. The most frequently  mutated  genes  in  CHIP  are   DNMT3A ,    TET2 ,  and   ASXL1 ,  which  are  associated  with   initiation  of  leukemia.  Importantly,  CHIP  has  been  the  focus  of  a  number  of  stud- ies  because  it  is  an  independent  risk  factor  for  myeloid  malignancy,  cardiovascular   disease  (CVD),  and  all-   cause  mortality.  Animal  models  recapitulating  human  CHIP   revealed  that  CHIP-   associated  mutations  alter  the  number  and  function  of  hemat- opoietic  stem  and  progenitor  cells  (HSPCs)  and  promote  leukemic  transformation.   Moreover,  chronic  inflammation  caused  by  infection  or  aging  confers  a  fitness   advantage  to  the  CHIP-   associated  mutant  HSPCs.  Myeloid  cells,  such  as  mac- rophages with a CHIP-  associated mutation, accelerate chronic inflammation and are  associated  with  increased  levels  of  inflammatory  cytokines.  This  positive  feedback   loop  between  CHIP  and  chronic  inflammation  promotes  development  of  athero- sclerosis and chronic heart failure and thereby increases the risk for CVD. Notably,  HSPCs with a CHIP-  associated mutation may alter not only innate but also acquired  immune cells. This suggests that CHIP is involved in the development of solid cancers  or immune disorders, such as aplastic anemia. In this review, we provide an overview  of recent findings on CHIP. We also discuss potential interventions for treating CHIP  and preventing myeloid transformation and CVD progression.  K E Y W O R D S   clonal hematopoiesis, hematopoietic stem cell, myeloid leukemia, solid tumor \n         |   3963 ASADA AnD KITAMURA  dominant.  Consequently,  when  a  single  ancestor  cell  of  the  posi- tively expanded clone gains additional driver mutations, cancer cells  emerge. Notably, clonal expansion occurs even in tissues that appear  normal.1- 3 Among  the  different  forms  of  clonal  expansion,  clonal  hemato- poiesis (CH) has been most intensively studied. 4- 6  The term “CH of  indeterminate  potential  (CHIP)”  refers  to  the  presence  of  at  least   one driver mutation in hematopoietic cells of peripheral blood, with- out  hematological  malignancy.7  These  subpopulations  are  derived   from  hematopoietic  stem  cells  (HSCs)  that  may  have  acquired   driver  mutations  somatically.  Similar  to  that  in  stem  cells  in  other   tissues,  accumulation  of  somatic  mutations  in  HSCs  occurs  in  an   age- dependent  manner.8  CHIP  is  a  significant  risk  factor  mainly   for  myeloid  malignancies  such  as  acute  myeloid  leukemia  (AML),   myelodysplastic syndrome (MDS), and myeloproliferative neoplasms  (MPN),  which  indicates  that  it  is  a  precursor  state  for  hematolog- ical  malignancy  with  lower  frequency.  In  addition,  some  lymphoid   malignancies seem to emerge from CHIP. Importantly, CHIP is asso- ciated  with  increased  risk  of  all-   cause  mortality  and  cardiovascular   disease (CVD). 5,9  CHIP has also been detected in nonmalignant dis- eases,  such  as  acquired  aplastic  anemia  (AA),  which  is  an  autoim- mune disorder. It is also prevalent in patients with solid tumors who  have  undergone  chemotherapy  and  has  been  associated  with  poor   prognosis.10  Therefore,  it  is  clinically  important  to  understand  the   interrelationship  between  CHIP  and  hematological  malignancies  as   well as CVD, AA, and solid tumors. Mouse  models  that  recapitulate  CHIP-   associated  mutations   facilitate  understanding  of  how  each  CHIP-   associated  mutation   alters  the  function  of  HSCs  and  promotes  myeloid  transformation.   Recent studies have revealed that inflammation plays a pivotal role  in the pathogenesis of CHIP and its related diseases. Myeloid cells,  especially  macrophages,  derived  from  HSCs  with  CHIP-   associated   mutations  exhibit  aberrant  production  of  inflammatory  cytokines,   which gives them a fitness advantage resulting in the propagation of  CHIP clones and development of CVD. In addition, CHIP-  associated  mutations might alter the function of immune cells, such as T cells,  thereby  affecting  the  development  of  autoimmune  diseases  and   anticancer  immunity.  Here,  we  reviewed  recent  findings  on  CHIP   and  described  its  association  with  hematological  malignancy  and   nonhematological diseases such as CVD and solid tumors.  2  |    EMERGENCE OF CHIP IN HEALTH AND  DIFFERENT DISEASES  In 2012, presence of somatic mutations in the  TET2  gene was evalu- ated  in  182  elderly  women  with  skewed  X-   linked  inactivation  and   identified  in  the  genomes  of  10  women.11  This  was  the  first  study   that used next-  generation sequencing to reveal that blood cells with  gene mutations underwent clonal expansion.11  In 2014, three groups   reported  that  healthy  individuals  aged   > 60  years  carried  somatic   mutations  associated  with  hematological  malignancy. 4- 6   Another   report suggested that the prevalence of CH increases with age, and   it was present in 62% of individuals aged ≥80 years. 12 Importantly,  CH  is  associated  with  increased  risk  of  developing  myeloid  malig- nancy and all-  cause mortality. 5  Although CH appears during the preleukemic state, it is unclear  whether  it  leads  to  benign  or  malignant  neoplasms.  To  distinguish   the  state  of  nonmalignancy  from  hematological  cancers,  the  term   “CHIP”  was  coined.  CHIP  is  defined  by  the  presence  of  somatic   mutations  in  peripheral  blood  at  a  variant  allele  frequency  (VAF)    of ≥0.02, in the absence of apparent hematological disorders. 7 The  most  common  mutation  observed  in  CHIP  is  in  the  C  to  T  single-   nucleotide  substitution  in  the  coding  region,  which  occurs  due  to   an age-  dependent increase in the rate of spontaneous deamination   of 5-  methyl-  cytosines at the CpG loci. This is consistent with the   FI G U R E 1  Overview of clonal hematopoiesis and its implication. Clonal hematopoiesis of indeterminate potential (CHIP) is initiated by  acquiring some driver mutations in hematopoietic stem cells (HSCs) due to aging and MMEJ-  mediated double-  strand break repair. HSCs  carrying CHIP-  associated mutations gain a fitness advantage under the selective pressures such as chemotherapy/radiation and lifestyle  diseases. Consequently, CHIP progression promotes myeloid transformation, cardiovascular diseases, and potentially disturbance of immune  systems. Risk factors and associated gene mutations for each category are highlighted in red font \n3964   |        ASADA AnD KITAMURA  clinical data, which suggest that aging is the strongest risk factor for  CHIP. 13 In addition to age, the second most important risk factor for  CHIP  is  a  history  of  chemotherapy  and  radiation.  Therapy-   related   CH is frequently detected in patients with solid tumors ( ~ 25%) and   is associated with adverse outcomes.10 CHIP has been observed in  patients  who  undergo  autologous  stem  cell  transplantation  (ASCT)   due to nonmyeloid hematological malignancies, such as multiple my- eloma  and  lymphoma, 14,15   whereas  the  impact  of  CHIP  after  ASCT   is  still  under  debate.  CHIP  is  also  prevalent  in  other  nonmalignant   hematological  diseases,  such  as  AA,  Erdheim-   Chester  disease,  and   inherited  bone  marrow  failure  syndromes.16- 18  These  findings  indi- cate that there is a need for future studies to focus on the implica- tions of CHIP (Figure 1).  3  |    RECURRENT MUTATIONS IN CHIP  Genes  coding  for  the  epigenetic  regulators  DNMT3A,  TET2,  and   ASXL1  (DTA)  are  most  frequently  mutated  in  healthy  elderly  indi- viduals  with  CHIP.  Mutations  in   DNMT3A   and   TET2   influence  DNA   methylation  whereas  those  in   ASXL1   alter  histone  modifications,   and  thereby  influence  hematopoiesis.19- 21  In  CHIP,  although  muta- tions  in  the  genes  coding  for  other  epigenetic  regulators,  such  as    IDH1   and   IDH2 ,  are  also  reported,  they  occur  at  lower  frequencies   than those in  DTA   . Moreover, mutations in genes related to signaling  pathways ( JAK2, CBL ,  GNB1 , and  GNAS) , spliceosome ( SRSF2 ,  SF3B1 ,  and  U2AF1 ), and cohesion ( STAG2, RAD21,  and  SMC3 ) are also associ- ated with CHIP. In addition to the exonic mutations described above,  an intronic mutation in the telomerase reverse transcriptase ( TERT )  gene  is  strongly  associated  with  CHIP.22  Mutations  in   PIGA ,    BCOR ,  or  BCORL1  are frequently and exclusively detected in patients with  AA and CHIP.16 Furthermore, mutations in  DNMT3A  and  ASXL1  are  frequently detected in patients with AA. Specific DNA-  damaging agents or environmental stimuli may dif- ferentially affect the frequency of mutations in CHIP. For example,  a history of chemotherapy can increase the prevalence of mutations  in  DNA  damage  response  genes  ( CHEK2,  PPM1D ,  and   TP53 )  due  to   the selective pressure induced by cytotoxic conditions. 23,24  Another  study  showed  that  mutations  in   ASXL1   and  genes  coding  for  spli- ceosomes are strongly associated with exposure to DNA-  damaging  agents  due  to  substance  abuse  such  as  smoking.12  Interestingly,   some CHIP-  associated mutations in genes such as  ASXL1  and  SRSF2   are caused by PARP1 dependent microhomology-  mediated end join- ing (MMEJ) double-  stranded break repair, indicating that DNA dam- age repair can also contribute to mutations associated with CHIP. 25  Although  clonal  expansion  can  be  detected  in  noncancerous   tissues,1,26  the  mutation  profiles  of  such  clones  are  different  from   the ones observed in CHIP. For example, the frequency of mutations  in signaling pathway–  associated genes or oncogenes in CH is lower  than that in cells undergoing clonal expansion in other tissues such  as  esophageal  epithelium,  colorectal  epithelium,  and  skin.1- 3  This   difference could be because hematopoietic cells can expand freely  without being limited in space, unlike cells in other tissues.  4  |    MOUSE MODELS RECAPITULATE  HUMAN MUTATIONS-  ASSOCIATED CHIP  To understand the implications of CHIP, mouse models recapitulating  human CHIP have been generated (Table 1). Knocking out  Dnmt3a ,  which  is  the  most  frequently  mutated  gene  in  CHIP,  endowed  a   strong  competitive  advantage  to  long-   term  HSCs  (LT-   HSCs).27,28  In   contrast,  Dnmt3a  R878H knockin (KI) mice, which mimic the human   DNMT3A  hotspot mutation R882H, showed modest LT-  HSC expan- sion compared with  Dnmt3a  knockout mice.28 The  Dnmt3a  knockout  mice showed increased self-  renewal capacity in the LT-  HSC fraction,  whereas the  Dnmt3a  R878H KI mice showed increased self-  renewal  capacity in the LT-  HSC as well as the multipotent progenitor (MPP)  fraction.29 Given that leukemia-  initiating cells arise from progenitor  population rather than stem cell population in most human primary  AML cases,30 these findings are consistent with the clinical data that  suggest that although the  DNMT3A  R882 mutation is less frequent in  CHIP, it markedly increases the risk of myeloid transformation.31- 33   Loss  of   TET2,   the  second  most  commonly  mutated  gene,  also  in- creased  the  self-   renewal  capacity  of  HSCs. 34   Contrastingly,   Tet2   catalytic-   dead  mutant  mice  showed  significant  but  weaker  HSC   expansion  than  the   Tet2   knockout  mice  and  had  a  myeloid-   specific   phenotype. 35   This  indicated  that  the  catalytic  activity  of  TET2  is   not important for HSC expansion. Although it remains elusive how  mutations in  DNMT3A  or  TET2  affect the progression of CHIP, recent  findings suggest that alterations in DNA methylation at the enhancer  loci might contribute to a lineage bias.21 Although    ASXL1   is  the  third  most  frequently  mutated  gene   in  CHIP,   ASXL1 -   mutated  CHIP  showed  a  high  odds  ratio  for  AML   and  an  increased  hazard  ratio  for  CVD  compared  with   DNMT3A -   or    TET2 - mutated  CHIP.36  To  understand  the  characteristics  of    ASXL1  mutations in CHIP, we generated  Asxl1  mutant KI ( Asxl1 - MT  KI)  mice  that  mimicked  the  human   ASXL1   mutation  frequently   found  in  CHIP.37  The   Asxl1 -   MT  KI  mice  developed  an  MDS-   like   phenotype  after  a  long  period  of  latency  but  did  not  undergo   complete  myeloid  transformation.  In  addition,  unlike  HSCs  from    Dnmt3a   and   Tet2   mutant  mice,  those  from   Asxl1 -  MT  KI  mice  did   not have a repopulating advantage in competitive transplantation  assays.  Notably,   Asxl1 -  MT  KI  mice  showed  age-   related  expansion   of  phenotypic  HSCs  via  activation  of  the  AKT/mTOR  pathway.38  Overactivation of AKT or mTOR has also been observed in  Dnmt3a   R878H KI mice,39 which indicates that this is a common mechanism  promoting human CHIP. The spliceosome mutant models, ie,  Srsf2  P95H and  Sf3B1  K700E  KI mice showed progressive macrocytic anemia but did not develop  leukemia till 1 year. 40,41  In addition, HSPCs from  Srsf2  P95H or  Sf3B1   K700E KI mice showed a decrease in their ability to repopulate and  an  increase  in  their  sensitivity  to  inflammatory  stimuli  via  activa- tion of NF-   κ B signaling. 42  As the activation of NF-   κ B signaling pro- motes survival of leukemia-  initiating cells, 43  these findings are in line  with  the  clinical  data,  which  indicate  that  spliceosome  mutations,   although not common in CHIP, confer a higher likelihood of myeloid  transformation than mutations in  DNMT3A  or  TET2 .36 \n         |   3965 ASADA AnD ong-  term;  MEP, megakaryocyte-  erythroid progenitor; MPP, multipotent progenitor; PB, peripheral blood; ST, short-  term; WBC, white blood cell. \n3966   |        ASADA AnD KITAMURA  Overall,  these  studies  involving  mouse  models  recapitulating   human  CHIP  revealed  that  single  CHIP-   associated  mutations  gen- erally show weak phenotypes in hematopoiesis and are insufficient  for myeloid transformation. Although the mechanism by which HSCs  with  CHIP-   associated  mutations  induce  clonal  expansion  remains   largely  elusive,  these  mouse-   based  studies  delineate  the  effects  of   different mutations on the characteristics of CHIP.  5  |    MYELOID TR ANSFORMATION OF  HSPCs CARRYING CHIP-  ASSOCIATED  MUTATIONS  Two recent reports evaluated the clonal architecture and mutational  histories  of  AML  patients  using  single-   cell  DNA  sequencing  tech- nique. 31,44  These studies suggest that cells carrying single mutations  in  the   DNMT3A ,    TET2 ,  or   ASXL1   genes  are  frequently  detected  in   AML,  in  addition  to  the  leukemic  cells  that  harbor  multiple  muta- tions.  This  suggests  that  CHIP  clones  with  these  additional  muta- tions  are  likely  to  be  the  disease-   initiating  cells  in  AML.  Moreover,   a previous report showed that additional driver mutations, together  with  an  initiating  mutation,  are  sufficient  to  establish  malignant   founder clones in AML.8 Consistent with these clinical data, recent  experimental  studies  have  highlighted  the  mechanisms  by  which   additional mutations or the overexpression of oncogenes might pro- mote myeloid transformation in CHIP. Previous reports suggested that the  Dnmt3a  knockout and  Idh2   mutants  synergistically  promoted  leukemogenesis  by  overproduc- ing  prostaglandin  E2.  These  double-   mutant  cells  were  sensitive  to   the  inhibition  of  prostaglandin  synthesis. 45   In  addition,  a  mutation   in  the   Npm1   gene  was  shown  to  drive  myeloid  transformation  in    Dnmt3a   R878H  expressing  murine  HSPCs.29    TET2   knockout  also   collaborated with the  NRAS  mutant in inducing myeloid transforma- tion  via  synergistic  activation  of  MAPK  signaling.  The   TET2/NRAS   double-  mutant cells showed preferential sensitivity to MAPK kinase  (MEK)  inhibition. 46   Concerning   ASXL1   mutations,  we  also  showed   that mutating the  RUNX1  gene could promote the myeloid transfor- mation of cells from the  Asxl1 - MT KI mice.37 Recently, we reported  that the overexpression of a homeobox transcriptional factor,  HHEX ,  promotes myeloid transformation in HSPCs of  Asxl1 -  MT KI mice via  the  upregulation  of   MYB/ETV5 . 47   Inhibiting  the   HHEX -  MYB / ETV5   axis  is  a  potential  therapeutic  strategy  for  treating   ASXL1 - mutated  AML. Taken together, by demonstrating that HSPCs carrying CHIP-  associated mutations undergo myeloid transformation, these studies  have enabled the development of therapeutic strategies for AML.  6  |    POSITIVE FEEDBACK LOOP BETWEEN  CHRONIC INFLAMMATION AND CHIP  The  relationship  between  chronic  inflammation  and  hematopoie- sis  has  been  studied  extensively  in  the  last  decade.  The  exposure   of  HSCs  to  chronic  inflammation  leads  to  loss  of  quiescence  and   induction  of  a  myeloid-   biased  lineage  output, 48,49   which  results  in   impaired  HSC  function.  In  contrast,  CHIP-   associated  mutations  in   genes such as  DNMT3A  and  TET2  provide HSCs with a competitive  advantage under inflammatory conditions. 50,51  In addition, activation  of Toll-  like receptor (TLR) signaling, which is frequently observed in  MDS patients, confers a fitness advantage to HSCs under inflamma- tory conditions. 52  Moreover,  aging  or  CHIP-   associated  mutations  might  also   accelerate chronic inflammation. A recent report showed that aging  increases  the  frequency  of  CD61-   high  myeloid-   biased  LT-   HSCs   that  further  promote  a  myeloid  output  in  response  to  inflamma- tory  stimuli. 53   In  addition,  a  CRISPR-   Cas9–   mediated  sequential  KI   developed  in  human  cells  showed  that  mutations  in   ASXL1 ,    SRSF2 ,  and  NRAS   activated  the  innate  immunity  signaling 54   pathways.   Therefore,  a  combination  of  aging  and  CHIP-   associated  mutations   might activate inflammation by increasing the production of inflam- matory cytokines. In agreement with this hypothesis,  Tet2 - deficient  HSPCs  produced  increased  levels  of  monocytes  and  inflammatory   cytokines such as IL-  1 β  and IL-   6.   55  In fact, a recent study in a large  cohort showed that serum levels of IL-  6 are generally high in people  with  CHIP. 56   In  addition,  it  is  well  known  that  obesity  or  aging  in- duces inflammation in the bone marrow by promoting accumulation  of  adipocytes. 57,58     TET2   deficiency  aggravated  age-    and  obesity-   related insulin resistance by increasing IL-  1 β  secretion in the adipose  tissue 59   and  thereby  established  a  causal  relationship  between  CH   and  type  2  diabetes  mellitus. 5   These  findings  indicate  that  CHIP   progresses due to a positive feedback loop between HSCs carrying  CHIP-  associated mutations and chronic inflammation (Figure 2).  7  |    INVOLVEMENT OF CHIP IN  ATHEROSCLEROSIS PROGRESSION  Lifestyle  diseases  such  as  diabetes  and  hypercholesterolemia  were   reported to cause alterations in HSPC function and monocytosis.60,61  Inflammatory monocytes and their differentiation into macrophages  underlies  the  pathogenesis  of  atherosclerosis.62  Consistent  with    this, in 2014 it was reported that CHIP-  associated mutations were   associated  with  the  risk  of  CVD. 5   In  2017,  another  study  showed   that CHIP, together with the mutations in  DNMT3A ,  TET2 ,  ASXL1 , or   JAK2  genes, was associated with an increased risk of CVD.9 In recent  years, mouse models have been used to study how these mutations  promote atherosclerosis and CVD. Low-  density  lipoprotein  receptor  ( Ldlr )  knockout  mice  are   commonly  used  as  an  atherosclerosis  model.  It  was  observed  that   the  atherosclerotic  plaque  size  was  larger  in   Ldlr   knockout  mice   transplanted  with   Tet2 -   deficient  bone  marrow  cells  than  in  those   transplanted  with  control  bone  marrow  cells  on  high-   fat  diet.9,63  Importantly,    Ldlr   knockout  mice  transplanted  with  myeloid-   specific    Tet2 -   depleted  cells  also  showed  aggravation  of  atherosclerosis  on   atherogenic  diet,  which  suggests  that  myeloid  cells,  such  as  mono- cytes  and  macrophages,  were  responsible  for  the  pathogenesis.9,63  Mechanistically,  inflammasomes  are  activated  in   Tet2 - depleted  \n         |   3967 ASADA AnD KITAMURA  macrophages,  which  causes  an  increase  in  the  secretion  of  inflam- matory cytokines such as IL-  1 β  and IL-   6. 9,63 In macrophages, CRISPR-  Cas9–   mediated  DNMT3A  depletion  also  resulted  in  increased   production of cytokines such as IL-  6. 64  In addition, mutations in  DNMT3A  and  TET2  in peripheral blood  cells  have  been  clinically  associated  with  the  progression  and  poor   prognosis of chronic heart failure. 65  Experimentally, a chronic heart  failure  model  showed  that  myeloid-   specific   Tet2   depletion  had  a   detrimental effect on cardiac remodeling and function. 55 MCC950,   an  NLRP3  inhibitor,  reduced  IL-   1 β   secretion  in   Tet2 - depleted  mac- rophages and ameliorated atherosclerosis or heart failure driven by   Tet2 -   deficient  myeloid  cells. 55   Moreover,  a  recent  report  showed   that a macrophage-  restricted JAK2 mutant induces DNA replication  stress  and  activates  the  AIM2  inflammasome,  thereby  aggravating   atherosclerosis.66 Collectively, these findings suggest a causal rela- tionship  between  inflammasome  activation  in  macrophages  due  to   CHIP-  associated mutations and the pathogenesis of CVD.  8  |    IMPLICATIONS OF CHIP FOR SOLID  TUMORS AND A A  As mentioned above, CHIP is also prevalent in solid tumors and may  contribute  toward  adverse  outcomes.67  Moreover,  chemotherapy   may induce the expansion of clones with mutations in specific genes,  such as  TP53  or  PPM1D . Therefore, follow-  up evaluation for hemato- logical malignancy is recommended in cancer patients with high-  risk  CHIP. 68 Given that HSCs harbor driver mutations in CHIP, it is plausible  that the immune cells produced by these HSCs, such as B and T lym- phocytes,  and  NK  cells  are  also  affected  by  the  mutations.  Recent   experimental  studies  have  shown  that  loss  of  DNMT3A  induces   the  accumulation  of  double-   negative  2  (DN2)  thymocytes  (DN2;   Lineage-   c- Kit+  CD25 +),69  whereas  TET2  depletion  enhances  CD8 +   memory T cell differentiation.70 Clinically, individuals who received  allogeneic  bone  marrow  transplants  from  donors  carrying  CHIP-   associated  mutations  were  more  likely  to  experience  graft-   versus-   host disease and had a low relapse rate.71 This reinforces the notion  that CHIP-  associated mutations alter the immune system. A recent report showed that DNMT3A depletion in CD8+ T cells  confers  resistance  to  the  exhaustion  induced  by  chronic  stimula- tion. This can be explained by the failure to methylate CpG sites de  novo  at  the   IFN γ   and   CCR7   loci.72  TET2  inactivation  also  enhances   the  antitumor  activity  of  tumor-   infiltrating  lymphocytes.73  In  ad- dition,  TET2-  depleted  CAR-   T  cells  showed  increased  therapeutic   efficiency. 74   In  fact,  CHIP-   associated  mutations  also  affect  other   immune cells, in addition to T cells. Myeloid-  specific TET2 depletion  suppressed  the  growth  of  melanoma  cells  by  increasing  the  num- ber of proinflammatory macrophages. 75  These findings indicate that  CHIP in combination with  TET2  or  DNMT3A  mutations may suppress  rather  than  promote  the  development  of  solid  tumors  (Figure  3).   Thus, it is mysterious that worse prognosis is associated with CHIP  in cancer patients, while the T cell immunity seemed to be enhanced  by CHIP mutations. Further studies will be warranted to clarify the  mechanisms for this discrepancy. As CH can be detected in acquired AA, it is plausible that some  CHIP-  associated mutations disrupt the homeostasis of the immune  system.16 Somatic mutations in the JAK-  STAT and MAPK pathways,  which  confer  clonality  to  CD8+  T  cells,76  are  frequently  found  in   the CD8+ cells of patients with AA. In the same study, mutations in   BCOR / BCORL1  were exclusively found in the CD3+ fraction but not  in the CD3–  fraction of some AA patients,76 suggesting that T cells  with such mutations can eradicate normal HSCs. These findings are  consistent  with  the  clinical  data  of  patients  with  AA;  mutations  in    FI G U R E 2  A positive feedback loop  between self-  renewal of hematopoietic  stem cells (HSCs) and progression of  inflammation in  TET2 - mutated clonal  hematopoiesis of indeterminate potential  (CHIP).  TET2 -  mutated HSCs preferentially  produce myeloid progenitors. As a  result, monocytes and macrophages  are increased in  TET2 - mutated CHIP.  In macrophages with  TET2  mutations,  the NLRP3 inflammasome pathway is  activated and cleavage of pro IL-  1 β  is  promoted, leading to overproduction of  IL- 1 β . In turn, IL-  1 β  enhances the self-  renewal of HSCs with  TET2  mutations.  This positive feedback loop would be  responsible for the pathogenesis of  atherosclerosis in  TET2 - mutated CHIP \n3968   |        ASADA AnD KITAMURA  PIGA ,    BCOR ,  or   BCORL1   lead  to  a  better  response  to  immunosup- pressive therapy. Moreover, these patients are less likely to undergo  myeloid transformation compared with AA patients with mutations  in  DNMT3A  or  ASXL1 .77 In addition, HSCs with mutations in specific  genes, such as  DNMT3A  or  ASXL1 , might escape the attack from cy- totoxic T cells in AA patients. Future studies will have to investigate  the role of each mutation in the pathogenesis of AA.  9  |    POTENTIAL THER APEUTIC  APPROACHES FOR CHIP  To date, there are no definite criteria for determining which patients  are  eligible  for  therapy  against  CHIP.  Recent  studies  have  shown   that  a   DNMT3A   R882  mutation,  more  than  one  driver  mutations,   or a higher VAF could be a significant risk factor for AML transfor- mation.33,78  In  addition,  a  high  VAF  in  CHIP  patients  was  found  to   be  directly  proportional  to  the  risk  of  CVD.9  Therefore,  it  could  be   suggested that CHIP partially predisposes patients to AML or CVD.  Currently, there are no established therapies for CHIP; however, re- cent studies support the development of effective therapeutics. Some studies have investigated treatment strategies for specific  mutations. For example, treating Tet2-  deficient mice with high-  dose  vitamin C reversed the aberrant self-  renewal of HSPCs by mimicking  Tet2 restoration.79 Using aged  Asxl1 - MT KI mice,38 we have shown  that rapamycin, an mTOR inhibitor, efficiently blocked the expansion  of  phenotypic  HSCs,  which  are  driven  by  the  overactivation  of  the   AKT/mTOR pathway. Given that the expansion of phenotypic HSCs  led  to  a  reduction  in  the  regenerative  capacity  in  aged  bone  mar- row,80 preventing expansion of these “impaired” HSCs would enable  the  “true”  HSCs  to  perform  healthy  hematopoiesis  and  limit  CHIP   progression. As  mentioned  above,  activation  of  the  signaling  pathways  in   innate immunity would confer a competitive advantage to HSCs with  CHIP-  associated mutations. Recently, a report showed that blocking  signaling pathways in innate immunity with the help of agents, such   as IRAK1/4 inhibitors, had prophylaxis effects on leukemogenesis.54   In  addition,  age-   associated  changes  in  the  bone  marrow  microenvi- ronment  could  serve  as  promising  therapeutic  targets  for  treating   CHIP. Upregulation of TGF β  and IL-  6 signaling has been observed81  in  aged  bone  marrow  stroma.  Therefore,  inhibitors  that  target  the   TGF β 1 and IL-  6 pathways could be good candidate drugs in amelio- rating an age-  related lineage bias.81 Importantly, these findings could  contribute to the prophylactic strategies for AML and CVD, in CHIP.  10  |    CONCLUSION  Here, we reviewed the recent findings in CH and discussed its impact  on  the  pathogenesis  of  myeloid  malignancy  and  CVD.  We  also    FI G U R E 3  DNMT3A-  or TET2- mutated  clonal hematopoiesis of indeterminate  potential (CHIP) may augment antitumor  activity.  DNMT3A  mutations in CD8+  T cells lead to hypomethylation at the  CpG island of the  IFN γ  and  CCR7  gene,  resulting in the exhaustion induced by  chronic stimulation (upper). On the other  hand,  TET2  mutations lead to polarization  of tumor-  infiltrating macrophages toward  proinflammatory (M1-  like) phenotype  and also promote the differentiation  and maintenance of memory T cell  (lower). Taken together,  DNMT3A  or   TET2  mutations may enhance antitumor  immunity by altering the number and  function of immune cells \n         |   3969 ASADA AnD KITAMURA  outlined the probability of an association between solid tumors and  AA. Because cancers and CVD are the leading causes of death in our  aging society, CHIP has been actively studied in recent years. To the  best of our knowledge, both CHIP and the associating diseases have  causative relationship with the increase of inflammation. Moreover,  alterations in the immune system caused by CHIP-  associated muta- tions might play pivotal roles in the pathogenesis of autoimmune dis- eases and solid tumors. Therefore, targeting inflammation with the  help  of     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');

    }
    function mixColors(colorA, colorB, amount) {

            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {
        const hue = Math.floor(Math.random() * 360);
        const bg = hslToHex(hue, 45 + Math.floor(Math.random() * 20), 16 + Math.floor(Math.random() * 70));
        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {
        const base = palette || {
            primaryColor: '#2563eb',
            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',
            inputBorderColor: '#cbd5e1',
            chatBubbleBotBg: '#f3f4f6',
            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {

        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');

    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

        if (sender.includes('error')) el.classList.add('error');

            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;

            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));

            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');

    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
</body>
</html>
