stá imbricada en la memoria   colectiva y, no obstante estar nutrida de saberes y prácticas que vienen del pasado, la cocina siempre está   resignificando este legado, actualizándose con la adopción de nuevos ingredientes, técnicas y sabores.   Política para el conocimiento, la salvaguardia y el fomento de la alimentación y las cocinas tradicionales de Colombia :   Ministerio de Cultura, 2012  Un Atlántico vivo 1  P equeño en extensión comparado con el resto de los  departamentos de la región Caribe, el Atlántico, visto   desde sus municipios y veredas, revela un rostro añe- jo de poblaciones establecidas mucho antes que los lí- mites político-administrativos; un rostro en donde la   cocina  montuna,  la  talla  en  madera,  la  alfarería  y  el    arte de tejer las fibras vegetales, representan un sím- bolo de permanencia.  Su capital, Barranquilla, es una ciudad cos- mopolita,  portal  histórico  de  inmigrantes  y  merca- deres que, gracias a su posición como puerto de mar   y  río,  hoy  recibe  barcos  con  contenedores  de  todo  el    mundo y afinca en ello su noción de progreso. Tal vez   por  ello  existe  en  el  imaginario  «currambero» 2   una   idea de que lo urbano mantiene a la ciudad conectada   con  el  mundo,  impulsándola  a  la  continua  novedad,    1  Este texto recoge el análisis elaborado por el equipo de traba- jo interdisciplinar que realizó un recorrido por el departamento   en el marco del Concurso de Cocina Tradicional «Atlántico Sabe  Rico». Se trata de una descripción y aproximación etnográfica a  las realidades actuales de la cocina como hecho social, que pre-  tende  complementar  la  contextualización  histórica  de  las  coci-  nas  del  departamento  del Atlántico  propuesta  en  el  primer  ca-  pítulo.     2   Gentilicio  popular  aplicado  a  los  barranquilleros,  derivación   de  Curramba , pronunciación inversa de las sílabas de la abrevia- tura  Barranq.  (q-rran-ba)  que,  según  Chelo  De  Castro,  utilizaba    el periodista barranquillero Juan Eugenio Cañavera en Bogotá a   mediados del siglo XX. Una costumbre de «voltear las palabras»  muy extendida en la ciudad. muchas  veces  tras  una  ilusión  de  modernidad.  Pero    como  buena  ciudad  capital,  Barranquilla  sigue  sien- do el lugar de confluencia de gentes de todo el depar- tamento, en una relación que es mucho más evidente   en el terreno de la alimentación y que se materializa   en el mercado público, lugar que, como bien lo ha ex- presado el maestro Enrique Morales en el primer capí- tulo de este texto, «era y es la sumatoria de los habe- res alimenticios de todo el departamento».  Sin embargo, para muchos citadinos el res- to del departamento sólo existe cuando se es propie- tario  de  tierras  para  cultivos  o  ganadería,  cuando  se    tiene parentela en alguno de los municipios o cuando   toman  una  troncal  para  viajar  a  otra  ciudad.  Enton- ces, y gracias a las eventuales paradas en los puestos   de comida de la carretera, se revela una amplia mues- tra  de  los  productos  y  preparaciones  que  cada  lugar    exhibe con orgullo.  Recorrer  el  Atlántico  desde  sus  provincias   es  sabroso  y  placentero,  especialmente  cuando  nos    adentramos  en  la  convivencia  y  descubrimos  cos- tumbres y tradiciones asociadas a su origen mokaná,   como  la  siembra  y  cosecha  de  yuca,  o  a  su  herencia    africana,  legado  de  cuando  éramos  parte  del  Bolívar    Grande.   Álex Quessep   Johnny Meca \n49  Luciana Escamilla, dulcera de Candelaria. \n50 A tlántico  sabe rico  También los hombres son protagonistas en la cocina atlanticense. \n51 U   n Atlántico vivo  La  perenne  mandioca,  el  millo,  el  maíz  sa- razo,  el  guandú,  el  bocachico,  la  arenca,  el  sábalo,  el    moncholo,  el  pato  ahumado  y  el  cerdo,  son  un  cla- ro ejemplo de lo delicioso que es conocer el Atlántico   a través de sus cocinas. Todos estos ingredientes en- tran a formar parte de la gala de devotas y extraordi- narias cocineras 3  que, despiertas desde la madrugada,  trillan, pilan, amasan, envuelven y entregan al fuego   en un viejo y curado caldero, ya sea sobre una horni- lla o sobre los leños que arden bajo la paleolítica tria- da de piedras que comúnmente llamamos binde.  Usualmente, al hablar de las cocinas tradi- cionales nos referimos solo a «platos típicos», prepa- raciones exóticas y estereotipadas que muchas veces   dejan  por  fuera  la  importancia  de  nuestra  alimenta- ción  cotidiana  como  hecho  social.  El  reconocimien- to  de  la  cocina  tradicional  es,  en  este  sentido,  fun- damental,  porque  se  trata  de  un  fenómeno  cultural    antes que de un fenómeno turístico como muchas ve- ces  se  quiere  dar  a  entender;  es  alimenticio  y  ritual    antes  que  recreativo;  está  directamente  relacionado    con necesidades básicas, con seguridad alimentaria y   con  sistemas  de  creencias.  Hay  que  recordar  que  en    su proceso de elaboración se involucran prácticas ri- tuales, conocimientos antiguos, técnicas, costumbres   y  comportamientos  comunitarios.  Ello  permite  que    dicho proceso se convierta en un complejo fenómeno   colectivo que se inicia con la siembra de los productos   y culmina con un plato servido en la mesa, y pasa a   ser un espacio social, ya sea en la intimidad del hogar,   a la orilla de la carretera o en una improvisada troja.  3  Nos referiremos aquí a cocineras debido a la predominancia fe- menina en el oficio, si bien debemos resaltar la presencia de ha-  bilidosos hombres en nuestras cocinas tradicionales. Es  importante  reconocer  que  muchos  as- pectos de la vida cotidiana, sobre todo la forma como   nos alimentamos (debido a su proceso de creación, re- creación y transmisión) hacen parte fundamental de   nuestra herencia cultural. Así, muchas preparaciones   de  la  cocina  tradicional  pueden  no  ser  extraordina- rias,  vistosas  o  exóticas,  pero  son  un  sólido  referen- te identitario para la comunidad, pues representan la   acumulación  de  su  experiencia  cultural  (pasado  co- mún) y son un legado adaptado a las necesidades ac- tuales (presente). Apelar  a  la  memoria  de  nuestros  adultos   mayores es importante en la construcción de nuestro   discurso  cultural,  pues  es  tan  subjetiva  como  sabia,    porque su anclaje está basado en las experiencias, en   marcas simbólicas y materiales y en entender que esa   memoria y conocimiento fue forjada como objeto de   disputas, intereses, conflictos y luchas. Nuestra coci- na tradicional está en sus manos y sus memorias. Me- morias que dejan huellas a través de las costumbres   y hábitos de cocina, saberes que generan sabores, que   demuestran que lo sencillo de la vida se siente con sa- bor a pueblo.  Las visitas realizadas a los veintitrés muni- cipios del Atlántico nos dieron una visión más acerta- da  de  los  distintos  universos  culinarios  del  departa- mento y del contexto socio-cultural de sus cocineras.   Nos  interesaba  registrar  aspectos  claves  de  sus  coci- nas  como  sus  fogones,  las  huertas  de  los  patios,  las    técnicas utilizadas, los utensilios, la colaboración del   núcleo familiar, en resumen, sus realidades actuales,  \n52 A tlántico  sabe rico  sus  necesidades  y  motivaciones.  Poder  registrar  los    oficios en su propio contexto permitió ahondar en la   descripción y conocer de primera mano las realidades   de  los  adultos  mayores  y  sus  familias.  Las  activida- des cotidianas que se desarrollan en los ambientes se- mi-rurales de nuestro departamento también contri- buyen a entender el contexto en el cual se desarrollan   actividades socio-culturales centrales como la cocina   y la alimentación. Las cocinas tradicionales de los pueblos del  Caribe  colombiano,  sobre  todo  aquellas  que  tienen    origen  y  sustento  en  la  ruralidad,  se  conservan  y  se    divulgan a través de la tradición oral, se nutren de la   biodiversidad  de  este  territorio,  se  enriquecen  con  el    trabajo de las manos laboriosas del campo y se dina- mizan gracias a la creatividad de su gente. Son el pro- ducto de un gran laboratorio que mezcló inicialmente   la herencia indígena, el aporte africano y la influencia   europea, y se sigue enriqueciendo de préstamos a es- cala nacional y global, en especial de la cultura árabe. 4  4   Colombia,  y  en  especial  la  costa  Caribe,  fue  receptora  desde   finales  del  siglo  XIX  de  diversas  oleadas  migratorias,  siendo  la    de  los  sirios,  libaneses  y  palestinos  una  de  las  más  destacadas.    Por esta razón el Ministerio de Cultura reconoce a la árabe como   una de las influencias étnicas más importantes de nuestro país,   y esta influencia se hace más evidente en el mundo de la cocina.   Morder un turrón de nueces de Rabat en el Caribe colombiano, es   descubrir que está hecho de coco, millo, piña o guayaba, pues la   cocina árabe y la de estas costas colombianas comparten espe-  cias y una particular sazón que las hermana. El patrimonio cul-  tural  de  esta  población,  que  ocupa  el  primer  lugar  en  las  tasas    migratorias de Colombia (forzadas en su desplazamiento) es uno   de los más grandes aportes y pilares que definen la identidad de   la cocina colombiana. Recetas como la boronía (ensalada de be-  renjenas con plátano maduro y guiso), cuya raíz se deriva del vo-  cablo árabe  Al’Boroni  que significa berenjena, o los guisos del Pa-  cífico, con hierbas de azotea (orégano, albahaca morada, cilantro   cimarrón y menta) representan la pluralidad de las viandas de la   región del Magreb. El  departamento  del  Atlántico  está  muy   marcado  por  la  actividad  y  recursos  del  río  Magda- lena, y aunque los más beneficiados con ello son los   municipios  ubicados  en  su  ribera,  todos  comparten    los  rasgos  más  sobresalientes  de  la  cocina  ribereña,    con algunas variaciones en la preparación y la inclu- sión o exclusión de algún ingrediente. Por ejemplo, los   sancochos  y  las  mazamorras  tienen  una  base  com- partida  extensamente,  aunque  cambien  algunos  in- gredientes que caracterizan un contexto más local.   La cocina del Atlántico es una cocina tropi- cal diferenciada, llena de combinaciones inesperadas.  En un viaje expreso a través de la conciencia  que traspasa fronteras socioculturales, los atlanticen- ses podemos pagar esa deuda que tenemos con nues- tra identidad, que no sólo entró por el muelle de Puer- to  Colombia;  nació  monte  adentro,  en  la  tierra  viva,    sembrada  por  manos  indígenas  y  mestizas;  navegó    por sus aguas dulces, generosas en pesca; hizo sonar   tambores libertarios y encendió las mismas velas que   alumbraban  las  barrancas  de  San  Nicolás.  Sólo  que    un día alucinó el anhelado progreso de la urbe y aban- dono su génesis, olvidando las cuevas custodiadas por   viejos ancestros. 5   En este viaje podemos hacer algunas clasifi- caciones teniendo en cuenta la geografía humana del   territorio  recorrido.  Así  pues,  encontramos  un  gran    grupo de alimentos y preparaciones de origen indíge- na  diseminadas  por  todo  el  departamento  pero  que    5  Fragmento del mito de las cuevas custodiadas por sabios ancia- nos de la comunidad mokaná. \n53 U   n Atlántico vivo  Pesca con cordel en la desembocadura del río Magdalena. \n54 A tlántico  sabe rico \n55 U   n Atlántico vivo \n56 A tlántico  sabe rico  encuentran  mayor  representatividad  en  poblaciones    como Tubará, Galapa, Malambo, Baranoa y Piojó. En- tre ellos se destacan todos los productos derivados de   la  yuca  y  el  millo,  arepas,  chichas,  bollos,  pasteles  y    dulces.  El  cazabe,  por  supuesto,  ocupa  un  puesto  de    honor entre estas riquezas indígenas por su resisten- cia  a  desaparecer  y  por  la  importancia  que  ha  teni- do  como  símbolo  del  adelanto  tecnológico  de  nues- tras poblaciones originarias. Otro plato que sin duda   representa  la  sabiduría  indígena  para  aprovechar  al    máximo los recursos disponibles es el rungo de chivo . 6   Generalmente  el  rungo  es  asumido  como   una preparación de ascendencia indígena, un legado   de los pueblos que habitaron nuestra región; sin em- bargo, algunos académicos atribuyen a esta prepara- ción una base africana porque hay referencias de que   era un potaje espeso hecho de pescado, arroz, legum- bres, plátano y yuca, muy consumido en el área de la   Depresión Momposina por los bogas que navegaron el   Magdalena durante años. Lo cierto es que en nuestro   departamento  hacía  parte  de  la  dieta  de  los  pueblos    indígenas  y  muestra  de  ello  es  que  lo  comparten,  al    menos, los municipios de Galapa, Tubará y Piojó (bas- tiones indígenas del Atlántico); en éste último la pre- paración recibe el nombre de  sopa de mapalé .   6  Arius spixii , un pez endémico que se encuentra en aguas mari- nas costeras poco profundas y estuarios salobres, lagunas y bo-  cas de ríos. Es comúnmente conocido como chivo cabezón, chivo   mapalé o chivo chaqueta azul.   El pescado, siempre presente  En otro grupo podríamos clasificar las preparaciones   hechas  con  pescado. Atlántico  cuenta  con  una  enor- me  riqueza  hídrica,  pues  aparte  de  la  influencia  del    mar Caribe, el río Magdalena y el canal del Dique, casi   todo el territorio está bañado por cuerpos de agua tan   importantes  como  el  embalse  del  Guájaro  y  las  cié- nagas  de  Luruaco,  Tocagua,  Mallorquín,  Totumo,  Sa- banagrande, Convento, Malambo, Santo Tomás y Rin- cón (lago del Cisne) e innumerables caños y arroyos.   Esta diversidad de ecosistemas acuáticos hace que, a   pesar de las amenazas a las que están expuestos, ten- gamos  acceso  a  una  variedad  considerable  de  espe- cies.  Gracias  a  ello  todo  el  departamento  está  inun- dado  de  sancochos  como  el  de  bocachico,  sábalo  o    bagre; además, podemos comer mojarra lora frita sa- cada  del  Guájaro,  arencas  asadas  y  fritas  de  Suan  o    Santa  Lucía;  en  Semana  Santa  disfrutamos  el  salpi- cón de moncholo o lisa, 7  y en algunas ocasiones, para  el descanso en familia, afloran platos icónicos como el   cabrito y la picada de huevas o de macabí.    7  Mugil incilis .  Fotografía página anterior:  La laguna de Luruaco. \n57 U   n Atlántico vivo  Aunque  en  todo  el  departamento  el  pesca- do es uno de los productos más apetecidos, podemos   destacar zonas en las que su consumo es mucho más   habitual  debido  a  su  ubicación  y  a  que  predominan    oficios como la pesca en la economía de subsistencia   familiar. Por ejemplo, toda la zona del cono sur (Suan,   Santa Lucía, Campo de la Cruz y Manatí); la zona del   embalse del Guájaro (Repelón, La Peña, Aguada de Pa- blo); la ribera del Magdalena (Ponedera, Palmar de Va- rela, Sabanagrande) y en la costa sobre el mar Caribe   (Puerto Colombia, playas de Juan de Acosta).  La  arenca 8   asada  o  frita  con  yuca  cocida  o   bollo de yuca es uno de los desayunos más tradiciona- les de toda la región del canal del Dique y la ribera del   8  Triportheus magdalenae.  Magdalena. En Suan, las arencas preparadas por Mar- tha Gutiérrez tienen un sabor especial que ella atribu- ye a que le gusta «jugar» con el pescado. Es una de las   pocas  mujeres  que  adoban  la  arenca  antes  de  asar- la,  y  dice  que  en  eso  radica  su  éxito  y  que  sigue  ex- perimentando  para  llevar  a  la  mesa  sus  mejores  sa- bores, siempre con ingredientes naturales. Además de   Martha, cerca al Dique está Nancy Cantillo, en Santa   Lucía, otra de las cocineras encargadas de resaltar la   importancia de la arenca en la dieta del sur del depar- tamento. A  orilla  del  puerto  de  Suan  otro  de  los  per- sonajes reconocidos por sus desayunos con arenca es   Ana Palmera, una matrona que lidera una familia de   tres generaciones de cocineras tradicionales que com- pletan Liliana y Liceth, hija y nieta respectivamente.   Pescado abierto y secado al sol. \n58 A tlántico  sabe rico  El chinchorro o atarraya, una de las artes de pesca más usadas en el Atlántico, tanto en agua dulce como en el mar. \n59 U   n Atlántico vivo  Siguiendo  el  recorrido  río  abajo,  en  direc- ción  a  su  desembocadura,  nos  topamos  con  Ponede- ra,  un  territorio  que  cuenta  con  suelos  muy  fértiles    debido  a  su  estrecha  relación  con  el  río  Magdalena,    por los islotes que la sedimentación ha ido formando   frente a su puerto. Fruto de esa relación se destaca la   ahuyama  como  uno  de  los  productos  más  consumi- dos. Tomasa García dice que su preparación en arroz   es muy conocida siempre y cuando venga acompaña- do de pescado, como claro ejemplo de la relación en- tre la tierra y el río.  Compartiendo la riqueza del Magdalena, si- guiendo el cauce del río unos cuantos kilómetros ha- cia Barranquilla, encontramos en Palmar de Varela el   sábalo, 9  un pescado apetecido por su abundante car- ne, con el que se prepara un exquisito sancocho que   Rosa  Rúa,  una  experta  hacedora  de  pasteles  recono- cida en su pueblo, prepara sin problemas. Este sanco- cho de sábalo también es muy apetecido en los veci- nos municipios de Santo Tomás y Soledad.  Muy cerca de allí, en Sabanagrande, otro de  los puertos importantes en la conexión fluvial y agrí- cola,  Inmaculada  Álvarez  prepara  salpicón  de  mon- cholo 10   con  arroz  de  fríjol  cabecita  negra  y  ensalada   de  ñame,  plato  que  reúne  elementos  fundamenta- les  de  la  identidad  caribe,  tanto  en  técnicas  (salpi-  9  Tarpón atlanticus.  El sábalo es el nombre común de varias espe- cies de peces apreciados por su carne. Tiene la capacidad de vi-  vir tanto en aguas dulces como saladas. Habita en aguas coste-  ras, estuarios y manglares y también remonta grandes distancias   por los ríos. En Colombia, sube por el Magdalena hasta la región   de Honda.   10   Hoplias malabaricus . En algunos lugares también es conoci- do como bululo y es muy apetecido por su exquisito sabor, sin   embargo, su elaboración es muy exigente por lo que solo ex-  perimentadas cocineras se atreven a prepararlo.   cón-ahumado) como en productos (ñame); en combi- nación  de  sabores  (arroz  y  fríjol),  y  en  rituales,  pues    se trata de un plato tradicional de la época de Sema- na Santa. Si  por  el  río  Magdalena  viaja  toda  nuestra   cultura  alimentándonos  y  transmitiendo  saberes  y    placeres, el departamento del Atlántico es afortunado   por  contar  con  otro  importante  eje  cultural/alimen- ticio  como  el  embalse  del  Guájaro. 11   Con  una  exten- sión de más de 14.000 hectáreas, representa la mayor   despensa  de  municipios  como  Repelón  (Rotinet  y Vi- lla Rosa), Manatí (El Porvenir) y Sabanalarga (La Peña   y  Aguada  de  Pablo).  Según  datos  de  la  Organización    de  Naciones  Unidas  para  la Agricultura  y  la Alimen- tación, antes de 1965 la pesca en el embalse era la ac- tividad más importante y de ella vivía la mayor parte   de la población circundante. El pescado era abundan- te, y lo que más se conseguía con facilidad eran el sá- balo, el róbalo, el bagre, la sardinata, el bocachico, el   barbul y la arenca. Los viejos pobladores mencionan   que el pescado alcanzaba para abastecer toda el área   sur del departamento del Atlántico y para enviar so- brantes a los mercados de Cartagena y Barranquilla. 12   Hoy  día,  el  número  de  especies  ha  bajado   considerablemente y las más encontradas son la mo-  11  El Guájaro se encuentra definido como ecorregión estratégica,  y a su vez, es considerado como el segundo embalse más impor- tante por su extensión y productividad dentro de los de su tipo en   el país, según la FAO – Organización de las Naciones Unidas para   la Agricultura y la Alimentación.  12  Organización de las Naciones Unidas para la Agricultura y la  Alimentación  –  FAO,  «Avances  en  el  manejo  y  aprovechamien-  to  acuícola  de  embalses  en América  Latina  y  el  Caribe».  (Méxi-  co D.F.: FAO, 1992).   \n60 A tlántico  sabe rico  jarra  lora, 13   la  mojarra  amarilla, 14   la  chonchita, 15   el   bagre rayado 16  y el bocachico 17  en menor proporción.  Estas  especies  se  guardan  mayormente  para  el  con- sumo local y la venta en los restaurantes de la zona.   La comercialización de la pesca en la región se efec- túa  de  forma  muy  artesanal,  sin  llevar  un  orden  en    el  sistema  de  compraventa  del  pescado  ni  en  la  es- tabilidad de precios. Sin embargo, la introducción del   cultivo  comercial  de  tilapia  roja, 18   debido  a  su  rápi- do crecimiento, amplió la gama de productos y ha po- sicionado  a  varias  asociaciones  de  pescadores  de  la    zona como distribuidores mayoristas de los mercados   de Sabanalarga, Barranquilla y Cartagena. La diferen- ciación que se hace entre los peces criollos del embal- se y los de criadero es el mayor indicador de consumo   en la zona, pues la población local prefiere un plato de   pescado frito adobado solo con sal y pimienta acom- pañado  de  bollo  de  yuca.  Rosa  Cantillo,  una  experi- mentada cocinera de 83 años, de Repelón, recomienda   para esta preparación la mojarra lora y prefiere que se   coma sin limón para no matizar su sabor.  El bocachico es conocido en toda la región y  en  el  departamento  es  un  alimento  verdaderamente    icónico, que lamentablemente, por su escasez actual,   es  muy  anhelado  entre  los  pobladores  de  tradición    13  Oreochromis niloticus  14  Caquetaia krausii  15  Plagioscion surinamensis  16  Pseudoplatystoma fasciatum  17  Prochilodus reticulatus magdalenae    18  Oreochromis mossambicus  pesquera. El sancocho es, indudablemente, una de las   preparaciones preferidas con este pescado. En el mu- nicipio  de  Manatí,  Vilma  Ortega  lo  cocina  con  gran    maestría adicionándole leche de coco, lo que le da un   toque de solemnidad al plato en estos tiempos de es- casez. En Campo de la Cruz, otro de los municipios de   esta zona, el bocachico es aprovechado mediante otra   técnica tradicional, el  cabrito , que es un tipo de prepa- ración muy conocido en el centro de Barranquilla por   establecimientos que se han hecho famosos al popu- larizar  el  plato.  Sin  embargo,  en  Campo  de  la  Cruz,    mujeres como Miriam Salas son célebres por su maes- tría culinaria con este pescado. Esta mujer, con acen- tuados  rasgos  afrocolombianos,  prepara  desde  hace    más de 30 años, en el patio de su casa, toda clase de   pescados debido al legado de su padre, que fue pesca- dor. Vale la pena destacar que, debido a la menciona- da escasez de bocachico, esta misma técnica de asa- do al carbón, con o sin vegetales, es también aplicada   a pescados de otro tipo, como la cachama. 19   Al otro lado del departamento, en su extre- mo más septentrional, a orillas del mar Caribe, el pla- to predominante y emblemático es la picada de hue- vas de pescado. En todos los restaurantes de nuestras   playas  este  plato  es  infaltable,  como  lo  prueba  Jua- na Rodríguez, una mujer que llegó a Puerto Colombia   hace  más  de  30  años  desplazada  por  la  violencia  en    su natal Bolívar y desde entonces se ha convertido en   19   Colossoma  macropomum .  Esta  especie  se  ha  desarrollado   notablemente  mediante  la  reproducción  artificial  o  induci-  da,  multiplicándose  así  su  comercialización  y  consolidándo-  se como una de las más consumidas en todo el territorio co-  lombiano. \n61 U   n Atlántico vivo  una curtida cocinera de los restaurantes porteños. Pi- cadas de huevas y de macabí 20  son su mejor carta de  presentación.  La carne de monte  Además  de  esta  magnífica  riqueza  en  proteínas  ob- tenida  de  las  fuentes  hídricas,  los  habitantes  del  de- partamento disponían, hace algunas décadas, de una   cuantiosa  fauna  silvestre  que  servía  de  complemen- to a la dieta alimenticia. Varias eran las especies fau- nísticas que tenían asiento en los ecosistemas del te- rritorio atlanticense (venado sabanero, tigrillo, conejo,   armadillo, babilla, manatí, hicotea, iguana, micos, pa- tos  y  aves  migratorias),  pero  fueron  desapareciendo    junto  con  la  riqueza  pesquera  a  medida  que  se  iban    transformando  los  paisajes  del  departamento,  pro- ducto de la acción humana. De  esas  especies,  conocidas  ampliamen- te  como  «carne  de  monte»,  hoy  día  se  siguen  consu- miendo en el departamento, sobre todo, las de conejo   y  pato.  Según  los  pobladores  de  Sabanalarga  y  Polo- nuevo el conejo aún es una carne bastante apetecida,   pero es difícil conseguirlo pues se debe cazar preferi- blemente  en  época  de  verano,  a  diferencia  del  pato,    que es criado en corrales familiares para su consumo.   En  ambos  casos  las  carnes  son  ahumadas  antes  de    realizar cualquier preparación. De las más destacadas   20  Albula vulpes.  encontradas en este recorrido están el pastel de millo   con pato ahumado (en Pital de Megua) y el pato ahu- mado guisado (en Polonuevo).   La tradición de los envueltos  El  caso  de  los  pasteles  es  especial  en  nuestra  tradi- ción culinaria. Hechos, por lo general, a base de arroz,   en  nuestro  departamento  este  cereal  se  ha  reempla- zado, en algunos casos, por el millo y en otras ocasio- nes por la yuca.  El pastel conjuga la influencia de las cultu- ras presentes en nuestro territorio, mezclando técni- cas e ingredientes europeos, indígenas y africanos por   igual. Habitualmente, al igual que las hayacas, se tra- ta  de  un  plato  de  fin  de  año,  pues  se  presentan  en- vueltos como un obsequio para compartir. Sin embar- go,  en  nuestra  región  las  hayacas  y  los  pasteles  han    alcanzado  tanta  popularidad  que  se  han  convertido    en platos cotidianos que se preparan a menudo los fi- nes de semana. Es común que las hayacas se preparen   como  pasabocas,  en  ocasiones  especiales  como  bau- tizos y matrimonios, mientras que los pasteles se en- cuentran en ventas caseras como desayuno o en res- taurantes de comida típica.  En  Atlántico,  Pital  de  Megua,  corregimien- to de Baranoa, es el pueblo que más se destaca en la   preparación de pasteles. Allí es común encontrar una   amplia variedad de carnes en los pasteles (cerdo, ga- llina,  pollo,  pato,  conejo,  carnero,  pavo  y  guartinaja).    Corsina de la Asunción y su familia basan su susten- \n62 A tlántico  sabe rico  Amasijos y envueltos, como bollos y pasteles, una tradición esencial de la cocina atlanticense. \n63 U   n Atlántico vivo  to económico en la venta de pasteles que han ido ga- nando reconocimiento sistemático por su calidad y se   han ido posicionando gracias al festival 21  que se hace  en torno a esta preparación.  El pastel de millo con pato ha sido reciente- mente incorporado a la oferta en el mercado, si bien   se trata de una receta tradicional no solo en Pital de   Megua, sino también en otros municipios del departa- mento que aún registran una fuerte presencia del mi- llo por su influencia indígena (Piojó y Tubará). Otro de   los aspectos que vale la pena destacar lo encontramos   en Juan de Acosta, donde existe una particular técni- ca para envolver los pasteles que sobrevive gracias a   Esther Molina, una mujer acostumbrada a vivir en el   campo, cuya cocina está impregnada de recursividad,   creatividad y tradición. Ella conoce de primera mano   la  cocina  de  monte  y  es  famosa  por  sus  pasteles  de    cerdo envueltos en hoja de almendro, algo que apor- ta sabores particulares y que gracias a la permeabili- dad de la hoja contribuye a la fácil eliminación de la   grasa del cerdo.  Otra  de  las  cosas  que  destacan  en  nuestro   departamento  a  nivel  culinario  es  la  elaboración  de    los bollos. Centenares de familias encuentran su sus- tento económico en la elaboración de todo tipo de bo- llos,  siendo  la  yuca,  el  plátano,  el  maíz  y  el  millo  la    21  El Festival del Pastel de Pital de Megua se realiza desde 1993  como estrategia para resaltar esta tradición culinaria, que es   sustento  económico  de  más  de  dos  docenas  de  familias.  En    ese  espacio  festivo,  que  se  lleva  a  cabo  a  finales  de  junio,  se    desarrollan muestras del producto, exhibiciones artesanales y   presentaciones artísticas y musicales. base de una amplia variedad de sabores, tan diversos   como las hojas que se utilizan para envolverlos: pal- ma amarga, plátano y maíz (seco y verde). La elabora- ción de bollos, como bien lo resume el señor Luis Ari- za, 22  es la «representación de las luchas cotidianas de  nuestros  padres»,  la  lucha  por  la  supervivencia  y  la    evidencia de la creatividad y recursividad de nuestras   gentes  para  alimentarse  sanamente  y  subsistir  eco- nómicamente. Como hemos reseñado hasta ahora, al igual  que con otras preparaciones, los bollos de nuestro de- partamento provienen de unas zonas por las que son   reconocidos,  de  acuerdo  con  la  cantidad  de  produc- ción  y  su  calidad.  Por  ejemplo,  Sabanalarga  es  cono- cido por ser el mayor productor de bollo de mazorca   (dulce);  Pitalito  (corregimiento  de  Polonuevo)  es  reco- nocido por la frescura de su bollo de yuca; Luruaco se   destaca por ser de los pocos donde se mantiene la tra- dición del bollo de plátano; en Piojó el de yuca dulce y   el de angelito son representativos, y Ponedera se ha en- cargado de destacar estos productos a través de un fes- tival en el que participan más de doscientos cocineros.  La creatividad y variedad que encontramos  en este producto han hecho que se consolide como el   acompañante  perfecto  de  muchas  preparaciones  de    la región. El bollo de maíz limpio, por su neutralidad,   es  uno  de  los  más  consumidos  en  el  departamento    y  elaborado  frecuentemente  a  gran  escala  o  simple- mente para consumo familiar.   22  Representante de la Asociación de Bolleros de Sabanalarga. \n64 A tlántico  sabe rico  En  Sabanalarga,  conocido  por  sus  bollos   de  mazorca  (maíz  amarillo),  Luis  Ariza,  con  su  por- te  y  estilo  caballeroso  nos  hace  recordar  a  los  abue- los «bien puestos» que a pesar de las dificultades nun- ca dejaron de ser elegantes. Luis puede permanecer al   pie del fogón de leña por horas, pendiente de sus bo- llos, y aun así su postura permanece incólume. Tal vez   por eso sus compañeros de gremio lo han selecciona- do como representante de su asociación, porque ade- más  lidera  las  exigencias  de  mejores  condiciones  de   Luis Ariza, de Sabanalarga, artífice de muy buenos bollos de mazorca. producción  que  no  pongan  en  riesgo  la  salud  de  los    bolleros. Ha sostenido a su familia con la industria del   bollo  de  mazorca,  ilustre  representante  de  la  cultu- ra sabanalarguera, de los más consumidos en Barran- quilla, aunque él mismo, destaca también el papel de   otros  productos  derivados  del  maíz  importantes  en    nuestra alimentación como la colada, las arepas y los   buñuelos. En  Luruaco  se  niega  a  desaparecer  el  bollo   de plátano que prepara Guadalupe Muñoz. Este bollo   es  de  los  más  recordados  por  nuestros  abuelos  pero    su comercialización no ha sido extensiva, por lo que   se ha reducido a contextos más locales. ‘Guada’, como   todo el mundo la conoce en el pueblo, es una de esas   matronas de carácter recio que sabe hacer de todo y   todas sus preparaciones son reconocidas por su cali- dad. Ha sido una incansable defensora del frito y otras   preparaciones,  aparte  de  la  arepa  de  huevo.  A  pesar    de que reconoce el impulso y el papel que la arepa de   huevo ha jugado en la economía del municipio, Guada   quiere que su pueblo no solo se conozca por este pro- ducto, sino que se reconozca la diversidad de prepara- ciones que hacen parte de su universo culinario. Entre   ellos, el bollo de plátano. Piojó también tiene su especialista en bollos.  Marcela Imitola es el fiel ejemplo de la madre amoro- sa que consiente a sus hijos, pero también tiene el ca- rácter y tesón para sacar adelante a toda su familia a   punta de su esfuerzo diario en la cocina. Es reconoci- da por sus bollos, que son de los mejores del departa- mento,  aunque  no  es  lo  único  que  prepara.  Marcela   \n65 U   n Atlántico vivo  Emprendimiento familiar para la elaboración de bollos de yuca en Polonuevo. \n66 A tlántico  sabe rico  se ha especializado en bollos dulces, como el de yuca   con panela envuelto en hojas de palma amarga, árbol   célebre de Piojó, y el de «angelito», llamado así porque,   según  la  tradición  oral  de  nuestros  pueblos,  se  solía    regalar el 1 de noviembre, día de Todos los Santos, co- nocido en nuestra región como el «Día de los angeli- tos» . 23  Se trata de un bollo de maíz blanco, endulzado  y aderezado con coco y anís, que se caracteriza por un   color  violáceo  que  puede  ser  obtenido  de  la  hoja  del    maíz o de una hoja conocida como «pintabollo» . 24  Esta  es extraída de los bosques de nuestra región pero exi- ge  un  amplio  conocimiento  de  los  mismos,  pues  las    cocineras más curtidas dicen que de ese arbusto sólo   23  Esta tradición fue desplazada por la celebración de  Halloween .  24  Chamissoa altissima.  Es un arbusto relativamente común en ca- minos, orillas de parcelas y cultivos perennes en todo el trópico.   la hembra 25  sirve para teñir el bollo, ya que el macho  no da ese color morado característico del bollo de an- gelito. La recolección de las hojas de pintabollo es en- comendada  a  esposos  o  hijos  que  por  su  sabiduría  y    conocimiento  del  campo  pueden  recolectar  las  indi- cadas.    Como  lo  mencionamos  al  inicio,  las  sopas,   sancochos, mazamorras y coladas conocidas en la re- gión son preparaciones extendidas por todo el territo- rio nacional que encuentran particularidades en la in- clusión  de  algunos  ingredientes,  pero  que  en  general    mantienen  una  base  generalizada.  En  nuestro  depar- tamento se preparan sancochos y sopas con carnes de   res,  cerdo,  pescados,  pollo,  gallina  y,  en  menor  canti-  25  Existen dos variedades. La variedad  altissima  tiene inflorescen- cias pálidas y color paja o crema, y la  rubella  tiene tépalos y ova-  rios rojizos o morados, que se vuelven negros al secarse. Ésta últi-  ma variedad es la conocida por nuestras cocineras y campesinos   como «pintabollo hembra», ideal para teñir los bollos.  El peto es otra de las deliciosas preparaciones que ofrece el maíz. \n67 U   n Atlántico vivo  dad, con pato y conejo. Se suelen preparar con cual- quiera  de  estas  carnes  como  ingrediente  principal  o    mezclados con granos como el guandú, la lenteja, la  zaragoza, la arveja o el fríjol cabecita negra.    En  los  restaurantes  especializados  en  este   tipo de platos se destacan las sopas de mondongo, de   rabo,  de  zaragoza  con  paticas  de  cerdo  y  de  guandú    con carne salada, al que nos referiremos más adelan- te.  En  nuestro  recorrido,  aparte  de  las  que  ya  men- cionamos  preparadas  con  pescado,  encontramos  la    sopa  de  fríjol  cabecita  negra  con  carne  salada.  Una    sopa  poco  comercial,  reservada  para  la  cocina  fami- liar cotidiana, que Gloria Cano, en Galapa, se encargó   de preparar haciendo énfasis en esta variedad de fríjol   como un ingrediente significativo de la cocina casera   y una alternativa rápida frente al guandú.   Siguiendo  en  esa  línea  casera,  reservada  a   la alimentación familiar, se encuentran las coladas y   mazamorras como reflejo de la recursividad para ha- cer  frente  a  las  dificultades  económicas.  En  ese  ca- mino  aparecieron  recetas  muy  conocidas,  como  la    colada o mazamorra de maíz sarazo y otras muy es- peciales, como la colada de berenjena, de Barranqui- lla;  la  mazamorra  agria  de  Piojó  y  la  mazamorra  de    plátano  maduro  con  ahuyama  y  arroz  que  prepara    una cocinera insigne de Suan. Encontrar  una  colada  de  berenjena  en  Ba- rranquilla se explica por la influencia que ha tenido la   cocina árabe en la región Caribe, y en este caso especí- fico se le debe a Josefa Morato, cocinera oriunda de Cór- doba,  que aprendió la receta de una de sus abuelas. La  mazamorra  agria,  por  ejemplo,  es  una   preparación  muy  conocida  en  Piojó,  y  María  Matilde    Jiménez de Utria es una de las cocineras más recono- cidas allí, gracias a esta receta. Esta entrañable abuela   destaca que, en la cocina de buena calidad, sana y tra- dicional está el secreto de su vitalidad a los 91 años.   Su padre fue agricultor, por eso ella está muy familia- rizada con los ingredientes nativos de la zona, maes- tría que demuestra no sólo en preparaciones como la   mazamorra  agria  sino  también  en  el  amplio  conoci- miento de plantas medicinales. Este  capítulo  de  mazamorras  lo  cierra  la   ‘niña  Geo’,  Georgina  Guerrero;  una  de  las  cocineras    más  experimentadas  y  versátiles  de  Suan.  Ella  pue- de hacer bollos, fritos, dulces, arroces o sopas, pero su   nombre  está  fuertemente  ligado  a  la  mazamorra  de    plátano  maduro  con  ahuyama  y  arroz,  acompañan- te  perfecto  del  pescado  a  la  hora  del  almuerzo,  pero    que  también  se  puede  servir  en  la  tarde  como  cena.    La ahuyama es uno de los productos más cultivados   en Suan, de allí que se prepare desde mazamorra has- ta arroces y motes con este producto.  Las otras carnes  Ya hablamos de la relevancia de las carnes de monte   y pescados en la dieta atlanticense, sin embargo, de- bemos destacar que nuestra cocina recibe también la   influencia de los bovinos traídos por los europeos. La   res y el cerdo son aprovechados al máximo en la coci- na tradicional de la región, y en el departamento del  \n68 A tlántico  sabe rico  Gloria Cano, de Galapa, preparando la sopa de fríjol cabecita negra   con carne salada. Atlántico  se  consumen  tanto  los  cortes  de  carne  es- tándar  como  las  vísceras,  las  cuales  son  aprovecha- das  como  fuente  proteínica  y  también  como  recurso    complementario  de  otras  preparaciones.  Es  común,    entonces, comer pajarilla, hígado, bofe, riñón y asadu- ra, entre otras vísceras. De las preparaciones con esas   partes de la res, Atlántico toma prestado de Bolívar −  producto de la influencia que ese territorio ha ejerci- do  y  la  movilidad  de  la  gente  de  nuestra  región−  re- cetas como el higadete con arroz de coco y la lengua   puyada. Estos son platos que se distinguen en la coci- na bolivarense pero hacen parte desde hace muchos   años de la dieta de los pueblos de este lado del canal.  Inicialmente, ante el recio régimen climáti- co  de  la  zona  y  la  dificultad  de  obtener  buenos  pas- tos para las reses, uno de los primeros animales cria- dos con éxito en América fue el cerdo. En el Atlántico   se instalaron porquerizas importantes en Soledad, Ba- ranoa y Sabanalarga desde la época de la ocupación es- pañola. Por ello, es fácil explicar que en estos munici- pios se destaquen preparaciones a partir de esta carne.  El arroz de butifarra soledeño es uno de los  platos que mejor conjuga el sabor del cerdo, transfor- mándolo en una nueva forma de disfrutar sus cuali- dades.  Esta  preparación  se  ha  hecho  famosa  porque    se  ofrece  por  igual  en  las  grandes  ocasiones  o  para    sorprender el menú familiar.  En Baranoa, el «corredor del chicharrón» se  ha consolidado como un referente del turismo gastro- nómico de la zona, donde más de una docena de loca- les a lo largo de la carretera de La Cordialidad 26   se ha  especializado en esta preparación.  En  contraste  con  el  marcado  carácter  co- mercial  de  algunas  preparaciones  de  la  butifarra  so- ledeña  o  del  chicharrón  baranoero,  encontramos  en    este viaje por el Atlántico el arroz de guandú con cer- do,  de  Usiacurí,  una  tradicional  receta  familiar  que,    según Bienvenido De la Hoz, cocinero e historiador lo- cal,  encuentra  su  justificación  en  las  costumbres  de    un pueblo campesino que cultiva él mismo estos pro- ductos. Otro  ejemplo  de  la  conjunción  entre  patri- monio cultural, turismo y subsistencia económica, es   la arepa de huevo con carne molida, de Luruaco. Qui- zás  el  más  exitoso  en  este  aspecto  del  departamen-  26   Arteria vial que atraviesa el departamento del Atlántico y lo  comunica con Bolívar.  \n69 U   n Atlántico vivo  Fritanguera de Luruaco. \n70 A tlántico  sabe rico  to. Se ha consolidado como un emblema de la gastro- nomía  caribeña  y  su  caso  ha  sido  objeto  de  estudio    desde la perspectiva del patrimonio cultural. Más de   ochenta  mujeres  son  las  encargadas  de  mantener    viva esta tradición con la cual han sostenido a sus fa- milias por años.  María  del  Socorro  Castillo  Montero  es  una   de las hijas de la gran matrona de las arepas de hue- vo  de  Luruaco,  Rosa ‘Chiquita’  Montero.  El  reconoci- miento  de  su  madre  la  precede  y  ella  no  defrauda  a    nadie  con  el  sabor  de  sus  arepas.  No  siente  presión    por mantener el legado de su familia, pero para ella y   sus hermanas, es un honor que lucen día a día con sus   puestos de fritos a la orilla de carretera y en todos los   escenarios gastronómicos donde se presentan. Antes de terminar este recorrido es necesa- rio hablar de otra faceta de la cocina del Atlántico, la   faceta dulce. Así como en la comida de sal, nuestro de- partamento es rico en preparaciones dulces que van   desde las tradicionales bolas de chocolate de maíz ca- riaco hasta los dulces de mango, de guáimaro y de za- ragoza roja, pasando por almojábanas, torta de pláta- no, cascos de guayaba y turrón de guanábana.  Estos manjares son posibles gracias a la de- dicación  de  especialistas  dulceras  como  Luciana  Es- camilla,  de  Candelaria;  Esmelinda  Rojano,  de  Santa    Lucía;  María  Jacinta Anaya,  de  Luruaco,  y  otras  más    jóvenes como Bertha González, de Santo Tomás; Ana   Ortega, porteña, y Yamile Pinedo, de Ponedera. Todas   ellas  reflejo  de  cientos  de  mujeres  que  sostienen  su    familia con la venta de dulces preparados a fuego de   leña o de otras que simplemente complacen a sus fa- milias en ocasiones especiales. Todas con la maestría    necesaria  para  proponer  innovaciones  y  mezclas  de    sabor, porque reconocen la importancia de renovar en   los dulces tradicionales y ofrecer un producto sano y   atractivo a los jóvenes que ahora prefieren golosinas   industriales.  Finalmente,  es  necesario  destacar  dos  pro- ductos  poco  conocidos  en  el  departamento,  pero  re- sultan importantes por su potencial para convertirse   en recursos culinarios sostenibles. En primer lugar nos referimos al guáimaro. 27   Este es uno de esos productos lo suficientemente ver- sátiles como para hacer todo tipo de preparaciones. La   semilla es casi esférica, de 1 a 2 cm de diámetro, con   una  capa  de  piel  delgada  de  color  castaño.  Su  nom- bre  está  presente,  sobre  todo  en  la  memoria  de  los    más viejos, quienes en sus relatos lo mencionan como   fuente de vitaminas y una gran alternativa alimenti- cia en épocas de escasez. Actualmente, sin embargo,   se  le  asocia  poco  a  la  cocina.  En  la  vereda  de  Los  Lí-  27  Brosimum alicastrum  Semilla del guáimaro,  Brosimum alicastrum. \n71 U   n Atlántico vivo  mites (Luruaco), mujeres como Ana Olivares Elles han   venido trabajando la semilla del guáimaro para obte- ner harina y preparar empanadas, galletas y deditos.   La  tratan,  además,  como  relleno  y  puede  hacerse  en    café o jugo.  El  guáimaro  un  hermoso  árbol  maderable   que ofrece alimento al tití cabeciblanco, pero que fue   agresivamente  talado  durante  décadas,  al  punto  en    que desapareció casi por completo. Hoy, por fortuna,   se  está  recuperando  gracias  a  diferentes  iniciativas    locales  con  cooperación  internacional,  y  se  proyecta    como  uno  de  los  símbolos  de  este  territorio,  junto  al    tití cabeciblanco. En segundo lugar hablamos de la zaragoza  blanca que se cultiva en Ponedera. Este fríjol, asegu- ran los ponederenses, sólo se puede cultivar en los te- rrenos  fértiles  de  este  municipio.  Es  común  hallarlo    en las huertas y patios de las casas y en mayor escala   en los islotes que se han formado frente al puerto por   la sedimentación del río Magdalena.  Técnicas, procesos, utensilios e ingredientes:   amenazas, transformaciones y revalidaciones  Las técnicas culinarias y los procesos de cocción, pero   igualmente  los  utensilios  que  se  usan  en  la  cocina  y    la  cocina  misma  como  espacio,  constituyen  elemen- tos  del  universo  culinario  de  una  comunidad  como     expresión  cultural .  Este  patrimonio  no  solo  cumple  la    función de alimentarnos; también la de generar cohe- sión social e incluso, convertirse en la base de susten- to económico. Desde los utensilios líticos y cerámicos pre- hispánicos,  las  vajillas  de  totumo,  los  palotes  y  cu- charas de madera, los canastos en fibra vegetal para   transportar  insumos  y  alimentos,  hasta  la  leña  y  el    carbón  como  combustible,  las  técnicas  de  ahumado,    secado o salado y las envolturas en hojas de bijao, pal- ma amarga, plátano o de maíz, hemos consolidado y   mantenido hasta la actualidad un sistema de saberes   que evidencia cuan efectivas son las  técnicas hereda- das, sobre todo, de nuestros pueblos originarios.  Tenemos  una  variedad  tan  amplia  de  bo- llos, que varían no sólo en su ingrediente principal −  sea  maíz,  millo,  plátano  o  yuca−  sino  también  en  la    elección de sus envoltorios: palma amarga, plátano o   maíz,  y  en  las  variaciones  de  sabor  con  una  misma    base  (yuca  con  panela,  angelito  con  pintabollo,  pre- ñao o yema de huevo). Los pasteles, tan extendidos en   todo el territorio atlanticense, también se pueden en- volver en hojas de almendro, plátano o bijao. Todo lo   cual nos indica la claridad y experticia adquirida, a lo  Zaragoza blanca de Ponedera. \n72 A tlántico  sabe rico  Parte de la batería de utensilios de una cocinera atlanticense. \n73 U   n Atlántico vivo  largo de los años en el manejo y aprovechamiento efi- ciente de los recursos disponibles. Se trata de «formas   de  hacer»  que  han  demostrado  ser  eficaces,  que  so- breviven no solo en la memoria de los mayores, sino   que han venido reivindicando la valía de los saberes y   sabores  tradicionales  en  la  alimentación  saludable  y    en la construcción de identidad.  Con  tristeza  constatamos  que  las  transfor- maciones ambientales y el deterioro de las economías   campesinas han llevado a la pérdida de especies y va- riedades alimenticias importantes que tenían en sus   huertas,  y  con  ellas,  invaluables  técnicas  y  procesos    culinarios. Este deterioro, como lo muestran los estu- dios económicos de los últimos años, ha obedecido a   factores  como  las  políticas  agropecuarias,  que  favo- recen la homogenización productiva, la introducción   y  fomento  de  tecnologías  que  afectan  la  producción    tradicional, y el deterioro ambiental de algunas áreas.  Numerosas  especies  de  peces  han  desa- parecido de los ríos por el impacto de la contamina- ción y sobreexplotación de las grandes industrias, así   como a las técnicas artesanales inapropiadas. Por otra   parte,  algunas  especies  de  fauna  silvestre  asociadas    a  la  alimentación,  como  la  hicotea, 28   el  ponche, 29   la   guartinaja 30  o el ñeque, 31  han sido objeto de una caza   28  Trachemys callirostris.  Es una especie de tortuga cuya carne si- gue siendo muy apetecida en época de Semana Santa, a pesar de   la prohibición de su consumo.  29  Hydrochoerus hydrochaeris.  Una especie de roedor también cono- cido como chigüiro o capibara.  30  Cuniculus paca.  Una especie de roedor con el cuerpo en forma  de cerdo.  31  Dasyprocta fuliginosa.  Es un roedor robusto de pelaje cerdoso y  brillante. excesiva,  que  junto  con  la  acelerada  invasión  de  sus    hábitats terminan por mermar considerablemente su   población. Así, carnes que hacían parte de la dieta re- gular    de  los  abuelos  fueron  desapareciendo.  Por  úl- timo,  la  transformación  de  los  bosques  en  praderas    para la ganadería ha privado a la cocina tradicional de   numerosos  frutales  y  condimentos  de  origen  silves- tre. 32   En  ese  mismo  sentido,  los  procesos  de  cocción   a fuego de leña, a pesar de dejar una marca distinti- va  de  sabor,  representan  una  amenaza  no  solo  para    los  recursos  naturales  y  para  el  equilibrio  ecológico,    sino también para la salud de nuestros cocineros tra- dicionales.  Lo  anterior  nos  obliga  a  buscar  soluciones   en conjunto, entre las comunidades, organizaciones y   profesionales interesados en proteger el legado cultu- ral presente en estas técnicas e ingredientes, pero ha- cerlo con alternativas viables, amigables con nuestra   biodiversidad  y  con  la  calidad  de  vida  y  salud  de  los    cocineros.  Es  necesario  prever  acciones  orientadas  a    un adecuado acceso a las materias primas, y estable- cer, en este sentido, proyectos relacionados con la sos- tenibilidad  de  los  recursos  naturales  renovables  que    hoy se encuentran en riesgo. Una de las acciones más urgentes que iden- tificamos luego de este apasionante recorrido, es rei- vindicar  la  importancia,  por  su  valor  nutricional  y    cultural,  de  algunos  productos  que  son  parte  funda- mental  de  la  base  alimentaria  de  nuestro  departa- mento: el millo, el guandú y la yuca.   32  Meca, J. Yances, M.J. y Gutiérrez de Piñeres, V., «Registro del Pa- trimonio inmaterial de los saberes asociados a la cocina del mu-  nicipio de Suan de la Trinidad». (Barranquilla: Secretaría de Cul-  tura y Patrimonio del Atlántico. Informe inédito. 2013). \n74 A tlántico  sabe rico  Bendito millo  (Panicum miliaceum)  El millo es un cereal de tipo pasto de forraje, similar a   la cebada pero de un tamaño más reducido, muy va- lorado en todas las cocinas del departamento (excep- to  el  distrito  capital),  aunque  paradójicamente  es  en    el  mercado  de  granos     de  Barranquilla  donde  más  se   consigue. En la ciudad la mayor parte de la población   no sabe que las famosas «alegrías» que venden las pa- lenqueras son hechas a base de millo.  El  millo  es  un  cultivo  muy  importante  en   Asia y África. Los arqueólogos suponen que su culti- vo era inclusive más común que el arroz hace 10.000   años, especialmente en China y Corea. En nuestro de- partamento  es  importante  debido  a  su  resistencia  a    condiciones  de  altas  temperaturas,  plagas  y  suelos    poco  fértiles.  Hay  muchas  variedades  de  millo  pero    nosotros conocemos el millo criollo 33  (blanco) utiliza- do para el consumo humano y otro que los campesi- nos denominan «cuarentano» 34  (rojizo) utilizado para  alimentar aves y otros animales de cría como el cerdo.   33  Esta variedad se cultiva en el departamento del Atlántico, prin- cipalmente, en el mes de julio y se recoge en enero.   34   Una  variedad  de  rápido  crecimiento,  mayormente  utilizada   para la alimentación de bovinos. El millo es uno de esos productos que, a pe- sar de no haber ganado un reconocimiento comercial   significativo en el país, es conocido ampliamente por   las poblaciones semi-rurales de nuestro departamen- to debido a sus propiedades nutricionales. Sin embar- go, los rendimientos obtenidos del millo pueden con- siderarse bajos en comparación con el potencial que   tienen,  tanto  en  la  alimentación  humana  como  en    la cría de bovinos. 35  Su uso en la cocina puede variar  ampliamente, desde la preparación básica (similar al   arroz),  o como harina para preparar fritos y bollos, o   como colada caliente, o como bebida refrescante. Tal  vez  por  estas  propiedades  alimenticias   en nuestro departamento es conocido y apreciado in- distintamente  en  sitios  con  fuerte  ascendencia  indí- gena o africana.  En Piojó, por ejemplo, Matilde Oliveros pre- para millo con pollo, una variación del famoso arroz   con pollo, que aprovecha la popularidad de ese plato   para introducir el millo en su preparación más básica.   Aunque esta estrategia era aplicada desde hace déca- das  al  arroz  de  pescado  (con  lisa  o  chivo  mapalé),  el    millo con pollo representa una adaptación muy acep- tada del plato original. Matilde resalta que el millo era   el  arroz  que  nuestros  abuelos  acostumbraban  a  pre- parar por considerarlo muy nutritivo; por ello, el mi- llo con pollo o incluso el millo con coco, constituyen   un esfuerzo por mejorar la aceptación de este cereal   a otra escala.   35     Corpoica,    Producción  y  utilización  de  recursos  forrajeros  en  siste- mas de producción bovina de las regiones Caribe y Valles interandino s.  (Bogotá:  Corporación  Colombiana  de  Investigación  Agropecua-  ria, 2005). \n75 U   n Atlántico vivo  En  Pital  de  Megua,  un  pueblo  reconocido   por la preparación de pasteles, Corsina de la Asunción   y su familia han consolidado el millo en este tipo de   preparación. Reemplazan el arroz por millo y lo com- binan con pato ahumado. La misma Corsina, una ex- perta  cocinera  de  pasteles  reconoce  que  a  pesar  de    que se esté «poniendo de moda» el pastel de millo ya   era  una  receta  que  su  abuela Tere  y  otras  matronas    conocían y preparaban hace décadas. Tal vez el caso más emblemático del mane- jo  del  millo  lo  encontramos  en  el  municipio  de  Juan    de Acosta, donde se celebra anualmente, en época de   carnavales, el Festival y reinado del Millo. Y es Catali- na Viloria, a sus 61 años, una de las cocineras del de- partamento preocupadas por destacar el millo como   uno  de  los  productos  básicos  de  la  alimentación  at- lanticense. Esta mujer, con gran destreza, ha vendido   productos hechos con millo desde hace más de vein- te años. Catalina conoce el producto a fondo y por eso   logra  obtener  de  él  diferentes  formas,  texturas  y  sa- bores: empanadas, arepas, chicha, mazamorra o bollo   son algunas de las recetas de esta tranquila pero ha- bilidosa cocinera. Aunque todo lo que prepara con mi- llo es delicioso, Catalina es famosa porque comerciali- za todas las mañanas, con la ayuda de su esposo, una   variedad de fritos hechos a base de millo, en lugar de   maíz: empanadas, arepas saladas y arepas de huevo.  Polifacético guandú  (Cajanus cajan)  El  guandú  o  guandul  es  una  leguminosa  de  alto  va- lor nutritivo que ocupa un importante lugar en la die- ta de muchas personas en Asia, África y Sur América.   Tiene  baja  concentración  de  grasa,  moderada  canti- dad de fibra, buena cantidad de proteína, almidones y   un razonable balance de los minerales esenciales de   toda dieta, siendo, además, una rica fuente de carbo- hidratos, minerales y vitaminas. 36  36  Organización de las Naciones Unidas para la Agricultura y  la Alimentación -FAO. (2007).  Cajanus cajan  [online].   Derecha:  Guandú seco. \n76 A tlántico  sabe rico  En nuestro departamento el guandú –que se  prefiere  verde  y  no  seco–  se  utiliza  para  elaborar  so- pas con costilla o carne salada de res, cabeza de cer- do  ahumado,  chicharrones  o  bocachico,  en  la  pre- paración  de  dulces  en  la  época  de  Semana  Santa  y    mezclado  con  arroz.  Está  presente  todo  el  año,  pero    generalmente  se  cosecha  entre  enero  y  febrero,  cer- cano  a  la  época  de  carnavales,  por  lo  que  la  sopa  de    guandú con carne salá   es considerada el plato icónico  del Carnaval de Barranquilla.  En el caso de la sopa, que es la preparación  más  generalizada,  es  importante  el  plátano  maduro,    que  le  aporta  su  característico  sabor  dulzón  en  con- traste con el amargo del guandú y el salado de la pro- teína que se utilice.  En Sibarco, corregimiento del municipio de  Baranoa,  se  celebra  anualmente  en  el  mes  de  enero    el Festival del guandú y el bollo de yuca. Violeta es la   matrona  de  una  familia  ampliamente  reconocida  en    Sibarco por la calidad de sus preparaciones y su tra- dición culinaria. Si bien el guandú es un producto in- signia en todo el departamento, las sopas preparadas   en  este  corregimiento  tienen  un  sabor  inconfundi- ble. Para Violeta y su familia la cocina representa una   fuente de ingresos sostenida. Uno de sus yernos, Raúl,   es hijo de otro reconocido cocinero de la zona, famo- so por sus bollos de yuca, lo que ha hecho que esta- blezcan un fuerte vínculo familiar que ha trascendido   a nivel de una microempresa, para generarles recono- cimientos  en  importantes  escenarios  gastronómicos    como la feria Sabor Barranquilla.  Sagrada yuca  (Manihot esculenta Crantz)  Las  evidencias  arqueológicas  han  permitido  deducir    que  la  yuca  fue  un  cultivo  extendido  desde  la  época    prehispánica  entre  las  comunidades  indígenas  de  la    región  Caribe  colombiana,  donde  representó  la  base    de la dieta alimenticia. Esta  planta  perenne  leñosa  tiene  unas  po- sibilidades culinarias muy amplias. Sus tubérculos se   consumen cocidos, fritos o asados. En la región Cari- be  se  usa  para  fabricar  una  torta  llamada  «enyuca- do», así como pasteles, carimañolas, rosquetes, pan de   bono, diabolines, bollos (salados y dulces), arepas fri- tas, cazabe (salado y dulce), chicha (fresca y fermen- tada) y como ingrediente en la preparación de sopas.  En  Malambo,  uno  de  los  fortines  indígenas   del departamento y la región, Rita Valega se encarga   de mantener vivo un legado milenario que resalta la   importancia  de  los  primeros  pobladores  de  la  región    y su incidencia en nuestras costumbres. Pocas muje- res  conocen  tan  bien  los  secretos  de  este  producto  y    su importancia como herencia indígena, representada   en la elaboración del cazabe y la chicha. Tubará, así como Malambo, tiene una guar- diana  de  la  herencia  culinaria  de  la  yuca  en  Gloria    González Rolong, una excelente artesana de totumo,   el fique y la tusa de maíz, que traslada la dedicación   de este oficio a la cocina. Un legado de su estirpe indí- gena  mokaná  que  defiende  enérgicamente.  Gloria  se    encarga de hacer preparaciones con yuca y millo, pro- \n77 U   n Atlántico vivo  Venta de yuca y otros productos del campo, municipio de Campo de la Cruz. \n78 A tlántico  sabe rico  ductos que considera legado de sus antepasados indí- genas. Puede preparar con la misma facilidad un pas- tel de yuca o uno de millo, así como chicha de yuca o   de millo. Aunque  existen  casos  representativos  de   municipios como Tubará, donde se realiza el Festival y   reinado de la yuca y el totumo, y Malambo, donde se   han hallado evidencias arqueológicas de su domesti- cación, la yuca es un producto ampliamente cultiva- do, consumido y valorado en todo el territorio atlan- ticense.   La cocina y la fiesta: espacios para      la conservación y dinamización        de la memoria culinaria de nuestros pueblos  La cocina está ligada a todo tipo de celebraciones hu- manas,  es  una  práctica  cultural  que  configura  espa- cios de sociabilidad. En el departamento del Atlántico   se celebran diferentes festivales en honor a productos   alimenticios,  que  nacieron  como  estrategia  de  reco- nocimiento a las prácticas agrícolas de cada territorio   e impulso de la economía local, y se han consolidado   como  escenarios  de  encuentro,  trasmisión  y  revitali- zación del patrimonio cultural de la región.  Baranoa  celebra  el  festival  de  la  ciruela  en   el corregimiento de Campeche, el festival del guandú   y el bollo de yuca en el corregimiento de Sibarco y el   festival del pastel en el corregimiento de Pital de Me- gua. Tubará rinde homenaje a la yuca y el totumo con  un  festival  y  reinado.  Juan  de Acosta  realiza  el  festi- val del millo, donde no sólo resalta la importancia de   este producto a nivel culinario, sino también su apor- te al legado musical de la región. Luruaco ya es famo- so a nivel nacional por su festival de la arepa de hue- vo.  Aguada  de  Pablo  (corregimiento  de  Sabanalarga)    realiza el festival de la mojarra y  Ponedera no se que- da atrás con el reciente festival del bollo. Otros espacios como los carnavales, las fies- tas  patronales  y  la  Semana  Santa  que  cada  munici- pio  celebra  de  forma  particular,  constituyen  escena- rios donde la cocina juega un papel protagónico.  Además de estos escenarios festivos locales,  desde hace varios años se vienen consolidando otros   espacios  con  una  fuerte  agenda  académica  paralela    a  las  muestras  gastronómicas.  El  caso  más  destaca- do es Sabor Barranquilla, que desde hace 10 años se   celebra en la capital del departamento y que además   de las muestras en estand y la amplia agenda de de- bate académico, incluye en su programación presen- taciones de cocineros tradicionales del departamento   que han venido participando en proyectos de investi- gación 37  financiados por la Secretaría de Cultura y Pa- trimonio del Atlántico.   37   Secretaría  de  Cultura  y  Patrimonio  del  departamento  del At- lántico,  «Registro  del  patrimonio  inmaterial  de  los  saberes  aso-  ciados a la cocina de los municipios de Suan de la Trinidad, Saba-  nalarga, Sabanagrande y Piojó», (Barranquilla: 2013 – 2016); «Plan   Especial  de  Salvaguardia  de  los  saberes  asociados  a  las  cocinas    tradicionales del municipio de Luruaco» (Barranquilla: 2015).  \n79 U   n Atlántico vivo  Asimismo,  se  han  venido  fortaleciendo  ini- ciativas de entidades no gubernamentales y alianzas   mixtas como la Red de Investigadores Culinarios 38  y el  programa de formación en cocina tradicional y patri- monio del Atlántico Sabores & Saberes, 39  todas estra- tegias y experiencias muy valiosas a las que se suma   este  concurso  departamental  de  cocina  tradicional     Atlántico sabe rico , como oportunidad de seguir visibili- zando la importancia de nuestras cocinas tradiciona- les como patrimonio.  Las  cocinas  tradicionales  son  nuestro  pa- trimonio cultural más evidente, son la expresión más   simple  de  nuestra  cotidianidad,  lo  que  nos  ha  lega- do una tradición milenaria, pero también, las nuevas   ideas, lo que hemos adaptado a circunstancias espe- cíficas y hemos apropiado para sobrevivir. El patrimonio cultural de las cocinas tradi- cionales  es  un  conjunto  de  emociones,  de  intercam- bios,  de  sabores,  de  olores,  de  movimientos  directa- mente relacionados con las prácticas cotidianas y, en   muchos casos, con dinámicas económicas que sugie- ren una alternativa de sostenimiento.  38   Liderado  por  la  Fundación ATI  desde  2015,  en  alianza  con  el   Museo Arqueológico de Galapa.   39  Desarrollado por la Fundación ATI en 2017 con el apoyo de en- tidades como la Universidad del Atlántico, la Corporación Escul-  tura y el Parque Cultural del Caribe, entre otras.   A manera de conclusión: un aperitivo para   seguir conociendo nuestro departamento   Atlántico  vivo  es  a  la  vez  modernización  y  tradición,    niños jugando «bolita e’ uñita», trepando árboles o co- rriendo  tras  el  reflejo  del  vidrio  de  un  auto,  madres    desprevenidas,  puertas  abiertas,  sonrisa  amplia;  ino- cencia y hospitalidad son parte de los valores que per- viven en la otredad de un mismo territorio. De nuestro   recorrido  queda  claro  que  los  municipios  del  depar- tamento,  sin  contar  Barranquilla,  son  característi- camente  semi-rurales;  Puerto  Colombia,  Soledad  y    Malambo mantienen un espíritu rural, pero se mime- tizan  ante  la  magnitud  de  la  urbe  que  extiende  sus    brazos de concreto, queriendo abarcarlo todo. Ese Atlántico vivo abre una vieja puerta de  madera y encuentra tinajas, pilones, morteros y achio- teras. Se alimenta, es un Atlántico profundo, de varia- dos bollos, sopas, dulces y bebidas. En sus mesones se   envuelven con delicadeza pasteles en hojas de almen- dro y de bijao; se palotean arroces; se hierven sanco- chos y espesos potajes; se fríen arepas de huevo, ca- rimañolas  y  empanadas;  se  desmecha  pescado  para    salpicones y se alegra la estancia con dulce de guái- maro, mermelada de mango y turrón de guanábana.  Un Atlántico vivo siente y degusta una tra- dición culinaria que siempre ha estado allí. La senci- llez  de  una  arepita  de  cazabe  concentra  la  ardua  la- bor de transformación de la yuca, raíz abuela; siente  \n80 A tlántico  sabe rico  Venta de jugos en Sabanagrande, sobre la carretera Oriental.  \n81 U   n Atlántico vivo  y  degusta  la  amorosa  elaboración  de  los  pasteles  de    millo, de yuca o de arroz, la olla donde el animal cria- do  en  las  parcelas  familiares  deja  de  latir  para  con- vertirse en sustento. Donde preparar la tierra para el   cultivo de frutas como la papaya, mango, melón, pa- tilla, maracuyá, forjan las rutas tradicionales del dul- ce,  porque  en Atlántico  se  come  la  alegría,  la  chicha    tiene una amplia variedad de texturas para refrescar,   la  mazamorra  de  plátano  o  maíz  era  la  compota  de    nuestros abuelos y donde el agua de panela es la bebi- da energizante de los trabajadores del campo.  Un Atlántico vivo que sabe rico es aprender  sobre la industrialización del consumo, la permanen- cia de hábitos, las formas de interactuar, la socializa- ción  del  entorno,  la  adaptabilidad  a  la  tecnología.  Es    sentir y entender como nuestros padres atlanticenses   se han fortalecido por los sacrificios de la vida, por el   trabajo  duro,  un  territorio  en  el  que  ellos  son  felices    en mayor o menor medida, pero se sienten tranquilos   y  encuentran  su  recompensa  en  haber  podido  com- partido y enseñar a través de la cocina y del campo. El Atlántico, bañado por un mar cálido, pero  también  acariciado  por  la  brisa  del  río,  somete  a  su   población a una mezcla entre calor, humedad y sabro- sura que converge en una palabra grata y estimulan- te:  rico . Un adjetivo que expresa abundancia, que colo- quialmente se asimila al placer y sobre todo, algo que   resulta  agradable  al  paladar. Así  es  nuestro  departa- mento: sabe a mar, campo, sol, pasto, risa, ingenio, fe- licidad, verde, raro, anhelo, compartir, soledad, hogar,   devoción, reunión, nostalgia, belleza, aire puro, orgu- llo, leña, monte, cuentos, inocencia, provincia, juegos,   ternura,  trabajo,  baile,  artesanía,  calor,  pasión,  amor,    improvisación, ocurrencias; Atlántico sabe a abuelos,   a historia, a pechiche y alcahuetería. Atlántico  es  el  conjunto  de  historias,  sabo- res  y  costumbres  en  el  que  la  cocina  es  el  escenario    central donde se ve crecer a sus gentes, donde gene- ración tras generación se mantiene la unión familiar y  la sazón que caracterizan a una población. Atlántico Vivo es un territorio indivisible de  ciudad y provincia, un espacio alimentado por un pac- to  de  saberes  que  exalta  la  dignidad  de  sus  comuni- dades y degusta la diversidad de su sazón contada en   cada historia de vida.  \n";

    const PDF2_TEXT_EMBEDDED = "82  Atlántico sabe rico  E ntre  más  de  cuatrocientos  inscritos  en  el  marco   del  concurso   Atlántico  sabe  rico   se  seleccionaron  se- tenta  y  dos  candidatos  para  participar  en  la  prime- ra  fase  del  certamen.  Esta  escogencia  inicial  se  hizo    con base en la información suministrada por los par- ticipantes  en  los  formatos  de  inscripción,  tenien- do  en  cuenta  criterios  como  la  descripción  de  la    receta  y  los  ingredientes  utilizados.  Con  todo  el  ma- terial  recibido  el  jurado  procuró  optar  por  prepa- raciones  tradicionales  en  un  número  equilibrado,    de  manera  que  se  evidenciara  la  diversidad  de  pro- ductos  y  técnicas  que  identifican  al  departamento.   Todos los inscritos hacen parte de la pobla- ción de adultos mayores del departamento, la mayo- ría  de  ellos  reconocidos  en  su  comunidad  por  su  sa- zón y dedicación a la cocina. Reseñamos aquí a esas setenta y dos cocine- ras y cocineros, y agradecemos su dedicación y aporte   al patrimonio cultural, contenido en sus saberes aso- ciados a las cocinas tradicionales del departamento.  Gloria Mercedes Cano de Camacho   Nubia Elena Cano Herrera   Ana Elvira Olmos de Carrillo  Violeta Bolívar Viloria  Corsina de la Asunción Urueta   Marlene Esther De la Cruz de Araujo    Evelia Cenith Ríos de Púa  María Esther Gutiérrez Moreno Piedad del Carmen Bovea Ibarra  Martha Isabel Navarro Valega  Bertha María Gonzales Zabaleta  Aida Esther García Pérez  José Polanco Sánchez  Florinda Cecilia Ferrer López  Yamile Isabel Pinedo de Reyes  Julia Mercedes Cáceres Manga  Tomasa Isabel García Porta  Georgina Guerrero Viuda de Ruiz  Martha Judith Gutiérrez Polo  Helena Isabel Palmera Martínez  Luciana Escamilla Gutiérrez  Diana Isabel De La Hoz Rojano  Julia Josefina Fonseca Martínez  Benilda Páez de Leyva  Lilia Elvira Cantillo de Guette  Miriam Rosa Salas de Sandoval  María Matilde Jiménez de Utria  Marcela Sofía Imitola de Montes  Matilde Oliveros Torregroza  Elvira Caguana de Mendoza  Catalina Viloria de Charris  Esther Molina de Charris  Amada Isabel Jiménez Sarmiento  Josefa Morato Martínez  Amanda Alfaro de Llerena \n83  María Esperanza Pacheco De la Hoz  Roquelina Almanza de Castro  Rosa Cantillo Ospino  Ana Dolores Olivares Elles  María del Socorro Castillo Montero  Guadalupe Muñoz de Solano  María Jacinta Anaya Santoyo  Maximiliano López Barrios  Nancy Loyola Reníz Rodríguez  Rosa Emilia Rúa Manotas  Eduardo Enrique Varela Montero  Maritza Dewndney Torres  Luis Ariza Gutiérrez  Bienvenido De la Hoz Mozo  Nilsa Bonifacio Angulo  Seneida Ramos Hernández  Edith Isabel Gil Barragán  María Sanjuanelo de Osorio  Mercedes Belén Gutiérrez Algarín  Rafaela María Marriaga De la Rosa  Bertilda Carrillo de Ortiz  Inmaculada Álvarez Alvarado  Rita Isabel Valega de Escorcia  Carmen Alicia Agresot Acosta  Isabel María Denenrey De la Cruz  María del Carmen Rolong de Padilla  Gloria Esther González Rolong Hermelinda González Granados   Juana Rodríguez Tierra  Álvaro Carrillo Molinares  Ana Ortega Romero  Magdalena Sarabia de Carreño  Nancy Esther Cantillo de Ospino  Esmelinda Rojano Ahumada  Vilma Ortega Cera  Melba Escobar de Berdugo  Rosa Hoyos Escobar A continuación, se describen las 59 recetas  que constituyen tan solo una parte de la riqueza del   universo culinario del Atlántico.  Fue muy importante compilar las recetas a  partir del diálogo y el ejercicio directo con las cocine- ras que las atesoran, de acuerdo con su contexto, su   historia de vida y las técnicas empleadas. Esta inten- ción constituye un paso necesario para volver univer- sales los medios de transmisión del conocimiento cu- linario acumulado por la sociedad atlanticense, en la   que predomina la tradición oral. Los platos de la cocina ancestral del Atlán- tico fueron clasificados en comida de sal y comida de   dulce,  respondiendo  a  la  forma  como  generalmente    lo hacemos en la cotidianidad caribeña, al criterio del   sabor final que posee el plato y a su finalidad. Asimis- mo, la descripción de las preparaciones se realizó de   la manera más fiel posible a la narración de las pro- pias cocineras, intentando, paralelamente, estandari- zar las cantidades descritas en lenguaje cotidiano.  \n84  Achiote:   especia  de  color  rojo  cuya  semilla  es  utili- zada  para  dar  ese  tinte  a  nuestras  preparaciones    de manera natural. Actualmente, también se con- sigue en polvo, sin embargo es recomendable utili- zar la semilla directamente inficionándola en agua   o aceite.  Adobar:  acto que se realiza un par de horas antes de  la  cocción  de  ciertos  alimentos,  utilizando  espe- cias, principalmente.  Arrollar:   hace  referencia  a  los  cortes  transversales   que se le hacen al pescado antes de su preparación   para fraccionar las espinas.  Asar:   cocinar  un  alimento  en  una  plancha,  sartén  o   brasa.  Caldo:   sopa  ligera.  Se  prepara,  sobre  todo,  para  las   personas  en  estado  de  convalecencia  o  afectadas    por el «guayabo».  Cascos:    corte  usado  para  la  guayaba  en  almíbar  y   eventualmente para la papa.  Despresar:    porcionar  los  animales  en  piezas  meno- res, principalmente las aves o animales de corral.   En  diagonal:   corte  utilizado  para  algunos  vegetales   como el apio y la cebolla junca, y también para el   bollo cuando se presenta en picadas.  Escurrir:  colocar un alimento en un colador o escurri- dero después de que se ha freído o lavado.  Freír:    cocinar  un  alimento  en  abundante  aceite.  Es   uno  de  los  métodos  de  cocción  más  populares  de    Glosario mínimo de la cocina caribe  nuestra cocina y forma parte de la mesa diaria y de   la comida de calle.   Guiso:  mezcla básica de tomate, cebolla y ajo cocina- dos en aceite y sal. Los guisos varían según las pre- paraciones en que se utilicen. Generalmente se les   adiciona ají dulce, pimentón rojo, cebollín, cebolla   junca, zanahoria y apio.  Guisar:  se trata de cocinar un alimento, especialmen- te carnes con vegetales, condimentos y hierbas, en   un contenido líquido que no cubra la totalidad de   la pieza. De esta forma el sabor y la sazón se perci- ben en la pieza cocida y en el caldo resultante. Ge- neralmente los guisos son acompañados con arro- ces y tubérculos cuyo líquido les aporta humedad.   Para guisar se utiliza un caldero común o una olla   de presión, dependiendo la dureza de la carne o el   tiempo con el que se cuente.  Hornear:  cocinar una preparación en el calor seco de  un horno. En muchas regiones del caribe colombia- no se utilizan hornos de barro para la elaboración   de amasijos como el diabolín, los panderos y las ga- lletas  dulces. También  son  utilizados  hornos  con- vencionales, especialmente a gas, para las elabora- ciones de pudines y tortas.  Macerar:  dejar las frutas en vino dulce y azúcar, espe- cialmente las uvas o ciruelas pasas que se utilizan   para la elaboración de pudines o tortas.  Machacar:  triturar en el mortero los dientes de ajo u  otros ingredientes de consistencia dura. \n85  Marinar:    procedimiento  que  se  realiza  uno  o  más   días  antes  de  la  cocción,  utilizando  generalmente    especias, licores, grasas de origen vegetal y animal,   salsas y hierbas aromáticas.  Moneditas:  hace referencia a las rodajas de plátano  verde, fritas.  Picar o cortar fino:  cortar los vegetales (tallos, hojas  o frutos) en pedazos no mayores a 3 x 3 mm, apro- ximadamente.  Picar o cortar grande:  cortar un alimento cárnico o  vegetales en dados de 3 x 3 cm, aproximadamente.  Pilar:  retirar la cáscara del arroz, maíz, millo, etc.  Relajar:  filetear o abrir una pieza cárnica (carne roja,  ave, pescado y otros animales de caza).  Rodajas : término usado para designar el corte de al- gunos tubérculos como la papa, la zanahoria, el bo- llo, etc.   Sofreír o saltear:  cocinar piezas pequeñas con poco  aceite.  Sudar:  cocinar un alimento en poca agua o con vapor  de agua u otro líquido. Este método es utilizado ge- neralmente para para cocinar los alimentos en die- tas prescritas o para personas convalecientes.   Tajada:   corte  longitudinal  del  plátano  maduro  y  la   papa para freír.  Trocear:  cortar de manera tosca e irregular.   Equivalencias  Medidas comunes  Mililitro   =   Ml Litro   =   Lt Gramo   =  Gr Kilo   =   Kl Libra   =   Lb Unidad    =  Un Centímetro cúbico =  c.c.  1 litro     =  1.000 Ml 1 Litro    =  1.000 c.c. 1 ml       =  1 c.c. 1 Kilo     =  1.000 gr 1 Libra   =  500 gr Una pizca: un poco menos de una cucharadita Dos cucharadas: 30 gr o 1 oz Media taza o pocillo: 8 cucharadas o un pocillo   pequeño  ¼ de taza o pocillo: 4 cucharadas Una taza o pocillo: 16 cucharadas 1 cucharadita: 7 Ml 1 cucharada: 15 Ml  ½ pocillo: 125 Mililitros  1 pocillo: 250 Mililitros  2 pocillos: 500 Mililitros  Utensilios de totumo. \n86  r ecetario \nLas sopas, los cereales en sus diversas   presentaciones, las carnes y pescados   que se ponen en el asador, los guisos y   sus aromas tentadores, los envueltos y   amasijos de nuestro legado indígena, y   por supuesto, las frituras, conforman esta   primera sección del recetario dedicada a   la comida de sal.   Sabor y sabiduría se juntan en estos   platos para nutrir y restaurar energías   después de la jornada de trabajo, pero   también para complacer paladares,   para activar recuerdos, para celebrar   juntos el regalo de la vida. Cada una   de estas preparaciones honra la   diversidad natural y cultural de nuestro   departamento, enaltece la tradición   culinaria atlanticense y al mismo tiempo   contribuye, con la creatividad de sus   autoras, a la renovación de estos saberes   y prácticas.  a tlántico de sal \n88  Rungo de chivo Ingredientes  1 lb de chivo seco  1 lb de arroz  1 lb de mazorca  300 gr de yuca  300 gr de ñame  1 plátano verde  1 lb de tomate  ½ lb de ají dulce  1 cabeza de ajo  2 cucharadas de aceite vegetal  2 lt de agua  Sal al gusto  Preparación  Hidrate y cocine el pescado durante diez minutos en   agua hirviendo para retirar el exceso de sal. Pasado el   tiempo escúrralo, desmeche y reserve. Pele la yuca, el   ñame y el plátano y córtelos en trozos pequeños.   Pique  finamente  el  tomate,  el  ají  dulce  y  machaque    el ajo. Haga un sofrito con dos cucharadas de aceite   y condimente con sal. Una vez listo, retire y reserve.   Cocine la mazorca en dos litros de agua; una vez co- cida retire, ponga a reposar, desgrane y reserve; con- serve el agua. Agregue los trozos de yuca, ñame y plá- tano al agua en la que cocinó la mazorca.   Cueza  a  fuego  medio  hasta  que  hierva,  agregue  el    arroz  y  cocine  a  fuego  medio  bajo  hasta  que  el  gra- no abra. Incorpore el chivo desmechado junto con el   sofrito, rectifique sazón, cocine durante diez minutos   y sirva.   6 porciones  Cocinera  María del Carmen Rolong de Padilla  67 años    Municipio: Tubará \n89  s opas \n90  Cocinera  Rosa Emilia Rúa Manotas  80 años    Municipio: Palmar de Varela  Sancocho de sábalo  Ingredientes  1 ½ kg de sábalo  1 lb de yuca  6 guineos mafufo  2 cebollas rojas  1 cabeza de ajo   4 ramas de cebolla junca o larga   2 lt de agua   Sal al gusto  Preparación  En una olla grande vierta dos litros de agua, llévela a   hervor  y  añada  la  yuca  y  el  guineo  troceados.  Pique    fino la cebolla en rama, la cebolla roja y machaque el   ajo. Una vez cocidos la yuca y el guineo añada los ve- getales picados.  Condimente el sábalo con sal, porciónelo y fríalo en   abundante aceite a temperatura media. Una vez do- rado, retire, escurra y agregue al caldo en hervor. Co- cine durante diez minutos, condimente con sal y ajo,   rectifique sazón y sirva.  Observaciones  Por su abundante carne, el sábalo es un pescado bas- tante apetecido en la región; se utiliza, sobre todo, en   sopas. Palmar de Varela y Ponedera, municipios veci- nos de la ribera del río Magdalena, son los que más lo   consumen en el departamento.  6 porciones \n91 \n92  Cocin
