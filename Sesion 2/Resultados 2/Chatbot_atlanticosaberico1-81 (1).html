era  Vilma Ortega Cera  59 años    Municipio: Manatí  Sancocho de bocachico con leche de coco Preparación  Condimente los bocachicos con sal y reserve.   Despulpe dos cocos, llévelos a la licuadora, añada 700   ml  de  agua  tibia  y  licue;  cuele  y  exprima  muy  bien    hasta extraer su leche. Reserve.  Pique  finamente  la  cebolla  roja  y  la  cebolla  junca  y    machaque el ajo. Haga un sofrito con dos cucharadas   de aceite. Retire y reserve.  En una olla grande caliente un litro y medio de agua,   agregue la yuca y el plátano previamente troceados.   Añada el sofrito y deje que se cocine a fuego medio.  Caliente el aceite a temperatura media alta y fría los   bocachicos  hasta  dorarlos.  Retírelos  y  llévelos  a  la    sopa. Añada  la  leche  de  coco  y  el  cilantro  finamen- te  picado.  Rectifique  sazón  y  sirva  caliente  con  sus    acompañamientos.  Observaciones  Este sancocho es de los más que más gusta en la re- gión; sin embargo, ante la escasez de este pescado, se   ha  reemplazado  por  otras  variedades  como  el  sába- lo  o  incluso  la  mojarra  comercial.  La  leche  de  coco,    como aditamento, es opcional.  Ingredientes  2 kg de bocachico  ½ litro de leche de coco  ½ lb de yuca  2 plátanos verdes  2 cebollas rojas  2 ramas de cebolla junca  ½ lb de ají topito  1 mazo de cilantro  4 dientes de ajo  ½ lt de aceite vegetal  Sal al gusto 6 porciones \n93 \n94  Sopa de guandú con carne salada Cocinera  Violeta Bolívar Villoria  63 años    Municipio: Baranoa  Ingredientes  300 gr de guandú seco  ½ lb de carne salada (puede ser espaldilla, sobreba- rriga o morro)  ½ lb de ahuyama  ½ lb de yuca  2 plátanos maduros  ½ lb de ñame   2 cebollas rojas  10 ajíes topito  ½ mazo de cebollín chino  ½ mazo de cilantro  1 cabeza de ajo  1 lb de tomate  Comino en grano al gusto  100 gr de achiote  3 cucharadas de aceite   Sal al gusto  2 litros de fondo de hueso blanco: (2 ½ litros de   agua, 1 lb de hueso blanco): Cocinar el hueso en   agua a temperatura media baja hasta que hierva y   reduzca medio litro. Colar retirando el hueso.  Preparación  En  temporada  de guandú  este  se utiliza  verde, de  lo    contrario, seco y se hidrata desde el día anterior.   La carne debe estar salada con anterioridad. Para la   preparación, se lava bien y se corta en cuadros.  Tueste el comino en una olla a fuego bajo. Una vez su   aroma impregne la cocina, retirar y moler hasta ha- cerlo polvo. Reservar.  En  una  olla  pequeña  agregue  el  aceite  junto  con  el    achiote. Cocinarlo a fuego bajo hasta que el aceite se   vuelva rojo. Retirar, reposar, mover y colar.  La ahuyama, la yuca, el plátano maduro y el ñame se   pican en cuadros medianos. La cebolla, el cebollín, el   ajo, el ají y los tomates se pican fino.   Prepare el sofrito en una olla con el aceite achiotado   y una vez listo agregue el cilantro picado. Reservar.  Para  hacer  la  sopa,  vierta  el  fondo  de  hueso  en  una    olla grande, cocine a fuego alto hasta que hierva, agre- gue el guandú, la carne, la yuca, el ñame y la ahuya- ma. Condimente con comino al gusto. Cuando todos   los  ingredientes  se  ablanden,  se  adiciona  el  plátano    maduro junto con el guiso. Se deja cocinar durante 15   minutos o hasta que el plátano se cueza. Rectifique la   sal teniendo en cuenta que la carne viene salada. Sir- va en plato hondo con sus acompañamientos.    6 a 8 porciones \n95 \n96  Sopa de fríjol cabecita negra con carne salada        Ingredientes  1 lb de fríjol cabecita negra  300 gr carne salada    3 tomates    ½ lb de yuca   ½ lb ñame   1 mazo de cebollín   ½ mazo de cilantro    1 cebolla roja    6 dientes de ajo  3 cucharadas de aceite achiotado   Sal al gusto    Cocinera  Gloria Mercedes Cano de Camacho  81 años    Municipio: Galapa  Preparación  Remoje  el  fríjol  desde  el  día  anterior  con  suficien- te agua, de manera que lo cubra. Si sala la carne en   casa, hágalo con tres días de anterioridad cubriéndo- la con sal y dejándola reposar sobre un lugar alto de   la cocina. Puede utilizar sobrebarriga, lomo ancho, te- tafula, morro o espaldilla con un corte delgado. Tam- bién  puede  comprar  la  carne  ya  salada  en  un  lugar    de confianza.  Para achiotar el aceite: mézclelo con el achiote y en   una  olla  pequeña  cocine  a  fuego  bajo  hasta  que  el    aceite se vuelva rojo. Retire, ponga a reposar y cuele.  Pique  finamente  el  tomate,  la  cebolla,  el  cebollín,  el    ajo y el cilantro. Haga un sofrito en aceite achiotado   y condimente con sal dejando el cilantro para el final,   una vez el guiso esté tierno y jugoso. Reservar.  En  una  olla  grande  añada  suficiente  agua  y  lleve  al    fuego hasta que hierva.  Lave  bien  la  carne  salada,  córtela  en  tiras  largas  y    agregue al agua en hervor. Igualmente, escurra los fri- joles, corte en trozos los tubérculos y añada a la olla.   Deje que todo se cocine hasta que los fríjoles y los tu- bérculos  estén  blandos;  incorpore  entonces  el  guiso,    mezcle bien y rectifique el punto de sal para adicio- nar si lo requiere, ya que la carne salada aporta la sa- zón suficiente.   Sirva caliente acompañada con arroz blanco.  6 a 8 porciones \n97 \n98  Cocinera  Matilde Oliveros Torregrosa  59 años    Municipio: Piojó  Millo con pollo Ingredientes  1 kg de millo  1 kg de pollo  1 lb de tomate  2 pimentones rojos  ½ lb de ají topito  2 zanahorias  2 cebollas rojas  1 cabeza de ajo  200 ml de vinagre de frutas  250 ml de aceite vegetal  100 gr de achiote  Sal, comino y pimienta al gusto.  Preparación  Deje el millo en remojo desde la noche anterior.  Para achiotar el aceite, utilice una olla pequeña, aña- da el aceite junto con el achiote y cocine a fuego bajo   hasta  que  el  aceite  se  vuelva  rojo. Agregue  la  mitad    del aceite al millo previamente escurrido y reserve.  Cocine  el  pollo  en  abundante  agua  condimentado    con sal y recortes de vegetales. Una vez cocido, retire,   deje reposar, desmeche y reserve.   Pique  finamente  los  vegetales  (tomate,  pimentones,    ají  topito,  cebolla  larga,  zanahoria  y  ajo)  y  haga  un    sofrito  con  el  resto  del  aceite  achiotado.  Condimen- te con vinagre, sal, pimienta y comino al gusto. Una   vez  hierva  añada  el  pollo.  Cocine  durante  10  minu- tos. Reserve.  Cocine  el  millo  en  un  caldero  grande  con  suficiente    agua  que  lo  cubra,  condimente  ligeramente  con  sal,    pimienta y comino. Una vez el cereal se ablande, in- corpore  el  sofrito  con  el  pollo  desmechado.  Cocine    durante 15 minutos para integrar los sabores. Rectifi- que sazón y sirva caliente.   Observaciones  Esta  preparación  es  generalmente  conocida  como    arroz de millo; sin embargo, no lleva arroz, debido a   que este cereal es reemplazado por el millo. Con el fin   de ayudar a visibilizar la importancia del millo en la   dieta atlanticense, decidimos llamarlo millo con po- llo,  pues  con  esta  misma  técnica  el  millo  puede  re- emplazar el arroz para preparar millo con coco, millo   con lisa y millo con chivo seco.  8 porciones \n99  c ereales \n100  Cocinero  Bienvenido De la Hoz Mozo  64 años    Municipio: Usiacurí  Arroz de guandú con cerdo Ingredientes  1 kg de arroz  1 kg de cerdo  1 lb de guandú  200 gr de aceitunas verdes deshuesadas  100 gr de alcaparras   200 gr de uvas pasas  4 ramas de cebolla junca  2 pimentones rojos  2 pimentones verdes  ½ lb de ají topito  1 cabeza de ajo   100 ml de vinagre de frutas  250 ml de aceite vegetal  100 gr de achiote  Sal, pimienta y comino al gusto  Preparación  Para  achiotar  el  aceite,  mézclelo  con  el  achiote  y  en    una  olla  pequeña  cocine  a  fuego  bajo  hasta  que  el    aceite se vuelva rojo. Retire, deje reposar y cuele.  Ponga  a  remojar  el  guandú  la  noche  anterior. Al  día    siguiente  cocínelo  con  agua  nueva  en  olla  a  presión    durante 40 minutos aproximadamente o hasta que el   grano esté blando y firme. Retire, cuele y reserve.  Pique finamente los vegetales. Reserve.   Corte  el  cerdo  en  dados  grandes,  condiméntelo  con    sal,  pimienta,  comino,  ajo,  vinagre  y  aceite  achiota- do. Sofríalo en esa mezcla hasta que dore. Agregue la   mitad de los vegetales, las uvas pasas, las aceitunas   y las alcaparras; sofría durante 10 minutos más, adi- cione el arroz, cocine a fuego medio alto hasta que el   grano suene o crepite, vierta el agua y deje que hier- va.  Cuando  haya  hervido  condimente  con  sal  y  co- mino  al  gusto. Y  cuando  el  agua  seque  baje  tempe- ratura,  agregue  el  guandú  junto  con  el  resto  de  los    vegetales; tape y cocine hasta que el grano abra.   Sirva caliente con su acompañamiento, que general- mente son tajadas fritas de plátano maduro.  Observaciones  La receta tradicional no lleva aceitunas, alcaparras ni   uvas  pasas;  sin  embargo,  estos  ingredientes  se  han    venido  incorporando  a  la  receta,  según  los  mismos    cocineros,  para  darle  una  mejor  presentación  y  su- marle sabores al plato.  10 porciones \n101 \n102  Cocinera  Piedad del Carmen Bovea Ibarra  67 años    Municipio: Soledad  Preparación  Pique  fino  los  vegetales  y  haga  un  sofrito  con  ellos.    Corte  las  butifarras  por  mitades  y  agréguelas  al  so- frito. Añada el arroz, cocínelo a fuego alto hasta que   el grano suene o crepite; vierta el agua, mezcle bien y   deje que hierva.  Una vez el agua haya hervido condimente con sal al   gusto. Cuando el agua seque, tape el caldero y cocine   a fuego bajo hasta que el grano abra.  Sirva caliente acompañado de bollo de yuca.  Observaciones  La butifarra soledeña ocupa un lugar distinguido en   la culinaria caribeña y es reconocida a nivel nacional,   de ahí que haya inspirado nuevos platos. Esta prepa- ración es muy utilizada como plato principal en cele- braciones,  hace  parte  de  la  oferta  que  los  cocineros,    sobre todo los soledeños, incorporan en su menú para   eventos especiales.   Arroz de butifarra soledeña  Ingredientes    3 kg de butifarra soledeña  2,5 kg de arroz   ½ lb de ají topito   1 kg de ají pimentón rojo   ½ mazo de cebolla junca   1 cabeza de ajo   200 ml de aceite vegetal  Sal al gusto     3,7 litros de agua 8 a 10 porciones \n103 \n104  Cocinera  Tomasa Isabel García Porta  60 años    Municipio: Ponedera  Arroz de ahuyama con mojarra lora Preparación  Condimente las mojarras con sal y pimenta desde el   día anterior y consérvelas en refrigeración.  Para achiotar el aceite disponga de 250 ml o una taza   de él; mézclelo con el achiote y en una olla pequeña   cocine a fuego bajo hasta que el aceite se vuelva rojo.   Retire, ponga a reposar y cuele.  Para elaborar el arroz:   Pele y corte la ahuyama en dados de 2 cm x 2 cm. Re- serve.  Luego pique los vegetales y haga un sofrito con acei- te achiotado en el mismo caldero donde lo cocinará.   Cuando el sofrito esté jugoso agregue el agua y la mi- tad  de  la  ahuyama;  cocine  a  fuego  medio  alto  has- ta que hierva; agregue el arroz, mezcle y condimen- te con sal.  Cuando  el  agua  haya  secado  agregue  el  resto  de  la    ahuyama, rectifique sazón, tape, baje temperatura y   cocine hasta que el grano abra.  Para freír la mojarra vierta el aceite vegetal en un cal- dero  grande,  caliente  a  fuego  medio  y  fría  las  moja- rras hasta que doren. Retire y reserve.  Sirva el arroz de ahuyama acompañado de la moja- rra y bollo de yuca.  Ingredientes  8 mojarras lora  1 kg de arroz  1 kg de ahuyama (que Tomasa cultiva   en su casa)  2 lt de agua  4 pimentones verdes  1 cabeza de ajo  4 ramas de apio  100 gr de achiote  1 lt de aceite vegetal  Sal al gusto  Pimienta negra al gusto 8 porciones \n105 \n106  Cocinera  Amanda Alfaro de Llerena  64 años    Municipio: Barranquilla  Arroz de lisa           Ingredientes  2 lb de lisas (enteras o ya deshuesadas y secas)  3 tazas de arroz lavado  1 cucharada de aceite  6 tazas de agua  1 cebolla cabezona finamente picada  2 tallos de cebollín picados  2 tomates maduros pelados y picados  2 dientes de ajo triturados  Ají dulce (topito)   Pimentón opcional  Sal  Comino  Color  Cilantro    Preparación  Deje las lisas por 1 hora en agua fría para quitarles la   sal. Luego póngalas a fuego lento en una olla con su- ficiente agua y deje hervir. Cuando hayan hervido re- tírelas del fuego, escúrralas y desmenúcelas, quitan- do las espinas. Después, mezcle la lisa con un guiso   preparado con aceite, cebolla, cebollín, tomate, ajo y   condimentos. Agregue al arroz y sofría por unos mi- nutos incorporando agua y dejando hervir hasta que   seque. Tape la olla y continúe cocinando hasta que el   arroz esté.  Agregue al final el cilantro finamente picado.  6 a 8 porciones \n107 \n108  Arroz de chipi-chipi           Ingredientes  2 lb de chipi-chipi  3 tazas de arroz lavado  1 cucharada de aceite  2 tazas de agua  1 cebolla cabezona finamente picada  2 tallos de cebollín picados  2 tomates maduros pelados y picados  2 dientes de ajo triturados  Ají dulce (topito) y pimentón opcional  1½ lt de caldo de pescado  Sal  Comino  Color  Cilantro al gusto  Cocinera  Juana Rodríguez Tierra  63 años    Municipio: Barranquilla y Puerto Colombia  Preparación  Lave muy bien los chipi-chipis para quitarles la are- na y reserve. Sofría los vegetales por 5 minutos apro- ximadamente,  salpimentados.  Luego  agregue  el  chi- pi-chipi  y  por  último  el  arroz  y  sofría  todo  a  fuego    alto. Finalmente, agregue el caldo de pescado y deje   cocinar hasta que esté el arroz.  6 a 8 porciones \n109 \n110  Cocinera  Martha Judith Gutiérrez Polo  64 años    Municipio: Suan  Arencas asadas Ingredientes  8 arencas medianas  6 limones  2 cebollas rojas finamente picadas    1 cabeza de ajo  Sal al gusto  Preparación  Arrolle  las  arencas,  ábralas  por  el  pecho  y  retire  las    vísceras.  Pique  finamente  la  cebolla  y  el  ajo;  agregue  limón  y    sal. Marine las arencas el día anterior con el picadillo   realizado y consérvelas en refrigeración.  Encienda la brasa. Cuando esté caliente ase las aren- cas por ambos lados (de 7 a 10 minutos).  Sirva caliente acompañada de yuca cocida.  Observaciones  La arenca es conocida ampliamente en toda la zona   del  Canal  del  Dique;  también  en  los  municipios  de    Suan  y  Santa  Lucía.  Se  preparan  asadas  o  fritas  en    abundante aceite.   8 porciones \n111  a sados \n112  Bocachico en cabrito Ingredientes  1 bocachico de 2 a 4 kg, abierto   2 cebollas rojas  4 ramas de cebolla junca   ½ cabeza de ajo  2 pimentones rojos  2 zanahorias  ½ lb de ají topito   100 ml de vinagre de frutas  Sal al gusto  100 ml de aceite vegetal  Pita para amarrar  Parrilla y brasa para asar  Cocinera  Miriam Rosas Salas de Sandoval  64 años    Municipio: Campo de la Cruz  Preparación  Disponga de un bocachico abierto por el pecho y sin   vísceras.  Marine el pescado desde el día anterior con vinagre y   sal. Conserve en refrigeración.  Corte  los  vegetales  en  tiras  largas  y  sofríalos  ligera- mente con el aceite en una olla. Condimente con sal   y vinagre. Retire y ponga a reposar.  Rellene  el  pescado  con  los  vegetales,  amárrelo  con    una pita y áselo en la parrilla hasta que se dore; cocí- nelo por ambos lados.   Sirva acompañado de yuca.  Observaciones  Esta técnica de preparación se ha hecho muy popu- lar  en  Barranquilla,  sobre  todo,  en  lugares  cercanos    al centro de la ciudad. A pesar de que el bocachico es   el pescado elegido para esta preparación, también se   pueden usar otras especies de buen tamaño como la   cachama.    1 porción \n113 \n114  Salpicón de moncholo, arroz de frijol   cabecita negra y ensalada de ñame Ingredientes Salpicón de moncholo           2 kg de moncholo fresco  1 lb de tomate   2 cebollas rojas  3 huevos  ½ lb de ají topito  3 ramas de cebolla junca  6 dientes de ajo  250 ml de aceite vegetal  100 gr de achiote  Comino y sal al gusto  Arroz de frijol cabecita negra       1 lb de arroz              1 lb de frijol              Sal al gusto   Ensalada de ñame  1 kg de ñame  2 cebollas rojas  6 dientes de ajo  2 limones   Sal al gusto   Preparación            Salpicón de moncholo  Cocine  el  moncholo  en  suficiente  agua  condimenta- da con un poco de sal y recorte de vegetales. Una vez   cocido retire, ponga a reposar y desmeche. Reserve.  Para achiotar el aceite disponga de 250 ml o una taza,   mézclelo con el achiote y en una olla pequeña cocine   a fuego bajo hasta que el aceite se vuelva rojo. Retire,   deje reposar y cuele.  Pique  finamente  los  tomates,  la  cebolla  roja,  la  ce- bolla junca, el ají topito y machaque el ajo. Vierta el  aceite  achiotado  en  un  caldero,  haga  un  sofrito  con    los  vegetales  e  incorpore  el  moncholo  desmechado.    Condimente  con  sal  y  comino.  Cocine  a  temperatu- ra media. Cuando haya incorporado los ingredientes   añada los huevos previamente batidos. Sirva caliente   acompañado del arroz y la ensalada.  Arroz de frijol  Remoje los frijoles desde la noche anterior en abun- dante agua. Al día siguiente retire el agua y cocínelos   en suficiente agua fresca durante 40 minutos aproxi- madamente. Retire, cuele y reserve el agua.  Vierta el agua de la cocción de los frijoles en el calde- ro donde va a cocinar el arroz, cocine a fuego medio   hasta que hierva; condimente con sal y adicione dos   cucharadas de aceite vegetal; agregue los frijoles jun- to con el arroz; rectifique sazón, deje que hierva hasta   que el agua seque. Tape, baje la temperatura y cocine   hasta que el grano abra. Sirva caliente para acompa- ñar el salpicón.  Ensalada de ñame  Pique fino la cebolla y machaque el ajo; haga un sofri- to con dos cucharadas de aceite vegetal, condimente   con limón y sal. Reserve.   Vierta suficiente agua en una olla y llévela a hervor;   pele y trocee el ñame, cocínelo hasta que ablande, re- tírelo,  escúrralo  y  macháquelo  hasta  volverlo  puré.    Mezcle  con  el  sofrito  en  la  misma  olla  en  la  que  se    cocinó.  Sirva  caliente  para  acompañar  el  salpicón  y    el arroz.  Observaciones  Se trata de un plato que generalmente se prepara en   Semana  Santa.  El  moncholo  es  el  pescado  preferido    para esta técnica, pero también es común utilizar el   bagre.  Cocinera  Inmaculada Álvarez Alvarado  61 años    Municipio: Sabanagrande 6 porciones \n115  g uisos \n116  Pato ahumado guisado Ingredientes  1 pato ahumado  6 dientes de ajo  3 ramas de cebolla junca  1 pimentón verde  1 pimentón rojo  ½ mazo de cilantro  2 ramas de apio  200 gr de pasta de tomate  100 ml de vinagre de frutas  100 ml de aceite vegetal  Sal y pimienta al gusto  Cocinera  María Francisca Sanjuanelo de Osorio  76 años    Municipio: Polonuevo 6 porciones  Preparación  Pique finamente los pimentones, la cebolla, el apio y   el cilantro; machaque el ajo y reserve.  Desprese el pato, marínelo dos horas previas a la coc- ción con el vinagre de frutas, la sal y la pimienta. En   un caldero grande ponga el aceite y caliente a tempe- ratura media. Sofría las presas de pato hasta que do- ren. Agregue los vegetales picados, la pasta de tomate   y el agua hasta la mitad de su volumen. Cocine hasta   que el pato se cueza, los jugos se reduzcan y tomen   cuerpo. Sirva caliente con sus acompañamientos.  Observaciones  A  pesar  de  ser  considerada  una  carne  de  monte,  el    pato  es  un  animal  que  se  puede  encontrar  con  fre- cuencia criado en parcelas para su venta y consumo. \n117 \n118  Lengua puyada Ingredientes  1 ½ kg de lengua  1 lb de tomate  2 cebollas rojas  200 gr de ají topito  1 pimentón rojo  1 pimentón verde  4 ramas de cebolla junca  1 cabeza de ajo  250 ml de aceite vegetal  100 gr de achiote  Comino, sal y pimienta al gusto  Preparación  Para achiotar el aceite: mézclelo con el achiote y en   una  olla  pequeña  cocine  a  fuego  bajo  hasta  que  el    aceite se vuelva rojo. Retire, ponga a reposar y cuele.  Condimente la lengua con sal, pimienta y comino con   dos horas de anterioridad. Reserve.  Pique finamente las cebollas, el tomate, el ají topito,   el pimentón verde, el pimentón rojo, la cebolla junca   y  machaque  el  ajo.  Haga  un  sofrito  en  aceite  achio- tado, condimente con sal, comino y pimienta al gus- to. Reserve.  Cocine  la  lengua  con  suficiente  agua  en  una  olla  a    presión durante 1 hora, con sal, comino y pimienta al   gusto  y  recortes  de  vegetales.  Una  vez  cocida  retire,    deje reposar y corte en rebanadas.  Lleve las rebanadas de lengua al sofrito; agregue una   taza  del  caldo  resultante  y  cocine  durante  media    hora más para que los sabores se integren. Sirva ca- liente y cúbrala con la salsa.  Observaciones  La lengua puyada es una preparación muy cotidiana,   bastante  común  en  el  departamento  de  Bolívar;  sin    embargo, como muchos otros platos de la región, en   Atlántico ha encontrado popularidad como prepara- ción casera.  Cocinera  Edith Isabel Gil Barragán  65 años    Municipio: Polonuevo 10 porciones \n119 \n120  Higadete Ingredientes  1 kg de hígado  6 plátanos maduros  1 lb de tomate  2 cebollas rojas  4 ramas de cebolla junca  ½ lb de ají topito  2 zanahorias  1 pimentón verde  1 cabeza de ajo  250 ml de aceite vegetal  100 gr de achiote  Sal y comino al gusto  Preparación  Para achiotar el aceite disponga de 250 ml o una taza,   mézclelo con el achiote y en una olla pequeña cocine   a fuego bajo hasta que el aceite se vuelva rojo. Retire,   ponga a reposar y cuele.   Pique finamente los tomates, la cebolla roja, la zana- horia, la cebolla junca, el ají topito, los pimentones y   el ajo. Vierta el aceite achiotado en un caldero, haga   un sofrito con los vegetales, condimente con comino   y sal al gusto. Retire y reserve.  Cocine el hígado junto con el plátano cortado en tro- zos en un litro y medio de agua. Añada el sofrito, rec- tifique sazón y deje que la sopa se cueza y tome cuer- po.  Sirva  caliente  acompañado  de  arroz  con  coco  o    blanco.  Observaciones  El higadete es un emblema de la cocina bolivarense,   aunque se trata de un plato muy recordado por nues- tros abuelos atlanticenses.   Cocinera  Carmen Alicia Agresot Acosta  77 años    Municipio: Malambo 8 porciones \n121 \n122  Zaragoza blanca guisada  Ingredientes  1 lb de zaragoza blanca  1 lb de tomate  1 cebolla roja  100 gr de ají topito  8 dientes de ajo  200 gr de tocineta  ½ mazo de cilantro fresco  200 ml de aceite vegetal  100 gr de achiote  Sal y pimienta al gusto  Preparación  En una olla pequeña agregue el aceite junto con el   achiote.  Cocínelo  a  fuego  bajo  hasta  que  el  aceite    se  vuelva  rojo.  Retire,  ponga  a  reposar,  remueva  y    cuele. Pique finamente el tomate, la cebolla roja, el ají topi- to y machaque el ajo. Haga un sofrito con media taza   de aceite achiotado. Retire y reserve.  Pique  la  tocineta  y  dórela  a  fuego  medio  bajo  hasta    que dore y suelte su aceite. Pique el cilantro y reserve.  A un litro de agua añada la zaragoza y cocine a fuego   medio hasta que ablande. Incorpore el sofrito y la to- cineta, condimente con sal y pimienta al gusto. Coci- ne durante 15 minutos más y esparza el cilantro pica- do; sirva caliente acompañado de arroz blanco.  Observaciones  La zaragoza blanca es un producto muy común en el   municipio de Ponedera.   Cocinera  Ángela Roca Almeida  54 años    Municipio: Ponedera 5 porciones \n123 \n124  Pastel de millo con pato ahumado      8 a 10 pasteles  Cocinera  Corsina de la Asunción Urueta  76 años    Municipio: Baranoa Corregimiento de Pital de Megua  Ingredientes  2 patos ahumados deshuesados   2 ½ kg de millo   4 zanahorias   4 papas   1 mazo de hojas de col   1 mazo de habichuela larga   ½ mazo de cebolla larga   1 mazo de cebollín chino   2 pimentones rojos   2 pimentones verdes   1 cabeza de ajo   ½ lb de ají topito   10 bayas de pimienta de olor   5 gr de laurel seco   5 gr de tomillo seco   250 de aceitunas verdes deshuesadas   250 de alcaparras   12 hojas de hojas de bijao   Pita de fique para amarrar   200 gr de achiote   ½ lt de aceite   Sal al gusto   Preparación   Para achiotar el aceite, utilice una olla pequeña, añada   el aceite junto con el achiote y cocine a fuego bajo has- ta  que  el  aceite  se  vuelva  rojo.  Retire,  repose,  mueva    y cuele, reserve el aceite, que se divide en tres partes.  Pele y corte en medias lunas la papa y la zanahoria.   Corte  la  habichuela  larga  en  piezas  de  2  cm.  Corte    las  hojas  de  col  en  tiritas  delgadas,  las  aceitunas    verdes  por  mitades  y  escúrrales  el  agua,  junto  con    las alcaparras. Pique finamente tomates, pimentones   rojo y verde, ají topito, cebolla larga y cebollín chino;   machaque el ajo. Añada una parte del aceite a las presas de pato trocea- das.  Escurra  bien  el  millo  pilado  y  remojado  del  dia    anterior y agregue otra parte del aceite.  Haga un sofrito con los vegetales picados con el aceite   restante. Condimente con sal, laurel y tomillo. Cuan- do hierva, añada las piezas de pato ahumado y la pi- mienta de olor. Cocine durante 10 minutos. Reserve.  Para armar los pasteles adelgace la vena de la hoja con   un cuchillo. Ponga la hoja sobre la mesa con el envés   hacia usted. En la parte más ancha del bijao disponga   una porción delgada de millo, luego el guiso con pato   junto con dos o tres aceitunas y alcaparras, dos medi- as lunas de papa y zanahoria. Termine cubriendo con   una capa delgada de millo. Doble la base de la hoja,   luego los laterales y finalmente la punta formando un   paquete rectangular. Amarre  con  fique  o  pita  de  for- ma longitudinal y transversal.   En una olla grande haga una cama con las hojas y re- cortes sobrantes para poner todos los pasteles. Vierta   agua hasta cubrir, ponga una tapa o base metálica que   entre en la olla y, sobre esta, una pesa. Se lleva al fuego   y se cocinan durante 1 hora y 30 minutos, aproxima- damente.  Si  el  agua  llegara  a  bajar  su  nivel  a  menos    de la mitad, añada más liquido hirviendo. Cuando los   pasteles están cocidos, se retiran del fuego, se escur- ren muy bien y se sirven reposados.  Observaciones  Aunque se trata de una receta con bastante historia,   Corsina  y  sus  hijas,  herederas  de  la  tradición  de  su    abuela Tere, están impulsando el pastel de millo con   pato ahumado, como un producto para reivindicar el   millo como fuente importante de nutrientes; y la car- ne de monte, criada en parcelas familiares, como al- ternativa saludable de alimentación. En Pital de Me- gua se celebra a finales de junio el Festival del pastel.   Pero todos los fines de semana más de treinta muje- res montan a la orilla de la carretera de La Cordiali- dad y en la plaza principal del corregimiento, puestos   de venta de los famosos pasteles pitaleros. \n125  e nvueltos y amasijos \n126  Pastel de arroz con pollo y cerdo  desde el día anterior con ajo y comino. Al día siguien- te, séllelas en un caldero hasta que doren ligeramen- te. Incorpore los vegetales picados, excepto la papa y   la zanahoria. Condimente con vinagre de frutas, ajo,   sal y comino al gusto. Retire y reserve. Para armar los pasteles, adelgace el tallo de la hoja   de bijao con un cuchillo de buen filo.   Ponga la hoja sobre una superficie plana con el en- vés  hacia  arriba.  En  el  centro  de  la  hoja  disponga    una  capa  delgada  de  arroz,  agregue  las  presas  de    pollo  y  cerdo  con  sus  vegetales,  dos  medias  lunas    de  zanahoria  y  papa  (opcional  aceitunas  verdes    deshuesadas y alcaparras) y finalmente cubra con   una capa de arroz.  Doble  la  base  de  la  hoja  hacia  adentro,  luego  los    laterales  y  finalmente  la  punta  hasta  formar  un    paquete  fornido  asociado  a  la  forma  rectangular.    Amarre con la pita a lo largo y ancho. En una olla   grande  vierta  suficiente  cantidad  de  agua  y  lléve- la  a  hervor.  Cocine  los  pasteles  durante  1  hora  y    30 minutos, aproximadamente. Retire, escurra, deje   reposar y sirva.   Cuando  estén  cocidos  y  fríos  los  puede  conservar    en refrigeración por tres días. Para consumirlos ca- liéntelos en vapor.   Observaciones  Pese a ser considerado en el Gran Caribe como un   plato  especial  de  fin  de  año,  en  nuestro  departa- mento  el  pastel  se  ha  consolidado  como  alimento    de todo el año. Sobre todo, los fines de semana, las   ventas  caseras  de  pasteles  y  hayacas  en  todos  los    barrios de Barranquilla, y en la mayoría de los mu- nicipios del departamento, ocupan un lugar de pri- vilegio en la dieta atlanticense.  * Si lo desea, reemplace el arroz por millo en la misma cantidad y  obtenga otra deliciosa variante de esta receta que también pue-  de  encontrar  en  el  corregimiento  de  Pital  de  Megua,  durante  el    Festival del Pastel.  8 pasteles  Ingredientes  1 kg de arroz*   1 lb de pollo  1 lb de cerdo  ½ lb de habichuela   1 lb de papa   1 lb de zanahoria    4 tallos de apio   1 mazo de cebolla junca   1 lb de ají pimentón verde picado en cuadros pe- queños  Ají topito  1 lb de berenjenas picadas en media luna  250 ml de vinagre de frutas  250 ml de aceite vegetal   100 gr de achiote  Ajo, pimienta y comino al gusto  Sal y vinagre al gusto  Opcional (aceitunas verdes y alcaparras)  Hojas de bijao  Pita para amarrar  Preparación  Para  achiotar  el  aceite  disponga  de  250  ml  o  una    taza; mézclelo con el achiote y en una olla peque- ña cocine a fuego bajo hasta que el aceite se vuelva   rojo. Retire, deje reposar y cuele. Machaque el ajo,   condiméntelo con comino, pimienta y sal. Disuelva   la mezcla en el aceite achiotado.  Tinture el arroz crudo con la mitad del aceite achio- tado,  condiméntelo  moderadamente  con  vinagre,    ajo, sal y comino; reserve.  Corte la zanahoria y la papa en medias lunas y re- serve. Pique en cubos las habichuelas, el apio, el pi- mentón verde, la berenjena y el ají topito. Desprese  el  pollo  y  el  cerdo  en  porciones  de  50  gr    aproximadamente.  Para  marinar,  adobe  las  carnes    Cocinera  Amanda Alfaro de Llerena  64 años    Municipio: Barranquilla \n127 \n128  Pastel de cerdo envuelto en hoja de almendro  Corte el cerdo en porciones de 50 gr aproximadamen- te  y  marine  desde  el  día  anterior  con  ajo  y  comino.    Al momento de preparar, séllelas en un caldero has- ta que doren ligeramente. Incorpore los vegetales pi- cados,  excepto  la  papa  y  la  zanahoria.  Condimente    con vinagre de frutas, ajo, sal y comino al gusto. Re- tire y reserve.  Para armar los pasteles, adelgace el tallo de la hoja de   almendro con un cuchillo de buen filo.   Ponga  cuatro  hojas  por  pastel  sobre  una  superficie    plana  con  el  envés  hacia  arriba.  En  el  centro  de  la    hoja disponga una capa delgada de arroz, agregue las   presas de cerdo con sus vegetales, dos medias lunas   de zanahoria y papa (opcional aceitunas verdes des- huesadas  y  alcaparras)  y  finalmente  cubra  con  una    capa de arroz. Doble las hojas hacia adentro forman- do un paquete circular. Amarre con la pita en forma   radial.  En  una  olla  grande  vierta  suficiente  cantidad    de agua y llévela a hervor. Cocine los pasteles duran- te 1 hora y 30 minutos, aproximadamente. Retire, es- curra, ponga a reposar y sirva.  Cuando se cuezan se pueden conservar en refrige- ración por tres días. Para consumirlos se calientan   en vapor.   Observaciones  Esta variación del tradicional pastel envuelto en hoja   de  bijao  es  la  evidencia  de  las  combinaciones  ines- peradas,  pero  efectivas,  que  caracterizan  a  la  coci- na  como  laboratorio  de  la  creatividad  humana.  El    almendro  es  uno  de  los  árboles  más  comunes  de  la    zona y además de ser un sustituto ideal del bijao, por   sus  aportes  aromáticos  al  pastel,  su  hoja  es  mucho    más  permeable  y  absorbente  y  funciona  como  filtro    natural de la grasa.  Cocinera  Esther Molina de Charris  77 años    Municipio: Juan de Acosta 8 pasteles  Ingredientes  1 kg de arroz   1 kg de pulpa de cerdo  1 lb de papa   1 lb de zanahoria    4 tallos de apio   1 mazo de cebolla junca   1 lb de ají pimentón verde picado en  cuadros   pequeños  Ají topito  250 ml de vinagre de frutas  250 ml de aceite vegetal   100 gr de achiote  Ajo, pimienta y comino al gusto  Sal y vinagre al gusto  Opcional (aceitunas verdes deshuesadas y      alcaparras)  32 hojas de almendro grandes (pueden ser más)  Pita para amarrar  Preparación  Para achiotar el aceite disponga de 250 ml o una taza;   mézclelo con el achiote y en una olla pequeña cocine   a fuego bajo hasta que el aceite se vuelva rojo. Retire,   deje reposar y cuele. Machaque el ajo, condiméntelo   con comino, pimienta y sal. Disuelva la mezcla en el   aceite achiotado.  Tinture el arroz crudo con la mitad del aceite achio- tado, condiméntelo moderadamente con vinagre, ajo,   sal y comino. Reserve. Corte  la  zanahoria  y  la  papa  en  medias  lunas;  re- serve. Pique en cubos el apio, el pimentón verde y   el ají topito. \n129 \n130  Pastel de yuca con cerdo y pollo  to. Séllelos en un caldero grande; cuando estén dora- dos, agregue el sofrito, cocine durante diez minutos,   retire y reserve.   Condimente  la  masa  de  yuca  con  sal,  amase  bien  y    reserve.   Pele y corte la papa y la zanahoria en medias lunas;   reserve.  Para armar los pasteles, adelgace el tallo de la hoja de   bijao con un cuchillo de buen filo.   Ponga  la  hoja  sobre  una  superficie  plana  con  el  en- vés hacia arriba. En el centro de la hoja disponga una   capa delgada de masa de yuca, agregue las presas de   pollo y cerdo con el sofrito, dos medias lunas de za- nahoria y papa y finalmente cubra con una capa de   masa de yuca.   Doble la base de la hoja hacia adentro; luego los late- rales y finalmente la punta hasta formar un paquete   fornido asociado a la forma rectangular. Amarre con   la  pita  a  lo  largo  y  ancho.  En  una  olla  grande  vierta    suficiente cantidad de agua y llévela a hervor.   Cocine los pasteles durante 1 hora aproximadamen- te. Retire, escurra, deje reposar y sirva.   Una  vez  cocidos  conserve  en  refrigeración  por  tres    días. Para consumirlos caliéntelos en vapor.   Observaciones  El  pastel  con  masa  de  yuca  es  una  variación  intere- sante que puede considerarse una innovación de una   receta  tradicional  con  aportes  de  un  producto  tan    vernáculo como la yuca.  Ingredientes  1 ½ lb de masa de yuca (similar a la que se usa para   hacer carimañolas)  1 lb de pulpa de cerdo  1 lb de pollo deshuesado  2 zanahorias  3 papas grandes  300 gr de tomate  2 cebollas rojas  200 gr de ají topito  3 ramas de cebolla  1 cabeza de ajo  200 ml de aceite vegetal  100 gr de achiote  Sal y pimienta al gusto  Hojas de bijao  Pita para amarrar  Preparación  Para  achiotar  el  aceite  mézclelo  con  el  achiote  y  en    una  olla  pequeña  cocine  a  fuego  bajo  hasta  que  el    aceite se vuelva rojo. Retire, deje reposar y cuele.  Pique  finamente  el  tomate,  la  cebolla  roja,  la  cebo- lla junca, el ají topito y el ajo. Haga un sofrito con el   aceite achiotado; una vez esté jugoso, retire y reserve.  Dos horas antes de elaborar los pasteles condimente   las presas de cerdo y pollo con sal y pimienta al gus-  6 porciones  Cocinera  Mercedes Belén Gutiérrez Algarín  64 años    Municipio: Polonuevo \n131 \n132  Cocinera  Rita Isabel Valega de Escorcia  65 años    Municipio: Malambo  Derivados de la yuca Cazabe    8 cazabes   Ingredientes  4 kg de yuca  Preparación  Ralle  la  yuca  con  un  rallador  de  latón  de  orificios    muy finos. Cuando termine escúrrala con un trapo y   retírele  el  exceso  de  almidón.  Divida  la  masa  resul- tante en ocho partes iguales. Caliente a fuego medio   una sartén antiadherente con un diámetro de 30 cm,   aproximadamente.  Disponga  sobre  esta  una  bola  de    masa, aplánela con la mano y extiéndala. Ásela has- ta dorarla de un lado, voltéela y dórela del otro; retire,   deje reposar y sirva con su acompañamiento favorito.  Observaciones  La  receta  tradicional  ha  tenido  una  adaptación  mu- cho más reciente al integrar una variación dulce del   cazabe. Para ello, se rellena la tortilla tradicional con   una mezcla de coco, azúcar y anís.   Chicha de yuca Ingredientes  1 kl de yuca  300 gr de panela  Preparación  Ralle la yuca y déjela con suficiente agua que la cubra   dos días antes de la preparación. Pasados los dos días   llévela al fuego junto con el agua en que la conservó   para aprovechar su fermentación. Endulce con la pa- nela  rallada  y  cocine  hasta  que  la  yuca  esté  cocida.    Retire, deje reposar y sirva fresca o enfriada con hielo.  Observaciones  La chicha de yuca es una de las bebidas energéticas   más antiguas y de las que más se consume en el de- partamento.   Enyucado   De 20 a 30 porciones   Ingredientes  1 kilo de yuca rallada   2 cocos rallados preservando el agua  1 libra de queso costeño rallado  1 libra de azúcar  50 gm de anís  10 gr de mantequilla  Procedimiento  Procese  un  coco  con  el  agua  reservada  para  extraer    su leche en aproximadamente 2 tazas. Luego, en un   recipiente  hondo  mezcle  los  siguientes  ingredien- tes:  yuca,  coco  y  queso  rallados  y  azúcar;  adicionar    el anís frotando entre las manos para activar el aro- ma. Seguidamente, añada la leche de coco y la mitad   de la mantequilla.   Tome un molde antiadherente que deberá untar con   la mantequilla restante. Caliente el horno a 160°, pro- cediendo a verter la mezcla realizada. La preparación   deberá hornearla durante 1 hora o hasta que el enyu- cado este dorado. Una vez esté listo, retire, deje repo- sar y sirva. (Puede acompañarse con helado de coco.)  Arepa de yuca   5 arepas de 100 gr aproximadamente.  Ingredientes  1 libra de masa de yuca  250 gr de queso costeño duro  Sal al gusto   Preparación  Cocine  la  libra  de  yuca  hasta  que  esté  blanda  y  se    convierta en puré. Añádale el queso rallado y condi- mente con sal si lo llegara a necesitar. Proceda a ca- lentar una plancha o sartén antiadherente y ase las   arepas hasta dorarlas de un lado y por el otro. \n133 \n134 \n135 \n136  Bollos de millo   5 bollos  Ingredientes  400 gr de masa de millo  Sal al gusto  Tusa (hoja de maíz)  Pita para amarrar   Preparación  Para obtener la masa de millo: pile y cocine el millo   hasta  que  ablande.  Una  vez  cocido,  muélalo  en  mo- lino  mecánico  (tradicional)  hasta  obtener  una  masa    cremosa y manejable. Saque de esta masa las porcio- nes requeridas para elaborar bollos.  Luego,  condimente  la  masa  de  millo  con  sal. Amase    hasta incorporar. Abra las tusas de maíz y ponga ho- jas  superpuestas.  Disponga  unos  80  gr  de  masa  a  lo    largo de la hoja; cierre los lados, las puntas, envuel- va  en  forma  cilíndrica  y  amarre.  Cocine  en  una  olla    con agua hirviendo durante 1 hora aproximadamen- te. Cuando estén cocidos, retire los bollos, escúrralos,   deje reposar y sirva.   (Se  pueden  conservar  en  refrigeración  por  tres  días    aproximadamente).  Observaciones  A pesar de ser uno de los bollos más consumidos en   nuestro departamento, durante décadas, actualmen- te  es  muy  poco  común  encontrarlo  como  producto    comercializable.   Cocinera  Catalina Viloria de Charris  61 años    Municipio: Juan de Acosta  \n137  Bollos de angelito   10 bollos  Ingredientes  4 kg de maíz blanco seco  3 cocos secos rallados fino  1 lb de panela rallada  1 lb de queso costeño rallado fino  50 gr de anís   5 gr de sal  Hojas o tusas de maíz para envolver el bollo (entu- sar o emboquillar)  Pita para amarrar  Hojas de pintabollo  Preparación   Muela  el  maíz  junto  con  el  anís,  la  panela  y  la  sal.    Agregue el queso y el coco; mezcle bien.  Disponga de varias hojas de maíz por bollo para que   su  envoltura  sea  hermética.  Coloque  dentro  de  esta    un par de hojas de pintabollo y 300 gr de la mezcla.   Doble  las  puntas  de  las  hoj  lados  hasta  que  dé  una    forma cilíndrica. Amarre con fique o pita.  En una olla grande vierta 2 lt de agua, lleve a hervor y   cocine los bollos durante 1 hora.  Retire,  coloque  sobre  una  superficie  inclinada  para    que escurran, deje reposar y sirva.  Observaciones  El  bollo  de  angelito  es  una  variación  dulce  del  bollo    de maíz tradicional. Su uso era reservado para ofre- cerlo como regalo en la celebración del día de Todos   los Santos, conocido en nuestra región como el Día de   los angelitos, de allí tomó su nombre.  Cocinera  Marcela Sofía Imitola de Montes  70 años    Municipio: Piojó  Bollo de yuca con panela   6 a 8 bollos  Ingredientes   1 ½ kg de yuca  1 lb de panela  1 coco  3 gr de anís  Tusa u hojas de maíz   Pita para amarrar   Preparación  Ralle muy fino la yuca, la panela y el coco. En un re- cipiente  hondo  mézclelos  y  añada  el  anís.  Divida  la    masa  en  seis  partes  iguales. Abra  las  tusas  de  maíz,    ponga hojas superpuestas, disponga la masa a lo lar- go de la hoja, cierre los lados, las puntas, envuelva en   forma cilíndrica y amarre.  Cocine los bollos en una olla con agua en hervor du- rante 1 hora aproximadamente. Retire, escurra y sirva.  Observaciones  El bollo de yuca (tradicional-simple) es quizá el acom- pañante perfecto de todos los platos del departamen- to; sin embargo, esta variación dulce de un producto   tan icónico, se ha consolidado como uno de los pro- ductos preferidos de las familias atlanticenses.  \n138  Bollos de mazorca   8 a 10 bollos  Ingredientes  2 ½ kg de maíz sarazo1 ½ lb de azúcar  3 gr de anís  200 gr de mantequilla  ½ litro de leche  1 cucharada de sal  20 tusas u hojas de bollo  Pita para amarrar  Preparación  Deje el maíz en remojo desde la noche anterior. Al día   siguiente retire, escurra muy bien y muela junto con   el anís en molino mecánico. En un recipiente hondo   agregue  la  masa  junto  con  la  mantequilla  y  la  sal;    amase  muy  bien  y  añada  la  leche  poco  a  poco  para    darle cremosidad a la masa. Para armar los bollos so- breponga dos hojas y en la parte más ancha de ellas   monte  una  porción  de  200  gr  de  masa  aproximada- mente. Cierre los lados, las puntas, forme un cilindro   y amarre con pita.  1  Que empieza a madurar. Vierta suficiente agua en una olla, llévela a hervor y   cocine  los  bollos  durante  1  hora  y  30  minutos.  Una    vez  cocidos  retire,  escurra,  deje  reposar  y  sírvalos    acompañados de una rebanada de queso fresco.  Observaciones  Con  la  misma  masa  que  utiliza  para  hacer  el  bollo    de  mazorca  puede  preparar  arepas:  luego  de  haber    realizado los pasos descritos hasta lograr la cremosi- dad de la masa para los bollos, en lugar de envolver,   ponga a calentar una sartén o plancha antiadheren- te a fuego bajo; agregue porciones de 100 gr de masa   aproximadamente, extiéndalas con un cucharón has- ta dorarlas por ambos lados, para finalmente retirar   con una espátula y servir.  Para Luis, la elaboración y comercialización de bollos   en  el  departamento  es  la  «representación  de  las  lu- chas cotidianas» de nuestros campesinos y cocineros   por la dedicación y sacrificio que exige. Representa el   valor de un trabajo que muy pocas veces se reconoce.   Cocinero  Luis Felipe Ariza Gutiérrez  69 años    Municipio: Sabanalarga \n139  Cocinera  Guadalupe Muñoz Solano  79 años    Municipio: Luruaco  Bollo de plátano   8 a 10 bollos  Ingredientes  5 plátanos verdes   5 plátanos maduros  Hoja de palma amarga  Preparación  Ralle  los  plátanos  verdes,  póngalos  sobre  una  lata  y    séquelos al sol durante dos días. Una vez secos mué- lalos  hasta  convertirlos  en  harina.  En  un  recipiente    hondo  machaque  los  plátanos  maduros  hasta  vol- verlos puré. Añada la harina de plátano verde, mez- cle  bien  y  envuelva  en  las  hojas  de  palma  amarga.   La envoltura o emboquillada en hoja de palma amar- ga  requiere  de  mucha  experiencia,  si  se  dificulta,  se    pueden  utilizar  hojas  de  maíz  o  de  plátano.  Cocine    durante  3  horas  aproximadamente.  Retire,  escurra,    deje reposar y sirva.   Se pueden conservar en refrigeración durante tres o   cuatro días. Para calentarlos cocínelos al vapor.  Observaciones  El  bollo  de  plátano  es  otro  de  esos  envueltos  que    se podría declarar en peligro de extinción en el At- lántico.  Sin  embargo,  gracias  a  la  perseverancia  y    al trabajo dedicado de cocineras como Guada, aún   hoy en día se puede disfrutar de esta exquisita pre- paración.  \n140  Pescado frito con bollo de yuca y ensalada  6 porciones  Ingredientes  6 mojarras o tilapias de 250 gr cada una  1 lb de arroz blanco  2 aguacates  4 tomates  2 cebollas rojas  6 limones   1 lt de aceite vegetal   Sal y pimienta al gusto  Preparación  Mezcle sal, limón y pimienta para marinar el pesca- do.  Sazone  el  pescado  con  la  marinada  desde  el  día    anterior y conserve en refrigeración.   Prepare una vinagreta con 250 ml de aceite vegetal, li- món, sal y pimienta al gusto; reserve.  Corte el tomate, el aguacate y la cebolla en rodajas;   reserve.  Cocine una libra de arroz blanco de su preferencia.  En  un  caldero  grande  y  hondo  vierta  el  aceite  y  ca- liéntelo  a  temperatura  media.  Una  vez  caliente  fría    el pescado hasta dorarlo por ambos lados (de 10 a 15   minutos).  En un plato sirva el pescado acompañado de bollo de   yuca, arroz blanco y ensalada.  Observaciones  Este plato podría ser reseñado como el plato caribeño   por excelencia. Es, a la vez, una preparación cotidia- na de los hogares de la región y un plato conocido por   los turistas que visitan la región, con pequeñas varia- ciones  como  el  acompañamiento  con  patacones  en    lugar de bollo de yuca.  Cocinera  Rosa Cantillo Ospino  83 años    Municipio: Repelón \n141  f rituras \n142  Arepa’e huevo con carne molida Ingredientes  500 gr de masa de maíz amarillo  6 huevos  200 ml de leche   Sal al gusto  ½ litro de aceite  200 gramos de carne en polvo (opcional)  1 cebolla roja  10 ajíes topito  4 dientes de ajo  50 ml de aceite  Sal, pimienta y comino al gusto  Preparación  Disponga de cinco porciones de entre 80 y 100 gr de   masa de maíz. En un caldero vierta abundante acei- te y caliéntelo a temperatura media. En un recipiente   hondo ponga la masa de maíz, condimente con la sal   y suavice con la leche hasta obtener una mezcla se- dosa y consistente.   Haga unas bolas o esferas con la masa en porciones   uniformes.  Sobre  una  superficie  lisa  (plato  de  losa)    unte un poco de aceite, ponga la bola de masa y aplá- nela con una tabla o un plato. El diámetro aproxima- do debe ser de 15 cm y el grosor del dedo índice. Pue- de  emplear  una  bolsa  abierta  untada  ligeramente    con aceite para mayor facilidad en el armado. Cuan- do  tenga  listas  las  arepas  las  fríe  en  el  aceite  hasta    que inflen; retire, ponga en un escurridor y con un cu- chillo pequeño abra la arepa; por un lado, la rellena   con un huevo y una porción de carne molida. Cierre y   apriete el borde y fría de nuevo para que el huevo se   cueza. Retire, escurra y sirva caliente.  La cocción de la carne  Pique fino la cebolla, el ají topito y el ajo. Haga un so- frito y agregue la carne molida, condimente con sal,   pimienta y comino al gusto. Cocine hasta que la car- ne se cueza, retire y reserve.  Observaciones  La arepa’e huevo de Luruaco se ha consolidado como   un  producto  emblemático  de  la  cocina  caribeña.  Es    el único producto culinario, a nivel nacional, que por   su importancia como referente del patrimonio cultu- ral de la región, cuenta con un Plan Especial de Sal- vaguardia que busca ayudar a proteger los saberes y   procesos sociales vinculados a este producto.  En Luruaco se realiza todos los años, a finales de ju- nio, desde hace ya casi tres décadas, el Festival de la   arepa’e huevo.  Cocinera  María del Socorro Castillo Montero  67 años    Municipio: Luruaco  6 arepas \n143 \n144  Picada de huevas de pescado Ingredientes  1 ½ kg de huevas de pescado  6 dientes de ajo  3 huevos  1 lb de harina de trigo  300 gr de miga de pan  1 lt de aceite para freír  6 limones  Sal y pimienta al gusto 6 porciones  Preparación  Haga una marinada con limón, ajo machacado, sal y   pimienta. Condimente las huevas con la marinada 6   horas antes de freírlas. Conserve en refrigeración.   Pase las huevas por harina de trigo, huevo y finalmen- te por miga de pan condimentada con sal y pimienta.   En un caldero caliente el aceite a temperatura media;   fría las huevas hasta que doren. Retire, escurra y sír- valas acompañadas de patacones.  Observaciones  La picada de huevas de pescado es un plato exclusi- vo de las playas del departamento del Atlántico. Aun- que su preparación se reserva para utilizar las huevas   de peces, también es posible preparar una picada si- milar con una masa de pescado molido y luego apa- nado. Generalmente para esta variación se utiliza el   macabí.   Cocinera  Juana Rodríguez Tierra  63 años    Municipio: Puerto Colombia \n145 \n146  Derivados del millo Empanadas y arepas de millo La masa de millo base para empanadas y arepas:  3 kg de millo   Pile y cocine el millo hasta que ablande. Una vez   cocido, muélalo en molino mecánico (tradicional)   hasta obtener una masa cremosa y manejable.   Saque de esta masa las porciones requeridas para   hacer empanadas y arepas; con esta misma masa   prepare los bollos, así que, una vez elaborada, puede   escoger la cocción que más le favorezca: hervida,   freída o asada.  Empanadas de millo  Ingredientes  400 gr de masa de millo  200 gr de relleno de su preferencia (carne, pollo,   queso o vegetales)  Aceite vegetal para freír   Preparación  Disponga de cinco porciones de 80 gr de masa de mi- llo aproximadamente. En un caldero vierta abundan- te aceite y caliéntelo a temperatura madia baja.   Haga unas bolas o esferas con la masa en porciones   uniformes.  Sobre  una  superficie  lisa  (plato  de  losa)    unte un poco de aceite, ponga la bola de masa y aplá- nela con una tabla u otro plato similar. Puede utilizar   una bolsa abierta untada ligeramente con aceite para   facilitar  el  armado.  Ponga  una  pequeña  porción  del    relleno en el centro, doble la masa en forma de media   luna, pegue bien los bordes y corte con una taza del- gada para dar la forma alabeada. Fría en abundante   aceite a temperatura media baja hasta que las empa- nadas se tornen doradas. Escurra y sirva.   Arepa de millo rellena de huevo Ingredientes  1 lb de masa de millo  5 huevos   Aceite vegetal para freír  Preparación  Disponga  de  cinco  porciones  (entre  80  y  100  gr)  de    masa de millo. En un caldero vierta abundante aceite   y caliéntelo a temperatura media.   Haga unas bolas o esferas con la masa en porciones   uniformes.  Sobre  una  superficie  lisa  (plato  de  losa)    unte un poco de aceite, ponga la bola de masa y aplá- nela  con  una  tabla  u  otro  plato  similar.  El  diámetro    aproximado  debe  ser  de  15  cm  y  el  grosor  del  dedo    índice.  Puede  utilizar  una  bolsa  abierta  untada  lige- ramente con aceite para facilitar el armado. Cuando   tenga las arepas listas, fríalas en el aceite hasta que   inflen. Retire, ponga en un escurridor y con un cuchi- llo pequeño abra la arepa por un lado; rellénela con   un  huevo  entero.  Ciérrela  y  apriete  el  borde;  fría  de    nuevo  para  que  el  huevo  se  cueza.  Retire,  escurra  y    sirva caliente.  Observaciones  La ductilidad del millo es digna de resaltar. Es un ce- real  con  el  que  se  pueden  hacer  diferentes  prepara- ciones  desde  el  bollo,  hasta  los  fritos  y  las  bebidas    como la chicha o la colada.  5 empanadas y 5 arepas  Cocinera  Catalina Viloria de Charris  61 años    Municipio: Juan de Acosta  \n147 \n148  Deditos de Olaya Ingredientes  300 gr de queso costeño cortado en bastones    de 1 dedo de grosor x 8 cm de largo   1 lb de harina de trigo   100  gr de mantequilla   100 ml de leche o agua fría   1 cucharadita de polvo de hornear   1 cucharadita de sal  4 cucharaditas de azúcar  1 lt de aceite vegetal para freír   Preparación  En  un  recipiente  hondo  coloque  los  ingredientes  se- cos,  es  decir,  harina,  polvo  de  hornear,  azúcar  y  sal.    Mezcle y luego añada la mantequilla y la leche. Ama- se bien hasta integrar para formar una bola. Cubra la   masa  con  papel  o  trapo  húmedo  y  deje  reposar  du- rante  1  hora.  Pasado  ese  tiempo,  espolvoree  harina    en una superficie y con un rodillo estire la masa has- ta  dejarla  lo  más  delgada  posible,  menos  de  1/2  cm    aproximadamente. Corte tiras largas de 2 cm de an- cho y empiece a forrar los bastones de queso inician- do  en  una  punta  y  terminando  en  la  otra.  Una  vez    termine  corte  lo  que  sobra  de  la  tira  y  repita  hasta    completar todos los bastones de queso.   Caliente  el  aceite  y  ponga  a  freír  los  deditos  a  tem- peratura media hasta que doren por completo. Reti- re y sirva.   También puede congelar los deditos antes de freírlos,   conservándolos en un recipiente hermético.     10 a 12 unidades \n149  Quibbeh Ingredientes  La masa  1 lb de trigo No. 1  1lb de capón de res molido  2 cebollas rojas   1 mazo de hierbabuena fresca  Sal y pimienta árabe al gusto (mezcla de siete es- pecias, pimienta picante, canela, pimienta de olor,   clavos, nuez moscada, cardamomo y comino)  250 ml de aceite vegetal para freír  Agua  Relleno  250 gr de capón molido  1 cebolla roja  1 ramita de hierbabuena  50 gr de mantequilla  Sal y pimienta árabe al gusto  Preparación  La masa  Hidrate el trigo con suficiente agua dos horas antes   de la preparación. Una vez el grano esté blando es- curra muy bien y amáselo ligeramente para activar   el gluten.   Pique finamente la cebolla junto con la hierbabue- na. Mezcle el trigo con la cebolla la hierbabuena y la   carne, condimente con sal y pimienta árabe y ama- se muy bien. Reserve la masa en refrigeración mien- tras elabora el relleno.  (Es recomendable hacer la masa partiendo de la car- ne entera en un molino mecánico por el cual se pasa- ría la mezcla de cubos de capón, trigo, cebolla y hier- babuena).  Relleno  Condimente  la  carne  con  sal  y  pimienta  árabe;  cor- te la cebolla roja en plumas y sofríala en una sartén   con los 50 gr de mantequilla, agregue la carne, mez- cle bien; añada la hierbabuena picada y cocine hasta   que la carne esté lista, retire y deje reposar.  Armado   Saque la masa de la nevera, divídala en diez partes;   forme unas pelotas y con el dedo índice dele vueltas   para  alargarlas  dejando  un  extremo  abierto;  intro- duzca una porción de relleno, cierre la punta y pula   la forma teniendo en cuenta que las puntas deben ser   alargadas.  Fría en abundante aceite en temperatura media has- ta que el quibbeh dore.     10 a 12 unidades  Cocinera  Josefa Morato Martínez  72 años    Municipio: Barranquilla \n150 \n151 \n152  Carimañolas    6 a 8 porciones  Ingredientes  1 lb de yuca   50 gr de mantequilla  La clara de 1 huevo   Sal al gusto  Relleno de su preferencia (carne, pollo, queso o   vegetales)   1 lt de aceite vegetal   Preparación  Cocine la yuca con la sal, cuidando de que no quede   muy  blanda;  después  deje  reposar  y  secar,  muela  y    agregue la mantequilla y la mitad de la clara de hue- vo. Amase  bien. Tome  una  cantidad  y  amase  la  por- ción según el tamaño que desee; aplane y rellene con   carne o queso y forme un rollo; afínelo en las puntas   y póngalo en abundante aceite a temperatura media   hasta dorar. Sirva caliente.   Buñuelos de fríjol cabecita negra    6 a 8 porciones  Ingredientes  1 lb de fríjol cabecita negra  1 huevo  Sal al gusto  Preparación  Deje  el  fríjol  en  remojo  de  un  día  para  otro,  luego    muela o licúe y lave bien para botar el jamiche o cás- cara  del  fríjol.  Una  vez  hecho  esto  agregue  el  huevo    para  suavizar  la  masa,  sal  y  un  poco  de  azúcar.  Se    amasan y se fríen en abundante aceite.  Buñuelos de maíz    6 a 8 porciones  Ingredientes  1 lb de maíz verde tierno  1 huevo  Anís  Cebolla junca finamente picada  Sal al gusto  Preparación  Muela el maíz, integrando a la masa la leche que pro- duce el maíz; luego mezcle con los demás ingredien- tes,  amase  y  haga  los  buñuelos  para  freír  en  abun- dante aceite. \n153  Para las empanadas:  Utilice  la  masa  reservada  y  forme  una  masa  com- pacta y manejable. Haga porciones de acuerdo al ta- maño de las empanadas que desee. Forme unas boli- tas y aplane sobre una bolsa plástica con la ayuda de   una tabla. Rellene con carne, pollo, queso o vegetales.   Por último, cierre con la misma bolsa y corte en for- ma de media luna con la ayuda de una taza de borde   fino  para  café  con  leche.  Caliente  aceite  a  tempera- tura media y ponga a freír hasta dorar. Retire y sírva- las calientes.   Para las arepas dulces:  Siga el mismo procedimiento de las empanadas, pero   además de la sal agregue un poco de azúcar y anís en   grano,  frotándolo  en  las  manos  para  activar  su  aro- ma. Haga porciones, amase y forme arepas redondas,   de entre 10 y 15 cm de diámetro por 1/2 cm de gro- sor.  Haga  un  pequeño  orificio  en  una  de  sus  partes,    dos  dedos  antes  del  borde.  Caliente  el  aceite  a  tem- peratura  media,  ponga  a  freír  hasta  dorar  y  sírvalas    calientes.  Empanada y arepa dulce    6 a 8 porciones   Ingredientes  1 lb de harina de maíz blanco   Agua para hidratar la masa   4 cucharaditas de azúcar   1 cucharadita de sal   1 cucharada de anís en grano   1 lt de aceite vegetal   Preparación  Para la masa:  Cocine  el  maíz  sin  que  llegue  a  quedar  totalmente    blando. Escurra, deje reposar y muela.   Añada agua y sal o azúcar de acuerdo con la prepa- ración y reserve. \n154 \na tlántico dulce  Los fogones también se encienden para   preparar otros manjares: la comida   de dulce, representada aquí por las   mazamorras y coladas que tantas veces   ayudan a alimentar a la familia durante las   dificultades económicas. Tampoco faltan,   en este recetario, las refrescantes chichas   que además de bebida fueron alimento   y medicina  o los inefables dulces que   coronan todo buen convite: de mango,   de guáimaro, de zaragoza, de guayaba o   el novedoso turrón de guanábana. De la   memoria más profunda vienen en cambio   las bolitas de chocolate de maíz cariaco,   emblemático dulce de la región Caribe, o   la deliciosa torta de plátano que nunca se   rechaza.  Cientos de mujeres en los municipios   del departamento aportan a la economía   familiar con la venta de dulces como   estos en tiendas de barrio o ventorrillos   instalados para la Semana Santa; otras   simplemente complacen a sus familias en   ocasiones especiales. En cualquier caso,   todas contribuyen a mantener viva y rica la   cocina del Atlántico. \n156  Cocinera  Georgina María Guerrero viuda de Ruiz  71 años    Municipio: Suan  Mazamorra de plátano maduro   con ahuyama y arroz   6 porciones  Ingredientes  2 plátanos maduros  ½ lb de arroz   ½ lb de ahuyama  200 gr de azúcar  6 clavos de olor  4 astillas de canela  1 lt de leche   Sal al gusto  Agua  Preparación  Pele la ahuyama y los plátanos maduros; córtelos en   trozos.  Lleve  a  hervor  un  litro  de  agua,  cocine  la  ahuyama    junto con el arroz hasta que el grano abra y la ahuya- ma ablande. Añada el plátano, el azúcar, la canela, los   clavos y un punto de sal. Cocine a fuego medio-bajo   agregando leche poco a poco hasta que la mazamo- rra tenga cuerpo. Retire y sirva caliente o a gusto de   la persona.  Observaciones  Esta variación de una mazamorra de plátano maduro   tradicional  representa  un  importante  reconocimien- to  a  la  relevancia  que  dan  nuestras  cocineras  a  los    productos  cultivados  localmente  como  la  ahuyama,    al integrarlos de diferentes formas a la dieta familiar. \n157  m azamorras, coladas y chichas \n158  Colada de berenjena Ingredientes  1 kl de berenjenas  300 gr de azúcar  3 gr de anís   3 gr de canela en astillas  3 gr de canela en polvo  1 lb de queso costeño para acompañar   Preparación  Pele las berenjenas y cocínelas en agua en hervor du- rante media hora. Retire, deje reposar y procese en la   licuadora con dos tazas del agua de la cocción. Reti- re, cuele y lleve de nuevo al fuego añadiendo el azú- car, el anís y las astillas de canela. Cocine hasta que   la colada espese. Sirva caliente espolvoreando canela.   Acompañe con cazabe y dados de queso fresco.  Observaciones  Otra  muestra  de  la  influencia  árabe  en  nuestra  re- gión. Pero, sobre todo, una forma innovadora de apro- vechar  los  recursos  nutricionales  de  este  vegetal  en    una presentación ideal para los niños.   Cocinera  Josefa Morato Martínez  72 años    Municipio: Barranquilla 6 porciones \n159 \n160  Mazamorra o chicha agria de maíz sarazo  Cocinera  María Matilde Jiménez de Utría  91 años    Municipio: Piojó 10 porciones  Ingredientes  1 kl de maíz sarazo (semiduro)  300 gr de panela  10 gr de canela en astillas  Preparación  Remoje el maíz desde el día anterior a la preparación.   Al siguiente día muélalo utilizando molino mecánico   (tradicional) con ajuste leve para sacar el primer afre- cho. Luego, muélalo de nuevo en ajuste fuerte; sacu- da  la  molienda  y  obtenga  el  segundo  afrecho.  Final- mente  muela  una  vez  más  para  que  el  grano  quede    bien troceado.  Ponga el grano molido en un recipiente hondo, vierta   agua suficiente que lo cubra y lo conserve de esta for- ma a temperatura ambiente por dos días para agriar   la chicha.   Después  cocine  el  maíz  utilizando  el  agua  donde  lo    conservó. Endulce con panela y aromatice con cane- la en astillas. La chicha debe quedar con una textura   espesa provocada por el almidón del cereal.   Observaciones   Esta  preparación,  una  de  las  más  reconocidas  en  la    cocina  de  Piojó,  puede  consumirse  como  bebida  re- frescante fría (chicha) o como alimento caliente (ma- zamorra). \n161 \n162  Chicha de millo   6 porciones  Ingredientes  1 kl de millo  400 grs de panela  5 grs de canela en astillas  2 lts de agua  Preparación  Dejar  el  millo  en  remojo  dos  días  antes.  Cocinar  el    millo en el agua donde se conservó. Una vez hierva,   añadir la panela rallada y la canela. Dejar que se cue- za durante 15 minutos más o hasta que el cereal se   ablande.  Retirar,  reposar  y  servir.  Se  puede  acompa- ñar con hielo picado.  Observaciones  Sin duda, es una de las bebidas refrescantes más fa- mosas  del  departamento  por  sus  facultades  vigori- zantes.  Colada de millo   6 porciones  Ingredientes  1 lb de millo pilado (troceado)  1 lt de leche  Azúcar o panela al gusto  Canela en astillas   1 litro de agua  Preparación  Cocine  el  millo  en  el  litro  de  agua  junto  con  el  azú- car o la panela. Cuando el grano esté tierno, agregue   la leche poco a poco hasta que la colada se torne es- pesa. Aromatice  con  canela  en  astillas.  Muchas  per- sonas le agregan el conocido punto de sal para resal- tar el dulce y los aromas.   Observaciones  Esta es otra sabia forma de aprovechar el millo, sobre   todo, para la alimentación de los bebés.  Cocinera  Catalina Viloria de Charris  61 años    Municipio: Juan de Acosta  \n163 \n164  Peto   8 a 10 porciones   Ingredientes  1 lb de maíz blanco  2 lts de leche  1 cucharadita de sal  200 gr de azúcar  2 astillas de canela  Preparación  Cocine el maíz con los demás ingredientes hasta que   el grano esté tierno (aproximadamente por 2 horas).   Sirva bien caliente.  Jugo de zapote o níspero   1 porción   Ingredientes  150 gr de pulpa de zapote o níspero  250 ml o 1 vaso de leche o agua  Azúcar al gusto  Preparación  Licúe los ingredientes agregando hielo y sirva  bien  frío.  Jugo de corozo       4 porciones  Ingredientes  1 lb de corozo  1 lt de agua  200 gr de azúcar  Preparación  Lave y cocine el corozo en un litro de agua hasta que   el  fruto  haya  soltado  todo  su  sabor  y  se  deshidrate.    Deje  reposar,  endulce  y  sirva  fresco  o  frapeado  con    hielo.  Patillazo              4 porciones  Ingredientes  1 lb de patilla  20 limones  250 ml de agua  Azúcar al gusto  Preparación  Trocear la patilla en el agua, añadir el jugo de limón y   endulzar al gusto. Servir frío o con hielo.  Guarapo   4 porciones   Ingredientes  1 lb de panela  1/2 lt de jugo de naranja  30 limones  1 vaso de agua  Preparación  Ralle la panela y cocine en el vaso de agua hasta que   se  disuelva.  Deje  reposar  y  mezcle  con  los  jugos  de    naranja y limón. Servir fresco o frapeado.  Guarapo de piña   4 porciones  Ingredientes  250 gr de cáscara de piña  250 gr de panela rallada  1/2 lt de agua  Preparación   En un recipiente grande añada la cáscara de la piña, la   panela rallada y el agua. Tape y deje en un lugar fres- co durante 3 ó 4 días. Una vez fermentado, retirar, co- lar y servir con hielo o frapeado.  Bebidas \n165 \n166  Dulce de mango Ingredientes  1,5 kg de mango de temporada (verde o maduro)  1 lb de azúcar  1 pocillo de agua  6 clavos de olor  Preparación   Pele y despulpe los mangos, licue la pulpa con agua.   Lleve la pulpa al fuego, añada el azúcar y los clavos   de olor. Cocine a fuego medio hasta que el dulce coja   punto  y  esté  untuoso.  Deje  reposar  y  sirva  acompa- ñado con queso.  Observaciones  Santo Tomás  es  un  municipio  muy  conocido  por  su    tradición  de  Semana  Santa  y  porque  la  mayoría  de    sus calles están protegidas por la sombra de árboles   de  mango.  Esta  preparación  conjuga  de  forma  muy    representativa  esos  dos  elementos,  por  ser  funda- mentalmente para esa época.  6 a 8 porciones de 100 gr  Cocinera  Bertha María González Zabaleta  68 años    Municipio: Santo Tomás \n167  d ulces \n168  Dulce de guáimaro Ingredientes  500 gr de guáimaro  250 gr de azúcar  1 astilla de canela  1 limón  Cocinera  Ana Dolores Olivares Elles  63 años    Municipio: Luruaco       (corregimiento de Los Límites)  Preparación  Cocine  el  guáimaro  con  el  azúcar  y  suficiente  agua    en  una  olla  a  presión  durante  30  minutos.  Si  cocina    en  una  olla  tradicional  tardará  1  hora  y  30  minutos    o hasta que las cortezas de guáimaro estén blandas.   Añada la astilla de canela y el limón, cocine sin tapa   durante  diez  minutos.  Retire  del  fuego,  saque  la  as- tilla de canela, cuele y procese en la licuadora hasta   que tenga la textura de una mermelada. Sirva en un   recipiente hondo acompañado de queso costeño.  Observaciones  El  guáimaro,  además  de  ser  alimento  del  tití  cabe- ciblanco,  puede  ser  utilizado  para  preparar  dulces  y    como  bebida  de  tipo  café,  jugo  y  harina  para  fritos.    Sin duda, es un producto con mucho potencial para   desarrollar en la cocina atlanticense.  10 porciones \n169 \n170  Dulce de zaragoza roja Ingredientes  1 lb de zaragoza   200 gr de azúcar  1 coco  Cocinera  Yamile Isabel Pinedo de Reyes  59 años    Municipio: Ponedera  Preparación  Remoje la zaragoza desde la noche anterior. Cocíne- la con suficiente agua durante 40 minutos en olla de   presión hasta que ablande. Retire, deje reposar y pro- cese  en  licuadora  con  dos  tazas  del  líquido  de  coc- ción.  Ponga  en  una  olla  la  zaragoza  procesada  y  el    azúcar.  Cocine  a  fuego  medio  hasta  que  tenga  una  textura    melosa.   Despulpe el coco, córtelo en virutas o dados y reser- ve. Sirva porciones de dulce de zaragoza acompañado   con dados de coco.  Observaciones  Una  innovación  hecha  por  una  experta  dulcera,    que demuestra la versatilidad de nuestros produc- tos y la creatividad de nuestras cocineras.   5 porciones \n171 \n172  Bolitas de chocolate de maíz cariaco  Cocinera  Luciana Escamilla Gutiérrez  80 años    Municipio: Candelaria  Ingredientes  1 kg de maíz cariaco  20 bayas de pimienta de olor  20 bayas de pimienta picante  ½ lb de panela  Preparación  Muela el maíz cariaco junto con la pimienta de olor   y la pimienta picante, de dos a tres veces hasta que   pulverice.  Ralle  la  panela  y  mezcle  todos  los  ingre- dientes.  Arme unas bolitas de 80 a 100 gr. Conserve dentro de   un frasco en un lugar seco.  Observaciones  Este es evidentemente uno de los dulces más emble- máticos de la región. Aun hoy día es exhibido en los   mostradores de las tiendas junto a colombinas y todo   tipo de golosinas industrializadas.   10 porciones \n173 \n174  Turrón de guanábana y cascos de guayaba Turrón de guanábana     10 porciones  Ingredientes  1 kg de guanábana no tan madura   500 gr de azúcar  Preparación  Separe  las  semillas  de  la  pulpa  de  guanábana.  Una    vez la pulpa esté lista, llevar a una olla, añadir el azú- car y cocinar a fuego medio hasta que la mezcla ten- ga una textura acaramelada y compacta.   Retire, extienda la mezcla aún caliente sobre una su- perficie antiadherente (ligeramente untada con acei- te vegetal) y forme un rectángulo grande; empareje el   grosor hasta 2 cm aproximadamente y corte la mez- cla  con  un  cuchillo  formando  láminas  de  10  cm  de    largo por 5 cm de ancho y 2 cm de grosor. Una vez las   láminas se hayan enfriado, conserve en un recipien- te con tapa.   Observaciones  Una deliciosa alternativa para aprovechar uno de los   frutos más consumidos de la región.  Cocinera  Esmelinda Rojano Ahumada  76 años    Municipio: Santa Lucía  Cascos de guayaba     4 porciones   Ingredientes   4 guayabas medianas (semi-maduras o pintonas)  300 gr de azúcar  1 astilla de canela  500 gr de agua  1 cucharadita de esencia de cola     Pele las guayabas y pártalas por la mitad, luego retire   la  pulpa  con  mucho  cuidado  para  no  dañarla. Apar- te, en una olla, coloque el agua con el azúcar, la cane- la y la esencia; lleve al fuego y a medida que la mez- cla va reduciendo, va tomando la textura de almíbar.   Una vez alcance esa textura incorpore los cascos de   guayaba y cocine por unos 5 minutos a fuego medio.   Retire, deje reposar y por último refrigere por 1 hora. \n175 \n176  Carisecas Ingredientes  500 gr de maíz blanco  200 gr de panela  ½ cucharada de canela en polvo  6 clavos de olor  1 coco  125 ml de leche  Cocinera  María Jacinta Anaya Santoya  79 años    Municipio: Luruaco  Preparación  Hidrate  el  maíz  en  agua  desde  la  noche  anterior. Al    día siguiente escúrralo bien y muélalo junto con los   clavos  y  la  canela  (generalmente  se  utiliza  molino    mecánico). Ralle el coco con la parte fina del rallador.   En un recipiente hondo mezcle el maíz, el coco, la pa- nela y la leche. Amase bien, extienda en un recipiente   metálico  o  refractario  untado  con  mantequilla.  Hor- nee por 1 hora; retire, deje reposar, corte y sirva.  Observaciones  Pocas matronas guardan el legado de esta prepara- ción, que constituye un verdadero tesoro de la coci- na dulce de la región.  \n177 \n178  Torta de plátano Ingredientes  8 plátanos maduros y firmes  6 huevos  1 lb de queso costeño  200 gr de harina de trigo  200 gr de azúcar  50 gr de mantequilla  1 cucharada de canela en polvo  1 taza de leche  1 lt de aceite vegetal 6 a 8 porciones  Preparación  Pele los plátanos, córtelos en dados y fríalos en abun- dante aceite; cuando estén dorados retire y reserve.  Ponga en un recipiente hondo la leche y los huevos;   bata  enérgicamente  e  incorpore  la  harina  de  trigo    poco  a  poco.  Agregue  el  azúcar,  la  canela  y  los  da- dos de plátano; mezcle bien y agregue media libra de   queso costeño rallado.   Derrita la mitad de la mantequilla e incorpórela a la   mezcla.  En  una  sartén  antiadherente  derrita  el  res- to de la mantequilla a fuego bajo y adicione la mez- cla de plátano. Tape y cocine a fuego bajo hasta que   seque.  Si utiliza horno, caliéntelo previamente a 160 °C. Unte   la mantequilla en una refractaria y vierta la mezcla   de  plátano  sobre  ella.  Hornee  durante  veinte  minu- tos o hasta que la punta de un cuchillo de acero sal- ga limpia. Retire, deje reposar y sirva acompañada de   queso costeño.  Observaciones  Esta preparación se destina más para el consumo fa- miliar que para el comercial.  Cocinera  Ana Ortega Romero  72 años    Municipio: Puerto Colombia \n179 \n180  Decir ingrediente es nombrar algo que ingresa en algo, que entra a interactuar con   lo otro; es pensar en ese elemento de origen animal, vegetal o mineral –como la   sal–  que suma, que aporta, que transforma lo que había previamente. Las canti- dades de esos ingredientes, sus cualidades, sus tiempos de cocción o de reposo,   vienen a ser la clave de las recetas que con el tiempo se convierten en repertorio   y patrimonio gastronómico.   Condimentos en un mercado público. \n181  i ngredientes y utensilios  Si alguna vez nos preguntamos de dónde sale todo eso que llega a nuestro plato,   alguien nos responderá que todo se remite a un único origen: la naturaleza. Cada   paisaje  encierra  un  menú  de  granos,  frutos,  hojas,  flores,  aves,  peces  y  animales    del monte. Cada ingrediente de un plato ha sido, en su forma primera, un elemen- to natural.  Corozo, fruto muy utilizado en la preparación de bebidas. \n182 A tlántico  sabe rico  Corvina Pargo rojo Mojarra lora Bagre   Huevas de pescado  \n183  La cara acuática del departamento la conforman casi 100 kilómetros de costa sobre el mar Caribe,   115 kilómetros de orilla sobre el río Magdalena y 30 kilómetros que corren sobre el Canal del Dique,   además el embalse del Guájaro y las ciénagas de Luruaco, San Juan de Tocagua y El Totumo. Piensen   en toda la pesca que se puede producir allí, en la fiesta de redes repletas de sábalos, mojarras, chivos,   bocachicos y frutos del mar.  Pesca artesanal en Bocas de Ceniza. \n184 A tlántico  sabe rico  La ruta de Piojó, Luruaco, Repelón, Sabanalarga, Manatí, Ponedera, Sabanagrande y Baranoa es una   ruta de tradición agrícola que nos entrega ingredientes como la yuca, el maíz,  el guandú y el millo   en abundancia.   Paisaje en la vía de La Cordialidad; pastos y forrajes para la alimentación de ganado. \n185  De la yuca se sabe que partió con los pueblos de la Amazonia hacia su periplo caribeño hacia el 2500   a. de C. Con ellos recorrió el mar de las Antillas y probablemente por allí arribó a nuestras costas   hace al menos dos mil años, a juzgar por los hallazgos de Malambo y Rotinet. Es decir, que ella, gran   raíz abuela, tiene al menos 4.000 años de vivir en nuestra memoria genética.     Puesto de venta de yuca en Sabanagrande, sobre la vía troncal del Oriente. \n186 A tlántico  sabe rico  La  cocina  del Atlántico  estaba  destinada  a  recibir  otro  ingrediente,  el  maíz,  tótem  de  las  culturas    mesoamericanas, que llegó a esta planicie caribeña con su carga de espiritualidad y conocimiento.  Y en los barcos que zarparon allende el océano llegó otra semilla que se incorporó al suelo ameri- cano y resistió, como la cultura africana, los embates de la historia, el  Panicum miliaceum , conocido   como millo en la Costa Caribe colombiana. Con el millo y la memoria viva de las mujeres nos llegan   a la cocina atlanticense preparaciones cumbres como el pastel de millo con pato ahumado, de Cor- sina de la Asunción Urueta, plato exquisito desde su nombre, o los bocados de millo preparados por   Catalina Viloria de Charris, en Juan de Acosta.   Guandú, maíz y millo, trilogía de ingredientes básicos de la   cocina del Atlántico. \n187  Y si decir ingrediente es decir naturaleza, decir utensilio es decir cultura. Dos elementos que se en- cuentran en la historia de nuestros habitantes y por supuesto, en su mesa. El utensilio se hace para   el ingrediente: el budare para la yuca; el pilón, para el maíz; la totuma, para el agua y la chicha; el   cucharón para las frituras, y así cada recipiente, cada cedazo, cada espátula, cada herramienta cuen- ta una historia de adaptación y de creatividad.  Utensilios de madera y totumo elaborados por   artesanos del departamento.  Fotografía página siguiente:  Campesinos de   Ponedera cruzan los islotes del río con los   cultivos de la zona. \n188 \n189 \n190 \n191 \n\n";

        const hueToRgb = (p, q, t) => {

            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;

        if (el) {
