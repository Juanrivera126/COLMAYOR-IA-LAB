gamos la composición de un capítulo   que nos recordara el recorrido histórico de los ingre- dientes, utensilios y preparaciones que conforman la   cocina tradicional de Barranquilla y el Atlántico. Este   estupendo  recuento,  titulado  «El  binde  atlanticense:    tres  piedras,  tres  etnias»,  logra  poner  nuestros  sabe- res y prácticas culinarias en una perspectiva patrimo- nial  que  luego  se  despliega  con  toda  su  fuerza  en  el    capítulo «Un Atlántico vivo», un texto que busca apro- ximarnos  a  las  realidades  actuales  de  nuestra  gas- tronomía  y  deja  testimonio  de  ello  en  las  maravillo- sas imágenes y palabras recogidas en cada uno de los   municipios del Atlántico. El  recetario,  primorosamente  ilustrado  por   el lente de Salwa Amashta, conforma el tercer capítu- lo de este libro, en el que el colorido y la variedad de   las formas parecen saltar de las páginas para impre- sionar incluso nuestros sentidos del gusto y el olfato.   Están aquí recogidas las recetas de sal y de dulce; los   cereales,  las  sopas,  los  pasteles,  los  guisos  y  las  chi- chas; los dulces tradicionales y otras delicias que na- cen de la creatividad de nuestras mujeres, desde Puer- to Colombia hasta Suan.   Finalmente,  cerramos  el  recorrido  con  un   capítulo gráfico dedicado a algunos de los ingredien- tes y utensilios que dan vida y acompañan la cocina   tradicional  atlanticense. Vemos  así,  resaltados  en  su    belleza  elemental,  los  instrumentos  de  totumo  y  de    madera,  la  cerámica,  el  cacho  y  las  fibras  naturales,    transformadas,  muchas  veces,  por  las  mismas  ma- nos  que  adoban,  que  pican  y  sazonan  los  alimentos    de nuestra cultura campesina, marinera y ribereña. Apelar  a  la  memoria  de  nuestros  adultos   mayores y conocer de cerca su experiencia es valorar   su  saber  y  su  contribución  al  patrimonio  inmaterial    de la nación colombiana. De allí que hayamos queri- do poner en este libro, como en un honroso lugar, sus   deliciosas recetas y el mosaico de sabores que alimen- tan lo que somos.  Liliana Borrero Donado  Gestora Departamental  \n13  Helena Palmera, reconocida cocinera de Suan.  \n14 \nEl binde atlanticense: tres piedras, tres etnias \n16  El binde atlanticense: tres piedras, tres etnias Enrique Morales A   comienzos  del  cuarto  milenio  a.  de  C.,  un  gru- po  numeroso  de  cazadores-recolectores  que  cultural- mente  se  encontraban  en  el  Paleolítico  europeo  o  Pa- leoindio en América, se estableció en el territorio hoy   conocido como el departamento del Atlántico, en Co- lombia (Durán de Reichel, 1992). Por  su  ubicación  geográfica  en  el  extremo   norte  de  Sur  América,  en  la  desembocadura  del  río    que  luego  los  españoles  nombraron  Río  Grande  de    la Magdalena, el hoy departamento del Atlántico   fue  uno   de los   pasos naturales de las migraciones que en  la época precolombina se originaron en Centro Amé- rica y diversas partes de Suramérica (Escalante, 2002,   p. 5).  Esos primeros pobladores del territorio atlan- ticense  se  alimentaron  con  moluscos,  vegetales  silves- tres en cosecha, cacería menor como lagartos, roedores,   aves, huevos de estas y de reptiles. Del oso hormigue- ro,  el  oso  melero  y  los  monos  aprendieron  a  consu- mir insectos y miel. El hombre domesticó a la abeja,   atraído por el sabor dulce de la miel y para utilizar su   cera  como  impermeabilizante  de  los  hilos  de  las  fle- chas, y en la confección de instrumentos musicales y   adornos.  Coelogenys paca , Cuniculus paca   Special Collections of the University of Amsterdam  Derecha : Hacha de piedra hallada en territorio mokaná. \n17     Thierry  Legros  halló  restos  de  una  pobla- ción en Puerto Chacho, a orillas de una laguna tribu- taria  de  lo  que  hoy  es  el  Canal  del  Dique,  fechados    en  3270  a.  de  C.,  mientras  que  Gerardo  y  Alicia  Rei- chel-Dolmatoff  reportaron  otro  importante  asenta- miento  humano  fechado  en  3100  a.  de  C.  en  Puerto    Badel,  también  sobre  dicho  Canal  (Reichel-Dolmato- ff, 1989, p. 132). La  llanura  del  departamento  del Atlántico,   con sus lagunas, esteros y su río, conformaba un hábi- tat  propicio  para  culturas  simples,  semi-sedentarias,    de  pequeñas  aldeas.  En  ella  se  han  hallado  artefac- tos de piedra poco diferenciados, tallados por un solo   lado y usados en la caza de pequeños animales; tam- bién, piedras con pequeñas depresiones ovaladas que   sirvieron  de  yunques  para  romper  semillas  duras,  y    varias placas de piedra arenisca y granulosa para mo- ler  o  triturar  materiales  blandos,  probablemente  se- millas o tallos verdes que les sirvieron de alimento. Gracias a los hallazgos arqueológicos sabe- mos que estos primeros pobladores de la costa Caribe   colombiana produjeron la primera cerámica de Amé- rica, hace seis mil años. La evidencia señala que solo   dos  mil  años  después  apareció  en  México  y  Perú,  lo    que nos permite afirmar que en nuestro territorio des- pegaron  culturalmente  las  civilizaciones  americanas    (Durán de Reichel, 1992). En América, como en el resto del mundo, la  cerámica  cambió  por  completo  los  hábitos  alimen- ticios.  Cocieron  por  primera  vez  alimentos  que,  cru- dos, eran de difícil digestión, dependieron menos de la   cacería y ensayaron con éxito nuevos modos de vida.   En recipientes de cerámica pudieron almacenar gran- des cantidades de agua y bebidas, guardar alimentos   y  conservarlos  largo  tiempo  sin  que  insectos  y  otros    animales los alcanzaran. Tal logro en cantidad y cali- dad de la alimentación posibilitó el aumento de la po- blación  y  facilitó  el  desarrollo  cultural  de  estos  gru- pos humanos.  A Puerto Chacho y Puerto Badel, le siguieron  formaciones  de  grupos  humanos  con  una  organiza- ción social más avanzada, cuyos vestigios fueron en- contrados en Rotinet y Malambo, con fecha cercana al   2000 a. de C., período conocido como formativo medio.   Vasija y copa de cerámica. Cultura mokaná. \n18 A tlántico  sabe rico  Yuca.  Manihot esculenta.  Franz Eugen Köhler,   Köhlers Medizinal-Pflanzen, 1897. También  en  Malambo,  al  sur  de  la  actual  Barranqui- lla,  al  borde  de  una  laguna  fueron  encontrados  ras- tros  de  vida  aldeana,  ribereña  y  sedentaria,  nuclea- da y bien definida, fechados en 1120 a. de C. hasta 70   d. de C. Allí se consolidó el cultivo de la yuca amarga,   comprobado por la presencia de cerámica mucho más   rica en formas y fragmentos de grandes platos planos   o budares utilizados en la preparación del cazabe, una   especie de torta delgada hecha de harina de yuca. Los   habitantes de Malambo, cazadores ocasionales y pes- cadores, tuvieron la base de su subsistencia en el cul- tivo de la yuca (Reichel-Dolmatoff, 1989, p. 138).  El largo viaje de la yuca y el cazabe  Este tubérculo es originario de la Amazonia, al oriente   de los Andes, donde las evidencias de su cultivo datan   de 2500 años a. de C. Los primitivos arawac, originarios   de esta zona, emigraron a través de los grandes ríos Ori- noco y Amazonas, hasta las costas de los actuales Bra- sil y Venezuela, y de allí pasaron a las Antillas antes de   regresar a tierra firme en la costa Caribe colombiana. Se  conocen  muchas  variedades  de  yuca,   pero  desde  el  punto  de  vista  de  su  sabor,  se  clasifi- can en dos grandes grupos: la llamada yuca dulce co- nocida en la costa Caribe colombiana, y obtenida por   los arawac luego de procesos de mejoramiento gené- tico de su invención y puede consumirse cocida, asa- da o frita, sin procedimientos previos. Era la variedad   más abundante en tierra firme antes de la conquista  \n19 E l binde atlanticense, tres piedras, tres etnias  española. La otra, llamada yuca brava o amarga, más   común en los Llanos Orientales de Colombia, las An- tillas y en el actual Brasil, es la variedad más antigua;   las raíces y partes verdes de esta variedad contienen   un glucósido que en contacto con el agua se descom- pone  en  ácido  cianhídrico,  un  veneno  mortal  al  que    los indígenas dieron el nombre de «yare» y que utili- zaban para envenenar la punta de sus flechas. A esta   yuca  hay  que  lavarla,  rallarla  y  decantarla  antes  de    consumirla para eliminarle el veneno; como es nece- sario todo este proceso, esta variedad usualmente se   consume  como  cazabe.  Su  forma  de  preparación  es    igual desde hace tres mil años (Hijasz, 1992, pp. 8-9). Para preparar el cazabe, primero se descas- cara la yuca brava, se lava y luego se ralla. Esta pul- pa se deja reposar una noche para separar las sustan- cias venenosas. Al día siguiente se exprime y pasa por   un cedazo o sebucán, y la harina resultante se extien- de en budares y se lleva al fuego para asarla. El buda- re es una cerámica circular con fondo plano y bordes   levemente levantados que permite obtener unas tor- tas delgadas y redondas. Para el cazabe con yuca dul- ce  se  sigue  el  mismo  procedimiento,  pero  sin  lavarla    ni dejarla en remojo en agua (Hoyos, 1996, p. 16). El ca- zabe es la receta de cocina conocida más antigua de   América. El arqueólogo Carl Langebaeck afirma que la  imposición de la agricultura y el proceso de domesti- cación de plantas fue un proceso lento, con mucha re-  sistencia por parte de los cazadores, que ocurrió mu- cho más tarde de lo que se cree (Langebaeck, 1994). Esta agricultura rudimentaria y los avances  en las técnicas de cocción posibilitaron a los poblado- res de tales asentamientos la reducción del tiempo de   caza  y  recolección,  y  el  avance  hacia  formas  de  vida    sedentarias.  Con  comida  más  abundante,  un  mayor    número de familias pudo vivir reunido y permanecer   largas temporadas en el mismo lugar, bajo enramadas   de hojas de palma o rancherías. Fundaron  poblados  lacustres  donde  modi- ficaron  cualitativamente  la  alimentación.  Los  peces,    tortugas, moluscos y crustáceos propios del ambiente   marino fueron reemplazados por una fauna de agua   dulce más variada: moluscos lacustres (ostras, alme- jas y caracoles de tierra), reptiles (hicoteas, morroco- yos, caimanes, iguanas y babillas) y también mamífe- ros grandes (manatí, danta y venado).  Suceden entonces dos grandes mejoras ali- mentarias  con  el  aprovechamiento  de  las  migracio- nes de peces como el bagre, que en cantidades enor- mes  busca  periódicamente  las  cabeceras  de  los  ríos    y  las  ciénagas  próximas  a  la  costa  para  desovar;  por    otra  parte,  las  orillas  de  lagunas  y  ciénagas  ofrecen    tierras aluviales húmedas, irrigadas y fertilizadas por   las crecientes anuales del río Magdalena, creando las   condiciones para el desarrollo de una agricultura efi- ciente con plantas de reproducción por semillas y un   complejo sistema de uso y manejo de suelo-agua-sel- va (Molano, 1992). Cuentas de collar mokaná. \n20 A tlántico  sabe rico  El maíz llega al Caribe  Al  inicio  de  nuestra  era  se  advierte  un  gran  cambio:    mientras disminuye la cantidad de platos tipo buda- re, aparecen los metates y manos de moler tallados en   piedra, así como grandes tinajas de cerámica, pruebas   del  cultivo  del  maíz  y  su  uso  culinario  (Reichel-Dol- matoff, 1989, p. 142). La introducción del maíz, como el descubri- miento de la cerámica, fue trascendental para la eco- nomía indígena. Con este cultivo pudieron almacenar   alimentos para períodos de escasez porque los granos   pueden  consumirse  recién  cosechados  o  secos;  ade- más, el hecho de contar con gran cantidad de granos   fáciles  de  acopiar,  preparar  y  comerciar,  permitió  el    abandono de los ríos y lagunas y la ocupación de las   llanuras. La  palabra  maíz  deriva  de   mahis ,  nombre   con que lo conocían los tahínos en Las Antillas. Quizá   el nombre original fue  tlayoli  palabra nahuatl del an- tiguo México, que quiere decir «causa de vida». Según   el    Popol Vuh ,  libro  sagrado  de  los  mayas,  los  distintos   tonos de piel de los hombres se deben a que los hom- bres  originales  fueron  hechos  de  maíz  de  diferentes    colores (Hijasz, 1992, p. 9). El  cultivo  del  maíz  comenzó  en  la  llanura   del Caribe en fecha relativamente tardía, a principios   de  nuestra  era,  pero  5.000  años  antes  ya  había  sem- brados de este cereal en México y Guatemala. Este re- tardo se explica porque la alimentación primitiva era   Cultivo del maíz. Grabado de  Histoire Naturelle des Indes , 1586. \n21 E l binde atlanticense, tres piedras, tres etnias  satisfecha con tubérculos ricos en almidón, proteínas   vegetales de leguminosas y frutos silvestres, así como   proteínas y grasa animal de la fauna fluvial y lacustre.   Sólo el aumento poblacional hizo necesario el cultivo   del maíz como complemento nutricional.  Carlos Angulo Valdés, en su trabajo sobre el  Guájaro,  mostró  que  desde  los  niveles  fechados  ha- cia el año 970 d.C, las comunidades, sin abandonar el   cultivo de la yuca, introdujeron las técnicas del culti- vo del maíz. Para esa época, dice Angulo, aparece tam- bién el maíz en el Valle de Santiago, en el centro del   departamento,  en  Piojó,  Tubará  y  Cipacua,  todos  lu- gares del actual departamento del Atlántico (Angulo,   1962, p. 82). En  la  costa  Caribe  colombiana,  aún  hoy,  se   cultivan  pocas  variedades  de  maíz  frente  a  las  nu- merosas  de  clima  templado  donde  este  cereal  fue  el    alimento  principal  de  los  habitantes.  Las  principales    variedades  de  maíz  que  existen  desde  épocas  preco- lombinas en el departamento del Atlántico son las co- nocidas como cariaco, cuba, piedrecita, tacaloa y ne- grito. Con  los  granos  del  maíz  nuestros  indíge- nas  preparaban  chicha,  que  además  de  bebida  fue    alimento y medicina; de las cañas verdes de la plan- ta extraían el jugo dulce que usaban como bebida. Es   importante resaltar que, aunque el maíz era renglón   importante en la dieta, el carbohidrato más apetecido   era  la  yuca,  seguida  de  la  batata  y  acompañadas  de    ahuyama y fríjoles. Ramos  y Archila,  luego  de  avanzados  estu- dios y excavaciones, llegaron a la conclusión de que es   necesario reconsiderar el papel que la caza y la pes- ca  cumplieron  en  la  subsistencia  de  estas  poblacio- nes,  pues  se  afirma  que  la  agricultura  del  maíz  fue    la base de su subsistencia, pero la explotación de re- cursos  faunísticos  pudo  tener  en  algunos  momentos    igual o mayor importancia como estrategia económi- ca y alimenticia en estas poblaciones (Ramos & Archi- la, 2008, p. 106). Los primitivos pobladores de las costas com- plementaban su dieta con gran variedad de pescados,   almejas, camarones y tortugas marinas. Lejos del mar   y  de  los  ríos,  suplían  el  pescado  con  la  caza  de  cua- drúpedos  menores:  iguanas,  micos,  saínos,  ponches,    ñeques, guartinajas, armadillos, y aves como las gua- characas, pavas de monte, palomas torcazas y pauji- les. A los indígenas no les gustaba mucho la carne de   caimán, así que los españoles la encontraron raras ve- ces en los alimentos que obtenían de ellos;   la carne de  este animal se reservó para tiempos de mucha necesi- dad, tanto entre los españoles como entre los indíge- nas. No pasó lo mismo con los huevos que encontra- ban enterrados en las playas de los ríos; éstos, como   los  de  tortuga  e  iguana,  no  sufrieron  reparos  por  el    sabor,  pero  sí  por  la  consistencia  suave  y  la  cáscara    blanda y delgada, muy distintos de los de gallina. Los   indígenas  preferían  la  carne  de  babilla,  y  de  ella,  la    cola era la presa favorita.  El consumo de carne roja no   estuvo prohibido entre los primeros pobladores de la   costa Caribe colombiana, ni existieron los tabúes ali- \n22 A tlántico  sabe rico  menticios de los chibchas en el altiplano de los actua- les departamentos de Cundinamarca y Boyacá.  Para la preparación de los alimentos utiliza- ban el fuego abierto con la madera de matarratón ( Gli- ricidia sp. ), trupillo ( Prosopis sp .), uvita ( Cordia sp. ), totu- mo  ( Crescencia  cujete )  y  mangle  ( Avicennia  sp. )  (Ramos    & Archila, 2008, p. 102). Estos pobladores también apreciaron la gra- sa, que utilizaron exclusivamente para alumbrar.  La sociedad mokaná en el siglo XVI  A la llegada de los españoles a nuestro departamen- to en 1533, el territorio estaba habitado por los moka- ná,  emparentados  con  los  malibú,  habitantes  de  las    ciénagas  y  de  las  orillas  del  bajo  Magdalena.  Estos    mokaná eran descendientes de los primitivos arawac   que luego fueron dominados por los carib, de los que   adoptaron  su  lengua,  pero  conservaron  su  carácter    sedentario y apacible. De estos mokaná heredaron los   atlanticenses su personalidad agradable, hospitalaria   y pacífica. Desde la llegada de los españoles el territo- rio de los mokaná pasó a ser conocido como «la Tierra   Adentro», que cuando se formó la Provincia y Gober- nación  de  Cartagena  recibió  el  nombre  más  preciso    de «Partido de Tierradentro» (Blanco, 1987, pp. 27-28).   Recién  conquistada  la  independencia  de  los  españo- les se conoció como Provincia de Sabanilla; luego hizo   parte  del  Estado  soberano  de  Bolívar  y  después,  del   Otto Wilhelm Thomé.  Zea Mays.  Grabado, 1885. \n23 E l binde atlanticense, tres piedras, tres etnias  Collar mokaná con cuentas y caracoles. \n24 A tlántico  sabe rico  departamento  de  Bolívar  hasta  inicios  del  siglo  XX,    cuando se convirtió en el departamento del Atlántico. Entre  los  mokaná,  el  hombre  era  el  encar- gado de preparar el terreno; la siembra era llevada a   cabo por las mujeres, símbolo de la fertilidad. El hom- bre también cuidaba el sembrado, la cosecha y el co- mercio del producto. La mujer preparaba los alimen- tos familiares. Los  métodos  de  cocción  eran  muy  limita- dos. Preparaban los alimentos ahumados o asados so- bre  fuego  directo  sin  uso  de  hornos,  hervidos  en  ti- najas de barro sobre fogón de tres piedras, o salados   y deshidratados al sol para su conservación; no usa- ban grasa animal ni vegetal y por tanto no guisaban   ni freían. La escasez de tizne y cenizas hallados en los   fondos de las ollas de barro utilizadas para cocinar in- dica  que  consumían  alimentos  líquidos,  fríos  y  muy    poco  cocidos.  Como  condimentos  empleaban  poca    sal, ají, achiote y como saborizante y verdura, las ho- jas de la yuca. La  «vajilla»  estaba  formada  por  diferentes   cuencos de barro cocido y por el fruto seco del totu- mo  ( Crescencia  cujete ),  árbol  que  se  reproduce  por  es- quejes. A la cáscara áspera y maderosa del fruto seco   le  daban  diferentes  usos:  entera,  como  recipientes    para  guardar  agua,  hacer  maracas  y  achioteras;  cor- tada  longitudinalmente,  para  elaborar  cucharas,  ta- zas y tazones.  Como implementos de cocina utilizaban la  piedra y la mano de moler, coladores y canastos fabri- cados con fibras vegetales, ollas de cerámica para co- cinar  y  guardar  alimentos;  palas  y  espátulas  de  ma- dera  para  revolver.  Usaban  la  barbacoa  para  asar  al    fuego directo y para ahumar carnes; como fuentes de   calor  tenían  la  leña  seca,  el  carbón  vegetal  y  la  tusa    del maíz. Para  la  producción  del  cazabe  usaron  ra- yadores  fabricados  con  barro  y  espinas  de  árboles  o    pescados,  coladores  de  fibras  vegetales  llamados  en    algunas regiones «sebucán»; y el budare o callana, re- cipiente  plano  para  asar  la  yuca  ya  rayada  (Reichel    Dolmatoff, 1958, p. 37; Escalante, 2002, p. 23).   Biodiversidad y alimentación  Otro  tubérculo  importante  en  la  dieta  era  la  batata,    raíz  de  la  cual  existen  variedades  de  piel  amarilla  o    azulada, texturas lisa o áspera. Por su sabor dulce fue   el único tubérculo del agrado de los españoles, quie- nes la preparaban confitada y comparaban su gusto al   Vasija de barro mokaná, usada probablemente      para almacenar agua. \n25 E l binde atlanticense, tres piedras, tres etnias  de «gentiles mazapanes» de un sabor tan delicado que   «podía ser presentada a su cesárea majestad». Las ha- bía también con usos medicinales ( Ipomoea jalap.),  que   los  indios  llamaban   aryty ,  empleada  con  éxito  como    purgante por los aborígenes y luego por los españoles   (Valles, 2006, p. 143). El  bledo  o  amaranto,  ( Amaranthus  lutheus),   alimento  milenario  de  América,  probablemente  de    origen  centroamericano  hoy  casi  olvidado,  de  hojas    tiernas  ricas  en  fibra,  vitaminas,  proteínas  y  mine- rales,  se  sirvió  como  verdura  en  las  sopas  para  dar- les  sabor  y  cuerpo;  su  fruto,  rico  en  proteínas,  cayó    en desuso después de la conquista española (Santan- der, 1997). La ahuyama costeña, como variedad de ca- labaza, no extrañó a los conquistadores, porque la ca- labaza había sido empleada en la cocina por egipcios,   romanos y árabes. Los indígenas la consumían cocida   o asada. Los españoles le dieron otros usos: las semi- llas como sustitutas de almendras para mazapanes y   turrones; la pulpa cocida, aderezada con aceite y vina- gre, o disuelta en agua y miel como bebida. También en   forma de conserva, endulzada o escarchada con miel o   azúcar, para los viajes largos (Valles, 2006, p. 126). Los aborígenes del departamento del Atlán- tico no fueron grandes navegantes mar adentro, aun- que  sí  muy  buenos  pescadores  en  la  costa  y  en  los    ríos.  Las  numerosas  ciénagas,  lagunas  y  bosques  de    mangles de los deltas de estos ríos forman un ecosis- tema de gran riqueza y productividad pesquera, por lo   que no necesitaron alejarse de sus viviendas para en- contrar una alimentación rica. Sin embargo, desarrollaron técnicas de pes- ca como el buceo, la atarraya, el chinchorro o boliche   y el trasmallo, y entre los implementos, la nasa, arpo- nes y anzuelos como el sedal y el palangre (Jaramillo,   2005, p. 88). Con  estas  artes  pescaban  en  los  ríos  aren- ca, hicotea, bagre, manatí, bocachico, doncella y bar- budo.  Del  mar  extraían  principalmente  pargo,  roba- lo,  mojarra,  lebranche,  sábalo,  dorado,  bonito,  jurel,    sierra y mero. También sacaban caracol pala, almeja,   chipi-chipi, ostras, camarón y langostino. La langosta,   el calamar y el pulpo eran especies comunes, pero no   se consumían.  La  población  aborigen  tenía  una  alimen- tación  balanceada;  controlaba  y  respetaba  el  medio    ambiente  y  no  padecía  graves  enfermedades  virales    o carenciales. Ninguna de las osamentas encontradas   mostraba signos de muerte violenta, lo que corrobora   que llevaban una vida pacífica. La cacería ocupaba un   lugar  muy  importante  y  cobraban  abundantes  igua- nas, babillas, armadillos, zaínos, morrocoyes, venados   y aves endémicas de la región y también migratorias   (Ramos & Archila, 2008). Pero su gastronomía, aunque   nutricionalmente  balanceada,  era  sosa,  distaba  mu- cho de la riqueza de la de los aztecas e incas, más so- fisticadas y ricas en ingredientes y sabores.  \n26 A tlántico  sabe rico  Cronistas  tan  importantes  como  Gonzalo   Fernández de Oviedo   y fray Bartolomé de las Casas se  admiraron del uso generalizado de una nueva planta   llamada  axí  o  ají  por los indígenas, cuyos frutos y ho- jas eran el principal aliño de sus comidas: «De las ho- jas  del  ají  se  hace  tan  buena  o  mejor  salsa  al  gusto    que la del perejil, desliéndole con el caldo de la olla de   carne» (De las Casas, 1986) .  Los españoles llamaron al  ají «pimienta de Indias», y a las variedades menos pi- cantes las llamaron pimientos o pimentones. Cabe re- saltar  que  el  ají  picante  cayó  en  desuso  en  el  Caribe    colombiano  en  la  medida  en  que  desaparecieron  los    indígenas y su lugar en la cocina fue ocupado por los   africanos y sus descendientes. Prevaleció el ají dulce o   topito  (Capsicum frutescens),  ingrediente indispensable  de la cocina costeña.   Usaban también como condimentos la sal,  el achiote y el cilantro cimarrón.   Para ablandar la car- ne la envolvían en hojas de papayo. Como bebidas tenían el jugo de la caña del  maíz, la chicha de maíz y la de yuca, masato de piña,   mazamorra de guásimo y vinos elaborados de corozo   y del tallo de diferentes palmas.  Las recetas e ingredientes que heredamos  De los primeros pobladores heredamos múltiples re- cetas. Así, el cazabe, la mazorca cocida y la asada, el   bollo de mazorca y el limpio ( bolloemazorca  y  bollolim- pio ), el bollo de yuca ( bolloeyuca ), las arepas asadas de   maíz, el palmito o cogollo fresco de palma, la yuca y  la batata cocidas o asadas, conservan la misma rece- ta desde hace más de quinientos años, al igual que la   lisa y el camarón seco. Entre las bebidas tenemos los   jugos de frutas, la chicha, el agua de maíz ( aguaemái),   el peto y los vinos de palma y de corozo.  Gonzalo Fernández de Oviedo narra la for- ma como los indios preparaban las arepas de maíz: «...  las  indias  especialmente  lo  muelen  [el  maíz]  en  una    piedra  algo  concavada  con  otra  redonda  que  en  las    manos traen a fuerza de brazos. Y echando de poco en   poco agua, la cual así moliendo se mezcla con el maíz,   y sale de allí una manera de pasta como masa, y to- man un poco de aquello y envuélvenlo en una hoja de   yerba que ya ellos tienen para esto, o en una hoja de   caña  del  propio  maíz  o  otra  semejante  y  échanlo  en    las  brasas,  ásase  y  enduréscese  y  tórnase  como  pan    blanco» (Fernández de Oviedo, 1995, p. 284). También  utilizamos  aún  sus  implemen- tos  de  cocina,  como  la  piedra  de  moler,  las  ollas  de    barro,  el  budare  para  el  cazabe,  la  achiotera  para    extraerle  el  color  a  las  semillas  de  achiote,  el  palo- te  para  revolver  líquidos,  y  los  recipientes,  cucharas    y vasijas de totumo; heredamos, igualmente, las téc- nicas  de  ahumado,  secado  y  salado  que  conservan    los  alimentos  y  les  confieren  sabores  especiales;  co- cinar alimentos envolviéndolos en hojas de bijao o de   maíz,  lo  mismo  que  las  maneras  de  abrir  y  preparar   \n27 E l binde atlanticense, tres piedras, tres etnias  el  pescado  en  formas  conocidas  hoy  como  «mantea- do»,  «arrollao»  y  «engambuzado».  Manteado  es  abrir    el  pescado  longitudinalmente  por  el  vientre  hasta  la    aleta  dorsal,  quedando  el  espinazo  adherido  a  una    de  las  dos  mitades;  esta  técnica  se  usa  para  salar  o    ahumar el pescado. Para «arrollar» y «engambuzar» se   hacen cortes exteriores a cada costado que facilitan el   adobo y consumo porque llevan los sabores al interior   del cuerpo y parten las espinas en pedazos pequeños. La incursión española de 1492 representó en  la historia de la humanidad el choque de dos mundos,   un proceso de comunicación e intercambio cultural y   un  cambio  en  la  dieta  de  todos.  Con  la  fusión  de  las    cocinas de América, Asia, Europa y África aparecieron   nuevos  ingredientes  alimenticios,  se  modificaron  re- cetas culinarias y se asimilaron diferentes técnicas de   cocción. La coexistencia de tres grandes grupos cultu- rales: europeos, indígenas y africanos, produjo rápida- mente el mestizaje cultural de la costa Caribe colom- biana. Cada grupo étnico reinventó su cocina y de la   fusión de ellas nació una cocina con la magia del Ca- ribe  y  las  Antillas.  La  del  Atlántico  es  tan  auténtica    como la personalidad del costeño. Aunque la primitiva cocina española perdió  preponderancia,  es  indudable  que  conservó  el  rema- nente  sentimental,  una  que  otra  sazón,  y  la  influen- cia mayor en la cocina criolla. Las carnes de vaca, cer- do, cabra, gallina y los huevos de esta; verduras como   zanahoria, habichuela, cebollín, ajo, repollo, albahaca,   ajonjolí; condimentos como anís, comino y pimienta;   leche de vaca, queso, manteca de cerdo, mantequilla,  crema de leche, sólo por citar ingredientes básicos de   la  cocina  del  Caribe  colombiano,  son  herencia  espa- ñola; como el pan,  las recetas de arroces mixtos, in- cluida  la  del  relleno  de  los  pasteles  de  gallina,  pon- qués, butifarras y platos tan curiosos como la sopa de   mondongo, de ingredientes españoles pero con nom- bre y sazón africanas. También son de origen europeo   ciertas técnicas de cocina como hornear, estofar (lla- mada  también  «sudar»),  saltear  y  rellenar  las  carnes    con vegetales y aliños. Es un legado español el empleo   de utensilios como el horno, la sartén, el molino ma- nual de granos y carne, los cubiertos para comer en la   mesa y las cucharas y cucharones para servir.  El molino manual, utensilio legado por los españoles a la   cocina americana. \n28 A tlántico  sabe rico  La introducción del plátano revolucionó la comida en la América tropical. \n29 E l binde atlanticense, tres piedras, tres etnias  Desde  el  comienzo  del  mestizaje  culinario   la  dieta  americana  estuvo  claramente  diferenciada    según la clase social. Los españoles atendían las cos- tumbres de la península: refinamiento y gula entre los   miembros de la corte y la nobleza; sobriedad y a me- nudo privaciones y hambre entre las clases medias y   los pobres.  Los mestizos combinaban lo nativo y lo eu- ropeo según las posibilidades y el sitio donde vivieran;   y  los  indígenas  mantuvieron  su  comida  tradicional    no obstante la presión de las comunidades religiosas   para que cambiaran dichas costumbres.   El plátano y otras delicias  La introducción del plátano revolucionó la alimenta- ción en América como lo había hecho antes el maíz.   Este  fruto  de  origen  asiático  fue  traído  desde  las  Is- las Canarias a La Española por el misionero dominico   Tomás Berlanga en 1516 (Ritchie, 1993, p. 36), y desde   esa isla otros conquistadores lo llevaron a Santa Ma- ría la Antigua del Darién, en el golfo de Urabá (Rojas   de Perdomo, 1993, p. 37). El plátano se aclimató fácil- mente en toda la zona tropical de América y sesenta   años después de su introducción era parte integral de   la dieta de los habitantes de la costa Caribe colombia- na, donde se conocen más de treinta variedades. La caña de azúcar, originaria de India y Per- sia, llegó a La Española procedente de las Islas Cana- rias, donde los españoles la habían aclimatado. Arribó   a América en las carabelas del segundo viaje de Colón  en 1493, según consta en la carta escrita en abril del   mismo año, donde comenta la feracidad de la tierra:   «La caña de azúcar ansimesmo; los melones y pepinos   y cohombros en cuarenta días después de sembrados   dieron  fruto».  Los  primeros  esquejes  venían  sembra- dos y enraizados en tierra contenida en toneles de ma- dera que habían servido antes para almacenar vino. El  coco  es  originario  de Asia  suroccidental,   y  su  nombre,  de  origen  malayo,  fue  recogido  por  na- vegantes  portugueses.  Llegó  a  Cartagena  en  barcos    españoles  provenientes  del  sur  de  Asia  entre  1520  y    1540.  Lo  acompañaron  el  arroz  y  el  plátano  y  juntos    se quedaron en la mesa caribeña (Patiño, 1963, p. 254).   A  Fernández  de  Oviedo  le  gustaron  su  agua  y  la  le- che que se saca de la pulpa que «los cristianos echan   en  las  mazamorras  que  hacen  del  maíz  o  del  pan,  a     manera de puches o poleadas; y por causa de esta le- che de los cocos son las dichas mazamorras excelente   manjar» (Fernández de Oviedo, 1995, p. 321).  La introducción del ganado  No fue fácil formar hatos en los alrededores de Carta- gena. Los españoles llevaron a Santo Domingo vacas   preñadas para que parieran en la isla y luego trajeron   crías a Cartagena, pero los terrenos cercanos a la ciu- dad,  al  igual  que  en  el  partido  de Tierradentro,  eran    áridos y llenos de rastrojo y arbustos espinosos, poco   aptos para la cría de ganado vacuno. Hacia el centro del departamento, donde el  poblamiento indígena fue menor y a partir de los si- \n30 A tlántico  sabe rico \n31 E l binde atlanticense, tres piedras, tres etnias \n32 A tlántico  sabe rico  glos  XVI  y  XVII  la  población  libre  se  incrementó,  la    presencia  de  este  tipo  de  pobladores  imprimió  lige- ros cambios a las actividades agrícolas, las cuales se   vieron  alternadas  con  las  pecuarias. Aparecieron  así    centros ganaderos como Baranoa, Ponedera, Luruaco   y  Sabanalarga,  el  cual  se  convirtió  en  el  tradicional    foco  ganadero  del  departamento  (Gutiérrez  de  Piñe- res, Yances, Meca, 2013).  Aunque las indígenas amamantaban a sus  hijos hasta bien avanzada la infancia, se sabe que el   consumo de leche de vaca y de cabra impactó a estas   culturas  aborígenes  (Rojas  de  Perdomo,  1993,  p.  76).    Cuando hubo suficiente ganado vacuno en la costa fa- bricaron  queso  con  la  leche  no  consumida  el  día  del    ordeño porque ésta suele agriarse con facilidad en el   clima  ardiente;  con  el  queso  prepararon  recetas  es- pañolas como almojábanas y buñuelos, enriquecieron   bollos  y  arepas  indígenas  y  formó  la  pareja  perfecta    con  el  chocolate,  los  bocadillos  de  guayaba  y  la  pa- nela. Pero el queso se descompone pronto y debieron   agregar más sal de la acostumbrada: esa es la razón   de que nuestro queso costeño contenga más sal que   los  de  otras  zonas  de  Colombia.  Para  cuajar  la  leche    usaban piel de mollejas de gallina desecadas y moli- das (Montaña, 2008). Debido a la falta de buenos pastos naturales  que facilitaran el engorde, la carne de res era de mala   calidad y el ganado vacuno fue más un proveedor de   leche, mantequilla y queso o fuerza de tracción. Uno  de  los  primeros  animales  criados  con   éxito en América fue el cerdo. Con cerdos provenien- tes de Santo Domingo lograron crías para provisión de   carne. Los primeros cerdos que llegaron al continen- te fueron alimentados con una fruta silvestre que en   algunas regiones se le conoce como hobo pero que en   la Costa Caribe se le llama ciruela ( Spondias purpurea) ,   y   alimentados con ella sobrevivieron a las privaciones  de los inicios coloniales en tierra firme. Muy pronto el   cerdo  se  convirtió  en  producto  de  consumo  y  expor- tación, algunas veces con precio superior al del gana- do vacuno. En el Atlántico se formaron porquerizas im- portantes  en  Soledad,  Baranoa,  Galapa  y  Malambo,    donde, como en el caso de Baranoa y Soledad, su ven- ta y consumo hace parte de nuestros polos culinarios. La preferencia de los españoles por la carne  de cerdo, muy propia de su cultura en todos los tiem- pos,  los  diferenciaba  religiosamente  de  judíos  y  mu- sulmanes, quienes tienen prohibido su consumo (Sal- darriaga, 2006, pp.22-28).  El aporte africano  Con el siglo XVI comenzaron a llegar de África gran- des  contingentes  de  personas  esclavizadas,  tercer    componente racial de la región y gran aporte a nues- tra cocina, tanto por los nuevos ingredientes que tra- jeron como por los nuevos utensilios y las técnicas de   cocción que introdujeron. Hay que resaltar que los africanos llegados  a América no eran los negros ignorantes y atrasados   que algunos han querido ver; no conocían la escritu-  Fotografía página anterior : Ganado vacuno pastando en los alrededores de Luruaco. \n33 E l binde atlanticense, tres piedras, tres etnias  ra, es cierto, pero su avance tecnológico superaba en   muchos aspectos al de los indígenas. Cuando los abo- rígenes  colombianos  se  encontraban  en  el  neolítico,    los  africanos  vivían  una  edad  de  hierro.  Practicaban    técnicas de cultivo más complejas, dominaban el hie- rro, en cuyo manejo algunos de estos pueblos alcan- zaron gran habilidad, fabricando con él instrumentos   de labranza y grandes sartenes y ollas de cocina (Na- varrete, 1995, p. 14). Hacia  1590  existían  esclavos  en  la  hacien- da Los Jagueyes, cerca de Malambo; en la hacienda El   Carmen, ubicada entre Barranquilla y Galapa, y en la   conocida  hacienda  San  Blas,  cerca  de  Baranoa.  Esta    hacienda  y  la  San  Nicolás  fueron  los  núcleos  germi- nales de la Barranquilla posterior, con la que mantu- vo intercambio de administración y de tráfico de ga- nado (Minski, & Stevenson, 2010, p. 15). Por su habilidad como pastores, agricultores  y mayordomos, a partir del siglo XVIII fue frecuente la   presencia  de  africanos  en  las  haciendas  del  hoy  de- partamento del Atlántico. Así, encontramos abundan- te población afro en los actuales municipios de Saba- nalarga, Luruaco, Repelón, Palmar de Varela, Soledad,   Santa  Lucía  y  el  corregimiento  de  San  José  de  Saco    (Juan  de  Acosta).  Gran  parte  de  esta  población  eran    esclavos cimarrones fugados de Cartagena (Minski, &   Stevenson, 2010, p. 24). De  África  llegaron  a  la  cocina  del  Caribe   nuevos  ingredientes  como  la  gallina  de  guinea   (Nu- mida meleagris) , el guandú ( Cajanus cajan ), la candia o  quimbombó ( Hibiscus esculentus ), el «frijolito de cabe- za-negra»  ( Vigna  unguiculata),   el  fríjol  negro  o  carao- ta, llamado fríjol prieto en Cuba ( Castanospermun aus- trale ),  la  patilla  o  sandía  ( Citrullus  lanatus ),  el  guineo    ( Musa paradisíaca, sapientum ), las diferentes variedades   de ñame ( Dioscorea alata, D. sculenta, D. villosa ) y el mijo    (Panicum miliaceum)  que en la costa Caribe colombia- na conservó la pronunciación portuguesa de «millo».   Este cereal ocupa aún hoy un lugar de privilegio en los   municipios del departamento del Atlántico, donde es   preparado en diferentes formas ignoradas en la dieta   de Barranquilla, donde el millo es prácticamente des- conocido (Meca, 2017).     El ñame, como el plátano, tuvo una difu- sión rápida en América. Muchos visitantes de la épo-  ca  e  historiadores  de  hoy  los  toman  por  vegetales    nativos. Es fácil hallar hasta una docena de varieda-  des de ñame. Del tipo espinoso, que llaman «cañue-  la», tubérculo largo y delgado, y el  «burrón», de gran   tamaño. Del tipo criollo o liso se distinguen las varie-  dades «palomero», «manteca», «lagartija» y «catabrero».       Las  recetas  de  cocina  europeas,  que  los   amos  españoles  trataron  de  replicar  en  sus  cocinas    dirigidas  por  viejas  esclavas  africanas,  recibieron  de    esas manos una gran transformación de la sazón, tor- nando más fuerte el sabor de las especias y demás in- gredientes.  Las  cocineras  afrodescendientes  introdu- jeron  también  platos  como  los  guisos  con  candia,  el    selele, el mote de ñame y el de guandú, que, servidos   como  acompañamiento  o  como  plato  principal,  me- joraron notablemente la dieta mal balanceada de los  \n34 A tlántico  sabe rico  españoles. La sazón, ese arte de intuir las proporcio- nes dentro de una receta para obtener un mejor sabor,   fue el mayor aporte negro a la cocina costeña. La co- cina del Atlántico sería inconcebible sin el guandú, el   millo, el ñame y el frijolito de cabecita negra. Ellos  introdujeron  con  parsimonia  las  téc- nicas africanas de cocción, como el fritar en bastan- te  aceite,  lo  cual  era  desconocido  por  los  españoles,    acostumbrados  a  saltear  o  fritar  sus  alimentos  en    poco  aceite.  Los  españoles  preparaban  empanadas    con masa de harina de trigo y asadas al horno; en ma- nos de cocineras negras de la costa se transformaron   en empanadas de masa de maíz, con otra sazón, y fri- tas en abundante aceite caliente. Las roscas y los bu- ñuelos españoles de harina de trigo fritos en poca grasa   llamados genéricamente «frutos de sartén», se convir- tieron en toda suerte de arepas, carimañolas y buñue- litos de venta en las calles, fritos en abundante aceite y   en unos calderos grandes de clara ascendencia africa- na, sobre pequeños fogones de carbón o anafes.  Técnica  de  cocción  heredada  de  negros  es   también  remojar  granos  de  cereales  secos  o  legu- minosas  para  luego  pelarlos  y  molerlos  crudos,  con    ajos y especias, antes de verterlos por cucharadas en   abundante aceite o manteca caliente. Con granos ma- nipulados así, se preparan los «buñuelos de frijol ca- beza negra» de la costa Caribe. Es  herencia  negra  cocinar  los  alimentos  al   vapor, envueltos en hojas de plátano. El guiso o sofrito,   base de todas las salsas criollas, parece derivarse de la   salsa  ata  de los yorubas, preparada con cebolla, ajo y  ají dulce freído en manteca o aceite. Y no han cambia- do las recetas, sí los nombres del arroz con guandú, la   sopa de mojarra ahumada con candia, las «tajadas» y   los patacones.   Se puede asegurar que los negros fueron  los creadores de las recetas con plátano. El plátano   hartón  y  el  dominico,  que  no  resisten  las  tempera-  turas frías del invierno en las Canarias, eran comu-  nes en África, adonde fueron introducidos desde la   antigüedad  por  comerciantes  indonesios  y  conoci-  dos por los africanos desde antes de viajar forzados   a América. Los indígenas no lo conocían y los espa-  ñoles  sólo  cultivaban  el  banano  o  guineo  en  las  Is-  las  Canarias  para  consumirlos  como  fruta  (Patiño,    2008). Del famoso patacón se puede decir que aun-  que la receta es africana, su forma y nombre recuer- dan a una moneda de oro española llamada «pata-  cón» durante la Colonia. Los  grupos  indígenas  que  se  encontraban   asentados en esta parte del territorio caribeño a la lle- gada  de  los  españoles  se  habían  habituado  a  la  yuca    dulce, por lo que no solían preparar ya el cazabe con la   variedad amarga, que tampoco era del gusto de los es- pañoles; los negros, en cambio, sí lo adoptaron y crea- ron recetas como la torta de cazabe con plátano o cer- do guisado, los cazabitos rellenos de coco, azúcar, anís   dulce o dulce de guayaba que perduran hasta hoy. Otro  plato  de  clara  ascendencia  africana  y   extraño nombre es el «cabeza de gato», que es un puré   de plátano verde, asado o cocido, mezclado con guiso   de cebolla y ajo, al que se le pone algunas veces chi- \n35 E l binde atlanticense, tres piedras, tres etnias  charrón, y es parte del desayuno típico en algunos lu- gares de la costa. Es un plato africano por excelencia,   originario de Ghana, en donde inicialmente se prepa- raba  con  ñame.  El  nombre  de  «cabeza  de  gato»,  tan    diferente a los nombres que recibe en otros países la   misma receta, se debe a su forma redonda parecida a   una cabeza y a que en la España renacentista se lla- maba  «gato»  al  puré  de  cualquier  tubérculo.  Cuando    no se le pone cerdo, recibe en Cuba el nombre de  fufú   de plátano, y en República Dominicana  mangú ; cuan- do  se  prepara  con  el  plátano  frito  y  lleva  trocitos  de    chicharrón, en Cuba, Puerto Rico y República Domini- cana se llama  mofongo  (Rabade, 1996, p. 71) .        Los  dulces  de  consistencia  dura  o  mel- cochuda,  preparados  a  partir  de  fruta  picada  y  azú- car sin refinar o panela, son también de origen africa- no. Fray Juan de Santa Gertrudis nos cuenta del coco:  «Mas en Cartagena lo confitan, y llenan de ello caje- tas,  y  es  una  confitura  muy  especial  que  llaman  co- cada» (Santa Gertrudis, 1969, p. 238). También lo son   las  cocadas  de  diversas  frutas  tropicales,  las  paneli- tas de leche, las bolas de tamarindo y el dulce de pa- paya verde cristalizada con azúcar que recibe el nom- bre de «caballito». Grandes aportes africanos a la cocina coste- ña fueron utensilios como los calderos y sartenes de   hierro;  el  pilón  hecho  con  el  tronco  ahuecado  de  un    árbol  y  su  mano  de  moler;  el  cucharón  con  agujeros    para  revolver  y  retirar  los  fritos  y  el  bangaño  o  reci- piente para guardar y transportar líquidos, fabricado   con una variedad de calabaza oriunda de África  (Lage- naria vulgaris).  Aún hoy el bangaño es más usado que   el calabazo de totumo para transportar agua, pues el   líquido se conserva más fresco en el bangaño.  Rosa Cantillo, cocinera de Repelón, junto a su esposo. \n36 A tlántico  sabe rico  Los calderos y sartenes de hierro: aporte africano a la cocina caribeña. \n37 E l binde atlanticense, tres piedras, tres etnias  Herencia  africana  son  los  términos  culi- narios como «biche», para indicar que una fruta no   está madura; «bitute»  y «vitiviti», sinónimos de co-  mida; «cucayo», el arroz que queda pegado en el fon-  do del caldero; llamar «binde» al fogón de tres pie-  dras; «musengue» al espantamoscas y «afunchado»   a un alimento que quedó más húmedo de lo usual. Y   son palabras africanas «carimañola», un frito de for- ma ahusada que preparan con masa de yuca cocida   aliñada,  rellena  de  carne  molida  adobada  o  queso.    «Cafongo»,  una  variedad  de  bollo  de  mazorca  sa-  zonado  con  especies  y  de  sabor  dulce  muy  común    en el sur del departamento de Bolívar. La «biranga»   es una papilla o mazamorra de plátano maduro, le-  che  y  azúcar.    El  «minguí»,  un  puré  de  plátano  pa-  recido al mangú de República Dominicana, llamado   así  por  los  habitantes  del  Palenque  de  San  Basilio,    y  que  en  Magangué  y  Montería  es  hoy  una  bebida    fría  hecha  de  plátano  maduro.  El  «guarapo»  o  jugo    de  la  caña  recién  exprimida  y,  también,  el  fermen-  tado.  El  «selele»,  que  es  una  sopa  de  frijolitos  ver- des con ñame, plátano maduro, yuca y carne salada.   Otros nombres africanos son: «ñango», el coxis hu-  mano  y  culinariamente  la  parte  última  de  la  raba-  dilla de la gallina; «mondongo», la panza de la vaca;   «guineo»,  variedad  de  plátano  que  se  come  como    fruta  madura  sin  necesidad  de  cocinarlo,  conocido    también como banano, habano, platanito y banana   (Del Castillo, 1982, pp. 128-131).  Además de su música, danza, sazón, cocina  sabrosa  y  alegría  de  vivir,  los  afrodescendientes  nos   legaron la capacidad de ser felices en la adversidad y   la de construir una sociedad con valores en medio de   la crueldad; valores con los que hemos podido sobre- vivir como nación durante más de doscientos años de   guerras fratricidas. Terminadas las guerras de la independen- cia  en  1819,  Cartagena,  la  otrora  gran  ciudad  de  la    época de la cruz y de la espada quedó destruida, su   clase  dirigente  había  sido  asesinada  por  orden  del    español Morillo; el canal del Dique, su vía de comu-  nicación con el río Magdalena y de allí al centro del   virreinato, se encontraba cegado e inhabilitado para   su navegación por el abandono sufrido durante las   guerras. Así, el gran puerto comercial estaba solita-  rio  y  el  comercio  desde  el  exterior  hacia  La  Nueva    Granada era imposible. Quedaba el magnífico puer- to de Santa Marta, pero la comunicación entre este   y el río era difícil y por ende costosa. Siglos atrás, cuando llegaron los españoles  y encontraron la desembocadura del Río Grande de   La  Magdalena,  esta  les  pareció  poco  atractiva  por- que dicho río, como todos los grandes ríos, tenía va-  rias desembocaduras y barras de arena que dificul-  taban  su  entrada  desde  el  mar.  Simultáneamente,    cerca  de  la  desembocadura,  en  la  margen  occiden-  tal,  hallaron  un  sitio  donde  los  mokaná  comercia-  ban con chimilas y taironas del actual departamen-  to del Magdalena. Posteriormente, y con los cambios   violentos de la Conquista, el sitio siguió siendo uti-  lizado  como  punto  comercial  por  distintos  grupos    hasta derivar en un «sitio de libres» que nada tenía  \n38 A tlántico  sabe rico  que ver con los primitivos mokaná ni con los inmi-  grantes  posteriores  que  hicieron  pujante  a  la  ciu-  dad  (Arrieta  &  Hernández,  2007,  pp.  13-30).  Riguro-  samente,  no  podemos  hablar  ni  de  una  población    prehispánica  ni  de  fundación  española.  Barranqui-  lla fue poblada, no fundada.   Su  auge  como  puerto  se  inició  en  la  rada   de Sabanilla, que utilizaron como fondeadero donde   descargaban en barcazas, hasta la costa, y de allí na-  vegaban por el hoy cegado canal de la Piña hasta al-  canzar el río Magdalena en la naciente Barranquilla. A mediados de siglo XIX, establecida la na- vegación a vapor por el río Magdalena y con acceso fá- cil al mar, prosperó Barranquilla en la margen izquier- da de la desembocadura del río. Tomó el liderazgo de   la costa, fue puerto de llegada para inmigrantes euro- peos  y  asiáticos  y  entrada  de  la  modernidad  al  país.    Aquí creció una culinaria propia, fusión de la rica co- cina cartagenera y la de comerciantes europeos, que   pasada la guerra de la Independencia se establecieron   en la ciudad. Las  palenqueras  de  San  Basilio  trajeron  la   cocina  cartagenera,  y  cantando,  prepararon  además    recetas  de  inmigrantes  que  ganaron  un  gusto  dife- rente  en  sus  manos.  Vendían  dulces,  alegrías,  coca- das, bollos de maíz y de yuca, frutas y pescado. Por las   noches,  instalaban  anafes  para  venta  de  fritos:  are- pas de huevo, empanadas, carimañolas y buñuelos. Se   instalaron en el Barrio Abajo, perfeccionaron hasta la   maestría el sancocho de guandú y lo hicieron popular   como almuerzo del domingo de carnaval. De sus ma- nos  nacieron  otros  platos  insignia  de  los  barranqui- lleros:  el  arroz  de  lisa,  pescado  de  agua  salobre;  y  el    arroz de chipi-chipi, una almeja pequeña y abundan- te en la región.   Los  primeros  hoteles,  propiedad  de  euro- peos, confirieron un aire internacional y mundano a la   cocina de la ciudad. En ellos se prepararon los prime- ros raguts, patés, suflés,  mousses , fricasés y gratinados   de la ciudad; con estos, en 1879, en el hotel San Nico- lás, se ofreció un luminoso banquete con las mejores   galas criollas en honor de Ferdinand Marie, vizconde   de Lesseps, constructor del canal de Suez, quien se di- rigía a Panamá (Minsky & Stevenson, 2009, p. 169) Paralela a esta cocina glamurosa ,  según las  memorias del padre Pedro María Revollo, en 1875 en   las calles de Barranquilla se podía ver:  en  ventas  portátiles  de  comida,  alrededor  de    la  plaza,  se  vendía  pescado  frito,  golosinas  y    bebidas  refrescantes,  pero  sin     alcohol  ni  hie- lo [...] allí las arepitas fritas, caribañolas y bu- ñuelos  de  fríjol,  en  las  fritangas  situadas  en    las gradas del altozano; los panes rellenos, los   dulces  de  chaza,  los  panderos  descubiertos  y    cubiertos,  las  casadillas  con  coco,  las  butifa- rras  de  Soledad  (las  mejores  del  mundo),  ja- leas de tamarindo traídas de Sabanalarga, las   conservitas  de  distintas  frutas  traídas  de  La    Ciénaga,  envueltas  en  hojas  de  bijao,  las  chi- chas de maíz, o arroz, o piña y el guarapo dul- ce  o  fuerte;  y  para  las  damas  finas,  los  roso- lios de distintos colores .  (Becerra, 1993, p. 372) \n39 E l binde atlanticense, tres piedras, tres etnias  La mojarra frita, protagonista de una de las recetas emblemáticas del Atlántico. \n40 A tlántico  sabe rico  Eran los finales del siglo XIX, y con la inau- guración del acueducto y la planta eléctrica, el hielo   revolucionaba la conservación de los alimentos y ha- cía posible las bebidas frías, un alivio para el clima ar- diente de la ciudad.  Nuevas culturas enriquecen el plato  A mediados del mismo siglo, la disolución del Imperio   otomano forzó a sirios, palestinos y libaneses a aban- donar  sus  países  y  un  puñado  de  ellos  se  estableció    entre nosotros, enriqueciendo además de la cocina, el   comercio y la ciudad. La mayoría de ellos se instala-  ron en Barranquilla, aunque en Luruaco hubo un gru- po significativo de estos laboriosos inmigrantes. Su contribución es enorme: el «suero salao»,  adaptación costeña del  laban  árabe; los «chuzos»,  que- babs   sazonados  por  manos  barranquilleras,  y  los  de- ditos  de  queso  de  claro  origen  levantino.  Pero  el  rey    de esta cocina es sin duda el  quibbeh , que conservó su   nombre original y aparece junto a las nativas arepas,   empanadas y pastelitos en cualquier tienda de fritos   de la ciudad. Merced  a  los  sirio-libaneses  algunos  ingre- dientes existentes en la costa desde la Colonia, como   el  repollo,  el  trigo  molido,  los  garbanzos,  el  ajonjolí,   Vendedor de patillazo, la refrescante bebida que encontramos en cualquier calle de Barranquilla. \n41 E l binde atlanticense, tres piedras, tres etnias  las  almendras,  los  pistachos,  y  aromatizantes  como    el agua de azahar y de rosa, yerbabuena y tomillo, ad- quirieron matices y usos nuevos en nuestra cocina. Poco antes de los árabes, numerosos judíos  sefarditas curazaleños se establecieron en Barranqui- lla trayendo consigo el aporte del arroz con pollo: pae- lla española ajustada a los preceptos del Levítico, que   prohíben  cerdo,  conejo  y  mariscos.  Este  cobró  repu- tación de plato elegante quizás porque los pocos po- llos y gallinas en la ciudad de entonces, procedentes   del  campo,  se  mantenían  en  los  patios  mientras  lle- gaba la hora del sacrificio en días especiales, y quizás   también  porque  desde  su  llegada,  las  familias  cura- zaleñas constituyeron la clase alta de Barranquilla, y   sus modales, finos manteles, cubiertos de plata y ser- vicio en la mesa fueron tenidos como elegantes y dig- nos de imitar. Otros platos curazaleños como el que- so de bola holandés relleno de carne molida sazonada   o de arroz con coco, desaparecieron de los recetarios   por su alto costo. De Venezuela llegaron las hayacas,   infaltables en navidad. Los  italianos  fueron  los  inmigrantes  euro- peos más numerosos. Popularizaron espaguetis, lasa- ñas,  canelones,  raviolis,  fideos  y  pasta  corta  para  so- pas.  Más  tarde,  con  las  comidas  rápidas  proliferaron    las pizzerías. La  milenaria  cocina  china  arribó  envuelta   en una triste historia, pues los laboriosos chinos llega- ron a Barranquilla desempleados y sin recursos para   volver a su patria, despedidos al finalizar su labor en   la  construcción  del  ferrocarril  transoceánico  de  Pa- namá, a fines del siglo XIX. Algunos se dedicaron en- tonces  al  tradicional  oficio  de  las  lavanderías;  otros    abrieron  restaurantes  y  los  últimos  plantaron  horta- lizas  y  establecieron    granjas  avícolas  junto  a  caños    y  ciénagas  aledañas  al  río  Magdalena.  Trajeron  jen- gibre,  pimentón  chino,  salsa  de  soya,  y  la  técnica  de    freír  en  poco  aceite,  mientras  revuelven  con  movi- mientos  vigorosos.  Sus  verduras  frescas,  abundantes    y  a  bajo  costo,  enriquecieron  nuestra  mesa  y  abara- taron los vegetales que antes se debían traer del inte- rior del país. Empresarios  griegos  fundaron  la  Heladería   Americana,  cuna  del   frozomalt,   que  hoy  sentimos  de    estirpe barranquillera.   Personas  del  interior  del  país  como  ocañe- ros,  boyacenses,  santandereanos,  antioqueños  y  to- limenses,  se  integraron  con  rapidez  a  la  sociedad  e    incorporaron ingredientes como el fríjol rojo, la arra- cacha, la arveja, la remolacha, la cebolla «ocañera», el   cilantro y las recetas con papa, ajenas a la cocina ba- rranquillera.       Fue  así  como,  a  mediados  del  siglo  XIX,   en la cocina del Atlántico ya se podían distinguir dos   tendencias  diferentes.  Una,  la  de  Barranquilla,  cos- mopolita,  con  ingredientes  de  todos  los  continentes,    ganado  vacuno  abundante  y  el  arroz  como  principal    cereal; otra, la de los otros poblados, que habían desa- rrollado cocinas parecidas entre sí con cerdo, anima- les  de  monte  y  cacería  pequeña  como  proteína  ani- mal,  con  la  yuca  como  principal  fuente  calórica,  el    millo como el cereal más común, el guandú o guan- \n42 A tlántico  sabe rico  El «binde», nombre genérico de los fogones de piedra tradicionales de la región. \n43 E l binde atlanticense, tres piedras, tres etnias  dul como la leguminosa propia, ahuyama, berenjena   y fríjoles como la zaragoza y el cabecita negra. Los po- blados a orillas del mar, del río Magdalena y de las cié- nagas  consumían  además  abundante  pescado,  anfi- bios y patos.  El mercado público de Barranquilla era y es  la  sumatoria  de  los  haberes  alimenticios  de  todo  el    departamento. Pero donde fuera, las delicias culinarias ha- bían nacido y se cocinaban en un binde: el ancestral   fogón  de  tres  piedras,  nombrado  con  ese  sonoro  vo- cablo  por  los  africanos  y  luego  por  todo  el  mundo.    Nuestra cocina prehispánica desconoció el horno, así   que  sus  alimentos  se  cocieron  en  tres  piedras  y  fue- go  abierto.  Luego  los  españoles  lo  trajeron  pero  con    la excepción de algunas golosinas como almojábanas,   queques, diabolines y el poco pan que permitía la es- casa harina de trigo del mercado, solo se usaba para el   pavo asado y el pernil de cerdo de las grandes ocasio- nes. Arroces, pasteles, tortillas, guisos, potajes de gra- nos, todo se preparó en binde, al igual que en su natal   binde  los  africanos  desarrollaron  su  magistral  sazón    y crearon los platos que faltaban para unificar nues- tra cocina.   Los primeros pobladores aborígenes de Ka- mach, los de la Hacienda de San Nicolás, los de las Ba- rrancas del mismo nombre y los de la actual Barran- quilla, Puerta de Oro de Colombia, todos cocinaron en   binde.  Más  tarde  elevaron  las  tres  piedras  e  hicieron    fogones a la altura de la cintura de las cocineras pero   siguieron llamando binde al fogón.     Hoy,  todo  lo  que  nos  huela  a  pasado  de   moda o de uso en otros tiempos está llamado a des- aparecer. El español, como lengua viva que es, adop- ta  pronto  los  nuevos  giros  y  acepciones.  El  «coste- ñol» botó pronto a la basura el binde por «corroncho»,   igual que a la castísima batea, el manduco, la achote- ra, el meniador, la mecha y otras más que si las nom- bro, mis escasos lectores se quedan sin saber qué sig- nificaban  hace  solo  cincuenta  años;  y  se  encantó  en    cambio  con  el  «osterizer»  como  genérico  para  todas   las licuadoras eléctricas y con el «friser» como hijo cu- rrambero del  freezer  norteamericano; se enamoró del    mixer,  el  food processor  pronunciado por algunos como  «ful procesor», elegantísimos todos.  En muchas casas desaparecieron ya los cal- deros,  uno  brillante  para  el  arroz  y  otro  negrito  para    los fritos, que conservaba el remanente del aceite usa- do para las tajadas y patacones que se hubieran freí- do en él la vida entera. Solo cuando se bajaba un poco   el nivel se le agregaba otro poquito de manteca enci- ma. Ya se los debieron regalar a las fieles empleadas   «por días» cuando los reemplazaron por la olla arro- cera y la freidora. No soy un viejito  old school  como dicen aho- ra los jóvenes; me encanta el progreso, la tecnología y   las novedades, pero todavía voy al barrio Abajo por el   «rasguñao», a Soledad por los fritos y las butifarras, a   Pital de Megua por los pasteles, a Baranoa por los chi- charrones, a Luruaco por las arepas de huevo, y si no   está haciendo mucho calor me voy hasta Suan a co- mer  arenca  con  yuca  harinosa  o  mojarra  lora  frita  a    La Peña, junto al Guájaro. \n44 A tlántico  sabe rico  Angulo Valdés,  C.  (1962).  Evidencias  de  la  serie  Barran- coide  en  el  norte  de  Colombia .     Revista  colombiana  de   antropología . XI, 82. Bogotá. Arrieta Armando-Hernández, R. (2007).  Los inicios de Ba- rranquilla. Poblamiento en el bajo Magdalena Siglos XVI al   XVIII.  Barranquilla: Ediciones Uninorte. Becerra, J. (1993).  Historia de la Arquidiósesis de Barranquilla  a través de la biografía del padre Pedro María Revollo . Bo- gotá: Ediciones Banco de la República.  Blanco Barros, J. A. (1987).  El Norte de Tierradentro y los orí- genes de Barranquilla.  Bogotá: Banco de la República.  Escalante, A.
