    <style>
        :root{--primary:#007bff;--secondary:#6c757d;--light:#f8f9fa;--dark:#343a40;--success:#28a745;--danger:#dc3545;--warning:orange;--radius:8px;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--bg:var(--light);--text:var(--dark);--card:#fff;--border:#ddd;--input:#fff;--iborder:#ccc;--bot-bg:#e9ecef;--bot-text:var(--dark);--user-bg:var(--primary);--user-text:#fff;--sys-bg:#fff3cd;--sys-text:#856404;}
        body.dark-mode{--bg:#212529;--text:#f8f9fa;--card:#343a40;--border:#495057;--input:#495057;--iborder:#6c757d;--bot-bg:#495057;--bot-text:#f8f9fa;--sys-bg:#332701;--sys-text:#ffeb8f;}
        body{font-family:var(--font);margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;transition:background .3s,color .3s;}

        header p{margin:5px 0 0;font-size:.9em;color:var(--secondary);}

        button:hover{background:#0056b3;}
        button:disabled{background:var(--secondary)!important;opacity:.65;cursor:not-allowed;}
        #theme-btn{background:var(--secondary);}

        .btn-export{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85em;transition:background .2s;}

        .chat-display{height:360px;overflow-y:auto;border:1px solid var(--iborder);border-radius:var(--radius);padding:10px;background:var(--bg);line-height:1.6;}

        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}
        .message{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;max-width:100%;}
        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}
        .avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #eee;background-color:#f0f0f0;}
        body.dark-mode .avatar-img{border-color:#444;background-color:#555;}
        .message-bubble{padding:10px 15px;border-radius:18px;max-width:85%;word-wrap:break-word;line-height:1.5;display:flex;flex-direction:column;}
        .user-message .message-bubble.user-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:5px;margin-left:auto;}
        .bot-message .message-bubble.bot-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:5px;margin-right:auto;}

        .chat-display .bot-message .message-bubble p{margin:0 0 8px;}.chat-display .bot-message .message-bubble p:last-child{margin:0;}
        .chat-display .bot-message .message-bubble pre{background:var(--dark);color:var(--light);padding:10px;border-radius:5px;overflow-x:auto;}
        .chat-display .bot-message .message-bubble code{background:rgba(0,0,0,.1);padding:2px 4px;border-radius:3px;}
        body.dark-mode .chat-display .bot-message .message-bubble code{background:rgba(255,255,255,.1);}

        #send-button{background:var(--success);padding:0 20px;display:flex;align-items:center;justify-content:center;gap:8px;}
        #send-button:hover{background:#1e7e34;}
        .loader{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:none;}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        footer{text-align:center;padding:12px;background:var(--dark);color:var(--light);font-size:.8em;margin-top:20px;}
        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}

    const PDF_TEXT = "                         Disponible en: http://www.redalyc.org/articulo.oa?id=349733229007       Red de Revistas Científicas de América Latina, el Caribe, España y Portugal  Sistema de Información Científica  Moncada-Hernández, Sandra Guillermina Cómo realizar una búsqueda de información eficiente. Foco en estudiantes, profesores e investigadores en el área educativa Investigación en Educación Médica, vol. 3, núm. 10, abril-junio, 2014, pp. 106-115 Universidad Nacional Autónoma de México Distrito Federal, México      ¿Cómo citar?          Número completo          Más información del artículo          Página de la revista  Investigación en Educación Médica,  ISSN (Versión impresa): 2007-865X  revistainvestedu@gmail.com  Universidad Nacional Autónoma de México  México  www.redalyc.org Proyecto académico sin fines de lucro, desarrollado bajo la iniciativa de acceso abierto \nInv Ed Med 2014; 3(10) :106-115  http://riem.facmed.unam.mx  ISSN : 2007-5057  – see front matter © 2014 Facultad de Medicina Universidad Nacional Autónoma de México. Arte, diseño, composición tipográfica y   proceso fotomecánico por Elsevier México. Todos los derechos reservados. Correspondencia:  Circuito Exterior s/n, 1er  Piso del Edificio Principal, Instituto de Fisiología Celular, Universidad Nacional Autó -  noma de México, Ciudad Universitaria, Coyoacán N° 04510, México D.F., México. Teléfono: (55) 5622 5637.  Correos electrónicos:   moncada@unam.mx, sandramoncadahdz@gmail.com  M ET o D ologí A   DE   IN v E s TI g ACI ó N   EN   EDUCACI ó N   M é DICA  Cómo realizar una búsqueda de información eficiente. Foco en   estudiantes, profesores e investigadores en el área educativa Sandra Guillermina Moncada-Hernández  Instituto de Fisiología Celular, Facultad de Medicina, Universidad Nacional Autónoma de México, México D.F., México  Recepción 28 de enero de 2014; aceptación 7 de febrero de 2014  PALABRAS CLAVE  Estrategias  de  búsqueda;   búsqueda  de información;   habilidades  en  la  búsque -  da  de  información;  recu -   peración  de  información;   investigación    educativa;   México.  Resumen   Un gran porcentaje de estudiantes y profesorado del área biomédica, utilizan  g oogle como la  primera opción de fuente de información (FI) ante una pregunta académica, por otro lado sólo  el 40% de las búsquedas realizadas por médicos para resolver problemas clínicos, encuentran   la información correcta.   El objetivo de este documento estuvo dirigido a aportar las bases fundamentales de las bús -   quedas de información (BI) y la adquisición de habilidades que permitan obtener información   selectiva, relevante y pertinente; de manera eficiente y crítica, así como identificar las FI   pertinentes en el área biomédica.  s e propusieron tres grupos de usuarios en la BI: 1) estudian -  tes y profesorado, 2) profesionales clínicos e 3) investigadores, con la finalidad de construir   la metodología de búsqueda e identificar las FI de acuerdo a las necesidades de cada grupo.  s e planteó un proceso de seis fases para la búsqueda efectiva de información: acercamiento  del tema, planteamiento de la pregunta, construcción de la estrategia, elección de la FI,   opción de refinar la búsqueda y la organización, administración y uso de la información; las   cuales involucran el desarrollo de las habilidades más importantes en la BI.  l a BI comprende un proceso dinámico, en la medida que se desarrollen las habilidades ne -  cesarias  para  garantizar  el  éxito  en  este  proceso  se  logrará  la  capacidad  de  “pasar  de  la   información al conocimiento”, la habilidad para formular preguntas y la construcción de las   estrategias de búsqueda para obtener la mejor evidencia, así como evaluarla críticamente,   es una destreza esencial para el apoyo en la toma de decisiones, la construcción de marcos   de referencia, actualización en el proceso de enseñanza-aprendizaje, por lo que es de suma   importancia que la comunidad conozca y utilice los servicios de las bibliotecas, finalmente la   tendencia de la enseñanza controlada conlleva que el alumno sea más autorregulado e inde -  pendiente. \nBúsqueda de información 107 IssN en trámite – see front matter  2014 Facultad de Medicina Universidad Nacional Autónoma de México. Arte, diseño, composición tipográfica y   proceso fotomecánico por Elsevier México. Todos los derechos reservados.  KEYWORDS  s earch  strategies;  retrie -  val  information;  informa -  tion  seeking;  information   skills;    educational    re -   search; Mexico.  How to conduct an effective search for information. Focus in students, teachers and re -   searchers in education  Abstract  A large percentage of students and professors from the Biomedical field use Google as their   first option of information source whenever an academic question emerges. On the other    hand, only 40% of searches performed by physicians to solve clinical issues result in a correct   information.   The aim of this document was to provide the basis for Information Search (IS) and the acquisi -   tion of abilities to obtain selective, significant, and pertinent information in an efficient and   critical way. Also, to identify information sources relative to the Biomedical field. To achieve   this, three groups of IS users were proposed: 1) Students and Professors, 2) Clinical Profes -   sionals, and 3) Researchers. The purpose being to build a search methodology and identify    information sources according to each group needs.   A six-phase process was proposed for an efficient information search: closing on the subject,   question presentation, strategy elaboration, choice of information sources, option to limit    the search, and the organization, administration and use of the information. These involves    the development of the most important abilities for IS.  IS entails a dynamic process. As necessary abilities are developed to guarantee a successful   process, the skill to “proceed from information to knowledge” will be achieved. The ability   to formulate questions and elaborate search strategies to obtain the best evidence as well as    a critical evaluation is an essential skill to support decision-making, elaboration of reference   frames,  and  update  the  teaching-learning  process.  The  academic  community  should  get  to     know and use library services, especially nowadays since controlled teaching trends imply    students be more self-regulated and independent.  Introducción  Es común  que  en  los últimos  años se  mencione  la  gran   cantidad  de  fuentes  de  información  (FI)  disponibles  en   internet,  así  como  el  nivel  de  especialización  de  la  in -   formación por sí misma, el área biomédica es un ejemplo   explícito debido al aumento exponencial de publicaciones   incluyendo las más especializadas. Desde la década de los 90’s con la generación de bases  de datos especializadas en diferentes áreas del conoci -   miento, surgió la necesidad de desarrollar las habilidades   en la búsqueda de información de los estudiantes, profe -   sionales y educadores en el área de la salud. En los inicios   del siglo XXI ha sido ampliamente aceptada la Medicina   Basada en Evidencia (MBE), definida como la integración   de la búsqueda de evidencia con la experiencia clínica y   la evidencia del paciente, apoyadas por la evidencia docu -   mental; existen actualmente bases de datos en MBE, como   ejemplo de la diversificación y especialización para cubrir   aspectos específicos de los servicios de información dirigi -   das a necesidades puntuales en cada especialidad.1,2  s e  ha  generado  mayor  dificultad  en  quienes  buscan  información para acceder a la literatura relevante y de  calidad,  de  manera  fluida  y  principalmente  sin  invertir   mucho tiempo.  l a búsqueda de información en las bases  de datos se ha convertido en un fenómeno constante en   todas las organizaciones de educación y de investigación,   por lo que las bibliotecas de las instituciones se encargan   de seleccionar las bases de datos y las FI pertinentes y   relevantes en cuanto al contenido y cobertura para sus   comunidades de usuarios.3  l a revisión de la literatura es una de las actividades  esenciales del quehacer académico por lo que: “generar  conocimiento basado en la información que se origina de   la literatura científica”,4 es uno de los principios para la  búsqueda de información y requiere especial atención. Diversos  autores  refieren  que  actualmente  el  mayor  porcentaje de profesionales de las ciencias biomédicas,   principalmente estudiantes de los diferentes grados y pro -   fesorado, utilizan  g oogle como la primera opción de FI  ante el desconocimiento de algún término, enfermedad o   pregunta académica. Estudios recientes demuestran que   sólo el 40% de las búsquedas realizadas por médicos, para   resolver  problemas  clínicos,  encuentran  la  información   correcta.1,5 Por otro lado, se les considera “nativos digitales” a  los  estudiantes  universitarios,  pero  realmente  se  han   sobreestimado  sus  habilidades  cuando  se  trata  de  ac-    ceso eficiente a la información validada, este sobreuso de   g oogle para la búsqueda de información especializada les  desorienta y se enfrentan al exceso de registros no acadé -  micos y poco confiables.6,7 Ante esta situación se han planteando desde hace al -  gunos años la necesidad de incluir en los contenidos aca -  démicos uno o varios cursos dirigidos al conocimiento y   uso  de  las  FI  adecuadas  a  las  necesidades  académicas,   apoyados también por tutoriales como forma de autoa -  prendizaje, uno de los objetivos principales es lograr la   adquisición  de  las  competencias  necesarias  para  el  uso   de los servicios de información como las bases de datos.8 El objetivo principal de este documento está dirigido  a aportar las bases fundamentales de las búsquedas de   información (BI), para la adquisición de habilidades que   permitan obtener información documental de manera efi -   ciente y crítica, así como identificar las FI pertinentes en   el área biomédica, para lo cual se han identificado tres  \nMoncada-Hernández SG 108  grupos de usuarios en la recuperación de información es -  pecializada: 1.     En el proceso enseñanza-aprendizaje, en los diferen -  tes niveles de educación es necesario que los estu -   diantes y el profesorado consulten las FI correctas,   por tanto el conocimiento y manejo de las mismas les   permitirá resolver de forma efectiva sus planteamien -   tos y revisiones bibliográficas, así como otras fuentes   que apoyan la construcción del conocimiento.  2.     Cubrir  las  necesidades  en  la  toma  de  decisiones  clínicas basadas en la experiencia y en la literatu -  ra, por lo que la destreza para realizar las BI es una   herramienta muy importante para el clínico, que   requiere  de  respuestas  inmediatas  y  específicas,   de esta forma obtener la mejor evidencia para la   toma de decisiones clínicas. 3.     En el ámbito de la investigación, específicamente  en la educativa, es constante la revisión y análisis   profundo de la bibliografía publicada, de diversas   fuentes especializadas por lo que esta habilidad le   apoyará en aumentar la eficacia en este proceso.1,8 En la  Figura 1  se observan los grupos de usuarios defi -  nidos para las necesidades de búsqueda de información en   el área biomédica y de la salud, así como sus principales   productos de información al que se dirigen.  ¿Cómo se desarrolla esta destreza en búsque - da de información?  Identificar  la  literatura  relevante,  pertinente y confia-  ble de manera eficien te es posible, aún de la gran can -    tidad de  información  disponible  en  internet  y  en  los     medios  impresos  que   aunque    parezca obsoleto sigue   siendo  viable  y necesa ria, como es el caso de muchos     títulos de libros que se  siguen  publicando  sólo  en  for -    mato impreso, así como  revistas, tesis, ensayos, series,   etc. (En: Sánchez Men diola M y Martínez Franco A. 2014,    Informática Biomédi ca, capítulo 5 se puede consultar la     clasificación de las  FI documental según el nivel de con -    tenido: primarias y  secundarias).9 Algunas de las habilidades más importantes a desarro -  llar para realizar BI efectivas son: 1.     Formulación efectiva de una pregunta o cuestio -  namiento. Reconocer  la  importancia  de  la  información   médica relevante.  o rganización  de  las  ideas  y  el  conocimiento  previo. 2.   l a evaluación de los recursos de información (uti -  lizando parámetros objetivos).  Modificar los hábitos de búsqueda existentes.  Identificar, de forma general, las FI del área. 3.     Identificando la fuente pertinente. Incrementando la necesidad de consultar fuen -  tes confiables.    s elección puntual de las bases de datos y re -  cursos de información, así como conocer el ac -   ceso. 4.     Construcción de la búsqueda experta. Conocer  profundamente  las  técnicas  de  bús -  queda aplicables a los sistemas de búsqueda de   información.  Construir consultas ágilmente, y sus alternati -  vas. 5.     Evaluación y análisis de los resultados. Facilitando el aprendizaje activo y autodirigido.  s er capaz de analizar y dirigir el contenido a la  necesidad de información.  s istematización de la información para la cons -  trucción  de  nuevo  conocimiento  como  en  el   caso de las revisiones sistemáticas.  6.   v aloración crítica del contenido obtenido.  s eleccionar la información pertinente para el  proceso de obtención del conocimiento.  Evaluación  crítica  del  proceso  de  búsqueda,     refinamiento de la misma y evaluación de los re-     sultados obtenidos.  Creando nuevas estrategias si es necesario. 7.   g estión y uso de la información. Uso de herramientas de apoyo para la adminis -  tración de citas, contenidos, así como actuali -  zación del área específica.1,8,10,11  l os rubros anteriores se dirigirán a la integración de  nuevo conocimie A  partir  de  este  primer  acercamiento,  o  replantea -  miento de un tema de búsqueda comenzará otra fase.  Fase II Planteamiento de la pregunta  A partir del planteamiento de una pregunta específica se   construye la estrategia, existen diferentes tipos de pre -   guntas  dependiendo  de  las  necesidades  de  información   que están relacionadas con los tres grupos de usuarios,  definidos anteriormente: estudiantes y profesorado, clíni -  cos e investigadores. 1.   l os estudiantes y profesorado, enfocan principal -  mente sus búsquedas al conocimiento de un tema   nuevo o la actualización de información. 2.     En lo que respecta a los profesionales clínicos, su  necesidad está dirigida a una pregunta clínica es -   pecializada  3.   l os investigadores o profesionales que tienen más  experiencia en el uso de las FI sus requerimientos   son,  principalmente,  revisiones  bibliográficas  ex -   haustivas  orientadas  a  la  actualización  de  las  lí -   neas de investigación o en la construcción de una   nueva, aspectos más específicos como nuevos mé -   todos, descubrimientos, ensayos, revisiones en el   área de educación. En este punto de partida es indispensable concentrar  el  tema  de  búsqueda  tanto  como  sea  posible,  es  decir   formular  la  pregunta  general  de  la  cual  se  requiere  la     información Por ejemplo en el caso de una pregunta:   a.     ¿Cuál es el estado del arte de la epidemiología de  la cisticercosis en América  l atina? b.     Actualmente, ¿cuáles son los tratamientos más efi -  cientes para el control de niños portadores de  v IH? c.     ¿Cuáles son las tendencias de los métodos de ense -  ñanza en la educación médica a distancia?  g enerar una relación de palabras o frases específicas  que definan la relevancia de la pregunta: a.     Cisticercosis – epidemiología  →  limitado a América   l atina, revisiones, estados del arte. b.   v IH seropositivos – tratamientos – control  →  limita -  do a niños, revisiones. c.     Enseñanza – métodos – educación a distancia – edu -  cación médica  →  revisión.  Una vez definidos los conceptos para la pregunta de  investigación documental y los términos relevantes de la   misma debe considerarse los siguientes elementos:    ―   Términos y conceptos en inglés , la mayoría de las  FI y el vocabulario para la recuperación de infor -  mación están publicados en esta lengua.    ―   Uso  de  vocabulario  controlado   asignado  por  los  indexadores,  para  unificar  los  términos  existen   diferentes  vocabularios  y  tesauros  que  permi-     ten mayor selectividad en la descripción de los te -  mas de búsqueda:  •     Me s H ( Medical Subject Headings ) publicado por  la    National  Library  of  Medicine   (N l M)  de  Es -  tados  Unidos.  http://www.ncbi.nlm.nih.gov/  mesh/ •     DeC s  es un vocabulario trilingüe y estructura -  do en Ciencias de la  s alud, creado por BIREME  para indexar artículos científicos, libros, tesis,   memorias  de  congresos,  reportes  técnicos  y   otro tipo de materiales para la búsqueda de li -   teratura científica en la base de datos  l I l AC s  y  en Medline. http://goo.gl/13UoyF •     EMBA s E utiliza tesauro o Emtree ( Embase tree )  es un vocabulario propio.  •     En el área de educación existe el tesauro para  la base de datos ERIC del  Institute of Education   Sciences , U. s . (http://eric.ed.gov/?ti=all) \nMoncada-Hernández SG 110    ―   Los descriptores  generados en la indexación de los  temas  ofrecen  mejores  posibilidades  de  profun -  dización temática que no es posible obtener por   otros medios, como en el caso de las búsquedas en   las palabras del título o del resumen,12 la informa -  ción obtenida utilizando vocabulario que ha sido   definido y estandarizado permitirá que la estrate -  gia  de  búsqueda  esté  completamente  dirigida  al   campo de estudio en cuestión.  o tro aspecto a considerar es la jerarquía en la rela -  ción de los términos, esta lista de términos establece el   orden gia  (fecha  de  búsqueda: enero, 2014): 1.     [cancer AND colon AND surgery AND wom*] se recu -  peran 2 112 documentos.  Por otra parte, utilizando el término Me s H: 2.     [“Colonic  Neoplasms”[Mesh]  AND  surgery  AND  wom*] se obtienen 1 188.   s e puede observar que al replantear la búsqueda uti -  lizando el vocabulario controlado Me s H, el enunciado co -  rrecto será más específico y dirigido al tema medular de   la búsqueda, una consulta realizada en lenguaje natural,   como en el caso de la primera búsqueda, va a diferir de la   misma consulta realizada utilizando un lenguaje controla -   do (tesauro), ya que los términos hacen siempre referen -   cia al contenido de los documentos.12  s i  se  continúa  definiendo  la  búsqueda  utilizando  los  limitantes como son: documentos de revisión y sólo do -  cumentos publicados en los últimos 5 años, el resultado   disminuirá considerablemente a 27 documentos que apor -   tarán la información requerida a la pregunta planteada   con mayor eficacia y pertinencia. En este punto se podrá definir la relevancia de los re -  sultados y es necesario realizarla en diferentes fuentes,   ya  sea  bases  de  datos,  metabuscadores,  y  FI  electróni -  ca disponibles, para ejemplificar las búsquedas en otras   fuentes con la misma estrategia obtenemos: •     EMBA s E (via  ov ID): 123. •     WEB  o F  s CIENCE (Thompson): 12. •     l I l AC s  (BIREME): 11. •     s CIENCE DIRECT (Elsevier): 98. •     g oogle  s cholar: 29 700. Analizado los anteriores resultados, reafirman que las  BI  especializada  deben  realizarse  en  los  recursos  apro -   piados, así como la importancia de la construcción de la   estrategia son las bases esenciales para la relevancia y   pertinencia en los resultados.  Fase VI Organización, administración y uso de la informa -  ción  Finalmente con los resultados obtenidos se necesita or -  ganizar y documentar las citas obtenidas. Al seleccionar   las  citas  bibliográficas  pertinentes,  se  requiere  obtener   el texto completo, en este momento vuelve a ser necesa-    ria la consulta en los servicios de la biblioteca para cono -   cer las opciones de texto completo disponible, referen -  cias impresas, servicios de recuperación de documentos. También  administrar  las  citas  bibliográficas  requiere  atención conforme aumenta el número de las mismas, los   diversos temas a los que se refieren, los diferentes pro -   yectos y las áreas del conocimiento. Existen diferentes gestores de citas bibliográficas que  permiten: •     Administrar en una base de datos personal la infor -  mación bibliográfica que se utiliza para un artícu -  lo, capítulo, tesis, libros, etc. •     Crear, organizar y administrar carpetas. •     Importar referencias de catálogos en línea, bases  de datos, internet, etc. •     Editar referencias o crear nuevas manualmente. •     g uardar el documento en formato PDF ( Portable   Document Format ) de las referencias. •     Compartir carpetas. •     Crear bibliografías de acuerdo a normas Harvard,  Chicago, APA, etc. •     Insertar citas automáticamente en el texto de trabajo. •     Algunos, como es el caso de Mendeley y Zotero, van  más allá de la gestoría de referencias integrando   búsqueda en bases de datos, integración de redes   de conocimiento y trabajo colaborativo en línea.16 En la  Tabla 2  se presentan algunas características de  los gestores de referencias más utilizados, estas opciones   de  acceso  son  variables  con  el  tiempo,  ya  que  algunos   sistemas pueden ser gratuitos un tiempo y después dejar   de serlo.  Pregunta general  Relación de  palabras o frases  relevantes en la  pregunta  Construcción de la estrategia de búsqueda  ¿Cuál es el estado  del arte de la  epidemiología de la  cistecercosis en  América Latina?  Actualmente, ¿cuáles  son los tratamientos  más e\u001fcientes para el  control de niños  portadores de VIH?  ¿Cuáles son las  tendencias de los  métodos de enseñanza  en la educación  médica a distan     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };

    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');

    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);

        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);

        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
