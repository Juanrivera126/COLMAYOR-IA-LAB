<script>
    const PDF_TEXT = "Management   Accounting   Research   32   (2016)   27–44  Contents   lists   available   at   ScienceDirect  Management   Accounting   Research  j o u    r n    a l    h o m    e p a g e :    w w w . e l s e v i e r . c o m / l o c a t e / m a r   The   Levers   of   Control   Framework:   An   exploratory   analysis   of   balance Anne-   Marie   Kruis a ,   Roland   F.   Speklé a , ∗ ,   Sally   K.   Widener b  a   Nyenrode   Business   Universiteit,   Breukelen,   The   Netherlands b   Clemson   University,   Clemson,   SC,   USA  a   r   t   i   c   l   e   i   n   f   o  Article   history:  Received   25   November   2014  Received   in   revised   form  20   November   2015  Accepted   6   December   2015  Available   online   30   December   2015  Keywords:   Levers   of   Control   Framework  Balance  Management   control  Cluster   analysis  Contingency   theory  Configuration   theory  a   b   s   t   r   a   c   t  The   impact   of   the   Levers   of   Control   (LOC)   framework   on   the   accounting   literature   is   undeniably   large.  The   framework,   however,   has   also   been   criticized   for   being   vague   and   ambiguous.   One   of   the   central,  but   unclear,   concepts   in   the   LOC   framework   is   the   notion   of   balance.   That   is,   the   framework   holds   that  control   systems   must   be   in   balance   in   order   to   manage   competing   tensions   such   as   that   found   between  predictable   goal   achievement   on   the   one   hand   and   innovation   on   the   other.   The   goal   of   our   study   is  to   examine   the   concept   of   balance   and   to   provide   empirically   informed   insights   on   different   balancing  arrangements   that   exist   in   a   cross-section   of   business   units.   We   develop   a   survey   and   administer   it   in  person   to   a   convenience   sample   of   business   unit   managers.   Using   responses   from   217   managers,   cluster  analysis   reveals   a   stable   solution   with   four   distinct   patterns   of   balance,   which   we   interpret   using   configu-  rational   thinking.   We   label   the   clusters   strategic   vigilance,   strategic   exploitation,   strategic   responsiveness,  and   strategic   stability   respectively,   and   examine   organizational   and   contextual   factors   that   validate   and  help   explain   the   observed   patterns   of   balance.   By   identifying   empirical   manifestations   of   balance,   our  study   sheds   light   on   one   of   the   key   concepts   in   the   LOC   framework,   providing   an   empirically   informed  starting   point   for   future   theoretical   analysis   and   interpretation.  ©   2015   Elsevier   Ltd.   All   rights   reserved.  1.   Introduction  The   central   theme   of   the   Levers   of   Control   framework   (LOC  framework;   Simons,   1994,   1995 )   is   that   control   of   business   strategy  is   achieved   by   balancing   the   forces   of   four   different   levers   of   control,  i.e.   beliefs   control,   boundary   control,   diagnostic   control,   and   inter-  active   control.   The   power   of   these   four   levers,   it   is   argued,   does   not  lie   in   how   each   is   used   individually,   but   rather   in   how   they   work  together,   how   they   complement   each   other,   and   how   they   achieve  balance   ( Simons,   1995 ).   The   levers   are   said   to   generate   positive  and   negative   forces   that   jointly   create   a   dynamic   tension   between  innovation   and   strategic   renewal   on   the   one   hand,   and   predictable  goal   achievement   on   the   other,   both   of   which   need   to   be   managed  to   secure   the   organization’s   long-term   success   (e.g.,   March,   1991;  Raisch   and   Birkinshaw,   2008 ).  The   LOC   framework   has   gained   a   prominent   position   in   con-  temporary   management   control   thinking.   Although   the   influence  of   the   LOC   framework   on   control   in   practice   is   hard   to   document,  its   impact   on   the   literature   is   undeniably   large.   For   instance,   Tessier  and   Otley   (2012)   found   almost   800   citations   of   Simons’   1995   book  ∗   Corresponding   author.   Fax:   +31   346   264204.  E-mail   addresses:   a.kruis@nyenrode.nl   (A.   Kruis),   r.spekle@nyenrode.nl  (R.F.   Speklé),   kwidene@clemson.edu   (S.K.   Widener).  in   Google   Scholar—a   number   that   has   more   than   tripled   since   their  count   in   2011.   Sweeney   et   al.   (2012)   performed   a   comprehen-  sive   review   of   the   leading   academic   accounting   journals   and   found  almost   30   empirical   studies   that   explicitly   used   the   LOC   framework,  either   as   their   main   theoretical   perspective   or   to   interpret   relation-  ships   in   the   data.   The   framework,   however,   has   also   been   criticized  for   its   vague   and   ambiguous   definitions,   both   at   the   level   of   individ-  ual   constructs   in   the   theory   ( Bisbe   et   al.,   2007;   Ferreira   and   Otley,  2009 )   and   at   the   level   of   the   framework   as   a   whole   (e.g.,   Tessier   and  Otley,   2012 ).  One   central,   but   unclear,   concept   in   the   LOC   framework   is   the  notion   of   balance   ( Sweeney   et   al.,   2012 ).   Simons   (1995)   casts   a  major   part   of   his   discussion   of   the   organizational   and   manage-  rial   challenges   associated   with   strategy   and   control   in   terms   of  balance   and   trade-offs.   For   instance,   he   argues   that   organizations  need   to   strike   a   balance   between   unlimited   opportunities   and   lim-  ited   managerial   attention,   between   self-   interest   seeking   and   the  desire   to   contribute,   between   intended   and   emergent   strategy,   and  between   innovation   and   predictable   goal   achievement.   To   manage  these   trade-offs,   Simons   (1995)   suggests   that   organizations   need  to   balance   their   reliance   on   the   four   levers   of   control   to   create   an  appropriate   dynamic   tension;   that   is,   a   tension   that   is   likely   to   stim-  ulate   the   right   mix   between   compliant   behavior   and   creative   search  efforts   necessary   for   organizational   success.   However,   despite   these  http://dx.doi.org/10.1016/j.mar.2015.12.002  1044-5005/©   2015   Elsevier   Ltd.   All   rights   reserved. \n28   A.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44  frequent   references   to   balance,   Simons   does   not   provide   a   definite  notion   of   what   balance   is,   nor   how   balance   is   reflected   in   the   control  system.  To   provide   a   conclusive   understanding   of   balance   will   require  multiple   studies   to   sort   out   how   a   balanced   set   of   control   levers  produce   complementarities   resulting   in   dynamic   tension   and   how  that   dynamic   tension   leads   to   enhanced   performance.   This   is   not   an  easy   task   since   different   balancing   arrangements   will   result   in   dif-  ferent   performance   outcomes,   fitting   different   underlying   strategic  objectives   and   agendas.   The   purpose   of   our   study   is   to   take   a   first  step   in   exploring   balance.   We   do   so   by   examining   the   patterns   of   use  of   the   four   levers   of   control   in   order   to   provide   empirical   evidence  on   manifestations   of   balance   (hereafter   referred   to   as   balancing  arrangements)   that   exist   in   a   cross-section   of   business   units   (units  hereafter).   We   develop   a   survey   and   administer   it   in   person   to   a  convenience   sample   of   unit   managers   (managers   hereafter).   Using  responses   from   217   managers,   cluster   analysis   reveals   a   stable   solu-  tion   with   four   balancing   arrangements,   which   we   interpret   through  the   lens   of   configurational   thinking   and   label   strategic   vigilance,  strategic   exploitation,   strategic   responsiveness,   and   strategic   sta-  bility.   We   draw   on   key   variables   from   contingency   theory,   as   well   as  industry   factors,   to   validate   and   help   explain   the   observed   patterns.  This   is   an   important   project   for   several   reasons.   Referring   to   the  notion   of   balance,   prior   research   on   the   LOC   framework   has   pro-  vided   empirical   evidence   that,   jointly,   diagnostic   and   interactive  uses   of   performance   measurement   systems   can   help   enhance   per-  formance   ( Henri,   2006 ).   Findings   from   other   studies   suggest   that  all   four   control   levers   are   necessary   in   the   control   package   in   order  to   be   effective   and   to   result   in   a   beneficial   dynamic   tension   (e.g.,  Bruining   et   al.,   2004;   Tuomela,   2005;   Widener,   2007 ).   Although  these   studies   have   started   to   address   the   simultaneous   use   of   multi-  ple   control   levers,   they   leave   the   notion   of   balance   among   the   levers  implicit.   We   complement   these   studies   through   an   explicit   focus  on   the   empirical   manifestations   of   balance,   adding   to   the   empiri-  cal   foundation   of   the   LOC   framework.   In   so   doing,   we   respond   to  the   call   by   Mundy   (2010)   to   provide   insights   on   different   balancing  arrangements   that   exist   in   a   broad   sample   of   firms   and,   further-  more,   to   examine   the   organizational   factors   associated   with   the  observed   patterns   of   balance.   By   shedding   light   on   how   balance  empirically   manifests   itself,   our   study   helps   to   explicate   a   hitherto  underspecified   theoretical   claim   in   the   LOC   framework.  In   addition   to   exploring   the   empirical   manifestations   of   bal-  ance,   our   study   also   makes   a   theoretical   contribution.   By   integrating  management   control   and   organizational   literatures   we   expand   on  the   meaning   of   balance   and   suggest   that   it   can   be   defined   as   a   lim-  ited   number   of   configurations   that   include   combinations   of   all   four  control   levers   that   are   internally   consistent,   but   that   are   not   nec-  essarily   equally   emphasized.   We   posit   that   multiple   combinations  of   levers   can   result   in   balance,   which   is   consistent   with   configu-  rational   theory,   and   that   these   configurations   are   associated   with  different   strategic   challenges   and   contextual   settings,   which   is   con-  sistent   with   contingency   theory.   Thus,   we   conclude   that   balance  can   mean   different   things   to   different   organizations   and   can   be  achieved   in   different   ways   across   units.   Moreover,   since   differ-  ent   configurations   of   the   levers   align   with   different   strategic   and  contextual   challenges,   multiple   (but   limited)   types   of   balancing  arrangements   will   be   effective.   This   theoretical   explication   is   a   sig-  nificant   step   in   the   further   development   of   the   LOC   framework,  adding   to   its   explanatory   expressiveness.  Finally,   our   study   contributes   to   practice   by   showing   that   there  is   not   just   one   balancing   arrangement   that   suits   all   units,   but   that  managers   must   decide   which   pattern   of   control   best   suits   the  strategic   challenges   they   face   and   the   circumstances   in   which   they  operate.  The   remainder   of   this   paper   is   structured   as   follows.   The   next  section   reviews   the   relevant   literature.   Then   we   describe   the   design  of   our   study.   We   subsequently   present   the   results   of   the   analy-  sis   and   our   interpretation   of   the   findings.   In   the   last   section,   we  summarize   our   study,   discuss   the   conclusions   and   limitations,   and  provide   suggestions   for   further   research.  2.   Background   Literature   and   Development   of   Research  Question  In   order   to   develop   our   research   question   about   the   mean-  ing   of   balance   and   its   empirical   manifestations,   we   first   examine  Simons’   (1995)   concept   of   balance   within   the   LOC   framework   and  related   empirical   work.   We   then   discuss   literature   on   organiza-  tional   ambidexterity,   configurations,   and   contingency   theory.   We  relate   these   literatures   to   frame   our   research   question   and   to   guide  our   empirical   examination.  2.1.   Balance   and   the   LOC   Framework  Since   the   emergence   of   the   LOC   framework,   researchers   have  sought   to   provide   evidence   on   its   underlying   principles.   The   notion  of   balance,   however,   remains   rather   vague.   This   is   not   to   say,  though,   that   the   literature   offers   no   clues   at   all   to   the   idea   of   bal-  ance   and   how   it   can   be   achieved.   Simons   (1995)   positions   the  control   levers   as   being   related   to   certain   strategic   objectives.   So,  for   example,   if   firms   are   concerned   with   strategy   as   a   plan   they  heavily   emphasize   diagnostic   control,   addressing   such   issues   as  how   they   are   performing   in   turning   their   intended   strategy   into  a   realized   strategy,   and   whether   or   not   the   implementation   is   on  track.   On   the   other   hand,   if   top   managers   are   focused   on   strategy  as   a   pattern,   they   give   emphasis   to   interactive   control.   The   focus  is   on   identifying   opportunities   for   strategy   to   emerge.   An   empha-  sis   on   boundary   control   is   associated   with   concerns   with   strategy  as   a   position,   ensuring   that   the   strategy   domain   is   firmly   set,   and  that   behavioral   hazards   are   recognized   and   dealt   with   in   codes   of  conduct.   Finally,   an   emphasis   on   beliefs   control   is   associated   with   a  concern   with   strategy   as   a   perspective.   Top   managers   want   to   share  the   firm’s   vision   and   ingrain   it   deeply   throughout   the   organization.  The   concept   of   balance   has   begun   to   attract   attention   in   the  empirical   literature.   The   initial   focus   in   this   literature   has   been  on   the   examination   of   opposing   forces   created   by   the   joint   inter-  active   and   diagnostic   uses   of   performance   measurement   systems.  For   example,   Henri   (2006,   531)   states   that   “These   two   types   of   use  [i.e.,   interactive   and   diagnostic]   work   simultaneously   but   for   differ-  ent   purposes.   Collectively   their   power   lies   in   the   tension   generated  by   their   balanced   use   which   simultaneously   reflects   a   notion   of  competition   and   complementarity”   (italics   added).   Henri   (2006) ,  however,   does   not   specify   what   balance   looks   like,   but   proxies   for  dynamic   tension   by   interacting   the   diagnostic   and   interactive   use   of  the   performance   measurement   system   and   predicts   a   positive   coef-  ficient   on   the   relation   of   the   interaction   term   with   the   creation   of  organizational   capabilities.   Thus   implicitly,   he   seems   to   be   arguing  that   each   possible   combination   between   interactive   and   diagnostic  control   may   represent   balance,   and   that   the   combination   displays  more   positive   benefits   as   firms   rely   more   on   one   or   both   of   the   con-  trol   levers.   Henri   (2006,   547)   states,   “more   research   is   needed   to  provide   a   deeper   understanding   of   the   dynamic   interplay   between  the   positive   and   negative   effects   of   tension   resulting   from   balanced  use   of   [performance   measurement   systems]   in   a   diagnostic   and  interactive   fashion”.  To   enhance   the   findings   from   the   examination   of   interactive   and  diagnostic   uses   of   performance   measures,   studies   have   started   to  focus   on   the   complete   LOC   framework,   comprising   all   four   control  levers.   In   support   of   Simons’   (1995)   conceptualization,   a   primary  insight   from   this   literature   is   that   the   four   levers   work   together  and   influence   each   other,   but   the   notion   of   balance   remains   elu- \nA.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44   29  sive   (e.g.,   Mundy,   2010;   Tuomela,   2005;   Widener,   2007 ).   Widener  (2007)   operationalizes   dynamic   tension   as   the   influence   that   one  control   lever   has   on   another   control.   She   concludes   that   perfor-  mance   is   enhanced   when   the   package   of   controls   includes   all   four  control   levers,   consistent   with   Simons’   (1995)   notion   that   balancing  the   four   levers   creates   dynamic   tension   and   subsequent   perfor-  mance.   While   her   study   provides   evidence   that   the   controls   are  positively   related,   she   does   not   provide   evidence   on   the   relative  emphasis   placed   on   the   individual   controls   to   achieve   this   state   of  balance.  Mundy   (2010)   also   emphasizes   the   importance   of   the   notion  of   balance   in   Simons’   work,   and   notes   the   lack   of   understanding  regarding   this   notion.   She   seeks   to   shed   light   on   this   matter   using   a  case   approach   and   concludes   that   balance   is   shaped   by   how   man-  agers   use   the   management   control   system.   The   simultaneous   use  of   the   management   control   system   both   to   direct   and   to   empower  middle-level   managers   requires   purposeful   intervention   by   senior  managers   so   as   to   create   constructive   tensions.   Mundy   (2010)   sug-  gests   that   future   research   should   undertake   a   broader   empirical  examination   of   balance   in   order   to   flesh   out   what   optimal   balance  may   look   like.  Also   supporting   Simons’   (1995)   contention   that   the   four   control  levers   work   together   is   Speklé   et   al.   (2014) .   They   hypothesize   and  find   that   a   system   containing   all   four   controls   is   positively   related  to   creativity.   Similar   to   Mundy   (2010)   they   find   that   all   four   control  levers   have   a   significant   role   in   the   system,   and   that   the   combina-  tion   of   both   the   negative   and   the   positive   forces   enhances   creativity.  This   result   is   consistent   with   Simons’   (1995)   claim   regarding   the  co-existence   of   creativity   and   control,   and   the   possibility   to   pursue  exploitation   and   innovation   simultaneously.  In   sum,   the   research   on   balance   in   the   LOC   framework   has   pro-  vided   some   empirical   evidence   that   firms   jointly   use   all   four   control  levers   (e.g.,   Mundy,   2010;   Speklé   et   al.,   2014;   Widener,   2007 ).  Furthermore,   this   joint   use   appears   to   be   associated   with   desir-  able   organizational   outcomes   including   organizational   learning  and   performance   ( Widener,   2007 ),   development   of   organizational  capabilities   ( Mundy,   2010 ),   and   creativity   ( Speklé   et   al.,   2014 ).  However,   this   literature   is   still   largely   silent   on   what   balance   looks  like,   providing   at   best   some   broad   and   implicit   indications   as   to   its  properties   and   manifestations.  2.2.   Organizational   ambidexterity   and   configurations  Simons’   perspective   that   balance   is   achieved   by   integrating   pos-  itive   and   negative   control   forces   is   analogous   to   a   broad   stream   of  organizational   research   that   holds   that   firms   must   be   ambidextrous  in   order   to   be   successful.   For   example,   the   organizational   learn-  ing   literature   holds   that   firms   need   to   balance   both   exploitation  and   exploration   styles   of   learning   ( Lee   and   Widener,   2015;   March,  1991 ).   Similar   notions   of   ambidexterity   are   found   in   the   literatures  on   technological   innovation,   organizational   adaptation,   strategic  management,   and   organizational   design   ( Gupta   et   al.,   2006;   Raisch  and   Birkinshaw,   2008;   Raisch   et   al.,   2009 ).   This   line   of   work   is  important   to   our   study   as   it   corroborates   our   interpretation   of   bal-  ance.  Balance   in   Simons’   LOC-framework   is   about   integrating   the   four  levers   so   as   to   achieve   both   control   over   predictable   goal   achieve-  ment   (i.e.   exploitation),   and   strategic   renewal   and   innovation   (i.e.,  exploration)   simultaneously.   A   balanced   control   structure,   there-  fore,   is   a   system   that   combines   the   four   levers   so   as   to   support  organizational   ambidexterity.   Organizational   ambidexterity,   how-  ever,   can   reveal   itself   in   different   arrangements   and   can   be   achieved  in   different   ways.   Some   studies   suggest   that   balance   involves  the   simultaneous   pursuit   of   exploitation   and   exploration,   i.e.,   by  placing   equal   weights   on   them   ( Cao   et   al.,   2009 ).   Other   studies  document   an   alternative   strategy   in   which   organizations   achieve  ambidexterity   through   alternation   over   time   between   periods   of  exploitation   and   exploration   ( Gupta   et   al.,   2006;   Raisch   et   al.,   2009 ).  In   addition,   whereas   some   studies   show   that   structural   differen-  tiation   (i.e.,   the   subdivision   of   tasks   over   distinct   organizational  subunits   that   specialize   in   either   exploitation   or   exploration)   can  result   in   ambidexterity,   others   emphasize   the   potential   for   simul-  taneous,   within-unit   exploration   and   exploitation   ( Raisch   et   al.,  2009 ).   Even   though   these   different   forms   of   ambidexterity   likely  require   different   control   systems,   it   is   not   true   that   each   conceiv-  able   combination   of   the   levers   should   be   considered   as   a   potential  instance   of   balance.   First,   balance   requires   that   the   combination   fits  a   viable   manifestation   of   ambidexterity,   and   even   though   ambidex-  terity   can   be   achieved   in   different   ways,   it   is   unlikely   that   ‘anything  goes’   and   that   each   and   every   possible   combination   of   exploration  and   exploitation   will   lead   to   desirable   organizational   outcomes  ( Simsek   et   al.,   2009 ).   Second,   a   key   point   in   Simons’   reasoning   is  that   the   four   levers   interact   and   need   to   be   configured   in   such   a  way   that   they   support   each   other.   As   mutually   supportive   rela-  tionships   are   few,   this   requirement   further   restricts   the   number   of  potentially   balanced   arrangements.   Both   considerations   allude   to  configurational   thinking,   to   which   we   now   turn   for   further   insights  to   inform   our   examination   of   balance.  Configurational   research   examines   organizations   not   by   focus-  ing   on   firm-level   structural   or   contextual   variables,   but   by  identifying   groups   of   firms   that   resemble   each   other   along   impor-  tant   dimensions   ( Short   et   al.,   2008 ).   That   is,   configurational   theories  consider   organizational   issues   at   the   level   of   clusters   of   organiza-  tional   attributes   ‘in   their   entirety’   rather   than   at   the   level   of   the  individual   attributes   that   comprise   the   system.   The   term   ‘configu-  ration’   refers   to   a   constellation   of   distinct   organizational   attributes  that   commonly   occur   together   ( Meyer   et   al.,   1993 ).   For   configura-  tions   to   be   stable,   the   organizational   attributes   that   make   up   the  configuration   need   to   fit   together,   and   the   resulting   structure   must  be   internally   consistent.   The   structures   that   surface   are   those   that  achieve   complementarities   in   their   internal   design   ( Milgrom   and  Roberts,   1995 ),   or   that   successfully   avoid   organizational   incompat-  ibilities   ( Hill   et   al.,   1992 ).   Internal   consistency   can   only   be   achieved  in   a   limited   number   of   ways   ( Doty   and   Glick,   1994;   Meyer   et   al.,  1993 ),   which   implies   that   the   number   of   feasible   configurations  is   also   limited.   This,   in   turn,   implies   that   the   study   of   complex,  multidimensional   organizational   phenomena   can   be   framed   as   a  comparative   analysis   of   a   manageable   number   of   discrete   organi-  zational   alternatives   rather   than   some   endless   series   of   conceivable  combinations   between   the   individual   attributes.  Configurational   theory   has   gained   a   prominent   position   in   the  field   of   business   and   management   (e.g.,   Miles   and   Snow,   1978;  Mintzberg,   1979,   1983 ;   see   Short   et   al.   (2008)   for   a   recent   overview)  and   also   has   a   history   in   the   study   of   management   control.   Exam-  ples   include   Burns   and   Stalker’s   (1961)   mechanistic   and   organic  organizations,   Ouchi’s   (1980)   market,   bureaucracy,   and   clan   mech-  anisms,   and   Speklé’s   (2001)   arms’   length,   machine,   exploratory   and  boundary   control   types.   Also   more   recently,   accounting   researchers  have   called   upon   configuration   theory   to   address   complex   phe-  nomena   of   control   ( Bedford   and   Malmi,   2015;   Grabner   and   Moers,  2013;   Malmi   and   Brown,   2008;   Kennedy   and   Widener,   2008;   Kruis,  2008;   Sandelin,   2008 ),   providing   some   precedent   to   the   idea   that  balance   in   the   LOC   framework   can   productively   be   studied   from   a  configurational   perspective.  In   his   writing,   Simons   uses   a   language   with   strong   configura-  tional   overtones,   referring   to   the   need   to   study   the   control   structure  as   a   whole,   integrating   the   four   levers,   and   suggesting   interde-  pendencies   between   them.   Consider   for   instance   the   following  statement   from   Simons   (1995,   153):   “[c]ontrol   of   business   strategy  is   achieved   by   integrating   the   forces   of   beliefs   systems,   boundary  systems,   diagnostic   control   systems,   and   interactive   control   sys-  tems.   The   power   of   the   control   levers   does   not   lie   in   how   each   is \n30   A.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44  used   alone   but   rather   in   how   they   complement   each   other   when  used   together”   (italics   added).   Or   consider   this   quote   from   his   writ-  ings:   “[t]hese   four   systems,   then,   are   mutually   reinforcing.   The  creative   tensions   between   learning   and   control,   between   guid-  ance   and   proscription,   between   motivation   and   coercion,   between  rewards   and   punishment   become   the   yin   and   yang—dynamic   forces  that   simultaneously   foster   both   stability   and   change”   (Simons,  1995:   161).   These   quotes   capture   crucial   points   in   Simons’   rea-  soning,   and   clearly   imply   a   perspective   in   which   the   value   of   each  individual   lever   depends   on   the   use   of   the   other   three   levers,   and  in   which   desired   outcomes   require   the   simultaneous   presence   of  opposing   forces   (as   opposed   to   the   insulated   presence   of   individ-  ual   forces).   Such   a   perspective   is   key   to   configurational   thinking  ( Drazin   and   Van   de   Ven,   1985;   Gerdin   and   Greve,   2004 ).  Another   key   element   of   configurational   theory   is   also   present  in   Simons’   framework,   i.e.,   the   idea   that   organizational   attributes  can   only   be   combined   in   a   limited   number   of   ways.   For   example,   his  empirical   study   of   how   newly   appointed   CEOs   mobilize   the   levers   to  gain   control   over   the   organization   and   its   strategic   direction   results  in   a   two-group   classification   of   managers   and   their   firms   (strategic  turnaround   versus   strategic   evolution;   Simons,   1994,   1995 ),   sug-  gesting   a   clustering   of   the   use   of   the   levers   in   just   a   few   distinctive  patterns.   Furthermore,   the   very   notion   of   balance   suggests   that   only  a   few   combinations   are   effective,   i.e.,   only   those   that   are   somehow  balanced   and   that   create   the   appropriate   dynamic   tension   to   result  in   the   desired   blend   of   innovation   and   predictable   goal   achieve-  ment   ( Simons,   1995 ).   Therefore,   one   would   expect   that   empirically,  firms   will   cluster   in   a   limited   number   of   groups,   representing   dif-  ferent   forms   of   balance   and   displaying   different   patterns   in   their  control   systems,   resulting   in   different   vectors   of   dynamic   tensions  to   suit   different   strategic   agendas.  These   patterns,   however,   will   not   just   be   influenced   by   strategic  concerns,   but   also   by   the   organizational   and   environmental   set-  ting   in   which   they   occur.   Although   this   theme   does   not   figure   very  prominently   in   Simons’   work,   he   does   allude   to   it   on   several   occa-  sions,   for   instance   when   he   claims   that   balance   is   a   function   of  various   organizational   contingencies   that   determine   the   different  levels   of   emphasis   on   each   lever   ( Simons,   1995 ).   This   is   why   we   now  turn   to   contingency   theory   to   further   our   exploration   of   balance.  2.3.   Contingency   theory  In   his   overview   of   the   contingency-based   literature,   Chenhall  (2003)   identifies   six   groups   of   variables   that   have   evolved   histori-  cally   as   key   to   the   understanding   of   management   control   systems:  (1)   the   external   environment,   (2)   technology,   (3)   structure,   (4)   size,  (5)   strategy,   and   (6)   culture;   and   he   develops   propositions   regard-  ing   the   relationships   between   management   control   instruments  and   contextual   variables.   We   draw   and   build   on   Chenhall   (2003)   to  develop   propositions   relevant   to   our   research   question. 1  2.3.1.   External   environment  Chenhall   (2003)   considers   the   external   environment   to   be   at  the   heart   of   contingency-based   research   and   notes   that   environ-  mental   uncertainty   is   the   most   widely   researched   aspect   of   the  environment.   Environmental   uncertainty   occurs   when   there   is   a  gap   between   the   information   required   and   the   information   avail-  able   to   make   sound   decisions   ( Galbraith,   1973 ).   Accordingly,   there  is   increased   need   for   control   systems   to   supply   additional   infor-  mation   ( Simons,   1995 ).   Widener   (2007)   shows   that   uncertainty  1 In   an   empirical   study   it   is   not   feasible   to   examine   every   contingency   variable.  We   focus   our   attention   on   at   least   one   variable   from   each   of   the   six   groups   that   has  adequate   measurement   properties   and   which   literature   has   strongly   linked   to   the  design   of   the   management   control   system.  is   associated   with   increased   emphasis   on   control   systems.   How-  ever,   firms   facing   environmental   uncertainty   must   balance   their  need   for   formal,   tight   control   (e.g.,   Chenhall   and   Morris,   1986;  Widener,   2007 )   with   the   flexibility   necessary   to   allow   them   to   cope  with   a   changing   and   uncertain   environment   (e.g.,   Ezzamel,   1990 ).  Chenhall   (2003)   brings   the   insights   from   this   literature   together   in  a   proposition,   on   which   we   build   to   propose   that:  P1.   Units   with   high   environmental   uncertainty   are   likely   to   rely  on   formal   structured   control   that   is   tight   but   flexible.  2.3.2.   Technology  Technology   relates   to   characteristics   of   the   organization’s   work  processes   ( Chenhall,   2003 ).   An   important   aspect   of   work   processes  is   whether   outputs   are   measureable   in   goal-consistent   terms.   Units  that   employ   processes   that   have   measurable   outputs   are   able   to   rely  on   formal   control   since   managers   can   be   motivated   through   the  allocation   of   decision   rights   and   then   held   accountable   for   results  ( Ouchi,   1977 ).   Ouchi   (1977)   provides   an   example   of   the   evaluation  of   faculty   based   on   their   research   outputs.   Although   the   processes  may   be   unclear,   the   goals   are   ‘crystallized’   ( Thompson,   1967 )   and  thus   monitoring   of   outputs   is   feasible.   Accordingly,   we   propose   the  following:  P2a.   Units   with   high   goal   clarity   and   measurability   of   results   are  likely   to   rely   on   performance   measurement   and   monitoring.  In   addition   to   the   characteristics   of   the   unit’s   processes,   tech-  nology   also   includes   the   level   of   interdependencies   among   and  between   units   ( Chenhall,   2003 ).   Chenhall   and   Morris   (1986)   empir-  ically   show   that   firms   with   high   interdependencies   rely   less  on   formal   budgets   and   more   on   interpersonal   communications.  Similarly,   Macintosh   and   Daft   (1987)   show   that   low   levels   of  interdependencies   are   associated   with   higher   reliance   on   formal  controls   including   budgets,   standard   operating   procedures,   and  planning.   Accordingly,   Chenhall   (2003)   proposes   that   units   that  have   low   interdependencies   are   able   to   employ   more   formal   and  mechanistic   control,   while   those   with   higher   interdependencies  must   configure   their   control   systems   to   allow   for   flexibility,   open  communication,   and   customization.   Consistent   with   Chenhall’s  (2003)   proposition,   we   propose   that:  P2b.   Units   with   high   interdependencies   are   likely   to   emphasize  informal   control   and   personal   interactions.  2.3.3.   Structure  Organizational   structure   is   about   who   does   what   and   how.  Decentralization   has   traditionally   been   seen   as   the   most   impor-  tant   structural   variable   ( Chenhall,   2003 ).   With   decision   authority  pushed   out   to   operating   units,   agency   problems   can   arise,   and  incentives   and   performance   measures   are   called   upon   to   mitigate  those   agency   problems.   In   addition,   communication   and   coordi-  nation   become   more   important   and   thus   formal,   broad-scope,   and  integrated   information   is   used   ( Chenhall   and   Morris,   1986 ).   Con-  sistent   with   Chenhall’s   (2003)   proposition,   we   propose   that:  P3a.   Units   that   are   highly   decentralized   are   likely   to   rely   on   formal  structured   control   focused   on   measuring   performance.  Structure   also   includes   the   motivation   with   which   work   is  performed   ( Chenhall,   2003 ).   An   important   structural   variable   is  superiors’   leadership   style.   Superiors   that   practice   a   considera-  tion   style   of   leadership   are   concerned   for   their   subordinates.   These  superiors   want   to   have   engaged   employees   that   participate   mean-  ingfully   in   their   tasks.   Research   has   found   that   with   a   consideration  style   of   leadership,   subordinates   participate   more   in   the   bud-  geting   process   ( Chenhall,   2003 ).   This   style   of   leadership   requires  open   lines   of   communication   that   provide   information   necessary  for   employees   to   take   on   responsibility   and   become   empowered \nA.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44   31  decision-makers   ( Abernethy   et   al.,   2010 ).   Empirically,   Abernethy  et   al.   (2010)   find   that   a   consideration   style   of   leadership   is   positively  associated   with   an   interactive   use   of   the   planning   and   control   sys-  tem   but   not   with   the   use   of   the   formal   performance   measurement  system   for   accountability   purposes.   They   also   find   the   leadership  style   of   initiating   structure   to   be   associated   with   an   interactive   use,  but   less   so.   In   addition,   this   latter   leadership   style   appears   to   be  associated   with   an   accountability-oriented   use   of   the   performance  measurement   system.   Accordingly,   we   propose   that:  P3b.   Units   that   employ   a   consideration   style   of   leadership   are  likely   to   emphasize   interactive,   personal,   and   flexible   control;   they  likely   employ   ‘loose’   control.   Units   more   oriented   to   initiating  structure   shift   their   emphasis   towards   monitoring   and   account-  ability.  2.3.4.   Size  Size   is   an   important   contingency   variable   because   it   dictates  the   scope   of   communication   and   coordination   challenges   the   orga-  nization   faces.   Accordingly,   the   larger   the   organization   the   more  demanding   becomes   the   need   for   information   ( Chenhall,   2003 ).  To   handle   these   problems,   large   organizations   often   institute   for-  mal   and   complex   control   systems   ( Chenhall,   2003 ).   Consistent   with  Chenhall’s   (2003)   proposition,   we   propose   the   following:  P4.   Larger   organizations   are   likely   to   have   more   sophisticated  control   systems.  2.3.5.   Strategy  It   is   well-accepted   that   strategy   must   ‘fit’   with   management   con-  trol   systems.   Chenhall   (2003)   suggests   that   firms   that   compete   on  the   basis   of   cost   have   formalized   systems   focused   on   their   ‘problem  areas’.   Empirical   research   has   concluded   that   firms   with   a   low-  cost   strategy   monitor   costs   closely   (Chenhall   and   Morris,   1995).  In   contrast,   differentiation   strategies   are   not   as   concerned   with  monitoring   costs,   but   instead   differentiators   compete   by   offering  a   unique   product   or   service   that   can   command   a   premium   price.  Reputation   is   important   since   it   aids   the   market   in   assessing   the   dif-  ferentiator’s   ability   to   provide   quality,   innovation,   delivery,   service,  and   other   value-enhancing   attributes.   Consistent   with   Chenhall’s  (2003)   proposition   that   cost   leadership   strategies   rely   on   formal  performance   measurement   systems   while   differentiation   strate-  gies   require   more   informal   and   interactive   control   systems,   we  propose   the   following:  P5.   Units   that   emphasize   a   low   cost-low   price   strategy   are   likely  to   employ   formal   performance   measurement   systems.   Conversely,  units   that   emphasize   a   differentiation   or   delivery/service   strategy  are   likely   to   rely   on   interactive   and   communication-based   controls,  as   well   as   controls   to   protect   reputation.  2.3.6.   Culture  Because   ours   is   a   single   country   study,   national   culture   does   not  play   a   role   in   our   control   configurations.   Instead,   we   examine   orga-  nizational   culture,   which   may   actually   have   a   stronger   effect   on  the   design   of   management   control   than   national   culture   ( Chenhall,  2003 ).   Henri   (2006)   describes   organizational   culture   in   terms   of  flexibility   versus   control   values.   He   finds   that   firms   that   empha-  sized   flexibility   use   a   diverse   performance   measurement   system   to  focus   attention   and   facilitate   strategic   decision-making.   Such   firms  recognize   the   importance   of   their   employees   to   be   able   to   react  quickly   and   make   strategic   decisions.   They   are   adaptable,   respon-  sive,   and   organic   ( Lee   and   Yang,   2011 ).   Accordingly,   Heinicke   et   al.  (2015)   find   that   the   beliefs   system   plays   a   key   role   in   management  control   systems   of   firms   that   emphasize   flexibility   values.   In   con-  trast,   firms   that   emphasize   cultural   values   based   on   control   are  more   adept   at   using   and   relying   on   tight   formal   controls.   Thus,   we  propose   that:  P6:   Units   that   emphasize   flexibility   are   likely   to   rely   on   controls  that   emphasize   the   communication   of   values.   Conversely,   units   that  emphasize   control   values   likely   rely   on   tight   intensive   control.  In   sum,   consistent   with   the   notion   of   configuration   fit   ( Gerdin  and   Greve,   2004 ),   we   expect   contextual   variables   to   be   interre-  lated   with   strategic   agendas   that,   in   turn,   will   be   matched   with   an  appropriate,   internally   consistent   control   arrangement,   producing  a   limited   number   of   system   states.   We   will   draw   on   this   framework  in   our   examination   of   balance   and   in   our   attempts   to   make   sense  of   the   control   patterns   we   observe.  2.4.   Research   Question   and   Empirical   Approach  Our   main   research   question   is   this:   what   does   balance   in   the  LOC   framework   look   like?   Having   explored   the   notion   of   balance  theoretically,   we   now   approach   this   question   from   an   empirical  perspective,   looking   for   clusters   of   control   patterns   in   a   cross-  section   of   units   to   specify   an   empirically   grounded   taxonomy   of  control.   Implicit   to   this   research   approach   are   several   important  arguments   and   assumptions.   First,   we   assume   that   organizations  tend   to   have   balanced   control,   at   least   on   average.   That   is,   we  expect   that   the   control   systems   that   can   be   observed   in   reality  tend   to   be   broadly   appropriate   combinations   of   the   levers   that  are   relatively   effective   on   average   in   supporting   organizational  goal   achievement.   Accordingly,   we   conform   to   a   long-   stand-  ing   tradition   in   both   economics   and   contingency   research   that  assumes   market   selection   pressures   tending   towards   equilibrium  and/or   well-informed,   rational   managers   pursuing   effective   con-  trol   ( Chenhall,   2003;   Speklé,   2001 ).   Second,   balance   can   only   be  achieved   in   a   limited   number   of   configurations,   and   we   expect   to  observe   a   distinct   number   of   groups   of   firms   with   similar   com-  binations   of   the   four   levers.   Integrating   the   literatures   discussed  above   allows   us   to   legitimize   these   arguments   and   assumptions.  The   ambidexterity   literature   shows   that   organizations   must   bal-  ance   competing   tensions   in   order   to   achieve   success   ( Gupta   et   al.,  2006;   Raisch   and   Birkinshaw,   2008;   Raisch   et   al.,   2009 ).   To   manage  these   tensions,   control   needs   to   be   ambidextrous   too,   and   a   bal-  anced   control   structure   is   a   control   structure   that   activates   both  the   positive   and   negative   forces   that   are   simultaneously   required  to   create   the   dynamic   tension   to   effectively   support   organizational  ambidexterity.   We   then   introduced   configurational   thinking   (e.g.,  Doty   and   Glick,   1994;   Meyer   et   al.,   1993;   Short   et   al.,   2008 ),   support-  ing   our   expectation   that   a   limited   number   of   balance   configurations  exist,   that   we   can   empirically   identify   these   configurations,   and   that  the   patterns   we   observe   in   our   cross-section   reflect   an   underly-  ing,   systematic   and   interpretable   logic   that   can   be   substantiated  through   the   use   of   contingency   variables.   These   patterns,   then,  should   provide   an   empirically   informed   starting   point   for   further  theoretical   analysis   and   interpretation.  3.   Research   design,   sample,   and   measurement  3.1.   Research   design   and   sample  The   analysis   is   based   on   survey   data   from   217   business   units  in   the   Netherlands. 2   In   building   the   questionnaire,   we   relied   as  far   as   possible   on   instruments   validated   in   previous   studies.   Also,  2 The   original   dataset   contains   278   observations.   We   remove   28   not-for-profit  units,   four   cases   where   the   managers   have   been   working   less   than   half   a   year   in  their   current   position,   one   case   with   only12   employees,   and   cases   with   missing  values   listwise.   We   are   left   with   219   observations.   However,   because   the   analytical  techniques   we   plan   to   use   (especially   cluster   analysis)   are   very   sensitive   to   outliers, \n32   A.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44  Table   1A  Descriptive   statistics:   industries.  Construction   19   (8.80%)  Manufacturing   34   (15.70%)  Transportation,   communication   and   utilities   30   (13.80%)  Wholesale   and   retail   trade   39   (18.00%)  Finance,   insurance   and   real   estate   34   (15.70%)  Services   52   (24.00%)  Miscellaneous   9   (4.10%)  Total   217   (100%)  we   pre-tested   the   survey   instrument   subjecting   it   to   an   academic  review   first,   followed   by   two   rounds   of   interviews   with   a   total  of   seven   potential   respondents.   We   used   different   interview   tech-  niques   to   assess   both   the   overall   quality   of   the   survey   instrument  (Three-Step   Test-Interviews   (TSTI),   see   Hak   et   al.,   2008 )   as   well  as   content   validity   (Validity-Feedback   Interviews,   see   Kruis,   2008 ).  The   TSTI   is   a   mechanism   to   pre-test   questionnaires   through   observ-  ing   actual   interaction   between   the   instrument   and   respondents.  Because   the   cognitive   process   of   completing   a   survey   is   hidden  from   the   observer,   ‘thinking   aloud’   is   used   to   make   the   thought  process   observable   ( Hak   et   al.,   2008 ).   We   also   presented   four   of   the  seven   unit   managers   with   a   written   description   of   their   units   and  the   management   control   structure   based   solely   on   their   responses  to   our   survey   questions   to   verify   whether   our   the   survey   was  accurately   depicting   their   unit.   These   Validity-Feedback   Interviews  ( Kruis,   2008 )   help   ensure   content   validity   of   our   constructs   and   the  survey   as   a   whole.   Our   pre-test   resulted   in   various   changes   to   the  survey   instrument   such   as   changing   scales   or   including   figures   to  illustrate   relevant   concepts.  Data   were   collected   in   2012.   Sample   respondents   are   unit   man-  agers   with   full   profit   and   loss   responsibility,   with   at   least   25   people  reporting   to   them,   and   with   at   least   one   direct   supervisor.   Respon-  dents   manage   units   with   on   average   273   employees   (the   range  is   25–4100   full-time   equivalent   employees)   and   have   on   average  been   working   in   their   current   position   for   5   years   (the   range   is  0.5–40   years).   Table   1A   provides   an   overview   of   the   industries   rep-  resented   in   the   data.  The   business   unit   is   the   appropriate   level   of   analysis   for   our  project.   Especially   in   larger   organizations,   strategies,   management  control   practices,   and   contexts   may   differ   widely   between   various  parts   of   the   organization.   This   intra-organizational   variety,   how-  ever,   is   less   of   a   problem   at   the   level   of   the   business   unit,   where  business   activities,   strategy   priorities,   and   performance   manage-  ment   choices   are   generally   more   homogeneous.  To   mitigate   response   problems   and   respondent   identification  issues,   we   rely   on   students   from   an   MSc-program   to   contact   poten-  tial   survey   participants 3 ;   hence,   our   sample   is   not   random.   To   the  best   of   our   knowledge,   however,   this   procedure   has   not   introduced  systematic   selection   biases,   and   we   find   sufficient   variety   in   units’  size,   industry,   et   cetera,   to   expect   appropriate   variation   in   the   con-  tingency   and   control   variables   we   use.   Since   our   sample   is   not  random   we   cannot   be   sure   that   we   study   all   possible   ways   in   which  organizations   use   the   control   levers.   However,   we   believe   that   the  sample   is   at   least   informative   of   contemporary   management   con-  trol   practices   in   the   Netherlands.  we   removed   two   more   cases   with   D2/df   scores   larger   than   4.   See   Hair   et   al.   (2010,  66–67)   .3 All   students   were   enrolled   in   the   same   course,   in   which   they   received   clear   and  very   strict   instructions   as   to   how   to   select   respondents   and   administer   the   sur-  vey,   and   in   which   we   took   considerable   care   to   ensure   a   strong   awareness   of   the  importance   of   following   the   protocol.   The   students   are   from   a   part-time   program,  are   relatively   mature   (their   ages   range   from   23   to   44   with   a   mean   of   33)   and   hold  responsible   positions   (most   of   them   as   controllers).  3.2.   Research   set   up   and   measurement  To   study   the   patterns   of   control,   we   measure   the   four   levers   and  use   cluster   analysis   in   our   search   of   configurations.   To   help   inter-  pret   the   findings   of   the   cluster   analysis   we   study   differences   in   the  contingency   variables   described   earlier. 4   In   addition,   we   examine  the   performance   of   the   clusters   on   a   series   of   strategic   performance  dimensions   that   are   especially   relevant   in   the   LOC   framework,   i.e.,  their   performance   on   various   strategic   factors   and   the   capacity   to  develop   new   strategic   capabilities.   These   dimensions   do   not   cover  the   full   spectrum   of   potential   performance   dimensions   and   can,  therefore,   not   be   applied   in   a   generic   assessment   of   relative   per-  formance   across   the   clusters.   They   are   nevertheless   informative   in  that   they   help   to   profile   the   clusters.   Each   variable   has   been   mea-  sured   using   multiple   items   (except   for   organizational   and   business  unit   size).   Most   items   are   measured   on   a   fully   anchored   5   or   7-  point   semantic   scale,   and   we   apply   Principal   Component   Analysis  with   oblique   rotation   throughout   our   study   to   explore   the   patterns  in   our   data. 5   When   we   find   multiple   factors   we   verify   the   factor  structure   with   Confirmatory   Factor   Analysis,   using   maximum   like-  lihood   estimation   in   AMOS   (untabulated).   We   consistently   find   that  the   multifactor   models   fit   the   data   well.   We   form   our   constructs   by  taking   the   mean   of   the   underlying   item   scores.   Appendix   A   repro-  duces   the   relevant   parts   of   the   survey,   and   reports   factor   analysis  results   and   item-level   descriptive   statistics.   Descriptive   statistics   at  the   construct   level   are   in   Table   1B .  3.3.   Measurement   of   the   Levers   of   Control  3.3.1.   Beliefs   and   boundaries  Beliefs   are   measured   with   four   questions   about   the   organiza-  tion’s   core   values   and   mission   statement,   taken   from   Widener  (2007) .   Factor   analysis   confirms   unidimensionality   of   the   construct  and   Cronbach’s   alpha   is   0.855.   To   validate   our   measure   we   cor-  relate   it   with   two   questions   that   ask   whether   (1)   the   core   values  are   broadly   supported   within   the   organization,   and   (2)   the   fit   with  core   values   is   taken   into   account   when   hiring   new   employees.  As   expected   we   find   significant   and   positive   correlations   between  each   question   and   the   beliefs   metric   ( r   =   0.658   and   r   =   0.477,   both  p -values   <0.01).  To   capture   boundary   control   we   use   four   questions   about   the  organization’s   code   of   business   conduct,   also   from   Widener   (2007) .  While   this   construct   does   not   directly   ask   about   the   use   of   strategic  boundaries,   the   instructions   tell   respondents   that,   for   example,   the  code   of   business   conduct   can   describe   appropriate   business   prac-  tices,   ethical   behaviors,   and   policies.   The   items   load   on   a   single  factor   and   Cronbach’s   alpha   is   0.871.   To   validate   our   measure   we  correlate   it   with   two   questions   asking   (1)   whether   organizational  members   confront   each   other   about   compliance   with   behavioral  codes,   and   (2)   how   often   the   manager   relies   on   the   organization’s  ethical   codes.   Both   correlate   positively   with   the   measure   for   bound-  aries   ( r   =   0.569,   p   <   0.01,   and   r   =   0.320,   p   <   0.01   respectively).  3.3.2.   Diagnostic   control   systems  To   measure   diagnostic   control   systems   (DCS)   we   rely   on   Henri  (2006) .   We   use   his   questions   that   ask   about   the   extent   to   which  top   management   relies   on   performance   measures   to   track   progress,  monitor   results,   compare   outcomes   to   expectations,   and   evaluate  4 Since   we   are   specifically   interested   in   balance   in   the   levers   of   control,   we   solely  include   the   four   levers   in   our   cluster   analysis.   In   so   doing,   we   gain   insight   in   the  patterns   in   the   control   choices   first,   and   then   look   for   other   differences,   for   instance,  in   the   contingency   variables.5 The   factor   structure   we   find,   however,   is   not   dependent   on   this   specific   choice.  Principal   Axis   Factoring   (again   with   oblique   rotation)   results   in   the   same   structure. \nA.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44   33  Table   1B  Descriptive   statistics:   variables   (see   Appendix   A   for   variable   definitions   and   item-level   details).  Theoreticalrange   Actual   range   Mean   Standard   deviation   Cronbach’s   alpha   AVE  Beliefs   1–7   1.50–7.00   4.718   1.097   0.855   0.70  Boundaries   1–7   2.00–7.00   5.297   1.099   0.871   0.72  DCS   1–7   2.50–7.00   5.604   0.865   0.798   0.63  ICS   1–7   2.16–6.67   4.463   0.833   –   –  Strategic   orientation   1–7   1.00–7.00   4.453   1.288   0.834   0.75  Managerial   involvement   1–7   1.00–7.00   4.044   1.251   0.549   0.69  Facilitating   use   1–7   1.20–7.00   4.891   0.989   0.840   0.61  Size   organization   –   51–140,000   13,619   27,441   –   –  Size   org   (log)   –   1.71–5.15   3.378   0.853   –   –  Size   unit   –   25–4100   272.69   517.22   –   –  Size   unit   (log)   –   1.40–3.61   2.087   0.486 et   al.   (2007)   define  ICS   as   a   formative   construct   and   distinguish   several   dimensions   that  capture   an   intensive   use   by   both   top   and   operating   managers,   a   high  level   of   face-to-face   discussions,   a   strong   focus   on   strategic   uncer-  tainties,   and   a   non-invasive,   inspirational   involvement.   To   obtain   a  broad   measure   of   ICS   we   use   three   constructs   that   together   cover  these   dimensions   and   combine   them   into   one   formative   construct.  First   we   use   two   questions   about   higher   management’s   involve-  ment   with   performance   measures   from   Widener   (2007) . 7   These  form   one   factor,   although   the   Cronbach’s   alpha   is   low   (0.549).   A   low  Cronbach’s   alpha   is   an   indication   of   possible   measurement   error,  but   may   also   be   caused   by   the   fact   that   the   scale   includes   only   two  items.   Therefore,   we   also   assess   the   Pearson   correlation   between  the   two   questions.   The   correlation   is   reasonably   strong:   0.379  ( p   <   0.01),   suggesting   adequate   measurement.   Second,   we   work  with   five   questions   of   Henri’s   (2006)   attention-focusing   role   to  pick   up   on   a   facilitating   use   of   performance   measures   (FACILUSE). 8  Factor   analysis   confirms   the   unidimensionality   of   this   construct  and   the   Cronbach’s   alpha   is   satisfactory   (alpha   =   0.840).   Finally,  6 These   included   stock   price,   return,   profit,   revenue,   cost,   non-financial   quantita-  tive,   and   qualitative   targets.7   Widener   (2007)   uses   two   more   questions   about   top   management   involvement,  but   we   leave   those   out   because   of   repetitiveness.8   Henri   (2006)   uses   seven   items.   We   leave   out   one   item   that   addresses   critical  success   factors   and   that   (conceptually)   better   fits   diagnostic   control.   Another   item  cross   loads   in   our   sample   with   diagnostic   control   and   is   left   out   as   well.  we   ask   about   the   focus   on   strategic   uncertainties.   Since   there   is  no   instrument   available   we   develop   our   own.   In   a   similar   vein   as  Henri   (2006) ,   we   ask   about   the   extent   to   which   higher   manage-  ment   relies   on   performance   measures   to   (1)   signal   key   strategic  areas   for   improvement,   to   (2)   signal   new   strategic   challenges,   and  (3)   to   discuss   the   impact   of   potential   changes   in   the   competitive  environment.   Together   these   three   questions   measure   the   focus  on   strategic   uncertainties,   they   form   a   single   construct,   and   the  Cronbach’s   alpha   is   0.834.  The   next   step   to   obtain   our   measure   of   ICS   is   to   take   the   aver-  age   of   the   scores   on   managerial   involvement,   facilitating   use,   and  strategic   orientation.   Hence   we   obtain   a   formative   construct   that  represents   the   multiple   dimensions   of   ICS.   To   validate   this   for-  mative   measure   we   calculate   Edwards’   adequacy   coefficient   ( R 2a;  Edwards,   2001;   MacKenzie   et   al.,   2011 ).   The   R 2a equals   the   cutoff  value   of   0.50,   suggesting   adequate   construct   validity.   In   addition,  we   correlate   our   formative   measure   with   two   possible   outcomes  of   ICS.   We   ask   about   the   business   unit’s   ability   to   take   advantage   of  new   opportunities,   and   the   importance   of   learning   as   a   part   of   the  manager’s   job.   Both   indicate   the   results   from   continual   challenge  and   debate   that   arise   from   ICS   ( Simons,   1995 )   and   both   corre-  late   significantly   and   positively   with   ICS   ( r   =   0.130,   p   =   0.057,   and  r   =   0.129,   p   =   0.058   respectively).  3.4.   Common   measurement   bias   and   robustness  Since   survey   research   carries   the   risk   of   common   measurement  bias   ( Podsakoff   et   al.,   2003;   Chang   et   al.,   2010 )   we   run   a   Harman’s  one   factor   test   on   all   items   related   to   the   levers   of   control.   The  (untabulated)   results   show   five   factors,   the   first   of   which   explains  only   29%   of   the   variance.   Thus,   we   conclude   there   is   little   indication  of   common   measure   bias.  We   also   find   that   the   scale   for   managerial   involvement   has   a   low  Cronbach’s   alpha   and   might   contain   measurement   error.   Therefore,  we   run   a   robustness   check   on   our   cluster   analysis   (see   below)   using  a   measure   of   ICS   that   does   not   include   managerial   involvement.   Our  results   are   robust   to   this   change   and   we   opt   for   measuring   ICS   as \n34   A.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44  a   formative   construct   comprised   of   all   three   dimensions.   This   may  be   challenged   statistically,   but   is   theoretically   more   encompassing.  3.5.   Measurement   of   contingency   variables  3.5.1.   The   external   environment  We   proxy   for   environmental   uncertainty   by   asking   about   the  impact   of   external   factors   on   performance   of   the   business   unit   (fol-  lowing   Van   Elten,   2012 )   and   whether   the   BU   needs   to   react   often   to  outside   pressures   or   experiences   problems   with   long-range   plan-  ning   (following   Kalleberg   et   al.,   1996 ).   The   items   form   a   single  construct   with   a   Cronbach’s   alpha   of   0.647.  3.5.2.   Technology  We   measure   goal   clarity   with   the   three-item   instrument   devel-  oped   by   Rainey   (1983)   with   an   additional   item   from   Kruis   (2008) .  Factor   analysis   supports   the   construct’s   unidimensionality.   Cron-  bach’s   alpha   is   adequate   with   a   score   of   0.676.   For   measurability   of  outputs,   we   combine   four   questions   from   Kruis   (2008)   and   Speklé  and   Verbeeten   (2014) .   Because   of   scale   differences,   we   standardize  the   responses.   The   factor   analysis   reveals   unidimensionality,   and  we   combine   the   items   in   one   factor   by   averaging   the   (standardized)  item   scores.   Cronbach’s   alpha   is   0.734.   To   capture   interdependen-  cies,   we   rely   on   the   instrument   first   used   by   Keating   (1997) .   This  instrument   measures   both   the   impact   of   other   units’   actions   on   the  respondent’s   business   unit,   as   well   as   the   influence   of   the   respon-  dent’s   unit   on   the   rest   of   the   organization.   Both   items   load   on   a  single   factor.   Cronbach’s   alpha   is   0.821.  3.5.3.   Structure  We   measure   decentralization   of   decision   rights   with   an   instru-  ment   based   on   Gordon   and   Narayanan   (1984)   and   further  developed   by   Abernethy   et   al.   (2004) .   This   instrument   captures  managers’   influence   on   decisions   in   five   relevant   domains   (strate-  gic,   investment,   marketing,   internal   processes,   and   human   resource  management).   Factor   analysis   shows   that   all   five   items   load   on   a  single   factor,   and   Cronbach’s   alpha   is   0.759.   We   seek   to   capture  the   degree   of   formality   in   our   organizational   culture   measure   (see  below)   and   through   leadership   style.   We   measure   the   latter   con-  struct   with   a   scale   from   Stogdill   and   Coons   (1957)   in   the   version   as  it   has   recently   been   used   by   Abernethy   et   al.   (2010) .   Factor   analy-  sis   returns   two   factors,   which   we   label   considerate   style   (with   an  alpha   of   0.774)   and   initiating   structure   (Cronbach’s   alpha   =   0.776),  respectively.  3.5.4.   Size  The   size   of   the   organization   is   measured   by   the   number   of  employees   of   the   organization.   We   also   measure   the   size   of   the  unit   as   an   additional   metric   for   size,   again   based   on   the   number   of  employees.   To   mitigate   distributional   issues,   we   apply   a   log   trans-  formation   to   both   numbers   before   entering   them   in   the   analyses.  3.5.5.   Strategy  To   measure   the   units’   strategic   priorities,   we   apply   the   instru-  ment   developed   by   Chenhall   (2005)   based   on   the   work   of   Miller  et   al.   (1992) .   The   analysis   returns   three   interpretable   factors   that,  however,   deviate   somewhat   from   Chenhall’s   solution   ( Chenhall,  2005 ).   We   label   the   components   Low-cost-low-price   (Cron-  bach’s   alpha   =   0.650),   Differentiation   (Cronbach’s   alpha   =   0.622),  and   Delivery   &   Service   (Cronbach’s   alpha   =   0.579),   respectively.  3.5.6.   Culture  We   follow   Henri   (2006)   and   distinguish   flexibility   values   and  control   values.   Flexibility   values   reflect   adaptability,   openness   to  change   and   responsiveness,   whereas   control   values   reflect   stability,  formality,   and   predictability   ( Henri,   2006 ).   We   use   the   instru-  ment   by   Lee   and   Widener   (2013) ,   which   covers   three   parts   of  the   Organizational   Culture   Assessment   Instrument   ( Cameron   and  Quinn,   1999 ):   dominant   characteristics,   organizational   glue,   and  strategic   emphasis.   We   form   four   variables:   group   culture   (one   fac-  tor,   Cronbach’s   alpha   =   0.584),   developmental   culture   (one   factor,  Cronbach’s   alpha   =   0.704),   hierarchical   culture   (one   factor, 9   Cron-  bach’s   alpha   =   0.704),   and   rational   culture   (one   factor, 10   Cronbach’s  alpha   =   0.560).   Flexibility   values   scores   are   formed   by   the   summa-  tion   of   the   scores   on   group   and   developmental   cultures.   Control  values   scores   are   formed   by   adding   up   scores   for   hierarchical   and  rational   cultures.  3.5.7.   Dimensions   of   performance  The   capacity   to   search   for   new   strategic   capabilities   is   measured  with   an   instrument   from   Grafton   et   al.,   (2010)   .   We   asked   respon-  dents   to   indicate   the   extent   to   which   their   business   unit   is   able  to   sense   the   need   for   strategic   change,   and   to   seek   new   capabil-  ities   in   response   to   that   need.   These   two   items   load   on   a   single  factor(Cronbach’s   alpha   =   0.810).   As   part   of   the   questions   inquir-  ing   about   the   strategic   priorities   of   the   business   units   (see   above),  we   also   asked   respondents   to   indicate   how   well   they   did   relative  to   competitors   on   the   various   strategic   dimensions.   Factor   analy-  sis   returns   three   factors   that   are   similar   to   the   ones   we   find   in   the  strategic   priority   responses,   and   we   label   them   correspondingly   as  Low-cost-low-price   performance   (Cronbach’s   alpha   =   0.635),   Dif-  ferentiation   performance   (Cronbach’s   alpha   =   0.595),   and   Delivery  &   Service   performance   (Cronbach’s   alpha   =   0.683).  3.6.   Research   design:   cluster   analysis 11  In   our   search   for   how   organizations   balance   their   levers   of   con-  trol,   we   are   interested   in   identifying   groups   of   observations   with  similar   LOC   choices   (or   profiles).   Cluster   analysis   is   well-suited   for  this   purpose.   The   inputs   for   the   cluster   analysis   are   the   scores   on  the   four   levers.   Since   the   levers   use   similar   measurement   scales,  there   is   no   need   for   standardization   ( Ketchen   and   Shook,   1996 ).  We   follow   a   two-stage   procedure   combining   hierarchical   and   non-  hierarchical   cluster   methods   to   obtain   a   refined   cluster   solution  ( Hair   et   al.,   2010;   Ketchen   and   Shook,   1996 ). 12   Visual   examina-  tion   of   the   dendrogram   suggests   two   useable   solutions:   one   with  two   clusters   and   one   with   four   clusters.   The   two-group   solution,  however,   leaves   a   large   number   of   cases   in   one   group   (162   cases  out   of   217).   The   four-cluster   solution   splits   this   group   into   three  smaller   groups   and   returns   a   more   precise   solution   that   still   has  enough   observations   in   each   group   to   allow   meaningful   compari-  son   between   groups.   We   therefore   select   the   four-group   solution   as  our   referent.   For   descriptions   of   the   complete   cluster   analysis   and  robustness   tests   see   Appendix   B .  4.   Findings:   cluster   profiles  Fig.   1   shows   a   bar   chart   that   illustrates   differences   in   the  importance   of   the   levers   of   control   across   the   four   clusters   while  Tables   2A–C   provides   descriptive   statistics   and   ranking   informa-  tion,   both   between   and   within   the   clusters.   As   stated   earlier,   the  central   theme   of   the   LOC   framework   is   to   control   business   strategy.  Thus,   consistent   with   Simons’   (1995)   theorizing   that   the   control  9 After   removing   one   item.   Items   used   are   to   be   found   in   Appendix   A .10 After   removing   one   item.   Items   used   are   to   be   found   in   Appendix   A .11 In   our   approach   we   closely   follow   the   steps   and
