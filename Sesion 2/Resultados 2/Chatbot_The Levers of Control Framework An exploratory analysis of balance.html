arying in size from less than 200   employees to greater than 2000 employees. This suggests  a releva nce for  the LOC   framework   beyond the limits suggested by Simons.     Furthermore,  Simons limited his framework to an analysis of formal systems. However, this has been   questioned in the literature and Collier   ( 2 005 )   holds that informal controls may be implicitly   considered in the framework. Collier finds that informal controls had an important role to play in his   study.   Marginson  ( 199 9 )   finds informal control systems can act as substitutes for administrative   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  18    controls.  Further consideration of the usefulness of Simons’ framework to examine informal controls   should prove fruitful in future research.      In summary, the application of  Simons ’   LOC framework in qualitative studies has contributed to the    understanding of the nature and role of the levers and the interactions between them.  These   studies also point to the significant value of the framework as a tool for analysing   package s   o f   controls in   a broad range of management control s c enarios.    Qualitative studies have also been   ideally placed to extend the  framework to examine contemporary issues  ( such as CSR   and    environmental accounting ) ,  and  changed organisational structures reflect ed in  the  chang ing   roles  for   various levels of management, greater emphasis on teams, use of  horizontal MCS and  increased   importance of  inter - organisational controls .    Many o pportunities for future  qualitative  research   exist   includ ing   a greater insight int o the  choice of and  number of  control systems used interactively   in   organisation s   and   the role of once - off MCSs .   Some of these issues are also suited to further   examination in quantitative work and the next section  discusses   the quantitative studies to dat e   which have adopted the LOC framework.     5.2   Quantitative studies    Of the studies selected,  1 4   use quantitative methods . All of the studies were survey based and    Simons’ LOC was used to inform the design of the study and to interpret findings.    ICS is  examined   in   a ll of the studies ,  seven   examine   DCS   and  only  on e   stud y   examined all four levers ( Widener 2007 ).    Other than Marginson et al.’s  two  stud ies  ( Marginson et al., 2014 ;  Marginson et al., 2010 ) , all studies   gathered data from multiple organisations.     These   studies  contribute to the literature by op erationali s ing the constructs underlying the   framework and testing hypotheses about  the  association between   using particular control systems   in an   interactive or diagnostic  manner  and a diverse range of  organisational  variables .   In doing so,   the y   provide  evidence about the posited relationships in the framework . For   example, the LOC   framework theorises that   the use of  the four levers  facilitate s   the implementation of strategy and    the use of control systems interactively   encourage s strategic renewal. C onseq uently studies have   considered the association between the use of particular MCS in an interactive or diagnostic manner   and  s trategic implementation, strategic risk, strategic change, organisational performance, shor t   t ermism and life - cycle stage   ( Abernethy and Brownell, 1999 ;  Marginson et al., 2010 ;  Naranjo - Gil and   Hartmann, 2006 ,  2007 ;  Widener, 2007 ) .    Simons posits that use of MCS in an interactive manner supports  idea generation and opportunity   seeking behaviour and as such the  framework has attracted interest from resea rchers  focusing o n   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  19    innovati on. Thus quantitative studies have examined the association between the use of controls   and innovation and entrepreneurship  ( Bisbe and Malagueno,  2009 ;  Bisbe and Otley, 2004 ;  Henri,   2006a ) .   While this literature has provided some evidence to support the relationships posited b y   Simons ’   framework, it has also produced some conflicting evidence . For example,  drawing  on  the   resource - based view of the firm,  Henri f i nd s   that interactive use of PMS fosters capabilities of   entrepreneurship and innovativeness. However, Bisbe and Otley  f i nd that in high innovating firms,   product innovation was associated with low use of ICS.       How the concept of ICS relates to other concepts in the literature has also att r acted attention.  For   example,  Van der Stede   ( 2001 )   operationalise s   ICS as the intensity of information exchanges and   f i nd s  this to be consistent with the conce p t of budget tightness. Davila  ( 2000 )   relate s   the usage   pattern of information (ICS or DCS) with the level of detail in the information and the frequency of   the updating of the information ; he   use s   these three characteristics to measure a broader variable   on th e design of MCS.  Other studies consider the association  between   using particular  MCS   in an    interactive or diagnostic  manner and a number of behavioural variables such as leadership style, role   ambiguity and team effectiveness  ( Abernethy et al., 2010 ;  Chong and Mahama, 2013 ;  Marginson et   al., 2014 ) .   Such studies contribute evidence about relationships that are not posited by the   framework but raise intere sting questions about its application.  For example, Chong and Mahama   extend the use of the framework to the team level and find that ICS is positively related to team   effectiveness and perceived collective efficacy, while  other studies find that ICS is rel ated to   individual level variables such as perceived role ambiguity ( Marginson et al. 201 4 )  and leadership   style (Abernethy et al., 2010) .     These   studies have contributed to the development of Simons’ framework through the detailed   specification and operat ionali s ation of underlying constructs which is necessary in quantitative   studies  ( Bisbe et al., 200 7 ) .  As can be seen   from  A ppendix 4,  only one measure of each of beliefs and   boundary systems has been developed.   DCS   and in particular  ICS   have received far greater attention   in the literature.  Where ICS and DCS are examined as separate variables, there   are a total of 7   different measures of ICS ( ignoring slight differences in wording and different numbers of items) and   2   different measures of DCS. There are also a further two measures of ICS/DCS which measure these   variables   as alternatives.    The   concept of ICS has received the greatest attention in the  quantitative   literature and  the literature has    recognised    the ambiguity in its definition  ( Fer reira and Otley,   2009 ) .  Simons specifies a number of dimensions of this concept and   Bisbe et al. (2007)   further detail   the importance of considering the variable as a formative construct rather than a reflective   construct. However, the extent to which these dimensions has been examined in studies has varied .     Electronic copy available at: https://ssrn.com/abstract=2784473 \n  20    D ifferences in measureme nt and definition of ICS limit our ability to draw overall conclusions from   these studies .    An area where future research could contribute is the development of a more refined measure of   ICS.  For example, one of the dimensions of ICS which would benefit fro m more refined   measurement is the non - invasive, facilitating and inspirational involvement by top management   ( Simons, 1995 ) . What Simons observe s   in the operation of ICS appears to reflect positive energy   flowing through the control system from top management to lower levels of management. This   raises the ques tion as to whether we could have two systems with similar characteristics, one which   channels positive energy and one which channels negative energy. Tessier  and   Otley (2012) point   out that positive and negative refer to perceptions of a control rather tha n the actual control itself .   While a system  perceived to  channe l   negative energy would not be the intention of an interactive   system and would not be compatible with a facilitating and inspirational involvement, it may occur   in practice. Previous surveys ,   which have designed constructs to measure interactive controls have   left unspecified whether management energy is perceived to have positive or negative outcomes   (e.g. Abernethy and Brownell, 1999 ;  Naranjo - Gil and Hartmann, 2007 ;  Widener, 2007 ) . It has been   maintained that Simons’ framework does   not extend to considering employees’ perceptions of   controls  ( Tessier and Otley, 2012 ) , though it is difficult to conceive that Simons was only referring to   top management’s perception of  attention as being  facilitating and inspiring.     A further aspect of the facilitating, inspirational and non - invasive involvement of top management is   that   Simons is clear that this does not equate with micro management. However, measures of   interactive controls used in previous research may not be capable of distinguishing between the   two. For example ,   Widener  ( 2007 )   f i nd s   that the statements measuring debate and discussion   loaded on the factor labelled diagnostic and the factor labelled interactive contained only items   related to the extent of management attention, which could result from micro managemen t. What is   intended to be an interactive system and labelled as such by researchers may have very different   outcomes in practice than what was intended.     While the qualitative studies have much greater scope to focus on  a package of   MCS, quantitative   studi es  tend to  examin e   a  specific MCS   in identifying the use of a lever .  The most frequently   examined control system s   in the quantitative studies  w ere   PMS (including balanced scorecard)  (6    studies ) and budgets (5 studies) , while one study focuses   on  non - specific  MCS  ( Janke et al., 2014 ) .   The limited number of MCS examined in quantitative studies limits the   ability of the studies to focus   on the choice of interactive control system.   T his has been identified as a weakness in the literature   ( Bisbe and Malagueno, 2009 ) . Bisbe  and  Malagueno’s study examines the choice between three   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  21    feedback and measurement syst ems (balanced scorecard, budgets and performance evaluation   systems) for interactive use and even the inclusion of three systems is acknowledged as a limitation   of their study.  Grabner and Moers  ( 2013 )   point to the importance of considering the management   control packages and to the relationship between the levers.  They poi nt to the need for more fine -  grained analysis of control systems which they argue have been   studied   at   too aggregated a level.   They maintain that certain practices which are part of a DCS (such as objective performance   evaluation) may reduce the effectiveness of ICS which relies on open sharing of information. Hence,   they give an example of a hypothesis th at a results control system used both interactively and   diagnostically will increase tension and have a positive impact on performance as lacking the   specifics of considering which ICS and DCS practices are complements.     In summary, the small  number of qua ntitative studies and  the range of variables  tested to date   has   resulted in  the   lack of a coherent body of evidence supporting the   relationships posited in   the  LOC   framework. This  points to considerable scope for future studies  to   provide stronger evidence   both   about relationships posited by the framework and about the impact of behavioural variables on the   operation of the levers. Research to improve the scope and   operationalis ation of   the  constructs    should improve the consistency of findings and provide a   much stronger basis on which to compare   the results of quant it ative studies   across companies of different size, industry, strategies, leadership   styles etc.    6.   Criticism s   and theoretical development of Simons’ LOC framework       A number of non - empirical stud ies have commented on Simons’ framework and add to our   understanding of the limitations of the framework. For example , Ferreira  and   Otley  ( 2009 )   provide a   useful overview of the strengths and weaknesses   of the framework . Regarding strengths, they refer   to the strong focus on strategic issues and their implications for the control system, consideration of   a broad range of controls and their use, an d a typology for alternative uses of controls. In terms of   weaknesses, they point to insufficient attention on socio - ideological controls  ( Collier, 2005 ) , sole   focus on top management, exclusion of informal contr ols, diffuse meanings of underlying concepts   such as core values which are key to understanding the LOC framework, ambiguity in the definition   of interactive controls, and lastly, inapplicability to certain organisations such as subsidiaries who   have not d esigned belief s   and boundary systems.  The framework has also been criticised for not   offering anything more than ultimately ‘a more strategically informed approach to management   accounting’  ( Roslender and Hart, 2002 p. 260 ) . However, the subsequent volume of empirical   research that has found the framework useful suggests otherwise.      Electronic copy available at: https://ssrn.com/abstract=2784473 \n  22    A   number of theoretical papers have considered   Simons’ framework with the objectives of   extending the framework or applying it  theoretically  to other fields .   Gond et al.  ( 2012 )   theorised the   roles and uses (diagnostic versus interactive) of MCS and sustainability control systems in the   integration of sustainability within organisational strategy.  They conceptualised eight different   configurations of   interactive and diagnostic use of MCS that result in different levels of integration   between sustainability and organisational strategy.     Two  theoretical  studies draw on enabling/coercive bureaucracy in further developing our   understanding of the LOC framework.  Tessier and Otley  ( 2012 )   extend the LOC fra mework by   separat ing   management intentions for control from employee perceptions of controls   and link the   enabling/coercive bureaucracy to the role of control systems . They divide management intentions   into three levels: (1) types of control (social and technical), (2) objectives of control (performance or   compliance) which are regrouped into four control systems operating at two organisational levels   (strategic perfor mance, operational performance, strategic boundaries, operational boundaries), (3)   other choices regarding uses of control systems (diagnostic or interactive), roles of controls   (enabling or constraining) and consequences linked to control systems (reward  or punishment).      In examining motivational orientations required for large scale collaborative creativity,  Adler and   Chen  ( 2011 )   also   draw on both the LOC framework and enabling/coercive bureaucracy.  They point   to  a   gap in Simons’ framework in addressing how the levers influence employees’ motivational   orientations. They maintain that beliefs systems will have a positive role in fosteri ng identified   motivation. They theorise that an enabling use of boundary and diagnostic control systems will have   a positive effect on motivation. They also theorise that ICS will have a positive effect on motivation.   In addition, they theorise than an opt imal mix of ICS and DCS will have a positive effect on   motivation.   Empirical research has also examined the concepts of enabling/coercive in the context   of the LOC. For example, Chenhall et al. (2010) contrasted the interactive use of programme   management  system used in an enabling way with the interactive use of budgeting system used in   coercive way.  Further work is needed to tease out  multi - dimension al   concepts of  enabling and   coercive ICS   and  DCS.   There is also scope for additional research examining the   extent of variable   overlap between the LOC concepts and many existing concepts in the literature.     While ICS and DCS   describe two different ways of using feedback and measurement systems,  v an   Veen - Dirks and Wijm  ( 2002 )   have suggested  that ICS use s   information from formal systems designed   only  for strategy implementation and that there is a need for a new category of control (in addition   to ICS and DCS) to reflect the role of control systems in reviewing and reformulating strategy. They    term this strategic control. They maintain that the balanced scorecard can be used interactively or   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  23    diagnostically but cannot be used as a strategic control system ,   as the purpose of the balanced   scorecard is implementation of strategy. This interpretatio n of ICS as being based on control systems   designed for stra tegy implementation seems at   odds with Simons’ description of ICS. For example,   Simons  (1995)  refers to intelligence systems as an example of a system which may be used   interactively.  He describe s intelligence systems as the systems that  ‘ gather and disseminate   information about social, political, and technical business environments’ ( p.  109). This information is   likely to have a much wider focus than the implementation of current strategy.  Despit e the greater   volume of attention (in comparison to the other levers) the concept of ICS has received,  v an Veen   Dirks and Wijm’s study further illustrates the confusion that still exists in the literature around the   concept of ICS and the need for greater  consistency around the use of the term in future research.       7.   Conclusion       This paper consolidates the empirical studies which have used the LOC framework over the last 25   years.  A  comprehensive  search of empirical research published in grade 3 and 4 (AB S listing)   A ccounting,  G eneral  M anagement and  S trategic  M anagement journals , J ournal of Management   Accounting Research   and J ournal of  A ccounting and  O rganizational  C hange   revealed 4 5   studies.   These studies have been classified by research method and an analysis has been carried out of   journals publishing the studies, levers examined, industries ,   geographical setting and range of issues   addressed .  In addition, a comprehensive examinati on of the operationalisation of the levers in   quantitative studies has been carried out. Our review and critique of existing empirical research   applying the LOC framework has   shown that the LOC framework has been used to address different   research issues a cross a range of contexts and has  pointed to a number of gaps in the literature .   Throughout t he paper ,  fruitful  areas for  advancing   research   on the LOC framework   have been   suggested .   These include the influence of national culture on the levers (in particu lar the   applicability of this framework in emerging economies),  increased focus on beliefs and boundary   systems, the choice and number of ICS used by organisations, the role of once - off control systems,   the ability of the LOC framework to capture informal  controls,  the refinement of the measure of ICS   taking into account dimensions such as positive and negative  management attention , the   implications of the enabling/coercive bureaucracy framework for our understanding of the levers,   and the relationship betw een Simons’ concepts and other concepts in the literature.        Overall, Simons’ framework,  despite being based on practice 25 years ago , is gaining in p opularity   among scholars.   The steadily increased attention the framework is receiving suggests its continued   usefulness in explaining how MCS are used in organisations.  It  has   been used  to a greater extent  in   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  24    qualitative studies   and these studies have extended the application of the framework to   contemporary issues such as changed organisational structures and new research   topics (for   example, CSR) .  The quantitative studies have focused largely on the concepts of ICS/DCS and have    led to increased understanding of antecedents and outcomes of these levers. The diversity  of    empirical work applying the framework and  imbalance  in the attention given to various levers has   limited the ability of the body of work to produce coherent findi ngs. Much scope exists for further   research  to address a  number of gaps in our understanding of how the framework can explain the   use of MCS in organisations.  Simons’ theory has   provide d   us with  an understanding   of how control   systems can be used as levers   by management to control the variables of fundamental importance   to a business .    Its longevity of use over a period of 25 years with tremendous change suggests that it   is likely to remain a popular framework among MCS researchers in the future.     Electronic copy available at: https://ssrn.com/abstract=2784473 \n  25    R eferences       Abernethy, M. A., Bouwens, J., and van Lent, L. (2010), \"Leadership and control system design\",   Management Accounting Research,  Vol. 21, pp. 2 - 16.     Abernethy, M. A., and Brownell, P. (1999), \"The role of budgets in organization s facing strategic change: An   exploratory study\",  Accounting, Organizations and Society,  Vol. 24 No. 3, pp. 189 - 204.     Adler, P., and Chen, C. (2011), \"Combining creativity and control: Understanding individual motivation in   large - scale collaborative creati vity\",  Accounting, Organizations and So     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {

        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,

            chatBubbleBotBg: botBg,

        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
