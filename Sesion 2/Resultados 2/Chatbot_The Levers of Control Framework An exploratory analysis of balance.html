1:   strategic   vigilance  Cluster   1   groups   61   observations   (28%   of   the   sample).   Units   in  this   cluster   score   high   on   all   levers   (relative   to   units   in   the   other  clusters)   and   control   appears   to   be   tight   and   intensive.   Within   the  cluster,   the   emphasis   is   on   DCS   and   Boundaries,   suggesting   a   dom-  inant   focus   on   strategy   as   a   plan,   as   well   as   a   concern   for   reputation  risks.   However,   even   though   the   reliance   on   beliefs   and   ICS   is   rela-  tively   low   within   the   cluster   (compared   to   the   emphasis   on   DCS   and  boundaries),   it   is   still   high   compared   to   units   in   the   other   clusters.  This   suggests   that   cluster   1   units   actively   scan   their   environments,  looking   for   threats   and   new   strategic   opportunities,   and   stimulat-  ing   experimentation   and   learning.   The   general   pattern   is   consistent  with   ‘strategic   vigilance’;   units   in   this   cluster   are   happy   with   their  current   strategy   but   are   seeking   to   expand   their   strategic   portfolio  with   new   projects.   These   units   are   likely   ambidextrous   thus   focus-  ing   both   on   exploitation   as   well   as   exploration;   they   want   to   learn  how   to   operate   more   efficiently   and   effectively   within   their   cur-  rent   operating   paradigm   as   well   as   to   learn   how   to   perform   new  activities.  The   multinomial   regression   results   show   that   goal   clarity   and  measurability   have   a   significant   positive   effect   on   the   chances   of   a  particular   unit   to   be   in   cluster   1   (only   cluster   4   scores   similar   on   goal  clarity).   Proposition   2a   predicts   that   units   characterized   by   these  contingency   variables   emphasize   performance   measurement   sys-  tems,   which   shows   up   in   their   high   reliance   on   ICS   and   DCS.   We   also  observe   that   units   with   leadership   that   emphasizes   structure   are  more   likely   to   reside   in   cluster   1,   further   underscoring   the   impor-  tance   of   monitoring   and   performance   measurement   in   this   cluster  (cf.   proposition   P3b).   Judging   from   the   relatively   high   scores   on   goal  clarity,   measurability,   and   reliance   on   performance   measurement,  units   in   cluster   1   have   built   up   a   certain   degree   of   routine   in   man-  aging   their   business,   which   is   consistent   with   the   exploitation   part  of   their   strategic   agenda.   The   units   are   furthermore   characterized  by   a   general   tightness   of   control,   which   is   indicative   of   a   relatively  advanced   control   environment.   Consistent   with   proposition   P4,   this  may   be   explained   from   the   fact   that   the   units   in   cluster   1   are   part   of  larger   organizations,   at   least   compared   to   units   in   clusters   3   and   4.  We   also   measured   unit   size   as   an   alternative   size   proxy   and   (some-  what   paradoxically)   find   that   units   in   cluster   1   tend   to   be   smaller  than   those   in   clusters   3   and   4.   For   proposition   P4,   this   suggests   that  organizational   size   is   a   better   predictor   of   control   sophistication  than   unit   size.  Given   the   strong   emphasis   on   formal   control   and   performance  monitoring,   we   would   expect   that   units   high   in   uncertainty   (P1)  and   decentralization   (P3a)   are   found   in   this   cluster,   but   the   results  show   that   these   contingency   factors   do   not   provide   much   insight  on   cluster   membership,   at   least   not   for   cluster   1   (cluster   1   ties   with  all   other   clusters   on   uncertainty   and   with   two   other   clusters   on  decentralization).  The   multinomial   results   further   indicate   that   membership   of  this   cluster   is   more   likely   to   occur   in   units   whose   culture   places  importance   on   flexibility   values,   whereas   the   importance   placed   on  control   values   does   not   set   this   cluster   apart   (only   higher   than   clus-  ter   4).   This   suggests   that   cluster   1   units   balance   the   overall   formality  and   tightness   of   their   control   structure   with   a   relatively   strong  emphasis   on   flexibility   values,   implying   that   they   also   value   open-  ness,   adaptability,   and   the   willingness   to   make   changes   to   their  strategy   (proposition   P6).   Apparently,   the   units   are   not   just   con-  cerned   with   exploiting   their   current   strength,   but   also   looking   for  new   strategic   directions.   This   is   compatible   with   the   ambidexterity  we   ascribed   to   this   cluster.   In   further   support   of   this   interpretation,  the   examination   of   performance   dimensions   shows   that   units   in  cluster   1   have   the   highest   mean   level   of   performance   on   search-  ing   for   new   strategic   capabilities.   Also,   their   comparatively   strong  reliance   on   interactive,   beliefs,   and   boundary   controls   appears   to  support   a   relatively   strong   performance   on   delivery   and   service  strategy   (at   par   with   cluster   3,   but   higher   than   clusters   2   and   4).  There   are   no   performance   differences   across   clusters   for   the   differ-  entiation   strategy.   However,   units   in   cluster   1   do   not   emphasize   a \n38   A.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44  differentiation   strategy–even   though   the   relatively   strong   reliance  on   ICS   and   belief   systems   could   support   such   a   strategy   (cf.   propo-  sition   P5).   In   fact,   units   in   cluster   1   are   at   the   lower   end   of   the  differentiation   strategy   scale,   at   par   only   with   units   in   cluster   3.   A  possible   explanation   is   that   units   in   cluster   1   are   looking   for   diver-  sification   rather   than   differentiation   given   their   search   for   new  strategic   opportunities.  Because   units   in   cluster   1   emphasize   boundary   controls   (both  within   their   control   system   and   relative   to   units   in   other   clusters),  we   expect   units   that   are   particularly   sensitive   to   potential   changes  in   their   strategic   environment   and/or   may   easily   lose   legitimacy  to   have   a   preference   for   this   cluster.   Interestingly,   we   observe   that  units   in   the   financial   services   industry   occur   relatively   often   in   this  cluster.   In   the   aftermath   of   the   recent   financial   crisis,   units   in   this  industry   have   been   subjected   to   intensified   regulation.   Also,   these  units   share   a   need   to   retain   their   reputation.   Compliance   concerns  and   the   need   to   safeguard   legitimacy   are   well-served   by   the   con-  trol   structure   of   cluster   1,   with   its   tight   boundary   control   and   clear  direction   from   its   DCS.  4.2.   Cluster   2:   strategic   exploitation  Cluster   2   comprises   63   units   (29%   of   the   total   sample).   Overall  control   intensity   is   moderate   (relative   to   units   in   the   other   clus-  ters).   Units   in   cluster   2   score   high   on   boundaries   relative   to   units   in  clusters   3   and   4.   Within   the   cluster,   the   emphasis   is   on   DCS   and   (par-  ticularly)   on   boundaries.   Apparently,   strategy   as   a   plan   is   important,  but   there   is   also   a   strong   desire   to   avoid   reputation   risk.   Given   the  low   intensity   of   the   reliance   on   beliefs   and   ICS   (both   relative   to  DCS/boundaries   within   the   cluster,   and   relative   to   clusters   1   and  3),   strategic   change   and   the   desire   to   innovate   are   not   high   on   the  units’   agenda.   This   pattern   is   consistent   with   ‘strategic   exploitation’  in   markets   in   which   reputation   is   important.   Units   in   this   cluster  seek   to   capitalize   on   their   current   assets   and   capabilities   in   existing  and   familiar   markets,   desire   to   do   what   they   are   currently   doing   in  a   more   effective   way,   but   do   fear   reputation   risks.  We   observe   a   certain   preference   in   both   clusters   1   and   2   for  units   within   the   financial   services   industry.   This   is   consistent   with  the   relatively   strong   emphasis   on   boundary   systems   that   units   in  both   clusters   report.   The   fact   that   this   emphasis   is   lower   in   cluster  2   (as   compared   to   cluster   1)   may   be   explained   by   the   higher   level  of   centralization;   the   multinomial   regression   results   indicate   that  higher   levels   of   centralization   are   positively   associated   with   the  likelihood   of   being   in   cluster   2. 13   Centralization   limits   behavioral  risks,   and   may,   therefore,   substitute   for   boundary   control.  Proposition   P1   links   high   uncertainty   to   control   formality   and  tightness,   but   with   less   delegation   of   decision   rights,   formal   per-  formance   measurement   becomes   less   important   (consistent   with  proposition   P3a).   Although   environmental   uncertainty   is   at   the  higher   end   of   the   spectrum   for   units   in   this   cluster   (that   is,   uncer-  tainty   is   at   par   with   units   in   clusters   1   and   3,   but   higher   than   in  cluster   4),   centralization   may   again   help   us   understand   why   the  overall   control   intensity   and   level   of   DCS   within   the   cluster   are  moderate   relative   to   the   other   clusters   (although   DCS   scores   high  within   the   cluster).   Furthermore,   even   though   the   emphasis   on   con-  trol   values   embedded   in   the   units’   culture   suggests   a   preference  for   tight   and   intensive   control   (proposition   P6),   control   intensity  is   moderate   because   centralization   allows   the   realization   of   con-  trol   objectives   without   recourse   to   such   tight   controls.   Similarly,  the   importance   of   employing   a   structure-initiating   leadership   style  (relative   to   clusters   1   and   3),   is   not   as   important   (Proposition   P3b).  13 As   can   be   seen   in   Table   4A ,   units   that   score   low   on   decentralization   are   more  likely   to   reside   in   cluster   2.   Hence   we   conclude   centralization   (as   the   opposite   of  decentralization)   is   relatively   high   for   units   in   this   cluster.  Units   that   score   lower   on   the   ability   to   develop   new   strategic  capabilities   as   well   as   on   performance   on   delivery   and   service   strat-  egy   (relative   to   units   in   cluster   1)   are   more   likely   to   be   in   cluster   2.  These   results   are   compatible   with   the   exclusive   focus   on   exploita-  tion   we   infer   from   the   data   for   cluster   2,   and   with   the   lower   reliance  on   beliefs   and   ICS   prevalent   in   this   cluster,   both   of   which   we   would  expect   to   be   high   to   achieve   high   performance   on   service   and   deliv-  ery   as   implied   by   proposition   P5.  4.3.   Cluster   3:   strategic   responsiveness  Cluster   3   holds   52   units   (24%   of   the   total   sample).   In   general,  control   intensity   is   moderate   within   this   cluster.   In   cluster   3   the  reliance   on   beliefs   control   and   ICS   is   relatively   high   compared   to   the  other   clusters.   Only   units   in   cluster   1   report   higher   scores   on   these  two   levers,   suggesting   that   units   in   cluster   3   also   seek   to   inspire  and   motivate   the   search   for   new   opportunities.   Within   this   clus-  ter,   units   emphasize   DCS   and,   consequently,   strategy   as   a   plan.   The  units   also   emphasize   beliefs,   however,   and   are   thus   concerned   with  strategy   as   a   perspective   as   well,   suggesting   that   units   seek   to   com-  municate   the   firm’s   vision   and   inspire   positive   actions.   Given   the  low   intensity   of   the   reliance   on   boundaries   (both   within   the   cluster  and   relative   to   the   other   clusters),   safeguarding   against   behavioral  hazards   is   not   high   on   the   units’   agendas.   The   label   we   propose  for   this   pattern   is   ‘strategic   responsiveness’.   The   cluster   comprises  units   that   scan   their   environment   for   emergent   opportunities   and  threats,   but   less   intensively   than   units   in   cluster   1   (and   less   relative  to   the   within   cluster   emphasis   on   diagnostic   and   beliefs).   This   sug-  gests   that   cluster   3   units   may   not   really   be   looking   for   new   strategic  projects   (as   the   units   in   cluster   1),   but   rather   for   cues   to   decide  on   how   to   compete   (as   opposed   to   where   to   compete).   The   units  have   communicated   their   vision,   are   concerned   with   achieving   that  vision,   and   seek   improvements   in   how   to   do   so   more   effectively.  In   support   of   this   interpretation,   the   multinomial   regression  results   show   that   units   with   high   interdependencies   are   more   likely  to   be   in   this   cluster   relative   to   the   other   clusters.   Consistent   with  proposition   P2b,   units   in   this   cluster   (relative   to   clusters   2   and  4)   rely   on   the   communication   of   beliefs   and   the   establishment  of   vertical   information   sharing   channels   to   solve   the   coordination  problems   that   accompany   interdependencies.   Furthermore,   units  from   smaller   organisations   (at   par   with   clusters   2   and   4,   but   smaller  than   units   in   cluster   1)   are   more   likely   to   be   in   this   cluster   (propo-  sition   P4).   This   finding   is   consistent   with   the   moderate   rankings  across   all   levers.  Interestingly,   the   industry   analysis   shows   a   strong   representa-  tion   of   units   from   the   wholesale   and   retail   trade   industry   in   this  cluster.   In   our   sample,   approximately   two-thirds   of   the   firms   in  this   industry   are   active   in   fashion   or   fast   moving   consumer   goods.  Such   firms   are   concerned   with   ensuring   that   they   achieve   their  intended   strategy,   but   may   rely   on   ICS   to   pick   up   on   trends   and  hypes   within   the   market   segments   in   which   they   already   operate  to   attune   their   current   strategy   continually   to   evolving   changes   in  customer   preferences   and   on   beliefs   control   to   communicate   their  strategic   vision.   Brand   loyalty   is   quite   important   in   these   industries,  which   is   consistent   with   the   emphasis   units   in   this   cluster   place   on  the   use   of   beliefs   control   to   communicate   core   values.  Cluster   3   ranks   middle   of   the   road   in   terms   of   performance.   As  would   be   expected,   units   in   this   cluster   are   more   likely   to   have  lower   performance   relative   to   cluster   1   on   their   ability   to   search   for  new   strategic   capabilities.   But   its   performance   does   not   differ   sig-  nificantly   from   the   other   clusters   on   the   three   strategic   dimensions  we   consider   in   this   study. \nA.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44   39  4.4.   Cluster   4:   strategic   stability  Cluster   4   holds   41   cases   (19%   of   the   total   sample).   Units   in   clus-  ter   4   score   significantly   lower   on   all   levers   relative   to   cases   in   the  other   clusters,   except   for   boundaries   (units   in   cluster   3   score   simi-  larly   low   on   this   lever).   Therefore,   control   appears   to   be   relatively  loose.   Within   the   cluster,   the   emphasis   is   on   DCS,   suggesting   a  focus   on   strategy   as   a   plan.   Given   the   low   intensity   of   the   reliance  on   belief   systems   and   ICS   (both   relative   to   DCS   within   the   cluster  and   relative   to   units   in   other   clusters),   strategic   change   and   the  desire   to   innovate   appear   to   be   low   on   the   units’   agendas.   Judging  from   the   low   score   on   boundary   controls   (relative   to   units   in   other  clusters),   reputation   is   somewhat   less   important   for   units   in   this  cluster,   although   it   does   get   emphasized   relative   to   the   other   levers  within   the   cluster   itself   (boundary   systems   rank   second   in   empha-  sis).   Overall,   the   pattern   of   control   in   cluster   4   is   consistent   with  ‘strategic   stability’   and   predictable   goal   achievement.   Units   in   this  cluster   seem   comfortable   with   the   strategic   path   they   have   chosen,  know   how   to   travel   that   path,   and   fear   no   imminent   strategic   or  reputation   threats.  The   multinomial   regression   results   indicate   that   units   that   score  low   on   control   values   (at   par   though   with   units   in   cluster   3)   and  measurability   of   outputs   are   more   likely   to   be   in   this   cluster.   Also,  units   are   more   likely   to   be   in   this   cluster   when   they   tend   to   score  relatively   low   on   the   initiating   structure   style   of   leadership   (taking   a  sort   of   midway   position   between   clusters   2   and   3,   but   not   deviating  significantly   from   these   clusters)   and   report   lower   levels   of   uncer-  tainty   than   units   in   cluster   2.   As   these   contingency   variables   are   all  associated   with   the   degree   of   control   formality   (see   propositions  P1,   P2a,   P3b   and   P6),   the   relatively   low   scores   of   the   units   in   clus-  ter   4   on   these   factors   may   explain   the   generally   low   concern   with  formality   and   predictability   we   observe   in   this   cluster.   However,  we   do   not   observe   a   relationship   with   a   considerate   style   of   lead-  ership.   Such   a   style   would   have   been   consistent   with   loose   control  (cf.   proposition   P3b),   but   we   find   that   units   with   strong   considerate  leadership   are   in   fact   less   likely   to   be   in   this   cluster,   relative   to   all  other   clusters.   We   leave   the   exploration   of   this   recalcitrant   finding  to   future   research.  Although   37%   of   the   units   in   the   construction   industry   reside  in   this   cluster,   the   industry   distribution   is   not   significant.   It   is  interesting   to   note,   though,   that   significantly   fewer   units   in   the  financial   services   industry   reside   in   the   stability   cluster,   as   would  be   expected   given   the   need   for   tight   control   in   this   industry.  Table   5   shows   that   performance   for   units   in   this   cluster   is   sim-  ilar   to   those   in   clusters   2   and   3.   As   expected   for   units   that   do   not  emphasize   beliefs   control   or   ICS,   they   lag   units   in   cluster   1   on   their  performance   in   searching   for   new   strategic   capabilities.   They   also  lag   units   in   cluster   1   on   their   performance   on   deliveries   and   service,  but   even   though   their   strategy   is   more   focused   on   differentiation  than   units   in   cluster   1,   they   do   not   outperform   them   on   this   dimen-  sion.  5.   Conclusions   and   discussion  Successful   organizations   must   be   ambidextrous;   that   is,   they  must   be   able   to   manage   short-term   demands   efficiently   while  simultaneously   staying   alert   and   able   to   adapt   to   their   changing  environment   ( March,   1991 ).   Similarly,   Simons   (1995)   asserts   that  organizations   must   design   and   use   their   control   systems   to   man-  age   the   competing   tensions   of   predictable   goal   achievement   on  the   one   hand   and   innovation   on   the   other.   Simons   (1995)   holds  that   organizations   can   accomplish   this   control   objective   through  the   “balancing”   of   multiple   control   levers   in   the   LOC   framework.  While   this   notion   of   control   system   design   is   consistent   with   main-  stream   and   well-acknowledged   organizational   literatures,   the   LOC  framework   does   not   explicate   what   balance   looks   like.  Our   empirical   examination   reveals   a   stable   solution   consisting  of   four   patterns   of   control,   which   we   interpret   from   a   perspective  of   configurational   thinking   as   manifestations   of   balance.   Units   that  employ   tight   control   with   relatively   high   emphasis   on   each   of   the  four   control   levers   (as   compared   to   other   clusters)   cluster   in   a   group  labeled   strategic   vigilance   (cluster   1).   These   units   are   focused   not  only   on   where   they   want   to   go,   but   are   concerned   with   how   they  will   get   there.   Behavioral   hazards   are   a   point   of   emphasis.   These  units   want   to   achieve   the   intended   strategy,   but   do   so   in   the   “right”  way.   The   units   in   cluster   2   are   similar   to   those   in   cluster   4   as   they  are   focused   on   achieving   their   current   strategic   objectives;   how-  ever,   they   are   also   exposed   to   more   risk   as   they   are   highly   focused  on   communicating   those   risks   to   their   employees.   Relative   to   the  other   levers   in   these   units,   safeguarding   of   their   reputation   is   of  utmost   importance   to   these   units.   We   label   these   units   as   strategic  exploitation.   We   label   units   in   group   3   as   strategic   responsiveness.  In   contrast   to   the   units   in   cluster   2,   these   units   are   not   focused  on   safeguarding   against   behavioral   hazards,   but   are   focused   on  ensuring   that   employees   understand   where   they   want   to   go   and  monitoring   their   progress   in   achieving   that   intended   strategy.   The  intensity   of   control   uses   is   not   as   high   as   those   of   the   units   in   clus-  ter   1,   which   indicates   that   the   units   in   cluster   3   may   be   looking  for   opportunities,   changes,   and   trends   within   their   existing   com-  petitive   position;   instead   of   making   a   wholesale   change   of   their  competitive   position.   Finally,   units   in   the   strategic   stability   clus-  ter   (cluster   4)   employ   loose   control   with   relatively   low   emphasis  on   each   of   the   four   control   levers   (as   compared   to   other   clusters).  These   units   are   low   risk   and   stable.   They   are   focused   on   achieving  current   objectives   and   experience   little   environmental   uncertainty.  Because   the   cluster   analysis   technique   is   subject   to   researcher  discretion,   we   took   considerable   care   to   examine   the   robustness  of   our   findings.   Although   our   clusters   are   remarkably   stable   across  different   empirical   specifications,   our   results   are   subject   to   limita-  tions.   We   emphasize   that   we   do   not   claim   that   the   clusters   we   find  add   up   to   a   genuine   typology,   i.e.   an   exhaustive   specification   of   the  various   archetypal   configurations   of   the   four   levers   that   reflect   bal-  ance,   since   our   approach   is   empirical.   Archetypes   or   ideal   types   are  theoretical   constructs   rather   than   empirical   artefacts   that   repre-  sent   phenomena   that   might   exist   rather   than   actually   existing   ones  ( Doty   and   Glick,   1994 ).   Also,   our   examination   is   bounded   by   our  sample,   and   it   is   possible   that   we   miss   out   on   a   configuration,   simply  because   empirical   manifestations   of   that   particular   type   happen   to  be   absent   in   our   cross-   section.   Second,   we   use   data   gathered   from  a   convenience   sample,   which   facilitates   validity   and   helps   to   obtain  variation   in   the   variables   ( Van   der   Stede   et   al.,   2005 ).   Although   we  are   not   aware   of   nor   do   we   expect   response   bias   in   our   sample,   gen-  eralizing   the   results   to   a   broader   population   should   be   undertaken  with   caution.   Third,   the   use   of   a   survey   allows   us   to   gather   percep-  tions   of   unit   managers,   which   is   our   interest   ( Van   der   Stede   et   al.,  2005 ).   We   took   steps   to   minimize   measurement   noise   and,   based   on  diagnostics   of   our   measures,   we   have   no   expectations   that   our   mea-  sures   are   biased.   However,   surveys   undoubtedly   contain   noise   and  the   results   should   be   interpreted   with   this   in   mind.   Our   results   are  also   subject   to   limitations   in   our   measurement   of   the   control   levers.  For   example,   we   examine   the   diagnostic   and   interactive   control  levers   only   with   respect   to   the   performance   measurement   system,  not   to   the   other   components   of   the   management   control   system.  Despite   these   limitations,   this   research   project   and   its   findings  provide   important   new   insights.   First,   we   elaborate   on   the   con-  cept   of   balance.   We   draw   in   related   literatures   on   organizational  theories   ( Gupta   et   al.,   2006;   Raisch   and   Birkinshaw,   2008;   Raisch  et   al.,   2009 )   and   discuss   how   the   concept   of   balance   is   theorized  in   other   domains   (e.g.,   organizational   learning;   March,   1991 )   to  clarify   the   meaning   of   balance   in   the   LOC   framework.   From   our \n40   A.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44  synthesis   of   the   literature   and   empirical   observations   we   are   able  to   provide   a   more   encompassing   definition   of   balance   as   a   com-  bination   of   all   four   control   levers   that   are   internally   consistent,  but   not   necessarily   equally   emphasized,   and   that   align   with   dif-  ferent   strategic   and   contextual   challenges.   This   is   consistent   with  Simons   (1995)   theorizing   and   implies   that   all   levers   are   neces-  sary   to   achieve   balance,   that   balance   does   not   mean   equal   weight,  and   that   balance   can   be   achieved   through   different   combinations  of   emphasis.   We   conclude   that   balance   as   it   is   understood   in   the  LOC   framework   may   occur   in   multiple,   yet   limited,   combinations,  consistent   with   configurational   theory.   These   multiple   combina-  tions   exist   because   organizations   experience   different   contingency  challenges   and   thus   must   emphasize   levers   differently.   When   the  alternative   states   of   balance   are   constructed   to   be   internally   con-  sistent   and   aligned   with   contextual   and   strategic   challenges,   then  the   different   balancing   arrangements   will   be   effective.   Given   the  importance   of   the   LOC   framework   to   the   accounting   literature,   elab-  orating   on   one   of   its   key   concepts   is   an   important   stepping   stone  in   furthering   this   research   stream.  Second,   we   draw   on   configurational   thinking   to   enhance   our  understanding   of   balance   in   a   multivariate   way   ( Doty   and   Glick,  1994;   Meyer   et   al.,   1993 ).   As   Meyer   et   al.   (1993,   1177)   states,   “By  synthesizing   broad   patterns   from   contingency   theory’s   fragmented  concepts   and   grounding   them   in   rich,   multivariate   descriptions,  the   configurational   approach   may   help   consolidate   the   past   gains  of   contingency   theory.”   Including   all   four   levers   of   control   in  our   examination   allows   us   to   provide   insights   on   how   balance   is  achieved   using   a   holistic   approach   to   control.   Moreover,   we   draw  on   the   contingency   framework   to   provide   a   richer   multivariate  description   of   the   control   configurations.   Finally,   our   empirical  analyses   reveal   a   taxonomy   comprised   of   four   different   manage-  ment   control   configurations.   Through   this   taxonomy,   researchers  can   now   make   more   sense   out   of   how   units   use   combinations   of  levers   in   different   ways   to   achieve   a   particular   form   of   balance  ( Meyer   et   al.,   1993 ),   suited   for   their   strategic   objectives   ( Simons,  1995 ).  Our   findings   contribute   to   a   growing   and   important   line   of   lit-  erature   on   the   LOC   framework   (e.g.,   Mundy,   2010;   Tessier   and  Otley,   2012;   Widener,   2007 )   as   well   as   literature   on   combinations   of  control   (e.g.,   Malmi   and   Brown,   2008 ).   Moreover,   our   findings   con-  tribute   to   the   broader   literature   on   organizational   classifications.  Meyer   et   al.   (1993,   1180)   summarize   this   literature   as   follows:  “   .   .   .   from   Weber’s   (1947)   notions   of   charisma,   tradition-  alism,   and   bureaucracy,   through   Burns   and   Stalker’s   (1961)  distinction   between   mechanistic   and   organic   structures,   to  Mintzberg’s   (1979)   distinctions   between   simple   structure,  machine   bureaucracy,   professional   bureaucracy,   divisionalized  form,   and   ‘adhocracy.’   Understanding   all   of   these   classification  schemes,   and   many   others,   is   the   attempt   to   understand   orga-  nizational   diversity   through   typologies   and   taxonomies.”  Our   project   opens   up   various   possibilities   for   future   research.   In  this   study,   we   have   some   information   of   specific   dimensions   of   per-  formance,   but   we   do   not   have   access   to   more   complete   performance  data.   We   have   assumed   that   units   are   making   directionally   appro-  priate   decisions   and   that   the   four   empirically   identified   patterns  of   control   represent   stable,   perhaps   even   ideal,   types   of   balance.  Further   empirical   examination   could   shed   insights   on   this   assump-  tion   and   the   “ideal”   state   of   balance.   Our   examination   includes  the   interactive   and   diagnostic   uses   of   performance   measurement  systems,   belief   systems   as   well   as   a   primary   focus   on   business   con-  duct   boundaries.   Future   research   could   delve   more   deeply   into   the  control   package   by   providing   insights   on   the   diagnostic   and   inter-  active   uses   of   other   control   systems   and/or   the   other   levers,   as   well  as   including   strategic   boundaries.   In   addition,   future   research   that  examines   additional   contextual   factors   could   enhance   the   descrip-  tion   of   the   four   clusters   and   provide   further   empirical   evidence  on   the   appropriateness   of   the   labels.   Finally,   longitudinal   research  could   shed   insights   on   how   units   change   balance   over   time   and  the   determinants   thereof.   For   example,   it   would   be   insightful   to  see   if   units   classified   as   strategic   responsiveness   migrate   over   time  to   strategic   exploitation.   Understanding   the   how   and   why   of   this  migration   would   provide   interesting   and   important   insights.  Acknowledgements  We   are   indebted   to   our   students   in   the   Nyenrode   MSc   in   Con-  trolling   program   for   their   invaluable   help   in   collecting   the   data.  This   paper   has   benefited   from   insightful   comments   and   sugges-  tions   from   two   anonymous   reviewers   and   Theresa   Libby   (the  associate   editor).   We   gratefully   appreciate   helpful   comments   from  David   Bedford,   Chris   Chapman,   Murray   Lindsey,   Jan   Mouritsen,   Julia  Mundy,   David   Otley,   Breda   Sweeney,   and   the   participants   at   the  2014   MAS   research   conference   in   Orlando,   Florida,   and   the   2014  New   Directions   in   Management   Accounting   conference   in   Brussels,  Belgium. \nA.   Kruis   et   al.   /   Management   Accounting   Research   32   (2016)   27–44   41  Appendix   A.  A t   properties.  Second   stage   of   cluster   analysis   K-means   cluster   analysis  using   the   centroids   from  the   initial   Ward’s   cluster  solution   as   seeds.  The   results   show   agreement   on   group   membership   across  both   methods   (Ward’s   and   K-means)   in   85.25%   of   the  cases.   A   solution   is   considered   stable   when   the   agreement  on   group   membership   ranges   from   80%   to   90%   of   the   cases  ( Hair   et   al.,   2010 ,   540).  Robustness   check   on   the   K-means  cluster   analysis  Use   extreme   seeds;   use  cases   that   strongly  emphasize   just   one   of   the  four   levers   as   seeds.  Since   these   cases   are   rare   and   different   from   the   other  observations   in   the   sample,   this   procedure   will   maximize  the   probability   of   arriving   at   a   different   clustering  outcome.   This   procedure,   however,   results   in   agreement   in  group   membership   for   82.95%   of   cases,   in   spite   of   the  different   seeds.   A   comparison   with   the   initial   Ward’s  solution   shows   agreement   of   cluster   membership   for  71.43%   of   cases.   Therefore,   we   conclude   at   this   stage   that  the   cluster   analysis   results   are   remarkably   stable.  Validate   cluster   solution   Split   the   sample   in   two   and  rerun   the   analysis 15   (i.e.,  Ward’s   cluster   analysis   and  the   K-means   alternative).  For   subsample   1   we   again   find   a   cluster   solution   with   four  groups.   These   are   the   same   groups   as   in   the   initial   solution  and   there   is   agreement   on   group   membership   in   92.85%   of  cases.   Random   sample   2   also   returns   the   same   result   as   the  cluster   analysis   with   the   complete   sample:   we   again   find  the   same   four   groups   and   there   is   agreement   on   group  membership   in   no   less   than   98%   of   the   cases.   These   results  could   have   been   quite   different,   considering   that   cluster  analysis   outcomes   are   known   to   be   sensitive   to   individual  observations   ( Hair   et   al.,   2010 ).  Robustness   test   for   firm   effects   Apply   the   Ward’s   method  hierarchical   cluster  analysis   pre-specifying   a  four-group   solution   for   the  184   (85%   of   the   sample;   91  unique   firms)   respondents  who   revealed   their  identity;   perform   a  cross-tabulation   of   firms  and   clusters.  We   find   agreement   on   group   membership   for   the   full  sample   and   the   unique   firm   sample   in   69.3%   of   the   cases.  This   result   qualifies   as   moderately   stable   ( Hair   et   al.,   2010 ,  540).   The   cross-tabs   shows   that   typically,   cases   from   the  same   firm   are   spread   over   different   clusters.   For   only   four  firms   we   find   that   their   cases   end   up   in   only   one   cluster.  For   three   of   these   firms   this   implies   that   both   the   BUs   fall  into   the   same   cluster,   one   firm   has   all   three   cases   in   one  cluster.   These   findings   lead   us   to   conclude   that   the   cluster  analysis   results   are   not   driven   by   firm   effects.  14 In   leave-one-out   cross   validation   k-1   subsamples   are   generated   for   which   a   discriminant   function   is   estimated   leaving   out   one   observation   at   a   time.   Group   membership  for   the   observation   that   has   been   left   out   is   predicted   based   on   this   function.   The   procedure   is   repeated   for   each   observation   at   a   time   and   an   overall   hit   ratio   for   predicted  group   membership   is   calculated   (see   Hair   et   al.   2010 ,   p374).15 This   random   split   results   in   two   subsamples   that   are   approximately   equal   in   size:   subsample   1   ho     const PDF2_TEXT_EMBEDDED = "  Electronic   copy   available   at :   http : / / ssrn.com / abstract = 2784473      Strategy and Control: 25 Years of   Empirical Use of Simons’ Levers of   Control Framework             Patricia Martyn    Department of Accountancy and  Finance , National University of Ireland,   Galway , Ireland    Breda Sween e y    Department of Accountancy and Finance, National   University of Ireland,   Galway, Ireland    Emer Curtis    Department of Accountancy and Finance, National University of Ireland,   Galway, Ireland                         Forthcoming   in   Journal  of  Accounting & Organizational Change         Electronic copy available at: https://ssrn.com/abstract=2784473 \n  Electronic   copy   available   at :   http : / / ssrn.com / abstract = 2784473     2    Strategy and  Control: 25 Years of   Empirical U se of  Simons’ Levers of   Control  Framework       Abstract    Purpose   –   Tremendous change has taken place in organisational structures, networks, and strategy   over the last 25 years. Yet, a strategic management framework developed 25 years ago has   increased in popul arity among researchers in the last decade.   T h i s paper  reviews   ho w  Simons’   L evers  of  C ontrol   (LOC )   framework   has been used  in  empirical  research  studies  over the last  25   years .    Design/methodology/approach   –   The findings are based on e lectronic database searches of  papers   adopting Simons’ framework  pub lished in  accounting and management   journals .    Findings  –   A total of 4 5   empirical studies adopting the   LOC   framework  ar e presented chronologically   by research method .   The review highlights the  far  greater use of the framework in qualitative   compared to quantitative  studies .   Qualitative  studies   have extended the a pplication of the   framework to  broader organisational issues such  as  sustainability ,   environmental accounting ,   and   inter - organisational controls .  The quantitative studies have mainly sought to add to our   understanding of the antecedents and outcomes of the use of interactive control systems.         Originality/value  –   This  paper furthers our understanding of Simons’   framework   by synthesising and   analysing the literature over 25 years .   It   provides insight into  the varying interpretations of the   concepts underlying the framework  in empirical studies  including  differences in operationalisation of   the concepts   in quanti tative studies.  In addition, it highlights the  application   of the framework   beyond the original domain in which it was developed.  Fruitful a reas for future research are pointed   to in the paper .    Key words:   Levers of control, Conceptual framework, Management   Control Systems    Paper type:   Literature   Review         Electronic copy available at: https://ssrn.com/abstract=2784473 \n  3    1.   Introduction       Over  two decades ago,   Robert Simons developed a framework for understanding how management   control systems  (MCS)  manage business strategy. The framework  emerged  from a number of   empirical studies  carried out by Simons  in North America  in the late 1980s/early 1990s  and  thus is   considered to be   a ‘ practice - informed ’ framework .  In addition to Simons’ papers published in   academic journals, Simons also published a  book   ( Simons, 1995 )   which was targeted at a senior   management audie nce.    Google scholar provides some indication of the attention this 1995 book has   attracted with citation data   from   2014  showing  over 2000 cit ations of the book .     It has been used  as a conceptual framework  by  academic  researchers  in both  quantitative  and   q ualitative  studies over the last 2 5   years . At the centre of the framework is business strategy and   while Vaara and Whittington ( 2012 )   point to   differences between strategy in the twenty first century   compared to the twentieth century ,  rather than losing its relevance over time,  i ts popularity  as a   research framework  has  actually   increased in the last decade.  O ur   paper sets out to  firstly  examine   how the framework has been applied in empirical research . Secondly, the paper  considers  whether   the framework can  provide a u seful  lens t o examine MCS  in the context of broader organisational   changes such as flatter organisational structures, inter - firm relationships ,   and   social and   environmental responsibilities.  Lastly, it identifies areas for future research.       The levers of control (LOC ) framework represents a strategic  management   tool  and a theoretical   framework for understanding relationships between strategy and control.  Nixon and Burns  ( 2012 )    provide a concise overview of strategi c management tools categori s ed by decade from the 1960s    and  point to the absence of longevity for many of these tools.  Given the l ongevity  of the LOC   framework  and increased popularity   in a  rapidly changing  business context , this  is a n opportune   time to  ex amine the range  and contribution  of empirical literature  that   has used the framework,  and   to reflect on areas where further research is needed.  Searches of top  academic  journals in   Accounting, General  M anagement and Strategic  M anagement identified 4 5   empir ical studies of   which 3 1   are   qualitative and  1 4   are quantitative.   This divide has been chosen because the qualitative   and quantitative studies contribute to the literature in substantially different ways.  Given their   depth ,   the qualitative field studies have provided insights  into   the nature of the levers, the use of   different  MCS   as levers ,   and the interaction between the levers.  They have also facilitated the study   of packages of control systems. In contrast, the quantita tive studies  have sought to  operationali s e   the constructs   underlying the framework   and have focused almost exclusively on the association   between interactive and diagnostic use of MCS and a range of  antecedents and  organisational   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  4    outcomes.  In recent years,   the  application   of the  framework has been extended to examining inter -  organisational controls, corporate social responsibility and environmental reporting, application of   controls at middle manager level, and  responses to the banking crisis .  Qualitative s tudies in   particular have expanded the application of the framework to these broader organisational issues.   Overall, d ifferences in  operationalisation   of variables in quantitative studies   and   confusion   surrounding the meaning of some of the underlying conc epts have limited the coherence of the   body of research  adopting   this framework.     The study contributes to the literature by providing a synthesis of the empirical research applying   Simons’ framework over the last 25 years. It provides an insight into the  characteristics   of this body   of work including the range of journals  publishing the studies , research methods used ,  and sectors   where the framework has been applied . It also contributes to confirming and deepening our   understanding of the framework itself  and the concepts underlying the framework. In addition, the   study provides insights into the usefulness of the framework as a lens to examine MCS in the context   of broader organisational changes. It identifies areas  where future research can contribute to   greater clarity  around   the meaning of the concepts underlying the framework.     The remainder of th e paper is set out as follows.  The next section provides an overview of the   development of Simons’  f ramework   and explains the concepts underlying the framework .   The   following section   explains our search processes and the methods followed for selecting the empirical   studies   for inclusion in this paper.   Following this, an  analysis of the key features  of the studies   selected is presented and the studies are analys ed into a number of categories such as year of   publication, geographical setting of the study, number of levers examined etc.  Section 5 discusses   th e   contribution of the studies, dividing the studies into qualitative and quantitative research. Gaps   in each   of these streams of literature are identified and areas for future research are  discussed . The   conclusion is preceded by a section considering the criticism s of the framework   and notable   suggestions for theoretical development of the framework.     2.   Simons ’ Levers of Control Framework       Simons  ( 1995 )   maintain s   that four levers of control are needed in an organisation to balance   predictable goal achievement and creative innovation: belief s   systems, boundary systems, and   feedback and measurement systems which can be used in a diagnostic or interactive manner.     Electronic copy available at: https://ssrn.com/abstract=2784473 \n  5    The LOC framework was developed based on four field studies conducted over a period of   approximately 10 years. These studies are summarised in  A ppendix   1. Simons’  ( 1987 )   study was the   precursor to the  LOC   framework  and deal s   with the relationship between strategy and accounting   controls. This study examine s   the differences in  MCS   of firms that pursue differing business   strategies under the  Miles and Snow (1978)   typology . Findings reveal that f irms  following a   prospector strategy attach a greater degree of importance to forecast data, setting tight budgetary   controls and monitoring of actual results. Cost control is de - emphasi s ed ;   reporting is frequent and is   modified when necessary.  In contrast, d ef ender firms use  control systems   less intensively but   emphasi s e bonus remuneration based on achievement of budgetary targets.  This  1987  study point s    to the importance of considering MCS in the context of strategy.     Following th at   study,  Simons  ( 1990 )   focuse s   on two large companies operating in the same industry   but pursuing different strategies. He illustrate s   how  top management use  MCS   differently, based on   their assessment of strategic uncertainties . This led to the   develop ment of   the concepts of   interactive  (ICS)  and diagnostic  (DCS)  controls.    Simons further develop s   these concepts based  on   research in 16 large and publicly held comp etitors of Johnson and Johnson   in  Simons  ( 1991 ) . Th e   1991   study include s   s ubordinates to top management to validat e responses of top management.   Finding s   reveal that decisions made by top management about the way they use control systems   represent s   a signal about their vision for the firm.  In his final empirical paper  developing   the LOC,   Simons  ( 1994 )   expand s   his examination of MCS   to include belief s   and boundary systems. The   findings in Simons’  ( 1994 )   study  a re based on interviews with 10 newly appointed top managers   (presidents/direct reporting to parent company) across a range of sectors with turnover ranging   from $350m to $6,000m. In all cases, the newly app ointed managers use formal  MCS   to advance   their strategic agenda. Simons’ academic work described above form s   the basis for the publication   of his levers of control book in 1995  ( Simons, 1995 ) . This book include s   the following diagrammatic   representation of the framework:    Figure 1:   Simons’ levers of control framework    Insert Figure 1 here       At the centre of his framework is the role of business strategy, which refers to the way in which a   firm competes and positions itself with respect to its competitors. Simons  ( 1995 )   argues that to   implement strategy successfully, top management must understand each of the four key strateg ic   variables: core values, strategic uncertainties, risks to be avoided, and critical performance variables.   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  6    He points out that each of these variables is highly interdependent and thus must be considered   together or an incomplete analysis of the issues wi ll emerge. Core values reflect the traditions and   values of management, which should be aligned with desired strategic direction. Risks to be avoided   are potential temptations and pressures that if acted upon could damage the reputation and success   of the  business. They include strategic and business risks. Critical performance variables define   successful performance. Strategic uncertainties are ‘the things that keep managers awake at night’   which could challenge their vision for the future  ( Simons, 1995 ) . Each of the four control levers has a   distinct purpose and is designed to manage its associated underlying construct. All four of the levers   must be aligned with firm strategy. The combination of the levers enables management to balance   the inevitable te nsion that arises between predictability and growth. A balance between the four   levers of control ‘permits the simultaneous management of strategy as plan, pattern, position, and   perspective’ (1995, p. 10).     Simons  ( 1995 )   defines belief s   systems as   ‘the explicit set of organizational definitions that senior   ma nagers communicate formally and reinforce systematically to provide basic values, purposes, and   direction for the organization’ (p. 34) .   The key underlying strategic variable  is   the core values of the   organi s ation (refer back to figure 1) and Simons  ( 2000 )   suggests that the organi s ation’s core values   often emerge from the perso nal values of the founder and that they provide guidance (though this   guidance is more vague than concrete) for employees making decisions not covered by operating   procedures. Simons further explains the concept of core values in his later work  ( Simons, 2010 )    suggesting that typical statements of core values in organi s ations   include a list of traits such as   integrity, teamwork etc. and that these core values ‘ignore the adjective  core   and obscure the   fundamental value that should be the foundation of every successful business. Core values should   tell people whose interests to   put first when faced with difficult choices’ (p. 43 - 44).   Simons  ( 1995 )    specifies that the   mission and vision statements together with the statement of values formally   articulate  core values   thereby  operating   as the belief s   systems lever .    Wh ile belief s   systems motivate the search for opportunities and create positive and inspirational   forces, boundary systems constrain the search and ensure compliance with orders   (Simons, 1995) .   Simons  ( 1994 )   defines boundary systems  as ‘ formal systems used by top managers to establish   explicit limi ts and rules which must be respected. Boundary systems are stated typically in negative   terms or as minimum standards’   (p. 170) .   The key underlying strategic variable is ‘risks to be   avoided’ and  Simons refers to the use of the following  control  systems as   a boundary lever: codes of   business conduct, strategic planning systems, and asset acquisitions systems. Boundary systems ‘are   designed to communicate risks to be avoided and to remove any ability to rationalize actions that   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  7    could expose the firm to undes irable levels of risk’  ( Simons, 2000 p. 275 ) . Simo ns  ( 2000 )   refer s   to   strategic boundaries as ‘drawing a “box” around the opportunities that individuals are encouraged   to exploit’ (p. 289).     Underlying the diagnostic and interactive levers are feedback and measurement systems. The   distinction between diagnostic and inter active relates to how the information is used rather than the   technical design features of the control system.  Simons (1995)     define s   DCS  as  ‘the formal   information systems that managers use to monitor organizational outcomes and correct deviations   from preset standards of performance’ (p. 59). To operate  DCS   it is necessary to (1) set goals, (2)   align performance measures, (3) design incentive s, (4) review exception reports and (5) follow up   significant exceptions  ( Simons, 20 00 ) . The key strategic variable underlying  DCS   is critical success   factors   (CSF) .     Simons  ( 2000 )   define s   ICS   as ‘the formal information systems that managers use to personally   involve themselves in the decision activities of subordinates’ (p. 216). They provide the information   for communication between superior and subordina tes. The information is used by superiors to   ‘challenge the thinking and action plans of subordinates’ (p. 216). In contrast to diagnostic controls   which entail single loop feedback, interactive control is concerned with double loop learning   ( Simons, 1995 ) . The underlying strategic variable is strategic uncertainties  which Simons  ( 2010 )    refer s   to as the things that keep managers   awake at night and relate to ‘the threats and   contingencies that could invalidate the assumptions underpinning your strategy’ (p. 158). In a   further examination of this concept,  Bisbe et al. (2007)   define strategic uncertainties as relating to   ‘changes in competitive dynamics and internal competencies that must be understood if the   b usiness is to successfully adapt over time ’   (p. 798).     The use of a control system in an interactive manner is created quite simply by the regular and   recurring attention of the highest levels of management. As Simons  ( 2010 )   point s   out ‘everyone   watches what the boss watches’ (p. 158). In face - to - face meetings, senio r managers probe   subordinates to explain any unforeseen changes in their business and offer suggested action plans.   ‘ This pressure cascades from the top of the organi z ation to the bottom. In response, through a series   of interlocking meetings, the new info rmation and learning flows upward, from the bottom of the   organization to the top ’   ( Simons, 2000  p. 218).  Bisbe et al. (2007)   point out that interactive control is   a practice - informed concept and is given meaning by certain theoretical properties found in practice.     Simons  considers  the use of  this framework from the perspective of top  management as this was the   focus of his empirical studies. He define s   top management as  ‘ those responsible for ensuring that   strategies are formulated and implemente d ’   ( Simons, 1990 ) . He expand s   on this by noting that this   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  8    could in some cases be one individual or, an operating committee consisting of heads of businesses   or sectors and chaired by the CEO.  Simons confine s   his examination of control systems to form al   controls and t he companies Simons studied were large . He   suggests that his framework is more   suited to large organisations as informal controls are not explicitly considered in his framework.      3.   Empirical research on Simons’ Framework       This se ction   se t s   out the procedures  followed  in   conduct ing   a comprehensive review of the empirical   research   applying   Simons ’   f ramework.  The following sections set out an analysis of these studies   and a discussion of their combined contribution and opportunities for fut ure research.     3.1    Time period and journals reviewed    A  time period from January 1990 ( when  Simons developed the first of the levers, the interactive   lever) to  December  2014   was chosen   (25 years)   to compile a   database of prior empirical studies   which hav e applied Simons’ LOC framework.    In choosing which journals to include in the literature   search, t he  Association of Business Schools (ABS)   ranking was used and journals at grade  3 and 4  in   A ccounting,  S trategic  M anagement and  G eneral  M anagement  categories   were selected. In addition,   Journal of Management Accounting Research   ( specifically devoted to management accounting   research ) and  Journal of Accounting and Organizational Change   (specifically devoted to change and   strategy which is at the centre of the L OC framework) were included .  Certain of the journals in the   ABS grade 3 and 4 listing were not relevant as they  d o   not publish empirical research (Journal of   Accounting Literature, Academy of Management Review and International Journal of Management   Reviews).  A comprehensive and systematic review of the literature published in these journals  was   carried out ,   following  the methods explained in the  next sub section.    3.2   Review of journals and selection of articles    Electronic databases of  selected  journals  available  in   the   NUI Galway library were used to search for   empirical studies which used the LOC framework.  Where a s elected electronic journal was not   available in the library, the search was conducted  through the homepages of the relevant journal.   The terms ‘Simons’ and ‘levers of control’ were searched for together .    To  ensure   completeness, all   of the searches were pe rformed across the entire text of articles rather than just the title or   abstract .    These searches produce d   24 6   results.  The  resulting papers were reviewed  by two researchers   independently  to determine if they had explicitly used the LOC as the theoretical lens to inform their   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  9    study  and/ or  their  findings contribute d   to illustrating  or extending  aspects of the framework .   This   resulted in the identification of 4 1   papers.   During the course of t he study ,   researchers came across   an occasional study that the searches had omitted but which ought to be included, and thus as a   further check on completene r participative budgeting in the establishing of the beliefs   and boundaries of the organisation ;   however  a gain  this  i s not tested.  Similarly,  Henri  ( 2006b )    equates the use of PMS for monitoring with diagnostic control and the use of PMS for attention   focusing with interactive use but does not test this.  Other studies such as Parker and Kyi  ( 2006 )   refer   to Simons’ framework in the context of broader concepts such as information sharing, but d o   not   test the relationship between the levers and other variables.  A summary of the  process   used to   identify  the   empirical studies  included in  our   analysis  is  summarised   in  F igure 2.     Figure 2:  Search process used to  select   empirical studies on LOC       Insert Figure 2 here       Electronic copy available at: https://ssrn.com/abstract=2784473 \n  10    This process identified 45 empirical papers that are categorised by research method and presented   in Appendix 2 (31 qualitative studies) and Appendix 3 (14 quantitative studies).  These tables   summarise the methods used and source of data, the levers of co ntrol examined, industry, the   control system considered, the major findings, and the extent of use of the LOC framework.         3.3   Operationalisation of levers in quantitative studies    In relation to the quantitative studies, an important aspect of providing an overview of these studies   is to examine how the levers are operationalised in the various studies . Thus as part of our analysis   we   have  constructed   a comprehensive table  (Appendi x   4 )  setting out the measures used in   qua ntitative studies for  each of the  levers of   control .  In order to  develop the table in Appendix 4 ,  a ll   of the quantitative  papers  identified in the above review of empirical studies were reviewed,   together with  their   appendices .   The measures   are listed in chronological order.  Where similar   measures were used in  a number of  studies, these me ons.     Simons’  f ramework has proved a very useful tool in studies responding to Malmi and Brown’s   ( 2008 )    call for the examination of packages of controls  and recent years have seen an increase in the   number of studies  considering a ll four levers as a package of controls   (e.g.  Bruining et al., 2004 ;   Revellino and Mouritsen, 2009 ) .  In these studies, the framework is used as an analytical tool that   provides a language and categories to  classify   the package of systems observed by researchers in  the   field   a nd  to  explain how they are used .  While t hese studies   have  increased   our understanding of the    individual   levers, they have particularly contributed to   our  understanding of the interaction   between   Electronic copy available at: https://ssrn.com/abstract=2784473 \n  15    them. For example, Tuomela  ( 2005 )   illustrate s   that a strategic scorecard can b e used both   diagnostically and interactively and provide s   evidence of the scorecard reinforcing beliefs and   boundaries. Other studies addressing all four levers have attempted to add depth to the framework;   for example, Mundy ’s   ( 2010 )   study led to the identification of 4  factors  (logical progression,   historical tendency, dominance and suppression)  which are found to affect th e firm’s ability to   balance the use of different levers of control.  The importance of internal consistency between levers   is also illustrated by  Granlund and Taipaleenmaki ’s   ( 2005 )   study which shows that  a clash can occur   between financial control systems and a culture of innovativeness, flexibility, empowerment and   freedom .     Chenhall et al .   ( 2010 )   find that a dominant beliefs system can circumvent the need for   boundary controls in the form of codes of conduct. Frow et al.  ( 2010 )   illustrate how a continuous   budget can be used in both a diagnostic and i nteractive manner to achieve both flexibility and   predictable goal achievement.
