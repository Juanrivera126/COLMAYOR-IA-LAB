obre todo a nivel departamental y municipal,   en  correspondencia  con  lo  prescrito  por  el   principio de concurrencia, evitando así la pre-  sencia  de  diagnósticos  contrapuestos  que,   si bien están separados en términos político   administrativos,  forman  parte  de  una  misma    unidad\tgeográfica.  Fuente:Ameller, 2011.  Recuadro 11  Lineamientos de Política para el Ordenamiento Territorial en Bolivia  regulatorias  para  el  uso  y  la  ocupación  del    territorio\tdeterminan\tun\tlatente\tconflicto\tso - cio  ambiental  en  la  región  Amazónica  (Bio-  CAN, 2011). \n89  2.10.2. En Colombia  El cuadro 38 muestra los lineamientos de Política para el Ordenamiento Territorial en Colombia.  Cuadro 38: Lineamientos de Política para el Ordenamiento Territorial en Colombia  Objetivos   Objetivos específicos  Disminuir los procesos de   migración y ocupación insoste- nible hacia áreas de alto valor   ecosistémico y cultural 1. Desestimular los nuevos procesos de colonización y estabilizar   y fortalecer las zonas de colonización consolidadas.  2.\tOrientar\ty\tplanificar\tcon\tcriterios\tambientales,\tlos\tejes\tinfraes - tructurales (internacionales, nacionales e interregionales) proyec- tados y/o en ejecución, para controlar procesos de colonización    e\tinhibir\tsus\timpactos\tnegativos\tsobre\táreas\tde\tsignificancia\t  ecosistémica y cultural.  3.\tSolucionar\tlos\tconflictos\tambientales,\tde\ttenencia\ty\tocupación\t  de territorios de comunidades tradicionales y áreas protegidas.  4. Controlar y minimizar los impactos ambientales negativos del   proceso de establecimiento y  erradicación de cultivos ilícitos, para   limitar la expansión de la colonización hacia áreas de alto valor   ecosistémico y cultural.  Identificar,\tpromover\ty\testable -  cer usos sostenibles del territo- rio y los recursos naturales, en   áreas rurales transformadas 1. Recuperar y fortalecer la sostenibilidad de la producción agrope- cuaria al interior de la frontera agrícola, tanto en zonas de econo- mía campesina como empresarial.  2. Consolidar los espacios e instrumentos de participación, con-  certación\ty\tnegociación,\tpara\tla\tresolución\tde\tconflictos\tde\tuso\ty\t   ocupación del territorio y el establecimiento de sistemas producti- vos rurales sostenibles.  Mitigar y controlar los impactos ocasionados por las actividades   extractivas de recursos naturales no renovables, y promover for- mas sostenibles de aprovechamiento y manejo de los recursos na- turales renovables , acordes con las condiciones de cada región,   garantizando el mantenimiento de la capacidad de resilencia y las   funciones ecosistémicas. Promover procesos de creci- miento y desarrollo sostenible   en el sistema de asentamientos   humanos del país, para mejorar   la calidad de vida de la pobla- ción, disminuyendo los impactos   negativos generados a escala   nacional, regional y local en el   territorio. 1. Disminuir los altos niveles de inequidad en la distribución de    costos\ty\tbeneficios\tambientales\tgenerados\tpor\tlos\tprocesos\tde\t   concentración de riqueza, que producen patrones insostenibles de   asentamientos en el territorio.  2. Limitar y orientar el desarrollo de patrones de asentamientos   insostenibles en áreas de alto riesgo y ecosistemas estratégicos.   3.\tDisminuir\tlos\tconflictos\tambientales\tpor\tusos\tinadecuados\t   tecnológicamente, al interior de zonas urbanas, suburbanas o   rurales de áreas metropolitanas, ciudades en proceso de conur- bación, grandes, medianas y pequeñas ciudades del sistema de   asentamientos, mediante el fortalecimiento de procesos de gestión   ambiental urbana y territorial.  4. Promover cambios hacia una cultura ambiental responsable,   para conducir los asentamientos hacia escenarios sostenibles de   desarrollo.  5. Promover un mayor equilibrio interregional e internacional en    la\tdistribución\tde\tcostos\ty\tbeneficios\tambientales,\tque\timplican\t   concentración de oportunidades y riesgos Promover la recuperación,   mantenimiento y uso sostenible   de la oferta hídrica, como factor   fundamental en la orientación   del proceso de ocupación y uso   del territorio. 1. Reducir y controlar los factores de mayor incidencia en la afec- tación de las características de calidad, cantidad y distribución de   los sistemas hídricos continentales, marinos y atmosféricos. Fuente: Ministerio del Medio Ambiente de Colombia, 1998. Lineamientos para la política nacional de ordenamiento am-   biental\tdel\tterritorio.\tOficina\tAsesora\tde\tOrdenamiento\tAmbiental.\tBogotá,\t68\tp. \n90  2.10.3. En Ecuador  El cuadro 39 muestra los lineamientos de Política para el Ordenamiento Territorial en Ecuador   Lineamientos   Descripción Reducción de inequida- des sociales y satisfac- ción de necesidades   básicas a través de una   estrategia de desarrollo   endógeno y de proce- sos de ordenamiento   territorial que permitan   su ejecución  La\tplanificación\tdel\tdesarrollo\ty\tordenamiento\tterritorial\tdeberá\tdesarrollar\t  procesos\tque\tidentifiquen\tlas\tinequidades\tque\tse\tproducen\ten\tel\tterritorio\t  y,\tcon\tello,\tdefinir\tlas\tacciones\tque\tpermitan\tel\tacceso\tal\tdesarrollo\ten\t  igualdad de condiciones de calidad, cantidad y oportunidad para todos y   todas.   Para\tel\tefecto,\tse\tdeben\tidentificar\ttanto\tlos\tgrupos\ty\tsectores\tsociales\t  como los territorios que requieran ser atendidos de manera prioritaria.   Esto implica un rol proactivo del Estado en la disminución de las desigual- dades y en la eliminación de toda forma de discriminación. Coordinación y gestión   transectorial Existe una tensión importante entre la necesidad de dividir el trabajo por    sector\ty\tsubsectores,\taprovechando\tlos\tconocimientos\ttécnicos\tespecífi - cos y la importancia de referir cada una de las decisiones con la totalidad,   para evitar contradicciones en la acción pública, aprovechar posibles   sinergias y mejorar impactos en términos de reducción de inequidades   sociales y territoriales.  La oferta de intervenciones nacionales se propone desde cada uno de   los sectores de la política pública; sin embargo, las demandas territoriales   exigen una visión integradora e intersectorial, pues en ese escenario se   expresa la complejidad de las relaciones entre los sistemas, subsistemas,   componentes y subcomponentes socio-culturales, económicos, ambienta- les-territoriales y político-administrativos. Articulación interguber- namental  Dada\tla\tconfluencia\tde\tlos\tniveles\tde\tgobierno\tsobre\tel\tterritorio,\tresulta\t  indispensable\tdiseñar\tprocesos\tde\tplanificación\ty\tordenamiento\tterritorial\t   de manera articulada entre el Gobierno central y los gobiernos autónomos   descentralizados, pues es necesario aplicar criterios de complementa- riedad que garanticen la acción concertada de los distintos niveles de   gobierno en el territorio.  Las relaciones entre los distintos niveles de gobierno no son lineales, no   siguen una cadena de mando desde arriba, ni responden a rendiciones   de cuentas desde abajo; por tanto, no existe jerarquía en los procesos de    planificación.\tDe\thaber\tprocesos\tiniciados\ten\totros\tniveles\tde\tgobierno,\t   éstos serán referentes válidos para los demás. Articulación con el Plan   Nacional de Desarrollo La Constitución establece la vinculación entre el Plan Nacional de De-  sarrollo\t\tcon\tla\tplanificación\ty\tordenamiento\tterritorial\tde\tlos\tgobiernos\t  autónomos descentralizados. El artículo 280 es el más explícito al res- pecto; establece que la observancia al Plan Nacional de Desarrollo será   de carácter obligatorio para el Sector Público e indicativo para los demás   sectores. Promoción de la parti- cipación, la rendición   de cuentas y el control   social en los procesos    de\tplanificación\ty\tde\t   ordenamiento territorial,   que reconozca la diver- sidad de identidades. La formulación, ejecución, evaluación y control de las políticas públicas    y\tla\tplanificación\tque\tgaranticen\tlos\tderechos\treconocidos\ten\tla\tConsti - tución deberá contar con la participación de las personas, comunidades,   pueblos y nacionalidades. En este contexto, las ciudadanas y ciudadanos,   de forma individual y/o colectiva, participarán de forma protagónica en la    toma\tde\tdecisiones\ty\tplanificación\tde\tlos\tasuntos\tpúblicos,\ten\tun\tproceso\t   permanente de construcción del poder ciudadano.  La construcción y puesta en funcionamiento del Sistema Nacional Des-  centralizado\tde\tPlanificación\tParticipativa\tsupone\tun\tproceso\tde\tdiálogo,\t  convergencia,\tnegociación\ty\tmanejo\tdel\tconflicto\tentre\tlos\tmúltiples\tacto - res sociales y gubernamentales que se desenvuelven en todos los niveles   territoriales de la política.  Cuadro 39: Lineamientos de Política para el Ordenamiento Territorial en Ecuador  Fuente:SENPLADES,\t2010.Lineamientos\tpara\tla\tPlanificación\tdel\tDesarrollo\ty\tel\tOrdenamiento\tTerritorial.\tEstrategias\t para\tel\tfortalecimiento\tdel\tSistema\tNacional\tDescentralizado\tde\tPlanificación\tParticipativa,Quito,30\tp. \n91  2.10.4. En Perú  En la actualidad en relación  a la dimensión  ambiental  del  ordenamiento  territorial,  se  han   avanzado en diversas acciones como:  -  Formular  la  política,  planes,  estrategias,  li-  neamientos  y  normas  de    carácter  nacional    para\tla\tzonificación\tecológica\ty\teconómica\t  en  coordinación  con  las  entidades  corres-  pondientes. -  Conducir,  promover,  asesorar  y  evaluar  los   procesos\tde\tidentificación\tde\tlas\tpotenciali - dades  del  territorio  a  escala  nacional,  en  el   contexto  del  desarrollo  sostenible,  supervi- sando  que  se  sustenten  en  la  normatividad   y conformidad con los instrumentos técnicos   aprobados para estos procesos. -  Promover  y  capacitar  permanentemente  en   los\taspectos\trelacionados\tcon\tla\tzonificación\t  ecológica  económica  a  los  tres  niveles  de   gobierno. -  Conducir  y  promover  la  articulación  de  los   planes  de  desarrollo  concertados,  gestión   de riesgos, el proceso de descentralización,   regionalización  y  desarrollo  de  fronteras  en   el ordenamiento territorial para la adecuada   gestión integrada de los recursos naturales.  La  política  nacional  del  ambiente  (Minam,  2009), que reconoce la dimensión ambiental del   tema, contiene en su primer eje, que se orienta   a  la  conservación  y  aprovechamiento  sosteni-  ble de los recursos naturales y de la diversidad   biológica,  lineamientos  para  el  ordenamiento   territorial que contemplan:  a) Impulsar  el  Ordenamiento  Territorial  Nacio-  nal\ty\tla\tZonificación\tEcológica\tEconómica,\t  como  soporte  para  la  conservación,  uso  y   aprovechamiento sostenible de los recursos   naturales  y  de  la  diversidad  biológica,  así   como la ocupación ordenada del territorio. b) Incorporar en los procesos de Ordenamiento   Territorial el análisis del riesgo natural y an-  trópico, así como las medidas de adaptación   al cambio climático.  c) Impulsar mecanismos para prevenir el asen-  tamiento  de  poblaciones  y  el  desarrollo  de   actividades  socioeconómicas  en  zonas  con   alto potencial de riesgos ante peligros natu-  rales y antrópicos. d) Impulsar  el  ordenamiento  territorial  como   base  de  los  planes  de  desarrollo  concerta-  dos  y  de  desarrollo  de  fronteras,  en  la  ges-   tión\t de\t cuencas\t hidrográficas\t y\t las\t zonas\t  marino costera.  El cuadro 40 muestra los lineamientos de Polí- tica para el Ordenamiento Territorial en el Perú.  2.11. Instrumentos de Planificación   y  Ordenamiento  Territorial  en  los   países de la Comunidad Andina   El cuadro  41 muestra los instrumentos para  el OT en los países de la Región Andina El  cuadro  42  muestra  las  diferentes  formas  de planes de ordenamiento territorial en los paí-  ses de la Subregión Andina.  2.12. Algunas experiencias de pla-  nificación y ordenamiento territo -  rial en la Amazonía Andina  El cuadro  43 muestra algunas experiencias de    planificación\ty\tOrdenamiento\tTerritorial\tde\tla\t  Amazonía Andina.  2.13. Las perspectivas del Ordena-  miento Territorial 2.13.1.  Perspectiva  desde  la  Gestión  Integrada  de  los  Recursos  Hídricos   (GIRH)  Con  relación  al  Ordenamiento  Territorial  en  la  gestión  integral  del  recurso  hídrico  en  la   cuenca andino-amazónica Bernex (2009) plan- tea  que  gestionar  el  territorio  andino-amazóni- co deberá implicar, entre otros aspectos, optar   por  una  gestión  integrada  del  territorio,  los  re-  cursos hídricos y los recursos naturales ante la   necesidad  de  mejorar  la  información,  integrar   políticas  y  metodologías,  actuar  por  territorios   integrados más allá de las demarcaciones po-  líticas  establecidas  (provincias,  distritos),  Se   debe  optar  por  la  gestión  de  grandes  áreas,   ejes territoriales y cuencas. Establecer, difundir   y compartir un esquema de cohesión, competi-  tividad  y  articulación  territorial  de  acuerdo  con   la  naturaleza  de  cada  territorio,  sus  ecosiste-  mas,  la  calidad  de  los  servicios  que  brindan  y   su capacidad de acogida. Desde la perspectiva de las y los participan- tes  del  Seminario  Internacional  Ordenamiento   Territorial de la Región Andina Amazónica (IIAP   y colaboradores, 2009) se recomienda:  -  Optar por una gestión integrada del territorio y   los recursos hídricos y los recursos naturales.  -  Los recursos hídricos son un elemento clave   e integral del OT, sin embargo, todavía no se   valoran\tlo\tsuficiente.\tEs\tnecesario\tpartir\tde\t  un equilibrio ecosistémico para alcanzar un de- sarrollo equilibrado y sostenible del territorio.  -  Se  debe  mejorar  la  información  e  integrar   políticas y metodologías de actuación en te-  rritorios  integrados,  más  allá  de  las  demar-  caciones  políticas  establecidas  (provincias,   distritos). Se debe establecer grandes áreas,   ejes territoriales y cuencas, y difundir y com- \n92  N°   Objetivo   Lineamientos  1   Promover y facilitar, el aprovecha- miento sostenible de los recursos   naturales renovables, la utilización y   gestión responsable de los recursos   naturales no renovables; así como, la   diversidad biológica, la ocupación or- denada del territorio en concordancia   con sus características, potencialida- des y limitaciones, la conservación   del ambiente y de los ecosistemas, la   preservación del patrimonio natural y   cultural, el bienestar y la salud de la   población 1.1. Promover la conservación, el uso y el aprovecha- miento sostenible de los recursos naturales y de la   diversidad biológica.  1.2. Promover el proceso de ocupación del territorio   con criterios económicos, ambientales, sociales, cultu- rales, políticos y de seguridad física.  1.3. Implementar el OT y la gestión integral de las   cuencas\thidrográficas\ty\tlas\tzonas\tmarino\tcosteras\t  para contribuir al desarrollo sostenible del país.  1.4. Fortalecer las Áreas Naturales Protegidas 2   Impulsar el desarrollo territorial de   manera equilibrada y competitiva con   participación de los agentes públicos,   privados y comunales mediante una    adecuada\tplanificación\tdel\tterritorio  2.1. Consolidar y desarrollar los sistemas urbanos   regionales como instrumentos de la descentralización.  2.2. Impulsar el desarrollo productivo equilibrado de   los territorios y promover su articulación espacial,   social y económica a nivel nacional, regional y local. 3   Prevenir y corregir la localización de   los asentamientos humanos, de la   infraestructura económica y social,   de las actividades productivas, y de   servicios básicos en zonas de ries-  gos\t(identificando\tlas\tcondiciones\tde\t   vulnerabilidad)  3.1.\tIdentificar\ty\tevaluar\tlas\tzonas\tde\talto\triesgo\ta\t   procesos de origen natural y/o antrópico, para agen- ciar e implementar medidas de gestión, correctivas y   prospectivas, así como, estrategias de prevención de   desastres.  3.2. Promover la reubicación de los asentamientos hu- manos y/o de las actividades económicas localizadas   en zonas de alto riesgo no mitigable y la ubicación de   las nuevas inversiones en zonas seguras.  3.3. Promover la incorporación del análisis de riesgo    en\tla\tplanificación\ty\tformulación\tde\tlos\tproyectos\tde\t   inversión.  3.4. Desarrollar una cultura de prevención a través de   la incorporación de objetivos, competencias y conteni- dos, de manera transversal, sobre gestión de riesgos    identificados\ten\tel\tPlan\tde\tOrdenamiento\tTerritorial,\t  en los planes y programas curriculares del sistema   educativo nacional. 4   Contribuir a revertir los procesos de   exclusión y de pobreza, fortaleciendo   y facilitando un desarrollo territorial   sostenible 4.1. Promover el desarrollo de las poblaciones en si- tuación de pobreza optimizando el uso de los recursos   naturales y el territorio.  4.2. Desarrollar en forma competitiva nuevas alternati- vas productivas en zonas de pobreza.  4.3. Promover el desarrollo sostenible de zonas de   fronteras. 5   Revertir los procesos de deterioro   de los ecosistemas y promover los   usos del territorio que conduzcan al   desarrollo sostenible 5.1. Mejorar la gestión del territorio a nivel nacional,   regional y local.  5.2.  Promover la recuperación de los ecosistemas de- teriorados y la protección de áreas frágiles y relictos.  Cuadro 40: Lineamientos de Política para el Ordenamiento Territorial en el Perú  Fuente: MINAM, 2010. Lineamientos de Política para el Ordenamiento Territorial. Resolución Ministerial N° 026-2010-  MINAM del 23 de febrero del 2010. Lima, 36 p. partir  un  esquema  territorial  de  cohesión  y   articulación territorial.  -  Es  preciso  establecer,  difundir  y  compartir   un  esquema  de  competitividad  territorial  de   acuerdo con la naturaleza de cada territorio,   sus ecosistemas, la calidad de los servicios   que brindan y su capacidad de eto\tde\tdefinir\tla\tlocalización\tde\tlas\t   acciones públicas en función de las cualidades y demandas territoriales. Perú   Los Planes de Ordenamiento Territorial (POT)   Los\tPOT\tse\tconstituyen\ten\tinstrumentos\tde\tplanificación\ty\tgestión\tdel\tdesarrollo\tsoste - nible para promover y regular los procesos de organización sostenible del territorio a  El cuadro 42 muestra las diferentes formas de planes de ordenamiento  territorial en los países de la Subregión Andina. \n95  nivel nacional, regional y local; articulados a los planes ambientales, de desarrollo eco- nómico, social y otros; los que deben ser actualizados periódicamente. Estos planes   son compatibles y complementarios entre sí y constituyen componentes fundamenta-  les\tde\tla\tplanificación\tdel\tdesarrollo\tsostenible.\tLos\tPOT\tse\tformulan\ten\tplazos\tsegún\t  las realidades particulares de cada zona y con un horizonte acorde con la legislación   vigente; son dinámicos y se inspiran en el planeamiento estratégico de la circuns- cripción local o regional –según sea el caso-; son fundamentalmente participativos y   se construyen sobre la base de la ZEE y de los otros instrumentos de ordenamiento   territorial vigentes (como el POT de gobiernos regionales y locales, la ZEE, el plan de   acondicionamiento territorial, el plan de desarrollo urbano, el plan de desarrollo rural, el   plan urbano distrital). Fuentes: AGRUCO, 2010; Fuente: SENPLADES, 2010.  Existen\t diferentes\t definiciones\t de\t ordena - miento territorial que han tratado de explicar   los procesos y las políticas implícitas en este   enfoque  relativamente  nuevo  desde  diferen- tes aproximaciones. Una de las más citadas    es\tla\tdefinición\tdada\tpor\tla\tCarta\tEuropea\tde\t  Ordenación del Territorio (1983), la cual dice   que  el  ordenamiento  territorial  es  “la  expre-  sión  espacial  de  las  políticas  económicas,   sociales, culturales y ecológicas de cualquier    sociedad,\tes\ta\tla\tvez,\tuna\tdisciplina\tcientífi - ca,  una  técnica  administrativa  y  una  política   concebida como un enfoque interdisciplinario   y global, cuyo objetivo es un desarrollo equili- brado de las regiones  y la organización física   del espacio según un concepto rector”. Esta    definición\tes\tla\tguía\tprincipal\tde\tlos\tsistemas\t  de ordenamiento territorial europeo (Massiris   C, 1999: 3). Desde la geografía, el ordenamiento terri- torial se ve como un proceso de organización   armónica  del  espacio  humano,  en  el  que  se   consideran  el  aspecto  legal,  el  bienestar  de   la población y el cuidado del medio ambiente   (Gómez 2005: 38). En este enfoque, el mane-  jo de los recursos naturales se concibe como   una dimensión de lo territorial, ya que es con-  siderado  como  el  valor  de  uso  y  de  cambio    para\tla\tproducción\tde\tbienes\ty\tla\tzonificación\t  de los usos del territorio, mientras que el pro-  ceso  de  ordenamiento  territorial  tiene  como    finalidad\tpromover\ty\tregular\tla\tdinámica\tde\tla\t  ocupación, uso y adecuación del territorio, lo   que comprende sus recursos naturales y las   cualidades  del  medio  biogeofísico  (Méndez,   2000: 284). Desde  el  derecho  ambiental,  el  ordena- miento territorial “es la expresión espacial de  las  políticas  económicas,  culturales  y  ecoló- gicas  de  la  sociedad”  que  constituye  el  ins-  trumento\tde\tplanificación\tpor\texcelencia\tpara\t  lograr los objetivos de la sostenibilidad (Sola-  no 2000). En cambio, para el Instituto de In-  vestigación  de  la  Amazonía  Peruana  (IIAP),   en el ordenamiento territorial, “las relaciones   ecológicas,  económicas,  sociales,  culturales   y políticas que son intrínsecas en las formas   de utilización de los recursos y la ocupación   del espacio territorial, son examinadas en de-  talle, y los escenarios actuales y potenciales,   son  generados  y  evaluados  como  parte  del   proceso de toma de decisiones y el desarrollo   de políticas de ocupación territorial y uso de   los recursos” (IIAP, 2001). Desde  otra  aproximación,  para  Boisier,  el  ordenamiento  del  territorio  como  instrumen- to  de  política  debe  considerar  una  división   política-administrativa,  una  asignación  de   funciones  a  cada  unidad  de  esa  división  en    el\tproyecto\tnacional,\tuna\tespecificación\tde\t  prioridades  de  desarrollo  en  el  tiempo,  una   propuesta de asentamientos humanos y una   propuesta  de  gran  diversidad  de  usos  del   suelo (Boisier, 1997). De esta forma, el orde-   namiento\tterritorial\to\tla\tplanificación\tregional\t  es  la  organización  de  la  sociedad  en  el  es-   pacio,\tmientras\tque\tla\tplanificación\tglobal\tes\t  la  organización  de  la  sociedad  en  el  tiempo   (Boisier, 1988). “La visión global del ordenamiento territo- rial  latinoamericano  se  intentó  construir  en   1989, como resultado del interés de la región    por\tdefinir\tuna\tposición\tglobal\tsobre\tel\tpro - blema  del  medio  ambiente  y  el  desarrollo,   para presentarla en la Conferencia de Río en   1992” (Massiris, 1999: 22).  Lectura 2  Ordenamiento territorial  L  E  C  T  U  R  A \n96  El\t documento\t final\t presenta\t al\t ordena - miento  territorial  como  una  estrategia  para   lograr  el  desarrollo  sostenible,  basada  en  la    “distribución\tgeográfica\tde\tla\tpoblación\ty\tsus\t  actividades  de  acuerdo  con  la  integridad  y   potencialidad  de  los  recursos  naturales  que   conforman el entorno físico-biótico, todo ello   en la búsqueda de unas condiciones de vida   mejores” (Massiris, 1999: 22). Desde 1984 se han dado en el Perú diver- sos dispositivos legales que hacen referencia   al  concepto  de  ordenamiento  territorial  sin   definirlo,\t utilizando\t diversos\t términos\t para\t tipificarlo.  Así,  en  el  2005,  en  el  reglamento  de  la  Ley  Marco  del  Sistema  Nacional  de  Gestión    Ambiental\tse\tencuentra\tla\tdefinición\tde\torde - namiento  ambiental  del  territorio,  concepto   consolidado en la Ley General del Ambiente,    que\tlo\tdefine\tcomo\t“un\tinstrumento\tque\tfor - ma parte de la política de Ordenamiento Te-  rritorial. Es un proceso técnico-político orien-  tado\ta\tla\tdefinición\tde\tcriterios\te\tindicadores\t  ambientales que condiciona la asignación de   usos territoriales y la ocupación ordenada del   territorio” (CONAM, 2005: 3). Según  el  marco  legal  y  político  existente  en el Perú, el ordenamiento territorial se de-   fine\tasí: [U]n\tinstrumento\tque\tforma\tparte\tde\tla\tpo - lítica  de  estado  sobre  el  Desarrollo  Sosteni-  ble. Es un proceso político, en la medida que   involucra la toma de decisiones concertadas   de  los  actores  sociales,  económicos,  políti-  cos  y  técnicos,  para  la  ocupación  ordenada    y\tuso\tsostenible\tdel\tterritorio\t[...]\tes\tun\tpro - ceso  técnico  administrativo  porque  orienta   la  regulación  y  promoción  de  la  localización   y  desarrollo  de  los  asentamientos  humanos,   de las actividades económicas, sociales y el    desarrollo\tfísico\tespacial\t[...].\tEl\tPoder\tEjecu - tivo, en coordinación con los niveles descen- tralizados  de  gobierno,  establece  la  política   nacional  en  materia  de  Ordenamiento  Terri-  torial,  la  cual  constituye  referente  obligatorio   de las políticas públicas en todos los niveles   de gobierno (CONAM, 2005: 3-4).  Según\t Méndez,\t “[el]\t planteamiento\t del\t  desarrollo  territorial  y  socialmente  armónico   que subyace en el discurso de la ordenación   del territorio ha sido criticado por sus magros   logros  en  función  de  los  propósitos  original- mente  formulados,  dada  su  escasa  capaci- dad de respuesta para superar las injusticias    que\tsignifica\tla\tmarginación\tde\timportantes\t  sectores de la población asentados en diver-  sos  ámbitos  territoriales,  la  degradación  de   los recursos naturales y la pérdida de la hete- rogeneidad cultural” (Méndez, 2000: 284). Massiris  menciona  que  los  problemas  mundiales concernientes al ordenamiento te-  rritorial son los siguientes:  -\t Conflictos\tde\tuso\tde\tla\ttierra\tpor\tincompa - tibilidad -  Aprovechamiento no sostenible de los re-  cursos naturales -  Ocupación  de  áreas  sujetas  a  amenazas   naturales -  Desarrollo  espacial  de  corredores  viales,   redes de transporte y de comunicaciones -  Expansión urbana desordenada -  Desequilibrios en el acceso a servicios pú-  blicos y sociales en áreas urbanas y rura-  les -  Desequilibrios  territoriales  de  la  distribu- ción  de  actividades  y  oportunidades  de   empleo -  Desequilibrios  de  la  organización  urbano-  regional -  Desequilibrios en el desarrollo urbano y ru-  ral y sus interdependencias -  Elevación  de  la  competitividad  territorial   (Massiris, 1999: 33-34).  Por el lado de las políticas públicas, según  Mazurek, el concepto de territorio, considera- do  únicamente  como  límites  administrativos   o territorios zonales, tiene una serie de con-  secuencias: Por  ejemplo,  la  metodología  de  ordena- miento  territorial  se  aboca  casi  exclusiva-  mente\ta\tla\tzonificación\ty\tse\tencuentra,\tpor\t  su  carácter  muy  técnico,  alejada  de  las  ne-  cesidades  locales  y  sociales.  A  menudo  se   ha  confundido  también  la  herramienta  con   el método: hay una profusión de estudios de    zonificación\tque\tutilizan\tel\tSIG\t[Sistema\tde\t Información\tGeográfica]\tpero\tolvidan\tque\tel\t  ordenamiento  es  ante  todo  una  política  de    planificación\tterritorial\t(Mazurek,\t2006:\t3).  Sobre la base de lo mencionado, si bien el  ordenamiento del territorio es parte importan-  te\tde\tla\tplanificación\tterritorial\tpara\tcompati - bilizar la expansión de la frontera económica   con la conservación ambiental, en el caso de   la  Amazonía,  se  han  elaborado  planes  pero   siempre  con  ausencia  de  la  participación  de   las  poblaciones  afectadas  en  su  diseño  y   aprobación (Díaz Palacios, 1994).  Asimismo, las investigaciones se han cen- trado  principalmente  en  “el  estudio  de  los   recursos  renovables,  descuidando  el  de  los   recursos no renovables, siendo este último el  \n97  que más impacto ha tenido en el medio am-  biente y en el ordenamiento socio-económico   espacial de la población” (Rodríguez, 1994). Si las propuestas de ordenamiento territo- rial  “no  llevan  en  cuenta  todos  los  intereses   conflictivos\tde\tlos\tactores\ty\tsi\tno\tlos\tarmo - niza, o por lo menos los concilia, termina fra-  casando. Esa es la historia del zoneamiento   en la Amazonía” (Dourojeanni ,1998). No es    suficiente\tconciliar\tintereses\tde\tactores\tama - zónicos,  ya  que  la  Amazonía  no  es  una  isla   y todo lo que pasa en ella está condicionado  por  lo  que  ocurre  en  el  resto  de  los  países   amazónicos (Dourojeanni, 1998). El  ordenamiento  territorial  como  instru- mento  de  política  es  importante  para  el  de-  sarrollo territorial de la región Madre de Dios,   por  tener  esta  región  diversas  actividades   económicas que se dan principalmente por el   uso\tde\trecursos\tnaturales,\tvarias\tzonificacio - nes existentes, una dinámica histórica migra-  toria  de  los  grupos  sociales  y  el  impacto  de   grandes proyectos de infraestructura como la   carretera Interoceánica Sur. Fuente: Fernández L., 2010. ver con la dimensión social sino que tiene que   tomar  en  cuenta  otras  dimensiones  como  la   económica  y  política.  El  hecho  es  que  hasta   ahora  la  sociedad  hegemónica  se  ha  resisti-  do a aceptar a la Amazonía y sus poblaciones   indígenas  como  parte  del  proyecto  nacional   o  cuando  lo  ha  hecho  la  perspectiva  ha  sido,   y  es  todavía,  cómo  se  integran  al  proceso  de   globalización  de  la  economía.  No  en  vano  la   Amazonía  sólo  se  ha  visible  cuando  surgen   cíclicamente  periodos  de  boom  económico  en   base a la explotación de sus recursos naturales    o\tcuando\tsurgen\tconflictos\tsocioambientales.  Esta  falta  de  incorporación  real  de  la  Ama- zonía  y  los  pueblos  indígenas  en  el  proyecto   nacional  han  provocado  fracturas  que  sólo  se   traducen\t en\t conflictos\t socioambientales\t sino\t  que  también  tiene  correlato  en  impactos  am-  bientales  o  sociales  que  tratan  de  ser  minimi- zados en nombre del crecimiento económico y   la modernidad. Para entender la relación entre   interculturalidad  y  gestión  territorial  sostenible   hay que profundizar sobre las múltiples formas   de entender la Amazonía. Habría que caer en cuenta que hay múltiples  formas de entender la Amazonía. Una variable   corresponde a la forma cómo se vive, se siente    y\tse\tmanifiesta\tla\tocupación\tfísica\ty\tcultural\tde\t  la  Amazonía.  Así  podemos  reconocer  diferen-  tes\tperspectivas:\ti)\tgeográfica,\tii)\tecológica,\ty\t  iii)  económica  (corredores  económicos).  Estas   diferentes  perspectivas  no  siempre  calzan  en-  tre  sí.  Además  el  tema  se  complejiza  cuando   se reconocen:  -  Los biomas. -  Los  mapas  de  distribución  de  especies  ani-  males y vegetales. -  El dominio vital de especies. -  Los espacios históricos culturales. -  Las redes viales. -  Las rutas de caza por parte de las poblacio- nes indígenas. -  Las rutas de migración.   Además no sólo se trata de cómo las pobla- ciones ocupan los espacios y hacen uso de los   recursos naturales sino también se incorpora la   mirada  externa  atendiendo  a  consideraciones   geopolíticas  orientadas  a  favorecer  la  expan- sión de proyectos de explotación de los recur-  sos naturales renovables y no renovables en el   marco  de  una  economía  globalizada.  No  una   sino muchas miradas e intereses que rebasan   ampliamente\tlas\tfronteras\tgeográficas\tde\tlos\t  países.  Se\tsupone\tque\tlos\tprocesos\tde\tzonificación\t  ecológica y económica (ZEE) y de ordenamien- to  territorial  (OT)  tratan  de  captar  esta  diver-  sidad  de  miradas  e  intereses.  La  pregunta  es   ¿lo logra? Habría que analizar por qué existen   resistencias  internas  para  implementar  decidi- damente los procesos de ZEE y OT. No sólo se   trata  de  una  organización  sectorial  del  Estado   que no logra compatibilizar sus diferentes pla-  nes, programas y proyectos.  Habría  que  analizar  también  en  qué  medi- da  los  instrumentos  de  gestión  tales  como  los   Planes Concertados de Desarrollo o los Presu-  puestos  Participativos  logran  captar  las  diver-  sas formas de ocupación del espacio. Aunque   se reconoce la importancia de organizar la ges-  tión en torno a una visión de cuencas con enfo-  que  sistémico  una  serie  de  factores  limita  una   visión  y  práctica  de  desarrollo  territorial  soste-  nible.  Regionalismos  de  raigambre  histórica  e   intereses económicos inciden fuertemente para   que  se  fragmenten  los  ciclos  ecológicos.  Los   intentos de gestión ambiental ordenada chocan   con intereses internos y externos que se resis-  ten, en nombre de la necesidad o lo codicia, a   mantener la integridad de los ciclos geoquími-  cos,\thídricos\ty\tde\tflujo\tgenético.\t \n98  Nombre de la  experiencia Objetivo general   Objetivos específicos   Ámbito de  acción  Fortalecimiento   a\tla\tplanifica - ción integral   municipal con la   incorporación de   componentes de   conservación de   la biodiversidad,   en el proceso de   construcción del   Plan de Desarrollo   Municipal, en el   Municipio piloto de   San Buenaventura   del Departamento   de La Paz, Bolivia.  Contribuir a la con- servación y el ma- nejo sustentable   de la biodiversidad   de la Amazonía   del norte de La   Paz, mediante   la incorporación   de herramientas   metodológicas y   participativas para   la conservación de   la biodiversidad   en el principal   instrumento de pla-  nificación\testraté - gica municipal, el   Plan de Desarrollo   Municipal. 1. Generar una propuesta metodológica   que permita incorporar componentes de   conservación de la biodiversidad en la   elaboración de los Planes de Desarrollo   Municipal bajo un enfoque ecosistémico e   integral.  2. Elaborar un diagnóstico participativo    integral\tdonde\tse\tidentifiquen\tvalores\tde\t  biodiversidad, potencialidades y oportu- nidades para su conservación, así como   los\tpotenciales\tconflictos\tcon\tlos\tintereses\t  locales\ty\tcon\totros\tinstrumentos\tde\tplanifi - cación superpuestos al territorio municipal.  3. Establecer espacios de concertación   para\tla\tplanificación\testratégica\tmunicipal\t  y\tresolución\tde\tconflictos\tentre\tintereses\t  de conservación y desarrollo, conside- rando además temas transversales como   interculturalidad, gobernanza, complemen- tariedad, entre otros.  4. Formular y validar participativamente el   Plan de Desarrollo Municipal Integral con   incorporación de componentes de con- servación de la biodiversidad, desarrollo   económico local, desarrollo institucional,   así\tcomo\tuna\tnueva\tpropuesta\tde\tzonifica - ción del territorio.  5. Fortalecer las capacidades del Muni- cipio para la implementación del Plan de   Desarrollo Integral Municipal, incluyendo   las herramientas para la gestión de la   biodiversidad.  6. Sistematizar las lecciones aprendidas   y elaborar un documento con propuestas   de lineamientos y recomendaciones para   incorporar\ten\tlos\tinstrumentos\tde\tplanifi - cación la conservación de la biodiversidad   a nivel local y regional en Bolivia y para la   Comunidad Andina. Municipio de   San Buena- ventura Fortalecimiento   de la gobernanza   ambiental en la    planificación\tterri - torial en Napo Contribuir a la   gestión forestal   sostenible de   la provincia del   Napo mediante   la generación de   información base   para la toma de   decisiones, la   concertación con   actores locales y el   fortalecimiento de   criterios ambien- tales en el plan   de Ordenamiento   Territorial (OT) del   Gobierno Provin- cial. 1. Mejorar la base de información y cono-  cimiento\tcientífico\tnecesario\tpara\tarticular\t   criterios ambientales en los procesos de   ordenamiento territorial en la provincia de   Napo.  2. Mejorar el acceso y disponibilidad de   información clave para tomadores de   decisión locales y usuarios de los recursos   naturales en la provincia (MAE provincial,   GAD, sociedad civil).  3. Fortalecer la gobernanza ambiental   en la provincia de Napo promoviendo la   Mesa Forestal como espacio para alcanzar   acuerdos de manejo y conservación de la   biodiversidad con énfasis en los recursos   forestales.   4. Fortalecer el proceso de ordenamiento   territorial en la provincia de Napo a través   de una propuesta piloto para incluir crite- Provincia de   Napo en la   Amazonia   ecuatoriana  Cuadro 43: Planificación y Ordenamiento Territorial de la Amazonía Andina.   Programa BioCAN \n99  rios ambientales dentro de las herramien- tas de manejo territorial existentes. Fortalecimiento   del ordenamiento   territorial en la   Amazonía peruana  Fortalecer las ca- pacidades en orde-  namiento territorial   de los gobiernos   regionales y loca- les de la Amazo-  nía peruana, que   permita la toma   de decisiones   concertadas en la   planificación\tde\tla\t  conservación y el   uso sostenible de   la biodiversidad. Mejorar el conocimiento del marco   normativo en ordenamiento territorial de   los actores sociales involucrados en la   conservación y gestión de la biodiversidad   amazónica.  Promover la aplicación de instrumentos de   ordenamiento territorial en áreas piloto de   la Amazonía como una herramienta central   para implementar acciones orientadas a    la\tplanificación\tde\tla\tconservación\tde\tla\t   biodiversidad y los recursos naturales de la   Amazonía peruana.  Producir y presentar una sistematización   del proyecto que aporte lecciones aprendi- das al contexto regional. Gobiernos   regionales   amazónicos   (Loreto,   Amazonas,   Ucayali, San   Martín y Ma-  dre de Dios) Fuente: CONDESAN, 2012; IIAP, 2012; Ministerio de Medio Ambiente y Agua, 2012. En medio de todo este complejo proceso se  insiste en una propuesta asimilacionista de los   pueblos  indígenas.  La  propuesta  de  moderni- zación  por  medio  del  mercado  es  altamente    seductora\ty\ttermina\tinfluyendo\ten\tdiversidad\t  intensidad sobre los procesos de aculturación.   De esta manera se pretende cambiar la diver-   sidad\tpor\tla\tsimplificación\tde\tlos\tecosistemas.\t La\tsimplificación\tsocial\ttambién\tes\tplanteada\t como\tuna\tmanera\tde\tfavorecer\tel\tlibro\tflujo\tde\t  los mercados. La diversidad lingüística también   corresponde  a  la  diversidad  cultural  que  se    manifiesta\ten\tmúltiples\tcosmovisiones\ty\tcos - mosentires. Los monocultivos y las sociedades   culturalmente homogéneas aparecen entonces   como  grandes  aspiraciones  para  favorecer  la   expansión  de  los  mercados,  el  incremento  de   consumidores más allá de la condición de ciu-  dadanos. Para  avanzar  en  genuinos  procesos  de  desarrollo  territorial  sostenible  es  imperativo   reconocer  que  somos  varias  culturas  y  que   ello  constituye  un  valioso  activo  que  hay  que   saber  gestionar.  La  diversidad  cultural  encie- rra  una  gran  energía  cultural  que  aporta  en  la   construcción  de  sociedades  sustentables.  El   fortalecimiento  de  las  identidades  y  el  orgullo   étnico constituyen condición fundamental para   la  gestión  territorial  sostenible.  De  ahí  el  gran   reto  no  sólo  de  construir  políticas  intercultura- les  sino  incorporar  el  enfoque  intercultural  en   la\tvida\tcotidiana\tde\tla\tnación.\tSignifica\trecrear\t  los imaginarios y las representaciones sociales   para reconocer que la Amazonía y los pueblos   indígenas  forman  parte  importante  de  nuestro   legado cultural y de proyecto país. El gran reto   de los tiempos es cómo avanzar hacia una go-  bernabilidad democrática. Desde la perspectiva de las y los participan- tes  del  Seminario  Internacional  Ordenamiento   Territorial de la Región Andina Amazónica (IIAP  y colaboradores, 2009) se recomienda:  -  La integración de todos los actores públicos   y  privados  es  importante  para  desarrollar   una visión compartida del OT. Sus procesos,   además,  no  se  pueden  realizar  sin  la  parti-  cipación  de  las  comunidades  indígenas  y   locales. Los conocimientos tradicionales son    de\talta\timportancia,\tpor\tejemplo\ten\tla\tclasifi - cación de territorios.  -  Es importante reconocer y respetar la noción   de  interculturalidad,  ya  que  está  ligada  a  la   diversidad  de  la  región  y  es  la  base  esen-  cial\tpara\tla\tgestión\ty\tla\tplanificación\tde\tlas\t  políticas. En algunos países, como Bolivia y   Colombia, ya se ha recogido los derechos te-  rritoriales de los indígenas, en otros todavía   se  carece  de  un  concepto  integral  de  pue-  blos indígenas, como en el Perú y Ecua¬dor.   Para este reconocimiento es importante ana-  lizar  la  cosmovisión  de  los  pueblos  indíge- nas, distinta de la visión occidental. Es nece-  sario compatibilizar las políticas públicas con   el respeto de estas diversas visiones.   2.13.3. Otras perspectivas Perspectiva  geopolítica:  Megaproyectos  y   Ordenamiento Territorial   Desde la perspectiva de las y los participantes   del  Seminario  Internacional  Ordenamiento  Te-  rritorial de la Región Andina Amazónica (IIAP y   colaboradores, 2009) se reconoce que:  -\t La\tfalta\tde\tplanificación\tterritorial\ten\tlos\tme - gaproyectos  causa  graves  impactos  (por   ejemplo,  las  actividades  mineras),  destruc-  ción  y  deforestación,  problemas  sociales  y   de seguridad ciudadana, salud y salubridad,    y\tconflictos\tcon\tlas\tcomunidades\tnativas.  -  Es  preciso  generar  mecanismos  legales  de   coordinación  intersectorial  y  fortalecer  las  \n100  instituciones  responsables  de  armonizar  e   instrumentar los megaproyectos con el orde-  namiento sectorial.   Perspectiva de conservación de la biodiver-  sidad  Desde la perspectiva de las y los participan- tes  del  Seminario  Internacional  Ordenamiento   Territorial de la Región Andina Amazónica (IIAP   y colaboradores, 2009) se encuentra que en to-  dos los países de la región existe la necesidad    de\tidentificación\ty\tlegalización\tde\tÁreas\tPriori - tarias para la Conservación de la Biodiversidad;   sin embargo, es preciso desarrollar normas de   escala  nacional  y  regional  que  consideren  su   gran  potencial  como  nodos  articuladores  del   desarrollo.  Se  menciona  que  la  región  cuenta  con  una   heterogeneidad\tgeográfica\ty\tecológica,\tla\tcual\t  ha llevado a que aún no exista consenso sobre   clasificaciones\tde\tbosques,\tvegetación,\tetc.\tEn\t  este sentido, el OT se podría constituir en la he-  rramienta para mejorar el conocimiento de este   ámbito y contribuir a su uso racional.  En  relación  con  temas  como  corredores  biológicos,  territorios  indígenas,  monitoreo  de   la  deforestación  y  evaluación  ambiental  estra-   tégica\tse\tha\tidentificado\tque\texisten\tdiversos\t  grados de interés en los países de la CAN. Por   ejemplo,  para  Ecuador  y  el  Perú  —y,  en  cier-  ta  medida,  Colombia—  el  corredor  biológico   transfronterizo  es  muy  importante.  En  cambio   el  tema  de  evaluación  ambiental  estratégica   solo es percibido con mayor interés en Bolivia   y  Colombia.  Sin  embargo,  el  monitoreo  de  la   deforestación es considerado importante en los   cuatro países de la CAN.  Por tanto se recomienda: -  Proponer  una  estrategia  sobre  corredores   biológicos  asociados  a  los  corredores  cul-  turales sobre la base de las poblaciones in-  dígenas  y,  en  especial,  de  aquellas  que  se   encuentran en condición de aislamiento vo-  luntario.    -  Contribuir con el diseño y la puesta en mar-  cha de un sistema de monitoreo de la defo-  restación y los incendios forestales.  -  Desarrollar e incluir metodologías para la in-  corporación de la biodiversidad y estrategias   de adaptación al cambio climático en la ZEE   y el POT.   Una  ordenación  sostenible  del  territorio  su- pone la integración de las perspectivas ecológi- ca, social, económica e institucional, basada en   el reconocimiento de la gran interdependencia   existente  entre  ellas  (Pikitch  et  al,  2004).  Este   enfoque ecosistémico en la gestión supone una   total  interrelación  entre  el  bienestar  humano  y   ecológico,  de  tal  manera  que  la  sostenibilidad  solamente es posible si se da en los dos ámbi-  tos  simultáneamente.  Este  planteamiento  per-  mite  a  los  gestores  obtener  una  amplia  visión   sobre las múltiples consecuencias derivadas de   decisiones concretas (Christensen et al, 1996).   En  relación  a  esta  idea,  se  está  desarrollando   un nuevo interés dentro de las estrategias y po-  líticas para la conservación de la biodiversidad   que hace referencia a la necesidad de mante-  ner una provisión sostenible de los servicios de   los ecosistemas (UNESCO, 2010).  2.14. Conclusiones sobre el estado   de  implementación  de  los  proce-  sos de ZEE/OT y propuestas  Las y los participantes del Seminario Internacio- nal  Ordenamiento  Territorial  de  la  Región  An-  dina  Amazónica  (IIAP  y  colaboradores,  2009)   alcanzaron las siguientes propuestas.  En relación con las políticas de Estado y las   normas  en  los  países  de  la  región  andino-  amazónica  -  Un aspecto fundamental es que en todos los   países\tde\tla\tregión\texisten\tavances\tsignifica -  tivos\tpero\taún\tinsuficientes\ten\tla\tgeneración\t  de políticas para el uso y la ocupación del te-  rritorio. Con excepción de Brasil, en el resto   de países el tema es aún tratado de manera   sectorial.  En  consecuencia,  se  requiere  no   solo  de  la  generación  de  un  marco  de  polí-  ticas claro y coherente en cada país, sino y   sobre todo el desarrollo de un marco de polí-  ticas comunes para la región que plantee de   manera conjunta, con visión integral y since-  ridad,  los  lineamientos  estratégicos  para  el   desarrollo  del  territorio  en  relación  con  sus   potencialidades y limitaciones.  -  Es  necesario  evaluar  el  desempeño  de  las   políticas  públicas  de  los  estados,  mirando   no solo la política como tal sino también los   avances, fundamentalmente en términos de   efectividad  de  los  procesos  que  se  han  de-  sarrollado y los que se vienen desarrollando,   para entender mejor la manera en que el OT   puede  ser  también  una  oportunidad  para  la   integración  y  la  atención  de  problemas  co-  munes.  -  En  términos  generales,  en  ninguno  de  los   países de la CAN existen leyes que normen   el proceso de OT y permitan articular las po-  líticas sectoriales con las políticas territoria-  les.  Solo  se  registra  dispositivos  legales  de   diversas  categorías  que  regulan  y  norman   los procesos de OT en los organismos terri-  toriales, tales como regiones, departamentos   o municipios, según la organización político-  administrativa de cada país.  -  Para armonizar e instrumentar los procesos   de OT con una visión integral se requiere la  \n101  creación  de  mecanismos  legales  de  coordi- nación intersectorial. De esta manera, el te-  rritorio  se  verá  como  el  espacio  en  el  cual   interactúan armónicamente diferentes prota-  gonistas a través de diversas actividades. -  Una gran oportunidad para la región la cons-  tituyen  las  instituciones  regionales  amazó-  nicas  como  el  IIAP  en  el  Perú,  el  Sinchi  en   Colombia y Ecorae y Ecociencia en Ecuador.   Estas  instituciones  proveen  herramientas   técnicas que se pueden aplicar en la región   amazónica también para el manejo del siste-  ma de monitoreo ambiental.  -  Se requiere de la organización de un Siste-  ma  de  Información  Regional  Especializado   que permita establecer, organizar y analizar   la información para el OT con el objetivo de   poner  esta  información  al  servicio  de  todos   los interesados de manera adecuada, con la   calidad adecuada y en forma oportuna.  -  Un  aspecto  fundamental  y  prioritario  en  los   países andino-amazónicos son los procesos    de\tplanificación\te\tinversión\tpública.\tEn\teste\t  sentido,  el  OT  va  a  contribuir  a  orientarlos  de manera adecuada y en concordancia con   las potencialidades y las limitaciones del am-  biente.  Para  ello,  además  de  la  necesidad   de realizar un proceso técnico apropiado, se   necesita  la  construcción  de  información  y,   fundamentalmente,  voluntad  política  (IIAP,   BioCAN, GTZ/PDRS, 2009).  2.15.  Lecciones  aprendidas  en  los   procesos  de  ordenamiento  territo-  rial  en  los  países  de  la  Subregión   Andina  Por su parte Societas Consultora de Análisis  Social  (2012)  y  Silvano  (2009)  comparten  las   siguientes lecciones aprendidas:  -  La importancia de contar con un buen marco   conceptual del OT para guiar el proceso. -  La  importancia  de  la  participación  activa  de   todos  los  actores  involucrados  incluyendo   los pueblos indígenas. -  La importancia de realizar buenos programas   de difusión, sensibilización y capacitación de   todos los actores sociales para favorecer la   Colombia  y  Bolivia  son  los  países  que  más   han  avanzado  en  la  formulación  de  planes   de  OT.  En  cambio  el  Perú  avanzó  en  los   procesos de ZEE como paso previo a la for-  mulación de planes de OT. Ecuador también   lo hizo, pero con menor inten-sidad. En este    contexto\texiste\tun\tadelanto\tteórico\tsignifica - tivo,  con  metodologías  y  técnicas  validadas;   sin embargo, se puede constatar que esta ha   sido sobre todo una respuesta política del go-  bierno de turno para cumplir con requisitos o   normas legales. Por ejemplo, Colombia tiene   normas para que se realicen los planes de OT   con plazos de tiempo precisos para miles de   municipios, pero ha sido técnicamente impo-  sible que se hiciesen planes con participación   efectiva de la población, sino solo como copia   de otros ya existentes para cumplir los requi- sitos de la norma y aprobar la supervisión de   la  Contraloría.  Por  eso  se  están  mejorando   sus instrumentos.  Se  puede  constatar  que  en  los  procesos  de  formulación  de  los  planes  de  OT,  inclu-  yendo\tel\tcomponente\tde\tzonificación\tterrito -  rial,\texisten\tciertas\tdebilidades\ty\tdificultades.\t  Entre ellas: la inclusión de temas claves para   el uso y la conservación de la biodiversidad,   gestión del riesgo y estrategias para la adap- tación al cambio climático, aspectos sociocul-  turales\treflejados\ten\tla\tpoca\to\tla\tescasa\tpar - ticipación  de  los  actores  sociales,  y  falta  de   precisión de los instrumentos operativos para   implementar, monitorear y evaluar los planes   de OT, entre otros aspectos.  Asimismo,  factores  como  la  ausencia  de  un marco legal e institucional adecuado y de   una visión de largo plazo; el incipiente desa-  rrollo  de  capacidades  regionales  y  locales;   y  la  carencia  de  mecanismos  para  articular   iniciativas locales de la sociedad civil con los    procesos\tde\tcarácter\toficial\than\tprovocado\t  que muchos procesos ocurran al margen de   la formalidad, aunque no por ello dejan de ser   experiencias valiosas, por lo que hay que ge-  nerar los mecanismos que permitan recoger- las y formalizarlas.  Fuente: Rodríguez, 2009.  Lectura 3  Aspectos técnicos en la formulación de los   planes de Ordenamiento Territorial   Por: Fernando Rodríguez Achung   L  E  C  T  U  R  A \n102  participación. -  La importancia que exista claridad entre las   competencias,  funciones  y  atribuciones  de   los  diferentes  niveles  de  gobierno  respecto   al OT.  -  La  importancia  de  realizar  procesos  de  diá-  logo intercultural para negociar las diferentes   escalas de intereses. -  La importancia de contar con buenas fuentes   de información.  2.16.  Recomendaciones  para  for- talecer  los  procesos  de  OT  en  la   Subregión Andina  Sociedad Consultora de Análisis Social (2012)   alcanza las siguientes recomendaciones:  -  Redimensionar los alcances de los procesos   de  ordenamiento  territorial.  Aunque  obvia   pero  urgente,  una  primera  recomendación    consiste\ten\tcomprender\ty\tdefinir\tla\tnaturale - za, los alcances y los límites de los procesos   de ordenamiento territorial.  -  Evaluar  los  riesgos  de  creación  de  autono- mías  territoriales.  Una  de  las  mayores  ten-  siones que existe entre, de un lado, políticas   y  programas  de  los  gobiernos  centrales  y,   de otro, demandas de movimientos sociales   –sean  indígenas  o  no—,  es  la  tendencia  a   crear  unidades  territoriales  con  derechos  y   legislaciones especiales  -  Promover el desarrollo regional. Otra de las   tensiones  mayores  que  se  produce  en  el   marco  del  desarrollo  de  industrias  extracti-  vas es la oposición entre poblaciones rurales   y  urbanas  dada  la  tendencia  de  las  últimas    a\tcapturar\tlos\tbeneficios\ty\tlas\tprimeras\tlos\t  impactos negativos. En esta línea, los planes   de ordenamiento territorial deberían de con-  tribuir  a  cerrar  estas  brechas  y  promover  la   migración rural-urbana existente en mejores   condiciones; por ejemplo, creación de planes   urbanos  con  dotación  de  servicios  básicos   adecuados. Finalmente, los planes de orde-  namiento deben de procurar el fortalecimien- to  de  economías  regionales    a  través  de  la    promoción\tde\teconomías\tmás\tdiversificadas\t  que, sobre la base de las rentas generadas   por  las  industrias  extractivas,  provean  de   bienes y servicios a dichas industrias  Rodríguez (2009) considera que para avan- zar en el Ordenamiento Territorial en la Región   Andina se requiere:  -  Realizar una efectiva descentralización.  -  Tener un marco legal e institucional adecua- do para facilitar los procesos de OT.  -  Mejorar  los  instrumentos  técnicos,  como  la   ZEE  y  los  planes  de  OT,  en  lo  cual  ya  se  tiene varios años de experiencia y lecciones   aprendidas,  incorporando  temas  estratégi-  cos  como  biodiversidad,  aspectos  sociocul- turales y manejo de cuencas.  -  Implementar mecanismos para participación   y consulta con las poblaciones indígenas y el   resto de la sociedad civil.  -  Articular  los  diferentes  instrumentos  de  pla-  nificación\t(en\tel\tPerú\texisten\tmuchos\tpla - nes: de desarrollo concertado, de desarrollo   económico, etc.). -  Incluir la gestión del riesgo y el cambio climá-  tico.  -  Promover  mecanismos  de  integración  fron-  teriza e intercambio de experiencias  IIAP y colaboradores (2009) alcanzan las si- guientes recomendaciones:  -  En la mayoría de los países andino-amazó- nicos las instituciones públicas aún no están   suficiente\t preparadas\t para\t la\t planificación\t  territorial. Se precisa el fortalecimiento insti-  tucional y la capacitación y la formación en la   transferencia de los principios de OT.  -  Fortalecer  a  las  instituciones  claves  en  el   proceso de OT de la región andino-amazóni- ca: direcciones de OT de los ministerios del    Ambiente\to\tPlanificación,\tinstituciones\tde\tin - vestigación y/o de desarrollo amazónico.  -  Se debe aplicar las herramientas disponibles   que facilitan la incorporación de datos sobre   la diversidad almacenados fuera de la región   como GBIF, ABBIF e IABIN.  -  Después  de  la  realización  de  una  variedad   de estudios hay que enfocarse en el desarro-  llo\tde\tmetodologías\tespecíficas\ty\tproyectos\t  experimentales de OT como trabajo interins- titucional. Asimismo, en el apoyo a ejecuto- res descentralizados.  -  Incluir en todos los procesos los conocimien- tos tradicionales y la gran diversidad cultural   existente en la región.  -  Constituir un Fórum Permanente en OT para   la integración de los procesos de ZEE y OT   en la región andino-amazónica.  -  Priorizar,  mediante  una  agenda  común,  te-  mas\tcomo\tla\tmicrozonificación,\tlos\tservicios\t  ambientales,  el  mecanismo  REDD,  el  pla-  neamiento y la gestión de cuencas, los me-  gaproyectos como IIRSA y los proyectos de   estructuración de cadenas productivas.  -  Incentivar el desarrollo de capacidades loca-  les  en  gestión  territorial,  generar  proyectos   social-productivos con adaptación y estable- cer sistemas de monitoreo climático y alerta   temprana ante eventos extremos articulados   a la gestión territorial.  \n103  -  Mejorar  instrumentos  técnicos  como  la  zo-  nificación\ty\tlos\tplanes\tde\tOT,\tincorporando\t  temas  estratégicos  como  biodiversidad,  as-  pectos  socioculturales,  cambio  climático  y  gestión del riesgo, y manejo de cuencas.  -  Implementar mecanismos para participación   y  consulta  con  poblaciones  indígenas  y  el   resto de la sociedad civil.  Pauta 1: Integralidad con eficiencia,   eficacia y efectividad  Cada actividad humana tiene un vínculo con   el  territorio  en  que  se  desarrolla,  al  mismo   tiempo  que  las  actuaciones  humanas  de  los    diferentes\t sectores\t influyen\t en\t el\t territorio\t  y  sus  recursos.  El  ordenamiento  territorial   ayuda  a  reducir  los  efectos  negativos  de  la   intervención humana y así aprovechar mejor   las oportunidades para el desarrollo. El Plan   de Ordenamiento Territorial (POT) es el ins-  trumento  de  priorización  y  toma  de  decisio-  nes\tpara\tdefinir\tel\tuso\tde\tla\ttierra\tcomo\tbase\t  para  el  desarrollo  sostenible.  Los  procesos   de ordenamiento territorial deben adoptar un   enfoque  integral  y  considerar  los  diferentes   intereses,  actividades,  necesidades  y  acto-   res;\tsuperar\tla\tparcialidad\tde\tla\tplanificación\t sectorial\tque\ttantas\tveces\tprovoca\tineficien - cia, contradicciones y vacíos. La integralidad   se obtiene completamente cuando el éxito es    amplio\ten\ttérminos\tde:\teficiencia\t(las\tactivi - dades  se  realizan  con  una  calidad  satisfac-   toria);\teficacia\t(se\tlogran\tlos\tobjetivos\testa - blecidos); y efectividad (la consecución de los   objetivos con la sostenibilidad y el impacto se   observa en la calidad de las actividades).  Pauta  2.  Gestión  ambiental  y  del  riesgo como tema transversal  Para  asegurar  la  sostenibilidad  del  ordena- miento  territorial  se  requiere  considerar  de   manera transversal la gestión del ambiente y   la gestión del riesgo de desastre relacionado   con  fenómenos  naturales  y  socionaturales.   La  integración  de  las  actividades  socioeco- nómicas con los aspectos físicos y biológicos    del\tterritorio\tsignifica\tconsiderar\tno\tsolo\tlas\t  potencialidades  y  las  limitaciones  evidentes   y directas sino también aquellas que se ma-   nifiestan\ten\tun\tplazo\tmayor\to\tde\tforma\tindi - recta.  La  gestión  ambiental  y  la  gestión  del   riesgo ofrecen una gran variedad de medidas    para\tprevenir\tlos\tconflictos:\tsu\tintegración\ten\t la\tplanificación\tpermite\tla\tidentificación\tde\tlos\t  límites  indispensables  para  las  actividades  humanas. También ayudan a encontrar solu-  ciones  para  conciliar  la  acción  humana  con   las  demandas  físicas;  por  ejemplo,  estabili- zación de taludes, sistemas de drenaje para   nuevas  carreteras,  construcciones  sismorre-  sistentes o adaptación de puentes a posibles   niveles  de  inundación.  La  gestión  ambiental   también  permite  aprovechar  mejor  aquellas   potencialidades cuyo valor no es tan evidente   a  primera  vista:  biodiversidad,  servicios  am-  bientales, ecoturismo y salud mental.  Pauta  3.  Consideración  de  las  ten-  dencias futuras  La  sostenibilidad  del  ordenamiento  y  el  de-  sarrollo  territorial  requiere  que  se  conside- ren, más allá de las condiciones actuales, los    escenarios\tposibles\tque\tinfluencien\tsobre\tel\t  uso  del  territorio.  Entre  los  más  importantes   se encuentran:  -\t La\tglobalización\tque\tinfluye,\tpor\tejemplo,\t  en la rentabilidad de la producción agraria   o agroindustrial  -\t Los\t procesos\t demográficos,\t migratorios\t  y  socioculturales  que  pueden  llevar,  por   ejemplo a una mayor o una menor deman- da de viviendas o tierras.  -\t El\tcambio\tclimático\tque\tinfluirá,\tante\ttodo,\t  en las precipitaciones futuras; en el aumen- to  del  riesgo  por  inundaciones,  sequías,   huracanes  y  el  aumento  de  la  temperatu-  ra  con  consecuencias  para  la  producción   agrícola y pesquera. -  Los  macroproyectos  regionales  que  po-  drían  afectar  el  desarrollo  territorial  local;   como  los  proyectos  mineros  y  de  hidro- carburos  en  cuencas  andino-amazónicas,   túneles, represas y vías, entre otros.  Pauta 4: Negociación de intereses y   gestión de los conflictos  La multitud de aspectos, actores e intereses   relacionados  con  el  uso  del  territorio  implica    que\texistan\tdiferencias\ty\thasta\tconflictos\tde\t  intereses.  El  ordenamiento  territorial  hace   Lectura 3  Diez pautas para fortalecer los procesos   de Ordenamiento Territorial  L  E  C  T  U  R  A \n104  transparentes\tlos\tconflictos\texistentes\ty\tfu - turos;  promueve  la  búsqueda  de  soluciones   tanto\tcomo\tla\tdefinición\tde\tprioridades\ten\tel\t  marco de la visión establecida. Con un enfo-  que emprendedor y mecanismos de negocia- ción de intereses establecidos se logra mayor   calidad  y  efectividad  del  ordenamiento  terri-  torial. Implica integrar a todos los participan-  tes\ten\tla\tgestión\tde\tlos\tconflictos\ty,\ten\tcaso\t  exista la necesidad de un dictamen, llamar a   un tercero neutral o a un evaluador como me-   diador.\tAlgunas\tlíneas\ttípicas\tde\tconflicto:  Pauta 5. Enfoque participativo  La  participación  es  necesaria  durante  todo   el  proceso  de  ordenamiento  territorial  y,  por   ende,  debe  ser  permanente  durante  la  fase    de\tplanificación\te\timplementación\tque\timpli - ca  monitoreo  y  control.  Se  requiere  de  una   participación  informada,  es  decir,  los  repre-  sentantes deben conocer los procedimientos   y  los  conceptos  básicos,  como  ordenamien- to  territorial,  gestión  ambiental  y  del  riesgo,   adaptación  al  cambio  climático,  etc.  para    contribuir\tde\tmanera\tefectiva\ty\teficaz\ten\tel\t  proceso. Se recomienda involucrar a los siguientes  actores:  los  tomadores  de  decisiones;  los   representantes  de  la  población;  los  repre-  sentantes  de  la  empresa  privada;  los  repre-  sentantes de las diferentes instituciones sec-  toriales; los miembros del sector académico:   universidades, centros de investigación, etc.  Pauta 6. Proceso en vez de producto  Una\tvez\tiniciada\tla\tplanificación\tterritorial,\tel\t  ordenamiento  territorial  se  vuelve  una  tarea   permanente,  un  proceso  que  abarca  la  pla-   nificación\t(preparación,\tdiagnóstico,\telabora - ción  y  aprobación  del  plan  de  ordenamiento   territorial),  la  implementación  con  monitoreo   y  control  y  la  revisión  periódica  o  extraordi- naria  del  plan.  El  proceso  de  ordenamiento   territorial  es  dinámico  y  se  produce  de  ma-  nera  simultánea  pero  con  diferentes  intensi- dades en función de los avances de la etapa    de\tzonificación.\tEl\tPOT\tes\tun\tproducto,\tpero\t  un producto dinámico y ajustable en el marco   de un proceso mucho más amplio que es el   ordenamiento territorial.  Pauta  7:  Institucionalidad  perma- nente y eficaz  La  gestión  del  proceso  de  ordenamiento  te-  rritorial requiere de una institucionalidad per-   manente\ty\teficaz.\tLa\tresponsabilidad\tde\tla\t  entidad encargada, llamémosla «unidad OT»,    abarca\tgestionar\tel\tproceso\tde\tplanificación\t  y la implementación, incluyendo la aplicación   de  mecanismos  de  participación,  manejo  de   conflictos\ty\tdifusión.\tTiene\ttambién\tla\trespon - sabilidad  de  la  comunicación  con  entidades   superiores y el monitoreo y control. La tarea   es  a  la  vez  estratégica,  técnica  y  estrecha-  mente vinculada con las decisiones políticas.   Considerando  además  las  consecuencias   que  tiene  el  ordenamiento  territorial  sobre   los diferentes aspectos del desarrollo, se re-  comienda  establecer  una  unidad  de  ordena- miento  territorial  como  entidad  integrada  de   la administración territorial.  Pauta 8. Estrategia de comunicación  permanente  Más  allá  de  la  participación  activa  de  repre-  sentantes de los diferentes sectores de la so-  ciedad  en  el  ordenamiento  territorial,  es  ne-  cesario  informar  a  todos  quienes  de  alguna   manera se ven afectados por las decisiones y   las medidas tomadas. El ordenamiento terri-  torial tiene consecuencias para la población,   la  empresa  privada  y  los  sectores  públicos.   Para  facilitar  la  aceptación  de  medidas  con-  cretas, regulaciones e inversiones por la so-  ciedad, esta necesita información transparen-  te\ty\toportuna\tsobre\tel\tproceso.\tCon\teste\tfin\t  se recomienda establecer una comunicación   permanente con la sociedad. La estrategia de   comunicación puede prever la difusión de la   información  por  varios  medios,  teniendo  en   cuenta  los  diferentes  públicos,  necesidades   e intereses; y, asegurar que los documentos   públicos  (POT,  mapas,  términos  de  referen-  cia para licitaciones, etc.) sean realmente ac-  cesibles para las personas interesadas.  Pauta 9. Articulación entre niveles  En América Latina se fomenta un sistema de   ordenamiento  territorial  descentralizado  con   planes  y  mecanismos  nacionales,  regiona- les  y  locales.  Para  evitar  contradicciones  y   permitir  una  mayor  sinergia,  el  ordenamien- to  territorial  necesita  de  una  buena  articula- ción  entre  los  diferentes  niveles,  sobre:  las   políticas  y  las  estrategias  de  ordenamiento   y  desarrollo  territorial  adoptadas;  los  pro-  cedimientos  y  los  métodos  aplicados;  y,  los    resultados\tde\tla\tplanificación\tterritorial\ty,\ten\t  consecuencia,  de  los  planes  de  desarrollo,   inversión, etc. Además, en muchas zonas es   necesario adoptar un enfoque continuo o de   cuenca  para  considerar  todas  las  potenciali- dades  y  las  limitaciones  que  caracterizan  al   territorio y su entorno.  Pauta 10: Integración en la planifica - ción del desarrollo sostenible  El ordenamiento territorial forma parte integral   de las políticas y las estrategias de desarro-  llo.\tEl\tdesarrollo\tterritorial\tinfluye\tfuertemente\t \n105  en el desarrollo económico, social, ambiental,   cultural y al revés. El POT, por un lado, guía   las  estrategias  de  desarrollo,  de  inversión  y   sectoriales y, por el otro, depende de que los   planes  de  desarrollo,  sectoriales  y  de  inver-  sión retomen sus orientaciones y provean el   financiamiento\tde\tmedidas\tconcretas.\tPor\tlo\t  tanto,  se  debe  tender  hacia  la  integración   de los procesos de planificación territorial y   del desarrollo desde los primeros pasos de   la planificación y basarse en un solo diag- nóstico. Fuente: PDRS-GTZ, GTZ- Brasil,  2010. Gestionar el territorio con sostenibilidad. Pautas para aprovechar mejor las   potencialidades de nuestro territorio y reducir nuestra vulnerabilidad. \n106  Índice de cuadros  Cuadro 31:  Enfoques desarrollados por país -o por gobierno subnacional- para    \t   construcción\tde\tsus\tmarcos\tde\tzonificación Cuadro\t32:\tDefiniciones\ty\tobjetivos\tdel\tOT\ten\tlos\tpaíses\tde\tla\tsubregión\tandina\t  Cuadro\t33:\tDefiniciones\tconceptuales\tdel\tordenamiento\tterritorial\ten\tla\tregión\t\t    andino-amazónica Cuadro 34:  Mandato constitucional sobre ZEE/OT en los países de la región     andina Cuadro 35:  Marco normativo básico sobre ZEE/OT en los países de la región     andina Cuadro 36:  Marco institucional del OT en los países de la región andina Cuadro 37:  Funciones de las dependencias estatales de los países de la Subre    gión Andina encargadas del ordenamiento territorial Cuadro 38:  Lineamientos de Política para el Ordenamiento Territorial en Colombia  Cuadro 39:  Lineamientos de Política para el Ordenamiento Territorial en Ecuador  Cuadro 40:  Lineamientos de Política para el Ordenamiento Territorial en el Perú Cuadro 41:  Instrumentos para el OT Cuadro 42:  Planes de Ordenamiento territorial en los países de la subregión     andina  Cuadro\t43:\tPlanificación\ty\tOrdenamiento\tTerritorial\tde\tla\tAmazonía\tAndina.\t\t\t    Programa BioCAN  Índice de recuadros  Recuadro 11: Lineamientos de Política para el Ordenamiento Territorial en        Bolivia  Índice de figuras  Fig. 33: Estado de las políticas públicas sobre ZEE y OT en los países de la       Región Andina 77  32  81  83  83  85  86  89  90  92  93  94  98  88  83 \n107  Módulo 4: La gestión territorial con enfoque de   adaptación al cambio climático y la gestión del riesgo 1. Introducción  La gestión territorial implica una mirada amplia   que  incluye  no  solo  las  interacciones  de  las   dimensiones  biofísicas  con  las  dimensiones   culturales  sino  que  además  debe  considerar   una mirada cronológica que recoge las leccio- nes del pasado y se proyecta considerando las    tendencias\ty\tescenarios\tfuturos.\tLa\tfigura\t34\t  muestra  un  modelo  de  gestión  sostenible.  La    figura\t35\tmuestra\tlos\tsistemas\tvinculados\tal\tde - sarrollo integral y al ordenamiento territorial. El ordenamiento territorial más que una téc- nica es un proceso político que apunta a gene- rar  un  estilo  de  vida  con  visión  de  sostenibili- dad.  La  política  de  ordenamiento  territorial  da   cuenta el paradigma de desarrollo bajo el cual   se organizan las políticas públicas en un país o    región.\tLa\tfigura\t36\tda\tcuenta\tdel\tsentido\tdel\t  Desarrollo Territorial Sostenible. Por tales razones se encuentra que los pro- cesos de ordenamiento territorial, adaptación al   cambio climático y la gestión del riesgo se en-  cuentran altamente interrelacionados y no pue-  den dejar de considerarse en un esquema serio    de\tdesarrollo\tsostenible.\tLa\tfigura\t37\tmuestra\t el\t paso\t de\t una\t planificación\t desarticulada\t a\t una\tplanificación\tintegrada.  Fig. 34: Modelo de gestión territorial sostenible  Fuente: Asociación Amazónicos por la Amazonía – AMPA  2011. \n108  Fig.35: Sistemas vinculados al desarrollo integral y al ordenamiento territorial  Elaboración: SENPLADES, 2011.  2. Gestión de riesgos y   adaptación al cambio climático   en  la agricultura de la Región   Andina  En  el  contexto  del  aumento  en  la  variabilidad   climática y el cambio climático, hay un recono-  cimiento\tcreciente\tde\tlos\tbeneficios\tprovenien - tes de la estrecha vinculación entre los esfuer-  zos de la Gestión del Riesgo de Desastres y de   la Adaptación al Cambio Climático a diferentes   escalas. En junio de 2007,  la Convención Mar-  co de las Naciones Unidas sobre el Cambio Cli-  mático (UNFCCC) en el contexto del Programa   de  Trabajo  de  Nairobi  (NWP)  sobre  impactos,   vulnerabilidad  y  adaptación  al  cambio  climáti-  co reconoció este vínculo crucial. Recomendó,    entre\totros,\tidentificar\ty\tpromover\tmecanismos\t  y procesos institucionales para lograr una me-  jor  coordinación  en  las  acciones  relacionadas   con la gestión del riesgo y el impacto climático,   incluyendo  aquellas  relacionadas  con  eventos   extremos. El cuadro 44 muestra lineamientos propues- tos, indicando el área o sector involucrado y las   estrategias de acción para países de la Subre-  gión Andina  3. Avances en la interacción   GdR y Adaptación al Cambio   Climático   3.1. En Perú   -  Propuesta  actualizada  de  la  Estrategia  Na-  cional  de  Cambio  Climático,  presentada  en   cuatro  talleres  macro  regionales  (Iquitos,   Chiclayo, Tacna y Lima) para recabar infor-  mación que insuma y la mejore. -  Actualización  de  la  Guía    formulación  de   ERCC. -  Aprobación de la segunda fase del Proyecto   de Adapación al Cambio Climático-PACC. -  Implementación del proyecto “Fortalecimien- to de la capacidad de los países, particular- mente vulnerables a los impactos del cambio   climático, en la construcción de la resiliencia   de los ecosistemas a través de la promoción   de  las  opciones  de  la  metodología  Adapta-  ción Basada en Ecosistemas (EBA). -  Actualización  del  Atlas  Climático  para  la   Cuenca  del  Mantaro  y  la  Cuenca  del  Uru-  bamba (Proyecto PRAA). \n109  -  Lanzamiento  del  proyecto  del  “Impacto  So-  cial del cambio Climático” como piloto en la   región Piura.  -  Inicio  del  proyecto  Manejo  Sostenible  de  la   Tierra en Apurímac. -  Trabajo  articulado  con  el  CENEPRED  para   integrar  la  Gestión  del  Riesgo  de  Desastre   con la Adaptación al Cambio Climático.  La experiencia de la GIRH y Medidas de   adaptación en cuencas seleccionadas  Se implementan proyectos y actividades para  contribuir al desarrollo sostenible de las regio- nes que hacen parte de las cuencas hidrográ-  ficas\tde\tlos\tríos\tSanta,\tMayo,\tPiura\ty\tMantaro,\t  por  medio  del  fortalecimiento  de  la  capacidad   adaptativa  en  la  gestión  del  cambio  climático   (CC) por parte de las entidades gubernamenta- les con jurisdicción en estas regiones. Se  promueve  la  generación  de  nuevas  ca- pacidades en la formulación, conducción e im-  plementación de proyectos de desarrollo regio- nal  con  el  enfoque  de  adaptación  al  CC  bajo   la modalidad del Sistema Nacional de Inversión  Pública (SNIP). Se procura empoderar a la so-  ciedad  civil  respecto  al  CC,  a  través  de  la  im-  plementación  de  campañas  de  difusión  y  sen-  sibilización. Se promueve la implementación de   proyectos y medidas con miras a la adaptación   al  CC  a  través  de  una  gestión  compartida  por   los  diferentes  actores  y/o  líderes  de  las  cuen-  cas  seleccionadas.  Se  apoya  en  la  implemen- tación de medidas de adaptación tanto estruc-  turales  como  no  estructurales,  tales  como:   mejoramiento  de  la  infraestructura  económica   (canales de riego, sistemas de riego por goteo   y/o aspersión, entre otros); mejoramiento de la   infraestructura social (campañas de sensibiliza- ción respecto al uso del agua). Fuente:  Ministerio  del  Ambiente,  2013.  Di- rección  general  de  Cambio  Climático,  Deserti-  ficación\ty\tRecursos\tHídricos  Plan de Gestión de Riesgos y Adapta- ción al Cambio Climático en el Sector  Agrario en Perú  El  cuadro    45  muestra  los  objetivos  estra- tégicos  y  lineamientos  de  política  del  Plan  de   Gestión  de  Riesgos  y  Adaptación  al  Cambio   Fig. 36: El sentido del Desarrollo Territorial Sostenible  Fuente: Amazónicos por la Amazonía, 2011. \n110  Fig. 37: De la planificación desarticulada a la gestión   territorial para el desarrollo regional con ACC y GdR  Fuente: GIZ-PDRS, 2011. Climático en el Sector Agrario en el Perú, para   el  Período 2012-2021 - PLANGRACC-A.  3.2. En Bolivia  El cuadro 46 muestra las Políticas en Bolivia re-  lacionadas a la GdR y la Adaptación al Cambio   Climático ligadas a la seguridad alimentaria.  3.3. En Ecuador Ministerio del Ambiente  MAE- Subse-  cretaria de Cambio Climático   El  MAE  tiene  como  misión  “Ejercer  de  forma   eficaz\ty\teficiente\tla\trectoría\tde\tla\tgestión\tam - biental,  garantizando  una  relación  armónica   entre  los  ejes  económicos,  social,  y  ambiental   que asegure el manejo sostenible de los recur-  sos naturales estratégicos”.  No se ha trabajado   de  forma  directa  en  GdR,  por  no  ser  parte  de   sus competencias directas; sin embargo una de   las áreas de relación con la GdR es el Cambio   Climático, por lo que se han realizado acerca-  mientos  y  trabajos  conjuntos  entre  la  SNGR  y   la Subsecretaria de Cambio Climático. La Sub-  secretaría  de  Cambio  Climático  tiene  como   competencia  liderar  acciones  de  mitigación  y   adaptación  del  país  para  hacer  frente  al  cam-  bio  climático;  para  ello  se  realiza  el  monitoreo  de  la  migración  de  zonas  agrícolas,  migración   de  enfermedades,  anomalías  climáticas  más   frecuentes, etc.; tomando en cuenta la sensibi- lidad de los diferentes sectores a la adaptación   y resilencia. El MAE y SENPLADES han gene- rado información 1: 25.000 en relación a ame-   nazas\ty\triesgos\tcon\tla\tfinalidad\tde\tcontar\tcon\t  planes de desarrollo y ordenamiento territorial.   En la actualidad se ejecutan los siguientes pro-  yectos:  -  Estudio  de  vulnerabilidad  de  la  cuenca  del   Pastaza.  -  Proyecto  de  Gestión  de  la  adaptación  para   disminuir la vulnerabilidad social, económica   y ambiental en el Ecuador - GACC  -  Proyecto  de  Adaptación  al  Cambio  -  PACC   a través de la gobernabilidad del agua en el   Ecuador.  -  Proyecto  Regional  Andino  de  Adaptación   al  Cambio  Climático  –  PRAA  enfocado  a  la   adaptación al impacto del retroceso acelera- do de los glaciares en los Andes-PRAA.  -  Proyecto Fortalecimiento de la resiliencia de   las comunidades a los efectos adversos del   cambio  climático  con  énfasis  en  seguridad   alimentaria – FORECCSA, en la cuenca del   río Jubones.  \n111  Estrategia de acción   Área o sector  involucrado Lineamiento  Fomento de la gober- nabilidad y la prioriza- ción política de la GdR   y la ACC en el sector   agropecuario Legislaciones y   normativas 1. Ajustar las políticas y normatividad para la adecuada   articulación de la GdR y la ACC en SA Instituciones y   sectores  2.\tFortalecimiento\tInstitucional\t(financiero,\ttécnico,\t   tecnológico y de recursos humanos). Coordinación intra   e inter sectorial 3. Promover la integración interinstitucional e intersec- torial de los actores de la GdR, la ACC y el SA. Monitoreo de   estrategias 4. Generar un mecanismo o sistemas de seguimiento y   evaluación para cada una de las estrategias de país y   de la subregión Forta
