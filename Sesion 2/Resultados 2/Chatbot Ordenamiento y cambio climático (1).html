te,\ten\tel\tárea\tde\tla\tagricultura\t  y el aprovechamiento del agua en la agricultura   en el plano regional, nacional y local. Con  ello  se  otorga  un  aporte  para  cuidar  a  los grupos rurales pobres de la población en los   países de Bolivia, Perú, Ecuador y Colombia de   los efectos negativos del cambio climático.  Para  lograr  una  adaptación  exitosa  a  las  considerables  variaciones  climáticas  que  ya   está  ocurriendo  y  un  posible  cambio  climático   a  largo  plazo,  es  necesario  tener  soluciones    locales\tespecíficas:\tun\tinstrumentario\tde\ttrans -  formación\tflexible\ty\tun\tmejoramiento\tde\tlas\tca - pacidades de planeamiento y administración en   los planes locales, nacionales y regionales.  Mediadores  y  multiplicadores  del  Programa  AACC son agentes de toma de decisiones y es-  pecialistas  y/o  directivos  con  áreas  de  trabajo   en agricultura, desarrollo rural, medio ambiente  y gestión de recursos naturales como en la ad-  ministración comunal y regional.  Los  grupos  meta  son  predominantemente  los grupos pobres de la población de la región   andina que vive directa o indirectamente de la   agricultura y cuya base de sobrevivencia se ve   en considerable peligro por los efectos negati- vos del cambio climático. Otro grupo meta son   los  colaboradores  de  organizaciones  que  se   encargan  de  adaptar  el  sector  agrario  al  cam-  bio climático.  El programa promueve la participación acti- va de los grupos meta, pretende mejorar la co-  operación entre los diferentes actores locales y   llegar a procesos de concertación mejoradas a   nivel local, nacional y regional.  El Programa AACC tiene cuatro componentes:  -  Adaptación de la agricultura al cambio cli- mático.   -\t Adaptación\tde\tla\tplanificación\tdel\tuso\tde\tre - cursos  hídricos  para  la  agricultura  frente  al   cambio climático.  -  Acceso  a  datos  climáticos  e  informaciones,   generación y utilización de datos meteoroló- gicos, prevención y gestión de riesgos.  -\t Fortalecimiento\tde\tcompetencias\tde\tplanifi - cación y acción de los actores.  Esperamos que este manual como los otros  manuales producidos en el marco del Programa   AACC sea útil para capacitaciones a todos los   niveles en los Andes y que sirva como fuen¬te   de  información  temática  para  los  mediadores,   multiplicadores y grupos meta.  Hartmut Gast   Director Programa AACC  GIZ GmbH   Feldafing, Alemania  Prefacio \n12  Introducción  Me  es  muy  grato  presentarles  el  Manual  “In-  corporación  de  la  GdR  y  medidas  de  ACC  en    los\tprocesos\tde\tplanificación\tterritorial\ta\tnivel\t  de  ZEE”  elaborado  en  el  marco  del  Programa   “Adaptación de la agricultura y del aprovecha- miento de aguas de la agricultura al cambio cli-  mático en los Andes “– Programa AACC 2010-  2013. El manual tiene como objetivo establecer las  interrelaciones  entre  cambio  climático/adapta- ción,  gestión  de  riesgo  de  desastres  y  la  zo-  nificación\t ecológica\t económica/ordenamiento\t territorial\tcon\tla\tfinalidad\tde\tbrindar\tenfoques,\t  conceptos  y  herramientas  metodológicas  que   permitan a las y los profesionales del desarrollo   elementos que faciliten un abordaje integral de   estos tres grandes campos del conocimiento y   la intervención social. Como estrategia metodológica de aprendiza- je empieza con el módulo de conceptos básicos   relacionados  a  la  gestión  de  riesgo  de  desas-   tres\tcon\tla\tfinalidad\tde\tsensibilizar\tal\tparticipan - te en una interpretación crítica de la ZEE/OT y   del cambio climático.   El\tsegundo\tmódulo\trefiere\ta\tlos\tconceptos\t  básicos sobre el cambio climático y la adapta- ción. De esta manera los conceptos aprendidos   en el primer módulo tienen la posibilidad de ser   plenamente  tangibles  cuando  se  estudian  los   enfoques y las medidas de adaptación. El tercer módulo está referido a la ZEE y OT.  Se pasa revista de los principales conceptos y   principios, se hace una revisión de la normativi- dad y el marco institucional en los 4 países de   la Comunidad Andina.   El\tcuarto\ty\túltimo\tmódulo\trefiere\ta\tlos\tvín - culos  entre  la  Gestión  del  Riesgo  de  Desas- tres, la ZEE/OT y el Cambio Climático. De esta   manera se logra hacer visible las interacciones   estrechas que existen entre estos tres campos   lo  que  permite  al  participante  una  mirada  más   integral.  Se  incluyen  herramientas  para  incor-  porar  la  gestión  del  riesgo  y  la  adaptación  al    cambio\tclimático\ta\tla\tplanificación\tterritorial.  Nos queda claro que la forma cómo estamos  entendiendo,  abordando  e  implementando  es-  tos  tres  procesos  fundamentales  (Gestión  del   Riesgo, Cambio Climático y ZEE/Ordenamien- to  Territorial)  altamente  interrelacionados  dan   cuenta de la forma cómo nos hemos organizado   como sociedad, cuáles son los paradigmas pre-  dominantes  que  moldean  nuestra  concepción   de  desarrollo  sostenible.  Por  ello  el  mensaje   central que se plantea es lograr una visión inte-  gral que nos permita hacer convergencia entre   un enfoque biofísico con enfoques que abordan   las  dimensiones  sociales,  institucionales,  polí-  ticos,  legales  y  culturales  lo  que  es  lo  mismo,   recoger los diferentes aspectos que conforman   el desarrollo sostenible. Existen  diferentes  herramientas  y  métodos  que permiten incorporar la gestión del riesgo en    los\tprocesos\tde\tplanificación\tterritorial\ty\tges - tión  del  desarrollo.  Destacan  las  experiencias   de inversión pública que buscan transversalizar   la gestión del riesgo en los procesos de plani-  ficación\tterritorial\ty\tgestión\tdel\tdesarrollo.\tEs\t  importante  generar  condiciones  que  favorez-  can  los  procesos  de  creatividad  e  innovación.   Por ello es muy importante el fortalecimiento de   capacidades de profesionales que asuman los   nuevos  retos  derivados  de  nuestra  época.  Es   propósito de este manual es contribuir en esta    dirección\testimulando\tla\treflexión\tcrítica\ty\tde - sarrollando el carácter propositivo. Rodrigo Arce \n13  Módulo 1: Gestión del riesgo 1. La Gestión del Riesgo  1.1. Definición de Gestión del Ries -  go (GdR)  La Gestión del Riesgo de Desastres es un pro-   ceso\tsocial\tcuyo\tfin\túltimo\tes\tla\tprevención,\tla\t  reducción y el control permanente de los facto-  res  de  riesgo  de  desastre  en  la  sociedad,  así   como la adecuada preparación y respuesta ante   situaciones de desastre, considerando las polí-  ticas nacionales con especial énfasis en aque- llas  relativas  a  materia  económica,  ambiental,   de  seguridad,  de  defensa  nacional  y  territorial   de manera sostenible (Ley N° 29664 que crea   el Sistema Nacional de Gestión de Riesgos de   Desastres- SINAGERD-Perú). La Gestión del Riesgo (GdR) está orientada  reducir  el  riesgo  de  desastre  o  minimizar  sus   efectos. Implica intervenciones en los procesos   de\tplanificación\tpara\tel\tdesarrollo\ty\tla\timple - mentación de estrategias orientadas reducir las   causas que generan condiciones de vulnerabi- lidad en las unidades sociales y sus medios de  vida (EGR, 2008). La Gestión del Riesgo es un   conjunto de procesos que buscan generar sos-  tenibilidad y se presenta como una opción para   prevenir, mitigar y reducir el riesgo existente en   la sociedad (CTAR-Piura, GTZ 1998). El  Cuadro  1  muestra,  una  propuesta  de  es- quema sobre el concepto de gestión del riesgo.  La\tgestión\tdel\triesgo,\tes\tel\tproceso\tplanifica - do,  concertado,  participativo  e  integral  que  se   orienta a la prevención y reducción de riesgos y   al desarrollo de la capacidad de respuesta fren-  te a desastres. Una característica de la gestión   del riesgo es el reconocimiento de que las cau-  sas de los desastres se generan en el proceso   de desarrollo, por lo que se hace necesaria la   participación de los actores del desarrollo en la   reducción de los riesgos, esto es, del conjunto   de las instituciones públicas y privadas (Ferra-  das, 2012). Hay  que  tener  presente  que  en  la  literatura   también\tse\tencuentra\tla\tdefinición\tde\tReduc - ción de Riesgos de Desastres que se muestra   en  el  recuadro  1.  Para  efectos  prácticos  en  el   Proceso de   adopción de: Políticas Orientadas a Reducir el ries- go de desas- tres, o implica intervenciones   en los procesos    de\tplanificación\t   para el desarro- llo y Estrategias, y  Prácticas   Minimizar sus   efectos la implemen- tación de   estrategias   orientadas re- ducir las causas   que generan   condiciones de   vulnerabilidad   en las unidades   sociales y sus   medios de vida  Cuadro 1: Esquematización del concepto de gestión del riesgo  Fuente: Adaptado de EGR, 2008. \n14  curso  usaremos  la  Reducción  de  Riesgos  de   Desastres y la Gestión del Riesgo de Desastres   (GdR) como sinónimos. -  Campañas  que  impliquen  a  los  medios  de   comunicación para generar una mayor con-  ciencia  ciudadana  en  relación  con  las  res-  ponsabilidades  y  derechos  ante  la  genera- ción de riesgos. -  La  difusión  y  capacitación  en  relación  a  la   identificación\tde\tlas\tzonas\tde\tmayor\triesgo\t  (difusión de mapas y estudios) y de las tec-  nologías  constructivas,  en  particular  en  los   procesos de autoconstrucción.  -\t La\tplanificación\tdel\tterritorio\ty\tdel\tdesarrollo,\t  teniendo en cuenta los riesgos potenciales e    identificados.  -  La  transferencia  del  riesgo  en  caso  de  ser   necesaria y factible. -  La generación de mecanismos de participa- ción  y  colaboración  interinstitucional  como   se vienen generando en los grupos impulso- res de la gestión del riesgo (GRIDES). La in-  clusión de las empresas públicas y privadas   en tales mecanismos. -  La incorporación de la gestión del riesgo en   el  Currículo  Educativo,  la  formación  de  do-  centes y la elaboración de materiales educa- tivos.  -\t La\tcoordinación\tcon\tel\tpoder\tjudicial\ta\tfin\tde\t  suspender la urbanización de zonas de ries-  go y reubicar a las poblaciones en alto ries-  go. La creación de mecanismos y sanciones   legales  que  obliguen  a  las  instituciones  pú- blicas y privadas al cumplimiento de las medi- das de prevención y reducción de riesgos.  -\t La\tidentificación\ty\thabilitación\tde\táreas\tpara\t  vivienda  popular  que  sustituyan  progresiva- mente a las invasiones. -  La incorporación de medidas de prevención   y reducción de riesgos en el manejo de cuen-  cas y el fortalecimiento de las autoridades de   cuencas. -  El diseño e implementación de estrategias y   planes de prevención y reducción de riesgo,   incluidas partidas presupuestales permanen-  tes\tpara\ttal\tfin.  Smith (2006) desde una perspectiva de cam- bio climático menciona que la gestión del riesgo   está dirigido fundamentalmente a: i) atenuar el   daño causado por riesgos climáticos y ii) redu-  cir  la  severidad  de  los  trastornos  ocasionados   por éstos.  El Cuadro 2 muestra estas conside- raciones. El cuadro 3 nos presenta el resumen de los  cambios en el tiempo sobre conceptos y enfo-  ques de la gestión del riesgo y sus implicancias   en la práctica.  La\tfigura\t1\tmuestra\tlos\tconceptos\tasociados\t  a  la  gestión  del  riesgo  y  el  momento  de  ocu-  rrencia del denominado “desastre”.  1.2. Tipos de gestión del riesgo  La\tfigura\t2\tmuestra\tuna\tpropuesta\tde\tesquema - tización sobre los tipos de gestión del riesgo. Según Ferradas (2012) la gestión correctiva  y prospectiva comprende entre otros aspectos:  Busca atenuar el daño causado   por riesgos  climáticos y reducir   la severidad de los trastornos   ocasionados por éstos. Permite proteger mejor: la vida y la propiedad  La salud  La seguridad alimentaria  El suministro de agua  Las viviendas  Infraestructura de riesgos como   sequías, inundaciones y tormen-  tas  Cuadro 2: El concepto de gestión del riesgo con enfoque de cambio climático  Fuente: Adaptado de Smith, 2006  La  reducción  del  riesgo  de  desastres  es   un enfoque de amplio alcance que incluye   toda  acción  dirigida  a  reducir  los  riesgos   de  desastres.  Estas  acciones  pueden  ser   de  orden  político,  técnico,  social  o  econó- mico. La reducción del riesgo de desastres   puede revestir formas tan variadas como el    asesoramiento\ten\tla\tdefinición\tde\tpolíticas,\t  legislación, planes de preparación ante ca-  tástrofes,  proyectos  agrícolas,  planes  de   seguro o incluso una clase de natación. Fuente: UIP y la UNISDR, 2010.  Recuadro 1  El concepto de reducción  del riesgo de desastres \n15  EL AYER   EL HOY   REPERCUSIONES Interpretaciones de desastre   “fisicalistas”,\tbasadas\ten\tuna\t  valoración de la singular, si no   exclusiva, importancia de las   amenazas físicas en la explica- ción y concreción de daños y   pérdidas.  Interpretaciones “naturales” del   riesgo y desastre.  Singular ascendencia y relevan- cia dada a las ciencias natura- les, la ingeniería y la medicina   en el entendimiento de desastre   y en la intervención en el riesgo. Interpretaciones más holísti- cas e integrales, en las cuales   se aumenta y se consolida la   importancia concedida a la   exposición y la vulnerabilidad   social como factores explicati- vos de desastre.  Interpretaciones más sociales   (estructurales, constructivis- tas, relativistas, subjetivistas,   entre otros), donde median los   procesos de “desarrollo” o de   “no desarrollo” de la sociedad,   los procesos constitutivos de la   llamada “construcción social”   del riesgo. El entendimiento del tema y   de las formas de intervención   requieren ampliación hacia un   conjunto de actores de las cien- cias sociales y aplicadas y con   claros nexos y participación de   las ciencias del desarrollo y del   manejo ambiental.  La inevitabilidad del desas- tre como noción se sustituye   por una concepción donde la   intervención ex ante se ve como   “posibilidad real”, así ampliando   los enfoques de intervención de   la respuesta hacia la prevención   y mitigación del riesgo. Contribuciones e interpreta- ciones propias de una amplia   gama de las ciencias sociales.  En consecuencia, el estudio   e interpretación de riesgo y   desastre se multidisciplina y se   complejiza, y las consecuencias   del análisis también exigen   pensamiento más integral y   complejo. Necesidad de la investigación   participativa como una conside- ración importante. Se incorpora   la consideración de las visiones   o imaginarios de la población   bajo riesgo como un tema rele- vante y aumenta la necesidad   de la participación social en la   gestión del riesgo.  Aumenta en la demanda para   contribuciones de las ciencias   sociales y para la investigación   multidisciplinaria; la creación de   nuevas opciones y centros de   investigación. Interpretaciones de desastre   son externas, autónomas y   parciales. Visión de desastre   como algo impuesto, natural o   fatídico. Explicaciones más estructurales   y complejas, dependientes de   procesos más fundamentales de   la sociedad. El desastre pasa   de ser visto como “natural” a ser   “social”. El riesgo se ve como un   proceso endógeno o interno de   la sociedad. La necesidad de ver riesgo y   desastre a la luz de los pro- cesos de “desarrollo” de la   sociedad con sus tendencias   a la exclusión, marginación,   distribución desigual de los    beneficios\ty\tpoder\tetc.  Transición de lo tecnocrático a   la comprensión e intervención   social e integral.  Necesidad de ver la gestión del    riesgo de desastre a la luz del   riesgo crónico o cotidiano y la   gestión del desarrollo. Fuente: Narváez et al, 2009.  Cuadro 3: Resumen de los cambios en el tiempo de conceptos y enfoques de la GdR  -  La articulación de las estrategias de adapta- ción  al  cambio  climático  con  las  de  gestión   del riesgo de desastres. -  El  diseño  e  implementación  de  estrategias   de  reducción  del  riesgo  en  las  poblaciones   afectadas por la variabilidad climática extre-   ma,\tque\timpliquen\tla\tprotección\ty\tdiversifi - cación de sus medios de vida y el acceso a   tecnologías apropiadas (como, por ejemplo,    fitotoldos,\tenergías\talternativas,\talmacena - miento de semillas y forrajes, traslado de ga-  nado, etc.). -  El destinar recursos para reducir riesgos in-  minentes. \n16  -  La creación de cursos y especialidades rela-  cionadas con la gestión de riesgo y el cambio   climático en las universidades e instituciones   educativas, que permitan formar y acreditar   especialistas. -  La promulgación de una ley que posibilite la   recuperación del patrimoniocy los programas   de destugurización. El diseño e implementa- ción  de  programas  de  destugurización  que   impliquen mejoras en las viviendas y locales   antiguos y la eventual reubicación de pobla- ciones  y  construcción  de  viviendas  nuevas   para ello.  1.3. Importancia de la GdR  Porque es importante gestionar el riesgo:  -  A  nivel  mundial  se  observa  un  aumento  en   los desastres naturales con crecientes pérdi- das de vidas humanas y daños materiales. -  Por  el  aumento  del  riesgo  de  desastres  en   los países en desarrollo, por la creciente vul-  nerabilidad de la población.  Fig. 1: Gestión del riesgo  Fuente: Adaptado de GTZ, 2004; citado por Bernex y Tejada, 2012.  Fig. 2: Tipos de gestión del riesgo  Fuente: Adaptado de Ferradas, 2012; Marco Normativo para la Planificación y Gestión de Riesgo, Marzo, 2011;   EGR, 2008.  La Gestión Prospectiva  Se  desarrolla  en  función  del  riesgo   aún no existente pero que se puede   crear  a  través  de  nuestra  iniciativa   de inversión y desarrollo.  La Gestión Correctiva  Tiene  como  punto  de  referencia  el   riesgo ya existente, producto de ac-  ciones  sociales  desplegadas  en  el   tiempo pasado.  La Gestión Reactiva  Se desarrollan planes y estrategias   de  preparación  y  respuestas  a  de-  sastres, con la comunidad y las es-  cuelas. Amenaza   Vulnerabilidad Si “Evento ocurre” ENTONCES Riesgo  “Hay un desastre” \n17  -  Porque el riesgo que se convierte en desas-  tre  impacta  negativamente  en  nuestra  eco-  nomía y limita nuestras opciones de desarro- llo haciéndolo insostenible.  -\t Porque\tno\thacerlo\tsignifica\tque\tseguiremos\t  construyendo  riesgos  y  aplazando  la  aten-  ción  a  un  problema  urgente  que  afecta  a  la   mayoría de la población. -  Porque  adoptar  la  gestión  del  riesgo  como   estrategia, es una oportunidad de desarrollo   (MEF, 2006).  1.4. Modelo de GdR  Un modelo de Gestión del Riesgo debe consi-  derar en su diseño:  -  Construir la información mínima que permita   calcular el riesgo que se va a asumir y prever   las reservas que permitirían la supervivencia   aún en caso de que ocurran impactos.  -\t Identificar\ta\tlos\tactores\tinvolucrados\tpara:\t a)\telaborar\tla\tinformación\ty\tdefinir\tlas\tres - ponsabilidades  para  la  elaboración  de  las   opciones  de  respuesta,  y  b)  establecer  los   plazos  para  alcanzar  niveles  de  bienestar  y   de disminución de los riesgos. -  Evaluar  las  opciones  de  riesgo  aceptable,   que implica la aceptación de ciertos márge-  nes de riesgo cuando existe la posibilidad de    recibir\tmúltiples\ty\taltos\tbeneficios,\ta\tcambio\t  de  adaptarse  a  ciertas  condiciones  de  peli- gro (MEF, 2006).  La\tfigura\t3\tnuestra\tun\tmodelo\tde\taplicación\t  práctica que podría implementarse para gestio-  nar el riesgo.  1.5. Procesos para la GdR  El  cuadro  4  y  en  base  a  las  diferentes  pro-  puestas  para  la  GdR,  muestra  los  procesos  y   subprocesos  que  se  deben  considerar  para  la   GdR. Junto con estos procesos y subprocesos se   pueden\tidentificar\talgunos\trasgos\tque\tdefinen\ty\t  caracterizan a un proceso de Gestión del Ries-  go, como se muestra en el Cuadro 5.  1.6.  La  gestión  del  riesgo  en  los   procesos de desarrollo  La  gestión  del  riesgo  está  estrechamente  vin-  culada  a  los  procesos  de  desarrollo  y  es  un   factor  que  cruza  los  procesos  de  diagnóstico,    planificación\te\tinversiones.\tEn\tla\texperiencia\t  peruana, el Ministerio de Economía y Finanzas   (MEF)  en  el  año  2006,  elaboró  una  aproxima- ción  que  hace  evidente  esta  vinculación,  que    es\tpresentada\ten\tla\tfigura\t4,\ty\ten\tla\tfigura\t5\tse\t  muestra un esquema, también propuesto por el   MEF de como los “desastres” se constituyen en   problemas del desarrollo no resueltos.  Fig. 3: Modelo para gestionar el Riesgo  Fuente: Región Piura sf. Aplicación de la GdR para el Desarrollo Sostenible. Módulo 1.8 p. \n18  Procesos para la GdR   Subprocesos  Estimación del riesgo   •\tNormatividad\ty\tlineamientos  •\tParticipación\tsocial  •\tGeneración\tdel\tconocimiento\tde\tpeligros\to\tamenazas  •\tAnálisis\tde\tvulnerabilidad •\tValoración\ty\tescenarios\tde\triesgos.  •\tDifusión  Prevención del riesgo   •\tNormatividad\ty\tlineamientos  •\tPlanificación\tpreventiva  •\tParticipación\tsocial  •\tIndicadores\tde\tprevención  •\tFinanciación\tde\tla\tprevención  •\tImplementación\tde\tla\tprevención\ta\ttravés\tde\tla\tplanificación\t   territorial y sectorial   •\tImplementación\tde\tla\tprevención\ta\ttravés\tde\tlas\tnormas\tde\turba - nismo y construcción Reducción del riesgo   •\tNormatividad\ty\tlineamientos  •\tDiagnóstico\te\tintervención  •\tParticipación\tsocial  •\tEvaluación\tde\tprogramas\ty\tproyectos  •\tInformación\ty\tseguimiento  •\tPlanificación\tparticipativa  •\tPlanificación\tintegral,\tarmonizada\ty\ttransversal  •\tGestión\tde\trecursos  •\tImplementación\tde\tla\treducción\tdel\triesgo  •\tSeguimiento  •\tEvaluación  Preparación   •\tInformación\tsobre\tescenarios\tde\triesgos\tde\tdesastres  •\tPlaneamiento  •\tDesarrollo\tde\tcapacidades\tpara\tla\trespuesta  •\tGestión\tde\trecursos\tpara\tla\trespuesta  •\tMonitoreo\ty\talerta\ttemprana  •\tInformación\tpública\ty\tsensibilización  Respuesta   •\tConducción\tde\tla\tcoordinación\tde\tla\tatención\ ión tiene que ser nece- sariamente participativo, elevando a los sujetos   del riesgo y las autoridades a actores y sujetos   de análisis, formulación estratégica y de decisión.   La participación es un mecanismo de legitimación   y de garantía de pertenencia y la piedra angular   de la apropiación del proceso por parte de los   actores sociales. La apropiación es, de hecho, el    signo\tdefinitorio\tdel\tproceso.  Fomentada a través de la creación o consolida- ción de estructuras organizacionales instituciona- les permanentes y sostenibles y con representa- ción de los actores  fundamentales del riesgo y   su gestión de la sociedad civil y política. Un principio básico que deriva de la integra- ción de la gestión del riesgo con la gestión del    desarrollo\t[...]\tes\tque\tno\tdebe\thaber\tnecesidad\t   de crear una nueva institucionalidad o formas   organizacionales que respondan a las necesida- des particulares de la gestión del riesgo, dado   que ésta puede lograrse en muchas de sus   metas y áreas de preocupación a través de la   incorporación de la problemática del riesgo en    [...]\tlas\tinstituciones\tde\tpromoción\tdel\tdesarrollo\t   sectorial, territorial, ambiental, etc. En esencia, lo   que se requiere es un ente de mando y coordina- ción global de la gestión, que realice su trabajo   sustantivo a través de organismos ya existentes   y dotados de funciones y roles en la promoción y    planificación\tdel\tdesarrollo.  Buscar la integración, coordinación y concerta- ción de actores sociales de niveles territoriales   diferenciados Debe ser una práctica impulsada, coordinada y   monitoreada particularmente desde lo local pero   no puede existir sin el establecimiento de relacio- nes, niveles de concertación y coordinación, ne- gociación y acoplamiento con actores y procesos   generados en territorios de mayor jerarquía, sean   éstos sub-regionales, regionales, nacionales y   hasta internacionales.  [...]\tEsto\tasume\tgran\timportancia\tporque\tse\t  reconoce que el riesgo que se expresa en los ni- veles locales es producto de múltiples procesos,   concatenados e interrelacionados cuyos orígenes   sociales y territoriales exceden los límites de lo   local. Un proceso de gestión local pueda ser más    eficaz\tsi\tse\tliga\ta,\ty\tse\tdesarrolla\ten\tel\tmarco\tde\t   una territorialidad mayor. Ser entendida y asumida como algo transversal e   integral La gestión del riesgo es una práctica transversal   e integral que comprende actividades y enfoques   tanto en lo que se ha llamado la prevención y  Cuadro 5: Rasgos definitorios de un proceso de Gestión de Riesgo \n20  mitigación, como en temas particulares relaciona- dos con los preparativos, la respuesta, la rehabili- tación y la reconstrucción. Su punto de referencia   es un proceso continuo de riesgo en constante   evolución y cambio y no el desastre y las formas   de evolución de éste durante condiciones norma- les de vida y durante o después de la ocurrencia   de desastres. O sea, desde el principio se acepta    la\tcontinuidad\tcomo\talgo\tdefinitorio\tdel\triesgo\ty\t   de las prácticas que se despliegan para reducirlo    o\tpreverlo.\t[...]  Fuente: Tomado y sintetizado de Lavell (2004 y 2007) por Lilian Reyes. En “Módulos Autoinstructivos para la Gestión   del Riesgo”, Módulo número 3.Proyecto PREDECAN, 2009; citado por Secretaría General de la Comunidad Andina,   2009.  Fig. 4: La gestión del riesgo en los procesos de desarrollo  Fuente: MEF, 2006. Fuente: MEF, 2006.  1.7. Razones para reducir el riesgo   en procesos de desarrollo  Parecería lógico pensar en la importancia de in-  corpora la GdR en procesos de desarrollo, pero   esto  no  es  común  observarlo  en  las  diversas   experiencias  de  los  Estados  a  nivel  mundial,   para tener una idea sobre las razones de esta   aparente  lógica  incorporación,  tengamos  en   cuentas las siguientes razones:  -  Porque  el  riesgo  es  producto  de  procesos   particulares de transformación social y eco-  nómica o de acumulación económica de los   países, por tanto es una consecuencia direc-  ta o indirecta de la aplicación de modelos de   crecimiento y desarrollo. -  Porque  con  la  visión  que  ha  primado  hasta  hoy, después de cada desastre sólo se logra   un  nivel  inferior  de  desarrollo  al  que  existía   antes  de  su  ocurrencia  en  términos  econó- micos, sociales, institucionales, etc. -  Porque la reducción del riesgo de desastres   se convierte en un indicador de desarrollo y   de  desarrollo  humano  sostenible,  al  reducir   las  pérdidas  que  causarían  los  desastres  y   mantener  los  niveles  de  bienestar  alcanza- dos (MEF, 2006).  1.8. Normatividad sobre gestión   del riesgo y prevención de   desastres 1.8.1. Normatividad internacional \n21  formación sobre legislación, normativa y modo   de  organización  al  interior  de  los  países  y  en   consecuencia  los  marcos  normativos  interna-  cionales\tsiguen\tsiendo\tinsuficientes.\tEl\tcuadro\t  6 muestra las normas internacionales referidas   a la gestión del riesgo y prevención de desas-  tres.  1.8.2.  Normatividad  en  la  Región  An- dina  Se\t ha\t podido\t identificar\t en\t la\t información\t  disponible, que el caso de la subregión andina   sigue  la  misma  tendencia  internacional  dando   como resultado una aparente ausencia de nor-  matividad  respecto  de  la  GdR,  en  el  cuadro  7   se muestra los listados referidos a la normativi- dad en cada país.   1.9.  Institucionalidad  Subregional   para  la  prevención  y  atención  de   desastres 1.9.1.  Comité  Andino  para  la  Preven- ción  y  Atención  de  Desastres  (CA-  PRADE)*  El Comité Andino para la Prevención y Aten- ción de Desastres (CAPRADE) tiene como ob-  jetivo contribuir a la reducción del riesgo y del   impacto de los desastres naturales y antrópicos   que puedan producirse en el territorio de la su-  bregión  andina,  a  través  de  la  coordinación  y   promoción de políticas, estrategias y planes, y   la  promoción  de  actividades  en  la  prevención,   Fig.5: Los desastres: problemas del desarrollo no resueltos  Fuente: MEF, 2006.  La  reducción  del  riesgo  de  desastres    o    GdR es importante para el desarrollo sos- tenible porque: El 85% de las personas expuestas a te- rremotos, ciclones, inundaciones y sequías   vive en los países en desarrollo.  Los  costos  por  daños  directos  de  desas- tres por sí solos se han disparado de US$75,5   mil millones en los años sesenta a cerca de   US$1 billón en los últimos diez años. La reducción del riesgo de desastres es  vital  para  asegurar  uno  de  los  derechos  y   libertades más fundamentales del hombre,   i.e. el derecho a no padecer hambre. En  resumen,  la  reducción  del  riesgo  de  desastres  protege  las  inversiones  para  el   desarrollo y ayuda a las sociedades a acu-  mular riqueza a pesar de las amenazas. Fuente: UIP y la UNISDR, 2010.  Recuadro 2  La GdR y el desarrollo sostenible  Las referencias son numerosas sobre los con-  ceptos,  esquemas,  estrategias  de  GdR,  sin   embargo existen poco documentadas las expe-  riencias de desarrollo de la GdR en los diferen- tes  países  y  por  consiguiente  una  ausente  in- (*) http://www.comunidadandina.org/desastres/caprade.htm \n22  N° de la norma   Objeto de la norma   Sumilla  Resolución N° 44- 36, Asam-  blea General de las Naciones   Unidas, 1989 Establecer el Programa Inter- nacional “Decenio Internacional   para la  Reducción de los De- sastres Naturales” (DIRDN) El DIRDN buscaba promover   a nivel global el conocimiento   sobre la prevención y atención   de desastres con énfasis en la   aplicación de la ciencia y tecno- logía, y mejorar la capacidad de   cada país para la reducción de   los riesgos y adoptar sistemas   de alerta regional, nacional y   local, contando con la ayuda   de la cooperación internacional   (01/01/1990 – 21/12/1999). I Conferencia Mundial sobre la   Reducción de los Desastres.   Naciones Unidas, 1994 Adoptar la Estr :  -  Poner más énfasis en los análisis del riesgo   sobre los indicadores de resiliencia. -  Integrar  factores  internos  como  objeto  de   interés transversal en el proceso de análisis   del riesgo. -  Evaluar las motivaciones y hacer un monito-  reo participativo para conocer estos factores   internos. -  Aclarar  las  posibilidades  individuales  de   acción  y  formular  propuestas  concretas  de   comportamiento a la población. -  Realizar un mayor fortalecimiento institucio- nal de las estructuras civiles existentes. -  Trabajar estrechamente unidos con los me-  dios  de  comunicación  para  promover  infor-   mación\tconfiable\ty\tactualizada.  -  Establecer y promover asesoría directa, des-  centralizada y gratuita para los habitantes en   temas con posibilidades individuales de GdR   y autoprotección. -  Establecer  comunicación  permanente  entre   todos  los  actores  importantes  también  de   manera descentralizada y replantear los sis-  temas de distribución de emergencia. -  Un  objetivo  clave  debe  ser  la  canalización   temprana  de  los  recursos  disponibles  des-  pués de un desastre. -  Otro  problema  estructural  lo  constituye  la   atribución de responsabilidades para el tema   de desastres dentro del sistema descentrali- zado de Defensa Civil. -  Aprovechar la fuerza de trabajo de la pobla- ción lo más pronto posible en la fase de res-  puesta al desastre. -  Asegurar el más alto grado de transparencia   en el manejo de recursos y un acceso real y   sencillo de la población a esa información. -  Atribuir a la población en los procesos parti-  cipativos no solo el papel de informante sino  \n27  integrarla  como  actor  activo  y  responsable   en la toma de decisiones. -  Elaborar  programas  dirigidos  en  especial  a   los jóvenes.  -\t Poner\ténfasis\ten\tla\tcreación\tde\tconfianza\t  entre los «expertos técnicos» y los «desen- tendidos» de una comunidad y utilizar como   puente a los líderes informales.  Componentes   Lecciones s de degradación del ambiente o a   través de la recuperación ambiental. -  Limitando  la  exposición  de  la  sociedad  a   los  fenómenos  físicos  e  implementando   medidas de gestión correctiva (diques, te-  rrazas, muros, etc.). -  Aumentando  la  resiliencia  de  las  comuni- dades  frente  a  los  fenómenos  físicos  que   configuran\tescenarios\tde\triesgo\ty\tdesastre\t  o asegurando la adaptación de los nuevos   sistemas  a  las  condiciones  ambientales   existentes. -  Reduciendo  las  causas  de  fondo  que  in-  crementan los niveles de vulnerabilidad en   la sociedad. -  Evitando  que  se  generen  nuevas  condi- ciones  de  vulnerabilidad  en  las  unidades   sociales (gestión prospectiva).  El riesgo es siempre una construcción so- cial, resultado de procesos de transformación   social  y  económica  en  el  marco  de  modelos   de desarrollo poco sostenibles. Reducir  el  desastre  al  evento  físico  que  lo  detona  es  trágico  e  inconveniente  porque   conduce al inmovilismo frente a la reducción   del riesgo. El  contexto  actual  exige  una  nueva  inter- pretación y una noción diferente respecto del   desastre;  se  requiere  pasar  de  la  gestión  del   desastre como foco de atención a la gestión del   riesgo como foco de análisis e intervención. El  término  gestión  del  riesgo  aparece  en  1998.  Se  origina  en  un  entorno  en  el  cual   las condiciones que se podían examinar, re-   flexionar,\t analizar\t e\t internalizar,\t asociadas\t  con  pérdida  y  daño,  no  dejaban  duda  sobre   las causas y las contribuciones a las pérdidas   en las sociedades. Se trató del huracán Mit-  ch ocurrido en América Central en octubre de   1998. El concepto de riesgo surge como pro-  babilidad de daños y pérdidas. Este huracán   encontró  condiciones  sociales,  construidas   en los últimos cincuenta años, que favorecie- ron  la  destrucción  y  la  pérdida.  El  otro  ele-  mento que contribuyó al surgimiento de este   concepto  fue  la  existencia  de  un  bagaje  de   conocimientos,  información  e  investigación    científica\t generada\t en\t los\t últimos\t sesenta\t  años que de pronto encontró un vehículo que    le\tpermitió\taflorar\tcomo\tconcepto.  En primer lugar, el riesgo es construcción  social:  -  Respecto  de  la  vulnerabilidad,  su  calidad   de construcción social es obvia. -  En cuanto a las amenazas, las puramente   antrópicas  son  claramente  producto  de  la   sociedad  misma,  las  socionaturales  tam-  bién.  -\t En\tlo\tque\tse\trefiere\ta\tlas\tamenazas\tna - turales, estas derivan de la manifestación   de un fenómeno físico y su transformación   en  una  amenaza  para  la  sociedad,  al  en-  contrar sociedades expuestas y en condi- ciones  de  vulnerabilidad  que  conllevan  a    la\tconfiguración\tde\tescenarios\tde\triesgo\ty\t  desastre.  En  segundo  lugar,  la  construcción  social   Características del riesgo de desastre   y el significado de su gestión  Por: Allan Lavell1        L  E  C  T  U  R  A 1 Tomado de la presentación del Dr. Allan Lavell: «Del concepto de riesgo y su gestión a los parámetros para la acción: un  resumen básico», realizada en el marco del Taller de Capacitación a Investigadores, Máncora, Piura, Perú (10 al 15 de   marzo de 2008). Citado por MEF-GIZ, 2012. \n29  del\triesgo\tsignifica\tque:  -  La sociedad está en condiciones de cons-  truir y controlar lo que ella misma ha cons-  truido o puede construir. -  En la medida en que el riesgo es produc- to de procesos sociales y económicos que   derivan  de  las  modalidades  de  desarrollo   y  transformación  que  adoptan  las  socie-  dades, su reducción y control solo pueden   ser exitosos si se considera la GdR como   estrategia  fundamental  para  garantizar  la   seguridad y la sostenibilidad de los proce-  sos de desarrollo sectorial, territorial y am-  biental.  -\t El\triesgo\tpuede\tser\tidentificado\tcon\tlas\tac - ciones y los resultados de las acciones de   determinados actores sociales. En conse-  cuencia, no hay posibilidad de GdR sin el   concurso  de  estos  actores  y  mecanismos   de control de sus acciones degradantes. -  La  GdR  está  íntimamente  vinculada  a  lo   que  se  llama  gestión  del  desarrollo  sos-  tenible. Es a través de la comprensión de   las formas de generación del riesgo en la   sociedad  que  se  puede  extrapolar  y  en-  tender  el  por  qué  es  un  problema  para  la   sostenibilidad,  entre  otros  factores.  Esa   noción  central  es  la  «construcción  social   del riesgo». -  La noción del riesgo como construcción so-  cial es clara y ofrece pistas sobre la varie-  dad y el rango de intervenciones posibles,   los cuales exceden la visión tradicional de   medidas  estructurales  y  no  estructurales    de\tmitigación,\tque\tse\trefieren\tbásicamente\t  a medidas de control de ingeniería y com-  portamiento humano. Cuando se habla de   construcción  social  se  está  considerando   condiciones  de  riesgo  existentes  frente  al   rango normal de eventos que afectan a la   sociedad, no aquellos tan infrecuentes que   no pueden ser la base del análisis. Por eso   se  habla  de  riesgo  excedente,  aquel  ries-  go que va más allá del riesgo inherente a   la  vida  misma  y  es  producto  de  acciones   erradas o inconscientes. Se hace referen-  cia  al  riesgo  en  la  sociedad  que  excede   a  ese  riesgo  inherente,  un  riesgo  que,  en   teoría,  con  los  elementos  técnicos,  socia-  les,  económicos,  culturales,  etc.,  actuales   podría  superarse.  La  construcción  social   del riesgo permite que se introduzca la no-  ción de GdR. -  La construcción social del riesgo tiene dos   interpretaciones complementarias. Una pri-  mera\tinterpretación\tse\trefiere\ta\tque\tcomo\t  sociedad  contribuimos  de  manera  impor- tante  a  la  construcción  del  riesgo,  pues   aprovechamos  el  ambiente  pero  pode- mos llegar a convertir ese recurso en una   amenaza. Al hablar de construcción social   se  está  considerando  la  participación  hu-  mana  en  la  creación  de  las  condiciones   de riesgo, el cual se construye a partir de   nuestras acciones. En la medida en que se   reconozca  esta  participación  social  existe   la opción de de-construir esas condiciones   de riesgo.  La  segunda  interpretación  de  la  noción  de  construcción  social  del  riesgo  es  que  se   acepta  que  el  riesgo  es  una  construcción    subjetiva,\tno\tpor\teso\tacientífica,\tsino\tdesde\t  la subjetividad de las sociedades. Son dos in-  terpretaciones complementarias: construimos   el  riesgo  con  nuestras  acciones  en  relación   con el entorno físico o lo construimos a través   de las diferentes percepciones del riesgo. El riesgo, las amenazas y la vulnerabilidad  que lo explican son dinámicos y cambiantes.   El cambio puede ser lento y casi impercepti- ble en el corto plazo o rápido y hasta abrupto   o violento; ambas situaciones como producto   de\tmodificaciones\ten\tel\tentorno\ty\tla\tdinámica\t  de los procesos sociales y económicos. Estas características distintas del riesgo de  desastre permiten referirse a un continuo de   riesgo,  a  diferencia  de  un  ciclo  de  desastre,    en\tel\tcual\tse\tpueden\tidentificar\ttres\tcatego - rías y condiciones fundamentales del riesgo,   de importancia para el tema de GdR:  -  El riesgo primario o estructural. -  El riesgo derivado, secundario o coyun- tural. -  El riesgo reconstruido o ampliado.  Cada  estadio  sucesivo  se  construye  so- bre,  manteniendo  y  ampliando  las  condicio- nes  existentes  en  el  estadio  anterior.  Así,  el   continuo  no  solo  se  expresa  en  cambios  de   estadio  sino  también  en  la  relación  de  cada   uno con el anterior.  Los\tsignificados\tdistintos\tde\tla\tnaturaleza\t  dinámica y cambiante del riesgo para la prác-  tica de la gestión son:  -  El  escenario  de  riesgo  y  los  factores  de   amenaza  y  vulnerabilidad  cambian  cons-  tantemente  y  no  pueden  ser  captados  en   una\t«fotografía»\tpermanente.\tEsto\tsignifi - ca  que  deben  ser  actualizados  con  cierta   regularidad, vigilados y analizados en for-  ma permanente, tanto el ambiente como la   sociedad.\tSignifica\ttambién\tque\tla\ttarea\tde\t  construcción  de  escenarios  y  mapas  o  la   realización permanente de análisis requie- \n30  re de la descentralización y la participación   de los sujetos del riesgo y sus organizacio- nes y otras estructuras regionales, locales   o comunales. -  La GdR como práctica organizada e insti-  tucionalizada toma como punto de referen-  cia  el  continuo  del  riesgo.  Así,  la  gestión   se  constituye  en  una  práctica  integral  y   transversal que considera tanto lo que tra-  dicionalmente  se  ha  llamado  prevención,   mitigación y preparativos ante el desastre   como la respuesta de emergencia, la reha-  bilitación y la reconstrucción. -  La  GdR  requiere  de  estructuras  organi- zacionales  e  institucionales  que  integran   actores y capacidades distintos, los cuales   toman  siempre  el  «desarrollo»  como  su   punto  de  referencia  y  reconocen  el  peso   diferenciado  que  los  especialistas  en  de-  sarrollo y la respuesta humanitaria desem-  peñan en distintos momentos. -  El  riesgo  está  sujeto  a  valorizaciones  ob-  jetivas,  pero  también  subjetivas.  Lo  sub-   jetivo\tse\trefiere\ta\tlas\tformas\tdistintas\ten\t  que  los  mismos  protagonistas  del  riesgo   lo perciben y miden, cómo lo dimensionan   en  términos  de  las  decisiones  que  toman   sobre  él,  los  imaginarios  particulares  que   corresponden  a  actores  sociales  distintos   y  las  nociones  que  manejan  sobre  lo  que   se  considera  como  riesgo  «aceptable»,   «aceptado» o «inaceptable».  En\tla\tpráctica\testo\tsignifica\tque:  -  La  gestión  del  riesgo  no  puede  prescindir   de la participación de los sujetos del riesgo   en  su  dimensionamiento  y  en  las  decisio- nes sobre su reducción y control. -  Muchas veces los sujetos del riesgo, parti-  cularmente la población pobre, consideran   el  riesgo  de  desastre  a  la  luz  de  las  con-  diciones prevalecientes y permanentes de    su\tpropia\texistencia.\tEsto\tsignifica\tque\tla\t  GdR debe desarrollarse como práctica en   el marco de acciones de gestión del desa-  rrollo para que no sea relegada, ignorada   o marginada. -  Los  objetivos  de  la  gestión  del  riesgo  se   logran con mayor éxito y permanencia si la   gestión se lleva a cabo por organizaciones   e instituciones ya existentes de desarrollo   sectorial y territorial y no por otras creadas    específicamente\tpara\tpromover\tla\tGdR.  El\triesgo\tde\tdesastre\tse\tmanifiesta\tde\tfor - ma más precisa en los niveles microsociales   y territoriales  Esto\tsignifica\tque:  -  Un gran desastre es en realidad un conjun- to de desastres locales, comunales, fami-  liares e individuales. -  Dimensionar adecuadamente el riesgo re-  quiere de un acercamiento y una participa- ción local. -  La conciencia del riesgo se plasma en los   niveles microsocial y territorial. Es allí que   en  muchos  casos  se  expresan  mejor  las   preocupaciones y las intenciones de redu-  cirlo o controlarlo.  La  gestión  local  del  riesgo  se  establece  como  una  opción  real,  necesaria  y  válida.   Esta\tafirmación\ttiene\tcomo\tbase\tlos\tsiguien - tes elementos:  -  La participación de los actores locales. -  La  apropiación  de  la  gestión  por  parte  de   ellos. -  La concurrencia de actores externos para   el apoyo y la promoción. -  La  necesidad  de  estructuras  organizacio- nales e institucionales locales. -  La búsqueda de la sostenibilidad como re-  sultado  de  la  participación,  la  apropiación   y la consolidación de estructuras locales.  La gestión local del riesgo  Referirse  a  lo  local  ha  creado  problemas   por\tfalta\tde\tdefinición\ty\tlos\tconceptos\tdistin - tos de las diferentes disciplinas sobre el par-  ticular.  Además,  ha  existido  una  tendencia   a  reducir  lo  local  a  lo  municipal.  Sobre  este   problema se deben considerar varios puntos   importantes. En primer lugar, el punto de partida es que  es imprescindible un nivel de gestión subna- cional y subregional. En segundo lugar, el ni-  vel\tde\tintervención\tmás\tadecuado\tse\trefiere\t  a lo que se puede llamar «territorios de ries-  go», en los cuales se comprueba:  -  Cierta homogeneidad en las condiciones y   las modalidades de desarrollo. -  Conjuntos  de  actores  sociales  que  tienen   un sentido de pertenencia territorial y rela-  ciones  interactivas  cercanas,  antagónicas   o de colaboración.  Estos  territorios  constituyen  una  síntesis  de múltiples determinaciones con cierto gra-  do  de  homogeneidad  en  las  formas  particu-  lares  de  desarrollo,  la  presencia  de  actores   sociales con relaciones interactivas y las con-  diciones  particulares  del  riesgo.  Lo  que  mu-  chas  veces  está  asociado  con  condiciones   de multiamenaza o amenazas concatenadas   o complejas. \n31  De hecho, estos territorios pueden ser me- nores que un municipio, cruzar límites muni-  cipales o, en algunos casos, acotarse al terri-  torio de un municipio particular. Si el municipio se convierte en una expre- sión preponderante de lo local, esto se explica   no porque sea la única, ni necesariamente la   mejor representación de este, sino porque:  -  La gestión requiere de estructuras organi- zacionales  e  institucionales  permanentes,   consolidadas y sostenibles.  -\t El\tmunicipio\tse\tperfila\tcomo\tuna\topción\t  real  de  engranaje  dada  su  importancia   para  la  promoción  del  desarrollo  local,  la   consolidación  de  la  descentralización,  la   negociación y la articulación con otros ac-  tores\tsociales\ty,\tfinalmente,\tsus\tfacultades\t  normativas y de control.  Esto\tno\tsignifica\tque\tel\tmunicipio\tsea\tla\t  única  opción  posible,  sino  la  que  prevalece   y  resulta  más  conspicua,  permanente  y,  en   principio, legitimada. Lo local debe articularse y construirse tam- bién sobre otros niveles territoriales y socia-  les de jerarquía inferior como los niveles su-  blocales, las aldeas, las comunidades y hasta   las familias. El riesgo se expresa en los niveles micro- sociales y territoriales, sin embargo, sus cau-  sas no pueden reducirse a una consideración   de estos niveles. El riesgo «local» es también   resultado de procesos y actores sociales «ex-  tralocales», regionales, nacionales y hasta in-  ternacionales.  Esto\tsignifica\tque\tla\tgestión\tlocal\tno\tpuede\t  llevarse  de  forma  autónoma  y  no  se  puede   prescindir de relaciones, concertación, coordi- nación y gestión con otros niveles territoriales en   el marco de arreglos organizados en torno a:  -\t Cuencas\thidrográficas.  -  Regiones económicas, naturales, de desa-  rrollo, etc. -  Mancomunidades municipales. -  Sectores y niveles nacionales con injeren- cia en lo local.  La gestión local requiere el fomento de ca- pacidades de negociación y concertación con   actores internos y externos y la concurrencia   y la colaboración con estos. El  riesgo  de  desastre  es  un  componente  o una dimensión del «riesgo global», el cual   tiene  otras  dimensiones  y  condicionantes;   además,  muchas  veces  se  construye  sobre   otras  manifestaciones  de  riesgo,  en  particu-  lar el que se puede llamar «riesgo cotidiano».   Esta\tnoción\tse\trefiere\tal\triesgo\tque\tenfren - ta  particularmente  la  población  pobre  en  su   vida  diaria,  como  desempleo,  falta  de  ingre- sos,  desnutrición,  propensión  a  enfermarse,   violencia social y doméstica, etc. Este riesgo   cotidiano es:  -\t Una\treflexión\tde\ty\tun\tcomponente\ten\tla\t definición\tde\tsubdesarrollo,\tpobreza\te\tin - sostenibilidad. -  Una condición que propicia la construcción   social de condiciones de riesgo de desas-  tre, tanto con referencia a la construcción   social  de  amenazas  como  a  la  construc-  ción de la vulnerabilidad. -  Un  punto  importante  a  considerar  y  un   componente en el proceso de construcción   del riesgo de desastre para cientos de mi-  llones de pobladores en el mundo.  Para  la  GdR  estas  consideraciones  im- plican que:  -  La GdR debe darse en un marco determi-  nado por las condiciones de riesgo cotidia- no y pobreza de la población. -  En  vista  de  la  prioridad  que  otorga  la  po-  blación  al  riesgo  cotidiano,  y  tomando  en   cuenta sus propias capacidades de super-  vivencia y adaptación, la GdR de desastre   tiene que tomar como punto de referencia   fundamental  el  riesgo  cotidiano  y  los  me-  canismos que utiliza la población para en-  frentarlo. -  La GdR es un parámetro y un componente   de la gestión del desarrollo, la gestión del   ambiente  y  la  gestión  global  de  la  seguri- dad  humana  como  condición  imprescindi- ble para el logro de la sostenibilidad.  Conclusiones  La GdR de desastre en todas sus facetas y  niveles no puede prescindir de:  -  Una  relación  estrecha  con  el  desarrollo  y   su gestión. -  Ser vista como un proceso y no como un   producto. -  La participación y la apropiación por parte   de  los  sujetos  del  riesgo  y  sus  organiza- ciones, y la creación de estructuras organi- zacionales e institucionales permanentes y   sostenibles. -  La integración con actores sociales de ni-  veles territoriales distintos. -  Ser  apreciada  desde  un  punto  de  vista   transversal e integral. -  Pretender  la  sostenibilidad  en  el  tiempo  y   el territorio. \n32  2. Glosario básico de la gestión   del riesgo (GdR) 2.1. El riesgo  El  riesgo  es  la  probabilidad  de  que  ocurra  un   desastre, se representa como el resultado de la   coexistencia de la amenaza con la vulnerabili- dad (CTAR-Piura, GTZ 1998). También puede   ser expresado como  el impacto potencial que   puede sufrir el sistema de referencia como re-  sultado de la acción de un evento amenazante   o colección de estos con ciertas características   (Proyecto In Situ, 2006). El riesgo deriva de la   relación  dinámica  y  dialéctica  entre  las  llama- das amenazas físicas y la vulnerabilidad de una   sociedad  o  un  componente  en  particular  de  la   misma (EGR, 2008). El riesgo, o la probabilidad de pérdidas y per- juicios  sociales,  psíquicos,  económicos  o  am-  bientales  como  consecuencia  de  un  desastre,   dependen  de  la  combinación  entre  la  posibili- dad de ocurrencia de un fenómeno destructor y   el grado de exposición y debilidad de las perso-  nas y sus bienes ante tal fenómeno. No se tra-  ta solo de pérdidas materiales sino también de   afectaciones  en  la  psicología,  la  economía,  el   medioambiente, el orden social y la perspectiva   futura,  las  que  pocas  veces  son  consideradas   en las evaluaciones (Ferradas, 2012).  El recuadro 3 muestra los riesgos y sus rela- ciones con la amenaza y la vulnerabilidad.  La\tfigura\t6\tmuestra\tel\triesgo\ty\tlos\tconceptos\t  asociados. El  recuadro  4  muestra  los  factores  que  in- ciden  en  el    riesgo  de  pérdidas  de  vidas  o  de   efectos en la vida de las personas. El recuadro 5 muestra los factores que inci- den en el riesgo de pérdidas económicas esti-  mables El recuadro 6 muestra los factores que inci- den en el riesgo de un mayor impacto social.  El riesgo es función de una amenaza o pe-  ligro y de condiciones de vulnerabilidad de   una  unidad  social.  Estos  dos  factores  del   riesgo son dependientes entre sí, no existe   peligro  sin  vulnerabilidad  y  viceversa  Los   factores  de  riesgo  son  producto  de  proce-  sos sociales, de los modelos de desarrollo   que  se  aplican  en  un  territorio  y  sociedad   determinados. El  riesgo  se  caracteriza  principalmente  por  ser  dinámico  y  cambiante,  de  acuer-  do con las variaciones que sufren sus dos   componentes  (peligro  y  vulnerabilidad)  en   el tiempo, en el territorio, en el ambiente y   en la sociedad. El  riesgo  puede  ser  reducido  en  la  me- dida  que  la  sociedad  procure  cambios  en   alguno  de  sus  componentes,  no  activan-  do  nuevos  peligros,  no  generando  nuevas   condiciones de vulnerabilidad o reduciendo   las vulnerabilidades existentes.  Otra característica del riesgo es que por  su  naturaleza  dinámica,  es  analizable  y   medible sólo hasta cierto punto.  Los dos factores del riesgo, peligro y vul- nerabilidad,  no existen independientemen-  te\tpero\tse\tdefinen\tpor\tseparado\tpara\tuna\t  mejor comprensión del riesgo. Fuente: MEF, 2006.  Recuadro 3  Los riesgos y sus relaciones con  la amenaza y la vulnerabilidad  -  La posibilidad de que se destruyan las vi-  viendas\ty\tedificaciones\ty\tpuedan\tcaer\tso - bre las personas. -  Las  características  de  la  ciudad  o  pobla- do  (calles  estrechas,  pocas  áreas  libres,   etc.). -  Las condiciones y capacidades de las per-  sonas  para  poder  reaccionar  adecuada- mente.  Recuadro 4  Factores que inciden en el  riesgo de pérdidas de vidas  o de efectos en la vida de las personas  -  La hora de ocurrencia del desastre -  La  carencia  de  sistemas  de  alerta  y  eva-  cuación. -  La falta de acceso a los sistemas de salud   y de emergencias.  -\t La\tausencia\ty\tdeficiencia\tde\tla\trespuesta\to\t  manejo de la emergencia. Fuente: Ferradas, 2012.  2.2. El desastre  El  desastre  es  la  manifestación  del  riesgo  no   manejado  (CTAR-Piura,  GTZ  1998).  Un  de-  sastre  comprende  un  contexto  y  proceso  so- \n33  cial que se desencadena como resultado de la   manifestación e impacto de un fenómeno físico   de origen natural, socio-natural o antropogéni- co  que,  al  encontrar  condiciones  propicias  de   vulnerabilidad  en  una  población  y  debilidad,   fragilidad o falta de resiliencia en su estructura   productiva e infraestructura, causa alteraciones   intensas, graves y extendidas en las condicio- nes normales de funcionamiento de la sociedad   afectada, las cuales no pueden ser enfrentadas   o resueltas de manera autónoma utilizando los   recursos  disponibles  por  esta  unidad  social   (EGR, 2008). El  desastre  es  “el  conjunto  de  daños  y  pér- didas (humanas, de fuentes de sustento, hábi- tat físico, infraestructura, actividad económica,   medio ambiente), que ocurren a consecuencia   del  impacto  de  un  peligro-amenaza  sobre  una   unidad social con determinadas condiciones de   vulnerabilidad” (MEF, 2006). El recuadro 7 muestra los desastres, causas  y características. El recuadro 8 muestra la diferencia entre una  amenaza natural y un desastre.  2.3. El riesgo de desastre   El  riesgo de desastre  es un proceso de cons- trucción  social  en  el  contexto  de  la  probabili- dad  de  ocurrencia  de  un  fenómeno  físico  que   representa  una  amenaza  para  determinada   sociedad  establecida  en  un  territorio;  por  otro   lado, tal riesgo es resultante de las decisiones   y acciones de lo que se denomina proceso inte-   gral\tde\tdesarrollo\ten\tel\tcampo\tde\tplanificación\t  de  políticas  públicas.  No  es,  pues,  externo  al   desarrollo sino intrínseco al mismo (GIZ-PDRS,   2011).  Riesgo  de  desastre   “es  la  probabilidad  de  que  se  presente  un  nivel  de  consecuencias   Fig. 6: El riesgo y los conceptos asociados  Fuente: Bernex y Tejada, 2012  ResilenciaFragilidad ResistenciaExposiciónPotencialSuceptibilidadDetonante Riesgo VulnerabilidadAmenaza o peligros  -  Los  suelos  susceptibles  de  licuefacción    (napa\tfreática\tsuperficial,\tarenosos,\trelle - nos). -  La mayor o menor cantidad de bienes ex-  puestos. -  La fragilidad de los bienes expuestos. -  El mayor valor de los bienes afectables. -  La carencia de sistemas de alerta y protec-  ción previa. -  La  ausencia  de  mecanismos  de  transfe-  rencia de riesgos (seguros).  -\t La\tdeficiencia\ten\tlas\tmedidas\tde\tseguri - dad y protección de los bienes después de   iniciado el desastre.  Recuadro 5   Factores que inciden en el riesgo de pérdidas económicas estimables  Fuente: Ferradas, 2012. \n34  -  La mayor dependencia del clima (carencia   o\t deficiencia\t de\t sistemas\t de\t almacena - miento o riego). -  La mayor o menor afectación de los bienes   de mujeres, niños y ancianos. -  La mayor o menor afectación de los dere-  chos de las personas; en particular el de-  recho  de  las  personas  a  opinar  y  decidir   sobre su situación, y el derecho a la segu-  ridad y protección de los más vulnerables   (niños, adultos mayores, etc.). -  La importancia de las pérdidas para la se-  guridad  alimentaria  de  las  personas  y  co-  munidades. -  La existencia de reservas (semillas, forra-  je, dinero). -  La  ausencia  o  existencia  de  otras  opcio- nes  de  ingreso  (empleo  temporal,  acceso   a otros pisos ecológicos). -  La mayor o menor capacidad de recupe- ración. -  Las posibilidad o no de obtener transferen-  cias de familiares (remesas). -  La proporción de posibles pérdidas econó- micas  en  relación  con  el  PBI  del  país,  la   región o localidad. -  Las posibles variaciones del mercado ge-  neradas por el desastre y por la ayuda ex-  terna. -  La  posibilidad  de  afectación  psicosocial   como  consecuencia  directa  del  desastre   o  de  las  medidas  para  afrontarlo  (reubi- cación,  suspensión  de  actividades  esco-  lares);  la  posibilidad  de  pérdidas  directas   del  desastre  sobre  los  recursos  y  bienes   de empresas e instituciones pero también   a la interrupción temporal o parcial de las   actividades. -  El posible impacto del desastre en la eco-   nomía,\tla\testabilidad\tpolítica\to\tla\tconflicti - vidad social. Fuente: Ferradas, 2012.  Recuadro 6   Factores que inciden en el riesgo de un mayor impacto social  económicas  y  sociales  adversas  en  un  sitio    particular\t y\t durante\t un\t tiempo\t definido\t que\t  exceden  niveles  aceptables  a  tal  grado  que   la  sociedad  o  un  componente  de  la  sociedad   afectada  encuentre  severamente  interrumpido   su funcionamiento rutinario y no pueda recupe- rarse de forma autónoma, requiriendo de ayuda   y asistencia externa” (Lavell, 2007). Entendemos por riesgo de desastre a la pro- babilidad  de  daños  y  pérdidas  futuras  asocia- das con el impacto de un evento físico externo   sobre una sociedad vulnerable, donde la mag-  nitud y extensión de estos son tales que exce-  den la capacidad de la sociedad afectada para   recibir  el  impacto  y  sus  efectos  y  recuperarse   autónomamente de ellos (EGR, 2008).  2.4. Los tipos de riesgo  El    riesgo  aceptable \tse\trefiere\ta\tlas\t“posibles\t  consecuencias  sociales  y  económicas  que,   Un desastre ocurre cuando el peligro, de- bido  a  su  magnitud,  afecta  y/o    destruye  las   bases de la vida de una unidad social (fami-  lia, comunidad, sociedad), estructura física o   actividad  económica  que  la  sustentan  y  su-  pera  sus  posibilidades  para  recuperarse  de   las  pérdidas  y  los  daños  sufridos  a  corto  o   mediano plazo. Los  desastres  pueden  ocurrir  por  causas  asociadas  a  peligros  naturales  que  pueden   ser agravadas por otras de origen antropogé- nico, es decir, causas creadas por el ser hu-  mano en su intervención sobre la naturaleza   para generar desarrollo (sobre pastoreo, de-   forestación,\talteración\tde\tlos\tlechos\tfluviales,\t agricultura\tno\ttecnificada\ten\tladeras,\texpan - sión  urbana  e  infraestructura  desordenadas,   inadecuada utilización del espacio y otras)  Es  importante  tener  en  cuenta  que  no  to- dos los desastres son de la misma magnitud,   puede haber desastres pequeños y medianos   que afecten a familias, comunidades o pobla- dos, que ocurren cuando se activa algún ries-  go  localizado.  Este  tipo  de  desastres  ocurre   de  manera  cotidiana,  y  al  sumarse,  sus  im-  pactos pueden ser equivalentes o mayores a   los de los grandes desastres o catástrofes.  Recuadro 7  Los desastres, causas y características  Fuente: MEF, 2006. \n35  Fuente: UIP y UNISDR, 2010. ¿Cuál  es  la  diferencia  entre  una  amenaza   natural y un desastre? En  realidad,  el  desastre  ‘natural’  no  existe.  Muchas  de  las  amenazas  son  na-  turales  y  generalmente  inevitables,  como   los ciclones, las inundaciones, las sequías   y los terremotos. Estos son ‘amenazas’ en   el sentido que pueden potencialmente cau-  sar  daño  al  hombre,  a  las  economías  y  al   medio ambiente si éstos no se encuentran   adecuadamente  preparados  para  ellas.   Un ‘desastre’ ocurre cuando una amenaza   provoca devastación que deja a las comu-  nidades e incluso a naciones enteras en la   incapacidad  de  hacerle  frente  y  sin  ayuda   alguna. Los desastres no son ni inevitables   ni ‘naturales’.  Recuadro 8  ¿Cuál es la diferencia entre una  amenaza y un desastre?  implícita  o  explícitamente,  una  sociedad  o  un   segmento  de  la  misma  asume  o  tolera  en  for-  ma  consciente  por  considerar  innecesaria,  in-  oportuna o imposible una intervención para su   reducción  dado  el  contexto  económico,  social,   político,  cultural  y  técnico  existente.  La  noción   es de pertinencia formal y técnica en condicio- nes donde la información existe y cierta racio-  nalización en el proceso de toma de decisiones   puede  ejercerse,  y  sirve  para  determinar  las   mínimas exigencias o requisitos de seguridad,    con\tfines\tde\tprotección\ty\tplanificación,\tante\tpo - sibles fenómenos peligrosos” (Lavell, 2007).  Riesgo  intensivo :  El  riesgo  asociado  con  la  exposición  de  grandes  concentraciones  po-  blacionales  y  actividades  económicas  a  inten-  sos eventos relativos a las amenazas existen-  tes, los cuales pueden conducir al surgimiento    de\t impactos\t potencialmente\t catastróficos\t de\t  desastres  que  incluirían  una  gran  cantidad   de  muertes  y  la  pérdida  de  bienes  (UNISDR,   2009).  Riesgo  extensivo :  El  riesgo  generalizado  que se relaciona con la exposición de poblacio- nes  dispersas  a  condiciones  reiteradas  o  per-  sistentes con una intensidad baja o moderada,   a  menudo  de  naturaleza  altamente  localizada,   lo cual puede conducir a un impacto acumula- tivo muy debilitante de los desastres (UNISDR,   2009).  Riesgos asumidos : cuando las poblaciones  aceptan  correr  los  riesgos  a  cambio  de  bene-  ficios\tcomo\tpor\tejemplo\tel\tacceso\ta\ttierras\tri - bereñas  que  pueden  ser  más  fértiles  o  mayor   disponibilidad de agua que otras tierras menos   inundables (Ferradas, 2012)  Riesgos no deseados : son aquellos riesgos  que eventualmente pudieran afectar a las per-  sonas.  La\tfigura\t7\tmuestra\tlas\tcategorías\tde\triesgo\t y\tla\tfigura\t8\tmuestra\tlas\tdimensiones\tespacia - les del riesgo.  Fig.7: Categorías de riesgo  Fuente: Mora, S., BID. Citado por GTZ-Gobierno Regio- nal de Piura.  Fig. 8: La dimensión  espacial del riesgo  Fuente: Ferradas, 2012.  2.5. Evaluación/Análisis del riesgo 2.5.1. Evaluación del riesgo  Una metodología para determinar la natura- leza  y  el  grado  de  riesgo  a  través  del  análisis   de  posibles  amenazas  y  la  evaluación  de  las   condiciones  existentes  de  vulnerabilidad  que  \n36  conjuntamente  podrían  dañar  potencialmente   a la población, la propiedad, los servicios y los   medios  de  sustento  expuestos,  al  igual  que  el   entorno del cual dependen  (UNISDR, 2009).  2.5.2. Análisis de riesgo  Es  una  interpretación  de  implicancia  meto- dológica en la evaluación del riesgo de una so-  ciedad en contextos existentes o futuros de fe-  nómenos naturales potencialmente peligrosos.   “En  su  forma  más  simple,  es  el  postulado  de   que el riesgo resulta de relacionar la amenaza   y la vulnerabilidad de los elementos expuestos,    con\tel\tfin\tde\tdeterminar\tlos\tposibles\tefectos\ty\t  consecuencias sociales, económicas y ambien- tales asociadas a uno o varios fenómenos peli- grosos en un territorio y con referencia a grupos   o unidades sociales y económicas particulares.   Cambios  en  uno  o  más  de  estos  parámetros    modifican\tel\triesgo\ten\tsí\tmismo,\tes\tdecir,\tel\tto - tal de pérdidas esperadas y las consecuencias   en un área determinada. Análisis de amenazas   y  de  vulnerabilidades  componen  facetas  del   análisis de riesgo y deben estar articulados con   este  propósito  y  no  comprender  actividades   separadas  e  independientes.  Un  análisis  de   vulnerabilidad  es  imposible  sin  un  análisis  de   amenazas, y viceversa” (Lavell, 2007). El  Análisis  del  Riesgo  es  una  metodolo-  gía\tpara\tidentificar\ty\tevaluar\tel\ttipo\ty\tnivel\tde\t  daños  y  pérdidas  probables  que  podría  tener   o  podría  producir  una  inversión,  a  partir  de  la    identificación\ty\tevaluación\tde\tla\tvulnerabilidad\t  de  esta  con  respecto  a  los  peligros  a  los  que   está expuesta. Es una herramienta que permite   diseñar  y  evaluar  las  alternativas  de  inversión   o\tacción\tcon\tla\tfinalidad\tde\tmejorar\tla\ttoma\tde\t  decisiones (MEF, 2006). El Análisis del Riesgo brinda seguridad a la  población y a las inversiones y actividades so-   cioeconómicas,\tidentificando\tpeligros,\tfactores\t  de vulnerabilidad, áreas afectables, daños pro-  bables,  proponiendo  acciones  de  mitigación  o   prevención y sensibilizando a los actores sobre   los riesgos existentes (MEF, 2006).  a. Pasos para el Análisis del Riesgo: El Análisis del Riesgo es un proceso que in- cluye  varios  momentos  o  pasos  que  se  debe   seguir. A continuación se presenta la secuencia   metodológica, propuesta por el Proyecto DIPE-  CHO en 2012: 1. Compromiso político, coordinación con las   autoridades. 2. Sensibilización  de  autoridades,  funciona- rios y técnicos de instituciones responsa- bles de la gestión del desarrollo. 3. Sensibilización  de  lideresas  y  líderes  co-  munitarios y de la población. 4. Conformación  de  Comisión  Técnica  res-  ponsable  de  hacer  el  análisis  del  riesgo,   con funcionarios y técnicos nombrados por   la entidad pública. 5. Recopilación de información y caracteriza- ción del territorio bajo análisis. 6. Capacitación sobre análisis del riesgo a los   actores participantes. 7. Inventario de desastres ocurridos (historia   de desastres)  8.\tIdentificación\ty\tanálisis\tde\tpeligros. 9.\tIdentificación\ty\tanálisis\tde\tvulnerabilidades. 10.\t Identificación\ty\tanálisis\tde\tactores:\tmapa\t  de actores.  11.\t Identificación\ty\tanálisis\tde\tcapacidades.  12.  Realización del Análisis del Riesgo y formu- lación de medidas de gestión del riesgo. 13.  Integración del Análisis del Riesgo, medi-  das de gestión del riesgo y Validación. 14.  Presentación,  divulgación  y  sensibiliza- ción  sobre  la  utilización  del  análisis  del   riesgo.  2.6. Análisis del Costo - Beneficio    de la Gestión del Riesgo  El\tAnálisis\tde\tCosto\t-\tBeneficio\t(ACB)\tde\tla\t  Gestión del Riesgo en países en vía de desa-  rrollo nos da un marco de referencia sistemáti-   co,\tayuda\ta\tevaluar\tla\teficiencia\tde\tuna\tmedi - da  de  reducción  del  riesgo  –comparando  sus   costos con la posible reducción de daños cau-  sados  por  un  desastre–,  muestra  la  solución    más\teficiente\tentre\tvarias\talternativas,\tpermite\t justificar\tinversiones\ten\tgestión\tdel\triesgo\tde -  mostrando\tsus\tbeneficios\t(Proyecto\tDIPECHO,\t  2012). Esta metodología comprende seis pasos:  1. Análisis de riesgo: intensidad y recurrencia. 2. Vulnerabilidad: exposición, fragilidad y capa-  cidad de recuperación. 3. Riesgo  potencial,  efectos  sin  gestión  del   riesgo. 4.  Costos de los proyectos de gestión del riesgo. 5. Riesgo  potencial,  efectos  con  gestión  del   riesgo.  6.\tBeneficio\tneto,\tla\treducción\tde\tpotenciales\t  efectos restando los costos de los proyectos   de gestión del riesgo.  Se  puede  aplicar  el  ACB  mediante  dos  op-  ciones,\tsegún\tla\tcalidad\ty\tsuficiencia\tde\tla\tin - formación con que se cuente: análisis genérico   (pasos  1  a  6)  o  análisis  basado  en  impactos   pasados  (pasos  3  a  6)  (PREDECAN  /  GTZ.   2006). \n37  La\tfigura\t9\tmuestra\tla\tincorporación\tdel\tAná - lisis de riesgo en los proyectos de inversión. Existen  varias  propuestas  metodológicas   para\tdesarrollar\tun\tanálisis\tde\triego,\ten\tla\tfi - gura 10, se muestra un esquema metodológico   seguido  por  la  experiencia  del  proyecto  DIPE-  CHO y publicada en el 2012.  2.7. Tres conceptos de amenazas  Las  amenazas  son  eventos  físicos  latentes,  o   sea  probabilidades  de  ocurrencia  de  eventos   físicos dañinos en el futuro (EGR, 2008). La  amenaza  (en  gestión  de  riesgos)  es  la  probabilidad  de  ocurrencia  en  un  tiempo  y  lu-  gar,  de  fenómenos  atmosféricos,  hidrológicos,   geológicos, que por razones de lugar en el que   ocurren,  su  severidad  y  frecuencia,  pueden   afectar  adversamente  a  los  seres  humanos,  a   sus estructuras o actividades (Angulo, 2006) Las amenazas son fenómenos de tipo natu- ral  o  socio  natural.  La  falta  de  adaptación  de   una región, su fragilidad o vulnerabilidad, con-  vierten un fenómeno en una amenaza (CTAR-  Piura, GTZ 1998).  La\tfigura\t11\tmuestra\tlos\tfactores\tque\tconfi - guran las amenazas.  La\tfigura\t12\tmuestra\tla\tclasificación\tde\tlas\t  amenazas según su origen. El cuadro 9 muestra los tipos de amenaza.  El peligro  El peligro, también llamado amenaza, es un  evento de origen natural, socionatural o antro-  pogénico que por su magnitud y características   puede causar daño (MEF, 2006). El cuadro 10   muestra los tipos de peligro.  La\tfigura\t13\tmuestra\tla\tclasificación\tde\tlos\t  principales peligros  2.8 Tres conceptos de vulnerabilidad  La  vulnerabilidad  es  la  condición  de  debilidad   o fragilidad que lleva a sufrir daños y la escasa   capacidad  para  anticipar,  resistir  y  recuperar- se del impacto de las amenazas (CTAR-Piura,   GTZ 1998). La  vulnerabilidad  es  la  susceptibilidad  de  una  unidad  social  (familias,  comunidad,  socie-  dad),  estructura  física  o  actividad  económica   que la sustentan, de sufrir daños por acción de   un peligro o amenaza (MEF, 2006). La  vulnerabilidad  es  el  “factor  de  riesgo  in- terno de un elemento o grupo de elementos ex-  puestos a una amenaza. Corresponde a la pre-  disposición o susceptibilidad física, económica,   política o social que tiene una comunidad de ser   afectada  o  de  sufrir  efectos  adversos  en  caso    de\tque\tse\tmanifieste\tun\tfenómeno\tpeligroso\tde\t  origen natural, socionatural o antrópico. Repre- senta también las condiciones que imposibilitan    o\tdificultan\tla\trecuperación\tautónoma\tposterior.\t  Fig. 9: Incorporación del Análisis de riesgo en los proyectos de inversión pública  Fuente: Mesa de Concertación para la Lucha contra la Pobreza, Cáritas del Perú, 2009. \n38  Fig. 10: Esquema metodológico del Análisis del Riesgo  Fuente: Proyecto DIPECHO: Fortaleciendo capacidades de sistemas subnacionales de gestión del riesgo y desarrollan- do la resiliencia de comunidades vulnerables a desastres, 2012. Las  diferencias  de  vulnerabilidad  del  contexto   social  y  material  expuesto  ante  un  fenómeno   peligroso determinan el carácter selectivo de la   severidad de sus efectos” (Lavell, 2007). La vulnerabilidad representa las característi- cas internas de los elementos expuestos a las   amenazas: población, asentamientos humanos,   producción, infraestructura, etc., que los hacen  propensos de sufrir daño al ser impactados por   distintos eventos físicos. La vulnerabilidad sig-   nifica\tuna\tfalta\tde\t‘resiliencia’\ty\tresistencia\ty,\t además,\tcondiciones\tque\tdificultan\tla\trecupe - ración  y  reconstrucción  autónoma  de  los  ele-   mentos\tafectados.\tSon\tespecíficas\ta\tdistintos\t tipos\tde\tamenaza,\tlo\tque\tsignifica\tque\tno\texis - ten  vulnerabilidades  generales,  sino  más  bien  \n39  Fig. 11: Factores que configuran las amenazas  Fuente: ITDG, 2005.  “naturales”   “socio-naturales”   “antropogénicos”  Clasificación\tde\tlas\t  amenazas según su origen  Fig. 12: Clasificación de las amenazas según su origen  Fuente: EGR, 2008. vulnerabilidades  con  referencia  a  amenazas   o\t conjuntos\t de\t amenazas\t específicas\t (EGR,\t  2008).  La\tfigura\t14\tmuestra\tla\tconceptualización\tde\t  vulnerabilidad. La vulnerabilidad es resultado de los propios  procesos de desarrollo no sostenible. La vulne- rabilidad  es  una  condición  social,  producto  de   los procesos y formas de cambio y transforma-  ción  de  la  sociedad.  Se  expresa  en  términos   de los niveles económicos y de bienestar de la   población,  en  sus  niveles  de  organización  so-  cial,  educación,  en  sus  características  cultura-  les e ideológicas; pero también en términos de   su localización en el territorio, en el manejo del   ambiente, en las características y  capacidades   propias para recuperarse y de su adecuación al   medio  y  a  los  peligros  que  este  mismo  medio   presenta. La vulnerabilidad es la propensión a   sufrir el daño o peligro, y no el daño en sí mis-  mo (MEF, 2006). El cuadro 11 muestra las variantes en el con- cepto de vulnerabilidad. La vulnerabilidad puede estar referida a una  persona,  un  grupo  de  personas  o  la  sociedad   en su conjunto; pero lo que caracteriza el con-  cepto de vulnerabilidad utilizado para el análisis   de los riesgos de desastre es que la vulnerabi- lidad está en función a una o varias amenazas   de  ocurrencia  de  fenómenos  potencialmente   destructivos (Ferradas, 2012).  La\tfigura\t15\tmuestra\tla\tRelación\t Pobreza\t  – Vulnerabilidad.  La\tfigura\t16\tmuestra\tlos\ttipos\tde\tVulnera - bilidad La vulnerabilidad puede ser vista o analizada  como proceso y como situación como se mues-  tra en el cuadro 12. Una  versión  reciente  asocia  la  vulnerabili- dad  con,  la  exposición,  la  fragilidad  y  la  resi-  liencia. La exposición referida a la debilidad de  \n40  Tipos de amenaza   Descripción   Ejemplos  Amenaza biológica   Un proceso o fenómeno de ori- gen orgánico o que se transpor- ta mediante vectores biológicos,   lo que incluye la exposición a   microorganismos patógenos,   toxinas y sustancias bioacti- vas que pueden ocasionar la   muerte, enfermedades u otros   impactos a la salud, al igual que   daños a la propiedad, la pérdida   de medios de sustento y de   servicios, trastornos sociales y   económicos, o daños ambien- tales. Brotes de enfermedades epi- démicas, contagios de plantas   o animales, insectos u otras   plagas e infestaciones Amenaza geológica   Un proceso o fenómeno geo- lógico que podría ocasionar   la muerte, lesiones u otros   impactos a la salud, al igual que   daños a la propiedad, la pérdida   de medios de sustento y de   servicios, trastornos sociales y   económicos, o daños ambien- tales. Terremotos, actividades y emi- siones volcánicas, y procesos   geofísicos\tafines\tcomo\tel\tmovi - miento de masas, aludes, des- prendimiento de rocas, derrum-  bes\ten\tla\tsuperficie\ty\tcorrientes\t  de barro o escombros Amenaza hidrometeorológica   Un proceso o fenómeno de   origen atmosférico, hidrológico    u\toceanográfico\tque\tpuede\t   ocasionar la muerte, lesiones   u otros impactos a la salud, al   igual que daños a la propiedad,   la pérdida de medios de sus- tento y de servicios, trastornos    sociales y económicos, o daños   ambientales. Ciclones tropicales (también co- nocidos como tifones y huraca- nes), tempestades, granizadas,   tornados, tormentas de nieve,   fuertes nevadas, avalanchas,   marejadas, inundaciones (entre   éstas las inundaciones repen- tinas), sequías, olas de calor y   de frío.  Las condiciones meteorológicas   también pueden representar   un factor para otras amenazas,   tales como aludes, incendios   forestales, plagas de langos- ta, epidemias, y el transporte   y la dispersión de sustancias   tóxicas y material de erupciones   volcánicas. Fuente: Estrategia Internacional para la Reducción de Desastres de las Naciones  Unidas (UNISDR). 2009. Terminología   sobre Reducción del Riesgo de Desastres.2009. Suiza. 43 p.  Cuadro 10: Los tipos de amenaza  Tipos  Descripción  Natural   Asociado a fenómenos meteorológicos, geotectónicos, biológicos, de carácter   extremo o fuera de lo normal. Socio natural   Corresponde a una inadecuada relación hombre-naturaleza; está relacionado   con procesos de degradación ambiental o de intervención humana sobre los   ecosistemas. Se expresa en el aumento de la frecuencia y severidad de los   fenómenos naturales o puede dar origen a peligros naturales donde no existían   antes y puede reducir los efectos mitigantes de los ecosistemas naturales. Tecnológico o   antrópico Está relacionado a procesos de modernización, industrialización, desregulación   industrial o la importación, manejo, manipulación de desechos o productos tóxi- cos. Todo cambio tecnológico, así como la introducción de tecnología nueva o   temporal, puede tener un papel en el aumento o disminución de otros peligros.  Cuadro 11: Tipos de peligro  Fuente. MEF, 2006. \n41  Concepto de vulnerabilidad según la teoría de  gestión de riesgos Concepto de vulnerabilidad según el lenguaje  del cambio climático  Susceptibilidad al daño que tienen los elementos   expuestos a una amenaza. También, grado por   el cual un sistema socio-económico es suscepti- ble o resiliente a los impactos de una amenaza.   Igualmente, la incapacidad de un grupo social   para anticiparse, resistir y recuperarse de los   impactos de una amenaza Grado por el cual un sistema es susceptible o   incapaz de enfrentarse a efectos adversos del   cambio climático, incluidas la variabilidad y los   extremos del clima. Es función del carácter,   magnitud y rapidez del cambio climático, de la   variación a la que un sistema está expuesto, de   su sensibilidad y de su capacidad de adaptación.  Cuadro 12: Variantes en el concepto de vulnerabilidad  Fuente: Angulo L., 2006.  Fig.13: Clasificación s y sus bienes ante las amenazas o peligros de   ocurrencia de fenómenos destructores y, por tanto, es necesario analizar   los procesos históricos y estructurales que determinan las condiciones de   vulnerabilidad.   Vulnerabilidad como  situación  La vulnerabilidad ha sido entendida como un conjunto de condiciones de las   personas y sus bienes que los hacen más sensibles y expuestas.  A las amenazas o peligros y por tanto el énfasis estará puesto en las condi- ciones de inseguridad en un momento dado.   Cuadro 13: Forma de ver o analizar la vulnerabilidad  Fuente: Ferradas, 2012.  Vulnerabilidad  Estructural   Coyuntural Producto de  prácticas sociales  o procesos de  desarrollo Ligada a condiciones  particulares en las  que se produce un  evento dañino  Fig. 16: Tipos de Vulnerabilidad  Fuente: Bernex y Tejada, 201  Factores   Descripción  Grado de   exposición Tiene que ver con decisiones y prácticas que ubican a una unidad social cerca a zonas    de\tinfluencia\tde\tun\tfenómeno\tnatural\tpeligroso.\tLa\tvulnerabilidad\tsurge\tpor\tlas\tcondi - ciones inseguras que representa la exposición, respecto a un peligro que actúa como   elemento activador del desastre. Fragilidad   Referida al nivel de resistencia y protección frente al impacto de un peligro/ amenaza,   es decir las condiciones de desventaja o debilidad relativa de una unidad social por las   condiciones socioeconómicas. Resiliencia   Este\ttérmino\tse\trefiere\tal\tnivel\tde\tasimilación\to\tla\tcapacidad\tde\trecuperación\tque\t   pueda tener la unidad social frente al impacto de un peligro-amenaza. Se expresa en    limitaciones\tde\tacceso\to\tadaptabilidad\tde\tla\tunidad\tsocial\ty\tsu\tincapacidad\to\tdeficien - cia en absorber el impacto de un fenómeno peligroso.  Cuadro 14: Factores que explican la vulnerabilidad  Fuente: MEF, 2006. \n44  más  vulnerables.  Sin  embargo,  no  hay  que   subestimar  la  solidaridad  como  activo  de  fun-  damental importancia en la generación de res-  puestas
