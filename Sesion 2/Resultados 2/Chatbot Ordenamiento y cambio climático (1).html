o-  líticas  de  ordenamiento  territorial  y  utilizar  a  la   ZEE  como  instrumento  técnico  que  orienta  la   toma decisiones y de sus actividades.  c) Realizar el monitoreo de las actividades y las   decisiones  tomadas  así  como  los  impactos  de   las mismas.  d)  Fortalecer  la  generación  de  información,  la   capacitación, la difusión y comunicación, el mo \n166  ejecución\tdel\tproceso\tde\tla\tZonificación\tEcoló-  gica y Económica - ZEE a nivel regional y local;   así como los aspectos relacionados a la macro-   zonificación\tnacional;  b) Proponer los mecanismos de consulta y par-  ticipación  ciudadana  y  procesos  de  difusión  y   capacitación; y  c) Emitir opinión y recomendaciones sobre nor- mas, procesos y metodologías vinculadas al Or- denamiento Territorial. En la conformación de la   Comisión Técnica, si las autoridades no pueden,   por  diferentes  motivos,  constituirla  (p.  ej.  alcal- des),  éstos  deben  de acreditar a sus represen- tantes  incluyendo  la  posibilidad  de  tomar  deci- siones  tanto  técnicas  como  políticas,  así  como   garantizar  su  continuidad  de  participación.  Es    importante\tmencionar\tque\tpara\tel\teficiente\tcum - plimiento  de  las  funciones  de  las  Comisiones   debe  de  incorporarse  una  partida  presupuestal   dentro de los Proyectos de Inversión Pública.  Las Comisiones Técnicas Regionales deben de   servir de órgano de apoyo y asesoramiento a las   Comisiones  Técnicas  Locales;  las  mismas  que   deberán organizarse en grupos de trabajo para   facilitar  las  actividades  contempladas  en  la  Di- rectiva de la Metodología de la ZEE.  nitoreo  y  supervisión,  el  análisis  en  la  gestión    de\tconflictos\tpor\tsuperposición\tde\táreas,\tentre\t otros,\tque\tse\tdefinirán\ten\tconcordancia\tcon\tla\t  realidad de cada unidad territorial y deberá es-   pecificarse\ten\tsu\trespectivo\treglamento\tde\tfun - cionamiento.  e) Brindar soporte técnico a las decisiones que   tomen los Gobiernos Regionales y Locales, las   Mancomunidades y los Comités de Gestión de   Cuencas en ZEE y OT.  f) Evaluar y validar las propuestas de ZEE y OT   en los diferentes niveles de estudio.  g)  Participar  de  la  elaboración  del  Proyecto   de  Inversión  Pública  de  Desarrollo  de  Capa- cidades  para  el  OT  en  los  otros  niveles  y  de   Proyectos  de  Inversión  Pública  que  faciliten  la   implementación de los planes, programas y ac-  tividades priorizadas en los Planes de Ordena-  miento Territorial. h) Participar de la supervisión   y control social de las decisiones que se tomen   en el territorio.  1.5 Promover y definir responsabilidades de    gestión a las Subcomisiones Técnicas  Las  Subcomisiones  o  Grupos  de  Trabajo  se   crean al interior de la Comisión Técnica Regio- nal /Local de ZEE y OT como apoyo a la ade-  cuada gestión del proceso de ZEE, de acuerdo   a  la  realidad  y  dinámica  de  las  unidades  terri-  toriales.  a) En la generación, procesamiento, análisis   y actualización de información:  -  Generar,  procesar  y  sistematizar  la  informa-  ción técnica de utilidad para los procesos ZEE   y OT. - Recopilar y actualizar la información de   utilidad para ZEE y OT.  -  Elaborar  propuestas  para  la  estandarización   de la información. - Estandarizar criterios y me-  todologías en uso y recopilación de información   técnica.  - Elaborar estudios y documentos sobre ZEE y   OT; donde participen activamente las universi- dades.  - Establecer protocolos para la estandarización   de criterios en el procesamiento, análisis y ac-  tualización de la información.  - Crear y establecer el Sistema Regional de In-  formación  Georeferenciada,  para  la  actualiza- ción de la información.  - Crear y diseñar el Sistema de Información Te-  rritorial  Regional  para  la  implementación  de  la   fase de Evaluación, monitoreo y actualización.  b)  En  la  difusión,  socialización,  sensibiliza-  ción y capacitación:  - Fortalecer de capacidades locales a nivel ins-  titucional  y  sociedad  civil,  en  SIG  y  teledetec- ción,  (preferentemente  al  personal  de  planta)   en manejo sostenible del territorio, marco legal,   ZEE y OT, manejo de recursos naturales y cul-  turales, conservación de la biodiversidad. \n167  - Formar facilitadores para los procesos de con-  certación y difusión en temas de ZEE y OT.  - Elaborar un plan de capacitación, sensibiliza- ción  y  difusión.  Diseño  de  estrategias  de  difu-  sión participativa.  c) En la concertación y participación:   -  Establecer  alianzas  estratégicas  entre  las   comisiones  técnicas  regionales  y  locales  con   organizaciones  públicas,  privadas  y  sociedad    civil,\ta\tfin\tde\tempoderar,\tcomprometer,\tconsen - suar los procesos de ZEE y OT y de concretizar   la participación de las diversas organizaciones   sociales de base.  -\t Generar\t espacios\t de\t discusión,\t reflexión\t y\t  concertación.  - Determinar los criterios de participación y con-  certación de acuerdo a la legislación.  -  Seguimiento,  evaluación  y  control  de  la  par-  ticipación  y  cumplimiento  de  los  compromisos   asumidos por los miembros de las comisiones   técnicas; y en la toma de decisiones.  d) En el seguimiento, monitoreo y sistematiza-  ción:  -  Elaborar  y  ejecutar  el  plan  de  seguimiento  y   monitoreo.  -  Seguimiento  y  control  con  las  instituciones   públicas,  privadas  y  de  la  sociedad  civil  en  la   aplicación y utilización de la ZEE y OT.  - Generar espacios de discusión para la articu-  lación de los procesosZEE y OT en los planes   de desarrollo, dentro de los sistemas regionales   de desarrollo  1.6  Promover  y  fortalecer  mecanismos  de   articulación  interinstitucional  en  los  proce-  sos de ZEE  a) Asegurar que los Proyectos de Inversión Pú-  blica estén orientados a la formulación e imple- mentación de los planes, programas y activida- des priorizadas en los Planes de Ordenamiento   Territorial.  b) Elaborar y promover la Estrategia de Difusión   e Información de la ZEE incluyendo la inserción   curricular para el sistema educativo.  c)\tIdentificar,\tprevenir\ty\tresolver\tconflictos\tde\t  superposición territorial por uso y ocupación en   coordinación  con  Defensoría  del  Pueblo  y  la   PCM.  d) Promover la estrategia de educación, comu-  nicación, difusión y socialización de los proce-  sos de ZEE.  e)\t Identificar\t y\t promover\t los\t mecanismos\t de\t sostenibilidad\ttécnica,\tcientífica,\tsocial,\tpolítica\t y\tfinanciera\tde\tlos\tprocesos.  f) Asegurar el conocimiento y aplicación de las   normas  del  ordenamiento  jurídico  vinculado  al   proceso de ZEE y OT.  g) Aplicar la Gestión Ambiental y Valoración Eco- nómica de Recursos Naturales y Culturales. \n168  h) Incentivar el Manejo de Sistemas de Informa-  ción\tGeográfica.  i) Fomentar la Gestión de Riesgos, Cambio Cli-  mático y Servicios Ambientales.  1.7 Promover y fortalecer capacidades polí- ticas en los tomadores de decisiones  Los tomadores de decisiones (los consejos re-  gionales y municipales, autoridades regionales,   locales  y  comunales,  líderes  políticos)  consti-  tuyen  actores  prioritarios  no  sólo  para  llevar  a   cabo  estos  procesos  sino  para  brindarle  sos-   tenibilidad\t política,\t financiera\t y\t respaldo\t a\t la\t  implementación de los mismos, así como para   promover  la  concordancia  y  articulación  entre   los  planes  de  desarrollo  concertado  con  las   recomendaciones  y  orientaciones  de  la  ZEE  y   OT. Es necesario que los candidatos que aspi-  ren llegar al gobierno nacional, gobiernos regio- nales y locales incluyan compromisos de imple- mentar  y  mantener  una  instancia  responsable   para darle continuidad al proceso.  a)  En  la  eficiencia  en  la  ejecución  presu -  puestal – proyectos de impacto con baja ex-  posición.  - Establecer lineamientos y formular criterios e   indicadores  para  evaluar  la  inversión  pública,   con  los  aportes  presentados  por  las  Comisio- nes Técnicas, desde la perspectiva de la locali- zación y sus relaciones con las potencialidades   y  limitaciones  del  territorio  y  de  los  recursos   naturales generadas por la ZEE y los procesos   de  OT,  a  través  del  MINAM  y  el  Ministerio  de   Economía y Finanzas – MEF.  - Formular y ejecutar proyectos para el proceso   de ZEE y OT que no generen grandes impactos   ambientales.  b)  En  los  Presupuestos  Participativos,  Pla-  nes Sectoriales, Plan Multianual de Inversión   Pública y Planes de Desarrollo Concertado.  - Considerar la transversalidad de la ZEE y OT   y  ser  parte  de  los  criterios  orientadores  para   las iniciativas e inversiones en los niveles de- cisores.  -  Establecer  mediante  normas  de  carácter  na-  cional, regional y local, como un requisito prio-  ritario  y  excluyente,  la  aplicación  de  la  ZEE  y   OT  en  el  proceso  de  elaboración  e  implemen- tación de proyectos de inversión pública en sus    diferentes\t niveles\t (perfil,\t prefactibilidad,\t facti - bilidad,  expediente  técnico),  donde  el  MINAM,   MEF  y  CEPLAN  coordinarán  con  el  Comité   Técnico Consultivo de Ordenamiento Territorial   y Comisiones Técnicas Regionales.  - Incluir en los Instructivos de Presupuesto Par-  ticipativo  que  socializa  el  MEF  para  los  proce-  sos regionales y locales la inclusión de criterios   de aplicación de ZEE y OT.  -  Contar  con  Reglamentos  de  Aplicación  de  la   ZEE, en los ámbitos territoriales donde han sido   aprobadas,  estableciendo  su  articulación  obli-  gatoria\tcon\totros\tinstrumentos\tde\tplanificación\t  y gestión del territorio  c) En la dirección de los proyectos de inver-  sión pública y privada.  - Articular el Sistema Nacional de Inversión Pú-  blica\ta\tla\tZEE\ty\tOT,\ta\tfin\tde\tdeterminar\tlos\tim - pactos de los proyectos de inversión en aque- llos  espacios  con  procesos  de  ZEE  y  POT  en   marcha.  -  Orientar  los  proyectos  con  inversión  privada   respetando\tla\trealidad\tgeográfica,\tsocioeconó - mica  y  cultural  de  su  población  y  acorde  a  lo   establecido por los planes de ordenamiento te-  rritorial y las recomendaciones de la ZEE. \n169  -\tDefinir\tlos\tlineamientos\tque\torienten\tla\tinver - sión pública y privada, de acuerdo a los resul-  tados de la ZEE y OT de los diversos ámbitos   jurisdiccionales del país. El MINAM y el MEF a   través de la Dirección General de Programación   Multianual del Sector Público, la Secretaría de   Descentralización de la Presidencia del Conse- jo  de  Ministros,  Pro  Inversión,  el  Ministerio  de   Producción, el Ministerio de Turismo y Comer-  cio Exterior, el Ministerio de Energía y Minas, el   Ministerio  de  Agricultura,  el  Ministerio  de  Cul-  tura, la Asamblea de Gobiernos Regionales en   coordinación del Comité Técnico Consultivo de   Ordenamiento Territorial y las Comisiones Téc-  nicas Regionales.  -  Incorporar  indicadores  de  evaluación  de  im-  pactos de los Proyectos en el SNIP.  d) En Cooperación internacional  -  Orientar  el  apoyo  de  la  cooperación  técnica   internacional  en  función  a  la  información  y  re-  comendaciones de la ZEE y los planes de orde-  namiento territorial en proceso, promoviendo el    apoyo\ttécnico\ty\tfinanciero\ta\tlas\tpotencialidades\t  y  limitaciones  que  tiene  cada  territorio  de  ma-  nera particular.  - Establecer los mecanismos para que la Coope- ración  Técnica  Internacional  -  CTI,  incluyendo   el programa de canje de deuda por naturaleza,   contribuya con el proceso de ZEE en su fase de   aplicación, a través del MINAM conjuntamente   con la Agencia Peruana de Cooperación Técni-  ca Internacional – APCI, el Ministerio de Rela- ciones Exteriores y el MEF.  - Elaborar un programa bienal de concertación   con  la  Cooperación  Técnica  Internacionalpara   la implementación de la ZEE y OT.  1.8 Promover y fortalecer capacidades edu-  cativas en centros de formación  Uno  de  los  problemas  de  la  educación  en  el   país es su aislamiento y divorcio de la realidad   nacional. La ZEE genera información física, bio-  lógica, socioeconómica, histórico cultural y am-  biental, así como de las potencialidades y limi-  taciones que tiene un territorio determinado. Al   mismo tiempo, es necesario que las futuras ge-  neraciones conozcan la importancia de la ZEE   para una adecuada gestión del territorio y de los   recursos  naturales  y  culturales,  pues  si  se  de-  sea lograr la sostenibilidad de los procesos de   ZEE y OT en el largo plazo implica actuar en el   sistema educativo. Un cambio de actitudes, en   las nuevas generaciones, en busca de conciliar   los intereses de la conservación del patrimonio   natural y cultural con el uso y aprovechamiento   sostenible de los recursos naturales, es posible   mediante la educación ambiental.  a)  De  la  inserción  en  la  currícula  educativa   escolar,  técnica  y  universitaria  la  informa-  ción generada en la ZEE:  -  Promover  el  involucramiento  de  las  universi- dades,  instituciones  educativas  primarias,  se-  cundarias,  técnicas  locales  y  universitarias  en   la ZEE y OT. En este sentido es necesario de-  sarrollar capacidades en dichos centros de es-  tudios y promover la incorporación de la ZEE y   OT y de la información generada en la currícula   educativa.  - Establecer los mecanismos para incorporar en   la currícula educativa, desde el nivel inicial has-  ta el universitario, el nuevo conocimiento gene- rado  en  la  ZEE  y  OT,  mediante  los  Gobiernos   Regionales, con el soporte técnico del MINAM,   Ministerio  de  Educación  y  la  Asamblea  Nacio- nal de Rectores.  - Insertar las recomendaciones de la ZEE a los   procesos  de  alfabetización  (educación  no  for-  mal), con apoyo de las Municipalidades. \n170  - Articular la agenda de estudios e investigación   sobre el territorio y el ambiente con las capaci- dades establecidas en las instituciones univer- sitarias regionales que permitan ser un soporte   de la actualización de la ZEE y OT, en sus di-  versos niveles.  -  Fortalecer  las  capacidades  de  los  docentes   para la efectiva adecuación curricular e investi-  gación de estudios sobre la ZEE y OT.  - Promover un programa de investigación apli- cada en función a las potencialidades y limita-  ciones del territorio y que éstos puedan incluso   ser  elaborados  en  el  formato  del  Sistema  Na-   cional\tde\tInversión\tPública\ta\tfin\tde\tponerlos\ta\t  disposición  de  los  presupuestos  participativos   locales  y  regionales  para  la  priorización  de  la   inversión pública.  - Promover planes de negocios sostenibles en   base al capital natural y cultural existente.  -\t Priorizar\t la\t investigación\t científica\t aplicada\t  a  la  ZEE,  que  incluya  gestión  de  recursos,  sis   temas\t de\t información\t geográfica,\t ecología\t y\t  restauración de paisajes, biología de la conser-  vación,  geografía  humana,  patrimonio  cultural,   valoración  de  los  recursos  naturales,  servicios   ambientales, etc. Todos estos temas deben ser   generados  por  las  universidades  y  otros  cen-  tros académicos e integrados en sus currículas   para empoderar la difusión de las ZEE.  1.9  Promover  y  fortalecer  capacidades  le-  gales a los operadores de justicia nacional,   regional y local  La única forma para que se cumpla la obligato- riedad de la ZEE una vez que ésta sea aproba- da es a través de la generación de instrumentos   normativos que la sustenten. Los instrumentos    para\tla\tplanificación\tdel\tterritorio\ty\tel\tmarco\tle - gal  que  los  ampara  requieren  ser  tomados  en   cuenta  como  parte  de  una  educación  y  cultu-  ra,  asimismo  ser  conocidos  y  manejados  por   los  que  administran  justicia  y  orden  público,   al  momento  de  ejercer  sus  funciones.  En  este   sentido  se  hace  necesario  involucrarlos  como   actores claves en la fase de implementación de   la ZEE y POT.  a)  En  capacitación  sobre  instrumentos  de    planificación del territorio.  -  Diseñar  materiales  de  difusión  y  programar   eventos\t de\t capacitación\t a\t jueces,\t fiscales,\t  procuradores públicos y miembros del Tribunal   Constitucional  sobre  el  uso  y  aplicación  de  la   ZEE  dentro  de  los  procesos  civiles,  penales  y   constitucionales,  a  través  del  MINAM,  Minis-  terio  Público,  Ministerio  de  Justicia,  Tribunal   Constitucional,  Ministerio  del  Interior  conjunta- mente con los Gobiernos Regionales y Gobier-  nos Locales.  -  Elaborar  un  Programa  Nacional  de  capaci- tación  sobre  uso  y  aplicación  de  la  ZEE  a  29   Distritos Judiciales sobre uso y aplicación de la   ZEE y OT.  -  Elaborar  un  compendio  de  normas  comenta-  das relacionadas a la ZEE y OT, el patrimonio   natural  y  cultural,  el  aprovechamiento  sosteni-  ble  de  los  recursos  naturales  y  su  importancia   en procesos de administración de justicia, diri-  gido a los operadores de justicia.  -  Generar  espacios  de  capacitación  a  los  Pro-  curadores  Públicos  Provinciales  y  Distritales   por parte de los Gobiernos Regionales.  b) Para el establecimiento de un sistema de   actuación procesal vinculada al uso y apro-  vechamiento sostenible de los recursos na-  turales, culturales y el ambiente. \n171  -\tFacilitar\tinformación\ttécnica\ty\tcientífica\tque\t  complemente  el  marco  legal  y  promueva  su   cumplimiento, la ejecución y la aplicación coer-  citiva  de  la  ZEE,  para  el  ejercicio  de  acciones   legales  vinculadas  al  uso  y  aprovechamiento   sostenible de los recursos naturales a los ope-  radores  de  justicia  del  Estado  –  Procuradores   Públicos.  -\tCrear\toficinas\tresponsables\tde\totorgar\tla\tinfor - mación de la ZEE a sus operadores de justicia,   de manera coordinada el MINAM, Ministerio de   Justicia,  Ministerio  Público,  Tribunal  Constitu-  cional  y  los  Gobiernos  Regionales,  articulado   por la OEFA.  - Elaborar un manual sobre la actuación proce-  sal con aplicación de la ZEE como medio pro-  batorio.  1.10 Promover y fortalecer capacidades co-  municacionales  en  la  ciudadanía  y  los  co-  municadores sociales  Cuando  se  han  formulado  propuestas  de  pla-  nes  y  proyectos  sólo  con  participación  de  los   técnicos  y  profesionales  encargados  de  las    tareas\tde\tplanificación,\testos\tdocumentos\tno\t  han  sido  aplicados.  La  experiencia  nos  revela   que la única manera de garantizar la sostenibili- dad de los procesos es con participación activa   de  los  actores  sociales.  La  participación  tiene   como  propósito  dos  aspectos  claves:  Primero,   incorporar  en  la  ZEE  el  conocimiento  tradicio- nal  de  los  actores  sociales  sobre  su  territorio   y, segundo, socializar el uso de la información   para  el  diseño  de  diversos  instrumentos  de   gestión  del  desarrollo.  De  esta  manera  se  tra-  ta de contribuir a los procesos de concertación   sobre la ocupación y uso adecuado del territo-  rio. Asimismo, se trata de estimular canales de   difusión  y  socialización  de  los  avances  de  la   implementación de la ZEE y provocar espacios   de retroalimentación que permitan fortalecer la   base ciudadana. a)  Diseñar  estrategias  comunicacionales  y  de   sensibilización para la población, utilizando me-  todologías  prácticas  y  sencillas  que  permitan   canalizar  la  participación  de  los  actores  socia-  les en los diversos niveles, a través de los Go-  biernos  Regionales  y  Locales  en  coordinación   con  el  MINAM  y  sus  respectivas  Comisiones   Técnicas.  b)  Implementar  un  programa  de  difusión,  sen-  sibilización,  capacitación  y  participación,  de   modo  que  los  procesos  de  ZEE  y  OT  sean   transparentes.  c) Desarrollar e implementar un sistema de in-  formación  interactiva  que  permita  el  acceso  a   nivel  individual  e  institucional,  que  articule  di-  ferentes  temáticas  entre  el  nacional  con  el  re-  gional, que orienten y fortalezcan los espacios   periodísticos  y  se  maneje  adecuadamente  la   ZEE.  LINEA ESTRATÉGICA 2: POLÍTICAS PÚBLICAS ORIENTADAS A PROYECTOS DECLARA- DOS DE INTERÉS NACIONAL  La principal amenaza a los procesos de ordenamiento territorial, relacionada con los megapro- yectos y proyectos de interés nacional, por lo general se centra en factores externos o no contro-  lados\ty\tque\tcasi\tsiempre\tno\tse\tconsideran\tcomo\tparte\tde\tla\tplanificación\tde\tlos\tmismos.\tTemas\t  como la apropiación espontánea del territorio y de los bienes naturales (que puede ser promovida   indirectamente  por  los  mismos  proyectos),  pueden  desatar  procesos  de  uso  y  ocupación  des-  ordenada del territorio a mediano y largo plazo, lo cual genera el incremento de las zonas con    conflicto\tde\tuso\ty\tocupación.  Objetivos Estratégicos   Acciones 2.1 Contribuir a que la ZEE sea la herramien-  ta  que  permita  conciliar  los  intereses  loca-  les, regionales y nacionales de la conserva- ción del patrimonio natural y cultural con el   aprovechamiento sostenible de los recursos   naturales.  a)  Enfatizar  que  la  ZEE  propone  recomenda- ciones  para  el  uso  sostenible  de  los  recursos   naturales y el proceso de ocupación ordenada   del territorio, que contribuyen a conciliar los in-  tereses  locales,  regionales  y  nacionales  de  la   conservación  del  patrimonio  natural  y  cultural   con  el  aprovechamiento  sostenible  de  los  re-  cursos naturales. \n172  b) Establecer los mecanismos necesarios para   la articulación de la ZEE a los procesos de for-  mulación de planes de ordenamiento territorial   y de desarrollo en general a nivel sectorial, re-  gional  y  local,  a  través  del  MINAM,  conjunta- mente  con  el  Ministerio  de  Economía  y  Finan-  zas,  la  Secretaria  de  Descentralización  de  la   Presidencia  del  Consejo  de  Ministros-PCM  y   el Centro Nacional de Planeamiento Estratégi-  co-CEPLAN, así como los demás sectores co-  rrespondientes y con los Gobiernos Regionales   involucrados.  c) Priorizar la elaboración de propuestas de ZEE   y OT a mayor detalle, respetando los territorios   intangibles  en  sus  tres  niveles  y  su  posterior   implementación,  en  las  unidades  territoriales   que se sobreponen a los proyectos declarados   como de interés nacional.  d) Construir de manera concertada los criterios   mínimos\tpara\tla\tdefinición\tde\tpolíticas\tpúblicas\t y\tproyectos\tde\tinterés\tnacional\ta\tfin\tde\tevitar\t conflictos.  e)  Priorizar  el  fortalecimiento  de  mecanismos   de  articulación  intergubernamental  y  consulta   con  los  gobiernos  regionales  y  locales,  socie-  dad civil y comunidades campesinas y nativas,    desde\tla\tplanificación\tde\tlos\tmegaproyectos.  f) Realizar una campaña de comunicación y di-  fusión para entender que la ZEE no es un freno   para el desarrollo nacional, sino que tiene como   propósito  proveer  de  información  técnica  para   orientar la inversión pública y privada en zonas   de  interés  del  país  y  contribuir  a  disminuir  el    riesgo\tfinanciero,\tsocial\ty\tambiental\tque\tcon - templa una inversión de gran envergadura.  g)  Construir  de  manera  participativa  escena-  rios\tprevisibles\ten\tbase\ta\tlas\tmodificaciones\tde\t  usos  de  tierra  debido  a  megaproyectos;  estos   análisis de escenarios deben ser integrados jun-  to con las evaluaciones de impactos socioeco- nómicos, culturales y ambientales, y deben ser    incluidos\ten\tla\tplanificación\testratégica.  2.2 Elaborar y aprobar la Política y Directiva   Nacional para la incorporación de la ZEE en    los procesos de planificación  A  nivel  nacional  y  de  manera  particular  en  la   cuenca andino amazónica el cambio de uso de    la\ttierra,\tsin\tla\tdebida\tplanificación,\tcasi\tsiem - pre es negativo y puede implicar el incremento   de la tasa de deforestación y el aumento de la    superficie\tde\tlas\tzonas\tcon\tconflicto\tde\tuso,\tasí\t  como la pérdida o disminución de los servicios   ambientales reales y potenciales.  a) Elaborar, concertar y aprobar una Política y   Directiva\tNacional\tque\tdefina\tlos\tmecanismos\t  y  procedimientos  para  que  los  diversos  secto-  res públicos, Gobiernos Regionales y Locales,   incorporen la información y se acaten las reco-  mendaciones  y  restricciones  de  las  categorías    de\tuso\tde\tla\tZEE\ten\tsus\tprocesos\tde\tplanifica - ción e inversión. \n173  b) Ejecutar la Política y Directiva Nacional para   la incorporación de la ZEE en los procesos de    planificación\tsectorial\ty\tregional;\tasí\tcomo\ten\tel\t  desarrollo de la ZEE (formulación e implemen- tación) en las unidades territoriales donde exis-  tan o se hayan priorizado proyectos de interés   nacional, tales como:  -  Megaproyectos:  Programa  de  Infraestructura   Vial – IIRSA Norte, Centro y Sur, Proyecto Ca-  misea,  Proyectos  Hidroenergéticos  e  Hídricos   (Inambari, San Gabán, Madre de Dios – Puno,   Junín,  etc.),  Proyectos  de  Trasvase  (Olmos,   Alto  Piura,  Huallaga,  etc.)  y  Proyectos  Trans-  fronterizos.  -  Hidrocarburos:  Zonas  de  Conservación  del   Patrimonio  Natural  y  Lotes  Petroleros,  Territo-  rios Indígenas y Petróleo, Monitoreo de las acti-  vidades petroleras.  -  Minería:  Tratamiento  en  zonas  de  conserva- ción del patrimonio natural y cultural, Territorios   de Comunidades Campesinas y minería, Moni-  toreo de las actividades mineras.  - Agricultura a Gran Escala: Desarrollo de cul-  tivos industriales para la producción de alimen- tos y de aceites carburantes (biocombustibles).  - Otros: Forestación, reforestación, infraestruc-  tura productiva y social, etc.  c) Exigir el uso y realizar un manual para la va-  loración económica y ecológica de los impactos   que generan la implementación de los proyec-  tos  de  interés  nacional,  usando  como  insumo   las recomendaciones de uso de la ZEE.  LINEA ESTRATÉGICA 3: GOBERNANZA E INSTITUCIONALIDAD  La\tGobernanza,\tentendida\tcomo\tla\teficacia,\tcalidad\ty\tbuena\torientación\tde\tla\tintervención\tdel\t  Estado, mediante la interacción efectiva entre sus distintos niveles de gobierno, es una condicio- nante necesaria para seguir avanzando en el proceso de implementación de la ZEE. La siguiente   línea estratégica está orientada al diseño y construcción de mecanismos y regulaciones para la   adecuada articulación y coherencia entre los diversos sectores y tomadores de decisión, lo cual   deberá priorizar la elaboración y aprobación de la Ley de Ordenamiento Territorial con su respec-  tiva reglamentación.  Objetivos Estratégicos   Acciones 3.1  Integrar  y  concordar  las  normas  a  nivel   sectorial con los procesos de OT a nivel re-  gional y local  Las  ordenanzas  vinculadas  a  los  procesos  de   ZEE y OT, al tener el rango de ley, deben ser   respetadas  y  aplicadas  dentro  de  las  políticas   de uso y ocupación del territorio de una jurisdic- ción por todos los niveles de gobierno y secto-  res, la sociedad civil y sector privado. a)  Realizar  un  protocolo  de  presentación  de    las\t Zonificaciones\t Ecológicas\t y\t Económicas,\t el\tmarco\tlegal,\tcientífico\ty\ttécnico,\taprobado\t  y  publicado  a  los  sectores  e  instituciones  que   desarrollan actividades vinculadas al uso y ocu-  pación del territorio dentro de las diferentes ju-  risdicciones.  b)  Diseñar  y  elaborar  una  base  de  datos  para   que  los  ministerios  se  articulen  con  las  ZEE   aprobadas en niveles macro, meso y micro.  3.2  Desarrollar  las  recomendaciones  de  las   categorías de uso de la ZEE  Se hace necesario que las recomendaciones de   las  categorías  de  uso  que  proporciona  la  ZEE    sean\tdetalladas\ttécnicamente,\tcon\tla\tfinalidad\t  de evitar confusiones en un mismo espacio. a)  Coordinar  con  los  Gobiernos  Regionales  y   Locales  la  elaboración  del  reglamento  de  la   ZEE  aprobada,  según  los  tipos  de  zonas  eco-  lógicas  económicas  determinadas  de  manera    específica\ty\tdetallada.\tb)\tElaborar\tel\tManual\tde\t  aplicación  de  las  recomendaciones  y  activida- des de la ZEE según las diferentes zonas. \n174  3.3  Fortalecer  el  Ordenamiento  Jurídico  y   Reglamentación  Según  el  artículo  11°  de  la  Ley  N°26821  re-  glamentada  por  el  D.S.N°  087-2004-PCM,  se-  ñala  el  uso  de  la  ZEE  como  instrumento  téc-  nico\torientador\tde\tla\tplanificación\ty\tla\tgestión\t  territorial,  por  los  sectores  e  instituciones  que   cuentan con normas propias para el ejercicio de   sus funciones, deben consolidar un solo marco   jurídico que ordene el uso transversal y base de   la ZEE, dentro de sus políticas y planes tanto a   nivel nacional, regional y local.  Las  experiencias  han  demostrado  que  el  des-  conocimiento  de  ZEE  por  parte  de  otras  insti-  tuciones  genera  impactos  negativos  por  tomar   decisiones haciendo caso omiso a la ZEE. a)  Formular  la  propuesta  de  Ley  de  Ordena-  miento Territorial, a través del MINAM y el Co-  mité  Técnico  Consultivo  de  Ordenamiento  Te-  rritorial.  b) Elaborar Reglamentos Regionales validados   por  los  Comités  Técnicos  Regionales  de  ZEE   y OT.  c) Establecer las directivas regionales sobre los   usos y las recomendaciones establecidas en la   ZEE.  d) Establecer la jerarquía de normas y propiciar   la conciliación de los diversos niveles de gobier-  no\ty\tlos\tsectores,\ta\tfin\tde\tevitar\tsuperposición\t  de derechos e incompatibilidad de usos.  3.4  Crear  espacios  de  diálogo  y  concerta-  ción  inclusivos  multidisciplinarios  e  inte-  rinstitucionales  En  la  actual  coyuntura  nacional,  los  espacios   de  diálogo  y  concertación  son  fundamentales   para  prevenir,  orientar  y  concordar  acuerdos   que\tcontribuyan\ta\tla\tsolución\tde\tlos\tconflictos\t  socioambientales, éstos se hacen más viables   cuando lo que se pone en la mesa es informa-  ción  técnica  y  de  gestión  que  permita  a  todos   los actores (políticos, técnicos, sociales) enten-  der\tla\tdinámica\tde\tun\tterritorio\ty\tdefinir\tobjeti - vos conjuntos para el desarrollo sostenible del   país. a)  Institucionalizar,  con  apoyo  de  la  Presiden- cia del Consejo de Ministros-PCM, espacios de   diálogo y concertación como un ente que reúne   a una diversidad de actores para contribuir con    la\tsolución\tde\tconflictos,\tevitar\tsuperposiciones\t  y  contradicciones  normativas  en  la  aplicación   de  la  herramienta  de  la  ZEE,  en  los  cuales  el   Comité  Técnico  Consultivo  de  Ordenamiento   Territorial  en  coordinación  con  las  Comisiones   Técnicas de acuerdo a sus respectivas jurisdic- ciones, sean el soporte de los mismos.  3.5 Capacitar y socializar la transversalidad   de la ZEE  Como  una  acción  preventiva  se  debe  contar   con  conocimientos  básicos  sobre  la  normativa   que da el carácter obligatorio a la aplicación y   transversalidad de la ZEE, como un instrumento   técnico que orienta y enriquece la cultura terri-  torial, dentro de los roles y funciones de institu-  ciones inherentes y vinculadas en cuanto al uso   y aprovechamiento de los recursos naturales. a) Elaborar un Programa Nacional de Capacita- ción en temas de ZEE y OT dirigido a fortalecer   capacidades de las Defensorías del Pueblo en   el uso y aplicación de la ZEE, a la Contraloría   General  sobre  el  cumplimiento  obligatorio  de   la  ZEE  como  instrumento  técnico  que  orienta    la\t planificación\t y\t gestión\t territorial,\t así\t como\t  al  Poder  Judicial  y  las  Fiscalías,  a  través  del   MINAM. b) Insertar un temario acerca del pro-  ceso de ZEE y OT y sus múltiples aplicaciones   en el Sistema Administrativo de Gestión de los   Recursos  Humanos  –  Autoridad  Nacional  del   Servicio Civil.  3.6  Estandarizar  el  sistema  de  información   y monitoreo  El  propósito  es  lograr  el  compromiso  y  la  par-  ticipación  de  las  diversas  entidades  del  sector   público,  privado  y  sociedad  civil  en  el  proceso   de ZEE y OT, en concordancia con sus roles y   funciones. Así mismo, lograr que la información   generada en los procesos de ZEE y OT sea el   sustento  técnico  para  la  formulación  de  políti-  cas,  planes  de  desarrollo,  planes  de  ordena- miento territorial, proyectos de inversión pública   en el ámbito nacional, regional y local, e incluso   de proyectos de cooperación internacional  a) En el Sistema de Información  -  Brindar  información  espacial  debidamente   georeferenciada,  con  información  en  formato   de  base  de  datos  y  metadata,  que  facilite  la   evaluación,  integración  y  actualización  de  los   procesos de ZEE.  -  Ejecutar  el  Plan  de  Implementación  de  la   Infraestructura  de  Datos  Espaciales  del  Perú-  IDEP, a través de la PCM, conjuntamente con   las  entidades  de  gobierno  que  forman  nodos   del IDEP.  - Establecer un programa de requerimientos de   información para el proceso de ZEE en el país,   señalando los requisitos para la homogeniza- \n175  ción y estandarización de criterios, reglas para   el intercambio de la información, manejo de la   base de datos nacional y su articulación con los   sistemas territoriales regionales y locales, a tra-  vés del MINAM.  - Implementar un Sistema de Información Terri-  torial Regional.  - Elaborar guías de consulta para el uso práctico   de  la  ZEE,  que  contemple  ejemplos  concretos   del  desarrollo  de  actividades  económicas-pro- ductivas;  iniciativas  de  conservación;  proyec- tos  de  reforestación,  recuperación  de  áreas   degradadas y restauración del paisaje forestal;   proyectos  urbano  industriales;  y  territorios  con   restricciones de uso, como el caso de la Áreas   Naturales  Protegidas,  entre  otros;  a  través  del   MINAM, conjuntamente con el Comité Técnico   Consultivo y las Comisiones Técnicas Regiona- les.  b) En el Sistema de Monitoreo, Evaluación y   Actualización  -  Diseñar  y  elaborar  un  sistema  de  monitoreo   y evaluación de la implementación de la ZEE y    OT,\ttanto\ta\tnivel\tnacional,\tregional\ty\tlocal,\ta\tfin\t  de facilitar la formulación y evaluación de polí-  ticas y planes de desarrollo y de ordenamiento   territorial.  - Implementar un programa de monitoreo y eva-  luación del proceso de ZEE a nivel nacional, a   través del MINAM.  - Desarrollar un programa de monitoreo y eva-  luación dentro de las respectivas jurisdicciones   de los Gobiernos Regionales y Locales. - Incluir   en estos sistemas el monitoreo de la deforesta-  ción y estado de los recursos naturales.  3.7 Planificar los sistemas urbanos regiona -  les y rurales  La expansión desordenada de las ciudades sin   armonía con los sectores rurales, con enormes   demandas  territoriales  y  de  servicios  ambien-  tales\tgenera\tla\tnecesidad\tde\tplanificar\tel\tde - sarrollo  y  la  sostenibilidad  de  los  recursos  de   las ciudades con capacidad de enfrentar y dar   soluciones  a  la  problemática  urbana  y  rural,   contribuyendo  con  el  desarrollo  sostenible  de   los sistemas urbanos, que optimicen el uso del   espacio urbano y respeten el medio ambiente,    protegiendo\t los\t valores\t patrimoniales,\t planifi - cando  el  crecimiento  armónico  de  áreas  urba-  nas, suburbanas y rurales. a)  Generar  un  protocolo  donde  se  inserte  las   variables  de  los  sistemas  urbano  regionales   y  de  los  medios  rurales  en  la  metodología  de   la ZEE, para que sirvan de insumo en el dise-  ño,  implementación  y  ejecución  de  estrategias   que  posibiliten  el  desarrollo  social,  económico   y ambiental de los sistemas urbano-regionales   de  manera  sostenible,  tomando  como  base  la   ZEE,  a  través  del  MINAM,  conjuntamente  con   el  Ministerio  de  Vivienda  y  el  Comité  Técnico   Consultivo de Ordenamiento Territorial.  El protocolo debe contemplar lo siguiente:  -  La  expansión  ordenada  de  los  centros  urba-  nos;  con  la  respectiva  integración  de  normas   relacionadas  al  acondicionamiento  territorial   con las de ordenamiento territorial.  -  El  equilibrio  satisfactorio  entre  el  desarrollo   urbano  y  el  rural,  por  medio  de  una  adecuada   distribución  de  la  población,  dotación  de  in- fraestructura social y de las actividades eco- nómicas. \n176  -\tEl\tdesarrollo\teficiente\tde\tlas\táreas\turbanas,\t  con  el  objeto  de  contribuir  al  mejor  uso  de  los   recursos naturales y humanos.  -  Preservación  y  conservación  del  patrimonio   edificado,\t incluyendo\t restos\t arqueológicos\t y\t  patrimonio arquitectónico y artístico.  -  La  dirección  de  la  inversión  en  mejoras  pú-  blicas.  -\tLa\torientación\tdel\tflujo\tmigratorio.  -  La  determinación  de  impactos  relacionados   con el análisis de riesgo en la dotación de infra-  estructura social y económica.  -\tLa\tdefinición\tde\tuna\tbase\tcatastral\ty\trural\tna -  cional\tque\tpermitirá\tsuprimir\tlos\tconflictos\tgene - rados por la superposición de derechos. Donde   se articule al plan catastral de la SUNARP como   base necesaria para la prevención y resolución    de\tconflictos.  3.8 Entender y respetar los sistemas de or-  ganización comunal  El Perú es un país megadiverso y pluricultural,   por lo que se hace necesario entender la diná- mica territorial desde el respeto a las diferentes   manifestaciones culturales así como al recono- cimiento  de  la  diversidad  cultural,  en  concor-  dancia con lo establecido en el artículo 89º de   la Constitución Política y los convenios interna- cionales (Convenio de Diversidad Biológica 8J,   Convenio 167 de la OIT, Convenio de Deserti-   ficación\ty\tsequia,\tConvenio\tde\tCambio\tClimáti - co), se debe respetar la diversidad cultural, los   conocimientos colectivos, y las formas de uso y   manejo tradicionales del territorio y los recursos   naturales, la socialización y difusión de las nor-  mas que estipulen los deberes y derechos de la   participación ciudadana de estos grupos en los   procesos de la ZEE y OT. a)  Construir  concertadamente  protocolos  de   aplicación de la ZEE en sus respectivos ámbi-  tos territoriales.  b)  Incorporar  en  las  metodologías  de  la  ZEE   y  OT  la  cosmovisión  de  los  pueblos  nativos  y   campesinos,  a  través  del  MINAM,  el  Ministe-  rio de la Mujer, en coordinación con los demás   sectores,  gobiernos  regionales  y  las  organiza- ciones comunales (campesinas y nativas) y con   el soporte del CTCOT.  3.9  Apoyar  el  proceso  de  descentralización   y regionalización  Desde  hace  varios  años  el  Perú  se  encuentra   inmerso  en  un  proceso  de  descentralización   irreversible,  donde  los  gobiernos  regionales  y   locales amparados en el principio de subsidia- riedad que asevera que “Las actividades de go-  bierno en sus distintos niveles alcanzan mayor   eficiencia,\tefectividad\ty\tcontrol\tde\tla\tpoblación\t  si  se  efectúan  descentralizadamente.  La  sub-  sidiariedad  supone  y  exige  que  la  asignación   de  competencias  y  funciones  a  cada  nivel  de   gobierno, sea equilibrada y adecuada a la me-  jor  prestación  de  los  servicios  del  Estado  a  la   comunidad”.  En  consecuencia:  “El  gobierno   más  cercano  a  la  población  es  el  más  idóneo   para ejercer la competencia o función, por con-  siguiente  el  gobierno  nacional  no  debe  asumir   competencias  que  pueden  ser  cumplidas  más   eficientemente\tpor\tlos\tgobiernos\tregionales,  a)  Generar  un  espacio  de  diálogo  y  concerta-  ción  para  la  aplicación  obligatoria  de  los  prin-  cipios  rectores  del  proceso  de  regionalización   y descentralización, donde se tenga en cuenta   los  principios  de  dichos  procesos  articulándo- los  con  los  de  la  ZEE,  a  través  del  MINAM,  la   Secretaría de Descentralización de la PCM, el   MEF,  conjuntamente  con  las  Secretarías  Téc-  nicas, el Consejo Interregional de las Regiones   Amazónicas – CIAM, la Coordinadora Nacional   de  los  Presidentes  Regionales,  la  Asociación   de Municipalidades del Perú – AMPE.  b)  Articular  los  objetivos  de  descentralización   con los de la ZEE y OT, donde la ZEE debe ser   transversal al cumplimiento de los objetivos de   la descentralización a nivel político, económico,   administrativo, social y ambiental.  \n177  y  éstos  a  su  vez,  no  deben  hacer  aquello  que   puede ser ejecutado por los gobiernos locales”.   La  experiencia  ha  demostrado  que  cuando  se   cuenta  con  las  herramientas  técnico  normati-  vas, entre ellas la ZEE aprobada, se hace más   sencilla  la  transferencia  de  recursos  y  compe-  tencias,  y  aumenta  el  nivel  de  negociación  en   los procesos de conformación de regiones.  3.10 Concertar con los países vecinos  En la década de los 90 ́, en el marco del Trata-  do  de  Cooperación  Amazónica  -  TCA,  se  han   dado  los  primeros  pasos  para  concertar  as   pectos  conceptuales  y  metodológicos  sobre  la    zonificación\ta\tnivel\tde\tlos\tpaíses.\tDesde\tesa\t  época, algunos países vecinos, como Ecuador,   Brasil  y  Bolivia,  están  desarrollando  procesos   de\tZonificación\ten\tzonas\tlimítrofes\tcon\tel\tPerú.\t  El  propósito  es  concertar  con  los  países  veci-  nos metodologías y propuestas de ZEE en las    zonas\tfronterizas,\ta\tfin\tde\tconcertar\tposterior - mente  políticas  compatibles  para  el  desarrollo   de estas zonas  a)\t Definir\t roles\t y\t establecer\t los\t mecanismos\t  para  concertar,  compatibilizar  y  promover  pro-  cesos de ZEE en zonas limítrofes.  b)  Elaborar  acuerdos  binacionales  o  multina- cionales de concertación y compatibilización de   ZEE en zonas fronterizas, a través del MINAM   y  el  Ministerio  de  Relaciones  Exteriores,  en  el   marco  del  TCA,  Comunidad  Andina  de  Nacio- nes-CAN  y  acuerdos  bilaterales,  incluyendo   espacios  de  concertación  de  la  sociedad  civil,   como el MAP (Madre de Dios en el Perú, Acre   en Brasil y Pando en Bolivia). Fuente: Ministerio del Ambiente, s.f.  ESTRATEGIA NACIONAL ZONIFICACIÓN ECOLÓGICA ECONÓMICA Y ORDE-  NAMIENTO TERRITORIAL. Viceministerio de Desarrollo Estratégico de Recursos Naturales.   Dirección General de   Ordenamiento Territorial. Lima, 15 p.  Recomendaciones para   fortalecer los procesos de ZEE   y OT en el Perú  Desde la visión de los actores participantes del    proceso\tde\tZEE\ten\tMadre\tde\tDios\t(Perú)\t[Fer -  nández,\t2010],\tel\tordenamiento\tterritorial\tes\tuna\t  necesidad urgente que debe implementarse en   el corto plazo, sobre todo para la sociedad civil   y el Gobierno. A continuación se presentan las   medidas correspondientes a este tema:  -  Garantizar que el Gobierno Regional cuente   con\tpoderes\tsuficientes\ta\tnivel\ttransectorial\t  para implementar y ejecutar el ordenamiento   territorial en la región. -  Implementar  una  política  de  cumplimiento   del ordenamiento territorial y dejar de hacer   proyectos especiales. -  Apuntar  a  que  el  ordenamiento  territorial   potencie  las  actividades  compatibles  con    determinada\tzonificación,\testablecidas\tpre -  viamente\ten\tla\tzonificación\tecológica\ty\teco - nómica. -  Normar  e  incentivar  el  respaldo  municipal  y   provincial al ordenamiento territorial en la re-  gión. -  Considerar  el  uso  del  presupuesto  partici-  pativo\tpara\tfinanciar\toficinas\tmunicipales\tde\t  ordenamiento territorial. -  Implementar  y  difundir  un  catastro  regional  que integre los derechos sobre el uso de la   tierra y los recursos naturales.  -\t Crear\tmecanismos\tde\tresolución\tde\tconflic - tos caso por caso desde los municipios.  -\t Definir\tplanes\tde\tordenamiento\turbano\tto -  mando\ten\tcuenta\tel\tcrecimiento\tdemográfico\t  y comercial de la región.  -\t Considerar,\tdentro\tde\tla\tzonificación\ty\tel\tor - denamiento  territorial,  el  establecimiento  de   las diferentes actividades económicas como   barreras  a  los  impactos  de  la  carretera  In-  teroceánica  Sur,  para  frenar  la  presión  so-  bre las áreas naturales protegidas (Reserva   Nacional  de  Tambopata  y  Parque  Nacional   Bahuaja-Sonene).  -\t Estas\tbarreras\tserían,\ten\tprimera\tfila,\ten\tlas\t  cercanías de la carretera: los predios agríco-  las con sistemas productivos agroforestales;    en\tsegunda\tfila,\tlas\tconcesiones\tde\tcasta - ñas, las concesiones forestales maderables   y las concesiones de reforestación; en terce-   ra\tfila,\tlas\tconcesiones\tde\tecoturismo\ty\tlas\t  concesiones  de  conservación.  Por  último,   están  situadas  las  áreas  naturales  protegi- das, con corredores biológicos establecidos.  Los retos del Ordenamiento   Territorial en el Perú  Según el IIAP y col. 2009, los temas más rele-  vantes para el OT en el futuro son:  \n178  Bolivia   El ordenamiento territorial continúa siendo una de las variables postergadas del   proceso\tde\tplanificación,\tausente,\ten\tgeneral,\tde\tlas\tetapas\tde\tformulación\ty\tno\t  comprendida  como  un  instrumento  valioso  para  promover  el  aprovechamiento    sostenible\tdel\trecurso\tsuelo,\tque\tpermita\tintegrar\tla\tplanificación\tsocioeconómi -  ca\tcon\tla\tfísico-espacial\tpara\tfines\torientados\thacia\tla\tproductividad\ty\tcompe - titividad.  Las variables uso y ocupación del suelo no aparecen con nitidez al momento de   planificar\tel\tdesarrollo\tnacional\to\tsubnacional.\tSin\tembargo,\tla\tmayor\tdebilidad\t de\tlos\tprocesos\tde\tplanificación\tno\tse\thalla\ttanto\ten\tsu\tformulación,\tsino\ten\tsu\t  incidencia en la cantidad y calidad del gasto. Todavía aparecen en el escenario   institucional como dos procesos separados, carentes de un estrecho relaciona-  miento\tprogramático\ty\tfinanciero\t(Ameller,\t2011).  Hasta\tinicios\tde\tlos\t90\tla\tplanificación\tignoraba\tel\tenfoque\tterritorial.\t  •\tDesde\tla\taparición\tde\tlas\tprimeras\tnormas\tespecíficas\tsobre\tplanificación\teco -  nómica\tse\tmenciona\tla\tinterrelación\tentre\tplanificación\tdel\tdesarrollo\ty\tordena - miento territorial.   •\tNo\texiste\tuna\tnorma\túnica\to\tgeneral\tde\tordenamiento\tterritorial,\tsino\tque\tse\t  trata de varias disposiciones dispersas, de distinta jerarquía. Es más, la norma   operativa general tiene jerarquía jurídica inferior a la de sus reglamentaciones   (resolución suprema vs decreto supremo).   •\tLas\tnormas\tde\tOT\tse\tdefinieron\ten\tun\tentorno\tde\tcreciente\timportancia\tde\tlos\t mercados\ten\tla\tasignación\tde\trecursos\ty\tpor\ttanto\tde\tla\tplanificación.\tLa\tnueva\t CPE\trompe\tcon\tesa\tidea\ty\texplicita\tla\timportancia\tde\tla\tplanificación,\ten\tun\t  contexto de un papel activo del Estado en la economía, como propietario de  recursos, y como productor de bienes y servicios. La CPE además, explicita la   necesidad\tde\tplanificar\tlos\tasentamientos\thumanos.\t  •\tEl\tordenamiento\tterritorial\tse\tdefine\tcomo\tun\tcomponente\tde\tla\tplanificación\t  del desarrollo. La relación entre ambos procesos se concreta en sus productos.   •\tEn\tlos\támbitos\tcentral\ty\tdepartamental\tde\tadministración\tdel\tEstado,\texis -  ten\tinstancias\tencargadas\tde\tla\tplanificación\tdel\tdesarrollo\ty\tel\tordenamiento\t  territorial.  Sin  embargo,  en  el  caso  de  los  municipios,  la  capacidad  de  cumplir   con las funciones asignadas depende de la capacidad de gestión del gobierno   municipal,  que  está  asociada  en  primera  instancia,  al  tamaño  poblacional  del   municipio.  La  debilidad  institucional  de  algunos  municipios  es  un  obstáculo  al   ordenamiento territorial.  •\tLa\tasignación\tde\tcompetencias\tde\tla\tCPE\ten\teste\ttema,\tmantiene\tla\torgani -  zación\tinstitucional\testablecida\ten\tlas\tnormas\tanteriores\tde\tplanificación\ty\torde - namiento territorial. -  El  desarrollo  y  el  fortalecimiento  de  un  pro-  ceso de OT que garantice la gobernabilidad   eficiente\tdel\tterritorio.\t  -  La  participación  activa  de  todos  los  actores   involucrados\ten\tla\tplanificación\ty\tla\tejecu - ción de programas de investigación sobre el    territorio\t(Zonificación\tEconómico-Ecológica).  -  Implementar estrategias efectivas de comu-  nicación y métodos participativos en la gene- ración de políticas de OT.  -  Fortalecer  la  institucionalidad  y  la  participa- ción efectiva de la sociedad civil en la gene- ración de nuevas políticas de OT.  La conclusión más interesante de los traba- jos  fue  que  el  OT,  si  fuese  realmente  partici-  pativo  desde  de  la  recolección  de  datos  has-  ta  la  creación  de  mapas,  podría  contribuir  de   manera\tsignificativa\ta\tla\tdemocratización\tde\tla\t  sociedad. Por ejemplo, un proceso de ZEE con   tiempo y amplia participación podría establecer   simultáneamente el consenso social necesario   para la realización del OT.   Una\tatribución\tde\tla\tcomunidad\tcientífica\tse - ría posible con el compromiso de intentar garan- tizar esa participación en los procesos de OT.  Balance de los procesos de Ordenamiento Territorial en la  Subregión Andina \n179  •\tLa\tdefinición\tde\tinstrumentos\tde\tOT\tnormativos\t(planes\tde\tOT)\ty\toperativos\t  (Lineamientos de Políticas del Ordenamiento Territorial, Informes de Evaluación   del Ordenamiento Territorial en los niveles nacional, departamental y municipal,   El  Sistema  Nacional  de  Información  de  Ordenamiento  Territorial  y  las  Guías   Metodológicas para la formulación de planes departamentales y municipales de    Ordenamiento\tTerritorial)\tgarantizaba\tuna\tadecuada\tdefinición\ty\taplicación\tde\t las\tpolíticas\tde\tordenamiento\tterritorial\ty\tuna\tretroalimentación\tcon\tla\tplanifica - ción del desarrollo. Sin embargo, la mayor parte de los instrumentos no se ha   aplicado. Es muy grave que no se haya evaluado el OT y el grado de cumpli- miento de los planes de OT.   •\tEn\tel\tpaís\tse\taplica\tla\tmetodología\tde\tzonificación\tagroecológica\tde\tla\tFAO,\t  no se han desarrollado enfoques propios.   •\tLa\tCPE\tprevé\tun\taltísimo\tgrado\tde\tparticipación\tsocial\ten\tla\ttoma\tde\tdecisio - nes del sector público. A la fecha, no se ha tomado ninguna acción para efectivi-  zar este mandato ( Societas Consultora de Análisis Social, 2012).  Colombia    La ley de desarrollo territorial fue expedida en el contexto de la descentralización   del Estado colombiano. Tenía, en consecuencia, como uno de sus fundamentos   la autonomía de las entidades territoriales para aplicar los instrumentos de ges-  tión del suelo y de ordenamiento del territorio. En este contexto, tenía competen-  cias\ten\totros\tcampos,\ten\tparticular,\tla\tdefinición\tde\tla\tpolítica\tde\tordenamiento\t  del territorio en los asuntos de interés nacional: áreas de parques nacionales y   protegidas; localización de grandes proyectos de infraestructura; localización de   formas generales de usos de la tierra de acuerdo con su capacidad productiva   en coordinación con lo dispuesto por la ley de medio ambiente; determinación de   áreas limitadas en uso por seguridad y defensa; lineamientos en materia de ur-  banización y del sistema de ciudades; lineamientos para distribución equitativa   de los servicios públicos e infraestructura social en las regiones y la conserva- ción y protección de áreas de importancia histórica y cultural (artículo 7).   Ese supuesto de autonomía municipal  en el ordenamiento  territorial se ha ve-  nido\tmodificando\tcon\tla\texpedición\tde\talgunas\tmedidas\tpor\tparte\tdel\tGobierno\t  Nacional a través del Ministerio de Ambiente, Vivienda y Desarrollo Urbano.  Una  muestra  de  ello  es  la  reglamentación  de  los  macropoyectos  de  vivienda   de intereses social, mediante el decreto 4260 de 2007. Según el artículo 3, los   macroproyectos constituyen norma de superior jerarquía en los términos del ar-  tículo 10 de la Ley 388 de 1997, y deben entenderse como incorporados en los   Planes  de  Ordenamiento  Territorial  de  los  municipios  y  distritos,  así  como  en   las  directrices  de  ordenamiento  de  las  áreas  metropolitanas.  En  los  procesos   de revisión y ajuste de los Planes de Ordenamiento Territorial los municipios y   distritos deben dar estricto cumplimiento a las disposiciones contenidas en los   respectivos macroproyectos. En otras palabras, los municipios no tienen opción   diferente a incorporar tales proyectos en sus planes de ordenamiento, así vayan   en contravía de estos últimos.   La Ley 388 plantea en su artículo 14, relacionado con el componente rural de   los planes, que dentro de este componente deben estar contenidos entre otros    aspectos,\tlos\trelacionados\tcon\t―el\tseñalamiento\tde\tlas\tcondiciones\tde\tprotec - ción,  conservación  y  mejoramiento  de  las  zonas  de  producción  agropecuaria,   forestal o minera  En\totras\tpalabras,\tlos\tmunicipios\tmantendrían\tla\tautonomía\ten\tcuanto\ta\tla\tdefi - nición de usos del suelo asociado a estos tipos de producción. No obstante, las   autoridades\tambientales\tregionales\ttendrían\tla\tpotestad\tde\tverificar\tla\tcompa - tibilidad  de  estas  decisiones  con  otras  normas  y  decisiones  preexistentes,  así   como con las posibilidades reales del territorio en materia de cargas y capacida- des que posibiliten o no la intervención en cualquiera de estos sentidos.  ( Societas Consultora de Análisis Social, 2012).  Ecuador   Una vez realizado el análisis de la normativa que sobre ordenamiento terriotorial   se encuentra vigente se han podido observar algunas debilidades, las cuales se   relacionan con los tiempos que los GAD‘s cuentan para realizar estos planes.  Existe una confusión generalizada de que los planes de ordenamiento territorial \n180  deben realizarse cada año, sin embargo, este no es el caso, pues no se esta-  blece en la normativa cuál debe ser el tiempo de duración de estos planes. Sin   embargo,  se  ha  ligado  el  tema  de  la  distribución  y  asignación  de  los  recursos   económicos para los presupuestos de los GAD‘s a los planes de desarrollo y or-  denamiento territorial. Por esta razón todos los GAD‘s se encuentran en proceso    de\telaborar\tsus\tpropios\tplanes\tcon\tel\tfin\tde\tcumplir\tcon\tel\trequisito\tnecesario\t  para la obtención de los recursos económicos.  Este proceso acelerado de elaboración ha generado que los GAD‘s contraten a   consultores para que realicen los planes, pero se puede deducir que por la ur-  gencia no se les dará la importancia debida a los datos, análisis de información   y propuestas que en un plan de ordenamiento territorial se debería considerar,   y en muchos casos, no ser las más adecuadas a la realidad del lugar; en conse-  cuencia, hubiera sido importante que en la normativa aprobada se establecieran   plazos razonables para la realización de estos planes.   Una  debilidad  adicional  es  la  falta  de  capacidad  para  realizar  estos  planes  de   ordenamiento territorial de algunos GAD, sobre todo de las juntas parroquiales,   que por primera vez tienen esta competencia. Si bien SENPLADES ha elabora- do lineamientos para que se realicen los planes de ordenamiento territorial y ha   impartido  algunos  talleres  de  capacitación  sobre  el  tema,  sigue  siendo  discre-  cional el tiempo de duración del plan de ordenamiento territorial en cada GAD,   por lo que unos planes de ordenamiento territorial podrían ser válidos por más   tiempo que otros.   Con\tel\tfin\tde\tunificar\tlos\tcriterios\ty\tlineamientos\tque\tse\tdeben\taplicar\thubiera\t  sido importante que en el mismo COOTAD se los incluya, de esta forma serían   de obligatorio cumplimiento para todos los GAD y a la vez se lograría de mejor   forma la articulación de todos los planes.   Si\tbien\tSENPLADES\tha\tapoyado\tdirectamente\tel\tproceso\tde\tplanificación\tde\t  ordenamiento  territorial  en  el  ámbito  nacional  hubiera  sido  importante, ñada  de  una  decisión  del   Estado. En esta experiencia se rescata también   la importancia de los siguientes puntos:   -\t Orientar\tlos\tprocesos\tde\tplanificación\te\tin - versión pública de manera adecuada.  -  Coordinar  con  la  cooperación  internacional   los criterios de OT.  -  Las  áreas  protegidas  tienen  gran  potencial   como nodos articuladores del desarrollo.  -  El trabajo con otros sectores frente a la gran   región  amazónica  permitió  discutir  el  tema   del OT en toda la Amazonía colombiana.  -  Los  derechos  de  propiedad  como  garantes   del OT.  -  Los  servicios  ambientales  como  nuevas  al-  ternativas  de  desarrollo  económico  empie- zan  a  aparecer  incluso  como  un  elemento   sectorial. \n182 \n183  Objetivo prioritario del Plan Nacional de Gestión del Riesgo de  Desastres 2012-2021(Documento de Trabajo)  OBJETIVO PRIORITARIO 3  Incorporar e implementar la gestión de riesgo de desatres a través de la planificación del   desarrollo y la priorización de los recursos físicos y financieros  Estartegia 3.1  Generar\tmecanismos\tque\tfaciliten\tla\tincorporación\tde\tla\tGRD\ten\tla\tplanificación\tdel\tdesarrollo\t  del territorio.  Producto  Mecanismos\teficientes\tque\tfacilitan\tla\tincorporación\tde\tla\tGRD\ten\tla\tplanificación.  A.3.1.1  Realizar programas   de sensibilización   a las autoridades y   funcionarios de las en- tidades conformantes   del SINAGERD para   internalizar la impor- tancia de la inclusión   de la GRD en los   países, programas y   proyectos de desarro- llo y de ordenamiento   territorial. Al 2007 se contará son   programas  ejecutados   de sensibilización a las   autoridades  y  funcio-  narios.  En  ministerios,   gobiernos  regionales   y municipalidades pro-  vinciales.  Al 2021 se ejecutarán   programas en todas   las entidades del   SINAGERD. Número de programas   de  sensibilización  a   las  autoridades  y  fun-  cionarios.  Porcentaje de planes   de desarrollo que   incorporan la GRD. PC
