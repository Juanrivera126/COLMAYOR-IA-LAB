uestos  de  los  Gobiernos  Regio- nales y de los Gobiernos Locales con especial   énfasis en los gastos de inversión. Sin embar-  go,  no  existen  mecanismos  en  ninguna  de  las   dos normas que prevean la participación activa   de la sociedad civil en la determinación de las   prioridades  presupuestarias  en  la  Prevención   del Riesgo de Desastres.  De la misma manera, la gestión correctiva in- cluida en la Ley N°29664 - SINAGERD, deja ver   la necesidad de incluir la reducción de riesgos   de  desastres,  pero  no  podrá  ser  aplicable  sin   que  se  medien  mecanismos  normativos  como   una  Ley  de  Ordenamiento  Territorial,  en  con-  cordancia  con  el  marco  jurídico  existente,  es   decir que integre la Gestión de Riesgos de De-  sastres y Cambio Climático en su concepción.   En el ámbito regional, para poder cumplir con la   Ley N° 29664 del SINAGERD y su Reglamento,   será necesario desarrollar una legislación alter-  na que facilite el proceso actual de descentrali- zación y acelere la transferencia de competen- cias a los Gobiernos Regionales y Locales.  Así  también,  el  Reglamento  de  la  Ley  N°  29664  -  SINAGERD,  debiera  estar  en  con-  cordancia  con  la  Ley  Nº28056,  Ley  Marco  del   Presupuesto  Participativo,  debido  a  las  prio-  ridades\ten\tla\testrategia\tfinanciera\tde\tlos\tGo - biernos Regionales y Locales, limitando accio-  nes de respuesta frente a peligros inminentes,   a  proteger  las  inversiones  y  evitar  gastos  por   impactos  recurrentes  previsibles.  No  conside- ra la protección de los medios de vida por im-  pactos recurrentes no previsibles considerados   en la Estimación y Prevención del Riesgo, y la   reconstrucción  luego  del  desastre,  necesarias   para la implementación de la Gestión de Ries-  gos a nivel local.  Es  necesario  determinar  criterios  de  delimi-  tación\tclaros\ty\tjustificados\tde\tlas\tcompetencias\t  exclusivas o competencias compartidas de los   Gobiernos\tLocales\ta\tfin\tde\tfortalecer\tsu\trol\ten\t  la Gestión de Riesgos de Desastres y tener cla-  ridad  en  las  normas  de  carácter  municipal  so-  bre el tema (MINAG, 2012). Recomendaciones  sobre  normatividad  res- pecto a Gestión de Riesgo de Desastres en el   Perú:  -  Se  requiere  impulsar  leyes  de  cambio  cli-  mático  y  políticas  adecuadas.  Es  necesario   tener  normas  nacionales  que  incorporen  el   tema de pagos ambientales y de gestión am-  biental  en  los  presupuestos  y  en  la  gestión   pública. -  La  política  pública  debe  proponerse  desde   el gobierno central hacia los niveles locales   como  un  proceso  gradual  en  el  cual  exista   retroalimentación de experiencias. -  La política pública debe acompañarse de un    proceso\tde\tplanificación\ten\tel\tcual\tse\tdefi - nan  los  planes,  programas  y  proyectos,  así   como la asignación de presupuestos y recur-   sos\tfinancieros\tque\tpermitan\tsu\timplementa - ción. De igual forma, debe acompañarse de   guías  metodológicas  y  demás  instrumentos   que permitan darle seguimiento. -  Se  requiere  resolver  los  enfrentamientos,    conflictos\t y\t barreras\t entre\t las\t competen - cias  sectoriales  que  existen  por  falta  de  in-  tegración  de  las  normas  de  cada  sector.  El   instrumento que podría ayudar a ordenar la  \n147  normativa  es  el  Plan  de  Ordenamiento  Te-  rritorial con enfoque de gestión del riesgo y   adaptación al cambio climático.  - Se debe revisar toda la normatividad para  vincular la gestión del riesgo como eje transver-  sal. En el caso del Perú mediante la aplicación   del D. S. 022-2009-MINAM para   todos los sec-  tores (MEF y colaboradores, 2010).  Institucionalidad para la gestión   del riesgo en el Perú  Institucionalidad, sistemas e instrumentos con-  templados  en  la  Ley  del  Sistema  Nacional  de   Gestión de Riesgo de Desastres, Ley N° 29664   y  su  Reglamento  (Decreto  Supremo    048-  2011):  -  El  Instituto  Nacional  de  Defensa  Civil  –  IN-  DECI es un organismo público ejecutor que   conforma  el  SINAGERD.  Es  el  responsable   técnico de coordinar, facilitar y supervisar la   formulación e implementación de la Política   Nacional  y  el  Plan  Nacional  de  Gestión  del   Riesgo  de  Desastres,  en  los  procesos  de   preparación, respuesta y rehabilitación. -  El  Centro  Nacional  de  Estimación,  Preven-  ción  y  Reducción  de  Riegos  de  Desastres   CENEPRED es un organismo público ejecu- tor  que  conforma  el  SINARGED,  responsa- ble técnico de coordinar, facilitar y supervisar    la formulación e implementación de la Políti-  ca  Nacional    y  el  Plan  Nacional  de  Gestión   de  Riesgos  de  Desastres,  en  los  procesos   de  estimación,  prevención  y  reducción  de   riegos y reconstrucción. -  Los Centros de Operaciones de Emergencia   Regional (COER) y los Centros de Operacio- nes de Emergencia Local (COEL). -  Las  Plataformas  de  Defensa  Civil  Regiona- les y Locales.  Sistemas para la gestión de   riesgo en el Perú  -  Sistema Nacional de Gestión del Riesgo de   Desastres  –  SINAGERD,  como  un  sistema   interinstitucional, sinérgico, descentralizado,   transversal\ty\tparticipativo,\tcon\tla\tfinalidad\tde\t identificar\ty\treducir\tlos\triesgos\tasociados\ta\t  peligros  o  minimizar  sus  efectos,  así  como   evitar la generación de nuevos riesgos, pre-  paración y atención ante situaciones de de-  sastre mediante el establecimiento de princi- pios, lineamientos de política, componentes,   procesos  e  instrumentos  de  la  Gestión  del   Riesgo de Desastres. -  Sistema Nacional de Información la Gestión   de Riesgos de Desastres. -  Sistema Nacional para la Respuesta y Reha- bilitación - SINPAD. -  El Sistema Regional de Defensa Civil.  Competencias del MEF como   parte del SINAGERD  En el marco del SINAGERD, el MEF tiene entre   sus atribuciones y funciones:  -\t La\tevaluación\te\tidentificación\tde\tmecanis -  mos\tadecuados\ty\tcosto-eficientes\tque\tper -  mitan\tal\tEstado\tcontar\tcon\tla\tcapacidad\tfi - nanciera para la atención de desastres y su   fase  de  reconstrucción,  de  manera  comple- mentaria a los otros niveles de gobierno. -  En  situaciones  de  desastres  de  gran  mag-  nitud,  la  PCM  en  coordinación  con  el  MEF,   propondrá  al  Consejo  Nacional  de  Gestión   de Riesgos de Desastres el esquema institu-   cional\ty\tfinanciero\tde\treconstrucción,\tsobre\t  la  base  de  un  análisis  de  vulnerabilidades,   daños y necesidades.  Con  respecto  a  los  instrumentos  del  SINA- GERD para la gestión de riesgos de desastres,   el MEF tiene a su cargo establecer la estrategia    de\t gestión\t financiera\t del\t riesgo\t Instituciona - lidad,  sistemas  e  instrumentos  contemplados   en la Ley del Sistema Nacional de Gestión de   Riesgo de Desastres, Ley N° 29664 y su Regla- mento (Decreto Supremo  048-2011).  Lecciones aprendidas y   recomendaciones sobre   gestión del riesgo. El caso   peruano  -  Los diferentes conceptos y métodos de aná-  lisis  de  vulnerabilidad  frente  a  los  impactos   del cambio climático están en desarrollo, sin   embargo es importante avanzar en la aplica- ción aunque sea con limitaciones. -  Co-responsabilidad de sectores: Adaptación   y mitigación del cambio climático es un tema   transversal que requiere de coordinación in-  terinstitucional. -  La  investigación  y  tecnología  juegan  un  rol   muy  importante  en  las  prioridades  políticas   con respecto al cambio climático y se reco-   mienda\tdefinir\tuna\tagenda\tde\tinvestigación\t científica\tnacional\tque\tse\tenfoque\tprioritaria - mente en cubrir vacíos de información sobre   los impactos del cambio climático. -  La  difusión  de  información  es  clave  para  la   reducción de las vulnerabilidades al cambio   climático  y  el  fortalecimiento  de  las  capaci- dades de adaptación a través de la sensibili- zación de los tomadores de decisiones. \n148  -  En un futuro análisis, es importante conside- rar la capacidad de adaptación como variable   que\tdetermina\tsignificativamente\tla\tvulnera - bilidad.  Se  debe  evitar  enfocar  la  discusión   sobre  la  adaptación  al  cambio  climático  so-  lamente en las opciones disponibles para la    adaptación\tal\tcambio\tclimático\ty\tsu\teficacia\t y\teficiencia.  -  En  el  análisis  realizado,  la  vulnerabilidad  al   cambio climático está basada en un análisis   de  la  exposición  a  los  peligros  que  se  dan   hoy y que se han dado en el pasado. Sin em- bargo, la vulnerabilidad es un proceso diná- mico y la herramienta deberá ser constante-  mente actualizada en base a los escenarios   futuros de cambio climático. -  Incorporar  en  el  análisis  aquellas  variables   que  no  se  pudieron  considerar  por  falta  de   información:  (p.e.  deglaciación  y  el  incre-  mento del nivel de mar, limitante en la defo-   restación,\tlimitante\ten\tdesertificación,\tentre\t  otras.)  Se  recomienda  hacer  análisis  con   enfoques distintos y complementarios (cuen-  cas, ecosistemas, sectores) (Monge, s.f).  \n149  Cambio Climático: Contexto   Nacional-Perú  El Perú es uno de los países más afectados por   fenómenos  hidro-meteorológicos  relacionados   con  el  Fenómeno  El  Niño  (FEN).  En  la  costa   norte  los  eventos  intensos  pueden  ocasionar   grandes pérdidas por las intensas lluvias, pero    los\t eventos\t moderados\t son\t beneficiosos\t ya\t  que permiten reponer los recursos hídricos en   esta  árida  región.  En  contraste,  las  zonas  alto   andinas sufren sequías y heladas severas. Sin   embargo, es incierto cual sería el efecto del CC   futuro en el FEN (IPCC – WG1 2007; Collins et   al. 2010; Takahashi et al. 2011). Pero ya no es más la  contracorriente perua- na, sino ENSO (El Niño - Southern Oscillation),   o ENOS (El Niño Oscilación del Sur), un fenó-  meno\tglobal.\tDice\tDavid\tEnfield\ten\tDesastres\t  y  Sociedad  No.  5:  “Lo  importante  es  que,  así   como hoy sabemos que no podemos entender   lo  que  ocurre  con    El  Niño  en  las  costas  del   Perú y de Ecuador, desde el punto de vista del   fenómeno  natural  sin  verlo  globalmente,  igual   ocurre para las respuestas de la sociedad sino   miramos más  allá de los países. Sin embargo,   el  tema  de  las  interacciones  entre  variabilidad   del  clima  y  actividades  humanas,  nos  estaría   mostrando  también  que  no  se  trata  sólo  de   cambiar de centro o campo físico, sino de cen-  tro o campo conceptual”. (Torres J. y González   S. 2005). Las temperaturas del aire en el territorio nacio- nal muestran evidencias de aumento en las últi- mas seis décadas que podrían estar asociadas   con  el  calentamiento  global  (SENAMHI  2009),    aunque\ttambién\tpueden\testar\tinfluenciadas\tpor\t  variaciones  naturales como la Oscilación Deca-  dal\tdel\tPacífico\t(PDO\tpor\tsus\tsiglas\ten\tinglés;\t  Silva y Trasmonte, en revisión). El aumento en    la\ttemperatura\tpuede\tafectar\tla\tfisiología\tde\tlos\t  cultivos  y  ganados,  aumentar  la    incidencia  de   plagas  y  enfermedades,  además  de  causar  la    pérdida\tde\tsuperficie\tglaciar\talto\tandina.  De hecho, durante los últimos 30 años la su-  perficie\tde\tglaciares\tandinos\tdisminuyó\t22%,\tlo\t  que ha generado una pérdida de más de 12,000   millones de m3 de estas reservas de agua. La   desglaciación  no  solamente  tiene  un  impacto   en la disponibilidad de agua, sino que aumenta  el riesgo de aludes y aluviones al incrementar- se el número y la carga de lagunas colgantes. En el caso de las precipitaciones en la región  andina,  las  tendencias  observadas  varían  de   región a región (SENAMHI 2009), lo cual sugie- re la adopción de acciones diferenciadas para   cada región y enfatiza la necesidad de estudios   a  nivel  de  cuenca  y  sub-cuenca  para  evaluar   los efectos del CC en los recursos hídricos.Re- conociendo que los escenarios climáticos para   las lluvias amazónicas no presentan consenso   sobre los cambios futuros (IPCC – WG1 2007),   las evidencias sugieren que la hidrología en la   Amazonía Peruana ha presentado una tenden- cia negativa, con un nivel récord de vaciante en   el año 2010 (Espinoza et al. 2011). De mante-  nerse estas alteraciones, podrían producir fuer-  tes impactos en los ecosistemas y actividades   humanas.  Los estudios realizados en el norte del Perú  estiman  que  se  producirá  un  incremento  en  el   nivel  del  mar  de  aproximadamente  entre  60  y   81 centímetros en los próximos cien años. La  temperatura  del  mar  ha  presentado  ten- dencias negativas en la costa centro y sur, po-  siblemente debido a un aumento en la intensi- dad  de  los  vientos  (Gutiérrez  et  al.  2011).  En   el futuro, esta tendencia podría continuar o re-  vertirse a un calentamiento. Los efectos sobre   el  ecosistema  marino,  positivos  o  negativos,   dependerán  del  escenario  exacto  y  de  las  es-  pecies afectadas.  Estas posibilidades y escenarios están sien- do estudiados por nuestras instituciones espe-  cializadas  y  por  instituciones  de  investigación   internacionales. La desoxigenación del mar pe-  ruano debido al calentamiento afectaría el eco-  sistema marino y la distribución de los recursos   hidrobiológicos. La vulnerabilidad en el Perú ha sido evalua- da  según  la  exposición,  sensibilidad  y  capaci- dad adaptativa frente al CC, encontrándose lo   siguiente:  Exposición  -  Un  aumento  en  el  nivel  del  mar  afectaría   al  54,6%  de  la  población  que  se  encuentra   asentada en las zonas costeras.  -\t La\tintensificación\tde\tlas\tsequías\tafectaría\tal\t  Anexo Módulo 2 \n150  90% de la población, asentada en zonas ári-  das, semiáridas y subhúmedas.  -  El notorio retroceso de los glaciares alto an-  dinos afectaría la disponibilidad de agua en   la\tcuenca\tdel\tPacífico\ty\taumentaría\tel\triesgo\t  de aludes y aluviones.  Sensibilidad  -  Alto  grado  de  sensibilidad  de  la  población,   debido a que la pobreza y la inequidad aún   afectan  a  importantes  segmentos  de  la  po-  blación.  De  acuerdo  al  INEI  (2012),  para  el   2010 en el Perú el 30.8% de la población vi-  vía en pobreza (7.6% en pobreza extrema y   23.2% en pobreza no extrema). -  Alto  grado  de  sensibilidad  de  los  recursos   biológicos,  puesto  que  el  país  se  encuen- tra  entre  los  diez  países  mega-diversos  del   mundo, con una gran parte de su territorio de   alta montaña. Aun cuando no se cuenta con   estudios\tespecíficos\ty\tde\tgran\talcance\tsobre\t  vulnerabilidad  y  los  impactos  del  CC  sobre   los principales ecosistemas del Perú y su di- versidad biológica, es posible que ambos se   vean gravemente afectados por el CC. -  Alto  grado  de  sensibilidad  de  los  sectores   productivos  primarios  (agricultura,  ganade- ría,  pesca,  minería),  debido  a  que  son  los   sectores  que  más  aportan  a  la  economía  y   empleo del país, y su población es altamente   dependiente  de  las  variaciones  del  clima  y   es afectada de manera recurrente por even-  tos extremos.  Capacidad de Adaptación  -\t Capacidad\tde\tadaptación\tincipiente,\treflejada\t  en  la  debilidad  de  las  instituciones,  una  so- ciedad que requiere mejor organización para   gestionar  sus  riesgos  y  emergencias  deriva- dos  de  desastres,  la  alta  incertidumbre  en   la información para la toma de decisiones, y   la  existencia  de  marcos  regulatorios  que  no   consideran los riesgos derivados del CC.  El\tsiguiente\tgráfico\tmuestra\tla\tvulnerabilidad\t  del territorio peruano ante el Cambio Climático.  Fig. 8 Escenarios de vulnerabilidad frente al cambio  climático en el territorio peruano  Fuente: SPDA. Regiones Sostenibles año 5 No. 10 Agosto 2012 \n151  Políticas públicas sobre cambio   climático en el Perú Política Nacional Ambiental  Los  lineamientos  de  la  Política  Nacional  Am-  biental (MINAM, 2009) sobre mitigación y adap- tación al cambio climático son:  a) Incentivar  la  aplicación  de  medidas  para  la   mitigación  y  adaptación  al  cambio  climático   con un enfoque preventivo, considerando las   particularidades de las diversas regiones del   país,  con  énfasis  en  la  situación  y  accionar   espontáneo de adaptación de las comunida- des campesinas y pueblos indígenas. b) Establecer  sistemas  de  monitoreo,  alerta   temprana  y  respuesta  oportuna  frente  a  los   desastres naturales asociados al cambio cli-  mático, privilegiando a las poblaciones más   vulnerables. c) Fomentar el desarrollo de proyectos foresta-  les, manejo de residuos sólidos, saneamien- to, usos de energías renovables y otros, para   contribuir en la mitigación de los efectos del   cambio climático. d) Conducir los procesos de adaptación y miti-  gación  al  cambio  climático  difundiendo  sus   consecuencias, así como capacitar a los di-  versos actores sociales para organizarse. e) Promover el uso de tecnologías adecuadas y   apropiadas para la adaptación al cambio cli-  mático y mitigación de gases de efecto inver-  nadero y de la contaminación atmosférica.  Plan  Nacional  de  Acción  Ambiental   2011-2021  Respecto  a  Bosques  y  Cambio  Climático  el  Plan  Nacional  de  Acción  Ambiental  2011  al   2021  (MINAM,  2011)  considera  las  siguientes   acciones estratégicas:  -  Reducir la tasa de deforestación de bosques   primarios,  impulsando  su  conservación  y   aprovechamiento sostenible. -  Impulsar  la  forestación  y  reforestación  a  ni-  vel  nacional  como  un  medio  para  mejorar,   aplicar o crear la provisión de servicios am-  bientales. -  Impulsar un crecimiento económico con me-  nor intensidad de emisiones de GEI. Econo-  mía baja en  Carbono. -  Estimar  y  reducir  la  vulnerabilidad  frente  al   cambio climático -  Desarrollar  e  implementar  Estrategias  Re-  gionales  y  Locales  de  Adaptación  y  Mitiga-  ción frente al cambio climático. -  Reducir la degradación de la tierra y los sue-  los,  así  como  incrementar  la  capacidad  de   mitigación de los efectos de la sequía. -  Fortalecer  el  sistema  de  vigilancia  y  predic- ción de fenómenos climáticos de origen na-  tural y antrópico. -  Gestionar  el  riesgo  de  desastres  e  incorpo-  rarlo\ten\tel\tsistema\tde\tplanificación\ty\tpresu - puesto a nivel nacional, regional y local.  La  meta  al  2021  es  la  reducción  a  cero  de  la  tasa  de  deforestación  en  54  millones  de   hectáreas  de  bosques  primarios  bajo  diversas   categorías  de  ordenamiento  territorial  contri-  buyendo, conjuntamente con otras  iniciativas,   a  reducir  el  47.5%  de  emisiones  de  GEI  en  el   país, generados por el cambio de uso de la tie-  rra; así como a disminuir la vulnerabilidad fren-  te al cambio climático.  Estrategia  Nacional  de  Cambio  Cli- mático  La Estrategia Nacional de Cambio Climático  (ENCC)  es  el  documento  rector  en  la  gestión   del cambio climático para el país. Fue aprobada   mediante  D.S.  086-  2003-PCM,  que  establece   su cumplimiento obligatorio y su incorporación   en las políticas, planes y programas sectoriales   como regionales. La ENCC se elaboró sobre la   base de las Políticas de Estado Décima y Déci-  mo Novena del Acuerdo Nacional relacionadas   con  la  Reducción  de  la  Pobreza  y  Desarrollo   Sostenible/ Gestión Ambiental, respectivamen- te. El objetivo general de la Estrategia es “redu-  cir los impactos adversos al cambio climático, a   través de estudios integrados de vulnerabilidad    y\tadaptación\tque\tidentificarán\tzonas\ty/o\tsecto - res vulnerables en el país, donde se implemen- tarán  proyectos  de  adaptación.  Controlar  las   emisiones de contaminantes locales y los GEI,   a través de programas de energías renovables    y\tde\teficiencia\tenergética\ten\tlos\tdiversos\tsec - tores productivos” (MINAM, 2010).  La\tENCC\tha\tdefinido\tonce\tlíneas\testratégi - cas de acción:  1) Promover  y  desarrollar  investigación  cientí-  fica,\ttecnológica,\tsocial\ty\teconómica\tsobre\t  vulnerabilidad,  adaptación  y  mitigación  res-  pecto al cambio climático. 2) Promover  políticas,  medidas  y  proyectos   para desarrollar la capacidad de adaptación   a  los  efectos  del  cambio  climático  y  reduc-  ción de la vulnerabilidad. 3) Activa participación del Perú en las negocia- ciones  internacionales  de  cambio  climático,   para defender los intereses del país y prote-  ger la atmósfera mundial. 4) Desarrollo de políticas y medidas orientadas   al manejo racional de las emisiones de GEI,   otros contaminantes del aire y la reducción del   impacto  del  cambio  climático,  considerando   los  mecanismos  disponibles  en  el  Protocolo   de Kyoto y otros instrumentos económicos. \n152  5) Difusión  del  conocimiento  y  la  información   nacional sobre el cambio climático en el Perú   en  sus  aspectos  de  vulnerabilidad,  adapta- ción y mitigación. 6) Promoción  de  proyectos  que  tengan  como   fin\tel\talivio\ta\tla\tpobreza,\t\treducción\tde\tla\tvul - nerabilidad y/o mitigación de GEI. 7) Promoción  del  uso  de  tecnologías  adecua- das y apropiadas para la adaptación al cam-  bio climático y mitigación de GEI y de la con-  taminación atmosférica. 8) Lograr  la  participación  de  la  sociedad  para   mejorar  la  capacidad  de  adaptación  a  los   efectos  del  cambio  climático,  reducir  la  vul-  nerabilidad y mitigar las emisiones de GEI y   contaminantes ambientales. 9) Gestión  de  los  ecosistemas  forestales  para   mitigar la vulnerabilidad al cambio climático y   mejorar la capacidad de captura de carbono. 10)  Explorar  la  posibilidad  de  lograr  una  com- pensación justa por los efectos adversos del   cambio climático, generados principalmente   por los países industrializados. 11) Gestión de ecosistemas frágiles, en especial  ecosistemas montañosos para la mitigación   de la vulnerabilidad al cambio climático.  Entendiendo que la vigencia de la ENCC es  de  diez  (10)  años  y  que  el  proceso  de  elabo- ración  de  la  ENCC  vigente  se  inició  en  2001,   la  Comisión  Nacional  de  Cambio  Climático   (CNCC) y el MINAM han visto conveniente pro-  ceder con su actualización. Desde el año 2009   se  han  formulado  instrumentos  claves  para  la   gestión ambiental, como el ‘Plan Bicentenario:   El  Perú  hacia  el  2021’  y  la  Política  Nacional   del Ambiente. Junto con estos instrumentos, el   Plan  Nacional  de  Acción  Ambiental  (PLANAA)   que  determina  acciones  estratégicas  y  metas   que  harán  posible  que  el  Perú  responda  a  los   desafíos nacionales e internacionales en mate-  ria  ambiental  y  la  Segunda  Comunicación  Na-  cional del Perú a la CMNUCC ofrece elementos   importantes  para  reorientar  las  acciones  para    abordar\tel\tCC,\tque\trefuerzan\tla\tjustificación\tde\t  revisar y actualizar la ENCC. El proceso de revisión se inició en 2010 bajo  el  liderazgo  de  la  Comisión  Nacional  de  Cam-  bio Climático y los Grupos ad hoc formados con   la\tfinalidad\tde\tacompañar\ty\torientar\tel\tproce - so. La DGCCDRH, con el apoyo de un equipo   consultor y la colaboración de diversas organi- zaciones técnicas y de cooperación, asumió la   responsabilidad de conducir el proceso. La actualización de la ENCC permitirá asumir  las lecciones aprendidas y hacerla más operati- va, así como fomentar la integración del CC en   los\tmecanismos\tde\tplanificación\tpública\tde\tlos\t  tres niveles de gobierno. Al mismo tiempo, per- mitirá incorporar planteamientos esbozados en    otras\tpolíticas\ty\tplanes,\tprocurando\treflejar\tlos\t  nuevos enfoques sobre la temática del CC que   se han desarrollado en los últimos ocho años.  Plan de Acción de Adaptación y Mi- tigación frente al Cambio Climático  Esta línea temática pretende contribuir con:  -\t La\tidentificación\tde\triesgos\tclimáticos\tque\t  podrían afectar en forma adversa o positiva   las decisiones de desarrollo. -  La toma de decisiones que consideren al cam- bio climático como variable materializada.  Las medidas de adaptación propuestas a ni- vel nacional son las siguientes:  -  Desarrollar  a  nivel  nacional  escenarios  fu-  turos  de  cambio  climático  por  regiones  y   cuencas,  aplicando  modelos  y  análisis  de   las tendencias para reducir el nivel de incer-  tidumbre, para lo cual se requiere fortalecer   la  Red  Nacional  de  Estaciones  a  cargo  del   SENAMHI. -  Desarrollar estudios de riesgos y vulnerabili- dad para los sectores agua, agricultura, eco-  nomía, pesca y áreas con alta biodiversidad    en\tlas\tregiones,\tidentificando\tlos\timpactos\t  sobre los ecosistemas y las poblaciones más   vulnerables. -  Realizar  en  los  sectores  el  análisis  de  los   costos  de  cambio  climático  y  de  las  nece-   sidades\tde\tinversión\ty\tfinanciamiento\tpara\t  responder  ante  los  efectos  adversos  del   cambio climático. -  Apoyar  la  integración  de  la  adaptación  en   políticas e instrumentos de gestión y asigna- ción presupuestal. -  Implementar proyectos de reducción de vul-  nerabilidad  y/o  incremento  de  la  capacidad   de adaptación en sectores, regiones, locali- dades y ecosistemas prioritarios, como pue-  den ser la singularidad y la resiliencia. -  Proponer espacios de concertación interins- titucional  en  temas  sociales,  cambio  climá-  tico  y  el  nivel  de  cumplimiento  de  los  Obje-  tivos  del  Milenio;  propiciar  mayor  presencia   de  los  sectores  de  educación  y  salud,  y  la   representación  de  organizaciones  de  la  so-  ciedad  civil  como  la  Junta  de  Usuarios  y  la   Mesa Nacional de Lucha contra la Pobreza. -  Desarrollar  un  programa  de  conservación   de ecosistemas frágiles, como medida prio-  ritaria  de  adaptación  en  diversas  zonas  del   país. -  Desarrollar y proponer enfoques metodológi- cos que permitan integrar la gestión del ries-  go  de  desastres  y  la  adaptación  al  cambio   climático (MINAM, 2010). \n153  Marco Legal en Adaptación al   Cambio Climático en el Perú  La temática de Cambio Climático en el Perú se   rige por la Ley N°28611, Ley General del Am-  biente, en la cual los organismos públicos des-  centralizados,\t regulatorios\t y\t de\t fiscalización,\t  ejercen  funciones  y  atribuciones  ambientales   sobre las actividades y materias señaladas en   ésta. Del mismo modo, la citada norma brinda   las pautas para la coordinación entre las auto-  ridades sectoriales con competencia ambiental,   Gobiernos  Regionales  y  Locales.  La  distribu- ción  de  las  competencias  ambientales  de  los   tres niveles se menciona en esta Ley.  Sin embargo, es preciso destacar que exis- ten  lineamientos  de  política  para  el  Ordena-  miento  Territorial  de  acuerdo  a  lo  previsto  en   la Resolución Ministerial N° 026-2010-MINAM.   Existe la Ley N°27795, Ley de Demarcación y   Organización Territorial, que indica que la Pre-  sidencia  de  Consejo  de  Ministros  (PCM)  debe   asesorar y acompañar a los Gobiernos Regio-  nales\ta\tfin\tde\tsanear\tlos\tlímites\tterritoriales\ty\tla\t  organización racional del territorio, la cual debe   ir de la mano con una Ley de Ordenamiento Te-  rritorial. A  nivel  nacional  no  existen  normas  especí-  ficas\tque\tdeterminen\tque\tlas\tzonas\tafectadas\t  por eventos climáticos o vulnerables a ellos no   sean habitables o susceptibles de ser repobla- das. A nivel regional, hay una débil articulación   de  proyectos  y  programas  de  desarrollo  pro-  puestos  desde  el  Estado  por  la  falta  de  crite-  rios  de  Ordenamiento  Territorial.  Es  necesario   aprobar  y  publicar  una  Ley  de  Ordenamiento   Territorial que integre la GRD y ACC, y asimis-  mo, que se fomente su implementación a nivel   local.  También  es  fundamental  incorporar  me-  didas sobre ACC como parte de las competen- cias  de  los  Gobiernos  Locales,  contenidos  en  el  capítulo  N°II de  la  Ley  Orgánica  de  las  Mu-  nicipalidades. Por ello, es necesario analizar la   implementación  de  medidas  piloto  de  adapta- ción al Cambio Climático como parte de los pla-  nes de desarrollo concertado a nivel local, esto   avalado  en  el  artículo  79°  de  la  Ley  Orgánica   de Municipalidades en lugar de incluirla en los   Planes de Desarrollo Concertado Regionales.  Asimismo,  existen  normas  como  la  Ley  de  Aprovechamiento  Sostenible  de  los  Recursos   Naturales  (Artículo  1°)  y  la  Ley  Marco  para  el   Crecimiento  de  la  Inversión  Privada  (Artículo   50°) que hacen referencia al Código del Medio   Ambiente y de los Recursos Naturales aproba- do mediante Decreto Legislativo N°613 y dero-  gado mediante la Ley General del Ambiente.  A nivel regional es necesario revisar las nor- mas  sobre  descentralización,  atribuciones  y   funciones  de  los  Gobiernos  Regionales  y  Lo-  cales\ta\tfin\tde\testablecer\ten\tsu\ttexto\tnormativo\t  una mayor precisión sobre las mismas en cada    nivel\tde\tgobierno\ta\tfin\tde\tevitar\tdisensos\ten\t  su  delimitación.  En  ese  sentido,  es  necesario   que  el  Ministerio  de  Agricultura  y  el  Ministerio   del Ambiente aporten con lineamientos y guías   prácticas  que  puedan  orientar  la  implementa- ción de las normas emitidas en esta materia. Al   respecto, la Ley de Gobiernos Regionales esta-  blece que éstos son responsables de la elabo- ración de las estrategias regionales de Cambio   Climático, que incluye lineamientos y acciones   en mitigación y adaptación (MINAG, 2012).  Avances de las Estrategias   Nacionales y Regionales de   cambio climático en el Perú  Estrategias Nacionales y Regionales de cambio   climático que están aprobados y en formulación   según información siguiente al año 2012: \n154  Nº   Región   Grupos Técnicos de CC en el marco de las  CARs  (Documentos de creación)  ERCC  (Documentos de  aprobación) 1    Amazonas  OR. No. 64-2004-GRA/CR   OR. No. 223-2008- GRA/CR 2    Áncash   R.G.R. Nª 0016-2012A/GRRNGMA   No tiene 3    Apur erritorio y de sus recursos naturales.  Objetivos de la ZEE  a) Conciliar los intereses nacionales de la con-  servación del patrimonio natural con el apro-  vechamiento  sostenible  de  los  recursos  na-  turales. b) Orientar  la  formulación,  aprobación  y  apli- cación  de  políticas  nacionales,  sectoriales,   regionales y locales sobre el uso sostenible   de los recursos naturales y del territorio, así   como  la  gestión  ambiental  en  concordancia   con las características y potencialidades de   los  ecosistemas,  la  conservación  del  am-  biente y el bienestar de la población. c) Proveer el sustento técnico para la formula-  ción  de  los  planes  de  desarrollo  y  de  orde-  namiento  territorial,  en  el  ámbito  nacional,   regional y local. d) Apoyar el fortalecimiento de capacidades de   las  autoridades  correspondientes  para  con-  ducir la gestión de los espacios y los recur-  sos naturales de su jurisdicción. e) Proveer información técnica y el marco refe-  Fig. 1: Preguntas que la ZEE busca responder  Fuente: Amazónicos por la Amazonía, 2011.  QUERER / SER ¿Cómo queremos que sea  y esté nuestro bosque en el  futuro ESCENARIOS deseado y  posible SABER Diagnóstico integral del  territorio - ZEE, Agentes y causas Línea Base (Tendencial) TENER Destrezas, Herramientas,  Recursos, Habilidades,  Fortalezas, Tecnologías,  Gobernanza. HACER  Planificación, Priorización y   Especialización de iniciativas. Instrumentalización: (Políticas,  Proyectos, Programas, Normas) Anexo Módulo 3  1  D.\tS.\t087-2004-PCM.\tReglamento\tde\tZonificación\tEcológica\ty\tEconómica \n156  Fig.2: Niveles de ZEE  Fuente: MINAM, 2012.  Fig. 3: Ruta metodológica de la formulación del POT  Fuente: BIOCAN, 2012. Fortalecimiento del Ordenamiento en la Amazonia Peruana. Instituto de Investigaciones de la   Amazonia\tPeruana-Iiap.\tMinisterio\tdel\tAmbiente-Minam.\tPrimer\ttaller\tde\tlineamientos\tpara\tla\tplanificación\ty\tordena - miento territorial de la Amazonia. Lima, 8 y dológica de la formulación de la ZEE  Fuente: GIZ-PDRS, 2011. \n158  modalidad de sub-modelos en la ZEE.  -  Región  Lambayeque :  Han  culminado  con   la formulación de la propuesta de ZEE pero   aún está pendiente para el presente año rea-  lizar estudios complementarios sobre GdR y   CC.  -  Región  Piura :  Han  aprobado  la  ZEE  y  es-  tán en formulación del POT. En este proceso   han incorporado GdR pero aún no la variable   climática.   Lecciones aprendidas sobre la   implementación de la ZEE y el   OT en el Perú  Vargas  (2012)  da  cuenta  de  las  lecciones   aprendidas respecto a la ZEE y OT en el Perú:  -  Los procesos de ZEE y OT son procesos com- plejos, multisectoriales y en construcción. -  Se entienden de diferente manera según in-  tereses y necesidades. -  Existen  aún  pocas  capacidades  profesiona- les para impulsar procesos de OT. -  Dispersión,  desarticulación  y  diferencias  en   la  calidad  de  la  información  para  impulsar   procesos. -  Procesos  con  real  participación  social  (per-  sisten las resistencias de mineros y madere- ros), como el caso de Cajamarca o de Madre   de Dios. -  Incorporar ZEE y Planes de OT en los crite-  rios de valoración de los proyectos de inver-  sión pública. -  Importancia  de  la  participación  de  la  socie-  dad civil en todo el proceso. -  La  gestión  es  más  importante  que  la  infor- mación.  -\t Utilizar\tel\tSistema\tde\tInformación\tGeográfica\t como\therramienta\ty\tno\tcomo\tfin\tdel\tproceso.  Estas  son  las  principales  lecciones  fruto  de  la experiencia de la ZEE en Cajamarca (Quis-  pe, 2010; Sánchez, 2009):   -  El  proceso  debe  propiciar  espacios  para  la   discusión  y  la  aprobación  de  información,   metodologías, criterios y ponderaciones.  -  La aplicación de la metodología requiere téc-  nicos  con  cierto  nivel  de  conocimientos  del   territorio y experiencia en el tema.  -  Los  criterios  que  se  aplican  en  el  modela- miento (análisis multicriterio) deben ser con-  sensuados para que respondan a las carac-  terísticas y las particularidades del territorio.  -  Todo insumo intermedio, como el caso de las   áreas prioritarias para la conservación, debe   ser concertado y aprobado con participación  de los diferentes grupos de interés  -  La  importancia  que  la  normatividad  ofrezca   lineamientos claros para desarrollar la meto-  dología  en  la  fase  de  evaluación  y  modela- miento. -  Es  necesario  comprometer  a  a  las  institucio- nes    con  competencias  sobre  el  tema  con  la    finalidad\tque\tpuedan\tproporcionar\tla\tinforma - ción necesaria para construir los submodelos.  -  El Equipo Técnico Regional (ETR) y la comi-   sión\tconsultiva\tde\tZEE-OT\tdeben\tidentificar\t  los  fenómenos  físicos  que  recurrentemente   se\tmanifiestan\ten\tel\tterritorio\ty\tque\tpor\tsus\t  características constituyen peligros potencia- les para las unidades sociales y sus medios   de vida; también deben realizar la respectiva   zonificación\tde\tpeligros.  -  El  ETR  debe  generar  la  estructura  de  los   submodelos  y  convocar  a  reuniones  con   técnicos de instituciones públicas y privadas   vinculados  con  el  tema  para  levantar  apor-  tes  que  mejoren  la  propuesta  y  la  primera   versión  de  los  mapas  que  forman  parte  del   submodelo.  -  La  construcción  de  los  submodelos  de  peli- gros  potenciales  y  vulnerabilidad  debe  con-  vocar  a  técnicos  de  instituciones  y  grupos   de interés con conocimiento de la temática y   con capacidades para evaluar las diferentes   variables a utilizar. -  Es necesario generar un mapa por cada pe-   ligro\tpotencial\tidentificado,\tsustentado\ten\tin - formación ponderada con la participación de   técnicos y expertos. Cada uno de estos ma-  pas\tserá\tun\tproducto\ta\tutilizar\ten\tla\tcalifica - ción de las alternativas de uso del territorio. -  En la ZEE se construyen nueve submodelos;   entre ellos, los de peligros potenciales y vul-  nerabilidad, los cuales constituyen variables   fundamentales para la construcción de otros   submodelos, tales como el urbano industrial   y el de potencialidades socioeconómicas. -  Toda  la  información,  los  productos  y  acuer-  dos generados en el proceso de ZEE están   a  disposición  del  público  mediante  el  portal   del  gobierno  regional.  Esta  transparencia   ha sido importante en la experiencia, ya que   con  ella  se  ha  ganado  legitimidad  técnica  y   social.  Recomendaciones para el   mejoramiento de procesos de   ZEE  Desde  la  visión  de  los  actores  participantes   del  proceso  de  ZEE  de  Madre  de  Dios  (Perú)    [Fernández,\t2010],\tla\tzonificación\tecológica\ty\t  económica  no  es  conocida  ni  difundida,  por  lo  \n159  que  las  propuestas  que  se  presentan  a  conti-  nuación son las sugeridas por la sociedad civil   y el Gobierno.  -\t Difundir\tla\tzonificación\tecológica\ty\teconómi - ca  de  manera  clara,  no  técnica,  para  todos   los actores involucrados en la región. -  Determinar los plazos de la realización e im-  plementación\tde\tla\tmacrozonificación\tde\tla\t región\t(actualización),\tla\tmesozonificación\ty\t la\tmicrozonificación.  -  Determinar los plazos de la ejecución del or-  denamiento territorial en la región.  -\t Considerar\ten\tla\tactualización\tde\tla\tzonifica - ción ecológica y económica y el ordenamien-  to\tterritorial\tlos\totros\ttipos\tde\tzonificación\tque\t  existen en la región, como castañas (ACCA   e  Instituto  de  Investigación  de  la  Amazonía   Peruana,  IIAP),  forestal  (Instituto  Nacional   de Recursos Naturales, INRENA) y el catas-  tro  minero  (Instituto  Nacional  de  Concesio- nes y Catastro Minero, INACC).  -\t Incluir\ten\tla\tzonificación\tecológica\ty\teconó - mica las áreas (propuestas) de conservación   regional como el lago Valencia.  -\t Usar\tla\tzonificación\tecológica\ty\teconómica\t  como instrumento de gestión que permita a    las\tautoridades\tdefinir\tl robados para estos procesos. -  Promover  y  capacitar  permanentemente  en    los\taspectos\trelacionados\ta\tla\tZonificación\t  Ecológica Económica, a los tres (03) niveles   de gobierno. -  Conducir  y  promover  la  articulación  de  los   planes  de  desarrollo  concertados,  gestión   de riesgos, el proceso de descentralización,   regionalización y desarrollo de fronteras con   el ordenamiento territorial para la adecuada   gestión integrada de los recursos naturales.  La política nacional del ambiente, que reco- ge  la  dimensión  ambiental  de  la  problemática,   contiene  en  su  primer  eje  que  se  orienta  a  la   “Conservación  y  aprovechamiento  sostenible   de  los  recursos  naturales  y  de  la  diversidad   biológica”,  lineamientos  para  el  Ordenamiento   Territorial  (Numeral 11 del Eje de Política 1 del   Decreto  Supremo  Nº  012-2009-MINAM),  que   contemplan:   -  El impulso del Ordenamiento Territorial entre   otros,  para  la  conservación,  uso  y  aprove- chamiento sostenible de los recursos natura-  les y de la diversidad biológica, así como la   ocupación ordenada del territorio. -  La  incorporación  del  análisis  del  riesgo  na-  tural  y  antrópico,  así  como  las  medidas  de   adaptación al cambio climático en los proce-  sos de Ordenamiento Territorial. -  El  impulso  de  mecanismos  para  prevenir  el   asentamiento de poblaciones y el desarrollo   de  actividades  socioeconómicas  en  zonas  2 Tomado del informe que ha sido preparado por la Comisión Multisectorial creada por Resolución Suprema N° 189- 2012-PCM como parte del mandato conferido en dicha norma. Las propuestas normativas respectivas serán aprobadas   progresivamente por el Consejo de Ministros o en el nivel institucional y jerárquico correspondiente. \n160  con  alto  potencial  de  riesgos  ante  peligros   naturales y antrópicos. -  El impulso del ordenamiento territorial como   base de los planes de desarrollo concertados   y de desarrollo de fronteras, itorial OT en todo el ámbito nacional.  ¿Qué  propone  la  Comisión  Multisec- torial  para  asegurar  se  avance  en  el   Objetivo?  -  Mejoramiento  de  la  gestión  territorial  y  me-  canismos  para  la  compatibilización  de  las   actividades  productivas  y  extractivas.  Para   lo  cual  se  considera  necesario  proponer   una Política de Estado en materia de Orde-  namiento  Territorial  que  como  elemento  de   concertación  política  enmarque  las  diferen- tes  dimensiones,  como,  la  ambiental,  pro-  ductiva, social entre otras de la problemática   del uso del territorio en un marco normativo   de  Ordenamiento  Territorial,  que  tenga  por    objeto\torientar\tel\tuso\teficiente\ty\tsostenible\t  del territorio, que armonice todas sus dimen- siones,  incluyendo  la  ambiental  en  relación   al  uso  de  recursos  naturales,  servicios  am-  bientales,  diversidad  biológica  y  ecosiste-  mas en general y en el marco del enfoque de   desarrollo con inclusión social y prevención,   considerando  la  seguridad,  la  integración  y   la cohesión social. -  El nuevo marco normativo de OT enmarcado   en una política de Estado concertada sobre   el\ttema,\tdebe\tdefinir\tel\tproceso\tde\tOT\tcomo\t  un  proceso  político  y  técnico-administrativo   de  toma  de  decisiones  concertadas  con  los   actores  sociales,  políticos,  económicos  y  técnicos, para la ocupación ordenada y uso   sostenible del territorio.  El\tordenamiento\tterritorial\tno\tes\tun\tfin\ten\tsí\t  mismo, es un proceso que contribuye al desa-  rrollo en condiciones de sostenibilidad; el con-  junto\tde\tsus\tinstrumentos\ttécnicos,\t(zonifica - ción, análisis económico, de sistemas urbanos,   y de riesgos), son orientadores para la toma de   decisiones en tanto se evalúan escenarios con   sus\tbeneficios\ty\tperjuicios,\ty\tcualquiera\tsea\tel\t  escenario  que  se  elija  (proceso  político  y  so-  cial)  tendrá  perjuicios  que  asumir  y  gestionar.   Su\taplicación\tserá\tflexible\ty\tdinámica.  El  proceso  de  OT  permite  conocer  la  pro- blemática asociada al uso del territorio y esta-  blece los mecanismos de concertación, para   la  toma  de  decisiones  sobre  las  actividades   productivas. Se  vuelve  a  recalcar  que  un  nuevo  marco  normativo no puede pretender determinar irres-  trictamente ni condicionar los usos del territorio,   sino establecer mecanismos y estrategias para   que\tsu\tuso\tsea\teficiente\ty\tsostenible,\tarmoni - zado con una visión de desarrollo con inclusión   social.  Instrumentos de gestión   territorial en el Perú  Actualmente  el  Ministerio  del  Ambiente  (MI-  NAM),  está  formulando  la  “Guía  Nacional  de    Ordenamiento\t Territorial”,\t con\t la\t finalidad\t de\t  orientar los procesos de Ordenamiento Territo-  rial a nivel nacional, bajo la conducción técnica   del  Director  General  de  Ordenamiento  Territo-  rial  del  MINAM.  Bajo  este  marco  los  actuales   procesos  de  ordenamiento  territorial,  que  han   iniciado  las  regiones  y  los  gobiernos  locales    con\tla\telaboración\tde\tla\tZonificación\tEcológica\t  y Económica - ZEE, deberán adecuarse al nue-   vo\tinstrumento\ta\tfin\tde\tque\tse\tencuentren\ten\t  armonía  con  las  políticas  y  planes  nacionales   y sectoriales. El cuadro 3 muestra los instrumentos de Pla-  nificación\tnormados\tpor\tnivel\tde\tgobierno\ten\t  el Perú.  La\tfigura\t7\tmuestra\tlos\tcomponentes\tfuncio - nales del Plan de Desarrollo Concertado. \n162  Nivel Nacional   Plan Estratégico Sectorial Multianual (PESEM)  Plan Estratégico Institucional (PEI)  Plan Operativo Institucional (POI) Nivel regional   Plan de Desarrollo Regional   Concertado Plan de competitividad regional  Plan Regional de Desarrollo de Ca- pacidades Humanas Plan Estratégico institucional   (PEI) Programa de Desarrollo Institucional Presupuesto Participativo  Presupuesto Institucional  Plan Operativo Institucional (POI) Nivel local (provincial-  distital) Plan de
