............................................................................................................. v  1.  Puntos Principales ............................................................................................................................................1 2.  Gestión Financiera del Riesgo de Desastres (GFRD) – Conceptos y Enfoques .................................................2 3.  La importancia de la Gestión Financiera del Riesgo de Desastres para la Protección Social (PS) ...................4 4.  Principios Clave para Utilizar Enfoques de GFRD para la PS Adaptativa en América Latina y el Caribe (ALC) ...... 6 5. Evaluación de la Madurez de la Utilización de los Enfoques de GFRD en los Sistemas de PS ..........................7 6.  Experiencias en ALC utilizando enfoques de GFRD para objetivos de Protección Social Adaptativa ...............9 7.  Mensajes Finales ............................................................................................................................................11  Bibliografía ............................................................................................................................................................12 Notas Finales .........................................................................................................................................................13  Contenido \niv   RAPID SOCIAL RESPONSE  Por qué es importante:  Los países de la región de América Latina y el Caribe (ALC) están muy expuestos a amenazas naturales frecuentes que   pueden provocar desastres. Por lo general, las poblaciones pobres y vulnerables se ven perjudicadas por los efectos de   los desastres debido a que tienen menos capacidad para enfrentar esas situaciones y para recuperarse. La asistencia   rápida  inmediatamente  después  de  un  desastre  es  un  aspecto  fundamental  para  fortalecer  la  resiliencia  y  proteger  el    bienestar de los hogares pobres y vulnerables. Si la planificación para desastres no incluye medidas físicas y financieras   ex-ante, puede haber demoras considerables en la respuesta post-desastre, lo que puede exacerbar significativamente   las  condiciones  humanas  y  económicas  de  los  sectores  pobres  y  vulnerables,  arrastrándolos  a  una  pobreza  aún  más    profunda. La Protección Social cumple un papel importante al ayudar a las poblaciones pobres y vulnerables a lidiar con   los impactos de las amenazas naturales y a construir resiliencia a largo plazo. Por lo tanto, garantizar la disponibilidad   de financiamiento para permitir la expansión de los beneficios de Protección Social después de desastres es de suma   importancia para los países de ALC. Los países de ALC tienen experiencia probada en la utilización de varios enfoques de   financiamiento de riesgo y en la participación en arreglos de financiamiento. A pesar de ello, pocos países han establecido   mecanismos para garantizar la expansión de los beneficios de Protección Social después de eventos de desastre. Esta   nota tiene como objetivo mejorar la comprensión de los enfoques de Gestión Financiera del Riesgo de Desastres (GFRD)   entre los profesionales de la Protección Social (PS). También, intenta describir lo que los países de ALC deben priorizar para   garantizar que los arreglos de financiamiento apropiados funcionen para brindar respuestas de PS post-desastre efectivas. \nv  Agradecimientos  Los autores de esta nota son Diana Cubas, Rashmin Gunasekera y Thibaut Humbert. Recibimos valiosos comentarios y   contribuciones de Oscar Ishizawa, Asha Williams y Edmundo Murrugarra. La nota fue traducida por JPD Systems Trans-  lation Services.    El equipo de Protección Social y Empleo del Banco Mundial desea reconocer el apoyo financiero del  Fondo Global para   la Reducción de Desastres y la Recuperación  y el Programa de Respuesta Social Rápida del Banco Mundial, que   cuenta con el apoyo de la Federación Rusa, de Reino Unido, Noruega, Suecia, Australia, Dinamarca y la Fundación Bill y   Melinda Gates, sin los cuales esta publicación no hubiera sido posible. Los resultados, la interpretación y las conclusiones   expresadas aquí son las de los autores y no reflejan necesariamente los puntos de vista del Directorio Ejecutivo del Banco   Mundial o los gobiernos que representan. \n\n1  1.  Puntos Principales  Los países de la región de América Latina y el Caribe (ALC) son muy vulnerables a amenazas naturales como ciclones tropicales,   terremotos, inundaciones y sequías. Los costos directos y los impactos indirectos de estos eventos en los países de ALC son   exorbitantes, y tienen consecuencias significativas en la salud fiscal de las economías de ALC. En 2017, los huracanes Irma   y María causaron daños y devastación extendida en Dominica y en Antigua y Barbuda. En Dominica, los daños se estimaron   en USD1 931 millones y las pérdidas en USD 382 millones y ascendieron al 226 por ciento del Producto Bruto Interno (PBI) de  2016.2 En Barbuda, se produjeron graves impactos en el sector de la vivienda estimados en USD 52.2 millones. Se estima que  el 45 por ciento de las casas está en estado inhabitable y el 28 por ciento debe remplazarse completamente, lo que entorpece el   regreso de las familias a sus hogares y medios de subsistencia.3 En México, dos terremotos de alta magnitud golpearon al país  y generaron una pérdida combinada de USD 8 mil millones,4 afectaron a 1.5 millones de personas y causaron 467 muertes.5  Los efectos del cambio climático seguirán intensificándose y causarán acontecimientos meteorológicos extremos cada vez más   frecuentes y más intensos que tendrán como resultado pérdidas mayores para los países de la región.  Los desastres y eventos climáticos pueden afectar a los más pobres y vulnerables de forma desproporcionada, manteniéndolos   en la pobreza, o empujando a los casi pobres a la pobreza. Las personas que viven en comunidades de bajos ingresos suelen   vivir  en  áreas  muy  expuestas  a  las  conmociones.  Los  pobres  también  carecen6  de  ahorros  y  tienen  acceso  nulo  o  limitado   a  financiamiento  o  seguros,  por  lo  que  estas  condiciones  de  vida  frágiles  empeoran.  El  resultado  de  ello  es  un  impacto    desproporcionado de los desastres y eventos climáticos sobre los pobres y un aumento de la pobreza en las personas vulnerables   y casi pobres. Además, algunos países de ALC dependen social y económicamente de la agricultura y otros de sectores sensibles   al clima como el turismo para el comercio, los ingresos y el empleo. Como resultado, quienes dependen de estos sectores para   su subsistir, pierden ingresos, empleo y luchan por recuperarse de los choques climáticos y de desastres. Por ejemplo, después   del huracán María en Dominica, el sector agrícola sufrió los mayores daños y pérdidas, de USD 179.6 millones, en comparación   con otros sectores. Se destruyó entre el 80 y el 100 por ciento de los cultivos y los agricultores y pescadores perdieron la mitad   de su ganado, botes y equipos de pesca.7 Los sistemas de protección social cumplen un papel importante al ayudar a las poblaciones pobres y vulnerables a lidiar con   los impactos de los choques climáticos y de desastres y a construir resiliencia a largo plazo. Suelen utilizarse para proporcionar   redes de seguridad oportunas y propicias en tiempo de crisis y pueden ayudar a brindar soluciones a largo plazo para aumentar   los activos, las habilidades y los medios de subsistencia. Los programas de protección social deben ser receptivos y adaptables   para poder ampliarse rápidamente y ser capaces de aumentar el apoyo a los beneficiarios existentes y a otros no beneficiarios   afectados después de una conmoción. Para los países de ALC, los gastos de PS se financian en su mayor parte con cargo a los   presupuestos gubernamentales periódicos y proporcionan beneficios de PS previsibles y fiables para los hogares y las personas   necesitadas. El gasto de PS en ALC también se aproxima al promedio mundial del 1.5 % del PBI y supera los niveles de gasto de   PS en la mayoría de las regiones.8 Sin embargo, los sistemas tradicionales de protección social generalmente no pueden cubrir  los costos económicos y sociales ocasionados por choques. Esto se debe en gran medida a los limitados recursos disponibles   y a la falta de mecanismos, experiencia y conocimientos especializados para asignar, desembolsar y supervisar eficazmente los   fondos de recuperación y reconstrucción posteriores a desastres.  La respuesta de PS eficaz requiere contar con arreglos de financiamiento activos para movilizar los recursos adecuados para   responder de forma oportuna y eficaz después de un evento. Los desastres pueden generar inestabilidad fiscal debido a los gastos   repentinos e inesperados que se realizan durante y después del evento. Los gobiernos también necesitan acceso oportuno a los   recursos para financiar una respuesta de emergencia y recuperación eficaz. Esto implica contar con sistemas administrativos y   jurídicos eficaces para la apropiación y ejecución de fondos para el presupuesto, la distribución de seguros y las liquidaciones  \n2  gubernamentales.  Algunos  países  en  ALC  han  implementado  programas  de  protección  social  relacionados  con  GFRD  para    aumentar  la  resiliencia  de  los  pobres.  Por  ejemplo,  México  facilitó  el  uso  del  Fondo  Nacional  de  Emergencia  (FONDEN)  para    financiar parcialmente el antiguo Programa de Empleo Temporal Inmediato (PETI9) para proporcionar transferencias temporales a  cambio de trabajo en proyectos comunitarios a hogares elegibles afectados por desastres u otras crisis. Sin embargo, la mayoría   de los países de la región tienen experiencia limitada o ad-hoc en lo que respecta a vincular medidas de GFRD para implementar   programas de PS post-desastre.  Los mecanismos de gestión financiera del riesgo de desastres pueden proporcionar a los gobiernos los recursos necesarios   para una respuesta de protección social de forma oportuna y efectiva después de un desastre. El GFRD ayuda a los gobiernos a   mejorar su resiliencia fiscal y a obtener recursos oportunos después de un desastre o una conmoción relacionada con el clima.   Los gobiernos tienen la responsabilidad implícita de proteger y asistir a los más vulnerables en situaciones post-desastre. Los   gobiernos pueden utilizar instrumentos financieros para facilitar una recuperación resiliente, en particular para ayudar a los más   pobres y vulnerables a construir medios de subsistencia resistentes después de un desastre. A pesar de que varios países como   Panamá, Guatemala, Jamaica y Granada tienen estrategias nacionales de GFRD, su implementación es incipiente. La integración   de consideraciones de Protección Social en estrategias más amplias de gestión financiera del riesgo de desastres puede ayudar   a garantizar medidas para financiar una respuesta de PS ampliada a hogares después de desastres y ayudar a los países a   alejarse de enfoques ad-hoc y reactivos para financiar respuestas y esfuerzos de recuperación relacionados con la PS.  2.  Gestión Financiera del Riesgo de Desastres (GFRD) – Conceptos y Enfoques  La Gestión Financiera del Riesgo de Desastres es la práctica de organizar financiamiento, desarrollar políticas, marcos legales   e institucionales y crear capacidad con antelación para asegurar que los fondos estén disponibles y se utilicen de forma eficaz   para dar una respuesta rápida y permitir la recuperación frente a los costos económicos de las amenazas naturales. La GFRD   implementa políticas y operaciones de protección financiera sostenibles y asequibles para ayudar a los gobiernos a mejorar su   resiliencia financiera frente a los riesgos climáticos y de desastres.  La  Gestión  Financiera  del  Riesgo  de  Desastres  es  parte  integral  de  un  enfoque  más  amplio  de  la  Gestión  del  Riesgo  de    Desastres y  la agenda de cambio climático. El objetivo es aumentar la resiliencia de los países vulnerables frente a los impactos   financieros de los desastres con inversiones complementarias destinadas a la identificación de riesgos, la reducción de riesgos,   la preparación, la protección financiera y la planificación para la recuperación de desastres. De esta forma, la GFRD ayuda a   minimizar los costos y a optimizar los tiempos a la hora de cubrir las necesidades de financiamiento post-desastre sin poner en   peligro los objetivos de desarrollo, la estabilidad fiscal ni el bienestar.  Este tipo de enfoque proporciona planificación financiera que protege  los presupuestos nacionales de los países, las vidas y    medios de subsistencia de los residentes frente a los impactos de los desastres. La protección financiera ayuda a los gobiernos   a reducir sus sus pasivos contingentes explícito e implícito y a limitar la volatilidad de las cuentas. También asiste a los gobiernos   para canalizar el apoyo de emergencia a los hogares mediante mecanismos de protección social, lo que permite brindar una   respuesta más rápida y transparente y ayuda a que los medios de subsistencia sean más resilientes. Además, a nivel sectorial,   puede ayudar a los gobiernos a implementar alianzas público-privadas sostenibles y rentables. Por ejemplo, un seguro agrícola   como parte de una gestión de riesgo agrícola más amplia para proteger a los agricultores, los pastores y los pescadores.  Los  gobiernos  pueden  optimizar  su  cobertura  financiera  combinando  diferentes  instrumentos  para  proporcionar  protección    contra eventos de diferente frecuencia y gravedad, ya sea antes o después de eventos de desastre. Determinar la combinación   adecuada de instrumentos depende de los compromisos financieros que pueda afrontar el gobierno, de su margen fiscal y de   su tolerancia al riesgo. Las prácticas óptimas internacionales sugieren la adopción de un enfoque de estratificación de riesgos   para las estrategias de GFRD que combine instrumentos de retención de riesgo (como asignaciones presupuestarias o líneas de  \n3  crédito contingente) y de transferencia de riesgo (como seguros, que trasladan los riesgos del gobierno asociados con ciertos   eventos a otra parte), según la dimensión temporal de las necesidades de financiamiento post-desastre, la oportunidad y los   costos fijos de diferentes instrumentos. Existe una variedad de instrumentos de financiamiento de riesgo diferentes que pueden   agruparse para desarrollar una estrategia de financiamiento que sigue siendo resiliente para financiar correspondientemente   diferentes tipos de impactos. Entre ellos figuran (Tabla 1):  •\t Fondos\tde\tcontingencia/asignaciones\tpresupuestarias.   Pueden  ser  fondos  de  reserva  destinados  a  financiar   pérdidas  por  desastre.  Los  fondos  pueden  asignarse  mediante  asignaciones  presupuestarias  de  diferentes  fuentes,    como gobiernos nacionales o locales, organismos internacionales o una combinación de estos. Por ejemplo, el Gobierno   de México estableció un Fondo de Emergencia (FONDEN), un vehículo financiero mediante el cual el Gobierno federal   asigna el presupuesto por adelantado para brindar respuesta y reconstrucción post-desastre.  •\t Líneas\tde\tcrédito\tcontingente.  Brindan a los gobiernos acceso inmediato a fondos de una línea de crédito después de  un desastre. Este tipo de financiamiento se utiliza comúnmente para complementar fondos disponibles capitalizados en   un fondo de contingencia, para responder a desastres recurrentes o de mediana escala. Una línea de crédito contingente   es  un  instrumento  preliminar  que  permite  a  los  prestatarios  prepararse  para  un  desastre  asegurando  el  acceso  al    financiamiento antes de que el evento se produzca.  •\t Transferencias\t de\t riesgo.   Los  instrumentos  de  transferencia  de  riesgo  incluyen  instrumentos  de  seguros,  de   reaseguros o de mercado de capitales como los bonos de catástrofe. Con este tipo de instrumento, el Gobierno transfiere   los riesgos asociados con un desastre a otra parte pagando un costo/prima fijo. Por ejemplo, el  Fondo de Sostenibilidad   de los Océanos y Acuicultura del Caribe (COAST en inglés)  es un producto de seguros paramétrico destinado a promover   la resiliencia del sector de la pesca frente a los impactos de eventos meteorológicos y al riesgo de desastre.10 COAST  proporciona cobertura a pescadores frente a pérdidas causadas por clima adverso y por daños directos causados por   ciclones tropicales a buques, equipos e infraestructuras de pesca. Se prevé fortalecer la seguridad alimentaria de más de   180 000 pescadores en todo el Caribe mediante la protección de sus medios de subsistencia amenazados por el clima   extremo y promover la gestión sustentable de las pesquerías.  •\t Reasignaciones\tpresupuestarias.  Se trata de instrumentos financieros retroactivos que incluyen la transferencia de  fondos de una categoría presupuestaria a otra sin aumentar el monto total de gasto. La reasignación presupuestaria   suele desempeñar un papel fundamental para apoyar la respuesta inmediata y las etapas iniciales de la recuperación,   pero puede llevar tiempo implementarla debido a los procedimientos administrativos.  •\t Crédito\t post-desastre.   Una  última  opción  de  financiamiento  contra  riesgos  es  que  los  gobiernos  pidan  crédito   después de un desastre para poder enfrentar los daños y pérdidas. Esto podría incluir bonos o préstamos nacionales o   internacionales o préstamos de entidades internacionales, bilaterales o multilaterales.  Otro\t mecanismo\t financiero\t retroactivo\t vinculado\t a\t créditos\t post-desastre\t es\t el\t Componente\t Contingente\t de\t  Respuestas a Emergencias ( CERC en inglés ) ofrecido por el Banco Mundial como parte de su Financiamiento para   Proyectos  de  Inversión  ( IPF  en  inglés )\ta\tlos\tpaíses\tclientes.\t Los  CERC  permiten  a  los  países  acceder  rápidamente  a   fondos de un IPF existente para respuestas y recuperación frente a emergencias. Los CERC pueden incluirse en cualquier IPF del   Banco Mundial para facilitar la reasignación rápida de fondos no comprometidos y de esa forma abordar necesidades urgentes   en caso de una crisis o emergencia. Suelen incorporarse durante la preparación del proyecto y pueden designarse como una   asignación de “dólar cero” o con una cantidad de financiamiento preasignado. Este tipo de instrumento se utilizó en Dominica   para  financiar  transferencias  directas  de  efectivo  a  agricultores  y  pescadores  afectados  por  el  huracán  María  mediante  una    Subvención de Respuesta a Emergencias Agrícolas ( AERG en inglés ). El AERG fue financiado con el CERC del IPF del Proyecto de   Reducción de Vulnerabilidad frente a Desastres en curso financiado por el Banco Mundial, mediante el cual se reasignaron USD   7 millones de financiamiento no desembolsado del IPF para financiar las transferencias de efectivo del AERG. \n4  3.\t La\timportancia\tde\tla\tGestión\tFinanciera\tdel\tRiesgo\tde\tDesastres\tpara\tla\tProtección\t  Social (PS)  La GFRD propone diferentes instrumentos financieros que les permiten a los gobiernos ampliar los programas de protección social   para responder a los desastres. Aplicar los principios y las herramientas del GFRD permite que los programas de protección social   puedan adaptarse a aumentar la asistencia a los beneficiarios y los hogares afectados luego de la conmoción de un desastre. Los   programas de protección social adaptativa pueden facilitar incrementos en cobertura a no beneficiarios que han sido afectados   por un choque externo (i.e. expansión horizontal) y/o facilitar incrementos en los montos de apoyo a los beneficiarios existentes   en momento críticos de necesidad (i.e. expansión vertical). El GFRD permite a los gobiernos planificar y estructurar su ejecución   presupuestaria y, con los criterios de expansión vertical/horizontal establecidos con antelación, brindan asistencia rápida mediante   la rápida entrega de beneficios de PS post-desastre para hogares identificados como destinatarios del apoyo.  Desarrollar  una  estrategia  de  GFRD  permite  a  los  gobiernos  generar  mayor  previsibilidad  y  propiedad  sobre  el  riesgo  para    gestionar  las  pérdidas.  Con  una  estrategia  de  GFRD,  los  gobiernos  pueden  establecer  normas  claras  para  la  cantidad  y  la    frecuencia de los pagos bajo el sistema de protección social. Esto permitiría a los gobiernos aclarar quién es responsable por el   riesgo (por ejemplo, gobierno nacional/subnacional, donantes, etc.) para aumentar el tiempo de respuesta y minimizar la política   de asistencia y el gasto humanitario posterior innecesario. En el Caribe, también puede ayudar a mejorar la transparencia y la   rendición de cuentas acerca de los beneficios de la PS post-desastre mediante pagos a través de mercados financieros o de   dinero, que son más fáciles de rastrear. Contar con reglas o desencadenantes claramente establecidos también proporcionaría   previsibilidad a hogares vulnerables y mejoraría la comprensión de cuándo, cuánto y durante cuánto tiempo recibirán beneficios   de PS post-desastre.  La  GFRD  también  brinda  a  los  funcionarios  públicos  la  información  sobre  riesgo  y  las  herramientas  necesarias  para  tomar    decisiones financieras informadas sobre gestión de desastres y riesgos relacionados con el clima. Al cuantificar el riesgo y las   Tabla 1.  Instrumentos Comunes para la Planificación Financiera  Instrumentos ex ante  (se establecen antes del desastre) Instrumentos ex post  (se\testablecen\tdespués\tdel\tdesastre)  Retención de riesgo (cambia en relación  a cuándo/ cómo se paga)  - Fondo contingente o asignación  presupuestaria - Línea de crédito contingente - Asignación presupuestaria de emergencia - Aumento de impuestos de emergencia - Crédito post-desastre  Transferencia de  riesgo (eliminar el riesgo  del balance  general)  - Seguro/reaseguro tradicional - Seguro, reaseguro o derivados basados en  índices (por ejemplo, seguro agrícola basado en índices,  seguro climático basado en índices) - Instrumentos de mercado de capital - Ayuda  discrecional post-desastre  socios para el desarrollo  Fuente: adaptado del Grupo Banco Mundial, 2016. \n5  Recuadro 1:  Cuantificación de impactos potenciales de desastre y daños económicos en hogares  de San Vicente y las Granadinas  Se\tutilizó\tun\tenfoque\tde\tmodelización\tde\triesgo\tprobabilístico\tpara\tidentificar\ty\tcuantificar\tlos\tefectos\tde\tlos\tdesastres\t  en los hogares incorporando las condiciones sociales.  Primero, se llevó a cabo un modelo de impactos de amenazas en los   edificios residenciales del país. Esto incluyó recopilar los datos socioeconómicos y de amenazas existentes y su asignación espacial   para estimar el riesgo de las amenazas predominantes de huracanes y terremotos. Luego se realizó una cuantificación de la correlación   entre el riesgo y la protección social, incluidos impactos climáticos, para estimar las potenciales pérdidas futuras y, por consiguiente,   los requerimientos presupuestarios para las políticas sociales.  Para el análisis, se consideraron los tipos de vivienda.  El Perfil de Riesgo incorpora los atributos espaciales y de construcción de   la totalidad de los edificios en San Vicente y las Granadinas, como la ubicación geográfica, urbanidad o ruralidad, tipo de ocupación,   materiales de construcción (por ejemplo, madera, hormigón) y el valor de reemplazo. Se consideraron tres tipos amplios de paredes   exteriores: de madera o madera mezclada con otros materiales, paredes de bloques de hormigón o paredes de paneles de hormigón   y otros tipos de paredes exteriores (por ejemplo, piedra, ladrillos de arcilla). Para el techo, las categorías incluyeron principalmente   techos de chapa metálica (más del 90 %) y tejas o losa de hormigón para el resto. El tamaño promedio de un hogar en San Vicente y   las Granadinas es de 78 m2, con un costo medio de reemplazo de USD 379/m2. El valor de reemplazo total de las viviendas del país  ascendió a USD 1204 mil millones, lo que concordó con las estimaciones de las existencias de viviendas de la capital del país.  Para considerar la vulnerabilidad social en el análisis, se identificaron cuatro grupos sociales según la Encuesta sobre   Condiciones de Vida de 2007:  (i) extremadamente pobre; (ii) pobre pero no extremadamente pobre; (iii) no pobre pero vulnerable;   y (iv) no pobre y no vulnerable. Los hogares en el segmento extremadamente pobre representaban el 2.78 % de la población y vivían   con menos de USD 2.5 por día en 2007. Los  pobres pero no extremadamente pobres  (28 %) constituían el segundo grupo social más  grande del país. Los  no pobres y no vulnerables  (56 %) vivían con más de USD 7 por día. Los  no pobres pero vulnerables  que vivían  con entre USD 6 y 7 por día, representaban el 18 % de la población del país. Aunque la mayor parte del país está constituida por el   grupo social  no pobre y no vulnerable , casi la mitad de la población (48.45 %) se encuentra dentro de las categorías pobre o vulnerable. pérdidas financieras potenciales ex ante, permite que las estrategias de GFRD sean más efectivas. También permite a las partes   interesadas  a  comprender  los  costos  y  beneficios  de  invertir  en  financiamiento  y  reducción  de  riesgos.  Las  evaluaciones  de    riesgo de desastre proporcionan a los encargados de formular políticas la información para cuantificar los potenciales impactos   del desastre a partir de datos históricos e integrando variables socioeconómicas para determinar los instrumentos financieros   necesarios adecuados y un proceso presupuestario para transferir recursos adicionales a los programas de protección social a   fin de asegurar que los recursos se distribuyan a los más afectados después de un desastre. Normalmente, este tipo de modelos   considera la exposición, el riesgo, la vulnerabilidad y las pérdidas.  Un ejemplo útil de cuantificación ex-ante de posibles impactos y necesidades de financiamiento post-desastre proviene de un   modelo de exposición residencial que se llevó a cabo para San Vicente y las Granadinas. El objetivo era identificar y cuantificar   los efectos de los desastres en los hogares, incorporando las condiciones sociales y evaluar si la segmentación y la respuesta   estaban identificando adecuadamente esos efectos y respondiendo a las necesidades de los hogares. El estudio evaluó el tipo   de techo y pared y el grupo socioeconómico de la familia y evaluó el impacto de la Pérdida Promedio Anual para los diferentes   grupos  (Recuadro  1).  Los  resultados  del  estudio  mostraron  que  variables  como  el  grupo  socioeconómico,  el  impacto  de  los    huracanes en un área determinada y el tipo de materiales y la calidad de la construcción residencial son los principales factores   que conducen a un aumento de la pérdida promedio anual nacional en el periodo de tiempo estudiado (Recuadro 1). Con base   en los resultados del análisis, las repercusiones de las políticas de protección social indican que debe prestarse mayor atención   a los grupos sociales que experimentan una pérdida promedio anual al mismo tiempo que se tiene en cuenta que tanto los   grupos sociales de  personas pobres que no son extremadamente pobres y los de personas que no son pobres sino vulnerables    representan alrededor del 46 por ciento de la población de San Vicente y las Granadinas.  Continúa \n6  4.\t Principios\tClave\tpara\tUtilizar\tEnfoques\tde\tGFRD\tpara\tla\tPS\tAdaptativa\ten\tAmérica\t Latina\ty\tel\tCaribe\t(ALC)  Asegurar que existan sistemas de financiamiento adecuados para garantizar el uso más efectivo de los enfoques GFRD y a la   vez garantizar el financiamiento adecuado y oportuno para la Protección Social post-desastre. Para movilizar correctamente la   liquidez financiera (en cantidad y tiempo) para asistir a la población mediante mecanismos de PS Adaptativa, es necesario que   exista a) evaluación y cuantificación de los impactos potenciales de desastres que desencadenan la activación de los sistemas   de PSA y las necesidades de liquidez; y b) desarrollo de estrategias o procesos para asegurar el financiamiento rápido para las   medidas de respuesta de PS. Además, las medidas para incentivar una cobertura de seguro más amplia ayudarán a mejorar la   capacidad de las familias de hogares casi pobres y no pobres para recuperarse más rápidamente y reducir el aumento potencial   de la carga sobre la red de seguridad en contextos post-desastre.  1.   Evaluar  y  cuantificar  las  posibles  necesidades  de  financiamiento  para  PS  con  anterioridad:   Si  bien  cada    evento  de  desastre  puede  tener  un  gran  número  de  impactos  potenciales,  estimar  las  posibles  necesidades  de    financiamiento para generar una respuesta de PS post-desastre es de suma importancia para ayudar a los gobiernos   a  garantizar  que  los  mecanismos  de  GFRD  adecuados  estén  preparados.  El  ejemplo  anterior  de  San  Vicente  y  las    Granadinas en el recuadro 1 ilustraba los diferentes costos potenciales, dadas la estructura de los hogares, la condición   socioeconómica y el tipo de amenaza. Este es un ejemplo de cuantificación preliminar de necesidad de financiamiento   de PS potencial. Otros países han usado datos históricos para evaluar los impactos de los diferentes tipos de desastre   en  distintas  categorías  de  hogares.  Más  allá  de  los  impactos,  los  gobiernos  también  pueden  estimar  las  cantidades    necesarias para garantizar la facilitación del consumo y los ingresos. La información actual y fiable es imprescindible   Combinando\tla\texposición\tcon\tlos\tmodelos\tde\triesgo\ty\tde\tvulnerabilidad,\tindica\tque\tlas\tPérdidas\tPromedio\tAnuales\t  (PPA) de las edificaciones a causa de los terremotos es de alrededor de USD 1.0 millones o el 0.08 % del Valor Expuesto    Total\t(VET).\t Además, se esperaba que la Pérdida Máxima Probable (PMP) para un periodo de retorno de 250 años fuera del 5.1 % del  Valor Expuesto Total. La mayor PPA se vio en el noroeste de la isla de San Vicente y en las Granadinas del sur.  Con respecto a los huracanes, que son el peligro más prominente en San Vicente y las Granadinas, se calculó la PPA   de  este  fenómeno  para  varios  tipos  de  construcción.   Los  resultados  mostraron  una  correlación  entre  la  PPA  y  la  clase  de    vulnerabilidad  socioestructural.  El  grupo  extremadamente  pobre  era  el  más  vulnerable,  con  una  PPA  del  2  %  en  los  casos  en  que    ocuparan una estructura con paredes exteriores de madera cubiertas por chapa metálica. La segunda mayor PPA alcanzó casi el 1.5   % y se atribuyó a estructuras de madera y techos de teja ocupadas por familias pobres pero no extremadamente pobres. La menor   PPA (por debajo del 0.25 %) se vio en casas de bloques o paneles de hormigón armado y techo de hormigón (placas) ocupadas por   familias no pobres no vulnerables.  El\tanálisis\tdemostró\tque\texiste\tuna\tfuerte\trelación\tentre\tel\tpotencial\tde\tpérdida\ty\tel\tgrupo\tsocioeconómico\tde\tun\thogar.\t  Para el segmento extremadamente pobre de la población, la tasa de pérdida alcanza hasta un 50 % en un periodo de 1000 años y   hasta un 25 % en un periodo de retorno de 100 años. Sin embargo, es de alrededor del 17 % y el 7 % respectivamente para aquellos   que son no pobres no vulnerables.  La\tPPA\tpor\thuracán\tes\tcasi\tcinco\tveces\tmayor\tque\tla\tPPA\tpor\tterremoto.\t Aunque predominan las pérdidas por huracán, en  periodos de alto retorno (500 años y más), los grandes terremotos son casi tan devastadores como los huracanes extremadamente   potentes. \n7  para poder cuantificar eficazmente las necesidades de PS post-desastre, en particular, datos de encuestas de hogares   y de condiciones de vida; datos de índices de precio al consumo; datos de salarios; información de riesgos; etcétera.   Estas estimaciones ayudarán a los gobiernos a entender las posibles necesidades de financiamiento de beneficios de PS   post-desastre y a generar una respuesta adecuada y apropiada.  2.   Desarrollar  una  estrategia  de  GFRD  que  incluya  medidas  de  PS:   Como  se  ha  señalado  anteriormente,  una    estrategia de GFRD con normas claramente establecidas para la cantidad y la frecuencia de los beneficios de PS puede   ayudar  a  los  gobiernos  a  tener  mayor  previsibilidad  y  responsabilidad  sobre  su  riesgo  para  gestionar  los  impactos    y  las  pérdidas  por  desastre.  Aunque  varios  países  de  ALC  han  comenzado  a  desarrollas  estrategias  y  políticas  de    GFRD, muchos no han profundizado en la incorporación de consideraciones sobre PS en estas medidas políticas. Por   lo tanto, los beneficios de la PS post-desastre siguen en riesgo de sufrir reasignaciones presupuestarias ad hoc y de   no proporcionar beneficios adecuados y oportunos. Es importante garantizar que la estrategia de GFRD incluya normas   claras  para  las  fuentes  de  financiamiento  de  la  respuesta  de  PS  post-desastre,  desencadenantes  definidos  para  los    beneficios de PS post-desastre, sus cantidades, duración y su criterio de elegibilidad.  3.  Incentivar la cobertura de seguro para los hogares que pueden pagarla:  La PS es fundamental para ayudar a   facilitar el consumo y restaurar los medios de subsistencia y bienestar de los afectados por desastres, particularmente   aquellos que son más pobres y más vulnerables. Cuando se produce un desastre, uno de los riesgos es que las personas   no pobres caigan en la pobreza, lo que hace que aumente la carga implícita sobre la red de seguridad social. Cuando   las personas no pobres también utilizan las estrategias de financiamiento de riesgo para proteger sus bienes y medios   de subsistencia, reducen las demandas potenciales de los beneficios de la PS post-desastre y, en definitiva, la carga   de las finanzas públicas en caso de desastre. Las estrategias que alientan a los hogares y a las personas a comprar   pólizas de seguro y a participar en la cobertura conjunta de riesgo son, por lo tanto, un complemento importante de las   estrategias de GFRD. Esto es particularmente importante para los hogares y las personas en los márgenes, cuyos medios   de subsistencia están muy amenazados por el riesgo de desastre, como agricultores, pescadores y personas vulnerables   que viven en zonas de riesgo. Los Programas de Protección de Medios de Subsistencia (PPMS) como el desarrollado   por la Iniciativa de Seguro Climático de Múnich en el Caribe utilizan alianzas público-privadas mediante esquemas de   microseguros para reducir los riesgos identificados anteriormente.  5.  Evaluación de la Madurez de la Utilización de los Enfoques de GFRD en los Sistemas   de PS   El siguiente gráfico tiene como objetivo ayudar a los países de ALC a evaluar cómo están utilizando los enfoques de GFRD para   asegurar una PSA efectiva, en particular para la respuesta de PS post-desastre. Los países en el nivel naciente de la escala   son aquellos que no incorporan enfoques de GFRD para asegurar una respuesta post-desastre apropiada y efectiva. Un factor   agravante  es  que  la  cobertura  de  seguros  entre  los  no  pobres  sea  baja,  lo  que  aumenta  el  presupuesto  implícito  potencial    sobre  la  red  de  seguridad  si  se  produce  un  desastre  de  gran  escala.  En  estos  países,  la  cuantificación  de  las  necesidades    de financiamiento para la PS está ausente en gran parte y la respuesta de PS post-desastre suele ser ad hoc y reactiva. En   los países emergentes, puede que se apliquen algunos enfoques de GFRD, pero sus vínculos con la PS están ausentes o son   débiles en gran medida. En estos países, puede haber un grado de aseguramiento razonable de los hogares, pero sin ser lo   suficientemente amplio como para asegurar la cobertura adecuada de los no pobres en caso de un desastre de gran escala.   En el nivel establecido, los países tienen mecanismos más claros para cuantificar las necesidades de financiamiento para la PS   post-desastre con anterioridad; políticas de GFRD claras y estrategias con inclusión explícita de consideraciones de PS; emplean   una mezcla de opciones de financiamiento de contingencia; y amplia cobertura de seguro para los no pobres. \n8  Figura 1.  Tipología para Evaluar la Madurez del Sistema  Fuente: Autores  - Las necesidades de financiamiento   para la PS post-desastre no están   cuantificadas con anterioridad   y los datos para facilitar esas   evaluaciones pueden no estar   disponibles o no ser actuales. - El gobierno no tiene contexto sobre   su responsabilidad contingente. - La respuesta de PS post-desastre   es ad hoc y reactiva. - Los mecanismos de seguros para   individuos o horages son limitados   o tienen una cobertura muy baja. - A nivel macro, no hay seguros   paramétricos u otros mecanismos   de financiamiento para   contingencias vigentes. - El gobierno reúne información   sobre riesgos/ realiza evaluaciones   de riesgos incluyendo indicadores   socioeconómicos para cuantificar   y comprender las posibles   necesidades de financiamiento   para la PS posdesastre. Los datos   para tales evaluaciones están   disponibles pero no siempre están   actualizados. - El gobierno desarolla un Estrategia   de Gestión Financiera del   Riesgo de desastres, pero no   necesariamente incluye medidas   para financiar respuestas de PS. - Está disponible una combinación   limitada de mecanismos de   financiamiento de contingencia. - A nivel macro, los seguros   paramétricos u otros mecanismos   de financiamiento de contingencia   están vigentes, pero no hay   protocolos que garanticen su uso   para la respuesta de PS. - Los mecanismos de seguros   para  individuos o hogares están   disponibles y tienen una cobertura   razonable. - Hay productos de microseguros   desarrollados y programas piloto   en funcionamiento. - Desarrollo de alianzas público   privadas. - Las necesidades de financiamiento   para PS y los impactos potenciales   se evalúan y cuantifican de forma   rutinaria, lo que incluye perfiles   claros de las personas que son   vulnerables a desastres. - Las políticas y estrategias de GFRD   están en funcionamiento con   vínculos y protocolos claros para   financiar respuestas de PS. - Las asignaciones presupuestarias   anuales son un anclaje para las   políticas/estrategias de GFRD. - Está en funcionamiento una   combinación de instrumentos de   GFRD. - A nivel macro, los seguros   paramétricos u otros mecanismos   de financiamiento de contingencia   están vigentes, con protocolos que   garantizan su uso para la respuesta   de PS. - Las líneas de crédito contingentes   para respuesta de PS se   establecen con anticipación. - Los mecanismos de seguros   para individuos o hogares están   disponibles y tienen una amplia   cobertura. - Los productos de microseguros   están bien desarrollados y   proporcionan una cobertura   razonable. - Las alianzas público privadas están   bien establecidas.  NACIENTE   EMERGENTE   ESTABLECIDO \n9  6.\t Experiencias\ten\tALC\tutilizando\tenfoques\tde\tGFRD\tpara\tobjetivos\tde\tProtección\t  Social Adaptativa  A lo largo de los años, los países de ALC han aprovechado una serie de experiencias en la utilización de enfoques de GFRD   para ayudar a contribuir a los objetivos de PSA, en particular en la respuesta de PS para desastres. Aunque algunas de estas   experiencias han sido puntuales o reactivas, otras están arraigadas en las políticas gubernamentales, con arreglos financieros e   institucionales establecidos. Aquí se destacan algunos ejemplos.  MÉXICO: Vínculos  entre  los  mecanismos  de  financiamiento  de  contingencias  del  FONDEN  y  el  Programa  de    Empleo Temporal Inmediato (PETI)11 12  Desafío\tde\tdesarrollo.\t México  está  entre  los  30  países  del  mundo  más  expuestos  a  tres  o  más  tipos  de  amenazas   naturales.  En  promedio,  todos  los  años,  el  Gobierno  federal  y  los  estatales  en  México  gastan  alrededor  de  USD  1.5  mil    millones en reconstrucción de bienes públicos y en viviendas de bajo costo después de desastres. En 2010, las grandes   inundaciones demandaron un gasto de más de USD 5 mil millones, en su mayoría para activos locales.  Solución  financiera.   PETI  fue  el  componente  de  emergencia  del  programa  de  transferencias  de  efectivo  por  trabajo    del  Programa  de  Empleo Temporal  (PET)  que  fue  creado  en  1997  y  gestionado  por  el  Gobierno  de  México.  PETI  brindó    transferencias temporarias a cambio de trabajo en proyectos comunitarios para hogares elegibles en municipios marginados   o para aquellos cuyos medios de subsistencia se habían visto afectados por desastres u otras crisis. Para ello, el programa   seleccionó primero las áreas de intervención de acuerdo con los índices de desempleo o marginación. Se seleccionaron   municipios con niveles de marginación media, alta o extrema o con alto desempleo para el funcionamiento del PET. También   fue  necesario  que  los  ministerios  involucrados  compartieran  una  base  de  datos  de  los  beneficiarios  y  un  sistema  de    información. Todos los ministerios involucrados en la implementación recibieron datos del sistema de alerta temprana, lo que   les permitió preparar una respuesta de emergencia o ampliarla en localidades afectadas mediante el PET u otros canales   de respuesta. Cada ministerio colaborador fue responsable de llevar a cabo su parte del programa de trabajos públicos:   desde la segmentación hasta los pagos, la supervisión y el monitoreo, dentro de su propio paquete de recursos. En 2006,   se otorgó el carácter obligatorio al fondo de contingencia ( Reserva Inmediata ) para el PET y cada organismo involucrado   en  la  implementación  del  programa  debió  mantener  un  fondo  anual  de  contingencia  (hasta  un  20  por  ciento)  que,  si  no    se utilizaba, se podía ejecutar más tarde mediante la programación regular. Este programa estableció un mecanismo de   respuesta de emergencia independiente dotado de un presupuesto de contingencias para asegurar que el apoyo llegase a   las personas afectadas por los choques climáticos y de desastres de forma oportuna y eficiente.  Impacto.    Entre  los  años  2000  y  2010,  el  PET  llegó  aproximadamente  a  3.2  millones  de  beneficiarios.  En  2010,  se   desembolsaron aproximadamente USD 89 millones en 12 694 proyectos comunitarios que beneficiaron a más de 468 000   personas. \n10  CARIBE:  Mejoramiento  del  acceso  a  seguros  entre  las  personas  vulnerables  mediante  la  adaptación  y    Aseguramiento ante el Riesgo Climático en el Caribe - CRAIC13  Desafío\tde\tdesarrollo.\t En los últimos 30 años, el Caribe ha sufrido el impacto de inundaciones y tormentas tropicales  que afectaron a 1.5 millones de personas directamente y causaron más de USD 5 mil millones en daños. Estos desastres   perjudican gravemente el crecimiento económico de los países del Caribe debido a su dependencia de sectores vulnerables   al clima como el turismo y la agricultura.  Solución financiera.  El proyecto CRAIC, implementado mediante el MCII, busca abordar el cambio climático, y la adaptación   y la vulnerabilidad al mismo, promoviendo el aseguramiento basado en índices meteorológicos como instrumento de gestión de   riesgo en el Caribe. A través del proyecto, se desarrolló en 2011 la Política de Protección de Medios de Subsistencia (LPP por   sus siglas en inglés) para ayudar a personas vulnerables a recuperarse de los daños causados por vientos fuertes o grandes   precipitaciones. Está dirigido a personas y negocios cuyas vidas se ven afectadas por fenómenos meteorológicos extremos,   como agricultores, pescadores, vendedores de mercado, trabajadores de la construcción, trabajadores del turismo, vendedores   de comida y pequeñas y medianas empresas. La LPP brinda pagos en efectivo rápidos después de un evento climático, lo que   permite a los poseedores de pólizas comenzar a reconstruir sus vidas tras un desastre. El programa se encuentra actualmente   en su segunda fase operativa en Jamaica, Santa Lucía, Granada, Belice y Trinidad y Tobago. De forma similar, en 2019 se lanzó   el producto COAST dirigido a pescadores (descrito anteriormente), el cual proporciona cobertura por pérdidas causadas por   clima adverso y daños directos causados por ciclones tropicales a buques, equipos e infraestructura de pesca.  Impacto.    En  la  primera  fase,  los  pagos  se  realizaron  dentro  de  los  14  días  posteriores  al  desastre,  lo  que  ayudó  a  los   poseedores de pólizas a reconstruir rápidamente sus medios de subsistencia después de un evento climático extremo. En   Santa Lucía, los primeros pagos se realizaron en diciembre de 2013 y enero de 2014. En 2016, 31 poseedores de pólizas,   entre ellos pequeños productores y otras personas, recibieron pagos debido a la tormenta tropical Matthew, alcanzándose   un monto de USD 102 000 en pagos y USD 3290 en promedio por titular de póliza. En Jamaica, los titulares de pólizas   recibieron un pago tras un evento de exceso de precipitaciones en mayo de 2017 y abril de 2018. Además, mediante el   programa,  los  gobiernos  asociados  han  reconocido  la  necesidad  de  contar  con  instrumentos  de  transferencia  de  riesgo    autosustentables para reducir la vulnerabilidad social e introdujeron regulaciones específicas sobre LPP.  HAITÍ: Ampliación del seguro de catástrofe para los más pobres a través del Seguro de Catástrofe  FONKOZE -   KORE14 W15  Desafío\tde\tdesarrollo.  El 96 por ciento de la población de Haití vive en riesgo, por lo que se considera uno de los países  más expuestos del mundo a múltiples amenazas naturales como huracanes, inundaciones, erosión, sequías, terremotos y   avalanchas. Haití ocupó el tercer lugar entre los países más afectados por eventos relacionados con el clima desde 1996   hasta  2015.  Los  daños  y  pérdidas  promedio  asociados  con  eventos  hidrometeorológicos  únicamente  se  estiman  en  un    monto equivalente a casi el dos por ciento del PBI anual (1976-2012).  Solución  financiera.   Fonkoze  es  la  mayor  institución  de  microfinanciamiento  de  Haití  comprometida  con  llegar  a  los  más    pobres  y  ayudarlos  a  dar  los  primeros  pasos  para  salir  de  la  pobreza  mediante  enfoques  innovadores. A  través  de  Kore W,    Fonkoze brinda cobertura de seguro por catástrofe para sus clientes de microfinanciamiento. La cobertura está destinada a   proteger a los pequeños empresarios en caso de terremoto, lluvia u otros eventos de viento. El producto es obligatorio para todos   los clientes cuando solicitan un préstamo y la prima para la mayoría de los clientes es del 3 por ciento del préstamo principal. En   caso de un desastre causado por amenazas naturales, los clientes aprobados tienen derecho a recibir un pago de indemnización  \n11  de USD 125, la cancelación de su préstamo con Fonkoze y el derecho a solicitar un nuevo préstamo cuando estén preparados.   Kore W opera a través de MiCRO, una empresa de seguro y reaseguro por catástrofe ubicada en Barbados. MiCRO proporciona   una cobertura por índices (a través de Swiss Re) que se activa en catástrofes de gran escala (terremotos, viento y lluvia), además   de una cobertura de riesgo básica por eventos menores que puedan afectar a los clientes de Fonkoze.  Impacto.  A partir de 2014, Kore W se había destinado a aproximadamente 60 000 de los prestatarios de Fonkoze. Estos  clientes son comerciantes de pequeña escala, ubicados principalmente en áreas rurales y todos ellos mujeres.  7.\t Mensajes\tFinales  Los costos financieros de los desastres en países de ALC son debilitantes, y los costos para los hogares y las personas, en   particular para los más pobres, amenazan la estabilidad económica general y para la recuperación oportuna. Los programas   de Protección Social (PS) son fundamentales para ayudar a los pobres a gestionar el riesgo y a recuperarse del impacto de los   desastres. La PS también es de importancia clave para asegurar que los hogares y las personas afectadas (beneficiarios y no   beneficiarios) reciban beneficios y servicios para facilitar el consumo, restablecer sus medios de subsistencia y su bienestar.   Gran parte del Financiamiento contra el Riesgo de Desastres (GFRD) en países de ALC está pasando de naciente a emergente.   Sin embargo, existe un conjunto importante de análisis de riesgos y diálogo sobre políticas que debería acelerar la adopción de   enfoques de FRS para respaldar programas de PSA en la región. A pesar de tener sistemas de PS bien establecidos y con buena   financiación para hacer entregas regulares, los países de ALC no han podido garantizar sistemáticamente el financiamiento de   PS post-desastre para cubrir las necesidades de forma adecuada y oportuna y para enfrentar los riesgos e impactos de forma   apropiada. En cambio, el financiamiento de respuesta de PS ha sido, en general, reactivo y ad hoc. Si los países esperan mejorar   el  uso  de  enfoques  GFRD  para  PS,  deben  seguir  varios  principios  claves  para  garantizar  una  respuesta  de  PS  adecuada  y    efectiva. Entre ellos figuran la evaluación de las necesidades de financiamiento para PS, el establecimiento de una combinación   de opciones de GFRD, el establecimiento de políticas y estrategias de GFRD con vínculos claros con la PS y el incentivo a una   mayor cobertura de seguros.  Finalmente,  las  lecciones  aprendidas  de  las  estrategias  de  GFRD  generales  que  se  están  aplicando  en  los  países  de  ALC    ponen  de  relieve  la  necesidad  de  aumentar  la  coordinación  de  intervenciones  gubernamentales  en  paralelo  con  una  mayor    planificación  financiera  preliminar.  Entre  ellas  se  incluyen  varias  actividades.  En  primer  lugar,  en  el  contexto  de  la  GFRD,  es    importante  fortalecer  la  gestión  financiera  pública  y  los  marcos  legales  y  administrativos  en  los  que  se  inscribirá  la  PSA.    Además, desde un punto de vista financiero, se puede alcanzar una mejor relación costo beneficio combinando instrumentos de   GFRD ex-ante y ex-post para PSA. En segundo lugar, el desarrollo de análisis, de modo que la información geoespacial sobre   vulnerabilidad física y social (por ejemplo, datos de amenazas, registros sociales, detección remota y uso de datos de satélites)   esté  perfectamente  integrada  para  informar  a  los  beneficiarios  seleccionados.  En  tercer  lugar,  la  PSA  podría  aprovechar  los    mecanismos de entrega existentes que ya están en funcionamiento en los países. Por último, garantizar la transparencia y la   eficiencia del apoyo gubernamental a las personas más vulnerables mediante la adopción de un mecanismo de focalización   previo al choque externo (ex ante). Todas estas actividades mejoran la coordinación de las intervenciones y la solidez general   del sistema. Un elemento fundamental para poner en funcionamiento un programa de PSA es la adopción de una estrategia de   financiamiento adaptada, integrando las actividades mencionadas anteriormente. Aunque varios de los ejemplos presentados en   esta nota revelan iniciativas de financiamiento promisorias para fortalecer la PSA, hasta ahora no han tenido una coordinación   y conexión entre los sistemas más generales de PSA y GFRD. Esta desconexión se refleja en el uso común de reasignaciones   presupuestarias ex -post para poner en marcha el apoyo gubernamental para la población más vulnerable, lo que ha dado lugar   a respuestas inadecuadas en términos de frecuencia, debido a los procedimientos administrativos, y en términos de alcance,   dado que después de un desastre solo se pueden reasignar recursos financieros limitados. Por lo tanto, y lamentablemente, los   grandes desastres han provocado a veces fracasos en el aprovechamiento eficaz de las respuestas de PSA, lo que ha sometido   a los sistemas de PS y a las poblaciones afectadas a un mayor estrés. \n12  Bibliografía  Gobierno de Dominica. 2017.  Post Disaster Needs Assessment – Hurricane Maria September 18, 2017 .  Gobierno de Antigua y Barbuda. 2017.  Post Disaster Needs Assessment  Huracán Irma .  Iniciativa de Seguro Climático de Múnich. http://www.climate-insurance.org/home/  Relief Web. 2017.  Learning from El Niño Costero 2017: Opportunities for Building Resilience in Peru , octubre de 2017. Grupo del Banco Mundial. 2016.  Disaster Risk Finance as a Tool for Development: A Summary of Findings from the   Disaster Risk Finance Impact Analytics Project . Banco Mundial, Washington, DC.  Grupo del Banco Mundial. 2016.  Colombia: Policy Strategy for Public Financial Management of Natural Disaster Risk .   Banco Mundial.  Grupo del Banco Mundial. 2014.  Financial Protection Against Natural Disasters: An Operational Framework for Disaster   Risk Financing and Insurance . Washington, DC.  Banco Mundial. 2013.  CADENA Catastrophe Insurance: A Social Safety Net for small-Scale Farmers in Mexico  (English).   Mexico Agriculture Insurance Market Review; No. 4. Washington DC.  Banco Mundial. 2013.  Mexico’s Temporary Employment Program: Case Study . Washington, DC.  Banco Mundial. 2013.  FONDEN – Mexico’s National Disaster Fund: An Evolving Inter-Institutional Fund for Post-Disaster   Expenditures . Disaster Risk Financing and Insurance Case Study; Washington, DC.  Banco Mundial. 2012.  FONDEN: Mexico’s Natural Disaster Fund – A Review . Banco Mundial, Washington, DC.  Banco Mundial 2005.  Grenada: A Nation Rebuilding. An Assessment of Reconstruction and Economic Recovery One Year   After Hurricane Ivan .  Zelle LLP. 2018.  Natural Disasters in Latin America: A look back at 2017 . \n13  Notas Finales  1  El dólar estadounidense 2  World Bank. 2018. Dominica - Housing Recovery Project. Washington, D.C.: World Bank Group. 3  G     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {

        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {

        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
