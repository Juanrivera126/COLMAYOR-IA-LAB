ión,  burocracia,  etc.)  que  impiden  una   adecuada  adaptación  de  la  comunidad  a  la   realidad cambiante del ambiente, y una rápi-  da respuesta de las instituciones en caso de   desastres   Vulnerabilidad Social  relativa a la organi-  zación:\tSe\trefiere\ta\tla\tcapacidad\tde\tla\tcomu - nidad para organizarse y para establecer en   su  interior  lazos  de  solidaridad,  de  coopera- ción mutua, y a la representatividad o legitimi- dad de sus organizaciones y líderes. Fuente: OXFAM, s.f. \n46  Fig. 18: La vulnerabilidad y sus componentes  Fuente: MINAM, 2011. Guía para la elaboración de Estrategias Regionales de Cambio Climático. Lima, 120 p.  Activos tangibles   Activos intangibles  Una defensa civil fuerte y bien organizada.   Un\tsistema\tde\talerta\ttemprana\teficiente.\t  Equipos de rescate bien equipados.  Suministros de emergencia y otros recursos. Liderazgo local efectivo.  Movilización comunitaria.  Solidaridad y una población ‘conocedora de de- sastres’ y educada en las acciones a realizar.   Participación local en la planeación de evacua- ciones  Cuadro 16: Activos tangibles e intangibles de una población  Fuente: Grupo de Trabajo sobre el Cambio Climático y el Desarrollo, 2006.  Tipo de vulnerabilidad   Formas de medición  La vulnerabilidad hu- mana ante multipeligros   climáticos Está determinada por el nivel de Índice de Desarrollo Humano (IDH) de   la población en dichas regiones, la cantidad de peligros climáticos que   las amenazan y el porcentaje de la población expuesta. La vulnerabilidad humana   por concepto de seguri- dad alimentaria Está determinada por la cantidad de cultivos que contribuyen a la  se- guridad alimentaria en dichas regiones, la cantidad de peligros que las   amenazan y el porcentaje de la población expuesta. La vulnerabilidad agrícola   Se determina a partir del volumen de producción agrícola (ocho  Cultivos básicos que constituyen los principales alimentos) que es ame- nazada por peligro de sequía severa en cada región. La vulnerabilidad de la   infraestructura vial Se determina a partir del porcentaje de las redes viales amenazadas por   multipeligros climáticos en cada región.  Cuadro 17: Formas de medir la vulnerabilidad  Fuente: Monge, s.f. El cuadro 16 muestra las diversas formas de  medir la vulnerabilidad. Consecuentemente es necesario desarrollar  acciones  para  reducir  la  vulnerabilidad.  Ayuda   en\tAcción\tha\tidentificado\tlos\tsiguientes\tfactores\t  de vulnerabilidad (Recuadro 9) y componentes   para reducir la vulnerabilidad (Recuadro 10).  en\tAcción\tha\tidentificado\tlos\tsiguientes\tfac - tores de vulnerabilidad (Recuadro 9) y compo-  nentes para reducir la vulnerabilidad (Recuadro   10). \n47  El cuadro 17 muestra los factores de vulne- rabilidad socioeconómica en una zona alto an-  dina del Perú.   Fig. 19: Telaraña de factores de vulnerabilidad  Fuente: Wilches-Chaux, 2006; citado por Bernex y Tejada, 2012.  La  vulnerabilidad  es  una  condición  que   resulta  de  la  interacción  de  un  conjunto   de  factores  que  se  relacionan  entre  sí  de   manera  compleja.  Entre  estos  factores   destacan: la ausencia de un ordenamiento    y\tgestión\tdel\tterritorio,\tla\tfalta\tde\tplanifica -  ción\tcon\tenfoque\tde\tcuenca\thidrográfica,\t  la  ausencia  de  políticas  de  largo  plazo,  la    debilidad\tinstitucional,\tla\tintensificación\tdel\t  uso  de  la  tierra,  el  aprovechamiento  des-  controlado  de  los  recursos  naturales,  el   incremento  acelerado  de  la  población  y  la   presencia de condiciones socioeconómicas   desfavorables. Fuente: MINAM, S.f. Mapa de vulnerabilidad física   del  Perú.  Herramientas  para  la  gestión  del  riesgo.   Lima, 52 p.   Recuadro 10  Factores de vulnerabilidad 2.9 Capacidad  Capacidad :  La  combinación  de  todas  las  for-  talezas, los atributos y los recursos disponibles   dentro de una comunidad, sociedad u organiza- ción que pueden utilizarse para la consecución    de\tlos\tobjetivos\tacordados.\tLa\tfigura\t20\tmues - tra los componentes de la capacidad.  La capacidad también puede describirse como   aptitud.  La  evaluación  de  las  capacidades  es   un término para describir un proceso en el que   se  revisan  las  capacidades  de  un  grupo  en   comparación con los objetivos deseados, y se    identifican\tbrechas\trelativas\ta\tlas\tcapacidades\t con\tel\tfin\tde\ttomar\tacciones\tposteriores\t(UN - RISDR, 2009).   Capacidad de afrontamiento : La habilidad de   la población, las organizaciones y los sistemas,   mediante  el  uso  de  los  recursos  y  las  destre-  zas  disponibles,  de  enfrentar  y  gestionar  con-  diciones  adversas,  situaciones  de  emergencia   o desastres. La capacidad de afrontamiento re-  quiere de una concientización continua, al igual   que de recursos y una gestión adecuada, tanto   en  tiempos  normales  como  durante  las  crisis   o  condiciones  adversas.  Las  capacidades  de    afrontamiento  contribuyen  a  la  reducción  del   riesgo de desastres (UNRISDR, 2009). \n48  2.10 Otros conceptos importantes  Preparación:  El  conocimiento  y  las  capacida- des  que  desarrollan  los  gobiernos,  los  profe-  sionales,  las  organizaciones  de  respuesta  y   recuperación, las comunidades y las personas   para prever, responder, y recuperarse de forma   efectiva  de  los  impactos  de  los  eventos  o  las   condiciones  probables,  inminentes  o  actuales   que  se  relacionan  con  una  amenaza  (UNRIS-  DR, 2009).  Prevención : La evasión absoluta de los impac-  tos adversos de las amenazas y de los desas-  tres conexos (UNRISDR, 2009).  Recuperación :  La  restauración  y  el  mejora- miento, cuando sea necesario, de los planteles,   instalaciones,  medios  de  sustento  y  condicio- nes de vida de las comunidades afectadas por   los desastres, lo que incluye esfuerzos para re-  ducir los factores del riesgo de desastres (UN-  RISDR, 2009).  Reforzamiento : El refuerzo o la modernización   de  las  estructuras  existentes  para  lograr  una  mayor resistencia y resiliencia a los efectos da-  ñinos de las amenazas (UNRISDR, 2009).  Respuesta : El suministro de servicios de emer- gencia y de asistencia pública durante o inme-  diatamente después de la ocurrencia de un de-  sastre, con el propósito de salvar vidas, reducir   los impactos a la salud, velar por la seguridad   pública y satisfacer las necesidades básicas de   subsistencia de la población afectada (UNRIS-  DR, 2009).  Resiliencia :  La  capacidad  de  un  sistema,  co-  munidad o sociedad expuestos a una amenaza   para resistir, absorber, adaptarse y recuperarse    de\tsus\tefectos\tde\tmanera\toportuna\ty\teficaz,\tlo\t  que incluye la preservación y la restauración de   sus  estructuras  y  funciones  básicas  (UNRIS-  DR, 2009). El  cuadro  18  muestra  las  características  de  una comunidad vulnerable y resiliente. El cua-  dro  19  muestra  los  factores  que  inciden  en  el   comportamiento de la resiliencia.  1.\tParticipación:\tCon\tel\tfin\tde\tque\tlas\tpolíticas\t  de  desarrollo  satisfagan  las  necesidades   de  los  pobres  y  excluidos,  los    gobiernos   necesitan encontrar maneras de asegurar- se de que la gente vulnerable participe en   los procesos de responsabilización y toma   de decisiones. 2. Responsabilidad:  Los  gobiernos  deben   responsabilizarse de las promesas y políti-  cas que implementen o no implementen.  3. Descentralización:  Reforzar  el  gobierno   local ayuda a asegurar que la toma de de-  cisiones es apropiada y mejora la respon- sabilidad gubernamental.  4. Libertad  y  acceso  a  la  información:  La   gente necesita tener acceso a información   adecuada sobre políticas, derechos y deci-  siones importantes de gobierno para ase-  gurar  la  participación  en  la  reducción  de   desastres.  5. Obligaciones  legalmente  ejecutables:  Las   políticas  de  gobierno  y  su  obligación  de  proteger a los ciudadanos deben ser legal- mente  ejecutables,  sin  esto  los  gobiernos   pueden evadir su responsabilidad.  6. Acceso a la justicia: La justicia para todos,   con base en un marco legislativo apropia- do,  es  esencial  para  proteger  a  la  gente,   especialmente a los más marginados y vul- nerables.  7. Coordinación y cooperación nacional: para   que la reducción de desastres sea efectiva   se  necesita  cooperación  a  nivel  nacional   entre  las  tantas  y  diferentes  organizacio- nes e instituciones involucradas.  8. Cooperación y coordinación internacional:   Como los desastres no respetan las zonas   limítrofes  internacionales  son  importantes   los  acuerdos  que  aseguren  responsabili- dad transnacional para promover la segu-  ridad sobrepasando fronteras. Fuente: Grupo de Trabajo sobre el Cambio Climático y   el Desarrollo. 2006.  Recuadro 11  Componentes para reducir la vulnerabilidad \n49  Componentes del  sistema Vulnerabilidad  Suelo   Degradación de humedales (drenaje de bofedales)  Degradación de suelos por sobrepastoreo Pasturas   Sobrecarga animal en praderas naturales  Deterioro de praderas naturales  Deficiente\tmanejo\tde\tpastos\tcultivados  Ganadería   Débiles capacidades de manejo integrado de prácticas ganaderas  Desconocimiento de nuevas tecnologías de reproducción  Bajo mejoramiento genético ganadero  Bajas capacidades técnicas de sanidad pecuaria  Débil organización   Infraestructura\tdeficiente  Servicios básicos   Bajos niveles de salubridad  Infraestructura precaria  Escasa salud preventiva  Morbilidad y desnutrición infantil  Currícula educativa desligada de la realidad rural  Ausencia de inversión en saneamiento ambiental Vivienda y hábitat   Poca información sobre tecnologías renovables  Uso de leña, arbustos, bosta, paja (ichu) como fuente de energía  Ubicación precaria de centros poblados  Ausencia de estudios de desarrollo urbano Organización social   Débil organización  Cuadro 18: Factores de vulnerabilidad socioeconómica en una zona alto andina  Fuente: Gómez, A.; Moya, E.; Torres, J iente\tpara\tmanejar\tel\tcreciente\t  riesgo climático. Asimismo, dependen en forma   más directa de recursos naturales sensibles al   clima  para  generar  sus  ingresos  y  su  bienes- tar.  Además,  la  mayoría  se  ubica  en  regiones   tropicales y subtropicales ya sujetas a un clima   sumamente variable (Banco Mundial, 2010).  2. El cambio climático 2.1. Origen del cambio climático  El origen del cambio climático tiene que ver con   el exceso de gases de efecto invernadero (GEI)   en  la  atmósfera.  El  efecto  invernadero  es  el   proceso  natural  mediante  el  cual  la  atmósfera    mantiene  la  Tierra  caliente.  La  atmósfera  está   compuesta  por  una  capa  de  gases  invisibles.   Sin estos gases que hay en la atmósfera y man-  tienen el calor del sol, la Tierra sería un planeta   congelado en donde ningún tipo de vida podría   sobrevivir. El efecto invernadero es un proceso   natural. Tanto los gases de efecto invernadero   como el efecto invernadero son buenos para la   Tierra.  Cuando  existe  una  cantidad  adecuada   de GEI esto permite que la Tierra tenga la tem-  peratura apropiada para que haya vida. El pro-  blema  es  cuando  hay  un  desbalance,  cuando   las  actividades  humanas  generan  más  gases   de\t efecto\t invernadero,\t esto\t interfieren\t en\t el\t  proceso natural ya que estos gases se concen- tran  en  la  atmósfera  y  atrapan  más  calor,  es   entonces cuando la tierra se vuelve más cálida   (Stone et. al., 2010).  2.2. Consecuencias del cambio cli-  mático  Las  consecuencias  de  los  cambios  complejos   y  no  lineales  en  el  sistema  Tierra  ya  están  te-  niendo graves consecuencias para el bienestar   humano, como son:  -  Factores múltiples e interrelacionados, como   sequías combinadas con presiones sociales   y económicas, que afectan la seguridad hu-  mana; -  Aumento  de  la  temperatura  media  por  en-  cima  de  ciertos  umbrales  en  determinados   lugares, lo que ha tenido importantes conse-  cuencias  en  la  salud  humana,  como  un  au-  mento de los casos de malaria; -  Aumento  de  la  frecuencia  y  la  gravedad  de   fenómenos climáticos, como inundaciones y   sequías, a niveles sin precedentes que afec-  tan tanto el capital natural como la seguridad   humana; -  Variación cada vez más rápida de la tempe-  ratura  y  aumento  del  nivel  del  mar  que  in-   fluyen\ten\tel\tbienestar\thumano\ten\tdetermi - nados  lugares.  Por  ejemplo,  repercuten  en   la cohesión social de muchas comunidades,   entre otras las comunidades indígenas y lo-  cales;  el  aumento  del  nivel  del  mar  supone   una amenaza para algunos bienes naturales   y  la  seguridad  alimentaria  de  los  pequeños   estados insulares en desarrollo; y  -  Considerable  pérdida  de  diversidad  bioló- gica  y  extinción  constante  de  especies  que   repercute  en  la  prestación  de  servicios  de   los  ecosistemas,  como  el  colapso  de  una   serie de actividades pesqueras y la pérdida    de\tespecies\tutilizadas\tcon\tfines\tmedicinales\t  (PNUMA, 2012).  El cuadro 20 muestra la visión de la percep- ción  de  los  impactos  climáticos  a  nivel  de  los   países  de  la  Comunidad  Andina  y  principales   vulnerabilidades\t por\t sector\t y\t áreas\t geográfi - cas.  Se  muestra  que  los  retrocesos  glaciares   son comunes para los cuatro países. En el Perú  \n54  existe percepción de alta vulnerabilidad.  La\tfigura\t\t21\tmuestra\tlos\tpotenciales\timpac - tos del cambio climático en América Latina. El  cuadro  21  muestra  ejemplos  de  posibles  impactos  del  cambio  climático  por  efecto  de   la  alteración  de  los  fenómenos  atmosféricos  y   climáticos extremos, basados en proyecciones   hasta\tmediados\to\tfinales\tdel\tsiglo\tXXI.  2.3.  La  red  de  interacciones  entre   cambio  climático  y  los  sistemas   humanos  La\tfigura\t\t22\tmuestra\tlas\trelaciones\tde\tcausa\t  efecto del calentamiento global. Una forma más desagregada de estas rela-  ciones\tse\ ategias  de  compe-  tencia comunal. Entre  las  estrategias  de  competencia  ins- titucional  para  fortalecer  las  capacidades  de   adaptación comunal se señalan (Munasinghue   y Swart, 2005; ISDR, 2005; Smith, 2007):  -  Articular  las  políticas  de  cambio  climático   con  las  políticas  de  lucha  para  la  erradica- ción  de  la  pobreza  y  políticas  de  desarrollo   en general.  Fig. 24: Relaciones causas-efectos entre cambio climático y pobreza  Fuente: Soluciones Prácticas-ITDG, 2007; citado por Damman, G. (Ed.), 2008.  Precipitaciones   Aumento de la   intensidad:  - Lluvias torrenciales  - Fenómeno El Niño  Aumento de la  irregularidad  - Sequías prolongadas  - Veranillos Disminución de la calidad  y cantidad de los recursos  hídricos Gestión inadecuada de   los recursos naturalesCambio climático Temperatura Crecimiento  demográfico sostenido  Aumento de las heladas  (friaje) y olas de calor  Desaparición de los  nevados  Aumento de la ETP  (aridez)  Aumento de la   regularidad e intensidad -  Pérdidas agropecuarias y descapitalización de los productores (migración y abandono de   la actividad agropecuaria). -  Degradación de los recursos naturales (disminución de los recursos hídricos,    contaminación, aceleración de los procesosde desertificación). -  Conflictos sociales.  -  Aparición de nuevas plagas y enfermedades. Aumento de la vulnerabilidad  de la población Aumento de la pobreza y las  desigualdades \n59  Fig. 25: Marco conceptual de las interacciones de fuerzas motrices  Fuente: IPCC, 2007. -  Promover el desarrollo de instituciones efec-  tivas\tcon\tcapacidades\tde\tplanificación,\tges - tión participativa y lucha contra la corrupción   (de incidencia ambiental). -  Promover la participación de la comunidad. -  Facilitar  la  disponibilidad  de  información  y   destrezas. -  Generación  de  mayor  conciencia  pública  y   preparación para actuar. -  Mejorar la calidad y la cobertura para la ob-   tención\tde\tinformación\tcientífica. guntas para analizar la capacidad adaptativa de las comunidades  Fuente: CARE, 2009. Manual para el Análisis de Capacidad y Vulnerabilidad Climática (CVCA). 52 p. \n68  científica\ty\tpolítica.  -  Difusión  de  experiencias  locales  de  ACC   implementadas,  remarcando  las  diferencias   entre proyectos de ACC y proyectos tradicio- nales de desarrollo. -  Fortalecimiento de capacidades de los acto-  res  que  participan  en  la  formulación  de  las   políticas de desarrollo, a través de, por ejem-  plo, el diplomado, capacitación y talleres. -  Establecimiento  de  alianzas  con  otros  do-  nantes y programas que trabajan en el tema   en las regiones. -  Sensibilización  de  la  población  mediante   medios de comunicación directos. -  Incorporación del tema en la agenda política   sensibilizando a candidatos para las eleccio-  nes\t[de\tautoridades]\ta\ttravés\tde\tla\torganiza - ción  de  debates  públicos  y  la  participación   en ellos (Gálmez, 2010).   3.10. Los enfoques de adaptación   Según  Girot  (2012)  se  distinguen  cinco  enfo-  ques de adaptación:   -  Adaptación  basada  en  la  comunidad,  revir-  tiendo  las  tendencias  que  incrementan  la   vulnerabilidad. -  Adaptación  basada  en  ecosistemas,  incre-  mentando\tla\tflexibilidad\tde\tsistemas\tmane - jados que son vulnerables. -  Adaptación basada en cuencas, fomentando   la  adaptabilidad  de  sistemas  naturales  vul-  nerables. -  Adaptación  basada  en  sectores,  incidiendo    en\tla\tplanificación\tdel\tdesarrollo\ty\tde\tla\tin - versión pública. -  Adaptación basada en ciudades, aumentan- do la robustez de diseños de infraestructura   y de inversiones a largo plazo  ¿Porqué un enfoque integrado?  -  Comunidades vulnerables son más expues- tas  a  los  cambios  en  ecosistemas  y  su  de-  gradación. -  El manejo de ecosistemas, paisajes y cuen-  ca puede contribuir a abatir los impactos del   cambio climático, proveyendo bienes y servi-  cios  ambientales,  amortiguando  las  amena- zas climáticas. -  Hay numerosos ejemplos de manejo comuni- tario de recursos naturales, pueden comple- mentar enfoques de cuenca y ecosistemas. -  Mega proyectos de infraestructura dependen   de la armonización de enfoques sectoriales,  el manejo de ecosistemas y cuencas.   ¿Cuáles son las características de un enfo- que integrado de adaptación? Principios  y  enfoques  basados  en  los  dere- chos humanos:    -\t La\tnecesidad\tde\tplanificación\tde\tla\tadapta - ción y de acción concertada. -  Principios  y  enfoques  de  sostenibilidad  am-  biental. -  Potenciar la resiliencia de comunidades hu-  manas. -  Potenciar la resiliencia de ecosistemas. -  Tomar en cuenta tanto la variabilidad climáti-  ca como el cambio climático a largo plazo.  El  cuadro  29  muestra  las  preguntas  para  analizar  la  capacidad  adaptativa  de  las  comu-  nidades.  4. Los vínculos entre la Gestión   del Riesgo y la Adaptación al   Cambio Climático  4.1. Marco de Acción de Hygo para   la Reducción de Desastres  La gestión de riesgos resultantes del cambio  climático requiere un enfoque sistémico basado   en los principios de reducción de riesgos de de-  sastres  enunciados  en  el  Marco  de  Acción  de   Hygo  para  la  Reducción  de  Desastres  (ISDR,   2005).  En  enero  del  2005,  durante  la  Conferen- cia  Mundial  sobre  la  Reducción  de  Desastres   (CMRD),  celebrada  en  Kobe,  Hyogo,  Japón,   168  gobiernos  adoptaron  un  plan  de  10  años   para lograr un mundo más seguro frente a las   amenazas naturales. El Marco de Hyogo es un   plan  detallado  para  guiar  los  esfuerzos  desti-  nados  a  la  reducción  del  riesgo  de  desastres   durante  la  próxima  década.  Su  objetivo  prin-  cipal  es,  para  el  2015,  haber  reducido  consi-  derablemente  las  pérdidas  que  ocasionan  los   desastres en términos de vidas humanas y bie-  nes sociales, económicos y ambientales de las   comunidades y los países. El Marco de Hyogo   ofrece  una  serie  de  principios  guías,  acciones   prioritarias y medios prácticos para lograr la re-  siliencia de las comunidades vulnerables frente   a los desastres (Secretaría Interinstitucional de   la  Estrategia  Internacional  para  la  Reducción   de  Desastres  de  las  Naciones  Unidas.  EIRD/  ONU)1. El cuadro 30 muestra las Acciones Prio- ritarias del Marco de Hyogo. 1 http://www.eird.org/herramientas/esp/socios/eird/MAH.pdf \n69  La  aplicación  del  Marco  de  Hyogo  requiere  incorporar:  -  El  desarrollo  de  instituciones  efectivas,  ca-  pacidad humana y participación de la comu-  nidad. -  La utilización del monitoreo de riesgos y sis-  temas de alerta temprana. -  La difusión de información, la recolección de   datos y capacitación. -  Generar  mayor  conciencia  pública  y  prepa- ración para actuar.  -\t Planificar\trespuestas\tpara\tdesastres,\tplanes\t  de recuperación y redes de seguridad social. - Acción para reducir los riesgos (Smith, 2006).  4.2.  Ventajas  de  incluir  la  gestión   del  riesgo  y  adaptación  al  cambio   climático en las decisiones  De acuerdo con Magrin  (2008) algunas ven- tajas  de  la  inclusión  transversal  de  temáticas   como gestión del riesgo y adaptación al cambio   climático en las decisiones, para el logro del de-  sarrollo sostenible, son:  -  Analizar  las  políticas  de  desarrollo  conjun-  tamente\tcon\tlos\tefectos\tadversos\to\tbenefi - ciosos del cambio climático: no pensar solo   en las consecuencias o los impactos de los   escenarios  de  riesgo  de  desastres,  riesgo   ambiental  o  cambio  climático  que  afecten  a   la  comunidad,  los  ecosistemas  o  la  pobla- ción  en  general,  sino  pensar  en  las  causas   que  están  generando  esas  condiciones  de  vulnerabilidad  y  tomar  la  decisión  de  ac-  tuar\tsobre\tellas.\tAnalizar\tel\triesgo\tsignifica\t  evaluar la probabilidad de futuras pérdidas   y  daños.  Se  trata  de  un  análisis  prospec- tivo  que  permite  mejorar  los  vínculos  con    los\ttomadores\tde\tdecisiones,\tdefiniendo\t  mejor las expectativas de éxito en la plani-  ficación\tdel\tdesarrollo,\tdebido\ta\tque\tellos\t  permanentemente están analizando esce-  narios a futuro. -  Entender  que  el  riesgo  ambiental,  social   y  económico  y  el  cambio  climático  están   estrechamente  ligados:  su  consideración   integrada ayuda a articular diferentes dis-  ciplinas  del  desarrollo  hacia  el  objetivo   común:  la  reducción  de  la  vulnerabilidad,   y  así  fomentar  estructuras  de  gobernan- za.  En  este  contexto,  algunas  de  las  con- secuencias  del  trabajo  interdisciplinario  se    manifiestan\t en\t la\t articulación\t sectorial,\t el\t  fortalecimiento de redes interinstitucionales,   el  diseño  y  la  observación  de  indicadores   de  resultados  compartidos,  la  mejora  de  la   gestión  de  la  información  para  la  toma  de   decisiones, la actualización de las políticas y    medidas\tde\tplanificación\texistentes\tque\tper - mitan la incorporación del análisis del riesgo   ante los impactos del cambio climático, etc. -  Reconocer que las decisiones cotidianas del   desarrollo reducen o aumentan la vulnerabi- lidad: existen prácticas actuales en América   Latina que están aumentando o reduciendo   vulnerabilidad. En este contexto, se propone   que  la  diversidad  de  actores  reconozca  de   manera objetiva y asuma la responsabilidad   de su contribución al aumento o la reducción   de la vulnerabilidad. -  Reducir  vulnerabilidad  para  lograr  cohesión   social, conservar la biodiversidad, mantener   los  servicios  que  brindan  los  ecosistemas  y   luchar  contra  la  pobreza:  los  grupos  socia-  les excluidos y en condiciones de pobreza o   pobreza  extrema  serían  probablemente  los   más afectados con los impactos que se ge-  nerarían en los futuros escenarios de riesgo   y  cambio  climático.  Trabajar  en  la  incorpo-  ración\ttransversal\tde\testa\ttemática\tsignifica\t  que en las estrategias de lucha contra la po-  Acciones prioritarias   Descripción  1. Lograr que la reducción del riesgo de   desastres sea una prioridad Garantizar que la reducción del riesgo de desastres (RRD)   sea una prioridad nacional y local con una sólida base   institucional para su implementación. 2. Conocer el riesgo y tomar medidas   Identificar,\tevaluar\ty\tobservar\tde\tcerca\tlos\triesgos\tde\tlos\t   desastres, y mejorar las alertas tempranas. 3. Desarrollar una mayor comprensión y   concientización Utilizar el conocimiento, la innovación y la educación para   crear una cultura de seguridad y resiliencia a todo nivel. 4. Reducir el riesgo   Reducir los factores fundamentales del riesgo 5. Esté preparado(a) y listo(a) para   actuar Fortalecer la preparación en desastres para una respuesta    eficaz\ta\ttodo\tnivel.  Cuadro 30: Acciones Prioritarias del Marco de Hyogo  Fuente: EIRD/ONU, 2005. \n70  breza  y  reducción  de  la  exclusión  social  se   analice la reducción de la vulnerabilidad fren-  te  a  los  riesgos  de  desastres  y  escenarios   de  cambio  climático,  priorizando  acciones   como: evitar la construcción de viviendas en   zonas de alto peligro y sin consideración de   los procesos de ordenamiento territorial; pro-  mover procesos de reconversión productiva   que favorezcan la mejora de las condiciones   de  vida  de  la  población,  con  énfasis  en  zo-  nas de extrema pobreza; implementar activi-  dades de conservación de la biodiversidad y   manejo sostenible de los recursos naturales,   por  su  rol  importante  para  la  adaptación  al   cambio  climático  y  su  mitigación,  así  como   buena práctica de la gestión del riesgo, etc.  Los  siguientes  son  algunos  mecanismos  para  promocionar  la  interrelación  entre  GdR  y   ACC:  -  Propiciar espacios de intercambio de conoci- mientos, experiencias y actividades en curso   y previstas –es decir, compartir agendas de   trabajo– de GdR y ACC (por ejemplo, SAT,   guías  de  GdR  en  inundaciones  y  sequías,   escenarios  de  cambio  climático,  etc.)  en   espacios  con  participación  de  los  diversos   sectores públicos involucrados. Además, se   trata  también  de  involucrar  a  la  academia,  al   sector privado y a las organizaciones sociales. -  Promover  la  participación  de  la  comunidad   de  GdR  en  los  procesos  de  formulación  de   comunicaciones  nacionales,  en  las  evalua- ciones  de  vulnerabilidad  y  adaptación  y  en   las propuestas de los planes de adaptación,   así como en la elaboración y revisión de los   reportes del IPCC. -  Incluir  en  las  plataformas  nacionales  para   la  implementación  del  Marco  de  Acción  de   Hyogo  (generalmente  coordinadas  por  ser-   vicios\tde\tprotección\tcivil\to\tGdR\ty\tplanifica - ción) los puntos focales de la CMNUCC y a   los responsables de los temas de impactos,   vulnerabilidad y adaptación; hacerlo también   en el proceso de reporte de implementación   del Marco de Acción de Hyogo. La CMNUCC   es  un  acuerdo  global  vinculante,  por  lo  que   los  países  tienen  que  incorporar  la  GdR  en  el periodo post 2012. En ese sentido, el Perú   puede alcanzar aportes sobre cómo incorpo- rar la GdR en el SNIP, Colombia podría pro-  poner que 30% de los fondos de adaptación   se destinen a la GdR, mientras que México   ya tiene entre sus cuatro fondos uno destina- do  a  la  prevención  y  contingencia.  Por  otra   parte,  Perú,  Guatemala  y  Ecuador  tienen   nuevos  marcos  normativos,  destacando  la   incorporación  de  la  RRD  en  la  Constitución   del Ecuador, con lo cual es ahora un objetivo   de política estatal. -  Desarrollar  sinergias  en  la  formulación  de   políticas y actividades de GdR  y en relación   al Marco de Acción de Hyogo como un medio   efectivo para promover la ACC y la inversión   pública.  -  Elaborar un reporte especial del IPCC sobre   GdR y eventos extremos. La EIRD, con apo-  yo  de  Noruega,  ha  alcanzado  aportes  para   el  reporte  de  eventos  climáticos  extremos   cuyos  alcances  contribuirán  al  informe  del   IPCC del 2014 (García, 2010).   4.3.  Cambio  climático  y  sistemas   productivos  La\tfigura\t28\tmuestra\tel\tmarco\tanalítico\tde\tlas\t  relaciones  entre  cambio  climático  y  los  siste-  mas  productivos  de  los  pequeños  productores   en los Andes.  La\tfigura\t29\tmuestra\tla\truta\tpara\tla\tadapta - ción al cambio climático y la ruta para la gestión   del riesgo de desastres.  La\tfigura\t30\tmuestra\tla\tconvergencia\tentre\t  ACC y GRD/GdR. Tanto los conceptos que provienen de la teo- ría de la gestión del riesgo de desastres, como   aquellos  que  provienen  de  la  teoría  sobre  el   cambio\tclimático,\ttienen\tafinidad\ty\tcomplemen -  tariedad\tentre\tsí\t(Angulo,\t2006).\tLa\tfigura\t31\t  muestra las concepciones diferenciadas y com-  partidas  sobre  la  vulnerabilidad  social  desde   los enfoques de GdR y de ACC.  La\tfigura\t32\tda\tcuenta\tde\tla\trelación\tentre\t  riesgos de desastres y pobreza. \n71  Fig. 28: Marco analítico de las relaciones entre cambio climático y los  sistemas productivos de los pequeños productores en los Andes  Fuente: Tomado de Bievre et al, 2012.  Fig. 29: Equivalentes conceptuales: Rutas para ACC y GdR  Fuente: GIZ-PDRS, 2011. \n72  Fig. 31: Concepciones diferenciadas y compartidas sobre la  vulnerabilidad social desde los enfoques de GdR y de ACC  Fuente: GIZ-PDRS, 2011.  Fig. 30: Convergencia entre ACC y GRD/GdR  Fuente: MINAM, 2012. “Gestión de los Riesgos Climáticos en el Perú “ InterCLIMA 2012. Lima, 25 diapositivas.  Gestión de  riesgos de  desastres Peligros  climáticos Cambios  en eventos  climáticos  extremos Cambios en  Promedios del  Clima (T, P) Cambios en la  Variabilidad  Climática Peligros   naturales de   origen no   climático Peligros   geológicos Peligros   antrópicos   tecnológicos Análisis de riesgos de  los peligros geológicos y  antrpogénicos Análisis de riesgos  climáticos Ajustes a las condiciones  cambiantes del clima a  largo plazo Adaptación al  CC \n73  Fig. 32: Relación entre riesgo de desastres y pobreza  Fuente: EIRD/ONU, 2009. Informe de Evaluación Global sobre la Reducción del Riesgo de Desastres. Ginebra, Suiza.  En  lo  relacionado  con  la  gestión  del  riesgo,   el  efecto  más  importante  del  cambio  climá-  tico a considerar es la tendencia al aumento   progresivo en la frecuencia de los fenómenos   adversos  de  diverso  origen  pero  principal- mente  los  hidrometeorológicos.  Lo  anterior   unido  a  la  degradación  ambiental  y/o  trans-  formación del territorio contribuye a desenca-  denar,\texacerbar\to\tintensificar\tlas\tamenazas\t  naturales, como los deslizamientos, las inun- daciones, los incendios forestales y sequías,   entre otros. La  gestión  del  riesgo  de  desastres  busca  el aumento de la resiliencia y la reducción de   la vulnerabilidad, y por lo tanto ofrece la ca-  pacidad de apoyar la adaptación, en relación   con la forma de manejar esos eventos extre-  mos,  así  como  para  manejar  a  largo  plazo   aspectos tales como la degradación de eco- sistemas  que  incrementa  la  vulnerabilidad  a   estos eventos. Los  gobiernos  a  nivel  internacional  han  reconocido la importancia de la coordinación   de la adaptación al cambio climático con las   medidas  de  reducción  de  riesgos  de  desas-  tres  y  la  necesidad  de  integrar  estas  consi-  deraciones de una forma comprensiva en los   planes de desarrollo y en los programas para   la erradicación de la pobreza. Durante  varios  años  la  Estrategia  Inter- nacional  para  la  Reducción  de  Desastres   –EIRD-, ha provisto información y asistencia   sobre  la  reducción  de  riesgo  de  desastres   como una herramienta para manejar los ries-  gos climáticos y para la adaptación al cambio    climático,  haciendo  presencia  e  informando   en las deliberaciones políticas a nivel interna- cional y brindando asistencia a los gobiernos   Lectura 1  Relación entre la gestión del riesgo  y el cambio climático  L  E  C  T  U  R  A \n74  y otros actores para reducir las vulnerabilidad   relacionadas  con  el  clima  y  los  riesgos,  de   manera articulada con el Marco de Acción de   Hyogo (www.isdr.org). Los aspectos clave abordados son:  Usar las orientaciones previstas en el Mar- co  de  Acción  de  Hyogo,  acordadas  por  168   estados  en  Kobe,  Japón  en  el  2005  para   facilitar  el  trabajo  sistemático  más  que  una   aproximación por proyectos. Escalar el uso de herramientas existentes  para  la  reducción  de  riesgos  que  han  sido   probadas  por  su  efectividad  para  el  manejo   de  eventos  relacionados  con  el  clima,  que   serán  exacerbados  por  el  cambio  climático.    Esto  incluye  la  evaluaciones  de  amenazas   y  riesgos,  sistemas  de  alerta  temprana,  re-  gulaciones\tpara\tla\tplanificación\tdel\tuso\tdel\t  territorio y códigos de construcción, y las ca-  pacidades institucionales y legales. Asegurar que la adaptación al cambio cli- mático y la reducción de riesgos de desastres    son\tintegradas\ta\tlos\tprocesos\tde\tplanificación\t  del desarrollo en todos los sectores. Estable-  cer  comités  interministeriales  y  plataformas   o  sistemas  nacionales  para  la  reducción  de   riesgos  que  aseguren  la  coordinación  inter-  sectorial y multi-actores. Mejorar  las  capacidades  y  servicios  para  la transferencia de conocimientos de la cien-  cia a la práctica y generar puentes y enlaces   para reducir las brechas entres los diferentes   sectores  involucrados  en  el  manejo  de  ries-  gos y sensibles a los riesgos climáticos. Para  apoyar  esta  articulación  se  ha  crea- do  un  Grupo  de  Trabajo  Ad-hoc  entre  las   iniciativas  de  reducción  de  riesgo  y  cambio   climático,  que  recientemente  preparó  el  do-  cumento “Estrategias de Reducción de Ries-  gos  y  Prácticas  sobre  el  Manejo  de  Desas-  tres:  Elementos  Críticos  para  la  Adaptación   al Cambio Climático”, el cual fue enviado a la   Secretaría de la Convención sobre el Cambio   Climático UNFCCC, por sus siglas en inglés,   el 11 de noviembre de 2008. Este documento   amplía  la  propuesta  enviada  por  el  EIRD  en   septiembre de 2008 titulada “Propuesta para   la Presidencia de la Asamblea del AWG-LCA   para Mejorar las Acciones de Adaptación”, en   la cual se resalta que hasta la fecha se le ha  dado  muy  poca  atención  a  la  asistencia  hu-  manitaria a los desastres dentro de las nego- ciaciones de cambio climático, a pesar de ser   un  tema muy relevante dado el aumento de   los riesgos climáticos. El  documento  de  noviembre  señala  los  elementos relacionados con el tema de ries-  go que fueron mencionados en el Plan de Ac-  ción  de  Bali,  los  cuales  abarcan  estrategias   de reducción de riesgos y manejo de desas-  tres,  incluyendo  el  tema  de  los  mecanismos   financieros\tpara\tcompartir\ty\ttransferir\tel\tries - go. Este documento propone que los esfuer-  zos para reducir la vulnerabilidad y construir   resiliencia  a  los  eventos  extremos  debe  ser   una prioridad en el corto plazo.  Esta  priorización  ayudaría  a  la  reducción  de  pérdidas  humanas  y  económicas  en  el   corto  plazo,  y  también  a  asegurar  que  los   procesos  de  desarrollo  generen  bases  más   sostenibles  para  otros  procesos  de  adapta- ción  a  largo  plazo.  Podría  capitalizar  el  co-  nocimiento existente y las capacidades en el   tema de gestión del riesgo de desastres. También  propone  que  las  acciones  para  desarrollar  un  ambiente  institucional  y  para   proveer  mecanismos  de  apoyo  regional  con    el\tfin\tde\tcompartir\tel\tconocimiento,\tescalar\t  para  los  eventos  extremos  las  buenas  prác-  ticas  existentes,  generar  capacidades  y  so-  porte  tecnológico,  deban  ser  construidas   con  base  en  los  mecanismos,  instituciones,   herramientas  y  capacidades  existentes.  En   las áreas de reducción de riesgo, manejo de   los  riesgos  existentes,  preparación  para  las   emergencias  y  asistencia  humanitaria,  exis-  ten entidades con mecanismos y marcos de   trabajo  bien  establecidas  a  nivel  nacional,   regional  e  internacional,  que  cuentan  con  la   organización adecuada, y abordan los temas    de\t políticas,\t planificación\t y\t la\t práctica\t de\t  campo. Las cuales necesitan ser fortalecidas   en la medida que los impactos del cambio cli-  mático se  incrementan. Fuente: Secretaría General de la Comunidad Andina.   2009. Articulando la Gestión del Riesgo y la Adaptación   al Cambio Climático en el sector agropecuario: Linea-  mientos\tGenerales\tpara\tla\tPlanificación\ty\tla\tGestión\t  Sectorial. Proyecto Apoyo a la Prevención de Desastres   en la Comunidad Andina – PREDECAN. Lima, 128 p. \n75  Los  actores  del  desarrollo  regional,  nacional   y local tienen cada vez más interés en la pro-  blemática de los riesgos de desastres, en la   medida en que están cada vez más relaciona- dos con los modelos de desarrollo existentes,   y debido a que los desastres constituyen, sin   duda,  condicionantes  del  desarrollo  humano   y social. Los  daños  en  las  personas  y  la  destruc- ción  de  sus  medios  de  vida,  así  como  las   crecientes  pérdidas  económicas  en  los  paí-  ses, han motivado el tránsito desde enfoques   orientados a disminuir las pérdidas humanas   y  materiales  mediante  una  adecuada  res-  puesta a las emergencias, a otros orientados   a enfrentar las causas de tales desastres: los   riesgos. Los riesgos constituyen la probabilidad de  daños a causa de un desastre. Esta probabili- dad depende de dos factores determinantes:   las  amenazas  y  la  vulnerabilidad.  Hace  dos   décadas  las  amenazas  y  la  vulnerabilidad   eran  entendidas  como  situaciones  indesea- das frente a las cuales era necesario oponer   la prevención de desastres. Por el contrario,   hoy en día existe cada vez más el consenso   de que las amenazas y la vulnerabilidad cons-  tituyen realidades dinámicas, susceptibles de   ser  manejadas  mediante  la  reorientación  de   la gestión del desarrollo. Las  amenazas  de  desastres,  particular- mente  las  asociadas  con  la  variabilidad  cli-  mática,  han  dejado  de  ser  simplemente  la   probabilidad  de  ocurrencia  de  un  fenómeno   destructivo  incontrolable,  para  ser  en  gran   parte  resultantes  del  deterioro  ambiental  y   por  tanto  susceptible  de  ser  manejadas.  El   cambio climático y el deterioro de las cuencas   hidrográficas\ta\tconsecuencia\tdel\tmal\tmane - jo  de  los  recursos  naturales,  constituyen  sin   duda  factores  determinantes  en  el  aumento   de la intensidad y frecuencia de las sequías,   huracanes,  inundaciones,  deslizamientos,   aluviones y llocllas.  El\t cambio\t climático\t influye\t directamente\t  sobre  la  variabilidad  climática,  pero  también   indirectamente sobre la disponibilidad de los   recursos  naturales.  Ello  se  evidencia  en  el   retroceso  de  los  glaciares  y  la  variación  de   los caudales y cursos de los ríos que tienen   efectos  en  las  actividades  agropecuarias  en   el corto, mediano y largo plazo. El deterioro de las cuencas a consecuen- cia del mal manejo de los recursos naturales   está  directamente  asociado  con  las  tecnolo- gías aplicadas en los procesos productivos y   en las actividades extractivas, las que deter-  minan  cada  vez  más  la  desaparición  de  los   bosques y la disminución de la disponibilidad   de  los  recursos  hídricos,  así  como  el  incre-  mento  de  la  erosión  y  contaminación.  Todo    ello\tinfluye\ttambién\tal\taumento\tde\tla\tintensi - dad, y en algunos casos en la frecuencia de   los fenómenos destructivos ya aludidos. Sin  embargo,  el  aumento  de  los  riesgos  no tiene como causa principal el incremento   de  las  amenazas,  sino  el  incremento  de  las   condiciones  de  vulnerabilidad.  Aquí  es  ne-  cesario relevar los cambios sustantivos en la   comprensión  de  dicha  vulnerabilidad,  ocurri-  dos  desde  mediados  de  la  década  anterior:   el contraste de una visión estática de la vul-  nerabilidad que tenían las instituciones espe-  cializadas en las emergencias, y de la visión   dinámica  que  se  tiene  actualmente  desde   una  perspectiva  de  la  gestión  de  riesgo.  Se   trata en este último caso de reconocer cómo    los\tgrandes\tcambios\tdemográficos\ty\ttecno - lógicos,  las  políticas  públicas,  los  procesos   de gestión ambiental, los derechos económi- cos y sociales, y en general la manera cómo   funciona  la  sociedad,  interactúan  entre  sí  y   generan  cambios  en  las  condiciones  de  se-  guridad de las personas y la sociedad. Fuente: Ferradas, 2006. Gestión del riesgo y adapta- ción al cambio climático. ¿Los nuevos paradigmas del   desarrollo  sostenible?.  Soluciones  Prácticas  ITDG.   Lima, pp.: 5.  Lectura 2  Gestión de riesgos y cambio climático  L  E  C  T  U  R  A \n76  Índice de cuadros  Cuadro 20:  Visión de la percepción de los impactos climáticos a nivel  de la CAN    \t   y\tprincipales\tvulnerabilidades\tpor\tsector\ty\táreas\tgeográficas  Cuadro 21:  Ejemplos de posibles impactos del cambio climático por efecto de     la alteración de los fenómenos atmosféricos y climáticos extremos,    \t   basados\ten\tproyecciones\thasta\tmediados\to\tfinales\tdel\tsiglo\tXXI  Cuadro 22:  Tipos y medidas de adaptación Cuadro 23:  Acciones de respuesta a los efectos del cambio climático sobre los     recursos hídricos de los países de la CAN Cuadro 24:  Marco político y normativo sobre la gestión del riesgo y adaptación al     cambio climático  en el sector agrario en los países de la Subregión   Andina Cuadro 25:  Institucionalidad para la adaptación al cambio climático en los países de     la Subregión Andina  Cuadro\t26:\tMecanismos\tde\tprotección\tfinanciera\tpara\tla\tadaptación\tal\tcambio\t\t    climático Cuadro 27:  Algunos instrumentos económicos y accione nal – para    la\tconstrucción\tde\tsus\tmarcos\tde\tzonificación:  País   Descripción  Bolivia   Conceptos utilizados:  Los planes de OT tienen dos componentes: plan de uso del suelo y plan de ocupa- ción del territorio.  - La propuesta de ocupación del territorio comprende un “sistema jerarquizado de   asentamientos poblacionales, con roles y funciones productivos y de servicios,   como base para orientar la distribución de la población, la integración física, la dota-  ción de servicios básicos y sociales y la generación de oportunidades de desarrollo   para la población, en función de las potencialidades y recursos existentes”.  -\tZonificación:  Es parte del OT.  Define\tzonas\tcon\tun\tmanejo\to\tdestino\thomogéneo\tque\ten\tel\tfuturo\tserán\tsometi -  das\ta\tnormas\tde\tuso\ta\tfin\tde\tcumplir\tcon\tlos\tobjetivos\tpara\tel\tárea.  Metodología: i) descripción del componente físico-biológico (2). Y, ii) componente   socio económico. Colombia   Conceptos utilizados:  - Enfoque integral del territorio, reconociendo procesos culturales, económicas,   sociales y políticos ligados a la producción del espacio.   - Se debe lograr un ordenamiento físico-territorial que promueva el desarrollo   socio-económico en armonía con la naturaleza, garantizando a todos los sectores   el acceso a servicios, vivienda, infraestructura y equipamientos, así como la plena   realización de sus derechos.   - Reconoce al territorio como fuente natural de inequidades, dadas las interven- ciones generadas en él, todas ellas vinculadas a procesos sociales que operan en   contextos de poder determinados.      -\tZonificación:   La ley entrega a las autoridades municipales, entre otros, instrumentos como la cla-  sificación\tdel\tsuelo\t(urbano,\tsuburbano,\trural,\tde\texpansión,\tde\tprotección);\ty\tlas\t  unidades\tde\tactuación\turbanística:\táreas\tplanificadas\ty\tgestionadas\tconjuntamente\t   para garantizar el uso racional del suelo y la dotación de infraestructuras.   La\tley\t902\tde\t2004\tmodificó\talgunas\tconsideraciones\tpara\tel\tcaso\tde\tsuelo\turbano.\t  Ecuador   Conceptos utilizados:   -\tOT\tes\tdefinido\tcomo\tconjunto\tde\tpolíticas\tdemocráticas\ty\tparticipativas\tde\tlos\t  GAD ́s que permiten su apropiado desarrollo territorial.    -\tPlanificación\tcon\tautonomía\tpara\tla\tgestión\tterritorial,\tque\tparte\tde\tlo\tlocal\ta\tlo\t   regional en la interacción de planes que posibilitan la construcción de un proyecto   nacional.   Cuadro 31: Enfoques desarrollados por país – o gobierno subnacional   – para la construcción de sus marcos de zonificación \n78  Fuente: Societas Consultora de Análisis Social, 2012.  - Debe estar basado en el reconocimiento y la valoración de la diversidad cultural y   la proyección espacial de las políticas sociales, económicas y ambientales.   - Promover un adecuado nivel de bienestar a la población en donde prime la pre- servación del ambiente para las futuras generaciones.  Perú   Conceptos utilizados:   La\tZEE\tes\tun\tproceso\tdinámico\ty\tflexible\tpara\tla\tidentificación\tde\tdiferentes\t   alternativas de uso sostenible de un territorio determinado, basado en la evalua- ción de sus potencialidades y limitaciones con criterios físicos, biológicos, sociales,   económicos y culturales. Una vez aprobada la ZEE se convierte en un instrumento   técnico y orientador del uso sostenible de un territorio y de sus recursos naturales.   Zonificación:  Existe\tzonificación\tmicro,\tmeso\ty\tmacro  La\tzonificación\tecológica\ty\teconómica\t(ZEE)\t  es una de las principales herramientas del or-  denamiento territorial.   La\t zonificación\t ecológica\t y\t económica,\t  como  base  para  el  ordenamiento  territorial,   según  el  Tratado  de  Cooperación  Amazó-  nica  (TCA),  es  “un  proceso  dinámico,  que   permite en una región un arreglo espacial de   unidades  relativamente  uniformes,  caracteri-  zadas  en  base  a  factores  físicos,  bióticos  y   socioeconómicos  y  evaluados  en  relación  a   su  potencial  sostenido  o  su  tolerancia  a  las   intervenciones del hombre realizada a través   del  trabajo  de  equipos  multidisciplinarios”   (TCA 1994).  Según\t la\t FAO,\t la\t zonificación\t ecológica\t y\teconómica\tes\t“una\tforma\tde\tplanificar\tel\t  uso  de  tierras  teniendo  en  cuenta  todos  los   elementos  bio-físicos,  y  todas  las  condicio- nantes  socio-económicas  y  constituye  una   herramienta  para  la  gestión  de  los  recursos   naturales”  (FAO  1997).  Posteriormente,  se-  gún  el  Tratado  de  Cooperación  Amazónica,    se\tconsideró\tla\tzonificación\tecológica\ty\teco - nómica  como  “un  proceso  conducente  a  la   armonización de las actividades económicas   y utilización de los recursos con las caracte-  rísticas, cualidades y capacidades de las di-  ferentes  condiciones  ambientales  distintivas    que\tse\tmanifiestan\ten\tun\tmarco\tgeográfico\t  determinado” (TCA 1998).  La\tzonificación\tecológica\ty\teconómica\tes\t  un  instrumento  para  el  ordenamiento  terri-   torial\tque\tpermite\tla\tdefinición\tde\tplanes\tal - ternativos  de  uso  de  los  recursos  ecológica,  económica  y  socialmente  aceptables,  y  la   asignación de recursos, incentivos y políticas   para promoverlos. Permite  la  generación  de  escenarios  po-  tenciales\tpara\tla\tplanificación\tdel\tuso\tde\tlos\t  recursos en áreas demarcadas o zonas y sus   usos  potenciales.  Tales  escenarios  son  ge-  nerados mediante el análisis de los múltiples   objetivos de los actores principales en la toma   de decisiones sobre el uso de los recursos y   su  optimización.  Las  zonas  así  demarcadas   en los escenarios pueden ser susceptibles de   regulación  o  legislación  de  acuerdo  con  las   políticas de desarrollo local, regional y nacio- nal (TCA 1998).  La\tFAO\tafirma:  La\t zonificación\t ecológica\t y\t económica\t puede\tidentificar\tlas\topciones\tde\tuso\tsoste - nido  desde  el  punto  de  vista  biofísico.  Den-  tro  de  éstas  pueden  ser  escogidas  aquellas   cuya  viabilidad  socioeconómica  resulta  más   promisoria  en  el  contexto  de  los  mercados   potenciales,  la  infraestructura  existente  y   las  prioridades  establecidas  a  nivel  nacional   (FAO 2003).  Según\tRodríguez,\tla\tzonificación\tecológi - ca y económica busca conocer la diversidad   biofísica  y  socioeconómica  del  territorio,  de-  finir\tsus\tpotencialidades\ty\tlimitaciones\tpara\t  diversas  opciones  de  desarrollo  sostenible,   mediante  la  generación  de  información  ade-  cuada  para  la  toma  de  decisiones  que  per-  mitan  orientar  políticas,  planes  y  proyectos   de desarrollo sostenible en la Amazonía. De   Lectura 1  Zonificación ecológica y económica (ZEE)  L  E  C  T  U  R  A \n79  esta\tforma,\tla\tzonificación\tecológica\ty\teco - nómica se constituirá en el soporte técnico y   científico\tpara\tuna\tadecuada\tgestión\tde\tlos\t  gobiernos  regionales  y  locales  (Rodríguez,   2002,2006). De acuerdo con Mendoza, “para decidir so- bre las mejores alternativas del uso del terri-  torio se necesita conocerlas y ese es uno de    los\tprincipales\tresultados\tde\tla\tzonificación\t  ecológica y económica” (Mendoza 2005).  2. Ordenamiento Territorial  2.1. El territorio  Espacio físico natural, delimitado política y ad-  ministrativamente,  en  el  que  se  practican  las   diversas actividades humanas. Desde una perspectiva amplia, vinculada al  desarrollo,  el  territorio  puede  verse  como  un   conjunto  de  relaciones  dinámicas  entre  perso-  nas, y entre éstas y la naturaleza, en un espa-   cio\tgeográfico\ty\tun\ttiempo\tdeterminado.\tDichas\t relaciones\testán\tdefinidas\tpor\tlos\tprocesos\this - tóricos y las características políticas, socioeco- nómicas,  culturales  y  biofísicas  existentes.  En    tal\tsentido,\tel\tterritorio\tes\tun\tespacio\tgeográfico\t  al cual se le añade una dimensión política, juris-  diccional y cultural. El territorio es considerado   así como un producto social e histórico, dotado   de  una  determinada  base  de  recursos  natura-  les, de ciertas formas de producción, consumo   e  intercambio;  y  de  una  red  de  instituciones  y   formas  de  organización  que  dan  cohesión  al   resto  de  elementos.  Eso  hace  que  tenga  que   ver con las interrelaciones entre las personas y   con su identidad comunitaria. Esta manera de entender el territorio, no ex-  cluye\tdefiniciones\tmás\trestringidas\tde\tlas\tque\t  también se hace uso. Por ejemplo, las conteni- das en la legislación peruana, en la que se des-  tacan al menos dos sentidos de la palabra terri-  torio. Según el primero, el territorio “comprende   el  suelo,  el  subsuelo,  el  dominio  marítimo  y  el   espacio aéreo que los cubre” (Constitución Po-  lítica  del  Perú,  Artículo  54º).  De  acuerdo  con   el  segundo  sentido,  el  territorio  es  el  “espacio    geográfico\tvinculado\ta\tun\tgrupo\tsocial,\tque\tre - sulta  a  partir  de  los  espacios  proyectados  por   los grupos sociales a través de las redes, circui-  tos\ty\tflujos”-\tDecreto\tSupremo\t068-2001-PCM\t  Reglamento  de  la  Ley  sobre  Conservación  y   Aprovechamiento  Sostenible  de  la  Diversidad   Biológica, Artículo 8º. (GTZ; CONAM, 2006).  Schejtman\ty\tBerdegué\t(2004)\tdefinen\tterri - torio como una construcción social, que corres-  ponde  a  un  «espacio  con  identidad  y  con  un   proyecto  de  desarrollo  concertado  socialmen- te». Para Raffestin (1993), el territorio es un es-  pacio  que  ha  sido  apropiado  por  la  acción  so-  cial de diferentes actores en un particular juego   de poder (CONDESAN, 2010).  2.2. El ordenamiento territorial y el   Plan de Ordenamiento Territorial  2.2.1. Concepto  Planificación/ordenamiento\tterritorial:\tEl\tpro - ceso que emprenden las Autoridades públicas    para\tidentificar,\tevaluar\ty\tdeterminar\tlas\tdife - rentes  opciones  para  el  uso  de  los  suelos,  lo   que incluye la consideración de objetivos eco-  nómicos, sociales y ambientales a largo plazo y   las consecuencias para las diferentes comuni- dades y grupos de interés, al igual que la con-  siguiente formulación y promulgación de planes   que describan los usos permitidos o aceptables   (UNISDR, 2009).  Ordenamiento territorial  El ordenamiento territorial es una normativa   que\tregula\tel\tuso\tdel\tterritorio,\tdefiniendo\tlos\t  usos  posibles  para  las  diversas  áreas  en  que   este  se  ha  dividido,  ya  sea  el  país  como  un   todo,  o  una  división  administrativa  del  mismo.    También\tse\tlo\tdefine\tcomo\tun\tproceso\tplanifi - cado de naturaleza política, técnica y adminis- trativa,  cuyo  objeto  central  es  el  de  organizar,   armonizar y administrar la ocupación y uso del   espacio, de modo que estos contribuyan al de-  sarrollo  humano  ecológicamente  sostenible,   espacialmente  armónico  y  socialmente  justo   (CONDESAN, 2010).  El\tcuadro\t32\tmuestra\tlas\tdefiniciones\ty\tob - jetivos  del  OT  en  los  países  de  la  Subregión   Andina  El\tcuadro\t33\tmuestra\tlas\tdefiniciones\tcon - ceptuales del ordenamiento territorial en la re-  gión andino-amazónica.  2.3.  Fines  del  Ordenamiento  Terri-  torial  En general el Ordenamiento busca la disminu-  ción\tde\tlos\tconflictos\tpor\tapropiación\ty\tuso\tdel\t  suelo, el mejor aprovechamiento sostenible de   los recursos descubiertos y en proceso de ex-  plotación,  la  toma  de  conciencia  por  parte  de   los actores potenciales, las limitaciones de los   recursos  y  los  fenómenos  naturales  de  diver-  sa  índole  que  afectan  el  libre  actuar  humano,   la armonización de las actividades productivas   con las características del territorio (potenciali- dades, limitantes - restricciones y amenazas), o  \n80  Cuadro 32: Definiciones y objetivos del OT en los países de la Subregión Andina  País   Definición de ordenamiento territorial   Objetivos del ordenamiento  territorial-autoridades  Bolivia   La\tLey\tde\tMedio\tAmbiente\tdefine\tal\t  ordenamiento territorial como un instru-  mento\tde\tla\tplanificación\tdel\tdesarrollo.\t  Las\tnormas\tespecíficas\tde\tordenamiento\t  territorial han desarrollado esta relación   a través del vínculo entre los productos   de\tambos\tprocesos.\tLa\tplanificación\t   se expresa en los Planes de Desarrollo   nacional, departamental y municipal, y el   ordenamiento territorial en los Planes de   Ordenamiento Territorial de los mismos   tres ámbitos. El Plan de Ordenamiento Territorial tiene   como objetivos:  i) Formular propuestas concertadas   para el uso optimo de la tierra y la locali- zación funcional de las actividades.  ii) Formular políticas de uso y ocupación   del territorio en concordancia con los   objetivos estratégicos de los Planes de   Desarrollo Departamentales y Munici- pales. Colombia   El ordenamiento territorial es un instru-  mento\tde\tplanificación\ty\tde\tgestión\tde\t  las entidades territoriales y un proceso   de construcción colectiva de país, que   se da de manera progresiva, gradual    y\tflexible,\tcon\tresponsabilidad\tfiscal,\t   tendiente a lograr una adecuada organi- zación político administrativa del Estado   en el territorio, para facilitar el desarrollo   institucional, el fortalecimiento de la iden- tidad cultural y el desarrollo territorial,   entendido este como desarrollo económi- camente competitivo, socialmente justo,    ambientalmente\ty\tfiscalmente\tsostenible,\t   regionalmente armónico, culturalmente   pertinente, atendiendo a la diversidad    cultural\ty\tfísico-geográfica\tde\tColombia.\t La\tfinalidad\tdel\tordenamiento\tterritorial\t   es promover el aumento de la capaci- dad de descentralización, planeación,   gestión y administración de sus propios   intereses para las entidades e instan- cias de integración territorial, fomentará   el traslado de competencias y poder   de decisión de los órganos centrales   o descentralizados del gobierno en el   orden nacional hacia el nivel territo- rial pertinente, con la correspondiente   asignación de recursos. El ordenamien- to territorial propiciará las condiciones   para concertar políticas públicas entre la   Nación y las entidades territoriales, con   reconocimiento de la diversidad geográ-  fica,\thistórica,\teconómica,\tambiental,\t   étnica y cultural e identidad regional y   nacional. Ecuador   Conjunto de políticas democráticas y   participativas de los gobiernos autóno- mos descentralizados que permiten su   apropiado desarrollo territorial, así como    una\tconcepción\tde\tla\tplanificación\tcon\t   autonomía para la gestión territorial,   que parte de lo local a lo regional en la   interacción de planes que posibiliten la   construcción de un proyecto nacional,   basado en el reconocimiento y la valora- ción de la diversidad cultural y la proyec- ción espacial de las políticas sociales,   económicas y ambientales, proponiendo   un nivel adecuado de bienestar a la po- blación en donde prime la preservación   del ambiente para las futuras generacio- nes (COOTAD). Los objetivos del ordenamiento territo- rial de  los GADs son complementar la    planificación\teconómica,\tsocial\ty\tam - biental con dimensión circunscripcional;   racionalizar las intervenciones sobre   el territorio y orientar su desarrollo, y   promover el aprovechamiento sostenible   a través de las siguientes acciones:   a.\tLa\tdefinición\tde\tlas\testrategias\t   territoriales de uso, ocupación y manejo   del suelo en función de los objetivos   económicos, sociales, ambientales y   urbanísticos.   b. El diseño y adopción de los instru- mentos y procedimientos de gestión que   permitan ejecutar actuaciones integrales   y articular las sectoriales que afectan la   estructura del territorio.   c.\tLa\tdefinición\tde\tlos\tprogramas\ty\tpro - yectos que concreten estos propósitos.  Los Planes de Ordenamiento Territorial,   según lo dispone el art. 43 del COPFP,    “son\tlos\tinstrumentos\tde\tla\tplanificación\t   del desarrollo que tienen por objeto el   ordenar, compatibilizar y armonizar las   decisiones estratégicas de desarrollo   respecto de los asentamientos huma- nos, las actividades económico-produc- \n81  Fuente: Elaboración propia.  País   Definición  Bolivia   Planificación\tdel\tuso\tdel\tsuelo\t(PLUS).\tPlan\tMunicipal\tde\tOT\t(PMOT).  Colombia   Marco político y normativo aplicado a un territorio con base en sus condiciones   biofísicas y socioeconómicos.  Ecuador   Consenso\tsocial\ty\tpolítico\trelacionado\tcon\tla\tplanificación\tdel\tdesarrollo\torientado\t   al uso y la ocupación del suelo.  Perú   Proceso\ttécnico-legal\tque\tpermite\tdefinir\tpolíticas\ty\testrategias\tconcertadas\tpara\tla\t  gestión del territorio.  Cuadro 33: Definiciones conceptuales del ordenamiento   territorial en la región andino-amazónica  Fuente: Memoria del Seminario-taller internacional “ Ordenamiento Territorial de la región Andino-Amazónica”. IIAP y   colaboradores, 2009. en caso dado la relocalización de actividades y   asentamientos.  Por  último  el  ordenamiento  se    constituye\ten\tuna\teficaz\therramienta\tde\torien - tación  del  desarrollo  urbano  y  rural  en  donde   se  pueden  destinar  a  futuro  los  usos  compa-  tibles  del  territorio  y  sus  recursos  de  acuerdo   a  su  potencial  natural  (Corporación  Autónoma   Regional del Quindío, 2010).  2.4.  Ordenamiento  territorial  de   acuerdo a estrategias avanzadas Ordenamiento activo  Busca\tmodificar\tlos\tdesequilibrios\tdel\tdesarro - llo regional que caracterizan un orden territorial   ya establecido. El carácter de activo se debe a   la  intervención  dinámica  del  gobierno  sobre  el  territorio, y puede ser a escala nacional, regio- nal o municipal.  Ordenamiento pasivo  Se asocia con políticas de uso y ocupación  del territorio que tienen predominio en la esca-  la  local.  Su  carácter  pasivo  se  relaciona  con    el\t uso\t de\t zonificaciones\t o\t regionalizaciones\t  como  estrategias  para  inducir  nuevos  escena-  rios\tde\tuso\tdel\tterritorio.\tLas\tzonificaciones\tse\t  basan en categorías espaciales para las cuales   se  establecen  los  usos  permitidos,  prohibidos   o  restringidos,  acompañados  de  instrumentos   coercitivos  o  estimulantes  y  normas  que  brin-   dan\tsoporte\tlegal\ta\tlos\tplantes\ty\tdefinen\tmeca -  nismos\tpara\tresolver\tlos\tconflictos\tgenerados\t  por la intervención.  tivas y el manejo de los recursos   naturales en función de las cualidades    territoriales,\ta\ttravés\tde\tla\tdefinición\t   de lineamientos para la materialización   del modelo territorial de largo plazo,   establecido por el nivel de gobierno   respectivo”. Perú   Es una política de Estado, un proce- so político y técnico-administrativo de   toma de decisiones concertadas con los   actores sociales, económicos, políticos y   técnicos para la ocupación ordenada y el   uso sostenible del territorio, la regulación   y promoción de la localización y desarro- llo sostenible de los asentamientos hu- manos; de las actividades económicas,   sociales y el desarrollo físico espacial   sobre\tla\tbase\tde\tla\tidentificación\tde\t  potencialidades y limitaciones, conside- rando criterios ambientales, económicos,   socioculturales, institucionales y geopolí- ticos. Así mismo hace posible el desarro- llo integral de la persona como garantía   para una adecuada calidad de vida. Tiene un doble objetivo: desarrollo   territorial equilibrado, para disminuir   los desequilibrios socioeconómicos, y   ordenamiento sostenible de los usos   del suelo, para reducir los desórdenes   medioambientales. \n82  Ordenamiento integral  En este se combinan instrumentos tanto ac- tivos como pasivos. Se basa en la articulación   funcional y espacial de las políticas sectoriales   para  promover  patrones  equilibrados  de  ocu-  pación  y  aprovechamiento  del  territorio.  El  te-  rritorio  actúa  como  un  elemento  integrador  de   los  objetivos  sectoriales  y  sus  características   biofísicas, sociales y económicas son tomadas   en cuenta para formular los planes sectoriales   (MINAM, 2012).  2.5.  Dos  conceptos  de  Desarrollo   territorial rural  Schejtman\ty\tBerdegué\t(2004)\tdefinen\t«el\tdesa - rrollo territorial rural como un proceso de trans-  formación  productiva,  institucional  y  social  en   un\tespacio\trural\tdeterminado,\tcuyo\tfin\tes\tredu - cir la pobreza rural. La transformación produc- tiva  tiene  el  propósito  de  articular  competitiva   y sustentablemente a la economía del territorio   a mercados dinámicos. El desarrollo institucio- nal  tiene  los  propósitos  de  estimular  y  facilitar   la  interacción  y  la  concertación  de  los  actores   locales  entre  sí  y  entre  ellos  con  los  agentes   externos  relevantes,  así  como  de  incrementar   las oportunidades para que la población pobre    participe\tdel\tproceso\ty\tde\tsus\tbeneficios».  «El  desarrollo  territorial  rural  (DTR)  es  un  enfoque relativamente reciente al problema del   desarrollo  de  las  áreas  locales.  Desde  el  pun-  to de vista de un desarrollo sostenible, el DTR   busca tener en cuenta las oportunidades y res-  tricciones  internas  de  las  áreas  rurales  como   resultado  de  los  factores  medioambientales,   económicos,  sociales  y  culturales  del  pasado   de  un  territorio,  junto  a  las  oportunidades  y   restricciones externas que resultan de la aper-  tura  de  las  economías  locales»  (CONDESAN,   2010).   2.6. Enfoque territorial del desarro-  llo rural  «El  enfoque  territorial  del  desarrollo  rural  está   todavía lejos de constituir un nuevo paradigma   o una nueva teoría para la acción en el espacio   rural, sin perjuicio de lo cual los diversos inten-  tos  de  reconceptualización  del  desarrollo  rural   tienen  tres  elementos  importantes  en  común:   1) la consideración de que lo rural va más allá   de lo agrícola; 2) el reconocimiento de la cen-  tralidad de los recursos naturales; y 3) el papel   clave de los vínculos urbano-rurales en la cons-  titución  del  territorio  rural»  (Schejtman  2009)   (CONDESAN, 2010).  2.7.  Los  dos  componentes  prin-  cipales  de  los  Planes  de  Ordena-  miento Territorial  a)  Uso  del  territorio  y  de  sus  recursos  natura- les,  elaborado  sobre  la  base  de  la  ZEE  y   de  los  otros  instrumentos  de  ordenamiento   territorial  vigentes,  en  concordancia  con  la   visión concertada de desarrollo de la socie-  dad. Contiene las diversas categorías de uso   del  territorio  y  la  normativa  pertinente  para   el uso y manejo sostenible, con criterios am-  bientales,  socioculturales,  económicos  y  de   seguridad física.  b) La ocupación del territorio, elaborada sobre  la base de la ZEE y de los otros instrumentos   de ordenamiento territorial vigentes conside- rando las oportunidades, las amenazas y la   visión de desarrollo de la sociedad. Contiene   la propuesta del sistema de asentamientos,   incluyendo  el  rol  y  funciones  de  cada  uno   de ellos, y el nivel de equipamiento urbano;   el  sistema  vial  de  articulación  del  territorio;   el  sistema  energético;  el  sistema  de  áreas   naturales  protegidas,  incluyendo  corredo- res biológicos; la demarcación territorial; los   proyectos  estratégicos  y  corredores  econó- micos;  las  áreas  ocupadas  por  los  pueblos   indígenas, por comunidades y reservas indí-  genas; entre otros aspectos.  2.8. Políticas públicas sobre OT en   la Subregión Andina  En  Colombia,  donde  la  experiencia  de  imple- mentar  planes  de  OT  tiene  más  de  12  años,   están en pleno proceso de revisión (Rodríguez,   2009).  En  el  Perú  es  un  tema  en  proceso  de  de- sarrollo a partir de la ZEE. La estrategia no ha   sido la elaboración de planes de OT, que es un   tema  muy  complejo  ya  que  involucra  muchos   intereses,  sino  que  ha  sido  planteada  para   generar  los  insumos  a  través  de  la  ZEE  que   permita generar
