máticos en la   agricultura,\tcon\tparticipación\ty\tbeneficio\tde\tlas\tregiones\tpara\tla\tadecuada\t  y oportuna toma de decisiones.  Lineamientos de   política:   •\tPromover\ty\tdesarrollar\tla\tinvestigación\tcientífica,\ttecnológica\tsobre\t   vulnerabilidad y riesgos climáticos actuales y futuros para fortalecer las   estrategias de adaptación al Cambio Climático, programa de transferencia   de tecnología productiva (variedades de cultivo y ganado adaptados al   Cambio Climático) y reducción del riesgo.   •\tFortalecer\tel\tsistema\tde\tmonitoreo,\tpredicción\ty\talerta\ttemprana\tde\tpeli -  gros\tclimáticos\ty\tvulnerabilidades\tinfluenciadas\tpor\tel\tCambio\tClimático.\t  •\tGenerar,\tproyectar\ty\tdifundir\tinformación\tconfiable,\tcomprensiva\ty\t   oportuna con relación a los riesgos climáticos actuales y futuros sobre la   población y el Sector Agrario, que permita un óptimo monitoreo que facilite   la evaluación y toma de decisiones.   •\tPromover\tel\tuso\tde\ttecnologías\tadecuadas\ty\tapropiadas\tpara\tla\tadapta - ción al Cambio Climático, garantizando un desarrollo rural sostenible y la   reducción de la vulnerabilidad.  EJE ESTRATÉGICO 2   Preparación y respuesta a emergencias por eventos climáticos Objetivo general 2   Preparación adecuada de la población rural para afrontar las emergencias   en la agricultura y reducir el impacto negativo de los eventos climáticos   extremos.  Lineamientos de   política:   •\tMejorar\tla\tcapacidad\tde\tresiliencia\tdel\taparato\tproductivo\tde\tlos\tsectores\t   más vulnerables, mediante el fortalecimiento de la capacidad de prepara- ción y respuesta de la población rural agraria del país, mejorando el sis- tema de vigilancia ante peligros de origen natural y la respuesta oportuna    frente\ta\temergencias\to\tdesastres\tinfluenciados\tal\tCambio\tClimático.  •\tFortalecer\tlos\tmecanismos\tde\ttransferencia\tde\triesgos\tclimáticos,\tcomo\t  los\tseguros\tcatastróficos.  EJE ESTRATÉGICO 3   Prevención y reducción de riesgos considerando eventos climáticos Objetivo general 3   Riesgo climático en el Sector Agrario prevenido y reducido con acciones    de\tmanejo\tsostenible\tde\tlos\trecursos\tnaturales,\tcon\tparticipación\ty\tbenefi - cio de la población local.  Lineamientos de   política:   •\tPromover\tmedidas\ty\tel\tuso\tde\ttecnologías\tadecuadas\ty\tapropiadas\tpara\t   la adaptación al Cambio Climático que contribuyan al desarrollo rural sos- tenible y el alivio a la pobreza.   •\tContribuir\ta\tla\trestauración\tde\tlos\tecosistemas\talto\tandinos\t(bosques,\t  bofedales,\tpastos,\tetc.),\tpara\tprevenir\tlos\tprocesos\tde\tdesertificación,\tde-  Cuadro 45: Objetivos estratégicos y lineamientos de política del Plan de  Gestión de Riesgos y Adaptación al Cambio Climático en el Sector Agrario \n113  gradación y pérdida de suelos mitigando sus efectos y/o recuperándolos,   por medio de estrategias para la provisión, almacenamiento y gestión del   agua para la agricultura, la construcción, protección, ampliación y mejora   de la infraestructura de riego existente (canales y reservorios de agua)   teniendo en cuenta el cambiante balance hídrico en escenarios de Cambio   Climático.    •\tReducir\tla\tvulnerabilidad\tde\tla\tpoblación\trural\tfrente\ta\tprocesos\tgeomor - fológicos que pongan en riesgo la vida humana (avalanchas, huaycos,   desplazamiento de terrenos, etc.) mediante programas de consolidación   de suelos y reforestación, así como reducir la probabilidad de ocurrencia    de\tdesbordes,\tinundaciones,\tmodificaciones\tde\tcauce\ty\terosión\tde\táreas\t   ribereñas en los ríos mediante programas de defensas ribereñas y refores- tación.  EJE ESTRATÉGICO 4   Planificación para el desarrollo en GRD y ACC  Objetivo general 4   Actividad\tagrícola\tplanificada\tcon\tacciones\tsostenibles\ta\tlargo\tplazo\tpara\t   la Gestión de Riesgos y adaptación al Cambio Climático sin generar nue- vos escenarios de riesgos.  Lineamientos de   política:  •\tContribuir\ta ersalización   del cambio climático. Estrategia nacional de   cambio climático   Capacidades  /  vulnerabilidades  insti- tucionales   -  Se requiere incrementar la coordinación entre   los\tentes\testatales\tcon\tla\tfinalidad\tde\tdisminuir\t  o evitar la duplicidad de acciones, de esta for- ma se solventarían las demandas y se optimi- zarían los recursos; para ello es necesario me- jorar los canales y sistemas de comunicación.  -\t Definición\tclara\tde\tcompetencias\tasí\tcomo\t  las responsabilidades compartidas que exis-  tan. Un componente clave en la coordinación   institucional es la investigación y el desarrollo   de ciencia / tecnología, por lo que es nece-  sario incluir en el proceso a la SENESCYT.   También  es  necesario  construir  y/o  fortale-  cer  las  alianzas  y  políticas  de  cooperación   enfocadas a la GdR. -  Sensibilización en ACC y GdR a los tomado-  res de decisión, esta actividad se realiza de   forma permanente, pero aún no se alcanza a   todos los personeros.  \n114  Políticas del Mecanismo   Nacional de Adaptación al   Cambio Climático  Política\t1.\tGarantizar\tla\tdisponibilidad\ty\tacceso\ten\tla\tcantidad\tsufi - ciente de alimentos para la población, generando medidas de adap- tación efectivas articuladas a las políticas del PND de la producción   agropecuaria, conservación y manejo de la agro-bio-diversidad.  Política 2. Información sistémica con mayor cobertura en el moni- toreo y análisis de tendencias articuladas a escenarios climáticos,   generando sistemas complejos para el mayor entendimiento de la   vulnerabilidad al Cambio Climático incluyendo la variabilidad del   clima y sus impactos.  Política 3. Garantizar un fondo de adaptación al cambio climático.  El fondo de adaptación se orienta a mejorar las respuestas a los   eventos extremos en los sectores productivos vulnerables al cambio   climático, para reactivar los sistemas dañados.  Política 4. Alerta temprana y manejo integral de cuencas.  Política\t5.\tDisponibilidad\tde\trecursos\tfitogenéticos\tpara\tla\tadaptación.  Políticas del Plan Nacional de   Desarrollo Política 5. “Dinamización y restitución integral de las capacidades   productivas territoriales” Políticas del Mecanismo   Nacional de Adaptación al   Cambio Climático. Política 1. Asentamiento humanos seguros en nuevas áreas basados   en\tla\tzonificación\tagroecológica,\tplanes\tde\tuso\tdel\tsuelo\ty\tplanes\tde\t  ordenamiento territorial  Política 2. Adaptación articulada a sistemas de asentamientos y ges- tión de riesgo. Los sistemas de asentamiento, garantizarán vivienda   segura considerando los cambios bajo escenarios climáticos futu- ros, elementos que debe ser la base para consolidar un desarrollo   armónico.  Política 3. Vivienda e infraestructura segura para el desarrollo huma- no integral  Política 4. Ordenamiento territorial y gestión de riesgo climático  Cuadro 46: Políticas en Bolivia relacionadas a la GdR y la Adaptación  al Cambio Climático ligadas a la seguridad alimentaria  Fuente:\tMinisterio\tde\tPlanificación\tdel\tDesarrollo\tde\tBolivia,\t2007.  Transversalizar la GdR con el desa-rrollo   -  Apoyar  a  quienes  no  han  tenido  formación   de\talto\tnivel\ty\trealizar\tla\tfidelización\tde\tper - sonal  de  alto  nivel,  permitiendo  mejora  en   formulación  de  programas  y  proyectos,  así   como en la evaluación.  -  A pesar de existir mucha información que se   procesa  esta  no  termina  de  llegar  a  los  go-  biernos locales, o cuando lo hace no es con-  siderada  como  prioridad,  produciendo  que   se  generen  planes  de  desarrollo  poco  ópti-  mos. Se necesita compartir la información y   optimizar  el  acceso  a  la  misma.  El  usuario    final\tde\tla\tinformación,\tla\tcomunidad\tcomo\t  primer respondedor, debe tener un acceso y   apoyo en la interpretación de la misma, con   ello  se  garantiza  una  gestión  de  base  tanto   en el nivel ambiental como en los riesgos (la   comunidad  tiene  una  cosmovisión  diferente   y  han  asimilado  el  tema  climático  y  se  van   adaptando a través del tiempo).  -   No  existen  planes  integrados  en  los  aspec-  tos  ambientales  y  riesgo;  las  afectaciones  recurrentes  requieren  de  un  trabajo  inte-  grado para la recuperación y reducción; por   ejemplo es necesario incorporar la GdR en el   manejo de áreas costeras.  -  Es  clave  el  aporte  de  los  organismos  inter-  nacionales y ONG, como acciones positivos   para la gestión ambiental y de riesgos, siem-  pre en el marco de transparencia, respeto y    con\tla\tfinalidad\tde\tfortalecer\tel\tSistema\tNa - cional  Descentralizado  de  Gestión  de  Ries-  gos.  -  Se  conoce  las  estructuras  claves  como  el    Comité\tTécnico\tCientífico,\tpero\tes\tnecesario\t  que  se  disponga  de  una  activación  y  traba-  jo  permanente  de  los  mismos;  han  existido   reuniones  con  relación  a  amenazas  espe-   cíficas\tpero\tno\tun\ttrabajo\tintegrado\tde\tlos\t organismos\tcientíficos,\tni\tse\tha\tconsiderado\t  el aspecto ambiental en este comité. Los or-  ganismos internacionales y ONG están apo-  yando y facilitando esta activación. -  Se requiérela participación de otros actores    públicos\ten\tlos\tprocesos\tde\tidentificación\ty\t  monitoreo de amenazas.  \n115  -\t Se\tidentifica\tde\tforma\tclara\tla\trelación\tentre\t  los desastres y el cambio climático, por ello   las  acciones  y  estudios  a  considerar  deben   tener un enfoque integral de los dos factores;   por ejemplo es necesario incorporar el tema   de  salud  en  los  estudios  de  cambio  climáti-  co como un elemento para el incremento de   vulnerabilidad; otro ejemplo es la necesidad   de disponer personas con formación en pro-  cesos de gestión ambiental, explotación mi-  nera y gestión de riesgo.  -  Es  necesario  que  en  los  procesos  que  se   realizan para la Evaluación del Impacto Am-  biental,  como  requisito  previo  para  la  cons-  trucción  de  obras,  se  analice  los  factores   ambientales que pueden afectarse y su aso-  ciación a los riesgos de desastres.   Ministerio  de  Agricultura,  Ganadería,   Acuacultura y Pesca MAGAP  El  Ministerio  de  Agricultura,  Ganadería,  Acuacultura  y  Pesca  “es  la  institución  rectora   del  multisector,  para  regular,  normar,  facilitar,   controlar,  y  evaluar  la  gestión  de  la  produc- ción  agrícola,  ganadera,  acuícola  y  pesquera   del  país;  promoviendo  acciones  que  permitan   el  desarrollo  rural  y  propicien  el  crecimiento   sostenible de la producción y productividad del   sector impulsando al desarrollo de productores,   en  particular  representados  por  la  agricultura   familiar  campesina,  manteniendo  el  incentivo   a  las  actividades  productivas  en  general”,  de   esta manera se encuentra declarada su misión.   La Dirección de Gestión de Riesgo del MAGAP   es nueva por lo que es necesario reforzar sus   conocimientos y capacidades e integrarla como   eje transversal en las acciones y programas del   ministerio.  En  base  a  la  experiencia  y  trabajo   desarrollado, se dispone de herramientas y for-  matos para levantamiento y sistematización de   información, sea para el trabajo cotidiano como   para  emergencias.  A  partir  de  19  de  julio  del    2012\tse\than\tdefinido\tlas\tcompetencias\tde\tfo - restación y reforestación que ahora se encuen- tran  compartidos  con  Ministerio  del  Ambiente.   Un elemento clave son los controles sanitarios   a través de Agrocalidad, que se constituyen en   procesos para reducción de vulnerabilidad.   Acciones  a  desarrollar  en  el  corto  y   mediano plazo   -  Se  completará  el  levantamiento  de  la  infor-  mación en campo con el apoyo de las escue-  las que mantienen convenio y formación con   MAGAP.   -\t La\tinvestigación\tcientífica\tes\tactividad\tpriori - taria para ello se realiza trabajo con univer- sidades,  es  importante  enlazar  este  trabajo   con los procesos de RRD.   -\t Identificar\ty\tgeoreferenciar\tposibles\trefugios\t  para  evacuación  de  ganado,  este  proceso   debe concluir para disponer de una base de   datos  que  permita  apoyar  en  caso  de  eva-  cuación.  -  Continuar con el desarrollo de programas de   mitigación  de  los  efectos  de  desastres,  por   ejemplo el Plan Nacional de Riego que toma   en consideración los posibles desastres. -  En  las  direcciones  provinciales  se  elabora- rán y actualizarán los planes de contingencia   para el nivel provincial y en base a los even-  tos que en ella se presenten.   Capacidades  /  vulnerabilidades  insti-  tucionales   -  Como parte de la respuesta en caso de de-  sastres, el Ministerio cuenta con la activación   permanente  de  las  direcciones  provinciales   de  MAGAP,  apoyo  a  las  acciones  humani- tarias con el parque automotor, ayuda en la   evaluación de daños, distribución de alimen- tos  y  forrajes,  apoyo  para  la  evacuación  de   ganado, entre las principales acciones.  -  En  base  a  la  experiencia  obtenida  en  los   proyectos  y  programas  de  apoyo  a  pobla- ción  afectada,  se  han  establecido  modelos   de  ayuda  tales  como  combos  agropecua- rios (semillas, especies menores y mayores,   abono, herramientas, etc.); estos programas   se  enlazan  con  los  planes  de  reactivación   que  se  desarrollan  con  la  población  afecta-  da por un evento, previo estudio de impacto   realizados  por  las  direcciones  provinciales   de MAGAP.  -  Se dispone de 11 millones de USD por año   para  emergencias  que  se  presupuestan  en   el Plan Anual de Inversión. Sin embargo, la   asignación de presupuesto hacia programas    de\tasistencia\tinfluye\tsobre\tlos\tpresupuestos\t  y programas regulares.  -  Existen  planes  de  contingencia  que  deben   ser revisados; un problema de la sede nacio- nal es que comparte una sola infraestructu-  ra con varios ministerios, pero los planes de   contingencia  no  se  encuentran  integrados.   En el caso de afectaciones a la infraestruc-  tura  central,  se  afectarían  todos  los  proce-  sos  internos  del  Ministerio  así  como  el  se-  guimiento de los proyectos, existiría pérdida   de  información  y  afectación  a  la  seguridad   integral  de  personal.  No  se  dispone  de  un   plan para continuidad de funcionamiento, no   existen sitios alternativos de trabajo. Tampo-  co se ha considerado las afectaciones sobre   la funcionalidad del Ministerio en determina- do tipo de eventos. -  No se dispone de planes para recuperación de   medios en caso de eventos tsunamigénicos.  -  Tanto para la respuesta como la reactivación  \n116  es  necesario  coordinar  acciones  con  el  MI-  PRO. Existe un Plan de reactivación para las   afectaciones producidas por inundaciones y   caída de ceniza.   4. Ordenamiento territorial y   cambio climático  Magrin (2010) señala que hay que hacer un  buen uso del territorio, ubicando la producción   en los lugares que corresponde y que son más   aptos para ellos. Y promover de todas maneras   las producciones sostenibles porque hay algu- nos tipos de producción que no son sostenibles   en el mediano y el largo plazo.   La\tfigura\t38\tmuestra\tcómo\tlos\tterritorios\tse - guros  contribuyen  a  la  adaptación  al  cambio   climático.  -  Ordenamiento  territorial  como  práctica   más emprendedora e innovadora de cons-  trucción social  -  Ordenamiento territorial como práctica en-  dógena en los territorios de la adaptación  -  Múltiples  y  ampliadas  escalas  de  ordena- miento territorial  -  Ordenamiento  territorial  como  estrategia  de fortalecimiento de la gobernabilidad te-  rritorial  (enfoque multi-actores)  -  Enfoque estratégico e integrado del orde-  namiento  territorial  (adaptación,  gestión   del  riesgo,  manejo  de  recursos  naturales,   combate a la pobreza, etc.) Fuente: PRISMA, 2008  Recuadro 17  Principios para una cultura de ordenamiento territorial para la  adaptación al cambio climático en comunidades andinas (C.A.)  Fig. 38: Territorios seguros y adaptación al cambio climático  Fuente: Martin. S.f.  Conflictos\tpor:  Acceso a territorios  habitables. Acceso a recursos y  servicios ambientales,  especialmente AGUA  de calidad. Acceso a energia. Choques étnicos y  culturales. Stress individual y  social  SEGURIDAD  ECOLÓGICA SEGURIDAD  Y  SOBERANÍA  ALIMENTARIA SEGURIDAD  JURÍDICA E  INSTITUCIONAL SEGURIDAD  SOCIAL SEGURIDAD  ECONÓMICA SEGURIDAD  ENERGÉTICA \n117  El Caso Colombiano  Con\tel\tfin\tde\tabordar\tlos\ttemas\tde\tadapta - ción al cambio climático en el contexto de los   planes de ordenamiento territorial se ha pro-  puesto el concepto de la “Estructura Ecológi- ca Territorial Adaptativa -EETA-” como marco   para introducir aspectos de la infraestructura   ecológica que tienen una dimensión espacial   y que cumplen un rol fundamental en el sumi-  nistro de los servicios ecosistémicos básicos   priorizados por la sociedad. La EETA comprende una red de espacios   geográficos\tque\tapoya\tlos\tprocesos\tecológi - cos esenciales para dirigir la adaptación más   allá  de  la  conservación  de  la  diversidad  bio-   lógica,\tcon\tel\tfi\tn\tde\tmantener\tla\testructura\ty\t  función de los ecosistemas. El  principal  objetivo  de  la  Estructura  Eco- lógica  Territorial  Adaptativa  -EETA  es  man-  tener la integridad ecológica y la salud de los   ecosistemas en el largo plazo. La  EETA  incluye  todos  los  elementos  es- tructurales  relevantes  del  paisaje  para  ase-  gurar  la  conservación  y  recuperación  de  los   SE de alta montaña y páramo, que son alta-  mente vulnerables al cambio climático global.   Se considera: la regulación del ciclo del agua,   el mantenimiento de la calidad y cantidad del   agua, la recarga de acuíferos, la reducción de   riesgos y amenazas naturales, y el control de   erosión. La  EETA  propuesta    contiene  entre  otros  componentes tales como:  -  Recomendaciones  para  uso  y  ocupación   del  territorio  en  el  marco  de  los  umbrales  de funcionamiento de los ecosistemas; -  Patrones que incluyen elementos centrales   para promover la conectividad natural, inclu- yendo procesos de restauración ecológica;  -\t Identificación\t de\t vacíos\t de\t información\t que\tdeben\tser\tabordados\tcon\tel\tfi\tn\tde\tin - crementar  la  resiliencia  de  ecosistemas  y   comunidades; -  Promoción de mecanismos apropiados de   organización social, y  -  Propuestas de mecanismos de compensa- ción tales como el Mecanismo de Desarro- llo Limpio -MDL- y Reducción de Emisiones   por Deforestación y Degradación -REDD-,   con énfasis en restauración ecológica par-  ticipativa y garantía de la sostenibilidad de   los servicios de los ecosistemas.  -  Patrones  que  incluyen  elementos  centra-  les para promover la conectividad natural,   incluyendo procesos de restauración eco-  lógica;  -\t Identificación\t de\t vacíos\t de\t información\t que\tdeben\tser\tabordados\tcon\tel\tfi\tn\tde\t  incrementar la resiliencia de ecosistemas   y comunidades; -  Promoción de mecanismos apropiados de   organización social, y -  Propuestas de mecanismos de compensa- ción tales como el Mecanismo de Desarro- llo Limpio -MDL- y Reducción de Emisiones   por Deforestación y Degradación -REDD-,   con énfasis en restauración ecológica par-  ticipativa y garantía de la sostenibilidad de   los servicios de los ecosistemas.  Lectura 1  Estructura Ecológica Territorial Adaptativa-EETA  L  E  C  T  U  R  A Fuente: IDEAM, 2011. Aspectos del cambio climático y adaptación en el ordenamiento territorial de alta monta-  ña. Guía metodológica, Caso piloto, Proyecto Nacional de Adaptación al Cambio limático –INAP– componente   B, IDEAM y Conservación Internacional, Bogotá. Instituto de Hidrología, Meteorología y Estudios Ambientales –   IDEAM. Colombia, 166 p.  5. Gestión del Riesgo   de Desastres (GdR) y   Ordenamiento Territorial (OT)  La  incorporación  del  enfoque  de  gestión  de  riesgos  de  desastre  resulta  fundamental  para   un  exitoso  proceso  de  Ordenamiento  Territo-  rial.  La  gestión  del  riesgo  de  desastres  es  un  proceso sistémico, transversal, participativo de   formulación y adopción de políticas, estrategias   y acciones, orientadas a reducir los riesgos de   desastres  ante  fenómenos  naturales  frecuen-  tes  como  inundaciones,  terremotos,  desliza- mientos,  huaycos,  heladas,  sequías.  En  este   sentido en el Perú se ha desarrollado el Mapa   de Vulnerabilidad Física que determina la sus- \n118  Cuando  hablamos  de  gestión  territorial  es-  tamos  haciendo  alusión  a  la  necesaria  inte-  gración  entre  los  aspectos  biofísicos  y  los   aspectos institucionales orientada a lograr la   sostenibilidad en un espacio dado. Se podría   decir de otra manera que la gestión territorial   implica lograr una apropiada interacción entre   los ecosistemas naturales y los sistemas eco-  lógicos  humanizados  o  también  podríamos   plantear  la  gestión  territorial  como  la  puesta   en  valor  de  la  energía  biofísica  y  la  energía   cultural.  Bajo  esta  perspectiva  la  gestión  te-  rritorial  también  puede  abordarse  desde  un   encuentro entre oferta y demanda de bienes   y  servicios  para  satisfacer  las  necesidades   materiales  y  espirituales  de  los  ciudadanos   con  los  más  altos  estándares  de  calidad  en   un marco de sostenibilidad.  Un\tprimer\telemento\ta\tdiscutir\trefiere\ta\tla\t  delimitación del espacio a gestionar. Diferen- tes procesos históricos, políticos y socioeco-  nómicos\t han\t ido\t configurando\t los\t límites\t geográficos\t y\t políticos-administrativos\t de\t  nuestras circunscripciones. El tema está que   está delimitación no necesariamente toma en   cuenta  una  visión  de  cuenca  (o  microcuen- ca),  los  corredores  económicos,  espacios   vitales de la fauna, corredores ecológicos, ci-  clos  biogeoquímicos,  ciclo  hidrológico,  rutas   o  caminos  de  las  semillas,  patrones  de  cir-  culación de los vientos, entre otros factores.   Esta  realidad  de  múltiples  planos  tampoco   es necesariamente captada por procesos de    zonificación\t ecológica\t y\t económica\t que\t se\t  limitan a trabajar desde una perspectiva geo-  gráfica-legal\tque,\tcomo\tvemos,\tes\ttotalmente\t  incompleta  para  dar  cuenta  de  todos  estos   factores.\tEl\tordenamiento\tterritorial\tpor\tdefi - nición debe contemplar las múltiples escalas   para que pueda ser efectivo. Desde la perspectiva del cambio climático   las\t configuraciones\t espaciales\t y\t los\t alcan - ces  administrativos  de  la  gestión  ambiental   territorial  tienen  un  impacto  en  el  balance   del  carbono  en  la  atmósfera  y  la  cadena  de   afectación  referida  a  calentamiento  global   y  sus  múltiples  manifestaciones  tales  como   deshielo de nevados, inundaciones, destruc-  ción de viviendas, aparición o reaparición de   enfermedades.  También  inciden  en  las  acti-  vidades  agrícolas,  cambiando  los  periodos    de\t floración\t o\t fructificación\t de\t plantas,\t los\t  rangos  de  ocupación  actitudinal  de  los  culti-  vos, la incidencia de plagas y enfermedades   de  los  cultivos,  entre  otros  impactos  amplia- mente  documentados.  Esto  nos  obliga  a  re-  cuperar una visión sistémica porque lo que se   haga o deje de hacer en zonas altas que no   forman parte de nuestra circunscripción geo-   gráfica\ttambién\ttienen\timplicancias\tsobre\tlas\t  zonas bajas.  Visto de esta manera los procesos de de- forestación de las zonas altas también tienen   implicancias  en  las  partes  bajas,  o  el  incre-  mento de emisiones de carbono de las ciuda- des también terminan afectando los nevados.   Tanto zonas altas como zonas bajas se ven   afectadas  por  el  incremento  de  eventos  cli-  máticos extremos y la disponibilidad de agua.   Sólo  que  las  poblaciones  más  pobres  son  a   su vez las más vulnerables a los impactos del   cambio climático. De ahí la necesidad estra-  tégica de políticas referidas al cambio climá-  tico  que  pongan  al  centro  a  las  poblaciones   más  pobres  pero  no  desde  una  perspectiva   asistencialista  sino  más  bien  de  dotación  de   poder a dichas poblaciones. Lo  mismo  se  puede  decir  de  una  ciudad  que tiene una gestión ambiental efectiva pero   que  recibe  contaminantes  procedentes  por   una ciudad vecina con una mala gestión am-  biental producto del patrón de distribución de   vientos. Por todo lo anteriormente menciona- do  la  gestión  ambiental  no  puede  reducirse   únicamente a una visión de distrito. La otra variable de la gestión territorial re-  fiere\ta\tla\tinstitucionalidad.\tLa\tvisión\tsistémica\t  de  la  gestión  de  los  componentes  biofísicos   debe trasladarse necesariamente a la gestión   institucional  y  lograr  una  apropiada  integra- ción.  Los  procesos  de  descentralización,  la   transferencia  de  funciones,  la  conformación   de  regiones,  la  formulación  e  integración  de   políticas  públicas,  los  sistemas  de  participa- ción y vigilancia social deben conjugarse con   los  procesos  de  gestión  de  recursos  natura-  les,  manejo  de  bosques,  gestión  integral  de   los  recursos  hídricos,  el  desarrollo  urbano,   entre  otros  factores,  en  una  perspectiva  de   fortalecimiento de la gobernabilidad en torno   al cambio climático. En  este  contexto  el  abordaje  de  temas  como  los  biocombustibles  o  las  vías  de  in-  Lectura 2  Gestión Territorial y Cambio Climático  L  E  C  T  U  R  A \n119  tegración regional tienen que ser analizados   objetivamente en función de su real impacto   a  las  emisiones  de  carbono.  En  el  caso  de   los biocombustibles es la supremacía de los   intereses económicos y políticos el que hace   perder de vista los intereses ambientales de   contar con fuentes de energía alternativa que   reduzcan  las  emisiones  de  gases  de  efecto   invernadero y de ahí que generen rechazo en   ciertos  sectores  de  la  sociedad.  Es  nuestra   visión fragmentada la que ha producido la ac-  tual situación y ahora es tiempo de recuperar   la visión de conjunto. Es  especialmente  relevante  el  tema  de  la  integración de políticas públicas en el marco   de una estrategia nacional de cambio climá-  tico.  Pero  para  ello  es  necesario  una  volun- tad  política  y  participación  ciudadana  activa   para  que  se  vayan  superando  las  fallas  ins-  titucionales  que  se  traducen  en  dispersión  y  contradicciones,  generar  mecanismos  que    prevengan\to\tresuelvan\tlos\tconflictos\tsocio - ambientales producto del impacto del cambio   climático  y  que  se  puedan  ajustar  las  herra-   mientas\t de\t ordenamiento\t y\t zonificación\t a\t  las nuevas condiciones que imprime la nece-  sidad  de  mitigación  y  adaptación  al  cambio   climático. La  adecuada  gestión  del  territorio  toman- do  en  cuenta  una  apropiada  gestión  de  la   energía  también  es  un  factor  de  fundamen- tal  importancia  en  la  lucha  contra  el  cambio   climático.  Por  ello  la  necesidad  de  mejorar   las capacidades gerenciales y técnicas. Pero   también  es  importante  una  democracia  au-  téntica,  la  participación  genuina,  el  diálogo   generativo, la capacidad de escucha y sobre   todo,  el  respeto  profundo  a  toda  manifesta-  ción de vida.   El hecho de la débil o ausencia de implemen- tación de políticas de ordenamiento territorial   tiene efectos tangibles en el cambio climático.    Dos\tfenómenos\testrechamente\tligados\trefie - ren a la conversión de bosques y la pérdida   de productividad del suelo como se describen   a continuación:  Los  impactos  de  las  “prácticas  ha-  bituales”  Los cambios en las políticas públicas pue- den  afectar  la  rentabilidad  de  las  insosteni- bles  prácticas  habituales  y  crear  un  terreno   de  juego  en  igualdad  de  condiciones,  o  in-  cluso incentivar el avance hacia una gestión   sostenible  de  los  ecosistemas.  Varios  casos   ilustran el impacto de las “prácticas habitua- les” no sostenibles:  Conversión de los bosques  El cambio más importante que se ha pro- ducido  en  los  últimos  40  años  en  cuanto  al   uso de la tierra en las regiones tropicales de   América  Latina  y  el  Caribe  ha  sido  la  masi-  va  conversión  de  los  bosques  en  pastizales   para el ganado. Entre 1981 y 1990, la región   transformó 75 millones de hectáreas de bos-  que,  terreno  que  en  su  mayor  parte  pasó  a  ser  ocupado  por  ganado.  El  número  de  ca-  bezas  de  ganado  en  la  Amazonía  se  multi-  plicó por más de dos entre 1990 y 2002 (de   26 millones pasó a 57 millones). Esta región   pasó  de  acoger  el  18  por  ciento  del  ganado   de Brasil a casi una tercera parte. De hecho,   el 80 por ciento del ganado brasileño durante   este periodo se encontraba en la Amazonía,   donde las hectáreas de terreno dedicadas al   pasto superan a las tierras de cultivo en una   proporción de seis a una.  Pérdida de productividad del suelo  El  declive  en  la  fertilidad  del  suelo  de  los  bosques  tropicales,  unido  a  las  iniciativas   productivas  no  sostenibles,  la  prolongación   de las estaciones secas, la compactación del   terreno, la erosión, las plagas, la maleza y los   patógenos son factores que se conjugan para   reducir la productividad de las actividades fo-  restales y agrícolas. Por ejemplo, se calcula   que  el  37,6  por  ciento  de  la  tierra  de  Ecua-  dor  corre  un  alto  riesgo  de  degradación.  La   pérdida de fertilidad del suelo ha dado lugar   a la importación de caros productos agroquí- micos. En Costa Rica, la erosión que sufren anual- mente las tierras de cultivo y de pasto elimina   Lectura 3  Efectos de la implementación de políticas de   ordenamiento territorial en el cambo climático  L  E  C  T  U  R  A \n120  Este  sector  es  el  que  más  emisiones  apor-  ta al inventario nacional de emisiones GEI al   representar un 38% de las emisiones nacio- nales. La estimación de las emisiones de GEI   de este sector, de acuerdo con la metodología   del IPCC, se desagrega en dos subcategorías   principales, que se describen a continuación:  -  Cambios  en  biomasa  forestal,  que  consi-  dera las capturas (remociones) y las emi-  siones de dióxido de carbono (CO2) produ- cidas  por  el  incremento  o  disminución  en   la  biomasa  forestal  (bosques  secundarios   y plantaciones forestales), además de las   emisiones de CO2 derivadas de la extrac-  ción de madera (para la obtención de leña,   carbón y madera rolliza) y la quema de bio-  masa por disturbios (incendios forestales).   Este  rubro  es  el  único  que  calcula  remo-  ciones de CO2 que se restarán del total de   emisiones  calculadas  para  el  Perú,  por  lo   que, a dichas remociones, se las expresa   con un signo negativo en los cálculos. -  Conversión  de  bosques  a  cultivos  y  pas-  turas,  que  contempla  las  emisiones  GEI   generadas  por  la  deforestación,  proceso  mediante  el  cual  se  libera  el  carbono  se-  cuestrado por los bosques a la atmósfera,   que  ocurre  principalmente  por  la  conver-  sión de los suelos del bosque a tierras de   cultivo o pasturas para el ganado. Asimis-  mo, esta categoría incluye las capturas y la   emisión de CO2 provenientes de los culti-  vos perennes, diferenciando las etapas de   siembra, cosecha o pérdida del cultivo.  El  total  de  emisiones  netas  correspon- dientes  al  sector  USCUSS  al  año  2009  fue   de\t56\t396\tGg\tde\tCO2eq.,\tlo\tcual\trefleja\tuna\t  disminución  del  1%  con  respecto  al  nivel  de   emisiones del sector en el año 2000, que fue-  ron  de  56  827  Gg  de  CO2eq.  El  incremento   de  los  bosques  secundarios  (cambios  en  la   biomasa), a pesar de la extracción de madera   e incendios forestales, permitió capturar CO2   de  la  atmósfera  (-56,232  Gg),  lo  que  com-  pensó casi la mitad del CO2 generado por la   deforestación (112 629 Gg). No obstante, en   este sector, se contó con menor información   disponible  y  con  metodologías  espaciales   (mapeos)  distintas,  lo  que  implicó  arrastrar   un margen de error considerable.  Recuadro 18  El caso peruano: Sector uso de suelo, cambio de uso de  suelo y silvicultura (USCUSS, siglas en inglés)  nutrientes por un valor equivalente al 17 por   ciento  del  valor  de  las  cosechas  y  al  14  por   ciento del valor de los productos derivados de   la  ganadería.  La  sobreexplotación  pesquera   no sólo agota la población de peces, sino que   acaba dañando otras formas de vida acuática  que dependen de la salud de las líneas coste-  ras y afectando al ecosistema en su conjunto.   Se  calcula  que  más  de  una  tercera  parte  (37   por ciento) de las pesquerías están sobreexplo- tadas o han desaparecido, mientras que el 10   por ciento está en proceso de recuperación. Fuente: PNUD, 2010.  Fuente: MINAM, 2012. Informe Nacional del Estado del Ambiente 2009-2011. Lima, 298 p.  ceptibilidad\tdel\tterritorio\ttratando\tde\tidentificar\t  vulnerabilidades  en  la  infraestructura  y  de  los   centros poblados (Vargas, 2012).  La\tfigura\t39\tda\tcuenta\tde\tla\tcalificación\tde\t  categorías de uso de zonas incorporando ges-  tión del riesgo de desastres. El cuadro 47 muestra la incorporación de la   gestión\tdel\triesgo\ten\tla\tplanificación\tterritorial.  El cuadro 48 muestra la incorporación de la   gestión\tdel\triesgo\ten\tla\tplanificación\tterritorial\ta\t  nivel Municipal.  6. Escenarios de Cambio   Climático y la Gestión del   riesgo de desastres (GdR)  Con relación a los escenarios de cambio cli- mático y gestión del riesgo en el Ordenamiento    Territorial\t(Saldaña,\t2009)\tafirma\tque:\tEl\tCam -  bio\tClimático,\tsi\tbien\trepresenta\tmodificaciones\t  en su mayoría negativas debido a que se des-  conoce muchos aspectos de su comportamien- to, implica también un conjunto de oportunida- \n121  Fig. 39: Calificación de categorías de uso de zonas iación de entre   1,1 0C y 6,4 0C hasta el año 2100. Asimis-  mo,  se  prevé  la  reducción  de  las  lluvias  y   la  presencia  de  más  eventos  extremos.  Sin   embargo, no existe una verdadera concien- cia ambiental frente a esta realidad, sino un   fenómeno de globalización depredadora.  -  Se ha determinado que la afectación en los   países andinos es relativamente baja debido   a  que  su  producción  es  también  menor.  Se   debe analizar cuál será el impacto económi- co y social de estos fenómenos; por ejemplo,   si habrá deterioro social, en cuyo caso el im-  pacto puede ser distinto.  -  Hay  una  urgencia  de  adaptación  humana- ambiental inmediata al cambio climático (ya   existe un rezago); así como de fortalecer la    infraestructura\t financiera-productiva-comer - cializadora. Por ello es urgente realizar una   planeación  integral  de  recursos  y  sectores   frente a riesgos climáticos y de otro origen.   La publicación “Riesgo y pobreza en un cli- ma  cambiante”  de  la  Estrategia  Internacional   para\tla\tReducción\tde\tlos\tDesastres,\t\tidentifica\t  cuatro estrategias para que la política de desa-  rrollo reduzca  los factores de riesgo, reducción   que  además  facilita  la  ACC.  Tales  estrategias   se pueden sintetizar de esta manera:  1.  Manejo ambiental, recuperación y cuidado de   servicios ambientales de los ecosistemas. \n124  2.\tOrdenamiento\t territorial\t y\t planificación\t del\t  suelo. 3.  Fortalecimiento de medios de vida y condicio- nes sociales en las zonas urbanas y rurales. 4. Gobernanza y gobernabilidad en el nivel na-  cional y subnacional, con participación de la   sociedad. Al usar estas estrategias se enfrenta tanto el  riesgo  como  el  desastre,  asimismo  la  ACC,  la   pobreza y los problemas del desarrollo (Lavell,   2010). Incorporar las dimensiones de adaptación al  cambio  climático  y  la  gestión  del  riesgo  en  la   gestión  territorial  implica  grandes  desafíos.  La   fig.\t40\tda\tcuenta\tde\testos\tdesafíos.  Adaptación    es la capacidad   para responder   y ajustarse a los   impactos actuales   y potenciales de   las condiciones   del cambio   climático de   manera que se   moderen los daños   o se aprovechen   las oportunidades   positivas que el   cambio climático   puede presentar  Desafíos fundamentales:  • Poner al centro a los   más afectados  por   el cambio Climático -   los más vulnerables    • Lo “rural” y lo  “urbano” : Gestión de   territorios intermedios y   dinámicas territoriales  • Nuevas escalas   territoriales: comunitaria-  local-nacional-regional-  transnacional  • Dimensión   institucional : Superar  la fragmentación y   contradicciones de las   políticas públicas  • Prevención de  conflictos  socio- ambientales y   territoriales: Contribuir   a la gobernabilidad  • Dimensión   institucional :  Instrumentos de   ordenamiento y   gestión territorial Ordenamiento y gestión territorial  Fig. 40: Ordenamiento y Gestión Territorial: Desafíos para la  Adaptación al Cambio Climático en Comunidades Andinas  Fuente: PRISMA, 2008  Estrategia  1.  Fortalecer  los  instru-  mentos de gestión  Para propiciar la continuidad de los procesos   es  necesario  lograr  el  compromiso  y  partici-  pación activa de las poblaciones en la elabo- ración de instrumentos de gestión tales como   los  planes  de  desarrollo  concertado,  los   presupuestos\t participativos,\t la\t zonificación\t  ecológica y económica o los planes de orde-  namiento  territorial,  entre  otros.  Otro  instru-  mento en el nivel local es el “Diseño Predial   Agroforestal”, el cual permite articular la ges-  tión del riesgo, las cadenas de valor sosteni-  bles y la conservación de los recursos natura-  Recuadro 19  Cinco estrategias para apoyar procesos de gestión del territorio   \n125  8. Herramientas para   incorporar la adaptación al   cambio climático y la gestión    del riesgo en la planificación    territorial  La  sistematización  de  experiencias  sobre  de-  sarrollo rural reduciendo el riesgo en contextos   de  cambio  climático    realizado  por  PDRS-GIZ   (2012) llega a las siguientes conclusiones:  -  La concepción de que los desastres son na-  turales ha seguido vigente en autoridades y   funcionarios  del  sector  público,  por  lo  cual    los\tprocesos\tde\tplanificación\tdel\tdesarrollo\t  incorporando el enfoque de gestión del ries-  les, así como implementar los POT a nivel de   las Unidades Productivas Familiares.   Estrategia 2: Observar y reflexionar  de manera participativa los cambios   generados  La  aplicación  de  elementos  de  la  gestión  del  territorio  está  trayendo  consigo  cambios   positivos\t en\t las\t poblaciones\t beneficiarias\t que\t se\t manifiestan\t en\t mejores\t resultados\t  productivos y una consiguiente mejora en sus   niveles de vida, en la reducción de vulnerabi- lidad ante amenazas, en el aprovechamiento   sostenible  de  los  recursos  naturales,  en  el   trabajo  en  redes  o  mancomunidades,  entre   otros.   Estrategia  3.  Desarrollar  capacida- des como clave de la sostenibilidad  El ordenamiento territorial en sí mismo es  un proceso técnico, político y administrativo,   de carácter participativo y de amplia concer-  tación social. La formulación del POT implica   desarrollar  nuevas  capacidades  humanas  y   organizacionales,  por  eso  los  equipos  téc-  nicos  que  impulsan  estos  procesos  deben   adoptar una base conceptual y metodológica   que les permita entender tanto la importancia    de\tla\tplanificación\tterritorial,\tla\tarticulación\tdel\t sistema\tde\tplanificación\tregional\to\tlocal\tcon\t  los procesos sociales en marcha y los bene-  ficios\tque\tbrinda\ta\tla\tpoblación.\tA\tla\tvez,\tde - ben  desarrollar  habilidades  para  interactuar   con grupos sociales, aplicar herramientas en   el proceso participativo y ejecutar actividades   estratégicas de comunicación y educación.   Estrategia  4.  Promover  el  uso  del  “ascensor”: de lo local a lo regional   y nacional, y viceversa.  Pensar  en  lo  global  y  actuar  en  lo  local  es  un  reto  de  los  procesos  de  ordenamien- to  territorial,  los  cuales  ayudan  a  fortalecer   el  proceso  de  descentralización  del  país  y  a   mejorar  la  participación  ciudadana  a  través   de  la  toma  de  decisiones  basadas  en  el  co-  nocimiento adecuado del territorio. La gestión   territorial  implica  también  poner  en  práctica   un conjunto de acciones que permitan la ar-  ticulación, concertación, subsidiaridad y com-  plementariedad  entre  los  diversos  procesos   locales, regionales y nacionales.  Estrategia  5.  Mejorar  los  sistemas  de  información  y  promover  estrate-gias  de  comunicación  y  educación   de manera integral  La necesidad de llevar a cabo un proceso  integral,  participativo,  transparente  y  demo-  crático, como garantía y respaldo al logro de   la ZEE y el ordenamiento territorial, contando   con la representatividad y el consenso entre   todos los actores sociales, políticos y econó- micos, requiere el diseño y la implementación   de una estrategia de comunicación y educa- ción;  estrategia  que  debe  analizar  cada  uno   de los actores sociales involucrados (necesi- dades de información y el ámbito de la edu-  cación-comunicación)  para  proponer  meca-  nismos  y  acciones  concretas  para  cada  tipo   de  público.  Resulta  crucial  en  los  procesos   de  ordenamiento  territorial  y  han  permitido   lograr  una  articulación  acertada  entre  el  co-  nocimiento local y el conocimiento técnico. Fuente: Aquino A., Ruiz C., Bao C., Asencio F., Puicón J., Rodríguez L., Gallo M., Dossman M., Gallardo M., Altami-  rano O., Santoyo T.; y  Olguín U.Tomado de Boletín, N° 40. PDRS-GTZ. Abril–junio 2008. go  no  aseguraban  que  los  proyectos  de  in-  versión pública lo consideraran para reducir   el riesgo. -  Es  importante  insistir,  pues,  en  la  incorpo- ración  gradual  del  enfoque  de  gestión  del   riesgo.  Una  forma  de  hacerlo  es  promover   su  aplicación  en  los  proyectos  de  inversión   pública,  en  un  proceso  de  interaprendizaje   para constatar la sostenibilidad de las inver-  siones  públicas  que  incorporan  el  análisis   de riesgo. Una limitación importante en esto   se  encuentra  en  que  incluso  la  formulación   y  evaluación  convencional  de  proyectos  de   inversión  pública  en  general  es  todavía  un   reto por su carácter novedoso y exigente.  -\t El\tanálisis\tcosto-beneficio\tse\tdebe\tintegrar\t \n126  garantizan una adecuada operación y man-  tenimiento de la infraestructura que mitiga el   riesgo. -  El  manejo  apropiado  de  los  conceptos  de  en  el  marco  político  y  en  las  decisiones  de   inversión pública y privada, evaluando los re-  sultados de la incorporación de la gestión del    riesgo\ty\tsus\tbeneficios.\tLas\tinversiones\tse - guras  requieren  costos  adicionales  que,  en   contrapartida, evitan costos de rehabilitación   y  reconstrucción  postdesastre,  los  cuales    vienen\ta\tser\tentonces\tbeneficios\tadicionales\t  de una inversión que reduce vulnerabilidad.   El  análisis  de  la  rentabilidad  social  marginal   permite decidir sobre la pertinencia de las me- didas de reducción del riesgo de desastre. -  El éxito de la incorporación de la gestión del   riesgo en los proyectos de inversión pública   se dan a nivel de estrategia, sistema de co-  operación hacia dentro y hacia fuera, estructu- ra de conducción, innovación y aprendizaje.   -\t En\tlos\tprocesos\tde\tplanificación\tconcertada\t  las  iniciativas  de  activación  económica  en   el  sector  rural  deben  articular  inversiones    concretas\ty\tcriterios\tespecíficos\tpara\tla\tre - ducción de la vulnerabilidad al determinar su   prioridad  en  la  asignación  del  presupuesto   de inversión. -  Pero los proyectos de inversión pública que   incorporan medidas de reducción del riesgo,   socialmente rentables en el análisis ex ante,   pueden . -  La población que habita en áreas donde se    manifiestan\tamenazas\to\tpeligros\tpierde\tla\t  percepción  del  riesgo  cuando  se  siente  be-   neficiada\tpor\tla\tejecución\tde\tmedidas\tpara\t  su reducción en su localidad, aun cuando el   riesgo permanezca, por lo cual las autorida- des deben incorporar la gestión del riesgo de   desastre en las regulaciones y el monitoreo   de la ocupación del territorio.  8.1. En Perú 8.1.1.  Incorporación  de  la  gestión  del   riesgo en el Plan de Desarrollo  El  Proyecto  DIPECHO  “Fortaleciendo  capaci- dades  de  sistemas  subnacionales  de  gestión   del  riesgo  y  desarrollando  la  resiliencia  de  co-  munidades  vulnerables  a  desastres”  (2012)   presenta la metodología de incorporación de la   gestión  del  riesgo  en  el  plan  de  desarrollo.  La   metodología considera los siguientes pasos:  1. Compromiso  político,  coordinación  con  las   autoridades. 2. Sensibilización  sobre  gestión  del  riesgo  y   adaptación  al  cambio  climático  a  las  auto-  ridades,  funcionarios  y  técnicos  de  institu-  ciones  responsables  de  la  formulación  del   plan. 3. Sensibilización  sobre  gestión  del  riesgo,   adaptación  al  cambio  climático  a  lideresas   y líderes comunitarios: Taller de sensibiliza- ción. 4. Conformación de equipo técnico y grupos de   trabajo.  5. Revisión  de  información,  caracterización   preliminar del territorio.  6. Capacitación a los agentes participantes so-  bre incorporación de la gestión del riesgo en   los planes de desarrollo. 7. Análisis  de  riesgo  participativo  como  parte   del diagnóstico del plan de desarrollo. 8. Formulación  del  Plan  de  Desarrollo  y  pro-  puestas que incorporan la gestión del riesgo   y adaptación al cambio climático. 9. Concertación  y  aprobación  del  Plan  de  De-  sarrollo que incorpora la gestión del riesgo. 10. Presentación y divulgación del Plan de De- sarrollo. 11. Implementación del Plan de Desarrollo que  incorpora la gestión del riesgo. 12. Mecanismo de monitoreo, control y evalua- ción del proceso.  La\tfigura\t\t42\tmuestra\tla\tincorporación\tde\tla\t  gestión  del  riesgo  de  desastres  en  el  proceso   de\tplanificación\tdel\tdesarrollo.  8.1.2. Adaptación al cambio climático  y la gestión del riesgo en la planifica -  ción territorial en el Perú  La  gestión  de  riesgos  ha  sido  incorporada   plenamente\t en\t la\t planificación\t del\t desarrollo\t  nacional  y  en  las  previsiones  presupuestarias   para cuidar las inversiones que realiza el país.    Es\tasí\tcomo\texisten\tfuentes\tde\tfinanciamiento\t  nacional,  sectorial  y  de  gobiernos  regionales   para atender los diferentes aspectos de la ges-  tión de riesgos.  Una\t de\t estas\t fuentes\t refiere\t al\t Programa\t  Presupuestal por Resultados de Reducción de   Vulnerabilidades  y  Atención  de  Emergencias   por  Desastres  –  PREVAED  del  Ministerio  de   Economía y Finanzas (MEF) que destinará im-  portantes recursos para esta labor. Esta fuente   permitirá que los gobiernos regionales y locales   puedan programar recursos para la elaboración   de\tinformación\tcomplementaria\ta\tla\tzonifica - ción  ecológica  y  económica  con  énfasis  en  el   análisis de riesgos. Además, el Ministerio del Ambiente está tra- bajando con el Ministerio de Economía y Finan-  zas  en  la  actualización  de  las  pautas  para  la   elaboración  de  proyectos  de  inversión  pública   (PIP)  dirigidos  al  fortalecimiento  de  capacida- des en ordenamiento territorial en los distintos   niveles  de  gobierno.  Cabe  precisar  que  los    PIP\tson\tinstrumentos\tfinancieros\tque\tpermiten\t  al  conjunto  de  gobiernos  regionales  y  locales   avanzar  en  la  elaboración  de  las  herramien- tas  necesarias  para  el  ordenamiento  territorial   (Cruz, 2012; con.pers.). El  Plan  Nacional  de  Gestión  del  Riesgo  de  Desastres 2012-2021 (Documento de Trabajo)   puesto en consideración  por el Sistema Nacio- nal de Gestión del Riesgo de Desastres (SINA-  GERD)  tiene  como  objetivo  prioritario  3,  la  in-  corporación e implementación de la gestión de   riesgo\tde\tdesastres\ta\ttravés\tde\tla\tplanificación\t  del desarrollo y la priorización de recursos físi-  cos\ty\tfinancieros.\tEs\tasí\tcomo\tse\tpuede\tapre - ciar líneas estratégicas que enlazan la gestión  \n128  Fig. 42: Incorporación de la gestión del riesgo de desastres   en el proceso de planificación del desarrollo  Fuente:\tRubiano\tD.;\tRamírez\tF.,\t2009.\tIncorporando\tla\tGestión\tdel\tRiesgo\tde\tDesastres\ten\tla\tPlanificación\ty\tGestión\tTe - rritorial, Guía técnica para la Interpretación y Aplicación del Análisis de Amenazas y Riesgos, PREDECAN, Pull Creativo   S.R.L.,\tLima,\tfigura\t13,\tPág.\t22  Elaboración y adaptación: Lozano O. – PREDES  de\triesgos\tcon\tla\tplanificación\ty\tel\tdesarrollo\t  territorial. El INDECI cuenta con Fondos de Contingen- cia (S/. 50 millones) para atender Emergencias   o situaciones de peligro inminente a través de   Actividades de Emergencia o PIP de Emergen- cia. En cualquiera de los dos casos, para acce-  der  a  estos  recursos  el  primer  paso  es  contar   con un EDAN, evaluación de daños y análisis de   necesidades\t(Formato\toficial\tdel\tINDECI\ty\tsus\t  instructivos) y que este esté subido al SINPAD   (Sistema Nacional de Prevención y Atención de   Desastres)  del  SINAGERD.  Sin  estos  dos  pa-  sos  el  evento  ó  desastre  NO  HA  OCURRIDO    oficialmente\ty\tpor\ttanto\tno\tse\tpuede\tatender\t  con  recursos  públicos  nacionales.    Un  tercer   paso, incorporado este año, es la necesidad de   la Declaratoria del Estado de Emergencia, por   ocurrencia o por peligro inminente. La  Reserva  de  Contingencia  Asignada  al  INDECI  para  mitigar  efectos  producidos  o  por   producirse y/o rehabilitar infraestructura pública   dañada    con  acciones  de  corto  plazo  y  de  ca-   rácter\ttemporal.\tNo\tse\tfinancian\tgastos\tde\tca - pacitación, asistencia técnica, seguimiento, ad-  quisición  de  vehículos,  maquinaria  o  equipos;   tampoco remuneraciones ni retribuciones pero   sí consultorías y /o servicios especializados.   8.2. En Ecuador  Marco  estratégico  de  la  gestión  del  riesgo  en   el Ecuador   Plan Nacional de Desarrollo para el Buen Vi- vir – 2009- 2013  El  Objetivo  4.  “Garantizar  los  derechos  de  la  naturaleza  y  promover  un  ambiente  sano  y   sustentable” es el que engloba a la Gestión de   Riesgo por medio de la Política 4.6, que indica   que es necesario “Reducir la vulnerabilidad so-  cial y ambiental ante los efectos producidos por   procesos  naturales  y  antrópicos  generadores   de riesgos”(1). En la Política 4.6, se menciona   como acciones claves (1):  a) Incorporar la gestión de riesgos en los proce-  sos\tde\tplanificación,\tordenamiento\tterritorial,\t zonificación\t ecológica,\t inversión\t y\t gestión\t  ambiental.  b) Implementar  programas  de  organización  de   respuestas oportunas y diferenciadas de ges- tión  de  riesgos,  para  disminuir  la  vulnerabili- dad de la población ante diversas amenazas.  \n129  Fig. 43: Reserva de Contingencia Asignada al INDECI  Fuente: INDECI, 2013.  c)\tFomentar\tacciones\tde\tmanejo\tintegral,\tefi - ciente y sustentable de las tierras y cuencas   hidrográficas\tque\timpulsen\tsu\tconservación\t  y  restauración  con  énfasis  en  tecnologías   apropiadas  y  ancestrales  que  sean  viables   para las realidades locales.  d) Implementar  un  sistema  de  investigación  y   monitoreo  de  alerta  temprana  en  poblacio- nes expuestas a diferentes amenazas.   e)\tDesarrollar\t modelos\t específicos\t para\t el\t sector\tseguros\t(modelos\tcatastróficos),\tque\t combinen\triesgo\ty\tlos\tparámetros\tfinancieros\t  del seguro y reaseguro, para recrear eventos   históricos y estimar pérdidas futuras.  f)  Analizar  la  vulnerabilidad  y  el  aporte  a  la   adaptación  al  cambio  climático  de  infraes-  tructuras estratégicas existentes y futuras.  El  apartado  6.10.  “Sostenibilidad,  conser- vación,  conocimiento  del  patrimonio  natural  y  fomento  del  turismo  comunitario”,  indica  que   el\tproyecto\tpolítico\tha\tplanteado\t“...una\ttran - sición  del  modelo  extractivista,  dependiente  y   desordenado a nivel territorial, a un modelo de   aprovechamiento  moderado  sostenible,  utili-  zando  de  manera  inteligente  los  espacios  dis-  ponibles, asegurando la soberanía alimentaria,   considerando el crecimiento poblacional, prote-  giendo el ambiente, evaluando los riesgos por   eventos  naturales,  para  poder  tomar  medidas   de precaución y mitigación; democratizando la    planificación\ty\tla\ttoma\tde\tdecisiones\ta\tlos\tciu - dadanos y ciudadanas” (1).  El Punto 8 sobre la “Estrategia Territorial Na- cional”, en su apartado 8.6. “Garantizar la sus-  tentabilidad  del  patrimonio  natural  mediante  el   uso racional y responsable de los recursos na-  turales renovables y no renovables”, menciona   la necesidad de “Gestión de cuencas hidrográ-  ficas\ty\trecursos\thídricos”\t(numeral\t8.6.2.)\ten\tla\t  (1) SNGR/ECHO/UNISDR (2012). Ecuador: Referencias Básicas para la Gestión de Riesgos. Quito, Ecuador. SNGR. \n130  Fig. 44 : Procedimiento Simplificado ante Situaciones de Desastre   de Gran Magnitud (aplica a los 3 niveles de gobierno)  Fuente: INDECI, 2013.  que\tse\trequiere\t“...consolidar\tla\tcultura\tdel\tbuen\t  uso del recurso agua en la sociedad y prevenir   los riesgos ocasionados por inundaciones y se-  quías”.  En  el  numeral  8.6.4.  “Gestión  integral    y\treducción\tde\triesgos”,\tmenciona\tque\t“...So - bre esta serie de manifestaciones naturales se   asientan  poblaciones,  infraestructuras  y  servi-  cios  que  no  necesariamente  han  considerado   su exposición frente a una amenaza generando   un alto nivel de vulnerabilidad del territorio y que   enfrentan  al  país  a  la  ocurrencia  de  desastres   de diferente magnitud. No obstante, muchos de   estos desastres serían prevenibles si se adop- tan medidas como un adecuado ordenamiento    territorial,\tla\tplanificación\tde\tla\tinversión,\tuna\t  cultura de prevención, el fortalecimiento de las   capacidades de los diferentes actores y un en-  foque que privilegie la mitigación de los riesgos   ya existentes. Sin  embargo,  las  emergencias  existen  en  mayor o menor magnitud en todo el mundo y en   Ecuador  se  debe  trabajar  en  una  preparación   adecuada\ty\teficiente\tde\tla\trespuesta\tfrente\ta\t  desastres de diferente magnitud porque solo el   adecuado  manejo  de  una  emergencia  logrará   una rápida recuperación sin repercusiones so-  ciales y económicas importantes para el país”.   “Cabe  remarcar  la  importancia  de  incorporar   de manera transversal la variable riesgos en la    planificación\ty\tejecución\tde\ttoda\tobra\tpública\ta\t fin\tde\treducir\tla\tvulnerabilidad\tde\tla\tpoblación\ty\t  las infraestructuras”.  La\tplanificación\tde\tla\tGestión\tdel\tRiegos\tde\t  Desastres y la Gestión del Desarrollo deben te-  ner como base común los objetivos, políticas y   estrategias del Plan Nacional del Buen Vivir.  9. Gestión del Riesgo en   procesos de Ordenamiento   Territorial en el Perú  A partir de las siguientes experiencias, se seña-  las algunas lecciones:  1. “Ordenamiento  Territorial  para  la  mejora  de   la  calidad  de  vida  y  adaptación  al  cambio  \n131  climático  en  la  Comunidad  Campesina  San   Miguel de Tabaconas – San Ignacio – Caja- marca – Amazonía Peruana”. 2. “El Plan de Ordenamiento Territorial (POT).   Una herramienta para el desarrollo territorial   seguro, reduciendo la vulnerabilidad frente a   los peligros y amenazas del territorio”. 3. “Incorporación  del  Análisis  de  Riesgo  en  el   Proceso  de  Formulación  del  Plan  de  Orde-  namiento Territorial del Distrito de Morropón    para\t identificar\t políticas\t y\t estrategias\t de\t  Gestión del Riesgo de Desastre”   Fuentes:  Landa,  2009;    Comisión  Europea;  INDECI y Comunidad Andina, 2008.  Lecciones aprendidas  -  Es necesario ofrecer un incentivo desde las   regiones a las provincias para iniciar y avan-  zar  en  sus  procesos  de  ZEE  y  elaboración   de planes de ordenamiento territorial (POT).  -  Estos procesos deben de ser altamente par-  ticipativos  desde  su  concepción  hasta  su   implementación, que nazcan de la demanda   e iniciativa comunal y que sean de construc-  ción permanente, proceso en constante mo-   vimiento,\tdinámico\ty\tflexible,\tconstituyéndo - se en una herramienta que oriente nuestras   decisiones  y  sea  el  punto  de  partida  para   asumir  aptitudes  y  compromisos  concretos   para con el futuro. -  La amplia participación activa de la sociedad   civil  en  el  proceso  es  fundamental  para  su   empoderamiento. Incluye la participación acti- va de campesinos, campesinas e indígenas. -  La participación activa de las y  los ciudada- nos permite aportar de forma constructiva a   la  solución  de  los  problemas  de  ocupación   desordenada  del  territorio  y  a  revertir  los   usos considerando los peligros y amenazas -  La  sociedad  civil  es  una  fuerza  importante   para  lograr  objetivos  de  desarrollo  sosteni-  ble  siempre  que  cuenten  con  instrumentos   y  mecanismos  que  faciliten  su  participación   de  modo  que  se  conserve  la  capacidad  del    Estado\tpara\tasegurar\tla\teficacia\ty\teficiencia\t  de  las  intervenciones  públicas,  para  ello  el   gobierno  local  debe  contar  con  capacidad   técnica, organizativa y orientadora  -\t La\toportunidad\tde\treflexión\tque\tse\tgenera\ten\t  el proceso permite que los pobres ubicados   en zonas de vulnerabilidad puedan participar   en la adopción de estrategias de mitigación y   respuesta. -  El proceso permite que gobierno y sociedad   civil  encuentren  espacios  de  diálogo  y  co-   operación\tpara\tplanificar\tel\tdesarrollo\tterrito - rial participativo -  Espacios de concertación amplios y en me- jora constante permite que la población y las   autoridades\tpuedan\tdefinir\tmejor\tlas\talterna - tivas para la solución de problemas. -  Una  entidad  pública,  aun  con  poco  presu-  puesto,  puede  incorporar  a  la  comunidad  y   otros socios estratégicos en sus decisiones,   sin que ello lo lleve a perder autonomía, com-  petencia ni tenga que aumentar su personal   para atender estas demandas. -  La  gestión  del  proceso  es  más  importante   que toda la información generada.  -  El SIG debe verse como una herramienta y   no como el fin del proceso, al mismo tiem- po que debe estar al servicio de todos los   actores. -  El  POT  se  constituye  en  la  principal  herra-  mienta\tpara\tplanificar\tel\tdesarrollo\tambiental\t  sostenible. -  En cuanto a aportes a la construcción de una   estrategia  regional  para  el  OT  y  el  CC  hay   que  poner  énfasis  en  tres  aspectos  impor-   tantes:\tidentificar\tlas\tzonas\tmás\tvulnerables,\t  desarrollar  métodos  para  tomar  decisiones   en  condiciones  de  incertidumbre  y  consoli- dar un sistema de monitoreo de largo plazo.  -  Es  clave  el  fortalecimiento  permanente  de   capacidades de los equipos técnicos. -  No existe un paquete metodológico estándar   para  la  elaboración  de  propuestas  y  planes   de  ordenamiento,  estos  tienen  que  ir  cons-  truyéndose de acuerdo a la realidad de cada   localidad,  la  dinámica  y  capacidades  de  la   población;  entendiendo  además  que  es  un   proceso político de concertación de actores   para  caminar  hacía  la  visión  participativa  y   concertada. -  Es  importante  vincular  la  gestión  ambiental   con la prevención de riesgos -  Es importante contar con una buena estrate-  gia comunicacional y dar cuenta permanente   de los avances de múltiples formas y en di-  versas oportunidades.  -  La  estrategia  de  comunicación  y  educación  facilita  el  entendimiento  del  proceso  y  com-  promete a los actores sociales, permitiendo   una  participación  activa  y  consciente  en  el   proceso. -  Existe  una  fuerza  latente  de  cambio  en  la   comunidad  que  es  importante  fortalecer  y   acompañar. -  Las  ONG  pueden  desempeñar  una  función   catalizadora del proceso. -  Es  importante  la  conformación  de  alianzas   con diversas organizaciones para la genera- ción participativa de información y mediante   aportes\ttécnicos,\teconómicos\ty\tfinancieros. \n132  -  La importancia de la voluntad política de las   autoridades. -  Voluntad política de las autoridades debe ca-  minar junto con la voluntad técnica del equi- po institucional. -  Se  puede  decir  que  el  éxito  de  esta  expe-  riencia  radica  en  la  voluntad  política  de  las   autoridades locales y la amplia participación   social del proceso. -  Disponibilidad presupuestal del gobierno lo-  cal para impulsar y viabilizar el proceso. -  La  importancia  del  liderazgo  activo  de  go-  biernos  locales  transparentes  y  con  claras   intenciones  de  apertura  democrática  y  con-  certación dispuestos a abrir espacios de pro-  moción  de  la  participación  ciudadana  en  la   planificación\tdel\tdesarrollo\tlocal  -  Es  importante  incorporar  en  el  proceso  la   gestión del conocimiento -  No es necesario esperar el documento POT   para iniciar el desarrollo de acciones orienta- das al ordenamiento territorial; desde la fase   de  diagnóstico  se  puede  invertir  en  proyec-  tos que los actores sociales demandan y que   su ejecución compromete más a los actores   al\tmostrar\tlo\tbeneficios\tdel\tproceso\tpara\tel\t  bienestar social.  -\t Es\tconveniente\tidentificar\telementos\tesen - ciales  para  el  funcionamiento  del  territorio   o  de  la  actividad  que  constituye  el  principal   sustento de vida y realizar análisis del riesgo   e\tidentificar\tmedidas\tpara\treducir\tel\triesgo\t  y  así  garantizar  inversiones  para  su  seguri- dad. -  Las  condiciones  requeridas  para  replicar   esta experiencia pasa por la decisión política   de  iniciar  el  proceso,  con  un  objetivo  claro;    conocimiento\tde\tla\timportancia\ty\tbeneficio\t  del  proceso  por  parte  de  la  población  y  la   sociedad civil; el convencimiento del equipo   técnico  institucional  para  impulsar  el  proce-  so, el desarrollo de capacidades en los equi- pos técnicos y la disponibilidad presupuestal   para la ejecución de acciones.  Factores limitantes  -  Imprecisión del marco normativo. -  Escasez de información técnica. -  Limitaciones de georeferenciación de locali- dades. -  Celos de algunas instituciones para compar-  tir información.  Todos estamos conscientes de las implican- cias  del  cambio  climático.  Nos  corresponde   ahora  desarrollar  las  propuestas  que  nos   aseguren  estar  mejor  preparados  para  la   mitigación  y  adaptación  al  cambio  climático.    Uno\tde\tlos\tfactores\trefiere\ta\tlas\tcondiciones\t  de  gobernabilidad  necesarias  para  enfrentar   este reto. Para  efectos  del  presente  ensayo  vamos   a\templear\tuna\tdefinición\tde\tgobernabilidad\t  que  alude  a  la  forma  en  la  que  los  actores   públicos y privados se organizan y concertan   para el logro de la sostenibilidad tomando en    cuenta\tla\tinfluencia\tdel\tmercado\ty\tde\tlos\tme -  dios\tde\tcomunicación.\tEsta\tdefinición\timplica\t  lograr un acuerdo social, político y económico   que  garantice  la  sostenibilidad  de  la  vida  en   el planeta, en todas sus manifestaciones.  La\tdefinición\tentonces\tnos\tinvita\ta\trevisar\t  la  implicancia  de  los  siguientes  factores:  el   sector  público,  la  sociedad  civil,  el  mercado  y  los  medios  de  comunicación  con  relación   al  cambio  climático.  Queremos  saber  si  en   nuestro país contamos o estamos en proceso   de  alcanzar  una  gobernabilidad  acorde  con   las  exigencias  que  implica  el  cambio  climá-  tico.  Más  que  un  recuento  detallado  lo  que    pretendemos\tes\tmotivar\ta\tla\treflexión,\tpro - puesta y acción. Con  relación  al  sector  público  y  sus  po- deres  tendríamos  que  preguntarnos  si  con-  tamos  con  una  estructura  institucional  que   está a cargo de liderar el proceso de concer-  tación pública y privada para la movilización   en torno al cambio climático. Pero además de   saber si existen o no estas instituciones u or-  ganismos nos interesa saber primero el gra-  do  de  gestión  efectiva  que  existe  al  interior   de  estas  instancias  y  por  lo  tanto  el  grado  y   tipo de liderazgo que existe. Esto nos llevará   a revisar  la calidad de sus procedimientos y    su\tecoeficiencia,\tla\tcalidad\tde\tla\tgestión\tde\t  Lectura 4  Gobernabilidad y cambio climático  L  E  C  T  U  R  A \n133  los  talentos,  la  existencia  de  una  cultura  de   gestión  de  información  y  el  conocimiento,  la   cultura  de  trabajo  en  equipos,  la  cultura  or-  ganizacional  orientada  a  la  sostenibilidad  y   el reconocimiento explícito que la naturaleza   también es uno de los clientes fundamentales   en la gestión. En este mismo sentido, es necesario saber  el grado de coordinación que existe tanto en-  tre dependencias internas y el grado de coor-  dinación intersectorial para el emprendimien- to más efectivo de acciones conducentes a la   mitigación y adaptación al cambio climático.  Así  mismo,  es  necesario  saber  cuál  es  el  grado de apertura a la sociedad civil mediante   una  apuesta  comprometida  por  la  participa- ción social tanto en la gestión como en la vigi-  lancia. Nos interesa saber cuál es el grado de   transparencia  y  qué  manifestaciones  expre-  sas existen de lucha contra la corrupción que   atenta  contra  la  implementación  de  políticas   efectivas  conducentes  a  enfrentar  de  mejor   manera  el  cambio  climático.  Celebrando  la   existencia  de  estrategias,  políticas,  planes  y   normas es importante conocer en qué medi-  da se implementan efectivamente. Pero tan importante como la calidad de los  procesos  interesa  la  calidad  de  toma  de  de-  cisiones  en  términos  de  sustentabilidad.  Es   importante  saber  en  qué  medida  se  maneja   las  tensiones  entre  intereses  económicos,   políticos  y  las  exigencias  de  sostenibilidad.   Es necesario saber si la toma de decisiones   tiene  visión  transgeneracional  o  si  está  me-  diatizada  por  intereses  del  corto  plazo  poco   sostenibles. Interesa conocer en qué medida   se reconocen y se respetan los derechos hu-  manos  de  los  actores  involucrados,  en  qué   medida  los  derechos  de  los  pueblos  indíge- nas son sinceramente considerados a la hora   de tomar decisiones. Importa  conocer  además  el  grado  en  que  el tema del cambio climático es un eje trans-  versal  que  cruza  las  políticas  sociales  y  las   políticas económicas. Interesa medir el grado   en  que  las  políticas,  programas  y  proyectos   están orientadas a “descarbonizar” el desarro- llo. Interesa saber en qué medida las políticas   energéticas y de transporte están orientadas    a\tlograr\tla\teficiencia\tenergética.\tAsí\tmismo\t  es  importante  que  nos  expliquen  si  existe   una  política  coherente  sobre  los  bosques,   se promueva su conservación y manejo y en   qué  medida  se  implementa  el  ordenamiento    territorial\ty\tla\tzonificación\tecológica\teconómi - ca con la participación activa de la sociedad   civil. En esta misma dirección interesa cono-  cer en qué medida se diseñan e implementan  estrategias para reducir la deforestación y la   forma en que se aplica una política coherente   de  lucha  contra  la  tala  y  comercio  ilegal  de   productos forestales. Además,  es  importante  conocer  en  qué  medida  se  realizan  esfuerzos  deliberados   para  convertir  las  Áreas  Protegidas  de  pa-  pel en auténticas Áreas Protegidas así como   también el grado en que se facilita la partici-  pación  de  la  sociedad  civil  en  la  gestión  del   Área. Es  necesario  analizar  en  qué  medida  la  administración  pública  es  capaz  de  generar   una normatividad coherente con la sostenibi-  lidad\to\tsi\tes\tfácilmente\tinfluenciada\tpor\tlos\t  lobbies  del  poder  económico.  También  es   importante saber en qué medida se traducen   los acuerdos y convenios internacionales de   los cuales el país es signatario, no sólo en la   legislación y políticas nacionales (regionales   y  locales)  si  no,  sobre  todo,  se  implementa   en  la  práctica.  Es  interesante  saber  en  qué   medida se honra la palabra nacional frente a   los compromisos internacionales en la mate-  ria.  En  el  mismo  sentido  nos  interesa  saber   en  qué  medida  se  honra  la  palabra  frente  a   los actores internos. Nos  interesa  conocer  también  la  medida  en  que  el  sector  público  invierte  en  sus  ins-  tituciones  de  investigación  y  educación  para   generar  conocimiento  que  nos  permita  estar   mejor preparados para la mitigación y adap- tación  al  cambio  climático.  No  sólo  estamos   hablando de la existencia de las instituciones   sino también el grado de implementación en   instrumental y equipos, bibliografía, políticas    de\tgestión\tde\ttalentos\tcientíficos\ty\ttecnológi - cos y el grado de sostenibilidad institucional. También  nos  interesa  conocer  cuál  es  el  grado  de  consistencia  de  los  equipos  nego- ciadores nacionales en los grandes procesos   globales respecto al cambio climático. Nece-  sitamos saber si son equipos consolidados y   si permiten la continuidad del proceso. En el tema de la sociedad civil nos interesa  saber no sólo el mapa de los actores relacio- nados  al  cambio  climático,  sino  también  el   grado de cohesión interna y asociada. Impor-  ta saber la medida en que sus propuestas y   acciones están basadas en información cien-   tífica\ty\tsi\tse\trecoge\to\tno\tlos\taportes\tde\tlos\t  saberes ancestrales en los contenidos de sus   propuestas.  Nos interesa saber el grado en que estas  organizaciones gestionan su información, sus   conocimientos,  sus  ideas  y  propuestas.  Nos   interesa  saber  también,  lo  mismo  que  en  el  \n134  sector  público,  cuál  es  su  capacidad  de  diá-  logo,  su  capacidad  de  escucha,  el  grado  de   su  espíritu  para  el  diálogo  generativo  y  con-  certador  con  las  autoridades  y  con  el  sector   privado.  Importa  mucho  saber  la  calidad  de   la  democracia  interna,  cómo  se  ejerce  y  se   construyen  los  liderazgos  democráticos,  en   qué  medida  existen  políticas  explícitas  que   favorezcan la participación activa de mujeres   y  niños.  Nos  interesa  saber  también  en  qué   medida tienen sistemas efectivos de comuni- cación y educación ciudadana. Es interesante también conocer la medida  en  que  las  organizaciones  son  coherentes   entre  el  discurso  y  la  práctica.  Habría  que   medir el grado en que las organizaciones son   coherentes con sus propios principios y no se   dejan\tinfluenciar\tpor\tconsideraciones\tpolíti - cas y económicas. Es  importante  conocer  además  cómo  las  poblaciones locales se preparan para reducir   su  vulnerabilidad  frente  al  cambio  climático,   qué capital social y cultural fortalecen para te-  ner mejor control frente a los riesgos y ame-  nazas  que  entrañan  los  desastres  producto   del cambio climático. Es  necesario  además  conocer  el  grado  de fortaleza de los partidos políticos, en qué   forma el cambio climático es un tema central   transversal  a  todas  sus  propuestas  políticas   y  la  forma  en  que  se  traducen  en  su  accio-  nar  político.  Así  mismo,  importa  conocer  la   medida  en  que  traducen  y  asimilan  las  pro-  puestas ciudadanas respecto a la mitigación   y adaptación al cambio climático. Interesa sa-  ber cuáles son los esfuerzos que se realizan   para ir reduciendo la informalidad política, en   qué forma construyen su transparencia y cuál   es el grado de compromiso de lucha contra la   corrupción. En  el  tema  del  mercado  nos  interesa  sa- ber  el  grado  y  la  autenticidad  con  la  que  se   habla  y  se  implementan  programas  inspira- dos en la responsabilidad social empresarial  y la economía sostenible. Nos interesa saber   si  en  las  inversiones  se  toma  en  cuenta  la   sostenibilidad  o  sólo  el  interés  económico.   Importa  conocer  los  esfuerzos  deliberados   que se realizan en la empresa para ser más    ecoeficientes.\tEn\teste\tsentido\tinteresa\tsaber\t  qué medidas se están tomando para mejorar    la\teficiencia\tenergética,\tla\tconservación\tdel\t  agua,  el  reciclaje  de  productos.  Así  mismo   nos  interesa  saber  en  qué  medida  sus  pro-  ductos son pensados en términos de sosteni-  bilidad o si son pensados sólo en términos de   rápido recambio por obsolescencia. Interesa   muy fondo conocer si los programas de res-  ponsabilidad  social  o  relaciones  con  las  co-  munidades están dirigidos a crear o fortalecer   socios interlocutores o sólo están dirigidos a   contentar  a  la  población  para  trabajar  con   tranquilidad. Finalmente,  nos  interesa  conocer  si  exis- te  o  no  libertad  de  expresión  en  la  prensa   (externa  e  interna),  importan  saber  si  en  la   decisión  de  presentación  de  la  información   prima el criterio de sostenibilidad o la defen-  sa  de  intereses  de  grupo.  Interesa  saber  en   qué  medida  existe  o  no  información  censu-  rada internamente que nunca sale publicada.   También  nos  interesa  conocer  el  grado  en   que realizan esfuerzos sistemáticos para que   la  población  entienda  los  orígenes  y  conse-  cuencias  del  cambio  climático  y  esté  mejor   preparada para la mitigación y adaptación al   cambio climático. Hemos realizado un recuento muy somero  de las implicancias de la gobernabilidad y el   cambio  climático.  Como  podemos  apreciar   la gobernabilidad es clave para enfrentar de   mejor manera los retos del cambio climático.   Nos  corresponde  ahora  a  todos  los  actores   analizar  la  medida  en  que  estamos  constru-  yendo  la  gobernabilidad  para  el  cambio  cli-  mático.  El  cambio  climático  es  compromiso   compartido entre todos y por tanto todos de-  bemos realizar los esfuerzos necesarios para   la mitigación y adaptación. \n135  Índice de cuadros  Cuadro 44:  Lineamientos propuestos, indicando el área o sector involucrado y     las estrategias de acción para países de la Subregión Andina Cuadro 45:  Objetivos estratégicos y lineamientos de política del Plan de         Gestión de Riesgos y Adaptación al Cambio Climático en el Sector Agrario Cuadro 46:  Políticas en Bolivia relacionadas a la GdR y la Adaptación al       Cambio Climático ligadas a la seguridad alimentaria  Cuadro\t47:\t Incorporación\tde\tla\tgestión\tdel\triesgo\ten\tla\tplanificación\tterritorial  Cuadro\t48:\t Incorporación\tde\tla\tgestión\tdel\triesgo\ten\tla\tplanificación\tterritorial\ta\t\t    nivel municipal  Índice de recuadros  Recuadro 17:  Principios para una cultura de ordenamiento territorial para la      adaptación al cambio climático en comunidades andinas (C.A.) Recuadro 18:  El caso peruano: Sector uso de suelo, cambio de uso de suelo y     silvicultura (USCUSS, siglas en inglés) Recuadro 19:  Cinco estrategias para apoyar procesos de gestión del territorio Recuadro 20:  El Plan de Incentivos como herramienta para incorporar la      \t   Gestión\tdel\tRiesgo\ten\tla\tplanificación\tdel\tdesarrollo.\tCaso\tperuano  Índice de figuras  Fig. 34:  Modelo de gestión territorial sostenible Fig. 35:  Sistemas vinculados al desarrollo integral y al ordenamiento territorial Fig. 36:  El sentido del Desarrollo Territorial Sostenible  Fig.\t37:\tDe\tla\tplanificación\tdesarticulada\ta\tla\tgestión\tterritorial\tpara\tel\tdesarrollo\t\t    regional con ACC y GdR Fig. 38:  Territorios seguros y adaptación al cambio climático  Fig.\t39:\tCalificación\tde\tcategorías\tde\tuso\tde\tzonas\tincorporando\
