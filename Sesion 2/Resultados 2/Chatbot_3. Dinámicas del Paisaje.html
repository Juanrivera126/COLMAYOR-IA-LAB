    <style>
        :root{--primary:#007bff;--secondary:#6c757d;--light:#f8f9fa;--dark:#343a40;--success:#28a745;--danger:#dc3545;--warning:orange;--radius:8px;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--bg:var(--light);--text:var(--dark);--card:#fff;--border:#ddd;--input:#fff;--iborder:#ccc;--bot-bg:#e9ecef;--bot-text:var(--dark);--user-bg:var(--primary);--user-text:#fff;--sys-bg:#fff3cd;--sys-text:#856404;}
        body.dark-mode{--bg:#212529;--text:#f8f9fa;--card:#343a40;--border:#495057;--input:#495057;--iborder:#6c757d;--bot-bg:#495057;--bot-text:#f8f9fa;--sys-bg:#332701;--sys-text:#ffeb8f;}
        body{font-family:var(--font);margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;transition:background .3s,color .3s;}

        header{text-align:center;border-bottom:1px solid var(--border);padding-bottom:15px;}
        header h1{color:var(--primary);margin:0;font-size:1.6em;}
        header p{margin:5px 0 0;font-size:.9em;color:var(--secondary);}
        .toolbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;}
        button{background:var(--primary);color:#fff;border:none;padding:8px 15px;border-radius:var(--radius);cursor:pointer;font-size:.9em;transition:background .2s;}
        button:hover{background:#0056b3;}
        button:disabled{background:var(--secondary)!important;opacity:.65;cursor:not-allowed;}
        #theme-btn{background:var(--secondary);}
        #palette-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;}
        .toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
        .btn-export{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85em;transition:background .2s;}
        .btn-export:hover{background:#0056b3;}
        .pdf2-section{padding:10px;border:1px dashed var(--border);border-radius:var(--radius);}
        .pdf2-section label.title{font-size:.85em;font-weight:bold;display:block;margin-bottom:6px;color:var(--secondary);}
        .file-row{display:flex;align-items:center;gap:10px;}
        .file-row input[type=file]{display:none;}
        .file-label{background:var(--secondary);color:#fff;padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:.85em;}
        .file-label:hover{background:#545b62;}
        #pdf2-name{font-style:italic;color:var(--secondary);font-size:.85em;}
        #pdf2-status{font-size:.85em;margin-top:4px;font-weight:bold;}

        .sq-label{font-size:.85em;font-weight:600;color:var(--secondary);}
        .questions-select{width:100%;padding:8px;border:1px solid var(--iborder);border-radius:var(--radius);background:var(--input);color:var(--text);font-size:.9em;}
        .chat-display{height:360px;overflow-y:auto;border:1px solid var(--iborder);border-radius:var(--radius);padding:10px;background:var(--bg);line-height:1.6;}
        .chat-display .user-message,.chat-display .bot-message,.chat-display .system-message{margin-bottom:10px;word-wrap:break-word;}
        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}
        .message{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;max-width:100%;}
        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}
        .avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #eee;background-color:#f0f0f0;}
        body.dark-mode .avatar-img{border-color:#444;background-color:#555;}
        .message-bubble{padding:10px 15px;border-radius:18px;max-width:85%;word-wrap:break-word;line-height:1.5;display:flex;flex-direction:column;}
        .user-message .message-bubble.user-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:5px;margin-left:auto;}
        .bot-message .message-bubble.bot-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:5px;margin-right:auto;}
        .chat-display .message-bubble strong{color:var(--primary);font-size:.9em;}
        .chat-display .bot-message .message-bubble p{margin:0 0 8px;}.chat-display .bot-message .message-bubble p:last-child{margin:0;}
        .chat-display .bot-message .message-bubble pre{background:var(--dark);color:var(--light);padding:10px;border-radius:5px;overflow-x:auto;}
        .chat-display .bot-message .message-bubble code{background:rgba(0,0,0,.1);padding:2px 4px;border-radius:3px;}
        body.dark-mode .chat-display .bot-message .message-bubble code{background:rgba(255,255,255,.1);}
        .chat-display .system-message{background:var(--sys-bg);color:var(--sys-text);text-align:center;font-style:italic;font-size:.9em;padding:8px 12px;border-radius:var(--radius);}
        .chat-display .system-message.error{background:#f8d7da;color:#721c24;}
        .thinking-animation{opacity:.75;animation:pulseThink 1s ease-in-out infinite;}
        @keyframes pulseThink{50%{opacity:1}}
        .input-area{display:flex;gap:10px;}
        #question-input{flex-grow:1;padding:10px;border:1px solid var(--iborder);border-radius:var(--radius);font-size:1em;resize:none;background:var(--input);color:var(--text);}
        #send-button{background:var(--success);padding:0 20px;display:flex;align-items:center;justify-content:center;gap:8px;}
        #send-button:hover{background:#1e7e34;}
        .loader{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:none;}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        footer{text-align:center;padding:12px;background:var(--dark);color:var(--light);font-size:.8em;margin-top:20px;}
        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}
    </style>

<script>
    const PDF_TEXT = "GC  - FR  – 00 6  24  – 02  – 20 20  Versión 0 6 \nPaisaje y Planificación del   Territorio Sostenible  Optativa  II  Olgalicia Palmett Plata  o lgalicia.palmett@colmayor.edu.co  INSTITUCIÓN UNIVERSITARIA COLEGIO MAYOR DE ANTIOQUIA  ARQUITECTURA \nHablamos   de   dinámicas   del  paisaje   cuando   analizamos   las  modificaciones   existentes   en   los  procesos   naturales   y   antrópicos .  Nuestro   planeta   es   un   sistema  complejo   en   el   que   todos   sus  componentes :   atmosfera,  hidrosfera,   litosfera   y   biosfera  están   en   continua   interacción,  intercambiando   una   energía   que  procede   fundamentalmente   del  Sol,   y   en   mucha   menor   medida  de   su   calor   interno   y   de   las  fuerzas   gravitatorias .   (Ramil   Rego   et   al,   2009 )  DINÁMICAS DEL PAISAJE  https://cdn0.ecologiaverde.com/es/posts/6/5/3/que_es_la_ecologia_del_paisaje_356_600.webp \nDINÁMICAS DEL PAISAJE  También   se   describe   la   dinámica   del   paisaje  como   consecuencia   de   los   cambios   de   gestión  y   uso   del   suelo  Existen   complejas   relaciones   entre   la   evolución  geomorfológica,   la   vegetación   y   los  aprovechamientos   antrópicos   que   han   dado  como   resultado,   en   los   últimos   milenios,   a  importantes   cambios   en   los   paisajes .  El   paisaje   es,   en   definitiva,   una  entidad   dinámica   que   evoluciona  temporalmente   como   consecuencia  de   unos   procesos   naturales   y   unas  intervenciones   antrópicas   o   por   el  cese   de   éstas .   Por   ello,   no   ha   de  considerarse   un   fenómeno   estático  susceptible   de   ser   encerrado   en   una  imagen   momentánea,   sino   como  algo   en   permanente   evolución . \nDINÁMICAS DEL PAISAJE  Identificar,   ubicar   y   cuantificar   los   cambios  de   los   usos   del   suelo   permite   entender   las  tendencias   de   evolución   del   territorio   y  conocer   posibles   problemas   como  desarrollos   urbanísticos   descontrolados,  fragmentación   de   hábitats,   pérdida   de  servicios   ecosistémicos,   deterioro   de   la  calidad   ambiental,   etc .  https://historiprofeshome.files.wordpress.com/2019/09/d2.01 - power - point - unidad - 1.pdf \nDINÁMICAS DEL PAISAJE  Las   diferentes   formas   de   ocupación   y  transformación   del   espacio   geográfico   por   las  sociedades   humanas   producen   cambios   en   el  territorio,   muchas   veces   irreversibles,   los   cuales  juegan   un   papel   fundamental   en   la   sostenibilidad  ecológica   y   en   el   desarrollo   socioeconómico   de  cualquier   región,   por   lo   que   el   estudio   de   la  dinámica   del   paisaje   y   de   los   impactos   provocados  en   el   medio   natural   por   los   modos   de   expansión   y  desarrollo   de   las   sociedades,   configuran   un  importante   aspecto   de   la   planificación   territorial .  https://historiprofeshome.files.wordpress.com/2019/09/d2.01 - power - point - unidad - 1.pdf \nComponente   geológico :   la  tierra,   el   relieve   (llanuras,  montañas,   colinas ... )   y   la  naturaleza   del   terreno  (disposición   de   los   materiales,  afloramientos   rocosos),   el  agua   en   sus   diversas  expresiones   y   todo   otro  elemento   abiótico .  COMPONENTES DEL PAISAJE  Componente   biológico :   vida  vegetal   y   animal .   La   fauna  tiene   menos   importancia  aunque   a   veces   es   un  elemento   determinante   como  en   el   caso   de   las   reservas  faunísticas .  Componente   antrópico   :   si  bien   el   hombre   es   un  elemento   más   de   la  naturaleza   unido   a   ella   por  vínculos   de   dependencia . ,  e   indudablemente   un  componente   biótico,   las  estructuras   espaciales  debidas   a   las   actuaciones  humanas   se   consideran  separadamente   dado   que  su   papel   en   el   paisaje   es  muy   activo .  Conjunto de ecosistemas en interacción \nCOMPONENTES DEL PAISAJE Cada   uno   de   los   medios   citados   (biótico,   abiótico   y   antrópico)   va   a   tener   diferente   peso   específico   en  cada   unidad   de   paisaje,   estableciéndose   entre   ellos   una   serie   de   relaciones   e   interdependencias   que  dan   unidad   al   conjunto   y   determinan   su   evolución .   Las   dinámicas   evolutivas   de   los   procesos   indicados  se   desarrollan   según   escalas   temporales   muy   diferentes .   La   dinámica   de   ciclo   largo   se   puede   asimilar   a  una   sucesión   ecológica   (primaria   o   secundaria),   mientras   que   las   dinámicas   de   ciclo   corto   están   dadas  por   perturbaciones   localizadas,   tales   como :  •   En   el   medio   abiótico :   desprendimientos   de   ladera,   ciertas   transformaciones   en   el   medio   fluvial,  caídas   de   bloques,   etc .  •   En   el   medio   biótico :   muerte   de   individuos   como   consecuencia   de   desprendimientos,   incendios   o  caída   de   otros   individuos,   cambio   en   poblaciones   debido   a   plagas   o   enfermedades,   etc . \nCOMPONENTES DEL PAISAJE  El paisaje está en permanente evolución como consecuencia de:  Procesos   dinámicos   naturales   del   medio   biótico   (evolución   de   la  vegetación,   colonización,   sustitución,   etc . )   y   del   medio   abiótico   (procesos  erosivos   o   sedimentarios,   transformaciones   de   los   cursos   fluviales,  procesos   glaciares,   etc . )  Procesos   antrópicos :   roturaciones,   talas,   transformación   de   usos  de   suelo,   instalación   de   infraestructuras,   etc .  “Existe paisaje cuando hay una determinada   realidad física o territorial que se impregna de una   mirada subjetiva, cultural, social y política,   de una apropiación matizada por el resultado temporal o   causal de la interacción entre el   hombre y la naturaleza”. Juan José Corona Dinámica del paisaje   de   Juan José Corona (Chile) es el  nº   30 de la colección  Pewen   Cuadernos de Fotografía. \nEL PAISAJE  MULTIPLICIDAD   MORFOLÓGICA PARA TIPIFICAR  PLAYA   DELTA   ISLA   CABO   ACANTILADO   DESEMBOCADURA  LLANURAS   MONTAÑAS   DESIERTO   ROCAYOSO ARRECIFES  TUNDRA   BOSQUE TAIGA   BOSQUE ALPINO   CHAPARRAL   MANGLAR  TIPOS DE  PAISAJE  SEGÚN SU MORFOLOGÍA \nEL PAISAJE  MULTIPLICIDAD   ESTRUCTURAL PARA CLASIFICAR  ANTRÓPICO RURAL ANTRÓPICO URBANO   ANTRÓPICO AGRÍCOLA   ANTRÓPICO INDUSTRIAL  TIPOS DE PAISAJE  SEGÚN SU MORFOLOGÍA \nProcesos dinámicos naturales  Bióticos   • .  Abióticos   • .  Evolución de la vegetación, colonización, y   sustitución, etc .   Procesos erosivos o sedimentarios,   transformaciones de los cursos fluviales,   procesos glaciares, etc. \nProcesos dinámicos antrópicos  Hombre  •   .  Roturaciones, talas, transformación de usos del   suelo, instalación de infraestructuras, etc.  El pastoreo, los incendios provocados, la   agricultura intensiva.  Hombre \nManifestaciones de las   perturbaciones  .   .   .  En el medio   abiótico:   desprendimientos   de ladera, ciertas   transformaciones   en el medio   fluvial, caídas de   bloques, etc.  En el medio biótico:   muerte de individuos   como consecuencia de   desprendimientos,   incendios o caída de   otros individuos,   cambio en poblaciones   debido a plagas o   enfermedades, etc.  Una tala, una   roturación, cambios   en la utilización del   suelo, incendios   provocados,   instalación de   infraestructuras de   comunicación, etc. \nHUELLA   HUMANA EN EL PATRÓN DEL   PAISAJE  www.slideshare.net   blog.abilia.mx geografia.laguia2000.com   urb - 1 - udi - julianvargas.blogspot.com \nANÁLISIS ESPACIAL -   FOTOINTERPRETACIÓN  Una vez reconocidas las manifestaciones, veamos como se observan en un análisis   espacial.  Forman  ́ s   Patterns   of  Landscape   Chage  (Forman, 1995)  Desaparición  Reducción  Fragmentación  División (regular o irregular) Vía, sendero  Perforación o intrusión (Incendio o Inundación)  FOTOINTERPRETACIÓN ¿Qué es? \nMULTIPLICIDAD   ESTRUCTURAL Periodo   prehispánico   (Antes   de   1500 ) :   todas  las   regiones   tenían   alguna   forma   de   presión  antrópica,   variando   según   la   densidad  poblacional .   El   área   total   incluía   cultivos,  barbechos   y   relictos   de   vegetación   natural  usados   para   la   caza   y   recolección .   Aún   con  una   tecnología   limitada,   los   niveles   de  presión   sobre   el   suelo   eran   altos,  presentándose   erosión   y   sedimentación .  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL Conquista   ( 1500 - 1600 ) :   el   colapso   demográfico  y   abandono   de   la   tierra   coincidieron   con   la  reducción   del   área   transformada   y   regeneración  de   los   bosques .   La   introducción   de   la   actividad  ganadera   (bovina,   caprina   y   ovina)   impactó  fuertemente   sobre   la   vegetación,   sobre   la  infraestructura   indígena   y   los   cultivos .  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL Periodo   colonial   ( 1600 - 1800 ) :   con   la  estabilización   de   la   población,   la   frontera  agrícola   reinició   su   expansión .   Se   estima   que   un  tercio   de   las   10 . 000 ha   taladas   de   bosque  anualmente   se   dedicaban   a   la   ganadería,  concentradas   principalmente   en   la   zona   Andina .  El   descubrimiento   de   materias   primas   como   la  quinina,   aceleró   aún   más   este   proceso .  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL Independencia   ( 1800 - 1850 ) :   La   tierra   dedicada  al   pastoreo   aumentaba   hasta   ser   la   mitad   del  área   de   bosques   talados .   La   minería,  concentrada   principalmente   en   el   pacífico,   se  convirtió   en   la   actividad   exportadora   principal  hasta   la   abolición   de   la   esclavitud   y   el   auge   de  otros   productos .   Posteriormente,   la   minería   se  trasladó   a   la   zona   Andina  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL Recolonización   Andina   ( 1850 - 1920 ) :   Debido   a   la  ganadería,   la   mayoría   de   los   paisajes   en   la  región   andina   se   encontraban   fragmentados .   La  introducción   de   pastos   exóticos   ( kikuyo   y  puntero),   impactó   negativamente   la  biodiversidad   en   la   vegetación .   La   vinculación   a  la   economía   internacional   amplió   la   base   de  productos   exportados   (caucho,   quinina,   la   fibra  de   palma   y   marfil) .  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL Urbanización   y   recolonización   de   las   tierras  bajas   ( 1920 - 1970 ) :   El   incremento   de   la   población  aceleró   los   procesos   de   deforestación   con  dirección   a   las   tierras   bajas   incluyendo   los  bosques   del   Caribe,   los   cuales   se   habían  recuperado   desde   la   conquista .   Junto   a   la  urbanización,   la   creación   de   vías   de   acceso   han  llevado   a   la   expansión   de   población   en   sitios   que  antes   eran   inaccesibles   o   de   poca   accesibilidad .  Esto   conlleva   a   transformaciones   del   paisaje  antrópicas   de   tipo   expansivo   y   concentradas .  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL  Industrialización   y   Metropolización   ( 1970   –  2000 ) :   la   ganadería   se   siguió   abriendo   paso   a  expensas   de   cada   vez   mayores   áreas  deforestadas .   El   sector   agrícola   consolidó   su  tránsito   hacia   la   modernización   técnica   trayendo  consigo   una   fuerte   presión   hacia   los   pequeños  productores  https://cambiopaisaje.wikispaces.com/El+cambio+de+paisaje+en+Colombia \nMULTIPLICIDAD   ESTRUCTURAL  http://prcch     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }

        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {
        const base = palette || {
            primaryColor: '#2563eb',
            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',
            inputBorderColor: '#cbd5e1',
            chatBubbleBotBg: '#f3f4f6',
            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {
        if (!palette) return;
        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');
        target.style.setProperty('--bg', palette.bgColor || '#f8f9fa');
        target.style.setProperty('--text', palette.textColor || '#343a40');
        target.style.setProperty('--card', palette.cardBgColor || '#ffffff');
        target.style.setProperty('--border', palette.cardBorderColor || '#dddddd');
        target.style.setProperty('--input', palette.inputBgColor || '#ffffff');
        target.style.setProperty('--iborder', palette.inputBorderColor || '#cccccc');
        target.style.setProperty('--bot-bg', palette.chatBubbleBotBg || '#e9ecef');
        target.style.setProperty('--bot-text', palette.chatBubbleBotText || '#343a40');
        target.style.setProperty('--user-bg', palette.chatBubbleUserBg || '#007bff');
        target.style.setProperty('--user-text', palette.chatBubbleUserText || '#ffffff');
        target.style.setProperty('--sys-bg', palette.systemMessageBg || '#fff3cd');
        target.style.setProperty('--sys-text', palette.systemMessageText || '#856404');
    }
    function applyPalette(palette) {
        currentPalette = palette;
        applyTheme(currentTheme);
        localStorage.setItem('downloaded-palette', JSON.stringify(palette));
    }
    function applyTheme(t) {
        currentTheme = t;
        document.body.classList.toggle('dark-mode', t === 'dark');
        themeBtn.textContent = t === 'dark' ? '☀️ Tema' : '🌙 Tema';
        const effectivePalette = buildThemePalette(t, currentPalette);
        setPaletteVariables(document.body, effectivePalette);
        setPaletteVariables(document.documentElement, effectivePalette);
        document.body.style.backgroundColor = effectivePalette.bgColor;
        document.body.style.color = effectivePalette.textColor;
        localStorage.setItem('theme', t);
    }
    themeBtn.addEventListener('click', () => { const n = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(n); });
    paletteBtn.addEventListener('click', () => { applyPalette(generatePalette()); });
    const savedPalette = JSON.parse(localStorage.getItem('downloaded-palette') || 'null');
    if (savedPalette) { applyPalette(savedPalette); }
    else if (INITIAL_PALETTE) { applyPalette(INITIAL_PALETTE); }
    else { applyPalette(generatePalette()); }
    applyTheme(currentTheme);

    // Second PDF (embedded or user-loaded)
    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
