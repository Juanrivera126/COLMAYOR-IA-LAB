    <style>
        :root{--primary:#007bff;--secondary:#6c757d;--light:#f8f9fa;--dark:#343a40;--success:#28a745;--danger:#dc3545;--warning:orange;--radius:8px;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--bg:var(--light);--text:var(--dark);--card:#fff;--border:#ddd;--input:#fff;--iborder:#ccc;--bot-bg:#e9ecef;--bot-text:var(--dark);--user-bg:var(--primary);--user-text:#fff;--sys-bg:#fff3cd;--sys-text:#856404;}
        body.dark-mode{--bg:#212529;--text:#f8f9fa;--card:#343a40;--border:#495057;--input:#495057;--iborder:#6c757d;--bot-bg:#495057;--bot-text:#f8f9fa;--sys-bg:#332701;--sys-text:#ffeb8f;}
        body{font-family:var(--font);margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;transition:background .3s,color .3s;}

        button{background:var(--primary);color:#fff;border:none;padding:8px 15px;border-radius:var(--radius);cursor:pointer;font-size:.9em;transition:background .2s;}
        button:hover{background:#0056b3;}
        button:disabled{background:var(--secondary)!important;opacity:.65;cursor:not-allowed;}

        .btn-export{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85em;transition:background .2s;}

        .chat-display{height:360px;overflow-y:auto;border:1px solid var(--iborder);border-radius:var(--radius);padding:10px;background:var(--bg);line-height:1.6;}

        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}
        .message{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;max-width:100%;}
        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}
        .avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #eee;background-color:#f0f0f0;}
        body.dark-mode .avatar-img{border-color:#444;background-color:#555;}
        .message-bubble{padding:10px 15px;border-radius:18px;max-width:85%;word-wrap:break-word;line-height:1.5;display:flex;flex-direction:column;}
        .user-message .message-bubble.user-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:5px;margin-left:auto;}
        .bot-message .message-bubble.bot-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:5px;margin-right:auto;}

        .loader{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:none;}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        footer{text-align:center;padding:12px;background:var(--dark);color:var(--light);font-size:.8em;margin-top:20px;}
        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}

<script>
    const PDF_TEXT = "- 1 -  La fragilidad ambiental   de la cultura - Historia y medio ambiente -  Augusto Ángel Maya \nCítese como:  ÁNGEL MAYA, AUGUSTO. 2015. La Fragilidad ambiental de la cultura.   Historia y medio ambiente. Segunda edición. Publicación en línea:   www.augustoangelmaya.com.   Primera edición  1995.   Editorial de la Universidad Nacional de Colombia  Revisión de Texto: Dafna Ángel  Diagramación: Marcela Franco   Diseño de carátula: Marcela Franco  Obra original de la Carátula: Espigas - Sara Ángel.  La Fragilidad Ambiental de la Cultura  Historia y medio ambiente  Segunda edición   ®  Todos los derechos reservados. Esta obra puede ser usada y distribuida   siempre y cuando se cite la fuente. No está permitida su venta ni su distribución   con ánimo de lucro. \nLa fragilidad ambiental   de la cultura  - Historia y medio ambiente -  Augusto Ángel Maya \nContenido  Introducción ............................................................................   6  El Lejano Paleolítico ...............................................................   10  Del Homo Sapiens al Neolítico ............................................   13  El Cercano Neolítico ..............................................................   18  Los Imperios Agrarios ...........................................................   28  Grecia y los Estados Comerciales .........................................   39  Roma y los Imperios Comerciales .......................................   45  El Medioevo y el Descanso del Saqueo ................................   50  La Época de los Renacimientos .............................................   63  Los Límites Ambientales del Crecimiento Europeo. ...........   77  La Expansión Inevitable de Europa .......................................   81  La Recuperación de Europa y el Surgimiento   del Capitalismo Industrial .....................................................   87  El Dominio Colonial ..............................................................   103 \nEl Medio Ambiente en el Régimen   Socialista de Producción .....................................................   112  Otras Experiencias Socialistas ............................................   121  Consecuencias Ambientales del   Desarrollo Moderno .............................................................   125  Conclusión. ...........................................................................   130  Orientación Bibliográfica ....................................................   135 \n- 6 -  La incorporación de la dimensión ambiental en los métodos históricos   de  análi sis es todavía incipiente. El estudio de la historia se deja inte -  rrogar  escasamente  por las coyunturas del presente y, en ocasiones,   se  sumerge  en  el  pasado   como    refugio  idílico  contra  las  condiciones    actuales de existencia. Puede decirse, en  ge neral, que las grandes co -  rrientes historiográficas han surgido como  movimientos  románticos   de  retorno  o  como  idealizaciones  míticas  del  pasado  ancestral,   para   proponerlo como paradigma a las condiciones del presente. Tito Livio   lo  expresaba  con esta sincera confesión que sirve de prólogo al libro   de Las  décadas:  “Por  mi  parte,  un  provecho  obtendré  de  este  trabajo:  el  de  abstraerme   del   espectáculo de los males que por tanto tiempo ha presenciado nuestro  tiem -  po,  ocupando por entero mi atención en el estudio de la historia  antigua”.  Por  su  parte,  la  historiografía  moderna  surge  durante  el  período  del    Romanticis mo,  impulsada  por  el  rechazo  al  racionalismo  político  de    la Revolución Francesa  y  la añoranza de una Edad Media  idealizada.  El  Idealismo  interpreta  la  historia  como  un  proceso  regido  por  una    voluntad  su perior y extrahistórica; el moralismo individualista, como   una  hazaña  de  la  voluntad  individual,  no  sometida  a  las  leyes  de  la    organización  social;  y  el  biologismo,  como  una  continuidad  sin  rup -  turas del proceso evolutivo. La manera como cada época mira el pa -  sado  depende  de  sus  condicionamientos  ideológicos.  La  Edad  Media    es vista por el período de la Ilustración como una época de retraso y   Introducción \n- 7 -  oscurantismo. En cambio el Romanticismo ve en ella el período ideal   de la cohesión humana. Para Fontenelle y los enciclopedistas, el mito   no  era  más  que  una  mentira  fabricada  conscientemente  por  la  casta    sacerdotal; para la antropología moderna es más bien un elemento co -  hesivo del sistema social. Los griegos prefirieron mirar el pasado cer -  cano para enaltecer las ventajas de la libertad griega. La historiografía   romana, por su parte, se remonta al pasado para olvidar la corrupción   del presente.  A cada una de las visiones ideológicas de la historia corresponde un   método  para construirla. Los griegos no temen inventar los discursos   de  sus  héroes.   Los    judíos  convierten  el  relato  histórico  en  una  épica    religiosa.  El  Renacimiento  se   com place  en  la  anécdota  que  resalta  a    los grandes personajes. Durante el siglo  pasado,  la historia pretendió   hacerse científica y elaboró con fría objetividad sus  materiales.  En el   presente siglo, la importancia de los hechos económicos ha penetrado   en  el  campo de la interpretación  histórica.  La demora del método histórico para dejarse interrogar por la  proble -  mática  ambiental es común a la mayor parte de las ciencias sociales   o  de  las   disciplinas    humanísticas.  Casi  todas  ellas  permanecen  an -  cladas  a  la  antigua   racionalidad    preambiental,  que  considera  la  so -  ciedad como una entelequia sin raíces en el  en torno. Esta demora se   explica por el reduccionismo ecologista que predomina  to davía en la   conciencia  ambiental.  La  perspectiva  que  se  abre  con  la  dimensión    ambiental  pretende  superar,  tanto  el  ultranaturalismo  filosófico  que    concibe al  hombre  como un conquistador advenedizo, como la inter -  pretación  biológica,  que  lo   percibe    como  una  especie  más  del  reino    animal.    La  perspectiva  ambiental  plantea  una  nueva  manera  de  in -  terpretar  el   pasado.    Una  modalidad  que  todavía  no  ha  llegado  sino    en forma muy restringida a las  es cuelas de historiadores. El hecho de   que la perspectiva ambiental reclame su  pro pia manera de percibir el   proceso histórico, no se debe al influjo de una moda  cultu ral pasajera,   I n t r oducc ión \n- 8 -  sino a la convicción de que las formas de organización social  están  ín -  timamente vinculadas a la transformación tecnológica de los ecosis -  temas.  Tam bién a la comprensión de que las racionalidades sociales,   económicas o  políticas,  influyen en el mejoramiento o deterioro de los   llamados «sistemas  naturales».  El  método  histórico  ha  progresado,  sin  duda,  en  sistemas  complejos    de    análi sis,  recogiendo  el  avance  de  las  ciencias  sociales  y  “natura -  les”. Ha  ido  interiorizando externalidades que en un principio no eran   percibidas  como   referen tes  o  causas  de  las  transformaciones  histó -  ricas.  La  historia  antigua  se  basó   funda mentalmente  en  el  recuento    del  acontecer  político,  manejado  por  los  caudillos  o   por    una  escasa    clase dirigente. La historia se escribía desde la cúspide y abarcaba  el   panorama que podía ser percibido desde allí. No había conciencia de   la  vinculación  entre  la  acumulación  de  excedentes  y  la  organización    política.  Durante  el  siglo  pasado,  a  medida  que  se  consolidan  los  procesos  de    organización  económica  y  los  movimientos  sociales,  impulsados  por    el desarrollo industrial, el método histórico empieza a incorporar las   perspectivas  del  capital  y  del  trabajo  como  protagonistas  de  la  acti -  vidad  humana.  Hasta  la  Revolución  Francesa,  tal  y  como  lo  expresa    el  panfleto  del  abate  Sieyes,  no  se  percibía  con  claridad  la  relación    entre formaciones políticas y organizaciones económicas y, por tanto,   la historia, centrada en lo político, pasaba por encima de los fenóme -  nos  económicos.  Sabellicus  pudo  escribir  la  historia  de  Venecia  sin    hacer mención del comercio de la, sal que fue la fuente de su poderío.   Por  otra  parte,  el  estudio  de  las  tecnologías  y  la  manera  como  se    involucran  en  los  procesos  de  cambio  histórico  se  inicia   sobre    todo   desde el momento en que los descubrimientos arqueológicos ponen   al  descu bierto esos testimonios mudos de la historia, que son las he -  rramientas  del   trabajo    material.  Era  indispensable  aceptarlos  junto    a los documentos escritos como  refe rentes importantes del proceso   histórico.  I n t r oducc ión \n- 9 -  Todas estas transformaciones del análisis histórico, inducidas por los   mismos  acontecimientos, pueden lograrse, sin embargo, al interior de   la vieja  racionalidad,  que desliga el acontecer social de sus ambientes   «naturales».  Dentro de esa perspectiva, la historia del hombre acontece en la pla -  taforma  de  un escenario sin raíces en el medio «natural». La sociedad   parece organizarse  por  mecanismos que nada tienen que ver con las   leyes que regulan el proceso  mismo  de la vida. Esta impresión es sólo   una trampa cultural. A medida que los sistemas sociales se desligan   de  los  ambientes  «naturales»,  los  procesos  ideológicos   se    alejan  del    contacto con los «paraísos perdidos» de la «naturaleza». Tanto la  filo -  so fía como el pensamiento religioso siguen ese camino de abstracción   que aísla  al  hombre de las fuerzas inmediatas que lo  generan.  Este  ensayo  tiene  por  objeto  intentar  un  método  ambiental  de  in -  terpretación    de    la  historia,  no  por  la  fruición  de  sumergirse  en  un    pasado idílico que oculte las  con tradicciones del presente, sino para   comprender mejor la crisis actual. El  problema  ambiental está, por lo   general, mal planteado en la arena del debate teórico y de  la  acción   práctica. No es un problema que atañe solamente a los ecosistemas   natura les o que se pueda solucionar simplemente con medidas tec -  nológicas. Requiere  la  formación de una nueva  sociedad.  La resiliencia cultural frente al medio es frágil. Puede desmoronarse,   porque  el  hombre no encuentra los medios tecnológicos o las formas   organizativas  y  los   ins trumentos  teóricos  para  superar  la  crisis.  Lo    que  diferencia  el  peligro  actual  de   los    anteriores  es  que  éste  se  ha    hecho planetario y se extiende a la totalidad del  siste ma vivo. Como   en  el  pasado,  la  exigencia  consiste  en  encontrar  los   instrumentos   culturales  adecuados  para  la  supervivencia  de  la  vida.  Ello  no  está    garantizado.    La    crisis  ambiental  consiste  en  que  no  necesariamente    está garantizado el éxito. La incertidumbre es la raíz de la creatividad   cultural.  I n t r oducc ión \n- 10 -  La historia, desde la perspectiva ambiental, empieza claramente con   la  aparición  del  Homo  sapiens,  hace  unos  cincuenta  mil  años.  Antes    de él, nos encontramos en un terreno ambiguo entre evolución bioló -  gica  e  histórica,  entre  nicho  ecosistémico  y  cultura.  El  largo  período    que se extiende desde el Australopithecus hasta el Neanderthal está   signado por algunos avances en el desarrollo de los instrumentos de   trabajo, y, posiblemente, de los signos de comunicación. Ciertamente   se encuentran ya objetos técnicos de adaptación al ambiente desde el   principio del Pleistoceno,antes de la primera edad glacial. Instrumen -  tos rudimentarios, como los  raspadores,  pero que nos indican que sin   ellos no era posible la supervivencia. Posiblemente  el  hombre de Pe -  kín, hace medio millón de años, había logrado el manejo artificial  del   fuego, utilizado, al parecer, como medio de defensa. No es mucho más   lo que  sabe mos de estas lejanas culturas que se extienden por un lar -  go período, quizás de  mi llones de años, y de las cuales sólo se poseen   unos cuantos esqueletos, además  de  unos pocos restos de instrumen -  tos  primitivos.  Prácticamente nada se sabe sobre la organización social de estas tri -  bus    de    cazadores.  Desde  el  comienzo  del  Pleistoceno  aprendieron  a    construir    instrumen tos  rudimentarios  y  utilizaban  las  pieles  para    protegerse de la intemperie. Ello  sig nifica que el ambiente natural ya   no les era propicio. No lo podían considerar  como  su propia casa. Em -  piezan  a  ser  arrojados  del  paraíso  ecosistémico.   Probablemen te,  los    primeros  homínidos  se  formaron  en  el  paso  de  la  recolección  en  el    espacio boscoso a la depredación en las sabanas abiertas. Ésta fue la   El lejano paleolítico \n- 11 -  conquista    prehistóri ca  de  un  nuevo  espacio.  La  agilidad  exigida  por    la  nueva  actividad  impulsó  la   adap tación  de  las  extremidades  infe -  riores  para  recorrer  largas  distancias.  Exigió   igual mente  una  mayor    cooperación  social  para  transportar  los  instrumentos  y  hacer   fren te   a  los  ataques,  ya  que  se  carecía  de  los  órganos  especializados  de  las    especies  depredadoras, como las fauces o las  garras.  La  primera  depredación  es,  sin  embargo,  una  forma  de  recolección    de    anima les  pequeños  o  de  los  cadáveres  abandonados  por  las  es -  pecies  depredadoras.   El    Australopithecus  todavía  no  es  un  cazador,    no ha desarrollado aún los  instrumentos  necesarios para lograrlo. La   diversificación  de  la  dieta  alimentaria,  que  empieza   a    combinar  los    vegetales con la recolección de animales, le da a la nueva  especie  una   mayor autonomía frente al medio. En esta forma el Australopithecus   pudo    ocu par  la  mayor  parte  de  las  regiones  tropicales  y  subtropica -  les,  íntimamente   vinculado    todavía  al  ecosistema,  compitiendo  con    instrumentos primitivos por los  recursos  comunes a las demás espe -  cies,  pero  diversificando  las  posibilidades  de   subsisten cia  y  creando    así una relativa e incipiente autonomía frente al  medio.  El paso de la depredación a la caza trajo consigo conquistas más  sig -  nificati vas.  La  caza  es  de  por  sí  una  empresa  coordinada,  cuando  se    realiza  con  instrumentos  y  no  con  órganos  especializados;  además,    exige  herramientas  más  precisas  y  complicadas  que  la  depredación.    Ello es tanto más cierto cuanto mayor sea la dimensión de la presa y   su peligrosidad. La caza en los homínidos no podía ser una hazaña in -  dividual sino una empresa colectiva que requería formas precisas de   organización y de comunicación entre los integrantes del grupo. Una   vez alcanzada la habilidad y elaborados los instrumentos, la caza per -  mitió a la nueva especie abandonar los plácidos espacios del trópico e   internarse en las estepas de la tierra templada.  E l l eja no pa l eol í t c o  \n- 12 -  La nueva especie persevera en el ejercicio de la caza durante cientos   de miles de años, concentrando cada vez más la actividad en especies   diferenciadas  de  acuerdo  con  el  espacio  geográfico  ocupado:  ciervos    en  China,  toros  y  caballos  en  España,  mamuts  en  Rusia  y  en  Europa    Central, renos en Francia. A medida que  se  especializa en la caza, el   hombre desarrolla sus habilidades técnicas y sociales,  lo  que da lugar   a  las  distintas  «culturas»  de  la  prehistoria  y,  extendiéndose  por  las    diferen tes zonas de vida, empieza a ejercer una presión insólita sobre   los  ecosistemas.   La    caza  se  va  haciendo  cada  vez  más  selectiva  y  el    número  de  víctimas   crece    significativamente.  Los  restos  de  los  cien    mil caballos encontrados en Solutré  (Dordogne)  o de los mil mamuts   de Predmost, representan ya una especie de  ecocidio.  Este  largo  período,  sin  embargo,  no  pasa  de  ser  una  etapa  de  la  evo -  lución    bio lógica,  traslapada  con  algunos  elementos  culturales  toda -  vía  primitivos.  La   evolución    hacia  el  desarrollo  de  los  instrumentos    aún no se había consolidado.  Los  musterienses, por ejemplo, que son   casi coetáneos del Homo sapiens, no  habían  desarrollado todavía las   características  biológicas  necesarias  para  el  manejo   ade cuado  de  la    plataforma    instrumental.    Arrastraban  los  pies,  mantenían  gacha  la    cabeza y, a juzgar por la disposición de sus músculos, tal vez habían   adquirido ya  un  lenguaje articulado, aunque  tartamudeante.  E l l eja no pa l eol í t c o  \n- 13 -  La evolución histórica sólo se consolida con la aparición del Homo  sa -  piens,  hace algo más de cincuenta mil años. Es un momento crucial,   muy poco  atendido  por la periodización histórica. Desde el momento   en  que  gracias  a  la  actividad  de   la    caza  se  consolidan  los  rasgos  or -  gánicos de la nueva especie, la evolución  cultural  se acelera. Junto a   los  ríos,  el  hombre  pronto  logra  encontrar  condiciones  para   ha cerse   sedentario  (culturas  aurignaciense  y  magdaleniense)  y  la  población    aumenta    considerablemente  en  relación  con  los  períodos  anteriores.    Los esqueletos  encon trados solamente en Francia durante este perío -  do exceden con mucho todos los  restos  del período anterior, a pesar de   que representan menos de una décima parte de  éste.  El hombre continúa la actividad de la caza que venía practicando des -  de    tiempo    inmemorial,  pero  el  progreso  anterior  no  es  comparable    con el adelanto técnico  lo grado por el Homo sapiens en unos cuantos   milenios; se prepara así el  dominio  sobre los ecosistemas por medio   de la agricultura y la domesticación de los  anima les. El Homo sapiens   aparece poco antes de que concluya la última asociación. Una trans -  formación  tan  radical  como  la  que  traen  las  nuevas  condiciones  cli -  máticas no va a afectar ya la subsistencia de la especie. Un clima más   benigno trae consigo un cambio radical de la vegetación en muchas de   las zonas de vida en las que se había asentado el hombre.  Desaparecen las grandes estepas y los bosques desalojan a los mamuts   y a los bisontes que habían hecho parte fundamental de la dieta de los   homínidos  durante  el  período  anterior.  Para  entonces,  el  hombre  ya    Del homo sapiens al neolítico \n- 14 -  había adquirido la suficiente autonomía tecnológica para no depender   de un ambiente determinado o de una presa regular. Manejaba el arco   y el lanzador de venablos y pronto podría reemplazar esos instrumen -  tos por una forma más compleja de regular el medio: la agricultura.  Pero el perfeccionamiento biológico no significó un recurso inmediato   contra    el    medio.  Es  muy  posible  que  el  Homo  sapiens  haya  iniciado    su gloriosa carrera en  el  humilde oficio de carroñero. Pronto logra su   condición de cazador y en el  período  anterior a la última glaciación,   lo encontramos en el ejercicio de la caza abatiendo  a  los grandes her -  víboros.  El  trabajo  no  le  resultó  tan  difícil  como  suele  plantearse   en   los textos de historia. De acuerdo con las tribus de cazadores que han   permanecido  como reliquias históricas de este lejano pasado y que se   han podido estudiar  re cientemente, como los bosquimanos, la faena   de la caza no era tan agotadora  como  podría  suponerse.  El hombre cazador no estaba al borde de la inanición, ni es ésta la ra -  zón por  la  cual concluyó inventando la agricultura. Era un hombre que   podía disfrutar de  una  excelente dieta proteínica, con un trabajo mó -  dico de caza de tres a cuatro  horas  diarias como promedio, y unas dos   horas más que podía emplear en las labores de cocina y manufactura.   Si se compara esta jornada de trabajo con las sesenta  horas  semana -  les, aproximadamente, que tiene que invertir un agricultor, se puede   deducir  que,  el paso a la agricultura no significó una ventaja desde la   perspectiva del tiempo  libre.  Una  nutrida  dieta  proteínica  mantuvo  al  hombre  paleolítico  dentro    de un  envidia ble estado de salud, si se juzga por su dentadura. Era un   hombre  erguido,  de   alta    estatura,  con  un  promedio  de  1.77  metros,    que  sólo  se  recuperará  en  los   países    industrializados  modernos.  La    densidad de población no podía ser muy alta, si  se  querían mantener   cuotas de caza suficientes para alimentar a la familia  ampliada  de la   D el homo s a p i ens a l n eol í t ic o \n- 15 -  tribu. No podía exceder, probablemente, una densidad de tres habitan -  tes  por  kilómetro cuadrado. Era por tanto, necesario, controlar la na -  talidad  con   medidas    drásticas,  como  el  infanticidio,  cuya  incidencia    podía acercarse al cincuenta  por  ciento de los  nacimientos.  El final de la última glaciación, hace trece mil años, trajo consigo una   súbita    transformación  de  las  zonas  de  vida.  Con  la  invasión  de  los    bosques sobre las  llanu ras desapareció la mayor parte de los grandes   mamíferos  como  el  mamut  lanudo,   el    rinoceronte  lanudo,  el  alce  gi -  gante; pero sobrevivieron el caballo, el ganado  vacuno,  los elefantes y   los rinocerontes. No sería extraño, sin embargo, que el hombre –  que   ya para ese entonces había perfeccionado su base instrumental – haya   influido igualmente en la desaparición de las grandes especies que le   servían de dieta, sobre todo si se tiene en cuenta que utilizaba el fuego   como instrumento de caza para acorralar a las grandes manadas.  De todos modos, parece existir una relación entre agotamiento de la   fauna y perfeccionamiento técnico. El rendimiento de cada uno de los   instrumentos de caza que va desarrollando el hombre paleolítico, em -  pieza  a  disminuir  a  medida  que  la  fauna  se  agota,  en  esta  forma  la    lanza tiene que ser reemplazada con los dardos y éstos con las flechas,   instrumentos cada vez más potentes, que inciden con mayor eficacia   en el agotamiento de los cotos de caza.  Es muy posible que el agotamiento de la fauna haya incidido también   en    las    formas  de  organización  social,  exigiendo  el  paso  de  la  patri -  localidad  a   la   matrilocalidad.  Esta  última  modalidad  permitía  a  los    hombres  lanzarse  a   extensas    jornadas  de  caza,  que  no  habrían  sido    posibles dentro de las formas anteriores  de  organización. Con ello, la   mujer pasó a ocupar un puesto importante en la  sociedad  de cazado -  res,  sin  monopolizar,  no  obstante,  el  poder  político,  que  permaneció    siem pre en manos del hombre. La confianza se desplazó hacia la her -  D el homo s a p i ens a l n eol í t ic o \n- 16 -  mana, desde  el  momento en que la esposa podía significar un enclave   interno  de  tribus  rivales  o   con    las  que  se  conservaba  un  equilibrio    precario.  La  matrilocalidad  se  convirtió  así,   como    dice  Harris,  en  un    método  práctico  de  superar  la  capacidad  patrilocal  de   grupos    aldea -  nos, para formar alianzas militares  multialdeanas.  Con  la  organización  matrilocal  aparece  necesariamente  la  guerra.    Cada una  de  las tribus tiene que extender sus cotas de caza e interfe -  rir, por lo tanto, con las ajenas. El comercio exterior se hace cada vez   más indispensable a medida que  se  agotan los recursos internos y ello   significa  al  mismo  tiempo  alianza  y  guerra.   Des de  muy  temprano  el    hombre acude a las armas, no sólo como instrumento de  cace ría, sino   como necesidad de subsistencia contra sus  congéneres.  El  perfeccionamiento  técnico  acrecienta  igualmente  el  poder  de  abs -  tracción.    El    hombre  se  convierte  cada  vez  más  en  un  constructor  de    símbolos. Empieza a  domi nar el espacio pictórico y no sólo el espacio   natural. Lo imagina y lo reproduce.  La  caza deja de ser sólo una acti -  vidad externa de subsistencia para convertirse  en  juego simbólico. El   espacio exterior se amplía en el espacio interior del  símbolo  imagina -  tivo y abstracto. Lo curioso es que el hombre no se inicia en el  espacio   pictórico con esbozos abstractos, sino con un realismo que denota un   conocimiento    y  un  manejo  preciso  del  espacio  exterior,  sobre  todo    del espacio de la caza.  La  abstracción en los trazos es una conquista   posterior, no una decadencia. Es ya  casi  un lenguaje escrito que repre -  senta un mayor nivel de  abstracción.  Mientras las hermosas pinturas de las cuevas magdalenienses aludían   a    una    actividad  inmediata  casi  identificable,  las  figuras  encontradas    en  la  España   orien tal,  más  tardías,  son  símbolos  que  relacionan  in -  numerables  actividades.  El   instru mento  simbólico  se  afianza  y  per -  fecciona al mismo tiempo que el instrumento físico. El desarrollo del   D el homo s a p i ens a l n eol í t ic o \n- 17 -  espacio  interno  va  parejo  con  el  dominio  del  espacio  exterior.  No  es    posible  disociar  la  ocupación  del  espacio,  de  las  formas  simbólicas    con las que el hombre lo representa Sin la capacidad para imaginarlo   y describirlo, quizás no le hubiese sido posible al hombre manejar el   espacio  externo  y  sin  la  penetración  en  éste  a  través  de  la  actividad    productiva, no hubiese sido posible la conquista del espacio simbólico.   El  instrumento  es  una  teoría  condensada  y  el  símbolo  es  un  camino    hacia la práctica instrumental.  En  este  breve  bosquejo  de  las  primeras  relaciones  del  hombre  con    el  medio,  se  ha  podido  apreciar  la  interrelación  existente  entre  los    diferentes  elementos  que  componen  la  plataforma  instrumental  de    adaptación  y  de  ésta  con  la  transformación  del  medio  ecosistémico.    La  cultura  como  totalidad  se  construye  a  través  del   esfuerzo    social   que  modifica  el  espacio  exterior  y  las  modificaciones  del  medio  van    alteran do  las  pautas  culturales.  El  hombre  construye  sus  primeras    asociaciones basado  en  el esfuerzo conjunto de la caza y a medida que   se agota la dieta cercana, se  ve  obligado a modificar sus propias for -  mas de organización. El hallazgo de los  instru mentos físicos no es el   resultado de un regalo externo, sino exigencia del  equilibrio  dinámico   con  el  medio  exterior.  Los  símbolos  van  plasmando  en  un  lenguaje    social  los resultados de la práctica, al mismo tiempo que sirven para   perfeccionarla.  D el homo s a p i ens a l n eol í t ic o \n- 18 -  Los  perfeccionamientos  técnicos  y  simbólicos  del  último  Paleolítico    habilitaron    al  hombre  para  emprender  una  de  las  revoluciones  más    profundas de la historia:  la  domesticación de los animales y la inven -  ción  de  la  agricultura.  Quizás  sólo  la  época  moderna  es  comparable    a  esos  pocos  miles  de  años  que  vieron  nacer  la   mayor    parte  de  las    realizaciones tecnológicas que acompañaron al hombre hasta la  mo -  derna revolución industrial. Durante el Neolítico, el hombre aprendió   a aprovechar  la  fuerza animal y la del viento, inventó el arado, el carro   de ruedas, el bote de vela,  la  explotación del cobre, de los cristales y la   cocción del barro. El hecho de que  el  cobre fundido se pudiese adaptar   a cualquier forma, debió incrementar la  capaci dad de  abstracción.  Casi  todos  los  animales  y  plantas  domesticados,  que  forman  toda -  vía  la  base   de    la  alimentación,  fueron  sometidos  durante  esa  época    al dominio del hombre.  Quizá  no es aventurado decir que el hombre   vive  todavía  de  los  hallazgos   sorprendentes    de  ese  alejado  período.    El  hombre  no  ha  cambiado  en  esencia  de  actividad,   aunque    la  haya    perfeccionado  en  forma  técnica.  La  sociedad  sigue  subsistiendo  con    base  en la actividad agropecuaria, o sea, con la modificación técnica   de  los   ecosistemas.    Exceptuando  quizá  la  gallina,  el      hombre  no  ha    domesticado ningún animal  desde  el Neolítico, y el trigo y la cebada,   que se cuentan entre los primeros vegetales  cul tivados, siguen siendo   esenciales en la dieta  alimentaria.  En esta forma, la agricultura y el pastoreo concluyen e inician un largo   proceso  cultural en búsqueda de la autonomía con relación al medio   El cercano noelítico \n- 19 -  ecosistémico.  En  este  período  se  consolida  la  autonomía  del  hombre    frente  a  las  leyes  internas  del  ecosistema.  El  proceso  logra  una  uti -  lización más eficiente de los recursos, en busca de la satisfacción de   las  necesidades  humanas.  El  hombre  empieza  a  construir  su  medio,    alejándose cada vez más de las leyes que regulan el equilibrio del eco -  sistema,  a  las  que  de  alguna  forma  estaba  todavía  vinculado  como    predador o cazador.  El  desarrollo  técnico  y  la  seguridad  del  alimento  favorecen  el  creci -  miento  poblacional.  Los  poblados  neolíticos  empiezan  a  dispersarse    en diferentes épocas por la mayor parte del planeta. Del año 8000 a.C.   al  4000  a.C.,  Mesopotamia  multiplica  por  cuarenta  su  población,  en    Egipto, se duplica o triplica, durante el milenio anterior a la constitu -  ción del imperio. En los valles centrales de México, durante un período   similar, se cuadruplica la densidad  poblacional.  La autonomía frente al medio le va a permitir al hombre, no sólo au -  mentar  su  población, sino organizar su propio espacio, separando los   diferentes  momentos  de su actividad. Con ello hace posible prolongar   el período sedentario, que se  ha bía iniciado ya con la pesca durante la   cultura magdaleniense. El Neolítico  sedenta rio supone, sin embargo,   un nuevo concepto del espacio. Es el espacio  construido  expresamen -  te como sitio de habitación y de trabajo subsidiario. Nace así la  unidad   urbana, por medio de la cual el hombre se segrega de las otras espe -  cies para  cons truir su propio espacio independiente. En principio eran   unidades pequeñas que  no  rebasaban media hectárea de terreno. La   población acumulada en el espacio  urba no debía corresponderse con   las posibilidades de cultivo dentro de un área  reduci da, ejercidas con   el medio primitivo de la  azada.  La  actividad  agraria,  a  medida  que  se  perfecciona,  va  permitiendo    acumula ción  de  excedentes  y  con  ello  un  crecimiento  poblacional    E l c erc a no n eol í t ic o \n- 20 -  acelerado.  La   consecuen cia  es  la  multiplicación  sorprendente  de  po -  blados pequeños durante el  Neolítico,  ubicados generalmente junto a   las fuentes de agua. La multiplicación de los  pobla dos se explica por   la dificultad para alimentar una población demasiado  numerosa  con   medios  primitivos  y  en  suelos  cuya  fertilidad  era  necesario  renovar.    La  mayor  parte de los jóvenes son obligados, en consecuencia, a aban -  donar el poblado  para  construirse su propio espacio vital; un compor -  tamiento  similar  al  que  obligó  a   los    machos  supernumerarios  de  los    antropoides a abandonar la selva para  conquistar  la sabana  abierta.  Así mismo, la acumulación de excedentes, hace posible una incipiente   división    del  trabajo,  requerida  también  por  los  hábitos  alimentarios.    La  alfarería,  que   apare ce  durante  este  período,  es  el  primer  descu -  brimiento  químico  del  hombre.   También    en  este  aspecto  el  hombre    neolítico  es  nuestro  vecino.  El  manejo  del  silicato   de    aluminio  debió    suponer  un  largo  proceso  de  ensayo  y  observación,  al  cual  se   teme   cubrir con el solemne apelativo de  “ciencia”.  Por otra parte, la invención de la agricultura y la domesticación de los   animales  hicieron posible la industria textil que se inicia con el lino   y la lana. Igualmente, la invención del hacha pulimentada dio la base   técnica para el oficio de la carpintería. Pero éstos no fueron los únicos   adelantos técnicos del neolítico. El hombre aprendió a utilizar la fuer -  za del toro y la del viento, inventó el arado y la rueda, fabricó el bote   de vela y aprendió a manejar el cobre. Esta amplia capacidad técnica   coloca al hombre en nuevos límites frente al espacio natural. La base   instrumental se sigue perfeccionando por el requerimiento de nuevas   necesidades, creadas por los descubrimientos anteriores. La primitiva   casa de junco es reemplazada por la casa de madera y antes del año   tres mil por la casa de ladrillo. Ésta, a su vez, abre las puertas a la ar -  quitectura monumental e introduce al hombre en el estudio de las ma -  temáticas aplicadas. Cerca a esta época, la metalurgia se perfecciona   con la aleación del cobre y el estaño. El cobre y el bronce, fácilmente   E l c erc a no n eol í t ic o \n- 21 -  manejables,  reemplazaron  la  piedra  para  la  elaboración  de  los  prin -  cipales instrumentos de trabajo,  y  su fabricación requería hornos de   alta temperatura. La explotación de los  metales  exige, en todo caso, la   especialización del  minero.  Esta multiplicación de funciones trae consigo, necesariamente, la di -  visión  so cial del trabajo. La alfarería, la artesanía textil y la minería,   son  funciones   sociales    que  se  van  especializando  a  través  de  su  co -  nocimiento técnico, transmitido de  ge neración en generación. En esta   forma, la organización social difícilmente se  puede  independizar del   dominio  técnico  del  medio  natural.  Los  conocimientos   acumulados   socialmente  también  requieren  de  un  órgano  social  para  su  conser -  vación.    Ligado    de  manera  íntima  a  los  preceptos  míticos,  el  conoci -  miento científico adquirido  so bre el medio es depositado socialmente   en la figura del shaman o hechicero,  que  empieza a ejercer un control   religioso  y  político.  Al  menos  mientras  los  sistemas   de    propiedad  se    conservaron en forma comunitaria, no se vio la necesidad de separar   la función civil del poder de su contexto  religioso.  Las características anotadas describen el fenómeno neolítico de ma -  nera    glo bal,  sin  tener  en  cuenta  las  especificidades  que  caracterizan    las  diferentes   regio nes.  Estas  especificidades,  sin  embargo,  son  de    gran  importancia  para  un   estudio    ambiental  de  la  historia.  Cuando    el hombre inicia la domesticación de las plantas  y  animales se ve, en   efecto,  condicionado  por  la  manera  como  evolucionan   los    ecosiste -  mas  en  las  distintas  regiones.  Ya  para  esa  época  la  especie  humana    se  ha  extendido prácticamente a lo largo de todo el planeta, pero en   las diferentes  regio nes encontrará una fauna y una flora diferenciadas   por razón de los  acontecimientos  geológicos anteriores. El continente   unificado  primitivo,  al  que  se  le  ha  dado  el   nom bre  de  Pangea,  ha -  bía iniciado la deriva continental doscientos millones de  años  antes,   y  la  evolución  de  los  mamíferos  que  se  inicia  con  posterioridad,  se    va a  desa rrollar en formas relativamente distintas en los continentes   E l c erc a no n eol í t ic o \n- 22 -  separados. Desde  esta  perspectiva, sólo tres divisiones continentales   son  importantes:  Australia,  el   conti nente  americano  y  la  gran  masa    de tierra que abarca Europa, Asia y África,  unidas  entre sí por tierras   transitables.  El Neolítico se desarrolló en forma independiente sólo en dos de esas   masas    continentales.  De  hecho,  Australia  no  llegó  nunca  al  estadio    agrícola,  mientras  que  en  los  continentes  euroasiático  y  americano,    al  hombre  se  le  plantearon  condiciones  de  vida  muy  diferentes,  que    irían a influir de manera definitiva en la evolución cultural. Es muy di -  fícil entender la historia moderna desde el momento en que la cultura   europea se expande y domina todo el planeta, sin tener en cuenta los   antecedentes culturales que se plasman durante el Neolítico.  El Neolítico euroasiático se inicia hacia el año 7000 a.C. en el Oriente   Medio, en el que se encontraban, en estado salvaje, diferentes clases   de cereales relacionados con el trigo, como el centeno, la cebada y la   avena, o las especies de frutas y legumbres que imperan todavía a lo   largo del Mediterráneo. Eran los frutos de un clima subtropical de ve -  ranos secos. En las zonas forestales o en las praderas abundaban por   igual en estado salvaje la mayor parte de los animales domesticados   con    posterioridad,  como  las  cabras,  las  ovejas,  los  bueyes,  los  caba -  llos, etc. Esta  ri queza excepcional posibilitó el asentamiento humano   incluso  antes  de  que  se   ini ciase  la  producción  agropecuaria.  Beldibi,    Mallaha o Jericó, existieron como  cen tros urbanos primitivos antes de   la aparición de la agricultura, sostenidos por  la  recolección de frutos   silvestres.  Al  parecer,  fue  desde  este  centro  excepcional  que  se  difundió  len -  tamente    la    revolución  neolítica.  Allí  se  consolidaron,  con  base  en  la    prosperidad agrícola,  las  nuevas tecnologías. En el sexto milenio eran   comunes la cerámica y la  metalurgia,  que aparecen poco después jun -  E l c erc a no n eol í t ic o \n- 23 -  to con el tejido, la industria del cuero, de la  madera  y la navegación.   El  movimiento  cultural  empieza  a  difundirse  hacia  el  Egeo,   penetra   por el Danubio y las llanuras de Ucrania, hasta llegar a las costas del   Atlántico.  Hacia el Este, traspasa la meseta iraní y penetra en el Indo   y en China.  El Neolítico euroasiático tuvo varias ventajas, comparado con los neo -  líticos  ame ricanos. La domesticación del trigo, de la cebada, del cen -  teno  o  de  la  lenteja   fue    relativamente  fácil  y  sostuvo  una  población    creciente  incluso  antes  de  iniciarse   la    civilización  agrícola.  También    la domesticación de los vacunos y equinos facilitó  el  desplazamiento   rápido y la utilización de la fuerza animal para las labores  agrícolas   o urbanas. Ello trajo consigo la investigación especializada en tecno -  logías  de   trac ción  y,  en  consecuencia,  el  desarrollo  de  la  mecánica    y  la  exigencia  de  la   utilización    de  los  metales.  La  base  técnica  de  la    civilización  europea,  que  dominará   después    el  mundo,  se  encuentra    escondida en el remoto  Neolítico.  La especie humana encontró condiciones muy diferentes en el conti -  nente  ame ricano. La última glaciación había barrido la presencia del   ganado  vacuno  y  la   fauna    que  encontró  el  hombre  no  se  adecuaba  a    las  condiciones  del  trabajo  agrícola   Las    tribus  mesoamericanas  tu -  vieron  que  contentarse  con  la  domesticación  del  perro   y    del  ganso,    que les servían de dieta proteínica, pero que no podían reemplazar a   los    grandes  herbívoros  euroasiáticos.  El  bisonte  americano  se  había    refugiado en  las  lejanas sabanas del norte. La dieta de perro es poco   rentable, por su condición  de carnívoro.  En relación con las especies vegetales tampoco fue muy afortunado el   hallazgo. La domesticación del maíz, que constituyó la base de las cul -  turas americanas, debió de ser una tarea difícil y lenta, si se juzga por   los ejemplares silvestres encontrados. Pudo haber empezado antes del   E l c erc a no n eol í t ic o \n- 24 -  quinto milenio, pero sólo aproximadamente dos mil años después se   había  logrado  su  hibridación  con  el  teosinte,  lo  que  dio  la  base  para    una sedentarización más estable. Junto al maíz, las principales espe -  cies domesticadas fueron la calabaza, el chile y el frijol.  Desde el centro de las llanuras mesoamericanas la revolución neolíti -  ca se  di fundió hacia el norte, hasta los enclaves actuales de Arizona,   Colorado  y  Nuevo  México,  en  un  período  bastante  tardío.  Es  posible    que  haya  irradiado  incluso  hasta  las  tribus  del  valle  del  Mississippi,    en donde se encuentran rastros de cultivos  de  ajonjolí y maíz hacia el   primer milenio antes de Cristo. Cuando De Soto penetra  en  1539, en -  cuentra en el valle del Mississippi una importante civilización agraria   con  características arquitectónicas similares a las de los  aztecas.  Las tribus que quedaban más al norte, en las grandes planicies que se   extien den  desde  Canadá  hasta  Texas,  habían  desarrollado  una  cul -  tura autónoma  basada  en la caza del bisonte americano. El Neolítico   penetró, al parecer, desde el sur,  a  través de los bosques orientales, y   la agricultura fue combinada con la caza  mayor .  Éstas  fueron  las  únicas  áreas  hasta  donde  llegó  la  tradición  agraria    del  Neolítico  en la parte norte del continente. Las demás tribus ubica -  das sobre la costa del  Pací fico o a lo largo de los ríos, en Tamaulipas,   Coahuila, California o en el área  subártica,  permanecían en las viejas   tradiciones de la caza y la pesca o la recolección de frutos  silvestres.  En  América  del  Sur  el  hombre  penetró  aproximadamente  hace  unos    quince  mil  años; de todos modos, antes de que concluyese la última   edad  glacial.  Allí   pudo    enfrentarse  a  la  fauna,  como  el  mylodón,  el    caballo indígena y otros grandes  mamí feros que desaparecieron con   el paso de la última glaciación. Cerca de  cinco  milenios duró su reco -  rrido hasta las pampas del sur. Se desplazó a lo largo  del  cordón andi -  E l c erc a no n eol í t ic o \n- 25 -  no, a través de los valles y muy posiblemente a lo largo de las  costas,   antes de penetrar en el corazón de la selva  húmeda.  Es muy posible que el Neolítico se haya difundido también desde  Cen -  troamérica,  hacia finales del tercer milenio, cuando se puede fechar   la primera civilización  agraria  del Istmo de Panamá. Sin embargo, no   todos los elementos de la civilización  agra ria provienen del norte. Las   tribus sudamericanas lograron someter algunas  plantas  nuevas corno   la habichuela y, sobre todo, los tubérculos, que fueron quizá el  aporte   de las tribus de la selva. El algodón, cuyo origen suscita todavía fuer -  tes    polémicas,    aparece,  tal  vez,  antes  de  que  se  difundiera  la  agri -  cultura  del  maíz.  Al  sur   t ambién    encontraron  los  camélidos,  de  los    cuales por lo menos la llama fue domesticada  en  época temprana. La   civilización agraria no alcanzó a llegar hasta las pampas  del  cono sur   antes de que su expansión se viese cortada por la conquista europea.  Este  rápido  bosquejo  de  la  primera  gran  revolución  tecnológica  del    Homo sapiens es suficiente para los propósitos del presente trabajo. Lo   que importaba ver es de qué manera el hombre, concluida ya su evolu -  ción biológica, busca formas de subsistencia que van a significar una   radical transformación de las leyes ecosistémicas. Después de haber   presionado fuertemente las manadas de herbívoros con instrumentos   cada vez más perfeccionados, y después de haber tenido que ampliar   sus cotos de caza, transformando en ocasiones sus propias formas de   organización social, el hombre logra someter la totalidad del ecosiste -  ma a su servicio. Esto es, en esencia, lo que significa el Neolítico desde   el punto de vista ambiental.  La  transformación  del  ecosistema  va  a  significar,  ante  todo,  la   des -  articulación    de  las  cadenas  tróficas.  Al  seleccionar  las  especies  más    beneficiosas para su  pro pio sustento, el hombre entra a modificar las   leyes de asociación vegetal. Las  espe cies que se asociaban al trigo, a   la cebada o al maíz empiezan a considerarse  cor no competencia per -  E l c erc a no n eol í t ic o \n- 26 -  judicial. El hombre comienza a darles el nombre de maleza o  de  malas   hierbas, simplemente porque no entran en sus propósitos agrarios y,   desde    ese  momento,  va  a  iniciar  una  lucha  sin  cuartel  contra  ellas,    destruyendo  sus   nichos    ecológicos.  Por  otra  parte,  al  preferir  sólo    algunas  plantas,  el  hombre  fomenta   la    base  alimentaria  de  aquellas    especies que habían conformado su nicho para  ali mentarse de ellas.   Las leyes de regulación poblacional se desajustan y aparece  lo  que el   hombre  empieza  a  llamar  despectivamente  «plaga».  Ni  la  maleza  ni    la  plaga  son conceptos ecosistémicos. Representan los elementos so -  brantes dentro del  nuevo  orden  tecnológico.  Algo  similar  se  puede  decir  sobre  el  proceso  de  domesticación  de  la    fauna.    El    hombre  va  a  seleccionar  sobre  todo  los  grandes  herbívoros    que  se  ajustaban   per fectamente  a  sus  propósitos.  Éstos  convierten    los carbohidratos en proteínas  que  pueden utilizarse como fuerza de   tracción y no compiten con la dieta humana.  Eran  las condiciones per -  fectas. ¿Qué hacer, sin embargo, con las cadenas tróficas  que  se exten -  dían por encima de los herbívoros y que recibían su energía de ellos?   Los  grandes predadores empiezan a convertirse en bestias malas que   es  necesario   eli minar.  El  recuerdo  de  esa  lucha  se  conserva  todavía    en la imaginación mítica.  Los  grandes héroes que surgen en la imagi -  nación popular como Gilgamesh, Teseo  o  Sansón, son los símbolos de   esta guerra. El prestigio Social se obtiene en  lucha  con el león o el toro   salvaje, derrotándolo y vistiéndose con su  piel.  La guerra, empero, no ha concluido. El hombre debe reiniciarla a me -  dida    que    avanza  sobre  los  últimos  reductos  ecosistémicos.  La  apari -  ción de la  conciencia  ecológica y proteccionista ha permitido que en   vez  de  la  extinción  se  busquen   refu gios,  que  en  ocasiones  son  más    cárceles o manicomios para una fauna  acorralada  a la que el hombre   mismo  proporciona  la  alimentación  y  las  pautas  de   comporta mien -  to. El hombre logró que algunas pocas especies se reprodujeran en el   E l c erc a no n eol í t ic o \n- 27 -  cautive rio de la domesticación. No es el caso de la fauna silvestre, que   sigue reacia  a  someterse a la nueva estructura. Tal vez el hombre no   tenga otra salida que reinventar el Neolítico y concluir domesticando   las pocas especies que han logrado sobrevivir.  Esta lucha es, sin duda, una de las conclusiones impensadas del Neo -  lítico, que sólo se revela en el nivel simbólico, en tiempo de los gran -  des imperios agrarios, cuando acaba por consolidarse el orden urbano   frente al orden ecosistémico. Durante las primeras etapas de la agri -  cultura, al parecer, no se reflejó un rompimiento tan drástico. De he -  cho, el mundo simbólico de los primeros neolíticos gira alrededor de   la madre tierra, cuya fertilidad se identifica con la de la madre tribal.   El hombre no se siente en oposición, sino cobijado bajo el manto de la   fertilidad universal. Las mujeres habían adquirido ya una importancia   central en las comunidades matrilocales y, aunque quizá no ejercieran   el  mando,  tuvieron  importancia   definitiva    en  muchas  de  las  mani -  festaciones  artísticas.  Fueron  ellas  posiblemente  las  que   in ventaron   el arte textil y tuvieron gran influencia en el desarrollo de la cerámi -  ca,    cu yos  motivos  ornamentales,  abstractos  en  un  primer  momento,    reprodujeron las  lí neas de los tejidos. De ese antiguo pasado quedan   como memoria artística  innu merables estatuillas femeninas de gran   encanto, con los signos  sexuales  provocativamente  pronunciados.  De las leyendas míticas que acompañaron la labor del hombre neolí -  tico,  sólo  quedan los fragmentos que pueden extraerse de las mitolo -  gías patriarcales de  la  época inmediatamente posterior. Las diosas go -  bernaban en el cielo, de la  misma  manera que las madres orientaban   la tradición en la tierra. El dios solar de los  caza dores cede su puesto   al calendario y al culto lunar, identificado con las fases de  la  fertilidad   femenina. Estas formaciones míticas de las primeras sociedades agra -  rias  fueron  muy  pronto  suplantadas  por  el  dominio  del  varón,  tanto    en el terreno  eco nómico y político como en el simbólico, dominio que   se inició poco antes de la  apa rición de los grandes imperios  agrarios.  E l c erc a no n eol í t ic o \n- 28 -  Los  descubrimientos  técnicos  del  Neolítico  rompen  pronto  los  lími -  tes  de  las   pe queñas  aldeas  primitivas.  Casi  todos  ellos  requerían  de    un  comercio  de   materias    primas,  indispensable  para  el  metalurgo  y    el  alfarero,  el  constructor  o  el   carpintero.    Este  comercio  requería  en    alguna  forma  de  la  acumulación  de  capital,  lo  cual   sólo    podía  darse    con la apropiación de los excedentes de la producción agraria. En  esta   forma se empieza a romper la idílica igualdad del Neolítico  primitivo.  En  la  época  moderna,  los  antropólogos  encontraron  algunos  pueblos    primitivos  que venían evolucionando hacia la constitución de estados   centralizados.  Se   pue den  tomar  como  ejemplos  tres  tribus  en  dife -  rentes etapas de desarrollo agrario y  de  centralización del poder. Los   mumis  de  las  Islas  Salomón,  estudiados  por   Douglas    Oliver,  habían    llegado a un sistema de concentración de excedentes mediante  la  acu -  mulación en manos de un gran benefactor, quien los repartía de nuevo   a la  comu nidad en las grandes fiestas religiosas. Este sistema evitaba   los ciclos de escasez, pero suponía el surgimiento de un jefe que acu -  mulaba en sus manos diferentes poderes.  Los  trobriandreses,  estudiados  por  Malinovsky,  habían  llegado  un    poco  más  adelante  en  la  centralización  del  poder.  El  cargo  de  bene -  factor se había vuelto hereditario. El cultivo fundamental era el ñame,   muy difícil de almacenar durante mucho tiempo porque se pudre con   facilidad.  Quizá,  por  esta  razón,  no  se  desarrollaron  más  las  formas    Los Imperios Agrarios \n- 29 -  de centralización económica y política. Por su parte, los bunyoros de   Uganda, estudiados por John Beattie, no sólo habían convertido en he -  reditario el cargo de benefactor, sino que éste se había convertido en   el único dueño de la tierra, que era repartida entre los nobles.  En esta forma se puede observar, a manera de retazos de un film His -  tórico  t al  como lo hace Harris la manera como debieron consolidarse   los primeros  estados  agrarios. Sin embargo, no todos los pueblos neo -  líticos  siguieron  el  camino  de   la    centralización  estatal,  al  menos  en    forma independiente. Son pocos los  estados  agrarios consolidados en   la antigüedad con evoluciones autóctonas desde la  etapa  neolítica. Se   pueden contar con seguridad cuatro en el Neolítico euroasiático y tres   en  el americano.  Los estados agrarios, constituidos a partir del Neolítico euroasiático,   tienen    to dos  condiciones  ecológicas  bastante  similares.  Todos  ellos    dependieron de  neolíticos  asentados en valles fértiles, pero rodeados   por condiciones desérticas  adversas.  Los valles del Nilo, del Éufrates, del Indo y del río Amarillo tenían la   fecundidad  del suelo asegurada por las condiciones ambientales. Son   valles  encerrados  y  limitados  por  condiciones  adversas  para  la  vida.    Los pequeños poblados  neolíticos  tuvieron que convivir por fuerza y   pactar la convivencia. No había ya hacia  dónde  expulsar a la población   supernumeraria. Era indispensable lograr una nueva  forma  de organi -  zación del territorio y una nueva estructura social que se adecuase a   las  nuevas condiciones de trabajo. En medio de ellas se dio paso a las   primeras  for mas de organización social estratificada, que permitieron   una mayor eficacia en  la  reproducción agrícola, cimentada en grandes   obras de infraestructura, como  los  canales de irrigación o la deseca -  ción de grandes áreas pantanosas. Es ésta la  razón  por la cual algunos   autores han denominado «hidráulicas» a estas  civilizaciones.  L o s i m p er io s agr a r io s \n- 30 -  Las  modificaciones  introducidas  por  las  nuevas  sociedades  no  eran,    por  tanto,  de carácter técnico, sino de formas de organización social.   Los imperios  agrarios  no modificaron en lo sustancial los instrumen -  tos tecnológicos heredados  del  Neolítico. Son, en realidad, muy pocos   los nuevos aportes. En cambio se  modifican  de forma radical los ins -  trumentos sociales de cohesión, como formas de  adapta ción al medio.   La  competencia  por  el  territorio  fue  mucho  más  intensa  y  ello   trajo   consigo la guerra y la esclavitud. Con el esclavo aparece simultánea -  mente  el   rey ,    como  sustituto  del  antiguo  hechicero  jefe.  La  realeza    significa  la  organización   so cial  de  un  vasto  territorio  con  fronteras    y  necesidades  comunes,  y  con  una   compleja    organización  de  la  pro -  ducción  material  y  social.  Representa,  por  igual,  la  exigencia  de  un    comercio intenso que se extiende más allá de las fronteras para satis -  facer las necesidades acrecentadas de la producción suntuaria. Egipto   carecía de piedra y de madera; Sumer de piedra y de cobre. Los recur -  sos de las zonas de vida ocupadas ya no alcanzan a satisfacer las ne -  cesidades de un vasto territorio con fronteras y necesidades comunes,   con una compleja organización de la producción material y social.  La nueva ciudad significa la ruptura del esquema familiar de trabajo.   No es solo la ocupación de un mayor espacio, sino la organización de   las  relaciones  sociales  exigidas  por  las  nuevas  formas  de  producción    material. En el concepto de espacio material están implícitas las formas   de organización de la estructura social, no sólo al interior del espacio   urbano, sino en la diversificación creciente entre campo y ciudad.  El poblado neolítico estaba todavía muy adherido al ecosistema inme -  diato,  aun que éste hubiese sido modificado en forma parcial por la acti -  vidad agraria. La  nue va ciudad es un espacio cada vez más desligado de   la actividad inmediata del  cam po, aunque sólo subsiste por ella. Las re -  laciones entre espacio rural y urbano  se  tornan más complejas, pues la   ciudad sólo puede subsistir con base en la  acumula ción de excedentes   del  trabajo  agrícola.  La  ciudad  concentra,  transforma  y   comer cializa   L o s i m p er io s agr a r io s \n- 31 -  la producción agrícola. No son dos espacios aislados sino dos  subsistemas.   El campo empieza a producir para un espacio físico a veces distante y para   un  espacio social no dedicado de manera directa al cultivo y que en ocasio -  nes  desco noce su relación con el espacio agrario. Con ello se confirma la   separación de  fun ciones sociales y productivas entre campo y  ciudad.  La ciudad empieza a ser el espacio de la organización social que  planifi -  ca,  orienta y distribuye la producción. Para cumplir esta tarea necesita   construir  nuevos  instrumentos  de  comunicación.  El  lenguaje  escrito    aparece para satisfacer las  ne cesidades de las nuevas clases urbanas   que  acumulan  los  excedentes  agrarios   y    los  distribuyen.  Hace  falta    una nueva memoria social más abstracta y por lo  tanto    más perma -  nente, que conserve en el tiempo el recuerdo de los préstamos y de  los   impuestos  fiscales.  Las  primeras  tablillas  escritas  encontradas  en  el    Sumer  descri ben cuentas en las que los templos conservaban la me -  moria de los préstamos  he chos a los campesinos. En Egipto, los regis -  tros de las crecientes del Nilo  servían  como base para la planificación   de los  impuestos.  Con la invención de los niveles abstractos del lenguaje escrito, surge   también    la  posibilidad  de  un  cómputo  más  detallado  del  tiempo,  in -  dispensable para  organi zar en nivel ampliado la producción agrícola.   La planificación urbana requiere  igual mente del cálculo de superficies,   lo cual supone el perfeccionamiento de las  mate máticas. Como la es -  critura, las matemáticas son el privilegio de la burocracia  ofi cial, sean   mandarines o escribas. La astronomía, la escritura, la geometría y  las   matemáticas se convierten así en instrumentos de dominación social.   Sin    estos    instrumentos  simbólicos  habría  sido  muy  difícil  lograr  el    dominio  social,   requerido    por  las  nuevas  formas  de  producción.  Lo    que  posibilita  el  nuevo  orden  es  el   instru mento  simbólico,  maneja -  do esotéricamente por las nuevas clases a través de la  escritu ra. Las   tradiciones  artesanas  del  neolítico,  transmitidas  oralmente,  pierden    poder.  Las  habilidades  del  hombre  son  manejadas  por  instrumentos    más sofisticados de dominio.  L o s i m p er io s agr a r io s \n- 32 -  La organización centralizada de la nueva civilización urbana tiene que   basarse no sólo en la acumulación de los excedentes agrarios y en los   nuevos instrumentos de dominio social, sino también en la subor -  dinación  de  los  pueblos  vecinos.  La  conquista  de  los  territorios    aledaños se hace indispensable tanto para defender el territorio con -  tra los pastores nómadas invasores, como para asegurar el suministro   de las materias primas. El nuevo orden social no puede sostenerse sin   la  subordinación  de  las  tribus  que  controlaban  los  espacios  periféri -  cos, ricos en metales, como las montañas del Tauro o las planicies del   Elam, o en madera, como la región del, Líbano.  La nueva organización representa, por tanto, una incalculable presión   sobre    los    recursos  externos  a  la  misma  comunidad.  El  imperialismo    surge  como  una   exigen cia  que  conlleva  la  subordinación  cultural    como instrumento de dominio. El  imperio  faraónico o la civilización   babilónica no se pueden explicar sin las culturas  someti das del Elam,   del Tauro o de las montañas del  Sinaí.  El  esfuerzo  que  significó  implantar  el  nuevo  orden  le  proporcionó  al    hombre  una  visión caótica del medio natural, que se refleja sobre todo   en los mitos  cosmogónicos.  La naturaleza empieza a ser representada   como el caos que era necesario  organi zar: Marduk, el dios del orden,   triunfa  sobre  Tiamat,  que  representa  el  caos   primiti vo;  Gilgamesh    acaba civilizando a Endiku, el hombre salvaje, amigo y protector  de  la   naturaleza. Ambos cantan como proeza del nuevo orden el asesinato   de  Hurubaba,  el protector de los  bosques.  El  impacto  de  los  imperios  sobre  el  medio  natural  fue  mucho  mayor    que  el   de    las  primeras  culturas  agrarias.  El  control  sobre  el  medio    era  más  difícil  de   realizar    en  sociedades  centralizadas  que  domina -  ban extensas zonas. Las grandes  obras  hidráulicas desarrolladas por   las  primeras  culturas  sumerias  tuvieron  un  efecto   ne gativo  sobre  el    L o s i m p er io s agr a r io s \n- 33 -  medio y las innovaciones tecnológicas no surgieron con la  suficiente   oportunidad para evitar la caída del imperio de Ur. La civilización de   Ur, basada  en  el cultivo del trigo, no logró superar las consecuencias   de la salinización de los  sue los, y los imperios tuvieron que remontar -  se río arriba, en busca de terrenos para  el  cultivo, dejando río abajo los   impactos del  ecocidio.  La civilización urbana del valle del Indo no tuvo mejor suerte. Se había   basado  en el cultivo del trigo, el mijo y la cebada, y en la domestica -  ción  del  ganado   vacuno,    las  ovejas  y  las  cabras.  Es  muy  posible  que    el  abandono  de  Mohenjo,  Daro  y   Harappa,    hacia  el  año  2000  a.C.,  se    debiera, no tanto a la invasión de los arios, sino al  de sastre ecológico   que los hizo vulnerables. De hecho, la civilización aria, que se  ex tien -  de hasta el valle del Ganges, tiene que restringir la dieta proteínica de   carne    vacuna  a  los  momentos  solemnes  de  los  sacrificios  religiosos.    Después se  reserva  sólo para las clases nobles y los  brahmanes.  La revolución cultural que va a perfilar los matices del Oriente hasta el   día de hoy tiene que ver con esta situación estrictamente ambiental.   La  revolución  cultural,  que  se  inicia  hacia  mediados  del  primer  mi -  lenio antes de Cristo, lleva corno consigna el respeto general a todas   las formas de vida. El rechazo a los sacrificios y la divinización de los   vacunos sólo significaba que no se aceptaba el orden brahmánico de   privilegio en el consumo de carne. En algunas sectas se iba más allá,   hasta exigir la abolición de castas, del sacerdocio hereditario y la erec -  ción de la pobreza como condición de la espiritualidad.  ¿Cuáles  eran  las  condiciones  ambientales  que  habían  suscitado  esta    violenta    metamorfosis  de  la  cultura?  El  desarrollo  agrícola  y  el  au -  mento  consecuente  de  la  población  habían  acabado  con  los  bosques    de  las  vertientes  del  Himalaya.  Las  sequías,  naturales  en  los  climas    monzónicos,  se  hicieron  más  prolongadas.  Los   vacu nos  tenían  que    L o s i m p er io s agr a r io s \n- 34 -  ser  empleados  cada  vez  más  en  la  labor  agraria.  La  carne   alcanzaba   menos  para  satisfacer  las  necesidades  proteínicas  de  una  población    creciente.  El  valle del Ganges fue posiblemente el que vio crecer con   mayor rapidez la  población.  Se requería, por tanto, de un nuevo orden   cultural que permitiese armonizar las  con diciones de vida con el me -  dio externo. La revolución de los upanishads, cuyos  últi mos epígonos   fueron el budismo y el jainismo, se encargó de legar una tradición  de   respeto  por  todas  las  formas  vivas,  que  subsiste  hasta  el  presente,    mezclada con  las  antiguas tradiciones brahmánicas, consolidadas de   nuevo al final de la dinastía  Maurya.  En la franja de los países sometidos del medio Oriente, las condicio -  nes    fueron    diferentes.  Una  de  las  bases  de  la  dieta  proteínica  de  las    tribus semitas durante  el  primer Neolítico fue posiblemente el cerdo,   domesticado  al  mismo  tiempo  que   las    otras  especies.  El  cerdo  es  un    animal del bosque y los pantanos, que no regula con facilidad el calor.   A diferencia del ganado vacuno, el cerdo no metaboliza el tallo  ni  las   hojas, sino sólo los tubérculos, las raíces y los frutos, compitiendo en   esta  forma  con la dieta del hombre. Su alto poder de transformación   energética y la riqueza  de  su carne han permitido sin embargo que sea   la base proteínica de muchos  pueblos,  como el chino o el polinesio. Lo   fue  tal  vez  también  de  las  tribus  semíticas,   hasta    que  el  dominio  de    los  imperios  transformó  radicalmente  las  condiciones   ambienta les.   Fueron arrasados los bosques del Tauro, del Zagros, de Anatolia y del   Jordán.  Las nuevas condiciones exigieron una religión más drástica, que em -  pezó a  di ferenciar entre animales puros e impuros y que, por lo tanto,   seleccionó la  dieta  proteínica, de acuerdo con las exigencias ambien -  tales. El cerdo desapareció de  la  dieta en las tribus semíticas, y entre   los israelitas la carne de buey y de camero  se  distribuía en los rituales   del sacrificio. Como lo expresa Harris, surgen así, como  en  otras par -  L o s i m p er io s agr a r io s \n- 35 -  tes, las religiones sacrificiales de amor y de  misericordia.  De esta manera y por la misma época se consolidan las culturas tan -  to del  leja no como del medio Oriente y su formación no es ajena a la   manera como el  hombre  se relacionó con el medio natural. No fueron   éstos quizá los únicos influjos  que  cohesionaron las nuevas pautas de   comportamiento, pero son bien importantes  para  que la historiogra -  fía los considere al menos como horizontes de análisis.  Los neolíticos americanos llegaron a la consolidación de estados cen -  tralizados en condiciones muy diferentes a las que se han estudiado   hasta el momento. Como se vio antes, el proceso de sedentarización   agraria  fue  muy  difícil  en  América,  tanto  por  la  ausencia  de  fauna    mayor, como por las difíciles condiciones de domesticación de la flora.   Sin  embargo,  también  en  el  marco  de  estos  condicionamientos,  sur -  gieron  estados  prístinos,  al  parecer  sin  influjo  alguno  de  los  estados    euroasiáticos. No poseyeron una tecnología tan compleja como la que   se organizó en los neolíticos del medio Oriente y, a pesar de ello, es -  tablecieron formaciones sociales sólidas y expresiones artísticas que   nada tienen que envidiar a las de los valles del Nilo y del Sumer.  El Neolítico americano había nacido en las mesetas centrales del ac -  tual  México  y de allí se había extendido hacia las otras regiones. Los   pueblos neolíticos  empe zaron a colonizar las pendientes, y a medida   que  avanzaron  en  la  tala  de  los   bos ques,  se  fueron  apoderando  del    centro  de  los  valles,  que  por  no  tener  drenaje   hacia    afuera,  estaban    dominados  por  grandes  lagunas.  El  hombre  se  fue  acercando   poco   a  poco  a  los  centros  húmedos  y  allí  desarrolló  la  agricultura  de  chi -  nampas, que  re sultó de alta productividad. La construcción de canales   para extender la  producción  agraria exigió, como en el medio Oriente,   formas de organización cada vez  más  centralizadas. No obstante, no   era  fácil  crear  en  esas  condiciones  una   civilización    urbana  podero -  sa. De hecho, los dos modelos de civilización urbana anteriores a  los   aztecas, el de Tenochtitlán y el de Tula, habían fracasado por alguna   razón.  L o s i m p er io s agr a r io s \n- 36 -  A falta de ganado mayor, las tribus centroamericanas se habían con -  tentado    con    la  domesticación  del  perro  y  del  pavo,  que  difícilmente    podían sustentar la dieta de una población creciente. La solución cul -  tural introducida por los aztecas fue sin  duda  cruel para la sensibili -  dad contemporánea, pero no fue escogida entre muchas  alter nativas.   La  civilización  azteca  fue  la  única,  entre  los  grandes  estados,  que  se    con solidó sobre el sacrificio y la dieta de la carne humana. La antropo -  fagia había  sido  relativamente común en épocas anteriores y no se ha   estudiado su significado  des de el punto de vista  ambiental.  El sacrificio humano está atestiguado no sólo en los pueblos bárbaros,   cuyos  rituales escandalizaron la sensibilidad de un Tácito o un Plutar -  co, sino también  en tre los antecesores de los griegos y de los mismos   romanos. La diosa Kali se  ali mentaba en la India de sangre humana,   como muchas de sus compañeras en  otros  olimpos. En Mesopotamia   los  prisioneros  eran  sacrificados  en  los  templos.  Para  la   sen sibilidad   antigua, las costumbres aztecas no eran tan feroces como les parecie -  ron a  los  españoles. Sin embargo, todos los pueblos fueron cambiando   el sacrifico humano  por  sacrificios de animales y ninguno de los gran -  des estados se cimentó sobre el  sacrificio  y la dieta de carne humana.   El sacrificio de prisioneros se conservó como una  costum bre ritual y   esporádica, incluso en un pueblo tan civilizado como el  romano.  Es  posible  que  los  aztecas  no  hubieran  tenido  muchas  alternativas    para  satisfa cer con proteína animal a parte de su población. Sin em -  bargo, el número de prisioneros que era sacrificado de forma inevita -  ble no podía abastecer las exigencias proteínicas de todo el pueblo. La   población del valle de México podía acercarse a los dos millones y, a   pesar de que las guerras de conquista crecieron, el número anual de   prisioneros no pasaba de unos 15.000. La dieta, por lo visto, sólo alcan -  zaba para las clases nobles que recogían los cadáveres de los templos   sacrificiales  y  los  compartían  en  banquetes  privados.  El  número  de    los sacrificados debía ser, en algunas ocasiones, muy numeroso. En la   L o s i m p er io s agr a r io s \n- 37 -  inauguración de la pirámide de Tenochtitlán, poco antes del descubri -  miento de América, se pudieron contar cuatro filas de tres kilómetros,   cuyos integrantes fueron sacrificados durante cuatro días. Los dioses,   sin duda, no necesitaban tanta carne.  El canibalismo y el sacrificio humano en esa dimensión fueron  carac -  terísticos    exclusivamente  de  los  aztecas  y  no  cubrieron  a  los  otros    reinos del continente.  Los  mayas se tuvieron que enfrentar a otro pro -  blema ambiental diferente. Su  hábitat  primitivo estaba situado en la   selva del Petén. Allí se establecieron las  primeras  tribus, que iniciaron   la actividad agraria de tumba y quema, escogiendo los  pocos  sitios de   acceso a las corrientes de agua o con los pozos  superficiales.  El agua vino a ser el elemento limitante de la cultura maya, ubicada en   el  inte rior exuberante de la selva del Petén, pues ésta, a diferencia de   otras selvas  tropi cales, está sujeta a períodos estacionales de lluvia y   sequía y el agua rueda por  un,  suelo calizo que no permite la forma -  ción de ríos. Sólo el Usumacinta y el  Belice  logran arrastrar suficiente   corriente. Los mayas hicieron inmensos esfuerzos  por  aprovechar al   máximo el líquido, construyendo canales y emprendiendo  verdaderas   reforestaciones.  Al parecer, todo fue en vano y una de las razones de   su expulsión hacia las llanuras del Yucatán tuvo que ver, con seguri -  dad, con las limitaciones  ambientales.  El último de los estados americanos es el imperio Inca. El pueblo de los   incas,  al igual que los aztecas, no podía considerarse de ninguna ma -  nera la más  civilizada  de las tribus andinas. Al contrario, era un pue -  blo  de  guerreros,  situado  al  margen   de    la  civilización.  Ésta  se  había    desarrollado desde el Neolítico preferentemente en  los  valles fértiles   que descendían casi verticalmente hacía el Pacífico en los que  habían   florecido espléndidas  culturas.  L o s i m p er io s agr a r io s \n- 38 -  Los  incas  unificaron  un  extenso  imperio,  conservando  los  grandes    adelantos    agrarios  de  las  culturas  anteriores  y  construyendo  la  in -  fraestructura  para  una   exten sa  comunicación  entre  todas  ellas.  Los    pueblos  derrotados  no  eran   sacrificados    como  en  el  imperio  azteca,    sino adoctrinados para que sirviesen con fidelidad  al  nuevo soberano.   Los sacrificios ocasionales a Viracocha o a Inti tenían un  sentido  sólo   ceremonial. Desde el punto de vista ambiental, la cultura inca es  posi -  blemente  uno de los ejemplos más interesantes de aprovechamiento   racional de los  suelos,  en las difíciles tierras rodeadas de desiertos en   los Andes  centrales.  Estas fueron las experiencias culturales más desarrolladas que encon -  traron    los    españoles  a  su  llegada  al  continente.  Esplendor  de  civili -  zaciones  efímeras  que  fueron  cortadas  de  raíz  por  los  nuevos  amos    europeos.  Sin  duda  alguna  eran  formas  autóctonas  de  adaptación  al    medio, aunque ya venían encontrando dificultades ambientales para   la  construcción  de  formas  culturales  adecuadas.  Es  inútil  preguntar    qué  hubiera  sido  de  estas  culturas  si  hubiesen  podido  continuar  su    camino  sin  la  sumisión  súbita  al  imperio  español.  No  eran  paraísos    ambientales,  pero  eran  culturas  construidas  sobre  las  exigencias  del    medio  ambiente.  Cuando  Europa  entra  al  galope  de  sus  caballos  y  al    ruido de sus morteros, la cultura, como se verá más adelante, pierde   todo  contacto  con  el  medio  natural  y  se  sumerge  definitivamente  en    la dependencia.  L o s i m p er io s agr a r io s \n- 39 -  El imperio agrario significó, sin duda, una expansión territorial sobre   las    cultu ras  más  cercanas,  pero  más  que  todo,  una  mayor  densidad    poblacional y una  ma yor presión sobre los recursos, ejercida con base   en las nuevas formas  organizativas  sociales. Los imperios comercia -  les, que se extienden desde el imperio  macedónico  hasta la caída del   imperio romano, van a prolongar y a agravar esa situación.  Los  impe -  rios  agrarios  ejercen  el  comercio  como  una  actividad  suplementaria;    en  los  nuevos imperios, llega a ser el eje de la actividad  productiva.  El comercio ya había sido desarrollado por algunos pueblos como una   activi dad especializada. Fenicia había logrado extender sus tentáculos   comerciales    por    la  mayor  parte  del  Mediterráneo.  Debido  a  su  estra -  tégica posición geográfica,  los  fenicios se habían dedicado más que a   producir, a organizar el transporte de materias primas, tanto agrícolas   como mineras. Por su parte, el reino minóico debe  su  prestigio al co -  mercio del cobre. Los griegos, sin duda, heredaron esta  tradición,  pero   su importancia radicó más en sus extensas colonizaciones a lo largo   del  Medi terráneo y del Mar  Negro.  Las colonizaciones fenicia y griega son tal vez las primeras migracio -  nes  de  esta índole en la historia. Las migraciones neolíticas tenían otro   sentido. Se  trataba  de ocupar asentamientos agrarios, que permane -  cían relativamente  autosuficientes  y desligados de la región de origen.   Las migraciones griega y fenicia ocupan  espa cios lejanos y conservan   Grecia y los Estados Comerciales \n- 40 -  con  las  ciudades  de  origen  un  vínculo  permanente.   Pero    ninguno  de    los dos pueblos estableció un imperio que sometiese las colonias a  las   ciudades madres. Ni siquiera las ciudades griegas lograron coordinar   un    estado    nacional  por  encima  de  la  polis.  En  ello  radica,  al  mismo    tiempo,  su  grandeza  y   su    debilidad.  Las  luchas  intestinas  entre  las    ciudades  debilitaron  la  civilización   griega    y  abrieron  las  puertas  al    dominio  macedónico.  Las  condiciones  especiales  de  la  polis  griega  la  mantuvieron  en  una    cierta  ar monía teórica con el medio ambiente. En el agua, en el fuego,   en el aire, en la  com binación armónica de los elementos, está la base   tanto de la mitología, como de  la  filosofía desacralizada de los griegos.   Unas de las más antiguas prescripciones escritas de respeto al orden   de la naturaleza se encuentran en Homero y Hesíodo.  Estas circunstancias favorables no impidieron que la civilización grie -  ga  tuviera  un  efecto  negativo  sobre  los  sistemas  de  vida  que  ocupa -  ron. La revolución neolítica había penetrado desde el Oriente medio a   través de Anatolia. Desde el sexto milenio se empezó a cultivar trigo,   cebada y mijo y, en ciertas ocasiones, garbanzos, higos y peras. Desde   muy  temprano  rebaños  de  corderos,  cabras,  vacunos  y  cerdos  pasta -  ban por los campos roturados. Los bosques fueron asolados, como se   puede colegir por alusiones de Tucídides o de Platón, quien describe el   paisaje de su época como el esqueleto de un hombre enfermo del que   ha sido removida toda la tierra grasa y suave y en donde sólo queda   la armazón desnuda sobre la que se deslizan hasta el mar las lluvias   anuales de Zeus. Allí donde existían antes las fuentes,  sólo  quedaban   los templos edificados con la madera de los bosques  vecinos.  La  minería  se  extendió  a  la  mayor  parte  de  los  metales  y  otros  ele -  mentos.  Oro,  plata, cobre, mercurio, hierro, plomo, asbesto, asfalto y   mármol  fueron   explotados    desde  épocas  muy  antiguas.  Todavía  son    Gr ec i a y l o s esta d o s c om erc i a l es \n- 41 -  visibles  los  efectos  de  la  intensa   actividad    minera.  Más  importante,    sin embargo, fue el efecto del sobrepastoreo de los  reba ños de cabras,   ovejas y vacunos, así como el de algunas práctica
