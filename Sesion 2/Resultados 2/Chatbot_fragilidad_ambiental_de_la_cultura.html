oducción de telas en un   cincuenta por ciento. Las fortunas de los  gran des banqueros desmo -  ronan.  Durante  el  siglo  se  suceden  las  quiebras  de   los    Ricciardi,  los    Frescobaldi, los Scali, los Peruzzi, etc. La ciudad, por lo tanto,  es  des -  articulada, no sólo por la peste, sino sobre todo por la crisis. La ciudad,   L o s l í m i t es a m b i en ta l es del c r ec i m i en t o E u r op eo \n- 80 -  que  había sido en el siglo XII el símbolo de las libertades, lo es ahora   de la muerte.  Este  ejemplo tal vez sirve para expresar los límites del   desarrollo urbano, definidos  no  sólo por razones exclusivamente bio -  lógicas o sociológicas, sino por el grado  de  desarrollo tecnológico y por   los límites externos de los ecosistemas.  El  primer  síntoma  de  la  crisis  no  había  sido  la  Peste,  sino  la  guerra.    Sobre una sociedad empobrecida se abate durante más de un siglo la   guerra entre Francia e Inglaterra, que interesó a toda Europa. La Gue -  rra  de  los  Cien  Años  es  la  más  importante  pero  no  la  única,  cuando    no estalla la guerra regular, sobreviene asalto del bandolerismo nobi -  liario, que se vuelve endémico. Con la conquista exterior se pretende   rescatar  lo  que  se  va  perdiendo  con  las  crisis  internas.  Son  guerras    enfermizas Y sin consecuencias, porque ya no hay hacia dónde ir, al   menos con los medios técnicos disponibles.  L o s l í m i t es a m b i en ta l es del c r ec i m i en t o E u r op eo \n- 81 -  Esta larga crisis prueba quizá que la apertura de las barreras europeas   era    indispensable  para  la  consolidación  de  la  economía  monetaria  y    de la  acumulación  capitalista. La formación de la economía capitalis -  ta  encontraba  barreras   internas    que  eran  difíciles  de  superar  y,  una    vez agotadas las posibilidades internas,  sobre venía la crisis. Las solu -  ciones técnicas no bastaban, y sólo fueron eficaces tan  pronto  como se   ampliaron los horizontes, ya no de la demanda sino de la explotación.   La  consolidación del capitalismo necesitaba la aparición de un Tercer   Mundo.  Y el Tercer Mundo llegó ante todo con el descubrimiento o el someti -  miento  de  América y luego, con la conquista de la totalidad del plane -  ta y su sumisión a  las  formas de producción capitalista. La expansión   del mundo europeo es, sin duda,  el  resultado más importante de las   fuerzas que empiezan a impulsar el desarrollo, pero es al mismo tiem -  po el producto de sus limitaciones. Los primeros  descubrimientos  de   los portugueses se debieron en gran medida a la búsqueda de tierras   cerealeras    que  empezaban  a  escasear  en  Europa.  España  estaba  en -  cerrada en el dilema  plan teado entre la ovicultura y la producción de   cereales y venía optando por la  primera,  a tal punto que el comercio   del trigo fue una de las principales preocupaciones  de  los Reyes Cató -  licos. Buscando tierras llegaron los portugueses a las Islas  Canarias.  Otra de las preocupaciones fundamentales de los primeros navegan -  tes,  y   que    constituía  uno  de  los  límites  de  la  economía  europea,  era    La expansión inevitable de Europa \n- 82 -  los  metales.  Los   genoveses    descubrieron  Madeira  antes  que  los  por -  tugueses, buscando el oro del Sahara.  Vie ne después, a mediados del   siglo XV, la circunnavegación del continente  africano,  hasta concluir   a  finales  del  siglo  XV  y  principios  del  XVI  con  el  descubrimiento   de   América y el primer recorrido por la superficie esférica del  planeta.  Europa  encontraba  el  mundo  exterior  mucho  más  amplio  que  el  que    había  ima ginado, cuando se cerraban los límites de su propio desarro -  llo.  La   consolidación    del  capitalismo  difícilmente  se  puede  explicar    sin esta apertura de las puertas  euro peas. El encuentro con un nuevo   mundo no se hace como un diálogo apacible  entre  dos culturas, sino   como la subordinación impuesta por la fuerza de las armas y la coac -  ción  de  las  ideas.  No  era  la  primera  vez  que  el  hombre  descubría  el    continente  americano.  Hacía  aproximadamente  35.000  años,  los  pri -  meros pobladores habían penetrado por el estrecho de Bering y se ha -  bían  dispersado  lentamente  en  la  conquista  de  los  nuevos  espacios.    La   diferencia radica en que los primeros conquistadores encontraron   los  ecosistemas  vírgenes  y  crearon  culturas  como  formas  adaptati -  vas  al  espacio.  El  segundo  encuentro,  en  cambio,  no  viene  en  busca    de  formas  adaptativas  sino  de  expansión  colonizadora;  busca  los  in -  tereses  del  desarrollo  europeo,  no  la  organización  de  nuevas  formas    culturales. No había posibilidad de simbiosis. Las culturas indígenas,   que durante milenios venían encontrando formas de adaptación a los   sistemas  tropicales,  son  asimiladas  a  nuevas  formas  productivas  o    simplemente destruidas.   La conquista de América, mirada desde el punto de vista ambiental, ha   sido,  posiblemente, una de las más graves equivocaciones del hombre.   Se    interrumpió    uno  de  los  experimentos  más  avanzados  de  adapta -  ción cultural a los  ecosistemas  del trópico. Las tribus precolombinas   se habían adaptado lentamente a las  condi ciones ambientales, desde   las alturas andinas hasta la selva húmeda tropical.  Ha bían logrado do -  mesticar la papa, la yuca, el maíz, el aguacate, el piqui, la  mandioca,   L a e x pa nsión i n ev i ta b l e de E u r opa \n- 83 -  el algodón etc., alcanzaron mejoramientos genéticos que permitieron   alimentar    vas tas  poblaciones.  Las  expresiones  simbólicas  se  acopla -  ban con precisión a las  exi gencias de sus propias culturas. Todo ello   fue talado de forma brusca por una  civili zación más avanzada tecno -  lógicamente y las culturas indígenas fueron  desarticula das para que   sirvieran a las formas de saqueo de los recursos mineros o  agrícolas,   en beneficio del desarrollo europeo. El sometimiento de América inau -  guró la  conformación  de un Tercer Mundo, cuyo destino ha sido servir   de canal a los procesos de  acumulación.  Ello  no  significa  que  dentro  de  las  culturas  indígenas  precolombinas    se  viviera  en la tranquilidad paradisiaca o no se hubiese abandonado   el edén  ecosistémico.  Las tribus indígenas, en el momento del arribo   español,  se  escalonaban  a  lo   largo    de  un  extenso  gradiente  de  desa -  rrollo.  Existían  tribus  cazadoras  conquistando   nue vos  espacios.  Al -  gunas habían alcanzado los primeros estadios del desarrollo  agrí cola   y en las altas mesetas o en los valles interandinos se habían logrado   consolidar    estados  unificados,  con  todas  las  ventajas  y  desventajas    ambientales  y  sociales   De    todos  modos  eran  experimentos  inéditos,    a pesar de las extrañas semejanzas  con  los imperios agrarios del cer -  cano o del lejano Oriente. Incluso, desde el punto  de  vista cultural, se   habían tenido que adaptar a nuevas condiciones impuestas por  el  me -  dio y que resultaron fatales en el momento de la conquista  europea.  En  el  continente  americano,  como  se  explicó  antes,  las  especies  va -  cunas    ha bían  desaparecido  durante  de  la  última  glaciación.  Ello  sig -  nificó que los  nativos  tuvieron que contentarse con la domesticación   de animales de menor valía y de  difí cil manejo, ninguno de los cuales   pudo ser adaptado como fuerza de trabajo.  Los  aztecas, por ejemplo,   se  vieron  obligados  a  la  domesticación  del  perro  y  del   pavo.    La  die -  ta proteínica extraída de la carne de perro tiene muy pocas ventajas   desde    el    punto  de  vista  de  la  eficiencia  energética,  por  el  hecho  de    ser  una  especie   carnívora    y  de  pequeño  tamaño.  Por  otra  parte,  la    L a e x pa nsión i n ev i ta b l e de E u r opa \n- 84 -  ausencia de ganado vacuno influyó definitivamente sobre el desarro -  llo  tecnológico.  Las  tribus  americanas  no  desarrollaron  la  mecánica    de  tracción,  que  jugó  un  papel  tan  importante  en  el  desarrollo  de  la    tecnología y de la ciencia en Oriente y Europa. No es de extrañar, por   tanto, que los aztecas o los incas no hubiesen descubierto la rueda, a   no ser como simple pasatiempo. Los metales tuvieron un uso muy res -  tringido, como elementos ornamentales, mientras las culturas invaso -  ras se habían especializado en el trabajo del hierro para la fabricación   de instrumentos de trabajo o de guerra. Se puede decir que el triunfo   de los españoles y posteriormente., el de los portugueses se debió, en   amplia medida, mucho más amplia de lo que han reconocido hasta el   momento los historiadores, al caballo y al hierro, sin olvidar evidente -  mente la pólvora.  Si la conquista significó para Europa la puerta de salida a las dificul -  tades  que  obstruían su desarrollo, para América implicó la muerte de   sus formas  autóctonas  de cultura y la subordinación a las exigencias   de  la  acumulación  económica  del   ca pitalismo  europeo.  Este  violento    proceso de subordinación es lo que ha dado  en  llamarse el período de   la  Colonia.  Desde  el  punto  de  vista  ambiental,  la   Colonia    significó  el    desplazamiento del esfuerzo humano en la búsqueda de las formas  de   adaptación  a  los  ecosistemas,  hacia  la  articulación  de  un  sistema  de    saqueo de  los  recursos  naturales.  En  este  caso,  se  le  da  el  nombre  de  «saqueo»  a  la  explotación  y  tras -  lado  masi vos de los recursos mineros hacia Europa, sin ventajas para   el continente  saquea do. Los españoles radicados en América tuvieron   como misión el traspaso de  los  recursos mineros, pero tampoco ellos   obtenían mayores beneficios, a no ser  los  que lograban con la sustrac -  ción fraudulenta. Para poder subsistir, su modo de vida tuvo que ba -  sarse en la explotación de la mano de obra indígena en las  encomien -  das. La acumulación interna se basaba, por tanto, en el trabajo de las   L a e x pa nsión i n ev i ta b l e de E u r opa \n- 85 -  encomien das, mientras la acumulación europea se baso en el saqueo   de los recursos  mine ros. Ambas funciones estaban articuladas y alre -  dedor de ellas fueron  organizadas  las comunidades  indígenas.  Lo que estos procesos de articulación a un sistema externo significa -  ron    desde    el  punto  de  vista  ambiental,  no  ha  sido  investigado  toda -  vía con profundidad.  Las  corrientes historiográficas se han reducido a   exaltar o lamentar la conquista  euro pea, por motivos principalmente   ideológicos, sobre todo de tipo religioso o  moral.  Este análisis no sig -  nifica  negar  el  valor  de  las  hazañas  o  la  importancia  del   fenóme no   para el desarrollo moderno. Tampoco se trata de plantear el problema   desde  una  ética de los futurizos. La historia está allí en forma irrever -  sible y ningún  esfuerzo  teórico puede resucitar las viejas tradiciones   indígenas. Pero también están  allí  muchas de las consecuencias am -  bientales del período colonial. La acumulación  de  mano de obra en las   regiones  mineras  exigió  la  tala  de  vastas  regiones.  Por   otro    lado,  el    abastecimiento interno con productos importados y en ocasiones no   bien  adaptados, como el trigo, acabó con regiones frágiles. Una tras -  posición  mecánica  de las especies y de las formas de cultivo deterioró   sistemas  de  vida  que  se   habían    conservado  productivos  durante  la    época precolombina.  Pero la consecuencia ambiental más destructiva fue la desintegración   de las formas culturales como estructuras adaptativas al medio. Ello   implica la extinción física de una inmensa población que fue diezma -  da  no  sólo  por  la  guerra,  sino  también  por  la  enfermedad  o  las  con -  diciones agotadoras de trabajo. Las nuevas ciudades se construyeron   sobre las ruinas de las antiguas civilizaciones que vieron desaparecer   sus poblaciones, sus templos o sus palacios. Una hecatombe igual su -  pera las consecuencias de cualquier guerra o calamidad anterior. Las   inmigraciones europeas no significaron sino un pequeño aporte para   la  población  que  no  puede  compararse  ni  siquiera  en  cifras  cuanti -  tativas  con  el  genocidio  indígena.  Durante  el  mismo  período  no  se    L a e x pa nsión i n ev i ta b l e de E u r opa \n- 86 -  trasladaron más allá de 100.000 españoles hacia las  nuevas  colonias.   Ello significaba sin duda un alivio para una Europa que no acababa  de   reponerse todavía completamente de su  crisis.  El problema, sin embargo, no puede medirse en cifras. Lo que hay de -  trás de  los  números es la desintegración de culturas milenarias y éste   es quizás el más  grave  efecto ambiental ocasionado por la conquista   europea.  La  muerte  física  ya  no   signi ficaba  sino  la  liberación  de  un    cruel  destino.  La  poesía  indígena,  tanto  náhualt,   como    inca  o  maya,    está saturada por el deseo de la muerte, como consecuencia de  la  des -  aparición de las culturas. Como lo expresa hermosamente el Chilam   Balam:  Ellos  [los  españoles]  vinieron  a  marchitar  las  flores.  Para  que  su  flor    viviese,  destruyeron nuestra  flor .  Con  la  destrucción  de  las  culturas  indígenas  desaparecieron  los  ves -  tigios    de    formas  adaptativas  a  los  ecosistemas  tropicales.  Los  euro -  peos no tuvieron  ningún  interés en rescatar las tradiciones indígenas,   consideradas  como  fruto  diabólico,   ni    en  estudiar  las  circunstancias        geográficas que rodeaban ahora su vida.  Lo  importante era que la nue -  va tierra produjera los frutos a los que ellos estaban  acos tumbrados. El   trópico fue abandonado desde entonces a su suerte y no ha  logrado  to -  davía ser asimilado como escenario cultural. La independencia de los   países  lati noamericanos no varió en absoluto su visión del desarrollo,   sino  que  los  vinculó   más    fuertemente  a  la  dependencia  externa.  Las    últimas culturas indígenas mueren en  el  presente, llevándose consigo   los conocimientos del medio natural acumulados  du rante  milenios.  L a e x pa nsión i n ev i ta b l e de E u r opa \n- 87 -  El encuentro con el nuevo mundo significó, no obstante, una revitali -  zación  de  los procesos de desarrollo que se habían visto interrumpi -  dos por límites  internos.  Los descubrimientos significaron al mismo   tiempo el resultado de las limitaciones  y  de los avances obtenidos. A   pesar  de  la  técnica  desarrollada,  la  travesía  por  mar   o    tierra  no  era    empresa  fácil.  De  las  múltiples  naves  portuguesas  que  zarparon  en    un  siglo hacia el Oriente, sólo regresó un poco más de la mitad. Lo que   hemos  dicho  antes no quiere disminuir el mérito de las empresas de   conquista europea, sino colocar sus límites ambientales. Estas empre -  sas no hubieran sido posibles sin un gran adelanto técnico y científico   y  sin  la  acumulación  de  capital  alcanzada  en  el  primer  período  del    mercantilismo y del desarrollo industrial.  Paralelamente  al  flujo  de  mineral  precioso  extraído  del  nuevo  mun -  do  y  a  la  reactivación  del  comercio  generada  por  las  empresas  tran -  soceánicas,  se  reinicia  la  revitalización  de  la  economía  europea.  Se    ha utilizado el terminó “paralelamente” para sortear las discusiones   sobre  el  papel  que  jugó  el  descubrimiento  de  nuevos  mundos  en  la    recuperación de la economía europea. Lo que sí aparece con claridad   es  que  el  circulante,  que  empezaba  a  escasear  y  que  era  uno  de  los    límites provocadores de la crisis, empieza a inundar el suelo europeo   y se vuelca sobre  el  campo, la industria y la política. Ninguno de los   progresos obtenidos en  cualquiera  de estos campos durante los siglos   XVI y XVII se explica sin el aumento del flujo  monetario.  La recuperación de Europa y el  surgimiento del capitalismo industrial \n- 88 -  Estos dos siglos de progreso económico, inmediatamente posteriores   a la  con quista de nuevos mundos, se extienden a lo largo de una épo -  ca  de  crisis,  en   donde    se  agudizan  los  contrastes  y  la  esquizofrenia    cultural. Es la época de las guerras  de  religión, del refugio dogmático   de la Contrarreforma, de la prisión de Galileo y  del  martirio de Gior -  dano Bruno, pero es también la época en la que se consolida  el  poder   político  de  la  burguesía  en  los  Estados  Generales  de  los  Países  Bajos    y en  la  gloriosa Revolución de 1668. Durante este período se constru -  yen  nuevos   instrumen tos  teóricos  como  la  matemática  simbólica  o    las funciones logarítmicas. La  lectura  del mundo que lograron Galileo,   Kepler y Newton no hubiese sido posible sin estos nuevos códigos de   comunicación. Tampoco    hubiera sido posible sin la  tecnolo gía de la   óptica, que prolongó el ojo humano hacia lo infinitamente grande y lo   infini tamente  pequeño.  El dominio técnico del mundo, considerado como finalidad prioritaria   de  la   cien cia,  ya  está  expresado  con  claridad  en  el  Novum  Organum    de Bacon. Sin la lucha  de  los primeros filósofos del mundo moderno,   como  Bacon,  Descartes  o  Spinoza,   con tra los  escombros  acumulados    de la tradición ideológica, que Bacon llamó «los  ído los del conocimien -  to», es difícil comprender el adelanto técnico del  capitalismo.  Despejado el camino ideológico, los resultados técnicos no se hicieron   espe rar.  Al  tiempo  que  se  logra  superar  el  esencialismo  aristotélico,    triunfa  el   atomismo    griego  redescubierto  por  Gassendi,  Torricelli  y    Von Guericke, quienes descubren  la  fuerza acumulada por la presión   del aire, en el momento en que se requerían  nuevas  fuentes energéti -  cas para la extracción del agua en la industria  minera.  Antes  de  que  el  desarrollo  tecnológico  abra  las  puertas  del  capitalis -  mo  indus trial, el avance de la producción se deja sentir de nuevo en   el sector agrario.  Los  signos de restablecimiento empiezan a notarse   durante  el  siglo  XVI,  cuando  se   re cuperan  las  tierras  abandonadas.    L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 89 -  Esta  recuperación  tiene  un  signo  distintivo,  que  la  distingue  de  las    ocupaciones  anteriores.  Ya  no  se  trata  de  una  conquista  lenta  obte -  nida  sobre  el  bosque,  sino  de  la  recuperación  de  vastas  extensiones    que requieren de grandes capitales. En este momento se consolida la   economía del agro. Los comerciantes y banqueros aceleran la compra   de tierras, ya no como seguro contra los riesgos del dinero, sino como   espacio  de  inversión  productiva.  En  algunos  países  este  movimiento    va a ser facilitado por la reforma protestante, que subasta o reparte los   bienes eclesiásticos. La importancia de los movimientos de capital en   la agricultura a partir del siglo XVI no significa, sin embargo, el triunfo   definitivo del capitalismo agrario. De hecho, durante el mismo perío -  do se asiste en algunas regiones a una refeudalización de la economía,   impulsada  en  ocasiones  por  los  antiguos  campesinos  enriquecidos  y    atrapados ahora en las redes de la nobleza.   De todos modos, el trabajo agrario se tecnifica, como se puede cons -  tatar  por   la    aparición  de  numerosos  tratados  sobre  manejo  agrícola.    Se  perfecciona  el   manejo,    pero  se  mantienen  inalterados  los  hallaz -  gos  tecnológicos  de  los  siglos  XII  y  XIII,   que    sólo  serán  superados  a    las  puertas  del  capitalismo  industrial  a  mediados  del   siglo    XVIII.  Lo    mismo puede decirse de la industria textil, que se recupera  acelera -  damen te durante el siglo XVI pero sin modificaciones técnicas de im -  portancia,    explotando    simplemente  los  hallazgos  anteriores  e  invir -  tiendo  capital  en  nuevas   ampliaciones.    Venecia  pasa  de  la  actividad    comercial a la industrial y Alemania empieza  a  consolidar su indus -  tria, deteniendo así la emigración de la mano de obra. Las  nece sidades   de la guerra y de la producción agrícola imponen un ritmo inusitado   en  la  construcción de los altos hornos que sólo en Inglaterra pasan en   siglo y medio  de  tres a ciento cincuenta, lo que significa la construc -  ción, de un alto horno por  año.  La aparición del capitalismo industrial está precedida, por tanto, por   el  creci miento del sector agrícola, como había sucedido en épocas an -  L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 90 -  teriores.  El   nacimiento    del  capitalismo  industrial  no  tiene  la  condi -  ción de milagro como parece  sospecharse  en la literatura tradicional.   Venía exigido por el desarrollo de la actividad minera,  y  sólo era po -  sible gracias a la acumulación lograda en la actividad agraria y en  la   explotación de los nuevos mundos. Debido a los nuevos instrumentos   políticos  e  ideológicos creados por la burguesía, al desarrollo agrario   impulsado  durante   los    siglos  anteriores  y  a  la  acumulación  que  pro -  piciaba  la  explotación  de  los   nuevos    mundos,  se  abre  campo  para  el    desarrollo  acelerado  de  los  siglos  XVIII  y  XIX.   Se    puede  afirmar  con    Bernal que cuanto más estrechamente se examinan las  relacio nes en -  tre la ciencia, la técnica, la economía y la política, más claramente se   muestra    que  forman  un  proceso  único  de  transformación  de  la   cul -  tura.  El  surgimiento  del  capitalismo  industrial  está  muy  vinculado  a  las    consecuen cias  ambientales  del  desarrollo  de  los  siglos  inmediata -  mente  anteriores.   Éstas    empiezan  a  notarse  sobre  todo  en  el  sector    minero. El agotamiento de los  bosques  obliga a desarrollar la tecno -  logía del carbón de piedra, que ya se conocía de  siglos  atrás, pero que   ahora  encuentra  su  justificación  industrial.  La  minas  cada  vez   más   profundas tendían a anegarse continuamente, por aguas lluvias o por   los  niveles  friáticos. Esta circunstancia aceleró el desarrollo de bom -  bas de succión,  movidas  en una primera instancia por fuerza animal.   Sin embargo, las bombas hidráulicas, movidas por caballos o por no -  rias, ocupaban demasiado espacio y la escasez de tierras encarecía los   precios  de  la  energía  animal.  Era  indispensable  encontrar  sustitutos    tecnológicos.  La ciencia venía dedicándose desde la fundación de la Royal Society a   la solución de problemas relacionados con nuevas fuentes de energía,   sin las cuales es imposible comprender el desarrollo del mundo mo -  derno. Sin la máquina de vapor es muy probable que la tecnología eu -  ropea no hubiera superado la antigua tecnología china, heredada por   L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 91 -  el Renacimiento. La máquina de vapor es un claro desarrollo técnico,   conducido  por  el  pensamiento  científico.  Desde  Galileo  y  Newton,  la    ciencia va tomando la delantera sobre la aplicación tecnológica y em -  pieza a  resolver  con modelos teóricos los problemas inmediatos de la   práctica.  Si se podía reemplazar la fuerza animal con la incorporación de una   nueva  fuen te energética, era posible igualmente reemplazar la fuerza   humana en la  industria  textil. El torno de hilar (1764), el telar hidráuli -  co y la tejedora de Crompton  (1779)  empiezan a automatizar el trabajo,   pero  al  mismo  tiempo  permiten  el  surgimiento   de    la  concentración    industrial, característica de la manufactura  moderna.  Este  gigantesco  desarrollo  está  sujeto,  sin  embargo,  a  crisis  periódi -  cas  sobre  cuyas causas los analistas no han podido ponerse de acuer -  do.  Para  algunos  el   au mento  de  circulante  trae  como  consecuencia    la  devaluación  y  consecuentemente   el    alza  de  precios.  Para  otros,  el    aumento  de  la  producción  trae  consigo  el  aumento   de    la  circulación    monetaria y el incremento de precios, desencadenando la crisis.  No es fácil todavía plantearse las crisis periódicas del capitalismo des -  de  el  punto de vista ambiental. La crisis aparece sólo al final, como un   precipicio que  se  había venido desmoronando, pero que, al parecer, no   había  influido  de  manera   clara    en  las  crisis  económicas  parciales.  La    estructura social, lo mismo que la  estructura  ecosistémica, a medida   que se complejiza, establece equilibrios internos que  le  permiten auto -  rregularse con una mayor independencia del medio externo. En el  caso   de la estructura social, esta independencia puede ocultar un progresivo   deterioro  del medio externo que, sin influir quizás directamente en las   crisis anteriores,  apa rece al final como una grave  amenaza.  Los recesos anteriores, que significaron muchas veces el desmorona -  miento  de  viejas civilizaciones, tienen raíces de tipo ambiental fácil -  L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 92 -  mente  identificables,   liga das  de  manera  íntima  con  las  razones  tec -  nológicas  y  sociales  de  la  crisis.  En   el    caso  del  desarrollo  capitalista,    las  crisis  se  presentan  impulsadas  por   razones    socioeconómicas  fá -  cilmente detectables. La capacidad de metamorfosis  tecnoló gica per -  mitió  reanudar  rápidamente  el  proceso,  sin  advertir  que  los  límites    externos  del desarrollo podían estar llegando a su  límite.  Se  pueden  distinguir  cuatro  grandes  períodos  con  sus  momentos  de    flujo  y   re flujo.  Son  fácilmente  identificables  porque  están  marcados    por la fluctuación de los precios. Cada uno de estos períodos está mon -  tado sobre el auge y la decadencia de un proceso tecnológico que solu -  ciona o supera los límites de la etapa inmediatamente anterior.  El  primer  ascenso  está  basado  en  la  difusión  de  la  máquina  de  va -  por y, en consecuencia, en la explotación de dos elementos básicos: el   hierro y el carbón. Es la primera etapa de un capitalismo sucio y muy   contaminante, cuya ola de ascenso se puede situar desde 1780 hasta   1810. La siderúrgica en Inglaterra se multiplica por diez durante este   período,  llega  a  una  producción  siderúrgica  de  700  000  toneladas  en    1830.  Los  precios  aumentan  aproximadamente  en  un  50  por  ciento.    Desde ese momento empiezan a descender hasta mediados del siglo.   Durante esta  prime ra época la población aumenta vertiginosamente,   sobre todo en Inglaterra, que  lidera  el proceso y que duplica su pobla -  ción  hasta  colocarla  en  14  millones  de   habitantes.    Algunas  ciudades    multiplican por diez su población, como Manchester, que en  1830  al -  canza los 180.000 habitantes. El símbolo del ascenso es el optimismo   racionalis ta y revolucionario que protagonizó la Revolución francesa   y el símbolo de la  ola  descendente iniciada en 1815 puede encontrarse   en la novela social o en el  pesi mismo de  Schoppenhauer .  La segunda ola de crecimiento se sitúa hacia 1850 y empieza a descen -  der  con  la crisis económica de 1870, para precipitarse en la gran depre -  sión de  18906.  Los precios se duplican durante el período de ascenso,   L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 93 -  para  luego  derrumbarse.   El    crecimiento  económico  está  alimentado    por el auge vertiginoso del ferrocarril.  En  un poco más de medio siglo,   hasta 1914, se tienden en el mundo entero más de un millón de kiló -  metros  de  líneas  férreas,  el  80  por  ciento  de  las  cuales  se  ubican   en   Europa y América del Norte. Sobre el desarrollo de estas vías empieza   a  tenderse  por igual el camino de la  desigualdad.  Los  elementos  básicos  siguen  siendo  el  hierro  y  el  carbón.  El  tejido    de  hierro  que empieza a cubrir a Europa exige un fuerte aumento de   la  producción   siderúrgi ca.  Es  la  época  de  esplendor  del  acero,  cuya    fuerza  económica  gobierna  o   hace    temblar  al  poder  político.  La  pro -  ducción de hierro se sitúa en 5 millones de  tonela das a mediados del   siglo para acercarse a 50 millones a final del período. La  pro ducción de   acero crece en la misma forma y con cifras parecidas. La  producción   industrial empieza a desplazar mano de obra. Las inmensas máquinas   de hierro  se  encargan de producir nuevas máquinas. El maquinismo   se pone en  marcha.  El  hierro,  unido  a  la  energía  suministrada  por  el  vapor,  transforma    rápidamente  el panorama de la industria, del transporte y de las re -  laciones sociales.  Durante  estos años el hierro triunfa en el mar, con   la  construcción  de  barcos  de  mayor   di mensión  y  más  velocidad.  El    transporte  marítimo  ya  no  puede  estar  en  manos  de   un    negocian -  te-armador, como en la época anterior, pues los costos son enormes.   Des de mediados de siglo se afianzan las grandes compañías de nave -  gación.  El   invento    de  la  refrigeración,  logrado  en  1876,  completa  las    posibilidades del transporte marítimo, para abastecer de carne fresca   a una población en rápida expansión. La marina, más que el ferroca -  rril, dará la preeminencia a Inglaterra durante todo el período.  Este vertiginoso crecimiento impulsa la ola poblacional, pero al mis -  mo  tiempo  empieza  a  modificar  de  forma  drástica  la  geografía  de    los  asentamientos  humanos  y  las  formas  de  organización  social.  La    L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 94 -  población  europea  se  duplica  durante  este  período:  alcanza  una  ci -  fra  aproximada  de  400  millones  de  habitantes,  incrementando  fuer -  temente el porcentaje de población blanca en el planeta, que se elevó   durante  un  siglo  de  22  a  35  por  ciento  de  la  población  mundial.  Las    barreras de Europa se rompen y empieza el gran éxodo hacia el resto   del mundo. Las migraciones europeas de este período representan po -  siblemente el mayor movimiento  poblacional  de la historia humana.   Más  de  300.000  individuos  por  año  emigraron  desde   Europa    durante   la última mitad del siglo. Fue un movimiento que no siempre se  ma -  nifestó  en forma pacífica. Tras los migrantes Regaban los ejércitos y la   base  poblacional  servía de pretexto para el sometimiento de las nue -  vas tierras. América del  Norte,  Australia, Nueva Zelandia, cambiaron   de  dueños.  Las  culturas  aborígenes  o  los   an teriores  conquistadores    fueron  desplazados.  A principios del siglo XIX, después de dos siglos de colonización, Amé -  rica    del    Norte  sólo  contaba  con  cinco  millones  de  población  blanca.    Desde  entonces,  y   so bre  todo  desde  mediados  1850,  se  desatan  los    procesos migratorios. En un  siglo,  hasta 1930, más de 50 millones de   europeos migran hacia todas las latitudes,  pero  especialmente hacia   las «nuevas Europas», ubicadas en regiones  climáticamente  similares,   de  estaciones  templadas  y  con  precipitaciones  que  hiciesen  posible    el cultivo del trigo y la cría de ganado. El trigo, los caballos y los bue -  yes  desplazan   al    guanaco  de  las  pampas  sureñas  o  al  búfalo  nortea -  mericano. Con el hombre  euro peo llegan las conquistas del neolítico   templado  del  Viejo  Mundo.  El  diente  del   león    y  el  gato  doméstico  se    acomodan a los nuevos  paisajes.  En  el  mismo  territorio  europeo,  la  geografía  urbana  se  transformó    radicalmente.    A  principio  del  período  la  población  rural  era  todavía    mayoritaria. Tres cuartas  par tes de los habitantes vivían en el campo.   Las diferencias, sin embargo, eran  signifi cativas. A final de siglo, la po -  blación rural inglesa era solamente el 9 por  ciento.  Francia acabará el   L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 95 -  siglo con 43 por ciento de trabajadores rurales, Estados  Unidos  con 38,   Alemania  con  35  y  Suiza  con  30.  Otros  países  se  van  acercando  más    t arde    al  panorama  urbano,  después  la  revolución  industrial.  Rusia    concluye el siglo con  80  por ciento de su población en el sector rural.   El Tercer Mundo no puede entrar  en  estas cifras, ni en estas compa -  raciones. No es que esté sumido en un  apacible  sueño agrario ni viva   períodos  culturales  diferentes;  ha  sido  sometido  a  ser  un   apén dice   del  crecimiento  europeo  y  norteamericano,  y  su  población  continúa    refugiada  en el  campo.  El cambio no afecta sólo la redistribución geográfica de la población,   sino  tam bién su ubicación dentro de la estructura social. Es durante   este período cuando se empiezan a sentir los síntomas de una socie -  dad  escindida  en  dos  fuerzas  antagónicas.  Las  masas  poblacionales    que  no  han  emigrado  son  sometidas  al  trabajo  fabril  y  empiezan  a    conformar una clase social organizada. Las primeras organizaciones   obreras datan de 1836. En menos de 30 años se fortalece el movimien -  to obrero que aglutina sus fuerzas en la Primera Internacional. Si du -  rante  la  Revolución  francesa  el  proletariado  no  había  hecho  todavía    su aparición, la revolución de 1848 puede considerarse quizás como el   primer movimiento en el que participa el sindicalismo organizado. El   período empieza a declinar poco después de que el proletariado pier -  de  su  primer  intento  de  apoderarse  de  las  riendas  políticas  durante    la Comuna de París. Los testigos presenciales de este proceso, desde   Sismondi hasta Marx, lo único que van a hacer es intentar un modelo in -  terpretativo de las  transformacio nes sociales que suceden ante sus  ojos.  El tercer período coincide casi con la primera mitad del siglo. Se ini -  cia  con   un    gran  ascenso  que  es  interrumpido  por  la  primera  guerra    mundial,  pero  que   logra    prolongarse  hasta  la  gran  depresión  de  los    años treinta. En el dintel del nuevo  siglo  el progreso ha sido indudable   y,  a  pesar  de  sus  crisis  periódicas,  ha   sobrepasado    cualquier  creci -  miento de épocas anteriores. Las cifras hablan por sí solas.  Inglate rra   L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 96 -  ha  multiplicado  por  catorce  su  comercio  internacional,  Francia  lo  ha    acrecenta do quince veces y Alemania diez  veces.  Por  otra  parte,  durante  la  mayor  parte  del  siglo  XIX,  el  crecimiento    estuvo  en  manos de empresas relativamente pequeñas, dentro de un   amplio  mercado   compe titivo.  La  acumulación  de  capital  para  el  de -  sarrollo  industrial  provino,  durante  los  primeros  ciclos,  de  los  exce -  dentes agrarios logrados por métodos y políticas  en  ocasiones rudos.   Posteriormente, antes de que el proletariado lograse su  organiza ción,   la acumulación se consiguió a expensas de los salarios, creó un  pano -  rama    sombrío  de  miseria,  atestiguado  por  los  documentos  oficiales,    recopilados  y   utiliza dos  por  Engels.  Algunas  de  estas  características    van  a  cambiar  durante  los   perío dos  siguientes  con  la  concentración    progresiva del  capital.  La  época  que  se  inicia  a  finales  del  siglo  pasado  está  marcada  por  el    predomi nio indiscutible del acero y, en consecuencia, de la industria   mecánica. Con el  ace ro, cuya aleación es descubierta a mediados del   siglo XIX y perfeccionada en  1877,  surgen nuevas potencias como Ale -  mania,  gracias  a  los  recursos  básicos   concentra dos  en  la  región  del    Ruhr. En los quince primeros años del siglo, Alemania atrae  una  po -  blación  de  dos  millones  de  migrantes  en  busca  de  trabajo.  El  acero    reemplaza  a  la piedra en la construcción y al hierro en la producción   de  maquinaria.  Los   metales    toman  la  delantera.  Mientras  la  propor -  ción de alimentos y textiles producidos  dismi nuye en relación con la   producción total de bienes manufacturados, la proporción  en  la pro -  ducción de metales se duplica en Europa y se cuadruplica en Estados   Unidos.    Es  el  único  rubro  que  aumenta  su  proporción,  junto  con  los    químicos.  La  segunda  base  del  crecimiento  durante  el  período  es  la  utilización    de una nueva fuente energética que empieza a desplazar al carbón. La   existencia de la electricidad se conocía ya desde el siglo XVIII; sin em -  L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 97 -  bargo, su manejo técnico sólo se logra hasta finales del siglo pasado.   Durante el reflujo del período anterior se habían venido perfeccionan -  do los descubrimientos de la energía eléctrica, con la invención del dí -  namo (1872), de la hidroeléctrica (1875) y de la lámpara incandescente   (1879).  Un  año  más  tarde  se  empieza  a  aplicar  la  electricidad  en  los    ferrocarriles. Su éxito y difusión son inmediatos en los más diversos   campos, desde el doméstico hasta el industrial.  La  tercera  base  del  nuevo  desarrollo  es  también  otra  fuente  energé -  tica, conocida con anterioridad, pero cuya utilización en gran escala   no  se  había  requerido  todavía.  El  petróleo,  cuya  explotación  se  ini -  cia tímidamente en Pensilvania a  media dos del siglo XIX, es utilizado   primero para la calefacción -en reemplazo del  car bón- y luego, con el   descubrimiento  del  motor  de  gasolina,  como  carburante,   entran do  a    revolucionar el transporte. Los alemanes construyen el primer motor   de  explo sión. Para 1913 Estados Unidos había producido medio millón   de automóviles,  la  mayor parte de ellos salidos de la fábrica que Henry   Ford había establecido a  prin cipios de  siglo.  Este inmenso desarrollo tecnológico se realizó con base en una gigan -  tesca  acu mulación de capital. El capitalismo de los períodos anterio -  res se había  desarrolla do dentro de las leyes de la competencia, que   en ocasiones resultaba  despilfarradora.  Junto a una línea de ferroca -  rril se montaba otra paralela y con el juego de precios  se  aplastaba al   competidor.  Desde  finales  de  siglo  se  empieza  a  perfilar  un   sistema   más  eficaz,  que  en  algunas  oportunidades  era  el  único  posible,  por -  que  la  industrialización  de  los  nuevos  productos,  como  el  transpor -  te marino o el acero,  requerían  grandes capitales. De 1890 a 1930 se   desata la guerra de los grandes  consorcios.  Es común denominar este   período como la era de los titanes. En un principio  tenían  todavía un   cariz individual, pues lo que predomina es el héroe que se abre paso   en  medio de la competencia: es la época de los Carnegie, los Ford, los   Rockefeller ,  los  Edison.  L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 98 -  Estos  gigantes  de  la  industria  necesitan  abrirse  camino  contra  una    opinión  ad versa, que se aglutina alrededor de las tradiciones doradas   del capitalismo  compe titivo. Las nuevas tendencias llevan fácilmen -  te  a  la  muerte  de  la  libertad  y  al   poder    totalitario.  Las  leyes  contra    los trusts en Estados Unidos datan de 1860, pero  sólo  se aplican con   la presidencia de Theodoro Roosevelt, a principio de siglo. La  bata lla   política  contra  los  consorcios  parece  ganarse  con  la  disolución  de  la    S t andard    Oil  en  1911,  pero  ni  Roosevelt  ni  Wilson  logran  doblegar  a    los trusts que  siguen  creciendo a pesar de los actos  legislativos.  La concentración industrial lleva a la racionalización del trabajo ma -  nual.  El  maquinismo contagia al hombre y los obreros son sometidos,   a  la  ley  férrea  de   la    eficiencia.  El  hombre  tiene  que  imitar  la  organi -  zación  del  trabajo  mecánico.   Fayol    había  empezado  las  investigacio -  nes sobre la cronometría del trabajo manual en 1888, estudio que se   perfecciona con la obra de Taylor a principios del siglo XX. El tayloris -  mo se difunde rápidamente. La eficiencia de la producción empieza a   basarse  no  sólo  en  los  descubrimientos  técnicos,  sino  también  en  el    sometimiento del obrero a la eficiencia monótona y poco creadora. A   medida  que  la  producción  se  desarrolla,  las  grandes  masas  pierden    sus posibilidades creativas.  Por su parte, las clases obreras, si bien no habían logrado el poder po -  lítico, habían obtenido un cierto mejoramiento en las condiciones del   trabajo. A final de siglo la duración media del trabajo diario es de 10   horas, con picos sobresalientes hasta de 12 horas, como en Rusia, pero   ya en vísperas de la primera guerra mundial se había generalizado la   jornada  de  9  horas.  La  legislación  laboral  ha  progresado  en  algunos    países  en  relación  al  seguro  obligatorio.  Cualquier  esfuerzo  por   me -  jorar  las condiciones laborales queda, sin embargo, clausurado en las   fronteras  naciona les. La concertación internacional en este campo no   se logrará sino más tarde.  Los  intentos ensayados al principio del pe -  ríodo fracasan por temor a que la  competen cia extranjera derrumbe   la industria  nacional.  L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 99 -  El cuarto período se inicia después de la segunda guerra mundial y se   extiende  hasta el presente. No se ha estudiado todavía lo que signifi -  caron las dos  guerras,  especialmente la última, como impacto sobre   el medio ambiente. Casi todas  las  grandes ciudades europeas queda -  ron destruidas. La base productiva tanto  agríco la como industrial fue   afectada seriamente. La producción industrial de Francia  en  1945 sólo   alcanzó el 35 por ciento de la producción de 1938, que todavía era  infe -  rior a la de 1929. Las  consecuencias ambientales  de la política de tie -  rra  arrasada,  seguida por los ejércitos alemanes y soviéticos, todavía   no se han contabilizado.  Después de las inmensas devastaciones provocadas por la guerra, se   asiste  a  la etapa más intensa de crecimiento económico y de desarro -  llo tecnológico de  toda  la  historia.  La  base  tecnológica  sobre  la  que  descansa  el  período  es,  durante  su    primera  etapa, similar a la del período anterior, pero pronto empiezan   a incubarse las  tecno logías de punta como la informática o la tecno -  logía genética, que se desarrollan  al  final del período y siembran las   raíces  para  el  desarrollo  futuro.  Sin  embargo,   duran te  el  proceso  de    avance,  el  desarrollo  descansa  fundamentalmente  sobre  los   mis mos   elementos que caracterizaron la etapa anterior. Ante todo el petróleo   cuyo  con sumo crece exponencialmente: en diez años, de 1959 a 1969,   se  consumió   igual    cantidad  que  en  el  siglo  que  empieza  con  el  des -  cubrimiento de los primeros  pozos  en 1859. En segundo plano siguen   estando el hierro y el acero que, no  obstante,  empiezan a ser despla -  zados por el  aluminio.  Basado en los mismos elementos técnicos, aunque perfeccionados, el   creci miento en todos los aspectos se expande exponencialmente. La   producción  de   ali mentos  crece  a  un  ritmo  anual  promedio  de  2  por    ciento de1960 a 1975, pero  en  cambio la producción industrial durante   L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 100 -  el mismo período alcanza incrementos medios anuales de más del 8   por ciento en Japón y del 6 por ciento en los países europeos. Esta tasa   significa una masa gigantesca de bienes producidos en Norteamérica   y sólo un débil comienzo en los países africanos. Tomado en su con -  junto, desde 1950, el crecimiento representa las cuatro quintas partes   del crecimiento total del presente siglo y unas tres cuartas partes de   la energía total consumida.  Aunque este gigantesco desarrollo se basa sobre todo en las conquis -  tas técnicas del período anterior, durante el presente período se inicia   la  investigación  y  la  aplicación  de  nuevas  tecnologías,  aunque  no  se    conviertan  todavía  en  la  base  del  desarrollo.  En  1956  se  inaugura  la    primera planta de fuerza nuclear. Sin embargo, todavía hoy su aporte   es relativamente pequeño y están pendientes los interrogantes sobre   su uso. Asimismo, la primera computadora automática data de 1946,   pero  sólo a final de los años setenta empezó a generalizarse su utili -  zación  masiva.  Empero, este desarrollo ha cambiado de signo. Los modelos explicati -  vos    apli cables  a  los  períodos  anteriores,  difícilmente  pueden  dar  ra -  zón de lo que ha  pasado  después de la segunda guerra mundial. Sin   duda  alguna,  la  concentración  del   capi tal  ha  seguido  creciendo.  En    1963,  135  sociedades  controlaban  el  45  por  ciento   de    la  instalación    industrial en Estados Unidos. Pero si la acumulación económica  de  los   países es un fenómeno creciente, la concentración de recursos a nivel   mundial  es, sin duda, uno de los problemas ambientales más graves   de la época actual.  Los  recursos internos de los países alcanzan cada   vez  menos  para  satisfacer  los   proce sos  productivos.  Estados  Unidos    fue  hasta  los  años  cuarenta  un  país  exportador   de    materias  primas.    Se calcula que para el año 2000 tendrá que importar el 80  por  ciento   de los metales que necesita su crecimiento industrial.  El  desarrollo  descrito  lleva  a  un  crecimiento  inesperado  de  la  pobla -  ción,  sobre  todo en Estado Unidos y Francia. El baby-boom dura hasta   L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 101 -  principio  de  los   setenta,    cuando  se  corta  abruptamente,  y  la  tasa  de    natalidad empieza a descender  hasta  alcanzar niveles de crecimiento   por debajo de cero, incluso antes de que  aparecie sen las píldoras anti -  conceptivas. El crecimiento de la población no es sólo  cuantita tivo. La   estructura  de  la  población  se  modifica  profundamente.  La  población    pro ductiva  se  reduce  cada  vez  más,  ampliando  los  márgenes  entre    jóvenes y  ancianos.  Se hace necesario multiplicar los servicios de se -  guridad  social  por  parte  del   Esta do.  La  mujer  entra  masivamente  a    competir  en  la  escena  del  trabajo.  Hasta  la   se gunda  guerra  mundial    la opinión pública en Estados Unidos era adversa a la  partici pación de   la mujer en el trabajo y en las carreras profesionales. Los flujos de  mi -  gra ción nunca habían hecho necesaria la participación femenina. Los   sindicatos  se  defendían contra la participación de la mujer. En 30 años   la mujer ocupa de  forma  súbita 25 millones de puestos nuevos y hacia   1980, dos de cada tres nuevos  em pleos eran ocupados por  mujeres.  Esta revolución femenina en la ocupación de los puestos de trabajo no   se  debió  ciertamente al movimiento feminista que sólo aparece cuan -  do ya la mujer  estaba  situada en el centro de la escena. El movimiento   se inicia más bien como una forma de cooperación, ante la imposibi -  lidad del varón de atender los gastos crecientes del hogar. En efecto,   la  inflación  se  desata  desde  1965  y  es  ella  la  que  acaba  tanto  con  el    baby-boom, como con las reticencias machistas a la participación de   la mujer en el campo del trabajo. También coopera con esta revolución   social el desplazamiento de la producción hacia el sector de los servi -  cios, con puestos de baja remuneración que fueron absorbidos por la   población  femenina.  Todavía,  en  la  actualidad,  la  mujer  norteameri -  cana sólo recibe en promedio la mitad de la remuneración del varón.  Otro  núcleo  poblacional  que  ha  sufrido  fuertes  transformaciones  en    Estados  Unidos  es  el  de  la  raza  negra.  Los  negros  aumentaron  ma -  sivamente  su  migración  a  las  ciudades  y  se  ubicaron  en  los  centros    abandonados.  La  pobreza  de  ese   sector    poblacional  aumentó  con  el    L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 102 -  proceso de inflación y de desempleo, que asciende  a  un 25 por ciento.   Esta  situación  de  desesperanza  de  la  antigua  población   esclava,    que   no  ha  podido  ser  asimilada  por  la  sociedad  norteamericana,  le  da  a    las  ciuda des una creciente atmósfera de violencia, que contrasta con   la  relativa   tranquilidad    de  la  ciudad  europea.  La  raza  negra,  despla -  zada  y  despreciada,  es  la  que  genera   la    mayor  parte  de  la  violencia,    y  también  la  que  la  recibe.  No  sólo  la   violencia    institucional,  sino  la    violencia física. El homicidio es la principal causa de  deceso  entre los   negros norteamericanos. Las condiciones de inestabilidad económica   han  impulsado la aceptación de la fecundidad en la mujer, para quien   la única  manera  de sobrevivir es multiplicando hijos que se dediquen   al difícil papel del asalto  calle jero, institucionalizado como profesión.   De hecho, mientras crece la proporción  de  nuevos empleos atribuidos   a las mujeres, ha disminuido en 11 por ciento la  inser ción de los ne -  gros al trabajo.  Al menos para las culturas periféricas, el aspecto más importante en   la    cons trucción  del  período,  es  el  proceso  de  expansión  colonialista    L a r ec u p er ac ión de eu r opa y el su rgi m i en t o   del c a p i lta l i smo i n dust r i a l \n- 103 -  europeo. De hecho,  es  muy difícil comprender el auge de la producción   sin  tener  en  cuenta  la   ampliación    del  mercado  y  del  saqueo,  oculto    bajo  las  leyes  de  la  economía.  Hasta  finales   del    siglo  XIX,  el  colonia -  lismo había sido un fenómeno exclusivamente europeo;  Estados  Uni -  dos  todavía  no  tiene  necesidad  del  mundo  exterior.  Hasta  1930,  las    exportacio nes norteamericanas no sobrepasan el 4 por ciento del PIB.   La guerra contra  Espa ña y la conquista subsecuente de Puerto Rico y   Filipinas  son  incidentes   republica nos,  criticados  por  los  demócratas.    La doctrina Monroe, sin embargo, había  servido  para controlar el patio   trasero que es América Latina y el zarpazo sobre  territorio  mexicano   sirve de advertencia para el futuro. Igualmente, aunque sean  margi -  nales  dentro de la economía norteamericana, los enclaves económicos   de la United  Fruit  o de las compañías petroleras, que se habían inicia -  do a principio del siglo,  signifi can que los principios anticolonialistas   agitados por los políticos no tenían  mucha consistencia.  El verdadero dominio colonial, que se había iniciado durante el perío -  do  anterior  y  se  consolida  en  la  segunda  guerra  mundial,  es  la  tarea    pertinaz  y  cruel  del  capitalismo  europeo.  La  lucha  por  el  dominio  y    la partición del mundo que empieza en la década del ochenta y había   sido precedida por el inicio de las grandes migraciones, habían llevado   a  la  población  europea  a  los  más  lejanos  países.  Los  intentos  coloni -  zadores de Inglaterra durante los siglos anteriores se habían ubicado   en  las  tierras  aptas  para  la  caza  y  exportación  de  esclavos.  Gambia,    Sierra Leona y Costa de Oro pierden interés desde la prohibición de la   El dominio colonial \n- 104 -  esclavitud.  Las  conquistas  de  principio  de  siglo  XIX  sirven  más  bien    para defender las rutas del comercio que se habían extendido a la In -  dia, China y América del Sur. A final de siglo, desde que la Reina Vic -  toria se autotitula “emperatriz de la India”, las conquistas se suceden.   Rodesia, Sudán, el Cabo, Somalia, Kenia, Uganda, etc., fueron cayendo   sin mayor  re sistencia. El sueño liberal del libre comercio queda atrás   y con Chamberlain, a  principio  de siglo, se consolida la tendencia del   dominio imperial sin veleidades  librecambistas.  Francia no quiere quedarse atrás, tiene en cuenta no sólo los intereses   econó micos, sino el inmenso influjo cultural que ha empezado a ejer -  cer desde la  revolu ción. Se siente con la misión de difundir por todo   el mundo la cultura y la  civilización  europea, principalmente la fran -  cesa: Argelia es ocupada desde 1830. Luego le  si guen Guinea, Gabón,   Tahití, las islas Marquesas, Senegal, Cambodia. Después  de  la derrota   de 1870, se consolidan las tendencias y la política imperialista.  Caen   bajo su dominio África occidental y ecuatorial e Indochina. Luego, por   medio  de  tratados, compra Marruecos y  Egipto.  Alemania  llega  tarde,  como  había  llegado  retrasada  también  al  de -  sarrollo    in dustrial,  pero  desde  1882  mete  mano  en  la  aventura  colo -  nialista, indispensable  para  asegurar los recursos y los mercados que   requiere la competencia de la  producción  industrial. Desde la confe -  rencia del Congo en 1884, Alemania se apodera del  Africa  surocciden -  tal, del África oriental, del Camerún y del Togo, para sentar pie poco   des pués  en  la  ruta  del  Pacífico.  En  algunos  tratados  de  fin  de  siglo    se reacomodan  las  colonias como cartas de naipe. Italia inicia por la   misma época su aventura  colonia lista ocupando Beilul, Massaua, As -  mara, Eritrea, Libia,  etc.  Con el dominio colonial, Europa se apodera del mundo, lo reparte de   acuerdo    con  sus  intereses  y  acaba  destruyendo  los  últimos  intentos    de diversidad  cultural  que permanecían escondidos en el corazón de   E l d om i n io c ol on i a l \n- 105 -  África  o  en  el  lejano  Oriente.  No   se    ha  intentado  todavía  un  análisis    complexivo  sobre  lo  que  significó,  desde  el  punto   de    vista  ambien -  tal, la política colonialista de Europa que perduró durante más de un   siglo.  No   se    ha  contabilizado  tampoco  la  importancia  del  saqueo  de    las colonias para la  consolidación  del desarrollo capitalista. La mayor   parte de los historiadores pasan por encima o  analizan  la expansión   colonial  como  una  simple  aventura  guerrera,  nacida  de  la  necesidad    de  expan dir la grandeza desbordante del desarrollo  europeo.  Sin embargo, basta mencionar algunos elementos de juicio para com -  prender  el  aporte de las colonias al desarrollo europeo, al mismo tiem -  po  que  el  impacto  de  la  sumisión  colonial  sobre  las  culturas  nativas    y  a  través  de  ellas  sobre  el  medio  ecosistémico.  En  América  Latina,    las regiones que se vincularon en forma más inmediata al desarrollo   europeo durante este período fueron Argentina y Brasil. El caso de Ar -  gentina es suficientemente demostrativo. La pampa húmeda no había   permitido un poblamiento importante durante la época precolombina   El pasto original, aunque abundante, no era apto para la alimentación   de especies útiles para el hombre y la región no era explotable sin una   alta  tecnología.  De  allí  que  permaneció  como  un  reducto  sin  impor -  tancia durante la época colonial española y la primera etapa republi -  cana, por el hecho de carecer de recursos mineros y de asentamientos   humanos que pudiesen ser utilizados como mano de obra.   El desarrollo de la tecnología europea sacó a Argentina de su letargo.   El  ferro carril y los barcos frigoríficos convirtieron la pampa húmeda   en el granero y en  el  proveedor de carnes de Europa. Para que pudiera   cumplir con fidelidad la  misión  asignada, Argentina, después de ha -  ber sido repoblada con migrantres  europeos,  fue sometida con mano   férrea  a  las  condiciones  del  comercio  internacional.   Los    resortes  fi -  nancieros permanecieron drásticamente controlados o manejados en   for ma  directa  por  la  metrópoli.  Baste  recordar  las  fragatas  inglesas    sobre  el  puerto   de    Rosario  con  ocasión  del  cierre  del  banco  inglés  a    E l d om i n io c ol on i a l \n- 106 -  finales del siglo pasado, o  las  cláusulas leoninas del tratado Roca Run -  cinam durante la década del  treinta.  Estas circunstancias determinaron la formación de un Estado  descen -  tralizado,  de fuerte tendencia liberal, manejado a voluntad por el ca -  pital extranjero y por  los  latifundistas ganaderos. La manera como las   juntas  autónomas  controlaban  los   ex cesos  de  la  producción  agraria    consistían  en  la  destrucción  física  de  los  excedentes,  a  pesar  de  que    el hambre rondaba las clases bajas. De allí que un liberal de  la  época   no dudara en afirmar que los argentinos pasaban hambre para que los   ingle ses  pudieran  comer  bien.  El  excedente  agrario  se  concentró  en    el desarrollo  urba nístico e industrial del gran Buenos Aires, mientras   otra  parte  aumentaba  el   stock    numerario  de  la  metrópoli  inglesa  a    través del pago de la deuda. Inglaterra se  en cargó de tender la infraes -  tructura necesaria para el transporte marítimo o terrestre  y  se apode -  ró de las Malvinas para controlar con más facilidad no sólo el tráfico,   sino  la política interna. En esa forma, Argentina que pudo sentirse en   los umbrales  del  desarrollo hacia los años cincuenta, sufre todavía las   consecuencias  de  su   articula ción  a  un  sistema  que  no  fue  diseñado    para favorecer a las  neocolonias.  Si se ha insistido en el ejemplo argentino es simplemente porque con   facilidad  puede convertirse en modelo interpretativo para los demás   países que, en la  mayo ría de los casos, estaban situados en condicio -  nes mucho más desventajosas,  tanto  por sus productos como por las   facilidades del mercado. Pero una historia similar  a  la argentina puede   relatarse  acerca  del  guano  y  del  salitre  peruanos,  que   empeza ron  a    fertilizar los campos agotados de la vieja Europa desde 1840, cuando   los  laboratorios británicos encontraron su riqueza fertilizante.  El dine -  ro se acumuló  en  los suntuosos palacios de la oligarquía limeña. Como   decía Mariátegui, Perú  hipo tecó su porvenir a las finanzas inglesas.   Una inmensa riqueza, que hubiera podido alimentar por años los sue -  los latinoamericanos, se esfumó en poco tiempo y no dejó sino la ri -  E l d om i n io c ol on i a l \n- 107 -  queza  soberbia  de  algunos  palacios  y  la  miseria  de  los  mineros  del    salitre.  La codicia del salitre sirvió también para desencadenar la guerra del   Pacífico. El triunfo de Chile le permite empezar a su vez la aventura. Al   final del siglo, la mitad de los ingresos fiscales de Chile provienen de la   explotación de los desiertos conquistados y la financiación corre por   cuenta de Inglaterra. Chile empieza a su vez a hipotecarse. Cuando el   presidente  Balmaceda  intenta  sacudir  el  yugo  inglés,  así  fuera  para    cambiarlo  por  el  alemán,  estalla  la  guerra  civil  financiada  por  el  rey    del salitre, Thomas North. Balmaceda prefiere suicidarse. Quince años   más tarde los laboratorios ingleses acabaron con las esperanzas chile -  nas de entrar en el  reino  del desarrollo. El nitrato sintético reemplazó   al  nitrato  de  los  desiertos  de   Tamarugal.    El  cobre  reemplaza  al  sali -  tre y Chile cambia de dueño. La Anaconda y la  Kennecot  reemplazan   al  coronel  North.  Las  consecuencias  se  están  viviendo  todavía.   Poco   tiempo  después  de  que  Allende  anunciara  la  nacionalización  de  las    minas de  cobre,  muere acribillado en el palacio  presidencial.  Los ejemplos pueden multiplicarse. Se puede hacer alusión al estaño   boliviano,  dominado durante tanto tiempo por los reyezuelos Patiño,   que disfrutaron en  los  palacios de Europa los excedentes que dejaba   la miseria y la silicosis de los  mine ros de Huanuni. Es imposible dejar   de  mencionar  otros  productos  que  tuvieron   una    alta  incidencia  so -  bre  los  ecosistemas  americanos.  Tal  es  el  caso  del  azúcar,  el   cau cho   y el petróleo. El azúcar que se había convertido para Europa en el oro   blanco  y  fue, junto con los metales, el principal producto agropecuario   durante la época de la Colonia. América del Sur y el Caribe cambiaron   la  fertilidad  de  sus  suelos,  la   rique za  de  sus  selvas  y  el  bienestar  de    sus  poblaciones  por  las  exiguas   recompensas    que  le  dejó  su  cultivo.    Gracias al azúcar, el nordeste del Brasil se convirtió en  una  tierra es -  téril  de  donde  los  descendientes  de  los  esclavos  tienen  que  arrancar    toda vía su subsistencia. La selva desde Bahía hasta Ceará fue arrasa -  E l d om i n io c ol on i a l \n- 108 -  da.  Las   grandes    plantaciones  son  responsables  todavía  de  la  injusta    distribución de la tierra en una  de  las regiones más atrasadas de Amé -  rica Latina, pero que fue una de las más  ricas.  El azúcar sirvió de motor al desarrollo del capitalismo europeo, pero   dejó en  la  miseria a las poblaciones de Barbados o Haití. ¿Cómo expli -  car el nacimiento  del  capitalismo holandés sin el cultivo y la comer -  cialización del oro blanco? La  riqueza  se trasladó, pero en las islas del   Caribe quedó el suelo cansado, que ya no  logra  alimentar a su pobla -  ción, la selva arrasada y la cultura  sometida.  La  caoba  y  los  cedros  de  Cuba  se  pueden  ver  todavía  en  las  puertas    del  Esco rial. ¿Cómo explicar sin el azúcar la fragilidad de la economía   cubana  y  la   ferocidad    de  sus  dictaduras,  desde  Machado  a  Batista,    montadas o cohonestadas por  los  generales o los embajadores nortea -  mericanos? A mediados del siglo, 13  ingenios  norteamericanos explo -  taban casi la mitad de las tierras  cubanas.  Cuando las tierras azucareras de Ceará se agotaron y el oprobio escla -  vista por fin se había extinguido, los campesinos nordestinos fueron   vendidos  o  se  exilaron  “voluntariamente”,  acosados  por  el  hambre,    hacia las nuevas tierras de promisión: la selva del caucho. Hacía pocos   años Charles Goodyear había descubierto la vulcanización y Michelin   inventaba  el  neumático.  Europa  necesitaba  un  nuevo  producto.  Mi -  llones  de  campesinos  emigraron  hacia  la  selva.  Muy  pocos  lograron    sobrevivir a la enfermedad y al maltrato. Se calcula en medio millón   la cuota de sangre que costó la aventura cauchera. El negocio era ren -  table  incluso  para  Brasil.  El  40  por  ciento  de  las  exportaciones  bra -  sileñas  estaban  cubiertas  por  la  exportación  de  la  pasta.  En  50  años    Manaus multiplicó por doce sus habitantes. Sus palacios extravagan -  tes,  construidos  en  plena  selva  amazónica  con  madera  importada  y    mármol italiano, son la expresión cruenta de un desarrollo hipoteca -  E l d om i n io c ol on i a l \n- 109 -  do. La euforia del  cau cho duró poco. La ciencia británica logró evadir   los controles aduaneros y  domesti car las semillas en tierras lejanas y   más seguras al interior de su vasto  imperio.  Brasil acabó comprando   en el extranjero el caucho que le ofrecían  generosamente  sus propias   selvas.  El ejemplo del caucho es significativo desde el punto de vista ambien -  tal.  Sin  tener en cuenta la explotación destructiva a la que se vio so -  metida la selva, es  más  importante plantearse el problema como la in -  capacidad de una cultura para vivir  de  sus propios recursos. La Hevea   brasiliensis era una rica mina que América  Latina  no supo o no pudo   explotar. Sus universidades estaban, y están todavía, más  intere sadas   en adaptar tecnologías que en descubrirlas. Se vive al vaivén externo.   No  se  puede responsabilizar, sin embargo, a los países de Latinoamé -  rica. Los  sistemas  colonialistas están organizados para romper la ar -  ticulación de las culturas como instrumentos de adaptación al medio   ecosistémico.  Después  de  tantos  ejemplos,  ¿será  necesario  insistir  en  la  bonanza    venezola na  del  cacao  o  del  petróleo?  Las  menciones  más  frecuentes    sobre el consumo  eu ropeo de chocolate se encuentran en las novelas   pornográficas  de  la  era   victoriana.    Era  un  consumo  altamente  sofis -  ticado y por añadidura afrodisíaco, al menos en  la  imaginación de la   aristocracia.  Pero no fueron sólo los productos mineros o agrarios los que sirvieron   de  aci cate al desarrollo del capital industrial europeo. El tráfico de vi -  das humanas fue  el  origen de los mayores capitales, que cooperaron,   incluso con Watts, para las  inves tigaciones que llevaron al descubri -  miento de la máquina de vapor. No fue sólo  el  ingenio, o las necesida -  des de expansión del mercado europeo, o la  acumulación  del capital   agrario lo que impulsó el desarrollo del mundo moderno. Fue por igual   E l d om i n io c ol on i a l \n- 110 -  la  carne de millones de africanos trasladados a América como carga   y vendidos  en  los mercados de La Habana, Cartagena o Recife, por las   compañías negreras,  con  accionistas reales. Así se completaba la tri -  logía de la acumulación: mercancías,  oro  amarillo o blanco y  esclavos.  Sin la carga negra traficada por los puritanos de Nueva Inglaterra, tal   vez  Estados  Unidos  no  hubiera  llegado,  al  menos  tan  rápido,  al  pel -  daño que le correspondía por destino de la providencia calvinista. Es   un  capítulo  vergonzoso  que  por  lo  general  no  se  menciona,  porque    enturbia la epopeya de la burguesía. No se sabe cuántos negros fueron   traídos  hacia  América.  Posiblemente  su  número  supera  la  inmensa    diáspora blanca del siglo XIX. No se sabe tampoco cuántos murieron   en las condiciones insalubres de los barcos, bajo el látigo de los negre -  ros o en las crueles represiones a las continuas revueltas de los cima -  rrones.  No  valía  la  pena  contarlos.  Tal  vez  los  únicos  refugios  en  los    que se lograron establecer condiciones de vida adaptadas a los nuevos   sistemas fue en los reinos cimarrones como el de Palmares en Brasil,   que  logró  mantenerse  por  decenios  hasta  que  fue  aplastado  por  uno    de los mayores ejércitos movilizados en América hasta ese entonces.  Los países del Tercer Mundo fueron, por tanto, atados al tren del de -  sarrollo    como    vagones  traseros,  no  en  el  sentido  de  que  sean  los  úl -  timos  en  alcanzar  la   codiciada    meta,  sino  porque  nunca  podrían  al -  canzarla.  El  desarrollo  no  ha  estado   asentado    sobre  las  bases  de  la    desigualdad, y no de un desigualdad pasiva, sino  estructural,  lo que   se  ha  llamado  con  eufemismo  la  división  internacional  del  trabajo  y    que no  es  otra cosa que la desigualdad en los términos de intercambio   en el comercio  interna cional, que resultan en perjuicio de los países   pobres. La percepción del  problema  es muy clara, pero las soluciones   no. En 1974, cuando los países del Tercer  Mundo  pidieron en el seno   de Naciones Unidas el establecimiento de un nuevo orden  eco nómico   internacional  que  les  permitiera  tener  un  mayor  acceso  a  los  bienes    del    de sarrollo,  cerrando  la  brecha  que  los  separaba  de  los  países  in -  E l d om i n io c ol on i a l \n- 111 -  dustrializados,  se   hizo    un  diagnóstico  muy  pertinente  de  las  causas    del  subdesarrollo.  Se  insistió  en   la    injusticia  que  representaban  los    términos de intercambio y al mismo tiempo en  la  forma como el co -  mercio de los productos básicos era absorbido por las transnacionales,   en detrimento de las economías pobres. La producción y el  comer cio   de la mayoría de los productos como el trigo, el plátano, el caucho, el   arroz  y   el    petróleo,  se  encontraba  en  manos  de  las  transnacionales    que dejaban una  exigua  ganancia en manos de los países pobres, que   oscilaba entre el 14 y el 20 por  cien to. Una década más tarde, el Infor -  me  Brundtland,  de  la  Comisión  de  Medio   Ambien te  y  Desarrollo,  se    quejaba de que los precios de las materias primas, de las  que  todavía   intentaban sobrevivir los países pobres, habían venido descendiendo   du rante el último decenio, al mismo tiempo que crecían las obligacio -  nes de la  deuda.  E l d om i n io c ol on i a l \n- 112 -  La crítica ambiental se ha expresado en ocasiones en forma  indiscri -  minada    contra  el  régimen  de  propiedad  privada  y  el  régimen  socia -  lista  como  los   responsa bles  de  la  actual  crisis  de  las  condiciones  de    vida, y ha propuesto como  alternativa  la construcción de un régimen   social que nada tenga que ver con los pasados.  Este  tipo de crítica está   protegida generalmente por una coraza de utopía que la  defien de de   cualquier análisis científico. Es muy fácil plantear las utopías cuando   se  ha cen sobre un análisis indiscriminado de los hechos históricos. Es   más difícil,  sin  embargo, construir la historia real, sin tener en cuenta   los procesos históricos  que  ha construido el hombre hasta el presente.  Un método cómodo, pero ineficaz, es introducir en el mismo saco de la   crítica ambiental el capitalismo y el socialismo, prescindiendo de sus   diferentes articulaciones. Desde el punto de vista tecnológico es fácil   comparar  el  crecimiento  de  las  fuerzas  productivas  en  ambos  siste -  mas, para deducir de allí la similitud de los impactos ambientales. Es   evidente que la contaminación ha sido también el resultado necesario   de los procesos de industrialización socialista y que los métodos agrí -  colas no siempre han sido los más adecuados para la conservación de   los suelos o el uso óptimo del agua. Sin embargo, esta forma de hacer   crítica es la expresión del reduccionismo tecnológico que no tiene en   cuenta  las  variables  sociales  y  simbólicas  de  la  cultura  para  la  com -  prensión del problema  ambiental.  El  medio  ambiente  en  el  régimen   socialista de producción \n- 113 -  En efecto, la manera como se articula la estructura social es diferente   en  am bos sistemas y, por lo tanto, lo es la manera como se concibe la   relación con  el  medio ecosistémico. Esto no significa necesariamente   una defensa del  sistema  socialista de producción, sino un criterio de   análisis para acercarse de manera  di ferente a la crítica ambiental de   ambos sistemas y proponer alternativas con  base  en los procesos his -  tóricos y  no.  En los cortes utópicos de paraísos  soñados pero imposibles lo primero   que    habría  que  tener  en  cuenta  es  que  el  socialismo  real  se  intenta    construir sobre  la  base de un método científico elaborado previamen -  te. Es, por lo tanto, un  sistema  planificado sobre la crítica del capital.   Por primera vez en la historia la  planificación  consciente antecede la   construcción de los procesos políticos. Desde el manifiesto comunis -  ta, una serie de textos venían programando la manera como debería   cons truirse la sociedad. Cuando los soviéticos toman el poder, preten -  den aplicar  pro gramas discutidos de  antemano.  La  revolución  de  la  burguesía  no  había  tenido  ese  carácter  acucioso    de    planifi cación,  pero  tampoco  había  carecido  por  completo  de  una    conceptualización  de   la    historia.  Más  aun,  el  Romanticismo  había    criticado  a  la  Revolución  francesa  como   el    resultado  de  un  proceso    excesivamente racional, que pretendía construir el  mundo  social so -  bre  esquemas  abstractos,  salidos  de  una  razón  antihistórica.  Marx,    como  discípulo de Hegel, debe mucho a la comprensión romántica de   los procesos  histó ricos, pero al mismo tiempo puede ser considerado   como un buen discípulo de  la  Ilustración, al querer organizar en for -  ma conciente esos procesos, sin permitir  que  sean impulsados por el   automatismo  externo  del  espíritu  absoluto.  El  socialismo   se    cree  la    continuación del progreso indefinido, establecido como dogma por la   filoso fía  iluminista.  E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 114 -  Sin  embargo,  el  socialismo  real,  a  pesar  de  ser  el  reflejo  histórico  de    una    doc trina,  no  reproduce  la  totalidad  del  pensamiento  marxista,    entre  otras  razones,   por que  el  sistema  teórico  construido  por  Marx,    como todos los grandes sistemas  teóri cos, es el resultado de múltiples   confluencias que conservan contradicciones internas difíciles de uni -  ficar en la práctica histórica. Hay dos aspectos en la doctrina de Marx   que, tal como se verá en el capítulo sobre el pensamiento ambiental,   entran  en  conflicto  tan  pronto  como  se  trata  de  planificar  la  organi -  zación de una sociedad. Existe el Marx desarrollista, para quien la fu -  tura sociedad se construye en función del crecimiento de las fuerzas   productivas. Éstas no son solamente el motor que impulsa la historia,   sino su objetivo. El socialismo se construye por la exigencia de un me -  canismo ciego que exige la transformación de las relaciones sociales,   a  fin  de  incrementar  el  desarrollo  de  las  fuerzas  productivas,  que  el    capitalismo no alcanza a impulsar con suficiente dinamismo.  Pero existe igualmente otro Marx, que no se refugia sólo en el joven e   idealista hegeliano de la primera época, como lo cree Althusser, sino   que traspasa toda  la  obra, hasta al autor maduro de El capital. Es un   Marx  para  quien  la  finalidad  de   la    historia  no  es  el  desarrollo  ciego    de la productividad, sino la desalienación del  hom bre. A este objetivo   fundamental  está  sometido  incluso  el  desarrollo   tecnológico,    que  le    devuelve al hombre las posibilidades creativas en el espacio ampliado   del  ocio. Este segundo Marx está mucho más cerca que el primero de   los ideales y  de  las preocupaciones del ambientalismo moderno. Des -  de  esta  segunda   perspectiva,    Marx  piensa  el  cambio  social  como  la    única forma de alcanzar una verdadera  solu ción del conflicto entre el   hombre y la  naturaleza.  Puede  decirse,  quizás,  que  mientras  los  programas  socialistas  ante -  riores  a   la    toma  del  poder  estaban  más  cerca  del  segundo  Marx,  el    socialismo real,  organiza do en la práctica política, está más cerca del   primero y reserva la visión  humanista  de la igualdad como trasfondo   E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 115 -  de justificación ideológica. El programa de Erfurt y el programa ruso   de  1903  plantean  todavía  la  exigencia  perentoria  de  la  igualdad  y   la   descentralización administrativa. El mismo Lenin construye el proce -  so  revoluciona rio con la consigna de «todo el poder para los soviets».   Estas primeras ilusiones  de  igualdad se ven pronto contrastadas con   la exigencia de la acumulación de  capital  para lograr el rápido desa -  rrollo de las fuerzas  productivas.  Al  parecer,  el  medio  más  eficaz  que  ha  encontrado  el  hombre  para    lograr  una  acumulación que propicie el desarrollo de las fuerzas pro -  ductivas es el  sometimien to de la fuerza de trabajo y el desplazamien -  to masivo de la plusvalía hacia la  cúpula  del poder. En el socialismo   real el poder económico se confunde con el poder  polí tico y, por tanto,   la acumulación la hace el Estado a expensas de la comunidad.  La  rein -  versión no se realiza necesariamente para lograr la satisfacción de las   necesi dades básicas de la misma población que produce el excedente.   Existe, por lo  tan to, una transferencia de fondos hacia un sector de la   economía y en esta forma  se  produce la  acumulación.  Un método similar fue elegido por Stalin para lograr el desarrollo de   la  industria  pesada en la Unión Soviética. Un método de esta natura -  leza difícilmente se  compa gina con la democracia directa, soñada por   los primeros programas que pedían  la  autonomía administrativa del   pueblo.  Se  requería  un  Estado  centralizado  y  fuerte  que  garantizase    la transferencia, esto es, un Estado dominado no por los soviets, sino   por el partido. El proceso de centralización se inicia con Lenin después   de  la  revuelta  de  Kronstadt,  cuando  los  soviets  son  sometidos  a  la    dirección vertical del partido. Sólo que el partido cambió de rostro. Si   en 1923 estaba   conformado en un 44 por ciento por obreros, en 1927   estaba dominado por la pequeña burguesía.  E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 116 -  Con estos presupuestos sociales podía iniciarse el programa económico   (NEP) impuesto por Stalin, que se basaba en la acumulación de capital   lograda  gracias  a  la  reducción  de  los  salarios  y  a  la  explotación  del    sector  agrícola.  Si  al  principio  de  la  revolución  la  diferencia  de  sala -  rios sólo alcanzaba una proporción de tres a uno, hacia el año treinta   los salarios más altos podían superar veinte veces los salarios míni -  mos. Ello confirmaba un modelo de sociedad altamente jerarquizado   y  centrali zado y cada vez más alejado de las necesidades y de la par -  ticipación de las  masas.  Un modelo así fomenta la burocratización y   el servilismo. Es un modelo poco  claro,  manejado en general por una   camarilla, y en el que el favoritismo reemplaza  las  normas de organi -  zación  racional.  Sin  embargo,  el  modelo  funcionó  y  se  lograron  los  objetivos  de  cre -  cimiento    eco nómico  para  los  que  había  sido  diseñado.  El  desarrollo    de las fuerzas  productivas  colocó a la Unión Soviética en un nivel de   alta  competitividad  en  algunas  líneas   de    la  producción  industrial.  El    plan leninista GOELRO colocaba el desarrollo  energéti co como la base   material del socialismo. Este objetivo fue cumplido con creces.  La  pro -  ducción energética centralizada pasó de 46 millones de toneladas en   1913,  de  la que todavía la mitad dependía del carbón, a 238 millones   de  toneladas  en   1940.    En  1965  la  utilización  del  combustible  vegetal    se había reducido a sólo un 6 por ciento del total. Las hidroeléctricas   generaban 6 millones de kilowatios en 1955  y  33 en 1971. La extracción   del petróleo del Cáucaso y del gas natural sólo  empezó  en forma sig -  nificativa desde 1950, pero desde entonces la Unión Soviética se  puso   a  la  cabeza  de  la  producción  petrolera.  El  desarrollo  energético  de  la    Unión    Sovié tica  no  se  debe  solamente  a  la  voluntad  socialista,  sino    también a sus  inmensos  recursos, que le permitieron ser el único país   desarrollado que se autoabastece  en  producción de  energía.  La segunda prioridad del desarrollo soviético fue el abastecimiento y   la    trans formación  de  los  materiales  necesarios  para  la  industria  si -  E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 117 -  derúrgica.  En  este   cam po,  tampoco  el  triunfo  fue  sólo  el  fruto  de  la    voluntad  socialista.  Aquí  también   las    inmensas  reservas  del  mate -  rial  ferroso,  de  hulla  y  de  manganeso,  junto  con  la   volun tad  política    de autoabastecimiento, colocaron a la Unión Soviética a la cabeza de   la  producción mundial de hierro. La explotación de los minerales no   ferrosos  fue   otra    de  las  prioridades  de  la  política  socialista  desde  el    principio de la revolución, lo  que  trajo como consecuencia la incorpo -  ración a la vida económica de regiones muy
