  atra sadas como Siberia, el   Cáucaso o los desiertos de Kasajstan. Con este  inmenso  potencial, la   URSS se pudo colocar entre los primeros productores de  acero.  Se  ha  hecho  referencia  en  los  párrafos  anteriores  a  la  producción  de    la infraestructura indispensable para el desarrollo industrial, como es   la  base  energética  y  la  producción  metalúrgica.  En  estos  aspectos  la    Unión Soviética alcanzó un desarrollo comparable al de los países ca -  pitalistas. Sin embargo, lo que define con más claridad la orientación   del  desarrollo  es  la  producción  industrial  de  los  bienes  de  consumo    inmediato. ¿A qué tipo de bienes se aplica esta gigantesca producción   energética y metalúrgica ? La diferencia de orientación con los países   capitalistas es clara. Mientras en Estados Unidos la producción anual   de automóviles en 1970 Estados Unidos tenían un poco menos de un   automotor por habitante y Europa uno por cuatro, la Unión Soviética   sólo poseía siete automotores por mil habitantes. En receptores de te -  levisión la diferencia es menos drástica y sólo representa una tercera   parte de la de Estados Unidos, pero en cambio el número de teléfonos   era en  ese  mismo año aproximadamente diez veces  menor .  Estas  claras  diferencias  pueden  significar  un  menor  desarrollo  de  la    calidad    de    vida  con  respecto  a  necesidades  que  se  han  hecho  inelu -  dibles  dentro  de  la   socie dad  moderna,  pero  significan  también  una    tendencia diferente en la orientación  del  desarrollo. La producción en   los países socialistas está orientada ante todo a  la  satisfacción de las   necesidades  básicas  de  vivienda  y  transporte  comunitario.   En    esta   E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 118 -  forma, la utilización del tren por pasajero/kilómetro es más de 20 ve -  ces  mayor  en la Unión Soviética que en Estados  Unidos.  Es  esta  orientación  distinta  del  desarrollo  la  que  induce  necesaria -  mente    im pactos  ambientales  diferentes.  Sin  duda  ninguna  la  rápida    industrialización de  la  Unión Soviética es responsable en medida pro -  porcional  por  la  grave  situación  de  deterioro  ambiental  del  mundo    moderno, pero los impactos no hacen referencia  sólo  a la producción   tecnológica bruta, sino a la diferenciación de los bienes de  consu mo   inducida  por  la  orientación  del  desarrollo.  Los  problemas  ambienta -  les del  so cialismo real existen, pero para comprenderlos y buscar so -  luciones  viables  es   in dispensable  entender  el  sistema  social  que  los    produjo. Dentro de una  sociedad  que no estimuló el consumo porque   no  estaba  interesada  en  el  aumento  de  la   tasa    de  retorno  del  capital    privado, la producción no tenía que acudir a los  mecanismos  de am -  pliación del mercado, disminuyendo la vida útil de los productos. Este   criterio  de desarrollo es, sin duda, una salvaguardia importante con -  tra el deterioro  ambiental.  Los problemas ambientales del socialismo soviético provenían de sus   propias    articulaciones,  de  la  orientación  y  de  las  formas  estructura -  les de su desarrollo.  El  centralismo burocrático difícilmente podía te -  ner en cuenta las circunstancias de  adap tación ecológica, sobre todo   cuando el objetivo del desarrollo era el crecimiento  de  la producción   a toda costa, dentro de un ambiente de competencia con las  fuerzas   capitalistas.  El  primer  problema  ambiental  fue  pues  el  abandono  de    la  producción  agraria y, por consiguiente, la imposibilidad de atender   la satisfacción de las  nece sidades biológicas de la población. Según la   crítica de Kruschev, Siberia  producía  menos mantequilla en 1953 que   en  1913.  Desde  el  año  50  hasta  el  65  la   producción    agropecuaria  au -  mentó a un ritmo de 1.5 por ciento al año, por debajo del crecimiento   poblacional.  El  escaso  crecimiento  se  basaba  más  en  la  ampliación    extensiva  que  en  la  producción  intensiva.  La  camarilla  del  acero  no    E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 119 -  permitió el desarrollo de la química y, por lo tanto, su aplicación a los   cultivos fue mínima en relación con el avance vertiginoso en cultivos   intensivos  del  mundo  capitalista.  Desde  el  punto  de  vista  exclusiva -  mente ecológico, pero no ambiental, esto tal vez pueda contabilizarse   como ventaja, si es que puede tenerse como ventaja el atraso.  Sin embargo, los problemas ambientales de la agricultura soviética se   debieron más al despilfarro de los recursos, por falta de incentivos y   por  exceso  de  centralización  en  la  planificación  de  la  decisiones.  La    falta de libertad decisoria por parte de las empresas llevó, por ejem -  plo, al despilfarro del agua de riego que se concedía en forma gratuita.   Los koljoz no se mostraban interesados en la  compra  de maquinaria   de  aspersión  que  hubiese  ahorrado  hasta  la  mitad  del  gasto.   Igual -  mente el hecho de que no se reconociese en alguna forma la diferen -  cia de  fertilidad  entre los suelos y la accesibilidad, como factores que   de  alguna  manera  tenían   que    entrar  en  el  cálculo  económico,  cual -  quiera que fuera el régimen de propiedad,  llevó  a la indiferencia por   el  aprovechamiento  óptimo  de  los  suelos  más  fértiles  y   accesi bles,   que eran concedidos en forma gratuita, al igual que los más pobres y   lejanos.  El manifiesto comunista había pedido el traspaso de la renta   de la tierra a las  comu nidades, pero no su abolición, en un régimen de   propiedad  comunitaria.  Un hecho claro que muestra cómo la centralización de las decisiones   puede    afectar  el  medio  ecosistémico  se  vio  en  la  sorpresiva  amplia -  ción de los cultivos  de  maíz en tiempo de Kruschev, impulsada por la   competencia  del  mercado  de   granos    con  Estados  Unidos.  Esta  deci -  sión centralizada no tuvo en cuenta las grandes diferencias ecológicas   entre las llanuras húmedas de América y los suelos  soviéticos,  poco   adaptables al cultivo masivo de este grano. Por otra parte, la estrate -  gia  ali menticia es un arma política difícil de manejar, como se percibe   con claridad en  la  manera como el gobierno soviético subvencionó el   mercado del trigo y del pan,  a  pesar de que un alto porcentaje de éste   E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 120 -  se  utilizaba  para  alimento  animal  en   una    costosa  reconversión  pro -  teínica. Este ligero despilfarro obliga al gobierno  soviético a  importar   trigo de los Estados Unidos, con los costos económicos y políticos  que   ello supone. Como se puede ver, las decisiones ambientales no depen -  den  sólo   de    orientaciones  tecnológicas,  sino  también  de  decisiones    políticas  que  tienen  que   ver    con  la  ideología  y  la  orientación  del   de -  sarrollo.  El  centralismo  monolítico  de  Stalin  resultaba  demasiado  oneroso,  y    aunque    ha bla  logrado  acelerar  la  producción  en  los  sectores  básicos    de la infraestructura  eco nómica, sólo podía ser mantenido en forma   coercitiva con una política de  fuerza  difícil de mantener en forma in -  definida.  Las  reformas  empiezan  a  aparecer  tan   pron to  como  Stalin    desaparece de la escena. Kruschev amplía la iniciativa de la  empre sa   en los métodos de producción y de    abastecimiento y rompe el mono -  polio  de  la industria pesada, favoreciendo la agricultura. Brezhnev y   Kosyguin, por su  parte,  intentaron imponer un método de producción   socializada y de distribución de  mer cado. La reforma de 1965 amplió   las primas y los estímulos individuales para incentivar la producción.   La apertura de Gorbachov no es, por consiguiente, una revolución in -  édita, sino un paso más en la apertura de los rígidos esquemas stali -  nistas que acabaron por colapsar el sistema centralizado.  E l m edio a m b i en t e en el r égi m en   s o c i a l i sta de ep r oducc ión \n- 121 -  Si el capitalismo y el socialismo no pueden ser tratados dentro de una   crítica homogénea, tampoco pueden serlo las diferentes experiencias   del  socialismo  real.  Algunos  esquemas  de  desarrollo  como  el  che -  coslovaco han imitado de cerca el modelo soviético y sus «desviacio -  nes», como las reformas de Ota Sik, basadas en las agudas críticas de   Radovan Richta, fueron ahogadas por los tanques soviéticos y por la   represión interna. Yugoslavia, en cambio, intentó construir su propio   camino  al socialismo en un modelo que puede considerarse interme -  dio entre el chino y  el  soviético. La autogestión se basaba en la descen -  tralización de la producción,  pero  no era un instrumento homogéneo   en  toda  la  escala  de  la  producción.  Mientras   las    decisiones  se  entre -  gaban a los colectivos en las empresas pequeñas,  dedicadas  general -  mente a la producción de bienes de consumo, las grandes empresas,   que  representaban los intereses básicos del Estado, eran controladas   por comités.  Las  reformas iniciadas en 1961 propiciaron una mayor li -  beralización de la economía  y  aumentaron sin duda la  productividad.  No es posible tratar con detenimiento cada uno de los modelos socia -  listas y  las  repercusión que sus diferentes políticas han tenido sobre   el  medio  ambiente.   El    caso  de  Cuba  por  ejemplo,  es  de  un  inmenso    interés desde el punto de vista  am biental: una pequeña isla caribeña,   dependiente del monocultivo del azúcar con todas sus secuelas, y que   hace  el  tránsito  en  forma  súbita  hacia  la  producción   socia lizada  sin    poder cambiar su dependencia agrícola. El intento de  industrialización   Otras experiencias socialistas \n- 122 -  impulsado ardorosamente en los primeros años, y que propendía por el   modelo  so viético, fracasa pronto, con lo cual la isla queda confinada a su   antigua  producción  agrícola. Ello no significa, sin embargo, que no se   hayan introducido cambios  radi cales en la orientación del  desarrollo.  La reforma agraria, iniciada inmediatamente después de la revolución   inició    sin  duda  un  proceso  de  diversificación  de  la  agricultura  que    por lo menos  satisfizo  las necesidades de trabajo para toda la pobla -  ción. Sin embargo, el principal  esfuer zo se colocó en el desarrollo de   la producción azucarera, que continuó siendo  la  base de la economía,   a pesar de las tentaciones revolucionarias iniciales de  supri mir con el   azúcar el recuerdo del  colonialismo.  Desde  1959  se  ha  incrementado  ampliamente  el  uso  de  abonos  y  de    maquina ria agrícola, en reemplazo de los automóviles último modelo   de  la  época  de   Batista.    El  manejo  del  agua  ha  sido  también  exitoso    tanto en el aumento de la capacidad  de  las represas, como en el creci -  miento de las áreas de riego. Otro tanto puede  decir se de la política de   urbanización, que cortó el crecimiento desmesurado de La  Ha bana e   incrementó la diversificación de los asentamientos agrarios, dentro de   una política que puede considerarse única en América Latina. Sin em -  bargo, a pesar del relativo desarrollo que han tenido algunas líneas de   producción, al visitar Cuba un observador atento se puede dar cuen -  ta de que la revolución no se hace para incrementar las fuerzas pro -  ductivas, sino para generar nuevas relaciones entre los hombres. Los   triunfos principales de la revolución hay que situarlos en la educación   generalizada,  la  salud  para  todos,  el  empleo  y  la  satisfacción  de  las    necesidades básicas de la población. Con todo ello, los problemas am -  bientales generados por el estilo productivo adoptado siguen pesando   sobre la isla. La bahía de La Habana es una de las más contaminadas y   las consecuencias ambientales del monocultivo son difícilmente con -  trolables.  O t r a s e x p er i enc i a s s o c i a l i sta s  \n- 123 -  Pero quizás el modelo socialista más antagónico al soviético, y que en   muchas  sentidos lo supera ampliamente desde el punto de vista am -  biental, es el de la  co muna campesina, erigido por China como el eje   estructural de su política  revolucio naria. El modelo chino ha captado   la atención de los ambientalistas y para  algunos  de ellos se ha consti -  tuido en un ejemplo para imitar, como alternativa de  desarrollo  para   los países del Tercer Mundo. El camino no ha sido construido siempre   con  rosas. El gran salto adelante de los primeros años de la revolución   estaba  enmarcado  dentro de la política de avance tecnológico a toda   costa,  que  había  caracterizado   la    revolución  soviética.  Se  quería  al -  canzar en 15 años el desarrollo de la Gran  Breta ña. Por supuesto, esto   no se alcanzó. Tan pronto como partieron los técnicos  rusos,  China se   acomodó  de  nuevo  en  sus  viejas  tradiciones  campesinas.  Puede   de -  cirse  que el modelo de desarrollo chino se ha logrado no sólo por las   orientaciones  del  nuevo período revolucionario, que en ocasiones han   sido contradictorias pero  que  sin duda han promovido la solidaridad,   sino también por la fuerza de las antiguas tradiciones campesinas del   pueblo  chino.  Para comprender los logros del modelo chino hay que tener en cuenta   la  pesa da herencia poblacional y de atraso tecnológico que heredaba   la revolución. En  1925  China contaba con 400 millones de habitantes   y sólo dos millones de obreros  indus triales. Tres lustros después de la   revolución,  en  1965,  había  llegado  a  700   millones    de  habitantes  y  11    millones  de  obreros  industriales.  En  los  diez  años  siguientes  a   la    re -  volución, se pasa de 8 a 24 millones de asalariados y de 3 a 9 millones   de  obre ros industriales. A pesar de los fracasos, el impulso industrial   tuvo su efecto  para  crear una industria pesada y ligera de cierta  im -  portancia.  Sin embargo, el esfuerzo se centra desde 1959 en el desarrollo de la  agri -  cultu ra y, sobre todo, en un modelo agrario que vaya incorporando pro -  gresivamente    los    adelantos  industriales,  dentro  de  una  planificación    O t r a s e x p er i enc i a s s o c i a l i sta s  \n- 124 -  regional acorde con las  necesi dades humanas y con el potencial de los   recursos. Quizás éste es el aspecto  del  modelo que resulta más llama -  tivo para los ambientalistas. De una manera  conciente,  el modelo pre -  tendía articular las relaciones entre agricultura y artesanía local,  para   ir convirtiendo a ésta en procesos industriales cada vez más comple -  jos, pero  evi tando, en cuanto fuese posible, la centralización de las de -  cisiones económicas.  Para  ello el plan impone a la comuna campesina   sólo una cuota en especie y le permite desarrollar libremente su auto -  nomía productiva. Ello da como consecuencia un acople regional a las   exigencias de los ecosistemas y un desarrollo de tecnologías alterna -  tivas  que  han  evolucionado  y  se  han  aplicado  como  en  ninguna  otra    parte del mundo. El acondicionamiento de terrenos legamosos, como   en la comuna de Tachai, el gran desarrollo de la reforestación la apli -  cación de abonos orgánicos y de defensas biológicas le han permitido   a China desarrollar una agricultura eficiente y ambientalmente apro -  piada que es, sin duda, un modelo imitable para los países del Tercer   Mundo. Este modelo agrícola alternativo ha significado para China el   importante  resultado  de  alimentar  una  población,  que  representa  la    cuarta parte de los habitantes del planeta, sin la aplicación tecnológi -  ca masiva utilizada en los países  industrializados.  A más de este resultado, se ha logrado superar el limitante problema   del    anal fabetismo,  que  antes  de  la  revolución  cubría  el  75  por  cien -  to  de  la  población  y   exten der  a  la  mayor  parte  de  los  habitantes  del    campo los servicios de salud. Los  médi cos descalzos y las escuelas de   puertas abiertas, junto con el modelo agrícola,  re presentan la verda -  dera revolución  china.  La importancia del modelo chino se destaca más, si se compara con la   situa ción  de  otros  países  del  Tercer  Mundo  que  no  han  podido  solu -  cionar el problema  del  hambre, a pesar de la aplicación tecnológica de   la revolución verde, y menos  toda vía el problema de la salud popular   O t r a s e x p er i enc i a s s o c i a l i sta s  \n- 125 -  y del analfabetismo. Países como India,  Indonesia y  parte de Indochi -  na  no  han  podido  desligarse  de  la  herencia  colonial.  El  latifundio   y   la excesiva renta usurera sobre la tierra, no solo impiden el desrrollo   de una agricultura de subsistencia que permita la satisfacción de las   necesidades biológicas,  sino  que están agravando el impacto sobre los   suelos  y  el  excesivo  proceso  de   urbanización,    que  es,  posiblemente,    uno de los mayores problemas ambientales del Tercer  Mundo.  Los ejemplos aducidos sobre las incidencias ambientales del socialis -  mo  real  dejan en claro que la manera como se articulan dichas socie -  dades  plantea   proble mas  diferentes  que  los  ocasionados  por  la  eco -  nomía capitalista de libre  empresa.  Igualmente, deja en claro que los   socialismos  obedecen  a  modelos  diferentes  y   que,    por  consiguiente,    la  crítica  ambiental  debe  tener  en  cuenta  no  solamente  los   aspec tos   tecnológicos del problema, sino también las incidencias ambientales   de los  di ferentes estilos de  desarrollo.  La estrategia para la aplicación de las soluciones también se debe  es -  tablecer  en forma discriminada para los diferentes modelos. Sin duda   alguna,  el  armamentismo representa posiblemente la mayor amenaza   para el conjunto de  la  vida, pero es muy distinto pensar soluciones en   un sistema en el que la  fabricación  de armas está en manos de la em -  presa privada, que cuando las decisiones  depen den sólo del poder po -  lítico del Estado. La diferencia puede verse reflejada en  la  agilidad con   la que el gobierno soviético sorprendía continuamente a los  países  oc -  cidentales al tomar decisiones unilaterales de desarme, que en éstos   tienen que pasar por el tamiz de los grandes fabricantes de armas. Lo   mismo puede decirse en cualquier otro campo de la actividad huma -  na, como la incidencia de los pesticidas o las políticas de poblamiento.  O t r a s e x p er i enc i a s s o c i a l i sta s  \n- 126 -  Los impactos ambientales de las culturas anteriores, por muy graves   que hayan sido, no pasaron de representar efectos locales o regiona -  les, circunscritos a los márgenes de sus propias civilizaciones. La de -  forestación del medio Oriente o de las cuencas del Himalaya, puso en   peligro las culturas asentadas en el entorno geográfico, pero no repre -  sentó un peligro para la vida en su conjunto. Los mayas pudieron emi -  grar a sitios cercanos y las poblaciones sumerias tierra adentro,  para   construir  nuevas  culturas.  El  Imperio  romano  representó,  sin  duda,    el esfuerzo  más  articulado de explotación del entorno, dentro de una   vasta  región  y  los   impactos    ambientales  fueron  mucho  más  graves    pero no sobrepasaron la cuenca del  Mediterráneo.  Lo que caracteriza el impacto del desarrollo moderno es su  significa -  ción    planetaria.  La  expansión  europea  iniciada  en  el  siglo  XV  y  con -  solidada en el  domi nio colonial del siglo pasado y principios del pre -  sente,  ha  sojuzgado  la  totalidad   del    planeta  al  dominio  unitario  del    hombre. No se trata ya de esfuerzos aislados  de  adaptación cultural,   en los que las relaciones sociales y el mundo simbólico  servían  de ins -  trumentos culturales para la transformación del medio. Lo que desde   Smith  ha  dado en llamarse el capitalismo, no es más que un sistema   unificado  de  explotación   del    mundo  natural  en  el  que  las  diferentes    culturas han tenido que integrarse dentro de una rígida y homogénea   estructura de comportamiento o, de lo contrario,  desaparecer .  Consecuencias ambientales  del desarrollo moderno \n- 127 -  Posiblemente el primer efecto ambiental del desarrollo moderno que   es    nece sario  considerar  dentro  del  presente  resumen  es  el  impacto    sobre la cultura. Es  un  efecto invisible, difícil de precisar, pero es qui -  zás el de más hondas  consecuencias.  La sumisión de las culturas a un   propósito  único  de  acumulación  significó  o   está    significando  la  pér -  dida  progresiva  de  la  heterogeneidad  cultural.  Hasta  el   momento    es   un  hecho  irreversible.  La  cultura  ha  ido  perdiendo  su  significado  de    modelo  adaptativo a las circunstancias locales o regionales, para con -  vertirse en un  ropaje  unificado y en un sistema articulado de explota -  ción del medio natural. A  instrumen tos similares responden símbolos   idénticos. Las relaciones sociales no se  organi zan de acuerdo con las   exigencias de un trabajo común que garantice la  superviven cia de la   tribu  o  del  poblado,  sino  según  las  rígidas  líneas  de  la  acumulación.    Incluso  la organización política alrededor del estado nacional, que se   inició con el  surgi miento de la burguesía y se consolidó con el capita -  lismo competitivo, está  perdien do su razón de  ser .  En  un  planeta  unificado  e  interdependiente  ha  empezado  a  surgir  la    conciencia    de  que  somos  parte  de  «una  sola  tierra».  Esta  consigna,    utilizada como título  del  libro de Ward y Dubos que sirvió como base   de discusión en la Conferencia Internacional de Estocolmo, ha pasado   a ser una especie de emblema del ambientalismo. Su significado, has -  ta cierto punto, es exacto. Se trata de una sola tierra, sometida a un   solo  proceso  de  transformación  tecnológica.  El  hombre  quizás  siem -  pre había sido conciente de que vivía en una sola tierra, pero la diver -  sidad de sus culturas y de sus formas adaptativas predominaba sobre   la conciencia de la unidad planetaria. La mayor extensión que había   logrado esa conciencia se simbolizó en el título de mare nostrum con   el que los romanos bautizaron al Mediterráneo.  Lo que hace olvidar el emblema unificante de una sola tierra es que, a   pesar de la homogeneización de la cultura, la tierra continúa dividida   ya no por la diversidad cultural, sino por el mismo sistema de acumu -  C onsec u enc i a s a m b i en ta l es del   des a r oñ l o moder no \n- 128 -  lación. Como lo reconoce el Informe Brundtland sobre Medio Ambien -  te  y  Desarrollo,  éste  es  quizás  el  más  grave   proble ma  ambiental  del    mundo contemporáneo. El impacto ambiental del desarrollo  mo derno   no es sólo el efecto de un simple desarrollo tecnológico, sino también   el  re sultado de un sistema de acumulación. No es posible analizar con   justeza  ninguno  de los problemas ambientales contemporáneos, si no   se  analizan  los  polos  de   acu mulación  y  consecuentemente  los  polos    de explotación o de  pobreza.  El hecho de que la cultura vaya siendo cada vez más homogeneizada   no  signi fica, por tanto, que la sociedad moderna viva dentro de igua -  les condiciones de  sa tisfacción de sus necesidades. El inmenso desa -  rrollo de la calidad de vida en  los  países ricos no se ha logrado sino en   función de la explotación de los recursos  de  los países pobres y de la   subordinación de sus culturas. Por esta razón, los  proble mas ambien -  tales de unos y otros son interdependientes. No se pueden analizar  en   forma  aislada,  como  suele  hacerse.  La  muerte  de  las  culturas  tiene,    por tanto, un signo. No mueren de muerte natural o de buena volun -  tad. Son enterradas por  los  flujos de  acumulación.  Esta perspectiva se puede rastrear a lo largo de la narración preceden -  te.  Tal  vez una de las formaciones sociales que más han incidido en el   deterioro  ambiental  ha sido el imperialismo. Basándose en la subor -  dinación de las culturas y en la  ex plotación de los recursos naturales,   los  imperios  agrarios  iniciaron  el  proceso   de    acumulación  y  dejaron    trás de sí la secuela del deterioro, principalmente en los  paí ses some -  tidos.  La  expansión  de  Europa  se  inició  con  el  sojuzgamiento  de  las    cultu ras  amerindias  y  con  la  explotación  de  los  recursos  minerales.    El colonialismo  de  los tres últimos siglos llevó a nivel planetario esta   forma de explotación, ligada a  los  símbolos de progreso, civilización   y cristianismo. Las consecuencias están a la  vis ta: es lo que lo que ha   dado en llamarse la crisis  ambiental.  C onsec u enc i a s a m b i en ta l es del   des a r oñ l o moder no \n- 129 -  Esta manera de comprender la crisis no es todavía muy aceptada. Se   prefiere    entenderla  más  bien  como  una  consecuencia  necesaria  del    desarrollo técnico,  que  puede solucionarse por igual con medidas téc -  nicas. Los delegados  tercermundis tas a la Conferencia Internacional   de Estocolmo le dieron un giro original a la  argu mentación. Prefirie -  ron ver en los problemas ambientales del Tercer Mundo la  con secuen -  cia de la pobreza. La manera de superarlos no era otra que el mismo   desarrollo que se les negaba hasta el momento. Este extraño sofisma   surtió sus efectos benéficos, pero no solucionó los problemas ambien -  tales de los países pobres.  C onsec u enc i a s a m b i en ta l es del   des a r oñ l o moder no \n- 130 -  Hemos intentado repasar, a lo largo de este volumen, la historia de la   cultura,  mirándola  desde  una  perspectiva  ambiental.  Se  podría  pre -  guntar al final de este esfuerzo en qué radica la diferencia con cual -  quier  texto  tradicional  de  historia.  Ante  todo  sería  necesario  hacer    claridad sobre las limitaciones inherentes a cualquier esfuerzo que se   realice en este sentido. No es tarea sencilla desprenderse de los mé -  todos tradicionales de hacer historia. Los textos sobre los que se basa   este relato son en su gran mayoría de corte tradicional, como se puede   constatar en la  biblio grafía  anexa.  Elaborar  una  historia  ambiental  con  fuentes  arcaicas  tiene  el  incon -  veniente    de    que  las  perspectivas  que  los  autores  consultados  selec -  cionaron  para  la   construc ción  del  relato  histórico  se  fundamentan    en intereses diferentes al que preside  el  actual ensayo. Es muy difícil   rastrear entre el cúmulo de datos contenidos en  dichos  textos, los que   interesan  al  presente  tema,  como  son,  por  ejemplo,  el  estado  de   los   ecosistemas y su influencia en la formación de los sistemas cultura -  les, la  transfor mación del medio debida a la orientación de la cultura   y la manera como la  naturale za se venga de las construcciones cultu -  rales que sobrepasan sus propios  márge nes  ambientales.  Estos tres tópicos son los que interesan a un historiador que escriba   desde    la    perspectiva  ambiental.  En  este  sentido,  queda  un  gran  es -  fuerzo por realizar en  el  análisis de las fuentes. Es indispensable ini -  Conclusión \n- 131 -  ciar la labor, muchas veces tediosa,  de  recolección de datos de archivo   o  revisión  de  fuentes  secundarias  para   construir    una  historia  dife -  rente,  que  sepa  analizar  las  relaciones  entre  ecosistemas  y   siste mas   culturales. No basta, por tanto, con transformar la mentalidad con la   que  se  enfoca la historia, labor ya de por sí difícil. Es necesario iniciar   la tarea empírica  de  recolección de  datos.  El trabajo presentado en estas páginas ofrece, por tanto, esta primera   limita ción.  La  segunda  proviene  de  la  elaboración  del  método  inter -  pretativo. Falta  mucho  camino por recorrer en la construcción de un   modelo  ambiental  de  análisis.  No   es    fácil  escaparse  a  los  reduccio -  nismos de todo tipo. La perspectiva ambiental  está  atrapada entre el   reduccionismo biologista y el sobrenaturalismo de las  ciencias  socia -  les. Es difícil imaginar cómo sería una historia escrita desde la  pers -  pectiva  sociobiológica y la historia tradicional, que en general es poco   interesante,  desde  la perspectiva ambiental; porque la naturaleza no   se concibe como un sistema,  sino  como una pista de baile para la fies -  ta  humana.  En este ensayo se ha intentado poner en práctica una manera de en -  tender    el    método,  que  se  puede  resumir  en  los  tres  aspectos  antes    formulados.  Ante  todo,  la  cultura  se  forma  en  la  actividad  transfor -  madora del medio. Éste es el primer aserto. Ello significa que el deter -  minismo  geográfico  tiene  parcialmente  razón  y  sólo  es  falso  porque    es incompleto y reduce la complejidad de las causalidades históricas.  El  influjo  del  medio  se  puede  ver  con  más  facilidad  en  culturas  rela -  tivamente simples. Construir un Neolítico con maíz, perros y gansos   no  es  lo  mismo  que  organizarlo  sobre  trigo,  cebada  y  ganado  vacu -  no.  Las  pautas  culturales  toman  caminos  diferentes,  no  sólo  en  las    tecnologías  desarrolladas,  sino  también  en  el  avance  científico.  Sin    la comprensión de estos orígenes remotos de la cultura es muy difícil   C onc lusión \n- 132 -  entender lo que sucedió hace 500 años en la sumisión del continente   americano a las pautas del desarrollo europeo.  Igualmente, el influjo del medio se puede observar en la manera como   se    cons truyeron  los  grandes  imperios  agrarios.  Ya  la  historiografía    tradicional había  perci bido la similitud de rasgos en la formación de   los  grandes  imperios   euroasiáticos,    encerrados  en  valles  estrechos,    de  los  que  era  difícil  escapar  en  el  momento  de   la    explosión  demo -  gráfica de los neolíticos. Así mismo, la dieta cárnica tuvo mucho  que   ver en la formación del imperio azteca y éste es un tema que apenas   empieza  a desbrozarse.  El  segundo  aspecto  que  ha  presidido  el  presente  relato  tiene  que  ver    con    la    manera  como  los  sistemas  culturales  transforman  su  medio.    El impacto  ambiental  es quizás el aspecto más estudiado en ciencias   ambientales y el que ha  empezado  a incursionar el campo de la his -  toriografía.  La  mayor  parte  de  los  textos  que   empie zan  a  trabajar  la    historia desde una perspectiva ambiental se refiere a estos  impac tos.   Se puede llegar muy lejos en el tiempo para la elaboración del inven -  tario del ecocidio. Las tribus cazadoras son quizás responsables de la   disminución e  incluso  la extinción de muchas especies. Las culturas   neolíticas  incidieron  en   la   deforestación  de  las  cuencas.  Los  grandes    imperios  agrarios  llevaron  el   impacto    juntamente  con  sus  ejércitos,    más allá de sus  fronteras.  Aquí no se ha incorporado el análisis del impacto ambiental del desa -  rrollo  mo derno, por la sencilla razón de que no cabía en los límites del   presente  trabajo.  El tercer aspecto del método ambiental de hacer historia es el menos   estudia do  y  el  más  difícil  de  manejar.  Se  trata  de  medir  la  violencia    de los impactos  am bientales en las transformaciones de los sistemas   culturales. Es, sin embargo,  el  aspecto más interesante. ¿Cómo medir   C onc lusión \n- 133 -  la némesis de la naturaleza, la  venganza  muchas veces sutil pero con   frecuencia violenta que derriba las culturas  no adaptativas?  Algunos ejemplos de la venganza del medio natural quedaron flotan -  do  a  lo   largo    del  presente  ensayo,  para  estimular  nuevas  investiga -  ciones.  Los  suelos   salinizados    sepultan  a  Ur  de  los  caldeos.  El  agua    expulsa  a  los  mayas  de  la  selva  del  Petén.   Las    pestes  se  ensañan  en    una Europa desnutrida durante el siglo XV y la impulsan  a  romper el   estrecho círculo de sus fronteras. Los upanishads se rebelan contra el   elitismo de la dieta cárnica en los valles deforestados del Himalaya.  Todos  estos  ejemplos  posiblemente  no  pasan  de  ser  hipótesis.  Cual -  quier  construcción  histórica  lo  es,  a  no  ser  de  que  quiera  aferrarse    torpemente  a  un  empirismo  estéril.  Las  hipótesis  sostenidas  en  este    ensayo  no  quieren  presentarse,  sin  embargo,  como  exclusivas.  Las    causalidades internas de los sistemas culturales siguen teniendo im -  portancia,  para  tranquilidad  de  la  historiografía  tradicional.  Aquí  se    está  abogando  simplemente  por  la  necesidad  de  entender  también    este tipo de causalidades que vinculan los sistemas culturales con la   madre tierra.  En el momento actual, esta tercera perspectiva es quizás la más aza -  rosa y difícil de reconocer y de aceptar. De allí provienen en gran parte   los sesgos  del  ambientalismo moderno. No se quiere o se teme reco -  nocer que la crisis  ambiental  está desafiando la estabilidad del siste -  ma  cultural  en  su  conjunto.  No  es   solamente    el  aparato  tecnológico    el que está en juego. No se trata tampoco de un  problema  exclusiva -  mente ecológico. La naturaleza está amenazada junto con el hombre   y  con  la  cultura.  La timidez de las respuestas culturales a la crisis ambiental se vio con   claridad  en la Conferencia sobre Medio Ambiente y Desarrollo que se   celebró  en  Río   de    Janeiro.  Allí  los  jefes  de  Estado  y  los  diplomáticos    C onc lusión \n- 134 -  manifestaron  su   preocupación    por  la  muerte  lenta  de  la  tierra,  pero    no se quisieron examinar las causas de  la  crisis. Es preferible parape -  tarse  en  las  soluciones  exclusivamente  tecnológicas   y    dejar  intactas    las  raíces  económicas  y  sociales  del  problema  ambiental.  No  se   está   dispuesto  a  modificar  los  niveles  de  consumo  y  de  acumulación  que    son los que generan el cáncer ambiental que corroe la  tierra.  El sistema cultural no se adapta sólo por medio de herramientas  mate -  riales.  También las organizaciones sociales y las formaciones simbó -  licas  son   estrategias    adaptativas  o  desadaptativas.  La  esclavitud  fue    responsable  en  gran  medida   del    deterioro  ambiental  ocasionado  por    los imperios agrarios. La concepción del  dere cho absoluto de propie -  dad, heredado del derecho romano, está en la raíz del  des pilfarro de   recursos y del uso abusivo de los mismos. La crisis ambiental  moder -  na  está exigiendo una nueva manera de comprender y de construir los   sistemas  cultu rales del hombre. Todas las culturas, en el momento de   su ocaso, sueñan con  volver se sostenibles. La crisis ambiental no está   llamando simplemente a un acto  de  arrepentimiento, acompañado de   un propósito de buena conducta. Es necesario  repen sar la totalidad de   las formas adaptativas de la cultura, desde la tecnología hasta el  mito.  El método ambiental de interpretación histórica es todavía incipiente.   C onc lusión \nOrientación bibliográfica \n- 136 -  No  es  posible, por tanto, anexar una bibliografía especializada sobre   las relaciones  histó ricas entre ecosistema y cultura. El historiador que   se decida por esta forma interpretativa tiene que bucear en la inmen -  sa masa de material histórico para encontrar rastros que sugieran una   relación del hombre con el medio externo.  Quizás  el  método  que  más  se  acerca  a  una  interpretación  ambiental    del proceso histórico es el elaborado por Marx, quien reconoce que la   actividad humana tiene premisas en el medio geográfico que es nece -  sario estudiar. Sin embargo, en los ensayos históricos del propio Marx   y más aún en los de sus seguidores, no se aplica esta faceta ambiental   del materialismo histórico.  La  historiografía  conceptualizante,  que  se  inicia  con  L’Ecole  des  an -  nales  durante  el  período  de  entreguerra,  ha  introducido  en  algunos    de sus autores el  espa cio exterior como uno de los presupuestos de la   actividad humana. Así, para G.  Duby ,  la estructura de la sociedad no   puede  ser  comprendida  sin  un  análisis  del   espacio    que  los  hombres    ocupan. El desarrollo de los métodos científicos para la  compren sión   evolutiva de ese espacio a través de la palinología, el método glacioló -  gico o  la  dendrocronología, ha permitido entender con más precisión   la historia del clima  y  de la vida vegetal y animal y su influjo sobre las   sociedades  humanas.  Hay  que   men cionar  en  este  renglón  las  obras    pioneras de Manley, Rudolff o las  interesantes  aproximaciones de Le   Roy  Ladurie.  Bibliografía general \n- 137 -  El  estudio  de  los  instrumentos  técnicos,  impulsado  por  la  arqueolo -  gía, ha  per mitido entender mejor las relaciones instrumentales, de las   culturas con su  medio  externo. Así Gordon Childe ha proporcionado   una  nueva  interpretación  de  la   revolu ción  neolítica,  mientras  Leroi    Gourhan ha profundizado en las relaciones entre tecnología y organi -  zación  social.  El desarrollo de la ecología como ciencia ha facilitado una mejor  com -  prensión  de la manera en que las distintas sociedades han transfor -  mado  el  medio   «natural».    Esta  tendencia,  que  podría  llamarse  «his -  toriografía  ecológica»,  ha  sido   desarrolla da,  entre  otros,  por  Donald    Hughes,  K.  Butzer,  S.  Worster,  etc.  Por  lo  general,   esta    tendencia  no    intenta  establecer  los  influjos  del  medio  natural  sobre  las   organiza -  cio nes sociales, ni tampoco la manera como la racionalidad inherente   a una  formación  social influye en el manejo del medio externo. Ya la   geografía, desde Vidal de  la  Blache, se había orientado hacia la inter -  pretación del paisaje como el resultado  de  la actividad histórica y no   solamente de las causas  físicas.  Es  quizás  la  antropología  la  que  ha  avanzado  más  en  la  incorpora -  ción de  mode los ambientales para el análisis histórico. Moscovici ha   intentado una  reconciliación  entre naturaleza y cultura. Las tenden -  cias norteamericanas de la ecología y el  mate rialismo culturales han   intentado acercarse a una explicación de las relaciones  en tre ecosis -  tema  y  cultura.  Esta  tendencia,  impulsada  por  Steward  y  Harris,  se    apoya  en corrientes que vienen desde Boas y han sido desarrolladas   por  Boserup,   Carneiro,    Cohen,  Webb,  Vayda,  Rappaport  y  otros.  Por    estas razones se utilizan con  prefe rencia en el presente ensayo estas   fuentes en los períodos correspondientes.  La historia de la población es indispensable para un análisis ambien -  tal. La bibliografía a este respecto es muy extensa, pero puede verse   un resumen en Cipolla.  O r i en tac ión b i b l io gr á f ic a \n- 138 -  No existe una interpretación ambientalista de la historia del arte. Sin   embargo, la importante obra colectiva, dirigida por Huyghe, contiene   orientaciones  que  han  servido  en  el  desarrollo  del  presente  ensayo.    También han sido útiles los valiosos aportes de Hauser.  Para la historia de la ciencia este trabajo se ha basado fundamentalmen -  te  en  Bernal,  que  ha  tenido  la  habilidad  de  articularla  en  el  desarrollo    social y, en ciertas ocasiones, alude con claridad al problema  ambiental.  --------------------------  BERNAL John D., Historia social de la ciencia, Barcelona, Ed.  Península,1968.  BOSERUP E., Las condiciones del desarrollo en la agricultura, Ed.  Tecnos,   1967.  BOSERUP E., Évolution agraire et presion demographique, Paris,  1970.  BUTZER  K.,  Environment  and  Archeology,  an  Ecological  Approach   to   Prehistory, Chicago, Ed. Aldine,  1971.  CARNEIRO, «A Theory of the Origin of the State» (Science,  169,1970).  CIPOLLA  Carlo,  The  Economic  History  of  World  Population,  Pinguin    Books,  1   hecho  autónomo,  que nada tiene que ver con el medio natural. La ma -  yor parte de la historiografía y  de  la sociología está dentro de este pa -  rámetro. Se pueden citar igualmente las  co rrientes del determinismo   geográfico o del determinismo médico, desde  Hipócrates,  pasando por   Montesquieu, hasta las corrientes deterministas del siglo  pasado.  La posición asumida en el presente ensayo es el fruto de la reflexión   personal  sobre las relaciones entre ecosistema y cultura, pero se fun -  damenta en algunas  po siciones asumidas por científicos de diferentes   disciplinas. Entre los biólogos,  Dubos  y Dobzhansky; entre los antro -  pólogos, Moscovici y  Harris.  -------------------------------  El problema ambiental una   constante histórica. \n- 141 -  CALLAN, H., Ethology and Society, Oxford,  1970.  COMFORT, A., The Nature of Human Nature, N.Y,  1968.  DARWIN, Ch.,   The Descent of Man, Londres,  1971.  DOBSHANZKY, Anthropology and the Natural History, The Problem  of   Human Evolution, en Current Anthropology,  4,1963.  DUBOS, «The Limit of Adaptability», en The Environmental  Handbook,   Ballantine Books, N.Y.,  1977.  FLEW, Antony, Evolutionary Ethics, Macmillan, Londres,  1967.  HARRIS,   M. (Véase bibliografía  general).  LEWONTIN, R. C. y otros, No está en los genes, Ed.  Crítica,1987.  LORENZ,   K., Essais sur le comportment animal et humain, Seuil, París, 1970.  LORENZ, K., Behind the Mirror. A Search for Natural History of Human  Knowledge, Harcourt, N. Y., 1977.  MOSCOVICI, S. (Véase bibliografía general).  SPENCER, Herbert, Principles of Ethics, NY, 1896.  HAWLEY, A., Ecología humana, Tecnos, Madrid, 1968.  WILSON,  Edward  O.,  Sociobiology  The  new  Synthesis,  Harvard  Un.    Press,  Cambridge, Mass., 1975.  WILSON, Edward O. Sobre la naturaleza humana, F.C.E., Colección  Po -  pular, 187, México,  1980.  O r i en tac ión b i b l io gr á f ic a \n- 142 -  La historia de las tribus cazadoras ha sido revisada por antropólogos   como         const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,
            chatBubbleUserText: getReadableTextColor(accent),
            primaryColor: accent,
            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),
            headerBorderColor: border,
            systemMessageBg: isDark ? mixColors(bg, '#fde68a', 0.2) : mixColors(bg, '#fde68a', 0.28),
            systemMessageText: isDark ? '#fef3c7' : '#78350f'
        };
    }
    function buildThemePalette(theme, palette) {
        const base = palette || {
            primaryColor: '#2563eb',
            secondaryColor: '#6b7280',
            bgColor: '#ffffff',
            textColor: '#1f2937',
            cardBgColor: '#ffffff',
            cardBorderColor: '#d1d5db',
            inputBgColor: '#ffffff',
            inputBorderColor: '#cbd5e1',
            chatBubbleBotBg: '#f3f4f6',
            chatBubbleBotText: '#1f2937',
            chatBubbleUserBg: '#2563eb',
            chatBubbleUserText: '#ffffff',
            headerBorderColor: '#e5e7eb',
            systemMessageBg: '#fef3c7',
            systemMessageText: '#92400e'
        };
        const isDark = theme === 'dark';
        const bgColor = isDark ? mixColors(base.bgColor || '#ffffff', '#000000', 0.72) : '#ffffff';
        const textColor = getReadableTextColor(bgColor);
        const cardBgColor = isDark ? mixColors(bgColor, '#ffffff', 0.08) : '#ffffff';
        const cardBorderColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.16) : '#d1d5db';
        const inputBgColor = isDark ? mixColors(cardBgColor, '#ffffff', 0.06) : '#ffffff';
        const inputBorderColor = isDark ? mixColors(cardBorderColor, '#ffffff', 0.12) : '#cbd5e1';
        const chatBubbleBotBg = isDark ? mixColors(bgColor, '#ffffff', 0.12) : '#f3f4f6';
        const chatBubbleBotText = textColor;
        const headerBorderColor = cardBorderColor;
        const systemMessageBg = isDark ? mixColors(bgColor, '#fde68a', 0.2) : '#fef3c7';
        const systemMessageText = isDark ? '#fef3c7' : '#92400e';
        return {
            ...base,
            bgColor,
            textColor,
            cardBgColor,
            cardBorderColor,
            inputBgColor,
            inputBorderColor,
            chatBubbleBotBg,
            chatBubbleBotText,
            headerBorderColor,
            systemMessageBg,
            systemMessageText
        };
    }
    function setPaletteVariables(target, palette) {
        if (!palette) return;
        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');
        target.style.setProperty('--bg', palette.bgColor || '#f8f9fa');
        target.style.setProperty('--text', palette.textColor || '#343a40');
        target.style.setProperty('--card', palette.cardBgColor || '#ffffff');
        target.style.setProperty('--border', palette.cardBorderColor || '#dddddd');
        target.style.setProperty('--input', palette.inputBgColor || '#ffffff');
        target.style.setProperty('--iborder', palette.inputBorderColor || '#cccccc');
        target.style.setProperty('--bot-bg', palette.chatBubbleBotBg || '#e9ecef');
        target.style.setProperty('--bot-text', palette.chatBubbleBotText || '#343a40');
        target.style.setProperty('--user-bg', palette.chatBubbleUserBg || '#007bff');
        target.style.setProperty('--user-text', palette.chatBubbleUserText || '#ffffff');
        target.style.setProperty('--sys-bg', palette.systemMessageBg || '#fff3cd');
        target.style.setProperty('--sys-text', palette.systemMessageText || '#856404');
    }
    function applyPalette(palette) {
        currentPalette = palette;
        applyTheme(currentTheme);
        localStorage.setItem('downloaded-palette', JSON.stringify(palette));
    }
    function applyTheme(t) {
        currentTheme = t;
        document.body.classList.toggle('dark-mode', t === 'dark');
        themeBtn.textContent = t === 'dark' ? '☀️ Tema' : '🌙 Tema';
        const effectivePalette = buildThemePalette(t, currentPalette);
        setPaletteVariables(document.body, effectivePalette);
        setPaletteVariables(document.documentElement, effectivePalette);
        document.body.style.backgroundColor = effectivePalette.bgColor;
        document.body.style.color = effectivePalette.textColor;
        localStorage.setItem('theme', t);
    }
    themeBtn.addEventListener('click', () => { const n = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(n); });
    paletteBtn.addEventListener('click', () => { applyPalette(generatePalette()); });
    const savedPalette = JSON.parse(localStorage.getItem('downloaded-palette') || 'null');
    if (savedPalette) { applyPalette(savedPalette); }
    else if (INITIAL_PALETTE) { applyPalette(INITIAL_PALETTE); }
    else { applyPalette(generatePalette()); }

    // Second PDF (embedded or user-loaded)
    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }
