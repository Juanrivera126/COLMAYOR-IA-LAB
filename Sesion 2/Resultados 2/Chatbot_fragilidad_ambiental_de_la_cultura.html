s agrícolas.  La  prin -  cipal forma de ocupación del espacio en Grecia fue la agricultura, y los   griegos    desarrollaron  técnicas  para  la  conservación  y  la  renovación    del  suelo,  como  los   cul tivos  de  terraza,  la  rotación,  el  uso  de  fertili -  zantes, etc. El avance de las  técnicas  agrícolas permitió un aumento   rápido de la población y con seguridad la  multiplica ción de los espa -  cios urbanos fue una de las características de la civilización  griega.  Las  condiciones  ambientales,  especialmente  la  presión  de  una  po -  blación    cre ciente  sobre  un  suelo  empobrecido,  debieron  influir  en  la    diáspora griega a lo  largo  del Mediterráneo. Por la misma época en la   que  los  neolíticos  monzónicos  y   del    cercano  Oriente  habían  iniciado    revoluciones culturales que se conservan hasta  el  momento presente,   la cultura griega encuentra los símbolos básicos que servirán  de  fun -  damento  a  la  cultura  occidental  y  a  su  manejo  del  entorno  natural.    Entender  esta  estructura simbólica es tan importante para un análi -  sis ambiental corno el  estudio  de las tecnologías del Neolítico o de la   máquina de  vapor .  El  influjo  griego  para  el  manejo  posterior  de  los  ecosistemas  consis -  tirá,  más   en    los  instrumentos  simbólicos  que  plasmaron  y  transmi -  tieron, en las herramientas  de  trabajo. Hoy el hombre vive todavía de   las herramientas neolíticas, de los  instrumen tos sociales elaborados   por  los  grandes  imperios  agrarios  (subordinación  del   tra bajo  y  orga -  nización del Estado) y de las ideas griegas. La revolución industrial  ha   empezado a organizar nuevas tecnologías, nuevas ideas y formas dife -  rentes de  ex plotación de la mano de obra; pero los elementos básicos   del pasado aún  perduran.  Todavía nos asomamos a la naturaleza con   un rostro  griego.  Gr ec i a y l o s esta d o s c om erc i a l es \n- 42 -  Los  descubrimientos  teóricos  de  los  griegos  no  se  debieron  a  su  in -  nato    inge nio,  transmitido  a  través  de  escondidos  genes.  Fue  quizás    su condición de colonizadores y de comerciantes la que los colocó en   circunstancias  de  abstracción  superiores  a  las  culturas  míticas  del    Neolítico o de los imperios agrarios. En un principio, fueron ante todo   etnógrafos quienes tuvieron la oportunidad de someter a análisis las   diferentes  culturas  y  elaboraciones  simbólicas,  ricamente  cubiertas    con el ropaje ambiguo del mito. De allí sacaron conclusiones acerca de   la naturaleza y del hombre.  También  perfeccionaron  la  escritura  alfabética  tomada  de  los  feni -  cios, que representa un instrumento de alto nivel de abstracción para   el manejo de la memoria social, mucho más perfeccionado que el que   habían encontrado los sacerdotes sumerios cuando necesitaron con -  servar el recuerdo de los préstamos hechos a los campesinos. Las ma -  temáticas del comerciante eran, por exigencia, mucho más complejas   que los simples números del  prestamista.  Los  imperios  agrarios  habían  organizado  el  Estado,  pero  no  habían    elaborado    una  teoría  abstracta  que  permitiese  entender  las  relacio -  nes  establecidas  por   los    hombres  ante  la  ley.  Quizás  el  primero  de    los descubrimientos simbólicos del  mun do griego, una vez forjado el   instrumento material de la escritura, fue la  configura ción del derecho   abstracto.  Las  luchas  sociales  surgidas  con  el  desarrollo  de   la    colo -  nización  griega  exigieron  la  construcción  de  un  nuevo  instrumento    que  permitie se entender las relaciones entre los hombres. Ésta fue la   obra de los juristas  del  siglo VII a.C. El planteamiento de que todos los   hombres son iguales ante la  ley  (isonomía) fue tan importante como   cualquier  herramienta  neolítica.  Es  un   instru mento  construido  cul -  turalmente;  supone  una  elaboración  tan  abstracta  de  las   rela ciones   entre los hombres como la que transmite la escritura alfabética. La ley   se  concibe, no ya como un maná personal, sino como un espejo abs -  Gr ec i a y l o s esta d o s c om erc i a l es \n- 43 -  tracto que refleja por igual todos los comportamientos  individuales.  Pero  el  derecho,  como  instrumento  de  cohesión  entre  los  hombres,    exigía, a  su  vez, una justificación teórica. Surgen entonces, inmedia -  tamente  después  de  los   gran des  juristas,  esas  formulaciones  lanza -  das sobre el ágora, que reinterpretan el  mun do natural y social. A ese   conjunto  de  reflexiones  se  las  cubre  hoy  con  el  nombre   de    filosofía.   Representaban de todos modos un nuevo tipo de racionalidad. un  pa -  radig ma diferente de aproximación a la acción humana y al entorno   natural.  Planteaban  que tanto la tierra como la acción humana eran el   fruto de diferentes factores  natura les y no de voluntades míticas ex -  trañas al entorno del hombre. En ese sentido  eran  herramientas peli -  grosas que, como lo comprendió Platón, descuajaban las  viejas  selvas   míticas  sobre  las  que  había  estado  asentada  la  cultura.  Enfrentarse    al    mundo    natural  con  un  instrumento  «racional»  de  análisis  podía    considerarse en alguna  for ma subversivo. Decir que el sol -comentaba   Platón- era una piedra incandescente  y  no Apolo el de dorados cabe -  llos, era un error en tiempo de paz y una traición  en  tiempo de  guerra.  El  hallazgo  del  individuo  y  de  la  acción  personal  fue  otro  de  los   ins -  trumentos    simbólicos  legados  al  futuro  por  los  griegos.  Heráclito  lo    formuló  en  una  frase   exac ta:  El  único  demonio  para  los  hombres  es    su propio temperamento. Ello significaba que la actividad humana no   dependía  de  mediaciones  externas  y  que,  por  lo  tanto,  cada  uno  era    responsable de sus propios demonios. Era un hallazgo al mismo tiem -  po jubiloso y trágico. Sobre él se construirán tanto el gozo epidérmico   de la lírica, como el doloroso enfrentamiento de la tragedia. El hombre   se hallaba solo frente a sus responsabilidades, pero también frente a   sus propios fantasmas.  Este  proceso  de  racionalización  y  desacralización  afectó  también  el    pensamiento  tecnológico.  Todavía  en  Homero  el  término  tekhné  se    aplica por igual al conocimiento de los artesanos y de los metalurgos,   a  la  magia  de  Efestos  y  de  Proteo,  y  a  las  prácticas  esotéricas  de  los    Gr ec i a y l o s esta d o s c om erc i a l es \n- 44 -  adivinos, aedas y curanderos. En la época clásica ya se había logrado   la  completa  secularización  del  concepto.  La  técnica  es  un  que  hacer    humano, sin influjo del azar, del Moira divino o de los daimones, y se   debe  exclusivamente al saber práctico del  artesano.  Este movimiento de secularización del pensamiento fue llevado a su   máxima    expresión  por  los  sofistas  que  reflejan  el  punto  final  del  ra -  cionalismo  griego.   Los    sofistas  redactaron  manuales  para  transmitir    el acervo de conocimientos  técnicos.  Divulgada por los libros, la tec -  nología se libera de los ambientes cerrados del  eso terismo religioso y   se constituye en un campo abierto (ágora) para la política y  el  apren -  dizaje. Por primera vez, como dice Espinas, podemos hablar de  tecno -  logía  como reflexión sobre la práctica. Los sofistas intentaron incluso   reducir  el  lenguaje   a    técnicas  que  fueran  el  medio  para  la  conquista    del poder político en la  democracia.  Quizá  no  es  posible  entender  el  manejo  técnico  del  mundo  moderno    sin  las   he rramientas  físicas  creadas  por  la  cultura  neolítica,  pero  es    igualmente  difícil  entenderlo  sin  los  instrumentos  simbólicos  elabo -  rados  por  los  griegos.  Lo  curioso  es   que    ese  esfuerzo  de  racionaliza -  ción murió sepultado de nuevo bajo el manto  frondoso  del mito. Como   lo expresó Platón, la sociedad no puede vivir sin mitos y si no  exis ten   es necesario crearlos de nuevo. Él mismo se dedicó de forma paciente   a  orga nizarlos. La verdadera sabiduría pasó a ser el conocimiento de   las  esencias   inmu tables,  dejando  a  la  caprichosa  opinión  el  estudio    inútil  y  perjudicial  de  la   naturaleza    móvil.  El  pensamiento  europeo    necesitará  repetir  de  manera  fatigosa  los  pasos   de    la  secularización    científica para lograr el manejo del mundo natural y, a pesar  de  todo,   el hombre todavía no ha logrado ser insertado en el  cosmos.  Gr ec i a y l o s esta d o s c om erc i a l es \n- 45 -  La dispersión del espacio griego y la competencia entre las ciudades   trajeron  la intensificación de la actividad comercial. De ser una pacífi -  ca sociedad  agraria,  Grecia primero se convirtió en un conglomerado   de estados comerciales y  luego,  por obra y gracia del dominio mace -  dónico,  en  un  primer  imperio  comercial   herede ro  y  competidor  del    esfuerzo  fenicio.  La  lucha  interna  entre  las  ciudades,  que   favo reció   en  la  primera  etapa  competitiva  de  acicate  al  comercio,  se  convirtió    después,  sobre todo a raíz de las guerras del Peloponeso, en un obstá -  culo para la  actividad  comercial. Ésta es una de las razones del fuerte   viraje  hacia  la  constitución  de  un  espacio  unificado  a  través  de  las    conquistas macedónicas. Las ciudades griegas acabaron por entregar   los  símbolos  de  sus  antiguas  libertades,  sacrificando  incluso  sus  va -  liosas  conquistas  ideológicas  con  tal  de  seguir  disfrutando,  aunque    fuese por poco tiempo, de su situación privilegiada en el intercambio   comercial del Mediterráneo. El mundo de las libertades se había ago -  tado.  Se  requería  un  espacio  seguro  que  impulsara  el  comercio  y  el    contacto entre los pueblos, pero ya no dentro de la competencia, sino   bajo  la  autoridad.  El  ocaso  de  la  libertad  sofista,  sepultada  de  nuevo    por el mito platónico, tiene mucho que ver con esa nueva exigencia del   espacio comercial.  Roma  entró  en  escena  con  las  grandes  guerras  de  los  siglos  III  y  II    a.C.,  que  desplazaron  la  competencia  fenicia  y  después  la  griega.  La    colonización romana, en contraposición con la griega, lleva consigo el   Roma y los Imperios Comerciales \n- 46 -  dominio político y económico  de  los pueblos conquistados. Roma con -  cluye la labor iniciada por los fenicios y  los  griegos y acaba unifican -  do  bajo  su  férula  la  totalidad  del  Mediterráneo.  Ese  es   su    significado   histórico.  Esta  profunda  transformación  del  escenario  mediterráneo    trae  consigo la rápida reestructuración de las instituciones romanas.   El  democrático  pueblo de campesinos se convierte en centro eficiente   de hegemonía  internacional.  Ese papel difícilmente lo podía jugar con   las luchas parroquiales entre plebeyos  y  patricios en el foro romano.   Se requería de un poder centralizado que empezó  a  dibujarse con Sila   y se consolidó con  Augusto.  El mando imperial responde, desde el punto de vista político, a las  exi -  gencias    de  las  hegemonías  económicas.  La  concentración  de  la  pro -  piedad se acelera y  la  sumisión del trabajo servil se refina. En tiempo   de Nerón, la mitad de la provincia  de Á frica pertenecía a seis ciudada -  nos romanos que manejaban a través de intermediarios sus extensos   dominios esclavistas. Lo mismo puede decirse de los  grandes  trigales   de Sicilia. El comercio, la recaudación de impuestos y el saqueo de  las   provincias  se  convirtieron  en  un  jugoso  sistema  de  enriquecimiento    personal.  El  Estado serio y cada vez mejor organizado jurídicamente,   servía también de  escena rio para la rapiña de los funcionarios públi -  cos, que luego pasaban a disfrutar  en  privado de sus inmensas rique -  zas y servían de apoyo gratuito al poder  imperial.  En esta forma, Roma se convirtió en el eje del saqueo mediterráneo.   Esta    sen sación  de  un  inmenso  pulpo  que  absorbe  materias  primas,    alimentos, riquezas  y  costumbres, se encuentra reflejada en la mayor   parte de los autores de la  época  imperial. Muy pocos de ellos tienen   un canto de alabanza para el nuevo poder  urba no. Livio se refugia en   el pasado para olvidar las desventuras del presente.  Tácito  no puede   ocultar su desdeño por el servilismo de la corte imperial. Juvenal  ocul -  ta  sus odios en la Sátira y Catulo mezcla sus celos con el odio hacia el   R om a l o s i m p r eio s c om erc i a l es \n- 47 -  saqueo de  las  provincias por parte de los favoritos de César. La belleza   cautivadora  de  la   literatu ra  romana  se  debe,  en  contraposición  a  la    griega, a ese dejo de ironía y de  nostal gia que suscita el surgimiento   del  imperio.  Desde  Lucrecio  hasta  Suetonio,  no   hay    sino  ocasionales    páginas épicas que, por lo general, están cargadas de un  pesado  estilo   cortesano o de los recuerdos de la grandeza  pasada.  Roma se había convertido en el centro no sólo del odio de los suyos,   sino  de  la  riqueza  y  la  adulación  de  las  provincias.  En  efecto,  todo    confluía  en  ella.  Esa  misma  ciudad  que  según  Tácito  atraía  hacia  sí    todo  lo  que  de  execrable  había  en  el  mundo,  era  también  el  centro    de confluencia de los productos provinciales. Los metales llegaban de   España, Galia y la Dacia; el trigo era abastecido por Egipto y Sicilia, las   frutas por África y Persia.  La paz romana, necesaria para mantener ese inmenso pillaje, era sos -  tenida  con  la  fuerza  de  un  ejército  cada  vez  mayor  y  más  exigente.    El  Imperio  romano  representa  al  mismo  tiempo  la  grandeza  y  la  de -  cadencia  que  conjuga  la  habilidad  técnica  del  hombre  neolítico,  los    sistemas centralizados de poder de los imperios agrarios y la herencia   cultural de Grecia. Las carreteras romanas fueron el  camino  de la ci -  vilización, pero también del saqueo. La orgía de sangre en el Coliseo   sacri ficaba  las  especies  animales  de  todo  el  mundo  conocido.  En  su    inauguración,  el  pueblo pudo presenciar, durante cien días de regocijo   sangriento, el sacrificio  de  9.000 animales traídos de todo el  mundo.  En la ciudad de Roma confluían, no sólo la riqueza de todas las provin -  cias,  sino  también la miseria de los desplazados del campo. Durante   los primeros siglos  del  imperio Roma se fue convirtiendo en una in -  mensa ciudad, sin paralelo en la  historia  anterior, que pudo contar en   su momento de esplendor con cerca de un millón  de  habitantes. Los   problemas  urbanísticos  son  muy  similares  a  los  de  cualquier   ciudad   R om a l o s i m p r eio s c om erc i a l es \n- 48 -  moderna. La satisfacción de los servicios básicos se convirtió en una   pesadilla    con tinua  para  el  poder  imperial.  El  agua  había  que  traerla    cada vez desde lugares  más  distantes. La inmensa cloaca, de cerca de   cuatro metros de boca, botaba al Tíber el agua servida sin ningún tra -  tamiento. La estrechez de las calles y la congestión del  tráfico  llegó a   ser tal, que tuvo que ser objeto del control estatal. Según Juvenal, sólo   siendo  rico  se podía dormir en Roma. Tal era el estrépito de los coches   y de los  cocheros.  Esta inmensa civilización traía consigo los gérmenes de su propia  des -  trucción.    Roma  no  tenía  para  pagar  las  continuas  demandas  de  los    productos    provinciales    sino  con  el  oro  y  la  plata  de  sus  minas,  que    venían agotándose. El tesoro imperial  se  encontraba en déficit perma -  nente desde finales del siglo II a.C. La moneda se  des valorizaba con -  tinuamente. Las crisis obligaban a los emperadores a intervenir  cada   vez más en la vida económica. Las clases medias rurales arruinadas   abandonan  el  campo. Durante el siglo III a.C., los emperadores insta -  laban a las tribus bárbaras  en  las tierras abandonadas o se las entre -  gaban a los magistrados, obligándolos  bajo  multa a la producción. El   poder se concentraba, pero la producción de tierras  agotadas  y de una   organización social impuesta por la fuerza del ejército y de la religión   no  res pondía ya a las exigencias de una población creciente. El Impe -  rio romano se  desintegraba,  dejando atrás una de las crisis sociales y   ambientales más graves de la  historia.  El agotamiento del suelo y demás recursos naturales de la Roma impe -  rial  difí cilmente se puede explicar sin tener en cuenta la organización   social  de  la   produc ción.  La  tecnología  romana,  excepto  en  construc -  ción  edilicia,  avanzó  muy  poco.  En  el  camino  de  la  conquista  de  los    pueblos  «bárbaros»,  los  romanos  en  ocasiones  encontraron  culturas    con un manejo más avanzado de la actividad agraria, como los germa -  nos.  No  se  requiere  un  desarrollo  tecnológico  muy  avanzado  cuando    se vive del saqueo de las provincias y de la explotación de la esclavitud.   Gr ec i a y l o s esta d o s c om erc i a l es \n- 49 -  Ese  desequilibrio  entre  desarrollo  tecnológico  y  organización  social    cooperó  posiblemente  con  la  decadencia  del  imperio.  Quizás  el  ago -  tamiento  del  suelo  fue  la  herencia  ambiental  más  grave  del  Imperio    romano, tal como lo reconoce un historiador perspicaz como es Rosto -  vseff. El agotamiento de los suelos se debió precisamente a este des -  equilibrio entre tecnología y organización esclavista. La acumulación   a distancia de cualquier imperio colonial, no suele preocuparse por el   deterioro ambiental de los países sometidos.  R om a l o s i m p r eio s c om erc i a l es \n- 50 -  Estas  causas  se  conjugan  con  muchas  otras  para  determinar  uno  de    los  cam bios históricos más bruscos y más difíciles de explicar dentro   de una teoría del  pro greso indefinido. El paso a lo que los escritores de   la  Ilustración  empezaron  a   lla mar  desdeñosamente  «la  Edad  Media»    significa, sin duda, una contracción en  el  proceso histórico de ocupa -  ción y manejo del espacio  «natural».  Una  contracción  exigida,  entre  otras  razones,  por  la  incapacidad  de    los    ecosistemas  para  soportar  una  presión  continua  de  saqueo,  sin    los  medios   técni cos  suficientes  para  evitar  su  agotamiento.  La  Edad    Media regresa a la aldea  cam pesina, el comercio se reduce a las míni -  mas exigencias, las ciudades  desaparecen  o pierden importancia. La   misma Roma vuelve a ser una aldea. La agricultura y  la  economía de   subsistencia vuelven a ser las actividades normales que rigen el com -  portamiento  social.  Sin  embargo,  no  era  la  primera  vez  que  se  derrumbaba  una  civiliza -  ción  urbana,  construida sobre la explotación del medio ecosistémico.   Casi todos los  intentos  anteriores por construir la ciudad, superando   los  límites  potenciales  de   los    ecosistemas  inmediatos,  habían  fraca -  sado. La civilización de Ur o la del Indo,  por  citar sólo estos ejemplos,   habían desaparecido por circunstancias parecidas,  des de el punto de   vista ambiental, a las que ocasionaron la erosión del Imperio  romano.  El medioevo y los descansos  del saqueo \n- 51 -  Se han estudiado muy poco las causas ambientales de estos fenóme -  nos  histó ricos, que en general se han atribuido a invasiones externas   o a razones internas  de  debilitamiento social o cultural, y ello a pesar   de  que  algunos  historiadores   moder nos  reconocen  cada  vez  más  las    consecuencias  ambientales  de  las  grandes   forma ciones  sociales.  La    explicación ambiental, por supuesto, no pretende disminuir  la  impor -  tancia de las otras causales    históricas. Sólo busca hacer comprender   que  las luchas hombre no se dan sobre un escenario sin modificar y   que la acción  sobre  este escenario repercute necesariamente sobre las   formaciones  sociales.  Es posible que la causa principal de la decadencia del Imperio roma -  no y de  la  formación de la sociedad feudal fuese socioeconómica. La   sociedad esclavista  había  logrado superar sus crisis gracias a la con -  solidación  de  un  poder  centralizado  que  se  apoyaba  en  los  grandes    latifundios  y  que  por  supuesto  los  defendía  a  través  de  un  sistema    represivo cada vez más complejo. No obstante, el latifundio llevaba en   sí los gérmenes de la desintegración del Estado. La renovación impe -  rial  emprendida  por  Dioclesiano  y  Constantino  pretendía  «petrificar    las  estructuras  sociales»,  haciendo  hereditaria  la  división  social  del    trabajo.  Desde  mediados  del  siglo  IV  se  consolida  el  colonato,  entendido    como el sistema de tenencia que liga los campesinos a la tierra. Los   campesinos  libres  y  los  esclavos  son  absorbidos  por  los  patronatos    (patronicium).  Las  organizaciones  del  Estado  se  convierten  en  una    máquina para acelerar y mantener la concentración de la propiedad.   Bajo su peso omnipotente van desapareciendo los últimos  vestigios   de democracia. Desde el tiempo de Tiberio, las asambleas del pueblo   habían  per dido toda importancia. Septimio Severo destruye la opo -  sición senatorial y  suprime  los últimos restos de la democracia mu -  nicipal. El derecho natural estoico no  preser va al individuo contra la   omnipotencia del  Estado.  E l m edioevo y l o s des c a ns o s del s aqu eo \n- 52 -  El crecimiento del Estado centralizado, construido sobre la gran pro -  piedad,    lle va  en  sí  los  gérmenes  de  su  propia  decadencia  y  tiene  un    inmenso impacto sobre  el  medio ambiente. La presión fiscal, especial -  mente ejercida sobre las ciudades,  inci ta a los poderosos a abandonar -  las. La responsabilidad colectiva de los  impuestos  es al mismo tiem -  po una forma de fortalecer el patronato y de fortificar la  sujeción  del   campesino a las tierras del señor. Los esclavos empiezan a convertir -  se en  sier vos casati, con una parcela hereditaria para cultivar. Desde   el siglo IV los  grandes  propietarios tienden a organizar su propiedad   como  una  unidad  independiente  desde  el  punto  de  vista  económico,    social y político. Organizan un cuerpo policial a  su  servicio y ejercen   el derecho de  jurisdicción.  La sociedad feudal depende pues, en buena medida, de la desintegra -  ción    so cial  del  Imperio  romano.  Por  otro  lado,  es  necesario  tener  en    cuenta los influjos  de  las tribus germánicas, que acaban por invadir el   viejo imperio y posesionarse de  él.  Los pueblos germánicos habían al -  canzado el nivel de estados, con poderes  centra les constituidos. Algu -  nas de las tribus se habían establecido en la Europa central  de  tiempo   atrás y habían logrado asentarse en tierras muchas veces arrancadas   a  la  selva y a los pantanos. Habían desarrollado una agricultura técni -  camente  avan zada con arados profundos y cu1tivos que se alternaban   cada tres años para  con servar la fecundidad de los suelos. Cultivaban   el  centeno  y  la  avena  pero  no  el   trigo    ni  la  cebada,  comunes  en  los    campos  romanos.  Las diferencias entre las tierras de la Europa central y los campos  do -  mestica dos de Italia no se les escaparon a los juiciosos observadores de   la época,  como  César o Tácito. Acostumbrados a los campos roturados   del  imperio,  Tácito  sólo   ve    en  las  tierras  germánicas  «selvas  espanto -  sas y pantanos infestos» (Aut silvis  horrida  aut paludibus foeda). Esta   manifestación  de  asombro  es  uno  de  los  únicos   testimo nios  sobre  el    E l m edioevo y l o s des c a ns o s del s aqu eo \n- 53 -  estado de las tierras, antes de las grandes roturaciones. Sin embargo,   dentro de este paisaje que desagradaba el gusto civilizado de los ro -  manos,  los  germanos  lograron  desarrollar  una  agricultura  que  tuvo    en cuenta las condiciones ecológicas. Si no avanzaron más sobre los   bosques,  no  se  debió  posiblemente  a  la  imposibilidad  técnica,  sino  a    lo  que  algunos  historiadores  han  llamado  «temibles  supersticiones»,    que  no  eran  tal  vez  sino  orientaciones  míticas  para  un  manejo  más    adecuado del medio. Los bosques que dividían las tribus eran de uso   común y sus encinas servían de alimento a los cerdos.  Sin  embargo,  este  cuadro  puede  parecer  idílico.  De  hecho  es  difícil    acercarse  a  las  costumbres  agrícolas  de  las  tribus  primitivas  y  es    posible,  de  acuerdo  con  otras  versiones  históricas,  que  las  invasio -  nes  germánicas  hayan  sido  ocasionadas,  al  menos  en  parte,  por  la    dificultad de obtener alimento en las condiciones de una  agricul tu -  ra  precaria.  No  se  tienen  datos  sobre  la  población  germánica.  Sólo    se sabe  que  sus asentamientos estaban muy espaciados en aglome -  raciones  urbanas   relativa mente  pequeñas  y  desordenadas,  al  me -  nos para el gusto romano. Era una  econo mía rural reducida, sin un   proceso  importante  de  urbanización  y,   consecuentemente,    con  un    comercio  muy  escaso.  Tácito  se  extrañaba  de  que  los  germanos  no    conocie ran  la  especulación  monetaria.  La  palabra  que  designa  en    alemán (Kaufmann),  «co merciante», es de origen  romano.  Estas  costumbres  primitivas  no  perduraron,  más  allá  de  lo  que  pudo    hacer    la    cultura  germánica,  poco  a  poco  infiltrada,  tanto  por  las  cos -  tumbres romanas,  como  después por el cristianismo monacal. La pene -  tración romana no se debió sólo  al  contacto bélico. Hubo también una   penetración  silenciosa  que  obedecía  a  la   seduc ción  del  imperio  y  a  la    creciente necesidad de mano de obra. Desde los Antoninos empezaron   a  ser  reclutados  con  desconfianza  en  el  ejército  y  poco  a  poco  se   les   permitió  asentarse  en  comunidades  agrarias  dentro  de  las  fronteras.    E l m edioevo y l o s des c a ns o s del s aqu eo \n- 54 -  La  región   Mosela    bañada  por  el  Mosa  y  el  Rin  se  convirtió  pronto  en    el  centro  más  importante   de    romanización,  hasta  tal  punto  que  los    emperadores del siglo IV no tuvieron  inconveniente  en reemplazar a   Roma por la bárbara Tréveris, corno sede del gobierno  imperial.  Más al nororiente se perdían en la leyenda las tierras de Escandinavia,   a  las  que los romanos imaginaban como «islas peligrosas». Estas lla -  nuras habían  sido  sometidas a una agricultura primitiva desde la edad   de hierro y su población  había  crecido muy por encima de las posibi -  lidades de producción de sus suelos fríos.  De  esas tierras misteriosas   surgieron casi todos los pueblos que se precipitaron  sobre  las fértiles   llanuras  del  sur:  vándalos,  burgundios,  rugios,  godos,  que   presiona -  ron    sobre  el  imperio  a  las  tribus  asentadas  allí  durante  cerca  de  mil    años. Una de  esas  oleadas se precipitó sobre el Mar Negro y dio origen   a los visigodos y a  los  ostrogodos. Cuatro siglos más tarde, durante el   siglo IX, se desprenderán las  últi mas migraciones de los hombres del   norte.  Algunas  de  ellas  siguieron  el   mismo    recorrido,  para  fundar  el    primer reino ruso de Kiev. ‘Rusos’ era una de las  denomina ciones que   ellos mismos se  daban.  Otros  se  lanzaron  directamente  al  saqueo  de  las  tierras  del  sur,  o  a    la conquista y colonización del oeste, en un maravilloso viaje de pe -  netración que los llevó al descubrimiento de Islandia, Escandinavia   y América del Norte. No se trataba de pueblos emigrantes por afición   cultural. Sus migraciones significaban más bien un periplo trágico en   búsqueda de tierras fértiles. Su tragedia ha sido posiblemente una de   las  más  engañosas  tergiversaciones  de  la  historia.  Presionados  por    las  tribus  del  oeste,  los  ostrogodos  y  los  visigodos  por  fin  lograron    establecerse en las penínsulas sureñas de Europa.  Otro tanto puede decirse de las tribus del oeste que emigraron por cir -  cunstancias  ambientales  muy  parecidas  y  mantuvieron  en  jaque  du -  rante muchos siglos la parte oriental de Europa. Los iranios (sármatas   E l m edioevo y l o s des c a ns o s del s aqu eo \n- 55 -  y alanos) huyendo de sus tierras secas, los mongoles, (hunos y avaros)   y más tarde los eslavos y húngaros,  todos  ellos confluyen en las plani -  cies de Europa. En general se ha dedicado muy  poca  atención histórica   a las explicaciones ambientales de las grandes migraciones  bár baras.   Las explicaciones culturales satisfacen hasta cierto punto, pero dejan   la  sen sación de una teoría  inconclusa.  El  cruce  de  tradiciones  y  de  tecnologías  fue  sin  duda  un  importante    crisol  para  la construcción de la cultura europea y occidental. Los go -  dos  trajeron  los   motivos    zoomorfos  y  fitomorfos  del  arte  escita  que    tuvieron  tanto  influjo  en  el  arte   románico.    Los  iranios,  por  su  lado,    llegaron  montados  a  caballo  para  enfrentar  a  los   ejércitos    romanos   y francos, predominantemente de infantería. ¿Cómo imaginar el  feu -  dalis mo sin caballos y sin caballeros o sin los motivos zoomorfos de   su arte? En  adelan te, un hombre libre será sólo aquel que tenga la su -  ficiente fortuna para alistarse  con  su caballo en el ejército nobiliario.   La importancia de la visión irania sobre la naturaleza a través de sus   imágenes zoomorfas, que reproducen los temores humanos  y  la pre -  sencia social del caballo, generalizado por las invasiones mongólicas,   son  algunos de los motivos ambientales que no es posible menospre -  ciar en el  estudio  de la época  feudal.  La importancia histórica de esta época, tan desdeñada por las  teorías    iluministas,  radica  en  haber  servido  de  confluencia  a  las  más  dife -  rentes    culturas,    que  se  establecen  con  una  experiencia  de  sedenta -  rización  agrícola,  después   de    largas  y  agotadoras  migraciones  o  del    cansancio del saqueo  romano.  La  época  feudal  es  el  período  por  excelencia  de  la  experiencia  agra -  ria,  en   un    sentido  muy  distinto  a  lo  que  fue  la  sedentarización  del    Neolítico.  Durante  el   Neolítico    la  cultura  estuvo  íntimamente  ligada    a  la  transformación  agraria  de  los   ecosistemas.    El  mundo  simbólico    E l m edioevo y l o s des c a ns o s del s aqu eo \n- 56 -  y  la  organización  social  eran  instrumentos  eficaces  para  la   trans for -  mación  del  medio,  muy  relacionados  con  la  producción  tecnológica.    El  período  feudal, por el contrario, es la síntesis de una vieja cultura   imperial de saqueo,  mez clada con ingredientes culturales de pueblos   que  ya  habían  superado  la   ‘democra cia’  neolítica,  pero  no  se  habían    organizado  todavía  en  el  saqueo  sistemático   del    colonialismo.  Todo    ello aglutinado por una ideología de amalgama como el  cristia nismo   que, gracias a las concesiones hechas a su radicalismo primitivo, ha -  bía  logrado  reemplazar  a  las  filosofías  y  religiones  del  imperio  para    servir de cimiento a la nueva sociedad.  La colonización agraria del campo europeo fue lenta. Durante la pri -  mera  epoca  predominó  la  experiencia  de  campesinos  libres,  asenta -  dos en los vicios pequeñas aldeas, que poco a poco fueron absorbidos   por los grandes latifundios de las villae. La formación de los latifun -  dios fue. la continuación de los patrocinios romanos y representa de   forma directa esta tradición. Se consolidó el latifundio, salvo algunos   paréntesis tempestuosos, como la invasión normanda del siglo IX que   lo desestabilizó de momento.  Los campesinos libres se fueron entregando poco a poco a la «protec -  ción»    de    los  grandes  señores,  y  cuando  no  se  entregaban  eran  fácil -  mente sometidos. En  esa  forma se conformó esa extraña relación de   subordinación y dominio que  caracterizó  la sociedad feudal. La con -  solidación de un Estado centralizado, en tiempos de  la  dinastía Caro -  lingia, sirvió como herramienta política para romper la resistencia  de   los  campesinos  libres,  a  favor  de  la  gran  propiedad.  Los  bárbaros  no    fueron  siem pre los conquistadores. Muchos de ellos penetraron en la   nueva sociedad  como  mano de obra, a la manera de los migrantes de   la Europa actual. La ampliación  de  la frontera agrícola se siguió reali -  zando durante mucho tiempo con mano de  obra  esclava, en especial   bárbara y sometida al dominio  privado.  E l m edioevo y l o s des c a ns o s del s aqu eo \n- 57 -  En un principio, la tierra de nadie (Niemandsland) parecía inagotable.   Sin    em bargo,  a  medida  que  sus  límites  empezaron  a  manifestarse,    las  comunidades   tuvie ron  que  organizarse  para  disfrutar  en  común    los recursos boscosos, sin agotarlos. Por lo general, esta conquista se   llevó a cabo a través de lo que podría llamarse  hoy  una colonización   dirigida.  La  sociedad  feudal  estaba  inevitablemente  orientada  a   la   conquista  exterior,  sobre  todo  desde  el  momento  en  que  el  servicio    militar  obligato rio, cumplido por los hombres libres, fue reemplazado   por la obligación feudal  del  servicio por parte de los nobles. Una clase   social, dedicada de manera exclusiva  al  servicio de las armas, puede   ser un factor de anarquía interna, si no se la  organiza  para la conquis -  ta  exterior .  Esto fue en efecto lo que sucedió. La monarquía se estableció para esa   función  precisa: aglutinar a los nobles para la conquista de los terri -  torios limítrofes. La  cen tralización del Estado, por muy primitiva que   fuera, no tenía por objeto imitar la  glo ria de los imperios pasados, sino   impulsar y dirigir la necesidad de expansión  de  las tierras cultivadas.   El  motivo  era  fácil  de  encontrar  dentro  de  la  ideología   religio sa,  que    exigía la subordinación de todo el mundo a una sola fe. La retribución   mate rial, por su parte, consistía en la distribución de tierras, que ve -  nían a ampliar los  ya  extensos dominios  nobiliarios.  El avance hacia el este germánico y hacia el sur español se hacía tanto   sobre    los  bosques,  como  sobre  los  últimos  reductos  de  campesinos    libres,  que  en  más   de    una  ocasión  se  unieron  de  forma  infructuosa    para defender sus limitadas soberanías. Hay que tener en cuenta que   la guerra exterior era la fuente principal de mano de obra. Tal como   las  ha  titulado  Bonnassie,  las  guerras  eran  «verdaderas  cacerías  de    hombres». Sometimiento de los celtas por los anglosajones, reducción   de los sajones tras las conquistas de Carlomagno, son solamente dos   ejemplos  de  conquistas  de  tierras  y  sometimiento  de  mano  de  obra    que  se  prolongaron  a  lo  largo  del  período  feudal  y  de  los  primeros    E l m edioevo y l o s des c a ns o s del s aqu eo \n- 58 -  renacimientos, hasta que se agotaron las fuentes internas y fue nece -  sario ampliar el panorama del sometimiento hacia nuevos mundos.  Las  características  ecológicas  de  las  planicies  europeas,  boscosas  y    húmedas,  eran  un  hábitat  ideal  para  la  cría  de  cerdos,  que  empeza -  ron a ser posiblemente la dieta proteínica más importante de las co -  munidades medievales. La ampliación de la ganadería vacuna ofreció   más problemas, porque exigió el desmonte de  vas tas extensiones. La   adaptación de cultivos mediterráneos como la vid, el trigo  y  algunos   frutales,  había  empezado  en  la  época  romana,  pero  se  incrementará    de  forma amplia con los monasterios medioevales. La autarquía eco -  nómica de la  pro ducción agraria trajo consigo la muerte de las ciuda -  des. Sin embargo, este  aspecto  de la decadencia urbana tiene también   un  claro  sentido  ambiental.  La  grandeza   de    las  ciudades  del  Imperio    romano  se  debió,  entre  otras  razones,  al  saqueo  de   las    provincias  y,    en las provincias, al saqueo de la producción agraria por parte de  los   “potentes”.  Éstos  vendían  al  Estado  los  excedentes  de  la  producción    de  cereales,  aceites, etc. La ciudad se sostenía y progresaba con base   en los procesos de  acu mulación que culminaban en Roma y en la je -  rarquía imperial. Era una  organización  social establecida en forma de   pirámide para el saqueo y la acumulación  urbana.  Con la decadencia   del poder central y la aparición de las villae, los potentados  pre firie -  ron retirarse a sus cómodos dominios, cuyas delicias, durante el bajo   imperio, han sido descritas por Ausonio o Sidonio Apolinar. Los restos   de las antiguas  ciu dades se convirtieron en centros de resistencia, no   sólo contra las invasiones de  las  tribus, sino también contra las luchas   intestinas. A su decadencia contribuyó en  no  poca escala, el rechazo   religioso al «desorden moral» que significaban las  ciuda des. Salviano   habla de ellas en el siglo V como centros de  perdición.  El elemento religioso es importante no sólo para comprender la decaden -  cia  de  las ciudades, sino también para entender su frágil persistencia y   E l m edioevo y l o s des c a ns o s del s aqu eo \n- 59 -  en ocasiones  su  desarrollo suburbano. Los nuevos núcleos de urbaniza -  ción ya no están  representa dos por el comercio y la generosidad de los   «potentes»,  sino  por  los   centros    monacales,  edificados  por  fuera  de  las    antiguas murallas, junto a los  cementerios,  los cuales empiezan a repre -  sentar los nuevos centros de acumulación. A  semejanza  de lo que había   sucedido en las primeras etapas de los imperios agrarios, el  centro  re -  ligioso es al mismo tiempo el centro de acumulación económica y las   ideologías  religiosas se amoldan a las formas de sometimiento  social.  Otro elemento ambiental que es importante resaltar en la vida urbana   del    me dioevo,  es  el  regreso  a  las  edificaciones  de  madera,  material    que  reemplaza  a   la    piedra  de  las  edificaciones  romanas  y  cuya  utili -  zación masiva debió de  significar  una presión alta sobre los bosques.  En esta forma, la sociedad feudal quedó encerrada en sí misma, con   escaso  influjo  exterior.  Las  expresiones  simbólicas  se  acomodaron    como  un  flexible  manto  a  las  necesidades  de  una  sociedad  agraria.    Una  versión  campesina  y  simple  del  pensamiento  cristiano  cobijó  y    aglutinó todos los comportamientos. Los préstamos a interés que ha -  bían sido soportados hasta Carlomagno, se prohíben de manera drás -  tica  entonces,  no  para  evitar  la  expansión  del  dinero,  sino  para  ase -  gurar la subsistencia de mercados locales a bajo precio. Sin embargo,   las prescripciones morales se debilitaban fácilmente ante los grandes   intereses. La paulatina desaparición del comercio no impidió la conti -  nuidad de la trata de esclavos, desarrollada sobre todo por los judíos,   cuyo poder económico quebraba con fragilidad la  docili dad religiosa   de los reyes. Todavía en el siglo IX, los esclavos eran numerosos  en  las   villas y desarrollaban allí los trabajos más penosos, como la tracción   de las  mue las giratorias de los  molinos.  No  debe  pensarse  tampoco  que  la  aglutinación  religiosa  se  efectuó    con  facili dad a lo largo de la pirámide social. Por debajo de la religión,   que había sido  adop tada por la nobleza, se siguen fermentando hasta   E l m edioevo y l o s des c a ns o s del s aqu eo \n- 60 -  finales  del  milenio  las   tradiciones    culturales  paganas,  conservadas    sobre todo por los campesinos libres, como arma  sim bólica de defen -  sa  contra  la  opresión.  Estas  tradiciones  se  conservan  sobre  todo  en    las  fiestas populares, realizadas muchas veces en antagonismo a los   rituales  religiosos.  No obstante, el sistema de la esclavitud aparece en franca decadencia.   Este  antiguo sistema de transformación del medio natural, inventado   después del Neolítico con el surgimiento de los grandes Estados agra -  rios y que no había podido ser  des plazado por ninguna campaña ideo -  lógica, empieza a esfumarse de manera  lenta  sin mayores presiones   morales. La mano de obra esclava se reemplaza no sólo  por  los siervos   de la gleba, sino también por instrumentos tecnológicos más  eficaces.  La sustitución de la mano de obra esclava por los molinos de viento,   la  collera  de tiro, la herradura y los demás arreos que perfeccionan la   tracción animal, ha  sido  uno de los aspectos más debatidos para es -  tablecer una metodología de  análisis  histórico. Incluso las corrientes   marxistas no han podido ponerse de acuerdo  sobre  el orden de las de -  terminaciones. Mientras para Lefebvre, entre otros, el  esclavismo  se   hace innecesario con el triunfo de las nuevas tecnologías, para Doc -  kes, la  apari ción de nuevos modelos tecnológicos se vio determinada   por las luchas  sociales.  Las tendencias lineales del materialismo o del   idealismo se camuflan incluso  bajo  el manto  marxista.  Cualquiera  que  sea  la  explicación  teórica,  los  hechos  son  claros.  El    molino  de  agua acaba por imponerse sólo a finales del milenio, a pesar   de  que  había   sido    descubierto  en  la  época  romana.  El  perfecciona -  miento técnico de la tracción  ani mal, con la collera, los arneses y la   herradura es, en cambio, uno de los  aportes  indiscutibles de ese pe -  ríodo oscuro que cubre los dos últimos siglos del milenio. El desarrollo   técnico va a reemplazar a la fuerza humana, sometida bajo la férula   E l m edioevo y l o s des c a ns o s del s aqu eo \n- 61 -  de la esclavitud. La consecuencia clara, de este progreso técnico, no se   hizo esperar, desde el punto de vista ambiental.  A principio del segundo milenio «se abre la era de las grandes rotura -  ciones, el mayor aumento de la superficie cultivada... desde los tiem -  pos prehistóricos», de acuerdo con la expresión de Marc Bloch. Sobra   decir que la ampliación de la frontera agrícola se hizo principalmente   a  expensas  del  bosque,  aunque  de  esta  época  son  también  las  pri -  meras  conquistas  sobre  el  mar  en  los  Países  bajos  o  en  la  Terranova    francesa. También se dieron casos de mejoramiento de suelos con el   uso intensivo de fertilizantes naturales, como en los suelos calcáreos   de la región de Beauce, o los interesantes sistemas de cultivo implan -  tados  en  las  tierras   nuevas,    con  divisiones  de  zanjas  de  drenaje  en    suelos duros u otras divisiones que  impe dían el acceso del ganado. En   algunas  regiones  la  ocupación  humana  no  se   había    realizado  hasta    ese entonces, sino en las tierras calcáreas por ser más  livianas.  Solo   con nuevas tecnologías se adentró en los bosques y en las zonas  bajas.  La desaparición de la esclavitud trajo consigo igualmente consecuen -  cias en  la  organización social de la producción agraria. Eran los escla -  vos los encargados  de  trabajar las tierras reservadas para uso exclusi -  vo del señor (terrae  indominicatae),  ayudados de forma parcial por los   siervos, durante los días en que éstos  debían  pagar su prestación de   servicios. El gran dominio, en la forma en que se había  veni do explo -  tando, fue haciéndose poco productivo con la progresiva desaparición   de    la  esclavitud.  En  consecuencia,  los  señores  laicos  o  eclesiásticos,    prefirieron  en tregar en arriendo sus tierras. Los latifundistas se con -  virtieron poco a poco en rentistas. De hecho, durante esta época, hay   una  progresiva  parcelación  tanto  de  la   gran    propiedad,  como  de  los    mansos o parcelas familiares. Las formas de  acumulación    se trasla -  dan cada vez más a la economía  monetaria.  E l m edioevo y l o s des c a ns o s del s aqu eo \n- 62 -  No  se  ha  estudiado  mucho  las  consecuencias  ambientales  de  este  ré -  gimen    de    producción  agraria.  La  tierra  dividida  en  pequeñas  parcelas    familiares,  ya  sea   den tro  de  las  grandes  villae  o  en  propiedades  inde -  pendientes; se dedicaba sobre  todo  al cultivo de legumbres en el huerto   casero y a la de cereales o la vid en los  campos  de labor. En esta forma   se evitó la extensión indiscriminada de la ganadería, que  no  tuvo mucha   importancia durante el primer milenio. Los bosques se utilizaban no  sólo   para la extracción de la leña y la madera para la construcción, sino tam -  bién para  la  cría de cerdos, que constituían la base de la dieta  proteínica.  Por otra parte, la deforestación a la que fue sometida una gran extensión   del  actual territorio europeo no tuvo los graves efectos ambientales que   ocurrieron en  el  medio Oriente o en las llanuras monzónicas, lo que en   la actualidad repercute  sobre  los ecosistemas tropicales. A diferencia de   éstos, los ecosistemas de las  tierras  templadas conservan la mayor parte   de sus nutrientes en el suelo y no en la  fitomasa,  lo que significa que, al   talar el bosque, el suelo conserva una fertilidad  adecuada  para el cultivo   agrícola.  E l m edioevo y l o s des c a ns o s del s aqu eo \n- 63 -  La periodización histórica es siempre arbitraria, pues las formaciones   sociales no se pueden separar como piezas independientes dentro del   museo histórico. A lo largo del eje cronológico se traslapan los distin -  tos momentos culturales. Es muy difícil indicar fechas precisas para   definir  el  final  de  la  época  feudal.  Sus  restos  se  prolongan  hasta  la    Revolución francesa y más acá, de manera que el dominio de la econo -  mía monetaria no se realiza como un corte brusco sobre la autarquía   medieval.  Por otra parte, el concepto de Renacimiento tampoco ha sido bien de -  finido. Se ha identificado generalmente con el apego a las formas ar -  tísticas    grecorromanas,    suscitado  por  un  resurgir  nostálgico  de  las    antiguas formas de vida. Cuando se  con cibe la cultura como un adita -  mento decorativo, es muy difícil entender la manera  en  que las ideas   se  relacionan  con  los  hechos  económicos  y  políticos,  y  menos   aún,   con las transformaciones ecosistémicas. Desde este punto de vista, la   historia  am biental del período renacentista está por  hacer .  Para  los  fines  del  presente  ensayo  se  entiende  por  «renacimientos»  la    recons trucción  de  los  instrumentos  simbólicos  de  manejo  del  mundo    natural  y  de   cohesión    social,  llevada  a  cabo  en  la  Europa  occidental    desde el momento en que el  comer cio se consolida como forma priori -  taria de manejo económico. La época de  los  renacimientos es, por con -  siguiente,  una  era  fundamental  para  la  construcción  de   los    símbolos   La época de los renacimientos \n- 64 -  conceptuales que van a hacer posible el surgimiento del capitalismo.  El   hecho de que estas formas simbólicas hayan renacido, significa simple -  mente que habían sido construidas con anterioridad, en circunstancias   similares.  Este   ejemplo    aclara,  quizá  más  que  ninguno,  la  manera  en    que  los  símbolos  responden  a   necesidades    sociales  y  no  flotan  en  el    espacio aristocrático de un artificioso mundo  cultural.  En efecto, las herramientas de manejo simbólico habían sido construi -  das  con  anterioridad por un pueblo que se había dedicado de preferen -  cia al comercio y a  la  colonización del Mediterráneo. Para desarrollar   esa  labor,  tuvo  que   modificar    drásticamente  los  códigos  simbólicos    que hasta ese entonces habían  predominado  para orientar el manejo   del mundo natural y cohesionar el mundo social. Desde  el  siglo VII a.   C, los griegos habían construido los instrumentos simbólicos que  les   permitieron acceder a un conocimiento racional del mundo natural y   construir  una  sociedad sobre bases de igualdad democrática, así esta   igualdad hubiese  sido selectiva.  Cuando  se  reabrieron  las  rutas  comerciales  a  lo  largo  de  la  Europa    feudal,  no  fue necesario crear de nuevo los símbolos para la construc -  ción  de  una  nueva   socie dad.  Bastaba  con  penetrar  en  las  bibliotecas    monacales, que conservaban  celosa mente los secretos antiguos, más   para evitar su contagio que para difundir sus  ideas.  La penetración no   fue fácil y el viejo abad Jorge, de acuerdo con la  imaginación  novelada   de Umberto Eco, prefirió que se quemara la biblioteca, antes que se di -  vulgara la actitud risueña ante la vida, contenida en un viejo volumen   aristotélico.  El significado de las peripecias ideológicas de este apasionante período   será tema de un ensayo ulterior. Lo que importa ahora es plantearse   desde un punto de vista ambiental los hechos históricos que permitie -  ron el renacimiento de los símbolos. Este período se inicia aproximada -  mente en el siglo XII y no en el siglo XV, como por lo general se afirma.   l a ép o c a de l o s r enac i m i en t o s \n- 65 -  El primer instrumento simbólico que renace es el derecho romano, que   se enfrenta al derecho feudal, basado en la posesión de la tierra. Era un   instrumento imperfecto, sin duda, que los romanos habían construido   sobre el concepto de la «isonomía» griega, pero que servía para defen -  der los derechos de la nueva clase social de comerciantes, desposeída   de  cualquier  prerrogativa  en  el  mundo  feudal.  Este  instrumento  re -  nace  en  el  siglo  XII  por  una  exigencia  social   inme diata,  como  había    nacido  en  el  siglo  VII  a.  C.  para  afianzar  el  derecho  de  los   colo nos  y    comerciantes  griegos.  Ahora bien, el instrumento jurídico requiere siempre de una justifica -  ción  teóri ca, es decir, de una cosmovisión que organice los conceptos   sugeridos por la  nueva  organización social. La filosofía de Aristóteles,   que renace con la escuela  parisina  del siglo XIII, va a servir como es -  pacio de lucha ideológica contra el  espiritualismo  platónico del cris -  tianismo medioeval. Dentro de esta cosmovisión resurge la  apo teosis   de la sensibilidad con la lírica, durante el siglo XIII, y la plástica  indi -  vidualista  que concluye en el renacimiento de la pintura durante los   siglos XV y  XVI.  Como se puede observar, el Renacimiento es un fenómeno mucho más   dilatado    y  revolucionario  de  lo  que  se  ha  planteado  en  la  perspecti -  va de un humanismo culturalista. Reorganiza el mundo simbólico no   sólo en sus manifestaciones  artísti cas sino en los fundamentos de la   ética, del derecho, de la filosofía y de la  ciencia.  La mayor parte de esos   instrumentos habían sido definidos con nitidez por la  cultura  greco -  rromana y sólo se requería reincorporarlos culturalmente. No fue una   tarea  fá cil, ni se trataba de un acople pasivo, sino de una reorganiza -  ción  que   exigía    redefiniciones  ideológicas  dentro  de  una  concepción    diferente de las  relaciones  sociales y del manejo del mundo  natural.  Estos aspectos simbólicos sirven como introducción al estudio de una   etapa    decisiva  para  la  construcción  del  mundo  moderno.  Aunque  la    l a ép o c a de l o s r enac i m i en t o s \n- 66 -  edificación  de  los   ins trumentos  simbólicos  es  quizás  el  aporte  más    importante de este período desde  el  punto de vista ambiental, es ne -  cesario preguntarse cuáles fueron las bases  socia les que permitieron   una evolución tan rápida de las formulaciones  ideológicas.  Como pudo apreciarse, el siglo X significó una ruptura en el modo de   produc ción  feudal.  Se  regresa  al  campesinado  libre  como  base  de  la    producción y  empie za a desaparecer el señorío latifundista. Las nue -  vas formas de dominio se  basaron  en la extracción de la renta, lo que   permitió  la  acumulación  de  excedentes  para   la    organización  de  una    economía  comercial  que  se  fundamentó  cada  vez  más  sobre   el    flujo   monetario.  A  ello  hay  que  añadir  la  liberación  del  comercio  medite -  rráneo,  gracias  al  esfuerzo  de  las  Cruzadas,  que  fueron  una  proeza    comercial antes que una epopeya religiosa. Efectivamente, la expan -  sión  de  la  conquista  exterior  inherente  a  la  sociedad  feudal,  que  así    se abastecía de tierras y esclavos, encontró pronto sus límites con la   constitución de los estados. Los normandos se habían unificado en el   reino inglés, los otones empezaban a organizar el reino germánico y   Francia  llevaba  ya  un  largo  camino  recorrido  en  la  formación  de  un    Estado central.  Las  conquistas  no  significaron  ya  el  dominio  sobre  tribus  dispersas,    sino  la  guerra  entre  estados.  La  conquista  tenía  que  orientarse  ha -  cia el enemigo exterior, que en este caso se identificó con los «:infie -  les» musulmanes. Era fácil agitar las consignas ideológicas porque, en   el  terreno  simbólico,  el  enemigo  coincidía  con  aquel  que  afectaba  la    producción económica de vastas zonas cristianas. El único  poder  que   podía unificar las huestes europeas era el del Papa, que había venido   ganando  prestigio desde la reforma gregoriana de mediados del siglo   X. Así fueron  organi zadas las Cruzadas, que tal vez pueden entenderse   como la última conquista  impor tante de los tiempos feudales y que, si   bien no significaron tierras o esclavos  nue vos, sí propiciaron la apertura   l a ép o c a de l o s r enac i m i en t o s \n- 67 -  del Mediterráneo al comercio europeo. Estas  prime ras empresas coinci -  dieron con la conquista normanda del sur de Italia, con lo  cual  se despejó   la ruta de  Europa.  El comercio había comenzado ya en zonas restringidas, pero para ello   fue  ne cesario conservar un difícil equilibrio diplomático con el “infiel”.   Este  comportamiento  fue muchas veces tildado como una traición por   los  émulos  cristianos.  Desde   el    siglo  IX,  Venecia  dominaba  el  tráfico    comercial  con  Alejandría,  donde  vendía   escla vos,  madera  y  armas,  y    de  donde  traía  metales  y  especias.  Ya  para  ese  entonces  el  comercio    significaba altos préstamos en capital, que fueron los gérmenes de  los   futuros bancos. Este ejemplo, que fue seguido tiempo después por Pisa   y  Génova,  era sin embargo  excepcional.  Desde  luego,  éste  no  era  el  escenario  general.  A  pesar  de  algunos    avances,  referidos antes, Europa se podía considerar como el lado os -  curo  del  planeta,   frente    al  esplendor  de  las  civilizaciones  bizantina    u otomana. Los chinos la superaban  en  desarrollo técnico y Bizancio   tuvo la impresión, durante las primeras cruzadas,  de  verse sometida   a la invasión de los “bárbaros de occidente”. A pesar del avance  de  las   roturaciones  de  los  primeros  siglos  feudales,  el  escenario  natural  de    Europa  era  el bosque y no las tierras de cultivo. La imaginación popu -  lar  y  política  estaba   ase diada  por  los  asaltos  de  las  fieras  «salvajes»    y  el  bosque  seguía  siendo  el   refugio    de  anacoretas  y  ladrones.  Para    Dante la selva todavía es un lugar  oscuro.  Si en algunas regiones más pobladas, como en los alrededores de París,   em pezó a escasear la madera para la construcción, como lo sabemos   por un relato  del  siglo XII, otras regiones del bosque tupido permitían   a Guillermo de Orange  perse guir jabalíes desde Narbona a Tours. Los   instrumentos técnicos no permitían  t ampo co un desmonte rápido: se   contaba  solamente  con  la  azuela,  poco  eficaz  contra   los    grandes  ár -  boles.  Tampoco  las  herramientas  de  trabajo  agrícola  permitían  una    l a ép o c a de l o s r enac i m i en t o s \n- 68 -  producción  suficiente.  En  la  mayor  parte  de  Europa  se  araba  todavía    con instrumentos primitivos de madera, que roturaban y oxigenaban   poco el suelo.  De ahí que la población de la alta Edad Media estuviera subalimenta -  da, indefensa ante las crisis periódicas de hambre y, en consecuencia,   ante las pestes y las enfermedades. Algunos relatos describen escenas   macabras  de  antropofagia  durante  el  siglo  XI.  Algunas  de  las  pestes    se debían al desarrollo de plagas generadas por los mismos cultivos,   como el cornezuelo del centeno, que desencadenaba las grandes epi -  demias del fuego sagrado.  Sobre  este  panorama  de  contrastes  se  inicia  la  época  de  los  renaci -  mientos,  rompiendo  lentamente  las  pesadas  estructuras  del  mundo    feudal  y   organizándose    no  en  forma  paralela,  sino  en  lucha  abier -  ta contra él. Los renacimientos suponen  el  desarrollo del comercio y   éste, a su vez, el progreso en la producción agrícola y  la  consolidación   de centros urbanos. El orden de los factores no es fácil de  estable cer,   entre  otras  cosas  porque  el  progreso  no  se  realiza  sin  sobresaltos  y    porque  las  circunstancias de las regiones son muy diferentes. Venecia   debe su desarrollo  al  comercio y no a la agricultura. El comercio de la   sal y del pescado, que eran sus  rique zas naturales, le permiten ser la   pionera en el desarrollo de las rutas  comerciales.  Sin  embargo,  en  la  mayoría  de  las  regiones,  la  base  fue  el  desarrollo    de la  pro ducción del campo. Lo que se ha dado en llamar la revolución   agrícola  del   medioevo    se  basó  tanto  en  la  extensión  de  los  cultivos,    que fue la obra de los  roturadores,  como en el perfeccionamiento téc -  nico. Ya se ha hecho alusión a algunos de  los  descubrimientos técni -  cos que perfeccionaron la producción. El arado con ruedas y vertede -  ra que permitía trabajar tierras duras, la revolución en las formas de   trac ción,  la  sustitución  progresiva  del  buey  por  el  caballo,  todo  ello    aumentó   significativamente  los  rendimientos.  Estos  inventos  fueron    l a ép o c a de l o s r enac i m i en t o s \n- 69 -  fundamentales,  no   sólo    para  el  perfeccionamiento  de  la  producción    agraria, sino también para los  trabajos  de construcción y, por lo tanto,   para  la  formación  de  los  nuevos  centros  urbanos.   Las    nuevas  herra -  mientas van a exigir una materia prima más dura y maleable.  Desde   mediados del siglo XII Europa conoce una segunda edad del  hierro.  Además de los instrumentos materiales, se perfeccionaron por igual   los  siste mas de cultivo. La rotación bienal fue reemplazada por la ro -  tación  trienal,  que   con servaba  mejor  los  suelos  y  aumentaba  noto -  riamente la productividad. La  diversifi cación de los cultivos permitía   organizar la producción de tal manera que el  alimen to animal no en -  trara en competencia con la alimentación humana, lo que había  sig ni -  ficado un grave obstáculo en culturas anteriores. La calidad alimenti -  cia  mejoró  con la base proteínica de las legumbres y la posibilidad de   recoger dos cosechas  al  año disminuyó los riesgos de las hambrunas   causadas por circunstancias  climáticas.  Sin  embargo,  este  avance  no  se  dio  en  forma  homogénea  en  todas    las  regio nes. Las condiciones del suelo y la especificidad de los culti -  vos favorecieron  el  desarrollo técnico en algunas regiones más que en   otras. La introducción de nuevos elementos técnicos favoreció el desa -  rrollo de determinados cultivos. Por ejemplo, la avena se impuso sobre   la cebada como forraje para los caballos. Al mismo tiempo aparecían   nuevos cultivos corno el del centeno que, en un primer momento, no   pasaba de ser una maleza asociada al cultivo del trigo. Puede decirse   que la Europa renacentista se basó en la difusión de las legumbres y   del pan y que éstas, a su vez, sólo fueron posibles con base en los me -  joramientos técnicos.  El progreso de la agricultura permitió un significativo aumento de la   población  que  pasó  de  46  millones  en  el  año  1050  a  73  millones  en    1300. En siglo y medio Francia e Inglaterra duplicaron su población. El   l a ép o c a de l o s r enac i m i en t o s \n- 70 -  crecimiento  poblacional  va  acompañado  por  una  alta  tasa  de  densi -  dad urbana. A finales del siglo XIII, Milán cuenta con cerca de 200 000   habitantes. En un poco más de un siglo, Florencia había  pa sado De ser   una pequeña aldea de 10 000 habitantes a una importante ciudad  de   cerca de 100.000. Este crecimiento significa una verdadera revolución   demográfi ca para el nivel de desarrollo técnico de la época, sobre todo   si se tiene en  cuenta  que no se trata solamente de un aumento exclu -  sivamente  cuantitativo,  sino  de   una    mejora  real  de  las  condiciones    materiales de vida. Ello se puede ver con  facilidad  en el hecho de que   por  primera  vez,  en  las  condiciones  agrarias  de  la  Europa   feu dal,  se    derrota por un largo tiempo el espectro del hambre, lo cual se debió,   no  sólo  al aumento material de la producción, sino también a la mo -  vilidad del comercio.  En  varias ocasiones, en efecto, algunas regiones   se vieron favorecidas en  momentos  de malas cosechas por la impor -  tación masiva de  alimentos.  Las diferencias del desarrollo regional hacen que esta población cre -  ciente  em piece a movilizarse en forma muy distinta a la generada por   las grandes invasiones de los siglos pasados. No se trataba de despla -  zamientos  masivos,  sino  del   vaga bundeo  individual,  por  razones  de    placer,  de  estudio  o  de  miseria,  cuando  no   por    razones  idealistas  de    predicación  o  por  las  exigencias  del  comercio.  En   ocasiones    fue  una    especie  de  turismo  religioso,  sin  las  comodidades  del  presente,  pero    que    exigió  ya  para  esa  época  la  edición  de  una  guía  del  peregrino.    Entre  tanto,  el   vaga bundeo  bohemio  era  glorificado  en  los  Carmina    Burana.  No se crea, sin embargo, que esa relativa movilidad significaba el  desa -  rrollo  de una libertad incondicional. Lo que caracterizaba el contraste   de  esta  época   es,    que  mientras  se  abrían  las  puertas  del  comercio  y    se acrecentaba la fortuna, la  ma yor parte de la sociedad se encerraba   más  fuertemente  aun  dentro  de  las   barreras    de  subordinación,  co -  rrespondientes a la última etapa feudal. A pesar de que  des aparecen   l a ép o c a de l o s r enac i m i en t o s \n- 71 -  los esclavos y disminuye la importancia de los siervos, el campesino   está    cada  día  más  atado  a  los  derechos  feudales,  de  manera  que  el    hecho de vivir en  el  área de un feudo significa que las posibilidades de   movilidad, de matrimonio,  de  trabajo, etc., están restringidas por los   derechos feudales. La sociedad se  organiza  cada vez más en una pirá -  mide de subordinación, en la que todos los  miembros  están vincula -  dos por la exigencias de deberes de sometimiento. Incluso la  nobleza   se eslabona en cadenas de dependencia que llegan hasta la cúspide de   la  corona.  La independencia de los primeros latifundios había desapa -  recido, para ser reemplazada por una minuciosa y complicada articu -  lación. La primera carta feudal conocida es de mediados del siglo XI.  La única manera de evadirse a esa cárcel omnipresente y articulada de   la sociedad feudal era la fuga hacia los frentes de colonización o hacia   las ciudades. En esta forma, las especificidades de la articulación so -  cial fomentaron la roturación de las tierras y el incremento de la po -  blación urbana. Muchas de las ciudades gozaban de franquicia, de tal   manera que los refugiados obtenían su libertad después de un año de   permanencia. «El aire de la ciudad hace libre», decía un proverbio ale -  mán. En España, la simple ocupación de tierras baldías bastaba para   obtener el título de propiedad. Nada extraño tiene, por consiguiente,   que  la  deforestación  haya   sido    más  acelerada  en  la  península  y  que    allí se refugiaran muchos de los fugitivos  del  feudalismo  nórdico.  La  vida  de  los  campesinos  no  era  en  absoluto  idílica  y  bien  valía  la    pena  arries garse a la fuga. Un testimonio de la época describe cómo   “se hallan  incesantemen te agotados y desdeñados por sus dueños... y   todo esto para satisfacer las  frivoli dades de los otros... Se les persigue   con incendios, se les roba, se les  apuñala”.  Este trato provoca no sólo la   fuga, sino también la desidia y en muchas  oportunida des el descuido   en  el  mantenimiento  de  las  condiciones  ambientales  de  los   culti vos.   Como revela el testimonio del abate de Marmoutier, la desidia con la   que  los  campesinos pagaban el tributo de la corvea, o sea, la presta -  l a ép o c a de l o s r enac i m i en t o s \n- 72 -  ción  de  algunos  días   de    trabajo  a  la  semana  en  las  tierras  del  señor,    impulsó el cambio por el tributo  en  dinero, que fomentó la economía   monetaria. Hacia finales del siglo XIII, cerca de dos tercios de las ren -  tas agrarias en Inglaterra se pagaban en  dinero.  Tanto  el  aumento  de  la  productividad  agraria,  como  la  apertura  de    las rutas  me diterráneas, concluyeron en el fortalecimiento de las co -  rrientes  comerciales.   Con    ellas,  una  economía  monetaria  empezó  a    oponerse  a  la  economía  rural,  que   había    predominado  en  los  siglos    anteriores.  A  los  esfuerzos  iniciales  de  Venecia,  Pisa   y    Génova,  se    sumaron,  después  de  la  primera  cruzada,  Marsella  y  Barcelona,   que   abrieron las rutas de Europa continental, principalmente a través del   Ródano.  Ello  significó la ampliación del pastoreo, ya fuera arrebatan -  do nuevas tierras al  bosque  o reemplazando los cultivos. Este cambio   influyó a su vez sobre la tenencia de  la  tierra y sobre el trabajo campe -  sino y colaboró al éxodo hacia las ciudades.  Los  grandes propietarios   iniciaron la política de cercar sus tierras, una vez  convertidas  en pas -  tizales, apoderándose incluso de las tierras  comunales.  El cultivo y la industria de la seda, que hasta ese entonces era impor -  tada en  su  totalidad desde Oriente para uso de la aristocracia, empezó   a desarrollarse  desde  el siglo XII, sobre todo en Italia y luego en Fran -  cia y Alemania. Tampoco puede  dejar  de mencionarse el desarrollo de   la industria del papel, tomada de los árabes, y  que  al menos parcial -  mente  reemplazaría,  desde  el  siglo  XIII,  a  los  antiguos  e   incómodos   pergaminos. Esta industria sólo encontraría su verdadero destino dos   siglos más tarde, con la invención de la imprenta.  No es posible comprender las nuevas industrias sin mencionar el ade -  lanto técnico que significaron el molino de batán, utilizado para batir   el  tejido,  el  telar  horizontal  con  pedales  y  el  tomo  de  hilar.  Estos  in -  ventos, cuyo uso se estabiliza durante los siglos XII y XIII, no siempre   fueron aceptados sin reticencia y su implantación tal vez no hubiese   l a ép o c a de l o s r enac i m i en t o s \n- 73 -  sido posible sin las transformaciones ideológicas inducidas por la bur -  guesía urbana.  El desarrollo del comercio se basó en el perfeccionamiento del trans -  porte tanto marítimo como terrestre. En el transporte terrestre, la ca -  rroza de cuatro ruedas y el tiro múltiple exigieron la reparación de los   caminos, deteriorados desde la  época  romana. El transporte marítimo   se vio favorecido desde finales del siglo XII por  la  invención de la brú -  jula y del timón de codaste. La capacidad de los navíos no  tiene  nada   que ver con los veleros vikingos. Los navíos hanseáticos alcanzan una   capaci dad de carga de más de 200 toneladas y algunas galeras vene -  cianas llegan a  las  500  toneladas.  La actividad económica conduciría a la reorganización de la vida ur -  bana.  Con  todo, la ampliación de la ciudad no significó un simple au -  mento cuantitativo,  sino  una verdadera revolución social, que desde   muy temprano empezó a llamarse  la  revolución comunal. Los comer -  ciantes, que no tenían una ubicación precisa en  las  tradiciones jurídi -  cas del feudalismo, tuvieron que abrirse paso muchas veces  en  forma   violenta. Empezaron ubicándose en las afueras de la ciudad fortificada   de    las    señorías  feudales  (los  suburbios,  o  falsos,  burgos)  y  desde  allí    iniciaron la lucha política por construir un nicho en la estructura ce -  rrada del  feudalismo.  Muchas de estas comunas cerraron sus filas con un juramento secre -  to, que  ex cluía tanto a los nobles como a los clérigos. El objetivo pri -  mordial era la  conquista  de la franquicia urbana, que debía ser con -  sagrada  mediante  una  carta  suscrita   por    los  señores,  fueran  laicos    o eclesiásticos. Cuando hubo resistencia, el  movimiento  comunal se   convirtió en violento y revolucionario. Algunas cabezas reacias, como   la  del obispo de Laon, que no quería aceptar los nuevos movimientos   de  liberación,  cayeron ante la violencia armada de los burgueses. La   l a ép o c a de l o s r enac i m i en t o s \n- 74 -  organización militar  urbana  demostró su poder en la batalla de Leg -  nano, con el triunfo sobre Federico  Barba rroja. Era la primera victoria   militar de la burguesía  urbana.  Para distinguirse de la jerarquía feudal, desde esa época estos nuevos   prota gonistas  históricos  empezaron  a  darse  el  título  de  burgueses  o    habitantes de  los  falsos burgos. Los reyes desde muy pronto vieron en   este nuevo estrato social,  más  un apoyo contra las fuerzas disgrega -  doras del feudalismo, que un enemigo. La  cor te se rodeó de consejeros   «burgueses», de los que dependía cada vez más  para  sus finanzas. Es   igualmente esta cultura burguesa la que inicia la renovación  del  mun -  do  simbólico.  Por  el  momento  es  suficiente  aludir  a  la  importancia    que tuvo  la  construcción de nuevas herramientas simbólicas para el   manejo ambiental posterior.  La  nueva  clase  social,  jugando  a  favor  de  sus  intereses,  se  alió  a  la    monarquía, apoyó la centralización del Estado, se tomó el poder mu -  nicipal y empezó a desmoronar la estructura ideológica basada en el   concepto  augustiniano  del  dominio  absoluto  de  Dios.  Al  independi -  zar los instrumentos del mundo natural y de la acción política, de los   fundamentos dogmáticos establecidos por la fe religiosa, la burguesía   renacentista instaura los fundamentos para el desarrollo de la racio -  nalidad científica moderna.  El  saber  técnico  es  al  mismo  tiempo  el  resultado  y  la  causa  de  esta    racionalidad  burguesa  que  independiza,  como  lo  había  hecho  ante -  riormente  el  pensamiento  griego,  el  orden  natural  del  influjo  supra -  rracional de una causa primera.  Según  Guicciardini, carece de sentido   investigar por encima de las causas naturales.  Incluso  las relaciones   con la divinidad adquieren una dimensión económica: «No es  posible   servir a Dios» dice Lorenzo Valla, “sin esperanza de remuneración” y   Alberti cree que  la  prosperidad es la recompensa divina por la buena   l a ép o c a de l o s r enac i m i en t o s \n- 75 -  dirección del  negocio.  Todo parece indicar, sin embargo, que los grandes avances técnicos de   la  épo ca de los primeros renacimientos se deben al contacto estable -  cido por el  comercio  europeo con civilizaciones más avanzadas. Chi -  na había logrado en la época  inme diatamente anterior un importante   desarrollo tecnológico que pasó en forma  directa  o indirecta a Europa,   desde que las Cruzadas convirtieron de nuevo el  Mediterrá neo en un   marenostrum. El cabestro, el reloj, la brújula, el codaste del timón, la   pólvora,  el papel y la imprenta, todos estos inventos parecen provenir   de  Oriente,  aunque   encon traron  en  la  naciente  burguesía  comercial    un terreno abonado para su desarrollo.  En esta forma, Europa recoge la herencia del pensamiento racionalis -  ta  griego  y de la tecnología oriental en una síntesis que representa la   base del  desarrollo  moderno. En cambio, China entra en un período de   parálisis, debida  posiblemente  al advenimiento de la nueva burocra -  cia de los mandarines que succionaban el  ex cedente económico de los   comerciantes  para  usos  suntuarios.  Esta  sugestiva   tesis    del  profesor    Needham  coincide  con  la  que  ha  propuesto  Gordon  Childe  para   ex -  pli car el estancamiento del desarrollo tecnológico del antiguo  Egipto.  Los vientos de la igualdad, alcanzada durante la primera época de los   renaci mientos,  no  duraron  por  mucho  tiempo.  La  democracia  suele    ser  el  aire  inicial  de   la    mayor  parte  de  los  cambios  históricos,  pero    pronto se organiza de nuevo la  pirámi de de la desigualdad. Las nue -  vas clases en ascenso cerraron sus filas tan  pronto  como se sintieron   seguras en el dominio del poder municipal. El patriciado  urbano,  com -  puesto por los comerciantes y por los representantes de las principa -  les  corpo raciones, se reservaron los puestos públicos del consulado y   de los concejos.  Este  patriciado era cada vez más estrecho. En efecto,   las condiciones económicas  favo recían la concentración de la propie -  l a ép o c a de l o s r enac i m i en t o s \n- 76 -  dad tanto urbana como rural; la prosperidad  de  la época no se repartía   favorablemente entre todos. La acumulación que va a  permi tir el sur -  gimiento del capitalismo se construye lentamente desde la época de   los renacimientos. En Inglaterra, en un siglo, se duplica la proporción   de  campesinos  que  poseían  menos  de  seis  hectáreas.  Por  otra  parte,    el aumento de la demanda acrecienta vertiginosamente los precios de   los alimentos. En poco más de un siglo el precio del trigo se triplica en   perjuicio de las grandes mayorías, pero acrecentando las fortunas de   los comerciantes.  l a ép o c a de l o s r enac i m i en t o s \n- 77 -  Estas circunstancias llevaron al colapso momentáneo que sufrió este   primer  intento de organización de un capitalismo comercial, apoyado   sobre  una  naciente  industria.  El  arrollador  crecimiento  europeo  ini -  ciado a finales del primer milenio, que podía significar un avance im -  portante  sobre  las  conquistas  de  las  culturas   ante riores,  o  al  menos    su recuperación, entra de nuevo en inevitable bancarrota.  Las  causas   de  este  fenómeno  de  retroceso  han  sido  estudiadas  desde  diferentes    ángu los. Desde el punto de vista ambiental, el colapso tiene explica -  ciones claras,  aun que todavía poco estudiadas: ante todo, los límites   materiales de la producción  agra ria, por el agotamiento de los márge -  nes de colonización. Las nuevas tierras  con quistadas eran de inferior   calidad y muchas veces tenían que ser abandonadas.  El  cultivo trienal   exigía demasiado al suelo y los abonos no eran suficientes. La  tierra   empezó a cansarse. Una vez que comenzó a disminuir la producción,   empezó  la  competencia entre la alimentación animal y la  humana.  La  preferencia  por  la  alimentación  humana  significó  prescindir  en    muchos  ca sos de la fuerza animal para la producción agraria. Los re -  baños  de  cabras,   ayuda dos  por  el  uso  de  la  sierra  hidráulica,  empe -  zaron a agotar seriamente los últimos reductos de bosque. El hombre   del siglo XIV se encuentra de nuevo ante la eterna  alter nativa entre el   hambre de las mayorías o el desarrollo tecnológico que no se  vislum -  bra  aún. Las soluciones técnicas no siempre están a la mano cuando   se  necesitan.  Los límites ambientales del  crecimiento Europeo \n- 78 -  Con  la  crisis  agraria,  el  incipiente  sector  industrial  se  siente  tam -  bién    amenaza do.  El  temor  a  la  superproducción  incita  a  controlar  la    difusión  de  las  nuevas   tecno logías.  La  crisis  del  siglo  XIV  se  puede    observar todavía en múltiples iglesias  góti cas que permanecieron in -  conclusas.  La  sinfonía  del  gótico  había  llegado  a  su   límite.    También   encontraba un límite el comercio exterior. Los intentos esporádicos de   Marco  Polo o de los hermanos Vivaldi de penetrar más allá de] mundo   conocido, se  reali zaron en el momento en que empezaban a cerrarse   los mercados internos y  fueron  tomados, por tanto, como novelas de   fantasía. El mundo, por el momento, no  iba  más allá; no sólo el mundo   material, sino también el mundo de la  ciencia.  El  impulso  científico  que  se  había  desatado  con  el  surgimiento  de  la    burguesía    tuvo  que  ser  refrenado  desde  afuera  por  la  aplicación  sis -  temática de la  intolerancia  dogmática. Es en este momento de reflujo   de la vida económica y de cierre de  las  libertades cuando aparecen las   primeras condenas a la nuevas doctrinas que  po nían en peligro la fé -  rrea arquitectura de la moral y del dogma cristianos. Para  que  surgie -  se el capitalismo era necesario dar una batalla más frontal y decidida   contra  las  ataduras  ideológicas.  Por  el  momento,  la  represión  refre -  nó por breve tiempo el avance científico que hubiese alentado nuevos   descubrimientos tecnológicos para superar la crisis. La instancia ideo -  lógica también puede servir de barrera para el progreso.  Todas estas circunstancias desencadenaron una de las crisis más vio -  lentas acaecidas desde la caída del Imperio romano. El siglo XV cayó   sobre una población desprotegida y subalimentada que en cincuenta   años fue diezmada y arrancada de su aparente estabilidad. Los precios   de los alimentos básicos se elevaron hasta hacerse inasequibles para   las  clases  bajas  urbanas.  En  1313  se  declara,  por  cuatro  años  conse -  cutivos, la carestía general de alimentos. La productividad del campo   se derrumba. La relación simiente/cosecha se merma a la mitad en el   lapso de un siglo. El número de bueyes y caballos por unidad agraria   L o s l í m i t es a m b i en ta l es del c r ec i m i en t o E u r op eo \n- 79 -  no cesa de disminuir, y  con  ellos disminuyen los arados. Pueblos en -  teros son abandonados y sobre ellos el  bos que de abedules empieza a   recuperar terreno. Era la Némesis de la  naturaleza.  Ante  este  desmoronamiento  de  la  producción  agraria,  la  reacción  de    los  due ños de tierras es semejante en casi todos los países. Es impo -  sible seguir  mante niendo la subordinación feudal, y los intentos para   encerrarse  en  una  autarquía   fa miliar  son  igualmente  infructuosos.    Se  hace  un  esfuerzo  por  reconstruir  los   predios    con  mano  de  obra    salarial, pero las ganancias, cada vez más escasas, no  permiten  pagar   los  salarios.  La  solución  es  simple:  reducir  unilateralmente  los  sala -  rios.    Es tas  medidas,  agravadas  por  el  aumento  de  los  precios,  hacen    estallar la crisis  so cial. Durante el siglo XIV se suceden las revueltas   campesinas con una  virulencia  que no se observaba desde el período   de las grandes revueltas de esclavos  durante  el Imperio romano.  Sobre  este  campo  abonado  por  el  hambre  y  la  crisis,  cae,  más  como    conse cuencia lógica que como un asaltante imprevisto, la gran peste   negra  de  1348.   No    fue  simplemente,  como  pudiera  pensarse,  el  acci -  dente  de  un  contagio  externo.   La    fiebre  bubónica  se  transmitió,  sin    duda del declinar antes de que apareciera la  pes te. Esta sirvió simple -  mente de guadaña  final. La población, sin embargo,  sigue  declinando   hasta finales del siglo y sólo empieza a recuperarse lentamente  desde  1500, para alcanzar, un siglo más tarde, las cifras anteriores a la  crisis.  La peste asaltó con especial virulencia las ciudades, en las que se ha -  bían  refu giado los campesinos huyendo de la crisis agraria, pero allí   tampoco había qué  ha cer, pues la crisis había alcanzado la producción   industrial. En un siglo,  Florencia  reduce su pr
