31    4.6   CULTIVO   DE   LARVAS   DE   S TRONGYLOIDES   32    4.7     TINCIÓN     PARA     C RYPTOSPORIDIUM ,     I SOSPORA  Y    C YCLOSPORIDIUM     (ZIEHL - NEELSEN    MODIFICADO)   33    4.8   INVESTIGACIÓN   DE   PARÁSITOS   EN   SANGRE   34    4.8.1   EXAMEN   EN   FRESCO   34   \n8       4.8.2   EXAMEN   EN   GOTA   GRUESA   34    4.8.3   FROTIS   O   EXTENSIÓN   SANGUÍNEA   36    4.8.4     TÉCNICA     DE     LEUCOCONCENTRACIÓN     CON     SAPONINA     PARA     MICROFILARIAS    36    4.8.5   TÉCNICA   DE   MICROFILARIAS   CON   HEMATOXILINA   37    4.8.6   MEMBRANAS   DE   NUCLEOPORE   37    5.   PRINCIPALES PARASITO S CAUSANTES DE INFEC CIÓN   39    5.1   PARASITOS   INTESTINALES   41    5.1.1   PROTOZOOS   42    5.1.2   NEMATODOS   52    5.1.3   TREMATODOS   63    5.1.4   CESTOD OS   77    5.2   HEMOPARÁSITOS   84    6.   IMÁGENES   91    6.1   PROTOZOOS   93    6.2   NEMÁTODOS   98    6.3   TREMÁTODO S   103    6.4   CESTODOS   108    6.5   HEMOPÀRÁSITOS   111    7.   GLOSARIO   117    8.   BIBLIOGRAFÍA   123      \n9       1.     INTRODUCCIÓN   \n10       El  laboratorio  de  microbiología  clínica  desempeña  un  papel  importante  en  el   diagnóstico y control de las enfermedades infeccios as. En este manual nos vamos   a centrar en el diagnóstico de las enfermedades causadas por parásitos.    Las  enfermedades  parasitarias  se  encuentran  distribuidas  a  nivel  mundial  con   mayor  o  menor  prevalencia  en  función  de  la  distribución  geográfica  de  las   espe cies  de  parásitos  responsables  de  las  mismas.  En  los  países  desarrollados  la   incidencia de las parasitosis ha ido aumentando principalmente a causa del mayor   número  de  viajes  internacionales  y  otros  fenómenos  como  la  inmigración.  Por   esto, todos los labora torios clínicos deberían contar con personal cualificado para   el  diagnóstico  de  estas  enfermedades  ya  que,  en  mayor  o  menor  medida   dependiendo del área de población que atiendan, van a tener que enfrentarse al   diagnóstico de este tipo de infecciones.     El o bjetivo del estudio parasitológico de una muestra clínica es el de proporcionar   información sobre la presencia o ausencia de patógenos, o de sus productos, que   pudieran participar en la enfermedad de un paciente.    El  conocimiento  de  la  microbiología  clínica   exige  conocer  no  tan  solo  las   diferentes  clases  de  patógenos  existentes,  sino  también  las  infecciones  que   pueden estar asociadas a determinadas exposiciones de riesgo.     Los  microorganismos  con  relevancia  clínica  que  se  deben  identificar  e  informar   varían    según  el  origen.  En  este  manual  nos  vamos  a  central  en  el  diagnóstico  de   los parásitos intestinales y extraintestinales.     El  proceso  diagnóstico  microbiológico  es  secuencial.  Comienza  por  un  problema   c l ínico o epidemiológico que hace necesaria la demanda d e una o varias pruebas,   toma  y  transporte  adecuado  de  las  muestras  a  investigar,  información  de  los   datos  demográficos  y  clínicos  del  paciente,  recepción  en  el  laboratorio,   procesamiento, análisis e interpretación de los resultados y un informe final que,   una vez recibido en el punto de origen de la petición, ayudará a tomar decisiones   clínico - epidemiológicas.    La  información  que  el  laboratorio  de  microbiología  puede  proporcionar  al   responsable  del  paciente  dependerá,  en  gran  medida,  de  que  la  muestra  sea   ad ecuada,  de  su  calidad,  modo  de  transporte  y  de  la  información  clínica  que  la   acompañe.  Por  ello  es importante  conocer  que  muestras  son  las  adecuadas  para   descartar una parasitosis ante un determinado cuadro clínico. El clínico debe estar   informado  de  qué  t écnicas  diagnósticas  realiza  su  laboratorio  de  forma   sistemática ,   y cuales sólo cuando se solicitan expresamente. Existen muchos tipos   de  análisis  de  laboratorio  para  diagnosticar  las  enfermedades  parasitarias.  Cada   tipo  de  análisis  seleccionado  dependerá    de  los  signos  y  la  sintomatología  del   paciente, que hará que el clínico se decante por cada uno de ellos.   \n11       En  este  manual  se  recoge  el  procesamiento  de  muestras  de  heces  así  como  las   distintas  técnicas  que  se  pueden llevar  a  cabo  en  extensiones  sanguíneas  p ara la   búsqueda de parásitos. Los laboratorios de microbiología diagnóstica de los países   desarrollados  siguen  dependiendo  en  gran  medida  del  examen  microscópico  de   las  muestras,  método  de  limitada  sensibilidad  y  muy  dependiente  de  la   experiencia del micro scopista.          \n12      \n13       2.     MODOS DE TRANSMISIÓN   \n14       Conocer  la  existencia  de  una  posible  exposición  de  riesgo  así  como  la  zona   geográfica  donde el  paciente  podría  haber  adquirido la  infección  es  fundam ental   para orientar la búsqueda (tabla 1).      Tabla 1 : Modos de transmis ión de las principales parasitosis    Exposición   Proceso infecciosos asociado    Contacto con agua dulce   Esquistosomiasis , amebiasis    Contacto  directo  con  tierra  (caminar   descalzo)    Anquilostomiasis ,  estrongiloido sis ,  larva   migrans cutánea    Consumo de agua no tratada   Amebiasis ,  criptosporidio sis ,  ciclosporo sis ,   giardiasis    Consumo  de  alimentos  crudos  o  poco   cocinados    Triquinosis ,  amebiasis ,  toxoplasmosis ,   cestodiasis    Picadura mosquito   Malaria , filariasis    Picadura moscas   Tripanosomiasis  africana ,  leishmaniasis ,   oncocercosis    Picadura t riatómidos   Tripanosomiasis americana      Cuevas   H istoplasmosis               \n15       3.     RECOGIDA Y TRANSPOR TE DE MUESTRAS   \n16       Las  consecuencias  de  una  muestra mal  tomada  y/o  mal  enviada  pueden  suponer   un fracaso en la identificación del agente etiológico     Lo  ideal  es  que  las  mues tras  se  transporten  al  laboratorio  dentro  de  los  30   minutos  posteriores  a  la  recolección.     P ara  asegurar  la  integridad  de  la s  posibles   formas  parasitarias  que  pueden  estar  presentes  es  importante  el  uso  de  me dios   especiales  de  conservación,    o  de  soporte  par a  el  transporte  de  las  muestras  que   se retrasen más de 30 minutos.    Si las muestras no se pueden procesar en cuanto   se  reciben     en  el  laboratorio ,  se  deben  almacenar  a  temperatura  ambiente ,     o   refrigeradas ,   según el tipo de muestra (tabla   2).    Tabla 2 : Recogid a y tipos de muestras    Muestra   Contenedor   Utilidad diagnóstica    Heces   Miniparesp  o  bote  de   boca ancha   Helmintos   y protozoos    Test de Graham   Cinta adhesiva   Ente robius vermicularis    Aspirado  duodenal  o   yeyunal   Bote de boca ancha    G iardia ,  Strongyloides ,    Clonorchis ,   E nterobius .vermicularis    Sangre   Tubo c on EDTA     Plasmo dium ,   microfilarias      EDTA: etilediamiotetraacetato      \n17       3.1  Miniparasep    Las muestras de heces se recomienda recogerlas empleando frascos con medio de   transporte  para    a segurar  la  viabilidad  de  las  po si bles  estructuras  parasitarias   existentes.    Uno  de  los  sistemas  disponible  es  el  sistema  Miniparasep     (figura  1)  y   para su correcto uso se deben seguir las instrucciones del fabricante.     Figura 1 : Sistema Miniparasep    Fuente:  Elaboración p ropia       3.2  Bote de   boca ancha    Se  emplearán  estos  botes  cuando   en  las  heces  se  visualiza  la  expulsión  de   cualquier  forma  que  pudiera  se r   un  parásito  o  para  introducir  el  aspirado   duodenal/yeyunal.       3.3  La técnica de G raham    El  test  de  Graham     es  una  técni ca  relativamente  sencilla  de  realizar  que  nos   permite el estudio de  Enterobius vermiculari s   y, en ocasiones, de  Taenia spp .    En el caso de  E. vermicularis , las hembras de este nematodo realizan la puesta de    huevos en la zona anal del paciente, normalmente por las noches, lo cual genera   un intenso picor.  Y en el caso de  Taenia   spp. , a veces se produce la salida a través  \n18       del  esfínter  anal  de  anillos  llenos  de  huevos  o  proglótides,  lo  cual  facilita  el   depósito  de estos huevos en la región perianal.    Para  llevar  a  cabo  este  test  es  necesario  tener  en  cuenta  unas  recomendaciones   durante  el  proceso  de  recogida  de  muestras,  que  deben  ser  correctamente   explicadas a los pacientes que se vayan a someter al test:    -   Las  mue stras  se  deben  recoger  por  la  mañana,  nada  más  levantarse,  y   antes de realizar el aseo matinal.    -   La noche anterior a la recogida de las muestras no se debe aplicar crema   ni pomada en la región perianal.    -   La  cinta  adhesiva  que  se  utilice  para  la  recogida  de  l a  muestra  debe  ser   transparente para poder visualizarlo posteriormente en el microscopio.    -   Se  aconseja  entregar  al  paciente  un  soporte  (portaobjetos)  para  pegar  la   cinta adhesiva una vez recogida la muestra, así como un contenedor para   la misma, de manera q ue el transporte al laboratorio sea el adecuado.    Pasos para la recogida de la muestra   (figura 2) :    1.   Debemos  pegar  un  fragmento  de  la  cinta  adhesiva  sobre  el  extremo   terminal  del  portaobjetos.    Con  el  resto  sobrante  de  cinta  adhesiva  será   con lo que recogeremo s la muestra para posteriormente pegarla a lo largo   del portaobjetos.    2.   Para  recoger  la  muestra,  debemos  separar  los  glúteos  del  paciente  de   manera  que  visualicemos  bien  la  región  perianal,  y  entonces  iremos   pegando  la  cinta  adhesiva  (pegada  al  porta)  por  lo s  márgenes  y  pliegues   del ano varias veces.    3.   Cuando  estemos  seguros  de  haber  pasado  la  cinta  adhesiva  por  la   totalidad  de  la  región  perianal,  con  mucho  cuidado  pegaremos  la  cinta   adhesiva utilizada en el resto del portaobjetos.    De esta forma, la muestra   ya  está lista para su observación al microscopio.    4.   Para  finalizar,  la  persona  que  ha  recogido  la  muestra  debe  lavarse  las   manos muy bien para evitar cualquier posible contagio.     \n19       Figura 2 : P asos para recoger la muestra para el test de Graham            3.4  Sangre    Para  la  obtención  de  la  sangre  que  será  objeto  de  estudio  se  deben  tener  en   cuenta unas recomendaciones:       La  sangre  se  extraerá  por  punción  de  la  pulpa  del  dedo  o  por  punción   venosa       Si  la  obtenemos  a  por  punción  pulpar,  es  preferible  uti lizar  los  dedos   anular o cordial de la mano izquierda.       En el caso de la punción venosa se aconseja no utilizar anticoagulante en   los  tubos  de  extracción  de  la  misma,  pero  si  fuera  necesario  usarlo,  se   recomienda que éste sea EDTA.       Como  en  otros  casos  de  an álisis  parasitológicos,  la  muestra  debe  ser   procesada y examinada al microscopio lo más rápidamente posible tras su   extracción.  Ese  aconseja  que  el  límite  de  tiempo  para  su  estudio  no   sobrepase  una  hora.  Esto  es  importante  porque  el  tiempo  es  un  factor   que     altera  la morfología  de los  hematíes  y  por lo  tanto  la  de  los  posibles   parásitos que existan en la muestra.   \n20       En cuanto a la técnica de laboratorio seleccionada para el estudio del paludismo,   las principales técnicas son la extensión de sangre y la gota gru esa. La gota gruesa   nos permite estudiar mayor cantidad de sangre,        Identificación de   Plasmodium    Sangre en tub os con EDTA       Identificación de f ilarias    Se  aconseja  remitir  una  muestra  de  sangre  anticoagulada  de  10  ml   para   procesarlo  por  técnicas  microscópicas.    Si  se  sospechan  filarias  linfáticas  también   debe remitirse una muestra de sangre extraída de noche    \n21       4.     TÉCNICAS DE  DIAGNÓSTICO PARASITOLÓGICO   \n22       Las  pruebas  diagnósticas  que  el  médico  debe  solicitar  al  laboratorio  v an  a   depender  de  los  síntomas  del  paciente.    Por  citar  algu nos  ejemplos,  a nte  cuadros   de diarrea prolongada se recomienda solicitar un estudio parasitológico de    heces   en  el  que  se  buscarán  huevos  de  platelmintos ,  sus  larvas,  quistes  y  o oquistes  de   protozoos .     En  todo  paciente  febril  procedente  o  visitante  de  zona  endémica  se   recomienda descartar malaria .  En pacientes con fiebre y hemólisis   procedentes de    los  Estados  Unidos  de  Norteamé rica  y  en  pacientes  esplenectomizados  con  o  sin   historia  de  viajes     debe  descartarse    Babesia .     Ante     cuadros  de  fiebre  de  origen   desco nocido  en  ausencia  de  exposición  a  zonas  endé micas  por  la  posibilidad   (remota  pero  potencialmente  grave)     de  malaria     de  aeropuerto,  o  de  adquisició n   por  transfusió n  de  sangre  ( Leishmania  spp .     y  otros),  concentrado  de  hematÌes   ( Plasmodium spp.   y Babesia spp   o de plaquetas ( Try panosoma spp . ).     Otro  punto  importante  en  el  laboratorio  de  Parasitología  es  el  manejo  del   microscopio.  Por  norma  general,  cuando  realicemos  el  enfoque  de  la  muestra   siempre  debemos  comenzar  con  el  objetivo  de  10X,  con  el  cual  podr emos   visualizar  la  mayoría  de  los  parásitos  que  estudiemos  (protozoos     intestinales,   huevos  y  larvas  de  helmintos ,  microfilarias ,  etc).  Después,  en  función  del   organismo  que  estemos  buscando,  será  más  ade cuado  continuar  con  el  objetivo   de  40X  (protozoos  intestinales  y  tisulares,  huevos  y  larvas  de  helmintos,   microfilarias,  cultivo  de    Strongyloides ,     etc.)  y  finalmente  el  objetivo  de  100X  será   necesario para la observación d e protozoos intestinales y tisulares, así como para   las  microfilarias.  En  ocasiones  es  necesario  disponer  de  un  medidor  para  la   correcta identificación de los quistes y/o huevos.      \n23       4.1  RECOMENDACIONES    El estudio de las muestras fecales nos permite detectar   la presencia de protozoos    y  larvas  o  huevos  de  helmintos .  Para  obtener  un  buen  resultados  en  un  examen   parasitológico se deben tener en cuenta diferentes aspectos, como por ejemplo:    -   El empleo de técnicas adecuadas según   el parásito del que se sospeche.    -   La recogida de la muestra debe hacer durante tres días diferentes debido   a que la eliminación de huevos o larvas no es constante, por lo que con el   estudio  de  una  sola  muestra  podríamos  obtener  un  diagnóstico   equivocado.    -   U n correcto transporte de la muestra (está indicado recoger las muestras   de  heces  en  material  de  plástico,  nunca  en  material  absorbente  como   puede ser el papel).    -   Las muestras se deben procesar con rapidez.    -   Se debe realizar un estudio macroscópico de la mues tra, ya que a veces se   pueden observar estructuras visibles a simple vista, como por ejemplo las   proglótides de las tenias, gusanos adultos de  Enterobius ve r micularis   o de   Ascaris lumbricoides .    -   L a observación al microscopio debe ser ordenada y sistemática.    -   Se debe tener en cuenta la consistencia de la muestra (si es diarreica o no)   y escoger la parte de la misma que sea más adecuada para el estudio.    -   La experiencia del observador en una parte muy i mportante en el estudio   parasitológico  ya  que  en  las  muestras  fecales  existen  numerosas   partículas, llamadas artefactos, que pueden ser confundidas con huevos o   larvas de parásito.     A  continuación  describiremos  las  técnicas  de  laboratorio  más  utilizadas  en     el   estudio de los parásitos en heces, centrándonos en el estudio microscópico de la   muestra.      Como hemos comentado al inicio de este libro, tratamos de reunir la información   necesaria para llevar a cabo el análisis parasitológico en pequeños laboratorios,   es   decir,  de  realizar  una  introducción  al  análisis  parasitológico.    Por  este  motivo  no   vamos  a  profundizar  en  aquellas  técnicas  que  requieren  material  especial   (microscopios  de  fluorescencia,  centrífugas  especiales,  etc.)  ya  que  este  tipo  de   análisis  se  su elen  realizar  en  los  laboratorios  de  referencia,  sino  que  vamos   describir  las  técnicas  de  diagnóstico  más  comunes  mediante  las  cuales  podemos   confirmar una sospecha clínica.   \n24       4.2  ESTUDIO MICROSCÓPICO DE LA MUESTRA    Existen  diferentes  métodos  de  estudio  en  el     análisis  de  heces,  algunos  de  los   cuales  incluyen colorantes especiales.       4.2.1  EXAMEN EN FRESCO    Este  tipo  de  examen  se  utiliza  para  la  observación  de  las  formas  móviles  de  los   protozoos     intestinales,  lo  que  cono cemos  como  trofozoitos.  En  este  estudio  es   muy  importante  realizar  el  procesamiento  lo  más  rápidamente  posible  desde  la   obtención  de  la  muestra  ya  que  de  otra  manera  la  muestra  se  seca  y  los   trofozoitos  perderían  la  movilidad.  El  tiempo  recomendado  par a  ll evar    cabo  un   análisis satisfactorio se estima entre 20 y 30 minutos tras su emisión. También es   importante  rechazar  aquellas  muestras  que  hayan  sido  mantenidas  o  guardadas   en nevera.     Para realizar el examen en fresco de la muestra es aconsejable tener en    cuenta la   consistencia de las heces, por lo que diferenciaremos entre heces de consistencia   líquida o diarreica y heces de consistencia normal.      Heces de consistencia líquida o diarreica    Para  el  estudio  de  las  heces  diarreicas  debemos  colocar  un  gota  de  la     muestra   entre un porta y un cubreobjetos y observarla al microscopio utilizando el objetivo   de 40X .    Las  estructuras   que observaremos son, principalmente  forma s móviles:    -   T rofozoitos de A mebas      -   Trofozoitos Giardias    -   Trofozoitos de  Balantidi um    -   Sangre y pus       Heces de consistencia normal    Cuando  la  consistencia  de  las  heces  es  normal,  debemos  mezclar  una  pequeña   cantidad  de  heces  con  una  gota  de  suero  fisiológico  sobre  un  portaobjetos.  Con   una var illa debemos homogeneizar la mezcla lo máximo posible.     La observación al microscopio tenemos que hacerla con el objetivo de 10X y con el   de 40X.    Con el objetivo de 10X podremos visualizar huevos y  larvas de Helmintos .    Con el objetivo de   40X, y  si además añadimos una gota de L ugol, observaremos:   \n25       -   Quistes de Amebas    -   Quistes de Giardias    -   Quistes de  Balantidium    -   Levaduras    -   Isospora   y otros       El  uso  de  Lugol  facilita  la  visualización  de  estas  estructuras  considerablemente,   por lo que es aconsejable utilizarlo si está a nuestra disposición.      \n26       4.3  TÉCNICA S   DE CONCENTRACIÓN DE HECES    Este tipo  de técnicas se aplicarán cuando el número  de parásitos    presentes en la   muestra  pueda  ser  limitado,  ya  que  su  objetivo  es  aumentar  la  sensibilidad  de   análisis parasitológico.    Entre  las  diferentes  técnicas  de  concentración  de  heces  existentes  vamos  a   mencionar  la  Técnica  de  Ritchie,  el  Método  de  Allen  and  Ridley     y  la  Técnica  de   Kato - Katz.       4.3.1  Técnica de  Ritchie     Está  técnica  también  es  conocida  como  técnica  de  formol  éter  y  su  uso  está   estandarizado  en  la  mayoría  de  los  laboratorios  de  Parasitología.    La  técnica  se   basa  en  la  separación  de  las  heces  en  dos  part es,  conteniendo  una  de  ellas  los   parásitos  presentes  en  la  muestra  y  en  la  otra  los  restos  fecales  no  útiles  para   nuestro estudio.    Esta  técnica  está  indicada  para  la  investigación  de  huevos  y  larvas  de  helmintos,   así como quistes de protozoos.    La técnica c onsiste:    1.   En  un  mortero   o  en  un  tubo  de  boca  ancha,  tenemos  que  mezclar   aproximadamente  1  gramo  de  heces  (o  una  porción  de  muestra  de  1cm   de  diámetro)  con  10     ml  de  Formol  al  10%.  Con  ayuda  de  una  varilla   debemos remover la mezcla hasta obtener una consisten cia homogénea.    2.   Dejamos reposar la muestra durante 10 - 15 minutos.    3.   A  continuación,  debemos  colar  la  muestra  con  ayuda  de  un  embudo,  al   cual  hemos  colocado  previamente  una  gasa  extendida  que  nos  ayude  a   filtrar, en un tubo de centrífuga.    4.   Centrifugar y elimina r el sobrenadante    5.   Añadimos ahora 5 ml de alcohol tamponado a ph7 y agitamos.    6.   Añadimos 5   ml de solución de éter, tapamos rápidamente y agitamos con   fuerza durante 1 minuto (con precaución).    7.   Destapamos e l tubo y lo centrifugamos a 2000 rpm durante 5   minutos.    8.   Al  finalizar  este  tiempo,  decantamos  el  sobrenadante  y  limpiamos  las   paredes superiores del tubo con un escobillón para que los restos fecales   que están adheridos no contaminen el sedimento.   \n27       9.   Para  terminar,  debemos  observar  al  microscopio  el  sedimento  obte nido   tras  la  centrifugación.  Para  ello,  lo  diluimos  con  unas  gotas  de  suero  y  lo   examinamos  al  microscopio  a  10X  en  un  principio,  y  posteriormente  a   40X.    10.   Para  optimizar  la  visualización  al  microscopio  podemos  añadir  Lugol  al   portaobjetos en el que deposite mos la muestra.       4.3.2  Método de Allen and Ridley    Este  método  es  muy  parecido  al  anterior,  de  hecho  los  tres  primeros  pasos  son   iguales.    Una vez coladas las heces, se debe añadir 3 ml de éter etílico y una vez tapado el   tubo, agitar vigorosamente. A contin uación lo centrifugam os a 2000 rpm durante   5  minutos  y  después  decantamos  el  sobrenadante.  Para  la  observación  al   microscopio podemos diluir el sedimento con un par de gotas de suero fisiológico.       4.3.3  Técnica de Kato - Katz    Esta técnica es adecuada para el   estudio de helmintos así como para clarificar un   sedimento demasiado espeso.    El material que necesitamos para llevar a cabo esta técnica es:       La solución de Kato, que  está constituida de:       Glicerina (100 ml)       Agua destilada (100 ml)       Verde malaquita al 3% (1  ml)          Papel  celofán  en  trocitos  de  aproximadamente  2x4  cm.    Estos  trocitos  se   introducirán en un recipiente que contiene la solución de Kato durante 24   horas antes de ser utilizados.    Los pasos a seguir a continuación son:    1.   Realizar  una  extensión  de  la  muestra     de  heces  sobre  un  portaobjetos   intentando que la extensión sea moderadamente extensa.    2.   Colocar encima de la extensión un papelito impregnado de la solución de   Kato y eliminar las burbujas de aire que se puedan generar.    3.   Dejamos la preparación bajo la acción   de calor ligero (por ejemplo debajo   de la luz de un flexo) durante 10 minutos.   \n28       4.   La observación al microscopio se realizará al cabo de 20 - 30 minutos y con   el objetivo de 10x.   \n29       4.4  TÉCNICAS  DE  CONCENTRACIÓN  DE  HECES  POR   FLOTACIÓN    4.4.1  Método de Willis   (concentración por flotación de la muestra fecal)    Este método está recomendado para la investigación de protozoos   y helmintos .    La técnica consi ste en:    1.   Extraer  una  muestra  de  heces  de  aproximadamente  el  tamaño  de  un   garbanzo y colocarla en un tubo de boca estrecha    2.   Añadir  una  pequeña  cantidad  de  solución  de  cloruro  sódico  a  saturación   para  disolver  la  muestra.    Una  vez  disuelta  la  muestra  debemos  ll enar  el   recipiente hasta el borde con la misma solución.    3.   Colocamos  un  porta  sobre  el  extremo  del  recipiente  de  tal  forma  que   contacte con el líquido intentando no dejar burbujas de aire entre porta y   líquido.    4.   A los 15 - 20 minutos, retiramos el porta y coloc amos un cubre para poder   observarlo al microscopio.    El principio de esta técnica se basa en que los huevos de helmintos tienen un peso   específico  menor  que  el  de  la  solución  saturada  de  cloruro  sódico  por  lo  que   tienden a subir y pegarse en el portaobjetos .      \n30       4.5  MÉTODOS DE FIJACIÓN DE HECES    4.5.1  Método MIF   (Mertiolato/Yodo/Formol)    Esta técnica es útil para fijar formas vegetativas de protozoos   a la misma vez que   se tiñen, lo que fac ilita la visualización al microscopio.    Los  reactivos  que  utilizamo s  son  dos,  la  s olu ción  de  Mertiolato/Formol  y  la   s olución de Yodo.    La  s olución de Mertiolato/Formol está compuesta por:    -   Glicerina (5 ml)    -   Formol 37% (25 ml)    -   Tintura de Mertiolato (200 ml)    -   Agu a destilada (250 ml)       La  composición de la s olución de Yodo es:    -   Yodo (5 g)    -   Yoduro potásico (10 g)    -   Agua destilada (100 ml)    La  solución  MIF  s e  obtiene  mezclando  9,40  ml  de  s olución  de  solución  de   Mertiolato  con  0,60  ml  de  solución  de  Yodo.    Lo más cómodo  es  p reparar  tubitos   de  l a  solución  MF  que  contengan  4,7    ml  cada  uno.    Se  deben  conservar  en   oscuridad  y  el  tiempo  de  estabilidad  es  de  un  mes  aproximadamente.  Con  la   solución de yodo hacemos lo mismo, preparamos tubitos que contengan 0.30 ml   cada uno.     1.   Mezclamo s  el  contenido  del  tubito  MF  con  el  del  tubito  que  contiene  la   solución de yodo.    2.   Con  ayuda  de  una  espátula  extraemos  una muestra  de  heces  del  tamaño   aproximado de un garbanzo y lo introducimos en un tubo que contenga la   mezcla realizada en el paso 1.    3.   Homog eneizamos  la  muestra  correctamente  y  lo  agitamos.  Dejamos  el   tubo  en  reposo  durante  media  hora  antes  de  iniciar  el  estudio   microscópico.    A  continuación  observaremos la  mezcla  al microscopio,  y  si  existen  protozoos     en   la mues tra, los obser varemos teñidos con una tonalidad verde - amarillenta   intensa    debido a la solución MIF.      \n31       4.5.2  Método de  F ormol    Para  realizar  esta  técnica  necesitamos  solución  acuosa  de  formol  al  10%.   Debemos preparar tubos individuales que contenga n 5 ml de esta solución.    1.   Cogemos  una  muestra  de  heces  de  aproximadamente  el  tamaño  de  un   garbanzo y lo introducimos dentro de uno de los tubos que contiene 5 ml   de solución de formol.    2.   Homogeneizamos la muestra lo máximo posible.    A  partir  de  esta  mezcla  pod emos  realizar  técnicas  de  concentración  como  las  de   formol - éter y tinciones permanentes.   \n32       4.6  CU LTIVO DE LARVAS DE  Strongyloides    Los pasos a seguir son:    1.   Mezclar  unos  50  gr  de  heces  con  agua  hasta  conseguir  una  mezcla   homog énea    2.   Añadir  un  volumen  de  carbón  vegetal  granulado  similar  al  utilizado  en  el   paso número 1 y mezclar homogéneamente.    3.   Preparamos una placa de Petri con un disco de papel vegetal humedecido   en agua en su superficie, y a continuación vertemos sobre éste la m ezcla   preparada en el paso 2    4.   Guardar  la  preparación  en  la  oscuridad  e  ir  examinándola  a  diario  para   observar si hay crecimiento. Si se secase, se puede ir añadiendo agua.    5.   A los 5 - 6 días se añade un poco de agua a la placa de Petri y se observan   los borden  del disco de papel de filtro con una lupa, o bien al microscopio   con el objetivo de 40X.      \n33       4.7  TINCIÓN  PARA  Cryptosporidium ,  Isospora   y   Cyclosporidium   (ZIEHL - NEELSEN   MODIFICADO)    Con  esta  tinción  observaremos  los  ooquistes  teñido  de  color  rojo  in tenso,  sobre   un fondo verde.   Otra tinción recomendada para el estudio de estos parásitos es la   Tinción de Auramina , pero para visual izar los resultados, es necesario disponer de   un microscopio de fluorescencia.    Los pasos que hay que realizar son los siguientes:    1.   En primer lugar se debe realizar una técnica de concentración de parásitos   en  heces  como  puede  ser  la  técnica  del  formol - éter  comentada   anteriormente.    2.   A  partir  del  material  obtenido  en  el  paso  1,  haremos  una  extensión  que   dejaremos secar.    3.   Fijar con alcohol metílico durante 3 minutos    4.   Cubrir la preparación con fucsina fenicada durante 3 minutos, calentando   tres veces el colorante h asta que observemos la emisión de vapores.    5.   Lavar  en  agua  y  proceder  a  la  decoloración  de  la  extensión  cubriéndola   con ácido sulfúrico al 7% durante 1 minuto.    6.   Lavar y colorear con verde malaquita durante 5 minutos    7.   Finalmente, lavar y secar al aire para pode r observarla al microscopio, con   el objetivo de inmersión.      \n34       4.8  INVESTIGACIÓN DE PARÁSITOS EN SANGRE    Los  hemoparásitos ,  así  como  los  vectores  que  los  transmiten,  producen   enfermedades  que  están  ampliamente  distribuidas  en  toda  la  zon a  tropical.  El   aumento  del  turismo  y  la  inmigración  son  fenómenos  que  actualmente  están   favoreciendo el aumento de este tipo de enfermedades en zonas no endémicas.     En la investigación de parásitos en sangre, al igual que el caso de los parásitos en   heces,     es  muy  importante  tener  en  cuenta  los  puntos  que  hemos  comentado  al   principio de este libro ( historia clínica, antecedentes epidemiológicos, periodo de   incubación,  periodicidad  del  parásito,  etc.),  ya  que  toda  esta  información  nos   permitirá  escoger  la  téc nica  más  adecuada  para  llevar  a  cabo  el  estudio  de   manera favorable.    Para  el  diagnóstico  de  los  parásitos  en  sangre  existen  técnicas  inmunológicas   basadas en la presencia de anticuerpos o sustancias derivadas del microrganismo,   y  técnicas  parasitológicas  q ue  se  basan  en  el  estudio  directo  de  la  muestra  y  la   demostración  de la  presencia  del  parásito  en la misma.  Estas  últimas son  las  que   desarrollaremos a continuación.    Los parásitos que se pueden identificar en muestras de sangre son los Plasmodios ,   las Microfilarias , las Leishmanias , las Babesias   y los Tripanosomas .     La investigación de este tipo de parásitos se puede llevar a cabo con el análisi s en   fresco  de  la  muestra  o  mediante  la  realización  de  la  gota  gruesa  con  la  posterior   tinción, que nos facilitará la visualización al microscopio.       4.8.1  EXAMEN EN FRESCO    Esta técnica se usa para agilizar el estudio de la muestra    y poder observar así las   formas móviles de los parásitos presentes en ella. Para ello, la muestra de sangre   debe ser reciente.     Para  realizar  el  examen  en  fresco  de  una  muestra  únicamente  debemos  colocar   una  gota  de  la  misma  entre  un  cubre  y  un  portaobjeto s,  y  a  continuación   observarla al microscopio. Con el objetivo de 10X observaremos las Microfilarias   y   con el objetivo de 40X podremos visualizar los Tripanosomas .        4.8.2  EXAMEN EN GOTA GRUESA    La  técnica  de  la  got a  gruesa     es  una  técnica  de  concentración  que  es  útil  para  la   búsqueda  de  varios  parásitos  como  son  los  Plasmodios ,  las  Microfilarias,  los   Tripanosomas  y las  Babesias .     Esta  técnica  es  importan te  en  aquellos  casos en  los  \n35       que  no  existe  una  parasitación  elevada  (cuando  existe,  es  fácil  localizar  a  los   parásitos en la extensión sanguínea).    Esta técnica es muy fácil de realizar. Los pasos a seguir son:    1.   Colocar una gota de sangre en el centro de un p ortaobjetos    2.   Con el vértice de otro porta debemos remover la gota depositada durante   aproximadamente  1  minuto.  El  objetivo  de  este  paso  es  desfibrinar,  es   decir, evitar la formación de fibrina en el proceso de coagulación    3.   Secar la preparación al aire    4.   Deshem oglobinizar colocando el porta dentro de un reciepiente con agua   destilada en posición vertical    5.   Fijar con alcohol metílico de 2 - 5 minutos    6.   Decantar    7.   Teñir    Para  teñir  la  gota  gruesa  hay  diferentes  técnicas,  algunas  de  las  cuales   comentaremos a continuación.    T inción   de Giemsa para Gota Gruesa    Los reactivos que utilizaremos para esta tinción son        Giemsa       Agua tamponada (pH 7.2)    Los pasos a seguir son:     1.   Diluir al 10% el Giemsa con agua tamponada    2.   Cubrir la totalidad de la gota con   Giemsa durante 30 - 45 minutos.    3.   Lavar y secar    4.   A  continuación  enjuagar  la  preparación  con  agua,  con  mucho  cuidado   para no perder la muestra.    5.   Secar la preparación al aire.    6.   Observar al microscopio con el objetivo de 100X y aceite de inmersión.    Tinción de Field   para Gota Gruesa    El material necesario es:   \n36          Tinción A y B de Field       Agua destilada    Los pasos a seguir son:    1.   Sumergir  la  preparación  de     la     gota  gruesa  durante  5 - 10  segundos  en  la   solución Field A.    2.   Lavar la preparación con agua limpia  durante 3 - 5 segundos.    3.   Sumergir la preparación en la solución Field B durante 3 - 5 segundos.    4.   Volver a sumergirla en agua limpia para eliminar los restos de colorante.    5.   Secar  la  preparación  al  aire    y  observar  al  microscopio  con  el     objetivo  de   100X.       4.8.3  FROT IS  O EXTENSIÓN SANGUÍNEA    La  preparación  de  la  extensión  sanguínea  es  exactamente  igual  que  la  que   hacemos en Hematología para la observación de sangre periférica. Una vez hecha   la extensión, hay que dejar secarla y a continuació n teñirla con Giemsa .    En el caso   del  paludismo,  el  frotis  sanguíneo  es  la  técnica  que  nos  permitirá  identificar  la   especie  de    Plasmodium ,  lo  cual  es  primordial  para  descartar  la  infección  por    P.   falciparum ,  que  es  el  que  mayor  repercusiones  pronósticas  tiene  sobre  el   desarrollo de la enfermedad.    Tinción de Giemsa para el frotis    Los pasos a seguir son:    1.   Fijar la preparación con Metanol durante 3 minutos.    2.   Cubrir la preparación con Giemsa y agu a destilada durante 30 - 45 minutos.    3.   Aclarar con agua, con cuidado de no arrastras la muestra, y dejar secar la   preparación al aire.       4.8.4  TÉCNICA  DE  LEUCOCONCENTRACIÓN  CON  SAPONINA  PARA   MICROFILARIAS    A  excepción  de    Onchocerca  volvulus     y    Mansonella  streptocerca     cuya  localización   se  sitúa  en  la  piel  y  ojos  y  por  lo  tanto  es  necesario  realizar  una  biopsia  para   confirmar  el  diagnóstico,  el  resto  filarias  es  posible  localizarlas  en  sang re   periférica.   \n37       Aunque  para  el  diagnóstico  de  filariasis  se  pueden  utilizar  diferentes  técnicas,   algunas  ya  mencionadas,  como  la  gota  gruesa,  extensión  sanguínea ,  examen  en   fresco , etc., la técnica más re ntable es la de leucoconcentración .     Esta técnica consiste en:    1.   Poner  en  un  tubo  de  centrífuga  3  ml  de  sangre  con  un  anticoagulante   diferente a la heparina.    2.   Añadir 6 ml de suero fisiológico y de 4 a 6 gotas de solución de saponina   al   2%.  (La saponina no mata a las  microfilarias, por lo que si están presentes   las podremos ver móviles).    3.   Tapar y agitar el tubo. De esta forma facilitaremos la hemólisis en el cono   del extremo terminal del tubo de centrífuga.    4.   Centrifugamos a 1.500 rpm du rante 10 minutos.    5.   Eliminamos el sobrenadante    6.   Y  finalmente  recogemos  el  sedimento  con  una  pipeta  para  realizar  una   preparación entre porta y cubre.       4.8.5  TÉCNICA DE MICROFILARIAS CON HEMATOXILINA    Con  la  hematoxili na  podemos  teñir  la  va ina  de  Loa - Loa ,  que  no  se  tiñe  con   Giemsa .    Esta  técnica  es  exactamente  igual  que  la  técnica  de  Leucoconcentración,  sólo  se   diferencia  en  la  existencia  de  un  último  paso,  que  consiste  en  la  tinción  de  la   extensión  obtenida  con   Hematoxilina  durante  10  minutos,  calentando   suavemente el colorante. Después sólo es necesario lavar con agua y dejar secar.        4.8.6  MEMBRANAS DE NUCLEOPORE    El  principio  de  esta  técnica  se  basa  en  que  el  tamaño  del  poro  de  estas   membranas permite el paso de la sangre pero no el de las microfilarias .    Es  una  técnica  muy  fácil  de  realizar.  Tenemos  un  cilindro  con  una  membrana   interna  por  la  cual  se  hace  pasar  la  sangre  problema  (de  3  a  5  ml).  Finalmente   extraem os  la  membrana  y  la  observamos  al  microscopio  sobre  un  porta  con  el   objetivo de 10X.   \n38      \n39       5.     PRINCIPALES  PARASITOS  CAUSANTES  DE   INFECCIÓN   \n40       La s   formas parasitarias   que con más frecuencia nos encontr amos en muestras de   heces son la s siguientes:    -   Quistes de A mebas      -   Quistes de   Giardia    -   Huevos y/o adultos de  E. vermicularis    -   Huevos y/o adultos de  Ascaris    -   Huevos de  Schistosoma      -   Huevos y/o proglót ides de   Tenia       E n  cuanto  a  los  parásitos  sanguíneos ,  el  que  probablemente  observaremos     con   mayor frecuencia   es   Plasmodium .      \n41       5.1  PARASITOS INTESTINALES   \n42       5.1.1  PROTOZOOS        \n43          PARÁSITO   Entamoeba histolytica    ENFERMEDAD   Ame biasis    PERIODO DE INCUBACIÓN   2 - 21 días    EPIDEMIOLOGÍA    Su distribución es mundial, pero más frecuente en áreas tropicales y subtropicales. Según   datos  de  la  OMS ,  500  millones  de  personas  pueden  ser  portadores  de  este  parásito  y  se   producen  decenas  de  miles  de  muertes  anuales  causadas  por  colitis  fulminantes  o   abscesos hepáticos.     SINTOMATOLOGÍA    La  amibiasis  intestinal  puede  ser  asintomática  o  manifestarse  en  fo rma  de  diarrea  con   sangre  y  moco.  La  amibiasis  hepática  puede  cursar  con  complicaciones  que  afectan  al   hígado produciendo absceso hepático.    MECANISMO DE   INFECCIÓN    FORMA EN   HECES   DIAGNÓSTICO    La  transmisión  más   frecuente  es  de  persona  a   persona  por   contami nación  fecal,  ya   sea  de  los  alimentos  o  de   las  manos,  pero  se  puede   dar  el  caso  de  transmisión   sexual  en  varones   homosexuales.    Quiste  o   trofozoito    Identificación  al  microscopio  de  trofozoitos   en el examen al fresco de las heces pero estos   sólo  se  podrán  vi sualizar  correctamente  si   han  ingerido  hematíes  o  leucocitos.  La   observación de quistes no permite diferenciar   entre  E.  histolytica   y  E.  dispar   o  E.   moshkovskii , por lo que no se podrá efectuar   un  diagnóstico  definitivo  y  será  nece sario   recurrir a técnicas de detección de antígeno.      \n44          PARÁSITO   Giardia lambria    ENFERMEDAD   Giardiasis    PERIODO DE INCUBACIÓN   6 - 21 días    EPIDEMIOLOGÍA    Se  trata  de  una  infección  muy  frecuente  y  con  una  distribuci ón  mundial,  asociada  sobre   todo  a  zonas  en  las  que  el  saneamiento  es  deficiente.  Según  la  OMS  se  estima  que  en   África, América Latina y Asia se producen más de 200 millones de casos anuales.     SINTOMATOLOGÍA    La  mayoría  de  las  veces  es  asintomática.  Afecta     sobre  todo  a  niños,  donde  se  puede   presentar con diarrea, síndrome de malabsorción y retraso en el crecimiento.    MECANISMO DE INFECCIÓN   FORMA EN HECES   DIAGNÓSTICO    La  transmisión  más   frecuente  es  de  persona  a   persona  por  contaminación   fecal,  ya  sea  de  los    alimentos  o  de  las  manos,   pero se puede dar el caso de   transmisión  sexual  en   varones homosexuales.    Quiste  o   trofozoitos    Identificación  al  microscopio  de   trofozoitos  en  el  examen  al  fresco  de   las  heces,  o  de  quistes.  El  examen  en   fresco  nos  permitirá  obser var  la   movilidad  típica  de  los  trofozoitos  y  el   examen  por  tinción  de  MIF   nos   permitirá  observar  los  quistes   flagelados.      \n45          PARÁSITO   Cryptosporidium spp.    ENFERMEDAD   Criptosporidiosis    PERIODO DE INCUBACIÓN   4 - 22 días    EPIDEMIOLOGÍA    Su distribución es mundial y muy frecuente.    SINTOMATOLOGÍA    Existen  dos  cuadros  clínicos.  En  individuos  inmunocompetentes  la  enfermedad  suele  ser   corta,  leve  y  autolimitada.  En  individuos  inmunodeprimido s  la  infección  es  más  grave  y   duradera,  cursando  con  diarrea  acuosa  de  hasta  varios  meses  de  duración,  vómitos,   nauseas y dolores.     MECANISMO DE INFECCIÓN   FORMA   EN HECES   DIAGNÓSTICO    La  transmisión  se  produce  mediante   la  ingesta  de  agua  y  alimentos   contam inados,  además  de  prácticas   sexuales oro - anales.    Ooquiste   maduro    Identificación  de  ooquistes  en  heces   mediante  la  tinción  de  Ziehl - Neelsen    modificada,  previa  concentración  de   las heces.      \n46          PARÁSITO   Ciclospora cayetanensis    ENFERMEDAD   Ciclosporosis    PERIODO DE INCUBACIÓN   1 - 3 semanas    EPIDEMIOLOGÍA    Su distribución es mundial aunque es endémica en América Central y del Sur, y Asia.     SINTOMATOLOGÍA    El  cuadro  clínico  es  si milar  al  producido  por    Cryptosporidium  spp,    siendo  más  grave  en   individuos inmunocomprometidos.     MECANISMO DE INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    La  transmisión  se  produce   mediante  la  ingesta  de   ooquistes  presentes  en   agua o alimentos.    Ooquiste   inmaduro    Identificación de ooquistes en heces en fresco   o mediante el MIF . Los ooquistes son de mayor   tamaño que los de  Cryptosporidium   por lo que   no hay que recurrir a tinciones especiales.      \n47          PARÁSITO   Isospora bel li    ENFERMEDAD   Isosporosis    PERIODO DE INCUBACIÓN   9 - 17 días    EPIDEMIOLOGÍA    Su distribución es mundial aunque es más frecuente en áreas tropicales y subtropicales. La   enfermedad es más grave en niños y en individu os inmunocomprometidos.    SINTOMATOLOGÍA    En individuos inmunocompetentes el cuadro clínico suele ser autolimitado y caracterizado   por la presencia de diarrea.  En individuos inmunocomprometidos la enfermedad se puede   cronificar.    En éstos,  suele  cursar  con  d iarrea  abundante  y  líquida  que  a  veces  da lugar  al   ingreso hospitalario debido al desequilibrio hidroelectrolítico que genera .    MECANISMO DE INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    La  transmisión  se  produce   mediante  la  ingesta  de   ooquistes presentes en agua   o alimentos.    Ooquiste   inmaduro    Identificación  de  ooquistes en  heces en  fresco   o mediante el MIF . Los ooquistes son de mayor   tamaño que los de  Cryptosporidium   por lo que   no hay que recurrir a tinciones especia les.      \n48          PARÁSITO   Sarcocystis bovihominis    ENFERMEDAD   Sarcocistosis    PERIODO DE INCUBACIÓN   14 - 18 días    EPIDEMIOLOGÍA    La distribución es mundial pero muy infrecuente.    SINTOMATOLOGÍA    Suele  producir  un  cuadro  gastroentérico  agudo  y  autolimitado  cuya  principal   manifestación es la presencia de diarrea.    MECANISMO DE INFECCIÓN   FORMA EN HECES   DIAGNÓSTICO    La  infección  ocurre  por  ingestión  de  carne   de  cerdo  o  ganado  vacuno  contaminada   con quistes.    Ooquiste  ma duro,   esporoquiste.    Identificación  de   ooquistes en heces.      \n49          PARÁSITO   Balantidium coli    ENFERMEDAD   Balantidiasis    PERIODO DE INCUBACIÓN   4 días -   semanas    EPIDEMIOLOGÍA    Su distribución es mundial aunque no es  una parasitosis muy frecuente.    SINTOMATOLOGÍA    El  cuadro  clínico  puede  ser  fulminante  de  manera  excepcional.  Normalmente  cursa  con   diarrea acuosa con moco, sangre y pus, y en algunos casos se cronifica.    MECANISMO DE INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    La  infección  en  el  hombre  se  produce   por  vía  fecal - oral,  pero  básicamente  es   una  zoonosis  cuyo  reservorio  lo   constituyen los cerdos y las ratas.    Quiste  o   trofozoito    Identificación  de  trofozoitos  en   heces  líquidas  y  examen  en   fresco,  o  de  quistes  en  heces  d e   consistencia no bución mundial, pero más frecue nte en el Norte de Europa, Norte y Sur de América,   Japón, Perú y Chile.    SINTOMATOLOGÍA    El  cuadro  clínico  más  característico  es  la  anemia  perniciosa  debido  a  que  el  parásito   compite por la vitamina B12 con el organismo que parasita.     MECANISMO DE INFECCI ÓN   FORMA EN HECES   DIAGNÓSTICO    Transmisión  mediante  la  ingestión   de  pescado  de  agua  dulce  crudo   infectado con cisticercos.    Huevos,   proglótides    Identificación  de  los  huevos  o   segmentos  del  parásito   (proglótides) en las heces.      \n83          PARÁSITO   Dipylidium caninum    ENFERMEDAD   Dipilidiasis    PERIODO DE INCUBACIÓN   3 - 4 semanas    VIDA MEDIA   Menos de 1 año    EPIDEMIOLOGÍA    Distribución mundial, y se encuentra con mayor frecuencia en perros y gatos. La infección   en el hombre a fecta sobre todo a niños.    SINTOMATOLOGÍA    El  cuadro  clínico  es  muy  leve,  caracterizándose  por  prurito  anal,  dolor  abdominal  y   diarrea.       MECANISMO DE  INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    Transmisión  se  produce  a  través  de  las   pulgas de los perros, median te la ingestión   accidental, sobre todo en niños.    Huevos,   proglótides    Identificación  de  los  huevos  o   segmentos  del  parásito   (proglótides) en las heces.   \n84       5.2  HEMOPARÁSITOS   \n85          PARÁSITO   Plasmodium      ENFERMEDAD   Mala ria o Paludismo    EPIDEMIOLOGÍA    Enfermedad  parasitaria  común  en  muchas  partes  del  mundo  que  está  causada  por   especies del género  Plasmodium , que se transmiten mediante la picadura de las hembras   del  mosquito    Anopheles .  Según  las  estimacio nes  de  la  Organización  Mundial  de  la  Salud   (OMS)  en  el  mundo  hay,  cada  año,  unos  247  millones  de  casos  de  paludismo  que   ocasionan  la  muerte  de  881.000  personas,  el  91% en  África  y  en  su mayoría  en  menores   de 5 años (se calcula que cada 30 segundos un niño  muere a causa de esta enfermedad). A   pesar de estos datos, la tasa de mortalidad de esta enfermedad se ha reducido en un 47%   a  nivel  mundial  desde  el  año  2000     (OMS,  2015) .  Aún  así,  el  paludismo  sigue  siendo  un   grave  problema  de  salud  pública  en  muchas  part es  del  mundo,  con  un  coste  económico   que  supera  los  12  millones  de  dólares  anuales.  El  agente  etiológico  de  esta  enfermedad   pertenece  al  género    Plasmodium .  Hay  cuatro  especies  de    Plasmodium     que  producen  la   enfermedad  en  el  humano  y  que  son:    P.  vivax ,    P.  falcipar um ,    P .  malariae     y    P.  ovale .  De   estas cuatro especies, la más peligrosa es  P. falciparum , siendo las embarazadas un grupo   de riesgo important e.     SINTOMATOLOGÍA    Las manifestaciones clínicas dependen de la especie de parásito que produce la infección   así como del estado inmunológico del paciente. La infección más grave es la producida por   P. falciparum , que puede llegar a ser mortal, cursando c on fiebre alta prolongada, dolores   de  cabeza  intensos  y  vómitos.  Las  infecciones  graves  suelen  estar  asociadas  a  elevadas   parasitemias  provocando  convulsiones,  estupor,  colapso,  vómitos,  diarreas,  anemia  e   ictericia.     MECANISMO DE INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    La transmisión se produce por la picadura de   hembras  del  mosquito  Anopheles.  La   transmisión también se puede dar por el uso   de  agujas  infectadas  o  por  transfusiones   sanguíneas de sangre infectada.    Trofozoitos  en   el  interior  del   hematíe    Detecc ión  del  parásito  en   sangre periférica mediante   extensión  sanguínea   o   gota gruesa .      \n86          PARÁSITO   Babesia spp .    ENFERMEDAD   Babesiosis      EPIDEMIOLOGÍA    Se  trata  de  una  enfe rmedad  rara  en  el  ser  humano  que  casi  siempre  afecta  a  pacientes   inmunodeprimidos. Es similar al paludismo pero en este caso se transmite por picadura de   garrapatas del género  Ixodes.    SINTOMATOLOGÍA    Suele  ser  asintomática  o  autolimitada  en  la  mayoría  de  los  pacientes,  produciendo   complicaciones  en  pacientes  con  edad  avanzada  y  en  inmunodeprimidos,  como  anemia   hemolítica e insuficiencia renal.    MECANISMO DE   INFECCIÓN   FORMA EN HECES   DIAGNÓSTICO    Transmisión  mediante  la   picadura  de  garrapatas  del   género  Ixod es .    Trofozoitos  en  el   interior  de  los   hematíes.    Detección  del  parásito  en  sangre   periférica  mediante  extensión  sanguínea    o  gota  gruesa .  Importante  no  confundir   con los trofozoitos de  Plasmodium .       \n87          PARÁSITO   Leishmania spp.    ENFERMEDAD   Leishmaniasis    EPIDEMIOLOGÍA    Existen muchas especies de  Leishmania   algunas de las cuales parasitan al hombre y otras a   animales como los perros, los roedores y otros mamíferos. Aun que las enfermedades que   puedan  producir  en  el  hombre  sean  clínicamente  distintas,  todas  se  caracterizan  por   infiltración inflamatoria crónica, necrosis focal y fibrosis. La incidencia de la infección por   Leishmania   es mayor en pacientes inmunodeprimidos.    Según datos de la OMS, se calcula   que existen 12 millones de personas infectadas en todo el mundo, y que cada año surgen   más de 2 millones de casos nuevos.     SINTOMATOLOGÍA    Existen  varias  formas  de  leishmaniasis,  la  visceral,  la  cutánea,  mucocutánea  y  cut ánea   difusa. Cada una de estas formas está producida por diferentes especies de    Leishmania   y   la  sintomatología  es  variada.  En  el  caso  de  la  leishmaniasis  visceral,  se  observa   hepatomegalia, esplenomegalia y anemia. En el caso de la leishmanisis cutánea no    existe   diseminación generalizada hacía los órganos internos pero si suele parecer una úlcera en   el  lugar  de la  picadura.  En la  leishmaniasis  mucoccutánea se  observan  múltiples  lesiones   cutáneas y posteriores ulceraciones.    MECANISMO DE   INFECCIÓN   FORMA EN H ECES   DIAGNÓSTICO    La  transmisión  se   produce  por  la   picadura  de  un   vector,  el  flebótomo   hembra  o  mosca   arenaria.    De  manera  excepcional  se   pueden observar en sangre   periférica.  Son  parásitos   extracelulares  por  lo  que   no  debemos  buscarlos  en   el interior de lo s hematíes.      Aunque  de  manera  excepcional   puedan  aparecer en  sangre  periférica,   está  indicada  la  realización  de  una   punción  esternal  para  realizar  el   estudio  en  médula  ósea,  donde  los   encontraremos  en  el  interior  de  los   macrófagos.       \n88          PARÁSITO   Tripanoso ma brucei   gambiense /T. brucei rhodesiense  (variante africana)    ENFERMEDAD   Tripanosomiasis   o Enfermedad del sueño    EPIDEMIOLOGÍA    Se trata de una inf ección protozoaria transmitida por la mosca tsetsé ( Glossina sp .) y que   principalmente  afecta  al  sistema  nervioso  central.  Esta  enfermedad  representa  un  grave   riesgo  en  el  África  subsahariana,  siendo  la  infección  de    T.  b.  rhodesiense     endémica  de   África ori ental y la producida por  T.b. gambiense   de África occidental y central.     SINTOMATOLOGÍA    La infección cursa con malestar, prurito, dolores de cabeza, erupciones cutáneas y edema,   además de anemia normo e hipocrómica y afectación cardiaca que puede llegar  a producir   insuficiencia cardiaca.    MECANISMO DE INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    La  transmisión  se  produce  por   inoculación  a  partir  de  la  picadura   de la mosca vector.    Tripomastigotes       Identificación en sangre periférica   de los tripomastigotes      \n89          PAR ÁSITO   Tripanosoma cruzi      ENFERMEDAD   Enfermedad  de  Chagas   o  Tripanosomiasis   americana    EPIDEMIOLOGÍA    Enfermedad  transmitida  por  el  pro tozoo    T.  cruzi ,  tiene  elevada  importancia  sanitaria   debido a que no se puede curar y tiene una elevada prevalencia. Según datos de la OMS,   afecta a unos 16 - 18 millones de personas y una elevada variedad de animales domésticos   y salvajes tanto en América de l Sur como América Central.    SINTOMATOLOGÍA    La  fase  aguda  de  la  enfermedad  suele  ir  acompañada  de  fiebre,  malestar  general,   linfadenopatías y hepatoesplenomegalia. Existe una fase crónica indeterminada en la que   los  pacientes  están  asintomáticos,  siendo  u na  importante  fuente  de  transmisión  sobre   todo en bancos de sangre, y por último, la fase crónica que se caracteriza por compromiso   visceral irreversible.    MECANISMO DE INFECCIÓN   FORMA EN   HECES   DIAGNÓSTICO    La  transmisión  se  produce   principalmente  por  la   p icadura de varias especies de   chinches del género Triatoma,   pero  también  por  transfusión   sanguínea y congénita.    Tripomastigotes    Observación  de  los  tripomastigotes  en   sangre periférica sobre todo en la etapa   aguda  de  la  enfermedad  donde  la   parasitemia  es  el evada.  En  las  etapas   crónicas  es  muy  difícil  observar   parásitos  en  sangre  por  lo  que  el   diagnóstico se basará en la serología.      \n90         \n91       6.     IMÁGENES   \n92       Las imágenes que mostramos a continuación ha n sido localizadas en la W eb de la   Organización  Mundial  de  la  Salud  ( http://www.who.int/es/   ),  en  la  W eb  del   Centers  fod  Diseases  Control  and  Prevention   ( http://www.cdc.gov/ncidod/dpd/parasites/ )  y  de  las  láminas  realizadas  y   editadas    por  el  Dr.  Laurence  R.  Ash,  Profesor  de  Enfermedades  Infecciosas  y   Tropicales  del  Departamento  de  Epidemiología  de  la Escuela  de  Salud  Pública  de   la  Universidad  de  California  (Los  Ángeles,  EEUU),  disponibles  en  el  libro  “Medios   auxiliares  para  el  diagnósti co  de  las  parasitosis  intestinales”  publicado  por  la   Organización  Mundial  de  la  Salud.  Las  imágenes  que  no  están  referenciadas   pertenecen a nuestro archivo personal.       \n93       6.1  PROTOZOOS    Entamoeba histolytica      F uente:     function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
</body>
