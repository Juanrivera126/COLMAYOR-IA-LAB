ocioambiental con una visión   multi  e  interdisciplinaria  para  contribuir  a  la  solución  de  diversos  problemas  en    la frontera sur de México. Las actividades de investigación se realizan a través   de  ocho  departamentos  académicos:  1)  Agricultura,  Sociedad  y  Ambiente,     2)  Ciencias  de  la  Sustentabilidad,  3)  Conservación  de  la  Biodiversidad,    4)  Ecología  de  Artrópodos  y  Manejo  de  Plagas,  5)  Observación  y  Estudio    de  la  Tierra,  la  Atmósfera  y  el  Océano,  6)  Salud,  7)  Sistemática  y  Ecología     Acuática, y 8) Sociedad y Cultura, este último al que me encuentro adscrita.    Una  mirada  al  propósito  de  cada  departamento  permite  aproximarnos  a    la  posición  hasta  cierto  punto  marginal  de  la  metodología  cualitativa  de  la    investigación  en  ECOSUR.  Así,  de  212  personas  que  conforman  al  personal    de  investigación,  incluyendo  Investigadoras  e  Investigadores  por  México  y  en    estancia posdoctoral, aproximadamente 25% realizan investigación cualitativa.   En  este  contexto,  quienes  realizamos  este  estilo  de  investigación  en  ECOSUR   \n72   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  estamos constantemente atrapados en falsas dicotomías y antagonismos entre   la  tradición  cualitativa  y  cuantitativa  de  la  investigación  científica.  Sirva  el    contenido de este capítulo para legitimar el quehacer investigativo que desde   la tradición cualitativa impulsamos en el contexto de los seminarios de tesis, los   cursos de metodología y las investigaciones propias desde hace veinte años.  Fue en 2001 cuando participé en la presentación y defensa del curso Métodos   Cualitativos de Investigación I1 que se empezó a impartir en 20022 junto con el  colega Rolando Tinoco Ojanguren+. Este curso tenía el propósito de ser un primer   acercamiento a las metodologías cualitativas insistiendo en que su adopción en   una  investigación  debe  resultar  del  propio  objeto  de  investigación,  y  no  de  la    moda o elección de una técnica cualitativa en sí misma. Así se pretendía dotar   de las bases teóricas fundamentales para la utilización de los análisis cualitativos   en los trabajos de investigación del estudiantado.  Más  tarde,  en  2017,  el  curso  de  2002  se  rediseñó  curricularmente  y  a  partir  de    entonces se imparte de manera colegiada entre integrantes del Departamento   Sociedad  y  Cultura  el  curso  Metodología  Cualitativa  para  las  Humanidades    y  las  Ciencias  Sociales.  Este  avance  en  los  contenidos  curriculares  de  este     estilo  de  investigación  también  se  manifiesta  en  las  investigaciones  de  tesis    dirigidas  o  asesoradas  por  personal  académico  de  ECOSUR.  Para  dar  cuenta    de  este  incremento  integré  una  base  de  datos  con  los  registros  de  270    tesis  para  el  periodo  1995-2024  catalogadas  en  el  Sistema  de  Información     Bibliográfica  (SIBE)  de  ECOSUR,  a  partir  de  las  palabras  clave  “investigación   cualitativa”, “investigación mixta”, “etnografía”, “feminista”, “constructivista” y   “fenomenológica” para tener un primer acercamiento, a partir de un conteo de    las palabras más frecuentes, 3  a las temáticas estudiadas, las personas o grupos  con quienes se realiza la investigación, los lugares de estudio y las perspectivas   teórico-metodológicas utilizadas (cuadro 4.1). 1 En aquel entonces también se ofertaba el curso Métodos Cualitativos de Investigación II   a cargo de Ramfis Ayús Pérez+ en la Unidad Villahermosa, el cual era una continuidad del   impartido en San Cristóbal.2 Cuando fui estudiante de la Maestría en Ciencias en Recursos Naturales y Desarrollo Rural  (1997-1998), los cursos metodológicos que realicé fueron métodos estadísticos e indicadores   en salud y demografía. 3  Utilizando el  software  de análisis cualitativo NVivo. \n73  *SCLC: San Cristóbal de Las Casas.  Fuente: Elaboración propia. Se  trata  de  tesis  principalmente  realizadas  en  Chiapas  seguidas  por  los  otros    estados donde se localizan las sedes de ECOSUR: Tabasco, Campeche y Quintana   Roo,  y  en  menor  medida  en  otros  del  sureste  de  México,  como  Yucatán,    Oaxaca, Guerrero y Veracruz. Las mujeres han sido las principales participantes   en las investigaciones, seguidas por personas indígenas, campesinado, migrantes,   4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR  Cuadro  4.1.  Tesis  de  licenciatura  y  posgrado  dirigidas  o  asesoradas  por  personal    académico de ECOSUR para el periodo 1995-2024. \n74   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  jóvenes  y  estudiantes.  En  términos  teórico-metodológicos  se  han  abordado    prácticas,  conocimientos,  experiencias,  percepciones,  perspectivas,  saberes,     significados, cosmovisiones e imaginarios relacionados con temáticas sociales,    ambientales y productivas desde perspectivas de género, frontera, interculturales,    generacionales, territoriales y de las emociones, entre otras (figura 4.1).  Fuente: Imagen generada con el  software  de análisis cualitativo Nudist.  Figura 4.1. Frecuencias de palabras a partir de 270 tesis de licenciatura y posgrado   dirigidas  o  asesoradas  por  personal  académico  de  ECOSUR  para  el  periodo  1995-  2024. \n75  Cabe señalar que en la base de datos conformada por 270 tesis catalogadas   como cualitativas en el SIBE 3.3% corresponden al periodo 1995-2002; 28.2% al   periodo  2003-2013,  y  68.5%  al  periodo  2014-2023,  lo  que  muestra  un  notable    incremento de este estilo de investigación en las tesis del estudiantado egresado   principalmente de nuestros programas de posgrado. Llama la atención que casi   7 de cada 10 (68.5%) de estas tesis las realizaron mujeres.  Punto de partida  Si asumimos la metodología como la lógica interna del proceso de investigación   y  los  métodos  como  los  procedimientos  generalmente  regulares  y  ordenados    que  seguimos  al  realizar  investigación,  diríamos  que  metodología  y  método     no son sinónimos, aunque así los usemos comúnmente. En segundo lugar, las    tradiciones cualitativa y cuantitativa de investigación tienen diferentes lógicas    internas  definidas  por  la  elección  epistemológica  desde  donde  definimos    objetos de estudio, objetivos, teorías y métodos. Así, inicio este capítulo con la   idea  que  también  lo  cierra:  en  el  fondo  de  la  elección  metodológica  está  la    cuestión epistemológica. Por lo tanto, la elección del método es secundaria a la   elección del paradigma.   Una postura epistemológica se asume a partir de la elección de los paradigmas   que representan regímenes de creencias, suponen ciertas visiones del mundo e    implican sistemas filosóficos globales, cada uno con ontología, epistemología y    metodología.   La postura que toma cada persona ante la realidad, incluida la de quien  investiga,   se define por los supuestos que orientan sus respuestas a la pregunta ontológica   ¿cuál es la naturaleza de la realidad? Es objetiva o es subjetiva y múltiple; la    pregunta epistemológica ¿cuál es la relación entre quien investiga y aquello que   investiga? Apunta a dirimir si debe darse una separación entre quien investiga   y  el  objeto  de  investigación  como  condición  necesaria  del  conocimiento    objetivo, o quien investiga está inmerso en el contexto que investiga y entonces    la interacción y la mutua influencia es parte de la investigación. Finalmente,    la  pregunta  metodológica  permite  referirse  a  cómo  la  persona  que  investiga    procede  para  generar  conocimiento  de  la  realidad  que  considera  puede  ser     conocida según el consenso en un campo de estudio específico.  4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR \n76   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Grosso modo  se dice que los paradigmas conocidos y que configuran la historia   de  la  ciencia  van  del  positivismo  en  un  extremo  al  constructivismo  en  el  otro    extremo  donde  para  cada  paradigma  se  establecen  los  supuestos  sobre  la    naturaleza  de  la  realidad  (ontología),  del  conocimiento  (epistemología)  y  el    modo apropiado de producirlo (metodología). Así, mientras en el positivismo se    asume que la realidad es objetiva, luego entonces el conocimiento científico    es  la  verdad  objetiva  y  el  modo  apropiado  para  producirlo  es  a  través  de    métodos experimentales o cuasi experimentales (Briones, 2002). En cambio, en    el constructivismo se asume que la realidad es subjetiva y múltiple y por lo tanto   las verdades son múltiples y subjetivas y el modo apropiado de producir estas    realidades  es  a  través  de  métodos  cualitativos  (Guber,  2012;  Bonilla-Castro  y     Rodríguez, 2013).   En esta suerte de continuum donde ubicamos a grandes rasgos los paradigmas   actualmente disponibles, el enfoque cualitativo es un “estilo” de investigación   caracterizado por su interés en la trama “oculta” de la vida cotidiana a través de    una forma de comprensión de la realidad social diferente al método objetivista   de la tradición heredada (Guadarrama, 1999).  Podemos decir, de manera simplificada, que mientras la tradición heredada   busca  causas,  persiguiendo  control  y  explicación,  la  investigación  cualitativa    indaga la comprensión de complejas interrelaciones que se dan en la realidad,   centrando la indagación en los hechos.  En  este  sentido,  la  lógica  de  la  investigación  cualitativa  es  inductiva,  es  decir,    parte  de  realidades  concretas  y  los  datos  que  estas  le  aportan  para  llegar  a    conceptos y categorías emergentes de forma inductiva durante la investigación   a partir de la cual se funda una teorización posterior con la intención de construir   teoría  (Max  Weber,  citado  en  Ruíz-Olabuenaga,  1999).  En  oposición,  la  lógica    hipotética-deductiva,  característica  de  la  investigación  cuantitativa,  busca  la    prueba de hipótesis y la contrastación de los hechos observables con respecto    a las generalizaciones teóricas en busca de la corroboración o rectificación de    esas generalizaciones; es decir, de la comprobación del modelo y de la teoría   (E. Durkheim, citado en Ruíz-Olabuenaga, 1999).  Esta  inversión  en  el  proceso  de  conocimiento  se  funda  en  una  lógica  del    descubrimiento, donde la observación de los fenómenos particulares es el punto    de partida para la formulación de hipótesis y la búsqueda de fundamentos.   Es  en  la  comprensión  del  significado  de  esos  hechos  sociales  históricos  y  no  \n77  en la búsqueda de generalizaciones donde se encuentra la motivación de la   investigación  cualitativa  para  construir  una  relación  de  conocimiento.  En  este    sentido, los momentos de la lógica inductiva de la investigación cualitativa son:   observación-datos-hipótesis-teoría4 (cuadro 4.2).  Otra  figura  que  permite  ilustrar  la  lógica  de  investigación  característica    del  paradigma  cualitativo  o  el  cuantitativo  es  pensar  a  quien  investiga    cualitativamente como persona viajera que construye conocimiento mediante   la conversación con la gente encontrada durante el recorrido de investigación   a  partir  de  relatos  y  narrativas  que  conducen  a  nuevo  conocimiento  y  a  la    transformación  de  quien  investiga.  Su  opuesto  es  la  persona  investigadora    como minera en la tradición heredada en busca del conocimiento como algo    “dado” que hay que saber extraer a manera de valiosas pepitas de experiencia   y significado almacenadas en el interior del sujeto (Kvale, 2011).  Fuente: Adaptado de Mackenzie y Knipe (2006) y Kvale (2011). 4 En diversas obras sobre investigación cualitativa se ha escrito ampliamente sobre la lógica  de la investigación cualitativa en oposición a la investigación cuantitativa en las ciencias   sociales (v. g., Bonilla-Castro y Rodriguez, 2013; Vasilachis, 2007; Denman y Haro, 2000; Ruíz-   Olabuenaga, 1999).  4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR  Cuadro 4.2. Lógica de la investigación cualitativa. \n78   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Así  entonces,  la  investigación  cualitativa  tiene  el  propósito  de  entender  y    describir  en  profundidad,  por  medio  de  conceptos  teóricos  si  es  necesario,  el     movimiento de las sociedades. O, citando a Boyle (2005, p. 189): “comprender    por  qué  ocurre  el  comportamiento  y  bajo  qué  circunstancias”,  donde  el    conocimiento del contexto es fundamental.  Denzin  y  Lincoln  (2011)  organizan  una  línea  del  tiempo  de  ocho  momentos,    distinguiendo enfoques, autorías y obras icónicas para cada uno, de la llamada   tradición  cualitativa  del  conocimiento  en  América  del  Norte  desarrollada     principalmente en el siglo XX. Afirman que estos momentos históricos operan    todavía en el presente y de manera simultánea, ya sea como herencia o como    conjunto de prácticas que aún se siguen utilizando o combatiendo: periodo    tradicional;  periodo  modernista;  periodo  del  desdibujamiento  de  los  géneros;    periodo  de  la  crisis  de  la  representación,  de  legitimación  y  de  praxis;  periodo    posmoderno;  periodo  de  investigación  posexperimental;  periodo  del  presente    de las luchas metodológicas; y el periodo contra el retroceso asociado con la    “ciencia de Bush” y el movimiento de investigación social basado en la evidencia    que, a decir de Denzin y Lincoln, inició hace casi veinte años, en 2005.  Cobra entonces sentido que se diga que lo cualitativo es una “sombrilla” que   abarca teorías, enfoques, conceptos y técnicas disímiles e incluso antagónicas   tributarias de diferentes disciplinas (Denman y Haro, 2000); o que, como dice Irene   Vasilachis  (2006),  constituya  un  espléndido  y  variado  mosaico  de  perspectivas    de investigación. Para muestra un botón, cuando decimos que nuestra posición   epistemológica es desde el construccionismo social estamos hablando a la vez   de una gran diversidad de teorías al interior de este metaenfoque.  En otros modelos de investigación se parte de un marco teórico preconstruido,   de donde surgen las hipótesis, las variables y los instrumentos de producción del   dato, que se contrasta con los hallazgos. En la investigación cualitativa la lógica   teórica  es  diferente,  se  parte  de  categorías  sensibilizadoras  o  de  conceptos    preliminares  desde  los  cuales  se  realizan  los  estudios  exploratorios.  La  teoría  se    contrasta  permanentemente  con  los  hallazgos,  no  es  una  camisa  de  fuerza,    va  emergiendo  y  se  va  consolidando  en  el  proceso  mismo  de  investigación.    En esta lógica la teoría es transversal y más que punto de partida es punto de   llegada (Strauss y Corbin, 2002). \n79  Características de la metodología cualitativa de investigación  La  investigación  cualitativa  se  caracteriza  por  asumir  que  la  realidad  es    una construcción sociocultural, de carácter múltiple y holística. Su objeto de    conocimiento es la vida cotidiana, centra su interés en acceder a las experiencias   y los datos en su entorno natural; por lo tanto, requiere un contacto permanente   de  quien  investiga  con  las  personas  participantes  del  estudio.  En  este  sentido,    quien  investiga  es  parte  fundamental  del  proceso  de  investigación,  aporta     experiencias de campo y participa con su propia reflexividad. Al trabajar con    las cualidades de las personas existe una interdependencia sujeto-sujeto; por lo    tanto, influye el contexto que estudia y a la vez es influenciada por el contexto;    y esta condición es importante en el proceso de investigación.  Al rescatar la visión de a quienes investiga, privilegia el llamado punto de vista   del  actor,  dando  cuenta,  por  lo  tanto,  de  la  visión   emic ,  desde  dentro  de  un    fenómeno social o de una cultura, en oposición a la visión  etic  hecha de acuerdo   con  categorías  previamente  construidas  por  la  persona  investigadora,  a  partir     de conceptos considerados adecuados por la comunidad científica para llevar    adelante  su  tarea  de  análisis.  En  este  sentido,  considera  a  las  personas  como    productoras  de  conocimiento,  capaces  de  dar  cuenta  de  las  realidades  que    viven y transformarlas.  Al reconocer que todas las personas somos capaces de producir conocimiento   y  de  comprender  nuestra  propia  realidad,  nuestro  punto  de  vista  como    investigadoras  e  investigadores  no  es  más  que  uno  de  los  muchos  posibles,  tal     vez, como dice el historiador Juan Pedro Viqueira (1983), uno de los más extraños,    por  no  decir  extravagantes.  Por  lo  tanto,  las  y  los  cientistas  sociales  formamos    parte  del  mundo  que  estudiamos  y  nuestra  actividad  teórica  no  es  sino  una    sistematización de aquello que la sociedad realiza en forma práctica y cotidiana.  La  figura  de  espiral  o  helicoide  es  la  que  mejor  representa  al  proceso  de   investigación cualitativa porque permite resaltar que en este tipo de investigación   hay puntos de llegada que se transforman en el arranque de nuevos senderos   investigativos, que entrañan mayores niveles de complejidad tanto en lo teórico    como  en  lo  empírico  para  quien  investiga.  La  figura  del  helicoide  permite    mostrar el proceso dialéctico consistente en contradicciones entre el producto   del  pensamiento  (los  enunciados  teóricos  y  empíricos)  y  el  comportamiento    de  lo  real  expresado  en  los  datos  (sean  o  no  numéricos).  La  contradicción,    4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR \n80   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  motor  del  proceso  de  investigación  cualitativa,  desencadena  secuencias  de    operaciones empíricas y conceptuales que elevan la teoría y los datos a niveles   de mayor complejidad, donde conceptos, hipótesis y datos de niveles previos se   encuentran presentes, aunque envueltos en nuevas relaciones y acompañados   por nuevos datos, conceptos e hipótesis. El proceso de investigación resulta así   ser esencialmente dialéctico.  Entre las distintas fases no hay un claro inicio y un fin; más bien, se entremezclan de   manera continua produciendo lo que ha sido denominado por diversos autores    como una espiral autorreflexiva continua. Por eso decimos que la investigación   cualitativa es emergente y flexible. Se parte de un diseño que es una idea general    que muestra una intencionalidad, unas categorías preliminares de análisis, que   permiten pensar en estrategias de investigación, en un enfoque metodológico,   que permite pensar en las personas participantes y en los escenarios. Pero es    una propuesta modificable: a lo largo de la investigación se piensan nuevos    participantes, pueden cambiar las técnicas de investigación, emergen temas   sensibles  socialmente,  se  repiensan  las  guías  de  producción  de  datos  en    función  de  aspectos  éticos.  Recordando  el  fragmento  del  poema   Proverbios   y  Cantares  XXIX   de  Antonio  Machado  (1936)  “Caminante,  no  hay  camino/   se hace camino al andar./Al andar se hace camino,/ y al volver la vista atrás/   se ve la senda que nunca/ se ha de volver a pisar”, me gusta pensar que se    hace el diseño en el andar investigativo a partir de la reflexividad permanente    de  quien  realiza  la  investigación  y  en  una  actitud  constante  de  toma  de    decisiones argumentadas que nos colocan en fases de la investigación por las   que parece que ya hemos pasado, pero no es así.  En el estilo de investigación cualitativa, durante el trabajo de campo se avizoran   conclusiones que remiten a la lectura de nuevas investigaciones, conceptos y    teorías. La investigación cualitativa requiere mentes flexibles que puedan estar,    de  manera  simultánea  en  varias  líneas  de  trabajo.  Hablamos  de  un  diseño  de     investigación flexible y multiciclo, alejado del modelo hipotético y deductivo    lineal  y  secuencial  de  la  investigación  experimental  todavía  erróneamente     enseñado en las escuelas de educación básica como el único camino para   generar conocimiento científico (figura 4.2). \n81  Fuente: Sampieri-Hernández  et al . (2014, p. 7).  Veamos  algunos  ejemplos  de  problemas  de  investigación  abordados    de  manera  cualitativa.  Pongamos  atención  en  los  verbos:  diagnosticar,     comprender y profundizar en distintos significados, en tanto que ilustra que una    de las características de las metodologías cualitativas de investigación es que   recogemos la producción de sentido, de los discursos que acompañan prácticas    sociales. Tal vez sea el descubrimiento de significados la nota que mejor resume    las razones que legitiman el uso de los métodos cualitativos.  4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR  Figura 4.2. Proceso de investigación cualitativa. \n82   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Fuente: Elaboración propia.  Técnicas para la producción de datos  Al  principio  se  mencionó  que  en  la  investigación  cualitativa  quien  investiga    es  un  viajero  que  construye  conocimiento  mediante  la  conversación  con  la    gente encontrada durante el recorrido de investigación. Entonces, el principal   y  más  importante  instrumento  de  producción  de  datos  somos  las  personas    investigadoras aproximándonos a los objetos de estudio desde nuestras distintas   condiciones  sociales  marcadas  por  el  género,  la  clase,  la  edad,  la  etnia,  la    formación disciplinaria, la nacionalidad, entre otras.  Recordemos  que  a  través  de  los  sujetos  estudiamos  lo  social;  para  ello  nos    aproximamos  a  sus  escenarios  naturales  y  rescatamos  su  punto  de  vista.  Esto    no es lo social, es una experiencia de lo social. No son exactamente lo mismo,   pero la sociedad no sería sin los sujetos. Existen muchas formas para acercarnos   a la experiencia que de lo social tienen los sujetos, pero las más comunes son la   observación y las entrevistas, su pertinencia dependerá del nivel de la realidad   social en la que se inscribe nuestra pregunta de investigación.  En este sentido, si con fines analíticos segmentamos la realidad social, en niveles   siguiendo  la  propuesta  de  Ortí  (1999)  tenemos  un  primer  nivel  que  alude  a  los    Cuadro 4.3. Ejemplos de preguntas y estrategias en la investigación cualitativa. \n83  hechos  conformados  por  lo  que  acontece  y  por  lo  que  los  sujetos  hacemos    —prácticas,  etnométodos,  estereotipos,  estigmas—  donde  la  observación    participante y no participante sería la práctica idónea para acercarnos a este   nivel de la realidad.  En  un  segundo  nivel  de  la  realidad  social  están  los  discursos  que  orientan    el  porqué  hacemos  lo  que  hacemos  —signos,  símbolos,  mitos,  cosmovisión,    representaciones— donde las entrevistas (semiestructurada, abierta, profundidad)   y  los  grupos  focales  y  de  discusión  serían  la  práctica  idónea  de  producción  de    este tipo de dato.  Finalmente,  en  un  tercer  nivel  estarían  las  motivaciones,  ¿qué  nos  pasa,    personalmente, cuando hacemos lo que hacemos? Es decir, para acceder al    sentido, intencionalidad o finalidad de las interacciones sociales —socialización,   identidad,  formas  de  aprendizaje—  los  métodos  biográficos  serían  los  más    idóneos para producir este tipo de sentido. En el modelo de Ortí (1999), cada   nivel  de  la  realidad  se  corresponde  con  niveles  de  la  conciencia  pasando    de  lo  consciente  a  lo  preconsciente  e  inconsciente  (cuadro  4.4).  Para  ilustrar    la  correspondencia  entre  la  elección  de  métodos  para  cada  pregunta  de     investigación retomemos los ejemplos antes mencionados (cuadro 4.3).  Fuente: Elaboración propia.  4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR  Cuadro 4.4. Prácticas de producción de datos cualitativos más comunes. \n84   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Más  allá  de  las  prácticas  más  comunes,  y  por  lo  tanto  más  conocidas,  hay    un  mundo  de  posibilidades  tan  amplia  como  métodos  disponibles.  Las    problemáticas actuales y los nuevos contextos nos demandan creatividad para    pensar en estrategias de producción dialógica de conocimientos útiles a las    personas  participantes  en  nuestras  investigaciones.    Por  ejemplo,  en  la  era  de    la  red  internet  y  de  otras  TIC,  desde  hace  décadas  se  adaptan  las  técnicas    comunes  al  mundo  virtual.  Más  recientemente,  durante  la  pandemia  por  la    covid-19,  atestiguamos  un  mayor  auge  de  estas  estrategias  en  las  diferentes     investigaciones  realizadas  en  el  contexto  del  confinamiento  que  vivimos    (Martínez  et al ., 2020). Manifestaciones feministas como el movimiento #MeToo o el  scratche  en redes    revela la pertinencia de la ciber-etnografía de las prácticas y sus significados    a partir de los diversos relatos que se publican en redes y las interacciones que   estos suscitan (Montesinos y Carrillo, 2018).   Para  hacer  frente  a  la  impostergable  pregunta  de  cómo  podemos  contribuir    a  la  construcción  de  conocimientos  que  sean  útiles  para  las  personas  que    viven las problemáticas que investigamos, colegas de diversas disciplinas de las   ciencias sociales y humanísticas realizan investigaciones colaborativas. Destaco   el  trabajo  de  producción  dialógica  del  conocimiento,  desde  la  antropología    jurídica feminista, con organizaciones de familiares de personas desaparecidas    donde para poner “en el centro sus experiencias y conocimientos, que son en sí    mismos teorizaciones encarnadas sobre la desaparición, la familia, la justicia y la   reparación”, la autora afrontó la desestabilización epistémica impuesta por sus   teorías  a priori  (Hernández, 2019, p. 116).  En  respuesta  a  cómo  sus  saberes  académicos  y  habilidades  profesionales    pueden  ser  de  utilidad  para  las  organizaciones  con  las  que  trabaja,  la  autora    citada  colabora  en  un  libro  de  historias  de  vida  de  Las  Buscadoras  y  sus  hijos    con el propósito de documentar sus propias memorias y confrontar los discursos    oficiales  del  Estado  en  torno  a  la  identidad  de  las  personas  desaparecidas.    También es parte de la creación de una aplicación digital para la documentación    in  situ   de  hallazgos  de  fosas  clandestinas  y  su  registro  en  una  base  de  datos    georreferenciada que recupera la memoria histórica de la organización. \n85  A manera de cierre. Respuestas a preguntas incómodas  A  lo  largo  de  los  años  he  escuchado  las  dudas  que  genera  la  metodología    cualitativa  en  quienes  realizan  investigación  desde  la  tradición  heredada.  Las    preguntas más comunes que nos hacen a personas con larga, mediana y corta    trayectoria en este tipo de investigación son: ¿cómo definen a sus participantes?,    ¿qué pasa con las hipótesis?, ¿si no hacen análisis estadístico, entonces cómo se   hace el análisis cualitativo?, ¿se pueden mezclar metodologías?  A continuación ofrezco algunas respuestas a estas preguntas. Para seleccionar   nuestros  casos  o  informantes,  seguimos  la  estrategia  del  llamado  muestreo    teórico (Strauss y Corbin, 2002). Es decir, es una muestra opinática creada por   la posibilidad de producir narrativas con personas con características de interés   para los propósitos de nuestra investigación. Así, las personas participantes serán   quienes tienen la información relevante; quiénes, las que están más informadas,   son  más  accesibles  física  y  socialmente;  quiénes,  entre  las  más  informadas  y    accesibles, están más dispuestas a informar; y las más capaces de comunicar la   información con precisión. Esta estrategia mantiene el compromiso de la persona   investigadora  con  el  escenario  y  la  posibilidad  de  estar  abierta  a  conocer  y    explorar vías adicionales de indagación para comprender mejor el problema.   A través del muestreo teórico se seleccionan nuevos casos a estudiar según   su  potencial  para  ayudar  a  refinar  o  expandir  los  conceptos  y  teorías  ya   desarrolladas. Lo importante no es el número de casos, sino la potencialidad    de  cada  uno  para  desarrollar  una  mayor  comprensión  teórica  sobre  lo  que    se  está  estudiando.  Esta  respuesta  siempre  da  pie  a  otra  pregunta:  ¿cómo  se     decide el número de casos o personas participantes en la investigación? A partir    de  lo  que  se  denomina  punto  de  saturación  teórica:  el  momento  aquel  en  el    que la información recabada no aporta elementos nuevos para la comprensión   del  fenómeno  estudiado  (Strauss  y  Corbin,  2002).  Siguiendo  a  Bertaux  (2005),     alcanzamos una saturación progresiva del modelo al “multiplicar los estudios    de  casos  individuales  variando  todo  lo  posible  las  características  de  los  casos     observados.”  (Bertaux,  2005,  p.  35).  Para  lo  cual  se  procede  reconociendo    participantes  con  representaciones  y  experiencias  diferentes  que  posibiliten     poner  de  manifiesto  la  existencia  de  situaciones  conflictivas,  limitativas  o  de    dominación  al  interior  del  proceso  social  que  se  está  analizando.  Es  decir,     orientando  “la  búsqueda  hacia  la  diversidad  y  la  diferencia  y  no  hacia  la    homogeneidad.” (Menéndez, 1997, p. 252).  4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR \n86   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  El punto de saturación se alcanza con el método de comparación constante, que   consiste en codificar y analizar datos de forma simultánea a su producción para    desarrollar conceptos. Se trata de una estrategia que supone una contrastación   de las categorías, propiedades e hipótesis que surgen a lo largo de un estudio   en  sucesivos  marcos  o  contextos.  En  este  sentido,  el  análisis  es  resultado  de    la  mediación  de  los  datos  producidos  por  procesos  de  interpretación,  los    nuestros  como  personas  investigadoras  y  los  de  quienes  participan  en  nuestra    investigación. Se trata de un proceso dialógico, de intercambio, de reciprocidad    y sobre todo de reconocimiento de las subjetividades pensantes y reflexivas de   las personas participantes que viven en condiciones específicas.  El análisis cualitativo no es solo una manera de clasificar, categorizar, codificar o   confrontar datos. No es simplemente identificar formas del habla o regularidades   de la acción. No nos limitamos a “recolectar” datos, les damos forma a partir    de  transacciones  con  otras  personas.  No  nos  limitamos  solo  a  informar  lo  que    hallamos, creamos un relato de la vida social, y al hacerlo construimos versiones   de  los  mundos  y  de  los  actores  sociales  que  observamos.  El  análisis  cualitativo    implica  la  representación  o  reconstrucción  de  fenómenos  sociales  (Coffey  y     Atkinson, 2003); ese momento del proceso de construcción del modelo o la teoría   a manera de un intento de dar significado a lo que estudió y que se materializa   en la redacción de un informe final.  Para  ilustrar  lo  anterior  recupero  dos  ejemplos.  Por  un  lado,  muestro  la  lógica    inductiva de la investigación cualitativa de Amaya  et al . (2005), quienes teorizan   sobre los obstáculos para la utilización de los servicios de salud por trabajadoras   sexuales, a partir de códigos que parten de la realidad concreta al ser frases y   palabras dichas por las propias trabajadoras participantes en su investigación.  Por  otro  lado,  recupero  la  propuesta  de  representación  de  las  experiencias    de  resistencias,  agencias  y  vindicaciones  de  estudiantes  LGBT  frente  a    actos  de  vulneración  al  interior  de  la  universidad  que  propone  Ruiz  (2022).    A partir del análisis de las narrativas de nueve estudiantes gais, no binario y bisexual   y cuatro actores clave, relacionadas con la pregunta ¿cómo se actuó frente a    la agresión ya sea como víctima o como testigo de esta?, el autor identifica a la    confrontación como una respuesta reactiva e inmediata ante la discriminación   a manera de acto de provocación para intencionadamente generar reacciones   alrededor de la diversidad sexual. Es un acto de rebeldía y al mismo tiempo de   reivindicación porque instiga, incita, polemiza, suscita y construye sobre las bases  \n87  de lo abyecto. La provocación también es una especie de desafío a lo que se   concibe como normal y a sus agentes. La provocación ofrece una oportunidad    para confrontar y desafiar al “normal” y a sus agentes, al que está legitimado;   es una forma de poner “en la mesa” los elementos de los arbitrarios culturales,   desafiarlos para propiciar la reacción y poder reivindicar.  Sirvan los ejemplos anteriores para abordar brevemente el tema de las hipótesis   en  la  investigación  cualitativa.  De  entrada,  decir  que  es  más  adecuado    hablar de supuestos que guían la investigación en sus diferentes etapas. Luego   entonces,  estos  supuestos  surgen  en  cualquier  momento  de  la  investigación,    pero su planteamiento es más difuso, pues su función es guiar o ser conclusiones   provisionales  en  un  contexto  de  emergencia  y  descubrimiento  de  datos.  Así,    representan  el  eslabón  necesario  entre  la  teoría  y  nuestra  investigación  al    permitir comprobar las teorías o sugerir o generar nuevas teorías (Mastrángelo,    2020). Sirven para orientar “la recogida de los datos” (Ruiz-Olabuénaga, 1999)    y  permiten  transitar  de  los  datos  a  las  conclusiones  al  ofrecer  una  respuesta    probable al problema de investigación formulado (Mastrángelo, 2020).  Cierro  este  capítulo  compartiendo  mi  postura  ante  la  pregunta  ¿se  pueden    mezclar  metodologías?  Las  posturas  puristas  al  respecto  demandan  el    divorcio  entre  los  enfoques  cuantitativos  y  cualitativos  a  partir  de  reconocer    que  los  paradigmas  que  sostienen  una  y  otra  tradición  responden  a  lógicas    de  investigación  antagónicas.  Las  posturas  pragmatistas  argumentan  que    la  triangulación  metodológica  incrementa  la  validez  interna  y  externa  de  los    estudios. Personalmente comparto la idea de que es posible articular teorías y    metodologías al nivel de los objetivos específicos según lo requiera el estudio    a  realizarse.  Así  por  ejemplo,  los  equipos  de  investigación  interdisciplinarios     ejemplifican la idea de que las diferencias epistemológicas no son insuperables    cuando triangular teorías, investigadores y disciplinas enriquece la investigación.   A futuro me surge la inquietud de revisitar la base de datos de tesis de investigación   cualitativa  para  el  periodo  1995-2024  y  realizar  un  análisis  a  profundidad  del    posicionamiento metodológico de estas investigaciones en tanto que para este    capítulo se trabajó únicamente con la autoadscripción de la autoría de la tesis    al estilo de investigación cualitativa.  Concluyo  insistiendo  en  una  idea  fundamental  planteada  al  inicio  de    este  capítulo:  en  el  fondo  de  la  elección  metodológica  está  la  cuestión    epistemológica.  Por  lo  tanto,  la  elección  del  método  es  secundaria  a  la    4. LA PRÁCTICA DE LA INVESTIGACIÓN CUALITATIVA EN ECOSUR \n88   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  elección del paradigma. Además, no solo el problema que se investiga dicta   el  método;  también  lo  dicta  la  formación  y  las  preferencias  de  quien  lleva  a    cabo la investigación (Martínez, 1999).  Referencias  Amaya, A., Canaval, G. E., y Viáfara, E. (2005). Estigmatización de las trabajadoras   sexuales: influencias nica, definida como el    contacto humano mediado por procesos socioculturales a través de dispositivos   interconectados (Mena, 2005). Esta migración digital masiva impuso nuevos retos   metodológicos en las ciencias sociales y humanidades, orientando la investigación   hacia el análisis de las transformaciones en las prácticas y representaciones en   entornos digitales.  Durante  este  periodo,  plataformas  como  Zoom,  Teams  y  Classroom  se    convirtieron  en  espacios  predominantes  para  la  educación,  la  socialización     y el trabajo, reconfigurando la percepción del tiempo y el espacio, tal como   sugiere Augé (1993) en su noción de no-lugares. Estos entornos virtuales, aunque    diseñados  para  la  interacción,  no  tienen  identidad  propia,  pero  regulan  las   \n92   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  formas  en  que  las  personas  conviven  y  trabajan  a  distancia.  Estudiar  estas    dinámicas  implica  desarrollar  metodologías  específicas  para  abordar  las    tensiones entre los espacios físicos y los digitales, lo que se alinea con las ideas    de  Mayans  (2003)  sobre  los  entornos  mediáticos  como  nuevas  estructuras    organizativas de la vida cotidiana.  En  el  sureste  de  México,  el  catálogo  del  Sistema  de  Información  Bibliotecaria    (SIBE)  de  El  Colegio  de  la  Frontera  Sur  (ECOSUR)  registró  en  agosto  de  2022     un total de 681 publicaciones —entre tesis, artículos científicos, divulgaciones    y  ponencias—  que  incorporan  el  tema  de  internet  en  sus  marcos  teóricos  y    metodológicos.  Este  acervo  muestra  cómo  las  investigaciones  han  transitado    desde  conceptualizaciones  iniciales  del  ciberespacio  como  un  territorio  vacío    hacia  su  análisis  como  un  espacio  disputado  en  contextos  rurales,  urbanos    y  fronterizos.  Las  investigaciones  en  ECOSUR  han  adoptado  un  enfoque    transdisciplinario para explicar fenómenos complejos, como las desigualdades   de  género  y  la  inequidad  en  el  acceso  a  las  tecnologías  de  la  información  y    la  comunicación  (TIC),  así  como  las  luchas  sociales  expresadas  mediante  el    hacktivismo.  Estas  investigaciones  plantean  retos  metodológicos  significativos  para  los   estudios cualitativos. Es fundamental que los investigadores diseñen estrategias    flexibles para estudiar la producción de imágenes, discursos narrativos, videos y    aplicaciones  distribuidos  en  plataformas  digitales.  La  observación  participante    virtual,  las  entrevistas  en  línea  y  el  análisis  de  contenido  digital  son  algunas  de    las herramientas prácticas que se emplean para captar la complejidad de las    interacciones digitales, marcadas por la heterogeneidad cultural, lingüística y    sexo-genérica (Mena, 2019a).  Este capítulo se organiza en siete apartados que describen los momentos clave   en el desarrollo de las investigaciones en ECOSUR, con un enfoque cronológico   y temático. Se exploran los cambios paradigmáticos que las investigaciones han    atravesado en los últimos treinta años, situando los retos ontoepistemológicos    que  surgen  en  los  estudios  sociotécnicos.  El  análisis  se  enmarca  en     las  circunstancias  específicas  del  sureste  de  México,  donde  las  tecnologías   digitales no solo actúan como herramientas sino como contextos que transforman    las dinámicas sociales y la producción del conocimiento.  Recuperar las experiencias metodológicas desarrolladas en ECOSUR es crucial   para consolidar una tradición investigadora capaz de abordar la complejidad  \n93  de las relaciones en la red. Como sugiere Mayans (2003), es necesario analizar   cómo se configuran discursos homogéneos y heterogéneos en estos entornos,    teniendo  en  cuenta  la  producción  de  millones  de  contactos  virtuales  entre    personas  de  diversas  culturas,  edades,  razas  y  adscripciones  sexo-genéricas.     Además, siguiendo la línea de Augé (1993), la investigación debe atender la    producción  de  subjetividades  en  espacios  digitales  que  no  se  corresponden    con  lugares  físicos,  pero  que  juegan  un  rol  central  en  la  organización  social    contemporánea.  En definitiva, los estudios cualitativos en entornos digitales requieren de enfoques   metodológicos  capaces  de  adaptarse  a  las  transformaciones  tecnológicas  y     sociales. La reflexión continua sobre estas metodologías permitirá comprender   cómo  los  espacios  digitales  actúan  como  un  nuevo  referente  para  orientar   decisiones científicas, sociopolíticas y económicas (Mena, 2013).  Del ciberespacio al paisaje sociodigital: el reto metodológico  En 2022, internet celebró cuatro décadas de existencia y tres de expansión en   México.  Surgió  como  una  red  universitaria  en  Estados  Unidos  y  rápidamente    evolucionó de un proyecto militar a una red civil global (Mena, 2005). En México,   instituciones  como  la  Universidad  Nacional  Autónoma  de  México  (UNAM),    el  Instituto  Tecnológico  de  Monterrey  (ITESM),  la  Universidad  de  Guadalajara    (UdeG) y, unos años más tarde, algunos centros del Consejo Nacional de Ciencia   y  Tecnología  (Conacyt)  establecieron  los  primeros  nodos;  ECOSUR  conectó    su  sede  de  San  Cristóbal  de  Las  Casas  en  1994,  extendiendo  la  conexión  a    Tapachula y Chetumal.  A partir de 2003, la etnografía digital fue adoptada para explorar el ciber-  espacio, siguiendo la propuesta de Mayans (2003). Esta metodología cualitativa    se  enfocó  en  la  interacción  entre  usuarios  y  las  primeras  interfaces  digitales,    como sitios web estáticos, foros, chats y correos electrónicos. La irrupción del   Ejército Zapatista de Liberación Nacional (EZLN) en 1994 impulsó investigaciones   clave, incluida una tesis de licenciatura en 2005 en la UNACH, que analizó cómo   el EZLN utilizó internet como medio revolucionario. Paralelamente, los cibercafés    en San Cristóbal se consolidaron como “no lugares” (Augé, 1993), atrayendo a    académicos y periodistas que encontraban en estos espacios oportunidades de   interacción digital.  5. METODOLOGÍAS CUALITATIVAS EN ÁMBITOS SOCIODIGITALES \n94   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  ECOSUR y la UNAM jugaron roles fundamentales en esta etapa, gestionando el   acceso a internet y colaborando con organizaciones no gubernamentales para   fortalecer la conectividad local. Esta colaboración resaltó la importancia de las    dinámicas sociotécnicas y la necesidad de enfoques metodológicos flexibles    para investigar las nuevas formas de interacción.  En 2019, la Universidad de Ciencias y Artes de Chiapas (UNICACH) presentó la   primera tesis de posgrado en la región sureste de México que describió internet   como  un  paisaje  sociotecnológico,  proponiendo  estrategias  metodológicas     desde  paradigmas  filosóficos  como  el  determinismo  y  la  fenomenología   tecnológicos (Mena, 2013; Mena y Basail, 2016). Estos debates metodológicos   sobre la interacción entre tecnología y sociedad muestran que las reflexiones    sobre  los  medios  no  comenzaron  ni  terminarán  con  internet  (Mena,  2019b).  Este  recorrido  destaca  cómo  las  metodologías  cualitativas  se  han  adaptado    al  estudio  de  entornos  digitales,  subrayando  la  importancia  de  enfoques    interdisciplinarios  que  respondan  a  las  complejidades  contemporáneas  de  la    interacción en línea.  Acceso y uso de las TIC por las juventudes rurales transfronterizas del sureste de México  En  2018,  las  primeras  estudiantes  interesadas  en  fenómenos  sociotécnicos    llegaron  a  ECOSUR,  enfrentando  el  desafío  de  investigar  en  comunidades    rurales  del  sur  de  México,  donde  la  conectividad  era  limitada  (Ramírez-  Pacheco  et  al ., 2018; Ramos y Mena, 2017). Sin embargo, se identificó que las   juventudes  aprovechaban  los  primeros  accesos  gratuitos  a  internet  cerca  de     escuelas  públicas.  Esta  situación  permitió  ensayar  metodologías  cualitativas    que  capturaron  la  experiencia  de  vida  y  las  prácticas  culturales  juveniles    relacionadas con el uso del tiempo libre y las TIC. A través de narrativas sobre   el uso de celulares y tabletas, se documentaron los cambios y continuidades en   las costumbres locales. Paralelamente, entrevistas y grupos focales con adultos   brindaron perspectivas sobre el impacto de internet en las comunidades, todas   grabadas digitalmente y analizadas en Nvivo 10, lo que facilitó la transcripción    y codificación sistemática.  La  investigación  también  combinó  encuestas  cuantitativas  para  medir  la    infraestructura  tecnológica,  el  tipo  y  frecuencia  de  uso  de  dispositivos  y  los   \n95  hábitos  de  conexión  de  los  jóvenes  (Ramírez-Pacheco   et  al .,  2018).  Además,    se  empleó  la  perspectiva  multinivel  de  Geels  y  Schot  (2007)  para  analizar  la    interacción entre tecnología y sociedad. Este enfoque distingue tres niveles: el   paisaje, con estructuras profundas que evolucionan lentamente; el régimen, que   abarca los sistemas dominantes como las comunicaciones digitales; y el nicho,   espacio  protegido  donde  emergen  innovaciones.  Esta  perspectiva  permitió    comprender cómo las transformaciones sociotécnicas ocurren simultáneamente   en la tecnología y la cultura. Dicho modelo permitió orientar otras investigaciones   en donde se deseaba observar el cambio y la participación ante la llegada de   la Web 2.0 que presenta al sujeto en la red como un productor de contenidos,    imágenes, música, textos, en diferentes paisajes tecnológicos como los blogs   y rápidamente en las redes sociales como Facebook, y Twitter, hoy llamada X    (Ramos y Mena, 2017).  El  modelo  teórico-metodológico  permitió  a  estudiantes  de  ECOSUR  generar    información sobre nuevas dinámicas de exclusión e inserción laboral mediante   casos  comparativos  en  dos  comunidades  ecoturísticas  de  la  frontera  México-  Guatemala.  La  investigación  aplicó  la  perspectiva  multinivel  de  Geels  y  Schot    (2007):  paisaje,  régimen  y  nicho.  Este  enfoque  facilitó  analizar  cómo  las  TIC  y    nuevas  actividades  productivas  en  el  ecoturismo  desestabilizan  los  regímenes    laborales  tradicionales  y  promueven  cambios  en  el  panorama  laboral  juvenil.    La  investigación  de  maestría  empleó  entrevistas  en  profundidad  con  19    jóvenes  de  diversas  edades,  sexos  y  nacionalidades  involucrados  en  turismo     rural.  Las  narrativas  fueron  transcritas,  codificadas  y  analizadas  en  Nvivo  12,    documentando sus experiencias laborales en el sector turístico (Ramos-Ballinas    et al ., 2020).  El hacktivismo e internet como territorio en disputa: una mirada desde los marcos de acción colectiva  En 2019, un estudiante de doctorado en ECOSUR desarrolló la primera investigación   sobre internet como espacio de acción social, superando obstáculos académicos.   Usando  metodologías  cualitativas,  combinó  etnografía  digital,  observación    participante  en  línea  y  presencial,  y  análisis  de  interacciones  en  Twitter  sobre    activismo tecnológico. Además, empleó la técnica bola de nieve para entrevistar   a  siete  activistas  del  hacktivismo  en  México,  garantizando  el  consentimiento    informado y permitiendo a algunos entrevistados usar seudónimos. Las entrevistas,   5. METODOLOGÍAS CUALITATIVAS EN ÁMBITOS SOCIODIGITALES \n96   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  realizadas en persona y mediante videollamadas opensource, fueron transcritas   y analizadas con ATLAS.ti mediante categorías conceptuales basadas en marcos   de acción colectiva (Lechón-Gómez y Mena, 2019).  La investigación ofreció una interpretación renovada del hacktivismo en México   desde  un  enfoque  socioconstruccionista  y  la  perspectiva  del  ciberfeminismo,    destacando la dimensión política de la tecnología. Se exploraron principios como   la socialización del conocimiento, la cooperación tecnológica y la autogestión   comunicacional,  entendiendo  internet  como  un  espacio  sociopolítico  en    disputa. Los resultados señalan cómo los marcos de acción colectiva permiten   interpretar la realidad y dinamizar movimientos sociales que cuestionan el orden   social  mediante  temas  como  soberanía  tecnológica,  ética   hacker   y  derechos   digitales (Lechón-Gómez y Ramos, 2020).  Acceso y uso de las TIC en instituciones de educación superior  Las  múltiples  investigaciones  realizadas  desde  ECOSUR  sobre  internet  como    espacio sociotécnico han permitido abordar fenómenos emergentes en diversos   contextos, desde el acceso a las TIC hasta la violencia digital y la resistencia al   género  en  instituciones  educativas.  Estas  metodologías  cualitativas  destacan     por su capacidad de adaptación en múltiples escalas y contextos.  “Acceso  a  TIC  y  violencia  digital  en  universidades  interculturales”  es  una   investigación  en  las  universidades  interculturales  de  Chiapas,  Quintana  Roo  y    Tabasco que analizó el uso de las TIC en relación con la violencia comunitaria.   Se  desarrolló  un  trabajo  de  campo  en  tres  fases:  (1)  charlas  con  estudiantes    para  explorar  su  experiencia  con  las  TIC  durante  trabajos  comunitarios,     (2)  presentaciones  sobre  violencia  de  género  en  entornos  digitales,  y  (3)  la    aplicación  de  cuestionarios  en  línea  usando  Turning  Point  y  Google  Forms.  Los     resultados obtenidos permitieron reflexionar sobre el uso del teléfono móvil y la    violencia en línea, integrando entrevistas semiestructuradas y grabaciones con   consentimiento informado para el análisis cualitativo (Mena y Evangelista, 2020).  Otra investigación en relación al “Impacto de la pandemia en universidades   globales”  exploró  el  efecto  de  la  pandemia  entre  estudiantes  y  personal    académico  en  universidades  de  México,  Kenia  e  Inglaterra,  utilizando  una    metodología activista-participante. Se analizaron las dinámicas en la transición  \n97  hacia la educación en línea, los desafíos de bienestar, inequidades en el acceso   a internet, y las dificultades para obtener certificados de posgrado. El enfoque   destacó la importancia de la confidencialidad, especialmente en cuestiones    de  identidad  de  género  y  movilidad  sin  documentos,  dada  la  diversidad  de    contextos culturales y legales involucrados (Loyola-Hernández  et al ., 2022).  Por último, “Transformación digital en la educación durante la pandemia” es    un  tercer  estudio  que  evaluó  las  respuestas  institucionales  en  México  ante  la    interrupción de la educación presencial y la transición a plataformas digitales.    En un contexto de acceso limitado a internet y las TIC, la investigación identificó   la forma en que factores como género, etnia y ubicación geográfica afectaron    la  adaptación  a  entornos  digitales.  La  falta  de  una  estrategia  pedagógica    digital  adecuada  agravó  las  brechas  educativas.  La  metodología  combinó    técnicas cualitativas y cuantitativas mediante la aplicación de dos cuestionarios   exploratorios (Navarro-Martínez  et al ., 2021).  Estas  tres  investigaciones  ejemplifican  cómo  las  metodologías  cualitativas,    apoyadas en herramientas digitales como ATLAS.ti y entrevistas semiestructuradas,   ofrecen estrategias para investigar fenómenos sociales en internet. Y subrayan la   importancia de la triangulación de datos y el respeto por la privacidad en estudios   sobre activismo, violencia digital y educación en entornos tecnológicos.  El cuerpo y el espacio sociotécnico  Dos  investigaciones  recientes  en  relación  con  la  construcción  del  cuerpo    mediado  por  espacios  digitales,  fueron  los  retos  que,  desde  ECOSUR,  han    acompañado  al  alumnado  que  aborda  las  subjetividades  y  el  cuerpo  en    espacios  digitales,  destacando  las  orientaciones  metodológicas  necesarias    para enfrentar los desafíos que presentan estos contextos emergentes.  Una  tesis  de  la  Universidad  Intercultural  de  Chiapas  (UNICH),   Exploración  del   cuerpo  y  las  relaciones  sexoafectivas  en  plataformas  digitales ,  de  la  cual  se    produjo  un  artículo  científico,  investigó  el  uso  de  Grindr,  una  plataforma  de    encuentro entre hombres, desde un enfoque fenomenológico y metodológico   cualitativo.  El  estudio  combinó  entrevistas  virtuales  y  presenciales  para    comprender  las  perspectivas  de  los  usuarios  sobre  sus  experiencias,  deseos  y    cuerpos. La investigación enfrentó el reto de superar el recelo de los participantes   5. METODOLOGÍAS CUALITATIVAS EN ÁMBITOS SOCIODIGITALES \n98   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  al hablar de hábitos sexuales y preferencias digitales. Dada la dificultad inicial   para obtener voluntarios, la metodología se ajustó en tiempo real, priorizando la    construcción de confianza mediante la interacción continua en la plataforma.    Este enfoque permitió analizar la performatividad del cuerpo y las interacciones   sujeto-tecnología en un entorno digital (Monjarás-Reyes y Mena, 2021).  En otra tesis,  Construcción del cuerpo ideal y alimentación durante la pandemia ,  la  cual  dio  origen  a  otro  artículo  producto  de  una  investigación  de  maestría    en ECOSUR, se analizó cómo las jóvenes universitarias construyen la noción de   cuerpo ideal en un contexto de consumo intensivo de las TIC, y cómo sus hábitos   alimentarios  se  transformaron  antes  y  después  de  la  pandemia  de  covid-19.    Basándose en una etnografía virtual, se recopilaron datos a través de entrevistas   semiestructuradas  realizadas  en  WhatsApp,  Facebook  y  llamadas  telefónicas.     Se utilizaron técnicas de análisis de contenido textual y fotográfico en los perfiles   digitales de las participantes para interpretar los significados y cambios en sus   prácticas  alimentarias  durante  el  confinamiento.  La  metodología  enfatizó  la    importancia de las herramientas digitales para capturar las interacciones entre   las tecnologías y la vida cotidiana (Ortiz  et al ., 2023).  Ambos estudios destacan la adaptabilidad metodológica como una estrategia   clave en investigaciones cualitativas sobre entornos digitales. La flexibilidad en la   recopilación de datos y la construcción de confianza con los participantes resultan    esenciales para abordar temas sensibles. Asimismo, la integración de entrevistas   en línea y la observación en plataformas digitales proporcionan nuevas formas de   explorar subjetividades y corporalidades en espacios tecnológicos.  Estudios de género y TIC  La investigación “Violencia política de género en elecciones locales en Chiapas”    analizó  por  primera  vez  desde  ECOSUR  el  tema  de  la  violencia  política  de    género durante las elecciones de 2015 en Chiapas, a partir de 96 relatos, notas   periodísticas, audios y videos disponibles en blogs, YouTube, Facebook y medios   digitales. Utilizando el  software  QSRN6, se sistematizó y categorizó la información   considerando  representaciones  simbólicas,  normas,  instituciones  sociales  e    identidades  subjetivas.  El  análisis  reveló  cómo  los  medios  digitales  no  solo    documentan la violencia, sino que también facilitan su difusión y reproducción   mediante la interacción de los usuarios (Mena  et al ., 2017). \n99  Tras  las  primeras  investigaciones  en  los  espacios  sociotécnicos,  el  Grupo  de    Estudios de Género de ECOSUR ha destacado por inaugurar nuevos enfoques   de  carácter  innovador  sobre  la  intersección  entre  género  y  las  TIC;  logra    consolidar  la  experiencia  en  las  metodologías  cualitativas  con  perspectiva  de    género y las TIC a partir de aplicaciones en estudios de violencia, migración y    comunidades transnacionales. Sus aportaciones se proponen y defienden en el    libro  Género y TIC  (Tuñón y Mena, 2018b), que presenta catorce estudios desde  Latinoamérica y España, revelando cómo mujeres y otros colectivos adaptan y   transforman estas tecnologías. A continuación, se resumen dos investigaciones   clave, las cuales demuestran orientaciones prácticas para aplicar metodologías   cualitativas en estudios de género y sociedades digitales.  Hacer investigaciones internacionales dio como resultado que se consolidaran   las metodologías de investigación que utilizan un enfoque metodológico mixto   para  explorar  el  uso  de  las  TIC  entre  familias  mexicanas  residentes  en  Nueva     York, tema que se desarrolla en el capítulo “Comunidades transnacionales y    prácticas  digitales  en  Nueva  York”.  Este  estudio  se  estructura  en  tres  fases:  la    contextualización del uso de las TIC mediante reportes del U. S. Census Bureau y   el Pew Research Center; el análisis de discursos en el grupo privado de Facebook    “Mexicanos que viven en Nueva York”, y las entrevistas en profundidad con diez    familias  transnacionales.  Para  garantizar  el  anonimato  de  los  participantes,  se     emplearon nombres ficticios en el análisis (Tuñón y Mena, 2018a).  Por último la investigación que da paso al texto “Migración irregular y cinturones   de protección” es la segunda desde el uso de las TIC como herramienta para    mitigar  el  tráfico  ilegal  de  personas  entre  Guatemala  y  México.  Este  estudio    subraya cómo las tecnologías pueden fortalecer los cinturones de protección y    garantizar los derechos humanos de los migrantes. Aunque también se identifica   una brecha entre las políticas oficiales y las prácticas reales, evidenciando que   la migración irregular continúa siendo prevalente (Téllez-Carvajal  et al ., 2019). Las  anteriores  investigaciones  resaltan  la  importancia  de  adaptar  las    metodologías  cualitativas  a  los  contextos  digitales  y  enfatizan  el  uso  de    herramientas como  software  de análisis cualitativo, entrevistas en profundidad   y  estudios  de  redes  sociales.  Además,  ponderan  la  necesidad  de  estrategias     flexibles para garantizar la confidencialidad y el anonimato, esenciales en el    estudio de fenómenos sensibles en entornos digitales.  5. METODOLOGÍAS CUALITATIVAS EN ÁMBITOS SOCIODIGITALES \n100   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  El nuevo reto científico. Una mirada crítica al big data  El viaje de veinte años de investigación llega en 2022 a un paradero obligatorio.   Las  investigaciones  en  ciencias  sociales  deben  adaptarse  al  contexto    contemporáneo,  donde  la  creciente  acumulación  de  datos  en  la  nube  y  la    automatización  algorítmica  plantean  desafíos  metodológicos.  La  información    digital  distribuida  masivamente  requiere  replantear  cómo  se  produce  teoría    a  partir  de  datos  textuales,  visuales  y  auditivos.  En  los  próximos  años,  será    fundamental automatizar la comprensión de lo social, observando fenómenos    como las “curvas de opinión y estados de ánimo” que representan sistemas    dinámicos  y  participativos.  Estos  procesos  exigen  una  validación  rigurosa  de    los  datos  mediante  los  siguientes  criterios:  captura  automatizada  de  datos    (registro);  serialización  del  procesamiento  de  la  información  para  estructurar     los  datos;  totalización  estadística  orientada  a  la  construcción  de  perfiles  de    comportamiento  ( targeting  y  microtargeting );  verificación  de  identidad  e    individualización, esenciales para garantizar la autenticidad de los datos.  Estos  criterios  son  fundamentales  para  la  investigación  en  big  data,  lo  que    permitirá  comprender  los  fenómenos  masivos  que  configuran  las  dinámicas   digitales  actuales.  Empresas  como  Uber,  Didi,  TikTok  y  Netflix  organizan  la    economía  mediante  la  recopilación  de  registros  biométricos,  hábitos  de     consumo  y  actividades  en  línea,  reflejando  cómo  nuestra  corporalidad  se    desdobla en la huella digital, el pago electrónico y el reconocimiento facial.  Desde  ECOSUR,  el  área  de  infonomía  ha  realizado  desde  2020  ejercicios    pioneros en análisis de big data, enfocándose en el comportamiento discursivo   durante las marchas feministas del 8 de marzo y el paro nacional del 9 de marzo   en  México,  entre  2020  y  2022.  Estos  tres  años,  atravesados  por  la  pandemia,    permitieron  explorar  cómo  el  activismo  feminista  se  expresa  digitalmente  y  se     organiza en múltiples plataformas sociales (Mena, 2022).  Como resultado, los aprendizajes obtenidos permiten fortalecer las metodologías   cualitativas  aplicadas  a  fenómenos  complejos  en  el  entorno  digital.  Estos    estudios no solo evidencian la velocidad de propagación de temas en línea, sino   también las brechas entre los datos recogidos y la práctica social. La validación   rigurosa  del  big  data  será  esencial  en  futuras  investigaciones  para  garantizar    que la información recopilada pueda sostener análisis críticos y estratégicos en   entornos digitales cada vez más interconectados y automatizados. \n101  El  comportamiento discursivo de las marchas feministas de 8 de marzo y el paro   feminista del 9 de marzo de los años 2020 al 2022, se muestra en la base de datos    creada en el proyecto descrito donde se grafican los tres años de denuncias y   reclamos feministas cruzados por la pandemia (Mena, 2022) (figura 5.1).  Fuente:  ECOSUR  (2022).  Cosecha  de  datos  del  #8M  y  #9M  en  ECOSUR:  Vista  de    Elastic. Recuperado el 1 de diciembre de 2022.  5. METODOLOGÍAS CUALITATIVAS EN ÁMBITOS SOCIODIGITALES  Figura 5.1. Vista de la página de Elastic correspondiente a la cosecha de datos #8M   y 9M en ECOSUR. \n102   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Conclusiones  Este capítulo es una retrospectiva de la investigación sobre sociedades digitales   en ECOSUR a lo largo de dos décadas, destacando las orientaciones prácticas   para  aplicar  metodologías  cualitativas  en  este  campo.  El  recorrido  histórico    ilustra  la  evolución  de  las  investigaciones,  desde  la  conceptualización  inicial     del ciberespacio como un “territorio vacío”, hasta su análisis actual como un    espacio dinámico y complejo que transforma las interacciones sociales.  La  experiencia  de  integrar  ciencia  de  datos  y  ciencias  sociales  subraya  la    importancia de la adaptabilidad metodológica como un principio fundamental   para  la  investigación  cualitativa  en  entornos  digitales.  A  continuación,  se  dan    algunas orientaciones prácticas clave derivadas del análisis aquí desarrollado:    flexibilidad y adaptación, en donde quienes investiguen el diseño y la ejecución    de sus estudios, ajustando sus estrategias a medida que avanza la investigación   y  valoren  la  dinámica  de  los  entornos  digitales,  requieren  de  un  enfoque    metodológico que se adapte a los cambios y particularidades de cada contexto.    La  construcción  de  confianza  es  esencial  para  obtener  información  valiosa    de  los  participantes,  especialmente  en  investigaciones  sobre  temas  sensibles.     Establecer una relación de confianza a través de una interacción constante y    la garantía de anonimato facilita la apertura y sinceridad en entrevistas y otros   métodos de recolección de datos.   Asimismo, el personal científico debe dominar nuevas técnicas de recopilación   de  datos  y  valorar  aquellas  de  tipo  cualitativo  empleadas  con  éxito  en    investigaciones  sobre  sociedades  digitales  tales  como:  la  observación    participante  virtual,  que  permite  sumergirse  en  comunidades  y  plataformas    digitales para comprender las interacciones y dinámicas sociales en tiempo real;   perfeccionar  las  entrevistas  en  línea  mediante  videollamadas,  chat  o  correo    electrónico, un recurso que brinda información detallada sobre las experiencias   y  perspectivas  de  los  participantes;  y  perfeccionar  el  análisis  del  contenido    digital que se aplica a textos, imágenes, videos y otros materiales disponibles en   línea, facilitando el estudio de prácticas, discursos y representaciones digitales.  En  esta  era  marcada  por  la  incorporación  de  la  inteligencia  artificial  en  las   ciencias, es fundamental no olvidar los procesos de investigación previos, como   el uso de herramientas digitales que facilitan y enriquecen el análisis cualitativo. \n103  En  el  campo  de  lo  metodológico  no  se  debe  obviar  el  uso  de  herramientas    digitales en la investigación científica tales como el  software  de análisis cualitativo   (CAQDAS): programas como ATLAS.ti y NVivo permiten organizar, codificar y   analizar grandes volúmenes de datos; y el uso de las redes sociales como un   territorio en el que se disputan múltiples fenómenos sociodigitales, se observa la   interacción con los participantes y se recolecta datos. Por último, fortalecer la    triangulación de datos en espacios digitales considerando fuentes (entrevistas,   observación  y  análisis  de  contenido)  que  permitan  obtener  una  visión  más    completa  y  robusta  del  fenómeno  en  estudio.  Todo  lo  anterior  en  el  marco    de una constante vigilancia ética, la cual debe ser un pilar fundamental en el   estudio de las sociedades digitales. De tal forma la privacidad, el anonimato y el   consentimiento informado deben garantizarse en todas las etapas del proceso   de investigación, incluida la que se realice en espacios digitales.  En el tema que ocupa este capítulo, se observan desafíos y oportunidades en   las  metodologías  cualitativas  en  ámbitos  sociodigitales  en  relación  con  el  uso     de big data. La captura, procesamiento y validación de grandes volúmenes de    datos son esenciales para comprender fenómenos sociales a gran escala. El big   data es, por otra parte, un antecedente clave en el desarrollo de la inteligencia    artificial (IA) aplicada a los procesos de investigación, lo que marca un hito en    ECOSUR e inaugura una nueva etapa en el estudio de las sociedades digitales.    Un ejemplo significativo al respecto es el proyecto “Despatriarcalización de la   inteligencia artificial”, una iniciativa de ciencia básica y de frontera, autorizada    por el Conahcyt para 2025, y que será implementada en ECOSUR. Este proyecto    refleja cómo la IA puede contribuir a abordar desafíos sociales contemporáneos.  La  investigación  cualitativa  en  entornos  digitales  requiere  un  enfoque    metodológico  dinámico  y  adaptable  que  responda  a  la  constante  evolución    de  las  tecnologías  y  las  dinámicas  sociales  en  línea.  La  integración  de  las    orientaciones  prácticas  presentadas  en  este  capítulo  contribuirá  al  desarrollo    de investigaciones rigurosas, éticas y relevantes en este campo en expansión.  5. METODOLOGÍAS CUALITATIVAS EN ÁMBITOS SOCIODIGITALES \n104   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Dedicatoria  Dedicado a mis maestras: Dolores Aramoni Calderón, quien me dio su poderosa   sombra  antropológica  que  me  cobijó  en  mi  primera  tesis  relacionada  con  las     realidades sociotécnicas en internet de Chiapas y me cuestionaba, “Chingaos,    pero qué es internet, dilo pue”; y Mercedes Olivera, de quien fui alumno en la   Licenciatura  en  Antropología  y  el  Doctorado  en  Ciencias  Sociales,  y  que  con     voz baja y discreta me interpelaba: “Abraham cuéntame más... ¿qué es eso de    internet?”.  Referencias  Augé, M. (1993).  Los no lugares. Espacios del anonimato. Una antropología de la  sobremodernidad . Barcelona: Gedisa. Geels, F., y Schot, J. (2007). Typology of Sociotechnical Transition Pathways.  Res  Policy, 36 (3), 491-496.  Lechón-Gómez, D. M., y Mena, R. A. (2019). El hacktivismo e Internet como territorio  en  disputa.  Una  mirada  desde  los  marcos  de  acci
