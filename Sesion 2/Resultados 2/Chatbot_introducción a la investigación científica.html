 Washington,   D.C.: The Oryx Press.  Naegle,  K.  M.  (2021).  Ten  simple  rules  for  effective  presentation  slides.   PLoS  Computational Biology, 17 (12), e1009554. https://doi.org/10.1371/journal.pcbi.   1009554   Más información  Además de las referencias impresas, hay mucho material valioso sobre el tema   de las presentaciones orales en internet:  https://www.nature.com/scitable/ebooks/english-communication-for-  scientists-14053993/  https://teresaperez.net/2020/08/17/claves-para-las-ppt-el-arte-de-presentar-y- comunicar/  https://asp.org/asp-education/giving-a-good-scientific-presentation/  https://www.scienceofpeople.com/online-presentation/  https://learnenglishteens.britishcouncil.org/exams/speaking-exams/oral- presentation https://uq.pressbooks.pub/academicwritingskills/chapter/oral-presentations/  10. COMUNICACIÓN VERBAL (ORAL) DE LA CIENCIA \n\n201  11. Escribir bien para comunicar bien  Laura López Argoytia  Introducción  La  escritura  es  un  acto  de  comunicación  que  nos  facilita  los  procesos  de    razonamiento,  considerando  que  debemos  organizar  el  pensamiento  para    expresarlo de manera más efectiva. Es tan dinámica como cualquier producción    cultural comunitaria, y resulta impensable desligarla de la actividad científica,    no  solo  en  cuestiones  inherentes  a  la  investigación  en  sí  misma,  sino  como    eje  fundamental  de  la  comunicación  de  la  ciencia,  ya  sea  para  sectores     académicos, públicos específicos o para audiencias amplias: artículos en revistas    indexadas,  libros  o  capítulos  de  libro,  manuales  de  transferencia  tecnológica,    materiales  de  divulgación  en  revistas,  periódicos  o  blogs,  infografías,  carteles     científicos, guiones para podcast o videos con temas de ciencia y cualquier otra    expresión comunicativa ligada a la palabra escrita.  La intención del presente texto es facilitar algunas bases de redacción para que   cualquier  manuscrito  cubra  su  cometido  de  llevar  a  buen  puerto  las  ideas;  no    obstante, no abordaremos a detalle los contenidos que pueden obtenerse de    cursos o libros de teoría y práctica de redacción. En cambio, reflexionaremos  \n202   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  un  poco  más  en  torno  a  la  escritura  como  actividad  creativa,  pues  esto    puede  fortalecer  nuestro  vínculo  con  la  comunicación  escrita  e  impulsarnos  a    mejorar nuestra redacción como componente fundamental de los procesos de   pensamiento.  Leer y escribir en la base de la redacción  El lenguaje es un potente mecanismo de comunicación que se hace presente   en  los  idiomas  y  sus  códigos  simbólicos,  los  cuales  resguardan  y  transmiten    identidades  y  conocimientos  comunitarios.  Cuando  la  oralidad  era  la  base    expresiva de las lenguas, se divulgaron y preservaron grandes epopeyas, como   la  Ilíada  y la  Odisea , el  Popol Vuh  o el  Ramayana , piezas clave que nos abren   la puerta a mundos enteros, más allá de su riqueza literaria, lo que nos confirma    cómo  cada  lengua  abarca  la  experiencia  de  vida  de  las  sociedades.  Como     sabemos, no se trataba de obras fijas o estáticas, sino en constante transformación    hasta  que  se  desarrolló  la  escritura.  Con  el  arraigo  de  esta  y  la  circulación  de    textos  en  bibliotecas,  librerías  y  ámbitos  privados,  es  de  suponer  que  hubo     modificaciones importantes en el lenguaje y, en general, en los procesos del   pensamiento; en palabras de Irene Vallejo (2021, p. 105), “esa ampliación de   perspectivas estuvo en el origen de la historia, la filosofía y la ciencia”.  En este sentido, la escritura denota un proceso de reflexión referido tanto a la   introspección  como  a  la  comunicación,  superando  los  límites  del  tiempo  y  el    espacio y normalmente con un impulso creativo. Es una herramienta poderosa    con la que podemos dialogar con nosotras(os) mismas(as) y clarificar nuestras    ideas;  no  por  nada  los  diarios  personales  han  dado  lugar  a  un  género  literario    y tienen cierta correspondencia con las bitácoras de viaje, diarios de campo y   cuadernos de ciencia.  Resulta casi inconcebible suponer que alguien que no lee y no escribe logrará   generar  textos  con  la  redacción  adecuada  para  transmitir  dignamente  un    mensaje. Leer no solo nos permite documentarnos y ampliar horizontes culturales,   sino  que  nos  ayuda  a  interiorizar  la  sintaxis,  la  ortografía  y  el  ritmo,  asimilar     significados,  ampliar  el  vocabulario  e  incluso  descubrir  o  fortalecer  nuestro    estilo.  Conviene  leer  materiales  de  cualquier  índole  editados  por  instancias     reconocidas, pero realmente cualquier tipo de lectura es útil; inclusive textos   con deficiencias nos facilitan descubrir prácticas en las que no debemos incurrir.  \n203  Es  evidente  que  las  personas  que  incursionan  en  terrenos  científicos  tendrán   que  leer  materiales  ligados  a  la  academia,  sin  que  esto  implique  que    haya  que  priorizar  lecturas  especializadas.  Para  empaparse  de  ciencia,    redacción y amenidad al mismo tiempo, existen diversas revistas de divulgación    científica que resultan muy valiosas para estos fines y son fácilmente accesibles    de manera digital o a veces impresa.  Además  de  leer,  la  práctica  de  escribir  es  indispensable.  No  pensemos  solo    en  trabajos  formales  que  impliquen  revisiones  o  calificaciones;  se  trata  de    incorporar  la  escritura  a  nuestra  vida  cotidiana  con  manuscritos  personales,     reflexiones,  diarios,  cartas  (aunque  no  las  enviemos),  o  al  menos  correos    electrónicos y mensajes en los que nos esforcemos por transmitir razonamientos   más  elaborados  con  la  mejor  redacción  posible.  En  el  ámbito  escolar    aprovechemos cuanta oportunidad haya de presentar escritos que puedan ser   revisados o retroalimentados por el personal docente, así como por compañeras    y compañeros. Y cuando contemos con la formación suficiente para generar, por    ejemplo, un artículo para someter a ciertos medios, indaguemos los lineamientos    específicos, revisemos materiales publicados ahí para tener mayor certeza de    que  el  nuestro  es  adecuado,  y  atrevámonos  a  enviarlo  sabiendo  que  de  los    rechazos también se aprende.  Desde luego, los libros de redacción son excelentes aliados en el adiestramiento,   en especial los que incluyen ejercicios. Como recomendación, retomo tres de   ellos que en general son conocidos en ámbitos editoriales, literarios o periodísticos   en México:  El libro y sus orillas , de Roberto Zavala (2012);  Redacción sin dolor , de  Sandro Cohen (2022), y  Curso de redacción. Teoría y práctica de la composición   y del estilo , de Martín Vivaldi (2000).  No  hay  duda  de  la  trascendencia  de  la  escritura  para  la  humanidad  y  en  la    vida  cotidiana  de  gran  parte  de  la  población  actual.  Y  aunque  es  obvio,  no    siempre somos conscientes de que cualquier texto cumple mejor su cometido si    causa reacciones en quien lo lee, si consigue interpelar a las personas lectoras...    Esto ocurre con más facilidad cuando la redacción es correcta y quien escribe    se permite reflejar su voz, plasmando el pensamiento de manera comprensible,    coherente y precisa.   11. ESCRIBIR BIEN PARA COMUNICAR BIEN \n204   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Las tres etapas de un texto  Todo  texto  exige  códigos  particulares  para  ser  entendido  por  sus  distintos    destinatarios. En otras palabras, imaginarnos a los posibles públicos lectores es    clave  para  encontrar  el  tono  justo,  crear  la  composición  adecuada  y,  si  es  el    caso,  seleccionar  el  medio  en  el  que  convendría  tratar  de  publicar.  Se  trata    de  anticipar  qué  tipo  de  personas  podría  leernos,  y  esto  deriva  en  diversas    perspectivas. Por decir algo, ¿elaboraremos un artículo de investigación o uno    de divulgación científica? Y si es de divulgación, ¿será pensado para audiencias    infantiles, estudiantes de educación superior, o quizá gente adulta con interés   en  temas  ambientales  o  profesionistas  con  tendencia  a  las  ciencias  sociales,    entre numerosas posibilidades?  Una vez ubicado el tipo de texto que queremos, su elaboración requiere de tres   etapas fundamentales:  •   Planeación.  Esta  fase  supone  investigar  y  empaparnos  del  tema  para    contar con argumentos sólidos; establecer objetivos y realizar un esbozo    de los rubros a incluir, delimitando sus jerarquías. Puede ser útil elaborar un    mapa o árbol conceptual y debemos allegarnos de toda la información    posible buscando en fuentes confiables.  •   Escritura  propiamente  dicha  o  textualización.  Como  su  nombre  lo  dice,     se  refiere  al  vaciado  de  información,  de  modo  que  elaboremos  un    borrador que cubra nuestras expectativas generales. Resulta indispensable    verificar todo lo que incluimos en el texto, cruzar fuentes y tener la mayor    certeza  posible  de  que  estamos  ofreciendo  un  contenido  validado,    independientemente de las evaluaciones o procesos de dictaminación a   los que el manuscrito pueda ser sometido posteriormente. •   Revisión. Es la corrección paciente y minuciosa del texto para verificar su   coherencia y claridad; detectar omisiones, ambigüedades, repeticiones,    muletillas,  inconsistencias,  debilidades  y  errores  de  cualquier  índole,     además de asegurar la fluidez y comprensión. Corregir un escrito suele    exigir más tiempo del que nos llevó escribirlo, y es primordial dejarlo reposar   al menos unas horas antes de retomarlo para nuevas revisiones. Un texto   que  no  se  revisó  de  manera  adecuada  probablemente  presentará  una     redacción deficiente. \n205  Al  concluir  el  proceso  contaremos  con  un  manuscrito  que  reflejará  buena   parte de nuestras percepciones, experiencias y conocimientos, aunque sea de   manera indirecta y aun en materiales especializados en los que los datos son lo   primordial y la forma es secundaria. Incluso estas obras merecen un buen estilo    que facilite la lectura e infunda el deseo de seguirla hasta el final.  Algunos elementos que podemos considerar, sin perder de vista que cada tipo   de texto plantea particularidades, son los siguientes: mantener un ritmo fluido    con argumentación congruente; buscar conexiones con la audiencia; explicar    términos que no sean comunes para el público destinatario; recapitular de vez    en vez y segmentar la prosa en secciones de tamaño adecuado.  Sea cual sea el producto que estamos generando y sin importar el público y   el medio considerado, un factor clave es la calidad comunicativa, misma que   destaca  cuando  quien  escribe  mantiene  una  gran  conexión  con  su  obra,  lo     que le permite tomar en cuenta al público lector con más soltura y facilitarle la    comprensión de las ideas.  La  fase  de  revisión,  a  la  que  comúnmente  dedicamos  menos  tiempo,  es   fundamental  no  solo  para  alcanzar  una  redacción  más  pulida,  sino  para    fortalecer  dicha  calidad  comunicativa.  En  esta  etapa  ya  no  mantenemos    el  mismo  nivel  de  involucramiento  con  la  creación  inicial,  nos  habremos    distanciado  del  texto,  aunque  sea  un  poco,  y  nos  podemos  situar  desde  una    perspectiva  lectora.  Esto  es  válido  aun  cuando  se  trate  de  una  obra  breve  y    sintética, como puede ser una infografía o el guion de una cápsula de video. Por    lo tanto, es imprescindible dedicarle suficiente tiempo y esfuerzo a corregir un   manuscrito para que sea un mecanismo de comunicación escrita más eficiente    en el ámbito de las ciencias.  Claridad, precisión y concisión... sin vicios  Como hemos insistido, la escritura es un importante componente del quehacer    científico. Afortunadamente, las deficiencias en materia de redacción pueden   subsanarse  con  la  experiencia  a  partir  de  procesos  reflexivos  y  ejercicios    continuos;  es  indispensable  leer  y  escribir  abundantemente,  sin  ser  necesario     esmerarnos en elaborar textos publicables en primera instancia... ¡Después sí!   11. ESCRIBIR BIEN PARA COMUNICAR BIEN \n206   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  El  siguiente  paso  para  construir  una  adecuada  composición,  y  ya  avanzando    hacia  lo  más  concreto,  es  buscar  la  claridad,  precisión  y  concisión,  junto  con     la fluidez que permitirá brindar una buena experiencia lectora. Para esto, es   preciso acatar las normas ortográficas y de acentuación elementales, además    de realizar un recorrido por la morfología y la sintaxis para entender el papel de   cada elemento y estructurar debidamente las oraciones y párrafos, atendiendo   cuestiones  de  concordancias,  voces  narrativas,  tiempos  verbales  y  enlaces    entre  ideas,  entre  otros  elementos.  Un  aspecto  importante  recae  en  formular    oraciones  ordenadas.  Como  si  fuera  una  sopa  de  letras  —o  mejor  dicho,  una    sopa de palabras— lograremos una mayor precisión expresiva si las frases tienen   un  orden  lógico;  revisemos  un  ejemplo  muy  sencillo:  ¿cuál  de  las  siguientes    oraciones dispone de un mejor orden acorde a lo que se desea expresar? 1.   Jacinta  se  sentó  a  revisar  varios  documentos  de  solicitudes  que  le    entregaron en la mañana. 2.   Jacinta  se  sentó  a  revisar  varios  documentos  que  le  entregaron  en  la    mañana de solicitudes.  Evidentemente se trata de que Jacinta revisó “documentos de solicitudes” que    le fueron entregados por la mañana, y no de que revisó documentos durante    una “mañana de solicitudes”. Aunque pueda parecer un ejemplo burdo, no es    nada raro utilizar oraciones semejantes en nuestra escritura cotidiana.  En  el  mismo  sentido,  la  puntuación  es  fundamental  para  lograr  la  claridad    necesaria  y  también  para  plasmar  la  intencionalidad;  para  muestra  basta  un     botón: no es lo mismo “sufragio efectivo, no reelección”, que “sufragio efectivo    no, reelección”. Como bien señala Sandro Cohen (2022), el uso de los diferentes    signos nos obliga a analizar las ideas para verificar sus conexiones; así sabemos    cuáles  son  cercanas  entre  sí  o  independientes,  cuáles  se  coordinan  o  se    subordinan.   Otro  aspecto  que  debe  tomarse  en  cuenta  es  la  identificación  de  algunos   vicios  del  lenguaje  que  restan  claridad  y  concisión  a  las  oraciones  y,  en    consecuencia,  a  las  ideas.  Formas  inadecuadas,  repeticiones  de  palabras,    redundancias, muletillas, exceso de partículas, palabrería innecesaria, términos   vagos  o  imprecisos.  Nos  detendremos  en  las  expresiones  vagas,  ya  que    evitarlas  demuestra  la  vastedad  del  idioma  y  cómo  es  factible  aprovecharlo    con  creatividad.  Por  ejemplo,  si  aseguro  que  llegaré  tarde  a  un  evento  pues    debo ver cinco documentos; ¿solo tengo que  verlos , o se trata leerlos, revisarlos,  \n207  estudiarlos o compararlos? Es muy útil tratar de prescindir de términos ambiguos   o fáciles:  cosa ,  etcétera ,  decir ,  estar ,  ver  y  tener , entre otros. Nos sorprenderemos  de la contundencia que adquieren nuestras expresiones.  El  abuso  de  extranjerismos  o  préstamos  lingüísticos  también  compete  a   estos  “vicios”  por  evitar.  Es  normal  que  las  lenguas  vayan  modificándose  y    las interacciones son inevitables. Pero si la introducción de vocablos extranjeros   obedece a modas o hegemonía cultural, hay que activar señales de alerta. La   incorporación de palabras de otros idiomas debería enriquecer una lengua, no   empobrecerla, así que detenernos a reconsiderar el uso excesivo de anglicismos   no es un detalle menor. Lo mismo aplica para las lenguas indígenas en México   respecto al español.  Aplicar  todo  lo  expuesto  —y  todo  lo  que  faltó  por  incluir—  requiere  escribir  de    manera muy reflexiva y con paciencia; la buena noticia es que con la práctica    va resultando cada vez más sencillo. También con la práctica vamos cobrando   plena  conciencia  de  que  el  lenguaje  escrito  no  puede  ser  igual  que  el  oral.    La redacción abarca no solo el dominio del idioma y su expresión escrita, sino   también procesos de análisis, sistematización y creatividad, por lo que su relación    con el quehacer científico es clara. Si bien no ahondaremos en normas y pautas    que  pueden  obtenerse  de  la  amplia  gama  de  libros  y  cursos  de  redacción     existentes, tal como señalamos al inicio de este capítulo, confiamos en haber    brindado una ruta a seguir.  Conclusiones  Son  muchas  las  ideas  que  conviene  recordar,  repasar  y  poner  en  práctica    en  materia  de  redacción,  pero  cerraremos  con  algunas  recomendaciones    generales: •   Leer y escribir lo más posible.  •   Vislumbrar a los posibles lectores o lectoras para realizar un texto acorde.  •   Antes de comenzar, forjarse un esquema del contenido.   •   Clarificar las ideas.   •   Optar por una redacción clara, directa y ordenada.   •   Ejercitarnos en la ubicación de “vicios” en nuestros textos.  •   Dejar descansar el escrito y retomarlo después.   11. ESCRIBIR BIEN PARA COMUNICAR BIEN \n208   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  •   Dedicar suficiente tiempo a la revisión.   •   Aprovechar la riqueza del idioma.    •   Usar libros de ejercicios de redacción si lo advertimos como necesario.  •   Explotar nuestra creatividad.  La  escritura  nos  facilita  la  reflexión  interna  a  la  vez  que  es  un  vehículo  de    comunicación,  circulación  de  ideas,  avance  del  pensamiento,  preservación    de  saberes  y  de  lenguas,  y  generación  de  conocimientos.  En  el  ámbito     científico,  la  escritura  es  una  herramienta  profesional  sustantiva,  por  lo  que    es  preciso  considerar  la  redacción  como  un  eje  necesario,  sin  dar  por  hecho     que  manejarla  medianamente  bien  es  suficiente.  Se  trata  de  una  habilidad    que involucra lectura, adiestramiento, ejercicio y actualización constante, en un    marco de reflexiones y contactos vitales. Si escribo bien, comunico mejor.   Referencias  Cohen, S. (2022).  Redacción sin dolor . México: Planeta.    Vallejo, I. (2021).  El infinito en un junco: La invención de los libros en el mundo   antiguo . México: Penguin Random House. Vivaldi, M. (2000).  Curso de redacción. Teoría y práctica de la composición y del  estilo . Madrid: Paraninfo. Zavala  Ruiz,  R.  (2012).   El  libro  y  sus  orillas.  Tipografía,  originales,  redacción,   corrección de estilo y de pruebas . México: Fondo de Cultura Económica.  \n209  12. Escritura de un artículo científico: importancia y características básicas  Pablo Liedo Lorena Ruiz-Montoya  Escribir bien un artículo científico no es una cuestión de vida o muerte; es algo mucho más serio...  R. Day  Introducción  El artículo científico es un informe completo y conciso de resultados de una   investigación,  de  modo  que  representa  la  culminación  de  un  proyecto  de     indagación científica. Si los datos y resultados no son comunicados, el proyecto    quedaría inconcluso y sin impacto para la sociedad en general, y en el ámbito   académico  en  particular.  Si  fuera  así,  el  tiempo  y  recursos  invertidos  en  el    proyecto, no habrán cumplido con el propósito original de contribuir al avance    científico y tecnológico a través de una revisión por pares y posterior difusión    del nuevo conocimiento. \n210   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  La  comunicación  de  resultados  de  proyectos  de  investigación  por  medio  de    artículos científicos es muy valorada por tres razones: 1) son el vehículo con el   que se informa o comparte datos originales con la comunidad científica; 2) hay   una revisión por pares especialistas en el tema, y 3) la estructura de introducción,    método,  resultados  y  discusión  (IMRYD)  es  ampliamente  aceptada.  La  revisión     por pares es previa a la publicación, y significa que al menos dos expertos en    el tema han constatado la congruencia en todo el documento, que hay rigor y   repetibilidad de la metodología y que, efectivamente, se trata de conocimiento    nuevo.  Esto  permite  la  confianza  en  el  resultado,  el  reconocimiento  de    objetividad  y  el  acercamiento  a  una  realidad.  Cabe  agregar  que  como  la     estructura del artículo sigue en buena medida la del método científico básico    (Castillo-Uzcanga,  2024;  Perales,  2024),  permite  situar  con  relativa  facilidad  el    avance y la continuidad de la línea de generación de conocimiento.  Cada artículo científico publicado es un medio para difundir el conocimiento   derivado de proyectos de investigación o estudios de temas específicos, que se    realizan para que el conocimiento de las diversas disciplinas avance. Es también   una  forma  con  la  que  se  facilita  el  acceso  al  conocimiento,  para  que  se  use,    entre otras posibilidades, como antecedente y así evitar la repetición innecesaria    de un determinado estudio. Poner a disposición pública la información científica    permite  acumular  datos  para  descartar  o  retener  hipótesis,  detectar  errores  en    la  descripción  y/o  comprensión  de  los  fenómenos  naturales  o  sociales,  que  son     de interés para la sociedad en general o para algunos sectores específicos. El    conocimiento  publicado  puede  impulsar  la  generación  de  tecnología  y  la    innovación, con potencial impacto en la economía y el bienestar de la sociedad,    tal como lo sostiene Piel (1986, p. 201): “Sin la publicación, la ciencia está muerta.”   Dada la importancia del artículo científico para el avance del conocimiento,   escribirlo es una tarea seria y de gran responsabilidad. Elaborar este tipo de texto   toma su tiempo, aunque la práctica es la mejor forma de aprender a hacerlo.   No obstante, contar con una guía básica puede ser de ayuda para quienes se    inician en el arte de escribir artículos científicos. Por ello es que en este capítulo    se  describen  las  características  básicas  de  un  manuscrito  que  se  envía  a  una     revista científica para su publicación; se ofrecen algunas ideas para culminar   con este proceso exitosamente, y se detalla el proceso comúnmente seguido.   Nuestro  objetivo  es  presentar  una  noción  de  dichos  elementos  básicos  para    contar  con  una  guía  general  que  motive  y  ayude  a  estudiantes  en  etapas   \n211  avanzadas de la licenciatura y a quienes recién inician sus posgrados, de modo   que  puedan  formular  el  primer  borrador  de  un  artículo  científico  con  datos    originales  en  sus  respectivas  investigaciones  o  campos  de  estudio.  Hay  que     advertir que no se trata de una guía detallada, ni un medio único y completo   para formar escritores científicos, pero será una herramienta útil.   Para este capítulo nos hemos basado en los trabajos de Blackwell y Martin (2011),   Day (2005), Day y Gastel (2011), y Davis  et al . (2013), así como en nuestra propia  experiencia en la autoría/coautoría, revisión y edición de artículos científicos.  ¿Qué es un artículo científico?  El  artículo  científico  es  la  publicación  primaria  de  los  resultados  de  una   investigación en revistas científicas editadas periódicamente. Requiere cumplir    con  las  siguientes  características:  1)  ser  un  informe  completo  y  conciso  de  los    resultados  de  una  investigación,  con  una  estructura  convencional  que  consta    de  introducción,  metodología,  resultados  y  discusión  (IMRYD);  2)  pasar  por  el    escrutinio  de  árbitros  (dos  o  más)  que  son  especialistas  en  el  tema,  proceso     al que se conoce como revisión de pares o arbitraje; 3) la información que se    presenta debe ser inédita (nueva y original); 4) debe estar disponible de forma    permanente  para  todo  público  a  través  del  resumen  ( abstract ,  en  inglés),    mientras que el resto del contenido y dependiendo de la revista, puede quedar    a disposición pública en bibliotecas, redes de acceso abierto, por los propios    autores o a través de un pago por publicación, y 5) la información debe estar   sustentada  en  estudios  previos  que  se  enlistan  en  la  sección  de  referencias.     Las  notas  científicas,  que  en  general  contienen  una  información  novedosa    puntual,  pasan  por  arbitraje  y  contienen  referencias  sí  se  les  considera  como    publicaciones primarias.  Hay  otros  medios  de  comunicación  escrita  en  ciencia,  como  las  revisiones,    memorias de congreso, libros, artículos de divulgación, etc., que son importantes,   pero no se consideran como publicaciones primarias (cuadro 12.1). Aunque en    los congresos o seminarios el público es especializado, las exposiciones no se   sujetan a la revisión por pares; su finalidad es discutir e intercambiar ideas en    grupos de expertos.  12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n212   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Es  importante  aclarar,  que  los  artículos  científicos  de  revisión  se  consideran   documentos de información secundaria (cuadro 12.1), debido a que su función   es reunir y sintetizar información primaria disponible. Son de mucha utilidad porque   ofrecen un estado del conocimiento y resaltan los vacíos de información. Pero al   no tratarse de la presentación de datos originales, se les considera documentos   secundarios.  Por  su  parte,  fuentes  de  información  terciaria  son  las  revistas  de  divulgación    científica y boletines (cuadro 12.1), en donde el lenguaje es más coloquial y   accesible para un público general y el requerimiento de las referencias es más   flexible.  Un conjunto aparte es la “literatura gris”, que se compone de tesis, reportes   técnicos  o  documentos  gubernamentales.  Se  llama  así  porque  tiene  un    propósito  de  formación  académica,  o  de  rendición  de  cuentas  de  proyectos     y actividades de gobierno, y no siempre están disponibles para el público en    general.  *Hay revistas que llevan en su título la palabra “proceedings” y son revistas científicas,   no  memorias,  por  ejemplo,   Proceedings  of  the  National  Academy  of  Sciences ,  y     Proceedings of the Royal Society of London . Fuente: Elaboración propia basada en Day (2005).  Cuadro 12.1. Jerarquía de la información científica de acuerdo con el medio de    comunicación. \n213  Partes de un artículo científico para su publicación  La principal función de un artículo científico es comunicar de la manera más   clara y simple los hallazgos más relevantes de una investigación, argumentando   su  pertinencia  e  importancia  con  la  evidencia  de  hechos  que  muestren  la    certeza  del  hallazgo.  Para  que  esta  comunicación  sea  asertiva,  el  artículo  se    estructura en  varias  secciones  básicas  que  organizan  la  información  de  modo    que su ubicación sea sencilla y rápida (cuadro 12.2).  12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS...  Continúa en la siguiente página. Cuadro 12.2. Secciones de un artículo científico . \n214   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  *IMRYD: Introducción, materiales y métodos, resultados y discusión.  Portada:  En la portada se incluye el título, cuya importancia radica en que permite   saber  de  forma  inmediata  qué  aporta  el  artículo.  Un  par  de  reglones  abajo,    se presenta el nombre de la o las personas que contribuyeron contundentemente   en todas o en alguna de las fases de la investigación: concepción del proyecto,    diseño,  ejecución,  análisis  y  resumen  de  datos  en  cuadros  y  figuras,  o  en  la    redacción del manuscrito. La integración de autores y su orden de aparición es   mediante un acuerdo en las etapas tempranas de la elaboración del artículo,   en concreto cuando surge la intención de escribirlo, para que cada autor tenga   la oportunidad de dar su aportación intelectual directa y sustancial. Ser autor es   reconocimiento y responsabilidad.   Son  las  autoras  y  autores  quienes  deciden  cómo  se  presenta  su  nombre,  pero    se recomienda mantener homogeneidad en todas sus publicaciones pues esto   evita  confusiones  cuando  se  les  cite.  Por  ejemplo,  mi  nombre  es  Lorena  Ruiz   \n215  Montoya, y es mi preferencia que en los documentos científicos mis apellidos   vayan unidos por un guion: Lorena Ruiz-Montoya. Mientras, que yo, José Pablo    Liedo  Fernández,  prefiero  firmar  como  Pablo  Liedo.  En  cualquier  caso,  se    prescinde del título académico. La institución y la dirección de esta se agregan,   un par de renglones abajo, con superíndices. Dentro de la lista de responsables    de  la  publicación  es  necesario  identificar  (en  general  con  un  asterisco  en    superíndice)  quién  fungirá  como  el  interlocutor  con  el  equipo  editorial  de  la    revista, que normalmente se conoce como autor(a) para la correspondencia.  En algunas revistas se solicita un título corto o titulillo del manuscrito (“running   head”,  en  inglés),  que  se  coloca  en  una  de  las  esquinas  de  las  páginas  del     artículo publicado, y funge como un identificar ejecutivo. Este titulillo va en la    portada del manuscrito.  Introducción.   En  esta  sección  se  presentan  las  particularidades  del  tema    en  estudio,  destacando  la  trascendencia  de  la  investigación  junto  con  la    pregunta,  hipótesis  y  objetivo.  El  lector  encontrará  respuestas  a  ¿por  qué  se    escogió el tema?, ¿por qué resulta importante investigar en el tema?, ¿qué se   ha investigado del tema hasta el momento? Esta sección se escribe en su mayor   parte en tiempo presente y el uso de referencias es cuasi obligatorio para cada   oración o frase informativa.  Materiales  y  métodos.   Aquí  se  indica  dónde,  cuándo  y  cómo  se  realizó  la    investigación.  Debe  incluir  las  herramientas,  equipos  e  instrumentos  utilizados    para la obtención y el análisis de datos. En general, en esta parte se consigna    toda la información y detalles que permitan repetir el estudio. Es común que    las técnicas de laboratorio y las que se usaron para levantar datos y analizarlos   se  basen  o  estén  inspirados  en  la  literatura  previa,  por  lo  que  es  indispensable    señalar las referencias.  Resultados.   Los  datos  no  pueden  presentarse  de  forma  “cruda”,  se  requiere   resumirlos y presentarlos con cuadros, gráficas, figuras o imágenes. Por supuesto,    no se trata de una mera transcripción de la libreta de campo o laboratorio. Se    describen los “hechos” que demuestran los datos en orden lógico y sucesivo    respecto a cómo se encontraron. Se expone esta información siguiendo el orden   que se le dio en materiales y métodos.  El uso de cuadros y figuras tiene la virtud de mostrar de forma clara y rápida   los  datos  que  fortalecen  o  ayudan  a  conservar  o  descartar  la  hipótesis.  Dicho    12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n216   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  material gráfico debe tener toda la información y explicarse por sí mismo de   tal  modo  que  vuelva  innecesario  ir  al  texto  para  la  comprensión  cabal  de  los    datos.  Dependiendo  de  la  cantidad  de  información  y  del  énfasis  del  artículo,    esos  recursos  deben  usarse  con  equilibrio.  Lo  mejor  es  que  en  conjunto  sean    un  máximo  de  seis,  pero  en  todo  caso  que  sean  pocos  y  concisos;  también    es  importante  que  los  resultados  allí  mostrados  no  repitan  el  texto;  su  función    es resumir, enfatizar datos, reducir la narrativa y no confundir al lector.  Dependiendo  del  tipo  de  información,  entre  los  recursos  gráficos  tenemos   dibujos,  esquemas,  diagramas,  fotografías  y  mapas  para  ilustrar  resultados.     Actualmente muchas revistas solicitan un resumen gráfico.  Los cuadros son útiles para presentar valores exactos, estadísticas descriptivas,   datos que registran un patrón o tendencia clara, en los cuales se puede cruzar    la  información  en  renglones  (filas)  y  columnas.  La  descripción  o  encabezado   del  cuadro  debe  ser  sintética,  y  es  obligatorio  agregar  el  significado  de  las   abreviaciones que allí se utilicen con la ayuda de notas al pie del material gráfico.  En  las  gráficas  regularmente  se  presentan  datos  numéricos  para  mostrar   tendencias y relaciones entre variables. Los ejes deben contar con la leyenda    que identifica la variable, y llevar un pie descriptivo de la figura. Se presenta   toda la información necesaria con el fin de que el lector vaya al texto solo para    saber a qué resultado se le ha dado mayor importancia.  Es necesario cuidar que los cuadros y figuras usen el mismo tipo de notación o   abreviaciones que en el texto del artículo. Vigila que la información o datos de    los cuadros no repita la de las figuras, y viceversa. Es importante mantener la    sencillez. Los datos presentados de forma resumida se muestran como evidencia   que apoya o descarta la hipótesis.  Discusión.  Es una sección dedicada a la interpretación de los resultados. Se distingue   porque propone una serie de argumentos señalando la relación entre factores o    variables con el fin de descartar o conservar la hipótesis. En su elaboración se resalta    la consistencia entre las relaciones de factores o variables que postula la hipótesis    y los “hechos” observados, contrastándolos con los publicados. Se sugieren las    investigaciones que le den continuidad al conocimiento. En la discusión se expresa   la o las implicaciones teóricas y prácticas de los resultados. Incluye la conclusión   general del trabajo, así como las aportaciones e innovaciones de la investigación.   Es el mensaje a la comunidad académica.  \n217  Agradecimientos.   Son  un  elemento  relacionado  con  la  cortesía.  Permiten    reconocer a las personas que ayudaron en el trabajo de campo, de laboratorio,   a  las  personas  e  instituciones  que  proveyeron  de  infraestructura,  equipo  y     materiales  especiales,  así  como  de  recursos  financieros.  Actualmente  hay   revistas  que  solicitan  la  información  sobre  financiamiento  separada  de  los    agradecimientos.  Referencias.  Esta sección integra la información suficiente para que el lector   encuentre  un  documento  usado  como  antecedente  de  la  investigación.  Se    presentan  todas  y  solo  las  referencias  citadas  en  el  artículo.  Se  recomienda     verificar el estilo de citación de la revista a donde se envía el manuscrito para    publicar.  Por  ejemplo,  en  ECOSUR,  para  los  protocolos  y  tesis  se  utiliza  el  estilo     Council of Science Editors (CSE). La ficha de una referencia incluye el nombre    de  los  autores;  la  fecha  de  la  publicación;  título  del  trabajo,  capítulo  o  libro;    título de la revista o nombre de la casa editorial. Si se trata de revistas se agrega    volumen, número y páginas, y el Digital Object Identifier o identificador único de    documento  digital  (DOI,  por  sus  siglas  en  inglés);  hay  revistas  electrónicas  que     solo proporcionan un número al artículo y el DOI.  Para libros, la ficha incluye ciudad y país de la publicación y, en su caso, el   URL (Uniform Resource Locator) que permita la consulta en la web del recurso.   Aunque  cada  revista  tiene  un  estilo  propio  para  documentar  las  referencias    citadas  en  el  texto,  es  conveniente  ofrecer  los  datos  indispensables  para  que    el lector pueda consultar la información primaria de los antecedentes. Existen,   asimismo,  gestores  de  citas  como  Mendeley  y  Zotero,  los  cuales  son  una     herramienta  útil  para  llevar  a  cabo  una  buena  documentación  de  nuestro    artículo y facilitar la escritura de las referencias en el estilo requerido por la revista.  Leyenda de figuras y cuadros.  Los cuadros y figuras en general van al final del   manuscrito,  después  de  los  agradecimientos,  pero  hay  revistas  que  los  piden     ya  plenamente  ubicados  en  el  desarrollo  del  texto,  numerados  según  su    orden de aparición. También hay revistas que solicitan que las leyendas de las    figuras  vayan  en  el  manuscrito,  después  de  los  agradecimientos  y  antes  de   las figuras. Los cuadros generalmente llevan su encabezado.  12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n218   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Redacción científica  La redacción científica se distingue por ser clara y directa. Sigue la normativa   gramatical del idioma en que se escribe, y debe evitar las frases largas y confusas.   Asimismo,  cada  persona  tiene  un  estilo  propio  para  escribir,  aunque  siempre    será más apreciado quien transmite su mensaje de forma asertiva. La comunidad    científica ha crecido mucho y produce altas cantidades de artículos, por lo que    los lectores (la misma comunidad que escribe) agradecerá que el documento   sea  claro,  conciso  y  preciso  para  comprenderlo  fácilmente.  Es  recomendable    escribir frases o enunciados cortos que sigan las reglas gramaticales del idioma   (López-Argoytia,  2024).  A  continuación,  algunas  recomendaciones  sobre  la     escritura científica moderna. “Cuando describas el significado de tu pequeña parte de verdad,    hazlo simplemente. Las declaraciones más simples evocan la mayor    sabiduría. El lenguaje detallado y las palabras técnicas sofisticadas   se utilizan para transmitir pensamientos superficiales” (Day y Gastel,    2011, p. 5).  “Exponga  sus  hechos  tan  sencillamente  como  pueda,  incluso   audazmente.  Nadie  espera  flores  de  elocuencia  ni  ornamentos    literarios  en  un  artículo  de  investigación.”  (R.  B.  McKerrow,  citado    por Huaire-Inacio, 2019, p. 5).  “El  mejor  lenguaje  es  el  que  transmite  el  sentido  con  el  menor   número posible de palabras. [...] considero que la preparación de   un artículo científico tiene menos que ver con el talento literario que   con la organización.” (Day, 2005, p. 3). Escribir las oraciones en primera persona (singular o plural: “Yo hice” o “Nosotros   hicimos”) o en tercera persona (“Se hizo”) puede ser cuestión de estilo o una    indicación de la revista donde se quiere publicar el artículo. Pero es importante   conservar un mismo estilo a lo largo del documento.  Es recomendable que predomine la voz activa por sobre la pasiva ( encontramos  vs.    fue  encontrado ),  aunque  hay  excepciones  al  abordar  los  materiales  y   métodos. La voz activa es directa y usa menos palabras, lo que los lectores de    artículos científicos aprecian mucho. \n219  Los  tecnicismos,  abreviaciones,  metáforas  y  eufemismos  ( matar   vs.   sacrificar )   deben  evitarse  o  minimizarse.  Estos  recursos  distraen  al  lector  y  reducen  la     comprensión del texto. Al tratarse de un documento científico es entendible que    el lenguaje sea técnico y basado en conceptos, pues se supone que el lector (los   revisores, en primer lugar) domina los mismos antecedentes de quienes escriben,   pero no necesariamente es así. Por esta razón se recomienda que el lenguaje   técnico se minimice y, en todo caso, cuidar que se proporcione la información   necesaria para que el artículo se comprenda totalmente.   ¿Cuándo escribir los números con letra o dígito? Es un aspecto que se coteja en las   normas de la editorial en donde se desea publicar. No obstante, se recomienda    escribir el número con letra cuando es menor o igual a diez, y usar los dígitos   cuando es mayor a diez. Se escribe el número con letra cuando se trata de   cantidades específicas o en unidades métricas no convencionales: tres sitios, dos    personas, cinco trampas. En contraste, para las métricas convencionales como    de longitud, peso, distancia geográfica y volumen, los números se escriben con   dígitos y se acompañan de la unidad de medida en forma abreviada, según    el  sistema  métrico  utilizado:  metros  (m),  gramos  (g),  litros  (l),  por  ejemplo,  1  m,    15 g, 2 l. Las escalas métricas se indican con literales adicionales que muestran si    corresponde a miles (k) o fracciones inferiores, por ejemplo, 3 km (tres mil metros).    Se recomienda revisar con cuidado las normas editoriales para esta sección y    otras que pueden ser específicas para el respectivo campo del conocimiento y    revista elegida.  A nivel mundial, el idioma inglés es el de mayor uso, por lo que muchas veces el   manuscrito debe traducirse si está escrito en otro idioma.  Consejos para escribir  Es recomendable disfrutar la escritura de un artículo y mantener en todo momento   el entusiasmo de dar a conocer al mundo el conocimiento nuevo, pertinente y   oportuno logrado en un proyecto de investigación. Lo que sigue es apegarse a   las normas editoriales de la revista elegida. Algunas cuentan con plantillas que   se  sugiere  utilizar,  pues  disminuyen  la  posibilidad  de  rechazo  por  no  ajustarse    a  las  normas  editoriales.  Los  manuscritos  que  se  proponen  para  publicación    suelen requerir formatos sencillos, así que es mejor resistir la tentación de usar uno    personalizado, o “embellecer” con imágenes y gráficos que no son parte de los   12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n220   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  resultados. El número de páginas y el de líneas al margen se usa para el proceso   de revisión por pares, de modo que se aconseja incluirlos.   Es conveniente elaborar un plan o guion del artículo, siempre de lo general a lo   particular, aunque la sección de resultados puede ir de lo particular a lo general.   Mantener  presente  el  mensaje  que  se  pretende  informar  en  tres  oraciones    claras  y  directas.  Guardar  y  ordenar  las  referencias,  incluso  recurriendo  a  las    herramientas digitales para esta tarea (López-Roblero  et al ., 2024). En un primer momento, procurar que el borrador tenga todas las secciones, aun   cuando les falte acabado, seguro habrá oportunidad para corregir y aumentar   información. Una vez completo, hay que revisar y mejorarlo en sus ideas y orden,    y corregir los errores gramaticales y tipográficos. Se sugiere:  •   Asignar el mejor tiempo y respetarlo.   •   Contar con una actitud crítica.   •   Contextualizar el problema.  •   Poner fechas límite.  •   Aprovechar la inspiración.  •   Terminar.  •   Revisar, revisar, revisar.   •   Leer mucho sobre el tema en publicaciones actuales.  •   Consultar con colegas es útil, dan buenas recomendaciones.  ¿En dónde publicar mi artículo?  Para escribir un artículo se necesita haber leído otros que se hayan publicado en   revistas de distintas editoriales. Estos pueden servir como referencia de un primer   conjunto de publicaciones relacionadas con los temas que aborda el artículo en   construcción. Las referencias que se encuentren en esas publicaciones también    ayudan a identificar a otras dedicadas a la temática de nuestro manuscrito.  La  elección  de  una  revista  para  publicar  se  basa  en  su  tipo  de  audiencia.    Al  tratarse  de  una  publicación  científica,  se  dirige  a  lectores  con  sólidos   antecedentes en la materia. Se sugiere identificar la periodicidad con la que    se  publica,  la  rapidez  de  su  proceso  de  revisión  por  pares,  que  su  prestigio    se  fundamente  en  el  reconocimiento  de  la  comunidad  académica,  o  por    indicadores  como  el  factor  de  impacto  (FI)  (López-Roblero   et  al .,  2024).  Otra   \n221  alternativa consiste en verificar si forma parte del Journal of Citation Reports   (JCR),  que  recopila  las  revistas  reconocidas  e  indexadas  de  una  determinada    disciplina  ofreciendo  información  acerca  de  sus  características  e  indicadores    bibliométricos, como el factor de impacto, el cuartil, indicador del nivel de citas,   el  eigenfactor  (que mide el prestigio de una revista académica y/o científica) y   el índice de inmediatez.  Es  una  decisión  que  se  recomienda  tomar  en  las  etapas  tempranas  de  la    elaboración  del  artículo  luego  del  acuerdo  entre  sus  autoras  y  autores.  En  la    decisión  de  donde  publicar  conviene  tener  claros  los  objetivos  de  la  revista,     su  temática,  y  alcances  metodológicos  y  geográficos,  para  asegurar  que  el   conocimiento de nuestro artículo corresponda al perfil de la revista.  Se  sugiere  realizar  un  ejercicio  inicial  en  el  que  se  ponga  por  escrito  el    conocimiento que se pretende dar a conocer mediante el artículo. Una forma    de identificar ese conocimiento es respondiendo las siguientes preguntas: ¿Qué    se  desconocía  al  inicio  de  la  investigación  y  qué  se  sabe  ahora?  ¿Cuál  es  el    resultado de la investigación? ¿La investigación qué logró ampliar o profundizar   en el tema? ¿Qué utilidad tiene el conocimiento ofrecido por la investigación?   ¿Qué mensaje se pretende hacer llegar a la audiencia elegida? El mensaje de   los logros con la investigación se expresa en una o dos oraciones cortas, son la   conclusión a la que conducen los resultados. Por ejemplo, el extenso documento   de Charles Darwin del origen de las especies fue para proponer a la academia    y  al  público  en  general  la  “teoría  de  la  selección  natural  como  el  origen   natural  de  las  especies”,  en  oposición  al  dogma  de  una  “creación  divina  y    espontánea de las especies”. Pero, en contraste, a lo largo de su texto presenta   la evidencia que reunió para demostrar su postulado.  Una  vez  elegida  la  revista,  es  muy  importante  revisar  las  instrucciones  o  guía    para autores y las normas editoriales para identificar la estructura general básica    y  los  detalles  del  documento  que  se  enviará  para  su  potencial  publicación,    justamente  el  tema  de  la  siguiente  sección,  lo  que  puede  usarse  como  guía    para iniciar tu redacción, mientras decides a qué revista enviarás el manuscrito.  12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n222   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Gestión de la publicación  Una que vez que se ha logrado la versión final y plenamente acordada del   artículo  entre  autoras  y  autores,  elegida  la  revista,  y  seguido  al  pie  de  la  letra    sus directrices, se procede al envío, lo que se realiza en sistemas o plataformas   digitales y ayuda mucho para cumplir con la información requerida. Es importante   cuidar un llenado correcto y completo de los metadatos.  El  manuscrito  se  acompaña  de  una  carta  de  presentación  dirigida  al  editor  o    editora de la revista, solicitando la revisión y eventual publicación del trabajo. Se   expresa claramente la importancia de la información, y en ocasiones se pueden   sugerir los nombres de dos o tres personas como posibles revisores.   Hay que asegurarse de la confirmación de la recepción, pues con eso hay certeza   de que el manuscrito se ha recibido y está siendo considerado para publicarse.    El primer filtro es que el editor general admita que el manuscrito es apropiado    para la revista, luego se enviará a un/a editor/a asociado/a, quien a su vez lo   remitirá a potenciales revisores o árbitros para el proceso de dictaminación por   pares  académicos.  Lo  normal  es  que  autores  y  autoras  desconozcan  quiénes    evaluarán  su  manuscrito,  y  en  algunos  casos  se  usa  doble  ciego,  esto  es  que    quienes revisan también desconocen a los que desean publicar el artículo.  En  raras  ocasiones  el  editor(a)  y  quienes  revisan  aceptan  los  manuscritos  tal    como están. Es muy frecuente que se soliciten cambios menores o mayores, con   base en las observaciones y sugerencias de las personas revisoras.  Es importante atender los comentarios de los evaluadores e informar al editor(a),   punto por punto los cambios hechos o cómo se contestó a las observaciones.   Cuando  no  se  atiende  una  observación,  se  debe  argumentar  claramente  la    razón para ello.  Cuando  un  artículo  sea  rechazado  después  de  la  primera  revisión,  no  nece-  sariamente  significa  el  fin  del  proyecto.  Antes  bien,  hay  que  trabajar  en  los    comentarios y elegir una nueva revista. Esta decisión se toma en consenso de los   autores y se valora la calidad y solidez de los datos. Cuando estos son originales   y robustos, es posible que el artículo sea publicado. \n223  El proceso de publicación  La aceptación ocurre después de una o más revisiones del manuscrito por parte   del editor en jefe o asociado, y de los árbitros. Cuando se acepta un manuscrito,    entonces pasa al área de maquetado que le da el formato y diseño específico   de la revista. Enseguida, el editor/a general envía a los autores una versión final    (pruebas de galera, o prueba de impresión en formato pdf) solo para consultar    algunas dudas y confirmar que la información es correcta y que en el trabajo de   formateo no se haya omitido o modificado información de cuadros y figuras. La   prueba de galera es la última oportunidad que tienen los autores para realizar    correcciones  mínimas  a  su  manuscrito.  Publicado  el  manuscrito  ya  no  hay     posibilidad de aplicar correcciones, aunque algunas revistas cuentan con “fe    de erratas”.  Tendencias recientes en publicación  La  necesidad  de  comunicar  el  entendimiento  de  la  naturaleza  ha  sido  una    necesidad  humana.  Las  primeras  formas  de  comunicación  fueron  orales     mediante  diálogos  entre  filósofos  y  aprendices  de  filosofía;  aunque  la  forma    escrita  ha  cumplido  ese  mismo  papel,  no  fue  tan  utilizada  hasta  que  se     inventaron los alfabetos o las “letras” de los diferentes idiomas, tintas y el “papel”    para  escribir  ideas,  historia  y  relatos.  Johannes  Gutenberg  inventó  la  imprenta    en 1455 y doscientos años después, en 1665, se publicaron las primeras revistas    científicas:  Journal des Sçavans y Phylosophical Transactions of the Royal Society  of London . Desde entonces empezaron a producirse otras revistas científicas, la   mayoría al cobijo de universidades, academias y sociedades científicas.    El número de revistas creció gradualmente y las empresas editoriales empezaron   a editar sus propias revistas. Hacia finales del siglo XX se distinguían dos tipos de   revistas: las publicadas por sociedades científicas y las publicadas por empresas    editoriales. Las primeras se sostenían con las cuotas de sus miembros y además    cobraban un “cargo por página” por cada artículo para cubrir los gastos de la    revisión, edición e impresión en papel. Las revistas de las empresas editoriales no   cobraban ese cargo por página, y sus costos los cubrían mediante la venta de   suscripciones. El modelo de las empresas era muy atractivo para autoras y autores,   y  como  eran  revistas  con  muy  buena  reputación,  la  venta  de  suscripciones  a    12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n224   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  bibliotecas  universitarias  y  centros  de  investigación  en  países  desarrollados    estaba  garantizada.  Sin  embargo,  a  raíz  de  las  políticas  de  austeridad  global,     esos presupuestos fueron recortados y las bibliotecas tuvieron serias dificultades    para sufragar las suscripciones, cuyo costo para los particulares era prohibitivo.    Entonces surgió el razonamiento de que autoras y autores escribían los artículos,   los revisaban, y que después eran ellas y ellos, o sus instituciones, quienes pagaban    para utilizar esa literatura. Así surgió el movimiento de “acceso abierto” cuyo    objetivo  era  y  es  que  cualquier  persona  pueda  consultar  los  resultados  de  la    investigación sin restricciones monetarias. Las organizaciones que más invierten    en  investigación  científica,  como  las  dependencias  de  gobierno  de  países    desarrollados —p. ej., el National Institute of Health (NIH) en Estados Unidos de   América—, y las fundaciones —p. ej., Wellcome Trust del Reino Unido— exigen    que los resultados de las investigaciones que financian sean de acceso abierto.   Actualmente  se  reconocen  dos  tipos  de  acceso  abierto,  el  “golden  model”   (modelo dorado), y el “green model” (modelo verde). En el primero, autoras    y  autores  pagan  a  la  editorial  para  que  se  publique  su  artículo,  por  eso  se  ha     comentado que más que acceso abierto un mejor nombre sería “paga por    publicar”. En el modelo verde los artículos se comparten de manera libre, gratuita    y sin haber pasado por arbitraje, en algún repositorio, donde se espera que pares    académicos  pregunten  y  comenten  sobre  el  manuscrito  (los  manuscritos  en    estos repositorios se conocen como  pre-prints , en inglés). Ejemplos de revistas del  modelo dorado son las de Public Library of Science (PLOs), del Multidisciplinary   Digital Publishing Institute (MDPI), Frontiers, y muchas más. Ejemplos del modelo    verde  son  arXives,  bioRxiv,  PeerJj,  ASAPbio,  F1000Resaerch.  Un  problema  del   modelo verde es que como los artículos no son arbitrados no generan confianza   y son poco citados. Una práctica común y aceptable por la comunidad, sobre    todo  en  disciplinas  como  la  física  y  las  matemáticas,  es  publicar  primero  en    un  repositorio  de  este  tipo,  y  posteriormente  publicar  el  artículo  en  una  revista    reconocida, con arbitraje, tomando en cuenta las observaciones y sugerencias   que se hicieron. Los artículos depositados en los repositorios verdes no pueden    considerarse como fuentes primarias o artículos científicos, ya que no hay certeza    de un arbitraje. Nuestra recomendación es utilizarlos solo si después se somete el   artículo a una revista arbitrada e indexada en JCR.    PubMed es un repositorio de artículos científicos de cualquier tipo de revista que   fueron arbitrados y quedan en acceso libre. Funciona con el auspicio del National  \n225  Institutes  of  Health  (NIH);  quien  recibe  financiamiento  de  esta  organización   asume el compromiso de depositar sus artículos en ese repositorio, para lo cual   se toman acuerdos especiales con las revistas que no son de acceso abierto. La   tendencia actual muestra que el acceso abierto modelo dorado es el que más    ha crecido, en 2022 representaba el 39% de las publicaciones, mientras que la    publicación  en  revistas  por  suscripción  representó  el  51%  (McGill,  2024).  Esto  a     pesar del aumento significativo en los cargos por procesamiento de artículo.  Hoy  existen  más  de  24,000  revistas  científicas  en  el  mundo,  y  se  estima  que   publican más de tres millones de artículos por año. La necesidad de mantener    la  confianza,  la  objetividad  y  certeza  de  la  información  científica  publicada    en  revistas,  ha  conducido  a  generar  índices  de  calidad  o  factor  de  impacto    de las revistas. Los índices se basan en parte en la tasa de citación que logran   los  artículos  de  una  revista  anualmente.  El  índice  del  JCR  (Journal  of  Citation    Reports, de ISI-Clarivate) tiene 8,471 revistas en ciencias naturales y exactas (27    de las cuales mexicanas) y 3,047 en ciencias sociales (12 son mexicanas). Otro    índice es Scopus, más reciente y de mucha similitud con JCR.  El  rápido  crecimiento  del  número  de  revistas  en  las  últimas  tres  décadas   se  debió  en  gran  medida  al  desarrollo  de  las  tecnologías  de  información  y    comunicación electrónica (TIC). La circulación de información en el mundo es    rápida, y es posible transferir grandes volúmenes de información. Esta situación    abrió  la  oportunidad  para  que  el  negocio  de  las  casas  editoriales  creciera,    con la promesa de lograr un acceso abierto a la ciencia. En este esquema los    científicos investigan, escriben, revisan y pagan por publicar. Por su parte, las    casas editoriales organizan, revisan, editan, publican y difunden.   Un  problema  que  ha  acompañado  al  crecimiento  de  las  publicaciones    científicas  ha  sido  la  proliferación  de  revistas  depredadoras,  que,  si  bien   cumplen con publicar información científica, su calidad suele ser dudosa, ya    que la revisión y validación se hace con nulo o poco rigor, lo que puede llevar   a  que  la  información  sea  incorrecta,  falsa  o  no  tenga  sustento.  Existen  índices    para  validar  las  revistas  y  evitar  ser  presa  de  una  revista  depredadora,  como    JCR, Scopus, DOAJ y el índice del Conahcyt para revistas mexicanas que están   en proceso de indexación. Por otro lado, está su opuesto, la lista de Beall, que   incluye  a  revistas  potencialmente  depredadoras.  Pero  una  manera  de  evadir     a estas últimas es que la elección sea de los propios autores y evitar que se    publique por invitación. Si esta se recibe y parece atractiva, antes de aceptar   12. ESCRITURA DE UN ARTÍCULO CIENTÍFICO: IMPORTANCIA Y CARACTERÍSTICAS... \n226   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  hay que investigar si la revista pertenece a un índice internacional de calidad,   cuál es la trayectoria académica del editor y que la página web sea real (López-  Roblero  et al ., 2024).  Conclusión  Publicar artículos científicos es una obligación y una responsabilidad inherente   a  la  actividad  o  profesión  científica.  Es  necesario  compartir  los  resultados    de los proyectos de investigación para contribuir al avance del conocimiento,   de  forma  que  esté  disponible  para  el  desarrollo  e  innovación  de  tecnologías,    que, a su vez, contribuirán al desarrollo socioeconómico del país y al bienestar   social.  Escribir  con  sencillez  y  claridad,  y  siguiendo  las  normas  de  la  revista    elegida es una habilidad muy valorada que se mejora con la práctica. Elaborar    un  proyecto  de  investigación  siguiendo  la  tradición  científica  de  interés  y  la    elección  de  la  revista  más  adecuada  para  el  tema,  son  el  principio  de  una     publicación científica.   Referencias  Blackwell,  J.  J.,  y  Martin,  J.  (2011).   A scientific approach to scientific writing .  Springer. Castillo Uzcanga, M. M. (2024). El protocolo de tesis. En L. Ruiz-Montoya, F. Gurri, P.  Liedo, y R. A. Mena Farrera (coords.),  Introducción a la investigación científica  (pp. 123-139). San Cristóbal de Las Casas, Chiapas, México: ECOSUR.  Day, R. A. (2005).  Cómo escribir y publicar trabajos científicos  (3a ed. en español.  Publicación Científica y Técnica, núm. 598). Organización Panamericana de   la Salud. Day, R. A., y Gastel, B. (2011).  How to write and publish a scientific paper  (7a ed.).  Santa Barbara, California, EUA: Greenwood.  Davis, M., Davis, K., y Dunagan, M. M. (2013).  Scientific papers and presentations .  Elsevier. McGill,  B.  (2024).   The  state  of  academic  publishing  in  3  graphs,  6  trends,  and   4  thoughts .  Dynamic  Ecology  [Blog].  https://dynamicecology.wordpress.  com/2024/04/29/the-state-of-academic-publishing-in-3-graphs-5-trends-and-  4-thoughts/, recuperado el 30 de abril de 2024.  Huaire  Inacio,  E.  J.  (2019).   Redacción  científica .  [Curso  taller].  https://www. aacademica.org/edson.jorge.huaire.inacio/30, recuperado el 18 de febrero    de 2020. \n227  López-Argoytia, L. (2024). Escribir bien para comunicar bien. En L. Ruiz-Montoya,  F. Gurri, P. Liedo, y R. A. Mena Farrera (coords.),  Introducción a la investigación   científica  (pp. 201-208). San Cristóbal de Las Casas, Chiapas, México: ECOSUR.  López-Roblero,
