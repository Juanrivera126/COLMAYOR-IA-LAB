egunta de investigación  Susana Maza-Villalobos Rebeca Gasca  Introducción  “Minino de Cheshire ¿podrías decirme, por favor qué camino debo seguir   para salir de aquí?  —Esto depende en gran parte del sitio al que quieras llegar —dijo el Gato.   —No me importa mucho el sitio... —dijo Alicia.   —Entonces, tampoco importa mucho el camino que tomes —dijo el Gato.   —... siempre que llegue a alguna parte —añadió Alicia como explicación.”   ( Aventuras de Alicia en el País de las Maravillas , Lewis Carroll, 1865). A diferencia de  Alicia en el País de las Maravillas , en la investigación científica   es muy importante tener claridad sobre a dónde queremos llegar con nuestras   investigaciones,  y  es  la  pregunta  de  investigación  la  que  nos  servirá  como  la     brújula que nos guiará en este proceso. Si nuestra brújula no está bien calibrada,    es  decir,  si  nuestra  pregunta  de  investigación  no  está  bien  planteada,  es  muy    probable que nunca lleguemos al lugar que deseamos y, por el contrario, nos    perdamos en caminos y destinos imprevistos o no deseados. Podemos definir  \n108   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  la  pregunta  de  investigación  como  el  cuestionamiento  central  de  un  estudio,    y  expresa  eso  que  no  sabemos,  pero  queremos  averiguar.  La  pregunta  de     investigación  es  el  eje  principal  de  cualquier  investigación  científica,  y  si  no    está bien planteada, muy probablemente la investigación no será exitosa. Los    diversos  componentes  de  una  investigación  científica,  tales  como  objetivos,    hipótesis,  variables,  métodos,  resultados,  discusiones,  conclusiones,  e  incluso  el    marco conceptual, están guiados por la pregunta y si esta cambia, los demás   componentes  deberán  cambiar  acordemente  para  conservar  la  coherencia    (véase el capítulo 7 en este libro).   Si bien las etapas para crear la pregunta de investigación pueden ser pocas y   parecer  muy  sencillas,  existen  varios  retos  importantes  que  debemos  observar    y  atender  para  facilitar  este  proceso  creativo.  De  manera  general,  los  pasos    para llegar a una pregunta de investigación se resumen en: 1) elegir un tema de    investigación, 2) buscar antecedentes sobre el tema elegido, 3) detectar vacíos    o  debilidades  de  conocimiento  que  nos  interese  abordar,  4)  delimitar  el  tema    elegido, y 5) traducir esos intereses en una o varias preguntas.   Al enfrentarnos a la posibilidad de realizar una investigación científica, es muy   probable  que  tengamos  una  idea  sobre  el  tema  que  nos  gustaría  estudiar.  La     elección o la identificación del tema que nos interesa es ya el primer paso que    nos ayudará a llegar a la tan ansiada y valiosa pregunta de investigación. Si bien   generalmente el tema de investigación es de nuestro interés y ha capturado nuestra   atención  y  deseos  por  conocerlo  más,  hay  un  sinfín  de  cuestiones  involucradas    en su elección que se relacionan con el investigador o con el objeto de estudio,   como veremos en la siguiente sección. La elección de un tema particular debe   hacerse con cuidado y valorando los diversos aspectos involucrados.  Habiendo  elegido  el  tema  es  muy  probable  que  tengamos  cierta  inquietud  o    esbozo de la pregunta de investigación. En este momento, es común pensar    que  nadie  ha  trabajado  en  el  tema  o  pregunta  de  investigación  elegidos;  sin     embargo, es aún más común que otras personas estén investigando o hayan    investigado  el  asunto,  tal  vez  no  exactamente  en  el  mismo  espacio  o  tiempo    en el que pretendemos trabajar, pero sí de manera similar, lo cual es un valioso    antecedente. Así, para no caer en la falsa afirmación de “no hay información    sobre  mi  tema  de  investigación”,  la  lectura  exhaustiva  sobre  él  es  de  suma    importancia,  tanto  para  conocer  lo  que  se  ha  hecho,  como  para  delimitar  la    pregunta sobre la que realizaremos la investigación. Por otra parte, es necesario  \n109  cuidar que las fuentes revisadas sean confiables. Finalmente, está el proceso   de  transformar  esa  inquietud  en  una  pregunta  novedosa  y  pertinente,  para  lo    cual  se  requiere  considerar  algunos  elementos  básicos  que  compartiremos  en    este capítulo y que, junto con una serie de ejercicios prácticos, esperamos que   mejoren las habilidades del lector para el planteamiento correcto de preguntas    de investigación científica.  Elección del tema de investigación  En  el  contexto  de  este  libro,  podemos  decir  que  el  tema  de  investigación    seleccionado  es  el  área  general  en  la  que  queremos  o  se  piensa  realizar  la    indagación. Mientras más particular y acotado sea el tema o área de nuestro   interés,  más  posibilidades  tendremos  de  enfocarnos  en  una  particularidad    acerca  de  la  cual  podamos  plantear  una  pregunta  de  investigación  para    trabajar. Esto es, al principio nuestro tema puede ser amplio, pero delimitarlo a   un  aspecto  particular  nos  permitirá  plantear  una  o  unas  pocas  preguntas  por    responder,  facilitándonos  la  posibilidad  de  plantear  una  investigación  viable.    Por ejemplo, el tema de interés puede ser: •   Las personas nocturnas.  •   Los mamíferos de México.  •   Los agroecosistemas silvícolas.  •   Las mariposas de la ciudad de Campeche.  •   La impunidad de autoridades policiacas agresoras.  •   El  comportamiento  de  las  corrientes  marinas  costeras  (0  a  10  m  de    profundidad) del Caribe mexicano durante la época de nortes. Estos temas de investigación son áreas del conocimiento en los que hay algo que    aún no sabemos, e. g., ¿cómo es?, ¿cómo se manifiesta?, ¿cómo se relaciona    esta  variable  con  esta  otra?,  ¿cómo  funciona?,  ¿cómo  fue?,  ¿cómo  será?,     ¿cuál es el efecto?, ¿qué factores son claves? e infinidad de interrogantes. Es   decir, que dentro del tema seleccionado hay algo que aún no sabemos, pero    que deseamos averiguar.  Tal  vez  los  temas  que  hemos  enlistado  te  parezcan  muy  amplios  (y  de  hecho    lo  son),  pero  establecerlos  es  un  primer  paso  para  ir  centrándonos  en  las    particularidades o ámbitos que nos interesen. Un tema muchas veces contiene   6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n110   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  subtemas y si no logramos identificarlos, es probable que nos sintamos perdidos   al momento de definir nuestro tema de investigación particular y, por ende,    nuestra  pregunta  de  investigación  no  será  clara.  Debido  a  lo  anterior  es  muy    importante empezar con el ejercicio de delimitar nuestro tema de investigación   e ir escalando en su particularidad.  Ejercicio  1.   Escribe  un  tema  de  investigación  de  tu  interés  o,  incluso  mejor,  el    tema  de  investigación  al  cual  pertenece  tu  proyecto  de  investigación  (tesis,    tesina, artículo, protocolo, propuesta de investigación, etc.). Si logras detectar   que  dentro  de  ese  tema  existen  otros  subtemas,  también  escríbelos.  Te     recomendamos usar un gráfico.  En este proceso de seleccionar un tema de investigación, los principales aspectos   involucrados son los relacionados con la persona que realizará la investigación   y los que tienen que ver con lo que vamos a estudiar. En la elección del tema    de  investigación  puede  haber  infinidad  de  motivos  personales,  tales  como   nuestras preferencias, intereses, compromisos y gustos adquiridos. Las influencias   familiares, sociales, o de alguna figura de autoridad o inspiración, pueden dar    como resultado que elijamos un tema y no otro. El tema seleccionado en general   se relaciona con las preferencias del investigador; puede ser incluso algo que ha   llamado nuestra atención desde pequeños. En cualquier caso, lo recomendable   es estudiar algo que, además de gustarnos, nos apasione y trabajemos en él sin   percibirlo como una carga.  Nuestra  capacidad  es  un  aspecto  por  considerar  cuando  elegimos  un  tema    de investigación. Nosotros conocemos qué habilidades y limitaciones tenemos   para  desarrollar  las  actividades  que  demanda  la  investigación  del  tema    seleccionado.  Nuestra  formación  y  experiencia  en  el  tema  de  investigación    elegido son importantes; si tenemos con él una familiaridad previa, la elaboración    de la investigación será mucho más sencilla y seremos eficientes en su desarrollo.    Lo  anterior  no  obsta  para  abordar  temas  nuevos,  sino  que  es  un  punto  para    tomar en cuenta.  Las relaciones que tenemos con personas que se dediquen al tema de interés   también pueden ser de consideración; es admisible aprovechar la experiencia   de otros investigadores, quienes probablemente nos aconsejen acerca del tema   de  investigación  elegido  y  sobre  los  retos  que  representa  trabajarlo,  así  como    compartirnos  temas  o  perspectivas  que  no  hubiéramos  considerado  y  que  se    acercan más a nuestros intereses. \n111  El  objeto  de  estudio,  es  decir,  aquella  parte  de  la  realidad/fenómeno  que    decidimos  abordar  debe  estar  claramente  planteado  en  la  pregunta  de     investigación, la cual se debe poder contestar mediante el método científico    (véase  el  capítulo  1  de  este  libro).  Todos  los  recursos  que  requiramos  son    importantes  para  que  la  pregunta  de  investigación  tenga  posibilidades  de    abordarse y concluirla satisfactoriamente. Los objetos de estudio sean personas,   otros organismos vivos o muertos, sitios de estudio, fenómenos de la naturaleza,   problemas  matemáticos,  etc.,  deben  estar  a  nuestro  alcance,  ya  sea  por     situación geográfica, costos, disponibilidad u otros factores. Para poder trabajar    con  algunos  objetos  de  estudio  se  requiere  cumplir  con  aspectos  legales  y    éticos (véase el capítulo 14 de este libro); por ejemplo, si estudiáramos personas   debemos  asegurar  su  disposición  a  colaborar  y  su  autorización  para  trabajar    con ellos. Si nuestro objeto de trabajo es alguna especie a recolectar en campo,   tramitaremos los documentos legales necesarios para poder hacerlo. El tiempo    y la situación geográfica para realizar el estudio deben estar al alcance; hay   fenómenos  temporales  que  no  están  siempre  disponibles,  como  los  años  “El   Niño”, migraciones masivas, floración de algunas especies o pandemias.   Por  otro  lado,  en  general  se  espera  que  la  pregunta  de  investigación  sea    novedosa,  que  nadie  la  haya  trabajado  antes  para  que  hagamos  un  aporte    al  conocimiento,  ya  sea  incrementándolo  o  robusteciéndolo  a  través  de    aplicaciones  prácticas.  Esto  no  quiere  decir  que  la  pregunta  de  investigación    deba tener una aplicación práctica inmediata, porque no hay conocimientos    inútiles  y  sí  ejemplos  de  muchas  investigaciones  que  en  un  momento  se   antojaban  inútiles,  pero  que  posteriormente  fueron  la  base  para  generar    conocimientos  y  tecnologías  sin  las  cuales  es  inimaginable  vivir  actualmente     (véase el capítulo 15, en este libro). Si bien la investigación científica debe realizarse    con libertad, hay problemas prioritarios en el mundo necesarios de atender. En    este sentido, muchos financiadores tienen interés en temas particulares, para los   cuales emiten convocatorias para financiar la investigación. Sin duda, proponer   preguntas  de  investigación  científica  en  este  tipo  de  convocatorias  implica    cierta acotación al seleccionar el tema, e incluso, subtemas de investigación.   Ejercicio 2.  Escribe los motivos personales (columna derecha) y los relacionados   con  el  objeto  de  estudio  (columna  izquierda)  que  te  llevaron  a  seleccionar  el    tema de investigación expresado en el ejercicio 1.  6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n112   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Búsqueda y revisión de antecedentes  A  partir  del  planteamiento  inicial  sobre  el  tema  de  investigación,  la  revisión    bibliográfica de antecedentes nos permitirá saber todo lo que se ha hecho,    cómo,  dónde,  cuándo,  y  principalmente,  qué  es  lo  que   no   se  ha  hecho  o     qué aspectos aún no están suficientemente explorados. En este proceso es   necesario invertir suficiente tiempo y recursos especializados (véase el cap. 8,    en  este  libro),  lo  que  nos  dará  la  seguridad  de  no  estar  intentando  descubrir    cosas  que  ya  se  saben,  sino  que  nos  permitirá  avanzar  en  el  conocimiento.     Mientras  más  exhaustiva  sea  nuestra  búsqueda,  más  nos  familiarizaremos    con  el  tema  de  investigación,  hasta  ser  capaces  de  plantear  una  incógnita    novedosa. Podemos también consultar especialistas para obtener información   o consejos sobre lo que vamos a hacer.   Es recomendable revisar los antecedentes en inglés o en el idioma que, sabemos,   se usa para publicar los temas que nos interesan, porque es muy probable que   alguien ya haya trabajado en nuestra idea, por muy novedosa que nos parezca    (véase el cap. 8, en este libro). La revisión de literatura nos permitirá identificar un    enfoque dentro del tema de investigación que sea nuevo, interesante y tal vez   con aplicación inmediata.  Los trabajos de revisión son especialmente útiles; estén o no muy actualizados   al  momento  de  nuestra  búsqueda,  son  un  buen  punto  de  partida  pues  en   ellos se analiza el estado del arte sobre un tema. Las referencias bibliográficas de    los trabajos que revisemos también nos ayudan a encontrar distintos enfoques   en los que el tema es tratado, disciplinas que lo incluyen y conclusiones acerca   de él. Los métodos de muestreo y análisis para nuestro estudio también pueden   inspirarse en lo hecho por otros autores.  Detectar vacíos o debilidades de conocimiento  que nos interese abordar (problema a investigar)  La  revisión  de  literatura  en  búsqueda  de  antecedentes  nos  ayuda  tanto  a    continuar con la delimitación de nuestro tema de investigación, como a detectar   los  vacíos  de  conocimiento respecto  a  él  y  distinguir  cuestiones  que  requieren     estudiarse. Muchos trabajos científicos, en sus conclusiones, plantean claramente    cuál ha sido su alcance y lo que falta por hacer. Algunos temas similares al de  \n113  nuestro interés (e. g., el papel del cacao de sombra en la conservación de suelo   en México) pueden haberse tratado en otra situación geográfica (e. g., el papel    del  cacao  de  sombra  en  la  conservación  de  la  biodiversidad  de  nematodos    en  el  suelo  en  Ghana),  o  en  otro  tiempo,  por  lo  que  es  importante  hacer    revisiones en otros idiomas y en amplias ventanas de tiempo que nos permitan   encontrar esos  temas  similares.  En  la  actualidad  es  relativamente  fácil  traducir    términos, palabras claves, además de oraciones completas en aplicaciones de    internet o con inteligencia artificial, por lo que no hay excusa para no hacer    revisiones  exhaustivas  en  otros  idiomas.  No  obstante  lo  anterior,  podemos    simplemente no encontrar antecedente alguno de lo que queremos averiguar,   pero debemos tener la seguridad de haber realizado una buena revisión de la   literatura.   Delimitación del tema de investigación  Luego de la revisión de los antecedentes del tema, y como parte del proceso    de definir aún más nuestro tema de investigación, delimitaremos los problemas    o  aspectos  particulares  en  los  que  queremos  enfocarnos.  Sabemos  que  no  es    tarea  sencilla,  porque  puede  haber  un  mundo  de  aspectos  interesantes  que    investigar.  Tomar  en  cuenta  nuestras  preferencias  y  posibilidades  nos  ayudará    para  decidirnos  y  enfocarnos  en  ello;  de  lo  contrario,  correremos  el  riesgo  de     entrar en un periodo de indefinición y posibilidades que suelen parecer ilimitadas.    Por ejemplo, podemos tener la idea de que nuestro tema de investigación sea   “Las medusas del mar Caribe”, pero ¿qué aspecto no o poco estudiado (que    detectamos  después  de  la  revisión  de  literatura)  acerca  de  las  medusas  del    Caribe nos interesa abordar?: ¿de qué especies son?, ¿cómo es la comunidad?,   ¿cómo  se  distribuyen  en  la  profundidad?,  ¿qué  toxinas  contienen?,  ¿cómo  se    reproducen?, ¿de qué se alimentan?, ¿qué niveles de oxígeno disuelto toleran?,    etc. Como puedes ver, el tema “Las medusas del mar Caribe” engloba muchas    áreas,  las  cuales  pueden  ser  o  no  de  nuestro  interés.  Para  ubicar  y  transmitir    de manera más clara y precisa lo que intentamos realizar vamos a delimitar el   tema, a enfocarnos en lo que nos interesa, que sea factible de realizarse y que,   debido  a  nuestra  experiencia  y  capacidades,  podamos  llevarlo  a  cabo.  Este    tema  acotado  es  recomendable  que  se  escriba  en  una  oración,  de  manera     clara y precisa; podemos escribirlo de diferentes maneras y, al final, seleccionar    la que más nos convenza.  6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n114   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Generalmente,  un  trabajo  debe  estar  delimitado  en  el  tiempo  y  el  espacio    para  que  haya  claridad  en  cuanto  a  lo  que  queremos  realizar.  Lo  anterior,  si    bien  puede  o  no  expresarse  en  el  mismo  tema  o  pregunta  de  investigación,    sí es muy importante que se mencione en los métodos. Analizar cada palabra   que escribimos y responder a la pregunta ¿qué es lo que no se sabe y quiero   averiguar?  nos  puede  facilitar  la  tarea  al  momento  de  acotar  el  tema  a    investigar.   A partir del tema de ejemplo “Las medusas del mar Caribe” y después de la   revisión  de  literatura,  hemos  acotado  un  poco  más  el  tema  y  ahora  tenemos     “Estructura de la comunidad de las medusas del Caribe mexicano (0-100 m)”   (entendiendo “estructura de la comunidad” como qué especies están presentes,   en qué números y cómo se relacionan entre ellas y con el medio). A partir de    la pregunta ¿qué es lo que no se sabe y quiero averiguar? podríamos plantear    otros temas aún más específicos, por ejemplo:   i.   Estructura de  las  comunidades  de  las  medusas  de  la  capa  0-100  m    del Caribe mexicano.  ii.   Variación de las comunidades en la zona.   iii.   Relación de las comunidades con las masas de agua de la zona.  Ejercicio 3.  A partir del tema de investigación escrito en el ejercicio 1, desglosa    los  subtemas  que  puede  contener  e  identifica  si  alguno  expresa  con  mayor    claridad y precisión tu interés de investigación, es decir, si puede reemplazar el   tema de investigación escrito originalmente.  Ejercicio  4.   A  partir  de  tu  tema  de  investigación  (subtema  seleccionado  en  el    ejercicio 3) y la revisión de la literatura que hasta ahora tienes, escribe qué es    lo que no se sabe sobre ese tema y quieres averiguar, luego señala cuáles de   esos vacíos de conocimiento puedes abordar en tu investigación (considera los   aspectos personales y los del objeto de estudio para tu selección).  Del tema de investigación a la pregunta de investigación  Después  de  la  revisión  de  antecedentes  y  de  acotar  precisamente  en  lo  que    actuaremos, tenemos un tema de investigación mucho más centrado, el cual   ahora deberemos de plantear como una o varias preguntas de investigación. \n115  Esa(s) pregunta(s) debe(n) reflejar lo que queremos saber o abordar en nuestro   trabajo. Aun cuando ya hemos acotado el tema, dentro de este puede haber   varios  subtemas  o  vacíos  de  conocimientos,  pero  es  importante  que  nos    enfoquemos  solo  en  uno  o  unos  cuantos.  La  claridad  que  tengamos  acerca    de  los  aspectos  concretos,  en  los  que  queremos  y  podemos  enfocarnos,  nos     facilitará  mucho  la  tarea  de  continuar  hasta  el  final  sin  distraernos  en  otros    aspectos, igual o más interesantes, que en los que hemos seleccionado. Llevar    un proyecto a un final satisfactorio en un tiempo establecido suele ser el resultado    de  enfocarnos  en  un  problema  en  particular.  Aunque  podemos  encontrar    nuevos  caminos  en  los  que  podemos  trabajar  (y  si  no  tenemos  restricciones,     podemos ir estableciendo metas o preguntas adicionales), lo más común es    que tengamos tiempo, objetivos y recursos limitados que cumplir. Mantenernos   enfocados  durante  todo  el  trabajo  es  importante  para  poder  llevar  a  buen    término un proyecto.  El tema de investigación puede expresarse como una pregunta de investigación,   esto  es,  como  un  enunciado  interrogativo  con  intención  de  conocer  algo.    La  pregunta  debe  estar  redactada  de  manera  clara,  directa  y  sin  palabras    ambiguas para que no sea interpretada de formas distintas. Si parece imposible   ser claro en los términos usados en la pregunta, es importante que estos estén    definidos claramente en otra sección del trabajo previa a la pregunta, como los    antecedentes o el marco teórico.   Siguiendo  con  el  ejemplo  de  este  texto  “Estructura  de  la  comunidad  de  las   medusas  del  Caribe  mexicano  (de  0  a  100  m  de  profundidad)”,  se  pueden    generar las siguientes preguntas de investigación: i.   ¿Cómo es la estructura de las comunidades de medusas que habitan   los primeros 100 m de profundidad del Caribe mexicano? ii.   ¿Cuáles son las especies presentes?  iii.   ¿En qué abundancias se presentan esas especies?   iv.   ¿Cómo  se  relacionan  la  presencia  de  las  especies  y  las  masas  de    agua? En este ejemplo, la primera pregunta puede funcionar como pregunta general   y  las  demás  como  preguntas  particulares.  Cuando  hacemos  esta  separación,    se entiende que el conjunto de las segundas ayuda a responder la general. Este    formato de pregunta general y particulares es común en trabajos de tesis.  6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n116   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Antes de llegar al planteamiento del tema, problema y pregunta de investigación,   en nuestro texto deben estar especificados los términos “medusas”, “estructura   de  la  comunidad”,  “Caribe  mexicano”,  “abundancia  de  especies”,  “masas    de  agua”,  y  los  demás  que  estén  involucrados  en  el  contexto  del  tema  de     investigación  y  la  pregunta  de  investigación,  para  evitar  ambigüedades.    Es  recomendable  que  todas  las  palabras  sean  claras  y  adecuadas,  o  por    lo  menos  que  todos  los  sustantivos  relacionados  con  estos  conceptos  estén     definidos antes de usarse en alguna parte de nuestro trabajo.  Ejercicio 5.  Transforma en preguntas cada uno de los vacíos de conocimiento   detectados en el ejercicio 4.  Estructura general de una pregunta de investigación  Aunque no existe una fórmula única para plantear preguntas de investigación   científica, hay componentes y patrones que facilitan este proceso. De manera    general, una pregunta de investigación está compuesta por:  Palabra interrogativa : es el pronombre o adverbio interrogativo que empleamos   en  la  pregunta,  por  ejemplo:  ¿qué?,  ¿cómo?,  ¿cuál?,  etc.,  y  usualmente    aparece al inicio de la pregunta de investigación.   Verbo : denota la acción.   Variables o unidades de análisis : son los sujetos, variables o fenómenos sobre lo  que se desea investigar, e. g., polinización, alimentación, población, actividades   culturales, aceptación social, percepción, crecimiento, etcétera.    Límite :  son  los  parámetros  en  los  que  se  contextualiza  la  pregunta  de     investigación.  Los  límites  se  identifican  mediante  dimensiones  temporales  o    espaciales. Establecer un límite, aunque no se exprese en la pregunta, sirve para    enfocar aún más nuestro objetivo a investigar.    Tiempo : se refiere al periodo de estudio en el cual se desarrolla la investigación.   Espacio : se refiere a la ubicación física en donde se plantea la investigación.  Aquí algunos ejemplos en donde señalamos con diferentes líneas de subrayado   la interrogante o cuestión, el verbo, la(s) variable(s) o unidad(es) de análisis, el   límite de espacio físico y el límite de tiempo. \n117  1.   ¿Cuáles son las causas de su situación y las necesidades urgentes de las   personas en situación de calle del centro de la ciudad de Chetumal? 2.   ¿Cuál  ha  sido  el  incremento  en  el  gasto  energético  durante  el  2020,    respecto al año anterior, en los hogares de la Ciudad de México?  3. ¿Cuáles son los efectos de la dieta y la temperatura sobre la biomasa de   Drosophila melanogaster  producida en laboratorio? La ubicación de los componentes de la pregunta de investigación no sigue un   patrón inamovible. Su ubicación dependerá del gusto y estilo del autor, pero la   claridad de la pregunta sí debe ser primordial al momento de redactarla.  Ejercicio  6.   Identifica  los  componentes:  pregunta  base  o  indagatoria,  verbo,   variables  o  unidades  de  análisis,  dimensión  temporal  y  dimensión  espacial,  de    las  siguientes  preguntas  de  investigación,  usando  los  subrayados  indicados.    Corrobora tus respuestas en el anexo I. 1.   ¿Cuál  es  el  efecto  de  las  cercas  vivas  de   Pachira  aquatica   en  la    concentración de hidrocarburos en suelos contaminados? 2.   ¿Cómo es la morfología radicular de plántulas de  Bursera simaruba  bajo   diferentes condiciones de agua en el suelo?  3. ¿Qué tipo de violencia reciben las niñas trabajadoras del hogar en su   lugar de trabajo? 4.   ¿Qué espacios de la ciudad de Tapachula son usados para actividades   de recreación por personas migrantes?  5.   ¿Cuál es el efecto de la cobertura arbórea sobre la riqueza y equitatividad    de la avifauna en los parques públicos de la Ciudad de México?  6.   ¿Cuál es el nivel de contaminación por cloruros en los diferentes tipos de   uso de suelo agrícola de la región del Soconusco, Chiapas?  7.   ¿Cuál es el efecto del uso de celulares, como medio de entretenimiento,   en niños de 10 años de edad? 8.   ¿Cuál  es  la  percepción  de  los  niños  y  las  niñas  de  la  comunidad  Benito    Juárez, de la Selva Lacandona, Chiapas, en torno al jaguar?  9.   ¿Cómo es el crecimiento de plántulas de  Cedrela odorata  bajo diferentes  condiciones de luz? 10. ¿Cómo  afectó  El  Niño  en  la  cantidad  de  precipitación  registrada  en  el    año 2000, para el estado de Veracruz?  11.¿Cómo es la estructura y composición de anfibios y reptiles en cultivos   activos y no activos de palma africana en la región del Petén, Campeche?  6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n118   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  12. ¿Cuáles son las problemáticas de las trabajadoras nocturnas de maquila   en Ciudad Juárez, Chihuahua?  13.¿Cuáles fueron los principales retos personales que vivieron los miembros   del sistema nacional de investigadores de México durante el 2020 bajo el   contexto de la pandemia de la covid-19?   Ejercicio 7.  Ubica los diferentes componentes de tus preguntas redactadas en   el ejercicio 6.  Ejercicio  8.   Escribe  nuevamente  las  preguntas  del  ejercicio  7  que  consideres    pueden mejorarse para tener mayor claridad y precisión. Antes, detecta cuáles   no tienen todos los componentes y complétalas en caso necesario.  De la pregunta general a las preguntas particulares  Mientras que la pregunta general engloba todas las inquietudes por abordar, las   particulares expresan cada una de esas inquietudes o interrogantes. Así que, en   conjunto, todas las preguntas de investigación particulares tienen por objetivo   contestar la pregunta general de investigación. Debido a esta estrecha relación    entre  la  general  y  las  particulares,  es  importante  que  estas  últimas  guarden    relación entre sí y estén en concordancia con la primera. Si una particular no es   coherente con la general, i. e., no persigue la misma inquietud, no encajará y,   como resultado, tendremos una propuesta de investigación de menor calidad.  Imaginemos que la pregunta general de investigación es un rompecabezas de   pocas  piezas  y  que  cada  una  de  ellas  es  una  pregunta  particular.  Si  una  de    las  piezas  no  encaja  correctamente,  el  rompecabezas  quedará  incompleto.    Cuando  de  manera  forzada  integremos  la  pieza  (arrugada,  encogida  y  sin    embonar),  será  evidente  que  el  rompecabezas  no  está  bien  construido.  Los    componentes que forman las preguntas generales o particulares son los mismos   que vimos en el apartado anterior. Así como es importante delimitar la pregunta    de investigación, también lo es limitar el número de preguntas particulares que    nos  ayudarán  a  responder  la  general.  La  cantidad  de  preguntas  particulares    dependerá  de  lo  que  deseamos  responder  en  la  pregunta  general;  si  ésta  es    muy  ambiciosa  en  la  magnitud  de  su  cuestionamiento,  seguro  tendremos    que  plantear  varias  preguntas  particulares  que  nos  permitan  dar  respuesta    a  la  general.  Sin  embargo,  en  aras  de  mantener  la  claridad,  la  relación  y  la   \n119  coherencia entre pregunta general y las particulares, es muy recomendable no   tener muchas de las segundas. Además, hay que recordar los aspectos objetivos   y  subjetivos  que  nos  llevaron  a  la  elección  del  tema,  ya  que  estos  también     influirán en la delimitación de nuestra investigación, i. e., en los alcances de    nuestra pregunta general de investigación.  Ejemplos:  Pregunta general:  ¿Cuáles fueron las condiciones laborales y de salubridad de   las trabajadoras migrantes irregulares en los comercios establecidos en el centro   de  la  ciudad  de  Tapachula,  Chiapas,  durante  la  pandemia  de  la  covid-19  en    2020?  Preguntas particulares:  i.   ¿Cómo  fueron  los  salarios  otorgados  a  las  migrantes  irregulares  en  la    ciudad  de  Tapachula,  Chiapas,  durante  la  pandemia  de  la  covid-19,    respecto al año anterior? ii.   ¿Cómo  fueron  las  jornadas  laborales  de  las  migrantes  irregulares  en  la    ciudad  de  Tapachula,  Chiapas,  durante  la  pandemia  de  la  covid-19,    respecto al año anterior? iii.   ¿Cuáles fueron las condiciones de salubridad de las trabajadoras migrantes   irregulares en la ciudad de Tapachula, Chiapas, durante la pandemia de   la covid-19?  Pregunta  general:   ¿Cuál  es  el  nivel  de  contaminación  por  cloruros  en  los    diferentes tipos de uso de suelo agrícola de la región del Soconusco, Chiapas?  Preguntas particulares:  i.   ¿Cuáles  son  los  principales  cloruros  que  están  contaminando  los  suelos    agrícolas de la región del Soconusco, Chiapas? ii.   ¿Cuáles son los cultivos con mayor contaminación por cloruros en el suelo   de la región del Soconusco, Chiapas?  Ejercicio  9.   A  partir  de  las  preguntas  redactadas  y  ajustadas  en  el  ejercicio  8,    selecciona una como pregunta general y a partir de ella escribe las preguntas   particulares.    Nota:   Es  probable  que  algunas  de  las  preguntas  de  tu  ejercicio  8   puedan ser las preguntas particulares de una pregunta general que no habías   vislumbrado.  6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n120   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Del planteamiento del problema y la pregunta de investigación se derivarán más   fácilmente el o los objetivos, las variables y las hipótesis de tu trabajo. De hecho,   tener la pregunta de investigación te ayudará a la clara construcción del resto   de elementos de tu investigación, incluyendo las ideas claves enmarcadas en tu   marco teórico, los métodos y la discusión y conclusión de tus resultados.  Conclusiones  •   El  planteamiento  de  una  pregunta  de  investigación  científica  es  un    proceso  que  requiere  tiempo  y  dedicación.  Este  proceso  generalmente    inicia a partir de la consulta de una vasta información sobre un tema de   nuestro interés.  •   A  partir  de  la  información  consultada  se  pueden  detectar  los  vacíos  o    debilidades de información existentes en nuestro tema de interés, lo que nos    llevará al planteamiento de diversas preguntas de investigación científica.  •   Tomar  en  cuenta  los  factores  personales  (e.  g.,  gustos,  habilidades)  y    prácticos (e. g., disponibilidad de recursos económico, disponibilidad de   tiempo,  infraestructura,  recursos  humanos,  etc.)  nos  ayudará  a  elegir  la     pregunta de investigación científica.  •   La  pregunta  de  investigación  científica  debe  ser  clara  y  sencilla,  sin   ambigüedades que den pie a interpretaciones diversas.  •   En la pregunta de investigación científica deben identificarse las variables    de interés. •   Es indispensable que la pregunta de investigación científica pueda ser   contestada mediante el método científico.  •   Una  pregunta  de  investigación  científica  demasiado  amplia  no  es   recomendable debido a la ambigüedad que conlleva.  •   La  respuesta  a  una  pregunta  de  investigación  científica  demasiado   específica limita su alcance, por lo cual tampoco es recomendable.  •   Las  preguntas  particulares  de  investigación  científica  de  un  proyecto    deben  ser  coherentes  entre  sí.  Además,  en  conjunto  deben  estar  en    concordancia con la pregunta general de la cual se originan y a la cual   dan respuesta. Lo más interesante de realizar investigación pudiera no ser el tema o la pregunta   particular de investigación, sino el reto que representa enfrentarse a algo que  \n121  no  se  conoce  y  tratar  de  resolverlo.  El  proceso  de  conocer  o  averiguar  algo    que aún no se sabe es lo interesante y los resultados, aunque pueden no ser lo    que  esperábamos,  siempre  son  satisfactorios  si  la  investigación  busca    honestamente encontrar la respuesta a algo que desconocemos. Además, esos   resultados que a primera vista pueden resultar insatisfactorios porque no son lo   que esperábamos abren nuevas preguntas e inquietudes por resolver, lo cual es   parte fundamental del proceso de investigación.  Fuentes recomendadas  Bouchrika, I.  How to Write a Research Question in 2024: Types, Steps, and Examples .  (2022, mayo 4). Research.Com. https://research.com/research/how-to-write-  a-research-question, recuperado el 11 de noviembre de 2024. Creswell, J. W., y Creswell, J. D. (2018).  Research design. Qualitative, quantitative,  and mixed methods approaches . (5a ed.). Los Angeles, EE. UU.: Sage.  Hernández  Sampieri,  R.,  Fernández  Collado,  C.,  y  Baptista  Lucio,  P.    (2014).    Metodología de la investigación . (6a ed.). México: McGraw-Hill.  Kerlinger, F. N., y Howard, B. L. (2002).  Investigación del comportamiento. Métodos  de investigación en ciencias sociales . (4a ed.). México: McGraw-Hill. Scribbr.  Starting  the  research  process  Archieven .  https://www.scribbr.com/ category/research-process/, recuperado el 14 de septiembre de 2021.  Anexo I Resultados  del  ejercicio  6.   Identifica  los  componentes:  pregunta  base  o   indagatoria,  verbo,  variables  o  unidades  de  análisis,  dimensión  temporal  y    dimensión  espacial,  de  las  siguientes  preguntas  de  investigación,  usando  los    subrayados indicados. 1.   ¿Cuál  es  el  efecto  de  las  cercas  vivas  de   Pachira  aquatica   en  la    concentración de hidrocarburos en suelos contaminados? 2.   ¿Cómo es la morfología radicular de plántulas de  Bursera simaruba  bajo   diferentes condiciones de agua en el suelo?  3. ¿Qué tipo de violencia reciben las niñas trabajadoras del hogar en su   lugar de trabajo? 4.   ¿Qué espacios de la ciudad de Tapachula son usados para actividades   de recreación por personas migrantes?   6. DEL TEMA A LA PREGUNTA DE INVESTIGACIÓN \n122   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  5.   ¿Cuál es el efecto de la cobertura arbórea sobre la riqueza y equitatividad   de la avifauna en los parques públicos de la Ciudad de México?  6.   ¿Cuál es el nivel de contaminación por cloruros en los diferentes tipos de   uso de suelo agrícola de la región del Soconusco, Chiapas?  7.   ¿Cuál es el efecto del uso de celulares, como medio de entretenimiento,   en niños de 10 años de edad? 8.   ¿Cuál  es  la  percepción  de  los  niños  y  las  niñas  de  la  comunidad  Benito    Juárez, de la Selva Lacandona, Chiapas, en torno al jaguar?  9.   ¿Cómo es el crecimiento de plántulas de  Cedrela odorata  bajo diferentes  condiciones de luz? 10. ¿Cómo  afectó  El  Niño  en  la  cantidad  de  precipitación  registrada  en  el    año 2000, para el estado de Veracruz?  11.¿Cómo es la estructura y composición de anfibios y reptiles en cultivos   activos y no activos de palma africana en la región del Petén, Campeche? 12. ¿Cuáles son las problemáticas de las trabajadoras nocturnas de maquila   en Ciudad Juárez, Chihuahua?  13.¿Cuáles fueron los principales retos personales que vivieron los miembros   del sistema nacional de investigadores de México durante el 2020 bajo el   contexto de la pandemia de la covid-19?  \n123  7. El protocolo de tesis:la ruta para una tesis exitosa  María Mercedes Castillo Uzcanga  Introducción  La  elaboración  de  propuestas  de  investigación  es  una  actividad  fundamental    y  cotidiana  en  el  quehacer  científico.  Todo  proyecto  de  investigación    comienza con una idea innovadora que se plantea y desarrolla a través de una   propuesta escrita. Este proceso conduce a la recolección y análisis de los datos,    para luego culminar con la preparación de una tesis o publicaciones científicas.    Esta  propuesta,  también  llamada  protocolo,  representa  la  estructura  del    proyecto, se formula antes de iniciar el estudio y sin ella es casi imposible llevar   a cabo una investigación de forma exitosa (Balakumar  et al ., 2013; Majid, 2017).  El  protocolo  de  investigación  es  un  documento  integral  que  generalmente     incluye aspectos científicos, éticos y normativos esenciales para la planeación y    desarrollo de un estudio (Rosenthal  et al ., 2014). Estos aspectos deben describirse   de forma precisa y clara, de manera que no queden dudas sobre el valor y la   factibilidad  del  proyecto  (Cameli   et  al ., 2018). Comúnmente las propuestas o  protocolos de investigación se elaboran para solicitar financiamiento y como    paso previo para el desarrollo de una tesis. \n124   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  La preparación del protocolo de investigación representa un paso crucial para   estudiantes que van a realizar una tesis. Ese instrumento permite que la persona   organice sus ideas en torno al tema a estudiar, la pregunta que va a investigar,   y su relevancia, ya que, de acuerdo a Turabian (2018), estos tres componentes   son básicos para informar sobre la investigación que estamos desarrollando. Así,   el protocolo es la ruta detallada que se debe seguir para culminar con éxito el   proyecto de investigación de una tesis.  Igualmente, el protocolo sirve de base para que miembros del comité tutelar y   otras personas que participan en la formación de la o el estudiante, comprendan   la  estructura  y  los  fundamentos  de  la  investigación  a  desarrollar  en  la  tesis.    Este  documento  detalla  el  razonamiento  detrás  de  las  preguntas  e  hipótesis,    así  como  las  estrategias  metodológicas  para  abordar  el  problema  a  estudiar.    El  protocolo  fomenta  un  espacio  de  diálogo  constructivo,  que  contribuye  a    mejorar  el  desarrollo  de  la  tesis  a  través  de  sugerencias  y  recomendaciones    valiosas.  Un  protocolo  bien  preparado  facilita  el  proceso  de  revisión,  y  ayuda    a generar comentarios precisos y asertivos que contribuirán a su aprobación y    financiamiento de ser el caso. También funciona como una carta de presentación    de  la  persona  tesista  ante  su  comité  asesor,  y  es  un  instrumento  para  mostrar    que  la  investigación  es  relevante  y  puede  llevarse  a  cabo  (Abdulai  y  Owusu-  Ansah, 2014). Para las personas que estudian un doctorado la aprobación del    protocolo es un hito significativo ya que demuestra avances en el dominio de    una serie de competencias como el análisis y síntesis de la literatura, la habilidad   para vincular hallazgos y conocimientos previos para sustentar las ideas que se   proponen  y  la  capacidad  para  desarrollar  una  metodología  para  abordar  la    investigación (Chatterjee-Padmanabhan y Nielsen, 2018).  El tiempo invertido en elaborar el protocolo es una inversión que contribuye al   desarrollo de la tesis. Cada paso tomado para preparar el protocolo, incluyendo   la  revisión  y  análisis  de  estudios  previos,  consultas  con  expertos,  puesta  en    práctica de métodos, visitas a sitios de estudio, entre otros, contribuirán a que la   tesis avance y se realice en tiempo y forma (Rout y Aldous, 2016).  El objetivo de este capítulo es orientar a estudiantes y docentes en la elaboración   del  protocolo,  describiendo  las  secciones  que  en  general  lo  integran  además    de  dar  algunas  recomendaciones  para  su  elaboración.  Se  asume  que  la    persona tesista ya ha seleccionado un tema que le interesa para emprender su   investigación, ha realizado lecturas y ha esbozado la pregunta de investigación. \n125  Partes del protocolo  El protocolo de tesis está constituido por diversas secciones, que en su conjunto   persiguen crear un plan detallado con la información necesaria para desarrollar    la investigación del proyecto de tesis (Leo, 2019). Es común que los nombres y    el orden de las secciones varíen entre instituciones, e incluso que su estructura    difiera entre unidades académicas de una misma institución, lo que refleja las    particularidades  de  cada  disciplina  o  área  del  conocimiento  al  momento  de    emprender  un  trabajo  de  investigación  (University  of  Sidney  Learning  Centre,    2001). Es importante que las personas estudiantes conozcan en detalle las normas   editoriales  para  elaborar  el  protocolo  de  su  institución,  incluyendo  detalles    de  formato,  secciones  a  desarrollar  y  expectativas  del  contenido.  También    es de utilidad conocer cómo la disciplina en la que se enmarca la investigación   aborda  la  elaboración  de  secciones  como  el  marco  teórico,  la  hipótesis  y  los    métodos, y cabe destacar que es fundamental en este proceso el apoyo de las   personas que dirigen o asesoran la tesis.  Es  esencial  que  a  medida  que  se  elabora  el  protocolo  se  preste  atención  no    solo al contenido relevante y pertinente, sino también al orden, la claridad de la   redacción, y a la coherencia entre las secciones del documento. Esto es clave   para lograr un documento de calidad que transmita la información necesaria   permitiendo que el protocolo cumpla su función de guía detallada y espacio de   discusión y retroalimentación constructiva.  A  continuación,  se  detallan  algunas  de  las  secciones  que  generalmente  se    incluyen en el protocolo de tesis:  Introducción.  Esta  sección  tiene  el  papel  fundamental  de  presentar  el  tema  de  tesis  y  el    problema  a  estudiar,  así  como  la  contribución  a  la  disciplina  o  campo  de    estudio de la investigación propuesta. La introducción coloca a la investigación   en un contexto a través de una breve revisión de la literatura, suministrando una   idea  general  del  tema  de  la  tesis  y  su  relevancia.  En  esta  sección  también  se    describe  el  problema  o  el  propósito  de  la  investigación,  indicando  qué  se  va    a estudiar, cómo se va a realizar, dónde y cuándo. La intención es delimitar la   investigación y simultáneamente ofrecer una dirección que guiará a personas   tesistas y evaluadoras a lo largo de la propuesta (Rout y Aldous, 2016).   7. EL PROTOCOLO DE TESIS: LA RUTA PARA UNA TESIS EXITOSA \n126   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  La introducción es una sección corta, de unas dos cuartillas, que busca resaltar el   tema de la tesis, identificar el problema o los aspectos que faltan por estudiar, los    sectores de la sociedad interesados o afectados y la importancia de su estudio.   Es fundamental diferenciar entre el problema y la pregunta de investigación. Por   ejemplo, el problema podría ser  La contaminación de los ecosistemas acuáticos   por la descarga de aguas residuales , mientras que la pregunta de investigación    ¿Cómo la descarga de aguas residuales afecta a la comunidad de peces en   arroyos urbanos?  La introducción puede ser decisiva cuando la propuesta se presenta para solicitar   financiamiento, ya que su contenido es probable que influya significativamente    en la decisión de aprobación. Dado que la introducción es una sección breve y   que funciona a manera de presentación, se recomienda escribirla una vez que   se cuente con una versión avanzada del protocolo. En algunas instituciones se    prefiere integrar la revisión de la literatura en la introducción, siguiendo el estilo   que se observa en las introducciones de los artículos científicos, lo que resulta en    una versión más sintetizada del marco teórico que describimos a continuación.   Marco teórico, antecedentes o revisión de literatura.  Esta sección es el basamento de la propuesta de tesis, ya que proporciona el   punto  de  partida  de  la  investigación  al  destacar  la  relevancia  del  problema    a  estudiar,  lo  que  se  ha  investigado  y  lo  que  falta  por  conocer,  conduciendo    así  de  manera  lógica  a  la  pregunta  de  investigación  (Annersten  y  Wredling,    2006; Rout y Aldous, 2016). En otras palabras, esta sección presenta el contexto   en  el  que  está  inmersa  la  tesis  y  cuando  está  bien  organizada  y  nutrida,  le    da  sustento  y  realce  a  la  propuesta.  Un  marco  teórico  bien  preparado,  que     refleje una búsqueda bibliográfica amplia e información sintetizada, analizada    y  organizada,  indica  mucho  del  manejo  que  tiene  la  persona  tesista  de  su    tema y lo que ha considerado para diseñar su investigación (Booth  et al ., 2012),  además de evidenciar la transformación experimentada en la forma de pensar   y  comunicar  el  proyecto  (Wisker,  2015).  El  marco  teórico  también  contiene    información valiosa para la interpretación de los resultados y la preparación de   publicaciones  futuras  como  la  tesis  y  los  artículos  derivados  de  ella  (Abdulai  y    Owusu-Ansah, 2014).  Ahora, ¿cómo preparar esta sección de antecedentes o marco teórico? Varios   aspectos deben tomarse en cuenta:  \n127  a.   El  hilo  conductor  de  esta  sección  es  el  tema  de  la  tesis:  Por  eso  quien    redacte debe tener presente el tema mientras elabora esta sección. Este   aspecto  es  clave  para  evitar  que  el  contenido  se  desvíe  y  se  incluyan    tópicos alejados del tema de tesis. En algunos casos esta sección puede   incluir  conceptos  que  juegan  un  papel  central  en  la  investigación  y     que  deben  quedar  definidos  desde  el  principio.  La  comprensión  de    estos  conceptos  es  clave  para  la  interpretación  futura  de  los  resultados.    Sin  embargo,  no  todo  el  material  consultado  o  conceptos  revisados  se    incluyen  en  el  marco  teórico.  Algunas  publicaciones  solo  serán    empleadas para conocer o aclarar conceptos básicos o para enriquecer   el conocimiento de la persona tesista, pero no necesariamente quedan   incluidas en el protocolo de tesis. b.   Debe  haber  síntesis  y  análisis  de  la  información:  El  marco  teórico  debe    ser  amplio  demostrando  que  la  persona  estudiante  está  familiarizada    con las  principales  tendencias de su tópico de tesis, pero a la vez debe    haber  síntesis,  indicando  que  entiende  el  significado  de  los  estudios    previos (Leo, 2019). Relacionar conceptos e ideas, además de presentar   una visión crítica de la información recolectada, son parte de las metas   esperadas  al  elaborar  el  marco  teórico,  aunque  también  representan    los principales retos (Chatterjee-Padmanabhan y Nielsen, 2018). Los primeros   borradores  del  marco  teórico  tienden  a  solo  describir  los  hallazgos  de    estudios previos, pero a medida que se avanza en la lectura y la síntesis,   se  logra  una  mayor  comprensión  del  tema  y  del  contexto  del  proyecto;     asimismo,  la  confianza  de  la  persona  estudiante  en  el  manejo  de  los    argumentos va aumentando, así como su progreso en la apropiación de su   trabajo. Por esto, la elaboración del marco teórico es un proceso iterativo,   con  cada  avance  y  conforme  se  comprende  mejor  el  tema,  se  revisa  y    actualiza lo escrito, alcanzando un análisis más profundo (Wisker, 2015).  c.   La  información  incluida  es  la  base  de  la  pregunta  de  investigación,    hipótesis  y  objetivos:  El  marco  teórico  debe  describir  y  analizar  estudios    previos  para  mostrar  evidencia  de  los  aspectos  que  ya  se  conocen  y     de las áreas que requieren de más estudio. La identificación de vacíos    de  información  o  áreas  del  tema  de  investigación  poco  estudiadas  es    una  de  las  metas  de  la  revisión  de  la  literatura  (Abdulai  y  Owusu-Ansah,    2014; Biccard y Rodseth, 2014). Para ello se requiere leer muchos artículos,    realizar anotaciones y hacer preguntas críticas para poder identificar qué    se conoce o no en el tópico seleccionado.   7. EL PROTOCOLO DE TESIS: LA RUTA PARA UNA TESIS EXITOSA \n128   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  El marco teórico debe basarse en una revisión profunda de estudios previos,   que proporcionarán los elementos necesarios para definir la pregunta de    investigación, las hipótesis o supuestos, los objetivos y el diseño de la tesis   (Aslam y Emmanuel, 2010; Turabian, 2018). Las preguntas de investigación   e hipótesis pueden incluir variables (factores, condiciones, procesos, entre   otros componentes) cuya función y relevancia deben quedar sustentadas   en  el  marco  teórico  (Reidl-Martínez,  2012),  de  manera  que,  al  leer  las    preguntas,  hipótesis  o  supuestos,  se  comprenda  claramente  por  qué  se    han planteado y por qué se esperan los resultados señalados. En ocasiones,   el  marco  teórico  es  muy  general,  y  cuando  se  llega  a  las  preguntas  e    hipótesis  aparecen  elementos  que  no  se  han  desarrollado  en  el  marco    teórico, lo que puede generar confusión sobre las bases de la pregunta.    Esto surge por lo común cuando no se logra una buena comprensión del   significado de los estudios previos y, por lo tanto, no se puede proveer de    contexto a la investigación propuesta (Leo, 2019). d.    La  organización  es  fundamental  en  el  marco  teórico:  La  forma  como  se   presenta  la  información  es  clave  para  transmitir  claramente  los  hallazgos    de la revisión de la literatura. Se suele recomendar organizar la información    de lo general a lo específico. Esto consiste en partir de un planteamiento   general que resalta la trascendencia del tema a estudiar y lo sitúa en un   contexto amplio. Luego se pueden mencionar los trabajos más específicos,    realizados a una escala más local o que están directamente relacionados   con el estudio que se va a realizar. Esta secuencia debe conducir de forma   natural a la pregunta de investigación y a la importancia de la tesis (Rout y    Aldous, 2016). También es común organizar esta sección siguiendo un orden    cronológico,  describiendo  los  avances  en  la  investigación  y  desarrollo  de    conceptos o cambios en los enfoques aplicados (Randolph, 2019).   La información debe estar organizada en párrafos interconectados para   lograr una lectura fluida y coherente. En algunos casos, el marco teórico    se  organiza  en  subsecciones  para  facilitar  su  lectura  y  comprensión.  Sin    embargo, estas subsecciones deben presentarse siguiendo una estructura    lógica, es decir, de lo general a lo específico. Entre las fallas que se han    observado al preparar esta sección se encuentran la falta de organización   y enfoque, la omisión de trabajos relevantes y recientes, y la ausencia de   un  análisis  crítico  de  los  estudios  previos  o  de  los  vacíos  de  información    (Booth  et al ., 2012; Leo, 2019). \n129  Pregunta, hipótesis o supuestos y objetivos.  La  pregunta  de  investigación  es  el  eje  central  del  protocolo  y  las  demás    secciones  giran  alrededor  de  ella.  Thabane   et  al .  (2009)  indican  que  el  éxito    de  la  investigación  radica  en  la  habilidad  para  traducir  el  problema  en  una    pregunta de investigación. Diversos autores resaltan que esta dicta la estructura,   enfoque, estrategia y métodos de la investigación, y por esto, si alguna sección   del  protocolo  debe  recibir  atención,  tiempo  y  esfuerzo,  es  la  formulación  de    dicha pregunta (Sackett y Wennberg, 1997; Bryman, 2007; Thabane  et al ., 2009;  Sánchez-Martín    et  al ., 2023). Una pregunta de investigación puede evaluarse   considerando si es factible, interesante, novedosa, ética y relevante (Cummins    et  al .,  2007).  Y  su  buen  planteamiento  no  solo  facilita  la  investigación,  sino    también evita la elección de un diseño inapropiado que podría comprometer la   publicación del trabajo (Thabane  et al ., 2009). En el protocolo, la pregunta debe    fluir naturalmente de lo planteado en el marco teórico y del análisis de los vacíos   de información. Indudablemente, el proceso de definición de la pregunta se    nutre de pláticas con personas mentoras y colegas (Aslam y Emmanuel, 2010).  Las  hipótesis  generalmente  se  emplean  en  investigaciones  cuantitativas  y  lo    propuesto en ellas debe estar sustentado en publicaciones, censos o encuestas    gubernamentales u otro tipo de fuentes de información confiable, presentadas    en  el  marco  teórico  (Turabian,  2018).  Las  hipótesis  incluyen  lo  esperado  si  cierta    condición  se  cumple.  En  algunos  casos,  son  breves,  planteadas  en  forma  de    oración. En otros casos van acompañadas de un texto o argumento para sustentar   y explicar su formulación. De presentarse varias preguntas de investigación, cada   una debe ir acompañada de una hipótesis (Rosenthal  et al ., 2014).   En algunas disciplinas, en lugar de hipótesis, se emplean supuestos preliminares,   que  se  definen  a  partir  de  la  literatura,  o  de  experiencias  profesionales  y    personales.  Estos  supuestos  guían  la  investigación,  contribuyen  a  estudiar  el    problema planteado y pueden llevar a formular hipótesis a lo largo del desarrollo   de la tesis o emerger a partir de los resultados del estudio (Edel Navarro, 2007).   Por  ejemplo,  en  la  investigación  cualitativa,  el  proceso  de  recolección  de    información  lleva  a  la  generación  de  hipótesis  más  que  a  ponerlas  a  prueba,     ya que no se definen al inicio de la investigación (Haven y Van Grootel, 2019).    En el desarrollo de este tipo de investigaciones, las hipótesis pueden surgir e irse    afinando conforme se avanza en la recolección de datos (Brady y Collier, 2010).  7. EL PROTOCOLO DE TESIS: LA RUTA PARA UNA TESIS EXITOSA \n130   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Los  objetivos  son  acciones  que  se  deben  realizar  para  contestar  la  pregunta    de investigación, y se les puede dividir en uno de carácter general y en varios    específicos.  La  pregunta,  las  hipótesis  y  los  objetivos  deben  estar  alineados    entre sí y las ideas planteadas en estos elementos deben estar sustentadas en el   marco teórico.  Los métodos.  Así  como  el  marco  teórico  es  la  base  del  protocolo,  podemos  decir  que  los    métodos son la vía para articularlo y ponerlo en acción. Los métodos deben estar   alineados con la pregunta de investigación (Mattick  et al ., 2018) y por lo tanto    con los objetivos de la tesis. Se escriben en tiempo futuro y con suficiente detalle,    para que se comprenda claramente cómo se va a responder la pregunta y se   alcanzarán los objetivos (Annersten y Wredling, 2006; Rout y Aldous, 2016).  En  esta  sección,  a  veces  también  llamada  materiales  y  métodos,  se  describe    el  diseño  de  la  investigación,  así  como  las  herramientas  metodológicas  que    se emplearán para recabar y analizar la información. El diseño de la investigación   es  una  estrategia  para  asegurar  que  la  información  necesaria  para  contestar    la pregunta de investigación será recabada y analizada de forma adecuada;    también  define  la  forma  en  que  se  probarán  las  hipótesis  o  se  ajustarán  los   supuestos de la investigación. Por esto, el diseño debe definirse antes de iniciar    la recolección de datos, para asegurar conclusiones sólidas y evitar pérdida de   esfuerzo y recursos.   El  diseño  juega  un  papel  mucho  más  amplio  que  los  métodos  de  recolecta  o    análisis  estadísticos  y  más  bien  se  relaciona  con  la  estructura  lógica  detrás  de     la investigación y con la definición de cuál es la información o evidencia que    se requiere para responder a la pregunta (De Vaus, 2001; Knight, 2010). Cuando   se  trabaja  con  un  enfoque  experimental,  el  término   diseño  experimental   se   emplea para describir la estructura del estudio, incluye las hipótesis estadísticas    adecuadas para probar las hipótesis científicas, las condiciones experimentales    y las variables que se van a medir, así como los análisis estadísticos a realizar (Kirk,   2012). Knight (2010) recomienda iniciar la sección de métodos con el diseño de   la investigación y terminar con los métodos de análisis de datos o estadísticos.  Una vez que se ha delineado el diseño que guiará la investigación, es necesario   describir los métodos para recolectar y analizar la información para el proyecto   (Annersten y Wredling, 2006). Los detalles sobre la recolección de los datos pueden  \n131  incluir la descripción del área u objeto de estudio y los instrumentos que se van a   emplear (cuestionarios, entrevistas, técnicas de muestreo y laboratorio, equipos   de  medición,  datos  históricos,  entre  otros).  Los  métodos  pueden  ir  apoyados    de referencias a la literatura, evitando así describir cada técnica paso a paso.   En  esta  sección  también  es  necesario  mencionar  si  se  requieren  permisos  de     recolecta de muestras o de acceso a comunidades o poblaciones específicas.    También se incluyen las técnicas estadísticas y los programas de computación   que  se  van  a  emplear,  siempre  indicando  el  propósito  de  su  aplicación  y  su    relación con el diseño. En la preparación de la sección de métodos, el uso de   subtítulos para nombrar los diferentes componentes de los métodos contribuye   mucho a su organización.  Para la preparación del diseño de la investigación y la selección de los métodos, la   revisión de la literatura es muy útil, para así identificar los enfoques y técnicas que    otras personas han empleado en trabajos ya publicados (Abdulai y Owusu-Ansah,    2014). Igualmente, esta sección se beneficia mucho de trabajo preliminar como    visitas de campo o prácticas de laboratorio y gabinete. Es importante considerar   aspectos logísticos de acceso a los sitios de trabajo, así como asuntos de seguridad   y salud. Todo esto contribuye a garantizar la viabilidad de la investigación.   En  protocolos  que  contemplan  más  de  una  pregunta  de  investigación,  el    documento  se  puede  organizar  colocando  cada  pregunta  con  su  hipótesis,     objetivos  y  métodos,  de  manera  que  queden  claramente  especificados  los    pasos a seguir para contestar cada pregunta.  Cronograma y presupuesto.  El  cronograma  describe  el  desarrollo  de  las  actividades  de  investigación  a    lo  largo  del  periodo  asignado  a  la  tesis.  En  algunos  casos  se  puede  organizar    de  forma  mensual  o  empleando  el  periodo  lectivo  de  la  institución  (trimestral,    cuatrimestral,  o  semestral).  Se  hace  una  lista  detallada  de  las  actividades  y    se  indica  en  qué  momento  se  van  a  desarrollar.  Los  tiempos  del  programa  de    posgrado  deben  considerarse  al  inicio  del  diseño  de  la  tesis  para  trabajar  en    metas razonables. Para elaborar el cronograma, se recomienda considerar las   fechas límite que establece el programa de posgrado para entregar productos,   y  así  contemplar  los  periodos  para  cada  actividad  de  la  propuesta.  Algunas    instituciones solicitan un presupuesto estimado para la investigación propuesta y   la fuente de estos recursos. El presupuesto puede ser empleado como indicador   de factibilidad del estudio (Fandino, 2019).  7. EL PROTOCOLO DE TESIS: LA RUTA PARA UNA TESIS EXITOSA \n132   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Referencias.  En esta sección, que también puede llamarse bibliografía, deben aparecer todas   las referencias empleadas en el protocolo usando el estilo de documentación   requerido  por  la  institución.  Igualmente,  todas  las  referencias  incluidas  en  este    apartado deben estar citadas en el texto. Para esto es de gran ayuda el uso de   gestores  de  bibliografía  (por  ej.,  Mendeley,  EndNote,  Zotero)  que  contribuyen    a engranar lo que se cita en el texto con lo que se incluye en la bibliografía. En    cualquier caso, es importante que cada referencia bibliográfica esté completa    y  no  le  falte  información.  Es  necesario  asegurarse  que  la  información  que  se    menciona  en  el  texto  realmente  sea  la  que  contiene  el  artículo  citado,  para    esto  es  clave  que  el  estudiante  haya  leído  los  artículos  que  se  mencionan  en    esta sección.  Otras secciones.  En algunas instituciones se incluye la justificación o significado del estudio como    una  sección  separada,  aunque  a  veces  estos  aspectos  pueden  colocarse  al     final del marco teórico. En la justificación se incluye la importancia del estudio, la    contribución para resolver una problemática o las consecuencias de no ampliar    el  conocimiento  en  la  línea  de  investigación  propuesta.  En  la  justificación    también se puede destacar lo novedoso de la investigación planteada y cómo   se  diferencia  de  trabajos  previos,  cómo  va  a  complementar  la  información    ya  existente  y  su  aplicación  en  el  área  de  conocimiento,  argumentos  que     son  generalmente  de  mucho  interés  para  las  fuentes  de  financiamiento    (Annersten y Wredling, 2006; Leo, 2019).   Otra sección que a veces se incluye es la factibilidad del estudio, es decir, qué   tan viable es desarrollar la investigación propuesta en el tiempo disponible (Rout   y  Aldous,  2016).  Experiencias  previas  o  preliminares  de  la  persona  estudiante    o  del  grupo  de  investigación  pueden  servir  como  sustento  para  esta  sección.    También se pueden colocar equipos, recursos humanos y otros elementos que   requiera el proyecto y que están disponibles para su desarrollo. La consideración   de los aspectos logísticos también puede incluirse en esta sección.   Algunos  protocolos  incluyen  una  sección  sobre  aspectos  éticos  donde  se    describen  las  condiciones  de  participación  de  miembros  de  una  comunidad,     riesgos y beneficios para las personas y el ambiente, manejo de organismos,    entre otras consideraciones (Rosenthal  et al ., 2014). En muchas instituciones las   propuestas son revisadas por un comité de ética antes de ser aprobadas. \n133  Recomendaciones prácticas ¿Cómo iniciar?  Al  iniciar  la  redacción  del  protocolo  se  materializan  por  escrito  las  ideas  o    pensamientos  que  hemos  ido  desarrollando  para  así  darles  forma  y  sentido    (Turabian,  2018),  de  manera  que  contemos  con  un  documento  sobre  el  cual    se  puedan  hacer  comentarios  y  recomendaciones.  Después  de  haber  leído     muchas referencias para definir el tema de la tesis y la pregunta de investigación,    probablemente es un buen momento para aventurarse con el primer borrador   del protocolo. Así, se pueden comenzar a esbozar el marco teórico, las hipótesis   y los métodos.  La  planeación  de  un  proyecto  de  tesis,  y  por  lo  tanto  del  protocolo,  no  es    un  proceso  lineal,  más  bien  es  un  proceso  que  involucra  revisiones  y  ajustes    (Turabian,  2018).  A  medida  que  se  van  construyendo  las  secciones,  se  van     identificando puntos que deben mejorarse, modificarse o eliminarse. Esto ocurre    con el apoyo del comité tutelar, y también es producto de la retroalimentación    personal, a medida que se continúa leyendo y profundizando en el tema de    investigación.   La forma y el fondo.  Un  documento  bien  organizado,  claramente  redactado  y  con  el  contenido    solicitado  contribuye  mucho  a  comunicar  las  ideas  a  quienes  revisan  el    documento.  Fallas  en  la  redacción,  la  ortografía  y  en  la  secuencia  de  la    información presentada, pueden distraer a quien esté revisando el documento,    dificultando  la  comprensión  del  contenido.  Se  ha  observado  que  el  uso  del   lenguaje  es  un  aspecto  importante  que  influye  sobre  la  evaluación  de  las    propuestas de investigación (Hong y Fong, 2012). Por ello se recomienda cuidar   la ortografía, el uso de las palabras y la redacción, organizar la información en   párrafos y llevar una secuencia o hilo conductor en la información presentada,   como si se estuviera narrando una historia.  A medida que se avanza en la elaboración del protocolo es necesario ir revisando   que  haya  congruencia  entre  las  secciones  del  documento.  La  pregunta  e    hipótesis deben estar sustentadas en el marco teórico y los métodos se deben   corresponder con las preguntas, hipótesis y objetivos planteados. Los términos o   conceptos deben emplearse de forma consistente a lo largo del documento.  7. EL PROTOCOLO DE TESIS: LA RUTA PARA UNA TESIS EXITOSA \n134   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Revisar protocolos de tesis previamente aprobados puede ayudar a comprender   mejor  el  tipo  de  documento  que  se  espera  y  el  contenido  de  cada  sección    (Leo, 2019). Se recomienda elaborar al inicio un esquema con las secciones que   se  solicitan  y  desarrollarlas  paulatinamente.  Este  documento  puede  contener    los  requerimientos  de  formato  como  tipo  y  tamaño  de  letra,  márgenes  e    interlineado, permitiendo así organizar el contenido, evaluar los avances y evitar   omitir secciones o aspectos importantes del documento.  El protocolo requiere tiempo y maduración.  Para  las  personas  que  se  inician  en  la  elaboración  del  protocolo  de  tesis,    el  proceso  puede  parecer  sencillo  para  luego  verse  abrumadas  con  todos    los  aspectos  que  hay  que  considerar  (Biccard  y  Rodseth,  2014).  Por  ello,  la    preparación del protocolo debe comenzarse con anticipación ya que recabar   y analizar la literatura y escribir las diferentes secciones son tareas que requieren   tiempo.  Sin  embargo,  a  veces  otras  actividades  del  programa  de  posgrado,    como las asignaturas, demandan tiempo de forma más inmediata y se tiende a ir   posponiendo la preparación del protocolo. Ante esto se recomienda establecer   hábitos de escritura continuos, tratar de trabajar todos los días en la propuesta,   buscando  información,  analizando  y  escribiendo  (Creswell,  2008).  Diversos     estudios revisados por Calle-Arango y Ávila Reyes (2023) indican que la escritura    continua y la entrega de avances de protocolo evitan dejar la preparación del    documento para el final y reducen la ansiedad asociada a la escritura. Fijarse    metas  pequeñas  y  avanzar  gradualmente,  tratando  de  escribir  con  la  mayor    frecuencia  posible  es  una  mejor  estrategia  que  escribir  bajo  presión,  cuando    se  acerca  la  fecha  límite,  ya  que  el  protocolo  requiere  un  análisis  profundo  y    la maduración de las ideas. Si sentimos que estamos bloqueados, se recomienda   dejar  por  un  tiempo  la  sección  que  estamos  trabajando  y  enfocarnos  en    otro aspecto del proyecto (Turabian, 2018). Lo importante es organizarnos para   ir  avanzando  paulatinamente  y  lograr  construir  un  protocolo  de  calidad  que     refleje el tiempo y esfuerzo que pusimos en su preparación.   Apoyo del comité tutelar y personas expertas en el tema.  Los comentarios de los miembros del comité tutelar pueden ayudar a mejorar el   documento en aspectos de fondo y de forma; en particular, si la información que   queremos  transmitir  está  llegando  a  la  persona  lectora  y  si  los  planteamientos    de  la  investigación  son  claros  y  congruentes.  La  revisión  temprana  por    parte de otras personas ayuda a detectar aspectos o secciones que requieren  \n135  más  atención,  y  ofrece  la  oportunidad  de  hacer  los  ajustes  y  cambios  para    mejorar  la  calidad  de  la  propuesta.  Consultar  con  expertos  en  el  tema  de    investigación, puede contribuir a determinar la factibilidad del estudio y mejorar   los  métodos,  además  de  construir  futuras  colaboraciones  (Biccard  y  Rodseth,     2014). Si queremos obtener comentarios detallados y útiles es buena idea solicitar    la retroalimentación con anticipación. Por otra parte, las personas que dirigen y   asesoran la tesis pueden hacer más efectivo su apoyo al suministrar comentarios   constructivos y precisos para que la persona estudiante pueda comprenderlos e   incorporarlos en la propuesta.  Para  quienes  estudian  un  doctorado,  la  aprobación  del  protocolo  representa    la  superación  de  un  umbral  que  demuestra  el  dominio  de  ciertas  habilidades     de  investigación.  Sin  embargo,  es  común  experimentar  una  sensación  de    estancamiento  antes  de  lograr  pasarlo  (Kiley,  2009;  Chatterjee-Padmanabhan    y  Nielsen,  2018),  por  lo  que  es  necesario  que  las  personas  supervisoras  estén    atentas a esta situación para implementar estrategias que faciliten el avance.   Por ejemplo, discusiones grupales con compañeras y compañeros, promover la   escritura para facilitar la comprensión de conceptos y ofrecer orientación en el    análisis de literatura científica son acciones que pueden ayudar a las personas    tesistas a continuar con sus objetivos (Kiley, 2015). También es importante como   estudiante buscar ayuda y dejarse aconsejar por los miembros del comité tutelar   cuando se experimentan estos bloqueos (Trafford y Leshem, 2009).  En algunas instituciones existen talleres y cursos de escritura que complementan   el  proceso  de  preparación  del  protocolo,  en  los  cuales,  al  practicar  el  dar  y    recibir  retroalimentación  de  sus  trabajos,  las  personas  participantes  mejoran  la     capacidad de revisión crítica y de escritura científica. Además, estos talleres   pueden aumentar la confianza en tareas como la escritura del marco teórico y    la comunicación del proyecto de tesis. Al mismo tiempo, pueden constituir una   comunidad de apoyo, que en su conjunto, contribuyen a disminuir el aislamiento   y  la  ansiedad  que  se  pueden  experimentar  durante  esta  etapa  (Chatterjee-  Padmanabhan  y  Nielsen,  2018;  Chatterjee-Padmanabhan   et  al .,  2019;  Calle-   Arango y Ávila Reyes, 2023; Ciampa y Wolfe, 2023).  Evitar el plagio.  En el proceso de revisión de la literatura es común tomar anotaciones, por lo    que es importante mantener un registro detallado de las fuentes de estas notas,   si son copia textual de la fuente original o si fueron parafraseadas por la persona   7. EL PROTOCOLO DE TESIS: LA RUTA PARA UNA TESIS EXITOSA \n136   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  que escribe. Esto es clave para evitar caer de forma inadvertida en plagio, ya   que es factible olvidar las fuentes de estas anotaciones a lo largo de la escritura   del  protocolo.  Se  debe  tener  presente  que  para  evitar  esta  falta  siempre  se    debe parafrasear y siempre citar la fuente empleada. En ninguna circunstancia,   la  copia  textual  de  texto  u  otro  material  es  una  solución  a  la  presión  que    experimentan las personas estudiantes al preparar el protocolo, ya que puede   traer consecuencias graves para su vida académica. Si hay dudas sobre qué es   plagio, se recomienda consultar con asesoras y asesores.  En  conclusión,  elaborar  un  protocolo  de  tesis  es  probablemente  la  primera    incursión  que  tiene  la  persona  estudiante  en  el  desarrollo  de  un  proyecto  de    investigación desde el inicio. De aquí se obtendrán conocimientos y experiencias   que  podrán  ser  aplicados  en  el  desarrollo  de  futuros  proyectos.  Por  lo  tanto,    es  fundamental  aprovechar  la  oportunidad  para  obtener  capacidades  que    faciliten  este  proceso  desde  la  revisión  y  manejo  de  la  literatura,  pasando  por     la definición de la pregunta y la elaboración del diseño y la selección de los    métodos. Sentar las bases para crear hábitos sanos de escritura es imprescindible   para que el proceso de preparación de una propuesta sea efectivo y exitoso.   Así,  además  de  producir  un  documento,  la  preparación  del  protocolo  implica    una transformación de la persona a medida que se adquieren competencias y   conocimientos.  La preparación de un buen protocolo de tesis con una búsqueda de literatura   amplia,  preguntas  claras  y  relevantes,  con  hipótesis  y  supuestos  que  guíen  el    proceso  y  métodos  pertinentes  son  cruciales  para  desarrollar  un  proyecto.    Este  proceso  requiere  de  tiempo  para  recabar  información,  madurar  ideas  e    integrar  el  documento,  además  del  apoyo  y  orientación  del  comité  tutelar.    En  resumen,  lograr  un  protocolo  de  calidad  es  una  gran  satisfacción  para    estudiantes y quienes asesoran, ya que demuestra que se ha logrado trazar la   ruta para que la tesis se desarrolle con éxito.  Referencias  Abdulai, R. T., y Owusu-Ansah, A. (2014). Essential ingredients of a good research  proposal for undergraduate and postgraduate students in the social sciences.   SAGE Open, 4 (3), 1-15. https://doi.org/10.1177/2158244014548178 \n137  Annersten,  M.,  y  Wredling,  R.  (2006).  How  to  write  a  research  proposal?    International Diabetes Nursing, 3 (2), 102-105. https://doi.org/10.1002/edn.52  Aslam,  S.,  y  Emmanuel,  P.  (2010).  Formulating  a  researchable  question:  A   critical  step  for  facilitating  good  clinical  research.   Indian  Journal  of  Sexually   Transmitted  Diseases,  and  AIDS,  3 1(1),  47-50.  https://doi.org/10.4103/0253-  7184.69003   Balakumar,  P.,  Inamdar,  M.  N.,  y  Jagadeesh,  G.  (2013).  The  critical  steps  for  successful  research:  The  research  proposal  and  scientific  writing.    Journal  of  Pharmacology  and  Pharmacotherapeutics,  4 (2),  130-138.  https://doi.  org/10.4103/0976-500X.110895   Biccard  ,B.  M.,  y  Rodseth,  R.  N.  (2014).  Taking  an  idea  to  a  research  protocol.    Southern African Journal of Anaesthesia and Analgesia, 20 (1), 14-18. https://   doi.org/10.1080/22201173.2014.10844558   Booth,  A.,  Sutton,  A.,  y  Papaioannpu,  D.  (2012).   Systematic  approaches  to  a   successful literature review . Los Ángeles: Sage. Brady, H., y Collier, D. (eds.). (2010).  Rethinking social inquiry: Diverse tools, shared  standards . Lanham: Rowman & Littlefield.  Bryman,  A.  (2007).  The  research  question  in  social  research:  What  is  its  role?    International Journal of Social Research Methodology, 10 (1), 5-20. https://doi.   org/10.1080/13645570600655282  Calle-Ar
