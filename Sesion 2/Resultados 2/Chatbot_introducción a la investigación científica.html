  si  existen  diversos  recursos  o    espacios virtuales que la contienen, si la web e internet, así como democratizan   el acceso a la información, propician la generación de información falsa o de   dudosa calidad?  En  este  entorno  de  abrumadora  explosión  de  la  información,  la  biblioteca,    como  espacio  para  consultar  fuentes,  continúa  siendo  imprescindible  en  las    comunidades  universitarias  o  de  centros  de  investigación,  pues  además  de    gestionar, organizar y ofrecer lo presupuestalmente posible —libros, tesis, revistas   y  otros  materiales—,  están  interviniendo  en  la  formación  de  personas  lectoras     autosuficientes en la gestión de su propia información.  En  este  sentido,  tras  la  experiencia  de  más  de  12  años  con  los  programas    Formación de Usuarios y Competencias Informativas del Sistema de Información   Bibliotecario  de  ECOSUR,  el  propósito  de  este  capítulo  es  compartir  los  temas    que  todo  estudiante  universitario  y  de  posgrado  debe  conocer  acerca  de     buscar, seleccionar, y organizar y usar información científica, etapas inherentes    al proceso de investigación.  La información en el contexto de la comunicación de la ciencia  Los  nuevos  hallazgos,  revisiones  teóricas  y  metodológicas  o  propuestas  de     innovación se comunican principalmente a través revistas científicas, actas de    congresos,  libros  o  monografías,  reportes  de  investigación,  patentes  y  tesis  de    posgrado (Das, 2015), en formatos electrónicos, principalmente.  Hay  una  exponencial  producción  y  especialización  de  las  publicaciones    académicas,  muy  acorde  con  el  crecimiento,  a  partir  de  la  segunda  mitad     del siglo XX, del gremio científico-académico en el mundo (Das, 2015), y de la   diversificación de líneas de investigación por la multi, trans e interdisciplinariedad.   1   Una  búsqueda  por  año  realizada  en  2020  en  la  base  de  datos  referencial  Web  of   Science, dio como resultado más de tres millones de registros, principalmente de artículos   científicos, entre otros tipos de documentos de comunicación científica.  \n145  Estos  grandes  cambios,  así  como  el  impacto  y  potencialidades  de  la  internet    en los procesos de formación del conocimiento y su difusión (Cope y Kalantzis,   2009), exigen la atención de actores involucrados alrededor de la información    científica:  autores,  lectores,  editores,  revisores,  divulgadores,  financiadores,    bibliotecarios,  comunicadores,  asociaciones,  universidades,  centros  de     investigación, en cuanto a sostener la calidad y rigor científico de la publicación   de resultados en beneficio de la humanidad.  Búsqueda de información de calidad  Buscar  información  en  internet  es  sumamente  sencillo,  con  una  sola  palabra    y  un  clic  reunimos  una  enorme  cantidad  de  entradas  a  diversos  textos.  Sin     embargo, si esta búsqueda se realiza con fines académicos y científicos, esto    es,  con  la  naturaleza  de  investigación  documental,  se  rige  y  se  lleva  a  cabo    con metodología, criterios, sentido crítico y habilidad técnica en el trato de los    documentos. Es decir, será necesario definir qué buscar, dónde y cómo localizar   la información específica (Argudo y Pons, 2012).  Configurando qué información buscar  En  cada  momento  del  proceso  de  investigación  se  requiere  de  literatura    particular y específica; no se consultan las mismas fuentes cuando se empieza    a  formular  el  protocolo  de  tesis  que  cuando  se  está  a  punto  de  defenderla  o     publicarla en algún medio. Entonces, antes de recopilar información, se debe   definir qué buscar, planteándose el objetivo y finalidad de esta indagación.   En primer lugar, es necesario definir los siguientes elementos:  •   Tema o asunto principal.  •   Temas relacionados.  •   Disciplinas que abarcan el tema.  •   Nivel de profundidad que se requiere de los documentos.  •   Tipo de documento en el que se encontrará lo deseado (libro, periódico,   mapa, revista). •   Periodo (actual o retrospectivo).  •   Área geográfica.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n146   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En  segundo  lugar,  problematizar  la  necesidad  de  información  formulando    preguntas  acerca  del  tema  de  estudio,  cuyas  respuestas  arrojen  términos  o     palabras clave acordes a la necesidad específica.  Figura 8.1. Problematización de una necesidad de información.  Claro que este mecanismo de delimitación debe ser ordenado, y para ello se    recomienda su representación gráfica. Puede emplearse un mapa mental en el    que se coloquen los datos en torno al tema de investigación, como se sugiere    en la figura 8.2. \n147  Figura 8.2. Mapa mental organizando datos del tema de investigación.  Las  palabras  con  las  cuales  se  define  el  tema  de  estudio  pueden  ser  más   precisas  si  se  utilizan  tesauros,  esto  es,  la  lista  de  términos  especializados  que    se emplea en los catálogos de bibliotecas, bases de datos de revistas y libros,   repositorios  institucionales  o  cualquier  metabuscador.  Los  hay  especializados    como el tesauro de la OIT,  el tesauro y glosario de la National Agricultural Library   (NAL), el tesauro del Education Resources Information Center (ERIC) o el tesauro   de género publicado por el Instituto Nacional de las Mujeres, o multidisciplinarios   como el UNESCO thesaurus.   En  las  figuras  8.3  y  8.4  podemos  ver  la  búsqueda  de  los  términos  “maíz”  y   “producción orgánica”. Cada resultado amplía y precisa el campo semántico   de términos relacionados que podemos usar en la búsqueda de información.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n148   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.3. Despliegue del término “maíz” en el tesauro de la National Agricultural   Library. \n149  Figura 8.4. Despliegue del término “producción orgánica” en el tesauro de la National   Agricultural Library.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n150   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Identificando fuentes y recursos informativos  Tener  claro  cuáles  son  los  términos  precisos  acerca  del  tema  de  interés  es  un    punto de partida para determinar también dónde buscar. No se encuentran las   mismas respuestas en una revista de divulgación que en un libro especializado o    en un artículo científico.  Para  conocer  nuevas  ideas,  reportes  de  hallazgos,  opiniones  de  expertos,    monografías  de  temas  relevantes  y  análisis  de  datos  se  debe  recurrir  a  las    fuentes  primarias,  esto  es,  a  los  documentos  considerados  originales.  Los    aportes  que  hay  en  ellos  provienen  directamente  de  sus  autores.  Este  tipo     de fuentes primarias comúnmente utilizadas en la investigación científica son    manuales,  libros  especializados,  obras  colectivas,  publicaciones  de  congresos,    artículos  de  revistas,  tesis,  normas  técnicas,  textos  legales,  informes  técnicos  y    documentos de patentes (Martínez, 2016).  De  las  fuentes  primarias  derivan  las  secundarias,  documentos  que  surgen  del    análisis  y  procesamiento  que  otras  personas  trabajan  para  acercar  aquellas     fuentes primigenias a los lectores. Esta es la finalidad de las bibliografías, reseñas   de libros, índices de resúmenes o de citas, catálogos de bibliotecas, bases de    datos, etcétera.  Cada  tipo  de  fuentes  es  claramente  distinto,  sobre  todo  cuando  se  tiene  en    mano la obra y se hojean las páginas, pero en el ambiente electrónico cabe la   posibilidad  de  confundirlas,  por  ello  es  indispensable  reconocer  los  elementos    que las describen. \n151  Figura 8.5. Elementos para distinguir un capítulo electrónico.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n152   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.6. Elementos para distinguir un artículo científico electrónico.  También es necesario conocer y distinguir los recursos electrónicos que permiten   recuperar las fuentes, a saber: catálogos, repositorios institucionales o bases de   datos, que funcionan por medio un lenguaje lógico. \n153  Figura 8.7. Tipos de sistemas de recuperación de documentos.  Técnicas de búsqueda en recursos de información  Una vez definido con precisión el tema y seleccionado las fuentes y recursos   más  idóneos  para  investigarlo  se  está  en  condiciones  para  la  exploración    en  catálogos,  bases  de  datos,  repositorios  institucionales  u  otros  sistemas  de    información.  Todos  ellos  funcionan  de  manera  similar  mediante  motores  de     búsqueda, y su aprovechamiento se vuelve más efectivo en tanto se conozca   cómo operan, es decir, qué opciones ofrecen para delimitar las búsquedas, de    modo que los resultados cada vez sean más precisos a lo deseado.  En  términos  generales,  en  los  sistemas  de  información  siempre  aparecerá  una    celda de “Búsqueda” y es en ella que deben anotar una o más palabras o    términos para lanzar la solicitud. Con un simple  clic  llegarán a nuestra vista  un    número considerable de referencias. Esto es una búsqueda simple o general. Sin    embargo, lo que se desea es precisión, por tanto, se recomienda utilizar la ruta    “Búsqueda avanzada” y opciones de “refinamiento”. Esta ruta varía en cada    sistema;  sin  embargo,  generalmente  abre  más  de  una  celda  para  que  quien     busca introduzca palabras clave o nombres, afinando su búsqueda en alguno   de los diferentes tipos de “Campos”.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n154   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.8. Aplicación de búsqueda por campos.  Figura 8.9. Campos en el documento. \n155  Figura 8.10. Operadores booleanos. La aplicación de estos campos se combina con los  operadores booleanos . Se   trata de nexos lógicos que, intercalados entre palabras clave, funcionan como    instrucciones para que el sistema de búsqueda precise, amplíe o restrinja los   resultados. Usar ambas opciones de refinamiento se vuelve una habilidad de    interacción con los sistemas hasta lograr resultados buenos y selectivos.   Otros signos frecuentes que ayudan a delimitar las búsquedas son el asterisco, la   interrogación, paréntesis y comillas, como lo muestra la figura 8.11.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n156   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.11. Signos de delimitación de búsquedas.  En conclusión, las búsquedas se formulan con base en la siguiente combinación: a) Definiendo los términos o palabras clave que utilizaremos para buscar:  temáticos, geográficos, onomásticos, año, disciplina. b) Usando los campos de búsqueda, operadores booleanos y signos para  delimitar,  además  de  otras  opciones  de  refinamiento  que  ofrecen  los   sistemas de búsqueda.   Cada  sistema  tiene  variantes,  pero  la  práctica  desarrolla  las  habilidades  de     búsqueda, proveyendo en cada ocasión mejores resultados. \n157  Selección y organización de la información  Una vez probada la eficacia de planificar búsquedas y conocer cómo funcionan   los recursos electrónicos, según lo visto en el apartado anterior, seguramente se    logrará  reunir  una  bibliografía  selecta  por  su  pertinencia  respecto  al  tema  de    interés.   Esta selección seguirá moviéndose a lo largo de la investigación o estudio, pues   las fuentes consultadas proveen de nuevas rutas a través de la literatura citada,   o bien se recibirán recomendaciones de expertos o colegas, y habrá que seguir   el ritual de seleccionar y organizar los recursos de información.   Elementos de calidad de las publicaciones académicas  Cuando  se  les  ha  preguntado  a  estudiantes  universitarios  y  de  posgrado  qué    aspectos  toman  en  cuenta  para  determinar  la  calidad  de  las  publicaciones    que  consultan,  las  respuestas  frecuentes  han  sido:  los  autores  (cuando  son    personas conocidas), el contenido (cuando el tema es pertinente), el título de   la revista (porque es conocida y muy consultada); además de que hay quienes   mencionan la actualidad de la bibliografía utilizada para el caso de las revistas    científicas,  y  si  están  indexadas  en  algún  sistema  de  evaluación.  Todos  son    buenos puntos para valorar la calidad, pero vamos a ampliar esta explicación   con  tres  criterios:  autoría,  organización  editorial  y  contenido  (Argudo  y  Pons,    2012; Davis  et al ., 2012). Respecto al criterio de autoría, se trata de la responsabilidad que directamente   tienen las personas que escriben y del organismo que respalda la publicación.    Consideremos que muchos autores aún no reconocidos son científicos jóvenes o    estudiantes de posgrado. Ante ello funge como respaldo la editorial representada   por  una  institución  académica  como  la  Universidad  Nacional  Autónoma  de    México,  las  universidades  de  Oxford  o  Cambridge,  en  Inglaterra,  o  alguna     sociedad científica como la Royal Society que publica la revista  Philosophical  Transactions  (que se edita desde el siglo XVII).  En ese orden, es conveniente observar quiénes integran los comités editoriales,   ya que son el primer filtro para captar e integrar los contenidos. Es parte de    la  postura  ética  de  la  editorial  que  declare  quiénes  son  las  personas  autoras    8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n158   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  y  las  que  dictaminan  el  contenido,  sobre  todo  su  competencia  en  el  tema,    información que al lector le puede ofrecer certeza.  Figura 8.12. Autoría de una revista científica. \n159  Figura 8.13. Autoría de un libro monográfico.  Las páginas web también ofrecen información o datos de utilidad en procesos   de investigación. Para usarlos con seguridad se debe corroborar la autoridad de   la institución u organismo en el tema, como es el caso del Instituto Nacional de   Estadística,  Geografía  e  Informática  (INEGI),  fuente  de  información  estadística     y geográfica en México, o la Food and Agriculture Organization of the United    Nations  (FAO,  por  sus  siglas  en  inglés)  organismo  internacional  especializado    en  alimentación  y  agricultura.  Que  una  página  web  esté  disponible  no  quiere     decir que sea real y fiable; cuando ella es oficial presenta información precisa    acerca de la organización: directorio, objetivos, resultados, etc. En tal sentido, la    extensión del dominio es clave para la confiabilidad de las páginas web: .edu,    .gob, .org, o el de las universidades.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n160   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.14. Autoría de páginas web. La organización editorial abarca al grupo humano y los medios de producción   que hacen posible el proceso editorial bajo criterios y estándares internacionales   de calidad.2 Una etapa del proceso editorial para ofrecer certeza y calidad es la revisión por   pares,  es  decir,  la  evaluación  del  contenido  por  parte  de  personas  de  amplio    2  Se  puede  consultar  el  sitio  del  COPE  (Committee  on  Publication  Ethics),  para  conocer   todo sobre la cultura ética en el ámbito editorial, https://publicationethics.org/ \n161  reconocimiento  y  trayectoria  en  la  misma  disciplina;  ellos  son  quienes  revisan    y comentan el contenido con fines de mejora y de garantizar a los lectores su    veracidad. 3   Otros  aspectos  importantes  de  tipo  editorial  son  los  relacionados   con  el  cumplimiento  de  políticas  de  derechos  de  autor,  acceso  abierto,    interoperabilidad,  accesibilidad,  etcétera.  En  suma,  la  organización  editorial     hace posible que la literatura científica sea fácilmente leída y consultable, y en    la actual era digital, manejable en diferentes formatos electrónicos.  3   Véase  un  ejemplo  de  infografía  acerca  de  la  revisión  por  pares  practicada  por  la   editorial  Taylor  &  Francis  en  https://authorservices.taylorandfrancis.com/wp-content/  uploads/2019/09/Understanding-peer-review.pdf. Se recomienda consultar en la página   de cualquier editorial la sección de servicios a los autores.  Figura 8.15. Estructura de contenido de artículo científico.  Referente  al  contenido,  nadie  mejor  para  valorar  su  calidad  que  la  persona    interesada  en  el  tema  del  documento,  lo  que  puede  hacer  en  función  de  los     elementos que lo componen. Desde la postura de quien busca rigor científico,    se  encuentran  la  forma  de  realizar  la  citación  y  las  fuentes  consultadas,  la    8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n162   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  presentación de tablas e imágenes, los datos organizados y analizados; mientras   que para el caso de artículos científicos, la presentación de resultados bajo la    estructura IMRD (introducción, materiales y métodos, resultados y discusión).  El contenido es la esencia de todo documento. Al valorarlo, se toma en cuenta   el tipo de documento y auditorio al que se dirige, y se observa el alcance o la    perspectiva desde donde se habla. La lectura y reflexión continua de literatura    académica desarrolla el criterio para reconocer la calidad de los contenidos.   Revistas depredadoras  Este  tema  merece  todas  las  señales  de  alerta  al  momento  de  seleccionar  las    fuentes, principalmente en cuanto a revistas científicas ( journals ),  ya  que  son    el  canal  preponderante  para  comunicar  resultados  de  investigación  (Das,    2015), aparte de ser un indicador para evaluar la producción académica y la   repercusión en círculos especializados en el mundo.  Además  de  este  rasgo,  está  como  antecedente  el  movimiento  de  acceso    abierto  (Suber,  2006;  Suber,  2015),  del  cual  derivó  la  creciente  publicación  de     revistas científicas bajo esa modalidad, con el propósito de hacer asequibles    los  contenidos  a  lectores,  libres  de  restricciones  de  pago  y  uso.  Cumplen,  en    términos generales, con la expectativa que autoras y autores desean: que sus   aportaciones  sean  leídas  y  sirvan  para  avanzar  en  las  disciplinas  y  solución  de    problemas de la humanidad.  Por  la  necesidad  de  publicar  en  acceso  abierto  y  hacerlo  en  tiempos  cortos    surgen  propuestas  de  editoriales  de  dudosa  calidad.  Se  ha  registrado  esta    conducta (Arévalo, 2019; Abejón Peña  et al ., 2020) en las editoriales denominadas   depredadores o espurias,4 de las que destacamos algunos comportamientos: 4  Término  que  por  primera  vez  utilizó  Jeffrey  Bell  (2012,  2016),  un  bibliotecario  de  la   Universidad  de  Colorado,  quien  detectó  el  comportamiento  de  revistas  que,  bajo    la  bandera  de  publicación  en  acceso  abierto,  aprovechan  la  necesidad  de  autores     por publicar y usan su trabajo con fines de lucro, sin estrictas medidas de calidad en sus    procesos editoriales.  \n163  •   Solicitan  de  manera  insistente  y  por  correo  electrónico  el  envío  de    manuscritos para su publicación. •   Crean páginas web con información falsa.  •   Afirman la revisión por pares, pero en la práctica este procedimiento lo    realizan sin rigor. •   Afirman pertenecer a algún sistema de evaluación (indexación), pero es    falso, incluso ofrecen un factor de impacto inexistente. Para evitar el uso de este tipo de documentos,5 hay que corroborar si la revista   pertenece a algún sistema de evaluación, esto es, si se encuentra en algún    índice de calidad o de impacto.  Índices de revistas científicas: de calidad e impacto  Cuando una publicación está incluida en algún índice significa que cumple con   criterios y normas de calidad. Entonces, toda revista debe estar calificada no    por uno sino por varios índices.  Hay dos tipos de índices, según sea el propósito: de calidad y de impacto. Los   índices  de  calidad  incluyen  revistas  con  características  normalizadas  acerca    del proceso editorial, equipo humano y medios para la publicación.6 Podemos   encontrar en la web miles de revistas, pero no todas están certificadas como    revistas  de  calidad,  para  llegar  a  estas  es  necesario  consultar  los  índices.  Su     finalidad es hacer visible y recuperable la literatura de calidad.  5 Varias actividades más sobre este comportamiento antiético en la publicación se vienen   comunicando en la literatura científica, basta con realizar una búsqueda con “predatory   publishers” o “predatory journals” en la revista  Nature  (Nature.com) o en la de la editorial  Springer (link.springer.com) para conocer esta problemática.6  Para  conocer  criterios  utilizados  por  los  sistemas  de  evaluación,  puede  consultarse,  a   manera  de  ejemplo,  los  empleados  por  Latindex  en  https://www.latindex.org/latindex/   meto2, son 38 criterios que se han venido incrementando, recientemente se agregaron    algunos relativos a la publicación en línea.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n164   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.16. Índices de calidad más representativos.  Para conocer la repercusión de una revista o su relativa importancia en su área   o campo disciplinario mediante el número de citas recibidas de cada artículo    ( paper ) que publica, el más utilizado y mundialmente conocido es el factor de   impacto7 que genera el sistema Journal Citation Reports.8 7  Creado en 1960 por el Institute for Scientific Information, su consulta está restringida a   suscriptores.8  Este  sistema  pertenece a  la  compañía  Clarivate,  antes  fue  de  Thomson. Sin  embargo,   se ubica dentro del grupo de servicios de información de la plataforma Web of Science. \n165  Como generalmente las búsquedas recurren a un metabuscador y obtienen   varios resultados, se recomienda verificar la fuente del documento científico en    los índices mencionados. También se puede —cuando se inicia la exploración   de  documentos  al  inicio  de  la  investigación  y  formulación  de  protocolo—    consultar  en  los  índices  Web  of  Science,  Scopus,  DOAJ  o  bases  de  datos  de    revistas suscritas o en acceso abierto sugeridas por la biblioteca.  Organizar la información  El  proceso  de  búsqueda,  localización  y  selección  de  información  implica  la   acción paralela y continua de diseñar una base de datos o biblioteca personal   para  compilar  y  organizar  las  referencias  y  documentos,  a  partir  de  los  temas    y etapas del proyecto de investigación. La organización de palabras clave en   una estructura como mapa mental puede servir para este cometido.   Las  TIC  han  caminado  hacia  el  propósito  de  facilitar  las  tareas.  Actualmente    existen gestores bibliográficos, como Mendeley, Zotero, CiteUlike o EndNote, que    cumplen  esa  función  organizadora.  Algunos  de  ellos  se  instalan  en  cualquier    dispositivo  (computadora  de  escritorio,  tableta,  celular)  sincronizando  la    información en todos ellos a través de la nube. Podemos agregar manualmente   las referencias o descargarlas desde otras plataformas, añadir los documentos   digitales y organizarlos en carpetas. Otras opciones que ofrecen son: i) visualizar   los documentos, ii) agregar notas en los textos y en las referencias, iii) subrayar   partes importantes, iv) anexar documentos relacionados con cada referencia,   como fotografías, estadísticas, reseñas, presentaciones, etcétera.  Figura 8.17. Fórmula para calcular factor de impacto.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n166   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En  general  los  gestores  de  bibliografías  tienen  incorporado  un  buscador  y  la    posibilidad de agregar etiquetas personales para localizar la información dentro   de  nuestra  biblioteca.  Algunos  cumplen  la  función  de  red  social  académica,    de tal manera que se pueden crear grupos de trabajo y compartir información,    permiten hacer búsquedas en bases de datos relacionadas, completar o corregir    los datos al buscar nuestras referencias en otros sitios, y algo muy novedoso, dan   visibilidad y evidencian el impacto de la investigación.  Estos  gestores  cuentan  con  un  complemento  que  se  incorpora  en  nuestro    procesador de textos y se enlaza con el gestor para insertar y editar referencias y   bibliografía en diferentes estilos de citación. Es una maravilla tecnológica que nos   resuelve y nos ahorra tiempo y esfuerzo en nuestras actividades de investigación   y escritura académica. Sin embargo, debemos conocer y no olvidar las reglas   de  la  documentación  ya  que  estas  herramientas  no  son  perfectas,  siempre    es  necesario  revisar  y  asegurarnos  de  que  los  datos  sean  correctos  y  estén    completos. Por ello en el siguiente apartado te hablaremos del uso ético de la   información y las técnicas documentales.  Uso ético de la información. Cómo evitar el plagio  El plagio es una de las conductas inapropiadas en la investigación científica.    La  mayoría  de  las  veces  sucede  por  descuido  o  desconocimiento  de  cómo    citar los distintos tipos de fuentes. Sin embargo, es intencional cuando se alteran    las  fuentes  para  no  ser  localizadas,  se  modifican  los  textos  con    softwares   o   manualmente para no ser detectados por programas antiplagio9 o se recurre a   la falsificación o apropiación de una obra (Turnitin, 2020). Un caso conocido en    México está documentado en la revista  Nexos  por Opazo y Zunino (2015). Podemos  remediar  el  desconocimiento  o  descuido  con  el  repaso  de  reglas  y     técnicas documentales de citación, y, sobre todo, comprender el significado de   9  Hoy  en  día  la  mayoría  de  las  editoriales  e  instituciones  académicas  utilizan  estos   programas  para  combatir  el  plagio.  Es  recomendable  que  los  estudiantes  también  los    aprovechen para cerciorarse de que han hecho las citas y referencias de manera óptima   y corregir, en caso necesario, antes de entregarlos a revisión. \n167  los derechos de autor, ya que todos, en algún momento, publicaremos nuestros   aportes y por lógica desearemos ser reconocidos por otras personas.  Los derechos morales de los autores  Existe un marco de protección para los autores. A nivel internacional, lo promueve   la  Organización  Mundial  de  la  Propiedad  Intelectual  (OMPI),  y,  en  el  contexto     mexicano, la Ley Federal de Derechos de Autor (2020), en cuyo artículo 11 refiere   “...protección para que el autor goce de prerrogativas y privilegios exclusivos de    carácter personal y patrimonial. Los primeros integran el llamado derecho moral    [no se puede renunciar a ellos ni son transferibles] y, los segundos, el patrimonial   [pueden ser transferidos o negociados, obteniendo beneficios económicos].”    Es el derecho moral al que aludimos en el momento en que citamos partes de   una  obra  y  reconocemos  su  autoría  escribiendo  correctamente  la  referencia     bibliográfica. Con estas buenas prácticas respetamos el derecho de paternidad    del  autor,  que  consiste  en  la  posibilidad  de  exigir  que  aparezca  su  nombre    cuando  se  utilice  su  obra,  y  el  derecho  de  integridad,  que  le  permite  impedir    cualquier deformación o mutilación (Cámara de Diputados, 2020, Artículo 21).  Toda editorial de calidad cumple su compromiso ético al emitir sus políticas con   respecto  a  los  derechos  de  autor,  y  dictan  los  criterios  particulares  de  cómo     hacerlos valer, es decir, cómo citar y elaborar las referencias bibliográficas. Así    también,  las  sanciones  en  el  caso  de  detectar  plagio,  como  lo  expresan  las     normas editoriales de, por ejemplo, El Colegio de la Frontera Sur (2019): “La copia   textual de cualquier párrafo, figura, cuadro, entre otros, que no sean citados,    será considerada como plagio. Al ser ésta una falta ética grave, amerita la baja    definitiva...”   En el caso de las publicaciones en acceso abierto, los autores otorgan licencias   para el uso de obra mediante las licencias Creative Commons, entre las cuales,   obligadamente está en primer lugar reconocer siempre la autoría.  El uso riguroso de las técnicas documentales  La frase “Si he visto más lejos, es poniéndome sobre los hombros de Gigantes”,   atribuida a Newton, significa que, para desarrollar un trabajo de investigación   8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n168   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  y  contribuir  en  la  solución  de  la  problemática  de  nuestro  interés,  necesitamos    apoyarnos en lo que han dicho otros autores. A esto le llamamos “construcción    colaborativa de conocimiento nuevo” (Sánchez Upegui, 2011).  Es importante retomar y documentar lo que estos gigantes han dicho incrustando   y articulando las citas de manera coherente y no simplemente superponiendo   textos. El requisito de un buen texto es cumplir con la intertextualidad, es decir,   lograr que nuestro texto se pueda interpretar a la luz de otros, de manera lógica    (Angulo Marcial, 2013).  Tengamos  en  cuenta  que  el  rigor  y  la  ruta  crítica  que  seguimos  en  nuestra    citación serán revisados por especialistas que evalúan nuestra productividad    cuando  laboramos  en  una  institución  académica,  o  la  tesis,  en  un  programa    académico.  Entonces,  como  parte  del  buen  desarrollo  de  la  investigación  o    estudio que se realiza, está la aplicación de las técnicas documentales, es decir,    el uso correcto de ficha, cita y referencia bibliográficas.  Ahora bien, ¿qué es la cita bibliográfica? Es la mención de una frase o parte   de  una  obra,  que  nos  permite  mostrar  en  qué  otras  ideas  y  propuestas  nos    apoyamos  para  construir  nuestros  argumentos  y  cómo  llegamos  a  nuestras    conclusiones; contextualizan el tema y ofrecen más información. Se remite a la    fuente mediante la referencia bibliográfica.  Se  puede  usar  cita  textual  (o  cita  directa),  o  bien,  parafrasear  mediante  cita    indirecta  de  las  fuentes,  pero  siempre  hacer  notar  al  lector  cuándo  hablamos     nosotros  y  cuándo  lo  hacen  los  autores  citados,  y  justificar  mediante  un    comentario ante el lector por qué introducimos la voz de otro autor. También es    aconsejable que la cita no sea muy extensa, y si lo es, hay que justificarlo.  ¿Qué es la cita literal, textual o directa?  Es aquella que reproduce íntegramente   el  texto  de  otro  autor,  palabra  por  palabra.  Se  le  distingue  por  medio  del    entrecomillado, con cursivas o presentándola en un párrafo independiente con    una sangría específica.  Ejemplo:  “Lograr que las mujeres puedan decidir sobre la tierra en las comunidades   y  los  ejidos  implica  necesariamente  que  sean  reconocidas  como    integrantes  de  los  colectivos  ejidales  en  igualdad  a  los  hombres  y,  por    lo  tanto,  que  las  parcelas  dejen  de  ser  consideradas  como  propiedad    individual masculina” (Eboli Santiago, 2018, p. 48). \n169  ¿Qué  es  la  paráfrasis  o  cita  indirecta?   Esta  consiste  en  transformar  el  texto  de    otro  autor  presentándolo  con  el  discurso  propio,  cambiando  la  estructura  o    mediante su resumen, aunque siempre asegurándonos de que no se pierda su   sentido original.  Ejemplo (paráfrasis de la cita textual del ejemplo anterior): Para  que  las  mujeres  ejerzan  el  derecho  de  ser  propietarias  de  tierras  y    decidan sobre estas, en igualdad con los hombres, debe cambiar el orden   jurídico que designa a las parcelas como propiedad individual masculina.   (Eboli Santiago, 2018). Para  tener  más  elementos  de  cómo  conformar  el  aparato  crítico  de  nuestro    texto  académico  cuando  se  incorpora  lo  que  han  dicho  otros  autores  en     nuestra escritura, recomendamos la lectura de López Vera (2021, pp. 33-39) y de    Sánchez Upegui (2011, pp. 61-88).  La ficha y la referencia bibliográfica  La  cita  debe  ir  acompañada  siempre  de  la  referencia  bibliográfica  para   acreditar las fuentes utilizadas de forma que los lectores puedan acudir a ellas.   Para presentar las referencias completas y sin errores, recomendamos:  1. Identificar el tipo de fuente: ¿es un libro, un capítulo, un artículo, un informe,   un sitio web, una tesis, una memoria de congreso? 2.   Ubicar los datos editoriales: nombre y apellidos de los autores o editores,   año de publicación, título de la obra, editorial, lugar de publicación, título,   volumen y numero de la revista, DOI, etcétera.   3. Realizar la descripción del documento mediante una ficha. Si se usa un  gestor bibliográfico, revisar que los datos estén completos.  4.   En  el  momento  de  hacer  las  citas,  construir  la  referencia  con  base  en     los datos de la ficha, con el estilo de citación que exija la editorial, la    universidad  o  el  profesor  que  revisa  el  documento.  Para  este  paso  los     gestores bibliográficos son de gran ayuda.   8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n170   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.18. El libro impreso, su ficha y su referencia. \n171  Figura 8.19. El artículo electrónico, su ficha y su referencia.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n172   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.20. La ponencia de congreso, su ficha y su referencia.  Pero ¿qué es la referencia bibliográfica?  Es la descripción estructurada y detallada del documento del que se ha obtenido   información, permitiendo su identificación e informándonos de algunas de sus    características fundamentales. Se coloca dentro del texto acompañando a la   cita (referencia corta), registrando entre paréntesis el autor y el año en el caso   de los sistemas de citación autor-año, y a pie de página o en la bibliografía al    final del texto con los datos completos (referencia larga): autor, título, lugar y  \n173  fecha  de  publicación,  etc.  La  estructura  y  puntuación  depende  del  estilo  de    citación usado.   ¿Qué es un estilo de citación?  Es el conjunto de reglas internacionales que determinan para cada tipo de fuente   citada los elementos necesarios, su orden y el formato tipográfico (Universidad   de  Alicante,  2021).  Da  uniformidad  a  las  citas  y  referencias  bibliográficas   en  los  textos  académicos.  Las  editoriales  científicas,  universidades  y  centros    de  investigación  crean  o  adoptan  estilos  de  acuerdo  con  sus  necesidades  y     campos científicos en los que trabajan.  Todos los estilos derivan de tres grandes sistemas de citación (Davis, 2012):  •   El nombre-año, conocido como anglosajón o sistema Harvard, que refiere   en el texto el autor y fecha de publicación entre paréntesis y coloca las    referencias finales en orden alfabético por autor y año de publicación.    Ejemplos: CSE (o Council Style of Science Editors) (nombre-año), Chicago,   Harvard, APA (o American Psychological Association). •   El secuencial, que inserta las referencias en el texto mediante números   entre  paréntesis  y  coloca  las  referencias  finales  en  el  orden  en  que    aparecen por primera vez dentro del texto. Ejemplo: Vancouver. •   El alfanumérico, en el que los números asignados a las referencias finales    se  usan  para  las  referencias  en  el  texto,  independientemente  de  la    secuencia en la que aparecen en el texto del trabajo. Ejemplo: CSE (cita-  nombre).  En la figura 8.21 podemos observar ejemplos de citas con referencias en diferentes    estilos, pongamos atención en cada dato, en cada signo de puntuación, y en el   orden de los elementos, los cuales cambian en cada estilo.  8. INFORMACIÓN CIENTÍFICA: BÚSQUEDA, SELECCIÓN Y USO ÉTICO \n174   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Figura 8.21. Ejemplos de estilos de citación.  Es importante identificar, en la sección de políticas de una editorial o en las   normas editoriales del centro educativo, el estilo de citación que exigen utilizar   en artículos, libros o tesis, así como solicitar o buscar el manual correspondiente    y corroborar que el gestor bibliográfico utilizado lo tenga integrado. Más aún, se    debe corroborar que las referencias cumplan con la estructura del estilo. \n175  Recomendaciones finales  Hacer el recorrido de buscar, seleccionar, organizar y usar la información es un   trabajo  metodológico y  escrupuloso  alineado  al  trabajo  de  investigación,  con     fines de publicación o de presentar un trabajo de tesis. Hay que seguir ciertos    pasos,  revisar  con  detenimiento,  auxiliarse  de  las  tecnologías  y  adaptarse    a  los  cambios.  Tener  en  cuenta  que  los  documentos  tienen  un  propósito  de    comunicación,  quien  lee  tendrá  la  fórmula  para  encontrar  un  criterio  que  le    permita distinguir y valorar los que necesita. Es un hábito que se va forjando a   medida  que  se  repite:  se  aprende  a  buscar  y  se  encuentran  elementos  para    elegir lo mejor en cuanto al tema, la pertinencia y la calidad.  Al estar inmersos en un contexto de comunicación científica, hay que cuidar la   certeza, hacer valer que el conocimiento se genera a partir de otros, por ende,   actuar con ética cuando se usan las fuentes documentales.  Referencias  Abejón Peña, T., Alonso Gamboa, J. O., Córdoba González, S., y Polanco Cortés,  J.  (2020).   Identificación y tratamiento de revistas espurias en Latindex. Guía   para  Editores .  Latindex.  https://www.latindex.org/lat/documentos/Revistas_  espurias-Guia_para_editores_definitiva.pdf. Angulo  Marcial,  N.  (2013).  La  cita  en  la  escritura  académica.    Innovación  E erencias .  https://biblioteca.  ua.es/es/estudia-y-aprende/elaboracion-y-gestion-de-citas-bibliograficas/  elaborar-citas-y-referencias-bibliograficas.html,  recuperado  el  15  de  mayo    de 2019. \n177  9. Una estrategia de lectura de artículos científicos: “Adivina el mensaje”  Lorena Ruiz-Montoya  Introducción  Hay dos principales formas en las que se difunde el conocimiento científico, una   corresponde a los medios verbales, como son seminarios, congresos, simposios,   talleres, mesas de discusión, etcétera, en donde el manejo del lenguaje verbal    determina qué tan eficiente y eficazmente se transmite un conocimiento a los    demás  (Cisneros  Hernández,  2024).  La  otra  forma  comprende  medios  escritos,    en  la  cual  saber  leer  y  escribir  de  manera  crítica  es  fundamental  para  poner    el  conocimiento  a  disposición  de  la  comunidad  académica  y  de  la  sociedad     en general. El artículo científico es el medio escrito preferido para una buena    parte de la comunidad académica, el cual se caracteriza porque se publica en   revistas especializadas editadas con regularidad. Los trabajos o estudios que se    publican en revistas científicas pasan previamente por una rigurosa evaluación   por  pares.  Esto  significa  evaluaciones  hechas  por  personas  académicas  y    especialistas  en  el  tema  que  trata  el  artículo,  por  supuesto  que  los  artículos     presentan  únicamente  resultados  de  investigaciones  científicas  originales  e    información inédita. \n178   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Hablar,  leer  y  escribir  son  habilidades  que  se  desarrollan  conforme  ocurre    el  crecimiento  de  las  personas,  y  se  van  mejorando  cuando  se  recibe  una    educación escolarizada o autodidacta. Durante la formación básica (primaria   y  secundaria)  y  media  (bachillerato)  se  aprenden  las  herramientas  más    elementales  de  la  lectura  y  escritura,  sin  embargo,  estas  son  habilidades  que    se  deben  seguir  desarrollando  durante  la  formación  superior  y  de  posgrado.    Posiblemente se pueden incorporar como parte del contenido curricular, pero    mejor aún si es una decisión personal mejorar la escritura y lectura científica.  En las normas editoriales de las revistas científicas se pueden reconocer algunos de   los lineamientos básicos para escribir artículos científicos, pero una guía de cómo    llevar a cabo su lectura es menos evidente. Sin duda, es necesario leer bien para   escribir bien, y ¿cómo aseguramos que estamos leyendo bien? Una respuesta sería   que cuando hemos entendido y comprendido el texto. Otra posible respuesta es   que  ello  sucede  cuando  podemos  usar  nuestras  propias  palabras  para  expresar     verbalmente y por escrito el conocimiento plasmado en el artículo científico leído,   pero ¿qué tan fidedigno es el conocimiento que adquirimos a través de la lectura?   Generalmente confiamos en haber aprendido, y la confirmación la podría hacer   el autor, pero esperar una valoración sería inoperante. Entonces confiamos en   que quien lee lo hace lo suficientemente bien como para validar mutuamente el    conocimiento que se ofrece en los artículos. Al usar el conocimiento de los artículos    científicos como antecedente en nuestros propios escritos (Alaysa Degola, 2020),    y  como  parte  de  nuestro  conocimiento  general,  es  una  forma  de  validar  ese     conocimiento.  La  lectura  crítica  de  artículos  científicos  es  fundamental  en  la    generación de conocimiento, por lo que merece ser reconocida y tener algunas    directrices básicas, pero altamente flexibles, para que se ajusten al estilo y gusto   del lector. La lectura crítica significa que se contrasta la información adquirida en    la lectura con nuestro conocimiento, reconociendo las diferencias conceptuales   metodológicas  y  las  inconsistencias  entre  la  teoría  y  los  hallazgos  alrededor  del    tema  de  interés.  Por  ejemplo,  se  reconocen,  en  el  artículo,  limitaciones  de  las     conclusiones y se identifican vacíos metodológicas o de conocimiento (Alaysa    Degola,  2020).  La  buena  lectura  se  trata  de  la  habilidad  para  realizar  una    interpretación o inferencia del texto (Brito Ramos, 2020; Ovando Galvez, 2020).  En este capítulo se presenta la estructura de un artículo científico enfocado a las   ciencias naturales con el fin de compartir una estrategia de lectura útil y motivar    a  la  lectura  de  este  tipo  de  textos,  una  actividad  con  un  espacio  y  objetivos    propios y explícitos. \n179  La estructura del artículo científico  Las secciones comunes de un artículo científico son 1)  Título ,  2)   Autores ,  con   su    institución  de  adscripció n, 3)  Resumen ,  5)   Palabras  clave ,  6)   Introducción ,  7)  Materiales  y  métodos ,  8)   Resultados ,  9)   Discusión ,  10)   Conclusiones ,  11)  Agradecimientos ,  12)   Referencias ,  y,  en  algunos  casos,  13)    Anexos  o   material complementario.  Cada sección es informativa, puede leerse de forma   independiente y en el orden que se prefiera. El título es lo primero que se lee,   invariablemente, pero ¡no hay nada que impida que se continúe con la lectura    de los  Resultados ! No es forzoso seguir la secuencia de las secciones, cuál leer   después del título dependerá de qué clase de información estemos buscando.   Cada sección contiene información completa que permite intuir la que hay en   las demás.   Y aunque se conoce comúnmente la naturaleza de la información de cada   sección en un artículo científico, aquí se le describe brevemente para asegurar    una noción compartida.  1)  Título . El título tiende a ser corto, preferentemente de no más de 25 palabras.  Nos ofrece una idea general del tema y contenido del artículo. Es lo primero   que  se  lee  y  con  base  en  él  se  decide  si  conviene  o  no  seguir  leyendo  el    artículo. 2)  Autor y adscripción . En esta sección se informa el nombre de la o las personas   que  participaron  en  la  investigación.  La  participación  significa  que  cada    autor  contribuyó  en  la  concepción  de  la  idea,  en  el  diseño,  en  la  toma    de  datos,  en  el  análisis  de  datos,  escritura  del  artículo  (de  sus  diferentes    versiones),  y  en  la  aprobación  de  la  versión  enviada  a  valoración  para    ser  publicada.  La  investigación  concluye  cuando  el  artículo  es  aceptado    para  publicación  en  una  revista.  Las  personas  que  aparecen  como  autor    son  responsables  y  conocedoras  del  contenido,  por  lo  que  se  espera    puedan responder cualquier duda que surja de la comunidad académica.   Es importante tomarse el tiempo para leer esta sección, ya que así conocemos,   al  menos  de  nombre,  a  quienes  se  interesan  en  temas  parecidos  a  los    nuestros,  son  colaboradores  potenciales  e  indirectos  dado  que  investigan    temas similares o estrechamente relacionados a los nuestros.  3)  Resumen . Generalmente se constituye de un solo párrafo; es una presentación  sintética de todo el artículo (introducción, métodos, resultados y conclusión,   9. UNA ESTRATEGIA DE LECTURA DE ARTÍCULOS CIENTÍFICOS: “ADIVINA EL MENSAJE” \n180   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  excepto referencias). Es por esto que se debe leer con detalle, pues permite   confirmar si el artículo contiene información de interés. Sin embargo, para   la estrategia “Adivina el mensaje”, se recomienda leerlo hasta que se haya    revisado la información de la sección de  Resultados . 4)  Palabras clave . Es un conjunto de palabras simples o compuestas (no más de  tres palabras) que se relacionan estrechamente con el contenido del artículo.    Son palabras que se incluyen en catálogos de búsqueda de artículos, y en    ocasiones también para catalogar el artículo en áreas de conocimiento. 5)  Introducción . Esta parte del artículo científico expone el tema y problema que   se está investigando; se presentan argumentos sobre su relevancia, y a veces   expone los resultados esperados o la hipótesis de forma explícita o implícita. 6)    Materiales  y  métodos .  En  esta  sección  se  describe  el  procedimiento  e   instrumentos que se utilizaron para obtener los datos y la forma de analizarlos.    En  ella  se  basa  la  probable  confianza  en  la  conclusión  derivada  de  los    resultados generales. 7)  Resultados . Estrictamente los resultados son todos los datos registrados, pero  usualmente no se presentan en el manuscrito y lo que se muestra es un resumen   de ellos. En la actualidad, es más frecuente que las revistas soliciten que los   datos  sin  analizar  (datos  crudos)  queden  disponibles  de  manera  abierta  y     pública, porque pueden volver a analizarse conforme se desarrollan nuevas    herramientas, en particular para estudios comparativos o de mayor alcance    temporal o geográfico. La sección de resultados es un resumen de los datos    y  se  presentan  aspectos  diferentes  que  permiten  descartar  las  hipótesis  o     dan soporte a las conclusiones. Los datos se resumen en gráficas, tablas y    esquemas, entre otras formas. Esta sección debe tener una clara y evidente   (casi obvia) relación con la sección de materiales y métodos. En la estrategia    “Adivina el mensaje”, los cuadros, figuras y textos de los  Resultados  es lo que  se debe revisar cuidadosamente, y luego el texto.  8)  Discusión . Este apartado es una interpretación de los resultados de quien(es)  escribe(n).  Está  hecha  alrededor  de  los  objetivos  y  la  hipótesis  o  resultado    esperado.  Se  indican  los  hallazgos  más  relevantes,  posibles  implicaciones    y  se  contrasta  con  el  conocimiento  previo.  Se  reconocen  los  alcances  y    limitaciones del trabajo.  \n181  9)  Agradecimientos . Aquí se reconocen las ayudas puntuales para la realización   del estudio, incluyendo las fuentes de financiamiento (por ejemplo, becas).  10)  Referencias (o Bibliografía) . Esta sección ofrece toda la información necesaria   y  suficiente  para  que  el  lector  sepa  qué  conocimiento  fundamenta  la   investigación. Son datos que permiten que una referencia sea encontrada.   Para escribir las secciones de  Introducción, Materiales y métodos, y Discusión ,    se debe realizar una buena búsqueda de literatura y utilizar la más apropiada    para dar soporte a los argumentos que en dichas secciones se expresen. 11)    Anexos  o  material  complementario .  Generalmente  se  trata  de  cuadros,    figuras y texto que ofrecen más detalles relevantes de la información que se    presenta en el texto principal.   Estrategia de lectura “Adivina el mensaje”  La estrategia “Adivina el mensaje” pretende obtener rápido el conocimiento de   un artículo científico, leyendo con especial atención las figuras y tablas de la    sección    Resultados ,  para  generar  una  idea  personal  del  conocimiento  que  la   investigación  aporta.  El  conocimiento  que  se  recaba  se  expresa  en  una  frase    relativamente  corta  y  con  palabras  propias  del  lector.  Luego  se  lee  el  texto     de dicha sección, para finalmente hacer los mismo, a manera de “escáner” o   “barrido” (Monash University Library, 2022), con todo el artículo. En los resultados    está  implícitamente  la  pregunta,  los  datos  y  su  análisis,  y  la  interpretación  en    manos del lector.  He  denominado  “Adivina  el  mensaje”  a  la  estrategia  porque  es  importante   lograr una lectura significativa, que sea gratificante y se asegure que obtenemos   información relativamente útil para nuestro propósito de lectura. Es ampliamente    conocido  que  1)  lo  que  bien  se  aprende  jamás  se  olvida,  y  2)  se  aprende  lo     que es altamente significativo o emotivo. Resolver una adivinanza es divertido y   gratificante, por lo que lo que se aprenda de la lectura será difícil de olvidar.  La propuesta “Adivina el mensaje” es una herramienta de lectura que reta la   capacidad de comprensión de cuadros y figuras y de generar una declaración   a partir de “datos” resumidos. Después de formularse una idea propia, se lee de    forma rápida todas las secciones para obtener la idea de quien(es) escribe(n).  9. UNA ESTRATEGIA DE LECTURA DE ARTÍCULOS CIENTÍFICOS: “ADIVINA EL MENSAJE” \n182   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Pasos de la estrategia de lectura “Adivina el mensaje”:  1)   Define un tiempo y espacio de lectura . Es importante buscar el momento y   espacio más apropiados. ¿Qué momento del día y del que dispones resulta   más productiva una lectura? ¿En qué momento logras concentración? ¿Qué   espacios son los que te inducen a la lectura? 2)   Define objetivos de lectura . ¿Por qué o para qué se hace la lectura? ¿Qué   tipo  de  información  se  busca?  Es  posible  que  ya  te  hayas  hecho  estas    preguntas y cuentes con artículos que has considerado para su lectura. No   obstante,  es  importante  volver  a  plantearte  esas  mismas  preguntas  para     definir  objetivos  de  lectura.  También,  antes  de  comenzar  con  tu  lectura,    puedes hacerte estas otras preguntas: ¿Necesitas argumentos para apoyar   la idea en construcción? ¿Se quiere valorar el nivel de originalidad del trabajo   en construcción? ¿Necesitas soportes metodológicos? ¿Buscas métodos de   análisis? Entre muchas otras más para que guíen tu lectura. Por ejemplo, esta   lectura de artículos puede ser para revisar la literatura y establecer un estado   del arte en el tema (Alayza Degola, 2020).  3)   Evita leer el resumen . En esta estrategia debes evitar leer el resumen para no    “aceptar” sin crítica o análisis la interpretación de quien escribe el artículo, es    decir, la interpretación de resultados de quien o quienes escriben el artículo   ¡Es la adivinanza por resolver! 4)   Termina de preparar tu mente para la lectura . Hojea todo el documento y lee   o  simplemente  observa  los  subtítulos.  Esto  ayuda  a  advertir  la  organización    jerárquica  de  la  información.  Las  preguntas  del  paso  2  preparan  la  mente    para  recibir  información,  la  predisponen  a  ubicar  la  que  es  importante.  La    ojeada fortalece la disposición y ayuda a organizar la información que se va   obteniendo del artículo. 5)   Adivinando  el  mensaje  en  la  sección  Resultados .  En  esta  sección  se  debe    pasar la mayor parte del tiempo dedicado a la lectura. Revisa cuadros, lee    encabezados de tablas, los encabezados de filas y columnas, reconoce las   variables o parámetros. Identifica y anota lo relevante de cada figura. Pon    atención en los métodos estadísticos, en los tamaños de muestra, el tipo de   datos y análisis. Puede haber vocablos que no se entiendan, pero en teoría    un cuadro o figura bien hechos son aquellos en los que el lector no necesita    recurrir al texto para entenderlos en su totalidad.   En  este  paso  es  recomendable  elaborar  una  matriz  (cuadro  9.1)  con    preguntas  clave  para  construir  conocimiento  científico,  el  qué  o  tema  o  \n183  problema, o mejor aún ¿cuál es la pregunta de investigación? Completa la   matriz mientras revisas cuadros y figuras.  Estas anotaciones son tu propia interpretación de los resultados. En el cuadro   de anotaciones deja una columna o espacio para registrar lo que podría ser   la respuesta de los autores. Una vez que se han comprendido los cuadros y las    figuras, y has anotado tu interpretación, entonces lee el texto de la sección    de    Resultados .  Te  sorprenderá  cómo  podrás  leer  más  ágilmente  el  texto.  Si   es necesario, mientras lees corrige y agrega información a tus anotaciones.  6)   Entérate de Materiales y métodos . Ahora puedes continuar con métodos o   cualquiera de las otras secciones. Te propongo  Materiales y métodos  porque  es la sección que debe tener en cuenta, el tipo de datos y la forma de análisis,   y  las  pruebas  estadísticas.  Puedes,  entonces,  hacer  una  lectura  crítica  y    podrás detectar inconsistencias u omisiones en los resultados, o viceversa. 7)   El  mensaje .  Lee  la  discusión  a  detalle  o  de  forma  rápida,  ahí  viene  la     interpretación o significado que los autores le dan a sus datos (los cuales    están resumidos en la sección de Resultados). ¿La evidencia (los resultados)   sostiene sus argumentos, o hay algo que no concuerda entre resultados y la   interpretación? Esta contrastación representa una lectura crítica. Completa,   solo  en  lo  que  sea  posible,  el  cuadro  que  elaboraste  en  el  punto  5,  en  la    columna que corresponde a los autores. 8)   El mensaje y sus antecedentes . Por último se lee la Introducción, ahí se vierte    el  estado  del  arte  o  antecedentes  del  conocimiento.  Los  primeros  párrafos    presentan  de  forma  clara  y  precisa  el  tema;  en  los  siguientes  se  sintetiza  el    conocimiento generado hasta el momento en el que se escribió el artículo   y  se  resaltan  las  faltas  de  conocimiento,  y  hacia  dónde  estuvo  dirigida     la investigación. En general, en el último párrafo se dice de forma específica    la(s)  pregunta(s),  el  objetivo  y  la  hipótesis  o  expectativas  que  guiaron    la investigación. Mientras se va realizando la lectura de los textos de las secciones  Introducción,   Discusión,  Materiales  y  mmétodos   se  responden  las  preguntas  acerca  de  ¿El    qué? ¿El porqué? ¿El cómo? ¿El hallazgo más relevante? ¿La conclusión? Pero   esta vez no la del lector sino la del autor. Contrasta las columnas ¿Adivinaste el   mensaje? La ventaja es que lo que corresponde al lector es tu interpretación y   lo dices con tus palabras, y será mucho más fácil redactar una oración con el   mensaje y dar la cita correspondiente.   9. UNA ESTRATEGIA DE LECTURA DE ARTÍCULOS CIENTÍFICOS: “ADIVINA EL MENSAJE” \n184   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En el cuadro 9.2 se presentan dos ejemplos de la lectura de un artículo científico   siguiendo  la  estrategia  “Adivina  el  mensaje”.  Estas  lecturas  fueron  hechas    para incorporarlas en el presente trabajo. La estrategia de lectura se practicó   en el Seminario de Tesis de Investigación del programa de posgrado Maestría en   Ciencias de Recursos Naturales y Desarrollo Rural de ECOSUR, en sus ediciones    de 2010 a 2013. Es un curso de tronco común que toman obligatoriamente los    estudiantes, y es el tercero en el que los estudiantes han participado desarrollando   esta estrategia. Los grupos los formaron profesionales de diversas disciplinas de   las  ciencias  naturales  y  las  ciencias  sociales.  De  manera  que  la  estrategia  la    experimentaron  personas  con  formación  académica  y  estilos  de  aprendizaje    muy diversos.  Las  ventajas  que  los  y  las  estudiantes  notaron  en  esta  estrategia  es  que    reconocieron su capacidad para entender gráficas, algunas muy complejas, así    como cuadros de resultados. También dijeron que pudieron obtener una idea   general del contenido del artículo, en algunos casos incluso pudieron anticipar    argumentos de  los  autores.  Lograron identificar  rápidamente  las  técnicas  de    análisis  numéricas  que  podrían  usarse  en  sus  respectivos  proyectos.  Entre  las    desventajas,  puede  funcionar  bien  para  artículos  con  resultados  en  cuadros  y     figuras, pero no funciona del todo para quienes la sección de resultados es solo    texto, aunque leerla fue un reto.  Conclusión  Aquí se presentó una estrategia didáctica para promover una lectura crítica de    un artículo científico. Consiste en una lectura inferencial a partir de la sección    de  Resultados . El reto es inferir la pregunta e hipótesis planteadas, y reconocer  un resultado y redactar una conclusión a partir de la información presentada.   La estrategia es una propuesta de otras posibles, y espero que quien la conozca   se  motive  a  reconocer  la  propia  y,  en  la  medida  que  sea  necesario,  hacerle     mejoras para desarrollar la lectura crítica de artículos científicos. \n185  Agradecimientos  A José Gerardo Domínguez Vera por revisar el manuscrito y facilitarme uno de   sus resultados de lectura de artículo científico utilizando la estrategia “Adivina    el  mensaje”.  A  Anahí  Canedo  Texon  y  Maricela  García  Bautista  por  revisar  el    manuscrito  y  compartir  cómo  fue  su  experiencia  con  la  estrategia  de  lectura    propuesta  y  por  las  sugerencias  muy  valiosas  para  mejorar  la  guía.  A  todos    los  estudiantes  de  la  Maestría  en  Ciencias  en  Manejo  de  Recursos  Naturales  y    Desarrollo Rural de ECOSUR con quienes tuve la oportunidad de practicar esta   estrategia.   Referencias  Alayza Degola, M. (2020). El método de revisión de literatura. En A. O. Sánchez  Huarcaya  (coord.),   Los  métodos  de  investigación  para  la  elaboración   de  las  tesis  de  maestría  en  educación  (pp. 23-33). Lima, Perú: Facultad de   Educación-Pontificia Universidad Católica del Perú.  Britos-Ríos,  J.  G.,  Íñiguez-Dávalos,  L.  I.,  Gallo-Reynoso,  J.  P.,  y  Flores-Real,  C.  A.   (2022).  Hábitos  alimenticios  y  consumo  de  peces  exóticos  por  la  nutria    neotropical  ( Lontra  longicaudis )  en  la  Reserva  de  la  Biosfera  Sierra  de    Manantlán Jalisco, México.  Revista Mexicana de Biodiversidad , (93), e933840.  http://rev.mex.biodivers.unam.mx/wp-content/uploads/2022-2/vol-93/93-2-  abril-2022/3879.pdf  Brito Ramos, Y. B. (2020). La lectura crítica como método para el desarrollo de  competencias en la comprensión de textos.  Revista Educare ,  24 (3), 243-264  https://doi.org/10.46498/reduipb.v24i3.1358  Hasana, U., Swain, S. K., y Geoge, B. (2022). A bibliometric analysis of ecotourism:  A safeguard strategy in protected areas.  Regional Sustainability ,  3 (1), 27-40. Monash  University  Library  (2022).   Reading  Techniques .  Monash  University.   https://www.monash.edu/student-academic-success/study-better/develop-  strategies-for-reading-and-note-making/read-more-effectively/four-   strategies-for-effective-reading, recuperado el 13 de noviembre de 2024.  Cisneros Hernández, J. (2024). Comunicación verbal (ORAL) de la ciencia. En L.  Ruiz-Montoya, F. Gurri, P. Liedo, y R. A. Mena Farrera (coords.),  Introducción a    la investigación científica  (pp. 191-199). San Cristóbal de Las Casas, Chiapas,   México: ECOSUR. Ovando  Galvez,  R.  (2020).  Guía  didáctica  de  lectura  comprensiva.   Horizontes.  Revista de Investigación en Ciencias de la Educación, 4 (16), 605-612. https://   doi.org/10.33996/revistahorizontes.v4i16.140  9. UNA ESTRATEGIA DE LECTURA DE ARTÍCULOS CIENTÍFICOS: “ADIVINA EL MENSAJE” \n186   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  *La  respuesta  del  lector  es  la  frase  que  se  puede  usar  para  escribir  un  documento    científico.  Cuadro 9.1. Preguntas de la estrategia “Adivina el mensaje” para la lectura de un   artículo científico, las cuales responde el lector con base en su revisión detallada de   cuadros, figuras y textos de la sección Resultados, y las respuestas del autor que el    lector deriva al revisar el artículo completo. \n187 9. UNA ESTRATEGIA DE LECTURA DE ARTÍCULOS CIENTÍFICOS: “ADIVINA EL MENSAJE” \n188   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Cuadro  9.2.  Estrategia  de  lectura  “Adivina  el  mensaje”  puesta  en  práctica  en   dos  artículos.  (A)  Hábitos  alimenticios  y  consumo  de  peces  exóticos  por  la  nutria    neotropical  ( Lontra  longicaudis )  en  la  Reserva  de  la  Biosfera  Sierra  de  Manantlán    Jalisco,  México  (Britos-Ríos   et  al .,  2022).  (B)  A  bibliometric  analysis  of  ecotourism:   A safeguard strategy in protected areas (Hasana  et al ., 2022).  Continúa en la siguiente página. \n189 9. UNA ESTRATEGIA DE LECTURA DE ARTÍCULOS CIENTÍFICOS: “ADIVINA EL MENSAJE” \n\n191  10. Comunicación verbal (ORAL)de la ciencia  Juan Cisneros Hernández  Introducción  La  organización  y  presentación  oral  de  trabajos  de  investigación  o  ponencias    es una actividad frecuente en la academia que suele requerir más tiempo del   esperado.  Sin  embargo,  este  tiempo  suele  ser  valioso,  ya  que  refuerza  nuestro    conocimiento sobre el tema abordado y nos sensibiliza sobre la importancia de    mejorar la comunicación científica no solo con nuestros colegas, sino también    con la sociedad en general.  Tanto la comunicación oral como la escrita demandan habilidades que son poco   trabajadas  en  nuestra  formación  académica.  Solo  al  enfrentarnos  al  continuo    ejercicio  de  las  presentaciones  orales,  comenzamos  a  adquirir  y  perfeccionar    estas  habilidades.  Aunque  todas  y  todos  tenemos  potencial  para  ser  buenos    oradores,  es  innegable  que  conocer  los  elementos  y  herramientas  de  una    comunicación  efectiva  facilita  el  desarrollo  y  mejora  de  estas  habilidades  en    diversas situaciones, desde pláticas formales con colegas hasta charlas dirigidas   a jóvenes universitarios, niñas y niños u otros grupos de personas. \n192   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En  general,  son  numerosos  y  variados  los  factores  que  intervienen  en  una    presentación exitosa. Lo importante es identificar estos elementos, practicarlos y    perfeccionarlos, objetivo que solo se consigue con la práctica. Esperamos que   el  presente  capítulo  sirva  a  las  personas  lectoras  como  guía  para  considerar     los elementos esenciales al planificar, organizar, preparar y ejecutar su próxima    presentación oral.  Bien... pues comencemos con una cita que, considero, abarca y encierra el   sentido y objetivo central que conlleva toda presentación oral:  hacer pensar :    “—Y cuál sería un buen libro (o su símil, una buena exposición o presentación),    —Cualquiera  que  te  haga  pensar.”  (Adaptado  de  la  película   En  busca  del    destino ).  Escenarios  Durante  nuestra  formación  académica  enfrentamos  diversas  situaciones  y     escenarios en los que debemos realizar y presentar exposiciones en público. Esta   actividad no solo es constante, sino que se intensifica a medida que avanzamos   en nuestra carrera científica.   Entre  las  situaciones  más  habituales  se  incluyen  presentaciones  en  congresos    (tanto  orales  como  mediante  carteles)  y  las  de  protocolos  o  propuestas  de    investigación, además de la exposición de avances de investigación, la gestión   de  apoyos  para  investigaciones,  la  divulgación  de  nuestras  investigaciones  a     colegas y al público en general, y la impartición de clases en diferentes niveles    académicos, entre otros escenarios.   Aunque  las  formas  de  organizar  una  presentación  pueden  ser  muy  diversas,    en  general  se  utiliza  la  estructura  de  una  publicación  escrita,  es  decir,  con    secciones como introducción, métodos, resultados y discusión o conclusión. No   obstante, se le puede adaptar de acuerdo al evento o audiencia u objetivo de   la presentación.  Cuando  se  prepara  una  comunicación  oral  efectiva,  debemos  inicialmente    considerar  dos  puntos:  el  público  al  que  se  dirige  la  presentación  y,    las circunstancias y objetivos del evento (si es una reunión, simposio, congreso,   charla informal, etcétera). Son la base para desarrollar el contenido y diseño de   la presentación.  \n193  No obstante y a pesar de tener claridad en dichos puntos, es esencial conocer   y  respetar  el  tiempo  y  los  lineamientos  establecidos  por  los  organizadores  del    evento. Ajustarse a un tiempo límite reducido es uno de los mayores desafíos en   las comunicaciones orales, ya que en general no supera los veinte minutos. En   este lapso se deben incluir la introducción y la sesión de preguntas, dejando al   ponente entre 12 y 15 minutos para exponer su trabajo.   Como  se  advierte,  es  esencial  ajustar  el  contenido  de  nuestro  trabajo  a  cada    situación  particular  y  limitar  la  información  a  puntos  claros  y  concisos.  Aunque    podamos  tener  mucha  información  relevante  e  interesante,  las  mejores    presentaciones  suelen  centrarse  en  compartir  información  con  base  en  dos  o    tres tópicos interrelacionados. No obstante, se puede considerar un máximo de   cinco ideas, siempre que estén estrechamente relacionadas. En caso contrario,   es mejor dividir la información en presentaciones separadas para cada idea o   tema de estudio.  Cómo organizar mi presentación  Un  buen  comienzo  es  elaborar  una  lista  detallada  con  todos  los  elementos  e    información  relevante  para  incluir  en  una  presentación.  Una  vez  hecha  esta    recopilación, se les debe organizar por prioridad y delimitarlos en función de las   características y lineamientos del evento.  Desde  el  principio  hay  que  definir  claramente  la  idea  central  y  asegurarnos   de que todo el desarrollo conduzca hacia ella. Una vez identificada esta idea    central,  mensaje  principal  o  pregunta  de  investigación,  es  importante  buscar     o definir qué información complementaria respaldará los elementos centrales.    Un contenido complementario adecuado suele consistir en ejemplos concretos,    evidencia sólida y reflexiones sobre datos interesantes, entre otros.  En  este  punto  es  muy  útil  hacerse  una  pregunta:  ¿La  información  comple-  mentaria  que  presento  contribuye  a  mejorar  o  a  aclarar  mi  discurso?  Si  la     respuesta es afirmativa, habremos logrado un contenido relevante y efectivo en    nuestra presentación.  10. COMUNICACIÓN VERBAL (ORAL) DE LA CIENCIA \n194   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Apoyos audiovisuales (las diapositivas o  slides )  Para  lograr  presentaciones  orales  efectivas,  es  conveniente  crear  contenidos    que impacten y cautiven a la audiencia. Una estrategia efectiva es realizar la   exposición en forma de una narrativa o historia interesante, ya que estas suelen   generar  mayor  interés  y  comprensión  (Dahlstrom,  2014).  El  uso  de  diapositivas     atractivas  y  pertinentes  que  contengan  información  significativa,  además    de  informar,  mantienen  el  interés  de  la  audiencia  (Naegle,  2021).  Reforzar  la     información  con  imágenes  de  alta  calidad,  gráficos  y  cuadros  con  textos   concisos y claros, puede ser extremadamente eficaz.  En el ámbito académico, las presentaciones orales suelen complementarse con   diversas  ayudas  visuales,  y  las  diapositivas  (o   slides ) son las más comúnmente   utilizadas. Esta herramienta suele ser indispensable y su manejo constituye una    habilidad deseable para toda científica o científico. Una diapositiva efectiva   es aquella que aporta claridad y amplía el significado del discurso. Por ello, es    importante asegurarse que esté relacionada y sea relevante para el contenido,    y que sea útil como apoyo en la transmisión del mensaje principal.  Actualmente, existen numerosos recursos informáticos que facilitan la elaboración   de  diapositivas  con  calidad  profesional.  Sin  embargo,  es  preferible  recurrir  a  un     software   que  dominemos  completamente.  Para  valorar  el  uso  de  diapositivas    debemos  considerar  tres  aspectos:  la  optimización  del  contenido,  el  diseño     de  los  elementos  gráficos  y  su  preparación  para  la  presentación.  Todos  son    fundamentales para garantizar la efectividad de nuestras presentaciones orales.  Para  optimizar  el  contenido  es  recomendable  que  consideres  lo  siguiente    (Naegle, 2021): 1.   Presenta una idea por diapositiva, buscando que sea comprendida en un   minuto. 2.   Utiliza títulos que guarden relación directa con el mensaje de la diapositiva.  3. Incluye  únicamente  los  puntos  esenciales  evitando  sobrecargar  la   presentación. 4.   Atribuye correctamente los créditos cuando sea necesario.  5.   Usa  gráficas  y  cuadros  de  modo  efectivo;  si  no  son  autoexplicativos,   considera explicarlas tú.  6.   Adapta el diseño para que el público tenga una comprensión fácil.  7.   Numera las diapositivas para facilitar el seguimiento de tu presentación. \n195  En  lo  que  concierne  al  diseño  adecuado  de  diapositivas,  tres  aspectos  son    relevantes para obtener buenos resultados: 1.   Legibilidad.  Es  fundamental  utilizar  tamaños  y  estilos  de  letra  que  sean    fáciles de leer, además de emplear diseños sencillos con pocos elementos   y una organización lógica de la información.  2.   Contraste.  Dado  que  la  iluminación  en  las  salas  de  conferencia  puede    no ser ideal, elige una paleta de colores que asegure un buen contraste.   Las diapositivas con fondo blanco suelen ser la mejor opción, pero existen   otros colores y recursos disponibles en internet que facilitan esta elección,   solo recuerda probarlas previamente y decidir en función de los escenarios   donde presentarás tus diapositivas.   3.   Contenido  de  las  diapositivas.  Debe  ser  claro  y  conciso,  que  cumpla    con el objetivo de ilustrar un aspecto determinado o resumir información   relevante. Se recomienda priorizar las imágenes sobre el texto; y cuando   este sea utilizado, debe ser simple y directo, redactado en oraciones que   transmitan una idea completa. Preparar diapositivas representa un desafío en términos de síntesis y sintaxis. Sin   embargo, podemos superarlo creando contenidos claros con diseños sencillos y   atractivos. La claridad, la sencillez y un diseño atractivo son fundamentales para    transmitir la información de manera efectiva y que el público la comprenda   y retenga. No obstante, hay otros aspectos cuya importancia varía según el    manejo que les demos (Bourne 2007):  Formato  de  texto :  Evita  formatos  de  itálicas,  subrayado,  uso  excesivo  de    mayúsculas  y  resaltados  porque  dificultan  la  lectura;  prefiere  una  fuente    estándar.  Copia  de  respaldo  en  PDF :  Sin  importar  el  programa  o  formato,  guardar  una    copia  como  PDF  es  recomendable  ya  que  este  es  compatible  con  diversos     dispositivos y protege la presentación contra modificaciones accidentales.  Animaciones :  Las  animaciones  pueden  distraer  si  no  se  utilizan  con  cuidado.    Limita su uso y asegúrate de que sean relevantes para el contenido presentado.  10. COMUNICACIÓN VERBAL (ORAL) DE LA CIENCIA \n196   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Programas e inteligencia artificial (IA) para la generación   de apoyos audiovisuales  Además de PowerPoint, hay numerosos programas para crear presentaciones de   todo tipo, muchos son gratuitos o cuentan con una versión libre aunque limitada   en  sus  funciones.  La  elección  dependerá  de  tus  habilidades,  necesidades  y    disponibilidad  de  tiempo.  Para  presentaciones  tradicionales,  PowerPoint  o  las     presentaciones  de  Google  pueden  ser  suficientes,  pero  si  buscas  escalar  tu    creatividad, hay en la web programas y plataformas que te ayudarán a decidir.  Cada programa o  software  ofrece diversas ventajas y mejoras que van desde   la  integración  de  animaciones  e  imágenes  hasta  la  capacidad  de  generar    presentaciones  completas  a  partir  de  un  guion  básico.  Muchas  de  estas    herramientas utilizan tecnologías de IA para elaborar apoyos audiovisuales que   facilitan  el  diseño  y  la  optimización  de  nuestras  presentaciones.  Estos  apoyos    audiovisuales  no  solo  mejoran  la  claridad  y  organización  del  contenido,  sino    que  también  permiten  crear  presentaciones  visualmente  más  atractivas  y     efectivas para captar y retener la atención del público. Sin embargo, el uso de    estas  herramientas  debe  ser  equilibrado  y  efectivo.  Aunque  mejoran  nuestras    presentaciones,  el  desarrollo  de  nuestras  habilidades  de  comunicación  sigue     siendo fundamental para lograr el impacto deseado. Las herramientas son útiles,    pero la habilidad del presentador para transmitir el mensaje de manera clara y   convincente sigue siendo lo primordial.  Elementos del lenguaje no verbal  En cualquier comunicación oral, además de utilizar la voz para transmitir nuestro   mensaje  y  captar  y  mantener  la  atención  con  apoyos  audiovisuales,  también    recurrimos  a  otras  formas  de  comunicación,  como  la  mirada,  los  gestos  y  las     posturas,  con  las  que  se  transmiten  actitudes  de  rechazo,  afirmación,  duda,    etcétera.  Así,  junto  con  el  tono  de  voz,  el  lenguaje  corporal  desempeña  un    papel  muy  importante  en  la  efectividad  de  la  comunicación.  Por  esta  razón    debemos  conocer  qué  aspectos  considerar  para  mejorar  la  transmisión  del    mensaje. No solo importa lo que se dice, sino también el cómo se dice. Entre los   diversos elementos del lenguaje no verbal que debemos atender durante una   presentación oral destacan los siguientes: \n197  •   Apariencia  personal .  Aunque  muchas  reuniones  científicas  son  poco   formales,  es  recomendable  procurar  una  presentación  adecuada  sin    caer en extremos de informalidad o exceso de formalidad.  •   Contacto visual . Mantén contacto visual con la audiencia y evalúa cómo    están recibiendo tu presentación.  •   Postura .  Vigila  tu  postura;  intenta  mantenerla  formal  pero  relajada  y   natural, evitando la rigidez.  •   Manejo del escenario . Procura moverte, al menos de manera moderada.   Los desplazamientos dinamizan la presentación y mantienen el interés del    público.   Manejar  adecuadamente  estos  elementos  del  lenguaje  no  verbal  mejorará     significativamente la efectividad de tu comunicación oral.  Lista de verificación  Una  vez  terminado  tu  discurso  y  organizados  tus  materiales  audiovisuales  de     apoyo, asegúrate de guardar al menos una copia en la “nube”. Y aunque te    sientas preparado, es prudente contar con una lista de comprobación detallada   (Day, 2005) que incluya al menos lo siguiente: 1.   Destinar suficiente tiempo para la preparación y práctica de tu ponencia.  2.   Considera el tipo de público para determinar el contenido. 3. Identifica de forma clara el mensaje y que el contenido gire en torno a él.   4.   Asegúrate de que el mensaje y contenido sean atractivos y se formulen    para despertar curiosidad. 5.   Recurre a analogías, anécdotas, eventos actuales o datos destacables a    fin de contar una historia interesante y hacer más trasmisible el mensaje.  6.   Cuida que el contenido de la ponencia sea autoexplicativo y entendible. 7.   Utiliza en las diapositivas oraciones cortas pero con ideas completas.  8.   Elabora  una  estrategia  o  diálogo  de  entrada  que  conecte  con  la    audiencia. 9.   Asegúrate  que  cada  diapositiva  complemente  lo  expuesto  durante  su    proyección. 10.   Cuida que haya una diapositiva que marque claramente que finalizó la    presentación: una diapositiva en negro o un sencillo agradecimiento por   la atención prestada.  10. COMUNICACIÓN VERBAL (ORAL) DE LA CIENCIA \n198   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  11. Revisa  que  no  haya  errores  en  la  ortografía,  sintaxis  o  gramática  de  los    textos. 12.   Verifica que no se use un lenguaje muy especializado (o técnico), pero, si   es necesario, agrega una definición de los términos claves y/o recurrentes. 13. Practica  o  comparte  la  ponencia  con  personas  no  expertas  para    comprobar si es clara. 14. Procura  un  contacto  previo  con  los  organizadores  para  conocer  el    escenario y la disponibilidad de dispositivos que se planea usar. Finalmente, no obstante la escasa formación que recibimos en oratoria, como    comunidad  científica  debemos  admitir  que  hemos  tardado  en  responder  a    la  creciente  demanda  de  información  de  la  sociedad.  Nuestros  esfuerzos  de    comunicación  se  han  centrado  en  documentos  y  eventos  dirigidos  a  otros     científicos, dejando al público no especializado al margen. Es crucial motivarnos    a  compartir  nuestros  descubrimientos  con  audiencias  más  amplias.  Aunque     hay departamentos de comunicación que traducen la ciencia para el público,    nadie puede contar mejor nuestra historia que nosotros mismos.   Aun  cuando  la  premisa  de  que  la  práctica  hace  al  maestro  es  válida,  para    desarrollar  y  mejorar  nuestras  habilidades  de  comunicación,  la  motivación    debe ir acompañada de una formación base para ser buenos comunicadores.   Espero que la lectura de este capítulo haya motivado la inquietud e interés por   lograr ser mejores comunicadores en los diversos ámbitos de nuestro quehacer   y  estimule  una  mayor  capacitación  en  oratoria  y  habilidades  comunicativas.    Aunque  muchos  no  la  hemos  recibido  de  manera  formal  existen  opciones  de    capacitación en línea por parte de instituciones y organizaciones serias. Podemos   comenzar explorando la oferta de cursos de la Universidad Nacional Autónoma   de México (UNAM) en https://cursosgratisunam.com/educacion/oratoria/  Agradecimientos  A todos los estudiantes que han compartido conmigo este camino de formación   en un tema poco atendido de forma curricular, pero inevitable y de innegable   utilidad en nuestra vida profesional. Agradezco a los dos revisores anónimos por   sus  valiosos  comentarios  y  sugerencias  para  mejorar  la  calidad  y  claridad  del    presente capítulo. \n199  Referencias y literatura consultada  Bourne,  P.  E.  (2007).  Ten  simple  rules  for  making  good  oral  presentations.   PLoS  Computational Biology, 3 (4), e77. https://doi.org/10.1371/journal.pcbi.0030077   Dahlstrom, M. F. (2014). Using narratives and storytelling to communicate science  with nonexpert audiences.  Proceedings of the National Academy of Sciences,   111 (Sp4), 13614-13620, www.pnas.org/cgi/doi/10.1073/pnas.1320645111  Day, R.A. (2005).  Cómo escribir y publicar trabajos científicos . (3ª ed.).
