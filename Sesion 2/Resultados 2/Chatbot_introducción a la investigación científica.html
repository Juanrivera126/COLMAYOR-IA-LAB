earch .  https://www.  hhs.gov/ohrp/regulations-and-policy/belmont-report/index.html Wilmut, I., Campbell, K., y Tudge, C. (2001).  The second creation: Dolly and the  age of biological control . Harvard University Press. World  Conference  on  Research  Integrity.  (2010).   Singapore  Statement  on   Research  Integrity .  https://wcrif.org/documents/327-singapore-statement-  a4size/file  World  Medical  Association.  (1964).   Declaration  of  Helsinki:  Ethical  principles   for  medical  research  involving  human  subjects .  Adopted  by  the  18th  WMA    General Assembly, Helsinki, Finland. https://www.wma.net/policies-post/wma-  declaration-of-helsinki-ethical-principles-for-medical-research-involving-  human-subjects/ \n265  15. Importancia de la investigación científica para el desarrollo de un país  Lorena Ruiz-Montoya Pablo Liedo  Introducción  La ciencia es una actividad social que surgió de la natural intención de entender   el  funcionamiento  del  mundo  social  y  natural  (Gurri,  2024).  La  actividad     científica  pretende  generar  nuevo  conocimiento  mediante  procedimientos   metodológicos rigurosos y flexibles respecto a temas delimitados, para resolver    problemas  de  índole  social,  humanístico,  ambiental  y  técnico,  entre  otros.    La  ciencia  es  una  actividad  creativa  que  impacta  de  diversas  maneras  y    en  distintos  aspectos  de  la  vida  de  las  personas  y  de  los  grupos  sociales.  Su     impacto en lo individual y a nivel de región y país, hace que se le identifique    como un elemento estratégico del desarrollo de una nación (Aricò, 2014; Díaz-  Canel, 2022; Hallemeier  et al ., 2024).   El  conocimiento  científico  contribuye  al  bienestar  humano  identificando  de   modo confiable los componentes de una problemática particular en algún sector    de la sociedad, al tiempo que ofrece posibles soluciones para ella (Parson, 2004).   Hay  aproximaciones  al  bienestar  que  se  han  convenido  internacionalmente   \n266   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  y  que  se  basan  en  aspectos  generales  reconocibles  y  que  se  pueden  medir    con  precisión  en  un  país,  lo  que  permite  tomar  decisiones  y  generar  políticas    internacionales y nacionales para favorecer un bienestar dado. Algunos de estos   aspectos potencialmente medibles son el social, el económico y el ambiental.    Lo social se refiere a la forma en la que las personas se organizan o estructuran.    Un  territorio  puede  tener  gente  organizada  de  diferentes  maneras.  En  general    se  trata  de  grupos  de  personas  unidas  por  objetivos  comunes,  aunque  en     ocasiones antagónicos que pueden traducirse en conflictos. Los grupos sociales   de las localidades (áreas geográficas relativamente pequeñas, de unos cientos    de km2), regiones y países (áreas de miles de km2), cultivan valores, creencias y  principios comunes que regulan su actuar y que en su conjunto se les denomina   cultura (Pinker, 2018).  El aspecto económico se refiere, en su forma más simple, al valor monetario   que  se  adjudica  a  los  objetos  que  se  intercambian  entre  individuos,  grupos  o    naciones. El valor económico del conocimiento se ha reconocido desde hace    mucho tiempo, y podría situarse en el aprovechamiento científico y tecnológico    para ganar la Segunda Guerra Mundial, hasta los éxitos económicos recientes   de países como Corea del Sur, China y Brasil, en donde el desarrollo de nuevas    capacidades  económicas  se  ha  basado  en  el  conocimiento  científico,  y    sus gobiernos han invertido sistemáticamente en ese rubro (Arechavala, 2011).   El  conocimiento  que  una  sociedad  maneja  se  considera  un  factor  importante    del  desarrollo  económico,  una  moneda  de  cambio,  ya  que  se  considera  que     hay  un  alto  capital  humano,  mano  de  obra  calificada  que  puede  generar    oportunidades  económicas  y  atraer  capital  (Schofer   et  al .,  2000;  Arechavala,   2011; Lloyd, 2018).  El aspecto ambiental es el contexto natural o biológico y físico del territorio donde   se  realizan  las  actividades  humanas;  incluye  las  zonas  que  la  especie  humana    todavía no ocupa. Actualmente se reconoce que estamos ante una emergencia   ambiental,  dado  que  los  recursos  naturales  se  agotan  y  existe  un  deterioro    generalizado  a  causa  de  las  actividades  humanas  (PNUD,  2022).  La  alteración    de  los  ecosistemas  impacta  también  en  aspectos  sanitarios;  los  cambios  en  la    composición y distribución de la fauna silvestre favorecen la diseminación de virus   y su alojamiento en nuevas especies, incluida la humana. En tanto que la provisión   de servicios ambientales (aire, agua, suelo limpio) se pierde al mermar la diversidad    biológica. Estos problemas necesitan ser atendidas, y la investigación científica,    junto  con  otras  formas  de  generación  de  conocimiento  (como  la  tradicional  y   \n267  los  saberes  locales),  puede  revelar  soluciones  duraderas  y  adecuadas  para  el    contexto social y ambiental de un territorio.  El objetivo de este capítulo es presentar una visión reflexiva de la importancia   que  la  ciencia  tiene  para  el  desarrollo  de  un  país.  Se  tomó  como  referencia     la información pública de bases de datos internacionales que se ha resumido    en  parámetros  económicos,  sociales  y  técnicos  de  todos  los  países  (https://  ourworldindata.org/).  Es  importante  hacer  notar  que,  un  análisis  detallado  y    disgregado  de  estos  datos  para  México  escapa  a  los  objetivos  del  presente    trabajo. No obstante, se espera que motive a estudiantes y a lectores en general    a reflexionar sobre lo importante que es la actividad científica para México.   El  capítulo  se  ha  dividido  en  secciones  en  donde  se  retoma  información    elemental para mostrar (1) el impacto del conocimiento científico en parámetros   demográficos, económicos y de salud de la población humana; (2) el impacto    de  la  investigación  en  aspectos  individuales  y  tecnológicos,  y  las  limitantes     como la falta de comunicación social de la ciencia, y (3) se hace referencia   al sistema de ciencia y tecnología mexicano, identificando algunos obstáculos    para su desarrollo y crecimiento. La información fue seleccionada con base en   temas que surgieron con frecuencia durante las discusiones sobre la importancia   de la ciencia para un país en el seminario de tesis de la Maestría en Ciencias de   Manejo de Recursos Naturales y Desarrollo Rural de ECOSUR.  Incremento de la esperanza de vida: un evidente impacto de la ciencia en el bienestar de la sociedad  En los últimos doscientos años la población humana ha crecido a una tasa sin   precedente, y las condiciones de vida han mejorado de modo significativo en el   mundo (Sachs, 2006). Esto se debe, entre otros factores, al conocimiento científico    acumulado y transformado en tecnologías que ayudan a la supervivencia frente   a  enfermedades,  y  a  facilitar  las  tareas  en  el  ambiente  laboral  y  el  del  hogar.     En el año 1800 se estimó que la población mundial era de cerca de mil millones    de habitantes; actualmente es de más de ocho mil millones (figura 15.1) (Roser   y Ritchie, 2023). Como indicadores globales del cambio en las condiciones de    vida podemos usar el ingreso medio per cápita (PIB per cápita) y la esperanza   de vida al nacer. En 1800 el PIB per cápita estaba entre los 500 y 2,000 dólares   por  año  (ajustado  a  dólares  de  2017)  para  la  mayoría  de  los  países,  y  para    15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO... \n268   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  México era de 1,860 dólares. En 2022 estuvo entre los 3,000 y 32,000 dólares para   la mayoría de los países, y en México fue de 19,500 dólares.  La esperanza de vida en 1800 era menor a los 30 años; hoy el promedio mundial es   de 73 años. Obviamente, hay diferencias entre países, pero esa es la tendencia    general.  Figura 15.1. Tamaño poblacional mundial de entre hace 10,000 años a. C. a nuestros   días, con proyección a 2058.  Fuente: Our World in Data (https://ourworldindata.org/). \n269  La figura 15.2 muestra el ingreso medio y la esperanza de vida por país, así como   el tamaño de la población de cada uno, en 2017; y la figura 15.3 muestra esos   mismos indicadores para 1801, 1903, 1954 y 2022 (Rosling  et al ., 2018). Figura 15.2. Relación entre el ingreso medio per cápita, esperanza de vida al nacer y   tamaño de población (círculos) por país en 2017.  15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO...  Fuente: Rosling  et al . (2018), https://www.gapminder.org/ \n270   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En  síntesis,  hoy  somos  más  y  vivimos  mejor.  Algo  que  muchas  veces  se  pensó    imposible ¿Cómo podemos explicar esto? Sin duda, son muchos los factores que    han contribuido y uno de ellos ha sido la investigación científica (Sachs, 2015;    Ritchie  et al ., 2023). Quizá el mejor ejemplo al respecto sea la reducción de la  mortalidad infantil. Se estima que desde el año 300 a. C. hasta inicios del siglo   XX, la tasa de mortalidad en menores de 15 años era cercana al 50%, es decir,    de cada dos nacimientos, solo uno alcanzaba la edad adulta. A mediados del    siglo XX esa tasa bajó al 27%, aproximadamente una muerte por cada cuatro   nacimientos. Hoy esta tasa es del 4.3% (figura 15.4) y la disminución más reciente   se ha observado en todas las regiones del planeta. Aún en África, que tiene la    tasa  más  alta,  esta  es  de  6.6%  menor  a  la  que  de  Latinoamérica  y  Asia  hace     apenas cincuenta años (figura 15.5) (Ritchie, 2018).  Fuente: Rosling  et al . (2018), https://www.gapminder.org/  Figura  15.3.  Ingreso  medio  per  cápita,  esperanza  de  vida  y  tamaño  poblacional   (círculos) por país para 1801, 1903, 1954 y 1922. \n271  Fuente: Roser (2023), https://ourworldindata.org/  15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO...  Figura 15.4. Tasa de mortalidad infantil histórica. \n272   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Fuente: Roser (2023), https://ourworldindata.org/  Sabemos  que  esta  disminución  en  la  mortalidad  se  debe  a  mejores    condiciones  de  vida  (higiene),  nutrición,  agua  y  saneamiento,  y  tratamiento     de las enfermedades. Un denominador común a estos elementos ha sido la   investigación científica sobre las causas de enfermedad y mortalidad, y a partir    de ese conocimiento, el desarrollo de medidas preventivas y curativas. La teoría   de  los  gérmenes  sobre  las  enfermedades  supuso  un  gran  avance  en  la  lucha     contra los microbios. Los científicos identificaron los patógenos que causan las    diferentes  enfermedades,  las  defensas  inmunológicas  y  sentaron  así  las  bases    para  su  prevención  y  curación.  Destacan  las  medidas  de  esterilización,  la    pasteurización,  el  desarrollo  de  los  antibióticos  y  quizás  la  innovación  técnica    más importante en nuestra lucha contra las enfermedades: las vacunas (Roser,  Figura 15.5. Tasa de mortalidad infantil a lo largo de 70 años. \n273  2020).  La  reciente  pandemia  del  covid-19  es  otro  ejemplo  de  cómo  a  partir    del conocimiento científico es posible identificar el agente causal, desarrollar    métodos de diagnóstico, y vacunas.  La información hasta ahora expuesta pone de manifiesto que la investigación   científica impacta directa o indirectamente en el bienestar humano y, por lo    tanto, en el desarrollo de un país.   Importancia de la investigación científica para el desarrollo de un país ¿Todo lo que se investiga científicamente impacta en el desarrollo?  La  ciencia  genera  conocimientos  confiables  y  cercanos  a  la  realidad  de  los   acontecimientos  naturales  y  sociales,  en  algunos  casos  se  consideran  problemas    de  la  sociedad.  La  ciencia  puede  ofrecer  una  o  varias  posibles  soluciones  y  se     opta, individual o  colectivamente,  por  aquella  que  beneficia,  en  principio,  a    una mayoría. De manera que hay una utilidad directa o indirecta de lo que la    comunidad científica investiga.  Han  sido  tres  grandes  problemas  nacionales  que  suelen  ser  constantes,  pero    quizás descritos de maneras distintas a lo largo de la historia: 1) las condiciones   de  pobreza  e  inseguridad  que  afectan  la  salud  y  propician  la  migración;    2)  el  deterioro  ambiental:  contaminación  del  agua,  suelo  y  aire,  pérdida  de     diversidad biológica, fragmentación y degradación de bosques, y 3) el desarrollo    tecnológico acorde a la conservación de los recursos naturales y de elementos   culturales de los pueblos (Merçon  et al ., 2019; CONAHCYT, 2024).  Sin embargo, la solución no solo es responsabilidad de la comunidad científica,    es  compartida  con  el  gobierno  y  con  la  sociedad  (Pouyat   et  al .,  2010).  Por    ejemplo, con base en investigaciones científicas se sabe con cierta profundidad    el proceso de descomposición de desechos o residuos orgánicos e inorgánicos    domésticos;  y  científicamente  se  han  reconocido  procesos  para  acelerar  su    transformación:  lombricomposta,  biodigestores,  reciclados,  etcétera  (Enebe  y     Erasmus, 2023). El acopio y separación son responsabilidad del individuo, y el    moverlos  a  un  destino  correcto  es  responsabilidad  del  gobierno,  el  que  a  su    vez  puede  delegar  a  un  tercero  (empresa).  Como  este  ejemplo  se  pueden    15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO... \n274   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  reconocer otros, en los que es claro que el conocimiento científico tiene un valor   público por los cambios sugeridos (Luna-Sánchez  et al ., 2022) y aporta soluciones  a un problema dado, pero la solución misma está en manos de la sociedad en   su conjunto.  Cualidades del conocimiento científico y efectos directos  e indirectos en la sociedad  Se reconoce que la investigación científica no es la única forma de generar   conocimiento.  El  tradicional  puede  ser  tan  valioso  y  útil  como  el  científico   (Molina Rosales, 2024), y sus formas de integrarlo a la actividad científica está en    proceso de consolidación (Huerta Silva  et al ., 2024). Hasta el momento, el papel    del  científico  en  la  sociedad  es  ofrecer  un  conocimiento  preciso  y  objetivo   del  problema  y  sus  soluciones;  un  conocimiento  confiable  y  verificable  que    permite tomar mejores decisiones. Para generarlo no interviene la fe, el dogma,   el misticismo ni las deidades. Estas formas de conocimiento, desde la perspectiva   de la ciencia, conducen con frecuencia a una idea equivocada de las cosas, y    en la mayoría de las veces no son verificables (no se repite el resultado) (Pinker,   2018). Una decisión basada en información precisa y confiable siempre tendrá   más posibilidades de ser acertada y con muchos más beneficios, que aquella    que se toma lanzando una moneda al aire.  La  ciencia  ha  impactado  en  la  sociedad  de  manera  importante,  y  quizás  se    nota si contrastamos dos momentos distantes del desarrollo de la sociedad.   Wootton (2015, en Pinker, 2018) nos propone que una persona inglesa en 1600   estaría muy convencida de que las siguientes declaraciones eran verdaderas: •   La existencia de brujas que hunden barcos. •   Hombres lobos, que no hay en Inglaterra, pero sí en Bélgica.  •   Los ratones surgen por generación espontánea en los montones de paja.  •   Ha visto un cuerno de unicornio, pero nunca un unicornio.  •   Cree  en  un  ungüento  que,  si  lo  frota  en  la  daga  que  causó  la  herida,    curará la herida. •   La forma, el color y textura de una planta pueden ser claves para conocer   su efectividad como medicina. \n275  Hoy  en  día  nadie  o  casi  nadie  daría  credibilidad  a  estas  aseveraciones,  y    tampoco basaría sus decisiones en ellas. Esto no significa que todo el conocimiento   tradicional,  generado  de  diversas  formas  no  pueda  ser  útil  y  confiable.  Hay   investigación que busca conocer las bases científicas de ese conocimiento.   Comunicación de la ciencia para impactar en la sociedad  La cantidad de información científica disponible en publicaciones científicas a   lo largo de las décadas muestra qué tan activa está la comunidad científica   (figura 15.6). Se estima que, en 2018, se publicaron entre 10 mil y 30 mil artículos   científicos en México, y si bien es un número importante contrasta con los cientos   de miles que se produjeron en Estados Unidos (figura 15.6).  Fuente: OurWorldInData.org/research-and-development (CC BY).  15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO...  Figura 15.6. Número de publicaciones científicas y técnicas anuales en 2018. \n276   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Pese a la cantidad de artículos científicos publicados, con frecuencia se escucha   de instancias de gobierno o de sectores de la sociedad que la generalidad de   la población de un país, como México, desconoce la ciencia que se produce y   en consecuencia no usa el conocimiento para tomar sus decisiones cotidianas.    Dos razones posibles de este probable desconocimiento son que el número de   personas científicas es pequeño con relación al tamaño poblacional y porque   la  comunidad  científica  hace  poca  divulgación  de  la  ciencia.  El  número    de  investigadores  por  millón  de  habitantes  es  altamente  variable  entre  países     (figura 15.7), y en México esta proporción es realmente baja. En la figura 15.8   vemos cómo en México, en 2019, había 327 personas dedicada a la ciencia   y tecnología por cada millón de habitantes, mientras que Suecia tenía 7,834.   Entonces el sector científico en México es pequeño. Incrementar este número    debe ser una meta prioritaria que se debe alcanzar en el corto plazo, y sostener   la proporción a largo plazo. Fuente: OurWorldInData.org/research-and-development (CC BY).  Figura 15.7. Número de personal de investigación y técnico por millón de habitantes en   2017. \n277  Aunque la difusión de la ciencia en la comunidad científica, tanto nacional   como  internacional,  es  una  tarea  medianamente  hecha,  se  cree  que  su    difusión  y  divulgación  entre  la  sociedad  y  los  procesos  de  apropiación  social    de  la  ciencia  tienen  un  fuerte  rezago  en  México  (Vázquez-González,  2014).    Sin duda es necesario fomentar sinergias entre profesionales de la comunicación    y científicos para emprender una mayor y mejor divulgación de la ciencia entre    la población en general. Fuente: OurWorldInData.org/research-and-development (CC BY).  Ciencia y tecnología  Los efectos de la ciencia pueden ser directos e inmediatos, o bien, pueden ser   indirectos  o  de  largo  plazo.  Dentro  del  sector  científico  hay  quienes  realizan    investigaciones claramente dirigidas a mejorar o desarrollar técnicas o modelos   de instrumentación,  software  o métodos operativos, que se incorporan con relativa   facilidad  a  procesos  productivos  que  pueden  ser  incorporados  a  empresas,    procesos agrícolas rurales o empresariales, a organizaciones de base social para   generar utilidades y/o innovaciones técnicas o sociales. El conocimiento que se   15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO...  Figura 15.8. Número de personas de I+D por millón de habitantes. \n278   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  usa relativamente pronto suele generarse por una solicitud específica del sector   que  lo  necesita  para  mejorar  sus  procesos  de  producción  o  servicio  (López-  Hernández y Serrano-Santoyo, 2016).  Por ejemplo, la técnica del insecto estéril   es  un  procedimiento  que  implica  aplicar  radiación  a  los  insectos  plaga  para    provocar  esterilidad  y  se  liberan  masivamente  machos  estériles  (Hendrichs  y    Robinson, 2009). Este método se ha utilizado con buenos resultados en moscas   de  la  fruta  del  género   Anastrepha   spp.  que  infestan  los  cultivos  de  mango  y    naranja  en  México;  en  la  mosca  del  Mediterráneo   Ceratitis  capita   que  infesta   diversas especies de cultivos como el café y una gran variedad de frutales en   Centroamérica, y en regiones de Europa y África (Giunti  et al ., 2023). Este método   se  basa  en  la  cría  de  millones  de  individuos  en  condiciones  controladas  en    cautiverio (Parker  et al ., 2021). A su vez, la cría ha requerido de un conocimiento   muy detallado del desarrollo de los insectos, de identificar las mejores fuentes    de alimento, de reconocer su comportamiento durante la cría, de saber cómo   puede ser su capacidad para buscar hembras silvestres, y su competitividad con   los machos silvestres para lograr el apareamiento (Ito  et al ., 2021). Asimismo, es   necesario monitorear el efecto de la liberación en las poblaciones en campo,    para  constatar  la  eficiencia  de  la  técnica  de  control  (Bouyer    et  al .,  2021).   Aunque esta técnica fue conceptualizada fuera de México (Knipling, 1955), es    de acceso público y es utilizada para el control de insectos plaga y vectores de    enfermedades en muy diversos países.  Es  también  sabido  que,  durante  la  generación  de  conocimiento  en  un  tema    dado, puede revelarse información útil para algo que no se había considerado.    Por  ejemplo,  la  investigación  espacial  ha  permitido  desarrollar  materiales  y     equipos que hoy sirven para otros fines generando beneficios. Así, a partir de    los  trabajos  de  investigación  del  Instituto  Nacional  de  Astrofísica,  Óptica  y    Electrónica  (INAOE)  para  el  Gran  Telescopio  Milimétrico,  surgió  la  capacidad    para desarrollar auxiliares auditivos (Serrano Perez-Grovas, 2018).  Como  estos  ejemplos  hay  otros  en  el  campo  de  la  salud  (medicina),  de    las  tecnologías  de  la  información  y  la  comunicación  (TIC),  y  en  procesos    de  organización  social,  pero  baste  estos  para  mostrar  cómo  la  investigación     científica está involucrada en procesos económicos y sociales de México, y de    forma similar en otros países. \n279  Ciencia y desarrollo individual  La  ciencia  implica  un  querer  saber  del  entorno  y  desarrollar  un  pensamiento    crítico. El conocimiento científico no se guía por la fe, o los deseos o sentimientos    que nos inspire el entorno. Es por esto que se requiere que se reconozcan algunas   de las emociones que impiden la objetividad, por ejemplo, la ira, la envidia o la   ambición desmedida. Por otro lado, si asumimos que el conocimiento es para un    bien común, entonces el pensamiento científico fomenta la empatía. Además, la   preparación científica promueve valores como la honestidad y la cooperación,    a la vez que desalienta otros que limitan el desarrollo de la ciencia, por ejemplo,    el plagio (Liedo y Mesa, 2024). Por lo tanto, inculcar un pensamiento científico    impacta en los valores que hacen que la sociedad, como comunidad o grupo   de personas, viva mejor.  Por otro lado, el estado de emergencia planetaria ha movilizado a la sociedad y   gobiernos hacia el planteamiento de objetivos comunes que implican una gran   transformación social y tecnológica, cambios profundos en el uso de la energía    y recursos, así como modificaciones en la organización de los gobiernos, en los    que la participación de la sociedad en la toma de decisiones es de particular   relevancia; los sistemas de ciencia, tecnología y negocios también deben incluir   las perspectivas de la sociedad (Sachs  et al ., 2019). Las transformaciones requieren   de una sociedad informada y de grupos de investigación multidisciplinarios, con   habilidades para generar conocimiento transdisciplinario (Sach  et al ., 2019), que   fortalezca y aporte información para tomar decisiones individuales y colectivas.   Inversión en ciencia: meta pendiente en México  Se reconoce que la inversión en ciencia y tecnología es fundamental, pero no lo   único, para lograr un desarrollo sustentable y el bienestar de la población. A nivel    internacional se ha considerado que los países deben invertir al menos el 1% de    su PIB en investigación científica y desarrollo tecnológico. Existe una correlación   positiva  entre  la  inversión  en  investigación  y  desarrollo  (I+D)  y  el  número  de    investigadores  por  millón  de  habitantes,  así  como  una  relación  positiva  entre     la inversión en I+D y el PIB per cápita de los países (figura 15.9). Es decir, los países   que más invierten tienen mejores condiciones de vida (figura 15.10).   15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO... \n280   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En la figura 15.11  se observa la serie de tiempo de la inversión en ciencia y   tecnología  como  porcentaje  del  PIB,  de  1996  a  2020,  para  11  países.  Un  caso    paradigmático es el de Corea del Sur, que decidió basar su desarrollo invirtiendo   en ciencia y tecnología. En 2021 fue el segundo país con mayor inversión (4.8%).   En  México,  la  falta  de  inversión  es  clara  y  se  constata  con  este  indicador.  La    mayor inversión fue en 2010-2011 cuando fue de 0.5% del PIB; sin embargo, para    2020 se redujo a 0.3% (figura 15.11). Es evidente que para lograr un desarrollo    sustentable  y  el  bienestar  de  la  población  en  México,  se  requiere  una  mayor    inversión  en  ciencia  y  tecnología  (cercana  al  1%  del  PIB),  lo  cual  permitirá     aumentar la relación del número de personas dedicadas a la investigación por    millón de habitantes. Fuente: OurWorldInData.org/research-and-development (CC BY).  Figura 15.9. Número de investigadores y técnicos en relación con el PIB por país. \n281  Fuente: Monge-González (2016), http://dx.doi.org/10.18235/0009270  15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO...  Figura 15.10. Relación entre la inversión en ciencia y desarrollo como porcentaje del PIB   y el PIB per cápita. \n282   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Fuente: OurWorldInData.org/research-and-development (CC BY).  Sistema científico mexicano  México,  como  muchos  otros,  cuenta  con  un  sistema  de  ciencia  y  tecnología.    Y  el  Consejo  Nacional  de  Humanidades,  Ciencias  y  Tecnologías  (CONAHCYT,    recientemente transformada en Secretaría de Ciencia, Humanidades, Tecnología   e  Innovación)  es  la  instancia  del  gobierno  federal  que  promueve  el  desarrollo    de este sistema. Para ello maneja fondos federales que tienen el propósito de   impulsar programas de investigación y desarrollo tecnológico en universidades    y centros públicos o privados de investigación, y de apoyar la formación de   recursos humanos en ciencia y tecnología con la finalidad de la transformación   y bienestar de la sociedad con base en el conocimiento científico (Ruiz León y    Russell Barnard, 2016; Vázquez-González, 2014). Figura 15.11. Serie de tiempo del gasto en investigación y desarrollo como porcentaje   del PIB. \n283  El  CONAHCYT  administra  directamente  25  centros  públicos  de  investigación   (CONAHCYT  2024,  figura  15.12),  entre  ellos  El  Colegio  de  la  Frontera  Sur   (ECOSUR). Los centros públicos de investigación son instituciones paraestatales,   con  naturaleza  jurídica  diferente,  cuyo  personal  cuenta  con  distintos  perfiles    profesionales  y  especialidades  temáticas  diversas,  por  lo  que,  junto  con     instituciones  de  educación  superior  e  investigación,  públicas  y  privadas,  se    pueden considerar como nodos especializados de una gran red mexicana de    colaboración científica (Ruiz León y Russell Barnard, 2016; Mejía-Trejo y Aguilar-  Navarro,  2022),  distribuida  ampliamente  en  el  país  (figura  15.12).  También  se    articula  con  sus  homólogos  estatales  para  que  la  ciencia  y  tecnología  sea    pertinente a las condiciones sociales y ambientales de las entidades federativas   en  las  que  tienen  sedes.  Las  líneas  de  investigación  son  diversas,  y  todas  ellas    contribuyen a la solución de problemas sociales y ambientales de México.  Conclusiones  La  ciencia,  como  toda  construcción  social,  depende  de  la  evolución  de  la    cultura  y  de  la  resolución  de  preguntas  y/o  problemas  de  la  vida  cotidiana.     La ciencia tiene como medio y desarrollo la aplicación flexible y rigurosa del   método científico. El contexto social y ambiental no son fijos, por lo que siempre    se presenta la necesidad de ajustes o actualizaciones.  Sin embargo, para acelerar el desarrollo científico de países como México, se   requiere,  entre  otras  cosas,  de  una  mayor  inversión  en  I+D  para  incrementar  y     mejorar la formación científica y tecnológica de las generaciones venideras.    También  se  necesitan  programas  de  ciencia,  tecnología  e  innovación  que    respondan a la realidad local o regional. Programas que conduzcan a generar   tecnologías  propias  que  permita  mayor  independencia  tecnológica.  Por  otro    lado, es importante destacar que el conocimiento tradicional y su integración    con la generación de conocimiento científico debe ser considerado, ya que    puede desempeñar un papel determinante en el desarrollo de una nación.  Asimismo,  la  solución  de  los  grandes  problemas  nacionales  como  la  pobreza,    inequidad, discriminación, violencia, la falta de cobertura en educación (en sus   diferentes niveles: básica, media superior y superior), contaminación ambiental,   deforestación,  pérdida  de  la  biodiversidad,  calentamiento  global,  y  cambio    climático, por mencionar algunos problemas que nos aquejan, no pueden ser   15. IMPORTANCIA DE LA INVESTIGACIÓN CIENTÍFICA PARA EL DESARROLLO... \n284   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  resueltos solo por la ciencia, pero esta sí tiene mucho que aportar para el debate   y para la toma de mejores decisiones de política pública.  Fuente: Elaboración propia.  Figura 15.12. Distribución geográfica de 25 centros públicos de CONAHCYT (2024). \n285  No cabe duda que la investigación científica es importante e imprescindible   para  el  desarrollo  de  los  pueblos  y  las  naciones.  Sin  embargo,  hace  falta  que     las políticas públicas y económicas incluyan a la ciencia e innovación tecnológica    para  que  reciba  la  atención  y  el  apoyo  necesario.  En  el  caso  particular  de     México, es necesario que la investigación científica sea reconocida y valorada    en su justo contexto y por sus aportaciones al desarrollo del país y, sobre todo,    sea  financiada,  ya  que  sin  recursos  no  puede  haber  desarrollo  científico  y    tecnológico que permita la independencia. Algunos especialistas han mostrado    que asignar entre un 1.5 hasta un 3% del PIB, para que el potencial científico y    tecnológico sea notable, y así sea evidente el impacto deseado en la sociedad.    Por otro lado, se debe considerar que el desarrollo de la investigación científica    tiene valor de intercambio económico, ambiental y sociocultural.   Agradecimientos  A  ECOSUR,  por  ser  una  institución  noble  para  el  desarrollo  de  la  investigación     científica en el sureste mexicano; a los más de 300 estudiantes del diplomado en   línea Introducción a la Investigación Científica, que se impartió desde ECOSUR;    a los más de 500 estudiantes de la Maestría en Ciencias en Manejo de Recursos   Naturales y Desarrollo Rural, por su entusiasmo y disposición a escuchar y discutir    respecto al método científico.  Referencias  Arechavala-Vargas, R. (2011). Las universidades y el desarrollo de la investigación   científica y tecnológica en México: Una agenda de investigación.  Revista de   Educació         }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        const k = apiKeyInput.value.trim();
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl(k, 'bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl(k, 'bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl(k, 'user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const k = apiKeyInput.value.trim();
        const botAvatarUrl = getAvatarUrl(k, 'bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { addMsg('Por favor, obtén u provee una API Key válida.', 'system error'); return; }
        if (!question || isProcessing) return;
        localStorage.setItem('pollinations_api_key', apiKey);
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        let prompt = 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF incrustados en esta conversación y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros materiales, programación arbitraria no vinculada al documento, etc.). ' +
            'Si la pregunta NO tiene relación con el documento ni con ese tema, responde ÚNICAMENTE una línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento.';
        try {
            const res = await fetch('https://gen.pollinations.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: 'system', content: systemInstructions },
                        { role: 'user', content: prompt }
                    ]
                })
            });
            if (!res.ok) { let e=''; try{e=await res.text();}catch(_){} throw new Error('Error de API: ' + res.status + ' ' + res.statusText + '. ' + e.substring(0,200)); }
            const data = await res.json();
            const raw = data.choices?.[0]?.message?.content?.trim() || '';
            if (/^\[FUERA_DE_ALCANCE\]/.test(raw)) {
                dismissThinkingAsSystem(raw.replace(/^\[FUERA_DE_ALCANCE\]\s*/, ''), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
