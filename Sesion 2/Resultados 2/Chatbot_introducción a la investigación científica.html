    <style>
        :root{--primary:#007bff;--secondary:#6c757d;--light:#f8f9fa;--dark:#343a40;--success:#28a745;--danger:#dc3545;--warning:orange;--radius:8px;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--bg:var(--light);--text:var(--dark);--card:#fff;--border:#ddd;--input:#fff;--iborder:#ccc;--bot-bg:#e9ecef;--bot-text:var(--dark);--user-bg:var(--primary);--user-text:#fff;--sys-bg:#fff3cd;--sys-text:#856404;}
        body.dark-mode{--bg:#212529;--text:#f8f9fa;--card:#343a40;--border:#495057;--input:#495057;--iborder:#6c757d;--bot-bg:#495057;--bot-text:#f8f9fa;--sys-bg:#332701;--sys-text:#ffeb8f;}
        body{font-family:var(--font);margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;transition:background .3s,color .3s;}

        header h1{color:var(--primary);margin:0;font-size:1.6em;}
        header p{margin:5px 0 0;font-size:.9em;color:var(--secondary);}
        .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
        .api-key-container{display:flex;gap:8px;align-items:center;flex-grow:1;}
        .api-key-container input{padding:7px;border:1px solid var(--iborder);border-radius:var(--radius);background:var(--input);color:var(--text);flex-grow:1;}
        button{background:var(--primary);color:#fff;border:none;padding:8px 15px;border-radius:var(--radius);cursor:pointer;font-size:.9em;transition:background .2s;}
        button:hover{background:#0056b3;}
        button:disabled{background:var(--secondary)!important;opacity:.65;cursor:not-allowed;}
        #theme-btn{background:var(--secondary);}
        .toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

        .btn-export:hover{background:#0056b3;}
        .pdf2-section{padding:10px;border:1px dashed var(--border);border-radius:var(--radius);}

        .chat-display .user-message,.chat-display .bot-message,.chat-display .system-message{margin-bottom:10px;word-wrap:break-word;}
        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}
        .message{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;max-width:100%;}
        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}
        .avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #eee;background-color:#f0f0f0;}
        body.dark-mode .avatar-img{border-color:#444;background-color:#555;}
        .message-bubble{padding:10px 15px;border-radius:18px;max-width:85%;word-wrap:break-word;line-height:1.5;display:flex;flex-direction:column;}
        .user-message .message-bubble.user-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:5px;margin-left:auto;}
        .bot-message .message-bubble.bot-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:5px;margin-right:auto;}
        .chat-display .message-bubble strong{color:var(--primary);font-size:.9em;}
        .chat-display .bot-message .message-bubble p{margin:0 0 8px;}.chat-display .bot-message .message-bubble p:last-child{margin:0;}
        .chat-display .bot-message .message-bubble pre{background:var(--dark);color:var(--light);padding:10px;border-radius:5px;overflow-x:auto;}
        .chat-display .bot-message .message-bubble code{background:rgba(0,0,0,.1);padding:2px 4px;border-radius:3px;}
        body.dark-mode .chat-display .bot-message .message-bubble code{background:rgba(255,255,255,.1);}
        .chat-display .system-message{background:var(--sys-bg);color:var(--sys-text);text-align:center;font-style:italic;font-size:.9em;padding:8px 12px;border-radius:var(--radius);}
        .chat-display .system-message.error{background:#f8d7da;color:#721c24;}
        .thinking-animation{opacity:.75;animation:pulseThink 1s ease-in-out infinite;}
        @keyframes pulseThink{50%{opacity:1}}
        .input-area{display:flex;gap:10px;}
        #question-input{flex-grow:1;padding:10px;border:1px solid var(--iborder);border-radius:var(--radius);font-size:1em;resize:none;background:var(--input);color:var(--text);}
        #send-button{background:var(--success);padding:0 20px;display:flex;align-items:center;justify-content:center;gap:8px;}
        #send-button:hover{background:#1e7e34;}
        .loader{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:16px;height:16px;animation:spin 1s linear infinite;display:none;}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        footer{text-align:center;padding:12px;background:var(--dark);color:var(--light);font-size:.8em;margin-top:20px;}
        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}
    </style>

    const PDF_TEXT = "1 \n\nEn memoria de Adriana Elena Castro Ramírez \n\n\nEE  001.420972  I5   Introducción a la investigación científica  / Lorena Ruiz Montoya, Francisco Delfín  Gurri, Ramón Abraham Mena Farrera, Pablo Liedo, editores. - San Cristóbal de Las   Casas, Chiapas, México:    El Colegio de la Frontera Sur, 2025.   1 recurso digital : PDF 291 páginas : fotografías, gráficas, ilustraciones, mapas,    retratos ; 16 MB  Incluye bibliografía  E-ISBN: 978-607-26900-4-2      1. El Colegio de la Frontera Sur (México), 2. Investigación científica, 3.   Comunicación científica,   4. Metodología científica, 5. México, I. Ruiz Montoya, Lorena (editora), II. Gurri    García, Francisco D. (editor), III. Mena Farrera, Ramón Abraham (editor), IV. Liedo   Fernández, José Pablo (editor) Primera edición digital, abril de 2025 Ilustración de portada: Pixabay Esta publicación fue sometida a un estricto proceso de arbitraje por pares, con base en los lineamientos establecidos por el Comité Editorial de El Colegio de la Frontera Sur.  D. R. © El Colegio de la Frontera Sur Carretera Panamericana y Periférico Sur s/n, C. P. 29290 Barrio María Auxiliadora San Cristóbal de Las Casas, Chiapas, México www.ecosur.mx Cita recomendada: Ruiz-Montoya, L., Gurri, F. D., Mena-Farrera, R. A., Liedo, P.  (eds.). (2025).  Introducción a la investigación científica . San Cristóbal de Las Casas,  Chiapas, México: ECOSUR. https://biblioteca.ecosur.mx/cgi-bin/koha/opac-detail.pl?biblionumber=65104 Se autoriza la reproducción de esta obra para propósitos  de divulgación o didácticos, siempre y cuando no existan fines de lucro,  se cite la fuente y no se altere el contenido (favor de dar aviso: llopez@ecosur.mx). Cualquier otro uso requiere permiso escrito de los editores. Hecho en México /  Made in Mexico   \nPresentación  Antonio Saldívar Moreno  Introducción  Lorena Ruiz-Montoya, Francisco Delfín Gurri, Ramón Abraham  Mena Farrera, Pablo Liedo  Parte 1: Qué es y cómo hacer ciencia  1.   ¿Qué es la ciencia?   Francisco Delfín Gurri  2.   Sujetar a prueba las ideas   Hugo Perales Rivera  3.   La etnografía como herramienta transdisciplinaria   Dolores Ofelia Molina Rosales  4.   La práctica de la investigación cualitativa en ECOSUR   Angélica Aremy Evangelista García  5.   Metodologías cualitativas en ámbitos sociodigitales   Ramón Abraham Mena Farrera  6.   Del tema a la pregunta de investigación   Susana Maza-Villalobos Méndez, Rebeca Gasca  7.   El protocolo de tesis: la ruta para una tesis exitosa   María Mercedes Castillo Uzcanga  Parte 2: Comunicación científica  8.   Información científica: búsqueda, selección y uso ético   Adacelia X. López-Roblero, Mercedes Guadarrama-  Olivera, Marisela Betanzos-Reyes, Lorena Reyes-Sánchez  9.   Una estrategia de lectura de artículos científicos: “Adivina    el mensaje”   Lorena Ruiz-Montoya  CONTENIDO  9  13  21  23  35   51  71  91 107   123  141  143  177 \n10. Comunicación verbal (ORAL) de la ciencia   Juan Cisneros Hernández  11. Escribir bien para comunicar bien   Laura López Argoytia  12.   Escritura de un artículo científico: importancia y        características básicas  Pablo Liedo, Lorena Ruiz-Montoya  Parte 3: La ciencia en sociedad  13. La investigación científica como profesión  Sergio Ignacio Salazar Vallejo  14.   Implicaciones éticas de la investigación científica  Pablo Liedo, M. Azahara Mesa-Jurado  15.  Importancia de la investigación científica para el        desarrollo de un país  Lorena Ruiz-Montoya, Pablo Liedo  De las autoras y autores  191  201  209  229  231   247  265  289 \n9  PRESENTACIÓN  Existen libros que provocan un particular gusto y alegría para ser presentados:   aquellos  que  se  construyen  desde  una  amplia  y  rica  experiencia  que  los    alimenta  y  da  vida,  y  aquellos  que  su  lectura  depara  aprendizajes,  desafíos    y  convicciones.  Libros  que  son  construcciones  sociales  basadas  en  prácticas    educativas,  de  investigación  y  de  vida  que  se  van  enriqueciendo  conforme    pasa el tiempo, que justo su fortaleza está en ser experiencias que se mejoran    conforme  se  desarrollan,  se  reflexionan  constantemente,  se  transforman    permanentemente  y  se  construyen  durante  años.  Este  libro  contiene  esas    características. Es resultado no solo de una amplia experiencia de quienes lo   coordinan  y  escriben,  sino  también  de  una  pasión  y  emoción  que  tienen  las     personas que lo hicieron, por su trabajo como científicas y científicos que han    dedicado su vida a esta noble actividad.   En  los  30  años  de  existencia  de  El  Colegio  de  la  Frontera  Sur  (ECOSUR)   —cumplidos  recientemente,  en  octubre  de  2024—,  hemos  testificado  una   transformación en el panorama del conocimiento científico, en particular en el    contexto de México y el sureste del país. Desde su fundación, esta institución ha   jugado un papel crucial en la formación de generaciones de investigadoras e   investigadores, así como en la producción de conocimientos innovadores que   abordan los retos ambientales, sociales, culturales y económicos de la región.   El libro  Introducción a la investigación científica , coordinado por Lorena Ruiz-  Montoya, Francisco Delfín Gurri, Ramón Abraham Mena Farrera y Pablo Liedo,  \n10   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  es un fiel reflejo de ese esfuerzo colectivo y un testimonio del compromiso de   ECOSUR con la excelencia académica, el rigor científico y la pertinencia social.  La formación y educación en pensamiento científico y ciencias, tanto en el nivel   de pregrado como en el de posgrado, representa una piedra angular para el   desarrollo de una sociedad crítica, creativa y capaz de enfrentar los desafíos del   futuro y de imaginar posibilidades de esperanza y de transformaciones sociales,   tan  importantes  en  estos  tiempos.  Este  libro,  dirigido  a  estudiantes,  docentes  y    personas interesadas en la producción de conocimiento y en la ética ambiental   y  transformación  social,  ofrece  una  guía  para  comprender  y  practicar  la     investigación  científica  desde  una  perspectiva  amplia  y  multidisciplinaria.  A   través  de  sus  tres  bloques,  “Qué  es  y  cómo  hacer  ciencia”,  “Comunicación   científica” y “La ciencia en sociedad”, las personas lectoras encontrarán una   diversidad de enfoques, ejemplos, anécdotas, herramientas y reflexiones que   fomentan  una  comprensión  integral  del  quehacer  científico.  Un  quehacer   científico humanizado, que genera interés y pasión por desarrollarlo.  Un  aspecto  que  considero  esencial  destacar  es  el  énfasis  que  la  experiencia    de  ECOSUR  pone  en  la  integración  de  paradigmas  y  epistemologías.  En  un    mundo en constante cambio y en una crisis civilizatoria cada vez más evidente,    la  investigación  científica  no  puede  encerrarse  en  una  sola  metodología  o   disciplina. Este libro invita a dialogar entre múltiples tradiciones intelectuales y    metodológicas, promoviendo un aprendizaje que no solo respeta las diferencias,   sino que también busca construir puentes entre ellas. En ECOSUR hemos aprendido   que la ciencia se enriquece cuando es diversa, y este principio atraviesa cada   capítulo de esta obra; por tanto, uno de sus grandes aportes es reconocer que   a pesar de las diferencias podemos convivir, aprender y trascender el mundo.  La  celebración  de  30  años  de  ECOSUR  nos  lleva  a  reflexionar  sobre  nuestro   impacto en la sociedad, en la región y más allá de nuestras fronteras. Este libro   es  una  muestra  del  tipo  de  conocimientos  que  buscamos  generar:  relevante    para  la  vida  de  las  personas,  riguroso  en  su  planteamiento  y  crítico  en  su    ejecución. Aquí se encontrarán propuestas para entender y abordar los desafíos   socioambientales  de  nuestro  tiempo,  siempre  desde  una  perspectiva  que    combina metodologías cualitativas y cuantitativas con un compromiso ético y   social. Un nuevo hito fundacional que aporta este libro para ECOSUR es la gran   oportunidad de reconocer la diversidad teórica y metodológica como un valor    y no como una competencia, como una forma de enriquecer la labor científica  \n11  y no de descalificarla, una apuesta por la responsabilidad social y no por la   apatía e individualismo.  Invito a recorrer sus páginas, ya sea de principio a fin o explorando cada capítulo,   según los intereses de quien lea. Cada contribución está pensada para inspirar,   desafiar  y  guiar  a  las  nuevas  generaciones  de  científicos  y  científicas  en  su    camino; está diseñada para que las comunidades académicas se enriquezcan   y colaboren. En cada capítulo no solo se responde a la pregunta de cómo se   hace  ciencia,  sino  también  al  porqué  hacemos  ciencia,  un  cuestionamiento    trascendental en un momento en el que se necesita más que nunca de soluciones   basadas en la generación de nuevos conocimientos y prácticas sociales.  No  dudo  que  disfrutarán  y  se  enriquecerán  con  la  lectura  de  esta  obra.  Nos    dará gusto encontrarnos en el camino y seguir dialogando y aprendiendo con   ustedes  y  con  el  personal  académico  de  ECOSUR  que  contribuyó  para  crear     esta posibilidad de encuentro reflexivo, crítico y que da sentido y significado a la   labor científica en tiempos complejos.  Antonio Saldívar Moreno  Director General de El Colegio de la Frontera Sur San Cristóbal de Las Casas, Chiapas, una mañana fría pero soleada del invierno de 2025 PRESENTACIÓN \n\n13  INTRODUCCIÓN  Lorena Ruiz-Montoya Francisco Delfín Gurri Ramón Abraham Mena Farrera Pablo Liedo  A  diferencia  de  otras  obras  sobre  el  tema,  esta  surge  de  un  curso  de  un    posgrado  multidisciplinario  que  recibe  a  estudiantes  de  diferentes  campos     del conocimiento con quienes se discuten elementos teóricos y filosóficos de   distintas  tradiciones  científicas,  con  el  propósito  de  ayudarlos  a  la  toma  de    decisiones  metodológicas  de  sus  respectivas  tesis.  El  personal  académico     que participa en esta obra tiene experiencia en la investigación científica en    diversas áreas y en el desarrollo de proyectos de investigación multidisciplinaria   y transdisciplinaria. En ese sentido, la presente obra ofrece:  elementos de juicio    para  identificar  y  caracterizar  el  conocimiento  científico;  antecedentes  y  un   contexto histórico social de la actividad científica; reconocer los mecanismos    sociales de la ciencia contemporánea y sus implicaciones éticas; comprender    la importancia del método científico, tradiciones intelectuales alternativas y los    métodos de investigación cualitativa y cuantitativa; aplicar elementos teóricos    y metodológicos para formular preguntas de investigación científica, hipótesis  \n14   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  y modelos; conocer elementos y herramientas de la comunicación científica; y   construir un protocolo de tesis teniendo un conocimiento claro de los elementos   que lo integran y las etapas que se requieren para su desarrollo.  El libro está dirigido a universitarias y universitarios con interés en formarse como   científicos, y a quienes deseen conocer un poco más de los procesos asociados   a  la  producción  de  conocimiento  científico;  también  pretende  motivar  a   la  reflexión  de  que  generar  ciencia  es  una  actividad  creativa  que  requiere   flexibilidad y autocrítica.  Hemos dividido este trabajo en tres partes, 1) “Qué es y cómo hacer ciencia”, 2)   “Comunicación científica” y 3) “La ciencia en la sociedad”. La primera parte está   integrada por siete capítulos y abre con el que se titula “¿Qué es la ciencia?”,    texto donde el autor nos lleva por un recorrido histórico que nos ilustra sobre cómo    surge la ciencia; y discute las reflexiones de los filósofos que han buscado explicar   cómo  avanza  el  conocimiento  científico.  De  manera  introductoria  aborda  el   origen de los conceptos que son el tema de los siguientes tres capítulos: “Sujetar   a prueba las ideas”, “La etnografía como herramienta transdisciplinaria” y “La    tradición de la investigación cualitativa en ECOSUR”.  El capítulo “Sujetar a prueba las ideas” discute el método hipotético deductivo   denominado  “método  científico”.  Nos  muestra  cómo  la  forma  ideal  para    avanzar  en  nuestro  conocimiento  es  factible  mediante  la  generación  de    hipótesis que puedan ponerse a prueba y/o ser rechazadas. El autor nos brinda   estrategias y herramientas técnicas para lograrlo, y consejos para elaborar hipótesis   partiendo de la observación de la evidencia empírica. Alternativamente, por el    lado inductivo, nos acerca a la búsqueda del modelo que tenga la máxima    verosimilitud  para  describir  un  conjunto  de  datos,  un  mecanismo  que,  sin    embargo,  estará  incompleto  mientras  las  observaciones  no  se  expresen  como    hipótesis ni se pongan a prueba.  En  “La  etnografía  como  herramienta  transdisciplinaria”,  la  autora  nos  muestra   la forma en que diferentes escuelas del pensamiento interactúan para originar   conocimiento científico. Observa que, aunque los antropólogos señalan su origen    intelectual en la hermenéutica, esto es, el análisis medieval de la interpretación de   textos cuyo origen es distinto al del empirismo, que es la tradición intelectual de la    mayoría de los científicos de ECOSUR, la interacción entre estos se ha convertido en    una amalgama que actualmente genera proyectos transdisciplinarios que hacen   posible el análisis de sistemas socioambientales y que esta institución contribuya  \n15  al desarrollo sustentable. El capítulo es también una introducción a esta tradición   intelectual que, responsable de la creación del método etnográfico, combina los    métodos cualitativos y cuantitativos en un sistema estratégico que se transforma    según lo hagan las explicaciones de la realidad.  Aunque sería ideal que el conocimiento científico se construyera a través de la   discusión interna de tradiciones de investigación, a menudo el conflicto entre    escuelas  conduce  a  formas  distintas  de  generar  conocimiento.  Quizá  uno  de     los  conflictos  más  trascendentales  en  la  filosofía  de  la  ciencia  del  siglo  XX    surge con la publicación en 1962 de  La estructura de las revoluciones científicas   de Thomas Kuhn. En su libro, este filósofo rechaza la versión de Karl Popper (véase    el capítulo 1) sobre el origen de las preguntas de investigación y cómo se aceptan   o rechazan las hipótesis (capítulo 2), y elabora el concepto de  paradigma  para   describir una percepción de la realidad compartida por los científicos. Se trata    de  una  visión  que  legitima  supuestos  y  que  guía  la  investigación  incluyendo    todo su proceso. La aceptación de esta nueva forma de percibir el quehacer    científico y su objetividad no afectó la praxis en las ciencias naturales y físicas   donde muchos científicos permanecieron ajenos a las propuestas de Kuhn. En    las ciencias sociales y la psicología, sin embargo, con la publicación en 1968 de    La construcción social de la realidad  de Peter L. Berger y Thomas Luckmann, se   abrió un cisma epistemológico que condujo a la separación de las asociaciones   profesionales y departamentos académicos más prestigiosas del mundo, y por   supuesto, afectó a las demás.  En “La práctica de la investigación cualitativa en ECOSUR”, se refleja el conflicto   mencionado cuestionando la aplicación del empirismo en las ciencias sociales.   Basado en la propuesta de Berger y Luckman, en este tercer capítulo del libro se   avanza en el socioconstruccionismo, el cual refuta la creencia de que la realidad   existe  con  independencia  de  nuestras  acciones.  Frente  al  método  hipotético     deductivo, a menudo calificado de “metodología positivista” o “heredada” en    las ciencias sociales, están los métodos que, asociados al socioconstruccionismo,   se  les  conoce  como  cualitativos,  mismos  que  son  especialmente  adecuados    para  producir  conocimiento  a  partir  de  relatos  y  narrativas,  lo  que  promueve    tanto el descubrimiento de nuevas ideas, como la transformación personal de   quien  investiga.  La  radicalización  de  las  posiciones  se  ha  ido  paliando  y  en  la    actualidad  los  estudios  sistémicos  que  se  realizan  en  ECOSUR  y  en  el  mundo     integran métodos cualitativos y cuantitativos (capítulo 3).  INTRODUCCIÓN \n16   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  El capítulo 5, “Metodologías cualitativas en ámbitos sociodigitales”, nos acerca al   tipo de investigación integrada que se desarrolla en ECOSUR. Nos presenta una   síntesis de los proyectos en los que las metodologías cualitativas y cuantitativas   se usan por separado y aquellos otros donde estas se utilizan en concomitancia   para llevar a cabo investigación en el espacio sociotécnico, el cual, nos advierte    el autor, será cada vez más socorrido en la creación de conocimiento científico.  Los  siguientes  dos  capítulos  son  de  vocación  más  práctica  y  ofrecen    recomendaciones que ayudarán a la o el estudiante a iniciar su investigación. El    6, “Del tema a la pregunta de investigación”, presenta ejercicios para reflexionar    sobre las decisiones que se deberán tomar. Ambos capítulos, el 5 y el 6, dejan   claro que, en la formulación de una pregunta de investigación, las inquietudes   personales  no  están  aisladas,  sino  que  deben  surgir  de  un  corpus  teórico  que    se conoce por medio de la lectura y la interacción con los tutores. El resultado    de esta búsqueda se sostiene en ambas aportaciones, guiará el proceso de   investigación y por tanto influirá en la eficiencia del proyecto, la metodología    escogida y el alcance de sus resultados.  El capítulo 7, “El protocolo de tesis: la ruta para una tesis exitosa”, es un texto   obligado para todos los que se han propuesto emprender una carrera profesional   en la investigación. Se trata de una excelente guía paso a paso de lo que hay   que  hacer,  sin  olvidarse  de  respaldar  teóricamente  el  porqué.  Como  en  el    capítulo 6, se insiste en que la pregunta de investigación es la que guía todos   los  elementos  del  proceso,  y  da  recomendaciones  que  permitirán  elaborar    propuestas de investigación diseñadas para responder esta pregunta.  La segunda parte, “Comunicación científica”, se integra de cinco capítulos que   nos  enseñan,  en  primer  lugar,  a  encontrar  y  luego  a  navegar  las  montañas  de    información que se deben procesar antes de poder hacer ciencia. El capítulo 8,    “Información científica: búsqueda, selección y uso ético”, está dedicado a este   tema y resulta ser un abecé que nos orienta para utilizar eficazmente los recursos   bibliográficos que se encuentran disponibles en la era de las TIC, una herramienta   que ha hecho más sencilla la búsqueda de información, aunque también ha    incrementado las posibilidades de incurrir en faltas éticas, como caer en el plagio   sin apenas darse cuenta. El capítulo nos ayuda a evitar estos errores.  La  lectura  de  artículos  científicos  sin  quedarse  dormidos  y  saber  extraer  de   ellos  la  información  con  una  mejor  estrategia  es  el  tema  del  capítulo  9.  Sus   \n17  recomendaciones ayudan a aprender de forma efectiva, pues, como asegura   la  autora,  “lo  que  bien  se  aprende  nunca  se  olvida”.  Si  tenemos  temor  al   enfrentarnos a un documento científico y pensamos que es denso y aburrido,   la recomendación es leer este capítulo y “adivinar el mensaje”. Así veremos    que  el  orden  de  la  lectura,  su  profundidad  y  estrategias,  dependerán  de  los    objetivos individuales y de los conocimientos con los que contamos al momento   de enfrentarnos a este género de textos.  Esta segunda sección continúa con el tema  de la comunicación de la ciencia;   y  es  que  una  investigación  solo  se  puede  considerar  terminada  y  exitosa  cuando    sus resultados son compartidos. De hecho, para que el conocimiento generado se   acepte como objetivo (véanse los capítulos 1 y 12), debe compartirse y ser objeto de    crítica por parte de otros científicos pares. Para llegar a esto existen varios procesos.  El primero de dichos procesos lo aborda el capítulo 10, “Comunicación verbal   (ORAL) de la ciencia”. Su autor nos propone consejos prácticos para preparar   presentaciones  orales  de  nuestra  investigación.  Nos  recomienda  con  gran    sencillez  dejar  claro  lo  que  hicimos  y  cómo  lo  hicimos.  Cuando  se  trata  de    pares, en congresos o defensas de tesis, la comunicación oral de la ciencia es la    primera oportunidad de responder y modificar nuestro trabajo antes de abrirlo a   la comunidad científica que lo validará una vez publicado. Por ello el autor nos   recuerda que los pares no son la única audiencia y que la presentación oral es   un excelente mecanismo de difusión para atender al público en general.  Ahora  bien,  para  que  una  investigación  esté  completa,  hay  que  escribirla  y    publicarla. Con esa intención el capítulo 11, “Escribir bien para comunicar mejor”,    ofrece  un  vistazo  panorámico  a  la  historia  e  importancia  de  la  comunicación    escrita,  y  termina  con  algunas  sugerencias  para  lograr  la  coherencia  en  la    redacción y la recomendación de libros que nos pueden ayudar en esto.  En el capítulo 12, “Escritura de un artículo científico: importancia y características   básicas”, los autores afirman con toda razón que “El artículo científico [...] representa   la finalización de un proyecto de investigación científica”. Si el protocolo ubica    nuestro paradigma y guía nuestra metodología, es la publicación de un artículo    científico lo que hace objetivo nuestro trabajo y hace que la ciencia avance. Este    capítulo nos guía a través de la elaboración de un artículo, nos ayuda a distinguir   entre las diferentes formas de publicación, y a elegir los espacios adecuados para   publicar, de modo que nuestros hallazgos se integren al conocimiento universal, y   no se reduzcan a ser un ejercicio de aprendizaje individual.  INTRODUCCIÓN \n18   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  La  tercera  parte  se  titula  “La  ciencia  en  la  sociedad”,  y  el  capítulo  13,  “La   investigación científica como profesión”, la encabeza. El autor nos da un  tour  histórico que va desde los primeros científicos profesionales hasta la actualidad.    Su  interés  por  la  historia  le  sirve  de  marco  para  discutir  el  camino  que  debe     seguir un estudiante para convertirse en científico o científica profesional. Sus   consejos, aunque elaborados sobre todo para futuros científicos mexicanos, son   universales. Y sus reflexiones sobre cómo lidiar con las condiciones particulares    de nuestro país le dan un valor agregado para quienes eventualmente estarán    buscando  financiamiento  en  México  y  desean  desarrollar  una  carrera  en  el   ambiente científico nacional.  El capítulo 14, “Implicaciones éticas de la investigación científica”, nos recuerda   que los científicos tienen defectos y que también caen en las tentaciones como    cualquier  ser  humano.  Es,  sin  embargo,  un  capítulo  muy  positivo.  El  imperativo     de publicar en revistas científicas (véase el capítulo 12) no solo hace posible el   avance  del  conocimiento,  además  expone  y  nulifica  resultados  derivados  de   malas prácticas, como el fraude, la falsificación o los errores. La autora y el autor   explican cómo, a través de publicaciones y reuniones académicas, los científicos    forman  una  comunidad  dinámica  capaz  de  corregir  sus  propias  acciones.    Ejemplos son los acuerdos de Helsinki y el protocolo de Nagoya que transformaron   o  prohibieron  prácticas  que  alguna  vez  nos  dieron  información,  pero  que  en  la    actualidad se consideran no éticas. Es un capítulo práctico por lo que nos ofrece   distintas  recomendaciones  para  no  incurrir  en  acciones  poco  éticas  y  para    contribuir con el conocimiento generado a la mejora de la sociedad.  El  libro  cierra  con  el  capítulo  15  “Importancia  de  la  investigación  científica   para  el  desarrollo  de  un  país”.  Desde  el  nacimiento  de  la  ciencia  moderna,    Francis Bacon en  Novum Organum , publicado en latín en 1620, estableció que    el objetivo final del conocimiento científico era ayudar al hombre a dominar    la  naturaleza.  Los  autores  de  este  ulterior  capítulo  han  desmenuzado  este    sentimiento  en  una  versión  positiva  de  lo  que  puede,  y  quizá  debería  ser.    Nos  muestran  cómo  la  ciencia  ha  mejorado  las  condiciones  de  vida,  que    tiene  el  potencial  de  reducir  el  deterioro  ambiental,  que  puede  contribuir  a    la  sostenibilidad  a  través  del  desarrollo  tecnológico  responsable.  Proponen    que  el  impacto  nacional  de  la  ciencia  en  cada  uno  de  estos  tres  elementos    será mayor conforme aumente la inversión nacional en ciencia y tecnología.   Muestran  ejemplos  de  una  asociación  positiva  entre  inversión  en  ciencia  y     tecnología, publicaciones científicas, difusión y aceptación de la ciencia y su  \n19  aplicación a los problemas de la vida cotidiana según crezca el número de   científicos.  En  síntesis,  este  libro  nos  da  primero  una  introducción  a  la  ciencia  para  saber    qué  es,  luego  consejos  prácticos  que  nos  ayudarán  a  realizarla  y  difundirla.    Ofrece una buena idea de lo que podemos esperar cuando nos embarcamos    en la larga trayectoria de la formación de un científico o científica profesional,   y concluye con una propuesta de la importancia que tiene la carrera científica    para la nación que le arropa.  INTRODUCCIÓN \n\nPARTE 1 Qué es y cómo hacer ciencia \n\n23  1. ¿Qué es la ciencia?  Francisco Delfín Gurri  Introducción  Cada año más de 70 mil estudiantes se enrolan en un posgrado para convertirse   en  científicos.  Aunque  no  lo  sé  “a  ciencia  cierta”,  mis  más  de  20  años  de    experiencia como docente me hacen sospechar que la mayoría tiene apenas   una  vaga  idea  de  lo  que  es  la  ciencia.  Para  solventar  el  inconveniente,  en  El    Colegio de la Frontera Sur (ECOSUR), se ofrece a los estudiantes de nuevo ingreso    una asignatura que define la ciencia y los acerca a algunos de los filósofos que   la han forjado, explicándoles cómo avanza el conocimiento científico. En este    documento, utilizo las notas que reuní para elaborar mi introducción a ese curso   para brindar a los estudiantes la bienvenida a un tema fascinante.  Ciencia: definición e historia  Empezaré con una definición de ciencia que, por haber surgido de múltiples   debates, pocos científicos estarán en desacuerdo con ella:  la  ciencia  es  un   \n24   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  método objetivo, lógico y sistemático para estudiar la naturaleza, el cual permite   la acumulación de conocimiento confiable  (con base en Ruiz y Ayala, 1998).  Transcurrieron  varios  siglos  antes  de  llegar  a  esta  definición,  y  aunque  en  la   actualidad  no  lo  cuestionemos,  primero  debió  establecerse  que  merecía    la pena estudiar la  naturaleza . Para Platón, en el siglo IV a. C., la respuesta fue    no. Él sugirió que el mundo físico era un reflejo imperfecto del plano de las ideas.    ¿Cómo  conocer  la  esencia  de  un  árbol  cuando  todos  en  la  naturaleza  son    físicamente distintos? Además, puesto que la naturaleza tiene que ser percibida   a través de los sentidos, su estudio es engañoso. Usando lo que ahora se conoce    como la alegoría de la cueva, demostró lógicamente que “nada es verdad,   nada es mentira, todo es según el color del cristal con que se mira”. Enseñaba   que lo único que nos podía develar la esencia de las cosas eran las matemáticas    y la dialéctica cuyos enunciados son universales y siempre ciertos (véase el Libro   VII de  La República  de Platón, 1988).  Para  el  estudiante  de  Platón  más  famoso,  sin  embargo,  la  naturaleza  sí  podía    revelar su esencia si se le estudiaba  sistemáticamente . Aristóteles inventó lo que   ahora  conocemos  como   método   inductivo-deductivo.  El  usó  silogismos  para    generar explicaciones universales derivadas de la observación  sistemática  de los   componentes individuales de la naturaleza y llegar a sus causas. Este conocimiento    además le permitiría producir afirmaciones o predicciones del comportamiento    individual (para una discusión detallada, véase Burgos  et al ., 2020).  El    método  aristotélico   se  expandió  con  éxito  en  el  mundo  antiguo.  Con  esa   herramienta,  Herón  de  Alejandría  inventó  la  eolípila  para  mostrar  cómo  la    expansión de los gases podía generar energía mecánica (Papadopoulos, 2007).    En el siglo XIX, este descubrimiento dio origen a la Revolución Industrial, pero a   los filósofos de la antigüedad no les interesaba el dinero. Su ingreso dependía de    monopolios comerciales, esclavos y el favor de reyes y emperadores.  Con  el  Edicto  de  Tesalónica  (380  d.  C.)  el  emperador  romano  Teodosio  el   Grande decretó que todos deberían ser  cristianos católicos  ...so pena de recibir    la  venganza  divina   ( ok )  y  la  del  emperador  ( chin )  (Wikipedia,  2024).  Surgió  así     el principio de autoridad y los filósofos se convirtieron en obispos. Rechazaron la    observación sistemática de la naturaleza para discutir la verdad revelada en los   textos sagrados y en la inspiración divina del papa. La  Historia de los animales   de Aristóteles fue sustituida por libros como  La ciudad de Dios de San Agustín , y    el “eureka” de Arquímedes por un “Amén”. \n25  Pero  la  producción  de  conocimiento  sobre  la  naturaleza  no  desapareció.  En    la Alta Edad Media, mientras los ricos renunciaban al mundo, algunos monjes,   y  sobre  todo  los  burgueses,  elaboraban  un  conocimiento  sobre  la  naturaleza    que luego aplicaban en sus talleres. En los monasterios y gremios se estudiaban   las  propiedades  de  las  plantas,  se  inventaban  nuevos  telares,  mejores  arados,    formas  innovadoras  de  forjar  el  hierro,  o  de  curtir  y  entintar  el  cuero  y  telas.  Los    arquitectos medievales crearon castillos inexpugnables e inventaron una estética    nueva construyendo iglesias góticas que transportaban a los fieles al cielo.    Para el siglo XVI, el poder de los burgueses creció tanto que pudieron imponer su   visión del conocimiento. Galileo Galilei, el padre de la ciencia moderna, desafió    el principio de autoridad apoyándose en sus observaciones sistematizadas de la    naturaleza. Escribió que “La mejor ciencia no se aprende en los libros; el sabio más   grande y mejor maestro es la Naturaleza” (Ortega, 2013). De este modo, sentó    las  bases  del  empirismo;  un  camino  que  exige  liberarse  de  todo  prejuicio,  ser    ante todo escépticos y no aceptar explicaciones que no se puedan corroborar   con la observación y la experiencia sensible.  En su libro  Novum organum  (publicado en 1620), el inglés Francis Bacon (1902)   presentó un método científico basado en la inducción. Es decir, la generación   de principios universales derivados de la observación de lo individual. Su lógica   descansa  en  la  aplicación  de  la  analogía  que  estudia  las  propiedades  del    objeto en tres circunstancias distintas. La primera, la  tabla de presencia , estudia  los  casos  donde  el  fenómeno  sucede.  En  la  segunda,  la   tabla  de  ausencia ,   se  revisan  los  casos  donde  no  se  da  el  fenómeno,  y  en  la  tercera,  la   tabla  de    grados , los casos donde el fenómeno varía.  Para los nuevos científicos, la praxis de la ciencia refleja su origen gremial. En   Novum organum , Bacon dejó claro que el propósito de la ciencia era conocer   la naturaleza para ayudar al hombre a dominarla y promover su bienestar. Así,   con  la  ciencia  moderna  surgirá  la  tecnología  y  desde  entonces  es  imposible    pensar en una sin la otra.  Hasta  el  siglo  XVII  los  científicos  sufrieron  para  explicar  exactamente  cómo   podían enfrentar un problema sin prejuicios. Entre los más famosos en intentarlo   se encuentra René Descartes (1596-1650). En su  Discurso del método , publicado   en 1637, propuso cuatro pasos para llegar al conocimiento de un fenómeno:    1) no admitir nada como verdadero sin evidencia; 2) dividir la realidad en tantas    partes como sea necesario para su solución; 3) empezar por los objetos más   1. ¿QUÉ ES LA CIENCIA? \n26   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  simples y ascender poco a poco hasta los más complejos; y 4) hacer recuentos   integrales  y  revisiones  generales  para  estar  seguro  de  no  omitir  nada.  Este    método no tuvo mucho éxito. Exige bastante tiempo y no soluciona el problema   de  cómo  eliminar  los  prejuicios  antes  de  empezar.  Su  tiro  de  gracia  fue  la     aceptación universal del método hipotético-deductivo (figura 1.1).  Figura 1.1. Desarrollo histórico del método científico (línea del tiempo). \n27  Aunque no es claro cómo surgió, el método hipotético-deductivo fue utilizado   y popularizado por Isaac Newton (1623-1727). En la actualidad se le resume y    presenta como el  método científico  en innumerables publicaciones. Una de sus   principales virtudes es que incorpora los prejuicios al método y nos proporciona    las  herramientas  para  confirmarlos  y  utilizarlos  o  deshacernos  de  ellos.  Por    su  universalidad,  vale  la  pena  detenernos  un  poco  en  sus  componentes  y    funcionamiento (cuadro 1.1).  Los prejuicios son explicaciones sobre la naturaleza. El genio del método está en   exigirle a la persona que nos diga qué esperaríamos encontrar en el mundo si   su idea es correcta. A esta expectativa se le conoce como hipótesis, es decir,   una predicción que se desprende lógicamente de la idea original o el prejuicio.   Por ejemplo, en 1969 Arthur Jensen, un psicólogo de la educación creía que la   inteligencia era hereditaria, por lo que había grupos de personas genéticamente   relacionadas  i.  e.,  poblaciones  o  razas,  más  inteligentes  que  otras.  Jensen    planteó la hipótesis de que los programas diseñados para remediar las carencias   educativas de poblaciones afroamericanas habían fracasado porque estaban    dirigidos a jóvenes de bajo coeficiente intelectual.    Planteada  la  hipótesis,  se  diseña  un  experimento  que  nos  permita  reforzarla  o    rechazarla para así promover o dudar de nuestro prejuicio. En este caso, en el   libro  The Bell Curve , Herrnstein y Murray (1994) utilizaron los resultados de cientos de   exámenes de coeficiente intelectual para mostrar si en efecto había razas más    inteligentes  que  otras.  Finalmente,  si  los  resultados  del  experimento  se  replican    consecutivamente un prejuicio se puede convertir en ley. Pero ¿cuántas veces    se debe confirmar un resultado para que una hipótesis se convierta en ley? Para    David Hume, la respuesta es que las leyes no existen.  1. ¿QUÉ ES LA CIENCIA? \n28   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Cuadro 1.1. Ejemplo de la aplicación del método hipótético deductivo basado en el   experimento de Lee Hherman en  The Mating Advantage of Rare Males in Drosophila   (Ehrman, 1970). \n29  De acuerdo con David Hume, un filósofo escocés del siglo XVIII, “no existe ninguna   cantidad de observaciones particulares que nos permita inferir lógicamente, y sin   restricciones,  un  enunciado  general  o  ley”.  Es  decir,  no  importa  cuantas  veces     tu hipótesis se confirme, siempre existe la posibilidad de que se rechace con el    siguiente experimento. Mi ejemplo favorito es el dilema de Bart Simpson y la hornilla   eléctrica.  Cada  vez  que  toca  la  hornilla  se  quema.  ¿Cuántas  veces  tiene  que    tocarla para convencerse de que está caliente? La verdad es que no importa. Si   la energía eléctrica se interrumpe estará fría y la expectativa generada será falsa    —véase Cañas Muñoz (2013) para una discusión del dilema de Hume.   ¿Cómo avanza la ciencia?  Si no se puede comprobar nada, ¿cómo avanza la ciencia? En 1934 Karl Popper,   un  científico  alemán,  definió  el  principio  de  la  falsación.  De  acuerdo  con   este, la ciencia nunca puede confirmar una hipótesis, pero sí puede refutarla   definitivamente  deduciendo  de  la  misma  una  consecuencia  observable    y  mostrando  que  esta  consecuencia  no  se  cumple.  Mientras  no  se  refute,  el     conocimiento se considera confiable. Eso sí, la teoría tiene que plantearse de    tal  manera  que  pueda  ser  puesta  a  prueba  y  ser  falseada.  En   La  lógica  de     la investigación científica , Popper (1962 [1934]) explica cómo el conocimiento   científico  crece  por  medio  de  conjeturas  y  refutaciones  produciendo   explicaciones cada vez más confiables. Puesto que estas son falsables solo son    temporales y no pueden considerarse como verdaderas.  Para Thomas Kuhn, un físico y filósofo estadounidense, la propuesta de Popper   no explica de dónde surgen las preguntas de investigación. Sugiere que estas,   los métodos para contestarlas y nuestras interpretaciones sobre los resultados de   los experimentos dependen de una percepción de la realidad que compartimos    con  otros  científicos,  una  visión  a  la  que  llamó    paradigma .  Este  lo  usan  los    científicos como modelo para generar preguntas de investigación, validar sus    métodos y explicar sus resultados.  Volviendo a nuestro ejemplo del método científico, nos damos cuenta de que   solo podríamos haber pensado que unas personas son más inteligentes que otras   si  nuestro  paradigma  indicara  que  la  inteligencia  es  sumativa.  El  paradigma    valida  y  dicta  nuestro  método  que  se  basa  en  la  racionalidad  de  que  la    inteligencia  se  puede  medir  cuantitativamente  y  compararse  entre  individuos    1. ¿QUÉ ES LA CIENCIA? \n30   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  con exámenes diseñados para ello. Finalmente, el paradigma nos proporciona   un marco de referencia para interpretar los resultados. Si hay poblaciones con    promedios de coeficiente intelectual distintos, el paradigma permite concluir    que en el grupo A hay personas más inteligentes que en el B. Kuhn llamó a este    proceso “ciencia ordinaria”.  Pero  no  todos  los  resultados  se  ajustan  a  las  expectativas  del  paradigma    predominante.  Por  ejemplo,  varios  investigadores  han  encontrado  que  unos    individuos aprenden idiomas mejor que otros, y que otros aprenden matemáticas   con mayor facilidad (Armstrong, 2006). El resultado es contrario al esperado si la   inteligencia  fuera  sumativa.  No  obstante,  este  rechazo  de  la  hipótesis  no  llevó    al  abandono  del  paradigma,  sino  que  generó  una  anomalía.  Estas  anomalías    seguirán  acumulándose  hasta  que  a  alguien  se  le  ocurra  un  nuevo  paradigma    que  las  explique,  dé  cabida  a  todas  las  observaciones  que  validaban  el    paradigma  anterior  y  proporcione  una  nueva  visión  para  guiar  la  investigación    futura. Este cambio de paradigma se da durante un periodo que Kuhn llamó de    “ciencia extraordinaria”. En nuestro caso, si el nuevo paradigma propone que la    inteligencia  no  es  sumativa  sino  que  es  una  propiedad  emergente  de  sistemas     cognitivos únicos, con su propia capacidad (Hampshire  et al ., 2012), la propuesta  de que hay personas más inteligentes que otras se vuelve irrelevante, no merece    estudiarse, y se convierte en la llamada “pérdida kuhniana” (Kuhn, 2012).  A los científicos que comparten un paradigma, Larry Laudan (1977) los agrupó en   lo que llamó  tradiciones de investigación . Estas tienen dos funciones principales:    una función ontológica, que define los objetos o fenómenos legítimos de estudio;    y  una  función  metodológica,  que  establece  las  reglas  de  lo  que  se  puede  o    no hacer en el área y cómo. De esta segunda función depende la  objetividad  del método científico, y es en esta que los científicos determinan si la forma en    que aplicas tu método realmente contesta tu pregunta de investigación y si tus   resultados contribuyen a resolver las ideas que motivan a la tradición.  Ningún paradigma está libre de anomalías por lo que la coexistencia de teorías   rivales no es la excepción sino la regla. El avance del conocimiento suele darse   por  medio  de  las  confrontaciones  dialécticas  al  interior  de  las  tradiciones,     donde eventualmente se adoptará la teoría que resuelva el mayor número de   problemas empíricos importantes y genere el menor número de anomalías. A    menudo, sin embargo, se da como resultado de la competencia de programas    científicos de investigación (PCI) rivales. Lakatos (1968) sostiene que los científicos  \n31  de cada PCI comparten un núcleo firme de ideas protegido por un cinturón   de  hipótesis  auxiliares  que  pueden  eliminarse  o  remplazarse  sin  afectarlo.  Este     solo dejará de existir cuando el PCI rival sea adoptado por un número cada   vez mayor de científicos, y en algunos casos, hasta que se retiren sus máximas   autoridades (figura 1.2).  Las  tradiciones  de  investigación,  o  PCI,  son  los  que  nos  permiten  ser   objetivos ,   generar    conocimiento confiable   y  sobre  todo  relevante.  Es  la  contribución  al    paradigma compartido lo que justifica nuestro trabajo, son nuestros colegas los    que juzgan si nuestro  método  para  estudiar la naturaleza  es válido y son ellos los    que evalúan si nuestras conclusiones se derivan de manera  lógica  de nuestros  resultados.  Si  te  estás  preparando  para  aprender  sobre  lo  que  te  apasiona  a    través de la ciencia, es importante que descubras cuanto antes quiénes forman    tu tradición. Empieza con tu comité y asiste a los congresos donde se reúnen. Lo    más seguro es que una vez que conozcas lo que han descubierto, tus preguntas   originales se habrán transformado y sabrás por qué las nuevas son relevantes.  1. ¿QUÉ ES LA CIENCIA?  Figura 1.2. ¿Cómo avanza la ciencia? \n32   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Agradecimientos  Quiero  agradecer  primero  a  los  estudiantes  que  han  escuchado,  hecho    preguntas y brindado ideas cada vez que he presentado esta introducción. Sus   comentarios cada año no solo la mejoran sino que me obligan a buscar literatura   y  mejorar  mi  conocimiento  sobre  el  tema.  También  doy  mi  reconocimiento  al    apoyo de los doctores Pablo Liedo y Yuri Peña que, a pesar de haber escuchado   mi  presentación  por  años,  siempre  me  muestran  un  entusiasmo  que  me  invita     a seguir pensando en ciencia y a modificar detalles para lograr que un tema    que  podría  ser  aburrido  sea  más  comprensible  y  entretenido.  Finalmente,    agradezco a los editores de la revista  Ecofronteras  que publicaron una versión  para  difusión  y  mejoraron  mi  manuscrito  original.  Los  errores  de  esta  versión  se    deben exclusivamente a mi persona.  Referencias  Armstrong,  T.  (2006).   Inteligencias  múltiples  en  el  aula:  Guía  práctica  para   educadores . (Trad. de Remedios Diéguez). Barcelona: Paidós.  Bacon, F. (1902).  Novum Organum  (Trad. y ed. de M. A. Joseph Devey). Nueva  York: Collier.  Burgos, R., Burgos Frías, N., Gilsanz Rodríguez, F., Téllez de Peralta, G., y Rodríguez   Montes, J. A. (2020).  Aristóteles creador de la filosofía de la ciencia y del   método científico (parte I).  Anales  de  la  Real  Academia  de  Doctores ,  5(2),   279-295.  Cañas  Muñoz,  M.  A.  (2013).    El  dilema  de  Hume  sobre  la  justificación  de  la   inducción .  Tesis  de  Maestría  en  Filosofía,  Facultad  de  Filosofía  y  Letras,    Universidad Nacional Autónoma de México, México. Descartes, R. (2022).  Discurso del método / Meditaciones metafísicas  (Trad. y ed.:  M. García Morente). Madrid: Planeta Mexicana. Edicto  de  Tesalónica.   Wikipedia,  La  enciclopedia  libre .  Recuperado  el  27  de   marzo de 2024.  Hampshire A., R. R., Highfield, B. L., Parkin, y Owen, A. M. (2012). Fractionating   Human Intelligence.  Neuron , 76(6). http://dx.doi.org/10.1016/j.neuron..06.022 Herrnstein, R. J., y Murray, C. (1994).  The bell curve: Intelligence and class structure  in American life .  Nueva York: The Free Press. Jensen, A. R. (1969). How much can we boost IQ and scholastic achievement?   Harvard Educational Review ,  39 (1), 1-123.  Kuhn,  T.  S.  (2012).   The structure of scientific revolutions: 50th. Aniversary edition .  Chicago: University of Chicago Press. \n33  Lakatos,  I.  (1968).  Crítica  y  metodología  de  los  programas  de  investigación    científica.  Actas de la Sociedad Aristotélica, 69 (1), 149-186. Laudan, L. (1977).  El progreso y sus problemas: Hacia una teoría del crecimiento   científico . Ediciones Encuentro.  Ortega, A. (2013).  El gran libro de las frases célebres . México: Penguin Random  House. Papadopoulos, E. (2007). Heron of Alexandria (c. 10-85 AD). En M. Ceccarelli (ed.),   Distinguished figures in mechanism and machine science: Their contributions   and legacies  (pp. 217-245). Dordrecht: Springer. https://doi.org/10.1007/978-   1-4020-6366-4_9.  Platón. (1988).  Diálogos IV: República  (Intr., trad. y notas: C. Eggers Lan). Madrid:  Gredos. Popper, K. R. (1962).  La lógica de la investigación científica  (Trad. del inglés: V.  Sánchez de Zavala). Madrid: Técnicos. Ruiz, R., y Ayala, F. (1998).  El método en las ciencias, epistemología y darwinismo .  México: Fondo de Cultura Económica.  1. ¿QUÉ ES LA CIENCIA? \n\n35  2. Sujetar a prueba las ideas  Hugo Perales Rivera  Introducción  Existen diferentes clases de conocimiento humano: el científico, el filosófico, el   religioso y el tradicional, entre otros. En los últimos siglos, las ciencias han crecido    en importancia como forma de conocimiento, un hecho que no es incidental o   secundario sino producto de los requerimientos particulares de la construcción    del conocimiento científico y de su efectividad para describir y teorizar a la    naturaleza  y  la  sociedad.  Un  requerimiento  imprescindible  del  conocimiento     científico es sujetar a prueba las ideas.  ¿Es posible distinguir a las ciencias de otras formas de conocimiento?  Se ha intentado, sin éxito, deslindar a las ciencias de otras formas de conocimiento    con algún criterio simple y discreto. Así, casi todos hemos oído que las ciencias se   distinguen por aplicar “el método científico”, comúnmente caracterizado como   pasos secuenciales: se especifica una pregunta, se formula una hipótesis, se  \n36   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  realiza un experimento, se colectan y analizan resultados y se sacan conclusiones.   Aunque  esta  idea  tiene  algo  de  verdad,  es  demasiado  simple.  El  método     científico es suficientemente variable entre las ciencias particulares, al interior   de estas y entre sus practicantes, que esta formulación del método científico no    se sostiene como criterio para una delimitación simple y general. De hecho, es    posible seguir dicha serie de pasos y no practicar investigación científica. Karl    Popper  hizo  una  propuesta  que  exige  que  las  hipótesis  tengan  la  posibilidad    de  refutación.  En  este  supuesto,  si  una  idea  no  se  puede  refutar  no  es  parte    de  las  ciencias.  Esta  formulación  tiene  utilidad,  pero  tampoco  ha  sido  posible    solucionar con ese criterio la delimitación de las ciencias. Por ejemplo, la teoría    de cuerdas y la de multi-universos aún se consideran dentro de la física teórica,   aunque no cuentan con evidencia directa y tampoco se ha especificado cómo    se podrían sujetar a prueba.   Para  deslindar  a  las  ciencias  de  otras  formas  de  conocimiento  conviene    recurrir a varios criterios (Pigliucci, 2013). En este sentido, se pueden considerar    los  requerimientos  empíricos  y  teóricos  de  las  ciencias  al  compararlas  con    otras  formas  de  conocimiento.  De  este  modo,  las  ciencias  pueden  distinguirse    porque  exigen  evidencia  empírica  y  coherencia  racional  y  teórica.  Otras    formas de conocimiento, en cambio, pueden poseer requerimientos empíricos,   pero  suelen  enfrentar  considerables  problemas  para  establecer  cuál  es  la    evidencia,  como  sucede  con  la  historia;  o  pueden  utilizar  evidencia  empírica     sin ser un requisito indispensable, como en la filosofía. El conocimiento religioso   no tiene requerimientos empíricos. Por otro lado, las ciencias y la filosofía tienen    requerimientos  de  coherencia  racional  y  teórica  muy  altos  y,  en  general,  no    se  permiten  contradicciones  o  tesis  incoherentes.  En  este  aspecto,  la  religión,    mediante sus teologías, muestra una relativa demanda de coherencia racional   y  teórica,  pero  supeditada  a  los  requerimientos  de  la  fe,  la  cual  no  exige    evidencia.  En  contraste,  el  conocimiento  tradicional  se  basa  en  evidencia    empírica, raramente sistemática, y sus requerimientos teóricos son inconsistentes.    Lo anterior es útil para emprender una demarcación de las ciencias, pero esto    no debe interpretarse como un menosprecio del valor humano de otras formas   de conocimiento.  Un importante problema de la demarcación de las ciencias no se da respecto   a formas bien diferenciadas de conocimiento, como la filosofía y la religión, sino   con relación a las pseudociencias. Estas últimas pretenden ser conocimiento   científico, pero no cumplen apropiadamente con los requerimientos de saber  \n37  empírico y entendimiento teórico. Cuando las pseudociencias se sujetan a prueba   por procedimientos científicos se obtienen resultados no mejores que los esperados    por  el  azar  —por  ejemplo,  la  astrología  y  la  homeopatía—,  si  fuese  distinto  se    tendrían  que  incorporar  los  resultados  a  la  ciencia  que  correspondieran  a  ese    campo temático. Por otra parte, aunque las pseudociencias propongan teorías   con coherencia interna para ellas mismas, característicamente son incoherentes    respecto  al  resto  del  conocimiento  científico,  por  ejemplo,  las  diluciones  y   memoria del agua de la homeopatía. Más aún, tampoco tienen otras prácticas   propias de las comunidades científicas.  La delimitación entre ciencias y pseudociencias puede también caracterizarse   por los métodos y prácticas de las comunidades científicas. Por ejemplo, desde    el punto de vista de los métodos: ¿se aceptan cánones de razonamiento válidos,   principios de no-circularidad y no-contradicción?, ¿aceptan la falibilidad o son   dogmáticas?, ¿toman en cuenta toda la evidencia o escogen la conveniente   a  su  teoría?,  ¿hay  mecanismos  para  eliminar  errores?,  ¿las  teorías  muestran    capacidad  predictiva  y  hay  intercambio  de  conocimiento  entre  disciplinas?,    ¿el cuerpo de conocimientos es coherente y al día?, ¿son una comunidad de   investigación o individuos laxamente relacionados?, ¿hay intercambio extenso   y mutuo de información o autoridades y seguidores?, ¿usan conceptos de entes   concretos  (materiales)  o  difusos  (energías,  vibraciones)?  Cuando  se  aplican     este tipo de criterios a formas de conocimiento que pretenden ser científicas es    posible  caracterizarlas  como  pseudociencias  porque  sus  métodos  y  prácticas     señalan deficiencias epistemológicas desde el punto de vista de las ciencias.  Es  muy  importante  advertir  que  la  universalidad  del  conocimiento  científico   implica  que  no  hay  autoridades,  dogmas  o  consideración  especial  por  el    individuo o grupo humano que lo genera. Todo está sujeto a revisión por todos los   practicantes y cualquier persona puede participar, aunque para ello en general   se requiere entrenamiento disciplinario y conceptual. Esta es una característica   central  que  vuelve  universal  la  práctica  del  conocimiento  de  las  ciencias  y    disiente  de  las  versiones  de  ciencias  o  disciplinas  basadas  en  identidades    particulares.   2. SUJETAR A PRUEBA LAS IDEAS \n38   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Sujetar a prueba las ideas  Las ciencias son cuerpos de conocimientos, procedimientos y prácticas construidos   por  comunidades  de  practicantes  en  las  que  se  consensan  los  métodos,    la  evidencia  válida  y  la  teoría  que  interpreta  la  evidencia.  Las  actividades     científicas incluyen múltiples tipos de acciones (University of California Museum    of  Paleontology,  2024),  como  la  exploración,  observación  y  descubrimiento,     el  planteamiento  de  preguntas,  el  compartir  datos  e  ideas,  la  búsqueda  de    inspiración  y  el  explorar  los  antecedentes  en  la  literatura.  Las  motivaciones    pueden  venir  de  la  indagación  por  una  nueva  tecnología,  por  un  problema     práctico  o  por  la  mera  curiosidad.  El  trabajo  científico  pasa  por  el  análisis  y    retroalimentación  de  las  comunidades  de  la  ciencia  o  disciplina  particular.  Se    discuten  y  revisan  las  propuestas  y  publicaciones  por  parte  de  pares  (colegas     con trabajo relevante en el tema); se presentan públicamente en congresos    y en publicaciones, y se busca la replicación y corrección de los resultados. Lo    anterior lleva a descripciones fácticas justificables, a nuevas preguntas e ideas y    a la construcción de teoría.  No obstante, dentro de las actividades de las ciencias, una central es sujetar a   prueba las ideas; esto es, cualquier afirmación, hipótesis, ley, modelo o teoría   se  encuentra  sujeta  a  verificación  y  evaluación  de  parte  de  la  comunidad   científica de la disciplina. Las ideas que parecen buenas, pero sin evidencia,    tal  vez  puedan  tener  un  valor  explicativo,  pero  se  requiere  mostrar  evidencia    a  favor,  o  descartar  explicaciones  alternativas,  para  establecerse.  Sujetar    a  prueba  las  ideas  no  es  igual  para  los  distintos  niveles  de  abstracción.  Las    teorías  son  notablemente  difíciles  de  sujetar  a  prueba  directamente  dada  su    complejidad,  pero  se  sujetan  a  prueba  indirectamente  mediante  los  niveles    inferiores  de  abstracción  (hipótesis,  leyes,  principios).  Por  otra  parte,  todas  las    ciencias tienen trabajo en aspectos descriptivos que no sujetan a prueba una   idea,  sin  embargo,  todas  poseen  intereses  explicativos  y  predictivos,  y  en  este    sentido comparten esta característica.  Para sujetar a prueba las ideas existen dos caminos que tienen su reflejo en   los  dos  procedimientos  inferenciales  básicos:  la  inducción  y  la  deducción.  A    través  de  la  primera  se  sujetan  a  prueba  hipótesis  utilizando  las  predicciones,    o  implicaciones,  de  la  hipótesis.  Si  se  procede  por  el  lado  de  la  inducción,  se    determina el modelo que tiene máxima verosimilitud entre modelos alternativos   que describen un conjunto de datos.  \n39  Límites de los procedimientos inferenciales  En  las  ciencias  se  reconoce  que  los  métodos  tienen  límites  para  alcanzar  la    certeza. Cuando se procede por inducción, se determinan generalizaciones (leyes   o  hipótesis)  basadas  en  las  observaciones  con  las  se  cuente.  Esto  es,  se  llevan    a  cabo  generalizaciones  para  una  población  con  base  en  las  observaciones    particulares  de  una  muestra.  Dado  que  casi  nunca  es  viable  acceder  a  todas    las  observaciones  posibles,  siempre  pueden  existir  casos  que  no  se  ajustan  a  la     generalización y que por esto la puedan contradecir, nulificar o modificar. La    implicación de esto es que no se logra la certeza mediante la inducción, aunque   sí es posible determinar probabilidades asociadas a las generalizaciones.  En contraste, cuando se procede mediante la deducción se parte de una premisa   (hipótesis)  y  se  determinan  las  implicaciones  o  consecuencias  que  deben  ser    observadas si la idea es verdadera. Si no se obtienen los resultados esperados    se refuta la hipótesis, o se modifica tomando en cuenta las observaciones. Y si    los resultados son los esperados es posible decir que se apoya la hipótesis, pero    sin poder afirmar que se ha comprobado. La razón de lo anterior es que las    hipótesis verdaderas solo dan lugar a predicciones verdaderas, pero las hipótesis   falsas  pueden  dar  lugar  a  predicciones  verdaderas  o  falsas  (cuadro  2.1).  Si  la    predicción es verdadera no es posible distinguir una hipótesis verdadera de una   falsa. Para determinar si es una hipótesis falsa se requiere sujetar a prueba otras   predicciones de la hipótesis hasta encontrar errores, o repetir las observaciones   independientemente.  Proceder  por  medio  de  la  deducción  para  preguntas    fácticas tampoco es garantía de certeza. Cuadro 2.1. Cuadro de verdad .  2. SUJETAR A PRUEBA LAS IDEAS  Fuente: Wikipedia. \n40   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Sujetar a prueba las hipótesis  Una hipótesis es una explicación tentativa para contestar una pregunta o para   un grupo de observaciones. Se les puede describir como conjeturas informadas    porque comúnmente se basan en la teoría conocida, aunque también pueden    provenir de observaciones previas o de la intuición. En las ciencias se pretende la   posibilidad de sujetar a prueba, o refutar, las ideas e hipótesis, aunque en algunos   casos cuando se formula no exista una técnica adecuada para hacerlo. Cuando   es imposible refutar una hipótesis la principal implicación es que la idea carece de    consecuencias, esto es, que es inútil desde el punto de vista explicativo. Y en la    construcción de las ciencias se puede prescindir de las ideas sin consecuencias;   si no mejoran las explicaciones de los cuerpos de conocimientos posiblemente   son innecesarias.  La palabra “hipótesis” tiene varias acepciones. Tiene el sentido de “explicación   plausible”  (que  es  la  forma  que  vamos  a  describir);  de  generalización  o  ley    derivada  de  observaciones,  o  predicción  que  se  origina  en  una  idea  (la     consecuencia de la hipótesis). En particular, en las ciencias sociales es común   que se use como “hipótesis de trabajo”, esto es, no es una afirmación que se    sujeta a prueba sino el marco de ideas bajo el cual se interpretarán los datos u   observaciones.  Además,  parte  del  proceso  para  sujetar  a  prueba  las  hipótesis    pasa  por  estimaciones  estadísticas,  y  la  estadística  cuenta  con  una  versión     formal específica para enunciar las hipótesis que se sujetan a prueba.  Un rasgo de las hipótesis es que se deben formular en relación con consecuencias   ya que estas se evalúan a través de las implicaciones. Así, cuando se proponen   hipótesis es útil hacerlo siguiendo la estructura “si X, entonces Y”, es decir, si la   idea “X” es verdadera entonces lo esperado es observar “Y”. Los experimentos,    o las observaciones que se hacen, se diseñan para determinar si se encuentra lo   que la hipótesis predice o implica.  Otro aspecto importante es que la definición de los conceptos utilizados para   las hipótesis requiere ser operacional. Esto es, que la definición de los conceptos   debe partir de lo que estos hacen por procesos medibles, y no por lo que “son”   en el sentido ontológico. Por ejemplo, si definimos la energía no se hace por    lo que es la energía en sí misma, sino por su capacidad de hacer trabajo, y al    trabajo como fuerza por distancia. En este caso, energía y fuerza son definidos    en forma operacional, como procesos que podemos medir. \n41  Otras  características  de  las  hipótesis  es  que  requieren  ser  explícitas,  claras    y  entendibles  para  otros,  y  además  de  que  se  pueden  sujetar  a  prueba  son    limitadas  y  relativamente  simples.  Lo  anterior  implica  que  no  incluyen  toda  la    complejidad  de  un  fenómeno,  no  explican  todo,  aunque  permiten  avanzar  el    conocimiento al determinar relaciones particulares entre variables.   En  general,  muchas  hipótesis  son  relaciones  entre  dos  variables  a  las  que  se    les  define  por  la  forma  en  que  la  variable  independiente  (la  que  causa  un    efecto, o el tratamiento, o la que explica) afecta a la variable dependiente (lo   observado o la respuesta a un tratamiento). Las formas más comunes y simples   son  efectos  directos,  cuando  aumenta  la  variable  independiente  aumenta    la  dependiente;  o  una  relación  inversa,  cuando  aumenta  la  independiente,    disminuye  la  dependiente,  pero  hay  otras  relaciones  posibles.  Si  la  hipótesis  es    compleja, es posible que convenga descomponerla en hipótesis parciales. Si se   busca sujetar a prueba una hipótesis, y no solo usarla como marco interpretativo    —como hipótesis de trabajo—, se requiere evitar las “hipótesis-párrafo”, es decir,    formulaciones  extensas  que  contienen  demasiadas  variables  y  relaciones  muy    complejas. Es raro que una hipótesis que se escribe en más de dos o tres líneas   se pueda sujetar a prueba.  Veamos un ejemplo. Hace unos tres mil años Homero señaló en  La Odisea  que  el estiércol mejoraba el crecimiento de las plantas, pero tuvieron que pasar unos   2500 años para que se comenzara a investigar qué se requería para el desarrollo    vegetal.  En  1772  Daniel  Rutherford  descubrió  el  nitrógeno,  y  en  1836  Jean-  Baptiste Boussingault identificó su importancia para el sustento de las plantas.    Supongamos que estamos en esa época y queremos determinar si el nitrógeno   es  necesario  para  el  crecimiento  de  las  plantas.  ¿Qué  hipótesis  debemos    plantear y qué haremos para demostrarla? Es posible que existan varias hipótesis   alternativas  que  nos  conduzcan  a  distintos  tipos  de  experimentos.  Se  pueden    proponer diferentes hipótesis para este propósito: H1: Si las plantas requieren nitrógeno (N) para su crecimiento, entonces, en   ausencia de nitrógeno las plantas tendrán crecimiento deficiente.  H2:  Si  las  plantas  requieren  nitrógeno  para  su  crecimiento,  entonces,  la   aplicación de nitrógeno producirá mayor crecimiento en las plantas.  2. SUJETAR A PRUEBA LAS IDEAS \n42   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  H 3 :  Si  la  cantidad  de  nitrógeno  disponible  afecta  directamente  el   crecimiento  de  las  plantas,  entonces,  a  mayor  cantidad  de  nitrógeno    mayor biomasa. En la H1 se requiere eliminar de alguna forma el nitrógeno del medio de cultivo,  lo  que  puede  hacerse  mediante  arena  lavada  u  otro  medio  inerte  que  no    contenga  nitrógeno.  La  H2  requiere  aplicación  de  N,  pero  sin  otros  elementos   que  confundan  el  experimento,  lo  que  puede  ser  hecho  sin  lavar  la  arena  o    en  suelo.  Sin  embargo,  se  sabe  que  la  cantidad  de  nitrógeno  en  el  medio  de    cultivo afectará la respuesta de las plantas. Si el nitrógeno es alto habrá poca   respuesta relativa; si es bajo, la respuesta relativa será grande. Para la H 3 , el diseño  demandaría añadir distintas cantidades de nitrógeno al medio de cultivo. Estas   distintas hipótesis para el mismo problema conducen a diferentes caminos para   resolverlo  y  estos  producirán  resultados  diversos  y  sugerirán  distintas  hipótesis    para seguir adelante. En la H1 y la H2 solo se puede ver si hay efecto positivo o  no;  en  la  H 3   se  podría  observar  si  el  efecto  positivo  es  mayor  al  aplicar  mayor   cantidad  de  N,  y,  dependiendo  del  diseño,  determinar  si  hay  un  límite.  Las     hipótesis guían la búsqueda de información al indicarnos qué datos se requieren    para sujetarlas a prueba, pero también pueden condicionar y limitar lo que se   busca y qué se observa.  Un  aspecto  adicional  en  muchos  procedimientos  científicos  son  los  métodos   estadísticos para tomar decisiones al determinar si una hipótesis es posiblemente   verdadera o no. Casi todas las variables de respuesta (o dependientes) que se   observan para sujetar a prueba la hipótesis tienen variabilidad. Para determinar si    dentro de esa variabilidad se identifica el efecto esperado, independientemente    de  opiniones,  se  requiere  el  uso  de  principios  probabilísticos  y  procedimientos    estadísticos.  Cuando  se  comparan  dos  tratamientos,  la  biomasa  de  plantas  sin  nitrógeno    (N0) y con nitrógeno (N1 ) como en el ejemplo de arriba, para fines estadísticos  definimos  una  hipótesis  nula  (H 0)  y  la  hipótesis  alternativa  (Ha),  la  que  sería    verdadera si la nula es falsa. La nula afirma que no hay diferencia entre dos   tratamientos o poblaciones, la alternativa afirma que sí la hay. Estas hipótesis   son una modificación de la hipótesis de investigación para fines estadísticos. En   el ejemplo, la hipótesis nula afirmaría que las biomasas son iguales en los dos    tratamientos, N0=N1, lo que implicaría que el nitrógeno no tiene efecto. En este   caso, la hipótesis alternativa afirmaría que las biomasas son distintas, N 0 ≠N 1,  es   \n43  decir, que hay efecto del tratamiento. Nótese que en su formulación más simple   no se determina si N0 es mayor o menor que N1; eso está determinado por nuestra  hipótesis de investigación (esperamos mayor crecimiento en N1, esto es, N0 < N1). Por procedimiento, siempre se sujeta a prueba la hipótesis nula y si se rechaza    es posible afirmar que la hipótesis alternativa es probablemente cierta; si no es    posible rechazar la nula la conclusión sería que no se ha encontrado diferencia.   Este  proceso  se  hace  en  forma  probabilística  y  generalmente  se  acepta    rechazar  la  hipótesis  nula  cuando  existe  5%  de  probabilidad  de  error.  Esto  es,     aceptamos que cuando se rechaza la hipótesis nula y afirmamos la alternativa   en 5 veces de cada 100 se comete un error, se afirma que hay una diferencia   cuando no la hay. También es posible cometer el error contrario, afirmar que no    hay diferencia cuando sí la hay.  En este sentido, el no encontrar diferencia con   los datos disponibles no necesariamente implica que no la hay. Es posible que   la diferencia sea muy pequeña, pero aumentando el tamaño de la muestra, o   controlando variables asociadas, sí se podrá formalizar estadísticamente.   Este procedimiento tiene forma deductiva y de manera análoga a la limitación de   la deducción, las hipótesis verdaderas solo dan lugar a predicciones verdaderas,   pero  las  hipótesis  falsas  pueden  dar  lugar  a  predicciones  verdaderas  o  falsas.     Esto es, con base únicamente en el procedimiento no es posible tener certeza    de  que  la  hipótesis  es  verdadera.  Por  otro  lado,  este  procedimiento  aplicado    en forma mecánica puede dar lugar a conclusiones sin sentido (Cohen, 1994)   y  su  aplicación  simplista  ha  sido  criticada  (por  ejemplo,  Anderson   et  al. ,  2000;   Guthery  et al. , 2001).  Máxima verosimilitud de modelos  Otra forma de sujetar a prueba las ideas se da como una competencia entre   diferentes modelos para describir un conjunto de datos. Como todas las teorías    están subdeterminadas, es posible definir dos o más teorías o modelos para el    mismo conjunto de datos. Y dado que se desconoce el modelo verdadero, se   busca  aquel  que  mejor  se  ajuste  a  los  datos,  esto  es,  el  que  tenga  la  máxima    verosimilitud.  Un modelo es una representación informativa de un objeto o sistema, y puede   ser físico o analógico, como las maquetas arquitectónicas o la representación   2. SUJETAR A PRUEBA LAS IDEAS \n44   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  a escala de un barco. Sin embargo, los modelos que interesan en las ciencias   son  abstractos,  es  decir,  son  representaciones  matemáticas  de  los  objetos  o    sistemas de interés. Esto no quiere decir que sean lo mismo que las teorías, aunque   están  relacionados  con  estas  porque  se  basan  en  ellas.  Los  modelos  son  una    representación  de  la  realidad;  las  teorías  buscan  ser  una  explicación  de  la    realidad.  Por  ejemplo,  si  queremos  describir  cómo  aumenta  una  población    humana o animal, es posible proponer diversos modelos. Thomas Malthus propuso   uno  exponencial  simple,  y  posteriormente  Pierre-François  Verhulst  propuso  uno     logístico (figura 2.1).  Modelo exponencial simple:  dP/dT = N - M = rN  o   P(t) = P 0  ert  Modelo logístico  dP/dt = rP (1-P/K)   P  =  población,  P0  =  población  inicial,  N  =  nacimientos,  M  =  muertes,  r  =    tasa de crecimiento, t = tiempo, K = capacidad de carga, e = constante   de Euler (2.71828) Figura 2.1. Crecimiento exponencial y logístico para una población a través del  \n45  El modelo exponencial describe el crecimiento de una población que no está   limitada en recursos; el modelo logístico describe mejor el crecimiento cuando   el  ambiente  limita  la  tasa  de  crecimiento  al  reducirse  los  recursos  disponibles    por el tamaño de la población. Ambos modelos aspiran a lo mismo: describir el   crecimiento  de  una  población.  El  logístico  incluye  un  concepto  adicional  que    no se encuentra en el exponencial. Por considerar la disponibilidad de recursos,   el  modelo  logístico  describe  mejor  las  observaciones  en  muchas  poblaciones,    aunque  algunas  experimentan  fases  de  crecimiento  exponencial  antes  de    pasar al crecimiento logístico.  Un ejemplo contemporáneo de la utilización de modelos para sujetar a prueba   una idea es la atribución del cambio climático a los humanos (Stone  et al. , 2009;   Knutson    et  al. ,  2017).  Es  bien  conocido  que  la  tierra  se  encuentra  en  una  fase   de  calentamiento  global.  Hay  muchos  datos  directos,  como  promedios  de    temperatura y temperaturas máximas registradas, e indirectos, como glaciares   derritiéndose.  Por  otro  lado,  sabemos  que  históricamente  la  Tierra  ha  tenido    cambios  globales  de  temperatura,  pasando  por  ciclos  de  épocas  glaciales  a    otras  más  cálidas.  ¿Cómo  es  posible  atribuir  el  cambio  climático  actual  a  los    humanos?  Dado  que  es  imposible  recurrir  a  la  experimentación  para  determinar  si  el    cambio climático es producto o no de actividades humanas, el camino ha sido   comparar modelos para las observaciones con la que se cuenta. Así, con base   en el conocimiento teórico actual, se construyen modelos para la temperatura   global  registrada  desde  1850  solo  para  factores  naturales,  como  luminosidad    del sol y aerosoles de volcanes. Otros modelos se construyen para solo factores   antropogénicos,  como  gases  invernadero  y  aerosoles  químicos,  y  se  diseñan     otros modelos que incluyen a ambos tipos de factores (figura 2.2). Cuando se    comparan  estos  tres  modelos  contra  los  datos  observados,  se  advierte  que    después  de  1950  los  modelos  con  solo  factores  naturales  no  describen  bien    las  observaciones  de  temperatura  global  registrada,  y  los  antropogénicos  la    describen mejor; pero cuando incluimos factores naturales y antropogénicos, los    modelos se ajustan significativamente mejor a los datos observados. Al comparar    estos modelos es posible establecer que, de hecho, el cambio climático actual   es un efecto de la actividad humana y no solo variabilidad natural.  2. SUJETAR A PRUEBA LAS IDEAS \n46   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Notas: Temperatura global (línea en negro), modelo para todos los factores naturales   conocidos  (en  azul),  modelo  para  los  factores  antropogénicos  (en  rojo),  y  modelo    con  todos  los  factores  (naturales  y  antropogénicos).  Es  posible  observar  que  el    modelo que solo considera factores naturales no es adecuado después de 1950; el   modelo que considera todos los factores describe y predice mejor las temperaturas   observadas (Stone  et al. , 2009). Cuando se comparan varios modelos alternativos para un conjunto de datos, el   procedimiento común que se sigue es el criterio de información de Akaike (AIC,    por sus siglas en inglés). El AIC mide la verosimilitud del modelo, calculado por    medio del logaritmo natural de la suma de cuadrados del residual, y el número    de  parámetros  (variables)  que  incluye.  Se  obtiene  el  valor  de  AIC  para  cada     modelo y se escoge el que tenga el menor. Este procedimiento “castiga” el   número de parámetros del modelo, el valor de AIC aumenta cuando se tiene    más parámetros. Esto es análogo al principio de Ockham, el cual propone que    se prefieren las explicaciones más simples a las más complejas —el modelo con    menos parámetros—, siempre y cuando expliquen adecuadamente el conjunto   de datos.  Figura 2.2. Cambio de temperatura global. \n47  Ideas a datos, datos a ideas  El procedimiento de sujetar a prueba hipótesis es principalmente deductivo. Se   tiene  una  hipótesis  ( a  priori   con  respecto  a  la  investigación)  y  se  le  contrasta     con los datos que se observan buscando identificar si los mismos se ajustan a la    hipótesis. Esto es, se busca la probabilidad (P) de que los datos (D) se conformen   a la hipótesis (H): P(D|H). Cuando se busca el mejor modelo para un conjunto de   datos, se hace para determinar la probabilidad de que el modelo se adecua a   los datos: P(M|D). Esto es, en un caso la probabilidad es condicional a la hipótesis   (deducción), en el otro la probabilidad es condicional a los datos (inducción).    En el trabajo científico cotidiano se realizan ambos movimientos, pero en casi    todas las investigaciones se enfatiza en alguno de los dos.  Evidencia y causalidad
