  Las ciencias buscan explicar el universo natural y social y no solo su descripción.   Explicar  implica  adscribir  causalidad  a  la  evidencia,  implica  interpretar    teóricamente  las  asociaciones  que  se  encontraron  por  medio  de  métodos    observacionales,  o  determinar  el  efecto  de  las  intervenciones  experimentales    al  considerar  las  otras  hipótesis  u  otras  variables  que  puedan  estar  incidiendo     en los resultados. Hay tres formas generales con las que se adscribe y evalúa la    evidencia  de  causalidad:  la  observacional,  la  experimental  y  la  contrafáctica    (Pearl y MacKenzie, 2018).  Los métodos observacionales se distinguen por identificar la asociación entre   variables.  Más  que  demostrar  causalidad  se  encuentran  correlaciones  que    pueden  o  no  ser  causales.  Mucho  trabajo  observacional  produce  hipótesis    que requerirán sujetarse a prueba para consolidarse dentro de su disciplina. No    es suficiente proponer hipótesis, es necesario dar el paso siguiente y sujetarlas    a prueba. Pero es importante no perder de vista que la correlación no implica   causalidad;  puede  haber  relaciones  con  otras  variables  que  expliquen  la    correlación sin causalidad, o la correlación puede ser espuria. Sin embargo, si se   tiene teoría sobre mecanismos causales para las correlaciones halladas, estas sí   pueden ser indicativas de causalidad.  En  general,  cuando  se  trabaja  con  métodos  experimentales  es  más  sencillo    proponer  causalidad  porque  al  ejecutar  una  intervención  se  manipula  la    2. SUJETAR A PRUEBA LAS IDEAS \n48   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  presencia/ausencia  o  nivel  de  una  variable,  y  es  posible  suponer  causalidad    si  aparecen  o  no  efectos  en  variables  que  consideramos  dependientes.  No    obstante, también es posible que el efecto observado sea indirecto a través de   otra variable no observada o considerada; es decir, observar experimentalmente   los  efectos  esperados  es  importante  para  adscribir  causalidad,  pero  no     necesariamente suficiente.  Un  procedimiento  contrafáctico  es  aquel  que  argumenta  que  hubiera  sido    verdad bajo distintas condiciones; con otras palabras: ante un hecho surge la    pregunta ¿qué hubiera pasado si “X”? Por ejemplo, actualmente se conoce que    el  mesotelioma  es  un  cáncer  principalmente  causado  por  polvo  de  asbestos    que reviste los pulmones. Como no se conocía la causalidad, por años los que   trabajaron  con  asbestos  no  tuvieron  protección  adecuada.  Cuando  la  causa    fue clara, los extrabajadores con mesotelioma y sus familias demandaron a las   compañías por negligencia. Aunque no era posible demostrar en forma directa   que  los  trabajadores  con  mesotelioma  lo  habían  contraído  por  su  trabajo,  se    podía  argumentar  que  trabajar  con  asbestos  sin  protección  causa  el  cáncer.     De modo que si hubieran tenido protección (“si X”) no tendrían mesotelioma. El    conocimiento de la causalidad permite argumentar que el cáncer fue producto   de  negligencia  de  las  compañías  para  proteger  a  sus  trabajadores.  Este    procedimiento está basado en teoría o en evidencia previamente establecida y   puede tener el problema de no basarse en observaciones directas de causalidad.  Un problema particular en la atribución de causalidad es si existe una diferencia   epistemológica entre los procedimientos cuantitativos y cualitativos al presentar   evidencia a favor de una explicación, o teoría, y al sujetar a prueba las ideas. Tacq   (2011)  propone  que  en  principio  no  hay  diferencia,  porque  los  razonamientos    cuantitativo  y  cualitativo  se  apoyan  en  la  misma  lógica  experimental  y    observacional. El problema de causalidad es el mismo, pero condicionado por    los tamaños de muestra pequeños comúnmente asociados a los procedimientos    cualitativos. Con tamaños de muestra chicos siempre tendremos reservas de las   conclusiones,  aunque  determinar  cuánto  es  un  tamaño  de  muestra  pequeño    depende de la disciplina y pregunta de investigación. \n49  Conclusiones  Las ciencias son una forma de conocimiento con diversos elementos comunes.   Pero dos de sus cualidades centrales son la exigencia de evidencia empírica y   la  de  entendimiento  teórico  coherente;  ninguna  otra  forma  de  conocimiento    se  exige  tanto  en  estas  dos  características  como  las  ciencias.  Las  ciencias    también se exigen, entre otros, objetividad y replicabilidad (independencia del   observador), sistematicidad (tomar en cuenta toda la evidencia) y, en particular,   sujetar a prueba las ideas que se proponen. Se usan dos procedimientos generales   para sujetar a prueba las ideas: el deductivo, que sujeta a prueba las hipótesis por   medio de sus implicaciones (predicciones), y el inductivo, que busca el modelo con   máxima verosimilitud para describir un conjunto de datos. Ambos procedimientos   tienen límites para alcanzar la certeza, pero se espera que al llevar a cabo estos    procesos dentro de comunidades científicas la autocorrección elimine las ideas    falsas. En las ciencias, sujetar a prueba las ideas es fundamental, sin este proceso    el trabajo académico pierde el rumbo científico.  Referencias  Anderson,  D.  R.,  Burnham,  K.  P.,  y  Thompson,  W.  L.  (2000).  Null  hypothesis   testing:  problems,  prevalence,  and  an  alternative.   The  Journal  of  Wildlife    Management, 64 (4), 912-923.  Chalmers, A. F. (1988).  ¿Qué es esa cosa llamada ciencia?  Madrid: Siglo XXI.   Cohen, J. (1994). The earth is round (p<.05).  American Psychologist, 49 (12), 997-  1003.  Guthery,  F.  S.,  Lusk,  J.  J.,  y  Peterson,  M.  J.  (2001).  The  fall  of  the  null  hypothesis:   liabilities and opportunities.  The Journal of Wildlife Management, 65 (3), 379-384.  Knutson, T., Kossin, J. P., Mears, C., Perlwitz, J., y Wehner, M. F. (2017). Detection and  attribution of climate change. En D. J. Wuebbles, D. W. Fahey, K. A. Hibbard,   D. J. Dokken, B. C. Stewart, y T.  K. Maycock (eds.),  Climate science special   report:  Fourth  national  climate  assessment  (Vol. I, pp. 114-132). Washington,    DC, USA: U.S. Global Change Research Program. Pearl, J., y MacKenzie, D. (2018).  The book of why . Londres: Penguin Random House.    Pigliucci, M. (2013). The demarcation problem. A (belated) response to Laudan.   En M. Pigliucci y M. Boudry (eds.),  Philosophy of pseudoscience: Reconsidering   the demarcation problem  (pp. 9-28). Chicago: University of Chicago Press. Stone, D. A., Allen, M. R., Stott, P. A., Pall, P., Min, S. K., Nozawa, T., y Yukimoto, S.   (2009). The detection and attribution of human influence on climate.  Annual  Review of Environment and Resources ,  34 , 1-16.  2. SUJETAR A PRUEBA LAS IDEAS \n50   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Tacq,  J.  (2011).  Causality  in  qualitative  and  quantitative  research.   Quality  and    Quantity, 45 (2), 263-291.  University  of  California  Museum  of  Paleontology.  (2024).   How  science  works .  UnderstandingScience.org.  Berkeley,  California.  https://undsci.berkeley.edu/  understanding-science-101/how-science-works/the-real-process-of-science/,   recuperado el 6 de abril de 2024.  \n51  3. La etnografía como herramientatransdisciplinaria  Dolores Ofelia Molina Rosales Problematizar y cuestionar nos lleva a pensar en lo inédito, en lo por-venir,  implica ser consecuentes con la construcción aquí y ahora;  ello conlleva el método del hacer caminando y caminar preguntando   (Sandoval Álvarez, 2016, p. 15).  Método etnográfico y nuestra reflexión inicial  como “sujetos(as) ubicados(as)”  Empezaré  este  capítulo  como  suelo  comenzar  las  presentaciones  en  las    que  promuevo  la  vocación  científica  (principalmente  entre  mujeres).  Soy    antropóloga-feminista, orgullosa-madre de dos artistas y deportistas. Me gusta   saber que eligieron el arte como profesión porque les apasiona. Crecí en San   Cristóbal de Las Casas, Chiapas, viendo a poetas, políticos y antropólogos(as).    Estos  últimos  personajes  me  cautivaban,  aunque  no  sabía  muy  bien  lo  que    hacían, pero saber que se iban a vivir por meses a las comunidades aledañas   me  intrigaba.  No  tuve  una  adecuada  orientación  vocacional,  por  lo  que  al   \n52   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  momento de elegir qué estudiar decidí optar por una carrera que supuestamente   me  garantizaría  un  ingreso  mensual.  Afortunadamente,  en  la  universidad  tuve    dos profesores-guía que me ayudaron a descubrir mi verdadera vocación y me   motivaron a realizar el posgrado en antropología.  Ahora, mi línea de investigación es antropología ambiental y género. Trabajo en   el Departamento de Ciencias de la Sustentabilidad, en El Colegio de la Frontera    Sur (ECOSUR). Y desde ahí les invitaré a reflexionar sobre el método científico,    en particular, desde el contexto de colaboración-académica que se realiza en   nuestra institución, que es un espacio donde investigamos desde la multi, inter y   transdisciplina. Considero que un reto que tenemos ahora es formar profesionales    que  además  de  saber  cómo  utilizar  el  método  científico,  puedan  vislumbrar   las implicaciones: (1) de su posición como “sujetos ubicados” en la selección de   sus “temas de investigación” (Valiente, 2021; Rosaldo, 1989), (2) de su afinidad    hacia ciertas herramientas para generar conocimiento,1  y (3) de seguir pensando   que por garantizar la objetividad en nuestras investigaciones no podemos ir más    allá de nuestros laboratorios o cubículos (De la Cuesta Benjumea, 2003). Dejando   así como única ventana de colaboración la que se realiza entre pares y que    se  consolida  (y  premia)  mediante  la  escritura  en  publicaciones  indexadas  en    revistas de alto nivel, pero que no se leerán en el contexto donde sus hallazgos   puedan tener alta pertinencia (Bergmann  et al ., 2021; Berkes, 2009; Kinzing, 2001).  Los párrafos iniciales de este capítulo muestran parcialmente quién es la autora   como sujeta-ubicada, con una trayectoria académica que la hace experta en    marcos teórico-metodológicos específicos para explicar la realidad, ser humano   con una vida-cotidiana y una postura política que la sitúan de manera particular    en  el  contexto  de  la  institución  donde  labora.  Desde  la  teoría  crítica,  esto  es     un  punto  de  partida  al  reconocernos  como  científicas(os)  que  contribuimos    a  la  generación  de  conocimiento,  con  una  postura  ética  y  política  particular    (Sandoval Álvarez, 2016; Llanes, 2009; Rosaldo, 1989).  Esta  mirada  introspectiva  sobre  quiénes  somos  (a  partir  del  lugar  en  el  que    crecimos,  el  tipo  de  familia  en  la  que  nacimos,  la  educación  que  recibimos   1 Como parte de nuestra formación disciplinar, aprendemos a generar datos de manera   específica,  algunos  desde  un  laboratorio,  otros  preguntando  a  la  gente  mediante   encuestas  como  parte  de  una  muestra  representativa  y  otros  haciendo  observación     participante o mediante entrevistas abiertas a un número pequeño de sujetos. \n53  —instituciones públicas o privada—, los viajes que hemos realizado, el tipo de   relaciones  personales  que  hemos  establecido  a  lo  largo  de  los  años)  posibilita    que vislumbremos el porqué hemos seleccionado no solo la disciplina desde la    cual realizaremos el trabajo científico, sino también la perspectiva teórica que   tendremos  en  nuestras  investigaciones  (Malnis,  2023;  Sandoval  Álvarez,  2021;    Zemelman,  2011).  Por  ejemplo,  si  nos  interesara  el  aporte  de  la  proteína  en  la    mejora de las condiciones nutricionales de la población, podríamos realizar un   estudio en el que analicemos tanto las potencialidades de la proteína de origen   animal,  como  la  de  origen  vegetal.  Sin  embargo,  si  al  momento  de  diseñar  el    protocolo tenemos una alimentación vegana, es probable que nos enfoquemos   solamente en la importancia de los nutrientes de la proteína de origen vegetal,   pues  no  nos  interesaría  fomentar  un  consumo  que  promueve  un  estilo  de    vida  que  no  compartimos,  ya  que  implicaría  un  uso  del  entorno  natural  que    consideramos inadecuado.2  Antropología: cuna del método etnográfico  Como  científicas(os),  el  entramado  más  importante  para  la  selección  de    nuestro objeto de estudio, entendido este como el planteamiento del problema   al  que  buscamos  dar  solución  o  respuesta,  está  en  la  disciplina  en  la  que  nos    especializamos. 3  Desde ahí se generan los referentes con los que delimitaremos  el contexto teórico desde el cual indagaremos, pues el objeto de investigación    no  es  empírico,  sino  conceptual,  y  quien  investiga  “no    toma   problemas  de   la  realidad,  sino  que  los  construye  desde  sus  referentes  interpretativos  y  el    conocimiento  previo  de  la  realidad  por  investigar”  (Torres  Carrillo  y  Jiménez    Becerra, 2004, p. 16). 2 Esto sin considerar, que a lo largo de la historia se ponderan diferentes discursos globales  medioambientales, que hacen que tanto el sector académico como el gubernamental   orienten sus recursos a temáticas particulares (Molina-Rosales, 2021; Adger  et al ., 2003).3  Por ejemplo, el objeto de investigación para un microbiólogo sería comprender cómo  los  microbios  causan  enfermedades  o  plagas  en  plantas  o  animales  (incluidos  los  seres    humanos); para un antropólogo físico, sería comprender cómo esos microbios afectan el   crecimiento de infantes, y para una antropóloga cultural, cómo las madres atienden las   enfermedades relacionadas con dichos microbios.  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA \n54   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En el caso de la antropología social, el proceso para la selección de su “objeto de   estudio” se puede remontar a cuando la disciplina aún no existía como tal, pero   ya había pensadores interesados en la cultura de las poblaciones “primitivas”,    aquellas  que  no  compartían  estilos  de  vida  de  los  investigadores.4  Existía  interés   por comprender cómo sobrevivían en escenarios donde el desarrollo tecnológico    se consideraba precario. Los exploradores, viajeros o misioneros del siglo XVI fueron   los encargados de realizar los primeros registros “etnográficos” sobre comunidades   “aisladas” del mundo occidental, aunque se realizaban sin el rigor científico que   demandamos hoy. Cabe decir que a finales del siglo XVIII, gracias a los esfuerzos de   Buffon y Linneo por la divulgación y clasificación de las especies de las expediciones   previas, es que surge la “historia natural moderna”. 5  Ya en el siglo XVIII, en los viajes   de  exploración  promovidos  por  las  monarquías,  las  observaciones  se  volvieron     más sistemáticas y metódicas, pues ya existía un grupo de científicos (naturalistas)    interesados no solo en observar, sino también en explicar las alteridades con las   que se confrontaban durante esos viajes (Ventura, 2016).  Para la antropología (interesada en “la otredad”), las reflexiones de algunos   geógrafos-viajeros  fueron  clave,  así  como  los  escritos  de  filósofos  de  la   época. Jean Jaques Rosseau hablaba del “buen salvaje” y trató de explicar    el  comportamiento  humano  en  sus  obras   Discurso  sobre  el  origen  de  la    desigualdad  entre  los  hombres   (1755)  y   El  contrato  social   (1762).  Adam  Smith    veía en el comportamiento humano una dualidad entre razón e impulsos y trató   de comprender la naturaleza de nuestras elecciones en obras como  Teoría de  los sentimientos morales  (1759) y  La riqueza de las naciones  (1776).  Para 1775, Johann Friedrich Blumenbach se gradúa como médico y tres años   más tarde se convierte en profesor titular en la Universidad de Gotinga, donde se   enfoca en el análisis de las características y la distribución de las razas humanas,   por lo que se le considera precursor de la teoría de la evolución y padre de la   antropología física (Nature, 1940). 4 Los registros históricos solo nombran a varones, aunque posiblemente en las expediciones  pioneras de investigación también participaron mujeres, pero desafortunadamente, esto   no  se  encuentra  documentado.  Por  lo  tanto,  en  algunos  casos  me  referiré  a  quienes     investigan solo en “masculino”. 5  Aun  cuando  Buffon  nunca  participó  en  alguna  expedición.  Linneo  viajó  por  algunos   puntos  de  Europa,  además  de  realizar  expediciones  en  Laponia  y  algunas  regiones    escandinavas. \n55  Herbert Spencer, nacido en Inglaterra en 1820, fue un naturalista, filósofo, sociólogo,   psicólogo y antropólogo, lo que se refleja en sus obras 6 que muestran la diversidad  de  intereses  que  desarrolló  a  lo  largo  de  su  carrera,  siempre  con  el  entusiasmo    de comprender el comportamiento humano. Su mayor aporte fue defender los   postulados  del  positivismo  para  las  nacientes  ciencias  sociales/humanísticas  y     difundir el evolucionismo “social” a partir de la teoría de Darwin.  Otro inglés, Edward Tylor (1832-1917), por las mismas fechas escribía sus obras   pioneras  Investigaciones  sobre  la  historia  de  la  humanidad   (1865),   Cultura   primitiva:  investigaciones  sobre  el  desarrollo  de  la  mitología,  filosofía,  religión,    arte  y  costumbres   (1871)  y   Antropología:  Introducción  al  estudio  del  hombre   y  de  la  civilización   (1881),  por  lo  que  hay  quienes  lo  miran  como  el  padre  de    la  antropología  cultural.  Sin  embargo,  desde  mi  historia,  un  parteaguas  en  la    antropología  son  las  aportaciones  de  Franz  Boas  (1858-1942),  fundador  del    primer  departamento  de  antropología  en  la  Universidad  de  Clark,  en  Estados     Unidos, y por enfocarse en discutir el método etnográfico a partir de su teoría   sobre el relativismo cultural (Hahn, 2023). Sin embargo, podemos reconocer a otros   grandes antropólogos que han aportado mucho al método etnográfico: Kroeber,    Lowie, Sapir, Whorf, Murdock, Radcliffe-Brown, Malinowsky, Mead y Benedict.  El método etnográfico como paquete de herramientas de campo  Además  de  personajes  clave  como  los  arriba  mencionados,  para  la  historia    de  la  antropología  el  positivismo  tuvo  impacto  clave  en  el  cuestionamiento    sobre  nuestras  formas  de  generar  información.  Hizo  que  se  pusiera  énfasis    en  la  manera  de  realizar  nuestros  registros,  de  sistematizar  la  información,  de    analizarla  e  interpretarla,  así  como  en  los  mecanismos  más  adecuados  para    conformar  grupos  de  colaboración  especializada  e  interdisciplinaria.  Nos  hizo     escuela y nos agrupó en subdisciplinas: antropología cultural/social, lingüística,    antropología  física  y  arqueología.  Cada  área  con  una  visión  particular  para     comprender el comportamiento humano, y con herramientas específicas para    generar información. 6   Estadística  social   (1851),   Principios  de  psicología   (1855),   Principios  de  biología   (1864),    Principios de sociología  (1896).  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA \n56   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  En  la  antropología  cultural  o  social,  se  generó  una  propuesta  metodológica    particular  que  llamamos  etnografía,  la  cual  parte  de  un  principio  clave:    el  reconocimiento  del  valor  de  la  experiencia  de  las  personas  con  las  que    generamos  información.  Esto  se  propició  porque  las(os)  antropólogas(os)    comenzaron  estudiando  poblaciones  con  las  que  no  compartían  mucho,    culturas sumamente diferentes y de las que querían aprender, no solo entender.  Imaginemos  que  vivimos  en  una  localidad  remota,  a  la  que  solo  se  arriba    en  lancha  y  de  pronto  llega  un  hombre  de  rasgos  físicos  muy  diferentes  a  los    nuestros, hablando unas cuantas palabras en nuestra lengua mientras nosotros   no  entendemos  su  idioma,  y  su  ropa  y  modismos  son  por  completo  distintos  a    los  nuestros.  Esta  persona  se  establece  en  nuestra  comunidad  y  nos  dice  que    quiere  aprender  sobre  nuestra  cultura.  Conjuntamente  vamos  descubriendo     qué “quiere aprender” y de a poco le enseñamos el abecé de nuestras normas.  Sobre  la  marcha  observamos  que  muchas  cosas  de  las  que  suceden  en  el    pueblo  le  sorprenden,  nos  pregunta,  registra  la  información  y  paulatinamente     se gana nuestra confianza. Casi lo percibimos como uno más de la comunidad.    Aquí estarían ya los dos momentos más importantes dentro de este método: el    “ shock   cultural”,  que  nos  permite  hacer  preguntas  a  partir  de  los  hechos  que     observamos, y el “establecimiento del  rapport ”, que posibilita que las personas  que  colaboran  con  nosotros  mantengan  una  apertura  franca  sobre  lo  que    queremos indagar.  La etnografía y su relación con la hermenéutica  Este  paquete  de  herramientas  se  nutrió  de  experiencias  de  otros  académicos    del  mundo  a  lo  largo  de  la  historia  de  la  antropología.  Por  lo  que  una  base    importante  de  la  etnografía  la  podemos  encontrar  en  la  hermenéutica,     que se considera “el arte de interpretar el texto” y de “develar el sentido de    los  mensajes  haciendo  que  su  comprensión  sea  posible”  (Arráez   et  al .,  2006,    p. 173). Es la disciplina de la interpretación e implica el desarrollo específico de    habilidades y herramientas de análisis e interpretación de escritos, de textos, en    particular. Aristóteles la conceptualizó como “el arte de la interpretación”. La    regla  hermenéutica  implica  que  el  todo  debe  entenderse  desde  lo  individual     y lo individual desde el todo, lo que significa entender una serie de relaciones    complejas. Guarda semejanza con la ecología, en esta todo está relacionado,  \n57  cada organismo aporta al todo y el todo afecta a ese organismo. No podemos   entender  el  crecimiento  de  las  hojas  de  un  árbol  sin  comprender  la  dinámica    general del árbol, y viceversa.  Entre  quienes  ponderaron  el  uso  de  la  hermenéutica  como  instrumento  de    investigación se encuentra Schleiermacher (1768-1834), un filósofo polaco que    planteó que la hermenéutica es un método que implica un proceso comprensivo-  explicativo.  Cuando  se  le  usa  para  comprender  el  comportamiento  humano,     la  realidad  social  es  vista  como  un  texto.  Solo  así  podemos  usar  el  “círculo    hermenéutico”, la base de este planteamiento. Esto supone que, antes de leer   un texto, debemos considerar que tenemos conocimientos previos o prejuicios   que  afectan  nuestro  acto  de  lectura;  saber  que  el  texto  fue  escrito  con  un     objetivo específico que va más allá de nuestros juicios previos, y que, al leerlo,   generaremos una reflexión que nos conducirá a modificar nuestras premisas; por    tanto, tendremos una nueva posición sobre nuestro objeto de estudio.7 7  Objeto  de  estudio  que  construimos  desde  nuestro  conocimiento  en  la  literatura,   nuestra experiencia previa en campo y también a partir del diálogo o colaboración que   establecemos con quienes viven la problemática que nos interesa abordar.  Figura 3.1. Momentos del análisis hermenéutico.  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA  Fuente: Elaboración propia. \n58   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Tomando en cuenta que indagamos entre seres humanos, es importante señalar   que una parte central del método etnográfico implica el reconocimiento de    que  las  personas  que  nos  están  ayudando  a  comprender  el  fenómeno  que     nos  interesa  (informantes,  colaboradores),  también  reflexionan,  analizan  y   reinterpretan su posición respecto al objeto de estudio en común. Esto es porque    en  cada  encuentro  (entrevista,  taller,  grupo  focal)  estamos  confrontándonos    (investigadores e informantes o colaboradores) con la problemática de interés    común, indagando sobre su origen, proceso, consecuencias y, quizá, posibles    soluciones.  Por  otro  lado,  los  seres  humanos  siempre  estamos  interpretando  lo  que  hay    a  nuestro  alrededor.  Tenemos  una  mente  hermenéutica,  siempre  estamos    dándole  sentido  a  lo  que  observamos.  Así  pues,  el  método  hermenéutico  lo    utiliza todo(a) investigador(a) de forma consciente o inconsciente, por lo tanto,    desde  el  planteamiento  etnográfico  es  clave  partir  de  este  reconocimiento.   Incluso,  el  reconocernos  como  “sujetas(os)  ubicadas(os)”  implicaría  este    ejercicio de autoanálisis hermenéutico (hermenéutica de uno mismo), pues se    tendría que analizar cada una de “las capas” que conforman nuestro ser, lo    que  nos  motivó  a  seleccionar  determinado  objeto  de  estudio,  una  disciplina     específica para analizar el fenómeno de interés y una red de relaciones que nos    llevó al lugar desde el que realizamos investigación, incluso a cuestionar nuestros   planteamientos éticos (Biedma López, 2007).   Verstehen , otro elemento clave del paquete etnográfico  Como  parte  de  esta  historia  en  el  desarrollo  científico,  para  encontrar   herramientas  adecuadas  a  fin  de  comprender  el  comportamiento  humano    se  gestó  la  sociología,  una  disciplina  enfocada  en  particular  al  análisis  de  la     “sociedad occidental moderna”. Esto implicó en algún momento diferenciar    entre análisis de poblaciones (agregaciones) y el de grupos (sujetos), lo que llevó   a una división tajante entre los que asumieron de lleno la propuesta positivista    sin  cuestionar  el  papel  que  las  personas  teníamos  en  nuestros  “objetos”  de    estudio, y otros que sí lo hicieron. Unos se autonombraron cuantitativos y otros   cualitativos.  Un  irreverente  del  método  en  la  sociología  fue  Max  Weber,  quien  propuso    la  metodología  interpretativa.  Para  él  era  claro  que,  a  diferencia  de  otros   \n59  científicos, cuando trabajamos con personas no podemos aislarlas y meramente   observarlas,  como  sucede  en  la  investigación  experimental,  sino  que  tenemos    que  analizar  su  conducta  en  los  escenarios  donde  suceden  los  hechos  que     nos interesan. Con ese propósito planteó enfocarse en el análisis de “hechos    sociales” que permitieran vincular lo individual con lo estructural, pero siempre   postulando la importancia de que quien investiga debe considerar la percepción    de quien vive los “hechos sociales”. En este sentido, una herramienta clave es la    comprensión  empática, el  verstehen , que implica algo similar a lo que plantea  la  propuesta  hermenéutica:  comprender,  interpretar  y  luego   comprehender .  Desde este planteamiento, se considera que en esa comprensión ya hay un plus   de lo que se aprendió con esa interpretación. Esto contempla entender desde    adentro; es una “comprensión explicativa”, o el entendimiento profundo de un    fenómeno social (Farfán, 2009; Burgardt, 2004; Tucker, 1965).  Esta propuesta weberiana tuvo buena acogida en la comunidad antropológica.   Años más tarde, las discusiones sobre lo cuantitativo y lo cualitativo permearon   a  algunos  departamentos  de  antropología  en  el  mundo.  En  la  década  de    1970  se  instalaron  en  la  antropología  nuevos  planteamientos  posmodernos.     Antropólogas(os)  “clásicas(os)”,  orgullosas(os)  del  método  etnográfico,  que    implica un paquete de herramientas diverso, comenzaron a cuestionar nuestro   quehacer, nuestras formas de proceder. Clifford Geertz, estudioso de la agricultura   en  los  cultivos  de  arroz  de  Indonesia,  escribió   La  interpretación  de  las  culturas ,   en  donde  cuestionaba  los  principios  básicos  de  la  observación  participante     (herramienta estrella del método etnográfico) y confrontó a los antropólogos en   su quehacer de “mediadores culturales”. Esta obra, como otras similares, fueron    la base de un cuestionamiento contemporáneo al método, lo que nos hizo volver    a reflexionar sobre las posibilidades y limitantes de nuestro método.  El círculo hermenéutico como parte del método científico  De esta manera, en el siglo XX, en la antropología se refrendó la idea de que    es importante cuestionar el método, es decir, si la evidencia que generábamos   era  adecuada,  si  nuestros  datos  son  independientes  del  cómo  se  conciben  y    colectan (se repetía el cuestionamiento de nuestros inicios desde el positivismo).   Ante esto, queda claro que es importante reconocer que el valor de la evidencia   empírica solo se puede evaluar al comprender los detalles en los que se realizó la   3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA \n60   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  investigación. En consecuencia, diseñar cuidadosamente las herramientas para   colectar nuestras evidencias es clave. Así pues, desde esta perspectiva, importa   discutir  sobre  nuestro  método,  cuestionarlo  y  seleccionar  bien  cuáles  serán    las  estrategias  metodológicas  que  usaremos  para  responder  mejor  a  nuestra    pregunta  de  investigación,  valorando  incluso  los  posibles  sesgos  que  pudieran     existir. Esto es clave para garantizar la “objetividad” que a otros les garantiza el    trabajo  en  el  laboratorio,  con  todas  las  variables  controladas,  a  diferencia  de    nuestros laboratorios que están en el campo.  Es  claro  que,  desde  esta  propuesta,  el  método  no  puede  ser  lineal.  Desde  el    análisis  etnográfico  se  retoma  un  esquema  circular,  reflexivo,  como  en  la    hermenéutica,  que  implica,  como  diría  Lévi-Strauss  (1962),  otro  antropólogo    francés clásico, que los investigadores somos una especie de artistas o artesanos   que  debe  trabajar  con  lo  poco  que  dispone  y  saber  construir  con  eso  algo     emotivo  y  explique  la  “realidad”.  En  el  caso  de  un  científico,  implicaría  que   reflexiona su método e identifica la mejor manera de proceder para llegar a    explicaciones válidas. Fuente: Arriba: Spradley (1980). Abajo: Bryman (2001).  Figura 3.2. El círculo hermenéutico en el método etnográfico. \n61  En  la  figura  3.2  se  muestra  el  esquema  del  método  científico  ajustado  al   trabajo  antropológico.  Spradley  (1980)  plantea  que  debemos  seleccionar  un     proyecto etnográfico que miremos que es relevante tanto porque la literatura lo    indica como por nuestra experiencia en campo. Después nos debemos dirigir al   campo y realizar preguntas ahí mismo, es decir, cuestionar nuestro planteamiento   inicial.8  En  este  momento  es  posible  rediseñar  la  estrategia  o  continuar  con  la    colecta  de  datos  etnográficos,  garantizando  su  buen  registro.  Posteriormente    los analizamos, y si con esto garantizamos la explicación del fenómeno que nos   interesaba, podemos entonces escribir y cerrar el círculo; pero si descubrimos que    los datos son insuficientes para llegar a conclusiones válidas, entonces debemos    reiniciar: replantear preguntas y regresar a campo.  Por su parte, Bryman retoma el círculo hermenéutico solo a partir del proceso de   análisis,  pues  esa  es  otra de  las  características  de  las  herramientas contenidas     en el paquete etnográfico; son instrumentos “flexibles” y, en ciertos casos, se   requiere más de una visita para finalizar el registro de información y poder tener    datos de calidad.  Independientemente  de  nuestras  disciplinas,  si  reflexionamos,  este  círculo   hermenéutico es parte del proceso de análisis, incluso cuando se está trabajando    con datos estadísticos, pues cada vez que “corres los datos” o “haces cruces    entre  variables”  se  está  estableciendo  un  diálogo  con  toda  la  información    generada  y  los  supuestos  teóricos.  Para,  posteriormente,  tener  la  posibilidad    de  poner  en  debate  nuestros  hallazgos  con  los  de  otras  investigaciones  y  así    contribuir al desarrollo teórico de nuestras disciplinas.  Método etnográfico en campo  Desde la perspectiva etnográfica, un elemento central está en la forma en que   nos introducimos “al campo”, es decir, en cómo nos instalamos en la comunidad    donde realizaremos la investigación y cómo garantizamos que quienes ahí viven    acepten colaborar con nosotros y nos tengan confianza. Durante ese periodo   8  En campo podríamos descubrir incluso que el “problema” que identificamos en gabinete  no es relevante a nivel local entre la población “afectada”, o que existe otro relacionado   que es considerado más importante.  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA \n62   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  inicial, se puede y debe generar el  rapport  necesario para trabajar en la nueva   zona de estudio e identificar en campo aspectos importantes de la problemática    de estudio, inadvertidos durante la revisión de la literatura relevante.9  Esta cualidad del método etnográfico es porque se parte del planeamiento de    que todo lo que se observa en campo puede servir como dato para analizar el   problema que nos interesa. Solo que debemos estar conscientes de esto antes    de ir a campo para planificar cómo realizaremos nuestras observaciones, 10 cómo  las registraremos,11 sistematizaremos12 y analizaremos de manera preliminar. 13  9  Estos cursos deberían ser obligatorios, por ejemplo, el de estadística. Si un(a) científico(a),   que trabaja de modo inter o transdisciplinario no es respetuoso(a) en campo, no se sorprende   con lo que ahí encuentra, ni sabe generar la confianza suficiente entre sus informantes    o  colaboradores,  recorrerá  un  camino  sinuoso,  arriesgándose  a  generar  datos  con  poca    calidad  o  de  manera  apresurada,  sin  aprovechar  del  todo  su  estancia  en  campo.  Ir  al     campo y “platicar” con las personas que aparecen de manera oportuna, no es realizar    observación participante, esta herramienta es mucho más compleja y rica que eso.10  Con “observaciones” me refiero a unidades de indagación, independientemente del   tipo  de  herramienta  que  se  esté  usando;  podrían  ser  entrevistas  abiertas  donde  el  dato     generado es un texto que se transcribirá, codificará y se analizará después. 11 Qué tipo de formatos se usarán: diario de campo, notas de campo, bitácora, entrevistas  impresas  o  en  dispositivos  digitales,  grabación  de  audio  o  de  video,  fotografías,  croquis,    entre otros.12  Qué programa usaremos para elaborar el análisis preliminar que nos permitirá identificar   la riqueza de los datos obtenidos. 13 En el método etnográfico, es importante el conocimiento de los datos generados desde   que se está en campo. \n63  La figura 3.3 muestra distintos caminos posibles durante el trabajo de campo   de  acuerdo  a  nuestros  objetivos  de  investigación.  Podemos  comenzar  con    entrevistas  informales  (parte  de  la  observación  participante),  consignarlas    en  notas  de  campo  y  posteriormente  pasar  algunos  registros  a  una  bitácora    de  campo,  analizar  esos  insumos  e  ir  directo  al  diseño  de  una  encuesta.  O    bien,  comenzar  de  la  misma  manera,  pero  decidir  avanzar  con  entrevistas     semiestructuradas  (que  se  transcribirán,  codificarán  y  analizarán)  para  luego    diseñar  una  encuesta.  O  planear  trabajar  con  cuatro  herramientas  diferentes     para generar información que nos dará datos diversos que después serán útiles    para triangular14  la información y garantizar la validez y confiabilidad del estudio.  Fuente: Elaboración propia. 14  En el método etnográfico se asume que cualquier herramienta de trabajo puede ser   perfectible (de acuerdo con el contexto) y que si quien la aplica no está completamente   consciente  de  su  posición  como  observador(a)  genera  sesgos,  por  lo  que  se  opta  por    complementar  la  información  a  partir  de  distintas  fuentes  o  herramientas.  Así,  inde-  pendientemente  de  las  herramientas  aplicadas,  los  datos  deben  de  converger  en  un    mismo  resultado  o  hacer  visible  su  contrastación,  lo  que  implicaría  seguir  indagando    (Forni, 2020; Denzin, 1978).  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA  Figura 3.3. Herramientas etnográficas: formas de registro y posibilidad de uso en el   método etnográfico. \n64   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Una  característica  del  método  etnográfico  es  que  provee  herramientas  de   campo  que  permiten  generar  información  muy  rica,  en  la  que  se  rescata  la     perspectiva de las personas que viven el problema de interés común (perspectiva    emic ):  observación  participante,  entrevistas  no  estructuradas,  entrevistas  en    profundidad,  grupos  de  discusión  o  talleres  de  diagnóstico  participativo.  Estas     herramientas dan la pauta para que las personas identifiquen los tópicos más    importantes  y  no  quien  investiga.  Después  se  avanza  con  otros  instrumentos     para recabar información más “selectiva”, que dé la oportunidad de contrastar    de  forma  inicial  algunos  supuestos  del  proyecto  de  investigación:  observación    estructurada, entrevistas semiestructurada, grupos focales, transectos, líneas en   el tiempo. Finalmente, se llega a un nivel donde lo más importante es corroborar   nuestros  supuestos  y  para  esto  contamos  con  herramientas  que  garantizan    observaciones  focalizadas,  donde  lo  relevante  es  la  perspectiva   etic ,  la  de    quienes generaron las preguntas de investigación15 (estudios de distribución de  tiempos o encuestas, por ejemplo). 15 Lo  emic  explica el comportamiento humano desde la perspectiva de la misma comunidad  con la que se indaga. Lo  etic  es una explicación que parte de criterios analíticos ajenos al   grupo estudiado, pero universales.  Fuente: Spradley (1980).  Figura 3.4. El método etnográfico y sus fases. \n65  En la figura 3.4 se observa que cuando iniciamos el trabajo de campo, nuestras   observaciones  pueden  ser  muy  generales  e  incluso  dispersas,  pero  conforme    el  tiempo  avanza,  se  vuelven  más  enfocadas,  hasta  que  nuestra  mirada  en    campo  está  completamente  en  el  punto  de  interés.  Esta  propuesta  recurre  a    un proceso que va de lo general a lo particular. Por ello es importante realizar   visitas constantes a campo, estableciendo un diálogo con quienes son parte del   tema que nos interesa. Esto es así porque, en gran medida, el investigador es la   principal herramienta de colección de información16 y por lo tanto se debe partir  de una postura holística. Lo que involucra el autocuestionamiento, el cual debe   comenzar desde antes de la generación del dato y dar importancia al contexto   cuando se produce la información.  Las bondades del método etnográfico para el trabajo transdisciplinario  De acuerdo con Julie T. Klein, en la década de 1970 se plantearon los elementos   iniciales para el desarrollo de la transdisciplina cuando se organizó un seminario   interdisciplinario  patrocinado  por  la  Organización  para  la  Cooperación  y  el     Desarrollo  Económico  (OCDE),  allí  la  transdisciplina  fue  definida  como  “un   sistema  común  de  axiomas  para  un  conjunto  de  disciplinas”  (2014,  p.  11),    pretendiendo trascender las miradas disciplinarias. En esa reunión el ejemplo fue   la antropología, quizá por su perspectiva holística y por tratar de rescatar la voz   de las personas que viven a nivel local, e incluso problemas que tienen que ver   con acciones gestadas a nivel global.17 Hensler    et  al .  (2024,  p.  34)  señalan  que  “existen  diferentes  corrientes  de  la   transdisciplina, las cuales Klein (2014) caracteriza en tres ramos: 1) la trascendencia  16  Por  lo  que  incluso  vale  tomar  en  cuenta  el  estado  de  ánimo  al  entrar  al  campo,  los    “sesgos” que nuestra presencia provoca allí o el cansancio que podemos tener durante el   mismo. Si no estamos en buena condición, sanos y atentos, es mejor abandonar el trabajo   de campo por un tiempo. Incluso es importante cuidar nuestros tiempos de observación y el    número de entrevistas realizadas durante un día para que la calidad del dato no disminuya. 17 De acuerdo con Mauser  et al . (2013, p. 423), el prefijo “trans” remite a “trabajando entre   diferentes  disciplinas,  atravesando  disciplinas  y  más  allá  de  las  disciplinas”.  La  diferencia     central entre la inter y la transdisciplina está en el involucramiento de la “sociedad civil” en   los proyectos de investigación, con miras a la solución de una problemática común.  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA \n66   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  en el conocimiento intraacadémico desde una mirada teórica, 2) la solución de   problemas y la colaboración multiactoral desde un enfoque pragmático, y 3) la    transgresión y transformación de la ciencia con un enfoque ético-político”.  Ahora  bien,  para  poder  pensar  en  proyectos  transdisciplinarios  debemos    considerar  que,  además  de  partir  de  un  problema  relevante  a  nivel  local,  se    deben  posibilitar  procesos  de  aprendizaje  (desarrollo  de  habilidades)  entre    investigadores(as) de distintas disciplinas (de diversas instituciones), así como de    personas de la sociedad civil o de la administración pública. Estos procesos de    aprendizaje tienen que estar orientados a soluciones tanto desde lo académico,   como desde lo social (Lang  et al ., 2012).  Fuente:  Elaboración  propia  a  partir  de  las  propuestas  de  Adger   et  al . (2003), Lang   et al . (2012) y Leach (2016), figura tomada de Molina-Rosalesb (2021).  Figura 3.5. Fases de la transdisciplina desde la equidad. \n67  En la figura 3.5, se muestra un esquema de lo que implica realizar transdisciplina y   lo que se debe garantizar para poder avanzar de manera exitosa, considerando   incluso distintas dimensiones de la desigualdad con las que se vive a nivel global   y  que  debemos  combatir  de  acuerdo  con  la  Organización  de  las  Naciones    Unidas para la Educación, la Ciencia y la Cultura (UNESCO). Como se observa,   desde este planteamiento, el proceso es complejo, por lo que no es viable seguir   realizando trabajo académico de manera aislada, en el cubículo o laboratorio,   dialogando  solo  con  nuestros  pares  académicos  y  considerando  que  lo  que    hacemos no tiene nada que ver con aspectos sociales o políticos.   Para esto se requiere ir más allá de nuestras disciplinas, tener entrenamiento en   campo  para  saber  cómo  mantener  una  posición  respetuosa,  cómo  observar     “caminando”, qué podemos aprender en campo, cómo podemos colaborar    con quienes habitan el espacio donde llegamos a colaborar y considerarlos(as)   aliados(as) en los proyectos, pero, sobre todo, cómo fortalecer las capacidades    de indagación de todo el colectivo. Y finalmente reconocer que cada “sector”    involucrado  es  capaz  de  indagar,  analizar  y  crear  sus  propias  soluciones  a  la    problemática compartida desde una mirada transdisciplinaria. Como sostienen   Hensler  et al . (2024, p. 133), “coincidimos con Merçon (2021) cuando señala que   la investigación transdisciplinar es un marco metodológico que permite orientar   los  saberes,  prácticas  y  poderes  hacia  la  transformación,  advirtiendo  que  no    es  una  integración  instrumental  de  los  conocimientos  sino  un  camino  para  la    coconstrucción  de  procesos  capaz  de  criticar,  re-imaginar  y  transformar  las    relaciones de poder y, por ende, el  statu quo  (p. 34)”.  Quiero cerrar este texto con algo que está al inicio y que no volví a mencionar    porque surge de una “confesión personal” al decir que me gusta saber que mis   hijas han elegido sus profesiones porque les apasionan, este último componente    es  clave  en  cualquier  actividad,  pues  sin  eso  nuestros  días  en  el  cubículo,    laboratorio o trabajo de campo no serán memorables, sino devastadores. Ojalá    que quienes aún están en formación y leyeron esto sientan esa pasión y mucha    curiosidad por descubrir. Sin esos dos elementos nuestro quehacer se convierte   en  un  verdadero  trabajo  que  garantiza  nuestra  subsistencia  cotidiana,  pero    que no nos dará felicidad. Devastadas(os) e infelices no podremos fomentar la   colaboración.  3. LA ETNOGRAFÍA COMO HERRAMIENTA TRANSDISCIPLINARIA \n68   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Agradecimientos  Agradezco  a  las  y  los  responsables  del  Seminario  de  Investigación  de  la    Maestría en Ciencias en Recursos Naturales y Desarrollo Rural, de ECOSUR, por    invitarme a participar cada año en una clase que se ha llamado “Tradiciones    intelectuales  en  las  ciencias  sociales”,  pero  que,  con  el  transcurso  del  tiempo,     he ido modificando, enfatizando la importancia del método etnográfico en la    investigación transdisciplinaria. Esto ha sido así, por la diversidad disciplinaria del   estudiantado (no solo la de quienes imparten el curso), por lo que he intentado    que la clase sea útil para todas(os), sobre todo como una invitación a ir más allá    de la tradicional división entre ciencias sociales y naturales, que me parece es un   lastre que debemos de convertir en una palanca de impulso hacia esquemas de   colaboración más armoniosos. Finalmente, agradezco a Sofía Molina Mijangos    por su apoyo en la reelaboración de algunas figuras para esta publicación.  Referencias  Adger,  W.  N.,  Brown,  K.,  Fairbrass,  J.,  Jordan,  A.,  Paavola,  J.,  Rosendo,  S.,  y    Seyfang, G. (2003). Governance for sustainability: Towards a “thick” analysis
