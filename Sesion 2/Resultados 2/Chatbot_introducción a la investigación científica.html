a consolidar su perfil curricular. \n232   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Para  satisfacer  estos  objetivos,  presentaré  algunos  aspectos  históricos,  y  luego    unas reflexiones sobre cómo seleccionar el posgrado y el tutor correspondiente,    seguidas  de  cómo  aprovechar  los  cursos  y  potenciar  la  dinámica  de  la    investigación  para  la  tesis.  Enseguida,  haré  un  repaso  sobre  los  marcos  de    evaluación curricular para la contratación de personal y con ello espero explicar   los planes de publicación futura, sin soslayar aspectos éticos. Continuaré con la    consideración de la búsqueda de fondos para realizar investigación científica, en    particular con los fondos de la federación o de los estados, con algunos apuntes   sobre  los  recursos  para  realizar  estancias  de  investigación  o  colaboración  en     otros países. Cerraré el capítulo con algunas reflexiones sobre la repercusión    social  de  la  ciencia  y  cómo  podemos  mejorar  su  percepción  mediante    publicaciones o acciones de divulgación.  La mejor recomendación es hacer una elección temprana de la temática de   investigación que sea más atractiva, siguiendo algunas de las recomendaciones   de Wilson (Salazar-Vallejo, 2016), y mantener el paso para consolidarse como   un especialista productivo y alcanzar reconocimiento nacional e internacional.   Ese será el antídoto para el desánimo o incertidumbre por la baja disponibilidad   de plazas.  Historia  Considerada como profesión, la investigación científica es muy reciente. Cierto    que  durante  muchos  años  hubo  personas  destacadas  por  su  inventiva,  o  por    tratar  de  entender  el  universo,  lo  que  nos  puede  remontar  a  las  etapas  más    antiguas  de  las  civilizaciones  en  China  o  Japón,  en  los  países  árabes,  en  las    culturas griega o romana, o en algunas civilizaciones del continente americano.    Sin embargo, los practicantes no se reconocían como científicos y, en muchos    casos,  tampoco  orientaban  todos  sus  afanes  en  realizar  investigación,  ya  que     tenían otras ocupaciones. En Inglaterra, incluso, se hacía para beneficiar a la    humanidad  por  lo  que  no  se  esperaba  remuneración  alguna.  Dicho  sea  de    paso, el término  científico  puede trazarse hasta Aristóteles y había acepciones  en  lenguas  romances  medievales,  pero  la  formalización  del  término  en  inglés    ( scientist ) se realizó entre 1834 y 1840, y pese a cierta resistencia en su uso, ahora    es el término aceptado (Ross, 1962). \n233  Posgrado  Las  decisiones  iniciales  son  triples  y  están  relacionadas.  Debemos  elegir  la    temática  de  investigación,  un  posgrado  en  donde  se  realicen  investigaciones    en  ese  terreno,  y  una  persona  especialista  que  nos  ayude  a  mejorar  nuestra    formación e impulse nuestro desarrollo.  Las posibilidades para realizar el posgrado en México son abrumadoras. Cada   estado o ciudad principal ofrece varias opciones, y algunas instituciones cuentan   con una docena o más de posgrados.   La  segunda  decisión  es  seleccionar  un  programa  que  esté  aprobado  por    el  CONAHCYT  por  dos  razones  principales:  la  primera,  habrá  becas  para    los  estudiantes  aceptados;  la  segunda,  la  obligación  de  realizar  evaluaciones    periódicas implica que los procesos administrativos y las dinámicas académicas    estarán reguladas. No significa que las otras instituciones no tengan personal    valioso, pero sin el respaldo de la beca y el seguimiento de normas estrictas, es   fácil anticipar problemas e incomodidades de varios tipos. Seleccionar la ciudad   plantea el problema de la movilidad, en particular porque la beca tarda unos   meses en llegar a los estudiantes, por lo que deberán ahorrarse algunos recursos   para sobrellevar los primeros meses del posgrado.  Una  recomendación  complementaria  es  buscar  un  programa  que  ofrezca    continuidad  hacia  el  doctorado.  No  obliga  que  deba  seguirse  ahí,  pero  la    opción reduciría la necesidad de moverse a otras ciudades o países. En caso   de tener experiencia y resultados publicados, podría optarse por un doctorado   directo.  Por cierto, es más fácil obtener una beca para hacer la maestría en México y   luego buscar el doctorado en otra nación. Sin embargo, hay alternativas para   irse directo a otros países y las becas disponibles se pueden hallar en internet. En   esencia, quizá la decisión más importante es la selección del tutor para realizar   el posgrado. Algunas recomendaciones adicionales y relevantes, dado que el   posgrado  es  el  inicio  de  su  vida  como  profesional  de  la  ciencia,  están  en  las    notas de Gu y Bourne (2007), Erren  et al . (2015) y Huang (2020).  13. LA INVESTIGACIÓN CIENTÍFICA COMO PROFESIÓN \n234   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Tutor  Debe  repetirse:  la  elección  del  tutor  para  realizar  el  posgrado  es  sumamente    importante.  En  nuestro  sueño  para  ser  científico  consideramos  varias  figuras    destacadas con las que nos gustaría tener alguna interacción y mejorar nuestra    formación. Empero, es fácil anticipar que un científico reconocido tendrá varios    estudiantes  en  su  laboratorio,  de  varios  niveles  de  escolaridad,  y  quizá  deba    cumplir algunas funciones administrativas. Esto repercutirá en el tiempo disponible   para la interacción con los estudiantes, y puede resultar en contactos escasos    con un científico reconocido. Como quiera que sea, dado que la ciencia se   aprende como la escultura o la música en una relación maestro-aprendiz, si hay    poco tiempo para la interacción, el aprendizaje no será todo lo rápido que se   desea. Es posible que el dominio de un tema o problemática de investigación    nos tome diez años, como refirió Greene en su libro  Maestría   (Salazar-Vallejo,   2014),  por  lo  que  debemos  ser  pacientes  y  potenciar  nuestros  avances  con  el    profesor, sin el profesor, o a pesar del profesor.  De las muchas recomendaciones disponibles para seleccionar un tutor (Bhartiya   y Ichhpujani, 2013; RGSUM, 2014; Henschel, 2020) las principales son: i) aclare    sus  intereses  y  planes  futuros.  Además,  la  persona  seleccionada:  ii)  debe  ser    respetada  y  reconocida  en  su  campo,  tener  disponibilidad  para  orientar  a    los  jóvenes,  y  compartir  experiencia  y  tiempo;  iii)  debe  ser  accesible  y  brindar    recursos  para  la  investigación  deseada,  o  respaldarnos  para  encontrarlos;    iv)  debe  estar  consolidada  en  el  tema  de  nuestro  interés,  y  la  dinámica  para    generar  las  publicaciones  en  el  grupo  de  trabajo  debe  ser  lo  más  clara  y    satisfactoria  posible.  Otras  ideas  relevantes  serían  visitar  el  laboratorio  o  grupo    de  trabajo  de  la  persona  seleccionada  para  hablar  con  los  estudiantes    buscando conocer detalles de la dinámica interna; si no puede viajar, inténtelo   por medios electrónicos. Considere tener otros asesores en el mismo tema o en   temas  parecidos  para  complementar  el  desarrollo  de  su  investigación  y  que,    de preferencia, no sean antagónicos con su mentor, o entre sí. Satisfacer estas   recomendaciones permitirá reducir la ansiedad y mejorar la creatividad, lo que   evitará la frustración.  Otras  recomendaciones  personales  (Erren   et  al .,  2007)  valiosas  para  todos  los    interesados,  incluyendo  a  los  investigadores  establecidos:  trate  de  hacer  algo     significativo en su temática de investigación al buscar problemas relevantes;    no  importa  tanto  la  edad  sino  su  dedicación  sostenida  y  efectiva;  no  busque   \n235  excusas;  revise  los  pros  y  contras  de  sus  ideas  y  mantenga  la  puerta  abierta  a    otras, particularmente si son estimulantes.  Una última recomendación: considere una a tres alternativas de posgrado y   tutor. La mejor posibilidad será que el tutor no tenga demasiados estudiantes y   esté interesado en la temática de investigación en la que le interese formarse    como científico. Si consigue aceptación en todas, podrá darse el lujo de elegir    la óptima.  Cursos  Los  programas  de  maestría  y  los  de  doctorado  directo  requieren  de  cursos     obligatorios y otros tantos optativos. Algunos le resultarán afines a sus intereses,    y  otros  le  resultarán  ajenos  o  aburridos.  Considere  que  todos  los  cursos  tienen    algo que ofrecer e incluso cuando su contenido parezca distante hallará por lo   menos una forma complementaria para comprender el mundo o la sociedad.   No  faltarán  problemas,  pero  como  está  en  un  terreno  que  usted  seleccionó,    no  serán  tan  abrumadores.  Sin  embargo,  si  las  temáticas  de  algunos  cursos  le    resultan  particularmente  problemáticas  por  su  formación  universitaria,  haga  lo     mejor posible por subsanar sus deficiencias y sacarles el máximo provecho. La    razón medular es que los cursos y entrenamientos complementan la formación y   potencian la consecución de un empleo en áreas colaterales a la temática de   la tesis de grado.  Tesis  Ya en la dinámica del posgrado, la mejor recomendación es adelantar todo lo   posible en el desarrollo de su investigación. Puede ser la selección de la literatura   crítica,  familiarizarse  con  los  métodos,  técnicas  o  equipos  del  laboratorio,    o emprender salidas de prospección para conocer el terreno de primera mano.   La maestría, en particular, al transcurrir en 24 meses con la obtención del grado,   porque  esa  es  la  duración  de  la  beca,  implica  una  mayor  concentración  y    constancia  en  el  trabajo  de  investigación.  En  el  doctorado  hay  el  doble  del    tiempo,  pero  también  aumentan  los  problemas  a  tratar  o  su  profundidad,  de    modo que tampoco se debe uno echar a la hamaca.  13. LA INVESTIGACIÓN CIENTÍFICA COMO PROFESIÓN \n236   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  De cualquier manera, si se decidió por un posgrado que cuente con doctorado   y  trata  de  enlazarlo  desde  la  maestría,  seleccione  una  pieza  de  información    completa de su tesis de maestría y remita el documento para publicación. En   ECOSUR  se  obliga  que  haya  un  producto  enviado  a  publicación  para  optar    al  grado  de  maestría,  además  de  la  tesis,  por  lo  que  satisfacer  el  requisito  le    abriría  la  puerta  para  seguirse  con  el  doctorado.  Si  cumple  los  requisitos,  su    aceptación sería condicionada a que obtenga la maestría, y así podrá enlazar   ambos grados.  La investigación doctoral podría ser una expansión del tema de la maestría, o   quizá un refinamiento para alcanzar mayor profundidad en los análisis o estudios    realizados.  Si  consigue  mantenerse  en  la  misma  temática  de  investigación,    alcanzará  su  dominio  razonable,  y  si  se  organiza  bien,  contará  con  varias    publicaciones al terminar su doctorado. Esto es muy importante y mostraré las   razones en los rubros siguientes.  Mecanismos para la evaluación curricular  Algunos podrían pensar que si nuestra tradición profesional de la investigación    científica  es  tan  breve,  no  debería  evaluarse  con  la  misma  rigurosidad  con    la  que  se  consideran  los  resultados  en  otras  naciones.  Pues  no  puede  ser  así.     Aunque es factible que haya investigación científica de primera orientada a la    solución de problemas locales o regionales, la ciencia también debe evaluarse   en el escenario mundial.  La evaluación formal de los científicos o académicos en México comenzó en   1983, con el establecimiento del Sistema Nacional de Investigadores (SNI), al    que siguieron mecanismos similares para las universidades (López-Molina, 2017).    Como  en  aquel  momento  la  situación  económica  era  de  hiperinflación  y    devaluación,  la  Academia  de  Ciencias  propuso  un  programa  emergente  de    estímulos  que  mejoraría  el  salario  de  los  académicos.  Consistía  en  reconocer    los productos de investigación y separar a los académicos en varias categorías   para otorgarles estímulos acordes a su producción y categorización.  El SNI agrupa a los miembros en varias áreas y ha ido creciendo desde unos 1,400   miembros en 1984 (Peña, 1995) a más de 33 mil en la actualidad. Los requisitos   de ingreso y promoción han ido aumentando, pero no hay un criterio único para  \n237  todas las áreas, y tiene una serie de problemas pendientes de solución (Lloyd,   2018;  Ramos-Zinckle,  2018;  Pérez-Chavarría,  2019),  incluyendo  una  extendida    carga burocrática (Lomnitz, 2016). Por otro lado, la prevalencia de los miembros   de  la  Universidad  Nacional  Autónoma  de  México  (UNAM)  en  las  comisiones    podría haber generado un efecto corporativo, y quizá inadvertido; es decir, en   igualdad  de  condiciones,  el  personal  académico  de  la  UNAM  tendría  niveles    mayores que los no unamitas.  La  producción  de  artículos  en  revistas  arbitradas  y  los  capítulos  publicados  en    libros  con  arbitraje  han  sido  las  actividades  consideradas  más  relevantes.  Sin     embargo, quizá por las diferencias entre las áreas académicas, se califica como    mínima la producción de un resultado en esas categorías por año. De hecho, ese   era uno de los requisitos principales en los contratos que se hacían con el personal   académico.  No  se  estableció,  por  desgracia,  la  condición  de  que  la  persona     fuera el único o primer autor, por lo que parecían similares una publicación con    un  autor  que  la  realizada  por  todo  el  personal  de  un  departamento.  Esto  ha     limitado la producción científica en México ya que la actividad ha decrecido de    contar con 0.9 publ/invest/año a mediados de los años ochenta, a 0.4 en 2011   (Rodríguez-Miramontes  et al ., 2017), o 0.5 en 2015 (Conacyt, 2016), pese a que la   membresía del SNI superó los 30 mil. Con datos de 2017, estábamos rezagados    en  relación  con  Brasil,  por  lo  menos  en  dos  indicadores  fundamentales:  la     inversión federal (1.3% vs. 0.5% del PIB) y el número de investigadores por millón   de habitantes (1,635 vs. 488) (Scimago Lab., 2018).  Los  mecanismos  de  evaluación  y  los  estímulos  correspondientes  han  guiado    los  esfuerzos  del  personal  académico  y  el  resultado  ha  sido  que  artículos  o    capítulos de libro sean multiautorales. Por un lado, la evaluación de los posgrados   apreciaba e impulsaba las publicaciones realizadas por los estudiantes con sus   tutores,  pero  a  menudo  esto  ocasionó  que  se  trepara  todo  el  comité  tutelar    a  los  resultados  de  los  jóvenes,  de  modo  que  en  algunas  instituciones  se  ha    reglamentado ese proceso. Por el otro, la organización del personal universitario   en cuerpos académicos, y los mejores estímulos a los productos con varios autores   del mismo cuerpo, resultaron en los típicos bloques de autores en los que cada   uno realiza un documento, pero anota a todos los demás. La simulación resulta   en el abultamiento de la lista de productos, pero la proporción de la producción   per cápita no aumenta. Es decir, si cinco académicos incurren en esta práctica,    al final del año cada uno tendría cinco productos, pero la producción real sería   de uno por académico. La solución es promover la restricción del número de   13. LA INVESTIGACIÓN CIENTÍFICA COMO PROFESIÓN \n238   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  autores a aquellos que contribuyan de manera relevante, o significativa, en la   planeación de la investigación, en la generación y análisis de los resultados, y   en la elaboración del documento. Las participaciones limitadas o tangenciales   se deben reconocer en los agradecimientos. La ética de la publicación es tan   relevante que hay un volumen completo dedicado casi exclusivamente a esa   cuestión (CSEPP, 2009); otros detalles en López-Calva  et al . (2017). Entonces,  la  mejor  recomendación  para  los  jóvenes  es  que  traten  de  publicar     como autores primeros o únicos para ganar su sitio en el mundo, o por lo menos   para construir y mantener una reputación como científicos (Bourne y Barbour,    2011),  y  participar  con  otros  colegas  de  manera  relevante  para  ameritar    coautorías. Debo reconocer, empero, que el posgrado es una escalera que hay   que recorrer por completo, y que la mejor forma de hacerlo es comprendiendo   las  reglas  y  continuar  de  la  mejor  manera  posible.  En  particular  para  las    publicaciones,  ayudará  mucho  comentarlo  con  sobrada  anticipación  con  los    colegas  directores  de  tesis  para  evitar  tragos  amargos  cuando  el  documento    esté terminado. Otros aspectos pueden hallarse en la compilación de Castaños   y Muñiz (2014).  Plan de publicación  Para  tener  una  mejor  idea  del  desarrollo  curricular  personal,  los  estudiantes    deberían tener un plan de publicación con los resultados de sus tesis. Por supuesto,   hacerlo de acuerdo con su tutor, sin perder de vista los principios de la ética de   la  publicación  mencionados  brevemente.  Hay  mucha  información  disponible    sobre la interacción con los colegas que es importante consultar (Lewitter  et al .,    2019), por lo que prefiero comentar un poco más sobre la estrategia personal.  Durante  muchos  años,  los  jóvenes  que  me  padecieron  debían  realizar  una    publicación  única  emanada  de  su  tesis  doctoral.  Pensaba  que  contar  con    una pieza completa de información era preferible a una serie de notas cortas,   incompletas  de  por  sí,  aunque  fueran  parte  de  una  serie.  Me  equivoqué.     Aunque  aspiraba  a  que  la  evaluación  del  personal  no  fuera  por  números   simplones, como el factor de impacto o el número de citas, algo a lo que    nos habíamos opuesto abiertamente (Salazar-Vallejo y Carrera-Parra, 1998), no    anticipé que la inercia social sería difícil de modificar. Incluso ahora y después   de la Declaración de San Francisco (https://sfdora.org), establecida en 2013,  \n239  la evaluación descansa principalmente en esos números, o en sus derivados,   como los índices  h  o similares. El cambio será difícil, pero no imposible (Hatch  y Curry, 2020).  En consecuencia, mi recomendación ahora es que los resultados se organicen   como piezas completas de información, pero ya no como publicaciones únicas,    sin  perder  de  vista  que  los  documentos  remitidos  sean  de  la  máxima  calidad    posible ante el alud de muchas publicaciones de mala calidad (Sarewitz, 2016).   Hay varias razones para ello, y la principal radica en la producción. Al terminar el   doctorado, los jóvenes en busca de una estancia posdoctoral o de una cátedra   o  plaza  tendrían,  en  el  esquema  de  ECOSUR,  apenas  una  publicación  y  otra    aceptada, ya que el requisito para la maestría es la remisión de un documento.   Entonces, luego de seis años de beca, los egresados tendrían apenas de dos a   tres publicaciones, lo que podría llegar a 0.5 publ/invest/año. Un valor que no se   puede presumir y que tampoco abrirá las puertas a becas o a contrataciones.   Dado que la expectativa es tan modesta, deberíamos movernos como institución,   y como nación, a modificar el esquema y demandar más productos a nuestros    estudiantes  de  posgrado,  de  la  mano  de  mayor  participación  y  asesoría  por    parte de sus tutores. No trato de decir que concretar publicaciones sea sencillo,   sino que es necesario movernos a una mejor organización de la investigación y a   potenciar la producción de los estudiantes. Resultará en más trabajo para todos,    por supuesto, pero ir en esa dirección será muy útil para la vida académica de   nuestros egresados, y repercutirá en el perfil nacional de producción científica.  Fondos para la investigación  La  transición  de  ser  estudiante  de  posgrado  a  personal  académico  de  una    institución puede ser problemática. Es muy reconfortante hacer el posgrado en   una  institución  con  laboratorios  bien  equipados  y  con  fondos  generosos  para    realizar salidas de campo, muestreos, estancias y pagar por las publicaciones.   Ser contratado por otra institución con menos recursos y libertad económica es   siempre complicado. Por ello una de las tareas primordiales es la consecución   de  fondos  para  equipamiento  y  las  actividades  básicas  de  los  proyectos  de    investigación.  13. LA INVESTIGACIÓN CIENTÍFICA COMO PROFESIÓN \n240   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Aligerar la transición dependerá de las condiciones imperantes en cada nación   o institución. En un país en el que el Estado sea prolijo en la asignación de recursos    para  la  investigación  científica,  habrá  que  presentar  algunas  propuestas  y,    dada la disponibilidad de recursos, más temprano que tarde el personal recién   contratado  podrá  tener  ciertas  condiciones  para  mantener  sus  intereses  y    productos de investigación.  Lo  contrario  ocurrirá  en  una  nación  en  la  que  no  se  disponga  de  recursos    generosos para la investigación científica. Si hay fondos disponibles, quizá estarán    etiquetados para atender ciertas demandas concretas en los rubros de salud,   alimentación  o  educación,  que  son  fundamentales  para  el  bienestar  de  las    naciones. Si hay recursos para otras áreas de investigación, deberá anticiparse   competencia  intensa  con  pocos  resultados  positivos,  por  lo  que  realizar    propuestas para buscar fondos será una tarea cotidiana para el personal. Luego    de dos o tres rondas de competencia sin obtener financiamiento, el personal    tendrá  problemas  para  establecer  o  consolidar  su  línea  de  investigación  y,    dependiendo  del  sistema  de  evaluación  para  los  estímulos,  quizá  no  pueda    obtenerlos si el énfasis descansa en la generación de fondos externos.  Anotamos  en  otra  parte  que  el  pago  de  los  intereses  de  la  deuda  externa    consume  buena  parte  del  presupuesto  de  las  naciones  (Salazar-Vallejo  y    González, 2016). No ahondaré en ello, aunque valdría la pena mencionar que,   si no aumentan los fondos de una nación, debería renegociarse el pago de los   intereses y contar con un poco más de dinero para atender a las necesidades    nacionales, incluyendo la investigación científica. La pregunta, empero, es ¿qué    se puede hacer con pocos recursos?  En efecto, las comparaciones entre las naciones, o en la misma nación, muestran   que los países o instituciones más productivos no son los que invierten más dinero   en investigación, sino los que usan mejor los fondos disponibles (Liedo-Fernández   y  Salazar-Vallejo,  2010).  La  respuesta  pasa,  de  manera  ineludible,  por  la     optimización de los fondos para realizar investigación, así como de la búsqueda    de fondos complementarios, así sea para el desarrollo de las investigaciones de   los estudiantes.  La desaparición de las becas mixtas del Conacyt tuvo un impacto mayor, ya que   las estancias de investigación serán más complicadas, toda vez que quizá era la   principal actividad involucrada para solicitar esas becas. Hay algunos recursos   disponibles en varios países o instituciones, y también sigue la solidaridad entre  \n241  colegas  para  permitir  las  estancias  sin  requerir  fondos  extra.  Este  sería  un  paso    importante  para  establecer  colaboración  internacional  (De  Grijs,  2015),  pero    hay otras alternativas. No obstante, la reinstalación de las becas mixtas será de   gran ayuda para los interesados en ese tipo de actividades.  Ha habido una embestida sobre la autonomía de los centros de investigación   o  de  educación  superior  ya  que,  al  reducirse  los  fondos  disponibles,  se  han    incrementado las presiones para asociarse con la industria, para obtener fondos   complementarios  de  otras  fuentes,  o  ambas,  en  lo  que  se  ha  denominado     capitalismo  académico   (Slaughter  y  Leslie,  1997).  En  el  peor  de  los  casos,     deberíamos  reflexionar  sobre  el  testamento  cultural  de  Enrique  Rioja,  un    destacado  sabio  español  que  llegó  a  México  como  exiliado  por  la  guerra    civil,  y  que  impulsó  la  hidrobiología  y  la  zoología  marina  en  nuestro  país.  En  lo     que podría considerarse una retrospectiva personal, dadas las dificultades que    tuvo que encarar para realizar sus investigaciones, y dirigiéndose a los jóvenes    interesados en la ciencia como profesión anotó (Salazar-Vallejo, 1989 [1988],   p. 42): “Oiréis a las plañideras lamentarse de la incomprensión, de la falta de    posibilidades  y  de  medios.  Falso,  estas  son  las  voces  de  los  indiferentes,  de  los    fracasados  o  de  los  simuladores;  siempre  hay  un  sector  modesto  en  que  se     puede hacer algo. No importa que ese algo sea capital o accesorio...”  Repercusión social de la ciencia  La investigación científica es relevante para el desarrollo del conocimiento y,    generalmente, para el bienestar de las sociedades. No obstante, la percepción    social ha cambiado mucho durante los últimos setenta años por lo que hay   quienes argumentan que nos falta cultura científica y reducir la ignorancia o el   analfabetismo funcional o científico (Cereijido, 2009; Aldana, 2012). Es decir, los    practicantes  de  la  ciencia  eran  considerados  como  las  personas  más  sabias,    de  modo  que  los  jóvenes  interesados  eran  admirados  por  sus  compañeros  y    familiares. Lo mismo podría decirse de los profesores de primaria o secundaria,   que eran apreciados como padres vicarios y su autoridad no era cuestionada.   Con el paso del tiempo y quizá como resultado inesperado de las guerras, de    la  influencia  de  los  medios  masivos  en  los  que  los  científicos  eran  retratados    como personas locuaces, o los maestros como gente abusiva, se redujo mucho   la  estimación  de  ambas  profesiones.  Los  estudiantes  aplicados  devinieron    13. LA INVESTIGACIÓN CIENTÍFICA COMO PROFESIÓN \n242   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  ratones  de  biblioteca,  matados,  o  nerds,  por  lo  que  eran  rechazados  por  sus    compañeros  de  clase.  Quizá  el  efecto  fue  más  severo  para  las  jovencitas  al    sumarse a otras derivaciones del maltrato hacia las mujeres. Como en el caso   de la evaluación curricular, tampoco pueden anticiparse cambios radicales en   estas perspectivas por la inercia social.  Otra  dimensión  del  deterioro  de  la  percepción  social  de  los  científicos  se   advierte  en  los  salarios  y  en  la  disponibilidad  de  nuevas  plazas  para  los  recién    doctorados. El Dr. Samuel Gómez, miembro de mi comité doctoral, me comentó   que con su primer salario como profesor universitario había saldado sus deudas    y comprado un reloj de buzo. En aquellos años, la única marca disponible era    Rolex, y eran tan caros como ahora. Agregó que los salarios eran equivalentes   a los de diputados y senadores. La diferencia creció muchísimo a favor de estos    últimos, quizá porque están mejor organizados.  Una indicación de la percepción social del Estado respecto a la ciencia como   profesión se manifiesta en la inversión en ciencia como porcentaje del producto    interno bruto (PIB). Cuando se publicó la primera Ley de Ciencia y Tecnología,    se había fijado que era responsabilidad del Estado destinar el 1% del PIB. Mi    entusiasmo  fue  tal  que  remití  una  carta  festiva  a  la  revista   Nature .  Hubo  dos    decepciones inmediatas. Se adicionó el transitorio vengador de “a reserva de   disponibilidad” lo que significa “ya veremos qué hacer ahora que se publicó”.    La  segunda  fue  que  el  editor  indicó  que  no  publicaban  propaganda.  Ahora    celebro que no se hubiera publicado; era producto de un entusiasmo febril por   una idea que no cristalizó. Crucemos los dedos para que las nuevas generaciones   disfruten que el Estado supere el 2% del PIB para la ciencia, ya que el pasado no   ha sido venturoso (Plata, 2005; Pérez-Tamayo, 2017).  Por  supuesto,  los  científicos  en  funciones  debemos  reconocer  que  el  estado   actual  de  la  ciencia  nacional  es  también  resultado  de  nuestras  actividades.    Si  no  orientamos  a  los  tomadores  de  decisiones,  si  no  correspondemos  con    entrenamientos,  charlas  en  distintos  foros,  o  notas  de  divulgación  para  los    no  especialistas,  la  perspectiva  social  seguirá  siendo  la  clásica  del  aislado  y     encumbrado en una torre de marfil (Shapin, 2012; Mendízabal, 2018), cuya visión    no rebasa el límite de su nariz. Debemos cambiar nuestro aislamiento y reducida   interacción por un mayor entusiasmo para convencer a la sociedad, incluyendo   al aparato del Estado, de las bondades de impulsar el desarrollo de la ciencia   nacional,  incluyendo  el  incremento  generoso  en  los  recursos  disponibles,  en  el   \n243  establecimiento  de  nuevas  plazas  o  instituciones  dedicadas  a  la  investigación    de  problemas  regionales  o  nacionales,  y  al  fortalecimiento  de  los  programas    que  han  tenido  una  perspectiva  mundial  y  merecen  consolidarse.  Será  por  la    mejora de la ciencia, de nuestros estudiantes y de la nación. No sobran esfuerzos   y, la verdad, nadie lo hará por nosotros.  Agradecimientos  El  Dr.  Pablo  Liedo  me  invitó  a  realizar  estas  notas  para  un  libro  de  utilidad     potencial en el seminario de comunicación científica de la maestría en ciencias    de  ECOSUR,  en  donde  el  curso  se  denomina  Seminario  de  Tesis.  Espero  que  el    resultado satisfaga sus expectativas y que los lectores encuentren algunas ideas    o reflexiones positivas para su desarrollo académico. La cuidadosa lectura de    Yessica  Chávez-López,  Christopher  Cruz-Gómez,  Daniel  A.  López-Sánchez  y    Gabriel A. Gómez-Rodríguez resultó en n  of  speech  and  its   cultural uses.  British Journal for the History of Science, 45 (1), 1-27. https://doi.  org/10.1017/S0007087412000118  Slaughter, S., y Leslie. L. L. (1997).  Academic capitalism: Politics, policies, and the  entrepreneurial university . Baltimore: John Hopkins University Press. \n247  14. Implicaciones éticas de la investigación científica  Pablo Liedo M. Azahara Mesa-Jurado  Introducción  La ciencia nace de la curiosidad y el placer humano por observar y descubrir.   Con el transcurso de los siglos, sus avances la han convertido en una actividad de   gran relevancia y trascendencia. Sin embargo, como toda actividad humana,   la ciencia está sujeta a nuestros principios, valores, preconcepciones y cultura,   por lo que no es perfecta y está sujeta a errores. Las fallas y errores se traducen   en pérdida y desperdicio de recursos, frenan el avance en la construcción del    conocimiento y socavan la confianza de la sociedad.  A través del tiempo, se han desarrollado estándares profesionales que buscan   fortalecer el avance científico y minimizar las fallas y errores. Estos estándares no    son muy diferentes a los valores universales de honestidad, justicia, reciprocidad,    responsabilidad y confianza. Aunque rara vez se expresan en códigos formales,   gradualmente se han convertido en una especie de “cultura” de la comunidad   científica y se espera que nuestros colegas o pares se adhieran a estos estándares    (National  Academy  of  Sciences,  2009).  Esta  cultura  se  asimila  gradualmente   \n248   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  a  través  de  la  interacción  frecuente  con  asesores  y  asesoras,  compañeros  y    compañeras, y colegas. Aunque no pretendemos que se aprendan y asimilen   en  un  solo  capítulo,  este  puede  ser  un  buen  inicio  o  una  introducción  a  esa    cultura.  Existen  tres  principios  rectores,  tradicionalmente  relacionados  con  la  bioética    y  el  involucramiento  de  seres  humanos,  que  son  básicos  en  la  ética  en  la     investigación:  autonomía,  beneficencia  y  justicia  (Informe  Belmont  1979)    (Department  of  Health,  Education,  and  Welfare,  1979).  La  autonomía  implica    respetar la capacidad de los individuos para tomar decisiones informadas y libres   sobre  su  participación  en  un  estudio,  esto  es  fundamental  para  asegurar  que     las personas participantes reciban un trato digno y respetuoso. La beneficencia   se refiere a la obligación de maximizar los beneficios y minimizar los daños que    pueda ocasionar la investigación. El principio de justicia conlleva a la necesidad    de que la distribución de beneficios y cargas de la investigación sea equitativa.   Mantener  la  integridad  de  la  ciencia  corresponde  a  la  propia  comunidad    científica.  Esta no tiene un gobierno sino que se autogobierna mediante el proceso    conocido como evaluación por pares, o arbitraje. Aunado a la evaluación por   pares, en las universidades, centros de investigación y hospitales se cuenta con    comités de ética que revisan, evalúan y dictaminan si los proyectos y propuestas    de  investigación  se  apegan  a  los  lineamientos,  códigos  internacionales  y  los     principios éticos básicos (Shamoo y Resnick, 2003). Adelante hablaremos sobre    estos  mecanismos  sociales  de  la  ciencia  y  revisaremos  algunos  de  los  códigos    éticos de referencia internacional.    La actividad científica se ve afectada de manera desfavorable y favorable por   rasgos  típicos  de  la  naturaleza  humana.  Nuestras  preconcepciones,  principios     filosóficos, religiosos, sociales y los conflictos de interés, así como la falta de un    método,  pueden  afectar  desfavorablemente  la  ciencia.  Nos  cuesta  mucho    aceptar  nuevos  conocimientos  que  van  en  contra  de  nuestras  creencias.    Sigmund  Freud  (1928),  padre  del  psicoanálisis,  señaló  que  la  especie  humana     ha sufrido tres grandes decepciones. La primera fue por la llamada “revolución    copérnica”, que nos mostró que el planeta Tierra no era el centro del universo;    la  segunda  fue  la  “revolución  darwiniana”,  que  nos  enseñó  que  la  especie    humana es una especie animal más resultado del mismo proceso de evolución   para toda la vida que hoy conocemos, y la tercera, la revolución del psicoanálisis,   que puso en evidencia que no somos amos ni de nuestros propios pensamientos. \n249  Por otro lado, la curiosidad, la necesidad, nuestro deseo por el trabajo preciso y   la convicción de que el conocimiento beneficia y beneficiará a la humanidad,   afecta a la ciencia de manera muy favorable. La comunidad científica tiene    tres rasgos que la caracterizan: curiosidad, cooperación y rigor intelectual.  En las siguientes secciones de este capítulo abordaremos aspectos de la ética   relacionados  con  la  investigación  que  involucra  seres  humanos  y  animales,  la    evaluación de pares, la interacción entre personas que asesoran y quienes son   asesoradas,  el  error  y  la  negligencia,  las  conductas  no  apropiadas,  la  autoría     y el crédito, los conflictos de interés, y concluiremos con una reflexión sobre la   responsabilidad social de quienes nos dedicamos a la investigación científica.  Ética en la investigación con seres humanos  La praxis de la investigación científica no siempre se ha apegado al concepto    de  ética  que  conocemos  hoy  en  día,  sobre  todo  en  lo  relacionado  con  el    involucramiento de personas en experimentos y estudios. La preocupación por la   ética de la investigación con seres humanos ha estado presente desde los inicios    de la investigación médica moderna, reflejando la complejidad de equilibrar   el avance del conocimiento científico con el respeto hacia la dignidad y el    bienestar de las personas.   Algunos  logros  científicos  históricos,  como  los  descubrimientos  de  vacunas   que  han  salvado  millones  de  vidas,  son  cuestionados  desde  el  enfoque  ético    actual.  En  1796,  Edward  Jenner  sentó  las  bases  de  la  vacunología  a  partir  de    experimentos  en  los  que  inoculaba  en  menores  de  edad  y  personas  sanas  el    virus letal de la viruela bovina (Koepsell y Ruiz de Chávez, 2015). Cuestionamientos   respecto al consentimiento informado y el alto riesgo que corrieron las personas   involucradas,  agravado  por  ser  menores  de  edad,  han  sido  señalados  como    violaciones  éticas  importantes  en  su  investigación.  En  la  misma  línea,  Louis    Pasteur en 1885 probó la vacuna de la rabia en un niño sin haber seguido una   experimentación  previa  con  animales.  En  este  sentido,  es  importante  también     reconocer  los  esfuerzos  de  Claude  Bernard  quien  a  mediados  del  siglo  XIX    destacó  la  importancia  de  establecer  principios  éticos  relacionados  con  el    consentimiento informado y la necesidad de no causar daño innecesario a las   personas sujetas de investigación (Koepsell y Ruiz de Chávez, 2015).  14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n250   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  A  lo  largo  de  la  historia  reciente,  se  han  formulado  principios  y  marcos  éticos    rigurosos para proteger los derechos y la salud de las personas participantes en las    investigaciones, así como preservar la confianza de la sociedad en el quehacer   científico. Vale el esfuerzo explorar brevemente el trasfondo histórico de esos    principios  y  reglamentos  éticos  que  surgieron  como  respuesta  a  los  problemas    ocasionados  al  involucrar  personas  en  experimentos  sin  consentimiento  o    cuidado por los riesgos a los que fueron expuestos.  Evolución histórica de la ética de la investigación moderna  Código  de  Nuremberg  (1947)   (International  Military  Tribunal,  1949).  Durante  el    juicio  por  los  crímenes  de  la  Segunda  Guerra  Mundial  en  la  ciudad  alemana     de Nuremberg en 1947, salieron a la luz pública las atrocidades que médicos   y científicos alemanes llevaron a cabo durante experimentos biomédicos con    prisioneros de guerra y otros grupos vulnerables en los campos de concentración   nazis. El conjunto de normas redactado para juzgar a estas personas se conoce   como  Código  de  Nuremberg  y  recopila  una  serie  de  prácticas  médicas    experimentales  permitidas  para  la  investigación  con  humanos  considerando     siempre que se busque el beneficio para toda la sociedad y que ello no se    pueda obtener mediante otra forma.  Este  código  enfatiza  el  consentimiento  voluntario  e  informado  de  las  personas    participantes,  la  necesidad  de  que  se  produzcan  beneficios  sociales  signifi-   cativos, llevar a cabo la experimentación previa con animales, evitar sufrimientos   y daños innecesarios, la prohibición de experimentos cuando existen riesgos de    muerte o discapacidad, asegurar la proporcionalidad entre riesgos y beneficios,    poner  especial  atención  en  la  protección  adecuada  contra  riesgos,  la     conducción de los estudios y experimentos por personas científicas calificadas,    la  libertad  de  las  personas  participantes  para  abandonar  el  experimento  en     cualquier momento, y la obligación de finalizar el experimento si se presentan    riesgos de daño severo a las personas.  Declaración  de  Helsinki  (1964)   (World  Medical  Association,  1964).  Es  una   propuesta de principios éticos, promulgada por la Asociación Médica Mundial   en 1964, que guían la investigación médica en personas. Este documento retoma   también  el  consentimiento  informado  de  las  personas  participantes,  es  decir,    que  con  plenas  facultades  y  sin  coacciones  acepten  participar  en  el  estudio   \n251  conociendo los riesgos y beneficios, su duración y propósito. También establece   lineamientos  relacionados  con  el  requisito  de  revisar  los  protocolos  por  parte    de comités de ética de investigación independientes. Se destaca la necesidad    de que los beneficios siempre superen los riesgos y que la salud y los derechos de    las personas tengan supremacía sobre cualquier otro tipo de interés, así como   proteger a los grupos más vulnerables. Esta declaración cuenta con numerosas   actualizaciones que han ido adaptándose a los avances de la práctica médica   y las normativas éticas que han ido surgiendo.   Informe Belmont (1979) . (International Military Tribunal, 1949). Este informe supone  un hito en la historia de la ética en la investigación, ya que surge en respuesta   al  estupor  social  levantado  por  notables  abusos  éticos,  como  los  cometidos     en el estudio de sífilis de Tuskegee en Estados Unidos. En este, más de medio    millar de hombres afroamericanos de comunidades marginadas, en su mayoría   analfabetos,  fueron  engañados  para  participar  en  una  investigación  sobre  la     progresión natural de esta enfermedad entre 1932 y 1972, a cambio de atención   médica  gratuita.  ¿En  qué  consistieron  esos  abusos  éticos?  La  sífilis  es  una    enfermedad  que  no  afecta  exclusivamente  a  la  población  afrodescendiente,    por lo que la selección de los participantes no fue justa. Además, las personas   no sabían cuál era el propósito del estudio ni los riesgos a los que se exponían. A    pesar de que desde 1947 existía tratamiento para la sífilis, no se les suministró a    los participantes enfermos, lo que resultó en graves consecuencias para su salud   y la de sus familias.  A raíz de este y otros casos similares, el Congreso de los Estados Unidos creó la   Comisión Nacional para la Protección de los Sujetos Humanos de Investigación   Biomédica y del Comportamiento. Los esfuerzos de esta comisión resultaron en   la publicación del Informe Belmont en 1979, que estableció los principios éticos   fundamentales  para  la  investigación  que  involucra  a  personas,  más  allá  de  la     bioética, como son la autonomía, la beneficencia y la justicia, presentados al    comienzo  de  este  capítulo.  Este  documento  ha  sido  la  base  para  numerosas    normativas y políticas relacionadas con la ética en la investigación en Estados   Unidos y a nivel internacional.  Declaración de Singapur (2010)  (World Conference on Research Integrity, 2010).   La Declaración de Singapur sobre la Integridad en la Investigación, adoptada   en 2010 durante la 2a Conferencia Mundial sobre Integridad en la Investigación,   es una guía global que establece principios y responsabilidades para conducir   14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n252   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  la actividad científica de manera responsable. En su preámbulo, reconoce que,   a pesar de la diversidad existente entre los diferentes contextos geográficos,   culturales y disciplinares de las personas científicas en cuanto a la forma de   llevar a cabo las investigaciones, el valor y los beneficios generados dependen    esencialmente de la integridad con la que se desarrollan.   En  esta  declaración  internacional,  se  resaltan  los  principios  de  honestidad,    responsabilidad,  cortesía  profesional  e  imparcialidad,  y  buena  gestión  en    la  investigación  (en  nombre  de  otros).  También  se  establecen  diferentes     responsabilidades  para  la  comunidad  científica  que  buscan  fortalecer   la  confianza  pública  en  la  ciencia  y  asegurar  que  los  beneficios  de  la    investigación se obtengan y se compartan de manera ética y responsable. Estas   responsabilidades  están  relacionadas  con  los  métodos  y  los  resultados  de  las    investigaciones; las autorías y reconocimientos en las publicaciones; la revisión    por pares; los conflictos de interés, la comunicación pública; la denuncia de    prácticas irresponsables y respectivas respuestas a estas prácticas por parte de   instituciones,  revistas,  organizaciones  y  agencias  profesionales;  la  facilitación    de  ambientes  laborales  que  fomenten  la  integridad,  y  las  consideraciones     sociales  en  relación  a  valorar  los  beneficios  sociales  respecto  a  los  riesgos    inherentes  a  los  trabajos  de  investigación.  En  las  diferentes  secciones  de  este    capítulo se desarrollan algunas de estas responsabilidades.   A  nivel  nacional,  la  Comisión  Nacional  de  Bioética  (2018)  elabora  también  la    Guía Nacional para la Integración y el Funcionamiento de los Comités de Ética   en Investigación . Esta guía define para México los lineamientos y procedimientos    para  formar  y  operar  los  comités  que  revisan  y  aprueban  investigaciones  con    seres humanos. Establece un marco normativo, armonizado con los estándares   éticos internacionales, que asegura que todas las investigaciones se realicen de   manera  ética,  protegiendo  los  derechos  humanos,  la  seguridad  y  el  bienestar    de los participantes a la vez que fomenta que las investigaciones contribuyan   de manera responsable al conocimiento y desarrollo social.  Investigación con animales  En la investigación con animales se han acordado estándares profesionales que   buscan un trato humano a los animales que se utilizan en investigación (National    Research Ethics Committees, 2019).  Se habla de las 3 “R”, esto es: \n253  •   REDUCIR el número de animales usados.  •   REFINAR las técnicas de investigación para reducir el dolor y el estrés.  •   REEMPLAZAR animales superiores con modelos u otros materiales. En  el  caso  de  investigación  con  animales  salvajes,  además  de  reducir  el    dolor  y  el  riesgo,  se  debe  procurar  que  puedan  volver  a  su  ambiente  natural    sin  desventajas  que  los  hagan  vulnerables  a  enfermedades  o  a  sus  enemigos    naturales.  La  investigación  con  animales  no  solo  implica  la  experimentación,  también    incluye  la  colecta  para  estudios  ecológicos,  de  biodiversidad,  bioseguridad  o    similares.  En  estos  casos,  las  implicaciones  éticas  se  amplían  a  plantas  y  otros    organismos vivos.  Un estándar profesional en ciencia es que la investigación no puede ni debe ser   justificación para el incumplimiento de todo tipo de normas y regulaciones, tales    como los  permisos  de  colecta,  las  medidas  de  bioseguridad,  la  disposición  de    desechos tóxicos, el cumplimiento de medidas cuarentenarias, y otras.  La evaluación de pares  Como señalamos antes, la comunidad científica se autogobierna y su integridad   depende de la propia comunidad científica. La evaluación o arbitraje de pares,    consiste  en  la  evaluación  honesta,  rigurosa  y  objetiva  de  las  propuestas  de    investigación, de las publicaciones, de las personas y de las instituciones.    Esta evaluación parte del principio de reciprocidad. Una persona evaluará una   propuesta  o  un  manuscrito  para  publicación  de  manera  honesta  y  objetiva,    esperando  que  sus  propuestas  y  manuscritos  sean  evaluados  de  la  misma    manera.  El  conocimiento  se  construye  gradualmente  con  la  participación     de  investigadoras  e  investigadores  que  son  evaluadas/os  y  que  evalúan.  La    evaluación  anónima  de  pares  o  arbitraje  ha  sido  uno  de  los  más  importantes     mecanismos sociales para mantener la integridad de la ciencia y la confianza    que la sociedad ha depositado en ella.  El arbitraje científico o la evaluación de pares, tiene las siguientes características:  •   Es  anónimo,  para  permitir  una  crítica  objetiva  y  libre  de  conflictos  de   interés.    14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n254   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  •   La revisión debe ser rigurosa, partir del escepticismo sobre los resultados o   lo que se propone y aplicar el mayor escrutinio posible. Es la “prueba del    ácido”. •   El revisor se convierte en una especie de “abogado del diablo” y debe    quedar  convencido  de  que  el  trabajo  es  inédito,  es  decir,  que  aporta    nuevos conocimientos, que se realizó de manera correcta y los resultados   están  siendo  bien  analizados  e  interpretados.  En  la  mayoría  de  las    ocasiones, lo revisores cuestionan y sugieren cambios.   •   La  revisión  debe  cuidar  aspectos  de  calidad,  buscando  claridad,     objetividad e identificar cualquier error, por pequeño que sea.    •   Quien  investiga  frecuentemente  se  debe  someter  a  un  proceso  de     arbitraje, y debe tener la madurez suficiente para entender la revisión y    aceptar las críticas a su trabajo, a la vez de ofrecer los argumentos para   responder a dicha crítica.  •   El proceso de arbitraje debe ser honesto y confidencial. Un evaluador no   debe tomar ventaja de las ideas o resultados que evalúa.  Asesoramiento, tutela y mentoría  La relación con quienes nos asesoran, tutelan o dirigen es uno de los mecanismos   más antiguos y más efectivos en la formación de investigadoras e investigadores.   Una  persona  que  nos  asesora  nos  transmite  conocimientos  y  conductas.  Un     mentor o mentora es una persona que nos asesora y que influye de manera    determinante  en  nuestras  vidas.  A  lo  largo  de  nuestros  estudios  podemos     identificar varias personas que terminan cumpliendo con este papel (National    Academy of Sciences, 1997; Lee  et al ., 2007). La  relación  que  se  establece  entre  la  persona  que  asesora  y  la  asesorada    es  muy  cercana.  No  es  de  extrañar  que  muchas  veces  se  convierte  en  una    entrañable  amistad.  Sin  embargo,  y  precisamente  por  esa  cercanía,  es     una relación que no está exenta de conflictos. Los conflictos pueden surgir    por  el  tiempo  requerido  para  un  trabajo  de  calidad  y  para  una  verdadera    formación,  o  por  la  tenue  frontera  entre  la  contribución  individual,  el  trabajo    en equipo y el reconocimiento. El objetivo en un proceso de formación debe    ser el de formar científicas o científicos independientes. El reconocimiento o   reclamo de esa independencia puede ser un motivo de conflicto. Se deduce  \n255  entonces la importancia de elegir un asesor o asesora, así como la del diálogo   continuo y abierto.  Entre los rasgos que pueden ayudar en la elección están: el tipo de liderazgo; las   experiencias de personas que fueron previamente asesoradas; el financiamiento    de  los  proyectos;  el  ambiente  en  el  grupo  de  trabajo;  la  participación  de    estudiantes  en  las  publicaciones  del  grupo,  así  como  en  congresos  y  eventos    académicos;  la  competencia  al  interior  del  grupo  y  con  otros  grupos;  el    desempeño de quienes ya se graduaron, y las posibilidades de desarrollo futuro.   Error y negligencia  Aunque  coloquialmente  la  expresión  “a  ciencia  cierta”  la  utilizamos  como    garantía  de  la  veracidad  de  una  aseveración,  la  verdad  es  que  toda     investigación  científica  está  sujeta  a  errores.  En  ciencia  no  hay  nada   absolutamente cierto. Como señaló Jean Rostand (1954, p. 32):  La  verdad  que  yo  venero,  es  la  modesta  verdad  de  la  ciencia,  la    verdad relativa, fragmentaria, provisoria, siempre sujeta a retoque,   a  corrección,  a  arrepentimientos,  la  verdad  a  nuestra  escala;  por    el  contrario,  yo  dudo  y  odio  la  verdad  absoluta,  la  verdad  total  y     definitiva, la verdad con una gran V, que es la base de todos los    sectarismos, de todos los fanatismos, y de todos los crímenes. Cuando  el  error  es  involuntario  y  con  la  intención  de  hacer  bien  el  trabajo,  es    tolerado, cuando es por descuido o negligencia, no es tolerado.  Los  errores  involuntarios  o  voluntarios  resultan  costosos  en  la  investigación    científica. Pueden propiciar fundamentos vulnerables, desconfianza e incluso    dañar a la sociedad.  Los  errores  es  posible  que  se  deban  a  un  mal  diseño  experimental,  a  la  falta    de cuidado en la conducción de una investigación, o al pobre manejo de los   datos, entre otras causas. Existen herramientas o métodos que buscan evitar o   minimizar los errores, como las pruebas estadísticas, los ensayos con doble ciego,   el diseño adecuado de encuestas, y la descripción detallada de los materiales y   métodos utilizados que permita la replicabilidad de una investigación.  14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n256   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Hay  además  recomendaciones  para  el  manejo  de  datos  de  investigación    con la finalidad de poder identificar posibles errores, tales como el uso de los    libros  o  diarios  de  campo,  las  bitácoras  de  laboratorio,  el  almacenaje  de    los  datos  crudos,  y  en  la  era  de  internet,  la  publicación  de  materiales    suplementarios.  El  avance  en  las  telecomunicaciones  nos  permite  hoy  en    día  almacenar  gran  cantidad  de  datos  y  ponerlos  disponibles  a  terceros.  Sin    embargo, se debe tener cuidado para evitar la obsolescencia de los sistemas   de almacenaje y la alteración de los datos almacenados.  Los  errores  por  negligencia  se  presentan  cuando,  de  manera  deliberada,    se  omiten  pasos  de  algún  proceso  o  se  ignoran  recomendaciones.  También    se consideran cuando se repite un mismo error sin tomar medidas preventivas.   En general, podemos señalar que los errores por negligencia ocurren por la falta   de  cuidado  y  seriedad.  Los  procesos  rutinarios  fácilmente  son  obviados  y  esto    puede ser una causa de error por negligencia.  Conductas no apropiadas  Las  conductas  no  apropiadas,  o  “misconduct”  en  inglés,  son  los  “pecados   capitales”  en  la  ciencia,  y  no  son  toleradas  en  la  comunidad  científica.  En   la  Declaración  de  Singapur  se  les  refiere  como  “prácticas  irresponsables”.   Traicionan la confianza de la propia comunidad y, por esta razón, quien incurre   en ellas no merece contar con esta confianza.  Hay tres conductas que se definen como no apropiadas, las FFP:  •   La  FABRICACIÓN,  que  consiste  en  inventar  datos  o  resultados  de    investigación. •   La  FALSIFICACIÓN,  que  consiste  en  manipular,  “maquillar”  o  modificar,    equipos,  procesos  o  datos.  La  omisión  de  datos  sin  explicación  es  otra     forma de falsificación.  •   El  PLAGIO,  que  consiste  en  apropiarse  las  ideas,  procesos,  resultados  o     palabras  de  otros,  sin  otorgar  el  crédito  correspondiente.  El  “copiar  y    pegar”  de  los  programas  de  computadora  representa  un  alto  riesgo  de    incurrir en plagio. Es una práctica que debe evitarse a toda costa. Además de las FFP, existen otras conductas que deben evitarse, como abusar    de  la  confidencialidad  en  la  revisión  de  pares,  no  cumplir  con  normas  de  \n257  seguridad o cuarentenas, no contar con los permisos de colecta, y no obtener   previamente  el  consentimiento  informado  de  los  sujetos  de  investigación.  Por    otro lado, a la diferencia de opinión no se le considera conducta no apropiada.  La  naturaleza  comunal  de  la  ciencia  y  los  procesos  de  arbitraje,  con  el    escepticismo, escrutinio y rigor que les caracteriza, representan una especie de    “seguro” contra estas conductas.  Prácticas  cuestionables  son  aquellas  que  no  son  bien  vistas  por  la  comunidad    científica,  pero  que  no  son  tan  graves  o  que  su  gravedad  varía  según  las   disciplinas.  Un ejemplo de ello es lo que se ha llamado “hacer salami”, que   consiste en dividir una publicación en porciones (“rebanadas”) que representen    la mínima porción publicable, de tal manera que, de una investigación, surgen   dos  o  más  publicaciones.  Esto  ha  llevado  a  que  las  revistas  ya  no  acepten     series de artículos numeradas; sin embargo, se reconoce que es muy difícil definir    dónde termina una investigación y dónde empieza otra; hasta dónde un artículo    científico tiene suficiente claridad y representa un nuevo conocimiento, y hasta    dónde se está fragmentando ese nuevo conocimiento.  Cuando un investigador incurre en prácticas cuestionables, lo que procede es   invitarlo a que no incurra de nuevo, es una “tarjeta amarilla” en el futbol.  ¿Qué debemos hacer cuando sospechamos de conductas no apropiadas?  Debido a que la comunidad científica se autogobierna, es su responsabilidad   identificar conductas inapropiadas y denunciarlas. Para que la autorregulación    funcione, quienes nos dedicamos a la investigación debemos alertar a la propia   comunidad cuando sospechemos de violaciones a los estándares profesionales.   La  denuncia  debe  hacerse  de  manera  responsable  y  cuidadosa,  evitando  el    “chisme” sin fundamento, el ignorar o “hacerse de la vista gorda” porque no es    mi problema, ni el escudarse en el temor a las represalias como causa para no   denunciar.  Siempre  es  mejor  preguntar  que  alegar.  Expresar  preocupación,  solicitando    clarificación, es mejor que levantar cargos o hacer acusaciones. Debe procurarse    el  máximo  de  objetividad  y  evitar  lo  emocional.  Generalmente  es  preferible    enfocarse en la conducta no apropiada y dejar fuera los detalles.  14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n258   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  Un  ejemplo  de  denuncia  que  recibió  mucha  difusión  fue  el  caso  de  la    investigación  sobre  clonación  por  el  Dr.  Hwang  Woo-Suk  de  la  Universidad     Nacional  de  Seúl,  en  Corea  del  Sur  (National  Academy  of  Sciences,  2009;    Couzin y Unger, 2006). Ante el éxito de la clonación de la oveja Dolly en 1996,   en el Instituto Roslin de Escocia, arrancó la carrera por quién conseguiría otras   clonaciones  (Wilmut   et  al .,  2001).  El  grupo  del  Dr.  Hwang  publicó  en  2005    la  clonación  del  perro  Snuppy,  considerado  como  un  logro  de  mucho  mayor    complejidad.  Paralelamente, el grupo del Dr. Hwang trabajaba en la clonación   humana  a  partir  de  blastocitos.  A  las  pocas  semanas  de  una  publicación  en     Science  en 2005, surgió el escepticismo, particularmente por la fuente y número   de oocitos utilizados en los experimentos. La propia Universidad Nacional de Seúl    (SNU, por sus siglas en inglés) ordenó una investigación y en 2006 el equipo que   investigó  el  caso  llegó  a  la  conclusión  de  que  los  artículos  publicados  por  el    grupo de Hwang eran fraudulentos. La SNU demandó a Hwang por el mal uso   de los recursos para investigación y la revista  Science  retiró estas publicaciones.    En  su  nota  editorial,  Science  aclaraba:  “Debido  a  que  el  reporte  final  de  la   investigación  de  la  SNU  indicó  que  una  cantidad  significativa  de  los  datos    publicados  habían  sido  fabricados,  los  editores  de   Science   consideran  que  el     retiro  inmediato  e  incondicional  de  los  artículos  es  necesario  [...]  advertimos   a la comunidad científica que los resultados reportados en dichos artículos es   inválida.”  Y más adelante concluyó, “ Science  lamenta el tiempo invertido por   los  pares  en  la  revisión,  el  tiempo  invertido  por  otros  evaluando  estos  artículos,    así como el tiempo y recursos que la comunidad haya destinado tratando de   replicar estos resultados” (Kennedy, 2006).  Autoría y crédito  En el siglo XVII, muchos científicos mantenían sus descubrimientos en secreto,    por temor a que fueran reclamados por otros como propios. Figuras prominentes   como Issac Newton muchas veces evitaron dar a conocer sus descubrimientos   por temor a que otros reclamaran prioridad.  Henry  Oldenburg,  secretario  de  la  Real  Sociedad  de  Londres,  propuso  una    solución a tal problema. Él se ganó la confianza de los científicos garantizándoles    una publicación rápida en los  Philosophical Transactions  de la Royal Society of   London.  Oldenburg también fue pionero en la práctica de enviar los manuscritos  \n259  sometidos a expertos que podían evaluar su calidad (el arbitraje). Estos fueron   los antecedentes de las hoy revistas científicas con arbitraje (los  journals )  y  el   arbitraje por pares (National Academy of Sciences, 2009).  Con  el  avance  de  las  comunicaciones,  hoy  existen  muchas  y  diversas  formas    de difundir los resultados de investigación. Sin embargo, la publicación en una    revista científica con arbitraje de pares sigue siendo la más importante, confiable    y completa.  Una característica común de las publicaciones científicas es la citación, que   consiste  en  proporcionar  las  referencias  de  publicaciones  anteriores  que  han    servido  de  sustento  a  la  nueva  investigación,  así  como  la  relación  entre  ellas.     La adecuada citación refleja el cuidado en el trabajo de investigación. Quien    hace investigación, tiene la responsabilidad de buscar la literatura relacionada y   pertinente para su trabajo, leerla y citarla adecuadamente. Puede inferirse que,   si autores o autoras permitieron errores en sus referencias, no hay garantía de que   se  hayan  cuidado  aspectos  más  complejos  de  su  investigación.  Una  citación    completa y correcta, además de ser indicio del cuidado en la investigación, es   la mejor prevención contra el plagio. Cuando se revisan publicaciones referidas   en  otras,  y  ellas  son  relevantes  para  nuestro  trabajo,  debemos  conseguir  y    consultar la publicación original.  ¿Qué  significa  ser  autor  o  autora  en  una  publicación  científica?  La  autoría   es  un  reconocimiento  a  la  contribución  intelectual  de  la  persona,  y  al  mismo    tiempo,  conlleva  una  responsabilidad  sobre  lo  publicado.  Cualquiera  de  los     coautores o las coautoras debieron aportar significativamente en el diseño de la    investigación, en la interpretación de los datos o en la redacción del manuscrito.   A la vez, un autor o una autora deben tener la capacidad de explicar lo que   se hizo e interpretar los resultados. Todos los autores o las autoras de un artículo    científico son responsables de su contenido y, por lo tanto, de sus errores cuando    los  hay.  Facilitar  un  espacio  de  laboratorio  o  haber  proveído  muestras  para  el    estudio no son razones para ser coautor o coautora. Tales casos se reconocen   en los agradecimientos.  El orden de los autores o autoras puede reflejar de mayor a menor contribución;   sin  embargo,  esto  varía  entre  disciplinas  y  entre  países.  En  algunos  casos,  se     considera que la mayor aportación fue de la primera y última persona autora,   y ello va disminuyendo conforme se avanza en las dos direcciones en la fila    de  nombre  de  coautoras  y  coautores.  En  algunas  disciplinas,  el  nombre  de  la    14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n260   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  persona  líder  de  un  grupo  siempre  es  el  último.  Recientemente,  hay  revistas   científicas que han optado por señalar directamente la contribución de cada   autor; no obstante, no es algo generalizado. Una recomendación para definir el    orden de la autoría es que se someta a una discusión colegiada entre los que   tuvieron  una  aportación  intelectual  importante  en  la  publicación.  Las  autorías    honorarias o de regalo diluyen el crédito de quienes realmente aportaron y por   lo tanto no son una buena práctica (Fine y Kurdek, 2017; Ritter, 2001).  Existen otras formas de difundir o comunicar los resultados de investigaciones. Los   seminarios,  conferencias,  carteles  y   abstracts   representan  una  larga  tradición     en ciencia. Sin embargo, estos foros no deben tomarse como la etapa final de    un trabajo de investigación. En general, este tipo de comunicaciones son vistas   como de naturaleza preliminar, que ofrecen la posibilidad de retroalimentar a   quienes  realizaron  el  trabajo  antes  de  someterlo  a  posible  publicación  en  una     revista científica con arbitraje.  Los avances en cómputo y tecnologías de la comunicación hoy nos permiten   compartir información abundante, de manera rápida y disponible para un mayor    número de personas. Esto es deseable para la investigación; sin embargo, se debe    tener presente que estas fuentes de información no han pasado por un proceso    de arbitraje y, por lo tanto, no pueden garantizar su calidad y confiabilidad. El   arbitraje por pares ha demostrado su efectividad y confiabilidad, y sigue siendo   el sustento irremplazable en la construcción del conocimiento científico. Cabe   señalar que en la actualidad existen ya revistas científicas en línea y de acceso    abierto que, manteniendo el proceso de arbitraje por pares, ofrecen una amplia    y rápida distribución de las publicaciones científicas. Un ejemplo es The Public    Library of Science (PLoS) (https://plos.org/).  Hay varias razones para evitar hacer públicos los resultados de una investigación   en  la  web  sin  que  hayan  pasado  por  un  arbitraje.  Los  resultados  pueden     estar  incorrectos,  lo  que  significará  un  desperdicio  de  recursos  para  quienes    se  basaron  en  ellos  y  la  desacreditación  de  quienes  los  publican.  El  arbitraje     puede ser posterior a la publicación, lo que significa que se vuelve público y    fuera del control de autores o autoras o de una revista. En muchas revistas no   se permite publicar datos o información que no sea inédita, es decir, al haber    hecho públicos unos resultados se les descalifica para una publicación científica   original.  Sin  embargo,  existen  repositorios  para  publicaciones  científicas  de    acceso  libre,  conocidas  como   pre-print   (preimpresión),  los  cuales  colocan   \n261  los artículos en sus sitios en donde estos últimos pueden recibir comentarios y   correcciones (el arbitraje se vuelve público), para posteriormente proponerlos   para publicación en una revista científica. Ejemplos de este tipo de repositorios   son arXiv (https://arxiv.org/) para matemáticas, física, computación y biología    cuantitativa, o bioRxiv (https://www.biorxiv.org/) para ciencias biológicas.  Conflicto de interés  Se  llama   conflicto de interés   a  las  situaciones  en  las  que  quienes  investigan     pueden  tener  intereses  que  interfieran  con  su  juicio  profesional.  Manejarlas    es  crítico  para  mantener  la  integridad  de  quienes  investigan  y  de  la  ciencia    (National Academy of Sciences, 2009).  Los  conflictos  de  interés  pueden  surgir  a  partir  de  relaciones  personales,  por   ejemplo, cuando un investigador o investigadora evalúa a un colega con quien    mantiene una relación de amistad, parentesco o de romance.  También pueden surgir cuando hay intereses financieros, por ejemplo, cuando   una  empresa  ofrece  recursos  para  evaluar  sus  productos.  Esto  puede  llevar  a     quien investiga a realizar experimentos rutinarios, a costa de sacrificar otro tipo    de investigaciones afectando su carrera y la de sus estudiantes. La evaluación de   propuestas de investigación o manuscritos para publicación de grupos con los    que se colabora o compite representa otro tipo de conflicto de interés.  El  primer  paso  para  manejar  estos  conflictos  consiste  en  identificarlos.  En  la   medida en que se puedan evitar, será mejor. La discusión oportuna sobre este   tipo de situaciones, aunado a la revisión de las políticas, normas y reglamentos   institucionales, son elementos que facilitan su manejo.  Se debe distinguir entre conflictos de interés y conflictos de compromiso. Estos   últimos se refieren a los conflictos entre nuestros intereses académicos y nuestros    intereses personales, valores y creencias.  La responsabilidad social  Los  estándares  de  la  ciencia  se  extienden  más  allá  de  la  propia  actividad     científica. Los investigadores e investigadoras también tienen la responsabilidad   14. IMPLICACIONES ÉTICAS DE LA INVESTIGACIÓN CIENTÍFICA \n262   INTRODUCCIÓN A LA INVESTIGACIÓN CIENTÍFICA  de reflejar cómo su trabajo y el conocimiento que generan pueden afectar   o ser aprovechados por la sociedad (Beckwith, 2001). Los científicos pueden   ofrecer opiniones expertas o aconsejar en la definición de políticas públicas,    asesorar a empresas o a otras organizaciones. Frecuentemente contribuyen en    la formación de estudiantes, tomadores de decisiones y del público en general   sobre temas científicos de su especialidad. Sin embargo, como integrantes de    la sociedad, quienes se dedican a la investigación pueden tener preferencias   políticas o creencias religiosas que no están relacionadas con sus conocimientos    y experiencias científicas. Así, en algunas situaciones, quienes se dedican a la   investigación  científica  sirven  como  expertos  o  expertas  y  sus  aportaciones    merecen  una  consideración  especial  (Oreskes,  2020).  En  otras  situaciones,     actúan como ciudadanos o ciudadanas con una posición igual a la del resto    de la sociedad. Mantener esta sana distancia contribuye al mantenimiento de   la integridad de la ciencia, y al compromiso de esta con la sociedad.  Los  mecanismos  sociales  de  la  ciencia  han  permitido  su  desarrollo  con  una    trascendencia para la humanidad sin paralelo. Mientras honremos los valores de   honestidad y rigurosidad, denunciemos los errores y las conductas no apropiadas   y mantengamos el compromiso con la sociedad, el futuro para la ciencia y la   sociedad será alentador.   Agradecimientos  Quienes hemos elaborado este capítulo agradecemos los valiosos comentarios   de  las  personas  que  lo  han  revisado,  sin  duda,  nos  han  permitido  mejorar    este  capítulo  en  aras  de  un  entendimiento  más  claro  e  integral.  También    aprovechamos  para  agradecer  a  las  y  los  estudiantes  del  curso  Seminario  de    Tesis  de  la  Maestría  en  Ciencias  en  Recursos  Naturales  y  Desarrollo  Rural  de    ECOSUR,  quienes  en  cada  generación  con  sus  preguntas,  dudas  y  protocolos     de investigación, nos han ido guiando para perfilar los puntos más importantes    y necesarios de abordar sobre la práctica ética en la investigación. Igualmente,   agradecemos a las personas integrantes del Comité de Ética para la Investigación    de nuestra institución por su valiosa labor en aras de que el quehacer científico,    tanto en la comunidad estudiantil como académica, se apegue a los criterios   éticos que requiere nuestra comunidad y la sociedad en general. \n263  Referencias  Beckwith, J. (2001). On the social responsibility of scientists.  Annali-Istituto Superiore  Di Sanita, 37 (2), 189-194. Comisión  Nacional  de  Bioética.  (2018).   Guía  nacional  para  la  integración  y  el   funcionamiento  de  los  Comités  de  Ética  en  Investigación .  http://www.gob.  mx/cms/uploads/attachment/file/460756/7_Guia_CEI_2018_6a.pdf   Couzin,  J.,  y  Unger,  K.  (2006).  Cleaning  up  the  paper  trail.   Science,  312 (5770),   38-41  Department of Health, Education, and Welfare. (1979).  The Belmont Report: Ethical  principles  and  guidelines  for  the  protection  of  human  subjects  of  research .    U.S. Government Printing Office. https://www.hhs.gov/ohrp/regulations-and-   policy/belmont-report/index.html   Fine, M. A., y Kurdek, L. A. (2017). Reflections on determining authorship credit  and authorship order on faculty–student collaborations.  Research Ethics  (pp.   439-445). Routledge.   Freud, S. (1928).  The future of an illusion . Nueva York: W. W. Norton. International Military Tribunal. (1949).  Trials of War Criminals Before the Nuremberg   Military  Tribunals  Under  Control  Council  Law  No.  10,  Nurenberg,  October    1946-April 1949  (Vol. 14). US Government Printing Office.  Kennedy,  D.  (2006).  Editorial  Retraction.   Science,  311 (5759).  https://doi. org/10.1126/science.1124926 Koepsell, D. R., y Ruiz de Chávez, M. H. (2015).  Ética de la inves
