    const PDF_TEXT = "JULIÁN  ESTRADA  épocAS  DE pARvA  cocina \n\nJULIÁN ESTRADA épocAS  DE pARvA \nEstrada Ochoa, Julián, autor    Épocas de parva / Julián Estrada Ochoa. – Bogotá : Ministerio de Cultura : Biblio- teca Nacional de Colombia, 2016.    1 recurso en línea : archivo de texto PDF (120 páginas). – (Biblioteca Básica de  Cultura Colombiana. Cocina / Biblioteca Nacional de Colombia)    Incluye glosario e índice de recetas. -- Bibliografía: p. 89-91.   ISBN 978-958-8959-54-2      1. Pan (Cocina) 2. Hornería 3. Cocina 4. Libro digital I. Título  II. Serie  CDD: 664.752 ed. 23  CO-BoBN– a994106  Catalogación en la publicación – Biblioteca Nacional de Colombia \nMariana Garcés CórdobaMINISTRA DE CULTURA Zulia Mena GarcíaVICEMINISTRA DE CULTURA Enzo Rafael Ariza AyalaSECRETARIO GENERAL Consuelo GaitánDIRECTORA DE LA BIBLIOTECA NACIONAL  Javier BeltránCOORDINADOR GENERAL Jesús GoyenecheASISTENTE EDITORIAL Y DE INVESTIGACIÓN Sandra AnguloCOORDINADORA GRUPO DE CONSERVACIÓN Paola CaballeroRESPONSABLE DE ALIANZAS Talia MéndezPROYECTOS DIGITALES Camilo PáezCOORDINADOR GRUPO DE COLECCIONES Y SERVICIOS Patricia RodríguezCOORDINADORA DE PROCESOS ORGANIZACIONALES Fabio TusoCOORDINADOR DE PROCESOS TÉCNICOS Sergio ZapataACTIVIDAD CULTURAL Y DIVULGACIÓN José Antonio Carbonell Mario Jursich Julio ParedesCOMITÉ EDITORIAL Taller de Edición • Rocca®REVISIÓN Y CORRECCIÓN DE TEXTOS,  DISEÑO EDITORIAL Y DIAGRAMACIÓN eLibrosCONVERSIÓN DIGITAL Adán FaríasCONCEPTO Y DISEÑO GRÁFICO Con el apoyo de:   BibloAmigos ISBN: 978-958-8959-54-2  Bogotá D. C., diciembre de 2016  ©  Julián Estrada Ochoa ©  2008, Fondo Editorial Universidad eafit ©  De esta edición: 2016, Ministerio de Cultura –   Biblioteca Nacional de Colombia ©  Presentación: Julián Estrada Ochoa  Material digital de acceso y descarga gratuitos con fines    didácticos y culturales, principalmente dirigido a los usuarios   de la Red Nacional de Bibliotecas Públicas de Colombia. Esta   publicación no puede ser reproducida, total o parcialmente con   ánimo de lucro, en ninguna forma ni por ningún medio, sin la   autorización expresa para ello. \níndice   § §   Presentación  7  § §   i   Abriendo el horno  9  § §   ii   De cómo hogaza y hostia   suplantaron arepa y cazabe  15  § §   iii   En Antioquia, los primeros   aromas de pan caliente    salieron de un convento  27  § §   iv   Pueblos parveros... parva   pueblerina  49  § §   v   Pregones, aromas y sabores    de cajoneras  71  § §   vi   De cómo las señoritas de    la alta sociedad entraron    a la cocina  87  § §   vii   Cerrando el horno  101  § §   Glosario  107  § §   Índice de recetas  115  § §   Bibliografía  117 \n7 7   §   Presentación Es costumbre de la Universidad eafit realizar  una publicación referente a las tradiciones decembrinas.  Para 2008, se le encargó al antropólogo Julián Estrada un  texto relativo a las delicias de la panadería navideña. A  medida que el proyecto cogía forma, el tema alzó vuelo y  se convirtió en un pequeño tratado sobre el maravilloso  campo de la culinaria conocido en la región antioqueña  como  la parva . La expresión llegó de España, donde hace referencia  al desayuno de los trabajadores del campo o a una corta  porción de alimento. Por esa magia de las palabras que  con el uso se amoldan, cambian de significado o adquie- ren otros contenidos, la parva se convirtió en los depar- tamentos de Antioquia, Caldas, Risaralda y el Quindío  en un «conjunto de cosas comestibles que se sirven para  tomar el té, chocolate o café», según definición de Mario  Alario di Filippo en su  Lexicón de colombianismos . De esta  acepción regional surgen otras derivaciones de uso coti- diano: parveado, parviado o parvera. \n8 Píndnicersti 8 Vigente hasta los años sesenta del siglo xx, la parvera  o cajonera hace parte de los mejores recuerdos de la infan- cia. Imborrable en la memoria el gran canasto en equilibrio  sobre la cabeza y, sobre todo, al aroma celestial que ema- naba cuando se desdoblaba el mantel de cuadros rojos y  blancos que protegía el tibio tesoro recién salido del horno. Doña Sofía Ospina de Navarro evoca uno de estos  personajes: «Pero entre los vendedores ambulantes el per- sonaje más grato fue siempre “la cajonera”. Rosa se lla- maba la muchacha que diariamente entraba a nuestra casa  meneando las redondas caderas, golpeadas al andar por  una trenza terminada en cachumbo con lazo de cinta, lle- vando en la cabeza, sobre el rodete hecho de trapos, un  cajón rebosante de cuantas fantasías fue capaz de crear la  harina de trigo: bizcochuelos, rosquetes de anís, lenguas  de gato y otros ricos bocados para los ansiosos paladares  infantiles». Nadie podía haber escrito un texto más saboreado que  Julián Estrada, quien durante años ha rastreado la genea- logía de nuestra cocina regional. Hurgó en refectorios  conventuales, en emperifolladas alacenas de alcurnia y en  humildes vitrinas de tienda pueblerina para obsequiarnos  esta bandeja parveada. Sin duda alguna degustaremos con  fruición este texto, escrito más para la papila que para la  pupila. ¡Buen apetito! Juan Luis Mejía Arango  Rector \n9 Éíndic er íisti  i  Abriendo el horno \n\n11 En días pasados, compartiendo una mesa de restau- rante con el rector Luis Mejía, nuestra conversación gira- ba alrededor de los encantos de varias cocinas del mundo;  de manera espontánea hice dos o tres comentarios sobre  algunos manjares de nuestra cocina vernácula y, sin haber  finalizado mi argumentación, todo revirtió en una ama- ble propuesta de trabajo, la cual he materializado en este  sencillo texto ajeno y lejano a dogmatismos. Quede claro:   Épocas de parva  no pretende ser un recetario perfecto; por  el contrario, apartado está de la rigurosidad cuantitativa  que exige la repostería en asuntos de tiempos y medidas,  y de manera premeditada —dada su claridad— se apoya  en recetarios tradicionales por la sencillez de su redacción  y sintaxis. Pertenezco al grupo de personas que le encanta «meca- tear». Desde que tengo uso de razón o, mejor, desde que  tengo monedas en el bolsillo, caigo a cualquier hora con  facilidad pasmosa en bocaditos entreverados entre el desa- yuno, el almuerzo y la comida. Imposible resistirme al olor  \n12 Jíndic Eerstat Oóbot  de pan caliente y mucho menos a los aromas y sabores de  cualquier representante de nuestra parva. De otra parte,  hace más de 25 años vengo mirando con alguna curiosidad  todos los acontecimientos históricos y culturales alrede- dor de la cocina y la mesa de los antioqueños, recopilando   un conjunto de crónicas las cuales actualmente confor- man un trabajo que he denominado «historia de las tri- vialidades». Son muchos los temas que bajo esta categoría  histórica pueden ser observados; personalmente me he  dedicado a mirar el mundo del fogón y de la mesa, pues  asumo el comer y el cocinar como dos ejes de vital trascen- dencia en la historia y la cultura cotidiana de los pueblos. El concepto de lo artesanal en el mundo culinario tiene  un valor especial difícil de defender ante las corrientes  innovadoras contemporáneas. La Panadería es un capítulo  de la gran cocina universal, el cual goza de procedimientos  y tecnologías legendarias; sin embargo, la modernización  tecnológica —nuevos equipos, herramientas y acceso- rios— y el conocimiento científico —avances de la física,  la química, la agricultura y la botánica— le ofrecen cada  día más líneas de acción y producción con resultados y cali- dad incuestionables. Sin embargo, en términos del buen  sabor, soy un defensor a ultranza de los procedimientos  artesanales, razón de mis pesquisas, y considero que aque- llo que hoy se clasifica como cocina vanguardista, cocina  de autor, o cocina molecular, se debilita al constatar cómo  el comensal moderno, viajero permanente por el mundo y  habitante de la urbe cosmopolita, paga extremadamente  caro por una carne al carbón y por un pan salido del horno  \n13 Éíndic er íisti  de leña.... Paradójico: en pleno siglo xxi se reconoce que   los mejores sabores los otorga la energía del Neolítico. Espero que esta cálida temática alrededor de las boro- nas del pan, las migas de arepa, el mojicón y el pandero  constituya para el lector desprevenido una amable lectura  de acontecimientos aparentemente sin importancia. Julián Estrada Ochoa \n\n15 Éíndic er íisti  ii  De cómo hogaza y hostia  suplantaron arepa y cazabe \n\n17 Con el respeto que me merece la historia política y   económica de nuestro país, y conociendo la profundidad  y empeño que numerosos investigadores colombianos han  dedicado a temas de incuestionable importancia, en la ma- teria de este artículo me siento obligado a pedirles licencia  para comentar de manera no muy rigurosa las glosas que a  continuación iré exponiendo. Existe gran desconocimien- to acerca de un capítulo específico de la cocina antioque- ña cuyo origen, vigencia y perdurabilidad son ignorados  por el común de los comensales de nuestra tierra, quienes,  cuando por algún motivo lo hacen tema de conversación,  se refieren a él como: la parva. No es osado aseverar que esta voz, de eminente origen  sefardita, en Colombia sólo se emplea con el sentido de ali- mento en nuestra comarca, designándose con ella un con- junto de masas y amasijos, unos de sal y otros de dulce, cuyo  ingrediente básico de preparación es una harina horneada  y cuyas formas, tamaños, texturas y sabores hacen de el un  genérico que comprende numerosas recetas emparentadas  \n18 Jíndic Eerstat Oóbot  en su lejanía con aquellas, bien de la panadería universal,  bien de la repostería universal. Sin embargo, el vocablo  en cuestión, aunque deriva del léxico propio de la siem- bra de los granos, también significa pequeño y en algunas  regiones de España entre las gentes trabajadoras es sinó- nimo de  desayuno . Con la venia de los historiadores especializados en  los viajes de Colón, me atrevo a imaginar que el desayuno  del descubridor al amanecer del 12 de octubre de 1492 fue  una tiesa punta de hogaza remojada en vino con más de  60 días de haber sido horneada en Palos de la Frontera...  Las diminutas boronas de aquel pan de salvado, que arras- tradas por la brisa cayeron a la mar, fueron las primeras  harinas mal cernidas que llegaron a las costas americanas. Poco se conoce del bastimento que traía Colón para  este primer periplo; sabido es que nunca consideró per- manecer en las Indias durante un largo tiempo, pero al  hacer las cuentas entre la fecha de su salida de España   —agosto 3 de 1492— y la fecha de su regreso —marzo  15 de 1493— transcurren 153 días que permiten suponer  cómo, más rápido de lo pensado, comenzó una obvia y  contundente disminución de provisiones en las alacenas  y despensas de las dos carabelas sobrevivientes. Bastante  recatado es el almirante en sus notas de viaje para comen- tar sobre la angustia que se apoderó de los 90 estómagos  de la tripulación que ya empezaba a quejarse por la escasez  y el deterioro del condumio cotidiano, pasadas tres sema- nas de haber zarpado de la península. Según la bitácora del  almirante, durante todos estos días sus carabelas fondearon  \n19 Éíndic er íisti  en una y otra ensenada y sus tripulaciones bajaron a tierra  firme en diferentes fechas y lugares en busca de las anhe- ladas especias y del legendario oro. Así las cosas, fueron  varios los encuentros descritos por Colón con los indios  taínos, de quienes retrata muy a su manera: fisonomías,  vestuario, ornamentos, artefactos, animales, árboles y ali- mentos, cosas todas que para su saber jamás se habían visto  en el reino. La exuberancia y rareza de todo aquel entorno  puso a cavilar al navegante sobre la exactitud de su rumbo  y más aún sobre la exactitud de su ubicación. Una vez más,  no es difícil imaginar al almirante contemplando el atar- decer del mar Caribe y pensando muy para sus adentros:  «Estas nos son las Indias..., esto tan extraño debe de ser  un Nuevo Mundo». Cuando Colón dio la orden de preparar el regreso, el  alboroto de empacar duró tres días. El 16 de enero bode- gones, cavas y despensas quedaron atiborradas con todo  aquello que durante más de 90 días toparon y trocaron  con los nativos de Guanahani, Haití y La Española. Obvia- mente, ante un regreso que tomó 60 días, fueron muchos  los tomates, los ajíes, los aguacates, las piñas y otras tan- tas frutas y hortalizas que, por descompuestas y enchicha- das, a la mar fueron a parar. Paradójicamente, los pilares  de la alimentación nativa —maíz y yuca— resistieron la  travesía y acompañaron a Colón no sólo hasta su llegada  a España —marzo 15 de 1493— sino por muchos días  más. A mediados de abril el almirante es recibido por los  reyes en el palacio del Tinell de Barcelona, donde rinde  informe detallado de su viaje y presenta los seis indígenas  \n20 Jíndic Eerstat Oóbot  sobrevivientes, aderezados con sus filigranas de oro, quie- nes entre sus brazos y de manera solemne cargaban mazor- cas y yucas, sacra pareja de productos que durante cinco  siglos serían el santo y seña de la cocina indígena americana.  Muy poco se sabe de cómo aconteció el referido informe  de Colón a los reyes; es de suponer que recibió preguntas  por parte de los sabios y consejeros de todas las ramas del  saber. Preguntaron los astrónomos, preguntaron los na-  vegantes, preguntaron los militares, preguntaron los ban- queros, preguntaron los botánicos, preguntaron los teó- logos y a todos supo responder. El reconocimiento fue  absoluto: a Colón se le concedió el privilegio de incluir  en su escudo de armas los emblemas oficiales de Castilla y  de León, y se le otorgó una donación de mil doblones. El  almirante se arrodilló agradeciendo a Dios. Acto seguido  bautizaron a los indígenas; de su destino poco se sabe y  en cuanto al maíz y la yuca, a los jardines del Alcázar de  Sevilla fueron a enraizar. Solamente meses más tarde en  vísperas de su segundo viaje, volvió a hablar Colón sobre   estos alimentos. La organización de este segundo periplo tuvo otras  dimensiones. De la memoria de Colón no se borraba su  exiguo desayuno en aquella mañana del 12 de octubre del  año anterior, y mucho menos podía borrar las caras de su   tripulación amenazante y agresiva por causa de la sed y el  hambre. Este nuevo viaje no podría fallar en asuntos de  intendencia. El reto era absoluto: 17 barcos y 1.200 hom- bres. Todo, absolutamente todo fue calculado con rigurosa  precisión numérica, hasta que apareció fray Bernardo Boil,  \n21 Éíndic er íisti  capellán asignado a la expedición y quien en nombre de la  Iglesia Católica preguntó por la cantidad de hostias que  debería de encargar a las hermanas clarisas de Córdoba,  para asegurar la evangelización cristiana a aquellas gentes  del Nuevo Mundo. Colón no cuantificó su respuesta, el almirante hizo  alusión a los productos presentados en la Corte, acotando  que de ellos se lograban harinas y panes muy similares al  pan eucarístico ofrecido en la liturgia romana, pero estos  argumentos no convencieron al capellán y, por lo tanto,  aquella inquietud de fray Bernardo significó una depurada  y afanosa búsqueda de harina y semilla de trigo en todo  Cádiz y sus poblaciones circundantes. En menos de dos  días, centenas de barriles y talegos fueron ubicados en las  bodegas de los 17 barcos, asegurándose así un resultado  histórico cuyas consecuencias nadie dimensionó en ese  momento: el surgimiento de dos conflictivos panes para  los pobladores de esta parte de la tierra, la hogaza para el   cuerpo y la hostia para el alma. Así llegó el pan de trigo a las cocinas de América; hoy,  cinco siglos más tarde, su consumo se impone de manera  contundente sobre sus homólogos de las cocinas aboríge- nes: la arepa y el cazabe; el hábito de usarlo cotidianamente  permanece en poblaciones indígenas y campesinas, pero  no es atrevido aseverar que día a día tiende a desaparecer   de los grandes centros urbanos en todo el continente. \n\n23 Éíndic er íisti  Recetas \n\n25  Cazabe  De la mano indígena a la negra, en el Caribe colombiano, aún   se mantiene la tradición de la arepa de cazabe. Se preparan solas   o rellenas de dulce de coco o mongo mongo.  1 kilo de yuca  Pele y ralle la yuca. Escúrrala con un sebucán o con un  liencillo fino, procurando exprimirle todo el jugo posible.  Déjela secar. Pílela hasta que quede una harina uniforme.  Sobre un sartén caliente ponga la harina de yuca en círcu- los muy delgados y deles vuelta cuando estén cocidos y du- ros. Termine dejándolos al sol para que después de secar  no conserven humedad y duren más tiempo. \n26 Jíndic Eerstat Oóbot  Arepa de maíz  Más de 70 variedades de arepas se hacen en todo el país. La   arepa antioqueña se gana todo el prestigio como si fuese única.   Paradójico: es la más simple de todas.  1 libra de maíz trillado blanco o amarillo  Agua  Sal al gusto  Remoje el maíz el día anterior. Cocínelo en abundante agua  evitando que quede demasiado blando. Escúrralo y mué- lalo en la máquina bien apretada, para que la masa quede   suave al tacto. Amase bien y añada sal al gusto. Tome una  porción de masa y forme las arepas —arepa de tela: cuando  son planas y redondeadas; arepa de bola: cuando su forma  es esférica—. Áselas en hornilla sobre carbón o en la estufa. \n27 Éíndic er íisti  iii  En Antioquia, los primeros aromas de  pan caliente salieron de un convento \n\n29 Después de los dos primeros viajes de Colón las  empresas con intereses de conquista se irrigaron por los  cuatro puntos cardinales del continente americano, orga- nizándose cada vez con mayor planificación en lo referente  a sus provisiones y bastimento. La alimentación y la coci- na de la Conquista difieren sustancialmente de aquellas  de la colonización. Durante los primeros 60 años —dura- ción del espíritu conquistador en busca exclusiva del oro  y con regreso inmediato— las dificultades topográficas,  las precarias vías de comunicación y otras tantas vicisitu- des del terreno entorpecieron la penetración oportuna de  los bastimentos necesarios de más de una hueste conquis- tadora, obligando a degustar aquellos frutos y productos  indígenas que, en un principio, fueron rechazados des- pectivamente por los españoles, como consecuencia de  sus remilgos de crianza. En cuanto al colono —ya advertido— viene a estas tie- rras con el objetivo concreto de establecerse hasta el final   de sus días. Por ello lo acompaña la nostalgia de su tierra  \n30 Jíndic Eerstat Oóbot  y sus antepasados, a quienes seguramente no volverá a ver.  Trae consigo, entonces, los productos y comestibles que  le permitirán una preparación de las recetas ancestrales.  El colono no comerá como el indígena: intentará comer  como en España, pero se verá obligado a complementar  su comida con diversos productos locales. Aparece así la  fusión entre costumbres, técnicas, utensilios y productos  que desembocará en la materialización de una nueva cocina  americana. No en vano 75 años después de la llegada de  Colón a América (1567) inicia labores el primer molino  del Nuevo Reino en los alrededores de Ubaté. En el artículo «Historia del pan en Colombia desde el  siglo xvi al siglo xix» se afirma: «La industria panadera  llega a Colombia con la misma conquista en los albores  del siglo xvi, en el momento en que se da esa mezcla de  comestibles indígenas y españoles donde se reemplazan  unos por otros o se complementan, es decir, comienza el  mestizaje culinario»1, y más adelante complementa: «La  nobleza española, añorando consumir el pan blanco de  su tierra, manda traer las semillas de trigo y ordena que  se siembren en las diferentes regiones del territorio ame- ricano, de esta forma las zonas de clima frío cambian su  labor agrícola por este producto; es así como se inicia la  producción de la harina y el consiguiente pan y hostias   1  Restrepo Manrique, Cecilia «Historia del pan en Colombia desde  el siglo xvi al xix». [En línea]. Consultado en diciembre de 2016  en la página web: http://www.historiacocina.com/paises/articu- los/pancolombia.htm \n31 Éíndic er íisti  para el rito litúrgico»2. Desafortunadamente son muy  precarios los anales que dan cuenta sobre la llegada de reli- giosas a Cartagena u otras provincias durante la primera  mitad del siglo xvi, conociéndose con certeza la llegada  de la Orden de Santa Clara o clarisas en 1573, y diez años  más tarde la Orden de la Inmaculada Concepción o con- cepcionistas franciscanas en 1583. Unos años después de  la Conquista, la transformación de las primeras aldeas  en ciudades obedece en gran parte al establecimiento de  conventos; las comunidades religiosas, enviadas por las  autoridades eclesiásticas del reino para diferentes menes- teres, tuvieron de manera especial el encargo de ejercer  la exclusiva elaboración del pan símbolo de la eucaristía,  pero, además, hay un hecho: el conocimiento culinario de  las siervas de Cristo es históricamente incuestionable. Al  respecto, Xavier Domingo en su libro  De la olla al mole   escribe: «La inmensa mayoría de los conventos de monjas  que proliferaron por toda Iberoamérica en los siglos xvii y  xviii realizaron colosales fortunas con diversos negocios e  inversiones, entre los que figuró desde el primer momento  la pastelería, la dulcería y la conservería. La nueva aristocra- cia era golosa y las monjas traían las viejas recetas españolas  que realizaban y vendían sin la menor competencia laica.  En muchos casos también hacían y vendían pan y bollos, y   muchas casas conventuales preparaban platos cocinados  y aun comidas enteras contratadas por quienes deseaban   2  Ibídem . \n32 Jíndic Eerstat Oóbot  ofrecer meriendas o banquetes. Esta actividad duró hasta   bien adentrado el siglo xix»3. En el caso de Antioquia, las comunidades religiosas  de monjas llegan casi tres siglos después de la Conquista  (1791) siendo las carmelitas descalzas españolas4 las pri- meras en radicarse en Medellín, y sólo 85 años más tarde,  en 1876, se establecen las Hermanas de la Caridad de la  Presentación5 provenientes de Francia, y quienes en menos  de un año hicieron presencia en otras 18 poblaciones del  departamento. A diferencia de lo que acontecía en otras ciudades y  provincias —Bogotá, Popayán y Cartagena—, donde la  producción y el consumo de pan de trigo no sólo era cos- tumbre de las élites chapetonas y criollas, sino también de  indígenas y mestizos, en la provincia de Antioquia el pan   de trigo fue considerado durante siglos bocado exclusivo  para paladares religiosos o para aquellos potentados que  podían traer la harina extranjera que tiraba por Cartagena  o la harina nacional producida desde 1614 en molinos de  Tunja, Villa de Leyva, Mariquita y Tocaima. Así las cosas,  en Antioquia, con el advenimiento de las cocinas mona- cales, el aromático pan fue incursionando tímidamente en  los comedores de todas las clases sociales donde reinaba su   3  Domingo, Xavier.  De la olla al mole . Madrid: Ediciones Cultura  Hispánica, 1984.  4  Castro Hernández, María Patricia.  Las comunidades religiosas feme- ninas de Antioquia 1876-1940 . Medellín: idea, 2003.  5  Ibídem. \n33 Éíndic er íisti  majestad la arepa. Y debemos al legendario conocimiento  culinario de las monjas la llegada a los manteles paisas de  unas masas cuyo olor, sabor y textura, privados de las hari- nas del maíz y de la yuca, y providencialmente mezclados  con quesito, huevos y mantequillas, dan como resultado  unas bolas, unas roscas y unas herraduras de las cuales todo  el mundo se ufana... Fueron las monjas las responsables de  que hoy tengamos buñuelos, pandequeso, pandeyuca, pan- debono y almojábana, amén de otras tantas colaciones a las  cuales, en su conjunto, en esta comarca llamamos parva. \n\n35 Éíndic er íisti  Recetas \n\n37  Oblea  Receta monacal por antonomasia, variante azucarada de la   hostia de consagrar. Últimamente se ha convertido en un   producto estrella para miles de colombianos que viven en la   economía informal.  250 g de harina de trigo  1½ pocillos de agua  ½ cucharadita de mantequilla derretida  ½ huevo batido  3 gotas de color caramelo  Azúcar y vainilla al gusto  Se revuelven todos los ingredientes para formar una cola- dilla. Luego se cuela para eliminar posibles grumos. Final- mente, por cucharadas, se forman las obleas en fierros muy  calientes especiales para este quehacer. Si no se poseen los  fierros apropiados, en una sartén bien caliente, y ligeramente  engrasada con la ayuda de una brochita, se esparce la cola- dilla en delgadas películas hasta que doren. \n38 Jíndic Eerstat Oóbot  Hojaldre  Pasta fina y versátil de la repostería europea, enseñada por   las monjas en los colegios de señoritas como base para la   elaboración de recetas dulces y saladas.  1 libra de harina  400 g de mantequilla  2 yemas de huevo  1 cucharadita de azúcar  ½ cucharada de sal  1 cucharada de jugo de limón  1 pocillo de agua helada  Para empezar se toma una cucharada de la mantequilla y el  resto se reserva, dividida en cinco porciones iguales en la  nevera. Se mezclan todos los ingredientes remojando con  el agua poco a poco hasta obtener una pasta suave que se  despegue de la mesa. Luego se deja reposar por 20 minutos.  Se espolvorea la mesa con suficiente harina de trigo y se ex- tiende la masa con la ayuda de un rodillo hasta que quede  un rectángulo de un centímetro de grosor. Posteriormen- te, marque en dos partes la pasta, y en la primera ponga la  mantequilla restante, dejando los bordes libres. Deslice  la segunda sobre la primera, cubriendo por completo el  espacio. Estire de nuevo la pasta dejándola de forma rec- tangular. Luego tome cada extremo y llévelos al centro de   la pasta para de nuevo doblarlos uno encima del otro. Re- frigere por 15 minutos y repita este doblez tres veces más.   Recuerde que el hojaldre no se amasa: se estira y se dobla. \n39 Éíndic er íisti  Pan aliñado  En las panaderías monacales, el proceso de aliñar se lograba con   una pizca, bien de leche, bien de huevo o bien de mantequilla.   Tan sutil detalle aumentaba su precio de venta.  2 libras de harina  125 g de mantequilla  40 g de levadura  4 huevos  1 cucharada de azúcar  2 cucharadas de sal  1 pocillo de leche  Primero se pone a tibiar la leche con el azúcar para disol- ver en ella la levadura. Luego, en una coca, se deja reposar   15 minutos hasta que la levadura haga espuma. Mientras   tanto, en una mesa se hace una corona con la mitad de la   harina y en el centro se le añaden los huevos bien batidos,  la sal y la mantequilla. Posteriormente se mezclan de forma  circular estos ingredientes, incorporando poco a poco la  levadura. Después se agrega el resto de la harina para for- mar una masa suave que despegue fácil de la mesa. En un  lugar cálido se deja leudar. Una vez doble su tamaño, se  amasa de nuevo y se toman las porciones del tamaño de- seado. Finalmente se dejan en latas engrasadas por 30 mi- nutos más y se meten al horno a 300 °F hasta que doren. \n40 Jíndic Eerstat Oóbot  Almojábana  Típica preparación que representa el ingenio culinario religioso   adaptando los ingredientes locales disponibles a la receta de   origen, siendo el almidón de yuca el responsable de su sabor   encantador.  2 libras de cuajada  1 libra de harina de trigo  1 libra de harina de maíz  ½ libra de mantequilla  3 huevos  1 pocillo de leche tibia  1 cucharadita de sal  Empiece tamizando las harinas con la sal por lo menos tres  veces. Luego, en una coca amplia, mezcle la cuajada con los  huevos, la mantequilla y la leche tibia. Añada a esta mezcla  las harinas y amase hasta que no queden rastros de harina.  Para terminar, forme bolas disponiéndolas en latas engra- sadas y llévelas al horno precalentado a 400 °F. \n41 Éíndic er íisti  Mojicones  Fiel representante de la bollería religiosa española. Su particular   sabor lo otorga la esencia de hinojo.  500 g de harina de trigo cernida  125 g de azúcar  125 g de mantequilla  3 huevos grandes  1 cucharada de levadura en polvo  ½ pocillo de agua tibia  1 cucharadita de esencia de hinojo  Para iniciar se pone a crecer la levadura con el pocillo de  agua tibia y un poco de azúcar. En una vasija honda se  baten la mantequilla y el azúcar hasta que la mantequilla  quede blanca y el azúcar bien integrado. Aparte se baten  los huevos a punto de nieve y se unen a la crema. Sin pa- rar de batir, se le agrega la levadura. Posteriormente, poco  a poco se mezcla la harina con la crema para formar una  masa suave que se deja reposar 4 horas, sin olvidar añadirle  la esencia de hinojo. Luego se arman los mojicones y se  dejan crecer en una lata engrasada por hora y media. Para   terminar, se hornean a 350 °F y, antes de sacarlos del hor- no, se espolvorean con azúcar. \n42 Jíndic Eerstat Oóbot  Babarrón  El licor en las cocinas monacales fue ingrediente fundamental,   y esta receta, que lo exige en cantidad, fue enseñada a las   señoritas de la alta sociedad para que, llegadas al matrimonio,   atendieran de la mejor manera reuniones y tardes de café.  1 libra de harina  ½ libra de mantequilla  ½ libra de azúcar  ½ libra de ciruelas y uvas pasas  ½ botella de ron  200 g de duraznos picados  15 g de levadura  1 pocillo de leche tibia  1 taza de almíbar  1 pizca de sal  Para comenzar se toma una cuarta parte de la harina y se  mezcla con la levadura diluida en la leche y una cucharada  de azúcar. Luego se amasa como un pan haciendo una bola  que se deja crecer tapada en un lugar caluroso por 4 horas.  Entretanto, añada en un recipiente dos copitas de ron, las  pasas y los duraznos. Cuando la masa levante, tome en una  coca amplia el resto de la harina y bátala con la mantequilla,  el azúcar y la sal hasta cremar. Sin dejar de batir, agregue  los huevos uno a uno hasta que se vea lleno de burbujas.  Continúe con la levadura poco a poco revisando que quede   bien incorporada. Para finalizar este proceso, agregue las  \n43 Éíndic er íisti  frutas y pasas mezclándolas bien. Tome unos moldes en- grasados y vierta la mezcla hasta la mitad de ellos. Déje- los tapados con un liencillo hasta que doblen su tamaño.   Luego se hornean a 300 °F. Aparte se mezcla el ron con el   almíbar y se baña el baba una vez se enfríe. \n44 Jíndic Eerstat Oóbot  Merengues  Legendaria receta de claras de huevo batidas con azúcar    que, al salir del horno, presenta una blancura inmaculada.    Su delicadeza y sabor produce suspiros, razón por la cual    así también se les llama.  4 claras de huevo  4 gotas de jugo de limón  125 g de azúcar  Bata las claras a punto de nieve adicionando las gotas de  limón. Posteriormente, incorpore el azúcar, poco a poco,  batiendo consistente y permanentemente después de cada  adición. Sobre una lata engrasada deposite de manera se- parada la mezcla a cucharadas. Hornéelos a 200 °F. \n45 Éíndic er íisti  Alfajores  En Antioquia como en Argentina se usa la palabra «alfajor»   para describir una galleta europea de origen árabe; sin   embargo, en el departamento de Nariño, cuando se pide   un alfajor, se recibe un dulce de panela con maní.  1 libra de harina de trigo  200 g de fécula de maíz  300 g de mantequilla  250 g de azúcar en polvo  200 g de arequipe  150 g de ralladura de coco, maní o almendras  Primero se tamizan las harinas dos veces. Luego se baten  la mantequilla y 150 g de azúcar hasta cremar; incorpore  poco a poco las harinas para obtener una masa pareja. Esti- re la masa y córtela en diámetros iguales. Hornee a 350 °F  y cuando estén dorados retírelos y déjelos enfriar. Una las  dos galletas con el arequipe dejando que sobresalga por los  bordes, para luego pegar el coco, el maní o las almendras.   Finalmente espolvoree con el azúcar restante. \n46 Jíndic Eerstat Oóbot  Mazapanes  Esta afamada pasta de la cocina árabe, considerada una de las   mejores resultantes culinarias del mundo, hoy está tergiversada   de tal manera que su ingrediente principal —las almendras—   brilla por su ausencia. En su versión original, la versatilidad de   esta pasta permite confeccionar en múltiples formas los más   finos dulces que llevan este nombre.  1 libra de almendras  1 taza de azúcar  2 claras de huevo  5 cucharadas de agua de azahares o de rosas  1 pocillo de agua  Para comenzar, haga un almíbar con el azúcar y el agua a  punto grueso. Posteriormente, muela las almendras —des- pués de peladas— con las claras de huevo y las cucharadas  de azahar. En un caldero, a calor bajo, mezcle las almendras  y el almíbar. Revuelva continuamente hasta obtener una  masa que no se pegue en la mano cuando se toque. Puede  también adicionarle anilinas y formar toda clase de figuras. \n47 Éíndic er íisti  Hojuelas  En Navidad estas delgaditas masas fritas no alcanzan a   enfriarse: inmediatamente se ponen a escurrir son asaltadas   por los insaciables glotones de todas las edades. En Antioquia   acompañan las natillas y en el Cauca los desamargados.  250 g de harina de trigo  1 huevo  1 cucharada de azúcar  1 cucharada de ron  1 cucharada generosa de mantequilla  Para comenzar se bate bien el huevo. Luego, en un poco  de agua tibia, se mezclan todos los ingredientes incluyen- do el huevo para obtener una masa suave. Se le espolvorea  harina a la masa y se extiende bien delgada, con la ayuda de  un rodillo. Se cortan y se fríen las piezas en aceite calien- te, se escurren sobre una lata y, aún calientes, se les agrega   azúcar y canela molida. \n\n49 Éíndic er íisti  iv  Pueblos parveros... parva pueblerina \n\n51 Hoy, en los albores del siglo xxi, Antioquia tiene  126 pueblos con los más variados y hermosos nombres y  en las más disímiles topografías, cuyos paisajes sorprenden  a propios y extraños, haciendo pensar a más de un viajero  sobre la osadía de aquellos antepasados quienes, sin puentes  ni carreteras, llegaron donde llegaron. La manera como se  pobló Antioquia es, por sus características, completamen- te diferente a la forma como aconteció con otras provin- cias del país; en cuanto a su desarrollo social y económico,  también se observan diferencias con otras tantas regiones   de Colombia. Por su vocación minera, desde épocas de la   Colonia, la pequeña propiedad es la más común entre las  familias montañeras antioqueñas. Antioquia nunca fue tie- rra propensa a la agricultura extensiva, mucho menos a la  ganadería y, apenas, entre mediados del siglo xix y princi- pios del siglo xx, con el cultivo del café en el sudoeste y los  hatos ganaderos en el Bajo Cauca aparecen los hacendados  y por consiguiente las grandes haciendas. Los 126 municipios actuales no se fundaron de un día  para otro; en otras palabras, esta representativa cantidad  \n52 Jíndic Eerstat Oóbot  de pueblos se fue formando en el transcurso de más de  quinientos años, mediante un proceso lento y espinoso,  pues sólo 9 poblaciones surgen durante los primeros tres- cientos años, y el resto de manera convulsionada y vertigi- nosa durante los siglos xix y xx. Lo anterior significa que,  antes de aparecer una gran ciudad con rasgos culturales  de capital o metrópoli, en esta región la vida pueblerina  fue de suma importancia en el proceso de formación de la  actual cultura antioqueña. Que quede claro: tenemos un  origen histórico campesino antes que citadino, razón por la  cual, hasta finales de la década del 40 del siglo pasado, éra- mos más rurales que urbanos; hoy las cosas han cambiado. La vida de pueblo es algo distintivo y la crianza pue- blerina es algo que marca. Por una parte, se encuentra la  ruralidad de las veredas con sus paisajes de montañas, lla- nuras, ríos y quebradas, amén de fincas y cultivos propios de   la región y clima del entorno; por otra parte, se encuentra la   llamada cabecera municipal, donde las calles, el mercado,  la plaza principal, los edificios de gobierno, las abarrote- rías, las fondas, las cantinas y la iglesia conforman un esce- nario vital para sus habitantes. Las distintas generaciones  se entreveran espontáneamente más allá de sus diferencias  económicas e intelectuales. No se trata de una vida bucólica  o ensimismada, pues allí, de la misma manera que aparece la  alegría y el festejo colectivo, se presentan, también, el terror  y la violencia; sin embargo, mal que bien, en esos pueblos   de Antioquia la vida fluye más calmada que en la urbe. Todo lo anterior es un atrevido y apretujado conjunto  de causas y consecuencias que conforman la identidad  \n53 Éíndic er íisti  cultural del hombre de esta tierra. Mucho se dice del regio- nalismo a ultranza que respiran los antioqueños y no es  difícil comprobarlo. Querámoslo o no, por encima de  bandera verde y blanca, por encima de escudo e himno, el  símbolo más representativo de la identidad regional deriva  de su alimentación: se trata de la arepa. Para los antioque- ños, arepa significa familia, significa mamá, significa tierra  de crianza, significa historia, significa fortaleza, significa  pujanza. En el lenguaje paisa, arepa es sexualidad, es pon- deración, pero a la vez es torpeza; paradójicamente, los  antioqueños han convertido esta bola de masa en su más  ilustre condecoración; a propios y extraños se les rinde  homenaje en esta comarca con un collar de arepas. En el último siglo las cosas han cambiado de manera  sorprendente y la arepa antioqueña no escapa a dichos  cambios. Si bien la arepa ejerció su papel de pan cotidiano  durante casi cuatro siglos después de la llegada del trigo a   América, y aunque entre la población campesina y secto- res populares de Medellín actualmente continúa haciendo  presencia diaria en la alimentación, es un hecho que de  manera casi imperceptible el pan de trigo con todos sus  derivados, desde hace poco más de un siglo, tiene tamba- leando la perdurabilidad del reino de la arepa. Veamos  algunas causas probables: todo apunta a algunos aconte- cimientos comerciales y religiosos transcurridos a finales  del siglo xix. En cuanto a los primeros, hay que señalar  el establecimiento en Medellín en el año 1888 del pri- mer molino para cacao y harina de trigo liderado por el  \n54 Jíndic Eerstat Oóbot  empresario Carlos C. Amador6, molino que revoluciona  de manera sorprendente la comercialización de la harina y  estimula a más de un pequeño comerciante a incursionar  en el negocio de la panadería. En cuanto a los religiosos,  se trata de la decisiva presencia de más de 20 comunida- des monacales que a partir de 1876 llegan a Medellín y en  tan sólo cuatro décadas se dispersan por más de 47 pobla- ciones del departamento7; ejercen misiones evangelizado- ras, pedagógicas y de caridad cristiana, y simultáneamente  difunden, entre otros, el oficio de la panadería. Si bien no existen fuentes históricas confiables sobre los  incipientes negocios de panadería en los pueblos de Antio- quia hace más de un siglo, fácil es imaginar la dificultad de  su consolidación dada la obvia competencia que, desde las  cocinas familiares, tanto de fincas como de casas de pue- blo, se ejercía con la suculenta y cotidiana producción ver- nácula; sin embargo, es un hecho irrefutable que el ingenio  culinario paisa, acompañado de la tutoría de aquellas coci- nas monacales, originó un mestizaje de cocina en el que  la harina de maíz, la harina de yuca, la panela, el quesito y   el anís se convierten en ingredientes pioneros de la pana- dería regional. Los aromas de pan caliente, pandequeso,  pandeyuca, panderos y cucas invaden desde hace más de   6  Brew, Roger.  El desarrollo económico de Antioquia desde la Indepen- dencia hasta 1920 . Bogotá: Publicaciones del Banco de la Repú- blica, 1977.  7  Castro Hernández, María Patricia.  Las comunidades religiosas feme- ninas de Antioquia 1876 - 1940 . Medellín: idea, 2003. \n55 Éíndic er íisti  un siglo las calles de Abejorral, Fredonia, Jericó, Marini- lla, Rionegro, San Roque, Santa Fe de Antioquia, Sonsón,  Santo Domingo, Sopetrán, Támesis, Titiribí y Yolombó,  así como las de otros tantos pueblos donde esos bocados  se han convertido en patrimonio local. \n\n57 Éíndic er íisti  Recetas \n\n59  Galletas cucas  En tiendas de carretera, en los caspetes de construcción y en las   panaderías de pueblo nunca faltan. Para la sabiduría popular,   esta es una galleta símbolo de la parva antioqueña.  1 libra de harina de trigo  3 astillas de canela  1 libra de panela rallada  1 taza de agua  1 cucharada de dulce quemado  2 cucharadas de mantequilla  1 cucharadita de bicarbonato de sodio o   polvo de hornear 1 huevo  En primer lugar se hace el melao calentando el agua, la ca- nela y la panela hasta que se forme una miel; déjelo enfriar  retirando la canela. Aparte tamice tres veces la harina con  el bicarbonato y mézclela con el melao en forma muy sua- ve, sin amasar. Termine de integrar los ingredientes y deje  reposar por 30 minutos. Pasado ese tiempo estire la mez-  cla en una mesa enharinada y corte las circunferencias del  tamaño preferido. Deje reposar otros 30 minutos y hor- néelas a 400 °F en horno precalentado. \n60 Jíndic Eerstat Oóbot  Rollo rojo o liberales  Anteriormente se ofrecían en las panaderías como brazos de   reina o de gitana; más tarde, por los acontecimientos políticos del   país, su nombre cambió al añadir en su receta anilina de carmín,   identificándose con el color que representa el partido político.  375 g de harina  750 g de azúcar  125 g de jalea de guayaba  6 huevos  200 cc de agua bien fría  1 cucharada de polvo de hornear  1 cucharadita de sal  1 cucharadita de anilina carmín  Primero separe las yemas de las claras. Después bata las ye- mas hasta que queden muy esponjadas y añádales poco a  poco el azúcar y el agua. Posteriormente, tamice la harina  con la sal y el polvo Royal tres veces. Continúe batiendo  a punto de nieve las claras. Inmediatamente agregue los  ingredientes secos alternando con las claras a la primera  mezcla. Sin parar de batir, incorpore la anilina color car- mín. Esparza la mezcla en moldes rectangulares mante- niendo menos de un centímetro de espesor y hornéela a  350 °F hasta que dore ligeramente. Al sacar el rollo del  horno, voltéelo inmediatamente sobre un paño húmedo  y rocíele azúcar. Recórtele los bordes y espárzale la jalea  ligeramente batida. Enróllelo todavía caliente y déjelo en- friar envuelto en un paño húmedo para cortarlo en discos. \n61 Éíndic er íisti  Galleta de coco  Es común verlas en todos los pueblos de Antioquia; su   crocancia y sabor son característicos. Últimamente se han   convertido en producto de venta ambulante en algunos    peajes de Colombia.  ½ libra de harina  ½ libra de coco rallado  125 g de mantequilla  1 huevo  170 g de azúcar  1 cucharadita de polvo de hornear  Primero bata los huevos con el azúcar y la mantequilla has- ta que tomen un color blancuzco. Incorpore poco a poco  la harina, el coco rallado y el polvo de hornear. Cuando  forme una masa suave y compacta, estírela y corte las ga- lletas. Finalmente se hornean a 350 °F y se dejan enfriar  en las latas. \n62 Jíndic Eerstat Oóbot  Bizcochuelos de sagú  En algunos pueblos todavía se conserva la receta con harina   de sagú. Para las viejas matronas pueblerinas, cuando se tiene   bizcochuelo, está asegurado el postre para una eventual visita.  12 huevos  1 libra de sagú  350 g de azúcar  1 copita de aguardiente  1 cucharadita de polvo de hornear  En caso de no tener harina de sagú, utilizando el procedi- miento puede prepararlos con los siguientes ingredientes:  8 cucharadas de fécula de maíz  8 huevos  8 cucharadas de harina de trigo  16 cucharadas de azúcar  2 cucharadas de aguardiente  Para comenzar, se tamiza la harina de sagú tres veces y pa- ralelamente se separan las claras de las yemas. Luego, las  yemas se baten con el azúcar hasta que se disuelven y, en  otro recipiente, se baten las claras a punto de nieve. Por  cucharadas, y sin dejar de batir, se incorporan la harina,  las yemas, el polvo de hornear y el aguardiente. Posterior- mente, la mezcla se vierte en latas engrasadas y se hor- nea a 300 °F, revisando que quede dorado y seco. Si desea  \n63 Éíndic er íisti  tostar los bizcochuelos, córtelos en porciones, déjelos en- friar y vuélvalos a meter al horno a 350 °F, cuidando de  no quemarlos. \n64 Jíndic Eerstat Oóbot  Coquitos  Pequeños picos nevados que no superan una falange de   tamaño; sin ser confite, hoy se ofrece en todos los ventorrillos   de dulces populares en Colombia.  1 libra de coco rallado  350 g de azúcar  8 claras de huevo  125 g de harina de trigo  Se baten las claras sin dejar llegar a punto de nieve. Lue- go se mezclan con la harina, el azúcar y el coco. Cuando  tenga una masa homogénea en una lata engrasada, ponga  porciones en forma de picos y lleve al horno precalentado  a 200 °F hasta que doren. \n65 Éíndic er íisti  Teja de capio  Crujiente amasijo de artesanal factura, confeccionado sobre   teja de barro. En los tiempos de arriería era muy apetecido por   su durabilidad y por el gran sabor que le otorga el maíz capio.   Actualmente se consigue en El Santuario, Antioquia, pero   tiende a desaparecer.  2 libras de harina de maíz capio  3 huevos  ¼ de mantequilla  ¼ de manteca o aceite  Sal al gusto  Primero bata los huevos y las grasas. Luego, poco a poco,   integre la sal y la harina. Finalmente ponga porciones so- bre tejas españolas y hornee a 350 °F, preferiblemente en   horno de leña. \n66 Jíndic Eerstat Oóbot  Carisecas  Las más famosas se hacen en horno de leña, en Vélez,   Santander, y se empacan en hoja de bijao, afectando su    sabor y volviéndolas exclusivas.  1 libra de maíz amarillo  2 cucharadas de mantequilla  3 cucharadas de azúcar  70 g de mantequilla  1 taza de agua  El proceso debe iniciarse desde el día anterior remojando  el maíz. Al día siguiente, este se cocina cuidando que no  quede ni duro, ni blandito, y posteriormente se muele.  Aparte deslía la panela. Mezcle la mantequilla y el agua de  panela con la masa del maíz. Luego se baten los huevos y se  integran a la masa. Después de amasar muy bien se forman  bolas un poco aplanadas en forma de arepa. Finalmente,  se hornean a temperatura media hasta que doren. Tam- bién se pueden asar sobre un tiesto no muy caliente y re- costarlas al fuego para que reciban sólo el calor por un lado. \n67 Éíndic er íisti  Buñuelo criollo  Admirable ocurrencia de la culinaria popular, por la cual    más de una población en Antioquia se disputa la    originalidad de su receta.  1 libra de quesito  ½ libra de harina de maíz  2 cucharadas de mantequilla  2 huevos  Los ingredientes se mezclan hasta formar una masa ho- mogénea. Luego pase la preparación por la máquina de  moler dos veces, amase nuevamente y forme esferas del  tamaño deseado. Finalmente se sofríen en aceite tibio y en  una olla grande. No olvide de cuando en cuando remover  suavemente toda la olla. La cantidad de aceite deberá ser  la necesaria para que los buñuelos puedan voltearse solos. \n68 Jíndic Eerstat Oóbot  Pandequeso  Su aroma y sus ingredientes permiten modificaciones.   Imposible cambiar su forma.  2 libras de maíz  2 libras de quesito  2 libras de cuajada  2 huevos  100 g de almidón de yuca  1 cucharada de mantequilla  1 cucharadita de sal  Primero se remoja el maíz de un día para otro. Luego se  cocina en suficiente agua procurando que no quede ni muy  duro ni muy blando. Posteriormente se escurre y se muele  con el queso para mezclarlo con el almidón, la mantequi- lla, los huevos y la sal. Después de obtener una masa suave,  se arman roscas y se mete al horno a 350 °F. \n69 Éíndic er íisti  Pandeyuca  Paladares extranjeros le hacen venia a tan magistral receta   cuando conocen que la harina de yuca mezclada con queso,    en el horno, se hace pan.  1 libra de almidón de yuca  ½ libra de harina de maíz  1 libra de quesito  ¼ de libra de cuajada  7 huevos  1 cucharadita de polvo de hornear  ½ cucharadita de sal  Empiece por moler el queso. Luego mézclelo con las ha- rinas, el polvo de hornear, la sal y los huevos bien batidos.  Una vez la masa está firme y seca, se forman medialunas que  se llevan en latas engrasadas al horno precalentado a 400 °F. \n70 Jíndic Eerstat Oóbot  Pandebono  Con la almojábana y el pandeyuca forma una trilogía de    sabor que el comensal común confunde. Famosos son los    del Valle del Cauca, cuya simpleza es característica.  1 libra de maíz  2 libras de cuajada  125 g de almidón de yuca  1 pocillo de leche tibia  50 g de panela o azúcar  60 g de mantequilla  2 yemas  1 cucharadita de sal  ½ cucharadita de polvo de hornear  Con tres días de anterioridad se pone a remojar el maíz,  cambiando el agua cada día. Luego muélalo con la panela.  En una coca amplia revuelva manualmente el maíz con el  resto de los ingredientes hasta obtener una mezcla pega- josa y húmeda. Finalmente, haga bolas y póngalas en latas  engrasadas para hornear a 400 °F hasta dorar. \n71 Éíndic er íisti  v  Pregones, aromas y  sabores de cajoneras \n\n73 Un verdadero vuelco sufre Medellín en su comer- cio de alimentos durante la última década del siglo xix  cuando, de manera institucional e inamovible desde 1784,  el mercado semanal que se daba todos los viernes en la  Plaza Mayor —hoy Parque de Berrío— fue reubicado  por asuntos de progreso. En menos de cinco años se cons- truyeron dos señoras plazas de mercado: inicialmente, al  oriente de la ciudad, Rafael Flórez construye en 1891 la  plaza que aún hoy conocemos con su nombre, y tres años  más tarde, en 1894, se inaugura la Plaza Amador —co- nocida durante muchos años como Plaza de Cisneros,  hoy desaparecida—. Dos plazas de mercado en menos de  cinco años son una muestra perfecta del empuje que es- taba tomando el comercio de alimentos en esta villa. En  efecto, además de los numerosos puestos de abarrotería,  grano, frutas y legumbres que se concentraban en las dos   plazas —diariamente de 4:00 a.m. a 4:00 p.m.—, se mul- tiplicaron los vendedores puerta a puerta provenientes de  las veredas y los corregimientos más cercanos a Medellín,  \n74 Jíndic Eerstat Oóbot  quienes, con característicos pregones, anunciaban sus mer- cancías y competían con el comercio establecido. Al res- pecto, Lisandro Ochoa escribe: «Se trataba de hombres,  mujeres y niños que, con los productos a sus espaldas o  en la cabeza, tocaban de casa en casa, en días fijos y hora- rio puntual. Se sabía entonces cuando llegaba  la lechera   con leche, mantequilla y quesitos;  la verdulera  con junca,  cabezona, tomates, coles, zanahorias y repollos;  el revuel- tero  con papas, yucas, arracachas, plátanos y mazorcas;  la  frutera  con zapotes, mangos, murrapitos, mamoncillos,  piñas, guanábanas, chirimoyas, guayabas y ciruelas;  las vi- vanderas  o  los vivanderos : las primeras con bateas repletas  de frutas secas y caladas —papaya verde, cáscara de limón,  cidra, coco rallado y pulpas de tamarindo—, los segundos  con grandes ollas llenas de menudencias acompañadas del  librillo, el callo o la pata de res;  el leñatero  con sus tercios   de leña, y  el carbonero  con sus bultos de carbón»8, y para  cerrar este ciclo tan especial de ofertas a domicilio, sema- nalmente también aparecía  la cajonera  con su mágico ca- jón de aromas y sabores. Desde finales del siglo del siglo xix y hasta la década  de los 60 del siglo pasado, las cajoneras fueron verdadera  institución en los barrios periféricos y las calles céntricas de  Medellín. Famosa fue la “Ñata” Baena, fiel representante   de ese grupo de mujeres catanas quienes, mucho antes de   8  Ochoa, Lisandro.  Cosas viejas de la villa de la Candelaria , Colec-  ción de Autores Antioqueños, vol. 8. Medellín: Imprenta Depar- tamental de Antioquia, 1984. \n75 Éíndic er íisti  comenzar la aurora, realizaban en modestos talleres de  panadería la más variada y suculenta gama de repostería  criolla. Estas artesanas, sin conocimiento alguno de tiem- pos y movimientos aplicados a la optimización de una  producción en serie, atiborraban sus guacales con biz- cochos de yema, encarcelados, achiras, panderos, moji- cones, polvorosas, almojábanas, pandeyucas, buñuelos,  rollos, cucas, galletas de mantequilla, pasteles de Gloria y  una gama tal de productos que, hoy, cualquier ingeniero  industrial se asombraría por la eficiencia de tan rudimen- tarios hornos, cuya prolífera producción estaba preñada  de pequeños detalles. Finalizadas las labores de amasijo,  las cajoneras salían a hacer interminables recorridos, impe- cablemente vestidas con delantal almidonado; con limpio  mantel de cuadros cubrían su mercancía, y el pecunio, en  bolsa de trapo, era guardado religiosamente entre senos  y escapularios. Estas mujeres de caminar felino portaban  sobre su cabeza hasta una arroba de buen sabor y pregona- ban con tonalidad negrera el contenido de su cajón, guar- dando siempre amabilidad y paciencia frente a párvulos  y abuelas blancas que, sin consideración alguna, hacían  cargar y descargar el cajón cuantas veces fuera necesario  para cambiar una galleta. Como otros tantos realizadores  de oficios artesanales, las parveras fueron víctimas de las  leyes de la productividad y por lo tanto debemos confor- marnos con su recuerdo. \n\n77 Éíndic er íisti  Recetas \n\n79  Marranitas de mantequilla  Delicada galleta azucarada determinada por la calidad y la   cantidad de la mantequilla con que se elabora. Su nombre no    es sólo por su forma, sino porque realmente engorda.  500 g de harina  250 g de mantequilla  125 g de azúcar  1 cucharadita de polvo de hornear  3 gotas de vainilla  Para empezar, bata hasta que esté cremosa la mantequilla  con el azúcar. Luego añada el resto de los ingredientes y  amase bien. Extienda la masa sobre harina y espolvoréele   azúcar. Finalmente, con el molde en forma de marranita,   corte las galletas y hornéelas hasta dorar. \n80 Jíndic Eerstat Oóbot  Bizcochos de yema  En las panaderías de principios del siglo xx, la de los bizcochos   era la última lata que entraba en la noche al horno de leña,   amaneciendo tostados por el rescoldo. Desafortunadamente   la panadería contemporánea ha tergiversado su receta.  1.200 g de harina  ½ litro de agua  50 g de levadura  120 g de azúcar  150 g de mantequilla  1 cucharadita de polvo de hornear  1 cucharada rasa de sal  Primero se mezclan todos los ingredientes hasta formar  una masa manejable. Se estira varias veces con el rodillo  y se moldea en bolitas. Posteriormente se debe tener una  crema que se obtiene de mezclar 100 g de mantequilla con  50 cc de aceite vegetal, una cucharadita de sal y una cucha- rada colmada de harina de maíz, para con ella embadurnar  manualmente cada una de las bolitas y después pasarlas a  las latas. Dejarlas crecer a temperatura ambiente hasta que  doblen su tamaño. Finalmente se barnizan con yemas de   huevo bien batidas y se hornean a 400 °F. \n81 Éíndic er íisti  Panderos  Delicada galleta que en su consistencia se asemeja a los   polvorones españoles. Su calidad se descubre cuando se   desmorona en el paladar, impregnándolo de aromático anís.  1 libra de almidón de yuca cernido  ½ libra de azúcar o panela rallada  75 g de mantequilla  50 cc de aceite  2 huevos  1 cucharadita de polvo de hornear  1 copita de aguardiente anisado  Primero se separan las claras de las yemas. Luego se baten   el almidón de yuca, el aceite, la mantequilla, las yemas, el  polvo de hornear y el aguardiente. Sin dejar de batir, poco  a poco se le añade la panela o el azúcar. Se deja reposar la   masa por 2 horas. Finalmente se arman los panderos y se  marcan con los dientes de un tenedor. Antes de llevar al  horno, barnice con las claras batidas. Hornee a 350 °F  hasta que doren. \n82 Jíndic Eerstat Oóbot  Encarcelados  Por la consistencia de su masa se asemeja al  pie  inglés. Su nombre   se debe al enrejado que se hace con la masa dejando entrever el   contenido de su relleno. También existe otra versión hojaldrada.  ½ libra de harina de trigo  125 g de azúcar  100 g de mantequilla  1 cucharadita de polvo de hornear  ½ cucharadita de sal  1 cucharadita de ralladura de limón  4 cucharadas de dulce de cidra  4 cucharadas de arequipe  4 tiras no muy grandes de bocadillo  Para empezar se baten la mantequilla, el azúcar, los huevos  y la sal. Luego se integra poco a poco la harina y el polvo de  hornear hasta formar una pasta suave. Se estira la masa y se  cortan cuatro circunferencias, además de suficientes tiras  para enrejar. En cuatro moldes engrasados se disponen las  circunferencias de masa y se precalientan hasta que apenas  tomen color. Se rellenan con los dulces por capas, se espol- vorean con la ralladura de limón y se decoran enrejando  con las tiras de masa. Se hornean a 300 °F hasta que doren. \n83 Éíndic er íisti  Lengüitas hojaldradas  Producto característico e imprescindible de las cajoneras.    La delicadeza de su sabor las convierte en inofensivas, razón   por la cual conducen a la gula. Entre más doradas más adeptos.  250 g de masa de hojaldre  2 claras de huevo  8 cucharadas colmadas de azúcar  Gotas de limón  Gotas de vainilla  Para comenzar se estira la masa en la mesa bien enharina- da, dejándola de medio centímetro de grueso. Luego, cór- telas en forma de pequeñas lenguas y dispóngalas en una  lata engrasada. Aparte, prepare un batido de merengue de  la siguiente manera: bata a punto de nieve las claras de hue- vo; cuando estén duras, agregue poco a poco el azúcar y las  gotas de limón y vainilla. Finalmente, con la ayuda de un   pincel grueso, pinte las lengüitas con este batido y hornee  a 300 °F un rato, luego baje el calor a 250 °F y, por último,  apenas crezca la pasta, baje el calor a 200 °F hasta que doren. \n84 Jíndic Eerstat Oóbot  Roscas de sagú  Blanditas... están viejas. Lo que más caracteriza su frescura    es su consistencia, la cual en más de una ocasión, antes de   morderla, es necesario partirla. Esta es otra receta de la   panadería artesanal que ha desmejorado su calidad como   resultado de la panadería industrial.  170 g de harina de maíz  60 g de harina de sagú  60 g de almidón de yuca  1 libra de quesito fresco  2 huevos  30 g de mantequilla  La preparación se inicia mezclando todos los ingredientes  hasta que se forme una masa homogénea. Luego, la mezcla  se pasa por la máquina de moler no muy apretada y final- mente se amasa para luego elaborar las roscas que se lleva- rán al horno una vez esté precalentado a 350 °F. \n85 Éíndic er íisti  Rosquitas de anís  Su trenzado es característico, pero más aún el sabor de su   esencia. Por su tamaño se convertía en galleta ideal para la    hora del desaparecido «algo» en familia.  ½ libra de harina de trigo  2 cucharadas de mantequilla  3 cucharadas de azúcar  1 huevo  50 g de levadura  1 cucharada de anís en grano  2 claras de huevo  Para empezar, derrita la mantequilla y mézclela con la ha- rina, el huevo, dos cucharadas de azúcar, una cucharada de  anís y la levadura. Amase todo hasta que esté uniforme y,   si encuentra que la consistencia es un poco dura, agregue  leche tibia. Deje reposar la masa por 30 minutos en un lu- gar fresco. Arme las roscas de manera retorcida, píntelas  con las claras de huevo y espolvoréele el azúcar restante.  Hornee a 200 °F. \n\n87 Éíndic er íisti  vi  De cómo las señoritas de la alta  sociedad entraron a la cocina \n\n89 Cualquier cuadro de costumbres del Medellín  del siglo xix obligatoriamente nos transporta a una so- ciedad absolutamente provinciana. Imposible una mejor  radiografía sobre el Medellín de la época que este breve  comentario de don Tomás9 cuando, refiriéndose a la vida  en sociedad de aquel entonces, escribía: «... la gente vivía  como encantada en este como limbo de la monotonía y la  rutina... la potestad paterna y sacerdotal eran tenidas como  fuero divino. Los padres concertaban los matrimonios en- tre sus hijos y sus hijos se sometían. La vida de estos mag- nates, sin política, sin finanzas, sin prensa, sin espectáculos,  sin clubes, sin cafés, sin parrandas, tenía que apacentarse en  los remansos de la religión y el hogar. Con alguna salidilla  en sociedad...». Todo apunta a que, por aquellos años, el  suceso que marca de manera especial las costumbres so- ciales y gastronómicas en la aristocracia medellinense es   9  Carrasquilla, Tomás.  Obras completas , vol. 2. Medellín: Editorial  Bedout, 1964. \n90 Jíndic Eerstat Oóbot  la llegada, a la ciudad, de la familia del general Herrán. Su  elegancia y modernismo imponen lo que, en su momento,  se denominó «los recibos de la familia Herrán», caracte- rizados por el ofrecimiento de viandas y licores servidos  con amabilidad y buen gusto; tales formas de recibir die- ron mucho qué comentar y... mucho qué imitar. A partir del acontecimiento referido, algunas de las  esposas o, en su defecto, las hijas mayores de los grandes  potentados de la época se entusiasmaron sobremanera con  aquellas recetas, tanto de sal como de dulce, y más aún  con las vajillas, la cristalería, la lencería y los demás arti- lugios aprendidos en casa del general, razón por la cual  viajar a Europa se convirtió para muchas de ellas en obli- gación marital. Viajar al exterior, en aquella época, era una  decisión que los ricos tomaban, motivados por la necesi- dad de educar, en la universidad, a los hijos mayores; sin  embargo, en múltiples ocasiones, terminaba involucrán- dose a todos los miembros de la familia y aquello signifi- caba una ausencia por muchos años y el anhelado regreso  para descrestar a los incautos parroquianos. Los varones  iban a prestigiosas universidades inglesas a estudiar inge- niería; las señoritas a escuelas francesas de orientación  familiar, donde el  glamour , las maneras de mesa, el buen  tono y la cocina constituían el culmen de formación para  la mujer del momento. Pero la verdad sea dicha: en lo  concerniente a la educación femenina no era necesario  viajar a Francia, dado que el pénsum de los estudios supe- riores de colegios como La Enseñanza y La Presentación  incluía materias como: historia universal, composición,  \n91 Éíndic er íisti  física, estética, economía doméstica, dibujo, modistería,  piano, francés, inglés, dactilografía y cocina. La historia- dora Catalina Reyes C.10, refiriéndose a dicha educación,  la resume así: «La educación femenina de las clases altas   se reducía a un barniz cultural y a una excelente prepara- ción como futura ama de casa». Con los antecedentes anteriores, en 1907 aparece, en el  exiguo mercado editorial de Medellín, el primer recetario  culinario de autora antioqueña; se trata de  El manual de  cocina para la ciudad y el campo  de la señorita Elisa Her- nández11. Es un recetario prolijo en donde la autora mezcla  sofisticadas preparaciones extranjeras con productos ver- náculos cuyo resultado dio lugar a las comidas que hoy se  consideran «típicas» en numerosas familias de todos los  estratos sociales. Gracias a sus primeras lectoras, las rece- tas de la señorita Hernández empezaron a institucionali- zarse de familia en familia y de cocinera en cocinera; en su  texto, sus interesadas encontraban desde las más detalladas  indicaciones para preparar y servir un almuerzo francés  o una comida de ceremonia, hasta el modo de encender  el fogón de leña o la mejor manera de despescuezar una  gallina. Paulatinamente el manual fue convirtiéndose en un  referente necesario en las cordiales discusiones culinarias   10  Reyes Cárdenas, Catalina. «Vida social y cotidiana en Medellín  1890-1940».  Historia de Medellín , vol. 2. Medellín: Suramericana  de Seguros, 1996.  11  Hernández, Elisa.  Manual práctico de cocina , tomo segundo. Mede- llín: Editores Félix de Bedout e Hijos, 1923. \n92 Jíndic Eerstat Oóbot  de «algos católicos de beneficencia», y el oficio culinario  ejercido con pasión, arte y sofisticación cautiva a las seño- ras de la alta sociedad y las motiva a escribir sus propios  libros de recetas. Mención especial merece doña Maraya  Vélez de Sánchez, por su libro  Recetas de cocina  editado en  París por Gallimard en 1915, cuya recopilación de libretas  caligráficas de abuelas y de recetarios familiares y libros  culinarios de todas partes del mundo se constituye en el  fondo bibliográfico de cocina más importante de Antio- quia; en dicha colección reposan manuscritos y textos sin  editorial ni fecha escritos por señoras como: Isabel O. de   Restrepo, Concha Restrepo Olarte, Helena Posada Soto,  Faustina Posada Villa, Blasina Botero de Isaza y Eugenia  Ángel de Vélez, entre otras. En la década de 1940, otra matrona de la alta sociedad,  doña Sofía Ospina de Navarro, publica un nuevo receta- rio:  La buena mesa , el cual es objeto de una acogida sin  precedentes. Saber cocinar se convierte en requisito indis- pensable para las mujeres de todas las clases sociales y el  libro de doña Sofía se asume, no sólo como cartilla para  recién casadas, sino también como guía diaria y obligato- ria para las señoras del servicio doméstico, no obstante sus  rudimentarios conocimientos de lectura. Durante varias  décadas, la chismografía culinaria cunde en todos los salo- nes de té de Medellín: damas, unas y otras, se disputan la  autoría de las recetas y la buena mano para preparar las  delicias de sal y de dulce; algunas se especializan en relle- nar pavos y hacer perniles, otras en canapés,  muffins  y  petit  fours ; la ahuyama y la arracacha logran estatus de cremas  \n93 Éíndic er íisti  y salen triunfantes; la parva antioqueña —pandequeso y  pandeyuca— ya no se hace en hornos de leña..., sale de  hornos eléctricos americanos y compite en prestigio con  brioches, croissants,  vol au vents , y otras tantas delicade- zas de la repostería europea que comienza a ponerse de  moda. Es la época en que María Luisa, milhojas y bizco- cho negro se presentan en sociedad, con un éxito tal que   se proyecta hasta nuestros días; tales recetas se han cons-  tituido, en muchas familias, en emblemas que recuerdan  la sazón de la finada abuela o, aún más, en panacea para la  economía familiar. \n\n95 Éíndic er íisti  Recetas \n\n97  Pastel de Gloria  Difícil encontrar una preparación con más versiones sobre el   origen de su nombre. No en vano, prestigiosas reposterías de   Medellín se disputan la originalidad de su receta.  1 libra de harina  10 huevos  200 g de mantequilla  100 g de bocadillo  100 g de dulce de cidra  100 g de arequipe  2 cucharadas de polvo de hornear  Para comenzar, separe las claras de las yemas y bátalas a  punto de nieve. Luego agregue poco a poco el azúcar y las  yemas. Continúe con la harina, el polvo de hornear y la  mantequilla. Amase hasta que se desprenda de la mesa  y déjela descansar 20 minutos. Estire la masa y corte dos  círculos. Ponga uno sobre un molde engrasado y rellénelo  con los dulces. Cúbralo con el otro círculo de masa, repuje  los bordes y hágale tres incisiones con un cuchillo afilado.  Finalmente, hornee a 300 °F hasta que dore. \n98 Jíndic Eerstat Oóbot  Milhojas  Elaboradas con finas y numerosas planchas de hojaldre, de   donde se deriva su nombre; pasaron de ser un manjar exclusivo   y de alto costo a principios del siglo xx a mecato popular   actualmente.  500 g de pasta de hojaldre  125 g de azúcar  125 g de azúcar (tres equis)  1 litro de leche  2 yemas de huevo  5 cucharadas de fécula de maíz  2 cucharadas de vainilla  Primero se extienden tres partes de pasta hojaldrada. Lue- go se hornean a 300 °F por separado y bien chuzadas para  que no se encojan. Aparte, en una olla, se pone a calentar  la leche con el azúcar. Luego añada la fécula disuelta en un  poco de leche y revuelva hasta que cuaje. Apague el fuego  y, sin dejar de revolver, agregue las yemas y la vainilla for- mando una crema. En un recipiente por separado disuelva  con un poco de agua el azúcar (tres equis), procurando que  no quede muy líquida. Para finalizar se arman las milhojas,  poniendo la crema, todavía tibia, entre cada capa de hojal- dre y el azúcar disuelto sobre la última capa de hojaldre. \n99 Éíndic er íisti  Bizcocho negro de novios  Una receta más, legado de la refinada repostería europea. Sus   posibilidades de preparación son infinitas, dependiendo de   la calidad y la cantidad de sus ingredientes, que no todos son   básicos. En otras palabras, todo depende del presupuesto.  1 libra de harina  1 libra de mantequilla  1 libra de azúcar  1 libra de uvas pasas  1 libra de ciruelas pasas  1 libra de nueces  1 libra de almendras  1 libra de frutas cristalizadas  1 libra de brevas  ½ libra de quemado de panela  16 huevos  4 cucharaditas de polvo de hornear  2 cucharaditas de nuez moscada rallada  2 cucharaditas de canela en polvo  2 cucharaditas de clavos de olor en polvo  2 cucharadas de ralladura de cáscara de limón  1 cucharada de ralladura de cáscara de naranja  Desde el día anterior, se envinan con una parte del mosca- tel las frutas cristalizadas y las pasas. Luego se mezclan con  la ayuda de una batidora con todos los ingredientes para  obtener una crema muy untuosa y homogénea. Posterior- mente, en un molde se hornea a 300 °F. Finalmente se deja  enfriar y se envina con el resto del moscatel por cuatro días. \n100 Jíndic Eerstat Oóbot  María Luisa  El gran éxito de esta torta radica en la calidad de la mantequilla   y la factura de su dulce de moras. Actualmente se hace con   arequipe, pues todo lo que ahora lleve este dulce de leche vende.  6 huevos  ½ libra de harina  ½ libra de mantequilla  ½ libra de azúcar  2 cucharadas de azúcar pulverizada o en polvo  2 cucharaditas de polvo de hornear  1 pocillo de mermelada de moras  1 pocillo de leche  Tamice la harina dos veces. Bata la mantequilla y el azúcar  hasta que se ponga blanca. Luego agréguele, sin dejar de  batir los huevos uno a uno, la harina, el polvo de hornear  y la leche. Vierta la mezcla en dos moldes iguales previa- mente engrasados y enharinados. Hornee a 300 °F hasta  que, al introducir un cuchillo, salga limpio. Unte la parte  superior de cada torta con el dulce. Monte una torta so- bre la otra y vuelva a untar el dulce sobre la parte superior  de la torta. Finalmente, espolvoree el azúcar tres equis has- ta formar una ligera capa. \n101 Éíndic er íisti  vii  Cerrando el horno \n\n103 En los albores del siglo xx, los negocios de panade- ría en esta ciudad funcionaron como talleres domésticos en  cocinas traseras de las casas y poco a poco se convirtieron  en panaderías de barrio. Este tipo de negocio, casi siempre  de organización familiar, se fue consolidando por los cua- tro puntos cardinales de la ciudad, permitiendo aseverar  que durante muchos años el aroma mañanero de pan ca- liente se sintió en muchos barrios populares y algunos de  clase media. Famosas fueron las Ceballos, reputadas damas  caucanas quienes venidas a menos económicamente, en su  Popayán de origen, en Medellín volvieron a hacer fortuna  debido a la indiscutible calidad de sus recetas; mención obli- gada debemos hacer de las Lalinde, de quienes se dice que  «sacaron toda la familia adelante a punto de parva calien- te»; sin embargo, el mito vigente es la Panadería Palacio,   oriunda de Santa Rosa de Osos y que funciona en Mede- llín desde 1913; llamada por todo el mundo las Palacio hoy,  próxima a cumplir un siglo de actividades y convertida en   auténtica institución de la tradicional parva antioqueña. \n104 Jíndic Eerstat Oóbot  Mención importante exige la llegada en la década del  30 de ciudadanos suizos y alemanes quienes fundaron las  reposterías La Suiza y el Astor, la primera ya desaparecida  y la segunda próxima a cumplir 80 años entre nosotros. Sin  lugar a dudas, estas dos empresas revolucionaron la biz- cochería y la panadería de la ciudad con una oferta cuya  variedad de preparaciones y sabores muy pocos conocían  y la gran mayoría de golosos provincianos jamás la habían  degustado. Se trataba de una auténtica repostería europea  y de una panadería suiza y alemana que, por su calidad y  presentación, durante muchos años no tuvieron compe- tencia; sin embargo, años más tarde, con el ingenio y la  buena mano de dos curiosas y emprendedoras señoras de  Medellín, aparecen en la ciudad dos nuevas reposterías: la  Santa Clara y la Santa Helena, que emulan y compiten, con  creatividad y originalidad, con aquellas prestigiosas casas  europeas y logran también un reconocimiento nacional  que pone en evidencia el tesón del matriarcado antioqueño. A partir de la década de los 70 se inicia en la ciudad  una serie de fusiones entre talleres familiares de panadería  de reconocida tradición, con nuevos y acaudalados empre- sarios, originándose así un proceso de modernización en  la producción y distribución, el cual golpea la estabili- dad comercial de la panadería artesanal, tanto rural como  urbana. Surgen así importantes empresas industriales de  la panificación... y para los sectores populares nace la bien  llamada parva plastificada. En los últimos 20 años (1990-2008), en casi todos los  centros comerciales y en las zonas de comercio lejanas al  \n105 Éíndic er íisti  centro de la ciudad, se establecen originales negocios de  panadería y repostería de excelente calidad. La mayoría  responde a una reivindicación del oficio de la panadería  como fenómeno nacional. En efecto, hoy las nuevas gene- raciones pertenecientes a las clases media y alta, durante  muchos años reacias al estudio culinario como alternativa  de formación profesional, encuentran en esta profesión  —amable y lucrativa— una actividad de gran potencial  laboral, que está permitiendo dar a conocer la panadería  y la repostería de las más recónditas regiones del mundo. \n\n107   §   Glosario   §   A Acemas : Pequeñas arepas dulces  de pan tostado cuyo ingrediente  principal es el salvado.  Alfajor : Preparación o pastel que  consta de dos masas horneadas  delgadas o galletas, unidas por  un dulce. También se denomi- na alfajor o rosquillas de alfajor  a la pasta horneada hecha con al- mendras, nueces, miel cocida y  pan tostado rallado. Procede de  la palabra árabe-persa  alajú , que  define un dulce hecho de pasta  de almendras, piñones —nue- ces— pan, miel y especias.  Alfeñiques : Proviene del árabe   alfainid . Es uno de los productos  resultantes de la caña de azúcar,  de presentación delgada y alar- gada. También conocidos como  pastas de azúcar amarradas con  aceites de almendras, cocidas y  extendidas en tiras delgadas y re- torcidas.  Alfandoques : Etimológicamen- te se atribuye su origen a la in- fluencia árabe, aunque existe un  instrumento musical elaborado  con la caña y de ascendencia y  uso negro que comparte el mis- mo nombre. Se describe como  alfandoque a la pasta hecha con   melado, queso y anís o jengibre.  Almíbar : De origen árabe, la pala- bra almíbar define al azúcar di- suelto en agua y espesado al fuego  hasta que tome consistencia de  jarabe.  Almidón : Proveniente del latín, el  almidón define en términos culi- narios a la fécula que se encuentra  en las semillas de los cereales y de  \n108 Jíndic Eerstat Oóbot  algunas raíces de varias plantas  que se utilizan para espesar salsas  y hacerlas mantecosas.  Almojábanas : De origen árabe,  las almojábanas son tortas o pa- nes de harina y queso horneados  de forma redonda y de alto con- sumo en Latinoamérica.  Amasar : Acción de formar o re- volver para hacer la masa.  Amasijo : Porción de harina ama- sada para hacer el pan.  Arepa : Amasijo de maíz cocido y  molido. Son diversas y se dife- rencian por la calidad y los ingre- dientes de su masa, la variedad del  maíz o por la manera como se pre- paran. Algunas de la gran varie- dad que representan a Antioquia  son: arepa aliñada, arepa de mote,  arepa de chócolo, arepa de maíz  pelado y de maíz sancochado.  Arepita : Con este diminutivo se  diferencia de la arepa una galle- ta dulce que en ocasiones, según  la receta, tiene como ingrediente  harina de maíz.  Arepuela : Arepa del norte de Co- lombia hecha con harina de maíz  y con un poco de anís, freídas con  forma de rosca.  Ariquipe, arequipe : Son nom- bres comúnmente usados para  nombrar diferentes tipos de dul- ces latinoamericanos. Los térmi- nos ariquipe y arequipe se usan  para describir un dulce a base de  leche.  Azucarillo : Confite de almíbar  batido al que se le añade azúcar  en polvo. También es llamado  azúcar rosado por la anilina co- lor carmín que sugiere la receta.   §   B Barquillo : Hoja delgada de pasta  hecha con harina de trigo, azúcar  y enrollada de manera cilíndrica  o cónica. Ideal para acompañar  helados.  Bastones : Amasijo dulce, achoco- latado y almendrado al que se le  da forma de bastón antes de me- terlo al horno tibio.  Batido   : Término que de manera  general indica bebida enrique- cida con huevo o helado. En los  recetarios colombianos de prin- cipios de siglo xx, definía prepa- raciones para merengues.  Bavaresa   : Delicado postre de leche  y yemas, espesado con colapiscis y  \n109 Éíndic er íisti  enriquecido con chocolate y vai-  nilla.  Bizcochito : Pan sin levadura co- cido dos veces para conservar.  Bizcocho : Proveniente del latín  y usado para describir diferentes  preparaciones. El bizcocho es un  bollo o galleta de harina, huevos  y azúcar cocido al horno.  Bizcochuelo : Masa horneada es- ponjada compuesta de harina,  huevos y azúcar.  Bocadillos : Preparación que se  suele tomar entre almuerzo y co- mida. El término bocadillo suele  usarse para denominar cualquier  alimento presentado entre dos  pedazos de pan. En Colombia,  es común su uso para describir  un dulce de guayaba de contex- tura firme. También usado para  describir algunos dulces de coco  o de boniatos.  Bodera : Señora muy distinguida  por conocer y dirigir todos los  preparativos de una boda.  Bollos : Panecillos de harina ama- sados con huevos, leche, entre  otros ingredientes, que pueden  ser moldeados de diferentes for- mas y tamaños. El término bollo  es también usado para nombrar  un mazapán relleno con conser- vas. Además, define un conjunto  de amasijos de cereales o tubércu- los que se cocinan en agua hir- viendo.  Brazos : Bizcochuelos alargados  y enrollados de manera cilíndri- ca con rellenos de mermeladas,  arequipes o cremas.  Budines : Alimentos cocidos al baño  maría en molde para luego ser ser- vidos fuera de este.  Buñuelos : Proveniente del latín.  Preparación o envuelto recubier- to por pasta de harina y frito en  abundante aceite muy caliente.  Los hay dulces y salados.   §   C Calados : Galletas delgadas, aca- naladas.  Cañas : Amasijo o pasta suave dulce  que se enrollan en cañas de ma- cana delgada, para darles forma  de tubo antes de freír. Ideal para  acompañar el chocolate o el té.  Caramelizar : También llamado  acaramelar. Untar de azúcar lí- quido a punto de caramelo.  Caramelo : Pasta resultante de  cocer el azúcar al fuego, puede  \n110 Jíndic Eerstat Oóbot  impregnarse de distintos aromas  o sabores.  Caramelos : Confites fruto de la  unión del azúcar caramelizado  con la leche y porcionado en pe- queños trozos.  Carlota   : Torta hecha con huevos,  leche y azúcar. En Colombia es  la base de un grupo de tortas en  las que se montan conservas de  diferentes frutas.  Cernido : Dulce de fruta licuada  y cernida al que se le da punto  en el fogón con azúcar o panela.  Cocada : Dulce de azúcar, coco y  leche.  Colaciones : Pequeño refrigerio,  conjunto  de  dulces,  grupo  de   productos de panadería o dulce  de corozo garrapiñado de azúcar.  Compota : Puré de fruta. Hervido  y refrigerado para su posterior  consumo.  Confite : Pasta hecha de azúcar y  mezclada con diversos ingredien- tes —colorantes, extractos de fru- tas y de especias—. Los hay de  diferente forma y tamaño.  Cuarezmeros : Bizcochito de maíz  añejo, grasas de palma y manteca  de cerdo.  Cubierta   : Pasta que cubre al biz- cocho.  Cremas : Helados, pastas con las  que se hacen las cubiertas.  Churros : Frutos de sartén o ma- sas fritas, alargadas y unidas por  sus extremos, preparados con ha- rina, agua y azúcar. Espolvoreada  con azúcar comúnmente.   §   D Dulces : Diferentes productos de- rivados del azúcar líquidos o aca- ramelados.   §   E Empanadas : Pastel o preparación  encerrada en un molde de masa  de pan o de hojaldre y cocido des- pués en el horno. También pue- den ser fritas y de masa de maíz  u otros cereales.  Españoletas : Bizc
