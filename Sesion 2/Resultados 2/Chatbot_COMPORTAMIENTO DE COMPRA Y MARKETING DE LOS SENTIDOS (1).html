<script>
    const PDF_TEXT = "Vivat Academia. R e v i s ta   d e   Com u n i c a c i ó n.  2021 ,   nº 1 5 4 ,  459 - 479    ISSN: 1575-2844 http://doi.org/10.15178/va.2021.154.e1366               459   INVESTIGACIÓN      COMPORTAMIENTO DE COMPRA Y MARKETING DE LOS  SENTIDOS: UN ANÁLISIS DE SU INFLUENCIA EN LOS  COMPRADORES DE MODA      Shopping behaviour and sensory marketing: an analysis of their influence on  fashion shoppers          Pedro Pablo Marín Dueñas1:  Universidad de Cádiz. España.   pablo.marin@uca.es            Diego Gómez Carmona:  Universidad de Cádiz. España.   diego.gomezcarmona@uca.es        Como citar el artículo:   Marín  Dueñas,  P.  P.  y  Gómez  Carmona,  D.  (2021).    Comportamiento  de  compra  y    marketing de los sentidos: un análisis de su influencia en los compradores de moda.    Vivat  Academia.   Revista  de  Comunicación,  154,  459-479.   http://doi.org/10.15178/va.2021.154.e1366         RESUMEN         Frente  a  consumidores  cada  vez  mejor  informados  y  más  exigentes,  que  también  buscan que su compra se convierta en una experiencia y a la creciente importancia de  los  portales  de  compra   online   frente  al   retail  físico,  se  hace  necesario  el  desarrollo  de   estrategias  en  el  punto  de  venta  para  atraer  a  los  compradores  y  sigan  acudiendo  a   las mismas, no sólo a realizar una compra, sino a pasar tiempo en la tienda. Y, en este  sentido, una de las grandes diferencias (por no decir el punto fuerte) entre la tienda  física y la  online  es la experiencia física de poder tocar y sentir el producto. La tienda  no  debe  ser  entendida  solo  como  un  punto  de  venta,  sino  que  se  debe  configurar    como  un  espacio  donde  vivir  experiencias.  Y  es  aquí,  integrada  dentro  de  la   estrategia  de   trade  marketing ,  donde  cobra  especial  relevancia  el  marketing  de  los   sentidos. Partiendo de esta premisa, la presente investigación se centra en el estudio   del  marketing  sensorial  utilizado  por  las  tiendas  de  moda  del  grupo  Inditex  y,  más    concretamente, la influencia que el uso de dichas técnicas tiene en el comportamiento   de  compra  de  los  consumidores  y  en  cómo  estos  perciben  la  generación  de    experiencias.  Para  ello  se  aplicará  la  metodología  cuantitativa  de  la  encuesta  a  una                                                      1  Pedro  Pablo  Marín  Dueñas :  Doctor  por  la  Universidad  de  Cádiz.  Profesor  Ayudante  Doctor  en  el   Departamento de Marketing y Comunicación de la Universidad de Cádiz. Coordinador de Grado en   Marketing e Investigación de Mercados de la Universidad de Cádiz     Recibido :  12 /03/20 21  ---   Aceptado :  15/04/2021   ---   Publicado : 24/05 /20 21   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   460  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  muestra  de  la  población  cuyas  respuestas  se  estudian  a  través  del  software    estadístico  SPSS.  De  los  resultados  se  desprende  que  si  bien  el  uso  de  estas  técnicas    tiene  una  influencia  positiva  en  los  consumidores  desde  el  punto  de  vista  de  la   experiencia de compra, realmente no les influyen en la decisión de compra final.        PALABRAS  CLAVE:    Marketing  sensorial  –  Neuromarketing  -  Retail  marketing  -  Trade  marketing  -  Merchandising  –  Moda  -  Punto  de  venta  –  Influencia  –  Comportamiento de compra      ABSTRACT      Faced  with  increasingly  better  informed  and  more  demanding  consumers,  who  are    also looking for their purchase to become an experience, and the growing importance   of    online   shopping  portals  compared  to  physical  retail,  it  is  necessary  to  develop   strategies  at  the  point  of  sale  to  attract  shoppers  and  keep  them  coming  back,  not    only to make a purchase but also to spend time in the shop. In this sense, one of the   big differences (if not the strongest point) between the physical shop and the online  store is the physical experience of being able to touch and feel the product. The shop   should  not  only  be  understood  as  a  point  of  sale  but  should  also  be  configured  as    space  where  to  live  experiences.  Furthermore,  it  is  here,  integrated  within  the  trade   marketing strategy, where the senses' marketing takes on special relevance. Based on   this  premise,  this  research  focuses  on  the  study  of  sensory  marketing  used  by  the    Inditex  group's  fashion  shops  and,  more  specifically,  the  influence  that  the  use  of   these  techniques  has  on  the  purchasing  behaviour  of  consumers  and  how  they   perceive  the  generation  of  experiences.  For  this  purpose,  the  survey's  quantitative    methodology  will  be  applied  to  a  sample  of  the  population  whose  responses  are   studied  using  SPSS  statistical  software.  The  results  show  that,  although  the  use  of    these techniques has a positive influence on consumers from the point of view of the   shopping experience, they do not influence them in the final purchase decision.       KEYWORDS:  Sensory  marketing  -  Neuromarketing  -  Retail  marketing  -  Trade  marketing - Merchandising - Fashion - Point of sale - Influence - buying behaviour       Agradecimiento :  Nuestro  agradecimiento  al  grupo  de  investigación  SEJ-482  Innovación Social en Marketing de la Universidad de Cádiz.        1. INTRODUCCIÓN      En una época en la que la compra  online  está ganando cada vez mayor peso frente  al  retail  tradicional provocando menores ventas en el comercio offline y una cantidad  cada  vez  menor  de  compradores  en  tiendas  físicas  (Emarketer  Retail,  2018)  se  hace   imprescindible  para  éstas  convertir  el  punto  de  venta  en  un  lugar  donde  el    consumidor  se  sienta  a  gusto  y  pueda  disfrutar  de  la  experiencia  de  compra.  Los    expertos  de  la  industria  minorista  sugieren  un  cambio  en  el   retail   para  evitar  su   desaparición y conocer de primera mano los cambios en los hábitos de compra y las  \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   461  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  tendencias  actuales  de  consumo  (Internet  Retailer,  2018).  Frente  al  denominado    modelo    brick  and  click   (Gómez  y  Suárez,  2012)  en  el  que  los  consumidores  compran   de  manera   online   a  través  de  un  clic  de  ratón  o  de  las  pantallas  de  sus  móviles  y    tablets ,  los  gestores  de  los  establecimientos  físicos  deben  desarrollar  nuevas   estrategias  de  venta  que  atraigan  a  los  compradores  al  local,  volviendo  al  modelo     brick  and  mortar   o  venta  tradicional  en  el  que  los  consumidores  acuden  al   establecimiento a comprar sus productos (Gómez y Suárez, 2012).      Pero el problema para las tiendas físicas no sólo está en el negocio  online  sino que  además  tienen  que  desarrollar  su  actividad  en  un  mercado  sobresaturado  de   productos competitivos de difícil diferenciación y en el que los consumidores además   de  estar  cada  vez  mejor  informados  y  ser  más  exigentes  también  buscan  que  su    compra  se  convierta  en  una  experiencia.  Tal  y  como  apunta  el  Informe   Consumer   Insights  Survey     2018   de  PWC,  el  consumidor  español  acude  a  las  tiendas  físicas   buscando no solo el producto sino que espera una experiencia de compra sensorial y  social.  Es  decir,  la  compra  se  ha  convertido  en  una  búsqueda  de  experiencias    envueltas en sensaciones, sentimientos, percepciones, exclusividad, personalización y  efectividad  (Medina  y  Quispe,  2019)  lo  que  pone  de  manifiesto  la  necesidad  de    adaptar el marketing a la nueva realidad.      El  marketing  del  siglo  XXI  debe  evolucionar,  adaptarse  a  las  nuevas  demandas  y   dejar  atrás  las  estrategias  y  tácticas  orientadas  en  la  venta  y  promoción.  Resulta    fundamental  para  el  comercio  minorista  crear  experiencias  de  compra,  conectar  con   los clientes en un plano emocional y fomentar mejores relaciones     En  este  sentido,  la  aplicación  de  la  denominada  estrategia  de   merchandising ,  definida  por  Zorrilla  (2000)  como  un  conjunto  de  técnicas  que  favorecen  el  acto  de   compra  a  partir  de  la  adecuada  presentación  tanto  de  los  productos  como  de  su    entorno,  así  como  la  gestión  de  forma  rentable  del  espacio  de  la  tienda  debe  dar  un   paso más y evolucionar en su desarrollo hacia el denominado marketing experiencial   que  tiene  como  objetivo  crear  experiencias  de  compra  a  través  de  las  que  el    consumidor  viva  momentos  diferentes  y  únicos  durante  el  tiempo  que  pase  en  la    tienda, evocando reacciones emocionales para crear mejores relaciones con el cliente.   Así,  para  Segura  y  Sabaté  (2008)  la  elección  final  del  consumidor  está  determinada    por  las  emociones  que  le  despierte  el  proceso  de  compra.    Según  Schmitt  (2007),  el  marketing ha dado un nuevo giro y “el cliente ya no elige un producto o servicio solo   por  la  ecuación  costebeneficio,  sino  por  la  vivencia  que  ofrece  antes  de  la  compra  y    durante su consumo” (p. 8).     Vinculado a este marketing experiencial se encuentra una herramienta que utiliza  los  estímulos  que  las  personas  perciben  a  través  de  sus  sentidos  (vista,  tacto,  gusto,    oído y olfato) para mejorar la experiencia de compra e influir en el comportamiento   de  los  consumidores  intentando  establecer  nuevos  vínculos  con  ellos  mediante  los    sentidos  (Castanyol,  2014).  Es  el  denominado  marketing  sensorial,  técnica  de    comercialización que hace referencia a la interacción empresa-consumidor prestando  atención  y  estimulando  todos  los  sentidos  (vista,  oído,  olfato,  tacto  y  gusto).  El   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   462  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  marketing  de  los  sentidos  permite  influir  en  las  percepción,  juicios  y   comportamientos  de  los  consumidores  creando  un  ambiente  agradable  que    incremente el tiempo de compra en el punto de venta (Berčík  et  al.,  2020;  Bellido- Pérez  y  López-Cortés,  2019;  Bilek,  Vietoris  e  Ilko,  2016;  Tauferova  et  al.,  2015).  Esta   técnica  supone  una  ventaja  de  los  detallistas  frente  al  comercio   online .  Los   consumidores pueden experimentar a través de sus sentidos la experiencia en tiendas   físicas  especialmente  en  aquellos  productos  que  requieren  tocar,  sentir  y  probar   previamente  a  la  decisión  de  compra  (Kim  et  al.,  2020).  Específicamente,  aquellos   minoristas que se dedican al  retail  de moda tienen otra ventaja, dado que a diferencia  de  otros  bienes  que  no  requieren  evaluación  física  antes  de  su  adquisición,  la  ropa    debe verse, tocarse y generar una experiencia previa antes de decidir su compra (Kim   et  al     ,  2020).  De  hecho,  esta  carencia  de  experiencia  en  la  compra   online   de  ropa   provoca una tasa de devoluciones superior al 40% (CNBC, 2016).      Por  tanto,  para  conseguir  este  cambio,  será  necesario  aplicar  técnicas  sensoriales   dentro  del  comercio  minorista  físico  (Helmefalk  y  Berndt,  2018)  y,  de  hecho,  el   marketing  de  los  sentidos  ha  adquirido  en  los  últimos  tiempos  una  gran    trascendencia  en  el  desarrollo  de  estrategias  de  atracción  del  consumidor  y  como    generadora de experiencias de compra puesto que es una manera de conectar con los  clientes,  despertando  en  ellos  una  serie  de  emociones  que  tienen  mucha  más  fuerza   que  los  propios  aspectos  tangibles  derivados  del  producto  que  se  va  a  adquirir.  En    definitiva, tal y como apuntan autores como Hultén (2011) o Kumar (2014) estimular   los sentidos de los consumidores como elemento diferenciador impactará de manera   directa en la fidelidad, recuerdo y comportamiento del consumidor.      Desde la perspectiva académica, Ortegón y Gómez (2016) consideran que si bien la  investigación  en  este  campo  se  ha  incrementado  en  las  últimas  décadas  (Schmitt,   1999; Hultén, 2011; Gómez et al . , 2014), el estudio de los sentidos y su aplicación en el  marketing es un campo de estudio relativamente reciente (Krishna, 2009), por lo que   se  hace  necesario  seguir  profundizando  en  el  mismo  a  partir  del  desarrollo  de  la    investigación  académica.  Fruto  de  esta  perspectiva  y  del  interés  que  despierta  este    campo  de  estudio,  por  la  diferenciación  que  puede  suponer  aplicar  esta  estrategia    para  el   retail   de  moda,  surge  este  trabajo  que  busca  no  sólo  profundizar  en  los   conceptos  teóricos  vinculados  al  marketing  sensorial  sino,  también,  analizar  la    influencia  que  aplicar  estas  técnicas  en  el  punto  de  venta  tiene  en  los  consumidores    de moda.     1.1 Conceptualizando el marketing de los sentidos     Charles,  Newman  y  Wright  (2016)  definen  el  marketing  de  los  sentidos  como  la   utilización de estímulos y elementos que los clientes perciben a través de los sentidos  (olfato,  vista,  oído,  tacto  y  gusto).  Para  Krishna,  Lee  y  Schwarz  (2017)  es  la   combinación  de  la  experiencia  sensoriomotriz  y  la  cognición  del  cliente,  con    resultados  inmersos  en  el  pensamiento,  sentimiento  y  comportamiento  de  éste.  En   palabras  de  Jiménez,  Bellido  y  López  (2019,  p.  123)  “el  marketing  sensorial  en  el    punto  de  venta  lo  entenderemos  como  aquel  que  se  dirige  a  los  cinco  sentidos   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   463  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  buscando  la  estimulación  de  estos  para  intentar  crear  un  ambiente  agradable,  de    forma que el cliente incremente el tiempo de compra en el establecimiento”. Krishna   (2009,  p.  2)  lo  resume  como  “el  marketing  que  involucra  los  sentidos  de  los   consumidores  y  afecta  su  comportamiento”.  Y  todo  ello  con  el  fin  de  proporcionar    placer estético, emoción, belleza y satisfacción (Schmitt, 2006).     Sea  como  fuere,  Lindstrom  (2005)  considera  que  el  objetivo  del  marketing   sensorial es el de conectar al consumidor y a la marca a nivel emocional mediante la  interacción, durante el proceso de compra, de los cinco sentidos humanos buscando   que  lo  emocional  prevalezca  sobre  lo  racional.    Estimulando  los  sentidos  se  podrá    influenciar  directamente  en  la  percepción  de  los  consumidores  y  en  su  proceso  de   compra (Megía, 2016).     Esta  estrategia  que  pone  en  valor  la  capacidad  de  los  cinco  sentidos  de  los  seres   humanos  para  influir  en  sus  decisiones  de  compra  debe  implementarse  de  manera    conjunta  creando  lo  que  se  denomina  una  experiencia  sensorial  (Hulten,  Broweus  y   Van Dijk, 2008). Es por esto que es vital el entendimiento de los sentidos para que al   ser estimulados en el establecimiento, ayuden a conseguir el objetivo de la venta.     1.1.1. Olfato     La  asociación  de  un  olor  con  un  establecimiento  o  un  producto  puede  ser  tan   intensa que pasa a convertirse en parte de la identidad de la misma marca (Manzano,   Gavilán,  Avello,  Abril  y  Serra,  2002),  estimulando  al  cliente  durante  el  proceso  de   compra  y  despertando  su  deseo.  El  olfato  es  el  sentido  que  genera  mayor  nivel  de    recuerdo y evocación (Gómez y García, 2012) y es que conecta de manera directa con   las estructuras límbicas del cerebro que son las responsables de nuestras emociones y   conductas  (González  y  Pallarés,  2019,  Fiore,  Niehm  y  Lorenz,  2008;  Goldkuhl  y   Styfven,  2007).  Al  oler,  por  tanto,  el  sentimiento  que  se  genera  es  inmediato,  no  hay    influencia de los pensamientos. Con el sentido del olfato, nuestro cerebro actúa antes   de  pensar,  a  diferencia  de  lo  que  ocurre  con  los  demás  sentidos  (Manzano  et  al.,  2012).     Surge así, por tanto, entre las herramientas de marketing sensorial el denominado  marketing  aromático,  un  factor  de  gran  influencia  en  el  comportamiento  de  compra    de los consumidores. Los seres humanos tenemos la capacidad de rememorar el 35%  de  lo  que  olemos  y  distinguir  aproximadamente  entre  10000  olores  distintos,  así    como  asociar  determinados  olores  a  situaciones  puntuales.  Y  no  sólo  eso,  una    investigación  actual  afirma  que  el  75%  de  nuestras  emociones  diarias  están    relacionadas  con  los  aromas  (Berčík    et  al.,  2020).  Estas  emociones  influyen  en  el   recuerdo  generado  por  el  estímulo  y  permite  recordar  algo  que  olemos  mejor  que    algo  que  vemos,  oímos  o  tocamos  (Vlahos,  2007).  En  este  sentido,  las  empresas    pueden facilitar el reconocimiento del producto vinculando su identidad corporativa   con  un  aroma  y  así  diferenciar  la  marca  de  sus  competidores.  Además,  un  olor    agradable  en  el  punto  de  venta  mejora  un  44%  el  tiempo  de  permanencia  del    consumidor  en  tienda  (Conick,  2017)  y,  por  ende,  el  ticket  medio  de  su  compra   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   464  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  podría  aumentar  (Spectrio,  2020).  Es  el  caso,  por  ejemplo,  de  los  aromes  dulces  y    cálidos,  como  el  de  la  canela  o  la  vainilla,  que  se  usan  en  las  tiendas  de  moda.  La  correcta  aplicación  del  aroma  contribuye  a  mejorar  la  percepción  que  tienen  los   clientes  del  establecimiento,  sus  productos  y  servicios.  También  se  ha  demostrado    que el marketing aromático aumenta las visitas al punto de venta (ScentAir, 2020).     Además,  la  percepción  de  un  olor  puede  variar  en  función  de  la  persona  y  estar   influido  por  aspectos  individuales  como  el  género  o  la  edad.  Según  Hirsch  y  Gay    (1991) según el sexo de la persona se tienen diferentes reacciones ante el mismo olor   siendo los hombres, por ejemplo, menos sensibles a los olores que las mujeres. Así un   hombre  puede  pasar  más  tiempo  ante  un  estante  con  olor  picante  y  ser  menos    susceptible al olor de champú que las mujeres. Desde el punto de vista de la edad, el   sentido del olfato se va debilitando conforme las personas se van haciendo mayores  (Barrios, 2012, p. 77).     Iannini  (2010)  diferencia  entre  tres  tipos  de  aromas,  los  identificativos,   denominados  odotipos  o  logos  olfativos  a  través  de  los  que  una  marca  crea  su   identidad  olfativa  que  le  permite  ser  reconocida  por  los  consumidores  como  son    conocidas por su identidad visual. El odotipo es, por tanto, el olor de una marca que   transmite  sus  valores  e  intereses  a  sus  públicos  a  través  de  él.  Habla  Iannini,  en    segundo término, de los aromas asociativos encargados de estimular las ventas en el   punto de venta a partir de aromas creados adhoc. Finalmente este autor identifica lo   que él denomina aromas reproductivos, y que reproducen con exactitud el olor de un   producto o lo potencian para fomentar su consumo.     Centrados  en  la  aplicación  del  marketing  olfativo  en  el  punto  de venta,  Manzano   et  al .   (2012)  diferencian  tres:  la  generación  de  tráfico  (un  aroma  bien  elegido  y  aplicado  en  la  entrada  o  en  el  exterior,  cerca  del  acceso  al  establecimiento,  puede    atraer clientes al negocio); la ambientación (aromatizar estratégicamente el local para   mejorar  la  respuesta  del  cliente,  buscando  un  efecto  de  relajación  y  bienestar  que  facilite la circulación del cliente y le haga olvidar el paso del tiempo); la señalización   (utilizar  los  olores  como  advertencia,  aviso  o  reclamo  -por  ejemplo  de  un  nuevo   producto  o  destacar  una  sección  concreta-.  Busca,  en  definitiva,  dirigir,  atraer,   orientar o indicar).     Entre  las  ventajas  que  se  derivan  de  aplicar  este  marketing  olfativo  o  aromático   está  el  hecho  de  que  crea  experiencias  para  el  consumidor  llegando  incluso  a    modificar conductas y posicionando la marca en el  top of mind  del consumidor ya que  el  olfato  tiene  memoria.  Asocia  valores  a  la  marca  que  se  relacionan  con  el  aroma  y    vincula  al  consumidor  con  el  mundo  de  la  misma,  pudiendo  llegar  a  retener  a  los    consumidores en un establecimiento comercial y fidelizando a los mismos.        1.1.2. Tacto     \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   465  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  Las  sensaciones  de  la  piel  alteran  los  estados  de  ánimo,  es  por  eso,  que  se   considera al sentido del tacto importante para las interacciones comerciales y es que   este  sentido  permite  interactuar  con  los  productos,  acercando  éstos  a  los  clientes.  Si    se compara con los demás sentidos el tacto es el único que permite el contacto físico   directo  con  el  producto,  jugando  un  papel  clave  en  la  decisión  de  compra.  Así,  a    partir  de  los  distintos  receptores  táctiles  que  están  ubicados  en  nuestra  piel  se    produce  la  percepción  háptica,  y  “toda  esta  información  háptica  es  transmitida  al    cerebro,  quien  busca  su  asociación  con  experiencias  archivadas  en  él  o  la  procesa    como  nueva,  para  así  generar  la  respuesta  más  adecuada  que  se  traduzca  en  un    sentido o una acción” (Manzano et al., 2012 p. 178).     Derivado de esta percepción háptica surge otra de las herramientas de marketing  sensorial  que  pueden  emplear  los  detallistas  de  ropa  en  sus  establecimientos:  el    marketing  háptico,  un  aspecto  fundamental  para  la  industria  de  la  moda.  Concretamente,  el  consumidor  de  moda  necesita  tocar  y  sentir  la  ropa  antes  de    comprarla.  Los  informes  de  la  industria  textil  y  de  confección  indican  que    aproximadamente  el  85%  de  los  consumidores  eligen  comprar  en  tiendas  físicas    precisamente  porque  permiten  apreciar  las  características  como  la  textura  o  la  suavidad  (TimeTrade,  2017).  Por  ejemplo,  tocar  un  suéter  puede  afectar  las    percepciones  de  textura,  dureza  y  peso  (Klatzky  y  Lederman,  1993;  Klatzky  y    Lederman,  1992).  Concretamente,  el  atributo  suavidad  es  el  más  importante  para    evaluar la calidad del producto (Monitor TM 2017; Chang et al., 2015) y es imposible  apreciarlo  mediante  la  vista  (Spence  et  al.,  2014).  Para  consumidores  que   experimentan las percepciones de  suavidad  mediante el tacto con  su propio cuerpo,  la percepción de la textura permitirá evaluar el producto y determinar la decisión de  compra (Workman, 2010; Childers y Peck, 2010). Por tanto, mejorar las percepciones   de  suavidad  háptica  en  los  productos  podría  mejorar  la  experiencia  del  consumidor  en el establecimiento.      1.1.3. Vista     La  vista  es  el  sentido  más  poderoso  pues  permite  captar  la  información  del   exterior  y,  por  tanto,  es  el  más  utilizado  desde  el  punto  de  vista  del  marketing  y  la    comunicación  (González  y  Pallarés,  2019).    A  través  del  sentido  de  la  vista  una   persona percibe el mundo que le rodea. En su día a día un consumidor recibe miles y   miles  de  estímulos  visuales  (anuncios,  carteles,  envases,  señalizaciones)  que  le    ofrecen  información  y  que  le  predisponen  a  pensar  o  actuar  de  una  determinada   manera  (Manzano  et  al.,  2012).  Dada  su  importancia,  de  los  cinco  sentidos,  el  de  la   vista  es  el  más  conocido  y  explotado  en  una  estrategia  de  marketing  sensorial,    predominando sobre las demás modalidades sensoriales (Biswas et al., 2019; Biswas  et  al.,  2014).  Es  el  denominado  marketing  visual,  definido  por  Manzano  et  al.  como   “la utilización estratégica que las compañías realizan de estímulos, signos y símbolos   comerciales y no comerciales para comunicar mensajes a sus consumidores” (2012, p.  95).    \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   466  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  Manzano  et  al.  (20012)  realiza  una  clasificación  del  impacto  sobre  el  consumidor   que el marketing visual tiene en el punto de venta (Figura 1).        Figura 1:  Clasificación de los efectos del marketing visual en el punto de venta   Fuente:  Comunicar con los sentidos en el punto de venta (Manzano et al., 2012)    Para  su  análisis  comportamental  se  ha  utilizado  tradicionalmente  el  modelo   Estímulo Organismo Respuesta (para un ejemplo, Koo y Kim, 2013). En este modelo  se  describe  explícitamente  hasta  qué  punto  las  señales  visuales  del  punto  de  venta    tienen un impacto en la percepción, la emoción, y el comportamiento de compra del   consumidor (Morone et al., 2018; Kühn y Petzer, 2018).      Entre  los  factores  que  se  han  analizado  sobre  marketing  visual  en  el  punto  de   venta se encuentran:   1.   El  color  (Bagchi  y  Cheema  2013;  Mehta  y  Zhu  2009),  elemento  determinante   para  influir  en  el  estado  afectivo,  cognitivo  y  comportamental  de  los  clientes    que  entran  en  el  establecimiento  (Díez  de  Castro  et  al.,  2006).  Aquí  se  podría   incluir  la  iluminación,  factor  clave  en  cualquier  establecimiento  comercial.    Dota de mayor visibilidad a los productos, permite crear distintos ambientes e   influye  en  como  el  consumidor  percibe  la  mercancía  y  en  la  capacidad  de   atracción del propio local (Gómez y García, 2012).  2.   La orientación de la cartelería en el establecimiento (Romero y Biswas, 2016)   3.   La  forma  de  disponer  el  mobiliario  (Jiang  et  al.,  2016).  Estamos  hablando  del   diseño  interior,  referido  a  la  decoración,  accesibilidad,  la  disposición  del   mobiliario,  materiales y  estilo  usado,  entre  otros  y  que  influyen  en  el  tránsito    del consumidor por la tienda y en el tiempo que permanece en ella (Gómez y   García, 2012)  4.   El dinamismo en la ubicación y rotación de productos (Roggeveen et al., 2015;  Cian, Krishna y Elder, 2015).   5.   El  diseño  exterior  (que  incluye  elementos  como  el  escaparate,  la  fachada,  las    puertas  de  acceso  o  los  rótulos  y  la  entrada)  se  configura  también  como  un    factor  de  atracción  clave  del  establecimiento.  Kotler  et  al.  (2008)  consideran   que el viandante se genera unas expectativas sobre el establecimiento cuando   ve  su  fachada  y  su  escaparate  que,  por  otro  lado,  deberían  cumplirse  en  el    interior.  Este  diseño  exterior  debería  atraer  al  cliente  captando  su  atención  y   motivándole a acceder al establecimiento (Díez de Castro et al., 2006).   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   467  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479    En  el  caso  particular  del  sector  moda  Rodríguez  (2018)  sugiere  desarrollar   estrategias de marketing visual creando emociones en el punto de venta. Esta autora  afirma  que  así  el  establecimiento  alcanzará  un  reconocimiento  de  marca  efectivo  y    coherente que mejorará el posicionamiento y reducirá las decisiones de compra. Para   analizar las emociones generadas por distintas distribuciones (parrilla vs. libre) de un  establecimiento  de  moda  Jang  et  al.  (2018)  estudiaron  el  efecto  de  la  complejidad   visual.  Los  resultados  demuestran  que  la  complejidad  visual  de  la  tienda  influye    negativamente  sobre  el  placer  cuando  la  implicación  de  los  consumidores  con  la   moda  es  bajo,  y  que  este  efecto  disminuye  en  consumidores  con  alta  implicación.    Además,  la  complejidad  visual  se  relaciona  con  una  mayor  excitación  emocional.    Junto  a  los  procesos  emocionales,  una  investigación  analizó  la  percepción  de  los    consumidores cuando se encuentran en un establecimiento abarrotado, concluyendo  que  la  aglomeración  puede  desplazar  las  preferencias  de  los  consumidores  hacia    productos y marcas que provocan mayores respuestas afectivas (Aydinli, 2020).      1.1.4. Oído      Junto a las herramientas sensoriales anteriores, los expertos en marketing pueden  manipular los mensajes de comunicación dirigidos a los consumidores a través de la   megafonía  y  la  música,  como  un  elemento  atmosférico  en  la  tienda  (Reynolds- McIlnay  y  Morrin,  2019;  Biswas,  Lund  y  Szocs,  2019;  Roschk,  Loureiro  y  Breitsohl   2017). “La música, la voz humana y los sonidos en general aplicados al marketing no   deberían  ser  fruto  del  azar,  sino  una  herramienta  más  de  la  estrategia  del  negocio   (Manzano et al., 2012, p. 117).      Las  comunicaciones  dirigidas  al  consumidor  por  lo  general  suelen  aumentar  la   confianza  de  los  clientes  en  los  establecimientos  minoristas  (Guenzi,  Johnson  y    Castaldo  2009).  La  música  que  los  consumidores  escuchan  puede  cambiar  sus   percepciones  sobre  el  establecimiento  y  los  productos  que  se  comercializan.  Es    posible  actuar  sobre  algunos  elementos  musicales  como  a)  la  armonía  o  el  timbre    (Bruner  1990),  b)  la  frecuencia  que  a  menudo  se  percibe  como  el  tono  (Lowe  et  al.,  2018)  y  c)  la  amplitud  que  se  mide  en  decibelios  y  se  percibe  como  el  volumen  o  la    suavidad  del  sonido  (Krishna,  2013).  El  tratamiento  de  estos  elementos  auditivos  es    de  los  más  variado,  si  bien  algunos  establecimientos  utilizan  la  misma  música  para   todo  el  punto  de  venta  otros  prefieren  zonificar  la  superficie  de  venta  con  música    distinta dependiendo del tipo de producto (Cleaver, 2016; Haugh, 2016).      Los resultados respecto al comportamiento del cliente indican efectos divergentes  sobre la presencia de música en el punto de venta (Baumann y Gayer, 2017). Si bien   algunos  autores  informan  de  una  presencia  15  minutos  superior  del  consumidor  en    la  tienda  (Andersson  et  al.,  2012;  Sullivan,  2002)  otros  trabajos  no  identifican   diferencias significativas entre utilizar o no música (Wilson, 2003; North et al., 2003).      Algunos  autores  sugieren  que  poner  música  en  la  tienda  hace  que  los  clientes  se   sientan mejor, lo que los lleva a gastar más dinero (Baumann y Gayer, 2017), aunque  \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   468  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  esta  afirmación  no  es  apoyada  por  toda  la  comunidad  científica  (North  et  al.,  2015;   Milliman,  1982).  En  resumen,  investigaciones  anteriores  muestran  efectos  mixtos    provocados  por  diferentes  razones  como  el  diseño  de  la  música,  el  tipo  de    establecimiento o la relación entre la música, el consumidor y la tienda (Baumann y  Gayer, 2017).      1.1.5. Gusto     Desde  el  punto  de  vista  del  sector  detallista  la  experiencia  sensorial  derivada  del   sentido del gusto puede ser una herramienta comercial eficaz para conseguir atraer a  los  consumidores,  incrementar  las  ventas  y  conseguir  una  imagen  diferencial,   reforzando  la  vinculación  de  los  consumidores  con  la  enseña  y  sus  establecimientos    (Manzano  et  al.,  2012)  si  bien  esto  es  especialmente  relevante  en  aquellas  organizaciones  que  distribuyen  productos  de  alimentación.  En  el  caso  concreto  de    este estudio, que analiza el sector de la distribución de moda, apenas tiene influencia   por lo que se puede afirmar que se trata de una herramienta de marketing sensorial   que  no  implementan  estas  marcas,  salvo  casos  excepcionales  como  alguna  bebida  o    alimento (café, champagne, bombones...) que puedan ofrecer algunas tiendas de lujo   o algún tipo de caramelo que puedan ofrecer otros negocios.       2. OBJETIVOS       El objeto de estudio de la presente investigación es el sector  retail  de moda y, más  concretamente,  la  influencia  que  la  aplicación  de  las  técnicas  de  marketing  sensorial   por  parte  de  los  establecimientos  de  moda  del  grupo  Inditex  (Zara  y  Stradivarius)  tiene en el comportamiento de los consumidores.    Derivado de dicho objeto de estudio, el objetivo general del estudio es analizar el  efecto del marketing sensorial en el comportamiento de compra de los consumidores   de moda. Específicamente se analizará:  1.   La  importancia  que  las  técnicas  de  marketing  sensorial  tienen  para  los   consumidores  2.   La percepción que estos consumidores tienen frente a las distintas técnicas de  marketing sensorial implementadas en la tienda  3.   El  impacto,  desde  el  punto  de  vista  del  estado  de  ánimo  y  los  sentimientos,   que las acciones de marketing sensorial tienen en el consumidor  4.   El motivo principal por el que finalmente han realizado una compra      3. METODOLOGÍA      La  herramienta  metodológica  que  se  ha  usado  para  dar  respuesta  a  los  objetivos   que  se  han  marcado  es  la  técnica  cuantitativa  de  la  encuesta,  definida  por  López  y   Fachelli  (2016,  p.  8)  como  “una  técnica  de  recogida  de  datos  a  través  de  la   interrogación  de  los  sujetos  cuya  finalidad  es  la  de  obtener  de  manera  sistemática    medidas  sobre  los  conceptos  que  se  derivan  de  una  problemática  de  investigación   previamente construida” y que, en el caso concreto de esta investigación, permite la  \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   469  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  medición científica de este fenómeno social a través de la recolección de los datos de   una manera estandarizada a partir de una batería de preguntas, que siempre son las  mismas para todos los encuestados (Cea, 2012).     Para su puesta en práctica, se ha elaborado un cuestionario ad-hoc a partir de las  investigaciones  de  Manzano  et  al .   (2012),  Morgan  (2016)  y  Hervas,  Campo  y  Revilla   (2013).     Más específicamente, se definieron las siguientes variables de análisis:  1.   Nivel de importancia  2.   Efecto de la técnica en el consumidor  3.   Impacto en el consumidor  4.   Motivación de compra del consumidor    Para  recabar  las  respuestas  se  aplicó  un  muestreo  no  probabilístico  (de   conveniencia  por  accesibilidad).  Concretamente  se  seleccionaban  a  aquellos  clientes    de  más  de  16  años  que  salían  de  los  puntos  de  venta  objeto  del  estudio  (las  tiendas    Zara y Stradivarius situadas en el Centro Comercial Área Sur, en Jerez de la Frontera  (Cádiz))  y  que  tenían  que  cumplir  el  condicionante  de  haber  realizado  una  compra.    El total de personas que han respondido a dicha encuesta y que se configuran como   muestra  final  de  esta  investigación  es  de  140  personas  -total  de  personas  que,  el  día   elegido  para  visitar  el  establecimiento,  realizaron  una  compra  en  el  mismo  y    aceptaron  participar  en  el  estudio-  (70  para  Stradivarius  y  70  para  Zara)  y  que  se   distribuyen  de  la  siguiente  manera:  un  74%  de  mujeres  por  un  26%  de  hombres.  En   cuanto al tramo etario, el 73% tienen entre 16 y 30 años, el 17% entre 31 y 45 años, un   7% se sitúa entre los 46 y los 60 años y el 3% restante tenía más de 60 años. Hay que   señalar  que  las  diferencias  tanto  por  género  como  por  edad  entre  ambos   establecimientos no son significativas.       4. RESULTADOS       En  relación  al  grado  de  importancia  que  los  consumidores  conceden  a  la   aplicación  de  técnicas  de  marketing  visual,  en  general  coinciden  en  dar  mucha    importancia  a  aquellas  que  tienen  que  ver  con  el  producto  en  sí.  Esto  es,  tanto  la    distribución del mobiliario en la tienda y a la accesibilidad a la ropa como la calidad   y  diseño  de  los  productos  son  muy  importantes  para  los  clientes.  Lo  mismo  ocurre    con  el  orden  y  limpieza  del  establecimiento  y  el  trato  personal.  Por  el  contrario,  las   relacionadas con el marketing auditivo no tienen importancia para ellos. En cuanto al   resto  de  variables,  tanto  la  iluminación  como  el  aroma  son  consideradas  como    importantes durante el proceso de compra.     Si se profundiza en la valoración que hacen de la aplicación de estas técnicas en la  propia tienda y se relaciona con ese nivel de importancia los resultados son positivos.  Si  se  analizan  las  variables  consideradas  como  muy  importantes  (distribución  del   mobiliario,  calidad  y  diseño,  accesibilidad  a  las  prendas,  orden  y  limpieza  y  trato   personal)  el  efecto  que  producen  en  el  consumidor  de  Zara  y  Stradivarius  es  \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   470  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  satisfactorio o muy satisfactorio. En el caso del marketing auditivo, que resulta poco   importante  para  los  compradores,  tiene  un  efecto  neutro  en  Zara  si  bien  en    Stradivarius  es  muy  satisfactorio  para  el  indicador  género  musical  y  satisfactorio   para  el  volumen.  En  cuanto  al  resto  de  variables  estudiadas,  el  aroma,  si  bien  es    considerado como importante para el cliente de Zara, éste no provoca ningún efecto  en  él,  siendo  satisfactorio  en  el  caso  del  consumidor  de  Stradivarius.  Finalmente,  en   este análisis, destaca que la iluminación de los probadores de Stradivarius no es nada   satisfactoria,  si  bien  en  el  resto  de  zonas,  en  ambos  establecimientos,  ésta  es   adecuada.     Tabla 1:  Grado de importancia y efecto sobre el consumidor del marketing sensorial     Tipo de   técnica    Aspectos que   se evalúan    Grado de   importancia    Efecto predominante sobre el   consumidor (en función del   establecimiento)    ZARA   STRADIVARIUS    Marketing   visual   Color presente   en la tienda   Poco importante  Satisfactorio  Neutro   Iluminación de   estanterías y   expositores    Importante  Satisfactorio  Satisfactorio   Iluminación   del escaparate   Importante  Satisfactorio  Satisfactorio   Iluminación de   los probadores   Importante  Satisfactorio  Nada satisfactorio   Decoración   interior   Importante  Satisfactorio  Satisfactorio   Distribución   general del   mobiliario    Muy importante  Satisfactorio  Muy satisfactorio   Acceso a las   prendas sensorial que sí motivaron la compra destacan el  orden y la limpieza (39%), el trato personal (23,46%) y la distribución de las prendas   (16%).     5.  DISCUSIÓN      Los hallazgos derivados de esta investigación permiten ordenar la importancia de  las  técnicas  de  marketing  sensorial  aplicadas  en  Zara  y  Stradivarius  descubriendo    que  para  los  consumidores  de  estas  tiendas  el  marketing  háptico  o  tactil  es  el    elemento más importante, seguido del marketing visual, el olfativo y el auditivo. Los  datos  demuestran  que  sendos  establecimientos  están  perdiendo  la  oportunidad  de    explotar  las  posibilidades  que  brinda  la  comunicación  auditiva  dentro  del    establecimiento.  Esto  se  refiere  no  al  uso  de  música,  sino  a  la  posibilidad  de  enviar   mensajes  persuasivos  a  los  consumidores  que  alienten  el  consumo  de  un    determinado tipo de producto en un momento determinado.     Este  trabajo,  igualmente,  ha  demostrado  la  influencia  que  las  técnicas  de   marketing  sensorial  implementadas  en  Zara  y  Stradivarius  tienen  en  el   comportamiento  del  consumidor.  En  general  las  técnicas  de  marketing  visual    empleadas en Zara consiguen que el consumidor esté satisfecho. Los resultados en el  caso  de  Stradivarius  vienen  a  indicar  resultados  similares,  aunque  presentan  algo   más  de  dispersión.  En  ambos  casos  la  estrategia  de  marketing visual  en  el  punto  de    venta aún tiene margen de mejora ya que en ningún caso las herramientas empleadas   dejan al consumidor completamente satisfecho. En el caso del marketing auditivo, los   resultados  indican  que  la  labor  de  Stradivarius  sobre  este  sentido  es  mejor  que  la    realizada  en  el  establecimiento  comercial  de  Zara.  Es  posible  que  Zara  no  esté    aplicando  esta  técnica  de  marketing  sensorial  por  lo  que,  considerando  el  corpus  teórico,  estaría  perdiendo  la  oportunidad  de  mejorar  la  experiencia  del  consumidor   durante  el  proceso  de compra.  Es  decir,  estaría  desaprovechando  la  oportunidad  de   que el consumidor pase más tiempo en el establecimiento, gaste más dinero y tenga   más  confianza  en  el  mismo.  La  estrategia  de  marketing  olfativo  seguida  por   Stradivarius  también  parece  ser  más  valorada  que  la  empleada  por  Zara,    permitiendo  diferenciar  la  marca  de  sus  competidores,  lo  que  puede  producir  un   mayor recuerdo del producto y de la marca mejorando, además, las visitas a tienda.  En  el  caso  del  marketing  háptico  los  resultados  muestran  una  preferencia  por  la   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   472  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  estrategia  de  Zara  frente  a  Stradivarius.  Es  posible  que  los  consumidores  perciban   una mayor calidad en las prendas de Zara derivada de su textura, materiales usados  y diseño.       Al estudiar el estado de ánimo y los sentimientos provocados por las acciones de  marketing  sensorial  se  ha  encontrado  que  la  visita  a  la  tienda,  en  general,  provoca   satisfacción, tranquilidad y confianza entre los consumidores. Aspectos que resultan  fundamentales  para  reducir  la  disonancia  postcompra  y  mejorar  la  intención  de    revisita al establecimiento.      Por  último,  también  se  halló  que  los  principales  motivos  para  comprar  en  estos   establecimientos  son  el  precio  (variable  independiente  del  marketing  sensorial)  y  la   calidad del producto (variable vinculada a la estrategia de marketing háptico) y que,   y esto es lo relevante, el peso de ambos factores coincide en orden de importancia, lo  que  refleja  que  el  consumidor  que  compra  en  estos  establecimientos  no  está  únicamente  preocupado  por  el  precio.  También  es  importante  destacar  que  el  resto   de variables relativas al marketing de los sentidos no tienen mucho peso a la hora de  influir en la decisión de compra.     6. CONCLUSIONES     Las  principales  conclusiones  extraídas  de  la  literatura  parecen  mostrar  que  cada   vez  más  los  investigadores  y  las  empresas  son  conscientes  de  la  importancia  que    tiene  el  marketing  sensorial.  Esto  se  manifiesta  en  el  creciente  número  de   investigaciones  vinculadas  al  marketing  sensorial  que  recientemente  se  están    realizando.  Concretamente  los  trabajos  previos  se  suelen  centrar  en  uno  o  dos    sentidos  al  realizar  sus  investigaciones.  También  es  usual  encontrar  literatura  que   analiza el aspecto visual utilizando modernas metodologías como el  eye-tracking  o el  análisis  facial  y  diseños  experimentales  exploratorios  que  emplean  olores  o  incluso    sabores, dependiendo del contexto.     En el caso de la presente investigación, a través de la metodología de la encuesta,  se ha querido profundizar en el efecto que estimular todos los sentidos -salvo el del  gusto-  en  un  establecimiento  del  sector  de  la  moda  tiene  en  el  comportamiento  de   compra  de  los  consumidores.  Y  la  principal  conclusión  que  se  puede  derivar  del   estudio  es  que  aún  hay  margen  para  la  mejora  en  la  implementación  del  marketing    sensorial.  Si  bien  se  están  poniendo  en  práctica  aún  no  logran  influir  de  manera    decisiva  en  las  decisiones  de  los  compradores  y  aunque  afectan  al  estado  de  ánimo    de  manera  positiva,  siguen  siendo  el  precio  y  el  producto,  dos  de  las  4  variables    tradicionales  del  mix  de  marketing,  las  que  más  influyen  en  dicho  comportamiento    del consumidor, si bien es cierto que la calidad del producto se vincula a la estrategia  de marketing háptico.     En  definitiva,  aún  queda  un  largo  camino  por  recorrer  en  este  proceso  que  busca   crear  en  las  tiendas  físicas  del  sector  moda  experiencias  de  compra  que  generen,    como  apuntan  Medina  y  Quispe  (2019),  sensaciones,  sentimientos,  percepciones,   \nMarín Dueñas, P. P. y Gómez Carmona, D.   Comportamiento de compra y marketing de los sentidos: un análisis de su influencia en los  compradores de moda   473  Vivat Academia. Revista de Comunicación. 2021, nº 154, 459-479  exclusividad  y  personalización  que  hagan  que  el  consumidor  siga  prefiriendo  este   tipo de compra presencial frente a la compra  online.          7. REFERENCIAS      Andersson, P. K., Kristensson, P., Wästlund, E. y Gustafsson, A. (2012). Let the music   play  or  not:  The  influence  of  background  music  on  consumer  behavior.    Journal  of    retailing  and  consumer  services ,  19 (6),  553-560.   https://doi.org/10.1016/j.jretconser.2012.06.010       Aydinli,  A.,  Lamey,  L.,  Millet,  K.,  ter  Braak,  A.  y  Vuegen,  M.  (2020).   ¿Cómo   modifican  los  clientes  la  composición  de  su  cesta  cuando  perciben  que  la  tienda    está abarrotada? Un Estudio Empírico.  Revista de venta al por menor .      Bagchi, R. y Cheema, A. (2013).  The effect of red background color on willingness-to-  pay: the moderating role of selling mechanism.  Journal of Consumer Research ,  39 (5),   947-960.  https://doi.org/10.1086/666466       Barrios,  M.  (2012).  Marketing  de  la  Experiencia:  principales  conceptos  y    características.  Palermo Business Review ,  7 (1), 67-83.     Berčík,  J.,  Mravcová,  A.,  Gálová,  J.    y  Mikláš,  M.  (2020).  The  use  of  consumer    neuroscience  in  aroma  marketing  of  a  service  company.    Potravinarstvo  Slovak    Journal of Food Sciences ,  14 , 1200-1210.  https://doi.org/10.5219/1465       Bilek, M., Vietoris, V. y Ilko, V. (2016). Shelf life extension and sensory evaluation of   birch  tree  sap  using  chemical  preservatives.    Potravinarstvo  Slovak  Journal  of  Food    Sciences ,  10 (1), 499-505.     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {
        const hue = Math.floor(Math.random() * 360);
        const bg = hslToHex(hue, 45 + Math.floor(Math.random() * 20), 16 + Math.floor(Math.random() * 70));
        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,

        const question = questionInput.value.trim();
        if (!question || isProcessing) return;

        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
