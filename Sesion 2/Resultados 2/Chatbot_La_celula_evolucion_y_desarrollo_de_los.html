células  Todo lo expuesto antes es puramente especulativo ya que no   existen fósiles de las células primitivas. Se supone que la sín-  tesis  prebiótica  de pequeñas moléculas, la formación de RNA  autocatalítico y la traducción de las secuencias de RNA a los   primeros polipéptidos catalíticos tuvieron lugar hace 3 500 o   4 000 millones de años. Las primeras células debieron ser mucho menos comple- jas que las células más simples que hoy se conocen, los mico-  plasmas. Éstos son pequeños organismos parecidos a  bacterias ,  parásitos de células animales o vegetales. Tienen un tamaño   de 0.3 a 0.5 mm y organizan la síntesis de unas 750 proteínas   entre catalíticas y estructurales, algunas de las cuales están en   el interior de la célula, otras están alojadas en la membrana. A   pesar de su simplicidad, los micoplasmas sintetizan todas las   moléculas necesarias para su conservación y reproducción. Las células primitivas tenían una diferencia importante  con  el  micoplasma  actual:  la  información  genética  de  este    último está escrita en moléculas de DNA y en el caso de la   célula primitiva se utilizaba seguramente RNA. Ambos tipos   de ácidos nucleicos están presentes en la célula de hoy, pero   se utilizan con distintas fi nalidades. Se prefi ere el DNA, más   estable y con una doble hélice, para conservar y transmitir la   información genética, y el RNA se deja que cumpla la fun-  ción de dirigir la síntesis de proteínas (RNA mensajero) y de   catálisis (RNA ribosomal). En resumen, es muy probable que el RNA fuera el prime- ro en la evolución, con sus propiedades genéticas y catalíticas.   Una vez que la síntesis proteica se organizó, el DNA sustituyó   al RNA en las funciones genéticas, mientras las proteínas se   ocupaban  en  las  funciones  catalíticas.  El  RNA  se  mantuvo    como producto intermediario interconectando ambos. Con   toda seguridad, el DNA surgió cuando la creciente comple-  jidad de la información genética necesaria para la viabilidad   de la célula primitiva requirió una forma más estable que la   que podía ofrecer el RNA.  De la célula procariota   a la eucariota                            Células procariotas  Un hito importante en la historia de la evolución fue la apari-  ción de las primeras células  procariotas , células relativamente  Figura 1-13.      sencillas que se supone surgieron hace menos de 3 500 millo-  nes (fi g. 1-13). Las células procariotas son los organismos más sencillos  que se encuentran prácticamente en todos los ambientes na-  turales. Tienen una forma esférica o abastonada, y miden sólo   algunos micrómetros. En ocasiones poseen una pared celular   protectora por fuera de la membrana celular que engloba un   único compartimiento que contiene DNA, RNA, proteínas   y otras pequeñas moléculas. A veces disponen de fl agelos y de   organelos aptos para la  fotosíntesis . Las fotografías obtenidas  con microscopio electrónico de los organismos procarióticos   muestran una matriz de textura variable sin ninguna estructura   organizada. Estos  organismos  se  multiplican  por  división.  Cuando   las  condiciones  ambientales  son  adecuadas  (nutrimentos,    oxígeno,  temperatura,  etc.)  una  única  célula  procariota  se    puede dividir cada 20 minutos, con lo cual origina una po-  blación de unos 5 000 millones de individuos en 11 horas. Esta   capacidad de multiplicación es indicio de que las bacterias,   que son organismos unicelulares, se adaptan con rapidez al   ambiente.  Por  consiguiente,  en  condiciones  de  laboratorio,    se puede lograr que una bacteria experimente una mutación  \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      13  espontánea  y  evolucione  para  adaptarse  a  un  nuevo  azúcar    como fuente de carbohidratos, o bien, que se haga resistente   a determinado antibiótico. Las  bacterias  se  clasifi can  en  dos  grandes  grupos  de   acuerdo con su hábitat (fi g. 1-14): •  las  eubacterias,  que  viven  en  los  ambientes  normales   (suelo, agua, plantas y otros organismos superiores) •  las archaebacterias, que se han adaptado a vivir en condi- ciones sumamente adversas (fondo del mar, fuentes ter-  males, zonas ricas en gases sulfurosos, etc.)  A pesar de su relativa simplicidad (o quizás por ello), las  bacterias se alimentan con todo tipo de sustancias: azúcares   sencillos o complejos, grasas, proteínas, hidrocarburos, poli-  sacáridos,  etc.  Algunas  incluso  pueden  aprovechar  el  CO 2   como fuente de carbono y el N 2  como fuente de nitrógeno.  En  la  actualidad  son,  sin  duda  alguna,  los  habitantes  más    abundantes del planeta Tierra, han sobrevivido durante más   tiempo y probablemente son los que sobrevivirán más.  Reacciones metabólicas  Una bacteria que crece en un medio salino glucosado y que es   su única fuente de carbono lleva a cabo un enorme número de   reacciones químicas porque utiliza la glucosa como fuente de   energía, pero también construye a partir de este azúcar todas   las sustancias químicas que necesita para su desarrollo y mul- tiplicación. Todas estas reacciones químicas están vinculadas   entre sí a lo largo de la llamada cadena metabólica. En la célula primitiva, esta cadena metabólica no tenía  excesiva importancia, ya que la célula extraía las pocas molécu-  las necesarias para su subsistencia de la “sopa prebiótica”. Sin   embargo, al agotarse estos recursos naturales, los organismos   que tenían ventaja eran los que habían perfeccionado sistemas   enzimáticos  capaces  de  crear  las  moléculas  necesarias.  Por    eso existe la opinión de que la cadena metabólica aumentó   en complejidad hasta llegar a la presente en los organismos   actuales. Si  se  plantea  la  hipótesis  de  que  la  cadena  metabólica   evolucionó mediante sucesivos añadidos de pasos enzimáticos,   está  claro  que  las  reacciones  más  antiguas  deben  estar  más    próximas al “centro del tronco” metabólico, que es donde se   sitúan las reacciones más vitales, y, además, todas las células   vivientes  las  deben  compartir.  Este  tronco  metabólico  está    ocupado por la  glucólisis , proceso mediante el cual la glucosa  se degrada en forma anaerobia (en ausencia de oxígeno, dado   que la atmósfera primitiva no contenía oxígeno). La glucólisis   se verifi ca virtualmente en todas las células y produce  ATP  (trifosfato de adenosina) , la fuente más versátil de energía que  utilizan todas las células. Junto  a  estas  reacciones  de  los  fosfatos  de  azúcares  se   ejecutan  cientos  de  otras  reacciones:  mediante  algunas  se    sintetizan pequeñas moléculas que luego son utilizadas para   generar moléculas más complejas, otras son empleadas para   degradar  grandes  moléculas,  que  llegan  por  medio  de  los    alimentos,  en  moléculas  más  pequeñas.  Estas  reacciones    PROCARIOTA  ANCESTRAL ARCHAEBACTERIA EUBACTERIA bacterias anaeróbicas capaces  de vivir a altas temperaturas  (p.ej., bacterias sulfurosas)   bacterias capaces de vivir con   altas concentraciones de sal  (bacterias halófilas)   bacterias que reducen el  metano a CO2 (bacterias metanógenas)   bacterias grampositivas   bacterias verdes fotosintéticas   cianobacterias (algas azul-verdosas)   bacterias púrpura fotosintéticas   bacterias gramnegativas  espiroquetas  Figura 1-14.   Evolución de las células procariotas. \n14     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  metabólicas son comunes a todos los seres vivos. Evidente-  mente,  existen  diferencias:  algunas  especies  no  son  capaces    de producir determinadas sustancias (p. ej., el hombre y otros   animales superiores no pueden fabricar el aminoácido lisina,   que sintetiza cualquier bacteria), pero en general existe una   amplia concordancia de los procesos químicos de todos los   seres  vivos,  prueba  de  una  evolución  a  partir  de  una  célula    primitiva común.  Fotosíntesis   Si los primeros procesos metabólicos evolucionaron para llenar   el vacío de compuestos orgánicos de la “sopa prebiótica”, cabe   preguntarse qué pasó cuando se agotaron estos compuestos.   Está claro que los organismos capaces de utilizar como fuente   de carbono el CO 2  y como fuente de nitrógeno el N 2  atmos- férico tenían más ventajas de sobrevivir. Sin embargo, aunque   son muy abundantes en la atmósfera, ambos compuestos son   muy  estables,  por  lo  cual  se  requiere  mucha  energía  y  un    número elevado de reacciones para convertirlos en productos   sencillos, como azúcares o aminoácidos. En el caso de la captación del CO 2  se creó un mecanismo,  la  fotosíntesis,  mediante  el  cual  un  pigmento,  la  clorofi la,  capta la energía radiante procedente del Sol. La célula utiliza   posteriormente esta energía para sintetizar las moléculas que   necesita. Una  de  las  primeras  reacciones  que  induce  la  luz  solar   fue,  quizá,  la  fosforilación  de  los  nucleótidos  para  originar    el  ATP,  comodín  energético  de  las  células.  Otra  reacción    probable fue la reducción del CO 2  y del N 2  para permitir su  incorporación a moléculas orgánicas. La reducción —incor-  poración de electrones— se efectuó al inicio a partir del SH 2  y  luz solar, y después a partir de H 2 O y luz solar. Así empezó la  producción en gran escala del O 2 , como producto secundario  de la fotosíntesis. Las cianobacterias (también llamadas algas   azules) son microorganismos actuales capaces de fi jar el CO 2  y  el N 2  de la atmósfera, y quizás sean los organismos más auto- sufi cientes que existan ya que, en principio, pueden vivir sólo  de agua y luz solar. Junto con otros organismos que tienen estas   propiedades, las cianobacterias, que se mantienen constantes   desde hace miles de millones de año, crearon las condiciones   idóneas para que otros organismos pudieran evolucionar con   mayor facilidad.  Respiración  Por ser el oxígeno una sustancia altamente reactiva, debió resul-  tar tóxica para los organismos primitivos, de la misma manera   que actualmente es tóxica para los microorganismos anaero-  bios. Por esta razón y para aprovechar su energía química, las   células  primitivas  aprendieron  a  utilizar  este  elemento  para    mejorar los procesos de degradación de las moléculas alimen-  ticias. La glucosa, en ausencia de oxígeno, se descompone en   ácido láctico o etanol (y produce dos moléculas de ATP), pero   en presencia de oxígeno se degrada a CO 2  y H 2 O y produce 36  moléculas de ATP. La célula utiliza la energía producida en   este proceso, denominado respiración, para su metabolismo y   producción de nuevas moléculas de la misma manera que con   la fotosíntesis se obtiene ATP en los organismos fotosinté-  ticos. La mayor parte de los organismos, incluso casi todos los   procariotas, emplean hoy el proceso de la respiración.  Glucólisis   La ruta glucolítica (o vía de Embden—Meyerhoff ) consiste en    la degradación anaeróbica de la glucosa a lactato. Para muchos   tejidos, la glucólisis representa una ruta metabólica de urgen-  cia, capaz de producir dos moles de ATP a partir de una mol   de glucosa en ausencia de oxígeno molecular (fi g. 1-15).  La célula eucariota                 La célula eucariota tiene en la actualidad una estructura orga-  nizada. A medida que la atmósfera se enriquecía con oxígeno,   pereció una parte de las células primitivas que no pudieron   adaptarse  a  estas  nuevas  condiciones.  Otras  desarrollaron    una  capacidad  para  respirar,  o  bien,  tuvieron  que  ocultarse    en  lugares  donde  el  oxígeno  estaba  ausente  para  conservar    su condición de anaerobias. Sin embargo, una tercera clase   descubrió que si se unía en simbiosis con una célula aerobia   podía sobrevivir y desarrollarse de un forma mucho más rica.   Ésta es la hipótesis más viable para la organización metabólica   de las células eucariotas de hoy día que se estudia en detalle   más adelante (cuadro 1-1). Por  defi nición  y  en  contraste  con  las  células  procari- otas, las células eucariotas tienen una estructura organizada   y disponen de un cierto número de organelos. En particular,   tienen  un  núcleo,  separado  del  resto  de  la  célula  mediante    CH 3  CH 2 OH H  O OO C OH2 OH OH OH OH C  d-Glucosa- α   l-Lactato  2ADP 3–   2ADP 4–  +2Pi 2–  Figura 1-15.   Esquema simplifi cado de la glucólisis. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      15  una membrana nuclear, que es casi por completo de DNA.   El resto de la célula está constituido por el citoplasma, lugar   donde se realiza la mayor parte de las reacciones metabólicas  y donde se encuentra un cierto número de organelos. Éstos   se tratan con mayor detalle más adelante; entre ellos destacan   (fi g. 1-16):  Vesícula Lisosoma Membrana plasmática  Microfilamento  Citosol  Retículo endoplásmico  Mitocondria  Polisoma  Microtúbulo  Núcleo  Membrana nuclear  Ribosoma  Flagelo  Peroxisoma  Aparato de Golgi  Figura 1-16.  Cuadro 1-1.   Teorías que explican la evolución de las células eucariotas. (Gupta,  et al.  TIBS, 1996;2:166-171.  Teorías sobre el origen de la célula eucariota  Se propone el origen simbiótico de la célula eucariota   Mereschkowsky   1905 Origen endosimbiótico de las mitocondrias, cloroplastos, citoesqueleto y del núcleo a partir de    grupos específi cos de bacterias. Margulis   1970 Origen independiente de las  archaebacteria ,  eubacteria  y  eucariotas  a partir de un ancestro  universal. Woese   1981 Suposición de que el núcleo podría ser una especie de  Archaebacteria .   Lake,  et al.   1982 Se propone la evolución de la célula eucariota a partir de una célula intermedia entre   archaebacteria  y una bacteria gramnegativa. Es opuesta al origen endosimbiótico del núcleo Cavalier-Smith   1987 Evolución directa del genoma nuclear de los eucariotas a partir de una archaebacteria ancestral.   Iwabe,  et al  Gogarten,  et al   Woese,  et al  1989  1989   1990 La evolución de la célula  eucariota  a partir de un linaje protoeucariota, que presentaba metabolismo  basado en RNA, que engulló a las células procariotas ( archaebacterias ) Hartman   Sogin 1984   1991 La posibilidad de que el genoma nuclear de las células eucariotas esté formado químicamente por   una fusión primaria de una  archaebacteria  y una  eubacteria . Zillig   1991 El grupo eocito de archaebacteria fue señalado como el grupo más próximo a los  eucariotas .   Rivera y Lake   1992 \n16     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  •  mitocondrias y cloroplastos   •  retículo endoplásmico liso (fi no) y retículo endoplásmico  rugoso (grueso) •  aparato de Golgi  •  ribosomas  •  lisosomas y peroxisomas  •  citoesqueleto  •  vacuolas  •  fl agelos Una  membrana  más  o  menos  organizada  rodea  la  cé- lula  eucariota,  como  las  procariotas;  dicha  membrana  está    constituida  fundamentalmente  por  fosfolípidos  y  proteínas    específi cas que tienen diferentes funciones. Al parecer, las  mitocondrias  evolucionaron a partir de algún  organismo procariota que se unió en simbiosis con algún otro   organismo primitivo anaerobio. En efecto, en muchos aspectos,   las mitocondrias se parecen a los organismos procariotas:   •  tienen un tamaño y forma parecidos   •  se multiplican por división  •  contienen su propio DNA  •  el  proceso  de  respiración  se  efectúa  exclusivamente  en   ellas •  muchas  bacterias  actuales  respiran  igual  que  las  mito-   condrias   Mediante esta simbiosis, primitivos eucariotas anaerobios  podrían haber sobrevivido en un ambiente cada vez más rico   en oxígeno, utilizando la capacidad del procariota asociado   para  producir  energía  mediante  el  consumo  de  oxígeno  at-  mosférico. La  adquisición  de  mitocondrias  tuvo,  sin  duda,  im- portantes repercusiones. Al ocuparse sólo de la respiración,   permitió que la membrana se especializara en otras funciones,   a diferencia de lo que ocurre en los procariotas; en éstos se   debe conservar un  gradiente importante de H +  en la membrana  plasmática para producir ATP. Por consiguiente, la membrana   eucariota pudo crear canales iónicos y otros organelos —re-  ceptores— especializados en el intercambio de señales.  Los  cloroplastos  llevan a cabo la fotosíntesis de la misma  manera que las cianobacterias: absorben la luz solar con la clo-  rofi la que existe en sus membranas. También los cloroplastos  manifi estan similitudes notables con las cianobacterias:   •  son similares en forma y tamaño   •  las membranas en las que se encuentra la clorofi la están  dispuestas en capas •  se reproducen por división  •  contienen DNA con secuencias muy parecidas al DNA  bacteriano  Todo  ello  apunta  a  que  los  cloroplastos  evolucionaron   a  partir  de  las  cianobacterias  que  se  unieron  en  simbiosis  a    alguna  célula  eucariota  primitiva.  Este  tipo  de  simbiosis  es    relativamente frecuente y, en la actualidad, se conocen células   eucariotas que tienen auténticas cianobacterias en su interior.   La teoría de la evolución de los eucariotas a partir de la hipó-  tesis simbiótica se ilustra en la fi gura 1-17.  Teoría actual de la   endosimbiosis como origen   de la célula eucariota              La  célula  eucariota  se  distingue  también  por  una  red  pro-  teica, el citoesqueleto, que sitúa y desplaza los organelos en   la célula. Todos los vegetales, los hongos y los animales son   eucariotas. Su DNA está en uno de los organelos, el núcleo.   Además del retículo endoplásmico y el complejo de Golgi,   que intervienen en la síntesis de ciertas proteínas, los otros   dos  compartimientos  que  desempeñan  un  papel  sustancial    ya que suministran energía a la célula son las mitocondrias   Archaebacteria   Otras eubacterias Bacterias   púrpuras  sufurosas Cianobacterias   Plantas   Hongos   Animales  Procariota ancestral  Procariota ancestral  anaerobio Eucariota  ancestral Mitocondrias Cloroplastos  Figura 1-17.   Teoría simbiótica de la evolución de los eucariotas. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      17  (del griego  mitos , fi lamento, y  khondros , grano), las cuales se  ocupan de la respiración celular, y los plastos de los vegetales,   donde tiene lugar la fotosíntesis o conversión de la energía   luminosa en energía química. Algunos  organelos  pueden  desaparecer  y  volverse  a   formar.  Es  el  caso  del  núcleo  durante  la  división  celular,    del aparato de Golgi y del retículo. Pero las mitocondrias y   los plastos proceden siempre de la división de mitocondrias   y  plastos  preexistentes.  A  fi nales  del  siglo  XIX,  esta  par-  ticularidad hacía pensar ya en bacterias que se dividían por   bipartición en el citoplasma. Las mitocondrias y los plastos   eran organismos vivos, instalados en simbiosis en la célula.   En 1883, el investigador alemán A. Schimper observó : “Si se  establece defi nitivamente que los plastos nunca se forman de novo   en la célula huevo, entonces su situación en la célula donde se en-  cuentran recuerda la de los simbiontes. Es posible que una planta   verde no sea otra cosa que la unión entre un organismo incoloro y   un microbio que posee los pigmentos clorofílicos.”  Otros autores  le pisaron los talones a principios del siglo XX, pero toparon,   lamentablemente, con la incredulidad de sus colegas. Ocurrió   como con la  deriva de los continentes  de Alfred Wegener: los  argumentos propuestos no bastaron para afi anzar la intuición.  En particular, fracasaron todos los intentos de aislamiento y   cultivo  in vitro  del  microbio verde . Varios autores propusieron  para estos organelos un origen  autógeno  a partir de repliegues  de la membrana plasmática. Los progresos de la biología iban   a brindar otros argumentos a la idea según la cual las mito-  condrias y los plastos derivan de bacterias. La microscopia electrónica demostró que los organelos  de los eucariotas están limitados por una membrana lipídica   simple, salvo tres de ellos: el núcleo, rodeado por membranas   provistas de poros que lo ponen en continuidad con el citoplas-  ma, y los plastos y las mitocondrias, separados del citoplasma   por dos membranas continuas. Además, la organización de la   estructura de estos dos últimos organelos evoca la de ciertas   bacterias. Por ejemplo, las membranas fotosintéticas o  tilac- oides  de los plastos de ciertas algas (las algas rojas) evocan en  gran  medida  a  los  tilacoides  de  bacterias  fotosintéticas,  las    cianobacterias.  Los  adelantos  de  la  bioquímica  pusieron  de    manifi esto otros parecidos sorprendentes. Los lípidos de las  membranas que rodean a las mitocondrias existen en ciertas   bacterias, pero no en otras partes de la célula eucariota. En   cuanto a los lípidos característicos de las membranas de los   plastos,  se  les  encuentra  en  las  cianobacterias.  Además,  las    mitocondrias  y  los  plastos  desempeñan  ciertas  funciones    metabólicas que efectúan también ciertos procariotas libres.   La fotosíntesis se consuma de manera casi idéntica en las ci-  anobacterias y los plastos. Las reacciones de oxidorreducción   ligadas a la actividad energética de las mitocondrias y de los   plastos  requieren  la  intervención  de   cadenas  de  transferencia   de electrones  membranosas parecidas a las de los procariotas:  colaboran en ellas unas complejas proteínas homólogas, como   los citocromos. Pero el argumento principal fue el descubrimiento de un  genoma en los plastos en 1962 y luego en las mitocondrias   al año siguiente. Este DNA se parece al de los procariotas:   no  está  aislado  dentro  del  organelo  y  se  presenta  en  forma    de varias copias idénticas de una molécula circular. El DNA   se duplica y se transfi ere durante la bipartición del organelo  como en el caso de los procariotas libres. En las mitocondrias   y los plastos existen ribosomas que sintetizan proteínas y son   más pequeños que los del citoplasma de la célula. De hecho,   tienen el tamaño y la composición del RNA de los ribosomas   de los procariotas. Por todas estas razones, la hipótesis del origen simbiótico  de las mitocondrias y de los plastos halló adeptos en los años   1970, como Lynn Margulis, de la Universidad de Amherst   (Massachusetts), y Sarah P. Gibbs, de la Universidad McGill   en Montreal. La biología molecular subrayó todavía más el   parentesco entre estos organelos y los procariotas. Es el caso,   por ejemplo, de las zonas promotoras de los genes, es decir,   de las secuencias reconocidas para proteínas que aseguran su   transcripción  en  RNA.  Se  descubrieron  actualmente  genes    homólogos (que tienen el mismo origen evolutivo) de genes   bacterianos en el genoma de las mitocondrias y de los plas-  tos. Sería sorprendente encontrar bacterias en el citoplasma   de  eucariotas.  En  realidad,  semejante  modo  de  vida  no  es    raro  entre  los  eucariotas:  se  le  designa  endosimbiosis.  Este    modo  de  vida  es  el  de  ciertos  microorganismos  patógenos,    como la bacteria causante de la listerosis o de la fi ebre tifoi-  dea.  Pero  también,  el  de  numerosos  animales  unicelulares,    los  protozoarios,  que  son  colonizados  por  varias  bacterias.    Kwang W. Jeon, de la Universidad de Tennessee, describió   la aparición de una endosimbiosis entre las amebas, a raíz de   una infección que diezmó un cultivo de laboratorio en 1966.   Algunas amebas sobrevivieron a la presencia de bacterias en   su citoplasma: veinte años más tarde, todavía contienen unas   42 000 bacterias por célula. Pero hay más: esta asociación se   ha vuelto forzosa. Las amebas ya no pueden sobrevivir si se   da muerte a sus compañeros citoplasmáticos aumentando la   temperatura. Otro ejemplo clásico: las plantas de la familia   de  las  leguminosas  (trébol,  guisante)  poseen  en  sus  raíces    unos  nódulos  cuyas  células  albergan  bacterias  del  género    Rhizobium .  Estas  bacterias,  llegadas  del  suelo,  ayudan  a  la   planta a alimentarse fi jando el nitrógeno atmosférico. Estos   microorganismos unicelulares están rodeados siempre por dos   membranas: la membrana interna, que es la de la bacteria, y la   membrana externa procedente de la membrana plasmática del   hospedero, que rodea a la bacteria durante su penetración en   la célula. No obstante, el origen de la membrana externa de   las mitocondrias y los plastos es objeto de controversia (en el   caso de los plastos, contiene lípidos de tipo procariota y sería   de origen mixto). ¿Cuántos sucesos de endosimbiosis han tenido lugar en  el curso de la evolución? ¿Cuáles son los procariotas actuales   más próximos a los que viven en endosimbiosis? La biología  \n18     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  molecular actual puede empezar a responder estas preguntas   gracias  a  la  comparación  de  los  genes  de  los  organelos  con    los  genes  homólogos  de  los  procariotas.  Las  secuencias  de    los genes se alinean y luego se comparan visualmente o por   medio de programas de computadora que descubren paren-  tescos en forma de árboles fi logenéticos. Se averigua así que  las  mitocondrias  forman  un  grupo  homogéneo:  todas  ellas    descenderían de una bacteria ancestral única. Se supone que   un solo suceso de endosimbiosis se produjo en un antepasado   de la mayoría de los eucariotas actuales. Se  conocen  descendientes  directos  de  estos  eucariotas   primitivos,  como  el  parásito  intestinal   Giardia .  Trabajos   recientes  indican  que  el  ancestro  de  las  mitocondrias  es    parecido a un grupo de bacterias que usa oxígeno y que en-  globa, entre otros, al agente de la fi ebre tifoidea,  Rickettsia , y  a varias bacterias simbióticas de artrópodos. Las bacterias de   este grupo comparten varios caracteres con las mitocondrias,   como la vida intracelular obligatoria, la utilización de oxígeno   y la producción de una pequeña molécula de transferencia de   energía, el ATP (trifosfato de adenosina), por medio de una   vía metabólica llamada ciclo de Krebs. Tal vez, las mitocondrias se consolidaron hace 2 000 o 3  000 millones de años, en el periodo precámbrico, lo cual con-  stituye una etapa fundamental para los eucariotas. Esta etapa   supone la ventaja de la respiración celular: sin mitocondrias,   la célula eucariota no puede utilizar el oxígeno para oxidar los   azúcares y producir su energía. Es posible incluso que los eucari-  otas primitivos fueran sensibles al oxígeno, como lo son en la   actualidad los eucariotas carentes de mitocondrias. Las primeras   mitocondrias, al consumir el oxígeno, pudieron desempeñar el   papel de protector ante las células que las albergaban: el oxígeno   genera  derivados  tóxicos  para  las  células  que  no  poseen  las    enzimas necesarias para inactivarlos. En  la  actualidad,  son  raros  los  eucariotas  desprovistos   de  estos  organelos:  dicha  endosimbiosis  parece  haber  sido    determinante para el éxito evolutivo de los eucariotas. Más tarde, ciertos eucariotas que originaron los diversos  linajes  de  vegetales  habrían  logrado  conformar  los  plastos,    tal vez hace alrededor de 1 200 o 2 000 millones de años. La   diferencia entre estos linajes son los pigmentos fotosintéticos   que utilizan para captar la energía luminosa. Ya se menciona-  ron las algas rojas. Su equipo pigmentario recuerda el de las   cianobacterias (clorofi la a y fi cobilisomas que les dan su color   rojo). Se distinguen también los vegetales verdes, que agrupan   las algas verdes y sus descendientes, los vegetales terrestres:   carecen de pigmentos proteicos rojos, pero están dotados de   clorofi la tipo  a  y  b . La información molecular indica que los  plastos verdes y rojos habrían surgido a partir de un mismo   linaje. Las cianobacterias actuales son, a menudo, simbióticas y   se unen a hongos, helechos o, incluso, viven en endosimbiosis   en protozoos o esponjas, por ejemplo. Lo que puede sorprender, en cambio, es que el equipo  pigmentario  de  los  plastos  verdes  es  muy  distinto  al  de  las   cianobacterias. La pérdida de los fi cobilisomas y la producción  de la clorofi la  b  se produjeron varias veces en las cianobacterias  durante su evolución. En 1975, Ralph A. Lewin, de la Uni-  versidad de Yale, descubrió  Prochloron , un procariota carente  de fi cobilisomas pero que posee clorofi la  b . Desde entonces se  han descubierto otros organismos parecidos y se ha propuesto   crear para ellos el grupo de los  proclorofi tos . Pero la información  molecular  indica  que,  en  realidad,  estos  organismos  apare-  cieron en diversas ocasiones entre las cianobacterias y forman   linajes diferentes, sin ninguna relación con los plastos de los   vegetales verdes. Si bien los ancestros de los plastos rojos y   verdes son próximos, por no decir idénticos, parece probable   que en el origen de las algas rojas y las plantas verdes hubiera   dos hospederos eucariotas diferentes. En ciertas algas, los plastos presentan la impensada par- ticularidad de estar rodeados no de dos, sino de cuatro mem-  branas.  ¿Cómo  explicarlo?  Estas  algas  pertenecen  al  grupo    de las heterocontas: comprende las algas pardas de las costas   mexicanas, como el fucus, pero también las microscópicas di-  atomeas. Su plasto  pardo , distinto de los plastos verdes y rojos,  posee las clorofi las de tipos  a  y  c . Entre la segunda y tercera  membranas,  un  espacio  citoplasmático  contiene  vesículas  y    microtúbulos. ¿Cómo aparecieron estos plastos especiales? Un   pequeño grupo de algas unicelulares, las criptofi tas, atrajo la   atención: estas algas también están provistas de plastos rodea-  dos de cuatro membranas. Pero en el espacio entre la segunda   y la tercera membrana hay ribosomas de tipo eucariota y un   organelo curioso, el nucleomorfo, que evoca un núcleo redu-  cido que contiene DNA. Sarah P. Gibbs planteó la hipótesis   de una segunda endosimbiosis para explicar estos plastos de   cuatro membranas. Entonces, el plasto comprende, del ex-  terior al interior, una membrana de secuestro del hospedero   secundario, la membrana plasmática de un alga asimilada y   luego las dos membranas del plasto de esta última. De hecho, las algas unicelulares tienen la capacidad de  desarrollarse perfectamente en el citoplasma de otros eucari-  otas, por ejemplo, en las células de los animales que edifi can  los corales y las anémonas de mar de las costas mexicanas. Las   algas en cuestión, ciertas dinofl ageladas, existen también en   forma libre y son todavía reconocibles a la perfección. Tales   estados intermedios pudieron originar asociaciones más es-  trechas, como en las criptofi tas y en las algas heterocontas.   El  DNA  del  nucleomorfo  de  las  criptofi tas  contiene  genes    que corresponden a los RNA de los ribosomas que lo rodean.   El genoma del nucleomorfo está formado por tres pequeños   cromosomas. Estos genes son parecidos a los de las algas rojas,   y  los  genes  ribosómicos  del  núcleo  de  la  célula  hospedera,    la  criptofi ta,  hacen  que  ésta  esté  más  emparentada  con  los    vegetales verdes (fi g. 1-18). Las  algas  heterocontas,  por  su  parte,  también  habrían   integrado  un  alga  roja,  la  cual  habría  sufrido  una  regresión    mayor. Los trabajos acerca del genoma procariótico contenido   en el seno de los plastos pardos muestran la fi liación de éste  \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      19  con respecto a los plastos de algas rojas. En el transcurso de la   evolución, el alga roja asimilada habría perdido sus pigmentos   rojos y adquirido la clorofi la  c , con lo cual se convirtió en un  plasto pardo característico. Otros  organismos  pudieron  adquirir  plastos  por  en- dosimbiosis secundaria. Esto resuelve la vieja paradoja de las   Euglena . Los manuales presentan a estos protozoarios como  mitad animales (ya que las  Euglena  son fl agelados y pueden  fagocitar  presas  o  restos)  y  mitad  vegetales  (pues  poseen    plastos  con  los  mismos  pigmentos  que  los  de  los  vegetales    verdes). En realidad, como se demuestra al comparar los genes   de  los  plastos  (fi g.  1-19),  se  trata  efectivamente  de  plastos    de vegetales verdes. No obstante, las  Euglena  son eucariotas  primitivos muy cercanas a los tripanosomas. Pudieron adquirir   sus plastos a partir de un alga verde, presa o endosimbionte. Numerosos ejemplos actuales ponen de manifi esto fases  intermedias en las endosimbiosis, tanto primarias como se-  cundarias. De hecho, el aprendizaje de la vida en común tiene   numerosas exigencias. El encuentro de los participantes es la   primera fase, que no necesariamente representa ventaja para   los dos. Las mitocondrias derivan, tal vez, de bacterias pató-  genas endosimbióticas, como las bacterias actuales causantes   de la listerosis o de la fi ebre tifoidea. Por lo que se refi ere a  las cianobacterias, fueron tal vez presas antes de convertirse   en  plastos.  En  una  segunda  fase,  el  vínculo  puede  volverse    más duradero. Puede signifi car una ventaja para un eucariota   cazador de cianobacterias aprovechar algún tiempo la foto-  síntesis  de  su  presa  antes  de  digerirla,  o  bien,  criarla  en  su    citoplasma. Cuando la relación es permanente, es necesario   un  control  recíproco  sobre  la  multiplicación  de  cada  socio   para la supervivencia del organismo quimera formado. Queda   abierto  entonces  el  camino  para  una  evolución  conjunta  (o    coevolución) de los socios, y pueden establecerse intercambios   recíprocos. Para el endosimbionte, la vida en el interior de la célula  es en extremo confortable; es el hospedero el que soporta las   agresiones del medio externo. Este hábitat protegido explica   la  desaparición  de  las  envolturas  protectoras;  en  los  plastos    con dos membranas ya no quedan huellas de la pared de las   cianobacterias.  La  regresión  de  la  pared  también  ha  sido    descrita en algas eucariotas unicelulares endosimbióticas ac-  tuales. Pero la evolución regresiva más curiosa es, en verdad,   la reducción del genoma de los organelos con respecto a las   formas libres en el transcurso de la evolución (véase cuadro   1-2) .  Ya desapareció el núcleo del alga roja que asimilaron las  algas heterocontas de plastos pardos; el tamaño del genoma   de tipo procariota que está contenido en los organelos es entre   diez y cien veces más pequeño que el de los procariotas libres.   Por  supuesto,  ya  desaparecieron  todos  los  genes  necesarios    para orientarse, desplazarse y protegerse en el medio exterior,   Figura 1-18.      Mitocondrias de animales  Mitocondrias    de hongos   Vaca   Erizo   Mitocondrias de  plantas MaízCachliabalus Aspergillus Padospora Acanthamoeba  (protozoos) Pylalello  (alga parda) TabacoAnagra Marchantia  (hopatica)Prototheca  (alga verde) Chondrus  (alga roja) Rhodospirillum  rubrum Mitocondrias Protobacterias Escherichia  coli Synechocystis Anabaena Antilharmnion  (alga roja) Odontella  (diatomea) Euglena   Marchantia  (hepatica) Guisante Maíz Cianobacterias Plastos  Figura 1-19.     \n20     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  pero otros siguen existiendo: simplemente fueron transferidos   al núcleo de la célula hospedera mediante un proceso que se   empieza a entrever gracias al estudio reciente de Brennicke y   colaboradores (cuadro 1-2). En el curso de la evolución, muchos genes procedentes  de los plastos y las mitocondrias migraron hacia el núcleo de   la célula que los albergaba; aunque son nucleares, estos genes   tienen, entonces, un origen evolutivo procariota. Estas transferencias sellan la asociación y son la razón de  que  no  se  puedan  cultivar  de  modo  aislado  los  organelos,  los    cuales se volvieron por completo dependientes de su hospedero.   La simbiosis se volvió forzosa y los socios forman un nuevo or-  ganismo quimérico. Unas regulaciones acoplan la expresión de   ambos genomas, y participan en el buen funcionamiento de la   nueva unidad fi siológica. La célula eucariota esconde tal vez otras   endosimbiosis. Es el caso de los peroxisomas, unos organelos que   intervienen en ciertas reacciones metabólicas como la fotorrespi-  ración y las peroxidaciones. Estos organelos están limitados por   una simple membrana, carecen de DNA y aparecen siempre por   bipartición. Algunos científi cos los consideran como endosim-  biontes cuyo genoma fue transferido del todo al núcleo. Por tanto, la endosimbiosis infl uyó profundamente en la  evolución de los eucariotas y les facilitó la consecución de las   potencialidades metabólicas de los procariotas. Este fenómeno   acompañó varias veces la fundación de linajes evolutivos en   los  eucariotas  (fi g.  1-20).  Se  complementan  las  potenciali-  dades morfogenéticas de los eucariotas (citoesqueleto, paso   al estado pluricelular, entre otros) y la ingeniería enzimática   (fi jación del carbono o del nitrógeno, respiración, etc.) de los  procariotas, los cuales, aunque a menudo asimilados, nunca   albergan simbiontes.   Los  sucesos  de  endosimbiosis  parecen  haber  sido  bas- tante  numerosos,  en  ocasiones  sucesivos,  y  originaron  los    plastos de cuatro membranas. En la actualidad, ciertas algas   unicelulares, las criptofi tas y las heterocontas, cuyo plasto de   cuatro membranas deriva, recuérdese, de una endosimbiosis   secundaria, viven en simbiosis en el citoplasma de dinofl age- lados que perdieron sus propios plastos. Se trata entonces de   tres endosimbiosis sucesivas.  Estructura celular                  Las células son estructuras con muy buena organización en   su interior; están constituidas por diferentes organelos, y cada   uno de ellos cumple funciones diferentes. Sin embargo, todas   las células eucariotas, que son las de todos los seres vivos con   excepción de las bacterias, cuyas células son mucho más sencil-  las, comparten un plan general de organización:    •  Una membrana que determina su individualidad    •  Un núcleo que contiene el material genético y ejerce el  control de la célula   Cuadro 1-2.   Reducción del endosimbionte  Organismo   Número  total  de genes Tamaño del genoma  (en pares de bases)   Cianobacterias libres   > 5 000   de 1 a 10 millones  Porphyra  Alga roja   210   183 000  Cryptomonas   Criptofi ta 140   112 000  Oryza  (arroz)   110   114 000  Nicotiana  (tabaco)   113   131 000 Tamaño de los genomas procariotas contenidos en los   plastos de distintos grupos de vegetales comparado con   las cianobacterias libres. En el transcurso de la evolución,   numerosos genes de los plastos se transfi rieron al núcleo del   hospedero eucariota.  Adaptado de Douglas SE, et al. Nature, 1991;350:148.  protistos clorobiontes  heterocontas  rodobiontes alveolobiontes plantas    terrrestres   algas verdes   rizópodos criptófitas  (núcleo) oomicetos  (seudohongos)   criptófitas   (nucleomorfo)  algas rojas diatomeas  y algas pardas   esporozoos  (plasmodium)  dinoflagelados  ciliados     (paramecios)   distintos grupos   de protozoos (amebas)   tripanosomas  Figura 1-20.   Antepasados comunes con los procariotas. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      21  •  Un  citoplasma  lleno  de  organelos,  dónde  se  ejecutan   prácticamente todas las funciones.   La fi gura 1-21 es un dibujo esquemático de una célula  eucariota animal y de otra vegetal. La célula está rodeada por una membrana, denominada  “membrana plasmática”. La membrana delimita el territorio   de  la  célula  y  controla  el  contenido  químico  de  la  misma.    Lípidos, proteínas y glúcidos forman parte de la composición   química de la membrana, en proporciones aproximadas de 40,   50 y 10%, respectivamente, de acuerdo con la célula u organelo   que cubra. En la membrana interna mitocondrial hay hasta   85% de proteínas, y en el sistema nervioso, sólo 15%. El tipo   de lípidos también varía entre células. Los lípidos forman una   capa doble y las proteínas se disponen de una manera irregu-  lar y asimétrica entre ellos. Estos componentes son móviles,   lo que confi ere a la membrana un elevado grado de fl uidez.  Por el aspecto y comportamiento el modelo de membrana se   denomina “modelo de mosaico fl uido”. Las funciones de la membrana se resumen en:  •  transporte,  que  es  el  intercambio  de  materia  entre  el   interior de la célula y su ambiente externo. •  reconocimiento  y  comunicación,  gracias  a  moléculas   situadas en la parte externa de la membrana, las cuales   actúan como receptores de sustancias.  Transporte a través de membranas  La bicapa lipídica de la membrana actúa como una barrera   que separa dos medios acuosos: el medio donde vive la célula   y el medio interno celular. Las  células  requieren  nutrimentos  del  exterior,  deben   eliminar sustancias de desecho procedentes del metabolismo  y mantener su medio interno estable. La membrana manifi - esta una permeabilidad selectiva, ya que permite el paso de   pequeñas moléculas, siempre que sean lipófi las, pero regula   el paso de moléculas no lipófi las. El paso a través de la membrana posee dos modalidades,  una pasiva, sin gasto de energía, y otra activa, con consumo   de energía.  Transporte pasivo  Es un proceso de difusión de sustancias a través de la mem-  brana. Se produce siempre a favor del gradiente, es decir, del   ambiente donde hay más hacia el medio donde hay menos.   Este transporte se efectúa por difusión simple.  Difusión simple  Es  el  paso  de  pequeñas  moléculas  a  favor  del  gradiente;  se    puede  producir  a  través  de  la  bicapa  lipídica  o  a  través  de    canales proteicos.   1.  Difusión simple a través de la bicapa. De este modo en- tran moléculas lipídicas como las hormonas esteroides,    anestésicos como el éter y fármacos liposolubles, así como   sustancias apolares como el oxígeno y el nitrógeno atmos-  férico. También algunas moléculas polares muy pequeñas,   como el agua, el CO 2 , el etanol y el glicerol, atraviesan  la membrana por difusión simple. La difusión del agua   recibe el nombre de ósmosis. 2.  Difusión simple a través de canales. Se realiza mediante  las  denominadas  proteínas  de  canal.  Así  entran  iones    como el Na + , K + , Ca 2+ , Cl — . Las proteínas de canal son  proteínas  que  forman  un  orifi cio  o  canal  interno,  cuya    apertura está regulada, por ejemplo por ligandos, como   Núcleo Membrana Citoplasma  Animal   Vegetal  Figura 1-21.   Célula eucariota. \n22     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  ocurre con los neurotransmisores o las hormonas, que se   unen a una determinada región, o el receptor de la pro-  teína de canal, que sufre una transformación estructural   que induce la apertura del canal.  3.  Difusión  facilitada.  Permite  el  transporte  de  pequeñas   moléculas polares, como los aminoácidos, monosacáridos,   etc., que al no poder atravesar la bicapa lipídica, requieren   que proteínas transmembrana faciliten su paso. Estas pro-  teínas reciben el nombre de proteínas transportadoras o   permeasas, las cuales, al unirse a la molécula que tienen   que transportar sufren un cambio tal en su estructura que   arrastra a dicha molécula hacia el interior de la célula.  Transporte activo  En este proceso también actúan proteínas de membrana, pero    éstas requieren energía, en forma de ATP, para transportar las   moléculas al otro lado de la membrana. Tienen lugar cuando   el transporte se realiza en contra del gradiente electroquímico.   Son ejemplos de transporte activo la bomba de Na + /K +  y la  bomba de Ca 2+ . La bomba de Na + /K +  requiere una proteína transmembrana  que expele Na +  hacia el exterior de la membrana y conduce K +   hacia el interior. Esta proteína actúa contra el gradiente gracias   a su actividad como ATP—asa, ya que rompe el ATP para   obtener la energía necesaria para el transporte. Mediante este   mecanismo, se envían tres Na +  hacia el exterior y se incorpo- ran dos K +  en el interior, con la hidrólisis acoplada de ATP.  El transporte activo de Na +  y K +  tiene una gran importancia  fi siológica. De hecho, todas las células animales gastan más  del 30% del ATP que producen (y las células nerviosas más   del 70%) para movilizar estos iones.  Citosol y citoesqueleto  Toda  la  porción  citoplasmática  que  carece  de  estructura  y    constituye la parte líquida del citoplasma recibe el nombre de  citosol por su aspecto fl uido. En esta parte se encuentran las   moléculas necesarias para el mantenimiento celular. El  citoesqueleto  consiste  en  una  serie  de  fi bras  que  da   forma a la célula, y conecta distintas partes celulares, como si   se tratara de vías de comunicación celulares. Es una estructura   en  cambio  continuo  que  está  formada  por  los  tres  tipos  de    componentes siguientes.   Microtúbulos  Son fi lamentos largos, formados por la proteína tubulina. Son  las piezas más importantes del citoesqueleto y pueden formar   asociaciones estables, como los   •  centriolos, que son dos pequeños cilindros situados en el  interior del centrosoma (fi g. 1-22), exclusivos de células   animales. Con el microscopio electrónico se observa que   la parte externa de los centriolos está formada por nueve   tripletes de microtúbulos. Los centriolos se cruzan for-  mando un ángulo de 90º •  cilios y fl agelos, que son delgadas prolongaciones celulares  móviles que poseen básicamente la misma estructura; la   diferencia entre ellas es que los cilios son muchos y cortos,   y los fl agelos son pocos y más largos (fi g. 1-23). Constan  de dos partes: una externa que sobresale de la superfi cie de la  célula, está revestida con membrana plasmática y contiene   un esqueleto interno de microtúbulos llamado axonema,   y otra interna, que se denomina cuerpo basal, de la que   salen las raíces ciliares que coordinan el movimiento  Microfi lamentos  Se sitúan sobre todo en la periferia celular, bajo la membrana   y están formados por hebras de la proteína actina, trenzadas   en hélice, cuya estabilidad se debe a la presencia de ATP e   iones de calcio. Se ocupan de la contracción muscular cuando   se ligan a los fi lamentos de miosina.   Figura 1-22. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      23  Filamentos intermedios  Están formados por diversos tipos de proteínas. Son polímeros   muy estables y resistentes, y abundan especialmente en el cito-  plasma de las células sometidas a fuertes tensiones mecánicas   (queratina, desmina) ya que su función consiste en distribuir las   tensiones, que de otro modo romperían la célula (fi g. 1-24).  Distribución de los fi lamentos  del citoesqueleto en el citoplasma   Como  se  puede  apreciar  en  la  fi gura  24,  los  microtúbulos    irradian desde una región del citoplasma denominada centro   organizador de microtúbulos o centrosoma. Los microfi lamentos se encuentran dispersos en todo el  citoplasma, pero se concentran fundamentalmente abajo de   la membrana plasmática. Los  fi lamentos  intermedios  se  extienden  por  todo  el   citoplasma  y  se  anclan  a  la  membrana  plasmática,  lo  cual    proporciona resistencia mecánica a las células.  Retículo endoplásmico  Lo  forman  una  red  de  membranas  que  originan  cisternas,     sáculos y tubos aplanados (fi g. 1-25). Delimita un espacio in-  terno llamado lumen del retículo, y es una estructura continua   con la membrana externa de la envoltura nuclear.   Se pueden distinguir dos tipos de retículo, que son los  siguientes.   1.  El retículo endoplásmico rugoso (RER) contiene ribo- somas unidos a su membrana. En él se efectúa la síntesis    proteica. Las proteínas que sintetizan los ribosomas pasan   al lumen del retículo y ahí maduran hasta ser exportadas   a su destino defi nitivo. 2.  El retículo endoplásmico liso (REL) carece de ribosomas  y está formado por túbulos ramifi cados y pequeñas ve-  sículas esféricas. En este retículo se realiza la síntesis de   lípidos. En el retículo de las células del hígado tiene lugar   la desintoxicación, que consiste en convertir una sustancia   o metabolito insoluble en agua en soluble en agua para   eliminar así dichas sustancias por la orina.  Aparato o complejo de Golgi  C. Golgi lo descubrió en 1898. Consiste en un conjunto de   estructuras  de  membrana  que  forma  parte  del  complicado    sistema de membranas, que se encuentra en el interior de las   células (fi g. 1-25). Es tanto más complejo cuanto mayor es   la actividad celular. La unidad básica del organelo es el sáculo, que consiste en  una vesícula o cisterna aplanada. Cuando se apila una serie de   sáculos, se forma un dictiosoma. Además, es posible observar   toda una serie de vesículas más o menos esféricas en ambos   lados y entre los sáculos. El conjunto de todos los dictiosomas   y vesículas constituye el aparato de Golgi. El dictiosoma se encuentra en íntima relación con el retí- culo endoplásmico, lo que permite diferenciar dos caras: la cara   cis , más próxima al retículo, y la cara  trans , más alejada. En la  cara  cis  se encuentran las vesículas de transición, mientras que  en la cara  trans , están situadas las vesículas de secreción.  Flagelo  Núcleo  Cromosomas  Ribosomas  Retículoendoplásmico  Microtúbulo  Cilios  Mitocondria  Aparatode Golgi  Centriolos  Célula compuesta  Figura 1-23.  Microtúbulos  Mitocondria  Microfilamentos y filamentos intermedios  Ribosomas  Retículo endoplásmico  Membrana plasmática  Figura 1-24. \n24     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  El sistema de membranas constituye la respuesta de las  células eucariotas a la necesidad de regular sus comunicaciones   con el ambiente en el trasiego de macromoléculas. Para ello   se  desarrollaron  dos  mecanismos  con  los  que  el  aparato  de    Golgi guarda relación. La  incorporación  de  sustancias  se  lleva  a  cabo  por  en- docitosis, mecanismo que consiste en englobar sustancias con   ayuda de la membrana plasmática para asimilarlas posterior-  mente. La eliminación de sustancias se efectúa por exocito-  sis, mecanismo que consiste en la fusión de las vesículas que   contienen la sustancia por exportar con la membrana celular.   Estos mecanismos dan sentido funcional al aparato de Golgi   porque intervienen en:  •  la  maduración  de  las  glucoproteínas  provenientes  del   retículo •  los procesos de secreción, almacenamiento, transporte y  transferencia de glucoproteínas •  la  formación  de  membranas:  plasmática,  del  retículo,   nuclear •  la generación de la pared celular vegetal   •  la formación de los lisosomas  Lisosomas  Los lisosomas tienen una estructura muy sencilla. Son seme-   jantes a las vacuolas, los rodea sólo una membrana y contienen   Vesícula Lisosoma Membrana plasmática  Microfilamento  Citosol  Retículo endoplásmico  Mitocondria  Polisoma  Microtúbulo  Núcleo  Membrana nuclear  Ribosoma  Flagelo  Peroxisoma  Aparato de Golgi  Vacuola Aparato de Golgi Lisosoma Peroxisoma Retículo endoplásmico rugoso Retículo endoplásmico liso  Figura 1-25. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      25  gran cantidad de enzimas digestivas que degradan todas las    moléculas inservibles para la célula (fi g. 1-25). Se forman a   partir del retículo endoplásmico rugoso. Posteriormente, el   complejo de Golgi empaqueta las enzimas. Estos cuerpos funcionan como “estómagos” de la célula  o vacuolas digestivas. Además de digerir cualquier sustancia   que ingrese del exterior, consumen restos celulares viejos para   digerirlos también, por lo que también se les llama vacuolas   autofágicas. Reciben, asimismo, el nombre de “bolsas suicidas”   porque si se rompiera su membrana, las enzimas encerradas   en su interior terminarían por destruir toda la célula.  Mitocondria   Las mitocondrias (fi g. 1-26) son los organelos celulares encar-   gados de suministrar la mayor parte de la energía necesaria para   la actividad celular. Actúan, por tanto, como centrales energé-  ticas de la célula y sintetizan ATP a expensas de los carburantes   metabólicos (glucosa, ácidos grasos y aminoácidos).  La ultraestructura mitocondrial depende de las funciones  que desempeña: en la matriz se localizan las enzimas que se   ocupan de oxidar ácidos grasos, aminoácidos, ácido pirúvico   y ciclo de Krebs.   En la membrana interna están los sistemas dedicados al  transporte de los electrones que se desprenden en las oxida-  ciones anteriores y un conjunto de proteínas encargadas de   acoplar la energía liberada del transporte electrónico con la   síntesis de ATP. Estas proteínas le dan un aspecto granuloso   a la cara interna de la membrana mitocondrial. También  se  encuentras  dispersas  en  la  matriz  unas   moléculas de DNA circular y unos pequeños ribosomas que   sintetizan un pequeño número de proteínas mitocondriales.  Cloroplasto  Los cloroplastos son organelos exclusivos de las células veg-   etales (fi g. 1-26). En ellos tiene lugar la fotosíntesis, proceso   en el que se transforma la energía lumínica en energía química   y se almacena en moléculas de ATP y moléculas reductoras   (NADPH + H + ). Esta energía se utiliza después para sintetizar  moléculas orgánicas. Tienen una organización muy similar a la de la mitocon- dria, aunque son de mayor tamaño y poseen un compartimien-  to más porque presentan un tercer tipo de membrana. Por lo tanto, un cloroplasto contiene tres membranas y  tres compartimientos.  Vesícula Lisosoma Membrana plasmática  Microfilamento  Citosol  Retículo endoplásmico  Mitocondria  Polisoma  Microtúbulo  Núcleo  Membrana nuclear  Ribosoma  Flagelo  Peroxisoma  Aparato de Golgi  Cloroplasto Membrana citoplásmica Núcleo Mitocondria  Figura 1-26. \n26     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  •  La  membrana  externa  es  muy  permeable,  gracias  a  la   presencia de porinas. •  La membrana interna es menos permeable y no presenta  pliegues (la de la mitocondria sí los presenta). Entre am-  bas membranas queda un primer compartimiento, que   es el espacio intermembranas. La membrana interna de-  limita un espacio que es el estroma, donde hay ribosomas,   copias  de  DNA,  distintos  tipos  de  RNA,  gránulos  de    almidón y gotas de lípidos. •  La  membrana  tilacoidal  es  el  tercer  tipo  de  membrana.   Forma unos sacos aplanados denominados tilacoides, y da   lugar a unas agrupaciones llamadas grana. Los tilacoides   están interconectados y delimitan una tercera cavidad que   es el espacio tilacoidal. Esta membrana es la encargada de   captar la energía solar, gracias a la presencia de clorofi las y  de otros pigmentos unidos a proteínas en unas estructuras   funcionales que son los fotosistemas.   En esta membrana (fi g. 1-27) se encuentra también una  cadena de transporte de electrones y una sintasa de ATP, que   funciona como la sintasa mitocondrial de ATP. En la fi gura 1-28 se ilustra la distribución de estas es- tructuras en la membrana tilacoidal. El fotosistema II (PSII)   se localiza particularmente en la grana, mientras que el foto-  sistema I (PSI) está en contacto con el estroma al igual que   el complejo sintasa de ATP. El citocromo b6—f tiene como   función el transporte de los electrones desde el fotosistema   II al I, por lo que se encuentra en ambos sitios.   Fotosistemas  Los fotosistemas son las unidades de la membrana tilacoidal.   Cada fotosistema está formado por dos partes:   •  un complejo antena que consta de varios centenares de  moléculas de clorofi la y carotenos  •  un centro reactivo, o centro de reacción fotoquímico, que  posee unas moléculas de clorofi la a que actúan como una   verdadera trampa energética, puesto que los electrones   que liberan son enviados hacia la cadena de transporte   de electrones de la membrana tilacoidal.  El complejo antena funciona de la manera siguiente: cu- ando una de sus moléculas se excita al captar un fotón (unidad    de ener gía lumínica) transfi ere esa energía de excitación a otra  molécula cercana por medio de un proceso de resonancia y,   en una reacción en cadena, esa energía llega hasta el centro   reactivo.  Núcleo  El núcleo es un organelo característico de las células eucario-   tas (fi g. 1-26). El material genético de la célula se encuentra   dentro del núcleo en forma de cromatina. El núcleo dirige las actividades de la célula, y en él tienen  lugar procesos tan importantes como la automultiplicación del   DNA antes de comenzar la división celular, y la transcripción   o producción de los distintos tipos de RNA, que servirán para   la síntesis de proteínas. Esta estructura cambia de aspecto durante el ciclo celular  y llega a desaparecer como tal. Por ello se describe el núcleo   en interfase durante el cual es posible apreciar las siguientes   partes:    •  la envoltura nuclear, la cual está formada por dos mem- branas  concéntricas  perforadas  con  poros  nucleares;  a    través de éstos se transportan moléculas entre el núcleo   y el citoplasma •  nucleoplasma, que es el medio interno del núcleo donde  se encuentra el resto de los componentes nucleares •  nucleolo o nucleolos, los cuales son masas densas y esféri- cas, que constan de dos zonas: una fi brilar y otra granular.   fotosistema II plastocianina fotosistema I ESPACIO TILACOIDAL ATP  −  sintasa FAD ferredoxina plastoquinona ESTROMA fotón de luz  Figura 1-27. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      27  La fi brilar es interna y contiene DNA; la granular rodea   a la anterior y contiene RNA y proteínas •  la cromatina, constituida por DNA y proteínas, aparece  durante la interfase, pero cuando la célula entra en di-  visión se organiza en estructuras individuales que son los   cromosomas.  Cromatina y cromosomas   Un cromosoma es una molécula de DNA muy grande que    contiene  una  serie  de  genes  (fi g.  1-29).  Un  cromosoma    metafásico  está  formado  por  dos  cromátides  idénticas  en    sentido  longitudinal.  En  cada  una  de  ellas  hay  un  nucleo-  fi lamento de DNA replegado idéntico. Las cromátides están  unidas por medio del centrómero. En las cromátides se aprecia   también un cinetocoro, centro organizador de microtúbulos,   que se forma durante la mitosis y que ayuda a unir los cro-  mosomas con el huso mitótico. Por lo tanto, se puede decir   que cromatina y cromosomas es lo mismo, y el cromosoma   sería un paquete de cromatina muy compacto. Como puede   verse en la fi gura 1-30, en una secuencia que va desde el DNA  hasta el cromosoma. El número 1 de la fi gura 1-30 corresponde a la molécula  de  DNA;  el  número  2  ilustra  el  DNA  unido  a  proteínas    globulares, lo cual genera una estructura denominada collar   de  perlas.  Dicha  estructura  se  origina  por  la  repetición  de    unas  unidades  que  son  los  nucleosomas.  Cada  nucleosoma    correspondería a una perla del collar. En el número 3 se pasa   a una estructura de orden superior en forma de solenoide. Se   consigue aumentar el empaquetamiento, y se genera la fi bra de  cromatina y nuevos bucles en el número 4. Hay un grado de   mayor compactación en el número 5, y se establece un denso   paquete de cromatina, que es, en realidad, un cromosoma.  El  total  de  la  información  genética  contenida  en  los   cromosomas de un organismo constituye su genoma.  El gen desnudo                       Los  genes  desnudos  o  virus  típicos  tienen  5  000  pares  de    bases, es decir, 1 333 tripletes o codones y menos de 10 genes,   de  manera  similar  a  otros  genes  desnudos.  Eso  constituye    su mensaje genético. El de la mitocondria humana tiene 38   genes. El de la  Escherichia coli  tiene 4 000 genes. El del  Homo  sapiens  tiene algo más de 30 000 genes. A partir de estas cifras,  queda claro que los virus, viroides, fagos y plásmidos son ex-  presiones de seres vivos muy simples. Salvo la cápside proteica   que protege, en ocasiones, a algunas de estas formas, lo más   frecuente es encontrarlas como DNA o RNA desnudos en el   interior de una célula viva, a la cual han infectado.  membrana  tilacoidal 2 H 2 O Fotolisis del agua O 2  + 4 H +   H +  H +  H +  H +   H +  H +  Transporte de electrones II Pq cit b f I fotón   fotón ATP  −  asa ADP+P ATP NADP  Figura 1-28.  Cromosoma   DNA Gen 2 Gen 1  Figura 1-29.   Genes. \n28     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  Antes de infectar a una bacteria o a cualquier otro tipo  de célula, dichos genes se visten con una cápside proteica para   dejarse llevar por el ambiente, mientras buscan su blanco a   donde llegar. La diana o blanco es la membrana de una bac-  teria o de una célula a la cual identifi can como un sitio apto  para vivir en su interior. En la fi gura 1-31 se observan varios   tipos  de  virus  con  su  mensaje  genético  protegido  mediante    una cápside. Por  ser  simplemente  moléculas  de  DNA  o  RNA,  pa- recería que provienen de la época de la vida del RNA, en los   albores de la existencia de la vida en el planeta. Los  virus  que  hoy  se  conocen  están  adaptados  por   completo  (coevolucionaron)  a  células  muy  posteriores  a  la    era del RNA. Esos genes desnudos carecen de instrucciones   para fabricar ribosomas y moléculas “sabias”, respectivamente  rRNA y tRNA. Para allegarse las pocas proteínas que necesi-  tan, usan la maquinaria de rRNA y tRNA de las células en   cuyo  interior  se  alojan.  Los  virus,  viroides,  etc.  son  piratas    (técnicamente, parásitos) que utilizan en todo lo posible las   facilidades  ya  provistas  en  las  mismas  células  vivas.  Como    esa adaptación ocurrió tiempo después de la aparición de las   células vivas, se dice que las formas más modernas de los genes   desnudos son las formas más evolucionadas del parasitismo:   sólo necesitan traer un mínimo de instrucciones para sobre-  vivir.  Son pasajeros sin equipaje . Al repasar el ciclo vital de un virus, se observa que, en una  etapa, la cápside llena, que ha identifi cado a la célula en la que   se puede hospedar, inyecta su DNA o su RNA (según el tipo   de virus) dentro de la célula. Una de las posibilidades para el   virus de DNA es introducirse en el genoma del hospedero,   que entonces pasa de 4 000 genes a 4 010 genes. A esto se le   llama etapa lisogénica. Otra de las posibilidades para el virus de RNA o DNA es  la de utilizar la maquinaria del hospedero para multiplicarse.   Como es tan pequeño, en seguida se producen muchísimas   réplicas o copias del gen desnudo. Cada copia construye luego   su cápside proteica, y cuando los duplicados llegan a ser una   cantidad muy elevada, se produce la lisis o rotura de las mem-  branas de la célula. Esto recibe el nombre de etapa lítica (de   rotura). De esta manera las copias quedan libres, y cada una   de ellas representa un foco de infección en el ambiente. Una posibilidad más es que un virus en etapa lisogénica  sea  promovido  a  la  etapa  lítica.  El  factor  desencadenante    para  ese  pasaje  suele  ser  la  presencia  de  rayos  ultravioleta,    que provienen del Sol.  Tipos de virus Adenovirus Virus de     inmunodeficiencia  humana   bacteriófago  Figura 1-31.   Tipos de virus.  Figura 1-30.      El DNA se empaca    estrechamente en los    cromosomas en metafase  5   Cromosomas       en metafase  4 3   Cromatina       condensada Nucleosomas 2 1   Doble hélice      de DNA \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      29  Los  virus  de  RNA,  como  es  el  caso  del  retrovirus  del   SIDA,  fabrica  una  enzima  denominada  retrotranscriptasa.    Con su ayuda, la molécula de RNA con todas las instruccio-  nes virales, pasa a retrotranscribirse como DNA e, incluso,   a acceder a la etapa lisogénica. El resultado es que muchas   enfermedades  virales  son  muy  difíciles  de  curar,  y  algunas    parecen,  hasta  ahora,  imposibles  de  ser  curadas  porque  la    consecuencia no deseada de un proceso muy positivo, como   es  la  duplicación  del  mensaje  genético,  es  que  también  se    copian las instrucciones del virus. El genoma infectado del   hospedero pasa a sus hijos y nietos, hasta que se desencadena   en un momento dado una etapa lítica, en la cual se propaga   la enfermedad a muchas células sanas. Por  eso  se  puede  sospechar  que  fracciones  mudas  del   genoma con genes fragmentados son, de hecho, aunque sólo   en parte, virus en etapa lisogénica, que se eliminan al madurar   los genes fragmentados para dar lugar a los genes enteros y   maduros que procesan los ribosomas y las biomoléculas. Si así   fuera, la maquinaria de maduración de genes fragmentados   no  sería  ancestral,  sino  una  defensa  ante  el  reciente  avance    de  los  genes  virales,  desnudos  y  lisogénicos.  Si  fuese  cierta    esta hipótesis, el árbol genealógico con los cinco reinos sería   menos complejo. Un  virus,  entonces,  es  un  agente  genético  que  posee   un  ácido  nucleico  que  puede  ser  DNA  o  RNA,  y  que  está    rodeado por una envoltura de proteína. Los virus contienen   toda la información necesaria para su ciclo reproductor, pero   para  conseguirlo  necesitan  a  otras  células  vivas  de  las  que    aprovechan sus organelos y moléculas.  Reproducción de los virus  La única función que poseen los virus y que comparten con el   resto de los seres vivos es la de reproducirse o generar copias   de sí mismos, para lo cual requieren la materia, la energía y   la maquinaria de la célula en donde se alojan, por lo que se   les denomina parásitos obligados. No poseen metabolismo ni   organización celular, por lo que se les sitúa en el límite entre   lo vivo y lo inerte. Una vez que los virus infectan a una célula son   son los viroides y los priones.  Viroides  Son  moléculas  de  RNA  circular  que  carecen  de  cualquier    protección.  Priones  Son agentes patógenos formados por una proteína (proteína   del prión o PrP) que causan la enfermedad de las “vacas lo-  cas” o encefalopatía bovina espongiforme, entre otras. Esta   proteína se acumula en el cerebro de animales enfermos, lo   cual origina la estructura esponjosa de la corteza cerebral que   da nombre a la enfermedad. Los  priones,  o  las  enfermedades  producidas  por  prio- nes, tienen un comportamiento sorprendente. Por un lado,   se  transmiten  verticalmente,  como  cualquier  enfermedad    hereditaria  característica,  en  tanto  que,  por  otra  parte,  se    comportan  de  manera  infectiva  y  se  transmiten  de  modo    horizontal mediante contagios entre individuos de distintas   especies. La proteína del prion (PrP) normal tiene una secuencia  de  aminoácidos  (estructura  primaria)  idéntica  a  la  proteína    del prion patógena. La diferencia entre las dos recae en las   estructuras secundaria y terciaria (fi g. 1-33). La  proteína  normal  es  muy  rica  en  hélices  alfa,  y  la   proteína  patógena  lo  es  en  láminas  beta.  Este  cambio  de    conformación  es  crucial,  ya  que  las  proteínas  con  láminas    beta son muy resistentes a las enzimas proteolíticas, al calor   y son insolubles en agua. Pero sobre todo, la proteína alterada   tiene una característica única: interacciona con una molécula   de proteína normal, le cambia la conformación y la hace capaz   de  modifi car  las  estructuras  de  más  proteínas  normales.  Al   parecer, ahí radica el poder infectivo de los priones. El  esquema  que  se  presenta  es  muy  simplifi cado,  pues  sólo se intenta explicar este proceso.  Confórmero normal   Confórmero maligno (supuesto)  Figura 1-33.   (Adaptado de http//www.cmpharmucsf.edu/cohen/research/gallery/aw_prion.gif) \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      31  Puede ocurrir que la proteína patógena infecte individuos  que  producen  proteína  normal  ( A ),  como  ha  ocurrido,  por   ejemplo,  cuando  las  vacas  consumen  alimento  elaborado  a    partir de ovejas enfermas. En este caso, la proteína patógena   origina un cambio conformacional de la proteína normal ( B ), y  transforma las hélices alfa de su estructura proteica en láminas   beta. Las nuevas proteínas patógenas inducen el cambio en   otras normales, lo cual produce un efecto de cascada.  Bibliografía                              Alberts  B,  et  al.  Essential  cell  biology.  An  introduction  to  the   molecular  biology  of  the  cell.  New  York/London:  Garlan    Publishing, 1997. Cairns—Smith  AG.  Genetic  takeover  and  the  mineral  origins  of   life. USA: Cambridge University Press, 1982. de-Duve C. Blueprint for a cell. Burlington, North Carolina: Neil  Patterson, 1991. Ferris JP, Ertem G. Science, 1992;257:1387.  Karp  G.  Biología  celular  y  molecular.  México:  McGraw—Hill- Interamericana, 1998. Lewin  RA.  Prochlorophyta  as  a  proposed  new  division  of  algae.   Nature, 1976;261:697—698. Montero F, Sanz JC, Andrade MA. Evolución prebiótica: el camino  hacia la vida. España: Eudema, 1993. Reyes JJ. Vida, orden y caos. Propuestas para nuevos enfoques en bi- ología. Serie Libros de Texto. México: Universidad Autónoma   Metropolitana—Xochimilco, 1993. Selosse MA. Les cyanobactéries, d’étonants procariotes photo-syn- thétiques. Biologie—Géologie, 1996;3:481. Smith  CA,  Wood  EJ.  Moléculas  biológicas.  México:  Addison— Wesley Iberoamericana, 1997. Solomon EP, et al. Biología de Villee. 4a ed, México: McGraw— Hill-Interamericana, 1998. Stryer L. Bioquímica. 4a ed, España: Reverté, 1996. (2 tomos) \n32     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares \n";

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }
    function getReadableTextColor(bgColor) { return getLuminance(bgColor) > 0.56 ? '#111827' : '#f8fafc'; }
    function generatePalette() {
        const hue = Math.floor(Math.random() * 360);
        const bg = hslToHex(hue, 45 + Math.floor(Math.random() * 20), 16 + Math.floor(Math.random() * 70));
        const text = getReadableTextColor(bg);
        const isDark = getLuminance(bg) < 0.5;
        const accent = hslToHex((hue + 35 + Math.floor(Math.random() * 60)) % 360, 80, isDark ? 55 : 45);
        const card = isDark ? mixColors(bg, '#ffffff', 0.08) : mixColors(bg, '#000000', 0.05);
        const border = isDark ? mixColors(card, '#ffffff', 0.18) : mixColors(card, '#000000', 0.12);
        const input = isDark ? mixColors(card, '#ffffff', 0.07) : mixColors(card, '#000000', 0.04);
        const inputBorder = isDark ? mixColors(border, '#ffffff', 0.12) : mixColors(border, '#000000', 0.1);
        const botBg = isDark ? mixColors(bg, '#ffffff', 0.12) : mixColors(bg, '#000000', 0.06);
        return {
            bgColor: bg,
            textColor: text,
            cardBgColor: card,
            cardBorderColor: border,
            inputBgColor: input,
            inputBorderColor: inputBorder,
            chatBubbleBotBg: botBg,
            chatBubbleBotText: text,
            chatBubbleUserBg: accent,

            secondaryColor: isDark ? mixColors(accent, '#ffffff', 0.2) : mixColors(accent, '#000000', 0.2),

        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';

        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');

        finally {
