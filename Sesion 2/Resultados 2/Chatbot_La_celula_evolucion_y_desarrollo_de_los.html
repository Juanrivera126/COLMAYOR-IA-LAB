    <style>
        :root{--primary:#007bff;--secondary:#6c757d;--light:#f8f9fa;--dark:#343a40;--success:#28a745;--danger:#dc3545;--warning:orange;--radius:8px;--font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;--bg:var(--light);--text:var(--dark);--card:#fff;--border:#ddd;--input:#fff;--iborder:#ccc;--bot-bg:#e9ecef;--bot-text:var(--dark);--user-bg:var(--primary);--user-text:#fff;--sys-bg:#fff3cd;--sys-text:#856404;}
        body.dark-mode{--bg:#212529;--text:#f8f9fa;--card:#343a40;--border:#495057;--input:#495057;--iborder:#6c757d;--bot-bg:#495057;--bot-text:#f8f9fa;--sys-bg:#332701;--sys-text:#ffeb8f;}
        body{font-family:var(--font);margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;transition:background .3s,color .3s;}

        header p{margin:5px 0 0;font-size:.9em;color:var(--secondary);}
        .toolbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;}

        button:disabled{background:var(--secondary)!important;opacity:.65;cursor:not-allowed;}

        .chat-display .user-message,.chat-display .bot-message,.chat-display .system-message{margin-bottom:10px;word-wrap:break-word;}
        .chat-display .user-message,.chat-display .bot-message{background:transparent;color:inherit;padding:0;border-radius:0;max-width:100%;text-align:inherit;margin-left:0;}
        .message{display:flex;align-items:flex-end;gap:10px;margin-bottom:4px;max-width:100%;}
        .message.user-message{flex-direction:row-reverse;justify-content:flex-start;}
        .avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #eee;background-color:#f0f0f0;}

        .user-message .message-bubble.user-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:5px;margin-left:auto;}
        .bot-message .message-bubble.bot-bubble{background:var(--bot-bg);color:var(--bot-text);border-bottom-left-radius:5px;margin-right:auto;}

        .chat-display .bot-message .message-bubble pre{background:var(--dark);color:var(--light);padding:10px;border-radius:5px;overflow-x:auto;}

        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}

<script>
    const PDF_TEXT = "La célula: evolución y desarrollo   de los sistemas celulares  Jorge Joel Reyes Méndez  “El objetivo de la biología celular y molecular moderna es interpretar las propiedades  de los organismos mediante la estructura de sus moléculas constituyentes.”  F RANCOIS  J ACOB , 1973, en  The logic of life.  Objetivos   Introducción  Desde las moléculas hasta la primera  célula Formación de moléculas sencillas en las  condiciones prebióticas   Síntesis de los polinucleótidos    Selección natural de las moléculas  automultiplicadoras   Moléculas de RNA como catalizadores    Transferencia de información desde  los polinucleótidos a los   polipéptidos   Formación de la membrana    Primeras células  De la célula procariota a la eucariota    Células procariotas    Reacciones metabólicas    Fotosíntesis    Respiración    Glucólisis  La célula eucariota  Teoría actual de la endosimbiosis como  origen de la célula eucariota Estructura celular    Transporte a través de membranas       Transporte pasivo      Difusión simple      Transporte activo     Citosol y citoesqueleto      Microtúbulos       Microfi lamentos     Filamentos intermedios      Distribución de los fi lamentos del  citoesqueleto en el citoplasma    Retículo endoplásmico    Aparato o complejo de Golgi    Lisosomas    Mitocondria    Cloroplasto      Fotosistemas    Núcleo       Cromatina y cromosomas    El gen desnudo    Reproducción de los virus    Viroides    Priones  Contenido  Capítulo   1 \n2     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  Objetivos                                   Al fi nalizar el capítulo, el lector podrá identifi car las teorías   actuales  sobre  el  origen  de  los  sistemas  precelulares  y  de  la    vida; interpretar y conceptualizar los procesos evolutivos que  llevaron a la aparición de los procariotas; señalar los funda- mentos de la teoría endosimbiótica del origen de las células   eucariotas; identifi car las diferencias fundamentales entre una  célula procariota y una célula eucariota y describir el proceso   de síntesis de proteínas en sus partes fundamentales.  Introducción                            Hace  aproximadamente  4  700  millones  de  años,  según  los    cálculos  más  recientes,  en  uno  de  los  brazos  de  la  galaxia,    una  nube  de  gas  y  polvo  se  contrajo  para  formar  un  disco.    Durante dicha contracción, esta nube aumentó su velocidad   angular. Hubo un momento en el que el centro del disco fue   tan denso, masivo y caliente que fue posible que se llevaran   a  cabo  reacciones  nucleares  en  su  interior.  Este  hecho  lo    convirtió en una estrella, el Sol. Posteriormente, parte de las   partículas de polvo y gas restantes se unieron para dar origen   a los planetas. Setecientos  millones  de  años  después,  es  decir,  hace   cuatro  mil  millones  de  años,  la  Tierra  completaba  un  giro    alrededor de su eje en 18 horas. El joven Sol brillaba con sólo   el 70% de su energía actual. La atmósfera no contenía oxígeno   libre. Había pocos sonidos, salvo el ruido del viento, el de las   erupciones volcánicas, el silbido de la lava al hacer contacto   con el agua y las explosiones de los meteoritos al chocar contra   la corteza terrestre. No había plantas, animales, bacterias, ni   virus. A partir de este punto inicial, la opinión de los cientí-  fi cos varía ampliamente: no se sabe con exactitud cómo era  el planeta Tierra cuando inició la vida. Las rocas que podrían   brindar esta información se deformaron hace mucho tiempo   a causa de los movimientos de la corteza terrestre. Stanley L. Miller afi rma que “los compuestos orgánicos  se  organizaron  en  algo  que  podía  automultiplicarse”.  Son    varios  los  escenarios  posibles.  A  continuación  se  exponen    los  más  recientes  puntos  de  vista  de  científi cos  destacados,  estudiosos del tema. Aunque  los  acontecimientos  que  originaron  la  vida  en   la Tierra aún son misteriosos, los científi cos exploran desde   hace algunos años pistas nuevas que se revelan prometedoras.   El  químico  norteamericano  Stanley  Miller  había  efectuado    en los años cincuenta del siglo XX los primeros experimentos  de reproducción de una  sopa primitiva  en la que se habrían  sintetizado las moléculas que constituyen la materia viva. En   la actualidad, esta hipótesis se considera improbable, y parece   más verosímil que dichas moléculas se hayan formado en la   superfi cie  de  determinados  minerales.  Según  este  punto  de   vista,  uno  de  los  problemas  fundamentales  es  saber  cómo    surgieron las moléculas capaces de automultiplicarse en ausen-  cia  de  enzimas,  condición  indispensable  para  que  se  pueda    transmitir la información genética. Se sabe que todos los seres vivos están constituidos por cé- lulas (pequeños compartimientos rodeados con una membrana   y rellenos de una solución de sustancias químicas). Las formas   más simples de vida son células solitarias que se reproducen   dividiéndose en dos. Los organismos restantes, incluso el ser   humano,  constan  de  agrupaciones  de  células  que  efectúan    determinadas tareas y que se comunican con otros grupos de   células mediante procedimientos de señales complejos. Todos los organismos y todas las células que los consti- tuyen proceden de un antecesor común, pero se desconocen   los  procesos  intermedios.  Uno  de  estos  procesos,  denomi-  nado    evolución ,  tiene  lugar  por  medio  de  dos  mecanismos   bien defi nidos: •  la variación mediante la cual se produce en forma aleatoria  un cambio en la información genética •  la selección en favor de los individuos que están mejor  preparados para sobrevivir y reproducirse  Por otro lado, se sabe que más que una curiosidad bio- lógica, la endosimbiosis es uno de los motores más poderosos  de la evolución del mundo vivo. La endosimbiosis crea con   rapidez organismos quiméricos que engendran nuevos linajes,   acerca a los socios y favorece transferencias masivas de genes   que crean genomas también quiméricos: el genoma nuclear   contiene,  por  consiguiente,  genes  eucariotas,  pero  también    genes  de  origen  bacteriano  procedente  de  las  mitocondrias    o de los plastos, con los que coexiste. Estos acontecimientos   explican tal vez los saltos evolutivos fundamentales que dieron   origen a los grandes linajes del mundo viviente y moldearon   la diversidad biológica actual. El mismo hombre puede con-  siderarse como una comunidad simbiótica, que está formada   por el citoplasma eucariota y las mitocondrias. El hombre es, en realidad, un conglomerado de bacterias,  espiroquetas  y  virus  diversos.  El  producto  acabado  de  una    industriosa colonia de bacterias simbióticas que lo armaron,   de la misma forma que el hombre construye su hogar y sus   ciudades. Este capítulo trata de la progresión desde las moléculas  hasta los organismos multicelulares. En seguida se estudian   las estructuras fundamentales de las células eucarióticas (cé-  lulas que disponen de una anatomía intracelular estructurada   a diferencia de las células procarióticas que carecen de estas   estructuras). \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      3  Desde las móleculas hasta   la primera célula                     Formación de moléculas sencillas   en las condiciones prebióticas  En  1970  se  descubrió  la  existencia  de  ácido  fórmico  en  la    región  norte  de  la  galaxia  Sagittarius  B2,  y  la  confi rmaron  radioastrónomos de la Universidad de Illinois en 1999. Por   otra  parte,  en  1996,  científi cos  de  esta  misma  universidad    encontraron ácido acético en esta misma nube de gas. El ácido   acético es una molécula sólo “un paso” más corta que la glicina,   el aminoácido más sencillo, cuya existencia en el espacio no se   ha confi rmado todavía. De hecho, para la formación de glicina   tan sólo habría que combinar ácido acético con amoniaco, cuya   presencia en el espacio se conoce, a su vez, desde 1969. Se descubrieron alrededor de 120 moléculas diferentes en  esas nubes. Algunas de ellas tienen ocho o más átomos, como   el glicoaldehído, aunque la mayoría contiene menos. En  el  año  2000,  un  equipo  de  científi cos  formado  por   Jan Hollis (NASA/Goddard), Frank J. Lovas (Universidad de   Illinois) y Philip R. Jewell (NRAO/Green Bank) descubrió   glicoaldehído en una nube gigante de gas y polvo situada a   una distancia de alrededor de 26 000 años luz de la Tierra,   a unos 300 años luz del centro de la galaxia, la Vía Láctea,   por medio del radiotelescopio de 12 metros de la Fundación   Nacional para la Ciencia, en Kitt Peak, a 80 Km de Tucson,   Arizona. Tales nubes, a menudo con un tamaño de varios años   luz, están compuestas por material a partir del cual se forman   nuevas estrellas. Aunque su densidad es muy pequeña, se trata   de zonas en las que se suceden complejas reacciones químicas   a lo largo de cientos de miles o de millones de años. El  glicoaldehído  (o  glicolaldehído,  fig.  1-1)  es  una   molécula de ocho átomos cuya fórmula es C 2 H 4 O 2  (HOCH 2 - CHO). Se trata de un aldehído con dos átomos de carbono, el   cual también se puede incluir en el grupo de las aldosas más   sencillas, las biosas, carbohidratos (azúcares) con un átomo   de  carbono  menos  que  las  triosas.  Se  puede  combinar  con    otras moléculas para formar azúcares más complejos, como   ribosa o glucosa.  El descubrimiento de esta molécula de azúcar en una nube  a partir de la cual se forman las estrellas incrementa la proba-  bilidad de que los precursores químicos de la vida se originen   en estas nubes, mucho antes de que los planetas se creen al-  rededor de las estrellas. Dicho descubrimiento puede ser una   clave importante para saber cómo surgió la vida en la Tierra.   Las condiciones existentes en las nubes interestelares pueden en   ciertos casos ser similares a las condiciones que privaban en la   Tierra en sus primeras etapas, por lo que su estudio ayudaría a   los científi cos a comprender cómo se formaron las biomolécu-  las en las primeras etapas de la historia del planeta Tierra (fi g.  1-2). Por otro lado, algunos científi cos sugieren que el paso de  cometas podría haber “sembrado” moléculas complejas, hechas   de material proveniente de nubes interestelares, en la Tierra. Aunque no se conoce con exactitud la composición de  la  atmósfera primitiva , se cree que además de vapor de agua  contenía dióxido de carbono, metano o amoniaco e hidrógeno.   También se supone que había una intensa actividad volcánica   con  temperaturas  elevadas,  lluvias  torrenciales  y  continuas    tormentas  eléctricas.  Además,  no  había  oxígeno  libre,  ni    capa de ozono que protegiera a la Tierra contra la  radiación  ultravioleta .  En  estas  condiciones  ambientales  se  formaron   seguramente  las  primeras  moléculas  orgánicas,  cianuro  de    hidrógeno,  formaldehído,  ácido  acético,  etc.,  que  habrían    reaccionado con facilidad para formar los cuatro componen-  tes fundamentales de la vida:  •  aminoácidos   •  azúcares o glúcidos  •  lípidos o grasas  •  nucleótidos Esta hipótesis se comprobó mediante experimentos de  laboratorio.  En  1953  Stanley  L.  Miller  mostró  que  si  una    mezcla de gases, como metano, amoniaco, dióxido de carbono   e  hidrógeno  se  calentaba  con  vapor  de  agua  y  se  sometía  a    descargas eléctricas y a radiación ultravioleta durante varias   semanas, se formaban los cuatro tipos de moléculas mencio-  nados (fi g. 1-3).  Síntesis de los polinucleótidos  Las moléculas sencillas, como los aminoácidos o los nucleóti-  dos, se pueden agrupar para formar grandes polímeros. Un   aminoácido puede unirse a otro mediante un enlace peptídico   y un nucleótido puede unirse con otro por medio de un en-  lace fosfodiéster. La repetición de estas reacciones conduce,   respectivamente,  a  un  polipéptido  y  a  un  polinucleótido,    componentes fundamentales de las proteínas y de los ácidos   ribonucleico y desoxirribonucleico. Las proteínas se forman   a partir de un conjunto de 20 aminoácidos, mientras que los   ácidos nucleicos están compuestos exclusivamente por cuatro   tipos de nucleótidos (fi g. 1-4).  H O C   H    H OH C  H O C   C   H    2 OH H OH C  Figura  1-1.   Izquierda:  glicoaldehído;  derecha:  gliceralde- hído, una triosa. \n4     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  Escape  del H2 Gases  volcánicos Acumulación  de oxígeno Capa  de ozono Oxígeno  actual Animales    y vegetales   modernos Enfriamiento  de corteza  y atmósfera Océanos  Acumulación  de materia  orgánica Desaparición  de las moléculas  orgánicas  del ambiente Algas Código  genético  Glucólisis Respiración  Multicelularidad Protocélulas Fotosíntesis 4 500  4 000  3 000  2 000  1 000 500 Formación del  sistema solar Formación de  la Tierra Aparición  de cúmulos  globulares Formación   de galaxia Big Bang Evolución   prebiótica Evolución   biológica 500 400  300  200  100 50 4 500 10 000 Hace   1 500   millones   de años   Vida    en tierra   firme   Aparición   de los   dinosaurios   Aparición   de los   mamiferos  Extinción de    dinosaurios  Hombre    primitivo Atmósfera             Geosfera                Biosfera Evolución   química  Figura 1-2.   Escala del tiempo geológico y algunos de los principales hechos del origen de la vida.  CH 4  NH 3  CO 2  H 2  +  ñ  Agua  Formaldehído   Ácido fórmico  Cianuro de hidrógeno  Ácido acético  Ácido láctico  Glicina  Alanina  Urea  Ácido aspártico  Calor Cromatografía sobre papel Trampa  Descarga eléctrica  Figura 1-3.   Experimento de Miller. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      5  Los  polímeros  primitivos  pueden  haberse  formado  de   varias maneras, por ejemplo, al calentarse los constituyentes   orgánicos en seco o al catalizar la reacción altas concentra-  ciones de polifosfatos inorgánicos. En condiciones de labo-  ratorio, el resultado son polímeros de longitud variable, cuyos   componentes se acomodan en forma aleatoria (fi g. 1-5). Pero  una  vez  que  se  ha  formado  un  polímero,  éste  puede  infl uir  en  la  formación  de  uno  nuevo,  ya  que  puede  actuar  como    “molde” en una nueva reacción de polimerización. En efecto,   los nucleótidos tienen la propiedad de emparejarse mediante   la formación de enlaces de hidrógeno, de tal manera que un   polímero (p. ej., el poli U) induce la formación del polímero   complementario (poli A) (fi g. 1-6). Probablemente  el  emparejamiento  específico  de  los   nucléotidos (bases) desempeñó un papel decisivo en el sur-  gimiento de la vida. Considérese, por ejemplo, un fragmento   de RNA que contiene las cuatro bases:  adenina , A,  uracilo , U,   citosina , C, y  guanina , G. Gracias a la complementariedad de  las bases, si este RNA se añade a una mezcla de nucleótidos   activados  en  condiciones  que  favorezcan  la  polimerización,    se  creará  un  RNA  complementario  del  primero.  Es  decir,    las  muevas  moléculas  son  como  el  vaciado  del  molde   original  en  donde  A  ha  sido  sustituido  por  U,  C  por  G  y    así sucesivamente. La información contenida en la secuencia   original se preserva, de algún modo, en las copias, ya que en   una  segunda  vuelta  de  polimerización,  éstas  generan  RNA    idéntico al original. De esta forma, la información genética   contenida en la secuencia de nucleótidos pasa de generación   en generación mediante este proceso de emparejamiento de   bases complementarias. Los  mecanismos  de  duplicación  requieren  la  presencia   de un catalizador. Sin éste, la reacción es lenta y poco efi cien- te, y otras reacciones secundarias podrían interferir, lo cual   impediría la formación de réplicas exactas. En la actualidad,   una  proteína  cataliza  esta  reacción,  la  polimerasa  de  DNA    inexistente en la “sopa prebiótica”. En los tiempos primitivos,   iones  metálicos  y  minerales  como  la  arcilla  podrían  haber    cumplido la función de  catálisis . Pero, lo que es más impor- tante, el propio RNA pudo haber actuado como catalizador.   En efecto, el RNA, además de funcionar como molde para   la  duplicación,  tiene  la  posibilidad  de  formar  plegamientos    intramoleculares que originan superfi cies complejas, las cuales   catalizan reacciones específi cas. Posteriormente se tratan los   mecanismos propuestos a este respecto.  A  A  A  A  A  A  A  A  G  G  G  G  G  G  G  G  G  G  G   C  C  C  C  C  C  C  C  C   C  C  C  C  C   U  U   U  U   U  U  U  U U U  H 2 O  A  A  A  A  A  A  A  G  G  G  G  G G  G  G  G  G  C  C  C  C  C  C  C  C  C   C U  U   U  U  U  U  A   A   A   A  U U  H 2 O  U   U   U   U   U   U   U   U   U   U   U   U   U   U   U  Figura 1-4.   Los cuatro tipos de nucleótidos pueden experimentar una polimerización espontánea con  pérdida de agua. El resultado es una mezcla de polinucleótidos de longitud y orden aleatorios.  Figura 1-5.   Los nucleótidos muestran preferencias al formar parejas: A con U, C con G, mediante la  formación de puentes de hidrógeno. De esta forma, un polinucleótido sirve de molde para un polinu- \n6     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  Selección natural de las   moléculas automultiplicadoras   Es inevitable que, en los procesos de copia como el ya descrito,   se produzcan errores y que una base sea sustituida por otra en   alguna copia. De este modo, a partir de una molécula origi-  nal se pueden generar multitud de variaciones. Ahora bien,   estas moléculas tienen propiedades químicas específi cas. Una  secuencia determinada de bases confi ere un comportamiento   diferente a la molécula. En particular, la secuencia de bases   establece  cómo  puede  plegarse  la  molécula  sobre  sí  misma    cuando está en solución. En efecto, de la misma manera que   en la duplicación, las bases de una secuencia forman parejas   con las bases complementarias libres que están en solución;   en una molécula única de RNA de gran tamaño se generan   parejas de secuencias complementarias que existen dentro del   polímero. Entonces, por ejemplo, si dentro de una molécula   de  RNA  existe  la  secuencia  AAAAA,  ésta  podrá  empare-  jarse  con  una  secuencia  UUUUU  que  exista  en  otra  parte    de  la  molécula  (fi g.  1-7).  Este  tipo  de  vínculo  produce  un    plegamiento característico que depende sólo de la secuencia   de nucleótidos. La estructura tridimensional de un polinucleótido estip- ula su estabilidad química, sus acciones sobre otras moléculas   y su capacidad para copiarse, de tal forma que no todas las   moléculas son igualmente viables en una mezcla. Mediante   estudios  de  laboratorio  se  demostró  que  algunas  moléculas    de  un  sistema  replicante  de  RNA  experimentan  una  selec-  ción natural: predominan algunas secuencias favorables, que   dependen de las condiciones experimentales. Por lo tanto, la molécula de RNA tiene dos propiedades  fundamentales:   •  lleva  información  codifi cada  en  una  secuencia  de  nu- cleótidos, orden que puede transferir mediante copia •  tiene una estructura tridimensional única que determina  cómo interaccionar con otras moléculas y cómo responder   a las condiciones del ambiente  Estas dos propiedades —informativa y funcional— son  fundamentales en la evolución. La información codifi cada del  RNA  es  igual  al  genotipo  —información  hereditaria—,  en    tanto que la forma expresada es igual al fenotipo —expresión   de la información genética.  Moléculas de RNA como catalizadores   La  selección  natural  depende  del  ambiente.  Para  una    molécula  de  RNA  replicante  es  importante  la  presencia  de    otras moléculas de RNA en el medio. Además de su papel   como moldes, algunas moléculas de RNA con plegamientos   determinados pueden actuar como catalizadores de algunas   reacciones químicas, incluso la rotura y la formación de en-  U   G   U   A   A   C   U   C   G   G U A   A A C   U  U   G  G   G  U   A  A   A   A  A   C  C  U  U   U  C   G  G  G U  U   U   U  A  A A  A A C  C   C  U  Paso1 LA SECUENCIA ORIGINAL  FORMA  LA SECUENCIA COMPLEMENTARIA LA SECUENCIA COMPLEMENTARIA  FORMA  LA SECUENCIA ORIGINAL Paso 2  Figura 1-6.      AGAG G U CUUC UG G G GAU G CAUCAAG ACCU GGACC CU  C CA U G   U U A C A  Figura 1-7.   El emparejamiento intramolecular de nucleóti- dos produce un plegamiento de la molécula de RNA. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      7  laces covalentes y enlaces entre nucleótidos. Por ejemplo, un   RNA especializado puede catalizar el corte de otro RNA o   de sí mismo en una secuencia determinada. Cada una de las   reacciones químicas que cataliza el RNA catalítico depende   de una conformación o agrupamiento específi co de los átomos   que constituyen su superfi cie, lo cual hace que uno o varios   nucleótidos sean altamente reactivos.  Estas reacciones catalíticas pudieron tener una importan- cia fundamental en la “sopa prebiótica”. En efecto, supóngase   que una molécula de RNA es capaz de catalizar el proceso   de  polimerización  a  partir  de  una  molécula  cualquiera  de    RNA como molde. Esta molécula catalítica hará copias de sí   misma, pero también de cualquier otro RNA que se encuen-  tre en la proximidad, las cuales pueden ayudar, a su vez, a la   reproducción o supervivencia de la primera. De esta manera,   la especialización de diferentes RNA constituiría un sistema   efi ciente capaz de copiarse y de sobrevivir (fi g. 1-8).  Transferencia de información desde   los polinucleótidos a los polipéptidos  Se supone que hace entre 3.5 y 4 mil millones de años co-  menzó  la  evolución  de  las  moléculas  automultiplicadoras  o    autorreplicantes de RNA. De la misma manera que ahora los   organismos compiten para sobrevivir, sistemas compuestos de   varios tipos de RNA, como los de la fi gura 1-9, competían   por los precursores que les servían para automultiplicarse. Su   capacidad para sobrevivir dependía de la exactitud y efi ciencia  de la copia, así como de la estabilidad de la misma. Sin  embargo,  aunque  las  moléculas  de  RNA  tienen  la   aptitud de codifi car y mantener información con sólo cuatro   nucleótidos o bases, no son muy capaces de catalizar reacciones   complejas. Los polipéptidos, que están compuestos por más   aminoácidos, son mucho más capaces de crear puntos activos   catalíticos por medio del plegamiento de sus cadenas. Incluso   algunos polipéptidos creados al azar uniendo ciertos aminoá-  cidos pueden mostrar capacidades catalíticas superiores a las   del mismo RNA para la duplicación de éste. Por  consiguiente,  cualquier  sistema  de  RNA  con  un   polipéptido catalítico habría tenido mayores probabilidades   de sobrevivir y, de igual manera, un polinucleótido capaz de   estimular la síntesis de un polipéptido catalítico habría pre-  sentado grandes ventajas sobre los demás. ¿Cómo pudieron los polinucleótidos ejecutar tal tarea?  ¿Cómo  pudo  la  información  codifi cada  en  sus  secuencias   especifi car el orden de diferentes tipos de polímeros? Se sabe  que los polinucleótidos pueden actuar como catalizadores para   unir diferentes aminoácidos. En la actualidad, la síntesis de   proteínas se lleva a cabo mediante un conjunto de sistemas   en los que desempeñan un papel importante tipos distintos   de  RNA.  Sin  embargo,  en  el  proceso  intervienen  también    diferentes proteínas previamente sintetizadas. En  resumen,  la  síntesis  de  proteínas  tiene  lugar  de  la   forma siguiente:   •  una molécula de RNA contiene la información genética  para sintetizar un determinado polipéptido, información   que está codifi cada •  otras moléculas de RNA actúan como portadoras al unirse  a un tipo determinado de aminoácido.  Estos dos tipos de moléculas de RNA tienen secuencias  complementarias,  por  lo  que  las  instrucciones  que  están    contenidas en la cadena que posee el código se transfi ere al  RNA que añade el aminoácido a la cadena polipeptídica en   formación. Probablemente los precursores de estos dos tipos   de moléculas de RNA dirigieron la primera síntesis de pro-  teínas sin la ayuda de otras proteínas. En la actualidad, estos procesos de ensamble de aminoá- cidos tienen lugar en la superfi cie de los ribosomas, partículas   complejas constituidas por varias moléculas de RNA de un   nuevo tipo y por lo menos de 50 proteínas. Este RNA tiene   un  papel  catalítico  fundamental  y  constituye  el  60%  del    RNA catalítico que une nucleótidos para formar: RNA catalítico que une     nucleótidos para formar  una nueva molécula con    la misma secuencia y  forma catálisis replicación una copia de sí mismo una copia de otro RNA  una copia de otro RNA  Figura 1-8.     \n8     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  ribosoma.  Esto  destaca,  al  menos  desde  un  punto  de  vista    evolutivo,  la  importancia  del  RNA  en  la  primitiva  síntesis    dirigida de proteínas. De esta forma, el RNA fue capaz de ir creando herra- mientas —en forma de proteínas— para lograr una síntesis   cada vez más efi ciente de sí mismo y de nuevas moléculas  de  polinucleótidos  y  de polipéptidos . La  síntesis  de  proteínas  bajo  la  dirección  de  un  RNA   requirió la evolución de un código, el  código genético , por medio  del cual determinadas secuencias de nucleótidos especifi can el  orden en que se debe acomodar los aminoácidos que forman  la proteína. Este código está formado por conjuntos de tres   nucleótidos o “tripletes”, cada uno de los cuales corresponde   a  un  determinado  aminoácido.  Este  código  parece  haber    sido seleccionado aleatoriamente y está presente en todas las   formas de vida, lo que hace pensar en que todas las células   actuales descienden de una misma línea celular primitiva que   surgió del perfeccionamiento del mecanismo de la síntesis de   proteínas. Una  vez  que  la  evolución  de  los  ácidos  nucleicos  llegó   al punto de disponer de estas moléculas proteicas catalíticas,   llamadas  enzimas,  la  proliferación  del  sistema  replicante  se    RNA catalítico  RNA catalítico   RNA codificado molde    para una proteína   RNA transportador   de aminoácidos RNA transportador   de aminoácidos RNA codificado molde para una proteína Proteí na naciente una copia de otro RNA una copia de otro RNA  Figura 1-9. \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      9  aceleró en gran medida, como ocurre ahora con algunos virus   de algunas bacterias, los cuales se apoderan de la maquinaria   de la célula una vez que entran en ella y dirigen la síntesis de   RNA para automultiplicarse en forma explosiva.  Recientemente dos equipos, uno en Alemania y el otro en  California, han puesto a punto sistemas  biomiméticos , es decir,  sistemas en los que se multiplican  in vitro  ácidos nucleicos, por  lo cual permiten estudiar este problema. Los ácidos nucleicos   DNA y RNA contienen la información genética. Se trata de   polímeros  de  nucleótidos,  los  cuales  se  dividen,  en  función    de  su  estructura  química,  en  purinas  (adenina  y  guanina)  y    pirimidinas (citosina, timina y uracilo). Los ácidos nucleicos   se ligan por medio de enlaces de hidrógeno específi cos entre  los nucleótidos y forman unas estructuras en doble hélice: estas   uniones específi cas son la base física de la herencia. Uno de los   escenarios verosímiles para explicar la aparición de moléculas   portadoras  de  la  información  genética  es  el  de  un  “mundo    RNA”, que propuso el bioquímico norteamericano W. Gilbert   en 1986. Según esta hipótesis, el RNA fue el primero que se   habría  formado,  gracias  al  encadenamiento  de  nucleótidos,    y habría desempeñado, en las células primitivas, el papel de   DNA y el de proteínas, debido en particular a que posee una   actividad catalítica. Luego, en las células más evolucionadas,   el DNA, químicamente más estable que el RNA, se habría   encargado de la conservación de la información genética, y la   actividad catalítica se habría transferido sobre todo a las proteí-  nas. El RNA es actualmente el enlace entre los dos, en forma   de RNA mensajero y como constituyente fundamental de los   ribosomas, que son las máquinas que fabrican proteínas. J.  Ferris  y  sus  colaboradores,  del  Instituto  Politécnico   Rensselaer,  en  el  Estado  de  Nueva  York,  establecieron  al    fi nal de 1993 que se forman pequeños polímeros de nucleóti- dos (oligonucleótidos) por medio de catálisis no biológica. El   dispositivo consiste en una disolución acuosa de nucleótidos,   vueltos artifi cialmente más reactivos que los nucleótidos na-  turales, agitada en presencia de  montmorillonita , con un pH  igual a 8. La montmorillonita es una arcilla natural ácida, que   se utiliza de ordinario en química orgánica como catalizador, a   la cual se fi jan los nucleótidos antes de reaccionar para formar   pequeños polímeros. Se han detectado oligonucleótidos que   constan hasta de once elementos. Es interesante señalar que,   en los ácidos nucleicos que se forman, la mayor parte de los   nucleótidos se une por medio de enlaces idénticos a los que   se encuentran en los RNA y DNA biológicos. Por tanto, es   posible la formación inicial de pequeños polímeros de nucleóti-  dos según un esquema sencillo. No obstante, para validar la   hipótesis del “mundo RNA” también se tiene que encontrar   un mecanismo posible para duplicar los ácidos nucleicos sin   enzimas. El químico norteamericano L. Orgel, pionero de los   estudios sobre la replicación  in vitro  de los ácidos nucleicos,  demostró, en 1983, que los nucleótidos se unen para formar la   hebra complementaria de un ácido nucleico rico en pirimidinas.   En cambio, un ácido nucleico rico en purinas no puede dirigir la  formación de la hebra complementaria. Además, las dos hebras   de una doble hélice de DNA están enlazadas fuertemente, por   lo que no pueden reiniciar de modo espontáneo el proceso y   por eso no hay duplicación. Con el fi n de superar estas difi cultades, es necesario utili- zar pequeños ácidos nucleicos, en vez de simples nucleótidos.   Hace  poco  tiempo,  dos  químicos  californianos,  T.  Li  y  K.    Nicolaou del Instituto de Investigación Scripps, partieron de   una doble hélice de DNA clásica, del tipo Watson—Crick   (véase fi g. 1-10 A ). Añadieron dos oligonucleótidos comple- mentarios  de  una  de  las  hebras  de  la  doble  hélice,  y  los  fi - jaron a la doble hélice con lo cual se formó una hélice triple.   Luego separaron la hebra recién formada de la triple hélice.   La hebra recién formada dirige, a su vez, el ensamble de los   oligonucleótidos que le son complementarios. Se obtiene de   este modo una nueva doble hélice idéntica a la doble hélice   inicial (fi g. 1-10 B ). Se duplicó el DNA. También se examinó  la fi delidad de este proceso de duplicación. Para ello se uti-  lizaron oligonucleótidos en los que uno o varios nucleótidos   no corresponden a la doble hélice inicial. Se constata en este   caso que con un solo error de emparejamiento la triple hélice   se forma con más difi cultad, y que no llega a establecerse del   todo cuando hay dos o tres errores. Por tanto, en este sistema   G   C    G esqueleto  azúcar  −  fosfato par de   bases base    nitrogenada CTA C G   CAT A G   C AT A G C AT  A   T  Figura 1-10A.   Doble hélice de DNA clásica. \n10     Capítulo 1   La célula: evolución y desarrollo de los sistemas celulares  también se pueden copiar algunas secuencias mutadas, pero   con una efi cacia menor.  Unos  químicos  de  la  Universidad  de  Friburgo  crearon   paralelamente otro sistema automultiplicador. El equipo de G.   van Kiedrovski estudió la reproducción competitiva de cuatro   pequeños ácidos nucleicos a partir de dos oligonucleótidos.   Dos de estos ácidos nucleicos dirigen la formación de pro-  ductos autocomplementarios; los otros dos, la de productos   complementarios (véase el lado izquierdo del esquema (BA:   verifi car a qué fi gura corresponde)). Al analizar las velocidades  relativas de síntesis de los cuatro ácidos nucleicos establecieron   que su copia es un sistema autocatalítico, hasta en el caso más   ordinario de una simple complementariedad de los fragmentos   de ácidos nucleicos con la hebra modelo, es decir, independi-  entemente de la secuencia que se duplica. ¿Resuelven  estos  dos  modelos  el  problema  de  la  du- plicación  del  RNA  prebiótico?  El  primero  propone  un    mecanismo  sencillo  para  la  multiplicación  del  DNA,  y  el    segundo muestra que la duplicación del DNA es un proceso   autocatalítico cualquiera que sea la secuencia de DNA. Hay que señalar que en los dos casos, los oligonucleótidos  utilizados están activados, es decir, eran más reactivos que los   nucleótidos naturales, y que se añadieron agentes acopladores   en el momento apropiado: los químicos ayudan a la automul-  tiplicación.  Por  otra  parte,  el  ácido  nucleico  que  se  estudió    en ambos casos es DNA, que es más fácil de sintetizar que el   RNA, aunque se supone que este último apareció primero.    Además,  se  sintetizaron  los  oligonucleótidos  y,  luego,  se    añadieron al medio reactivo, aunque se habrían podido for-  mar de modo natural gracias a la acción catalítica de algunas   rocas como la montmorillonita. Por paradójico que parezca,   no  se  tiene  ninguna  idea  de  la  forma  en  que  surgieron  los    nucleótidos mismos. Según  J.  Ferris,  si  procesos  como  los  descritos  aquí  su- cedieron para dar origen a la vida en la Tierra, estos nuevos   resultados prueban sobre todo que el problema de la duplicación   de los ácidos nucleicos fuera de una célula tiene solución, pero   también que estaban presentes otros catalizadores distintos del   RNA.  Sin  embargo,  es  posible  imaginar  que  fragmentos  de    ácidos nucleicos, formados por catálisis mineral, se condensaron   a veces en fragmentos más grandes. De manera gradual habrían   adquirido las características necesarias para hacer vivir el mundo   del RNA. Las primeras células vivas habrían aparecido al fi nal  de esta evolución.  Formación de la membrana  Es probable que uno de los acontecimientos cruciales en la    evolución  desde  los  sistemas  automultiplicadores  hasta  la    primera célula haya sido la formación de una  membrana . La  necesidad de mantener una alta concentración de proteínas   + + + + +  C C G   C G G  GCCGGC C C G  COMPLEMENTARIEDAD CRUZADA AUTOCOMPLEMENTARIEDAD  REPLICACIÓN BASADA EN UNA CATÁLISIS CRUZADA  DE OLIGONUCLEÓTIDOS, DIRIGIDA POR UNA HEBRA MODELO  GC G   C C G  C G G C G G   C C G C C G   C G G C G G   C G G C G G   C C G C C G   C C G C C G  C C G C C G  C G G C G G   C C G C G G   C C G C G G   C G G C C G  C G G C C G  C C G C C G   C C G C G G   CICLO DE AMPLIFICACIÓN POR UNA TRIPLE HÉLICE  doble hélice inicial (Crick y Watson)  (emparejamiento  de Hoogsteen)   2 triple hélice   agente de condensación disociación 2 agente de condensacióncopia de la doble  hélice inicial  C G  G C C G  C G G C C G GC G   Figura 1-10B.     \nCapítulo 1  La célula: evolución y desarrollo de los sistemas celulares      11  en las proximidades de un sistema automultiplicador de RNA    y de evitar que otros sistemas vecinos se benefi ciaran con las   propiedades catalíticas de estas proteínas (fi g. 1-11) originó   el paso siguiente de la evolución: aislar el sistema de RNA   automultiplicador junto con sus proteínas catalíticas mediante   una  membrana  para  que  sólo  el  RNA  que  las  generaba  las    pudiera utilizar. Existen  unas  moléculas,  llamadas   anfi páticas ,  que  con- tienen una parte hidrófi la (soluble en agua) y una parte lipó-  fi la (insoluble en agua) que se prestan especialmente para la  formación de tales membranas. Estas moléculas se alinean en   la int
