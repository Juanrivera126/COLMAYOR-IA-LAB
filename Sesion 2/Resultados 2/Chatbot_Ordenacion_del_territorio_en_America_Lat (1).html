<script>
    const PDF_TEXT = "  1   Menú principal   Índice de Scripta Nova    Scripta Nova    REVISTA ELECTRÓNICA DE GEOGRAFÍA Y CIENCIAS SOCIALES   Universidad de Barcelona. ISSN: 1138-9788. Depósito Legal: B. 21.741-98   Vol. VI, núm. 125, 1 de octubre de 2002        ORDENACIÓN DEL TERRITORIO EN AMÉRICA LATINA   Ángel Massiris Cabeza   Departamento de Geografía    Universidad Pedagógica y Tecnológica de Colombia  – UPTC      Ordenación del territorio en América Latina (Resumen)   A partir del análisis de las políticas de ordenación territorial de quince países    latinoamericanos, se llega a la detección de un conjunto de rasgos que caracterizan estas   actuaciones en dichos países. Adicionalmente, se documentan algunos obstáculos que   éstos enfrentan para la implementación de sus políticas que, en su conjunto, conducen a   interrogarnos acerca de los límites de lo posible de las mencionadas políticas.    Palabras clave:  ordenación del territorio, América Latina      Land Management in Latin American (Abstract)   From the analysis of the politics of Land Management of 15 Latin American countries,    it is possible to detect a group of features that characterize the behaviors in said   countries in this political area. Additionally, some obstacles that these countries   confront in implementing their politics were research, which combined, are conducive   to the questioning about the limits of the possibilities of the mentioned politics.    Key-words : land management, Latin America     La ordenación del territorio (OT) en los países latinoamericanos tiene una historia muy    reciente que se remontan a los inicios de la década de los ochenta. Desde su origen ha    sido concebida de manera diversa, asociada a las políticas ambientales, urbanísticas, de    desarrollo económico regional y de descentralización. Hoy predomina la idea de la   ordenación como instrumento o estrategia para lograr el desarrollo sustentable,   entendido en términos de política plurisectorial, horizontal.    En el presente artículo se realiza un examen de esta política con la intención de    determinar sus conceptos, alcances, cualidades y obstáculos. Se parte de una discusión   conceptual con la que se pretende contextualizar la política latinoamericana de OT,    luego se revisan los antecedentes de estas políticas para tener una visión retrospectiva,    en la búsqueda de encadenamientos de procesos que permite comprender e interpretar  \n  2   más adecuadamente las acciones y decisiones actuales y, finalmente, se realiza una    síntesis valorativa de sus cualidades, a partir de las cuales se llega a algunas    conclusiones.    El concepto de ordenación del territorio    Por tratarse de un tema incipiente en el contexto latinoamericano, es casi obligado    iniciar su examen con un intento por escudriñar la esencia del mismo, a partir de la   revisión de distintos conceptos y definiciones que se han dado. En este sentido,   podemos afirmar que la ordenación del territorio ha sido objeto de diversas   interpretaciones en el mundo. Un vistazo al cuadro 1 nos permite confirmar dicha   aseveración. En ella se reúne una muestra de definiciones adoptadas en algunos países   europeos y latinoamericanos, las cuales expresan distintas maneras de entender la   naturaleza y objeto de la ordenación.    En cuanto a la naturaleza, se destaca su comprensión como una disciplina científica,    como una técnica administrativa, un estudio interdisciplinario, una política o conjunto   de políticas, un camino, método o búsqueda; un proceso integral, una estrategia de   desarrollo, un conjunto de acciones político-administrativas, entre otras. Tal situación   evidencia que no existe unidad de criterio frente al tema llegándose, incluso a   planteamientos eclécticos como el de la Carta Europea de Ordenación del Territorio   para la cual dicha ordenación es al mismo tiempo una disciplina científica, una técnica   administrativa y una política.    En cuanto al objeto también se observan en el cuadro 1 diversos planteamientos. Todos    ellos llevan explícita o implícitamente la idea de regular u organizar el uso, ocupación y   transformación del territorio con fines de su aprovechamiento óptimo. Este    aprovechamiento se asocia generalmente con el uso sustentable de los recursos naturales    (planificación física-ambiental), en estrecha correspondencia con patrones adecuados de   distribución de asentamientos y de actividades económicas.    Además de las definiciones del cuadro 1, otros autores han conceptualizado la    ordenación del territorio destacando sus rasgos más sobresaliente. Una revisión de estos   planteamientos nos puede ayudar en la intención de esclarecer dicho concepto y acotarlo   como punto de partida del presente trabajo.   Cuadro 1. Conceptos de ordenación territorial   \n  3     Fuente: Elaboración propia.        Para Méndez (1990:96) la ordenación del territorio es un proceso planificado y una   política del Estado, de naturaleza política, técnica y administrativa, que está al servicio   de la gestión ambiental y del desarrollo. Busca organizar, armonizar y administrar la   ocupación del espacio de manera que se puedan prever los efectos que provocan las   actividades socioeconómicas y precisar los medios y líneas de acción apropiados para   alcanzar los objetivos y prioridades de desarrollo, en un todo conforme con las nociones    de uso sostenido y de viabilidad de uso y con los objetivos superiores del bienestar   social, de la calidad de vida y de la valoración del medio ambiente  \n  4   Para Gómez Orea (1994: 2) se trata de una función pública que responde a la necesidad    de controlar el crecimiento espontáneo de las actividades humanas y los problemas y    desequilibrios que este crecimiento provoca, en la búsqueda de una \"justicia   socioespacial\" y una calidad de vida que trascienda el mero crecimiento económico. Tal   función, la concibe el autor, como de carácter \"horizontal\" que condiciona a la   planificación sectorial, al urbanismo y a la planificación económica. En este sentido, el   proceso de ordenación del territorio regula la distribución de actividades en el espacio   de acuerdo con un conjunto de planes que pueden o no constituir un sistema de   planificación territorial; pero también es el resultado de otras regulaciones sectoriales   con incidencia territorial. Sin embargo, la ordenación territorial procura la consecución   de una estructura espacial adecuada para un desarrollo eficaz y equitativo de la política   sectorial y superar la parcialidad de esta política, así como la reducida escala espacial de   la planificación municipal.    Para Hildenbrand (1996; 29)la ordenación del territorio es una de las políticas públicas    típicas del estado de bienestar que nace en la mayoría de los países industrializados   después de la Segunda Guerra Mundial. Sin embargo, afirma este autor, en países como   Alemania, Suiza y Holanda, sus raíces son más antiguas, especialmente en lo referente a   la planificación territorial de nivel subregional que se separa de la planificación   urbanística municipal.    Para Zoido (1998:3) la OT es una función pública, una política compleja y de reciente y    todavía escasa implantación, que puede y debe apoyarse sobre instrumentos jurídicos   (convenios internacionales, leyes, decretos), sobre prácticas administrativas y principios   consolidados (planificación, participación, etc.) y en diferentes conocimientos   científicos y aportaciones pluridisciplinares. En tanto que función pública o política, la   ordenación del territorio es, sobre todo, un instrumento no un fin en sí mismo, un medio    al servicio de objetivos generales como el uso adecuado de los recursos, el desarrollo, y    el bienestar o calidad de vida de los ciudadanos. Tal ordenación lleva implícita la    voluntad y la acción pública para mejorar la localización y disposición de los hechos en   el espacio; especialmente de aquellos a los que atribuimos un sentido estructurante o un   mayor significado respecto a las necesidades y condiciones de vida de quienes lo   habitan.    Más específicamente este mismo autor señala que cualquier actuación de ordenación, a    la escala que sea, consiste principalmente en establecer, para un espacio dado, la   distribución de los usos del suelo y la localización de las estructuras y los sistemas que   posibilitan la mayor integración funcional de todo el territorio planificado. Este   planteamiento, en su estructura más simple o desarrollada, no debe imponerse   indiferenciadamente a cualquier situación, sino ser tomado como punto de partida junto    a los caracteres propios que singularizan cada espacio geográfico (Zoido, 1998: 5).    Para Estaba (1999)la ordenación del territorio se refiere a acciones del Estado    concertadas y dirigidas a buscar una organización del uso de la tierra, con base en la   redistribución de oportunidades de expansión y la detección de necesidades,   potencialidades, limitaciones y ventajas comparativas y competitivas. Su consecución   supone propiciar un sistema de ciudades \"armónico\" y eficientemente integrado a la   globalización, lo que significa salvar las desventajas de las fuerzas de integración de la    globalización y aprovechar las fuerzas de la fragmentación o diferenciación espacial a    los fines de fortalecer centros con capacidad para competir con los dominantes. Del  \n  5   mismo modo, según la autora en referencia, la ordenación debe estimular el desarrollo    de actividades que permitan reducir o reorientar las migraciones, garantizar la calidad    de la infraestructura requerida, y crear ámbitos dotados de equipamientos y mecanismos   que permitan un género de vida comparable con el de las ciudades dominantes. También   implica la superación de contradicciones como explotación económica y preservación   de la naturaleza, eficacia económica y calidad de la ordenación y exige la consideración   del papel que ha de desempeñar cada nivel o escala territorial de actuación o de   gobierno: nacional, regional y local en el desarrollo    Para van Leeuwen (2001) el origen del concepto de ordenación del territorio responde al    intento de integrar la planificación biofísica con la socioeconómica. Siguiendo a   Baeriswyl, define al OT como una \"expresión física del estilo de desarrollo,   considerando los recursos naturales existentes y procurando el beneficio de la sociedad   en función del uso sustentable de los mismos\" (Baeriswyl, 2001:13; citado por van    Leeuwen, 2001). Para este autor, la ordenación del territorio es un proceso, en el cual no    sólo existe preocupación por el uso sustentable de los recursos naturales, sino que   incluye aspectos institucionales, políticos, socio-culturales y económicos. Es un proceso   de re-organización según los objetivos definidos y acordados.    Podríamos afirmar, en síntesis, que la ordenación del territorio es un proceso y un    instrumento de planificación, de carácter técnico-político-administrativo, con el que se   pretende configurar, en el largo plazo, una organización del uso y ocupación del   territorio, acorde con las potencialidades y limitaciones del mismo, las expectativas y   aspiraciones de la población y los objetivos de desarrollo. Se concreta en planes que   expresan el modelo territorial de largo plazo que la sociedad percibe como deseable y   las estrategias mediante las cuales se actuará sobre la realidad para evolucionar hacia   dicho modelo.    Aguilar (1989:109), sintetiza en cinco los puntos centrales de una acción de ordenación    territorial, las cuales están en consonancia con la definición anterior, estos son:     Se trata de una política de Estado     Está contemplada como política a largo plazo     Su instrumento básico es la planificación     Debe conciliar el proceso de desarrollo económico con distintas formas de    ocupación territorial     Tiene como fin último elevar el nivel de vida de la población.  Al ser una política de Estado, la ordenación del territorio concierne a toda la sociedad,    al conjunto de las actividades económicas (Méndez, 1990:98) y a las actuaciones    públicas y privadas. Como política de largo plazo le concierne el establecimiento de    escenarios de uso y ocupación del territorio a ser alcanzados en un horizonte de tiempo   determinado. Como instrumento de planificación está sujeto a los procedimientos   técnicos de la misma que incluyen actividades de pre-diagnóstico, diagnóstico   territorial, formulación de objetivos y escenarios a alcanzar en distintos horizontes de   tiempo (corto, medio y largo plazo), elaboración de los lineamientos estratégicos y   determinación de las acciones a realizar (Méndez, 1990:98; Massiris, 1991, 1993).    En la conciliación del desarrollo económico con las distintas formas de ocupación    territorial subyace una búsqueda de coherencia entre las relaciones sociales de  \n  6   producción y la articulación del espacio. Es conocido que a cada modo de producción,    como forma básica de sociedad, le corresponde un modelo de articulación espacial    (Bataillon, 1977; Claval, 1978; Sánchez, 1981; citados por Sánchez, 1992: 31). Ello   significa que cualquier cambio en los objetivos socioeconómicos irá acompañado de un   cambio en la estructura espacial que lo hará coherente con los nuevos objetivos   (Sánchez, 1992: 31). De acuerdo con esto, la localización de una unidad productiva   busca el lugar idóneo en el espacio para alcanzar sus objetivos y los organismos   públicos tienden a articular el territorio dándole una forma apta para la localización de   las unidades productivas (Foucault, 1976 y 1978; Castell, 1981; Capel, 1990; citados   por Sánchez, 1992: 31).    La búsqueda de la elevación de las condiciones de vida , constituye el fin último de las  políticas de ordenación del territorio, al menos así se establece en las normas que    regulan sus acciones. Tal objetivo hace que dicha ordenación deba realizarse en estrecha    coordinación con las políticas de desarrollo socioeconómico, con las que también se    pretende lograr este objetivo. La relación entre modelo de desarrollo económico y el   modelo de ordenación territorial presupone una articulación armónica y complementaria   entre ambos. En tal sentido, la OT orientará la espacialidad de las inversiones   socioeconómica en consonancia con el modelo de uso y ocupación al que se aspira.    Lo expuesto, plantea cuestiones fundamentales para la valoración de la ordenación del    territorio, especialmente referidas a la relación entre las actuaciones sectoriales   (económicas, sociales,) y plurisectoriales (ambientales, urbanísticas) y las políticas   territoriales, así como los problemas asociados a conflictos entre el interés privado y el   colectivo y entre los procesos económicos y la ordenación del territorio. Conviene   revisar algunos planteamientos que se han hecho al respecto.    Autores como Delmas (1962, citado por Pujadas y Font, 1998:14), Aguilar (1989),    Méndez (1990), Boisier (1998) y, en general, la corriente de la geografía crítica,   reconocen que todo territorio humanizado presenta un orden resultado de la acción de   los agentes productivos privados: agrícolas, pecuarios, industriales, urbanizadores, etc.,   que, a su vez, refleja el modelo de desarrollo económico imperante. Esto plantea una   cierta complejidad del proceso de ordenación: armonizar la acción del sector público   con el interés de los agentes privados también ordenadores del territorio, así como   armonizar el interés privado con el interés colectivo y conciliar los objetivos   económicos con los de la ordenación del territorio. Al respecto, Pujadas y Font   (1998:15) considera que \"los agentes privados tendrán que aceptar los patrones de   ordenamiento establecidos por el sector público, pero también harán sentir su voz para   que el territorio ordenado responda a sus aspiraciones y demandas y permita desarrollar   eficientemente las diversas actividades\".    Por su parte, Boisier (1998:13) refiriéndose a la necesidad que tienen los países    latinoamericanos de una política regional modernamente concebida, plantea que en   ausencia de dicha política lo primero que ocurrirá es que el territorio nacional asumirá   un orden dictado estrictamente por la lógica del capital en su proceso de penetración y   expansión mundial. Se trata de un orden por omisión, porque a juicio de Boisier, el   capital no opera con criterios territoriales sino de rentabilidad. No por ello, sin embargo,   se dejará de producir un ordenamiento territorial que plantea la cuestión de su    coherencia con los intereses superiores de la sociedad.  \n  7   Del mismo modo, Aguilar (1989:90) encuentra una estrecha relación entre los procesos    económicos y el orden territorial. A su juicio la ordenación del territorio \"debe conciliar    el proceso de desarrollo económico con distintas formas de ocupación territorial\" en una   perspectiva de largo plazo y considerando la concertación entre la acción pública y la   privada. Para este autor, los efectos de la ordenación del territorio no se perciben en el   corto plazo, pues implica actuar sobre los procesos económicos y políticos que han   condicionado, a través del tiempo, la actual organización espacial para lograr el   reordenamiento esperado.    En este contexto, Hildenbrand (1996: 32), considera que existe una cierta    complementariedad entre el interés privado y los objetivos de la ordenación del   territorio. Según este autor, son los propios agentes económicos privados quienes   demandan cada vez más regulaciones elaboradas por la ordenación del territorio para   sus decisiones de localización de sus inversiones. Dichas regulaciones se complementan    con los intereses del inversionista en la medida en que contribuyan a mantener los    factores de localización: eficacia de las infraestructuras de transportes, oferta de suelos   equipados para la acogida de parques tecnológicos y de empresas, atractivos culturales y   de residencia de las ciudades, calidad ambiental general de la región. Algo similar a lo   planteado por Hildenbrand está ocurriendo en el proceso de ordenamiento de la cuenca   de Valle de Bravo (Estado de México) que se realiza en la actualidad, donde existe un   interés común entre los propietarios de viviendas campestres en dicha región, así como   de los inversionistas del sector turístico, las entidades gubernativas, las ONG   ambientales y algunas fuerzas sociales de ejidatarios y comuneros para realizar   esfuerzos conjuntos en pro de un ordenamiento de la cuenca que controle el progresivo   deterioro ambiental de la misma y garantice la calidad ambiental (servicios ambientales)   y productividad de la región en el largo plazo.    Podemos concluir afirmando que la ordenación del territorio es un concepto aún en    construcción, de carácter polisémico, sujeto a diversas interpretaciones sin que exista    una definición universal que satisfaga a todos. Una de las referencias más utilizadas   para definirlo es la dada por Carta Europea de la ordenación del territorio  – CEOT-, sin  embargo, los planteamientos de esta carta no son claros conceptualmente. A juicio de   Zoido (1998), la CEOT confunde los resultados con el instrumento al definir la   ordenación del territorio como \"la expresión espacial de la política económica, social,   cultural y ecológica de toda sociedad\"; y complica más las cosas al añadir que es \"a la   vez una disciplina científica, una técnica administrativa y una política\".    Además,al realizarse la ordenación sobre un espacio geográfico concreto, con    características complejas, sobre el cual históricamente han ocurrido y siguen ocurriendo   otros tipos de actuaciones tanto públicas como privadas; la acción ordenadora se    involucra con diversas situaciones, como las expuestas antes, que hacen muy compleja    su comprensión y aplicación.    Características de la política de ordenación del territorio en los países de América    Latina    A partir del análisis de las políticas y/o actuaciones de ordenación del territorio de   quince países latinoamericanos [1] y de un esfuerzo de generalización, se examinan a   continuación algunos rasgos que caracterizan a dichas políticas, éstos son: el origen y    naturaleza diversa, desarrollo incipiente e intención de globalidad; la intención de  \n  8   articulación entre las actuaciones sectoriales y territoriales en las normas y la    desarticulación y descoordinación institucional en la práctica; la débil visión prospectiva    y la escasa participación social. Tales rasgos se examinan a continuación.    Origen y naturaleza diversa, desarrollo incipiente e intención de globalidad   Antes del surgimiento de las políticas de ordenación del territorio, los países    latinoamericanos experimentaron diversas opciones de planificación tanto sectoriales   como plurisectoriales, mediante las cuales se incidía sobre el territorio. Se destacan, en   este sentido, la planificación regional, el urbanismo, la planificación económica y la   ambiental, las cuales evolucionaron paulatinamente hacia la ordenación del territorio   (figura 1).    La planificación regional consistía básicamente en planes de carácter económico, con    visión plurisectorial, aplicados a ciertas áreas con problemas de retraso en sus    condiciones de desarrollo, basados en estrategias e instrumentos diversos, que no   constituían propiamente una actuación de ordenación del territorio, pues, aunque se   concebían en términos plurisectoriales, carecían de la visión global que caracteriza a la   OT. La primera estrategia utilizada fue la planificación de cuencas hidrográficas,   iniciada desde la década de los años 40, siguiendo el modelo de la Tennessee Valley   Authority  – TVA-. De Mattos (1986: 272, 276-277) destaca, en este sentido, los  proyectos de desarrollo regional realizados por la Corporación del Santa (Perú, 1943), la   Comisión de Papaloapan y la de Tepalcatepec (México, 1947), la Comisión del Valle de   San Francisco (Brasil, 1948), la Comisión Nacional del Río Negro (Uruguay), la   Comisión del Grijalva (México, 1951), la Corporación del Valle del Cauca (Colombia,   1954), la Comisión del Río Balsas (México, 1960) y la Corporación Nacional del Chocó   (Colombia, 1968). Otras estrategias de desarrollo regional utilizadas estuvieron    asociadas a políticas deregionalización, polos de desarrollo o crecimiento y desarrollo    rural integrado, entre otras.    El urbanismo o planificación urbana, por su parte, comenzó a adquirir trascendencia en    nuestros países desde la década de los años cincuenta asociada a la preocupación por el   crecimiento acelerado de las principales ciudades de la región y el reconocimiento del   papel de los sistemas urbanos como vertebradores de los territorios. Hacia los años   setenta ya existían planes y normas reguladoras de uso del suelo urbano en algunos de   los países analizados (Argentina, Colombia, Cuba), mientras que en otros comienzan   también a regularse los sistemas de asentamientos, como en el caso de México, con la   Ley General de Asentamientos Humanos de 1976.     \n  9     Figura 1. Evolución de la planificación sectorial, plurisectorial y territorial en    América Latina.    Fuente: Elaboración propia.         En algunos países de América Latina la ordenación del territorio nació ligado o como   evolución de la planificación urbana. En el caso de Argentina, en la Provincia de   Buenos Aires [2] , desde 1977 se promulgó la ley sobre ordenamiento territorial y usos   del suelo, con fuerte énfasis urbanístico. En Cuba, desde 1978, la OT ha estado asociado    a la planificación física y el urbanismo, lo cual es reforzado y consolidado con el   Anteproyecto de Decreto de Ley de la Planificación Física que se encuentra actualmente   en proceso de aprobación. En Colombia la planificación de los usos del suelo urbano se   adoptó legalmente en 1979, a través de la Ley 9 de ese año (Código Sanitario), ampliada   en 1986 al promulgarse el Decreto 1333 (Código de Régimen Municipal) y mejorada    tres años después mediante la Ley 9 de 1989 (Ley de Reforma Urbana), que constituyó    la base de la actual Ley 388 de 1997 reguladora de la ordenación del territorio   municipal y distrital (Massiris, 1999). En Chile, la ordenación del territorio también ha   estado ligado en sus orígenes al urbanismo y aún hoy no existen normas específicas de   OT, siendo sus principales soportes la Ley General de Urbanismo y Construcciones   (LGUC) y la Ordenanza General de Urbanismo y Construcciones (OUGC).    En cuanto a la planificación ambiental, el interés por regular el uso y aprovechamiento    de los recursos naturales empieza a adquirir importancia en los países de América   Latina desde los años setenta y ochenta [3] , asociado inicialmente al enfoque del   \"ecodesarrollo\", término que fue usado por primera vez en 1973 por Maurice Strong,    para dar a entender una idea de desarrollo económico y social que tomara en cuenta la   variable ambiental (Salinas, 1998).    El enfoque del ecodesarrollo llegó a los países latinoamericanos en los años de la    década de 1980, pero tuvo una vida muy corta, pues rápidamente fue absorbido por el   concepto de desarrollo sustentable impulsado a partir del Informe Brundtland \"Acción   para un Futuro Común\" en 1987. Posterior a este informe y previo a la Cumbre de Río   de 1992, los países latinoamericanos realizaron esfuerzos para elaborar una visión de   conjunto acerca del problema del desarrollo y el medio ambiente. En efecto, con el   auspicio del PNUD y el BID se conformó en 1989 una comisión encargada de elaborar    dicha visión para ser presentada en la Cumbre de Río, conformada por representantes de    distintos países latinoamericanos así:  \n  10   Argentina: Gilberto Gallopín, Aldo Ferrer, Pablo Gutman, Jorge Ardoy, Jorge Morello,  Héctor Sejenovich y Juan Novara.  Bolivia: Fernando Romero.    Brasil: Joao Almino, Eneas Salati y María de Lourdes Davies de Freitas.    Colombia: Mario Calderón (q.e.p.d.) y Margarita Marino de Botero.    Costa Rica: Carlos Quesada y Álvaro Umaña.   Chile: Guillermo Mann y Vicente Sánchez.    Ecuador: Diego Carrión.    México: Alicia Bárcena, Alejandro Toledo y Fernando Ortiz Monasterio.    Perú: Marc Dourojeanni.    Trinidad y Tobago: Winston Rudder.    Venezuela: Arnoldo Gabaldón.   La Comisión recibió contribuciones de Guillermo Archibold (Panamá), Edward Backus    (Conservación Internacional), Nicolo Gligo (CEPAL), Bernard Hermes (Guatemala)   Yolanda Kakabadse (Ecuador), Pedro Malan y Pedro Ramos de Sousa (Brasil), Ives   Renard (Santa Lucía), Seeparsad Ramnarine (Trinidad y Tobago) y Manuel Winograd    (Fundación Bariloche), entre otros.    El documento final de este trabajo se conoció en 1990 bajo el título de Nuestra Propia    Agenda sobre Desarrollo y Medio Ambiente, en el cual se hace un diagnóstico de la   realidad latinoamericana y se proponen las bases para la construcción de la estrategia de   desarrollo sustentable. Dichas bases las constituyen siete grandes líneas maestras: a) la   erradicación de la pobreza, b) el aprovechamiento sustentable de los recursos naturales,   c) la ordenación del territorio, d) el desarrollo tecnológico compatible con la realidad   social y natural, e) Una nueva estrategia económica y social, f) La organización y   movilización social, y g) La reforma del Estado (Comisión de Desarrollo y Medio   Ambiente de América Latina y el Caribe, 1991).    La visión de desarrollo sustentable planteada en el documento en referencia integra a    este concepto la dimensión espacial, al considerar la ordenación del territorio como una    de las líneas maestras para lograr dicho desarrollo, entendiendo la OT como   la\"distribución geográfica de la población y sus actividades de acuerdo con la integridad   y potencialidad de los recursos naturales que conforman el entorno físico-biótico. Todo   ello, en la búsqueda de unas condiciones de vida mejores\"(Comisión de Desarrollo y   Medio Ambiente de América Latina y el Caribe, 1991).    Posterior a la Conferencia de Río, en 1994 se realizó una cumbre de presidentes    centroamericanos (Cumbre Ecológica Centroamericana) en Nicaragua, en la que    participaron los primeros mandatarios de Costa Rica, El Salvador, Guatemala,  \n  11   Honduras, Nicaragua, Panamá y Belice. Uno de los compromisos que asumieron los    mandatarios de estos países fue el de instruir a las autoridades correspondientes para    iniciar las acciones necesarias a efecto de establecer planes de ordenación del territorio.    En la segunda mitad de los noventa, los países latinoamericanos intensificaron sus    políticas ambientales a partir de la aprobación de leyes ambientales y la creación de   ministerios e instituciones encargadas de la gestión ambiental (cuadro 2). En la segunda   mitad de los años noventa, países como Bolivia, Ecuador, El Salvador, Honduras,   Nicaragua y República Dominicana conciben la ordenación del territorio como un   instrumento de gestión ambiental (cuadro 3), especialmente asociadas a zonificaciones   de usos del suelo, considerando las potencialidades del mismo y la necesidad de   preservar, conservar y/o recuperar el patrimonio natural e histórico-cultural.    De este modo, en los años noventa se inicia en los países latinoamericanos la    elaboración de planes de ordenación [4]  (cuadro 4) y a la elaboración de regulaciones   jurídicas [5]  (cuadro 2) las cuales a pesar de que reconocían la transversabilidad e   intersectorialidad de la ordenación del territorio e involucraban elementos de    planificación ambiental y urbano-regional (cuadros 3 y 4), no resolvían la necesidad de   concurrencia de los planes ambientales, socioeconómicos y urbanísticos, según el   ámbito de actuación; presentándose, incluso, situaciones conflictivas, derivadas del   hecho de que cada uno de estos planes estaba soportado por normas legales distintas,   concebidas independientemente. En México, por ejemplo, los actuales programas   estatales de OT carecen de soporte jurídico propio, en tanto que sí lo tienen los planes   de ordenación de asentamientos humanos y los de ordenación ecológica. En Colombia,   se deben elaborar planes de desarrollo socioeconómicos, ambientales y de OT cada uno   soportado en una ley diferente. En Venezuela, actualmente se discute en la Asamblea   Nacional, la integración de la normatividad y de la gestión urbanística, ambiental y    territorial; existe, en este sentido, la tendencia a convertir la Ley Orgánica para la    Ordenación del Territorio en Ley Orgánica de OT, urbanismo y medio ambiente    (Asamblea Nacional, 2001).    Dentro de este contexto, la ordenación del territorio se ha concebido como una política    de planificación que integra objetivos ambientales (planificación física-espacial) y   regionales (planificación territorial), en función de la escala, predominando en las   escalas locales la planificación física-espacial con fuerte contenido urbanístico y en las   escalas regionales la planificación territorial que busca una ocupación sustentable del   territorio y un mayor equilibrio del desarrollo regional.       Cuadro 2. Algunos hitos en la evolución de la política de ordenación del    territorio en los países de América Latina   \n  12     \n  13     Fuente: Elaboración propia.       Cuadro 3. Concepto de ordenación del territorio en algunos países    latinoamericanos   \n  14     \n  15     Fuente: Elaboración propia       Cuadro 4. Instrumentos de ordenación territorial en los países de América    Latina, según ámbitos territoriales   \n  16     \n  17     Fuente: Elaboración propia.        Adicionalmente, en algunos países latinoamericanos se vincula la ordenación del    territorio con la organización política administrativa y las políticas de descentralización,   situación que genera confusión respecto a la naturaleza de esta política. Esto es evidente   en Colombia en donde por un lado la Constitución Política se refiere a la ordenación del   territorio en términos de la organización territorial del país y, por otro, los sectores   políticos y gubernativos lo consideran como un instrumento de descentralización    territorial. La confusión se presenta porque mientras en los ámbitos políticos y    gubernativos de este país la ordenación se concibe en los términos político-  administrativos, en la Ley de Desarrollo Territorial (Ley 388 de 1997) se concibe,   además, en términos de planificación física-espacial y urbanística.    Algo similar está ocurriendo en Argentina, donde el tema comienza a adquirir    importancia con la entrada al Parlamento, en el año 2000, del \"proyecto de Ley de   Ordenamiento y Desarrollo Territorial\". Dicho proyecto declara de \"interés nacional el   ordenamiento territorial\" y se asocia estrechamente con las políticas de   descentralización territorial (Diario El País, 2000). Igual situación ocurre en Honduras,   en donde se discute actualmente un proyecto de ley promovido por la Secretaría de   Recursos Naturales y Ambiente, entidad que también lidera la formulación de una   estrategia y una política nacional de OT orientada a racionalizar el uso de los recursos    naturales y establecer políticas adecuadas para el uso, manejo y ocupación futura del    territorio nacional (Gobierno de Honduras, 1999; Diario La Prensa, 2000). De acuerdo   a lo establecido en el proyecto de ley en referencia, con la ordenación territorial se   pretende establecer, desde la perspectiva del territorio, una base coherente de normas   que apoyen los procesos de descentralización del Estado y de participación ciudadana   en la definición de un proyecto nacional de desarrollo. Todo ello, a través de la   identificación, organización, regulación y determinación de los usos, reservas y destino   de las diferentes zonas del territorio, en función de sus correspondientes potencialidades    y limitaciones (Gobierno de Honduras, 1999).  \n  18   Del mismo modo, en Venezuela, con la llegada al poder del presidente Hugo Chávez la    ordenación del territorio de este país comienza a concebirse como apoyo a la política de    descentralización. En efecto, el nuevo gobierno, a través de la Comisión de Ambiente y   Ordenación del Territorio, elabora un nuevo \"Plan Nacional de Ordenamiento   Territorial\" (PNOT) y lo presenta en el año 2000 al Congreso de ese país. El proyecto   de PNOT fue sustentado en el Senado de la República como una estrategia para   \"localizar a cada actividad en la región más óptima para ello, a fin de propiciar la   descentralización\" (Díaz, 2000).    Los planteamientos expuestos manifiestan, por un lado, el surgimiento paulatino de    políticas y planes regionales, urbanísticos, económicos y ambientales, todos incidiendo   sobre el territorio desde una óptica sectorial, sin dar respuestas a los cada vez más   complejo problemas territoriales. Dentro de este contexto, la ordenación del territorio   surge con una intención manifiesta de dar un tratamiento integral, desde una    aproximación global, a la problemática de los territorios. El énfasis se pone en la    planificación física-espacial y sus finalidades se concentran en el uso sustentable de los   recursos naturales, la localización adecuada de las actividades productivas e   infraestructuras y la búsqueda de equidad en el desarrollo regional, lo que es evidente en   el concepto de ordenación del territorio adoptado por dichos países (cuadro 3).    Intención de articulación entre las actuaciones sectoriales y territoriales en las normas,    desarticulación y descoordinación institucional en la práctica  Tal como se consideró antes, la ordenación del territorio, dado su carácter global y   comprehensivo, plantea la necesidad de articulación con las políticas sectoriales. En los   países latinoamericanos esta articulación aunque subyace en la conceptualización de las   normas ha estado ausente en la práctica, quizás por lo incipiente de las políticas de OT    de estos países y la aún inexistencia de una organización institucional propia. Dicha    organización apenas comienza a vislumbrarse en las normas reguladoras de la   ordenación existentes o en ciernes [6]  y, es allí, donde se observan algunas tendencias de   articulación que de hecho, por ahora constituyen solo una intención. Específicamente    son dos las tendencias que se observan en la normatividad examinada: una que hemos   denominado articulación operativa y la otra, articulación orgánica.    La tendencia de articulación operativa busca mantener la separación entre las políticas    sectoriales y plurisectoriales y las de ordenación del territorio, pero bajo unas relaciones   de interdependencia, de modo que la OT establece un marco de referencia territorial   para los planes sectoriales y plurisectoriales y coordina / armoniza la incidencia   territorial de éstos, pero, a su vez, toma en cuenta las previsiones de los planes   sectoriales y plurisectoriales y procura insertarlas dentro de una concepción territorial    de carácter globalizador y armonizador. Esta intención es evidente en los proyectos de    \"Ley de Ordenamiento Territorial\" de Bolivia y Costa Rica, en la Ley de Desarrollo   Territorial de Colombia y en la Ley Orgánica para la Ordenación del Territorio de   Venezuela (cuadro 5).    La tendencia de articulación orgánica va más allá de las relaciones de    complementariedad entre los planes sectoriales y territoriales para plantear la   integración funcional de éstos, bajo criterios estratégicos y/o ambientales. De este    modo, el plan de ordenación incorporará en sus estrategias y regulaciones los objetivos    urbano-regionales, urbanísticos y ambientales en lo referente a su espacialidad, aunque  \n  19   las políticas sectoriales siguen operando en lo concerniente a sus objetivos estructurales.    Esta intención es evidente en los programas estatales de ordenación del territorio de    México, así como en el \"Anteproyecto de Decreto de Ley de Planificación Física\" de   Cuba y en el \"Proyecto de Ley de Ordenamiento y Desarrollo Territorial de Uruguay\"   (cuadro 5).    La organización institucional demandada por la gestión de la ordenación del territorio,    apenas está en ciernes en países como Bolivia, Colombia, Costa Rica y Uruguay   (cuadro 6), asociado a proyectos de ley que se encuentran en los órganos legislativos de   dichos países. En la actualidad con excepción, quizás de Venezuela [7] , no existe en los   países latinoamericanos una organización propia para la gestión de la ordenación, ni un    marco legal que regule, con visión integral, las actuaciones planificadoras. La gestión de   la ordenación del territorio normalmente es realizada por organismos de carácter   ambiental, de desarrollo social y/o urbanismo como se puede observar en el cuadro 6.    Los países latinoamericanos enfrentan serios obstáculos para hacer posible el trabajo    articulado y coordinado que demanda la visión global de la ordenación del territorio.   Obstáculos que, además de la inexistencia o debilidad de la organización institucional   para la gestión, incluye la inexperiencia en el trabajo interinstitucional y la tendencia a   pensar el territorio desde una perspectiva sectorial; así como la ausencia de una cultura   del trabajo coordinado, interdisciplinario y abierto, que facilite el intercambio fluido de   información entre los distintos organismos que participan en la gestión en un mismo   ámbito territorial y entre los distintos ámbitos, así como la sinergia asociada a la   complementación de acciones y que evite la entropía de información y duplicidad de   esfuerzos, propia de las actuaciones descoordinadas y desarticuladas que han   predominado en la evolución de las distintas formas de planificación indicadas en la   figura 1.    También es evidente los problemas existentes en la comunicación interinstitucional e,    incluso, entre las propias dependencias de un mismo organismo o entidad. Del mismo   modo, son comunes en nuestros países los celos de las instituciones en relación con sus   competencias y son la información que cada entidad produce, obstaculizando la   transferencia de información y la posibilidad de estandarizar indicadores, escalas, etc.,   situación que afecta seriamente la elaboración de productos diagnósticos integrados   requeridos como apoyo a la toma de decisiones para la ordenación del territorio.   Cuadro 5. Cualidades de las políticas latinoamericanas de OT, según las normas    aprobadas y leyes de OT en trámite*   \n  20     \n  21     * Los países no incluidos, carecen de normas nacionales que regulen la ordenación territorial.   Fuente: Elaboración propia.       Cuadro 6. Organismos responsables de la OT existentes y en ciernes en los países    de América Latina, según ámbito territorial   \n  22     \n  23     Fuente: Elabora ción propia.        Es muy ilustrativo de lo planteado, la evaluación realizada por el Instituto de Geografía    de la Universidad Católica de Chile en 1999, en donde se establece que \"es notable la   dispersión de las competencias públicas relativas al ordenamiento territorial en una   multiplicidad de órganos de distinto rango y naturaleza que operan de manera   inorgánica, descoordinada, con paralelismo y ambigüedad de funciones y de   responsabilidades\", debido, en gran medida, al hecho de que, \"por una parte, la    ordenación del territorio es un tema de carácter horizontal que demanda esfuerzos    transversales, intersectoriales, interdisciplinarios, sistemáticos e integrales, y por otro,  \n  24   en muchos casos los instrumentos de planificación territorial disponibles son de carácter    sectorial... y, por lo tanto, no fueron concebidos con fines de ordenación territorial,    aunque en la práctica algunos han derivado en eso\". La evaluación establece, además, la   existencia de una \"gran dispersión, incoherencia y falta de estructuración de la   legislación sectorial vigente, lo que provoca un gran desconocimiento de sus alcances   normativos y un alto grado de incumplimiento de dicha legislación\". (CONAMA e   Instituto de Geografía de la Universidad Católica de Chile, 1999).    Débil visión prospectiva    La débil visión prospectiva es otro de los rasgos comunes de las políticas    latinoamericanas de ordenación del territorio. Su análisis se realiza a partir de dos   indicadores: la formulación de objetivos a largo plazo y la incorporación en el proceso   de toma de decisiones de criterios y métodos provenientes de la prospectiva,    especialmente visiones alternativas de futuros deseados, escenarios alternativos de    futuros posibles y métodos para lograr transformar los deseos, expectativas y   conocimientos en imágenes objetivo que sirvan de Norte para las actuaciones de   ordenación del territorio (Gabiña, 1998; Massiris 2000, 2001).    Los objetivos de largo plazo se encuentran explícitos en la gestión del OT, existente o    en ciernes, de Bolivia, Colombia, Costa Rica, El Salvador, México y Uruguay. En   Bolivia los planes se conciben a 10 años, en tanto que en Colombia la \"Ley de   Desarrollo Territorial\" lo establece a 9 años, en México es de 20 a 25 años y en   Uruguay el \"Proyecto de Ley de Ordenamiento Territorial\" concibe los planes de OT   para ser formulados sin plazo de vencimiento formal, pero con revisión cada 7 años   (cuadro 5). En el caso de Costa Rica, como resultado de unos talleres de reflexión   prospectivas realizados en 1997, se ha propuesto un horizonte de tiempo de 25 años    para los objetivos de largo plazo del OT (SINADES, 1997). En El Salvador,    recientemente se iniciaron estudios para la formulación de un \"Plan Nacional de   Ordenamiento y Desarrollo Territorial\"  – PNDT-, con un horizonte de tiempo de 5 años  en el corto plazo, de 10 a 15 años en el mediano plazo y de 25 años en el largo plazo   (Viceministerio de Vivienda y Desarrollo y Urbano, 2002).    Como se observa no todos estos horizontes de tiempo coinciden con una visión    prospectiva, la cual generalmente es superior a los 15 años. Es necesario considerar,   además, que no es suficiente formular objetivos de largo plazo, sino que éste se   convierta en una guía efectiva para las acciones del presente, aspecto que implica una   continuidad en los planes en el tiempo, la cual presenta serias limitaciones en nuestros   países, por la inexistencia de una cultura político-administrativa que valore los objetivos   de largo plazo. Por lo general se actúa y planifica el futuro en función de los períodos de    gobierno, como se planteará más adelante.    El otro indicador de la visión prospectiva es la utilización de criterios y métodos    prospectivos en el proceso de formulación de los planes. En este sentido, se destacan   países como Bolivia, Colombia, Costa Rica y México.    En Bolivia, la metodología que guía el proceso de formulación de los planes de OT    establece la elaboración de una imagen objetivo, entendida como una visión territorial  de largo plazo, como una síntesis de la situación ideal, deseable, pero al mismo tiempo   posible a ser alcanzada en el mediano y largo plazo. La elaboración de dicha imagen  \n  25   debe realizarse con participación de los actores sociales y será el resultado de un    escenario deseado que se confronta con los escenarios tendenciales para obtener un    escenario óptimo o propuesta de uso (Ministerio de Desarrollo Sostenible y   Planificación, 1999b).    En Colombia, las guías metodológicas para la formulación de planes de OT elaborada    por el Instituto Geográfico Agustín Codazzi, proponen la prospectiva como un proceso   necesario y aportan un marco conceptual y metodológico para su incorporación en la   formulación de los planes urbanos, municipales y departamentales de ordenación   territorial (Instituto Geográfico Agustín Codazzi, 1996, 1997a, 1997b).    En Costa Rica, para garantizar una buena documentación de apoyo a la definición del    marco jurídico y la gestión de la ordenación, el Gobierno de este país estableció un   convenio con el Banco Interamericano de Desarrollo para financiar el \"Proyecto de    Apoyo al Sistema Nacional para el Desarrollo Sostenible\" (SINADES). En desarrollo de    este proyecto, en 1997 se creó la Comisión Técnica Consultiva de OT encargada de la   realización de estudios y consultas conducentes a la elaboración de un proyecto de \"Ley   Orgánica de Ordenamiento Territorial\". A finales de 1997, la Comisión mencionada    organizó la realización de unos talleres de reflexión prospectiva para vislumbrar los    escenarios posibles del desarrollo costarricense y determinar una estrategia de OT para   el 2025 y se realizaron los estudios \"Base conceptual y metodología para los escenarios   de ordenamiento territorial\" (Lüke 1998) y el estudio sobre \"Escenarios de uso del   territorio para Costa Rica en el año 2025\" (Dengo et al, 1998). Todas estas actividades    han establecidos las bases para la incorporación de la visión prospectiva en la política    costarricense de OT.    En México, tanto los términos de referencia elaborados por el Grupo Interinstitucional    de OT [8]  en el año 2000, como las guías metodológicas elaboradas por el Instituto de   Geografía de la UNAM [9]  en el año 2001, ambos orientados a apoyar la elaboración de   programas estatales de ordenación territorial; coinciden en plantear la elaboración de    distintas imágenes de futuro (escenarios) como apoyo a la formulación de los modelos   de ocupación de los territorios estatales. Básicamente se considera un escenario   deseado, escenarios tendenciales y escenarios alternativos. Las guías metodológicas   para la formulación de planes de ordenamiento ecológico elaboradas por el Instituto   Nacional de Ecología (INE) también incluyen la elaboración de escenarios tendenciales   y alternativos para la elaboración de los modelos de ordenación ecológica.    Estas intenciones constituyen, en cierto modo, los gérmenes de la visión prospectiva de    la ordenación del territorio en los países latinoamericanos. En la práctica dicha visión   sólo tendrá un desarrollo notable en la medida en que se desarrolle también la política    de ordenación y se gane experiencia en el uso de los métodos prospectivos, tema que en    la actualidad es de dominio de un reducido grupo de expertos. Asimismo, se requieren   cambios importantes en la actitud tradicional de los gobernantes y en la cultura de la   planificación pública, pues se hace necesario garantizar la continuidad de los planes en   el tiempo, de modo que en el decurso de varios períodos de gobierno se pueda ir   construyendo el escenario adoptado. Lograrlo no es fácil, dada la cultura política y   administrativa prevalente en nuestros países, caracterizada por el desconocimiento que   hacen los nuevos gobernantes de los objetivos y proyectos de sus antecesores, lo cual es    dramático cuando la sucesión corresponde a partidos políticos contrarios o distintos. A  \n  26   esto se suma la inexistencia de una apuesta concertada de futuro, un proyecto político de    Nación que indique el rumbo hacia el cual se dirige los países.    Escasa participación social    La participación social es otro de los rasgos presentes en la conceptualización y  normativización de la ordenación del territorio en los países latinoamericanos. No    obstante, en la práctica ésta se da en grado y formas diferentes. En Venezuela es casi   nula, aunque la Ley Orgánica de OT de dicho país admite esta participación en la   formulación de los planes urbanísticos, a través de audiencias. En países como Bolivia,   Costa Rica y Uruguay, sus proyectos de ley de OT establecen la participación   ciudadana, mediante comités de vigilancia, cabildos, audiencias públicas, plebiscitos y   el envío de observaciones (cuadro 5). En la mayoría de los casos, la participación social   sólo tiene un carácter consultivo y, por tanto, no incide significativamente en las    decisiones finales. Normalmente consiste en usar a unos pocos ciudadanos para tratar de    mostrar un plan consensuado y, por lo tanto, legítimo socialmente, contrario a la   naturaleza de un verdadero proceso participante, consistente en una negociación social y   política del poder sobre el espacio, una construcción colectiva del modelo de uso y    ocupación del territorio que se propone como imagen objetivo (Massiris, 2001).  Colombia es, quizás, el país donde la normatividad establece unas condiciones   favorables para una participación ciudadana más proactiva. Según la Ley de Desarrollo   Territorial los planes municipales y distritales deben ser el resultado de un proceso de   discusión y concertación con los actores sociales del municipio, en todas sus etapas:   preliminar, diagnóstico, formulación, aprobación y ejecución. Dicha Ley y normas   reglamentarias posteriores establecen distintos mecanismos de participación para cada   etapa. Se destacan las audiencias públicas y cabildos abiertos, así como las mesas de    concertación y los comités de seguimiento (Congreso de la República de Colombia,    1997). Del mismo modo, la Constitución Política (CP) de 1991 ha puesto a disposición   de la comunidad instrumentos tales como el Derecho de Petición [10 ], la Revocatoria del   Mandato [11] , la Acción de Grupo [12] , las veedurías ciudadanas [13] , la Acción de   tutela [14 ] y la Acción de Cumplimiento [15] , mediante los cuales, los ciudadanos podrán   exigir el cumplimiento de los planes o el respeto a sus derechos, si considera que las    autoridades están haciendo caso omiso del mismo o si se está violando alguno de sus   derechos. Además de la concertación con los actores sociales, los planes municipales de   OT de Colombia deben ser aprobados por las corporaciones regionales de desarrollo   (autoridad ambiental), por el consejo de planificación, por el concejo municipal y por la   junta metropolitana [16]  (figura 2).     \n  27     Figura 2. Instancias de concertación y aprobación de los planes de ordenación    municipales y distritales colombianos.   Fuente: Elaboración propia, a partir de la Ley 388 de 1997.        A pesar de lo anterior, la aplicación que se ha hecho de estos instrumentos en Colombia    dista mucho aún de una participación activa y decisiva de la ciudadanía, debido a la    incredulidad frente al proceso y de cierto temor de los ciudadanos para dicha   participación. La incredulidad es alimentada por cien años de centralismo exacerbado y   de menosprecio por la participación de la ciudadanía, aún en los asuntos locales. El   temor está asociado al conflicto armado que azota a este país y que ha sacrificado la   libertad de expresar libremente las ideas, ante el temor a ser eliminado físicamente por   algunas de las fuerzas en conflicto. Adicionalmente, ha existido en muchas    administraciones municipales cierto desinterés por promover la participación social.    En general, es notable en los países latinoamericanos, la ausencia de una cultura de la    planificación participante y el escaso dominio de metodologías de consensos y de   resolución de conflictos en los procesos de concertación, que permitan, por ejemplo,   evitar que los actores poderosos impongan sus intereses individuales por encima del   interés colectivo. El carácter integrador de la ordenación del territorio implica un mayor   impulso de la participación social y de la concertación como requerimientos necesarios   para dar legitimidad a los planes de ordenación y, como lo plantea Benabent (2001),   para un mayor entendimiento del proceso de planificación como procedimiento de   coordinación de actuaciones.    Conclusiones   De todo lo expuesto se puede concluir que:    1. Prevalece en la normatividad existente y en ciernes, la concepción de la ordenación    del territorio como una práctica planificada, complementaria de la planificación   sectorial, mediante la cual es posible dar un tratamiento integral a la problemática de los   territorios; utilizando como estrategia la planificación física espacial dentro de un   contexto ambiental (desarrollo sustentable). No obstante, en su instrumentación, no    existe claridad sobre los mecanismos de articulación necesarios para armonizar las    acciones sectoriales y territoriales, ni sobre sus diferencias y complementariedades, lo  \n  28   que lleva a que a menudo la ordenación del territorio se confunda con la planificación    ambiental y el urbanismo. Aún se está lejos de concebir el plan de ordenación como un    marco orientador de las políticas sectoriales en la búsqueda de una ordenación integral   del territorio.    2. Con excepción de Venezuela y Colombia, predomina en los países estudiados la    práctica de la ordenación territorial sin respaldo legal propio (normas específicas   reguladoras), situación que manifiesta una debilidad normativa de esta practica en los   países latinoamericanos y, en consecuencia, serios obstáculos para la articulación con   las otras prácticas de planificación. Es diciente el caso mexicano donde la ordenación   territorial carece de soporte jurídico, en tanto que sí lo tienen los planes de ordenación   de asentamientos y los programas de ordenación ecológica. A lo anterior se suma el   hecho de que, con excepción de Bolivia y Venezuela, es común que la práctica   ordenadora no abarque la totalidad de las distintas instancias territoriales de los países:    nacional, regional, departamental (estatal, provincial) y municipal, según cada caso. En    Uruguay, por ejemplo, solo algunos departamentos como Montevideo están elaborando   planes de ordenación, algo similar ocurre en México, donde solo se realizan programas   de ordenación territorial en las entidades federativas. En Argentina y Nicaragua se   realizan planes en los ámbitos departamentales y municipales, pero no existe política   nacional. En Colombia se realizan planes municipales que incluyen la ordenación   urbana y se dan directrices departamentales, sin que exista una política nacional. En   Costa Rica se realizan planes reguladores cantonales con fuerte énfasis urbanístico y no   existen lineamientos departamentales ni nacionales. Todo esto conduce a una práctica   espacialmente fragmentada de la ordenación, que en nada contribuye al manejo   coherente del territorio.    3. No existe una organización administrativa que favorezca la gestión integral de la    ordenación del territorio, la cual se realiza a partir de sistemas institucionales    sectoriales, muy alejados del carácter global y horizontal que es connatural a la    ordenación. En este sentido es necesaria la implementación de un sistema jerarquizado   de planificación en el que la planificación urbanística, ambiental y de desarrollo   socioeconómico se vincule con la planificación territorial tanto en sentido horizontal   como vertical, garantizando de este modo, la prevalencia de la gestión integral y el   entendimiento del proceso de planificación como procedimiento de coordinación de   actuaciones. Esta integridad se hace aún más necesaria en las escalas regionales, donde   la planificación del desarrollo regional y la ordenación territorial constituyen   instrumentos complementarios, a partir de cuya confluencia es posible establecer el   modelo económico-territorial.    4. La participación social en los procesos de ordenación es débil. Prevalece en los    planes la visión de territorio y objetivos de las instituciones de Gobierno responsables    de los planes y de los grupos empresariales y corporativos poderosos que imponen, en   última instancia, su voluntad e intereses y condicionan la acción ordenadora del Estado.   A esto se suma que los agentes planificadores no se circunscriben a su papel técnico y   con frecuencia se comprometen con algunas fuerzas sociales, lo que sesga su labor. En   este sentido, es común en los países latinoamericanos, que los actores poderosos   presionen sobre los agentes planificadores para inducir cambios en los usos del suelo en   una dirección favorable a sus intereses individuales. También es común que los agentes    planificadores sean proclives aactuar en función dichas presiones. El carácter integrador    de la ordenación del territorio exige un compromiso con el apoyo a la participación  \n  29   social y a la concertación como forma de hacer de la ordenación un proceso de    construcción colectiva del uso y ocupación deseado del territorio.    5. En relación con la capacidad técnica no hay duda que aquí existe otra dificultad,    especialmente ligada a la calidad de la información que demandan los estudios   diagnósticos y prospectivos para la elaboración de planes de ordenación del territorio y   a las tendencias existentes respecto al manejo de dicha información. La mayoría de los   países latinoamericanos carecen de sistemas nacionales de producción de información   territorial que articulen a las diversas instituciones, que desde perspectivas sectoriales,   generan dicha información. A menudo es imposible integrar información de distintas   instituciones, por no corresponder en sus formatos, escalas, fechas, etc. Del mismo   modo existe una tendencia en los diagnósticos a dar mayor importancia a las   características cuantificables y medibles, llegando a veces a extremos de condicionar los   análisis y evaluaciones territoriales a los formatos, indicadores y posibilidades que    establecen los sistemas de información geográfica, sacrificando cualidades no medibles    (estructurales, relacionales, culturales) muy significativas en la comprensión e   interpretación adecuada de la problemática territorial.    Notas    [1] Argentina, Bolivia, Brasil, Colombia, Costa Rica, Cuba, Chile, Ecuador, El Salvador, Honduras,  México, Nicaragua,República Dominicana, Uruguay y Venezuela.    [2] En Argentina, por su carácter federal, la ordenación territorial es manejado por las entidades  federativas.    [3] En 1974 en Colombia, se promulgó uno de las primeras normas de preservación de recursos naturales  y protección el media ambiente en Latinoamérica, el \"Código Nacional de Recursos Naturales  Renovables y de Protección del Medio Ambiente\" que tuvo pocos efectos prácticos. En 1988, México  aprobó la Ley General de Equilibrio Ecológico y la Protección del Ambiente e inicia la implementación  de programas de ordenamiento ecológico.    [4] Con excepción de Venezuela que los viene realizando desde los años ochenta.    [5] Con excepción de Venezuela que desde 1983 ya tenía una \"Ley Orgánica para la Ordenación del  Territorio\".    [6] Básicamente las leyes aprobadas o proyectos de ley oficiales.    [7] La organización institucional para la gestión de la ordenación territorial en Venezuela fue establecida  por la Ley Orgánica para la Ordenación del Territorio en 1983. No obstante, en 1999 se promulga en este  país una nueva constitución política como resultado del ascenso al poder del presidente Hugo Chávez. En  dicha constitución se establece, en su Artículo 128, la obligación del Estado de desarrollar \"una política  de ordenación del territorio atendiendo a las realidades ecológicas, geográficas, poblacionales, sociales,  culturales, económicas, políticas, de acuerdo con las premisas del desarrollo sustentable, que incluya la  información, consulta y participación ciudadana. Una ley orgánica desarrollará los principios y criterios  para este ordenamiento\" (Asamblea Nacional Constituyente, 1999). En cumplimiento de este mandato  constitucional se ha elaborado en Venezuela un nuevo proyecto de Ley Orgánica de OT que mantiene  prácticamente la misma organización institucional.    [8] Conformado por la Secretaría de Desarrollo Social (SEDESOL), el Instituto Nacional de Estadística,  Geografía e Informática (INEGI), la Secretaría de Medio Ambiente y Recursos Naturales (SEMARNAT)  y el Consejo Nacional de Población (CONAPO).    [9] Guías elaboradas para SEDESOL, mediante convenio interinstitucional.   \n  30   [10] Toda persona tiene derecho a presentar peticiones respetuosas a las autoridades por motivos de  interés general o particular y a obtener pronta resolución. Este mandato constitucional ha sido  reglamentado para su uso por parte de los ciudadanos (Constitución Política, Artículo 23).    [11] Las normas han establecido el llamado \"voto programático\". Los electores eligen no a una persona  sino a un programa. Si el gobernante no cumple el programa de gobierno por el cual se votó, los  ciudadanos pueden revocarle el mandato según las reglamentaciones establecidas.    [12] La ley establecerá los recursos, las acciones, y los procedimientos necesarios para la protección de  los derechos individuales, de grupo o colectivos, frente a la acción u omisión de las autoridades públicas.  Dicho mandato ha sido reglamentado, a través de la llamada Acción de Grupo (Constitución Política de  Colombia, Artículo 89).    [13] Organizaciones cívicas debidamente reconocidas de agrupaciones o barrios, que garantizarán el  respeto y acatamiento de las disposiciones de ordenamiento territorial que rigen en su sector.    [14] Toda persona tendrá acción de tutela para reclamar ante los jueces, en todo momento y lugar,  mediante un procedimiento preferente y sumario, por sí misma o por quien actúe a su nombre, la  protección inmediata de sus derechos constitucionales fundamentales, cuando quiera que éstos resulten  vulnerados o amenazados por la acción o la omisión de cualquier autoridad pública. La protección  consistirá en una orden para que aquel respecto de quien se solicita la tutela, actúe o se abstenga de  hacerlo. El fallo, que será de inmediato cumplimiento, podrá impugnarse ante el juez competente... En  ningún caso podrán transcurrir más de diez días entre la solicitud de tutela y su resolución (Constitución  Política de Colombia, Artículo 86).    [15] Toda persona podrá acudir ante la autoridad judicial para hacer efectivo el cumplimiento de una ley o     function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };

    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');

    function mixColors(colorA, colorB, amount) {

    function getLuminance(hex) {

    function hslToHex(h, s, l) {

        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
