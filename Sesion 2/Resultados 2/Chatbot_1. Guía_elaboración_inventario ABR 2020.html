        @media(max-width:600px){.input-area{flex-direction:column;}#send-button{width:100%;padding:12px;}}

<script>
    const PDF_TEXT = "  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL  TURISMO         METODOLOGÍA PARA LA   ELABORACIÓN DEL   INVENTARIO DE ATRACT IVOS   TURÍSTICOS   Abril 2020    VICEMINISTERIO DE TURISMO    DIRECCIÓN DE CALIDAD Y DESARROLLO SOSTENIBLE     \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    1                                                    CONTENIDO       Presentación                                                                                                                       2    Objetivo                   4    Conceptos Básicos               6    Metodología                 8                  Proceso                 9                  Diligenciamiento   de los formularios    A.   Generalidades                       12    B.   Características                         13    C.   Valoración y Significado                                           2 0    D.     Características relevantes                     2 7    E.   Actividades y servicios                   2 8    F.   Promoción del atractivo                          2 8    G.     Servicios  para  personas  en  condición  de   discapacidad  o  condiciones  especiales   (embarazadas, tercera edad, otros)                       2 8    H.     Otros                                  2 8                                      Ane xos                                                                      30      Formularios  (archivo Excel)      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    2                        Presentación   \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    3                            Con  el  propósito  de  dar  a  conocer  las  herramientas  para  que  las  regiones  fortalezcan  su   capacidad técnica en función del desarrollo turístico, el Viceministerio de Turismo ha elaborado   esta  versión  de  la    METODOLOGÍA     PARA  L A  ELABORACIÓ N  DE L  INVENTARIO   TURÍS TICO .       La elaboración de los inventarios es una prioridad para el país en tanto que la ley 300 de 1996   y la ley 1101 de 2006 establecen la obligación de actualizar dicha información.       Es importante recalcar que los inventarios de atractivos junto con otros   insumos de información   producidos en los procesos de planificación turística ,   constituyen elementos de trascendencia   para  la  toma  de  decisiones  tanto  para  el  sector  público  como  para  el  privado  en  los  niveles   regional y nacional.       El propósito de esta Guí a es gene rar una herramienta de utilidad que pueda ser   compartida en   todo el país, que facilite el trabajo a los actores regionales y municipales del turismo y propicie   el diálogo armónico con miras a la diversificación y consolidación de productos competitivos.       En esta versión  20 20   revisada, actualizada  y  c omplementada tiene  como  propósito tener una   información  a  efecto s  de  planificación,  promoción,  c omercialización ,    identificación  y  diseño   de     producto  turístico;  así  mismo  mantiene  los  elementos  de  la  metodología  de  2010  con  el   objeto de tener elementos de c omparabilidad y trazabilidad con inventarios realizados en este   periodo.     \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    4                                                                                                                                           Objetivo      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    5                                  Realizar una evaluación objetiva (cualitativa y cuantitativa) de los atractivos y recursos de los   cuales  dispone  la    región ,  el  departamento  o  el  municipio     con  el  fin  de  seleccionar  aquellos   susceptibles  de  uso  turístico  inmediato  o  para  establecer  las  acciones  de  mejoramiento  de  su   calidad  que  hagan  viable  su  inclusión  en  el  diseño  de  productos  turísticos ,  la  planifi cación   turística, la promoción y la  comercialización .        \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    6                                                                                              Conceptos Básicos      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    7                   Inventario:        Es el proceso por el cual se registran ordenadamente los factores físicos y culturales como un   conjunto de atractivos, que sirven para  elaborar productos turísticos en   una región.        Es necesario establecer diferencia entre:              Recurso:        Factores físicos  y culturales potencialmente aprovechables   por el turismo.           Atractivo:     Factores físicos y culturales que reúnen las condiciones para ser integrados de inmediato a los   productos turísticos.      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    8                           Metodología      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    9                         Proceso          1.   Revisión de fuentes  secundarias       Para iniciar  el proceso  e s muy importante revisar inventarios anteriores, planes de desarrollo   turísticos,  planes  de  desarrollo  recientes,  planes  de  ordenamiento  territori al,  investigaciones   reconocidas . Elabore   un listado preliminar   en el formulario 0 (Anexo 1)   de recursos y atractivos   del destino, territorio o región fundamentado en guías turísticas, bienes con declaratoria local,   nacional o internacional, artículos   de prensa  y  revistas. Registre   los recursos  y  atractivos    del   listad o preliminar    en el formulario 00   (Anexo 2)   clasificándolos de acuerdo al tipo de bien y   en   el  formulario a diligencia r   de acuerdo a la siguiente clasificación:       Grupo 1        Patrimonio Cultural:        Se define como el  conjunto de bienes  y manifestaciones    culturales materiales e inmateriales,   que  se  encuentra n     en  permanente  construcción  sobre  el  territorio  transformado  por  las   comunidades.  Dichos  bienes  y  manifestaciones  se  constituyen  en  valores  que  conforman   sentidos y lazos de permanencia, identidad y me moria para un grupo o colectivo humano. 1          Patrimonio  Cultural  Material:  (Formulario   1)       Se  caracteriza  por  tener  un  cuerpo  físico  que  puede  ser  dimensiona do  y  percibido   sensorialmente,  constituido por el territorio geográfico con sus recursos ambientales  y naturales   como  hábitat  humano;  los  hechos  construidos,  las  manifestaciones  físicas  de  la  estructura   productora  y  de  los  procesos  de  poblamiento;  los  sistemas  de  transporte  y  las  obras  de   infraestructura como vías, caminos y puentes, entre otros; y todo e l universo de herramientas,   utensilios,  máquinas  y  demás  objetos  que  apoyan  la  vida  productiva  y  cotidiana  de  los  seres   humanos.  Agrupa dos grandes áreas, la inmueble y la mueble.                                                                           1   Definición tomada del Manual para Inventarios Bienes Culturales Inmuebles, 2005, Ministerio de Cultura,   página 30   \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    10                Patrimonio  Cultural  Inmaterial:  (Formulario   2)       Comprende las  tradiciones y expresiones orales, prácticas sociales, rituales y actos festivos, el   conocimiento y prácticas sobre la naturaleza y el universo; y expresiones artísticas, entre otras,   que continuamente se están recreando en la sociedad y reproduciendo gener acionalmente. Estas   manifestaciones  pueden  agruparse  bajo  la  denominación  de  folklore  (entendido  como  la   sabiduría del pueblo) y deben ajustarse a ciertas características, como lo son: la colectividad,   tradición, anonimato, espontaneidad y popularidad.             Festividades y eventos:   (Formulario   3)       Son atractivos que se generan en la realización de eventos con contenido actual o tradicional,   en los cuales la población es actora o espectadora.             Grupos de Especial Interés : (Formulario   4)       Constituidos por comun idades indígenas, comunidades negras y comunidades raizales, en las   cuales se valora el respeto por sus costumbres como una forma de conservación auténtica de su   legado cultural.       En la Constitución Política de Colombia, se reconoce y se protege la diversi dad étnica y cultural   de los ciudadanos; por tal motivo se considera de vital importancia el  reconocimiento de los   grupos de especial interés en el sentido estricto del respeto por sus valores y costumbres ,   y no   como objetos pasivos para ser mostrados al visitante. La decisión de participar en actividades   turísticas o abstenerse de hacerlo está en cabeza de la propia comunidad.          Grupo 2        Sitios Naturales :  (Formulario   5)       Contemplan las áreas geográficas (c onjunto de atractivos con sus componentes) y los recursos   naturales (que por sus características no permiten estar agrupados) de importancia e interés para   el turismo.            \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    1 1                                  2.   Conformación del eq uipo de trabajo (Grupo Técnico)         Este  debe  ser    integrado     interdisciplinariamente  por  personas  con  conocimientos  en  temas   turísticos,  naturales  y  culturales;  se  constituye  en  el  soporte  de  todo  el  proceso  pues  es  el   encargado de la búsqueda, organización y análisis de la información.          3.   Familiariz arse con la guía   y los formatos         En  un  taller,  dirigido  y  coordinado  por  el  Ministerio  de  Comercio,  Industria  y  Turismo    –    Viceministerio de Turismo o por un grupo debidamente capacitado, se brindará una explicación   específica  de  la  guía  para  la  elaboración  del  inventario :  estructura,  contenidos,  criterios  de   valoración,  forma  de  diligenciamiento  de  los  formularios  y  la  forma  de  entrega  del  informe   final.   En el taller debe estar presente el Grupo Técnico.       4.   Definición de   las prioridades       S itios  para  visitar     de  acuerdo  al  listado  preliminar ,  materiales  que  se  van     a  utilizar,  equipos   necesarios y   recorridos.       5 .         Trabajo de campo       Debe programarse de manera adecuada la visita a cada uno de los  recursos y  atractivos de tal   manera  que  la  recopilación  de    la  información  se  haga  de  manera  eficiente  y  se  realice  la   calificación in situ.   Los  formularios   de captura de información deben diligenciarse para cada   uno de los recursos y  atractivo   identificados .       Todos  los  integrantes  del  equipo  deben  hacer  la  valorac ión  y  luego  se  hace  una  ronda  para   promediar el puntaje final.   NOTA:  Para evitar los sesgos en la  calificación  (por exceso o por   defecto)  es  fundamental  que  haya  la  mirada  interdisciplinaria  (cultural,  ambiental,  turística).   Una  vez  se  hay  concluido  la    pri mera  ronda    de  calificación,  es  recomendable  que  personas   conocedoras  del  turismo  pero  con  visión  externa  al  lugar,  hagan  una    segunda  calificación ,   especialmente de los atractivos que obtuvieron un puntaje más alto.          \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    12                   6.         Formularios a  diligenciar       Son  cinco   formularios los que se   deben diligenciar de manera conjunta con la participación de   todos  los  integrantes  del  equipo ;  la  información  se  debe  consignar  en  Excel     de  la  siguiente   manera :       a.   Listado preliminar de recursos y atractivos   (0)       b.   Clasificación de recursos y atractivos   (00)       c.   Los  formularios   por tipo de atractivo .   (1, 2, 3, 4 Y 5)       d.   Las  fichas de resumen   (1, 2, 3, 4 Y 5)       e.   El  cuadro general de resumen             Diligenciamiento de los f ormularios       Están  diseñados  para  cada  uno  de  los    recursos  y    atractivos.  En  el  encabezado  se  puede   identificar el que se debe emplear en cada caso.  Así mismo el formulario de resumen por tipo   de atractivo y uno de compendio general.       Formulario 1.  Patrimonio material  –   bienes muebles e inmuebles     Formulario 2.  Patrimonio inmaterial     Formulario 3.  Patrimonio  in material  –   festividades y eventos    Formulario 4 . Patrimonio  in material  –   grupos de especial interés     Formulario 5.  Sitios naturales            A.     GENERALIDADES       La denominación del recurso o atractivo debe contener su  nombre   y los sustantivos   comunes     que lo identifica n . P.ej. rio Magdalena, iglesia de San Pedro, Feria de Cali, comunidad indígena   Emberá.  En  caso  de  los bienes  de  patrimonio  inmaterial  pod rán  llevar  solo  su  denominación   \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    13       como en el siguiente ejemplo ; ajiaco, ruana,  tamal , etc.  d e la misma manera se deben diligenciar    los datos del administrador o tenedor del bien cuando estos sean naturales, culturales materiales,   grupos de especial interés,   festividades y eventos.        Adicionalmente registre:               B.     CARACTERÍSTICAS        Identifique el bien a ser inventariado a qué tip o de recurso o atractivo turístico corresponde de   acuerdo a la siguiente clasificación:             a.   Código       Elabore el código de  7   números teniendo en cuenta la siguiente clasificación.                       1.     PATRIMONIO CULTURAL       1.1   Patrimonio Cultural Material Inmueble; Grupo Arquitectónico       1.1.1 Arquitectura Militar    1.1.1.1 Recinto Amurallado (Acceso Principal; Baluarte; Cortina; Espigón;  Cuartel Militar)    1.1.1.2 Muralla del Arrabal ( Baluarte; Cortina )    1.1.1.3 Fortificación (Almacén de Provisiones; Batería; Castillo; Fuerte; Plataforma; Puente;   Trincherón)    1.1.1.4 Escuela de Adiestramiento    1.1.1.5 Batallón    1.1.1.6 Otro             b.   Descripción       La  descripción de los atractivos  y de las actividades sugeridas debe ser  concisa  y referirse   sólo a aquellos aspectos sustanciales que pueden contribuir a un adecuado uso del atractivo   para el diseño de productos turísticos, la planificación, la promoción y l a comercialización.   Debe  contener  de  manera  sintética  elementos  que  componen  el  bien  sin  el  empleo  de   adjetivos y aspectos históricos ,   cuando sea pertinente.         C.     VALORACIÓN    Y SIGNIFICADO         TOTAL  Subtotal  Constitución del Bien (21)  C. PUNTAJES DE VALORACIÓN   SIGNIFICADO   Local (6) Regional (12) Nacional (18) Internacional (30)  Estado de Conservación (21)  CALIDAD  PUNTAJE  Representatividad General (28) \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    21                La valoración de los atractivos turísticos se hace teniendo en cuenta dos grandes temas: calidad   y significado.        Los  criterios  de  calidad  varían  de  acuerdo  con  el  atractivo  que  se  esté  evaluando  y  hacen   referencia  al  grado  de  conservación  en  el  que  se  enc uentre  el  atractivo;  la  calificación  de  la   calidad representa el 70% del total del puntaje asignable y se deben valorar todos los criterios   para cada atractivo. Los puntajes propuestos son tope.        Los criterios de significado hacen referencia al grado de reconocimiento que tiene el atractivo.   Representan  el  30%  de  la  calificación.  Sólo  se  valora  con  uno  de  los  criterios  (es  una   calificación excluyente) y se aplica un valor único.              Criterios para  la valoración del Patrimonio Cultural           Calidad        Para  calificar  la  calidad  de  estos  bienes  es  importante  tener  en  cuenta  la  categorización   mencionada en la sección: “Clasificación de los Bienes y Atractivos” y los criterios que se   enuncian a continuación:        Patrimonio Material           Estado de Conservación:  S i conserva su homogeneidad estética y su integridad física desde   su  situación  original  o  a  partir  de  las  posibles  acciones  del  hombre  (restauración)  para   mejorar la calidad del recurso.           Constitución  del  Bien:    Se  refiere  a  los  materiales  y  las  técnicas  de     elaboración  del  bien.   Existen  bienes  que  por  su  antigüedad  poseen  materiales  y  técnicas  en  desuso  o   desaparecidas  que  merecen  ser  destacadas  en  el  ejercicio  de  la  valoración.  pero  también   pueden existir bienes con materiales o combinación de técnicas mode rnas que igualmente,   pueden  valorarse  por  su  singularidad  o  porque  representan  avances  tecnológicos.    ( Definición  tomada  del  Manual  para  Inventarios  Bienes  Culturales  Muebles,  2005,   Ministerio de Cultura, página 45  )          Representatividad:    Importancia  del  bien  como  un  elemento  que  dio  partida  a  un  hecho   histórico, social o cultural.       \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    22                          Puntaje    Calidad    Estado de conservación     Constitución del bien     Representatividad     Total     21     21     28     70                  Patrimonio Inmaterial           Colectiva:  Común a un grupo humano que se siente representado en este hecho, que lo   usufructúa y lo transmite.           Tradicional:  Se transmite de generación en generación y sus orígenes se pierden en el   tiempo.           Anónima:  No tiene autor conocido y su origen se remonta a  tiempos muy antiguos.           Espontánea:    Responde  al  modo  natural,  sencillo  e  ingenuo  con  que  se  transmite  una   expresión.           Popular:  Representa la cotidianidad de las masas populares.               Puntaje    Calidad    Colectiva     Tradicional     Anónimo     Espontáneo     Popular     Total     14     14     14     14     14     70                      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    23             Festividades y eventos           Organización del evento : Tiene en cuenta el nivel de organización del evento, valorando   aspectos como el contenido del mismo, programación, cumplimiento, logística.           Beneficios  socioculturales  para  la  comunidad:    Arraigo  dentro  de  la  comunidad,   divulgación  del  folclore  regional,  nivel  en  que  ayuda  el  evento  a  la  promoción  de  la   región, nivel de integración comunitaria en la realización del evento.           Beneficios  económicos  locales:    Aumento  en  los  ingresos  regionales,  beneficios  en  el   mejoramiento  de  la  calidad  de  vida  de  la  población  y  la  correcta  utilización  del   presupuesto destinado a la organización del evento.                  Puntaje    Calidad    Organización del evento     Beneficios socioculturales     Beneficios económicos locales    Total     30     20     20        70              Grupos de Especial Interés           Respeto por las costumbres:  Forma de conservación auténtica de su legado cultural.        Calidad    Respeto por las costumbres                                                                        Total                              70             Sitios Naturales        Tiene en cuenta el estado de conservación del atractivo a nivel ambiental, es decir, la escasa o   nula    presencia  de  deterioro  que  puede  ser  ocasionada  por:  c ontaminantes  primarios  como   residuos  de  petróleo,  detergentes,  plásticos,  latas,  restos  orgánicos,  residuos  industriales,   agrícolas;    contaminantes  secundarios  c omo  ruido,  olores  desagradables,    obstrucción  visual,  \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    24       mala disposición de basuras; a cción depredadora del hombre  ocasionada por un uso irracional   de los recursos.        Los criterios para evaluar la calidad son:           Sin  contaminación  del  aire:    Generalmente  representada  en  smog,  proveniente  de  lo s   automóviles, plantas petroleras, el cual causa daños en las plantas y pérdidas agrícolas.           Sin  contaminación  del  agua:    Provocada  por  elementos  químicos,  por  derrame  de   combustibles (gasolina y derivados del petróleo) en los mantos acuíferos que también   se puede provocar por escurrimientos de fertilizantes utilizados en las zonas agrícolas y   por el uso de jabones y detergentes caseros que llegan a las aguas destruyendo la vida.           Sin  contaminación  visual:  originada  en  el  empleo  de  arquitectura  inadecuada,    obstrucción visual, dispersión de basuras.           Sin  contaminación  sonora:    representada  en  niveles  que  impidan  el  disfrute  de  la   naturaleza.           Estado de conservación:  Situación en que se encuentra la fauna y la flora del lugar, si   hay presencia de erosión, ma nifestaciones de actividades extractivas de supervivencia.           Diversidad:  Riqueza de aspectos a observar (diversidad de especies de flora o fauna) y   de habitats o paisajes (vistas panorámicas, topografía), olores, visiones.        Singularidad:  Son rasgos excepci onales o únicos que en la flora y fauna se denominan   endemismo  (no  se  encuentra  sino  en  una  área  restringida,  o  relictuales  (especies   aparentemente desaparecidas evolutivamente). En paisajes se podría definir como que   no se encuentra otro de característica s similares en un ámbito determinado (rareza).               Puntaje    Calidad    Sin contaminación   del ...   aire (10) , agua (10) ,   visua l (10) , sonora (10   )    Estado de conservación     Diversidad     Singularidad     Total     40          10     10     10     70                      \n  GRUPO DE PLANIFICACIÓN Y DESARROLLO SOSTENIBLE DEL TURISMO    25       SIGNIFICADO        Este  segundo  grupo  de  criterios  de  valoración  tiene  como  objetivo  el  poder  determinar  los   siguientes aspectos:           El reconocimiento del recurso o del atractivo turístico frente a mercados turísticos en el     function extractTextFromBackendResponse(raw) {

        try {
            const j = JSON.parse(s);
            if (Array.isArray(j)) return JSON.stringify(j);
            if (j && typeof j === 'object') {
                const c = j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
                if (typeof c === 'string') return c.trim();

            }
            if (typeof j === 'string') return j;
        } catch (e) {}
        return s;
    }

    function hexToRgb(hex) {
        const normalized = String(hex || '#000000').replace('#', '');
        const full = normalized.length === 3 ? normalized.split('').map(ch => ch + ch).join('') : normalized;
        const value = parseInt(full, 16);
        return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }
    function rgbToHex(r, g, b) {
        const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
        return '#' + toHex(r) + toHex(g) + toHex(b);
    }
    function mixColors(colorA, colorB, amount) {
        const a = hexToRgb(colorA);
        const b = hexToRgb(colorB);
        return rgbToHex(a.r + (b.r - a.r) * amount, a.g + (b.g - a.g) * amount, a.b + (b.b - a.b) * amount);
    }
    function getLuminance(hex) {
        const { r, g, b } = hexToRgb(hex);
        const toLinear = (value) => {
            const s = value / 255;
            return s <= 0.03928 ? s / 12.92 : ((s + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function hslToHex(h, s, l) {
        const hue = ((h % 360) + 360) % 360;
        const saturation = Math.max(0, Math.min(100, s)) / 100;
        const lightness = Math.max(0, Math.min(100, l)) / 100;
        const hueToRgb = (p, q, t) => {
            let temp = t;
            if (temp < 0) temp += 1;
            if (temp > 1) temp -= 1;
            if (temp < 1 / 6) return p + (q - p) * 6 * temp;
            if (temp < 1 / 2) return q;
            if (temp < 2 / 3) return p + (q - p) * (2 / 3 - temp) * 6;
            return p;
        };
        const q = lightness < 0.5 ? lightness * (1 + saturation) : lightness + saturation - lightness * saturation;
        const p = 2 * lightness - q;
        const r = hueToRgb(p, q, hue / 360 + 1 / 3);
        const g = hueToRgb(p, q, hue / 360);
        const b = hueToRgb(p, q, hue / 360 - 1 / 3);
        return rgbToHex(r * 255, g * 255, b * 255);
    }

        if (!palette) return;
        target.style.setProperty('--primary', palette.primaryColor || '#007bff');
        target.style.setProperty('--secondary', palette.secondaryColor || '#6c757d');
        target.style.setProperty('--bg', palette.bgColor || '#f8f9fa');
        target.style.setProperty('--text', palette.textColor || '#343a40');
        target.style.setProperty('--card', palette.cardBgColor || '#ffffff');
        target.style.setProperty('--border', palette.cardBorderColor || '#dddddd');
        target.style.setProperty('--input', palette.inputBgColor || '#ffffff');
        target.style.setProperty('--iborder', palette.inputBorderColor || '#cccccc');
        target.style.setProperty('--bot-bg', palette.chatBubbleBotBg || '#e9ecef');
        target.style.setProperty('--bot-text', palette.chatBubbleBotText || '#343a40');
        target.style.setProperty('--user-bg', palette.chatBubbleUserBg || '#007bff');
        target.style.setProperty('--user-text', palette.chatBubbleUserText || '#ffffff');
        target.style.setProperty('--sys-bg', palette.systemMessageBg || '#fff3cd');
        target.style.setProperty('--sys-text', palette.systemMessageText || '#856404');
    }
    function applyPalette(palette) {
        currentPalette = palette;
        applyTheme(currentTheme);
        localStorage.setItem('downloaded-palette', JSON.stringify(palette));
    }
    function applyTheme(t) {
        currentTheme = t;
        document.body.classList.toggle('dark-mode', t === 'dark');
        themeBtn.textContent = t === 'dark' ? '☀️ Tema' : '🌙 Tema';
        const effectivePalette = buildThemePalette(t, currentPalette);
        setPaletteVariables(document.body, effectivePalette);
        setPaletteVariables(document.documentElement, effectivePalette);
        document.body.style.backgroundColor = effectivePalette.bgColor;
        document.body.style.color = effectivePalette.textColor;
        localStorage.setItem('theme', t);
    }
    themeBtn.addEventListener('click', () => { const n = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(n); });
    paletteBtn.addEventListener('click', () => { applyPalette(generatePalette()); });
    const savedPalette = JSON.parse(localStorage.getItem('downloaded-palette') || 'null');
    if (savedPalette) { applyPalette(savedPalette); }
    else if (INITIAL_PALETTE) { applyPalette(INITIAL_PALETTE); }
    else { applyPalette(generatePalette()); }
    applyTheme(currentTheme);

    // Second PDF (embedded or user-loaded)
    if (pdf2Text) { pdf2NameDisplay.textContent = pdf2Name + ' (incluido)'; pdf2StatusDisplay.textContent = '"' + pdf2Name + '" ya incluido.'; pdf2StatusDisplay.style.color = 'var(--success)'; }
    pdf2Upload.addEventListener('change', async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        if (!(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
            pdf2StatusDisplay.textContent = 'No es un PDF válido.'; pdf2StatusDisplay.style.color = 'var(--danger)'; return;
        }
        pdf2Name = file.name; pdf2NameDisplay.textContent = file.name;
        pdf2StatusDisplay.textContent = 'Procesando...'; pdf2StatusDisplay.style.color = 'var(--warning)';
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
                let text = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    tc.items.forEach(item => text += item.str + ' ');
                    text += '\n';
                }
                pdf2Text = text;
                pdf2StatusDisplay.textContent = '"' + pdf2Name + '" cargado.'; pdf2StatusDisplay.style.color = 'var(--success)';
                addMsg('Segundo documento "' + pdf2Name + '" listo.', 'system');
            } catch(err) { pdf2StatusDisplay.textContent = 'Error al procesar.'; pdf2StatusDisplay.style.color = 'var(--danger)'; pdf2Text = ''; }
        };
        reader.readAsArrayBuffer(file);
    });

    function dismissThinkingAsSystem(text, asError) {
        const el = document.getElementById('thinking-msg');
        if (!el) return;
        el.className = 'system-message' + (asError ? ' error' : '');
        el.textContent = text;
        el.removeAttribute('id');
    }

    function addMsg(message, sender, isThinking = false) {
        const el = document.createElement('div');
        el.classList.add(sender === 'user' ? 'user-message' : sender.includes('system') ? 'system-message' : 'bot-message');
        if (sender.includes('error')) el.classList.add('error');
        if (sender === 'bot' && !isThinking) {
            const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
            const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else if (sender === 'bot') {
            const botAvatarUrl = getAvatarUrl('bot');
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong> <span class="thinking-animation">' + message + '</span></div></div>';
            el.id = 'thinking-msg';
        } else if (sender === 'user') {
            const userAvatarUrl = getAvatarUrl('user');
            el.innerHTML = '<div class="message user-message"><div class="message-bubble user-bubble"></div><img class="avatar-img" src="' + userAvatarUrl + '" alt=""></div>';
            el.querySelector('.user-bubble').textContent = message;
        } else {
            el.textContent = message;
        }
        chatDisplay.appendChild(el); chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function updateLastMsg(message) {
        const el = document.getElementById('thinking-msg');
        const botAvatarUrl = getAvatarUrl('bot');
        const processedMessage = message.replace(/\[/g, '\\[').replace(/\]/g, '\\]').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
        const html = marked.parse ? marked.parse(processedMessage) : processedMessage;
        if (el) {
            el.className = 'bot-message';
            el.innerHTML = '<div class="message"><img class="avatar-img" src="' + botAvatarUrl + '" alt=""><div class="message-bubble bot-bubble"><strong>Chatbot:</strong><div class="tex2jax_process" style="margin-top:5px;">' + html + '</div><div style="margin-top:10px;font-size:.8em;color:var(--secondary);font-style:italic;">Modelo: ' + MODEL + '</div></div></div>';
            el.removeAttribute('id');
            if (window.MathJax && window.MathJax.typesetPromise) window.MathJax.typesetPromise([el]).catch(err => console.error(err));
        } else addMsg(message, 'bot');
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    async function sendQuestion() {
        const question = questionInput.value.trim();
        if (!question || isProcessing) return;
        addMsg(question, 'user'); questionInput.value = '';
        isProcessing = true; sendButton.disabled = true; questionInput.disabled = true;
        loadingSpinner.style.display = 'inline-block'; sendButtonText.textContent = 'Enviando';
        addMsg('Pensando...', 'bot', true);
        const maxLen = 800000;
        const t1 = PDF_TEXT.length > maxLen ? PDF_TEXT.substring(0, maxLen) + '... (truncado)' : PDF_TEXT;
        const systemInstructions = 'Eres un asistente que SOLO debe ayudar con preguntas relacionadas con el contenido del/los documento(s) PDF de esta sesión y con el tema del chatbot: «' + CHATBOT_THEME + '». ' +
            'No respondas temas claramente ajenos (vida personal sin relación, otros libros o materiales no incluidos, programación o tareas arbitrarias no vinculadas al texto, cotilleo, política o entretenimiento sin conexión con el PDF, etc.). ' +
            'Si la pregunta no guarda relación razonable con el documento ni con ese tema, responde ÚNICAMENTE con UNA línea que empiece exactamente con [FUERA_DE_ALCANCE] seguida de una frase breve en español. ' +
            'Para preguntas válidas, fundamenta la respuesta en los textos del documento; si falta información en el PDF, dilo con claridad.';

        let prompt = 'Instrucciones del sistema:\n' + systemInstructions + '\n\n';
        prompt += 'Documento 1 ("' + PDF_NAME + '"): "' + t1 + '"\n\n';
        if (pdf2Text) {
            const t2 = pdf2Text.length > maxLen ? pdf2Text.substring(0, maxLen) + '... (truncado)' : pdf2Text;
            prompt += 'Documento 2 ("' + pdf2Name + '"): "' + t2 + '"\n\n';
        }
        prompt += '(Instrucción: Para expresiones matemáticas, utiliza SÓLO el formato $$...$$ para bloque y $...$ para texto en línea.)\n\nPregunta: ' + question + '\n\nRespuesta:';
        try {
            const raw = (await postBackendText({
                model: MODEL,
                prompt: prompt,
                system: systemInstructions
            }) || '').trim();
            if (raw.startsWith('[FUERA_DE_ALCANCE]')) {
                dismissThinkingAsSystem(raw.replace('[FUERA_DE_ALCANCE]', '').trim(), true);
            } else {
                updateLastMsg(raw || 'La IA no proporcionó una respuesta.');
            }
        } catch(err) { updateLastMsg('Lo siento, ocurrió un error: ' + err.message); }
        finally {
            isProcessing = false; sendButton.disabled = false; questionInput.disabled = false;
            loadingSpinner.style.display = 'none'; sendButtonText.textContent = 'Enviar'; questionInput.focus();
        }
    }
    function escapeHtml(s) {
        if (s === undefined || s === null) return '';
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getSessionHTML() {
        const clone = chatDisplay.cloneNode(true);
        const exportStyles =
            'body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;line-height:1.65;padding:28px;color:#333;max-width:880px;margin:0 auto;background:#fafafa;}' +
            'h1{color:#007bff;font-size:1.45em;margin-bottom:6px;}' +
            '.meta{color:#444;margin:6px 0;font-size:.95em;}' +
            'hr{border:none;border-top:1px solid #dee2e6;margin:22px 0;}' +
            '.chat-export{padding:4px 0;}' +
            '.chat-export .user-message,.chat-export .bot-message,.chat-export .system-message{margin-bottom:18px;}' +
            '.chat-export .system-message{text-align:center;color:#555;font-style:italic;padding:10px 14px;background:#fff3cd;border-radius:10px;border:1px solid #ffeaa7;}' +
            '.chat-export .system-message.error{background:#f8d7da;color:#721c24;border-color:#f5c6cb;}' +
            '.chat-export .message{display:flex;align-items:flex-end;gap:12px;}' +
            '.chat-export .message.user-message{flex-direction:row-reverse;}' +
            '.chat-export .avatar-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:1px solid #e0e0e0;}' +
            '.chat-export .message-bubble{padding:12px 16px;border-radius:18px;max-width:78%;box-shadow:0 1px 2px rgba(0,0,0,.06);}' +
            '.chat-export .user-bubble{background:#007bff;color:#fff;}' +
            '.chat-export .bot-bubble{background:#e9ecef;color:#212529;}' +
            '.chat-export .bot-bubble strong{color:#007bff;}' +
            '.chat-export .bot-bubble p{margin:0 0 10px;}.chat-export .bot-bubble p:last-child{margin:0;}' +
            '.chat-export pre{background:#2d2d2d;color:#f8f8f2;padding:12px;border-radius:8px;overflow-x:auto;font-size:.9em;}' +
            '.chat-export code{background:#eee;padding:2px 6px;border-radius:4px;font-size:.9em;}' +
            '.chat-export ul,.chat-export ol{margin:8px 0;padding-left:22px;}';
        return '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sesión de chat</title><style>' + exportStyles + '</style></head><body>' +
            '<h1>Sesión de chat</h1>' +
            '<p class="meta"><strong>Documento:</strong> ' + escapeHtml(PDF_NAME) + '</p>' +
            '<p class="meta"><strong>Tema del chatbot:</strong> ' + escapeHtml(CHATBOT_THEME) + '</p>' +
            '<p class="meta"><strong>Modelo:</strong> ' + escapeHtml(MODEL) + '</p>' +
            '<hr><div class="chat-export">' + clone.innerHTML + '</div></body></html>';
    }

    function downloadSessionHtml() {
        const blob = new Blob([getSessionHTML()], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Sesion_Chat_' + Date.now() + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function processHtmlToDocx(htmlContent) {
        const paragraphs = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = htmlContent;
        const elements = tempDiv.children;
        if (elements.length === 0 && htmlContent.replace(/\s/g, '').length > 0) {
            return [new docx.Paragraph({ text: tempDiv.textContent || htmlContent, spacing: { after: 200 } })];
        }
        for (let i = 0; i < elements.length; i++) {
            const element = elements[i];
            const tagName = element.tagName.toLowerCase();
            const text = element.textContent || element.innerText || '';
            if (tagName === 'h1' || tagName === 'h2') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: tagName === 'h1' ? docx.HeadingLevel.HEADING_1 : docx.HeadingLevel.HEADING_2,
                    spacing: { before: 400, after: 200 }
                }));
            } else if (tagName === 'h3') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    heading: docx.HeadingLevel.HEADING_3,
                    spacing: { before: 300, after: 200 }
                }));
            } else if (tagName === 'ul' || tagName === 'ol') {
                const listItems = element.querySelectorAll('li');
                listItems.forEach(function(li) {
                    paragraphs.push(new docx.Paragraph({
                        text: li.textContent,
                        bullet: { level: 0 },
                        spacing: { after: 100 }
                    }));
                });
            } else if (tagName === 'p') {
                const textRuns = [];
                if (element.children.length === 0) {
                    textRuns.push(new docx.TextRun({ text: text }));
                } else {
                    processInlineElements(element, textRuns);
                }
                paragraphs.push(new docx.Paragraph({
                    children: textRuns.length > 0 ? textRuns : [new docx.TextRun({ text: text })],
                    spacing: { after: 200 }
                }));
            } else if (tagName === 'blockquote') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    italics: true,
                    indent: { left: 720 },
                    spacing: { after: 200 },
                    border: { left: { color: 'CCCCCC', size: 6, style: docx.BorderStyle.SINGLE } }
                }));
            } else if (tagName === 'code') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: 'F5F5F5' },
                    spacing: { after: 100 }
                }));
            } else if (tagName === 'pre') {
                paragraphs.push(new docx.Paragraph({
                    text: text,
                    font: 'Courier New',
                    shading: { type: docx.ShadingType.SOLID, color: '2D2D2D' },
                    color: 'FFFFFF',
                    spacing: { after: 200 }
                }));
            } else {
                paragraphs.push(new docx.Paragraph({ text: text, spacing: { after: 200 } }));
            }
        }
        return paragraphs;
    }

    function processInlineElements(element, textRuns) {
        for (let j = 0; j < element.childNodes.length; j++) {
            const node = element.childNodes[j];
            if (node.nodeType === Node.TEXT_NODE) {
                textRuns.push(new docx.TextRun({ text: node.textContent }));
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toLowerCase();
                const nodeText = node.textContent || '';
                if (tagName === 'strong' || tagName === 'b') {
                    textRuns.push(new docx.TextRun({ text: nodeText, bold: true }));
                } else if (tagName === 'em' || tagName === 'i') {
                    textRuns.push(new docx.TextRun({ text: nodeText, italics: true }));
                } else if (tagName === 'u') {
                    textRuns.push(new docx.TextRun({ text: nodeText, underline: {} }));
                } else if (tagName === 'code') {
                    textRuns.push(new docx.TextRun({
                        text: nodeText,
                        font: 'Courier New',
                        shading: { type: docx.ShadingType.SOLID, color: 'F0F0F0' }
                    }));
                } else if (tagName === 'a') {
                    textRuns.push(new docx.TextRun({ text: nodeText, color: '0066CC', underline: {} }));
                } else {
                    processInlineElements(node, textRuns);
                }
            }
        }
    }

    function downloadSessionWord() {
        if (typeof docx === 'undefined' || typeof saveAs === 'undefined') {
            alert('Las librerías para exportar Word aún se están cargando. Espera unos segundos e inténtalo de nuevo.');
            return;
        }
        const chatMessages = chatDisplay.querySelectorAll('.user-message, .bot-message, .system-message');
        const children = [];
        children.push(new docx.Paragraph({
            text: 'Sesión de Chat (documento PDF)',
            heading: docx.HeadingLevel.HEADING_1,
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Documento: ', bold: true }),
                new docx.TextRun({ text: PDF_NAME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Tema del chatbot: ', bold: true }),
                new docx.TextRun({ text: CHATBOT_THEME })
            ],
            spacing: { after: 100 }
        }));
        children.push(new docx.Paragraph({
            children: [
                new docx.TextRun({ text: 'Modelo: ', bold: true }),
                new docx.TextRun({ text: MODEL })
            ],
            spacing: { after: 200 }
        }));
        children.push(new docx.Paragraph({
            text: '________________________________________________________________________________________________',
            spacing: { after: 400 }
        }));

        chatMessages.forEach(function(msg) {
            if (msg.classList.contains('system-message')) {
                children.push(new docx.Paragraph({
                    text: msg.textContent,
                    italics: true,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { after: 200 },
                    color: '666666'
                }));
            } else if (msg.classList.contains('user-message')) {
                const ub = msg.querySelector('.user-bubble');
                const userText = ub ? ub.textContent.trim() : msg.textContent.replace(/^Usuario:\s*/i, '').trim();
                children.push(new docx.Paragraph({
                    children: [
                        new docx.TextRun({ text: 'Usuario: ', bold: true, color: '0066CC' }),
                        new docx.TextRun({ text: userText })
                    ],
                    spacing: { after: 200 },
                    alignment: docx.AlignmentType.RIGHT,
                    shading: { type: docx.ShadingType.SOLID, color: 'E3F2FD' }
                }));
            } else if (msg.classList.contains('bot-message')) {
                const botBubble = msg.querySelector('.message-bubble');
                if (botBubble) {
                    const contentDiv = botBubble.querySelector('.tex2jax_process') || botBubble.querySelector('div[style*="margin-top:5px"]');
                    const modelInfoEl = botBubble.querySelector('div[style*="font-size:0.8em"]');
                    const modelInfo = modelInfoEl ? modelInfoEl.textContent : '';
                    if (contentDiv) {
                        const formatted = processHtmlToDocx(contentDiv.innerHTML);
                        formatted.forEach(function(paragraph) { children.push(paragraph); });
                        if (modelInfo) {
                            children.push(new docx.Paragraph({
                                children: [new docx.TextRun({ text: modelInfo, italics: true, size: 20, color: '666666' })],
                                spacing: { after: 200 }
                            }));
                        }
                    } else {
                        let plain = botBubble.textContent || '';
                        if (modelInfo) plain = plain.split(modelInfo).join('').trim();
                        plain = plain.replace(/^Chatbot:\s*/i, '').trim();
                        children.push(new docx.Paragraph({ text: plain, spacing: { after: 200 } }));
                    }
                }
            }
        });

        const doc = new docx.Document({
            sections: [{ properties: {}, children: children }]
        });
        docx.Packer.toBlob(doc).then(function(blob) {
            saveAs(blob, 'Sesion_Chat_' + Date.now() + '.docx');
        });
    }

    sendButton.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keypress', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });
    document.getElementById('download-html-session-btn').addEventListener('click', downloadSessionHtml);
    document.getElementById('download-word-session-btn').addEventListener('click', downloadSessionWord);
    addMsg('Documento "' + PDF_NAME + '" listo. Solo respondo preguntas sobre este contenido o el tema «' + CHATBOT_THEME + '». ¡Puedes empezar!', 'system');
    questionInput.focus();
</script>
