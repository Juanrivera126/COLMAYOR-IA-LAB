<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de iframe en HTML</title>
</head>
<body>

    <h1>Mi Página con un Marco en Línea</h1>
    <p>A continuación se muestra otro sitio web incrustado:</p>

    <!-- El iframe abre el sitio especificado en el atributo src -->
	<iframe 
    width="560" 
    height="315" 
    src="https://www.youtube.com/embed/8Blu1ONMM_c" 
    title="Reproductor de YouTube" 
    frameborder="0" 
	 referrerpolicy="strict-origin-when-cross-origin"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    allowfullscreen>
</iframe>


  

</body>
</html>
